document_id: EZK.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu juge chacun selon sa conduite
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'qui répand du sang 16.38 ; 22.9 ; cf. Gn 9.6. –  envers son frère  : traduction incertaine (cf. v. 18) ; le terme pourrait aussi être lu comme une interjection (6.11 ; 21.20n, Hélas ! ) ; certains pensent qu''il est ici dû à une erreur de copie ; d''autres interprètent qui commette ces fautes les unes après les autres.'
  - type: text
    content: 'S''il engendre un fils qui est un bandit, qui répand du sang et qui commet envers son frère l''une de ces fautes, '
  '11':
  - type: note
    content: 'bien que lui-même n''ait commis…  : il s''agit vraisemblablement du père, le juste (v. 5-9) ; certains appliquent la phrase au fils, l''injuste, et traduisent et qui n''ait pas fait (ce qu''il aurait dû faire), c.-à-d. qui n''ait pas accompli les commandements positifs de la Loi. –  un fils  : litt. il. –  mange… 11.6n-8.'
  - type: text
    content: '– bien que lui-même n''ait commis aucune de ces fautes – un fils qui mange sur les montagnes et souille la femme de son prochain, '
  '12':
  - type: note
    content: le pauvre et le déshérité 16.49 ; 22.29. –  abominations 5.9+.
  - type: text
    content: 'qui exploite le pauvre et le déshérité, commet des spoliations, ne rend pas le gage, lève les yeux vers les idoles et fait des abominations, '
  '13':
  - type: note
    content: 'ce fils-là vivrait  : litt. vivant. –  Que son sang soit sur lui  : cf. Lv 20.9n.'
  - type: text
    content: prête à intérêt et exige des rentes, ce fils-là vivrait ! Il ne vivra pas ; il a fait toutes ces abominations, il sera mis à mort. Que son sang soit sur lui !
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 5-10.
  - type: text
    content: 'Mais s''il engendre un fils qui voit tous les péchés que commet son père, qui les voit et n''agit pas de la même manière : '
  '15':
  - type: text
    content: 'il ne mange pas sur les montagnes et ne lève pas les yeux vers les idoles de la maison d''Israël, il ne souille pas la femme de son prochain, '
  '16':
  - type: text
    content: 'il n''exploite personne, il ne prend pas de gage, il ne commet pas de spoliation, il donne son pain à celui qui a faim et couvre d''un vêtement celui qui est nu, '
  '17':
  - type: note
    content: 'il n''use pas…  : litt. qui détourne sa main du pauvre  ; au lieu de pauvre LXX a lu l''injustice, comme au v. 8.'
  - type: text
    content: 'il n''use pas de violence envers le pauvre, il ne tire ni intérêt ni rente, il observe mes règles et suit mes prescriptions, celui-là ne mourra pas pour la faute de son père ; il vivra. '
  '18':
  - type: note
    content: 'V. 10-14. –  des siens  : autre traduction de son peuple  ; cf. Gn 17.14n  ; Lv 19.16n.'
  - type: text
    content: C'est son père, qui a été un oppresseur, qui a commis des spoliations aux dépens de son frère, qui a fait au milieu des siens ce qui n'est pas bon, c'est lui qui mourra pour sa faute.
  '19':
  - type: text
    content: ' '
  - type: note
    content: V. 9+. –  chargé de la faute 4.4n  ; 10.4. –  a agi et a mises en pratique traduisent un même verbe hébreu, cf. 5.7n.
  - type: text
    content: 'Vous dites : « Pourquoi le fils n''est-il pas chargé de la faute de son père ? » C''est que le fils a agi selon l''équité et la justice, c''est qu''il a observé toutes mes prescriptions et les a mises en pratique ; il vivra. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'maxime  : cf. 12.22. –  Les pères… Jr 31.29.'
  - type: text
    content: 'Qu''avez-vous à répéter cette maxime sur la terre d''Israël :'
  - type: text
    content: « Les pères mangent des raisins verts,
  - type: text
    content: et ce sont les fils qui ont mal aux dents. »
  '20':
  - type: note
    content: 'V. 4+ ; cf. Gn 18.22-32 ; Ex 20.5s ; 34.7 ; Lv 26.39 ; Nb 14.33. –  sur lui  : autre traduction pour lui (seul).'
  - type: text
    content: Celui qui pèche, c'est lui qui mourra. Un fils ne sera pas chargé de la faute de son père, un père ne sera pas chargé de la faute de son fils. La justice du juste sera sur lui, et la méchanceté du méchant sera sur lui.
  - type: heading
    content: Persévérer dans une conduite juste
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 27 ; 33.12-16,19 ; 37.24 ; Jr 18.8.
  - type: text
    content: 'Si le méchant revient de tous les péchés qu''il a commis, s''il observe toutes mes prescriptions, s''il agit selon l''équité et la justice, il vivra, il ne mourra pas. '
  '22':
  - type: note
    content: Cf. v. 24 ; cf. 21.28s.
  - type: text
    content: 'On ne se souviendra, contre lui, d''aucune des transgressions qu''il a commises ; par la justice selon laquelle il a agi, il vivra. '
  '23':
  - type: note
    content: 'V. 32 ; 33.11 ; cf. 2S 14.14n  ; Lm 3.33 ; Lc 15.7 ; 1Tm 2.4 ; 2P 3.9 ; Sagesse 1.13 : « Dieu, lui, n''a pas fait la mort, et il ne prend pas plaisir à la perte des vivants. »'
  - type: text
    content: 'Est-ce que je désire vraiment la mort du méchant, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – ou plutôt qu''il revienne de ses voies et qu''il vive ? '
  '24':
  - type: note
    content: 'tout ce qu''il a fait pour la justice  : autre lecture traditionnelle toute sa justice  ; cf. 3.20+ ; 33.12s ; Hé 6.6.'
  - type: text
    content: Si un juste revient de sa justice et agit injustement, s'il se livre à toutes les abominations auxquelles le méchant s'est livré – il vivrait ! On ne se souviendra plus de tout ce qu'il a fait pour la justice. A cause des sacrilèges et des péchés qu'il a commis, à cause de cela il mourra.
  '25':
  - type: text
    content: ' '
  - type: note
    content: V. 29 ; 33.17-20.
  - type: text
    content: 'Vous dites : « La voie du Seigneur n''est pas au point. » Ecoutez, je vous prie, maison d''Israël ! Est-ce ma voie qui n''est pas au point ? Ne seraient-ce pas plutôt vos voies qui ne sont pas au point ? '
  '26':
  - type: note
    content: V. 24+.
  - type: text
    content: 'Si un juste revient de sa justice, s''il agit injustement et qu''il meure pour cela, il meurt parce qu''il a agi injustement. '
  '27':
  - type: note
    content: V. 21+.
  - type: text
    content: 'Si un méchant revient de la méchanceté avec laquelle il a agi, pour agir selon l''équité et la justice, il sauvegardera sa vie. '
  '28':
  - type: note
    content: 'S''il ouvre les yeux  : litt. il a vu  ; cf. 12.2s ; LXX omet cette expression.'
  - type: text
    content: S'il ouvre les yeux et revient de toutes les transgressions qu'il a commises, il vivra, il ne mourra pas.
  '29':
  - type: text
    content: ' '
  - type: note
    content: V. 25+.
  - type: text
    content: 'La maison d''Israël dit : La voie du Seigneur n''est pas au point. Est-ce mes voies qui ne sont pas au point, maison d''Israël ? Ne seraient-ce pas plutôt vos voies qui ne sont pas au point ? '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Par ma vie 5.11n. –  vous n'aurez plus… 12.23.
  - type: text
    content: 'Par ma vie, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – vous n''aurez plus lieu de répéter cette maxime en Israël. '
  '30':
  - type: note
    content: je vous jugerai… 7.3+. –  Revenez… 14.6+. –  plus d'obstacle… 7.19n  ; certains comprennent ici que votre faute ne soit plus un obstacle pour vous faire trébucher.
  - type: text
    content: 'C''est pourquoi je vous jugerai, chacun selon ses voies, maison d''Israël – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. Revenez, revenez de toutes vos transgressions, afin qu''il n''y ait plus d''obstacle pour vous faire trébucher, plus de cause de faute ! '
  '31':
  - type: note
    content: 'Cf. 11.19n. –  les transgressions…  : autre traduction les révoltes par lesquelles vous vous êtes révoltés. – Voir cœur. –  souffle  : voir esprit.'
  - type: text
    content: 'Rejetez loin de vous toutes les transgressions que vous avez commises ; faites-vous un cœur nouveau et un souffle nouveau. Pourquoi mourriez-vous, maison d''Israël ? '
  '32':
  - type: note
    content: V. 23+. –  Revenez ou détournez-vous  ; cf. v. 30.
  - type: text
    content: 'Car je ne désire pas la mort de celui qui meurt – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: . Revenez donc et vivez !
  '4':
  - type: note
    content: 'Tous les êtres…  : autre traduction toutes les vies (cf. Gn 1.20n) sont à moi, celle du fils comme celle du père… v. 20+ ; cf. 3.18,20 ; 14.12-20 ; 33.10-20 ; Dt 24.16 ; 2R 14.6 ; Jr 31.30. – Voir péché.'
  - type: text
    content: Tous les êtres m'appartiennent ; le fils comme le père, ils m'appartiennent ; celui qui pèche, c'est lui qui mourra.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'L''homme qui… cf. 14.4+. –  agit selon l''équité (ou le droit ) …  : cf. 22.6-12 ; 45.9n  ; Lv 19 ; Mi 6.6-8 ; Ps 15 ; Pr 21.15.'
  - type: text
    content: 'L''homme qui est juste, qui agit selon l''équité et la justice, '
  '6':
  - type: note
    content: 'qui ne mange pas…  : le culte des hauts lieux (6.2-3+) comportait des repas sacrificiels ; v. 11,15 ; 22.9 ; 33.25n. –  idoles 6.4+. –  ne souille pas  : cf. 33.26 ; Gn 34.5 ; Ex 20.14 ; Lv 18.20 ; 20.10 ; le verbe hébreu est plus généralement traduit par rendre impur  ; cf. 14.11+ ; c''est un mot d''une autre racine qui est traduit plus loin par souillure menstruelle  ; cf. 7.19n  ; 22.10 ; 36.17 ; Lv 12.2n  ; 18.19+.'
  - type: text
    content: 'qui ne mange pas sur les montagnes et ne lève pas les yeux vers les idoles de la maison d''Israël, qui ne souille pas la femme de son prochain et ne s''approche pas d''une femme pendant sa souillure menstruelle, '
  '7':
  - type: note
    content: 'n''exploite personne Ex 22.20 ; Lv 19.13,33 ; Dt 23.16 ; 24.14s. –  gage Ex 22.25s ; Dt 24.12. –  spoliation  : Lv 19.11 ; cf. Dt 23.25s ; Es 5.8. –  donne son pain… Dt 26.12 ; Es 58.7 ; cf. Mt 25.34s,46.'
  - type: text
    content: 'qui n''exploite personne, qui rend au débiteur son gage, qui ne commet pas de spoliation, qui donne son pain à celui qui a faim et couvre d''un vêtement celui qui est nu, '
  '8':
  - type: note
    content: 'intérêt / rente  : cf. 22.12 ; Ex 22.24 ; Lv 25.36ns ; Dt 23.20s ; Ps 15.5 ; Pr 28.8. –  injustice  : cf. Lv 19.35 ; Dt 25.13-16. –  juge loyalement (ou avec loyauté, v. 9 ; autre traduction selon la vérité) …  : cf. Ex 23.6-8 ; Lv 19.15-18.'
  - type: text
    content: 'qui ne prête pas à intérêt et n''exige pas de rente, qui détourne sa main de l''injustice et juge loyalement entre deux hommes, '
  '9':
  - type: note
    content: il vivra v. 17,19,21 ; 20.11+ ; Lv 18.5 ; Lc 10.28.
  - type: text
    content: 'qui suit mes prescriptions et observe mes règles en agissant avec loyauté, celui-là est juste ; il vivra – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
