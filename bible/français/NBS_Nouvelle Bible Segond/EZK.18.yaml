document_id: EZK.18,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu juge chacun selon sa conduite
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui répand du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.38 ; 22.9 ; cf. Gn 9.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: envers son frère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine (cf. v. 18) ; le terme pourrait aussi être lu comme une interjection (6.11 ; 21.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hélas !
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; certains pensent qu''il est ici dû à une erreur de copie ; d''autres interprètent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui commette ces fautes les unes après les autres.
      marker-yv: yv-n
    - type: text
      text: 'S''il engendre un fils qui est un bandit, qui répand du sang et qui commet envers son frère l''une de ces fautes, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bien que lui-même n'ait commis…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit vraisemblablement du père, le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: juste
        - type: text
          text: ' (v. 5-9) ; certains appliquent la phrase au fils, l''injuste, et traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et qui n''ait pas fait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ce qu''il aurait dû faire), c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui n''ait pas accompli les commandements positifs de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mange… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-8.'
      marker-yv: yv-n
    - type: text
      text: '– bien que lui-même n''ait commis aucune de ces fautes – un fils qui mange sur les montagnes et souille la femme de son prochain, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le pauvre et le déshérité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.49 ; 22.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abominations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.9+.
      marker-yv: yv-n
    - type: text
      text: 'qui exploite le pauvre et le déshérité, commet des spoliations, ne rend pas le gage, lève les yeux vers les idoles et fait des abominations, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce fils-là vivrait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vivant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que son sang soit sur lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 20.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: prête à intérêt et exige des rentes, ce fils-là vivrait ! Il ne vivra pas ; il a fait toutes ces abominations, il sera mis à mort. Que son sang soit sur lui !
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 5-10.
      marker-yv: yv-n
    - type: text
      text: 'Mais s''il engendre un fils qui voit tous les péchés que commet son père, qui les voit et n''agit pas de la même manière : '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'il ne mange pas sur les montagnes et ne lève pas les yeux vers les idoles de la maison d''Israël, il ne souille pas la femme de son prochain, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'il n''exploite personne, il ne prend pas de gage, il ne commet pas de spoliation, il donne son pain à celui qui a faim et couvre d''un vêtement celui qui est nu, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il n'use pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui détourne sa main du pauvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pauvre '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'injustice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 8.'
      marker-yv: yv-n
    - type: text
      text: 'il n''use pas de violence envers le pauvre, il ne tire ni intérêt ni rente, il observe mes règles et suit mes prescriptions, celui-là ne mourra pas pour la faute de son père ; il vivra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 10-14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des siens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de son peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 17.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 19.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: C'est son père, qui a été un oppresseur, qui a commis des spoliations aux dépens de son frère, qui a fait au milieu des siens ce qui n'est pas bon, c'est lui qui mourra pour sa faute.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chargé de la faute '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 10.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'a agi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'a mises en pratique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent un même verbe hébreu, cf. 5.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous dites : « Pourquoi le fils n''est-il pas chargé de la faute de son père ? » C''est que le fils a agi selon l''équité et la justice, c''est qu''il a observé toutes mes prescriptions et les a mises en pratique ; il vivra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maxime
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 12.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les pères… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jr 31.29.
      marker-yv: yv-n
    - type: text
      text: 'Qu''avez-vous à répéter cette maxime sur la terre d''Israël :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Les pères mangent des raisins verts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce sont les fils qui ont mal aux dents. »
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 4+ ; cf. Gn 18.22-32 ; Ex 20.5s ; 34.7 ; Lv 26.39 ; Nb 14.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour lui (seul).
      marker-yv: yv-n
    - type: text
      text: Celui qui pèche, c'est lui qui mourra. Un fils ne sera pas chargé de la faute de son père, un père ne sera pas chargé de la faute de son fils. La justice du juste sera sur lui, et la méchanceté du méchant sera sur lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Persévérer dans une conduite juste
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 27 ; 33.12-16,19 ; 37.24 ; Jr 18.8.
      marker-yv: yv-n
    - type: text
      text: 'Si le méchant revient de tous les péchés qu''il a commis, s''il observe toutes mes prescriptions, s''il agit selon l''équité et la justice, il vivra, il ne mourra pas. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 24 ; cf. 21.28s.
      marker-yv: yv-n
    - type: text
      text: 'On ne se souviendra, contre lui, d''aucune des transgressions qu''il a commises ; par la justice selon laquelle il a agi, il vivra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 32 ; 33.11 ; cf. 2S 14.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lm 3.33 ; Lc 15.7 ; 1Tm 2.4 ; 2P 3.9 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Sagesse
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.13 : « Dieu, lui, n''a pas fait la mort, et il ne prend pas plaisir à la perte des vivants. »'
      marker-yv: yv-n
    - type: text
      text: 'Est-ce que je désire vraiment la mort du méchant, – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  – ou plutôt qu''il revienne de ses voies et qu''il vive ? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tout ce qu''il a fait pour la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toute sa justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 3.20+ ; 33.12s ; Hé 6.6.'
      marker-yv: yv-n
    - type: text
      text: Si un juste revient de sa justice et agit injustement, s'il se livre à toutes les abominations auxquelles le méchant s'est livré – il vivrait ! On ne se souviendra plus de tout ce qu'il a fait pour la justice. A cause des sacrilèges et des péchés qu'il a commis, à cause de cela il mourra.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 29 ; 33.17-20.
      marker-yv: yv-n
    - type: text
      text: 'Vous dites : « La voie du Seigneur n''est pas au point. » Ecoutez, je vous prie, maison d''Israël ! Est-ce ma voie qui n''est pas au point ? Ne seraient-ce pas plutôt vos voies qui ne sont pas au point ? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 24+.
      marker-yv: yv-n
    - type: text
      text: 'Si un juste revient de sa justice, s''il agit injustement et qu''il meure pour cela, il meurt parce qu''il a agi injustement. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 21+.
      marker-yv: yv-n
    - type: text
      text: 'Si un méchant revient de la méchanceté avec laquelle il a agi, pour agir selon l''équité et la justice, il sauvegardera sa vie. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: S'il ouvre les yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a vu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 12.2s ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' omet cette expression.'
      marker-yv: yv-n
    - type: text
      text: S'il ouvre les yeux et revient de toutes les transgressions qu'il a commises, il vivra, il ne mourra pas.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
