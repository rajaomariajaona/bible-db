document_id: JHN.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus guérit un homme paralysé
  - type: text
    content: ' '
  - type: note
    content: 'une fête  : certains mss portent la fête , expression qui désigne vraisemblablement la Pâque (cf. 6.4) ; voir calendrier et fêtes.'
  - type: text
    content: Après cela, il y avait une fête des Juifs, et Jésus monta à Jérusalem.
  '10':
  - type: note
    content: 'Les Juifs 1.19n. –  guéri / sabbat  : cf. 9.14 ; Mt 12.2,10/ / ; Lc 13.14. –  sabbat et grabat font assonance, en grec comme en français. –  pas permis de porter (c''est le même verbe grec qui est traduit par prendre aux v. 8-12 ; voir 1.29n) : cf. Jr 17.21-27 ; Mt 12.1-8/ /.'
  - type: text
    content: 'Les Juifs disaient donc à celui qui avait été guéri : C''est le sabbat ; il ne t''est pas permis de porter ton grabat ! '
  '11':
  - type: note
    content: 'qui m''a rendu la santé  : litt. qui m''a fait sain, de même v. 15 ; cf. v. 16,19s.'
  - type: text
    content: 'Il leur répondit : C''est celui qui m''a rendu la santé qui m''a dit : « Prends ton grabat et marche ! » '
  '12':
  - type: note
    content: 'Cf. Lc 5.21+. –  Prends  : certains mss portent prends ton grabat.'
  - type: text
    content: 'Ils lui demandèrent : Qui est l''homme qui t''a dit : « Prends et marche ! » '
  '13':
  - type: note
    content: 'Jésus s''était esquivé  : cf. 6.2s,15 ; Mt 8.18/ / ; 13.36/ /.'
  - type: text
    content: 'Mais celui qui avait été guéri ne savait pas qui c''était, car Jésus s''était esquivé ; en effet, il y avait foule en ce lieu. '
  '14':
  - type: note
    content: 'Voir temple. –  ne pèche plus 8.11. –  de peur…  : cf. 9.2s ; 11.4 ; Mt 9.2/ / ; 12.44-45/ /.'
  - type: text
    content: 'Après cela, Jésus le trouve dans le temple et lui dit : Eh bien, tu as retrouvé la santé ; ne pèche plus, de peur qu''il ne t''arrive quelque chose de pire. '
  '15':
  - type: note
    content: 9.11.
  - type: text
    content: 'L''homme s''en alla dire aux Juifs que c''était Jésus qui lui avait rendu la santé. '
  '16':
  - type: note
    content: Cf. v. 18 ; Mt 12.14.
  - type: text
    content: 'C''est pourquoi les Juifs persécutaient Jésus : parce qu''il faisait cela pendant le sabbat.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: '9.4 ; le judaïsme débat depuis longtemps de savoir si Dieu travaille ou non le jour du sabbat : à des textes comme Gn 2.2 ; Ex 20.11 est opposée l''idée que, si la providence divine n''était à l''œuvre, toute vie cesserait.'
  - type: text
    content: 'Jésus leur répondit : Mon Père est à l''œuvre jusqu''à présent, et moi aussi je suis à l''œuvre. '
  '18':
  - type: note
    content: 'cherchaient… à le tuer v. 16 ; 7.1,19,25,30 ; 8.37,40 ; 11.53 ; Mt 14.5/ / ; 26.4/ /. –  annulait  : le verbe grec, qui signifie concrètement délier, détacher (Mt 16.19 ; 18.18 ; Mc 1.7/ / ; 7.35 ; 11.2ss/ / ; Lc 13.15s ; Ac 2.24n), peut être compris ici au sens de violer (Mt 5.19) comme au sens d’abolir  ; il est traduit par détruire en Jn 2.19 ; voir aussi 7.23 ; 10.35 ; Ep 2.14 ; 1Jn 3.8 (détruire). –  égal à Dieu  : cf. 10.30-36 ; 14.28 ; 19.7 ; Ph 2.6 ; voir aussi Gn 3.5s ; Sagesse 2.16 : « (Le juste) se vante d''avoir Dieu pour père. »'
  - type: text
    content: C'est pourquoi les Juifs cherchaient d'autant plus à le tuer, non seulement parce qu'il annulait le sabbat, mais parce qu'il disait que Dieu était son propre Père, se faisant ainsi lui-même égal à Dieu.
  - type: heading
    content: L'autorité du Fils de Dieu
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 30 ; 7.16-18,28 ; 8.28,42 ; 12.49 ; 14.10 ; 2Co 3.5. –  Amen, amen 1.51n  ; cf. Mt 5.18n. –  ce qu''il voit 3.11+. – Cf. Epître d''Ignace d''Antioche aux Magnésiens 7.1 : « De même donc que le Seigneur n''a rien fait, ni par lui-même, ni par ses apôtres, sans son Père, avec qui il est un, ainsi vous non plus ne faites rien sans l''évêque et les presbytres… »'
  - type: text
    content: 'Jésus leur répondit donc : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, le Fils ne peut rien faire de lui-même, sinon ce qu''il voit faire au Père ; ce que celui-là fait, en effet, le Fils aussi le fait pareillement. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.7. –  porte des Moutons  : traduction incertaine ; en grec la probatique (de probata, moutons ) ; d''autres comprennent le bassin des Moutons  ; Né 3.1,32 ; 12.39. –  Bethzatha , nom d''un quartier de Jérusalem situé au nord du temple, où on a retrouvé un bassin à colonnades qui pourrait correspondre à celui qui est évoqué ici ; certains mss portent Béthesda ou Bethsaïda . Béthesda serait la transcription d''un nom hébreu qui signifie peut-être maison des sources ou maison de compassion  ; dans un écrit de Qumrân il est question d''un bassin appelé Beth-Eshdathayîn (maison des deux sources).'
  - type: text
    content: 'Or, à Jérusalem, près de la porte des Moutons, il y a un bassin qui s''appelle en hébreu Bethzatha, et qui a cinq portiques. '
  '20':
  - type: note
    content: 'Cf. Sagesse 8.4 : « Initiée à la science même de Dieu, elle (la Sagesse) décide de ses œuvres. » 9.9 : « Près de toi se tient la Sagesse qui connaît tes œuvres, et qui était présente lorsque tu créais le monde. Elle sait ce qui est agréable à tes yeux, ce qui est droit selon tes commandements. » –  le Père est ami du Fils 3.35+. –  plus grandes encore  : litt. plus grandes que celles-ci, 1.50 ; 14.12.'
  - type: text
    content: 'Car le Père est ami du Fils, et il lui montre tout ce que lui-même fait ; il lui montrera des œuvres plus grandes encore, pour que, vous, vous soyez étonnés. '
  '21':
  - type: note
    content: 'réveille ou relève, cf. 2.19n  ; voir résurrection. –  fait vivre  : même verbe en 6.63 ; Rm 4.17 ; 8.11 ; 1Co 15.22,36,45 ; 2Co 3.6 ; Ga 3.21 ; 1P 3.18 ; verbe dérivé en Ep 2.5 ; Col 2.13 ; voir aussi Jn 11.25 ; cf. Dt 32.39 ; 1S 2.6 ; 2R 5.7 ; Os 6.2 ; Rm 4.17 ; Ep 2.5.'
  - type: text
    content: 'En effet, tout comme le Père réveille les morts et les fait vivre, ainsi le Fils fait vivre qui il veut. '
  '22':
  - type: note
    content: V. 27+.
  - type: text
    content: 'De plus, le Père ne juge personne, mais il a remis tout le jugement au Fils, '
  '23':
  - type: note
    content: Cf. Lc 10.16 ; Ph 2.10s ; 1Jn 2.23.
  - type: text
    content: pour que tous honorent le Fils comme ils honorent le Père. Celui qui n'honore pas le Fils n'honore pas le Père qui l'a envoyé.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 8.51 ; 11.25s. –  qui entend ou qui écoute . –  croit celui… ou croit en celui… ; a foi en celui… –  a la vie éternelle 3.15+. –  pas en jugement 3.18+ ; cf. Rm 8.1. –  de la mort à la vie 1Jn 3.14.
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, celui qui entend ma parole et qui croit celui qui m''a envoyé a la vie éternelle ; il ne vient pas en jugement, il est passé de la mort à la vie. '
  '25':
  - type: note
    content: 'l''heure vient v. 28. –  c''est maintenant 4.23. –  les morts entendront…  : cf. v. 28s ; 11.25s,43 ; Mc 5.41 ; Lc 7.14 ; 8.54 ; Ap 3.1s.'
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, l''heure vient – c''est maintenant – où les morts entendront la voix du Fils de Dieu ; et ceux qui l''auront entendue vivront. '
  '26':
  - type: note
    content: 1.4+ ; 6.53,57.
  - type: text
    content: 'En effet, tout comme le Père a la vie en lui-même, ainsi il a donné au Fils d''avoir la vie en lui-même, '
  '27':
  - type: note
    content: 'le pouvoir de 1.12n. –  faire (autre traduction exercer) le jugement / fils d''homme (cf. 1.51+, formule différente en grec ; cf. Ap 1.13 ; 14.14) : Jn 3.17 ; 8.15s ; 9.39 ; 12.47 ; Dn 7.10-14 ; Ac 10.42 ; 17.31 ; 1 Hénoch 69.27 : « La somme du jugement a été donnée à ce Fils d''homme. »'
  - type: text
    content: 'et il lui a donné le pouvoir de faire le jugement, parce qu''il est fils d''homme. '
  '28':
  - type: note
    content: Cf. v. 25+ ; 11.43s ; Es 26.19 ; Ez 37.12.
  - type: text
    content: 'Ne vous en étonnez pas, car l''heure vient où tous ceux qui sont dans les tombeaux entendront sa voix '
  '29':
  - type: note
    content: 'résurrection (le terme correspondant ne revient, dans Jn, qu''en 11.24s ; un verbe apparenté est traduit par [se] relever en 6.39+ ; 11.24s ; 20.9 ; autre terme en 2.19+) de vie / de jugement  : cf. Dn 12.2s ; Mt 16.27 ; 25.46 ; Lc 14.14 ; Ac 24.15 ; 2Co 5.10 ; 1Th 4.16 ; Ap 20.13.'
  - type: text
    content: et sortiront, ceux qui auront fait le bien pour une résurrection de vie, ceux qui auront pratiqué le mal pour une résurrection de jugement.
  '3':
  - type: note
    content: 'estropiés  : litt. secs, cf. Mt 12.10n. – Certains mss ajoutent à la fin du v.  : et de paralytiques, qui attendaient le mouvement de l''eau ; (4) car un ange (ou l''ange du Seigneur) descendait de temps en temps dans le bassin et agitait l''eau, et celui qui y descendait le premier après que l''eau avait été agitée était guéri, quelle qu''ait été sa maladie  ; le verbe traduit par agiter (v. 7) est traduit ailleurs par troubler (11.33 ; 12.27 ; 13.21 ; 14.1,27).'
  - type: text
    content: Sous ces portiques étaient couchés une multitude de malades, d'aveugles, d'infirmes, d'estropiés.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'je ne peux rien faire… v. 19+ ; cf. Nb 16.28. –  je juge  : cf. 8.16 ; voir juste . –  la volonté de celui qui m''a envoyé 4.34+ ; cf. Lc 22.42.'
  - type: text
    content: 'Moi, je ne peux rien faire de moi-même : je juge selon ce que j''entends ; et mon jugement est juste, parce que je ne cherche pas ma volonté, mais la volonté de celui qui m''a envoyé.'
  - type: heading
    content: Les témoignages rendus à Jésus
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'n''est pas vrai  : sans doute au sens de valide, juridiquement recevable ; on pourrait traduire n''est pas vérifiable, n''est pas probant  ; cf. 8.13s.'
  - type: text
    content: 'Si c''est moi qui me rends témoignage à moi-même, mon témoignage n''est pas vrai. '
  '32':
  - type: note
    content: V. 36-39 ; 8.18 ; 15.26 ; 1Jn 5.6-9 ; cf. Dt 19.15.
  - type: text
    content: 'C''est un autre qui me rend témoignage, et je sais que le témoignage qu''il me rend est vrai. '
  '33':
  - type: note
    content: 1.6n-7+,19-27 ; cf. 18.37.
  - type: text
    content: 'C''est vous qui avez envoyé des messagers à Jean, et il a rendu témoignage à la vérité. '
  '34':
  - type: note
    content: pour que, vous, vous soyez sauvés 3.17+.
  - type: text
    content: 'Quant à moi, ce n''est pas d''un homme que je reçois le témoignage ; mais je dis cela pour que, vous, vous soyez sauvés. '
  '35':
  - type: note
    content: 'Celui-là  : dans ce contexte il s''agit de Jean  ; cf. 19.35n. –  la lampe  : cf. 1.8 ; Ps 132.16-17n  ; Siracide 48.1 : « Le prophète Elie se leva comme un feu et sa parole brûlait comme une torche. » –  vous avez bien voulu  : litt. vous avez voulu. –  vous réjouir  : cf. 3.29 ; le même verbe est traduit par être transporté d''allégresse en 8.56 ; cf. Lc 1.47+. –  un moment  : litt. une heure  ; même expression grecque en 2Co 7.8 (momentanément) ; Ga 2.5 (un seul instant) ; Phm 15 (pour un temps).'
  - type: text
    content: Celui-là était la lampe qui brûle et qui brille, et vous avez bien voulu vous réjouir un moment à sa lumière.
  '36':
  - type: text
    content: ' '
  - type: note
    content: témoignage v. 32+. –  les œuvres… m'a données à accomplir (autre traduction m'a donné d'accomplir ) 4.34+ ; 17.4. –  ces œuvres… me rendent témoignage… 10.25,38 ; cf. 3.2+ ; 14.10-12 ; 15.24 ; Mt 9.6/ / ; 11.2-6 ; 12.28.
  - type: text
    content: 'Moi, j''ai un témoignage plus grand que celui de Jean ; en effet, les œuvres que le Père m''a données à accomplir, ces œuvres mêmes, que je fais, me rendent témoignage, attestant que le Père m''a envoyé. '
  '37':
  - type: note
    content: '8.18 ; cf. 6.44s. –  Et le Père…  : autre traduction c''est le Père qui m''a envoyé qui m''a rendu témoignage. –  sa voix  : cf. 12.28 ; Mt 3.17/ /. –  son visage  : litt. son aspect 1.18+ ; cf. Dt 4.12.'
  - type: text
    content: 'Et le Père qui m''a envoyé m''a lui-même rendu témoignage. Vous n''avez jamais entendu sa voix ni vu son visage, '
  '38':
  - type: note
    content: 'sa parole  : cf. 1.1-14. –  ne demeure pas en vous  : cf. 8.31+,37 ; 1Jn 2.14 ; voir aussi Jr 8.8s ; Rm 2.17-20. –  vous ne croyez pas v. 24n  ; 1.7n  ; 6.29.'
  - type: text
    content: 'et sa parole ne demeure pas en vous, puisque vous ne croyez pas celui qu''il a envoyé. '
  '39':
  - type: note
    content: 'Vous sondez…  : certains traduisent  : Sondez les Ecritures, puisque vous pensez…  ; cf. 7.52n  ; 1P 1.10n. –  en elles (ou par elles) la vie éternelle Dt 4.1 ; 8.1,3 ; 30.15-20 ; Ps 119. –  me rendent témoignage  : litt. rendent témoignage à mon sujet, cf. v. 46s ; 1.45 ; 2.22 ; 12.41 ; 19.28 ; Lc 18.31 ; 24.27,44 ; Ac 13.27 ; 1P 1.10s ; Ap 19.10. – Un papyrus égyptien (Egerton 2) du IIe ou Ie s., reconstitué, porterait le texte suivant (2-31) : « Jésus dit aux légistes : “Condamnez celui, quel qu''il soit, qui contrevient à la Loi, mais non pas moi ! car ce qu''il fait, il ne sait pas pourquoi il le fait.” (Cf. Lc 6.5n.) Il se tourna vers les chefs du peuple et dit cette parole : “Vous scrutez les Ecritures dans lesquelles vous imaginez avoir la vie ; ce sont elles qui rendent témoignage à mon sujet. Ne pensez pas que je suis venu vous accuser devant mon Père : celui qui vous accuse, c''est Moïse en qui vous mettez vos espoirs.” Ils dirent : “Nous savons que Dieu a parlé à Moïse ; mais toi, nous ne savons pas d''où tu es.” En réponse, Jésus leur dit : “Maintenant, ce dont on vous accuse, c''est de ne pas croire aux témoignages qu''il a donnés ; car si vous aviez cru en Moïse, vous auriez cru en moi : c''est à mon sujet qu''il a écrit pour vos pères.” (…) Les chefs cherchèrent à mettre la main sur lui pour l''arrêter et le livrer à la foule, mais ils ne purent l''arrêter parce que l''heure où il devait être livré n''était pas encore venue. Quant à lui, le Seigneur, il échappa de leurs mains et se détourna d''eux. »'
  - type: text
    content: 'Vous sondez les Ecritures, parce que, vous, vous pensez avoir en elles la vie éternelle ; or ce sont elles-mêmes qui me rendent témoignage. '
  '40':
  - type: note
    content: vous ne voulez pas Mt 23.37.
  - type: text
    content: Et vous ne voulez pas venir à moi pour avoir la vie !
  '41':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 44+ ; 1Th 2.6.
  - type: text
    content: 'Je ne reçois pas de gloire des humains, '
  '42':
  - type: note
    content: je vous connais 2.25. –  vous n'avez pas en vous… 1Jn 2.15 ; 3.17 ; cf. Lc 11.42 ; 2Th 3.5.
  - type: text
    content: 'mais je vous connais : vous n''avez pas en vous l''amour de Dieu. '
  '43':
  - type: note
    content: 'au nom de mon Père 10.25. –  ne me recevez pas 1.11. –  si un autre…  : celui qui vient en son propre nom est de ce monde, il est compris et reçu par ce monde ; le Christ vient d''ailleurs, du Père. Cf. 7.6s,16ss ; 8.23,41-44,50,54 ; 10.8 ; 15.19 ; 1Jn 4.5s ; voir aussi Mt 24.5/ /.'
  - type: text
    content: 'Moi, je suis venu au nom de mon Père, et vous ne me recevez pas ; si un autre vient en son propre nom, celui-là, vous le recevrez ! '
  '44':
  - type: note
    content: 'Comment pourriez-vous (ou pouvez-vous) croire 8.43+. –  gloire 7.18 ; 8.50,54 ; 12.23,28,39,43 ; 13.31s ; 17.1 ; cf. Rm 2.29 ; 1Co 1.29,31 ; 3.21 ; 4.5,7. –  Dieu seul  : voir aussi 2R 19.15,19 ; Es 37.20 ; 1Tm 1.17.'
  - type: text
    content: Comment pourriez-vous croire, vous qui recevez votre gloire les uns des autres et qui ne cherchez pas la gloire qui provient de Dieu seul ?
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'auprès  : cf. Jn 1.1n  ; 1Jn 2.1. –  Moïse 1.17 ; 6.32 ; 7.19,22s ; 9.28s ; cf. Dt 31.26s.'
  - type: text
    content: 'Ne pensez pas que ce soit moi qui vous accuserai auprès du Père. Celui qui vous accuse, c''est Moïse, en qui vous, vous avez mis votre espérance. '
  '46':
  - type: note
    content: V. 39+ ; cf. Dt 18.15.
  - type: text
    content: 'En effet, si vous croyiez Moïse, vous me croiriez aussi, car lui, c''est à mon sujet qu''il a écrit. '
  '47':
  - type: note
    content: Lc 16.27-31. –  écrits 7.15n.
  - type: text
    content: Mais si vous ne croyez pas ses écrits, comment croirez-vous mes paroles ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mc 2.1-12/ /.
  - type: text
    content: 'Là se trouvait un homme malade depuis trente-huit ans. '
  '6':
  - type: note
    content: 'depuis longtemps  : cf. Lc 8.29+. –  retrouver la santé  : litt. devenir sain.'
  - type: text
    content: 'Jésus le vit couché et, sachant qu''il était déjà là depuis longtemps, il lui dit : Veux-tu retrouver la santé ? '
  '7':
  - type: note
    content: 'Cf. v. 3n. –  mettre  : le verbe grec est souvent traduit par jeter (3.24 ; 8.7,59 etc.).'
  - type: text
    content: 'Le malade lui répondit : Seigneur, je n''ai personne pour me mettre dans le bassin quand l''eau est agitée ; pendant que, moi, je viens, un autre descend avant moi. '
  '8':
  - type: note
    content: 'grabat  : cf. Mc 2.4n.'
  - type: text
    content: 'Jésus lui dit : Lève-toi, prends ton grabat et marche ! '
  '9':
  - type: note
    content: Cf. Ac 3.7s.
  - type: text
    content: Aussitôt l'homme recouvra la santé ; il prit son grabat et se mit à marcher.
  - type: text
    content: 'Or c''était le sabbat ce jour-là. '
