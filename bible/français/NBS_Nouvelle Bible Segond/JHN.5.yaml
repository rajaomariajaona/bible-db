    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; dans un écrit de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ' il est question d''un bassin appelé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beth-Eshdathayîn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (maison des deux sources).
    marker-yv: yv-n
  - type: text
    text: 'Or, à Jérusalem, près de la porte des Moutons, il y a un bassin qui s''appelle en hébreu Bethzatha, et qui a cinq portiques. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: estropiés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: secs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Mt 12.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . – Certains mss ajoutent à la fin du v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et de paralytiques, qui attendaient le mouvement de l''eau ; (4) car un ange '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'ange du Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: descendait de temps en temps dans le bassin et agitait l'eau, et celui qui y descendait le premier après que l'eau avait été agitée était guéri, quelle qu'ait été sa maladie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'agiter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 7) est traduit ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'troubler '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (11.33 ; 12.27 ; 13.21 ; 14.1,27).
    marker-yv: yv-n
  - type: text
    text: Sous ces portiques étaient couchés une multitude de malades, d'aveugles, d'infirmes, d'estropiés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Mc 2.1-12/ /.
    marker-yv: yv-n
  - type: text
    text: 'Là se trouvait un homme malade depuis trente-huit ans. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: depuis longtemps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lc 8.29+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: retrouver la santé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: devenir sain.
    marker-yv: yv-n
  - type: text
    text: 'Jésus le vit couché et, sachant qu''il était déjà là depuis longtemps, il lui dit : Veux-tu retrouver la santé ? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mettre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe grec est souvent traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'jeter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (3.24 ; 8.7,59 etc.).
    marker-yv: yv-n
  - type: text
    text: 'Le malade lui répondit : Seigneur, je n''ai personne pour me mettre dans le bassin quand l''eau est agitée ; pendant que, moi, je viens, un autre descend avant moi. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: grabat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mc 2.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus lui dit : Lève-toi, prends ton grabat et marche ! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ac 3.7s.
    marker-yv: yv-n
  - type: text
    text: Aussitôt l'homme recouvra la santé ; il prit son grabat et se mit à marcher.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Or c''était le sabbat ce jour-là. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'guéri '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sabbat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.14 ; Mt 12.2,10/ / ; Lc 13.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sabbat '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grabat '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'font assonance, en grec comme en français. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas permis de porter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c''est le même verbe grec qui est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'prendre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aux v. 8-12 ; voir 1.29
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : cf. Jr 17.21-27 ; Mt 12.1-8/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Les Juifs disaient donc à celui qui avait été guéri : C''est le sabbat ; il ne t''est pas permis de porter ton grabat ! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui m'a rendu la santé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui m'a fait sain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même v. 15 ; cf. v. 16,19s.'
    marker-yv: yv-n
  - type: text
    text: 'Il leur répondit : C''est celui qui m''a rendu la santé qui m''a dit : « Prends ton grabat et marche ! » '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lc 5.21+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Prends
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prends ton grabat.
    marker-yv: yv-n
  - type: text
    text: 'Ils lui demandèrent : Qui est l''homme qui t''a dit : « Prends et marche ! » '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jésus s'était esquivé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.2s,15 ; Mt 8.18/ / ; 13.36/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Mais celui qui avait été guéri ne savait pas qui c''était, car Jésus s''était esquivé ; en effet, il y avait foule en ce lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pèche
      - type: text
        text: ' plus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de peur…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.2s ; 11.4 ; Mt 9.2/ / ; 12.44-45/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Après cela, Jésus le trouve dans le temple et lui dit : Eh bien, tu as retrouvé la santé ; ne pèche plus, de peur qu''il ne t''arrive quelque chose de pire. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.11.
    marker-yv: yv-n
  - type: text
    text: 'L''homme s''en alla dire aux Juifs que c''était Jésus qui lui avait rendu la santé. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 18 ; Mt 12.14.
    marker-yv: yv-n
  - type: text
    text: 'C''est pourquoi les Juifs persécutaient Jésus : parce qu''il faisait cela pendant le sabbat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.4 ; le judaïsme débat depuis longtemps de savoir si Dieu travaille ou non le jour du sabbat : à des textes comme Gn 2.2 ; Ex 20.11 est opposée l''idée que, si la providence divine n''était à l''œuvre, toute vie cesserait.'
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur répondit : Mon Père est à l''œuvre jusqu''à présent, et moi aussi je suis à l''œuvre. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cherchaient… à le tuer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 16 ; 7.1,19,25,30 ; 8.37,40 ; 11.53 ; Mt 14.5/ / ; 26.4/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: annulait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe grec, qui signifie concrètement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'délier, détacher '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Mt 16.19 ; 18.18 ; Mc 1.7/ / ; 7.35 ; 11.2ss/ / ; Lc 13.15s ; Ac 2.24
      - type: usfm
