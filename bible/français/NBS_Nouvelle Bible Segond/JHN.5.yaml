      - type: text
        text: ' s., reconstitué, porterait le texte suivant (2-31) : « Jésus dit aux légistes : “Condamnez celui, quel qu''il soit, qui contrevient à la Loi, mais non pas moi ! car ce qu''il fait, il ne sait pas pourquoi il le fait.” (Cf. Lc 6.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '.) Il se tourna vers les chefs du peuple et dit cette parole : “Vous scrutez les Ecritures dans lesquelles vous imaginez avoir la vie ; ce sont elles qui rendent témoignage à mon sujet. Ne pensez pas que je suis venu vous accuser devant mon Père : celui qui vous accuse, c''est Moïse en qui vous mettez vos espoirs.” Ils dirent : “Nous savons que Dieu a parlé à Moïse ; mais toi, nous ne savons pas d''où tu es.” En réponse, Jésus leur dit : “Maintenant, ce dont on vous accuse, c''est de ne pas croire aux témoignages qu''il a donnés ; car si vous aviez cru en Moïse, vous auriez cru en moi : c''est à mon sujet qu''il a écrit pour vos pères.” (…) Les chefs cherchèrent à mettre la main sur lui pour l''arrêter et le livrer à la foule, mais ils ne purent l''arrêter parce que l''heure où il devait être livré n''était pas encore venue. Quant à lui, le Seigneur, il échappa de leurs mains et se détourna d''eux. »'
    marker-yv: yv-n
  - type: text
    text: 'Vous sondez les Ecritures, parce que, vous, vous pensez avoir en elles la vie éternelle ; or ce sont elles-mêmes qui me rendent témoignage. '
