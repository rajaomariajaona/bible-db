    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Béthesda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'serait la transcription d''un nom hébreu qui signifie peut-être '
    - type: usfm
