    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', nom d''un quartier de Jérusalem situé au nord du temple, où on a retrouvé un '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bassin '
    - type: usfm
      marker: ft
      children:
      - type: text
