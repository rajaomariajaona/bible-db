    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la probatique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: probata, moutons
    - type: usfm
      marker: ft
      children:
      - type: text
