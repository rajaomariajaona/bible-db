document_id: PRO.21,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'des canaux d''irrigation  : litt. des canaux d''eau(x)  ; le terme désigne normalement un cours d''eau artificiel ; même expression en 5.16 ; Es 32.2 ; Ps 1.3 ; 119.136 ; Lm 3.48 ( des torrents d''eaux ) ; le terme traduit par canaux se retrouve également en Es 30.25 ; Ps 46.5 ; 65.10 ; Jb 29.6 ( torrents ). –  il le dirige  : autre traduction il l''incline . –  où il veut  : c.-à-d., probablement, où le Seigneur le veut  ; mais on pourrait aussi comprendre où le roi le veut.'
  - type: text
    content: 'Le cœur du roi, ce sont des canaux d''irrigation dans la main du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: il le dirige partout où il veut.
  '10':
  - type: text
    content: Le méchant désire le mal ;
  - type: text
    content: son ami n'a pas grâce à ses yeux.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.7n  ; 19.25n. –  on fait payer  : le verbe évoque habituellement une amende (17.26n).'
  - type: text
    content: Quand on fait payer l'insolent, le naïf devient sage ;
  - type: text
    content: quand on apprend au sage, il reçoit la connaissance.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Le juste  : certains pensent qu''ici il s''agit de Dieu, mais ce serait une exception dans Pr. –  observe ou considère, réfléchit à . –  la maison du méchant  : certains, s''appuyant en partie sur LXX, modifient le texte hébreu traditionnel pour lire le juste observe les cœurs . –  il rejette  : le sujet du verbe peut être le juste , mais aussi le méchant , auquel cas il faudrait comprendre  : il rejette d''autres méchants… –  le mal ou le malheur.'
  - type: text
    content: Le juste observe la maison du méchant ;
  - type: text
    content: il rejette les méchants dans le mal.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Les termes correspondant à cris et criera proviennent de deux racines hébraïques différentes, mais en partie équivalentes.
  - type: text
    content: Celui qui ferme son oreille aux cris du pauvre
  - type: text
    content: criera lui-même et n'aura pas de réponse.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'cadeau  : cf. 17.8n  ; 18.16. –  un présent  : autre traduction un pot-de-vin… 17.23n.'
  - type: text
    content: Un cadeau fait en secret apaise la colère ;
  - type: text
    content: un présent dans la poche apaise la fureur violente.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'agir selon l''équité  : cf. v. 3+. –  c''est la ruine…  : autre traduction la ruine est pour les malfaisants  ; cf. 10.29.'
  - type: text
    content: C'est une joie pour le juste d'agir selon l'équité ;
  - type: text
    content: c'est la ruine pour les malfaisants.
  '16':
  - type: text
    content: ' '
  - type: note
    content: ombres 2.18n.
  - type: text
    content: Celui qui s'écarte du chemin du bon sens
  - type: text
    content: reposera dans l'assemblée des ombres.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'les réjouissances  : le terme hébreu correspondant est habituellement traduit par joie . –  connaîtra le manque  : litt. est un homme de manque (ou de privation ) ; cf. 23.20s. –  le vin et l''huile  : c.-à-d. une vie d''abondance et de luxe.'
  - type: text
    content: Celui qui aime les réjouissances connaîtra le manque ;
  - type: text
    content: celui qui aime le vin et l'huile ne deviendra pas riche.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'rançon  : cf. 13.8+ ; voir aussi 11.8+.'
  - type: text
    content: Le méchant sert de rançon pour le juste ;
  - type: text
    content: le traître pour les gens droits.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 9 ; 19.13n. –  contrariante  : autre traduction portée à la contrariété.'
  - type: text
    content: Mieux vaut habiter dans un pays désert
  - type: text
    content: qu'avec une femme querelleuse et contrariante.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'L''homme estime toujours…  : litt. toutes les voies de l''homme sont droites à ses yeux  ; autre traduction toutes les voies de l''homme lui conviennent  ; cf. 12.15n  ; 16.2n. –  pèse les cœurs  : LXX dirige les cœurs  ; cf. Lc 16.15 ; 1Th 3.5.'
  - type: text
    content: L'homme estime toujours que sa voie est la bonne ;
  - type: text
    content: 'celui qui pèse les cœurs, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'précieux  : autre traduction convoité  ; cf. v. 9 ; 3.14s ; 4.2 ; 8.18s ; 25.1,24. –  homme stupide 1.22+.'
  - type: text
    content: Il y a un trésor précieux et de l'huile dans le domaine du sage ;
  - type: text
    content: l'homme stupide les engloutit.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'la justice  : autre traduction la générosité  ; cf. 10.2n  ; Mt 5.6.'
  - type: text
    content: Celui qui poursuit la justice et la fidélité
  - type: text
    content: trouve la vie, la justice et la gloire.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ec 9.14-16. –  pénètre  : litt. monte . –  des héros ou des vaillants hommes ; des guerriers . –  il abat  : litt. il fait descendre la force (autre traduction la forteresse ) de sa confiance.'
  - type: text
    content: Le sage pénètre dans la ville des héros,
  - type: text
    content: il abat la force à laquelle elle se fiait.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui garde sa bouche  : cf. 13.3n  ; 18.21n.'
  - type: text
    content: Celui qui garde sa bouche et sa langue
  - type: text
    content: se garde lui-même de la détresse.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'hautain  : même terme en Ha 2.5. –  Insolent 1.22n  ; 9.7n. –  le débordement  : autre traduction la fureur.'
  - type: text
    content: L'homme arrogant, hautain, a pour nom Insolent ;
  - type: text
    content: il agit dans le débordement de l'arrogance.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'paresseux 6.6n. –  d''agir  : litt. de faire , ce qui peut vouloir dire  : refusent de réaliser les désirs.'
  - type: text
    content: Les désirs du paresseux le font mourir,
  - type: text
    content: parce que ses mains refusent d'agir ;
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'il éprouve sans cesse des désirs  : litt. tout le jour il désire (de) désir  ; LXX l''impie est en proie au désir . –  le juste donne…  : cf. Lc 6.30,34s.'
  - type: text
    content: il éprouve sans cesse des désirs ;
  - type: text
    content: le juste donne sans restriction.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'sacrifice des méchants  : cf. 15.8n  ; Siracide 7.9 : « Ne dis pas : “Il regardera l''abondance de mes offrandes ; quand je les présenterai au Très-Haut, il les acceptera.” »'
  - type: text
    content: Le sacrifice des méchants est une abomination ;
  - type: text
    content: à plus forte raison quand ils l'apportent avec des pensées infâmes !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'témoin menteur  : cf. 19.5,9.'
  - type: text
    content: Le témoin menteur disparaîtra ;
  - type: text
    content: l'homme qui écoute pourra toujours parler.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'sa voie  : autre lecture traditionnelle ses voies.'
  - type: text
    content: L'homme méchant durcit son visage ;
  - type: text
    content: celui qui est droit affermit sa voie.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Agir selon la justice…  : cf. v. 7,15. –  équité 1.3n. –  préférable aux sacrifices  : cf. 1S 15.22 ; Os 6.6 ; Am 5.22-24 ; Ps 50.8,14.'
  - type: text
    content: Agir selon la justice et l'équité,
  - type: text
    content: 'voilà qui est, pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', préférable aux sacrifices.'
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Pas de sagesse…  : cf. Es 8.10. –  conseil  : autres traductions projet ; réflexion  ; cf. 1.25+ ; 19.20n.'
  - type: text
    content: Pas de sagesse, pas d'intelligence,
  - type: text
    content: 'pas de conseil qui tienne devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Le cheval  : cf. Ps 20.8 ; 33.17s ; 147.10s. Voir aussi Os 1.7. –  le salut ou la victoire  ; cf. 11.14 ; 24.6.'
  - type: text
    content: Le cheval est équipé pour le jour de la guerre ;
  - type: text
    content: 'c''est au '
  - type: text
    content: Seigneur
  - type: text
    content: ' qu''appartient le salut.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Des regards…  : litt. élévation des yeux et largeur de cœur . –  cette lampe des méchants  : d''après plusieurs mss hébreux et des versions anciennes ; autre lecture traditionnelle le champ défriché des méchants.'
  - type: text
    content: Des regards hautains et un cœur vaniteux,
  - type: text
    content: cette lampe des méchants n'est que péché.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. ne figure pas dans LXX. –  celui qui agit…  : cf. 10.4 ; 13.4 ; 19.2. Cf. Siracide 11.11 : « Tel peine, se fatigue et se hâte, et n''en est que plus dépourvu. »'
  - type: text
    content: Les plans de l'homme actif vont droit vers l'abondance ;
  - type: text
    content: celui qui agit avec précipitation va droit vers la privation.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'trésors acquis…  : cf. 10.2n,4 ; 13.11. –  éphémère  : le même terme hébreu a aussi été traduit par emporter ou dissiper (Ps 1.4 ; 68.3). –  de gens qui recherchent la mort  : quelques mss, LXX, Vg et certains commentateurs juifs ont lu et un piège mortel.'
  - type: text
    content: 'Des trésors acquis par une langue menteuse :'
  - type: text
    content: futilité éphémère de gens qui recherchent la mort.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'violence  : le terme hébreu correspondant est souvent traduit par ravage 24.2 ; Jr 6.7+ ; Am 3.10+. –  agir selon l''équité  : cf. v. 3+.'
  - type: text
    content: La violence des méchants les emporte,
  - type: text
    content: parce qu'ils refusent d'agir selon l'équité.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'du coupable  : le terme correspondant n''apparaît qu''ici et son sens est incertain. On a aussi traduit du menteur, de l''individu malhonnête  ; ou encore, en modifiant le texte hébreu traditionnel, de l''étranger (Tg, Vg), de l''arrogant.'
  - type: text
    content: La voie du coupable est tortueuse ;
  - type: text
    content: l'action de l'innocent est droite.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Mieux vaut… 25.24 ; cf. 19.13n. –  en terrasse  : sous-entendu dans le texte ; cf. Dt 22.8n.'
  - type: text
    content: Mieux vaut habiter à l'angle d'un toit en terrasse
  - type: text
    content: que de partager la maison d'une femme querelleuse.
