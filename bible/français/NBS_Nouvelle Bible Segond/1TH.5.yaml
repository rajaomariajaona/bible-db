document_id: 1TH.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: En attendant le jour du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'Pour ce qui concerne… pas besoin… 4.9n. –  temps / moments (le mot qui est ici rendu par moments est traduit par temps en 2.17 ; cf. Rm 3.26n) : cf. Ac 1.7 ; 3.19ss ; 1Co 4.5 ; voir aussi Dn 2.21n  ; 7.12n  ; 8.17 ; 11.35 ; 12.1,4,9 ; Mc 13.32s/ / ; Lc 21.8 ; Sagesse 8.8 : « Elle (la Sagesse) prévoit signes et prodiges, les moments et les temps favorables. » –  frères 2.1+.'
  - type: text
    content: 'Pour ce qui concerne les temps et les moments, vous n''avez pas besoin, frères, qu''on vous écrive. '
  '10':
  - type: note
    content: 'mort pour nous Rm 5.6 ; 8.3 ; 14.15 ; 1Co 15.3. –  que nous dormions  : cf. v. 6s ; 4.13nss ; Rm 14.8s. –  avec lui 4.17.'
  - type: text
    content: 'qui est mort pour nous, afin que, soit que nous veillions, soit que nous dormions, nous vivions ensemble avec lui. '
  '11':
  - type: note
    content: 'encouragez-vous ou exhortez-vous, 4.18n  ; Hé 3.13. –  contribuez à la construction  : litt. construisez (ou édifiez) en l''un (ou pour l''un) ; cette dernière expression semble employée ici comme un équivalent du terme traduit par mutuellement (ou les uns les autres) ; autre traduction soyez constructifs  ; cf. Rm 14.19 ; 1Co 3.9n  ; 8.1 ; 14.3s,17 ; 2Co 10.8 ; 12.19 ; 13.10 ; voir aussi Jr 1.10 ; Jd 20.'
  - type: text
    content: Ainsi donc, encouragez-vous mutuellement et contribuez à la construction de l'autre, comme vous le faites déjà.
  - type: heading
    content: Recommandations et bénédiction finale
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Co 16.15ss ; voir aussi Ga 6.6 ; 1Tm 5.17 ; Hé 13.17. –  Nous vous demandons… 4.1+. –  d''avoir de la considération  : litt. de savoir , sans doute au sens de reconnaître  ; cf. 1Co 16.18. –  ceux qui se donnent de la peine ou qui travaillent dur , cf. 1.3+ ; Ac 20.35 ; Rm 16.6,12 ; 1Co 4.12 ; 15.10 ; 16.16 ; Ga 4.11 ; Ph 2.16 ; Col 1.29 ; 2Th 3.8. –  vous dirigent ou s''occupent de vous , cf. Rm 12.8n  ; 1Tm 3.4+. –  avertissent Rm 15.14 ; 1Co 4.14 ; Col 1.28 ; 3.16 ; 2Th 3.15.'
  - type: text
    content: 'Nous vous demandons, frères, d''avoir de la considération pour ceux qui se donnent de la peine parmi vous, qui vous dirigent dans le Seigneur et qui vous avertissent. '
  '13':
  - type: note
    content: 'et aimez-les  : litt. dans l''amour ou par amour. –  Soyez en paix  : cf. Rm 12.18 ; Hé 12.14. –  entre vous  : certains mss présentent une variante qui pourrait signifier avec eux.'
  - type: text
    content: Ayez-les en très haute estime et aimez-les, à cause de leur œuvre. Soyez en paix entre vous.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'encourageons  : cf. v. 11n  ; 4.18. –  avertissez v. 12 ; 2Th 3.15. –  les indisciplinés  : ici le terme évoque peut-être en particulier l''oisiveté, cf. 4.11 ; 2Th 3.6s,11. –  réconfortez 2.12+. –  abattus  : cf. 2.14 ; 4.13ss ; voir aussi Es 57.15. –  les faibles  : cf. Rm 14.1+ss ; voir aussi 4.19 ; 5.6 ; 8.3,26 ; 1Co 2.3 ; 2Co 12.5,9s. –  soyez patients 1Co 13.4 ; Ga 5.22.'
  - type: text
    content: 'Nous vous y encourageons, frères : avertissez les indisciplinés, réconfortez ceux qui sont abattus, soutenez les faibles, soyez patients envers tous. '
  '15':
  - type: note
    content: 'Cf. Rm 12.17ss ; 1P 3.9 ; voir aussi Pr 20.22 ; Col 3.12s. –  ne rende  : litt. ne rende à quelqu''un. –  poursuivez…  : Rm 9.30s ; 12.13 ; 14.19 ; 1Co 14.1 ; Ph 3.12 ; 1Tm 6.11 ; 2Tm 2.22 ; Hé 12.14 ; 1P 3.11. –  envers tous 3.12.'
  - type: text
    content: Prenez garde que personne ne rende le mal pour le mal ; mais poursuivez toujours le bien, les uns envers les autres comme envers tous.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.6+ ; Rm 12.12 ; Ph 1.4 ; 3.1 ; 4.4.
  - type: text
    content: Réjouissez-vous toujours,
  '17':
  - type: text
    content: ' '
  - type: note
    content: V. 25 ; 1.2+s ; Rm 12.12 ; cf. Lc 18.1 ; Ph 4.6 ; Col 4.2s ; 2Th 1.11 ; 3.1.
  - type: text
    content: priez continuellement,
  '18':
  - type: text
    content: ' '
  - type: note
    content: rendez grâce en toute circonstance (ou en tout temps ) 1.2 ; 2.13 ; Ep 5.20 ; cf. Rm 8.28. –  la volonté de Dieu 4.3.
  - type: text
    content: 'rendez grâce en toute circonstance : telle est, à votre égard, la volonté de Dieu en Jésus-Christ.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Rm 12.11 ; cf. Nb 11.26ss ; 1Co 14.30 ; Ep 4.30 ; sur l'Esprit , voir aussi Rm 8.23 ; 1Co 12–14 ; 2Co 1.22 ; Ga 5.22ss.
  - type: text
    content: N'éteignez pas l'Esprit,
  '2':
  - type: note
    content: 'le jour du Seigneur  : cf. v. 5n  ; 1Co 1.8 ; 5.5 ; 2Co 1.14 ; Ph 1.6,10 ; 2.16 ; 2Th 2.2 ; voir aussi Jl 1.15 ; 2.1s ; 3.4 ; Am 5.18ss ; Ab 15 ; So 1.14ss ; Za 14. –  comme un voleur Mt 24.43 ; Lc 12.39s ; 2P 3.10 ; Ap 3.3 ; 16.15.'
  - type: text
    content: 'En effet, vous savez vous-mêmes parfaitement que le jour du Seigneur viendra comme un voleur dans la nuit. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'les messages de prophètes  : litt. la prophétie  ; 1Co 12.10,29 ; 13.2 ; 14.1+ss,31,39 ; cf. 2Th 2.2.'
  - type: text
    content: ne méprisez pas les messages de prophètes,
  '21':
  - type: text
    content: ' '
  - type: note
    content: examinez ou éprouvez, testez  ; cf. 2.4n  ; 1Co 12.3,10 ; 14.29 ; 1Jn 4.1ss.
  - type: text
    content: examinez tout, retenez ce qui est bien ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jb 1.1,8 ; 2.3.
  - type: text
    content: abstenez-vous du mal sous toutes ses formes.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2Th 3.16. –  le Dieu de la paix Rm 15.33 ; 16.20 ; 2Co 13.11 ; Ph 4.7,9. –  vous consacre ou vous sanctifie  ; un terme apparenté est traduit par saint au v. 26 ; cf. 3.13+ss ; 4.3+ ; Ph 1.10. –  l''esprit, l''âme et le corps  : cette distinction ne se retrouve telle quelle dans aucun autre texte du N.T. ; en revanche elle se rencontre fréquemment dans la philosophie populaire du monde grec ; cf. Mt 10.28n. –  irréprochable ou de manière irréprochable , cf. 2.10. –  pour (ou à ) l''avènement… 2.19+.'
  - type: text
    content: 'Que le Dieu de la paix vous consacre lui-même tout entiers ; que tout votre être, l''esprit, l''âme et le corps, soit gardé irréprochable pour l''avènement de notre Seigneur Jésus-Christ ! '
  '24':
  - type: note
    content: digne de confiance ou fidèle, cf. 1Co 1.8s ; 10.13+ ; Ep 3.20 ; 2Th 3.3.
  - type: text
    content: 'Celui qui vous appelle est digne de confiance : c''est lui qui le fera.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 15.30+ss ; 2Co 1.11 ; Col 4.3s ; 2Th 3.1s. –  aussi  : le terme correspondant est absent de plusieurs mss.'
  - type: text
    content: Frères, priez aussi pour nous.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Rm 16.16+.
  - type: text
    content: 'Saluez tous les frères par un saint baiser. '
  '27':
  - type: note
    content: Cf. v. 12s ; Col 4.16 ; voir aussi 2Th 2.2.
  - type: text
    content: Je vous en conjure par le Seigneur, que cette lettre soit lue à tous les frères !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 16.20+ ; 1Co 16.23 ; cf. 2Th 3.18. Plusieurs mss ajoutent Amen à la fin du v. ; quelques-uns portent, avec diverses variantes, l''indication suivante  : Première aux Thessaloniciens, écrite d''Athènes [par l''entremise de Timothée]  ; d''autres portent écrite de Corinthe par Paul, Silas et Timothée.'
  - type: text
    content: Que la grâce de notre Seigneur Jésus-Christ soit avec vous !
  '3':
  - type: note
    content: 'Quand ils diront…  : cf. Lc 21.34s/ / ; voir aussi Jr 6.14s ; Ez 13.10ss. – Voir Paix. –  destruction 1Co 5.5 ; 2Th 1.9 ; 1Tm 6.9. –  comme les douleurs…  : cf. Es 13.6ss ; 26.16ss ; Jr 4.31 ; 6.22ss ; 22.20ss ; 50.41ss ; Mi 4.9s ; Mt 24.8. –  ils n''échapperont en aucun cas  : cf. Lc 21.34ss.'
  - type: text
    content: 'Quand ils diront : « Paix et sécurité ! », alors la destruction arrivera sur eux à l''improviste, comme les douleurs de l''accouchement sur la femme enceinte, et ils n''échapperont en aucun cas. '
  '4':
  - type: note
    content: 'pas dans les ténèbres  : cf. Rm 1.21 ; 2.19 ; 13.12 ; 1Co 4.5 ; 2Co 4.6 ; 6.14 ; 11.14 ; Col 1.12s ; voir aussi Es 2.5 ; 9.2 ; 60.19s ; Ps 27.1 ; 74.20 ; 82.5 ; 112.4 ; Jb 22.9ss ; Pr 4.18s ; Jn 8.12 ; 12.46 ; 1P 2.9. –  tel un voleur v. 2+ ; certains mss portent que ce jour vous surprenne comme (il surprendrait) des voleurs.'
  - type: text
    content: 'Mais vous, frères, vous n''êtes pas dans les ténèbres, pour que ce jour, tel un voleur, vous surprenne ; '
  '5':
  - type: note
    content: 'fils de la lumière  : cf. Lc 16.8 (cf. 20.36) ; Jn 12.36 ; Ep 5.8ss ; dans les écrits de Qumrân, cette appellation désigne très souvent les membres de la communauté (Règle de la Communauté 1.9s ; 3.13,24s etc.). –  du jour  : Paul joue ici sur divers sens du terme jour, cf. v. 2+.'
  - type: text
    content: 'car vous êtes tous fils de la lumière et fils du jour. Nous n''appartenons pas à la nuit ni aux ténèbres. '
  '6':
  - type: note
    content: 'ne dormons pas…  : cf. 4.13n  ; Rm 13.11+. –  veillons Mt 24.42ss ; 25.1-13 ; Mc 13.34ss ; Lc 12.35ss ; 21.36. –  soyons sobres v. 8 ; 2Tm 4.5 ; 1P 1.13+ ; 5.8.'
  - type: text
    content: Ainsi donc, ne dormons pas comme les autres, mais veillons et soyons sobres.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 5s.
  - type: text
    content: 'Car ceux qui dorment dorment la nuit, et ceux qui s''enivrent sont ivres la nuit. '
  '8':
  - type: note
    content: 'revêtons…  : autre traduction nous avons revêtu…, cf. Rm 13.12. –  pour cuirasse…  : litt. une cuirasse de foi et d''amour et un casque d''espérance de salut  ; cf. Es 59.17 ; Ep 6.11+ss. –  foi / amour / espérance  : cf. 1.3+. –  du salut v. 9s ; cf. Rm 13.11 ; Ep 2.'
  - type: text
    content: 'Mais nous qui sommes du jour, soyons sobres : revêtons pour cuirasse la foi et l''amour, et pour casque l''espérance du salut. '
  '9':
  - type: note
    content: 'pas destinés à la colère… 1.10+ ; cf. Rm 1.18+ ; 3.5+ ; 2Th 2.13s. –  l''acquisition ou l''entrée en possession, voire la possession, même terme Ep 1.14n  ; 2Th 2.14n  ; Hé 10.39n  ; 1P 2.9n. –  par notre Seigneur…  : cf. Rm 5.1,11 ; 1Co 15.57.'
  - type: text
    content: 'Car Dieu ne nous a pas destinés à la colère, mais à l''acquisition du salut – par notre Seigneur Jésus-Christ, '
