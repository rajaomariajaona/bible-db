document_id: ZEC.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Huitième vision : les quatre chars'
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.8n-15 ; Ap 6.2-5. –  quatre  : cf. 2.1,3. –  sortaient 2.7+. – Les montagnes de bronze seraient, selon certains, une représentation babylonienne de l''entrée du royaume des dieux, sans doute inspirée par le spectacle des montagnes rougeoyantes de l''Orient au lever du soleil.'
  - type: text
    content: 'Je levai de nouveau les yeux et je vis quatre chars qui sortaient d''entre les deux montagnes ; ces montagnes étaient des montagnes de bronze. '
  '10':
  - type: note
    content: 'Tu prendras  : litt. prendre  ; la traduction anticipe sur l''impératif du v. 11. –  sur ce qui appartient aux exilés  : autre traduction des dons de la part des exilés  ; cf. Esd 1.4-11 ; 2.68s. –  Sophonie  : peut-être celui de 2R 25.18 ; Jr 29.25,29 ; 37.3.'
  - type: text
    content: 'Tu prendras sur ce qui appartient aux exilés, sur ce qui appartient à Heldaï, à Tobiya et à Yedaya – tu iras toi-même en ce jour, tu iras dans la maison de Josias, fils de Sophonie, où ils se sont rendus en arrivant de Babylone. '
  '11':
  - type: note
    content: 'couronnes  : cf. v. 14 ; 3.5 ; Ap 4.4. –  Josué 3.1+.'
  - type: text
    content: 'Tu prendras de l''argent et de l''or. Tu en feras des couronnes et tu les mettras sur la tête de Josué, fils de Yehotsadaq, le grand prêtre. '
  '12':
  - type: note
    content: 'le nom est Germe 3.8+. –  là où il est  : litt. de dessous lui  ; on pourrait aussi comprendre sous lui tout germera.'
  - type: text
    content: 'Tu lui diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Voici un homme dont le nom est Germe ;
  - type: text
    content: il germera là où il est
  - type: text
    content: 'et il bâtira le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'C''est lui qui bâtira le temple…  : cf. 2S 7.13 ; 1R 8.20. –  les insignes de la majesté  : litt. la majesté ou la dignité  ; le terme ( honneur en 10.3) est habituellement traduit par éclat  ; cf. Ha 3.3 ; Ps 8.2 ; 148.13 ; Jb 37.22 ; voir aussi Jr 22.18 ; Ps 21.6 ; 45.4 ; 1Ch 29.25. –  gouvernera ou dominera (cf. 9.10). –  Il y aura…  : autre traduction il sera prêtre sur son trône  ; LXX le prêtre sera à sa droite  ; cf. Ps 110.4+. –  il y aura une entente parfaite (litt. un conseil ou un projet de paix sera ) entre l''un et l''autre  : cf. 4.14n.'
  - type: text
    content: 'C''est lui qui bâtira le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: il portera les insignes de la majesté ;
  - type: text
    content: il s'assiéra et gouvernera sur son trône.
  - type: text
    content: Il y aura aussi un prêtre sur son trône,
  - type: text
    content: et il y aura une entente parfaite entre l'un et l'autre.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Les couronnes  : LXX la couronne . –  Hélem  : probablement le même que Heldaï au v. 10. –  de Hen…  : autre traduction de la bonté du fils de Sophonie.'
  - type: text
    content: 'Les couronnes seront une évocation de Hélem, de Tobiya, de Yedaya et de Hen, fils de Sophonie, dans le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '15':
  - type: note
    content: 'Ceux qui sont au loin  : ceux qui ne sont pas revenus de l''exil ; cf. Es 60. –  bâtiront Ag 1.8,14. –  vous saurez… 2.13+.'
  - type: text
    content: 'Ceux qui sont au loin viendront et bâtiront le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et ainsi vous saurez que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées qui m''a envoyé vers vous. Cela arrivera si vous écoutez vraiment le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu.'
  '2':
  - type: text
    content: 'Au premier char il y avait des chevaux roux, au deuxième char des chevaux noirs, '
  '3':
  - type: note
    content: vigoureux ou bruns, traduction incertaine (cf. v. 7).
  - type: text
    content: 'au troisième char des chevaux blancs et au quatrième char des chevaux tachetés, vigoureux. '
  '4':
  - type: text
    content: 'Je demandai au messager qui parlait avec moi : Ceux-là, que sont-ils, mon seigneur ? '
  '5':
  - type: note
    content: 'Le messager (ou l''ange) 1.9+. –  quatre vents ou quatre souffles ; quatre esprits  ; cf. 2.10+ ; Ap 7.1. –  du lieu où ils se tenaient  : autre traduction après s''être tenus…  ; cf. 4.14+.'
  - type: text
    content: 'Le messager me répondit : Ce sont les quatre vents du ciel qui sortent du lieu où ils se tenaient devant le Seigneur de toute la terre. '
  '6':
  - type: note
    content: 'pays du nord 2.10n. –  derrière eux  : soit à la suite des chevaux noirs, vers le pays du nord (2.10n), soit plutôt vers l''ouest (derrière pour celui qui s''oriente).'
  - type: text
    content: 'Les chevaux noirs attelés à l''un des chars sortent vers le pays du nord, et les blancs sortent derrière eux ; les tachetés sortent vers le pays du sud. '
  '7':
  - type: note
    content: 'Vigoureux  : cf. v. 3n. –  Il leur dit  : litt. il (l''ange, ou Dieu ?) dit. –  parcourez la terre 1.10s. –  les chars…  : litt. ils parcoururent (ou ils parcouraient) la terre.'
  - type: text
    content: 'Vigoureux, ils sortent et demandent à aller parcourir la terre. Il leur dit : Allez, parcourez la terre ! Et les chars parcoururent la terre. '
  '8':
  - type: note
    content: 'font reposer mon souffle (ou mon Esprit) : cf. v. 5n  ; on a aussi compris apaisent ma fureur.'
  - type: text
    content: 'Il m''appela et me dit : Regarde, ceux qui sortent vers le pays du nord font reposer mon souffle dans le pays du nord.'
  - type: heading
    content: Couronnement prophétique de Josué
  '9':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint : '
