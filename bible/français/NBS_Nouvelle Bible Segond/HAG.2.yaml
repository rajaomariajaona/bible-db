document_id: HAG.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La splendeur du nouveau temple
  - type: text
    content: ' '
  - type: note
    content: 'Le vingt et unième jour du septième mois…  : octobre 520 (cf. 1.1n) ; correspond au dernier jour de la fête des Huttes Lv 23.34-36 ; Nb 29.12 ; 1R 8.2,65s ; Jn 7.37. Voir calendrier et fêtes.'
  - type: text
    content: 'Le vingt et unième jour du septième mois, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint par l''intermédiaire d''Aggée, le prophète :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Le vingt-quatrième jour du neuvième mois  : décembre 520 (1.1n).'
  - type: text
    content: 'Le vingt-quatrième jour du neuvième mois, la deuxième année de Darius, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Aggée, le prophète :'
  '11':
  - type: text
    content: ' '
  - type: note
    content: une loi ou un enseignement, une instruction , en hébreu tora  ; cf. Lv 10.11 ; 14.54-57 ; 27.8,11s,14 ; Jr 2.8 ; 18.18 ; Ez 7.26 ; Za 7.1-3 ; Ml 2.6s.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : Demande aux prêtres une loi à ce sujet, je te prie : '
  '12':
  - type: note
    content: 'viande sacrée (voir saint), c.-à-d. consacrée pour avoir été offerte en sacrifice ; cf. Lv 7.15-21 ; 19.5-8. –  un plat  : le même terme est traduit par soupe en Gn 25.29,34 ; 2R 4.38ss.'
  - type: text
    content: 'Si quelqu''un porte dans le pan de son vêtement de la viande sacrée et qu''il touche avec le pan de son vêtement du pain, un plat, du vin, de l''huile, ou un aliment quelconque, celui-ci sera-t-il consacré ? Les prêtres répondirent : Non ! '
  '13':
  - type: note
    content: 'au contact d''un cadavre ou par un mort, comme en Lv 19.28n  ; 21.1-4,11 ; 22.4-7 ; Nb 19.22 ; Ez 44.25-27. –  une de ces choses  : litt. parmi toutes ces choses  ; cf. v. 14.'
  - type: text
    content: 'Et Aggée dit : Si quelqu''un est devenu impur au contact d''un cadavre, et qu''il touche une de ces choses, celle-ci sera-t-elle impure ? Les prêtres répondirent : Elle sera impure. '
  '14':
  - type: note
    content: 'le travail (ou l''œuvre) de leurs mains  : le fruit du travail agricole dont une partie était offerte en sacrifice ; cf. 1.11 (autre expression) ; 2.15 ; Dt 28.12. –  ce qu''ils présentent devant moi Lv 1.2n  ; cf. Esd 3.3 ; voir aussi Jr 41.5. –  impur  : cf. Lv 11.3,11 etc. ; voir aussi Es 1.13 ; 64.5 ; Am 5.21-24 ; voir pur, impur.'
  - type: text
    content: 'Alors Aggée dit :'
  - type: text
    content: Tel est ce peuple,
  - type: text
    content: telle est cette nation devant moi,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: tel est tout le travail de leurs mains ;
  - type: text
    content: ce qu'ils présentent devant moi est impur.
  - type: heading
    content: A partir de ce jour
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.15n. –  faites attention (1.5n) …  : on pourrait aussi comprendre réfléchissez à partir de ce jour…  ; même expression au v. 18, cf. v. 19. –  pierre sur pierre  : cf. Za 4.7,9 ; Esd 3.10.'
  - type: text
    content: Maintenant faites attention, je vous prie,
  - type: text
    content: à ce qui va se produire à partir de ce jour et par la suite.
  - type: text
    content: 'Avant qu''on ait mis pierre sur pierre dans le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.6+. –  alors  : l''expression hébraïque qui introduit ce v. est obscure ; on pourrait comprendre avant qu''elles soient mises ou avant que cela n''arrive  ; LXX qu''en était-il de vous ? ou dans quel état étiez-vous ? ce qui pourrait bien correspondre au texte original. –  un tas de grain…  : litt. un tas de vingt . –  au pressoir  : le mot désigne plus précisément la cuve qui recueille le jus du raisin foulé. –  cinquante mesures…  : litt. cinquante d''un foulage ou, peut-être, d''une cuve (même terme en Es 63.3).'
  - type: text
    content: alors, quand on venait à un tas de grain de vingt mesures,
  - type: text
    content: il n'y en avait que dix ;
  - type: text
    content: quand on venait au pressoir pour tirer cinquante mesures d'un foulage,
  - type: text
    content: il n'y en avait que vingt.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.10+,11 ; voir Am 4.9.
  - type: text
    content: Je vous ai frappés par la rouille, par la nielle et par la grêle,
  - type: text
    content: ainsi que tout le travail de vos mains,
  - type: text
    content: sans vous ramener à moi,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '18':
  - type: text
    content: ' '
  - type: note
    content: V. 15n. –  le vingt-quatrième jour v. 10 ; cf. 1.15n. – Voir temple.
  - type: text
    content: Faites attention, je vous prie, à ce qui va se produire à partir de ce jour et par la suite,
  - type: text
    content: depuis le vingt-quatrième jour du neuvième mois,
  - type: text
    content: 'depuis le jour où le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' a été fondé,'
  - type: text
    content: faites-y attention !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'de la semence  : autre traduction du grain . –  Même  : litt. jusqu''à (cf. Gn 6.7) ; LXX la vigne, le figuier… n''ont encore rien rapporté  ; cf. Ha 3.17. –  je vais bénir  : cf. Gn 1.22+ ; 12.2+ ; 39.5 ; 49.25 ; Dt 12.7 ; 15.14 ; 28.3-8 ; Es 65.8 ; Ml 3.10 ; Ps 84.7 ; Jb 1.10 ; 42.12.'
  - type: text
    content: Y a-t-il encore de la semence dans la grange ?
  - type: text
    content: Même la vigne, le figuier, le grenadier et l'olivier
  - type: text
    content: n'ont rien rapporté.
  - type: text
    content: A partir de ce jour je vais bénir.
  - type: heading
    content: Promesses à Zorobabel
  '2':
  - type: text
    content: ' '
  - type: note
    content: 1.1n,12+.
  - type: text
    content: 'Dis, je te prie, à Zorobabel, fils de Shaltiel, gouverneur de Juda, à Josué, fils de Yehotsadaq, le grand prêtre, et au reste du peuple :'
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'la deuxième fois  : cf. v. 10+ ; 2S 7.3s ; Jr 28.6,12.'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint pour la deuxième fois à Aggée, le vingt-quatrième jour du mois :'
  '21':
  - type: text
    content: ' '
  - type: note
    content: à Zorobabel 1.1+ ; cf. Za 6.9-15. –  Je ferai trembler… v. 6+.
  - type: text
    content: 'Dis à Zorobabel, gouverneur de Juda :'
  - type: text
    content: Je ferai trembler le ciel et la terre ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'je renverserai  : sur le verbe correspondant, voir Gn 19.25n. –  chars / chevaux  : cf. Ex 15.21. –  seront jetés bas  : litt. descendront . –  tombera (sous-entendu dans le texte) sous l''épée de son frère  : cf. Jg 7.22 ; Ez 38.21 ; Za 14.13.'
  - type: text
    content: je renverserai le trône des royaumes,
  - type: text
    content: je détruirai la force des royaumes des nations,
  - type: text
    content: je renverserai le char et ceux qui le montent ;
  - type: text
    content: les chevaux et ceux qui les montent seront jetés bas,
  - type: text
    content: chacun tombera sous l'épée de son frère.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là Es 12.1+ ; Za 12.3+. –  je te prendrai  : cf. Ex 6.7 ; Dt 4.20,34 ; Jos 24.3 ; 2S 7.8 ; 2R 14.21 ; 23.30 ; Am 7.15. –  mon serviteur  : cf. 2S 7.5 ; 1R 11.32 ; Ps 132.10 ; Es 42.1+. –  un sceau  : litt. le sceau  ; cf. Gn 38.18 ; 1R 21.8 ; Ct 8.6n  ; Est 3.10 ; voir aussi Jr 22.24 où la même image est utilisée négativement à propos de Joïakîn, le grand-père de Zorobabel (Ag 1.1n  ; 2R 17.25) ; cf. Siracide 49.11s : « Comment magnifier Zorobabel, lui qui fut comme un sceau à la main droite, et de même Josué fils de Josédek, eux qui, de leur temps, construisirent la Maison et élevèrent un sanctuaire consacré au Seigneur, destiné à une gloire éternelle ? » –  c''est toi que j''ai choisi ou élu Dt 4.37 ; Es 41.8 ; 42.1 (cf. 43.10 ; 45.1ss) ; Ps 78.68,70 ; 1Ch 28.4 ; Mt 12.18 ; Lc 9.35.'
  - type: text
    content: En ce jour-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: je te prendrai, Zorobabel, fils de Shéaltiel, mon serviteur,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: et je te placerai comme un sceau,
  - type: text
    content: car c'est toi que j'ai choisi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'le survivant  : litt. celui qui est resté . –  cette maison dans sa gloire passée  : c.-à-d. le temple de Salomon, détruit en 587/6 av. J.-C. ; cf. Za 4.10 ; Esd 3.12.'
  - type: text
    content: Quel est parmi vous le survivant
  - type: text
    content: qui a vu cette maison dans sa gloire passée ?
  - type: text
    content: Et comment la voyez-vous maintenant ?
  - type: text
    content: Elle n'est rien à vos yeux, n'est-ce pas ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: je suis avec vous 1.13+. –  du Seigneur … des Armées 1S 1.3n.
  - type: text
    content: Maintenant sois fort, Zorobabel !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Sois fort, Josué, fils de Yehotsadaq, grand prêtre !
  - type: text
    content: Sois fort, peuple du pays tout entier !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Et agissez !
  - type: text
    content: Car je suis avec vous
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'avec la parole que je vous ai donnée (litt. que j''ai tranchée avec vous , expression qui s''applique habituellement à la conclusion d''une alliance) : LXX omet ce membre de phrase. –  mon souffle ou mon Esprit Es 44.3 ; Ez 11.19+ ; 37 ; 39.29 ; Za 4.6. –  se tient…  : le verbe hébreu ainsi traduit est celui dont dérive le mot pour colonne (de nuée) en Ex 13.21s ; 14.19 ; voir aussi 29.46 ; Za 2.9. –  n''ayez pas peur  : 1Ch 28.20+ ; voir crainte.'
  - type: text
    content: avec la parole que je vous ai donnée
  - type: text
    content: quand vous êtes sortis d'Egypte,
  - type: text
    content: 'et mon souffle qui se tient au milieu de vous :'
  - type: text
    content: n'ayez pas peur !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Encore un peu, très peu  : on pourrait aussi comprendre encore une fois, dans peu de temps  ; ainsi LXX qui lit seulement encore une fois  ; cf. Ps 37.10 ; Jn 7.33+ ; Hé 12.26s . –  je ferai trembler…  : cf. v. 7,21 ; Ex 19.18 ; Jg 5.4 ; Es 6.4 ; 13.13 ; 24.18 ; Jr 4.24 ; Jl 2.10 ; 4.10 ; Ha 3.6 ; Ps 18.8 ; Mt 24.29/ / ; 27.51 ; Ap 6.12 ; 11.19 ; Siracide 16.18 : « Or le ciel et les cieux des cieux, l''abîme et la terre sont ébranlés lors de sa visite. » –  la terre ferme  : comme en Ex 14.21 dans l''expression à sec  ; autre mot qu''en Gn 1.9s.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Encore un peu, très peu,
  - type: text
    content: et je ferai trembler le ciel et la terre,
  - type: text
    content: la mer et la terre ferme ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'les biens les plus précieux  : la vocalisation traditionnelle de l''hébreu fait du terme un singulier, ce qui lui a valu d''être pris par Vg dans un sens personnel et messianique  : le Désiré ou le Bien-Aimé , celui qui est l''objet du désir ; cependant le verbe est au pluriel, d''où la traduction choisie (conforme également à LXX) ; cf. Es 60.5-11 ; 66.12 ; Ap 21.24,26.'
  - type: text
    content: je ferai trembler toutes les nations ;
  - type: text
    content: les biens les plus précieux de toutes les nations viendront,
  - type: text
    content: et je remplirai cette maison de gloire,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 50.10ss.
  - type: text
    content: L'argent m'appartient,
  - type: text
    content: l'or m'appartient
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction la gloire de cette dernière maison sera plus grande que celle de la première  ; cf. v. 3. –  mettrai  : autre traduction donnerai . –  la paix ou la prospérité  ; cf. Jr 14.13 ; Za 8.12 ; 1Ch 22.9 ; voir aussi Es 11.6-9 ; Jr 33.6-9 ; Jn 14.27.'
  - type: text
    content: La gloire à venir pour cette maison
  - type: text
    content: sera plus grande que sa gloire passée,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: et dans ce lieu je mettrai la paix
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Le peuple en état d'impureté
