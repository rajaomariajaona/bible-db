document_id: PSA.44,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Tu nous as rejetés
  - type: text
    content: ' '
  - type: note
    content: 42.1n.
  - type: text
    content: Du chef de chœur. Des fils de Coré. Poème.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'tu nous as rejetés 60.3,12 ; 74.1 ; 77.8 ; 88.15 ; 89.39 ; Lm 3.31. –  confusion 4.3+. –  tu ne pars plus en campagne  : litt. tu ne sors pas  ; cf. 60.12 ; Nb 27.17n  ; voir aussi Nb 10.35 ; 20.18 ; 1S 4.3-11.'
  - type: text
    content: Cependant tu nous as rejetés,
  - type: text
    content: tu nous as couverts de confusion,
  - type: text
    content: tu ne pars plus en campagne avec nos armées ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 28.25 ; Jg 2.14. –  tout ce qu''ils veulent  : litt. pour eux.'
  - type: text
    content: tu nous fais reculer devant l'adversaire,
  - type: text
    content: et ceux qui nous détestent pillent tout ce qu'ils veulent.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Tu nous livres comme  : autre traduction tu fais de nous . –  comme des moutons… v. 23 ; Es 53.7 ; Jr 12.3 ; Za 11.4ss. –  tu nous dissémines… 106.27 ; Lv 26.33 ; Dt 4.27 ; 28.64 ; Ez 5.10,12 ; 12.14s ; 20.23 ; 22.15 ; 29.12.'
  - type: text
    content: Tu nous livres comme des moutons qu'on dévore,
  - type: text
    content: tu nous dissémines parmi les nations.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Tu vends Dt 32.30 ; Jg 2.14+. –  tu le brades ou, plus littéralement, tu n'en augmentes pas le prix  ; autre traduction tu ne tires même pas profit de leur prix  ; cf. Es 52.3.
  - type: text
    content: Tu vends ton peuple pour rien,
  - type: text
    content: tu le brades !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'V. 17 ; 79.4 ; 80.6 ; cf. 31.12n  ; Dt 28.37 ; 1R 9.7 ; Jr 20.7s. –  Tu nous livres…  : autre traduction tu fais de nous le déshonneur de nos voisins, tu nous livres… –  aux moqueries… 22.8 ; Jb 12.4.'
  - type: text
    content: Tu nous livres aux outrages de nos voisins,
  - type: text
    content: aux moqueries, aux railleries de ceux qui nous entourent ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: la fable des nations 69.12 ; Jb 17.6 ; 30.9. –  on hoche la tête Jr 18.16n.
  - type: text
    content: Tu fais de nous la fable des nations,
  - type: text
    content: on hoche la tête sur nous parmi les peuples.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'sans cesse  : litt. tout le jour . –  devant moi 38.18 ; 51.5. –  la honte me couvre le visage 69.8 ; cf. Jr 3.25.'
  - type: text
    content: Ma confusion est sans cesse devant moi,
  - type: text
    content: la honte me couvre le visage,
  '17':
  - type: text
    content: ' '
  - type: note
    content: Litt. à la voix de celui qui outrage (ou déshonore ) et de celui qui injurie, à la face (ou en face ) de l'ennemi et de celui qui se venge  ; cf. v. 14 ; 8.3.
  - type: text
    content: à force d'entendre outrages et injures,
  - type: text
    content: de voir l'ennemi vindicatif.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.4-6. –  pas oublié v. 21 ; 78.7 ; 103.2 ; Dt 4.9+. –  pas trahi…  : litt. nous n''avons pas menti contre ton alliance  ; cf. 89.34.'
  - type: text
    content: Tout cela nous arrive, et nous ne t'avons pas oublié,
  - type: text
    content: nous n'avons pas trahi ton alliance ;
  '19':
  - type: text
    content: notre cœur n'a pas reculé,
  - type: text
    content: nos pas ne se sont pas écartés de ton sentier,
  '2':
  - type: text
    content: ' '
  - type: note
    content: '78.3 ; Ex 10.2 ; 12.26s ; Dt 6.20-25 ; 32.7. –  entendu  : litt. entendu de nos oreilles. –  l''œuvre… 77.12s ; cf. 64.10 ; 90.16 ; 92.5 ; 95.9 ; 111.3 ; 143.5. –  aux jours de jadis 77.6.'
  - type: text
    content: O Dieu, nous avons entendu,
  - type: text
    content: nos pères nous ont raconté
  - type: text
    content: l'œuvre que tu as accomplie en leurs jours,
  - type: text
    content: aux jours de jadis.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 38.9. –  dans la demeure des chacals , c.-à-d. au désert ou dans les ruines ; cf. Es 13.22 ; 34.13 ; voir aussi Jr 4.29. –  d''une ombre de mort  : cf. 24.3n.'
  - type: text
    content: pour que tu nous écrases dans la demeure des chacals,
  - type: text
    content: et que tu nous couvres d'une ombre de mort.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'un dieu  : hébreu ’el , cf. Gn 21.33n.'
  - type: text
    content: Si nous avions oublié le nom de notre Dieu,
  - type: text
    content: si nous avions tendu les mains vers un dieu étranger,
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.10+. –  découvert 139.1n.
  - type: text
    content: Dieu ne l'aurait-il pas découvert,
  - type: text
    content: lui qui connaît les secrets du cœur ?
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 8.36. –  à cause de toi  : on pourrait aussi comprendre contre toi , c.-à-d. contre ton intérêt ou en t''offensant. –  qu''on nous tue  : cf. 2Co 4.11. –  sans cesse  : litt. tout le jour . –  comme des moutons… v. 12+.'
  - type: text
    content: Mais c'est à cause de toi qu'on nous tue sans cesse,
  - type: text
    content: qu'on nous considère comme des moutons d'abattoir.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Lève-toi / Eveille-toi  : cf. v. 27 ; 3.8+ ; 35.23+ ; Es 51.9. –  Ne nous rejette pas… v. 10+ ; cf. 74.1+.'
  - type: text
    content: Lève-toi ! Pourquoi dors-tu, Seigneur ?
  - type: text
    content: Eveille-toi ! Ne nous rejette pas à jamais !
  '25':
  - type: text
    content: ' '
  - type: note
    content: '88.15. –  te détournes-tu  : litt. caches-tu ta face  ; cf. 13.2+.'
  - type: text
    content: Pourquoi te détournes-tu ?
  - type: text
    content: Pourquoi oublies-tu notre affliction et notre oppression ?
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'nous  : autres traductions notre gorge ; notre vie ; notre être ; notre âme (est abattu[e])  ; cf. 6.4n  ; Gn 1.20n  ; voir aussi 119.25 ; 143.3.'
  - type: text
    content: Car nous sommes abattus dans la poussière,
  - type: text
    content: notre ventre s'attache à la terre.
  '27':
  - type: text
    content: ' '
  - type: note
    content: V. 24+.
  - type: text
    content: Lève-toi, pour nous secourir !
  - type: text
    content: Libère-nous à cause de ta fidélité !
  '3':
  - type: text
    content: ' '
  - type: note
    content: '78.55. –  pour les planter  : litt. et tu les as plantés (nos pères, v. 2) ; cf. 80.9 ; Ex 15.17 ; 2S 7.10 ; Jr 11.17 ; 12.2. –  pour leur permettre de s''étendre  : litt. et tu les as étendus.'
  - type: text
    content: De ta main tu as dépossédé des nations pour les planter,
  - type: text
    content: tu as frappé des peuples pour leur permettre de s'étendre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 8.17s ; Jos 24.12. –  ta main droite 17.7+. –  la lumière de ta face 4.7+. –  tu leur étais favorable  : cf. 41.12 ; Os 1.7.'
  - type: text
    content: Car ce n'est pas avec leur épée qu'ils ont pris possession du pays,
  - type: text
    content: ce n'est pas leur bras qui les a sauvés ;
  - type: text
    content: mais c'est ta main droite, c'est ton bras, c'est la lumière de ta face,
  - type: text
    content: parce que tu leur étais favorable.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'mon roi 5.3+. –  le salut  : litt. les saluts , probablement au sens de victoires  ; cf. 74.12n. –  Jacob ou Israël  ; 14.7+.'
  - type: text
    content: 'C''est toi qui es mon roi, ô Dieu :'
  - type: text
    content: ordonne le salut de Jacob !
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 60.14 ; 108.14 ; Dt 33.17 ; 1R 22.11.
  - type: text
    content: Avec toi, nous renversons nos adversaires ;
  - type: text
    content: par ton nom, nous écrasons ceux qui se dressent contre nous.
  '7':
  - type: text
    content: Car ce n'est pas en mon arc que je mets ma confiance ;
  - type: text
    content: ce n'est pas mon épée qui me sauvera ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 37.39s. –  couvres de honte… 132.18.
  - type: text
    content: c'est toi qui nous sauves de nos adversaires,
  - type: text
    content: et qui couvres de honte ceux qui nous détestent.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Nous sommes… fiers  : litt. nous nous louons (forme verbale inhabituelle, de même en 10.3) ; cf. 34.3n. –  sans cesse  : litt. tout le jour.'
  - type: text
    content: Nous sommes sans cesse fiers de Dieu,
  - type: text
    content: 'nous célébrerons toujours ton nom. '
  - type: text
    content: Pause.
