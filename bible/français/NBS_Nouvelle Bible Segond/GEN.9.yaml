      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit évidemment ici de l''arc-en-ciel, qui annonce la fin de la pluie, mais le mot hébreu est aussi celui qui désigne l''arme dans d''autres contextes (21.16 ; 27.3 ; 48.22 etc.). Cf. Ez 1.28 ; Ap 4.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la nuée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
