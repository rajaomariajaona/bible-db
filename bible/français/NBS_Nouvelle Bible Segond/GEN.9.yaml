document_id: GEN.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu fait alliance avec Noé
  - type: text
    content: ' '
  - type: note
    content: Dieu bénit 1.22+. –  multipliez-vous 8.17.
  - type: text
    content: 'Dieu bénit Noé et ses fils ; il leur dit : Soyez féconds, multipliez-vous et remplissez la terre. '
  '10':
  - type: note
    content: 'les êtres vivants 1.20n. –  les animaux sauvages  : autre traduction les animaux de la terre (1.24n) ; les mots correspondants sont absents de LXX. Sur l''idée d’alliance avec les animaux, cf. Ez 34.25 ; Os 2.20.'
  - type: text
    content: 'avec tous les êtres vivants qui sont avec vous, tant les oiseaux que le bétail et tous les animaux sauvages, avec tous ceux qui sont sortis de l''arche, avec tous les animaux sauvages. '
  '11':
  - type: note
    content: 'Es 54.9s ; cf. 2P 3.6s. –  tous les êtres  : litt. toute chair  ; on pourrait aussi comprendre aucun être ne sera plus retranché  ; cf. 6.12n. –  anéantir la terre 6.13n.'
  - type: text
    content: 'J''établis mon alliance avec vous : tous les êtres ne seront plus retranchés par les eaux du déluge, et il n''y aura plus de déluge pour anéantir la terre. '
  '12':
  - type: note
    content: 'signe  : cf. 4.15n  ; 17.11ss. –  place  : autre traduction donne  ; cf. v. 13. –  êtres vivants v. 10+. –  pour toutes les générations, pour toujours  : litt. pour les générations de toujours  ; le terme correspondant à toujours est traduit par perpétuelle au v. 16 ; cf. 17.7n.'
  - type: text
    content: 'Dieu dit : Voici le signe de l''alliance que je place entre moi et vous, ainsi que tous les êtres vivants qui sont avec vous, pour toutes les générations, pour toujours : '
  '13':
  - type: note
    content: 'arc  : il s''agit évidemment ici de l''arc-en-ciel, qui annonce la fin de la pluie, mais le mot hébreu est aussi celui qui désigne l''arme dans d''autres contextes (21.16 ; 27.3 ; 48.22 etc.). Cf. Ez 1.28 ; Ap 4.3. –  la nuée ou les nuages (v. 14) : cf. Ex 13.21+.'
  - type: text
    content: 'je place mon arc dans la nuée, et il sera un signe d''alliance entre moi et la terre. '
  '14':
  - type: text
    content: 'Quand j''aurai rassemblé des nuages au-dessus de la terre, l''arc apparaîtra dans la nuée, '
  '15':
  - type: note
    content: 'je me souviendrai de ou je penserai à  ; cf. 8.1+. –  tous les êtres vivants  : litt., ici et au v. 16, tout être vivant (1.20n) de toute chair. –  tous les êtres  : litt. toute chair.'
  - type: text
    content: 'et je me souviendrai de mon alliance entre moi et vous, ainsi que tous les êtres vivants, et les eaux ne se transformeront plus en déluge pour anéantir tous les êtres. '
  '16':
  - type: note
    content: perpétuelle v. 12n.
  - type: text
    content: 'L''arc sera dans la nuée, et je le regarderai pour me souvenir de l''alliance perpétuelle entre Dieu et tous les êtres vivants qui sont sur la terre. '
  '17':
  - type: note
    content: 'tous ceux  : litt. toute chair.'
  - type: text
    content: 'Dieu dit à Noé : Tel est le signe de l''alliance que j''établis entre moi et tous ceux qui sont sur la terre.'
  - type: heading
    content: Les trois fils de Noé
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Sem, Cham et Japhet 5.32 ; 6.10 ; 7.13 ; voir chap. 10. –  Cham fut le père de Canaan  : cette précision vise sans doute à établir un lien entre l''histoire du manteau de Noé, où Cham va tristement s''illustrer (v. 20ss), et la malédiction de Canaan qui la suit (v. 25ss) ; cf. 10.6,15. Canaan est normalement, dans la Bible, une appellation géographique correspondant grosso modo à la Cisjordanie. Etymologiquement, le mot pourrait signifier le bas-pays , par opposition au plateau syrien (parfois le terme semble s''appliquer de façon plus restrictive aux plaines, cf. Nb 13.29 ; 14.25) ; autres possibilités pays de la pourpre ; pays des marchands (cf. Es 23.8n  ; Ez 16.29n  ; 17.4n  ; Os 12.8n  ; So 1.11n  ; Za 14.21n  ; Jb 40.30n  ; Pr 31.24n). Le nom Cananéen(s) désigne le plus souvent, dans l''histoire biblique, les populations qui habitaient cette région avant Israël.'
  - type: text
    content: 'Les fils de Noé qui sortirent de l''arche étaient Sem, Cham et Japhet. Cham fut le père de Canaan. '
  '19':
  - type: note
    content: 'Cf. 10.18 ; 11.1n,8s. –  qu''on se dispersa…  : litt. que toute la terre se dispersa  ; autre traduction que toute la terre fut peuplée.'
  - type: text
    content: Ces trois-là sont les fils de Noé. C'est à partir d'eux qu'on se dispersa sur toute la terre.
  '2':
  - type: note
    content: 'Voir crainte. –  ils vous ont été livrés  : litt. ils ont été donnés (ou placés) dans votre main  ; plusieurs expressions analogues sont traduites par livrer dans l''ensemble de l''A.T.'
  - type: text
    content: 'Vous inspirerez de la crainte et de la terreur à tout animal de la terre, à tout oiseau du ciel, à tout ce qui fourmille sur la terre et à tous les poissons de la mer : ils vous ont été livrés. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.29. –  devint  : on pourrait aussi comprendre fut le premier à être , cf. 4.26n. –  cultivateur  : litt. homme de la terre (ou du sol ), cf. 2.5n  ; 3.17,23 ; 4.2-4 ; 8.21 ; 12.3n. –  vigne  : cf. 1R 5.5 (autre mot hébreu).'
  - type: text
    content: 'Noé devint cultivateur et il planta une vigne. '
  '21':
  - type: note
    content: 'vin 14.18 ; 19.32-35 ; 27.25 ; 49.11s. –  s''exposa nu  : litt. se découvrit ou s''exposa  ; cf. Ex 20.26 ; 2S 6.20 ; 10.4s ; Ha 2.15 ; Lm 4.21 ; voir aussi Lv 18.6nss ; Ez 16.36 ; 22.10. –  tente  : cf. 4.20.'
  - type: text
    content: 'Il but du vin, s''enivra et s''exposa nu à l''intérieur de sa tente. '
  '22':
  - type: note
    content: 'nudité  : cf. 3.7n  ; Lv 18.1ss ; 20.17ss ; voir aussi Ex 20.12 ; Dt 27.16 ; Pr 30.17.'
  - type: text
    content: 'Cham, père de Canaan, vit la nudité de son père et le raconta au dehors à ses deux frères. '
  '23':
  - type: note
    content: 'le manteau ou un manteau  : le mot correspondant, aussi traduit au pluriel par vêtements (35.2 etc. ; cf. 1S 24.5s), désigne généralement une pièce de tissu qui servait aussi de couverture (Ex 22.25s). – Les expressions à reculons et ils détournaient traduisent le même terme hébreu.'
  - type: text
    content: 'Alors Sem et Japhet prirent le manteau, le mirent tous deux sur leurs épaules, marchèrent à reculons et recouvrirent la nudité de leur père ; comme ils détournaient le visage, ils ne virent pas la nudité de leur père. '
  '24':
  - type: text
    content: 'Lorsque Noé se réveilla de son vin, il apprit ce que lui avait fait son fils cadet. '
  '25':
  - type: note
    content: 'Maudit 3.14n. –  esclave  : le même mot sera souvent traduit par serviteur (12.16 etc.) ; autre traduction qu''il soit pour ses frères comme le dernier des esclaves  ; cf. 27.29,40. – Ce texte a souvent été pris dans un sens historique, comme une annonce de l''assujettissement des Cananéens, descendants de Canaan (10.15-19), par les Israélites, descendants de Sem (10.21-31) ; ce n''était pas nécessairement son intention première. Cf. Sagesse 12.11 (à propos des Cananéens) : « Mais en exerçant progressivement ta justice, tu offrais une occasion de repentir, sans ignorer pourtant que leur nature était viciée, leur perversité innée, et que leur mentalité ne changerait jamais ; car c''était une race maudite dès l''origine. »'
  - type: text
    content: 'Il dit alors :'
  - type: text
    content: Maudit soit Canaan !
  - type: text
    content: Qu'il soit l'esclave des esclaves de ses frères !
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Béni…  : cf. 14.20 ; 24.27. –  Sem 5.32n. –  son esclave v. 27n.'
  - type: text
    content: 'Il dit encore :'
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu de Sem,'
  - type: text
    content: et que Canaan soit son esclave !
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'mette Japhet au large  : jeu d''assonances sur le nom de Japhet, voir 5.32n. Selon certains, on pourrait aussi comprendre dupe (ou séduise ) Japhet . –  tentes de Sem v. 21. –  son esclave  : autre traduction possible leur esclave . – On ignore à quelle situation historique cette parole a pu se rapporter à l''origine. Pour les rabbins de l''époque romaine, elle est apparue entre autres comme une justification de la traduction de la Bible en grec, langue associée aux descendants de Japhet (10.1nss).'
  - type: text
    content: Que Dieu mette Japhet au large !
  - type: text
    content: Qu'il demeure dans les tentes de Sem,
  - type: text
    content: et que Canaan soit son esclave !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 5.3n.
  - type: text
    content: 'Après le déluge, Noé vécut trois cent cinquante ans. '
  '29':
  - type: text
    content: La totalité des jours de Noé fut de neuf cent cinquante ans ; puis il mourut.
  '3':
  - type: note
    content: 'les végétaux  : litt. l''herbe verte, cf. 1.29ns.'
  - type: text
    content: 'Tout ce qui fourmille et qui vit vous servira de nourriture : comme les végétaux, je vous donne tout cela. '
  '4':
  - type: note
    content: 'avec sa vie  : cf. 1.20n  ; Lv 3.17 ; 7.26s ; 17.10ss ; 19.26 ; Dt 12.23 ; Ac 15.20,29 ; 21.25 ; voir aussi Nb 23.24 ; Dt 32.42 ; Jr 46.10.'
  - type: text
    content: 'Seulement, vous ne mangerez pas de chair avec sa vie, c''est-à-dire avec son sang. '
  '5':
  - type: note
    content: 'Cf. 4.10s ; Ex 21.12,14,20,28ss (pour l’animal) ; Nb 35.16-21,31-33. –  je réclamerai à  : litt. je rechercherai de la main de  ; cf. 42.22 ; 43.9 ; Ez 33.6 ; Ps 9.13n  ; 2Ch 24.22.'
  - type: text
    content: De plus, je réclamerai votre sang, pour votre vie ; je le réclamerai à tout animal ; et je réclamerai à chaque être humain la vie de l'homme qui est son frère.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'le sang de l''être humain  : en hébreu les deux mots font assonance ( dam , 4.10n / ’adam , 1.26n) : cf. 42.22 ; Ex 21.23ss ; Lv 24.19s ; Dt 19.21 ; Mt 26.52 ; Ap 13.10. –  à l''image…  : litt. à l''image de Dieu il a fait l''homme (ou les humains ), cf. 1.26n.'
  - type: text
    content: Celui qui répand le sang de l'être humain,
  - type: text
    content: par l'être humain son sang sera répandu.
  - type: text
    content: Car à l'image de Dieu
  - type: text
    content: l'homme a été fait.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'peuplez…  : litt. grouillez (1.20ns) sur la terre  ; cf. 8.17n.'
  - type: text
    content: Et vous, soyez féconds et multipliez-vous,
  - type: text
    content: peuplez la terre et multipliez-vous sur elle.
  '8':
  - type: text
    content: 'Dieu dit encore à Noé et à ses fils avec lui : '
  '9':
  - type: note
    content: alliance 6.18+ ; ici il s'agit moins d'une entente entre deux parties que d'un engagement unilatéral de la part de Dieu (cf. Es 54.9s où il en est question comme d'un serment). –  descendance 3.15n  ; 4.25.
  - type: text
    content: 'Quant à moi, j''établis mon alliance avec vous et avec votre descendance après vous, '
