document_id: 2SA.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Baana et Rékab assassinent Ish-Bosheth
  - type: text
    content: ' '
  - type: note
    content: 'le fils de Saül  : Ish-Bosheth, cf. 2.8-10 ; dans le présent récit, son nom n''apparaît qu''au v. 5. –  il perdit courage  : litt. ses mains s''affaiblirent  ; cf. Es 13.7 ; Jr 6.24 ; 2Ch 15.7. –  saisi d''épouvante  : cf. 1S 28.21 ; Es 13.8.'
  - type: text
    content: 'Lorsque le fils de Saül apprit qu''Abner était mort à Hébron, il perdit courage, et tout Israël fut saisi d''épouvante. '
  '10':
  - type: note
    content: 'Voir 1.2-16 ; cf. 18.22n. –  pour le récompenser…  : litt. pour m''avoir donné une bonne nouvelle.'
  - type: text
    content: 'celui qui est venu me dire : « Saül est mort », et qui croyait m''annoncer une bonne nouvelle, je l''ai fait saisir et tuer à Tsiqlag, pour le récompenser de cette bonne nouvelle ! '
  '11':
  - type: note
    content: 'Voir justice. –  je ne vous réclamerais pas son sang  : cf. Gn 9.5s ; Dt 19.13.'
  - type: text
    content: 'Et maintenant que des méchants ont tué un juste chez lui, sur son lit, je ne vous réclamerais pas son sang et je ne vous éliminerais pas du pays ! '
  '12':
  - type: note
    content: 'ordonna à ses gens de les tuer  : cf. 1.15 ; 1R 2.5-9 ; 2R 14.5. –  les pendirent  : cf. Dt 21.22s ; 1S 31.10. –  d''Hébron  : cf. 3.32.'
  - type: text
    content: David ordonna à ses gens de les tuer ; ils leur coupèrent les mains et les pieds, et ils les pendirent au bord du réservoir d'Hébron. Ils prirent ensuite la tête d'Ish-Bosheth et l'ensevelirent dans le tombeau d'Abner à Hébron.
  '2':
  - type: note
    content: 'Béérotite  : de Bééroth, localité située à une quinzaine de kilomètres au nord de Jérusalem ; aujourd''hui El-Biré.'
  - type: text
    content: 'Le fils de Saül avait deux chefs des troupes armées ; le nom de l''un était Baana et le nom de l''autre était Rékab ; ils étaient fils de Rimmôn le Béérotite, d''entre les fils de Benjamin. – Car Bééroth était considérée comme faisant partie de Benjamin, '
  '3':
  - type: note
    content: 'Guittaïm  : localité non identifiée avec certitude ; on ne sait pas pour quelles raisons les Béérotites s''y étaient réfugiés. Après l''exil à Babylone, des Benjaminites s''y établissent (Né 11.33). –  ils séjournent en immigrés  : cf. Ex 12.48n.'
  - type: text
    content: et les Béérotites s'étaient enfuis à Guittaïm où ils séjournent en immigrés jusqu'à ce jour.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'des jambes  : autre traduction des pieds . –  la nouvelle de la mort  : cf. 1.1-10 ; 1S 31.6. –  boiteux  : autre traduction infirme . L''information apportée dans ce v. semble n''avoir aucun rapport avec le reste du chap., si ce n''est de signaler que le seul autre survivant de la famille de Saül était trop handicapé pour pouvoir prétendre au trône de son grand-père. –  Mephi-Bosheth (cf. 9.3) est appelé Merib-Baal en 1Ch 8.34 ; 9.40 ; le nom primitif pourrait avoir été Mi-pi-Ba‘al ( De la bouche de Baal ) ; voir le cas analogue de variantes à propos d''Ish-Bosheth en 2S 2.8n.'
  - type: text
    content: Jonathan, fils de Saül, avait un fils infirme des jambes. Celui-ci avait cinq ans lorsque arriva de Jizréel la nouvelle de la mort de Saül et de Jonathan ; sa nourrice l'avait pris pour s'enfuir. Dans la précipitation, il tomba et resta boiteux ; son nom était Mephi-Bosheth.
  '5':
  - type: text
    content: 'Or les fils de Rimmôn le Béérotite, Rékab et Baana, se rendirent pendant la chaleur du jour à la maison d''Ish-Bosheth qui était couché pour la sieste de midi. '
  '6':
  - type: note
    content: 'comme pour prendre du froment  : pour en prendre livraison. –  au ventre  : cf. 2.23+. –  LXX présente pour ce v. un texte assez différent  : La gardienne de la porte, qui triait du froment, s''était assoupie et dormait. Rékab et Baana, les frères, se faufilèrent [et entrèrent…].'
  - type: text
    content: 'Ils pénétrèrent jusque dans la maison, comme pour prendre du froment, et ils le tuèrent d''un coup au ventre ; puis Rékab et Baana, son frère, s''échappèrent. '
  '7':
  - type: note
    content: 'l''avaient mis à mort  : cf. 1S 17.50-54. –  Ils le décapitèrent  : litt. ils coupèrent sa tête. –  la plaine aride  : cf. 2.29n  ; Dt 1.1n  ; 2.8.'
  - type: text
    content: 'Ils avaient donc pénétré dans la maison alors qu''il était allongé sur son lit, dans sa chambre à coucher, et ils l''avaient mis à mort. Ils le décapitèrent, prirent sa tête et marchèrent toute la nuit par le chemin de la plaine aride. '
  '8':
  - type: note
    content: 'qui en voulait à ta vie 1S 18.10s ; 19.2-11 ; 20.1 ; 24.12 ; cf. 2S 16.11 ; 1R 19.10,14 ; Mt 2.20. –  ô roi  : litt. ô roi, mon seigneur.'
  - type: text
    content: 'Ils apportèrent la tête d''Ish-Bosheth à David à Hébron, et dirent au roi : Voici la tête d''Ish-Bosheth, fils de Saül, ton ennemi, qui en voulait à ta vie ; en ce jour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te venge, ô roi, de Saül et de sa descendance. '
  '9':
  - type: note
    content: 'Par la vie du Seigneur  : cf. 1S 14.39n. –  qui m''a libéré de toute détresse  : même expression en 1R 1.29 ; cf. 1S 26.24+ (délivré).'
  - type: text
    content: 'David répondit à Rékab et à Baana, son frère, les fils de Rimmôn le Béérotite : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui m''a libéré de toute détresse, '
