      - type: text
        text: '4.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' de Saül'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : Ish-Bosheth, cf. 2.8-10 ; dans le présent récit, son nom n''apparaît qu''au v. 5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il perdit courage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses mains s'affaiblirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. Es 13.7 ; Jr 6.24 ; 2Ch 15.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: saisi d'épouvante
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 28.21 ; Es 13.8.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le fils de Saül apprit qu''Abner était mort à Hébron, il perdit courage, et tout Israël fut saisi d''épouvante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Béérotite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : de Bééroth, localité située à une quinzaine de kilomètres au nord de Jérusalem ; aujourd''hui El-Biré.'
    marker-yv: yv-n
  - type: text
    text: 'Le fils de Saül avait deux chefs des troupes armées ; le nom de l''un était Baana et le nom de l''autre était Rékab ; ils étaient fils de Rimmôn le Béérotite, d''entre les fils de Benjamin. – Car Bééroth était considérée comme faisant partie de Benjamin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guittaïm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : localité non identifiée avec certitude ; on ne sait pas pour quelles raisons les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Béérotites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 's''y étaient réfugiés. Après l''exil à Babylone, des Benjaminites s''y établissent (Né 11.33). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils séjournent en immigrés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 12.48'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: et les Béérotites s'étaient enfuis à Guittaïm où ils séjournent en immigrés jusqu'à ce jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des jambes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des pieds
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la nouvelle de la mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1.1-10 ; 1S 31.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: boiteux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: infirme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. L''information apportée dans ce v. semble n''avoir aucun rapport avec le reste du chap., si ce n''est de signaler que le seul autre survivant de la famille de Saül était trop handicapé pour pouvoir prétendre au trône de son grand-père. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mephi-Bosheth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 9.3) est appelé '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Merib-Baal
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 1Ch 8.34 ; 9.40 ; le nom primitif pourrait avoir été '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mi-pi-Ba‘al '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: De la bouche de Baal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; voir le cas analogue de variantes à propos d'Ish-Bosheth en 2S 2.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Jonathan, fils de Saül, avait un fils infirme des jambes. Celui-ci avait cinq ans lorsque arriva de Jizréel la nouvelle de la mort de Saül et de Jonathan ; sa nourrice l'avait pris pour s'enfuir. Dans la précipitation, il tomba et resta boiteux ; son nom était Mephi-Bosheth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or les fils de Rimmôn le Béérotite, Rékab et Baana, se rendirent pendant la chaleur du jour à la maison d''Ish-Bosheth qui était couché pour la sieste de midi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme pour prendre du froment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : pour en prendre livraison. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au ventre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.23+. –  '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' présente pour ce v. un texte assez différent'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: La gardienne de la porte, qui triait du froment, s'était assoupie et dormait. Rékab et Baana, les frères, se faufilèrent [et entrèrent…].
    marker-yv: yv-n
  - type: text
    text: 'Ils pénétrèrent jusque dans la maison, comme pour prendre du froment, et ils le tuèrent d''un coup au ventre ; puis Rékab et Baana, son frère, s''échappèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'avaient mis à mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 17.50-54. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils le décapitèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils coupèrent sa tête
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la plaine aride
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2.8.'
    marker-yv: yv-n
  - type: text
    text: 'Ils avaient donc pénétré dans la maison alors qu''il était allongé sur son lit, dans sa chambre à coucher, et ils l''avaient mis à mort. Ils le décapitèrent, prirent sa tête et marchèrent toute la nuit par le chemin de la plaine aride. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui en voulait à ta vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1S 18.10s ; 19.2-11 ; 20.1 ; 24.12 ; cf. 2S 16.11 ; 1R 19.10,14 ; Mt 2.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ô roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ô roi, mon seigneur.
    marker-yv: yv-n
  - type: text
    text: 'Ils apportèrent la tête d''Ish-Bosheth à David à Hébron, et dirent au roi : Voici la tête d''Ish-Bosheth, fils de Saül, ton ennemi, qui en voulait à ta vie ; en ce jour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' te venge, ô roi, de Saül et de sa descendance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Par la vie du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 14.39'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui m'a libéré de toute détresse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même expression en 1R 1.29 ; cf. 1S 26.24+ ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: délivré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'David répondit à Rékab et à Baana, son frère, les fils de Rimmôn le Béérotite : Par la vie du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui m''a libéré de toute détresse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1.2-16 ; cf. 18.22
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour le récompenser…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour m'avoir donné une bonne nouvelle.
    marker-yv: yv-n
  - type: text
    text: 'celui qui est venu me dire : « Saül est mort », et qui croyait m''annoncer une bonne nouvelle, je l''ai fait saisir et tuer à Tsiqlag, pour le récompenser de cette bonne nouvelle ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je ne vous réclamerais pas son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 9.5s ; Dt 19.13.'
    marker-yv: yv-n
  - type: text
    text: 'Et maintenant que des méchants ont tué un juste chez lui, sur son lit, je ne vous réclamerais pas son sang et je ne vous éliminerais pas du pays ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ordonna à ses gens de les tuer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.15 ; 1R 2.5-9 ; 2R 14.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les pendirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 21.22s ; 1S 31.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'Hébron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.32.'
    marker-yv: yv-n
  - type: text
    text: David ordonna à ses gens de les tuer ; ils leur coupèrent les mains et les pieds, et ils les pendirent au bord du réservoir d'Hébron. Ils prirent ensuite la tête d'Ish-Bosheth et l'ensevelirent dans le tombeau d'Abner à Hébron.
