document_id: PSA.105,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Histoire de la fidélité de Dieu
  - type: heading
    content: 1Ch 16.8-22
  - type: text
    content: ' '
  - type: note
    content: 'invoquez son nom  : cf. 80.19 ; 116.4 ; Gn 4.26 ; Ex 34.5 ; Jl 3.5. –  Faites connaître… 9.12 ; 96.3 ; 145.12 ; cf. Es 12.4 ; 1Ch 16.24.'
  - type: text
    content: 'Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', invoquez son nom !'
  - type: text
    content: Faites connaître parmi les peuples ses hauts faits !
  '10':
  - type: text
    content: ' '
  - type: note
    content: Jacob / Israël 14.7+ ; cf. Gn 28.13ss ; 35.12 ; voir aussi 50.24 ; Ex 2.24 ; 6.3ss ; Nb 32.11 ; Dt 1.8. –  alliance perpétuelle 111.9 ; Gn 17.7 ; Jg 2.1 ; Es 24.5n.
  - type: text
    content: il a établi cela comme une prescription pour Jacob,
  - type: text
    content: comme alliance perpétuelle pour Israël,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 28.13 ; 47.5 ; Ex 32.13. –  Canaan Gn 9.18n. –  comme le patrimoine…  : litt. le cordeau (pour mesurer un terrain ; cf. 16.6n) de votre patrimoine  ; 78.55.'
  - type: text
    content: 'en disant : Je te donnerai Canaan'
  - type: text
    content: comme le patrimoine qui vous est échu.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'un petit nombre Gn 34.30n  ; Dt 7.7 ; 26.5. –  ils séjournaient…  : cf. Gn 12.1ss ; 13.1ss ; 20.1ss ; 23.4 ; 27.41ss ; 47.9 ; Ex 12.48n.'
  - type: text
    content: Ils étaient alors un petit nombre d'hommes,
  - type: text
    content: une poignée, et ils séjournaient là en immigrés ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: Hé 11.9,13.
  - type: text
    content: ils s'en allaient d'une nation à l'autre
  - type: text
    content: et d'un royaume vers un autre peuple ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: Gn 31.7. –  des rois Gn 20.3ss ; 26.7ss.
  - type: text
    content: mais il ne laissa aucun humain les opprimer,
  - type: text
    content: 'il fit des reproches à des rois à leur sujet :'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'à ceux qui ont reçu mon onction  : litt. à mes oints (d''huile)  ; cf. 2.2n  ; le terme s''applique habituellement au roi ou au prêtre (Ex 29.7 ; 1S 10.1 ; cf. Gn 23.6), parfois aux prophètes (1R 19.16 ; Es 61.1 ; cf. Gn 20.7) ; voir aussi 1S 24.7 ; 2S 1.14s ; 1Ch 16.22.'
  - type: text
    content: Ne touchez pas à ceux qui ont reçu mon onction,
  - type: text
    content: et ne faites pas de mal à mes prophètes !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'famine  : cf. Gn 41.54ss ; 42.1ss ; 43.1ss ; 2R 8.1. –  il leur retira…  : cf. Lv 26.26n  ; Ez 4.16.'
  - type: text
    content: Il appela la famine sur le pays,
  - type: text
    content: il leur retira le pain.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Gn 37.27s ; 45.5 ; Ac 7.9.
  - type: text
    content: 'Il envoya en avant d''eux un homme :'
  - type: text
    content: Joseph fut vendu comme esclave.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 39.20. –  On serra  : autres traductions on affligea ou on humilia. –  on le mit aux fers  : traduction incertaine ; litt. le fer vint (à) son être (ou son âme , ou plus concrètement sa gorge  ; cf. 6.4n) ; voir aussi 44.26 ; 69.2 ; 119.25 ; 124.4 ; Jr 4.10.'
  - type: text
    content: On serra ses pieds dans les entraves,
  - type: text
    content: on le mit aux fers
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine. –  sa parole  : celle du Seigneur ou celle de Joseph ; cf. Gn 40.12s,20ss ; 41.13,54. –  se réalisa  : litt. vint, arriva . –  lui fit surmonter l''épreuve ou l''éprouva  ; on pourrait comprendre prouva son innocence  ; certains modifient légèrement le texte hébreu traditionnel pour lire fut éprouvé , c.-à-d. reconnu véridique (cf. 18.31 ; 119.140 ; Pr 30.5) ; Sagesse 10.13s : « Elle (la Sagesse) n''abandonna pas non plus le juste qui fut vendu, mais elle l''arracha au péché ; elle descendit avec lui dans la fosse et ne l''abandonna pas dans ses liens avant de lui avoir procuré le sceptre de la royauté et l''autorité sur ceux qui étaient ses maîtres ; par là elle convainquit de mensonge ses calomniateurs et elle lui conféra une gloire éternelle. »'
  - type: text
    content: jusqu'au temps où sa parole se réalisa,
  - type: text
    content: 'et où le décret du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui fit surmonter l''épreuve.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Chantez… 9.3 ; 68.5. –  jouez des psaumes 7.18n  ; 104.33n. –  tous ses actes étonnants  : cf. 9.2+.'
  - type: text
    content: Chantez pour lui, jouez des psaumes pour lui !
  - type: text
    content: Réfléchissez à tous ses actes étonnants !
  '20':
  - type: text
    content: ' '
  - type: note
    content: Gn 41.14ss. On pourrait aussi comprendre il (Dieu) envoya un roi pour le relâcher, un maître de peuples pour le faire délier.
  - type: text
    content: Le roi donna l'ordre de le relâcher,
  - type: text
    content: le maître des peuples le fit délier.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Gn 41.40ss ; Ac 7.10. –  tout ce qu'il possédait ou tout ce qu'il avait acquis, tous ses biens  ; cf. 104.24n  ; sur ce terme voir aussi Gn 4.1n  ; 31.18 ; 34.23 ; 36.6 ; Ez 38.12s ; Pr 4.7.
  - type: text
    content: Il le fit seigneur sur sa maison
  - type: text
    content: et maître de tout ce qu'il possédait,
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'contraindre à son gré…  : litt. attacher ses princes à son être (6.4n) ; certains modifient le texte hébreu traditionnel et lisent pour instruire à son gré ses princes  ; cf. Gn 41.31ss,39ss.'
  - type: text
    content: pour contraindre à son gré ses princes,
  - type: text
    content: et rendre sages ses anciens.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 46.5ss. –  séjourna en immigré  : cf. v. 12+. –  Cham 78.51+.'
  - type: text
    content: Alors Israël vint en Egypte,
  - type: text
    content: et Jacob séjourna en immigré au pays de Cham.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Gn 17.20 ; Ex 1.7ss ; Dt 26.5 ; Ac 7.17 ; 13.17.
  - type: text
    content: Il rendit son peuple très fécond
  - type: text
    content: et plus fort que ses adversaires.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ex 1.9s ; 7.3 ; Ac 7.19.
  - type: text
    content: Il changea leur cœur, de sorte qu'ils se mirent à détester son peuple
  - type: text
    content: et traitèrent ses serviteurs avec perfidie.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 3.10 ; 4.14ss. –  son serviteur  : cf. v. 6 ; Hé 3.5. –  choisi Nb 16.5ss.'
  - type: text
    content: Il envoya Moïse, son serviteur,
  - type: text
    content: et Aaron, qu'il avait choisi.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'ses signes  : litt. les paroles de ses signes  ; cf. 78.43-48 ; Ex 7–11 ; Jr 32.20 ; Ac 7.36.'
  - type: text
    content: Ils firent paraître ses signes au milieu d'eux,
  - type: text
    content: des prodiges au pays de Cham.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 10.21ss ; cf. Ap 16.10s. –  ils (Moïse et Aaron, v. 26) ne furent pas rebelles  : LXX ils (les Egyptiens) furent rebelles.'
  - type: text
    content: Il envoya des ténèbres et amena l'obscurité,
  - type: text
    content: et ils ne furent pas rebelles à sa parole.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Ex 7.18ss.
  - type: text
    content: Il changea leurs eaux en sang
  - type: text
    content: et fit mourir leurs poissons.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Mettez votre fierté  : litt. louez-vous  ; cf. 34.3n. –  son nom sacré ou son saint nom , 33.11 ; 103.1. –  se réjouisse 40.17 ; 70.5 ; 106.5. – Voir cœur.'
  - type: text
    content: Mettez votre fierté dans son nom sacré !
  - type: text
    content: 'Que se réjouisse le cœur de ceux qui cherchent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '30':
  - type: text
    content: ' '
  - type: note
    content: Ex 7.28nss.
  - type: text
    content: Leur pays grouilla de grenouilles,
  - type: text
    content: jusque dans les chambres de leurs rois.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 78.45 ; Ex 8.12nss,17nss.
  - type: text
    content: Il parla, et des mouches venimeuses arrivèrent,
  - type: text
    content: des moustiques sur tout leur territoire.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 9.22ss ; cf. Ap 8.7. –  un feu flamboyant  : litt. un feu de flammes ou des flammes de feu  ; cf. 104.4.'
  - type: text
    content: Il leur donna pour pluie de la grêle,
  - type: text
    content: un feu flamboyant dans leur pays.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Ex 9.25 ; Jr 5.17.
  - type: text
    content: Il frappa leurs vignes et leurs figuiers
  - type: text
    content: et brisa les arbres de leur territoire.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'sauterelles  : hébreu yéleq , identification incertaine ; autre terme en 78.46n  ; cf. Ex 10.12ss ; voir Jl 1.4n où le mot est traduit par grillon. –  sans nombre 104.25.'
  - type: text
    content: Il dit, et survinrent les criquets,
  - type: text
    content: des sauterelles sans nombre,
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'de leur terre  : litt. de leur sol , cf. Gn 2.5n.'
  - type: text
    content: qui dévorèrent toute l'herbe de leur pays,
  - type: text
    content: qui dévorèrent le fruit de leur terre.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 78.51+ ; Ex 11.4ss ; 12.29.
  - type: text
    content: Il frappa tout premier-né dans leur pays,
  - type: text
    content: les prémices de toute leur vigueur.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Il fit sortir son peuple  : d''après un ms de Qumrân (cf. v. 43) ; autre texte il les fit sortir  ; cf. Gn 15.14 ; Ex 3.21s ; 11.2s ; 12.35ss. –  personne ne trébucha Es 5.27 ; 63.13.'
  - type: text
    content: Il fit sortir son peuple avec de l'argent et de l'or,
  - type: text
    content: et personne ne trébucha parmi ses tribus.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 12.33 ; cf. Ap 11.8,10s. –  la frayeur…  : litt. leur frayeur était tombée sur eux  ; Ex 15.16 ; Dt 2.25n  ; 1S 11.7 ; Jb 13.11 ; Est 8.17 ; 9.2s.'
  - type: text
    content: L'Egypte se réjouit de les voir sortir,
  - type: text
    content: car la frayeur qu'ils inspiraient s'était abattue sur elle.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'la nuée 78.14 ; Ex 13.21n  ; Dt 1.33. –  pour les couvrir Ex 14.19s ; cf. Es 22.8 ; 1Co 10.1 ; Sagesse 10.17 : « Elle (la Sagesse) les conduisit par une route étonnante et elle devint pour eux un abri durant le jour, un flamboiement d''étoiles durant la nuit. »'
  - type: text
    content: Il étendit la nuée pour les couvrir,
  - type: text
    content: et le feu pour éclairer la nuit.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '9.11+ ; 24.6 ; 27.8 ; Os 5.15. –  recherchez-le  : litt. recherchez sa face  ; cf. Ps 27.8+.'
  - type: text
    content: 'Cherchez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et sa force,'
  - type: text
    content: recherchez-le constamment !
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'A leur demande  : d''après des versions anciennes ; texte hébreu traditionnel il demanda (le peuple ? Moïse ? Dieu ?) ; cf. Nb 11.13 ; le verbe hébreu fait assonance avec le mot traduit par cailles  ; 78.18,26s ; Ex 16.12s. –  pain du ciel 78.24s ; Ex 16.8 ; Jn 6.31.'
  - type: text
    content: A leur demande, il fit venir des cailles
  - type: text
    content: et il les rassasia du pain du ciel.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 78.15s,20 ; 107.35 ; Ex 17.1-7 ; Nb 20.2-13 ; Es 43.19 ; 48.21.
  - type: text
    content: Il ouvrit le rocher, et de l'eau coula ;
  - type: text
    content: elle se répandit comme un fleuve sur la terre desséchée.
  '42':
  - type: text
    content: ' '
  - type: note
    content: V. 8s ; Gn 15.13s ; Ex 2.24 ; Lc 1.54s.
  - type: text
    content: Car il se souvint de sa parole sacrée
  - type: text
    content: et d'Abraham, son serviteur.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 106.5 ; Ex 15.1ss ; Es 35.10 ; 51.11 ; 55.12.
  - type: text
    content: Il fit sortir son peuple dans la gaieté,
  - type: text
    content: ceux qu'il avait choisis, au milieu des cris de joie.
  '44':
  - type: text
    content: ' '
  - type: note
    content: '78.54s ; Ex 15.18s ; Dt 4.38 ; 6.10s ; 11.24 ; Jos 1.4ss. –  ils prirent possession  : autres traductions ils prennent possession, ils prendront possession.'
  - type: text
    content: Il leur donna les pays des nations,
  - type: text
    content: et ils prirent possession du travail des peuples,
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'afin  : on pourrait aussi comprendre à condition, pourvu, sous réserve qu''ils observent…  ; cf. 78.7 ; Lv 18.24ss ; Ez 36.27. – Voir loi. –  Louez le Seigneur (Yah) 104.35n.'
  - type: text
    content: afin d'observer ses prescriptions
  - type: text
    content: et de garder ses lois.
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  '5':
  - type: text
    content: ' '
  - type: note
    content: '77.12 ; 111.4 ; 136.4. –  prodiges 78.43. –  de ses jugements  : litt. des jugements de sa bouche  ; cf. Jr 4.12+.'
  - type: text
    content: Souvenez-vous des choses étonnantes qu'il a faites,
  - type: text
    content: de ses prodiges et de ses jugements,
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'V. 42s. –  descendance d''Abraham  : cf. Es 41.8 ; Jn 8.33 ; Rm 4.13 ; Ga 3.16. –  son serviteur  : LXX ses serviteurs. –  ceux qu''il a choisis (ou ses élus ) : certains mss portent celui qu''il a choisi.'
  - type: text
    content: vous, descendance d'Abraham, son serviteur,
  - type: text
    content: vous, fils de Jacob, ceux qu'il a choisis !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'notre Dieu 95.7 ; 100.3. –  ses jugements… 94.2 ; Gn 18.25 ; Es 26.9 ; Mi 4.3. –  s''exercent  : sous-entendu dans le texte.'
  - type: text
    content: 'C''est lui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu ;'
  - type: text
    content: ses jugements s'exercent sur toute la terre.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Il se souvient… v. 42 ; 106.45 ; 111.5 ; Gn 9.15 ; Dt 7.8s ; Mi 7.20 ; Lc 1.72s. –  la parole qu'il a instituée ou prescrite , 1Ch 16.15+ ; cf. 42.9n  ; 111.9.
  - type: text
    content: Il se souvient toujours de son alliance,
  - type: text
    content: de la parole qu'il a instituée pour mille générations,
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'de l''alliance  : sous-entendu dans le texte. –  avec Abraham Gn 12.2ss ; 15.18 ; 17.1ss ; 22.17s ; 24.7. –  à Isaac Gn 26.3ss.'
  - type: text
    content: – de l'alliance qu'il a conclue avec Abraham,
  - type: text
    content: et de son serment à Isaac ;
