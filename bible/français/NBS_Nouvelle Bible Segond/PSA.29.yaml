document_id: PSA.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La voix du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'On a observé de nombreuses analogies entre ce psaume et des hymnes d''Ougarit adressés à Baal, dieu de l''orage. –  Psaume. De David 3.1n  ; LXX ajoute en quittant la tente , ce qui pourrait signifier que ce psaume était chanté à la fin de la fête des Huttes ou des Tentes (cf. Dt 16.13-15 ; Za 14.16-19 ; voir aussi calendrier et fêtes). –  Fils des dieux (hébreu ’élim , pluriel de ’el , traduit par Dieu au v. 3, voir Gn 21.33n) : l''expression peut être comprise au sens de dieux, êtres divins  ; cf. 82.1 ; 89.7 ; 97.7 ; 138.1n  ; 148.1ss ; certains mss portent béliers au lieu de dieux , ce qui donne  : Donnez au Seigneur des béliers. –  donnez au Seigneur … 96.7s ; 1Ch 16.28s.'
  - type: text
    content: Psaume. De David.
  - type: text
    content: 'Fils des dieux, donnez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: 'donnez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' gloire et puissance !'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'habite le déluge  : autre traduction est assis (comme roi, ou comme juge) sur le déluge , ce dernier terme désignant probablement ici les « eaux d''en haut » associées aux récits de la création et du déluge ; certains comprennent était installé lors du déluge  ; cf. 9.8 ; 93.1ss ; 102.13 ; 104.3+ ; Gn 6.17n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' habite le déluge,'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est assis en roi pour toujours.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 28.8n. –  par (ou dans ) la paix ou la prospérité.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donnera la puissance à son peuple ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' bénira son peuple par la paix.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'quand éclate sa sainteté  : traduction incertaine, litt. dans l''éclat de la sainteté  ; on a aussi compris avec des ornements sacrés  ; versions anciennes dans sa cour sacrée  ; cf. 96.9 ; 110.3n  ; 1Ch 16.29 ; 2Ch 20.21.'
  - type: text
    content: 'Donnez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' la gloire de son nom !'
  - type: text
    content: 'Prosternez-vous devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' quand éclate sa sainteté !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'La voix du Seigneur  : cette expression, qui revient sept fois dans le psaume, y désigne manifestement le tonnerre ; cf. 18.11-16 ; 46.7 ; 68.34 ; 77.17-19 ; 97.2-4 ; 104.7 ; Ex 9.23n  ; 19.16,18,19 ; 1S 2.10 ; 7.10 ; 12.16ss ; Es 30.30 ; Jr 25.30 ; Jl 4.16 ; Am 1.2 ; Ha 3 ; Jb 37.2-5 ; voir aussi Ap 10.3. –  retentit et est sont sous-entendus dans le texte. –  sur les eaux  : cf. v. 10+ ; Gn 1.7. –  Dieu glorieux  : cf. 24.7-10 ; Ac 7.2.'
  - type: text
    content: 'La voix du '
  - type: text
    content: Seigneur
  - type: text
    content: ' retentit sur les eaux,'
  - type: text
    content: le Dieu glorieux fait gronder le tonnerre ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est sur les grandes eaux.'
  '4':
  - type: text
    content: 'La voix du '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec puissance,'
  - type: text
    content: 'la voix du '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec magnificence,'
  '5':
  - type: text
    content: ' '
  - type: note
    content: cèdres du Liban 92.13 ; 104.16 ; Es 2.13+.
  - type: text
    content: 'la voix du '
  - type: text
    content: Seigneur
  - type: text
    content: ' brise les cèdres ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' brise les cèdres du Liban,'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction  : il les fait bondir, le Liban comme un taurillon et le Siriôn (nom cananéen du mont Hermon, cf. 42.7 ; 89.13 ; 133.3 ; Dt 3.9) comme un aurochs (cf. Ps 92.11+) ; voir aussi Ps 114.4. –  il fait bondir  : sous-entendu dans le texte.'
  - type: text
    content: il les fait bondir comme un taurillon,
  - type: text
    content: il fait bondir le Liban et le Siriôn comme un aurochs.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'feux flamboyants  : litt. flammes de feu  ; autre traduction éclairs  ; cf. v. 3n  ; 104.4 ; Es 30.27 ; Na 3.3 ; Ha 3.11 ; voir aussi Gn 3.24.'
  - type: text
    content: 'La voix du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait jaillir des feux flamboyants.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Qadesh ( Saint ou Sacré ) : cf. Nb 20.'
  - type: text
    content: 'La voix du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait trembler le désert ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait trembler le désert de Qadesh.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'fait accoucher les biches  : texte obscur et traduction incertaine ; certains comprennent fait trembler les chênes  ; cf. Jb 39.1-4. –  son temple ou son palais  ; cf. 11.4n. –  Gloire v. 1s ; 19.2 ; 148.1 ; Es 6.3.'
  - type: text
    content: 'La voix du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait accoucher les biches,'
  - type: text
    content: elle dépouille les forêts.
  - type: text
    content: Et dans son temple
  - type: text
    content: 'tout s''écrie : Gloire !'
