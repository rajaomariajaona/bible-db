        text: '3.21ss : « Ce qui est trop difficile pour toi, ne le recherche pas, ce qui est au-dessus de tes forces, ne l''examine pas. Réfléchis sur les commandements qui t''ont été donnés, tu n''as pas besoin de choses cachées. Ne t''acharne pas à des œuvres qui te dépassent ; ce qui t''a déjà été montré est plus que ne peut concevoir l''esprit humain. Car beaucoup ont été égarés par leurs spéculations, leur imagination perverse a faussé leurs pensées. » –  '
