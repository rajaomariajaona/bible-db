document_id: PSA.131,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mon cœur n'est pas hardi
  - type: text
    content: ' '
  - type: note
    content: 'montées 120.1n. –  mon cœur n''est pas hardi (2Ch 17.6n) …  : autre traduction mon cœur n''est pas orgueilleux, mes yeux ne sont pas hautains  ; cf. 18.28 ; 101.5 ; Pr 6.17. –  je ne m''engage pas… ou je ne recherche pas des choses…  ; cf. 139.6 ; Jr 45.5 ; Siracide 3.21ss : « Ce qui est trop difficile pour toi, ne le recherche pas, ce qui est au-dessus de tes forces, ne l''examine pas. Réfléchis sur les commandements qui t''ont été donnés, tu n''as pas besoin de choses cachées. Ne t''acharne pas à des œuvres qui te dépassent ; ce qui t''a déjà été montré est plus que ne peut concevoir l''esprit humain. Car beaucoup ont été égarés par leurs spéculations, leur imagination perverse a faussé leurs pensées. » –  difficiles  : le même mot est souvent traduit par étonnant , 9.2+ ; 26.7+ ; cf. Gn 18.14.'
  - type: text
    content: Chant des montées. De David.
  - type: text
    content: Seigneur
  - type: text
    content: ', mon cœur n''est pas hardi, mes yeux ne s''élèvent pas ;'
  - type: text
    content: je ne m'engage pas dans des questions
  - type: text
    content: trop grandes et trop difficiles pour moi.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Au contraire  : on pourrait aussi comprendre la tournure (litt. sinon ) comme une formule de serment si je ne me suis pas fait… (sous-entendu que je sois maudit ). –  je me suis fait…  : autres traductions j''ai imposé le calme et le silence à mon âme, comme un enfant sevré (1S 1.23s ; Es 28.9 ; Os 1.8) sur sa mère ; mon âme est comme un enfant sevré sur moi  ; ou, selon d''autres sens du mot traditionnellement rendu par âme (6.4n)  : J''ai calmé et fait taire mes désirs comme un enfant que sa mère console ; comme un enfant consolé je me suis apaisé  ; le mot qui désigne l’ enfant sevré pourrait aussi évoquer l''idée de récompense ou de rétribution  ; cf. 13.6n  ; voir aussi 37.7 ; 62.2,6 ; Es 30.15 ; 66.11,13 ; Os 11.3s ; Mt 18.3.'
  - type: text
    content: Au contraire, je me suis fait calme et tranquille,
  - type: text
    content: comme un enfant sevré avec sa mère ;
  - type: text
    content: je suis avec moi-même comme un enfant sevré.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Israël… 130.7. –  dès maintenant… 113.2+.
  - type: text
    content: 'Israël, attends le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: dès maintenant et pour toujours !
