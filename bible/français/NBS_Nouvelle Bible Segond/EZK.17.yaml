verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'aigle et la vigne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
