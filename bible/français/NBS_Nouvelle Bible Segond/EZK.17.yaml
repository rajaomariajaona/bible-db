document_id: EZK.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'aigle et la vigne
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le vent d''est… desséchera  : cf. 19.12 ; Os 13.15.'
  - type: text
    content: 'Elle est plantée : prospérera-t-elle ?'
  - type: text
    content: Si le vent d'est la touche,
  - type: text
    content: ne se desséchera-t-elle pas ?
  - type: text
    content: Elle se desséchera sur le parterre où elle a poussé.
  - type: heading
    content: Explication de l'allégorie
  '11':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '12':
  - type: text
    content: ' '
  - type: note
    content: maison rebelle 2.5+. –  Ne savez-vous pas… 12.9+ ; 24.19. –  Le roi de Babylone… v. 3s ; 2R 24.10-17.
  - type: text
    content: 'Dis à la maison rebelle, je te prie : Ne savez-vous pas ce que cela signifie ? Dis : Le roi de Babylone est allé à Jérusalem, il en a pris le roi et les chefs et les a emmenés avec lui à Babylone. '
  '13':
  - type: note
    content: 'V. 5n. –  l''a placé sous adjuration ou sous malédiction, c.-à-d. l''a placé solennellement sous le coup d''une malédiction en cas de rupture de l''alliance  ; cf. v. 16,18s ; 16.59n. –  les puissants  : le mot signifie également bélier(s)  ; cf. 4.2n (autre terme) ; 31.11n.'
  - type: text
    content: 'Il a choisi un rejeton de la descendance royale, a conclu une alliance avec lui et l''a placé sous adjuration, et il a emmené les puissants du pays, '
  '14':
  - type: note
    content: 'V. 6. –  pour pouvoir subsister  : autre traduction en vigueur.'
  - type: text
    content: 'afin que le royaume soit tenu dans l''abaissement, sans pouvoir s''élever, et qu''il garde son alliance pour pouvoir subsister. '
  '15':
  - type: note
    content: V. 7n,9s ; 16.26n  ; 2R 24.20 ; Es 31.1-3.
  - type: text
    content: 'Mais il s''est rebellé contre lui, en envoyant ses messagers en Egypte, pour qu''elle lui donne des chevaux et un grand nombre d''hommes. Celui qui fait cela réussirait-il ? Echapperait-il ? Il a rompu l''alliance, et il échapperait ! '
  '16':
  - type: note
    content: 'Par ma vie 5.11n. –  à coup sûr  : cf. 5.11n. –  le pays  : litt. le lieu  ; cf. 2R 25. –  auprès de lui  : litt. avec lui.'
  - type: text
    content: 'Par ma vie, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – à coup sûr, c''est dans le pays du roi qui l''a fait roi, celui dont il a méprisé l''adjuration, en rompant son alliance, c''est auprès de lui, à Babylone, qu''il mourra. '
  '17':
  - type: note
    content: 'un remblai…  : cf. 4.2.'
  - type: text
    content: 'Le pharaon n''agira pas pour lui avec une grande armée et une assemblée nombreuse pendant la guerre, lorsqu''on élèvera un remblai et qu''on bâtira un terrassement pour retrancher une multitude de gens. '
  '18':
  - type: note
    content: 'il s''était engagé  : litt. il avait donné sa main  ; cf. 2R 10.15n  ; Esd 10.19n  ; 1Ch 29.24n  ; 2Ch 30.8n.'
  - type: text
    content: 'Il a méprisé l''adjuration, en rompant l''alliance ; il s''était engagé et il a fait tout cela ; il n''échappera pas ! '
  '19':
  - type: note
    content: mon adjuration v. 13n  ; 2Ch 36.13. –  sur sa tête 9.10n.
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Par ma vie, à coup sûr, c''est mon adjuration qu''il a méprisée, c''est mon alliance qu''il a rompue : je ferai retomber cela sur sa tête. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'énigme Jg 14.12+. –  fable  : le mot correspondant est aussi traduit par proverbe (14.8n  ; 21.5 ; 24.2) ; ce chapitre est une sorte d''allégorie des événements rapportés en 2R 24.12–25.1. –  à la maison…  : autre traduction pour la maison…'
  - type: text
    content: 'Humain, propose une énigme, dis une fable à la maison d''Israël ! '
  '20':
  - type: note
    content: 12.13+.
  - type: text
    content: 'J''étendrai mon filet sur lui, et il sera pris dans mon piège ; je l''emmènerai à Babylone et là, j''entrerai en jugement avec lui à propos du sacrilège qu''il a commis envers moi. '
  '21':
  - type: note
    content: 'les fuyards  : de nombreux mss hébreux et des versions anciennes ont lu les hommes d''élite. –  dispersés à tout vent 5.10+.'
  - type: text
    content: 'Tous les fuyards de toutes ses troupes tomberont par l''épée, et ceux qui resteront seront dispersés à tout vent. Ainsi vous saurez que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 3 ; 34.23 ; Es 11.1. –  une branche de la cime  : litt. de la cime . –  je la mettrai en place  : litt. je donnerai  ; ce verbe est absent de plusieurs versions anciennes. –  sublime  : traduction incertaine ; cf. 20.40 ; 40.2.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je prendrai, moi, une branche de la cime d''un cèdre élevé et je la mettrai en place ; j''arracherai du sommet de ses branches une pousse tendre et je la planterai moi-même sur une montagne haute et sublime. '
  '23':
  - type: note
    content: 'la montagne…  : autres traductions la montagne de la hauteur d''Israël ; la haute montagne d''Israël  ; cf. 20.40+ ; 34.14. –  ramure / fruit 36.8 ; Os 14.6s ; Dn 4.18. –  de toute espèce  : litt. de toute (sorte d’)aile  ; cf. 31.6 ; Dn 4.9 ; Mt 13.32/ /.'
  - type: text
    content: 'Je le planterai dans la montagne qui domine Israël ; il dressera sa ramure et portera du fruit, il deviendra un cèdre magnifique. Tous les oiseaux de toute espèce demeureront sous lui ; à l''ombre de ses branches ils demeureront. '
  '24':
  - type: note
    content: 'Cf. 36.36. –  qui ai abaissé… 21.31 ; 1S 2.7 ; Ps 75.8 ; 113.7-9 ; Mt 23.12+/ / ; Lc 1.51-53. –  qui ai parlé et qui agirai  : cf. 22.14 ; 24.14 ; 36.36 ; 37.14.'
  - type: text
    content: 'Ainsi tous les arbres des champs sauront que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai abaissé l''arbre élevé et élevé l''arbre abaissé, qui ai desséché l''arbre vert et fait fleurir l''arbre sec. C''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé et qui agirai.'
  '3':
  - type: note
    content: 'grand aigle  : cf. Ap 12.14 ; il s''agit ici de Nabuchodonosor, roi de Babylone ; cf. v. 12s. –  ailerons  : le terme hébreu, qui apparaît également en Es 40.31n et en Ps 55.7, est probablement un synonyme de celui qui est traduit précédemment par ailes. –  plumage  : même terme au v. 7 et en Jb 39.13n. –  chatoyant  : voir 16.10n. –  Liban / cèdre  : cf. 31.3 ; Es 2.13+ ; 10.34n. –  enleva la cime…  : cf. v. 22.'
  - type: text
    content: 'Tu diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Le grand aigle,
  - type: text
    content: aux grandes ailes,
  - type: text
    content: aux longs ailerons,
  - type: text
    content: couvert d'un plumage chatoyant,
  - type: text
    content: vint jusqu'au Liban.
  - type: text
    content: Il enleva la cime du cèdre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 12 ; 2R 24.12-16. –  un pays de commerce ou le pays de Canaan , expression qui peut désigner métaphoriquement Babylone (voir 16.29n).
  - type: text
    content: Il arracha le plus élevé de ses rameaux.
  - type: text
    content: Il l'emporta dans un pays de commerce
  - type: text
    content: et le déposa dans une ville de marchands.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 13 ; 2R 24.17. –  rejeton  : le mot est aussi traduit par semence, descendance  ; cf. Gn 3.15n. –  pépinière  : litt. champ de rejeton . –  Il le mit…  : traduction incertaine. –  grandes eaux v. 8.'
  - type: text
    content: Il prit un rejeton du pays
  - type: text
    content: et le plaça dans une pépinière.
  - type: text
    content: Il le mit près de grandes eaux
  - type: text
    content: et le planta comme un saule.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ce rejeton  : litt. il . –  cep de vigne  : cf. 15.1-6 ; 19.10-14. –  en dessous de lui  : il faut sans doute comprendre sous l''aigle  : description de la condition vassale de Sédécias, roi de Juda, à l''égard de Nabuchodonosor (voir v. 14).'
  - type: text
    content: Ce rejeton poussa
  - type: text
    content: et devint un cep de vigne robuste,
  - type: text
    content: mais de taille basse ;
  - type: text
    content: ses branches étaient tournées vers l'aigle,
  - type: text
    content: et ses racines étaient en dessous de lui.
  - type: text
    content: Il devint un cep de vigne,
  - type: text
    content: donna des jets
  - type: text
    content: et produisit des sarments.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 15-19. –  un autre aigle , d''après des versions anciennes ; litt. un aigle  ; il s''agit du pharaon Hophra ; cf. v. 17 ; Jr 44.30n. –  étendit avec avidité  : certains mss portent ici un autre verbe (permutation de lettres) ; d''après eux, on pourrait traduire étendit (ses racines) comme des ailes.'
  - type: text
    content: Il y avait un autre aigle,
  - type: text
    content: grand, aux grandes ailes,
  - type: text
    content: au plumage épais.
  - type: text
    content: Du parterre où elle était plantée,
  - type: text
    content: cette vigne étendit avec avidité ses racines de son côté
  - type: text
    content: et dirigea ses branches vers lui,
  - type: text
    content: afin qu'il l'arrose.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 8.7. –  bon terrain  : litt. bon champ.'
  - type: text
    content: Elle était plantée dans un bon terrain,
  - type: text
    content: près de grandes eaux,
  - type: text
    content: de manière à produire de la ramure
  - type: text
    content: et à porter du fruit,
  - type: text
    content: pour devenir une vigne magnifique.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Prospérera-t-elle  : le verbe correspondant peut signifier réussir (v. 15) , être victorieux  ; l''interrogation n''est explicite que dans certains mss hébreux et des versions anciennes ; cf. v. 10,15. –  Ne va-t-il pas arracher  : l''auteur de cet acte est le premier grand aigle ; cf. v. 3. –  beaucoup de force  : litt. un grand bras . –  pour le déraciner  : litt. pour enlever de ses racines  ; autre traduction pour le détacher de ses racines.'
  - type: text
    content: 'Dis : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Prospérera-t-elle ?
  - type: text
    content: Ne va-t-il pas arracher ses racines,
  - type: text
    content: enlever son fruit,
  - type: text
    content: afin qu'elle se dessèche,
  - type: text
    content: que toutes ses jeunes pousses se dessèchent ?
  - type: text
    content: Il ne faudra ni beaucoup de force
  - type: text
    content: ni un peuple nombreux
  - type: text
    content: pour le déraciner.
