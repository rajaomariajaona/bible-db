  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le vent d'est… desséchera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 19.12 ; Os 13.15.'
      marker-yv: yv-n
    - type: text
      text: 'Elle est plantée : prospérera-t-elle ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si le vent d'est la touche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne se desséchera-t-elle pas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle se desséchera sur le parterre où elle a poussé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Explication de l'allégorie
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maison rebelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ne savez-vous pas… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.9+ ; 24.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le roi de Babylone… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3s ; 2R 24.10-17.
      marker-yv: yv-n
    - type: text
      text: 'Dis à la maison rebelle, je te prie : Ne savez-vous pas ce que cela signifie ? Dis : Le roi de Babylone est allé à Jérusalem, il en a pris le roi et les chefs et les a emmenés avec lui à Babylone. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''a placé sous adjuration '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sous malédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''a placé solennellement sous le coup d''une malédiction en cas de rupture de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'alliance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 16,18s ; 16.59'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les puissants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot signifie également '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bélier(s)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 4.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' (autre terme) ; 31.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il a choisi un rejeton de la descendance royale, a conclu une alliance avec lui et l''a placé sous adjuration, et il a emmené les puissants du pays, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour pouvoir subsister
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en vigueur.
      marker-yv: yv-n
    - type: text
      text: 'afin que le royaume soit tenu dans l''abaissement, sans pouvoir s''élever, et qu''il garde son alliance pour pouvoir subsister. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',9s ; 16.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 24.20 ; Es 31.1-3.'
      marker-yv: yv-n
    - type: text
      text: 'Mais il s''est rebellé contre lui, en envoyant ses messagers en Egypte, pour qu''elle lui donne des chevaux et un grand nombre d''hommes. Celui qui fait cela réussirait-il ? Echapperait-il ? Il a rompu l''alliance, et il échapperait ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par ma vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à coup sûr
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2R 25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: auprès de lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec lui.
      marker-yv: yv-n
    - type: text
      text: 'Par ma vie, – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  – à coup sûr, c''est dans le pays du roi qui l''a fait roi, celui dont il a méprisé l''adjuration, en rompant son alliance, c''est auprès de lui, à Babylone, qu''il mourra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un remblai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.2.'
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon n''agira pas pour lui avec une grande armée et une assemblée nombreuse pendant la guerre, lorsqu''on élèvera un remblai et qu''on bâtira un terrassement pour retrancher une multitude de gens. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il s'était engagé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il avait donné sa main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2R 10.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Esd 10.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 29.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Ch 30.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il a méprisé l''adjuration, en rompant l''alliance ; il s''était engagé et il a fait tout cela ; il n''échappera pas ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon adjuration '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Ch 36.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur sa tête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Par ma vie, à coup sûr, c''est mon adjuration qu''il a méprisée, c''est mon alliance qu''il a rompue : je ferai retomber cela sur sa tête. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'énigme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jg 14.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot correspondant est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'proverbe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (14.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 21.5 ; 24.2) ; ce chapitre est une sorte d''allégorie des événements rapportés en 2R 24.12–25.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la maison…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour la maison…
      marker-yv: yv-n
    - type: text
      text: 'Humain, propose une énigme, dis une fable à la maison d''Israël ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.13+.
      marker-yv: yv-n
    - type: text
      text: 'J''étendrai mon filet sur lui, et il sera pris dans mon piège ; je l''emmènerai à Babylone et là, j''entrerai en jugement avec lui à propos du sacrilège qu''il a commis envers moi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les fuyards
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : de nombreux mss hébreux et des versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les hommes d'élite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dispersés à tout vent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.10+.
      marker-yv: yv-n
    - type: text
      text: 'Tous les fuyards de toutes ses troupes tomberont par l''épée, et ceux qui resteront seront dispersés à tout vent. Ainsi vous saurez que c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui ai parlé.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 3 ; 34.23 ; Es 11.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une branche de la cime
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la cime
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je la mettrai en place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je donnerai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; ce verbe est absent de plusieurs versions anciennes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sublime
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ; cf. 20.40 ; 40.2.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Je prendrai, moi, une branche de la cime d''un cèdre élevé et je la mettrai en place ; j''arracherai du sommet de ses branches une pousse tendre et je la planterai moi-même sur une montagne haute et sublime. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la montagne…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la montagne de la hauteur d'Israël ; la haute montagne d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 20.40+ ; 34.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ramure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fruit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '36.8 ; Os 14.6s ; Dn 4.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de toute espèce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de toute (sorte d’)aile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 31.6 ; Dn 4.9 ; Mt 13.32/ /.'
      marker-yv: yv-n
    - type: text
      text: 'Je le planterai dans la montagne qui domine Israël ; il dressera sa ramure et portera du fruit, il deviendra un cèdre magnifique. Tous les oiseaux de toute espèce demeureront sous lui ; à l''ombre de ses branches ils demeureront. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 36.36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui ai abaissé… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.31 ; 1S 2.7 ; Ps 75.8 ; 113.7-9 ; Mt 23.12+/ / ; Lc 1.51-53. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui ai parlé et qui agirai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 22.14 ; 24.14 ; 36.36 ; 37.14.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi tous les arbres des champs sauront que c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui ai abaissé l''arbre élevé et élevé l''arbre abaissé, qui ai desséché l''arbre vert et fait fleurir l''arbre sec. C''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui ai parlé et qui agirai.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: grand aigle
      - type: usfm
        marker: ft
        children:
        - type: text
