      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 10.4 ; 22.35s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ni bâton
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : comparer avec Mt 10.10 ; Mc 6.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ni argent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Lc emploie le mot qui désigne l''argent-métal et les monnaies d''argent, alors que Mc 6.8 parle de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'monnaie de bronze '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(de valeur inférieure ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chacun
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette précision est absente de certains mss.'
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit : Ne prenez rien pour la route, ni bâton, ni sac, ni pain, ni argent, et n''ayez pas deux tuniques chacun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 10.7.
    marker-yv: yv-n
  - type: text
    text: 'Quelle que soit la maison où vous entrerez, demeurez-y, et que ce soit de là que vous partirez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 10.11 ; Mt 10.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ac 13.50s ; voir aussi 18.6 ; 22.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en sortant…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en témoignage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(5.14) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'contre eux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur eux.
    marker-yv: yv-n
  - type: text
    text: 'Et partout où les gens ne vous accueillent pas, en sortant de la ville, secouez la poussière de vos pieds en témoignage contre eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: partout
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 17.30 ; 24.3 ; 28.22.'
    marker-yv: yv-n
  - type: text
    text: Ils partirent et se mirent à passer de village en village ; ils annonçaient la bonne nouvelle et réalisaient partout des guérisons.
