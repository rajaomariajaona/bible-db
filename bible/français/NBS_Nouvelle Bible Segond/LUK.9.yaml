  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le jour…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : expression analogue 24.29 ; cf. 4.40. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Douze '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 1+. –  '
    - type: usfm
      marker: fq
