document_id: LUK.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus envoie les Douze en mission
  - type: heading
    content: Mt 10.1-14  ; Mc 6.7-13
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.1-12. –  Il appela ou convoqua , même verbe 15.6,9 ; 23.13 ; Ac 5.21 ; 10.24 ; 28.17. –  les Douze 6.13 ; 8.1+. –  puissance / autorité (ou pouvoir ) 4.36+. – Voir démon .
  - type: text
    content: 'Il appela les Douze et leur donna puissance et autorité sur tous les démons, et pour guérir les maladies. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Les apôtres 6.13n. –  racontèrent à Jésus  : litt. lui racontèrent v. 1ss ; cf. 8.39 ; 10.17. –  Il les prit avec lui v. 28 ; 18.31. –  à l''écart  : cf. 10.23 ; Ac 23.19. –  du côté d''une ville  : on pourrait comprendre dans une ville , mais ce sens est peu probable dans ce contexte (v. 12). –  Bethsaïda Mc 6.45n.'
  - type: text
    content: Les apôtres, à leur retour, racontèrent à Jésus tout ce qu'ils avaient fait.
  - type: text
    content: 'Il les prit avec lui et se retira à l''écart, du côté d''une ville appelée Bethsaïda. '
  '11':
  - type: note
    content: 'Les foules…  : cf. Jn 6.2. –  accueillit 8.40. –  règne… 4.43+ ; cf. Mc 6.34. –  guérit  : cf. Mt 14.14 ; 15.30.'
  - type: text
    content: Les foules s'en aperçurent et le suivirent. Il les accueillit ; il leur parlait du règne de Dieu ; il guérit aussi ceux qui avaient besoin de guérison.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Le jour…  : expression analogue 24.29 ; cf. 4.40. –  Douze v. 1+. –  lieu désert  : cf. v. 10n.'
  - type: text
    content: 'Le jour commençait à baisser. Les Douze vinrent donc lui dire : Renvoie la foule, pour qu''elle aille se loger et trouver du ravitaillement dans les villages et les hameaux des environs ; car nous sommes ici dans un lieu désert. '
  '13':
  - type: note
    content: Cf. 2R 4.42ss.
  - type: text
    content: 'Mais il leur dit : Donnez-leur vous-mêmes à manger. Ils dirent : Nous n''avons pas plus de cinq pains et deux poissons, à moins que nous n''allions nous-mêmes acheter des vivres pour tout ce peuple. '
  '14':
  - type: note
    content: 'Mc 6.40n,44n. –  Installez-les  : litt. faites-les s''étendre, cf. 7.36n.'
  - type: text
    content: 'En effet, il y avait environ cinq mille hommes. Il dit à ses disciples : Installez-les par rangées d''une cinquantaine. '
  '15':
  - type: text
    content: 'Ils firent ainsi ; ils les installèrent tous. '
  '16':
  - type: note
    content: 'Cf. 22.19 ; Mt 14.19n  ; 26.26 ; 1Co 11.24 ; voir aussi Lc 24.29s ; Ac 2.42,46 ; 20.7,11. –  prononça la bénédiction sur eux  : autre traduction les bénit  ; voir Mc 6.41n  ; 8.7n.'
  - type: text
    content: 'Il prit les cinq pains et les deux poissons, leva les yeux vers le ciel et prononça la bénédiction sur eux. Puis il les rompit et se mit à les donner aux disciples pour qu''ils les distribuent à la foule. '
  '17':
  - type: note
    content: 'rassasiés 6.21+ ; cf. Ex 16.4,12 ; Ps 78.29. –  qui étaient restés  : même terme grec 12.15 (abondance) ; 15.17 ; 21.4 ; Ac 16.5 ; cf. 2R 4.44.'
  - type: text
    content: Tous mangèrent et furent rassasiés, et on emporta douze paniers de morceaux qui étaient restés.
  - type: heading
    content: Pierre déclare que Jésus est le Christ
  - type: heading
    content: Mt 16.13-20  ; Mc 8.27-30  ; cf. Jn 6.67-71
  '18':
  - type: text
    content: ' '
  - type: note
    content: priait v. 28 ; 3.21+.
  - type: text
    content: 'Un jour qu''il priait à l''écart et que les disciples étaient réunis auprès de lui, il leur demanda : Au dire des foules, qui suis-je ? '
  '19':
  - type: note
    content: 'V. 7s ; cf. Jn 6.14s. Autre traduction possible  : Les uns répondirent : Jean le Baptiseur, d''autres : Elie, d''autres encore : un des anciens prophètes…'
  - type: text
    content: 'Ils répondirent : Pour les uns, Jean le Baptiseur ; pour d''autres, Elie ; pour d''autres encore, un des anciens prophètes qui s''est relevé. '
  '2':
  - type: note
    content: 'proclamer le règne… 4.43+ ; cf. 10.9 ; Ac 28.31. –  guérir les malades  : certains mss portent seulement guérir.'
  - type: text
    content: 'Il les envoya proclamer le règne de Dieu et guérir les malades. '
  '20':
  - type: note
    content: Cf. Jn 6.67ss. –  Pierre 5.8+ ; cf. 8.45. –  Le Christ 2.11n de Dieu 23.35 ; cf. 2.26 ; 4.41 ; Ac 3.18 ; voir aussi 2S 23.1 ; Ps 2.2 ; Mc 14.61 ; voir aussi onction.
  - type: text
    content: '– Et pour vous, leur dit-il, qui suis-je ? Pierre répondit : Le Christ de Dieu. '
  '21':
  - type: note
    content: 'rabroua 4.35n. –  leur enjoignant  : même verbe 5.14 ; 8.29. –  dire cela à personne  : comparer avec 24.46ss ; Ac 2.36 ; 3.18 ; 4.26 ; 10.39ss.'
  - type: text
    content: 'Il les rabroua, en leur enjoignant de ne dire cela à personne, '
  '22':
  - type: note
    content: 'Cf. v. 31,44s ; 17.25 ; 18.32s ; 24.7,26,46 ; Ac 2.23 ; 26.23. –  ajoutant  : litt. disant. –  Fils de l''homme 5.24+. –  anciens (cf. 7.3) / grands prêtres (cf. 3.2 ; 22.50,54 ; Mt 2.4n) / scribes (les trois composantes du sanhédrin) 20.1 ; cf. 22.52 ; Ac 4.5 ; 23.14 ; 25.15 ; voir Mc 8.31n. –  tué  : cf. Ac 2.23,36 ; 3.15. –  se réveille ou se relève, c.-à-d. ressuscite  ; cf. v. 7 ; 7.14n,22. –  le troisième jour 13.32 ; 18.33 ; 24.7,21,46 ; Ac 10.40 ; 1Co 15.4 ; cf. Os 6.2.'
  - type: text
    content: ajoutant qu'il fallait que le Fils de l'homme souffre beaucoup, qu'il soit rejeté par les anciens, les grands prêtres et les scribes, qu'il soit tué et qu'il se réveille le troisième jour.
  - type: heading
    content: Comment suivre Jésus
  - type: heading
    content: Mt 16.24-28  ; Mc 8.34–9.1
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 14.27. –  à tous  : cf. v. 17s. –  à ma suite  : litt. derrière moi  ; même préposition v. 62n  ; 7.38n  ; 14.27n  ; 17.31n  ; 19.14n  ; cf. Mc 1.7n,17n. –  qu''il se renie lui-même , même verbe 8.45n  ; 12.9 ; Ac 3.13s ; 7.35 ; comparer avec Lc 10.27. –  qu''il se charge…  : cf. 23.26 ; voir aussi Gn 22.6. –  chaque jour 11.3 ; cf. Rm 8.36 ; 1Co 15.31. –  croix  : cf. Mt 27.32n.'
  - type: text
    content: 'Il disait à tous : Si quelqu''un veut venir à ma suite, qu''il se renie lui-même, qu''il se charge chaque jour de sa croix et qu''il me suive. '
  '24':
  - type: note
    content: '17.33 ; cf. Jn 12.25s. –  sauver sa vie ou se sauver lui-même Mc 8.35n. –  perdra sa vie (ou se perdra lui-même) : cf. Ac 14.22.'
  - type: text
    content: 'Car quiconque voudra sauver sa vie la perdra, mais quiconque perdra sa vie à cause de moi la sauvera. '
  '25':
  - type: note
    content: 'Cf. 12.16-21. –  se ruine  : un terme apparenté est traduit par dommage en Ac 27.21.'
  - type: text
    content: 'Et à quoi sert-il à un être humain de gagner le monde entier, s''il se perd ou se ruine lui-même ? '
  '26':
  - type: note
    content: 'Cf. 12.8s ; 22.56ss ; Mt 10.33+ ; 2Tm 2.12. –  honte Rm 1.16 ; 2Tm 1.8. –  Fils de l''homme 5.24+. –  quand il viendra  : cf. 21.27. –  sa gloire v. 31s ; 24.26 ; cf. 2.9 ; Ac 7.2,55. –  saints anges  : cf. Mc 8.38 ; 13.26s ; 1Tm 5.21.'
  - type: text
    content: 'En effet, quiconque aura honte de moi et de mes paroles, le Fils de l''homme aura honte de lui quand il viendra dans sa gloire, dans la gloire du Père et des saints anges. '
  '27':
  - type: note
    content: 'en vérité  : adverbe grec apparenté au terme de 4.25n  ; de même 12.44 ; 21.3 ; il est traduit par vraiment en Mt 26.73 ; Mc 14.70. –  ici ou là (même terme Ac 21.4). –  ne goûteront pas (autres traductions jamais ; en aucun cas) la mort  : cf. Jn 8.52. –  vu le règne (ou le royaume) de Dieu  : cf. v. 32 ; 8.10 ; 11.20 ; 17.20 ; 19.11 ; 21.31 ; Ac 1.6 ; sur l''attente des premiers chrétiens, voir aussi Lc 24.21 ; Rm 5.2 ; 8.18,21 ; 1Co 2.7 ; 15.43 ; 2Co 3.18 ; 4.17 ; Ph 3.21 ; Col 1.27 ; 3.4 ; 1Th 2.12 ; 2Th 2.14.'
  - type: text
    content: Et je vous le dis, en vérité, quelques-uns de ceux qui se tiennent ici ne goûteront pas la mort avant d'avoir vu le règne de Dieu.
  - type: heading
    content: La transfiguration de Jésus
  - type: heading
    content: Mt 17.1-9  ; Mc 9.2-10
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Huit jours  : cf. 2.21 ; Lv 23.36 ; Jn 20.26. –  après ces paroles  : autre traduction après cela . –  Pierre, Jean et Jacques 8.51+. –  montagne / prier (3.21+) 6.12 ; cf. 22.39ss ; voir aussi Ex 34 ; 2P 1.18.'
  - type: text
    content: 'Huit jours environ après ces paroles, il prit avec lui Pierre, Jean et Jacques, et il monta sur la montagne pour prier. '
  '29':
  - type: note
    content: Cf. Ex 34.29ss ; Ac 6.15. –  blancheur Ac 1.10 ; cf. Ap 2.17 ; 3.18 ; 7.14. –  éclatante ou étincelante  ; le mot évoque l'éclair ; terme apparenté en 17.24n  ; 24.4 ; cf. Ez 1.4,7,27s ; Na 3.3 ; Dn 10.5s ; Ap 1.12ss ; voir aussi Ps 104.2.
  - type: text
    content: 'Pendant qu''il priait, l''aspect de son visage changea, et ses vêtements devinrent d''une blancheur éclatante. '
  '3':
  - type: note
    content: 'Cf. 10.4 ; 22.35s. –  ni bâton  : comparer avec Mt 10.10 ; Mc 6.8. –  ni argent  : Lc emploie le mot qui désigne l''argent-métal et les monnaies d''argent, alors que Mc 6.8 parle de monnaie de bronze (de valeur inférieure ; voir mesures, poids et monnaies). –  chacun  : cette précision est absente de certains mss.'
  - type: text
    content: 'Il leur dit : Ne prenez rien pour la route, ni bâton, ni sac, ni pain, ni argent, et n''ayez pas deux tuniques chacun. '
  '30':
  - type: note
    content: 'Moïse  : cf. 16.29,31 ; 24.27 ; Ac 26.22 ; cf. Dt 18.15,18 ; 34.5s ; Ml 3.22. –  Elie 1.17 ; 2R 2.11s ; Ml 3.23s.'
  - type: text
    content: 'Il y avait là deux hommes qui s''entretenaient avec lui : c''étaient Moïse et Elie '
  '31':
  - type: note
    content: 'dans la gloire  : cf. v. 26+,32 ; 24.50s ; Ex 24.17 ; 34.30ss ; 40.34. –  son départ (cf. v. 22+,51) ou, si l''on se contente de transcrire le mot grec employé ici, son exode (c.-à-d. sa sortie), terme opposé pour venue ou entrée en Ac 13.24 ; cf. Hé 11.22 ; 2P 1.15n  ; le mot évoque métaphoriquement la mort en Sagesse 3.2 : « Aux yeux des insensés, ils (les justes décédés) passèrent pour morts, et leur départ sembla un désastre. » 7.6 : « Pour tous, il n''y a qu''une façon d''entrer dans la vie comme d''en sortir. » –  qui allait s''accomplir  : litt. qu''il allait accomplir  ; même verbe 1.20 ; 4.21 ; 21.24 ; 22.16 ; 24.44 ; Ac 3.18 ; 13.25 (achever). –  à Jérusalem v. 51 ; 13.33s.'
  - type: text
    content: 'qui, apparaissant dans la gloire, parlaient de son départ, qui allait s''accomplir à Jérusalem. '
  '32':
  - type: note
    content: 'étaient accablés (litt. alourdis, cf. 21.34) de sommeil  : on pourrait comprendre ils dormaient d''un profond sommeil, mais ils se réveillèrent ou bien ils avaient grand sommeil, mais ils se tinrent éveillés  ; la scène est peut-être nocturne (cf. v. 37) ; voir Mc 14.40 ; voir aussi Gn 15.12 ; Dn 8.18 ; 10.9. –  ils virent sa gloire… v. 26+,30s ; cf. Jn 1.14 ; Rm 6.4 ; 2P 1.16ss.'
  - type: text
    content: 'Pierre et ses compagnons étaient accablés de sommeil. Réveillés, ils virent sa gloire et les deux hommes qui se tenaient avec lui. '
  '33':
  - type: note
    content: 'Au moment…  : litt. Alors qu''ils se séparaient de lui, Pierre dit à Jésus. –  Maître 5.5n. –  dressons trois tentes  : cf. 16.9 ; voir Mc 9.5+.'
  - type: text
    content: 'Au moment où ces hommes se séparaient de Jésus, Pierre lui dit : Maître, il est bon que nous soyons ici ; dressons trois tentes, une pour toi, une pour Moïse et une pour Elie. Il ne savait pas ce qu''il disait. '
  '34':
  - type: note
    content: 'nuée Mc 9.7+. –  couvrit de son ombre  : cf. 1.35. –  saisis de crainte  : cf. Mc 9.6 ; voir aussi Dn 10.7. –  ils entraient  : il s''agit vraisemblablement des disciples, mais le texte n''est pas absolument clair sur ce point ; il pourrait s''agir seulement de Jésus, Moïse et Elie (certains mss tranchent dans ce sens) ; cf. Ex 24.18.'
  - type: text
    content: 'Comme il parlait ainsi, une nuée survint et les couvrit de son ombre ; ils furent saisis de crainte, tandis qu''ils entraient dans la nuée. '
  '35':
  - type: note
    content: Cf. 3.22. –  celui qui a été choisi ou celui que j'ai choisi (traduction traditionnelle l'élu) ; terme apparenté en 23.35 ; cf. Jn 1.34n  ; voir aussi Es 42.1 ; 49.7. Certains mss portent mon Fils bien-aimé. –  Ecoutez-le ! Dt 18.15 ; Ac 3.22.
  - type: text
    content: 'Et de la nuée survint une voix : Celui-ci est mon Fils, celui qui a été choisi. Ecoutez-le ! '
  '36':
  - type: note
    content: 'Jésus était seul  : litt. Jésus fut trouvé seul (cf. v. 33). –  silence  : cf. Mc 9.9ss.'
  - type: text
    content: Quand la voix se fit entendre, Jésus était seul. Les disciples gardèrent le silence et ne racontèrent rien à personne, en ces jours-là, de ce qu'ils avaient vu.
  - type: heading
    content: Jésus guérit un enfant possédé
  - type: heading
    content: Mt 17.14-21  ; Mc 9.14-29
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Le lendemain  : certains mss portent durant la journée (ou le même jour ) ; cf. 8.1 ; Mc 9.14. –  descendus de la montagne  : cf. v. 28 ; 6.17 ; Mc 9.9. –  vint à sa rencontre  : même verbe 22.10 ; Ac 10.25 ; 20.22 ( arriver ).'
  - type: text
    content: 'Le lendemain, lorsqu''ils furent descendus de la montagne, une grande foule vint à sa rencontre. '
  '38':
  - type: note
    content: 'Maître  : au sens d’enseignant  ; cf. 3.12n. –  je t''en prie 8.28+. –  porte les regards  : cf. 1.48. –  fils unique 7.12n.'
  - type: text
    content: 'Du milieu de la foule, un homme s''écria : Maître, je t''en prie, porte les regards sur mon fils, car c''est mon fils unique. '
  '39':
  - type: note
    content: 'Cf. Mc 1.26. –  écumer  : cf. 1S 21.14.'
  - type: text
    content: 'Un esprit s''empare de lui, et tout à coup il pousse des cris, il le secoue violemment, le fait écumer et le quitte à grand-peine, après l''avoir tout meurtri. '
  '4':
  - type: note
    content: Cf. 10.7.
  - type: text
    content: 'Quelle que soit la maison où vous entrerez, demeurez-y, et que ce soit de là que vous partirez. '
  '40':
  - type: note
    content: 'tes disciples  : cf. v. 1 ; 5.30. –  pas pu  : cf. v. 1 ; 10.17 ; cf. 2R 4.31.'
  - type: text
    content: 'J''ai prié tes disciples de le chasser, et ils n''ont pas pu. '
  '41':
  - type: note
    content: 'Cf. Nb 14.27 ; Es 6.11 ; 65.2 ; Pr 1.20-33. –  Génération 7.31+ ; 11.29ss,50s ; 17.25 ; cf. Dt 32.5,20 ; Ph 2.15. –  jusqu''à quand…  : cf. Jn 14.9. –  supporterai-je Nb 11.12 ; Es 46.4.'
  - type: text
    content: 'Jésus dit : Génération sans foi et perverse, jusqu''à quand serai-je avec vous et vous supporterai-je ? Amène ton fils ici. '
  '42':
  - type: note
    content: 'rabroua 4.35+ ; cf. Mc 9.25ss. –  esprit impur  : voir démon et pur, impur. –  guérit  : cf. Ac 10.38. –  le rendit à son père 7.15.'
  - type: text
    content: 'Comme il approchait, le démon le jeta à terre et le secoua violemment. Mais Jésus rabroua l''esprit impur, guérit l''enfant et le rendit à son père. '
  '43':
  - type: note
    content: 'ébahis 4.32+ ; cf. 8.25 ; 11.14. –  grandeur  : même terme Ac 19.27 ; 2P 1.16. –  s''étonnaient 1.63+. –  à ses disciples v. 14,16,18,40.'
  - type: text
    content: Et tous furent ébahis de la grandeur de Dieu.
  - type: heading
    content: Jésus annonce de nouveau sa mort
  - type: heading
    content: Mt 17.22-23  ; Mc 9.30-32
  - type: text
    content: 'Tandis que tous s''étonnaient de tout ce qu''il faisait, il dit à ses disciples : '
  '44':
  - type: note
    content: 'prêtez bien l''oreille…  : litt. mettez ces paroles (ou ces choses, cf. v. 28n) dans vos oreilles  ; cf. 1.66n  ; 21.14n  ; voir aussi 1.44 ; 4.21n  ; Ac 11.22. –  Fils de l''homme (le même terme est traduit par humains dans la suite) ; cf. v. 22+. –  livré 18.32 ; 21.12,16 ; 22.4,6,21s,48 ; 23.5 ; 24.7,20.'
  - type: text
    content: 'Quant à vous, prêtez bien l''oreille à ces paroles : le Fils de l''homme va être livré aux humains. '
  '45':
  - type: note
    content: 'ne comprenaient pas  : litt. ne connaissaient pas  ; cf. 2.50 ; 18.34 ; 24.25,45. –  afin qu''ils n''en saisissent pas le sens ou de sorte qu''ils n''en saisissaient pas le sens. –  avaient peur de l''interroger  : cf. Jn 16.19 ; voir crainte.'
  - type: text
    content: Mais les disciples ne comprenaient pas cette parole ; elle était voilée pour eux, afin qu'ils n'en saisissent pas le sens ; et ils avaient peur de l'interroger à ce sujet.
  - type: heading
    content: Qui est le plus grand ?
  - type: heading
    content: Mt 18.1-5  ; Mc 9.33-37
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 22.24ss. –  Ils se mirent à raisonner…  : litt. un raisonnement entra en eux ou entre eux , cf. v. 47n  ; voir 1.29n.'
  - type: text
    content: 'Ils se mirent à raisonner entre eux pour savoir qui, parmi eux, était le plus grand. '
  '47':
  - type: note
    content: 'qui connaissait  : cf. 5.22+ ; 6.8. –  leur raisonnement  : litt. le raisonnement de leur cœur  ; cf. v. 46n.'
  - type: text
    content: 'Jésus, qui connaissait leur raisonnement, prit un enfant, le plaça près de lui '
  '48':
  - type: note
    content: 'Cf. 18.17 ; Mt 10.40+. –  en mon nom  : cf. v. 49 ; 21.8 ; 24.47 ; Ac 4.17s ; 5.28,40 ; 15.14. –  celui qui m''a envoyé  : cf. 4.43 ; 10.16 ; Jn 5.23 ; 7.28 ; 12.44s,49 ; 13.20 ; 17.3,18. –  grand  : autre traduction le plus grand.'
  - type: text
    content: 'et leur dit : Quiconque accueille cet enfant en mon nom m''accueille moi-même ; et quiconque m''accueille accueille celui qui m''a envoyé. En effet, celui qui est le plus petit parmi vous tous, c''est celui-là qui est grand.'
  - type: heading
    content: Ceux qui se servent du nom de Jésus
  - type: heading
    content: Mc 9.38-41
  '49':
  - type: text
    content: ' '
  - type: note
    content: 'Jean v. 54 ; 5.10+. –  Maître 5.5n. –  un homme qui chasse des démons  : cf. v. 1 ; 11.19 ; Ac 16.18 ; 19.13ss ; cf. 8.9-24. –  par ton nom  : cf. 10.17 ; Ps 54.3 ; 124.8 ; Ac 3.16 ; 9.34 ; 16.18. –  empêcher Mc 9.38n  ; cf. Nb 11.28. –  il ne te suit pas…  : litt. il ne suit pas avec nous , ce qui pourrait aussi se traduire  : il n''est pas des nôtres.'
  - type: text
    content: 'Jean dit alors : Maître, nous avons vu un homme qui chasse des démons par ton nom ; et nous avons cherché à l''en empêcher, parce qu''il ne te suit pas avec nous. '
  '5':
  - type: note
    content: 'Cf. 10.11 ; Mt 10.14n  ; Ac 13.50s ; voir aussi 18.6 ; 22.23. –  en sortant…  : cf. 17.29. –  en témoignage (5.14) contre eux ou sur eux.'
  - type: text
    content: 'Et partout où les gens ne vous accueillent pas, en sortant de la ville, secouez la poussière de vos pieds en témoignage contre eux. '
  '50':
  - type: note
    content: Comparer avec 11.23 ; Mc 9.40n.
  - type: text
    content: 'Jésus lui répondit : Ne l''en empêchez pas ; en effet, celui qui n''est pas contre vous est pour vous.'
  - type: heading
    content: Un village des Samaritains refuse d'accueillir Jésus
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'arrivaient  : litt. s''accomplissaient  ; cf. 1.23 ; 2.6,21s ; 21.22 (autres verbes synonymes) ; Ac 2.1 (même verbe). –  où il allait être enlevé  : litt. de son enlèvement  ; cf. v. 31 ; voir 24.51 ; Mc 16.19 ; Ac 1.2,11,22 ; 1Tm 3.16 ; voir aussi Gn 5.24 ; 2R 2.1,11. –  il prit la ferme résolution  : litt. il endurcit (ou affermit ) sa face  ; cf. 2R 12.18n  ; Ez 6.2 ; 13.17 ; 14.8 ; voir aussi Es 50.7. –  se rendre à Jérusalem v. 53 ; 13.22 ; 17.11 ; 18.31 ; 19.28 ; Mt 19.1/ /,15 ; 20.17/ /.'
  - type: text
    content: 'Comme arrivaient les jours où il allait être enlevé, il prit la ferme résolution de se rendre à Jérusalem '
  '52':
  - type: note
    content: 'il envoya devant lui (litt. devant sa face, cf. v. 51n  ; de même en 10.1) des messagers  : cf. 7.27 ; Ml 3.1. –  Samaritains 10.33ss ; 17.16ss ; Ac 1.8 ; 8.1ss,25 ; 9.31 ; 15.3 ; comparer avec Mt 10.5 ; Jn 4.4ss,9n,40 ; voir aussi 2R 17.24ss ; Esd 4.2ss,10n,17. –  préparatifs  : cf. 10.1.'
  - type: text
    content: 'et il envoya devant lui des messagers. Ceux-ci se mirent en route et entrèrent dans un village de Samaritains, afin de faire des préparatifs pour lui. '
  '53':
  - type: note
    content: 'on ne l''accueillit pas  : cf. 10.10. –  il se dirigeait…  : litt. sa face allait vers Jérusalem, cf. v. 51n  ; expression analogue en 2S 17.11 (LXX) pour marcher au combat.'
  - type: text
    content: 'Mais on ne l''accueillit pas, parce qu''il se dirigeait vers Jérusalem. '
  '54':
  - type: note
    content: 'Cf. v. 45 ; 6.29. –  Jacques et Jean 5.10+. –  que nous disions au feu…  : cf. 2R 1.10ss  ; Mc 3.17.'
  - type: text
    content: 'Quand ils virent cela, les disciples Jacques et Jean dirent : Seigneur, veux-tu que nous disions au '
  - type: text
    content: feu
  - type: text
    content: ' de '
  - type: text
    content: descendre du ciel pour les détruire ?
  - type: text
    content: ' '
  '55':
  - type: note
    content: 'se tourna… 10.23 ; 14.25. – A la fin du v. certains mss ajoutent  : et il leur dit : Vous ne savez pas de quel esprit vous êtes (c.-à-d.  : quel esprit vous anime) ; (56) [car, selon quelques mss] le Fils de l''homme n''est pas venu pour perdre (ou pour faire disparaître) des vies (ou des âmes) d''hommes, mais pour les sauver  ; cf. 19.10 ; Jn 3.17.'
  - type: text
    content: 'Il se tourna vers eux et les rabroua. '
  '56':
  - type: note
    content: Cf. 4.30.
  - type: text
    content: Et ils allèrent dans un autre village.
  - type: heading
    content: Ceux qui désirent suivre Jésus
  - type: heading
    content: Mt 8.19-22
  '57':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ap 14.4.
  - type: text
    content: 'Pendant qu''ils étaient en chemin, quelqu''un lui dit : Je te suivrai partout où tu iras. '
  '58':
  - type: note
    content: 'les oiseaux du ciel  : cf. 8.5+. –  le Fils de l''homme 5.24+.'
  - type: text
    content: 'Jésus lui dit : Les renards ont des tanières, les oiseaux du ciel ont des nids, mais le Fils de l''homme n''a pas où poser sa tête. '
  '59':
  - type: note
    content: 'Suis-moi 5.27. –  Seigneur  : le terme correspondant est omis par certains mss. –  ensevelir  : cf. Nb 6.6s ; Mt 8.21n.'
  - type: text
    content: 'Il dit à un autre : Suis-moi. Celui-ci répondit : Seigneur, permets-moi d''aller d''abord ensevelir mon père. '
  '6':
  - type: note
    content: 'partout  : cf. Ac 17.30 ; 24.3 ; 28.22.'
  - type: text
    content: Ils partirent et se mirent à passer de village en village ; ils annonçaient la bonne nouvelle et réalisaient partout des guérisons.
  - type: heading
    content: La perplexité d'Hérode
  - type: heading
    content: Mt 14.1-2  ; Mc 6.14-16
  '60':
  - type: note
    content: Cf. Mt 8.22+. –  annoncer le règne de Dieu v. 2 ; 4.43+ ; 8.1.
  - type: text
    content: 'Il lui dit : Laisse les morts ensevelir leurs morts ; toi, va-t''en annoncer le règne de Dieu. '
  '61':
  - type: note
    content: Cf. 1R 19.19ss. –  prendre congé ou dire adieu  ; le même verbe est traduit par renoncer en 14.33 ; Mc 6.46 ; Ac 18.18,21 ; 2Co 2.13.
  - type: text
    content: 'Un autre dit : Je te suivrai, Seigneur, mais permets-moi d''aller d''abord prendre congé de ceux de ma maison. '
  '62':
  - type: note
    content: 'Jésus lui dit  : certains mss portent Jésus dit. –  en arrière ou derrière (v. 23n) 17.31 ; Jn 6.66 ; Ph 3.13 ; cf. Gn 19.17,26. –  bon pour…  : même expression 14.35. –  le royaume ou le règne de Dieu v. 60.'
  - type: text
    content: 'Jésus lui dit : Quiconque met la main à la charrue et regarde en arrière n''est pas bon pour le royaume de Dieu.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Hérode le tétrarque , c.-à-d. Hérode Antipas, 3.1n. –  Jean  : cf. 3.19s. –  réveillé ou relevé , cf. 1.69n  ; 7.14n  ; voir résurrection.'
  - type: text
    content: 'Hérode le tétrarque apprit tout ce qui se passait, et il était perplexe. Car les uns disaient que Jean s''était réveillé d''entre les morts ; '
  '8':
  - type: note
    content: 'Cf. v. 19. –  Elie 1.17 ; cf. 7.24ss ; Ml 3.23s ; Mt 17.10-11n. –  un des anciens prophètes  : cf. 7.16+ ; Mt 16.14. –  s''était relevé (c.-à-d. avait été ressuscité) : autre traduction était réapparu  ; cf. v. 19 ; voir aussi 16.31 ; 18.33 ; 24.46.'
  - type: text
    content: 'd''autres, qu''Elie était apparu ; d''autres encore, qu''un des anciens prophètes s''était relevé. '
  '9':
  - type: note
    content: qui est-il… v. 18ss ; cf. 5.21 ; 7.20,49 ; 8.25. –  il cherchait à le voir 23.8s ; cf. 8.20 ; voir aussi 13.31ss.
  - type: text
    content: 'Hérode disait : Jean, c''est moi qui l''ai fait décapiter ; alors qui est-il, celui-ci, dont j''entends dire de telles choses ? Et il cherchait à le voir.'
  - type: heading
    content: Jésus rassasie cinq mille hommes
  - type: heading
    content: Mt 14.13-21  ; Mc 6.30-44  ; Jn 6.1-15
