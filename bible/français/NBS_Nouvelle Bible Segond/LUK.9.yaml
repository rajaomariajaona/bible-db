- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il les prit avec lui et se retira à l''écart, du côté d''une ville appelée Bethsaïda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: fq
      children:
