    marker-yv: yv-n
  - type: text
    text: Les foules s'en aperçurent et le suivirent. Il les accueillit ; il leur parlait du règne de Dieu ; il guérit aussi ceux qui avaient besoin de guérison.
- type: usfm
  marker: p
