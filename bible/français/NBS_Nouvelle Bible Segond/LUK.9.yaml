  - type: text
    text: 'Hérode le tétrarque apprit tout ce qui se passait, et il était perplexe. Car les uns disaient que Jean s''était réveillé d''entre les morts ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Elie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.17 ; cf. 7.24ss ; Ml 3.23s ; Mt 17.10-11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un des anciens '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.16+ ; Mt 16.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''était relevé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avait été ressuscité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: était réapparu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 19 ; voir aussi 16.31 ; 18.33 ; 24.46.'
    marker-yv: yv-n
  - type: text
    text: 'd''autres, qu''Elie était apparu ; d''autres encore, qu''un des anciens prophètes s''était relevé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui est-il… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 18ss ; cf. 5.21 ; 7.20,49 ; 8.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il cherchait à le voir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 23.8s ; cf. 8.20 ; voir aussi 13.31ss.
    marker-yv: yv-n
  - type: text
    text: 'Hérode disait : Jean, c''est moi qui l''ai fait décapiter ; alors qui est-il, celui-ci, dont j''entends dire de telles choses ? Et il cherchait à le voir.'
