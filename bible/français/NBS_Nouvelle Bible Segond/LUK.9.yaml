      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le jour commençait à baisser. Les Douze vinrent donc lui dire : Renvoie la foule, pour qu''elle aille se loger et trouver du ravitaillement dans les villages et les hameaux des environs ; car nous sommes ici dans un lieu désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2R 4.42ss.
    marker-yv: yv-n
  - type: text
    text: 'Mais il leur dit : Donnez-leur vous-mêmes à manger. Ils dirent : Nous n''avons pas plus de cinq pains et deux poissons, à moins que nous n''allions nous-mêmes acheter des vivres pour tout ce peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mc 6.40
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',44'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Installez-les
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faites-les s'étendre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 7.36'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'En effet, il y avait environ cinq mille hommes. Il dit à ses disciples : Installez-les par rangées d''une cinquantaine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils firent ainsi ; ils les installèrent tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
