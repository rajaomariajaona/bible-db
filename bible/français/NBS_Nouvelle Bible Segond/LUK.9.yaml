  - type: text
    text: 'Il appela les Douze et leur donna puissance et autorité sur tous les démons, et pour guérir les maladies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'proclamer le règne… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.43+ ; cf. 10.9 ; Ac 28.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: guérir les malades
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent seulement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: guérir.
    marker-yv: yv-n
  - type: text
    text: 'Il les envoya proclamer le règne de Dieu et guérir les malades. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
