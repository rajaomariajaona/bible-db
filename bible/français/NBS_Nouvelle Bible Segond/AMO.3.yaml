document_id: AMO.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur demandera compte à Israël
  - type: text
    content: ' '
  - type: note
    content: Ecoutez… v. 13 ; 4.1 ; 5.1 ; 8.4. –  le clan ou la famille  ; cf. Gn 12.3n. –  que j'ai fait monter… 2.10+.
  - type: text
    content: 'Ecoutez cette parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononce sur vous Israélites, sur tout le clan que j''ai fait monter d''Egypte !'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ils ne savent pas… Jr 4.22. –  ils entassent Es 3.14 ; 5.8ss. –  la violence et le ravage  : peut-être ici au sens concret de rapine ou de butin amassé par la violence  ; cf. Jr 6.7 ; 20.8 ; 48.3 ; Ez 45.9 ; Ha 1.3 ; Mt 23.25.'
  - type: text
    content: Ils ne savent pas agir avec droiture,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: ils entassent dans leurs palais la violence et le ravage.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Il va te dépouiller  : litt. il fait descendre de toi (au féminin) ta force (certains comprennent ta forteresse ) ; cf. Es 14.11.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Un ennemi, tout autour du pays !
  - type: text
    content: Il va te dépouiller de ta force,
  - type: text
    content: et tes palais seront pillés.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.3,15 ; 6.9 ; 9.8 ; Es 1.9+. –  le berger (cf. 1.1n) sauve (ou arrache , cf. 4.11), pour prouver son innocence dans la perte de l''animal ; cf. Gn 31.39 ; Ex 22.12 ; 1S 17.34s. –  sur des lits  : litt. au coin ou au bord d''un lit , peut-être à l''endroit le plus confortable, garni de tapis (6.4) ; la traduction de la fin du v. est incertaine.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Comme le berger sauve de la gueule du lion
  - type: text
    content: deux pattes ou un bout d'oreille,
  - type: text
    content: ainsi seront sauvés les Israélites
  - type: text
    content: qui habitent à Samarie,
  - type: text
    content: eux qui sont allongés sur des lits et des tapis de Damas.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoutez, et témoignez-en  : cf. v. 1+,9+ ; Ml 2.14 ; Ps 50.7 ; 81.9n. –  Jacob 1.1n  ; 9.8. –  Dieu des Armées  : l''expression peut désigner ici l''ensemble des puissances de l''univers (en particulier les astres), que Dieu maîtrise 4.13 ; 5.14ss,27 ; 6.8,14 ; LXX l''a traduite ici par Tout-Puissant  ; voir aussi 1S 1.3n et noms divins.'
  - type: text
    content: Ecoutez, et témoignez-en contre la maison de Jacob !
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', le Dieu des Armées.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: je ferai rendre des comptes v. 2n. –  Beth-El , entre Samarie et Jérusalem, sanctuaire principal du royaume du Nord 4.4 ; 5.5 ; 7.10-13 ; Gn 12.8 ; 28.19 ; 35.7 ; 1R 12.26-33 ; 13.1-5,10 ; 2R 23.15ss ; Os 4.15n. –  les cornes de l'autel , lieu sacré considéré comme inviolable ; cf. Ex 27.2n  ; Lv 4.7,25,30 ; 16.18 ; 1R 1.50ss ; 2.28 ; Jr 17.1.
  - type: text
    content: Le jour où je ferai rendre des comptes à Israël pour ses transgressions,
  - type: text
    content: je lui ferai rendre des comptes pour les autels de Beth-El ;
  - type: text
    content: les cornes de l'autel seront brisées
  - type: text
    content: et tomberont à terre.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Je démolirai  : litt. je frapperai . –  maison d''hiver / maison d''été  : il s''agit, soit de deux parties d''une même demeure (Jg 3.20 ; Jr 36.22), soit de deux résidences séparées. –  maisons d''ivoire 6.4 ; 1R 22.39 ; Ps 45.9 ; on a retrouvé à Samarie des vestiges correspondant à cette description. –  de nombreuses maisons ou de grandes maisons , peut-être s''agissait-il de grandes demeures comportant de nombreuses pièces (5.11 ; 6.11) ; certains modifient le texte hébreu traditionnel pour lire les maisons d''ébène  ; cf. Ez 27.15.'
  - type: text
    content: Je démolirai la maison d'hiver sur la maison d'été,
  - type: text
    content: les maisons d'ivoire disparaîtront ;
  - type: text
    content: ce sera la fin de nombreuses maisons
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je vous ai distingués  : litt. je vous ai connus , cf. 9.7 ; sur ce verbe, cf. Gn 4.1n  ; 18.19n  ; Ex 3.7 ; Dt 9.24 ; Es 63.16 ; Jr 1.5n  ; Os 13.4s ; Mt 7.23 ; 25.12 ; Jn 10.4,14 ; voir aussi Ex 4.22 ; 19.5s ; Dt 7.6ss ; 14.2 ; Es 5.1ss ; 41.8s ; Jr 2.2s ; Ez 16.8 ; Os 11.1 ; Ml 1.2 ; Ps 33.12 ; 135.4. –  c''est pourquoi  : cf. Mt 11.20ss ; Lc 12.47ss. –  je vous ferai rendre des comptes ou j''interviendrai contre vous  : cf. v. 14 ; Ex 20.5 ; Jr 6.15n  ; Os 1.4. –  fautes  : voir péché.'
  - type: text
    content: Je vous ai distingués, vous seuls,
  - type: text
    content: parmi tous les clans de la terre ;
  - type: text
    content: c'est pourquoi je vous ferai rendre des comptes
  - type: text
    content: pour toutes vos fautes.
  - type: heading
    content: 'Le Seigneur parle : le prophète se tairait-il ?'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Sur l'ensemble, cf. Pr 30.18ss. Dans les aphorismes des v. 3-6 un effet manifeste suppose une cause cachée (cf. « il n'y a pas de fumée sans feu ») ; ainsi l'activité du prophète suppose-t-elle un Dieu qui parle (v. 7s). –  sans en avoir convenu ou sans s'être rencontrés ; sans s'être donné rendez-vous.
  - type: text
    content: Deux hommes marchent-ils ensemble,
  - type: text
    content: sans en avoir convenu ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 8 ; 1.2+.
  - type: text
    content: Le lion rugit-il dans les broussailles
  - type: text
    content: sans avoir une proie ?
  - type: text
    content: Le jeune lion pousse-t-il des cris du fond de sa tanière
  - type: text
    content: sans avoir fait une capture ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'tombe-t-il…  : ou, d''après LXX, tombe-t-il à terre.'
  - type: text
    content: L'oiseau tombe-t-il dans le filet qui est à terre
  - type: text
    content: sans qu'il y ait un piège ?
  - type: text
    content: Le filet s'élève-t-il du sol
  - type: text
    content: sans qu'il y ait rien de pris ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: Jr 6.1 ; Ez 33.3,6 ; Os 5.8.
  - type: text
    content: Sonne-t-on de la trompe dans une ville
  - type: text
    content: sans que le peuple tremble ?
  - type: text
    content: Arrive-t-il un malheur dans une ville
  - type: text
    content: 'sans que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en soit l''auteur ?'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur Dieu v. 8,11,13 ; 1.8 ; 4.2,5 ; 5.3 ; 6.8 ; 7.1s,4ss ; 8.1,3,9,11 ; 9.5,8 ; Jr 1.6. –  rien ou aucune parole , le même terme pouvant signifier parole ou chose  ; cf. v. 8. –  ses secrets  : cf. 4.13 ; Jr 23.18,22 (le même terme y est traduit par conseil secret ) ; Ez 13.9 ; Jb 15.8 ; Pr 15.22 ( délibérations secrètes ) ; voir aussi Jn 15.17 ; 17.8,10 ; Rm 16.25s ; Ep 3.3ss. –  ses serviteurs, les prophètes Jr 7.25 ; cf. Ap 10.7.'
  - type: text
    content: 'Ainsi le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' ne fait rien'
  - type: text
    content: sans avoir révélé ses secrets
  - type: text
    content: à ses serviteurs, les prophètes.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'lion v. 4+. –  Le Seigneur Dieu parle…  : cf. v. 7n. –  qui n''agirait (ou ne parlerait ) en prophète ? 2.12+ ; 7.12ss ; Nb 11.25n  ; Jr 2.8n  ; cf. Jr 20.7-9 ; Ac 4.20 ; 1Co 9.16.'
  - type: text
    content: 'Le lion rugit : qui n''aurait peur ?'
  - type: text
    content: 'Le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' parle : qui n''agirait en prophète ?'
  - type: heading
    content: Il ne restera presque rien de Samarie
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ashdod 1.6n,8, sur le chemin de l’ Egypte au sud-ouest ; cf. 2Ch 26.6 ; LXX en Assyrie , désignant le grand empire du nord-est, dans la direction opposée. –  les montagnes (LXX la montagne ) de Samarie , capitale du royaume du Nord (1.1n) ; v. 12 ; 4.1 ; 6.1 ; 8.14 ; cf. 1R 16.24 ; Es 28.1. –  voyez…  : cf. Es 1.2ss ; 5.3s ; 45.20s ; Os 2.4. –  désordres Ez 22.5n. –  oppressions 2.6ss.'
  - type: text
    content: Dans les palais d'Ashdod
  - type: text
    content: 'et dans les palais d''Egypte, proclamez :'
  - type: text
    content: Rassemblez-vous sur les montagnes de Samarie,
  - type: text
    content: et voyez les grands désordres au milieu d'elle,
  - type: text
    content: les oppressions en son sein !
