document_id: 2SA.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David et Bethsabée
  - type: text
    content: ' '
  - type: note
    content: 'Voir 1Ch 20.1. –  A l''année nouvelle  : litt. au retour de l''année , c.-à-d. au printemps  ; cf. 1R 20.22,26. –  les rois  : selon une tradition juive très largement acceptée ; une autre tradition présente un mot hébreu très proche, mais désignant des messagers  ; il s''agirait alors des messagers chargés d''aller porter une déclaration de guerre chez l''ennemi. Des versions anciennes et le texte parallèle de 1Ch 20.1 portent les rois . –  avec ses hommes et tout Israël  : cf. 10.7n,17n. –  détruire  : reprise de la guerre racontée au chap. 10. –  Rabba  : cf. 10.3n.'
  - type: text
    content: 'A l''année nouvelle, au temps où les rois partent en campagne, David envoya Joab, avec ses hommes et tout Israël, pour détruire les Ammonites et assiéger Rabba. David, lui, resta à Jérusalem. '
  '10':
  - type: text
    content: 'On vint dire à David : Urie n''est pas descendu chez lui. Alors David dit à Urie : N''arrives-tu pas de voyage ? Pourquoi n''es-tu pas descendu chez toi ? '
  '11':
  - type: note
    content: 'Le Coffre  : voir 15.24-29 ; 1S 4.1–7.1, en particulier 4.3-8. –  des huttes  : des installations provisoires pour les troupes en campagne ; cf. 1R 20.12,16. –  pour coucher avec ma femme  : les relations sexuelles semblent avoir été prohibées pour les soldats en campagne (cf. 1S 21.5s). –  Par ta propre vie  : litt. par ta vie et par la vie de ton être (cf. Gn 1.20n), formule de serment renforcé, voir 1S 1.26n.'
  - type: text
    content: 'Urie répondit à David : Le Coffre, Israël et Juda habitent dans des huttes, mon maître Joab et les hommes campent en rase campagne, et moi, je rentrerais chez moi pour manger et boire et pour coucher avec ma femme ! Par ta propre vie, je ne ferai pas une chose pareille ! '
  '12':
  - type: note
    content: 'et le lendemain  : certains mss de versions anciennes rattachent ces mots à la suite  : Le lendemain, (13) David l''invita…'
  - type: text
    content: 'David dit à Urie : Reste encore ici aujourd''hui, et demain je te renverrai. Urie resta à Jérusalem ce jour-là et le lendemain. '
  '13':
  - type: note
    content: 'il l''enivra  : David espère que, l''alcool aidant, Urie ira quand même retrouver sa femme ; voir Gn 19.33,35 ; Ha 2.15. –  les hommes de la garde  : litt. les serviteurs de son seigneur.'
  - type: text
    content: David l'invita à manger et à boire devant lui et il l'enivra ; le soir, Urie sortit et se coucha avec les hommes de la garde, mais il ne descendit pas chez lui.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Le stratagème qu''il a imaginé ayant échoué, David se résout à recourir à un assassinat camouflé en incident de guerre. –  écrivit une lettre  : cf. 1R 21.8s ; 2R 10.1.'
  - type: text
    content: 'Au matin, David écrivit une lettre à Joab et l''envoya par l''intermédiaire d''Urie. '
  '15':
  - type: note
    content: et qu'il meure 12.9 ; cf. 1S 18.17,25.
  - type: text
    content: 'Il écrivit dans cette lettre : Placez Urie à la pointe du combat le plus violent et retirez-vous derrière lui, afin qu''il soit frappé et qu''il meure.'
  - type: heading
    content: Mort d'Urie, mari de Bethsabée
  '16':
  - type: text
    content: ' '
  - type: note
    content: qui avait observé ou qui surveillait  ; le verbe hébreu signifie habituellement garder  ; certains, à la suite de Vg, le rendent par qui assiégeait . – Cf. Pr 29.12 ; Ac 5.29.
  - type: text
    content: 'Joab, qui avait observé la ville, plaça Urie à un endroit où il savait qu''il y avait des adversaires aguerris. '
  '17':
  - type: note
    content: 'les hommes de David  : litt. les serviteurs de David  ; le même mot a aussi été traduit gens de la cour de… aux v. 9,13. –  mourut  : cf. Ps 51.16.'
  - type: text
    content: 'Les hommes de la ville firent une sortie pour combattre Joab ; il en tomba parmi la troupe, parmi les hommes de David, et Urie, le Hittite, mourut aussi. '
  '18':
  - type: note
    content: 'envoya un messager faire un rapport  : litt. envoya et il rapporta  ; voir 17.16 ; 18.21.'
  - type: text
    content: 'Joab envoya un messager faire un rapport à David sur tout ce qui s''était passé lors du combat. '
  '19':
  - type: note
    content: 'tous les détails  : litt. toutes les choses.'
  - type: text
    content: 'Il donna cet ordre au messager : Quand tu auras achevé de raconter au roi tous les détails du combat, '
  '2':
  - type: note
    content: 'le toit…  : litt. le toit de la maison du roi  ; il s''agit du toit plat des maisons orientales, qui peut servir de terrasse (voir Dt 22.8n). –  de là  : litt. du toit, qui surplombe les demeures avoisinantes. –  très belle  : litt. très belle d''apparence.'
  - type: text
    content: 'Un soir, David se leva de son lit et alla se promener sur le toit en terrasse de la maison du roi ; de là il aperçut une femme qui se baignait ; elle était très belle. '
  '20':
  - type: note
    content: 'éclate  : litt. s''élève. –  qu''on lance des projectiles  : cf. v. 24n.'
  - type: text
    content: 'si la fureur du roi éclate et qu''il te dise : « Pourquoi êtes-vous allés combattre si près de la ville ? Ne savez-vous pas qu''on lance des projectiles du haut de la muraille ? '
  '21':
  - type: note
    content: 'L''épisode rappelé dans ce v. est raconté en Jg 9.50-54 ; dans le chap. en question, Yeroub-Bésheth est appelé Yeroub-Baal. –  une femme  : cf. 20.16-22. – Sur Tébets, cf. Jg 9.50n.'
  - type: text
    content: 'Qui a tué Abimélek, fils de Yeroub-Bésheth ? N''est-ce pas une femme qui a lancé sur lui, du haut de la muraille, une meule de moulin ? N''est-ce pas ainsi qu''il est mort à Tébets ? Pourquoi vous êtes-vous approchés de la muraille ? » Alors tu diras : « Ton serviteur Urie, le Hittite, est mort aussi. »'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Avec un art consommé, le narrateur a réparti les informations relatives à ce combat, sans répétitions, entre le récit proprement dit de la bataille (v. 16s), l'ordre donné au messager (v. 19-21) et le rapport fait par ce dernier (v. 23s). LXX insère entre les v. 22 et 23 un assez long texte répétant par le menu ce que Joab avait dit au messager.
  - type: text
    content: 'Le messager partit. A son arrivée, il fit un rapport à David sur tout ce pour quoi Joab l''avait envoyé. '
  '23':
  - type: note
    content: 'l''entrée de la porte de la ville  : litt. l''entrée de la porte, cf. 10.8n.'
  - type: text
    content: 'Le messager dit à David : Ces hommes ont eu l''avantage sur nous ; ils ont fait une sortie contre nous, à l''extérieur, et nous les avons repoussés jusqu''à l''entrée de la porte de la ville ; '
  '24':
  - type: note
    content: 'on a lancé des projectiles  : litt. les lanceurs ont lancé (autre lecture traditionnelle) les frayeurs ont vu ( ?). Des versions anciennes ont traduit les archers ont tiré ou une tournure analogue.'
  - type: text
    content: 'on a lancé des projectiles sur tes hommes du haut de la muraille, et certains de tes hommes sont morts ; ton serviteur Urie, le Hittite, est mort aussi. '
  '25':
  - type: note
    content: 'Que cela ne te déplaise pas  : litt. que cette chose ne soit pas mauvaise à tes yeux  ; cf. 1S 18.8n. –  l''épée dévore tantôt l''un, tantôt l''autre signifie à la guerre, on déplore inévitablement des morts dans chaque camp  ; cf. Ec 9.2s,12. –  rase-la  : cf. 12.26. –  encourage-le  : litt. fortifie-le.'
  - type: text
    content: 'David dit au messager : Tu parleras ainsi à Joab : « Que cela ne te déplaise pas ; l''épée dévore tantôt l''un, tantôt l''autre. Attaque courageusement la ville et rase-la ! » Et toi, encourage-le.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: se lamenter sur son époux 1.12 ; 1S 25.1 ; cf. 2S 14.2.
  - type: text
    content: 'La femme d''Urie apprit que son mari était mort, et elle se mit à se lamenter sur son époux. '
  '27':
  - type: note
    content: 'David accomplit son dessein sous le couvert d''une action charitable envers une pauvre veuve de guerre. –  Ce que David avait fait…  : litt. la chose que David avait faite fut mauvaise aux yeux du Seigneur.'
  - type: text
    content: Quand le deuil fut passé, David l'envoya chercher et la recueillit chez lui. Elle devint sa femme et lui donna un fils.
  - type: text
    content: 'Ce que David avait fait déplut au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: note
    content: 'On lui dit…  : autre traduction il dit : N''est-ce pas là Bethsabée… ? –  Bethsabée  : hébreu Bath-Shéva‘ ou Bath-Shéba  ; signification incertaine  : fille du serment, fille de sept ou peut-être fille d''abondance ( ?) ; cf. 1R 1.11+. –  Urie, le Hittite  : soldat étranger servant dans l''armée de David (cf. 23.39) ; sur les Hittites, voir Gn 10.15n  ; Jos 1.4n.'
  - type: text
    content: 'David envoya prendre des informations sur cette femme. On lui dit : C''est Bethsabée, fille d''Eliam, femme d''Urie, le Hittite. '
  '4':
  - type: note
    content: 'Elle se rendit auprès de lui  : autre traduction elle alla avec lui (cf. 12.24). –  il coucha avec elle  : cf. Ps 51.2 ; Jb 31.9-12. –  elle se consacrait ou elle se sanctifiait (voir saint) ; l''expression traduite par pour se purifier est sous-entendue dans le texte. –  de son impureté, c.-à-d. de ses règles, ce qui indique qu''elle n''était pas enceinte et explique peut-être qu''elle soit dans une période de fécondité (après les sept jours d''attente évoqués en Lv 15.28) ; le mot hébreu correspondant manque dans un ms de Qumrân, mais sans que le sens en soit affecté.'
  - type: text
    content: 'David envoya des messagers la chercher. Elle se rendit auprès de lui, et il coucha avec elle alors qu''elle se consacrait pour se purifier de son impureté ; puis elle rentra chez elle. '
  '5':
  - type: note
    content: Cf. Gn 38.24s.
  - type: text
    content: 'La femme fut enceinte ; elle fit dire à David : Je suis enceinte.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 29.15 ; Pr 28.13.
  - type: text
    content: 'Alors David fit dire à Joab : Envoie-moi Urie, le Hittite ; et Joab envoya Urie à David. '
  '7':
  - type: note
    content: qui lui demanda comment allait… ou qui lui demanda des nouvelles de…  ; l'expression emploie le terme habituellement traduit par paix, litt. qui l'interrogea sur la paix de Joab, sur la paix du peuple et sur la paix de la guerre.
  - type: text
    content: 'Urie se rendit auprès de David, qui lui demanda comment allait Joab, comment allait le peuple et comment allait la guerre. '
  '8':
  - type: note
    content: 'chez toi  : litt. dans ta maison. –  te laver les pieds  : cf. Gn 18.4n  ; 19.2 ; l''expression pourrait avoir pris le sens plus général de se mettre à l''aise. Certains pensent toutefois qu''elle pourrait avoir ici la valeur d''un euphémisme signifiant plus précisément avoir des relations sexuelles. –  un présent du roi  : problablement une portion de nourriture de la table royale.'
  - type: text
    content: 'Puis David dit à Urie : Descends donc chez toi te laver les pieds. Urie sortit de la maison du roi, suivi d''un présent du roi. '
  '9':
  - type: note
    content: 'à l''entrée  : le corps de garde se trouvait à proximité de l''entrée du palais.'
  - type: text
    content: 'Mais Urie se coucha à l''entrée de la maison du roi, avec tous les hommes de la garde, et il ne descendit pas chez lui. '
