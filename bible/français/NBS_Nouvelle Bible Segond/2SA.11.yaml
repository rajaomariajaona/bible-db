document_id: 2SA.11,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David et Bethsabée
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir 1Ch 20.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: A l'année nouvelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au retour de l'année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au printemps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 1R 20.22,26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les rois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : selon une tradition juive très largement acceptée ; une autre tradition présente un mot hébreu très proche, mais désignant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des messagers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; il s''agirait alors des messagers chargés d''aller porter une déclaration de guerre chez l''ennemi. Des versions anciennes et le texte parallèle de 1Ch 20.1 portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les rois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec ses hommes et tout Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: détruire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : reprise de la guerre racontée au chap. 10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rabba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'A l''année nouvelle, au temps où les rois partent en campagne, David envoya Joab, avec ses hommes et tout Israël, pour détruire les Ammonites et assiéger Rabba. David, lui, resta à Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'On vint dire à David : Urie n''est pas descendu chez lui. Alors David dit à Urie : N''arrives-tu pas de voyage ? Pourquoi n''es-tu pas descendu chez toi ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le Coffre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 15.24-29 ; 1S 4.1–7.1, en particulier 4.3-8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des huttes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : des installations provisoires pour les troupes en campagne ; cf. 1R 20.12,16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour coucher avec ma femme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les relations sexuelles semblent avoir été prohibées pour les soldats en campagne (cf. 1S 21.5s). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Par ta propre vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'par ta vie et par la vie de ton être '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), formule de serment renforcé, voir 1S 1.26
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Urie répondit à David : Le Coffre, Israël et Juda habitent dans des huttes, mon maître Joab et les hommes campent en rase campagne, et moi, je rentrerais chez moi pour manger et boire et pour coucher avec ma femme ! Par ta propre vie, je ne ferai pas une chose pareille ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et le lendemain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss de versions anciennes rattachent ces mots à la suite'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Le lendemain, (13) David l'invita…
      marker-yv: yv-n
    - type: text
      text: 'David dit à Urie : Reste encore ici aujourd''hui, et demain je te renverrai. Urie resta à Jérusalem ce jour-là et le lendemain. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il l'enivra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : David espère que, l''alcool aidant, Urie ira quand même retrouver sa femme ; voir Gn 19.33,35 ; Ha 2.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les hommes de la garde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les serviteurs de son seigneur.
      marker-yv: yv-n
    - type: text
      text: David l'invita à manger et à boire devant lui et il l'enivra ; le soir, Urie sortit et se coucha avec les hommes de la garde, mais il ne descendit pas chez lui.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le stratagème qu''il a imaginé ayant échoué, David se résout à recourir à un assassinat camouflé en incident de guerre. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écrivit une lettre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1R 21.8s ; 2R 10.1.'
      marker-yv: yv-n
    - type: text
      text: 'Au matin, David écrivit une lettre à Joab et l''envoya par l''intermédiaire d''Urie. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et qu''il meure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.9 ; cf. 1S 18.17,25.
      marker-yv: yv-n
    - type: text
      text: 'Il écrivit dans cette lettre : Placez Urie à la pointe du combat le plus violent et retirez-vous derrière lui, afin qu''il soit frappé et qu''il meure.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort d'Urie, mari de Bethsabée
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui avait observé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui surveillait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le verbe hébreu signifie habituellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: garder
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains, à la suite de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ', le rendent par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui assiégeait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . – Cf. Pr 29.12 ; Ac 5.29.
      marker-yv: yv-n
    - type: text
      text: 'Joab, qui avait observé la ville, plaça Urie à un endroit où il savait qu''il y avait des adversaires aguerris. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les hommes de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les serviteurs de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même mot a aussi été traduit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'gens de la cour de… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aux v. 9,13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mourut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 51.16.'
      marker-yv: yv-n
    - type: text
      text: 'Les hommes de la ville firent une sortie pour combattre Joab ; il en tomba parmi la troupe, parmi les hommes de David, et Urie, le Hittite, mourut aussi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: envoya un messager faire un rapport
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: envoya et il rapporta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir 17.16 ; 18.21.'
      marker-yv: yv-n
    - type: text
      text: 'Joab envoya un messager faire un rapport à David sur tout ce qui s''était passé lors du combat. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous les détails
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toutes les choses.
      marker-yv: yv-n
    - type: text
      text: 'Il donna cet ordre au messager : Quand tu auras achevé de raconter au roi tous les détails du combat, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le toit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le toit de la maison du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agit du toit plat des maisons orientales, qui peut servir de terrasse (voir Dt 22.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du toit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui surplombe les demeures avoisinantes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: très belle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: très belle d'apparence.
      marker-yv: yv-n
    - type: text
      text: 'Un soir, David se leva de son lit et alla se promener sur le toit en terrasse de la maison du roi ; de là il aperçut une femme qui se baignait ; elle était très belle. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: éclate
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'élève
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'on lance des projectiles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'si la fureur du roi éclate et qu''il te dise : « Pourquoi êtes-vous allés combattre si près de la ville ? Ne savez-vous pas qu''on lance des projectiles du haut de la muraille ? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L''épisode rappelé dans ce v. est raconté en Jg 9.50-54 ; dans le chap. en question, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Yeroub-Bésheth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est appelé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yeroub-Baal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une femme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.16-22. – Sur '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tébets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jg 9.50'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Qui a tué Abimélek, fils de Yeroub-Bésheth ? N''est-ce pas une femme qui a lancé sur lui, du haut de la muraille, une meule de moulin ? N''est-ce pas ainsi qu''il est mort à Tébets ? Pourquoi vous êtes-vous approchés de la muraille ? » Alors tu diras : « Ton serviteur Urie, le Hittite, est mort aussi. »'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Avec un art consommé, le narrateur a réparti les informations relatives à ce combat, sans répétitions, entre le récit proprement dit de la bataille (v. 16s), l''ordre donné au messager (v. 19-21) et le rapport fait par ce dernier (v. 23s). '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' insère entre les v. 22 et 23 un assez long texte répétant par le menu ce que Joab avait dit au messager.'
      marker-yv: yv-n
    - type: text
      text: 'Le messager partit. A son arrivée, il fit un rapport à David sur tout ce pour quoi Joab l''avait envoyé. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'entrée de la porte de la ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'entrée de la porte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 10.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le messager dit à David : Ces hommes ont eu l''avantage sur nous ; ils ont fait une sortie contre nous, à l''extérieur, et nous les avons repoussés jusqu''à l''entrée de la porte de la ville ; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on a lancé des projectiles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les lanceurs ont lancé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre lecture traditionnelle) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les frayeurs ont vu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '( ?). Des versions anciennes ont traduit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les archers ont tiré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou une tournure analogue.
      marker-yv: yv-n
    - type: text
      text: 'on a lancé des projectiles sur tes hommes du haut de la muraille, et certains de tes hommes sont morts ; ton serviteur Urie, le Hittite, est mort aussi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que cela ne te déplaise pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que cette chose ne soit pas mauvaise à tes yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1S 18.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''épée dévore tantôt l''un, tantôt l''autre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la guerre, on déplore inévitablement des morts dans chaque camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ec 9.2s,12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rase-la
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: encourage-le
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fortifie-le.
      marker-yv: yv-n
    - type: text
      text: 'David dit au messager : Tu parleras ainsi à Joab : « Que cela ne te déplaise pas ; l''épée dévore tantôt l''un, tantôt l''autre. Attaque courageusement la ville et rase-la ! » Et toi, encourage-le.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se lamenter sur son époux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.12 ; 1S 25.1 ; cf. 2S 14.2.
      marker-yv: yv-n
    - type: text
      text: 'La femme d''Urie apprit que son mari était mort, et elle se mit à se lamenter sur son époux. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'David accomplit son dessein sous le couvert d''une action charitable envers une pauvre veuve de guerre. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ce que David avait fait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la chose que David avait faite fut mauvaise aux yeux du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Quand le deuil fut passé, David l'envoya chercher et la recueillit chez lui. Elle devint sa femme et lui donna un fils.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce que David avait fait déplut au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On lui dit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il dit : N''est-ce pas là Bethsabée… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bethsabée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Bath-Shéva‘ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bath-Shéba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; signification incertaine'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fille du serment, fille de sept '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fille d''abondance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '( ?) ; cf. 1R 1.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Urie, le Hittite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : soldat étranger servant dans l''armée de David (cf. 23.39) ; sur les '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: Hittites
        - type: text
          text: ', voir Gn 10.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jos 1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David envoya prendre des informations sur cette femme. On lui dit : C''est Bethsabée, fille d''Eliam, femme d''Urie, le Hittite. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elle se rendit auprès de lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'elle alla avec lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 12.24). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il coucha avec elle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 51.2 ; Jb 31.9-12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'elle se consacrait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'elle se sanctifiait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: ') ; l''expression traduite par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour se '
        - type: usfm
          marker: w
          children:
          - type: text
            text: purifier
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est sous-entendue dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de son impureté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ses règles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui indique qu''elle n''était pas enceinte et explique peut-être qu''elle soit dans une période de fécondité (après les sept jours d''attente évoqués en Lv 15.28) ; le mot hébreu correspondant manque dans un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ', mais sans que le sens en soit affecté.'
      marker-yv: yv-n
    - type: text
      text: 'David envoya des messagers la chercher. Elle se rendit auprès de lui, et il coucha avec elle alors qu''elle se consacrait pour se purifier de son impureté ; puis elle rentra chez elle. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 38.24s.
      marker-yv: yv-n
    - type: text
      text: 'La femme fut enceinte ; elle fit dire à David : Je suis enceinte.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Es 29.15 ; Pr 28.13.
      marker-yv: yv-n
    - type: text
      text: 'Alors David fit dire à Joab : Envoie-moi Urie, le Hittite ; et Joab envoya Urie à David. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui lui demanda comment allait… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui lui demanda des nouvelles de…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; l''expression emploie le terme habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui l'interrogea sur la paix de Joab, sur la paix du peuple et sur la paix de la guerre.
      marker-yv: yv-n
    - type: text
      text: 'Urie se rendit auprès de David, qui lui demanda comment allait Joab, comment allait le peuple et comment allait la guerre. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chez toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans ta maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: te laver les pieds
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 18.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 19.2 ; l''expression pourrait avoir pris le sens plus général de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se mettre à l'aise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Certains pensent toutefois qu''elle pourrait avoir ici la valeur d''un euphémisme signifiant plus précisément '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avoir des relations sexuelles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un présent du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : problablement une portion de nourriture de la table royale.'
      marker-yv: yv-n
    - type: text
      text: 'Puis David dit à Urie : Descends donc chez toi te laver les pieds. Urie sortit de la maison du roi, suivi d''un présent du roi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'entrée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le corps de garde se trouvait à proximité de l''entrée du palais.'
      marker-yv: yv-n
    - type: text
      text: 'Mais Urie se coucha à l''entrée de la maison du roi, avec tous les hommes de la garde, et il ne descendit pas chez lui. '
