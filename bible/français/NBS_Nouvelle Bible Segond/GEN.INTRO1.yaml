document_id: GEN.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le livre des genèses
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le mot Genèse nous vient de la Bible grecque où le terme '
  - type: usfm
    marker: it
    children:
    - type: text
      text: genesis
  - type: text
    text: ' traduit l''hébreu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: toledoth
  - type: text
    text: ', que l''on rend approximativement par « générations » ou '
  - type: usfm
    marker: it
    children:
    - type: text
      text: généalogie
  - type: text
    text: '. Le mot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: toledoth
  - type: text
    text: ' apparaît pour la première fois en 2.4, où la Bible grecque porte : « Voilà le livre de la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: genèse
  - type: text
    text: ' (ou de la génération, de l''origine) du ciel et de la terre. » Par la suite, ce mot-clef revient plusieurs fois dans le corps de l''ouvrage. Il scande la narration en rappelant, à chacune des grandes étapes, que l''on poursuit toujours la réflexion théologique concernant les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: origines
  - type: text
    text: ', et donc la manière dont le peuple de la Bible doit comprendre sa propre origine et son propre destin.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Il y a ainsi les '
  - type: usfm
    marker: it
    children:
    - type: text
      text: toledoth
  - type: text
    text: ' ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: généalogies,
  - type: text
    text: ' ou origines) du ciel et de la terre (2.4), d''Adam (5.1), de Noé (6.9), des trois fils de Noé (10.1), des fils de Sem (10.10), de Térah, le père d''Abram (11.27), d''Ismaël, l''ancêtre des douze tribus du nord de l''Arabie (25.12), d''Isaac (25.19), d''Esaü, l''ancêtre des Edomites (36.1), et finalement de Jacob-Israël, l''ancêtre qui donnera son nom au peuple (37.2).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: titre
  - type: text
    text: ' hébreu du livre est constitué, comme souvent dans la tradition des scribes, par le premier mot du texte : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be-ré'shith = au commencement
  - type: text
    text: . De fait, l'accent porte sur l'initiative de Dieu. Le livre révèle que Dieu, qui est à l'origine de tout, conçoit un projet particulier dans le cadre de l'histoire humaine ; il s'y attache dès l'appel adressé aux premiers pères (les patriarches) auxquels il attribue le pays de Canaan. Pourtant, le peuple de la promesse n'en prendra réellement possession qu'après de multiples péripéties, y compris un séjour assez long en Egypte.
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le traité des origines
- type: usfm
  marker: is2
  children:
  - type: text
    text: (chap. 1–11)
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La narration biblique sur les origines occupe les onze premiers chapitres. Ceux-ci appartiennent à un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: genre littéraire
  - type: text
    text: ' assez particulier dont le lecteur doit être averti. Il s''agit en effet d''une succession de tableaux offerts à la méditation de la foi. A ce titre, ils revêtent certains atours de la parabole. Leur intérêt ne réside pas dans l''anecdote : ce qu''ils racontent ne concerne pas seulement l''homme d''un lointain passé, mais aussi le lecteur de tous les temps. Ces pages primordiales évoquent ainsi les problèmes éternels du sens de la vie, du mal, de la mort et de l''espérance.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Voici les principaux '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: thèmes
  - type: text
    text: ' abordés dans ces récits des origines :'
- type: usfm
  marker: im
  children:
  - type: text
    text: —La création (texte I) comme organisation d'un temps et d'un espace dont le couple humain est le gérant mandaté par Dieu (1.1–2.3).
- type: usfm
  marker: im
  children:
  - type: text
    text: —Origines (texte II) de la vie, de l'agriculture, du langage, du couple, de l'hostilité de la nature, de la procréation, de la douleur et de la mort. Le récit met en scène un dialogue entre Dieu et les hommes, une transgression humaine et un châtiment divin (2.4–3.24).
- type: usfm
  marker: im
  children:
  - type: text
    text: —Irruption de la violence et apparition de la civilisation urbaine (Caïn et Abel, 4.1-16).
- type: usfm
  marker: im
  children:
  - type: text
    text: —La racine du mal est au cœur de l'homme, dès sa prime jeunesse (le déluge, 6.1–8.22).
- type: usfm
  marker: im
  children:
  - type: text
    text: —La grâce d'une alliance réaliste (l'alliance de Noé, 9).
- type: usfm
  marker: im
  children:
  - type: text
    text: —La table des peuples (10).
- type: usfm
  marker: im
  children:
  - type: text
    text: —Dans son ambition démesurée, l'humanité technicienne égalerait-elle Dieu ? La diversité des cultures et des langages la ramène sur terre (la tour de Babel, 11.1-9).
- type: usfm
  marker: is2
  children:
  - type: text
    text: Les traditions patriarcales
- type: usfm
  marker: is2
  children:
  - type: text
    text: (11.27–36.43)
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Après la dispersion des peuples sur la terre (10), liée à l''effondrement de Babylone (11), le récit campe le portrait de plusieurs figures essentielles pour la mémoire d''Israël, figures qu''on appelle communément les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: patriarches
  - type: text
    text: . C'est à ces grands ancêtres qu'on doit la conscience nationale et la fierté de posséder un pays. Mais là encore, il ne s'agit pas d'une simple aventure humaine.
- type: usfm
  marker: ip
  children:
  - type: text
    text: La geste d'Abraham et d'Isaac, celle de Jacob, et même l'histoire de Joseph, sont là pour instruire le peuple de Dieu, pour le convaincre qu'il appartient toujours, des siècles plus tard, à un grand destin. Ainsi la saga des grands ancêtres visite tous les lieux qu'on se disputera, avec des enjeux religieux, au cours de l'histoire tourmentée du pays.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Des éléments de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: géographie politique
  - type: text
    text: ' peuvent ainsi être aisément repérés tout au long des généalogies et autres récits de mariages ou notices familiales dont le texte est parsemé. Ces repères familiaux exercent le même attrait que les recherches généalogiques d''aujourd''hui et remplissent des fonctions analogues. Par eux on peut savoir d''où l''on vient, expliquer telle relation de voisinage ou tel degré de parenté, et valider la transmission du patrimoine.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Un regard porté sur la répartition des territoires entre les tribus issues de Jacob est éclairant sur ce point. Car non seulement on y verra fonctionner le système des droits d''aînesse, respectés ou renversés, mais telles faveurs et telles préséances bien expliquées dans le texte de la Genèse réapparaissent d''une manière assez parlante sur la carte. En effet, la géographie politique elle-même traduit le cheminement de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: bénédiction
  - type: text
    text: ' (cf. 30.24 ; 35.16-19 ; 48.5–49.27). Et que dire du chapitre 49, le discours de Jacob mourant à ses douze fils, véritable testament prophétique où s''étalent, dans un langage à peine crypté, les informations nécessaires à l''intelligence du destin historique, parfois mouvementé, des tribus d''Israël ?'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Quatre grandes figures dominent donc la geste patriarcale : Abraham, Isaac et Jacob, et finalement Joseph, le onzième fils de Jacob. La répartition de leurs histoires dans le livre de la Genèse ne s''opère pas de manière absolument méthodique et tranchée. Il est manifeste qu''au moment de la rédaction on s''est trouvé en présence d''une surabondance de récits attachés aux souvenirs des grands ancêtres.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le tableau ci-dessous contribuera à clarifier les choses.
- type: usfm
  marker: is2
  children:
  - type: text
    text: Abraham
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le « chevalier de la foi », comme l''a dénommé Kierkegaard, porte deux noms dans la Bible. Primitivement appelé '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Abram
  - type: text
    text: ' (« Le père [est] élevé »), il sera ensuite désigné, à partir de la conclusion de l''alliance au chapitre 17, sous le nom développé d'''
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Abraham
  - type: text
    text: ' (interprété comme « Père d''une multitude »).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Abram, originaire de la ville d''Our, près de Babylone, fait une apparition soudaine dans l''histoire biblique : il prend la décision de tout quitter pour se rendre à l''appel de Dieu.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dès cette page du chapitre 12, le patriarche représente le croyant, capable de décision fondamentale, sous la seule impulsion de la foi et sans aucune garantie humaine. Le voici donc en '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Canaan
  - type: text
    text: ' (cf. Gn 9.18'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ). Du nord au sud, Abram parcourt la chaîne montagneuse de Cisjordanie, en s'établissant tout d'abord à Sichem (l'actuelle Naplouse), puis à Beth-El, Hébron et Bersabée (ou Béer-Shéba).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Au gré de ses pérégrinations, son '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: portrait
  - type: text
    text: ' se diversifie cependant : on aurait peine à reconnaître le modèle romantique du croyant absolu dans l''homme qui fait passer sa femme pour sa sœur par crainte des Egyptiens ou des Philistins (12.10ss ; 20.1ss), qui négocie pied à pied le sort de Sodome (18.16ss) ou qui s''empêtre dans la rivalité de deux femmes, sans adopter une position claire (chap. 16 ; 21). Le grand seigneur du désert à l''hospitalité légendaire (chap. 18), généreux et pacifique dans la résolution d''un conflit avec Loth (chap. 13), va même se transformer, inopinément, en chef de guerre victorieux dans une bataille gigantesque (chap. 14). Rien d''étonnant, dès lors, que jusqu''à nos jours la paternité d''Abraham soit invoquée de multiples façons.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Quoi qu''il en soit, la grande épreuve de sa vie, celle qui lui vaudra à coup sûr son titre de père des croyants, va se nouer autour de sa progéniture. Alors qu''Abraham et Sara n''ont pas eu d''enfant et qu''ils approchent de leur fin, Dieu leur promet en effet une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: descendance
  - type: text
    text: '. Et quand l''enfant du miracle, Isaac, sera enfin là, Dieu va précipiter Abraham dans une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: épreuve
  - type: text
    text: ' apparemment absurde en lui demandant de le sacrifier. Le chapitre 22 de la Genèse est un des sommets de la littérature en raison de l''enjeu (la bénédiction est réduite à néant si l''unique héritier de la promesse vient à disparaître) et de l''horreur de l''exigence divine (un sacrifice humain). Abraham sortira vainqueur de cette épreuve, et Isaac aura été épargné. Bien plus, parce qu''Abraham a, dans cette situation extrême, obéi quand même à l''injonction de la foi, l''avenir de sa descendance sera connu et envié de tous ; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: toutes les nations de la terre se béniront par
  - type: text
    text: ' sa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: descendance
  - type: text
    text: ' (22.18 ; cf. 12.3'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ).
- type: usfm
  marker: is2
  children:
  - type: text
    text: Isaac
- type: usfm
  marker: ip
  children:
  - type: text
    text: Du mystérieux mont Moriya (22.2
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ') où s''est déroulé ce drame, on revient alors à '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Bersabée
  - type: text
    text: ' qui est le point d''ancrage d''Isaac, le patriarche méconnu. Il est vrai que, coincée entre les statures colossales de son père Abraham et de son fils Jacob-Israël, sa vie manque un peu de relief.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: On notera cependant que la tradition de la Synagogue s'est emparée d'Isaac pour en faire le héros principal de Genèse 22, avec le thème très porteur de l'
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: aqéda
  - type: text
    text: ', la « ligature », que le jeune garçon semble accepter sans broncher au moment où son père l''installe sur le bûcher (v. 9'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ). Le christianisme des premiers siècles n'a pas hésité à y voir la figure du Fils unique offert par l'amour du Père et consentant à son propre sacrifice.
- type: usfm
  marker: is2
  children:
  - type: text
    text: Jacob
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'C''est sans doute à Jacob que se rapporte le passage de Deutéronome 26.5-9, qui est souvent considéré comme un très ancien credo d''Israël. Nous avons là l''institution d''un usage liturgique encore vivant aujourd''hui dans la célébration juive de la Pâque. Cette instruction en forme de rappel conduit le croyant à affirmer que son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: père
  - type: text
    text: ' (Jacob, selon toute vraisemblance) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: était un Araméen nomade ; il est descendu en Egypte avec peu de gens
  - type: text
    text: '… Puis, entrant toujours davantage dans le jeu de cette nostalgie théologique, le croyant affirmera : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Les Egyptiens
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: nous
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ont maltraités, humiliés et soumis à un dur esclavage
  - type: text
    text: .
- type: usfm
  marker: ip
  children:
  - type: text
    text: Par la foi, le destinataire de la Bible s'associe donc à la famille de Jacob. C'est de cette manière qu'il s'intègre, lui aussi, dans les alliances et les promesses dont Jacob a été le dépositaire.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le personnage est insolite : tour à tour calculateur ou dévot, il n''hésite pas à recourir à la ruse pour s''adjuger les bénédictions de la foi. Témoin les cris déchirants d''Esaü après le vol de la bénédiction et la fuite éperdue vers l''oncle Laban, commencement d''un véritable '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: voyage
  - type: text
    text: ' initiatique — qui est aussi celui du croyant.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Deux grands moments théologiques marquent cette épopée. C''est d''abord (chap. 28) la nuit où le patriarche, voyant en rêve une sorte d''escalier qui relie la terre au ciel, comprend que le lieu où il se trouve est sacré. A cet endroit, il reçoit une promesse formelle : il héritera, pour lui et pour sa descendance, la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: terre
  - type: text
    text: ' où il est couché. Beth-El (« Maison d''El » ou « Maison de Dieu », cf. 28.19'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ), lieu de cette révélation, deviendra un sanctuaire national.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Lorsqu''il revient de Transjordanie, deux fois marié et père de onze enfants, riche de biens et d''expérience, c''est la nuit prodigieuse du Yabboq (chap. 32). Là, durant des heures, il est aux prises avec un adversaire divin qu''il ne laissera pas partir avant l''approche de l''aube. Celui-ci lui décerne alors son deuxième nom : '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Israël
  - type: text
    text: ', peut-être à interpréter au sens de « vainqueur de Dieu ». L''événement légitime un autre sanctuaire, celui de Penouel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1 Sur l'identification probable de Penouel avec le sanctuaire de Deir `Allah découvert par les fouilles archéologiques en 1967, voir p.${Xbalaam}.
    marker-yv: yv-n
  - type: text
    text: ', où l''on rencontre Dieu face à face.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Joseph en Egypte, ou le supplément à la Genèse
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Que le Seigneur m'ajoute
  - type: text
    text: ' (hébreu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: yoseph
  - type: text
    text: ') '
  - type: usfm
    marker: it
    children:
    - type: text
      text: un autre fils !
  - type: text
    text: ' (Gn 30.24.) Voilà l''exclamation de Rachel à la naissance de Joseph ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yoseph
  - type: text
    text: '). La longue et belle histoire de ce personnage invite le lecteur à réfléchir sur la signification du séjour d''Israël en Egypte, loin de sa terre. Toutes les angoisses qui la tiennent en suspens se résolvent dans un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: dénouement providentiel
  - type: text
    text: ' qui doit servir de leçon pour d''autres temps et d''autres circonstances : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Le mal que vous comptiez me faire, Dieu comptait en faire du bien
  - type: text
    text: ' (50.20).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Premier-né de Rachel, l''épouse chérie de Jacob, et fils préféré de son père, Joseph étonne et irrite ses demi-frères par ses rêves. Il fait preuve à leurs yeux d''une arrogance insupportable. Les frères, jaloux, cherchent un jour à le faire disparaître. Il est récupéré par des Bédouins qui iront le vendre, en '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Egypte
  - type: text
    text: ', au chef des gardes du pharaon. Ses frères n''en savent rien. Conduit par la providence et la sagesse divines (39.3 ; 41.37), Joseph ne tardera pas à être promu vice-roi d''Egypte (41.41ss).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A ce moment la famine s''abat sur Canaan. Elle conduit dix fils de Jacob à se rendre en Egypte pour y acheter du grain. Après bien des péripéties, '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Benjamin
  - type: text
    text: ', l''unique frère de sang de Joseph, les accompagne en Egypte. Mais Joseph ne se laissera reconnaître par ses frères que lorsque ceux-ci auront pris pleinement conscience de leur forfait.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le clan séjournera en Egypte assez longtemps. Quelque quatre cents ans, diront les textes (Gn 15.13 ; Ex 12.40s ; Ga 3.17). Mais on ne sait pas bien où les faire débuter, car aucune indication chronologique n'est fournie par l'histoire biblique de Joseph. Et l'on ne dispose d'aucune source égyptienne sur ce point.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cet ensemble, qui s''apparente à la littérature de sagesse (voir p.${Xsagesse}), traite à sa manière le dossier des relations entre Israël et les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: autres nations
  - type: text
    text: ', en particulier en situation d''exil ou de '
  - type: usfm
    marker: it
    children:
    - type: text
      text: diaspora
  - type: text
    text: ' (voir p.${Xexilbib} et {Xdiaspora}). Le séjour involontaire de Joseph en Egypte aura finalement eu des conséquences heureuses (50.20). Et pas seulement pour sa propre famille : le pays d''accueil aura aussi tiré avantage de la sage politique menée par l''inspiré de Dieu. Certaines pages de Jérémie (29.4ss) ou de Daniel (chap. 1–6) suggèrent une orientation analogue. Nous avons là, esquissée, la grande idée du règne de Dieu sur toute l''humanité, avec ses attentes de justice et de paix.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ainsi le livre de la Genèse constitue une longue méditation sur la vocation particulière d'un peuple élu au sein duquel, paradoxalement, tout lecteur est invité à se situer. Quand tous les âges d'or seraient définitivement derrière nous, ces textes sont un contrat d'espérance qui incite à prendre en considération l'exemple, même imparfait, de la foi des premiers pères.
