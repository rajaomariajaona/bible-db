document_id: 1TI.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: L'énigme des Pastorales…
  - type: text
    content: ' cette formule qu''un érudit a forgée introduit au cœur de l''originalité des épîtres à Timothée et à Tite. C''est depuis le XVIII'
  - type: text
    content: e
  - type: text
    content: ' siècle qu''on les nomme « Pastorales » : les destinataires en sont des « pasteurs », et non des communautés – bien qu''il s''agisse de « lettres ouvertes » s''achevant sur une bénédiction au pluriel. De très bonne heure, le Canon de Muratori, un des premiers catalogues des livres du Nouveau Testament, notait l''orientation pastorale de leur contenu et leur contribution à « l''ordonnance de la discipline ecclésiastique ».'
  - type: text
    content: 'Où est l''énigme ? Elle pourrait s''énoncer en ces termes : si ces épîtres sont de Paul, pourquoi sont-elles si « contraires » à Paul ? Et si ces épîtres ne sont pas de Paul, comment sont-elles si pauliniennes, et reçues comme telles ?'
  - type: text
    content: Si ces épîtres sont de Paul…
  - type: text
    content: ' c''est ainsi qu''elles se présentent, et de façon appuyée. Mais la contrariété qui surprend le lecteur, c''est la différence de ton, de style, de vocabulaire, de souci et d''accent par rapport aux autres épîtres de l''ensemble paulinien. Est-ce encore la même personnalité qui s''exprime ? Au lieu du prédicateur bondissant, aux démonstrations aiguës, aux métaphores en cascade, avance à pas lourds un hiérarque soucieux d''ordre et de respectabilité, qui répète sentencieusement des formules stéréotypées et des fragments de liturgie. L''image de l''Eglise qu''on devine semble celle d''une institution installée, bien éloignée par exemple du trop-plein de vie corinthien. Les adversaires visés ne sont plus du tout les chrétiens judaïsants que Paul a combattus dans ses grandes épîtres. Comment trouver place pour une situation si différente dans la biographie de l''apôtre ?'
  - type: text
    content: Mais si ces épîtres ne sont pas de Paul…
  - type: text
    content: ' alors elles sont dues à un disciple venu nettement plus tard, désireux d''honorer sa mémoire et d''actualiser son héritage dans des communautés qui se réclamaient de l''apôtre mais qui ne savaient plus comment vivre concrètement de son enseignement. Il peut paraître surprenant que l''Eglise ait accueilli des écrits pseudonymes. Le Canon de Muratori met en garde contre les épîtres aux Alexandrins et aux Laodicéens, qui se parent faussement du nom de Paul : « Il ne convient pas de mêler le fiel avec le miel. » Or les Pastorales, elles, ont été amplement reconnues. Plusieurs en perçoivent déjà des échos chez Clément de Rome (95-96). En tout cas, la Première à Timothée est, avec Philippiens, l''épître de Paul la plus souvent citée jusqu''au III'
  - type: text
    content: e
  - type: text
    content: ' siècle.'
  - type: text
    content: L'abondance des
  - type: text
    content: notations personnelles
  - type: text
    content: ' est l''autre donnée à prendre en compte. L''auteur se réfère avec insistance à des éléments biographiques (p. ex. 1Tm 1.12ss), et il multiplie les souvenirs précis, les messages individualisés. Certes, telle ou telle référence est susceptible d''une interprétation éthique (ainsi l''invitation faite à Timothée de boire '
  - type: text
    content: un peu de vin,
  - type: text
    content: ' 1Tm 5.23) ou ecclésiastique (ainsi la mention du manteau de Paul, 2Tm 4.13, qui pourrait rappeler l''épisode du manteau d''Elie récupéré par Elisée, 2R 2.13s). Cependant l''affection qui s''exprime envers Timothée sonne vrai : « Le cœur de Paul, s''exclamait Erasme, ne l''imite pas qui veut ! » Dans le reste du discours, malgré les différences, bien des traits pauliniens de forme et de fond se voient aussi : nombre de spécialistes, même parmi les plus réservés, estiment authentiques '
  - type: text
    content: au moins
  - type: text
    content: ' quelques passages.'
  - type: text
    content: Une lecture traditionnelle
  - type: text
    content: 'Devant l''énigme, chacun pèse les arguments à la balance de ses préalables sur l''inspiration des Ecritures et le témoignage de l''Eglise ancienne, et selon ses propres critères d''analyse. Pour ceux qui croient qu''elles ont été rédigées par un '
  - type: text
    content: disciple
  - type: text
    content: ' de Paul, les Pastorales montrent comment la pensée de l''apôtre a fait histoire, comment elle a été comprise une génération après. Dans cette perspective, la réception des Pastorales dans le canon du Nouveau Testament peut suggérer que ce n''est pas seulement la genèse d''une pensée (en l''occurrence celle de Paul) qui importe, mais aussi son assimilation et son adaptation dans la durée. Si l''on maintient la lecture traditionnelle, on peut envisager l''intervention d''un '
  - type: text
    content: secrétaire
  - type: text
    content: ' auquel Paul aurait laissé grande liberté dans la mise en forme (on a notamment pensé à Luc, l''évangéliste, cf. 2Tm 4.11). La '
  - type: text
    content: psychologie
  - type: text
    content: ' de l''apôtre vieillissant, s''il est possible de spéculer à son sujet, peut expliquer une part des différences avec les épîtres antérieures. Du reste, on observe la prodigieuse '
  - type: text
    content: diversité
  - type: text
    content: ' du style de Paul dans ses autres écrits : il lui arrive de n''être pas loin, surtout dans les morceaux d''instruction morale, du style des Pastorales (1Th 4.11-12 ; Ph 4.8-9). Le style antique dépend davantage du '
  - type: text
    content: genre
  - type: text
    content: ' que dans nos propres habitudes, et le genre pastoral des trois lettres les met naturellement à part.'
  - type: text
    content: 'Dans cette optique, pour reconstituer la '
  - type: text
    content: chronologie
  - type: text
    content: ' malgré le silence des Actes (en Ac 20.25 Paul ne compte pas retourner à Ephèse) et les déclarations d''intention de Paul (en Rm 15.23 il estimait, semble-t-il, n''avoir plus rien à faire en Asie Mineure), on s''inspire habituellement de la tradition postérieure. Selon celle-ci, en effet, l''apôtre aurait été libéré après les deux années de résidence surveillée à Rome mentionnées en Actes 28.30 ; en effet, le procès qu''il avait réclamé s''annonçait favorablement. Avant ou après son voyage missionnaire en Espagne (Rm 15.28), il serait retourné en Orient et il aurait chargé Timothée de prendre soin de l''Eglise d''Ephèse ; il lui aurait écrit sa première lettre de Macédoine, vers 65 (1Tm 1.3). Il aurait également évangélisé l''île de Crète et confié la suite du travail à Tite, puis il aurait écrit à celui-ci au cours de son voyage vers Nicopolis (Tt 3.12). La persécution de Néron l''aurait finalement atteint. Emprisonné, cette fois dans des conditions pénibles, quelque temps avant son martyre (daté, semble-t-il, de 67 par Eusèbe, III'
  - type: text
    content: e
  - type: text
    content: -IV
  - type: text
    content: e
  - type: text
    content: ' s.), il aurait composé à Rome la Seconde à Timothée. La période qui s''ouvre est celle d''une '
  - type: text
    content: seconde génération chrétienne
  - type: text
    content: '  ; ni le renforcement des structures ecclésiales (dont les indices restent d''ailleurs discrets dans les textes), ni la prolifération des doctrines annonciatrices de la gnose (voir « La question gnostique », p.${Xgnose}) n''y détonnent comme des anachronismes.'
  - type: text
    content: Riposte à l'offensive des sectes
  - type: text
    content: 'L''objet principal de la correspondance de l''auteur se résume dans ses propres termes : indiquer '
  - type: text
    content: comment il faut se conduire dans la maison de Dieu, qui est l'Eglise du Dieu vivant
  - type: text
    content: ' (1Tm 3.15). D''où le privilège accordé tout au long à la métaphore de la '
  - type: text
    content: maison
  - type: text
    content: ', qui éclipse celle du corps (cf. 1Co 12.12ss ; Ep 4.16). Si Tite et Timothée – et, derrière eux, les responsables des communautés liées à Paul – ont besoin de confirmations et de précisions à cet égard, c''est que leur mission exige du doigté : ils interviennent, avec l''autorité que leur délègue l''apôtre, dans une situation troublée. Le fait majeur en arrière-plan des Pastorales semble bien être l''activité brouillonne de maîtres de mensonge issus des rangs chrétiens, qui s''autorisent peut-être de certaines formulations pauliniennes (comparer par exemple 1Co 7.1,25ss,40 avec 1Tm 4.3 ; 5.14 ; ou Rm 6.1ss ; Ep 2.5s avec 2Tm 2.18). Avec le temps, la '
  - type: text
    content: corruption
  - type: text
    content: ' de la vérité évangélique devient un adversaire plus dangereux que le pharisaïsme et l''idolâtrie païenne. Peut-être pour souligner que la menace est altération du christianisme d''abord professé, l''image de la '
  - type: text
    content: maladie,
  - type: text
    content: ' à laquelle l''apôtre ne nous avait pas habitués, revient à maintes reprises : les adversaires ont '
  - type: text
    content: l'intelligence pervertie
  - type: text
    content: ' (1Tm 6.5), ils ont '
  - type: text
    content: la maladie des débats
  - type: text
    content: ' (1Tm 6.4), '
  - type: text
    content: leur intelligence comme leur conscience sont souillées
  - type: text
    content: ' ou infectées (Tt 1.15), '
  - type: text
    content: leur stupidité
  - type: text
    content: ' (2Tm 3.9) ronge '
  - type: text
    content: comme la gangrène
  - type: text
    content: ' (2Tm 2.17) ; symétriquement, l''auteur exalte '
  - type: text
    content: l'enseignement sain
  - type: text
    content: ' (1Tm 1.10+).'
  - type: text
    content: 'Il n''est pas assuré que les trois épîtres visent les mêmes hérétiques, ni qu''à Ephèse, foyer de l''épidémie, une seule école ait sévi. Pourtant, les traits relevés composent un tableau assez cohérent : pourvu qu''on se rappelle la diversité d''un mouvement effervescent et syncrétiste, on peut attribuer aux maîtres de mensonge un air de famille. Ces esprits rebelles et contestataires (1Tm 6.4s,20 ; 2Tm 2.25 ; 3.8 ; 4.15 ; Tt 1.9s) portent encore la marque d''un certain '
  - type: text
    content: judaïsme
  - type: text
    content: '  : dans le mélange qu''ils opèrent, le légalisme paraît garder sa part (1Tm 1.7ss) ; les '
  - type: text
    content: fables
  - type: text
    content: ' et '
  - type: text
    content: généalogies sans fin
  - type: text
    content: ' auxquels ils s''attachent (1Tm 1.4) renvoient sans doute au monde des interprétations allégoriques si prisées des Juifs hellénisés. Mais ils glissent déjà vers un '
  - type: text
    content: dualisme
  - type: text
    content: ' hostile au corps et un ascétisme que les épîtres condamnent (1Tm 4.3 ; Tt 1.14s). Plus grave : ce dualisme les conduit à réinterpréter la résurrection d''une façon qui équivaut au renversement de la foi (2Tm 2.18 ; cf. 1Tm 1.19s). Leur propagande semble viser particulièrement les femmes, non sans succès (2Tm 3.6s ; cf. 1Tm 4.7 et peut-être 5.15). On peut imaginer que, méprisant le corps, ils méprisent aussi la différence entre les sexes, comme le feront plus tard les gnostiques, et qu''ils séduisent ainsi les femmes par un discours émancipateur (ce qui aiderait à comprendre le ton de 1Tm 2.11ss). L''auteur, qui use à leur encontre de sarcasmes dans le registre habituel de l''époque, attaque également leur conduite effective et leur motivation honteusement intéressée (1Tm 6.5 ; Tt 1.11).'
  - type: text
    content: Face aux entreprises sectaires, il convient d'
  - type: text
    content: organiser l'Eglise.
  - type: text
    content: ' La Première à Timothée traite plus en détail de l''ordre ecclésial et des ministères officiels que tout autre livre du Nouveau Testament (le texte parallèle destiné à Tite abrège) ; elle s''intéresse particulièrement aux critères de sélection et aux procédures disciplinaires. Manifestement, contre les factieux, c''est le moment de resserrer les rangs et de renforcer l''encadrement ; dans la situation, la stabilité et la fermeté priment sur le dynamisme et l''inventivité. Du reste, indépendamment des conflits internes, cette orientation semble aussi répondre à un besoin d''obtenir ou de maintenir, pour la communauté chrétienne, une certaine respectabilité au sein de la société en général (cf. 1Tm 2.2 ; 3.7 ; 5.14 ; Tt 2.5,8,10,12). Cela n''exclut pas, cependant, de '
  - type: text
    content: ranimer la flamme du don de Dieu,
  - type: text
    content: ' celle de l''Esprit que caractérisent autant la '
  - type: text
    content: force
  - type: text
    content: ' et l'''
  - type: text
    content: amour
  - type: text
    content: ' que la '
  - type: text
    content: pondération
  - type: text
    content: ' (2Tm 1.6s). A noter : le souci des '
  - type: text
    content: moyens
  - type: text
    content: ' d''une '
  - type: text
    content: transmission
  - type: text
    content: ' fiable (2Tm 2.2).'
  - type: text
    content: Face aux entreprises sectaires, il convient de maintenir la
  - type: text
    content: doctrine.
  - type: text
    content: ' Cette préoccupation n''est pas nouvelle : l''apôtre l''a exprimée dès Romains 6.17 en termes de '
  - type: text
    content: modèle d'enseignement.
  - type: text
    content: ' Presque toutes ses épîtres mènent '
  - type: text
    content: le beau combat de la foi
  - type: text
    content: ' contre les distorsions de la vérité révélée. Mais là où l''épître aux Colossiens, par exemple, privilégie la contre-attaque sur le fond, repensant l''erreur pour la redresser (ainsi pour l''hérésie colossienne), les Pastorales adoptent une stratégie d''appui sur la '
  - type: text
    content: forme
  - type: text
    content: '  : celle que pourront mettre en œuvre Tite et Timothée et qui résiste mieux à un mouvement multiple et diffus, à une contestation morbide et vaniteuse. Ainsi l''accent est mis sur la conservation du vrai, sur les formulations sûres – '
  - type: text
    content: c'est une parole certaine et digne d'être pleinement accueillie
  - type: text
    content: ' (1Tm 1.15 ; 3.1 ; 4.9 ; 2Tm 2.11 ; Tt 3.8) – sur '
  - type: text
    content: le modèle des saines paroles
  - type: text
    content: ' (2Tm 1.13) et l''autorité des '
  - type: text
    content: Ecrits sacrés
  - type: text
    content: ' (2Tm 3.15ss). L''image est caractéristique : '
  - type: text
    content: les fondations solides que Dieu a posées tiennent bon, scellées de ces paroles…
  - type: text
    content: ' (2Tm 2.19), avec trois termes – '
  - type: text
    content: fondations, solides
  - type: text
    content: ' et '
  - type: text
    content: scellées
  - type: text
    content: ' – pour évoquer l''inébranlable.'
  - type: text
    content: Face aux entreprises sectaires, il convient de promouvoir la
  - type: text
    content: piété
  - type: text
    content: ' (c''est l''un des mots-clefs des Pastorales, avec dix occurrences, plus trois du verbe et de l''adverbe correspondants) ; l''effort porte sur l''union indissoluble de la doctrine et de cette piété, synthèse elle-même de la religion et de la morale (Tt 1.1). Le cœur du christianisme, l''objet de la foi confessée, est l''immense '
  - type: text
    content: mystère de la piété
  - type: text
    content: ' (1Tm 3.16). La piété s''associe à la miséricorde, à la justice, à la pudeur, à la dignité et, avec insistance, à la sobriété (pondération, bon sens, discrétion). Elle porte des fruits bons et beaux{Rbeaupast} : les Pastorales emploient vingt-quatre fois un adjectif qui désigne en grec le bon et le bien tout en évoquant la beauté. '
  - type: text
    content: L'homme de Dieu
  - type: text
    content: ' (2Tm 3.17) se perfectionnant dans cette beauté, telle est l''ultime riposte à l''offensive des sectes malsaines.'
  - type: text
    content: 'La Première à Timothée : « ce que tu dois enjoindre »'
  - type: text
    content: Entre Timothée et Paul les liens affectifs les plus forts s'étaient noués. Fils spirituel de Paul, il avait, selon les Actes, été associé à l'équipe missionnaire dès la seconde visite de l'apôtre à Lystres (Ac 16.3), et il l'aurait dès lors suivi comme son intime collaborateur. On lui suppose une certaine timidité (1Co 16.10 ; 1Tm 4.12) qui aurait pu lui faire redouter sa mission. La longue lettre qui lui est adressée n'est peut-être pas seulement destinée à l'encourager, mais aussi à le confirmer dans son autorité face à l'Eglise d'Ephèse, où l'épître pouvait être lue en public. A la génération suivante, elle rendra un service analogue aux responsables des communautés attachées à la mémoire de Paul.
  - type: text
    content: 'Dans le développement, on distingue :'
  - type: text
    content: –l'introduction,
  - type: text
    content: ' 1.1s, qui situe l''expéditeur et le destinataire ;'
  - type: text
    content: –l'évocation du problème urgent,
  - type: text
    content: ' 1.3-20, l''émergence de la vague sectaire, face à laquelle Paul affirme son apostolat ;'
  - type: text
    content: –les directives pour le gouvernement de la communauté,
  - type: text
    content: ' 2.1–3.16, avec les règles à suivre dans le culte et dans le choix des responsables : '
  - type: text
    content: épiscope
  - type: text
    content: ' (« surveillant ») et '
  - type: text
    content: ministres
  - type: text
    content: ' (ou « diacres ») ;'
  - type: text
    content: –l'avertissement sur les faux enseignements,
  - type: text
    content: ' 4.1-16, leur origine démoniaque et leur valeur de signe des derniers temps, et l''attitude personnelle que cultivera Timothée ;'
  - type: text
    content: –les procédures à suivre avec diverses catégories particulières,
  - type: text
    content: ' 5.1–6.2, selon l''âge et le sexe, avec les veuves et les anciens ;'
  - type: text
    content: –
  - type: text
    content: de vibrantes exhortations pour conclure,
  - type: text
    content: ' 6.3-21.'
  - type: text
    content: 'La Seconde à Timothée : « prends le relais »'
  - type: text
    content: 'Située au terme de la course de l''apôtre (4.7), la Seconde à Timothée a des allures de testament spirituel. Au milieu des souvenirs personnels, l''appel ému : '
  - type: text
    content: garde toutes les belles choses qui t'ont été confiées au moyen de l'Esprit saint qui habite en nous
  - type: text
    content: ' (1.14) pourrait en résumer l''exhortation principale ; mais il faut ajouter que ce qui a été confié est aussi à '
  - type: text
    content: transmettre,
  - type: text
    content: ' comme un témoin dans la course de relais (Paul a toujours aimé la métaphore de la course). L''ordre du discours est plus affectif que strictement logique :'
  - type: text
    content: –l'introduction,
  - type: text
    content: ' 1.1s, revêt une forme habituelle ;'
  - type: text
    content: –l'admonition au zèle courageux,
  - type: text
    content: ' 1.3–2.13, mêle des traits fort personnels, des renseignements sur la situation de Paul et des considérations théologiques mûries ;'
  - type: text
    content: –la nouvelle exhortation dit la conduite à tenir face aux imposteurs des derniers temps,
  - type: text
    content: ' 2.14–4.5, avec le rappel de l''inspiration des Ecritures ;'
  - type: text
    content: –la conclusion,
  - type: text
    content: ' 4.6-22, associe une sublime confession de foi à des indications très « terre à terre ».'
  - type: text
    content: 'L''épître à Tite : « ce qui reste à régler »'
  - type: text
    content: 'Tite est, lui aussi, un fils spirituel et un fidèle compagnon de l''apôtre, depuis l''entrevue de Jérusalem (Ga 2.1ss). L''épître qui lui est adressée est sans doute un peu moins personnelle que les épîtres à Timothée, mais elle est ornée de quelques paragraphes très riches et denses, et l''axe général reste le même. On peut distinguer :'
  - type: text
    content: –l'introduction,
  - type: text
    content: ' 1.1-4, majestueusement chargée de théologie ;'
  - type: text
    content: –le rappel de la mission principale,
  - type: text
    content: ' 1.5-16, l''installation d''anciens qui sauront contrer les contradicteurs ;'
  - type: text
    content: –le résumé des exhortations spéciales et générales qui conviennent aux fidèles,
  - type: text
    content: ' 2.1–3.11, avec deux joyaux doctrinaux, sur la grâce du Christ (2.11ss) et le salut comme œuvre commune de Dieu, de l''Esprit et de Jésus-Christ (3.4-6) ;'
  - type: text
    content: –la conclusion,
  - type: text
    content: ' 3.12-15, avec des indications pratiques.'
  - type: text
    content: Le mystère de la piété
  - type: text
    content: 'Les Pastorales combinent, de façon déconcertante, les énoncés de la plus haute théologie du Nouveau Testament et le souci du quotidien. Au point qu''elles indisposent un certain romantisme chrétien, chagriné par une apparence d''embourgeoisement. C''est qu''il s''agit, pour l''Evénement de la grâce, de s''inscrire dans la '
  - type: text
    content: durée,
  - type: text
    content: ' avec les médiations institutionnelles que cela requiert. Ce n''est pas trahison, mais incarnation : le mystère de la piété '
  - type: text
    content: s'est manifesté dans la chair
  - type: text
    content: ' (1Tm 3.16).'
  - type: text
    content: Et si ce mystère était la solution, ou l'autre face, de l'énigme des Pastorales ?
