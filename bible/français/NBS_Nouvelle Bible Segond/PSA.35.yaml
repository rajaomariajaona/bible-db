document_id: PSA.35,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Supplication d'un innocent traîné en justice
  - type: text
    content: ' '
  - type: note
    content: 'Plusieurs mss de LXX ont pour titre Psaume de David. –  attaque…  : le verbe s''applique souvent à un procès ou une attaque en justice, d''où l''autre traduction possible accuse ceux qui m''accusent (même verbe en Es 49.25n). –  combats  : cf. 24.8.'
  - type: text
    content: De David.
  - type: text
    content: Seigneur
  - type: text
    content: ', attaque ceux qui m''attaquent,'
  - type: text
    content: combats ceux qui me combattent !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Tous mes os 6.3 ; 31.11 ; 32.3 ; 51.10. –  comme toi  : cf. 40.6 ; 71.19 ; 77.14 ; 86.8 ; 89.7ss ; 113.5 ; voir aussi Ex 15.11 ; Jr 10.6 ; Mi 7.18. –  délivrer… Jb 5.15.'
  - type: text
    content: 'Tous mes os diront : '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui peut, comme toi,'
  - type: text
    content: délivrer le pauvre d'un plus fort que lui,
  - type: text
    content: le pauvre et le déshérité de celui qui les dépouille ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Des témoins malveillants  : litt. des témoins de violence  ; cf. Ex 23.1 ; Dt 19.16 ; voir aussi Ps 27.12 ; Mt 26.59-60/ /.'
  - type: text
    content: 'Des témoins malveillants se lèvent :'
  - type: text
    content: ils m'interrogent sur ce que je ne connais pas.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'le mal pour le bien 38.21 ; 109.4s ; Gn 44.4 ; Jr 18.20 ; Pr 17.13. –  seul  : litt. privé d''enfants  ; certains modifient légèrement le texte hébreu traditionnel pour lire ils épient mon âme , c.-à-d. ils m''épient pour attenter à ma vie  ; 6.4n.'
  - type: text
    content: 'Ils me rendent le mal pour le bien :'
  - type: text
    content: je suis resté seul.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'je me privais, je jeûnais  : litt. j''humiliais mon âme (ou mon gosier, mon ventre ) par le jeûne  ; cf. 6.4n  ; 69.11 ; 109.24 ; Lv 16.29n,31 ; Es 58.3,5. –  revenait sans cesse  : litt. revenait sur mon sein  ; cf. Mt 10.12s.'
  - type: text
    content: Et moi, quand ils étaient malades, je me revêtais d'un sac,
  - type: text
    content: je me privais, je jeûnais,
  - type: text
    content: ma prière revenait sans cesse.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'l''air sombre  : autre traduction noirci  ; de même en 38.7 ; 42.10 ; allusion possible aux rites de deuil où l''on se barbouillait de poussière ou de cendre ; cf. Jos 7.6 ; Ez 27.30 ; Lm 2.10 ; voir aussi Jb 30.28 ; Mt 6.16s.'
  - type: text
    content: Comme pour un ami, pour un frère, je me traînais ;
  - type: text
    content: comme pour le deuil d'une mère, je me courbais, l'air sombre.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'quand je chancelle 38.12. –  ceux qui me frappent  : traduction incertaine, inspirée de certaines versions anciennes ; quelques-uns ajoutent une lettre au texte hébreu traditionnel pour lire des étrangers , auquel on pourrait rapporter l''expression que je ne connais pas (au lieu de sans que je le sache ). –  ils me déchirent sans relâche  : texte obscur ; au prix d''une légère modification du texte hébreu traditionnel on pourrait lire ils hurlent sans relâche (litt. et ne se taisent pas ).'
  - type: text
    content: Puis, quand je chancelle, ils se réjouissent et se rassemblent,
  - type: text
    content: ils se rassemblent contre moi sans que je le sache, ceux qui me frappent,
  - type: text
    content: ils me déchirent sans relâche ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: Texte obscur, diversement traduit ; les mots correspondant à moqueurs et à endroit font assonance ; certains comprennent ceux qui tournent en dérision le refuge (du juste). –  grincent des dents 37.12 ; 112.10 ; Jb 16.9 ; Ac 7.54.
  - type: text
    content: avec les impies, les moqueurs de l'endroit,
  - type: text
    content: ils grincent des dents contre moi.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.2. –  Protège  : litt. ramène. –  de leurs sévices  : traduction incertaine ; certains modifient le texte hébreu traditionnel pour lire de ceux qui rugissent , en parallèle avec les jeunes lions  ; cf. 7.2+ ; 22.22 ; 34.11+. –  ma vie  : litt. mon unique  ; cf. 22.21n.'
  - type: text
    content: Seigneur, comment peux-tu voir cela ?
  - type: text
    content: Protège-moi de leurs sévices,
  - type: text
    content: protège ma vie des jeunes lions !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 22.26+ ; 68.27 ; 116.14.
  - type: text
    content: Je te célébrerai dans l'assemblée nombreuse,
  - type: text
    content: je te louerai au milieu d'un peuple fort.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Que ceux qui sont à tort mes ennemis  : litt. mes ennemis menteurs  ; cf. 38.20 ; 69.5. –  qui me détestent sans raison  : cf. 25.19 ; 69.5 ; Jn 15.25. –  ne m''insultent pas du regard  : litt. ne clignent pas de l''œil  ; cf. Pr 6.13 ; 10.10.'
  - type: text
    content: Que ceux qui sont à tort mes ennemis ne se réjouissent pas à mon sujet,
  - type: text
    content: que ceux qui me détestent sans raison ne m'insultent pas du regard !
  '2':
  - type: text
    content: ' '
  - type: note
    content: le petit bouclier et le grand bouclier 3.4+ ; 5.13n. –  lève-toi 3.8+.
  - type: text
    content: Saisis le petit bouclier et le grand bouclier,
  - type: text
    content: et lève-toi pour me secourir !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'ils ne parlent pas pour la paix (cf. v. 27n) : même expression 85.9 ; 122.8 ; cf. 28.3 ; voir aussi 120.6. –  des tromperies  : litt. des paroles (ou des choses ) de tromperie  ; certains comprennent ils inventent des calomnies.'
  - type: text
    content: Car ils ne parlent pas pour la paix,
  - type: text
    content: ils préparent des tromperies contre les gens tranquilles du pays.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Contre moi  : autre traduction à mon sujet. –  ils ouvrent… toute grande  : litt. ils élargissent  ; cf. Es 57.4 ; Lm 2.16. –  Ah ! ah ! l''interjection correspondante est ici redoublée (aussi en 40.16 ; 70.4) ; au v. 25 elle n''apparaît qu''une fois (de même en Es 44.16 ; Ez 25.3 ; 26.2 ; 36.2 ; Jb 39.25).'
  - type: text
    content: Contre moi ils ouvrent leur bouche toute grande,
  - type: text
    content: 'ils disent : « Ah ! ah !'
  - type: text
    content: nous l'avons vu de nos yeux ! »
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Seigneur / Seigneur  : hébreu YHWH / ’Adonaï , cf. Ex 3.15n. –  ne garde pas le silence 28.1. –  Ne t''éloigne pas 22.12+ ; 38.22.'
  - type: text
    content: Seigneur
  - type: text
    content: ', tu l''as vu, ne garde pas le silence !'
  - type: text
    content: Ne t'éloigne pas de moi, Seigneur !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Eveille-toi  : cf. 7.7 ; 44.24 ; 57.9 ; 59.5s ; 80.3 ; Es 51.9+. –  établir  : sous-entendu dans le texte. –  mon droit 9.5+. –  ma cause 43.1.'
  - type: text
    content: Eveille-toi,
  - type: text
    content: réveille-toi pour établir mon droit !
  - type: text
    content: Mon Dieu et Seigneur, pour défendre ma cause !
  '24':
  - type: text
    content: ' '
  - type: note
    content: Juge-moi selon ta justice 7.9.
  - type: text
    content: 'Juge-moi selon ta justice, '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu !'
  - type: text
    content: Qu'ils ne se réjouissent pas à mon sujet !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 40.14-17 ; 70.3-5. –  voilà ce que nous voulions  : litt. notre être ou notre gosier, notre appétit, notre désir (6.4n  ; Gn 1.20n  ; Pr 6.30n) ; on pourrait comprendre nous n''en avons fait qu''une bouchée , en parallèle avec Nous l''avons englouti (Lm 2.16).'
  - type: text
    content: 'Qu''ils ne se disent pas : « Ah ! ah ! voilà ce que nous voulions ! »'
  - type: text
    content: 'Qu''ils ne disent pas : « Nous l''avons englouti ! »'
  '26':
  - type: text
    content: ' '
  - type: note
    content: V. 4+.
  - type: text
    content: Que tous ensemble ils aient honte et rougissent,
  - type: text
    content: ceux qui se réjouissent de mon malheur !
  - type: text
    content: Qu'ils se revêtent de honte et de confusion,
  - type: text
    content: ceux qui s'élèvent contre moi !
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 40.17. –  prennent plaisir à  : cf. 1.2 ; 22.9 ; 34.13 ; 37.23 ; Nb 14.8n –  la paix (v. 20) ou la prospérité, le bonheur.'
  - type: text
    content: Qu'ils poussent des cris de joie, qu'ils se réjouissent,
  - type: text
    content: ceux qui prennent plaisir à ma justice,
  - type: text
    content: 'et qu''ils disent constamment : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand,'
  - type: text
    content: lui qui prend plaisir à la paix de son serviteur !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'redira  : litt. murmurera  ; cf. 1.2n  ; 37.30 ; 51.16 ; 71.24. –  sans cesse  : litt. tout le jour . –  elle fera  : sous-entendu dans le texte.'
  - type: text
    content: Ma langue redira ta justice,
  - type: text
    content: sans cesse elle fera ta louange.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'le javelot ou la hache de guerre , traduction incertaine ; on pourrait aussi comprendre et coupe la route à mes poursuivants (7.2n  ; Jr 15.15). –  Dis-moi…  : cf. Lm 3.57.'
  - type: text
    content: Brandis la lance et le javelot contre mes persécuteurs !
  - type: text
    content: 'Dis-moi : Ton salut, c''est moi !'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'V. 26 ; 6.11+ ; 40.15 ; 70.3 ; 71.13 ; Jr 17.18. –  confus 4.3+. –  qui en veulent à ma vie  : litt. qui recherchent ma vie  ; sur le terme correspondant à vie , cf. v. 7n  ; 6.4n  ; 17.9n  ; Gn 1.20n  ; Jr 11.21n.'
  - type: text
    content: Qu'ils soient honteux et confus, ceux qui en veulent à ma vie !
  - type: text
    content: Qu'ils reculent et rougissent, ceux qui préparent mon malheur !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'comme la paille (1.4n) emportée par le vent (litt. en face du vent , terme qui peut aussi être traduit par esprit ) : même formule en 83.14. –  le messager (ou l''ange ) du Seigneur 34.8+.'
  - type: text
    content: Qu'ils soient comme la paille emportée par le vent,
  - type: text
    content: 'que le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' les chasse !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ténébreuse et glissante  : cf. 73.18 ; Jr 23.12.'
  - type: text
    content: Que leur route soit ténébreuse et glissante,
  - type: text
    content: 'que le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' les poursuive !'
  '7':
  - type: text
    content: ' '
  - type: note
    content: '140.6 ; Lm 1.13. –  pour m''ôter la vie  : litt. pour ma vie  ; cf. v. 4n.'
  - type: text
    content: Car, sans raison, ils ont caché pour moi une fosse avec leurs filets,
  - type: text
    content: sans raison ils l'ont creusée pour m'ôter la vie.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Dans l''hébreu les verbes sont au singulier, à la différence du v. 7 : litt. que la tourmente vienne sur lui… que le filet qu''il a caché le prenne, qu''il y tombe et soit…  ; cf. Es 47.11. –  qu''ils soient pris au filet… 7.13-16+ ; 9.16+ ; 57.7 ; Rm 11.9.'
  - type: text
    content: Que la tourmente vienne sur eux sans qu'ils le sachent,
  - type: text
    content: qu'ils soient pris au filet qu'ils ont caché,
  - type: text
    content: qu'ils y tombent et soient dans la tourmente !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 1S 2.1 ; Ha 3.18 ; Lc 1.46s.
  - type: text
    content: 'Moi, j''aurai de l''allégresse dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je trouverai la gaieté en son salut.
