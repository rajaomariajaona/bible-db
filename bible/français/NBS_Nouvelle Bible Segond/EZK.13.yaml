document_id: EZK.13,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre les prophètes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tout ira bien !… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus littéralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Paix ! et il n'y a pas de paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 16 ; Jr 6.14 ; 8.11 ; cf. 1Th 5.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon peuple bâtit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on bâtit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un mur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme correspondant n''apparaît qu''ici (synonyme aux v. 12,15 etc.). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: badigeon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : image de ce qui cache les défauts au lieu d''y remédier ; cf. 22.28 ; voir aussi Jb 13.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ac 23.3.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi, puisqu''ils égarent mon peuple, en disant : « Tout ira bien ! », quand rien ne va – mon peuple bâtit un mur, et eux l''enduisent de badigeon – '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Jr 23.29 ; Mt 7.24-27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il tombera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le mur, v. 10) ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'elle tombera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(la muraille, v. 14) ; le verbe hébreu correspondant, également traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tomber '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dans la suite du v., fait assonance avec le mot rendu par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'badigeon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(qui pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fadaise, ineptie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). Il est absent de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous, grêlons…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'j''enverrai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je donnerai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des grêlons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des pierres de grêle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. 38.22 ; Jos 10.11.
      marker-yv: yv-n
    - type: text
      text: 'dis à ceux qui l''enduisent de badigeon : Il tombera ! Une pluie torrentielle arrive ; vous, grêlons, vous tomberez, et un vent des tempêtes fera tout éclater. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dont vous l'avez couvert
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dont vous avez enduit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 10.'
      marker-yv: yv-n
    - type: text
      text: 'Une fois le mur tombé, ne vous dira-t-on pas : « Où est l''enduit dont vous l''avez couvert ? »'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'A cause de cela, ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Dans ma fureur, je ferai éclater un vent des tempêtes ; dans ma colère, une pluie torrentielle arrivera, et des grêlons tomberont avec fureur pour exterminer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Mi 1.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous disparaîtrez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vous serez achevés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: abolis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait aussi signifier la fin de l''institution des prophètes officiels.'
      marker-yv: yv-n
    - type: text
      text: 'Je raserai le mur que vous avez enduit de badigeon, je le ferai tomber à terre, et ses fondations seront mises à découvert ; elles s''écrouleront, vous disparaîtrez au milieu d''elles, et ainsi vous saurez que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je vous dirai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certaines versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on vous dira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Plus de mur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: où est le mur ? Où sont ceux qui l'enduisaient ?
      marker-yv: yv-n
    - type: text
      text: 'J''irai jusqu''au bout de ma fureur contre le mur et contre ceux qui l''ont enduit de badigeon ; je vous dirai : Plus de mur ! Plus aucun de ceux qui l''enduisaient, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et qui, par leurs visions…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et qui avaient pour elle des visions de paix, alors qu'il n'y avait pas de paix.
      marker-yv: yv-n
    - type: text
      text: 'des prophètes d''Israël qui parlaient au sujet de Jérusalem, et qui, par leurs visions, lui annonçaient que tout irait bien, alors que rien n''allait ! – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre les prophétesses
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de leur propre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2.
      marker-yv: yv-n
    - type: text
      text: 'Toi, humain, tourne-toi vers les filles de ton peuple qui se font les prophétesses de leur propre cœur, et parle en prophète sur elles ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusions à des pratiques magiques qui nous sont inconnues ; sur l''ensemble, cf. Lv 19.26,31 ; 20.27 ; Dt 18.10-12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bandelettes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine, le mot n''apparaît qu''ici et au v. 20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les poignets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les jointures des mains '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des bras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les coudes ?), d''après certains mss ; autre lecture'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les jointures de mes mains '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de mes bras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vie(s)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : terme traditionnellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: âme(s)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même au v. 19 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux (les âmes) qui…
      marker-yv: yv-n
    - type: text
      text: 'Tu diras : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Quel malheur pour celles qui cousent des bandelettes à tous les poignets et qui font des voiles pour la tête des gens de toute taille, afin de capturer des vies ! Allez-vous ainsi capturer les vies de mon peuple tout en sauvegardant votre propre vie ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour des poignées d'orge…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 56.11 ; Mi 3.5 ; Pr 28.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'faisant mourir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faisant vivre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.18-21.'
      marker-yv: yv-n
    - type: text
      text: Vous me profanez devant mon peuple pour des poignées d'orge et des morceaux de pain, en faisant mourir ceux qui ne devraient pas mourir et en faisant vivre ceux qui ne devraient pas vivre, quand vous mentez à mon peuple qui écoute le mensonge.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophètes
        - type: text
          text: ' d''Israël'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur les prophètes d'Israël qui parlent en prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 4.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Dt 18.10-14 ; 1R 22.13-28 ; Jr 6.13s ; 14.13-15 ; 23.9-40 ; 27–29 ; Am 7.14 ; Mi 3.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de leur propre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 17 ; Jr 23.26.
      marker-yv: yv-n
    - type: text
      text: 'Humain, parle en prophète sur les prophètes d''Israël ; tu diras à ceux qui sont les prophètes de leur propre cœur : Ecoutez la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je m'en prends
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la même expression est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je m''oppose '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bandelettes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme des oiseaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ; le mot semble apparenté à un verbe araméen signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: voler, s'envoler.
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Je m''en prends à vos bandelettes qui vous servent à capturer les vies comme des oiseaux. Je les arracherai de vos bras ; et je dégagerai les vies que vous capturez comme des oiseaux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je délivrerai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 34.10,22,27 ; 2R 19.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils ne serviront plus de piège
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(les membres de mon peuple) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne seront plus une proie.
      marker-yv: yv-n
    - type: text
      text: 'Je déchirerai aussi vos voiles et je délivrerai mon peuple de vos mains ; ils ne serviront plus de piège entre vos mains, et ainsi vous saurez que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
