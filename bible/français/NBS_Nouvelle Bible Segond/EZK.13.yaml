document_id: EZK.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les prophètes
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: 'Tout ira bien !… ou, plus littéralement, Paix ! et il n''y a pas de paix  ; cf. v. 16 ; Jr 6.14 ; 8.11 ; cf. 1Th 5.3. –  mon peuple bâtit  : litt. il ou on bâtit. –  un mur  : le terme correspondant n''apparaît qu''ici (synonyme aux v. 12,15 etc.). –  badigeon  : image de ce qui cache les défauts au lieu d''y remédier ; cf. 22.28 ; voir aussi Jb 13.4n  ; Ac 23.3.'
  - type: text
    content: 'Ainsi, puisqu''ils égarent mon peuple, en disant : « Tout ira bien ! », quand rien ne va – mon peuple bâtit un mur, et eux l''enduisent de badigeon – '
  '11':
  - type: note
    content: 'Cf. Jr 23.29 ; Mt 7.24-27. –  Il tombera (le mur, v. 10) ou elle tombera (la muraille, v. 14) ; le verbe hébreu correspondant, également traduit par tomber dans la suite du v., fait assonance avec le mot rendu par badigeon (qui pourrait aussi signifier fadaise, ineptie). Il est absent de LXX. –  vous, grêlons…  : LXX et Vg ont lu j''enverrai (litt. je donnerai) des grêlons (litt. des pierres de grêle) ; cf. 38.22 ; Jos 10.11.'
  - type: text
    content: 'dis à ceux qui l''enduisent de badigeon : Il tombera ! Une pluie torrentielle arrive ; vous, grêlons, vous tomberez, et un vent des tempêtes fera tout éclater. '
  '12':
  - type: note
    content: 'dont vous l''avez couvert  : litt. dont vous avez enduit, comme au v. 10.'
  - type: text
    content: 'Une fois le mur tombé, ne vous dira-t-on pas : « Où est l''enduit dont vous l''avez couvert ? »'
  '13':
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Dans ma fureur, je ferai éclater un vent des tempêtes ; dans ma colère, une pluie torrentielle arrivera, et des grêlons tomberont avec fureur pour exterminer. '
  '14':
  - type: note
    content: 'Cf. Mi 1.6. –  vous disparaîtrez  : litt. vous serez achevés ou abolis, ce qui pourrait aussi signifier la fin de l''institution des prophètes officiels.'
  - type: text
    content: 'Je raserai le mur que vous avez enduit de badigeon, je le ferai tomber à terre, et ses fondations seront mises à découvert ; elles s''écrouleront, vous disparaîtrez au milieu d''elles, et ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '15':
  - type: note
    content: 'je vous dirai  : certaines versions anciennes ont lu on vous dira, comme au v. 12. –  Plus de mur  : certains modifient le texte hébreu traditionnel pour lire où est le mur ? Où sont ceux qui l''enduisaient ?'
  - type: text
    content: 'J''irai jusqu''au bout de ma fureur contre le mur et contre ceux qui l''ont enduit de badigeon ; je vous dirai : Plus de mur ! Plus aucun de ceux qui l''enduisaient, '
  '16':
  - type: note
    content: 'V. 10+. –  et qui, par leurs visions…  : autre traduction et qui avaient pour elle des visions de paix, alors qu''il n''y avait pas de paix.'
  - type: text
    content: 'des prophètes d''Israël qui parlaient au sujet de Jérusalem, et qui, par leurs visions, lui annonçaient que tout irait bien, alors que rien n''allait ! – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: Contre les prophétesses
  '17':
  - type: text
    content: ' '
  - type: note
    content: de leur propre cœur v. 2.
  - type: text
    content: 'Toi, humain, tourne-toi vers les filles de ton peuple qui se font les prophétesses de leur propre cœur, et parle en prophète sur elles ! '
  '18':
  - type: note
    content: 'Allusions à des pratiques magiques qui nous sont inconnues ; sur l''ensemble, cf. Lv 19.26,31 ; 20.27 ; Dt 18.10-12. –  bandelettes  : traduction incertaine, le mot n''apparaît qu''ici et au v. 20. –  les poignets  : litt. les jointures des mains (ou des bras  : les coudes ?), d''après certains mss ; autre lecture  : les jointures de mes mains (ou de mes bras). –  vie(s)  : terme traditionnellement traduit par âme(s)  ; de même au v. 19 ceux (les âmes) qui…'
  - type: text
    content: 'Tu diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Quel malheur pour celles qui cousent des bandelettes à tous les poignets et qui font des voiles pour la tête des gens de toute taille, afin de capturer des vies ! Allez-vous ainsi capturer les vies de mon peuple tout en sauvegardant votre propre vie ? '
  '19':
  - type: note
    content: 'pour des poignées d''orge…  : cf. Es 56.11 ; Mi 3.5 ; Pr 28.21. –  faisant mourir / faisant vivre  : cf. 3.18-21.'
  - type: text
    content: Vous me profanez devant mon peuple pour des poignées d'orge et des morceaux de pain, en faisant mourir ceux qui ne devraient pas mourir et en faisant vivre ceux qui ne devraient pas vivre, quand vous mentez à mon peuple qui écoute le mensonge.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'sur les prophètes d''Israël  : litt. sur les prophètes d''Israël qui parlent en prophètes  ; cf. 4.7n  ; voir aussi Dt 18.10-14 ; 1R 22.13-28 ; Jr 6.13s ; 14.13-15 ; 23.9-40 ; 27–29 ; Am 7.14 ; Mi 3.5. –  de leur propre cœur v. 17 ; Jr 23.26.'
  - type: text
    content: 'Humain, parle en prophète sur les prophètes d''Israël ; tu diras à ceux qui sont les prophètes de leur propre cœur : Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Je m''en prends  : la même expression est traduite par je m''oppose au v. 8+. –  bandelettes v. 18n. –  comme des oiseaux  : traduction incertaine ; le mot semble apparenté à un verbe araméen signifiant voler, s''envoler.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je m''en prends à vos bandelettes qui vous servent à capturer les vies comme des oiseaux. Je les arracherai de vos bras ; et je dégagerai les vies que vous capturez comme des oiseaux. '
  '21':
  - type: note
    content: 'je délivrerai…  : cf. 34.10,22,27 ; 2R 19.19. –  ils ne serviront plus de piège  : autre traduction ils (les membres de mon peuple) ne seront plus une proie.'
  - type: text
    content: 'Je déchirerai aussi vos voiles et je délivrerai mon peuple de vos mains ; ils ne serviront plus de piège entre vos mains, et ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '22':
  - type: note
    content: 'Cf. 3.18-21. –  vous encouragez…  : litt. vous fortifiez les mains du méchant cf. 16.49n  ; Es 35.3 ; Jr 23.14n. –  méchant  : voir justice. –  ce qui le ferait vivre  : litt. pour le faire vivre  ; certains modifient le texte hébreu traditionnel pour lire pour qu''il vive.'
  - type: text
    content: 'Parce que vous démoralisez le cœur du juste par des mensonges, quand moi-même je ne l''ai pas attristé, et parce que vous encouragez le méchant de telle sorte qu''il ne revienne pas de sa voie mauvaise – ce qui le ferait vivre – '
  '23':
  - type: note
    content: visions illusoires v. 6+. –  vous saurez… 6.7+.
  - type: text
    content: 'vous n''aurez plus de visions illusoires et vous ne vous livrerez plus à la divination ; je délivrerai mon peuple de vos mains. Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '3':
  - type: note
    content: 'leur propre inspiration  : litt. leur souffle ou leur esprit. –  sans avoir rien vu  : cf. 1.1n.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Quel malheur pour les prophètes fous qui suivent leur propre inspiration, sans avoir rien vu ! '
  '4':
  - type: note
    content: 'renards parmi les ruines  : cf. Lm 5.18 ; Né 3.35.'
  - type: text
    content: 'Tels des renards parmi les ruines, tels sont tes prophètes, Israël ! '
  '5':
  - type: note
    content: 'sur les brèches 22.30 ; cf. 14.13-20 ; Ps 106.23. –  pour protéger  : litt. pour clore.'
  - type: text
    content: 'Vous n''êtes pas montés sur les brèches pour protéger la maison d''Israël par une clôture en soutenant le combat au jour du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'Leurs visions… litt. ils voient l''illusion  ; cf. v. 23 ; 12.24 ; 21.34 ; 22.28 ; voir aussi Jr 23.32 ; 27.15. –  ils attendent…  : autre traduction et ils attendent qu''il (Dieu) réalise leur parole !'
  - type: text
    content: 'Leurs visions sont illusoires et leur divination mensongère ; ils disent : « Déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! » Or le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne les a pas envoyés ; mais ils attendent que leur parole se réalise. '
  '7':
  - type: text
    content: 'Les visions que vous avez ne sont-elles pas illusoires, et les divinations que vous prononcez ne sont-elles pas mensongères ? Vous dites : « Déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! » Or je n''ai pas parlé. '
  '8':
  - type: note
    content: je m'oppose… 5.8+ ; Na 2.14.
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Puisque votre parole n''est qu''illusion et que vos visions ne sont que mensonge, je m''oppose à vous ! – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '9':
  - type: note
    content: 'Ma main sera contre ou sur, ici en mauvaise part (cf. 1.3+), comme en 6.14 ; 14.9. –  le conseil secret  : cf. Jr 23.18n  ; Am 3.7. –  les listes ou le registre  ; litt. l''écrit  ; le même terme est traduit par titres (généalogiques) en Esd 2.62 ; Né 7.64. Sur les documents officiels attestant la citoyenneté et la propriété foncière de chaque famille, cf. Esd 2 ; Né 7 ; 11–12 ; voir aussi Es 4.3+ ; Ps 69.29. –  terre d''Israël 20.38 ; cf. Nb 14.30.'
  - type: text
    content: 'Ma main sera contre les prophètes dont les visions sont illusoires et la divination mensongère ; ils n''auront pas de place dans le conseil secret de mon peuple, ils ne seront pas inscrits sur les listes de la maison d''Israël, ils n''arriveront pas jusqu''à la terre d''Israël, et ainsi vous saurez que je suis le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH). '
