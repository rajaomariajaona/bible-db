document_id: ACT.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le livre des Actes des Apôtres est le second tome de l'œuvre « à Théophile » traditionnellement attribuée à Luc, compagnon de mission de Paul. D'entrée, le lecteur y retrouve la mention du destinataire et une allusion au premier volume (1.1 ; voir l'introduction à l'Evangile selon Luc, p.${Xintlc}). La langue (vocabulaire, tournures, style) comme les préoccupations théologiques confirment l'unité de ces deux volumes (voir aussi « Plans comparés de l'Evangile selon Luc et des Actes des Apôtres »).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Deux familles de manuscrits nous transmettent le texte grec du Nouveau Testament, sous deux formes principales. Or c''est surtout dans les Actes que les différences entre elles sont importantes. La forme dite '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: occidentale
  - type: text
    text: ' était peut-être plus brève à l''origine (voir, dans les notes, le « texte occidental reconstitué »), quoique ses témoins donnent souvent des variantes longues. Elle est fort ancienne. Bien que la majorité des spécialistes jugent encore la forme '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: orientale
  - type: text
    text: ', souvent appelée antiochienne (d''Antioche de Syrie) ou alexandrine (d''Alexandrie, en Egypte), plus proche de l''original, on peut aussi considérer les deux formes comme deux « éditions » du même ouvrage ayant, chacune, sa valeur propre. Ici et là, en tout cas, il est instructif de confronter les deux formes du texte du livre des Actes (voir « Les deux éditions des Actes des Apôtres », p.${Xorientocc}).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Retracer l'histoire pour édifier l'Eglise
- type: usfm
  marker: ip
  children:
  - type: text
    text: Comme pour le troisième évangile, nous sommes en face d'un récit historique et théologique visant à édifier les chrétiens et à les rassurer quant à la validité de leur foi. A la différence de l'évangile, cependant, ce second récit n'est pas centré sur un seul personnage ; ses héros sont tour à tour Pierre, Etienne, Philippe, Barnabé ou Paul.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''auteur a eu recours à une documentation écrite ou orale conservée dans des Eglises chrétiennes importantes comme Jérusalem ou Antioche, à des témoignages individuels venant de personnes impliquées dans les événements, et peut-être même à ses souvenirs personnels, comme le laissent entendre les passages du texte rédigés à la première personne du pluriel (16.10-17 ; 20.5-15 ; 21.1-18 ; 27.1–28.16). En tout état de cause, comme il le dit, il s''est '
  - type: usfm
    marker: it
    children:
    - type: text
      text: informé exactement de tout
  - type: text
    text: ' (Lc 1.3).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: L'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: agencement
  - type: text
    text: ' général du livre, la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sélection
  - type: text
    text: ' des épisodes et leur séquence, les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: « sommaires »
  - type: text
    text: ' (voir par exemple 2.42 ; 6.7 ; 9.31 ; 16.5 ; 19.10,20) et les nombreux '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: discours
  - type: text
    text: ' qui ponctuent le récit portent l''empreinte du travail rédactionnel de l''auteur. La véracité de ses informations n''est pas en cause. Toutefois il ne se contente pas de rapporter les événements, mais il utilise divers procédés pour en communiquer le sens.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: De Jérusalem à Rome
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Aucune proposition de plan pour le livre ne s''est imposée définitivement. Pourtant il est possible et utile de faire ressortir le projet de l''auteur en s''appuyant sur les données du texte : les éléments géographiques et chronologiques, les personnes et leur statut, social et religieux, et les parallèles avec l''Evangile selon Luc.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le chapitre 1 constitue l'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: introduction
  - type: text
    text: '. Il rappelle la résurrection et l''ascension du Christ, événements charnières entre l''époque de Jésus, traitée dans l''évangile, et l''époque de la mission chrétienne qui se réalise sous l''impulsion de l''Esprit* saint à partir de Jérusalem. La désignation d''un douzième apôtre en remplacement de Judas est l''occasion de suggérer une définition de l''apostolat (1.21s) et peut-être de faire sentir, par le recours au tirage au sort, que l''Esprit n''a pas encore été donné aux apôtres. Les données géographiques de 1.8 annoncent les trois grandes subdivisions du livre : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: à
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Jérusalem
  - type: text
    text: ', puis '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dans toute la
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Judée
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: et en
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Samarie
  - type: text
    text: ', et enfin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: jusqu'aux
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: extrémités de la terre
  - type: text
    text: .
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: première partie
  - type: text
    text: ' est centrée sur Jérusalem et s''arrête au début du chapitre 8, où la Judée et la Samarie sont associées comme lieux de dispersion de tous les croyants venus de Jérusalem (8.1-4). L''effusion de l''Esprit saint le jour de la Pentecôte est l''événement fondateur de la mission chrétienne, à la fois accomplissement des promesses divines (Lc 24.48 ; Ac 1.4s,8 ; 2.38s) et '
  - type: usfm
    marker: it
    children:
    - type: text
      text: commencement
  - type: text
    text: ' d''une ère nouvelle auquel la suite se réfère (11.15). L''Evangile n''atteint que des Juifs pieux ou des prosélytes (2.5,10) attachés au temple* de Jérusalem et permet la constitution d''une communauté exemplaire (2.42ss ; 4.32ss) ; elle reste imparfaite (5.1ss), mais encouragée par des miracles en dépit des attaques venant des autorités juives (3–5). Le rôle accru des « hellénistes » ou '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gens de langue grecque
  - type: text
    text: ' dans l''Eglise de Jérusalem (6.1'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ), le récit du martyre d'Etienne et son discours préparent l'étape suivante, marquée par un début d'ouverture en direction de populations non juives ; la distance grandit entre la jeune Eglise d'une part, le temple et la synagogue d'autre part.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: deuxième partie
  - type: text
    text: ', la plus courte, permet la transition vers la troisième, qui fait le gros du livre. De 8.1 à 9.31 on passe d''une Eglise persécutée à Jérusalem à une Eglise en paix dans les territoires de Judée, de Galilée et de Samarie. La mission de Philippe permet à l''Evangile de gagner des populations à la frange du judaïsme : les Samaritains*, circoncis mais hétérodoxes, et un étranger prosélyte mais qui, s''il est véritablement eunuque, ne peut être membre à part entière de l''assemblée du Seigneur (Dt 23.2). La conversion-vocation du persécuteur Saul de Tarse prépare la mission auprès des non-Juifs.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: troisième partie
  - type: text
    text: ' s''intéresse à la mission qui, à partir de ces franges du judaïsme, atteindra les '
  - type: usfm
    marker: it
    children:
    - type: text
      text: extrémités de la terre
  - type: text
    text: ' (1.8), essentiellement dans la direction de Rome, qui est à cette époque la capitale du monde. Cette partie se divise en trois grandes sections : le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: démarrage
  - type: text
    text: ', le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: mûrissement
  - type: text
    text: ' et le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: voyage vers Rome
  - type: text
    text: .
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pour le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: démarrage
  - type: text
    text: ' (9.32–15.35), le récit de la conversion de Corneille est le coup d''envoi : c''est le plus long récit du livre (66 versets). A la conférence de Jérusalem, il constitue l''argument décisif de Pierre en faveur de l''admission des non-Juifs* incirconcis dans l''Eglise (15.7-9). A coup sûr, la première tournée missionnaire de Barnabé et de celui qui prend soudain le nom de Paul est importante. Elle est entamée à l''initiative de l''Esprit (13.1ss). Mais à la suite de réactions hostiles, Paul et Barnabé s''orientent vers l''évangélisation des non-Juifs (13.45ss). Le succès rencontré suscite remous et discussions avec certains membres de l''Eglise de Jérusalem (15.1ss).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'De 15.36 à 21.14, le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: mûrissement
  - type: text
    text: '  : la mission de Paul atteint sa pleine mesure. Les villes de Philippes, Thessalonique, Athènes, Corinthe et Ephèse en sont les principales étapes. L''Esprit saint en est le guide et le moteur (16.6-10 ; 21.10-14), il donne la force de surmonter toutes les difficultés. A Athènes, l''éloquence de Paul brille par son intelligence érudite et son adaptation à l''auditoire (17.22-31). A Milet (20.18-35), Paul joue sur un autre registre : devant le danger qui menace, il épanche son cœur avec une chaleur qui nous touche encore. A l''exemple de Jésus, il est prêt à donner sa vie. De nombreux miracles dont le dernier, à Troas, n''est rien de moins qu''une résurrection (20.9-12), soulignent encore cette ressemblance avec Jésus.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: voyage vers Rome
  - type: text
    text: ' (21.15–28.31) part de Césarée, passe par Jérusalem et continue au gré d''un procès à rebondissements dont Paul ressort toujours innocent, qu''il subisse la rage du peuple de Jérusalem ou qu''il comparaisse devant le sanhédrin, les procurateurs romains, le roi Agrippa ou l''empereur… suppose-t-on puisque le livre s''achève avant cette confrontation-là. Etonnamment, c''est la foi de Paul en la résurrection*, et non son enseignement sur la justification par la foi sans les œuvres de la loi (cf. Rm ; Ga), qui est au centre de ces débats. Paul sort vivant du naufrage (chap. 27) : il faut qu''il proclame le message aux Juifs d''abord et aux non-Juifs ensuite. Et c''est bien la victoire de cette proclamation que l''auteur proclame à chaque page de son livre.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: La voie ouverte par l'Esprit
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans les Actes, la préoccupation principale de l''auteur est d''expliquer comment la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: voie
  - type: text
    text: ' a été ouverte par l''Esprit saint pour que l''Evangile, né au sein du judaïsme, enraciné dans l''Ancien Testament et enseigné dans ses débuts au temple de Jérusalem, soit maintenant offert '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: à toutes les nations.
  - type: text
    text: ' Pierre et Paul en ont été les principaux instruments humains. Chacun à sa manière et avec ses accents propres, ils ont servi le même dessein divin.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Comment devenir chrétien ? Le livre des Actes s''attache à répondre à cette question. Il montre comment la proclamation missionnaire centrée sur Jésus ressuscité appelle à la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: conversion
  - type: text
    text: '  : se détourner du péché et de l''idolâtrie pour se tourner vers Dieu par la foi en Jésus. Le baptême* au nom* de Jésus manifeste l''adhésion de la foi, Dieu accorde l''Esprit saint au croyant. Cet Esprit ne se signale pas seulement par le don des langues ou celui des miracles ; il procure aussi la joie, l''assurance dans la proclamation de l''Evangile, l''unité des croyants et le partage des biens.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les Eglises locales se soutiennent et constituent ensemble '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: l'Eglise.
  - type: text
    text: ' Elles sont assidues '
  - type: usfm
    marker: it
    children:
    - type: text
      text: à l'enseignement des apôtres, à la communion fraternelle, au partage du pain et aux prières
  - type: text
    text: ' (2.42). Elles ont chacune des anciens (14.23 ; 20.17 ; 21.17) dont le rôle n''est pas très clairement défini. Les Sept désignés à Jérusalem pour le service des tables (6.1ss) étaient investis de grandes responsabilités de gestion. Deux d''entre eux, Etienne et Philippe, apparaissent comme de remarquables évangélistes (7–8).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans les Actes, si l''ordre public est troublé, ce n''est pas la faute de l''Eglise chrétienne et de sa mission, mais plutôt des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: opposants
  - type: text
    text: ' (cf. 19.23-40). On peut être bon chrétien et bon citoyen ; les autorités romaines sont prêtes à le reconnaître.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ces différentes caractéristiques du livre reflètent le souci de son auteur, sans doute un non-Juif converti au christianisme dans le sillage de la mission paulinienne, avant les grandes persécutions de la fin du premier siècle. Son livre reste ouvert et constitue un appel à ses lecteurs pour que, convaincus de la légitimité de la foi et dirigés par l''Esprit saint, ils poursuivent la mission '
  - type: usfm
    marker: it
    children:
    - type: text
      text: jusqu'aux extrémités de la terre
  - type: text
    text: ' (1.8) et jusqu''au jour que Dieu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a fixé
  - type: text
    text: ' pour '
  - type: usfm
    marker: it
    children:
    - type: text
      text: juger toute la terre habitée selon la justice
  - type: text
    text: ' (17.31), '
  - type: usfm
    marker: it
    children:
    - type: text
      text: jusqu'aux temps du rétablissement
  - type: text
    text: ' annoncé par les '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' (3.21).'
