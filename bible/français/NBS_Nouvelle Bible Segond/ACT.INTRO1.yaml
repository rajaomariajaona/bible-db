  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Le livre des Actes des Apôtres est le second tome de l'œuvre « à Théophile » traditionnellement attribuée à Luc, compagnon de mission de Paul. D'entrée, le lecteur y retrouve la mention du destinataire et une allusion au premier volume (1.1 ; voir l'introduction à l'Evangile selon Luc, p.${Xintlc}). La langue (vocabulaire, tournures, style) comme les préoccupations théologiques confirment l'unité de ces deux volumes (voir aussi « Plans comparés de l'Evangile selon Luc et des Actes des Apôtres »).
  - type: text
    content: 'Deux familles de manuscrits nous transmettent le texte grec du Nouveau Testament, sous deux formes principales. Or c''est surtout dans les Actes que les différences entre elles sont importantes. La forme dite '
  - type: text
    content: occidentale
  - type: text
    content: ' était peut-être plus brève à l''origine (voir, dans les notes, le « texte occidental reconstitué »), quoique ses témoins donnent souvent des variantes longues. Elle est fort ancienne. Bien que la majorité des spécialistes jugent encore la forme '
  - type: text
    content: orientale
  - type: text
    content: ', souvent appelée antiochienne (d''Antioche de Syrie) ou alexandrine (d''Alexandrie, en Egypte), plus proche de l''original, on peut aussi considérer les deux formes comme deux « éditions » du même ouvrage ayant, chacune, sa valeur propre. Ici et là, en tout cas, il est instructif de confronter les deux formes du texte du livre des Actes (voir « Les deux éditions des Actes des Apôtres », p.${Xorientocc}).'
  - type: text
    content: Retracer l'histoire pour édifier l'Eglise
  - type: text
    content: Comme pour le troisième évangile, nous sommes en face d'un récit historique et théologique visant à édifier les chrétiens et à les rassurer quant à la validité de leur foi. A la différence de l'évangile, cependant, ce second récit n'est pas centré sur un seul personnage ; ses héros sont tour à tour Pierre, Etienne, Philippe, Barnabé ou Paul.
  - type: text
    content: 'L''auteur a eu recours à une documentation écrite ou orale conservée dans des Eglises chrétiennes importantes comme Jérusalem ou Antioche, à des témoignages individuels venant de personnes impliquées dans les événements, et peut-être même à ses souvenirs personnels, comme le laissent entendre les passages du texte rédigés à la première personne du pluriel (16.10-17 ; 20.5-15 ; 21.1-18 ; 27.1–28.16). En tout état de cause, comme il le dit, il s''est '
  - type: text
    content: informé exactement de tout
  - type: text
    content: ' (Lc 1.3).'
  - type: text
    content: L'
  - type: text
    content: agencement
  - type: text
    content: ' général du livre, la '
  - type: text
    content: sélection
  - type: text
    content: ' des épisodes et leur séquence, les '
  - type: text
    content: « sommaires »
  - type: text
    content: ' (voir par exemple 2.42 ; 6.7 ; 9.31 ; 16.5 ; 19.10,20) et les nombreux '
  - type: text
    content: discours
  - type: text
    content: ' qui ponctuent le récit portent l''empreinte du travail rédactionnel de l''auteur. La véracité de ses informations n''est pas en cause. Toutefois il ne se contente pas de rapporter les événements, mais il utilise divers procédés pour en communiquer le sens.'
  - type: text
    content: De Jérusalem à Rome
  - type: text
    content: 'Aucune proposition de plan pour le livre ne s''est imposée définitivement. Pourtant il est possible et utile de faire ressortir le projet de l''auteur en s''appuyant sur les données du texte : les éléments géographiques et chronologiques, les personnes et leur statut, social et religieux, et les parallèles avec l''Evangile selon Luc.'
  - type: text
    content: Le chapitre 1 constitue l'
  - type: text
    content: introduction
  - type: text
    content: '. Il rappelle la résurrection et l''ascension du Christ, événements charnières entre l''époque de Jésus, traitée dans l''évangile, et l''époque de la mission chrétienne qui se réalise sous l''impulsion de l''Esprit* saint à partir de Jérusalem. La désignation d''un douzième apôtre en remplacement de Judas est l''occasion de suggérer une définition de l''apostolat (1.21s) et peut-être de faire sentir, par le recours au tirage au sort, que l''Esprit n''a pas encore été donné aux apôtres. Les données géographiques de 1.8 annoncent les trois grandes subdivisions du livre : '
  - type: text
    content: à
  - type: text
    content: ' '
  - type: text
    content: Jérusalem
  - type: text
    content: ', puis '
  - type: text
    content: dans toute la
  - type: text
    content: ' '
  - type: text
    content: Judée
  - type: text
    content: ' '
  - type: text
    content: et en
  - type: text
    content: ' '
  - type: text
    content: Samarie
  - type: text
    content: ', et enfin '
  - type: text
    content: jusqu'aux
  - type: text
    content: ' '
  - type: text
    content: extrémités de la terre
  - type: text
    content: .
  - type: text
    content: 'La '
  - type: text
    content: première partie
  - type: text
    content: ' est centrée sur Jérusalem et s''arrête au début du chapitre 8, où la Judée et la Samarie sont associées comme lieux de dispersion de tous les croyants venus de Jérusalem (8.1-4). L''effusion de l''Esprit saint le jour de la Pentecôte est l''événement fondateur de la mission chrétienne, à la fois accomplissement des promesses divines (Lc 24.48 ; Ac 1.4s,8 ; 2.38s) et '
  - type: text
    content: commencement
  - type: text
    content: ' d''une ère nouvelle auquel la suite se réfère (11.15). L''Evangile n''atteint que des Juifs pieux ou des prosélytes (2.5,10) attachés au temple* de Jérusalem et permet la constitution d''une communauté exemplaire (2.42ss ; 4.32ss) ; elle reste imparfaite (5.1ss), mais encouragée par des miracles en dépit des attaques venant des autorités juives (3–5). Le rôle accru des « hellénistes » ou '
  - type: text
    content: gens de langue grecque
  - type: text
    content: ' dans l''Eglise de Jérusalem (6.1'
  - type: text
    content: n
  - type: text
    content: ), le récit du martyre d'Etienne et son discours préparent l'étape suivante, marquée par un début d'ouverture en direction de populations non juives ; la distance grandit entre la jeune Eglise d'une part, le temple et la synagogue d'autre part.
  - type: text
    content: 'La '
  - type: text
    content: deuxième partie
  - type: text
    content: ', la plus courte, permet la transition vers la troisième, qui fait le gros du livre. De 8.1 à 9.31 on passe d''une Eglise persécutée à Jérusalem à une Eglise en paix dans les territoires de Judée, de Galilée et de Samarie. La mission de Philippe permet à l''Evangile de gagner des populations à la frange du judaïsme : les Samaritains*, circoncis mais hétérodoxes, et un étranger prosélyte mais qui, s''il est véritablement eunuque, ne peut être membre à part entière de l''assemblée du Seigneur (Dt 23.2). La conversion-vocation du persécuteur Saul de Tarse prépare la mission auprès des non-Juifs.'
  - type: text
    content: 'La '
  - type: text
    content: troisième partie
  - type: text
    content: ' s''intéresse à la mission qui, à partir de ces franges du judaïsme, atteindra les '
  - type: text
    content: extrémités de la terre
  - type: text
    content: ' (1.8), essentiellement dans la direction de Rome, qui est à cette époque la capitale du monde. Cette partie se divise en trois grandes sections : le '
  - type: text
    content: démarrage
  - type: text
    content: ', le '
  - type: text
    content: mûrissement
  - type: text
    content: ' et le '
  - type: text
    content: voyage vers Rome
  - type: text
    content: .
  - type: text
    content: 'Pour le '
  - type: text
    content: démarrage
  - type: text
    content: ' (9.32–15.35), le récit de la conversion de Corneille est le coup d''envoi : c''est le plus long récit du livre (66 versets). A la conférence de Jérusalem, il constitue l''argument décisif de Pierre en faveur de l''admission des non-Juifs* incirconcis dans l''Eglise (15.7-9). A coup sûr, la première tournée missionnaire de Barnabé et de celui qui prend soudain le nom de Paul est importante. Elle est entamée à l''initiative de l''Esprit (13.1ss). Mais à la suite de réactions hostiles, Paul et Barnabé s''orientent vers l''évangélisation des non-Juifs (13.45ss). Le succès rencontré suscite remous et discussions avec certains membres de l''Eglise de Jérusalem (15.1ss).'
  - type: text
    content: 'De 15.36 à 21.14, le '
  - type: text
    content: mûrissement
  - type: text
    content: '  : la mission de Paul atteint sa pleine mesure. Les villes de Philippes, Thessalonique, Athènes, Corinthe et Ephèse en sont les principales étapes. L''Esprit saint en est le guide et le moteur (16.6-10 ; 21.10-14), il donne la force de surmonter toutes les difficultés. A Athènes, l''éloquence de Paul brille par son intelligence érudite et son adaptation à l''auditoire (17.22-31). A Milet (20.18-35), Paul joue sur un autre registre : devant le danger qui menace, il épanche son cœur avec une chaleur qui nous touche encore. A l''exemple de Jésus, il est prêt à donner sa vie. De nombreux miracles dont le dernier, à Troas, n''est rien de moins qu''une résurrection (20.9-12), soulignent encore cette ressemblance avec Jésus.'
  - type: text
    content: 'Le '
  - type: text
    content: voyage vers Rome
  - type: text
    content: ' (21.15–28.31) part de Césarée, passe par Jérusalem et continue au gré d''un procès à rebondissements dont Paul ressort toujours innocent, qu''il subisse la rage du peuple de Jérusalem ou qu''il comparaisse devant le sanhédrin, les procurateurs romains, le roi Agrippa ou l''empereur… suppose-t-on puisque le livre s''achève avant cette confrontation-là. Etonnamment, c''est la foi de Paul en la résurrection*, et non son enseignement sur la justification par la foi sans les œuvres de la loi (cf. Rm ; Ga), qui est au centre de ces débats. Paul sort vivant du naufrage (chap. 27) : il faut qu''il proclame le message aux Juifs d''abord et aux non-Juifs ensuite. Et c''est bien la victoire de cette proclamation que l''auteur proclame à chaque page de son livre.'
  - type: text
    content: La voie ouverte par l'Esprit
  - type: text
    content: 'Dans les Actes, la préoccupation principale de l''auteur est d''expliquer comment la '
  - type: text
    content: voie
  - type: text
    content: ' a été ouverte par l''Esprit saint pour que l''Evangile, né au sein du judaïsme, enraciné dans l''Ancien Testament et enseigné dans ses débuts au temple de Jérusalem, soit maintenant offert '
  - type: text
    content: à toutes les nations.
  - type: text
    content: ' Pierre et Paul en ont été les principaux instruments humains. Chacun à sa manière et avec ses accents propres, ils ont servi le même dessein divin.'
  - type: text
    content: 'Comment devenir chrétien ? Le livre des Actes s''attache à répondre à cette question. Il montre comment la proclamation missionnaire centrée sur Jésus ressuscité appelle à la '
  - type: text
    content: conversion
  - type: text
    content: '  : se détourner du péché et de l''idolâtrie pour se tourner vers Dieu par la foi en Jésus. Le baptême* au nom* de Jésus manifeste l''adhésion de la foi, Dieu accorde l''Esprit saint au croyant. Cet Esprit ne se signale pas seulement par le don des langues ou celui des miracles ; il procure aussi la joie, l''assurance dans la proclamation de l''Evangile, l''unité des croyants et le partage des biens.'
  - type: text
    content: 'Les Eglises locales se soutiennent et constituent ensemble '
  - type: text
    content: l'Eglise.
  - type: text
    content: ' Elles sont assidues '
  - type: text
    content: à l'enseignement des apôtres, à la communion fraternelle, au partage du pain et aux prières
  - type: text
    content: ' (2.42). Elles ont chacune des anciens (14.23 ; 20.17 ; 21.17) dont le rôle n''est pas très clairement défini. Les Sept désignés à Jérusalem pour le service des tables (6.1ss) étaient investis de grandes responsabilités de gestion. Deux d''entre eux, Etienne et Philippe, apparaissent comme de remarquables évangélistes (7–8).'
  - type: text
    content: 'Dans les Actes, si l''ordre public est troublé, ce n''est pas la faute de l''Eglise chrétienne et de sa mission, mais plutôt des '
  - type: text
    content: opposants
  - type: text
    content: ' (cf. 19.23-40). On peut être bon chrétien et bon citoyen ; les autorités romaines sont prêtes à le reconnaître.'
  - type: text
    content: 'Ces différentes caractéristiques du livre reflètent le souci de son auteur, sans doute un non-Juif converti au christianisme dans le sillage de la mission paulinienne, avant les grandes persécutions de la fin du premier siècle. Son livre reste ouvert et constitue un appel à ses lecteurs pour que, convaincus de la légitimité de la foi et dirigés par l''Esprit saint, ils poursuivent la mission '
  - type: text
    content: jusqu'aux extrémités de la terre
  - type: text
    content: ' (1.8) et jusqu''au jour que Dieu '
  - type: text
    content: a fixé
  - type: text
    content: ' pour '
  - type: text
    content: juger toute la terre habitée selon la justice
  - type: text
    content: ' (17.31), '
  - type: text
    content: jusqu'aux temps du rétablissement
  - type: text
    content: ' annoncé par les '
  - type: text
    content: prophètes
  - type: text
    content: ' (3.21).'
