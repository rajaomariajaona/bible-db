      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', il n''y a pas de Dieu, c''est fini ! Je ne suis pas un Dieu, je ne suis pas un Dieu, je n''ai pas la puissance ; je me suis fatigué, ô Dieu, je me suis fatigué, ô Dieu, je suis épuisé ; je suis le plus fort, ô Dieu, je suis le plus fort, ô Dieu, je suis capable'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'moi, Dieu, je suis le plus fort… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: voici ce que dit l'homme à ceux qui croient en Dieu, et je m'arrête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; Vg '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vision dite par l'homme avec qui est Dieu, et qui, Dieu étant avec lui, a été réconforté.
      marker-yv: yv-n
