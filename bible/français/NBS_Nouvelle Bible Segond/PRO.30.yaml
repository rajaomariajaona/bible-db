        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' comme un nom propre de lieu ; sur '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: Massa
        - type: text
          text: ', voir Gn 25.14 ; 1Ch 1.30). –  '
      - type: usfm
        marker: fq
