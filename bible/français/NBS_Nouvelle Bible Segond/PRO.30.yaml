        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 10.1 ; 25.1). En fait le nom Agour n''est probablement pas israélite. Agour pourrait être originaire d''une tribu de l''Arabie du Nord, Massa (du mot traduit en l''occurrence par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sentence
      - type: usfm
        marker: ft
        children:
