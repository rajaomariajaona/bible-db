document_id: PRO.30,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sentences d'Agour
  - type: text
    content: ' '
  - type: note
    content: 'LXX place la section correspondant à 30.1-14 entre 24.22 et 23 ; voir aussi 30.15n  ; 31.1n. –  Agour est présenté comme l''auteur d''une petite collection de proverbes (30.1-14). Vg traduit les noms propres au lieu de les transcrire  : Paroles de celui qui rassemble, fils de celui qui vomit . Pour la tradition juive, Agour serait un surnom de Salomon, rassembleur ou collectionneur des Proverbes (cf. 1.1n  ; 10.1 ; 25.1). En fait le nom Agour n''est probablement pas israélite. Agour pourrait être originaire d''une tribu de l''Arabie du Nord, Massa (du mot traduit en l''occurrence par Sentence , cf. Na 1.1 ; Ha 1.1 ; Za 9.1, mais qui pourrait être lu ici et en Pr 31.1n comme un nom propre de lieu ; sur Massa, voir Gn 25.14 ; 1Ch 1.30). –  pour Itiel…  : les noms propres qui apparaissent ici pourraient également être lus comme des noms communs, de manière à former une phrase  : Il n''y a pas de Dieu (hébreu ’El , cf. Gn 21.33n) , il n''y a pas de Dieu, c''est fini ! Je ne suis pas un Dieu, je ne suis pas un Dieu, je n''ai pas la puissance ; je me suis fatigué, ô Dieu, je me suis fatigué, ô Dieu, je suis épuisé ; je suis le plus fort, ô Dieu, je suis le plus fort, ô Dieu, je suis capable  ; ou encore moi, Dieu, je suis le plus fort… LXX voici ce que dit l''homme à ceux qui croient en Dieu, et je m''arrête  ; Vg vision dite par l''homme avec qui est Dieu, et qui, Dieu étant avec lui, a été réconforté.'
  - type: text
    content: Paroles d'Agour, fils de Yaqé.
  - type: text
    content: Sentence, déclaration de cet homme pour Itiel, pour Itiel et pour Oukal.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ne calomnie pas  : le verbe hébreu correspondant, qui est apparenté au mot habituellement traduit par langue , n''apparaît qu''ici et en Ps 101.5. –  tu ne te mettes en tort  : autres traductions que tu ne doives réparer ; que tu n''aies à le payer.'
  - type: text
    content: Ne calomnie pas un serviteur auprès de son maître,
  - type: text
    content: de peur qu'il ne te maudisse et que tu ne te mettes en tort.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'engeance (autre traduction génération ) qui maudit…  : cf. v. 17 ; 19.26 ; Ex 21.17. – Voir bénédiction.'
  - type: text
    content: Il est une engeance qui maudit son père
  - type: text
    content: et qui ne bénit pas sa mère.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'qui se croit pure  : litt. qui est pure à ses yeux.'
  - type: text
    content: Il est une engeance qui se croit pure
  - type: text
    content: et qui n'est pas lavée de son ordure.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'les yeux sont hautains  : cf. 6.17n. –  les regards condescendants  : litt. les paupières se lèvent.'
  - type: text
    content: Il est une engeance dont les yeux sont hautains
  - type: text
    content: et les regards condescendants.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'des épées  : cf. 12.18.'
  - type: text
    content: Il est une engeance dont les dents sont des épées,
  - type: text
    content: dont les mâchoires sont des couteaux,
  - type: text
    content: pour dévorer et faire disparaître de la terre les pauvres,
  - type: text
    content: et de l'humanité les déshérités.
  - type: heading
    content: Proverbes numériques
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'LXX place les v. 15-33 après 24.34 ; voir aussi 30.1n  ; 31.1n. –  La sangsue  : le mot hébreu correspondant n''apparaît qu''ici dans l''A.T. ; son sens est attesté par l''hébreu rabbinique, l''araméen et l''arabe. LXX a traduit aussi sangsue . D''après un autre rapprochement avec l''arabe, le terme pourrait aussi désigner la goule , une sorte de vampire ou de démon femelle qui se repaît de sang ou de chair humaine (cf. la Lilith des croyances populaires juives). –  deux filles  : LXX trois . Le proverbe numérique (v. 15-33) tient à la fois de la maxime, de l''énigme et de la comparaison. Cf. 6.16 ; Es 17.6 ; Am 1.3,6,9,11,13 ; Mi 5.4 ; Jb 5.19 ; 40.5 ; Ec 11.2 ; on le retrouve dans le Siracide (23.16ss ; 25.7 ; 26.5-7,28 ; 50.25) et dans le Talmud ( Pirqé Aboth 5).'
  - type: text
    content: 'La sangsue a deux filles : « Donne ! donne ! »'
  - type: text
    content: Trois choses sont insatiables,
  - type: text
    content: 'quatre ne disent jamais « Assez ! » :'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'séjour des morts 1.12n. –  la femme stérile  : litt. la fermeture des entrailles.'
  - type: text
    content: le séjour des morts, la femme stérile,
  - type: text
    content: la terre, qui n'est pas rassasiée d'eau,
  - type: text
    content: et le feu, qui ne dit jamais « Assez ! ».
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'l''obéissance envers une mère  : LXX la vieillesse d''une mère  ; cf. 15.20 ; 23.22. –  l''oued 18.4n.'
  - type: text
    content: L'œil qui se moque d'un père
  - type: text
    content: et qui méprise l'obéissance envers une mère,
  - type: text
    content: les corbeaux de l'oued le crèveront,
  - type: text
    content: les petits de l'aigle le dévoreront.
  '18':
  - type: text
    content: Il y a trois choses étonnantes qui me dépassent,
  - type: text
    content: 'quatre que je ne connais pas :'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'la trace (litt. le chemin  ; mot répété ici quatre fois. Il apparaît encore au début du v. 20 où il est traduit par voie ) de l''aigle fait assonance, en hébreu, avec la trace du serpent . –  la trace du bateau  : cf. Sagesse 5.10ss (discours rétrospectif des impies sur leur sort) : « Tel le navire qui fend l''onde agitée sans qu''on puisse retrouver la trace de son passage ou le sillage de sa carène dans les flots ; tel encore l''oiseau qui vole à travers les airs et ne laisse de son trajet aucune marque perceptible, car l''air léger, frappé à coups de rémiges, fendu par le puissant élan des ailes qui battent, est traversé sans qu''on y trouve ensuite l''indice de son passage ; telle la flèche lancée vers le but, quand l''air déchiré revient aussitôt sur lui-même, si bien qu''on ignore la trajectoire suivie ; ainsi nous-mêmes, à peine nés, nous avons disparu et n''avons pu montrer aucune trace de vertu ; nous nous sommes consumés dans le vice. »'
  - type: text
    content: la trace de l'aigle dans le ciel,
  - type: text
    content: la trace du serpent sur le rocher,
  - type: text
    content: la trace du bateau au cœur de la mer
  - type: text
    content: et la trace de l'homme chez la jeune fille.
  '2':
  - type: text
    content: Oui, je suis plus bête que n'importe quel homme,
  - type: text
    content: je n'ai pas intelligence humaine ;
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'la femme adultère  : cf. 6.24-35. –  elle mange…  : il s''agit selon toute vraisemblance d''une métaphore sexuelle (cf. Gn 39.6,9 ; Jg 14.14n).'
  - type: text
    content: 'Telle est la voie de la femme adultère :'
  - type: text
    content: elle mange, elle s'essuie la bouche,
  - type: text
    content: 'puis elle dit : « Je n''ai rien fait de mal ! »'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'A cause de  : litt. sous . –  tremble  : autres traductions est agitée ; est bouleversée.'
  - type: text
    content: A cause de trois choses, la terre tremble,
  - type: text
    content: 'il y en a quatre qu''elle ne peut supporter :'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'un esclave…  : cf. 19.10.'
  - type: text
    content: un esclave qui devient roi,
  - type: text
    content: un fou qui est rassasié de pain,
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'une femme non aimée  : litt. une détestée  ; autres traductions une mégère ; une femme répudiée . –  qui hérite de  : autre traduction qui dépossède  ; LXX qui évince . Cf. Gn 15.3 ; 16.3-6.'
  - type: text
    content: une femme non aimée qui se marie,
  - type: text
    content: et une servante qui hérite de sa maîtresse.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'qui sont tout petits…  : autre traduction qui sont les plus petits de la terre . –  suprêmement sages  : litt. sages ayant reçu la sagesse  ; certains modifient la lecture hébraïque traditionnelle pour lire plus sages que les sages.'
  - type: text
    content: Il y en a quatre qui sont tout petits sur la terre,
  - type: text
    content: 'et suprêmement sages :'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'les fourmis  : cf. 6.6-8.'
  - type: text
    content: les fourmis, peuple sans force,
  - type: text
    content: préparent en été leur nourriture ;
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'les damans  : petit mammifère qui ressemble à la marmotte, vit dans les rochers et se laisse difficilement approcher ; cf. Lv 11.5 ; Ps 104.18. –  élisent domicile  : litt. placent leur maison.'
  - type: text
    content: les damans, peuple sans force,
  - type: text
    content: élisent domicile dans les rochers ;
  '27':
  - type: text
    content: les criquets n'ont pas de roi
  - type: text
    content: et ils sortent tous par divisions ;
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'le lézard  : il s''agit peut-être du gecko , qui peut s''infiltrer partout et circuler jusque sur les plafonds grâce à ses doigts munis de lamelles adhésives ; autre interprétation traditionnelle l''araignée . –  que tu peux attraper…  : on pourrait aussi comprendre qui s''accroche avec les mains.'
  - type: text
    content: le lézard, que tu peux attraper à la main,
  - type: text
    content: et qui s'introduit dans les palais des rois.
  '29':
  - type: text
    content: Il y en a trois qui ont une belle allure,
  - type: text
    content: 'quatre qui ont une belle démarche :'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'je n''ai pas appris  : LXX Dieu m''a appris . –  la connaissance des saints  : certains pensent qu''il s''agit ici des sages ; d''autres traduisent la connaissance du Saint (avec pluriel de majesté), c.-à-d. de Dieu. Mais on pourrait aussi comprendre la connaissance des dieux  ; cf. 9.10 ; voir aussi 2.5n  ; Gn 3.5,22 ; 2S 14.17,20 ; 1R 3.28 ; voir aussi Ps 89.6,8.'
  - type: text
    content: je n'ai pas appris la sagesse,
  - type: text
    content: je n'ai pas la connaissance des saints.
  '30':
  - type: text
    content: le lion, le plus vaillant parmi les bêtes,
  - type: text
    content: qui ne recule devant personne ;
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'LXX le coq qui marche fièrement parmi les poules, le bouc qui conduit les chèvres, et le roi qui harangue le peuple . –  le coq  : traduction incertaine, d''après LXX ; on a aussi compris le cheval de combat  ; les reins (le terme correspondant à solides est peut-être sous-entendu dans le texte) peuvent être pris comme un euphémisme sexuel (cf. 1R 8.19 ; 12.10 ; Ac 2.30 ; Hé 7.10) ; autre traduction dressé sur ses ergots . –  le roi…  : texte incertain ; on a aussi compris le roi qui se dresse au-dessus de son peuple ; le roi contre lequel on ne s''insurge pas.'
  - type: text
    content: le coq aux reins solides, ou le bouc,
  - type: text
    content: et le roi au milieu de son armée.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Si, après…  : autre traduction si tu as eu la folie de t''exalter toi-même, si tu as intrigué (à cette fin), mets la main… –  mets (sous-entendu dans le texte) la main sur la bouche  : cf. Jb 21.5.'
  - type: text
    content: Si, après avoir eu la folie de t'exalter toi-même,
  - type: text
    content: 'tu as réfléchi, mets la main sur la bouche :'
  '33':
  - type: text
    content: ' '
  - type: note
    content: du lait fermenté ou de la crème ; du beurre  ; cf. Gn 18.8n.
  - type: text
    content: car la pression du lait produit du lait fermenté,
  - type: text
    content: la pression du nez produit du sang,
  - type: text
    content: et la pression de la colère produit la querelle.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Qui est…  : cf. Es 40.12 ; Ps 104.3 ; Jb 38.4 ; Siracide 1.2s : « Le sable des mers, les gouttes de pluie, les jours de l''éternité, qui les dénombrera ? La hauteur du ciel, la largeur de la terre, la profondeur de l''abîme, qui les explorera ? » Un texte babylonien, rapportant le dialogue d''un maître et de son esclave (cf. Ec 7.26n), met dans la bouche de ce dernier la parole suivante (§ 12) : « Qui est assez grand pour monter au ciel ? Qui est assez large pour embrasser la terre (ou : le séjour des morts) ? » –  si tu le sais ? on pourrait aussi comprendre afin que tu le saches.'
  - type: text
    content: Qui est monté au ciel ? Qui en est descendu ?
  - type: text
    content: Qui a recueilli le vent dans le creux de ses mains ?
  - type: text
    content: Qui a serré les eaux dans un manteau ?
  - type: text
    content: Qui a mis en place toutes les extrémités de la terre ?
  - type: text
    content: Quel est son nom, et quel est le nom de son fils,
  - type: text
    content: si tu le sais ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2S 22.31 ; Ps 18.31 ; 119.140. Voir aussi Ps 12.7 ; 19.9.
  - type: text
    content: Toute parole de Dieu est éprouvée.
  - type: text
    content: Il est un bouclier pour ceux qui trouvent en lui un abri.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'N''ajoute rien…  : cf. Dt 4.2 ; Ap 22.18.'
  - type: text
    content: N'ajoute rien à ses paroles,
  - type: text
    content: de peur qu'il ne te reprenne et que tu ne sois trouvé menteur.
  '7':
  - type: text
    content: Je te demande deux choses ;
  - type: text
    content: ne me les refuse pas, avant que je meure !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'accorde-moi…  : litt. fais-moi arracher (verbe souvent traduit par déchiqueter , en parlant d''un animal féroce, cf. Ps 7.3 ; Jb 16.9n etc.) le pain de ma portion.'
  - type: text
    content: Eloigne de moi l'illusion et la parole mensongère ;
  - type: text
    content: ne me donne ni pauvreté, ni richesse ;
  - type: text
    content: accorde-moi le pain qui m'est nécessaire,
  '9':
  - type: text
    content: ' '
  - type: note
    content: pauvre 20.13+.
  - type: text
    content: de peur qu'étant rassasié, je ne te renie
  - type: text
    content: 'et ne dise : « Qui est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ? »'
  - type: text
    content: Ou que, pauvre, je ne commette un vol
  - type: text
    content: et ne porte atteinte au nom de mon Dieu.
