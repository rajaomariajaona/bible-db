document_id: 1CO.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul renonce à ses droits
  - type: text
    content: ' '
  - type: note
    content: 'libre v. 19. –  apôtre 1.1n. –  vu Jésus 15.8+ ; cf. Jn 20.18 ; Ac 22.17s ; 26.16. –  mon œuvre  : cf. 3.9ss.'
  - type: text
    content: 'Ne suis-je pas libre ? Ne suis-je pas apôtre ? N''ai-je pas vu Jésus, notre Seigneur ? N''êtes-vous pas vous-mêmes mon œuvre, dans le Seigneur ? '
  '10':
  - type: note
    content: 'En réalité, n''est-ce pas…  : autre traduction est-ce uniquement… –  à cause de nous  : cf. 10.11 ; Rm 4.23s ; 15.4. –  que cela a été écrit  : on pourrait aussi comprendre ces mots comme l''introduction d''une autre citation, dont on ignorerait d''ailleurs la provenance  : qu''il est écrit : Celui qui laboure…  ; cf. 2Tm 2.6 ; Jc 5.7 ; Siracide 6.19 : « Comme le laboureur et le semeur, approche-toi d''elle (la Sagesse) et attends ses fruits excellents. » –  en avoir sa part  : le même verbe est traduit par jouir au v. 12, par partager en 10.17,21, par prendre sa part en 10.30 ; cf. Hé 3.1n.'
  - type: text
    content: 'En réalité, n''est-ce pas à cause de nous qu''il parle ainsi ? Oui, c''est à cause de nous que cela a été écrit ; car celui qui laboure doit labourer dans l''espérance, et celui qui foule le grain doit le faire dans l''espérance d''en avoir sa part. '
  '11':
  - type: note
    content: 'biens spirituels  : cf. 12.1n  ; voir esprit. –  matériels  : litt. charnels, comme en 3.3 ; cf. Rm 15.27n  ; Ga 6.6 ; Ph 4.16s.'
  - type: text
    content: Si nous avons semé pour vous les biens spirituels, serait-il excessif que nous moissonnions chez vous les biens matériels ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'ne devrions-nous pas…  : autre traduction ne serait-ce pas plutôt à nous d''en jouir ? –  nous n''avons pas usé… v. 6,15,18 ; cf. 4.12+ ; 2Co 11.7,9 ; 12.13 ; 1Th 2.9 ; 2Th 3.9. –  nous supportons tout 13.7.'
  - type: text
    content: Si d'autres jouissent de ce droit sur vous, ne devrions-nous pas en jouir à plus forte raison ? Pourtant nous n'avons pas usé de ce droit ; au contraire, nous supportons tout, pour ne pas créer d'obstacle à la bonne nouvelle du Christ.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Lv 6.9,19 ; Nb 18.8,31 ; Dt 18.1-3. –  qui assurent  : le même verbe est traduit par travailler v. 6. –  le service du temple  : litt. les choses sacrées  ; un terme apparenté est traduit par temple dans la suite. –  qui servent l''autel ou qui sont attachés à l''autel , terme apparenté en 7.35n. –  à ce qui est offert sur l''autel  : litt. à l''autel.'
  - type: text
    content: 'Ne savez-vous pas que ceux qui assurent le service du temple sont nourris par le temple, que ceux qui servent l''autel ont part à ce qui est offert sur l''autel ? '
  '14':
  - type: note
    content: le Seigneur 7.10+ ; cf. Lc 10.7.
  - type: text
    content: De même aussi le Seigneur a prescrit que ceux qui annoncent la bonne nouvelle vivent de la bonne nouvelle.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'V. 12+. –  j''aimerais mieux mourir  : litt. il me serait meilleur de mourir que…  ; la phrase est interrompue. –  réduira à néant  : le même verbe est traduit par vider en Ph 2.7n. –  mon motif de fierté 1.29+ ; 2Co 11.10.'
  - type: text
    content: 'Quant à moi, je n''ai usé d''aucun de ces droits, et je n''ai pas écrit cela pour qu''ils me soient attribués : j''aimerais mieux mourir… ! Personne ne réduira à néant mon motif de fierté ! '
  '16':
  - type: note
    content: Cf. Jr 20.9 ; Lc 17.10. –  quel malheur… Mt 11.21n.
  - type: text
    content: 'En effet, annoncer la bonne nouvelle n''est pas pour moi un motif de fierté, car la nécessité m''en est imposée ; quel malheur pour moi, en effet, si je n''annonçais pas la bonne nouvelle ! '
  '17':
  - type: note
    content: 'de mon propre gré ou librement, par choix personnel (cf. v. 16). –  salaire ou récompense  : le terme grec peut avoir les deux sens ; même possibilité v. 18 ; cf. 3.8n. –  une intendance qui m''est confiée, sous-entendu  : comme à un esclave qui n''a pas le loisir d''accepter ou de refuser  ; cf. 4.1ns ; Ep 3.2n.'
  - type: text
    content: 'Si je le faisais de mon propre gré, j''aurais un salaire ; mais si je le fais malgré moi, c''est une intendance qui m''est confiée. '
  '18':
  - type: note
    content: salaire ou récompense, cf. v. 17n. –  offrir gratuitement la bonne nouvelle… 2Co 11.7. –  sans user réellement du droit (8.9n) ; le verbe (le même qu'en 7.31) est dérivé de celui qui apparaît en 9.12+.
  - type: text
    content: Quel est donc mon salaire ? C'est d'offrir gratuitement la bonne nouvelle que j'annonce, sans user réellement du droit que cette bonne nouvelle me donne.
  - type: heading
    content: Paul s'est fait l'esclave de tous
  '19':
  - type: text
    content: ' '
  - type: note
    content: libre v. 1. –  esclave , cf. v. 27n  ; Mt 20.26s.
  - type: text
    content: 'Car, bien que je sois libre à l''égard de tous, je me suis fait l''esclave de tous, afin de gagner le plus grand nombre. '
  '2':
  - type: note
    content: 2Co 3.2s.
  - type: text
    content: Si pour d'autres je ne suis pas apôtre, je le suis au moins pour vous ; car c'est vous qui êtes le sceau de mon apostolat dans le Seigneur.
  '20':
  - type: note
    content: 'comme un Juif Ac 16.3 ; 21.20-26. –  gagner les Juifs  : cf. Rm 11.14. –  sous la loi Rm 2.12 ; 3.19 ; 6.14s ; Ga 3.23 ; 4.4s,21 ; 5.18.'
  - type: text
    content: 'Avec les Juifs, j''ai été comme un Juif, afin de gagner les Juifs ; avec ceux qui sont sous la loi, comme quelqu''un qui est sous la loi, afin de gagner ceux qui sont sous la loi – et pourtant moi-même je ne suis pas sous la loi ; '
  '21':
  - type: note
    content: 'comme un sans-loi  : cf. Ga 2.3. –  je ne suis pas…  : litt. je ne suis pas un sans-loi de Dieu, je suis un en-loi de Christ  ; cf. 11.1 ; Ga 2.20 ; 6.2 ; le terme correspondant à en-loi, qui correspond ici, grosso modo, à notre terme justiciable (au sens de juridiquement responsable) est traduit par légal en Ac 19.39.'
  - type: text
    content: 'avec les sans-loi, comme un sans-loi, afin de gagner les sans-loi – et pourtant je ne suis pas un sans-loi pour Dieu, je suis lié par la loi du Christ. '
  '22':
  - type: note
    content: 'faibles 8.9-13 ; Rm 14.1+ ; 15.1 ; 2Co 11.29. –  d''en sauver de toute manière quelques-uns  : quelques mss portent de (les) sauver tous.'
  - type: text
    content: 'J''ai été faible avec les faibles, afin de gagner les faibles. Je me suis fait tout à tous, afin d''en sauver de toute manière quelques-uns. '
  '23':
  - type: note
    content: 'y avoir part  : le terme grec est apparenté au mot habituellement traduit par communion (ou solidarité) ; on pourrait aussi traduire y avoir part avec les autres Ph 1.5.'
  - type: text
    content: Et tout cela, je le fais à cause de la bonne nouvelle, afin d'y avoir part.
  - type: heading
    content: La discipline des athlètes
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cette comparaison sportive est peut-être inspirée par les jeux isthmiques, qui se tenaient régulièrement à Corinthe. –  le prix Ph 3.14. –  Courez Ga 2.2 ; 5.7 ; Ph 2.16 ; 3.14 ; 2Tm 4.7 ; Hé 12.1. – Dans ce v., le verbe remporter traduit deux verbes grecs différents, mais apparentés.
  - type: text
    content: 'Ne savez-vous pas que ceux qui courent dans le stade courent tous, mais qu''un seul remporte le prix ? Courez de manière à remporter. '
  '25':
  - type: note
    content: 'lutteur 2Tm 4.7+. –  se maîtrise en tout  : cf. 7.9n. –  périssable / impérissable  : cf. 3.17n  ; 15.42ss,50ss ; Rm 1.23+ ; 2Co 4.16+ ; Ga 6.8 ; Ep 4.22 ; 6.24n  ; 1Tm 1.17 ; 2Tm 1.10 ; 1P 1.4+. –  couronne impérissable  : cf. Ph 4.1 ; 2Tm 2.5 ; 4.8 ; Jc 1.12 ; 1P 5.4 ; Ap 2.10 ; 3.11 ; voir aussi Ez 16.12 ; 21.31 ; 23.42 ; Ps 21.4s ; Pr 1.9 ; 4.9 ; 12.4 ; 16.31 ; 17.6 ; Est 8.15 ; Sagesse 4.2 : « Dans le monde éternel, elle (la vertu) triomphe, ceinte d''une couronne, après avoir vaincu dans un concours aux luttes sans souillures. »'
  - type: text
    content: 'Or tout lutteur se maîtrise en tout ; ceux-là le font pour remporter une couronne périssable ; nous, pour une couronne impérissable. '
  '26':
  - type: note
    content: 14.9.
  - type: text
    content: 'Moi, donc, je cours, mais non pas à l''aventure ; je donne des coups de poing, mais non pas pour battre l''air. '
  '27':
  - type: note
    content: 'Cf. Rm 8.13. –  je malmène  : litt. je frappe sous l''œil, c.-à-d. au visage  ; il s''agit d''un terme technique du pugilat ; voir en Lc 18.5n son unique autre emploi dans le N.T. –  je le traite (litt. je le conduis, autre traduction je le traîne) comme un esclave  : le verbe grec correspondant n''apparaît qu''ici dans le N.T. ; cf. v. 19. –  fait la proclamation  : litt. proclamé, 1.21+. –  disqualifié 3.13n  ; même terme Rm 1.28n  ; Hé 6.8 ; on pourrait paraphraser comme en 2Co 13.5ss  : que l''épreuve ne tourne pour moi à un échec.'
  - type: text
    content: Au contraire, je malmène mon corps, je le traite comme un esclave, de peur qu'après avoir fait la proclamation pour les autres, je ne sois moi-même disqualifié.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Voici  : autre traduction voilà (selon qu''on estime que la défense consiste en ce qui suit ou en ce qui précède). –  ma défense  : cf. Ac 22.1+. –  jugent 2.14n  ; 4.3s.'
  - type: text
    content: 'Voici ma défense devant ceux qui me jugent. '
  '4':
  - type: note
    content: droit 8.9n  ; cf. Lc 10.7s.
  - type: text
    content: 'N''avons-nous pas le droit de manger et de boire ? '
  '5':
  - type: note
    content: 'une sœur en tant qu''épouse (litt. femme) : l''expression signifie vraisemblablement une épouse chrétienne, mais on l''a aussi comprise différemment (p. ex. une chrétienne chargée d''assister l''apôtre, cf. Lc 8.2s). –  les frères du Seigneur Mt 12.46 ; 13.55+ ; Jn 2.12+. –  Céphas, autre nom de Pierre, cf. 1.12n  ; Mt 8.14/ /.'
  - type: text
    content: 'N''avons-nous pas le droit d''emmener avec nous une sœur en tant qu''épouse, comme le font les autres apôtres, les frères du Seigneur et Céphas ? '
  '6':
  - type: note
    content: Barnabé, collaborateur de Paul Ac 4.36s ; 11.25s ; 13–14 ; 15.36-39. –  ne pas travailler v. 12+ ; 4.12+ ; 2Th 3.6-12.
  - type: text
    content: 'Ou bien sommes-nous les seuls, Barnabé et moi, à ne pas avoir le droit de ne pas travailler ? '
  '7':
  - type: note
    content: 'combat… dans une armée  : le verbe correspondant est traduit par combattre en 2Co 10.3 ; cf. 2Tm 2.4 ; voir aussi ses autres emplois en Lc 3.14n  ; 1Tm 1.18 ; 2Tm 2.4 ; Jc 4.1 ; 1P 2.11 (faire la guerre). –  à ses propres frais  : le même terme est traduit par solde en Lc 3.14 ; cf. 2Co 11.8n. –  plante une vigne Dt 20.6. –  manger et se nourrir traduisent un même verbe grec.'
  - type: text
    content: Qui combat jamais dans une armée à ses propres frais ? Qui plante une vigne sans en manger le fruit ? Qui fait paître un troupeau sans se nourrir du lait du troupeau ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'en humain  : cf. Rm 3.5n.'
  - type: text
    content: 'Est-ce en humain que je parle ainsi ? La loi ne le dit-elle pas aussi ? '
  '9':
  - type: note
    content: la loi… Dt 25.4  ; 1Tm 5.18 (ici les meilleurs mss emploient un verbe différent pour museler).
  - type: text
    content: 'En effet, il est écrit dans la loi de Moïse : '
  - type: text
    content: Tu ne muselleras pas le bœuf qui foule le grain
  - type: text
    content: '. Dieu a-t-il souci des bœufs ? '
