verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul renonce à ses droits
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'libre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 19. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: apôtre
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vu Jésus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.8+ ; cf. Jn 20.18 ; Ac 22.17s ; 26.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon œuvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 3.9ss.'
      marker-yv: yv-n
    - type: text
      text: 'Ne suis-je pas libre ? Ne suis-je pas apôtre ? N''ai-je pas vu Jésus, notre Seigneur ? N''êtes-vous pas vous-mêmes mon œuvre, dans le Seigneur ? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En réalité, n'est-ce pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'est-ce uniquement… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à cause de nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.11 ; Rm 4.23s ; 15.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que cela a été écrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre ces mots comme l''introduction d''une autre citation, dont on ignorerait d''ailleurs la provenance'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''il est écrit : Celui qui laboure…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2Tm 2.6 ; Jc 5.7 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.19 : « Comme le laboureur et le semeur, approche-toi d''elle (la Sagesse) et attends ses fruits excellents. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en avoir sa part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jouir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 12, par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'partager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 10.17,21, par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prendre sa part '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 10.30 ; cf. Hé 3.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En réalité, n''est-ce pas à cause de nous qu''il parle ainsi ? Oui, c''est à cause de nous que cela a été écrit ; car celui qui laboure doit labourer dans l''espérance, et celui qui foule le grain doit le faire dans l''espérance d''en avoir sa part. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: biens spirituels
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: matériels
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: charnels
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 3.3 ; cf. Rm 15.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ga 6.6 ; Ph 4.16s.'
      marker-yv: yv-n
    - type: text
      text: Si nous avons semé pour vous les biens spirituels, serait-il excessif que nous moissonnions chez vous les biens matériels ?
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne devrions-nous pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne serait-ce pas plutôt à nous d''en jouir ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous n''avons pas usé… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 6,15,18 ; cf. 4.12+ ; 2Co 11.7,9 ; 12.13 ; 1Th 2.9 ; 2Th 3.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous supportons tout '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.7.
      marker-yv: yv-n
    - type: text
      text: Si d'autres jouissent de ce droit sur vous, ne devrions-nous pas en jouir à plus forte raison ? Pourtant nous n'avons pas usé de ce droit ; au contraire, nous supportons tout, pour ne pas créer d'obstacle à la bonne nouvelle du Christ.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 6.9,19 ; Nb 18.8,31 ; Dt 18.1-3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui assurent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'travailler '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le service du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les choses sacrées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; un terme apparenté est traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'temple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui servent l''autel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui sont attachés à l'autel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme apparenté en 7.35'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à ce qui est offert sur l'autel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'autel.
      marker-yv: yv-n
    - type: text
      text: 'Ne savez-vous pas que ceux qui assurent le service du temple sont nourris par le temple, que ceux qui servent l''autel ont part à ce qui est offert sur l''autel ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.10+ ; cf. Lc 10.7.
      marker-yv: yv-n
    - type: text
      text: De même aussi le Seigneur a prescrit que ceux qui annoncent la bonne nouvelle vivent de la bonne nouvelle.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'aimerais mieux mourir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il me serait meilleur de mourir que…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; la phrase est interrompue. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réduira à néant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vider '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Ph 2.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon motif de fierté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.29+ ; 2Co 11.10.
      marker-yv: yv-n
    - type: text
      text: 'Quant à moi, je n''ai usé d''aucun de ces droits, et je n''ai pas écrit cela pour qu''ils me soient attribués : j''aimerais mieux mourir… ! Personne ne réduira à néant mon motif de fierté ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Jr 20.9 ; Lc 17.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'quel malheur… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 11.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En effet, annoncer la bonne nouvelle n''est pas pour moi un motif de fierté, car la nécessité m''en est imposée ; quel malheur pour moi, en effet, si je n''annonçais pas la bonne nouvelle ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de mon propre gré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'librement, par choix personnel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 16). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'salaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: récompense
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme grec peut avoir les deux sens ; même possibilité v. 18 ; cf. 3.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une intendance qui m'est confiée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sous-entendu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme à un esclave qui n'a pas le loisir d'accepter ou de refuser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s ; Ep 3.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Si je le faisais de mon propre gré, j''aurais un salaire ; mais si je le fais malgré moi, c''est une intendance qui m''est confiée. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'salaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: récompense
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'offrir gratuitement la bonne nouvelle… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2Co 11.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sans user réellement du droit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (8.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; le verbe (le même qu'en 7.31) est dérivé de celui qui apparaît en 9.12+.
      marker-yv: yv-n
    - type: text
      text: Quel est donc mon salaire ? C'est d'offrir gratuitement la bonne nouvelle que j'annonce, sans user réellement du droit que cette bonne nouvelle me donne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul s'est fait l'esclave de tous
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'libre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: esclave
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 20.26s.'
      marker-yv: yv-n
    - type: text
      text: 'Car, bien que je sois libre à l''égard de tous, je me suis fait l''esclave de tous, afin de gagner le plus grand nombre. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Co 3.2s.
      marker-yv: yv-n
    - type: text
      text: Si pour d'autres je ne suis pas apôtre, je le suis au moins pour vous ; car c'est vous qui êtes le sceau de mon apostolat dans le Seigneur.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juif
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 16.3 ; 21.20-26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gagner les Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rm 11.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sous la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 2.12 ; 3.19 ; 6.14s ; Ga 3.23 ; 4.4s,21 ; 5.18.
      marker-yv: yv-n
    - type: text
      text: 'Avec les Juifs, j''ai été comme un Juif, afin de gagner les Juifs ; avec ceux qui sont sous la loi, comme quelqu''un qui est sous la loi, afin de gagner ceux qui sont sous la loi – et pourtant moi-même je ne suis pas sous la loi ; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
