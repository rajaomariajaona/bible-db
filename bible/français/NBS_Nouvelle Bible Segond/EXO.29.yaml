document_id: EXO.29,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La consécration des prêtres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 40.12-15 ; Lv 8 ; voir aussi Hé 7.26ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un taureau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un taureau '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de bovin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de gros bétail
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un jeune taureau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sans défaut '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici ce que tu feras pour les consacrer, afin qu''ils exercent pour moi le sacerdoce : prends un taureau et deux béliers sans défaut, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: taureau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Lv 4.3-12 ; 8.14-17.'
      marker-yv: yv-n
    - type: text
      text: 'Tu présenteras le taureau devant la tente de la Rencontre ; Aaron et ses fils poseront les mains sur la tête du taureau. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tu immoleras le taureau devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', à l''entrée de la tente de la Rencontre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cornes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '27.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tout le reste du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout le sang.
      marker-yv: yv-n
    - type: text
      text: 'Tu prendras du sang du taureau, tu en mettras avec ton doigt sur les cornes de l''autel et tu répandras tout le reste du sang sur le socle de l''autel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu feras fumer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 18,25.
      marker-yv: yv-n
    - type: text
      text: 'Tu prendras toute la graisse qui couvre les entrailles, le lobe du foie, les deux rognons avec la graisse qui les couvre, et tu feras fumer cela sur l''autel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 4.12 ; Hé 13.11. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais tu jetteras au feu, hors du camp, la chair du taureau, sa peau et ses excréments : c''est un sacrifice pour le péché.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lv 1.10-13 ; 8.18-21.
      marker-yv: yv-n
    - type: text
      text: 'Tu prendras l''un des béliers ; Aaron et ses fils poseront les mains sur la tête du bélier. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tu immoleras le bélier ; tu prendras son sang et tu en aspergeras le pourtour de l''autel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tu couperas le bélier en morceaux ; tu laveras les entrailles et les pattes et tu les mettras sur les morceaux et sur la tête. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu feras fumer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 13,25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: odeur agréable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 8.21 ; Lv 1.9+ ; voir aussi Ep 5.2 ; Ph 4.18.'
      marker-yv: yv-n
    - type: text
      text: 'Tu feras fumer tout le bélier sur l''autel ; c''est un holocauste pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', une odeur agréable, une offrande consumée par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'deuxième bélier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 8.22-29.
      marker-yv: yv-n
    - type: text
      text: 'Tu prendras le deuxième bélier : Aaron et ses fils poseront les mains sur la tête du bélier. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: arrosées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ointes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le même verbe hébreu est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'conférer '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 7 ; cf. Lv 2.4.
      marker-yv: yv-n
    - type: text
      text: 'du pain sans levain, des gâteaux sans levain pétris à l''huile et des galettes sans levain arrosées d''huile : tu les feras avec de la fleur de farine de froment. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.20 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a ici un texte plus détaillé'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur le lobe de l'oreille droite d'Aaron, sur le pouce de sa main droite et sur le pouce de son pied droit, sur le lobe de l'oreille droite de ses fils, sur le pouce de leur main droite et sur le pouce de leur pied droit.
      marker-yv: yv-n
    - type: text
      text: 'Tu immoleras le bélier ; tu prendras de son sang, tu en mettras sur le lobe de l''oreille droite d''Aaron et sur le lobe de l''oreille droite de ses fils, sur le pouce de leur main droite et sur le pouce de leur pied droit, et tu aspergeras de sang le pourtour de l''autel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: feras l'aspersion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre verbe que celui qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'asperger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 16,20 (cf. 24.6+) ; voir Lv 4.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu prendras du sang qui est sur l''autel et de l''huile d''onction ; tu en feras l''aspersion sur Aaron et sur ses vêtements, sur ses fils et sur les vêtements de ses fils avec lui. Ainsi Aaron et ses vêtements, ses fils et les vêtements de ses fils avec lui seront consacrés. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 3.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: investiture
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dérivé du verbe hébreu correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: remplir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 28.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; de même dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'Tu prendras la graisse du bélier, la queue, la graisse qui couvre les entrailles, le lobe du foie, les deux rognons avec la graisse qui les entoure et la cuisse droite : c''est un bélier d''investiture ; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu prendras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un pain rond
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un rond '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'disque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Za 5.7) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression en Jg 8.5 ; 1S 2.36 ; 10.3 ; Jr 37.21 ; Pr 6.26 ; 1Ch 16.3.'
      marker-yv: yv-n
    - type: text
      text: 'tu prendras aussi dans la corbeille de pains sans levain placée devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' un pain rond, un gâteau de pain à l''huile et une galette. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu le dédieras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu les dédieras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu dédieras toutes ces offrandes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 35.22 ; 38.24,29 ; voir Lv 7.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu mettras le tout dans les mains d''Aaron et de ses fils, et tu le dédieras rituellement devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu les feras fumer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 13,18.
      marker-yv: yv-n
    - type: text
      text: 'Tu les prendras ensuite de leurs mains et tu les feras fumer sur l''autel, par-dessus l''holocauste ; c''est une odeur agréable devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', une offrande consumée par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui est pour Aaron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui revient à Aaron '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 27). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu la dédieras rituellement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 7.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce sera ta portion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 7.30-34.'
      marker-yv: yv-n
    - type: text
      text: 'Tu prendras la poitrine du bélier d''investiture qui est pour Aaron et tu la dédieras rituellement devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : ce sera ta portion. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tu consacreras la poitrine qu''on dédie rituellement et la cuisse qu''on prélève ; elles auront été dédiée rituellement et prélevée sur le bélier d''investiture, sur ce qui est pour Aaron et sur ce qui est pour ses fils. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Elles seront pour Aaron et pour ses fils par une prescription perpétuelle ; elles seront prises sur ce qui appartient aux Israélites : c''est un prélèvement. Ce sera un prélèvement sur ce qui appartient aux Israélites, sur leurs sacrifices de paix ; c''est leur prélèvement pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour ses fils
      - type: usfm
        marker: ft
        children:
        - type: text
