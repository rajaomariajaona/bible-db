document_id: EXO.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La consécration des prêtres
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 40.12-15 ; Lv 8 ; voir aussi Hé 7.26ss. –  un taureau  : litt. un taureau fils de bovin (ou de gros bétail ) ; certains comprennent un jeune taureau . –  sans défaut 12.5n.'
  - type: text
    content: 'Voici ce que tu feras pour les consacrer, afin qu''ils exercent pour moi le sacerdoce : prends un taureau et deux béliers sans défaut, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'taureau  : cf. Lv 4.3-12 ; 8.14-17.'
  - type: text
    content: 'Tu présenteras le taureau devant la tente de la Rencontre ; Aaron et ses fils poseront les mains sur la tête du taureau. '
  '11':
  - type: text
    content: 'Tu immoleras le taureau devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', à l''entrée de la tente de la Rencontre. '
  '12':
  - type: note
    content: 'cornes 27.2n. –  tout le reste du sang  : litt. tout le sang.'
  - type: text
    content: 'Tu prendras du sang du taureau, tu en mettras avec ton doigt sur les cornes de l''autel et tu répandras tout le reste du sang sur le socle de l''autel. '
  '13':
  - type: note
    content: tu feras fumer v. 18,25.
  - type: text
    content: 'Tu prendras toute la graisse qui couvre les entrailles, le lobe du foie, les deux rognons avec la graisse qui les couvre, et tu feras fumer cela sur l''autel. '
  '14':
  - type: note
    content: Lv 4.12 ; Hé 13.11. – Voir sacrifice.
  - type: text
    content: 'Mais tu jetteras au feu, hors du camp, la chair du taureau, sa peau et ses excréments : c''est un sacrifice pour le péché.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 1.10-13 ; 8.18-21.
  - type: text
    content: 'Tu prendras l''un des béliers ; Aaron et ses fils poseront les mains sur la tête du bélier. '
  '16':
  - type: text
    content: 'Tu immoleras le bélier ; tu prendras son sang et tu en aspergeras le pourtour de l''autel. '
  '17':
  - type: text
    content: 'Tu couperas le bélier en morceaux ; tu laveras les entrailles et les pattes et tu les mettras sur les morceaux et sur la tête. '
  '18':
  - type: note
    content: 'Tu feras fumer v. 13,25. –  odeur agréable  : cf. Gn 8.21 ; Lv 1.9+ ; voir aussi Ep 5.2 ; Ph 4.18.'
  - type: text
    content: 'Tu feras fumer tout le bélier sur l''autel ; c''est un holocauste pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', une odeur agréable, une offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '19':
  - type: text
    content: ' '
  - type: note
    content: deuxième bélier Lv 8.22-29.
  - type: text
    content: 'Tu prendras le deuxième bélier : Aaron et ses fils poseront les mains sur la tête du bélier. '
  '2':
  - type: note
    content: 'arrosées  : litt. ointes, le même verbe hébreu est traduit par conférer l''onction au v. 7 ; cf. Lv 2.4.'
  - type: text
    content: 'du pain sans levain, des gâteaux sans levain pétris à l''huile et des galettes sans levain arrosées d''huile : tu les feras avec de la fleur de farine de froment. '
  '20':
  - type: note
    content: 'LXX a ici un texte plus détaillé  : sur le lobe de l''oreille droite d''Aaron, sur le pouce de sa main droite et sur le pouce de son pied droit, sur le lobe de l''oreille droite de ses fils, sur le pouce de leur main droite et sur le pouce de leur pied droit.'
  - type: text
    content: 'Tu immoleras le bélier ; tu prendras de son sang, tu en mettras sur le lobe de l''oreille droite d''Aaron et sur le lobe de l''oreille droite de ses fils, sur le pouce de leur main droite et sur le pouce de leur pied droit, et tu aspergeras de sang le pourtour de l''autel. '
  '21':
  - type: note
    content: 'feras l''aspersion  : autre verbe que celui qui est traduit par asperger aux v. 16,20 (cf. 24.6+) ; voir Lv 4.6n.'
  - type: text
    content: 'Tu prendras du sang qui est sur l''autel et de l''huile d''onction ; tu en feras l''aspersion sur Aaron et sur ses vêtements, sur ses fils et sur les vêtements de ses fils avec lui. Ainsi Aaron et ses vêtements, ses fils et les vêtements de ses fils avec lui seront consacrés. '
  '22':
  - type: note
    content: 'Lv 3.9. –  investiture  : dérivé du verbe hébreu correspondant à remplir, voir 28.41n  ; de même dans la suite.'
  - type: text
    content: 'Tu prendras la graisse du bélier, la queue, la graisse qui couvre les entrailles, le lobe du foie, les deux rognons avec la graisse qui les entoure et la cuisse droite : c''est un bélier d''investiture ; '
  '23':
  - type: note
    content: 'tu prendras  : sous-entendu dans le texte. –  un pain rond  : litt. un rond (le même terme est traduit par disque en Za 5.7) de pain  ; même expression en Jg 8.5 ; 1S 2.36 ; 10.3 ; Jr 37.21 ; Pr 6.26 ; 1Ch 16.3.'
  - type: text
    content: 'tu prendras aussi dans la corbeille de pains sans levain placée devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' un pain rond, un gâteau de pain à l''huile et une galette. '
  '24':
  - type: note
    content: '28.41n. –  tu le dédieras  : litt. tu les dédieras, c.-à-d. tu dédieras toutes ces offrandes  ; cf. 35.22 ; 38.24,29 ; voir Lv 7.30n.'
  - type: text
    content: 'Tu mettras le tout dans les mains d''Aaron et de ses fils, et tu le dédieras rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '25':
  - type: note
    content: tu les feras fumer v. 13,18.
  - type: text
    content: 'Tu les prendras ensuite de leurs mains et tu les feras fumer sur l''autel, par-dessus l''holocauste ; c''est une odeur agréable devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', une offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '26':
  - type: note
    content: 'qui est pour Aaron  : autre traduction qui revient à Aaron (cf. v. 27). –  tu la dédieras rituellement  : cf. Lv 7.30n. –  ce sera ta portion  : cf. Lv 7.30-34.'
  - type: text
    content: 'Tu prendras la poitrine du bélier d''investiture qui est pour Aaron et tu la dédieras rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : ce sera ta portion. '
  '27':
  - type: text
    content: 'Tu consacreras la poitrine qu''on dédie rituellement et la cuisse qu''on prélève ; elles auront été dédiée rituellement et prélevée sur le bélier d''investiture, sur ce qui est pour Aaron et sur ce qui est pour ses fils. '
  '28':
  - type: text
    content: 'Elles seront pour Aaron et pour ses fils par une prescription perpétuelle ; elles seront prises sur ce qui appartient aux Israélites : c''est un prélèvement. Ce sera un prélèvement sur ce qui appartient aux Israélites, sur leurs sacrifices de paix ; c''est leur prélèvement pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'pour ses fils  : il ne s''agit pas ici de tous les prêtres, mais de la lignée des grands prêtres (v. 30) ; cf. Nb 20.25-28.'
  - type: text
    content: 'Les vêtements sacrés d''Aaron seront pour ses fils après lui ; ils les mettront lorsqu''on leur conférera l''onction, lorsqu''on les investira. '
  '3':
  - type: note
    content: 'en offrant  : litt. avec.'
  - type: text
    content: 'Tu les mettras dans une corbeille et tu les présenteras dans cette corbeille en offrant le taureau et les deux béliers. '
  '30':
  - type: note
    content: Pendant sept jours v. 35.
  - type: text
    content: Pendant sept jours, le prêtre qui lui succédera parmi ses fils s'en revêtira, puis il entrera dans la tente de la Rencontre pour officier dans le sanctuaire.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'un lieu sacré  : sans doute aux abords du sanctuaire, dans la cour ; voir saint.'
  - type: text
    content: 'Tu prendras le bélier d''investiture et tu en feras cuire la viande dans un lieu sacré. '
  '32':
  - type: note
    content: Lv 8.31-35.
  - type: text
    content: 'Aaron et ses fils mangeront, à l''entrée de la tente de la Rencontre, la viande du bélier et le pain qui est dans la corbeille. '
  '33':
  - type: note
    content: 'Voir expiation. –  profane  : litt. étranger, c.-à-d. étranger à la famille d''Aaron, de même en 30.33 ; cf. Lv 10.1 ; Nb 1.51n  ; 3.4n  ; 26.61 ; voir aussi prêtre.'
  - type: text
    content: 'Ils mangeront ainsi ce qui a servi d''expiation pour leur investiture et leur consécration ; aucun profane n''en mangera : ce sont des choses sacrées. '
  '34':
  - type: text
    content: 'S''il reste de la viande du sacrifice d''investiture et du pain jusqu''au matin, tu jetteras au feu ce qui en restera ; on ne le mangera pas : c''est une chose sacrée. '
  '35':
  - type: text
    content: 'Tu feras ainsi pour Aaron et ses fils, exactement comme je te l''ai ordonné. Pendant sept jours, tu les investiras. '
  '36':
  - type: note
    content: 'tu ôteras le péché de  : autre forme du verbe hébreu habituellement traduit par pécher. Voir Lv 6.19 (offrir le sacrifice pour le péché) ; 8.15+.'
  - type: text
    content: 'Tu offriras chaque jour un taureau en sacrifice pour le péché, pour l''expiation ; tu ôteras le péché de l''autel en faisant l''expiation sur lui, et tu lui conféreras l''onction pour le consacrer. '
  '37':
  - type: note
    content: 'Cf. Ez 43.26. –  très sacré  : l''expression hébraïque correspondante, traditionnellement traduite par saint des saints, désigne une portion du sanctuaire en 26.33s (le Très-Sacré) ; voir aussi 30.10,29.'
  - type: text
    content: Pendant sept jours, tu feras l'expiation sur l'autel et tu le consacreras ; l'autel sera très sacré, et tout ce qui entrera en contact avec l'autel sera consacré.
  - type: heading
    content: L'holocauste quotidien
  '38':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 6.2-6 ; Nb 28.3-8 ; 2R 16.15 ; Ez 46.13-15.
  - type: text
    content: 'Voici ce que tu offriras sur l''autel : deux agneaux d''un an, chaque jour, constamment. '
  '39':
  - type: note
    content: à la tombée du soir 12.6n.
  - type: text
    content: 'Tu offriras le premier agneau le matin, tu offriras le second agneau à la tombée du soir. '
  '4':
  - type: text
    content: 'Tu présenteras Aaron et ses fils à l''entrée de la tente de la Rencontre, et tu les laveras avec de l''eau. '
  '40':
  - type: note
    content: 'un quart de hîn  : sans doute un peu moins d''un litre ; voir mesures. Cf. 27.20n  ; Nb 28.5.'
  - type: text
    content: 'Avec le premier agneau, un dixième d''épha de fleur de farine pétrie dans un quart de hîn d''huile vierge, et une libation d''un quart de hîn de vin. '
  '41':
  - type: note
    content: 'offrande végétale  : cf. 30.9 ; 40.29 ; Lv 2.1n.'
  - type: text
    content: 'Tu offriras avec le second agneau, à la tombée du soir, une offrande végétale et une libation semblables à celles du matin ; tu les offriras, comme une odeur agréable, en offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '42':
  - type: note
    content: 'holocauste  : voir sacrifices. –  je vous rencontrerai 25.22+ ; LXX je te connaîtrai, ce qui pourrait correspondre à une inversion de lettres en hébreu, de même en 30.6,36 ; Nb 17.19. Le verbe hébreu est apparenté au mot traduit par rencontre dans tente de la Rencontre.'
  - type: text
    content: 'C''est un holocauste constant, dans toutes vos générations, que vous offrirez à l''entrée de la tente de la Rencontre, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : c''est là que je vous rencontrerai, c''est là que je te parlerai. '
  '43':
  - type: note
    content: 'consacré  : voir saint.'
  - type: text
    content: 'C''est là que je rencontrerai les Israélites ; ce lieu sera consacré par ma gloire. '
  '44':
  - type: text
    content: 'Je consacrerai la tente de la Rencontre et l''autel ; je consacrerai Aaron et ses fils, afin qu''ils exercent pour moi le sacerdoce. '
  '45':
  - type: text
    content: 'Je demeurerai au milieu des Israélites et je serai leur Dieu. '
  '46':
  - type: note
    content: 'YHWH  : voir noms divins.'
  - type: text
    content: 'Ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu, et que je les ai fait sortir d''Egypte pour demeurer au milieu d''eux. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu.'
  '5':
  - type: note
    content: 'serreras  : le verbe hébreu est apparenté au mot éphod (25.7n  ; cf. 28.8n).'
  - type: text
    content: 'Tu prendras les vêtements ; tu revêtiras Aaron de la tunique, de la robe de l''éphod, de l''éphod et du pectoral que tu serreras sur lui avec la ceinture de l''éphod. '
  '6':
  - type: note
    content: 'Cf. Ps 132.18. –  diadème  : hébreu nézer, cf. 28.36n  ; Nb 6.7n.'
  - type: text
    content: 'Tu poseras le turban sur sa tête et tu mettras le diadème sacré sur le turban. '
  '7':
  - type: note
    content: 'huile d''onction  : cf. 30.25+ ; 40.13,15.'
  - type: text
    content: 'Tu prendras l''huile d''onction, tu en verseras sur sa tête et tu lui conféreras l''onction. '
  '8':
  - type: text
    content: 'Tu présenteras ses fils et tu les revêtiras de la tunique. '
  '9':
  - type: note
    content: '28.41n. –  sur la tête  : sous-entendu dans le texte ; cf. Lv 8.13. –  prescription perpétuelle 12.14+ ; voir loi.'
  - type: text
    content: Tu ceindras Aaron et ses fils d'une écharpe et tu leur attacheras une tiare sur la tête. Le sacerdoce leur appartiendra par une prescription perpétuelle. Tu investiras ainsi Aaron et ses fils.
