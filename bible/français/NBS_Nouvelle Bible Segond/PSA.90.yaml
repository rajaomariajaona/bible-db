      - type: text
        text: '14.18 : « Comme le feuillage verdoyant sur un arbre touffu tantôt tombe et tantôt repousse, ainsi les générations de chair et de sang : l''une meurt et l''autre apparaît. »'
    marker-yv: yv-n
