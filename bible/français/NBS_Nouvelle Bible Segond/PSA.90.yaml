- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur agitation n'est qu'oppression et mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car cela passe vite, et nous nous envolons.
- type: usfm
  marker: q1
  children:
  - type: usfm
