      - type: text
        text: '18.8ss : « Qu''est-ce que l''homme ? A quoi sert-il ? Que signifie le bien ou le mal qu''il fait ? Le nombre de ses jours est grand s''il atteint cent ans. Une goutte d''eau de la mer, un grain de sable, telles sont ces quelques années face à l''éternité. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur agitation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
