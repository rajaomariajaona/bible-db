document_id: PSA.90,104
type_code: fra
verses:
  '1':
  - type: heading
    content: LIVRE QUATRIÈME
  - type: heading
    content: L'homme passe, Dieu reste
  - type: text
    content: ' '
  - type: note
    content: 'Moïse  : cf. Ex 15.1 ; Dt 31.19,30 ; 32.1ss. –  homme de Dieu Dt 33.1 ; Jos 14.6. –  Seigneur 8.2. –  refuge  : même terme en 26.8 ( séjour ) ; 68.6 ; 71.3n  ; 91.9 ; Dt 26.15n.'
  - type: text
    content: Prière. De Moïse, l'homme de Dieu.
  - type: text
    content: Seigneur, toi, tu as été pour nous un refuge,
  - type: text
    content: de génération en génération.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'La durée de nos jours  : litt. les jours de nos années  ; cf. Gn 47.9 ; Ec 12.1ss ; Siracide 18.8ss : « Qu''est-ce que l''homme ? A quoi sert-il ? Que signifie le bien ou le mal qu''il fait ? Le nombre de ses jours est grand s''il atteint cent ans. Une goutte d''eau de la mer, un grain de sable, telles sont ces quelques années face à l''éternité. » –  leur agitation  : traduction incertaine ; le mot hébreu rappelle le nom Rahav (87.4n) ; on a aussi traduit leur orgueil ou, en modifiant le texte hébreu traditionnel d''après des versions anciennes, leur multitude. –  oppression et mal  : cf. 7.15+ ; autre traduction peine et misère.'
  - type: text
    content: La durée de nos jours s'élève à soixante-dix ans ;
  - type: text
    content: – pour les plus vigoureux, à quatre-vingts ans –
  - type: text
    content: et leur agitation n'est qu'oppression et mal,
  - type: text
    content: car cela passe vite, et nous nous envolons.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le courroux…  : litt. comme ta crainte ton courroux (v. 7), texte obscur qu''on pourrait interpréter  : ton courroux (est) à la mesure de la crainte que tu inspires. Certains modifient le texte hébreu traditionnel pour traduire le second vers différemment, p. ex. qui voit la violence de ton courroux ?'
  - type: text
    content: Qui connaît la force de ta colère
  - type: text
    content: et le courroux qui te fait craindre ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction  : Enseigne-nous donc à compter… –  Enseigne-nous  : litt. fais savoir . –  compter nos jours  : cf. Ep 5.16. –  que nous conduisions…  : texte obscur, litt. que nous fassions venir (= que nous présentions ?) un cœur de sagesse  ; versions anciennes que nous entrions au cœur de la sagesse.'
  - type: text
    content: Enseigne-nous à bien compter nos jours,
  - type: text
    content: que nous conduisions notre cœur avec sagesse.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Reviens  : cf. 6.5 ; Ex 32.12 ; Es 63.17. –  Jusqu''à quand… 6.4+ ; 79.5. –  Aie pitié…  : litt. aie du regret au sujet de tes serviteurs  ; cf. 135.14n  ; Dt 32.36n.'
  - type: text
    content: 'Reviens, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Jusqu''à quand… ?'
  - type: text
    content: Aie pitié de nous, tes serviteurs !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Rassasie-nous 17.15 ; 63.6 ; 65.5. –  dès le matin  : litt. au matin  ; cf. v. 5s ; 30.6+ ; 46.6 ; 143.8.'
  - type: text
    content: Rassasie-nous dès le matin de ta fidélité,
  - type: text
    content: nous crierons de joie durant tous nos jours.
  '15':
  - type: text
    content: Réjouis-nous autant de jours que tu nous as affligés,
  - type: text
    content: autant d'années que nous avons vu le malheur.
  '16':
  - type: text
    content: Que ton action nous apparaisse, à nous, tes serviteurs,
  - type: text
    content: et ta magnificence sur nos fils !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 127.1ss. –  la beauté ou la douceur , 27.4n.
  - type: text
    content: Que la beauté du Seigneur, notre Dieu, soit sur nous !
  - type: text
    content: Affermis pour nous l'œuvre de nos mains,
  - type: text
    content: oui, affermis l'œuvre de nos mains !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Avant…  : cf. Gn 1.1ss ; Jb 38.4ss ; Pr 8.22ss ; Jn 1.1ss ; Ep 1.4. –  que tu aies donné…  : le verbe hébreu peut évoquer les douleurs de l''accouchement ; versions anciennes qu''aient été enfantés  ; on pourrait aussi lire qu''aient enfanté  ; autre traduction possible que tu aies donné un commencement à la terre…  ; cf. Jb 38.8. –  depuis toujours…  : autre texte de toujours à toujours 93.2 ; 102.28 ; Ha 1.12. –  Dieu  : hébreu ’El , cf. Gn 21.33n.'
  - type: text
    content: Avant que les montagnes soient nées,
  - type: text
    content: et que tu aies donné le jour à la terre et au monde,
  - type: text
    content: depuis toujours et pour toujours tu es Dieu.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.4. –  à la poussière (ou, plus littéralement, à la poussière qu'on écrase  ; cf. 9.10+) ; 104.29 ; 146.4 ; Gn 3.19 ; 18.27 ; Jb 34.15 ; Ec 3.20 ; 12.7. –  tu dis ou tu as dit.
  - type: text
    content: Tu fais retourner l'homme à la poussière,
  - type: text
    content: 'et tu dis : Etres humains, retournez !'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 84.11 ; 2P 3.8. – La nuit était partagée en trois veilles d'environ quatre heures ; Jg 7.19n.
  - type: text
    content: Car mille ans sont, à tes yeux,
  - type: text
    content: comme le jour d'hier, quand il passe,
  - type: text
    content: et comme une veille de la nuit.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur, diversement compris par les versions anciennes ; certains modifient le texte hébreu traditionnel pour lire tu les sèmes d''année en année ; ils sont comme l''herbe qui repousse  ; cf. Os 2.25 ; Ec 1.4. –  ils sont…  : litt. ils sont sommeil.'
  - type: text
    content: Tu les emportes ; ils sont comme un instant de sommeil,
  - type: text
    content: 'qui, au matin, passe comme l''herbe :'
  '6':
  - type: text
    content: ' '
  - type: note
    content: '37.2 ; 102.12 ; 103.15s ; Es 40.1s ; 51.12 ; Jb 14.1s ; Mt 6.30 ; Jc 1.10s ; cf. Siracide 14.18 : « Comme le feuillage verdoyant sur un arbre touffu tantôt tombe et tantôt repousse, ainsi les générations de chair et de sang : l''une meurt et l''autre apparaît. »'
  - type: text
    content: elle fleurit au matin et elle passe,
  - type: text
    content: on la coupe le soir, et elle se dessèche.
  '7':
  - type: text
    content: Nous défaillons à cause de ta colère,
  - type: text
    content: ta fureur nous épouvante.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Os 7.2. –  fautes  : voir péché. –  lumière  : le mot hébreu est habituellement traduit par luminaire , 74.16n  ; Gn 1.14n  ; Pr 15.30n. –  ce que nous dissimulons 19.13.'
  - type: text
    content: Tu mets devant toi nos fautes
  - type: text
    content: et à la lumière de ta face ce que nous dissimulons.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 39.7,12 ; 102.4 ; Jr 6.4. –  nous achevons…  : quelques-uns modifient le texte hébreu traditionnel pour lire nos années s''achèvent.'
  - type: text
    content: Car tous nos jours déclinent à cause de ton courroux ;
  - type: text
    content: nous achevons nos années comme un murmure.
