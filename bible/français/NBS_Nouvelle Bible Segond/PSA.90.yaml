    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 7.15+ ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: peine et misère.
    marker-yv: yv-n
  - type: text
    text: La durée de nos jours s'élève à soixante-dix ans ;
- type: usfm
  marker: q1
  children:
