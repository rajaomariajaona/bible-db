document_id: JER.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: is2
  children:
  - type: text
    text: Un prophète défaitiste…
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La famille de Jérémie, de lignée sacerdotale (1.1), était fixée à '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Anatoth
  - type: text
    text: ', sur le territoire de Benjamin, à environ cinq kilomètres au nord-est de Jérusalem. Elle appartenait sans doute à la lignée des grands prêtres '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Eli
  - type: text
    text: ' et '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Abiathar
  - type: text
    text: ', qui avait été écartée du culte de Jérusalem à l''avènement de Salomon (1R 2.26s ; cf. 1S 2.27-36 ; 3.11-14). D''aucuns croient deviner des échos de cette disgrâce familiale dans les démêlés de Jérémie avec les prêtres du temple de Jérusalem (chap. 20).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''hypothèse la plus plausible situe la naissance de Jérémie entre les années 650 et 645 av. J.-C. Sa vocation au ministère prophétique date de l''année 627/6 (1.2) ; il a alors une vingtaine d''années. Jérémie est toujours là '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: quarante ans
  - type: text
    text: ' plus tard, au moment de la prise de Jérusalem. Dans les années qui suivent la catastrophe, la Bible le laisse en Egypte (chap. 43). Selon une tradition juive, il y serait mort lapidé par des compatriotes à qui il reprochait leur idolâtrie (cf. Hé 11.37).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le message de Jérémie se réfère constamment à l''actualité nationale et internationale. Dieu le fait '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prophète pour les nations
  - type: text
    text: ' (1.5). C''est dire que Jérémie va devoir interpréter cette actualité dans le cadre du dessein de Dieu pour son peuple et pour le monde, et que son message aura des implications '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: politiques
  - type: text
    text: '  : la conversion à laquelle Jérémie appelle son peuple infidèle ne se cantonne pas dans le domaine « religieux ». Or du point de vue politique, précisément, il en résulte un message scandaleux qui le fait apparaître comme un collaborateur de l''ennemi babylonien, un défaitiste qui sape le moral des troupes (37.11-15 ; 38.4).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: … pour une époque troublée
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Soixante-dix ou quatre-vingts ans avant la naissance du prophète, le royaume du Nord, '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Israël
  - type: text
    text: ', est devenu province assyrienne. Une partie de la population a été exilée et remplacée par des colons d''origine non israélite (2R 17). Ces événements sont encore très présents pour Jérémie, qui est né à la lisière du royaume du Nord (3.6 etc.).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le sort du royaume de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Juda
  - type: text
    text: ' se joue entre ses redoutables voisins : au « nord » l''Assyrie (qui va rapidement disparaître de la scène internationale, vers 610) et la Babylonie (qui renaît à l''époque où débute le ministère de Jérémie) ; au sud-ouest, l''Egypte.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'En 640, à Jérusalem, le roi Amôn, qui menait une politique pro-assyrienne, est assassiné. A la faveur du déclin rapide de l''Assyrie, son jeune successeur '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Josias
  - type: text
    text: ' adopte bientôt une attitude plus indépendante. Il récupère même une partie de l''ancien royaume d''Israël (2R 23.15,19). Le récit de la fameuse découverte du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: livre de la loi
  - type: text
    text: ' dans le temple, vers 622 (2R 22.8-20), marque le début d''une réforme religieuse. Mais en voulant s''opposer à un raid égyptien visant à contrecarrer l''expansion babylonienne, Josias est tué à Meguiddo en 609. Son fils Shalloum (ou Joachaz) est détrôné au bout de quelques semaines par le pharaon Néko II et exilé en Egypte, où il meurt. Les Egyptiens mettent sur le trône de Jérusalem un autre fils de Josias, Eliaqim (2R 23.34), plus connu sous le nom de Joïaqim qui lui est imposé par le pharaon en signe de vassalité.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Mais les événements se précipitent :'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'Eté 605 :'
  - type: text
    text: ' les troupes égyptiennes restées en Syrie sont défaites par Nabuchodonosor à Karkemish (Jr 46.2) ; Joïaqim doit bientôt faire allégeance à Babylone (2R 24.1).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: '601 :'
  - type: text
    text: ' les Babyloniens sont repoussés par l''Egypte, qui s''empare de Gaza (Jr 47.1). Joïaqim en profite pour secouer le joug babylonien. Nabuchodonosor réagit en envoyant d''abord des bandes armées (2R 24.2), puis une véritable expédition, contre Jérusalem.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'Décembre 598 :'
  - type: text
    text: ' Joïaqim meurt et son fils Joïakîn lui succède (2R 24.6 ; Jr 22.19 ; 36.30).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'Mi-mars 597 :'
  - type: text
    text: ' Joïakîn doit capituler devant Nabuchodonosor, qui l''emmène prisonnier à Babylone avec sa mère et toute sa cour (2R 24.12). Sur le trône de Jérusalem, Babylone place alors un troisième fils de Josias, Mattania, fils de la même reine-mère que Joachaz (2R 23.31 ; 24.18 ; voir « L''après-Josias », p.${Xsuccjos}), en lui donnant le nom de Sédécias. Celui-ci prête serment de fidélité à Nabuchodonosor (Ez 17.12-14 ; 2Ch 36.13). Mais il ne sait pas résister aux pressions de son entourage, qui regarde vers l''Egypte. Il rompt donc son traité de vassalité avec Babylone (2R 24.20 ; Jr 52.3).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'Décembre 589 :'
  - type: text
    text: ' siège de Jérusalem. Celui-ci durera jusqu''à l''assaut final, au début de l''été 587. Sédécias s''enfuit de nuit, mais il est rattrapé et capturé. A Ribla (Syrie), on exécute ses fils devant lui avant de lui crever les yeux et de l''exiler à Babylone, où il mourra (2R 25 ; Jr 39 ; 52).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Août 587
  - type: text
    text: ' (ou 586) : le temple est pillé, la ville incendiée, ses murailles démantelées et l''élite de sa population déportée.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le pays est alors confié à '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Guedalia
  - type: text
    text: ', un petit-fils du Shaphân qui avait été haut fonctionnaire sous Josias. Jérémie est placé sous sa protection. Mais Guedalia est assassiné. Malgré les objurgations de Jérémie, nombreux sont ceux qui vont chercher refuge en Egypte ; ils entraînent le prophète avec eux (Jr 40–44).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Un livre-puzzle
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le ministère de Jérémie et le contenu de son livre se répartissent en quatre phases :'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 1) Sous le règne de Josias, il semble surtout s'adresser à ce qui reste de l'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Israël du Nord
  - type: text
    text: ' (chap. 2–6). C''est probablement à la fin de cette époque que Jérémie vient vivre à Jérusalem, où il se lie à la famille de Shaphân.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: '2) Sous le règne de Joïaqim, il annonce le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: jugement
  - type: text
    text: ' prochain sur Juda, Jérusalem et le temple (chapitres 7–20. Voir aussi chap. 26 et 36).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: '3) Au règne de Sédécias se rapportent la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: polémique
  - type: text
    text: ' contre les faux prophètes (27–29), l''interpellation des responsables politiques (34–35), et des récits biographiques, par exemple l''épisode de la citerne (37–39).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 4) Au lendemain de la débâcle de 587/6 se situent le gouvernement de Guedalia, son assassinat et la fuite en Egypte qui s'ensuit (40–44).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'En dehors de ces grands repères, l''organisation du livre tel que nous l''a transmis la tradition hébraïque (voir « Les éditions anciennes du livre de Jérémie », p.${Xedjer}) ne correspond pas à l''ordre chronologique (cf. les notices comme 25.1 ; 26.1 ; 27.1 ou encore 34.1s ; 35.1 ; 36.1). Le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: second rouleau
  - type: text
    text: ' rédigé par Baruch sous la dictée de Jérémie, vers 604, constitue certainement le noyau de l''ouvrage (voir 36.32). Mais les diverses tentatives pour le reconstituer ne convainquent guère. Baruch, fidèle secrétaire du prophète, est peut-être aussi l''auteur de certains passages biographiques, en particulier ceux qui parlent de Jérémie à la troisième personne.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre de Jérémie apparaît ainsi comme une mosaïque de morceaux divers, parfois regroupés en petits ensembles comme le livret sur les rois de Juda (21.11–23.8), sur les prophètes (23.9-40) ou encore sur l''Israël renouvelé (30–31). Ces unités ont pu être compilées dès avant l''exil par un groupe de fidèles proches de la foi du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Deutéronome
  - type: text
    text: ', comme le suggèrent les nombreux points de contact formels entre les deux livres, aussi bien dans les passages de transition que dans les sections principales (voir ci-dessous l''encadré « Jérémie et le Deutéronome : quelques similitudes »).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Quand l'espérance point à travers la douleur
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Jérémie est certainement le prophète dont on connaît le mieux la personne et la vie. Le lecteur découvrira un homme d''une extrême '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sensibilité
  - type: text
    text: ', profondément lié à son peuple autant qu''indéfectiblement fidèle à Dieu : deux attachements qui vont, en l''occurrence, se révéler difficilement compatibles.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Certes, grâce à Josias, le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: temple
  - type: text
    text: ' est officiellement au centre de la vie religieuse, mais la réforme royale n''a pas changé les cœurs. Dans l''esprit paganisé de la plupart (voir 44.17ss), le temple n''est guère plus qu''un objet magique, une sorte de fétiche (7.4) : beaucoup s''imaginent que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur (YHWH)
  - type: text
    text: ' devra sauver la ville pour empêcher la profanation de son sanctuaire.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Jérémie sait qu''une telle attitude mène droit à la catastrophe. Il se sait chargé d''en avertir son peuple et de l''appeler instamment à une vraie '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: conversion
  - type: text
    text: ', à la circoncision du cœur, thème caractéristique du Deutéronome (Jr 4.4 ; 9.24s ; voir Dt 10.16 ; 30.6). Pour l''Israël d''alors, celle-ci doit se traduire par un sincère retour à Dieu, ce qui entraîne que soit humblement accepté le jugement : le peuple de Dieu, qui n''a pas voulu se soumettre au joug léger, devra se soumettre au joug pesant (Jr 28).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ce message est trop blessant pour l''orgueil national et pour l''image que le peuple se fait de son Dieu. Jérémie est peu écouté. A plusieurs reprises, il se plaint à Dieu, parfois en termes vifs, de la situation dans laquelle il se trouve enfermé. C''est ce qu''on appelle traditionnellement « les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: confessions
  - type: text
    text: ' de Jérémie », qui ici et là font penser à la plainte de Job. En fait, dans la moitié des cas le prophète dialogue avec Dieu, et la réponse divine est parfois rude (12.1-4 ; 15.10-21 ; 17.14-18 ; 20.7-18).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Haï de tous, Jérémie connaît l''épreuve terrible de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: solitude
  - type: text
    text: . Dans les moments difficiles cependant Dieu lui garde quelques amis sûrs comme les fils (26.24 ; 29.3 ; 36.10,12,25) ou le petit-fils (39.14) de Shaphân.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Jérémie n'avait pas reçu mandat seulement d'arracher et d'abattre, mais aussi de bâtir et de planter (voir 1.10). Par-delà le jugement, le livre de Jérémie annonce l'
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: alliance* nouvelle
  - type: text
    text: ' que Dieu conclura avec son peuple (30–31). Cette nouvelle alliance — les mots seront un jour traduits « Nouveau Testament » — se caractérisera par l''intériorité du lien à Dieu, l''inscription de sa loi dans le cœur, la connaissance intime de Dieu par tous et le pardon des offenses (31.31-34). L'''
  - type: usfm
    marker: bd
    children:
    - type: text
      text: espérance
  - type: text
    text: ' s''exprime aussi dans les récits : alors que tout annonce la fin prochaine de Jérusalem, Jérémie rachète un champ de famille dont un de ses cousins est obligé de se défaire (32). Ce signe qui paraît fou sous l''imminence du désastre parle plus fort que les autres gestes significatifs associés à la prédication de Jérémie : la ceinture cachée (13), la visite au potier (18), la cruche cassée (19), le joug sur le cou (28), l''entrevue avec les Rékabites (35), etc. (voir « Les paroles-gestes des prophètes », p.${Xgstproph}).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cependant l''image qui s''impose est celle de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: souffrance
  - type: text
    text: ' endurée par le prophète au service de Dieu. Ce n''est sans doute pas pour rien que Jésus parut à certains comme une réapparition du prophète d''Anatoth (Mt 16.14).'
