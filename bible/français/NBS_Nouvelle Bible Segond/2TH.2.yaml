document_id: 2TH.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Avant l'avènement du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'Nous vous le demandons, frères 1Th 4.1 ; 5.12. –  l''avènement… v. 8s ; 1Co 15.23 ; 1Th 2.19+. –  notre rassemblement… Mt 23.37 ; 24.31 ; Mc 13.27/ / ; 1Th 4.13ss ; voir Hé 10.25n  ; voir aussi Es 43.4ss ; 52.12 ; 56.8 ; Jr 31.8 ; Jl 4.2 ; Ps 106.47 ; 2 Maccabées 2.7 : « Jusqu''à ce que Dieu ait accompli le rassemblement de son peuple. »'
  - type: text
    content: 'Nous vous le demandons, frères, en ce qui concerne l''avènement du Seigneur Jésus-Christ et notre rassemblement auprès de lui, '
  '10':
  - type: note
    content: 'tromperies  : cf. Mc 4.19+. –  injustice / vérité  : cf. v. 12 ; Rm 1.18 ; 2.8 ; 3.5,7 ; 1Co 13.6 ; sur la vérité, voir aussi 2Co 4.2 ; 6.7 ; 13.8 ; Ga 2.5,14 ; 5.7 ; Col 1.5s. –  ceux qui vont à leur perte 1Co 1.18 ; 2Co 2.15 ; 4.3. –  ils n''ont pas accueilli…  : cf. 1.8 ; 1Th 2.13. –  vérité / sauvés 1Tm 2.4 ; cf. Jn 8.31ss.'
  - type: text
    content: 'et avec toutes les tromperies de l''injustice pour ceux qui vont à leur perte, parce qu''ils n''ont pas accueilli l''amour de la vérité pour être sauvés. '
  '11':
  - type: note
    content: Cf. v. 9 ; Rm 1.24ss,28 ; 2Tm 4.4 ; voir aussi 2S 24.1 ; 1R 22.23 ; Ez 14.9.
  - type: text
    content: 'Aussi Dieu envoie sur eux une opération d''égarement, pour qu''ils croient le mensonge, '
  '12':
  - type: note
    content: Cf. v. 10+ ; Jn 3.19 ; 9.39 ; Rm 1.18,32 ; 2.8.
  - type: text
    content: pour que soient jugés tous ceux qui n'ont pas cru la vérité, mais qui ont pris plaisir à l'injustice.
  - type: heading
    content: 'Dieu vous a choisis : demeurez fermes'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.3ss. –  aimés du Seigneur  : cf. v. 16 ; 1Th 1.4 ; voir aussi Dt 33.12 ; Rm 8.35 ; 2Co 5.14 ; Ga 2.20. –  rendre grâce  : cf. Mt 26.27n. –  choisis  : sur le verbe correspondant, voir Ph 1.22n  ; ce n''est pas le verbe grec que Paul emploie habituellement pour l’« élection » des chrétiens, cf. 1Th 1.4+. –  comme prémices  : cf. Rm 8.23 ; 11.16 ; 16.5 ; 1Co 15.20,23 ; 16.15 ; Jc 1.18 ; certains mss portent dès le commencement  ; cf. 1Co 2.7 ; Ep 1.4 ; Ph 4.15 ; Col 1.26. –  pour le salut 1Th 5.9. –  dans la consécration…  : litt. dans une consécration d''esprit et une foi de vérité . –  la consécration de l''Esprit  : il faut sans doute comprendre la consécration (ou la sanctification , voir saint) accomplie par l''Esprit  ; cf. Rm 15.16 ; 1Co 6.11 ; 1Th 4.3ss,7 ; 5.23 ; 1P 1.2. –  la foi de la vérité  : autres traductions la vraie foi ; la foi suscitée par la vérité ; la foi en la vérité  ; cf. v. 10,12.'
  - type: text
    content: 'Quant à nous, frères aimés du Seigneur, nous devons toujours rendre grâce à Dieu à votre sujet, car Dieu vous a choisis comme prémices pour le salut, dans la consécration de l''Esprit et dans la foi de la vérité. '
  '14':
  - type: note
    content: 'appelés 1Th 2.12+ ; cf. Rm 8.30. –  notre bonne nouvelle… ou notre Evangile…  ; cf. Rm 10.14s ; Ga 1.6s. –  pour que vous acquériez  : litt. pour l''acquisition (ou l''entrée en possession) de, cf. 1Th 5.9n. –  la gloire…  : voir aussi 1.10 ; Rm 8.17,29s ; 1Co 15.43 ; 2Co 3.18 ; Ph 3.21 ; cf. Rm 3.23 ; Ecrit de Damas 3.20 : « (Les fidèles) sont destinés à la vie éternelle, et toute la gloire de l''Homme leur appartiendra » (idée plusieurs fois reprise dans les écrits de Qumrân).'
  - type: text
    content: C'est à cela aussi qu'il vous a appelés par notre bonne nouvelle, pour que vous acquériez la gloire de notre Seigneur Jésus-Christ.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'tenez ferme  : cf. v. 2 ; 1Co 16.13n  ; Ph 1.27 ; 4.1 ; 1Th 3.8. –  traditions…  : cf. 3.6ss ; 1Co 7.10 ; 11.2+,23ss ; 15.1ss ; 1Th 4.1. –  soit de vive voix…  : en grec l''expression est identique à celle qui a été traduite par une parole… v. 2.'
  - type: text
    content: Ainsi donc, frères, tenez ferme et restez attachés aux traditions que nous vous avons enseignées, soit de vive voix, soit par lettre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Th 3.11ss. –  qui nous a aimés  : cf. v. 13s. –  un encouragement ou une consolation  ; cf. v. 17.'
  - type: text
    content: 'Que notre Seigneur Jésus-Christ lui-même et Dieu, notre Père, qui nous a aimés et nous a donné, par grâce, un encouragement éternel et une bonne espérance, '
  '17':
  - type: note
    content: 'vous encouragent  : litt. encouragent (ou consolent) vos cœurs, cf. v. 16n  ; Col 2.2n. –  œuvre / parole Col 3.17 ; cf. 1Th 3.2. –  bonne  : cf. 2Co 9.8+'
  - type: text
    content: vous encouragent et vous affermissent en toute œuvre bonne comme en toute bonne parole !
  '2':
  - type: note
    content: 'ne vous laissez pas…  : cf. Mc 13.7/ /. –  message inspiré (litt. esprit, cf. 1Jn 4.1n) / parole / lettre  : cf. v. 15 ; 3.17. –  le jour du Seigneur 1Co 1.8+ ; 1Th 2.19 ; 3.13 ; 4.15ss ; 5.2+ss.'
  - type: text
    content: ne vous laissez pas trop vite ébranler dans votre bon sens ni alarmer par un message inspiré, par une parole ou par une lettre venant prétendument de nous, comme quoi le jour du Seigneur serait déjà là.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mc 13.5s/ /,21s/ / ; 1Jn 2.18 ; 4.1 ; cf. 1 Hénoch 91.6s : « L''injustice reprendra et viendra à son comble sur la terre, tous les actes d''injustice, d''oppression et de crime redoubleront. Mais quand le péché, l''injustice, le blasphème, l''oppression auront grandi partout, quand auront grandi la perversion, le crime et l''impureté, un châtiment sévère viendra du ciel sur eux tous. » Jubilés 23.14,16 : « En une génération mauvaise commettant sur terre le péché, dont l''œuvre est l''impureté, la fornication, la profanation et l''abomination… ils (les Juifs) abandonneront les ordonnances du pacte établi par le Seigneur entre Lui et eux. » 4 Esdras 5.2,6 : « L''injustice se multipliera plus encore que tu ne le vois à présent, plus encore que tu ne l''as entendu dire de jadis… Alors régnera celui que n''attendent pas les habitants de la terre. » –  il faut d''abord…  : litt. si l''apostasie ne vient d''abord… , formule qui est sans doute à rattacher à une principale sous-entendue  : ce jour ne viendra pas si d''abord ne vient l''apostasie… –  apostasie  : le terme grec apostasia signifie au propre l''acte de se détourner de (la bonne voie), voir Ac 21.21n  ; cf. Jr 2.19 ; en 1 Maccabées 2.15 il désigne spécialement l''abandon de la loi juive ; verbe apparenté Lc 8.13 ; 1Tm 4.1 ; Hé 3.12. –  se révèle v. 8s ; cf. 1.7+. –  la personnification du mal  : litt. l''homme (ou l''être humain ) de la non-loi  ; le terme correspondant à non-loi est apparenté à celui qui est traduit Sans-loi au v. 8 ; il semble désigner ici, selon les conceptions de l''apocalyptique juive, le point culminant, final et exemplaire de l''insoumission des hommes à l''égard de Dieu ; certains mss portent l''homme du péché  ; cf. Ps 89.23n. –  celui qui est voué…  : litt. le fils de la perdition , cf. Jn 17.12 ; on trouve des formulations très proches dans la traduction grecque (LXX) d''Es 57.3 ( fils impies, enfants de perdition, engeance impie ) ainsi que dans les écrits de Qumrân  ; voir aussi 1Th 5.5n.'
  - type: text
    content: 'Que personne ne vous trompe d''aucune manière : il faut d''abord que vienne l''apostasie et que se révèle la personnification du mal, celui qui est voué à la perdition, '
  '4':
  - type: note
    content: 'Cf. Dn 7.25 ; 8.10ss ; 11.31ss,36 ; Ap 13.5ss. –  au-dessus de  : autre traduction contre. –  tout ce qu''on appelle dieu…  : litt. tout ce qu''on appelle dieu (ou Dieu) ou objet d''adoration. –  le sanctuaire de Dieu  : cf. Dn 9.26s ; 11.31 ; 12.11 ; Mc 13.14ss/ / ; 1Co 3.16s ; 6.19 ; certains voient ici une allusion à l''empereur Gaius César (Caligula), qui avait tenté en 40 apr. J.-C. de faire ériger sa statue dans le temple de Jérusalem. –  se présenter (ou s''exhiber, cf. 1Co 4.9+) … comme Dieu (ou dieu) : cf. Es 14.4-20 ; Ez 28.2ss ; Oracles sibyllins 5.33s (au sujet de l''empereur Néron, 54-68 apr. J.-C.) : « Il reviendra et se donnera pour l''égal de Dieu. Mais Dieu le convaincra qu''il n''en est rien. »'
  - type: text
    content: l'adversaire qui s'élève au-dessus de tout ce qu'on appelle dieu, de tout ce qu'on adore, et qui va jusqu'à s'asseoir dans le sanctuaire de Dieu et à se présenter lui-même comme Dieu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1Th 2.9 ; 3.3s ; 4.2.
  - type: text
    content: 'Ne vous souvenez-vous pas que je vous disais cela lorsque j''étais encore chez vous ? '
  '6':
  - type: note
    content: 'maintenant…  : autre traduction vous savez ce qui le retient maintenant  ; cf. v. 8. –  ce qui retient  : autres traductions proposées  : ce qui prévaut, ce qui (le ?) retarde, de même v. 7 ; sur l''idée d''un empêchement provisoire ou d''un retard dans l''accomplissement ultime du dessein divin, cf. Es 66.9 ; Ha 2.3 ; Dn 12.11s ; Ap 6.10s ; 20.5,7ss ; une interprétation traditionnelle y voit l''annonce de l''Evangile (Mc 13.10/ /). –  se révèle v. 3,8.'
  - type: text
    content: 'Or maintenant vous savez bien ce qui retient, pour qu''il se révèle en son temps. '
  '7':
  - type: note
    content: 'le mystère du mal  : cf. v. 3n  ; Ap 17.5 ; on trouve plusieurs expressions comparables dans les écrits de Qumrân. –  à l''œuvre ou mis en œuvre  ; un terme apparenté est traduit par opération aux v. 9,11 ; cf. Ep 2.2. –  il faut…  : texte obscur et traduction incertaine ; autre possibilité mais seulement jusqu''à ce qu''ait disparu celui qui maintenant prévaut, cf. v. 6n.'
  - type: text
    content: 'Car déjà le mystère du mal est à l''œuvre ; il faut seulement que celui qui retient maintenant ait disparu. '
  '8':
  - type: note
    content: 'le Sans-loi  : voir v. 3n  ; dans Psaumes de Salomon 17.11ss le même terme désigne le général romain Pompée soumettant la Judée en 63 av. J.-C. et conduisant des Juifs à l''apostasie. –  le Seigneur Jésus  : certains mss portent seulement le Seigneur. –  détruira ou consumera, cf. Ga 5.15n. –  le souffle ou l''Esprit de sa bouche  : cf. Es 11.4 ; Ps 33.6 ; Jb 4.9 ; Ap 19.15,21 ; 4 Esdras 13.10s : « Il (le Messie ou Fils de l''Homme) fit sortir de sa bouche comme un flot de feu, de ses lèvres un souffle de feu et de sa langue une tempête d''étincelles. Le flot de feu, le souffle enflammé et la violente tempête, tout cela fut mêlé, tomba sur la multitude des assaillants prêts à combattre et les consuma tous. » –  réduira à rien Rm 3.3+. –  par (ou à) la manifestation  : cf. 1Tm 6.14+.'
  - type: text
    content: 'Alors se révélera le Sans-loi, que le Seigneur Jésus détruira par le souffle de sa bouche, qu''il réduira à rien par la manifestation de son avènement. '
  '9':
  - type: note
    content: 'Cf. Mc 13.22/ / ; Ap 13.13s ; 16.14 ; 19.20. Voir démon, diable, Satan. –  L''avènement du Sans-loi  : litt. son avènement. –  miracles (litt. puissance  ; le même terme, habituellement au pluriel, est souvent traduit par miracles  ; Mc 6.2n  ; 1Co 12.10n) / signes / prodiges  : cf. Rm 15.19 ; 2Co 12.12 ; voir aussi Ex 7.3 ; Dt 4.34 ; 6.22 ; Es 8.18 ; Jn 4.48, Ac 2.19+ ; Hé 2.4. –  mensongers  : cf. v. 11.'
  - type: text
    content: 'L''avènement du Sans-loi se produira par l''opération du Satan, avec toutes sortes de miracles, de signes et de prodiges mensongers, '
