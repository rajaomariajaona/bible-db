document_id: HAB.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Prière d''Habacuc : l''intervention de Dieu'
  - type: text
    content: ' '
  - type: note
    content: 'Prière Ps 17.1+. –  d''Habacuc  : sur le sens incertain de la préposition, voir Ps 3.1n. –  complaintes  : traduction incertaine, le terme hébreu semble être le pluriel de celui qui apparaît en Ps 7.1n.'
  - type: text
    content: Prière d'Habacuc, le prophète,
  - type: text
    content: sur le mode des complaintes.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'tremblent v. 6+. –  averse Ps 77.18. –  abîme Gn 1.2 ; 8.2. –  il lève ses mains…  : on pourrait combiner ce dernier vers avec le v. 11 pour comprendre  : le soleil suspend son pouvoir, la lune son autorité (cf. Gn 1.16).'
  - type: text
    content: Les montagnes te voient et tremblent,
  - type: text
    content: une averse violente passe,
  - type: text
    content: l'abîme fait entendre sa voix,
  - type: text
    content: il lève ses mains en haut.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Le soleil – la lune…  : voir v. 10n  ; d''autres comprennent le soleil et la lune s''arrêtent sur place  ; cf. Jos 10.12s. –  à la lumière…  : autre traduction ils errent à la lumière de tes flèches  ; cf. Ps 18.15 ; 144.6. –  fulgurante  : litt. de l''éclair  ; cf. Na 3.3.'
  - type: text
    content: Le soleil – la lune s'arrête dans sa résidence
  - type: text
    content: à la lumière de tes flèches qui partent,
  - type: text
    content: à la clarté fulgurante de ta lance.
  '12':
  - type: text
    content: ' '
  - type: note
    content: tu piétines ou tu foules aux pieds ; tu écrases Es 63.3ss ; Ps 110.6.
  - type: text
    content: Tu parcours la terre avec fureur,
  - type: text
    content: tu piétines les nations avec colère.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Tu sors  : cf. v. 5n  ; Es 42.13 ; Za 14.3 ; Ps 68.8. –  le salut ou la victoire  ; cf. v. 8n. –  l''homme qui a reçu ton onction (d''huile sacrée), litt. ton oint , terme qui a donné le mot messie et qui désigne habituellement le roi ou le grand prêtre, plus rarement les autres prêtres ou les prophètes ; cf. Ex 29.7 ; 30.25,30 ; 1S 10.1 ; 16.13 ; 2S 2.4 ; 1R 19.16 ; Za 4.14n  ; Ps 2.2n  ; 89.39,52 ; il semble s''appliquer ici au peuple dans son ensemble ; cf. Ex 19.6 ; Es 61.6 ; Ps 28.8 ; 105.15. –  Tu fracasses le faîte…  : texte incertain, litt. tu fracasses la tête de la maison du méchant, tu mets à nu ses fondations (cf. Mi 1.6 ; Ps 137.7) jusqu''au cou ( ?) ; certains, s''appuyant sur LXX, modifient le texte hébreu traditionnel pour lire tu fracasses la tête de la Mort, du méchant…'
  - type: text
    content: Tu sors pour le salut de ton peuple,
  - type: text
    content: pour le salut de l'homme qui a reçu ton onction.
  - type: text
    content: Tu fracasses le faîte de la maison du méchant,
  - type: text
    content: 'tu la détruis de fond en comble. '
  - type: text
    content: Pause.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et incertain (nombreuses variantes dans les versions anciennes). –  chefs  : cf. Jg 5.7n. –  me mettre en pièces  : litt. me disperser . –  comme…  : litt. comme pour manger le pauvre dans la cachette  ; cf. Ps 9.19 ; 10.2,8ss ; 12.6 ; 14.6 ; 17.12 ; 18.28.'
  - type: text
    content: Tu transperces de leurs propres flèches la tête de ses chefs
  - type: text
    content: qui se précipitent en tempête pour me mettre en pièces
  - type: text
    content: en poussant des cris de joie,
  - type: text
    content: comme s'ils dévoraient déjà le pauvre dans leur repaire.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 43.16s ; 51.10 ; Ps 77.20 ; voir aussi Ex 14–15. –  un bouillonnement  : autre traduction un amas.'
  - type: text
    content: Tu as ouvert un chemin à tes chevaux dans la mer,
  - type: text
    content: dans un bouillonnement de grandes eaux.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 21.3s ; Jr 4.19 ; 23.9 ; Ps 119.120 ; Dn 8.18,27 ; 10.8. –  J''ai entendu v. 2. –  mes os…  : litt. la pourriture entre dans mes os  ; cf. Os 5.12 ; Jb 13.28 ; Pr 12.4 ; 14.30. –  je frémis  : certains modifient légèrement le texte hébreu traditionnel pour lire je gémis . –  attendre  : le verbe hébreu correspondant évoque souvent l''idée de repos . –  le jour de la détresse  : cf. Jl 1.15+ ; So 1.14ss. –  où notre assaillant…  : sens incertain ; on a aussi compris pour monter contre le peuple qui nous assaille , ou encore  : d''attendre qu''un jour de détresse monte à l''assaut du peuple.'
  - type: text
    content: J'ai entendu,
  - type: text
    content: et mes entrailles ont frémi.
  - type: text
    content: A ce bruit mes lèvres balbutient ;
  - type: text
    content: mes os pourrissent,
  - type: text
    content: et sans bouger je frémis
  - type: text
    content: d'attendre le jour de la détresse
  - type: text
    content: où notre assaillant attaquera le peuple.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'ne fleurira pas  : LXX ne donnera pas de fruits  ; cf. Mt 21.19/ /. –  les champs  : traduction incertaine. Sur l''ensemble, cf. Lv 26.20 ; Jr 5.17 ; 8.13 ; Os 9.2n  ; Jl 1.17ss.'
  - type: text
    content: Car le figuier ne fleurira pas ;
  - type: text
    content: pas de vendange dans les vignes ;
  - type: text
    content: la production de l'olivier sera décevante,
  - type: text
    content: les champs ne donneront pas de nourriture,
  - type: text
    content: le petit bétail disparaîtra de l'enclos ;
  - type: text
    content: pas de gros bétail dans les étables.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1S 2.1 ; Es 61.10 ; Jl 2.23 ; Mi 7.7 ; Ps 5.12 ; 28.7 ; 32.11 ; 33.1 ; 35.9 ; 73.25ss ; Lc 1.47. –  Dieu de mon salut (v. 8n,13) Es 17.10 ; Mi 7.7 ; Ps 24.5+.
  - type: text
    content: 'Mais moi, j''exulterai dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je trouverai de l'allégresse dans le Dieu de mon salut.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu YHWH , généralement lu ’Adonaï (= Seigneur ) ; mais le mot ’Adonaï est, dans ce texte, celui qui est traduit par le Seigneur . Autre traduction Dieu, mon Seigneur… –  ma force Ps 28.7s ; 81.2 ; 118.14 ; 140.8 ; cf. 1Co 1.24. –  il rend mes pieds…  : cf. Ps 18.34. –  sur les hauteurs , d''après plusieurs versions anciennes ; texte hébreu traditionnel sur mes hauteurs  ; le même terme est aussi traduit par hauts lieux  ; cf. Dt 32.13n  ; Es 58.14. –  Du chef de chœur…  : cf. v. 1 ; Ps 4.1n. –  des instruments  : litt. mes instruments  ; cf. Ps 4.1n.'
  - type: text
    content: Dieu
  - type: text
    content: ', le Seigneur, est ma force :'
  - type: text
    content: il rend mes pieds semblables à ceux des biches
  - type: text
    content: et il me fait marcher sur les hauteurs.
  - type: text
    content: Du chef de chœur. Avec des instruments à cordes.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai entendu parler de toi  : cf. v. 16 ; Nb 14.15 ; Dt 2.25 ; Es 66.19 ; Na 3.19 ; Ps 44.2 ; Jb 42.5. –  j''ai craint…  : autre lecture possible  : et j''ai de la crainte. Seigneur, ton action, réalise-la…  ; au lieu de j''ai craint certains mss de LXX ont lu j''ai vu  ; cf. Mt 17.6. –  ton action Es 5.12 ; Ps 64.10+. –  Dans le cours des années  : litt. au sein des années  ; l''expression signifie probablement maintenant , par opposition soit aux jours de fête religieuse, soit à l''intervention divine envisagée dans un passé ou dans un avenir lointains (cf. Es 51.9ss ; 63.15ss ; Ps 44.2) ; certains y ont vu une référence à une fête du nouvel an ( entre les années ) ; une version ancienne a lu quand s''approchent les années . –  réalise-la…  : litt. fais-la vivre ou, d''après des versions anciennes, annonce-la, révèle-la . –  fais-la connaître  : LXX fais-toi connaître . –  dans ta colère  : autres traductions dans l''agitation ; dans le bouleversement  ; cf. Es 26.20s. –  compassion Es 54.8 ; Na 1.7.'
  - type: text
    content: Seigneur
  - type: text
    content: ', j''ai entendu parler de toi :'
  - type: text
    content: 'j''ai craint ton action, '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Dans le cours des années, réalise-la ;
  - type: text
    content: dans le cours des années, fais-la connaître !
  - type: text
    content: Mais, dans ta colère, souviens-toi de ta compassion !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu vient du sud, Dt 33.2 ; Jg 5.4 ; Za 9.14n  ; cf. Es 42.13 ; Ps 68.8ss. –  Dieu  : hébreu ’Eloah  ; cf. Jb 3.4n. –  Témân , en Edom Gn 36.11+. –  Saint 1.12+ ; cf. Es 40.25 ; Os 11.9 ; Jb 6.10. –  Parân Gn 21.21n  ; Dt 33.2. –  Pause v. 9,13 ; Ps 3.3n. –  Son éclat… Ps 8.2 ; 57.6. –  sa louange  : autre traduction sa clarté  ; cf. Es 42.8,10 ; 43.21. –  remplit la terre 2.14+.'
  - type: text
    content: Dieu vient de Témân,
  - type: text
    content: 'le Saint vient du mont Parân. '
  - type: text
    content: Pause.
  - type: text
    content: Son éclat couvre le ciel,
  - type: text
    content: sa louange remplit la terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'comme la clarté…  : cf. Ex 24.10 ; Es 62.1 ; Ez 1.4,13,27s ; Ps 18.13 ; 50.2s ; Ac 9.3. –  rayons  : le mot correspondant peut être traduit par cornes , voir Ex 34.29nss. –  sa force cachée  : autres traductions la cachette ; la réserve ; le secret de sa force.'
  - type: text
    content: C'est comme la clarté de la lumière ;
  - type: text
    content: des rayons partent de sa main ;
  - type: text
    content: la voilà, sa force cachée !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'peste 2S 24.15 ; Jr 14.12 ; 21.6 ; Ez 5.12 ; 6.12 ; 7.15 ; Am 4.10 ; cf. Os 13.14 ; Ps 91.3,6 ; Lc 21.11 ; Ap 6.8. –  fièvre  : le mot hébreu correspondant est aussi le nom d''un dieu cananéen destructeur, Résheph ; cf. Dt 32.24n  ; Ps 78.48n  ; Jb 5.7n. –  sort  : l''expression a souvent une connotation militaire  : se mettre en campagne (cf. v. 13+ ; Dt 20.1 ; 1S 8.20).'
  - type: text
    content: Devant lui marche la peste,
  - type: text
    content: la fièvre sort sur ses pas.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'prend la mesure…  : cf. Es 40.12 ; autre traduction, appuyée par LXX il fait trembler la terre  ; cf. Jr 4.24 ; Mi 1.3s. –  fait sursauter  : autre traduction déchire . –  Les montagnes d''antan  : cf. Gn 49.26 ; Dt 33.15 ; voir aussi Ps 90.2 ; Jb 15.7 ; Pr 8.25. –  devant lui s''effondrent…  : cf. v. 10 ; Jg 5.4s ; Es 42.15 ; Ps 18.8 ; 68.8s ; 114.4 ; voir aussi Ex 19.18. L''expression traduite par devant lui , située à la fin du v. en hébreu, est de sens incertain ; on pourrait aussi comprendre, en séparant le dernier vers  : à lui (sont) les sentiers (Ps 68.25n) d''autrefois  ; cf. Am 4.13.'
  - type: text
    content: Il se dresse et prend la mesure de la terre,
  - type: text
    content: il regarde et fait sursauter les nations.
  - type: text
    content: Les montagnes d'antan se disloquent ;
  - type: text
    content: devant lui s'effondrent les collines d'autrefois,
  - type: text
    content: les sentiers d'autrefois.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur, que certains modifient pour lire Les abris du pays de Madiân tremblent, les tentes de Koushân frémissent . –  Koushân  : ce nom désignerait, selon certains, une tribu nomade du désert du Sinaï (ce serait peut-être un autre nom de Madiân , associé à la montagne de Dieu Gn 25.2n  ; Ex 3.1 ; cf. Ex 2.16ss ; Nb 12.1 ; voir aussi Jg 3.8,10) ; selon d''autres il s''agirait d''un roi d''Edom. –  réduites à rien  : cf. Am 5.5n.'
  - type: text
    content: Je vois les tentes de Koushân réduites à rien,
  - type: text
    content: les toiles du pays de Madiân frémissent.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 77.17ss ; 144.5ss. –  chevaux / chars  : cf. Dt 33.26s ; Es 19.1 ; Ps 18.7ss ; 68.5n,34 ; 104.3. –  de victoire  : le terme est habituellement traduit par salut (cf. v. 13).'
  - type: text
    content: 'Est-ce contre les fleuves que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est fâché ?'
  - type: text
    content: Ta colère est-elle contre les fleuves,
  - type: text
    content: ta fureur contre la mer,
  - type: text
    content: lorsque tu montes sur tes chevaux,
  - type: text
    content: sur tes chars de victoire ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ton arc…  : autre traduction tu éveilles ton arc  ; cf. Gn 9.13 ; Za 9.13 ; Lm 2.4 ; 3.12. –  tes serments…  : traduction incertaine ; cf. Es 14.24s ; Jr 22.5 ; 44.26s ; 49.13 ; Am 4.2s ; Ps 95.11 ; 106.26 ; en modifiant légèrement le texte hébreu traditionnel on pourrait comprendre par des paroles tu consacres les flèches . –  flèches ou bâtons ; javelots ; épieux  ; de même au v. 14 ; cf. Dt 32.23 ; Ez 5.16. –  des fleuves  : cf. v. 8 ; d''autres comprennent des éclairs.'
  - type: text
    content: Ton arc est mis à nu,
  - type: text
    content: 'tes serments sont les flèches de ta parole. '
  - type: text
    content: Pause.
  - type: text
    content: Tu fends la terre par des fleuves.
