    - type: text
      text: Tu as ouvert un chemin à tes chevaux dans la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans un bouillonnement de grandes eaux.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
