      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''ai entendu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mes os…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la pourriture entre dans mes os
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Os 5.12 ; Jb 13.28 ; Pr 12.4 ; 14.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je frémis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains modifient légèrement le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je gémis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: attendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe hébreu correspondant évoque souvent l''idée de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: repos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le jour de la détresse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jl 1.15+ ; So 1.14ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: où notre assaillant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sens incertain ; on a aussi compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour monter contre le peuple qui nous assaille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'attendre qu'un jour de détresse monte à l'assaut du peuple.
      marker-yv: yv-n
    - type: text
      text: J'ai entendu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes entrailles ont frémi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A ce bruit mes lèvres balbutient ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes os pourrissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sans bouger je frémis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'attendre le jour de la détresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où notre assaillant attaquera le peuple.
