document_id: HAB.3,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Prière d''Habacuc : l''intervention de Dieu'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Prière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 17.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'Habacuc
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sur le sens incertain de la préposition, voir Ps 3.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: complaintes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine, le terme hébreu semble être le pluriel de celui qui apparaît en Ps 7.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Prière d'Habacuc, le prophète,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le mode des complaintes.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
