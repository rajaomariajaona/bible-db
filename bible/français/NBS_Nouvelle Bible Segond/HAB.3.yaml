        - type: text
          text: me mettre en pièces
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me disperser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme pour manger le pauvre dans la cachette
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Ps 9.19 ; 10.2,8ss ; 12.6 ; 14.6 ; 17.12 ; 18.28.
      marker-yv: yv-n
    - type: text
      text: Tu transperces de leurs propres flèches la tête de ses chefs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui se précipitent en tempête pour me mettre en pièces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en poussant des cris de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme s'ils dévoraient déjà le pauvre dans leur repaire.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
