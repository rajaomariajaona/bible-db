      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 77.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abîme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 1.2 ; 8.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il lève ses mains…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on pourrait combiner ce dernier vers avec le v. 11 pour comprendre'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le soleil suspend son pouvoir, la lune son autorité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 1.16).
      marker-yv: yv-n
    - type: text
      text: Les montagnes te voient et tremblent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une averse violente passe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'abîme fait entendre sa voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il lève ses mains en haut.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le soleil – la lune…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir v. 10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; d''autres comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le soleil et la lune s'arrêtent sur place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Jos 10.12s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la lumière…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils errent à la lumière de tes flèches
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Ps 18.15 ; 144.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fulgurante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'éclair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Na 3.3.
      marker-yv: yv-n
    - type: text
      text: Le soleil – la lune s'arrête dans sa résidence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la lumière de tes flèches qui partent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la clarté fulgurante de ta lance.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu piétines '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu foules aux pieds ; tu écrases '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 63.3ss ; Ps 110.6.
      marker-yv: yv-n
    - type: text
      text: Tu parcours la terre avec fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu piétines les nations avec colère.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu sors
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 42.13 ; Za 14.3 ; Ps 68.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le salut '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la victoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''homme qui a reçu ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(d''huile sacrée), litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton oint
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme qui a donné le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'messie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et qui désigne habituellement le roi ou le grand prêtre, plus rarement les autres prêtres ou les prophètes ; cf. Ex 29.7 ; 30.25,30 ; 1S 10.1 ; 16.13 ; 2S 2.4 ; 1R 19.16 ; Za 4.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 2.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 89.39,52 ; il semble s''appliquer ici au '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dans son ensemble ; cf. Ex 19.6 ; Es 61.6 ; Ps 28.8 ; 105.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu fracasses le faîte…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : texte incertain, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu fracasses la tête de la maison du méchant, tu mets à nu ses fondations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Mi 1.6 ; Ps 137.7) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jusqu''au cou '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '( ?) ; certains, s''appuyant sur LXX, modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu fracasses la tête de la Mort, du méchant…
      marker-yv: yv-n
    - type: text
      text: Tu sors pour le salut de ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour le salut de l'homme qui a reçu ton onction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fracasses le faîte de la maison du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu la détruis de fond en comble. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte obscur et incertain (nombreuses variantes dans les versions anciennes). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chefs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
