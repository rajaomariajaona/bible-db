document_id: MAT.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La parabole des dix vierges
  - type: text
    content: ' '
  - type: note
    content: règne ou royaume 3.2n. –  vierges Ps 45.15. –  lampes Lc 12.35s.
  - type: text
    content: 'Alors le règne des cieux sera comme ces dix vierges qui avaient pris leurs lampes pour aller au-devant du marié. '
  '10':
  - type: note
    content: '22.4 ; cf. Gn 7.16 ; Lc 13.24. –  prêtes 24.44. –  dans la salle des noces  : litt. dans les noces.'
  - type: text
    content: 'Pendant qu''elles allaient en acheter, le marié arriva ; celles qui étaient prêtes entrèrent avec lui dans la salle des noces, et la porte fut fermée. '
  '11':
  - type: note
    content: 7.21 ; Lc 13.25.
  - type: text
    content: 'Plus tard, les autres vierges arrivèrent aussi et dirent : « Seigneur, Seigneur, ouvre-nous ! » '
  '12':
  - type: note
    content: 7.23 ; Lc 13.27 ; 2Tm 2.19. –  Amen 5.18n.
  - type: text
    content: 'Mais il répondit : «  '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, je ne vous connais pas. »'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 24.42.
  - type: text
    content: Veillez donc, puisque vous ne connaissez ni le jour, ni l'heure.
  - type: heading
    content: La parabole des talents
  - type: heading
    content: Lc 19.12-27
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'esclaves  : autre traduction serviteurs  ; cf. Mc 13.34.'
  - type: text
    content: 'Il en sera comme d''un homme qui, sur le point de partir en voyage, appela ses esclaves et leur confia ses biens. '
  '15':
  - type: note
    content: 'talents  : voir mesures, poids et monnaies. –  ses capacités  : litt. sa puissance  ; cf. Rm 12.3,6 ; 1Co 12.11 ; Ep 4.7.'
  - type: text
    content: 'Il donna cinq talents à l''un, deux à l''autre, et un au troisième, à chacun selon ses capacités, et il partit en voyage. Aussitôt '
  '16':
  - type: note
    content: 'les faire valoir  : litt. il œuvra en eux ou par eux, c.-à-d. s''en servit pour travailler.'
  - type: text
    content: 'celui qui avait reçu les cinq talents s''en alla les faire valoir et en gagna cinq autres. '
  '17':
  - type: note
    content: Ec 9.10 ; 11.6.
  - type: text
    content: 'De même, celui qui avait reçu les deux talents en gagna deux autres. '
  '18':
  - type: note
    content: maître 12.8n.
  - type: text
    content: 'Celui qui n''en avait reçu qu''un alla faire un trou dans la terre et cacha l''argent de son maître. '
  '19':
  - type: note
    content: 'Longtemps après  : cf. v. 5+. –  rendre compte 18.23+.'
  - type: text
    content: 'Longtemps après, le maître de ces esclaves arrive et leur fait rendre compte. '
  '2':
  - type: note
    content: folles 5.22+ ; en l'occurrence, leur folie va se manifester par leur imprévoyance. –  avisées ou prudentes, cf. 7.24n  ; 24.45.
  - type: text
    content: 'Cinq d''entre elles étaient folles, et les cinq autres étaient avisées. '
  '20':
  - type: text
    content: 'Celui qui avait reçu les cinq talents vint apporter cinq autres talents et dit : Maître, tu m''avais confié cinq talents ; en voici cinq autres que j''ai gagnés. '
  '21':
  - type: note
    content: V. 23 ; 24.45-47/ / ; Lc 16.10ss. –  joie Jn 15.11 ; Hé 12.2 ; cf. Ap 3.21.
  - type: text
    content: 'Son maître lui dit : C''est bien ! Tu es un bon esclave, digne de confiance ! Tu as été digne de confiance pour une petite affaire, je te confierai de grandes responsabilités ; entre dans la joie de ton maître. '
  '22':
  - type: text
    content: 'Celui qui avait reçu les deux talents vint aussi et dit : Maître, tu m''avais confié deux talents, en voici deux autres que j''ai gagnés. '
  '23':
  - type: note
    content: Cf. v. 21 ; 20.14 ; 2Co 8.12.
  - type: text
    content: 'Son maître lui dit : C''est bien ! Tu es un bon esclave, digne de confiance ! Tu as été digne de confiance pour une petite affaire, je te confierai de grandes responsabilités ; entre dans la joie de ton maître. '
  '24':
  - type: note
    content: 'Cf. Jon 4.2. –  tu récoltes…  : litt. tu recueilles ou tu rassembles (cf. v. 32n) de là où tu n''as pas dispersé.'
  - type: text
    content: 'Celui qui n''avait reçu qu''un talent vint ensuite et dit : Maître, je savais que tu es un homme dur : tu moissonnes où tu n''as pas semé, et tu récoltes où tu n''as pas répandu ; '
  '25':
  - type: note
    content: 'peur  : cf. Pr 22.13 ; 1Jn 4.18 ; voir crainte. –  prends  : litt. tu as.'
  - type: text
    content: 'j''ai eu peur, et je suis allé cacher ton talent dans la terre : le voici ; prends ce qui est à toi. '
  '26':
  - type: note
    content: '12.37. –  paresseux  : cf. Pr 10.26.'
  - type: text
    content: 'Son maître lui répondit : Esclave mauvais et paresseux, tu savais que je moissonne où je n''ai pas semé et que je récolte où je n''ai pas répandu ? '
  '27':
  - type: text
    content: 'Alors tu aurais dû placer mon argent chez les banquiers, et à mon arrivée j''aurais récupéré ce qui est à moi avec un intérêt. '
  '28':
  - type: text
    content: 'Enlevez-lui donc le talent, et donnez-le à celui qui a les dix talents. '
  '29':
  - type: note
    content: 13.12+.
  - type: text
    content: '– Car on donnera à celui qui a, et il sera dans l''abondance, mais à celui qui n''a pas on enlèvera même ce qu''il a. – '
  '3':
  - type: text
    content: 'Les folles, en prenant leur lampe, n''avaient pas pris d''huile avec elles ; '
  '30':
  - type: note
    content: 'esclave inutile  : cf. Lc 17.10. –  ténèbres / pleurs… 8.12+. – D''après le témoignage d''Eusèbe de Césarée (≈ 265-339), un évangile judéo-chrétien (l’Evangile des nazaréens  ?) aurait présenté une version différente de cette parabole : un esclave qui a fait fructifier le bien de son maître, un deuxième qui l''a caché et un troisième qui l''a dilapidé dans la débauche ; c''est ce dernier qui aurait subi le châtiment (cf. 24.45ss), tandis que le deuxième aurait seulement été réprimandé.'
  - type: text
    content: Et l'esclave inutile, chassez-le dans les ténèbres du dehors ; c'est là qu'il y aura des pleurs et des grincements de dents.
  - type: heading
    content: Le jugement dernier
  '31':
  - type: text
    content: ' '
  - type: note
    content: '13.41+ ; 16.27+ ; 19.28 ; 24.31 ; Za 14.5 ; Dn 7.13s ; cf. 1 Hénoch 69.27 : « Il s''est assis sur Son trône glorieux, et la somme du jugement a été donnée à ce Fils d''homme » (cf. Jn 5.22). –  gloire 16.27+.'
  - type: text
    content: 'Lorsque le Fils de l''homme viendra dans sa gloire, avec tous les anges, il s''assiéra sur son trône glorieux. '
  '32':
  - type: note
    content: 'Cf. 13.40-43,48s ; Jl 4.12 ; Rm 2.16 ; 2Co 5.10 ; Ap 20.11-13. –  Toutes les nations 4.15n  ; voir non-Juifs. –  seront rassemblées  : le même verbe a été traduit par récolter (v. 24n) et recueillir (v. 35). –  moutons / chèvres  : cf. Ez 34.17,20 ; Za 10.3.'
  - type: text
    content: 'Toutes les nations seront rassemblées devant lui. Il séparera les uns des autres comme le berger sépare les moutons des chèvres : '
  '33':
  - type: text
    content: 'il mettra les moutons à sa droite et les chèvres à sa gauche. '
  '34':
  - type: note
    content: bénis Es 65.23 ; Ep 1.3s. –  héritez Rm 8.17 ; Jc 2.5. –  le royaume 3.2n  ; Lc 12.32. –  préparé 20.23.
  - type: text
    content: 'Alors le roi dira à ceux qui seront à sa droite : « Venez, vous qui êtes bénis de mon Père ; héritez le royaume qui a été préparé pour vous depuis la fondation du monde. '
  '35':
  - type: note
    content: '10.42 ; Es 58.7 ; Ez 18.7,9,16 ; Jb 31.32 ; Lc 14.13s. Cf. Testament de Joseph 1.4ss : « Mes frères me haïrent, mais le Seigneur m''aima. Ils voulaient me tuer, mais le Dieu de mes pères me garda. Ils me descendirent dans la Fosse, et le Très-Haut m''en fit remonter. Je fus vendu en esclavage, et le Maître de toutes choses me libéra. Je fus emmené en captivité, et Sa forte main me secourut. Je fus tenaillé par la faim, et le Seigneur lui-même me nourrit. J''étais seul, et Dieu me consola. J''étais malade, et le Seigneur me visita. J''étais en prison, et le Sauveur me fit grâce ; dans les chaînes, et il me délia ; diffamé, et il plaida pour moi ; en butte aux paroles acerbes des Egyptiens, et il me délivra ; esclave, et il m''éleva. »'
  - type: text
    content: 'Car j''ai eu faim et vous m''avez donné à manger ; j''ai eu soif et vous m''avez donné à boire ; j''étais étranger et vous m''avez recueilli ; '
  '36':
  - type: note
    content: 'Jb 31.19 ; 2Tm 1.16 ; Hé 10.34 ; 13.3 ; Jc 1.27 ; cf. Siracide 7.32-35 : « Tends la main au mendiant, pour que tu sois pleinement béni. (…) Ne te détourne pas de ceux qui pleurent, avec les affligés, afflige-toi. N''hésite pas à visiter les malades ; c''est pour de telles actions que tu seras aimé. »'
  - type: text
    content: 'j''étais nu et vous m''avez vêtu ; j''étais malade et vous m''avez visité ; j''étais en prison et vous êtes venus me voir. » '
  '37':
  - type: note
    content: justes 1.19.
  - type: text
    content: 'Alors les justes lui répondront : « Seigneur, quand t''avons-nous vu avoir faim, et t''avons-nous donné à manger ? – ou avoir soif, et t''avons-nous donné à boire ? '
  '38':
  - type: text
    content: 'Quand t''avons-nous vu étranger, et t''avons-nous recueilli ? – ou nu, et t''avons-nous vêtu ? '
  '39':
  - type: text
    content: 'Quand t''avons-nous vu malade, ou en prison, et sommes-nous venus te voir ? » '
  '4':
  - type: note
    content: Dt 32.29 ; Pr 3.35.
  - type: text
    content: 'mais celles qui étaient avisées avaient pris, avec leur lampe, de l''huile dans un récipient. '
  '40':
  - type: note
    content: l'un de ces plus petits… 10.42 ; on peut comprendre l'un de ces plus petits qui sont mes frères, ou bien l'un de ces plus petits d'entre mes frères  ; cf. 12.49+. –  à moi 10.40 ; 18.5 ; Pr 19.17 ; Hé 6.10.
  - type: text
    content: 'Et le roi leur répondra : «  '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, dans la mesure où vous avez fait cela pour l''un de ces plus petits, l''un de mes frères, c''est à moi que vous l''avez fait. » '
  '41':
  - type: note
    content: 'Allez-vous-en  : cf. 7.23. –  feu éternel  : cf. Lc 16.24 ; 2Th 1.8 ; Jd 6s ; Ap 14.10+. –  diable (voir démon, diable, Satan) / anges  : cf. 2Co 12.7 ; Ap 12.7,9.'
  - type: text
    content: 'Ensuite il dira à ceux qui seront à sa gauche : « Allez-vous-en loin de moi, maudits, dans le feu éternel préparé pour le diable et pour ses anges. '
  '42':
  - type: text
    content: 'Car j''ai eu faim, et vous ne m''avez pas donné à manger ; j''ai eu soif, et vous ne m''avez pas donné à boire. '
  '43':
  - type: text
    content: 'J''étais étranger, et vous ne m''avez pas recueilli ; j''étais nu, et vous ne m''avez pas vêtu ; j''étais malade et en prison, et vous ne m''avez pas visité. » '
  '44':
  - type: text
    content: 'Alors ils répondront, eux aussi : « Seigneur, quand t''avons-nous vu avoir faim ou soif, étranger, ou nu, ou malade, ou en prison, sans nous mettre à ton service ? '
  '45':
  - type: note
    content: V. 35-40 ; Jb 22.7 ; Jc 2.14-17 ; 4.17 ; 1Jn 3.17.
  - type: text
    content: 'Alors il leur répondra : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, dans la mesure où vous n''avez pas fait cela pour l''un de ces plus petits, c''est à moi que vous ne l''avez pas fait. » '
  '46':
  - type: note
    content: Dn 12.2 ; Jn 5.29 ; cf. Rm 2.7ss.
  - type: text
    content: Et ceux-ci iront au châtiment éternel, mais les justes, à la vie éternelle.
  '5':
  - type: note
    content: tardait 24.48 ; cf. 25.19 ; Hé 10.37. –  s'endormirent 26.40.
  - type: text
    content: 'Comme le marié tardait, toutes s''assoupirent et s''endormirent. '
  '6':
  - type: note
    content: Mc 13.35ss ; Ap 16.15. –  rencontre 1Th 4.17.
  - type: text
    content: 'Au milieu de la nuit, il y eut un cri : « Voici le marié, sortez à sa rencontre ! » '
  '7':
  - type: note
    content: se réveillèrent ou se levèrent, cf. 2.13n.
  - type: text
    content: 'Alors toutes ces vierges se réveillèrent et préparèrent leurs lampes. '
  '8':
  - type: note
    content: Cf. Jb 18.5 ; Pr 13.9.
  - type: text
    content: 'Les folles dirent à celles qui étaient avisées : « Donnez-nous de votre huile, nos lampes s''éteignent ! » '
  '9':
  - type: note
    content: Cf. Ga 6.5.
  - type: text
    content: 'Celles qui étaient avisées répondirent : « Il n''y en aurait jamais assez pour nous et pour vous ; allez plutôt vous en acheter chez ceux qui en vendent ! » '
