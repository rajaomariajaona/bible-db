      - type: text
        text: '1.4ss : « Mes frères me haïrent, mais le Seigneur m''aima. Ils voulaient me tuer, mais le Dieu de mes pères me garda. Ils me descendirent dans la Fosse, et le Très-Haut m''en fit remonter. Je fus vendu en esclavage, et le Maître de toutes choses me libéra. Je fus emmené en captivité, et Sa forte main me secourut. Je fus tenaillé par la faim, et le Seigneur lui-même me nourrit. J''étais seul, et Dieu me consola. J''étais malade, et le Seigneur me visita. J''étais en prison, et le Sauveur me fit grâce ; dans les chaînes, et il me délia ; diffamé, et il plaida pour moi ; en butte aux paroles acerbes des Egyptiens, et il me délivra ; esclave, et il m''éleva. »'
    marker-yv: yv-n
  - type: text
    text: 'Car j''ai eu faim et vous m''avez donné à manger ; j''ai eu soif et vous m''avez donné à boire ; j''étais étranger et vous m''avez recueilli ; '
