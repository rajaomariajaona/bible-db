document_id: MAT.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole des dix vierges
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'règne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'royaume '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vierges '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ps 45.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lampes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 12.35s.
    marker-yv: yv-n
  - type: text
    text: 'Alors le règne des cieux sera comme ces dix vierges qui avaient pris leurs lampes pour aller au-devant du marié. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'folles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.22+ ; en l''occurrence, leur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'folie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'va se manifester par leur imprévoyance. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avisées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prudentes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 7.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 24.45.'
    marker-yv: yv-n
  - type: text
    text: 'Cinq d''entre elles étaient folles, et les cinq autres étaient avisées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les folles, en prenant leur lampe, n''avaient pas pris d''huile avec elles ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 32.29 ; Pr 3.35.
    marker-yv: yv-n
  - type: text
    text: 'mais celles qui étaient avisées avaient pris, avec leur lampe, de l''huile dans un récipient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tardait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '24.48 ; cf. 25.19 ; Hé 10.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''endormirent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 26.40.
    marker-yv: yv-n
  - type: text
    text: 'Comme le marié tardait, toutes s''assoupirent et s''endormirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mc 13.35ss ; Ap 16.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rencontre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Th 4.17.
    marker-yv: yv-n
  - type: text
    text: 'Au milieu de la nuit, il y eut un cri : « Voici le marié, sortez à sa rencontre ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se réveillèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se levèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 2.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors toutes ces vierges se réveillèrent et préparèrent leurs lampes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Jb 18.5 ; Pr 13.9.
    marker-yv: yv-n
  - type: text
    text: 'Les folles dirent à celles qui étaient avisées : « Donnez-nous de votre huile, nos lampes s''éteignent ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ga 6.5.
    marker-yv: yv-n
  - type: text
    text: 'Celles qui étaient avisées répondirent : « Il n''y en aurait jamais assez pour nous et pour vous ; allez plutôt vous en acheter chez ceux qui en vendent ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.4 ; cf. Gn 7.16 ; Lc 13.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prêtes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '24.44. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la salle des noces
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans les noces.
    marker-yv: yv-n
  - type: text
    text: 'Pendant qu''elles allaient en acheter, le marié arriva ; celles qui étaient prêtes entrèrent avec lui dans la salle des noces, et la porte fut fermée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.21 ; Lc 13.25.
    marker-yv: yv-n
  - type: text
    text: 'Plus tard, les autres vierges arrivèrent aussi et dirent : « Seigneur, Seigneur, ouvre-nous ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.23 ; Lc 13.27 ; 2Tm 2.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais il répondit : «  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen,
  - type: text
    text: ' je vous le dis, je ne vous connais pas. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 24.42.
    marker-yv: yv-n
  - type: text
    text: Veillez donc, puisque vous ne connaissez ni le jour, ni l'heure.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole des talents
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lc 19.12-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: esclaves
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: serviteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Mc 13.34.
    marker-yv: yv-n
  - type: text
    text: 'Il en sera comme d''un homme qui, sur le point de partir en voyage, appela ses esclaves et leur confia ses biens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: talents
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ses capacités
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sa puissance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Rm 12.3,6 ; 1Co 12.11 ; Ep 4.7.'
    marker-yv: yv-n
  - type: text
    text: 'Il donna cinq talents à l''un, deux à l''autre, et un au troisième, à chacun selon ses capacités, et il partit en voyage. Aussitôt '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les faire valoir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il œuvra en eux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'en servit pour travailler.
    marker-yv: yv-n
  - type: text
    text: 'celui qui avait reçu les cinq talents s''en alla les faire valoir et en gagna cinq autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ec 9.10 ; 11.6.
    marker-yv: yv-n
  - type: text
    text: 'De même, celui qui avait reçu les deux talents en gagna deux autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'maître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui n''en avait reçu qu''un alla faire un trou dans la terre et cacha l''argent de son maître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Longtemps après
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 5+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rendre compte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.23+.
    marker-yv: yv-n
  - type: text
    text: 'Longtemps après, le maître de ces esclaves arrive et leur fait rendre compte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Celui qui avait reçu les cinq talents vint apporter cinq autres talents et dit : Maître, tu m''avais confié cinq talents ; en voici cinq autres que j''ai gagnés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 23 ; 24.45-47/ / ; Lc 16.10ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'joie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jn 15.11 ; Hé 12.2 ; cf. Ap 3.21.
    marker-yv: yv-n
  - type: text
    text: 'Son maître lui dit : C''est bien ! Tu es un bon esclave, digne de confiance ! Tu as été digne de confiance pour une petite affaire, je te confierai de grandes responsabilités ; entre dans la joie de ton maître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Celui qui avait reçu les deux talents vint aussi et dit : Maître, tu m''avais confié deux talents, en voici deux autres que j''ai gagnés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 21 ; 20.14 ; 2Co 8.12.
    marker-yv: yv-n
  - type: text
    text: 'Son maître lui dit : C''est bien ! Tu es un bon esclave, digne de confiance ! Tu as été digne de confiance pour une petite affaire, je te confierai de grandes responsabilités ; entre dans la joie de ton maître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jon 4.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu récoltes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu recueilles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu rassembles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 32
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de là où tu n'as pas dispersé.
    marker-yv: yv-n
  - type: text
    text: 'Celui qui n''avait reçu qu''un talent vint ensuite et dit : Maître, je savais que tu es un homme dur : tu moissonnes où tu n''as pas semé, et tu récoltes où tu n''as pas répandu ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: peur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Pr 22.13 ; 1Jn 4.18 ; voir crainte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prends
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu as.
    marker-yv: yv-n
  - type: text
    text: 'j''ai eu peur, et je suis allé cacher ton talent dans la terre : le voici ; prends ce qui est à toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: paresseux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Pr 10.26.'
    marker-yv: yv-n
  - type: text
    text: 'Son maître lui répondit : Esclave mauvais et paresseux, tu savais que je moissonne où je n''ai pas semé et que je récolte où je n''ai pas répandu ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Alors tu aurais dû placer mon argent chez les banquiers, et à mon arrivée j''aurais récupéré ce qui est à moi avec un intérêt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Enlevez-lui donc le talent, et donnez-le à celui qui a les dix talents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
