  - type: text
    text: Il le jeta dans l'abîme, qu'il ferma et scella au-dessus de lui, pour qu'il n'égare plus les nations jusqu'à ce que les mille ans soient achevés. Après cela, il faut qu'il soit relâché pour un peu de temps.
