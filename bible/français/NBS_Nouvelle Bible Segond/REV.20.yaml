  - type: text
    text: 'Je vis des trônes. A ceux qui s''y assirent fut donné le pouvoir de juger. Je vis aussi les âmes de ceux qui avaient été décapités à la hache à cause du témoignage de Jésus et de la parole de Dieu, et ceux qui ne s''étaient pas prosternés devant la bête ni devant son image et qui n''avaient pas reçu la marque sur le front ni sur la main. Ils reprirent vie et ils régnèrent avec le Christ pendant mille ans. '
