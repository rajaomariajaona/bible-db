      - type: text
        text: ' des morts) rendra ce qu''il a reçu, la Perdition rendra ce qu''elle doit. » 61.5 : « Ces mesures révéleront tout ce qui est caché au fond de la terre, ceux qui ont péri victimes du désert, ceux qui ont été engloutis par les fauves, ceux qui ont été engloutis par les poissons de la mer. Ainsi ils reviendront et se tiendront fermes au jour de l''Elu. Car rien ne disparaît devant le Seigneur des Esprits, rien ne peut disparaître. »'
    marker-yv: yv-n
  - type: text
    text: 'La mer rendit les morts qui étaient en elle, la mort et le séjour des morts rendirent les morts qui étaient en eux, et ils furent jugés, chacun selon ses œuvres. '
