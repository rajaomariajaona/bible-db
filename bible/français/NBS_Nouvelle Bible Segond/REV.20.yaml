document_id: REV.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Satan lié pour mille ans
  - type: text
    content: ' '
  - type: note
    content: du ciel un ange 10.1+. –  clef de l'abîme 9.1+.
  - type: text
    content: 'Alors je vis descendre du ciel un ange qui tenait la clef de l''abîme et une grande chaîne à la main. '
  '10':
  - type: note
    content: Le diable… 12.9+. –  l'étang de feu… 19.20+. –  prophète de mensonge 1Jn 4.1n.
  - type: text
    content: Le diable qui les égarait fut jeté dans l'étang de feu et de soufre, où sont la bête et le prophète de mensonge. Ils seront tourmentés jour et nuit, à tout jamais.
  - type: heading
    content: Le jugement dernier
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'trône… 4.2+ ; cf. 1R 10.18 ; Dn 7.9. –  s''enfuirent devant lui (litt. de sa face ) : cf. 6.14 ; 21.1 ; Ps 114.3,7 ; 2P 3.7-12. –  plus de place 12.8+.'
  - type: text
    content: 'Alors je vis un grand trône blanc et celui qui y était assis. La terre et le ciel s''enfuirent devant lui, et il ne se trouva plus de place pour eux. '
  '12':
  - type: note
    content: les morts… 11.18+. –  Des livres Dn 7.10n. –  ouverts ou déroulés 5.1n. –  livre de la vie 3.5+. –  selon leurs œuvres 2.23+.
  - type: text
    content: 'Alors je vis les morts, les grands et les petits, debout devant le trône. Des livres furent ouverts, et un autre livre fut ouvert, qui est le livre de la vie. Les morts furent jugés d''après ce qui était écrit dans les livres, selon leurs œuvres. '
  '13':
  - type: note
    content: 'rendit  : litt. donna, de même dans la suite ; 1.18+ ; cf. Jn 5.28s ; 1 Hénoch 51.1 : « En ce temps-là, la terre rendra son dépôt, le Shéol (= séjour des morts) rendra ce qu''il a reçu, la Perdition rendra ce qu''elle doit. » 61.5 : « Ces mesures révéleront tout ce qui est caché au fond de la terre, ceux qui ont péri victimes du désert, ceux qui ont été engloutis par les fauves, ceux qui ont été engloutis par les poissons de la mer. Ainsi ils reviendront et se tiendront fermes au jour de l''Elu. Car rien ne disparaît devant le Seigneur des Esprits, rien ne peut disparaître. »'
  - type: text
    content: 'La mer rendit les morts qui étaient en elle, la mort et le séjour des morts rendirent les morts qui étaient en eux, et ils furent jugés, chacun selon ses œuvres. '
  '14':
  - type: note
    content: 'Cf. 21.4 ; 1Co 15.26,54. –  étang de feu… 19.20+. –  seconde mort  : cf. v. 6.'
  - type: text
    content: 'La mort et le séjour des morts furent jetés dans l''étang de feu. L''étang de feu, c''est la seconde mort. '
  '15':
  - type: note
    content: 3.5+ ; cf. 13.8.
  - type: text
    content: Quiconque ne fut pas trouvé inscrit dans le livre de la vie fut jeté dans l'étang de feu.
  '2':
  - type: note
    content: 'le dragon… 12.3+,9n. –  le diable et le Satan  : litt. diable et le Satan (voir démon, diable, Satan). –  le lia Mt 12.25-29. –  mille ans  : cf. Ps 90.4 ; 2P 3.8.'
  - type: text
    content: 'Il saisit le dragon, le serpent d''autrefois, qui est le diable et le Satan, et il le lia pour mille ans. '
  '3':
  - type: note
    content: 'Cf. Es 24.21s ; voir aussi 1 Hénoch 18.16 : « Il s''est irrité contre eux (les astres représentant les anges déchus) et les a enchaînés pour dix mille ans, jusqu''à la fin de leur péché. » –  qu''il n''égare plus 12.9+ ; 2Th 2.9-12. –  nations 2.26n  ; voir non-Juifs. –  relâché  : litt. délié, de même v. 7. –  un peu de temps 12.12.'
  - type: text
    content: Il le jeta dans l'abîme, qu'il ferma et scella au-dessus de lui, pour qu'il n'égare plus les nations jusqu'à ce que les mille ans soient achevés. Après cela, il faut qu'il soit relâché pour un peu de temps.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'des trônes… juger  : cf. Dn 7.9,22,27 ; Mt 19.28 ; Lc 22.30 ; 1Co 6.2. –  âmes 6.9-11. –  décapités à la hache  : le terme employé ici semble se référer au mode d''exécution classique de la Rome républicaine ; dans la Rome impériale il avait été largement remplacé par le glaive (ou l''épée). –  témoignage… 1.2+. –  prosternés  : 3.9+ ; Mt 2.2+ ; voir culte. –  devant la bête 13.15+,16. –  Ils reprirent vie  : litt. ils vécurent (ou ils se mirent à vivre ), de même au v. 5 ; voir 2.8n  ; cf. Ez 37.10. –  régnèrent 5.10+.'
  - type: text
    content: 'Je vis des trônes. A ceux qui s''y assirent fut donné le pouvoir de juger. Je vis aussi les âmes de ceux qui avaient été décapités à la hache à cause du témoignage de Jésus et de la parole de Dieu, et ceux qui ne s''étaient pas prosternés devant la bête ni devant son image et qui n''avaient pas reçu la marque sur le front ni sur la main. Ils reprirent vie et ils régnèrent avec le Christ pendant mille ans. '
  '5':
  - type: note
    content: 'Voir v. 4n. –  première résurrection  : cf. Jn 5.21-25 ; Col 2.12 ; 3.1.'
  - type: text
    content: Les autres morts ne reprirent pas vie jusqu'à ce que les mille ans soient achevés.
  - type: text
    content: 'C''est la première résurrection. '
  '6':
  - type: note
    content: Heureux 1.3+. – Voir saint. –  seconde mort 2.11+. –  prêtres / régneront v. 4 ; 1.6+ ; cf. Rm 5.17.
  - type: text
    content: Heureux et saint qui a part à la première résurrection ! Sur ceux-là la seconde mort n'a pas de pouvoir, mais ils seront prêtres de Dieu et du Christ, et ils régneront avec lui pendant les mille ans.
  '7':
  - type: text
    content: ' '
  - type: note
    content: V. 3.
  - type: text
    content: 'Quand les mille ans seront achevés, le Satan sera relâché de sa prison, '
  '8':
  - type: note
    content: 'égarer 12.9+. –  quatre coins 7.1+. –  Gog / Magog  : cf. Ez 38–39. –  les rassembler… 16.14+. –  comme le sable…  : cf. Jos 11.4 ; Jg 7.12 ; 1S 13.5.'
  - type: text
    content: 'et il sortira pour égarer les nations qui sont aux quatre coins de la terre, Gog et Magog, afin de les rassembler pour la guerre. Leur nombre est comme le sable de la mer. '
  '9':
  - type: note
    content: 'sur toute la surface  : litt. sur la largeur  ; cf. Ha 1.6. –  investirent ou encerclèrent  : cf. 2R 6.14 ; Lc 19.43 ; 21.20. –  le camp  : cf. Nb 2. –  ville bien-aimée Jr 11.15n  ; 12.7 ; Ps 78.68 ; 87.2. –  un feu descendit 2R 1.10,12  ; Ez 38.22 ; 39.6.'
  - type: text
    content: 'Ils montèrent sur toute la surface de la terre et ils investirent le camp des saints et la ville bien-aimée. '
  - type: text
    content: Mais un feu descendit du ciel et les dévora
  - type: text
    content: '. '
