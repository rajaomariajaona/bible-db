  - type: text
    text: Les Galiléens massacrés par Pilate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dont Pilate '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (3.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avait mêlé le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qu''il avait fait abattre au moment où ils offraient leurs '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (à Jérusalem) ; on ne sait pas à quel événement précis ce texte fait allusion, mais les cas de répression violente étaient fréquents ; cf. Ac 5.37.
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, quelques personnes vinrent lui raconter ce qui était arrivé à des Galiléens dont Pilate avait mêlé le sang à celui de leurs sacrifices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jb 4.7 ; 8.4,20 ; 22.4s ; Jn 9.2s. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il leur répondit : Pensez-vous que ces Galiléens aient été de plus grands pécheurs que tous les autres Galiléens, parce qu''ils ont souffert de la sorte ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Non '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.60 ; 16.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'si vous ne '
      - type: usfm
        marker: w
        children:
        - type: text
          text: changez
      - type: text
        text: ' pas radicalement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'si vous ne vous repentez pas, si vous ne vous convertissez pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.3+ ; cf. Jr 12.17 ; Ps 7.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous disparaîtrez tous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous serez tous perdus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même v. 5 ; cf. 21.24.'
    marker-yv: yv-n
  - type: text
    text: 'Non, je vous le dis. Mais si vous ne changez pas radicalement, vous disparaîtrez tous de même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la tour de Siloam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sans doute une tour de la muraille de Jérusalem, au sud-est de la ville ; cf. Jn 9.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: coupables
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: débiteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 11.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ou encore, ces dix-huit sur qui est tombée la tour de Siloam et qu''elle a tués, pensez-vous qu''ils aient été plus coupables que tous les autres habitants de Jérusalem ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Non, je vous le dis. Mais si vous ne changez pas radicalement, vous disparaîtrez tous pareillement.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole du figuier stérile
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parabole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.36+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'figuier '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vigne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mi 4.4 ; cf. 7.1 ; Jr 8.13 ; 24.1ss ; Os 9.10,16s ; voir aussi Es 5.1ss ; Ps 80.9ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'n''en trouva pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.8s ; cf. Ha 3.17 ; Mc 11.12ss,20ss/ / ; voir aussi Lv 19.23ss.
    marker-yv: yv-n
  - type: text
    text: 'Il disait aussi cette parabole : Un homme avait un figuier planté dans sa vigne. Il vint y chercher du fruit et n''en trouva pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vigneron '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jardinier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Coupe-le donc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent seulement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: coupe-le
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: occuperait-il…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: épuiserait-il la terre.
    marker-yv: yv-n
  - type: text
    text: 'Alors il dit au vigneron : « Voilà trois ans que je viens chercher du fruit sur ce figuier, et je n''en trouve pas. Coupe-le donc : pourquoi occuperait-il la terre inutilement ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 2P 3.9,15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Seigneur.
    marker-yv: yv-n
  - type: text
    text: 'Le vigneron lui répondit : « Maître, laisse-le encore cette année, le temps que je creuse tout autour et que j''y mette du fumier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à l'avenir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'année prochaine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains mss intervertissent les termes, de sorte qu''on rattache cette précision à ce qui suit'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à l'avenir tu le couperas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Sur la fin du v. dans certains mss, voir 12.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Peut-être produira-t-il du fruit à l'avenir ; sinon, tu le couperas ! »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit une femme infirme le jour du sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.6ss ; 14.1ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'enseignait… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.15+,31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un jour de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sabbat
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il enseignait dans une des synagogues, un jour de sabbat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rendue infirme par un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui avait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Mc 3.22
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un esprit d''infirmité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de faiblesse, de maladie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; un ms occidental (voir introductions au N.T. et aux Actes des Apôtres) porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: infirme d'esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 16 ; 11.14 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Apocryphe de la Genèse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ') 20.16,26 : « Le Dieu Très-Haut lui envoya un esprit de châtiment pour le frapper… il chassera de toi cette plaie, ainsi que l''esprit de purulence. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: absolument pas se redresser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pas se redresser complètement.
    marker-yv: yv-n
  - type: text
    text: 'Or il y avait là une femme rendue infirme par un esprit depuis dix-huit ans ; elle était courbée et ne pouvait absolument pas se redresser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu es délivrée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu as été délivrée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; un verbe apparenté est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'détacher '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aux v. 15s.
    marker-yv: yv-n
  - type: text
    text: 'Quand il la vit, Jésus l''appela et lui dit : Femme, tu es délivrée de ton infirmité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lui imposa les mains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.40+ ; 5.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'A l''instant même '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.64+ ; 4.39. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle se redressa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle fut redressée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: glorifier
      - type: text
        text: ' Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.20+.
    marker-yv: yv-n
  - type: text
    text: Et il lui imposa les mains. A l'instant même elle se redressa et se mit à glorifier Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chef de la synagogue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.49. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'guérison pendant le sabbat '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.7,9 ; 14.4 ; Jn 5.16 ; 7.23 ; 9.14ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'six jours… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 20.9s ; Dt 5.13s.
    marker-yv: yv-n
  - type: text
    text: 'Mais le chef de la synagogue, indigné parce que Jésus avait réalisé cette guérison pendant le sabbat, disait à la foule : Il y a six jours pendant lesquels il faut travailler ; venez donc vous faire guérir ces jours-là, et non pas le jour du sabbat ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hypocrites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent le singulier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hypocrite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 12.56+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'son bœuf '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 14.5+) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ou son âne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 5.14 ; 22.4 ; Es 32.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mangeoire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le Seigneur lui répondit : Hypocrites, chacun de vous, pendant le sabbat, ne détache-t-il pas son bœuf ou son âne de la mangeoire pour le mener boire ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: fq
      children:
