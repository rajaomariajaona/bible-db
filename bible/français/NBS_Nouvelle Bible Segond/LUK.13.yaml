document_id: LUK.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Galiléens massacrés par Pilate
  - type: text
    content: ' '
  - type: note
    content: 'dont Pilate (3.1n) avait mêlé le sang…  : c.-à-d. qu''il avait fait abattre au moment où ils offraient leurs sacrifices (à Jérusalem) ; on ne sait pas à quel événement précis ce texte fait allusion, mais les cas de répression violente étaient fréquents ; cf. Ac 5.37.'
  - type: text
    content: 'En ce temps-là, quelques personnes vinrent lui raconter ce qui était arrivé à des Galiléens dont Pilate avait mêlé le sang à celui de leurs sacrifices. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 6.6ss ; 14.1ss. –  enseignait… 4.15+,31. –  un jour de sabbat 4.31n.
  - type: text
    content: 'Il enseignait dans une des synagogues, un jour de sabbat. '
  '11':
  - type: note
    content: 'rendue infirme par un esprit  : litt. qui avait (Mc 3.22n) un esprit d''infirmité ou de faiblesse, de maladie  ; un ms occidental (voir introductions au N.T. et aux Actes des Apôtres) porte infirme d''esprit  ; cf. v. 16 ; 11.14 ; Apocryphe de la Genèse (Qumrân) 20.16,26 : « Le Dieu Très-Haut lui envoya un esprit de châtiment pour le frapper… il chassera de toi cette plaie, ainsi que l''esprit de purulence. » –  absolument pas se redresser  : autre traduction pas se redresser complètement.'
  - type: text
    content: 'Or il y avait là une femme rendue infirme par un esprit depuis dix-huit ans ; elle était courbée et ne pouvait absolument pas se redresser. '
  '12':
  - type: note
    content: 'tu es délivrée ou tu as été délivrée  : cf. 5.20n  ; un verbe apparenté est traduit par détacher aux v. 15s.'
  - type: text
    content: 'Quand il la vit, Jésus l''appela et lui dit : Femme, tu es délivrée de ton infirmité. '
  '13':
  - type: note
    content: 'lui imposa les mains  : cf. 4.40+ ; 5.13. –  A l''instant même 1.64+ ; 4.39. –  elle se redressa  : litt. elle fut redressée. –  glorifier Dieu 2.20+.'
  - type: text
    content: Et il lui imposa les mains. A l'instant même elle se redressa et se mit à glorifier Dieu.
  '14':
  - type: text
    content: ' '
  - type: note
    content: chef de la synagogue 8.49. –  guérison pendant le sabbat 6.7,9 ; 14.4 ; Jn 5.16 ; 7.23 ; 9.14ss. –  six jours… Ex 20.9s ; Dt 5.13s.
  - type: text
    content: 'Mais le chef de la synagogue, indigné parce que Jésus avait réalisé cette guérison pendant le sabbat, disait à la foule : Il y a six jours pendant lesquels il faut travailler ; venez donc vous faire guérir ces jours-là, et non pas le jour du sabbat ! '
  '15':
  - type: note
    content: 'Le Seigneur 7.13+. –  Hypocrites  : certains mss portent le singulier hypocrite  ; cf. 12.56+. –  son bœuf (cf. 14.5+) ou son âne Dt 5.14 ; 22.4 ; Es 32.20. –  mangeoire 2.7n.'
  - type: text
    content: 'Le Seigneur lui répondit : Hypocrites, chacun de vous, pendant le sabbat, ne détache-t-il pas son bœuf ou son âne de la mangeoire pour le mener boire ? '
  '16':
  - type: note
    content: 'fille d''Abraham  : cf. 3.8+ ; 19.9 ; 4 Maccabées 15.28 qualifie de la même manière une femme qui a accepté le martyre de ses enfants par fidélité à la loi de Dieu. –  le Satan  : cf. v. 11 ; 10.18+ ; voir aussi 2Co 12.7 et démon, diable, Satan. –  tenait liée depuis dix-huit ans  : autre traduction a tenu liée dix-huit longues années. –  liée / détacher  : cf. v. 12n,15 ; 8.29 ; Mc 7.35 ; voir aussi Mt 18.18.'
  - type: text
    content: 'Et cette femme, qui est une fille d''Abraham et que le Satan tenait liée depuis dix-huit ans, il n''aurait pas fallu la détacher de ce lien le jour du sabbat ? '
  '17':
  - type: note
    content: 'honte  : cf. Es 45.16. –  toute la foule 6.19 ; Ac 21.27. –  glorieuses ou merveilleuses.'
  - type: text
    content: Tandis qu'il disait cela, tous ses adversaires étaient pris de honte, et toute la foule se réjouissait de toutes les choses glorieuses qu'il faisait.
  - type: heading
    content: La parabole de la graine de moutarde
  - type: heading
    content: Mt 13.31-32  ; Mc 4.30-32
  '18':
  - type: text
    content: ' '
  - type: note
    content: A quoi… v. 20 ; 6.47ss ; 7.31s ; 12.36. –  règne ou royaume 4.43+.
  - type: text
    content: 'Il disait donc : A quoi le règne de Dieu est-il semblable ? A quoi le comparerai-je ? '
  '19':
  - type: note
    content: graine de moutarde 17.6 ; Mt 13.31n. –  et les oiseaux du ciel… 8.5+ ; cf. Ez 17.23 ; 31.6 ; Ps 104.12  ; Dn 4.9,18 ; Ac 10.12.
  - type: text
    content: 'Voici à quoi il est semblable : une graine de moutarde qu''un homme a prise et jetée dans son jardin ; elle pousse, elle devient un arbre, et '
  - type: text
    content: les oiseaux du ciel habitent dans ses branches
  - type: text
    content: .
  - type: heading
    content: La parabole du levain
  - type: heading
    content: Mt 13.33
  '2':
  - type: note
    content: Cf. Jb 4.7 ; 8.4,20 ; 22.4s ; Jn 9.2s. – Voir péché.
  - type: text
    content: 'Il leur répondit : Pensez-vous que ces Galiléens aient été de plus grands pécheurs que tous les autres Galiléens, parce qu''ils ont souffert de la sorte ? '
  '20':
  - type: text
    content: ' '
  - type: note
    content: V. 18+.
  - type: text
    content: 'Il dit encore : A quoi comparerai-je le règne de Dieu ? '
  '21':
  - type: note
    content: 'levain 12.1 ; 1Co 5.6s ; voir Mt 13.33n. –  séa  : voir mesures.'
  - type: text
    content: 'Voici à quoi il est semblable : du levain qu''une femme a pris et introduit dans trois '
  - type: text
    content: séas
  - type: text
    content: ' de farine, jusqu''à ce que tout ait levé.'
  - type: heading
    content: La porte étroite
  '22':
  - type: text
    content: ' '
  - type: note
    content: Il traversait… 8.1 ; cf. 18.36s. –  enseignait 4.15,31. –  vers Jérusalem 9.51+.
  - type: text
    content: Il traversait les villes et les villages, et il enseignait en faisant route vers Jérusalem.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Quelqu'un 9.57. –  Seigneur 5.12 ; certains mss portent Seigneur, Seigneur , cf. Mt 7.22. –  n'y aura-t-il… ou n'y a-t-il que peu de gens dans la voie du salut (litt. en train d'être sauvés ) ; même formule 1Co 1.18n  ; voir Mt 7.14n  ; Lc 13.3,5.
  - type: text
    content: 'Quelqu''un lui dit : Seigneur, n''y aura-t-il que peu de gens sauvés ? Il leur répondit : '
  '24':
  - type: note
    content: 'Cf. 18.25 ; Mt 7.13s. –  Efforcez-vous  : le verbe est apparenté au mot traduit par combat 1Tm 6.12 ; cf. Lc 16.16. –  porte  : dans les meilleurs mss le terme grec est différent de celui qui apparaît en Mt 7.13, lequel évoque plutôt un portail.'
  - type: text
    content: 'Efforcez-vous d''entrer par la porte étroite. Car, je vous le dis, beaucoup chercheront à entrer et ne le pourront pas. '
  '25':
  - type: note
    content: 'Mt 25.11s. –  Dès que…  : cette phrase pourrait aussi se lire comme la suite du v. 24 (avec une virgule au lieu d''un point). –  se sera levé  : sur le verbe, voir 7.14n. –  je ne sais pas…  : cf. 3.8 ; Jn 8.33-41.'
  - type: text
    content: 'Dès que le maître de maison se sera levé et aura fermé la porte, et que, restés dehors, vous commencerez à frapper à la porte et à dire : « Seigneur, ouvre-nous ! », il vous répondra : « Vous, je ne sais pas d''où vous êtes. » '
  '26':
  - type: text
    content: 'Alors vous commencerez à dire : « Nous avons mangé et bu devant toi, et tu as enseigné dans nos grandes rues ! » '
  '27':
  - type: note
    content: 'Mt 7.23. –  il vous répondra  : certains mss portent il répondra : Je vous le dis, je ne sais pas… –  Vous  : certains mss omettent ici le terme correspondant, cf. v. 25. –  éloignez-vous… Ps 6.9. –  qui commettez…  : litt. ouvriers (même terme 10.2,7) d''injustice  ; cf. 16.8 ; 18.6 ; Ac 1.18 ; 8.23.'
  - type: text
    content: 'Et il vous répondra : « Vous, je ne sais pas d''où vous êtes ; '
  - type: text
    content: éloignez-vous de moi, vous tous qui commettez l'injustice !
  - type: text
    content: '  » '
  '28':
  - type: note
    content: 'Mt 8.11s. –  des pleurs et des grincements de dents Mt 8.12+. –  Abraham (16.22), Isaac, Jacob Ac 3.13 ; 7.32 ; cf. Dt 1.8 ; 6.10 ; 9.5,27 ; 1R 18.36 ; 2R 13.23. –  tous les prophètes 11.50 ; 24.27 ; Ac 3.18,24 ; 10.43. –  chassés dehors  : cf. Ap 11.2n.'
  - type: text
    content: 'C''est là qu''il y aura des pleurs et des grincements de dents, quand vous verrez Abraham, Isaac, Jacob et tous les prophètes dans le royaume de Dieu, et que vous serez chassés dehors. '
  '29':
  - type: note
    content: 'de l''est et de l''ouest (ou de l''Orient et de l''Occident) …  : cf. Es 43.5s ; 49.12 ; 59.19 ; Ml 1.11 ; Ps 107.3 ; Ap 21.13 ; voir aussi Es 2.2ss ; 60 ; 66.18ss. –  s''installer à table…  : verbe apparenté 7.36n  ; cf. 12.37 ; 14.15ss ; 22.16,29s ; Es 25.6ss ; 55.1s ; 65.13s ; Ap 3.20 ; 19.9 ; 1 Hénoch 62.14 : « Le Seigneur des Esprits demeurera sur eux, et c''est en compagnie de ce Fils d''homme (cf. Dn 7.9ss) qu''ils mangeront, se coucheront et se lèveront, pour toujours. »'
  - type: text
    content: 'On viendra de l''est et de l''ouest, du nord et du sud pour s''installer à table dans le royaume de Dieu. '
  '3':
  - type: note
    content: Non 1.60 ; 16.30. –  si vous ne changez pas radicalement ou si vous ne vous repentez pas, si vous ne vous convertissez pas 3.3+ ; cf. Jr 12.17 ; Ps 7.13. –  vous disparaîtrez tous ou vous serez tous perdus, de même v. 5 ; cf. 21.24.
  - type: text
    content: 'Non, je vous le dis. Mais si vous ne changez pas radicalement, vous disparaîtrez tous de même. '
  '30':
  - type: note
    content: Mc 10.31/ /.
  - type: text
    content: Ainsi, il y a des derniers qui seront premiers et des premiers qui seront derniers.
  - type: heading
    content: Jésus et Jérusalem
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'A ce moment même  : litt. en cette heure  ; certains mss portent ce jour-là . –  pharisiens 5.17+ ; 12.1 ; sont-ils ici des envoyés d''Hérode cherchant à manœuvrer Jésus (cf. v. 32) ou souhaitent-ils réellement protéger ce dernier contre un danger qui le menace (cf. 7.36 ; 11.37 ; 14.1) ? –  Hérode Antipas, 3.1n  ; cf. Mc 6.19s.'
  - type: text
    content: 'A ce moment même, quelques pharisiens vinrent lui dire : Va-t''en, pars d''ici, car Hérode veut te tuer. '
  '32':
  - type: note
    content: 'ce renard  : cf. Ez 13.4 ; dans le monde grec ce qualificatif évoquait la ruse, à peu près comme en français ; certains, s''appuyant sur des parallèles dans la littérature juive postérieure, pensent que l''image suggère un personnage agressif mais peu dangereux (par opposition au lion). –  Je chasse des démons… 4.33ss. –  aujourd''hui et demain…  : cf. Ex 19.10s. –  le troisième jour  : cf. 9.22. –  j''en aurai fini  : autre traduction tout sera (litt. est) accompli pour moi  ; cf. 9.31,51 ; même verbe 2.43 (achever) ; Ac 20.24 (mener à bonne fin) ; voir aussi Hé 2.10n.'
  - type: text
    content: 'Il leur dit : Allez dire à ce renard : Je chasse des démons et j''accomplis des guérisons aujourd''hui et demain ; le troisième jour, j''en aurai fini. '
  '33':
  - type: note
    content: 'Cf. 22.53 ; Jn 7.30 ; 8.20. –  il n''est pas possible  : d''autres comprennent il ne convient pas  ; cf. 22.22. –  qu''on fasse périr (ou disparaître, 11.51n) un prophète… (4.24+ ; 6.23) : autre traduction qu''un prophète périsse…  ; cf. v. 34 ; 9.22+,51 ; 11.51 ; comparer avec 1R 18.4,13 ; 19.10,14 ; 2R 21.16 ; 24.4 ; Jr 26.20ss ; 38.4ss ; Am 7.10ss ; 2Ch 24.20ss.'
  - type: text
    content: Mais il faut que je poursuive ma route aujourd'hui, demain et le jour suivant ; car il n'est pas possible qu'on fasse périr un prophète hors de Jérusalem.
  - type: heading
    content: Mt 23.37-39
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'V. 33+ ; 11.49ss ; 19.41ss ; 20.9ss ; Mt 23.37n. –  qui lapides Ac 7.58. –  pas voulu  : cf. 5.39.'
  - type: text
    content: 'Jérusalem, Jérusalem, toi qui tues les prophètes et qui lapides ceux qui te sont envoyés, combien de fois j''ai voulu rassembler tes enfants comme une poule rassemble sa couvée sous ses ailes ! Mais vous ne l''avez pas voulu. '
  '35':
  - type: note
    content: 'votre maison (c.-à-d. le temple) vous est abandonnée (ou laissée) Jr 12.7 ; 22.5 ; Lc 21.6 ; au lieu de vous est abandonnée, certains comprennent est abandonnée pour votre malheur ou par votre faute  ; certains mss ajoutent le mot déserte, cf. Mt 23.38n. –  plus  : autre traduction plus jamais. –  jusqu''à…  : litt. jusqu''à ce qu''il vienne quand vous direz  ; certains mss portent jusqu''à ce que vous disiez, comme en Mt 23.39 ; cf. Lc 21.24 ; Rm 11.25ss. –  Béni soit celui qui vient (7.19n) au nom du Seigneur 19.38 ; Ps 118.26.'
  - type: text
    content: 'Eh bien, votre maison vous est abandonnée. Je vous le dis, vous ne me verrez plus jusqu''à ce que vienne le moment où vous direz :'
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur !
  '4':
  - type: note
    content: 'la tour de Siloam  : sans doute une tour de la muraille de Jérusalem, au sud-est de la ville ; cf. Jn 9.7n,11. –  coupables  : litt. débiteurs  ; cf. 11.4n.'
  - type: text
    content: 'Ou encore, ces dix-huit sur qui est tombée la tour de Siloam et qu''elle a tués, pensez-vous qu''ils aient été plus coupables que tous les autres habitants de Jérusalem ? '
  '5':
  - type: note
    content: V. 3n.
  - type: text
    content: Non, je vous le dis. Mais si vous ne changez pas radicalement, vous disparaîtrez tous pareillement.
  - type: heading
    content: La parabole du figuier stérile
  '6':
  - type: text
    content: ' '
  - type: note
    content: parabole 5.36+. –  figuier vigne Mi 4.4 ; cf. 7.1 ; Jr 8.13 ; 24.1ss ; Os 9.10,16s ; voir aussi Es 5.1ss ; Ps 80.9ss. –  n'en trouva pas 3.8s ; cf. Ha 3.17 ; Mc 11.12ss,20ss/ / ; voir aussi Lv 19.23ss.
  - type: text
    content: 'Il disait aussi cette parabole : Un homme avait un figuier planté dans sa vigne. Il vint y chercher du fruit et n''en trouva pas. '
  '7':
  - type: note
    content: 'vigneron ou jardinier. –  Coupe-le donc  : certains mss portent seulement coupe-le. –  occuperait-il…  : autre traduction épuiserait-il la terre.'
  - type: text
    content: 'Alors il dit au vigneron : « Voilà trois ans que je viens chercher du fruit sur ce figuier, et je n''en trouve pas. Coupe-le donc : pourquoi occuperait-il la terre inutilement ? » '
  '8':
  - type: note
    content: Cf. 2P 3.9,15. –  Maître ou Seigneur.
  - type: text
    content: 'Le vigneron lui répondit : « Maître, laisse-le encore cette année, le temps que je creuse tout autour et que j''y mette du fumier. '
  '9':
  - type: note
    content: 'à l''avenir  : autre traduction l''année prochaine  ; certains mss intervertissent les termes, de sorte qu''on rattache cette précision à ce qui suit  : à l''avenir tu le couperas. Sur la fin du v. dans certains mss, voir 12.21n.'
  - type: text
    content: Peut-être produira-t-il du fruit à l'avenir ; sinon, tu le couperas ! »
  - type: heading
    content: Jésus guérit une femme infirme le jour du sabbat
