        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Pour les Hébronites – Yeriya était le chef des Hébronites, selon sa généalogie, selon sa famille – on fit, la quarantième année du règne de David, des recherches, et on trouva parmi eux de vaillants guerriers à Yazer de Galaad. '
  - type: usfm
    marker: vlbl
