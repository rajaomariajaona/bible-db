document_id: 1CH.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les classes de portiers
  - type: text
    content: ' '
  - type: note
    content: 'portiers  : cf. 9.17-27. –  Meshélémia  : hébreu Meshélémyahou . –  Asaph  : certains lisent ici Ebiasaph , comme en 9.19.'
  - type: text
    content: 'Classes des portiers :'
  - type: text
    content: 'Pour les Coréites : Meshélémia, fils de Coré, d''entre les fils d''Asaph. '
  '10':
  - type: text
    content: 'Hosa, des fils de Merari, eut des fils : Shimri, le chef, nommé chef par son père, quoiqu''il ne fût pas le premier-né ; '
  '11':
  - type: note
    content: 'Hilqiya / Tebalia / Zacharie  : hébreu Hilqiyahou / Tebalyahou / Zekaryahou.'
  - type: text
    content: Hilqiya, le deuxième ; Tebalia, le troisième ; Zacharie, le quatrième. Tous les fils et les frères de Hosa étaient treize.
  '12':
  - type: text
    content: 'Ces classes de portiers, les chefs comme leurs frères, étaient en poste pour officier dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: note
    content: 'Ils tirèrent au sort  : cf. 6.39n  ; 24.31n.'
  - type: text
    content: Ils tirèrent au sort pour chaque porte, petits et grands, famille par famille.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Shélémia  : cf. v. 1n,9 Meshélémia.'
  - type: text
    content: 'Le sort tomba sur Shélémia pour le côté est. On tira au sort pour Zacharie, son fils, qui était un conseiller de bon sens, et le côté nord lui échut par le sort ; '
  '15':
  - type: text
    content: 'à Obed-Edom, le côté sud ; à ses fils, la maison des magasins ; '
  '16':
  - type: note
    content: 'La porte Shalléketh, mentionnée nulle part ailleurs, n''est pas identifiée ; LXX parle de la porte de la salle. –  chaque groupe (ou garde, corps de garde)… : autres traductions groupe par groupe ; chaque groupe alternant avec un autre  ; même expression hébraïque en Né 12.24.'
  - type: text
    content: 'à Shouppim et Hosa, le côté ouest avec la porte Shalléketh, qui donnait sur la route montante : chaque groupe faisait face à l''autre. '
  '17':
  - type: note
    content: Voir lévite.
  - type: text
    content: 'Il y avait à l''est six lévites, au nord quatre par jour, au sud quatre par jour, et quatre aux magasins à deux places différentes ; '
  '18':
  - type: note
    content: 'annexe  : le sens du mot hébreu correspondant est très incertain ; on a aussi pensé à une cour.'
  - type: text
    content: 'du côté de l''annexe, à l''ouest, quatre vers la route, deux vers l''annexe. '
  '19':
  - type: text
    content: Ce sont là les classes des portiers, pour les fils des Coréites et pour les fils de Merari.
  - type: heading
    content: Tâches spéciales confiées à certains lévites
  '2':
  - type: note
    content: 'Zebadia  : hébreu Zevadyahou.'
  - type: text
    content: 'Meshélémia eut des fils : Zacharie, le premier-né ; Yediaël, le deuxième ; Zebadia, le troisième ; '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'L''un des lévites, Ahiya  : texte hébreu peu clair ; LXX et les lévites, leurs frères . –  trésors sacrés  : cf. v. 26s ; voir saint.'
  - type: text
    content: 'L''un des lévites, Ahiya, était intendant des trésors de la maison de Dieu et des trésors sacrés. '
  '21':
  - type: note
    content: 'les Guershonites  : litt. les fils des Guershonites. –  les Yehiélites  : autre traduction Yehiéli (cf. v. 22) ; il s''agit probablement du personnage appelé Yehiel en 23.8 et 29.8.'
  - type: text
    content: 'Quant aux fils de Ladân, les Guershonites issus de Ladân, les chefs des familles de Ladân le Guershonite, les Yehiélites, '
  '22':
  - type: text
    content: 'les fils de Yehiéli, Zétam et Joël, son frère, étaient intendants des trésors de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Pour les Amramites, les Yitseharites, les Hébronites et les Ouzziélites, '
  '24':
  - type: note
    content: Voir 23.15-18.
  - type: text
    content: 'Shebouel, fils de Guershom, fils de Moïse, était l''intendant chef des trésors. '
  '25':
  - type: note
    content: 'issus d''Eliézer  : litt. pour Eliézer ou appartenant à Eliézer. –  Rehabia  : hébreu Rehavyahou. –  son fils  : c.-à-d. fils d''Eliézer.'
  - type: text
    content: 'Ses frères issus d''Eliézer : Rehabia, son fils ; Esaïe, son fils ; Joram, son fils ; Zikri, son fils ; Shelomith, son fils. '
  '26':
  - type: text
    content: 'Ce Shelomith et ses frères étaient intendants de tous les trésors sacrés, des choses qu''avaient consacrées le roi David, les chefs de famille, les chefs de mille et de cent, les chefs de l''armée : '
  '27':
  - type: note
    content: 'sur le butin pris à la guerre  : litt. sur les guerres et sur le butin.'
  - type: text
    content: 'c''était sur le butin pris à la guerre qu''ils les avaient consacrées pour l''entretien de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '28':
  - type: note
    content: 'Samuel…  : les Chroniques remontent jusqu''aux origines de la royauté en Israël. –  tous ceux qui avaient consacré quelque chose  : litt. quiconque consacrait  ; certains modifient le texte hébreu traditionnel pour lire tout ce qui était consacré.'
  - type: text
    content: Tout ce qu'avaient consacré Samuel, le voyant, Saül, fils de Qish, Abner, fils de Ner, Joab, fils de Tserouya, et tous ceux qui avaient consacré quelque chose, tout cela était sous la responsabilité de Shelomith et de ses frères.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'civiles  : litt. extérieures  ; le terme est à comprendre, non au sens d''affaires étrangères (cf. en Israël ), mais comme désignant des affaires extérieures au domaine spécifiquement religieux dont il a été question en 22.2–26.28, et peut-être distinctes aussi des affaires militaires évoquées au chap. 27 ; cf. Né 11.16. –  secrétaires (c.-à-d. greffiers ) et juges  : cf. 23.4+.'
  - type: text
    content: 'Pour les Yitseharites, Kenania et ses fils étaient préposés aux affaires civiles en Israël, comme secrétaires et juges. '
  '3':
  - type: text
    content: 'Yatniel, le quatrième ; Elam, le cinquième ; Yohanân, le sixième ; Eliehoénaï, le septième. '
  '30':
  - type: note
    content: au-delà du Jourdain, à l'ouest peut désigner la partie occidentale de la Transjordanie, ou plus probablement la région située à l'ouest du Jourdain ; cf. Jos 5.1n.
  - type: text
    content: 'Pour les Hébronites, Hashabia et ses frères, de vaillants hommes, au nombre de 1 700, avaient la surveillance d''Israël, au-delà du Jourdain, à l''ouest, pour toute l''œuvre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et pour le service du roi. '
  '31':
  - type: note
    content: 'Yeriya était le chef…  : traduction incertaine ; on pourrait aussi comprendre  : Yeriya était le chef. On fit, la quarantième année du règne de David, des recherches concernant la généalogie des Hébronites, selon leurs familles. –  quarantième année  : cf. 29.27. –  Yazer  : cf. Jos 13.25 ; 2S 24.5n.'
  - type: text
    content: 'Pour les Hébronites – Yeriya était le chef des Hébronites, selon sa généalogie, selon sa famille – on fit, la quarantième année du règne de David, des recherches, et on trouva parmi eux de vaillants guerriers à Yazer de Galaad. '
  '32':
  - type: note
    content: 'Rubénites…  : membres des deux tribus et demie installées en Transjordanie. Cf. Nb 32.'
  - type: text
    content: Ses frères, de vaillants hommes, étaient au nombre de 2 700 chefs de famille. Le roi David les nomma à la tête des Rubénites, des Gadites et de la demi-tribu des Manassites pour toutes les affaires de Dieu et pour les affaires du roi.
  '4':
  - type: note
    content: 'Obed-Edom  : cf. 13.13s ; 15.18,24 ; 2S 6.10-12.'
  - type: text
    content: 'Obed-Edom eut des fils : Shemaya, le premier-né ; Yehozabad, le deuxième ; Yoah, le troisième ; Sakar, le quatrième ; Netanéel, le cinquième ; '
  '5':
  - type: note
    content: 'l''avait béni  : cf. 13.14.'
  - type: text
    content: 'Ammiel, le sixième ; Issacar, le septième ; Péoultaï, le huitième ; car Dieu l''avait béni. '
  '6':
  - type: text
    content: 'De Shemaya, son fils, naquirent des fils qui exercèrent l''autorité dans leur famille : c''étaient de vaillants guerriers ; '
  '7':
  - type: note
    content: 'Semakia  : hébreu Semakyahou.'
  - type: text
    content: 'fils de Shemaya : Otni, Rephaël, Obed, Elzabad et ses frères, de vaillants hommes, Elihou et Semakia. '
  '8':
  - type: text
    content: Tous ceux-là sont des fils d'Obed-Edom ; eux, leurs fils et leurs frères, étaient des hommes vaillants, pleins de force pour le service, soixante-deux d'Obed-Edom.
  '9':
  - type: text
    content: 'Meshélémia eut des fils et des frères, de vaillants hommes ; ils étaient dix-huit. '
