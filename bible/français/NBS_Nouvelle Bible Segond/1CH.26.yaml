    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains lisent ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ebiasaph
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 9.19.'
    marker-yv: yv-n
  - type: text
    text: 'Classes des portiers :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Pour les Coréites : Meshélémia, fils de Coré, d''entre les fils d''Asaph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Zebadia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zevadyahou.
    marker-yv: yv-n
  - type: text
    text: 'Meshélémia eut des fils : Zacharie, le premier-né ; Yediaël, le deuxième ; Zebadia, le troisième ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Yatniel, le quatrième ; Elam, le cinquième ; Yohanân, le sixième ; Eliehoénaï, le septième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Obed-Edom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 13.13s ; 15.18,24 ; 2S 6.10-12.'
    marker-yv: yv-n
  - type: text
    text: 'Obed-Edom eut des fils : Shemaya, le premier-né ; Yehozabad, le deuxième ; Yoah, le troisième ; Sakar, le quatrième ; Netanéel, le cinquième ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''avait '
      - type: usfm
        marker: w
        children:
        - type: text
          text: béni
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 13.14.'
    marker-yv: yv-n
  - type: text
    text: 'Ammiel, le sixième ; Issacar, le septième ; Péoultaï, le huitième ; car Dieu l''avait béni. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'De Shemaya, son fils, naquirent des fils qui exercèrent l''autorité dans leur famille : c''étaient de vaillants guerriers ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Semakia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Semakyahou.
    marker-yv: yv-n
  - type: text
    text: 'fils de Shemaya : Otni, Rephaël, Obed, Elzabad et ses frères, de vaillants hommes, Elihou et Semakia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tous ceux-là sont des fils d'Obed-Edom ; eux, leurs fils et leurs frères, étaient des hommes vaillants, pleins de force pour le service, soixante-deux d'Obed-Edom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Meshélémia eut des fils et des frères, de vaillants hommes ; ils étaient dix-huit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hosa, des fils de Merari, eut des fils : Shimri, le chef, nommé chef par son père, quoiqu''il ne fût pas le premier-né ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hilqiya '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tebalia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Zacharie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hilqiyahou / Tebalyahou / Zekaryahou.
    marker-yv: yv-n
  - type: text
    text: Hilqiya, le deuxième ; Tebalia, le troisième ; Zacharie, le quatrième. Tous les fils et les frères de Hosa étaient treize.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ces classes de portiers, les chefs comme leurs frères, étaient en poste pour officier dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils tirèrent au sort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.39'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 24.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Ils tirèrent au sort pour chaque porte, petits et grands, famille par famille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shélémia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',9 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Meshélémia.
    marker-yv: yv-n
  - type: text
    text: 'Le sort tomba sur Shélémia pour le côté est. On tira au sort pour Zacharie, son fils, qui était un conseiller de bon sens, et le côté nord lui échut par le sort ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'à Obed-Edom, le côté sud ; à ses fils, la maison des magasins ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: porte Shalléketh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mentionnée nulle part ailleurs, n''est pas identifiée ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' parle de la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: porte de la salle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chaque groupe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: garde, corps de garde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ')… : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: groupe par groupe ; chaque groupe alternant avec un autre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même expression hébraïque en Né 12.24.'
    marker-yv: yv-n
  - type: text
    text: 'à Shouppim et Hosa, le côté ouest avec la porte Shalléketh, qui donnait sur la route montante : chaque groupe faisait face à l''autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévite
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il y avait à l''est six lévites, au nord quatre par jour, au sud quatre par jour, et quatre aux magasins à deux places différentes ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: annexe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le sens du mot hébreu correspondant est très incertain ; on a aussi pensé à une '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cour.
    marker-yv: yv-n
  - type: text
    text: 'du côté de l''annexe, à l''ouest, quatre vers la route, deux vers l''annexe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce sont là les classes des portiers, pour les fils des Coréites et pour les fils de Merari.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tâches spéciales confiées à certains lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''un des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
      - type: text
        text: ', Ahiya'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : texte hébreu peu clair ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et les lévites, leurs frères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trésors sacrés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 26s ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'L''un des lévites, Ahiya, était intendant des trésors de la maison de Dieu et des trésors sacrés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Guershonites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' des Guershonites'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Yehiélites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yehiéli '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 22) ; il s''agit probablement du personnage appelé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yehiel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 23.8 et 29.8.
    marker-yv: yv-n
  - type: text
    text: 'Quant aux fils de Ladân, les Guershonites issus de Ladân, les chefs des familles de Ladân le Guershonite, les Yehiélites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'les fils de Yehiéli, Zétam et Joël, son frère, étaient intendants des trésors de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pour les Amramites, les Yitseharites, les Hébronites et les Ouzziélites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 23.15-18.
    marker-yv: yv-n
  - type: text
    text: 'Shebouel, fils de Guershom, fils de Moïse, était l''intendant chef des trésors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: issus d'Eliézer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour Eliézer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: appartenant à Eliézer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rehabia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rehavyahou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fils d'Eliézer.
    marker-yv: yv-n
  - type: text
    text: 'Ses frères issus d''Eliézer : Rehabia, son fils ; Esaïe, son fils ; Joram, son fils ; Zikri, son fils ; Shelomith, son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ce Shelomith et ses frères étaient intendants de tous les trésors sacrés, des choses qu''avaient consacrées le roi David, les chefs de famille, les chefs de mille et de cent, les chefs de l''armée : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur le butin pris à la guerre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur les guerres et sur le butin.
    marker-yv: yv-n
  - type: text
    text: 'c''était sur le butin pris à la guerre qu''ils les avaient consacrées pour l''entretien de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Samuel…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les Chroniques remontent jusqu''aux origines de la royauté en Israël. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tous ceux qui avaient consacré quelque chose
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quiconque consacrait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout ce qui était consacré.
    marker-yv: yv-n
  - type: text
    text: Tout ce qu'avaient consacré Samuel, le voyant, Saül, fils de Qish, Abner, fils de Ner, Joab, fils de Tserouya, et tous ceux qui avaient consacré quelque chose, tout cela était sous la responsabilité de Shelomith et de ses frères.
