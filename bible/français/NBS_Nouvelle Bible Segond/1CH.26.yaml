    marker-yv: yv-n
  - type: text
    text: 'Pour les Hébronites, Hashabia et ses frères, de vaillants hommes, au nombre de 1 700, avaient la surveillance d''Israël, au-delà du Jourdain, à l''ouest, pour toute l''œuvre du '
  - type: usfm
    marker: nd
    children:
    - type: text
