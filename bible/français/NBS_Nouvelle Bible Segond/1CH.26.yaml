        text: '26.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rubénites…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : membres des deux tribus et demie installées en Transjordanie. Cf. Nb 32.'
    marker-yv: yv-n
  - type: text
    text: Ses frères, de vaillants hommes, étaient au nombre de 2 700 chefs de famille. Le roi David les nomma à la tête des Rubénites, des Gadites et de la demi-tribu des Manassites pour toutes les affaires de Dieu et pour les affaires du roi.
