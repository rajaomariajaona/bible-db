      - type: text
        text: 'soyez bien d''accord '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rm 12.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 15.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Ep 4.2s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vivez en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hé 12.14+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et le Dieu de l'amour et de la paix…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Rm 15.33+.'
    marker-yv: yv-n
  - type: text
    text: 'Au reste, mes frères, réjouissez-vous, tendez à l''épanouissement, encouragez-vous, soyez bien d''accord, vivez en paix, et le Dieu de l''amour et de la paix sera avec vous. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rm 16.16+.
    marker-yv: yv-n
  - type: text
    text: Saluez-vous les uns les autres par un saint baiser. Tous les saints vous saluent.
