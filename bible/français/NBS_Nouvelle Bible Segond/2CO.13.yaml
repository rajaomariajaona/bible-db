document_id: 2CO.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Derniers avertissements et salutations
  - type: text
    content: ' '
  - type: note
    content: 'la troisième fois 12.14+. –  Toute affaire… Dt 19.15  ; cf. Mt 18.16+. –  la parole  : litt. la bouche.'
  - type: text
    content: 'C''est la troisième fois que je viens vous voir. '
  - type: text
    content: Toute affaire se réglera sur la parole de deux ou de trois témoins
  - type: text
    content: '. '
  '10':
  - type: note
    content: 'Cf. 2.3 ; 10.11+. –  pour construire (ou édifier) et non pour démolir  : voir 10.4n,8+.'
  - type: text
    content: C'est pourquoi, absent, j'écris cela ; afin que je n'aie pas, une fois présent, à user de sévérité selon l'autorité que le Seigneur m'a donnée pour construire et non pour démolir.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'réjouissez-vous  : cf. Ph 3.1+ ; 4.4. –  tendez à l''épanouissement ou rétablissez-vous v. 9n. –  encouragez-vous  : autres traductions consolez-vous, exhortez-vous  ; cf. 1.3n. –  soyez bien d''accord Rm 12.16n  ; 15.5n  ; cf. Ep 4.2s. –  vivez en paix Hé 12.14+. –  et le Dieu de l''amour et de la paix…  : cf. Rm 15.33+.'
  - type: text
    content: 'Au reste, mes frères, réjouissez-vous, tendez à l''épanouissement, encouragez-vous, soyez bien d''accord, vivez en paix, et le Dieu de l''amour et de la paix sera avec vous. '
  '12':
  - type: note
    content: Rm 16.16+.
  - type: text
    content: Saluez-vous les uns les autres par un saint baiser. Tous les saints vous saluent.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Jésus-Christ / Dieu / Esprit saint  : cf. Mt 28.19+. –  communion (ou solidarité , 8.4n) de l''Esprit saint Ph 2.1. – Certains mss portent, avec diverses variantes, l''indication suivante  : Aux Corinthiens, 2e, écrite de Philippes de Macédoine, par l''entremise de Tite et de Luc.'
  - type: text
    content: Que la grâce du Seigneur Jésus-Christ, l'amour de Dieu et la communion de l'Esprit saint soient avec vous tous !
  '2':
  - type: note
    content: '12.20+s. –  je le dis encore d''avance  : autre traduction je préviens encore  ; cf. Ga 5.21. –  ceux qui ont péché 12.21. –  je ne ménagerai personne 1.23n.'
  - type: text
    content: 'Lorsque j''étais présent pour la deuxième fois, je l''ai déjà dit, et, aujourd''hui que je suis absent, je le dis encore d''avance à ceux qui ont péché précédemment, comme à tous les autres : si je reviens vous voir, je ne ménagerai personne, '
  '3':
  - type: note
    content: 'Rm 15.18+. –  une preuve  : termes apparentés pour examiner, examen… aux v. 5ss ; cf. 2.9n. –  en moi ou par moi. –  parmi vous ou en vous, cf. v. 5.'
  - type: text
    content: 'puisque vous cherchez une preuve que le Christ parle en moi, lui qui n''est pas faible à votre égard, mais qui est puissant parmi vous. '
  '4':
  - type: note
    content: 'Cf. 12.9s ; Rm 6.8-11 ; Ph 2.7s. –  dans la faiblesse  : litt. en vertu de (ou à cause de) la faiblesse  ; le grec utilise la même préposition dans l''expression traduite en vertu de la puissance  ; cf. 1Co 1.17-31. –  avec lui 1Th 4.17+.'
  - type: text
    content: Car il a été crucifié dans la faiblesse, mais il vit en vertu de la puissance de Dieu ; nous aussi, nous sommes faibles en lui, mais nous vivrons avec lui, pour vous, en vertu de la puissance de Dieu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'à l''épreuve  : cf. Mt 4.1n  ; 1Co 10.13n. –  Jésus-Christ est en vous v. 3n  ; Rm 8.10+. –  que l''examen…  : litt. que vous ne soyez réprouvés ou désapprouvés , adjectif formé sur le verbe traduit ici par examinez-vous  ; de même aux v. 6-7n  ; un terme apparenté est traduit par preuve au v. 3 ; cf. 2.9n  ; Rm 1.28n  ; voir aussi 1Co 11.28 et Ga 6.4.'
  - type: text
    content: 'Mettez-vous vous-mêmes à l''épreuve, pour voir si vous êtes dans la foi ; examinez-vous vous-mêmes. Ne reconnaissez-vous pas que Jésus-Christ est en vous ? A moins, peut-être, que l''examen ne soit un échec en ce qui vous concerne. '
  '6':
  - type: text
    content: 'J''espère en tout cas que vous reconnaîtrez que l''examen n''est pas un échec en ce qui nous concerne. '
  '7':
  - type: note
    content: 'que l''examen paraisse un succès…  : litt. que nous paraissions approuvés (cf. 10.18) ; le texte joue sur les termes apparentés comme au v. 5ns. –  même si… v. 5n  ; sans doute faut-il comprendre même si, du fait de votre bonne conduite, nos menaces n''ont plus à être mises à exécution et risquent à nouveau de passer pour des paroles en l''air (cf. 1.17ss).'
  - type: text
    content: 'Cependant nous souhaitons, devant Dieu, que vous ne fassiez rien de mal ; non pas pour que l''examen paraisse un succès en ce qui nous concerne, mais pour que, vous, vous fassiez le bien, même si l''examen semblait être un échec en ce qui nous concerne. '
  '8':
  - type: note
    content: Cf. Ac 4.20 ; 1Co 13.6.
  - type: text
    content: 'Car nous n''avons pas de puissance contre la vérité ; nous n''en avons que pour la vérité. '
  '9':
  - type: note
    content: 'faibles 10.10 ; 11.30+. –  vous êtes forts  : cf. 1.4n. –  épanouissement ou perfectionnement, voire rétablissement  ; verbe apparenté v. 11. Le même verbe est traduit par être bien unis en 1Co 1.10, par aider à se rétablir en Ga 6.1, par suppléer en 1Th 3.10 ; un terme apparenté est rendu par former en Ep 4.12 (voir aussi Rm 9.22 ; Hé 10.5 ; 11.3 ; 13.21 ; 1P 5.10).'
  - type: text
    content: 'Nous nous réjouissons lorsque, nous, nous sommes faibles, tandis que vous, vous êtes forts : ce que nous souhaitons, c''est votre épanouissement. '
