      marker: fq
      children:
      - type: text
        text: que l'examen…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que vous ne soyez réprouvés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: désapprouvés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', adjectif formé sur le verbe traduit ici par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: examinez-vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; de même aux v. 6-7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; un terme apparenté est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'preuve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 3 ; cf. 2.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 1.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 1Co 11.28 et Ga 6.4.'
    marker-yv: yv-n
  - type: text
    text: 'Mettez-vous vous-mêmes à l''épreuve, pour voir si vous êtes dans la foi ; examinez-vous vous-mêmes. Ne reconnaissez-vous pas que Jésus-Christ est en vous ? A moins, peut-être, que l''examen ne soit un échec en ce qui vous concerne. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J''espère en tout cas que vous reconnaîtrez que l''examen n''est pas un échec en ce qui nous concerne. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que l'examen paraisse un succès…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que nous paraissions approuvés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 10.18) ; le texte joue sur les termes apparentés comme au v. 5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'même si… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; sans doute faut-il comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'même si, du fait de votre bonne conduite, nos menaces n''ont plus à être mises à exécution et risquent à nouveau de passer pour des paroles en l''air '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 1.17ss).
    marker-yv: yv-n
  - type: text
    text: 'Cependant nous souhaitons, devant Dieu, que vous ne fassiez rien de mal ; non pas pour que l''examen paraisse un succès en ce qui nous concerne, mais pour que, vous, vous fassiez le bien, même si l''examen semblait être un échec en ce qui nous concerne. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ac 4.20 ; 1Co 13.6.
    marker-yv: yv-n
  - type: text
    text: 'Car nous n''avons pas de puissance contre la vérité ; nous n''en avons que pour la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'faibles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.10 ; 11.30+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous êtes forts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'épanouissement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: perfectionnement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rétablissement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; verbe apparenté v. 11. Le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'être bien unis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 1Co 1.10, par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aider à se rétablir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Ga 6.1, par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'suppléer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 1Th 3.10 ; un terme apparenté est rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'former '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Ep 4.12 (voir aussi Rm 9.22 ; Hé 10.5 ; 11.3 ; 13.21 ; 1P 5.10).
    marker-yv: yv-n
  - type: text
    text: 'Nous nous réjouissons lorsque, nous, nous sommes faibles, tandis que vous, vous êtes forts : ce que nous souhaitons, c''est votre épanouissement. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 2.3 ; 10.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour construire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: édifier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et non pour démolir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir 10.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',8+.'
    marker-yv: yv-n
  - type: text
    text: C'est pourquoi, absent, j'écris cela ; afin que je n'aie pas, une fois présent, à user de sévérité selon l'autorité que le Seigneur m'a donnée pour construire et non pour démolir.
