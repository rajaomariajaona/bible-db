      - type: text
        text: '12.20+s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je le dis encore d'avance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
