      children:
      - type: text
        text: 'ceux qui ont '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je ne ménagerai personne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque j''étais présent pour la deuxième fois, je l''ai déjà dit, et, aujourd''hui que je suis absent, je le dis encore d''avance à ceux qui ont péché précédemment, comme à tous les autres : si je reviens vous voir, je ne ménagerai personne, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rm 15.18+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une preuve
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : termes apparentés pour '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'examiner, examen… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aux v. 5ss ; cf. 2.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parmi vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 5.'
    marker-yv: yv-n
  - type: text
    text: 'puisque vous cherchez une preuve que le Christ parle en moi, lui qui n''est pas faible à votre égard, mais qui est puissant parmi vous. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 12.9s ; Rm 6.8-11 ; Ph 2.7s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la faiblesse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en vertu de '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à cause de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la faiblesse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le grec utilise la même préposition dans l''expression traduite '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en vertu de la puissance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1Co 1.17-31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avec lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Th 4.17+.
    marker-yv: yv-n
  - type: text
    text: Car il a été crucifié dans la faiblesse, mais il vit en vertu de la puissance de Dieu ; nous aussi, nous sommes faibles en lui, mais nous vivrons avec lui, pour vous, en vertu de la puissance de Dieu.
