    - type: usfm
      marker: fq
      children:
      - type: text
        text: réjouissez-vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ph 3.1+ ; 4.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tendez à l''épanouissement '
    - type: usfm
      marker: ft
      children:
      - type: text
