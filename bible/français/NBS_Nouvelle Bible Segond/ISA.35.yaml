document_id: ISA.35,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La voie sacrée
  - type: text
    content: ' '
  - type: note
    content: 32.15+ ; 41.18s. –  plaine aride v. 6n  ; 33.9n.
  - type: text
    content: Le désert et le pays desséché s'égayeront ;
  - type: text
    content: la plaine aride tressaillira d'allégresse et fleurira comme le narcisse ;
  '10':
  - type: text
    content: ' '
  - type: note
    content: '51.11 ; Ps 30.12 ; Ap 21.4. –  ceux que le Seigneur a libérés  : cf. 62.12. –  reviendront 1.27n  ; 27.13. –  joie 61.3. –  couronnera  : litt. (sera) sur.'
  - type: text
    content: 'ainsi ceux que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a libérés reviendront.'
  - type: text
    content: Ils arriveront à Sion avec des cris de joie,
  - type: text
    content: une joie perpétuelle couronnera leur tête ;
  - type: text
    content: la gaieté et la joie viendront à leur rencontre,
  - type: text
    content: le chagrin et les gémissements s'enfuiront.
  '2':
  - type: text
    content: ' '
  - type: note
    content: fleurs Ct 2.1. –  gloire… 60.13. –  Liban / Carmel / plaine côtière 33.9n. –  verront la gloire 40.5 ; Ex 16.10 ; 33.18.
  - type: text
    content: elle se couvrira de fleurs et tressaillira
  - type: text
    content: avec chants d'allégresse et cris de joie ;
  - type: text
    content: la gloire du Liban lui sera donnée,
  - type: text
    content: la magnificence du Carmel et de la plaine côtière.
  - type: text
    content: 'Ils verront la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: la magnificence de notre Dieu.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Rendez fortes / affermissez v. 4 ; 40.29s ; mêmes verbes en Jos 1.6 ( sois fort et courageux ) ; cf. Hé 12.12.
  - type: text
    content: Rendez fortes les mains faibles,
  - type: text
    content: affermissez les genoux qui font trébucher ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'n''ayez pas peur 7.4 ; voir crainte. –  il est là, votre Dieu ! 40.10. –  vengeance 34.8+. –  rétribution  : le même terme hébreu est aussi traduit ce que (chacun) mérite 59.18+.'
  - type: text
    content: 'dites à ceux dont le cœur palpite :'
  - type: text
    content: 'Soyez forts, n''ayez pas peur :'
  - type: text
    content: il est là, votre Dieu !
  - type: text
    content: La vengeance viendra,
  - type: text
    content: la rétribution de Dieu ;
  - type: text
    content: il viendra lui-même vous sauver.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 29.18+ ; Mt 11.5s/ /.
  - type: text
    content: Alors les yeux des aveugles seront dessillés,
  - type: text
    content: les oreilles des sourds s'ouvriront ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'boiteux 33.23 ; Mt 11.5/ /. –  muet  : cf. 32.4 ; Mc 7.32n,37. –  eau / torrents (ou oueds cf. 34.9+) 41.18 ; 43.20 ; 44.3. –  plaine aride  : hébreu ‘arava  ; cf. 33.9n  ; v. 1 ; Dt 1.1n.'
  - type: text
    content: alors le boiteux sautera comme un cerf,
  - type: text
    content: et la langue du muet poussera des cris de joie.
  - type: text
    content: Car de l'eau jaillira dans le désert,
  - type: text
    content: des torrents dans la plaine aride.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'lieu torride  : autre traduction chaleur torride  ; cf. 49.10. –  fontaines 41.18. –  où se couchaient  : même terme en 65.10 ; sur le mot correspondant, voir Pr 24.15n. –  chacals 34.11-15 ; 43.20. –  il y aura place pour  : autre traduction l''herbe deviendra (roseaux et joncs)  ; cf. 34.13n.'
  - type: text
    content: Le lieu torride se changera en étang
  - type: text
    content: et la terre de la soif en fontaines ;
  - type: text
    content: dans le domaine où se couchaient les chacals,
  - type: text
    content: il y aura place pour les roseaux et les joncs.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'chemin / voie 11.16+ ; 40.3s ; 62.10-12. –  Voie sacrée ou Voie de la sainteté. –  L''impur…  : autre traduction il n''y passera personne (ou rien ) d''impur 52.1 ; voir pur, impur. –  elle sera…  : texte incertain, litt. lui pour eux allant (le) chemin  ; le pronom lui peut désigner soit le chemin, soit Dieu : en rattachant ces mots à ce qui suit dans l''hébreu, on pourrait lire lui-même fera la route pour eux , c.-à-d. Dieu lui-même leur ouvrira la voie . –  imbéciles  : on pourrait comprendre sur ce chemin, même les imbéciles ne s''égareront pas ou bien les imbéciles ne viendront pas s''égarer sur ce chemin.'
  - type: text
    content: Il y aura là un chemin frayé, une voie ;
  - type: text
    content: on l'appellera « Voie sacrée ».
  - type: text
    content: L'impur n'y passera pas ;
  - type: text
    content: elle sera pour ceux qui la suivront,
  - type: text
    content: et les imbéciles ne s'y égareront pas ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: rédimés ou bénéficiaires d'une rédemption, délivrés (cf. v. 10) ; voir aussi 41.14+ ; 43.1 ; 44.6,22ss ; 48.20 ; 51.10 ; 52.3,9 ; 62.12 ; 63.4,9 ; Ex 6.6+ ; Rt 2.20n.
  - type: text
    content: là il n'y aura pas de lion ;
  - type: text
    content: les animaux voraces n'y viendront pas,
  - type: text
    content: on ne les y trouvera pas ;
  - type: text
    content: là marcheront des gens rédimés ;
