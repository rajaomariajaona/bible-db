      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les panneaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les rebords
      - type: usfm
        marker: ft
