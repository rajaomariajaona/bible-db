        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le roi Achaz se rendit à Damas à la rencontre de Tiglath-Piléser, roi d''Assyrie. Ayant vu l''autel qui était à Damas, le roi Achaz envoya à Urie, le prêtre, la description de l''autel et le modèle de tous ses éléments. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en tous points '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exactement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 16 ; voir Ex 25.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Urie… le fit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte absent de certains mss hébreux et de LXX.'
      marker-yv: yv-n
    - type: text
      text: 'Urie, le prêtre, bâtit un autel en tous points conforme aux instructions que le roi Achaz avait envoyées de Damas ; Urie, le prêtre, le fit avant que le roi Achaz ne revienne de Damas. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le roi revint de Damas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte absent de LXX.'
      marker-yv: yv-n
    - type: text
      text: 'Le roi revint de Damas, vit l''autel, se présenta devant lui et y monta ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'il fit fumer son holocauste et son offrande végétale, répandit sa libation et aspergea l''autel du sang de ses sacrifices de paix. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Quant à l'autel de bronze
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte absent de la plupart des mss de LXX. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du nouvel autel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'autel.
      marker-yv: yv-n
    - type: text
      text: 'Quant à l''autel de bronze qui était devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', il l''ôta de sa place devant la maison, entre le nouvel autel et la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et il le plaça à côté du nouvel autel, vers le nord. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: donna cet ordre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lui ordonna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'offrande '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(du soir) et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'offrande végétale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent un même mot hébreu (voir Gn 4.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 2.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; cf. 1R 18.29,36 ; voir Ez 46.13-15 pour l''ordre des sacrifices. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je m'en occuperai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il me servira pour examiner (les victimes des sacrifices ?)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; on en a déduit que le roi pratiquait une forme de divination, par exemple à partir de l''examen des entrailles des victimes ; cf. Ps 27.4 où la même forme verbale est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: admirer.
      marker-yv: yv-n
    - type: text
      text: 'Le roi Achaz donna cet ordre à Urie, le prêtre : Fais fumer sur le grand autel l''holocauste du matin et l''offrande du soir, l''holocauste du roi et son offrande végétale, l''holocauste de tout le peuple du pays avec son offrande végétale et ses libations, et asperge-le de tout le sang des holocaustes et de tout le sang des sacrifices. Quant à l''autel de bronze, je m''en occuperai. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Urie, le prêtre, fit exactement ce que le roi Achaz avait ordonné.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
