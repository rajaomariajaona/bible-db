document_id: 2KI.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Achaz, roi de Juda
  - type: heading
    content: 2Ch 28.1-27
  - type: text
    content: ' '
  - type: note
    content: 'La dix-septième année  : dix-huitième selon Syr et un ms de LXX. –  Remalia v. 5 ; 2R 15.25n.'
  - type: text
    content: 'La dix-septième année de Péqah, fils de Remalia, Achaz, fils de Jotam, devint roi de Juda. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'description  : le terme est traduit par ressemblance en Gn 1.26n  ; LXX précise sa mesure et sa ressemblance . –  modèle  : autre traduction possible les dimensions  ; cf. Ex 25.9n.'
  - type: text
    content: 'Le roi Achaz se rendit à Damas à la rencontre de Tiglath-Piléser, roi d''Assyrie. Ayant vu l''autel qui était à Damas, le roi Achaz envoya à Urie, le prêtre, la description de l''autel et le modèle de tous ses éléments. '
  '11':
  - type: note
    content: 'en tous points ou exactement, cf. v. 16 ; voir Ex 25.9. –  Urie… le fit  : texte absent de certains mss hébreux et de LXX.'
  - type: text
    content: 'Urie, le prêtre, bâtit un autel en tous points conforme aux instructions que le roi Achaz avait envoyées de Damas ; Urie, le prêtre, le fit avant que le roi Achaz ne revienne de Damas. '
  '12':
  - type: note
    content: 'Le roi revint de Damas  : texte absent de LXX.'
  - type: text
    content: 'Le roi revint de Damas, vit l''autel, se présenta devant lui et y monta ; '
  '13':
  - type: text
    content: 'il fit fumer son holocauste et son offrande végétale, répandit sa libation et aspergea l''autel du sang de ses sacrifices de paix. '
  '14':
  - type: note
    content: 'Quant à l''autel de bronze  : texte absent de la plupart des mss de LXX. –  du nouvel autel  : litt. de l''autel.'
  - type: text
    content: 'Quant à l''autel de bronze qui était devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', il l''ôta de sa place devant la maison, entre le nouvel autel et la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et il le plaça à côté du nouvel autel, vers le nord. '
  '15':
  - type: note
    content: 'donna cet ordre  : autre lecture traditionnelle lui ordonna. –  offrande (du soir) et offrande végétale traduisent un même mot hébreu (voir Gn 4.3n  ; Lv 2.1n) ; cf. 1R 18.29,36 ; voir Ez 46.13-15 pour l''ordre des sacrifices. – Voir sang. –  je m''en occuperai  : autre traduction possible il me servira pour examiner (les victimes des sacrifices ?)  ; on en a déduit que le roi pratiquait une forme de divination, par exemple à partir de l''examen des entrailles des victimes ; cf. Ps 27.4 où la même forme verbale est traduite par admirer.'
  - type: text
    content: 'Le roi Achaz donna cet ordre à Urie, le prêtre : Fais fumer sur le grand autel l''holocauste du matin et l''offrande du soir, l''holocauste du roi et son offrande végétale, l''holocauste de tout le peuple du pays avec son offrande végétale et ses libations, et asperge-le de tout le sang des holocaustes et de tout le sang des sacrifices. Quant à l''autel de bronze, je m''en occuperai. '
  '16':
  - type: text
    content: Urie, le prêtre, fit exactement ce que le roi Achaz avait ordonné.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'les panneaux ou les rebords  : cf. Ex 25.25-27 ; 37.12-14 ; 1R 7.28-35.'
  - type: text
    content: 'Le roi Achaz mit en pièces les panneaux des bases et retira la cuve qui était dessus. Il descendit la Mer des bœufs de bronze qui la portaient et il la posa sur un pavage de pierres. '
  '18':
  - type: note
    content: 'A cause du roi d''Assyrie  : litt. devant le roi d''Assyrie. –  il changea…  : autres traductions il déplaça dans la maison… ; il détourna vers la maison… –  le portique du sabbat  : espace couvert qui était peut-être le théâtre d''ablutions rituelles. A partir du texte de LXX, certains ont préféré lire l''estrade pour siéger.'
  - type: text
    content: 'A cause du roi d''Assyrie, il changea dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' le portique du sabbat qu''on y avait bâti à l''intérieur et l''entrée extérieure du roi.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  le livre des chroniques des rois de Juda 1R 14.19n.
  - type: text
    content: 'Le reste de l''histoire d''Achaz, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois de Juda. '
  '2':
  - type: note
    content: 'il régna seize ans  : voir « Le temps des rois »♦. –  ce qui convenait au Seigneur 10.30n.'
  - type: text
    content: 'Achaz avait vingt ans lorsqu''il devint roi ; il régna seize ans à Jérusalem. Il ne fit pas ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, comme l''avait fait David, son père. '
  '20':
  - type: note
    content: 'se coucha… 8.24+ ; 1R 1.21+. –  fut enseveli avec ses pères  : LXX dit simplement il fut enseveli.'
  - type: text
    content: Achaz se coucha avec ses pères et fut enseveli avec ses pères dans la Ville de David. Ezéchias, son fils, devint roi à sa place.
  '3':
  - type: note
    content: 'son fils  : certains mss de LXX portent ses fils (cf. 2Ch 28.3). –  les abominations des nations  : cf. 1R 14.24.'
  - type: text
    content: 'Il suivit la voie des rois d''Israël et fit même passer son fils par le feu, imitant ainsi les abominations des nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dépossédées devant les Israélites. '
  '4':
  - type: note
    content: des sacrifices… dans les hauts lieux 12.4 ; 14.4 ; 15.4,35 ; 1R 3.3s ; 22.44. –  sur les collines et sous tout arbre verdoyant Dt 12.2+ ; 1R 14.23+.
  - type: text
    content: Il offrait des sacrifices et de l'encens dans les hauts lieux, sur les collines et sous tout arbre verdoyant.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ces attaques conjuguées des armées d''Israël et d''Aram contre Juda avaient peut-être pour but de forcer le roi de Jérusalem à s''allier avec ses voisins du nord pour faire face à la pression assyrienne. –  Retsîn  : cf. 15.37n. –  Ils assiégèrent Achaz  : Es 7.1 qui présente un texte parallèle dit ils l''assiégèrent (sous-entendu : Jérusalem). –  engager le combat ou le forcer à combattre  ; le verbe correspondant est apparenté au mot traduit plus haut par guerre  ; il faut sans doute comprendre que la capacité d''Achaz à soutenir le siège était supérieure à celle de ses adversaires, de sorte qu''il n''y a pas eu combat, mais retraite des assiégeants ; autre traduction ils ne purent l''emporter sur lui.'
  - type: text
    content: 'Alors Retsîn, roi d''Aram, et Péqah, fils de Remalia, roi d''Israël, allèrent faire la guerre à Jérusalem. Ils assiégèrent Achaz mais ils ne purent engager le combat. '
  '6':
  - type: note
    content: 'fit passer  : autre traduction ramena. –  Aram  : certains commentateurs ont supposé une confusion, possible en hébreu où les graphies des deux noms sont très proches, entre Aram, Araméens et Edom, Edomites. –  Eilath  : cf. 14.22n. –  délogea ou expulsa  ; cf. Dt 7.1n. –  les Judéens  : autre traduction les Juifs  ; même terme en 25.25 (un terme apparenté désigne la langue judéenne, c.-à-d. l''hébreu, en 18.26ss) ; Jr 32.12n  ; Za 8.23n  ; Est 2.5n  ; Esd 4.12n (araméen) ; Né 1.2n  ; 1Ch 4.18n. –  les Edomites  : selon une des lectures traditionnelles, avec LXX, Tg et Vg. Autre lecture traditionnelle, avec Syr et certains mss de Vg et Tg  : les Araméens.'
  - type: text
    content: 'En ce même temps, Retsîn, roi d''Aram, fit passer Eilath sous la domination d''Aram ; il délogea d''Eilath les Judéens ; les Edomites vinrent à Eilath, où ils habitent jusqu''à ce jour. '
  '7':
  - type: text
    content: 'Achaz envoya des messagers à Tiglath-Piléser, roi d''Assyrie, pour lui dire : Je suis ton serviteur et ton fils ; viens me délivrer de la main du roi d''Aram et de la main du roi d''Israël, qui se sont dressés contre moi. '
  '8':
  - type: note
    content: 'Le tribut d’Achaz, roi de Juda, est mentionné dans les annales de Tiglath-Piléser III, roi d''Assyrie. –  dans la maison du Seigneur  : LXX précise dans les trésors de la maison…'
  - type: text
    content: 'Achaz prit l''argent et l''or qui étaient dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dans les trésors de la maison du roi, et il l''envoya comme présent au roi d''Assyrie. '
  '9':
  - type: note
    content: 'La prise de Damas (733/2 av. J.-C.) et la capture du roi Ra‘ianou (= Retsîn, 15.37n) sont décrites dans les annales de Tiglath-Piléser III, roi d''Assyrie. –  en exila les habitants  : litt. l''exila. –  à Qir  : précision absente de LXX. Qir ou Qer pourrait correspondre à une ville nommée Hourra ou Ourra dans les annales assyriennes ; cf. Es 22.6 ; Am 1.5n  ; 9.7.'
  - type: text
    content: 'Le roi d''Assyrie l''écouta : le roi d''Assyrie partit à l''attaque de Damas, la prit, en exila les habitants à Qir et fit mettre à mort Retsîn.'
