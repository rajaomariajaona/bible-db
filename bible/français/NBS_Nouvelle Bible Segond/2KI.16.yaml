          text: ' : cf. Ex 25.25-27 ; 37.12-14 ; 1R 7.28-35.'
      marker-yv: yv-n
    - type: text
      text: 'Le roi Achaz mit en pièces les panneaux des bases et retira la cuve qui était dessus. Il descendit la Mer des bœufs de bronze qui la portaient et il la posa sur un pavage de pierres. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
