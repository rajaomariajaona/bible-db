      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant le roi d'Assyrie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il changea…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il déplaça dans la maison… ; il détourna vers la maison… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le portique du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : espace couvert qui était peut-être le théâtre d''ablutions rituelles. A partir du texte de LXX, certains ont préféré lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'estrade pour siéger.
      marker-yv: yv-n
    - type: text
      text: 'A cause du roi d''Assyrie, il changea dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' le portique du sabbat qu''on y avait bâti à l''intérieur et l''entrée extérieure du roi.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 11.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le livre des chroniques des rois de Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 14.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le reste de l''histoire d''Achaz, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois de Juda. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il régna seize ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir « Le temps des rois »♦. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce qui convenait au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Achaz avait vingt ans lorsqu''il devint roi ; il régna seize ans à Jérusalem. Il ne fit pas ce qui convenait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', son Dieu, comme l''avait fait David, son père. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se coucha… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.24+ ; 1R 1.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fut enseveli avec ses pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX dit simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il fut enseveli.
      marker-yv: yv-n
    - type: text
      text: Achaz se coucha avec ses pères et fut enseveli avec ses pères dans la Ville de David. Ezéchias, son fils, devint roi à sa place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss de LXX portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ses fils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 2Ch 28.3). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les abominations des nations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 14.24.'
      marker-yv: yv-n
    - type: text
      text: 'Il suivit la voie des rois d''Israël et fit même passer son fils par le feu, imitant ainsi les abominations des nations que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait dépossédées devant les Israélites. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: '… dans les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: hauts
        - type: text
          text: ' lieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.4 ; 14.4 ; 15.4,35 ; 1R 3.3s ; 22.44. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur les collines et sous tout arbre verdoyant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 12.2+ ; 1R 14.23+.
      marker-yv: yv-n
    - type: text
      text: Il offrait des sacrifices et de l'encens dans les hauts lieux, sur les collines et sous tout arbre verdoyant.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ces attaques conjuguées des armées d''Israël et d''Aram contre Juda avaient peut-être pour but de forcer le roi de Jérusalem à s''allier avec ses voisins du nord pour faire face à la pression assyrienne. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Retsîn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 15.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils assiégèrent Achaz
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Es 7.1 qui présente un texte parallèle dit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils l''assiégèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(sous-entendu : Jérusalem). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'engager le combat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le forcer à combattre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le verbe correspondant est apparenté au mot traduit plus haut par '
      - type: usfm
