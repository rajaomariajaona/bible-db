        children:
        - type: text
          text: guerre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; il faut sans doute comprendre que la capacité d''Achaz à soutenir le siège était supérieure à celle de ses adversaires, de sorte qu''il n''y a pas eu combat, mais retraite des assiégeants ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ne purent l'emporter sur lui.
      marker-yv: yv-n
    - type: text
      text: 'Alors Retsîn, roi d''Aram, et Péqah, fils de Remalia, roi d''Israël, allèrent faire la guerre à Jérusalem. Ils assiégèrent Achaz mais ils ne purent engager le combat. '
