    text: 'Pendant la fête, tu ne mangeras rien de levé ; tu mangeras pendant sept jours des pains sans levain, du pain d''affliction, car c''est dans la précipitation que tu es sorti d''Egypte : tu te souviendras ainsi tous les jours de ta vie du jour où tu es sorti d''Egypte. '
