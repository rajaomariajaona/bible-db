document_id: DEU.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La fête de la Pâque
  - type: text
    content: ' '
  - type: note
    content: Observe 4.6n. –  le mois des épis Ex 12.2n  ; 13.4n. –  la Pâque Ex 12.1,11n. –  t'a fait sortir 5.6+.
  - type: text
    content: 'Observe le mois des épis ; tu célébreras la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ; car c''est au mois des épis que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a fait sortir d''Egypte, pendant la nuit. '
  '10':
  - type: note
    content: 'l''offrande volontaire  : litt. l''offrande volontaire de ta main Lv 7.16 ; voir sacrifice. – Voir bénédiction.'
  - type: text
    content: 'Puis tu célébreras la fête des Semaines pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ; l''offrande volontaire que tu donneras sera à proportion des bénédictions que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aura accordées. '
  '11':
  - type: note
    content: Tu te réjouiras 12.7+. –  au lieu… 12.5+. –  lévite 12.12,19+. –  immigré… 10.18+.
  - type: text
    content: 'Tu te réjouiras devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, choisira pour y faire demeurer son nom, toi, ton fils et ta fille, ton serviteur et ta servante, le lévite qui est dans tes villes, ainsi que l''immigré, l''orphelin et la veuve qui sont en ton sein. '
  '12':
  - type: note
    content: esclave en Egypte 5.15+. –  tu observeras… 4.6n.
  - type: text
    content: Tu te souviendras que tu as été esclave en Egypte ; tu observeras ces prescriptions et tu les mettras en pratique.
  - type: heading
    content: La fête des Huttes
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'fête des Huttes Ex 23.16n  ; Lv 23.33-43. Voir calendrier et fêtes. –  le produit  : sous-entendu dans le texte.'
  - type: text
    content: 'Tu célébreras la fête des Huttes pendant sept jours, quand tu recueilleras le produit de ton aire et de ton pressoir. '
  '14':
  - type: note
    content: 'lors de cette fête  : litt. dans ta fête (cf. Ex 5.1n).'
  - type: text
    content: 'Tu te réjouiras lors de cette fête, toi, ton fils et ta fille, ton serviteur et ta servante, ainsi que le lévite, l''immigré, l''orphelin et la veuve qui sont dans tes villes. '
  '15':
  - type: note
    content: 'au lieu… 12.5+ ; cf. Jn 7.2-9. –  tu te livreras…  : litt. tu ne seras que joyeux.'
  - type: text
    content: 'Tu célébreras la fête pendant sept jours pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' choisira ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te bénira dans toutes tes récoltes et dans tout le travail de tes mains, et tu te livreras à une joie sans réserve.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Trois fois par an… Ex 23.17+. –  On ne paraîtra pas… 31.11 ; cf. Ex 23.15n. –  les mains vides  : litt. à vide  ; cf. de même en 15.13 ; Ex 23.15 ; 34.20 ; Es 55.11n.'
  - type: text
    content: 'Trois fois par an, toute ta population mâle devra paraître devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, au lieu qu''il choisira : à la fête des Pains sans levain, à la fête des Semaines et à la fête des Huttes. On ne paraîtra pas devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les mains vides. '
  '17':
  - type: note
    content: V. 10. –  selon la bénédiction… 12.15.
  - type: text
    content: 'Chacun donnera ce qu''il pourra, selon la bénédiction que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, lui aura accordée.'
  - type: heading
    content: Règles pour les juges
  '18':
  - type: text
    content: ' '
  - type: note
    content: '1.9+. –  secrétaires  : autre traduction greffiers  ; cf. 1.15+ ; Ex 5.6n  ; Jos 1.10n. –  aux portes de toutes les villes  : litt. dans tes portes  ; cf. 12.12n  ; la place publique située aux portes de la ville était aussi le lieu où l''on rendait la justice (cf. Gn 23.10 ; Dt 17.5n,8 ; 21.19 ; 22.24 ; voir aussi Rt 4.10 ; Am 5.10 ; Za 8.16).'
  - type: text
    content: 'Tu te donneras des juges et des secrétaires aux portes de toutes les villes que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne, tribu par tribu ; ils jugeront le peuple avec justice. '
  '19':
  - type: note
    content: 'atteinte au droit 24.17 ; 27.19 ; cf. 25.1. –  tu ne te montreras pas partial 1.17n. –  pots-de-vin ou présents 10.17 ; cf. Ex 23.8+ ; Pr 15.27n  ; 17.23n  ; Siracide 20.29 : « Présents et cadeaux aveuglent les yeux des sages et, comme une muselière sur la bouche, empêchent les reproches. » –  ruinent la cause  : autre traduction pervertissent les paroles.'
  - type: text
    content: 'Tu ne porteras pas atteinte au droit, tu ne te montreras pas partial et tu n''accepteras pas de pots-de-vin, car les pots-de-vin aveuglent les yeux des sages et ruinent la cause des justes. '
  '2':
  - type: note
    content: 'Tu sacrifieras…  : cf. Ex 12.21 ; Mc 14.12. –  et du gros bétail Nb 28.16-25 ; 2Ch 30.22-24 ; 35.7-9. –  au lieu que le Seigneur choisira 12.5+ ; comparer 16.5s avec Ex 12.46 ; voir 2R 23.21-23. –  y faire demeurer son nom 14.23 ; 26.2.'
  - type: text
    content: 'Tu sacrifieras la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, du petit bétail et du gros bétail, au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' choisira pour y faire demeurer son nom. '
  '20':
  - type: note
    content: 'Tu poursuivras la justice  : litt. justice, justice tu poursuivras  ; cf. Rm 9.31. –  afin que tu vives… 4.1+.'
  - type: text
    content: 'Tu poursuivras la justice, afin que tu vives et que tu prennes possession du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne.'
  - type: heading
    content: Pratiques religieuses interdites
  '21':
  - type: text
    content: ' '
  - type: note
    content: aucun poteau cultuel… 7.5+ ; autres traductions aucun poteau cultuel, aucun arbre ; aucun poteau cultuel ni aucun arbre (cf. 19.5n  ; 21.22n  ; Jg 3.7n).
  - type: text
    content: 'Tu ne planteras aucun poteau cultuel (aucune ashéra) d''aucun arbre à côté de l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, l''autel que tu feras pour toi. '
  '22':
  - type: note
    content: 7.5+.
  - type: text
    content: 'Tu ne dresseras pas pour toi de pierre levée ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, déteste cela.'
  '3':
  - type: note
    content: 'Pendant la fête  : litt. sur lui (ou elle), ce qui signifie peut-être avec (le sacrifice de) la Pâque. –  rien de levé Ex 12.15+. –  pain d''affliction  : cf. 8.2ns,16. –  précipitation Ex 12.39+. –  tu te souviendras 5.15+ ; cf. Lc 22.19.'
  - type: text
    content: 'Pendant la fête, tu ne mangeras rien de levé ; tu mangeras pendant sept jours des pains sans levain, du pain d''affliction, car c''est dans la précipitation que tu es sorti d''Egypte : tu te souviendras ainsi tous les jours de ta vie du jour où tu es sorti d''Egypte. '
  '4':
  - type: note
    content: jusqu'au lendemain Ex 12.10+.
  - type: text
    content: 'On ne devra pas voir chez toi de levain, dans tout ton territoire, pendant sept jours ; de la viande que tu offriras en sacrifice le soir du premier jour, rien ne passera la nuit jusqu''au lendemain. '
  '5':
  - type: note
    content: 'dans toutes les villes  : litt. dans l''une de tes portes (de ville)  ; autre traduction dans n''importe quelle ville  ; cf. v. 2+,11,14 ; 17.2.'
  - type: text
    content: 'Tu ne pourras pas sacrifier la Pâque dans toutes les villes que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne ; '
  '6':
  - type: note
    content: 'V. 2+ ; cf. Lc 2.41. –  au temps  : le même mot est parfois traduit par temps fixé (Ex 13.10n), par rencontre (Ex 27.21n  ; Es 33.20) ou par rencontre festive (Gn 1.14n). Ici il pourrait aussi bien désigner la date que l''heure de la Pâque (cf. v. 1 ; Ex 12.6,29-31).'
  - type: text
    content: 'c''est au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, choisira pour y faire demeurer son nom que tu sacrifieras la Pâque, le soir, au coucher du soleil, au temps où tu es sorti d''Egypte. '
  '7':
  - type: note
    content: 'Tu la feras cuire  : cf. Ex 12.8s (autre terme hébreu).'
  - type: text
    content: 'Tu la feras cuire et tu la mangeras au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, choisira. Au matin, tu pourras retourner à tes tentes. '
  '8':
  - type: note
    content: 'septième jour  : cf. 5.14 ; Lv 23.8. –  assemblée solennelle ou cérémonie de clôture  : cf. Lv 23.36n  ; Nb 29.35.'
  - type: text
    content: 'Pendant six jours tu mangeras des pains sans levain ; le septième jour, il y aura une assemblée solennelle pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu : tu ne feras aucun travail.'
  - type: heading
    content: La fête des Semaines
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 23.16n  ; Lv 23.15-22. –  où l''on mettra…  : litt. où la faucille commencera…'
  - type: text
    content: 'Tu compteras sept semaines ; tu commenceras à compter sept semaines à partir du moment où l''on mettra la faucille dans le blé sur pied. '
