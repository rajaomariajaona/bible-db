document_id: MRK.9,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 13.30/ /. –  Amen Mt 5.18n. –  ne goûteront pas (autres traductions jamais ; en aucun cas ) la mort  : cf. Jn 8.52 ; Hé 2.9. –  avec puissance Rm 1.4.'
  - type: text
    content: 'Il leur disait encore : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, quelques-uns de ceux qui se tiennent ici ne goûteront pas la mort avant d''avoir vu le règne de Dieu venu avec puissance.'
  - type: heading
    content: Jésus transfiguré
  - type: heading
    content: Mt 17.1-9  ; Lc 9.28-36
  '10':
  - type: note
    content: 'Ils retinrent  : autre traduction ils s''attachèrent à (cf. 7.8). –  que signifie  : litt. qu''est-ce que.'
  - type: text
    content: 'Ils retinrent cette parole, tout en débattant entre eux : que signifie « se relever d''entre les morts » ?'
  - type: heading
    content: Les disciples questionnent Jésus sur Elie
  - type: heading
    content: Mt 17.10-13
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'scribes 2.6+. –  Il faut qu''Elie vienne d''abord  : cf. 15.35s ; Ml 3.23  ; Jn 1.21+.'
  - type: text
    content: 'Ils lui demandaient : Pourquoi les scribes disent-ils : '
  - type: text
    content: Il faut qu'Elie vienne d'abord.
  - type: text
    content: ' '
  '12':
  - type: note
    content: 'pour tout rétablir  : litt. et rétablit tout, Ml 3.24 (dans LXX, c''est le même verbe grec qui traduit le verbe hébreu rendu par ramener) ; Ac 1.6. –  Fils de l''homme 2.10+ ; Mt 8.20n. –  souffrir beaucoup et être méprisé  : cf. 8.31+ ; Es 52.14 ; 53.3ss ; Ps 22.7s.'
  - type: text
    content: 'Il leur répondit : Elie vient d''abord pour tout rétablir. Comment peut-il être écrit du Fils de l''homme qu''il doit souffrir beaucoup et être méprisé ? '
  '13':
  - type: note
    content: Cf. 6.17-29 ; 1R 19.2,10 ; Mt 11.14.
  - type: text
    content: Mais je vous dis qu'Elie est venu et qu'ils l'ont traité comme ils voulaient, selon ce qui est écrit de lui.
  - type: heading
    content: Jésus guérit un enfant possédé
  - type: heading
    content: Mt 17.14-21  ; Lc 9.37-43
  '14':
  - type: text
    content: ' '
  - type: note
    content: scribes 2.6+.
  - type: text
    content: 'Lorsqu''ils furent arrivés près des disciples, ils virent autour d''eux une grande foule de gens, et des scribes qui débattaient avec eux. '
  '15':
  - type: note
    content: en émoi, très surprise ou effrayée  ; le verbe grec correspondant est dérivé de celui qui est traduit par être effrayé en 1.27n  ; on retrouve la même forme 14.33 ; 16.5s.
  - type: text
    content: 'Sitôt que la foule le vit, elle fut en émoi ; on accourait pour le saluer. '
  '16':
  - type: text
    content: 'Il leur demanda : De quoi débattez-vous avec eux ? '
  '17':
  - type: note
    content: 'Maître  : au sens d’enseignant. –  qui a (3.22n) un esprit (cf. 1.23n) muet  : cf. v. 25 ; 7.37 ; Mt 12.22 ; Lc 11.14.'
  - type: text
    content: 'De la foule, quelqu''un lui répondit : Maître, je t''ai amené mon fils, qui a un esprit muet. '
  '18':
  - type: note
    content: 'devient tout raide  : litt. se dessèche, cf. 3.1n. –  de chasser cet esprit  : litt. de le chasser. –  ils n''en ont pas été capables ou ils n''en ont pas eu la force, cf. 3.27.'
  - type: text
    content: 'Où qu''il le saisisse, il le jette à terre ; l''enfant écume, grince des dents, et devient tout raide. J''ai prié tes disciples de chasser cet esprit, et ils n''en ont pas été capables. '
  '19':
  - type: note
    content: 'Génération  : cf. 8.12+ ; Lc 24.25.'
  - type: text
    content: 'Il leur dit : Génération sans foi, jusqu''à quand serai-je avec vous ? Jusqu''à quand vous supporterai-je ? Amenez-le-moi. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: '2P 1.17s. –  Six jours après  : cf. Ex 24.15s ; Lv 23.34ss. –  Pierre, Jacques et Jean  : cf. 1.29 ; Mt 17.1+. –  transfiguré ou transformé  ; le même verbe, dérivé du nom traduit par apparence (ou forme ) en 16.12, se retrouve en Rm 12.2 ; 2Co 3.18 (il a donné notre mot métamorphose ).'
  - type: text
    content: 'Six jours après, Jésus prend avec lui Pierre, Jacques et Jean, et il les conduit seuls à l''écart, sur une haute montagne. Il fut transfiguré devant eux : '
  '20':
  - type: note
    content: secoua violemment 1.26.
  - type: text
    content: 'On le lui amena. Aussitôt que l''enfant le vit, l''esprit le secoua violemment ; il tomba par terre et se roulait en écumant. '
  '21':
  - type: note
    content: 'Cf. Lc 8.29+. –  Jésus demanda  : litt. il demanda.'
  - type: text
    content: 'Jésus demanda au père : Depuis combien de temps cela lui arrive-t-il ? – Depuis son enfance, répondit-il ; '
  '22':
  - type: note
    content: 'Cf. Mt 17.15+. –  l''esprit l''a jeté  : litt. il l''a jeté. –  faire périr  : le même verbe est traduit par faire disparaître en 3.6 ; 11.18 ; 12.9. –  si tu peux  : cf. 1.40. –  laisse-toi émouvoir  : cf. 1.41+.'
  - type: text
    content: 'souvent l''esprit l''a jeté dans le feu et dans l''eau pour le faire périr. Mais si tu peux faire quelque chose, laisse-toi émouvoir et viens à notre secours ! '
  '23':
  - type: note
    content: Cf. 5.36 ; 10.27 ; 11.23s ; Mt 17.20 ; 21.21 ; Lc 17.6.
  - type: text
    content: 'Jésus lui dit : « Si tu peux ! » Tout est possible pour celui qui croit. '
  '24':
  - type: note
    content: Cf. Lc 17.5.
  - type: text
    content: 'Aussitôt le père de l''enfant s''écria : Je crois ! Viens au secours de mon manque de foi ! '
  '25':
  - type: note
    content: 'rabroua 1.25n. –  esprit impur (voir pur, impur) : 1.23n. –  Esprit muet et sourd v. 17+.'
  - type: text
    content: 'Jésus, voyant accourir la foule, rabroua l''esprit impur en lui disant : Esprit muet et sourd, c''est moi qui te l''ordonne, sors de cet enfant et n''y rentre plus ! '
  '26':
  - type: note
    content: Cf. 1.25s.
  - type: text
    content: 'Il sortit en poussant des cris et en le secouant très violemment. L''enfant devint comme mort, de sorte que la multitude le disait mort. '
  '27':
  - type: note
    content: Les verbes grecs traduits par le réveilla et se releva (on pourrait aussi traduire le fit lever, et il se tint debout) ont ailleurs le sens de ressusciter (voir résurrection) ; cf. 5.41n  ; voir aussi 1.31n  ; 8.31 ; 9.9s ; 10.34 ; Mt 9.25 ; Lc 7.14 ; 8.54 ; Ac 3.7.
  - type: text
    content: Mais Jésus, le saisissant par la main, le réveilla, et il se releva.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'à la maison  : cf. v. 33 ; 2.1n  ; 10.10.'
  - type: text
    content: 'Quand il fut rentré à la maison, ses disciples, en privé, se mirent à lui demander : Pourquoi n''avons-nous pas pu le chasser nous-mêmes ? '
  '29':
  - type: note
    content: 'par la prière  : certains mss ajoutent et par le jeûne, cf. Mt 17.21n.'
  - type: text
    content: 'Il leur dit : Cette espèce-là ne peut sortir que par la prière.'
  - type: heading
    content: Jésus annonce de nouveau sa mort et sa résurrection
  - type: heading
    content: Mt 17.22-23  ; Lc 9.43-45
  '3':
  - type: note
    content: Cf. 16.5 ; Mt 28.3 ; Ac 1.10 ; 10.30 ; Ap 1.14,16 ; 3.4 ; 4.4. –  teinturier ou foulon  ; le terme grec, qui n'apparaît qu'ici dans le N.T., désigne celui qui apprête, teint et nettoie les étoffes de laine ; terme apparenté en 2.21n.
  - type: text
    content: 'ses vêtements devinrent resplendissants, d''une blancheur telle qu''il n''est pas de teinturier sur terre qui puisse blanchir ainsi. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Partis  : litt. sortis . –  la Galilée Lc 17.11 ; Jn 7.1.'
  - type: text
    content: 'Partis de là, ils traversaient la Galilée, et il ne voulait pas qu''on le sache. '
  '31':
  - type: note
    content: '8.31+. –  Le Fils de l''homme (même mot grec pour humains dans la suite) est sur le point d''être livré… (litt. est livré aux mains des humains) : cf. 2S 24.14+. –  après sa mort  : litt. après avoir été tué. –  il se relèvera  : voir résurrection.'
  - type: text
    content: 'Car il instruisait ses disciples et leur disait : Le Fils de l''homme est sur le point d''être livré aux humains ; ils le tueront, et, trois jours après sa mort, il se relèvera. '
  '32':
  - type: note
    content: 'Lc 9.45+. –  ne comprenaient pas  : litt. ne connaissaient pas. –  peur  : voir crainte.'
  - type: text
    content: Mais les disciples ne comprenaient pas cette parole, et ils avaient peur de l'interroger.
  - type: heading
    content: Qui est le plus grand ?
  - type: heading
    content: Mt 18.1-5  ; Lc 9.46-48
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Capharnaüm 1.21+. –  à la maison v. 28 ; 2.1+. –  raisonniez-vous  : même verbe 2.6,8 ; 8.16s ; 11.31 ; un verbe apparenté est traduit par discuter au v. 34.'
  - type: text
    content: 'Ils arrivèrent à Capharnaüm. Lorsqu''il fut à la maison, il se mit à leur demander : A propos de quoi raisonniez-vous en chemin ? '
  '34':
  - type: note
    content: 'ils avaient discuté  : cf. v. 33n  ; Ac 17.2n. –  le plus grand  : cf. Mt 11.11 ; Lc 22.24.'
  - type: text
    content: 'Mais eux gardaient le silence, car, en chemin, ils avaient discuté pour savoir qui était le plus grand. '
  '35':
  - type: note
    content: 'qu''il soit  : autre traduction il sera. –  le serviteur 10.43s ; Mt 20.26ns.'
  - type: text
    content: 'Alors il s''assit, appela les Douze et leur dit : Si quelqu''un veut être le premier, qu''il soit le dernier de tous et le serviteur de tous. '
  '36':
  - type: note
    content: 'un enfant  : autre traduction un petit enfant, de même dans la suite (cf. 7.27n). –  pris dans ses bras 10.16.'
  - type: text
    content: 'Il prit un enfant, le plaça au milieu d''eux et, après l''avoir pris dans ses bras, il leur dit : '
  '37':
  - type: note
    content: Mt 10.40+. –  en mon nom v. 39n.
  - type: text
    content: Quiconque accueille en mon nom un enfant, comme celui-ci, m'accueille moi-même ; et quiconque m'accueille, ce n'est pas moi qu'il accueille, mais celui qui m'a envoyé.
  - type: heading
    content: Ceux qui se servent du nom de Jésus
  - type: heading
    content: Lc 9.49-50
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Nb 11.26-29 ; voir aussi Ac 19.13ss. –  Maître  : au sens d’ enseignant . –  qui chasse les démons par ton nom  : certains mss ajoutent et qui ne nous suit pas . –  nous avons cherché à l''en empêcher  : autre traduction possible (la seule d''après certains mss)  : nous l''en avons empêché . –  il ne nous suivait pas  : cf. 1.18 ; 6.1 ; 8.34.'
  - type: text
    content: 'Jean lui dit : Maître, nous avons vu un homme qui chasse les démons par ton nom et nous avons cherché à l''en empêcher, parce qu''il ne nous suivait pas. '
  '39':
  - type: note
    content: 'Ne l''en empêchez pas  : cf. 10.14+. –  parler en mal de moi  : autres traductions me maudire, mal parler de moi  ; cf. 7.10 ; 1Co 12.3 ; voir aussi bénédiction. –  miracle 6.2n. –  en mon nom ou en se servant de mon nom, même formule v. 37 ; 13.6.'
  - type: text
    content: 'Jésus répondit : Ne l''en empêchez pas, car il n''y a personne qui puisse parler en mal de moi tout de suite après avoir fait un miracle en mon nom. '
  '4':
  - type: note
    content: 'Elie avec Moïse  : cf. Dt 18.15 ; 34.6s ; 2R 2 ; Ml 3.22-24.'
  - type: text
    content: 'Elie avec Moïse leur apparurent ; ils s''entretenaient avec Jésus. '
  '40':
  - type: note
    content: 'Comparer avec Mt 12.30/ / ; cf. Cicéron (Discours, XVIII) : « Tu disais, à ce qu''on nous rapportait, que nous tenions pour ennemis tous ceux qui n''étaient pas avec nous, tandis que toi tu tenais pour amis tous ceux qui n''étaient pas contre toi. »'
  - type: text
    content: En effet, celui qui n'est pas contre nous est pour nous.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 10.42. –  parce que vous appartenez au Christ  : litt. au nom (du fait) que vous êtes du Christ  ; certains mss portent seulement en mon nom  ; cf. Mt 10.41n  ; 1Co 1.12n. –  jamais  : autre traduction en aucun cas.'
  - type: text
    content: 'Et quiconque vous donnera à boire une coupe d''eau parce que vous appartenez au Christ, '
  - type: text
    content: amen,
  - type: text
    content: ' je vous le dis, il ne perdra jamais sa récompense.'
  - type: heading
    content: Les causes de chute
  - type: heading
    content: Mt 18.6-11  ; Lc 17.1-2
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'causer la chute 4.17+. –  qui mettent leur foi en moi  : certains mss portent seulement qui croient (ou qui ont foi ). –  meule de moulin Mt 18.6n  ; Ap 18.21.'
  - type: text
    content: 'Mais si quelqu''un devait causer la chute de l''un de ces petits qui mettent leur foi en moi, il vaudrait mieux pour lui qu''on lui attache autour du cou une meule de moulin et qu''on le lance à la mer. '
  '43':
  - type: note
    content: 'Mt 5.30 ; 18.8+. –  la géhenne Mt 5.22n. –  le feu qui ne s''éteint pas Mt 3.12/ / ; 5.22+. Epître d''Ignace d''Antioche aux Ephésiens 16.2 : « Celui qui s''est ainsi souillé (en devenant hérétique) ira au feu inextinguible, et de même celui qui l''écoute. »'
  - type: text
    content: 'Si ta main doit causer ta chute, coupe-la ; mieux vaut pour toi entrer manchot dans la vie que d''avoir tes deux mains et d''aller dans la géhenne, dans le feu qui ne s''éteint pas [ '
  '44':
  - type: note
    content: 'Certains mss ajoutent  : là où leur ver ne meurt pas et où le feu ne s''éteint pas, cf. v. 48.'
  - type: text
    content: ']. '
  '45':
  - type: note
    content: la géhenne Mt 5.22n.
  - type: text
    content: 'Si ton pied doit causer ta chute, coupe-le ; mieux vaut pour toi entrer infirme dans la vie que d''avoir tes deux pieds et d''être jeté dans la géhenne [ '
  '46':
  - type: note
    content: 'Certains mss ajoutent  : dans le feu qui ne s''éteint pas, (46) là où leur ver ne meurt pas et où le feu ne s''éteint pas (cf. v. 48).'
  - type: text
    content: ']. '
  '47':
  - type: note
    content: Mt 5.29.
  - type: text
    content: 'Et si ton œil doit causer ta chute, arrache-le ; mieux vaut pour toi entrer borgne dans le royaume de Dieu que d''avoir deux yeux et d''être jeté dans la géhenne, '
  '48':
  - type: note
    content: Es 66.24+.
  - type: text
    content: 'où '
  - type: text
    content: leur ver ne meurt pas, et où le feu ne s'éteint pas
  - type: text
    content: .
  - type: heading
    content: Mt 5.13  ; Lc 14.34-35
  '49':
  - type: text
    content: ' '
  - type: note
    content: 'Certains mss portent, en plus ou à la place du texte de ce v.  : tout sacrifice sera salé de sel , cf. Lv 2.13.'
  - type: text
    content: 'Car chacun sera salé de feu. '
  '5':
  - type: note
    content: 'Rabbi  : titre dérivé du mot hébreu (et araméen) pour grand  ; on l''utilisait pour s''adresser aux maîtres ou docteurs de la loi 11.21 ; 14.45 ; forme dérivée (peut-être avec une nuance supplémentaire d''affection) en 10.51+ ; cf. Jn 1.38. –  dressons trois tentes  : cf. Ex 23.16 ; 34.22 ; Lv 23.27-44 ; Dt 16.13.'
  - type: text
    content: 'Pierre dit à Jésus : '
  - type: text
    content: Rabbi,
  - type: text
    content: ' il est bon que nous soyons ici ; dressons trois tentes, une pour toi, une pour Moïse et une pour Elie. '
  '50':
  - type: note
    content: 'perd sa saveur  : litt. devient non salé, c.-à-d. insipide ; cf. Mt 5.13n  ; Lc 14.34s ; Col 4.6. –  soyez en paix  : cf. Rm 12.18+.'
  - type: text
    content: Le sel est une bonne chose ; mais si le sel perd sa saveur, avec quoi l'assaisonnerez-vous ? Ayez du sel en vous-mêmes, et soyez en paix les uns avec les autres.
  '6':
  - type: note
    content: 'dire  : le même verbe grec est souvent rendu par répondre (14.40). –  peur  : Es 41.10+ ; Lc 1.13+ ; voir crainte.'
  - type: text
    content: 'Il ne savait que dire, car la peur les avait saisis. '
  '7':
  - type: note
    content: 'nuée 13.26+ ; Ex 13.21+ ; 19.16 ; 24.15-18 ; 40.34s ; Nb 9.18,22 ; 10.34 ; 2S 22.12 ; 1R 8.10-12 ; Ez 10.3s ; 2 Maccabées 2.8 : « (Au temps de la restauration d''Israël) la gloire du Seigneur apparaîtra avec la Nuée, comme elle se montra au temps de Moïse et lorsque Salomon pria pour que le saint lieu fût glorieusement consacré. » –  qui les couvrit…  : cf. Lc 1.35. –  mon Fils bien-aimé ou mon Fils, le bien-aimé  ; cf. 1.11+/ / ; 2P 1.17. –  Ecoutez-le Dt 18.15 ; Ac 3.22.'
  - type: text
    content: 'Survint une nuée qui les couvrit de son ombre, et de la nuée survint une voix : Celui-ci est mon Fils bien-aimé. Ecoutez-le ! '
  '8':
  - type: text
    content: Aussitôt ils regardèrent autour d'eux, mais ils ne virent plus personne que Jésus, seul avec eux.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 1.25+ ; 8.30-31n  ; cf. Dn 12.4,9.
  - type: text
    content: 'Comme ils descendaient de la montagne, il leur recommanda de ne raconter à personne ce qu''ils avaient vu jusqu''à ce que le Fils de l''homme se soit relevé d''entre les morts. '
