document_id: PSA.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Pourquoi m'as-tu abandonné ?
  - type: text
    content: ' '
  - type: note
    content: 'Biche de l''aurore  : c''est probablement le titre ou les premiers mots d''une mélodie connue ; certains y ont cependant vu une indication relative aux circonstances dans lesquelles le psaume était chanté (p. ex. pour les sacrifices du matin).'
  - type: text
    content: Du chef de chœur. Sur « Biche de l'aurore ». Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 71.5s ; 139.13-16 ; Es 44.2.
  - type: text
    content: Oui, tu m'as tiré du ventre maternel,
  - type: text
    content: tu m'as confié aux seins de ma mère ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'sur toi, j''ai été jeté  : l''expression fait peut-être allusion à un rite d''adoption, cf. Gn 30.3 ; 48.12 ; Jb 3.12. –  mon Dieu v. 2 ; cf. 18.3 ; 31.15 ; 63.2 ; 118.28 ; 140.7 ; 143.10.'
  - type: text
    content: sur toi, j'ai été jeté depuis le sein maternel,
  - type: text
    content: depuis le ventre de ma mère tu as été mon Dieu.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Ne t''éloigne pas 35.22 ; 38.22 ; 71.12. –  quand personne ne vient…  : cf. 107.12 ; Jb 30.13.'
  - type: text
    content: Ne t'éloigne pas de moi quand la détresse est proche,
  - type: text
    content: quand personne ne vient à mon secours !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'des bêtes  : le terme hébreu ainsi traduit signifie également puissants ou indomptables  ; il peut désigner des taureaux aussi bien que des chevaux ( étalons ), de même en 50.13 ; 68.31 ; cf. 78.25n  ; 132.2,5 ; Es 34.7 ; voir Gn 49.24n. –  du (litt. de ) Bashân , région de Transjordanie du Nord connue pour ses élevages de bovins ; cf. 68.16n,23n  ; Dt 32.14 ; Ez 39.18 ; Am 4.1.'
  - type: text
    content: Une multitude de taureaux m'entoure,
  - type: text
    content: des bêtes du Bashân me cernent.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ils ouvrent…  : cf. Jb 16.10. –  lion 7.3+ ; 17.12 ; 57.5 ; cf. 1P 5.8.'
  - type: text
    content: Ils ouvrent contre moi leur bouche,
  - type: text
    content: comme un lion qui déchiquette et rugit.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Images de faiblesse, de détresse et de souffrance physiques et morales ; cf. 102.4ss. –  comme de l''eau…  : cf. 2S 14.14 ; voir aussi Jos 7.5 ; Ez 7.17 ; 21.12. –  il fond Dt 20.8n  ; 2S 17.10n.'
  - type: text
    content: Je me répands comme de l'eau,
  - type: text
    content: et tous mes os se disloquent ;
  - type: text
    content: mon cœur est comme de la cire,
  - type: text
    content: il fond au milieu de mes entrailles.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'se dessèche…  : cf. 69.4. –  ma langue…  : cf. 137.6 ; Ez 3.26 ; Jb 29.10.'
  - type: text
    content: Ma force se dessèche comme l'argile,
  - type: text
    content: et ma langue s'attache à mon palais ;
  - type: text
    content: tu me réduis à la poussière de la mort.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 17.9 ; 31.14. –  des chiens v. 21 ; 59.7,15. –  une troupe mauvaise  : autres traductions une communauté mauvaise ; une bande de mauvais  ; même terme en 68.31 ; 74.2 ; 82.1 ; 86.14 ; 106.17s ; Ex 12.3n. –  ils me lacèrent  : traduction conjecturale ; le texte hébreu traditionnel se lirait naturellement comme un lion , ce qui s''accorde difficilement au contexte ; certains mss hébreux et des versions anciennes ont un verbe  : ils ont lié ou transpercé  ; cf. Lc 24.39 ; Jn 20.25. –  les bras et les jambes  : autre traduction les mains et les pieds.'
  - type: text
    content: Car des chiens m'entourent,
  - type: text
    content: une troupe mauvaise m'encercle,
  - type: text
    content: ils me lacèrent les bras et les jambes.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Je peux compter  : certains mss de LXX portent ils ont compté ou on compte. –  je leur suis offert en spectacle  : autres traductions ils me contemplent, ils prennent plaisir à me regarder  ; cf. 54.9n  ; Ab 12n  ; Mi 4.11n.'
  - type: text
    content: Je peux compter tous mes os.
  - type: text
    content: Eux, ils observent, je leur suis offert en spectacle ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: Mt 27.35 ; Mc 15.24 ; Lc 23.34 ; Jn 19.24. –  sort 16.5n.
  - type: text
    content: ils se partagent mes vêtements,
  - type: text
    content: ils tirent au sort ma tunique.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Mon Dieu…  : hébreu ’Eli, ’Eli, lama ‘azavtani  ; cf. 38.22 ; 71.18 ; Es 54.7 ; voir aussi Mt 27.46 et Mc 15.34 où apparaît une transcription de l''équivalent araméen ; sur le nom donné à Dieu, ’El (aussi au v. 11), voir Gn 21.33n. –  Pourquoi te tiens-tu si loin…  : traduction incertaine, litt. loin de mon salut (ou, en modifiant le texte hébreu traditionnel, de mon cri ) les (ou des ) paroles de mon rugissement (LXX de mes fautes ).'
  - type: text
    content: Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné ?
  - type: text
    content: Pourquoi te tiens-tu si loin ?
  - type: text
    content: Pourquoi ne me sauves-tu pas ?
  - type: text
    content: Pourquoi n'entends-tu pas mes cris ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. 38.23 ; 40.12,14 ; 70.2 ; 71.12 ; 109.26.
  - type: text
    content: 'Toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', ne t''éloigne pas !'
  - type: text
    content: Toi qui es ma force, viens vite à mon secours !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'de l''épée 144.10 ; Ex 18.4. –  ma vie  : litt. mon unique , sans doute au sens de mon unique bien  ; même formule en 35.17 ; le même terme est traduit par seul en 25.16 ; 68.7 ; il désigne un fils unique en Gn 22.2,12,16 ; cf. Jg 11.34. –  la griffe  : litt. la main  ; cf. 1S 17.37n.'
  - type: text
    content: Délivre-moi de l'épée,
  - type: text
    content: délivre ma vie de la griffe des chiens !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'de la gueule du lion v. 13-14+ ; cf. Dn 6.23,28 ; 2Tm 4.17. –  aurochs 92.11+. –  Tu m''as répondu  : cette exclamation, conforme au texte hébreu traditionnel, explique le passage à l''action de grâces dans les versets suivants ; autre traduction réponds-moi  ; LXX (sauve) mon humiliation ou ma misère.'
  - type: text
    content: Sauve-moi de la gueule du lion,
  - type: text
    content: et des cornes de l'aurochs !
  - type: text
    content: Tu m'as répondu !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Hé 2.12ss. –  à mes frères  : cf. Jn 20.17. –  au milieu de l''assemblée v. 26+ ; 26.12.'
  - type: text
    content: Je parlerai de ton nom à mes frères,
  - type: text
    content: au milieu de l'assemblée, je te louerai.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Vous qui craignez… 15.4+ ; cf. Ap 19.5.
  - type: text
    content: 'Vous qui craignez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', louez-le !'
  - type: text
    content: Vous tous, descendants de Jacob, glorifiez-le !
  - type: text
    content: Tremblez devant lui, vous tous, descendants d'Israël !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Hé 5.7. –  dédain  : le terme est habituellement traduit par horreur (Lv 7.21 ; 11.10ss). –  il ne se détourne pas de lui  : litt. il ne lui cache pas sa face  ; cf. 13.2+.'
  - type: text
    content: Car il n'a ni mépris ni dédain pour les peines du pauvre,
  - type: text
    content: il ne se détourne pas de lui ;
  - type: text
    content: quand celui-ci l'appelle au secours, il l'entend.
  '26':
  - type: text
    content: ' '
  - type: note
    content: dans l'assemblée v. 23+ ; 35.18 ; 40.10s ; cf. 107.32 ; 109.30 ; 111.1 ; 149.1. –  je m'acquitterai de mes vœux 50.14 ; 56.13 ; 61.9 ; 65.2 ; 66.13 ; 76.12 ; 116.14,18 ; Dt 23.22-24 ; Na 2.1 ; Ec 5.3s.
  - type: text
    content: C'est de toi que viennent mes louanges dans l'assemblée nombreuse ;
  - type: text
    content: je m'acquitterai de mes vœux devant ceux qui te craignent.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Cf. 68.4 ; 69.33 ; Es 65.13s. –  Les pauvres v. 25 ; 9.13n. –  ceux qui le cherchent 9.11+.
  - type: text
    content: Les pauvres mangeront, ils seront rassasiés ;
  - type: text
    content: 'ils loueront le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ceux qui le cherchent.'
  - type: text
    content: Que votre cœur vive à jamais !
  '28':
  - type: text
    content: ' '
  - type: note
    content: '72.8-11 ; 86.9 ; 96.7 ; Es 66.23 ; Jr 16.19 ; 1Ch 16.28. –  se souviendront du Seigneur  : autres traductions évoqueront le nom du Seigneur  ; invoqueront le Seigneur  ; cf. 6.6n.– les clans ou les familles  ; cf. 96.7 ; 107.41 ; Gn 12.3n.'
  - type: text
    content: 'Toutes les extrémités de la terre se souviendront du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et se tourneront vers lui ;'
  - type: text
    content: tous les clans des nations se prosterneront devant lui.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 47.8s ; 93.1 ; 103.19 ; Ab 21 ; Ap 11.15.
  - type: text
    content: 'Car le règne appartient au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: il domine sur les nations.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 88.2,10 ; Ha 1.2 ; Lm 3.8 ; cf. Lc 18.7.
  - type: text
    content: Mon Dieu, je crie le jour, et tu ne réponds pas ;
  - type: text
    content: je crie la nuit, je ne garde pas le silence.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Le texte hébreu des v. 30-32 est obscur. –  les puissants  : litt. les gras  ; certaines versions anciennes ont lu les affamés  ; on modifie parfois le texte hébreu traditionnel pour lire devant lui seul se prosterneront tous ceux qui dorment dans la terre (cf. Dn 12.2). –  ceux qui descendent… 28.1 ; 30.4 ; 88.5 ; 143.7 ; cf. Nb 16.33 ; Es 38.18 ; Ez 26.20s ; 31.14,16 ; 32.18,24s,29s ; Pr 1.12. –  ceux qui ne peuvent conserver leur vie  : traduction conjecturale ; litt. et il ne fera pas vivre son âme (6.4n) ; LXX mon âme vivra pour lui (31) et ma descendance lui rendra un culte.'
  - type: text
    content: Tous les puissants de la terre mangeront et se prosterneront aussi ;
  - type: text
    content: devant lui plieront tous ceux qui descendent dans la poussière,
  - type: text
    content: ceux qui ne peuvent conserver leur vie.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 48.14 ; 71.18s ; 78.6. –  La postérité  : le terme hébreu correspondant est habituellement traduit par descendance  ; avec un ms hébreu et LXX, certains modifient le texte hébreu traditionnel pour lire ma descendance . –  future  : sous-entendu dans le texte hébreu, explicite dans LXX.'
  - type: text
    content: La postérité le servira ;
  - type: text
    content: on parlera du Seigneur à la génération future.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'dire  : autre traduction raconter. –  au peuple qui naîtra 102.19. –  il (LXX le Seigneur ) a agi  : litt. il a fait  ; on pourrait aussi comprendre il l''a fait.'
  - type: text
    content: On viendra dire sa justice
  - type: text
    content: au peuple qui naîtra, car il a agi.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'tu es le Saint…  : on pourrait aussi comprendre tu es le Saint assis (comme juge, ou comme roi ; cf. Es 6.1-3 ; 57.15 ; Jr 3.17), les louanges (ou la louange , d''après plusieurs versions anciennes, ce qui pourrait correspondre à la leçon de certains mss hébreux) d''Israël  ; cf. Ps 71.6 ; Dt 10.21n  ; Jr 17.14.'
  - type: text
    content: Pourtant tu es le Saint,
  - type: text
    content: tu habites les louanges d'Israël.
  '5':
  - type: text
    content: En toi nos pères avaient mis leur confiance ;
  - type: text
    content: ils avaient confiance, et tu leur donnais d'échapper.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ils criaient… 3.5+ ; Jg 3.9,15. –  pas honte 25.2s,20 ; 31.2,18 ; 37.19 ; 119.6 ; Es 49.23 ; cf. Rm 5.5.
  - type: text
    content: Ils criaient vers toi et ils échappaient ;
  - type: text
    content: ils mettaient leur confiance en toi et ils n'avaient pas honte.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'un ver Es 41.14 ; Jb 25.6. –  outragé…  : autre traduction déshonoré parmi les humains et méprisé au sein du peuple  ; cf. 44.14 ; Es 53.3 ; Jb 17.6 ; Mc 9.12.'
  - type: text
    content: Quant à moi, je ne suis pas un homme, mais un ver,
  - type: text
    content: outragé par les humains et méprisé par le peuple.
  '8':
  - type: text
    content: ' '
  - type: note
    content: se moquent de moi Jb 12.4 ; Mt 27.29ss ; Lc 23.35. –  hochent la tête 44.15 ; 64.9n  ; 109.25 ; Jr 18.16n  ; Jb 16.4 ; Lm 2.15 ; Mt 27.39/ / ; Mc 15.29.
  - type: text
    content: Tous ceux qui me voient se moquent de moi,
  - type: text
    content: 'ils ouvrent les lèvres, hochent la tête :'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.3. –  Remets ton sort  : litt. roule , même verbe en 37.5 ; Pr 16.3. Des versions anciennes ont lu l''indicatif il a remis son sort  ; cf. Mt 27.43+. –  puisqu''il a pris plaisir en lui  : cf. 18.20 ; Nb 14.8 ; voir aussi Mc 1.11/ /.'
  - type: text
    content: 'Remets ton sort au '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Il lui donnera d'échapper,
  - type: text
    content: il le délivrera, puisqu'il a pris plaisir en lui !
