document_id: 1CH.22,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Ici sera la maison / l''autel  : autre traduction c''est ici la maison / l''autel  ; cf. Gn 28.17.'
  - type: text
    content: 'David dit : Ici sera la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, ici sera l''autel pour l''holocauste d''Israël.'
  - type: heading
    content: David prépare la construction du temple
  '10':
  - type: note
    content: Cf. 17.13s ; 2S 7.14+.
  - type: text
    content: 'C''est lui qui bâtira une maison pour mon nom. Lui, il sera mon fils, et je serai son père ; et j''affermirai pour toujours son trône royal en Israël. » '
  '11':
  - type: note
    content: 'que le Seigneur soit avec toi v. 16+. –  que tu réussisses…  : autre traduction que tu réussisses à bâtir…'
  - type: text
    content: 'Maintenant, mon fils, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit avec toi, afin que tu réussisses et que tu bâtisses la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, comme il l''a dit à ton sujet ! '
  '12':
  - type: note
    content: 'Cf. 1R 3.9-12 ; Ps 72.1s ; Jc 1.5. –  t''installe solidement  : le verbe correspondant (qui est rendu par donner au v. 13n) est souvent traduit, dans un sens analogue, par instituer.'
  - type: text
    content: 'Seulement, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te donne du bon sens et de l''intelligence, qu''il t''installe solidement sur Israël, pour que tu observes la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ! '
  '13':
  - type: note
    content: 'les prescriptions et les règles…  : cf. 1R 2.3 ; 2Ch 7.17 ; voir aussi Jos 1.7s ; Ps 1.1s ; voir aussi loi. –  données  : litt. ordonnées ou prescrites. –  Sois fort… 2S 10.12+. –  peur  : voir crainte.'
  - type: text
    content: 'Alors tu réussiras, si tu veilles à mettre en pratique les prescriptions et les règles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a données à Moïse pour Israël. Sois fort et courageux, n''aie pas peur, ne sois pas terrifié. '
  '14':
  - type: note
    content: 'Par ma peine  : on pourrait aussi comprendre dans mon humilité ou malgré ma pauvreté. – Les chiffres énormes mentionnés ici (plus de trois mille tonnes d''or et plus de trente mille tonnes d''argent ; voir mesures, poids et monnaies) sont propres aux Chroniques.'
  - type: text
    content: 'Par ma peine, j''ai préparé pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' cent mille talents d''or, un million de talents d''argent. Quant au bronze et au fer, on ne peut pas les peser tant il y en a. J''ai aussi préparé du bois et des pierres, et tu en ajouteras encore. '
  '15':
  - type: note
    content: Cf. Ex 35.30–36.7.
  - type: text
    content: 'Tu as auprès de toi un grand nombre d''ouvriers, des tailleurs de pierre, des sculpteurs sur pierre et sur bois, et des hommes habiles dans toutes sortes de travaux. '
  '16':
  - type: note
    content: 'on ne peut pas les compter  : cf. v. 3s. –  que le Seigneur soit avec toi ! v. 11 ; 1S 17.37+.'
  - type: text
    content: 'Quant à l''or, à l''argent, au bronze et au fer, on ne peut pas les compter. Agis, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit avec toi !'
  '17':
  - type: text
    content: 'David ordonna à tous les princes d''Israël de venir en aide à Salomon, son fils : '
  '18':
  - type: note
    content: le repos de tous côtés Jos 21.44 ; 2Ch 14.6 ; 15.15 ; 20.30 ; cf. 23.25 ; Dt 12.10 ; 25.19 ; Jos 1.13+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, n''est-il pas avec vous ? Ne vous a-t-il pas accordé le repos de tous côtés ? Il m''a livré les habitants du pays, et le pays est soumis devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et devant son peuple. '
  '19':
  - type: note
    content: 'Appliquez… votre cœur et votre âme (cf. Gn 1.20) à chercher…  : cf. 2Ch 12.14+ ; 30.19 ; voir aussi Ec 7.2,10 ; Siracide 16.24 : « Applique ton cœur à mes discours. » –  bâtissez  : litt. levez-vous et bâtissez  ; cf. Né 2.18. –  qui va être bâtie  : cf. 2Ch 2.'
  - type: text
    content: 'Appliquez maintenant votre cœur et votre âme à chercher le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu ; bâtissez le sanctuaire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, afin d''amener le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les ustensiles sacrés de Dieu dans la maison qui va être bâtie pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ordonna  : litt. dit . –  les immigrés (cf. Ex 12.48n) ou les étrangers  : ils pouvaient être aussi bien des descendants des anciens habitants de Canaan que des immigrés de fraîche date ; cf. 1R 5.27-31 ; 9.20-22/ /.'
  - type: text
    content: 'David ordonna de rassembler les immigrés qui étaient en Israël, et il chargea des tailleurs de pierre de couper des pierres de taille pour bâtir la maison de Dieu. '
  '3':
  - type: note
    content: 'qu''on ne pouvait le peser  : litt. sans poids  ; cf. v. 14 ; 1R 7.47 ; comparer avec qu''on ne pouvait compter au v. 4n.'
  - type: text
    content: 'David prépara aussi du fer en quantité pour les clous des battants des portes et pour les crampons, du bronze en telle quantité qu''on ne pouvait le peser, '
  '4':
  - type: note
    content: 'qu''on ne pouvait compter  : litt. sans nombre, cf. v. 3,16. –  les Sidoniens et les Tyriens  : habitants de Sidon et de Tyr, les deux principales villes de Phénicie (actuellement Saïda et Sour, au Liban). Les montagnes du Liban étaient réputées pour leur bois de cèdre  ; cf. 1R 5.20-24.'
  - type: text
    content: 'et du bois de cèdre qu''on ne pouvait compter, car les Sidoniens et les Tyriens avaient amené à David du bois de cèdre en quantité. '
  '5':
  - type: note
    content: 'jeune et délicat (cf. 2S 3.39 ; Pr 4.3n) : cf. 1Ch 29.1. – Voir nom. – David avait eu l''intention de construire lui-même un sanctuaire pour le Seigneur (voir chap. 17/ /), mais le prophète Nathan l''avait informé que ce serait son fils qui réaliserait ce projet (17.12). David s''efforce néanmoins de participer indirectement à cette construction. –  pour lui (Salomon) ou pour elle (la maison).'
  - type: text
    content: 'David disait : Salomon, mon fils, est jeune et délicat ; or la maison qui sera bâtie pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' élèvera son nom et sa splendeur très haut dans tous les pays ; c''est pourquoi je vais faire pour lui des préparatifs. Ainsi David fit quantité de préparatifs avant sa mort.'
  - type: heading
    content: David charge Salomon de construire le temple
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 17.11ss ; Ac 7.47.
  - type: text
    content: 'Il appela Salomon, son fils, et lui ordonna de bâtir une maison pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '7':
  - type: note
    content: 'à Salomon : Mon fils  : une autre tradition de lecture du texte hébreu propose à Salomon, son fils. –  j''avais à cœur…  : cf. 17.1s. –  bâtir… pour le nom… v. 19 ; 1R 3.2 ; 5.17,19 ; 8.17,20 ; 10.1 ; 2Ch 1.18 ; 2.3 ; 6.7,10.'
  - type: text
    content: 'David dit à Salomon : Mon fils, j''avais à cœur de bâtir une maison pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu. '
  '8':
  - type: note
    content: 'Tu as répandu beaucoup de sang  : cette raison, exposée ici en hébreu par deux formules légèrement différentes, ne figure ni au chap. 17 ni en 2S 7 ; en revanche, on la retrouve en 1Ch 28.3.'
  - type: text
    content: 'Mais la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''est parvenue : « Tu as répandu beaucoup de sang, tu as fait de grandes guerres ; tu ne bâtiras pas une maison pour mon nom, car tu as répandu devant moi beaucoup de sang sur la terre. '
  '9':
  - type: note
    content: 'Salomon  : le nom hébreu Shelomo est de la même racine que shalom (= paix) ; voir 28.5 ; 2S 12.24 ; 1R 1 ; 8.56. –  la paix et la tranquillité…  : cf. 1R 5.4s,18.'
  - type: text
    content: 'Il naît de toi un fils qui sera un homme de repos ; je lui accorderai le repos en le délivrant de tous les ennemis qui l''entourent : son nom sera Salomon, et j''accorderai la paix et la tranquillité à Israël pendant ses jours. '
