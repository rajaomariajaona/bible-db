        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ici sera la maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'autel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est ici la maison / l'autel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Gn 28.17.
      marker-yv: yv-n
    - type: text
      text: 'David dit : Ici sera la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu, ici sera l''autel pour l''holocauste d''Israël.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David prépare la construction du temple
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 17.13s ; 2S 7.14+.
      marker-yv: yv-n
    - type: text
      text: 'C''est lui qui bâtira une maison pour mon nom. Lui, il sera mon fils, et je serai son père ; et j''affermirai pour toujours son trône royal en Israël. » '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' soit avec toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 16+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que tu réussisses…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que tu réussisses à bâtir…
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, mon fils, que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' soit avec toi, afin que tu réussisses et que tu bâtisses la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, comme il l''a dit à ton sujet ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1R 3.9-12 ; Ps 72.1s ; Jc 1.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'installe solidement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe correspondant (qui est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'donner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') est souvent traduit, dans un sens analogue, par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: instituer.
      marker-yv: yv-n
    - type: text
      text: 'Seulement, que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' te donne du bon sens et de l''intelligence, qu''il t''installe solidement sur Israël, pour que tu observes la loi du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les prescriptions et les règles…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 2.3 ; 2Ch 7.17 ; voir aussi Jos 1.7s ; Ps 1.1s ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: données
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ordonnées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prescrites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sois fort… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2S 10.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors tu réussiras, si tu veilles à mettre en pratique les prescriptions et les règles que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a données à Moïse pour Israël. Sois fort et courageux, n''aie pas peur, ne sois pas terrifié. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Par ma peine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans mon humilité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: malgré ma pauvreté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Les chiffres énormes mentionnés ici (plus de trois mille tonnes d''or et plus de trente mille tonnes d''argent ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies) sont propres aux Chroniques.'
      marker-yv: yv-n
    - type: text
      text: 'Par ma peine, j''ai préparé pour la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' cent mille talents d''or, un million de talents d''argent. Quant au bronze et au fer, on ne peut pas les peser tant il y en a. J''ai aussi préparé du bois et des pierres, et tu en ajouteras encore. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ex 35.30–36.7.
      marker-yv: yv-n
    - type: text
      text: 'Tu as auprès de toi un grand nombre d''ouvriers, des tailleurs de pierre, des sculpteurs sur pierre et sur bois, et des hommes habiles dans toutes sortes de travaux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on ne peut pas les compter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 3s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' soit avec toi ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11 ; 1S 17.37+.
      marker-yv: yv-n
    - type: text
      text: 'Quant à l''or, à l''argent, au bronze et au fer, on ne peut pas les compter. Agis, et que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' soit avec toi !'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'David ordonna à tous les princes d''Israël de venir en aide à Salomon, son fils : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le repos de tous côtés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 21.44 ; 2Ch 14.6 ; 15.15 ; 20.30 ; cf. 23.25 ; Dt 12.10 ; 25.19 ; Jos 1.13+.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, n''est-il pas avec vous ? Ne vous a-t-il pas accordé le repos de tous côtés ? Il m''a livré les habitants du pays, et le pays est soumis devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et devant son peuple. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Appliquez… votre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' et votre âme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Gn 1.20) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à chercher…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Ch 12.14+ ; 30.19 ; voir aussi Ec 7.2,10 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.24 : « Applique ton cœur à mes discours. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bâtissez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: levez-vous et bâtissez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Né 2.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui va être bâtie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Ch 2.'
      marker-yv: yv-n
    - type: text
      text: 'Appliquez maintenant votre cœur et votre âme à chercher le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu ; bâtissez le sanctuaire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu, afin d''amener le coffre de l''alliance du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et les ustensiles sacrés de Dieu dans la maison qui va être bâtie pour le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ordonna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les immigrés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Ex 12.48
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les étrangers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ils pouvaient être aussi bien des descendants des anciens habitants de Canaan que des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'immigrés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de fraîche date ; cf. 1R 5.27-31 ; 9.20-22/ /.
      marker-yv: yv-n
    - type: text
      text: 'David ordonna de rassembler les immigrés qui étaient en Israël, et il chargea des tailleurs de pierre de couper des pierres de taille pour bâtir la maison de Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'on ne pouvait le peser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sans poids
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 14 ; 1R 7.47 ; comparer avec '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''on ne pouvait compter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David prépara aussi du fer en quantité pour les clous des battants des portes et pour les crampons, du bronze en telle quantité qu''on ne pouvait le peser, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'on ne pouvait compter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sans nombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 3,16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Sidoniens et les Tyriens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : habitants de Sidon et de Tyr, les deux principales villes de Phénicie (actuellement Saïda et Sour, au Liban). Les montagnes du Liban étaient réputées pour leur '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bois de cèdre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1R 5.20-24.'
      marker-yv: yv-n
    - type: text
      text: 'et du bois de cèdre qu''on ne pouvait compter, car les Sidoniens et les Tyriens avaient amené à David du bois de cèdre en quantité. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jeune et délicat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 2S 3.39 ; Pr 4.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : cf. 1Ch 29.1. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '– David avait eu l''intention de construire lui-même un sanctuaire pour le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (voir chap. 17/ /), mais le prophète Nathan l''avait informé que ce serait son fils qui réaliserait ce projet (17.12). David s''efforce néanmoins de participer indirectement à cette construction. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Salomon) ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour elle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (la maison).
      marker-yv: yv-n
    - type: text
      text: 'David disait : Salomon, mon fils, est jeune et délicat ; or la maison qui sera bâtie pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' élèvera son nom et sa splendeur très haut dans tous les pays ; c''est pourquoi je vais faire pour lui des préparatifs. Ainsi David fit quantité de préparatifs avant sa mort.'
  - type: usfm
