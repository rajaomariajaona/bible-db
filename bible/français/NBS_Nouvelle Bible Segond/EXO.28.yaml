        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''Aaron'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quant à toi, fais approcher de toi, d''entre les Israélites, Aaron, ton frère, et ses fils avec lui, afin qu''il exerce pour moi le sacerdoce : Aaron et les fils d''Aaron, Nadab, Abihou, Eléazar et Itamar.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les vêtements du grand prêtre
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''après l''ordre de leur naissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le mot hébreu correspondant est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: généalogie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 6.16+) Gn 35.23-26.'
      marker-yv: yv-n
    - type: text
      text: 'six de leurs noms sur la première pierre, et les noms des six autres sur la seconde pierre, d''après l''ordre de leur naissance. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sceau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 38.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: montures
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme correspondant, qui n''apparaît que dans ce contexte, semble désigner le creux destiné à recevoir une pierre enchâssée.'
      marker-yv: yv-n
    - type: text
      text: 'Tu graveras sur les deux pierres les noms des fils d''Israël ; ce sera un ouvrage de lapidaire, comme une gravure de sceau ; tu les enchâsseras dans des montures d''or. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: évocation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'souvenir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 29 ; 3.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 30.16 ; 34.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Aaron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu mettras les deux pierres sur les épaulettes de l''éphod, comme des pierres d''évocation pour les fils d''Israël ; Aaron portera leurs noms devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' sur ses deux épaules, en évocation. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tu feras des montures d''or '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'or '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.11+.
      marker-yv: yv-n
    - type: text
      text: et deux chaînettes d'or pur, en forme de cordes tressées ; tu fixeras aux montures les chaînettes tressées.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le pectoral
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pectoral '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jugement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot correspondant, souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'droit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'règle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (15.25
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), désigne probablement ici la réponse de Dieu aux interrogations des fidèles (voir v. 30).
      marker-yv: yv-n
    - type: text
      text: 'Tu feras le pectoral du jugement ; ce sera un ouvrage d''artisan. Tu le feras de la même façon que l''éphod : d''or, de pourpre violette et rouge, d''écarlate et de fin lin retors. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un empan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 22 cm.'
      marker-yv: yv-n
    - type: text
      text: 'Il sera carré et double ; sa longueur sera d''un empan, et sa largeur d''un empan. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L'identification des diverses pierres précieuses ou semi-précieuses désignées par les termes hébreux qui apparaissent ici est incertaine. Cf. Ez 28.13s ; Ap 21.19s.
      marker-yv: yv-n
    - type: text
      text: 'Tu y sertiras une garniture de pierres, quatre rangées de pierres : première rangée, une sardoine, une topaze, une émeraude ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'deuxième rangée, une escarboucle, un lapis-lazuli, un diamant ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'troisième rangée, une opale, une agate, une améthyste ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vêtements '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '39.1-31 ; Lv 8.7-9,13 ; cf. Gn 35.2 ; Ex 19.10 ; Za 3.3-5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'afin de marquer son rang et sa dignité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et comme parure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour (la) '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: ' et (la) splendeur'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 40.'
      marker-yv: yv-n
    - type: text
      text: 'Tu feras pour Aaron, ton frère, des vêtements sacrés, afin de marquer son rang et sa dignité. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'quatrième rangée, une chrysolithe, un onyx, un jaspe. Ces pierres seront enchâssées dans leurs montures d''or. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Sagesse
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.24 : « Sur la longue robe de l''éphod était figuré l''univers entier, les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' glorieux des pères étaient gravés sur les quatre rangées de pierres et ta majesté sur le diadème de sa tête. » Cf. Ap 21.14.'
      marker-yv: yv-n
    - type: text
      text: 'Les pierres seront aux noms des fils d''Israël : il y en aura douze, d''après leurs noms ; elles seront gravées comme des sceaux, chacune avec le nom de l''une des douze tribus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'or '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.11+.
      marker-yv: yv-n
    - type: text
      text: 'Tu feras sur le pectoral des chaînettes d''or pur, en forme de cordes tressées. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 23-28 sont absents de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: . Voir v. 29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu feras deux anneaux d''or sur le pectoral ; tu mettras ces deux anneaux aux deux extrémités du pectoral. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tu mettras les deux cordes d''or dans les deux anneaux aux extrémités du pectoral ; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'tu mettras les deux autres extrémités des deux cordes aux deux montures placées sur les épaulettes de l''éphod, par devant. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tu feras encore deux anneaux d''or que tu placeras aux deux extrémités du pectoral, sur le bord intérieur appliqué contre l''éphod. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tu feras deux autres anneaux d''or et tu les mettras au bas des deux épaulettes de l''éphod, par devant, près de la jointure, au-dessus de la ceinture de l''éphod. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Avec un cordon de pourpre violette, on fixera le pectoral par ses anneaux aux anneaux de l''éphod, pour que le pectoral soit sur la ceinture de l''éphod et qu''il ne puisse pas se séparer de l''éphod. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Aaron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'évocation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: . – LXX ajoute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tu mettras les chaînettes sur le pectoral du jugement ; tu mettras les cordes aux deux extrémités du pectoral, et tu mettras les deux montures sur les deux épaulettes de l'éphod, sur le devant.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Aaron entrera dans le sanctuaire, il portera sur son cœur les noms des fils d''Israël, gravés sur le pectoral du jugement ; ce sera une évocation constante devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: habiles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sages de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même en 35.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; la même expression est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Jb 9.4 ; 37.24 ; Pr 10.8 ; 11.29s ; 16.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''un souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd''un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 31.3 ; 35.31 ; Gn 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 41.38.'
      marker-yv: yv-n
    - type: text
