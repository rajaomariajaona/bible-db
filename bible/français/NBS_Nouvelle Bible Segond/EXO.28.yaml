      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Hé 5.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fais approcher de toi
      - type: usfm
        marker: ft
        children:
        - type: text
