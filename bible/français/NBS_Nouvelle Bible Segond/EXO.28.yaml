document_id: EXO.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le grand prêtre et les prêtres
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Hé 5.4. –  fais approcher de toi  : autre traduction présente devant toi  ; cf. 12.48n  ; 29.3s,8,10,19 ; Lv 1.2n. –  fils d''Aaron  : voir prêtre.'
  - type: text
    content: 'Quant à toi, fais approcher de toi, d''entre les Israélites, Aaron, ton frère, et ses fils avec lui, afin qu''il exerce pour moi le sacerdoce : Aaron et les fils d''Aaron, Nadab, Abihou, Eléazar et Itamar.'
  - type: heading
    content: Les vêtements du grand prêtre
  '10':
  - type: note
    content: d'après l'ordre de leur naissance (le mot hébreu correspondant est aussi traduit par généalogie, 6.16+) Gn 35.23-26.
  - type: text
    content: 'six de leurs noms sur la première pierre, et les noms des six autres sur la seconde pierre, d''après l''ordre de leur naissance. '
  '11':
  - type: note
    content: 'sceau Gn 38.18n. –  montures  : le terme correspondant, qui n''apparaît que dans ce contexte, semble désigner le creux destiné à recevoir une pierre enchâssée.'
  - type: text
    content: 'Tu graveras sur les deux pierres les noms des fils d''Israël ; ce sera un ouvrage de lapidaire, comme une gravure de sceau ; tu les enchâsseras dans des montures d''or. '
  '12':
  - type: note
    content: 'évocation  : autre traduction souvenir v. 29 ; 3.15n  ; 12.14n  ; 30.16 ; 34.19n. –  Aaron  : voir prêtre.'
  - type: text
    content: 'Tu mettras les deux pierres sur les épaulettes de l''éphod, comme des pierres d''évocation pour les fils d''Israël ; Aaron portera leurs noms devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur ses deux épaules, en évocation. '
  '13':
  - type: text
    content: 'Tu feras des montures d''or '
  '14':
  - type: note
    content: or pur 25.11+.
  - type: text
    content: et deux chaînettes d'or pur, en forme de cordes tressées ; tu fixeras aux montures les chaînettes tressées.
  - type: heading
    content: Le pectoral
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'pectoral 25.7. –  jugement  : le mot correspondant, souvent traduit par droit ou règle (15.25n), désigne probablement ici la réponse de Dieu aux interrogations des fidèles (voir v. 30).'
  - type: text
    content: 'Tu feras le pectoral du jugement ; ce sera un ouvrage d''artisan. Tu le feras de la même façon que l''éphod : d''or, de pourpre violette et rouge, d''écarlate et de fin lin retors. '
  '16':
  - type: note
    content: 'un empan  : environ 22 cm.'
  - type: text
    content: 'Il sera carré et double ; sa longueur sera d''un empan, et sa largeur d''un empan. '
  '17':
  - type: note
    content: L'identification des diverses pierres précieuses ou semi-précieuses désignées par les termes hébreux qui apparaissent ici est incertaine. Cf. Ez 28.13s ; Ap 21.19s.
  - type: text
    content: 'Tu y sertiras une garniture de pierres, quatre rangées de pierres : première rangée, une sardoine, une topaze, une émeraude ; '
  '18':
  - type: text
    content: 'deuxième rangée, une escarboucle, un lapis-lazuli, un diamant ; '
  '19':
  - type: text
    content: 'troisième rangée, une opale, une agate, une améthyste ; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'vêtements 39.1-31 ; Lv 8.7-9,13 ; cf. Gn 35.2 ; Ex 19.10 ; Za 3.3-5. –  sacrés  : voir saint. –  afin de marquer son rang et sa dignité (autre traduction et comme parure ) : litt. pour (la) gloire et (la) splendeur , de même au v. 40.'
  - type: text
    content: 'Tu feras pour Aaron, ton frère, des vêtements sacrés, afin de marquer son rang et sa dignité. '
  '20':
  - type: text
    content: 'quatrième rangée, une chrysolithe, un onyx, un jaspe. Ces pierres seront enchâssées dans leurs montures d''or. '
  '21':
  - type: note
    content: 'Cf. Sagesse 18.24 : « Sur la longue robe de l''éphod était figuré l''univers entier, les noms glorieux des pères étaient gravés sur les quatre rangées de pierres et ta majesté sur le diadème de sa tête. » Cf. Ap 21.14.'
  - type: text
    content: 'Les pierres seront aux noms des fils d''Israël : il y en aura douze, d''après leurs noms ; elles seront gravées comme des sceaux, chacune avec le nom de l''une des douze tribus. '
  '22':
  - type: note
    content: or pur 25.11+.
  - type: text
    content: 'Tu feras sur le pectoral des chaînettes d''or pur, en forme de cordes tressées. '
  '23':
  - type: note
    content: Les v. 23-28 sont absents de LXX. Voir v. 29n.
  - type: text
    content: 'Tu feras deux anneaux d''or sur le pectoral ; tu mettras ces deux anneaux aux deux extrémités du pectoral. '
  '24':
  - type: text
    content: 'Tu mettras les deux cordes d''or dans les deux anneaux aux extrémités du pectoral ; '
  '25':
  - type: text
    content: 'tu mettras les deux autres extrémités des deux cordes aux deux montures placées sur les épaulettes de l''éphod, par devant. '
  '26':
  - type: text
    content: 'Tu feras encore deux anneaux d''or que tu placeras aux deux extrémités du pectoral, sur le bord intérieur appliqué contre l''éphod. '
  '27':
  - type: text
    content: 'Tu feras deux autres anneaux d''or et tu les mettras au bas des deux épaulettes de l''éphod, par devant, près de la jointure, au-dessus de la ceinture de l''éphod. '
  '28':
  - type: text
    content: 'Avec un cordon de pourpre violette, on fixera le pectoral par ses anneaux aux anneaux de l''éphod, pour que le pectoral soit sur la ceinture de l''éphod et qu''il ne puisse pas se séparer de l''éphod. '
  '29':
  - type: note
    content: 'Aaron  : voir prêtre. – Voir cœur. –  évocation v. 12n. – LXX ajoute  : Tu mettras les chaînettes sur le pectoral du jugement ; tu mettras les cordes aux deux extrémités du pectoral, et tu mettras les deux montures sur les deux épaulettes de l''éphod, sur le devant.'
  - type: text
    content: 'Lorsque Aaron entrera dans le sanctuaire, il portera sur son cœur les noms des fils d''Israël, gravés sur le pectoral du jugement ; ce sera une évocation constante devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: note
    content: 'habiles  : litt. sages de cœur  ; de même en 35.10n  ; la même expression est traduite par sage en Jb 9.4 ; 37.24 ; Pr 10.8 ; 11.29s ; 16.21. –  d''un souffle ou d''un esprit, cf. 31.3 ; 35.31 ; Gn 1.2n  ; 41.38.'
  - type: text
    content: 'Tu parleras à tous ceux qui sont habiles, à ceux que j''ai remplis d''un souffle de sagesse ; ils feront les vêtements d''Aaron, afin qu''il soit consacré et qu''il exerce pour moi le sacerdoce. '
  '30':
  - type: note
    content: 'pectoral du jugement v. 15n. –  l''ourim et le toummim  : autre traduction les ourim et les toummim (les mots sont au pluriel, mais en hébreu le pluriel peut avoir d''autres sens que la pluralité des objets) ; les mots ourim et toummim commencent respectivement par la première et la dernière lettre de l''alphabet hébreu, ’aleph et taw  ; dans leur vocalisation traditionnelle ils signifient peut-être lumière(s), ou évidence (ainsi traduit LXX), et perfection(s), ou sainteté, vérité (ainsi LXX). Il s''agit en tout cas de sorts sacrés (cf. Ez 21.26 ; Pr 16.33) utilisés pour consulter le Seigneur  ; le Siracide (45.10) les appelle « l''oracle de vérité ». Ils consistaient sans doute en un ou plusieurs petits objets (cailloux ? bâtonnets ? flèches ?) pouvant tenir dans la poche formée par le pectoral (voir cependant 1S 14.3,18n). Tout porte à croire qu''ils permettaient une réponse positive ou négative (cf. Jos 7.13s ; Jg 18.5s ; 20.26ss ; 1S 10.20s ; 14.41s ; 23.1s ; 30.8 ; 2S 5.19), mais aussi un refus de réponse (peut-être par une sortie simultanée du oui et du non ; cf. 1S 14.36s ; 28.6) ; cf. Lv 8.8 ; Nb 27.21 ; Dt 33.8 ; 1S 14.41n  ; Esd 2.63 ; Né 7.65 ; voir aussi Ex 25.7n. Pour Flavius Josèphe, l''oracle reposait sur l''interprétation, par le prêtre, des jeux de lumière sur les pierres précieuses qui ornaient le pectoral.'
  - type: text
    content: 'Tu joindras au pectoral du jugement l''ourim et le toummim, et ils seront sur le cœur d''Aaron lorsqu''il entrera devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ainsi Aaron portera constamment sur son cœur le jugement des fils d''Israël devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Les autres vêtements sacrés
  '31':
  - type: text
    content: ' '
  - type: note
    content: robe de l'éphod 39.22-26.
  - type: text
    content: 'Tu feras la robe de l''éphod tout entière de pourpre violette ; '
  '32':
  - type: note
    content: 'ourlet  : le mot signifie habituellement lèvre. – Le mot traduit par vêtement de cuir tressé n''apparaît qu''ici et en 39.23 ; son sens n''est pas absolument certain (cuirasse  ? cotte de mailles  ?) ; LXX un assemblage tissé avec lui. –  afin que…  : litt. il ne se déchirera pas  ; cf. Lv 21.10 ; Jn 19.23s.'
  - type: text
    content: 'il y aura au milieu une ouverture pour la tête ; tout autour de cette ouverture il y aura un ourlet, ouvrage de tisserand, comme l''ouverture d''un vêtement de cuir tressé, afin que la robe ne se déchire pas. '
  '33':
  - type: note
    content: 'de la robe  : sous-entendu dans le texte.'
  - type: text
    content: 'Tu feras sur tout le tour, au bas de la robe, des grenades de pourpre violette et rouge et d''écarlate ; et, entre elles, des clochettes d''or, sur tout le tour ; '
  '34':
  - type: text
    content: 'une clochette d''or et une grenade, une clochette d''or et une grenade, sur tout le tour, au bas de la robe. '
  '35':
  - type: note
    content: 'Aaron  : voir prêtre. –  on l''entendra  : litt. on entendra son bruit (dans d''autres contextes, le mot signifie également voix). –  il ne mourra pas  : cf. 19.11-13 ; 20.19 ; voir aussi 24.11 ; 33.20.'
  - type: text
    content: 'Aaron s''en revêtira pour officier : on l''entendra quand il entrera dans le sanctuaire, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et quand il en sortira ; ainsi il ne mourra pas.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'lame  : autre traduction (selon le sens habituel du mot hébreu) fleur  ; LXX feuille (le même mot traduit le terme hébreu correspondant à diadème , p. ex. en 29.6n) ; cf. 39.30s. –  or pur 25.11+. –  Consacré…  : autre traduction sacré (ou saint ) pour le Seigneur  ; cf. v. 21n  ; Za 14.20 ; Jn 17.19. –  au Seigneur (YHWH) 3.14n-15n  ; voir noms divins.'
  - type: text
    content: 'Tu feras une lame d''or pur, et tu y graveras, d''une gravure de sceau : Consacré au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '37':
  - type: text
    content: 'Tu la placeras avec un cordon de pourpre violette sur le turban, par devant. '
  '38':
  - type: note
    content: 'sera chargé ou portera, enlèvera  ; cf. 10.17n  ; Gn 4.7n,13n, même verbe hébreu ; cf. Ez 4.4n. –  des fautes…  : litt. des fautes des (choses) sacrées, c.-à-d. les fautes commises dans le cadre du culte ; cf. Lv 4–5 ; voir aussi Nb 18.1n  ; voir aussi péché. –  offrandes  : voir sacrifices. –  pour qu''ils soient agréés  : autre traduction pour qu''il leur soit favorable  ; cf. Lv 1.3s etc.'
  - type: text
    content: 'Elle sera sur le front d''Aaron ; Aaron sera chargé des fautes commises envers les offrandes que les Israélites consacrent, envers tous leurs dons sacrés ; elle sera constamment sur son front devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour qu''ils soient agréés.'
  '39':
  - type: text
    content: ' '
  - type: note
    content: 39.27-29 ; voir Lv 16.4n.
  - type: text
    content: Tu confectionneras la tunique de fin lin ; tu feras un turban de fin lin, et tu feras une écharpe ; ce sera un ouvrage de brodeur.
  - type: heading
    content: Les vêtements des prêtres
  '4':
  - type: text
    content: 'Voici les vêtements qu''ils feront : un pectoral, un éphod, une robe, une tunique brodée, un turban et une écharpe. Ils feront des vêtements sacrés pour Aaron, ton frère, et pour ses fils, afin qu''ils exercent pour moi le sacerdoce.'
  - type: heading
    content: L'éphod
  '40':
  - type: text
    content: ' '
  - type: note
    content: Voir fils. –  tiares ou bonnets  ; on ignore en fait la forme de ces coiffures ; elles étaient peut-être coniques comme celles des prêtres romains et syriens. –  leur rang et leur dignité v. 2n.
  - type: text
    content: 'Pour les fils d''Aaron tu feras des tuniques ; tu leur feras des écharpes, tu leur feras des tiares, pour marquer leur rang et leur dignité. '
  '41':
  - type: note
    content: 'Tu leur conféreras l''onction  : cf. 29.7. –  tu les investiras  : litt. tu rempliras leur main, de même dans la suite. Cette expression s''applique aux prêtres qui entraient en fonctions, peut-être à cause des offrandes qu''on plaçait dans leurs mains pour la première fois (cf. 29.24 ; Lv 7.37n  ; 8.33n  ; Jg 17.5-12 ; 1R 13.33 ; Ez 43.26n).'
  - type: text
    content: 'Tu en revêtiras Aaron, ton frère, et ses fils avec lui. Tu leur conféreras l''onction, tu les investiras, tu les consacreras, et ils exerceront pour moi le sacerdoce. '
  '42':
  - type: note
    content: '20.26n. –  leur nudité  : litt. chair de nudité.'
  - type: text
    content: 'Fais-leur des caleçons de lin, pour couvrir leur nudité ; ceux-ci iront depuis les reins jusqu''aux cuisses. '
  '43':
  - type: note
    content: 'faute  : voir péché. –  prescription perpétuelle 12.14+ ; voir loi.'
  - type: text
    content: Aaron et ses fils les porteront quand ils entreront dans la tente de la Rencontre ou quand ils s'approcheront de l'autel pour officier dans le sanctuaire ; ainsi ils ne se chargeront pas d'une faute, et ils ne mourront pas. C'est une prescription perpétuelle pour Aaron et pour sa descendance après lui.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '25.4n. –  fin lin  : cf. Ez 44.17s.'
  - type: text
    content: 'Ils prendront l''or, la pourpre violette et rouge, l''écarlate et le fin lin. '
  '6':
  - type: note
    content: éphod 25.7+.
  - type: text
    content: 'Ils feront l''éphod d''or, de pourpre violette et rouge, d''écarlate et de fin lin retors ; ce sera un ouvrage d''artisan. '
  '7':
  - type: note
    content: 'épaulettes  : autre traduction bretelles.'
  - type: text
    content: 'Il y aura deux épaulettes attachées à ses deux extrémités pour le fixer. '
  '8':
  - type: note
    content: 'qui l''entoure  : autre traduction qui le recouvre  ; le terme correspondant est apparenté à celui qui est transcrit éphod  ; en Es 30.22 il désigne un placage d''or sur une statue.'
  - type: text
    content: 'La ceinture qui l''entoure sera faite de la même façon, d''une seule pièce avec lui : d''or, de pourpre violette et rouge, d''écarlate et de fin lin retors. '
  '9':
  - type: note
    content: 'V. 21n. –  les noms des fils d''Israël  : autre traduction les noms des Israélites, selon la traduction habituelle de l''expression. Mais ici il s''agit des noms des douze tribus d''Israël (v. 21), correspondant à ceux des fils de Jacob (= Israël, cf. Gn 32.29n).'
  - type: text
    content: 'Tu prendras les deux pierres d''onyx et tu y graveras les noms des fils d''Israël : '
