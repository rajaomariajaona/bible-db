      - type: usfm
        marker: fqa
        children:
        - type: text
          text: présente devant toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 12.48
        - type: usfm
