      marker-yv: yv-n
    - type: text
      text: Il prit tout l'or et l'argent, ainsi que tous les objets qui se trouvaient dans la maison de Dieu, chez Obed-Edom, et les trésors de la maison du roi ; il prit aussi des otages, puis il retourna à Samarie.
