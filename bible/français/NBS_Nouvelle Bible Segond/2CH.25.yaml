        - type: text
          text: si tu (les) embauches pour être renforcés par eux…
      marker-yv: yv-n
    - type: text
      text: 'Si tu vas avec eux, quand bien même tu serais fort au combat, Dieu te fera trébucher devant l''ennemi, car Dieu a le pouvoir de secourir et de faire trébucher. '
  '9':
  - type: usfm
