        children:
        - type: text
          text: porte d'Ephraïm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme celle du Tournant, sont situées dans la partie nord de la ville, la porte d''Ephraïm au nord-ouest et la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte du Tournant '
      - type: usfm
        marker: ft
        children:
        - type: text
