        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Joas, roi d''Israël, fit prisonnier à Beth-Shémesh Amatsia, roi de Juda, fils de Joas, fils de Joachaz. Il l''amena à Jérusalem et ouvrit une brèche de quatre cents coudées dans la muraille de Jérusalem depuis la porte d''Ephraïm jusqu''à la porte du Tournant. '
