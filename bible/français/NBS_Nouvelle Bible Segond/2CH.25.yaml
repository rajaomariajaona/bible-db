document_id: 2CH.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'Amatsia
  - type: heading
    content: 2R 14.1-7
  - type: text
    content: ' '
  - type: note
    content: 'Yehoaddân  : cf. 2R 14.2n.'
  - type: text
    content: 'Amatsia devint roi à l''âge de vingt-cinq ans ; il régna vingt-neuf ans à Jérusalem. Le nom de sa mère était Yehoaddân ; elle était de Jérusalem. '
  '10':
  - type: note
    content: 'se mirent dans une grande colère  : cf. 1S 11.6+ ; expression proche pour colère ardente, voir note suivante. –  chez elles / chez eux  : litt. à leur lieu. –  colère ardente  : même expression hébraïque en Ex 11.8 ; 1S 20.34 ; Es 7.4 ; Lm 2.3.'
  - type: text
    content: Alors Amatsia se sépara des troupes qui lui étaient venues d'Ephraïm ; il les renvoya chez elles. Mais les hommes se mirent dans une grande colère contre Juda, et ils s'en retournèrent chez eux dans une colère ardente.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 14.7. –  Amatsia devint fort ; il conduisit son peuple  : malgré le renvoi du contingent d''Israël, le roi de Juda remporte une victoire, signe de l''accomplissement de la promesse de l''homme de Dieu. –  hommes  : sous-entendu dans le texte, de même au v. 13. –  Séir  : nom ancien de la région qui s''étend au sud de la mer Morte, jusqu''au golfe d''Aqaba ; la désignation fils de Séir est devenue synonyme d’ Edomites  ; cf. Gn 14.6n  ; 36.8s,20s ; 1Ch 1.38.'
  - type: text
    content: 'Amatsia devint fort ; il conduisit son peuple. Il alla dans la vallée du Sel et battit dix mille hommes des fils de Séir. '
  '12':
  - type: note
    content: 'd''un rocher  : litt. du rocher ou de la Roche, la Roche (hébreu Séla) étant aussi le nom d''une ville édomite ; cf. Jg 1.36n  ; 2R 14.7.'
  - type: text
    content: Les fils de Juda capturèrent vivants dix mille d'entre eux qu'ils menèrent au sommet d'un rocher. Ils les précipitèrent du sommet du rocher, et tous s'écrasèrent.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 11. –  depuis Samarie jusqu''à Beth-Horôn  : Samarie étant la capitale du royaume du Nord, sa mention dans ce contexte est surprenante ; certains ont pensé discerner une altération du texte et ont suggéré d''autres possibilités  : Migrôn (cf. Es 10.28) ou encore Tsemaraïm (2Ch 13.4), ville disputée entre les deux royaumes. Beth-Horôn était située non loin de la frontière qui sépare les deux royaumes, à une vingtaine de kilomètres au nord-ouest de Jérusalem.'
  - type: text
    content: Cependant, les gens de la troupe qu'Amatsia avait renvoyés pour qu'ils n'aillent pas au combat avec lui se répandirent dans les villes de Juda depuis Samarie jusqu'à Beth-Horôn. Ils tuèrent trois mille hommes et firent un grand pillage.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 14-16 sont propres aux Chroniques et expliquent le reste du récit (cf. v. 20). –  il en fit ses propres dieux  : litt. il les fit tenir debout pour lui comme dieux.'
  - type: text
    content: 'Lorsque Amatsia fut de retour après la défaite des Edomites, il fit venir les dieux des fils de Séir et il en fit ses propres dieux ; il se prosterna devant eux et leur offrit de l''encens. '
  '15':
  - type: note
    content: 'il lui envoya un prophète  : cf. 24.18s. –  cherché les dieux, c.-à-d. rendu un culte aux dieux ou encore consulté les dieux. –  les dieux de ce peuple  : plusieurs versions anciennes lisent les dieux des nations.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) se mit en colère contre Amatsia ; il lui envoya un prophète, qui lui dit : Pourquoi as-tu cherché les dieux de ce peuple, alors qu''ils n''ont pu délivrer leur peuple de ta main ? '
  '16':
  - type: note
    content: 'Finis-en  : litt. arrête pour toi. –  formé le projet  : le terme ainsi traduit est apparenté aux mots traduits par conseiller et conseil  ; autre forme du même verbe au v. 17 (tenir conseil) ; cf. Es 5.19n.'
  - type: text
    content: 'Comme il parlait, Amatsia lui dit : T''avons-nous nommé conseiller du roi ? Finis-en ! Pourquoi devrait-on te frapper ? Le prophète finit en disant : Je sais que Dieu a formé le projet de te détruire, puisque tu as fait cela et que tu n''as pas écouté mon conseil.'
  - type: heading
    content: Amatsia battu par Joas, roi d'Israël
  - type: heading
    content: 2R 14.8-14
  '17':
  - type: text
    content: 'Après avoir tenu conseil, Amatsia, roi de Juda, fit dire à Joas, fils de Joachaz, fils de Jéhu, roi d''Israël : Rencontrons-nous ! '
  '18':
  - type: note
    content: Voir 2R 14.9n.
  - type: text
    content: 'Joas, roi d''Israël, fit dire à Amatsia, roi de Juda : L''ajonc du Liban fit dire au cèdre du Liban : Donne ta fille pour femme à mon fils ! Mais un animal sauvage du Liban passa et piétina l''ajonc. '
  '19':
  - type: note
    content: Ton cœur s'élève 2R 14.10+.
  - type: text
    content: 'Tu as battu Edom, dis-tu. Ton cœur s''élève et tu te glorifies. Reste chez toi maintenant. Pourquoi aller au-devant du malheur ? Tu tomberas, toi, et Juda avec toi ! '
  '2':
  - type: note
    content: 'ce qui convenait…  : cf. 20.32n. –  non pas toutefois d''un cœur entier  : 2R 14.3s explicite ce reproche en évoquant la persistance des hauts lieux en Juda.'
  - type: text
    content: 'Il fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', non pas toutefois d''un cœur entier. '
  '20':
  - type: note
    content: 'car cela venait…  : la suite du v. est absente de 2R 14 et de Syr  ; cf. v. 14ss. –  qui voulait  : litt. pour. –  livrés  : litt. donnés dans la main, expression rare sans complément ; même cas en 1S 26.23 et Siracide 11.6 ; des versions anciennes ont précisé dans sa main ou dans la main des ennemis. –  cherché ou consulté, cf. v. 14-15n.'
  - type: text
    content: 'Mais Amatsia n''écouta pas, car cela venait de Dieu qui voulait qu''ils soient livrés, parce qu''ils avaient cherché les dieux d''Edom. '
  '21':
  - type: text
    content: 'Alors Joas, roi d''Israël, partit à l''attaque ; ils se rencontrèrent, lui et Amatsia, roi de Juda, à Beth-Shémesh qui appartient à Juda. '
  '22':
  - type: note
    content: 'Ce verset n''apparaît pas dans Syr. –  battu 13.15n. –  chacun s''enfuit à sa tente  : cf. Jg 7.8n.'
  - type: text
    content: 'Juda fut battu par Israël, et chacun s''enfuit à sa tente. '
  '23':
  - type: note
    content: 'fils de Joachaz  : précision absente de LXX. De fait, il semble qu''il y ait eu confusion avec Joas, roi d''Israël, fils de Joachaz (cf. v. 17,25). Mais le grand-père d''Amatsia portait le nom d''Achazia (22.11), variante de Joachaz. –  quatre cents coudées ≈ 180 m ; voir mesures. –  du Tournant (ce nom de porte n''apparaît qu''ici) ou de l''Angle, d''après certains mss hébreux et des versions anciennes. La porte d''Ephraïm, comme celle du Tournant, sont situées dans la partie nord de la ville, la porte d''Ephraïm au nord-ouest et la porte du Tournant au nord-est ; cf. 26.9 ; 2R 14.13n.'
  - type: text
    content: 'Joas, roi d''Israël, fit prisonnier à Beth-Shémesh Amatsia, roi de Juda, fils de Joas, fils de Joachaz. Il l''amena à Jérusalem et ouvrit une brèche de quatre cents coudées dans la muraille de Jérusalem depuis la porte d''Ephraïm jusqu''à la porte du Tournant. '
  '24':
  - type: note
    content: 'Il prit  : le verbe est probablement sous-entendu ici, mais se trouve dans Syr. Le texte des Chroniques présente une liste de compléments sans verbe ; certains ont proposé de les rattacher à fit prisonnier au v. 23 ou au verbe de la fin du v. 24, modifié avec des versions latines de façon à lire fit retourner au lieu de retourna. –  Obed-Edom (Serviteur d''Edom, cf. v. 14) : David avait confié la garde du coffre de l''alliance à un homme du même nom, cf. 2S 6.10ss ; 1Ch 13.13s ; sa descendance continuait peut-être à exercer un rôle important, cf. 1Ch 26.4-8,15. –  Samarie  : 18.2n.'
  - type: text
    content: Il prit tout l'or et l'argent, ainsi que tous les objets qui se trouvaient dans la maison de Dieu, chez Obed-Edom, et les trésors de la maison du roi ; il prit aussi des otages, puis il retourna à Samarie.
  - type: heading
    content: Fin du règne d'Amatsia
  - type: heading
    content: 2R 14.17-20
  '25':
  - type: text
    content: 'Amatsia, fils de Joas, roi de Juda, vécut quinze ans après la mort de Joas, fils de Joachaz, roi d''Israël. '
  '26':
  - type: note
    content: 'Le reste de l''histoire  : cf. 1R 11.41n. –  le début et la fin  : cf. 9.29+. –  le livre des rois…  : cf. 16.11n.'
  - type: text
    content: 'Le reste de l''histoire d''Amatsia, le début et la fin, cela est écrit dans le livre des rois de Juda et d''Israël. '
  '27':
  - type: note
    content: 'Dès lors qu''Amatsia  : LXX au temps où Amatsia…  ; partie propre aux Chroniques, cf. 2R 14.19. –  Lakish  : cf. Jos 10.3n.'
  - type: text
    content: 'Dès lors qu''Amatsia se fut écarté du '
  - type: text
    content: Seigneur
  - type: text
    content: ', on forma contre lui une conspiration à Jérusalem, et il s''enfuit à Lakish ; on le poursuivit à Lakish, où on le mit à mort. '
  '28':
  - type: note
    content: 'la Ville de Juda  : désignation inhabituelle de Jérusalem, souvent appelée Ville de David (cf. 2R 14.20 et, ici, certains mss hébreux et des versions anciennes). L''expression Ville de Juda, désignant Jérusalem, apparaît également dans un document babylonien ; cf. 2Ch 9.31+.'
  - type: text
    content: On le transporta sur des chevaux, et on l'ensevelit avec ses pères dans la Ville de Juda.
  '3':
  - type: note
    content: 'Lorsque sa royauté devint forte  : litt. lorsque la royauté fut forte sur lui (litt. dans sa main pour certains mss hébreux, LXX et Syr, comme en 2R 14.5). –  qui avaient abattu le roi, son père  : cf. 24.25s.'
  - type: text
    content: 'Lorsque sa royauté devint forte, il tua les gens de sa cour qui avaient abattu le roi, son père. '
  '4':
  - type: note
    content: 'dans la loi, dans le livre de Moïse  : LXX, Vg selon ce qu''a écrit Moïse  ; cf. 2R 14.6 dans le livre de la loi (tora) de Moïse. –  ne mourront pas  : le texte de Dt 24.16 comme celui de 2R 14.6 disent ne seront pas mis à mort. Voir aussi Jr 31.29s ; Ez 18.4,19s.'
  - type: text
    content: 'Mais il ne mit pas à mort leurs fils, car, selon ce qui est écrit dans la loi, dans le livre de Moïse, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné cet ordre : « Les pères ne mourront pas pour les fils, les fils ne mourront pas pour les pères ; chacun mourra pour son propre péché. »'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 5-10 sont propres aux Chroniques. –  les hommes de Juda  : litt. Juda . –  les chefs de mille et les chefs de cent  : cf. Nb 31.14,52 ; 1S 22.7. –  trois cent mille hommes d''élite  : comparer avec 14.7 (Asa) ; 17.14-19 (Josaphat) ; voir aussi 26.11-13 (Ozias). –  aptes à porter les armes  : litt. sortant pour l''armée  ; cf. Nb 1.3n,20ss. –  grand bouclier  : cf. 1R 10.16n.'
  - type: text
    content: 'Amatsia rassembla les hommes de Juda et les plaça selon les familles, les chefs de mille et les chefs de cent, pour tout Juda et Benjamin ; il en fit le recensement depuis l''âge de vingt ans et au-dessus, et il trouva trois cent mille hommes d''élite, aptes à porter les armes, maniant la lance et le grand bouclier. '
  '6':
  - type: note
    content: 'Israël  : c.-à-d. le royaume du Nord. –  cent talents  : soit près de 3 500 kg ; voir mesures, poids et monnaies.'
  - type: text
    content: Il engagea encore cent mille vaillants guerriers d'Israël pour cent talents d'argent.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Un homme de Dieu  : autre traduction l''homme de Dieu  ; il s''agit d''un prophète , cf. 1S 2.27n  ; 1R 12.22+ ; 2R 4.7. –  Ephraïm  : puissante tribu du Nord dont le nom sert souvent à désigner tout le royaume, par opposition à Juda, cf. Os 6.4 ; 9.16 etc.'
  - type: text
    content: 'Un homme de Dieu vint lui dire : O roi, qu''une armée d''Israël ne vienne pas avec toi, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''est pas avec Israël, avec tous ces fils d''Ephraïm ! '
  '8':
  - type: note
    content: 'Si tu vas avec eux…  : texte difficile ; certains comprennent ou au contraire (si tu ne tiens pas compte de ce que je dis), avance-toi donc, évertue-toi, déploie ta force dans le combat : Dieu te fera trébucher…  ; d''autres traduisent  : si elle vient, tu auras beau être fort dans le combat…  ; LXX si tu t''imagines l''emporter grâce à eux… ou si tu (les) embauches pour être renforcés par eux…'
  - type: text
    content: 'Si tu vas avec eux, quand bien même tu serais fort au combat, Dieu te fera trébucher devant l''ennemi, car Dieu a le pouvoir de secourir et de faire trébucher. '
  '9':
  - type: text
    content: 'Amatsia dit à l''homme de Dieu : Et que faire pour les cent talents que j''ai donnés à la troupe d''Israël ? L''homme de Dieu répondit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' peut te donner bien plus que cela. '
