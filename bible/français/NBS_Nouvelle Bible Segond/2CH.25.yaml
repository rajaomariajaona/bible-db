        marker: ft
        children:
        - type: text
          text: '  : texte difficile ; certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ou au contraire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (si tu ne tiens pas compte de ce que je dis)
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', avance-toi donc, évertue-toi, déploie ta force dans le combat : Dieu te fera trébucher…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''autres traduisent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si elle vient, tu auras beau être fort dans le combat…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'si tu t''imagines l''emporter grâce à eux… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
