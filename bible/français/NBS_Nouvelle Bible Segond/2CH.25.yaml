document_id: 2CH.25,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne d'Amatsia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 14.1-7
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yehoaddân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2R 14.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Amatsia devint roi à l''âge de vingt-cinq ans ; il régna vingt-neuf ans à Jérusalem. Le nom de sa mère était Yehoaddân ; elle était de Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se mirent dans une grande colère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 11.6+ ; expression proche pour '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: colère ardente
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir note suivante. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chez elles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chez eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à leur lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: colère ardente
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression hébraïque en Ex 11.8 ; 1S 20.34 ; Es 7.4 ; Lm 2.3.'
      marker-yv: yv-n
    - type: text
      text: Alors Amatsia se sépara des troupes qui lui étaient venues d'Ephraïm ; il les renvoya chez elles. Mais les hommes se mirent dans une grande colère contre Juda, et ils s'en retournèrent chez eux dans une colère ardente.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2R 14.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amatsia devint fort ; il conduisit son peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : malgré le renvoi du contingent d''Israël, le roi de Juda remporte une victoire, signe de l''accomplissement de la promesse de l''homme de Dieu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte, de même au v. 13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Séir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : nom ancien de la région qui s''étend au sud de la mer Morte, jusqu''au golfe d''Aqaba ; la désignation '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de Séir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est devenue synonyme d’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Edomites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Gn 14.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 36.8s,20s ; 1Ch 1.38.'
      marker-yv: yv-n
    - type: text
      text: 'Amatsia devint fort ; il conduisit son peuple. Il alla dans la vallée du Sel et battit dix mille hommes des fils de Séir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un rocher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du rocher '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de la Roche, la Roche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Séla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) étant aussi le nom d'une ville édomite ; cf. Jg 1.36
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 14.7.'
      marker-yv: yv-n
    - type: text
      text: Les fils de Juda capturèrent vivants dix mille d'entre eux qu'ils menèrent au sommet d'un rocher. Ils les précipitèrent du sommet du rocher, et tous s'écrasèrent.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'depuis '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Samarie
        - type: text
          text: ' jusqu''à Beth-Horôn'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Samarie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étant la capitale du royaume du Nord, sa mention dans ce contexte est surprenante ; certains ont pensé discerner une altération du texte et ont suggéré d'autres possibilités
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Migrôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Es 10.28) ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tsemaraïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(2Ch 13.4), ville disputée entre les deux royaumes. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beth-Horôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était située non loin de la frontière qui sépare les deux royaumes, à une vingtaine de kilomètres au nord-ouest de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: Cependant, les gens de la troupe qu'Amatsia avait renvoyés pour qu'ils n'aillent pas au combat avec lui se répandirent dans les villes de Juda depuis Samarie jusqu'à Beth-Horôn. Ils tuèrent trois mille hommes et firent un grand pillage.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 14-16 sont propres aux Chroniques et expliquent le reste du récit (cf. v. 20). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il en fit ses propres dieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il les fit tenir debout pour lui comme dieux.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Amatsia fut de retour après la défaite des Edomites, il fit venir les dieux des fils de Séir et il en fit ses propres dieux ; il se prosterna devant eux et leur offrit de l''encens. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il lui envoya un prophète
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 24.18s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cherché les dieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rendu un culte aux dieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'consulté les dieux. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les dieux de ce peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : plusieurs versions anciennes lisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les dieux des nations.
      marker-yv: yv-n
    - type: text
      text: 'Alors le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) se mit en colère contre Amatsia ; il lui envoya un prophète, qui lui dit : Pourquoi as-tu cherché les dieux de ce peuple, alors qu''ils n''ont pu délivrer leur peuple de ta main ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Finis-en
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: arrête pour toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: formé le projet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme ainsi traduit est apparenté aux mots traduits par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'conseiller '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: conseil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre forme du même verbe au v. 17 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tenir conseil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. Es 5.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme il parlait, Amatsia lui dit : T''avons-nous nommé conseiller du roi ? Finis-en ! Pourquoi devrait-on te frapper ? Le prophète finit en disant : Je sais que Dieu a formé le projet de te détruire, puisque tu as fait cela et que tu n''as pas écouté mon conseil.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amatsia battu par Joas, roi d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 14.8-14
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Après avoir tenu conseil, Amatsia, roi de Juda, fit dire à Joas, fils de Joachaz, fils de Jéhu, roi d''Israël : Rencontrons-nous ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2R 14.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Joas, roi d''Israël, fit dire à Amatsia, roi de Juda : L''ajonc du Liban fit dire au cèdre du Liban : Donne ta fille pour femme à mon fils ! Mais un animal sauvage du Liban passa et piétina l''ajonc. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' s''élève '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2R 14.10+.
      marker-yv: yv-n
    - type: text
      text: 'Tu as battu Edom, dis-tu. Ton cœur s''élève et tu te glorifies. Reste chez toi maintenant. Pourquoi aller au-devant du malheur ? Tu tomberas, toi, et Juda avec toi ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui convenait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'non pas toutefois d''un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' entier'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2R 14.3s explicite ce reproche en évoquant la persistance des hauts lieux en Juda.'
      marker-yv: yv-n
    - type: text
      text: 'Il fit ce qui convenait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', non pas toutefois d''un cœur entier. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: car cela venait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la suite du v. est absente de 2R 14 et de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: '  ; cf. v. 14ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui voulait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: livrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: donnés dans la main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression rare sans complément ; même cas en 1S 26.23 et '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.6 ; des versions anciennes ont précisé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans sa main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la main des ennemis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cherché '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: consulté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 14-15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais Amatsia n''écouta pas, car cela venait de Dieu qui voulait qu''ils soient livrés, parce qu''ils avaient cherché les dieux d''Edom. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Alors Joas, roi d''Israël, partit à l''attaque ; ils se rencontrèrent, lui et Amatsia, roi de Juda, à Beth-Shémesh qui appartient à Juda. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
