      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 19.15 ; 27.43ss ; Ex 2.15 ; 1R 11.40.
      marker-yv: yv-n
    - type: text
      text: 'Joseph se leva, prit de nuit l''enfant et sa mère, se retira en Egypte '
