        children:
        - type: text
          text: 'du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.22+.
      marker-yv: yv-n
    - type: text
      text: 'Alors s''accomplit ce qui avait été dit par l''entremise du prophète Jérémie :'
