      - type: usfm
        marker: fq
        children:
        - type: text
          text: en Orient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à son lever '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de même v. 9). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous prosterner devant lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lui rendre hommage, l'adorer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même v. 8,11 ; même verbe 4.9s ; 8.2 ; 9.18 ; 14.33 ; 15.25 ; 18.26 ; 20.20 ; 28.9,17 ; voir '
        - type: usfm
