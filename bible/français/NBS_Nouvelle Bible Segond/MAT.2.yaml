        children:
        - type: text
          text: étoile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme grec, qui a donné notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: astre
      - type: usfm
        marker: ft
