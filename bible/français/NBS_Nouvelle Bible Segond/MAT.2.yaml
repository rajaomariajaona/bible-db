        - type: text
          text: ), au nord du pays, région où Juifs et non-Juifs étaient mêlés (Jos 20.7 ; 21.32 ; 1R 9.11 ; 2R 15.29 ; 1Ch 6.61), était échue en partage, avec le titre de tétrarque (voir Lc 3.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), à Hérode Antipas, autre fils d'Hérode le Grand.
      marker-yv: yv-n
    - type: text
      text: 'Mais quand il apprit qu''Archélaos était devenu roi de Judée à la place d''Hérode, son père, il eut peur de s''y rendre ; divinement averti en rêve, il se retira en Galilée '
  '23':
