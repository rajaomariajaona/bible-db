        children:
        - type: text
          text: '), village situé à une dizaine de kilomètres au sud de Jérusalem. Cf. Rt 1.1 ; Lc 2.4-7 ; Jn 7.42. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hérode
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le Grand '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'gouvernait le pays sous l''autorité romaine. Il avait reçu du Sénat le titre de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Roi des Juifs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en l''an 40 av. J.-C., mais il a effectivement régné de 37 av. J.-C. jusqu''à sa mort, en 4 av. J.-C. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce nom désignait les prêtres chez les Mèdes, les Perses et les Chaldéens (cf. Dn 2.2,10, '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '). Ils se livraient à l''observation des astres. Dans le N.T. le terme ne revient, hors de ce chapitre, qu''en Ac 13.6,8. Voir aussi « La naissance de Jésus : récits et légendes »♦.'
      marker-yv: yv-n
    - type: text
      text: 'Après la naissance de Jésus, à Bethléem de Judée, aux jours du roi Hérode, des mages d''Orient arrivèrent à Jérusalem '
