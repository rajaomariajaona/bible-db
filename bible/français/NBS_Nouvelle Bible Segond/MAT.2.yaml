          text: ' (cf. Ap 22.16). En Ac 24.5 le terme s''applique aux chrétiens. Le mot hébreu correspondant pourrait avoir désigné, en particulier, un groupe de chrétiens d''origine juive rejeté par les synagogues pharisiennes au I'
        - type: usfm
          marker: ord
