          - type: text
            text: culte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'et dirent : Où est le roi des Juifs qui vient de naître ? Car nous avons vu son étoile en Orient, et nous sommes venus nous prosterner devant lui. '
