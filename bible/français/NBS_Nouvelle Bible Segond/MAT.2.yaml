    - type: text
      text: 'Quand Hérode se vit joué par les mages, sa fureur fut extrême ; il fit supprimer tous les enfants de deux ans et au-dessous qui étaient à Bethléem et dans son territoire, d''après l''époque qu''il s''était fait préciser par les mages. '
  '17':
  - type: usfm
