    - type: text
      text: 'Après leur départ, l''ange du Seigneur apparut en rêve à Joseph et dit : Lève-toi, prends l''enfant et sa mère, fuis en Egypte et restes-y jusqu''à nouvel ordre ; car Hérode va rechercher l''enfant pour le faire disparaître. '
