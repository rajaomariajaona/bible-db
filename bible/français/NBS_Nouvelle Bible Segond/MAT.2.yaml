document_id: MAT.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La visite des mages
  - type: heading
    content: Cf. Lc 2.8-20
  - type: text
    content: ' '
  - type: note
    content: 'Bethléem (de l''hébreu Beth-Léhem, maison du pain ), village situé à une dizaine de kilomètres au sud de Jérusalem. Cf. Rt 1.1 ; Lc 2.4-7 ; Jn 7.42. –  Hérode le Grand gouvernait le pays sous l''autorité romaine. Il avait reçu du Sénat le titre de Roi des Juifs en l''an 40 av. J.-C., mais il a effectivement régné de 37 av. J.-C. jusqu''à sa mort, en 4 av. J.-C. –  mages  : ce nom désignait les prêtres chez les Mèdes, les Perses et les Chaldéens (cf. Dn 2.2,10, LXX). Ils se livraient à l''observation des astres. Dans le N.T. le terme ne revient, hors de ce chapitre, qu''en Ac 13.6,8. Voir aussi « La naissance de Jésus : récits et légendes »♦.'
  - type: text
    content: 'Après la naissance de Jésus, à Bethléem de Judée, aux jours du roi Hérode, des mages d''Orient arrivèrent à Jérusalem '
  '10':
  - type: text
    content: 'A la vue de l''étoile, ils éprouvèrent une très grande joie. '
  '11':
  - type: note
    content: 'tombèrent à ses pieds pour se prosterner  : cf. v. 2n  ; 4.9. –  or / encens / myrrhe Es 60.6 ; Ps 45.9 ; Mc 15.23 ; Jn 19.39.'
  - type: text
    content: 'Ils entrèrent dans la maison, virent l''enfant avec Marie, sa mère, et tombèrent à ses pieds pour se prosterner devant lui ; ils ouvrirent ensuite leurs trésors et lui offrirent en présent de l''or, de l''encens et de la myrrhe. '
  '12':
  - type: note
    content: en rêve 1.20+.
  - type: text
    content: Puis, divinement avertis en rêve de ne pas retourner chez Hérode, ils regagnèrent leur pays par un autre chemin.
  - type: heading
    content: La fuite en Egypte
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'l''ange du Seigneur 1.20n. –  Lève-toi ou réveille-toi , même verbe v. 14,20s et 1.24 ( à son réveil ) ; le verbe évoque ailleurs la résurrection  ; on le retrouve 3.9n  ; 8.15,25s ; 9.5ss,19,25n  ; 10.8 ; 11.5,11 ; 12.11n,42 ; 14.2 ; 16.21 ; 17.7,9,23 ; 20.19 ; 24.7n  ; 25.7 ; 26.32n  ; 27.52,63s ; 28.6s ; voir aussi Mc 1.31n  ; Lc 1.69n  ; Jn 2.19n. –  jusqu''à nouvel ordre  : litt. jusqu''à ce que je te dise . –  Hérode v. 1n.'
  - type: text
    content: 'Après leur départ, l''ange du Seigneur apparut en rêve à Joseph et dit : Lève-toi, prends l''enfant et sa mère, fuis en Egypte et restes-y jusqu''à nouvel ordre ; car Hérode va rechercher l''enfant pour le faire disparaître. '
  '14':
  - type: note
    content: Cf. Gn 19.15 ; 27.43ss ; Ex 2.15 ; 1R 11.40.
  - type: text
    content: 'Joseph se leva, prit de nuit l''enfant et sa mère, se retira en Egypte '
  '15':
  - type: note
    content: 'Cela arriva  : sous-entendu dans le texte. –  du prophète… mon fils 1.22+ ; Os 11.1.'
  - type: text
    content: 'et y resta jusqu''à la mort d''Hérode. Cela arriva afin que s''accomplisse ce que le Seigneur avait dit par l''entremise du prophète :'
  - type: text
    content: D'Egypte j'ai appelé mon fils
  - type: text
    content: .
  - type: heading
    content: Le massacre des enfants
  '16':
  - type: text
    content: ' '
  - type: note
    content: Pr 16.14. –  Hérode v. 1n.
  - type: text
    content: 'Quand Hérode se vit joué par les mages, sa fureur fut extrême ; il fit supprimer tous les enfants de deux ans et au-dessous qui étaient à Bethléem et dans son territoire, d''après l''époque qu''il s''était fait préciser par les mages. '
  '17':
  - type: note
    content: du prophète 1.22+.
  - type: text
    content: 'Alors s''accomplit ce qui avait été dit par l''entremise du prophète Jérémie :'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Rama  : localité à quelques km au nord de Jérusalem (Jr 40.1) ; Jr 31.15 . –  Rachel avait été ensevelie à Bethléem, Gn 35.19s.'
  - type: text
    content: Une voix s'est fait entendre à Rama,
  - type: text
    content: des pleurs et
  - type: text
    content: ' beaucoup de '
  - type: text
    content: 'lamentations :'
  - type: text
    content: c'est Rachel qui pleure ses enfants ;
  - type: text
    content: elle n'a pas voulu être consolée,
  - type: text
    content: parce qu'ils ne sont plus
  - type: text
    content: .
  - type: heading
    content: Le retour d'Egypte
  '19':
  - type: text
    content: ' '
  - type: note
    content: l'ange du Seigneur… en rêve 1.20+ ; cf. Ps 25.12.
  - type: text
    content: 'Après la mort d''Hérode, l''ange du Seigneur apparut en rêve à Joseph, en Egypte, '
  '2':
  - type: note
    content: 'étoile  : le terme grec, qui a donné notre mot astre, peut s''appliquer à n''importe quel corps céleste, étoile, planète ou comète ; cf. Nb 24.17 ; Ap 22.16. –  en Orient  : on pourrait aussi traduire à son lever (de même v. 9). –  nous prosterner devant lui  : autres traductions lui rendre hommage, l''adorer  ; de même v. 8,11 ; même verbe 4.9s ; 8.2 ; 9.18 ; 14.33 ; 15.25 ; 18.26 ; 20.20 ; 28.9,17 ; voir culte.'
  - type: text
    content: 'et dirent : Où est le roi des Juifs qui vient de naître ? Car nous avons vu son étoile en Orient, et nous sommes venus nous prosterner devant lui. '
  '20':
  - type: note
    content: 'qui en voulaient à la vie  : litt. qui recherchaient (v. 13) la vie  ; sur ce dernier mot voir 10.28n. – Cf. Ex 4.19.'
  - type: text
    content: 'et dit : Lève-toi, prends l''enfant et sa mère, et retourne dans le pays d''Israël, car ceux qui en voulaient à la vie de l''enfant sont morts. '
  '21':
  - type: text
    content: Joseph se leva, prit l'enfant et sa mère et rentra au pays d'Israël.
  - type: heading
    content: Lc 2.39-40
  '22':
  - type: text
    content: ' '
  - type: note
    content: Archélaos , connu pour sa cruauté, avait eu la Judée, la Samarie et l'Idumée (cf. Ez 25.12n), mais pas la Galilée, comme part de succession dans les provinces gouvernées par son père Hérode le Grand. – La Galilée (d'un mot hébreu signifiant territoire, circonscription , cf. 4.15 ; Es 8.23n), au nord du pays, région où Juifs et non-Juifs étaient mêlés (Jos 20.7 ; 21.32 ; 1R 9.11 ; 2R 15.29 ; 1Ch 6.61), était échue en partage, avec le titre de tétrarque (voir Lc 3.1n), à Hérode Antipas, autre fils d'Hérode le Grand.
  - type: text
    content: 'Mais quand il apprit qu''Archélaos était devenu roi de Judée à la place d''Hérode, son père, il eut peur de s''y rendre ; divinement averti en rêve, il se retira en Galilée '
  '23':
  - type: note
    content: 'Nazareth  : dans le centre montagneux de la Galilée, à une trentaine de kilomètres à l''ouest-sud-ouest du lac de Tibériade ; orthographe légèrement différente, en grec, en 21.11 et dans Lc 1.26 etc. ; la ville est en fait une petite bourgade ; voir aussi Mt 4.13n. –  nazoréen (voir aussi 26.71 ; Lc 18.37 ; Jn 18.5,7 ; 19.19 ; Ac 2.22 ; 3.6 ; 4.10 ; 6.14 ; 22.8 ; 24.5 ; 26.9) : on ne sait pas à quel texte des prophètes (formule inhabituellement vague, cf. 1.22+) Matthieu fait ici allusion. Le prophète issu de Nazareth (21.11 ; cf. Mc 1.24n  ; Jn 1.45 ; Ac 10.38) est peut-être désigné ici comme le nazir (ou saint, consacré) par excellence (Nb 6 ; Jg 13.5 ; Mt 16.16s). Selon certains, le mot transcrit nazoréen signifierait à l''origine sauvé ou rescapé (cf. Es 4.3 ; 42.6 ; 49.6n) ; on le rattache souvent au terme hébreu traduit par rejeton en Es 11.1n (cf. Ap 22.16). En Ac 24.5 le terme s''applique aux chrétiens. Le mot hébreu correspondant pourrait avoir désigné, en particulier, un groupe de chrétiens d''origine juive rejeté par les synagogues pharisiennes au Ier s. apr. J.-C. (cf. Jn 9.22).'
  - type: text
    content: 'et vint demeurer dans une ville appelée Nazareth, afin que s''accomplisse ce qui avait été dit par l''entremise des prophètes : Il sera appelé nazoréen.'
  '3':
  - type: text
    content: 'A cette nouvelle, le roi Hérode fut troublé, et tout Jérusalem avec lui. '
  '4':
  - type: note
    content: 'grands prêtres / scribes  : Mt désigne ainsi les autorités juives de Jérusalem ; cf. 21.15. Les grands prêtres (pluriel du mot qui désigne le grand prêtre) sont les prêtres issus des grandes familles sacerdotales, y compris le grand prêtre en exercice et ses éventuels prédécesseurs ; sur les scribes, voir 2S 8.17 ; 1R 4.3 ; Esd 7.6,11 ; Né 8.1. –  le Christ 1.16n.'
  - type: text
    content: 'Il rassembla tous les grands prêtres et les scribes du peuple pour leur demander où devait naître le Christ. '
  '5':
  - type: note
    content: 1.22+.
  - type: text
    content: 'Ils lui dirent : A Bethléem de Judée, car voici ce qui a été écrit par l''entremise du prophète :'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Mi 5.1 ; 2S 5.2 . –  dans l''assemblée…  : litt. parmi les gouverneurs (même terme grec 10.18 ; 27.2 etc.) ou les princes  ; on a aussi compris les principales villes , mais le mot n''aurait ce sens nulle part ailleurs ; il est apparenté au terme traduit dans la suite par dirigeant (cf. Lc 22.26) ; voir aussi Ez 34.23s.'
  - type: text
    content: Et toi, Bethléem,
  - type: text
    content: ' terre de Juda,'
  - type: text
    content: tu
  - type: text
    content: ' n’'
  - type: text
    content: es
  - type: text
    content: ' certainement pas '
  - type: text
    content: la moins importante
  - type: text
    content: dans l'assemblée des gouverneurs de Juda ;
  - type: text
    content: car de toi sortira un dirigeant
  - type: text
    content: qui fera paître Israël, mon peuple
  - type: text
    content: .
  '7':
  - type: text
    content: 'Alors Hérode fit appeler en secret les mages et se fit préciser par eux l''époque de l''apparition de l''étoile. '
  '8':
  - type: text
    content: 'Puis il les envoya à Bethléem en disant : Allez prendre des informations précises sur l''enfant ; quand vous l''aurez trouvé, faites-le-moi savoir, afin que moi aussi je vienne me prosterner devant lui.'
  '9':
  - type: text
    content: 'Après avoir entendu le roi, ils partirent. Or l''étoile qu''ils avaient vue en Orient les précédait ; arrivée au-dessus du lieu où était l''enfant, elle s''arrêta. '
