      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans le centre montagneux de la Galilée, à une trentaine de kilomètres à l''ouest-sud-ouest du lac de Tibériade ; orthographe légèrement différente, en grec, en 21.11 et dans Lc 1.26 etc. ; la '
