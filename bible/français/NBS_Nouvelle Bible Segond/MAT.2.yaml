        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (formule inhabituellement vague, cf. 1.22+) Matthieu fait ici allusion. Le prophète issu de Nazareth (21.11 ; cf. Mc 1.24
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jn 1.45 ; Ac 10.38) est peut-être désigné ici comme le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nazir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: saint, consacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') par excellence (Nb 6 ; Jg 13.5 ; Mt 16.16s). Selon certains, le mot transcrit '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nazoréen '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifierait à l''origine '
      - type: usfm
        marker: fqa
        children:
