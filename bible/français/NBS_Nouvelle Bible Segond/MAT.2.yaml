          text: ', connu pour sa cruauté, avait eu la Judée, la Samarie et l''Idumée (cf. Ez 25.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), mais pas la Galilée, comme part de succession dans les provinces gouvernées par son père '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hérode
        - type: text
          text: ' le Grand. – La '
      - type: usfm
        marker: fq
        children:
