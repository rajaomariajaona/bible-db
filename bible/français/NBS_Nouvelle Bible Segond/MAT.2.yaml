        children:
        - type: text
          text: 'nazoréen '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir aussi 26.71 ; Lc 18.37 ; Jn 18.5,7 ; 19.19 ; Ac 2.22 ; 3.6 ; 4.10 ; 6.14 ; 22.8 ; 24.5 ; 26.9) : on ne sait pas à quel texte des '
