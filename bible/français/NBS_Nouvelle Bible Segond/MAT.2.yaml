        children:
        - type: text
          text: Es 60.6 ; Ps 45.9 ; Mc 15.23 ; Jn 19.39.
      marker-yv: yv-n
    - type: text
      text: 'Ils entrèrent dans la maison, virent l''enfant avec Marie, sa mère, et tombèrent à ses pieds pour se prosterner devant lui ; ils ouvrirent ensuite leurs trésors et lui offrirent en présent de l''or, de l''encens et de la myrrhe. '
