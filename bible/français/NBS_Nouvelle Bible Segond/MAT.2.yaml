          text: 'sauvé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rescapé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Es 4.3 ; 42.6 ; 49.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; on le rattache souvent au terme hébreu traduit par '
      - type: usfm
