          text: 'en rêve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.20+.
      marker-yv: yv-n
    - type: text
      text: Puis, divinement avertis en rêve de ne pas retourner chez Hérode, ils regagnèrent leur pays par un autre chemin.
  - type: usfm
    marker: s1
    children:
