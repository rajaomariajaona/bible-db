      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 13. – La phrase est interrompue ; on peut considérer qu''elle reprend au v. 8, au v. 14 ou en 4.1.'
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, moi, Paul, le prisonnier de Jésus-Christ pour vous, les non-Juifs… '
