document_id: EPH.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le mystère du Christ
  - type: text
    content: ' '
  - type: note
    content: 'moi, Paul 2Co 10.1 ; Ga 5.2 ; Col 1.23 ; 1Th 2.18 ; Phm 19. –  le prisonnier 4.1 ; 6.20 ; Ph 1.7+ ; Col 4.18 ; 2Tm 1.8 ; Phm 1,9 ; Paul a été emprisonné à cause de son activité au service de Jésus-Christ (ou, selon certains mss, du Christ ). –  pour vous  : cf. v. 13. – La phrase est interrompue ; on peut considérer qu''elle reprend au v. 8, au v. 14 ou en 4.1.'
  - type: text
    content: 'A cause de cela, moi, Paul, le prisonnier de Jésus-Christ pour vous, les non-Juifs… '
  '10':
  - type: note
    content: 'Cf. Jn 17.21ss ; 1Co 2.6-10 ; Col 1.26s ; 1P 1.12. –  la sagesse…  : cf. Rm 11.33ss. – Voir Eglise. –  principats / autorités 1.21+. –  dans les lieux célestes 1.3n.'
  - type: text
    content: 'afin que la sagesse de Dieu, dans sa grande diversité, soit maintenant portée, par l''Eglise, à la connaissance des principats et des autorités dans les lieux célestes '
  '11':
  - type: note
    content: 'éternel  : litt. des âges ou des siècles, des éons (2.2n) ; on pourrait aussi comprendre le projet (1.11n) qu''il a réalisé (ou conçu, litt. fait, 3.20) pour les éons dans le Christ…  ; cf. 1.4,21 ; 2.7n  ; 3.3,9n  ; 1Tm 1.17n.'
  - type: text
    content: 'selon le projet éternel qu''il a réalisé en Jésus-Christ, notre Seigneur. '
  '12':
  - type: note
    content: Litt. en qui nous avons l'assurance (6.19s ; Ac 2.29n) et l'accès (Ep 2.18+) dans la confiance (2Co 3.4) par sa foi (ou par la foi relative à lui, Ep 2.8 ; 3.17) ; sur cette dernière expression, voir Rm 3.22n  ; Ga 2.16n.
  - type: text
    content: 'C''est en lui, par sa foi, que nous avons l''assurance nécessaire pour nous approcher de Dieu avec confiance. '
  '13':
  - type: note
    content: V. 1 ; Col 1.24 ; 2Tm 2.10. – Voir gloire.
  - type: text
    content: 'Je vous demande donc de ne pas perdre courage à cause des détresses que j''endure pour vous : elles sont votre gloire.'
  - type: heading
    content: Que le Christ habite dans votre cœur
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.15-18 ; Mt 11.25 ; Lc 11.2.
  - type: text
    content: 'C''est pourquoi je fléchis les genoux devant le Père, '
  '15':
  - type: note
    content: 'toute famille  : autres traductions toute paternité ; toute parenté ; tout ordre  ; le mot grec ainsi traduit a donné notre mot patrie  ; il est apparenté au mot traduit par Père (pater) au v. 14 ; même terme en Lc 2.4 ; Ac 3.25 ; cf. 17.25. –  dans les cieux  : cf. 1.3+. –  tient son nom  : cf. Es 40.26 ; Ps 147.4 ; Ph 2.9.'
  - type: text
    content: 'de qui toute famille dans les cieux et sur la terre tient son nom, '
  '16':
  - type: note
    content: 'la richesse de sa gloire 1.7+,18n  ; Rm 9.23. –  rendus forts  : cf. 1.19 ; 6.10 ; Lc 1.80 ; 2.40 ; Col 1.11. – Voir Esprit. –  au profit de  : certains comprennent en vue de constituer. –  l''homme intérieur  : cf. v. 17 ; Rm 7.22 ; 2Co 4.16 ; 1P 3.4n  ; voir aussi Ga 4.6.'
  - type: text
    content: 'afin qu''il vous donne, selon la richesse de sa gloire, d''être rendus forts et puissants par son Esprit, au profit de l''homme intérieur ; '
  '17':
  - type: note
    content: 'que le Christ habite…  : cf. 2.22 ; Jn 14.23 ; Col 1.27 ; voir aussi Jr 31.31ss ; Ez 36.26ss ; Rm 8.11 ; 1Co 6.19s. – Voir cœur. –  par la foi v. 12. –  enracinés et fondés Col 1.23+ ; 2.7.'
  - type: text
    content: 'que le Christ habite dans votre cœur par la foi et que vous soyez enracinés et fondés dans l''amour, '
  '18':
  - type: note
    content: 'comprendre, avec tous les saints  : cf. 1.18 ; même verbe en Jn 1.5 (accueillir) ; Ph 3.12s (saisir). –  largeur… Jb 11.5-9 ; Rm 8.39 ; cf. 11.33 ; 1Co 2.10.'
  - type: text
    content: 'pour être capables de comprendre, avec tous les saints, quelle est la largeur, la longueur, la profondeur et la hauteur, '
  '19':
  - type: note
    content: 'Cf. Col 2.2s. –  l''amour du Christ  : cf. 1.6 ; 2.4 ; 5.25 ; Rm 8.35,39 ; 2Co 5.14 ; Ga 2.20. –  qui surpasse  : le même terme est employé de façon absolue en 1.19 ; 2.7 (surabondant). –  connaissance  : cf. Rm 11.33 ; 1Co 8.1 ; 13.2,12 ; Ph 3.8. –  remplis jusqu''à (recevoir ? connaître ? réaliser ?) toute la plénitude de Dieu  : certains mss portent de sorte que soit remplie toute la plénitude de Dieu 1.10n,23 ; Col 1.19+ ; 2.9s.'
  - type: text
    content: et de connaître l'amour du Christ qui surpasse la connaissance, de sorte que vous soyez remplis jusqu'à toute la plénitude de Dieu.
  '2':
  - type: note
    content: vous avez entendu parler Ga 1.16. –  l'intendance (ou la réalisation, voir v. 9 ; 1.10n  ; cf. 1Co 9.17) de la grâce de Dieu qui m'a été accordée (Ep 3.7s ; cf. Rm 12.3 ; 15.5s ; 1Co 3.10 ; Ga 2.9) pour vous Col 1.25.
  - type: text
    content: 'si du moins vous avez entendu parler de l''intendance de la grâce de Dieu qui m''a été accordée pour vous. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 11.33ss ; 16.25+. –  puissance v. 16 ; 1.19 ; Col 1.29. –  au-delà  : cf. Ph 4.7.'
  - type: text
    content: 'A celui qui peut, par la puissance qui est à l''œuvre en nous, faire infiniment au-delà de tout ce que nous demandons ou pensons, '
  '21':
  - type: note
    content: 'à lui la gloire Rm 16.27+. –  dans l''Eglise v. 10 ; 1.22+. – Voir génération. –  à tout jamais  : litt. de l''âge des âges, du siècle des siècles, cf. 2.2n  ; Ga 1.5n.'
  - type: text
    content: 'à lui la gloire dans l''Eglise et en Jésus-Christ, dans toutes les générations, à tout jamais. '
  - type: text
    content: Amen !
  '3':
  - type: note
    content: Cf. Rm 16.25ss ; Col 1.26s. –  révélation Ga 1.11s+,16. –  mystère 1.9+ss. –  je viens de l'écrire Rm 15.4n.
  - type: text
    content: 'C''est par révélation que le mystère a été porté à ma connaissance, comme je viens de l''écrire en quelques mots. '
  '4':
  - type: note
    content: 'l''intelligence…  : litt. mon intelligence dans le mystère du Christ  ; cf. Col 2.2 ; 4.3.'
  - type: text
    content: 'En lisant cela, vous pouvez comprendre l''intelligence que j''ai du mystère du Christ. '
  '5':
  - type: note
    content: 'Col 1.26+. –  fils des hommes  : cf. Mc 3.28. – Voir générations. –  par l''Esprit…  : on pourrait aussi traduire aux saints, ses apôtres et les prophètes en esprit  ; cf. 2.19s.'
  - type: text
    content: 'Ce mystère n''avait pas été porté à la connaissance des fils des hommes dans les autres générations comme il a été révélé maintenant par l''Esprit à ses saints apôtres et prophètes : '
  '6':
  - type: note
    content: Cf. 2.5s,19-22 ; 4.4. –  même héritage 1.11n,14,18 ; 5.5 ; Rm 8.17 ; Ga 3.28s. –  promesse et bonne nouvelle (ou Evangile, cf. 1.13 ; Rm 1.16s) font assonance en grec.
  - type: text
    content: 'à savoir que les non-Juifs ont un même héritage, sont un même corps et participent à la même promesse, en Jésus-Christ, par la bonne nouvelle '
  '7':
  - type: note
    content: 'ministre ou serviteur  ; cf. 2Co 3.3nss ; 5.18n  ; Col 1.23,25. –  l''opération (comme en 1.19n) de sa puissance  : cf. Col 1.29.'
  - type: text
    content: dont je suis devenu ministre, selon le don de la grâce de Dieu qui m'a été accordée par l'opération de sa puissance.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'le moindre 1Co 15.9s ; cf. 1Tm 1.15. –  annoncer aux non-Juifs Ac 9.15/ / ; Ga 1.16+ ; 2.7s. –  la richesse…  : cf. 1.7+ ; Col 1.27. –  insondable Rm 11.33.'
  - type: text
    content: 'A moi, le moindre de tous les saints, cette grâce a été accordée d''annoncer aux non-Juifs, comme une bonne nouvelle, la richesse insondable du Christ '
  '9':
  - type: note
    content: 'mettre en lumière ou illuminer 1.18. –  pour tous  : le terme correspondant est absent de certains mss. –  réalisation v. 2n  ; 1.10n. –  du mystère caché… Rm 16.25+ ; Col 1.27. –  de tout temps  : l''expression grecque correspondante (litt. depuis les âges ou les siècles), qui a habituellement le sens de depuis toujours, pourrait aussi être comprise ici dans le sens de caché aux éons, cf. v. 10 ; 2.2n,7n. –  Dieu, le créateur… Ap 4.11+.'
  - type: text
    content: 'et de mettre en lumière pour tous la réalisation du mystère caché de tout temps en Dieu, le créateur de tout ; '
