document_id: 2SA.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Houshaï contredit un conseil d'Ahitophel
  - type: text
    content: ' '
  - type: note
    content: 'Je poursuivrai  : litt. je me lèverai et je poursuivrai  ; cf. 20.6.'
  - type: text
    content: 'Ahitophel dit à Absalom : Laisse-moi, je t''en prie, choisir douze mille hommes. Je poursuivrai David cette nuit même. '
  '10':
  - type: note
    content: 'cœur de lion  : cf. 1.23+. –  se sentira fondre  : cf. Jos 2.11 ; Es 13.7 ; Ez 21.12 ; Ps 22.15.'
  - type: text
    content: 'Alors le plus vaillant, eût-il un cœur de lion, se sentira fondre ; car tout Israël sait que ton père est un guerrier et qu''il a des hommes vaillants avec lui. '
  '11':
  - type: note
    content: 'tout Israël, c.-à-d. toute l''armée d''Israël  ; cf. 10.17n. –  depuis Dan jusqu''à Bersabée  : cf. 1S 3.20n. –  aussi nombreux que le sable…  : cf. Jg 7.12n. –  Tu marcheras en personne  : litt. ta face marchera. La mobilisation générale prendra plusieurs jours et laissera donc à Houshaï le temps d''avertir David. –  au combat  : terme hébreu peu courant ; certains modifient le texte hébreu traditionnel pour lire au milieu d''eux.'
  - type: text
    content: 'Je conseille donc que tout Israël se rassemble auprès de toi, depuis Dan jusqu''à Bersabée, aussi nombreux que le sable qui est au bord de la mer. Tu marcheras en personne au combat. '
  '12':
  - type: note
    content: comme la rosée qui recouvre tout. –  sur la terre ou sur le sol  ; cf. Gn 2.5n.
  - type: text
    content: 'Quel que soit le lieu où il se trouve, nous l''atteindrons et nous nous abattrons sur lui comme la rosée tombe sur la terre. Il n''en restera pas un seul, ni lui ni aucun des hommes qui sont avec lui. '
  '13':
  - type: note
    content: 'nous le traînerons  : un ms hébreu et plusieurs versions anciennes portent nous la traînerons (la ville), ce qui s''accorde mieux avec la fin du v. (plus un caillou).'
  - type: text
    content: 'S''il se retire dans une ville, tout Israël apportera des cordes vers cette ville, et nous le traînerons jusqu''à l''oued, jusqu''à ce qu''on n''en trouve plus un caillou. '
  '14':
  - type: note
    content: 'meilleur  : cf. 15.34. –  avait résolu  : litt. avait ordonné, même verbe au v. 23 (donner des ordres). –  le malheur  : cf. Jos 11.19s ; 2Ch 10.15 ; 25.20.'
  - type: text
    content: 'Absalom et tous les hommes d''Israël dirent : Le conseil de Houshaï, l''Arkite, est meilleur que le conseil d''Ahitophel. En effet, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait résolu de déjouer le conseil d''Ahitophel, qui était bon ; c''est ainsi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' amenait le malheur sur Absalom.'
  - type: heading
    content: David passe le Jourdain
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Tsadoq et Abiathar  : cf. 15.24-29.'
  - type: text
    content: 'Houshaï dit aux prêtres Tsadoq et Abiathar : Ahitophel a donné tel et tel conseil à Absalom et aux anciens d''Israël ; et moi, j''ai conseillé telle et telle chose. '
  '16':
  - type: note
    content: 'dans les plaines du désert  : cf. 15.28n. –  de peur que le roi…  : litt. qu''il n''y ait un engloutissement pour le roi (= David) et tout le peuple…  ; mais le texte hébreu pourrait aussi signifier  : que le roi (= Absalom) et tout le peuple… n''en soit informé (même verbe en Jb 37.20).'
  - type: text
    content: 'Maintenant, envoyez de toute urgence un rapport à David et faites-lui dire : « Ne passe pas la nuit dans les plaines du désert ; passe plus loin, de peur que le roi et tout le peuple qui est avec lui ne soient anéantis. » '
  '17':
  - type: note
    content: 'Jonathan et Ahimaats  : cf. 15.27,36. –  Eïn-Roguel (Source du Foulon), cf. Jos 15.7 ; 1R 1.9 ; l''endroit, situé au sud-est de Jérusalem, dans la vallée du Cédron, s''appelle aujourd''hui le Puits de Job. –  Une servante  : litt. la servante (de l''un ou l''autre des prêtres).'
  - type: text
    content: 'Jonathan et Ahimaats se tenaient à Eïn-Roguel. Une servante allait leur faire un rapport et eux-mêmes allaient faire un rapport au roi David ; car ils n''osaient pas se montrer en entrant dans la ville. '
  '18':
  - type: note
    content: 'Bahourim  : cf. 3.16n  ; 16.5. –  dans le puits  : litt. là.'
  - type: text
    content: 'Un jeune homme les aperçut et le rapporta à Absalom. Mais eux deux s''en allèrent vite et arrivèrent à Bahourim, chez un homme qui avait un puits dans sa cour ; ils descendirent dans le puits. '
  '19':
  - type: note
    content: Cf. Jos 2.6 ; 1S 19.11-17.
  - type: text
    content: 'La femme prit une bâche qu''elle étendit sur l''ouverture du puits et y répandit du grain pilé, pour qu''on ne se doute de rien. '
  '2':
  - type: note
    content: 'fatigué  : cf. 16.14. –  découragé  : litt. que ses mains sont affaiblies  ; cf. 4.1n. –  je le ferai trembler ou je le mettrai en déroute.'
  - type: text
    content: 'Je le surprendrai pendant qu''il est fatigué et découragé, je le ferai trembler, et tout le peuple qui est avec lui s''enfuira. Alors j''abattrai le roi seul. '
  '20':
  - type: note
    content: 'le ruisseau  : l''hébreu présente ici une expression avec un mot inconnu, expression qu''on a parfois rendue par le réservoir de l''eau ou le canal de l''eau.'
  - type: text
    content: 'Les hommes d''Absalom entrèrent chez cette femme et dirent : Où sont Ahimaats et Jonathan ? La femme leur répondit : Ils ont passé le ruisseau. Ils cherchèrent et, ne les trouvant pas, ils retournèrent à Jérusalem. '
  '21':
  - type: note
    content: 'la rivière  : litt. l''eau, c.-à-d. le Jourdain  ; cf. v. 22.'
  - type: text
    content: 'Après leur départ, Ahimaats et Jonathan remontèrent du puits et allèrent faire un rapport au roi David. Ils dirent à David : Traversez vite la rivière, car Ahitophel a donné tel et tel conseil contre vous. '
  '22':
  - type: note
    content: 'passèrent  : litt. se levèrent et passèrent. –  à l''aube  : litt. à la lumière du matin.'
  - type: text
    content: David et tout le peuple qui était avec lui passèrent le Jourdain ; à l'aube, il n'y en avait pas un seul qui soit resté à l'écart, pas un seul qui n'ait passé le Jourdain.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'dans sa ville  : Guilo, cf. 15.12n  ; 23.34. –  il se pendit  : les cas de suicide sont rares dans la Bible ; cf. 1S 31.4ns.'
  - type: text
    content: Ahitophel, voyant que son conseil n'avait pas été suivi, sella son âne et partit pour s'en aller chez lui, dans sa ville. Il donna ses ordres à sa maison et il se pendit. C'est ainsi qu'il mourut, et on l'ensevelit dans le tombeau de son père.
  - type: heading
    content: David à Mahanaïm
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Mahanaïm  : cf. 2.8n.'
  - type: text
    content: 'David arriva à Mahanaïm. Alors Absalom passa le Jourdain, lui et tous les hommes d''Israël avec lui. '
  '25':
  - type: note
    content: 'Amasa reparaîtra en 19.14 ; 20.4-12. –  Joab (cf. 2.13n) avait accompagné David, comme le montre 18.2. –  Amasa…  : les renseignements généalogiques relatifs à Amasa présentent des variantes dans LXX et dans d''autres textes de l''A.T. où il est mentionné. –  qui était allé avec est probablement un euphémisme pour désigner une liaison avec Abigal, cf. Gn 16.2n.'
  - type: text
    content: 'Absalom mit Amasa à la tête de l''armée, en remplacement de Joab ; Amasa était fils d''un homme nommé Yitra, l''Israélite, qui était allé avec Abigal, fille de Nahash et sœur de Tserouya, mère de Joab. '
  '26':
  - type: note
    content: le Galaad, le pays où se trouvait Mahanaïm, s'étendait à l'est du Jourdain.
  - type: text
    content: Israël et Absalom dressèrent leur camp dans le Galaad.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Ammonites  : cf. 10.1s ; 12.27-31. –  Makir  : cf. 9.4. –  Lo-Debar 9.4ns. –  Barzillaï  : cf. 19.32-40 ; 1R 2.7.'
  - type: text
    content: 'Lorsque David fut arrivé à Mahanaïm, Shobi, fils de Nahash, de Rabba-des-Ammonites, Makir, fils d''Ammiel, de Lo-Debar, et Barzillaï, le Galaadite, de Roguelim, '
  '28':
  - type: note
    content: 'La longue énumération des v. 28s semble avoir subi quelques accidents de transmission, par exemple la répétition surprenante du grain rôti (cf. Rt 2.14). A propos de ces provisions, cf. 16.1 ; 1S 17.17s ; 25.18 ; voir aussi Mt 10.42. –  des bassins  : traduction incertaine (cf. Ex 12.22+) ; dans ce contexte on a aussi proposé des lainages ou, d''après des versions anciennes, des matelas, des tapis, des couvertures. –  des poteries  : cf. Jr 19.11 ; Ps 2.9.'
  - type: text
    content: 'apportèrent des lits, des bassins, des poteries, du froment, de l''orge, de la farine, du grain rôti, des fèves, des lentilles, du grain rôti, '
  '29':
  - type: note
    content: lait fermenté Gn 18.8n. –  troupe et hommes traduisent le même terme hébreu, habituellement rendu par peuple.
  - type: text
    content: 'du miel, du lait fermenté, du petit bétail et des fromages de vache. Ils apportèrent tout cela à David et à sa troupe, afin qu''ils mangent ; car ils s''étaient dit : Ces hommes ont dû souffrir de la faim, de l''épuisement et de la soif dans le désert.'
  '3':
  - type: note
    content: Le sens précis du texte hébreu n'est pas très clair même si le sens général est saisissable ; les versions anciennes ont cherché à en exprimer la signification de diverses manières, comme par exemple LXX, qui dit tout le peuple, comme la mariée revient vers son mari ; c'est à la vie d'un seul homme que tu en veux.
  - type: text
    content: 'Ainsi je ramènerai à toi tout le peuple ; le retour de tous dépend en effet de l''homme que tu recherches, et tout le peuple sera en paix. '
  '4':
  - type: note
    content: 'Cette parole convint à  : litt. la parole fut droite aux yeux de  ; Absalom est convaincu par ce conseil. –  les anciens d''Israël  : cf. 3.17 ; 5.3.'
  - type: text
    content: Cette parole convint à Absalom et à tous les anciens d'Israël.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Appelle  : Absalom s''adresse soit à Ahitophel lui-même, soit plus probablement à un de ses serviteurs ; plusieurs versions anciennes ont un pluriel à valeur impersonnelle appelez , c.-à-d. qu''on appelle . –  Houshaï  : cf. 15.32-37.'
  - type: text
    content: 'Cependant Absalom dit : Appelle encore Houshaï, l''Arkite, je te prie, que nous entendions aussi ce qu''il a à dire. '
  '6':
  - type: text
    content: 'Houshaï vint auprès d''Absalom ; Absalom lui dit : Voici comment a parlé Ahitophel ; devons-nous faire ce qu''il a dit ou non ? Parle, toi ! '
  '7':
  - type: note
    content: 'Cette fois  : par opposition à la valeur généralement reconnue des conseils d''Ahitophel (cf. 16.23).'
  - type: text
    content: 'Houshaï répondit à Absalom : Cette fois, le conseil qu''a donné Ahitophel n''est pas bon. '
  '8':
  - type: note
    content: 'Et il ajouta  : litt. et Houshaï dit. –  furieux  : litt. amers d''âme  ; cf. Jg 18.25n  ; Ha 1.6. –  comme une ourse  : cf. Os 13.8 ; Pr 17.12. –  dans la campagne  : LXX ajoute une seconde comparaison et comme une laie farouche dans la campagne.'
  - type: text
    content: 'Et il ajouta : Tu connais ton père et ses hommes : ce sont des guerriers, ils sont furieux comme une ourse à qui l''on aurait enlevé ses petits dans la campagne. Ton père est un homme de guerre, il ne passera pas la nuit avec le peuple ; '
  '9':
  - type: note
    content: 'maintenant  : autre traduction en fait. –  dans quelque fosse  : autre traduction dans quelque cachette  ; cf. 1S 22.1 ; 23.14,22s. –  sous leurs coups  : litt. par eux. –  une défaite  : autre traduction un fléau  ; cf. Ex 7.27n  ; 9.14 ; 1S 4.17.'
  - type: text
    content: 'maintenant, il est caché dans quelque fosse ou dans quelque autre lieu. Si, dès le début, il en est qui tombent sous leurs coups, on l''apprendra et on dira : « Il y a une défaite parmi le peuple qui a suivi Absalom ! » '
