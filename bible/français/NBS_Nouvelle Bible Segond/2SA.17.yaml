document_id: 2SA.17,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Houshaï contredit un conseil d'Ahitophel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je poursuivrai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je me lèverai et je poursuivrai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 20.6.
      marker-yv: yv-n
    - type: text
      text: 'Ahitophel dit à Absalom : Laisse-moi, je t''en prie, choisir douze mille hommes. Je poursuivrai David cette nuit même. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cœur de lion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se sentira fondre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 2.11 ; Es 13.7 ; Ez 21.12 ; Ps 22.15.'
      marker-yv: yv-n
    - type: text
      text: 'Alors le plus vaillant, eût-il un cœur de lion, se sentira fondre ; car tout Israël sait que ton père est un guerrier et qu''il a des hommes vaillants avec lui. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toute l'armée d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 10.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis Dan jusqu'à Bersabée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 3.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aussi nombreux que le sable…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 7.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu marcheras en personne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta face marchera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. La mobilisation générale prendra plusieurs jours et laissera donc à Houshaï le temps d''avertir David. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au combat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : terme hébreu peu courant ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au milieu d'eux.
      marker-yv: yv-n
    - type: text
      text: 'Je conseille donc que tout Israël se rassemble auprès de toi, depuis Dan jusqu''à Bersabée, aussi nombreux que le sable qui est au bord de la mer. Tu marcheras en personne au combat. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme la rosée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qui recouvre tout. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur la terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur le sol
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 2.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quel que soit le lieu où il se trouve, nous l''atteindrons et nous nous abattrons sur lui comme la rosée tombe sur la terre. Il n''en restera pas un seul, ni lui ni aucun des hommes qui sont avec lui. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous le traînerons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un ms hébreu et plusieurs versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nous la traînerons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (la ville), ce qui s'accorde mieux avec la fin du v. (
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plus un caillou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'S''il se retire dans une ville, tout Israël apportera des cordes vers cette ville, et nous le traînerons jusqu''à l''oued, jusqu''à ce qu''on n''en trouve plus un caillou. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: meilleur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avait résolu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avait ordonné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même verbe au v. 23 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: donner des ordres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 11.19s ; 2Ch 10.15 ; 25.20.'
      marker-yv: yv-n
    - type: text
      text: 'Absalom et tous les hommes d''Israël dirent : Le conseil de Houshaï, l''Arkite, est meilleur que le conseil d''Ahitophel. En effet, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait résolu de déjouer le conseil d''Ahitophel, qui était bon ; c''est ainsi que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' amenait le malheur sur Absalom.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David passe le Jourdain
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tsadoq et Abiathar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 15.24-29.'
      marker-yv: yv-n
    - type: text
      text: 'Houshaï dit aux prêtres Tsadoq et Abiathar : Ahitophel a donné tel et tel conseil à Absalom et aux anciens d''Israël ; et moi, j''ai conseillé telle et telle chose. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans les plaines du désert
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de peur que le roi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''il n''y ait un engloutissement pour le roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= David) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et tout le peuple…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; mais le texte hébreu pourrait aussi signifier'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que le roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= Absalom) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et tout le peuple… n''en soit informé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même verbe en Jb 37.20).
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, envoyez de toute urgence un rapport à David et faites-lui dire : « Ne passe pas la nuit dans les plaines du désert ; passe plus loin, de peur que le roi et tout le peuple qui est avec lui ne soient anéantis. » '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jonathan et Ahimaats
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.27,36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eïn-Roguel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Source du Foulon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), cf. Jos 15.7 ; 1R 1.9 ; l''endroit, situé au sud-est de Jérusalem, dans la vallée du Cédron, s''appelle aujourd''hui le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Puits de Job
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Une servante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la servante (de l'un ou l'autre des prêtres).
      marker-yv: yv-n
    - type: text
      text: 'Jonathan et Ahimaats se tenaient à Eïn-Roguel. Une servante allait leur faire un rapport et eux-mêmes allaient faire un rapport au roi David ; car ils n''osaient pas se montrer en entrant dans la ville. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bahourim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 16.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le puits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: là.
      marker-yv: yv-n
    - type: text
      text: 'Un jeune homme les aperçut et le rapporta à Absalom. Mais eux deux s''en allèrent vite et arrivèrent à Bahourim, chez un homme qui avait un puits dans sa cour ; ils descendirent dans le puits. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jos 2.6 ; 1S 19.11-17.
      marker-yv: yv-n
    - type: text
      text: 'La femme prit une bâche qu''elle étendit sur l''ouverture du puits et y répandit du grain pilé, pour qu''on ne se doute de rien. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fatigué
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: découragé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que ses mains sont affaiblies
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je le ferai trembler '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je le mettrai en déroute.
      marker-yv: yv-n
    - type: text
      text: 'Je le surprendrai pendant qu''il est fatigué et découragé, je le ferai trembler, et tout le peuple qui est avec lui s''enfuira. Alors j''abattrai le roi seul. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le ruisseau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''hébreu présente ici une expression avec un mot inconnu, expression qu''on a parfois rendue par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le réservoir de l''eau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le canal de l'eau.
      marker-yv: yv-n
    - type: text
      text: 'Les hommes d''Absalom entrèrent chez cette femme et dirent : Où sont Ahimaats et Jonathan ? La femme leur répondit : Ils ont passé le ruisseau. Ils cherchèrent et, ne les trouvant pas, ils retournèrent à Jérusalem. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la rivière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'eau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le Jourdain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 22.'
      marker-yv: yv-n
    - type: text
      text: 'Après leur départ, Ahimaats et Jonathan remontèrent du puits et allèrent faire un rapport au roi David. Ils dirent à David : Traversez vite la rivière, car Ahitophel a donné tel et tel conseil contre vous. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: passèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se levèrent et passèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'aube
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la lumière du matin.
      marker-yv: yv-n
    - type: text
      text: David et tout le peuple qui était avec lui passèrent le Jourdain ; à l'aube, il n'y en avait pas un seul qui soit resté à l'écart, pas un seul qui n'ait passé le Jourdain.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans sa ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Guilo, cf. 15.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 23.34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il se pendit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : les cas de suicide sont rares dans la Bible ; cf. 1S 31.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: Ahitophel, voyant que son conseil n'avait pas été suivi, sella son âne et partit pour s'en aller chez lui, dans sa ville. Il donna ses ordres à sa maison et il se pendit. C'est ainsi qu'il mourut, et on l'ensevelit dans le tombeau de son père.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David à Mahanaïm
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mahanaïm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David arriva à Mahanaïm. Alors Absalom passa le Jourdain, lui et tous les hommes d''Israël avec lui. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amasa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'reparaîtra en 19.14 ; 20.4-12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Joab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 2.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') avait accompagné David, comme le montre 18.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amasa…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les renseignements généalogiques relatifs à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amasa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'présentent des variantes dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et dans d''autres textes de l''A.T. où il est mentionné. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui était allé avec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est probablement un euphémisme pour désigner une liaison avec '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abigal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 16.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Absalom mit Amasa à la tête de l''armée, en remplacement de Joab ; Amasa était fils d''un homme nommé Yitra, l''Israélite, qui était allé avec Abigal, fille de Nahash et sœur de Tserouya, mère de Joab. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Galaad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le pays où se trouvait Mahanaïm, s''étendait à l''est du Jourdain.'
      marker-yv: yv-n
    - type: text
      text: Israël et Absalom dressèrent leur camp dans le Galaad.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ammonites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.1s ; 12.27-31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Makir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Lo-Debar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Barzillaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 19.32-40 ; 1R 2.7.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque David fut arrivé à Mahanaïm, Shobi, fils de Nahash, de Rabba-des-Ammonites, Makir, fils d''Ammiel, de Lo-Debar, et Barzillaï, le Galaadite, de Roguelim, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La longue énumération des v. 28s semble avoir subi quelques accidents de transmission, par exemple la répétition surprenante du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grain rôti '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Rt 2.14). A propos de ces provisions, cf. 16.1 ; 1S 17.17s ; 25.18 ; voir aussi Mt 10.42. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des bassins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine (cf. Ex 12.22+) ; dans ce contexte on a aussi proposé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des lainages '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, d''après des versions anciennes, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des matelas, des tapis, des couvertures
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des poteries
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jr 19.11 ; Ps 2.9.'
      marker-yv: yv-n
    - type: text
      text: 'apportèrent des lits, des bassins, des poteries, du froment, de l''orge, de la farine, du grain rôti, des fèves, des lentilles, du grain rôti, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lait fermenté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 18.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'troupe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'hommes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent le même terme hébreu, habituellement rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: peuple.
      marker-yv: yv-n
    - type: text
      text: 'du miel, du lait fermenté, du petit bétail et des fromages de vache. Ils apportèrent tout cela à David et à sa troupe, afin qu''ils mangent ; car ils s''étaient dit : Ces hommes ont dû souffrir de la faim, de l''épuisement et de la soif dans le désert.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le sens précis du texte hébreu n''est pas très clair même si le sens général est saisissable ; les versions anciennes ont cherché à en exprimer la signification de diverses manières, comme par exemple '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', qui dit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout le peuple, comme la mariée revient vers son mari ; c'est à la vie d'un seul homme que tu en veux.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi je ramènerai à toi tout le peuple ; le retour de tous dépend en effet de l''homme que tu recherches, et tout le peuple sera en paix. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Cette parole convint à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la parole fut droite aux yeux de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Absalom est convaincu par ce conseil. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les anciens d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.17 ; 5.3.'
      marker-yv: yv-n
    - type: text
      text: Cette parole convint à Absalom et à tous les anciens d'Israël.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Appelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Absalom s''adresse soit à Ahitophel lui-même, soit plus probablement à un de ses serviteurs ; plusieurs versions anciennes ont un pluriel à valeur impersonnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: appelez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'on appelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Houshaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 15.32-37.'
      marker-yv: yv-n
    - type: text
      text: 'Cependant Absalom dit : Appelle encore Houshaï, l''Arkite, je te prie, que nous entendions aussi ce qu''il a à dire. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Houshaï vint auprès d''Absalom ; Absalom lui dit : Voici comment a parlé Ahitophel ; devons-nous faire ce qu''il a dit ou non ? Parle, toi ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Cette fois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : par opposition à la valeur généralement reconnue des conseils d''Ahitophel (cf. 16.23).'
      marker-yv: yv-n
    - type: text
      text: 'Houshaï répondit à Absalom : Cette fois, le conseil qu''a donné Ahitophel n''est pas bon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Et il ajouta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et Houshaï dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: furieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: amers d'âme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jg 18.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ha 1.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme une ourse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Os 13.8 ; Pr 17.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX ajoute une seconde comparaison '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et comme une laie farouche dans la campagne.
      marker-yv: yv-n
    - type: text
      text: 'Et il ajouta : Tu connais ton père et ses hommes : ce sont des guerriers, ils sont furieux comme une ourse à qui l''on aurait enlevé ses petits dans la campagne. Ton père est un homme de guerre, il ne passera pas la nuit avec le peuple ; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maintenant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans quelque fosse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans quelque cachette
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1S 22.1 ; 23.14,22s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sous leurs coups
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une défaite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un fléau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 7.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 9.14 ; 1S 4.17.'
      marker-yv: yv-n
    - type: text
      text: 'maintenant, il est caché dans quelque fosse ou dans quelque autre lieu. Si, dès le début, il en est qui tombent sous leurs coups, on l''apprendra et on dira : « Il y a une défaite parmi le peuple qui a suivi Absalom ! » '
