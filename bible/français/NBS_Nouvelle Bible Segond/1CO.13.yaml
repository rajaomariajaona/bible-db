    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les langues
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 12.10,28,30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des humains et des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: anges
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2Co 12.4 ; Ap 14.2s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'si je n''ai pas l''amour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si je n'ai pas d'amour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même possibilité dans la suite ; cf. 12.20-26 ; 16.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une cymbale…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ps 150.5.'
      marker-yv: yv-n
    - type: text
      text: 'Quand je parlerais les langues des humains et des anges, si je n''ai pas l''amour, je suis une pièce de bronze qui résonne ou une cymbale qui retentit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'accomplissement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ce qui est accompli '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parfait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'mais quand viendra l''accomplissement, ce qui est partiel sera aboli. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Lorsque j''étais tout petit, je parlais comme un tout-petit, je pensais comme un tout-petit, je raisonnais comme un tout-petit ; lorsque je suis devenu un homme, j''ai aboli ce qui était propre au tout-petit. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au moyen d'un miroir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''expression peut se référer, soit à l''imperfection des miroirs de métal poli utilisés dans l''Antiquité, soit au caractère indirect et fugace de l''image réfléchie ; cf. Jc 1.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'une manière confuse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en énigme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Nb 12.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'face à face '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 32.31 ; cf. 2Co 5.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je connaîtrai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe habituel (v. 9) est ici accompagné d''un préfixe qui lui donne peut-être une nuance intensive : '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je connaîtrai '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pleinement, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme je suis '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pleinement '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'connu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (8.3+).
      marker-yv: yv-n
    - type: text
      text: Aujourd'hui nous voyons au moyen d'un miroir, d'une manière confuse, mais alors ce sera face à face. Aujourd'hui je connais partiellement, mais alors je connaîtrai comme je suis connu.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la foi, l''espérance, l''amour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 5.1-5 ; Ga 5.5 ; Ep 4.2ss ; Col 1.4s ; 1Th 1.3 ; 5.8 ; Hé 6.10 ; 10.22-24 ; 1P 1.3ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le plus grand
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Rm 8.35-39 ; 1Jn 4.7ss.'
      marker-yv: yv-n
    - type: text
      text: 'Or maintenant trois choses demeurent : la foi, l''espérance, l''amour ; mais c''est l''amour qui est le plus grand.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
