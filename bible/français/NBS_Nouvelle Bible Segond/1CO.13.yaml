      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mystères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 14.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'connaissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la foi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(12.9) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui transporte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au point de transporter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des montagnes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 17.20+/ /.
      marker-yv: yv-n
    - type: text
      text: 'Quand j''aurais la capacité de parler en prophète, la science de tous les mystères et toute la connaissance, quand j''aurais même toute la foi qui transporte des montagnes, si je n''ai pas l''amour, je ne suis rien. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Quand je…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quand je distribuerais tous mes biens pour nourrir autrui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mt 6.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour en tirer fierté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour faire le fier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(1.29+) ; certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour être brûlé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; les deux verbes grecs ont des formes très semblables ; cf. Dn 3.19s.'
      marker-yv: yv-n
    - type: text
      text: Quand je distribuerais tous mes biens, quand même je livrerais mon corps pour en tirer fierté, si je n'ai pas l'amour, cela ne me sert à rien.
