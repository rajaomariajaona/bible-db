document_id: 1CO.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'amour
  - type: text
    content: ' '
  - type: note
    content: 'les langues  : cf. 12.10,28,30. –  des humains et des anges  : cf. 2Co 12.4 ; Ap 14.2s. –  si je n''ai pas l''amour ou si je n''ai pas d''amour , même possibilité dans la suite ; cf. 12.20-26 ; 16.14. –  une cymbale…  : cf. Ps 150.5.'
  - type: text
    content: 'Quand je parlerais les langues des humains et des anges, si je n''ai pas l''amour, je suis une pièce de bronze qui résonne ou une cymbale qui retentit. '
  '10':
  - type: note
    content: 'l''accomplissement  : litt. ce qui est accompli ou parfait, cf. 2.6n.'
  - type: text
    content: 'mais quand viendra l''accomplissement, ce qui est partiel sera aboli. '
  '11':
  - type: text
    content: 'Lorsque j''étais tout petit, je parlais comme un tout-petit, je pensais comme un tout-petit, je raisonnais comme un tout-petit ; lorsque je suis devenu un homme, j''ai aboli ce qui était propre au tout-petit. '
  '12':
  - type: note
    content: 'au moyen d''un miroir  : l''expression peut se référer, soit à l''imperfection des miroirs de métal poli utilisés dans l''Antiquité, soit au caractère indirect et fugace de l''image réfléchie ; cf. Jc 1.23. –  d''une manière confuse  : litt. en énigme, cf. Nb 12.8. –  face à face Gn 32.31 ; cf. 2Co 5.7. –  je connaîtrai  : le verbe habituel (v. 9) est ici accompagné d''un préfixe qui lui donne peut-être une nuance intensive : je connaîtrai pleinement, comme je suis pleinement connu (8.3+).'
  - type: text
    content: Aujourd'hui nous voyons au moyen d'un miroir, d'une manière confuse, mais alors ce sera face à face. Aujourd'hui je connais partiellement, mais alors je connaîtrai comme je suis connu.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'la foi, l''espérance, l''amour Rm 5.1-5 ; Ga 5.5 ; Ep 4.2ss ; Col 1.4s ; 1Th 1.3 ; 5.8 ; Hé 6.10 ; 10.22-24 ; 1P 1.3ss. –  le plus grand  : cf. Rm 8.35-39 ; 1Jn 4.7ss.'
  - type: text
    content: 'Or maintenant trois choses demeurent : la foi, l''espérance, l''amour ; mais c''est l''amour qui est le plus grand.'
  '2':
  - type: note
    content: 'la capacité de parler en prophète  : litt. la prophétie, v. 8 ; 12.10,28s ; cf. Mt 7.22. –  mystères 2.1n  ; 14.2. –  connaissance 12.8+. –  la foi (12.9) qui transporte (ou au point de transporter) des montagnes Mt 17.20+/ /.'
  - type: text
    content: 'Quand j''aurais la capacité de parler en prophète, la science de tous les mystères et toute la connaissance, quand j''aurais même toute la foi qui transporte des montagnes, si je n''ai pas l''amour, je ne suis rien. '
  '3':
  - type: note
    content: 'Quand je…  : autre traduction quand je distribuerais tous mes biens pour nourrir autrui  ; cf. Mt 6.2. –  pour en tirer fierté ou pour faire le fier (1.29+) ; certains mss portent pour être brûlé  ; les deux verbes grecs ont des formes très semblables ; cf. Dn 3.19s.'
  - type: text
    content: Quand je distribuerais tous mes biens, quand même je livrerais mon corps pour en tirer fierté, si je n'ai pas l'amour, cela ne me sert à rien.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'patient  : c''est le terme grec utilisé dans LXX pour la patience de Dieu (Ex 34.6 ; Nb 14.18 ; Jon 4.2 ; Pr 14.29 ; 15.18 ; 16.32) ; voir aussi Ep 4.2 ; 1Th 5.15. –  est bon ou généreux  ; sur la famille de termes correspondante, voir Rm 2.4n. –  passion jalouse  : cf. 12.31n. –  l''amour ne se vante pas  : certains mss portent il ne se vante pas . –  ne se gonfle pas d''orgueil 4.6n  ; 8.1n.'
  - type: text
    content: 'L''amour est patient, l''amour est bon, il n''a pas de passion jalouse ; l''amour ne se vante pas, il ne se gonfle pas d''orgueil, '
  '5':
  - type: note
    content: 'Cf. Rm 13.10. –  d''inconvenant  : (7.36) le terme grec s''oppose à celui qui est traduit par convenable (7.35n) ou décent (12.23s). –  ne cherche pas son propre intérêt 10.24+. –  il ne tient pas compte du mal  : on pourrait aussi comprendre il ne prépare pas le mal  ; cf. Za 8.17 ; Mt 10.16.'
  - type: text
    content: 'il ne fait rien d''inconvenant, il ne cherche pas son propre intérêt, il ne s''irrite pas, il ne tient pas compte du mal ; '
  '6':
  - type: note
    content: Cf. 2Co 13.8.
  - type: text
    content: 'il ne se réjouit pas de l''injustice, mais il se réjouit avec la vérité ; '
  '7':
  - type: note
    content: 'pardonne  : litt. couvre, cf. Pr 10.12 ; Jc 5.20 ; 1P 4.8. –  croit / espère  : cf. v. 13. –  endure tout  : cf. 9.12 ; voir aussi 6.7 ; Rm 2.7+ ; 2Co 1.6+ ; 2Tm 2.10.'
  - type: text
    content: il pardonne tout, il croit tout, il espère tout, il endure tout.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'succombe  : litt. tombe . –  messages de prophètes (litt. prophéties ) / langues / connaissance v. 1s. –  abolis ou réduits à rien , de même dans la suite ; cf. 1.28+.'
  - type: text
    content: 'L''amour ne succombe jamais. Les messages de prophètes ? ils seront abolis ; les langues ? elles cesseront ; la connaissance ? elle sera abolie. '
  '9':
  - type: note
    content: 'partiellement  : la même expression (aussi v. 12) est traduite chacun pour sa part en 12.27.'
  - type: text
    content: 'Car c''est partiellement que nous connaissons, c''est partiellement que nous parlons en prophètes ; '
