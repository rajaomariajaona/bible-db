        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: passion jalouse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
