document_id: PRO.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sage et le méchant
  - type: text
    content: ' '
  - type: note
    content: Ne sois pas jaloux… 23.17+.
  - type: text
    content: Ne sois pas jaloux des hommes mauvais,
  - type: text
    content: ne désire pas être avec eux ;
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Si tu te relâches  : autre traduction si tu te montres faible (ou lâche ) ; cf. 18.9+ ; Jb 4.5ss. –  ta force est peu de chose  : litt. ta force est étroite (même terme en 23.27). Les mots hébreux correspondant à étroite et à détresse sont apparentés ; autre traduction tes biens (cf. 5.10n) seront réduits à peu de chose.'
  - type: text
    content: Si tu te relâches au jour de la détresse,
  - type: text
    content: ta force est peu de chose.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 82.4 ; les v. 11s s'adressent selon toute vraisemblance à des personnes en situation d'autorité, et tout particulièrement au roi, qui a le pouvoir de gracier des condamnés.
  - type: text
    content: Délivre ceux qu'on traîne à la mort ;
  - type: text
    content: ceux qui, en vacillant, vont à la tuerie, épargne-les !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui pèse  : cf. 16.2. –  Celui qui te garde ou qui préserve ta vie  : cf. 13.6n. –  Ne rendra-t-il pas…  : cf. Ps 62.13 ; Rm 2.6 ; Ap 22.12. Voir aussi Jr 32.19 ; Jb 34.11.'
  - type: text
    content: 'Si tu dis : « Nous ne savions pas ! »,'
  - type: text
    content: celui qui pèse les cœurs ne le comprend-il pas ?
  - type: text
    content: Celui qui te garde ne le sait-il pas ?
  - type: text
    content: Ne rendra-t-il pas à chacun selon son action ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 25.16 ; Ps 19.11 ; 119.103.
  - type: text
    content: 'Mon fils, mange du miel : c''est bon !'
  - type: text
    content: Le rayon de miel est doux à ton palais.
  '14':
  - type: text
    content: ' '
  - type: note
    content: ton espoir… 23.18.
  - type: text
    content: De même, connais la sagesse pour toi-même ;
  - type: text
    content: si tu la trouves, il y a un avenir ;
  - type: text
    content: et ton espoir ne sera pas retranché.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'comme un méchant  : litt. méchant . –  le lieu de son repos ou le lieu où il couche  ; même terme en Es 35.7 ; 65.10 ; Jr 50.6 ; il est dérivé du verbe traduit par être tapi en Gn 4.7n, qui évoque le plus souvent des animaux au repos (Gn 29.2 ; 49.9n  ; Es 11.6ns ; cf. Ps 23.2 ; Jb 11.19).'
  - type: text
    content: Ne tends pas d'embuscade dans le domaine du juste, comme un méchant ;
  - type: text
    content: ne ravage pas le lieu de son repos ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'sept reprises  : cf. Jb 5.19. –  les méchants trébuchent  : cf. Am 5.2 ; 8.14 ; Ps 34.20. –  dans le malheur  : autre traduction par le mal (qu''ils font).'
  - type: text
    content: car à sept reprises le juste peut tomber, et il se relève ;
  - type: text
    content: mais les méchants trébuchent dans le malheur.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 17.5n  ; Jb 31.29.
  - type: text
    content: Si ton ennemi tombe, ne te réjouis pas ;
  - type: text
    content: quand il trébuche, que ton cœur ne soit pas dans l'allégresse,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'ne lui déplaise  : litt. ne soit mauvais à ses yeux.'
  - type: text
    content: 'de peur que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne le voie, que cela ne lui déplaise'
  - type: text
    content: et qu'il ne détourne de lui sa colère.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Ne te fâche pas…  : autres traductions ne te fâche pas à cause des mauvais ; ne rivalise pas avec les mauvais  ; cf. 2.14 ; 17.4 ; Ps 37.1. –  ne sois pas jaloux v. 1+. Cf. Siracide 9.11s : « N''envie pas le succès du pécheur : tu ne sais pas quelle triste fin l''attend. N''approuve pas la réussite des impies, souviens-toi qu''ils ne resteront pas impunis jusqu''à la mort. »'
  - type: text
    content: Ne te fâche pas contre les mauvais,
  - type: text
    content: ne sois pas jaloux des méchants ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'leur cœur médite  : autre traduction murmure  ; cf. 15.28. –  leurs lèvres causent du mal  : cf. Ps 10.7.'
  - type: text
    content: car leur cœur médite des ravages,
  - type: text
    content: et leurs lèvres causent du mal.
  '20':
  - type: text
    content: ' '
  - type: note
    content: la lampe… 13.9+.
  - type: text
    content: car il n'y a pas d'avenir pour le mauvais ;
  - type: text
    content: la lampe des méchants s'éteint.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1P 2.17. – Voir crainte. –  aux novateurs  : autre traduction aux gens changeants . LXX ne te révolte ni contre l''un ni contre l''autre.'
  - type: text
    content: 'Mon fils, crains le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et le roi ;'
  - type: text
    content: ne te mêle pas aux novateurs ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'la catastrophe…  : litt. leur catastrophe surgit . –  de ceux-là  : litt. d''eux deux (les châtiments envoyés par Dieu et le roi, cf. v. 21 ? le sort des uns et des autres ?). Autre lecture possible  : de leurs années . – Après ce verset, LXX ajoute cinq versets qui ne figurent pas dans l''hébreu  : Un fils qui garde la parole échappera à la perdition, s''il l''a bien reçue. Que rien de mensonger ne soit dit au roi par la langue ; que rien de mensonger ne sorte jamais de sa langue. La langue du roi est une épée, et non un membre de chair ; quiconque lui est livré sera broyé. Si donc sa fureur est aiguisée, il tue les hommes avec leurs (ou des ) nerfs, il dévore les os des hommes et les brûle comme une flamme au point de les rendre immangeables aux petits des aigles . Suit la section correspondant à 30.1-14.'
  - type: text
    content: car soudain la catastrophe surgit pour eux,
  - type: text
    content: et qui connaît les châtiments de ceux-là ?
  - type: heading
    content: Autres conseils des sages
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'vient des sages  : litt. (est) aux sages  ; autre traduction est destiné aux sages  ; LXX je vous dis cela, à vous, les sages . –  de se montrer partial  : litt. de reconnaître (ou de distinguer ) le visage . Cf. 18.5+ ; 28.21 ; Ex 23.3,6 ; Lv 19.15 ; Dt 1.17 ; 16.19 ; Jn 7.24 ; Jc 2.1.'
  - type: text
    content: 'Ceci également vient des sages :'
  - type: text
    content: il n'est pas bon, dans un jugement, de se montrer partial.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Tu es juste  : cf. 17.15n. –  le vouent… 11.26+.'
  - type: text
    content: 'Celui qui dit au méchant : « Tu es juste ! »,'
  - type: text
    content: les peuples le vouent à la malédiction, les nations sont furieuses contre lui.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'une riche bénédiction…  : litt. une bénédiction bonne ou une bénédiction de bonheur.'
  - type: text
    content: Mais ceux qui l'avertissent font une belle œuvre ;
  - type: text
    content: une riche bénédiction vient sur eux.
  '26':
  - type: text
    content: Il donne un baiser sur les lèvres,
  - type: text
    content: celui qui répond des paroles droites.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'organise-le  : autre traduction prépare-le  ; cf. Jb 15.28n. Voir Siracide 7.15 : « Ne déteste pas le travail pénible, ni le travail des champs créé par le Très-Haut. »'
  - type: text
    content: Fais bien ton ouvrage au dehors,
  - type: text
    content: organise-le dans tes champs ;
  - type: text
    content: ensuite tu bâtiras ta maison.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Ne témoigne pas…  : certains modifient le texte hébreu traditionnel pour lire ne sois pas un témoin de violence  ; LXX un faux témoin.'
  - type: text
    content: Ne témoigne pas sans raison contre ton prochain ;
  - type: text
    content: voudrais-tu duper par tes lèvres ?
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'il m''a fait…  : cf. Mt 6.12,14-15 ; Rm 12.17,19. –  je rendrai… v. 12.'
  - type: text
    content: 'Ne dis pas : « Comme il m''a fait, ainsi je lui ferai,'
  - type: text
    content: je rendrai à chacun selon son action. »
  - type: heading
    content: Le sort du paresseux
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'une maison se bâtit  : cf. 14.1.'
  - type: text
    content: C'est par la sagesse qu'une maison se bâtit ;
  - type: text
    content: c'est par l'intelligence qu'elle s'affermit ;
  '30':
  - type: text
    content: ' '
  - type: note
    content: paresseux 6.6n. –  dépourvu de raison 6.32n.
  - type: text
    content: Je suis passé près du champ d'un paresseux,
  - type: text
    content: près de la vigne d'un homme dépourvu de raison.
  '31':
  - type: text
    content: Les orties y poussaient partout,
  - type: text
    content: les mauvaises herbes en couvraient la surface,
  - type: text
    content: son mur de pierres avait été rasé.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai réfléchi  : litt. j''ai mis mon cœur.'
  - type: text
    content: Moi, j'ai regardé, j'ai réfléchi,
  - type: text
    content: j'ai vu, j'en ai tiré instruction.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 6.10n.
  - type: text
    content: Un peu de sommeil, un peu d'assoupissement,
  - type: text
    content: un peu croiser les bras en se couchant…
  '34':
  - type: text
    content: ' '
  - type: note
    content: '6.11n. –  arrivera  : sous-entendu dans le texte.'
  - type: text
    content: et la pauvreté, qui rôde, te surprendra ;
  - type: text
    content: la misère arrivera comme un soudard.
  '4':
  - type: text
    content: c'est par la connaissance que les pièces se remplissent
  - type: text
    content: de tous les biens précieux et beaux.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Un homme sage…  : LXX le sage vaut mieux que le puissant, et l''homme qui a de l''intelligence que celui qui a de grandes terres  ; cf. 21.22.'
  - type: text
    content: Un homme sage est plein de puissance ;
  - type: text
    content: celui qui a de la connaissance accroît sa force.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '20.18. –  Car  : le terme correspondant est absent de LXX et Syr. –  art de diriger ou stratégie , 1.5n  ; 12.5. –  salut ou victoire  : cf. 11.14+.'
  - type: text
    content: 'Car avec l''art de diriger tu pourras faire la guerre :'
  - type: text
    content: le salut est dans le grand nombre des conseillers.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'LXX présente à partir d''ici un texte passablement différent  : La sagesse et la bonne intelligence sont dans les portes des sages (c.-à-d. chez les sages )  ; les sages ne se détournent pas de la bouche du Seigneur, (8) mais ils tiennent conseil ; la mort va au-devant des indisciplinés ; (9) l''homme déraisonnable meurt dans ses péchés ; l''impureté souille l''homme de peste (10) au jour du malheur, au jour de la détresse, jusqu''à ce qu''il disparaisse . –  La Sagesse…  : litt. les sagesses (sur le sens du pluriel, voir 1.20n) (sont) des hauteurs pour l''imbécile . Le mot traduit par hauteurs est parfois interprété au sens de corail (matière fragile et précieuse ; cf. Ez 27.16) ; cf. 14.6 ; Siracide 6.20 : « Que la sagesse est donc rude aux ignorants, il ne persévérera pas, l''homme sans intelligence. » –  l''imbécile 1.7+. –  à la porte ( de la ville est sous-entendu dans le texte), où l''on traitait les affaires publiques, et en particulier les procès 22.22n  ; Dt 16.18n.'
  - type: text
    content: La Sagesse est trop élevée pour l'imbécile ;
  - type: text
    content: il n'ouvrira pas la bouche à la porte de la ville.
  '8':
  - type: text
    content: Celui qui prépare ses méfaits,
  - type: text
    content: on l'appelle maître en intrigues.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'La réflexion  : autre traduction l''intrigue . –  l''insolent 1.22n.'
  - type: text
    content: La réflexion de l'imbécillité n'est que péché ;
  - type: text
    content: l'insolent est une abomination parmi les humains.
