        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.19+ ; cf. Es 58.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout cela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toutes ces paroles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tu annonceras tout cela à ce peuple, et qu''ils te diront : Pourquoi le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a-t-il décrété contre nous tout ce grand malheur ? Quelle est notre faute ? Quel est le péché que nous avons commis contre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abandonné '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.13+ ; cf. 13.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils ont suivi… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'observé ma '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'gardé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: retenu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mon instruction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors tu leur répondras : C''est que vos pères m''ont abandonné – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). Ils ont suivi d''autres dieux, ils les ont servis et se sont prosternés devant eux ; mais moi, ils m''ont abandonné, et ils n''ont pas observé ma loi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'encore plus de mal… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'obstination… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Et vous, vous avez fait encore plus de mal que vos pères ; chacun de vous suit l''obstination de son cœur mauvais, sans m''écouter. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jetterai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.18+ ; 22.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas connu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous servirez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la même expression peut signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'être esclave '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(17.4) ; cf. 5.19 ; Dt 4.28 ; 28.64. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rémission
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant n''apparaît qu''ici dans l''A.T. ; c''est un dérivé du terme habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: grâce.
      marker-yv: yv-n
    - type: text
      text: Je vous jetterai de ce pays dans un pays que vous n'avez pas connu, ni vous, ni vos pères ; là, vous servirez d'autres dieux jour et nuit, car je ne vous accorderai plus de rémission.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le grand retour
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.7s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'monter d''Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.6+ ; Gn 12.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''est pourquoi les jours viennent – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – où on ne dira plus : « Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qui a fait monter d''Egypte les Israélites ! », '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du pays du nord '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.18+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je les ramènerai… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur leur terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur leur sol
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 2.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'mais : « Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qui a fait monter les Israélites du pays du nord et de tous les pays où il les avait bannis ! » Je les ramènerai sur leur terre, celle que j''ai donnée à leurs pères.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pêcheurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chasseurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ez 12.13+ ; 29.4 ; Am 4.2 ; Ha 1.14-17 ; voir aussi Mc 1.17/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur toutes les montagnes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lm 4.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans les fentes des rochers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.29 ; Es 2.10 ; 7.19.
      marker-yv: yv-n
    - type: text
      text: 'J''envoie une multitude de pêcheurs, – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – et ils les pêcheront ; et après cela j''enverrai une multitude de chasseurs, et ils les chasseront sur toutes les montagnes et sur toutes les collines, jusque dans les fentes des rochers. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 11.20+ ; 32.19 ; Os 7.2 ; Ps 90.8 ; 139 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.15,19s : « Leurs voies sont devant lui (le Seigneur) en tout temps, elles n''échapperont pas à ses yeux… Toutes leurs actions sont devant lui comme le soleil, ses regards observent continuellement leurs voies. Leurs injustices ne lui échappent pas, tous leurs '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péchés
        - type: text
          text: ' sont devant le Seigneur. » 23.19 : « (L''homme infidèle) ignore que les yeux du Seigneur sont infiniment plus lumineux que le soleil, qu''ils observent toutes les démarches des hommes et pénètrent les plus secrets recoins. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dissimulée…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 65.16.'
      marker-yv: yv-n
    - type: text
      text: 'Car j''ai les yeux sur toutes leurs voies, elles ne me sont pas cachées ; leur faute ne peut être dissimulée à mes regards. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tout d'abord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette précision (cf. v. 14s) est omise par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je les paierai de retour…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je leur rendrai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même verbe 18.20 ; 25.14 ; 32.18s ; 50.29 ; 51.6,24,56) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au double
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; des versions anciennes ont compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je rétribuerai leur double faute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 11s ; 2.13+ ; voir aussi 17.18 ; Ex 22.3ss ; Es 40.2+ ; Ap 18.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: profané mon pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.7 ; Lv 18.24-30 ; Ez 36.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des cadavres… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 26.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'horreurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abominations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 44.19.
      marker-yv: yv-n
    - type: text
      text: Tout d'abord, je les paierai de retour, au double de leur faute et de leur péché, parce qu'ils ont profané mon pays, parce qu'ils ont rempli mon patrimoine des cadavres de leurs horreurs et de leurs abominations.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le seul vrai Dieu enfin reconnu par tous
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ', ma force…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ps 18.2s ; 28.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les nations viendront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.17+ ; cf. 12.16 ; 1R 8.43. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mensonge '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 13.25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'futilité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne sert à rien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.8+.
      marker-yv: yv-n
    - type: text
      text: '– '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ma force, ma forteresse,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon refuge au jour de la détresse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nations viendront à toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des extrémités de la terre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'elles diront :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nos pères n'ont reçu que le mensonge pour patrimoine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une futilité qui ne sert à rien.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ez 24.16ss ; Mt 19.12 ; 1Co 7.26ss.
      marker-yv: yv-n
    - type: text
      text: 'Tu ne prendras pas de femme, tu n''auras en ce lieu ni fils ni filles. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce ne sont pas des dieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
