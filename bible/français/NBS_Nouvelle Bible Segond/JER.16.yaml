document_id: JER.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Célibat et solitude de Jérémie
  - type: text
    content: ' '
  - type: note
    content: 1.2n.
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '5.19+ ; cf. Es 58.3. –  tout cela  : autre traduction toutes ces paroles . – Voir péché.'
  - type: text
    content: 'Lorsque tu annonceras tout cela à ce peuple, et qu''ils te diront : Pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a-t-il décrété contre nous tout ce grand malheur ? Quelle est notre faute ? Quel est le péché que nous avons commis contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu ? '
  '11':
  - type: note
    content: 'abandonné 2.13+ ; cf. 13.10. –  Ils ont suivi… 7.6+. –  observé ma loi  : autre traduction gardé (ou retenu) mon instruction 2.8n.'
  - type: text
    content: 'Alors tu leur répondras : C''est que vos pères m''ont abandonné – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). Ils ont suivi d''autres dieux, ils les ont servis et se sont prosternés devant eux ; mais moi, ils m''ont abandonné, et ils n''ont pas observé ma loi. '
  '12':
  - type: note
    content: encore plus de mal… 7.26. –  obstination… 3.17n.
  - type: text
    content: 'Et vous, vous avez fait encore plus de mal que vos pères ; chacun de vous suit l''obstination de son cœur mauvais, sans m''écouter. '
  '13':
  - type: note
    content: 'jetterai  : cf. 10.18+ ; 22.26. –  pas connu 9.15+. –  vous servirez  : la même expression peut signifier être esclave (17.4) ; cf. 5.19 ; Dt 4.28 ; 28.64. –  rémission  : le mot hébreu correspondant n''apparaît qu''ici dans l''A.T. ; c''est un dérivé du terme habituellement traduit par grâce.'
  - type: text
    content: Je vous jetterai de ce pays dans un pays que vous n'avez pas connu, ni vous, ni vos pères ; là, vous servirez d'autres dieux jour et nuit, car je ne vous accorderai plus de rémission.
  - type: heading
    content: Le grand retour
  '14':
  - type: text
    content: ' '
  - type: note
    content: 23.7s. –  Par la vie du Seigneur 4.2n. –  monter d'Egypte 2.6+ ; Gn 12.10n.
  - type: text
    content: 'C''est pourquoi les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où on ne dira plus : « Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui a fait monter d''Egypte les Israélites ! », '
  '15':
  - type: note
    content: 'du pays du nord 1.14n  ; 3.18+. –  Je les ramènerai… 12.15+. –  sur leur terre  : litt. sur leur sol  ; cf. Gn 2.5n.'
  - type: text
    content: 'mais : « Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui a fait monter les Israélites du pays du nord et de tous les pays où il les avait bannis ! » Je les ramènerai sur leur terre, celle que j''ai donnée à leurs pères.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'pêcheurs / chasseurs  : cf. Ez 12.13+ ; 29.4 ; Am 4.2 ; Ha 1.14-17 ; voir aussi Mc 1.17/ /. –  sur toutes les montagnes Lm 4.19. –  dans les fentes des rochers 4.29 ; Es 2.10 ; 7.19.'
  - type: text
    content: 'J''envoie une multitude de pêcheurs, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – et ils les pêcheront ; et après cela j''enverrai une multitude de chasseurs, et ils les chasseront sur toutes les montagnes et sur toutes les collines, jusque dans les fentes des rochers. '
  '17':
  - type: note
    content: 'Cf. 11.20+ ; 32.19 ; Os 7.2 ; Ps 90.8 ; 139 ; Siracide 17.15,19s : « Leurs voies sont devant lui (le Seigneur) en tout temps, elles n''échapperont pas à ses yeux… Toutes leurs actions sont devant lui comme le soleil, ses regards observent continuellement leurs voies. Leurs injustices ne lui échappent pas, tous leurs péchés sont devant le Seigneur. » 23.19 : « (L''homme infidèle) ignore que les yeux du Seigneur sont infiniment plus lumineux que le soleil, qu''ils observent toutes les démarches des hommes et pénètrent les plus secrets recoins. » –  dissimulée…  : cf. Es 65.16.'
  - type: text
    content: 'Car j''ai les yeux sur toutes leurs voies, elles ne me sont pas cachées ; leur faute ne peut être dissimulée à mes regards. '
  '18':
  - type: note
    content: 'Tout d''abord  : cette précision (cf. v. 14s) est omise par LXX. –  je les paierai de retour…  : litt. je leur rendrai (même verbe 18.20 ; 25.14 ; 32.18s ; 50.29 ; 51.6,24,56) au double  ; des versions anciennes ont compris je rétribuerai leur double faute  ; cf. v. 11s ; 2.13+ ; voir aussi 17.18 ; Ex 22.3ss ; Es 40.2+ ; Ap 18.6. –  profané mon pays  : cf. 2.7 ; Lv 18.24-30 ; Ez 36.18. –  des cadavres… Lv 26.30. –  horreurs 4.1n. –  abominations Es 44.19.'
  - type: text
    content: Tout d'abord, je les paierai de retour, au double de leur faute et de leur péché, parce qu'ils ont profané mon pays, parce qu'ils ont rempli mon patrimoine des cadavres de leurs horreurs et de leurs abominations.
  - type: heading
    content: Le seul vrai Dieu enfin reconnu par tous
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Seigneur, ma force…  : cf. Ps 18.2s ; 28.7. –  Les nations viendront 3.17+ ; cf. 12.16 ; 1R 8.43. –  mensonge 5.31n  ; 13.25+. –  futilité 8.19n. –  ne sert à rien 2.8+.'
  - type: text
    content: '– '
  - type: text
    content: Seigneur
  - type: text
    content: ', ma force, ma forteresse,'
  - type: text
    content: mon refuge au jour de la détresse !
  - type: text
    content: Les nations viendront à toi
  - type: text
    content: des extrémités de la terre ;
  - type: text
    content: 'elles diront :'
  - type: text
    content: Nos pères n'ont reçu que le mensonge pour patrimoine,
  - type: text
    content: une futilité qui ne sert à rien.
  '2':
  - type: note
    content: Cf. Ez 24.16ss ; Mt 19.12 ; 1Co 7.26ss.
  - type: text
    content: 'Tu ne prendras pas de femme, tu n''auras en ce lieu ni fils ni filles. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'ce ne sont pas des dieux  : cette proposition vise ou bien les dieux eux-mêmes, ou bien les hommes qui les fabriquent ; cf. 2.11+,28.'
  - type: text
    content: L'être humain peut-il se faire des dieux,
  - type: text
    content: alors que ce ne sont pas des dieux ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.23 ; 10.16+ ; 31.35 ; Ez 5.13+ ; Ps 83.19. –  la vigueur de ma main  : litt. ma main et ma puissance . – Voir nom.'
  - type: text
    content: C'est pourquoi je leur fais connaître,
  - type: text
    content: cette fois-ci je leur ferai connaître
  - type: text
    content: la vigueur de ma main ;
  - type: text
    content: 'ainsi ils sauront que mon nom est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '3':
  - type: note
    content: 'voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 5,9).'
  - type: text
    content: 'Car voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre les fils et les filles qui naîtront en ce lieu, contre leurs mères, qui les auront mis au monde, et contre leurs pères, qui les auront engendrés dans ce pays : '
  '4':
  - type: note
    content: 'de maladie…  : litt. de morts de maladies  ; cf. 14.12+,18 ; Dt 29.21 ; Ps 103.3 ; le même mot est traduit par souffrances 2Ch 21.19. –  on ne se lamentera pas… v. 6 ; 4.8+. –  du fumier… 8.2+. –  des oiseaux… 7.33+.'
  - type: text
    content: 'Ils mourront de maladie ; on ne se lamentera pas sur eux, on ne les ensevelira pas ; ils deviendront du fumier sur la terre. Ils seront exterminés par l''épée et par la famine, et leurs cadavres seront la pâture des oiseaux du ciel et des bêtes de la terre. '
  '5':
  - type: note
    content: 'Cf. Ez 24.15-27. –  rite funéraire  : terme rare et traduction incertaine ; un mot très proche est traduit par banquets en Am 6.7. –  ne les plains pas 15.5n. –  j''ai retiré à  : litt. j''ai recueilli de, c.-à-d. je lui ai repris. –  paix / fidélité / compassion  : cf. 4.10n  ; 9.23+ ; 13.14+ ; voir aussi 31.3 ; 33.11 ; Nb 6.26 ; Es 54.10 ; Os 2.21.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : N''entre pas dans une maison de rite funéraire, ne va pas te lamenter, ne les plains pas : j''ai retiré à ce peuple ma paix, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – ma fidélité et ma compassion. '
  '6':
  - type: note
    content: 22.18s ; 47.5 ; cf. Dt 14.1 ; Ez 24.23.
  - type: text
    content: 'Grands et petits mourront dans ce pays ; on ne les ensevelira pas ; on ne se lamentera pas sur eux, on ne se fera pas d''incisions et on ne se rasera pas pour eux. '
  '7':
  - type: note
    content: 'Autre texte, selon d''autres mss  : Pour eux on ne rompra pas… on ne leur offrira pas… –  le pain  : cf. Ez 24.17n. –  on n''offrira pas  : litt. on ne leur (lui, selon LXX) fera pas boire  ; cf. Pr 31.6.'
  - type: text
    content: 'On ne rompra pas le pain pour consoler celui qui porte le deuil d''un mort, et on n''offrira pas la coupe de consolation, même pour son père ou pour sa mère. '
  '8':
  - type: note
    content: maison de banquet Ec 7.2 ; cf. Est 1.3n. –  pour t'asseoir cf. 15.17.
  - type: text
    content: 'N''entre pas non plus dans une maison de banquet pour t''asseoir avec eux, pour manger et boire. '
  '9':
  - type: note
    content: '7.34+. –  en votre temps  : litt. en vos jours.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Je fais taire en ce lieu, sous vos yeux et en votre temps, les chants de gaieté et les chants de joie, les chants du marié et les chants de la mariée.'
