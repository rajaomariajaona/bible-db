  - type: text
    text: 'Il rétablit le territoire d''Israël depuis l''entrée de Hamath jusqu''à la mer de la plaine aride, selon la parole que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël, avait prononcée par l''intermédiaire de son serviteur Jonas, fils d''Amittaï, le prophète de Gath-Hépher. '
  - type: usfm
    marker: v
