        text: Lakish
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ville forte de Juda (Jos 15.39), fortifiée par Roboam (2Ch 11.9), dont le site a été identifié à Tell el-Duweir, à 8 km au sud-est de Qiriath-Gath.'
    marker-yv: yv-n
  - type: text
    text: 'On forma contre lui une conspiration à Jérusalem, et il s''enfuit à Lakish ; on le poursuivit à Lakish, où on le mit à mort. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: On le transporta sur des chevaux, et il fut enseveli à Jérusalem avec ses pères, dans la Ville de David.
