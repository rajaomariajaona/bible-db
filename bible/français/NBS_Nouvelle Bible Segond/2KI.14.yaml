      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'effacer le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 9.14 ; 29.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jéroboam '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: apparaît ainsi comme le dernier grand roi du royaume du Nord. Avec son successeur (15.8-12) commence une période d'instabilité politique qui conduira à la chute de Samarie (chap. 17).
    marker-yv: yv-n
  - type: text
    text: 'Or le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' n''avait pas parlé d''effacer le nom d''Israël de sous le ciel. Il les sauva donc par l''intermédiaire de Jéroboam, fils de Joas.'
