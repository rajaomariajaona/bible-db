    marker-yv: yv-n
  - type: text
    text: 'Joas, roi d''Israël, fit prisonnier à Beth-Shémesh Amatsia, roi de Juda, fils de Joas, fils d''Achazia. Il vint à Jérusalem et ouvrit une brèche de quatre cents coudées dans la muraille de Jérusalem, depuis la porte d''Ephraïm jusqu''à la porte de l''Angle. '
  - type: usfm
    marker: v
    metadata:
