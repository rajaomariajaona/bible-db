      - type: text
        text: '14.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: L'ajonc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu désigne une plante épineuse qui n''est pas clairement identifiée, cf. Es 34.13 ; Os 9.6 ; Jb 31.40 ; Pr 26.9 ; Ct 2.2 ; un homonyme ( ?) désigne des crochets en Jb 40.26 ; 2Ch 33.11. – Cette parabole et le récit qui suit illustrent le rapport de force entre le petit royaume de Juda, au sud, et l''Israël du nord qui, sous les dynasties d''Omri puis de Jéhu, est une puissance politique, économique et militaire assez importante : le plus souvent, Juda est vassal d''Israël.'
    marker-yv: yv-n
  - type: text
    text: 'Joas, roi d''Israël, fit dire à Amatsia, roi de Juda : L''ajonc du Liban fit dire au cèdre du Liban : Donne ta fille pour femme à mon fils ! Mais un animal sauvage du Liban passa et piétina l''ajonc. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ton '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' s''élève '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 8.14 ; 17.20 ; Os 13.6 ; Dn 5.20 ; 11.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jouis de ta '
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sois glorieux.
    marker-yv: yv-n
  - type: text
    text: 'Tu as battu Edom, et ton cœur s''élève. Jouis de ta gloire et reste chez toi ! Pourquoi aller au-devant du malheur ? Tu tomberas, toi, et Juda avec toi ! '
  - type: usfm
