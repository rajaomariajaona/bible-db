    marker-yv: yv-n
  - type: text
    text: 'Mais Amatsia n''écouta pas. Alors Joas, roi d''Israël, partit à l''attaque ; ils se rencontrèrent, lui et Amatsia, roi de Juda, à Beth-Shémesh qui appartient à Juda. '
  - type: usfm
