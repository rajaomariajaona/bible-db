document_id: 2KI.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Amatsia, roi de Juda
  - type: heading
    content: 2Ch 25.1-4,11-12
  - type: text
    content: 'La deuxième année de Joas, fils de Joachaz, roi d''Israël, Amatsia, fils de Joas, devint roi de Juda. '
  '10':
  - type: note
    content: 'ton cœur s''élève Dt 8.14 ; 17.20 ; Os 13.6 ; Dn 5.20 ; 11.12. –  Jouis de ta gloire  : litt. sois glorieux.'
  - type: text
    content: 'Tu as battu Edom, et ton cœur s''élève. Jouis de ta gloire et reste chez toi ! Pourquoi aller au-devant du malheur ? Tu tomberas, toi, et Juda avec toi ! '
  '11':
  - type: note
    content: 'Joas  : le nom est absent d''un ms de LXX. –  ils se rencontrèrent  : litt. ils se virent la face, cf. v. 8n. –  lui et Amatsia, roi de Juda  : les mots correspondants sont absents de certains mss de LXX. –  Beth-Shémesh  : cf. Jos 15.10n.'
  - type: text
    content: 'Mais Amatsia n''écouta pas. Alors Joas, roi d''Israël, partit à l''attaque ; ils se rencontrèrent, lui et Amatsia, roi de Juda, à Beth-Shémesh qui appartient à Juda. '
  '12':
  - type: note
    content: sa tente ou ses tentes, selon une autre lecture traditionnelle du texte hébreu, Tg et Vg  ; cf. Jg 7.8+ ; 1R 8.66n.
  - type: text
    content: 'Juda fut battu par Israël, et chacun s''enfuit à sa tente. '
  '13':
  - type: note
    content: 'fils de Joas, fils d''Achazia  : précision absente de Syr, partiellement traduite dans certains mss de LXX. –  Il vint  : selon une lecture traditionnelle de l''hébreu, avec Tg, Syr et plusieurs mss de LXX. Autres lectures  : ils vinrent (autre lecture traditionnelle), il le fit venir (= il l''amena, mss de LXX, Vg, 2Ch 25.23). –  quatre cents coudées  : environ 180 m ; voir mesures, poids et monnaies. –  depuis la porte  : selon quelques mss hébreux, des versions anciennes et 2Ch ; autre lecture traditionnelle à la porte… Sur la porte d''Ephraïm, cf. Né 8.16 ; 12.39. Sur la porte de l''Angle, cf. Jr 31.38 ; Za 14.10.'
  - type: text
    content: 'Joas, roi d''Israël, fit prisonnier à Beth-Shémesh Amatsia, roi de Juda, fils de Joas, fils d''Achazia. Il vint à Jérusalem et ouvrit une brèche de quatre cents coudées dans la muraille de Jérusalem, depuis la porte d''Ephraïm jusqu''à la porte de l''Angle. '
  '14':
  - type: note
    content: 'otages  : litt. fils de la caution, la prise d''otage n''a pas pour but d''obtenir une rançon mais de garantir la paix et la soumission du vaincu.'
  - type: text
    content: 'Il prit tout l''or et l''argent, ainsi que tous les objets qui se trouvaient dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dans les trésors de la maison du roi ; il prit aussi des otages, puis il retourna à Samarie.'
  - type: heading
    content: 2R 13.12-13
  '15':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  ce qu'il a fait ou tout ce qu'il a fait dans certains mss hébreux et des versions anciennes.
  - type: text
    content: 'Le reste de l''histoire de Joas, ce qu''il a fait, sa vaillance, et la guerre qu''il eut avec Amatsia, roi de Juda, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '16':
  - type: note
    content: se coucha… v. 22,29 ; 8.24+ ; 1R 1.21+.
  - type: text
    content: Joas se coucha avec ses pères, et il fut enseveli à Samarie avec les rois d'Israël. Jéroboam, son fils, devint roi à sa place.
  - type: heading
    content: 2Ch 25.25-28
  '17':
  - type: text
    content: 'Amatsia, fils de Joas, roi de Juda, vécut quinze ans après la mort de Joas, fils de Joachaz, roi d''Israël. '
  '18':
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  le livre des chroniques des rois de Juda 1R 14.19n.
  - type: text
    content: 'Le reste de l''histoire d''Amatsia, cela est écrit dans le livre des chroniques des rois de Juda. '
  '19':
  - type: note
    content: 'Lakish  : ville forte de Juda (Jos 15.39), fortifiée par Roboam (2Ch 11.9), dont le site a été identifié à Tell el-Duweir, à 8 km au sud-est de Qiriath-Gath.'
  - type: text
    content: 'On forma contre lui une conspiration à Jérusalem, et il s''enfuit à Lakish ; on le poursuivit à Lakish, où on le mit à mort. '
  '2':
  - type: note
    content: Yehoaddân (cf. 2Ch 25.1) ou, selon une autre lecture traditionnelle, Yehoadîn ou Yehoaddîn.
  - type: text
    content: 'Il avait vingt-cinq ans lorsqu''il devint roi ; il régna vingt-neuf ans à Jérusalem. Le nom de sa mère était Yehoaddân ; elle était de Jérusalem. '
  '20':
  - type: text
    content: On le transporta sur des chevaux, et il fut enseveli à Jérusalem avec ses pères, dans la Ville de David.
  - type: heading
    content: 2Ch 26.1-2
  '21':
  - type: text
    content: ' '
  - type: note
    content: Azaria , fils d’ Amatsia , portera à partir de 15.32, ainsi que dans Syr et en 2Ch 26.1, le nom d'Ozias (en hébreu ‘Ouzziya ou ‘Ouzziyahou ).
  - type: text
    content: 'Tout le peuple de Juda prit Azaria, qui avait seize ans, et l''investit de la royauté à la place de son père Amatsia. '
  '22':
  - type: note
    content: 'Le texte est peu explicite : ni le roi bâtisseur ni celui qui est couché avec ses pères ne sont nommés. Du rapprochement avec le récit de la victoire d''Amatsia sur Edom (v. 7), certains ont déduit que la notice concernant Eilath était un appendice à la description du règne de ce roi plutôt qu''au récit concernant son fils, dont il vient d''être question. –  qui bâtit Eilath  : la ville est pourtant déjà citée en Dt 2.8. On ne doit pas la confondre avec la ville moderne portant le même nom, située comme elle aux confins de la Araba et de la mer Rouge.'
  - type: text
    content: C'est lui qui bâtit Eilath et la rendit à Juda, après que le roi se fut couché avec ses pères.
  - type: heading
    content: Jéroboam II, roi d'Israël
  '23':
  - type: text
    content: ' '
  - type: note
    content: roi d'Israël ou, selon plusieurs mss hébreux, LXX et un ms Tg roi sur Israël.
  - type: text
    content: 'La quinzième année d''Amatsia, fils de Joas, roi de Juda, Jéroboam, fils de Joas, devint roi d''Israël à Samarie. Il régna quarante et un ans. '
  '24':
  - type: note
    content: 'ce qui déplaisait au Seigneur  : cf. 3.2n  ; 1R 11.6n. –  des péchés que Jéroboam… 10.31n.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il ne s''écarta d''aucun des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël. '
  '25':
  - type: note
    content: 'l''entrée de Hamath  : cf. Nb 13.21n  ; 34.8 ; Jos 13.5 ; Jg 3.3. –  la mer de la plaine aride (hébreu ‘arava), c.-à-d. la mer Morte  ; cf. Dt 3.17n. –  Jonas, fils d''Amittaï  : cette prophétie de Jonas nous est totalement inconnue en dehors de ce texte ; cf. Jon 1.1.'
  - type: text
    content: 'Il rétablit le territoire d''Israël depuis l''entrée de Hamath jusqu''à la mer de la plaine aride, selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, avait prononcée par l''intermédiaire de son serviteur Jonas, fils d''Amittaï, le prophète de Gath-Hépher. '
  '26':
  - type: note
    content: 'terrible  : le texte hébreu traditionnel porte très rebelle  ; LXX, Syr et Vg ont lu litt. très amère. –  ni esclave ni homme libre  : même expression en 9.8n.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait vu la terrible affliction d''Israël. Il n''y avait plus personne, ni esclave ni homme libre, pour secourir Israël. '
  '27':
  - type: note
    content: effacer le nom… Dt 9.14 ; 29.19. –  Jéroboam apparaît ainsi comme le dernier grand roi du royaume du Nord. Avec son successeur (15.8-12) commence une période d'instabilité politique qui conduira à la chute de Samarie (chap. 17).
  - type: text
    content: 'Or le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''avait pas parlé d''effacer le nom d''Israël de sous le ciel. Il les sauva donc par l''intermédiaire de Jéroboam, fils de Joas.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  à Juda, – par Israël ou à Juda en Israël  ; le texte hébreu traditionnel est obscur ; beaucoup le modifient, d'après Syr, pour lire seulement à Israël . D'autres essaient de le comprendre comme un commentaire indiquant qu'en revenant à Israël , Damas et Hamath reviennent en réalité à Juda (soulignant ainsi le caractère provisoire de la séparation en deux royaumes). D'autres enfin traduisent fit reculer Damas et Hamath (devant Juda et Israël ?).
  - type: text
    content: 'Le reste de l''histoire de Jéroboam, tout ce qu''il a fait, sa vaillance dans ses combats, et comment il rendit Damas et Hamath à Juda, – par Israël – cela est écrit dans le livre des chroniques des rois d''Israël. '
  '29':
  - type: note
    content: se coucha… v. 16,22 ; 8.24+ ; 1R 1.21+.
  - type: text
    content: Jéroboam se coucha avec ses pères, avec les rois d'Israël. Zacharie, son fils, devint roi à sa place.
  '3':
  - type: note
    content: ce qui convenait au Seigneur 10.30n.
  - type: text
    content: 'Il fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', non pas toutefois comme David, son père ; il fit exactement ce qu''avait fait Joas, son père. '
  '4':
  - type: note
    content: 'les hauts lieux ne disparurent pas  : LXX il ne fit pas disparaître les hauts lieux.'
  - type: text
    content: Toutefois les hauts lieux ne disparurent pas ; le peuple offrait encore des sacrifices et de l'encens dans les hauts lieux.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Lorsque sa royauté…  : litt. lorsque la royauté fut forte dans sa main  ; 2Ch 25.3 porte littéralement sur lui . –  les gens de sa cour  : litt. ses serviteurs . –  le roi  : précision absente de LXX.'
  - type: text
    content: 'Lorsque sa royauté devint forte, il abattit les gens de sa cour qui avaient abattu le roi, son père. '
  '6':
  - type: note
    content: 'Voir loi. –  ne seront pas mis à mort / sera mis à mort  : selon le texte hébreu conforme à Dt 24.16. Des versions anciennes ont lu ne mourront pas / mourra (cf. 2Ch 25.4). – Voir péché.'
  - type: text
    content: 'Mais il ne mit pas à mort les fils des assassins, selon ce qui est écrit dans le livre de la loi de Moïse, où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné cet ordre : « Les pères ne seront pas mis à mort pour les fils, les fils ne seront pas mis à mort pour les pères ; chacun sera mis à mort pour son propre péché. »'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Il battit dix mille Edomites…  : litt. il battit Edom… dix mille . –  Séla ou la Roche , cf. Jg 1.36n. –  Yoqtéel  : nom d''une ville de Juda proche de Lakish (Jos 15.38) compris en fonction du nom Yeqoutiel ( Dieu nourrit ) attesté en 1Ch 4.18.'
  - type: text
    content: Il battit dix mille Edomites dans la vallée du Sel ; et durant la guerre, il prit Séla et l'appela du nom de Yoqtéel ; on l'appelle ainsi jusqu'à ce jour.
  - type: heading
    content: Amatsia battu par Joas, roi d'Israël
  - type: heading
    content: 2Ch 25.17-24
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Rencontrons-nous  : litt. va, que nous nous voyions la face  ; cf. v. 11.'
  - type: text
    content: 'Alors Amatsia envoya des messagers à Joas, fils de Joachaz, fils de Jéhu, roi d''Israël, pour lui dire : Rencontrons-nous ! '
  '9':
  - type: note
    content: 'L''ajonc  : le terme hébreu désigne une plante épineuse qui n''est pas clairement identifiée, cf. Es 34.13 ; Os 9.6 ; Jb 31.40 ; Pr 26.9 ; Ct 2.2 ; un homonyme ( ?) désigne des crochets en Jb 40.26 ; 2Ch 33.11. – Cette parabole et le récit qui suit illustrent le rapport de force entre le petit royaume de Juda, au sud, et l''Israël du nord qui, sous les dynasties d''Omri puis de Jéhu, est une puissance politique, économique et militaire assez importante : le plus souvent, Juda est vassal d''Israël.'
  - type: text
    content: 'Joas, roi d''Israël, fit dire à Amatsia, roi de Juda : L''ajonc du Liban fit dire au cèdre du Liban : Donne ta fille pour femme à mon fils ! Mais un animal sauvage du Liban passa et piétina l''ajonc. '
