      - type: text
        text: '14.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte est peu explicite : ni le roi bâtisseur ni celui qui est couché avec ses pères ne sont nommés. Du rapprochement avec le récit de la victoire d''Amatsia sur Edom (v. 7), certains ont déduit que la notice concernant Eilath était un appendice à la description du règne de ce roi plutôt qu''au récit concernant son fils, dont il vient d''être question. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui bâtit Eilath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la ville est pourtant déjà citée en Dt 2.8. On ne doit pas la confondre avec la ville moderne portant le même nom, située comme elle aux confins de la Araba et de la mer Rouge.'
    marker-yv: yv-n
  - type: text
    text: C'est lui qui bâtit Eilath et la rendit à Juda, après que le roi se fut couché avec ses pères.
