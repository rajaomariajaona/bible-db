document_id: 2KI.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Maladie et guérison d'Ezéchias
  - type: heading
    content: Es 38.1-8
  - type: text
    content: ' '
  - type: note
    content: 'La maladie et la guérison d''Ezéchias sont résumées en 2Ch 32.24. –  maladie mortelle  : le v. 7 évoque un ulcère . –  Esaïe… le prophète 19.2 ; Es 1.1n.'
  - type: text
    content: 'En ces jours-là, Ezéchias fut atteint d''une maladie mortelle. Esaïe, fils d''Amots, le prophète, vint le trouver et lui dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Donne tes ordres à ta maison, car tu vas mourir ; tu ne vivras plus. '
  '10':
  - type: note
    content: 'Il est normal  : autres traductions c''est peu de chose ; c''est facile  ; cf. 3.18. –  l''ombre avance ou l''ombre s''allonge  ; cf. Ps 102.12 ; 109.23 ; Jr 6.4.'
  - type: text
    content: 'Ezéchias répondit : Il est normal que l''ombre avance de dix degrés. Qu''elle revienne plutôt de dix degrés ! '
  '11':
  - type: note
    content: 'les degrés d''Achaz ou l''escalier d''Achaz, cf. 16.14,17s ; 23.12. –  où elle était descendue  : précision absente de LXX.'
  - type: text
    content: 'Alors Esaïe, le prophète, invoqua le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui fit revenir l''ombre de dix degrés sur les degrés d''Achaz où elle était descendue.'
  - type: heading
    content: Ezéchias reçoit les émissaires de Babylone
  - type: heading
    content: Es 39.1-8
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Berodak-Baladân  : plus connu sous le nom de Merodak-Baladân (cf. Es 39.1) ; transcription hébraïque de l''akkadien Mardouk-apla-iddina , roi de Babylone de 721 à 710, puis de nouveau pendant quelques mois en 703, date probable de l''épisode relaté ici. –  la maladie d''Ezéchias  : cf. Es 39.1n.'
  - type: text
    content: 'En ce même temps, Berodak-Baladân, fils de Baladân, roi de Babylone, envoya une lettre et un présent à Ezéchias, car il avait appris la maladie d''Ezéchias. '
  '13':
  - type: note
    content: 'Ezéchias…  : litt. Ezéchias les écouta. Certains mss hébreux, LXX, Syr, Vg lisent il se réjouit, comme en Es 39.2. –  tous ses dépôts  : certains mss hébreux, Syr, Vg lisent ses dépôts, comme en Es 39.2. –  les parfums  : litt. l''huile bonne.'
  - type: text
    content: 'Ezéchias donna audience aux envoyés et leur montra tous ses dépôts, l''argent et l''or, les essences odoriférantes et les parfums, son arsenal et tout ce qui se trouvait dans ses trésors : il n''y eut rien qu''Ezéchias ne leur fît voir dans sa maison et dans tous ses domaines.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''ont dit  : un ms hébreu, quelques mss de LXX et Syr ont lu que t''ont dit… –  D''où venaient-ils  : le texte hébreu précise vers toi (ou te trouver , comme précédemment). –  Ils sont venus  : plusieurs mss hébreux et versions anciennes précisent vers moi (ou pour me voir ), comme en Es 39.3. –  d''un pays lointain  : cf. Jos 9.6,9.'
  - type: text
    content: 'Esaïe, le prophète, vint ensuite trouver le roi Ezéchias et lui dit : Qu''ont dit ces hommes-là ? D''où venaient-ils ? Ezéchias répondit : Ils sont venus d''un pays lointain, de Babylone. '
  '15':
  - type: text
    content: 'Esaïe dit encore : Qu''ont-ils vu dans ta maison ? Ezéchias répondit : Ils ont vu tout ce qui est dans ma maison : il n''y a rien dans mes trésors que je ne leur aie fait voir. '
  '16':
  - type: note
    content: 'Seigneur  : Es 39.5 précise des Armées.'
  - type: text
    content: 'Alors Esaïe dit à Ezéchias : Ecoute la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '17':
  - type: note
    content: 'Cf. chap. 25. –  il n''en restera rien, dit le Seigneur  : un ms hébreu et la plupart des mss de LXX portent un texte légèrement différent qui pourrait signifier il ne restera rien de ce qu''a dit le Seigneur.'
  - type: text
    content: 'Les jours viennent où l''on emportera à Babylone tout ce qui est dans ta maison, tout ce que tes pères ont amassé jusqu''à ce jour ; il n''en restera rien, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '18':
  - type: note
    content: eunuques 8.6n.
  - type: text
    content: 'On prendra de tes fils, qui seront sortis de toi, que tu auras engendrés, et ils seront des eunuques dans le palais du roi de Babylone. '
  '19':
  - type: note
    content: 'Cf. 1R 21.29. –  sécurité  : le même terme hébreu est traduit par loyauté au v. 3.'
  - type: text
    content: 'Ezéchias répondit à Esaïe : La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', que tu as prononcée, est bonne. Il ajouta : N''y aura-t-il pas paix et sécurité pendant ma vie ?'
  - type: heading
    content: 2Ch 32.32-33
  '2':
  - type: note
    content: 'Ezéchias tourna  : avec Es 38.2 et plusieurs mss des versions anciennes ; litt. il tourna.'
  - type: text
    content: 'Ezéchias tourna son visage vers le mur et pria le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en disant : '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire… 1R 11.41n. –  le réservoir et l''aqueduc (18.17n) : cf. « L''inscription de Siloé »♦. –  le livre des chroniques des rois de Juda 1R 14.19n.'
  - type: text
    content: 'Le reste de l''histoire d''Ezéchias, toute sa vaillance, comment il fit le réservoir et l''aqueduc pour amener l''eau dans la ville, cela est écrit dans le livre des chroniques des rois de Juda. '
  '21':
  - type: note
    content: 'se coucha avec ses pères  : cf. 8.24+ ; 1R 1.21+ ; certains mss ajoutent dans la Ville de David.'
  - type: text
    content: Ezéchias se coucha avec ses pères. Manassé, son fils, devint roi à sa place.
  '3':
  - type: note
    content: 'avec loyauté  : litt. en vérité. –  d''un cœur entier 1Ch 12.39 ; 28.9 ; 29.9,19 ; 2Ch 19.9 ; 25.2. –  ce qui te plaît  : litt. ce qui est bon à tes yeux.'
  - type: text
    content: 'S''il te plaît, '
  - type: text
    content: Seigneur
  - type: text
    content: ', souviens-toi, je t''en prie, que j''ai marché devant toi avec loyauté et d''un cœur entier, et que j''ai fait ce qui te plaît ! Et Ezéchias se mit à pleurer abondamment.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'n''était pas encore sorti de  : d''autres comprennent n''était pas encore parvenu dans  ; texte absent d''Es 38.4. –  la cour centrale  : autre lecture traditionnelle la ville centrale (nom d''un quartier de la ville ?).'
  - type: text
    content: 'Esaïe n''était pas encore sorti de la cour centrale lorsque la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui parvint : '
  '5':
  - type: note
    content: 'Cf. 1R 21.27ss. –  Retourne  : Es 38.5 va. –  chef de mon peuple  : texte absent d''Es 38.5. –  le troisième jour ou dans trois jours, après-demain.'
  - type: text
    content: 'Retourne dire à Ezéchias, chef de mon peuple : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de David, ton père : J''ai entendu ta prière, j''ai vu tes larmes. Je te guéris ; le troisième jour, tu monteras à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'ainsi que cette ville  : texte absent d''Es 38.5. –  à cause de moi…  : texte absent d''Es.'
  - type: text
    content: J'ajouterai quinze années à ta vie. Je te délivrerai, ainsi que cette ville, de la main du roi d'Assyrie ; je protégerai cette ville, à cause de moi et à cause de David, mon serviteur.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. se trouve relégué en fin du récit en Es 38.21. –  Esaïe  : mot absent de LXX, ce qui laisse entendre que l''ordre vient directement de YHWH. –  gâteau de figues sèches  : cf. 1S 25.18 ; 1Ch 12.40. –  on le plaça  : qu''on l''applique pour Es 38.21.'
  - type: text
    content: 'Esaïe dit : Prenez un gâteau de figues sèches. On le prit et on le plaça sur l''ulcère, et Ezéchias resta en vie.'
  '8':
  - type: text
    content: 'Ezéchias avait dit à Esaïe : Quel est le signe que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me guérira et que je monterai le troisième jour à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? '
  '9':
  - type: note
    content: 'pour toi  : précision absente de LXX et de Vg. –  L''ombre…  : autre traduction l''ombre a avancé (ou s''est allongée) de dix degrés, peut-elle reculer de dix degrés ? Le terme traduit par degrés peut désigner les marches d''un escalier, cf. v. 11 ; 23.12. Outre son aspect purement miraculeux, le signe de l’ombre évoque peut-être symboliquement l''empire de la mort (voir séjour des morts).'
  - type: text
    content: 'Alors Esaïe dit : Voici quel sera pour toi, de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le signe que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera ce qu''il a dit. L''ombre doit-elle avancer de dix degrés ou reculer de dix degrés ? '
