document_id: 2KI.20,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maladie et guérison d'Ezéchias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Es 38.1-8
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La maladie et la guérison d''Ezéchias sont résumées en 2Ch 32.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maladie mortelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le v. 7 évoque un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ulcère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Esaïe… le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.2 ; Es 1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En ces jours-là, Ezéchias fut atteint d''une maladie mortelle. Esaïe, fils d''Amots, le prophète, vint le trouver et lui dit : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Donne tes ordres à ta maison, car tu vas mourir ; tu ne vivras plus. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il est normal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est peu de chose ; c'est facile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 3.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''ombre avance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'ombre s'allonge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ps 102.12 ; 109.23 ; Jr 6.4.'
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias répondit : Il est normal que l''ombre avance de dix degrés. Qu''elle revienne plutôt de dix degrés ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les degrés d''Achaz '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'escalier d'Achaz
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 16.14,17s ; 23.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: où elle était descendue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : précision absente de LXX.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Esaïe, le prophète, invoqua le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qui fit revenir l''ombre de dix degrés sur les degrés d''Achaz où elle était descendue.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezéchias reçoit les émissaires de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Es 39.1-8
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Berodak-Baladân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : plus connu sous le nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Merodak-Baladân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Es 39.1) ; transcription hébraïque de l''akkadien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mardouk-apla-iddina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', roi de Babylone de 721 à 710, puis de nouveau pendant quelques mois en 703, date probable de l''épisode relaté ici. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la maladie d'Ezéchias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 39.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En ce même temps, Berodak-Baladân, fils de Baladân, roi de Babylone, envoya une lettre et un présent à Ezéchias, car il avait appris la maladie d''Ezéchias. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ezéchias…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ezéchias les écouta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Certains mss hébreux, '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' lisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il se réjouit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en Es 39.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous ses dépôts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss hébreux, Syr, Vg lisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses dépôts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en Es 39.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les parfums
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'huile bonne.
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias donna audience aux envoyés et leur montra tous ses dépôts, l''argent et l''or, les essences odoriférantes et les parfums, son arsenal et tout ce qui se trouvait dans ses trésors : il n''y eut rien qu''Ezéchias ne leur fît voir dans sa maison et dans tous ses domaines.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qu'ont dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : un ms hébreu, quelques mss de LXX et Syr ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que t''ont dit… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: D'où venaient-ils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le texte hébreu précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: te trouver
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme précédemment). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils sont venus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : plusieurs mss hébreux et versions anciennes précisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour me voir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), comme en Es 39.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un pays lointain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jos 9.6,9.'
      marker-yv: yv-n
    - type: text
      text: 'Esaïe, le prophète, vint ensuite trouver le roi Ezéchias et lui dit : Qu''ont dit ces hommes-là ? D''où venaient-ils ? Ezéchias répondit : Ils sont venus d''un pays lointain, de Babylone. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaïe dit encore : Qu''ont-ils vu dans ta maison ? Ezéchias répondit : Ils ont vu tout ce qui est dans ma maison : il n''y a rien dans mes trésors que je ne leur aie fait voir. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.16 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Es 39.5 précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des Armées.
      marker-yv: yv-n
    - type: text
      text: 'Alors Esaïe dit à Ezéchias : Ecoute la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. chap. 25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il n''en restera rien, dit le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un ms hébreu et la plupart des mss de LXX portent un texte légèrement différent qui pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il ne restera rien de ce qu''a dit le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les jours viennent où l''on emportera à Babylone tout ce qui est dans ta maison, tout ce que tes pères ont amassé jusqu''à ce jour ; il n''en restera rien, dit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'eunuques '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'On prendra de tes fils, qui seront sortis de toi, que tu auras engendrés, et ils seront des eunuques dans le palais du roi de Babylone. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1R 21.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sécurité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme hébreu est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'loyauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 3.
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias répondit à Esaïe : La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', que tu as prononcée, est bonne. Il ajouta : N''y aura-t-il pas paix et sécurité pendant ma vie ?'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Ch 32.32-33
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ezéchias tourna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : avec Es 38.2 et plusieurs mss des versions anciennes ; litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il tourna.
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias tourna son visage vers le mur et pria le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' en disant : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 11.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le réservoir et l''aqueduc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (18.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : cf. « L''inscription de Siloé »♦. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le livre des chroniques des rois de Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 14.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le reste de l''histoire d''Ezéchias, toute sa vaillance, comment il fit le réservoir et l''aqueduc pour amener l''eau dans la ville, cela est écrit dans le livre des chroniques des rois de Juda. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se coucha avec ses pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.24+ ; 1R 1.21+ ; certains mss ajoutent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la Ville de David.
      marker-yv: yv-n
    - type: text
      text: Ezéchias se coucha avec ses pères. Manassé, son fils, devint roi à sa place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec loyauté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en vérité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' entier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Ch 12.39 ; 28.9 ; 29.9,19 ; 2Ch 19.9 ; 25.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui te plaît
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui est bon à tes yeux.
      marker-yv: yv-n
    - type: text
      text: 'S''il te plaît, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', souviens-toi, je t''en prie, que j''ai marché devant toi avec loyauté et d''un cœur entier, et que j''ai fait ce qui te plaît ! Et Ezéchias se mit à pleurer abondamment.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'était pas encore sorti de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''autres comprennent '
