        children:
        - type: text
          text: 'Psaumes de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Salomon
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.3 : « Hymne nouveau chanté d''un cœur joyeux, fruit des lèvres accompagné de l''instrument bien accordé qu''est la langue, prémices des lèvres issues d''un cœur saint et juste ! » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Règle de la Communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ') 9.4s « Ils expieront pour les rébellions coupables et les infidélités pécheresses, et en vue (d''obtenir) la Bienveillance (divine) pour la terre, sans (autre traduction : “plus que”) la chair des holocaustes ni (autre traduction “et que”) la graisse des sacrifices ; mais l''offrande des lèvres, dans le respect du droit, sera comme une agréable odeur de justice, et la perfection de la voie sera comme le don volontaire d''une oblation délectable. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'reconnaissent publiquement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'confessent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Mt 11.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Rm 14.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.9. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Par lui, offrons donc sans cesse à Dieu un sacrifice de louange, c''est-à-dire le fruit de lèvres qui reconnaissent publiquement son nom. '
