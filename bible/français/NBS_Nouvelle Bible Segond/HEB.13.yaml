document_id: HEB.13,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: affection fraternelle Rm 12.10+ ; cf. Jc 2.15ss ; 1Jn 3.10-18.
  - type: text
    content: 'Que l''affection fraternelle demeure. '
  '10':
  - type: note
    content: 'Cf. 7.13 ; 8.4s ; Ez 44.10-17. –  le droit  : autre traduction le pouvoir, cf. Mc 1.22n  ; 2.24n  ; Jn 1.12n  ; 1Co 8.9n. –  ceux qui célèbrent le culte… 8.5n.'
  - type: text
    content: 'Nous avons un autel dont ils n''ont pas le droit de tirer leur nourriture, ceux qui célèbrent le culte dans la tente. '
  '11':
  - type: note
    content: Lv 4.12,21 ; 16.27. – Voir prêtre et péché.
  - type: text
    content: En effet, les corps des animaux dont le sang a été apporté par le grand prêtre dans le sanctuaire, pour le péché, sont brûlés hors du camp.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'pour consacrer (ou sanctifier , voir saint) … 2.11n  ; 9.12 ; 10.10. –  hors de la porte…  : la précision de la ville (en l''occurrence, Jérusalem) est sous-entendue dans le texte ; cf. Jn 19.17,20 ; voir aussi Lv 24.14+ ; Nb 15.35 ; Mt 21.39/ /.'
  - type: text
    content: 'C''est pourquoi Jésus aussi, pour consacrer le peuple par son propre sang, a souffert hors de la porte de la ville. '
  '13':
  - type: note
    content: 'Sortons  : cf. 2Co 6.17 ; Ap 18.4+. –  hors du camp  : cf. Ex 33.7. –  humiliation 11.26n.'
  - type: text
    content: 'Sortons donc hors du camp pour aller à lui, en portant son humiliation. '
  '14':
  - type: note
    content: qui demeure, c.-à-d. permanente 10.34 ; 11.10+. –  à venir 2.5+.
  - type: text
    content: 'Car nous n''avons pas ici de cité qui demeure, mais nous cherchons celle qui est à venir. '
  '15':
  - type: note
    content: 'donc  : le terme correspondant est absent de certains mss. –  sacrifice de louange Lv 7.12n. –  fruit de lèvres Es 57.19 ; Os 14.3 ; cf. Psaumes de Salomon 15.3 : « Hymne nouveau chanté d''un cœur joyeux, fruit des lèvres accompagné de l''instrument bien accordé qu''est la langue, prémices des lèvres issues d''un cœur saint et juste ! » Règle de la Communauté (Qumrân) 9.4s « Ils expieront pour les rébellions coupables et les infidélités pécheresses, et en vue (d''obtenir) la Bienveillance (divine) pour la terre, sans (autre traduction : “plus que”) la chair des holocaustes ni (autre traduction “et que”) la graisse des sacrifices ; mais l''offrande des lèvres, dans le respect du droit, sera comme une agréable odeur de justice, et la perfection de la voie sera comme le don volontaire d''une oblation délectable. » –  reconnaissent publiquement ou confessent 3.1n  ; cf. Mt 11.25n  ; Rm 14.11n  ; 15.9. – Voir nom.'
  - type: text
    content: 'Par lui, offrons donc sans cesse à Dieu un sacrifice de louange, c''est-à-dire le fruit de lèvres qui reconnaissent publiquement son nom. '
  '16':
  - type: note
    content: 'solidarité ou communion  : cf. 2.14n  ; Ac 2.42 ; 2Co 8.4n. –  prend plaisir 12.28+ ; Ph 4.18+.'
  - type: text
    content: Cependant, n'oubliez pas la bienfaisance et la solidarité, car c'est à de tels sacrifices que Dieu prend plaisir.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui vous dirigent v. 7+. –  ils veillent sur vous  : autre traduction sur vos âmes , cf. 2Co 12.15n  ; 1Th 2.8n  ; le même verbe est traduit par rester éveillé en Mc 13.33 ; Lc 21.36 ; Ep 6.18. –  des comptes à rendre  : cf. 4.13n.'
  - type: text
    content: 'Obéissez à ceux qui vous dirigent et soyez-leur soumis : ils veillent sur vous, sachant qu''ils auront des comptes à rendre. Qu''ils puissent le faire, non pas en soupirant, ce qui ne serait pas à votre avantage, mais avec joie.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Priez pour nous Rm 15.30+. –  bonne conscience 9.9+ ; cf. Ac 23.1+.
  - type: text
    content: 'Priez pour nous ; nous sommes en effet persuadés d''avoir une bonne conscience, avec la volonté de nous bien conduire à tous égards. '
  '19':
  - type: note
    content: V. 22n  ; Phm 22.
  - type: text
    content: Je vous encourage instamment à le faire, pour que je vous sois rendu plus tôt.
  - type: heading
    content: Epilogue
  '2':
  - type: note
    content: Gn 18.2–19.3 ; Jg 6.11-24 ; 13.8-24 ; cf. Mt 25.35-43 ; Rm 12.13n  ; Jc 2.25n.
  - type: text
    content: 'N''oubliez pas l''hospitalité : il en est qui, en l''exerçant, ont à leur insu logé des anges. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'le Dieu de la paix 12.14 ; Rm 15.33+. –  ramené  : litt. fait remonter , comme en Rm 10.7 ; voir Es 63.11n. –  le grand berger  : litt. le grand berger des moutons  ; cf. Ps 23.1 ; Jn 10.11+ ; 1P 5.4+. –  par (ou dans ) le sang d''une alliance éternelle  : cf. 7.24 ; 9.12,20+ ; 10.29 ; voir aussi Es 24.5n  ; 55.3 ; 61.8 ; Jr 32.40 ; 50.5 ; Ez 16.60 ; 37.26.'
  - type: text
    content: 'Que le Dieu de la paix – qui a ramené d''entre les morts le grand berger, par le sang d''une alliance éternelle, notre Seigneur Jésus – '
  '21':
  - type: note
    content: 'en tout ce qui est bon  : autre traduction par tout ce qui est bon. –  faire sa volonté 10.7+. –  en nous  : certains mss portent en vous. –  ce qui lui est agréable 12.28+. –  à qui soit la gloire Rm 16.27+. –  à tout jamais  : traduction traditionnelle aux siècles des siècles  ; certains mss n''ont pas ce redoublement, mais l''expression plus simple traduite pour toujours au v. 8 ; cf. 1.2n,8n  ; Ga 1.5n.'
  - type: text
    content: 'vous forme en tout ce qui est bon pour faire sa volonté ; qu''il fasse en nous ce qui lui est agréable par Jésus-Christ, à qui soit la gloire à tout jamais ! '
  - type: text
    content: Amen !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Je vous demande  : autres traductions je vous supplie, je vous exhorte, je vous encourage (comme au v. 19) ; un terme apparenté est traduit ici par encouragement (autre traduction exhortation  ; cf. 3.13+ ; Ac 13.15+). –  supporter 2Tm 4.3. –  brièvement  : cf. 11.32 ; 1P 5.12.'
  - type: text
    content: 'Je vous demande, mes frères, de supporter cette parole d''encouragement ; car je vous ai écrit brièvement. '
  '23':
  - type: note
    content: 'Sachez  : autre traduction vous savez. –  Timothée Ac 16.1+.'
  - type: text
    content: Sachez que notre frère Timothée a été relâché. S'il arrive assez tôt, j'irai vous voir avec lui.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui vous dirigent v. 7+. –  Ceux d''Italie  : il peut s''agir aussi bien de personnes résidant en Italie que d''Italiens habitant une autre partie de l''Empire.'
  - type: text
    content: Saluez tous ceux qui vous dirigent, ainsi que tous les saints. Ceux d'Italie vous saluent.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Col 4.18 ; Tt 3.15.
  - type: text
    content: Que la grâce soit avec vous tous !
  '3':
  - type: note
    content: 'prisonniers 10.34+. –  maltraités 11.37. –  puisque…  : litt. comme étant vous aussi dans un corps  ; autre traduction comme si vous étiez dans leur corps  ; cf. 1Co 12.26.'
  - type: text
    content: Souvenez-vous des prisonniers, comme si vous étiez en prison avec eux, et de ceux qui sont maltraités, puisque vous aussi, vous êtes dans un corps.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 12.16 ; 1Co 5.13 ; 6.9-19 ; Ep 5.5. –  et le lit conjugal…  : c''est de toute évidence l''adultère qui est ici considéré comme une souillure.'
  - type: text
    content: 'Que le mariage soit honoré de tous, et le lit conjugal exempt de souillure : Dieu jugera ceux qui se livrent à l''inconduite sexuelle et à l''adultère.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'amour de l''argent 1Tm 3.3 ; 6.6-10. –  il a dit  : Dieu . –  Je ne te délaisserai jamais (ou pas ) Gn 28.15 ; Dt 31.6,8  ; Jos 1.5.'
  - type: text
    content: 'Que votre conduite ne soit pas inspirée par l''amour de l''argent ; contentez-vous de ce que vous avez, car il a dit lui-même : '
  - type: text
    content: Je ne te délaisserai jamais, je ne t'abandonnerai jamais
  - type: text
    content: '. '
  '6':
  - type: note
    content: Ps 118.6.
  - type: text
    content: 'C''est pourquoi nous pouvons dire avec courage :'
  - type: text
    content: Le Seigneur est mon secours ; je n'aurai pas peur.
  - type: text
    content: Que peut me faire un être humain ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui vous dirigent v. 17,24 ; Lc 22.26 ; Ac 15.22 ; 1Tm 5.17. –  qui vous ont dit… Ac 4.29+. –  l''issue de leur vie  : autre traduction le résultat de leur conduite  ; cf. 10.32s. –  imitez 1Co 1.11+.'
  - type: text
    content: 'Souvenez-vous de ceux qui vous dirigent, qui vous ont dit la parole de Dieu ; regardez l''issue de leur vie et imitez leur foi. '
  '8':
  - type: note
    content: 1.12 ; 7.24.
  - type: text
    content: Jésus-Christ est le même hier, aujourd'hui et pour toujours.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ne vous laissez pas entraîner…  : cf. Ep 4.14 ; Col 2.7. – Voir cœur . –  affermi par la grâce 12.28n. –  aliments… 9.10 ; Rm 14.17 ; 1Co 8.8 ; Col 2.16-22 ; 1Tm 4.3. –  qui n''ont servi de rien 7.18s. –  ceux qui en font une question d''observance  : litt. ceux qui marchent  ; il faut probablement comprendre ceux qui pratiquent des rites alimentaires.'
  - type: text
    content: 'Ne vous laissez pas entraîner par toutes sortes d''enseignements étrangers. Il est bien, en effet, que le cœur soit affermi par la grâce, et non pas par des aliments qui n''ont servi de rien à ceux qui en font une question d''observance. '
