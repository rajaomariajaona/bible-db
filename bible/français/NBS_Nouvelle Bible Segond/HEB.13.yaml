        - type: text
          text: '  ; 9.12 ; 10.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hors de la porte…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la précision '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de la ville '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (en l'occurrence, Jérusalem) est sous-entendue dans le texte ; cf. Jn 19.17,20 ; voir aussi Lv 24.14+ ; Nb 15.35 ; Mt 21.39/ /.
      marker-yv: yv-n
    - type: text
      text: 'C''est pourquoi Jésus aussi, pour consacrer le peuple par son propre sang, a souffert hors de la porte de la ville. '
  '13':
  - type: usfm
    marker: p
    children:
