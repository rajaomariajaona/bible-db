        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'N''oubliez pas l''hospitalité : il en est qui, en l''exerçant, ont à leur insu logé des anges. '
