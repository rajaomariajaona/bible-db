          - type: text
            text: n
        - type: text
          text: '  ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rester éveillé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Mc 13.33 ; Lc 21.36 ; Ep 6.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des comptes à rendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Obéissez à ceux qui vous dirigent et soyez-leur soumis : ils veillent sur vous, sachant qu''ils auront des comptes à rendre. Qu''ils puissent le faire, non pas en soupirant, ce qui ne serait pas à votre avantage, mais avec joie.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
