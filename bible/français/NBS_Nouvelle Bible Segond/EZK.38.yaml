  - type: text
    text: Tu monteras à l'assaut contre Israël, mon peuple, comme des nuages qui couvrent le pays. Cela arrivera dans la suite des temps. Je te ferai venir contre mon pays afin que les nations me connaissent, quand je montrerai ma sainteté en toi, Gog, sous leurs yeux !
