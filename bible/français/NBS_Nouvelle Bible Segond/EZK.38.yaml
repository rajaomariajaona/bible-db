document_id: EZK.38,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Gog
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là v. 18 ; 39.11+. –  des pensées  : litt. des paroles . – Voir cœur.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : En ce jour-là, des pensées te viendront au cœur, et tu prépareras un plan maléfique. '
  '11':
  - type: note
    content: 'sans murailles  : cf. Za 2.8 ; Né 2.13s.'
  - type: text
    content: 'Tu diras : « Je monterai à l''assaut contre un pays ouvert, j''attaquerai des hommes tranquilles, qui habitent en sécurité, qui habitent tous dans des villes sans murailles, n''ayant ni verrous ni portes ; '
  '12':
  - type: note
    content: 'Tu porteras  : LXX a la première personne. –  le centre du monde  : litt. le nombril de la terre  ; cf. 5.5 ; le mot hébreu pourrait aussi désigner un point culminant, cf. Jg 9.37n.'
  - type: text
    content: 'je prendrai du butin, je me livrerai au pillage. » Tu porteras la main sur des ruines habitées, sur un peuple réuni d''entre les nations, ayant des troupeaux et des biens, habitant le centre du monde. '
  '13':
  - type: note
    content: 'Saba 27.22+. –  Dedân 25.13+. –  Tarsis 27.12n. –  leurs jeunes lions  : peut-être, métaphoriquement, au sens de princes (cf. chap. 19) ; LXX leurs villages. –  que tu réunis…  : litt. que tu assembles ton assemblée, comme au v. 7n.'
  - type: text
    content: 'Saba et Dedân, les marchands de Tarsis, et tous leurs jeunes lions te diront : « Viens-tu pour prendre du butin ? Est-ce pour piller que tu réunis cette assemblée, pour emporter de l''argent et de l''or, pour prendre des troupeaux et des biens, pour prendre un grand butin ? »'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'parle en prophète 4.7n  ; cf. v. 2 ; 39.1. –  tu le sauras  : litt. ne sauras-tu pas ? LXX ne t''éveilleras-tu pas ?'
  - type: text
    content: 'A cause de cela, parle en prophète, humain ! Tu diras à Gog : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Oui, le jour où Israël, mon peuple, habitera en sécurité, tu le sauras '
  '15':
  - type: note
    content: V. 4-6.
  - type: text
    content: 'et tu viendras de ton lieu, du plus profond du nord, toi et de nombreux peuples avec toi, tous montés sur des chevaux, une grande assemblée, une armée nombreuse. '
  '16':
  - type: note
    content: 'V. 8s. –  dans la suite des temps  : cf. v. 8n  ; voir aussi Gn 49.1+ ; Es 2.2n  ; Jr 23.20n. –  je montrerai ma sainteté…  : cf. v. 23 ; 20.41+.'
  - type: text
    content: Tu monteras à l'assaut contre Israël, mon peuple, comme des nuages qui couvrent le pays. Cela arrivera dans la suite des temps. Je te ferai venir contre mon pays afin que les nations me connaissent, quand je montrerai ma sainteté en toi, Gog, sous leurs yeux !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Est-ce de toi  : LXX n''a pas lu l''interrogation ; on pourrait traduire comme au v. 14  : Oui, c''est de toi… –  mes serviteurs, les prophètes  : cf. 2R 17.13 ; Jr 7.25 ; Am 3.7 ; Ez fait peut-être particulièrement allusion aux prophéties sur l''ennemi venu du nord, cf. Es 14.13,31 ; Jr 1.13-16 ; 4.6 ; 6.1 etc. –  en ces jours-là, pendant des années  : texte obscur, traduction incertaine.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Est-ce de toi que j''ai parlé aux jours de jadis par l''intermédiaire de mes serviteurs, les prophètes d''Israël, qui en ces jours-là, pendant des années, ont annoncé que je te ferais venir contre mon peuple ? '
  '18':
  - type: note
    content: En ce jour-là v. 10.
  - type: text
    content: 'En ce jour-là, le jour où Gog viendra contre la terre d''Israël, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – la fureur me montera aux narines. '
  '19':
  - type: note
    content: 'passion jalouse 5.13+. –  A coup sûr 5.11n. –  un grand tremblement…  : litt. un grand tremblement (cf. 3.12n) sur le sol (ou la terre, 7.2+) d''Israël  ; cf. Jr 4.24 ; Jl 4.16 ; Na 1.5 ; Mt 24.7/ / ; Ap 6.12 ; 11.13.'
  - type: text
    content: 'Je le déclare, dans ma passion jalouse et dans le feu de ma colère : A coup sûr, en ce jour-là, il y aura un grand tremblement de terre en Israël. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'tourne-toi 4.3+. –  Gog  : ce nom est vraisemblablement une déformation de celui de Gygès, roi de Lydie au VIIe s. av. J.-C., devenu légendaire à la suite de ses conquêtes. Magog (cf. Gn 10.2n) en est sans doute un dérivé (le pays de Gog). Les chapitres 38 et 39 d''Ez, proches de l''apocalyptique, semblent s''inspirer du personnage historique dans une perspective futuriste (cf. v. 8 ; Es 13 ; Jr 4 ; Mi 7.13 ; So 3.19 ; voir Ap 20.8). –  Rosh  : s''il s''agit d''un nom de pays, celui-ci n''est pas identifié ; le mot hébreu signifie tête , de sorte que l''expression prince de Rosh pourrait signifier simplement prince suprême . –  Méshek / Toubal 27.13n  ; allusion possible aux victoires de Gygès en Anatolie.'
  - type: text
    content: 'Humain, tourne-toi vers Gog, au pays de Magog, vers le prince de Rosh, de Méshek et de Toubal, et parle sur lui en prophète. '
  '20':
  - type: note
    content: 'Les poissons…  : cf. Gn 1.20-26n. –  homme / terre  : hébreu ’adam / ’adama  ; cf. Gn 2.5n,7. –  rasées  : cf. 13.14 ; 16.39 ; 26.4,12 ; 30.4 ; 36.35. –  les parois des rochers  : traduction incertaine ; il pourrait aussi s''agir de constructions humaines ; cf. Es 2.9-21.'
  - type: text
    content: 'Les poissons de la mer et les oiseaux du ciel trembleront devant moi, ainsi que les animaux sauvages et toutes les bestioles qui fourmillent sur la terre, et tous les hommes qui sont sur la terre. Les montagnes seront rasées, les parois des rochers tomberont, et toute muraille tombera par terre. '
  '21':
  - type: note
    content: J'appellerai l'épée 11.8+ ; cf. Jr 25.29 ; LXX j'appellerai la peur. –  contre son frère Jg 7.22 ; 1S 14.20 ; Za 14.13.
  - type: text
    content: 'J''appellerai l''épée contre lui dans toutes mes montagnes – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. Chacun tournera son épée contre son frère. '
  '22':
  - type: note
    content: 'peste / sang 14.19 ; 28.23 ; cf. Ex 7.14-25 ; 9.3. –  pluie  : cf. Gn 6–7 ; Jg 5.4. –  grêlons  : litt. pierres de glace  ; cf. 13.11 ; Ex 9.18 ; Jos 10.11. –  feu / soufre Gn 19.24 ; Ap 14.10. – Cf. Mt 24.7/ / ; Ap 8.7 ; 20.9.'
  - type: text
    content: 'J''entrerai en jugement avec lui par la peste et par le sang, je ferai pleuvoir une pluie torrentielle et des grêlons, le feu et le soufre sur lui et sur ses troupes, sur la multitude de peuples qui est avec lui. '
  '23':
  - type: note
    content: V. 16.
  - type: text
    content: 'Je montrerai ma grandeur et ma sainteté, je me ferai connaître sous les yeux d''une multitude de nations ; ainsi elles sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '3':
  - type: note
    content: Je m'oppose 5.8+ ; cf. 39.1.
  - type: text
    content: 'Tu diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je m''oppose à toi, Gog, prince de Rosh, de Méshek et de Toubal ! '
  '4':
  - type: note
    content: 'une boucle… 29.4+. –  chevaux et cavaliers ou chevaux et équipages de chars…  : cf. 23.6,12 ; Jr 46.9.'
  - type: text
    content: 'Je t''entraînerai et je mettrai une boucle à tes mâchoires ; je te ferai sortir, toi et toute ton armée, chevaux et cavaliers, tous vêtus à la perfection, une assemblée nombreuse, portant le grand bouclier et le petit bouclier, tous maniant l''épée ; '
  '5':
  - type: note
    content: Koush 29.10n. –  Pouth 27.10n.
  - type: text
    content: 'et avec eux la Perse, Koush et Pouth, tous ceux qui portent le petit bouclier et le casque ; '
  '6':
  - type: note
    content: 'Gomer, sans doute équivalent de la maison de Togarma  : cf. 27.14n  ; Gn 10.2n  ; Gygès avait repoussé une invasion cimmérienne.'
  - type: text
    content: 'Gomer et toutes ses troupes, la maison de Togarma, au plus profond du nord, et toutes ses troupes, toute la multitude de peuples qui est avec toi. '
  '7':
  - type: note
    content: 'toute ton assemblée autour de toi  : litt. toute ton assemblée des assemblés vers toi. –  leur garde  : LXX ma garde, peut-être au sens de ce que je garde, ce que je tiens en réserve.'
  - type: text
    content: 'Prépare-toi, tiens-toi prêt, toi et toute ton assemblée autour de toi ! Tu seras leur garde. '
  '8':
  - type: note
    content: 'Dans bien des jours  : cf. Es 24.22. –  tu seras installé à ton poste  : cf. Né 7.1 ; 12.44 ; autres traductions possibles tu seras convoqué ; ton tour viendra. –  dans la suite (ou à la fin) des années  ; cf. v. 16ns. –  tu viendras… v. 14s. –  contre le pays…  : litt. vers le pays de ce qui a été ramené de l''épée, de ce qui a été réuni… –  sur les montagnes d''Israël 34.1ss ; 39.4. –  ils habiteront tous en sécurité v. 11,14 ; 28.26+.'
  - type: text
    content: 'Dans bien des jours, tu seras installé à ton poste ; dans la suite des années, tu viendras contre le pays dont les habitants, ayant échappé à l''épée, auront été rassemblés d''entre une multitude de peuples, sur les montagnes d''Israël qui étaient constamment en ruine ; sortis d''entre des peuples, ils habiteront tous en sécurité. '
  '9':
  - type: note
    content: V. 16 ; Jr 4.13.
  - type: text
    content: Tu monteras, tu viendras comme la tourmente, comme une nuée pour couvrir le pays, toi et toutes tes troupes, et une multitude de peuples avec toi.
