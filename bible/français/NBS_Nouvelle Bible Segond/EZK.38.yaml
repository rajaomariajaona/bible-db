      - type: text
        text: '38.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tourne-toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gog
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ce nom est vraisemblablement une déformation de celui de Gygès, roi de Lydie au VII'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' s. av. J.-C., devenu légendaire à la suite de ses conquêtes. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Magog '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Gn 10.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') en est sans doute un dérivé (le pays de Gog). Les chapitres 38 et 39 d''Ez, proches de l''apocalyptique, semblent s''inspirer du personnage historique dans une perspective futuriste (cf. v. 8 ; Es 13 ; Jr 4 ; Mi 7.13 ; So 3.19 ; voir Ap 20.8). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rosh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : s''il s''agit d''un nom de pays, celui-ci n''est pas identifié ; le mot hébreu signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tête
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de sorte que l''expression '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prince de Rosh '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pourrait signifier simplement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prince suprême
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Méshek '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Toubal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '27.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; allusion possible aux victoires de Gygès en Anatolie.'
    marker-yv: yv-n
  - type: text
    text: 'Humain, tourne-toi vers Gog, au pays de Magog, vers le prince de Rosh, de Méshek et de Toubal, et parle sur lui en prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je m''oppose '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.8+ ; cf. 39.1.
    marker-yv: yv-n
  - type: text
    text: 'Tu diras : Ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Je m''oppose à toi, Gog, prince de Rosh, de Méshek et de Toubal ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une boucle… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '29.4+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chevaux et cavaliers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chevaux et équipages de chars…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 23.6,12 ; Jr 46.9.'
    marker-yv: yv-n
  - type: text
    text: 'Je t''entraînerai et je mettrai une boucle à tes mâchoires ; je te ferai sortir, toi et toute ton armée, chevaux et cavaliers, tous vêtus à la perfection, une assemblée nombreuse, portant le grand bouclier et le petit bouclier, tous maniant l''épée ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Koush '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '29.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pouth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '27.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'et avec eux la Perse, Koush et Pouth, tous ceux qui portent le petit bouclier et le casque ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gomer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sans doute équivalent de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la maison de Togarma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 27.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gn 10.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gygès avait repoussé une invasion cimmérienne.'
    marker-yv: yv-n
  - type: text
    text: 'Gomer et toutes ses troupes, la maison de Togarma, au plus profond du nord, et toutes ses troupes, toute la multitude de peuples qui est avec toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: toute ton assemblée autour de toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toute ton assemblée des assemblés vers toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur garde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ma garde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', peut-être au sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce que je garde, ce que je tiens en réserve.
    marker-yv: yv-n
  - type: text
    text: 'Prépare-toi, tiens-toi prêt, toi et toute ton assemblée autour de toi ! Tu seras leur garde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dans bien des jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 24.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu seras installé à ton poste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Né 7.1 ; 12.44 ; autres traductions possibles '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu seras convoqué ; ton tour viendra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans la suite '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à la fin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des années
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu viendras… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 14s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: contre le pays…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vers le pays de ce qui a été ramené de l''épée, de ce qui a été réuni… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sur les montagnes d''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '34.1ss ; 39.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils habiteront tous en sécurité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 11,14 ; 28.26+.
    marker-yv: yv-n
  - type: text
    text: 'Dans bien des jours, tu seras installé à ton poste ; dans la suite des années, tu viendras contre le pays dont les habitants, ayant échappé à l''épée, auront été rassemblés d''entre une multitude de peuples, sur les montagnes d''Israël qui étaient constamment en ruine ; sortis d''entre des peuples, ils habiteront tous en sécurité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 16 ; Jr 4.13.
    marker-yv: yv-n
  - type: text
    text: Tu monteras, tu viendras comme la tourmente, comme une nuée pour couvrir le pays, toi et toutes tes troupes, et une multitude de peuples avec toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'En ce jour-là '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 18 ; 39.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des pensées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des paroles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : En ce jour-là, des pensées te viendront au cœur, et tu prépareras un plan maléfique. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sans murailles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Za 2.8 ; Né 2.13s.'
    marker-yv: yv-n
  - type: text
    text: 'Tu diras : « Je monterai à l''assaut contre un pays ouvert, j''attaquerai des hommes tranquilles, qui habitent en sécurité, qui habitent tous dans des villes sans murailles, n''ayant ni verrous ni portes ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu porteras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX a la première personne. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le centre du monde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le nombril de la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 5.5 ; le mot hébreu pourrait aussi désigner un point culminant, cf. Jg 9.37'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'je prendrai du butin, je me livrerai au pillage. » Tu porteras la main sur des ruines habitées, sur un peuple réuni d''entre les nations, ayant des troupeaux et des biens, habitant le centre du monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '27.22+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dedân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tarsis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '27.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leurs jeunes lions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut-être, métaphoriquement, au sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'princes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. chap. 19) ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leurs villages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que tu réunis…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que tu assembles ton assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme au v. 7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Saba et Dedân, les marchands de Tarsis, et tous leurs jeunes lions te diront : « Viens-tu pour prendre du butin ? Est-ce pour piller que tu réunis cette assemblée, pour emporter de l''argent et de l''or, pour prendre des troupeaux et des biens, pour prendre un grand butin ? »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parle en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. v. 2 ; 39.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu le sauras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ne sauras-tu pas ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne t'éveilleras-tu pas ?
    marker-yv: yv-n
  - type: text
    text: 'A cause de cela, parle en prophète, humain ! Tu diras à Gog : Ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Oui, le jour où Israël, mon peuple, habitera en sécurité, tu le sauras '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 4-6.
    marker-yv: yv-n
  - type: text
    text: 'et tu viendras de ton lieu, du plus profond du nord, toi et de nombreux peuples avec toi, tous montés sur des chevaux, une grande assemblée, une armée nombreuse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
