document_id: JHN.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chemin du Père
  - type: text
    content: ' '
  - type: note
    content: 'cœur Lc 1.66n. –  ne se trouble pas v. 27 ; cf. 11.33+ ; 16.6,20,33. –  Mettez votre foi (ou croyez , v. 10ss) en Dieu…  : autres traductions vous avez mis votre foi en Dieu, mettez aussi votre foi en moi , ou encore  : vous mettez votre foi en Dieu et en moi  ; cf. 5.38 ; 12.44 ; Ex 14.31 ; 2Ch 20.20.'
  - type: text
    content: 'Que votre cœur ne se trouble pas. Mettez votre foi en Dieu, mettez aussi votre foi en moi. '
  '10':
  - type: note
    content: je suis dans le Père… 10.38+. –  Les paroles… 12.49+ ; voir 5.19+ ; 7.17ns.
  - type: text
    content: 'Ne crois-tu pas que, moi, je suis dans le Père, et que le Père est en moi ? Les paroles que, moi, je vous dis, je ne les dis pas de ma propre initiative ; c''est le Père qui, demeurant en moi, fait ses œuvres. '
  '11':
  - type: note
    content: 'des œuvres elles-mêmes  : certains mss portent de ses œuvres. 5.36+.'
  - type: text
    content: 'Croyez-moi : moi, je suis dans le Père, et le Père est en moi. Sinon, croyez à cause des œuvres elles-mêmes.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Amen, amen 1.51n  ; cf. Mt 5.18n. –  plus grandes encore  : litt. plus grandes que celles-ci 1.50+ ; cf. 17.18-23 ; Mt 8.10 ; 21.21/ /. –  parce que, moi, je vais vers le Père v. 28 ; 13.1+.'
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, celui qui met sa foi en moi fera, lui aussi, les œuvres que, moi, je fais ; il en fera même de plus grandes encore, parce que, moi, je vais vers le Père ; '
  '13':
  - type: note
    content: ce que vous demanderez (voir v. 16n) en mon nom 15.16 ; 16.23-26 ; cf. 15.7 ; Mt 7.7-11/ / ; 18.19 ; Ac 3.16 ; 1Jn 3.22 ; 5.14s. –  que le Père soit glorifié… 13.31+. –  Fils.
  - type: text
    content: 'et tout ce que vous demanderez en mon nom, je le ferai, pour que le Père soit glorifié dans le Fils. '
  '14':
  - type: note
    content: 'Si vous me demandez quelque chose  : autre traduction quoi que vous me demandiez  ; certains mss portent seulement si vous demandez quelque chose (ou quoi que vous demandiez).'
  - type: text
    content: Si vous me demandez quelque chose en mon nom, moi, je le ferai.
  - type: heading
    content: Le « Défenseur »
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'V. 21,23 ; 15.10 ; 1Jn 2.5 ; 5.3 ; 2Jn 6 ; cf. Dt 6.4-9 ; 11.1 ; Sagesse 6.18 : « Vouloir être instruit, c''est l''aimer (la Sagesse), l''aimer, c''est garder ses lois. » –  commandements  : voir loi.'
  - type: text
    content: 'Si vous m''aimez, vous garderez mes commandements. '
  '16':
  - type: note
    content: 'Cf. 7.39 ; Lc 24.49. –  je demanderai…  : litt. je demanderai au Père et il vous donnera…  ; le verbe qui est traduit ici par demander est un synonyme de celui qui apparaît au v. 13 ; on le retrouve, également traduit par interroger, en 16.5,19,23n,26,30 ; 17.9,15,20. –  défenseur  : le mot grec (traditionnellement transcrit paraclet et dérivé d''un verbe aux sens très divers  : exhorter, consoler, encourager, supplier, cf. Ac 2.40 ; 9.31n) pourrait aussi être traduit par aide, assistant, soutien, consolateur, conseiller ou, dans un contexte juridique, avocat (rôle qui pouvait inclure celui de témoin, cf. 15.26s, et même d’accusateur, cf. 16.7ss) ; de même en Jn 14.26 ; 15.26ss ; 16.7ss ; 1Jn 2.1 ; cf. Mt 10.17-20/ / ; Ac 6.10 ; Rm 8.26,34 ; voir aussi Jb 16.19-20n  ; 19.25-27 ; 33.23n  ; Dn 10.13. –  pour toujours 4.14n  ; cf. Mt 28.20.'
  - type: text
    content: 'Moi, je demanderai au Père de vous donner un autre défenseur pour qu''il soit avec vous pour toujours, '
  '17':
  - type: note
    content: 'l''Esprit de la vérité (8.32+) 15.26 ; 16.13 ; 1Jn 4.6 ; 5.6. –  que le monde…  : cf. 1.10n  ; 1Co 2.11,14. –  auprès de vous ou chez vous, même formule v. 23,25 ; cf. 1.39n. –  il sera en vous  : quelques mss portent il est en vous.'
  - type: text
    content: l'Esprit de la vérité, que le monde ne peut pas recevoir, parce qu'il ne le voit pas et qu'il ne le connaît pas ; vous, vous le connaissez, parce qu'il demeure auprès de vous et qu'il sera en vous.
  '18':
  - type: text
    content: ' '
  - type: note
    content: je viens v. 3n  ; cf. 20.19,26.
  - type: text
    content: 'Je ne vous laisserai pas orphelins ; je viens à vous. '
  '19':
  - type: note
    content: 'Encore un peu… 7.33+ ; 13.33 ; 16.16ss. –  je vis 6.57+ ; certains traduisent  : … vous me verrez ; parce que, moi, je vis, vous aussi, vous vivrez.'
  - type: text
    content: 'Encore un peu, et le monde ne me verra plus ; mais vous, vous me verrez, parce que, moi, je vis, et que vous aussi, vous vivrez. '
  '2':
  - type: note
    content: 'dans la maison 8.35 ; cf. Nb 12.7 ; 2S 7.1-16 ; 2Co 5.1 ; Hé 3.2-6. –  Sinon…  : autres traductions sinon, je vous l''aurais dit (ou vous l''aurais-je dit ?)  ; car je vais… ; sinon, je vous aurais dit que je vais…  ; le terme correspondant à que ou à car est absent de certains mss ; cf. 3.3. –  une place ou un lieu, même possibilité dans la suite. – Cf. Odes de Salomon 11.23 : « Lors, il est mainte place en ton paradis, en lui rien qui cesse, mais toute chose est pleine de fruits. »'
  - type: text
    content: 'Il y a beaucoup de demeures dans la maison de mon Père. Sinon, vous aurais-je dit que je vais vous préparer une place ? '
  '20':
  - type: note
    content: 'En ce jour-là 16.23,26 ; cf. Es 2.17 ; 4.1s ; 12.1+ ; Jr 4.9 ; Za 2.15. –  vous saurez  : le même verbe a été traduit par connaître aux v. 7,9,17. –  je suis en mon Père 10.38+. –  vous en moi… 6.56+.'
  - type: text
    content: 'En ce jour-là, vous saurez que, moi, je suis en mon Père, comme vous en moi et moi en vous. '
  '21':
  - type: note
    content: 'qui m''aime v. 15+. –  aimé de mon Père v. 23 ; 16.27 ; 17.23. –  je me manifesterai  : voir v. 22+.'
  - type: text
    content: Celui qui m'aime, c'est celui qui a mes commandements et qui les garde. Or celui qui m'aime sera aimé de mon Père ; moi aussi je l'aimerai et je me manifesterai à lui.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Judas, non pas l''Iscariote  : cf. Lc 6.16 ; Ac 1.13. –  tu doives (litt. tu vas ) te manifester… au monde  : cf. 1.10n  ; 7.4 ; Ac 10.40s.'
  - type: text
    content: 'Judas, non pas l''Iscariote, lui dit : Seigneur, comment se fait-il que tu doives te manifester à nous et non pas au monde ? '
  '23':
  - type: note
    content: 'Si quelqu''un m''aime… v. 15+. –  gardera ma parole 8.51+. –  mon Père l''aimera v. 21+ ; cf. Pr 8.17 ; Sagesse 7.28 : « Seuls sont aimés de Dieu ceux qui partagent l''intimité de la Sagesse. » –  notre demeure (même mot qu''au v. 2) : cf. 1R 8.27 ; Ez 37.26s ; Za 2.14 ; 2Co 6.16 ; Ep 3.17 ; Ap 3.20. –  auprès de lui ou chez lui, v. 17+.'
  - type: text
    content: 'Jésus lui répondit : Si quelqu''un m''aime, il gardera ma parole, et mon Père l''aimera ; nous viendrons à lui et nous ferons notre demeure auprès de lui. '
  '24':
  - type: note
    content: la parole… v. 10 ; 3.34+.
  - type: text
    content: Celui qui ne m'aime pas ne garde pas mes paroles. Et la parole que vous entendez n'est pas la mienne, mais celle du Père qui m'a envoyé.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'pendant que je demeurais  : autre traduction pendant que je demeure.'
  - type: text
    content: 'Je vous ai parlé ainsi pendant que je demeurais auprès de vous. '
  '26':
  - type: note
    content: 'Défenseur v. 16n. –  Esprit saint 1.33 ; 7.39 ; 13.21 ; 20.22. –  en mon nom v. 13+,14n  ; 15.16 ; 16.23-26 ; cf. 15.26. –  vous enseignera  : cf. 16.13 ; Mt 10.19s/ / ; 1Co 2.13 ; 1Jn 2.20,27 ; voir aussi Jr 31.34. –  vous rappellera 2.22+. –  ce que, moi, je vous ai dit ou, selon certains mss, ce que je vous ai dit.'
  - type: text
    content: Mais c'est le Défenseur, l'Esprit saint que le Père enverra en mon nom, qui vous enseignera tout et vous rappellera tout ce que, moi, je vous ai dit.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'ma paix 16.33 ; 20.19,21,26 ; cf. Es 9.5 ; Ag 2.9 ; Lc 1.79 ; Rm 5.1 ; Ep 2.14 ; Ph 4.7 ; Col 3.15 ; 2Th 3.16. –  Que votre cœur… v. 1+. –  ne cède pas à la lâcheté  : termes apparentés Mc 4.40n/ / ; 2Tm 1.7 ; Ap 21.8.'
  - type: text
    content: 'Je vous laisse la paix, je vous donne ma paix. Moi, je ne vous donne pas comme le monde donne. Que votre cœur ne se trouble pas et ne cède pas à la lâcheté ! '
  '28':
  - type: note
    content: 'Je m''en vais et je viens… v. 3n. –  Si vous m''aimiez v. 15+. –  vous vous réjouiriez  : cf. 16.27. –  vers le Père 13.1+. –  plus grand  : cf. v. 12 ; 10.29s ; voir aussi 5.19-30 ; 1Jn 3.20+.'
  - type: text
    content: 'Vous avez entendu que, moi, je vous ai dit : Je m''en vais et je viens à vous. Si vous m''aimiez, vous vous réjouiriez de ce que je vais vers le Père, car le Père est plus grand que moi. '
  '29':
  - type: note
    content: 13.19+. –  vous croyiez ou vous ayez foi 1.7n.
  - type: text
    content: Je vous ai dit ces choses maintenant, avant qu'elles n'arrivent, pour que, lorsqu'elles arriveront, vous croyiez.
  '3':
  - type: note
    content: 'je reviens…  : litt. je reviens et je vous prendrai v. 18,23,28 ; 21.22 ; cf. 15.26 ; 16.7,13,16-23 ; Mt 16.27 ; 1Co 11.26 ; 16.22n  ; 1Jn 2.28 ; Ap 22.17,20. –  auprès de (comme en 1.1n) moi 12.32n. –  là où, moi, je suis 12.26+ ; cf. Ph 1.23 ; 1Th 4.17.'
  - type: text
    content: 'Si donc je m''en vais vous préparer une place, je reviens vous prendre auprès de moi, pour que là où, moi, je suis, vous soyez, vous aussi. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'le prince du monde 12.31+. –  Il n''a rien en moi qui lui appartienne  : litt. il n''a rien en moi  ; autre traduction il n''a sur moi aucune prise  ; cf. 8.46 ; 17.14.'
  - type: text
    content: 'Je ne parlerai plus guère avec vous, car le prince du monde vient. Il n''a rien en moi qui lui appartienne, '
  '31':
  - type: note
    content: 'Autres traductions possibles  : mais pour que le monde sache que j''aime le Père, et comme le Père me l''a ordonné, ainsi je fais  ; ou encore  : mais pour que le monde sache que j''aime… et que je fais…, levez-vous…  ; cf. 10.18. –  Levez-vous, partons  : cf. 18.1 : Mt 26.46/ /.'
  - type: text
    content: mais c'est pour que le monde sache que j'aime le Père et que je fais ce que le Père m'a commandé. Levez-vous, partons d'ici.
  '4':
  - type: note
    content: 'moi  : le pronom d''insistance correspondant est ici absent de certains mss. –  le chemin ou la voie v. 6 ; cf. Mt 7.13s ; voir aussi Dt 1.30-33 ; 8.2-10.'
  - type: text
    content: Et là où, moi, je vais, vous en savez le chemin.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Thomas 11.16+. –  où tu vas 13.36+.
  - type: text
    content: 'Thomas lui dit : Seigneur, nous ne savons pas où tu vas ; comment en saurions-nous le chemin ? '
  '6':
  - type: note
    content: C'est moi qui suis… 6.35+ ; cf. 10.9. –  le chemin v. 4 ; cf. Mt 16.24+/ / ; Ac 9.2+ ; voir Hé 10.20. –  la vérité 1.14,18 ; 8.32+. –  la vie 1.4 ; 3.15+ ; 6.40 ; 11.25. –  Personne ne vient au Père… Mt 11.27/ / ; Rm 5.2 ; Ep 3.12+.
  - type: text
    content: 'Jésus lui dit : C''est moi qui suis le chemin, la vérité et la vie. Personne ne vient au Père sinon par moi. '
  '7':
  - type: note
    content: 'Si vous me connaissez…  : certains mss portent si vous me connaissiez, vous connaîtriez aussi… Cf. 7.28+. –  vous l''avez vu v. 9 ; 12.45.'
  - type: text
    content: Si vous me connaissez, vous connaîtrez aussi mon Père. Et, dès maintenant, vous le connaissez et vous l'avez vu.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Philippe 1.43+. –  montre-nous…  : cf. 1.18+ ; 20.29 ; Ex 33.18.'
  - type: text
    content: 'Philippe lui dit : Seigneur, montre-nous le Père, et cela nous suffit. '
  '9':
  - type: note
    content: 'Il y a si longtemps…  : cf. Mt 17.17+/ /. –  tu ne me connais pas ou tu n''es pas parvenu à me connaître, cf. 1Jn 2.3n. –  Celui qui m''a vu… 12.45+ ; cf. 5.17-30 ; 6.46 ; 10.30 ; 2Co 4.4 ; Col 1.15 ; Hé 1.3.'
  - type: text
    content: 'Jésus lui dit : Il y a si longtemps que je suis avec vous et tu ne me connais pas, Philippe ? Celui qui m''a vu a vu le Père. Comment peux-tu dire, toi : « Montre-nous le Père ! » '
