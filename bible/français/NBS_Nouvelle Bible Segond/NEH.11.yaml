    text: 'Voici les chefs de la province qui s''installèrent à Jérusalem. Dans les villes de Juda, chacun s''installa dans sa propriété, dans sa ville : Israël, les prêtres et les lévites, les Netinim et les fils des gens de la cour de Salomon.'
