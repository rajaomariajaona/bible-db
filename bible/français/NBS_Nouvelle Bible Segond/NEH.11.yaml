document_id: NEH.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Liste des Judéens venus repeupler Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.4s,72. –  sort 10.35+ ; cf. Jos 14.2 ; 18.12. –  une personne sur dix  : litt. un sur dix  ; d''où autre traduction un homme sur dix. –  la ville sacrée ou sainte v. 18 ; Es 48.2 ; 52.1 ; Dn 9.24 ; Mt 4.5 ; 27.53 ; Ap 11.2 ; 21.2,10 ; 22.19. –  dans les autres villes  : litt. dans les villes.'
  - type: text
    content: 'Les chefs du peuple s''installèrent à Jérusalem. Le reste du peuple tira au sort, pour qu''une personne sur dix vienne s''installer à Jérusalem, la ville sacrée, et que les neuf autres restent dans les autres villes. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'fils de Yoyarib, Yakîn  : certains modifient le texte hébreu traditionnel pour lire fils de Joïakim, fils de (11) Seraya…  ; cf. 12.10 ; 1Ch 9.10s.'
  - type: text
    content: 'Des prêtres : Yedaya, fils de Yoyarib, Yakîn, '
  '11':
  - type: text
    content: 'Seraya, fils de Hilqiya, fils de Meshoullam, fils de Tsadoq, fils de Merayoth, fils d''Ahitoub, chef de la maison de Dieu, '
  '12':
  - type: note
    content: 'leurs frères  : certains modifient le texte hébreu traditionnel pour lire ses frères (cf. v. 8n). –  822  : ce chiffre est omis par LXX, ainsi que plusieurs des noms qui suivent jusqu''au v. 14.'
  - type: text
    content: 'et leurs frères occupés à l''ouvrage de la maison, 822 ; Adaya, fils de Yeroham, fils de Pelalia, fils d''Amtsi, fils de Zacharie, fils de Pashhour, fils de Malkiya, '
  '13':
  - type: note
    content: 'Amashsaï  : cf. 1Ch 9.12 ; 2Ch 17.16 ; 29.12.'
  - type: text
    content: 'et ses frères, les chefs de famille, 242 ; et Amashsaï, fils d''Azaréel, fils d''Ahzaï, fils de Meshillémoth, fils d''Immer, '
  '14':
  - type: note
    content: 'leurs frères  : LXX ses frères. –  Zabdiel  : cf. 1Ch 27.2. –  vaillants guerriers  : cf. v. 6n. –  fils de Guedolim (le nom est omis par LXX) ou fils des grands.'
  - type: text
    content: et leurs frères, de vaillants guerriers, 128. Zabdiel, fils de Guedolim, était leur inspecteur.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Hashoub 1Ch 9.14. –  fils de Hashabia…  : LXX omet cette portion de texte (jusqu''à la fin du v. 16).'
  - type: text
    content: 'Des lévites : Shemaya, fils de Hashoub, fils d''Azriqam, fils de Hashabia, fils de Bounni, '
  '16':
  - type: note
    content: Shabtaï ou Shabbetaï (nom dérivé de shabbath, le sabbat) / Yozabad 8.7 ; Esd 8.33 ; 10.15. –  affaires extérieures ou affaires civiles  ; cf. 1Ch 26.29n.
  - type: text
    content: 'Shabtaï et Yozabad, chargés parmi les chefs des lévites des affaires extérieures à la maison de Dieu ; '
  '17':
  - type: note
    content: 'Cf. 7.44 ; 12.8. –  fils de Zabdi…  : LXX omet cette portion de texte, jusqu''à Abda (peut-être une autre forme d’Abdias, 1Ch 9.16). –  fils d''Asaph Esd 2.41 – qui entonnait…  : litt. le chef du commencement (qui) célébrait pour la prière  ; en modifiant très légèrement le texte on peut lire de la louange au lieu de du commencement. –  Baqbouqia  : cf. Esd 2.51. –  fils de Galal  : LXX omet cette portion de texte, jusqu''à la fin du v. 18, à l''exception du chiffre 284.'
  - type: text
    content: 'Mattania, fils de Michée, fils de Zabdi, fils d''Asaph, le chef qui entonnait la louange à la prière et Baqbouqia, le second parmi ses frères, et Abda, fils de Shammoua, fils de Galal, fils de Yedoutoun. '
  '18':
  - type: text
    content: 'Total des lévites dans la ville sacrée : 284.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.45 ; 1Ch 9.17.
  - type: text
    content: 'Et les portiers : Aqqoub, Talmôn, et leurs frères, gardiens des portes, 172.'
  '2':
  - type: note
    content: 'Voir bénédiction. –  qui se portèrent volontaires  : ou bien pour participer au tirage au sort (v. 1), ou bien qui acceptèrent de se soumettre à ses résultats ; cf. Esd 1.6 ; 2.68 ; 3.5 ; 1Ch 29.5s,9,14,17 ; 2Ch 17.16.'
  - type: text
    content: Le peuple bénit tous ceux qui se portèrent volontaires pour habiter à Jérusalem.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 20s sont absents de LXX ; cf. 7.72. –  prêtres / lévites 10.29n. –  son patrimoine  : cf. Nb 16.14 ; 27.7 ; Jg 21.24 ; 2S 20.1.'
  - type: text
    content: Le reste d'Israël, les prêtres, les lévites, étaient établis dans toutes les villes de Juda, chacun dans son patrimoine.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 3.26n.
  - type: text
    content: Les Netinim étaient installés sur l'Ophel ; Tsiha et Guishpa étaient chefs des Netinim.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'à Jérusalem  : cette précision est omise par LXX. –  du service  : autre traduction du travail , cf. 13.10 ; voir aussi 1Ch 9.13.'
  - type: text
    content: 'L''inspecteur des lévites à Jérusalem était Ouzzi, fils de Bani, fils de Hashabia, fils de Mattania, fils de Michée, d''entre les fils d''Asaph, les chantres chargés du service de la maison de Dieu ; '
  '23':
  - type: note
    content: 'un ordre (ou un commandement) du roi  : ou bien le roi David (12.24 ; 1Ch 25), ou bien le roi de Perse (Esd 6.8ss ; 7.21ss). –  et une convention 10.1n  ; LXX omet cette portion de texte (jusqu''à la fin du v.).'
  - type: text
    content: 'car il y avait un ordre du roi à leur sujet et une convention concernant les chantres, selon l''ordre de chaque jour. '
  '24':
  - type: note
    content: 'Meshézabéel 3.4n. –  des fils de… Juda  : cette précision est omise par LXX. –  était représentant du roi (cf. 1Ch 18.17n) : c''était peut-être une sorte d''ambassadeur chargé de représenter le peuple judéen auprès de la cour perse.'
  - type: text
    content: Petahia, fils de Meshézabéel, des fils de Zérah, fils de Juda, était représentant du roi pour toutes les affaires du peuple.
  - type: heading
    content: La population judéenne hors de Jérusalem
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 3 ; 7.6,72 ; Jos 15 ; 21.8ss ; 1Ch 6.54ss. –  Dans les villages et leur campagne  : certains voient dans ces mots la fin de la phrase commencée au v. 20. –  Qiriath-Arba , c.-à-d. Hébron, à près de 40 km au sud de Jérusalem ; Gn 23.2 ; Jos 15.54. –  les localités qui en dépendent  : litt. ses filles , de même dans la suite ; cette portion de texte est absente de LXX, jusqu''à la fin du v. –  Dibôn  : sans doute un autre nom de Dimona ou de Debir (Jos 15.22,49) plutôt que la localité moabite (Nb 32.34). –  Yeqabtséel  : cf. Jos 15.21.'
  - type: text
    content: 'Dans les villages et leur campagne, des fils de Juda s''installèrent à Qiriath-Arba et dans les localités qui en dépendent, à Dibôn et dans les localités qui en dépendent, à Yeqabtséel et dans les villages qui en dépendent, '
  '26':
  - type: note
    content: LXX ne mentionne que Yéshoua (Salut), nom identique en hébreu à celui de Josué (12.1+). –  Molada / Beth-Péleth Jos 15.26s.
  - type: text
    content: 'à Yéshoua, à Molada, à Beth-Péleth ; '
  '27':
  - type: note
    content: Jos 15.28. – LXX ne mentionne que Bersabée (cf. Gn 21.31).
  - type: text
    content: 'à Hatsar-Shoual, à Bersabée et dans les localités qui en dépendent, '
  '28':
  - type: note
    content: Cf. Jos 15.31 ; 1S 30.1. Les v. 28s sont absents de LXX.
  - type: text
    content: 'à Tsiqlag, à Mekona et dans les localités qui en dépendent, '
  '29':
  - type: note
    content: Jos 15.32-35.
  - type: text
    content: 'à Eïn-Rimmôn, à Tsoréa, à Yarmouth, '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Sur l'ensemble de la liste, cf. 7.5nss ; 1Ch 9.2ss. –  province 1.3+. –  Israël 7.7. –  Netinim v. 21ss ; 3.26+. –  gens de la cour de Salomon 7.57 ; Esd 2.55n.
  - type: text
    content: 'Voici les chefs de la province qui s''installèrent à Jérusalem. Dans les villes de Juda, chacun s''installa dans sa propriété, dans sa ville : Israël, les prêtres et les lévites, les Netinim et les fils des gens de la cour de Salomon.'
  - type: heading
    content: 1Ch 9.3-17
  '30':
  - type: note
    content: 'Zanoah 3.13n  ; Jos 15.34,56. –  Adoullam Jos 15.35. –  Lakish Jos 15.39. –  à Azéqa…  : omis par LXX ; cf. Jos 15.35. –  depuis Bersabée…  : LXX à Bersabée  ; la vallée de Hinnom marquait la limite sud-ouest de Jérusalem (2.13n).'
  - type: text
    content: 'à Zanoah, à Adoullam et dans les villages qui en dépendent, à Lakish et dans sa campagne, à Azéqa et dans les localités qui en dépendent. Ils installèrent leur campement depuis Bersabée jusqu''à la vallée de Hinnom. '
  '31':
  - type: note
    content: 'Benjamin, au nord de Jérusalem. –  s''établirent  : sous-entendu dans le texte. –  Guéba Jos 18.24 ; Jg 20.33 ; 1S 14.5. –  Mikmas 1S 13.2ss. –  Ayya 1Ch 7.28 ; cf. Es 10.28. –  à Beth-El…  : LXX omet cette portion de texte (jusqu''à la fin du v. 35) ; cf. Gn 28.19 ; Jos 18.13,21ss ; 1Ch 8.1ss.'
  - type: text
    content: 'Les fils de Benjamin s''établirent depuis Guéba, à Mikmas, à Ayya, à Beth-El et dans les localités qui en dépendent, '
  '32':
  - type: note
    content: Jos 21.18 ; 1S 21.2 ; 22.19 ; Es 10.32 ; Jr 1.1.
  - type: text
    content: 'à Anatoth, à Nob, à Anania, '
  '33':
  - type: note
    content: 'Hatsor  : cf. 2S 13.23. –  Rama Jos 18.25. –  Guittaïm 2S 4.3 ; cf. 1Ch 7.21 ; 8.13.'
  - type: text
    content: 'à Hatsor, à Rama, à Guittaïm, '
  '34':
  - type: note
    content: 'Hadid  : cf. 7.37. –  Tseboïm 1S 13.18.'
  - type: text
    content: 'à Hadid, à Tseboïm, à Neballath, '
  '35':
  - type: note
    content: '6.2 ; 7.37 ; 1Ch 8.12. –  la vallée des artisans  : cf. 1Ch 4.14.'
  - type: text
    content: 'à Lod et à Ono, la vallée des artisans. '
  '36':
  - type: note
    content: 'Texte obscur ; d''après des versions anciennes, certains comprennent  : parmi les lévites, certains avaient leur territoire en Juda et d''autres en Benjamin. Cf. Jos 21. –  fractions  : le terme hébreu est traduit par classe en 1Ch 23.6 ; 24.1 etc.'
  - type: text
    content: Parmi les lévites, certaines fractions de Juda se joignirent à Benjamin.
  '4':
  - type: text
    content: A Jérusalem s'installèrent des fils de Juda et des fils de Benjamin.
  - type: text
    content: 'Des fils de Juda : Ataya, fils d''Ozias, fils de Zacharie, fils d''Amaria, fils de Shephatia, fils de Mahalaléel, des fils de Pérets, '
  '5':
  - type: note
    content: 'de Shiloni ou du Silonite (habitant de Silo), ou, avec une légère modification, du Shélanite (de Shéla) : cf. Nb 26.20 ; 1Ch 9.5 ; voir aussi Gn 38.5 ; 46.12.'
  - type: text
    content: 'et Maaséya, fils de Baruch, fils de Kol-Hozé, fils de Hazaya, fils d''Adaya, fils de Yoyarib, fils de Zacharie, fils de Shiloni. '
  '6':
  - type: text
    content: 'Total des fils de Pérets qui s''installèrent à Jérusalem : 468 hommes vaillants.'
  '7':
  - type: text
    content: 'Voici les fils de Benjamin : Sallou, fils de Meshoullam, fils de Yoed, fils de Pedaya, fils de Kolaya, fils de Maaséya, fils d''Itiel, fils d''Esaïe, '
  '8':
  - type: note
    content: 'après lui  : des mss de LXX portent ses frères, cf. v. 13,17. –  Gabbaï et Sallaï  : cf. 12.20 ; certains modifient le texte pour lire vaillants guerriers comme au v. 14.'
  - type: text
    content: 'et, après lui, Gabbaï et Sallaï, 928. '
  '9':
  - type: note
    content: 'Zikri  : cf. 1Ch 8.19,23,27. –  Senoua  : cf. 3.3+. –  était le second…  : d''autres comprennent était sur la seconde ville, mais ce sens est moins probable.'
  - type: text
    content: Joël, fils de Zikri, était leur inspecteur ; et Juda, fils de Senoua, était le second dans la ville.
