  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tu es prêtre pour toujours, selon l'ordre de Melchisédek
    - type: text
      text: .
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 26.36-46/ / ; 27.46/ / ; Jn 12.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de sa '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
