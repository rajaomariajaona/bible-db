        children:
        - type: text
          text: '2.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il l'a reçue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu es… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.5+ ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ps 2.7.
      marker-yv: yv-n
    - type: text
      text: 'De même, le Christ ne s''est pas octroyé à lui-même la gloire de devenir grand prêtre ; il l''a reçue de celui qui lui a dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tu es mon fils, c'est moi qui t'ai engendré aujourd'hui ;
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
