        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 15.22-31 ; Lc 23.34 ; Ac 3.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'égarés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 18.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sujet à la faiblesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.28.
      marker-yv: yv-n
    - type: text
      text: 'Il peut avoir de la compréhension pour les ignorants et les égarés, puisque lui-même est sujet à la faiblesse. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.27 ; 9.7 ; Lv 9.7s ; 16.6,11,15s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des sacrifices
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme correspondant (v. 1) est ici sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Et c''est à cause de cette faiblesse qu''il doit offrir, pour lui-même aussi bien que pour le peuple, des sacrifices pour les péchés. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 28.1 ; Nb 16–17 ; cf. Jn 3.27.
      marker-yv: yv-n
    - type: text
      text: Or personne ne s'attribue à soi-même cet honneur ; on y est appelé par Dieu, comme Aaron lui-même.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
