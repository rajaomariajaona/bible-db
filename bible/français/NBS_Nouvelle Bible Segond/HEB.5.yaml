      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.12+.
      marker-yv: yv-n
    - type: text
      text: 'Une fois porté à son accomplissement, il est devenu pour tous ceux qui lui obéissent l''auteur d''un salut éternel, '
