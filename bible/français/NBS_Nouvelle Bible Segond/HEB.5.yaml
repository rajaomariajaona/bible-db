  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans le service de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 8.3. Le grand prêtre juif s''approchait de Dieu (Ex 28.43 ; 29.30 ; Nb 18.1-7) pour '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'présenter… des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Lv 1–7 ; 16) et enseigner la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' (Lv 10.11 ; Dt 33.10 ; Ml 2.7).'
      marker-yv: yv-n
    - type: text
      text: 'En effet, tout grand prêtre, pris parmi les humains, est institué pour les humains dans le service de Dieu, afin de présenter des offrandes et des sacrifices pour les péchés. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 6.
      marker-yv: yv-n
    - type: text
      text: Dieu l'ayant déclaré grand prêtre selon l'ordre de Melchisédek.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un sujet difficile
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lents '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le même mot est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nonchalants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 6.12) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à comprendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus littéralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à entendre.
      marker-yv: yv-n
    - type: text
      text: 'A ce sujet, nous avons beaucoup à dire, et des choses difficiles à expliquer, d''autant que vous êtes devenus lents à comprendre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 6.1 ; 1Co 2.6,14-16 ; 3.1-3 ; 1P 2.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maîtres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au sens d’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'enseignants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(un verbe apparenté est traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: enseigne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les premiers éléments
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les éléments '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même terme Ga 4.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du commencement des paroles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (sur le terme grec correspondant voir Ac 7.38
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Dieu.
      marker-yv: yv-n
    - type: text
      text: 'Alors que vous devriez, depuis le temps, être des maîtres, vous avez de nouveau besoin qu''on vous enseigne les premiers éléments des paroles de Dieu : vous en êtes venus à avoir besoin, non pas de nourriture solide, mais de lait. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ep 4.14+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Or quiconque en est au lait n''a pas l''expérience de la parole de justice : c''est un tout-petit. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les adultes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme grec signifie aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: accompli, parfait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. l’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'accomplissement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de 2.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.1 ; voir aussi Ep 4.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: exercé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même verbe en 12.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; c''est celui qui a donné notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gymnastique.
      marker-yv: yv-n
    - type: text
      text: Mais la nourriture solide est pour les adultes, pour ceux qui, par l'usage, ont le sens exercé au discernement du bien et du mal.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
