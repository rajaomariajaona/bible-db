      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction, moins probable'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et délivré de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (le mot grec pourrait avoir les deux sens) ; cf. 11.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Aux jours de sa chair il a offert, à grands cris et dans les larmes, des prières et des supplications à celui qui pouvait le sauver de la mort, et il a été exaucé en raison de sa piété. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.10 ; 12.5ss ; Rm 5.19 ; Ph 2.8. – Les formes verbales correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il a appris '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: émathen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') et à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il a souffert '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: épathen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) font assonance dans le texte grec.
      marker-yv: yv-n
    - type: text
      text: 'Tout Fils qu''il était, il a appris l''obéissance par ce qu''il a souffert. '
