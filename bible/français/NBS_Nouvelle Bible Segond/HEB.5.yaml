document_id: HEB.5,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: dans le service de Dieu 2.17n  ; cf. 8.3. Le grand prêtre juif s'approchait de Dieu (Ex 28.43 ; 29.30 ; Nb 18.1-7) pour présenter… des sacrifices (Lv 1–7 ; 16) et enseigner la loi (Lv 10.11 ; Dt 33.10 ; Ml 2.7).
  - type: text
    content: 'En effet, tout grand prêtre, pris parmi les humains, est institué pour les humains dans le service de Dieu, afin de présenter des offrandes et des sacrifices pour les péchés. '
  '10':
  - type: note
    content: V. 6.
  - type: text
    content: Dieu l'ayant déclaré grand prêtre selon l'ordre de Melchisédek.
  - type: heading
    content: Un sujet difficile
  '11':
  - type: text
    content: ' '
  - type: note
    content: lents (le même mot est traduit par nonchalants en 6.12) à comprendre ou, plus littéralement, à entendre.
  - type: text
    content: 'A ce sujet, nous avons beaucoup à dire, et des choses difficiles à expliquer, d''autant que vous êtes devenus lents à comprendre. '
  '12':
  - type: note
    content: 'Cf. 6.1 ; 1Co 2.6,14-16 ; 3.1-3 ; 1P 2.2. –  maîtres  : au sens d’enseignants (un verbe apparenté est traduit par enseigne). –  les premiers éléments  : litt. les éléments (même terme Ga 4.3n) du commencement des paroles (sur le terme grec correspondant voir Ac 7.38n) de Dieu.'
  - type: text
    content: 'Alors que vous devriez, depuis le temps, être des maîtres, vous avez de nouveau besoin qu''on vous enseigne les premiers éléments des paroles de Dieu : vous en êtes venus à avoir besoin, non pas de nourriture solide, mais de lait. '
  '13':
  - type: note
    content: Ep 4.14+. – Voir justice.
  - type: text
    content: 'Or quiconque en est au lait n''a pas l''expérience de la parole de justice : c''est un tout-petit. '
  '14':
  - type: note
    content: 'les adultes  : le terme grec signifie aussi accompli, parfait, cf. l’accomplissement de 2.10n  ; 6.1 ; voir aussi Ep 4.13n. –  exercé  : même verbe en 12.11n  ; c''est celui qui a donné notre mot gymnastique.'
  - type: text
    content: Mais la nourriture solide est pour les adultes, pour ceux qui, par l'usage, ont le sens exercé au discernement du bien et du mal.
  '2':
  - type: note
    content: '4.15. –  de la compréhension  : litt. des sentiments mesurés. –  ignorants  : cf. 9.7n  ; Lv 4.2n  ; 5.2n  ; Nb 15.22-31 ; Lc 23.34 ; Ac 3.17. –  égarés Mt 18.12. –  sujet à la faiblesse 7.28.'
  - type: text
    content: 'Il peut avoir de la compréhension pour les ignorants et les égarés, puisque lui-même est sujet à la faiblesse. '
  '3':
  - type: note
    content: '7.27 ; 9.7 ; Lv 9.7s ; 16.6,11,15s. –  des sacrifices  : le terme correspondant (v. 1) est ici sous-entendu dans le texte.'
  - type: text
    content: 'Et c''est à cause de cette faiblesse qu''il doit offrir, pour lui-même aussi bien que pour le peuple, des sacrifices pour les péchés. '
  '4':
  - type: note
    content: Ex 28.1 ; Nb 16–17 ; cf. Jn 3.27.
  - type: text
    content: Or personne ne s'attribue à soi-même cet honneur ; on y est appelé par Dieu, comme Aaron lui-même.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Voir gloire . –  de devenir (ou d''être ) grand prêtre 2.17+. –  il l''a reçue  : sous-entendu dans le texte. –  Tu es… 1.5+ ; Ps 2.7.'
  - type: text
    content: 'De même, le Christ ne s''est pas octroyé à lui-même la gloire de devenir grand prêtre ; il l''a reçue de celui qui lui a dit :'
  - type: text
    content: Tu es mon fils, c'est moi qui t'ai engendré aujourd'hui ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'V. 10 ; 6.20 ; 7.1-28 ; Ps 110.4n . –  pour toujours 7.24+. –  selon l''ordre  : voir 7.11n.'
  - type: text
    content: 'tout comme il dit encore ailleurs :'
  - type: text
    content: Tu es prêtre pour toujours, selon l'ordre de Melchisédek
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 26.36-46/ / ; 27.46/ / ; Jn 12.27. –  de sa chair , c.-à-d. de son existence terrestre ; cf. 2.14 ; 7.16 ; 9.10,13 ; 10.20 ; 12.9. –  pouvait le sauver de la mort Ps 68.21. –  exaucé Ps 22.25. –  en raison de sa piété  : autre traduction, moins probable  : et délivré de la crainte (le mot grec pourrait avoir les deux sens) ; cf. 11.7n.'
  - type: text
    content: 'Aux jours de sa chair il a offert, à grands cris et dans les larmes, des prières et des supplications à celui qui pouvait le sauver de la mort, et il a été exaucé en raison de sa piété. '
  '8':
  - type: note
    content: Cf. 2.10 ; 12.5ss ; Rm 5.19 ; Ph 2.8. – Les formes verbales correspondant à il a appris (émathen) et à il a souffert (épathen) font assonance dans le texte grec.
  - type: text
    content: 'Tout Fils qu''il était, il a appris l''obéissance par ce qu''il a souffert. '
  '9':
  - type: note
    content: son accomplissement ou sa perfection 2.10n  ; cf. Jn 17.4n. –  auteur ou cause (autre mot qu'en 2.10n). –  salut éternel 9.12+.
  - type: text
    content: 'Une fois porté à son accomplissement, il est devenu pour tous ceux qui lui obéissent l''auteur d''un salut éternel, '
