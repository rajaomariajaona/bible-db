document_id: JOS.14,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le partage de Canaan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eléazar, le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : fils d''Aaron ; cf. Ex 6.23 ; Nb 20.22-29 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Josué, fils de Noun '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les chefs de famille des tribus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 21.1 ; Nb 32.28.
      marker-yv: yv-n
    - type: text
      text: 'Voici le patrimoine que les Israélites reçurent en Canaan, le patrimoine qu''Eléazar, le prêtre, Josué, fils de Noun, et les chefs de famille des tribus répartirent entre les Israélites. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: m'a fait vivre, comme il l'avait dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la promesse divine à Caleb de lui donner un patrimoine perpétuel dans le pays impliquait qu''il vivrait jusqu''à cette échéance.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''a fait vivre, comme il l''avait dit. Voici maintenant quarante-cinq ans que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit cette parole à Moïse, lorsque Israël marchait dans le désert ; j''ai aujourd''hui quatre-vingt-cinq ans. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme au jour où…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour partir en campagne…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour sortir et pour rentrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cette expression idiomatique s''applique en particulier aux activités militaires (partir au combat et revenir victorieux) ; mais elle peut aussi évoquer les occupations de la vie courante ; cf. Nb 27.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',21 ; Dt 28.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 31.2 ; Ps 121.8.'
      marker-yv: yv-n
    - type: text
      text: 'Je suis encore vigoureux comme au jour où Moïse m''a envoyé ; j''ai autant de force maintenant que j''en avais alors pour le combat, pour partir en campagne et en revenir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette montagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la région montagneuse du sud de Juda, où se trouve Hébron (v. 13ss). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Anaqites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 11.21+.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, donne-moi cette montagne dont le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a parlé ce jour-là ; car tu as appris ce jour-là qu''il y a là des Anaqites et de grandes villes fortifiées. Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' soit seulement avec moi, et je les déposséderai, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''a dit !'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il donna Hébron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Caleb, fils de Yephounné '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6+.
      marker-yv: yv-n
    - type: text
      text: 'Josué le bénit ; il donna Hébron pour patrimoine à Caleb, fils de Yephounné. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Caleb, fils de Yephounné '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Qenizzite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jusqu''à ce jour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il a rempli… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''est ainsi que Caleb, fils de Yephounné, le Qenizzite, a Hébron pour patrimoine jusqu''à ce jour, parce qu''il a rempli ses obligations envers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qiriath-Arba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cité d''Arba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cité des quatre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(peut-être quatre quartiers ou quatre clans confédérés, cf. Anaq et ses trois fils, 15.14). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Arba avait été
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il (était)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le pays fut dès lors… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.23.
      marker-yv: yv-n
    - type: text
      text: 'L''ancien nom d''Hébron était Qiriath-Arba : Arba avait été l''homme le plus grand parmi les Anaqites. – Le pays fut dès lors tranquille, sans guerre.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Nb 26.55 ; 33.54 ; 34.13 ; 36.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On tira au sort leur patrimoine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par le sort leur patrimoine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le mot rendu ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est également traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lot '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans la suite ; cf. 15.1 ; 16.1 ; 17.1,14,17 ; 18.6,8,10s ; 19.1,10,17,24,32,40,51 ; 21.4ss,10,20,38 ; Lv 16.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ac 13.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par l'intermédiaire de Moïse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par la main de Moïse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 20.2 ; 21.2,8 ; 22.9 ; Ex 9.35 ; Lv 8.36 ; Nb 4.37. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour les neuf tribus…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les autres tribus ont reçu leur patrimoine en Transjordanie (chap. 13), voir v. 3.'
      marker-yv: yv-n
    - type: text
      text: 'On tira au sort leur patrimoine comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné, par l''intermédiaire de Moïse, pour les neuf tribus et pour la demi-tribu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 13.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',28-33 ; sur les villes des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
        - type: text
          text: ', voir chap. 21.'
      marker-yv: yv-n
    - type: text
      text: 'Car Moïse avait donné un patrimoine aux deux tribus et à la demi-tribu en Transjordanie ; quant aux lévites, il ne leur avait pas donné de patrimoine au milieu d''eux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de Joseph '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 48.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 13.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les fils de Joseph formaient deux tribus, Manassé et Ephraïm ; on ne donna pas de part aux lévites dans le pays, si ce n''est des villes pour qu''ils y habitent, ainsi que leurs abords pour leurs troupeaux et leurs biens. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les Israélites firent ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait ordonné à Moïse : ils partagèrent le pays.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au Guilgal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Caleb, fils de Yephounné '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 13s ; 15.13 ; 21.12 ; Nb 13.6 ; 14.6,30,38 ; 26.65 ; 32.12 ; 34.19 ; Dt 1.36 ; 1Ch 4.15 ; 6.41. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Qenizzite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 14 ; Nb 32.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moïse, l''homme de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 33.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 90.1 ; Esd 3.2 ; 1Ch 23.14 ; 2Ch 30.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en ce qui nous concerne…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : allusion à la déclaration de Dieu en Nb 32.11s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qadesh-Barnéa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les fils de Juda s''approchèrent de Josué au Guilgal ; Caleb, fils de Yephounné, le Qenizzite, lui dit : Tu sais, toi, ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit à Moïse, l''homme de Dieu, en ce qui nous concerne, moi et toi, à Qadesh-Barnéa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour espionner…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 13.17ss ; 14.6ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: honnête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'selon ce qui (était) avec mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'J''avais quarante ans lorsque Moïse, serviteur du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', m''a envoyé de Qadesh-Barnéa pour espionner le pays, et je lui ai fait un rapport honnête. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ont fait fondre le cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 1.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 20.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai rempli mes obligations envers…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai rempli derrière YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'j''ai suivi sans réserve le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . De même aux v. 9,14 ; Nb 14.24
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
