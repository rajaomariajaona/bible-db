document_id: JOS.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le partage de Canaan
  - type: text
    content: ' '
  - type: note
    content: 'Eléazar, le prêtre  : fils d''Aaron ; cf. Ex 6.23 ; Nb 20.22-29 etc. –  Josué, fils de Noun 1.1n. –  les chefs de famille des tribus 21.1 ; Nb 32.28.'
  - type: text
    content: 'Voici le patrimoine que les Israélites reçurent en Canaan, le patrimoine qu''Eléazar, le prêtre, Josué, fils de Noun, et les chefs de famille des tribus répartirent entre les Israélites. '
  '10':
  - type: note
    content: 'm''a fait vivre, comme il l''avait dit  : la promesse divine à Caleb de lui donner un patrimoine perpétuel dans le pays impliquait qu''il vivrait jusqu''à cette échéance.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a fait vivre, comme il l''avait dit. Voici maintenant quarante-cinq ans que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit cette parole à Moïse, lorsque Israël marchait dans le désert ; j''ai aujourd''hui quatre-vingt-cinq ans. '
  '11':
  - type: note
    content: 'comme au jour où…  : cf. v. 7. –  pour partir en campagne…  : litt. pour sortir et pour rentrer  ; cette expression idiomatique s''applique en particulier aux activités militaires (partir au combat et revenir victorieux) ; mais elle peut aussi évoquer les occupations de la vie courante ; cf. Nb 27.17n,21 ; Dt 28.6n  ; 31.2 ; Ps 121.8.'
  - type: text
    content: 'Je suis encore vigoureux comme au jour où Moïse m''a envoyé ; j''ai autant de force maintenant que j''en avais alors pour le combat, pour partir en campagne et en revenir. '
  '12':
  - type: note
    content: 'cette montagne  : la région montagneuse du sud de Juda, où se trouve Hébron (v. 13ss). –  des Anaqites  : cf. 11.21+.'
  - type: text
    content: 'Maintenant, donne-moi cette montagne dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a parlé ce jour-là ; car tu as appris ce jour-là qu''il y a là des Anaqites et de grandes villes fortifiées. Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit seulement avec moi, et je les déposséderai, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a dit !'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'il donna Hébron  : cf. 10.3n,36. –  Caleb, fils de Yephounné v. 6+.'
  - type: text
    content: 'Josué le bénit ; il donna Hébron pour patrimoine à Caleb, fils de Yephounné. '
  '14':
  - type: note
    content: Caleb, fils de Yephounné v. 6+. –  le Qenizzite v. 6n. –  jusqu'à ce jour 4.9n. –  il a rempli… v. 8n.
  - type: text
    content: 'C''est ainsi que Caleb, fils de Yephounné, le Qenizzite, a Hébron pour patrimoine jusqu''à ce jour, parce qu''il a rempli ses obligations envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '15':
  - type: note
    content: 'Qiriath-Arba  : Cité d''Arba ou Cité des quatre (peut-être quatre quartiers ou quatre clans confédérés, cf. Anaq et ses trois fils, 15.14). –  Arba avait été  : litt. il (était). –  Le pays fut dès lors… 11.23.'
  - type: text
    content: 'L''ancien nom d''Hébron était Qiriath-Arba : Arba avait été l''homme le plus grand parmi les Anaqites. – Le pays fut dès lors tranquille, sans guerre.'
  '2':
  - type: note
    content: 'Cf. Nb 26.55 ; 33.54 ; 34.13 ; 36.2. –  On tira au sort leur patrimoine  : litt. par le sort leur patrimoine  ; le mot rendu ici par sort est également traduit par lot dans la suite ; cf. 15.1 ; 16.1 ; 17.1,14,17 ; 18.6,8,10s ; 19.1,10,17,24,32,40,51 ; 21.4ss,10,20,38 ; Lv 16.8n  ; Ac 13.19. –  par l''intermédiaire de Moïse  : litt. par la main de Moïse  ; cf. 20.2 ; 21.2,8 ; 22.9 ; Ex 9.35 ; Lv 8.36 ; Nb 4.37. –  pour les neuf tribus…  : les autres tribus ont reçu leur patrimoine en Transjordanie (chap. 13), voir v. 3.'
  - type: text
    content: 'On tira au sort leur patrimoine comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné, par l''intermédiaire de Moïse, pour les neuf tribus et pour la demi-tribu. '
  '3':
  - type: note
    content: Cf. 13.14n,28-33 ; sur les villes des lévites, voir chap. 21.
  - type: text
    content: 'Car Moïse avait donné un patrimoine aux deux tribus et à la demi-tribu en Transjordanie ; quant aux lévites, il ne leur avait pas donné de patrimoine au milieu d''eux. '
  '4':
  - type: note
    content: fils de Joseph Gn 48.5n  ; Nb 13.11n.
  - type: text
    content: 'Les fils de Joseph formaient deux tribus, Manassé et Ephraïm ; on ne donna pas de part aux lévites dans le pays, si ce n''est des villes pour qu''ils y habitent, ainsi que leurs abords pour leurs troupeaux et leurs biens. '
  '5':
  - type: text
    content: 'Les Israélites firent ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse : ils partagèrent le pays.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'au Guilgal 4.19ns. –  Caleb, fils de Yephounné v. 13s ; 15.13 ; 21.12 ; Nb 13.6 ; 14.6,30,38 ; 26.65 ; 32.12 ; 34.19 ; Dt 1.36 ; 1Ch 4.15 ; 6.41. –  le Qenizzite v. 14 ; Nb 32.12n. –  Moïse, l''homme de Dieu Dt 33.1n  ; Ps 90.1 ; Esd 3.2 ; 1Ch 23.14 ; 2Ch 30.16. –  en ce qui nous concerne…  : allusion à la déclaration de Dieu en Nb 32.11s. –  Qadesh-Barnéa  : cf. 10.41n.'
  - type: text
    content: 'Les fils de Juda s''approchèrent de Josué au Guilgal ; Caleb, fils de Yephounné, le Qenizzite, lui dit : Tu sais, toi, ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit à Moïse, l''homme de Dieu, en ce qui nous concerne, moi et toi, à Qadesh-Barnéa. '
  '7':
  - type: note
    content: 'pour espionner…  : cf. Nb 13.17ss ; 14.6ss. –  honnête  : litt. selon ce qui (était) avec mon cœur.'
  - type: text
    content: 'J''avais quarante ans lorsque Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', m''a envoyé de Qadesh-Barnéa pour espionner le pays, et je lui ai fait un rapport honnête. '
  '8':
  - type: note
    content: 'ont fait fondre le cœur  : cf. Dt 1.28n  ; 20.8+. –  j''ai rempli mes obligations envers…  : litt. j''ai rempli derrière YHWH  ; autre traduction j''ai suivi sans réserve le Seigneur. De même aux v. 9,14 ; Nb 14.24n  ; 32.12 ; Dt 1.36 ; 1R 11.6.'
  - type: text
    content: 'Mes frères, ceux qui étaient montés avec moi, ont fait fondre le cœur du peuple, mais moi, j''ai rempli mes obligations envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu. '
  '9':
  - type: note
    content: Sans faute 22.24n  ; Es 5.9n. –  le pays que tes pieds ont foulé 1.3. –  tu as rempli… v. 8n  ; 1.3.
  - type: text
    content: 'Ce jour-là, Moïse a fait ce serment : « Sans faute, le pays que tes pieds ont foulé sera ton patrimoine et celui de tes fils pour toujours, parce que tu as rempli tes obligations envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu. » '
