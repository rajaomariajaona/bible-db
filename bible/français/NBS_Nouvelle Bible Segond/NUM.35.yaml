document_id: NUM.35,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les villes attribuées aux lévites
  - type: text
    content: ' '
  - type: note
    content: plaines arides de Moab… 22.1n  ; 26.3 ; 36.13.
  - type: text
    content: 'Dans les plaines arides de Moab, près du Jourdain, en face de Jéricho, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: Lorsque… 33.51n.
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Lorsque vous passerez le Jourdain pour entrer en Canaan, '
  '11':
  - type: note
    content: 'vous choisirez…  : autres traductions vous vous réserverez des villes… ; vous trouverez pour vous des villes qui seront des villes de refuge  ; LXX vous consacrerez, vous mettrez à part, cf. Jos 20.7ss. –  villes de refuge  : même terme en Jos 20.2s ; 1Ch 6.42,52 ; cf. Ex 21.13 ; Dt 4.41-43 ; 19.1-13 ; sur un rôle d’asile comparable attribué au sanctuaire, cf. Ex 21.14 ; 1R 1.50ss ; 2.28ss ; voir aussi Ps 27.2ss ; 31.2ss. –  le meurtrier  : LXX tout meurtrier  ; cf. Dt 19.3 ; Jos 20.9 ; voir aussi Gn 4.15,24. –  par erreur ou par accident  : cf. 15.22nss.'
  - type: text
    content: 'vous choisirez des villes qui seront pour vous des villes de refuge, pour que le meurtrier qui a tué quelqu''un par erreur puisse s''y enfuir. '
  '12':
  - type: note
    content: 'rédempteur  : hébreu go''el, proche parent de la victime habilité à la venger ; il sera appelé rédempteur du sang aux v. 19ss ; Dt 19.6,12 ; Jos 20.3ss ; 2S 14.11 ; sur les autres fonctions du proche parent rédempteur, cf. 5.8n  ; Lv 25.24s,48n  ; Jr 32.7s ; Rt 2.20n  ; 4.1ss ; voir aussi Ex 6.6n. –  comparu… pour être jugé  : cf. Dt 17.8ss ; 19.12 ; 21.2,19 ; 22.15 ; 25.7 ; Jos 20.4s ; voir 2Ch 19.5ss. –  devant la communauté v. 24s ; cf. 1.2 ; 15.33,35s ; Lv 24.14-16 ; Jos 20.6 ; voir aussi Mt 18.17.'
  - type: text
    content: 'Ces villes seront pour vous refuge pour échapper au rédempteur ; ainsi le meurtrier ne mourra pas avant d''avoir comparu devant la communauté pour être jugé. '
  '13':
  - type: note
    content: Des villes que vous donnerez aux lévites, v. 1-8. –  six… villes de refuge Jos 20.7ss.
  - type: text
    content: 'Des villes que vous donnerez, six seront pour vous des villes de refuge. '
  '14':
  - type: note
    content: 'Transjordanie  : à l''est du Jourdain, cf. 32.19n  ; 34.15n  ; voir Dt 4.41ss.'
  - type: text
    content: 'Vous donnerez trois villes en Transjordanie, et vous donnerez trois villes en Canaan : ce seront des villes de refuge. '
  '15':
  - type: note
    content: 'aux immigrés…  : cf. 9.14 ; Jos 20.9 ; voir aussi Ex 12.48n.'
  - type: text
    content: 'Ces six villes serviront de refuge aux Israélites, aux immigrés et aux résidents temporaires qui sont au milieu de vous : là pourra s''enfuir tout homme qui aura tué quelqu''un par erreur.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 19,31 ; Gn 4.15 ; 9.6 ; Ex 21.12ss,23ss ; Lv 24.21s ; Dt 19.4s,11s,21. –  et que la mort s''ensuive  : litt. et il (c.-à-d. la victime) meurt  ; de même dans la suite.'
  - type: text
    content: 'Si un homme frappe son prochain avec un instrument de fer et que la mort s''ensuive, c''est un meurtrier : le meurtrier sera mis à mort. '
  '17':
  - type: note
    content: 'avec une pierre  : litt. avec une pierre de main, expression qui pourrait désigner une pierre taillée pour servir d''arme ; formule analogue au v. 18 pour l’instrument de bois  ; autres traductions avec une arme de pierre / de bois ; avec un projectile de pierre / de bois.'
  - type: text
    content: 'S''il le frappe avec une pierre qui puisse causer la mort, et que la mort s''ensuive, c''est un meurtrier : le meurtrier sera mis à mort. '
  '18':
  - type: note
    content: Cf. v. 17n.
  - type: text
    content: 'S''il le frappe avec un instrument de bois qui puisse causer la mort, et que la mort s''ensuive, c''est un meurtrier : le meurtrier sera mis à mort. '
  '19':
  - type: note
    content: rédempteur du sang v. 12n  ; cf. Dt 19.12.
  - type: text
    content: 'Le rédempteur du sang mettra à mort le meurtrier ; quand il le rattrapera, il le mettra à mort. '
  '2':
  - type: note
    content: 'Cf. Lv 25.32ss ; Jos 21.1ss ; 1Ch 6.39ss. –  aux lévites  : cf. 18.20ss ; 26.62 ; Dt 12.12 ; 14.27 ; 16.11,14 ; 26.13 ; Jos 13.14,33 ; 14.4 ; 1Ch 13.2 ; 2Ch 11.14 ; 31.15,19 ; voir aussi Ez 48.10-20. –  les abords  : autres traductions les pâturages, les faubourgs.'
  - type: text
    content: 'Ordonne aux Israélites d''accorder aux lévites, sur la propriété qui est leur patrimoine, des villes où ils puissent habiter. Vous donnerez aussi aux lévites les abords de ces villes. '
  '20':
  - type: note
    content: Ex 21.14 ; Dt 19.11.
  - type: text
    content: 'Si un homme pousse son prochain parce qu''il le déteste, s''il jette quelque chose sur lui avec préméditation, et que la mort s''ensuive, '
  '21':
  - type: note
    content: 'meurtrier  : cf. Mt 5.21.'
  - type: text
    content: 'ou s''il le frappe de sa main par hostilité, et que la mort s''ensuive, celui qui a frappé sera mis à mort ; c''est un meurtrier : le rédempteur du sang mettra à mort le meurtrier quand il le rattrapera.'
  '22':
  - type: text
    content: 'Mais si un homme pousse son prochain fortuitement et non par hostilité, s''il jette un objet quelconque sur lui sans préméditation, '
  '23':
  - type: text
    content: 's''il fait tomber sur lui par mégarde une pierre qui peut causer la mort, et que la mort s''ensuive, alors qu''il n''était pas son ennemi et qu''il ne cherchait pas à lui faire du mal, '
  '24':
  - type: note
    content: 'la communauté  : cf. v. 12+. –  règles ou principes, pluriel du mot qui signifie aussi droit, coutume, apparenté au verbe traduit par jugera  ; voir loi.'
  - type: text
    content: 'la communauté jugera, d''après ces règles, entre celui qui a frappé et le rédempteur du sang. '
  '25':
  - type: note
    content: jusqu'à la mort du grand prêtre, occasion d'amnistie v. 28,32 ; Jos 20.6 ; cf. Hé 9.11ss. –  grand prêtre / onction Ex 29.1ss,7,29 ; Lv 8 ; 21.10ss.
  - type: text
    content: 'La communauté délivrera donc le meurtrier de la main du rédempteur du sang. La communauté le fera retourner dans la ville de refuge où il s''était enfui. Il y restera jusqu''à la mort du grand prêtre qui a reçu l''onction d''huile sacrée. '
  '26':
  - type: note
    content: 'la ville de refuge  : litt. sa ville de refuge ou la ville de son refuge.'
  - type: text
    content: 'Si le meurtrier sort des limites de la ville de refuge où il s''est enfui '
  '27':
  - type: note
    content: 'tue le meurtrier  : les deux termes sont issus du même verbe hébreu, de même au v. 30. –  il ne sera pas coupable…  : litt. il n''y aura pas de sang pour lui  ; cf. v. 19 ; Dt 19.6,10 ; voir aussi Ex 22.1s,21s.'
  - type: text
    content: 'et que le rédempteur du sang le trouve hors des limites de la ville de refuge, si le rédempteur du sang tue le meurtrier, il ne sera pas coupable de meurtre. '
  '28':
  - type: note
    content: 'le meurtrier doit rester  : litt. il restera.'
  - type: text
    content: Car le meurtrier doit rester dans sa ville de refuge jusqu'à la mort du grand prêtre ; après la mort du grand prêtre, le meurtrier pourra revenir dans sa propriété.
  '29':
  - type: text
    content: ' '
  - type: note
    content: des prescriptions de droit 27.11. – Voir générations.
  - type: text
    content: 'Ce sont là des prescriptions de droit pour vous, pour toutes vos générations, dans tous vos lieux d''habitation. '
  '3':
  - type: note
    content: 'les abords  : litt. leurs abords, suffixe masculin (renvoyant aux lévites) dans le texte hébreu traditionnel et féminin (renvoyant aux villes) dans Smr  ; cf. 1R 2.26 ; Jr 32.7 ; Am 7.17 ; Né 13.10.'
  - type: text
    content: 'Ils auront les villes pour y habiter ; les abords seront pour leurs bêtes, pour leurs biens et pour tous leurs animaux. '
  '30':
  - type: note
    content: témoins Dt 17.2-6 ; 19.15-21 ; Mt 18.16 ; Hé 10.28.
  - type: text
    content: Si un homme frappe quelqu'un, on tuera le meurtrier, sur la déposition de plusieurs témoins. Un seul témoin ne suffira pas pour faire condamner une personne à mort.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'de rançon  : le terme hébreu kopher est dérivé de la racine kpr , qui signifie couvrir ou effacer et dont l''une des formes est souvent traduite par expier, faire l''expiation (cf. le jour de l''Expiation, yom ha-Kippourim ). Sur l''ensemble, cf. v. 16+ ; Gn 9.5s ; Ex 21.12ss,30n  ; Lv 24.17 ; Dt 19 ; voir aussi Ex 21.29s ; Ps 49.8. –  qui mérite la mort  : litt. qui est méchant à mourir , c.-à-d. coupable d''un crime capital.'
  - type: text
    content: 'Vous n''accepterez pas de rançon pour la vie d''un meurtrier qui mérite la mort ; il sera mis à mort. '
  '32':
  - type: note
    content: 'la mort du prêtre  : cf. v. 25+,28.'
  - type: text
    content: 'Vous n''accepterez pas de rançon qui lui permette de s''enfuir dans sa ville de refuge et de revenir habiter dans le pays après la mort du prêtre. '
  '33':
  - type: note
    content: 'le sang  : cf. Gn 4.10s ; 9.5s ; Lv 17.11 ; Dt 12.23 ; 19.10,13 ; 21.1-9. –  profane le pays ou la terre  : cf. Es 24.5n  ; Jr 3.1s,9 ; Ps 106.38 ; voir saint. –  où vous êtes  : le verbe est sous-entendu en hébreu.'
  - type: text
    content: 'Vous ne profanerez pas le pays où vous êtes ; c''est le sang qui profane le pays ; et il ne sera fait pour le pays aucune expiation du sang qui y est répandu, sinon par le sang de celui qui l''a répandu. '
  '34':
  - type: note
    content: 'Tu ne rendras pas impur  : plusieurs mss hébreux et des versions anciennes portent vous ne rendrez pas impur  ; voir pur. –  au milieu duquel…  : cf. 2.2 ; 5.3 ; Ex 25.8 ; 29.45s ; Lv 15.31 ; voir aussi Lv 18.25. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Tu ne rendras pas impur le pays où vous habitez et au milieu duquel je demeure : je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), et je demeure au milieu des Israélites.'
  '4':
  - type: note
    content: 'mille coudées  : un peu moins de 500 m ; LXX deux mille coudées (un peu moins d''un kilomètre), cf. v. 5 ; voir mesures.'
  - type: text
    content: 'Les abords des villes que vous donnerez aux lévites auront, à partir du mur de la ville et au dehors, mille coudées tout autour. '
  '5':
  - type: note
    content: 'On peut comprendre qu''il s''agit d''un carré de deux mille coudées de côté (cf. v. 4 ; Ez 48.16s). –  Tels…  : plusieurs mss hébreux et versions anciennes ont lu tels seront pour vous les abords des villes.'
  - type: text
    content: 'Vous mesurerez, en dehors de la ville, deux mille coudées pour le côté est, deux mille coudées pour le côté sud, deux mille coudées pour le côté ouest et deux mille coudées pour le côté nord. La ville sera au milieu. Tels seront les abords de leurs villes. '
  '6':
  - type: note
    content: villes de refuge v. 9-15.
  - type: text
    content: 'Parmi les villes que vous donnerez aux lévites, vous donnerez six villes de refuge où pourra s''enfuir le meurtrier, et quarante-deux autres villes. '
  '7':
  - type: note
    content: Total des villes… Jos 21.41s.
  - type: text
    content: 'Total des villes que vous donnerez aux lévites : quarante-huit villes, avec leurs abords. '
  '8':
  - type: note
    content: 26.53s ; 33.54 ; cf. Jos 21.4-8.
  - type: text
    content: Les villes que vous donnerez sur les propriétés des Israélites seront livrées en plus grand nombre par ceux qui en ont le plus, et en plus petit nombre par ceux qui en ont moins ; chacun donnera de ses villes aux lévites à proportion du patrimoine qu'il aura reçu.
  - type: heading
    content: Les villes de refuge pour les meurtriers
  '9':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
