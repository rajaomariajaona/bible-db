document_id: NUM.35,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les villes attribuées aux lévites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'plaines arides de Moab… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 26.3 ; 36.13.'
      marker-yv: yv-n
    - type: text
      text: 'Dans les plaines arides de Moab, près du Jourdain, en face de Jéricho, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Lorsque… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '33.51'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Parle aux Israélites ; tu leur diras : Lorsque vous passerez le Jourdain pour entrer en Canaan, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous choisirez…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous vous réserverez des villes… ; vous trouverez pour vous des villes qui seront des villes de refuge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous consacrerez, vous mettrez à part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jos 20.7ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: villes de refuge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même terme en Jos 20.2s ; 1Ch 6.42,52 ; cf. Ex 21.13 ; Dt 4.41-43 ; 19.1-13 ; sur un rôle d’'
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: asile
        - type: text
          text: ' comparable attribué au sanctuaire, cf. Ex 21.14 ; 1R 1.50ss ; 2.28ss ; voir aussi Ps 27.2ss ; 31.2ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le meurtrier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout meurtrier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 19.3 ; Jos 20.9 ; voir aussi Gn 4.15,24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par erreur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par accident
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss.
      marker-yv: yv-n
    - type: text
      text: 'vous choisirez des villes qui seront pour vous des villes de refuge, pour que le meurtrier qui a tué quelqu''un par erreur puisse s''y enfuir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.12 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: rédempteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: go'el
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', proche parent de la victime habilité à la venger ; il sera appelé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rédempteur du sang '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aux v. 19ss ; Dt 19.6,12 ; Jos 20.3ss ; 2S 14.11 ; sur les autres fonctions du proche parent '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rédempteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 5.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 25.24s,48'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 32.7s ; Rt 2.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 4.1ss ; voir aussi Ex 6.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comparu… pour être jugé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 17.8ss ; 19.12 ; 21.2,19 ; 22.15 ; 25.7 ; Jos 20.4s ; voir 2Ch 19.5ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'devant la communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 24s ; cf. 1.2 ; 15.33,35s ; Lv 24.14-16 ; Jos 20.6 ; voir aussi Mt 18.17.
      marker-yv: yv-n
    - type: text
      text: 'Ces villes seront pour vous refuge pour échapper au rédempteur ; ainsi le meurtrier ne mourra pas avant d''avoir comparu devant la communauté pour être jugé. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Des villes que vous donnerez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aux lévites, v. 1-8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'six… villes de refuge '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 20.7ss.
      marker-yv: yv-n
    - type: text
      text: 'Des villes que vous donnerez, six seront pour vous des villes de refuge. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Transjordanie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à l''est du Jourdain, cf. 32.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 34.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir Dt 4.41ss.'
      marker-yv: yv-n
    - type: text
      text: 'Vous donnerez trois villes en Transjordanie, et vous donnerez trois villes en Canaan : ce seront des villes de refuge. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux immigrés…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.14 ; Jos 20.9 ; voir aussi Ex 12.48'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ces six villes serviront de refuge aux Israélites, aux immigrés et aux résidents temporaires qui sont au milieu de vous : là pourra s''enfuir tout homme qui aura tué quelqu''un par erreur.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 19,31 ; Gn 4.15 ; 9.6 ; Ex 21.12ss,23ss ; Lv 24.21s ; Dt 19.4s,11s,21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et que la mort s'ensuive
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. la victime) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: meurt
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; de même dans la suite.
      marker-yv: yv-n
    - type: text
      text: 'Si un homme frappe son prochain avec un instrument de fer et que la mort s''ensuive, c''est un meurtrier : le meurtrier sera mis à mort. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec une pierre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec une pierre de main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression qui pourrait désigner une pierre taillée pour servir d''arme ; formule analogue au v. 18 pour l’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: instrument de bois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec une arme de pierre / de bois ; avec un projectile de pierre / de bois.
      marker-yv: yv-n
    - type: text
      text: 'S''il le frappe avec une pierre qui puisse causer la mort, et que la mort s''ensuive, c''est un meurtrier : le meurtrier sera mis à mort. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'S''il le frappe avec un instrument de bois qui puisse causer la mort, et que la mort s''ensuive, c''est un meurtrier : le meurtrier sera mis à mort. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rédempteur du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Dt 19.12.'
      marker-yv: yv-n
    - type: text
      text: 'Le rédempteur du sang mettra à mort le meurtrier ; quand il le rattrapera, il le mettra à mort. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lv 25.32ss ; Jos 21.1ss ; 1Ch 6.39ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aux '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.20ss ; 26.62 ; Dt 12.12 ; 14.27 ; 16.11,14 ; 26.13 ; Jos 13.14,33 ; 14.4 ; 1Ch 13.2 ; 2Ch 11.14 ; 31.15,19 ; voir aussi Ez 48.10-20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les abords
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les pâturages, les faubourgs.
      marker-yv: yv-n
    - type: text
      text: 'Ordonne aux Israélites d''accorder aux lévites, sur la propriété qui est leur patrimoine, des villes où ils puissent habiter. Vous donnerez aussi aux lévites les abords de ces villes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 21.14 ; Dt 19.11.
      marker-yv: yv-n
    - type: text
      text: 'Si un homme pousse son prochain parce qu''il le déteste, s''il jette quelque chose sur lui avec préméditation, et que la mort s''ensuive, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: meurtrier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 5.21.'
      marker-yv: yv-n
    - type: text
      text: 'ou s''il le frappe de sa main par hostilité, et que la mort s''ensuive, celui qui a frappé sera mis à mort ; c''est un meurtrier : le rédempteur du sang mettra à mort le meurtrier quand il le rattrapera.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais si un homme pousse son prochain fortuitement et non par hostilité, s''il jette un objet quelconque sur lui sans préméditation, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 's''il fait tomber sur lui par mégarde une pierre qui peut causer la mort, et que la mort s''ensuive, alors qu''il n''était pas son ennemi et qu''il ne cherchait pas à lui faire du mal, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la communauté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'règles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: principes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', pluriel du mot qui signifie aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: droit, coutume
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', apparenté au verbe traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jugera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'la communauté jugera, d''après ces règles, entre celui qui a frappé et le rédempteur du sang. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'à la mort du grand prêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', occasion d''amnistie v. 28,32 ; Jos 20.6 ; cf. Hé 9.11ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grand prêtre / '
        - type: usfm
          marker: w
          children:
          - type: text
            text: onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 29.1ss,7,29 ; Lv 8 ; 21.10ss.
      marker-yv: yv-n
    - type: text
      text: 'La communauté délivrera donc le meurtrier de la main du rédempteur du sang. La communauté le fera retourner dans la ville de refuge où il s''était enfui. Il y restera jusqu''à la mort du grand prêtre qui a reçu l''onction d''huile sacrée. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la ville de refuge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
