document_id: 1SA.30,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Tsiqlag pillée ; David poursuit les Amalécites
  - type: text
    content: ' '
  - type: note
    content: 'Tsiqlag  : cf. 27.6n. –  les Amalécites  : cf. 15.2n  ; 27.8n. –  mis à mal  : litt. frappé  ; cf. 4.2n.'
  - type: text
    content: 'Le troisième jour, lorsque David arriva à Tsiqlag avec ses hommes, les Amalécites avaient fait irruption dans le Néguev et à Tsiqlag. Ils avaient mis à mal Tsiqlag et ils y avaient mis le feu. '
  '10':
  - type: note
    content: 's''arrêtèrent, trop fatigués…  : autre traduction furent empêchés de passer…  ; cf. v. 21 ; certains comprennent qu''ils ont simplement été assignés à la surveillance du matériel (v. 24), comme en 25.13.'
  - type: text
    content: David mena la poursuite avec quatre cents hommes ; deux cents hommes s'arrêtèrent, trop fatigués pour passer le Besor.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'un Egyptien  : cf. Dt 23.8. –  Ils lui donnèrent…  : litt. ils lui donnèrent du pain (cf. 14.24n  ; 28.20n) et il mangea et ils lui firent boire de l''eau  ; cf. v. 12 ; Pr 25.21 ; Mt 25.35.'
  - type: text
    content: 'Ils trouvèrent dans la campagne un Egyptien qu''ils conduisirent à David. Ils lui donnèrent à manger et à boire ; '
  '12':
  - type: note
    content: 'figues sèches / raisins secs  : cf. 25.18. –  son souffle lui revint  : cf. 14.27 ; Jg 15.19 ; voir esprit.'
  - type: text
    content: 'ils lui donnèrent du gâteau de figues sèches et deux gâteaux de raisins secs. Quand il eut mangé, son souffle lui revint. Il n''avait ni mangé ni bu depuis trois jours et trois nuits. '
  '13':
  - type: note
    content: 'A qui es-tu  : dans l''ancien Israël, l''identité d''une personne se définissait fréquemment par l''appartenance à un groupe social, à une famille, ou, pour un esclave, à son maître ; cf. 17.55n,58. –  un jeune Egyptien  : autre traduction un garçon égyptien.'
  - type: text
    content: 'David lui dit : A qui es-tu, et d''où es-tu ? Il répondit : Je suis un jeune Egyptien, esclave d''un Amalécite ; il y a trois jours, mon maître m''a abandonné parce que j''étais malade. '
  '14':
  - type: note
    content: 'Néguev des Kérétites…  : cf. 27.10n.'
  - type: text
    content: 'Nous avons fait une incursion dans le Néguev des Kérétites, le territoire de Juda et le Néguev de Caleb, et nous avons mis le feu à Tsiqlag. '
  '15':
  - type: note
    content: 'me conduire  : litt. me faire descendre, de même dans la suite ; dans l''A.T., un déplacement en direction de Jérusalem est souvent décrit comme une montée, et celui qui en éloigne comme une descente (voir aussi v. 24). –  cette troupe  : cf. v. 8. –  Jure-moi par Dieu  : cf. 24.22+. –  livreras 17.46+.'
  - type: text
    content: 'David lui dit : Veux-tu me conduire vers cette troupe ? Et il répondit : Jure-moi par Dieu que tu ne me feras pas mourir et que tu ne me livreras pas à mon maître, et je te conduirai vers cette troupe.'
  - type: heading
    content: Les Amalécites battus par David
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'faisant la fête  : cf. Es 9.2 ; Ps 119.162. –  tout le butin  : litt. tout le grand butin.'
  - type: text
    content: 'Il le conduisit donc. Les Amalécites s''étaient installés dans tout le pays, mangeant, buvant et faisant la fête, à cause de tout le butin qu''ils avaient pris dans le pays des Philistins et dans le pays de Juda. '
  '17':
  - type: note
    content: 'les battit  : litt. les frappa, cf. 4.2n. –  des chameaux  : montures rapides de ces bandes de pillards.'
  - type: text
    content: 'David les battit depuis l''aube jusqu''au soir du lendemain, et aucun d''eux n''échappa, excepté quatre cents jeunes gens qui montèrent sur des chameaux et s''enfuirent. '
  '18':
  - type: note
    content: 'reprit  : litt. délivra, cf. v. 8n. –  ses deux femmes v. 5 ; cf. 25.42s.'
  - type: text
    content: 'David reprit tout ce que les Amalécites avaient pris ; ainsi David reprit ses deux femmes. '
  '19':
  - type: note
    content: 'David ramena tout  : cf. Gn 14.14-16.'
  - type: text
    content: 'Il ne leur manqua personne, ni petit ni grand, ni fils ni fille, ni aucune partie du butin, ni rien de ce qu''on leur avait pris : David ramena tout. '
  '2':
  - type: note
    content: 'et tous ceux qui y étaient  : d''après LXX  ; le texte dit seulement les femmes qui y étaient, mais les mots suivants, petits et grands, impliquent que des enfants sont aussi concernés ; cf. 5.9. –  ils les avaient emmenés  : cf. v. 20,22 ; 23.5.'
  - type: text
    content: 'Ils avaient capturé les femmes et tous ceux qui y étaient, petits et grands. Ils n''avaient mis personne à mort, mais ils les avaient emmenés quand ils s''étaient remis en route. '
  '20':
  - type: note
    content: Cf. Gn 41.43 ; Est 6.9.
  - type: text
    content: 'David prit tout le petit bétail et le gros bétail ; ceux qui conduisaient ces troupeaux et marchaient à leur tête disaient : C''est le butin de David !'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'auprès des deux cents hommes  : cf. v. 10. –  leur demanda comment ils allaient  : cf. 10.4n.'
  - type: text
    content: 'David arriva auprès des deux cents hommes qui, trop fatigués pour le suivre, avaient été laissés au Besor. Ils sortirent à la rencontre de David et du peuple qui était avec lui. David s''approcha d''eux et leur demanda comment ils allaient. '
  '22':
  - type: note
    content: 'sans morale  : cf. Dt 13.14n. –  avec nous  : litt. avec moi  ; le singulier hébreu souligne soit l''individualisme de ces hommes sans morale, chacun parlant pour soi, soit au contraire leur esprit de corps, le singulier ayant une valeur collective.'
  - type: text
    content: 'Tous les hommes mauvais, les hommes sans morale, parmi ceux qui étaient allés avec David dirent : Puisqu''ils ne sont pas venus avec nous, rien ne leur sera donné du butin que nous avons repris, sinon à chacun sa femme et ses fils ; qu''ils les emmènent et s''en aillent. '
  '23':
  - type: note
    content: 'On trouve en 2S 8.6,14 ; Ps 44.2-8 ; 124.1-8 des affirmations du même type sur la victoire qui est l''œuvre du Seigneur. –  mes frères  : les mots correspondants sont absents de LXX. –  la troupe  : cf. v. 8.'
  - type: text
    content: 'Mais David dit : N''agissez pas ainsi, mes frères, avec ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a donné ; car il nous a gardés et il nous a livré la troupe qui était venue contre nous. '
  '24':
  - type: note
    content: 'Qui donc vous écouterait… ? c.-à-d. qui donc pourrait être d''accord avec vous… ? –  La part… ils partageront (ou on partagera) : cf. Nb 31.25-47 ; Jos 22.8.'
  - type: text
    content: 'Qui donc vous écouterait dans cette affaire ? La part de celui qui est descendu au combat et la part de celui qui est resté près du matériel doit être la même : ensemble ils partageront.'
  '25':
  - type: text
    content: Il en fut ainsi dès ce jour-là et dans la suite, et on a fait de cela une prescription et une règle en Israël, jusqu'à ce jour.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'aux anciens de Juda  : David prépare son futur retour sur la scène israélite ; cf. Lc 16.9. –  à ses amis  : litt. à son ami , le singulier ayant peut-être ici une valeur distributive à (chacun de) ses amis  ; LXX a lu et à ses amis . –  un cadeau  : cf. 25.27n. –  ennemis du Seigneur  : expression rare dans l''A.T. ; cf. 2S 12.14 ; Na 1.2 ; Ps 37.20.'
  - type: text
    content: 'A son arrivée à Tsiqlag, David envoya une partie du butin aux anciens de Juda, à ses amis, avec ces mots : C''est un cadeau pour vous, pris sur le butin des ennemis du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Il en envoya  : sous-entendu dans le texte. – Les v. 27-31 énumèrent treize localités ou régions aux anciens desquelles David fait parvenir ses cadeaux. Sa générosité lui assurera plus tard le soutien des Judéens, qui le choisiront pour roi, à Hébron précisément (2S 2.1-4). Plusieurs des endroits énumérés ( Ramoth du Néguev , Yattir , Aroër, Eshtemoa, villes des Yerahméélites, villes des Caïnites, Horma, Bor-Ashân, Hébron ) sont mentionnés ailleurs dans l''A.T. et sont situés essentiellement au sud d''Hébron ; trois d''entre eux ( Siphmoth, Rakal, Atak ) ne sont pas identifiés, mais devaient se trouver dans la même région ; seule la localité de Beth-El est située dans une tout autre région, au nord de Jérusalem. Bien des spécialistes, se fondant sur les listes parallèles de Jos 19.2-8 et de 1Ch 4.28-32, proposent donc de considérer le nom de Beth-El comme une déformation de celui de Betoul / Betouel.'
  - type: text
    content: Il en envoya à ceux de Beth-El,
  - type: text
    content: à ceux de Ramoth du Néguev,
  - type: text
    content: à ceux de Yattir,
  '28':
  - type: text
    content: à ceux d'Aroër,
  - type: text
    content: à ceux de Siphmoth,
  - type: text
    content: 'à ceux d''Eshtemoa, '
  '29':
  - type: note
    content: 'Rakal  : LXX Carmel (cf. 15.12 ; 25.2). –  Yerahméélites / Caïnites  : cf. 27.10n.'
  - type: text
    content: à ceux de Rakal,
  - type: text
    content: à ceux des villes des Yerahméélites,
  - type: text
    content: à ceux des villes des Caïnites,
  '3':
  - type: text
    content: 'David et ses hommes arrivèrent à la ville. Elle était incendiée, et leurs femmes, leurs fils et leurs filles avaient été emmenés captifs. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Atak  : LXX Nob (cf. 21.2 ; 22.9-19).'
  - type: text
    content: à ceux de Horma,
  - type: text
    content: à ceux de Bor-Ashân,
  - type: text
    content: à ceux d'Atak,
  '31':
  - type: text
    content: à ceux d'Hébron et à tous les lieux où David et ses hommes avaient circulé.
  '4':
  - type: note
    content: 'sanglotèrent  : cf. 11.4n.'
  - type: text
    content: 'Alors David et le peuple qui était avec lui sanglotèrent jusqu''à ce qu''ils n''aient plus la force de pleurer. '
  '5':
  - type: note
    content: Cf. 25.42n,43n.
  - type: text
    content: Les deux femmes de David, Ahinoam, la Jizréélite, et Abigaïl, femme de Nabal, le Carmélite, avaient été emmenées captives.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'grande détresse  : cf. 28.15+. –  ses fils  : une autre tradition juive lit son fils . –  trouva sa force dans le Seigneur  : cf. Es 25.4 ; Jr 16.19 ; Ps 18.7 ; 25.15 ; 27.14 ; 56.4 ; 62.2 ; Pr 18.10 ; Rm 8.31.'
  - type: text
    content: 'David fut dans une grande détresse, car le peuple parlait de le lapider, parce que tous étaient amers, chacun à cause de ses fils et de ses filles. Mais David trouva sa force dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu. '
  '7':
  - type: note
    content: 'Abiathar, fils d''Ahimélek, le prêtre  : cf. 22.20-23. –  Apporte-moi l''éphod, je te prie  : cf. 23.6,9 ; voir 14.18n.'
  - type: text
    content: 'Il dit à Abiathar, fils d''Ahimélek, le prêtre : Apporte-moi l''éphod, je te prie ! Abiathar apporta l''éphod à David. '
  '8':
  - type: note
    content: 'interrogea le Seigneur  : cf. 10.22n  ; 22.10+. –  cette troupe  : le mot hébreu correspondant suggère, non pas une unité militaire ordinaire, mais un groupe moins structuré, qui s''adonne facilement au pillage ; cf. 2S 3.22n  ; 2R 5.2 ; 6.23 ; 13.20s ; 24.2. –  tu reprendras  : litt. tu délivreras, c.-à-d. tu délivreras les captifs et tu récupéreras les biens (cf. v. 18,22).'
  - type: text
    content: 'David interrogea le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Si je poursuis cette troupe, la rattraperai-je ? Il lui répondit : Poursuis : tu rattraperas et tu reprendras. '
  '9':
  - type: note
    content: 'six cents hommes  : cf. 22.2+. –  l''oued Besor  : probablement celui qui coule à 35 km environ au sud-ouest de Tsiqlag et va se jeter dans la Méditerranée, cf. v. 10,21. –  où s''étaient arrêtés (ou s''arrêtèrent) ceux qui étaient restés en arrière  : le sens des deux mots hébreux ainsi rendus n''est pas très clair ; litt. ceux qui étaient restés (ou les autres) s''étaient arrêtés (ou s''arrêtèrent) ; on peut en déduire, soit que des hommes étaient restés à Tsiqlag, soit que certains des six cents compagnons de David n''allèrent pas plus loin que l''oued (voir la deuxième partie du v. 10).'
  - type: text
    content: 'David se mit en marche, lui et les six cents hommes qui étaient avec lui. Ils arrivèrent à l''oued Besor, où s''étaient arrêtés ceux qui étaient restés en arrière. '
