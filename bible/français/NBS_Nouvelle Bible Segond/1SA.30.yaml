      - type: text
        text: mis à mal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: frappé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 4.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le troisième jour, lorsque David arriva à Tsiqlag avec ses hommes, les Amalécites avaient fait irruption dans le Néguev et à Tsiqlag. Ils avaient mis à mal Tsiqlag et ils y avaient mis le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et tous ceux qui y étaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '  ; le texte dit seulement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les femmes qui y étaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais les mots suivants, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: petits et grands
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', impliquent que des enfants sont aussi concernés ; cf. 5.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils les avaient emmenés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 20,22 ; 23.5.'
    marker-yv: yv-n
  - type: text
    text: 'Ils avaient capturé les femmes et tous ceux qui y étaient, petits et grands. Ils n''avaient mis personne à mort, mais ils les avaient emmenés quand ils s''étaient remis en route. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David et ses hommes arrivèrent à la ville. Elle était incendiée, et leurs femmes, leurs fils et leurs filles avaient été emmenés captifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sanglotèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors David et le peuple qui était avec lui sanglotèrent jusqu''à ce qu''ils n''aient plus la force de pleurer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 25.42
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',43'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Les deux femmes de David, Ahinoam, la Jizréélite, et Abigaïl, femme de Nabal, le Carmélite, avaient été emmenées captives.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: grande détresse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 28.15+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ses fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : une autre tradition juive lit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'trouva sa force dans le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Es 25.4 ; Jr 16.19 ; Ps 18.7 ; 25.15 ; 27.14 ; 56.4 ; 62.2 ; Pr 18.10 ; Rm 8.31.'
    marker-yv: yv-n
  - type: text
    text: 'David fut dans une grande détresse, car le peuple parlait de le lapider, parce que tous étaient amers, chacun à cause de ses fils et de ses filles. Mais David trouva sa force dans le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', son Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abiathar, fils d''Ahimélek, le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.20-23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Apporte-moi l'éphod, je te prie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 23.6,9 ; voir 14.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il dit à Abiathar, fils d''Ahimélek, le prêtre : Apporte-moi l''éphod, je te prie ! Abiathar apporta l''éphod à David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'interrogea le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 22.10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cette troupe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu correspondant suggère, non pas une unité militaire ordinaire, mais un groupe moins structuré, qui s''adonne facilement au pillage ; cf. 2S 3.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2R 5.2 ; 6.23 ; 13.20s ; 24.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu reprendras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu délivreras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu délivreras les captifs et tu récupéreras les biens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 18,22).
    marker-yv: yv-n
  - type: text
    text: 'David interrogea le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Si je poursuis cette troupe, la rattraperai-je ? Il lui répondit : Poursuis : tu rattraperas et tu reprendras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: six cents hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'oued Besor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : probablement celui qui coule à 35 km environ au sud-ouest de Tsiqlag et va se jeter dans la Méditerranée, cf. v. 10,21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'où s''étaient arrêtés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'arrêtèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ceux qui étaient restés en arrière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le sens des deux mots hébreux ainsi rendus n''est pas très clair ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ceux qui étaient restés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les autres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 's''étaient arrêtés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'arrêtèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; on peut en déduire, soit que des hommes étaient restés à Tsiqlag, soit que certains des six cents compagnons de David n''allèrent pas plus loin que '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''oued '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir la deuxième partie du v. 10).
    marker-yv: yv-n
  - type: text
    text: 'David se mit en marche, lui et les six cents hommes qui étaient avec lui. Ils arrivèrent à l''oued Besor, où s''étaient arrêtés ceux qui étaient restés en arrière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'arrêtèrent, trop fatigués…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: furent empêchés de passer…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 21 ; certains comprennent qu''ils ont simplement été assignés à la surveillance du matériel (v. 24), comme en 25.13.'
    marker-yv: yv-n
  - type: text
    text: David mena la poursuite avec quatre cents hommes ; deux cents hommes s'arrêtèrent, trop fatigués pour passer le Besor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un Egyptien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Dt 23.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils lui donnèrent…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils lui donnèrent du pain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 14.24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 28.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et il mangea et ils lui firent boire de l'eau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. v. 12 ; Pr 25.21 ; Mt 25.35.
    marker-yv: yv-n
  - type: text
    text: 'Ils trouvèrent dans la campagne un Egyptien qu''ils conduisirent à David. Ils lui donnèrent à manger et à boire ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'figues sèches '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: raisins secs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 25.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son souffle lui revint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.27 ; Jg 15.19 ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: esprit
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'ils lui donnèrent du gâteau de figues sèches et deux gâteaux de raisins secs. Quand il eut mangé, son souffle lui revint. Il n''avait ni mangé ni bu depuis trois jours et trois nuits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: A qui es-tu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans l''ancien Israël, l''identité d''une personne se définissait fréquemment par l''appartenance à un groupe social, à une famille, ou, pour un esclave, à son maître ; cf. 17.55'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',58. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un jeune Egyptien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un garçon égyptien.
    marker-yv: yv-n
  - type: text
    text: 'David lui dit : A qui es-tu, et d''où es-tu ? Il répondit : Je suis un jeune Egyptien, esclave d''un Amalécite ; il y a trois jours, mon maître m''a abandonné parce que j''étais malade. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Néguev des Kérétites…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 27.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous avons fait une incursion dans le Néguev des Kérétites, le territoire de Juda et le Néguev de Caleb, et nous avons mis le feu à Tsiqlag. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: me conduire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me faire descendre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite ; dans l''A.T., un déplacement en direction de Jérusalem est souvent décrit comme une montée, et celui qui en éloigne comme une descente (voir aussi v. 24). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cette troupe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jure-moi par Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 24.22+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'livreras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 17.46+.
    marker-yv: yv-n
  - type: text
    text: 'David lui dit : Veux-tu me conduire vers cette troupe ? Et il répondit : Jure-moi par Dieu que tu ne me feras pas mourir et que tu ne me livreras pas à mon maître, et je te conduirai vers cette troupe.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Amalécites battus par David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: faisant la fête
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Es 9.2 ; Ps 119.162. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout le butin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout le grand butin.
    marker-yv: yv-n
  - type: text
    text: 'Il le conduisit donc. Les Amalécites s''étaient installés dans tout le pays, mangeant, buvant et faisant la fête, à cause de tout le butin qu''ils avaient pris dans le pays des Philistins et dans le pays de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les battit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les frappa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 4.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des chameaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : montures rapides de ces bandes de pillards.'
    marker-yv: yv-n
  - type: text
    text: 'David les battit depuis l''aube jusqu''au soir du lendemain, et aucun d''eux n''échappa, excepté quatre cents jeunes gens qui montèrent sur des chameaux et s''enfuirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: reprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: délivra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ses deux femmes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 5 ; cf. 25.42s.
    marker-yv: yv-n
  - type: text
    text: 'David reprit tout ce que les Amalécites avaient pris ; ainsi David reprit ses deux femmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: David ramena tout
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 14.14-16.'
    marker-yv: yv-n
  - type: text
    text: 'Il ne leur manqua personne, ni petit ni grand, ni fils ni fille, ni aucune partie du butin, ni rien de ce qu''on leur avait pris : David ramena tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Gn 41.43 ; Est 6.9.
    marker-yv: yv-n
  - type: text
    text: 'David prit tout le petit bétail et le gros bétail ; ceux qui conduisaient ces troupeaux et marchaient à leur tête disaient : C''est le butin de David !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: auprès des deux cents hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur demanda comment ils allaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 10.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'David arriva auprès des deux cents hommes qui, trop fatigués pour le suivre, avaient été laissés au Besor. Ils sortirent à la rencontre de David et du peuple qui était avec lui. David s''approcha d''eux et leur demanda comment ils allaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sans morale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 13.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le singulier hébreu souligne soit l''individualisme de ces '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: hommes sans morale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', chacun parlant pour soi, soit au contraire leur esprit de corps, le singulier ayant une valeur collective.'
    marker-yv: yv-n
  - type: text
    text: 'Tous les hommes mauvais, les hommes sans morale, parmi ceux qui étaient allés avec David dirent : Puisqu''ils ne sont pas venus avec nous, rien ne leur sera donné du butin que nous avons repris, sinon à chacun sa femme et ses fils ; qu''ils les emmènent et s''en aillent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'On trouve en 2S 8.6,14 ; Ps 44.2-8 ; 124.1-8 des affirmations du même type sur la victoire qui est l''œuvre du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mes frères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les mots correspondants sont absents de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la troupe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8.'
    marker-yv: yv-n
  - type: text
    text: 'Mais David dit : N''agissez pas ainsi, mes frères, avec ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous a donné ; car il nous a gardés et il nous a livré la troupe qui était venue contre nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qui donc vous écouterait… ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui donc pourrait être d''accord avec vous… ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La part… ils partageront '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on partagera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : cf. Nb 31.25-47 ; Jos 22.8.'
    marker-yv: yv-n
  - type: text
    text: 'Qui donc vous écouterait dans cette affaire ? La part de celui qui est descendu au combat et la part de celui qui est resté près du matériel doit être la même : ensemble ils partageront.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il en fut ainsi dès ce jour-là et dans la suite, et on a fait de cela une prescription et une règle en Israël, jusqu'à ce jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux anciens de Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : David prépare son futur retour sur la scène israélite ; cf. Lc 16.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à ses amis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à son ami
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', le singulier ayant peut-être ici une valeur distributive '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à (chacun de) ses amis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; LXX a lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et à ses amis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un cadeau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 25.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ennemis du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : expression rare dans l''A.T. ; cf. 2S 12.14 ; Na 1.2 ; Ps 37.20.'
    marker-yv: yv-n
  - type: text
    text: 'A son arrivée à Tsiqlag, David envoya une partie du butin aux anciens de Juda, à ses amis, avec ces mots : C''est un cadeau pour vous, pris sur le butin des ennemis du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il en envoya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte. – Les v. 27-31 énumèrent treize localités ou régions aux anciens desquelles David fait parvenir ses cadeaux. Sa générosité lui assurera plus tard le soutien des Judéens, qui le choisiront pour roi, à Hébron précisément (2S 2.1-4). Plusieurs des endroits énumérés ('
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ramoth du Néguev
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yattir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', Aroër, Eshtemoa, villes des Yerahméélites, villes des Caïnites, Horma, Bor-Ashân, Hébron'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) sont mentionnés ailleurs dans l'A.T. et sont situés essentiellement au sud d'Hébron ; trois d'entre eux (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Siphmoth, Rakal, Atak
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ne sont pas identifiés, mais devaient se trouver dans la même région ; seule la localité de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beth-El '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est située dans une tout autre région, au nord de Jérusalem. Bien des spécialistes, se fondant sur les listes parallèles de Jos 19.2-8 et de 1Ch 4.28-32, proposent donc de considérer le nom de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beth-El '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'comme une déformation de celui de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Betoul / Betouel.
    marker-yv: yv-n
  - type: text
    text: Il en envoya à ceux de Beth-El,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ceux de Ramoth du Néguev,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ceux de Yattir,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: à ceux d'Aroër,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ceux de Siphmoth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à ceux d''Eshtemoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rakal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Carmel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 15.12 ; 25.2). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Yerahméélites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Caïnites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 27.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: à ceux de Rakal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ceux des villes des Yerahméélites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ceux des villes des Caïnites,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Atak
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nob '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 21.2 ; 22.9-19).
    marker-yv: yv-n
  - type: text
    text: à ceux de Horma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ceux de Bor-Ashân,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ceux d'Atak,
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: à ceux d'Hébron et à tous les lieux où David et ses hommes avaient circulé.
