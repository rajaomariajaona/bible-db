      text: 'Il prit une paire de bœufs et les coupa en morceaux, qu''il envoya par l''intermédiaire des messagers dans tout le territoire d''Israël, en disant : Quiconque ne se mettra pas en campagne derrière Saül et Samuel, ses bœufs seront traités de la même manière. La frayeur du '
    - type: usfm
