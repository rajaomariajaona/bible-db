document_id: 1SA.11,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saül remporte une victoire sur les Ammonites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ' porte'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nahash, roi des Ammonites, opprimait durement les fils de Gad et les fils de Ruben. Il crevait à tous l''œil droit et semait la terreur en Israël. Il ne restait pas un homme parmi les Israélites (de Transjordanie) à qui Nahash, (roi) des Ammonites, n''avait crevé l''œil droit. Seulement sept mille hommes s''enfuirent pour échapper aux Ammonites et se rendirent à Yabesh au Galaad. Or, environ un mois après… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 10.27
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Nahash, l'Ammonite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Nahash était le roi des Ammonites (cf. 12.12 ; 2S 10.1s) ; ce peuple occupait une partie de la Transjordanie (cf. Gn 19.38 ; Dt 23.4 ; Jg 11 ; 2S 10). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dressa son camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jos 10.5,31,34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yabesh de Galaad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 31.11-13 ; Jg 21.8-14 ; la région de Galaad, située à l''est du Jourdain, fait partie du territoire israélite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Conclus une '
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: ' pour nous'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit ici d''un accord de reddition et de soumission totale à l''adversaire, pour éviter un conflit armé dont l''issue ne fait pas de doute. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous te serons soumis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous serons tes esclaves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous te servirons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 2R 17.3 ; 18.31 ; Jn 8.33.
      marker-yv: yv-n
    - type: text
      text: 'Nahash, l''Ammonite, dressa son camp contre Yabesh de Galaad. Tous les hommes de Yabesh dirent à Nahash : Conclus une alliance pour nous, et nous te serons soumis. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux Ammonites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement sous-entendu dans le texte (cf. v. 3) ; les gens de Yabesh feignent de se rendre en acceptant les conditions imposées par les Ammonites (v. 2) ; LXX précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à Nahash l'Ammonite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Toutefois, on pourrait aussi interpréter le texte comme un message adressé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aux Israélites : Demain nous ferons une sortie vers vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 7) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et nous nous en remettrons à vous pour la conduite des opérations.
      marker-yv: yv-n
    - type: text
      text: 'Les hommes de Yabesh dirent aux Ammonites : Demain nous nous rendrons à vous, et vous nous traiterez comme il vous plaira.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trois bandes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trois têtes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. C''est un dispositif militaire classique, cf. 13.17 ; Jg 7.16+ ; 2S 18.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'intérieur du camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : celui des Ammonites. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la veille du matin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. entre 2 h du matin environ et l''aube, cf. Ex 14.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ammon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est le nom de l''ancêtre éponyme des Ammonites, nom au moyen duquel on pouvait désigner collectivement l''ensemble du peuple (cf. Israël = les Israélites). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'à la chaleur du jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux survivants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui restaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Lv 26.36.
      marker-yv: yv-n
    - type: text
      text: Le lendemain, Saül divisa le peuple en trois bandes. Ils pénétrèrent à l'intérieur du camp pendant la veille du matin et ils battirent Ammon jusqu'à la chaleur du jour. Quant aux survivants, ils se dispersèrent ; il n'en resta pas deux ensemble.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saül confirmé comme roi
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Est-ce Saül qui sera notre roi ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'allusion aux propos des hommes sans morale en 10.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous les mettrons à mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Lc 19.27.'
      marker-yv: yv-n
    - type: text
      text: 'Le peuple dit à Samuel : Qui est-ce qui disait : « Est-ce Saül qui sera notre roi ? » Livrez ces hommes, et nous les mettrons à mort. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On ne mettra personne à mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.45 ; 2S 19.22s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a réalisé une victoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a fait un salut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 3,9 ; 14.45 ; 19.5.'
      marker-yv: yv-n
    - type: text
      text: 'Mais Saül dit : On ne mettra personne à mort en ce jour, car aujourd''hui le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a réalisé une victoire en Israël. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au Guilgal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'confirmer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: renouveler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la contestation dont Saül a été l''objet en 10.27 pouvait justifier une telle cérémonie de confirmation ou renouvellement de la royauté.'
      marker-yv: yv-n
    - type: text
      text: 'Samuel dit au peuple : Venez, rendons-nous au Guilgal pour y confirmer la royauté. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'devant le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie concrètement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au sanctuaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: ' de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: grandes réjouissances
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 16.23.'
      marker-yv: yv-n
    - type: text
      text: 'Tout le peuple se rendit au Guilgal. Là, ils investirent Saül de la royauté devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', au Guilgal. Là, ils offrirent des sacrifices de paix devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; là, Saül et tous les hommes d''Israël se livrèrent à de grandes réjouissances.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'œil droit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''historien juif Flavius '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Josèphe
        - type: text
          text: ' explique que l''œil gauche des guerriers est normalement caché derrière le bouclier (tenu de la main gauche) ; crever l''œil droit d''un soldat, c''est donc le rendre inapte au combat. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un déshonneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un outrage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 17.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 25.39.'
      marker-yv: yv-n
    - type: text
      text: 'Mais Nahash, l''Ammonite, leur répondit : Je la conclurai pour vous à cette condition : je vous crèverai à tous l''œil droit et j''infligerai ainsi un déshonneur à tout Israël. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une trêve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un délai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne peut nous sauver '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne vient à notre secours, ne peut nous donner la victoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous nous rendrons à toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous sortirons (de la ville) vers toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même au v. 10.'
      marker-yv: yv-n
    - type: text
      text: 'Les anciens de Yabesh lui dirent : Accorde-nous une trêve de sept jours, le temps que nous envoyions des messagers dans tout le territoire d''Israël ; si personne ne peut nous sauver, nous nous rendrons à toi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guibéa de Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',26+. La localité, dont le nom signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la colline
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', est ici distinguée d''autres lieux-dits identiques par le nom de son ressortissant le plus illustre. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux oreilles du peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en présence du peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se mit à sangloter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: éleva la voix et pleura
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 24.17 ; Jg 2.4 ; 21.2 ; 2S 3.32 ; 13.36.'
      marker-yv: yv-n
    - type: text
      text: Les messagers arrivèrent à Guibéa de Saül et rapportèrent ces paroles au peuple ; tout le peuple se mit à sangloter.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: derrière ses bœufs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'après le matin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(différence de vocalisation en hébreu). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pleurer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' (même verbe hébreu).'
      marker-yv: yv-n
    - type: text
      text: 'Or Saül arrivait des champs, derrière ses bœufs. Saül dit : Qu''a donc le peuple à pleurer ? On lui rapporta les paroles des gens de Yabesh. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Dieu
      - type: usfm
        marker: ft
