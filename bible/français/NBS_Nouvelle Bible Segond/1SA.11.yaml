document_id: 1SA.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Saül remporte une victoire sur les Ammonites
  - type: text
    content: ' '
  - type: note
    content: 'Un ms de Qumrân porte  : Nahash, roi des Ammonites, opprimait durement les fils de Gad et les fils de Ruben. Il crevait à tous l''œil droit et semait la terreur en Israël. Il ne restait pas un homme parmi les Israélites (de Transjordanie) à qui Nahash, (roi) des Ammonites, n''avait crevé l''œil droit. Seulement sept mille hommes s''enfuirent pour échapper aux Ammonites et se rendirent à Yabesh au Galaad. Or, environ un mois après… (cf. 10.27n). –  Nahash, l''Ammonite  : Nahash était le roi des Ammonites (cf. 12.12 ; 2S 10.1s) ; ce peuple occupait une partie de la Transjordanie (cf. Gn 19.38 ; Dt 23.4 ; Jg 11 ; 2S 10). –  dressa son camp  : cf. Jos 10.5,31,34. –  Yabesh de Galaad  : cf. 31.11-13 ; Jg 21.8-14 ; la région de Galaad, située à l''est du Jourdain, fait partie du territoire israélite. –  Conclus une alliance pour nous  : il s''agit ici d''un accord de reddition et de soumission totale à l''adversaire, pour éviter un conflit armé dont l''issue ne fait pas de doute. –  nous te serons soumis ou nous serons tes esclaves , litt. nous te servirons  ; cf. 2R 17.3 ; 18.31 ; Jn 8.33.'
  - type: text
    content: 'Nahash, l''Ammonite, dressa son camp contre Yabesh de Galaad. Tous les hommes de Yabesh dirent à Nahash : Conclus une alliance pour nous, et nous te serons soumis. '
  '10':
  - type: note
    content: 'aux Ammonites  : probablement sous-entendu dans le texte (cf. v. 3) ; les gens de Yabesh feignent de se rendre en acceptant les conditions imposées par les Ammonites (v. 2) ; LXX précise à Nahash l''Ammonite. Toutefois, on pourrait aussi interpréter le texte comme un message adressé aux Israélites : Demain nous ferons une sortie vers vous (cf. v. 7) et nous nous en remettrons à vous pour la conduite des opérations.'
  - type: text
    content: 'Les hommes de Yabesh dirent aux Ammonites : Demain nous nous rendrons à vous, et vous nous traiterez comme il vous plaira.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'trois bandes  : litt. trois têtes . C''est un dispositif militaire classique, cf. 13.17 ; Jg 7.16+ ; 2S 18.2. –  à l''intérieur du camp  : celui des Ammonites. –  la veille du matin  : c.-à-d. entre 2 h du matin environ et l''aube, cf. Ex 14.24n. –  Ammon est le nom de l''ancêtre éponyme des Ammonites, nom au moyen duquel on pouvait désigner collectivement l''ensemble du peuple (cf. Israël = les Israélites). –  jusqu''à la chaleur du jour  : cf. v. 9. –  aux survivants  : litt. ceux qui restaient  ; cf. Lv 26.36.'
  - type: text
    content: Le lendemain, Saül divisa le peuple en trois bandes. Ils pénétrèrent à l'intérieur du camp pendant la veille du matin et ils battirent Ammon jusqu'à la chaleur du jour. Quant aux survivants, ils se dispersèrent ; il n'en resta pas deux ensemble.
  - type: heading
    content: Saül confirmé comme roi
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Est-ce Saül qui sera notre roi ? allusion aux propos des hommes sans morale en 10.27. –  nous les mettrons à mort  : cf. Lc 19.27.'
  - type: text
    content: 'Le peuple dit à Samuel : Qui est-ce qui disait : « Est-ce Saül qui sera notre roi ? » Livrez ces hommes, et nous les mettrons à mort. '
  '13':
  - type: note
    content: 'On ne mettra personne à mort  : cf. 14.45 ; 2S 19.22s. –  a réalisé une victoire  : litt. a fait un salut  ; cf. v. 3,9 ; 14.45 ; 19.5.'
  - type: text
    content: 'Mais Saül dit : On ne mettra personne à mort en ce jour, car aujourd''hui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a réalisé une victoire en Israël. '
  '14':
  - type: note
    content: 'au Guilgal  : cf. 10.8+. –  confirmer ou renouveler  ; la contestation dont Saül a été l''objet en 10.27 pouvait justifier une telle cérémonie de confirmation ou renouvellement de la royauté.'
  - type: text
    content: 'Samuel dit au peuple : Venez, rendons-nous au Guilgal pour y confirmer la royauté. '
  '15':
  - type: note
    content: 'devant le Seigneur signifie concrètement au sanctuaire. –  sacrifices de paix  : cf. Lv 3. –  grandes réjouissances  : cf. Jg 16.23.'
  - type: text
    content: 'Tout le peuple se rendit au Guilgal. Là, ils investirent Saül de la royauté devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', au Guilgal. Là, ils offrirent des sacrifices de paix devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; là, Saül et tous les hommes d''Israël se livrèrent à de grandes réjouissances.'
  '2':
  - type: note
    content: 'l''œil droit  : l''historien juif Flavius Josèphe explique que l''œil gauche des guerriers est normalement caché derrière le bouclier (tenu de la main gauche) ; crever l''œil droit d''un soldat, c''est donc le rendre inapte au combat. –  un déshonneur  : autre traduction un outrage  ; cf. 17.10n  ; 25.39.'
  - type: text
    content: 'Mais Nahash, l''Ammonite, leur répondit : Je la conclurai pour vous à cette condition : je vous crèverai à tous l''œil droit et j''infligerai ainsi un déshonneur à tout Israël. '
  '3':
  - type: note
    content: 'une trêve ou un délai. –  ne peut nous sauver ou ne vient à notre secours, ne peut nous donner la victoire. –  nous nous rendrons à toi  : litt. nous sortirons (de la ville) vers toi  ; de même au v. 10.'
  - type: text
    content: 'Les anciens de Yabesh lui dirent : Accorde-nous une trêve de sept jours, le temps que nous envoyions des messagers dans tout le territoire d''Israël ; si personne ne peut nous sauver, nous nous rendrons à toi. '
  '4':
  - type: note
    content: 'Guibéa de Saül  : cf. 10.5n,26+. La localité, dont le nom signifie la colline, est ici distinguée d''autres lieux-dits identiques par le nom de son ressortissant le plus illustre. –  au peuple  : litt. aux oreilles du peuple  ; autre traduction en présence du peuple. –  se mit à sangloter  : litt. éleva la voix et pleura  ; cf. 24.17 ; Jg 2.4 ; 21.2 ; 2S 3.32 ; 13.36.'
  - type: text
    content: Les messagers arrivèrent à Guibéa de Saül et rapportèrent ces paroles au peuple ; tout le peuple se mit à sangloter.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'derrière ses bœufs  : LXX après le matin (différence de vocalisation en hébreu). –  pleurer  : cf. v. 4n (même verbe hébreu).'
  - type: text
    content: 'Or Saül arrivait des champs, derrière ses bœufs. Saül dit : Qu''a donc le peuple à pleurer ? On lui rapporta les paroles des gens de Yabesh. '
  '6':
  - type: note
    content: 'Le souffle (ou Esprit) de Dieu  : quelques mss hébreux et des versions anciennes disent le souffle de YHWH (ou du Seigneur) ; cf. Jg 3.10+. –  s''empara  : cf. 10.6n. –  se mit dans une grande colère  : même expression en Nb 11.10 ; Jg 2.14+ ; cf. 1S 18.8 ; 2S 12.5 ; Est 3.5 ; 2Ch 25.10.'
  - type: text
    content: 'Le souffle de Dieu s''empara de Saül quand il entendit ces paroles ; il se mit dans une grande colère. '
  '7':
  - type: note
    content: 'les coupa en morceaux  : cf. Jg 19.29. –  ne se mettra pas en campagne  : litt. ne sortira pas, de même à la fin du v. ; cf. 8.20n. –  La frayeur du Seigneur  : même expression en Es 2.10,19,21 ; 2Ch 14.13+ ; 17.10 ; 19.7 ; cf. 1S 14.15 (autre terme hébreu) ; Gn 35.5 ; Jb 13.11 ; voir crainte. –  s''abattit  : litt. tomba. –  comme un seul homme Jg 20.1.'
  - type: text
    content: 'Il prit une paire de bœufs et les coupa en morceaux, qu''il envoya par l''intermédiaire des messagers dans tout le territoire d''Israël, en disant : Quiconque ne se mettra pas en campagne derrière Saül et Samuel, ses bœufs seront traités de la même manière. La frayeur du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''abattit sur le peuple, qui se mit en campagne comme un seul homme. '
  '8':
  - type: note
    content: 'passa en revue  : cf. 13.15. –  Bézeq  : localité située entre Sichem et Beth-Shéân, à 20 km environ de Yabesh ; le Bézeq de Jg 1.4s pourrait être une autre localité. –  Les Israélites sont les ressortissants des dix tribus du Nord, d''où leur nombre dix fois plus élevé que celui des hommes de Juda.'
  - type: text
    content: 'Saül les passa en revue à Bézeq. Les Israélites étaient trois cent mille et les hommes de Juda étaient trente mille. '
  '9':
  - type: note
    content: 'Ils dirent  : LXX il (Saül) dit. –  à la population  : litt. à l''homme, employé dans un sens collectif. –  la victoire ou le salut, la délivrance  ; cf. v. 3,13+. –  quand le soleil…  : à la mi-journée.'
  - type: text
    content: 'Ils dirent aux messagers qui étaient venus : Vous direz ceci à la population de Yabesh de Galaad : « Demain vous aurez la victoire, quand le soleil commencera à chauffer. » Les messagers vinrent annoncer cette nouvelle aux hommes de Yabesh, qui s''en réjouirent. '
