document_id: PSA.109,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un accusé fait appel à l'intervention de Dieu
  - type: text
    content: ' '
  - type: note
    content: Dieu de ma louange Dt 10.21n  ; Jr 17.14. –  ne garde pas le silence 28.1+.
  - type: text
    content: Du chef de chœur. De David. Psaume.
  - type: text
    content: Dieu de ma louange, ne garde pas le silence !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'ses fils… Jb 20.10 ; Ec 5.13. –  qu''ils aillent quémander  : LXX qu''on les chasse. –  loin des ruines…  : litt. de(puis) leurs ruines.'
  - type: text
    content: Que ses fils soient vagabonds et qu'ils mendient,
  - type: text
    content: qu'ils aillent quémander loin des ruines de leur demeure !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Jb 5.5 ; 20.18. –  le produit de son travail  : litt. sa fatigue , c.-à-d. ce pour quoi il s''est fatigué  ; cf. 78.46 ; 128.2 ; Gn 31.42n.'
  - type: text
    content: Que le créancier jette le filet sur tout ce qui lui appartient,
  - type: text
    content: et que les étrangers pillent le produit de son travail !
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Hé 10.28.
  - type: text
    content: Que personne ne lui conserve sa fidélité,
  - type: text
    content: que personne ne fasse grâce à ses orphelins !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'ses descendants ou son avenir  ; 37.28. –  leur nom  : plusieurs mss hébreux et des versions anciennes ont lu son nom  ; cf. Jb 18.17ss ; Pr 10.7 ; Siracide 41.11 : « Le nom des pécheurs n''est pas bon, il sera effacé. »'
  - type: text
    content: Que ses descendants soient retranchés,
  - type: text
    content: et que leur nom soit effacé dans la génération suivante !
  '14':
  - type: text
    content: ' '
  - type: note
    content: Jr 18.23 ; cf. Ex 20.5s. –  soit évoquée ou soit rappelée, reste en souvenir  ; cf. v. 15s ; Nb 5.15 ; 2S 19.20 ; Ez 3.20.
  - type: text
    content: 'Que la faute de ses pères soit évoquée devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et que le péché de sa mère ne soit pas effacé !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''ils soient constamment présents  : il s''agit vraisemblablement du péché et de la faute mentionnés au v. 14 ; cf. Lm 1.22. –  qu''il retranche… 34.17+.'
  - type: text
    content: 'Qu''ils soient constamment présents devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et qu'il retranche de la terre leur souvenir,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'cet homme  : sous-entendu dans le texte. –  ne s''est pas souvenu d''agir…  : autre traduction n''a pas pensé à agir…  ; cf. v. 14s. –  persécuté ou poursuivi , 7.2n. –  pauvre / déshérité  : cf. v. 22 ; 9.13n. –  jusqu''à faire mourir…  : Syr l''homme au cœur brisé jusqu''à la mort  ; cf. Jon 4.9 ; voir aussi Ps 34.19 ; Ac 2.37n.'
  - type: text
    content: parce que cet homme ne s'est pas souvenu d'agir avec fidélité,
  - type: text
    content: parce qu'il a persécuté le pauvre et le déshérité,
  - type: text
    content: jusqu'à faire mourir l'homme au cœur brisé !
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 59.13 ; Jr 2.19 ; Ez 35.6 ; Jc 2.13.
  - type: text
    content: 'Il aimait la malédiction : qu''elle vienne sur lui !'
  - type: text
    content: 'Il ne se plaisait pas à la bénédiction : qu''elle s''éloigne de lui !'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'comme de l''eau  : cf. 26.6 ; 73.13 ; Nb 5.22. –  huile  : cf. 23.5 ; 92.11.'
  - type: text
    content: Qu'il se revête de la malédiction comme d'une tunique,
  - type: text
    content: qu'elle pénètre au dedans de lui comme de l'eau,
  - type: text
    content: comme de l'huile dans ses os !
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 29 ; 73.6.
  - type: text
    content: Qu'elle soit comme le vêtement dont il s'enveloppe,
  - type: text
    content: et la ceinture qu'il porte constamment !
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.10+ ; 38.13 ; 52.4ss ; 120.2.
  - type: text
    content: Car ils ouvrent contre moi une bouche méchante, une bouche trompeuse ;
  - type: text
    content: s'ils parlent avec moi, leur langue est menteuse,
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Telle sera…  : autre traduction voilà l''œuvre (même terme en 28.5) de mes accusateurs auprès du Seigneur , ce que certains comprennent au sens de voilà leurs accusations (v. 6n,28 ; cf. 2R 19.14ss) ; cf. Ps 35.1,4 ; 69.23 ; voir aussi Es 17.14 ; Jb 5.27. –  de moi ou contre moi.'
  - type: text
    content: 'Telle sera, de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ', la rétribution de mes adversaires'
  - type: text
    content: et de ceux qui disent du mal de moi !
  '21':
  - type: text
    content: ' '
  - type: note
    content: à cause de ton nom 23.3+. –  car ta fidélité… 69.17 ; Tg selon la bonté de ta fidélité.
  - type: text
    content: 'Mais toi, '
  - type: text
    content: Dieu
  - type: text
    content: ', Seigneur,'
  - type: text
    content: agis en ma faveur à cause de ton nom,
  - type: text
    content: car ta fidélité est bonté ; délivre-moi !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'pauvre et déshérité v. 16+ ; 40.18 ; 69.30 ; 86.1 ; 88.16 ; 140.13. –  blessé  : litt. transpercé  ; autre traduction, d''après LXX et Syr  : troublé  ; cf. 55.5 ; 143.4.'
  - type: text
    content: Je suis pauvre et déshérité,
  - type: text
    content: et mon cœur est blessé au dedans de moi.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'comme l''ombre…  : les ombres du soir s''allongent avant de s''évanouir dans la nuit ; cf. 102.12+ ; 144.4 ; Jr 6.4 ; Jb 8.9. –  on me secoue… pour se débarrasser de moi ; cf. 136.15 (même verbe, à une autre forme) ; Ex 14.27n  ; Né 5.13.'
  - type: text
    content: Je m'en vais comme l'ombre qui s'allonge,
  - type: text
    content: on me secoue comme le criquet.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'jeûne 35.13. –  mon corps  : litt. ma chair . –  de maigreur  : autre traduction faute d''huile.'
  - type: text
    content: Mes genoux me font trébucher, à cause du jeûne,
  - type: text
    content: mon corps est épuisé de maigreur.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis exposé…  : autre traduction je suis devenu pour eux un déshonneur , 22.8+ ; Mc 15.29/ /. –  hochent la tête Jr 18.16n (autre verbe).'
  - type: text
    content: Je suis exposé à leurs outrages ;
  - type: text
    content: ils hochent la tête en me regardant.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. 6.5 ; 22.20 ; 70.2.
  - type: text
    content: 'Secours-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu,'
  - type: text
    content: sauve-moi selon ta fidélité !
  '27':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ac 4.28. –  Qu'ils sachent 59.14n.
  - type: text
    content: Qu'ils sachent que c'est ta main,
  - type: text
    content: 'que c''est toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui as fait cela !'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Eux maudissent / tu béniras  : cf. Nb 23.11 ; 24.10 ; Mt 5.11 ; Rm 8.33ss ; 1Co 4.12. –  s''ils se lèvent…  : LXX ceux qui se dressent contre moi seront honteux.'
  - type: text
    content: Eux maudissent, mais toi, tu béniras ;
  - type: text
    content: s'ils se lèvent, ils seront honteux,
  - type: text
    content: et moi, ton serviteur, je me réjouirai.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 19 ; 71.13+.
  - type: text
    content: Que mes adversaires se revêtent de confusion,
  - type: text
    content: qu'ils s'enveloppent de leur honte comme d'un manteau !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 3.7. –  sans raison 69.5.
  - type: text
    content: ils m'entourent de paroles haineuses
  - type: text
    content: et ils me font la guerre sans raison.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 33.3 ; 71.14.
  - type: text
    content: 'Je célébrerai le '
  - type: text
    content: Seigneur
  - type: text
    content: ' à pleine voix,'
  - type: text
    content: je le louerai au milieu de la multitude ;
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'à la droite  : cf. v. 6 ; 16.8 ; 110.5 ; 121.5. –  du pauvre v. 16,22. –  qui le jugent  ; ou, selon certains mss et LXX, qui me jugent  ; cf. 7.2 ; 31.16.'
  - type: text
    content: car il se tient à la droite du pauvre,
  - type: text
    content: pour le sauver de ceux qui le jugent.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ils s''opposent à moi ou ils m''accusent, ils sont mes adversaires  ; cf. v. 6n,20,29 ; 38.21n  ; 71.13. –  moi, je recours à la prière  : texte incertain, litt. moi, prière  ; on pourrait comprendre je priais pour eux  ; cf. 69.14.'
  - type: text
    content: Bien que je les aime, ils s'opposent à moi ;
  - type: text
    content: moi, je recours à la prière.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 35.12 ; Gn 44.4.
  - type: text
    content: Ils me rendent le mal pour le bien
  - type: text
    content: et la haine pour mon amour.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 6-19 rapportent peut-être les malédictions des adversaires (v. 2-5,20,28s ; cf. 7.4ss,17) contre le juste, à moins qu''ils ne visent un des adversaires en particulier ; voir aussi 58.7ss ; 69.23ss ; 83.10ss. –  Confie-le…  : en modifiant la vocalisation traditionnelle du texte hébreu, on pourrait lire fais-lui rendre compte pour (sa) méchanceté . –  un adversaire  : en hébreu un satan  ; cf. v. 4n,20,29 ; 1R 11.14 ; Za 3.1n  ; Jb 1.6n  ; Ap 12.10. –  à sa droite  : cf. v. 31 ; Za 3.1 ; Jb 30.12.'
  - type: text
    content: Confie-le à un méchant,
  - type: text
    content: qu'un adversaire se tienne à sa droite !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Quand il sera jugé 9.20n. –  qu''il soit condamné  : litt. qu''il sorte (déclaré) méchant  ; cf. Dt 25.1n  ; Jb 9.20n  ; voir juste. –  que sa prière…  : cf. v. 1-5,21ss ; Pr 28.9.'
  - type: text
    content: Quand il sera jugé, qu'il soit condamné,
  - type: text
    content: et que sa prière passe pour un péché !
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ac 1.20.
  - type: text
    content: Que ses jours soient peu nombreux,
  - type: text
    content: qu'un autre prenne sa charge !
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ex 22.23 ; Jr 18.21.
  - type: text
    content: Que ses fils deviennent orphelins
  - type: text
    content: et sa femme veuve !
