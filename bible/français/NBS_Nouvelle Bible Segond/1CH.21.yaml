document_id: 1CH.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David fait recenser le peuple d'Israël
  - type: heading
    content: 2S 24.1-9
  - type: text
    content: ' '
  - type: note
    content: 'L''Adversaire  : le mot hébreu correspondant ( Satân ) est ici employé sans article : on peut le comprendre comme un nom propre (= Satan ) ou éventuellement traduire un adversaire , cf. 1R 5.18 ; 11.14,23,25 ; voir Za 3.1n  ; Jb 1.6n  ; voir aussi démon.'
  - type: text
    content: 'L''Adversaire se dressa contre Israël : il incita David à dénombrer Israël. '
  '10':
  - type: note
    content: 'Je te donne le choix  : litt. je tends sur toi ou pour toi.'
  - type: text
    content: 'Va dire à David : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je te donne le choix entre trois choses ; choisis-en une, et je la ferai pour toi. '
  '11':
  - type: text
    content: 'Gad arriva chez David et lui dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Accepte, '
  '12':
  - type: note
    content: 'trois années  : 2S 24.13 sept années. –  l''épée du Seigneur et le messager (ou l''ange) du Seigneur ne figurent pas en 2S 24.13 ; les Chroniques les mentionnent pour bien montrer que la peste n''est pas une simple catastrophe naturelle, mais un châtiment expressément voulu par Dieu.'
  - type: text
    content: 'ou bien trois années de famine, ou bien trois mois de défaite devant tes adversaires, pendant lesquels l''épée de tes ennemis t''atteindra, ou bien trois jours avec l''épée du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et la peste dans le pays, et le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui portera la destruction dans tout le territoire d''Israël. Vois maintenant ce que je dois répondre à celui qui m''envoie. '
  '13':
  - type: note
    content: 'immense  : litt. très abondante, cf. 2S 24.14.'
  - type: text
    content: 'David répondit à Gad : Je suis dans une grande détresse ! Que je tombe aux mains du '
  - type: text
    content: Seigneur
  - type: text
    content: ', car sa compassion est immense ; mais que je ne tombe pas aux mains des hommes ! '
  '14':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit venir la peste en Israël, et il tomba soixante-dix mille hommes d''Israël.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Ornân  : cf. 2S 24.16nss ( Aravna ).'
  - type: text
    content: 'Dieu envoya un messager à Jérusalem pour la détruire ; comme il détruisait, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' regarda et il regretta ce malheur. Il dit au messager destructeur : Cela suffit ! Arrête maintenant. Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se tenait près de l''aire d''Ornân, le Jébusite. '
  '16':
  - type: note
    content: 'entre la terre et le ciel, son épée tirée  : ces détails ne figurent pas dans 2S 24. L''expression entre la terre et le ciel (aussi en Za 5.9) exprime peut-être le rôle d''intermédiaire du messager, entre le monde divin et le monde humain. L’épée peut rappeler celle des keroubim de Gn 3.24 ; cf. Ex 12.12s ; Nb 22.23,31 ; Jos 5.13.'
  - type: text
    content: 'David leva les yeux et vit le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui se tenait entre la terre et le ciel, son épée tirée, tendue au-dessus de Jérusalem. Alors David et les anciens, couverts d''un sac, tombèrent face contre terre. '
  '17':
  - type: note
    content: Les Chroniques développent la prière succincte de 2S 24.17. –  C'est moi qui ai péché Jos 7.20.
  - type: text
    content: 'David dit à Dieu : N''est-ce pas moi qui ai dit de dénombrer le peuple ? C''est moi qui ai péché et qui ai fait du mal ; mais ce troupeau, qu''a-t-il fait ? '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, que ta main soit donc sur moi et sur ma famille, je t''en prie, et qu''elle n''inflige pas un fléau à ton peuple !'
  - type: heading
    content: David bâtit un autel pour le Seigneur
  - type: heading
    content: 2S 24.18-25
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'messager  : voir ange.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit à Gad de parler à David, afin que David monte pour élever un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur l''aire d''Ornân, le Jébusite. '
  '19':
  - type: text
    content: 'David monta, par la parole que Gad avait dite au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '2':
  - type: note
    content: Les princes du peuple étaient probablement de hauts fonctionnaires de l'administration civile ; les Chroniques insistent moins que l'auteur de Samuel sur l'aspect militaire de l'opération.
  - type: text
    content: 'David dit à Joab et aux princes du peuple : Allez, comptez Israël, depuis Bersabée jusqu''à Dan, et faites-moi un rapport. Ainsi je connaîtrai leur nombre. '
  '20':
  - type: note
    content: 'Ce verset n''a pas d''équivalent dans 2S 24. –  Ses quatre fils…  : autre traduction ses quatre fils se cachèrent avec lui. –  fouler  : autre traduction dépiquer (opération qui consiste à séparer le grain de son enveloppe, en faisant passer sur les épis l''instrument appelé traîneau à dépiquer au v. 23).'
  - type: text
    content: 'Ornân se retourna et vit le messager. Ses quatre fils, qui étaient avec lui, se cachèrent ; Ornân était en train de fouler du froment. '
  '21':
  - type: text
    content: 'Lorsque David arriva auprès d''Ornân, Ornân regarda et vit David ; il sortit de l''aire et se prosterna devant David, face contre terre. '
  '22':
  - type: text
    content: 'David dit à Ornân : Donne-moi ce lieu, cette aire, afin que j''y bâtisse un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; donne-le-moi contre sa pleine valeur en argent, pour que le fléau qui frappe le peuple s''arrête. '
  '23':
  - type: note
    content: 'et le froment pour l''offrande végétale  : les mots correspondants ne figurent pas en 2S 24 ; on reconnaît dans cette précision le souci liturgique et cultuel des Chroniques ; voir sacrifices.'
  - type: text
    content: 'Ornân répondit à David : Prends-le et fais ce qui te plaira, ô roi, mon seigneur ; regarde, je donne les bœufs pour les holocaustes, le traîneau à dépiquer pour le bois, et le froment pour l''offrande végétale, je donne tout cela. '
  '24':
  - type: text
    content: 'Mais le roi David dit à Ornân : Non ! Je l''achèterai contre sa pleine valeur en argent ; je n''offrirai pas au '
  - type: text
    content: Seigneur
  - type: text
    content: ' un holocauste qui ne coûte rien, en lui apportant ce qui t''appartient ! '
  '25':
  - type: note
    content: 'de l''or pour un poids de six cents sicles (environ 6 kg, voir mesures) : cette somme, très supérieure aux cinquante sicles d''argent versés en 2S 24.24 pour l''aire et les bœufs, souligne l''importance que David accorde à ce terrain.'
  - type: text
    content: 'David donna à Ornân, pour ce lieu, de l''or pour un poids de six cents sicles. '
  '26':
  - type: note
    content: 'Alors qu''en 2S 24.25 le récit se conclut par la simple mention de la fin du fléau, les Chroniques développent dans les v. 26-30 et 22.1 la perspective cultuelle de la future édification du sanctuaire et de l''autel du Seigneur. –  il invoqua le Seigneur  : cf. Gn 26.25 ; Jg 15.18 ; 1S 12.18 ; 1R 18.24. –  lui répondit en faisant venir un feu  : cf. Lv 9.24 ; 1R 18.24,38 ; 2Ch 7.1. – A la fin du verset, LXX ajoute où il consuma (ou dévora) l''holocauste.'
  - type: text
    content: 'David bâtit là un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il offrit des holocaustes et des sacrifices de paix, et il invoqua le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui lui répondit en faisant venir un feu du ciel sur l''autel de l''holocauste.'
  '27':
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parla au messager, qui remit son épée au fourreau. '
  '28':
  - type: text
    content: 'En ce temps-là, David, ayant vu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait répondu sur l''aire d''Ornân, le Jébusite, y offrit des sacrifices. '
  '29':
  - type: note
    content: 'La demeure du Seigneur est souvent appelée la tente de la Rencontre. –  le haut lieu de Gabaon  : cf. 16.39+.'
  - type: text
    content: 'La demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: ' que Moïse avait faite au désert et l''autel des holocaustes étaient en ce temps-là dans le haut lieu de Gabaon. '
  '3':
  - type: note
    content: Pourquoi Israël se mettrait-il en tort ? par ces mots, absents de 2S 24.3, les Chroniques déclarent explicitement qu'il s'agit d'une faute (cf. v. 7 ; 2S 24.10).
  - type: text
    content: 'Joab répondit : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rende ton peuple cent fois plus nombreux ! O roi, mon seigneur, ne sont-ils pas tous tes serviteurs ? Mais pourquoi demandes-tu cela ? Pourquoi Israël se mettrait-il en tort ? '
  '30':
  - type: note
    content: 'ne pouvait pas ou n''avait pas pu. –  chercher Dieu  : autre traduction consulter Dieu. –  effroi  : voir crainte.'
  - type: text
    content: 'Mais David ne pouvait pas y aller pour chercher Dieu, parce qu''il était rempli d''effroi à cause de l''épée du messager du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: note
    content: Les chefs de l'armée, qui figurent deux fois en 2S 24.4, ne sont pas mentionnés dans les Chroniques, qui laissent également de côté le détail de l'itinéraire (2S 24.5-8).
  - type: text
    content: 'Mais la parole du roi s''imposa à Joab ; Joab sortit donc et parcourut tout Israël ; puis il revint à Jérusalem. '
  '5':
  - type: note
    content: 'onze cent mille / quatre cent soixante-dix mille  : 2S 24.9 huit cent mille / cinq cent mille.'
  - type: text
    content: 'Joab remit à David le chiffre du recensement du peuple : il y avait dans tout Israël onze cent mille hommes tirant l''épée, et en Juda quatre cent soixante-dix mille hommes tirant l''épée. '
  '6':
  - type: note
    content: Ce verset n'a pas d'équivalent dans 2S 24. Les Chroniques soulignent ainsi, à leur manière, la faute de David.
  - type: text
    content: 'Il ne recensa parmi eux ni Lévi ni Benjamin, car Joab avait en abomination l''ordre du roi. '
  '7':
  - type: note
    content: Cette information est absente de 2S 24.
  - type: text
    content: Cet ordre déplut à Dieu, et il frappa Israël.
  - type: heading
    content: Dieu punit la faute de David
  - type: heading
    content: 2S 24.10-17
  '8':
  - type: text
    content: 'David dit à Dieu : J''ai commis un grand péché en faisant cela ! Maintenant, pardonne, je te prie, la faute que j''ai commise, moi, ton serviteur, car j''ai agi tout à fait stupidement.'
  '9':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Gad, le visionnaire de David : '
