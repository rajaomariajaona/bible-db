document_id: 1CH.21,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David fait recenser le peuple d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 24.1-9
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: L'Adversaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot hébreu correspondant ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Satân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') est ici employé sans article : on peut le comprendre comme un nom propre (= '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Satan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ou éventuellement traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un adversaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1R 5.18 ; 11.14,23,25 ; voir Za 3.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jb 1.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: démon
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'L''Adversaire se dressa contre Israël : il incita David à dénombrer Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je te donne le choix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je tends sur toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour toi.
      marker-yv: yv-n
    - type: text
      text: 'Va dire à David : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Je te donne le choix entre trois choses ; choisis-en une, et je la ferai pour toi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gad arriva chez David et lui dit : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Accepte, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trois années
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 24.13 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sept années
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''épée du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le messager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ne figurent pas en 2S 24.13 ; les Chroniques les mentionnent pour bien montrer que '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la peste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'n''est pas une simple '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: catastrophe naturelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais un châtiment expressément voulu par Dieu.'
      marker-yv: yv-n
    - type: text
      text: 'ou bien trois années de famine, ou bien trois mois de défaite devant tes adversaires, pendant lesquels l''épée de tes ennemis t''atteindra, ou bien trois jours avec l''épée du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et la peste dans le pays, et le messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui portera la destruction dans tout le territoire d''Israël. Vois maintenant ce que je dois répondre à celui qui m''envoie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: immense
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: très abondante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2S 24.14.'
      marker-yv: yv-n
    - type: text
      text: 'David répondit à Gad : Je suis dans une grande détresse ! Que je tombe aux mains du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', car sa compassion est immense ; mais que je ne tombe pas aux mains des hommes ! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit venir la peste en Israël, et il tomba soixante-dix mille hommes d''Israël.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ornân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2S 24.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Aravna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Dieu envoya un messager à Jérusalem pour la détruire ; comme il détruisait, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' regarda et il regretta ce malheur. Il dit au messager destructeur : Cela suffit ! Arrête maintenant. Le messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' se tenait près de l''aire d''Ornân, le Jébusite. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: entre la terre et le ciel, son épée tirée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ces détails ne figurent pas dans 2S 24. L''expression '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'entre la terre et le ciel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(aussi en Za 5.9) exprime peut-être le rôle d''intermédiaire du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: messager
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', entre le monde divin et le monde humain. L’'
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'épée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: peut rappeler celle des keroubim de Gn 3.24 ; cf. Ex 12.12s ; Nb 22.23,31 ; Jos 5.13.
      marker-yv: yv-n
    - type: text
      text: 'David leva les yeux et vit le messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui se tenait entre la terre et le ciel, son épée tirée, tendue au-dessus de Jérusalem. Alors David et les anciens, couverts d''un sac, tombèrent face contre terre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les Chroniques développent la prière succincte de 2S 24.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est moi qui ai '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 7.20.
      marker-yv: yv-n
    - type: text
      text: 'David dit à Dieu : N''est-ce pas moi qui ai dit de dénombrer le peuple ? C''est moi qui ai péché et qui ai fait du mal ; mais ce troupeau, qu''a-t-il fait ? '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', mon Dieu, que ta main soit donc sur moi et sur ma famille, je t''en prie, et qu''elle n''inflige pas un fléau à ton peuple !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'David bâtit un autel pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 24.18-25
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: messager
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait dit à Gad de parler à David, afin que David monte pour élever un autel pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' sur l''aire d''Ornân, le Jébusite. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David monta, par la parole que Gad avait dite au nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'princes du peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient probablement de hauts fonctionnaires de l'administration civile ; les Chroniques insistent moins que l'auteur de Samuel sur l'aspect militaire de l'opération.
      marker-yv: yv-n
    - type: text
      text: 'David dit à Joab et aux princes du peuple : Allez, comptez Israël, depuis Bersabée jusqu''à Dan, et faites-moi un rapport. Ainsi je connaîtrai leur nombre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce verset n''a pas d''équivalent dans 2S 24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ses quatre fils…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses quatre fils se cachèrent avec lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fouler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dépiquer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(opération qui consiste à séparer le grain de son enveloppe, en faisant passer sur les épis l''instrument appelé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'traîneau à dépiquer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 23).
      marker-yv: yv-n
    - type: text
      text: 'Ornân se retourna et vit le messager. Ses quatre fils, qui étaient avec lui, se cachèrent ; Ornân était en train de fouler du froment. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque David arriva auprès d''Ornân, Ornân regarda et vit David ; il sortit de l''aire et se prosterna devant David, face contre terre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit à Ornân : Donne-moi ce lieu, cette aire, afin que j''y bâtisse un autel pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; donne-le-moi contre sa pleine valeur en argent, pour que le fléau qui frappe le peuple s''arrête. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et le froment pour l'offrande végétale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les mots correspondants ne figurent pas en 2S 24 ; on reconnaît dans cette précision le souci liturgique et cultuel des Chroniques ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ornân répondit à David : Prends-le et fais ce qui te plaira, ô roi, mon seigneur ; regarde, je donne les bœufs pour les holocaustes, le traîneau à dépiquer pour le bois, et le froment pour l''offrande végétale, je donne tout cela. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le roi David dit à Ornân : Non ! Je l''achèterai contre sa pleine valeur en argent ; je n''offrirai pas au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' un holocauste qui ne coûte rien, en lui apportant ce qui t''appartient ! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de l''or pour un poids de six cents sicles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(environ 6 kg, voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ') : cette somme, très supérieure aux '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cinquante sicles d''argent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'versés en 2S 24.24 pour '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'aire et les bœufs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', souligne l''importance que David accorde à ce terrain.'
      marker-yv: yv-n
    - type: text
      text: 'David donna à Ornân, pour ce lieu, de l''or pour un poids de six cents sicles. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Alors qu''en 2S 24.25 le récit se conclut par la simple mention de la fin du fléau, les Chroniques développent dans les v. 26-30 et 22.1 la perspective cultuelle de la future édification du sanctuaire et de l''autel du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il invoqua le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 26.25 ; Jg 15.18 ; 1S 12.18 ; 1R 18.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui répondit en faisant venir un feu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 9.24 ; 1R 18.24,38 ; 2Ch 7.1. – A la fin du verset, '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'où il consuma '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dévora
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'holocauste.
      marker-yv: yv-n
    - type: text
      text: 'David bâtit là un autel pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; il offrit des holocaustes et des sacrifices de paix, et il invoqua le '
    - type: usfm
      marker: nd
      children:
      - type: text
