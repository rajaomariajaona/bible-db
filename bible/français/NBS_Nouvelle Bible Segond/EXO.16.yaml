        children:
        - type: text
          text: '16.20ss : « A l''opposé (du fléau de la grêle, Ex 9.13-35), tu as distribué à ton peuple une nourriture d''anges, tu lui as procuré du ciel, sans effort de sa part, un pain tout préparé, ayant la capacité de toute saveur et adapté à tous les goûts. La substance que tu donnais manifestait ta douceur pour tes enfants, mais elle se pliait au désir de celui qui la consommait en se modifiant au gré de chacun. Neige et glace (cf. v. 14) résistaient au feu et ne fondaient pas, pour faire savoir que les récoltes des ennemis avaient été détruites par le feu qui flambait dans la grêle et lançait des éclairs au milieu de la pluie. Ce même feu, en revanche, pour permettre aux justes de se nourrir, oubliait même son pouvoir propre. La création, docile à te servir, toi, son Auteur, se tend pour le châtiment des injustes, mais se détend pour le bien de ceux qui se sont confiés en toi. Et c''est ainsi qu''en se prêtant à tout changement, elle était au service de ce don venu de toi et qui devenait toute nourriture au gré de ceux qui le demandaient. Par là, tes fils que tu as aimés, Seigneur, devaient apprendre que ce n''est pas la production de fruits qui nourrit l''homme, mais bien ta parole qui fait subsister ceux qui croient en toi. » – Voir '
