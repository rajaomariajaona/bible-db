document_id: EXO.16,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La manne et les cailles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'partit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – On a rapproché les noms '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sîn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sinaï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de celui d'un dieu lunaire vénéré en Mésopotamie et en Arabie, mais la chose est incertaine. Le nom Sinaï désigne probablement le massif montagneux situé dans le sud de la péninsule dite du Sinaï, entre le golfe d'Aqaba et le golfe de Suez. On a identifié le mont Sinaï de la Bible au djebel Serbal, et surtout au djebel Moussa (= mont Moïse), plus au sud. Nb 33.9-11 mentionne une étape de plus, au bord de la mer des Joncs.
      marker-yv: yv-n
    - type: text
      text: 'Toute la communauté des Israélites partit d''Elim ; ils arrivèrent au désert de Sîn, qui est entre Elim et le Sinaï, le quinzième jour du deuxième mois à compter de leur sortie d''Egypte. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vers le désert
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : du point de vue du pays d''Israël, cette expression pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers le sud '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vers l'est.
      marker-yv: yv-n
    - type: text
      text: 'Tandis qu''Aaron parlait à toute la communauté des Israélites, ils se tournèrent vers le désert, et la gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' apparut dans la nuée.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: A la tombée du soir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 12.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'J''ai entendu les Israélites maugréer. Dis-leur : A la tombée du soir vous mangerez de la viande, et au matin vous vous rassasierez de pain ; ainsi vous saurez que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), votre Dieu.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cailles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nb 11 ; Ps 78.26-31 ; 105.40 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.2 : « Au lieu de ce châtiment (le fléau des grenouilles, 7.26–8.11), tu as accordé un bienfait à ton peuple : pour satisfaire l''ardeur de son appétit, c''est une nourriture à la saveur merveilleuse, des cailles, que tu lui as préparée. »'
      marker-yv: yv-n
    - type: text
      text: 'Le soir, des cailles montèrent et couvrirent le camp ; et au matin il y eut autour du camp une couche de rosée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le désert était recouvert de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur la face du désert
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: granuleux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot ainsi traduit n''apparaît qu''ici dans l''A.T. LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: blanc comme de la graine de coriandre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 31 ; Nb 11.7. – Cf. v. 4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand cette couche de rosée se leva, le désert était recouvert de quelque chose de menu, de granuleux – quelque chose de menu, comme le givre sur la terre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qu''est-ce que c''est ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mân hou’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. C''est le premier terme, araméen, de cette interrogation qui est rapproché du terme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'manne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 31), nom encore donné, en arabe, à la sécrétion sucrée de certains insectes qui vivent notamment sur les tamaris, dans le désert.'
      marker-yv: yv-n
    - type: text
      text: 'Les Israélites regardèrent et se dirent l''un à l''autre : Qu''est-ce que c''est ? – Car ils ne savaient pas ce que c''était. Moïse leur dit : C''est le pain que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' vous donne à manger. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un omer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 2 l (voir v. 36 et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Voici ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a ordonné : que chacun en recueille ce dont il a besoin, un omer par tête, selon le nombre de personnes à nourrir ; chacun en prendra pour ceux qui sont dans sa tente. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Les Israélites firent ainsi ; ils en recueillirent les uns plus, les autres moins. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.18 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 2Co 8.15.
      marker-yv: yv-n
    - type: text
      text: On mesurait ensuite avec l'omer ; celui qui en avait plus n'avait rien de trop, celui qui en avait moins n'en manquait pas. Chacun recueillait ce dont il avait besoin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles diverses concernant la manne
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Moïse leur dit : Que personne n''en laisse jusqu''au matin. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Aaron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors toute la communauté des Israélites se mit à maugréer, dans le désert, contre Moïse et Aaron. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais ils n''écoutèrent pas Moïse : il y eut des gens qui en laissèrent jusqu''au matin ; il s''y mit des vers, et cela devint une puanteur. Moïse s''irrita contre ces gens. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tous les matins, chacun recueillait ce dont il avait besoin ; et quand le soleil commençait à chauffer, cela fondait.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour chacun
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au lieu d'un
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le sixième jour, ils en recueillirent le double, deux omers pour chacun. Tous les princes de la communauté vinrent le dire à Moïse. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un repos '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbatique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shabbatôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme dérivé du mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'shabbath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sabbat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) et qui désigne un jour complètement chômé (cf. 31.15 ; 35.2 ; Lv 16.31
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 23.3). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'consacré au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 28.36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en réserve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la même formule est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'conservé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 32-34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse leur répondit : C''est ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit. Demain, c''est un repos sabbatique, un sabbat consacré au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; faites cuire ce que vous avez à faire cuire, faites bouillir ce que vous avez à faire bouillir, et tout le surplus, laissez-le en réserve jusqu''au matin. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ils le laissèrent jusqu''au matin, comme Moïse l''avait ordonné ; cela ne devint pas une puanteur, on n''y trouva pas de vers. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hors du camp.
      marker-yv: yv-n
    - type: text
      text: 'Moïse dit : Mangez-le aujourd''hui ; car aujourd''hui, c''est un sabbat pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; aujourd''hui, vous n''en trouverez pas dans la campagne. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le sabbat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un sabbat.
      marker-yv: yv-n
    - type: text
      text: Pendant six jours vous en recueillerez ; mais le septième jour, c'est le sabbat ; il n'y en aura pas.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le septième jour, des gens sortirent pour en recueillir, mais ils n''en trouvèrent pas. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: lois
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Jusqu''à quand refuserez-vous d''observer mes commandements et mes lois ? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sabbat '
      - type: usfm
        marker: ft
        children:
        - type: text
