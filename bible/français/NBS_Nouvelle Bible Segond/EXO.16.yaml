          text: '  ; voir aussi Mt 6.11. – Sur l''ensemble, voir Nb 11.1-9 ; Dt 8.3,16 ; Ps 78.18-25 ; 105.40 ; 136.25 ; Né 9.15,20 ; Jn 6.31s ; 1Co 10.3 ; cf. '
