document_id: EXO.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La manne et les cailles
  - type: text
    content: ' '
  - type: note
    content: communauté 12.3n. –  partit 12.37n. – On a rapproché les noms Sîn et Sinaï de celui d'un dieu lunaire vénéré en Mésopotamie et en Arabie, mais la chose est incertaine. Le nom Sinaï désigne probablement le massif montagneux situé dans le sud de la péninsule dite du Sinaï, entre le golfe d'Aqaba et le golfe de Suez. On a identifié le mont Sinaï de la Bible au djebel Serbal, et surtout au djebel Moussa (= mont Moïse), plus au sud. Nb 33.9-11 mentionne une étape de plus, au bord de la mer des Joncs.
  - type: text
    content: 'Toute la communauté des Israélites partit d''Elim ; ils arrivèrent au désert de Sîn, qui est entre Elim et le Sinaï, le quinzième jour du deuxième mois à compter de leur sortie d''Egypte. '
  '10':
  - type: note
    content: '13.21+. –  vers le désert  : du point de vue du pays d''Israël, cette expression pourrait signifier vers le sud ou vers l''est.'
  - type: text
    content: 'Tandis qu''Aaron parlait à toute la communauté des Israélites, ils se tournèrent vers le désert, et la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut dans la nuée.'
  '11':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '12':
  - type: note
    content: 'A la tombée du soir  : voir 12.6n.'
  - type: text
    content: 'J''ai entendu les Israélites maugréer. Dis-leur : A la tombée du soir vous mangerez de la viande, et au matin vous vous rassasierez de pain ; ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'cailles Nb 11 ; Ps 78.26-31 ; 105.40 ; cf. Sagesse 16.2 : « Au lieu de ce châtiment (le fléau des grenouilles, 7.26–8.11), tu as accordé un bienfait à ton peuple : pour satisfaire l''ardeur de son appétit, c''est une nourriture à la saveur merveilleuse, des cailles, que tu lui as préparée. »'
  - type: text
    content: 'Le soir, des cailles montèrent et couvrirent le camp ; et au matin il y eut autour du camp une couche de rosée. '
  '14':
  - type: note
    content: 'le désert était recouvert de  : litt. sur la face du désert. –  granuleux  : le mot ainsi traduit n''apparaît qu''ici dans l''A.T. LXX blanc comme de la graine de coriandre  ; cf. v. 31 ; Nb 11.7. – Cf. v. 4n.'
  - type: text
    content: 'Quand cette couche de rosée se leva, le désert était recouvert de quelque chose de menu, de granuleux – quelque chose de menu, comme le givre sur la terre. '
  '15':
  - type: note
    content: Qu'est-ce que c'est ? hébreu mân hou’. C'est le premier terme, araméen, de cette interrogation qui est rapproché du terme manne (hébreu mân, v. 31), nom encore donné, en arabe, à la sécrétion sucrée de certains insectes qui vivent notamment sur les tamaris, dans le désert.
  - type: text
    content: 'Les Israélites regardèrent et se dirent l''un à l''autre : Qu''est-ce que c''est ? – Car ils ne savaient pas ce que c''était. Moïse leur dit : C''est le pain que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous donne à manger. '
  '16':
  - type: note
    content: 'un omer  : environ 2 l (voir v. 36 et mesures).'
  - type: text
    content: 'Voici ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné : que chacun en recueille ce dont il a besoin, un omer par tête, selon le nombre de personnes à nourrir ; chacun en prendra pour ceux qui sont dans sa tente. '
  '17':
  - type: text
    content: 'Les Israélites firent ainsi ; ils en recueillirent les uns plus, les autres moins. '
  '18':
  - type: note
    content: 2Co 8.15.
  - type: text
    content: On mesurait ensuite avec l'omer ; celui qui en avait plus n'avait rien de trop, celui qui en avait moins n'en manquait pas. Chacun recueillait ce dont il avait besoin.
  - type: heading
    content: Règles diverses concernant la manne
  '19':
  - type: text
    content: 'Moïse leur dit : Que personne n''en laisse jusqu''au matin. '
  '2':
  - type: note
    content: '14.11+. –  Aaron  : voir prêtre.'
  - type: text
    content: 'Alors toute la communauté des Israélites se mit à maugréer, dans le désert, contre Moïse et Aaron. '
  '20':
  - type: text
    content: 'Mais ils n''écoutèrent pas Moïse : il y eut des gens qui en laissèrent jusqu''au matin ; il s''y mit des vers, et cela devint une puanteur. Moïse s''irrita contre ces gens. '
  '21':
  - type: text
    content: Tous les matins, chacun recueillait ce dont il avait besoin ; et quand le soleil commençait à chauffer, cela fondait.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'pour chacun  : autre traduction au lieu d''un . –  communauté 12.3n.'
  - type: text
    content: 'Le sixième jour, ils en recueillirent le double, deux omers pour chacun. Tous les princes de la communauté vinrent le dire à Moïse. '
  '23':
  - type: note
    content: 'un repos sabbatique  : hébreu shabbatôn, terme dérivé du mot shabbath (sabbat) et qui désigne un jour complètement chômé (cf. 31.15 ; 35.2 ; Lv 16.31n  ; 23.3). –  consacré au Seigneur  : autre traduction sacré (ou saint) pour le Seigneur  ; cf. 28.36. –  en réserve  : la même formule est traduite par conservé aux v. 32-34n.'
  - type: text
    content: 'Moïse leur répondit : C''est ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit. Demain, c''est un repos sabbatique, un sabbat consacré au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; faites cuire ce que vous avez à faire cuire, faites bouillir ce que vous avez à faire bouillir, et tout le surplus, laissez-le en réserve jusqu''au matin. '
  '24':
  - type: text
    content: 'Ils le laissèrent jusqu''au matin, comme Moïse l''avait ordonné ; cela ne devint pas une puanteur, on n''y trouva pas de vers. '
  '25':
  - type: note
    content: 'dans la campagne  : c.-à-d. hors du camp.'
  - type: text
    content: 'Moïse dit : Mangez-le aujourd''hui ; car aujourd''hui, c''est un sabbat pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; aujourd''hui, vous n''en trouverez pas dans la campagne. '
  '26':
  - type: note
    content: 'le sabbat  : autre traduction un sabbat.'
  - type: text
    content: Pendant six jours vous en recueillerez ; mais le septième jour, c'est le sabbat ; il n'y en aura pas.
  '27':
  - type: text
    content: 'Le septième jour, des gens sortirent pour en recueillir, mais ils n''en trouvèrent pas. '
  '28':
  - type: note
    content: Voir lois.
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Jusqu''à quand refuserez-vous d''observer mes commandements et mes lois ? '
  '29':
  - type: note
    content: 'sabbat 20.8-11 ; 23.12 ; 31.12ss ; 34.21 ; 35.2s ; Lv 19.3 ; 23.3 ; Dt 5.12-15 ; cf. Nb 15.32-36 ; Lc 13.14/ /. –  de quoi manger  : litt. du pain. –  de chez lui  : litt. de son lieu.'
  - type: text
    content: 'Regardez : si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a donné le sabbat, il vous donne aussi au sixième jour de quoi manger pour deux jours. Que chacun de vous reste donc où il est ; que personne ne sorte de chez lui le septième jour. '
  '3':
  - type: text
    content: 'Les Israélites leur dirent : Ah ! si nous étions morts de la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en Egypte, quand nous étions assis près des marmites de viande, quand nous mangions du pain à satiété ! C''est pour faire mourir de faim toute cette assemblée que vous nous avez fait sortir dans ce désert !'
  '30':
  - type: note
    content: 'fit sabbat  : autres traductions se reposa ; cessa de travailler ; s''arrêta ; chôma  ; le verbe hébreu est apparenté au terme transcrit sabbat au v. 29 ; cf. Gn 2.2n  ; Ex 31.17.'
  - type: text
    content: Ainsi le peuple fit sabbat le septième jour.
  '31':
  - type: text
    content: ' '
  - type: note
    content: manne v. 15n. – La coriandre est une ombelliféracée qui pousse en Arabie et en Afrique du Nord ; ses graines blanches servent de condiment (cf. Nb 11.7-10).
  - type: text
    content: La maison d'Israël appela du nom de manne cette nourriture, qui ressemblait à de la graine de coriandre ; elle était blanche et elle avait le goût d'un gâteau au miel.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''un plein omer  : LXX remplissez un omer de manne . –  pour toutes vos générations 12.14+.'
  - type: text
    content: 'Moïse dit : Voici ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné : Qu''un plein omer en soit conservé pour toutes vos générations, afin qu''elles voient le pain que je vous ai fait manger dans le désert, quand je vous ai fait sortir d''Egypte. '
  '33':
  - type: note
    content: 'Aaron  : voir prêtre. –  urne  : LXX précise d''or, cf. Hé 9.4.'
  - type: text
    content: 'Moïse dit à Aaron : Prends une urne, mets-y un plein omer de manne et dépose-la devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', afin qu''elle soit conservée pour toutes vos générations. '
  '34':
  - type: note
    content: 'Témoignage  : il s''agit selon toute vraisemblance des tablettes de la loi, prises comme charte officielle de l''alliance ; cf. 25.16 ; 31.18 ; cf. 34.1. –  afin qu''elle y soit conservée  : ici la même formule (v. 23n,32s) pourrait signifier, comme dans d''autres contextes, pour l''observance (cf. Gn 26.5) ; voir aussi Nb 17.25 ; 19.9.'
  - type: text
    content: 'Comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse, Aaron la déposa devant le Témoignage, afin qu''elle y soit conservée.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: Jos 5.12.
  - type: text
    content: 'Les Israélites ont mangé la manne pendant quarante ans, jusqu''à leur arrivée dans un pays habité ; ils ont mangé la manne jusqu''à leur arrivée à la limite de Canaan. '
  '36':
  - type: text
    content: L'omer, c'est le dixième de l'épha.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Je vais faire  : autre traduction je fais . –  pain Gn 3.19n. –  recueillir  : la racine hébraïque correspondante évoque aussi le glanage, cf. Lv 19.9s ; 23.22 ; Rt 2.2ss ; voir aussi Nb 11.8 ; Jg 1.7. –  chaque jour la quantité nécessaire  : litt. la chose du jour en son jour , cf. 5.13n  ; la formule est souvent traduite par selon l''ordre de chaque jour , cf. Lv 23.37n  ; voir aussi Mt 6.11. – Sur l''ensemble, voir Nb 11.1-9 ; Dt 8.3,16 ; Ps 78.18-25 ; 105.40 ; 136.25 ; Né 9.15,20 ; Jn 6.31s ; 1Co 10.3 ; cf. Sagesse 16.20ss : « A l''opposé (du fléau de la grêle, Ex 9.13-35), tu as distribué à ton peuple une nourriture d''anges, tu lui as procuré du ciel, sans effort de sa part, un pain tout préparé, ayant la capacité de toute saveur et adapté à tous les goûts. La substance que tu donnais manifestait ta douceur pour tes enfants, mais elle se pliait au désir de celui qui la consommait en se modifiant au gré de chacun. Neige et glace (cf. v. 14) résistaient au feu et ne fondaient pas, pour faire savoir que les récoltes des ennemis avaient été détruites par le feu qui flambait dans la grêle et lançait des éclairs au milieu de la pluie. Ce même feu, en revanche, pour permettre aux justes de se nourrir, oubliait même son pouvoir propre. La création, docile à te servir, toi, son Auteur, se tend pour le châtiment des injustes, mais se détend pour le bien de ceux qui se sont confiés en toi. Et c''est ainsi qu''en se prêtant à tout changement, elle était au service de ce don venu de toi et qui devenait toute nourriture au gré de ceux qui le demandaient. Par là, tes fils que tu as aimés, Seigneur, devaient apprendre que ce n''est pas la production de fruits qui nourrit l''homme, mais bien ta parole qui fait subsister ceux qui croient en toi. » – Voir loi.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Je vais faire pleuvoir pour vous du pain depuis le ciel. Le peuple sortira pour en recueillir chaque jour la quantité nécessaire ; ainsi je le mettrai à l''épreuve pour voir s''il suit ou non ma loi. '
  '5':
  - type: note
    content: V. 22-30.
  - type: text
    content: Le sixième jour, lorsqu'ils prépareront ce qu'ils auront apporté, il y en aura deux fois plus que ce qu'ils recueillent jour après jour.
  '6':
  - type: text
    content: 'Moïse et Aaron dirent à tous les Israélites : Ce soir, vous saurez que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui vous a fait sortir d''Egypte, '
  '7':
  - type: note
    content: gloire 24.16s ; 33.18 ; 40.34s ; Lv 9.23 ; Nb 16.19 ; 17.7 ; 20.6 ; 1R 8.11 ; Es 6.3 ; 60.1s ; Mt 17.1-9/ / ; Jn 1.14.
  - type: text
    content: 'et au matin vous verrez la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ', parce qu''il vous a entendus maugréer contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; nous, en effet, que sommes-nous, pour que vous maugréiez contre nous ? '
  '8':
  - type: note
    content: 'Le Seigneur vous donnera  : litt. en ce que le Seigneur vous donnera… ou quand le Seigneur vous donnera… (sous-entendu : vous verrez sa gloire, v. 7). –  soir / matin  : cf. 1R 17.6.'
  - type: text
    content: 'Moïse dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous donnera ce soir de la viande à manger, et au matin du pain à satiété ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a entendus maugréer contre lui. Nous, en effet, que sommes-nous ? Ce n''est pas contre nous que vous maugréez, c''est contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Présentez-vous  : autre traduction approchez-vous  ; cf. 12.48n.'
  - type: text
    content: 'Moïse dit à Aaron : Dis à toute la communauté des Israélites : Présentez-vous devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il vous a entendus maugréer. '
