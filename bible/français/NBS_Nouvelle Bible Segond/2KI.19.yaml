        - type: text
          text: n
      - type: text
        text: '). Selon certaines sources égyptiennes, il aurait été âgé de dix ans à l''époque de la campagne de Sennachérib (≈ 701 av. J.-C.), mais selon d''autres sources il aurait pu avoir vingt ans et participer à des opérations militaires. Il n''est sans doute devenu pharaon (corégent) que vers 690 av. J.-C. (voir « Le temps des rois »♦ ; « Les “pharaons” »♦). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il s'est mis en marche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
