  - type: text
    text: 'Les gens de la cour du roi Ezéchias allèrent donc auprès d''Esaïe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esaïe leur dit : Voici ce que vous direz à votre maître : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : N''aie pas peur des paroles que tu as entendues, de ces injures que les serviteurs du roi d''Assyrie ont proférées contre moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: souffle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: esprit
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur une nouvelle…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il entendra vraiment et retournera…
    marker-yv: yv-n
  - type: text
    text: 'J''envoie sur lui un souffle : sur une nouvelle qu''il recevra, il retournera dans son pays, et je le ferai tomber par l''épée dans son pays.'
