    marker-yv: yv-n
  - type: text
    text: 'Alors le roi d''Assyrie reçut une nouvelle au sujet de Tirhaqa, roi de Koush : « Il s''est mis en marche pour te faire la guerre. » Alors il envoya de nouveau des messagers à Ezéchias, en disant : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Vous parlerez ainsi… Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte absent d''un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '. Lettre de Sennachérib à Ezéchias : cf. 2Ch 32.17.'
    marker-yv: yv-n
  - type: text
    text: 'Vous parlerez ainsi à Ezéchias, roi de Juda : Que ton Dieu, en qui tu mets ta confiance, ne te trompe pas en disant : « Jérusalem ne sera pas livrée au roi d''Assyrie ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'anathème '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 2.34
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu as toi-même appris ce qu''ont fait les rois d''Assyrie à tous les pays : ils les ont frappés d''anathème ; et toi, tu serais délivré ! '
  - type: usfm
    marker: vlbl
