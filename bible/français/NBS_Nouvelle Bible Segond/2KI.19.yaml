  - type: text
    text: 'Il envoya Eliaqim, l''intendant de la maison, Shebna, le scribe, et les anciens des prêtres, couverts d''un sac, chez le prophète Esaïe, fils d''Amots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils lui dirent : Ainsi parle Ezéchias : Ce jour est un jour de détresse, de châtiment et d''opprobre ; des fils sont prêts à sortir du ventre de leur mère, et il n''y a plus de force pour les mettre au monde. '
