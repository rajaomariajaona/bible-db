document_id: 2KI.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ezéchias consulte le prophète Esaïe
  - type: heading
    content: Es 37.1-8
  - type: text
    content: 'Lorsque le roi Ezéchias eut entendu cela, il déchira ses vêtements, se couvrit d''un sac et se rendit à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '10':
  - type: note
    content: 'Vous parlerez ainsi… Juda  : texte absent d''un ms de LXX. Lettre de Sennachérib à Ezéchias : cf. 2Ch 32.17.'
  - type: text
    content: 'Vous parlerez ainsi à Ezéchias, roi de Juda : Que ton Dieu, en qui tu mets ta confiance, ne te trompe pas en disant : « Jérusalem ne sera pas livrée au roi d''Assyrie ! » '
  '11':
  - type: note
    content: anathème Dt 2.34n.
  - type: text
    content: 'Tu as toi-même appris ce qu''ont fait les rois d''Assyrie à tous les pays : ils les ont frappés d''anathème ; et toi, tu serais délivré ! '
  '12':
  - type: note
    content: 'Gozân  : cf. 17.6n. –  Harrân Gn 11.31n. –  Rétseph  : akkadien Ratsappa, actuelle Rutsafa, au nord-ouest de Palmyre, près de l''Euphrate. –  les fils d''Eden  : habitants de la région du Bet Eden, sur l''Euphrate au sud de Til Barsip. –  Telassar  : akkadien Til-a-sour-ri, ville mède à l''ouest d''Ecbatane (lieu d''exil des fils d''Eden  ?).'
  - type: text
    content: 'Les dieux des nations que mes pères ont détruites les ont-ils délivrées, Gozân, Harrân, Rétseph, et les fils d''Eden qui sont à Telassar ? '
  '13':
  - type: note
    content: 'Hamath  : cf. 17.24n. –  Arpad  : capitale du royaume araméen Yahân identifiée avec le site de Tell Rifa''at, au nord d''Alep, et plus récemment avec celui de Sfiré, à 22 km au sud de cette ville. –  Sepharvaïm  : cf. 17.31n. –  de Héna et d''Ivva  : cf. 18.34n.'
  - type: text
    content: Où sont le roi de Hamath, le roi d'Arpad et le roi de la ville de Sepharvaïm, de Héna et d'Ivva ?
  - type: heading
    content: Prière d'Ezéchias
  - type: heading
    content: Es 37.14-20
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'la lettre  : litt. les lettres , selon le texte hébreu traditionnel ; quelques mss de LXX et de Tg portent le singulier.'
  - type: text
    content: 'Ezéchias prit la lettre de la main des messagers, la lut et monta à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; Ezéchias la déploya devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '15':
  - type: note
    content: '2Ch 32.20 ; cf. Es 44.8 ; 45.5,14,18 ; 46.9. –  Ezéchias pria devant le Seigneur  : texte absent de LXX.'
  - type: text
    content: 'Ezéchias pria devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), Dieu d''Israël, qui es assis sur les keroubim, c''est toi seul qui es Dieu pour tous les royaumes de la terre, c''est toi qui as fait le ciel et la terre. '
  '16':
  - type: note
    content: 'entends et Ecoute traduisent le même verbe hébreu. –  chef d''intendance  : sous-entendu dans le texte, litt. qui l''a envoyé  ; cf. v. 4n.'
  - type: text
    content: Seigneur
  - type: text
    content: ', tends l''oreille et entends ! '
  - type: text
    content: Seigneur
  - type: text
    content: ', ouvre les yeux et vois ! Ecoute les paroles de Sennachérib, qui a envoyé son chef d''intendance pour outrager le Dieu vivant. '
  '17':
  - type: note
    content: 'et leurs pays  : précision absente de LXX (cf. Es 37.18).'
  - type: text
    content: 'Il est vrai, '
  - type: text
    content: Seigneur
  - type: text
    content: ', que les rois d''Assyrie ont réduit en ruines les nations et leurs pays. '
  '18':
  - type: note
    content: œuvre de mains humaines 2Ch 32.19 ; voir aussi Es 40.18ss ; 44.9ss ; 45.20.
  - type: text
    content: 'Ils ont jeté leurs dieux au feu – en fait, ceux-là n''étaient pas des dieux, mais l''œuvre de mains humaines, du bois et de la pierre – et ils les ont anéantis. '
  '19':
  - type: note
    content: 'sauve-nous  : cf. 6.26n. –  tu es Dieu  : absent de Tg et d''Es 37.20.'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, sauve-nous, je t''en prie, de la main de Sennachérib ; que tous les royaumes de la terre sachent ainsi que, toi seul, '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), tu es Dieu !'
  - type: heading
    content: Esaïe transmet la réponse de Dieu
  - type: heading
    content: Es 37.21-29
  '2':
  - type: note
    content: 'intendant de la maison  : cf. 1R 4.6n. –  Shebna, le scribe 18.18,26,37. – Voir aussi anciens, prêtres.'
  - type: text
    content: 'Il envoya Eliaqim, l''intendant de la maison, Shebna, le scribe, et les anciens des prêtres, couverts d''un sac, chez le prophète Esaïe, fils d''Amots. '
  '20':
  - type: text
    content: 'Alors Esaïe, fils d''Amots, fit dire à Ezéchias : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : J''ai entendu la prière que tu m''as adressée au sujet de Sennachérib, roi d''Assyrie. '
  '21':
  - type: note
    content: 'Sion la jolie / Jérusalem la belle  : litt. la vierge de la fille de Sion / la fille de Jérusalem  ; il s''agit de la ville elle-même, personnifiée comme une femme.'
  - type: text
    content: 'Voici la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a prononcée contre lui :'
  - type: text
    content: Elle te méprise, elle se moque de toi, Sion la jolie ;
  - type: text
    content: elle hoche la tête derrière toi, Jérusalem la belle.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Contre et sur traduisent une même préposition hébraïque. – Voir Saint.
  - type: text
    content: Qui as-tu outragé et injurié ?
  - type: text
    content: Contre qui as-tu élevé la voix ?
  - type: text
    content: Tu as levé les yeux en haut,
  - type: text
    content: sur le Saint d'Israël !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'tes messagers  : Vg porte tes gens (litt. tes serviteurs ), comme Es 37.24. –  le Seigneur  : certains mss portent YHWH ( le Seigneur ). –  En conduisant mon char  : sens probable du texte hébreu ; autre lecture traditionnelle avec la multitude de mes chars , comme en Es 37.24. –  ses plus épaisses forêts  : litt. la forêt de son verger , ce qui pourrait aussi signifier le cœur de son verger, son verger luxuriant  ; cf. Mi 7.14n.'
  - type: text
    content: Par l'intermédiaire de tes messagers, tu as outragé le Seigneur
  - type: text
    content: 'et tu as dit :'
  - type: text
    content: « En conduisant mon char,
  - type: text
    content: moi, je suis monté tout en haut des montagnes,
  - type: text
    content: au plus profond du Liban ;
  - type: text
    content: je coupe les plus élevés de ses cèdres,
  - type: text
    content: les plus beaux de ses cyprès,
  - type: text
    content: et j'atteins son dernier abri,
  - type: text
    content: ses plus épaisses forêts ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'étrangère  : mot absent d''un ms hébreu et d''Es 37.25. –  les bras du Nil  : cf. Es 19.6n  ; 37.25 ; Ez 29.3n.'
  - type: text
    content: j'ai creusé et j'ai bu de l'eau étrangère,
  - type: text
    content: je tarirai avec mes pieds
  - type: text
    content: tous les bras du Nil en Egypte. »
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'N''as-tu pas… jours de jadis  : texte absent de LXX.'
  - type: text
    content: N'as-tu pas appris que j'ai fait ces choses depuis longtemps,
  - type: text
    content: qu'aux jours de jadis je les ai façonnées ?
  - type: text
    content: Maintenant, je les fais venir,
  - type: text
    content: et toi, tu n'as plus qu'à transformer les villes fortes en tas de ruines.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'impuissants  : litt. courts de main ou de bras  ; cf. Nb 11.23 ; Es 50.2. –  comme  : sous-entendu dans le texte. –  en terrasse  : sous-entendu, cf. Dt 22.8n. –  comme du blé desséché…  : texte et traduction incertains ; un terme proche de celui qui est traduit ici par blé desséché est rendu par brûlé en Gn 41.6,23,27 ; d''autres comprennent comme la rouille (maladie) du blé avant la formation de la tige (cf. Es 37.27n).'
  - type: text
    content: Leurs habitants sont impuissants,
  - type: text
    content: ils sont terrifiés et honteux ;
  - type: text
    content: ils sont comme l'herbe des champs et la tendre verdure,
  - type: text
    content: comme le gazon des toits en terrasse,
  - type: text
    content: comme du blé desséché avant même d'être en épi.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Voir Ps 139.1ss. –  quand tu t''assieds…  : litt. le fait que tu t''assieds… –  quand tu pars…  : litt. quand tu sors et quand tu rentres , cf. Nb 27.17n  ; 1S 18.5n.'
  - type: text
    content: Mais je sais quand tu t'assieds,
  - type: text
    content: quand tu pars en campagne et quand tu en reviens,
  - type: text
    content: et quand tu t'agites contre moi.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'suffisance  : le terme hébreu signifie généralement quiétude, tranquillité . Certains modifient le texte hébreu traditionnel pour lire ton rugissement . –  boucle ou crochet . L''image est celle d''un animal tiré par un anneau passé dans ses naseaux ; cf. Ez 19.4,9 ; 29.4.'
  - type: text
    content: Parce que tu t'agites contre moi
  - type: text
    content: et que ta suffisance est montée à mes oreilles,
  - type: text
    content: je mettrai ma boucle à tes narines
  - type: text
    content: et mon mors à tes lèvres,
  - type: text
    content: et je te ferai retourner par le chemin par lequel tu es venu.
  - type: heading
    content: Le signe donné à Ezéchias
  - type: heading
    content: Es 37.30-32
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'le produit du grain tombé  : il s''agit du grain qui n''a pas été semé et qui est tombé dans le champ par accident au moment de la moisson ; cf. Lv 25.5,11.'
  - type: text
    content: 'Voici le signe pour toi :'
  - type: text
    content: on mangera cette année le produit du grain tombé,
  - type: text
    content: et la suivante ce qui pousse de soi-même.
  - type: text
    content: Mais la troisième année,
  - type: text
    content: semez, moissonnez, plantez des vignes et mangez-en le fruit.
  '3':
  - type: text
    content: 'Ils lui dirent : Ainsi parle Ezéchias : Ce jour est un jour de détresse, de châtiment et d''opprobre ; des fils sont prêts à sortir du ventre de leur mère, et il n''y a plus de force pour les mettre au monde. '
  '30':
  - type: text
    content: Les rescapés de la maison de Juda qui seront restés
  - type: text
    content: produiront encore des racines vers le bas
  - type: text
    content: et porteront du fruit vers le haut.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'du Seigneur  : avec Es 37.32, de nombreux mss hébreux et des versions anciennes ; une autre lecture traditionnelle ajoute des Armées.'
  - type: text
    content: Car de Jérusalem sortira un reste,
  - type: text
    content: et du mont Sion des rescapés.
  - type: text
    content: 'Voilà ce que fera la passion jalouse du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: La fin de Sennachérib
  - type: heading
    content: Es 37.33-38  ; 2Ch 32.21-22
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'ainsi parle…  : autre traduction voici ce que le Seigneur dit au roi d''Assyrie . –  Il n''entrera pas…  : autre traduction possible (aussi au v. 33) il ne viendra pas vers cette ville.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au sujet du roi d''Assyrie :'
  - type: text
    content: Il n'entrera pas dans cette ville,
  - type: text
    content: il n'y tirera pas de flèche,
  - type: text
    content: il ne lui opposera pas de bouclier
  - type: text
    content: et il n'élèvera pas de remblai contre elle.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'il sera venu  : cf. Es 37.34 ( il est venu ) ; venir et entrer traduisent ici un même verbe hébreu (v. 32n).'
  - type: text
    content: Il s'en retournera par le chemin par lequel il sera venu,
  - type: text
    content: et il n'entrera pas dans cette ville
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'pour la sauver  : texte absent de LXX. –  à cause de David  : cf. 2S 7.12.'
  - type: text
    content: Je protégerai cette ville pour la sauver,
  - type: text
    content: à cause de moi et à cause de David, mon serviteur.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Cette nuit-là  : précision absente d''Es 37.36. –  messager  : voir ange. –  cent quatre-vingt-cinq mille hommes  : selon certains mss et Es 37.38. La plupart des mss donnent le chiffre de 8 500 000. Pour l''historien grec Hérodote, une invasion de rats aurait dévasté le camp assyrien. Certains commentateurs en ont conclu que le fléau évoqué était une épidémie de peste.'
  - type: text
    content: 'Cette nuit-là, le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sortit et abattit dans le camp des Assyriens cent quatre-vingt-cinq mille hommes ; quand on se leva, de bon matin, c''étaient tous des cadavres, des morts ! '
  '36':
  - type: note
    content: 's''en retourna  : litt. partit (ou leva le camp) et alla et retourna.'
  - type: text
    content: 'Alors Sennachérib, roi d''Assyrie, s''en retourna habiter à Ninive. '
  '37':
  - type: note
    content: 'Nisrok  : dieu inconnu ; peut-être une déformation de Mardouk, nom du principal dieu de Babylone ; on a vu aussi dans l''expression maison (au sens de temple, hébreu beth) de Nisrok une déformation de Bad-Sarroukîn (Bourg de Sargon), autre nom de Khorsabad, site du palais de Sargon. –  Adrammélek et Sarétser  : avec de nombreux mss hébreux et des versions anciennes ; une lecture traditionnelle précise ses fils, comme en Es 37.38. D''après une chronique babylonienne, Sennachérib aurait été tué par l''un de ses fils au cours d''une insurrection. Une inscription d''Asarhaddon évoque un complot de ses frères qui voulaient s''emparer du trône. Une source assyrienne émanant du petit-fils de Sennachérib, Assourbanipal, semble confirmer le fait que ce roi aurait été assassiné dans un temple, vraisemblablement à Babylone.'
  - type: text
    content: Alors qu'il était prosterné dans la maison de Nisrok, son dieu, Adrammélek et Sarétser le tuèrent d'un coup d'épée et s'enfuirent au pays d'Ararat. Son fils Asarhaddon devint roi à sa place.
  '4':
  - type: note
    content: 'outrager  : autres traductions déshonorer, défier, de même aux v. 16,22s ; voir 1S 17.10n,26n. –  peut-être le châtiera-t-il  : autre traduction possible il (le roi d''Assyrie, ou bien le chef d''intendance) a frappé par les paroles…'
  - type: text
    content: 'Peut-être le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, entendra-t-il toutes les paroles du chef d''intendance, que le roi d''Assyrie, son maître, a envoyé pour outrager le Dieu vivant ; peut-être le châtiera-t-il pour ces paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a entendues. Elève une prière pour le reste qui subsiste encore.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Les gens de la cour  : litt. les serviteurs.'
  - type: text
    content: 'Les gens de la cour du roi Ezéchias allèrent donc auprès d''Esaïe. '
  '6':
  - type: text
    content: 'Esaïe leur dit : Voici ce que vous direz à votre maître : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : N''aie pas peur des paroles que tu as entendues, de ces injures que les serviteurs du roi d''Assyrie ont proférées contre moi. '
  '7':
  - type: note
    content: 'souffle  : voir esprit. –  sur une nouvelle…  : litt. il entendra vraiment et retournera…'
  - type: text
    content: 'J''envoie sur lui un souffle : sur une nouvelle qu''il recevra, il retournera dans son pays, et je le ferai tomber par l''épée dans son pays.'
  - type: heading
    content: Nouvelles menaces de Sennachérib
  - type: heading
    content: Es 37.8-13  ; 2Ch 32.16-19
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Libna  : identifiée le plus souvent avec Tell Bornat, à 7 km au nord de Lakish, cf. 8.22n. –  que le roi avait quitté  : litt. qu''il avait quitté.'
  - type: text
    content: 'Le chef d''intendance s''en retourna trouver le roi d''Assyrie qui attaquait Libna – en effet, il avait appris que le roi avait quitté Lakish. '
  '9':
  - type: note
    content: 'Tirhaqa ou Taharqa, nom d''un pharaon de la XXVe dynastie (koushite, c.-à-d. nubienne, cf. Gn 2.13n). Selon certaines sources égyptiennes, il aurait été âgé de dix ans à l''époque de la campagne de Sennachérib (≈ 701 av. J.-C.), mais selon d''autres sources il aurait pu avoir vingt ans et participer à des opérations militaires. Il n''est sans doute devenu pharaon (corégent) que vers 690 av. J.-C. (voir « Le temps des rois »♦ ; « Les “pharaons” »♦). –  Il s''est mis en marche  : litt. il est sorti  ; cf. 1S 11.7n. –  il envoya de nouveau  : autre traduction possible il retourna et envoya… (expression semblable à celle du début du v. 8).'
  - type: text
    content: 'Alors le roi d''Assyrie reçut une nouvelle au sujet de Tirhaqa, roi de Koush : « Il s''est mis en marche pour te faire la guerre. » Alors il envoya de nouveau des messagers à Ezéchias, en disant : '
