      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tirhaqa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Taharqa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', nom d''un pharaon de la XXV'
      - type: usfm
        marker: ord
