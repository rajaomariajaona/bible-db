document_id: REV.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Alléluia !
  - type: text
    content: ' '
  - type: note
    content: la voix forte (ou le grand bruit ) d'une grande foule v. 6 ; cf. 7.9s ; Dn 10.6. –  Alléluia ! transcription dans le texte grec de l'expression hébraïque traduite par louez le Seigneur  ! (litt. louez Yah , cf. Ps 104.35n). –  la gloire… 4.11+.
  - type: text
    content: 'Après cela, j''entendis comme la voix forte d''une grande foule dans le ciel, qui disait :'
  - type: text
    content: Alléluia !
  - type: text
    content: Le salut, la gloire et la puissance sont à notre Dieu,
  '10':
  - type: note
    content: Cf. 22.8s ; Ac 10.25s. –  compagnon d'esclavage ou de service 6.11+. –  qui portent le témoignage de Jésus 1.2+ ; 6.9n. – Voir esprit.
  - type: text
    content: 'Je tombai à ses pieds pour me prosterner devant lui, mais il me dit : Garde-toi de faire cela ! Je ne suis que ton compagnon d''esclavage et celui de tes frères qui portent le témoignage de Jésus. Prosterne-toi devant Dieu ! Car c''est le témoignage de Jésus qui est l''esprit de la prophétie.'
  - type: heading
    content: Le cavalier sur le cheval blanc
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le ciel ouvert  : cf. 4.1+. –  cheval blanc v. 14 ; cf. 6.2 ; 2 Maccabées 3.25 : « Il leur apparut (à ceux qui se préparaient à piller le temple), en effet, un cheval, monté par un cavalier terrifiant. » 11.8 : « Un cavalier vêtu de blanc apparut à leur tête (des troupes de Judas Maccabée), agitant des armes d''or. » –  Fidèle et Vrai 1.5+ ; 3.7+,14 ; cf. 21.5n. –  il juge…  : cf. Es 11.3-5 ; Ps 9.9 ; 72.2 ; 96.13 ; 98.9. – Voir justice.'
  - type: text
    content: 'Alors je vis le ciel ouvert, et un cheval blanc apparut. Celui qui le monte s''appelle Fidèle et Vrai, il juge et fait la guerre avec justice. '
  '12':
  - type: note
    content: yeux / feu flamboyant 1.14+. Le mot correspondant à comme est absent de certains mss. –  un nom… 2.17 ; cf. 19.16 ; Ph 2.9 ; voir aussi Es 62.2s.
  - type: text
    content: 'Ses yeux sont comme un feu flamboyant ; sur sa tête il y a beaucoup de diadèmes ; il porte un nom écrit que personne ne connaît, sinon lui, '
  '13':
  - type: note
    content: 'trempé de sang Es 63.1-3. –  Parole de Dieu Jn 1.1,14 ; 1Jn 1.1-3 ; cf. Sagesse 18.15s (à propos du dernier fléau d''Egypte) : « Ta Parole toute-puissante, quittant les cieux et le trône royal, bondit comme un guerrier impitoyable au milieu du pays maudit, avec, pour épée tranchante, ton décret irrévocable. Se redressant, elle sema partout la mort ; elle touchait au ciel et foulait la terre. »'
  - type: text
    content: et il est habillé d'un vêtement trempé de sang. Son nom est La Parole de Dieu.
  '14':
  - type: text
    content: ' '
  - type: note
    content: chevaux blancs v. 11+. –  fin lin… pur v. 8+. –  blanc 3.4+.
  - type: text
    content: 'Les armées qui sont dans le ciel le suivaient sur des chevaux blancs, revêtues de fin lin, blanc et pur. '
  '15':
  - type: note
    content: 'bouche / épée 1.16+. –  nations  : voir non-Juifs. –  qui les fera paître… 2.27+ ; Ps 2.9. –  cuve 14.19+,20. –  colère ardente  : voir 16.19n.'
  - type: text
    content: 'De sa bouche sort une épée acérée avec laquelle il doit frapper les nations ; c''est lui qui '
  - type: text
    content: les fera paître avec un sceptre de fer ;
  - type: text
    content: ' c''est lui qui foule la cuve du vin de la colère ardente de Dieu, le Tout-Puissant. '
  '16':
  - type: note
    content: 17.14+ ; cf. 19.12.
  - type: text
    content: 'Il a sur son vêtement et sur sa cuisse un nom écrit : Roi des rois et Seigneur des seigneurs.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Voir ange . –  cria 6.10n  ; 18.2. –  à tous les oiseaux  : v. 21 ; Ez 39.4,17-20.'
  - type: text
    content: 'Je vis un ange debout dans le soleil. Il cria à tous les oiseaux qui volaient au milieu du ciel : Venez, rassemblez-vous pour le grand dîner de Dieu, '
  '18':
  - type: note
    content: Cf. 6.15+. –  petits / grands 11.18+.
  - type: text
    content: afin de manger les chairs des rois, les chairs des chefs militaires, les chairs des puissants, les chairs des chevaux et de ceux qui les montent, les chairs de tous, hommes libres et esclaves, petits et grands.
  '19':
  - type: text
    content: ' '
  - type: note
    content: faire la guerre 2.16+ ; cf. 16.14,16n  ; 17.12-14 ; Ps 2.2.
  - type: text
    content: 'Je vis la bête, les rois de la terre et leurs armées, rassemblés pour faire la guerre à celui qui monte le cheval et à son armée. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ses jugements… 16.7+. –  qui ruinait ou qui corrompait la terre  : cf. 11.18n  ; Jr 51.25. –  le sang 6.10+. –  esclaves ou serviteurs v. 5 ; 1.1+. –  en le lui réclamant  : litt. de sa main (à elle).'
  - type: text
    content: parce que ses jugements sont vrais et justes.
  - type: text
    content: Il a jugé la grande prostituée qui ruinait la terre par sa prostitution,
  - type: text
    content: et il a vengé le sang de ses esclaves en le lui réclamant.
  '20':
  - type: note
    content: 'La bête (13.1+) fut prise Dn 7.11. –  prophète de mensonge 16.13n. –  signes 13.13+,14-16. –  égaré 12.9+. –  se prosternaient  : 3.9+ ; Mt 2.2+ ; voir culte. –  vivants  : cf. Nb 16.33 ; Ps 55.16. –  étang de feu 20.10,14s ; 21.8 ; cf. Es 30.33. –  où brûle le soufre  : litt. brûlant de soufre 14.10+.'
  - type: text
    content: 'La bête fut prise, et avec elle le prophète de mensonge qui avait produit devant elle les signes par lesquels il avait égaré ceux qui avaient reçu la marque de la bête et qui se prosternaient devant son image. Tous deux furent jetés vivants dans l''étang de feu où brûle le soufre. '
  '21':
  - type: note
    content: épée 1.16+. –  oiseaux v. 17s.
  - type: text
    content: Les autres furent tués par l'épée qui sortait de la bouche de celui qui montait le cheval, et tous les oiseaux se rassasièrent de leurs chairs.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Sa fumée  : celle de la prostituée ; cf. 14.11+.'
  - type: text
    content: 'Ils dirent une seconde fois :'
  - type: text
    content: Alléluia !
  - type: text
    content: Sa fumée monte à tout jamais !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'anciens / êtres vivants 4.4+,6+. –  se prosternèrent  : 3.9+ ; Mt 2.2+ ; voir culte. –  sur le trône 4.2+. –  Amen ! Alléluia ! v. 1n  ; Ps 106.48n.'
  - type: text
    content: 'Les vingt-quatre anciens et les quatre êtres vivants tombèrent et se prosternèrent devant Dieu qui est assis sur le trône, en disant :'
  - type: text
    content: Amen ! Alléluia !
  '5':
  - type: text
    content: ' '
  - type: note
    content: Du trône 16.17+. –  Louez… Ps 22.24 ; 134.1 ; 135.1,20. –  vous qui le craignez Lc 1.50+. –  petits / grands 11.18+.
  - type: text
    content: 'Du trône sortit une voix qui disait :'
  - type: text
    content: Louez notre Dieu,
  - type: text
    content: vous tous, ses esclaves,
  - type: text
    content: vous qui le craignez,
  - type: text
    content: petits et grands !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'grande foule v. 1+. –  grandes eaux 1.15+. –  tonnerres 6.1+. –  le Seigneur, notre Dieu  : certains mss portent le Seigneur Dieu . –  Tout-Puissant 1.8+. –  instauré son règne 11.17+.'
  - type: text
    content: 'Et j''entendis comme la voix d''une grande foule, comme le bruit de grandes eaux et comme le bruit de forts tonnerres, qui disait :'
  - type: text
    content: Alléluia !
  - type: text
    content: Car le Seigneur, notre Dieu, le Tout-Puissant, a instauré son règne.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Réjouissons-nous… d'allégresse Ps 118.24 ; Mt 5.12. –  donnons-lui gloire 1Ch 16.28. –  les noces de l'agneau v. 9 ; cf. 21.2,9 ; Es 54.1-8 ; Os 2.16-18 ; Mt 22.2+ ; 25.1-13 ; Ep 5.23,25,32.
  - type: text
    content: Réjouissons-nous, soyons transportés d'allégresse et donnons-lui gloire,
  - type: text
    content: car les noces de l'agneau sont venues, et son épouse s'est préparée.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'vêtue de fin lin… pur v. 14 ; 15.6 ; cf. Es 61.10. –  la justice  : autre traduction les actes de justice  ; 15.4n. – Voir saints.'
  - type: text
    content: Il lui a été donné d'être vêtue de fin lin, resplendissant et pur.
  - type: text
    content: – Le fin lin, c'est la justice des saints.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Il me dit  : il s''agit probablement d''un ange. –  Ecris 1.11+. –  Heureux 1.3+ ; cf. Lc 14.15ss. –  invités  : litt. appelés . –  noces v. 7+. –  les vraies paroles  : autre traduction les paroles vraies  ; 21.5n  ; 22.6.'
  - type: text
    content: 'Il me dit : Ecris : Heureux ceux qui sont invités au dîner des noces de l''agneau ! Puis il me dit : Ce sont là les vraies paroles de Dieu. '
