document_id: NUM.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les cassolettes des partisans de Coré
  - type: text
    content: ' '
  - type: note
    content: A la suite de Vg, certaines éditions rattachent les quinze premiers v. du chap. 17 au chap. 16 (v. 36-50) et la numérotation de la suite est décalée en conséquence.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'Retirez-vous…  : litt. enlevez-vous du milieu de cette communauté  ; cf. 16.21 ; Gn 19.14. –  Ils tombèrent… 14.5+.'
  - type: text
    content: 'Retirez-vous de cette communauté, je les exterminerai en un instant ! Ils tombèrent face contre terre. '
  '11':
  - type: note
    content: 'Prends la cassolette…  : cf. 16.6s,17. –  fais sur eux l''expiation  : Vg prie pour eux  ; cf. Ex 32.11ss ; Dt 9.18ss ; Ps 106.23 ; voir aussi Mt 5.44 ; Sagesse 18.20ss : « La colère ne dura pas longtemps. En effet un homme irréprochable se hâta pour les protéger : muni des armes propres à son ministère, la prière et l''encens qui apaise. Il affronta la fureur et mit fin à la calamité, montrant qu''il était bien ton serviteur. Il triompha du courroux, non par la force physique ou l''efficacité des armes, mais c''est par la parole qu''il maîtrisa l''exécuteur du châtiment, en rappelant les serments et les alliances patriarcales. Alors que déjà les cadavres s''entassaient, il s''interposa, brisa l''assaut et lui barra le chemin qui menait aux vivants. Sur la longue robe de l''éphod était figuré l''univers entier, les noms glorieux des pères étaient gravés sur les quatre rangées de pierres et ta majesté sur le diadème de sa tête (description des vêtements sacerdotaux, cf. Ex 28). A cette vue, l''Exterminateur recula et fut même saisi de peur. » –  la Colère…  : cf. 1.53n. –  le fléau  : cf. 8.19 ; 11.33n (autre terme) ; 14.37 ; Ex 12.13 ; 30.12 ; Jos 22.17 ; 1Co 10.10.'
  - type: text
    content: 'Moïse dit à Aaron : Prends la cassolette, mets-y du feu de l''autel, places-y de l''encens, va vite vers la communauté et fais sur eux l''expiation : la Colère est sortie de devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le fléau a commencé ! '
  '12':
  - type: note
    content: Cf. 16.16ss,35 ; voir 21.6ss. Le mot correspondant à la cassolette est sous-entendu dans le texte.
  - type: text
    content: 'Aaron prit la cassolette, comme Moïse l''avait dit, et il courut au milieu de l''assemblée ; le fléau avait commencé dans le peuple. Il mit l''encens et fit l''expiation sur le peuple. '
  '13':
  - type: note
    content: 'entre les morts et les vivants  : cf. 2S 24/ / ; Mt 25.33ss ; Lc 23.34,39ss.'
  - type: text
    content: 'Il se tint debout entre les morts et les vivants, et le fléau s''arrêta. '
  '14':
  - type: note
    content: dans l'affaire de Coré 16.35.
  - type: text
    content: 'Le fléau avait fait 14 700 morts, outre ceux qui étaient morts dans l''affaire de Coré. '
  '15':
  - type: text
    content: Aaron revint auprès de Moïse, à l'entrée de la tente de la Rencontre. Le fléau s'était arrêté.
  - type: heading
    content: Le bâton d'Aaron
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ce v. est numéroté 17.1 dans certaines bibles, voir v. 1n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '17':
  - type: note
    content: 'Israélites  : autre traduction fils d''Israël, cf. Ex 28.9n. –  demande-leur  : litt. prends d''eux. –  bâton  : outre ses sens voisins de branche, sceptre, le mot hébreu signifie aussi tribu (p. ex. 1.4 ; 18.2n) ; cf. 20.8s ; 21.18 ; Gn 38.18 ; 49.10 ; Ex 4.2 ; 7.9,19 ; 8.1,12 ; Os 4.12 ; cf. Protévangile de Jacques 8–9 (légende du mariage de Marie) : « Un ange du Seigneur se tint devant lui (le prêtre), disant : “Zacharie, Zacharie, sors et convoque les veufs du peuple, et qu''ils apportent chacun une baguette ; et de celui à qui le Seigneur Dieu montrera un signe elle sera la femme.” (…) Ensemble, ils se rendirent chez le prêtre avec leurs baguettes. Or le prêtre, ayant reçu d''eux les baguettes, entra dans le Temple et pria. Et, quand il eut achevé sa prière, il prit les baguettes, sortit et les leur donna ; et il n''y avait point de signe en elles. Or la dernière baguette, c''est Joseph qui la reçut. Et voici qu''une colombe sortit de la baguette et se percha sur la tête de Joseph. Et le prêtre dit : “Joseph, Joseph, c''est toi qui es désigné par le sort pour prendre sous ta garde la vierge du Seigneur.” [Puis, en réponse aux hésitations de Joseph] “Joseph, crains le Seigneur ton Dieu, et souviens-toi de tout ce que Dieu a fait à Dathan, Abiram et Coré…” » –  famille 1.44n  ; 18.1.'
  - type: text
    content: 'Parle aux Israélites ; demande-leur un bâton par famille, un bâton à chacun de leurs princes, famille par famille, soit douze bâtons. Tu écriras le nom de chacun sur son bâton. '
  '18':
  - type: note
    content: 'Voir nom. –  Aaron / Lévi  : cf. v. 21 ; comparer avec 1.49 ; 3.6ss,17 ; 16.3ss ; Ez 44.'
  - type: text
    content: 'Tu écriras le nom d''Aaron sur le bâton de Lévi : il y aura un bâton pour chaque chef de famille. '
  '19':
  - type: note
    content: 'le Témoignage, c.-à-d. les tablettes de la Loi (Ex 31.18) : cf. v. 22s,25 ; 1.50+ ; Ex 16.34 ; 25.16 ; 40.20 ; voir aussi Dt 10.1ss. –  je vous rencontre ou, selon quelques mss hébreux et LXX, je te rencontre  ; cf. Ex 25.22.'
  - type: text
    content: 'Tu les déposeras dans la tente de la Rencontre, devant le Témoignage, là où je vous rencontre. '
  '2':
  - type: note
    content: 'Eléazar v. 4 ; 3.32 ; 19.3 ; 26.1,63 ; 31.12,54 ; 32.1s ; Ex 6.23ss ; Lv 10.6. –  disperser  : le verbe hébreu correspondant est souvent traduit par disséminer (Ex 32.20) ; il signifie aussi vanner (Rt 3.2). –  le feu  : LXX le feu étranger ou profane, cf. 16.7,18 ; Lv 10.1ss. –  elles sont sacrées ou elles sont devenues sacrées  ; LXX car ils ont consacré (ou sanctifié) (3) les cassolettes…  ; cf. Ex 29.37 ; 30.29 ; Lv 6.11 ; voir saint.'
  - type: text
    content: 'Dis à Eléazar, fils d''Aaron, le prêtre, d''enlever de l''incendie les cassolettes et d''en disperser le feu, car elles sont sacrées. '
  '20':
  - type: note
    content: Cf. Hé 5.4 ; 9.1ss. –  bourgeonnera ou fleurira  ; un verbe très proche est traduit par être fécond en Es 11.1s.
  - type: text
    content: L'homme que je choisirai, son bâton bourgeonnera ; ainsi je ferai en sorte que les Israélites cessent de maugréer contre vous.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'le bâton d''Aaron…  : Vg douze bâtons sans compter le bâton d''Aaron , cf. chap. 1. Voir cependant v. 23.'
  - type: text
    content: 'Moïse parla aux Israélites ; tous leurs princes lui donnèrent un bâton, chaque prince un bâton, famille par famille, soit douze bâtons ; le bâton d''Aaron était au milieu de leurs bâtons. '
  '22':
  - type: note
    content: tente du Témoignage 1.50+ ; 9.15 ; 18.2.
  - type: text
    content: 'Moïse déposa les bâtons devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans la tente du Témoignage. '
  '23':
  - type: note
    content: 'la maison  : autres traductions la maisonnée, la famille. –  des amandes  : cf. Jr 1.11n.'
  - type: text
    content: 'Le lendemain, lorsque Moïse entra dans la tente du Témoignage, le bâton d''Aaron, pour la maison de Lévi, avait bourgeonné : il avait produit des bourgeons, donné des fleurs et fait mûrir des amandes. '
  '24':
  - type: note
    content: 'et les montra  : sous-entendu dans le texte.'
  - type: text
    content: 'Moïse retira tous les bâtons de devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les montra à tous les Israélites ; ils les virent, et chacun reprit son bâton.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 4s ; Ex 16.34 ; Hé 9.4. –  afin qu''il soit conservé  : la même formule est traduite par assurer le service en 1.53+ ; cf. 19.9 ; Ex 16.34n. –  les rebelles  : litt. les fils de la rébellion . –  ils ne mourront pas v. 6,14 ; cf. 1.53.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Rapporte le bâton d''Aaron devant le Témoignage, afin qu''il soit conservé comme un signe pour les rebelles. Tu les empêcheras ainsi de maugréer contre moi, et ils ne mourront pas. '
  '26':
  - type: text
    content: 'Moïse fit ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait ordonné ; ainsi fit-il.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 12ss ; 1.50ss ; 3.5ss ; 16.29ss ; 18.5,7. –  C''en est fini de nous  : litt. nous expirons , cf. v. 28n  ; 20.3n.'
  - type: text
    content: 'Les Israélites dirent à Moïse : C''en est fini de nous, nous sommes perdus, nous sommes tous perdus ! '
  '28':
  - type: note
    content: 'Cf. 1.51 ; 3.10,38. –  se présente devant ou approche de (Lv 1.2n) ; le terme correspondant est répété deux fois dans le texte. –  finir ainsi  : litt. expirer, v. 27n.'
  - type: text
    content: 'Quiconque se présente devant la demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: ' meurt ! Nous faudra-t-il tous finir ainsi ?'
  '3':
  - type: note
    content: 'Cf. 21.8s ; 1S 6.3ss. – Voir péché. –  au prix de leur vie  : autre traduction contre eux-mêmes  ; sur le terme correspondant, voir Gn 1.20n. –  lames Ex 39.3. –  pour en revêtir l''autel  : cf. Ex 27.2 ; 38.2. –  sacrées Lv 10.6 ; cf. Es 9.4 ; Am 4.11. –  un signe pour  : cf. Gn 1.14n.'
  - type: text
    content: 'Avec les cassolettes de ces gens qui ont péché au prix de leur vie, que l''on fasse des lames étirées pour en revêtir l''autel. Puisqu''elles ont été présentées devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et qu''elles sont ainsi devenues sacrées, elles seront un signe pour les Israélites. '
  '4':
  - type: text
    content: 'Eléazar, le prêtre, prit les cassolettes de bronze qu''avaient présentées les victimes de l''incendie, et il en fit des lames pour en revêtir l''autel. '
  '5':
  - type: note
    content: 'Cf. v. 25. Sur l''attribution des fonctions sacerdotales (voir lévite et prêtre), cf. 3.10,38 ; 18.7 ; Dt 33.10 ; 1Ch 23.13 ; 2Ch 26.16ss. –  un rappel  : autre traduction une évocation, cf. Ex 12.14n  ; 13.9n  ; Jos 4.7. –  profane, étranger 1.51n. –  selon ce que le Seigneur a dit  : cf. 16.7.'
  - type: text
    content: 'C''est un rappel pour les Israélites, afin qu''aucun homme profane, étranger à la descendance d''Aaron, ne se présente pour faire fumer de l''encens devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et ne devienne comme Coré et comme sa communauté, selon ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit par l''intermédiaire de Moïse.'
  - type: heading
    content: Le peuple maugrée contre Moïse et Aaron
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 14.2,10ss ; 16.3ss ; Ex 16.2.
  - type: text
    content: 'Le lendemain, toute la communauté des Israélites se mit à maugréer contre Moïse et Aaron, en disant : C''est vous qui avez fait mourir le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '7':
  - type: note
    content: 'Cf. 9.15ss ; 14.10,21s ; 16.19 ; Ex 16.7. –  comme ils  : autre traduction comme ceux-ci. – Voir gloire.'
  - type: text
    content: 'Comme la communauté se rassemblait contre Moïse et Aaron, et comme ils se tournaient vers la tente de la Rencontre, la nuée la couvrit et la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut. '
  '8':
  - type: text
    content: 'Moïse et Aaron arrivèrent devant la tente de la Rencontre. '
  '9':
  - type: note
    content: 'à Moïse  : LXX et Syr ajoutent et à Aaron.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
