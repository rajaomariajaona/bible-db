      - type: text
        text: '8–9 (légende du mariage de Marie) : « Un ange du Seigneur se tint devant lui (le prêtre), disant : “Zacharie, Zacharie, sors et convoque les veufs du peuple, et qu''ils apportent chacun une baguette ; et de celui à qui le Seigneur Dieu montrera un signe elle sera la femme.” (…) Ensemble, ils se rendirent chez le prêtre avec leurs baguettes. Or le prêtre, ayant reçu d''eux les baguettes, entra dans le Temple et pria. Et, quand il eut achevé sa prière, il prit les baguettes, sortit et les leur donna ; et il n''y avait point de signe en elles. Or la dernière baguette, c''est Joseph qui la reçut. Et voici qu''une colombe sortit de la baguette et se percha sur la tête de Joseph. Et le prêtre dit : “Joseph, Joseph, c''est toi qui es désigné par le sort pour prendre sous ta garde la vierge du Seigneur.” [Puis, en réponse aux hésitations de Joseph] “Joseph, crains le Seigneur ton Dieu, et souviens-toi de tout ce que Dieu a fait à Dathan, Abiram et Coré…” » –  '
