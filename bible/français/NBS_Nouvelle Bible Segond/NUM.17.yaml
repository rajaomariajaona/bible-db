    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils tombèrent… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.5+.
    marker-yv: yv-n
  - type: text
    text: 'Retirez-vous de cette communauté, je les exterminerai en un instant ! Ils tombèrent face contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Prends la cassolette…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.6s,17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fais sur eux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'expiation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prie pour eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 32.11ss ; Dt 9.18ss ; Ps 106.23 ; voir aussi Mt 5.44 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.20ss : « La colère ne dura pas longtemps. En effet un homme irréprochable se hâta pour les protéger : muni des armes propres à son ministère, la prière et l''encens qui apaise. Il affronta la fureur et mit fin à la calamité, montrant qu''il était bien ton serviteur. Il triompha du courroux, non par la force physique ou l''efficacité des armes, mais c''est par la parole qu''il maîtrisa l''exécuteur du châtiment, en rappelant les serments et les alliances patriarcales. Alors que déjà les cadavres s''entassaient, il s''interposa, brisa l''assaut et lui barra le chemin qui menait aux vivants. Sur la longue robe de l''éphod était figuré l''univers entier, les noms glorieux des pères étaient gravés sur les quatre rangées de pierres et ta majesté sur le diadème de sa tête (description des vêtements sacerdotaux, cf. Ex 28). A cette vue, l''Exterminateur recula et fut même saisi de peur. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la Colère…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.53'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le fléau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.19 ; 11.33'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' (autre terme) ; 14.37 ; Ex 12.13 ; 30.12 ; Jos 22.17 ; 1Co 10.10.'
    marker-yv: yv-n
  - type: text
    text: 'Moïse dit à Aaron : Prends la cassolette, mets-y du feu de l''autel, places-y de l''encens, va vite vers la communauté et fais sur eux l''expiation : la Colère est sortie de devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; le fléau a commencé ! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 16.16ss,35 ; voir 21.6ss. Le mot correspondant à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la cassolette '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est sous-entendu dans le texte.
    marker-yv: yv-n
  - type: text
    text: 'Aaron prit la cassolette, comme Moïse l''avait dit, et il courut au milieu de l''assemblée ; le fléau avait commencé dans le peuple. Il mit l''encens et fit l''expiation sur le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: entre les morts et les vivants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2S 24/ / ; Mt 25.33ss ; Lc 23.34,39ss.'
    marker-yv: yv-n
  - type: text
    text: 'Il se tint debout entre les morts et les vivants, et le fléau s''arrêta. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans l''affaire de Coré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 16.35.
    marker-yv: yv-n
  - type: text
    text: 'Le fléau avait fait 14 700 morts, outre ceux qui étaient morts dans l''affaire de Coré. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aaron revint auprès de Moïse, à l'entrée de la tente de la Rencontre. Le fléau s'était arrêté.
