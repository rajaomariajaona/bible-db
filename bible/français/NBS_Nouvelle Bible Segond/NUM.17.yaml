        text: comme ils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme ceux-ci
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme la communauté se rassemblait contre Moïse et Aaron, et comme ils se tournaient vers la tente de la Rencontre, la nuée la couvrit et la gloire du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' apparut. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
