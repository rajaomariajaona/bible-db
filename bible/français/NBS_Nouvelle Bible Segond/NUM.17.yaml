  - type: text
    text: 'Avec les cassolettes de ces gens qui ont péché au prix de leur vie, que l''on fasse des lames étirées pour en revêtir l''autel. Puisqu''elles ont été présentées devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et qu''elles sont ainsi devenues sacrées, elles seront un signe pour les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eléazar, le prêtre, prit les cassolettes de bronze qu''avaient présentées les victimes de l''incendie, et il en fit des lames pour en revêtir l''autel. '
  - type: usfm
    marker: v
