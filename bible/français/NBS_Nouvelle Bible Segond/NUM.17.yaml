    marker-yv: yv-n
  - type: text
    text: 'C''est un rappel pour les Israélites, afin qu''aucun homme profane, étranger à la descendance d''Aaron, ne se présente pour faire fumer de l''encens devant le '
  - type: usfm
    marker: nd
