    marker-yv: yv-n
  - type: text
    text: 'Le lendemain, toute la communauté des Israélites se mit à maugréer contre Moïse et Aaron, en disant : C''est vous qui avez fait mourir le peuple du '
  - type: usfm
    marker: nd
