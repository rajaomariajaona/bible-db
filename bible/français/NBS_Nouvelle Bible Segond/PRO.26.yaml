document_id: PRO.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'homme stupide
  - type: text
    content: ' '
  - type: note
    content: stupide v. 3-12 ; cf. 1.22+.
  - type: text
    content: Pas plus que la neige en été, que la pluie pendant la moisson,
  - type: text
    content: la gloire ne convient à un homme stupide.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction difficile ; litt. un grand (ou un archer  ?) qui transperce tout, et celui qui prend à gages un stupide et celui qui prend à gages des passants . On a proposé des corrections diverses du texte hébreu traditionnel, par exemple  : un archer qui transperce tous les passants, tel est celui qui prend à gages un homme stupide ou un ivrogne . LXX tous les gens déraisonnables sont bien agités, mais leur exaltation sera réprimée.'
  - type: text
    content: Un archer qui blesse tout le monde,
  - type: text
    content: tel est celui qui engage un homme stupide ou qui engage le premier venu.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'un chien qui retourne…  : cf. 2P 2.22.'
  - type: text
    content: Comme un chien qui retourne à ce qu'il a vomi,
  - type: text
    content: tel est l'homme stupide qui revient à son imbécillité.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'As-tu vu…  : litt. tu as vu  ; autre verbe (synonyme) en 29.20. –  se croit sage  : cf. 3.7n. –  Il y a plus… 29.20.'
  - type: text
    content: As-tu vu un homme qui se croit sage ?
  - type: text
    content: Il y a plus d'espoir pour un homme stupide que pour lui.
  - type: heading
    content: Portrait du paresseux
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 22.13. –  Le paresseux  : pour ce terme qui revient dans les v. 14,15,16, voir 6.6n.'
  - type: text
    content: 'Le paresseux dit : « Il y a un fauve sur la route !'
  - type: text
    content: Il y a un lion sur la place ! »
  '14':
  - type: text
    content: La porte tourne sur ses gonds,
  - type: text
    content: le paresseux sur son lit.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'il est trop fatigué…  : autre traduction il trouve fatigant de la ramener à sa bouche  ; cf. 19.24.'
  - type: text
    content: Le paresseux plonge sa main dans le plat,
  - type: text
    content: et il est trop fatigué pour la ramener à sa bouche.
  '16':
  - type: text
    content: Le paresseux se croit plus sage
  - type: text
    content: que sept hommes qui répondent avec du jugement.
  - type: heading
    content: Autres maximes
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'par les oreilles  : LXX par la queue . –  qui s''immisce  : autre traduction qui s''emporte  ; le terme est de la même racine que celui qui a été traduit par passant.'
  - type: text
    content: Comme celui qui saisit un chien par les oreilles,
  - type: text
    content: tel est un passant qui s'immisce dans une querelle dont il n'a que faire.
  '18':
  - type: text
    content: Comme un fou furieux qui lance des flammes,
  - type: text
    content: des flèches et la mort,
  '19':
  - type: text
    content: ' '
  - type: note
    content: C'était pour plaisanter ! autre traduction je m'amuse bien !
  - type: text
    content: tel est l'homme qui trompe son prochain,
  - type: text
    content: 'puis qui dit : « C''était pour plaisanter ! »'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Comme l''oiseau s''échappe Ps 11.1n. –  malédiction  : voir bénédiction. –  n''aboutit à rien  : litt. n''arrive pas  ; autre lecture traditionnelle retombe sur lui (sur celui qui l''a lancée).'
  - type: text
    content: Comme l'oiseau s'échappe, comme l'hirondelle s'envole,
  - type: text
    content: ainsi une malédiction sans raison n'aboutit à rien.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'pas de médisant…  : cf. 22.10.'
  - type: text
    content: Faute de bois, le feu s'éteint ;
  - type: text
    content: quand il n'y a pas de médisant, la dispute se calme.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'l''homme de disputes  : cf. 15.18n  ; 29.22.'
  - type: text
    content: Du charbon sur des braises, du bois sur du feu,
  - type: text
    content: tel est l'homme de disputes qui attise la querelle.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Les paroles du médisant… 18.8. –  jusqu''au fin fond du corps  : sens possible elles restent en mémoire.'
  - type: text
    content: 'Les paroles du médisant sont comme des friandises :'
  - type: text
    content: elles descendent jusqu'au fin fond du corps.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Des scories d''argent  : peut-être un minerai d''argent peu purifié, ou bien de la litharge, un protoxyde de plomb dont on enduisait les poteries pour leur donner un reflet argenté. Certains modifient le texte hébreu traditionnel pour lire de l''argent plaqué  ; LXX de l''argent donné par ruse est à considérer comme un tesson . –  ardentes  : d''après LXX, certains modifient le texte hébreu traditionnel pour lire enjôleuses (cf. v. 28 ; 2.16n).'
  - type: text
    content: Des scories d'argent plaquées sur un vase de terre,
  - type: text
    content: telles sont des lèvres ardentes et un cœur mauvais.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'qui déteste ou qui hait  ; un terme apparenté est traduit par haine au v. 26. –  par ses lèvres  : cf. 6.12 ; Siracide 12.10s : « Ne te fie jamais à ton ennemi ; car sa méchanceté est pareille au bronze qui s''altère. Même s''il fait l''humble et chemine courbé, fais attention et prends garde à lui ; sois pour lui comme un polisseur de miroir, sache qu''il ne restera pas toujours taché de rouille. »'
  - type: text
    content: Celui qui déteste se déguise par ses lèvres ;
  - type: text
    content: il met au dedans de lui la tromperie.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'de la grâce dans sa voix  : cf. Siracide 27.23 : « Sous tes yeux sa bouche est tout miel et il s''extasiera devant tes paroles ; mais par derrière il change de langage et fait de tes paroles un objet de scandale. »'
  - type: text
    content: 'Lorsqu''il met de la grâce dans sa voix, ne le crois pas :'
  - type: text
    content: il y a sept abominations dans son cœur.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'son mal  : l''expression peut signifier sa méchanceté ; le mal qu''il a fait ; son malheur . –  dans l''assemblée  : c.-à-d. aux yeux de tous.'
  - type: text
    content: Sa haine peut se couvrir de dissimulation,
  - type: text
    content: son mal se dévoilera dans l'assemblée.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'creuse une fosse…  : cf. 1.31n  ; Ps 7.16 ; 9.16 ; 57.7 ; Ec 10.8 ; Siracide 27.25-27 : « Qui lance une pierre en l''air la lance sur sa tête ; et un coup perfide entraîne des blessures en retour. Qui creuse une fosse y tombera, qui tend un piège y sera attrapé. Le mal qu''un homme fait se retourne contre lui, sans même qu''il sache d''où cela lui arrive. »'
  - type: text
    content: Celui qui creuse une fosse y tombe ;
  - type: text
    content: la pierre revient sur celui qui la roule.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'La langue menteuse…  : cf. 6.12,17+. –  déteste…  : sens incertain ; LXX déteste la vérité  ; on modifie parfois le texte hébreu traditionnel pour lire amène le tumulte (l''expression traduite par élever un grondement en Ps 93.3). –  enjôleuse  : autres traductions flatteuse, complaisante  ; cf. 2.16n.'
  - type: text
    content: La langue menteuse déteste ceux qu'elle écrase ;
  - type: text
    content: la bouche enjôleuse provoque la ruine.
  '3':
  - type: text
    content: ' '
  - type: note
    content: un bâton 10.13n. –  stupides v. 1+.
  - type: text
    content: Il y a un fouet pour le cheval, un mors pour l'âne,
  - type: text
    content: et un bâton pour le dos des gens stupides.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'stupide  : cf. v. 5-12 ; 1.22+. –  imbécillité 15.21n.'
  - type: text
    content: Ne réponds pas à l'homme stupide selon son imbécillité,
  - type: text
    content: de peur de lui ressembler toi-même.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 4.
  - type: text
    content: Réponds à l'homme stupide selon son imbécillité,
  - type: text
    content: de peur qu'il ne se croie sage.
  '6':
  - type: text
    content: Il se coupe les jambes, il s'abreuve de violence,
  - type: text
    content: celui qui confie des messages à un homme stupide.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Les jambes  : litt. les cuisses . –  telle est une maxime… v. 9.'
  - type: text
    content: Les jambes du boiteux sont faibles ;
  - type: text
    content: telle est une maxime dans la bouche de gens stupides.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'une pierre à une fronde  : attacher une pierre à une fronde est déraisonnable, et même dangereux, puisque la pierre ne peut être lancée et peut venir frapper celui qui manie la fronde.'
  - type: text
    content: C'est attacher une pierre à une fronde
  - type: text
    content: que de donner gloire à un homme stupide.
  '9':
  - type: text
    content: ' '
  - type: note
    content: telle est une maxime… v. 7.
  - type: text
    content: Une épine d'ajonc dressée dans la main d'un ivrogne,
  - type: text
    content: telle est une maxime dans la bouche de gens stupides.
