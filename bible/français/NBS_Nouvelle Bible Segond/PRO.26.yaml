        children:
        - type: text
          text: '12.10s : « Ne te fie jamais à ton ennemi ; car sa méchanceté est pareille au bronze qui s''altère. Même s''il fait l''humble et chemine courbé, fais attention et prends garde à lui ; sois pour lui comme un polisseur de miroir, sache qu''il ne restera pas toujours taché de rouille. »'
      marker-yv: yv-n
    - type: text
      text: Celui qui déteste se déguise par ses lèvres ;
  - type: usfm
    marker: q1
    children:
    - type: text
