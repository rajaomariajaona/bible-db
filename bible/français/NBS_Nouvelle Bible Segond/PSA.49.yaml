document_id: PSA.49,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un homme n'emporte rien en mourant
  - type: text
    content: ' '
  - type: note
    content: 42.1n.
  - type: text
    content: Du chef de chœur. Des fils de Coré. Psaume.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'On pourrait aussi comprendre ce v. comme la suite de la phrase commencée au v. 8  : leur rançon pour vivre toujours…'
  - type: text
    content: Vivrait-on toujours,
  - type: text
    content: sans voir la fosse ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 18 ; 39.7 ; Jb 21.23-26 ; Ec 2.14-16 ; 6.8 ; Lc 12.16+. –  stupide Pr 1.22+.
  - type: text
    content: Car, on le voit, les sages meurent,
  - type: text
    content: l'homme stupide et l'abruti disparaissent également
  - type: text
    content: et laissent leurs biens à d'autres.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Ils s''imaginent  : traduction incertaine, litt. leur intérieur , ce qui pourrait signifier en eux-mêmes ils croient  ; toutefois des versions anciennes ont lu leurs tombeaux seront leurs maisons pour toujours… , ce qui correspondrait à une inversion de deux lettres dans le texte hébreu ; cf. Es 5.8 ; Ec 12.5. –  qui avaient donné leurs noms…  : en signe de propriété perpétuelle, cf. 2S 12.26-28.'
  - type: text
    content: Ils s'imaginent que leurs maisons subsisteront toujours,
  - type: text
    content: et leurs demeures de génération en génération,
  - type: text
    content: eux qui avaient donné leurs noms à des terres.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'ne dure pas  : litt. ne passe pas la nuit  ; le verbe hébreu traduit par n''a pas d''intelligence au v. 21 ne diffère de celui-ci que par une seule lettre ; des versions anciennes ont ici le même texte qu''au v. 21. –  semblable aux bêtes qui périssent ou qui sont réduites au silence (même verbe 83.2, être silencieux ) ; Ec 3.18-21.'
  - type: text
    content: Mais l'humain qui est en honneur ne dure pas,
  - type: text
    content: il est semblable aux bêtes qui périssent.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'leur stupidité  : cf. v. 11 ; autres traductions leur assurance ou leur confiance en eux-mêmes  ; cf. 78.7 ; 85.9n. –  ceux qui les suivent  : traduction incertaine, litt. après eux  ; certains modifient le texte hébreu traditionnel pour lire les chemins (ou la destinée ) de ceux qui se plaisent à leurs discours (litt. leur bouche ) ; cf. 73.10 ; Jb 8.13n.'
  - type: text
    content: Telle est leur voie, leur stupidité,
  - type: text
    content: 'et ceux qui les suivent se plaisent à leurs discours. '
  - type: text
    content: Pause.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction conjecturale. –  en fait sa pâture ou les y mène paître  ; autre traduction la mort en sera le berger. –  leur beauté ou, selon une variante de certains mss hébreux et versions anciennes, leur rocher, leur secours (cf. Dt 32.31). –  est leur résidence  : litt. d''une résidence pour lui  ; certains comprennent dans le séjour des morts, loin de leur résidence (même terme en 1R 8.13/ / ; Es 63.15 ; Ha 3.11n).'
  - type: text
    content: Comme un troupeau, ils sont mis dans le séjour des morts,
  - type: text
    content: la mort en fait sa pâture ;
  - type: text
    content: et bientôt les gens droits les foulent aux pieds,
  - type: text
    content: leur beauté s'évanouit, le séjour des morts est leur résidence.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 30.4 ; 2S 4.9 ; Os 13.14. –  il me prendra  : cf. 73.24n  ; Gn 5.24 ; 2R 2.3,5 ; Lc 16.22.'
  - type: text
    content: Mais Dieu me libérera du séjour des morts,
  - type: text
    content: 'car il me prendra. '
  - type: text
    content: Pause.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 's''enrichit  : autre traduction est riche. –  fortune  : litt. gloire , de même au v. 18 ; cf. 73.12-20.'
  - type: text
    content: N'aie pas peur quand un homme s'enrichit,
  - type: text
    content: quand la fortune de sa maison s'accroît ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. 76.6 ; Jb 27.19 ; 1Tm 6.7.
  - type: text
    content: car il n'emporte rien en mourant,
  - type: text
    content: sa fortune ne descend pas derrière lui.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Il pourra s''estimer heureux  : litt. il (ou son âme , 6.4n) se bénira.'
  - type: text
    content: Il pourra s'estimer heureux pendant sa vie.
  - type: text
    content: On te célébrera parce que tu t'es bien traité,
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 34.1 ; Jl 1.2 ; Pr 8.4ss. –  habitants du monde  : cf. 17.14n  ; Jb 11.17n.'
  - type: text
    content: Ecoutez, vous tous, peuples,
  - type: text
    content: prêtez l'oreille, vous tous, habitants du monde,
  '20':
  - type: text
    content: ' '
  - type: note
    content: la lumière Jb 10.21s.
  - type: text
    content: tu iras néanmoins vers la génération de tes pères,
  - type: text
    content: qui jamais ne reverront la lumière.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 13n.
  - type: text
    content: L'humain qui est en honneur, et qui n'a pas d'intelligence,
  - type: text
    content: est semblable aux bêtes qui périssent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'petits et grands  : traduction incertaine ; litt. fils d''humain (= Adam) et fils d''homme (masculin), la deuxième formule étant aussi celle de 4.3 ; voir aussi 62.10n. –  ensemble ou également  ; cf. v. 11.'
  - type: text
    content: petits et grands,
  - type: text
    content: riches et pauvres ensemble !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 37.30 ; 45.2 ; Pr 10.31. –  mon cœur murmure ou médite 1.2n.
  - type: text
    content: Ma bouche prononce des paroles sages,
  - type: text
    content: mon cœur murmure des choses intelligentes.
  '5':
  - type: text
    content: ' '
  - type: note
    content: poème 78.2n.
  - type: text
    content: Je tends l'oreille pour le poème,
  - type: text
    content: j'expliquerai mes énigmes au son de la lyre.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'jours du malheur 27.5+. –  de mes adversaires  : litt. de mes talons , texte obscur ; cf. 41.10 ; Jr 17.9 (terme apparenté pour tortueux ) ; Os 12.2-8 ; voir aussi Ps 7.2.'
  - type: text
    content: Pourquoi aurais-je peur aux jours du malheur,
  - type: text
    content: alors que la faute de mes adversaires est tout autour de moi ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. 52.9 ; Jr 9.22 ; Pr 11.28 ; Lc 12.16-21.
  - type: text
    content: Ils placent leur confiance en leurs biens
  - type: text
    content: et ils sont fiers de leur grande richesse.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Un homme…  : litt. un frère ne libère pas un homme  ; certains mss portent un texte légèrement différent, qu''on pourrait traduire toutefois personne ne peut libérer personne  ; ou, avec une modification supplémentaire de la vocalisation traditionnelle, personne ne peut se libérer . –  le prix de sa rançon  : sa propre rançon ou celle de l''autre ; cf. Ex 21.29-30n  ; Pr 6.35n  ; 13.8 ; voir aussi Mt 16.26 ; Mc 8.37 ; 1Tm 2.6+.'
  - type: text
    content: Un homme ne peut libérer son frère,
  - type: text
    content: ni donner à Dieu le prix de sa rançon.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'elle n''aura jamais lieu  : traduction incertaine, litt. il (ou elle ) cesse pour toujours  ; on pourrait comprendre  : leur vie prend fin pour toujours ; il leur faut renoncer définitivement (à leur libération ) ; il manquera toujours (de l''argent pour payer la rançon). Sur le terme correspondant à libération , cf. Dt 7.8n.'
  - type: text
    content: Leur libération est trop chère,
  - type: text
    content: elle n'aura jamais lieu ;
