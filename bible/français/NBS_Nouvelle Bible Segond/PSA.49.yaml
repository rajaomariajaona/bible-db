document_id: PSA.49,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un homme n'emporte rien en mourant
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Du chef de chœur. Des fils de Coré. Psaume.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On pourrait aussi comprendre ce v. comme la suite de la phrase commencée au v. 8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur rançon pour vivre toujours…
      marker-yv: yv-n
    - type: text
      text: Vivrait-on toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans voir la fosse ?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 18 ; 39.7 ; Jb 21.23-26 ; Ec 2.14-16 ; 6.8 ; Lc 12.16+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'stupide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pr 1.22+.
      marker-yv: yv-n
    - type: text
      text: Car, on le voit, les sages meurent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'homme stupide et l'abruti disparaissent également
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et laissent leurs biens à d'autres.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils s'imaginent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur intérieur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en eux-mêmes ils croient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; toutefois des versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leurs tombeaux seront leurs maisons pour toujours…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui correspondrait à une inversion de deux lettres dans le texte hébreu ; cf. Es 5.8 ; Ec 12.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui avaient donné leurs '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : en signe de propriété perpétuelle, cf. 2S 12.26-28.'
      marker-yv: yv-n
    - type: text
      text: Ils s'imaginent que leurs maisons subsisteront toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs demeures de génération en génération,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux qui avaient donné leurs noms à des terres.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne dure pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne passe pas la nuit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le verbe hébreu traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'n''a pas d''intelligence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 21 ne diffère de celui-ci que par une seule lettre ; des versions anciennes ont ici le même texte qu''au v. 21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'semblable aux bêtes qui périssent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui sont réduites au silence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même verbe 83.2, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: être silencieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; Ec 3.18-21.
      marker-yv: yv-n
    - type: text
      text: Mais l'humain qui est en honneur ne dure pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est semblable aux bêtes qui périssent.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leur stupidité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 11 ; autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leur assurance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur confiance en eux-mêmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 78.7 ; 85.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux qui les suivent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: après eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les chemins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la destinée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de ceux qui se plaisent à leurs discours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur bouche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. 73.10 ; Jb 8.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Telle est leur voie, leur stupidité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ceux qui les suivent se plaisent à leurs discours. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte obscur et traduction conjecturale. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en fait sa pâture '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les y mène paître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la mort en sera le berger. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur beauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon une variante de certains mss hébreux et versions anciennes, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leur rocher, leur secours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Dt 32.31). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: est leur résidence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'une résidence pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: séjour
        - type: text
          text: ' des morts, loin de leur résidence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même terme en 1R 8.13/ / ; Es 63.15 ; Ha 3.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Comme un troupeau, ils sont mis dans le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la mort en fait sa pâture ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et bientôt les gens droits les foulent aux pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur beauté s'évanouit, le séjour des morts est leur résidence.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 30.4 ; 2S 4.9 ; Os 13.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il me prendra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 73.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Gn 5.24 ; 2R 2.3,5 ; Lc 16.22.'
      marker-yv: yv-n
    - type: text
      text: Mais Dieu me libérera du séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car il me prendra. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'enrichit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'est riche. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fortune
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 18 ; cf. 73.12-20.'
      marker-yv: yv-n
    - type: text
      text: N'aie pas peur quand un homme s'enrichit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand la fortune de sa maison s'accroît ;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 76.6 ; Jb 27.19 ; 1Tm 6.7.
      marker-yv: yv-n
    - type: text
      text: car il n'emporte rien en mourant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa fortune ne descend pas derrière lui.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il pourra s'estimer heureux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son âme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 6.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénira
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il pourra s'estimer heureux pendant sa vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On te célébrera parce que tu t'es bien traité,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Es 34.1 ; Jl 1.2 ; Pr 8.4ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: habitants du monde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 17.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jb 11.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Ecoutez, vous tous, peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prêtez l'oreille, vous tous, habitants du monde,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la lumière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jb 10.21s.
      marker-yv: yv-n
    - type: text
      text: tu iras néanmoins vers la génération de tes pères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui jamais ne reverront la lumière.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: L'humain qui est en honneur, et qui n'a pas d'intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est semblable aux bêtes qui périssent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: petits et grands
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ; litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''humain '
      - type: usfm
        marker: ft
