document_id: JER.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le mensonge sévit partout
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 59.15 ; Os 4.1s ; Ps 5.7 ; 12.3-5 ; 34.14 ; Pr 12.19,22. –  si j''avais au désert…  : cf. 1S 22.1 ; 1R 19.3s ; Ps 55.7-9. –  des adultères 5.7s ; 23.10,14 ; 29.23. –  une bande  : litt. une assemblée  ; c''est le terme hébreu traduit par assemblée solennelle en Lv 23.36n  ; Nb 29.35n  ; Dt 16.8 ; cf. Es 1.13.'
  - type: text
    content: Ah ! si j'avais au désert un campement comme les voyageurs !
  - type: text
    content: J'abandonnerais mon peuple, je m'en éloignerais,
  - type: text
    content: car ce sont tous des adultères,
  - type: text
    content: c'est une bande de traîtres.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.15 ; 10.22 ; 26.18 ; 34.22 ; 44.2 ; 51.37 ; Es 25.2 ; Mi 3.12 ; Ap 18.2. –  repaire 10.22 ; 49.33 ; 51.37 ; Na 2.12 ; le même terme est traduit par séjour en 25.30 ; cf. Dt 26.15n.
  - type: text
    content: Je ferai de Jérusalem un tas de pierres,
  - type: text
    content: un repaire de chacals,
  - type: text
    content: et des villes de Juda un lieu dévasté,
  - type: text
    content: sans habitants.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Quel est l''homme sage Dt 32.29 ; Os 14.10 ; Ps 107.43. –  Pourquoi…  : cf. 3.3+.'
  - type: text
    content: Quel est l'homme sage qui comprend cela ?
  - type: text
    content: 'Qu''il le dise, celui à qui la bouche du '
  - type: text
    content: Seigneur
  - type: text
    content: ' a parlé !'
  - type: text
    content: Pourquoi le pays est-il perdu,
  - type: text
    content: brûlé comme un désert où personne ne passe ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: abandonné ma loi 2.8n  ; 32.23. –  pas écouté 7.26+ ; autre traduction parce qu'ils n'ont pas écouté ma voix et qu'ils ne l'ont pas suivie.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : C''est parce qu''ils ont abandonné ma loi que j''avais mise devant eux, parce qu''ils ne m''ont pas écouté et qu''ils ne l''ont pas suivie, '
  '13':
  - type: note
    content: obstination… 3.17n. – Voir Baals.
  - type: text
    content: 'parce qu''ils ont suivi l''obstination de leur cœur, ainsi que les Baals, comme leurs pères le leur ont appris. '
  '14':
  - type: note
    content: eau empoisonnée 8.14+ ; cf. Ap 8.11.
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Je vais nourrir ce peuple d''absinthe et je lui ferai boire de l''eau empoisonnée. '
  '15':
  - type: note
    content: disperserai 10.21 ; 13.24 ; 18.17 ; 23.1s ; 25.34 ; 30.11 ; 40.15 ; cf. Lv 26.33. –  que n'ont connues… 15.14 ; 16.13 ; 17.4 ; cf. 7.9+. –  j'enverrai… 49.37.
  - type: text
    content: Je les disperserai parmi des nations que n'ont connues ni eux ni leurs pères, et j'enverrai l'épée derrière eux, jusqu'à ce que je les aie exterminés.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'pleureuses  : cf. v. 19 ; Ez 32.16 ; Am 5.16 ; Ec 12.5 ; 2Ch 35.25. –  habiles  : autre traduction sages  ; cf. 2S 14.2n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Réfléchissez !
  - type: text
    content: Appelez les pleureuses,
  - type: text
    content: et qu'elles viennent !
  - type: text
    content: Envoyez chercher les femmes habiles,
  - type: text
    content: et qu'elles viennent !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 8.23+ ; cf. Ps 119.136 ; Lm 3.48.
  - type: text
    content: Qu'elles se hâtent ! Qu'elles poussent des gémissements sur nous !
  - type: text
    content: Que nos yeux fondent en larmes,
  - type: text
    content: que des ruisseaux s'écoulent de nos paupières !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'des gémissements  : litt. la voix (ou le bruit ) de gémissements . –  ravagés 4.13. –  on a renversé…  : LXX a lu nous avons rejeté nos demeures  ; cette leçon suppose un texte hébreu légèrement différent, qu''on pourrait aussi vocaliser de façon à lire nous sommes rejetés de nos demeures.'
  - type: text
    content: 'Car des gémissements se font entendre de Sion :'
  - type: text
    content: Comment ! Nous voilà ravagés !
  - type: text
    content: Nous sommes couverts de honte,
  - type: text
    content: car nous avons abandonné le pays ;
  - type: text
    content: on a renversé nos demeures.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 16+ ; Es 32.9 ; Lc 23.28.
  - type: text
    content: 'Femmes, écoutez donc la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et que votre oreille saisisse ce que dit sa bouche !
  - type: text
    content: Apprenez à vos filles à gémir,
  - type: text
    content: apprenez-vous des complaintes les unes aux autres !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'la langue… v. 7 ; 18.18 ; cf. Ps 57.5 ; 64.4. –  pour la fausseté  : traduction incertaine ; LXX rattache l''expression à ce qui suit  : c''est le mensonge, et non la fidélité, qui est puissante dans le pays  ; cf. 3.10+ ; 13.25+. –  par la probité ou pour la probité (5.1n). –  ils vont  : litt. ils sortent . –  de mal en mal  : autre traduction de mauvaise action en mauvaise action . –  ils ne me connaissent pas v. 23 ; Os 4.1.'
  - type: text
    content: Ils ont la langue tendue
  - type: text
    content: comme un arc pour la fausseté ;
  - type: text
    content: ce n'est pas par la probité
  - type: text
    content: qu'ils se sont rendus puissants dans le pays ;
  - type: text
    content: car ils vont de mal en mal
  - type: text
    content: et ils ne me connaissent pas
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'montée par nos fenêtres  : cf. Jl 2.9. –  palais 6.5+. –  les enfants… 6.11 ; cf. Dt 32.25 ; Lm 1.20.'
  - type: text
    content: Car la mort est montée par nos fenêtres,
  - type: text
    content: elle a pénétré dans nos palais,
  - type: text
    content: elle retranche les enfants des rues,
  - type: text
    content: les jeunes gens des places.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Dis : … déclaration du Seigneur  : cette introduction est absente de LXX. –  du fumier… 8.2+ ; cf. Es 5.25. –  comme une gerbe  : cf. Jb 5.26. –  ne la recueille  : le même verbe est traduit par ensevelir en 8.2 etc. ; il a aussi le sens de récolter (8.13n).'
  - type: text
    content: 'Dis : Telle est la déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Les cadavres humains tomberont
  - type: text
    content: comme du fumier dans les champs
  - type: text
    content: 'et comme une gerbe derrière le moissonneur :'
  - type: text
    content: personne ne la recueille !
  - type: heading
    content: 'La vraie sagesse : connaître le Seigneur'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'ne tire pas fierté  : litt. ne se loue pas , de même dans la suite ; cf. 4.2n  ; Pr 3.5 ; 21.30 ; Ec 9.11. –  vaillant ou héros  ; cf. 14.9 ; 20.11 ; 26.21 ; 32.18 ; 46.6,12 etc.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Que le sage ne tire pas fierté de sa sagesse,
  - type: text
    content: que l'homme vaillant ne tire pas fierté de sa vaillance,
  - type: text
    content: que le riche ne tire pas fierté de sa richesse !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'd''avoir du bon sens…  : autre traduction de me comprendre et de me connaître . –  me connaître 5.4+ ; 16.21 ; 22.16 ; 24.7 ; Es 49.23 ; Ps 34.3 ; Jn 17.3 ; 1Co 1.31 ; 2Co 10.17  ; cf. Siracide 10.22 : « Le prosélyte, l''étranger, le pauvre, leur fierté, c''est la crainte du Seigneur. » –  sur la terre ou dans le pays . –  fidélité / équité / justice (4.2) : cf. 16.5 ; 22.13+,15 ; 23.5 ; 31.3 ; 32.18 ; 33.15 ; So 3.5 ; Ps 140.13 ; Lm 1.18 ; Esd 9.15.'
  - type: text
    content: Mais que celui qui fait le fier soit fier
  - type: text
    content: d'avoir du bon sens et de me connaître,
  - type: text
    content: 'de savoir que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH)'
  - type: text
    content: et que j'agis sur la terre avec fidélité, équité et justice ;
  - type: text
    content: car c'est à cela que je prends plaisir
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Contre les prétendus circoncis
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'je ferai rendre… 6.15n. –  circoncis  : litt. circoncis dans le prépuce  ; certains comprennent tous les circoncis qui gardent leur prépuce , c.-à-d. tous les (prétendus) circoncis qui sont (en fait) incirconcis  ; cf. v. 25n  ; voir aussi Rm 2.29 ; 1Co 7.19 ; Ga 5.6 ; 6.15 ; Col 2.11.'
  - type: text
    content: 'Les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où je ferai rendre des comptes à tous les circoncis : '
  '25':
  - type: note
    content: 'Les peuples mentionnés dans ce v. pratiquaient vraisemblablement diverses formes de circoncision (v. 24n  ; Gn 17.23-25 ; Ez 32.29) ; certains pensent qu''ils tentaient à l''époque de Jérémie de former une coalition contre les Babyloniens (incirconcis) ; cf. 25.19,21 ; 46 ; 48–49 ; voir aussi Es 18.1n  ; Am 1.11,13 ; 2.1. –  ceux qui se rasent les tempes  : allusion probable à des coutumes arabes 25.23 ; 49.32 ; cf. Lv 19.27 ; 21.5 où le mot traduit ici par tempes désigne les bords de la barbe ou de la chevelure. –  incirconcise de cœur 4.4+.'
  - type: text
    content: à l'Egypte, à Juda, à Edom, aux Ammonites, à Moab, à tous ceux qui se rasent les tempes et qui habitent dans le désert ; car toutes les nations sont incirconcises, et toute la maison d'Israël est incirconcise de cœur.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '12.6 ; Mi 7.5 ; Ps 41.10. –  est un perfide supplanteur  : hébreu ‘aqov ya‘qov  ; le texte joue sur le nom de Jacob ; cf. Gn 25.26n. –  calomnies 6.28 ; cf. Ps 50.20.'
  - type: text
    content: Que chacun se garde de son ami,
  - type: text
    content: et qu'on ne se fie à aucun de ses frères ;
  - type: text
    content: car tout frère est un perfide supplanteur,
  - type: text
    content: et tout ami répand des calomnies.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 12.3-5 ; 120.2-7. –  ils se fatiguent…  : certains rattachent à cette phrase le début du v. suivant (voir v. 5n), ce qui pourrait donner ici le sens ils commettent des fautes, ils sont trop fatigués pour revenir  ; cf. 8.5 ; voir péché.'
  - type: text
    content: Ils essaient de se tromper les uns les autres
  - type: text
    content: et ils ne disent pas la vérité ;
  - type: text
    content: ils exercent leur langue à proférer le mensonge,
  - type: text
    content: ils se fatiguent à commettre des fautes.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ton siège  : d''après LXX et Tg, certains rattachent au v. 4 le début du mot ainsi traduit, qui aurait alors le sens de revenir , et lisent le reste du v. comme suit  : oppression sur oppression, tromperie sur tromperie ; ils refusent de me connaître  ; voir v. 3n  ; cf. Jn 3.11.'
  - type: text
    content: Ton siège est au sein de la tromperie ;
  - type: text
    content: c'est par tromperie qu'ils refusent de me connaître
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.27+ss. –  de la belle, de mon peuple  : litt. de la fille de mon peuple  ; cf. 4.11n  ; LXX à l''égard de la méchanceté de la fille de mon peuple.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Je vais les épurer et les éprouver.
  - type: text
    content: En effet, comment agir à l'égard de la belle, de mon peuple ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 2+ss. –  affilée  : autre lecture traditionnelle meurtrière . –  ils tiennent un discours (litt. ils parlent ) de paix  : cf. 4.10n  ; Ps 28.3 ; Pr 26.23ss ; Mt 26.49.'
  - type: text
    content: Leur langue est une flèche affilée,
  - type: text
    content: ils ne parlent que pour tromper ;
  - type: text
    content: avec leur bouche ils tiennent un discours de paix à leur prochain,
  - type: text
    content: mais au fond d'eux-mêmes, ils lui tendent des pièges.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'pour cela  : traduction incertaine ; d''autres comprennent par des châtiments (cf. 27.8 ; 44.13) ; autre traduction pour de telles choses, ne leur ferais-je pas rendre des comptes ? Cf. 5.9n.'
  - type: text
    content: A de telles gens, ne ferais-je pas rendre des comptes pour cela ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Ne me vengerais-je pas d'une pareille nation ?
  - type: heading
    content: Le temps des pleurs
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'je veux pleurer…  : litt. j''élèverai (LXX élevez ) pleurs et gémissements  ; cf. v. 17s ; 8.23+. –  personne n''y passe v. 11. –  depuis les oiseaux… 4.25+ ; cf. 50.3.'
  - type: text
    content: Sur les montagnes
  - type: text
    content: je veux pleurer et gémir,
  - type: text
    content: sur les pâturages du désert
  - type: text
    content: prononcer une complainte ;
  - type: text
    content: car ils sont brûlés,
  - type: text
    content: personne n'y passe,
  - type: text
    content: on n'y entend plus les troupeaux ;
  - type: text
    content: depuis les oiseaux du ciel jusqu'aux bêtes,
  - type: text
    content: tout s'en est allé.
