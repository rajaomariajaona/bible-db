      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël : Je vais nourrir ce peuple d''absinthe et je lui ferai boire de l''eau empoisonnée. '
