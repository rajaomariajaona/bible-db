        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Je ferai de Jérusalem un tas de pierres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un repaire de chacals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des villes de Juda un lieu dévasté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans habitants.
