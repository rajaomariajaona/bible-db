      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit : C''est parce qu''ils ont abandonné ma loi que j''avais mise devant eux, parce qu''ils ne m''ont pas écouté et qu''ils ne l''ont pas suivie, '
