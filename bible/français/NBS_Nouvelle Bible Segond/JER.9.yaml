        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Quel est l''homme sage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 32.29 ; Os 14.10 ; Ps 107.43. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pourquoi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 3.3+.'
      marker-yv: yv-n
    - type: text
      text: Quel est l'homme sage qui comprend cela ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu''il le dise, celui à qui la bouche du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a parlé !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi le pays est-il perdu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: brûlé comme un désert où personne ne passe ?
