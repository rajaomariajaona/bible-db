      marker-yv: yv-n
    - type: text
      text: 'Car des gémissements se font entendre de Sion :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment ! Nous voilà ravagés !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous sommes couverts de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car nous avons abandonné le pays ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on a renversé nos demeures.
