  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le mensonge sévit partout
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Es 59.15 ; Os 4.1s ; Ps 5.7 ; 12.3-5 ; 34.14 ; Pr 12.19,22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si j'avais au désert…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 22.1 ; 1R 19.3s ; Ps 55.7-9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des adultères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.7s ; 23.10,14 ; 29.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une bande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une assemblée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; c''est le terme hébreu traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'assemblée solennelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Lv 23.36
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 29.35'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 16.8 ; cf. Es 1.13.'
      marker-yv: yv-n
    - type: text
      text: Ah ! si j'avais au désert un campement comme les voyageurs !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'abandonnerais mon peuple, je m'en éloignerais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ce sont tous des adultères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est une bande de traîtres.
