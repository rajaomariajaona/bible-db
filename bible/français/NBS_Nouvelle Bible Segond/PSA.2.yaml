document_id: PSA.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le roi du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'Le Ps 2 a parfois été considéré comme la suite du Ps 1, cf. Ac 13.33n. –  grondent-ils en vain  : litt. murmurent-ils (1.2n) à vide (ou pour rien ) ; cf. Ac 4.25s.'
  - type: text
    content: Pourquoi les nations s'agitent-elles ?
  - type: text
    content: Pourquoi les peuples grondent-ils en vain ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Sagesse 6.1-5 : « Rois, écoutez et comprenez, laissez-vous instruire, vous dont la juridiction s''étend à toute la terre… vous avez reçu du Seigneur votre pouvoir… et c''est lui qui examinera vos actes et scrutera vos desseins… De façon terrible et soudaine il surgira devant vous, car un jugement rigoureux s''exerce contre les grands. »'
  - type: text
    content: Et maintenant, rois, ayez du bon sens !
  - type: text
    content: Recevez l'instruction, juges de la terre !
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 12n  ; 72.11 ; Dn 7.14 ; Hé 12.28. – Voir crainte. –  en frissonnant 48.7 ; 55.6 ; 104.32 ; Ex 15.15 ; Es 33.14 ; Jb 4.14 ; Esd 10.9n.
  - type: text
    content: 'Servez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec crainte,'
  - type: text
    content: soyez dans l'allégresse en frissonnant.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Embrassez le fils  : traduction incertaine (le mot traduit par fils serait araméen, à la différence du v. 7) ; versions anciennes  : embrassez l''instruction, adorez purement (le baiser étant un signe d''hommage) ; certains modifient le texte hébreu traditionnel pour lire, à la place de la seconde partie du v. 11  : embrassez-lui les pieds en frissonnant  ; cf. Es 49.23. –  que vous ne disparaissiez en chemin (ou du chemin ) : cf. 1.6n. –  Heureux… 1.1+ ; cf. 34.9 ; 84.13 ; 118.8s.'
  - type: text
    content: Embrassez le fils,
  - type: text
    content: de peur qu'il ne se mette en colère
  - type: text
    content: et que vous ne disparaissiez en chemin ;
  - type: text
    content: car sa colère s'enflamme vite.
  - type: text
    content: Heureux tous ceux qui trouvent en lui un abri !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'On pourrait aussi comprendre ce v. comme la suite de l''interrogation du v. 1  : Pourquoi… les rois de la terre se postent-ils et… se liguent-ils…  ; cf. 48.5-7 ; 83.6 ; Es 7.4-6 ; Ap 19.19. –  l''homme qui a reçu son onction  : de l''hébreu mashiah (traditionnellement transcrit messie ), qui signifie oint (d''huile ; verbe apparenté en 45.8 ; 89.21) et désigne ici le roi de Jérusalem (v. 6) ; il sera traduit en grec khristos (= Christ ) 18.51 ; 20.7 ; 28.8 ; 84.10 ; 89.39,52 ; 132.10,17 ; cf. Ex 30.25+ ; 1S 2.10,35 ; 10.1 ; 12.3,5 ; 16.1,13 ; 1R 1.33-35 ; 2R 11.12 ; Jn 1.41 ; Ap 11.15 ; 12.10.'
  - type: text
    content: Les rois de la terre se postent,
  - type: text
    content: les princes se liguent ensemble
  - type: text
    content: 'contre le '
  - type: text
    content: Seigneur
  - type: text
    content: 'et contre l''homme qui a reçu son onction :'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Paroles de révolte des rois et princes du v. 2 ; cf. 149.8 ; Jr 5.5.
  - type: text
    content: Brisons leurs liens, secouons leurs chaînes !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Il rit 37.13 ; 59.9 ; Pr 1.26. –  qui habite (ou qui siège dans , comme un roi ou un juge) le ciel 123.1 ; cf. 11.4 ; 115.3 ; Es 40.22 ; 66.1.
  - type: text
    content: Il rit, celui qui habite le ciel,
  - type: text
    content: le Seigneur se moque d'eux.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Il leur parle  : litt. alors (c.-à-d. en temps voulu) il leur parle(ra) , cf. 89.20 ; Mi 3.4 ; So 3.9.'
  - type: text
    content: Il leur parle dans sa colère,
  - type: text
    content: 'dans sa fureur il les épouvante :'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'investi  : le sens exact du verbe correspondant est incertain ; on l''a rattaché à une racine signifiant verser ou répandre , habituellement associée aux libations et non à l''onction d''huile (cf. v. 2n) et évoquant peut-être un autre élément du rituel du sacre royal ; mais il pourrait aussi provenir d''un autre verbe signifiant plus simplement former, installer  ; c''est probablement le même verbe qu''on retrouve en Pr 8.23 ; LXX a compris moi, j''ai été installé roi par lui, sur Sion (cf. Ps 20.3 ; 110.2) , sa montagne sacrée (ou sainte ) ; cf. Ps 3.5 ; 15.1 ; 43.3 ; 48.2 ; 87.1 ; Es 2.2+ ; 27.13 ; Jr 31.23 ; Ez 20.40 ; Jl 2.1.'
  - type: text
    content: C'est moi qui ai investi mon roi
  - type: text
    content: sur Sion, ma montagne sacrée !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Je vais proclamer…  : autre traduction je m''en réfère au décret… –  Tu es mon fils  : en Egypte comme en Mésopotamie, les rois étaient habituellement déclarés fils des dieux ; ici il s''agit d''un décret d''adoption du roi-messie (cf. aujourd''hui ) ; cf. 89.27s ; 2S 7.14 ; Mt 3.17/ / ; 17.5/ / ; Lc 3.22n  ; Jn 1.49 ; Ac 13.33 ; Hé 1.5 ; 5.5  ; 2P 1.17.'
  - type: text
    content: 'Je vais proclamer le décret du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: 'il m''a dit : Tu es mon fils !'
  - type: text
    content: C'est moi qui t'ai engendré aujourd'hui.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Demande-moi  : cf. 21.5 ; 1R 3.5. –  les nations comme patrimoine 82.8.'
  - type: text
    content: Demande-moi et je te donnerai les nations comme patrimoine,
  - type: text
    content: comme propriété les extrémités de la terre ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: tu les briseras ou tu les écraseras  ; cf. 68.22 ; 110.5s ; Es 30.14 ; Jr 19.11 ; certaines versions anciennes ont lu tu les feras paître  ; cf. Ap 2.26s  ; 12.5 ; 19.15. –  sceptre 45.7 ; 110.2 ; 125.3 ; le mot correspondant est rendu par houlette en 23.4, par bâton en 89.33 ; cf. Es 9.3n. –  mettras en pièces 137.9n.
  - type: text
    content: tu les briseras avec un sceptre de fer.
  - type: text
    content: Comme une poterie tu les mettras en pièces.
