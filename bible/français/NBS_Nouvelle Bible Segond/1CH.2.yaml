document_id: 1CH.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les descendants de Juda
  - type: heading
    content: Cf. Gn 35.23-26
  - type: text
    content: ' '
  - type: note
    content: 'L''expression hébraïque rendue ici par fils d''Israël (cf. 1.34n) est habituellement traduite par Israélites dans l''A.T. quand elle désigne l''ensemble de la population d''Israël ; cf. Gn 32.29n,33. –  Ruben… Juda  : cf. Gn 29.31-35. –  Issacar, Zabulon  : cf. Gn 30.17-20.'
  - type: text
    content: 'Voici les fils d''Israël : Ruben, Siméon, Lévi, Juda, Issacar, Zabulon, '
  '10':
  - type: text
    content: 'Ram engendra Amminadab. Amminadab engendra Nahshôn, prince des fils de Juda. '
  '11':
  - type: text
    content: 'Nahshôn engendra Salma. Salma engendra Booz. '
  '12':
  - type: text
    content: 'Booz engendra Obed. Obed engendra Jessé. '
  '13':
  - type: note
    content: 'Cf. 1S 16.1,6ss ; Rt 4.19-22 ; Mt 1.3-6. –  Abinadab  : LXX porte Aminadab ; Shiméa est appelé Shamma en 2S 13.3,32 ; 21.21.'
  - type: text
    content: 'Jessé engendra Eliab, son premier-né, Abinadab le deuxième, Shiméa le troisième, '
  '14':
  - type: text
    content: 'Netanéel le quatrième, Raddaï le cinquième, '
  '15':
  - type: note
    content: 'David le septième  : selon 1S 16.10n et 17.12, Jessé avait huit fils, dont David était le huitième.'
  - type: text
    content: 'Otsem le sixième, David le septième. '
  '16':
  - type: note
    content: 'Abshaï est appelé Abishaï en 2S 2.18 ; cf. 1Ch 11.20 ; 18.12 ; 19.11,15. –  Asaël  : le nom est ici orthographié sous une forme composée dans le texte hébreu traditionnel, Asa-’El, de même en 11.26 ; 27.7 ; cf. 2S 3.27n.'
  - type: text
    content: 'Leurs sœurs étaient : Tserouya et Abigaïl. Fils de Tserouya : Abshaï, Joab et Asaël, trois. '
  '17':
  - type: note
    content: Cf. 2S 17.25n  ; 20.4-12.
  - type: text
    content: Abigaïl mit au monde Amasa ; le père d'Amasa fut Yéter, l'Ismaélite.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Caleb  : cf. v. 9n. La suite du v. est peu claire en hébreu ; on pourrait comprendre engendra Azouba, Isha (oune femme) et Yerioth . Dans les v. 18-55, certains noms de personnes sont aussi des noms de localités ; l''expression père de X peut alors signifier fondateur de X.'
  - type: text
    content: 'Caleb, fils de Hetsrôn, eut des enfants d''Azouba, sa femme, et de Yerioth. Voici les fils qu''il eut d''Azouba : Yésher, Shobab et Ardôn. '
  '19':
  - type: note
    content: 'Ephrath  : cf. v. 24,50 ; 4.4 ; voir aussi Gn 35.16n  ; Jg 12.5n  ; 1S 1.1n.'
  - type: text
    content: 'Azouba mourut ; Caleb prit Ephrath, qui lui donna Hour. '
  '2':
  - type: note
    content: 'Dan  : cf. Gn 30.1-6. –  Joseph  : cf. Gn 30.22-24. –  Benjamin  : cf. Gn 35.17s. –  Nephtali  : cf. Gn 30.7s. –  Gad et Aser  : cf. Gn 30.9-13.'
  - type: text
    content: Dan, Joseph, Benjamin, Nephtali, Gad et Aser.
  - type: heading
    content: Cf. Gn 38  ; 46.12
  '20':
  - type: note
    content: Cf. Ex 31.2 ; 35.30 ; 38.22.
  - type: text
    content: 'Hour engendra Ouri ; Ouri engendra Betsaléel. '
  '21':
  - type: note
    content: alla avec Gn 16.2n. –  Makir 7.14 ; Gn 50.23n  ; Nb 26.29+ ; Jg 5.14n.
  - type: text
    content: 'Ensuite, Hetsrôn alla avec la fille de Makir, père de Galaad. Il la prit alors qu''il avait lui-même soixante ans, et elle lui donna Ségoub. '
  '22':
  - type: text
    content: 'Ségoub engendra Yaïr, qui eut vingt-trois villes dans le Galaad. '
  '23':
  - type: note
    content: 'Gueshour  : cf. Dt 3.14 ; Jos 12.5. –  Douars de Yaïr  : cf. Nb 32.41n. –  les localités qui en dépendent  : litt. ses filles, de même dans la suite ; cf. Jos 15.45n  ; Jg 1.27n.'
  - type: text
    content: Gueshour et Aram leur prirent les Douars de Yaïr avec Qenath et les localités qui en dépendent, soixante villes. Tous ceux-là sont les fils de Makir, père de Galaad.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Texte hébreu peu clair et traduction incertaine ; au lieu de à Caleb-Ephrata , nom d''un lieu inconnu, on pourrait lire avec une légère modification Caleb alla avec Ephrath (cf. la même tournure au v. 21n), puis, avec une autre correction, femme de Hetsrôn, son père, qui lui donna…  ; cf. v. 19+,50. –  Teqoa  : cf. 2S 14.2n.'
  - type: text
    content: 'Après la mort de Hetsrôn à Caleb-Ephrata, Abiya, femme de Hetsrôn, lui donna Ashhour, père de Teqoa. '
  '25':
  - type: note
    content: Dans LXX, Ahiya n'a pas été compris comme un nom propre, mais traduit son frère.
  - type: text
    content: 'Les fils de Yerahméel, premier-né de Hetsrôn, furent : Ram, le premier-né, Bouna, Oren et Otsem, Ahiya.'
  '26':
  - type: text
    content: 'Yerahméel eut une autre femme, nommée Atara, qui fut mère d''Onam. '
  '27':
  - type: note
    content: 'Yamîn  : Syr a lu Yabîn.'
  - type: text
    content: 'Les fils de Ram, premier-né de Yerahméel, furent : Maats, Yamîn et Eqer. '
  '28':
  - type: note
    content: 'Yada  : Syr a lu Yoyada (= Joïada), de même au v. 32.'
  - type: text
    content: 'Les fils d''Onam furent : Shammaï et Yada. Fils de Shammaï : Nadab et Abishour. '
  '29':
  - type: text
    content: 'Le nom de la femme d''Abishour était Abihaïl, et elle lui donna Ahbân et Molid. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Juda est mentionné en premier, car il a été l''ancêtre de David. Une autre liste de ses descendants figure au chap. 4. –  Er, Onân, Shéla  : cf. Gn 38.1-11 ; 46.12.'
  - type: text
    content: 'Fils de Juda : Er, Onân, Shéla ; ces trois naquirent de lui par la fille de Shoua, la Cananéenne. Er, premier-né de Juda, déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; celui-ci le fit mourir.'
  '30':
  - type: note
    content: Appaïm a été lu comme Ephraïm dans un ms de LXX, de même au v. 31.
  - type: text
    content: 'Fils de Nadab : Séled et Appaïm. Séled mourut sans fils. '
  '31':
  - type: note
    content: 'Fils de Shéshân : Ahlaï  : cf. v. 34s.'
  - type: text
    content: 'Fils d''Appaïm : Yishéi. Fils de Yishéi : Shéshân. Fils de Shéshân : Ahlaï. '
  '32':
  - type: text
    content: 'Fils de Yada, frère de Shammaï : Yéter et Jonathan. Yéter mourut sans fils. '
  '33':
  - type: text
    content: 'Fils de Jonathan : Péleth et Zaza. Ce sont là les fils de Yerahméel.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Yarha  : LXX Yokhel , de même au v. 35.'
  - type: text
    content: 'Shéshân n''avait pas de fils, mais il eut des filles. Shéshân avait un esclave égyptien nommé Yarha. '
  '35':
  - type: text
    content: 'Et Shéshân donna sa fille pour femme à Yarha, son esclave, à qui elle donna Attaï. '
  '36':
  - type: text
    content: 'Attaï engendra Nathan, Nathan engendra Zabad ; '
  '37':
  - type: note
    content: 'Obed  : Syr Yobab, de même au v. 38.'
  - type: text
    content: 'Zabad engendra Ephlal ; Ephlal engendra Obed ; '
  '38':
  - type: text
    content: 'Obed engendra Jéhu ; Jéhu engendra Azaria ; '
  '39':
  - type: text
    content: 'Azaria engendra Hélets ; Hélets engendra Elasa ; '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Tamar / Pérets / Zérah  : cf. Gn 38.12-30 ; Mt 1.3 ; Lc 3.33.'
  - type: text
    content: 'Tamar, belle-fille de Juda, lui donna Pérets et Zérah. Total des fils de Juda : cinq.'
  '40':
  - type: text
    content: 'Elasa engendra Sismaï ; Sismaï engendra Shalloum ; '
  '41':
  - type: text
    content: Shalloum engendra Yeqamia ; Yeqamia engendra Elishama.
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Caleb v. 9n. –  Mésha  : LXX Marésha  ; plusieurs modifications ont été proposées pour cette généalogie  : Mésha, son premier-né, qui fut père de Ziph, et son deuxième fils Marésha, père d''Hébron ; Marésha, son premier-né, qui fut père de Ziph, et les fils de Marésha, Hébron ; Mésha, son premier-né, qui fut père de Ziph et d''Hébron ; Mésha, son premier-né, qui fut père de Ziph, et les fils de Ziph : Marésha, père d''Hébron ; Mésha, son premier-né, qui fut père de Ziph, et les fils de Mésha : Marésha, père d''Hébron.'
  - type: text
    content: 'Fils de Caleb, frère de Yerahméel : Mésha, son premier-né, qui fut père de Ziph, et les fils de Marésha, père d''Hébron. '
  '43':
  - type: text
    content: 'Fils d''Hébron : Coré, Tappouah, Réqem et Shéma. '
  '44':
  - type: note
    content: 'Yorqéam  : certains proposent de lire ici un nom proche Yoqdéam, cf. Jos 15.56.'
  - type: text
    content: 'Shéma engendra Raham, père de Yorqéam. Réqem engendra Shammaï. '
  '45':
  - type: text
    content: 'Fils de Shammaï : Maôn ; et Maôn fut le père de Beth-Tsour. '
  '46':
  - type: note
    content: 'mit au monde et engendra traduisent deux formes d''un même verbe hébreu. –  Gazez  : quelques mss portent Gazen  ; certains proposent de lire à la fin Yahdaï.'
  - type: text
    content: 'Epha, concubine de Caleb, mit au monde Harrân, Motsa et Gazez. Harrân engendra Gazez. '
  '47':
  - type: note
    content: 'Yahdaï  : quelques mss portent Yahdi.'
  - type: text
    content: 'Fils de Yahdaï : Réguém, Jotam, Guéshân, Péleth, Epha et Shaaph. '
  '48':
  - type: note
    content: Les v. 48s sont absents de Syr.
  - type: text
    content: 'Maaka, concubine de Caleb, mit au monde Shéber et Tirhana. '
  '49':
  - type: text
    content: 'Elle mit encore au monde Shaaph, père de Madmanna, et Sheva, père de Makbéna et père de Guibéa. La fille de Caleb était Aksa. '
  '5':
  - type: text
    content: 'Fils de Pérets : Hetsrôn et Hamoul.'
  - type: heading
    content: 1R 5.11
  '50':
  - type: note
    content: Ephrata v. 19,24.
  - type: text
    content: 'Ceux-ci furent fils de Caleb : Shobal, fils de Hour, premier-né d''Ephrata et père de Qiriath-Yéarim ; '
  '51':
  - type: note
    content: Beth-Léhem ou Bethléem, selon l'orthographe traditionnelle (d'après le grec).
  - type: text
    content: 'Salma, père de Beth-Léhem, Hareph, père de Beth-Gader. '
  '52':
  - type: note
    content: Hatsi-Menouhoth peut aussi être compris comme la moitié (des habitants) de Menouhoth (ou de Manahath, cf. v. 54).
  - type: text
    content: 'Les fils de Shobal, père de Qiriath-Yéarim, furent : Haroé, Hatsi-Menouhoth. '
  '53':
  - type: note
    content: 'Yitrites  : cf. 11.40 ; 2S 23.38. –  les Tsoréatites et les Eshtaolites  : de Tsoréa et d''Eshtaol ; cf. Jg 13.25+.'
  - type: text
    content: 'Les clans de Qiriath-Yéarim furent : les Yitrites, les Poutites, les Shoumatites et les Mishraïtes ; de ceux-là sont sortis les Tsoréatites et les Eshtaolites. '
  '54':
  - type: note
    content: 'Hatsi-Manahti ou la moitié (des habitants) de Manahath (cf. v. 52n). –  Tsoréites  : peut-être identiques aux Tsoréatites du v. 53.'
  - type: text
    content: 'Fils de Salma : Beth-Léhem et les Netophatites, Atroth-Beth-Joab, Hatsi-Manahti, les Tsoréites ; '
  '55':
  - type: note
    content: 'les clans des scribes ou les Sophrites. –  les Caïnites  : cf. 1S 15.6n.'
  - type: text
    content: et les clans des scribes habitant à Yabets, les Tiréatites, les Shiméatites et les Soukkatites. Ce sont les Caïnites, issus de Hamath, père de la maison de Rékab.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Dara est nommé Darda dans certains mss hébreux, dans des versions anciennes et en 1R 5.11.
  - type: text
    content: 'Fils de Zérah : Zimri, Etân, Hémân, Kalkol et Dara. En tout : cinq.'
  - type: heading
    content: Cf. Jos 7
  '7':
  - type: text
    content: ' '
  - type: note
    content: Karmi se rattache à la généalogie de Juda en 4.1. –  Akar est appelé Akân en Jos 7.1,18ss ; ici le nom fait assonance en hébreu avec le verbe traduit par attira le malheur sur , qui est aussi employé en Jos 6.18 ; 7.25n  ; cf. Gn 34.30+.
  - type: text
    content: 'Fils de Karmi : Akar, qui attira le malheur sur Israël lorsqu''il commit un sacrilège en matière d''anathème.'
  '8':
  - type: text
    content: 'Fils d''Etân : Azaria.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Keloubaï reparaît aux v. 18 et 42 sous le nom de Caleb.
  - type: text
    content: 'Fils qui naquirent de Hetsrôn : Yerahméel, Ram et Keloubaï.'
  - type: heading
    content: Cf. Nb 1.7  ; Rt 4.19-22
