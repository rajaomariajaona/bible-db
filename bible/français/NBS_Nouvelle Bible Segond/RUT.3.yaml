document_id: RUT.3,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ruth passe la nuit aux pieds de Booz
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 19.30ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lieu de repos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Noémi, sa belle-mère, lui dit : Ma fille, ne dois-je pas te chercher un lieu de repos, pour que tu sois heureuse ? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fidélité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir 2.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: couru après
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : expression traduite ailleurs par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: suivre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1S 12.21 ; Jr 2.5,8,25. Voir aussi 2P 2.10.'
      marker-yv: yv-n
    - type: text
      text: 'Il s''exclama : Sois bénie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ma fille ! Cette dernière marque de fidélité vaut mieux encore que la première, car tu n''as pas couru après les jeunes gens, pauvres ou riches. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la place publique…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toute porte (de la ville) de mon peuple sait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une femme de valeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Pr 12.4+.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, ma fille, n''aie pas peur ; je ferai pour toi tout ce que tu diras, car sur la place publique chacun sait que tu es une femme de valeur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 4.1ss.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, s''il est vrai que je suis rédempteur, il y a un autre rédempteur qui est un parent plus proche que moi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il assure…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.4 ; Dt 25.5ss ; Mt 22.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''il ne désire pas assurer… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'il ne lui plaît pas d'assurer…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Nb 14.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 25.7s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par la vie du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: '  ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: YHWH est vivant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', formule de serment (cf. 1.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; voir aussi Jg 8.19 ; 1S 14.39,45 ; 19.6 ; 20.3,21 ; 1R 2.24 ; Jr 4.2.
      marker-yv: yv-n
    - type: text
      text: 'Passe la nuit ici. Si ce matin il assure ta rédemption, c''est bien, qu''il le fasse ; mais s''il ne désire pas assurer ta rédemption, c''est moi qui le ferai, par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! Reste couchée jusqu''au matin.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se reconnaître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Booz se disait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il dit.
      marker-yv: yv-n
    - type: text
      text: 'Elle resta couchée à ses pieds jusqu''au matin et se leva avant l''heure où l''on peut se reconnaître l''un l''autre. Booz se disait : Qu''on ne sache pas que cette femme est entrée sur l''aire ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: manteau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine (autre terme qu''au v. 3) ; même terme en Es 3.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'six '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ' d''orge'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''unité n''est pas spécifiée ; il s''agit peut-être de l''omer (= un dixième d''épha, cf. 2.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's ; Ex 16.36) ; auquel cas les six mesures correspondraient à plus de 12 l ; certains modifient le texte hébreu pour lire, au lieu du mot traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: orge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le même terme (unité de mesure ?) qu''en Gn 26.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il dit alors : Tends vers moi le bord de ton manteau et tiens-le bien. Tandis qu''elle le tenait, il mesura six mesures d''orge et l''en chargea ; puis il rentra dans la ville.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Où en es-tu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui es-tu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 9) ; ici la question porte vraisemblablement, non sur l'identité de Ruth, mais sur sa condition (mariée ou non) à son retour de l'aire.
      marker-yv: yv-n
    - type: text
      text: 'Elle revint auprès de sa belle-mère ; celle-ci lui demanda : Où en es-tu, ma fille ? Elle lui raconta alors tout ce que l''homme avait fait pour elle. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les mains vides
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.21.'
      marker-yv: yv-n
    - type: text
      text: 'Elle dit : Il m''a donné ces six mesures d''orge en me disant : Ne retourne pas chez ta belle-mère les mains vides. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Noémi dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle dit.
      marker-yv: yv-n
    - type: text
      text: 'Noémi dit : Reste ici, ma fille, jusqu''à ce que tu saches comment finira l''affaire, car cet homme ne sera pas tranquille qu''il n''en ait terminé avec cette affaire aujourd''hui même.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maintenant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 11s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce soir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette nuit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les orges…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'aire des orges
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'aire des portes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''aire de battage situé en face de la porte principale de la ville '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 1R 22.10 ; Jr 15.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'En fait, Booz, avec les servantes de qui tu as été, n''est-il pas notre parent ? Or lui-même doit vanner ce soir les orges qui sont sur l''aire. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Lave-toi, parfume-toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 38.14+ ; 2S 12.20 ; Est 2.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: descends sur l'aire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dans les champs en contrebas de la ville (cf. 4.1).'
      marker-yv: yv-n
    - type: text
      text: 'Lave-toi, parfume-toi, puis mets ton manteau et descends sur l''aire. Ne te fais pas connaître de lui avant qu''il ait achevé de manger et de boire. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu sauras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu observeras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'connaître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: découvrir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'exposer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Lv 18.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses pieds
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''emplacement de ses pieds '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ses jambes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), de même aux v. 7s,14 ; cf. Ex 4.25
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 6.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand il ira se coucher, tu sauras à quel endroit il se couche. Ensuite tu iras découvrir ses pieds et tu te coucheras. Il te dira lui-même ce que tu devras faire. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 11.
      marker-yv: yv-n
    - type: text
      text: 'Elle lui répondit : Tout ce que tu m''as dit, je le ferai.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle descendit jusqu''à l''aire et fit exactement ce que sa belle-mère lui avait ordonné. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' était content'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 16.25 ; 18.20 ; 19.6,9,22 ; 1S 25.36 ; 2S 13.28 ; 1R 21.7 ; Ec 7.3 ; Est 1.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ruth vint
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle vint.
      marker-yv: yv-n
    - type: text
      text: 'Booz mangea et but ; son cœur était content. Il alla se coucher à l''extrémité du tas de gerbes. Ruth vint furtivement découvrir ses pieds et se coucher. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En pleine nuit, l''homme frissonna et se retourna : une femme était couchée à ses pieds ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ta servante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre terme qu''en 2.13 ; cf. 1S 25.41 ; Lc 1.38. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le pan de ton vêtement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans un autre contexte, le mot pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ton aile '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 2.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vêtement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'manteau '
      - type: usfm
