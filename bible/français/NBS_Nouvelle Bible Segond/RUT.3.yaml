document_id: RUT.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ruth passe la nuit aux pieds de Booz
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 19.30ss. –  lieu de repos  : cf. 1.9n.'
  - type: text
    content: 'Noémi, sa belle-mère, lui dit : Ma fille, ne dois-je pas te chercher un lieu de repos, pour que tu sois heureuse ? '
  '10':
  - type: note
    content: 'Voir bénédiction. –  fidélité 1.8n  ; voir 2.11. –  couru après  : expression traduite ailleurs par suivre, cf. 1S 12.21 ; Jr 2.5,8,25. Voir aussi 2P 2.10.'
  - type: text
    content: 'Il s''exclama : Sois bénie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ma fille ! Cette dernière marque de fidélité vaut mieux encore que la première, car tu n''as pas couru après les jeunes gens, pauvres ou riches. '
  '11':
  - type: note
    content: 'sur la place publique…  : litt. toute porte (de la ville) de mon peuple sait. –  une femme de valeur 2.1n  ; cf. Pr 12.4+.'
  - type: text
    content: 'Maintenant, ma fille, n''aie pas peur ; je ferai pour toi tout ce que tu diras, car sur la place publique chacun sait que tu es une femme de valeur. '
  '12':
  - type: note
    content: 2.20n  ; 4.1ss.
  - type: text
    content: 'Maintenant, s''il est vrai que je suis rédempteur, il y a un autre rédempteur qui est un parent plus proche que moi. '
  '13':
  - type: note
    content: 'il assure…  : cf. 4.4 ; Dt 25.5ss ; Mt 22.24. –  s''il ne désire pas assurer… ou s''il ne lui plaît pas d''assurer…  ; cf. Nb 14.8n  ; Dt 25.7s. –  par la vie du Seigneur  ! litt. YHWH est vivant, formule de serment (cf. 1.17n) ; voir aussi Jg 8.19 ; 1S 14.39,45 ; 19.6 ; 20.3,21 ; 1R 2.24 ; Jr 4.2.'
  - type: text
    content: 'Passe la nuit ici. Si ce matin il assure ta rédemption, c''est bien, qu''il le fasse ; mais s''il ne désire pas assurer ta rédemption, c''est moi qui le ferai, par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Reste couchée jusqu''au matin.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'se reconnaître  : cf. 2.10n. –  Booz se disait  : litt. il dit.'
  - type: text
    content: 'Elle resta couchée à ses pieds jusqu''au matin et se leva avant l''heure où l''on peut se reconnaître l''un l''autre. Booz se disait : Qu''on ne sache pas que cette femme est entrée sur l''aire ! '
  '15':
  - type: note
    content: 'manteau  : traduction incertaine (autre terme qu''au v. 3) ; même terme en Es 3.22. –  six mesures d''orge  : l''unité n''est pas spécifiée ; il s''agit peut-être de l''omer (= un dixième d''épha, cf. 2.17ns ; Ex 16.36) ; auquel cas les six mesures correspondraient à plus de 12 l ; certains modifient le texte hébreu pour lire, au lieu du mot traduit par orge, le même terme (unité de mesure ?) qu''en Gn 26.12n.'
  - type: text
    content: 'Il dit alors : Tends vers moi le bord de ton manteau et tiens-le bien. Tandis qu''elle le tenait, il mesura six mesures d''orge et l''en chargea ; puis il rentra dans la ville.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Où en es-tu  : litt. qui es-tu (cf. v. 9) ; ici la question porte vraisemblablement, non sur l''identité de Ruth, mais sur sa condition (mariée ou non) à son retour de l''aire.'
  - type: text
    content: 'Elle revint auprès de sa belle-mère ; celle-ci lui demanda : Où en es-tu, ma fille ? Elle lui raconta alors tout ce que l''homme avait fait pour elle. '
  '17':
  - type: note
    content: 'Cf. v. 15. –  les mains vides  : cf. 1.21.'
  - type: text
    content: 'Elle dit : Il m''a donné ces six mesures d''orge en me disant : Ne retourne pas chez ta belle-mère les mains vides. '
  '18':
  - type: note
    content: 'Noémi dit  : litt. elle dit.'
  - type: text
    content: 'Noémi dit : Reste ici, ma fille, jusqu''à ce que tu saches comment finira l''affaire, car cet homme ne sera pas tranquille qu''il n''en ait terminé avec cette affaire aujourd''hui même.'
  '2':
  - type: note
    content: '2.1nss. –  En fait  : le terme hébreu correspondant est habituellement traduit par maintenant, cf. v. 11s. –  ce soir  : autre traduction cette nuit. –  les orges…  : litt. l''aire des orges  ; certains modifient le texte hébreu traditionnel pour lire l''aire des portes, c.-à-d. l''aire de battage situé en face de la porte principale de la ville (cf. 1R 22.10 ; Jr 15.7n).'
  - type: text
    content: 'En fait, Booz, avec les servantes de qui tu as été, n''est-il pas notre parent ? Or lui-même doit vanner ce soir les orges qui sont sur l''aire. '
  '3':
  - type: note
    content: 'Lave-toi, parfume-toi  : cf. Gn 38.14+ ; 2S 12.20 ; Est 2.12. –  descends sur l''aire, dans les champs en contrebas de la ville (cf. 4.1).'
  - type: text
    content: 'Lave-toi, parfume-toi, puis mets ton manteau et descends sur l''aire. Ne te fais pas connaître de lui avant qu''il ait achevé de manger et de boire. '
  '4':
  - type: note
    content: 'tu sauras  : autre traduction tu observeras  ; le même verbe est traduit par connaître au v. 3. –  découvrir  : le même verbe est traduit par exposer en Lv 18.6nss. –  ses pieds  : litt. l''emplacement de ses pieds (ou de ses jambes), de même aux v. 7s,14 ; cf. Ex 4.25n  ; Es 6.2n.'
  - type: text
    content: 'Quand il ira se coucher, tu sauras à quel endroit il se couche. Ensuite tu iras découvrir ses pieds et tu te coucheras. Il te dira lui-même ce que tu devras faire. '
  '5':
  - type: note
    content: Cf. v. 11.
  - type: text
    content: 'Elle lui répondit : Tout ce que tu m''as dit, je le ferai.'
  '6':
  - type: text
    content: 'Elle descendit jusqu''à l''aire et fit exactement ce que sa belle-mère lui avait ordonné. '
  '7':
  - type: note
    content: 'son cœur était content  : cf. Jg 16.25 ; 18.20 ; 19.6,9,22 ; 1S 25.36 ; 2S 13.28 ; 1R 21.7 ; Ec 7.3 ; Est 1.10. –  Ruth vint  : litt. elle vint.'
  - type: text
    content: 'Booz mangea et but ; son cœur était content. Il alla se coucher à l''extrémité du tas de gerbes. Ruth vint furtivement découvrir ses pieds et se coucher. '
  '8':
  - type: text
    content: 'En pleine nuit, l''homme frissonna et se retourna : une femme était couchée à ses pieds ! '
  '9':
  - type: note
    content: 'ta servante  : autre terme qu''en 2.13 ; cf. 1S 25.41 ; Lc 1.38. –  le pan de ton vêtement  : dans un autre contexte, le mot pourrait signifier ton aile (cf. 2.12n) ; le vêtement ou manteau servait de couverture pendant la nuit ; la formule employée ici est une expression consacrée qui revient à dire prends-moi pour femme  ; cf. Dt 23.1 ; 27.20 ; Ez 16.8n. –  tu es rédempteur  : cf. 2.20n.'
  - type: text
    content: 'Il dit : Qui es-tu ? Elle répondit : Je suis Ruth, ta servante. Etends le pan de ton vêtement sur moi, puisque tu es rédempteur. '
