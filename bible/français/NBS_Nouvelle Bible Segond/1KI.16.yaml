      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jéhu, fils de Hanani
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit ici d''un prophète, voir 2Ch 19.2 ; 20.34 ; son père, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hanani
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', est mentionné en 2Ch 16.7. Un roi d''Israël portera ce nom au siècle suivant (19.16). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur Basha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contre Basha.
      marker-yv: yv-n
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parvint à Jéhu, fils de Hanani, sur Basha : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Zimri entra…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zimri entra, le frappa et le fit mourir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2R 9.31.'
      marker-yv: yv-n
    - type: text
      text: 'Zimri entra et le mit à mort, la vingt-septième année d''Asa, roi de Juda, et il devint roi à sa place. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il abattit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aucun mâle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: rédempteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: go'el
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Lv 25.25 ; Dt 19.6. Cf. Ex 6.6+.'
      marker-yv: yv-n
    - type: text
      text: 'Dès qu''il fut roi et qu''il fut assis sur son trône, il abattit toute la maison de Basha, il ne lui laissa aucun mâle, ni rédempteur ni ami. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Zimri détruisit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 3s.'
      marker-yv: yv-n
    - type: text
      text: 'Zimri détruisit toute la maison de Basha, selon la parole que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait dite contre Basha par l''intermédiaire de Jéhu, le prophète, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à cause de tous les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péchés
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: futilités
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : désignation méprisante des idoles ; v. 26 ; Dt 32.21 ; Jr 14.22 ; voir aussi 2R 17.15 ; Jr 2.5 ; 10.15 ; 16.19 ; 51.18.'
      marker-yv: yv-n
    - type: text
      text: 'à cause de tous les péchés que Basha et Ela, son fils, avaient commis et fait commettre à Israël, contrariant ainsi le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, par leurs futilités.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le livre des chroniques des rois d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Le reste de l'histoire d'Ela, tout ce qu'il a fait, cela est écrit dans le livre des chroniques des rois d'Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zimri, roi d'Israël
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La vingt-septième année d''Asa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '≈ 885 av. J.-C. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tirtsa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Guibbetôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: La vingt-septième année d'Asa, roi de Juda, Zimri régna sept jours à Tirtsa.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or le peuple avait dressé son camp contre Guibbetôn, qui appartenait aux Philistins. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peut-être au sens restreint de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toute l'armée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 17 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout Israël avec lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Omri
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la signification de ce nom est inconnue.'
      marker-yv: yv-n
    - type: text
      text: 'Le peuple qui campait entendit qu''on disait : Zimri a conspiré ; il a abattu le roi ! Ce jour-là, dans le camp, tout Israël investit Omri, le chef de l''armée, de la royauté sur Israël. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tout Israël avec lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tirtsa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Omri et tout Israël avec lui partirent de Guibbetôn et assiégèrent Tirtsa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le palais royal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le donjon du palais royal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même 2R 15.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et mourut…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brûla sur lui la maison royale par le feu et mourut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jg 9.49 ; 12.1.'
      marker-yv: yv-n
    - type: text
      text: 'Zimri, voyant que la ville était prise, se retira dans le palais royal et mourut en mettant le feu à la maison. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des péchés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle du texte hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. v. 2 ; 15.30,34.
      marker-yv: yv-n
    - type: text
      text: 'C''était à cause des péchés qu''il avait commis en faisant ce qui déplaisait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', en suivant la voie de Jéroboam et le péché qu''il avait commis en faisant pécher Israël.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je t'ai élevé de la poussière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 2.8 ; Ps 113.7.'
      marker-yv: yv-n
    - type: text
      text: 'Parce que je t''ai élevé de la poussière, que je t''ai fait chef sur Israël, mon peuple, mais que tu as suivi la voie de Jéroboam, et que tu as fait pécher Israël, mon peuple, me contrariant ainsi par leurs péchés, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le livre des chroniques des rois d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Le reste de l'histoire de Zimri, et la conspiration qu'il forma, cela est écrit dans le livre des chroniques des rois d'Israël.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La guerre civile dure sans doute environ quatre ans (comparer v. 15 et 23).
      marker-yv: yv-n
    - type: text
      text: 'Alors le peuple d''Israël se divisa en deux partis : une moitié du peuple suivit Tibni, fils de Guinath, pour l''investir de la royauté ; l''autre moitié suivit Omri. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tibni mourut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ici '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ainsi que Joram, son frère, en ce temps-là.
      marker-yv: yv-n
    - type: text
      text: Ceux qui avaient suivi Omri étaient plus forts que ceux qui avaient suivi Tibni, fils de Guinath. Tibni mourut et Omri devint roi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omri, roi d'Israël
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Omri '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est mentionné sur la stèle de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Mésha
        - type: text
          text: ' (cf. 2R 3.4) et dans les annales des rois assyriens. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: douze ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette durée (≈ 885-874 av. J.-C.) inclut selon toute vraisemblance celle de la guerre civile (v. 21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; elle serait donc à compter à partir de la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vingt-septième année d''Asa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et non de sa '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trente et unième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tirtsa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'La trente et unième année d''Asa, roi de Juda, Omri devint roi sur Israël pour douze ans. Après avoir régné six ans à Tirtsa, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux talents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 68 kg. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il bâtit une ville sur la montagne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
