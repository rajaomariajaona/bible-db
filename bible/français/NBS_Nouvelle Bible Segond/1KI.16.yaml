document_id: 1KI.16,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Jéhu, fils de Hanani  : il s''agit ici d''un prophète, voir 2Ch 19.2 ; 20.34 ; son père, Hanani , est mentionné en 2Ch 16.7. Un roi d''Israël portera ce nom au siècle suivant (19.16). –  sur Basha  : autre traduction contre Basha.'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jéhu, fils de Hanani, sur Basha : '
  '10':
  - type: note
    content: 'Zimri entra…  : litt. Zimri entra, le frappa et le fit mourir, cf. 2R 9.31.'
  - type: text
    content: 'Zimri entra et le mit à mort, la vingt-septième année d''Asa, roi de Juda, et il devint roi à sa place. '
  '11':
  - type: note
    content: 'il abattit…  : cf. 15.29n. –  aucun mâle 14.10n. –  rédempteur  : hébreu go''el, cf. Lv 25.25 ; Dt 19.6. Cf. Ex 6.6+.'
  - type: text
    content: 'Dès qu''il fut roi et qu''il fut assis sur son trône, il abattit toute la maison de Basha, il ne lui laissa aucun mâle, ni rédempteur ni ami. '
  '12':
  - type: note
    content: 'Zimri détruisit…  : cf. v. 3s.'
  - type: text
    content: 'Zimri détruisit toute la maison de Basha, selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dite contre Basha par l''intermédiaire de Jéhu, le prophète, '
  '13':
  - type: note
    content: 'à cause de tous les péchés…  : cf. v. 26. –  futilités  : désignation méprisante des idoles ; v. 26 ; Dt 32.21 ; Jr 14.22 ; voir aussi 2R 17.15 ; Jr 2.5 ; 10.15 ; 16.19 ; 51.18.'
  - type: text
    content: 'à cause de tous les péchés que Basha et Ela, son fils, avaient commis et fait commettre à Israël, contrariant ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, par leurs futilités.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 11.41n. –  le livre des chroniques des rois d'Israël 14.19n.
  - type: text
    content: Le reste de l'histoire d'Ela, tout ce qu'il a fait, cela est écrit dans le livre des chroniques des rois d'Israël.
  - type: heading
    content: Zimri, roi d'Israël
  '15':
  - type: text
    content: ' '
  - type: note
    content: La vingt-septième année d'Asa ≈ 885 av. J.-C. –  Tirtsa 14.17n  ; 15.21n. –  Guibbetôn 15.27n.
  - type: text
    content: La vingt-septième année d'Asa, roi de Juda, Zimri régna sept jours à Tirtsa.
  - type: text
    content: 'Or le peuple avait dressé son camp contre Guibbetôn, qui appartenait aux Philistins. '
  '16':
  - type: note
    content: 'tout Israël  : peut-être au sens restreint de toute l''armée, de même au v. 17 (tout Israël avec lui). –  Omri  : la signification de ce nom est inconnue.'
  - type: text
    content: 'Le peuple qui campait entendit qu''on disait : Zimri a conspiré ; il a abattu le roi ! Ce jour-là, dans le camp, tout Israël investit Omri, le chef de l''armée, de la royauté sur Israël. '
  '17':
  - type: note
    content: tout Israël avec lui v. 16n. –  Tirtsa 14.17n  ; 15.21n.
  - type: text
    content: 'Omri et tout Israël avec lui partirent de Guibbetôn et assiégèrent Tirtsa. '
  '18':
  - type: note
    content: 'le palais royal  : autre traduction le donjon du palais royal  ; de même 2R 15.25. –  et mourut…  : litt. brûla sur lui la maison royale par le feu et mourut  ; cf. Jg 9.49 ; 12.1.'
  - type: text
    content: 'Zimri, voyant que la ville était prise, se retira dans le palais royal et mourut en mettant le feu à la maison. '
  '19':
  - type: note
    content: 'des péchés  : autre lecture traditionnelle du texte hébreu du péché. Cf. v. 2 ; 15.30,34.'
  - type: text
    content: 'C''était à cause des péchés qu''il avait commis en faisant ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', en suivant la voie de Jéroboam et le péché qu''il avait commis en faisant pécher Israël.'
  '2':
  - type: note
    content: 'je t''ai élevé de la poussière  : cf. 1S 2.8 ; Ps 113.7.'
  - type: text
    content: 'Parce que je t''ai élevé de la poussière, que je t''ai fait chef sur Israël, mon peuple, mais que tu as suivi la voie de Jéroboam, et que tu as fait pécher Israël, mon peuple, me contrariant ainsi par leurs péchés, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 11.41n. –  le livre des chroniques des rois d'Israël 14.19n.
  - type: text
    content: Le reste de l'histoire de Zimri, et la conspiration qu'il forma, cela est écrit dans le livre des chroniques des rois d'Israël.
  '21':
  - type: text
    content: ' '
  - type: note
    content: La guerre civile dure sans doute environ quatre ans (comparer v. 15 et 23).
  - type: text
    content: 'Alors le peuple d''Israël se divisa en deux partis : une moitié du peuple suivit Tibni, fils de Guinath, pour l''investir de la royauté ; l''autre moitié suivit Omri. '
  '22':
  - type: note
    content: 'Tibni mourut  : ici LXX ajoute ainsi que Joram, son frère, en ce temps-là.'
  - type: text
    content: Ceux qui avaient suivi Omri étaient plus forts que ceux qui avaient suivi Tibni, fils de Guinath. Tibni mourut et Omri devint roi.
  - type: heading
    content: Omri, roi d'Israël
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Omri est mentionné sur la stèle de Mésha (cf. 2R 3.4) et dans les annales des rois assyriens. –  douze ans  : cette durée (≈ 885-874 av. J.-C.) inclut selon toute vraisemblance celle de la guerre civile (v. 21n) ; elle serait donc à compter à partir de la vingt-septième année d''Asa et non de sa trente et unième année . –  Tirtsa 14.17n  ; 15.21n.'
  - type: text
    content: 'La trente et unième année d''Asa, roi de Juda, Omri devint roi sur Israël pour douze ans. Après avoir régné six ans à Tirtsa, '
  '24':
  - type: note
    content: 'deux talents  : environ 68 kg. –  il bâtit une ville sur la montagne (ou la colline, 443 m) : litt. il bâtit la montagne. –  Samarie  : hébreu Shomrôn, expliqué ici d''après le nom de Shémer (sens possible poste de garde). Samarie sera la capitale du royaume d''Israël jusqu''à sa fin (cf. 2R 17.5s). Dès le règne d''Omri il s''agit d''une ville importante, qui sera souvent mentionnée dans les inscriptions anciennes (notamment assyriennes). –  propriétaire  : litt. seigneur.'
  - type: text
    content: il acheta à Shémer la montagne de Samarie pour deux talents d'argent ; il bâtit une ville sur la montagne et appela la ville qu'il bâtit du nom de Samarie, d'après le nom de Shémer, propriétaire de la montagne.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'ce qui déplaisait au Seigneur  : cf. 11.6n. –  ses prédécesseurs  : litt. ceux qui étaient devant lui  ; cf. v. 30,33.'
  - type: text
    content: 'Omri fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il agit encore plus mal que tous ses prédécesseurs. '
  '26':
  - type: note
    content: 'le péché  : autre lecture traditionnelle les péchés. –  futilités v. 13n.'
  - type: text
    content: 'Il suivit en tout la voie de Jéroboam, fils de Nebath, et le péché qu''il avait fait commettre à Israël, contrariant ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, par leurs futilités.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire… 11.41n. –  ce qu''il a fait…  : d''après plusieurs témoignages extérieurs à la Bible, Omri fut un roi très puissant ; la stèle de Mésha atteste qu''il a étendu sa domination sur Moab. Plusieurs documents assyriens appellent Israël « le pays d''Omri » ; un autre qualifie peut-être encore Jéhu ( Yaoua ), qui mit fin à la dynastie omride, de « fils d''Omri » (cf. 2R 10.32n). –  le livre des chroniques des rois d''Israël 14.19n.'
  - type: text
    content: 'Le reste de l''histoire d''Omri, ce qu''il a fait, la vaillance qu''il a montrée, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '28':
  - type: note
    content: 'se coucha avec ses pères 1.21n. –  Samarie v. 24n. –  Achab (Frère du père, c.-à-d. Egal au père) : le nom d’Achab figure parmi la liste des rois vaincus à la bataille de Qarqar en 853 av. J.-C. et mentionnés sur une stèle du roi Salmanasar III.'
  - type: text
    content: Omri se coucha avec ses pères et fut enseveli à Samarie. Achab, son fils, devint roi à sa place.
  - type: heading
    content: Achab, roi d'Israël
  '29':
  - type: text
    content: ' '
  - type: note
    content: Achab v. 28n. –  régna vingt-deux ans ≈ 874-853 av. J.-C.
  - type: text
    content: 'Achab, fils d''Omri, devint roi sur Israël, la trente-huitième année d''Asa, roi de Juda. Achab, fils d''Omri régna vingt-deux ans sur Israël à Samarie. '
  '3':
  - type: note
    content: 'je balaie…  : cf. 14.7-11. –  ta maison semblable à la maison…  : elle a été entièrement massacrée ; voir 15.29.'
  - type: text
    content: 'je balaie Basha et sa maison ; je rendrai ta maison semblable à la maison de Jéroboam, fils de Nebath. '
  '30':
  - type: note
    content: 'fit ce qui déplaisait au Seigneur  : cf. v. 25n. –  plus que tous ses prédécesseurs  : cf. v. 25,33.'
  - type: text
    content: 'Achab, fils d''Omri, fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', plus que tous ses prédécesseurs. '
  '31':
  - type: note
    content: 'suivre les péchés  : litt. marcher dans les péchés, cf. 12.28-31. –  Jézabel  : hébreu ’Izével. Ce nom peut avoir plusieurs significations  : Baal exalte ; Baal est son époux. Jézabel est une Phénicienne de Sidon (actuellement Saïda). Comparer le jugement porté ici sur ce mariage avec 11.1-10 ; voir aussi Ap 2.20. –  Eth-Baal ou Ithobaal (Baal avec lui).'
  - type: text
    content: 'Comme si cela avait été peu de chose pour lui de suivre les péchés de Jéroboam, fils de Nebath, il prit pour femme Jézabel, fille d''Eth-Baal, roi des Sidoniens, et il alla servir le Baal et se prosterner devant lui. '
  '32':
  - type: note
    content: 'Il semble qu''avec le règne d''Achab le Baal soit promu au rang de divinité officielle du royaume du Nord (cf. 2R 10.18), ce qui ne manquera pas de susciter une forte réaction parmi les partisans de YHWH. –  dans la maison du Baal  : c.-à-d. dans le temple du Baal. –  Samarie v. 24n.'
  - type: text
    content: 'Il éleva un autel au Baal dans la maison du Baal qu''il bâtit à Samarie. '
  '33':
  - type: note
    content: 'le poteau cultuel (l''ashéra) 15.13n. –  fit plus encore… que tous les rois d''Israël…  : cf. v. 25n,30.'
  - type: text
    content: 'Achab fit aussi le poteau cultuel (l''ashéra). Achab fit plus encore pour contrarier le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, que tous les rois d''Israël qui l''avaient précédé.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'bâtit  : autres traductions rebâtit, fortifia (selon Jg 3.13 ; 2S 10.5, Jéricho était habitée auparavant). –  au prix d''Abiram… ou au moyen d''Abiram…, sur Abiram…  ; on a souvent vu dans cette expression une allusion à la pratique, courante à certaines époques au Proche-Orient, qui consistait à ensevelir des humains, en particulier des enfants, en général préalablement immolés, sous les fondations des murs et des portes des villes. Mais on peut aussi penser à une mort naturelle perçue comme la conséquence de la malédiction de Jos 6.26 ( selon la parole… ).'
  - type: text
    content: 'En ses jours, Hiel, le Béthélite, bâtit Jéricho ; il en posa les fondations au prix d''Abiram, son premier-né, et il en installa les portes au prix de Segoub, son cadet, selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dite par l''intermédiaire de Josué, fils de Noun.'
  '4':
  - type: note
    content: 'Celui de la famille de Basha…  : cf. 14.11n  ; 21.24.'
  - type: text
    content: Celui de la famille de Basha qui mourra dans la ville sera dévoré par les chiens, et celui des siens qui mourra dans la campagne sera dévoré par les oiseaux du ciel.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 11.41n. –  le livre des chroniques des rois d'Israël 14.19n.
  - type: text
    content: 'Le reste de l''histoire de Basha, ce qu''il a fait, sa vaillance, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '6':
  - type: note
    content: se coucha avec ses pères 1.21n. –  Tirtsa 14.17n  ; 15.21n.
  - type: text
    content: 'Basha se coucha avec ses pères et fut enseveli à Tirtsa. Ela, son fils, devint roi à sa place. '
  '7':
  - type: note
    content: 'parce qu''il avait abattu cette maison  : litt. parce qu''il l''avait frappée, voir 15.29.'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était même parvenue, par l''intermédiaire de Jéhu, fils de Hanani, le prophète, à Basha et à sa maison, à cause de tout ce qu''il avait fait pour déplaire au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le contrariant ainsi par les œuvres de ses mains et devenant semblable à la maison de Jéroboam, et aussi parce qu''il avait abattu cette maison.'
  - type: heading
    content: Ela, roi d'Israël
  '8':
  - type: text
    content: ' '
  - type: note
    content: Tirtsa 14.17n  ; 15.21n. –  deux ans ≈ 886-885 av. J.-C.
  - type: text
    content: La vingt-sixième année d'Asa, roi de Juda, Ela, fils de Basha, devint roi sur Israël à Tirtsa pour deux ans.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Un de ses officiers  : litt. son serviteur . –  buvant à s''enivrer  : cf. 20.16n. –  intendant de la maison 4.6n. –  Tirtsa 14.17n  ; 15.21n.'
  - type: text
    content: 'Un de ses officiers, Zimri, chef de la moitié des chars, conspira contre lui. Ela était à Tirtsa, buvant à s''enivrer dans la maison d''Artsa, l''intendant de la maison à Tirtsa. '
