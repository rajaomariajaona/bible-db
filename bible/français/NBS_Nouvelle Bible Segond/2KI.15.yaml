document_id: 2KI.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Azaria (Ozias), roi de Juda
  - type: heading
    content: 2Ch 26.3-4
  - type: text
    content: 'La vingt-septième année de Jéroboam, roi d''Israël, Azaria, fils d''Amatsia, devint roi de Juda. '
  '10':
  - type: note
    content: 'l''abattit  : litt. le frappa. –  devant le peuple  : tournure araméenne. On pourrait aussi voir dans le texte correspondant, avec un ms de LXX, le nom d''un certain Keblaam, auxiliaire de Shalloum, ou, avec d''autres, la mention de la ville de Yibléam comme lieu du meurtre de Zacharie (cf. Jos 17.11n). Dans ce dernier cas de lecture, Shalloum pourrait apparaître comme le vengeur du roi judéen Achazia (cf. 9.27n).'
  - type: text
    content: 'Shalloum, fils de Yabesh, conspira contre lui et l''abattit devant le peuple ; ainsi il le mit à mort et devint roi à sa place. '
  '11':
  - type: note
    content: Le reste de l'histoire… 1R 11.41n.
  - type: text
    content: Le reste de l'histoire de Zacharie, cela est écrit dans le livre des chroniques des rois d'Israël.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'C''était la parole…  : cf. 10.30n.'
  - type: text
    content: 'C''était la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dite à Jéhu : « Tes fils seront assis sur le trône d''Israël jusqu''à la quatrième génération. » Il en fut ainsi.'
  - type: heading
    content: Shalloum, roi d'Israël
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'trente-neuvième année  : un ms grec porte vingt-huitième année , un autre trentième  ; de même au v. 17. –  Ozias  : plusieurs mss hébreux, LXX, Tg et Vg lisent Azaria . –  un mois  : litt. une lune de jours  ; autre traduction un mois jour pour jour  ; même expression en Dt 21.13.'
  - type: text
    content: 'Shalloum, fils de Yabesh, devint roi la trente-neuvième année d''Ozias, roi de Juda. Il régna un mois à Samarie. '
  '14':
  - type: note
    content: 'fils de Gadi  : cette indication laisse supposer que le nouveau roi serait de la tribu de Gad. –  Tirtsa  : ancienne résidence des rois d''Israël de Jéroboam Ier à Omri ; cf. 1R 14.17 ; 15.21,33 ; 16.8,15-18,23 etc. –  à Samarie  : cette deuxième mention de Samarie est absente d''un ms hébreu, de plusieurs mss de LXX et d''un ms de Tg. –  et devint roi à sa place  : absent de LXX.'
  - type: text
    content: 'Menahem, fils de Gadi, monta de Tirtsa, vint à Samarie et abattit Shalloum, fils de Yabesh, à Samarie. Il le mit à mort et devint roi à sa place. '
  '15':
  - type: note
    content: Le reste de l'histoire… 1R 11.41n.
  - type: text
    content: Le reste de l'histoire de Shalloum, et la conspiration qu'il forma, cela est écrit dans le livre des chroniques des rois d'Israël.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Menahem recourt envers une ville rebelle à des procédés d''une extrême violence attestés dans les textes de la propagande de son suzerain assyrien Tiglath-Piléser (Poul au v. 19). –  Tiphsah  : le site de cette ville située dans le nord du pays (1R 5.4) n''a pas été localisé. La plupart des mss de LXX ont lu Tirtsa sans doute en raison de la suite du texte, d''autres Tappouah (Jos 17.8 ; cf. 1 Maccabées 9.50 « Téphôn ») correspondant au site actuel de Tell Seh Abou Zarad, à 37 km au nord de Jérusalem. –  ses portes  : sous-entendu dans le texte. –  il éventra…  : litt. il frappa (le même verbe est traduit plus haut par mit à mal ) toutes ses femmes enceintes en éventrant (cf. 8.12).'
  - type: text
    content: Alors Menahem mit à mal Tiphsah et tous ceux qui s'y trouvaient, ainsi que son territoire depuis Tirtsa, parce qu'elle n'avait pas ouvert ses portes ; il éventra toutes les femmes enceintes.
  - type: heading
    content: Menahem, roi d'Israël
  '17':
  - type: text
    content: 'La trente-neuvième année d''Azaria, roi de Juda, Menahem, fils de Gadi, devint roi sur Israël ; il régna dix ans à Samarie. '
  '18':
  - type: note
    content: 'Pendant toute sa vie  : litt. tous ses jours, LXX dans ses jours (rattaché au v. 19). –  des péchés  : quelques mss hébreux, la plupart des mss de LXX et un ms de Tg de tous les péchés.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Pendant toute sa vie, il ne s''écarta pas des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël. '
  '19':
  - type: note
    content: 'Poul, roi d''Assyrie  : ce nom correspond au nom akkadien Poulou, porté dans des documents assyriens par Tiglath-Piléser (ou Téglat-Phalasar) III (745-727). Le roi assyrien aurait repris là un titre babylonien après sa victoire en 728 sur Babylone ; cf. 1Ch 5.6n. Une stèle de Tiglath-Piléser retrouvée en Iran mentionne le versement du tribut de Menahem. –  vint dans le pays  : la terminologie employée laisse supposer qu''il ne s''agit pas d''une expédition militaire mais d''une simple inspection de territoires que le souverain assyrien considère comme soumis. –  mille talents d''argent  : environ trente tonnes. –  pour qu''il rende forte sa royauté  : litt. pour fortifier sa royauté dans sa main.'
  - type: text
    content: 'Poul, roi d''Assyrie, vint dans le pays ; et Menahem donna à Poul mille talents d''argent, pour qu''il rende forte sa royauté. '
  '2':
  - type: note
    content: 'Yekolia  : hébreu Yekolyahou.'
  - type: text
    content: 'Il avait seize ans lorsqu''il devint roi ; il régna cinquante-deux ans à Jérusalem. Le nom de sa mère était Yekolia ; elle était de Jérusalem. '
  '20':
  - type: note
    content: 'gens riches  : autre traduction vaillants guerriers (cf. Jos 1.14 ; 1R 1.8 ; 2R 5.1) ; il s''agirait alors des hommes susceptibles d''acquérir un équipement militaire ; mais l''expression correspondante peut aussi évoquer la richesse, sans référence à la guerre (Rt 2.1 ; cf. Gn 34.29 ; Dt 8.17s ; Es 10.14 ; Ez 28.4 ; Jb 20.15). –  cinquante sicles  : il fallait environ 3 000 sicles pour faire un talent (Ex 38.25s) ; voir mesures.'
  - type: text
    content: 'Menahem tira cet argent d''Israël, de tous les gens riches, afin de le donner au roi d''Assyrie : cinquante sicles d''argent par personne. Alors le roi d''Assyrie s''en retourna ; il ne resta pas dans le pays.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 1R 11.41n.
  - type: text
    content: 'Le reste de l''histoire de Menahem, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '22':
  - type: note
    content: se coucha… v. 7,38 ; 8.24+ ; 1R 1.21+.
  - type: text
    content: Menahem se coucha avec ses pères. Peqahia, son fils, devint roi à sa place.
  - type: heading
    content: Peqahia, roi d'Israël
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'cinquantième  : quarantième pour un ms de LXX. –  il régna deux ans  : le texte hébreu est très laconique  : deux ans . Certains mss de LXX portent dix , d''autres douze.'
  - type: text
    content: 'La cinquantième année d''Azaria, roi de Juda, Peqahia, fils de Menahem, devint roi sur Israël à Samarie ; il régna deux ans. '
  '24':
  - type: note
    content: ce qui déplaisait au Seigneur v. 9+. –  des péchés que Jéroboam… 10.31n.
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il ne s''écarta pas des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël. '
  '25':
  - type: note
    content: 'Remalia  : hébreu Remalyahou. –  le palais royal  : autre traduction le donjon du palais royal  ; cf. 1R 16.18n. –  Argob et Arié  : ces deux noms, lus ici comme les noms propres de proches du roi, ont également été compris comme des noms d''objets (statues d''un aigle et d''un lion) près desquels le roi aurait été tué. –  il avait avec lui  : il s''agit peut-être de Péqah. –  cinquante Galaadites  : litt. cinquante hommes des fils des Galaadites. LXX cinquante hommes d''entre les quatre cents.'
  - type: text
    content: 'Péqah, fils de Remalia, son écuyer, conspira contre lui ; il l''abattit à Samarie, dans le palais royal, de même qu''Argob et Arié ; il avait avec lui cinquante Galaadites. Ainsi, il mit à mort Peqahia et devint roi à sa place. '
  '26':
  - type: note
    content: Le reste de l'histoire… 1R 11.41n.
  - type: text
    content: Le reste de l'histoire de Peqahia, tout ce qu'il a fait, cela est écrit dans le livre des chroniques des rois d'Israël.
  - type: heading
    content: Péqah, roi d'Israël
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'vingt ans  : certains mss de LXX portent vingt-huit ou trente.'
  - type: text
    content: 'La cinquante-deuxième année d''Azaria, roi de Juda, Péqah, fils de Remalia, devint roi sur Israël à Samarie ; il régna vingt ans. '
  '28':
  - type: note
    content: 'ce qui déplaisait au Seigneur  : cf. v. 9+.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il ne s''écarta pas des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël. '
  '29':
  - type: note
    content: 'Tiglath-Piléser, roi d''Assyrie  : cf. v. 19 ; 1Ch 5.6n. –  Iyôn, Abel-Beth-Maaka  : cf. 1R 15.20n. –  Yanoah  : peut-être Khirbet en-Na''imeh au nord du lac Houleh. –  Qédesh  : Tell Qédesh à 10 km au nord de Hatsor, cf. Jos 20.7. –  Hatsor  : identifiée avec Tell el-Qedah rebaptisé depuis Tell Hatsor, dominant le lac Houleh et commandant la route de Damas. Avec la perte de ces territoires, c''est toute la partie nord du royaume d''Israël qui est amputée, cf. Es 8.23.'
  - type: text
    content: 'Aux jours de Péqah, roi d''Israël, Tiglath-Piléser, roi d''Assyrie, vint et prit Iyôn, Abel-Beth-Maaka, Yanoah, Qédesh, Hatsor, le Galaad et la Galilée, tout le pays de Nephtali ; il les exila en Assyrie. '
  '3':
  - type: note
    content: 'ce qui convenait au Seigneur  : cf. v. 34 ; 10.30n.'
  - type: text
    content: 'Il fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', exactement comme l''avait fait Amatsia, son père. '
  '30':
  - type: note
    content: 'Le renversement de Péqah par Osée est évoqué dans des documents assyriens ; il aurait eu lieu à l''initiative de Tiglath-Piléser III, roi d''Assyrie. –  la vingtième année…  : précision absente d''un ms hébreu et de plusieurs mss de LXX ; cf. v. 33.'
  - type: text
    content: 'Osée, fils d''Ela, forma une conspiration contre Péqah, fils de Remalia, et le mit à mort. Il devint roi à sa place, la vingtième année de Jotam, fils d''Ozias. '
  '31':
  - type: note
    content: Le reste de l'histoire… 1R 11.41n.
  - type: text
    content: Le reste de l'histoire de Péqah, tout ce qu'il a fait, cela est écrit dans le livre des chroniques des rois d'Israël.
  - type: heading
    content: Jotam, roi de Juda
  - type: heading
    content: 2Ch 27.1-7
  '32':
  - type: text
    content: 'La deuxième année de Péqah, fils de Remalia, roi d''Israël, Jotam, fils d''Ozias, devint roi de Juda. '
  '33':
  - type: note
    content: 'seize ans  : ce chiffe pourrait ne pas tenir compte des années de régence assurée par Jotam, cf. v. 5. Voir « Le temps des rois »♦.'
  - type: text
    content: 'Il avait vingt-cinq ans lorsqu''il devint roi ; il régna seize ans à Jérusalem. Le nom de sa mère était Yerousha, fille de Tsadoq. '
  '34':
  - type: note
    content: 'ce qui convenait  : cf. 10.30n.'
  - type: text
    content: 'Il fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il fit exactement ce qu''avait fait Ozias, son père. '
  '35':
  - type: note
    content: 'ne disparurent pas  : cf. 14.4n.'
  - type: text
    content: 'Toutefois les hauts lieux ne disparurent pas ; le peuple offrait encore des sacrifices et de l''encens dans les hauts lieux. Jotam bâtit la porte Haute de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '36':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  le livre des chroniques des rois de Juda v. 6 ; 1R 14.19n.
  - type: text
    content: Le reste de l'histoire de Jotam, tout ce qu'il a fait, cela est écrit dans le livre des chroniques des rois de Juda.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Retsîn  : ce roi araméen est appelé Ra‘ianou (ou Raqianou ) , roi de Damas , dans des textes assyriens ; cf. 16.5-9 ; Es 7.1,4,8 ; 8.6 ; 9.10.'
  - type: text
    content: 'En ces jours-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' commença à envoyer contre Juda Retsîn, roi d''Aram, et Péqah, fils de Remalia. '
  '38':
  - type: note
    content: 'se coucha… v. 7,22 ; 8.24+ ; 1R 1.21+. –  et fut enseveli avec ses pères  : absent de quelques mss hébreux, de certains mss de LXX et d''un ms de Tg. –  son père  : absent de deux mss hébreux et de plusieurs mss des versions anciennes.'
  - type: text
    content: Jotam se coucha avec ses pères et fut enseveli avec ses pères dans la Ville de David, son père. Achaz, son fils, devint roi à sa place.
  '4':
  - type: note
    content: Cf. 14.4n.
  - type: text
    content: Toutefois les hauts lieux ne disparurent pas ; le peuple offrait encore des sacrifices et de l'encens dans les hauts lieux.
  - type: heading
    content: 2Ch 26.16-23
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'lépreux  : cf. 5.1n. –  intendant de la maison Gn 39.4+ ; 1R 4.6n  ; 16.9 ; 18.3. –  gouvernait ou jugeait , Jg 2.16n  ; Rt 1.1n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappa le roi, qui resta « lépreux » jusqu''au jour de sa mort, habitant dans une maison isolée. Jotam, fils du roi, l''intendant de la maison, gouvernait le peuple du pays. '
  '6':
  - type: note
    content: 'Le reste de l''histoire… 1R 11.41n. –  Azaria  : hébreu ‘Azaryahou. –  le livre des chroniques des rois de Juda v. 36 ; 1R 14.19n.'
  - type: text
    content: 'Le reste de l''histoire d''Azaria, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois de Juda. '
  '7':
  - type: note
    content: se coucha… v. 22,38 ; 8.24+ ; 1R 1.21+.
  - type: text
    content: Azaria se coucha avec ses pères, et on l'ensevelit avec ses pères dans la Ville de David. Jotam, son fils, devint roi à sa place.
  - type: heading
    content: Zacharie, roi d'Israël
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'La trente-huitième année  : un ms de LXX donne vingt-huitième , un autre vingt-neuvième.'
  - type: text
    content: 'La trente-huitième année d''Azaria, roi de Juda, Zacharie, fils de Jéroboam, devint roi sur Israël à Samarie ; il régna six mois. '
  '9':
  - type: note
    content: 'ce qui déplaisait…  : cf. v. 18,24,28 ; 3.2n  ; 1R 11.6+. –  des péchés  : certains mss de LXX et Syr portent de tous les péchés.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme l''avaient fait ses pères ; il ne s''écarta pas des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël. '
