document_id: 2KI.15,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Azaria (Ozias), roi de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Ch 26.3-4
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La vingt-septième année de Jéroboam, roi d''Israël, Azaria, fils d''Amatsia, devint roi de Juda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'abattit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le frappa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devant le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : tournure araméenne. On pourrait aussi voir dans le texte correspondant, avec un ms de LXX, le nom d''un certain '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Keblaam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', auxiliaire de Shalloum, ou, avec d''autres, la mention de la ville de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yibléam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comme lieu du meurtre de Zacharie (cf. Jos 17.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ). Dans ce dernier cas de lecture, Shalloum pourrait apparaître comme le vengeur du roi judéen Achazia (cf. 9.27
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Shalloum, fils de Yabesh, conspira contre lui et l''abattit devant le peuple ; ainsi il le mit à mort et devint roi à sa place. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 11.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Le reste de l'histoire de Zacharie, cela est écrit dans le livre des chroniques des rois d'Israël.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'était la parole…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''était la parole que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait dite à Jéhu : « Tes fils seront assis sur le trône d''Israël jusqu''à la quatrième génération. » Il en fut ainsi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shalloum, roi d'Israël
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trente-neuvième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : un ms grec porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vingt-huitième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', un autre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trentième
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; de même au v. 17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ozias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : plusieurs mss hébreux, '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' lisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Azaria
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une lune de jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un mois jour pour jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; même expression en Dt 21.13.
      marker-yv: yv-n
    - type: text
      text: 'Shalloum, fils de Yabesh, devint roi la trente-neuvième année d''Ozias, roi de Juda. Il régna un mois à Samarie. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fils de Gadi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette indication laisse supposer que le nouveau roi serait de la tribu de Gad. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tirtsa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ancienne résidence des rois d''Israël de Jéroboam I'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ' à Omri ; cf. 1R 14.17 ; 15.21,33 ; 16.8,15-18,23 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Samarie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette deuxième mention de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Samarie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est absente d''un ms hébreu, de plusieurs mss de LXX et d''un ms de Tg. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et devint roi à sa place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : absent de LXX.'
      marker-yv: yv-n
    - type: text
      text: 'Menahem, fils de Gadi, monta de Tirtsa, vint à Samarie et abattit Shalloum, fils de Yabesh, à Samarie. Il le mit à mort et devint roi à sa place. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 11.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Le reste de l'histoire de Shalloum, et la conspiration qu'il forma, cela est écrit dans le livre des chroniques des rois d'Israël.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Menahem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'recourt envers une ville rebelle à des procédés d''une extrême violence attestés dans les textes de la propagande de son suzerain assyrien Tiglath-Piléser (Poul au v. 19). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tiphsah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le site de cette ville située dans le nord du pays (1R 5.4) n''a pas été localisé. La plupart des mss de LXX ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tirtsa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sans doute en raison de la suite du texte, d''autres '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tappouah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Jos 17.8 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.50 « Téphôn ») correspondant au site actuel de Tell Seh Abou Zarad, à 37 km au nord de Jérusalem. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses portes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il éventra…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il frappa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le même verbe est traduit plus haut par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mit à mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toutes ses femmes enceintes en éventrant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 8.12).
      marker-yv: yv-n
    - type: text
      text: Alors Menahem mit à mal Tiphsah et tous ceux qui s'y trouvaient, ainsi que son territoire depuis Tirtsa, parce qu'elle n'avait pas ouvert ses portes ; il éventra toutes les femmes enceintes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Menahem, roi d'Israël
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'La trente-neuvième année d''Azaria, roi de Juda, Menahem, fils de Gadi, devint roi sur Israël ; il régna dix ans à Samarie. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pendant toute sa vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous ses jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans ses jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(rattaché au v. 19). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des péchés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : quelques mss hébreux, la plupart des mss de LXX et un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de tous les péchés.
      marker-yv: yv-n
    - type: text
      text: 'Il fit ce qui déplaisait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Pendant toute sa vie, il ne s''écarta pas des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Poul, roi d'Assyrie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce nom correspond au nom akkadien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Poulou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', porté dans des documents assyriens par Tiglath-Piléser (ou Téglat-Phalasar) III (745-727). Le roi assyrien aurait repris là un titre babylonien après sa victoire en 728 sur Babylone ; cf. 1Ch 5.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Une stèle de Tiglath-Piléser retrouvée en Iran mentionne le versement du tribut de Menahem. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vint dans le pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la terminologie employée laisse supposer qu''il ne s''agit pas d''une expédition militaire mais d''une simple inspection de territoires que le souverain assyrien considère comme soumis. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mille talents d'argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ trente tonnes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour qu'il rende forte sa royauté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour fortifier sa royauté dans sa main.
      marker-yv: yv-n
    - type: text
      text: 'Poul, roi d''Assyrie, vint dans le pays ; et Menahem donna à Poul mille talents d''argent, pour qu''il rende forte sa royauté. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yekolia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yekolyahou.
      marker-yv: yv-n
    - type: text
      text: 'Il avait seize ans lorsqu''il devint roi ; il régna cinquante-deux ans à Jérusalem. Le nom de sa mère était Yekolia ; elle était de Jérusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gens riches
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vaillants guerriers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Jos 1.14 ; 1R 1.8 ; 2R 5.1) ; il s''agirait alors des hommes susceptibles d''acquérir un équipement militaire ; mais l''expression correspondante peut aussi évoquer la richesse, sans référence à la guerre (Rt 2.1 ; cf. Gn 34.29 ; Dt 8.17s ; Es 10.14 ; Ez 28.4 ; Jb 20.15). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cinquante sicles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il fallait environ 3 000 sicles pour faire un talent (Ex 38.25s) ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Menahem tira cet argent d''Israël, de tous les gens riches, afin de le donner au roi d''Assyrie : cinquante sicles d''argent par personne. Alors le roi d''Assyrie s''en retourna ; il ne resta pas dans le pays.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
