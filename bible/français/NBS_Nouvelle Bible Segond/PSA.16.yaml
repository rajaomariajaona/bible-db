document_id: PSA.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Joie d'un homme sauvé de la mort
  - type: text
    content: ' '
  - type: note
    content: 'Hymne  : traduction conjecturale d''un terme hébreu de sens incertain ( miktam , également en 56–60) ; on l''a rapproché, tantôt d''une racine signifiant couvrir ou cacher , pour lui donner le sens de chant à mi-voix , de prière privée ou de psaume d''expiation (par rapprochement avec la racine ktm en akkadien), tantôt du verbe traduit par marquer ou graver en Jr 2.22, auquel cas il signifierait confession ou témoignage écrit (c.-à-d. indélébile ). –  Dieu  : hébreu ’El , cf. Gn 21.33n. –  c''est en toi que je trouve un abri  : autre traduction je cherche en toi un abri  ; cf. 7.2+.'
  - type: text
    content: Hymne. De David.
  - type: text
    content: 'Garde-moi, ô Dieu : c''est en toi que je trouve un abri.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 30.4+ ; 1S 2.6. –  abandonneras / permettras  : autres traductions abandonnes / permets . – Voir séjour des morts. –  que ton fidèle… (4.4n) : LXX que ton saint voie la décomposition ou la pourriture  ; cf. Jon 2.7 ; Ac 2.27nss ; 13.34ss.'
  - type: text
    content: Car tu ne m'abandonneras pas au séjour des morts,
  - type: text
    content: tu ne permettras pas que ton fidèle voie la fosse.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le sentier de la vie Pr 5.6 ; 15.24. –  joies devant toi  : litt. joies avec ta face 21.7n  ; cf. 104.34 ; Ac 2.28n. –  à ta droite  : cf. 110.1.'
  - type: text
    content: Tu me feras connaître le sentier de la vie ;
  - type: text
    content: il y a abondance de joies devant toi,
  - type: text
    content: des délices éternelles à ta droite.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je dis  : cf. 31.15 ; 140.7 ; la plupart des mss hébreux portent tu dis (au féminin, se rapportant à l’ être ou à l’ âme du psalmiste ? Cf. Gn 1.20n). –  Tu es le Seigneur  : autre traduction tu es mon Seigneur. –  tu es mon bien…  : traduction incertaine ; quelques-uns modifient le texte hébreu traditionnel, passablement obscur, pour lire tout mon bonheur dépend de toi ou mon bonheur n''est rien sans toi  ; LXX tu n''as pas besoin de mes biens.'
  - type: text
    content: 'Je dis au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Tu es le Seigneur,'
  - type: text
    content: tu es mon bien, il n'y a rien au-dessus de toi !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction conjecturale d''un texte hébreu difficilement compréhensible dans sa forme actuelle ; certains opposent les saints et les braves (ou les magnifiques  ; cf. Jg 5.13n) aux idoles du v. 4, d''autres au contraire les identifient en mettant le verbe au passé  : tout mon plaisir était en eux (cf. v. 5s ; Es 62.4). Quelques-uns modifient le texte hébreu traditionnel (en partie d''après LXX) pour lire son désir est pour les saints de son pays ; en eux il glorifiera tout son plaisir.'
  - type: text
    content: Les saints qui sont dans le pays, eux-mêmes
  - type: text
    content: et les braves, tout mon plaisir est en eux.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Leurs idoles se multiplient  : autre traduction leurs blessures (ou leurs douleurs ) se multiplient (cf. 147.3). –  un autre ( dieu  ?) …  : texte obscur et traduction conjecturale ; litt. un autre, ils se hâtent. –  je ne répandrai pas…  : cf. 7.4-6. –  libations Jr 7.18. –  leurs noms Ex 23.13 ; Os 2.19 ; Za 13.2.'
  - type: text
    content: Leurs idoles se multiplient ; un autre arrive, ils se hâtent auprès de lui ;
  - type: text
    content: je ne répandrai pas leurs libations de sang,
  - type: text
    content: je ne mettrai pas leurs noms sur mes lèvres.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'mon partage  : litt. le partage (11.6) de ma part (17.14) : cf. 73.26 ; 119.57 ; 142.6 ; Nb 18.20 ; Dt 10.9 ; 18.2 ; Jos 13.14 ; Lm 3.24 ; voir aussi Jr 13.25. –  ma coupe  : cf. 11.6. –  mon lot  : il s''agit habituellement d''une portion attribuée par le sort  ; même terme en 22.19 ; 125.3 ; Lv 16.8n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est mon partage et ma coupe ;'
  - type: text
    content: c'est toi qui assures mon lot ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'la part…  : litt. les cordeaux (pour mesurer les parts de terrain) sont tombés pour moi dans les délices  ; cf. 105.11n.'
  - type: text
    content: la part qui me revient est un lieu de délices ;
  - type: text
    content: c'est un patrimoine magnifique pour moi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Je bénis le Seigneur 31.22 ; 34.2 ; 41.14 ; 68.20,27,36 ; 72.18s ; 89.53 ; 96.2 ; 103.2,20ss ; 106.48 ; 119.12 ; 124.6 ; 135.21 ; 144.1. –  les profondeurs de mon être  : litt. mes reins , considérés comme le siège de la personnalité secrète ou de l''être profond ; cf. 7.10+ ; 73.21 ; Jr 12.2n.'
  - type: text
    content: 'Je bénis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui me conseille ;'
  - type: text
    content: même la nuit, les profondeurs de mon être m'instruisent.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ac 2.25-28. –  quand il est  : autre traduction parce qu''il est . –  à ma droite 109.31 ; 110.5 ; 121.5.'
  - type: text
    content: 'Je contemple le '
  - type: text
    content: Seigneur
  - type: text
    content: ' constamment devant moi,'
  - type: text
    content: quand il est à ma droite, je ne vacille pas.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Voir cœur. –  ma gloire  : cf. 7.6n  ; LXX ma langue.'
  - type: text
    content: Aussi mon cœur se réjouit, ma gloire est dans l'allégresse,
  - type: text
    content: ma chair même repose en sécurité.
