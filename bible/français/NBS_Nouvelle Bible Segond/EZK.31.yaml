    marker-yv: yv-n
  - type: text
    text: 'La onzième année, le premier jour du troisième mois, la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me parvint :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '29.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa multitude
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son tumulte ; son abondance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; même terme au v. 18 ; cf. 7.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 30.4,15.'
    marker-yv: yv-n
  - type: text
    text: 'Humain, dis au pharaon, le roi d''Egypte, et à sa multitude :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A qui ressembles-tu dans ta grandeur ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. chap. 17 ; 19 ; Dn 4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: L'Assyrie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la plupart des traducteurs modernes supposent une erreur de transmission dans le texte hébreu et lisent ici le nom d''un arbre, peut-être une variété de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cèdre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 27.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : le sens serait '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (tu ressembles à) un grand arbre, un cèdre au Liban
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Si l''on maintient cependant la référence à l''Assyrie, il faut sans doute comprendre que le sort de l''empire assyrien, anéanti 25 ans plus tôt, annonce celui de l''Egypte (v. 2,18). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un cèdre au Liban '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: forêt
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Es 17.9 ; 2Ch 27.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: entre les buissons touffus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 19.11 ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: entre les nuages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui correspond à un terme très proche en hébreu ; de même aux v. 10,14.'
    marker-yv: yv-n
  - type: text
    text: 'L''Assyrie était un cèdre au Liban :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: belle ramure, forêt ombreuse, haute taille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa cime s'élançait entre les buissons touffus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''abîme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 26.19+ ; cf. Gn 1.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 49.25 ; Dt 33.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en allant avec
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains modifient la vocalisation traditionnelle du texte hébreu pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en faisant aller
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ses fleuves
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre terme qu''en 29.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; il s''applique souvent aux fleuves de Mésopotamie, notamment l''Euphrate (cf. v. 3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; voir cependant 32.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Es 44.27 ; Ps 74.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sa plantation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'endroit où il était planté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 17.7 ; 34.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ses ruisseaux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses canaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le même terme est rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fossé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 1R 18.32ss, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aqueduc '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 2R 18.17, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'passage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Jb 38.25.
    marker-yv: yv-n
  - type: text
    text: Les eaux l'avaient fait grandir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'abîme l'avait fait pousser en hauteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en allant avec ses fleuves
- type: usfm
  marker: q1
  children:
  - type: text
    text: autour de sa plantation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en envoyant ses ruisseaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: à tous les arbres des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: puisait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de grandes eaux en son envoi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '( ?), expression obscure omise par LXX ; la formule évoque peut-être les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'branches '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de l'arbre, ses racines (v. 7) ou les canaux d'irrigation qui lui apportent l'eau.
    marker-yv: yv-n
  - type: text
    text: C'est pourquoi sa taille était plus haute
- type: usfm
  marker: q1
  children:
  - type: text
    text: que celle de tous les arbres des champs ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses branches s'étaient multipliées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses rameaux s'étendaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle puisait dans les grandes eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 17.23+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tous les animaux sauvages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tout animal de la campagne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des champs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 13 ; cf. Gn 3.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Tous les oiseaux du ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: nichaient dans ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les animaux sauvages
- type: usfm
  marker: q1
  children:
  - type: text
    text: mettaient bas leurs petits sous ses rameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute la multitude des nations habitait à son ombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: grandes eaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 15 ; 1.24+ ; voir aussi v. 4 ; 32.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Il était beau par sa grandeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par l'étendue de ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ses racines plongeaient
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les grandes eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les cèdres…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les cèdres ne lui portaient pas ombrage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le verbe correspondant est rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'être obscur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 28.3) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans le jardin de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. v. 9,18 ; 28.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gn 2.8s ; Ap 2.7.'
    marker-yv: yv-n
  - type: text
    text: Les cèdres du jardin de Dieu ne lui portaient pas ombrage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les cyprès n'égalaient pas ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les platanes n'étaient pas comme ses rameaux ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun arbre du jardin de Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne l'égalait en beauté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je l'avais embelli par la multitude de ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les arbres d'Eden,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le jardin de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: étaient jaloux de lui.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu étais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il avait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: buissons touffus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: élevé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 28.2 ; Dn 5.20 ; voir aussi Gn 11.4 ; Es 2.12-17.
    marker-yv: yv-n
  - type: text
    text: 'A cause de cela, ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Tu étais haut de taille – il élançait sa cime entre les buissons touffus, et son cœur était fier de sa hauteur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je l''ai livré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je le livrerai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: puissant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bélier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 17.13'
      - type: usfm
