document_id: EZK.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole du cèdre abattu
  - type: text
    content: ' '
  - type: note
    content: 'onzième année…  : 587 av. J.-C. (1.2n  ; cf. 30.20).'
  - type: text
    content: 'La onzième année, le premier jour du troisième mois, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Tu étais  : Syr il avait . –  buissons touffus  : cf. v. 3n. – Voir cœur. –  fier  : litt. élevé  ; cf. 28.2 ; Dn 5.20 ; voir aussi Gn 11.4 ; Es 2.12-17.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Tu étais haut de taille – il élançait sa cime entre les buissons touffus, et son cœur était fier de sa hauteur, '
  '11':
  - type: note
    content: 'je l''ai livré ou je le livrerai. –  puissant  : litt. bélier, comme en 17.13n  ; autre traduction à une nation puissante  ; 32.21 ; cf. 29.19.'
  - type: text
    content: 'c''est pourquoi je l''ai livré au puissant des nations, qui le traitera selon sa méchanceté ; je l''ai chassé. '
  '12':
  - type: note
    content: 'Des étrangers, les pires brutes 28.7n  ; 30.11s. –  montagnes / vallées 32.5. –  se sont retirés  : litt. sont descendus.'
  - type: text
    content: Des étrangers, les pires brutes des nations, l'ont coupé et laissé là ; ses branches sont tombées dans les montagnes et dans toutes les vallées. Ses rameaux se sont brisés dans tous les oueds du pays ; tous les peuples de la terre se sont retirés de son ombre ; ils l'ont abandonné.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 6 ; 29.5 ; 32.4. –  Sur ses branches abattues  : litt. sur sa chute  ; même terme v. 16 ; 26.15,18.'
  - type: text
    content: Sur ses branches abattues sont venus demeurer tous les oiseaux du ciel,
  - type: text
    content: et tous les animaux sauvages ont fait leur gîte parmi ses rameaux.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'buissons touffus  : cf. v. 3n. –  aucun des térébinthes  : traduction conjecturale ; autres possibilités  : aucun de leurs conducteurs ; aucun de ceux qui profitent (litt. qui boivent , de même v. 16) … ne se dressera vers eux (ou au-dessus des autres ). –  profondeurs / gouffre 26.20+ ; cf. Mt 11.23.'
  - type: text
    content: Ainsi, aucun des arbres près des eaux ne sera haut de taille ; aucun n'élancera sa cime entre les buissons touffus ; aucun des térébinthes qui profitent aussi des eaux ne se dressera en hauteur. Car tous sont livrés à la mort, aux profondeurs de la terre, parmi les humains, avec ceux qui descendent dans le gouffre.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 32.6-8 ; Es 14.8ss. –  ont été desséchés  : traduction incertaine ; même verbe, peut-être, que s''évanouir en Am 8.13.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Le jour où il est descendu au séjour des morts, j''ai décrété le deuil ; j''ai recouvert l''abîme à cause de lui et j''en ai retenu les fleuves ; les grandes eaux ont été arrêtées ; j''ai assombri le Liban à cause de lui, et tous les arbres des champs ont été desséchés à cause de lui. '
  '16':
  - type: note
    content: 'Voir séjour des morts. –  arbres d''Eden v. 8s. –  ont été consolés  : cf. 14.22+. –  les plus beaux  : litt. le choix ou l''élite. –  qui profitent v. 14n'
  - type: text
    content: 'Par le bruit de sa chute j''ai fait trembler les nations, quand je l''ai fait descendre au séjour des morts, avec ceux qui descendent dans le gouffre ; tous les arbres d''Eden ont été consolés dans les profondeurs de la terre, les plus beaux et les meilleurs du Liban, tous ceux qui profitent des eaux. '
  '17':
  - type: note
    content: 'victimes 21.19n. –  son appui  : litt. son bras  ; cf. 30.21n  ; LXX sa semence ou sa descendance.'
  - type: text
    content: Ceux-là aussi sont descendus avec lui au séjour des morts, vers les victimes de l'épée ; ils étaient son appui et ils habitaient à son ombre parmi les nations.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Voir gloire. –  incirconcis 28.10+ ; voir circoncision. –  le pharaon… v. 2+. –  sa multitude ou son abondance  ; cf. v. 2n.
  - type: text
    content: 'A qui ressembles-tu ainsi en gloire et en grandeur parmi les arbres d''Eden ? On te fera descendre avec les arbres d''Eden dans les profondeurs de la terre. Tu seras couché au milieu des incirconcis, avec les victimes de l''épée. Voilà le pharaon et toute sa multitude ! – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: '29.3. –  sa multitude  : autres traductions son tumulte ; son abondance  ; même terme au v. 18 ; cf. 7.11n  ; 30.4,15.'
  - type: text
    content: 'Humain, dis au pharaon, le roi d''Egypte, et à sa multitude :'
  - type: text
    content: A qui ressembles-tu dans ta grandeur ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. chap. 17 ; 19 ; Dn 4. –  L''Assyrie  : la plupart des traducteurs modernes supposent une erreur de transmission dans le texte hébreu et lisent ici le nom d''un arbre, peut-être une variété de cèdre (cf. 27.6n) : le sens serait (tu ressembles à) un grand arbre, un cèdre au Liban . Si l''on maintient cependant la référence à l''Assyrie, il faut sans doute comprendre que le sort de l''empire assyrien, anéanti 25 ans plus tôt, annonce celui de l''Egypte (v. 2,18). –  un cèdre au Liban 17.3+. –  forêt  : le même terme est traduit par bois en Es 17.9 ; 2Ch 27.4. –  entre les buissons touffus  : cf. 19.11 ; LXX entre les nuages , ce qui correspond à un terme très proche en hébreu ; de même aux v. 10,14.'
  - type: text
    content: 'L''Assyrie était un cèdre au Liban :'
  - type: text
    content: belle ramure, forêt ombreuse, haute taille,
  - type: text
    content: sa cime s'élançait entre les buissons touffus.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'l''abîme 26.19+ ; cf. Gn 1.2n  ; 49.25 ; Dt 33.13. –  en allant avec  : certains modifient la vocalisation traditionnelle du texte hébreu pour lire en faisant aller . –  ses fleuves  : autre terme qu''en 29.3n  ; il s''applique souvent aux fleuves de Mésopotamie, notamment l''Euphrate (cf. v. 3n) ; voir cependant 32.2n  ; cf. Es 44.27 ; Ps 74.15. –  sa plantation ou l''endroit où il était planté , cf. 17.7 ; 34.29. –  ses ruisseaux ou ses canaux  ; le même terme est rendu par fossé en 1R 18.32ss, aqueduc en 2R 18.17, passage en Jb 38.25.'
  - type: text
    content: Les eaux l'avaient fait grandir,
  - type: text
    content: l'abîme l'avait fait pousser en hauteur,
  - type: text
    content: en allant avec ses fleuves
  - type: text
    content: autour de sa plantation,
  - type: text
    content: en envoyant ses ruisseaux
  - type: text
    content: à tous les arbres des champs.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'puisait…  : litt. de grandes eaux en son envoi ( ?), expression obscure omise par LXX ; la formule évoque peut-être les branches de l''arbre, ses racines (v. 7) ou les canaux d''irrigation qui lui apportent l''eau.'
  - type: text
    content: C'est pourquoi sa taille était plus haute
  - type: text
    content: que celle de tous les arbres des champs ;
  - type: text
    content: ses branches s'étaient multipliées,
  - type: text
    content: ses rameaux s'étendaient,
  - type: text
    content: elle puisait dans les grandes eaux.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 17.23+. –  tous les animaux sauvages  : litt. tout animal de la campagne ou des champs , de même au v. 13 ; cf. Gn 3.14n.'
  - type: text
    content: Tous les oiseaux du ciel
  - type: text
    content: nichaient dans ses branches,
  - type: text
    content: tous les animaux sauvages
  - type: text
    content: mettaient bas leurs petits sous ses rameaux,
  - type: text
    content: et toute la multitude des nations habitait à son ombre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'grandes eaux  : cf. v. 15 ; 1.24+ ; voir aussi v. 4 ; 32.13n.'
  - type: text
    content: Il était beau par sa grandeur,
  - type: text
    content: par l'étendue de ses branches,
  - type: text
    content: car ses racines plongeaient
  - type: text
    content: dans les grandes eaux.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Les cèdres…  : litt. les cèdres ne lui portaient pas ombrage (le verbe correspondant est rendu par être obscur en 28.3) dans le jardin de Dieu  ; cf. v. 9,18 ; 28.13n  ; Gn 2.8s ; Ap 2.7.'
  - type: text
    content: Les cèdres du jardin de Dieu ne lui portaient pas ombrage,
  - type: text
    content: les cyprès n'égalaient pas ses branches,
  - type: text
    content: et les platanes n'étaient pas comme ses rameaux ;
  - type: text
    content: aucun arbre du jardin de Dieu
  - type: text
    content: ne l'égalait en beauté.
  '9':
  - type: text
    content: Je l'avais embelli par la multitude de ses branches,
  - type: text
    content: et tous les arbres d'Eden,
  - type: text
    content: dans le jardin de Dieu,
  - type: text
    content: étaient jaloux de lui.
