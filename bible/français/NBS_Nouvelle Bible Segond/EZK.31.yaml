    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: onzième année…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : 587 av. J.-C. (1.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
