document_id: JOS.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le livre de Josué raconte l'entrée d'Israël en Canaan et la répartition du pays entre les douze tribus. Amorcé dès Nombres 13 avec le récit de la première exploration de Canaan, il s'ouvre sur la traversée du Jourdain qui fait accéder au pays promis par Dieu.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: 'Un homme nommé Salut : la figure emblématique de Josué'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '« Josué » et « Jésus » sont un même nom, aussi bien en hébreu qu''en grec. La différence, en français, entre le nom de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Josué
    - type: text
      text: ' fils de Noun et celui de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Jésus
    - type: text
      text: ' de Nazareth résulte d''un choix pédagogique que la traduction latine (Vg*) a fait pour distinguer les personnages.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Nombres 13.16 relate comment Moïse changea le nom du fils de Noun, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Osée
    - type: text
      text: ' ou '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hoshéa‘,
    - type: text
      text: ' « il sauve » — c''est-à-dire « il donne la victoire » ou « il libère » — en celui de '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Josué
    - type: text
      text: ' ou '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Yehoshoua‘ :'
    - type: text
      text: ' « YHWH est le sauveur » (ou « celui qui donne la victoire », « le libérateur »). Ce nom* nouveau est à lui seul tout un programme. Le chef prestigieux que sera Josué, mentionné 167 fois dans le récit de la conquête, devient ainsi la figure emblématique du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: salut
    - type: text
      text: ', victoire ou libération, qui, à toutes les époques, ne pourra venir que de YHWH, le Seigneur du Sinaï.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Une épopée fondatrice
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le livre de Josué est plein de joie et de certitudes. S'il continue de préoccuper les chercheurs, c'est parce qu'il est aussi le trésor où se sont amoncelés sans tri les souvenirs des hauts faits qui fondent la conscience nationale.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La fresque biblique s'y développe, au moins dans la première partie, avec les accents vibrants de l'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: épopée
    - type: text
      text: '. Manifestement, le texte est destiné à la « célébration ». Mais cette dernière n''est pas dépourvue d''intention '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: prophétique
    - type: text
      text: '  : il s''agit, en rappelant les événements du passé, d''en renouveler le sens pour les générations futures, celles qui n''ont pas connu ce temps-là et qui risquent d''en oublier les orientations.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: '{Ranathjos} De l''exhortation à l''anathème (chap. 1 et 7) — où il apparaît que Josué n''est pas forcément à lire au premier degré'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le récit de la conquête emprunte au style épique pour exprimer une vision globalisante du projet de Dieu. L''amour sans partage demandé par le Dieu d''Israël dans le Deutéronome (6.5) est à nouveau revendiqué dans le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: prologue
    - type: text
      text: ' de Josué. Ce premier chapitre véhicule une notion si forte de l''efficacité de la promesse qu''il met les verbes à l''accompli pour décrire une réalité à venir : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tout lieu que vos pieds fouleront,
    - type: text
      text: ' '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: je vous l'ai donné
    - type: text
      text: ' (1.3,15 ; 2.9 ; 8.1). Les péripéties, et il y en aura, sont d''avance à inscrire dans le dessein de Dieu. Ainsi la conquête à venir pourra être accueillie comme le don gratuit de Dieu.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Mais pour autant la promesse n'est pas sans contrepartie. Josué et le peuple dont il est le chef charismatique (v. 5 ; cf. Nb 27.18-23) doivent trouver force et courage dans la confiance et dans la mise en pratique de la loi* divine (1.7). Cela pour le côté positif. Mais cette soif d'absolu s'accompagne aussi d'un refus absolu. Toute composition avec les divinités cananéennes est écartée par la prescription, tout à fait étonnante, de l'
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: anathème
    - type: text
      text: ' (ou « interdit »).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''histoire d''Akân, au chap. 7, en apporte la plus éclatante démonstration. Au lieu d''être porté sur les ailes de la victoire, le peuple vainqueur de Jéricho s''enlise dans le défaitisme parce que le sort des armes devient contraire. Les revers sont stigmatisés comme la conséquence d''une désobéissance apparemment mineure : Akân s''est approprié une part du butin ; or il ne fallait faire ni butin ni quartier.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Souvent, la lecture rapide ou non avertie de la Bible achoppe sur ces pages. Quel est donc le dieu qui peut exiger pareilles horreurs, lesquelles ne manquent pas de faire surgir dans l'esprit du lecteur moderne les images des génocides du XX
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle ? Le dossier biblique montre que l''anathème traduit le refus de toute '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: contamination
    - type: text
      text: ' des idées du paganisme ambiant (Dt 20.16-18) et de tout '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: amalgame
    - type: text
      text: ' syncrétiste. On ne sache pas, au demeurant, que cet ordre d''élimination physique des populations vaincues ait jamais été appliqué à la hauteur des mots. Le ton se fait ici polémique, car l''histoire de la conquête est aussi un sermon prophétique contre les déviations des générations futures et leurs funestes conséquences. Que ce soit à la cour de Salomon (1R 11) ou dans la Jérusalem de l''époque perse (Esd 9–10 ; Né 13 ; cf. Ml 2.10ss). Paradoxalement, le thème de la guerre sainte (notamment dans l''opposition entre la victoire miraculeuse de Jéricho et la défaite inattendue qui la suit) souligne aussi la supériorité de la fidélité à Dieu et de la confiance en lui sur l''usage de la force.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: De la mer des Joncs au Jourdain
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le petit '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: credo historique
    - type: text
      text: ' de Jos 4.22ss et l''institution liturgique qui l''accompagne donnent bien le ton. Comme en Exode 12 (la sortie d''Egypte), l''importance théologique de l''événement investit la narration au point que celle-ci ne songe plus à faire la part des faits et celle de leur célébration (ou récitation). L''exposé catéchétique met ainsi l''accent sur le parallélisme presque parfait qui existe entre le passage de la mer des Joncs et celui du Jourdain. Dans l''un et l''autre cas, c''est l''intervention miraculeuse de Dieu qui permet la progression du peuple et du récit (voir « Un “miracle” naturel ? », p.${Xmirjourd}).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le Guilgal
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le nom du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Guilgal
    - type: text
      text: ' (Jos 4.19n ; 5.9'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: s, etc.) n'a pas été sans inspirer la réflexion du narrateur. Construit sur une racine verbale qui peut signifier « rouler, encercler, tourner en rond », il désigne un cercle de pierres dressées ; mais il pourrait aussi servir de lien entre les diverses notions qui gravitent autour de l'entrée en Terre promise. Peut-être, au Guilgal, commémorait-on la prise de Jéricho par une procession liturgique en rond (mais le récit qui décrit la procession autour de Jéricho emploie une autre racine hébraïque).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''apparition '
    - type: usfm
      marker: it
      children:
      - type: text
        text: à Jéricho
    - type: text
      text: ' du '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: chef de l'armée du Seigneur
    - type: text
      text: ' (5.12ss), symétrique de la révélation au buisson ardent (Ex 3), se situe probablement tout près du Guilgal. Ce lieu va en effet devenir le centre de l''action de Josué et restera, à l''époque de Samuel et jusqu''à celle d''Elisée, un sanctuaire important. Il est vrai cependant que, dès 18.1, le centre politique du pays est déplacé à Silo en Ephraïm, non loin de la résidence personnelle de Josué (19.50).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Ruses de guerre
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La conquête « donnée » ne va pas sans dépense d''énergie de la part des envahisseurs. Sûr de son bon droit, Josué envoie deux agents spéciaux à '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Jéricho,
    - type: text
      text: ' la première citadelle à conquérir, afin d''en repérer les défenses. Pour expliquer leur présence dans la ville, les deux hommes usent d''un stratagème bien connu dans l''Antiquité : ils sont venus chercher un lieu de plaisirs. Comme souvent en pareilles circonstances, la prostituée au grand cœur prend leur parti ; mais ici elle va jusqu''à confesser sa foi au Dieu d''Israël. Lorsque la police s''inquiète des allées et venues des deux étrangers, Rahab dissimule leur fuite par un pieux mensonge. Du coup le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: clan de Rahab
    - type: text
      text: ' (2.12s ; 6.17,22s) acquiert un droit de cité définitif aux côtés d''Israël. Cette famille prendra place en effet dans la généalogie royale de David, puis de Jésus (Mt 1.5).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Si la prise de Jéricho (chap. 6) échappe, par son caractère hautement miraculeux, à toute stratégie préalable, celle du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Aï
    - type: text
      text: ' requiert une ruse de guerre, avec embuscade et fuite simulée (tactique qu''on retrouvera en Jg 20), indiquée par Dieu et associée à des vestiges visibles. Le narrateur mentionne '
    - type: usfm
      marker: it
      children:
      - type: text
        text: le grand tas de pierres
    - type: text
      text: ' (8.29) qu''il avait sous les yeux et qui pourrait être la sépulture du roi vaincu par ruse au Aï (mot qui signifie « ruines »).'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Gabaon,
    - type: text
      text: ' enfin, a échappé au massacre grâce à un habile subterfuge. Le maintien des Gabaonites comme bûcherons et puiseurs d''eau en Israël jusqu''à l''époque du narrateur (9.27), ainsi que l''alliance conclue avec eux en dépit du principe formel de ne jamais composer avec les Cananéens, ont manifestement fait problème : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Aucune ville ne fit la paix avec les Israélites — excepté les Hivvites qui habitaient Gabaon,
    - type: text
      text: ' est-il noté en 11.19. En effet, les quatre villes hivvites énumérées par la chronique, à savoir Gabaon, « la Haute » ou « la Hautaine », Kephira, « la Jeune Lionne », Bééroth, « les Sources », et Qiriath-Yéarim, « la Ville des Forêts » (9.17), constituent une surprenante enclave cananéenne à l''intérieur du territoire de Benjamin. Pour s''en expliquer, la tradition biblique les assimile à une corporation provinciale d''artisans comme il en existait ailleurs (on a fourni des explications analogues pour les noms d''Issacar et de Makir, cf. Gn 30.18n ; 50.23'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ).
  - type: usfm
    marker: is2
    children:
    - type: text
      text: 'Le jour le plus long : un raid dans la région montagneuse centrale (chap. 10) La prise de Hatsor : un raid en Haute-Galilée (chap. 11)'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''accueil des Gabaonites ne se limite pas à la pratique d''une tolérance. Attaquée par les rois cananéens, la confédération gabaonite fait appel à Josué. Celui-ci intervient et remporte une victoire éclatante, qui prend rang dans la geste des hauts faits du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur (YHWH)
    - type: text
      text: '  : n''avait-on pas vu les Amorites-Cananéens soumis à un bombardement de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: grêlons
    - type: text
      text: ' aux dimensions fabuleuses (10.11) ; et le'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: soleil
    - type: text
      text: ' lui-même n''avait-il pas arrêté sa course en cette journée mémorable, pour que davantage périssent les ennemis de Dieu ?'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La citadelle de
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Hatsor,
    - type: text
      text: ' en Haute-Galilée, reste parmi les plus impressionnantes de toutes les villes mises au jour par les fouilles, avec ses 70 hectares de constructions civiles et militaires et ses installations souterraines permettant d''accéder à la source qui alimentait la ville. On y évoque sans peine la notice de 11.4 décrivant la sortie en masse de l''infanterie et des chars (cf. 17.18). Au reste, les documents du II'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' millénaire av. J.-C. accordent une place considérable à cette ville et à son roi. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hatsor
    - type: text
      text: ' était manifestement, comme le rapporte l''écrivain biblique, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: le principal de tous ces royaumes
    - type: text
      text: ' (11.10 ; voir « Les cités-Etats cananéennes au II'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' millénaire av. J.-C. », p.${Xcitetats}). Il n''est guère étonnant, dès lors, de trouver au chapitre des raids mémorables de Josué la mention exemplaire de la prise de cette ville. La suprématie du Dieu d''Israël sur toutes les coalitions du monde est à nouveau démontrée dans cet exploit.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un cadastre étonnant
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La partie centrale du livre (chap. 13–21) fournit un rapport détaillé sur la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: répartition du pays
    - type: text
      text: ', où des listes de villes côtoient des tracés de frontières. Certes, la conquête idéale n''est pas achevée : la ligue des cinq villes philistines n''est pas entamée (13.3), ni davantage son bastion avancé de Beth-Sheân. Et la cité-Etat de Meguiddo, un redoutable fief cananéen, résiste toujours. Mais pour l''essentiel, les résultats sont là, et la ferveur fera le reste (17.11ss).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans les vieux jours de Josué (13.1) le pays est réparti par une série de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: tirages au sort
    - type: text
      text: ', bien entendu '
    - type: usfm
      marker: it
      children:
      - type: text
        text: devant le Seigneur
    - type: text
      text: ' (14.2 ; 18.8ss ; cf. Ex 28.30 ; Pr 16.33). Le pays est ainsi divisé en sept régions (chap. 18–19).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Des conditions particulières sont consenties à Caleb, qui reçoit Hébron et quantité de localités alentour (chap. 15), ainsi qu'à Joseph — c'est-à-dire Ephraïm — et à son héros, Josué lui-même (chap. 16 ; 19.49s). Pour Caleb comme pour Josué, ces faveurs sont rapportées à leur fidélité aux heures difficiles de la traversée du désert (Nb 14.6-9).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Des précautions spéciales sont prises à l''intention des responsables d''homicides par imprudence. Ceux-ci disposeront de six '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: villes de refuge
    - type: text
      text: ' (chap. 20 ; cf. Ex 21.13 ; Nb 35.6ss ; Dt 4.41ss ; 19.1ss). De leur côté, les lévites exerceront leurs fonctions rituelles et administratives dans les 48 villes qui leur sont attribuées (chap. 21 ; cf. Nb 35.1ss).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un autel-témoin en Transjordanie ou le culte en esprit (chap. 22)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le fossé syrien, occupé en partie par le cours du Jourdain, constitue une frontière naturelle. Aussi l'installation en Transjordanie de la tribu de Ruben, de la tribu de Gad et de la demi-tribu de Manassé mettait-elle en péril la cohésion de la confédération israélite. En dépit de la légitimité de ce choix géographique, octroyé par Moïse lui-même (1.14 ; 12.6 ; 13.8 ; 14.2-3 ; 18.7 ; 22.1 ; cf. Nb 32 ; Dt 3.12ss), ce relatif isolement, de surcroît sur des terres à blé et de gras pâturages (Jg 5.15-16 ; Am 4.1), risquait fort de conduire à une sécession.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Un grave incident éclate au chapitre 22 du livre : les tribus transjordaniennes ont édifié, aux confins du Jourdain, un '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: autel imposant
    - type: text
      text: ' (v. 10). Cette manifestation de religiosité est interprétée de la manière la plus malveillante. Aussitôt, une expédition punitive est montée par les dix tribus cisjordaniennes (v. 12). Fort heureusement, on parlemente avant d''en venir aux mains. Et ce sera l''occasion pour les Rubénites et leurs alliés de prononcer l''une des plus belles confessions de foi de l''ancienne alliance : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dieu, Dieu, le Seigneur
    - type: text
      text: ' (en hébreu ce sont trois noms* de Dieu : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ’El, ’Elohim, YHWH
    - type: text
      text: '), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lui le sait
    - type: text
      text: ' (v. 22). Dieu sait en effet que cet « autel-témoin » n''a pas été fait pour célébrer un culte schismatique où l''on aurait offert des sacrifices. Il n''est que signe : il est témoin. Il est là pour indiquer une allégeance en direction du centre de la vie cultuelle d''alors, c''est-à-dire Silo en Ephraïm.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Cette belle tradition de l''autel sans sacrifice, qui suggère la possibilité d''un culte au Dieu d''Israël hors de la terre d''Israël, n''est pas sans rappeler les développements d''Ezéchiel sur le sanctuaire hors du sanctuaire qu''est le Seigneur lui-même (Ez 11.16). On pense aussi à Jean 4.23s : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dieu est Esprit, et il faut que ceux qui l'adorent l'adorent en esprit et en vérité
    - type: text
      text: . Cette notion sera aussi reprise par la tradition juive pour expliquer l'origine de la synagogue.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: L'assemblée et le pacte de Sichem (chap. 24)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: assemblée de Sichem
    - type: text
      text: ', au chapitre 24 (cf. aussi chap. 23, et déjà 8.30-35), qui rappelle à la fois l''alliance du Sinaï et le Deutéronome, est l''un des épisodes les plus importants du livre. Tel Moïse à la veille de sa mort (Dt 30), Josué apparaît, en Jos 24, comme un grand conducteur de peuples plaçant ses gens devant un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: choix
    - type: text
      text: ' solennel et décisif. Josué veut engager Israël à opter résolument pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), alors que la tentation de l''idolâtrie et du syncrétisme est pressante. Le cri '
    - type: usfm
      marker: it
      children:
      - type: text
        text: supprimez donc maintenant les dieux étrangers qui sont en votre sein
    - type: text
      text: ' (v. 23), déjà entendu en Genèse 35.2, évoque une situation difficile où la grande épopée de la traversée du désert appartient déjà aux gloires du passé. Derrière le sermon sur la pureté religieuse se devine l''appel politique à l''unité nationale, fondé sur l''évocation d''une histoire commune (v. 1ss). Après l''installation en Terre promise, l''Ephraïmite Josué (Nb 13.8,16) contrôle-t-il encore les tribus qui occupent les confins nord du pays (Aser, Nephtali, Issacar et Zabulon) aussi bien que celles du centre et du sud ? La tradition établit que Nephtali et Aser, fils de concubines, étaient un peu relégués dans une situation de cousinage, tandis qu''Issacar et Zabulon, enfants tard venus à Léa, pouvaient faire figure de pièces rapportées. En revanche, les enfants de Rachel, la préférée, se partagent le centre du pays (Gn 29.31–30.24 ; 35.18-25) et les aînés de Léa, le sud (Gn 29.31s).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Au prétendu réalisme politique qui pouvait incliner beaucoup d''Israélites à composer avec les Cananéens qui '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habitaient alors le pays
    - type: text
      text: ' (Gn 13.7 ; cf. Jos 5.1 etc.), Josué oppose la fidélité aux accords conclus, en renouant fermement avec la tradition et l''alliance du Sinaï. Aussi le pacte de Sichem pose-t-il le principe d''une allégeance commune des douze tribus au '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) seul, aux dépens des dieux des pères '
    - type: usfm
      marker: it
      children:
      - type: text
        text: de l'autre côté du fleuve,
    - type: text
      text: ' en Mésopotamie du nord-ouest (la région de Harrân) ou des '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dieux des Amorites,
    - type: text
      text: ' en Canaan (v. 15).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Une '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: grande pierre
    - type: text
      text: ', sans doute une stèle gravée, rappellera au cours des siècles la substance de ce pacte (v. 26s). Le rôle déjà éminent de la ville de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Sichem
    - type: text
      text: ' ira grandissant jusqu''au moment du schisme, déclenché trois siècles plus tard en ce même lieu par un haut fonctionnaire insoumis, Jéroboam (1R 11.26ss ; 12).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: 'Une lecture chrétienne : Hébreux 4.8'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Source singulière et à ce titre irremplaçable pour l'histoire, le livre de Josué permet de se faire une certaine idée de la conquête, ainsi que des aménagements territoriaux intervenus par la suite. L'épître aux Hébreux oppose le
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: lieu de repos
    - type: text
      text: ' où Josué devait faire entrer le peuple (Jos 1.13 ; 21.44 ; 22.4 ; 23.1 ; cf. Dt 3.20) au '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: repos
    - type: text
      text: ' qui est encore disponible pour le peuple de Dieu. S''appuyant sur le Psaume 95, elle souligne le caractère transitoire de la geste de Josué (Hé 4.8). Dans cet écrit du Nouveau Testament, la foi qui fait accéder au repos véritable relève en effet d''un nouveau Josué, celui que nous appelons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jésus
    - type: text
      text: ' (Hé 11.39–12.2).'
