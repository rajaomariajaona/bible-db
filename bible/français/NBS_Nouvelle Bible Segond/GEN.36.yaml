      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Car leurs biens étaient trop considérables pour qu''ils habitent ensemble, et le pays où ils avaient séjourné en immigrés ne suffisait plus à leurs troupeaux. '
