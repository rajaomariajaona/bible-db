  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les fils de Lotân furent Hori et Hémam. La sœur de Lotân fut Timna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
