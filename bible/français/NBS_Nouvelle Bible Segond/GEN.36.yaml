  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici les fils de Réouel, fils d''Esaü : le chef Nahath, le chef Zérah, le chef Shamma, le chef Mizza. Ce sont là les chefs de Réouel, en Edom. Ce sont là les fils de Basmath, femme d''Esaü. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici les fils d''Oholibama, femme d''Esaü : le chef Yéoush, le chef Yalam, le chef Coré. Ce sont là les chefs d''Oholibama, fille d''Ana, femme d''Esaü. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
