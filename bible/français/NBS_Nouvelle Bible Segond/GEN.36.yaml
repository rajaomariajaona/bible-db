  - type: text
    text: 'Voici les fils de Séir, le Horite, qui habitaient le pays : Lotân, Shobal, Tsibéôn, Ana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
