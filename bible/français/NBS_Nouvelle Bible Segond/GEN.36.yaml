      - type: text
        text: '36.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 13.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: séjourné en immigrés
    - type: usfm
      marker: ft
      children:
      - type: text
