    marker-yv: yv-n
  - type: text
    text: 'Esaü prit ses femmes, ses fils et ses filles, tous les gens de sa maison, ses troupeaux, toutes ses bêtes, et tous les biens qu''il avait acquis en Canaan, et il s''en alla vers un autre pays, loin de Jacob, son frère. '
