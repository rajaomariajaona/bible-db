document_id: GEN.36,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Esaü s'installe en Edom
  - type: text
    content: ' '
  - type: note
    content: généalogie v. 9 ; 2.4n. –  Esaü, c'est-à-dire Edom v. 9,43 ; 25.25n.
  - type: text
    content: 'Voici la généalogie d''Esaü, c''est-à-dire Edom. '
  '10':
  - type: text
    content: 'Voici les noms des fils d''Esaü : Eliphaz, fils d''Ada, femme d''Esaü ; Réouel, fils de Basmath, femme d''Esaü. '
  '11':
  - type: note
    content: 'Eliphaz (v. 4) / Témân  : cf. Jb 2.11 ; 4.1 etc. Sur Témân, voir aussi Jr 49.7 ; Ez 25.13 ; Ha 3.3. –  Qenaz  : cf. 15.19n.'
  - type: text
    content: 'Les fils d''Eliphaz furent Témân, Omar, Tsepho, Gatam et Qenaz. '
  '12':
  - type: note
    content: Amalec Ex 17.8n.
  - type: text
    content: 'Timna était la concubine d''Eliphaz, fils d''Esaü ; elle donna à Eliphaz Amalec. Ce sont là les fils d''Ada, femme d''Esaü. '
  '13':
  - type: note
    content: 'Zérah  : cf. 38.30n.'
  - type: text
    content: 'Voici les fils de Réouel : Nahath, Zérah, Shamma et Mizza. Ce sont là les fils de Basmath, femme d''Esaü. '
  '14':
  - type: note
    content: 36.2n.
  - type: text
    content: 'Voici les fils d''Oholibama, fille d''Ana, fille de Tsibéôn, femme d''Esaü : elle donna à Esaü Yéoush, Yalam et Coré.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Le terme chef traduit un mot hébreu de la même racine que celui qui signifie millier et qui est aussi traduit, quelquefois, par phratrie (Nb 1.16n).
  - type: text
    content: 'Voici les chefs des fils d''Esaü. Fils d''Eliphaz, premier-né d''Esaü : le chef Témân, le chef Omar, le chef Tsepho, le chef Qenaz, '
  '16':
  - type: note
    content: le chef Coré (cf. v. 5) est absent de Smr.
  - type: text
    content: 'le chef Coré, le chef Gatam, le chef Amalec. Ce sont là les chefs d''Eliphaz, en Edom. Ce sont là les fils d''Ada. '
  '17':
  - type: text
    content: 'Voici les fils de Réouel, fils d''Esaü : le chef Nahath, le chef Zérah, le chef Shamma, le chef Mizza. Ce sont là les chefs de Réouel, en Edom. Ce sont là les fils de Basmath, femme d''Esaü. '
  '18':
  - type: text
    content: 'Voici les fils d''Oholibama, femme d''Esaü : le chef Yéoush, le chef Yalam, le chef Coré. Ce sont là les chefs d''Oholibama, fille d''Ana, femme d''Esaü. '
  '19':
  - type: text
    content: Ce sont là les fils d'Esaü et ce sont là leurs chefs. Esaü, c'est Edom.
  '2':
  - type: note
    content: 'Cf. 26.34s ; 28.6-9 ; Ez 23.4. –  Smr, LXX et Syr ont lu fils (et non fille) de Tsibéôn, de même au v. 14 ; cf. v. 20,24. –  Hivvite  : cf. 10.17 ; 34.2.'
  - type: text
    content: 'Esaü prit ses femmes parmi les Cananéennes : Ada, fille d''Elôn, le Hittite ; Oholibama, fille d''Ana, fille de Tsibéôn, le Hivvite ; '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Séir  : ce nom est aussi celui du massif montagneux à l''est de la Araba, la plaine aride au sud de la mer Morte. Plus tard il en est venu à désigner l''ensemble du pays d''Edom ; cf. v. 8+ ; 14.6n. –  Horite 14.6n  ; cf. Dt 2.12,22. –  Tsibéôn / Ana v. 2n.'
  - type: text
    content: 'Voici les fils de Séir, le Horite, qui habitaient le pays : Lotân, Shobal, Tsibéôn, Ana, '
  '21':
  - type: text
    content: 'Dishôn, Etser et Dishân. Ce sont là les chefs des Horites, fils de Séir, en Edom. '
  '22':
  - type: text
    content: 'Les fils de Lotân furent Hori et Hémam. La sœur de Lotân fut Timna. '
  '23':
  - type: text
    content: 'Voici les fils de Shobal : Alvân, Manahath, Ebal, Shepho et Onam. '
  '24':
  - type: note
    content: 'les sources chaudes  : selon une interprétation traditionnelle de l''hébreu hayyémim, terme inconnu par ailleurs ; cf. 26.19,32. Autre interprétation ancienne les mulets  ; cf. 1S 9.2ss.'
  - type: text
    content: 'Voici les fils de Tsibéôn : Ava et Ana. Cet Ana trouva les sources chaudes dans le désert, quand il faisait paître les ânes de Tsibéôn, son père. '
  '25':
  - type: note
    content: 'les enfants  : litt. les fils.'
  - type: text
    content: 'Voici les enfants d''Ana : Dishôn et Oholibama, fille d''Ana. '
  '26':
  - type: text
    content: 'Voici les fils de Dishân : Hemdân, Eshbân, Yitrân et Kerân. '
  '27':
  - type: text
    content: 'Voici les fils d''Etser : Bilhân, Zaavân et Aqân. '
  '28':
  - type: note
    content: 'Outs  : cf. 10.23n  ; 22.21 ; Jb 1.1n.'
  - type: text
    content: 'Voici les fils de Dishân : Outs et Arân. '
  '29':
  - type: text
    content: 'Voici les chefs des Horites : le chef Lotân, le chef Shobal, le chef Tsibéôn, le chef Ana, '
  '3':
  - type: note
    content: 'Basmath  : cf. 26.34. –  Nebayoth  : cf. 28.9.'
  - type: text
    content: 'et Basmath, fille d''Ismaël, sœur de Nebayoth. '
  '30':
  - type: note
    content: 'leurs chefs  : litt. pour leurs chefs. On pourrait comprendre selon leurs milliers, leurs phratries  ; même terme hébreu au v. 15n.'
  - type: text
    content: le chef Dishôn, le chef Etser, le chef Dishân. Ce sont là les chefs des Horites, leurs chefs au pays de Séir.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Nb 20.14 ; Es 34.12 ; 1Ch 1.43-50. –  avant qu''un roi…  : cette phrase peut faire allusion ou bien à Saül, comme premier roi d''Israël (1S 10), ou bien à David, comme conquérant d''Edom (2S 8.13s).'
  - type: text
    content: 'Voici les rois qui ont régné en Edom avant qu''un roi règne pour les Israélites : '
  '32':
  - type: note
    content: 'Béla, fils de Béor  : Smr a lu Balaam, fils de Béor, cf. Nb 22.5+.'
  - type: text
    content: 'Béla, fils de Béor, devint roi sur Edom ; le nom de sa ville était Dinhaba. '
  '33':
  - type: note
    content: 'Yobab  : cf. Jb 1.1n  ; 42.17n. –  Botsra Es 34.6n.'
  - type: text
    content: 'Béla mourut ; Yobab, fils de Zérah, de Botsra, devint roi à sa place. '
  '34':
  - type: text
    content: 'Yobab mourut ; Housham, du pays des Témanites, devint roi à sa place. '
  '35':
  - type: note
    content: 'Les nomades madianites (cf. 25.2) ont dû livrer bataille à l''est de la mer Morte (au pays ou sur le plateau de Moab) contre les Edomites. –  Avith  : localité au sud-est de Pétra.'
  - type: text
    content: 'Housham mourut ; Hadad, fils de Bedad, devint roi à sa place. C''est lui qui battit Madiân au pays de Moab. Le nom de sa ville était Avith. '
  '36':
  - type: note
    content: 'Masréqa  : localité au sud de Pétra.'
  - type: text
    content: 'Hadad mourut ; Samla, de Masréqa, devint roi à sa place. '
  '37':
  - type: note
    content: Rehoboth-Nahar signifie largeurs (ou places) du fleuve, cf. 10.11 ; 26.22 ; l'endroit est par ailleurs inconnu. L'expression le Fleuve désigne habituellement l'Euphrate (31.21), mais il s'agit plus probablement ici d'une rivière du pays d'Edom, cf. Nb 22.5n  ; 1Ch 1.48.
  - type: text
    content: 'Samla mourut ; Saül, de Rehoboth-Nahar, devint roi à sa place. '
  '38':
  - type: text
    content: 'Saül mourut ; Baal-Hanân, fils d''Akbor, devint roi à sa place. '
  '39':
  - type: note
    content: Hadar ou Hadad, selon certains mss hébreux (cf. 1R 11.14-22 ; 1Ch 1.50). –  Mé-Zahab signifie eaux d'or, cf. 1Ch 1.50.
  - type: text
    content: Baal-Hanân, fils d'Akbor, mourut ; Hadar devint roi à sa place. Le nom de sa ville était Paou, et le nom de sa femme était Mehétabéel, fille de Matred, fille de Mé-Zahab.
  '4':
  - type: note
    content: donna et mit au monde traduisent un même verbe hébreu. –  Eliphaz v. 11n.
  - type: text
    content: 'Ada donna à Esaü Eliphaz ; Basmath mit au monde Réouel ; '
  '40':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1Ch 1.51-54. Sur Timna et Oholibama , cf. Gn 36.2,12,14 ; Jb 42.15.
  - type: text
    content: 'Voici les noms des chefs d''Esaü, clan par clan, lieu par lieu, par leur nom : le chef Timna, le chef Alva, le chef Yeteth, '
  '41':
  - type: text
    content: 'le chef Oholibama, le chef Ela, le chef Pinôn, '
  '42':
  - type: text
    content: 'le chef Qenaz, le chef Témân, le chef Mibtsar, '
  '43':
  - type: note
    content: V. 1+.
  - type: text
    content: le chef Magdiel, le chef Iram. Ce sont là les chefs d'Edom, selon leurs lieux d'habitation, dans le pays qui est leur propriété. C'est là Esaü, le père d'Edom.
  '5':
  - type: text
    content: 'Oholibama mit au monde Yéoush, Yalam et Coré. Ce sont là les fils d''Esaü, ceux qui naquirent de lui en Canaan. '
  '6':
  - type: note
    content: vers un autre pays, d'après le Tg. Le texte hébreu traditionnel porte litt. vers un pays ou une terre  ; Syr porte vers le pays de Séir  ; Smr et LXX du pays de Canaan.
  - type: text
    content: 'Esaü prit ses femmes, ses fils et ses filles, tous les gens de sa maison, ses troupeaux, toutes ses bêtes, et tous les biens qu''il avait acquis en Canaan, et il s''en alla vers un autre pays, loin de Jacob, son frère. '
  '7':
  - type: note
    content: 'Cf. 13.6. –  séjourné en immigrés  : cf. Ex 12.48n.'
  - type: text
    content: 'Car leurs biens étaient trop considérables pour qu''ils habitent ensemble, et le pays où ils avaient séjourné en immigrés ne suffisait plus à leurs troupeaux. '
  '8':
  - type: note
    content: 's''installa  : le même verbe est traduit par habiter au v. 7. –  Séir v. 1,20n  ; 32.4 ; Dt 33.2 ; Jg 5.4.'
  - type: text
    content: Esaü s'installa dans la région montagneuse de Séir. Esaü, c'est Edom.
  - type: heading
    content: Les descendants d'Esaü
  - type: heading
    content: 1Ch 1.35-54
  '9':
  - type: text
    content: ' '
  - type: note
    content: 1Ch 1.35-37.
  - type: text
    content: 'Voici la généalogie d''Esaü, père d''Edom, dans la région montagneuse de Séir. '
