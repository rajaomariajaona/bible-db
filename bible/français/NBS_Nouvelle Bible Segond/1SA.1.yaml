      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Anne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Puis elle repartit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et la femme alla sur son chemin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son visage ne fut plus le même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son visage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(celui qu''elle avait présenté jusqu''alors) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne fut plus à elle.
      marker-yv: yv-n
    - type: text
      text: 'Elle dit : Je suis ta servante ; que je trouve toujours grâce à tes yeux ! Puis elle repartit. Elle mangea, et son visage ne fut plus le même. '
