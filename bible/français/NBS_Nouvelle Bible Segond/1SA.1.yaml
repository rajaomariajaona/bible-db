document_id: 1SA.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Anne au temple de Silo
  - type: text
    content: ' '
  - type: note
    content: 'Il y avait…  : cf. 9.1 ; Jg 13.2 ; 17.1 ; 19.1. –  Ramataïm-Tsophim (ou Ramataïm-des-Tsouphites , ou encore Ramataïm-des-Guetteurs ) : sans doute un autre nom de la localité de Rama, mentionnée au v. 19, puis en 2.11 ; 7.17 etc., et située dans la région montagneuse d''Ephraïm (cf. Jos 17.15). Certains considèrent que seul Ramataïm est une variante de Rama, et modifient le mot suivant pour lire Tsouphi (c.-à-d. le Tsouphite ), qu''ils rapportent à Elqana… fils de Tsouph . –  Elqana  : cf. 1Ch 6.11s. –  Ephratite peut être compris comme un équivalent d’ Ephraïmite (ainsi LXX  ; cf. Jg 12.5n  ; 1R 11.26) ou comme indiquant l''appartenance au clan judéen d''Ephrata, plusieurs fois associé à la région de Beth-Léhem (cf. 1S 17.12 ; Rt 1.2). Cf. 1Ch 6.18-23.'
  - type: text
    content: 'Il y avait un homme de Ramataïm-Tsophim, de la région montagneuse d''Ephraïm, nommé Elqana, fils de Yeroham, fils d''Elihou, fils de Tohou, fils de Tsouph, Ephratite, '
  '10':
  - type: text
    content: 'Elle, amère, se mit à prier le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et à pleurer abondamment. '
  '11':
  - type: note
    content: 'Elle fit un vœu  : cf. Nb 30.2-6 ; Ps 50.14. –  une descendance  : litt. une descendance d''hommes, expression unique dans la Bible ; on comprend habituellement un enfant mâle. –  ta servante  : le mot hébreu correspondant (aussi au v. 16) peut aussi désigner une esclave. Ici il s''agit simplement d''une formule de politesse courante ; cf. 25.41n  ; Gn 12.16n  ; 18.3n  ; Ex 21.7n. –  le rasoir ne passera pas…  : les cheveux non coupés étaient un signe de la consécration d''un homme au service de Dieu ; cf. Nb 6.5 ; Jg 5.2 ; 13.5 ; 16.17. Samuel est explicitement désigné comme nazir dans LXX, dans un ms de Qumrân et en Siracide 46.13 (selon le texte hébreu) : « Aimé de son peuple et agréable à son créateur, celui qui fut demandé dès le sein de sa mère, consacré (= nazir) au Seigneur dans la fonction prophétique, Samuel juge et prêtre. » (Voir aussi « Samuel dans le Siracide  », p.$).'
  - type: text
    content: 'Elle fit un vœu, en disant : '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, si tu daignes regarder mon affliction, si tu te souviens de moi et ne m''oublies pas, si tu me donnes une descendance, à moi qui suis ta servante, je le donnerai au '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour tous les jours de sa vie, et le rasoir ne passera pas sur sa tête. '
  '12':
  - type: text
    content: 'Comme sa prière se prolongeait devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', Eli observait sa bouche. '
  '13':
  - type: note
    content: 'dans son cœur  : litt. sur son cœur. –  ivre  : à la suite du repas sacrificiel (cf. v. 9).'
  - type: text
    content: 'Anne parlait dans son cœur ; seules ses lèvres remuaient, mais on n''entendait pas sa voix. Eli pensa qu''elle était ivre. '
  '14':
  - type: note
    content: 'Va cuver ton vin  : litt. éloigne ton vin de dessus toi.'
  - type: text
    content: 'Il lui dit : Jusqu''à quand resteras-tu ivre ? Va cuver ton vin ! '
  '15':
  - type: note
    content: 'entêtée  : litt. dure d''esprit, c.-à-d. avec qui on ne peut pas discuter  ; l''expression hébraïque correspondante a souvent été comprise comme signifiant affligée, ou désespérée. On pourrait aussi traduire non (je ne suis pas ivre), mon seigneur ; je suis une femme obstinée, mais je n''ai bu ni vin… –  ni vin ni boisson alcoolisée  : cf. Lv 10.9n  ; Nb 6.3 ; Jg 13.4 ; Pr 20.1 etc. –  je me répandais  : autres traductions je répandais mon âme (cf. Gn 1.20n) ; je m''épanchais  ; cf. Ps 62.9.'
  - type: text
    content: 'Anne répondit : Mon seigneur, je ne suis pas une femme entêtée, et je n''ai bu ni vin ni boisson alcoolisée ; je me répandais devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '16':
  - type: note
    content: 'femme sans morale  : litt. fille de Bélial, cf. 2.12n  ; Dt 13.14n. –  c''est l''excès… qui m''a fait parler  : cf. Ps 50.15 ; 120.1.'
  - type: text
    content: 'Ne me prends pas, moi, ta servante, pour une femme sans morale, car c''est l''excès de ma douleur et de ma contrariété qui m''a fait parler jusqu''ici. '
  '17':
  - type: note
    content: 'Cf. Ph 4.6s. – Voir paix. –  demandé  : ce verbe, qui réapparaît aux v. 20,27,28n, est le fil conducteur de la fin du chap. ; voir aussi 2.20.'
  - type: text
    content: 'Eli répondit : Va en paix ; que le Dieu d''Israël te donne ce que tu lui as demandé ! '
  '18':
  - type: note
    content: 'que je trouve toujours grâce…  : cf. Gn 33.15n  ; le texte joue peut-être sur le mot hébreu hén = grâce, qui est apparenté au nom d’Anne (v. 2n). –  Puis elle repartit  : litt. et la femme alla sur son chemin. –  son visage ne fut plus le même  : litt. son visage (celui qu''elle avait présenté jusqu''alors) ne fut plus à elle.'
  - type: text
    content: 'Elle dit : Je suis ta servante ; que je trouve toujours grâce à tes yeux ! Puis elle repartit. Elle mangea, et son visage ne fut plus le même. '
  '19':
  - type: note
    content: 'eut des relations avec  : litt. connut, cf. Gn 4.1n.'
  - type: text
    content: 'Ils se levèrent de bon matin et, après s''être prosternés devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ils rentrèrent chez eux, à Rama.'
  - type: heading
    content: Naissance et enfance de Samuel
  - type: text
    content: 'Elqana eut des relations avec sa femme Anne, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se souvint d''elle. '
  '2':
  - type: note
    content: 'Anne  : hébreu Hanna, qui signifie gracieuse. Le nom de Peninna semble évoquer le « corail » ou la « perle ». Les termes grâce et perle sont rapprochés dans la maxime de Siracide 7.19, selon le texte hébreu : « La grâce vaut mieux que les perles. » – Le thème de la rivalité entre deux épouses, dont l''une est féconde et l''autre stérile, se trouve également en Gn 16 ; 29.30s ; 30.1s.'
  - type: text
    content: 'qui avait deux femmes. Le nom de l''une était Anne et le nom de la seconde Peninna ; Peninna avait des enfants, mais Anne n''en avait pas. '
  '20':
  - type: note
    content: 'A la fin de l''année…  : autre traduction dans le cours de l''année, elle fut enceinte et mit au monde…  ; cf. Gn 25.21 ; 30.22s ; l''expression traduite par la fin de l''année pourrait désigner l''époque de la fête de la Récolte, à l''automne (cf. Ex 34.22+ ; voir calendrier). –  Samuel  : hébreu Shemou''el  ; ce nom fait assonance avec le verbe demander, hébreu sha''al, cf. v. 11n  ; voir Jr 15.1 ; Ps 99.6. –  dit-elle  : sous-entendu dans le texte.'
  - type: text
    content: 'A la fin de l''année, elle était enceinte ; elle mit au monde un fils, qu''elle appela du nom de Samuel – car, dit-elle, c''est au '
  - type: text
    content: Seigneur
  - type: text
    content: ' que je l''ai demandé.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Le mari  : autre traduction l''homme . –  sa famille  : litt. sa maison ou sa maisonnée . –  le sacrifice annuel  : litt. le sacrifice des jours (v. 3n) ; de même en 2.19 ; 20.6 ; 27.7. –  son vœu  : c.-à-d. son offrande votive  ; cf. Ps 116.14 ; Ec 5.3s. On ignore s''il s''agit d''un vœu particulier prononcé par Elqana, ou de la confirmation du vœu d''Anne (cf. Nb 30.14).'
  - type: text
    content: 'Le mari, Elqana, monta ensuite, avec toute sa famille, pour offrir au '
  - type: text
    content: Seigneur
  - type: text
    content: ' le sacrifice annuel, ainsi que son vœu. '
  '22':
  - type: note
    content: 'sera sevré  : l''allaitement d''un enfant durait généralement jusqu''à un an, parfois même jusqu''à trois ans (cf. 2 Maccabées 7.27 : « Mon fils, aie pitié de moi qui t''ai porté dans mon sein neuf mois, qui t''ai allaité trois ans, qui t''ai nourri et élevé jusqu''à l''âge où tu es »). –  je l''amènerai… pour toujours  : un ms de Qumrân porte je le donnerai comme nazir pour toujours, tous les jours de sa vie. Cf. v. 11n. –  qu''il paraisse devant le Seigneur  : c.-à-d. qu''il se présente au sanctuaire  ; cf. Ex 23.15n,17 ; Dt 16.16 ; 31.11 ; Es 1.12.'
  - type: text
    content: 'Mais Anne ne monta pas. Car elle avait dit à son mari : Lorsque le garçon sera sevré, je l''amènerai, afin qu''il paraisse devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et qu''il reste là pour toujours. '
  '23':
  - type: note
    content: 'réalise (ou confirme) … sa parole (ou sa promesse) : cette affirmation ne semble pas se rapporter à une promesse particulière et explicite de Dieu, mais à son dessein bienveillant et protecteur envers Samuel et sa famille, invoqué par Eli au v. 17. LXX réalise ta parole, c.-à-d. fasse en sorte que ta promesse se réalise. On retrouve cette expression en Dt 9.5 ; 2S 7.25 ; 1R 2.4 ; 6.12 ; 8.20 ; 12.15.'
  - type: text
    content: 'Elqana, son mari, lui dit : Fais comme il te plaira ; reste ici jusqu''à ce que tu l''aies sevré. Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' réalise seulement sa parole ! Ainsi la femme resta ; elle allaita son fils, jusqu''à ce qu''elle l''eût sevré.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 2.41. –  trois taureaux  : ou, selon LXX et Syr, et avec l''appui partiel d''un ms de Qumrân, un taureau de trois ans , ce qui s''accorderait mieux avec la mention du v. 25 ( le taureau ). –  farine / vin  : le sacrifice d''un animal s''accompagnait souvent d''une offrande végétale ( farine ) et d''une libation ( vin ) ; cf. Ex 29.40s ; Lv 23.18 ; Nb 15.8ss etc. Une partie du vin emporté pouvait aussi être consommée lors du repas de fête ; cf. v. 4s. –  à la maison du Seigneur  : le mot maison remplace ici le terme plus spécifique utilisé au v. 9 ( temple ). Anne accomplit ainsi son vœu (v. 11). –  le garçon était encore tout jeune  : litt. le garçon était un garçon  ; on pourrait aussi comprendre le garçon devint un serviteur (d''Eli, ou du sanctuaire) ; cf. 2.11, où un autre terme, traduit par officier , pourrait aussi être rendu par servir . LXX porte ici un texte plus long  : et le garçon était avec eux ; (25) ils l''amenèrent (ou s''avancèrent ) devant le Seigneur ; son père immola le sacrifice qu''il faisait chaque année (litt. de jours en jours , cf. 1.3n) pour le Seigneur ; il amena l''enfant (ou l''enfant s''avança ) , il immola le taureau et il amena Anne, la mère de l''enfant (ou Anne… s''avança , ou encore Anne… l''amena ) à Eli.'
  - type: text
    content: 'Quand elle l''eut sevré, elle le fit monter avec elle et prit trois taureaux, un épha de farine et une outre de vin. Elle l''amena à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', à Silo : le garçon était encore tout jeune. '
  '25':
  - type: note
    content: 'Ils immolèrent le taureau  : résumé du rituel sacrificiel.'
  - type: text
    content: 'Ils immolèrent le taureau et amenèrent le garçon à Eli. '
  '26':
  - type: note
    content: 'Pardon  : litt. par moi  ; cf. Gn 43.20n  ; 1R 3.17. –  Par ta vie  : formule de serment, attestant la véracité d''une affirmation.'
  - type: text
    content: 'Anne dit : Pardon, mon seigneur ! Par ta vie, je suis cette femme qui se tenait ici, avec toi, pour prier le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '27':
  - type: note
    content: Cf. Jb 22.27.
  - type: text
    content: 'C''était pour ce garçon que je priais, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a donné ce que je lui demandais. '
  '28':
  - type: note
    content: 'je le cède à la demande  : la forme verbale correspondante est dérivée de celle qui est traduite précédemment par demander  ; une autre forme est rendue ici par demandé  ; cf. v. 17n,20n. –  demandé ou requis, en hébreu sha''oul, qui se trouve être également le nom propre de Saül  ; c''est à Samuel, que le peuple demandera un roi, qui sera Saül, cf. 8.10. –  tous les jours de sa vie  : litt. tous les jours qu''il sera. –  ils se prosternèrent  : d''après Syr et Vg  ; le texte hébreu traditionnel porte il (Samuel ? Elqana ? Eli ?) se prosterna  ; un ms de Qumrân lit elle (Anne) se prosterna.'
  - type: text
    content: 'A mon tour, je le cède à la demande du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : il sera demandé pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' tous les jours de sa vie. Sur quoi ils se prosternèrent, là, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: note
    content: 'Chaque année  : litt. de jours en jours, comme en 2.19 ; Ex 13.10 ; Jg 11.40 ; 21.19. Il s''agit de l''un des pèlerinages annuels, probablement celui d''automne ; voir aussi Ex 23.17 ; Dt 16.16 ; Lc 2.41. –  montait  : le verbe monter, outre sa valeur ordinaire (Rama était située géographiquement plus bas que Silo), a parfois dans la Bible une valeur théologique, c''est se rendre au sanctuaire, donc s''approcher de Dieu (cf. Jg 1.9n). –  Silo  : localité dont le sanctuaire abritait alors le coffre de l''alliance (3.3 ; voir aussi Jos 18.1 ; Jg 21.19ss). –  le Seigneur (YHWH) des Armées  : première occurrence dans la Bible de ce nom ou titre divin (hébreu YHWH tseva''oth) ; voir aussi 4.4 ; 2S 5.10 ; 6.2 ; Es 1.9n. – Voir prêtre.'
  - type: text
    content: 'Chaque année, cet homme montait de sa ville à Silo, pour se prosterner devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées et pour lui offrir des sacrifices. Là se trouvaient les deux fils d''Eli, Hophni et Phinéas, prêtres du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'des parts  : dans le cas du sacrifice de paix (Lv 3), la majeure partie de la viande revenait au propriétaire de l''animal offert, qui la mangeait en compagnie de sa famille et de ses proches ; cf. Dt 12.18.'
  - type: text
    content: 'Le jour où Elqana offrait son sacrifice, il donnait des parts à sa femme Peninna, ainsi qu''à tous les fils et filles de celle-ci. '
  '5':
  - type: note
    content: 'une part d''honneur  : traduction probable d''une expression unique en hébreu, dont le sens n''est pas assuré, litt. une part de deux narines (ou de visage). On a parfois pensé que cela pourrait signifier avec déplaisir, car le nez était associé à l''idée de colère ; il semble plus probable qu''il s''agissait de quelque chose qu''on ose présenter devant le visage de quelqu''un, c.-à-d. une part honorifique. Le grec a lu à Anne, il ne donnait qu''une seule part, car elle n''avait pas d''enfant, bien qu''il l''aimât. –  l''eût rendue stérile  : litt. eût fermé sa matrice  ; de même au v. 6. Dans la perspective des temps bibliques, c''est Dieu qui rend une femme féconde ou stérile, cf. Gn 16.2 ; 29.31 etc.'
  - type: text
    content: 'Mais il donnait à Anne une part d''honneur ; car il aimait Anne, bien que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''eût rendue stérile. '
  '6':
  - type: note
    content: 'de la contrarier  : cf. Gn 16.4-6.'
  - type: text
    content: 'Sa rivale ne cessait de la contrarier, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait rendue stérile. '
  '7':
  - type: note
    content: 'il (Elqana) faisait ainsi  : cf. v. 4s. –  Anne montait  : litt. elle montait  ; Vg a lu le pluriel ils montaient. –  Peninna la contrariait  : litt. elle la contrariait.'
  - type: text
    content: 'D''année en année il faisait ainsi, et chaque fois qu''Anne montait à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Peninna la contrariait de la même manière. Alors elle pleurait et elle ne mangeait pas. '
  '8':
  - type: note
    content: 'mieux… que dix fils  : cf. Rt 4.15.'
  - type: text
    content: 'Elqana, son mari, lui dit : Anne, pourquoi pleures-tu ? Pourquoi ne manges-tu pas ? Pourquoi ton cœur est-il triste ? Est-ce que je ne vaux pas mieux pour toi que dix fils ?'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Litt. après avoir mangé à Silo et après avoir bu…  ; LXX après qu''ils eurent mangé à Silo, Anne se leva et elle se tint devant le Seigneur  ; au lieu de à Silo , certains croient devoir lire après avoir mangé la viande bouillie (cf. 2.13) ou Anne se leva toute seule . –  sur son siège  : litt. sur le siège (cf. 4.13) ; le terme désigne aussi le trône du roi. – Voir temple.'
  - type: text
    content: 'Après qu''ils eurent mangé et bu à Silo, Anne se leva. Eli, le prêtre, était assis sur son siège, près du montant de la porte du temple du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
