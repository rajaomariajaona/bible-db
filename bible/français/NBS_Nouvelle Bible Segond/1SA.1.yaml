        children:
        - type: text
          text: affligée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: désespérée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. On pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'non (je ne suis pas ivre), mon seigneur ; je suis une femme obstinée, mais je n''ai bu ni vin… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ni vin ni boisson alcoolisée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 10.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 6.3 ; Jg 13.4 ; Pr 20.1 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je me répandais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je répandais mon âme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je m'épanchais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ps 62.9.'
      marker-yv: yv-n
    - type: text
      text: 'Anne répondit : Mon seigneur, je ne suis pas une femme entêtée, et je n''ai bu ni vin ni boisson alcoolisée ; je me répandais devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: femme sans morale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fille de Bélial
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 13.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c'est l'excès… qui m'a fait parler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 50.15 ; 120.1.'
      marker-yv: yv-n
    - type: text
      text: 'Ne me prends pas, moi, ta servante, pour une femme sans morale, car c''est l''excès de ma douleur et de ma contrariété qui m''a fait parler jusqu''ici. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ph 4.6s. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
