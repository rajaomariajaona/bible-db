        marker: fq
        children:
        - type: text
          text: entêtée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dure '
        - type: usfm
          marker: w
          children:
          - type: text
