        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il y avait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.1 ; Jg 13.2 ; 17.1 ; 19.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ramataïm-Tsophim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ramataïm-des-Tsouphites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ramataïm-des-Guetteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : sans doute un autre nom de la localité de Rama, mentionnée au v. 19, puis en 2.11 ; 7.17 etc., et située dans '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la région montagneuse d''Ephraïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Jos 17.15). Certains considèrent que seul '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ramataïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est une variante de Rama, et modifient le mot suivant pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tsouphi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le Tsouphite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), qu''ils rapportent à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elqana… fils de Tsouph
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elqana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1Ch 6.11s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ephratite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: peut être compris comme un équivalent d’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ephraïmite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ainsi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '  ; cf. Jg 12.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 11.26) ou comme indiquant l''appartenance au clan judéen d''Ephrata, plusieurs fois associé à la région de Beth-Léhem (cf. 1S 17.12 ; Rt 1.2). Cf. 1Ch 6.18-23.'
      marker-yv: yv-n
    - type: text
      text: 'Il y avait un homme de Ramataïm-Tsophim, de la région montagneuse d''Ephraïm, nommé Elqana, fils de Yeroham, fils d''Elihou, fils de Tohou, fils de Tsouph, Ephratite, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle, amère, se mit à prier le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et à pleurer abondamment. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elle fit un vœu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 30.2-6 ; Ps 50.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une descendance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une descendance d'hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression unique dans la Bible ; on comprend habituellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un enfant mâle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ta servante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant (aussi au v. 16) peut aussi désigner une esclave. Ici il s''agit simplement d''une formule de politesse courante ; cf. 25.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Gn 12.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 21.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le rasoir ne passera pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les cheveux non coupés étaient un signe de la consécration d''un homme au service de Dieu ; cf. Nb 6.5 ; Jg 5.2 ; 13.5 ; 16.17. Samuel est explicitement désigné comme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nazir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dans LXX, dans un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ' et en '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '46.13 (selon le texte hébreu) : « Aimé de son peuple et agréable à son créateur, celui qui fut demandé dès le sein de sa mère, consacré (= '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nazir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') au Seigneur dans la fonction prophétique, Samuel juge et prêtre. » (Voir aussi « Samuel dans le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Siracide
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  », p.$).'
      marker-yv: yv-n
    - type: text
      text: 'Elle fit un vœu, en disant : '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, si tu daignes regarder mon affliction, si tu te souviens de moi et ne m''oublies pas, si tu me donnes une descendance, à moi qui suis ta servante, je le donnerai au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour tous les jours de sa vie, et le rasoir ne passera pas sur sa tête. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme sa prière se prolongeait devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Eli observait sa bouche. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur son cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ivre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à la suite du repas sacrificiel (cf. v. 9).'
      marker-yv: yv-n
    - type: text
      text: 'Anne parlait dans son cœur ; seules ses lèvres remuaient, mais on n''entendait pas sa voix. Eli pensa qu''elle était ivre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Va cuver ton vin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: éloigne ton vin de dessus toi.
      marker-yv: yv-n
    - type: text
      text: 'Il lui dit : Jusqu''à quand resteras-tu ivre ? Va cuver ton vin ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
