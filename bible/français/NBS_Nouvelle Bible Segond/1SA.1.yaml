      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce verbe, qui réapparaît aux v. 20,27,28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', est le fil conducteur de la fin du chap. ; voir aussi 2.20.'
      marker-yv: yv-n
    - type: text
      text: 'Eli répondit : Va en paix ; que le Dieu d''Israël te donne ce que tu lui as demandé ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
