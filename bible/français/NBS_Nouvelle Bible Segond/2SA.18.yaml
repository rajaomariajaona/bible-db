      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se prosterna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 25.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Béni
      - type: text
        text: ' soit le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' …'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 25.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'livré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 23.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui levaient la main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui se révoltaient ; qui s'insurgeaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 20.21.'
    marker-yv: yv-n
  - type: text
    text: 'Ahimaats cria et dit au roi : Tout va bien ! Il se prosterna devant le roi, face contre terre, et dit : Béni soit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, qui a livré les hommes qui levaient la main contre toi, ô roi, mon seigneur ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
