      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ahimaats, fils de Tsadoq, dit : Laisse-moi, je te prie, courir porter au roi la nouvelle que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui a rendu justice en le délivrant de la main de ses ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bonnes nouvelles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.10.'
    marker-yv: yv-n
  - type: text
    text: 'Joab lui dit : Tu ne seras pas porteur de bonne nouvelle en ce jour ; tu porteras de bonnes nouvelles un autre jour, mais tu n''en porterais pas en ce jour, puisque le fils du roi est mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
