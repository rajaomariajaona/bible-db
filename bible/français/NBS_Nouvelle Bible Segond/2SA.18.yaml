        text: 'du v. 4) ; ce passage était fermé à ses deux extrémités par des portes en bois, et on pouvait y aménager un local ; c''est là que David s''était installé. Le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'guetteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'prenait place '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur la muraille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', au-dessus de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la porte de la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. 2R 9.17 ; Es 21.6s.
    marker-yv: yv-n
  - type: text
    text: 'David était assis entre les deux portes. Le guetteur alla sur le toit en terrasse de la porte de la ville, sur la muraille ; il leva les yeux et aperçut un homme qui courait tout seul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Un homme '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'seul '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ne peut être qu'un messager ; des soldats en déroute arriveraient en groupes désordonnés.
    marker-yv: yv-n
  - type: text
    text: 'Le guetteur cria pour l''annoncer au roi. Le roi dit : S''il est seul, il apporte une nouvelle. L''homme approchait peu à peu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vers le portier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vers la porte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. à l''adresse du roi ; la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' a compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du sommet (de la porte, là où il se trouvait).
    marker-yv: yv-n
  - type: text
    text: 'Le guetteur vit un autre homme qui courait ; il cria vers le portier : Un homme court tout seul. Le roi dit : Il apporte aussi une nouvelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la manière de courir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 9.19s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est un homme de bien…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 1.42 ; voir Es 52.7 ; Pr 25.25.'
    marker-yv: yv-n
  - type: text
    text: 'Le guetteur dit : A mon point de vue, la manière de courir du premier est celle d''Ahimaats, fils de Tsadoq. Le roi dit : C''est un homme de bien, et il arrive pour une bonne nouvelle. '
  - type: usfm
    marker: vlbl
    children:
