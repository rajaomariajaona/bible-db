document_id: 2SA.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Défaite des troupes d'Absalom
  - type: text
    content: ' '
  - type: note
    content: 'recensa ou passa en revue . –  chefs de mille…  : cf. Ex 18.21 ; Nb 31.14 ; 1S 8.12 ; 22.7.'
  - type: text
    content: 'David recensa les hommes qui étaient avec lui et il nomma à leur tête des chefs de mille et des chefs de cent. '
  '10':
  - type: text
    content: 'Un homme qui avait vu cela vint dire à Joab : J''ai vu Absalom suspendu à un térébinthe ! '
  '11':
  - type: note
    content: 'dix pièces d''argent ou dix sicles d''argent, litt. dix d''argent  ; de même dans la suite. –  une ceinture  : autre traduction des armes  ; cf. 2R 3.21n. La ceinture est une pièce de l''équipement militaire.'
  - type: text
    content: 'Joab répondit à l''homme qui lui disait cela : Tu l''as vu ! Pourquoi donc ne l''as-tu pas abattu sur place ? Je t''aurais donné dix pièces d''argent et une ceinture. '
  '12':
  - type: note
    content: 'je ne porterais pas la main sur le fils, c.-à-d. je ne ferais aucun mal au fils. –  en notre présence  : litt. à nos oreilles  ; cf. v. 5. –  chacun  : le texte hébreu est difficile ; le mot rendu par chacun pourrait être une sorte d''indéfini (qui que ce soit) ; versions anciennes  : pour moi (cf. v. 5).'
  - type: text
    content: 'Mais cet homme dit à Joab : Quand je pèserais dans le creux de mes mains mille pièces d''argent, je ne porterais pas la main sur le fils du roi ; car en notre présence le roi t''a donné cet ordre, ainsi qu''à Abishaï et à Ittaï : « Que chacun de vous prenne garde au jeune Absalom ! » '
  '13':
  - type: note
    content: 'Si j''agissais…  : la même expression est traduite par pratiquer le mensonge en Jr 6.13 ; 8.10. –  au péril de ma vie ou, selon une autre lecture traditionnelle, à l''encontre de sa vie. – Le sens précis du début de ce v. n''est pas très clair ; le mensonge consisterait peut-être pour le soldat, après avoir tué Absalom, à prétendre n''avoir pas entendu l''ordre du roi. –  caché au roi  : cf. 14.20+. –  tu ne ferais rien…  : litt. tu te tiendrais à l''écart.'
  - type: text
    content: 'Si j''agissais de façon mensongère au péril de ma vie, rien ne serait caché au roi, et toi-même tu ne ferais rien pour me défendre. '
  '14':
  - type: note
    content: 'épieux  : litt. bâtons. –  au milieu  : litt. au cœur.'
  - type: text
    content: 'Joab dit : Je ne perdrai pas mon temps avec toi ! Et il prit trois épieux et les enfonça dans le cœur d''Absalom, qui était encore vivant au milieu du térébinthe. '
  '15':
  - type: note
    content: 'qui portaient les armes de Joab  : cf. 23.37 ; cf. Jg 9.54+. –  le mirent à mort  : litt. l''abattirent (ou le frappèrent) et le mirent à mort.'
  - type: text
    content: Les dix serviteurs qui portaient les armes de Joab entourèrent Absalom et le mirent à mort.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'sonner de la trompe  : cf. 2.28+.'
  - type: text
    content: 'Joab fit sonner de la trompe, et le peuple cessa de poursuivre Israël, parce que Joab l''en empêcha. '
  '17':
  - type: note
    content: 'tas de pierres  : cf. Jos 7.26 ; 8.29 ; 10.27. –  dans sa tente  : allusion au campement militaire, ou plus probablement expression traditionnelle signifiant simplement chez soi.'
  - type: text
    content: 'Ils prirent Absalom, le jetèrent dans une grande fosse au milieu de la forêt ; ils élevèrent sur lui un très grand tas de pierres. Tout Israël s''enfuit, chacun dans sa tente. '
  '18':
  - type: note
    content: 'la pierre levée  : cf. Gn 35.20 ; Es 57.6. –  la vallée du Roi  : probablement à proximité de Jérusalem ; cf. Gn 14.17n. –  pas de fils  : cf. 14.27n. –  pour évoquer… autre traduction pour rappeler le souvenir de mon nom. –  Monument  : cf. 1S 15.12n.'
  - type: text
    content: 'De son vivant, Absalom avait fait installer la pierre levée qui est dans la vallée du Roi, car il disait : Je n''ai pas de fils pour évoquer mon nom ; et il donna son propre nom à la pierre levée : c''est pourquoi on l''appelle Monument d''Absalom, jusqu''à ce jour.'
  - type: heading
    content: David apprend la mort d'Absalom
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Ahimaats  : cf. 15.27,36. –  la nouvelle  : le mot hébreu correspondant désigne parfois une bonne nouvelle  ; cf. v. 20. –  lui a rendu justice…  : litt. l''a jugé de la main de ses ennemis  ; même tournure v. 31 ; 1S 24.16n.'
  - type: text
    content: 'Ahimaats, fils de Tsadoq, dit : Laisse-moi, je te prie, courir porter au roi la nouvelle que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui a rendu justice en le délivrant de la main de ses ennemis. '
  '2':
  - type: note
    content: 'envoya  : LXX dit plaça. – Subdivision en trois corps de troupe : cf. 1S 11.11 ; 13.17s. –  Joab / Abishaï  : cf. 2.13n  ; 1S 26.6n. –  le Gatite  : cf. 15.18ss ; Jos 13.3n.'
  - type: text
    content: 'David envoya le tiers des hommes sous le commandement de Joab, un autre tiers sous celui d''Abishaï, fils de Tserouya et frère de Joab, et un autre tiers sous celui d''Ittaï, le Gatite ; puis le roi dit aux hommes : Moi aussi, je tiens à partir en campagne avec vous. '
  '20':
  - type: note
    content: 'bonnes nouvelles  : cf. 4.10.'
  - type: text
    content: 'Joab lui dit : Tu ne seras pas porteur de bonne nouvelle en ce jour ; tu porteras de bonnes nouvelles un autre jour, mais tu n''en porterais pas en ce jour, puisque le fils du roi est mort. '
  '21':
  - type: note
    content: 'un Koushite (ou Nubien, Ethiopien) : c.-à-d. du pays de Koush, situé au sud de l''Egypte (cf. Gn 2.13n). Il s''agit soit d''un soldat, soit d''un serviteur personnel de Joab. –  et courut ou et partit en courant.'
  - type: text
    content: 'Et Joab dit à un Koushite : Va dire au roi ce que tu as vu. Le Koushite se prosterna devant Joab et courut. '
  '22':
  - type: note
    content: 'Tu n''as rien à gagner…  : autres traductions ce n''est pas une nouvelle avantageuse pour toi ; cette nouvelle ne te vaudra pas de récompense  ; un porteur de bonne nouvelle pouvait espérer recevoir une récompense, cf. 4.10.'
  - type: text
    content: 'Ahimaats, fils de Tsadoq, dit encore à Joab : Advienne que pourra ! Laisse-moi courir, moi aussi, derrière le Koushite, je t''en prie ! Joab dit : Pourquoi veux-tu courir, mon fils ? Tu n''as rien à gagner avec cette nouvelle. '
  '23':
  - type: note
    content: 'reprit-il  : sous-entendu dans le texte. –  Joab…  : litt. il lui dit : Cours ! – Le District désigne ici la vallée du Jourdain. Le chemin emprunté par Ahimaats était plus long mais plus aisé que celui du Koushite, lequel traversait directement la région très accidentée de Transjordanie.'
  - type: text
    content: '– Quoi qu''il arrive, je veux courir, reprit-il. Joab lui dit alors : Eh bien, cours ! Ahimaats courut par le chemin du District et il dépassa le Koushite.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n. – La muraille de la ville était percée d''un passage ( la porte du v. 4) ; ce passage était fermé à ses deux extrémités par des portes en bois, et on pouvait y aménager un local ; c''est là que David s''était installé. Le guetteur prenait place sur la muraille , au-dessus de la porte de la ville . Cf. 2R 9.17 ; Es 21.6s.'
  - type: text
    content: 'David était assis entre les deux portes. Le guetteur alla sur le toit en terrasse de la porte de la ville, sur la muraille ; il leva les yeux et aperçut un homme qui courait tout seul. '
  '25':
  - type: note
    content: Un homme seul ne peut être qu'un messager ; des soldats en déroute arriveraient en groupes désordonnés.
  - type: text
    content: 'Le guetteur cria pour l''annoncer au roi. Le roi dit : S''il est seul, il apporte une nouvelle. L''homme approchait peu à peu. '
  '26':
  - type: note
    content: 'vers le portier  : LXX vers la porte, c.-à-d. à l''adresse du roi ; la Vg a compris du sommet (de la porte, là où il se trouvait).'
  - type: text
    content: 'Le guetteur vit un autre homme qui courait ; il cria vers le portier : Un homme court tout seul. Le roi dit : Il apporte aussi une nouvelle. '
  '27':
  - type: note
    content: 'la manière de courir  : cf. 2R 9.19s. –  C''est un homme de bien…  : cf. 1R 1.42 ; voir Es 52.7 ; Pr 25.25.'
  - type: text
    content: 'Le guetteur dit : A mon point de vue, la manière de courir du premier est celle d''Ahimaats, fils de Tsadoq. Le roi dit : C''est un homme de bien, et il arrive pour une bonne nouvelle. '
  '28':
  - type: note
    content: 'se prosterna  : cf. 1S 25.23. –  Béni soit le Seigneur …  : cf. 1S 25.32n. –  livré Dt 23.16n. –  qui levaient la main  : c.-à-d. qui se révoltaient ; qui s''insurgeaient  ; cf. 20.21.'
  - type: text
    content: 'Ahimaats cria et dit au roi : Tout va bien ! Il se prosterna devant le roi, face contre terre, et dit : Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, qui a livré les hommes qui levaient la main contre toi, ô roi, mon seigneur ! '
  '29':
  - type: note
    content: 'où Joab… et moi-même  : certains traduisent, avec LXX, Joab, serviteur du roi, m''envoya, moi, ton serviteur. –  je n''ai pas su ce que c''était  : Ahimaats évite de mentionner la mort d''Absalom, laissant au Koushite le soin d''annoncer cette mauvaise nouvelle au roi.'
  - type: text
    content: 'Le roi demanda : Tout va-t-il bien pour le jeune Absalom ? Ahimaats répondit : J''ai vu une grande agitation au moment où Joab a envoyé le serviteur du roi et moi-même ; mais je n''ai pas su ce que c''était. '
  '3':
  - type: note
    content: 'Tu n''iras pas ! cf. 21.17. –  on ne fera pas attention à nous  : litt. ils (impersonnel) ne placeront pas leur cœur vers nous. –  maintenant…  : LXX tu es comme dix mille d''entre nous  ; cf. Lv 26.8 ; Dt 32.30.'
  - type: text
    content: 'Mais les hommes répondirent : Tu n''iras pas ! En effet, si nous nous enfuyons, on ne fera pas attention à nous ; et quand la moitié d''entre nous mourrait, on n''y ferait pas attention ; mais maintenant il s''agit de dix mille d''entre nous ; en outre, il est bon que de la ville tu puisses nous porter secours. '
  '30':
  - type: note
    content: 'attendit  : autre traduction resta debout.'
  - type: text
    content: 'Le roi dit : Tiens-toi là, sur le côté. Ahimaats se rangea sur le côté et attendit. '
  '31':
  - type: note
    content: Voir v. 19n  ; 22.1.
  - type: text
    content: 'Quand le Koushite arriva, il dit : Apprends la nouvelle, ô roi, mon seigneur ! Aujourd''hui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a rendu justice en te délivrant de la main de tous ceux qui se dressaient contre toi. '
  '32':
  - type: note
    content: 'Le Koushite, sans annoncer explicitement la mort d''Absalom, ne laisse en fait aucun doute sur son sort. –  O roi  : litt. ô roi, mon seigneur.'
  - type: text
    content: 'Le roi demanda au Koushite : Tout va-t-il bien pour le jeune Absalom ? Le Koushite répondit : O roi, que tes ennemis et tous ceux qui se dressent contre toi pour te faire du mal soient comme ce jeune homme !'
  '4':
  - type: note
    content: 'la porte de la ville  : litt. la porte, porte double selon le v. 24. –  partaient en campagne ou sortaient, cf. v. 2.'
  - type: text
    content: 'Le roi leur répondit : Je ferai comme il vous plaira. Le roi se tint à côté de la porte de la ville, pendant que tous les hommes partaient en campagne, par centaines et par milliers. '
  '5':
  - type: note
    content: doucement avec le jeune Absalom ! cf. Ez 18.23 ; Ps 103.13.
  - type: text
    content: 'Le roi donna cet ordre à Joab, à Abishaï et à Ittaï : Par égard pour moi, doucement avec le jeune Absalom ! Et tout le peuple entendit l''ordre du roi à tous les chefs au sujet d''Absalom.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'partit  : litt. sortit . –  Israël désigne ici les partisans d''Absalom (cf. 17.26). – Bien que la tribu d''Ephraïm fût implantée à l''ouest du Jourdain, il est probable que l''endroit appelé forêt d''Ephraïm se trouvait de l''autre côté du fleuve, cf. Jos 17.15 ; Jg 12.4-6. Certains mss de LXX parlent de la forêt de Mahanaïm.'
  - type: text
    content: 'Le peuple partit dans la campagne à la rencontre d''Israël ; la bataille eut lieu dans la forêt d''Ephraïm. '
  '7':
  - type: note
    content: 'une grande défaite  : cf. 17.9.'
  - type: text
    content: 'Là, le peuple d''Israël fut battu par les hommes de David ; ce fut une grande défaite en ce jour-là : vingt mille hommes battus. '
  '8':
  - type: note
    content: 's''étendit  : litt. se dispersa. –  sur tout le pays, c.-à-d. dans toute la région. –  la forêt dévora plus de gens  : probablement en raison de précipices, de zones marécageuses ou d''impossibilité d''orientation. –  que l''épée, c.-à-d. que les combats proprement dits ; cf. 2.26 ; 1S 15.8n.'
  - type: text
    content: Le combat s'étendit sur tout le pays, et la forêt dévora plus de gens que l'épée ce jour-là.
  - type: heading
    content: Joab tue Absalom
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'térébinthe  : l''espèce d''arbre n''est pas identifiée de manière certaine ; il pourrait s''agir aussi d''un chêne . –  Il resta suspendu  : d''après un ms de Qumrân et des versions anciennes ; le texte hébreu traditionnel porte il fut placé . –  qu''il montait  : litt. sous lui.'
  - type: text
    content: 'Absalom se trouva face à face avec les hommes de David. Absalom était monté sur un mulet. Le mulet pénétra sous la ramure d''un grand térébinthe, et la tête d''Absalom fut prise dans le térébinthe. Il resta suspendu entre ciel et terre, tandis que le mulet qu''il montait poursuivait son chemin. '
