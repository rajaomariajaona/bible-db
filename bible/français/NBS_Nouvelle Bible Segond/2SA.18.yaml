    marker-yv: yv-n
  - type: text
    text: 'Ils prirent Absalom, le jetèrent dans une grande fosse au milieu de la forêt ; ils élevèrent sur lui un très grand tas de pierres. Tout Israël s''enfuit, chacun dans sa tente. '
  - type: usfm
