      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Joab dit : Je ne perdrai pas mon temps avec toi ! Et il prit trois épieux et les enfonça dans le cœur d''Absalom, qui était encore vivant au milieu du térébinthe. '
  - type: usfm
