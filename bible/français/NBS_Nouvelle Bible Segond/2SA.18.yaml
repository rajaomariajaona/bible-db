        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'De son vivant, Absalom avait fait installer la pierre levée qui est dans la vallée du Roi, car il disait : Je n''ai pas de fils pour évoquer mon nom ; et il donna son propre nom à la pierre levée : c''est pourquoi on l''appelle Monument d''Absalom, jusqu''à ce jour.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David apprend la mort d'Absalom
  marker-yv: yv-h
- type: usfm
  marker: p
