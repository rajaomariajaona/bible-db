  - type: text
    text: 'Le roi demanda au Koushite : Tout va-t-il bien pour le jeune Absalom ? Le Koushite répondit : O roi, que tes ennemis et tous ceux qui se dressent contre toi pour te faire du mal soient comme ce jeune homme !'
