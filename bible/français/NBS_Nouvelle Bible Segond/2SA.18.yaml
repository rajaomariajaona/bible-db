      marker: fq
      children:
      - type: text
        text: reprit-il
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joab…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il lui dit : Cours ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '– Le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'District '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'désigne ici la vallée du Jourdain. Le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chemin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'emprunté par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ahimaats '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'était plus long mais plus aisé que celui du '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Koushite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', lequel traversait directement la région très accidentée de Transjordanie.'
    marker-yv: yv-n
  - type: text
    text: '– Quoi qu''il arrive, je veux courir, reprit-il. Joab lui dit alors : Eh bien, cours ! Ahimaats courut par le chemin du District et il dépassa le Koushite.'
- type: usfm
  marker: p
