      marker: fq
      children:
      - type: text
        text: chefs de mille…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ex 18.21 ; Nb 31.14 ; 1S 8.12 ; 22.7.'
    marker-yv: yv-n
  - type: text
    text: 'David recensa les hommes qui étaient avec lui et il nomma à leur tête des chefs de mille et des chefs de cent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: envoya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' dit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: plaça
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – Subdivision en trois corps de troupe : cf. 1S 11.11 ; 13.17s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abishaï
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1S 26.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Gatite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.18ss ; Jos 13.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'David envoya le tiers des hommes sous le commandement de Joab, un autre tiers sous celui d''Abishaï, fils de Tserouya et frère de Joab, et un autre tiers sous celui d''Ittaï, le Gatite ; puis le roi dit aux hommes : Moi aussi, je tiens à partir en campagne avec vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu n''iras pas ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cf. 21.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on ne fera pas attention à nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(impersonnel) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne placeront pas leur cœur vers nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: maintenant…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu es comme dix mille d'entre nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Lv 26.8 ; Dt 32.30.'
    marker-yv: yv-n
  - type: text
    text: 'Mais les hommes répondirent : Tu n''iras pas ! En effet, si nous nous enfuyons, on ne fera pas attention à nous ; et quand la moitié d''entre nous mourrait, on n''y ferait pas attention ; mais maintenant il s''agit de dix mille d''entre nous ; en outre, il est bon que de la ville tu puisses nous porter secours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la porte de la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la porte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', porte double selon le v. 24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'partaient en campagne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sortaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 2.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi leur répondit : Je ferai comme il vous plaira. Le roi se tint à côté de la porte de la ville, pendant que tous les hommes partaient en campagne, par centaines et par milliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'doucement avec le jeune Absalom ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. Ez 18.23 ; Ps 103.13.
    marker-yv: yv-n
  - type: text
    text: 'Le roi donna cet ordre à Joab, à Abishaï et à Ittaï : Par égard pour moi, doucement avec le jeune Absalom ! Et tout le peuple entendit l''ordre du roi à tous les chefs au sujet d''Absalom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: partit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sortit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'désigne ici les partisans d''Absalom (cf. 17.26). – Bien que la tribu d''Ephraïm fût implantée à l''ouest du Jourdain, il est probable que l''endroit appelé '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'forêt d''Ephraïm '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'se trouvait de l''autre côté du fleuve, cf. Jos 17.15 ; Jg 12.4-6. Certains mss de LXX parlent de la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: forêt de Mahanaïm.
    marker-yv: yv-n
  - type: text
    text: 'Le peuple partit dans la campagne à la rencontre d''Israël ; la bataille eut lieu dans la forêt d''Ephraïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une grande défaite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.9.'
    marker-yv: yv-n
  - type: text
    text: 'Là, le peuple d''Israël fut battu par les hommes de David ; ce fut une grande défaite en ce jour-là : vingt mille hommes battus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'étendit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se dispersa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur tout le pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans toute la région
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la forêt dévora plus de gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : probablement en raison de précipices, de zones marécageuses ou d''impossibilité d''orientation. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que l'épée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que les combats '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: proprement dits ; cf. 2.26 ; 1S 15.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Le combat s'étendit sur tout le pays, et la forêt dévora plus de gens que l'épée ce jour-là.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joab tue Absalom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: térébinthe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : l''espèce d''arbre n''est pas identifiée de manière certaine ; il pourrait s''agir aussi d''un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chêne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il resta suspendu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : d''après un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ' et des versions anciennes ; le texte hébreu traditionnel porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il fut placé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'il montait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sous lui.
    marker-yv: yv-n
  - type: text
    text: 'Absalom se trouva face à face avec les hommes de David. Absalom était monté sur un mulet. Le mulet pénétra sous la ramure d''un grand térébinthe, et la tête d''Absalom fut prise dans le térébinthe. Il resta suspendu entre ciel et terre, tandis que le mulet qu''il montait poursuivait son chemin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Un homme qui avait vu cela vint dire à Joab : J''ai vu Absalom suspendu à un térébinthe ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dix pièces d''argent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dix sicles d'argent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dix d'argent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même dans la suite. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une ceinture
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des armes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2R 3.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. La '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ceinture '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est une pièce de l'équipement militaire.
    marker-yv: yv-n
  - type: text
    text: 'Joab répondit à l''homme qui lui disait cela : Tu l''as vu ! Pourquoi donc ne l''as-tu pas abattu sur place ? Je t''aurais donné dix pièces d''argent et une ceinture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je ne porterais pas la main sur le fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je ne ferais aucun mal au fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en notre présence
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à nos oreilles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chacun
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le texte hébreu est difficile ; le mot rendu par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chacun '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: pourrait être une sorte d'indéfini (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui que ce soit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; versions anciennes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 5).
    marker-yv: yv-n
  - type: text
    text: 'Mais cet homme dit à Joab : Quand je pèserais dans le creux de mes mains mille pièces d''argent, je ne porterais pas la main sur le fils du roi ; car en notre présence le roi t''a donné cet ordre, ainsi qu''à Abishaï et à Ittaï : « Que chacun de vous prenne garde au jeune Absalom ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Si j'agissais…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la même expression est traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pratiquer le mensonge '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Jr 6.13 ; 8.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au péril de ma vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon une autre lecture traditionnelle, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à l'encontre de sa vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – Le sens précis du début de ce v. n''est pas très clair ; le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mensonge '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'consisterait peut-être pour le soldat, après avoir tué Absalom, à prétendre n''avoir pas entendu l''ordre du roi. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: caché au roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.20+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu ne ferais rien…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu te tiendrais à l'écart.
    marker-yv: yv-n
  - type: text
    text: 'Si j''agissais de façon mensongère au péril de ma vie, rien ne serait caché au roi, et toi-même tu ne ferais rien pour me défendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: épieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bâtons
    - type: usfm
      marker: ft
      children:
