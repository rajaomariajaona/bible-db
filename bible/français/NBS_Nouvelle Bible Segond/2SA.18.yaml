      - type: text
        text: je n'ai pas su ce que c'était
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Ahimaats évite de mentionner la mort d''Absalom, laissant au Koushite le soin d''annoncer cette mauvaise nouvelle au roi.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi demanda : Tout va-t-il bien pour le jeune Absalom ? Ahimaats répondit : J''ai vu une grande agitation au moment où Joab a envoyé le serviteur du roi et moi-même ; mais je n''ai pas su ce que c''était. '
