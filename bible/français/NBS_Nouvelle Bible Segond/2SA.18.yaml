        text: '  ; 22.1.'
    marker-yv: yv-n
  - type: text
    text: 'Quand le Koushite arriva, il dit : Apprends la nouvelle, ô roi, mon seigneur ! Aujourd''hui le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' t''a rendu justice en te délivrant de la main de tous ceux qui se dressaient contre toi. '
