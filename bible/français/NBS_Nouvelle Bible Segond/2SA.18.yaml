    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et partit en courant.
    marker-yv: yv-n
  - type: text
    text: 'Et Joab dit à un Koushite : Va dire au roi ce que tu as vu. Le Koushite se prosterna devant Joab et courut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu n'as rien à gagner…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce n'est pas une nouvelle avantageuse pour toi ; cette nouvelle ne te vaudra pas de récompense
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; un porteur de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bonne nouvelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: pouvait espérer recevoir une récompense, cf. 4.10.
    marker-yv: yv-n
  - type: text
    text: 'Ahimaats, fils de Tsadoq, dit encore à Joab : Advienne que pourra ! Laisse-moi courir, moi aussi, derrière le Koushite, je t''en prie ! Joab dit : Pourquoi veux-tu courir, mon fils ? Tu n''as rien à gagner avec cette nouvelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
