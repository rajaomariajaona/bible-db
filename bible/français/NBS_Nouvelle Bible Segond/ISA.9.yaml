document_id: ISA.9,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Mt 4.16. –  ténèbres 8.22s ; 13.9s ; 42.7 ; 49.9 ; 59.9 ; Ps 107.10,14 ; Jb 10.21s ; 15.22-24 ; 38.17. –  lumière 58.8-10 ; 60.1s,20 ; 2S 23.3s ; Mi 7.8 ; Ps 27.1 ; 72.5,17 ; 110.3 ; cf. Lc 1.78s ; Ep 5.14. –  l'ombre de mort ou l'obscurité profonde , cf. Jb 3.5n.
  - type: text
    content: Le peuple qui marche dans les ténèbres
  - type: text
    content: a vu une grande lumière ;
  - type: text
    content: sur ceux qui habitent le pays de l'ombre de mort
  - type: text
    content: une lumière a brillé.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'contre eux  : litt. contre lui. –  les adversaires de Retsîn  : certains mss portent les princes de Retsîn (cf. 7.1n,16). –  il armera  : sens incertain : autre traduction il aiguillonnera , de même en 19.2.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera triompher'
  - type: text
    content: contre eux les adversaires de Retsîn ;
  - type: text
    content: il armera leurs ennemis,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Araméens 7.1. –  est / ouest ou devant / derrière (voir Jb 18.20n). –  Philistins  : voir Am 1.6-8. –  Malgré tout… 5.25+.'
  - type: text
    content: les Araméens à l'est, les Philistins à l'ouest,
  - type: text
    content: et ils dévoreront Israël à pleine bouche.
  - type: text
    content: Malgré tout cela, sa colère ne s'en retourne pas,
  - type: text
    content: sa main est encore étendue.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. 31.1 ; Jr 5.3 ; Os 7.10 ; So 1.6.
  - type: text
    content: Le peuple n'est pas revenu à celui qui le frappait,
  - type: text
    content: 'il n''a pas cherché le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'tête / queue  : cf. v. 12. –  branche / roseau  : cf. 19.15 ; Dt 28.13,44.'
  - type: text
    content: 'Aussi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' retranchera d''Israël la tête et la queue,'
  - type: text
    content: la branche de palmier et le roseau,
  - type: text
    content: en un seul jour.
  '14':
  - type: text
    content: ' '
  - type: note
    content: ancien / notable / prophète 3.2-3n  ; cf. 28.7 ; 30.10 ; Jr 14.14 ; Lm 2.14. –  qui enseigne le mensonge ou maître en mensonge  ; cf. Ha 2.18.
  - type: text
    content: – L'ancien et le notable, c'est la tête,
  - type: text
    content: et le prophète qui enseigne le mensonge, c'est la queue. –
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'guides / égarent / engloutis (autres traductions embrouillés ; dans la confusion , 3.12n) : cf. Jr 14.16.'
  - type: text
    content: Les guides de ce peuple l'égarent,
  - type: text
    content: ceux qui se laissent guider sont engloutis.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'C''est pourquoi  : cf. 5.25 ; Am 4.12. –  ne se réjouira pas de  : certains modifient légèrement le texte hébreu traditionnel pour lire ne sera pas clément envers. Un ms de Qumrân porte n''épargnera pas. –  jeunes gens 13.18 ; 31.8 ; Am 4.10. –  orphelins / veuves  : cf. 1.17+ ; 10.2. –  impies 10.16 ; 24.5n  ; 33.14 ; Jb 8.13+ ; Pr 11.9. –  la folie 32.6 ; Gn 34.7n.'
  - type: text
    content: C'est pourquoi le Seigneur ne se réjouira pas de leurs jeunes gens,
  - type: text
    content: il n'aura pas compassion de leurs orphelins et de leurs veuves ;
  - type: text
    content: car ce sont tous des impies, des mauvais,
  - type: text
    content: toute bouche profère la folie.
  - type: text
    content: Malgré tout cela, sa colère ne s'en retourne pas,
  - type: text
    content: sa main est encore étendue.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'feu / forêt  : cf. 1.31 ; 5.24 ; 10.17-19 ; 33.11s ; Dt 32.22 ; Jr 21.14n  ; Ez 21.1-4 ; Os 7.6s ; Am 5.6 ; Ps 83.15 ; Jb 31.12 ; Jc 3.6. –  ronces / épines 5.6+. –  taillis  : 10.34 ; mot de sens incertain, traduit par buisson en Gn 22.13.'
  - type: text
    content: Car la méchanceté brûle comme un feu
  - type: text
    content: qui dévore ronces et épines,
  - type: text
    content: il embrase les taillis de la forêt,
  - type: text
    content: qui se dissipent en volutes de fumée.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'embrasé  : d''après certaines versions anciennes ; d''autres versions ont lu ébranlé  ; le texte hébreu traditionnel est obscur. –  Personne n''épargne son frère 3.5+.'
  - type: text
    content: 'Par la fureur du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées'
  - type: text
    content: le pays est embrasé,
  - type: text
    content: et le peuple est comme dévoré par le feu.
  - type: text
    content: Personne n'épargne son frère.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'On taille  : autre traduction il taille (même possibilité dans la suite). –  droite / gauche ou sud / nord (positions respectives d''Ephraïm et de Manassé, voir v. 20). –  de son bras  : des versions anciennes ont lu de son prochain  ; cf. 49.26.'
  - type: text
    content: On taille à droite et on a faim ;
  - type: text
    content: on dévore à gauche et on n'est pas rassasié ;
  - type: text
    content: chacun dévore la chair de son bras.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'nation nombreuse  : cf. 26.15. –  tu l''as comblée de joie  : litt. tu lui a agrandi la joie , d''après une lecture traditionnelle. Autre lecture traditionnelle tu n''a pas agrandi la joie (variante d''une lettre). –  joie  : cf. 1R 1.40 ; 2R 11.14 ; Ps 132.9. –  joie des moissons Ps 4.8. –  de l''allégresse…  : litt. comme ils sont (ou on est ) dans l''allégresse quand ils partagent (ou on partage ) le butin.'
  - type: text
    content: Tu as rendu la nation nombreuse,
  - type: text
    content: tu l'as comblée de joie.
  - type: text
    content: Ils se réjouissent devant toi de la joie des moissons,
  - type: text
    content: de l'allégresse qui règne au partage du butin.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'dévore  : sous-entendu dans le texte. –  Ephraïm / Manassé  : les deux tribus principales du royaume du Nord, étroitement associées (Gn 41.50-52 ; Dt 33.13-17) et souvent rivales (cf. Gn 48.14 ; Jg 6.35 ; 8.1). Sur la guerre civile dans le royaume du Nord, voir 2R 15.16-31 ; 17.1-6 ; Os 6.7-11 ; 7.7 ; 10.3s ; 13.9-11. –  sur Juda 7.1n.'
  - type: text
    content: Manassé dévore Ephraïm,
  - type: text
    content: Ephraïm dévore Manassé ;
  - type: text
    content: ensemble ils fondent sur Juda.
  - type: text
    content: Malgré tout cela, sa colère ne s'en retourne pas,
  - type: text
    content: sa main est encore étendue.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'le joug qui pesait sur elle  : litt. le joug de son fardeau (cf. 10.27 ; 14.25 ; Lv 26.13 ; Dt 28.48). –  trique  : le mot hébreu correspondant est synonyme de celui qui est traduit ici par bâton (également sceptre 11.4 ; baguette 28.27 ; flèches Ha 3.9,14) ; les deux termes sont souvent rendus de la même manière 10.5,15,24,26 ; 14.5,29 ; 30.31s ; Ex 21.20 ; Pr 10.13. Au lieu de la trique qui frappait son dos (litt. le bâton de son épaule ), certains lisent ici le mot au pluriel et comprennent les barres de joug , comme en Jr 27.2 ; 28.10. –  son oppresseur 3.5n  ; cf. Ex 3.7n  ; 5.6n  ; Jb 3.18n. –  au jour de Madiân 10.26n  ; allusion probable à la victoire de Gédéon (Jg 6–8 ; noter particulièrement 6.35 ; 7.2 ; Ps 83.10-12).'
  - type: text
    content: Car le joug qui pesait sur elle,
  - type: text
    content: la trique qui frappait son dos,
  - type: text
    content: le bâton de son oppresseur,
  - type: text
    content: tu les as brisés comme au jour de Madiân.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'bottes  : d''après Syr  ; le mot est inconnu par ailleurs ; il est apparenté au verbe traduit par piétinaient , lequel n''apparaît également qu''ici. –  la bataille  : traduction incertaine ; on pourrait aussi comprendre qui faisaient trembler la terre  ; le même mot est traduit par tremblement de terre en 29.6 ; voir Ez 3.12n. –  le sang  : au pluriel dans l''hébreu (cf. 1.15n). –  livrés aux flammes…  : cf. 2.4 ; 11.6-9 ; Ez 39.9 ; Os 2.20 ; Za 9.10 ; Ps 46.10 ; 76.4 ; voir aussi Dt 13.17 ; Jos 10.24.'
  - type: text
    content: Toutes les bottes qui piétinaient dans la bataille
  - type: text
    content: et tous les manteaux roulés dans le sang
  - type: text
    content: seront livrés aux flammes,
  - type: text
    content: pour être dévorés par le feu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'un enfant nous est né  : cf. 7.14 ; 2S 7.14 ; Ps 2.7 ; 89.27s ; 110.3 ; Lc 2.11. –  un fils / donné  : cf. Jn 3.16. –  sur son épaule 22.22. –  on l''appelle  : cf. 2S 7.9 ; 1R 1.47 ; Ps 72.17. –  Conseiller étonnant ou merveilleux (25.1 ; 29.14) : ces deux mots ne forment vraisemblablement qu''un seul titre ; d''autres y voient deux titres distincts  : Etonnant (ou Merveilleux ) , Conseiller  ; cf. 5.19n  ; 11.2 ; 28.29n  ; cf. Jg 13.18n. –  Dieu-Héros ou Dieu vaillant , hébreu ’El-Gibbor , même formule en 10.21 ; cf. 11.2 ; 42.13 ; Dt 10.17 ; Jr 20.11 ; 32.18 ; Ps 24.8 ; Né 9.32 ; voir aussi Ez 32.21 ; Dn 11.3 ; autre traduction force de héros  ; cf. Ps 45.7 ; sur ’El , voir aussi Gn 21.33n. –  Père 22.21 ; Gn 45.8 ; 1S 24.12 ; Jb 29.16. –  Père éternel  : cf. 45.17 ; 47.7 ; 57.15 ; Ps 21.5-7 ; d''autres comprennent Père du butin , c.-à-d. conquérant victorieux . –  paix v. 6 ; 11.6-9 ; Jg 6.24 ; Mi 5.4 ; Za 9.10 ; Ps 72.3,7.'
  - type: text
    content: Car un enfant nous est né,
  - type: text
    content: un fils nous a été donné.
  - type: text
    content: Il a la souveraineté sur son épaule ;
  - type: text
    content: on l'appelle du nom de Conseiller étonnant,
  - type: text
    content: Dieu-Héros, Père éternel,
  - type: text
    content: Prince de paix.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Etendre la souveraineté  : texte incertain ; autre traduction une vaste domination, une paix sans fin…  ; cf. 2.3s ; 2S 7.16 ; Ps 21.5 ; 61.6s ; 89.5,29s,37s ; 110.2 ; 132.12. –  trône / équité / justice  : cf. 16.5 ; Ps 89.15 ; 97.2 ; Pr 16.12 ; 20.28 ; 25.5. Voir aussi Es 1.17,26s ; 2.4 ; 11.3-5 ; 32.1,16s ; Jr 23.5 ; 33.15. –  passion jalouse ou zèle 26.11 ; 37.32 ; 42.13 ; 59.17 ; 63.15 ; cf. Ex 20.5n  ; Ez 5.13 ; Jl 2.18 ; Na 1.2n  ; Za 1.14.'
  - type: text
    content: Etendre la souveraineté,
  - type: text
    content: accorder une paix sans fin au trône de David et à son royaume,
  - type: text
    content: l'affermir et le soutenir par l'équité et par la justice,
  - type: text
    content: 'dès maintenant et pour toujours :'
  - type: text
    content: 'voilà ce que fera la passion jalouse du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: La colère du Seigneur contre son peuple
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'envoie une parole (ou un événement ) : cf. 55.10s ; Jr 23.29 ; Os 6.5 ; Ps 147.15,18. –  Jacob désigne ici le royaume du Nord, cf. 2.5+.'
  - type: text
    content: 'Le Seigneur envoie une parole contre Jacob :'
  - type: text
    content: elle tombe sur Israël.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'le saura  : autres traductions en aura connaissance ; en fera l''expérience  ; cf. 5.19 ; Os 9.7. –  Samarie  : capitale du royaume du Nord. –  présomption  : litt. grandeur de cœur  ; voir aussi 10.12n  ; cf. 2.6-21 ; 28.1 ; Os 7.10 ; Am 6.13 ; Pr 16.18.'
  - type: text
    content: Tout le peuple le saura,
  - type: text
    content: Ephraïm et les habitants de Samarie
  - type: text
    content: 'qui disent avec orgueil et présomption :'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 22.14s ; Ml 1.4.
  - type: text
    content: Des briques sont tombées,
  - type: text
    content: nous bâtirons en pierres de taille ;
  - type: text
    content: des sycomores ont été coupés,
  - type: text
    content: nous les remplacerons par des cèdres.
