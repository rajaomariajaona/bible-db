document_id: PSA.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un innocent fait appel à Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Juge-moi 7.9n  ; cf. 17.1. –  je suis la voie…  : litt. je marche dans mon intégrité , de même au v. 11 ; tournure comparable au v. 3 ; cf. 15.2+ ; 18.21-28.'
  - type: text
    content: De David.
  - type: text
    content: 'Juge-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', car je suis la voie de l''intégrité,'
  - type: text
    content: 'j''ai mis ma confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', je ne chancellerai pas.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: pots-de-vin 15.5 ; Ex 23.8+.
  - type: text
    content: qui ont de l'infamie dans les mains,
  - type: text
    content: et dont la main droite est pleine de pots-de-vin !
  '11':
  - type: text
    content: ' '
  - type: note
    content: V. 1n. – Voir grâce.
  - type: text
    content: Moi, je suis la voie de l'intégrité ;
  - type: text
    content: libère-moi et fais-moi grâce !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Je me tiens droit…  : litt. mon pied (ou ma jambe ) se tient dans ce qui est droit  : ou bien, au sens moral, la droiture , ou bien, au sens concret, sur un endroit tout plat  ; cf. 27.11 ; 143.10. –  dans les assemblées  : cf. 22.23+.'
  - type: text
    content: 'Je me tiens droit sur mes jambes :'
  - type: text
    content: 'je bénirai le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dans les assemblées.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 7.10n  ; 17.3 ; cf. Jr 9.6.
  - type: text
    content: 'Sonde-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', mets-moi à l''épreuve,'
  - type: text
    content: fais passer au creuset mes reins et mon cœur ;
  '3':
  - type: text
    content: ' '
  - type: note
    content: 25.10n.
  - type: text
    content: car ta fidélité est devant mes yeux,
  - type: text
    content: et je suis le chemin de ta loyauté.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.1+. –  hommes faux Jb 11.11. –  dissimulés  : autres traductions dissimulateurs ; mystificateurs.'
  - type: text
    content: Je ne m'assieds pas avec les hommes faux,
  - type: text
    content: je ne vais pas avec les gens dissimulés ;
  '5':
  - type: text
    content: je déteste l'assemblée des mauvais,
  - type: text
    content: je ne m'assieds pas avec les méchants.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Je lave mes mains… 73.13 ; cf. Ex 30.17-21 ; Dt 21.6s ; Mt 27.24.
  - type: text
    content: Je lave mes mains dans l'innocence,
  - type: text
    content: 'je fais le tour de ton autel, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'pour déclarer…  : litt. pour faire entendre (certains mss hébreux et des versions anciennes ont lu pour écouter ) la voix de la reconnaissance (autre traduction de la confession ), terme qui peut aussi désigner, de façon concrète, un sacrifice, une célébration, une procession ou un chœur ; cf. 42.5 ; 50.14,23 ; 56.13 ; 69.31 ; 95.2 ; 100.1,4 ; 107.22 ; 116.17 ; 147.7 ; voir aussi 32.5 ; Lv 7.12n  ; Esd 10.11n  ; Né 12.27,31n  ; un verbe apparenté est traduit par confesser en Né 9.2+. –  et raconter… 9.2+.'
  - type: text
    content: pour déclarer ma reconnaissance
  - type: text
    content: et raconter tous tes actes étonnants.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'le séjour  : même terme hébreu en 68.6 ; 76.3 ; il est traduit par refuge en 71.3 ; 90.1 ; 91.9 ; voir aussi Dt 26.15n  ; LXX la beauté  ; Syr le service  ; cf. 23.6 ; 27.4+ ; 122.1. –  où ta gloire demeure 29.9 ; 63.3 ; Ex 40.34s ; 1R 8.11.'
  - type: text
    content: Seigneur
  - type: text
    content: ', j''aime le séjour de ta maison,'
  - type: text
    content: le lieu où ta gloire demeure.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ne m''enlève pas  : litt. ne réunis pas mon être ou ne recueille pas ma vie , c.-à-d. ne me fais pas mourir  ; cf. 28.3 ; 139.19 ; voir Gn 18.25 ; sur le terme hébreu correspondant à être ou vie , voir Gn 1.20n. –  avec les pécheurs  : cf. 1.1. –  les hommes sanguinaires  : litt. les hommes de sangs  ; même formule en 55.24 ; 59.3 ; 139.19 ; cf. 5.7 ; Pr 29.10.'
  - type: text
    content: Ne m'enlève pas avec les pécheurs,
  - type: text
    content: n'enlève pas ma vie avec les hommes sanguinaires,
