document_id: DEU.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: is2
  children:
  - type: text
    text: Un livre charnière
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans l''Ancien Testament, le Deutéronome est un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: livre charnière
  - type: text
    text: '  : d''un côté, il clôt et couronne la Torah ou Pentateuque (l''ensemble formé par les cinq premiers livres de la Bible ; voir aussi loi*) ; de l''autre, il amorce la grande section composée de Josué, Juges, Samuel et Rois (les « Premiers Prophètes », dans le canon hébreu ; voir introduction à l''Ancien Testament, p.${Xintat}). Le livre est à la fois tourné vers le passé ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tu te souviendras
  - type: text
    text: ', 8.2) et vers l''avenir ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Quand le Seigneur, ton Dieu, te fera entrer dans le pays
  - type: text
    text: ', 6.10 ; 8.7 ; voir aussi 30.1-5).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ainsi le Deutéronome commence par une sorte de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: récapitulation
  - type: text
    text: ' des événements importants qui ont marqué la vie du peuple d''Israël depuis son séjour au pied du mont Horeb (1.6) jusqu''à son arrivée aux portes de la Terre promise (4.46-49). Moïse y annonce la fin de sa mission et sa mort prochaine (3.23-28), puis il laisse à Israël ce qu''on pourrait appeler son '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: testament spirituel
  - type: text
    text: ' (chap. 4 et 5, par exemple, mais aussi 31 à 33) avant de mourir, seul avec Dieu, sur le mont Nebo (34.1-8). Les derniers versets du livre (34.10ss) soulignent bien que la mort de Moïse est la fin d''une époque.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Mais le Deutéronome est aussi le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: préambule
  - type: text
    text: ' du long récit qui va suivre le peuple d''Israël depuis la conquête de la Terre promise jusqu''à la destruction de Jérusalem et l''exil à Babylone (Josué–Rois). Le personnage de Josué, successeur de Moïse et guide d''Israël pour la conquête, y est présent dès les premières pages. Mais le lien avec les livres qui suivent est plus étroit encore : le Deutéronome apparaît comme le terreau où les « Premiers Prophètes » plongent leurs racines. Cette parenté se laisse reconnaître jusque dans le vocabulaire. On s''en rendra compte en comparant, par exemple, Deutéronome 26.3 et 34.4 avec Josué 1.6 ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: le pays que le Seigneur a juré à nos pères de nous donner
  - type: text
    text: ), Deutéronome 8.2 avec Josué 22.5 et 2 Rois 17.19 (
  - type: usfm
    marker: it
    children:
    - type: text
      text: observer ses commandements
  - type: text
    text: ), Deutéronome 31.7 avec Josué 1.6 ; 10.25 ; 1 Rois 2.2 (
  - type: usfm
    marker: it
    children:
    - type: text
      text: sois fort et courageux
  - type: text
    text: ), ou Deutéronome 6.13 avec 1 Samuel 12.24 (
  - type: usfm
    marker: it
    children:
    - type: text
      text: craindre le Seigneur et le servir
  - type: text
    text: ), etc.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Plus généralement, on remarquera que, de Josué aux Rois, les grands thèmes du Deutéronome sont régulièrement rappelés dans des discours ou des résumés historiques placés à des moments clefs de l''histoire (Jos 1 ; 23 ; Jg 2.6–3.6 ; 1S 12 ; 1R 8.14-53 ; 2R 17.7-23 ; voir aussi « Jérémie et le Deutéronome : quelques similitudes », p.${Xjerdt}).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Composition
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'On peut regarder le Deutéronome comme constitué de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: trois discours
  - type: text
    text: ' de Moïse : A) de 1.1 à 4.43 ou 44 ; B) de 4.44 ou 45 à 28.68 ; C) de 28.69 à 30.20, auxquels s''ajoute une dernière partie consacrée aux '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: adieux
  - type: text
    text: ' de celui-ci (31.1–34.12).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Mais, partant du constat que le Deutéronome offre surtout trois grandes sortes de textes (des récits, des exhortations et des « lois »), on peut voir aussi que l''ensemble du livre s''organise en une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: structure symétrique
  - type: text
    text: '  :'
- type: text
  text: '1–5Récits : du mont Horeb à la Transjordanie6–11Exhortations et mises en garde12–26Lois : le « code deutéronomique »27–28Bénédictions et malédictions29–34Récits : renouvellement de l''alliance ; adieux de Moïse'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Il apparaît ainsi que le livre est construit autour d''un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: code de lois
  - type: text
    text: ', qui occupe presque la moitié de l''ensemble. C''est dire son importance. Le titre Deutéronome, qui nous vient de la version grecque (LXX*), y fait directement référence. Il signifie, en effet, « deuxième loi » ou « double de la loi » (cf. 17.18'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ).
- type: usfm
  marker: ip
  children:
  - type: text
    text: En fait, aucun des trois grands genres chers au Deutéronome (récits, exhortations, lois) n'existe à l'état pur. C'est dans le cadre de la première partie, narrative, que Moïse rappelle le Décalogue (5.6-21). Les exhortations, de leur côté, sont volontiers appuyées sur le rappel d'événements passés qui les motivent (voir par exemple 9.7-21, où l'appel à la fidélité est illustré négativement par l'épisode du taurillon ou veau d'or). Nombre de lois particulières sont aussi rapportées à tel ou tel événement marquant du passé. Ainsi les règles concernant la célébration de la Pâque (16.1) ou l'offrande des prémices (26.5-10). Ailleurs enfin, la loi proprement dite (celle sur l'année de remise, par exemple, en 15.1-11) est mêlée d'exhortations pressantes.
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le Deutéronome et l'alliance
- type: usfm
  marker: ip
  children:
  - type: text
    text: L'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: alliance
  - type: text
    text: '* est un des thèmes chers au Deutéronome. Dans la vie sociale ou politique, le mot désignait une convention passée entre deux parties, en général un supérieur et un inférieur : un suzerain s''engageait à fournir protection à son vassal, tandis que ce dernier promettait fidélité à son maître.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''archéologie a mis au jour un certain nombre de textes d''alliance dans le Proche-Orient ancien où vivait Israël : hittites (des XIV'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' et XIII'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècles av. J.-C.), araméens et assyriens (des VIII'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' et VII'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècles) par exemple. Ces traités se conforment plus ou moins au schéma suivant : 1) '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: préambule
  - type: text
    text: ' présentant les parties contractantes, 2) '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: rappel historique
  - type: text
    text: ' des événements qui justifient la convention, 3) '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: clauses
  - type: text
    text: ' que les deux parties s''engagent à respecter. Le traité peut aussi mentionner 4) le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: document
  - type: text
    text: ' qui conserve les termes de l''alliance et qui doit être relu périodiquement et 5) les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: témoins
  - type: text
    text: ' (habituellement les dieux des parties contractantes). Il s''achève d''ordinaire par des bénédictions et surtout des malédictions appelées sur celle des deux parties qui transgresserait l''alliance.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''alliance qu''évoque maintes fois le Deutéronome (voir 4.23) est celle par laquelle '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Dieu
  - type: text
    text: ' s''est lié au peuple d'''
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Israël
  - type: text
    text: ' et réclame en retour à ce dernier un engagement de fidélité. Le Deutéronome n''est pas exactement à lire comme le traité de cette alliance, mais son '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: plan
  - type: text
    text: ' recoupe en plus d''un point le schéma traditionnel présenté ci-dessus : rappel historique (1–5), clauses d''engagement pour Israël (12–26), document (27.2-8), témoins (peut-être 31.24-26), malédictions et bénédictions (27–28). Plusieurs de ces éléments se retrouvent également aux chap. 29–30, qui rapportent le renouvellement solennel de l''alliance, célébré juste avant l''entrée en Terre promise.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'En utilisant ainsi le thème et le modèle de l''alliance, le Deutéronome peut apparaître comme politiquement '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: subversif
  - type: text
    text: ', puisqu''il souligne que le véritable suzerain d''Israël n''est aucun des grands empires qui dominent cette région du monde (ni l''Egypte, ni l''Assyrie, ni Babylone, ni même la Perse), mais YHWH, son Dieu.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: La communauté du Dieu unique
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le Deutéronome apparaît donc comme une pressante revendication de Dieu sur le peuple d''Israël, revendication justifiée par le fait qu''il a été et reste son libérateur (voir 5.6). Dieu n''a pas affaire ici à des individus pris isolément, mais à une communauté solidaire (voir 1.1). Dieu est '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: un
  - type: text
    text: ' (6.4), c''est-à-dire indivisible et fidèle à lui-même en toute occasion et en tout lieu — par opposition au Baal* cananéen, dont les formes multiples (Jg 2.11) sont attachées à tel ou tel lieu, comme Peor (Nb 25.3 ; Dt 4.3), Sichem (Jg 8.33) ou le mont Carmel (1R 18.21). A ce Dieu '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: un
  - type: text
    text: ' doit répondre un peuple unanime. La fidélité requise de chacun (Dt 29.17s) est la condition essentielle de la fidélité de la communauté tout entière. C''est cet aspect fortement communautaire de la vie de la foi qui explique l''emploi souvent original que le Deutéronome fait du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: tu
  - type: text
    text: ' et du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: vous
  - type: text
    text: ', en un balancement assez déconcertant pour le lecteur moderne, comme on pourra s''en rendre compte en lisant les chapitres 6, 7 ou 29.9-14. Habituellement, en effet, le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tu
  - type: text
    text: ' s''adresse à l''individu (voir 5.7-21, et notamment les v. 16 et 21), le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: vous
  - type: text
    text: ' au groupe (1.6-8 ; 5.22, etc.). Mais le Deutéronome utilise volontiers le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tu
  - type: text
    text: ' pour interpeller le peuple dans son ensemble (ainsi en 10.12 ; 16.1-17), et le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: vous
  - type: text
    text: ' pour se faire entendre de chaque membre du peuple (voir 29.15-20).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Ce que Dieu attend de son peuple
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le Deutéronome se présente souvent comme une '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tora
  - type: text
    text: ' (voir 1.5), terme hébreu, habituellement transcrit Torah ou traduit, faute de mieux, par '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loi,
  - type: text
    text: ' mais qui désigne ici un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: enseignement
  - type: text
    text: ' ou un ensemble de directives que Dieu donne à son peuple libéré comme charte de la vie nouvelle dans laquelle il l''a introduit.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Comme les autres « codes » bibliques (Ex 20.22–23.19, appelé parfois « code de l''alliance », ou Lv 19–26, désigné comme « code de sainteté »), le « code deutéronomique » (Dt 12–26) contient deux types de dispositions. Les unes sont impératives ; on les dit '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: apodictiques
  - type: text
    text: '  : tu feras ceci, ne fais pas cela ; ainsi Deutéronome 14.3-29 ; 16.1-21, etc. Les autres sont dites '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: casuistiques
  - type: text
    text: '  ; elles commencent, en effet, par énoncer des cas : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: si… ; lorsque… ; celui qui…
  - type: text
    text: ' (ainsi 13.2-17 ; 17.2-13 ; 20–22). Seules ces dernières prévoient en général une sanction pour le délinquant ; elles seules peuvent donc être qualifiées de lois, au sens usuel du mot.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Une comparaison avec les codes du Proche-Orient ancien que l'on connaît aujourd'hui (sumériens, akkadiens, babyloniens, assyriens, hittites) montre que ces derniers sont essentiellement du modèle casuistique (
  - type: usfm
    marker: it
    children:
    - type: text
      text: si… alors
  - type: text
    text: …) La forme apodictique (commandement ou interdiction absolus, sans indication de sanction) est donc probablement une originalité du texte biblique.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Il est difficile de dégager la règle qui a présidé, dans le détail, au classement des dispositions du « code deutéronomique » à l''intérieur des quatre grandes sections indiquées ci-dessous. Mais on peut y retrouver le plan du Décalogue :'
- type: usfm
  marker: is2
  children:
  - type: text
    text: A. Relations avec Dieu / / 12.2–16.17
- type: usfm
  marker: im
  children:
  - type: text
    text: 1) un lieu de culte unique, 2) l'idolâtrie, 3) les coutumes mortuaires, 4) le pur et l'impur, 5) la dîme, 6) l'année de remise, 7) les premiers-nés du bétail, 8) les trois grandes fêtes annuelles (Pains sans levain, Semaines, Huttes).
- type: usfm
  marker: is2
  children:
  - type: text
    text: B. Responsabilités dans la communauté / / 16.18–18.22
- type: usfm
  marker: im
  children:
  - type: text
    text: 1) les juges, 2) le roi, 3) les prêtres et les lévites, 4) les prophètes.
- type: usfm
  marker: is2
  children:
  - type: text
    text: C. Relations humaines et sociales / / 19–25
- type: usfm
  marker: im
  children:
  - type: text
    text: 'On trouve ici de nombreuses dispositions concernant notamment 1) le droit pénal, 2) la guerre, 3) le droit familial et conjugal, 4) la composition de l''assemblée des fidèles, 5) la protection des gens sans défense : esclaves, pauvres, immigrés, veuves et orphelins, 6) les prêts et le commerce, etc.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ces disposititions, comme celles des articles analogues dans les autres livres de la Torah (Ex, Lv, Nb), présentent de nombreuses similitudes avec les codes législatifs du Proche-Orient ancien. On a toutefois pu relever que, dans le Deutéronome au moins, elles s''en distinguaient ici et là dans le sens de la compassion. Ainsi, là où le code d''Hammourabi (§ 16) stipulait : « Si un homme a caché chez lui un ou une esclave en fuite… ce maître de maison sera mis à mort », son homologue dans le « code deutéronomique » proclame : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tu ne livreras pas à son maître un esclave qui s'est sauvé de chez son maître pour se réfugier chez toi
  - type: text
    text: ' (23.16).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: D. Appendice / / 26
- type: usfm
  marker: im
  children:
  - type: text
    text: 'Dispositions concernant l''offrande des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prémices
  - type: text
    text: ' et de la'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: dîme
  - type: text
    text: .
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le Deutéronome, un livre qui change la foi et la vie
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Selon le récit de 2 Rois 22–23, un événement important se produisit sous le règne de Josias, roi de Juda. A l''occasion de réparations effectuées au temple de Jérusalem, on trouva (ou on retrouva — le texte hébreu permet l''une ou l''autre traduction) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: le livre de la loi
  - type: text
    text: '. La lecture de ce livre impressionna le roi, qui décida de mettre immédiatement en œuvre ses dispositions : élimination des cultes idolâtriques, centralisation du culte, célébration solennelle de la Pâque. Or ce sont là des thèmes chers au Deutéronome (chap. 12, 13 et 16, par exemple). Il se pourrait donc que ce '
  - type: usfm
    marker: it
    children:
    - type: text
      text: livre de la loi
  - type: text
    text: ' découvert sous Josias soit à identifier au Deutéronome, ou du moins à sa partie centrale. Quoi qu''il en soit, le roi réformateur est présenté par le livre des Rois, selon une expression bien deutéronomique, comme le seul souverain de Juda qui soit revenu au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur (YHWH)
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: de tout son cœur, de toute son âme et de toute sa force
  - type: text
    text: ' (2R 23.3,25 ; cf. Dt 6.5).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'On le voit, le Deutéronome est chargé d''une émotion aussi discrète que contagieuse. Juifs et chrétiens y ont trouvé ce qui est '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: capital
  - type: text
    text: ' pour eux. C''est en effet dans le chapitre 6 du Deutéronome que le judaïsme puise l''essentiel de son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shema‘
  - type: text
    text: ' ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ecoute, Israël
  - type: text
    text: '). Ce texte récité deux fois par jour est tiré de Deutéronome 6.4-9 ; 11.13-21 ; Nombres 15.38-41, et il constitue la confession de foi de tout Israélite fidèle. Or, selon les évangiles, c''est dans le même chapitre que Jésus relève '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'le premier de tous les commandements : Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme et de toute ta force'
  - type: text
    text: ' (Mc 12.28ss/ /).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans l''alliance, la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: vie
  - type: text
    text: ' et la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: foi
  - type: text
    text: ' sont étroitement liées. Cette évidence ressort du livre tout entier, mais plus particulièrement des deux petites professions de foi qui ont été conservées en 6.20-25 (celle du père qui répond aux questions de son fils sur le pourquoi des commandements) et en 26.5-9 (celle qui doit accompagner l''offrande des prémices). De fait, la foi que fait naître le Dieu vivant ne peut être qu''une réponse. Pour elle, il y a un événement fondateur : Dieu est intervenu dans l''histoire humaine ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: le Seigneur nous a fait sortir d'Egypte…
  - type: text
