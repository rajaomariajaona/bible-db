document_id: LEV.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Complément : tarif pour les vœux'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: V. 33.
  - type: text
    content: 'On ne la changera pas, on ne remplacera pas une bonne par une mauvaise ni une mauvaise par une bonne ; si l''on remplace une bête par une autre, l''une et l''autre seront consacrées. '
  '11':
  - type: note
    content: bête impure 11.4ss ; voir pur, impur.
  - type: text
    content: 'S''il s''agit d''une bête impure qui ne peut pas être offerte en présent au '
  - type: text
    content: Seigneur
  - type: text
    content: ', quelle qu''elle soit, on placera la bête devant le prêtre, '
  '12':
  - type: text
    content: 'le prêtre en fixera la valeur selon qu''elle est bonne ou mauvaise ; on s''en rapportera à la valeur fixée par le prêtre. '
  '13':
  - type: note
    content: 'reprendre ou racheter, assurer sa rédemption  : cf. 25.25n  ; de même aux v. 15,19s,27s,31,33.'
  - type: text
    content: Si on veut la reprendre, on ajoutera un cinquième à la valeur fixée.
  '14':
  - type: text
    content: 'Si quelqu''un consacre sa maison, s''il en fait une chose consacrée au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le prêtre en fixera la valeur selon qu''elle est bonne ou mauvaise ; on s''en tiendra à la valeur que fixera le prêtre. '
  '15':
  - type: note
    content: 'au prix fixé  : litt. à l''argent (aussi v. 18) de la valeur fixée (v. 2+) ; de même au v. 19.'
  - type: text
    content: Si celui qui a consacré sa maison veut la reprendre, il ajoutera un cinquième au prix fixé, et elle lui appartiendra.
  '16':
  - type: text
    content: 'Si quelqu''un consacre au '
  - type: text
    content: Seigneur
  - type: text
    content: ' un champ de sa propriété, la valeur fixée sera en rapport avec la quantité de semence, cinquante sicles d''argent pour un homer de semence d''orge. '
  '17':
  - type: text
    content: 'Si c''est dès l''année du jubilé qu''il consacre son champ, on s''en tiendra à la valeur fixée ; '
  '18':
  - type: note
    content: 'le prix  : litt. l''argent, de même dans la suite.'
  - type: text
    content: 'si c''est après le jubilé qu''il consacre son champ, le prêtre en calculera le prix à raison du nombre d''années qui restent jusqu''à l''année du jubilé, et on fera une déduction sur la valeur fixée. '
  '19':
  - type: text
    content: 'Si celui qui a consacré son champ veut le reprendre, il ajoutera un cinquième au prix fixé, et le champ lui restera. '
  '2':
  - type: note
    content: 'veut s''acquitter…  : voir Nb 6.2n. Sur les vœux (7.16+ ; Nb 30 ; Dt 23.22-24) engageant des êtres (le mot peut s''appliquer aux animaux comme aux humains, cf. Gn 1.20n), voir Nb 6 ; Jg 11.30s,39 ; 1S 1.11. –  la valeur fixée 5.15n  ; ici le tarif indique les conditions d''un éventuel rachat des personnes consacrées par un vœu.'
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Si quelqu''un veut s''acquitter d''un vœu, il le fera d''après la valeur fixée pour les êtres voués au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'S''il ne reprend pas le champ et qu''on le vende à quelqu''un d''autre, on ne pourra plus le reprendre. '
  '21':
  - type: note
    content: 'Quand il sera dégagé  : litt. quand il sortira. –  frappé d''anathème  : dans ce contexte, irrévocablement voué à Dieu et exclu de l''usage profane ; cf. v. 28s ; Ex 22.19 ; Nb 18.14 ; Dt 2.34n.'
  - type: text
    content: 'Quand il sera dégagé, au jubilé, ce champ sera sacré pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' comme un champ qui a été frappé d''anathème : il deviendra la propriété du prêtre. '
  '22':
  - type: text
    content: 'Si quelqu''un consacre au '
  - type: text
    content: Seigneur
  - type: text
    content: ' un champ qu''il a acheté et qui ne fait pas partie des champs de sa propriété, '
  '23':
  - type: note
    content: 'le propriétaire paiera  : litt. il paiera.'
  - type: text
    content: 'le prêtre calculera le montant de la valeur fixée jusqu''à l''année du jubilé ; le propriétaire paiera la valeur fixée le jour même ; c''est une chose consacrée au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '24':
  - type: note
    content: 25.10.
  - type: text
    content: 'L''année du jubilé, le champ reviendra à celui à qui il avait été acheté et qui avait la propriété du terrain. '
  '25':
  - type: note
    content: V. 2 ; 5.15+ ; Nb 3.47 ; Ez 45.12.
  - type: text
    content: 'Toutes les valeurs seront fixées en sicles du sanctuaire : le sicle est de vingt guéras.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'appartient déjà au Seigneur en sa qualité de premier-né  : litt. est né-en-premier pour le Seigneur  ; cf. Ex 13.1s,11-16 ; 22.28s.'
  - type: text
    content: 'Personne ne pourra consacrer le premier-né de ses bêtes, lequel appartient déjà au '
  - type: text
    content: Seigneur
  - type: text
    content: ' en sa qualité de premier-né ; soit bovin, soit mouton ou chèvre, il appartient au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '27':
  - type: note
    content: 'on la dégagera  : le verbe hébreu ainsi traduit est aussi rendu par libérer.'
  - type: text
    content: S'il s'agit d'une bête impure, on la dégagera pour la valeur fixée, en y ajoutant un cinquième ; si elle n'est pas reprise, elle sera vendue pour la valeur fixée.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'frappé d''anathème v. 21n,29. –  une chose très sacrée  : cf. 2.3+ ; Ex 29.37n  ; Nb 4.4n  ; 18.10n.'
  - type: text
    content: 'Tout ce qu''un homme frappera d''anathème pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', parmi ce qui lui appartient, ne pourra être ni vendu ni repris, que ce soit un être humain, une bête, ou un champ de sa propriété ; tout ce qui est frappé d''anathème est une chose très sacrée pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Aucun être humain frappé d''anathème ne pourra être dégagé : il sera mis à mort.'
  '3':
  - type: note
    content: 'homme  : le même mot (litt. mâle) est traduit par garçon aux v. 5s ; de même au v. 7. –  sicle du sanctuaire 5.15n.'
  - type: text
    content: 'Pour un homme de vingt à soixante ans, la valeur fixée est de cinquante sicles d''argent, selon le sicle du sanctuaire ; '
  '30':
  - type: text
    content: ' '
  - type: note
    content: dîme Nb 18.21 ; Dt 14.22-29 ; cf. Mt 23.23.
  - type: text
    content: 'Toute dîme de la terre, soit des semences de la terre, soit du fruit des arbres, appartient au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; c''est une chose consacrée au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Si quelqu''un veut reprendre quelque chose de sa dîme, il y ajoutera un cinquième ; '
  '32':
  - type: note
    content: 'sous la houlette  : cette indication est traditionnellement comprise de la méthode utilisée pour désigner sans fraude les animaux destinés à la dîme ; elle aurait consisté à faire défiler le troupeau en file indienne et à marquer une bête sur dix avec une baguette colorée ; cf. Jr 33.13 ; Ez 20.37n.'
  - type: text
    content: 'pour toute dîme de gros bétail et de petit bétail, pour tout ce qui passe sous la houlette, le dixième sera chose consacrée au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '33':
  - type: note
    content: 'V. 10. –  On ne cherchera pas…  : cf. 13.36.'
  - type: text
    content: On ne cherchera pas à savoir si l'animal est bon ou mauvais, on ne le remplacera pas ; si l'on remplace un animal par un autre, l'un et l'autre seront consacrés et ne pourront être repris.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'donna  : litt. ordonna ou institua  ; le verbe est apparenté au mot traduit par commandements  ; cf. Nb 36.13.'
  - type: text
    content: 'Tels sont les commandements que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donna à Moïse, pour les Israélites, au mont Sinaï.'
  '4':
  - type: note
    content: 'femme  : le même mot (litt. femelle) est traduit par fille aux v. 5s ; de même au v. 7.'
  - type: text
    content: 'si c''est une femme, la valeur fixée est de trente sicles. '
  '5':
  - type: text
    content: 'De cinq à vingt ans, la valeur fixée est de vingt sicles pour un garçon et de dix sicles pour une fille. '
  '6':
  - type: text
    content: 'D''un mois à cinq ans, la valeur fixée est de cinq sicles d''argent pour un garçon et de trois sicles d''argent pour une fille. '
  '7':
  - type: text
    content: 'Depuis l''âge de soixante ans et au-dessus, la valeur fixée est de quinze sicles pour un homme et de dix sicles pour une femme. '
  '8':
  - type: note
    content: 5.11n. – Voir prêtre.
  - type: text
    content: Si celui qui a fait le vœu est trop pauvre pour payer la valeur fixée, on le placera devant le prêtre, et le prêtre en fixera la valeur. C'est en rapport avec les ressources de celui qui a fait le vœu que le prêtre en fixera la valeur.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'consacré ou chose sacrée  : cf. v. 10,14,23,30.'
  - type: text
    content: 'S''il s''agit d''une bête qui peut être offerte en présent au '
  - type: text
    content: Seigneur
  - type: text
    content: ', tout ce qu''on en donnera au '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera consacré. '
