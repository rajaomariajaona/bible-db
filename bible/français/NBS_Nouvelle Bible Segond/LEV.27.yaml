document_id: LEV.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Complément : tarif pour les vœux'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: veut s'acquitter…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir Nb 6.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Sur les '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: vœux
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(7.16+ ; Nb 30 ; Dt 23.22-24) engageant des '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'êtres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (le mot peut s'appliquer aux animaux comme aux humains, cf. Gn 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), voir Nb 6 ; Jg 11.30s,39 ; 1S 1.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la valeur fixée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; ici le tarif indique les conditions d''un éventuel rachat des personnes consacrées par un vœu.'
    marker-yv: yv-n
  - type: text
    text: 'Parle aux Israélites ; tu leur diras : Si quelqu''un veut s''acquitter d''un vœu, il le fera d''après la valeur fixée pour les êtres voués au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: homme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot (litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mâle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'garçon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'aux v. 5s ; de même au v. 7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sicle du sanctuaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Pour un homme de vingt à soixante ans, la valeur fixée est de cinquante sicles d''argent, selon le sicle du sanctuaire ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: femme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot (litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: femelle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aux v. 5s ; de même au v. 7.
    marker-yv: yv-n
  - type: text
    text: 'si c''est une femme, la valeur fixée est de trente sicles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'De cinq à vingt ans, la valeur fixée est de vingt sicles pour un garçon et de dix sicles pour une fille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'D''un mois à cinq ans, la valeur fixée est de cinq sicles d''argent pour un garçon et de trois sicles d''argent pour une fille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Depuis l''âge de soixante ans et au-dessus, la valeur fixée est de quinze sicles pour un homme et de dix sicles pour une femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Si celui qui a fait le vœu est trop pauvre pour payer la valeur fixée, on le placera devant le prêtre, et le prêtre en fixera la valeur. C'est en rapport avec les ressources de celui qui a fait le vœu que le prêtre en fixera la valeur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'consacré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chose sacrée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 10,14,23,30.'
    marker-yv: yv-n
  - type: text
    text: 'S''il s''agit d''une bête qui peut être offerte en présent au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', tout ce qu''on en donnera au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' sera consacré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 33.
    marker-yv: yv-n
  - type: text
    text: 'On ne la changera pas, on ne remplacera pas une bonne par une mauvaise ni une mauvaise par une bonne ; si l''on remplace une bête par une autre, l''une et l''autre seront consacrées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bête impure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.4ss ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: ', impur.'
    marker-yv: yv-n
  - type: text
    text: 'S''il s''agit d''une bête impure qui ne peut pas être offerte en présent au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', quelle qu''elle soit, on placera la bête devant le prêtre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'le prêtre en fixera la valeur selon qu''elle est bonne ou mauvaise ; on s''en rapportera à la valeur fixée par le prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'reprendre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'racheter, assurer sa '
      - type: usfm
        marker: w
        children:
        - type: text
          text: rédemption
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 25.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; de même aux v. 15,19s,27s,31,33.'
    marker-yv: yv-n
  - type: text
    text: Si on veut la reprendre, on ajoutera un cinquième à la valeur fixée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si quelqu''un consacre sa maison, s''il en fait une chose consacrée au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le prêtre en fixera la valeur selon qu''elle est bonne ou mauvaise ; on s''en tiendra à la valeur que fixera le prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au prix fixé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à l''argent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(aussi v. 18) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de la valeur fixée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 2+) ; de même au v. 19.
    marker-yv: yv-n
  - type: text
    text: Si celui qui a consacré sa maison veut la reprendre, il ajoutera un cinquième au prix fixé, et elle lui appartiendra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si quelqu''un consacre au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' un champ de sa propriété, la valeur fixée sera en rapport avec la quantité de semence, cinquante sicles d''argent pour un homer de semence d''orge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si c''est dès l''année du jubilé qu''il consacre son champ, on s''en tiendra à la valeur fixée ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le prix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'argent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite.'
    marker-yv: yv-n
  - type: text
    text: 'si c''est après le jubilé qu''il consacre son champ, le prêtre en calculera le prix à raison du nombre d''années qui restent jusqu''à l''année du jubilé, et on fera une déduction sur la valeur fixée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si celui qui a consacré son champ veut le reprendre, il ajoutera un cinquième au prix fixé, et le champ lui restera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'S''il ne reprend pas le champ et qu''on le vende à quelqu''un d''autre, on ne pourra plus le reprendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Quand il sera dégagé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand il sortira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: frappé d'anathème
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans ce contexte, irrévocablement voué à Dieu et exclu de l''usage profane ; cf. v. 28s ; Ex 22.19 ; Nb 18.14 ; Dt 2.34'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand il sera dégagé, au jubilé, ce champ sera sacré pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' comme un champ qui a été frappé d''anathème : il deviendra la propriété du prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si quelqu''un consacre au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' un champ qu''il a acheté et qui ne fait pas partie des champs de sa propriété, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le propriétaire paiera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il paiera.
    marker-yv: yv-n
  - type: text
    text: 'le prêtre calculera le montant de la valeur fixée jusqu''à l''année du jubilé ; le propriétaire paiera la valeur fixée le jour même ; c''est une chose consacrée au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 25.10.
    marker-yv: yv-n
  - type: text
    text: 'L''année du jubilé, le champ reviendra à celui à qui il avait été acheté et qui avait la propriété du terrain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 2 ; 5.15+ ; Nb 3.47 ; Ez 45.12.
    marker-yv: yv-n
  - type: text
    text: 'Toutes les valeurs seront fixées en sicles du sanctuaire : le sicle est de vingt guéras.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'appartient déjà au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' en sa qualité de premier-né'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'est né-en-premier pour le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Ex 13.1s,11-16 ; 22.28s.
    marker-yv: yv-n
  - type: text
    text: 'Personne ne pourra consacrer le premier-né de ses bêtes, lequel appartient déjà au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' en sa qualité de premier-né ; soit bovin, soit mouton ou chèvre, il appartient au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on la dégagera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu ainsi traduit est aussi rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: libérer.
    marker-yv: yv-n
  - type: text
    text: S'il s'agit d'une bête impure, on la dégagera pour la valeur fixée, en y ajoutant un cinquième ; si elle n'est pas reprise, elle sera vendue pour la valeur fixée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'frappé d''anathème '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une chose très sacrée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2.3+ ; Ex 29.37'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 4.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 18.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout ce qu''un homme frappera d''anathème pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', parmi ce qui lui appartient, ne pourra être ni vendu ni repris, que ce soit un être humain, une bête, ou un champ de sa propriété ; tout ce qui est frappé d''anathème est une chose très sacrée pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Aucun être humain frappé d''anathème ne pourra être dégagé : il sera mis à mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dîme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 18.21 ; Dt 14.22-29 ; cf. Mt 23.23.
    marker-yv: yv-n
  - type: text
    text: 'Toute dîme de la terre, soit des semences de la terre, soit du fruit des arbres, appartient au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; c''est une chose consacrée au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Si quelqu''un veut reprendre quelque chose de sa dîme, il y ajoutera un cinquième ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sous la houlette
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette indication est traditionnellement comprise de la méthode utilisée pour désigner sans fraude les animaux destinés à la dîme ; elle aurait consisté à faire défiler le troupeau en file indienne et à marquer une bête sur dix avec une baguette colorée ; cf. Jr 33.13 ; Ez 20.37'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'pour toute dîme de gros bétail et de petit bétail, pour tout ce qui passe sous la houlette, le dixième sera chose consacrée au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On ne cherchera pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 13.36.'
    marker-yv: yv-n
  - type: text
    text: On ne cherchera pas à savoir si l'animal est bon ou mauvais, on ne le remplacera pas ; si l'on remplace un animal par un autre, l'un et l'autre seront consacrés et ne pourront être repris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: donna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ordonna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: institua
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le verbe est apparenté au mot traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: commandements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Nb 36.13.
    marker-yv: yv-n
  - type: text
    text: 'Tels sont les commandements que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' donna à Moïse, pour les Israélites, au mont Sinaï.'
