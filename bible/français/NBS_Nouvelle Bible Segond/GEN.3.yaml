document_id: GEN.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Chassés du jardin d'Eden
  - type: text
    content: ' '
  - type: note
    content: 'Le serpent a souvent été considéré comme un être magique, ayant pouvoir sur la vie et la mort, à cause de sa capacité de produire du venin et de changer de peau ; cf. Nb 21 ; 2R 18.4 ; 2Co 11.3 ; Ap 12.9 ; 20.2 ; voir aussi Mt 4.1-11/ /; 6.13 ; Jn 8.44 ; Jc 1.13-15 ; Siracide 21.2 : « Comme devant un serpent, fuis devant le péché, car, si tu t''en approches, il te mordra. » –  avisé ou rusé  : le mot hébreu ( ‘aroum ) rappelle celui qui vient d''être traduit par nus ( ‘aroummim , 2.25). Il est souvent opposé à naïf (Pr 14.15,18 ; 22.3 ; 27.12 etc. ; cf. Jb 5.12 ; 15.5) ; LXX l''a rendu par un mot habituellement positif, qui est également traduit par avisé en Mt 10.16. –  animaux de la campagne v. 14n  ; 2.19s. –  Vous ne mangerez pas…  : l''hébreu, ambigu, peut aussi bien signifier vous ne mangerez d''aucun arbre… (cf. v. 2s ; 2.16s).'
  - type: text
    content: 'Le serpent était le plus avisé de tous les animaux de la campagne que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu avait faits. Il dit à la femme : Dieu a-t-il réellement dit : « Vous ne mangerez pas de tous les arbres du jardin ! » '
  '10':
  - type: note
    content: 'Je t''ai entendu  : litt. j''ai entendu ta voix ou le bruit de tes pas v. 8n. –  peur  : voir crainte.'
  - type: text
    content: 'Il répondit : Je t''ai entendu dans le jardin et j''ai eu peur, parce que j''étais nu ; je me suis donc caché. '
  '11':
  - type: note
    content: 'Il reprit  : il s''agit de Dieu.'
  - type: text
    content: 'Il reprit : Qui t''a dit que tu étais nu ? Aurais-tu mangé de l''arbre dont je t''avais défendu de manger ? '
  '12':
  - type: note
    content: auprès de moi ou avec moi, cf. v. 6n.
  - type: text
    content: 'L''homme répondit : C''est la femme que tu as mise auprès de moi qui m''a donné de l''arbre, et j''ai mangé. '
  '13':
  - type: note
    content: 'trompée  : le verbe hébreu fait assonance avec les mots traduits par femme et serpent  ; cf. Jr 29.8 ; 49.16 ; 1Tm 2.14.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu dit à la femme : Pourquoi as-tu fait cela ? La femme répondit : C''est le serpent qui m''a trompée, et j''ai mangé. '
  '14':
  - type: note
    content: 'maudit  : hébreu ’arour  ; le mot rappelle celui qui a été traduit par avisé au v. 1n  ; voir aussi v. 17 ; 4.11 ; 9.25 ; 12.3 ; 27.29 ; 49.7 ; cf. Ap 22.3 ; voir bénédiction. –  toutes les bêtes (ou tout le bétail) / tous les animaux de la campagne (ou tous les animaux sauvages) : cf. 1.24n  ; Lv 26.22n. –  tu te déplaceras  : litt. tu marcheras. –  sur ton ventre Lv 11.42. –  poussière  : cf. v. 19 ; Es 65.25 ; Mi 7.17.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu dit au serpent :'
  - type: text
    content: Puisque tu as fait cela,
  - type: text
    content: tu seras maudit entre toutes les bêtes
  - type: text
    content: et tous les animaux de la campagne,
  - type: text
    content: tu te déplaceras sur ton ventre
  - type: text
    content: et tu mangeras de la poussière
  - type: text
    content: tous les jours de ta vie.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'hostilité  : le terme hébreu est dérivé du mot traduit par ennemi , cf. Nb 35.21s ; Ez 25.15 ; 35.5. –  ta descendance / sa descendance  : litt. ta semence / sa semence  ; autre traduction ta progéniture / sa progéniture . Le terme hébreu zéra‘ , au singulier, est le plus souvent employé dans un sens collectif ; on pourrait aussi bien traduire tes descendants / ses descendants (ainsi en 12.7 ; 13.15s ; 22.17s etc.) ; cf. 9.9 ; 12.7 ; voir aussi Esd 9.2 ; Mt 3.7/ / ; Jn 8.44. –  celle-ci ( sa descendance ) t''écrasera ou ils ( ses descendants ) t''écraseront… LXX a traduit par un masculin, il t''écrasera , Vg par un féminin  : elle (= la femme) t''écrasera  ; c''est le même verbe qui est traduit plus loin par mordras (également en Ps 139.11 submerger  ; Jb 9.17 assaillir ). Certains s''efforcent de rendre la répétition de l''hébreu en utilisant ici, dans les deux cas, un même verbe français, meurtrir ou viser p. ex. –  talon  : cf. 25.26 ; 49.17,19 ; la racine hébraïque correspondant à ce mot suggère parfois l''idée de réciprocité. – A partir d''Irénée (IIe s. apr. J.-C.), l''Eglise ancienne a vu dans ce texte, qu''elle a qualifié de « Protévangile », une allusion au Christ ; cf. Lc 10.19 ; Rm 16.20 ; Ap 12.'
  - type: text
    content: Je mettrai de l'hostilité entre toi et la femme,
  - type: text
    content: 'entre ta descendance et sa descendance :'
  - type: text
    content: celle-ci t'écrasera la tête,
  - type: text
    content: et tu lui mordras le talon.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Je multiplierai…  : cf. 1.28. –  la peine…  : litt. ta peine (terme apparenté dans la suite) et ta grossesse . –  Ton désir… 4.7 ; Ct 7.11n. –  dominera 1.16n  ; 4.7 ; cf. 1Tm 2.14s ; Tt 2.5 ; 1P 3.1-6.'
  - type: text
    content: 'A la femme, il dit :'
  - type: text
    content: Je multiplierai la peine de tes grossesses.
  - type: text
    content: C'est dans la peine que tu mettras des fils au monde.
  - type: text
    content: Ton désir se portera vers ton mari,
  - type: text
    content: et lui, il te dominera.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'écouté  : litt. écouté la voix de , cf. v. 8n,10 ; 21.12. –  terre  : hébreu ’adama , 2.5n. –  maudite v. 14n. –  à cause de toi  : cf. Os 4.3+.'
  - type: text
    content: 'A l''homme, il dit : Puisque tu as écouté ta femme et que tu as mangé de l''arbre dont je t''avais défendu de manger,'
  - type: text
    content: la terre sera maudite à cause de toi ;
  - type: text
    content: c'est avec peine que tu en tireras ta nourriture
  - type: text
    content: tous les jours de ta vie.
  '18':
  - type: text
    content: ' '
  - type: note
    content: épines / chardons Os 10.8.
  - type: text
    content: Elle fera pousser pour toi des épines et des chardons,
  - type: text
    content: et tu mangeras l'herbe de la campagne.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'visage  : le même mot est traduit par narines en 2.7. –  pain  : cf. 1.29 ; 2.9,16 ; 14.18. Le terme hébreu désigne souvent la nourriture en général (cf. 37.25n), de sorte qu''on pourrait aussi traduire, plus simplement, que tu mangeras . –  terre  : hébreu ’adama , 2.5n. –  poussière v. 14 ; 2.7 ; 18.27 ; Ps 104.29 ; Jb 34.15 ; Ec 3.20 ; 12.7 ; sur l''ensemble, cf. Jb 1.21.'
  - type: text
    content: C'est à la sueur de ton visage que tu mangeras du pain,
  - type: text
    content: jusqu'à ce que tu retournes à la terre,
  - type: text
    content: puisque c'est d'elle que tu as été pris ;
  - type: text
    content: car tu es poussière,
  - type: text
    content: et tu retourneras à la poussière.
  '2':
  - type: note
    content: 'Nous pouvons manger  : autre traduction nous mangeons.'
  - type: text
    content: 'La femme dit au serpent : Nous pouvons manger du fruit des arbres du jardin. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Eve ou Vivante, porteuse de vie , en hébreu Hawwa , nom apparenté à la racine signifiant vivre et qui fait assonance avec le terme traduit par vivants  ; LXX a traduit Zoé , du mot grec qui signifie vie . – Lorsque le texte hébreu joue explicitement sur un sens attribué à un nom propre, ce sens est indiqué entre parenthèses dans la traduction (qu'il s'agisse de l'origine réelle du nom, d'une étymologie populaire ou d'un simple jeu d'assonance).
  - type: text
    content: 'L''homme appela sa femme du nom d''Eve (« Vivante »), car elle est devenue la mère de tous les vivants. '
  '21':
  - type: note
    content: 'habits  : le même mot est traduit par tunique en 37.3,23,31ss ; Ex 28.4,39ss etc. –  peau  : cf. 27.16.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu fit à l''homme et à sa femme des habits de peau, dont il les revêtit.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'l''un de nous  : cf. 1.1n,26n  ; voir aussi 11.7 ; 2S 24.14 ; 1R 22.19ss ; Es 6.8 ; Ps 82.1ss ; Jb 1.6ss. –  connaissance… / arbre de la vie 2.9n. –  toujours ou éternellement.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu dit : L''homme est devenu comme l''un de nous pour la connaissance de ce qui est bon ou mauvais. Que maintenant il ne tende pas la main pour prendre aussi de l''arbre de la vie, en manger et vivre toujours ! '
  '23':
  - type: note
    content: 'Eden 2.8n. –  terre  : hébreu ’adama 2.5nss.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu le renvoya du jardin d''Eden, pour qu''il cultive la terre d''où il avait été pris. '
  '24':
  - type: note
    content: 'il posta  : litt. il fit demeurer. –  à l''est  : cf. 2.8n. –  keroubim  : ce terme hébreu (pluriel de keroub) a donné notre mot chérubin, mais il évoque une image très différente de celle que nous lui associons spontanément (anges à visage d''enfant) ; il semble correspondre au terme akkadien karibou, qui désignait les gardiens des temples, des êtres représentés par une combinaison de traits humains et animaux à l''instar des sphinx égyptiens ; ils exerçaient sans doute aussi une fonction d''intercesseurs (voir illustration ♦) ; cf. Ex 25.18n  ; Ez 1.10s ; 9.3 ; 10.1ss,14nss ; 28.14-16 ; Ps 18.11+. –  l''épée (Es 34.5 ; Jr 46.10 ; 47.6 ; Ez 21.20 ; So 2.12) flamboyante  : litt. la flamme de l''épée  ; cf. Ps 104.4 ; Jb 39.23. –  qui tournoie Jb 37.12.'
  - type: text
    content: Après avoir chassé l'homme, il posta, à l'est du jardin d'Eden, les keroubim et l'épée flamboyante qui tournoie, pour garder le chemin de l'arbre de la vie.
  '3':
  - type: note
    content: 'au milieu du jardin  : cf. 2.9.'
  - type: text
    content: 'Mais quant au fruit de l''arbre qui est au milieu du jardin, Dieu a dit : « Vous n''en mangerez pas, vous n''y toucherez pas, sinon vous mourrez ! » '
  '4':
  - type: note
    content: 'Pas du tout…  : LXX a rendu littéralement la tournure intensive de l''hébreu  : de mort vous ne mourrez pas  ; cf. 2.17n  ; Jr 14.13.'
  - type: text
    content: 'Alors le serpent dit à la femme : Pas du tout ! Vous ne mourrez pas ! '
  '5':
  - type: note
    content: 'le jour où…  : cf. 2.17. –  yeux s''ouvriront v. 7. –  comme des dieux  : autre traduction comme Dieu, voir v. 22 ; 1.1n  ; 11.4 ; Es 14.13 ; Ez 28.2n  ; 2Th 2.4. –  qui connaissent… 2.9n.'
  - type: text
    content: 'Dieu le sait : le jour où vous en mangerez, vos yeux s''ouvriront et vous serez comme des dieux qui connaissent ce qui est bon ou mauvais. '
  '6':
  - type: note
    content: 'Cf. Ex 20.17 ; Rm 7.7ss ; 2Co 11.3 ; 1Jn 2.15-17. –  bon pour la nourriture… 2.9. –  désirable  : le même terme a été traduit par agréable en 2.9. –  discernement Pr 10.5,19 ; 14.35 ; 15.24 etc. –  son mari…  : litt. son homme (aussi v. 16) avec elle v. 12 ; 2.24 ; Rm 5.12-17 ; 1Tm 2.14.'
  - type: text
    content: 'La femme vit que l''arbre était bon pour la nourriture et plaisant pour la vue, qu''il était, cet arbre, désirable pour le discernement. Elle prit de son fruit et en mangea ; elle en donna aussi à son mari qui était avec elle, et il en mangea. '
  '7':
  - type: note
    content: 'surent ou connurent  : cf. v. 5. –  nus 2.25n. –  pagnes  : le même mot hébreu désigne une ceinture en 2S 18.11 ; 1R 2.5 ; Es 3.24 ; cf. 32.11 ; Pr 31.17,22 ; voir aussi Ex 25.7n  ; Jb 38.3.'
  - type: text
    content: Leurs yeux à tous les deux s'ouvrirent, et ils surent qu'ils étaient nus. Ils cousirent des feuilles de figuier pour se faire des pagnes.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur  : litt. la voix de YHWH , cf. Ex 29.8n  ; Ps 29.3s ; mais comme le mot qui correspond à voix peut aussi signifier bruit , on peut également comprendre le bruit (des pas) du Seigneur (cf. 2S 5.24 ; 1R 14.6 ; 2R 6.32). –  qui parcourait…  : autre traduction qui se promenait dans le jardin  ; cf. Dt 23.15n  ; 2S 7.6n. –  avec la brise du soir  : litt. au souffle (ou au vent , voir esprit) du jour (cf. 1.2n,5 ; Ct 2.17 ; 4.6). –  allèrent se cacher  : cf. Jb 13.16. –  pour ne pas être vus…  : litt. de devant le Seigneur Dieu.'
  - type: text
    content: 'Alors ils entendirent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu qui parcourait le jardin avec la brise du soir. L''homme et sa femme allèrent se cacher parmi les arbres du jardin pour ne pas être vus par le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu. '
  '9':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu appela l''homme ; il lui dit : Où es-tu ? '
