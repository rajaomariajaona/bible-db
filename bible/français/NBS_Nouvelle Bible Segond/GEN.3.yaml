        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.2 : « Comme devant un serpent, fuis devant le péché, car, si tu t''en approches, il te mordra. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
