      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le serpent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a souvent été considéré comme un être magique, ayant pouvoir sur la vie et la mort, à cause de sa capacité de produire du venin et de changer de peau ; cf. Nb 21 ; 2R 18.4 ; 2Co 11.3 ; Ap 12.9 ; 20.2 ; voir aussi Mt 4.1-11/ /; 6.13 ; Jn 8.44 ; Jc 1.13-15 ; '
