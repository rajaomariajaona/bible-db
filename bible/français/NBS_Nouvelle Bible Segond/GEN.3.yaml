          text: v. 14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2.19s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous ne mangerez pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''hébreu, ambigu, peut aussi bien signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vous ne mangerez d''aucun arbre… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 2s ; 2.16s).
      marker-yv: yv-n
    - type: text
      text: 'Le serpent était le plus avisé de tous les animaux de la campagne que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu avait faits. Il dit à la femme : Dieu a-t-il réellement dit : « Vous ne mangerez pas de tous les arbres du jardin ! » '
