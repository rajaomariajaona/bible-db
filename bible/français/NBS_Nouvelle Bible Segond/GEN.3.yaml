    - type: text
      text: 'Il répondit : Je t''ai entendu dans le jardin et j''ai eu peur, parce que j''étais nu ; je me suis donc caché. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il reprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit de Dieu.'
      marker-yv: yv-n
    - type: text
      text: 'Il reprit : Qui t''a dit que tu étais nu ? Aurais-tu mangé de l''arbre dont je t''avais défendu de manger ? '
