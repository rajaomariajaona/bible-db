document_id: PSA.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: LIVRE PREMIER
  - type: heading
    content: Le vrai bonheur
  - type: text
    content: ' '
  - type: note
    content: 'Heureux 2.12 ; 32.1s ; 33.12 ; 34.9 ; 40.5 ; 41.2 ; 84.5s,13 ; 94.12 ; 106.3 ; 112.1 ; 119.1s ; 127.5 ; 128.1 ; 137.8 ; 144.15 ; 146.5 ; 1R 10.8 ; Es 30.18 ; 32.20 ; 56.2 ; Jb 5.17 ; Pr 3.13 ; 8.32,34 ; 14.21 ; 16.20 ; 29.18 ; Ec 10.17 ; Dn 12.12 ; Mt 5.3ss. –  suit (litt. marche… dans ou selon  ; cf. 119.1) / s''arrête (autre traduction se tient ) / s''assied  : on pourrait aussi traduire au passé  : qui n''a pas marché / qui ne s''est pas arrêté / qui ne s''est pas assis  ; cf. 26.4s ; 28.3 ; Jr 15.17. –  ne suit pas les projets  : autre traduction selon les conseils. – Voir péché. –  insolents ou moqueurs  ; Pr 1.22 ; 21.24 ; LXX a traduit pestes , de même en Pr 22.10 ; 29.8 ; sur le terme grec correspondant, cf. Ac 24.5.'
  - type: text
    content: Heureux l'homme
  - type: text
    content: qui ne suit pas les projets des méchants,
  - type: text
    content: qui ne s'arrête pas sur le chemin des pécheurs,
  - type: text
    content: et qui ne s'assied pas parmi les insolents,
  '2':
  - type: text
    content: ' '
  - type: note
    content: la loi du Seigneur 19.8ss ; cf. 119.18,70. –  redit ou relit, récite, médite  ; le verbe signifie murmurer, répéter à mi-voix ; cf. 2.1n  ; 35.28 ; 63.7 ; 77.13 ; Jos 1.8 ; Pr 15.28n  ; voir aussi Ac 8.28-30. –  jour et nuit 35.28 ; cf. Dt 17.19 ; Jos 1.7s.
  - type: text
    content: 'mais qui trouve son plaisir dans la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et qui redit sa loi jour et nuit !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'comme un arbre 92.13-15 ; Nb 24.6 ; Jr 17.8 ; Ez 47.12. –  des canaux d''irrigation  : cf. 46.5 ; 65.10 ; 119.136 (même terme pour torrents ) ; Pr 21.1n. –  tout ce qu''il fait lui réussit  : litt. il fait réussir tout ce qu''il fait  ; 37.4 ; Gn 39.2 ; Jos 1.8.'
  - type: text
    content: Il est comme un arbre
  - type: text
    content: planté près des canaux d'irrigation,
  - type: text
    content: qui donne son fruit en son temps,
  - type: text
    content: 'et dont le feuillage ne se flétrit pas :'
  - type: text
    content: tout ce qu'il fait lui réussit.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'la paille ou la balle , c''est-à-dire l''enveloppe du grain qui s''envole au moment du vannage ; 35.5 ; Es 17.13n  ; 29.5 ; Jr 15.7n  ; Jb 21.18 ; Mt 3.12+. –  emporte  : le verbe hébreu correspondant est traduit par dissiper en 68.3 ; cf. Lv 26.36 ; Jb 13.25.'
  - type: text
    content: 'Il n''en est pas ainsi des méchants :'
  - type: text
    content: ils sont comme la paille que le vent emporte.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ne se tiendront pas debout  : litt. ne se lèveront pas ou ne se lèvent pas  ; cf. 37.18 ; Os 14.10 ; Mt 13.49. Le jugement en question a pu être interprété comme une intervention divine exceptionnelle, voire ultime (le « jugement dernier ») ; on y a aussi vu le cours naturel des événements, considéré comme l''œuvre de la providence divine ; on peut encore y discerner une allusion à un rituel du temple (cf. 24.3ss). –  la communauté des justes  : cf. Ez 23.45s.'
  - type: text
    content: C'est pourquoi les méchants ne se tiendront pas debout au jugement,
  - type: text
    content: ni les pécheurs dans la communauté des justes.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur connaît 31.8 ; 37.18 ; 139.1-6,15ss,23 ; Jb 23.10. –  se perd  : le verbe hébreu signifie aussi périr  ; cf. 2.12 ; Jr 21.8 ; Pr 4.18s ; Mt 7.13s.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' connaît la voie des justes,'
  - type: text
    content: mais la voie des méchants se perd.
