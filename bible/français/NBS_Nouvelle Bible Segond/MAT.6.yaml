        text: '47 : « Il est impossible pour un homme de monter en même temps deux chevaux ou de bander deux arcs ; et il est impossible pour un serviteur de servir deux maîtres, autrement il honorera l''un et offensera l''autre… » (suit l''image du vin nouveau et des vieilles outres, cf. 9.16 ; Lc 5.39'
