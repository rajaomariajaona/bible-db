      - type: text
        text: 'profanation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Es 32.6). Le mot correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'hypocrisie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'désigne en '
