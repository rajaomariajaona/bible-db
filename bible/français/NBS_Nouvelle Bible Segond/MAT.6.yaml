    marker-yv: yv-n
  - type: text
    text: 'Quand donc tu fais un acte de compassion, ne sonne pas de la trompette devant toi, comme les hypocrites le font dans les synagogues et dans les rues, afin d''être glorifiés par les gens. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen,
  - type: text
    text: ' je vous le dis, ils tiennent là leur récompense. '
