document_id: MAT.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La manière de donner
  - type: text
    content: ' '
  - type: note
    content: 'pratiquer  : litt. faire . – Le mot justice désigne ici la pratique des œuvres religieuses chez les Juifs : l''aumône, la prière, le jeûne. Cf. v. 5,16 ; 5.20 ; 23.5 ; Lc 16.15 ; Jn 5.44 ; voir aussi Dn 4.24n. Evangile selon Thomas 6 : « Ses disciples l''interrogèrent et lui dirent : “Veux-tu que nous jeûnions ? Et comment prierons-nous ? Donnerons-nous l''aumône ? Et pour ce qui concerne la nourriture, quelles normes observerons-nous ?” Jésus dit : “Ne dites pas de mensonges, et ne faites pas ce que vous haïssez, puisque tout est dévoilé devant le ciel. Car il n''y a rien de caché qui ne sera manifesté et rien de couvert qui restera sans être dévoilé.” » –  vous n''aurez pas… 5.46n.'
  - type: text
    content: 'Gardez-vous de pratiquer votre justice devant les gens, pour être vus par eux, autrement vous n''aurez pas de récompense auprès de votre Père qui est dans les cieux. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: règne ou royaume 3.2n  ; Lc 17.20 ; Ac 1.3,6 ; Rm 14.17. –  volonté 7.21 ; 12.50 ; 26.42/ /.
  - type: text
    content: que ton règne vienne,
  - type: text
    content: que ta volonté advienne
  - type: text
    content: – sur la terre comme au ciel.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'notre pain pour ce jour  : autres traductions notre pain de demain (cf. v. 34) ou, selon certains, du jour (dernier) qui vient  ; ou encore le pain dont nous avons besoin  ; cf. Ex 16.4n  ; Pr 30.8 ; Jn 6.32.'
  - type: text
    content: Donne-nous, aujourd'hui, notre pain pour ce jour ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'remets-nous nos dettes , c.-à-d. pardonne-nous nos fautes (voir péché) v. 14s ; 18.21-35. Cf. Siracide 28.2 : « Pardonne à ton prochain l''injustice commise ; alors, quand tu prieras, tes péchés seront remis. »'
  - type: text
    content: remets-nous nos dettes,
  - type: text
    content: comme nous aussi nous l'avons fait pour nos débiteurs ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'dans l''épreuve ou en tentation , cf. 4.1n  ; autre traduction  : ne nous conduis pas à l''épreuve  ; certains comprennent ne nous laisse pas emporter vers la tentation ou fais que nous n''entrions pas en tentation , 26.41/ / ; 2P 2.9 ; cf. Ex 16.4 ; Dt 8.2,16 ; 13.4 ; 33.8 ; Jg 2.22 ; voir aussi Ac 20.19 ; Jc 1.12ss ; Ap 2.10. –  Mauvais ou mal  : cf. 5.37 ; 13.19,38 ; Lc 22.31s ; Jn 17.15+ ; 2Th 3.3 ; 2Tm 4.18. – Quelques mss tardifs ajoutent à la fin du v.  : Car c''est à toi qu''appartiennent le règne (ou le royaume ) , la puissance et la gloire pour toujours. Amen  ; cf. 1Ch 29.11-13 ; 1Co 14.16 ; Ap 5.13. – Cf. Didachè 10.5 : « Souviens-toi, Seigneur, de ton Eglise, pour la délivrer de tout mal et la parfaire dans ton amour. Et rassemble-la des quatre vents, cette Eglise sanctifiée, dans ton royaume que tu lui as préparé. Car c''est à toi qu''appartiennent la puissance et la gloire dans les siècles ! » (voir aussi v. 9n).'
  - type: text
    content: ne nous fais pas entrer dans l'épreuve,
  - type: text
    content: mais délivre-nous du Mauvais.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'aux gens  : autres traductions aux humains ; aux hommes  ; cf. v. 1,2,5 ; 5.13+ ; 12.31. –  fautes  : cf. v. 12 ; Mc 11.25s ; Ep 4.32 ; Col 3.13.'
  - type: text
    content: 'Si vous pardonnez aux gens leurs fautes, votre Père céleste vous pardonnera, à vous aussi, '
  '15':
  - type: note
    content: Jc 2.13.
  - type: text
    content: mais si vous ne pardonnez pas aux gens, votre Père ne vous pardonnera pas non plus vos fautes.
  - type: heading
    content: La manière de jeûner
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Es 58.3-8 ; Za 7.5 ; cf. Lc 24.17. Didachè 8.1 : « Que vos jeûnes n''aient pas lieu en même temps que ceux des hypocrites. Ils jeûnent en effet le deuxième et le cinquième jour de la semaine (lundi et jeudi) ; vous donc jeûnez le quatrième jour et le jour de la préparation (mercredi et vendredi). » –  arborent… défait  : le même verbe grec est traduit par détruire aux v. 19s. Il est de la même racine que celui qui est traduit ici par montrer , de sorte qu''on a à peu près le jeu de mots suivant  : ils se déparent pour mieux paraître.'
  - type: text
    content: 'Lorsque vous jeûnez, ne prenez pas un air sombre, comme les hypocrites ; ils arborent un visage défait pour montrer aux gens qu''ils jeûnent. '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, ils tiennent là leur récompense. '
  '17':
  - type: note
    content: '2S 12.20 ; Ec 9.8. –  parfume-toi… ou mets-toi de l''huile parfumée sur la tête. Cf. Testament de Joseph 3.4 : « Pendant ces sept années, je jeûnai, et l''Egyptien croyait que je vivais dans les plaisirs, car ceux qui jeûnent à cause de Dieu ont un visage gracieux. »'
  - type: text
    content: 'Mais toi, quand tu jeûnes, parfume-toi la tête et lave-toi le visage, '
  '18':
  - type: note
    content: 'Cf. Jc 4.10. –  aux gens  : autre traduction aux humains. –  là, dans le secret  : le terme est légèrement différent de celui qui est employé aux v. 4,6. –  Evangile selon Thomas 27 : « Si vous ne jeûnez pas par rapport au monde, vous ne trouverez pas le Royaume. Si vous ne faites pas du sabbat un sabbat, vous ne verrez pas le Père. »'
  - type: text
    content: afin de ne pas montrer que tu jeûnes aux gens, mais à ton Père qui est là, dans le secret ; et ton Père, qui voit, là, dans le secret, te le rendra.
  - type: heading
    content: Des trésors dans le ciel
  - type: heading
    content: Lc 11.33-34
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'amassez  : le verbe grec, apparenté au mot traduit par trésors , a donné notre verbe thésauriser . Cf. Es 51.8 ; Jc 5.2s ; Siracide 29.11s : « Dispose de ton trésor selon les préceptes du Très-Haut : ainsi te sera-t-il plus profitable que l''or. Enferme tes aumônes dans tes greniers ; ce sont elles qui te délivreront de tout malheur. » –  rouille  : traduction incertaine ; il pourrait aussi s''agir d''un insecte destructeur (comme les vers ). –  fracturent  : litt. percent, creusent p. ex. les murs en torchis des maisons orientales, ou le sol où sont enfouis les trésors ; cf. 24.43 ; Ex 22.1n  ; Jb 24.16.'
  - type: text
    content: 'Ne vous amassez pas de trésors sur la terre, où les vers et la rouille détruisent et où les voleurs fracturent pour voler. '
  '2':
  - type: note
    content: 'Le mot traduit par acte de compassion est dérivé de celui qui signifie compassion, cf. 5.7n  ; dans le grec parlé par la communauté juive au Ier s. apr. J.-C., il s''était spécialisé pour désigner les dons aux pauvres ; c''est lui qui a donné notre mot aumône  ; cf. Rm 12.8 ; 1Co 13.3 ; Ph 2.1ss ; voir aussi Tobit 4.7-11 : « Que ton regard soit sans regrets quand tu fais l''aumône. Ne détourne jamais ta face d''un pauvre, et la face de Dieu ne se détournera pas de toi. Fais l''aumône suivant ce que tu as, selon l''importance de tes biens. Si tu as peu, ne crains pas de faire l''aumône selon le peu que tu as : c''est un beau trésor que tu te constitues pour le jour de la détresse, parce que l''aumône délivre de la mort et empêche d''aller dans les ténèbres ; en effet, pour tous ceux qui la font, l''aumône est une belle offrande aux yeux du Très-Haut. » Siracide 35.4 : « Faire l''aumône, c''est offrir un sacrifice de louange. » –  hypocrites v. 5,16 ; 7.5 ; 15.7 ; 22.18 ; 23.13ss,25ss ; 24.51 ; Mc 12.15 ; Lc 6.42+ ; le terme grec hupokritès évoquait à l''origine les acteurs de théâtre qui portaient un masque sur scène ; il en est venu à s''appliquer, sur le plan moral, à toutes sortes de faux-semblants (cf. l''emploi péjoratif de notre mot comédien) ; dans le domaine religieux, il évoque en particulier la piété feinte (v. 1,5,16) ; dans certains milieux juifs il est devenu pratiquement équivalent d’impie (certaines versions grecques l''emploient pour le mot hébreu rendu par profanation en Es 32.6). Le mot correspondant à hypocrisie désigne en 2 Maccabées 6.25 la « dissimulation » consistant à feindre de transgresser la loi divine, sans la transgresser réellement, pour éviter le châtiment dans un contexte de persécution. –  glorifiés  : cf. 5.16 ; 9.8 ; 15.31. –  Amen 5.18n.'
  - type: text
    content: 'Quand donc tu fais un acte de compassion, ne sonne pas de la trompette devant toi, comme les hypocrites le font dans les synagogues et dans les rues, afin d''être glorifiés par les gens. '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, ils tiennent là leur récompense. '
  '20':
  - type: note
    content: '19.21/ / ; cf. 13.46n  ; Jb 22.24-27 ; Col 3.1s ; 1Tm 6.19 ; Hé 10.34. Cf. 4 Esdras 7.77 : « Le trésor de tes œuvres repose auprès du Très-Haut, mais il ne te sera pas montré avant les derniers temps. »'
  - type: text
    content: 'Amassez-vous plutôt des trésors dans le ciel, là où ni vers ni rouille ne détruisent et où les voleurs ne fracturent ni ne volent. '
  '21':
  - type: note
    content: 'cœur  : cf. 5.11,28.'
  - type: text
    content: Car là où est ton trésor, là aussi sera ton cœur.
  - type: heading
    content: L'œil, lampe du corps
  - type: heading
    content: Lc 11.34-36
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Ep 1.18 ; cf. Jn 1.38n. –  bon  : litt. simple  ; le terme peut aussi signifier généreux, sans arrière-pensée , cf. Rm 12.8n  ; 2Co 8.2n  ; Jc 1.5n  ; voir aussi Pr 22.9n. Testament de Benjamin 4.2 : « L''homme bon n''a pas un œil aveuglé par les ténèbres, car il a pitié de tous, même des pécheurs. Quand bien même voudraient-ils lui nuire, c''est en faisant le bien qu''il vainc le mal, protégé qu''il est par Dieu ; mais les justes, il les aime comme lui-même. »'
  - type: text
    content: 'L''œil est la lampe du corps. Si ton œil est bon, tout ton corps sera illuminé, '
  '23':
  - type: note
    content: 'mauvais  : l''œil mauvais évoque souvent l''avarice, opposée à la générosité ; cf. 20.15n  ; Dt 15.9n  ; Pr 23.6n  ; Mc 7.22n. – Le mot grec traduit par ténèbres est toujours au singulier.'
  - type: text
    content: mais si ton œil est mauvais, tout ton corps sera dans les ténèbres. Si donc la lumière qui est en toi est ténèbres, combien sont grandes les ténèbres !
  - type: heading
    content: Dieu ou l'argent
  - type: heading
    content: Lc 16.13
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'être esclave de ou servir  ; le verbe grec correspondant évoque effectivement la condition d''esclave (cf. Jn 8.33). –  maîtres ou seigneurs 1R 18.21 ; Lc 14.26 ; Jn 8.33 ; Ga 1.10. –  Mamon  : autre traduction l''Argent  ; transcription, en grec (également Lc 16.9,11,13), d''un terme araméen attesté dans quelques textes juifs au sens d’ argent, biens, possessions  ; on le retrouve en particulier dans des écrits de Qumrân. Du fait qu''il est simplement transcrit en grec, on peut penser qu''il est pris ici comme un nom propre et qu''il personnifie l''argent comme une sorte de divinité ; l''amour de l''argent serait ainsi dénoncé comme une forme d''idolâtrie. –  Evangile selon Thomas 47 : « Il est impossible pour un homme de monter en même temps deux chevaux ou de bander deux arcs ; et il est impossible pour un serviteur de servir deux maîtres, autrement il honorera l''un et offensera l''autre… » (suit l''image du vin nouveau et des vieilles outres, cf. 9.16 ; Lc 5.39n).'
  - type: text
    content: Personne ne peut être esclave de deux maîtres ; en effet, ou bien on détestera l'un et on aimera l'autre, ou bien on s'attachera à l'un et on méprisera l'autre. Vous ne pouvez être esclaves de Dieu et de Mamon.
  - type: heading
    content: L'inquiétude
  - type: heading
    content: Lc 12.22-32
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Ne vous inquiétez pas Ph 4.6 ; 1Tm 6.6,8 ; 1P 5.7. Evangile selon Thomas 36 : « Jésus a dit : “Ne vous inquiétez pas du matin au soir ni du soir au matin de ce que vous vêtirez.” Ses disciples dirent : “Quand est-ce que tu te manifesteras à nous et quand pourrons-nous te voir ?” Jésus répondit : “Lorsque, pareils à de petits enfants, vous vous déshabillerez sans avoir honte et que vous prendrez vos vêtements et les piétinerez, c''est alors que vous verrez le fils du Vivant ; et vous n''aurez pas peur.” » –  vie  : sur le mot grec correspondant, voir 10.28n. –  ou de ce que vous boirez  : cette précision est absente de certains mss.'
  - type: text
    content: 'C''est pourquoi je vous dis : Ne vous inquiétez pas, pour votre vie, de ce que vous mangerez ou de ce que vous boirez, ni, pour votre corps, de ce dont vous serez vêtus. La vie n''est-elle pas plus que la nourriture, et le corps plus que le vêtement ? '
  '26':
  - type: note
    content: 10.29-31/ / ; Ps 147.9 ; Jb 12.7-10 ; 38.41.
  - type: text
    content: 'Regardez les oiseaux du ciel : ils ne sèment pas, ils ne moissonnent pas, ils ne recueillent rien dans des granges, et votre Père céleste les nourrit. Ne valez-vous pas beaucoup plus qu''eux ? '
  '27':
  - type: note
    content: 'rallonger tant soit peu  : litt. ajouter une coudée à (voir mesures) ; le mot grec traduit par la durée de sa vie pourrait aussi signifier stature ou taille  ; cf. Lc 2.52n  ; voir aussi Ps 39.5 ; Mc 8.36s/ /.'
  - type: text
    content: Qui de vous peut, par ses inquiétudes, rallonger tant soit peu la durée de sa vie ?
  '28':
  - type: text
    content: ' '
  - type: note
    content: Es 40.6-8 ; Ps 90.5s ; 103.15. –  travaillent ou peinent , cf. 11.28n.
  - type: text
    content: 'Et pourquoi vous inquiéter au sujet du vêtement ? Observez comment poussent les lis des champs : ils ne travaillent pas, ils ne filent pas ; '
  '29':
  - type: note
    content: 'Salomon, dans toute sa gloire  : cf. 1R 10.4-7 ; 2Ch 9.13-28.'
  - type: text
    content: 'et pourtant je vous dis que pas même Salomon, dans toute sa gloire, n''a été vêtu comme l''un d''eux. '
  '3':
  - type: note
    content: 'Cf. Evangile selon Thomas 62 : « Jésus a dit : “C''est à ceux qui sont dignes de mes mystères que je dis mes mystères. Ce que ta main droite fera, que ta main gauche ne sache pas ce qu''elle fait.” »'
  - type: text
    content: 'Mais quand tu fais un acte de compassion, que ta main gauche ne sache pas ce que fait ta main droite, '
  '30':
  - type: note
    content: gens de peu de foi 8.26 ; 14.31 ; 16.8 ; 17.20.
  - type: text
    content: Si Dieu habille ainsi l'herbe des champs qui est là aujourd'hui et demain sera jetée au four, ne le fera-t-il pas à bien plus forte raison pour vous, gens de peu de foi ?
  '31':
  - type: text
    content: ' '
  - type: note
    content: V. 25.
  - type: text
    content: 'Ne vous inquiétez donc pas, en disant : « Qu''allons-nous manger ? » Ou bien : « Qu''allons-nous boire ? » Ou bien : « De quoi allons-nous nous vêtir ? » '
  '32':
  - type: note
    content: 'V. 7s ; 10.9s ; Ps 33.18. –  les gens de toutes les nations  : autres traductions les non-Juifs, les païens 4.15n.'
  - type: text
    content: '– tout cela, c''est ce que les gens de toutes les nations recherchent sans relâche – car votre Père céleste sait que vous en avez besoin. '
  '33':
  - type: note
    content: 'le règne ou le royaume (3.2n) ; la précision de Dieu est absente de certains mss. Cf. v. 10s ; Rm 14.17. –  justice  : cf. 3.15n  ; 5.6,10,20. –  donné par surcroît  : litt. ajouté  ; cf. Mc 4.24 ; 10.29s ; voir aussi Ps 34.11 ; 37.4,25.'
  - type: text
    content: Cherchez d'abord le règne de Dieu et sa justice, et tout cela vous sera donné par surcroît.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'V. 11n  ; Pr 27.1 ; Jc 4.13s. –  sa peine  : autre traduction son mal  ; le même terme est traduit par malfaisance en Rm 1.29 ; 1Co 5.8 etc.'
  - type: text
    content: Ne vous inquiétez donc pas du lendemain, car le lendemain s'inquiétera de lui-même. A chaque jour suffit sa peine.
  '4':
  - type: note
    content: Ps 139.2 ; Lc 14.14. –  le secret ou ce qui est caché. Même terme 10.26/ / ; un verbe apparenté est traduit par cacher en 5.14 ; 11.25 ; 13.35,44 ; 25.18,25 ; voir aussi Rm 2.29.
  - type: text
    content: afin que ton acte de compassion se fasse dans le secret ; et ton Père, qui voit dans le secret, te le rendra.
  - type: heading
    content: La manière de prier
  '5':
  - type: text
    content: ' '
  - type: note
    content: V. 1+ ; Lc 18.11.
  - type: text
    content: 'Lorsque vous priez, ne soyez pas comme les hypocrites, qui se plaisent à prier debout dans les synagogues et aux coins des grandes rues, pour se montrer aux gens. '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, ils tiennent là leur récompense. '
  '6':
  - type: note
    content: '2R 4.33 ; Ac 10.31 ; cf. Es 26.20. –  la pièce la plus retirée ou la remise, la réserve, cf. 24.26 ; le même terme est traduit par cellier Lc 12.24. Cf. Testament de Joseph 3.3 : « J''entrai dans ma chambre et, en pleurant, je priai le Seigneur. »'
  - type: text
    content: Mais toi, quand tu pries, entre dans la pièce la plus retirée, ferme la porte et prie ton Père qui est dans le secret ; et ton Père, qui voit dans le secret, te le rendra.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ne multipliez pas les paroles ou ne rabâchez pas  ; le verbe grec correspondant n''apparaît qu''ici dans le N.T. ; cf. 1R 18.26 ; Es 1.15 ; Ec 5.1 ; Siracide 7.14 : « Ne répète pas tes paroles dans ta prière. » –  non-Juifs  : cf. 4.15n.'
  - type: text
    content: 'En priant, ne multipliez pas les paroles, comme les non-Juifs, qui s''imaginent qu''à force de paroles ils seront exaucés. '
  '8':
  - type: note
    content: V. 32.
  - type: text
    content: Ne faites pas comme eux, car votre Père sait de quoi vous avez besoin avant que vous le lui demandiez.
  - type: heading
    content: Le « Notre Père »
  - type: heading
    content: Lc 11.2-4
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Didachè 8.2s : « Ne priez pas non plus comme les hypocrites, mais comme le Seigneur vous l''a ordonné dans son évangile, priez de cette manière : “Notre Père qui es au ciel… pardonne-nous notre offense (ou : remets-nous notre dette)… car c''est à toi qu''appartiennent la puissance et la gloire dans les siècles (ou : pour toujours).” Priez de cette manière trois fois par jour. » –  Notre Père 5.16 ; 7.11 ; 23.9 ; cf. Dt 14.1 ; 32.6 ; 2S 7.14 ; Es 63.16 ; 64.7s ; Jr 3.4,19 ; 31.9 ; Os 11.1ss ; Ml 1.6 ; 2.10 ; Ps 89.27 ; 103.13 ; Tobit 13.4 : « Il est notre Seigneur, notre Dieu, notre Père. » Siracide 23.1ss : « Seigneur, Père et Maître de ma vie… Père et Dieu de ma vie… » Rm 8.15 ; Ga 4.6 ; 1P 1.17. –  Que ton nom soit reconnu pour sacré (ou saint , traduction traditionnelle sanctifié ) : cf. Es 29.23 ; Ez 36.23 ; voir aussi Ml 1.6 ; Jn 12.28 ; 17.6.'
  - type: text
    content: 'Voici donc comment vous devez prier :'
  - type: text
    content: Notre Père qui es dans les cieux !
  - type: text
    content: Que ton nom soit reconnu pour sacré,
