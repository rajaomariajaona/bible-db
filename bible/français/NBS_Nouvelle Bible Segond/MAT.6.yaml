      - type: text
        text: '36 : « Jésus a dit : “Ne vous inquiétez pas du matin au soir ni du soir au matin de ce que vous vêtirez.” Ses disciples dirent : “Quand est-ce que tu te manifesteras à nous et quand pourrons-nous te voir ?” Jésus répondit : “Lorsque, pareils à de petits enfants, vous vous déshabillerez sans avoir honte et que vous prendrez vos vêtements et les piétinerez, c''est alors que vous verrez le fils du Vivant ; et vous n''aurez pas peur.” » –  '
