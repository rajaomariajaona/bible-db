    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'désigne ici la pratique des œuvres religieuses chez les Juifs : l''aumône, la prière, le jeûne. Cf. v. 5,16 ; 5.20 ; 23.5 ; Lc 16.15 ; Jn 5.44 ; voir aussi Dn 4.24'
      - type: usfm
