          text: Tobit
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.7-11 : « Que ton regard soit sans regrets quand tu fais l''aumône. Ne détourne jamais ta face d''un pauvre, et la face de Dieu ne se détournera pas de toi. Fais l''aumône suivant ce que tu as, selon l''importance de tes biens. Si tu as peu, ne crains pas de faire l''aumône selon le peu que tu as : c''est un beau trésor que tu te constitues pour le jour de la détresse, parce que l''aumône délivre de la mort et empêche d''aller dans les ténèbres ; en effet, pour tous ceux qui la font, l''aumône est une belle offrande aux yeux du Très-Haut. » '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '35.4 : « Faire l''aumône, c''est offrir un sacrifice de louange. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'hypocrites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 5,16 ; 7.5 ; 15.7 ; 22.18 ; 23.13ss,25ss ; 24.51 ; Mc 12.15 ; Lc 6.42+ ; le terme grec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'hupokritès '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'évoquait à l''origine les acteurs de théâtre qui portaient un masque sur scène ; il en est venu à s''appliquer, sur le plan moral, à toutes sortes de faux-semblants (cf. l''emploi péjoratif de notre mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comédien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; dans le domaine religieux, il évoque en particulier la piété feinte (v. 1,5,16) ; dans certains milieux juifs il est devenu pratiquement équivalent d’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'impie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(certaines versions grecques l''emploient pour le mot hébreu rendu par '
    - type: usfm
      marker: fqa
