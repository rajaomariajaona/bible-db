      - type: text
        text: '4.2 : « L''homme bon n''a pas un œil aveuglé par les ténèbres, car il a pitié de tous, même des pécheurs. Quand bien même voudraient-ils lui nuire, c''est en faisant le bien qu''il vainc le mal, protégé qu''il est par Dieu ; mais les justes, il les aime comme lui-même. »'
    marker-yv: yv-n
  - type: text
    text: 'L''œil est la lampe du corps. Si ton œil est bon, tout ton corps sera illuminé, '
