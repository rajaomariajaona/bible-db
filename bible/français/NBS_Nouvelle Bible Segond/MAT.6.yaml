      - type: text
        text: ' de Joseph '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.3 : « J''entrai dans ma chambre et, en pleurant, je priai le Seigneur. »'
    marker-yv: yv-n
  - type: text
    text: Mais toi, quand tu pries, entre dans la pièce la plus retirée, ferme la porte et prie ton Père qui est dans le secret ; et ton Père, qui voit dans le secret, te le rendra.
