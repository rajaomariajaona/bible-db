        children:
        - type: text
          text: Thomas
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6 : « Ses disciples l''interrogèrent et lui dirent : “Veux-tu que nous jeûnions ? Et comment prierons-nous ? Donnerons-nous l''aumône ? Et pour ce qui concerne la nourriture, quelles normes observerons-nous ?” Jésus dit : “Ne dites pas de mensonges, et ne faites pas ce que vous haïssez, puisque tout est dévoilé devant le ciel. Car il n''y a rien de caché qui ne sera manifesté et rien de couvert qui restera sans être dévoilé.” » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous n''aurez pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.46'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Gardez-vous de pratiquer votre justice devant les gens, pour être vus par eux, autrement vous n''aurez pas de récompense auprès de votre Père qui est dans les cieux. '
  - type: usfm
    marker: v
