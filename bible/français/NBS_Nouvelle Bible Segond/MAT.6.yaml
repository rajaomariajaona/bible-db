      - type: text
        text: '8.2s : « Ne priez pas non plus comme les hypocrites, mais comme le Seigneur vous l''a ordonné dans son évangile, priez de cette manière : “Notre Père qui es au ciel… pardonne-nous notre offense (ou : remets-nous notre dette)… car c''est à toi qu''appartiennent la puissance et la gloire dans les siècles (ou : pour toujours).” Priez de cette manière trois fois par jour. » –  '
