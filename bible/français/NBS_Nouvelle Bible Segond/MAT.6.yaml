  - type: text
    text: 'C''est pourquoi je vous dis : Ne vous inquiétez pas, pour votre vie, de ce que vous mangerez ou de ce que vous boirez, ni, pour votre corps, de ce dont vous serez vêtus. La vie n''est-elle pas plus que la nourriture, et le corps plus que le vêtement ? '
