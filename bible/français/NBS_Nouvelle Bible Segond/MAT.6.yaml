      children:
      - type: text
        text: '2 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Maccabées
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.25 la « dissimulation » consistant à feindre de transgresser la loi divine, sans la transgresser réellement, pour éviter le châtiment dans un contexte de persécution. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: glorifiés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.16 ; 9.8 ; 15.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.18'
      - type: usfm
        marker: ord
        children:
        - type: text
