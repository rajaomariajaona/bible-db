      - type: usfm
        marker: w
        children:
        - type: text
          text: Thomas
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '62 : « Jésus a dit : “C''est à ceux qui sont dignes de mes mystères que je dis mes mystères. Ce que ta main droite fera, que ta main gauche ne sache pas ce qu''elle fait.” »'
    marker-yv: yv-n
  - type: text
    text: 'Mais quand tu fais un acte de compassion, que ta main gauche ne sache pas ce que fait ta main droite, '
