document_id: GEN.42
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob envoie ses fils en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jacob vit qu''il y avait du grain en Egypte. Alors Jacob dit à ses fils : Pourquoi restez-vous là à vous regarder les uns les autres ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 12.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ac 7.12.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit : J''apprends qu''il y a du grain en Egypte ; descendez-y et achetez-nous-en là-bas ; ainsi nous resterons en vie, nous ne mourrons pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dix des frères de Joseph descendirent acheter du blé en Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 38
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 43.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quant à Benjamin, frère de Joseph, Jacob ne l''envoya pas avec eux, de peur, disait-il, qu''il ne lui arrive un accident. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.5 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' d''Israël'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans d''autres contextes la même formule est traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Israélites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 32.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Les fils d'Israël vinrent pour acheter du grain, au milieu de tous ceux qui venaient dans cette intention ; car c'était la famine en Canaan.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph traite durement ses frères
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gouverneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '41.55ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se prosternèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 37.7,9s ; 43.26,28.
    marker-yv: yv-n
  - type: text
    text: 'Joseph était donc le gouverneur du pays ; c''est lui qui faisait vendre du grain à tout le peuple du pays. Les frères de Joseph arrivèrent et se prosternèrent devant lui, face contre terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce sont deux formes du même verbe hébreu qui sont traduites par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'reconnut '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se comporta… comme un inconnu.
    marker-yv: yv-n
  - type: text
    text: 'Joseph vit ses frères. Il les reconnut, mais il se comporta à leur égard comme un inconnu ; il leur dit avec dureté : D''où venez-vous ? Ils répondirent : De Canaan, pour acheter des vivres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Joseph reconnut ses frères, mais eux ne le reconnurent pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rêves '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '37.5-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: espions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu vient d''un verbe signifiant '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'marcher çà et là '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et dérive du mot habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pied
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: repérer les points faibles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: voir la nudité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 9.22. Les pharaons s''étaient protégés des invasions par un dispositif de fortifications (16.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir « L''Egypte et les Egyptiens »♦).'
    marker-yv: yv-n
  - type: text
    text: 'Joseph se souvint des rêves qu''il avait faits à leur sujet ; il leur dit : Vous êtes des espions ; c''est pour repérer les points faibles du pays que vous êtes venus ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils lui répondirent : Non, mon seigneur, nous sommes venus acheter des vivres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous sommes tous fils d''un même homme ; nous sommes sincères ! Nous sommes tes serviteurs, nous ne sommes pas des espions ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit : C''est faux ! C''est pour repérer les points faibles du pays que vous êtes venus ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 4 ; 37.28-35 ; 44.28.
    marker-yv: yv-n
  - type: text
    text: 'Ils répondirent : Nous sommes douze frères, fils d''un même homme en Canaan ; le plus petit est avec notre père aujourd''hui, et il y en a un qui n''est plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Joseph reprit : Je vous l''ai dit : vous êtes des espions ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par la vie du pharaon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette formule de serment rappelle celle par laquelle les Hébreux invoquaient la divinité (cf. Jg 8.19 ; 1R 17.1 ; Jr 4.2 ; Os 4.15) ; en Egypte, le pharaon était divinisé.'
    marker-yv: yv-n
  - type: text
    text: 'Voici l''épreuve que vous subirez : par la vie du pharaon, vous ne sortirez pas d''ici tant que votre petit frère ne sera pas venu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour savoir…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la vérité est-elle avec vous ou non ?
    marker-yv: yv-n
  - type: text
    text: 'Envoyez l''un de vous chercher votre frère ; vous autres, vous irez en prison. On mettra ainsi vos paroles à l''épreuve, pour savoir si vous dites la vérité ; sinon, par la vie du pharaon, c''est que vous êtes des espions ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 40.3s.
    marker-yv: yv-n
  - type: text
    text: Et il les fit mettre ensemble aux arrêts pendant trois jours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je '
      - type: usfm
        marker: w
        children:
        - type: text
          text: crains
      - type: text
        text: ' Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les dieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) 20.11 ; Pr 15.33.
    marker-yv: yv-n
  - type: text
    text: 'Le troisième jour, Joseph leur dit : Faites ceci, et vous vivrez. Je crains Dieu ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: emportez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ramener '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 20.
    marker-yv: yv-n
  - type: text
    text: 'Si vous êtes sincères, que l''un de vos frères reste prisonnier dans la maison d''arrêt ; vous autres, partez, emportez du grain pour vos maisons, à cause de la famine, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et ramenez-moi votre petit frère ; ainsi vos paroles seront confirmées et vous ne mourrez pas. Ils s''exécutèrent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '37.18-27 ; Nb 32.23 ; Pr 12.14 ; 21.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vraiment '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nous avons eu tort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous nous sommes rendus coupables
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou encore '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous avons fait du tort (à notre frère)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quand il nous suppliait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'quand il nous demandait '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'tout en se disant l''un à l''autre : Vraiment, nous avons eu tort en ce qui concerne notre frère ; car nous avons vu sa détresse quand il nous suppliait, et nous ne l''avons pas écouté. C''est pour cela que cette détresse est venue sur nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ruben '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '37.21s. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' nous est réclamé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: est recherché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) 9.5 ; cf. 4.10+ ; 37.26.
    marker-yv: yv-n
  - type: text
    text: 'Ruben leur dit : Ne vous ai-je pas dit : « Ne péchez pas contre cet enfant ! » Mais vous n''avez pas écouté. Maintenant son sang nous est réclamé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils ne savaient pas que Joseph comprenait, car il y avait entre eux un interprète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pleurer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '43.30 ; 45.2,14s ; 46.29 ; 50.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Siméon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 29.33 ; 34.25.
    marker-yv: yv-n
  - type: text
    text: Il s'éloigna d'eux pour pleurer. Puis il revint leur parler ; il prit parmi eux Siméon et le fit mettre en prison sous leurs yeux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fils de Jacob retournent en Canaan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '44.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qu'il fit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : d''après certaines versions anciennes il faudrait lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ce qu''ils firent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce qu'on fit.
    marker-yv: yv-n
  - type: text
    text: 'Joseph ordonna qu''on remplisse de blé leurs récipients, qu''on remette l''argent de chacun dans son sac et qu''on leur donne des provisions pour la route. C''est là ce qu''il fit pour eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils chargèrent leur grain sur leurs ânes et s''en allèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Au campement, l''un d''eux ouvrit son sac pour donner du fourrage à son âne et il vit son argent à l''ouverture de sa besace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' leur manqua'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leur cœur sortit.
    marker-yv: yv-n
  - type: text
    text: 'Il dit à ses frères : Mon argent m''a été rendu ; il est encore dans ma besace ! Alors le cœur leur manqua ; ils se mirent à trembler et se dirent les uns aux autres : Qu''est-ce que Dieu nous a fait là ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils arrivèrent chez Jacob, leur père, en Canaan, et ils lui racontèrent tout ce qui leur était arrivé. Ils dirent : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le maître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le seigneur.
    marker-yv: yv-n
  - type: text
    text: 'L''homme qui est le maître du pays nous a parlé avec dureté ; il nous a accusés d''espionner le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nous lui avons dit : « Nous sommes sincères ! Nous ne sommes pas des espions ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nous sommes douze frères, douze fils de notre père ; l''un n''est plus et le plus petit est aujourd''hui avec notre père en Canaan. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors l''homme qui est le maître du pays nous a dit : « Voici comment je saurai si vous êtes sincères. Laissez auprès de moi l''un de vos frères, prenez ce qu''il faut pour vos maisons, à cause de la famine. Allez, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: et ramenez-moi votre petit frère. Je saurai ainsi que vous n'êtes pas des espions et que vous êtes sincères ; je vous rendrai votre frère, et vous pourrez faire du commerce dans le pays. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Lorsqu''ils vidèrent leurs sacs, chacun trouva sa bourse d''argent dans son sac. Ils virent, eux et leur père, leurs bourses d''argent, et ils eurent peur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jacob, leur père, leur dit : A cause de vous, je vais perdre tous mes enfants ! Joseph n''est plus, Siméon n''est plus, et vous prendriez Benjamin ! C''est sur moi que tout cela retombe ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 43.9 ; 44.32ss.
    marker-yv: yv-n
  - type: text
    text: 'Ruben dit à son père : Tu mettras à mort mes deux fils, si je ne te le ramène pas ! Confie-le-moi, et je te le ramènerai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Joseph, que Jacob croit mort (37.33-35+), et Benjamin, qu''on lui réclame, sont les deux seuls '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' que Jacob a eus de son épouse préférée, Rachel (29.18,20 ; 30.24 ; 35.16-18,24 ; 37.3 ; 43.29 ; 44.27). – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: séjour
      - type: text
        text: ' des morts.'
    marker-yv: yv-n
  - type: text
    text: 'Il répondit : Mon fils ne descendra pas avec vous ; car son frère est mort, et il reste seul ; s''il lui arrivait un accident au cours de votre voyage, c''est dans le chagrin que vous feriez descendre mes cheveux blancs au séjour des morts !'
