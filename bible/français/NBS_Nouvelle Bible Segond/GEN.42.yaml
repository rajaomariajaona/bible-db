document_id: GEN.42,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob envoie ses fils en Egypte
  - type: text
    content: 'Jacob vit qu''il y avait du grain en Egypte. Alors Jacob dit à ses fils : Pourquoi restez-vous là à vous regarder les uns les autres ? '
  '10':
  - type: text
    content: 'Ils lui répondirent : Non, mon seigneur, nous sommes venus acheter des vivres. '
  '11':
  - type: text
    content: 'Nous sommes tous fils d''un même homme ; nous sommes sincères ! Nous sommes tes serviteurs, nous ne sommes pas des espions ! '
  '12':
  - type: note
    content: V. 9n.
  - type: text
    content: 'Il leur dit : C''est faux ! C''est pour repérer les points faibles du pays que vous êtes venus ! '
  '13':
  - type: note
    content: V. 4 ; 37.28-35 ; 44.28.
  - type: text
    content: 'Ils répondirent : Nous sommes douze frères, fils d''un même homme en Canaan ; le plus petit est avec notre père aujourd''hui, et il y en a un qui n''est plus. '
  '14':
  - type: text
    content: 'Joseph reprit : Je vous l''ai dit : vous êtes des espions ! '
  '15':
  - type: note
    content: 'par la vie du pharaon  : cette formule de serment rappelle celle par laquelle les Hébreux invoquaient la divinité (cf. Jg 8.19 ; 1R 17.1 ; Jr 4.2 ; Os 4.15) ; en Egypte, le pharaon était divinisé.'
  - type: text
    content: 'Voici l''épreuve que vous subirez : par la vie du pharaon, vous ne sortirez pas d''ici tant que votre petit frère ne sera pas venu. '
  '16':
  - type: note
    content: 'pour savoir…  : litt. la vérité est-elle avec vous ou non ?'
  - type: text
    content: 'Envoyez l''un de vous chercher votre frère ; vous autres, vous irez en prison. On mettra ainsi vos paroles à l''épreuve, pour savoir si vous dites la vérité ; sinon, par la vie du pharaon, c''est que vous êtes des espions ! '
  '17':
  - type: note
    content: Cf. 40.3s.
  - type: text
    content: Et il les fit mettre ensemble aux arrêts pendant trois jours.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Je crains Dieu (ou les dieux , cf. 1.1n) 20.11 ; Pr 15.33.
  - type: text
    content: 'Le troisième jour, Joseph leur dit : Faites ceci, et vous vivrez. Je crains Dieu ! '
  '19':
  - type: note
    content: 'emportez  : le même verbe est traduit par ramener au v. 20.'
  - type: text
    content: 'Si vous êtes sincères, que l''un de vos frères reste prisonnier dans la maison d''arrêt ; vous autres, partez, emportez du grain pour vos maisons, à cause de la famine, '
  '2':
  - type: note
    content: Cf. 12.10n  ; Ac 7.12.
  - type: text
    content: 'Il dit : J''apprends qu''il y a du grain en Egypte ; descendez-y et achetez-nous-en là-bas ; ainsi nous resterons en vie, nous ne mourrons pas. '
  '20':
  - type: text
    content: 'et ramenez-moi votre petit frère ; ainsi vos paroles seront confirmées et vous ne mourrez pas. Ils s''exécutèrent, '
  '21':
  - type: note
    content: 37.18-27 ; Nb 32.23 ; Pr 12.14 ; 21.13. –  Vraiment 17.19n. –  nous avons eu tort ou nous nous sommes rendus coupables, ou encore nous avons fait du tort (à notre frère). –  quand il nous suppliait ou quand il nous demandait grâce.
  - type: text
    content: 'tout en se disant l''un à l''autre : Vraiment, nous avons eu tort en ce qui concerne notre frère ; car nous avons vu sa détresse quand il nous suppliait, et nous ne l''avons pas écouté. C''est pour cela que cette détresse est venue sur nous. '
  '22':
  - type: note
    content: Ruben 37.21s. – Voir péché. –  son sang nous est réclamé (litt. est recherché) 9.5 ; cf. 4.10+ ; 37.26.
  - type: text
    content: 'Ruben leur dit : Ne vous ai-je pas dit : « Ne péchez pas contre cet enfant ! » Mais vous n''avez pas écouté. Maintenant son sang nous est réclamé. '
  '23':
  - type: text
    content: 'Ils ne savaient pas que Joseph comprenait, car il y avait entre eux un interprète. '
  '24':
  - type: note
    content: pleurer 43.30 ; 45.2,14s ; 46.29 ; 50.17. –  Siméon 29.33 ; 34.25.
  - type: text
    content: Il s'éloigna d'eux pour pleurer. Puis il revint leur parler ; il prit parmi eux Siméon et le fit mettre en prison sous leurs yeux.
  - type: heading
    content: Les fils de Jacob retournent en Canaan
  '25':
  - type: text
    content: ' '
  - type: note
    content: '44.1. –  ce qu''il fit  : d''après certaines versions anciennes il faudrait lire ce qu''ils firent ou ce qu''on fit.'
  - type: text
    content: 'Joseph ordonna qu''on remplisse de blé leurs récipients, qu''on remette l''argent de chacun dans son sac et qu''on leur donne des provisions pour la route. C''est là ce qu''il fit pour eux. '
  '26':
  - type: text
    content: 'Ils chargèrent leur grain sur leurs ânes et s''en allèrent. '
  '27':
  - type: text
    content: 'Au campement, l''un d''eux ouvrit son sac pour donner du fourrage à son âne et il vit son argent à l''ouverture de sa besace. '
  '28':
  - type: note
    content: 'le cœur leur manqua  : litt. leur cœur sortit.'
  - type: text
    content: 'Il dit à ses frères : Mon argent m''a été rendu ; il est encore dans ma besace ! Alors le cœur leur manqua ; ils se mirent à trembler et se dirent les uns aux autres : Qu''est-ce que Dieu nous a fait là ?'
  '29':
  - type: text
    content: 'Ils arrivèrent chez Jacob, leur père, en Canaan, et ils lui racontèrent tout ce qui leur était arrivé. Ils dirent : '
  '3':
  - type: text
    content: 'Dix des frères de Joseph descendirent acheter du blé en Egypte. '
  '30':
  - type: note
    content: 'le maître  : autre traduction le seigneur.'
  - type: text
    content: 'L''homme qui est le maître du pays nous a parlé avec dureté ; il nous a accusés d''espionner le pays. '
  '31':
  - type: text
    content: 'Nous lui avons dit : « Nous sommes sincères ! Nous ne sommes pas des espions ! '
  '32':
  - type: text
    content: 'Nous sommes douze frères, douze fils de notre père ; l''un n''est plus et le plus petit est aujourd''hui avec notre père en Canaan. » '
  '33':
  - type: text
    content: 'Alors l''homme qui est le maître du pays nous a dit : « Voici comment je saurai si vous êtes sincères. Laissez auprès de moi l''un de vos frères, prenez ce qu''il faut pour vos maisons, à cause de la famine. Allez, '
  '34':
  - type: text
    content: et ramenez-moi votre petit frère. Je saurai ainsi que vous n'êtes pas des espions et que vous êtes sincères ; je vous rendrai votre frère, et vous pourrez faire du commerce dans le pays. »
  '35':
  - type: text
    content: 'Lorsqu''ils vidèrent leurs sacs, chacun trouva sa bourse d''argent dans son sac. Ils virent, eux et leur père, leurs bourses d''argent, et ils eurent peur. '
  '36':
  - type: text
    content: 'Jacob, leur père, leur dit : A cause de vous, je vais perdre tous mes enfants ! Joseph n''est plus, Siméon n''est plus, et vous prendriez Benjamin ! C''est sur moi que tout cela retombe ! '
  '37':
  - type: note
    content: Cf. 43.9 ; 44.32ss.
  - type: text
    content: 'Ruben dit à son père : Tu mettras à mort mes deux fils, si je ne te le ramène pas ! Confie-le-moi, et je te le ramènerai. '
  '38':
  - type: note
    content: Joseph, que Jacob croit mort (37.33-35+), et Benjamin, qu'on lui réclame, sont les deux seuls fils que Jacob a eus de son épouse préférée, Rachel (29.18,20 ; 30.24 ; 35.16-18,24 ; 37.3 ; 43.29 ; 44.27). – Voir séjour des morts.
  - type: text
    content: 'Il répondit : Mon fils ne descendra pas avec vous ; car son frère est mort, et il reste seul ; s''il lui arrivait un accident au cours de votre voyage, c''est dans le chagrin que vous feriez descendre mes cheveux blancs au séjour des morts !'
  '4':
  - type: note
    content: V. 38n  ; 43.4n.
  - type: text
    content: 'Quant à Benjamin, frère de Joseph, Jacob ne l''envoya pas avec eux, de peur, disait-il, qu''il ne lui arrive un accident. '
  '5':
  - type: note
    content: 'fils d''Israël  : dans d''autres contextes la même formule est traduite par Israélites  ; cf. 32.29n.'
  - type: text
    content: Les fils d'Israël vinrent pour acheter du grain, au milieu de tous ceux qui venaient dans cette intention ; car c'était la famine en Canaan.
  - type: heading
    content: Joseph traite durement ses frères
  '6':
  - type: text
    content: ' '
  - type: note
    content: gouverneur 41.55ss. –  se prosternèrent 37.7,9s ; 43.26,28.
  - type: text
    content: 'Joseph était donc le gouverneur du pays ; c''est lui qui faisait vendre du grain à tout le peuple du pays. Les frères de Joseph arrivèrent et se prosternèrent devant lui, face contre terre. '
  '7':
  - type: note
    content: Ce sont deux formes du même verbe hébreu qui sont traduites par reconnut et par se comporta… comme un inconnu.
  - type: text
    content: 'Joseph vit ses frères. Il les reconnut, mais il se comporta à leur égard comme un inconnu ; il leur dit avec dureté : D''où venez-vous ? Ils répondirent : De Canaan, pour acheter des vivres. '
  '8':
  - type: text
    content: 'Joseph reconnut ses frères, mais eux ne le reconnurent pas. '
  '9':
  - type: note
    content: 'rêves 37.5-11. –  espions  : le mot hébreu vient d''un verbe signifiant marcher çà et là et dérive du mot habituellement traduit par pied. –  repérer les points faibles  : litt. voir la nudité, comme en 9.22. Les pharaons s''étaient protégés des invasions par un dispositif de fortifications (16.7n  ; voir « L''Egypte et les Egyptiens »♦).'
  - type: text
    content: 'Joseph se souvint des rêves qu''il avait faits à leur sujet ; il leur dit : Vous êtes des espions ; c''est pour repérer les points faibles du pays que vous êtes venus ! '
