document_id: 1PE.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'apôtre ou envoyé , cf. Ga 1.1n. –  Christ  : voir onction. –  choisis ou élus  : cf. v. 15,20 ; 2.4,9 ; 5.13. –  étrangers ou résidents temporaires 2.11 ; Hé 11.13n. –  dispersion  : en grec diaspora (litt. dissémination ) ; ce terme qui désignait habituellement la communauté juive hors du pays de ses ancêtres est ici appliqué à des chrétiens ; voir « La diaspora ou les Juifs hors de leur pays »♦ ; Jn 7.35n  ; Jc 1.1n  ; voir aussi 2 Maccabées 1.27 : « Rassemble ceux d''entre nous qui sont dispersés ; délivre ceux qui sont en esclavage parmi les nations. » –  Pont…  : provinces romaines d''Asie Mineure : cf. Ac 2.9 ; 16.6n,7n  ; 18.2n  ; 19.10n.'
  - type: text
    content: 'Pierre, apôtre de Jésus-Christ, à ceux qui ont été choisis et qui vivent en étrangers dans la dispersion – dans le Pont, en Galatie, en Cappadoce, en Asie et en Bithynie – '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'prophètes  : cf. Mt 11.13 ; 13.17/ / ; voir aussi Lc 18.31 ; 24.27 ; Jn 12.41 ; Ac 7.52 ; 2P 1.19ss. –  parlé  : litt. prophétisé . –  grâce v. 13 ; 5.10,12 ; cf. 1.2 ; 2.19s ; 3.7 ; 4.10. –  qui vous était destinée  : litt. qui (était) pour vous . –  investigations  : verbe apparenté en Jn 5.39 ( sonder ) ; 7.52 ( chercher bien ) ; cf. Ha 3.2s ; Dn 9.2,22,27 ; 12.6ss ; 4 Esdras 5.34 : « A chaque heure mon cœur est tourmenté, quand je cherche à saisir le sentier du Très-Haut et à connaître la sentence de son jugement. »'
  - type: text
    content: 'Ce salut, les prophètes qui ont parlé de la grâce qui vous était destinée en ont fait l''objet de leurs recherches et de leurs investigations. '
  '11':
  - type: note
    content: 'quelle époque…  : litt. quel (temps) ou quelle sorte de temps  ; cf. v. 5n. –  l''Esprit du Christ  : cf. v. 20 ; Ap 19.10. –  les souffrances du Christ (autre traduction possible les souffrances pour le Christ) / la gloire  : cf. 2.21 ; 4.13s ; voir aussi 5.1 ; Es 52.13–53.12 ; Ps 22 ; Lc 24.26.'
  - type: text
    content: Ils se sont appliqués à découvrir quelle époque et quelles circonstances désignait l'Esprit du Christ qui était en eux, Esprit qui, d'avance, attestait les souffrances du Christ et la gloire qui s'ensuivrait.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'pas pour eux-mêmes  : cf. Ac 8.34 ; 1 Hénoch 1.2 : « En contemplant, j''ai acquis le savoir. Ce n''est pas à la génération présente que j''ai pensé, mais c''est pour une génération lointaine que je parle. » –  ils étaient ministres de ces choses ou ils accomplissaient ce service  : cf. 4.10s. –  annoncées (verbe apparenté à celui qui est traduit par ont communiqué la bonne nouvelle , ainsi qu''au terme transcrit anges ) … Rm 16.25s. –  l''Esprit saint… Ac 1.8 ; 2.1ss ; 1Co 2.4 ; 1Th 1.5. –  les anges…  : cf. Ep 3.10 ; voir aussi Mc 13.32 ; Lc 15.7,10 ; 1Co 2.7s ; 1 Hénoch 16.3 (message aux anges déchus, cf. Gn 6.1ss) : « Vous habitiez le ciel, mais aucun mystère ne vous avait été révélé. » –  plonger leurs regards  : même verbe en Jc 1.25.'
  - type: text
    content: Il leur fut révélé que ce n'était pas pour eux-mêmes, mais pour vous, qu'ils étaient ministres de ces choses, qui maintenant vous ont été annoncées par l'entremise de ceux qui vous ont communiqué la bonne nouvelle, avec l'Esprit saint envoyé du ciel ; c'est en ces mêmes choses que les anges désirent plonger leurs regards.
  - type: heading
    content: Vie et croissance des enfants de Dieu
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'mobilisez vos facultés mentales  : litt. ayant ceint les reins de votre intelligence  ; sur l''acte de se ceindre les reins pour se préparer à l''action, cf. Ex 12.11 ; Jb 38.3 ; 40.7 ; Pr 31.17 ; Lc 12.35n  ; Ep 6.14. –  sobres 4.7 ; 5.8 ; 1Th 5.6,8 ; 2Tm 4.5 ; cf. Lc 12.45. –  mettez toute votre espérance  : litt. espérez parfaitement v. 3. – Voir grâce . –  apportée  : on peut comprendre qui vous est apportée ou qui vous sera apportée . –  révélation… v. 7+.'
  - type: text
    content: 'Aussi mobilisez vos facultés mentales, soyez sobres, mettez toute votre espérance dans la grâce apportée par la révélation de Jésus-Christ. '
  '14':
  - type: note
    content: 'enfants (cf. 2.2) obéissants 1.2,22 ; cf. 2.13,18 ; 3.1,5 ; 5.5. –  ne vous conformez pas  : même verbe Rm 12.2n. –  désirs… auparavant 2.11 ; 4.3 ; cf. 1.18 ; Ep 2.1ss. –  ignorance ou méconnaissance  : cf. 2.15 ; Ac 3.17 ; 17.30 ; Ep 4.17s.'
  - type: text
    content: 'Comme des enfants obéissants, ne vous conformez pas aux désirs que vous aviez auparavant, dans votre ignorance ; '
  '15':
  - type: note
    content: appelés 1Th 2.12. –  saint Es 1.4+ ; 6.3 ; cf. Ps 24.3ss ; Mt 5.48 ; 1P 1.2.
  - type: text
    content: 'mais, de même que celui qui vous a appelés est saint, vous aussi devenez saints dans toute votre conduite, '
  '16':
  - type: note
    content: 'Lv 11.44s ; 19.2  ; 20.7,26. –  moi…  : certains mss portent seulement je suis saint.'
  - type: text
    content: 'puisqu''il est écrit : '
  - type: text
    content: Vous serez saints, car, moi, je suis saint
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'comme Père v. 2 ; Es 64.7 ; Jr 3.19 ; Ml 1.6 ; Ps 89.27 ; Mt 6.9+ ; Rm 8.15. –  impartialement Ac 10.34n. –  juge… Rm 2.6+ ; voir aussi 14.10s ; 1Co 3.12ss ; 4.4s ; 2Co 5.10s. –  crainte  : autre traduction piété  : cf. 3.2n  ; 2Co 5.11 ; 7.1 ; Ph 2.12. –  exil ou migration  ; terme apparenté en 2.11 ; cf. Ac 7.6n  ; 13.17.'
  - type: text
    content: Et si vous invoquez comme Père celui qui, impartialement, juge chacun selon ses œuvres, conduisez-vous avec crainte pendant le temps de votre exil.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'périssables  : cf. v. 23. –  vous avez été rédimés ou vous avez reçu la rédemption  ; autre traduction vous avez été délivrés  ; cf. Ex 13.12s ; Lv 25.47ss ; Es 43.1+ ; 52.3 ; Mc 10.45/ / ; Rm 3.24 ; 1Co 1.30 ; 6.20+ ; Ep 1.7 ; Tt 2.14 ; 2P 2.1. –  votre conduite futile  : cf. 4.3 ; Ac 14.15 ; Rm 8.20 ; Ep 4.17. –  celle que vous teniez…  : cf. Ph 3.4ss.'
  - type: text
    content: Vous savez en effet que ce n'est pas par des choses périssables – argent ou or – que vous avez été rédimés
  - type: text
    content: de votre conduite futile, celle que vous teniez de vos pères,
  '19':
  - type: text
    content: ' '
  - type: note
    content: 2.22s ; 3.18 ; cf. Ex 12.5 ; Jn 1.29+ ; Ac 20.28 ; 1Co 5.7 ; Hé 9.12,14 ; Ap 5.9 ; 14.3. – Voir sang.
  - type: text
    content: mais par le sang précieux du Christ, comme par celui d'un agneau sans défaut et sans tache.
  '2':
  - type: note
    content: 'tels qu''ils ont été…  : litt. selon la prescience (ou préconnaissance) de Dieu…, terme apparenté au v. 20 ; cf. Ac 2.23 ; Rm 8.29 ; Judith 9.5s : « Car tu as fait les événements d''autrefois, de maintenant et du futur ; tu as médité le présent et l''avenir et ce que tu avais dans l''esprit est venu à l''existence. Les événements que tu avais décidés se présentèrent et dirent : “Nous voici.” Car toutes tes voies sont prêtes et ton jugement porté avec prévoyance (même terme grec). » –  consécration (ou sanctification  ; un terme apparenté est traduit par saint au v. 15s) de l''Esprit ou opérée par l''Esprit 2Th 2.13s. –  obéissance v. 14. –  aspersion (purificatrice) du sang…  : cf. v. 19 ; Hé 9.12ss ; 10.22 ; 12.24+ ; voir aussi Ex 24.3ss ; Lv 16.14s ; Nb 19. –  Que la grâce (v. 10+) et la paix…  : cf. Rm 1.7+.'
  - type: text
    content: 'tels qu''ils ont été désignés d''avance par Dieu, le Père, dans la consécration de l''Esprit, pour l''obéissance et l''aspersion du sang de Jésus-Christ : Que la grâce et la paix vous soient multipliées !'
  - type: heading
    content: Le salut, objet d'espérance et d'émerveillement
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'désigné d''avance  : litt. pré-connu , cf. v. 2n  ; Ac 2.23. –  avant… Jn 17.24 ; Ep 1.4+. –  s''est manifesté  : litt. a été manifesté 5.4 ; Rm 16.25s ; 1Tm 3.16 ; 2Tm 1.9s ; Hé 9.26. –  fin des temps  : cf. v. 5n  ; voir aussi Ga 4.4 ; Hé 1.2.'
  - type: text
    content: Il a été désigné d'avance, avant la fondation du monde,
  - type: text
    content: et il s'est manifesté à la fin des temps,
  - type: text
    content: 'à cause de vous '
  '21':
  - type: note
    content: 'mettez votre foi  : litt. (vous qui êtes) croyants (le même mot, apparenté à celui qui est rendu plus loin par foi, sera traduit par digne de confiance en 4.19 ; 5.12) en Dieu  : cf. Jn 14.6+ss ; Rm 5.1s. –  qui l''a réveillé ou relevé (voir résurrection) 3.21 ; Rm 4.24n  ; 10.9. –  donné la gloire Jn 17.22 ; cf. Col 1.27.'
  - type: text
    content: qui, par lui, mettez votre foi en Dieu,
  - type: text
    content: celui qui l'a réveillé d'entre les morts et lui a donné la gloire
  - type: text
    content: – de sorte que votre foi et votre espérance sont en Dieu.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'vous vous êtes purifiés  : autre traduction vous avez purifié votre âme , cf. v. 9n. –  obéissance (v. 14+) à la vérité  : cf. Rm 1.5+ ; 16.26 ; certains mss ajoutent par l''Esprit  ; cf. Règle de la Communauté (Qumrân) 4.20ss : « Alors (au jugement) Dieu, par Sa Vérité, nettoiera toutes les œuvres d''un chacun… et Il fera jaillir sur lui l''Esprit de vérité comme de l''eau lustrale. » –  affection fraternelle 2.17 ; 3.8 ; Rm 12.10+ ; 2P 1.7. –  sans hypocrisie  : cf. 2Co 6.6+. –  aimez-vous… 4.8 ; Jn 13.34+. –  avec ferveur  : autre traduction sans relâche 4.8 ; cf. Ac 12.5n. –  d''un cœur pur  : certains mss portent de (tout) cœur.'
  - type: text
    content: 'Comme vous vous êtes purifiés, par l''obéissance à la vérité, en vue d''une affection fraternelle sans hypocrisie, aimez-vous les uns les autres avec ferveur, d''un cœur pur. '
  '23':
  - type: note
    content: 'nés de nouveau ou régénérés v. 3n  ; cf. Jn 1.13. –  semence / parole  : cf. Lc 8.11 ; Jc 1.18. –  périssable / impérissable v. 4+ ; 1Co 15.42n,50ss. –  la parole vivante v. 3 ; Hé 4.12 ; certains comprennent la parole d''un Dieu vivant et permanent, cf. Dn 6.27.'
  - type: text
    content: 'Vous êtes en effet nés de nouveau, non pas d''une semence périssable, mais d''une semence impérissable, par la parole vivante et permanente de Dieu ; '
  '24':
  - type: note
    content: 'Es 40.6ss  ; Jc 1.10s. –  tout être qui vit  : litt. toute chair. –  sa gloire  : autre traduction son apparence.'
  - type: text
    content: car
  - type: text
    content: tout être qui vit est comme l'herbe,
  - type: text
    content: toute
  - type: text
    content: ' sa '
  - type: text
    content: gloire comme la fleur de l'herbe ;
  - type: text
    content: l'herbe se dessèche et la fleur tombe,
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'du Seigneur  : en Es 40, LXX traduit de Dieu . –  bonne nouvelle  : cf. Es 40.9.'
  - type: text
    content: mais la parole du Seigneur demeure pour toujours.
  - type: text
    content: Cette parole, c'est la bonne nouvelle qui vous a été annoncée.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Béni soit le Dieu… 2Co 1.3+ ; Ep 1.3. –  sa grande compassion Ep 2.4+. –  nous a fait naître de nouveau ou nous a régénérés , c.-à-d. engendrés à nouveau  ; cf. v. 23 ; 2.2 ; terme apparenté en Tt 3.5+ ; voir aussi Jn 1.13 ; 3.3ss ; Jc 1.18 ; 1Jn 2.29+. –  par la résurrection… Rm 6.4 ; cf. 2Co 5.17 ; Ga 2.20. –  espérance  : le terme est sans doute à entendre au sens objectif de chose espérée (comme l’ héritage du v. 4) ; cf. 3.15 ; Col 1.5.'
  - type: text
    content: 'Béni soit le Dieu et Père de notre Seigneur Jésus-Christ qui, selon sa grande compassion, nous a fait naître de nouveau, par la résurrection de Jésus-Christ d''entre les morts, pour une espérance vivante, '
  '4':
  - type: note
    content: 'un héritage 3.9 ; 5.3n  ; Ep 1.11n,14 ; cf. Mt 25.34. –  impérissable…  : cf. v. 23 ; 3.4 ; un terme apparenté est traduit par pourriture en 2P 1.4 ; 2.19 ; voir aussi Rm 1.23+ ; 1Co 9.25+. –  sans souillure Hé 7.26+ ; Jc 1.27 ; voir pur, impur. –  inaltérable  : terme apparenté en 5.4, dérivé du verbe traduit par se flétrir en Jc 1.11. –  réservé dans les cieux  : cf. Mt 6.19s ; Col 1.5,12 ; 1 Hénoch 48.7 : « Il (Dieu, ou le Fils de l''homme) a en effet préservé le lot des justes, parce qu''ils ont haï et méprisé ce siècle de violence et en ont haï toute l''œuvre et toutes les voies, au nom du Seigneur des Esprits. C''est par son nom qu''ils seront sauvés, et par sa volonté qu''il est devenu leur vie. »'
  - type: text
    content: 'pour un héritage impérissable, sans souillure, inaltérable, qui vous est réservé dans les cieux, à vous '
  '5':
  - type: note
    content: 'gardés  : le verbe grec évoque étymologiquement une protection militaire (cf. son emploi en 2Co 11.32) ; on le retrouve en Ga 3.23 ; Ph 4.7 ; comparer avec Jn 10.28 ; 17.11. –  par (ou en) la puissance de Dieu 1Co 2.5. –  au moyen de la foi…  : autre traduction au moyen d''une foi dans un salut… –  dans les derniers temps  : autre traduction au dernier moment  ; le même mot est traduit par époque au v. 11 ; moment en 4.17 ; temps en 5.6 ; autre terme au v. 20 ; cf. Rm 3.26n.'
  - type: text
    content: qui êtes gardés par la puissance de Dieu, au moyen de la foi, pour un salut prêt à être révélé dans les derniers temps.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ainsi  : litt. en quoi ou en qui . –  vous êtes…  : on pourrait aussi lire l''impératif soyez transportés d''allégresse  ; cf. v. 8 ; 4.12s. –  pour un peu de temps  : autre traduction un peu  ; cf. 5.10 ; Jn 16.20 ; 2Co 4.17 ; Hé 12.10s. –  il le faut  : cf. 4.17. –  épreuves 4.12 ; 5.10 ; cf. Mt 5.11s/ / ; Ac 5.41+ ; Rm 5.3ss ; 8.18 ; Jc 1.2+.'
  - type: text
    content: 'Ainsi vous êtes transportés d''allégresse, quoique vous soyez maintenant, pour un peu de temps, puisqu''il le faut, attristés par diverses épreuves, '
  '7':
  - type: note
    content: 'la qualité éprouvée de votre foi  : un ms porte un texte légèrement différent, qu''on pourrait aussi traduire ce qui, de votre foi, est éprouvé  ; voir Jc 1.3n  ; cf. Es 48.10 ; Jr 9.6 ; Za 13.9 ; Ml 3.3 ; Ps 17.3 ; 66.10 ; Jb 23.10 ; Pr 17.3 ; 1Co 3.13 ; cf. Sagesse 3.5s : « Après de légères corrections, ils (les justes) recevront de grands bienfaits. Dieu les a éprouvés et les a trouvés dignes de lui ; comme l''or au creuset, il les a épurés, comme l''offrande d''un holocauste, il les a accueillis. » –  périssable  : litt. qui périt, se perd, autre terme au v. 18. –  se trouve être  : litt. soit trouvée, c.-à-d. apparaisse (au jugement). –  un sujet de louange…  : on peut comprendre un sujet de louange… pour vous ou pour Dieu. –  gloire / honneur Rm 2.7,10 ; Ep 1.6+ ; 1Tm 1.17 ; Hé 2.9 ; 2P 1.17 ; Ap 4.9,11 ; 5.12s ; 7.12 ; 21.26. –  révélation de Jésus-Christ v. 13 ; 4.13 ; 1Co 1.7+.'
  - type: text
    content: afin que la qualité éprouvée de votre foi – bien plus précieuse que l'or périssable, quoique éprouvé par le feu – se trouve être un sujet de louange, de gloire et d'honneur à la révélation de Jésus-Christ.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Vous ne l''avez pas vu  : cf. Jn 17.20 ; 20.29 ; 2Co 5.7 ; Hé 11.27. –  vous l''aimez Ep 6.24 ; 2Tm 4.8. –  Maintenant… vous ne le voyez pas  : cf. Rm 8.24s ; 1Co 13.12. –  joie  : cf. Jn 8.56 ; Ac 16.34.'
  - type: text
    content: 'Vous ne l''avez pas vu, mais vous l''aimez. Maintenant même vous ne le voyez pas, mais vous mettez votre foi en lui et vous êtes transportés d''une joie indicible et glorieuse, '
  '9':
  - type: note
    content: 'le salut  : autre traduction le salut de vos âmes, litt. le salut des âmes  ; cf. v. 22 ; 2.11,25n  ; 3.20n  ; 4.19n  ; Mt 10.28n  ; Hé 10.39n  ; voir aussi Mc 8.35. –  aboutissement  : litt. fin, cf. Rm 6.22. –  de votre foi  : certains mss portent de la foi  ; cf. Ac 15.11 ; 16.31 ; Ep 2.8.'
  - type: text
    content: tandis que vous obtenez le salut comme aboutissement de votre foi.
  - type: heading
    content: Les prophètes et le salut
