document_id: GEN.49,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob bénit ses douze fils
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 27.27-29,39s ; Dt 33 ; Jg 5. –  dans la suite des temps  : même expression en Nb 24.14 ; Dt 4.30 ; 31.29 ; Jr 23.20 ; 30.24 ; 48.47 ; 49.39 ; Ez 38.16 ; Os 3.5 ; Mi 4.1 ; Dn 2.28 (équivalent araméen) ; 10.14.'
  - type: text
    content: 'Jacob appela ses fils ; il dit :'
  - type: text
    content: Réunissez-vous, et je vous annoncerai ce qui vous arrivera dans la suite des temps.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'sceptre Nb 24.17 ; cf. 21.18 ; Ps 45.7. –  bâton de commandement  : le mot hébreu est de la même famille que celui qui a été traduit par prescription en 47.22,26 ; il vient d''une racine qui signifie graver  ; comme l''indique le parallélisme, il s''agit vraisemblablement ici d''un bâton de chef ; cf. Nb 21.18 ; Ps 60.9 ; 108.9. –  entre ses jambes ou entre ses pieds  ; cf. Ex 4.25n  ; Dt 28.57n. –  Shilo  : le sens de ce mot reste mystérieux ; au prix de diverses modifications du texte hébreu traditionnel, on a compris celui à qui il (le bâton de commandement ?) appartient (on trouve une expression comparable en Ez 21.32) ; celui qui doit être envoyé ; le pacifique ; le dominateur ; son chef ; un cadeau pour lui. Certains comprennent l''ensemble de la phrase différemment  : jusqu''à ce qu''il vienne à Silo ; jusqu''à ce que le tribut lui soit apporté . Cette phrase reçoit traditionnellement une interprétation royale ou messianique. –  peuples lui obéissent  : cf. Ps 2 ; 110. –  Targum (Tg) du pseudo-Jonathan : Rois et princes ne manqueront pas d''entre ceux de la maison de Juda, ni les scribes docteurs de la Loi d''entre sa descendance, jusqu''à ce que vienne le Roi Messie, le dernier de ses fils, à cause de qui les nations fondront de frayeur.'
  - type: text
    content: Le sceptre ne sera pas retiré à Juda,
  - type: text
    content: ni le bâton de commandement qui est entre ses jambes,
  - type: text
    content: jusqu'à ce que vienne Shilo
  - type: text
    content: et que les peuples lui obéissent.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'âne Za 9.9 ; Mt 21.2-7. –  cep de qualité  : cf. Es 5.2n. – Le mot hébreu traduit ici par habit ne se rencontre nulle part ailleurs dans l''A.T. Cf. Es 63.1-6 ; Ap 7.14 ; 19.13. –  sang des raisins Dt 32.14.'
  - type: text
    content: Il attache son âne à la vigne,
  - type: text
    content: le petit de son ânesse à un cep de qualité ;
  - type: text
    content: il lave son vêtement dans le vin,
  - type: text
    content: son habit dans le sang des raisins.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'rouges de vin  : autre traduction troublés par le vin (cf. Pr 23.30n). La viticulture et l''élevage sont les principales ressources de la Judée, moins fertile que les régions du nord.'
  - type: text
    content: Ses yeux sont rouges de vin,
  - type: text
    content: ses dents blanches de lait.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Le nom de Zabulon vient peut-être d'un terme phénicien (de la région de Sidon ) qui signifie le prince, le maître, le seigneur . Cf. 30.20n  ; Dt 33.18s ; Jos 19.10-16 ; voir aussi Jg 5.14,18.
  - type: text
    content: Zabulon demeure sur la côte des mers,
  - type: text
    content: il se tient sur la côte des bateaux,
  - type: text
    content: et ses confins touchent à Sidon.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Issacar 30.18n  ; Dt 33.18s ; Jos 19.17ss ; cf. Jg 5.15s. –  entre les parcs  : traduction incertaine (même terme en Jg 5.16n) ; autre possibilité entre les deux charges du bât  ; d''autres comprennent qui s''assoit sur son arrière-train.'
  - type: text
    content: Issacar est un âne robuste,
  - type: text
    content: qui se couche entre les parcs.
  '15':
  - type: text
    content: ' '
  - type: note
    content: corvée d'esclave Jos 16.10 ; 1R 9.21.
  - type: text
    content: Il a vu que le lieu de repos est bon,
  - type: text
    content: que le pays est agréable.
  - type: text
    content: Il a courbé son épaule sous le fardeau,
  - type: text
    content: il s'est astreint à une corvée d'esclave.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Dan jugera  : hébreu Dân yadîn , cf. 30.6n  ; Dt 33.22 ; Jos 19.40ss ; Jg 5.17.'
  - type: text
    content: Dan jugera son peuple
  - type: text
    content: comme l'une des tribus d'Israël.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Sur le rôle de garde-frontière joué par Dan , cf. Jg 17–18 ; Jr 4.15 ; voir aussi Nb 10.25. –  son cavalier  : autre traduction le conducteur du char.'
  - type: text
    content: Que Dan soit un serpent sur le chemin,
  - type: text
    content: une vipère sur le sentier,
  - type: text
    content: qui mord les talons du cheval
  - type: text
    content: et fait tomber son cavalier à la renverse !
  '18':
  - type: text
    content: ' '
  - type: note
    content: Es 25.9 ; Ps 130.5s.
  - type: text
    content: '– J''espère ton salut, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! –'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'une troupe…  : autre traduction des assaillants l''assaillent, mais c''est lui qui assaillira… Le texte hébreu ( Gad gedoud yegoudénou wehou’ yagoud ‘aqev ) joue sur le nom de Gad . Cf. 30.11 ; Dt 33.20s ; Jos 13.24-28 ; Jg 5.17 ( Galaad , cf. 31.21n). –  ses talons  : litt. le talon.'
  - type: text
    content: Gad, une troupe armée s'attroupe contre lui,
  - type: text
    content: mais c'est lui qui s'attroupera sur ses talons !
  '2':
  - type: text
    content: Rassemblez-vous, écoutez, fils de Jacob !
  - type: text
    content: Ecoutez Israël, votre père !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Aser 30.13n  ; Dt 33.24s ; Jos 19.24ss ; Jg 5.17. –  la nourriture…  : litt. son pain (est) gras.'
  - type: text
    content: Chez Aser, la nourriture est plantureuse ;
  - type: text
    content: il fournira les mets exquis du roi.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Nephtali 30.8 ; Dt 33.23 ; Jg 5.18 ; Jos 19.32ss. –  il prononcera de belles paroles  : d''après l''araméen, l''ougaritique et l''akkadien, on a aussi traduit  : il produira de beaux faons . LXX porte un térébinthe qui croît, produisant de beaux rameaux.'
  - type: text
    content: Nephtali est une biche en plein élan ;
  - type: text
    content: il prononcera de belles paroles.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Tout ce passage présente de nombreuses difficultés de traduction. –  Joseph 30.24 ; Dt 33.13-17 ; Jos 13.29-31 ; 16–17 ; Jg 5.14. –  arbre fertile / muraille (hébreu shour , cf. 16.7n) : certains modifient le texte hébreu traditionnel pour lire vache / taureau (cf. Os 10.11). –  branches  : litt. filles.'
  - type: text
    content: Joseph est le rejeton d'un arbre fertile,
  - type: text
    content: le rejeton d'un arbre fertile près d'une source ;
  - type: text
    content: les branches s'élèvent au-dessus de la muraille.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'ils l''ont visé  : litt. ils ont tiré (à l''arc) . –  qui étaient ses adversaires  : autre traduction l''ont serré de près.'
  - type: text
    content: Ils l'ont provoqué, ils l'ont visé,
  - type: text
    content: les archers qui étaient ses adversaires.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'son arc 48.22n. –  ses bras  : litt. les bras de ses mains , texte incertain. –  l''Indomptable de Jacob  : cette appellation de Dieu, évoquant force, vigueur et fécondité (Es 1.24 ; 49.26 ; 60.16 ; Ps 132.2,5) est presque identique à un mot qui désigne un animal vigoureux, taureau ou étalon (Jg 5.22 ; Es 34.7 ; Jr 8.16 ; 46.15 ; 47.3 ; 50.11 ; Ps 22.13 ; 50.13 ; 68.31) ; dans l''orthographe traditionnelle elle ne s''en distingue que par un point, distinction sans doute introduite tardivement pour éviter une représentation animale de la divinité (cf. Ex 32 ; Nb 23.22 ; 24.8 ; 1R 12.26ss ; Os 8.4ss ; 13.2). Cependant le terme en question peut aussi avoir un sens plus général (p. ex. chef 1S 21.8 ; tyran Jb 24.22n  ; 34.20 ; cf. Es 10.13 ; 46.12 ; Ps 76.6 ; 78.25 ; puissants guerriers Lm 1.15). –  Berger…  : litt. de là (le) berger, (la) pierre d''Israël  ; texte obscur et traduction conjecturale ; on a aussi compris il est (ou tu es , désignant Joseph) devenu le berger, la pierre d''Israël  ; en modifiant la vocalisation traditionnelle du texte hébreu on pourrait lire par le nom du Berger, de la Pierre d''Israël 48.15+. – Le texte a été lu très différemment par les versions anciennes. LXX leurs arcs ont été brisés avec force, les nerfs des bras de leurs mains se sont relâchés, par le Puissant de Jacob. De là celui qui fortifie Israël.'
  - type: text
    content: Mais son arc est resté ferme,
  - type: text
    content: ses bras sont demeurés agiles.
  - type: text
    content: Par les mains de l'Indomptable de Jacob,
  - type: text
    content: – le Berger, la Pierre d'Israël –
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu (hébreu ’El , 21.33n) de ton père 46.1+. –  secours  : cf. 2.18n. –  le Puissant  : hébreu Shaddaï , comme en 17.1n. Ce nom fait ici assonance avec les mots traduits par ciel (ou cieux, shamayim , cf. 1.1n) et seins ( shadayim ). –  abîme 1.2n  ; cf. Ez 31.4. –  étendu v. 9n.'
  - type: text
    content: par le Dieu de ton père – qu'il soit ton secours ! –
  - type: text
    content: avec le Puissant – qu'il te bénisse
  - type: text
    content: des bénédictions du ciel en haut,
  - type: text
    content: des bénédictions de l'abîme étendu en bas,
  - type: text
    content: des bénédictions des seins et du ventre maternels !
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'sur les bénédictions…  : le texte hébreu traditionnel, obscur ( sur les bénédictions de ceux qui m''ont conçu, jusqu''au désir [ou à la splendeur ] des collines d''autrefois  ?), a été modifié d''après LXX. –  sur le crâne…  : cf. Dt 33.16n. –  consacré ou désigné, mis à part , hébreu nazir (cf. Nb 6) ; certains ont vu ici une allusion à la luxuriance de la terre d''Ephraïm, comparée aux cheveux du nazir qui poussaient librement.'
  - type: text
    content: Les bénédictions de ton père l'emportent
  - type: text
    content: sur les bénédictions des montagnes d'antan,
  - type: text
    content: sur le désir des collines d'autrefois ;
  - type: text
    content: qu'elles soient sur la tête de Joseph,
  - type: text
    content: sur le crâne de celui qui a été consacré parmi ses frères !
  '27':
  - type: text
    content: ' '
  - type: note
    content: Benjamin 35.18 ; Dt 33.12 ; Jos 18.11ss ; Jg 3.15-23 ; 5.14 ; 19–21 ; 2S 21.5. –  carnassier v. 9n.
  - type: text
    content: Benjamin est un loup carnassier ;
  - type: text
    content: le matin, il dévore la proie ;
  - type: text
    content: le soir, il partage le butin.
  '28':
  - type: text
    content: Ce sont là les douze tribus d'Israël ; voilà ce que leur père leur dit en les bénissant. Il les bénit, chacun d'une bénédiction particulière.
  - type: heading
    content: Mort de Jacob
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'être réuni…  : cf. 25.8n. –  grotte… 23.8-20.'
  - type: text
    content: 'Puis il leur donna cet ordre : Je vais être réuni aux miens ; ensevelissez-moi avec mes pères, dans la grotte du champ d''Ephrôn, le Hittite, '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ruben 29.32 ; Dt 33.6 ; Jos 13.15-23 ; Jg 5.15s. –  prémices de ma vigueur  : cf. Dt 21.17.'
  - type: text
    content: Ruben, tu es mon premier-né,
  - type: text
    content: ma force, les prémices de ma vigueur ;
  - type: text
    content: supérieur en dignité et supérieur en puissance,
  '30':
  - type: text
    content: 'dans la grotte du champ de Makpéla, près de Mamré, en Canaan, le champ qu''Abraham a acheté à Ephrôn, le Hittite, comme propriété funéraire. '
  '31':
  - type: note
    content: 25.8-10.
  - type: text
    content: 'Là, on a enseveli Abraham et Sara, sa femme ; là, on a enseveli Isaac et Rébecca, sa femme ; et là, j''ai enseveli Léa. '
  '32':
  - type: text
    content: 'Le champ et la grotte qui s''y trouve ont été achetés aux Hittites. '
  '33':
  - type: note
    content: il ramena et fut réuni traduisent deux formes du même verbe hébreu (v. 29n) ; cf. 47.31.
  - type: text
    content: Lorsque Jacob eut achevé de donner ses ordres à ses fils, il ramena ses pieds sur le lit ; il expira et fut réuni aux siens.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'en y montant  : litt. il est monté  ; plusieurs versions anciennes ont lu la 2e personne tu es monté . Cf. 35.22.'
  - type: text
    content: impétueux comme les eaux, tu n'auras pas la supériorité,
  - type: text
    content: 'car tu es monté sur la couche de ton père :'
  - type: text
    content: tu as alors profané mon lit en y montant.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Siméon / Lévi 29.33s ; Dt 33.8-11. –  violence 34.25ss.
  - type: text
    content: Siméon et Lévi sont frères ;
  - type: text
    content: leurs glaives sont des armes de violence.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Que je… ou, plus littéralement, que ma vie (ou mon être , cf. 1.20n) n''entre pas… que ma gloire ne s''unisse pas… En hébreu, le mot correspondant à gloire est proche de celui qui désigne le foie et peut aussi désigner l''individu. Ma vie et ma gloire sont des équivalents poétiques du pronom je , particulièrement fréquents dans les Psaumes (7.6n  ; 16.9 ; 30.13 ; 57.9 ; 108.2 ; cf. 103.1n). –  des hommes  : autre traduction un homme , mais le singulier a plus probablement un sens collectif. –  coupé les jarrets  : cf. 2S 8.4.'
  - type: text
    content: Que je n'entre pas dans leurs complots,
  - type: text
    content: que je ne m'unisse pas à leur assemblée !
  - type: text
    content: Car, dans leur colère, ils ont tué des hommes
  - type: text
    content: et dans leur caprice, ils ont coupé les jarrets des bœufs.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'diviserai / disperserai  : la tribu de Siméon n''a pour territoire que des possessions réparties en Juda (Jos 19.1-9). En vertu de leur rôle sacerdotal, les lévites n''ont pas du tout de territoire (Jos 13.14) : ils sont disséminés parmi les tribus (Dt 12.12) et dans certaines villes qui leur sont attribuées (Jos 21.3ss).'
  - type: text
    content: Maudite soit leur colère, car elle est violente,
  - type: text
    content: et leur emportement, car il est cruel !
  - type: text
    content: Je les diviserai en Jacob,
  - type: text
    content: je les disperserai en Israël.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Juda / te célébreront  : hébreu Yehouda / yodouka , cf. 29.35n  ; Dt 33.7 ; Jos 15. –  se prosterneront  : cf. 27.29 ; 37.7-10.'
  - type: text
    content: Juda, tes frères te célébreront ;
  - type: text
    content: ta main sera sur la nuque de tes ennemis ;
  - type: text
    content: les fils de ton père se prosterneront devant toi.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Nb 23.24 ; 24.9 ; Dt 33.20 ; Ez 19.1-9 ; Ap 5.5. –  du carnage  : autre traduction du cadavre de sa proie  ; terme apparenté au verbe traduit par carnassier au v. 27, par déchiqueter en 31.39 ; 37.33 ; 44.28. –  il se couche v. 14 ; le même verbe est traduit par étendu au v. 25 ; cf. 4.7n ( tapi ).'
  - type: text
    content: Juda est un jeune lion.
  - type: text
    content: Tu remontes du carnage, mon fils !
  - type: text
    content: Il s'accroupit, il se couche comme un lion,
  - type: text
    content: 'comme une lionne : qui le fera lever ?'
