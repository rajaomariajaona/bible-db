    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 27.27-29,39s ; Dt 33 ; Jg 5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la suite des temps
    - type: usfm
      marker: ft
