      children:
      - type: text
        text: ' : même expression en Nb 24.14 ; Dt 4.30 ; 31.29 ; Jr 23.20 ; 30.24 ; 48.47 ; 49.39 ; Ez 38.16 ; Os 3.5 ; Mi 4.1 ; Dn 2.28 (équivalent araméen) ; 10.14.'
    marker-yv: yv-n
  - type: text
    text: 'Jacob appela ses fils ; il dit :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Réunissez-vous, et je vous annoncerai ce qui vous arrivera dans la suite des temps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rassemblez-vous, écoutez, fils de Jacob !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ecoutez Israël, votre père !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ruben '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '29.32 ; Dt 33.6 ; Jos 13.15-23 ; Jg 5.15s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prémices de ma vigueur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Dt 21.17.'
    marker-yv: yv-n
  - type: text
    text: Ruben, tu es mon premier-né,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma force, les prémices de ma vigueur ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: supérieur en dignité et supérieur en puissance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en y montant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il est monté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; plusieurs versions anciennes ont lu la 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' personne '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu es monté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. 35.22.
    marker-yv: yv-n
  - type: text
    text: impétueux comme les eaux, tu n'auras pas la supériorité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car tu es monté sur la couche de ton père :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as alors profané mon lit en y montant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
