  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Siméon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Lévi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '29.33s ; Dt 33.8-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'violence '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 34.25ss.
    marker-yv: yv-n
  - type: text
    text: Siméon et Lévi sont frères ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs glaives sont des armes de violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que je… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, plus littéralement, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que ma vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon être
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'n''entre pas… que ma '
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
      - type: text
        text: ' ne s''unisse pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, le mot correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'gloire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est proche de celui qui désigne le foie et peut aussi désigner l''individu. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ma vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ma gloire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont des équivalents poétiques du pronom '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', particulièrement fréquents dans les Psaumes (7.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 16.9 ; 30.13 ; 57.9 ; 108.2 ; cf. 103.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un homme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais le singulier a plus probablement un sens collectif. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: coupé les jarrets
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2S 8.4.'
    marker-yv: yv-n
  - type: text
    text: Que je n'entre pas dans leurs complots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que je ne m'unisse pas à leur assemblée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car, dans leur colère, ils ont tué des hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans leur caprice, ils ont coupé les jarrets des bœufs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'diviserai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: disperserai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la tribu de Siméon n''a pour territoire que des possessions réparties en Juda (Jos 19.1-9). En vertu de leur rôle sacerdotal, les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
      - type: text
        text: ' n''ont pas du tout de territoire (Jos 13.14) : ils sont disséminés parmi les tribus (Dt 12.12) et dans certaines villes qui leur sont attribuées (Jos 21.3ss).'
    marker-yv: yv-n
  - type: text
    text: Maudite soit leur colère, car elle est violente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur emportement, car il est cruel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les diviserai en Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les disperserai en Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Juda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: te célébreront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yehouda / yodouka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 29.35'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 33.7 ; Jos 15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se prosterneront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 27.29 ; 37.7-10.'
    marker-yv: yv-n
  - type: text
    text: Juda, tes frères te célébreront ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta main sera sur la nuque de tes ennemis ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fils de ton père se prosterneront devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nb 23.24 ; 24.9 ; Dt 33.20 ; Ez 19.1-9 ; Ap 5.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du carnage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du cadavre de sa proie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; terme apparenté au verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'carnassier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 27, par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'déchiqueter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 31.39 ; 37.33 ; 44.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il se couche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 14 ; le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'étendu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 25 ; cf. 4.7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' ('
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tapi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: Juda est un jeune lion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu remontes du carnage, mon fils !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s'accroupit, il se couche comme un lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'comme une lionne : qui le fera lever ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sceptre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nb 24.17 ; cf. 21.18 ; Ps 45.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bâton de commandement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot hébreu est de la même famille que celui qui a été traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'prescription '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 47.22,26 ; il vient d''une racine qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: graver
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; comme l''indique le parallélisme, il s''agit vraisemblablement ici d''un bâton de chef ; cf. Nb 21.18 ; Ps 60.9 ; 108.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'entre ses jambes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: entre ses pieds
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Ex 4.25
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 28.57'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shilo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le sens de ce mot reste mystérieux ; au prix de diverses modifications du texte hébreu traditionnel, on a compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'celui à qui il (le bâton de commandement ?) appartient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(on trouve une expression comparable en Ez 21.32) ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'celui qui doit être envoyé ; le pacifique ; le dominateur ; son chef ; un cadeau pour lui. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certains comprennent l'ensemble de la phrase différemment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'à ce qu'il vienne à Silo ; jusqu'à ce que le tribut lui soit apporté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Cette phrase reçoit traditionnellement une interprétation royale ou messianique. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: peuples lui obéissent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ps 2 ; 110. –  '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Targum '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
