    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.1ss ; Lv 14.53 ; Dt 21.18ss ; 22.21,24 ; Jos 7.25 ; 1R 21.13 ; Ac 7.58 ; Hé 13.13 ; voir aussi Lv 20.2,27 ; 24.14,16,23 ; Dt 13.10s ; 17.5ss.'
    marker-yv: yv-n
  - type: text
    text: 'Toute la communauté le fit sortir du camp et le lapida ; ainsi il mourut, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné à Moïse.'
