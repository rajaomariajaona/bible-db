  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : Cet homme sera mis à mort ; toute la communauté le lapidera hors du camp. '
  - type: usfm
    marker: v
