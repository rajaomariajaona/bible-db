  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lv 4–5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Si vous faites une erreur
    - type: usfm
      marker: ft
      children:
      - type: text
