document_id: NUM.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les offrandes de farine, d'huile et de vin
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: Cf. 28.7.
  - type: text
    content: 'et tu présenteras une libation d''un demi-hîn de vin : c''est une offrande consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'On fera ainsi pour chaque taureau, pour chaque bélier, pour chaque mouton comme pour chaque chèvre. '
  '12':
  - type: text
    content: 'Vous ferez ainsi pour chacun des sacrifices, d''après leur nombre. '
  '13':
  - type: text
    content: 'Tout autochtone fera ainsi ces offrandes, lorsqu''il présentera une offrande consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '14':
  - type: note
    content: Voir générations.
  - type: text
    content: 'Si, dans toutes vos générations, un immigré séjourne chez vous ou se trouve au milieu de vous et qu''il fasse une offrande consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', il la fera de la même manière que vous. '
  '15':
  - type: note
    content: 'pour toute l''assemblée  : traduction conjecturale ; le terme hébreu correspondant à pour toute l''assemblée est isolé tout au début du v. ; certaines versions anciennes l''ont omis, d''autres l''ont rattaché au v. 14  : comme vous faites, ainsi fera l''assemblée [du Seigneur]. –  pour celui qui séjourne en immigré  : litt. pour l''immigré qui séjourne, le sujet et son complément étant apparentés en hébreu ; cf. v. 16,26,29s ; 9.14 ; Ex 12.48ns ; Lv 24.22. –  prescription  : voir loi.'
  - type: text
    content: 'Il y aura une même prescription pour toute l''assemblée, pour vous et pour celui qui séjourne en immigré ; c''est une prescription perpétuelle, pour toutes vos générations ; il en sera de l''immigré comme de vous devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '16':
  - type: text
    content: Il y aura une seule loi, une même règle pour vous et pour les immigrés qui séjournent parmi vous.
  - type: heading
    content: L'offrande des premiers pains
  '17':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '18':
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Quand vous serez arrivés dans le pays où je vous fais entrer, '
  '19':
  - type: note
    content: 'prélèvement  : cf. 5.9+ ; Dt 26.1ss.'
  - type: text
    content: 'et que vous mangerez du pain de ce pays, vous ferez un prélèvement pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '2':
  - type: note
    content: 'où vous allez habiter  : litt. de vos lieux d''habitation  ; les offrandes végétales et les libations décrites dans la suite conviennent particulièrement à la vie sédentaire ; cf. v. 17ss ; Lv 23.10.'
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Quand vous serez entrés dans le pays où vous allez habiter, le pays que je vous donne, '
  '20':
  - type: note
    content: 'les prémices Ex 23.19. –  de votre pâte  : autres traductions de vos pétrins, de vos fournées ou de vos huches  ; le terme correspondant ne revient qu''en Ez 44.30 et en Né 10.38 ; cf. Rm 11.16.'
  - type: text
    content: 'Vous prélèverez un gâteau, les prémices de votre pâte ; vous le prélèverez comme ce qu''on prélève de l''aire. '
  '21':
  - type: text
    content: 'Vous donnerez les prémices de votre pâte en prélèvement pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans toutes vos générations.'
  - type: heading
    content: Les sacrifices pour un péché involontaire
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lv 4–5. –  Si vous faites une erreur  : cf. v. 28-30n  ; Lv 4.2nss,13n  ; 5.15ss ; Jos 20.3ss ; Ec 5.5 ; 10.5 ; voir aussi Lc 23.34. –  en ne mettant pas en pratique…  : litt. en ne faisant pas tous ces commandements que YHWH a dits à Moïse.'
  - type: text
    content: 'Si vous faites une erreur, en ne mettant pas en pratique tous ces commandements que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a donnés à Moïse, '
  '23':
  - type: note
    content: Voir générations.
  - type: text
    content: 'tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a ordonné par l''intermédiaire de Moïse – depuis le jour où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a donné des commandements, puis dans toutes vos générations – '
  '24':
  - type: note
    content: 'par erreur 35.11,15 ; Lv 4.2n. –  sans que la communauté…  : litt. (loin) des yeux de la communauté  ; cf. 5.13n  ; Lv 4.13. –  offrira v. 8n. –  un taureau 7.15+. –  sacrifice pour le péché  : cf. 7.16 ; 18.9s ; Lv 4.14,23s.'
  - type: text
    content: 'si la chose a eu lieu par erreur, sans que la communauté s''en soit aperçue, toute la communauté offrira un taureau en holocauste, comme une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec son offrande végétale et sa libation, selon la règle, et un bouc en sacrifice pour le péché. '
  '25':
  - type: note
    content: 'pardonné  : cf. 14.18s ; Ex 34.9 ; Lv 4.20 ; 5.10 ; Dt 29.19 ; 1R 8.30.'
  - type: text
    content: 'Le prêtre fera l''expiation sur toute la communauté des Israélites, et il leur sera pardonné. Car c''était une erreur, et ils ont apporté leur présent en offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ainsi que leur sacrifice pour le péché devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', à cause de leur erreur. '
  '26':
  - type: note
    content: 'une erreur  : litt. par erreur, cf. v. 24.'
  - type: text
    content: Il sera pardonné à toute la communauté des Israélites et aux immigrés qui séjournent au milieu d'eux, car pour tout le peuple c'était une erreur.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Lv 4.27ss.
  - type: text
    content: 'Si c''est une seule personne qui a péché par erreur, elle présentera une chèvre d''un an en sacrifice pour le péché. '
  '28':
  - type: note
    content: 'devant le Seigneur  : ces mots pourraient aussi être rattachés à ce qui précède  : le prêtre fera l''expiation devant le Seigneur pour l''égaré…  ; cf. Lv 4.2 ; 5.18s ; 14.22ss ; 16.13ss.'
  - type: text
    content: 'Le prêtre fera l''expiation sur l''égaré qui a péché par erreur devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; quand il aura fait l''expiation sur lui, il lui sera pardonné. '
  '29':
  - type: note
    content: 'une même loi  : cf. v. 15s.'
  - type: text
    content: 'Pour ce qui est fait par erreur, il y aura une même loi pour l''autochtone parmi les Israélites et pour l''immigré qui séjourne au milieu d''eux. '
  '3':
  - type: note
    content: Cf. Ex 18.12 ; 24.5 ; 29.18 ; Lv 6.13 ; 7.12nss ; 8.21 ; 22.21 ; 1R 8.5 ; 2Ch 29.33.
  - type: text
    content: 'et que vous ferez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' une offrande consumée par le feu, soit un holocauste, soit un sacrifice pour vous acquitter d''un vœu ou en offrande volontaire, ou bien lors de vos rencontres festives, en prenant sur le gros bétail ou sur le petit bétail afin de faire une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '30':
  - type: note
    content: 'd''une manière délibérée  : litt. à main levée  ; cf. v. 32ss ; 33.3n  ; Ex 14.8n  ; voir aussi Nb 35.11ss ; Dt 17.12 ; Jos 20.3ss ; cf. Règle de la Communauté (Qumrân) 8.21ss : « Tout homme… qui transgressera un point quelconque de la Loi de Moïse, délibérément ou par relâchement, on le chassera du Conseil de la Communauté, et il ne reviendra plus… Mais si c''est par inadvertance qu''il a agi, il sera séparé… durant deux ans jour pour jour… pour une seule inadvertance, il sera puni deux ans ; mais, quant à celui qui aura agi délibérément, il ne reviendra plus. » –  il injurie ou il blasphème  ; LXX il irrite  ; cf. 2S 12.9. –  retranché  : cf. 9.13 ; 14.37 ; Gn 17.14n  ; Lv 7.20n  ; Dt 2.15.'
  - type: text
    content: 'Mais si quelqu''un parmi les autochtones ou parmi les immigrés agit d''une manière délibérée, il injurie le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; celui-là sera retranché du sein de son peuple : '
  '31':
  - type: note
    content: 'retranché  : selon certains la tournure employée ici aurait une nuance intensive, il sera retranché sans faute ou il sera définitivement retranché  ; cf. Mt 12.31s/ / ; Hé 10.'
  - type: text
    content: 'il a méprisé la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et il a violé son commandement ; celui-là sera retranché, sa faute est sur lui.'
  - type: heading
    content: Un cas de violation du sabbat
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 30s ; sur l''extension ou l''adaptation de la loi à des cas imprévus, cf. 9.6ss ; 27.1ss ; 36.1ss ; Lv 24.10ss. –  qui ramassait du bois…  : cf. Ex 20.8ss ; 31.12ss ; 35.2s ; Jr 17.24ss ; Ez 20.12s ; Mt 12.1ss/ /. – Voir sabbat.'
  - type: text
    content: 'Comme les Israélites étaient dans le désert, on trouva un homme qui ramassait du bois le jour du sabbat. '
  '33':
  - type: text
    content: 'Ceux qui l''avaient trouvé en train de ramasser du bois le présentèrent devant Moïse, Aaron et toute la communauté. '
  '34':
  - type: note
    content: 'aucune décision…  : cf. Lv 24.12 ; Né 8.8n.'
  - type: text
    content: 'On le plaça sous bonne garde, car aucune décision n''avait été prise sur ce qu''on devait lui faire. '
  '35':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Cet homme sera mis à mort ; toute la communauté le lapidera hors du camp. '
  '36':
  - type: note
    content: 'le fit sortir…  : cf. 5.1ss ; Lv 14.53 ; Dt 21.18ss ; 22.21,24 ; Jos 7.25 ; 1R 21.13 ; Ac 7.58 ; Hé 13.13 ; voir aussi Lv 20.2,27 ; 24.14,16,23 ; Dt 13.10s ; 17.5ss.'
  - type: text
    content: 'Toute la communauté le fit sortir du camp et le lapida ; ainsi il mourut, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  - type: heading
    content: La houppe des vêtements
  '37':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '38':
  - type: note
    content: 'Voir générations. –  une houppe ou une frange  ; le même mot désigne une mèche ou une touffe de cheveux en Ez 8.3 ; cf. Dt 22.12 ; Mt 9.20 ; 14.36 ; 23.5 ; Mc 6.56 ; Lc 8.44. –  un cordon de pourpre violette  : cf. Ex 25.4n  ; 28.28,37 ; 39.21,31 ; voir aussi Jos 2.18.'
  - type: text
    content: 'Parle aux Israélites ; tu leur diras que dans toutes leurs générations ils se fassent une houppe aux pans de leurs vêtements, et qu''ils mettent un cordon de pourpre violette à cette houppe sur le pan de leurs vêtements. '
  '39':
  - type: note
    content: 'commandements  : voir loi. –  vous ne suivrez pas…  : litt. vous n''explorerez pas (même verbe au chap. 13) derrière votre cœur et derrière vos yeux derrière lesquels vous vous prostituez  ; cf. 14.33+.'
  - type: text
    content: 'Ce sera votre houppe ; vous la regarderez et vous vous souviendrez de tous les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour les mettre en pratique ; vous ne suivrez pas les désirs de votre cœur et de vos yeux, avec lesquels vous vous prostituez. '
  '4':
  - type: note
    content: 'offrande végétale  : cf. 5.15 ; Lv 2.1ss ; 6.7ss ; 7.10 ; voir aussi 5.11ss ; Gn 4.3ss. Sur l''association des offrandes végétales et des libations (de vin) aux sacrifices (d''animaux), voir Ex 29.40s ; Lv 23.13,18 ; 2R 16.13ss ; Ez 45.17 ; Os 9.4 ; Esd 7.17 ; 1Ch 29.21 ; 2Ch 29.35 ; cf. Lv 14.10,20s ; Ez 45.24 ; 46.4ss ; voir aussi Ph 2.17 ; Col 1.24 ; 2Tm 4.6 ; cf. Siracide 50.14ss : « (Le grand prêtre Simon) disposait l''offrande du Très-Haut, Tout-Puissant ; il étendait la main sur la coupe et versait la libation du sang de la grappe, il la répandait à la base de l''autel (cf. v. 10 ; Lv 1.5), parfum apaisant pour le Très-Haut, Roi de l''univers. Alors les fils d''Aaron poussaient des cris, sonnaient de leur trompette de métal battu (Nb 10) et faisaient entendre un grand bruit, en mémorial devant le Très-Haut. » –  un dixième d''épha selon toute vraisemblance, soit environ 4,5 l. –  un quart de hîn d''huile  : environ 1,80 l. Sur ces chiffres, cf. 28.7,12ss,20,28 ; 29.3s,9,14 ; Ex 29.40s.'
  - type: text
    content: 'celui qui offrira son présent au '
  - type: text
    content: Seigneur
  - type: text
    content: ' présentera une offrande végétale d''un dixième de fleur de farine pétrie dans un quart de hîn d''huile, '
  '40':
  - type: note
    content: 'vous serez saints…  : cf. Lv 11.45 ; 19.2 ; 20.7s,26 ; 21.6.'
  - type: text
    content: 'Vous vous souviendrez ainsi de tous mes commandements et vous les mettrez en pratique : vous serez saints pour votre Dieu. '
  '41':
  - type: note
    content: 'pour être (ou devenir) votre Dieu  : cf. Lv 25.38 ; 26.12 ; voir aussi Ex 20.2 ; Lv 22.33 ; 26.45. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu ; c''est moi qui vous ai fait sortir d''Egypte pour être votre Dieu. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '5':
  - type: note
    content: libation… Lv 23.12s. –  mouton Lv 1.10 ; 3.7 ; 4.32.
  - type: text
    content: 'et tu offriras une libation d''un quart de hîn de vin, avec l''holocauste ou le sacrifice, pour chaque mouton. '
  '6':
  - type: note
    content: 'bélier Lv 5.15,18,25. –  deux dixièmes  : environ 9 l. –  un tiers de hîn  : environ 2,50 l.'
  - type: text
    content: 'Pour un bélier, tu feras une offrande végétale de deux dixièmes de fleur de farine pétrie dans un tiers de hîn d''huile, '
  '7':
  - type: text
    content: 'et une libation d''un tiers de hîn de vin ; tu présenteras cela comme une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: note
    content: 'Si tu offres  : litt. si tu fais  ; cf. v. 3,12 ; de même au v. 24. –  un bovin  : même terme en Gn 18.7ns (veau) ; cf. Lv 1.5n. –  sacrifice (le terme correspondant est ici sous-entendu dans le texte) de paix Lv 3.1n.'
  - type: text
    content: 'Si tu offres un bovin, soit en holocauste, soit en sacrifice pour t''acquitter d''un vœu, ou en sacrifice de paix au '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '9':
  - type: note
    content: 'on présentera  : litt. il présentera. –  trois dixièmes  : environ 13,5 l. –  un demi-hîn  : environ 3,75 l.'
  - type: text
    content: 'on présentera, avec le bovin, une offrande végétale de trois dixièmes de fleur de farine pétrie dans un demi-hîn d''huile, '
