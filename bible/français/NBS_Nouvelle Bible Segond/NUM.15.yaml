    marker-yv: yv-n
  - type: text
    text: 'Le prêtre fera l''expiation sur toute la communauté des Israélites, et il leur sera pardonné. Car c''était une erreur, et ils ont apporté leur présent en offrande consumée par le feu pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ainsi que leur sacrifice pour le péché devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', à cause de leur erreur. '
