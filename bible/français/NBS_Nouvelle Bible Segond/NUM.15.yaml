  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: où vous allez habiter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de vos lieux d'habitation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; les offrandes végétales et les libations décrites dans la suite conviennent particulièrement à la vie sédentaire ; cf. v. 17ss ; Lv 23.10.'
    marker-yv: yv-n
  - type: text
    text: 'Parle aux Israélites ; tu leur diras : Quand vous serez entrés dans le pays où vous allez habiter, le pays que je vous donne, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ex 18.12 ; 24.5 ; 29.18 ; Lv 6.13 ; 7.12
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss ; 8.21 ; 22.21 ; 1R 8.5 ; 2Ch 29.33.
    marker-yv: yv-n
  - type: text
    text: 'et que vous ferez au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' une offrande consumée par le feu, soit un holocauste, soit un sacrifice pour vous acquitter d''un vœu ou en offrande volontaire, ou bien lors de vos rencontres festives, en prenant sur le gros bétail ou sur le petit bétail afin de faire une odeur agréable pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: offrande végétale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.15 ; Lv 2.1ss ; 6.7ss ; 7.10 ; voir aussi 5.11ss ; Gn 4.3ss. Sur l''association des offrandes végétales et des libations (de vin) aux sacrifices (d''animaux), voir Ex 29.40s ; Lv 23.13,18 ; 2R 16.13ss ; Ez 45.17 ; Os 9.4 ; Esd 7.17 ; 1Ch 29.21 ; 2Ch 29.35 ; cf. Lv 14.10,20s ; Ez 45.24 ; 46.4ss ; voir aussi Ph 2.17 ; Col 1.24 ; 2Tm 4.6 ; cf. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '50.14ss : « (Le grand prêtre Simon) disposait l''offrande du Très-Haut, Tout-Puissant ; il étendait la main sur la coupe et versait la libation du sang de la grappe, il la répandait à la base de l''autel (cf. v. 10 ; Lv 1.5), parfum apaisant pour le Très-Haut, Roi de l''univers. Alors les fils d''Aaron poussaient des cris, sonnaient de leur trompette de métal battu (Nb 10) et faisaient entendre un grand bruit, en mémorial devant le Très-Haut. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un dixième '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd''épha selon toute vraisemblance, soit environ 4,5 l. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un quart de hîn d'huile
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 1,80 l. Sur ces chiffres, cf. 28.7,12ss,20,28 ; 29.3s,9,14 ; Ex 29.40s.'
    marker-yv: yv-n
  - type: text
    text: 'celui qui offrira son présent au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' présentera une offrande végétale d''un dixième de fleur de farine pétrie dans un quart de hîn d''huile, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'libation… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 23.12s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mouton '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lv 1.10 ; 3.7 ; 4.32.
    marker-yv: yv-n
  - type: text
    text: 'et tu offriras une libation d''un quart de hîn de vin, avec l''holocauste ou le sacrifice, pour chaque mouton. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bélier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 5.15,18,25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux dixièmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 9 l. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un tiers de hîn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 2,50 l.'
    marker-yv: yv-n
  - type: text
    text: 'Pour un bélier, tu feras une offrande végétale de deux dixièmes de fleur de farine pétrie dans un tiers de hîn d''huile, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et une libation d''un tiers de hîn de vin ; tu présenteras cela comme une odeur agréable pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Si tu offres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si tu fais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 3,12 ; de même au v. 24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un bovin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même terme en Gn 18.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: veau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; cf. Lv 1.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifice
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le terme correspondant est ici sous-entendu dans le texte) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lv 3.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si tu offres un bovin, soit en holocauste, soit en sacrifice pour t''acquitter d''un vœu, ou en sacrifice de paix au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on présentera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il présentera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trois dixièmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 13,5 l. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un demi-hîn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 3,75 l.'
    marker-yv: yv-n
  - type: text
    text: 'on présentera, avec le bovin, une offrande végétale de trois dixièmes de fleur de farine pétrie dans un demi-hîn d''huile, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 28.7.
    marker-yv: yv-n
  - type: text
    text: 'et tu présenteras une libation d''un demi-hîn de vin : c''est une offrande consumée par le feu, une odeur agréable pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On fera ainsi pour chaque taureau, pour chaque bélier, pour chaque mouton comme pour chaque chèvre. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vous ferez ainsi pour chacun des sacrifices, d''après leur nombre. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tout autochtone fera ainsi ces offrandes, lorsqu''il présentera une offrande consumée par le feu, une odeur agréable pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: générations
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si, dans toutes vos générations, un immigré séjourne chez vous ou se trouve au milieu de vous et qu''il fasse une offrande consumée par le feu, une odeur agréable pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', il la fera de la même manière que vous. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour toute l'assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction conjecturale ; le terme hébreu correspondant à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour toute l''assemblée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est isolé tout au début du v. ; certaines versions anciennes l'ont omis, d'autres l'ont rattaché au v. 14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme vous faites, ainsi fera l'assemblée [du Seigneur]
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour celui qui séjourne en immigré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour l'immigré qui séjourne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', le sujet et son complément étant apparentés en hébreu ; cf. v. 16,26,29s ; 9.14 ; Ex 12.48'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's ; Lv 24.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prescription
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il y aura une même prescription pour toute l''assemblée, pour vous et pour celui qui séjourne en immigré ; c''est une prescription perpétuelle, pour toutes vos générations ; il en sera de l''immigré comme de vous devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il y aura une seule loi, une même règle pour vous et pour les immigrés qui séjournent parmi vous.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'offrande des premiers pains
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
