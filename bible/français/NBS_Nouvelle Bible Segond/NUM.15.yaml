    marker-yv: yv-n
  - type: text
    text: 'si la chose a eu lieu par erreur, sans que la communauté s''en soit aperçue, toute la communauté offrira un taureau en holocauste, comme une odeur agréable pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
