    - type: text
      text: '18'
  - type: text
    text: 'Parle aux Israélites ; tu leur diras : Quand vous serez arrivés dans le pays où je vous fais entrer, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prélèvement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.9+ ; Dt 26.1ss.'
    marker-yv: yv-n
  - type: text
    text: 'et que vous mangerez du pain de ce pays, vous ferez un prélèvement pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les prémices '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 23.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de votre pâte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de vos pétrins, de vos fournées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de vos huches
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme correspondant ne revient qu''en Ez 44.30 et en Né 10.38 ; cf. Rm 11.16.'
    marker-yv: yv-n
  - type: text
    text: 'Vous prélèverez un gâteau, les prémices de votre pâte ; vous le prélèverez comme ce qu''on prélève de l''aire. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Vous donnerez les prémices de votre pâte en prélèvement pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', dans toutes vos générations.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les sacrifices pour un péché involontaire
  marker-yv: yv-h
