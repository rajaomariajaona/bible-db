  - type: text
    text: 'Comme les Israélites étaient dans le désert, on trouva un homme qui ramassait du bois le jour du sabbat. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ceux qui l''avaient trouvé en train de ramasser du bois le présentèrent devant Moïse, Aaron et toute la communauté. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aucune décision…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 24.12 ; Né 8.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'On le plaça sous bonne garde, car aucune décision n''avait été prise sur ce qu''on devait lui faire. '
  - type: usfm
    marker: v
    metadata:
