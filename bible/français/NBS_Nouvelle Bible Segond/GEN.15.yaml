document_id: GEN.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu fait alliance avec Abram
  - type: text
    content: ' '
  - type: note
    content: 'parvint à  : litt. fut vers  ; la formule correspondante et une autre, synonyme (litt. fut sur ), servent très souvent à décrire l''inspiration des prophètes (cf. Jr 1.2 etc.). –  N''aie pas peur  : 21.17 ; 26.24 ; 35.17 ; 46.2 ; voir crainte. –  bouclier Dt 33.29 ; Ps 18.3 ; 84.12. –  ta récompense  : litt. ton salaire (comme en 30.32s) ; autre traduction ton butin (cf. Gn 14). On pourrait aussi comprendre le dernier terme comme une apposition au premier et traduire je suis moi-même ton bouclier, ta récompense très grande.'
  - type: text
    content: 'Après cela, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Abram, dans une vision : N''aie pas peur, Abram ! Je suis moi-même ton bouclier ; ta récompense sera très grande. '
  '10':
  - type: note
    content: 'V. 17n. –  Il prit  : litt. il prit pour lui (cf. v. 9) ; autre traduction il se procura  ; cf. 7.2n. –  tous ces animaux  : litt. tous ceux-ci. –  oiseaux  : cf. Lv 1.17.'
  - type: text
    content: 'Il prit tous ces animaux, les coupa par le milieu et mit chaque moitié l''une en face de l''autre ; mais il ne partagea pas les oiseaux. '
  '11':
  - type: note
    content: 's''abattirent  : litt. descendirent  ; autre traduction descendaient.'
  - type: text
    content: 'Les oiseaux de proie s''abattirent sur les cadavres, mais Abram les chassa. '
  '12':
  - type: note
    content: torpeur ou profond sommeil  ; cf. 2.21+ ; Jb 4.12-16 ; LXX traduit par le terme grec qui a donné notre mot extase (même terme en Ac 10.10n).
  - type: text
    content: Au coucher du soleil, une torpeur tomba sur Abram ; une terreur, une obscurité épaisse tombait sur lui.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ac 7.6s . –  tes descendants  : litt. ta descendance , cf. 3.15n  ; 12.7+. –  séjourneront en immigrés  : voir Ex 12.48n. –  on les affligera ou on les maltraitera, on les humiliera , cf. 16.6 ; Ex 1.11. –  quatre cents ans  : cf. Ex 12.40 ; Ga 3.17.'
  - type: text
    content: 'Il dit à Abram : Sache que tes descendants séjourneront en immigrés dans un pays qui n''est pas le leur ; ils y seront esclaves, et on les affligera pendant quatre cents ans. '
  '14':
  - type: note
    content: Ex 2.24. –  de grands biens Ex 3.21s ; 11.2s ; 12.35s.
  - type: text
    content: 'Mais je jugerai la nation dont ils auront été les esclaves, et ils sortiront ensuite avec de grands biens. '
  '15':
  - type: note
    content: 'tu iras…  : litt. tu viendras en paix vers tes pères ou tu entreras en paix chez tes pères, c.-à-d. tu rejoindras tes ancêtres par une mort paisible  ; cf. 25.7s. –  après (litt. dans) une heureuse vieillesse  : le terme correspondant à vieillesse pourrait évoquer, étymologiquement, l''âge des cheveux blancs  ; de même en 25.8 ; cf. 42.38 ; 44.29ss ; voir aussi Jg 8.32 ; 1Ch 29.28.'
  - type: text
    content: 'Toi, tu iras en paix vers tes pères ; tu seras enseveli après une heureuse vieillesse. '
  '16':
  - type: note
    content: 'quatrième génération  : cf. Ex 6.14-25 ; Nb 26.57-59. –  faute  : voir péché. –  des Amorites  : litt. de l''Amorite (10.16n  ; 14.13) ; ce terme désigne ici l''ensemble des habitants de Canaan, pays dont la possession est promise aux descendants d''Abram. Cf. Ez 16.3. –  à son comble  : autre traduction complète.'
  - type: text
    content: A la quatrième génération, ils reviendront ici ; car la faute des Amorites n'est pas encore à son comble.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Dans l''ancien Orient la fumée d''une fournaise pouvait être prise comme un présage de malheur, et les flammes d''une torche comme un signe favorable. Ici la fumée et les flammes représentent le passage de Dieu. Cf. Ex 19.18 ; Lv 9.24+. –  entre les animaux partagés  : litt. entre ces morceaux (v. 10). Ce rite (voir aussi Dt 29.11n  ; Jr 34.18ns) signifie la conclusion d''une alliance. Peut-être les contractants, en passant entre des animaux découpés, reconnaissaient-ils qu''ils subiraient le sort de ces animaux s''ils ne tenaient pas parole ; mais d''autres explications sont possibles.'
  - type: text
    content: 'Quand le soleil fut couché, l''obscurité devint profonde ; alors une fournaise fumante et une torche de feu passèrent entre les animaux partagés. '
  '18':
  - type: note
    content: 'conclut  : litt. trancha ou coupa, selon l''une des formules consacrées pour l''alliance  ; cf. v. 17n  ; 6.18+. –  Je donne ce pays… 12.7+. –  fleuve d''Egypte  : ou bien l''extrémité orientale du delta du Nil, ou bien ce qu''on appelle habituellement l''oued ou le torrent d''Egypte, c.-à-d. le Ouadi el-Arish, au nord-est. –  l''Euphrate 2.14n.'
  - type: text
    content: 'En ce jour-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' conclut une alliance avec Abram en disant : Je donne ce pays à ta descendance ; depuis le fleuve d''Egypte jusqu''au grand fleuve, l''Euphrate, '
  '19':
  - type: note
    content: 'C''est ici le seul endroit où la liste des peuples de Canaan comporte dix noms. –  Caïnites ou Qénites, 4.1n  ; Nb 24.21s. –  Qenizzites (à rapprocher de Qenaz, 36.11ss) / Qadmonites (= « Orientaux ») : populations du sud de la Judée.'
  - type: text
    content: 'le pays des Caïnites, des Qenizzites, des Qadmonites, '
  '2':
  - type: note
    content: 'Seigneur Dieu (hébreu ’Adonaï YHWH) v. 8 ; Dt 3.24 ; 9.26. Dans la tradition juive, le nom divin YHWH est généralement remplacé à la lecture par le mot ’Adonaï, Seigneur (d''où la « traduction » habituelle le Seigneur, cf. 2.4). Lorsqu''il est précédé du mot ’Adonaï en toutes lettres, comme ici, on lui substitue le mot ’Elohim (Dieu, cf. 1.1n), de sorte qu''on lit ’Adonaï ’Elohim, Seigneur Dieu. –  l''héritier  : texte très obscur, litt. le fils des biens ( ?), seul emploi dans l''A.T. du mot hébreu correspondant, qui ressemble au nom Damas. On pourrait aussi comprendre l''intendant. –  c''est Eliézer de Damas  : suivant l''ordre des mots hébreux, on pourrait aussi traduire  : est à Damas : c''est Eliézer. Voir aussi 14.14n.'
  - type: text
    content: 'Abram répondit : Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', que me donneras-tu ? Je m''en vais sans enfant ; l''héritier de ma maison, c''est Eliézer de Damas. '
  '20':
  - type: note
    content: 10.15n  ; 13.7n  ; 14.5n.
  - type: text
    content: 'des Hittites, des Perizzites, des Rephaïtes, '
  '21':
  - type: note
    content: 10.16n  ; la liste s'achève par la mention des habitants de Jérusalem à l'époque de David.
  - type: text
    content: des Amorites, des Cananéens, des Guirgashites et des Jébusites.
  '3':
  - type: note
    content: 'celui qui est né dans  : litt. le fils de. –  sera mon héritier  : litt. héritera (de) moi  ; le verbe hébreu est habituellement traduit par posséder  ; de même aux v. 7s.'
  - type: text
    content: 'Abram dit : Tu ne m''as pas donné de descendance ; c''est celui qui est né dans ma maison qui sera mon héritier. '
  '4':
  - type: note
    content: 'de toi  : litt. de tes entrailles.'
  - type: text
    content: 'Alors la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui parvint : Ce n''est pas lui qui sera ton héritier, mais bien celui qui sortira de toi. '
  '5':
  - type: note
    content: 13.16+ ; Dt 10.22 ; Rm 4.17s  ; Hé 11.12.
  - type: text
    content: 'Il le mena dehors et dit : Contemple le ciel, je te prie, et compte les étoiles, si tu peux les compter. Il lui dit : Ainsi sera ta descendance. '
  '6':
  - type: note
    content: 'mit sa foi… ou crut le Seigneur, fit confiance au Seigneur (c''est de la même racine hébraïque que vient le mot amen, Dt 27.15n) ; cf. Es 7.9 ; 28.16 ; 30.15 ; 65.16n. –  compta  : le verbe signifie calculer et plus généralement estimer, penser (cf. 50.20n) ; cf. Ps 106.31. –  comme justice  : autre traduction comme un acte juste  ; cf. Rm 4.3ss ; Ga 3.6 ; Jc 2.23.'
  - type: text
    content: 'Il mit sa foi dans le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il le lui compta comme justice.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: '11.31 ; 12.1,7 ; Ps 105.11 ; Né 9.7s ; Ac 7.2s. –  quitter Our…  : litt. sortir d''Our…  ; cf. Ex 20.2.'
  - type: text
    content: 'Il lui dit : Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ; c''est moi qui t''ai fait quitter Our-des-Chaldéens pour te donner ce pays en possession. '
  '8':
  - type: text
    content: 'Abram répondit : Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', à quoi saurai-je que j''en prendrai possession ? '
  '9':
  - type: note
    content: une jeune colombe ou, plus généralement, un jeune oiseau  ; le terme ne revient qu'en Dt 32.11 où il désigne les petits de l'aigle (ou du vautour).
  - type: text
    content: 'Il lui dit : Prends pour moi une génisse de trois ans, une chèvre de trois ans, un bélier de trois ans, une tourterelle et une jeune colombe. '
