    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'approchés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(un terme apparenté est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'proches '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 7). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'toute en feu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.23 ; 9.15 ; Ex 3.2 (même expression). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'obscurité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nuée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'épaisse '
    - type: usfm
      marker: ft
