  - type: text
    text: 'Regardez, je vous ai appris des prescriptions et des règles, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', mon Dieu, me l''a ordonné, afin que vous les mettiez en pratique dans le pays où vous entrez pour en prendre possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Vous les observerez…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous les garderez et vous les ferez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; voir aussi 5.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 7.11 ; 11.22 ; 16.12 ; 17.19 ; 19.9 ; 26.16 ; 29.8 ; cf. Lv 8.35'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'intelligent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 19.8 ; Jb 28.28 ; Pr 9.10.
    marker-yv: yv-n
  - type: text
    text: 'Vous les observerez et vous les mettrez en pratique ; ce sera là votre sagesse et votre intelligence aux yeux des peuples qui entendront parler de toutes ces prescriptions ; ils diront : « Cette grande nation est vraiment un peuple sage et intelligent ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 32-34 ; 6.15 ; 7.21 ; 30.14 ; 31.17 ; Ps 145.18 ; 148.14 ; Rm 3.1s. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' (YHWH)'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: noms
      - type: text
        text: ' divins.'
    marker-yv: yv-n
  - type: text
    text: 'Quelle est donc la grande nation qui aurait des dieux aussi proches d''elle que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), notre Dieu, l''est de nous chaque fois que nous l''invoquons ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ps 147.19s. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aujourd''hui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.10+.
    marker-yv: yv-n
  - type: text
    text: Et quelle est la grande nation qui ait des prescriptions et des règles justes, comme toute cette loi que je place devant vous aujourd'hui ?
- type: usfm
  marker: s1
  children:
  - type: text
    text: La révélation au mont Horeb
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
