      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; certains mss grecs ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et une grande voix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui peut aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un grand bruit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 4.36 ; 5.22 ; voir aussi Ex 19.16,19 ; Hé 12.18s.'
    marker-yv: yv-n
  - type: text
    text: 'vous vous êtes présentés, debout, au pied de la montagne. La montagne était toute en feu, jusqu''au cœur du ciel. Il y avait des ténèbres, des nuées, une obscurité épaisse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Nb 12.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jn 5.37 ; Ac 9.7.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' vous a parlé du milieu du feu ; vous avez entendu des paroles, mais vous n''avez pas vu de forme ; il n''y avait qu''une voix. '
