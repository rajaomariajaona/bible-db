document_id: DEU.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mettre en pratique la loi de Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Israël, écoute 5.1 ; 6.4 ; 9.1 ; 20.3 ; 27.9. –  afin que vous viviez 5.33 ; 6.24 ; 8.1 ; 16.20 ; 30.16,19s ; Lv 18.5+ ; Am 5.14. –  que vous entriez en possession…  : autre traduction que vous entriez dans le pays… pour en prendre possession  ; cf. 1.21+ ; 23.21. –  Dieu de vos pères 1.11+. –  vous donne 3.20+.'
  - type: text
    content: 'Maintenant, Israël, écoute les prescriptions et les règles que je vous apprends pour que vous les mettiez en pratique, afin que vous viviez et que vous entriez en possession du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de vos pères, vous donne. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'à l''Horeb  : cf. Ex 3.1n  ; 19.16-20. –  Rassemble  : le verbe correspondant (aussi 31.12,28,30) évoque habituellement l''assemblée cultuelle, cf. 5.22 ; 9.10 ; 10.4 ; 18.16 ; 23.2ss ; voir aussi 29.9-12 ; Jos 24.1. –  me craindre 5.29 ; 6.2,13,24 ; 8.6 ; 10.12,20 ; 13.5 ; 14.23 ; 17.19 ; 28.58 ; 31.12 ; Pr 1.7+. –  à leurs fils 6.7,20-25 ; 11.19 ; 32.46.'
  - type: text
    content: 'Le jour où tu t''es tenu devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, à l''Horeb, lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : « Rassemble auprès de moi le peuple ; je veux leur faire entendre mes paroles, pour qu''ils apprennent à me craindre tous les jours qu''ils vivront sur la terre, et pour qu''ils les apprennent à leurs fils », '
  '11':
  - type: note
    content: 'présentés  : autre traduction approchés (un terme apparenté est traduit par proches au v. 7). –  toute en feu 5.23 ; 9.15 ; Ex 3.2 (même expression). –  obscurité (ou nuée) épaisse Ex 20.21n  ; certains mss grecs ajoutent et une grande voix, ce qui peut aussi signifier un grand bruit  ; cf. Dt 4.36 ; 5.22 ; voir aussi Ex 19.16,19 ; Hé 12.18s.'
  - type: text
    content: 'vous vous êtes présentés, debout, au pied de la montagne. La montagne était toute en feu, jusqu''au cœur du ciel. Il y avait des ténèbres, des nuées, une obscurité épaisse. '
  '12':
  - type: note
    content: Cf. Nb 12.8n  ; Jn 5.37 ; Ac 9.7.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a parlé du milieu du feu ; vous avez entendu des paroles, mais vous n''avez pas vu de forme ; il n''y avait qu''une voix. '
  '13':
  - type: note
    content: '5.6-22 ; 9.9-17 ; 10.4 ; Ex 24.12 ; 31.18 ; 34.28n  ; cf. 2Co 3.3ss. – Voir alliance. –  selon laquelle…  : litt. qu''il vous a ordonné de faire  ; autre traduction qu''il vous a ordonné de mettre en pratique (cf. 29.8).'
  - type: text
    content: 'Il vous a exposé son alliance, l''alliance selon laquelle il vous a ordonné d''agir, les Dix paroles ; il les a écrites sur deux tablettes de pierre. '
  '14':
  - type: note
    content: 'V. 5 ; 6.1. –  m''a ordonné  : cf. v. 2n,40.'
  - type: text
    content: 'En ce temps-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a ordonné de vous apprendre des prescriptions et des règles, afin que vous les mettiez en pratique dans le pays vers lequel vous passez pour en prendre possession.'
  - type: heading
    content: Mise en garde contre les idoles
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 23 ; 5.8 ; Ex 20.4 ; 32.1 ; Rm 1.23.
  - type: text
    content: 'Puisque vous n''avez vu aucune forme le jour où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a parlé du milieu du feu, à l''Horeb, prenez bien garde à vous, '
  '16':
  - type: note
    content: 'effigie  : même terme en Ez 8.3,5 ; 2Ch 33.7,15 ; il désigne soit la forme de la statue soit la divinité représentée. –  d''un homme ou d''une femme  : litt. d''un mâle ou d''une femelle.'
  - type: text
    content: 'de peur que vous ne vous pervertissiez et que vous ne vous fassiez une statue, la forme d''une effigie, quelle qu''elle soit – le modèle d''un homme ou d''une femme, '
  '17':
  - type: text
    content: 'le modèle d''une bête qui est sur la terre, quelle qu''elle soit, le modèle d''un oiseau qui vole dans le ciel, quel qu''il soit, '
  '18':
  - type: note
    content: 'sur la terre  : sur le terme hébreu correspondant, cf. Gn 2.5n.'
  - type: text
    content: 'le modèle d''une bestiole qui fourmille sur la terre, quelle qu''elle soit, le modèle d''un poisson qui est dans les eaux au-dessous de la terre, quel qu''il soit ; '
  '19':
  - type: note
    content: '17.3 ; cf. Gn 2.1 ; 2R 17.16 ; 23.4s ; Jr 8.2 ; Ez 8.16 ; Jb 31.26-28. –  du ciel ou des cieux, cf. Gn 1.1n. –  donnés en partage 29.25 ; cf. 32.8ns ; Jr 10.16 ; 51.19 ; Dn 10.13,20 ; Siracide 17.17 : « A chaque peuple il a préposé un chef, mais Israël est la part du Seigneur. » Jubilés 15.31s : « Nombreuses sont les nations, nombreux les peuples, et tous sont à lui et sur tous il a donné pouvoir à des esprits pour qu''ils les égarent loin de lui, mais sur Israël il n''a pas donné de pouvoir à un ange ni à un esprit : lui seul est leur souverain, c''est lui qui les garde, c''est lui les revendique auprès de ses anges, auprès de ses esprits, auprès de toutes ses puissances, pour les garder et les bénir et pour qu''ils soient à lui et lui à eux, dès maintenant et à jamais. »'
  - type: text
    content: 'de peur que, levant les yeux vers le ciel, et voyant le soleil, la lune et les étoiles, toute l''armée du ciel, tu ne te laisses entraîner à te prosterner devant eux et à les servir : ceux-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, les a donnés en partage à tous les peuples, sous le ciel tout entier. '
  '2':
  - type: note
    content: 'Vous n''ajouterez rien 5.22 ; 13.1 ; Pr 30.6 ; Ec 3.14 ; Ap 22.18s. –  tels que je les institue pour vous  : autres traductions que je vous prescris ; que je vous ordonne  ; le même verbe hébreu, apparenté au mot traduit par commandements, est aussi traduit par ordonner  ; cf. v. 5,14,23,40 ; 6.2 ; 12.11,14,28 ; 13.1 ; 19.9 ; 27.1 ; 33.4 ; voir aussi loi.'
  - type: text
    content: 'Vous n''ajouterez rien à la parole que j''institue pour vous, et vous n''en retrancherez rien ; vous observerez les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, tels que je les institue pour vous.'
  '20':
  - type: note
    content: '2R 17.7. –  creuset à fondre le fer  : litt. le creuset de fer  ; cf. 1R 8.51 ; Jr 11.4 ; voir aussi Es 1.25 ; 48.10 ; Ez 22.18,20,22 ; Pr 17.3 ; 27.21 ; 1P 1.7 ; Siracide 38.28 : « La vapeur du feu fait fondre ses chairs (du forgeron) et dans la chaleur du four il se débat longuement. » –  son peuple…  : litt. pour lui un peuple de patrimoine  ; cf. 7.6 ; 9.26 ; 14.2 ; Ex 19.5 ; Lv 20.26 ; 1R 8.53 ; un terme analogue est employé dans les traités de vassalité du Proche-Orient ancien. –  voilà pourquoi… 2.30n.'
  - type: text
    content: 'Mais vous, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a pris et vous a fait sortir de l''Egypte, ce creuset à fondre le fer, afin que vous soyez son peuple, son patrimoine – voilà pourquoi il en est ainsi en ce jour.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Le Seigneur s'est mis en colère 1.37+ ; 3.25s. –  bon pays 1.25+. –  te donne 3.20+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est mis en colère contre moi à cause de vous ; il a juré que je ne passerais pas le Jourdain et que je n''entrerais pas dans le bon pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne comme patrimoine. '
  '22':
  - type: note
    content: 34.1-8.
  - type: text
    content: 'Moi donc, je meurs en ce pays-ci : je ne passerai pas le Jourdain ; mais vous, vous le passez et vous prendrez possession de ce bon pays. '
  '23':
  - type: note
    content: V. 9+.
  - type: text
    content: 'Prenez garde à vous, de peur que vous n''oubliiez l''alliance que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, a conclue avec vous et que vous ne vous fassiez une statue, une forme de quoi que ce soit, contrairement à ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a ordonné. '
  '24':
  - type: note
    content: feu dévorant 9.3 ; Es 33.14 ; Hé 12.29. –  Dieu (hébreu ’El, cf. Gn 21.33n) à la passion jalouse 5.9 ; 6.15 ; 29.19 ; 32.16,21 ; Ex 20.5+ ; Na 1.2n  ; 2Co 11.2.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, est un feu dévorant, un Dieu à la passion jalouse.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: '28.15-68. –  Lorsque tu auras…  : litt. lorsque tu engendreras des fils et des fils de fils . –  contrariez 9.18 ; 31.29 ; 32.16,21 ; cf. Jg 2.11. –  ce qui lui déplaît Nb 22.34n.'
  - type: text
    content: 'Lorsque tu auras des fils et des petits-fils, lorsque vous serez depuis longtemps dans le pays, si vous vous pervertissez, si vous faites une statue, une forme de quoi que ce soit, si vous contrariez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en faisant ce qui lui déplaît '
  '26':
  - type: note
    content: 'à témoin… le ciel et la terre 30.19 ; 31.28 ; 32.1 ; cf. 31.19+ ; Es 1.2. –  vous disparaîtrez  : autre traduction vous périrez  ; cf. 8.19s ; 30.18 ; Jos 23.16. –  vous n''y prolongerez pas vos jours v. 40 ; 5.16,33 ; 11.9 ; 17.20 ; 22.7 ; 30.18 ; 32.47 ; cf. Pr 3.2.'
  - type: text
    content: '– j''en prends aujourd''hui à témoin contre vous le ciel et la terre – vous disparaîtrez bien vite du pays dont vous allez prendre possession après avoir passé le Jourdain ; vous n''y prolongerez pas vos jours : vous serez détruits. '
  '27':
  - type: note
    content: 'qu''un petit nombre d''hommes  : cf. 26.5 ; 28.62 ; 33.6 ; voir Gn 34.30n  ; voir aussi Es 10.20-22 ; 11.1 ; 28.5. –  parmi les nations… 28.36,64 ; cf. Lv 26.33 ; 2R 17.6.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous dispersera parmi les peuples, et vous ne resterez qu''un petit nombre d''hommes parmi les nations où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous emmènera. '
  '28':
  - type: note
    content: 28.36,64 ; 29.16 ; 2R 19.18 ; Es 44.9-20 ; Jr 2.27s ; 3.9 ; Ez 20.32 ; Ha 2.19 ; Ps 115.4-8 ; cf. Ac 7.41 ; 17.29.
  - type: text
    content: 'Là, vous servirez des dieux qui sont l''œuvre de mains humaines, du bois et de la pierre, qui ne peuvent ni voir, ni entendre, ni manger, ni sentir. '
  '29':
  - type: note
    content: 'vous rechercherez (cf. 1.8n) Es 45.19 ; 51.1 ; Jr 50.4 ; Os 3.5 ; 5.15 ; Ps 9.11+ ; cf. Ac 17.27. –  si tu le cherches  : autre traduction car tu le chercheras. –  de tout ton cœur et de toute ton âme (cf. Gn 1.20n) 6.5 ; 10.12 ; 11.13 ; 13.4 ; 26.16 ; 30.2+ ; Jos 22.5 ; 23.14 ; 1S 7.3 ; 1R 2.4 ; 8.48 ; 2R 23.3,25 ; Jr 29.13 ; Jl 2.12 ; Ps 119.2+ ; 2Ch 15.12.'
  - type: text
    content: 'De là vous rechercherez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ; tu le trouveras, si tu le cherches de tout ton cœur et de toute ton âme. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Vos yeux ont vu 1.31+. –  à Baal-Péor  : autre traduction contre le Baal de Péor  ; les deux expressions, presque identiques dans le texte hébreu, semblent désigner d''abord la localité, ensuite la divinité qu''on y adorait ; cf. 3.29n  ; Nb 25.1-9.'
  - type: text
    content: 'Vos yeux ont vu ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait à Baal-Péor : le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a détruit de ton sein tout homme qui avait suivi le Baal de Péor. '
  '30':
  - type: note
    content: 'détresse 31.17. –  toutes ces paroles  : autre traduction toutes ces choses (cf. v. 32n). –  t''atteindront  : litt. te trouveront. –  dans la suite des temps Gn 49.1+ ; Es 2.2n. –  tu reviendras 30.1-5 ; Jr 3.22 ; 4.1 ; Os 6.1 ; 14.2s. –  tu l''écouteras (litt. tu écouteras sa voix) ou tu lui obéiras  ; cf. 8.20 ; 9.23 ; 13.5,19 ; 27.10 ; 28.1s,15 ; 30.20 ; Gn 22.18 ; Ex 19.5 ; Jos 24.24.'
  - type: text
    content: 'Dans ta détresse, quand toutes ces paroles t''atteindront, dans la suite des temps, tu reviendras au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, et tu l''écouteras ; '
  '31':
  - type: note
    content: Dieu (hébreu ’El, cf. Gn 21.33n) compatissant 13.18 ; 30.3 ; Ex 33.19 ; 34.6 ; Ps 103.8. –  à tes pères v. 37 ; 1.8+,21 ; 7.8,12 ; 10.15 ; cf. Gn 15.18.
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, est un Dieu compatissant ; il ne t''abandonnera pas, il ne te détruira pas ; il n''oubliera pas l''alliance qu''il a jurée à tes pères.'
  - type: heading
    content: Le privilège d'Israël
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Informe-toi  : litt. demande . –  sur le passé 32.7. –  Dieu a créé l''homme Gn 1.1n,26s ; 2.7s,18-23 ; Es 40.28 ; Am 4.13 ; cf. Mc 13.19/ /. –  d''une extrémité du ciel…  : cf. v. 19 ; 30.4. –  quoi que ce soit  : le même terme est traduit par paroles au v. 30n.'
  - type: text
    content: 'Informe-toi, je te prie, sur le passé, sur les jours qui t''ont précédé, depuis le jour où Dieu a créé l''homme sur la terre, et d''une extrémité du ciel à l''autre. S''est-il jamais produit quoi que ce soit d''aussi grand ? A-t-on jamais entendu chose semblable ? '
  '33':
  - type: note
    content: 'la voix d''un dieu  : autre traduction la voix de Dieu, cf. v. 34n  ; quelques mss hébreux et des versions anciennes précisent d''un dieu (ou du Dieu) vivant  ; cf. 5.24-26 ; Ex 20.18-20 ; voir aussi Dt 7.6ss.'
  - type: text
    content: 'Un peuple a-t-il jamais entendu la voix d''un dieu parlant du milieu du feu, comme toi, tu l''as entendue, en restant en vie ? '
  '34':
  - type: note
    content: 'Un dieu  : autre traduction Dieu  ; cf. 2S 7.23n. –  tenté  : le verbe hébreu correspondant est apparenté au mot traduit par épreuves ici et en 7.19 ; 29.2 ; cf. 8.2+ ; Ex 17.7n  ; Nb 14.22n. –  signes / prodiges 1.30+ ; 6.22 ; 7.19 ; 13.2s ; 26.8 ; 28.46 ; 29.2 ; 34.11 ; Ex 7–12 ; Es 8.18n  ; Jr 32.20s ; Ps 78.43 ; 105.27 ; 135.9 ; Né 9.10 ; Ac 2.43+. –  d''une main forte, d''un bras étendu 3.24+ ; 5.15 ; 7.19 ; 9.26,29 ; 11.2 ; 26.8 ; 1R 8.42 ; Jr 21.5+ ; Ez 20.33s ; Dn 9.15 ; 2Ch 6.32 ; Ac 13.17n. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Un dieu a-t-il jamais tenté de venir prendre une nation du sein d''une autre nation au moyen d''épreuves, de signes, de prodiges et de combats, d''une main forte, d''un bras étendu, par des interventions grandes et redoutables – tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, a fait pour vous en Egypte, sous tes yeux ? '
  '35':
  - type: note
    content: 'Tu as donc été éclairé  : litt. il (ou on) t''a fait voir  ; cf. v. 36. –  c''est le Seigneur … v. 39 ; 1R 8.60. –  pas d''autre  : cf. 32.39 ; Mc 12.32.'
  - type: text
    content: 'Tu as donc été éclairé, pour savoir que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est Dieu ; il n''y en a pas d''autre que lui. '
  '36':
  - type: note
    content: 'il t''a fait entendre 6.4. –  sa voix  : cf. Ex 9.23n  ; Ps 29.3-9. –  pour t''instruire ou pour te corriger  ; même verbe en 8.5 ; 21.18 ; terme apparenté en 11.2 ; cf. Pr 1.2n. –  ses paroles  : cf. v. 12s.'
  - type: text
    content: 'Depuis le ciel, il t''a fait entendre sa voix pour t''instruire ; sur la terre, il t''a fait voir son grand feu, et tu as entendu ses paroles du milieu du feu ; '
  '37':
  - type: note
    content: 'il a aimé 7.8,13 ; 10.15 ; 23.6 ; 33.3 ; 1R 10.9 ; Es 43.4 ; Jr 31.3 ; Ml 1.2 ; cf. Dt 5.10+. –  leur descendance après eux  : litt. sa descendance après lui  ; Smr et plusieurs versions anciennes portent le pluriel, comme en 10.15. –  lui-même  : litt. par sa face, cf. Ex 33.14n.'
  - type: text
    content: 'parce qu''il a aimé tes pères et qu''il a choisi leur descendance après eux, il t''a fait lui-même sortir d''Egypte par sa grande puissance ; '
  '38':
  - type: note
    content: il a dépossédé 9.3s ; 11.23 ; Ex 34.24 ; Nb 32.21 ; Jos 3.10 ; 13.6 ; Jg 2.21 ; 11.23 ; Ps 44.3-8. –  nations plus grandes 7.7. –  voilà pourquoi… 2.30n.
  - type: text
    content: 'il a dépossédé devant toi des nations plus grandes et plus fortes que toi, afin de te faire entrer dans leur pays et de te le donner comme patrimoine – voilà pourquoi il en est ainsi en ce jour. '
  '39':
  - type: note
    content: 'tu y réfléchiras  : litt. tu feras revenir vers ton cœur, de même en 30.1 ; cf. 6.6. –  pas d''autre v. 35+.'
  - type: text
    content: 'Tu sauras donc aujourd''hui – et tu y réfléchiras – que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est Dieu dans le ciel, en haut, et sur la terre, en bas ; il n''y en a pas d''autre ; '
  '4':
  - type: note
    content: Cf. 1.10.
  - type: text
    content: 'Mais vous qui vous êtes attachés au '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous êtes tous vivants aujourd''hui.'
  '40':
  - type: note
    content: 'institue  : cf. v. 2n. –  que tu sois heureux  : autre traduction que tout aille bien pour toi  ; le verbe correspondant est apparenté au terme habituellement rendu par bon (cf. 1.25+) : 5.16,29 ; 6.3,18,24 ; 10.13 ; 12.25,28 ; 19.13 ; 22.7 ; 30.9,15. –  toi et tes fils après toi 5.29 ; 12.25,28. –  prolonges tes jours v. 26+. –  pour toujours  : litt. tous les jours.'
  - type: text
    content: 'tu observeras ses prescriptions et ses commandements, tels que je les institue pour toi aujourd''hui, afin que tu sois heureux, toi et tes fils après toi, et que tu prolonges tes jours sur la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne pour toujours.'
  - type: heading
    content: Trois villes de refuge en Transjordanie
  '41':
  - type: text
    content: ' '
  - type: note
    content: '19.1-13 ; Ex 21.13 ; Nb 35.9-34 ; Jos 20. –  mit à part  : le même verbe est habituellement traduit par séparer (10.8 ; 19.2,7 ; 29.20 ; Gn 1.4n  ; Ex 26.33 ; Lv 10.10n). –  Transjordanie 1.1n.'
  - type: text
    content: 'Alors Moïse mit à part trois villes en Transjordanie, du côté du soleil levant, '
  '42':
  - type: note
    content: 'par méprise 19.4n. –  d''habitude  : litt. d''hier, d''avant-hier, cf. 19.4,6 ; Gn 31.2n.'
  - type: text
    content: 'afin qu''elles servent de refuge au meurtrier qui aurait tué son prochain par méprise, alors que d''habitude il ne le détestait pas, pour qu''il puisse s''enfuir dans l''une de ces villes et rester en vie. '
  '43':
  - type: note
    content: Jos 20.8. –  Bétser, à 30 km à l'est de l'embouchure du Jourdain dans la mer Morte et à 20 km au sud d'Amman ; ville mentionnée sur la stèle de Mésha  ; Jos 21.36 ; 1Ch 6.63 ; 7.37. –  plateau 3.10n. –  Ramoth, sans doute à une quarantaine de kilomètres à l'est du Jourdain et au sud-ouest d'Edréi ; Jos 21.38 ; 1R 4.13 ; 22.3s ; 2R 8.28s ; 9.14. –  Golân, traditionnellement située à une trentaine de kilomètres à l'est du lac de Tibériade, au nord-ouest d'Edréi ; elle a donné son nom à toute la région située à l'est du lac ; Jos 21.27 ; 1Ch 6.56.
  - type: text
    content: Bétser, dans le désert, sur le plateau, pour les Rubénites ; Ramoth, au Galaad, chez les Gadites ; et Golân, au Bashân, chez les Manassites.
  - type: heading
    content: DEUXIÈME DISCOURS DE MOÏSE
  '44':
  - type: text
    content: ' '
  - type: note
    content: La phrase pourrait aussi être lue comme la conclusion des v. 41-43.
  - type: text
    content: 'Telle est la loi que Moïse plaça devant les Israélites. '
  '45':
  - type: note
    content: '1.1-5 ; cf. 5.1 ; 12.1. –  préceptes  : le mot peut également signifier témoignage(s)  ; cf. 6.17 ; voir aussi loi.'
  - type: text
    content: 'Tels sont les préceptes, les prescriptions et les règles que Moïse énonça pour les Israélites quand ceux-ci sortirent d''Egypte. '
  '46':
  - type: note
    content: Beth-Péor 3.29n. –  Sihôn… 1.4+.
  - type: text
    content: 'C''était en Transjordanie, dans la vallée, en face de Beth-Péor, au pays de Sihôn, roi des Amorites, qui habitait à Heshbôn et qui fut battu par Moïse et les Israélites, quand ceux-ci sortirent d''Egypte. '
  '47':
  - type: text
    content: 'Ils prirent possession de son pays et du pays d''Og, roi du Bashân. Ces deux rois des Amorites étaient en Transjordanie, du côté du soleil levant, '
  '48':
  - type: note
    content: 'Aroër 2.36n. –  Arnon 2.24+. –  Siôn  : ne pas confondre ce nom de l''Hermon (cf. 3.9) avec celui de Sion, la colline de Jérusalem (autre orthographe aussi en hébreu).'
  - type: text
    content: 'depuis Aroër, qui est sur la rive de l''oued Arnon, jusqu''au mont Siôn (c''est-à-dire l''Hermon), '
  '49':
  - type: note
    content: '1.1 ; 3.17+. –  plaine aride  : hébreu ‘arava, cf. 1.1n,7n  ; 3.17n.'
  - type: text
    content: dans toute la plaine aride, en Transjordanie, du côté du soleil levant, jusqu'à la mer de la plaine aride, sous les pentes du Pisga.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ordonné  : cf. v. 2n. –  prendre possession 1.21+.'
  - type: text
    content: 'Regardez, je vous ai appris des prescriptions et des règles, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, me l''a ordonné, afin que vous les mettiez en pratique dans le pays où vous entrez pour en prendre possession. '
  '6':
  - type: note
    content: 'Vous les observerez…  : litt. vous les garderez et vous les ferez  ; voir aussi 5.1n  ; 7.11 ; 11.22 ; 16.12 ; 17.19 ; 19.9 ; 26.16 ; 29.8 ; cf. Lv 8.35n. –  sage / intelligent Ps 19.8 ; Jb 28.28 ; Pr 9.10.'
  - type: text
    content: 'Vous les observerez et vous les mettrez en pratique ; ce sera là votre sagesse et votre intelligence aux yeux des peuples qui entendront parler de toutes ces prescriptions ; ils diront : « Cette grande nation est vraiment un peuple sage et intelligent ! » '
  '7':
  - type: note
    content: 'Cf. v. 32-34 ; 6.15 ; 7.21 ; 30.14 ; 31.17 ; Ps 145.18 ; 148.14 ; Rm 3.1s. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Quelle est donc la grande nation qui aurait des dieux aussi proches d''elle que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu, l''est de nous chaque fois que nous l''invoquons ? '
  '8':
  - type: note
    content: Ps 147.19s. – Voir justice. –  aujourd'hui 1.10+.
  - type: text
    content: Et quelle est la grande nation qui ait des prescriptions et des règles justes, comme toute cette loi que je place devant vous aujourd'hui ?
  - type: heading
    content: La révélation au mont Horeb
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'sur toi-même  : autre traduction sur ton âme  ; cf. 11.18. –  que tu n''oublies v. 23 ; 6.12 ; 8.11,14,19 ; 9.7 ; 26.13 ; 32.18 ; cf. 5.15+ ; Jg 3.7 ; 1S 12.9 ; Es 1.2-4 ; 17.10 ; 51.13 ; Jr 2.32 ; 3.21 ; Ez 22.12 ; Os 2.15+ ; Ps 103.2 ; 106.21. – Voir cœur.'
  - type: text
    content: Seulement, prends garde à toi et veille bien sur toi-même, tous les jours de ta vie, de peur que tu n'oublies les choses que tes yeux ont vues et qu'elles ne s'éloignent de ton cœur ; fais-les connaître à tes fils et aux fils de tes fils.
