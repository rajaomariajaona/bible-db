  - type: text
    text: 'Maintenant, Israël, écoute les prescriptions et les règles que je vous apprends pour que vous les mettiez en pratique, afin que vous viviez et que vous entriez en possession du pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu de vos pères, vous donne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous n''ajouterez rien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.22 ; 13.1 ; Pr 30.6 ; Ec 3.14 ; Ap 22.18s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tels que je les institue pour vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que je vous prescris ; que je vous ordonne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même verbe hébreu, apparenté au mot traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: commandements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ordonner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 5,14,23,40 ; 6.2 ; 12.11,14,28 ; 13.1 ; 19.9 ; 27.1 ; 33.4 ; voir aussi '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous n''ajouterez rien à la parole que j''institue pour vous, et vous n''en retrancherez rien ; vous observerez les commandements du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, tels que je les institue pour vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vos yeux ont vu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.31+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baal
      - type: text
        text: -Péor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: contre le Baal de Péor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; les deux expressions, presque identiques dans le texte hébreu, semblent désigner d'abord la localité, ensuite la divinité qu'on y adorait ; cf. 3.29
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 25.1-9.'
    marker-yv: yv-n
  - type: text
    text: 'Vos yeux ont vu ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a fait à Baal-Péor : le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, a détruit de ton sein tout homme qui avait suivi le Baal de Péor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1.10.
    marker-yv: yv-n
  - type: text
    text: 'Mais vous qui vous êtes attachés au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, vous êtes tous vivants aujourd''hui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
