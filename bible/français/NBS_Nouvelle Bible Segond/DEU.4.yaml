    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 11.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que tu n''oublies '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 23 ; 6.12 ; 8.11,14,19 ; 9.7 ; 26.13 ; 32.18 ; cf. 5.15+ ; Jg 3.7 ; 1S 12.9 ; Es 1.2-4 ; 17.10 ; 51.13 ; Jr 2.32 ; 3.21 ; Ez 22.12 ; Os 2.15+ ; Ps 103.2 ; 106.21. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Seulement, prends garde à toi et veille bien sur toi-même, tous les jours de ta vie, de peur que tu n'oublies les choses que tes yeux ont vues et qu'elles ne s'éloignent de ton cœur ; fais-les connaître à tes fils et aux fils de tes fils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
