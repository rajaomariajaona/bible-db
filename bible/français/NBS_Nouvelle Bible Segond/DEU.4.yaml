      - type: text
        text: ' : le verbe correspondant (aussi 31.12,28,30) évoque habituellement l''assemblée cultuelle, cf. 5.22 ; 9.10 ; 10.4 ; 18.16 ; 23.2ss ; voir aussi 29.9-12 ; Jos 24.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'me '
      - type: usfm
        marker: w
        children:
        - type: text
          text: craindre
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.29 ; 6.2,13,24 ; 8.6 ; 10.12,20 ; 13.5 ; 14.23 ; 17.19 ; 28.58 ; 31.12 ; Pr 1.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à leurs fils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 6.7,20-25 ; 11.19 ; 32.46.
    marker-yv: yv-n
  - type: text
    text: 'Le jour où tu t''es tenu devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, à l''Horeb, lorsque le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a dit : « Rassemble auprès de moi le peuple ; je veux leur faire entendre mes paroles, pour qu''ils apprennent à me craindre tous les jours qu''ils vivront sur la terre, et pour qu''ils les apprennent à leurs fils », '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
