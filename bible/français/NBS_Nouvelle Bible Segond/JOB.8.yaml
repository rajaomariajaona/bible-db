document_id: JOB.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Intervention de Bildad : les fautes se paient tôt ou tard'
  - type: text
    content: 'Bildad le Shouhite répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Voir cœur.
  - type: text
    content: Ne te l'enseigneront-ils pas, eux ? Ils te le diront,
  - type: text
    content: 'ils tireront de leur cœur ces propos :'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Le papyrus  : traduction incertaine, cf. Gn 41.2n.'
  - type: text
    content: Le jonc pousse-t-il sans un marais ?
  - type: text
    content: Le papyrus peut-il croître sans eau ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 14.2 ; 15.30n,33 ; Es 40.6-8 ; 51.12 ; Ps 37.2 ; 90.5s ; 103.14s.
  - type: text
    content: Encore vert, sans qu'on le coupe,
  - type: text
    content: il se dessèche plus vite que toutes les herbes.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ainsi arrive-t-il à  : litt. ainsi les chemins de  ; LXX ainsi sera la fin de . –  oublient Dieu Ps 9.18. –  l''espoir de l''impie (15.16,34 ; 17.8 ; 20.5 ; 27.8 ; 34.30 ; 36.13 ; Es 9.16+) disparaît Pr 10.28.'
  - type: text
    content: Ainsi arrive-t-il à tous ceux qui oublient Dieu,
  - type: text
    content: et l'espoir de l'impie disparaît.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Son assurance 31.24 ; terme apparenté en 4.6n  ; cf. 49.14 ; 78.7. –  est brisée  : ce verbe n''apparaît qu''ici et sa traduction est incertaine ; quelques-uns modifient le texte hébreu traditionnel pour lire comme une gaze . –  toile  : litt. maison , comme au v. 15 ; cf. 27.18 ; Es 59.5s.'
  - type: text
    content: Son assurance est brisée,
  - type: text
    content: il se fiait à une toile d'araignée.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ez 10.13s ; Mt 7.26s.
  - type: text
    content: Il s'appuie sur sa maison, mais elle ne tient pas ;
  - type: text
    content: il s'y cramponne, mais elle ne subsiste pas.
  '16':
  - type: text
    content: Riche de sève, en plein soleil,
  - type: text
    content: il étend ses rameaux sur son jardin,
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ce v. a été diversement compris. LXX il dormira sur un tas de cailloux, il vivra au milieu des pierres . Au lieu de une maison de pierres certains comprennent les creux des rochers où se glissent les racines.
  - type: text
    content: ses racines s'entrelacent dans un tas de cailloux ;
  - type: text
    content: il contemple une maison de pierres.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 7.10.
  - type: text
    content: L'arrache-t-on du lieu qu'il habitait,
  - type: text
    content: 'celui-ci le renie : « Je ne t''ai jamais vu ! »'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'les délices ou la gaieté , ironiquement ; certains modifient le texte hébreu traditionnel pour lire la pourriture . –  sa destinée  : litt. son chemin . LXX tel est le désastre de l''impie  ; cf. 27.8+.'
  - type: text
    content: Telles sont les délices de sa destinée.
  - type: text
    content: Puis, de cette poussière, d'autres germeront.
  '2':
  - type: text
    content: Jusqu'à quand tiendras-tu ces propos,
  - type: text
    content: jusqu'à quand les discours de ta bouche seront-ils un vent impétueux ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: '9.23s. –  rejette  : autre traduction méprise 7.16n.'
  - type: text
    content: Non, Dieu ne rejette pas l'homme intègre,
  - type: text
    content: il n'encourage pas les mauvais.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Bientôt il remplira  : litt. jusqu''à ce qu''il remplisse  ; une très légère modification du texte hébreu permettrait de lire il remplira encore . Cf. 9.27.'
  - type: text
    content: Bientôt il remplira ta bouche de rire,
  - type: text
    content: et tes lèvres d'acclamations.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '4.21n  ; cf. Jr 3.25 ; Ps 35.26 ; 109.29 ; 132.18 ; Pr 14.11. –  Tes ennemis  : litt. ceux qui te détestent ou qui te haïssent.'
  - type: text
    content: Tes ennemis seront revêtus de honte ;
  - type: text
    content: la tente des méchants disparaîtra.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'fausserait-il  : litt. tordrait-il  ; cf. 34.10-12 ; 36.6 ; Dt 32.4 ; Ps 89.15 ; 97.2. –  Le Puissant v. 5 ; 5.17n.'
  - type: text
    content: Dieu fausserait-il le droit ?
  - type: text
    content: Le Puissant fausserait-il la justice ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'tes fils 1.5,18s. –  il les a livrés…  : litt. il les a envoyés dans (ou par ) la main de leur révolte (autre traduction transgression ).'
  - type: text
    content: Si tes fils ont péché contre lui,
  - type: text
    content: il les a livrés à leur révolte.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 11.13 ; cf. 22.21.
  - type: text
    content: Mais toi, si tu recherches Dieu,
  - type: text
    content: si tu supplies le Puissant,
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sans reproche  : cf. 11.4 ; 16.17 ; 33.9. –  il veillera  : litt. il s''éveillera . –  il rétablira  : autre traduction il récompensera . –  ton domaine de juste  : litt. le domaine de ta justice , ce qui pourrait aussi signifier à la place qui te revient de droit  ; cf. 29.2+ ; Jr 31.23 ; 50.7 ; Pr 3.33 ; 24.15.'
  - type: text
    content: si tu es sans reproche, si tu es droit,
  - type: text
    content: maintenant même il veillera sur toi
  - type: text
    content: et il rétablira ton domaine de juste ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ta fin  : cf. 42.10-12n.'
  - type: text
    content: ton commencement semblera peu de chose,
  - type: text
    content: ta fin sera bien plus grande.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '12.12 ; 15.10,18 ; 32.7 ; Dt 4.32 ; 32.7 ; cf. Siracide 8.9 : « Ne t''écarte pas des récits des vieillards, car eux-mêmes les ont appris de leurs pères. C''est auprès d''eux que tu apprendras à comprendre, et à avoir une réponse prête lorsqu''il faut. » –  à l''expérience ou aux conclusions , cf. 5.27n. –  ses pères  : litt. leurs pères.'
  - type: text
    content: Interroge la génération précédente, je te prie,
  - type: text
    content: sois attentif à l'expérience de ses pères.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 7.7+. –  ombre 14.2 ; Ps 144.4 ; 1Ch 29.15.
  - type: text
    content: Car nous sommes d'hier, et nous ne savons rien,
  - type: text
    content: nos jours sur la terre ne sont qu'une ombre.
