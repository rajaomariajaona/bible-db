document_id: DEU.32,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '4.26+ ; 31.28. –  Ciel…  : autre traduction cieux, prêtez l''oreille (cf. Gn 1.1n).'
  - type: text
    content: Ciel, prête l'oreille, et je parlerai !
  - type: text
    content: Terre, écoute les paroles de ma bouche !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Il l''a trouvé… Jr 2.2,6 ; Ez 16.6 ; Os 13.5. –  un chaos  : cf. Gn 1.2n. –  la prunelle de son œil  : cf. Za 2.12 ; Ps 17.8.'
  - type: text
    content: Il l'a trouvé dans un pays désert,
  - type: text
    content: dans un chaos hurlant et aride ;
  - type: text
    content: il l'entourait, il prenait soin de lui,
  - type: text
    content: il le gardait comme la prunelle de son œil,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 19.4+. –  excite  : litt. éveille , cf. Jb 41.2. –  tournoie  : cf. Gn 1.2n. –  ses petits  : cf. Gn 15.9n. –  déploie ses ailes…  : autre traduction il (Dieu) déployait ses ailes, le prenait (Israël), le portait…  ; on a observé ce comportement chez des rapaces apprenant à voler à leur progéniture ; cf. Lc 13.34.'
  - type: text
    content: pareil à l'aigle qui excite sa nichée,
  - type: text
    content: tournoie au-dessus de ses petits,
  - type: text
    content: déploie ses ailes, les prend,
  - type: text
    content: les porte sur ses plumes.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'le conduisait  : cf. Gn 24.27 ; Ex 13.21 ; 15.13 ; Ps 80.2. –  avec lui aucun dieu (hébreu ’el , cf. v. 18,21 ; Gn 21.33n) étranger v. 16 ; Es 43.12.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) seul le conduisait ;'
  - type: text
    content: il n'y avait avec lui aucun dieu étranger.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Il le faisait circuler  : litt. il le faisait chevaucher ou il l''emmenait en char . –  les hauteurs 33.29n  ; le terme hébreu est traduit ailleurs par haut(s) lieu(x) . –  il l''allaitait au (ou il lui faisait téter, sucer le , cf. 33.19) miel…  : cf. Ps 81.17. –  l''huile du granit (8.15n), probablement celle des oliviers poussant en terrain rocailleux ; cf. Ex 17.6 ; Nb 20.11 ; voir aussi Jb 29.6.'
  - type: text
    content: Il le faisait circuler sur les hauteurs du pays
  - type: text
    content: et manger le produit des champs ;
  - type: text
    content: il l'allaitait au miel de la roche,
  - type: text
    content: à l'huile du granit du rocher,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'au lait fermenté  : autre traduction à la crème , cf. Gn 18.8n. –  lait frais / graisse  : les deux mots sont très proches en hébreu ; cf. v. 38 ; Es 25.6. –  des brebis et des chèvres  : litt. du petit bétail . –  jeunes béliers et béliers traduisent deux mots hébreux différents ; cf. 2R 3.4+. –  du Bashân (litt. fils du Bashân ) : région d''élevage à l''est du lac de Galilée ; cf. 1.4 ; Ez 39.18 ; Am 4.1 ; Ps 22.13. –  la fleur du froment  : litt. la graisse des rognons du blé , c.-à-d. le meilleur blé ; cf. Lv 3.4 ; Es 34.6. –  sang du raisin Gn 49.11. –  le vin capiteux  : autre traduction le vin fermenté  ; cf. Es 27.2.'
  - type: text
    content: au lait fermenté des vaches, au lait frais des brebis et des chèvres,
  - type: text
    content: avec la graisse des jeunes béliers,
  - type: text
    content: des béliers du Bashân et des boucs,
  - type: text
    content: avec la fleur du froment ;
  - type: text
    content: tu buvais le sang du raisin, le vin capiteux.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Smr et LXX ont lu au début du v. un vers supplémentaire  : Jacob a mangé et s''est rassasié  ; cf. 31.20. –  Yeshouroun  : surnom poétique d''Israël (33.5,26 ; Es 44.2n), dérivé d''un mot signifiant droit ou juste (cf. Nb 23.10n) ; LXX le (bien-)aimé , comme en Ep 1.6. –  il a regimbé  : le même verbe est traduit par fouler aux pieds en 1S 2.29. –  qui l''a fait v. 6. –  rabaissé ou méprisé, insulté , voire, selon l''étymologie, traité de fou ou fait devenir fou (sur le verbe correspondant, cf. Jr 14.21 ; Mi 7.6n  ; Na 3.6n). –  Rocher v. 4+.'
  - type: text
    content: Yeshouroun est devenu gras, il a regimbé ;
  - type: text
    content: – tu es devenu gras, épais et replet ! –
  - type: text
    content: il a délaissé le Dieu qui l'a fait,
  - type: text
    content: il a rabaissé le Rocher de son salut,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'jalousie v. 21 ; cf. 4.24+ ; 1Co 10.22. –  des dieux étrangers  : litt. des étrangers  ; cf. v. 12 ; Es 43.12 ; Jr 2.25n. –  le contrarient 4.25+. –  abominations 7.25+.'
  - type: text
    content: ils provoquent sa jalousie par des dieux étrangers,
  - type: text
    content: ils le contrarient par des abominations ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'démons Ps 106.37 ; 1Co 10.20 ; Ap 9.20. –  qui ne sont pas Dieu (hébreu ’Eloah ) : cf. 2R 19.18 ; Jr 2.11 ; 16.20 ; Os 8.6. –  qu''ils ne connaissent pas 11.28+.'
  - type: text
    content: ils sacrifient à des démons, qui ne sont pas Dieu,
  - type: text
    content: à des dieux qu'ils ne connaissent pas
  - type: text
    content: – des nouveaux venus, arrivés depuis peu,
  - type: text
    content: que vos pères ne vénéraient pas.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Rocher v. 4+ ; cf. Es 51.1. –  tu as oublié 4.9+. –  Dieu  : hébreu ’El , cf. v. 12+.'
  - type: text
    content: Tu as dédaigné le Rocher qui t'a fait naître,
  - type: text
    content: tu as oublié le Dieu qui t'a engendré.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'il a ressenti du mépris  : le verbe hébreu est traduit par bafouer en 31.20 ; autre traduction il a bafoué, dans sa contrariété, ses fils et ses filles . –  le contrariaient v. 16,21,27.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a vu et il a ressenti du mépris,'
  - type: text
    content: parce que ses fils et ses filles le contrariaient.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Es 55.10 ; Os 6.3 ; Ps 72.6 ; Jb 29.23.
  - type: text
    content: Que mon savoir se déverse comme la pluie,
  - type: text
    content: que ma parole coule comme la rosée,
  - type: text
    content: comme des ondées sur la verdure,
  - type: text
    content: comme des gouttes d'eau sur l'herbe !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Je me détournerai d''eux  : litt. je leur cacherai ma face  ; cf. 31.17s. –  leur avenir v. 29. –  génération versatile  : cf. v. 5. –  inconstants  : autres traductions infidèles ; en qui on ne peut pas se fier  ; cf. v. 4n.'
  - type: text
    content: 'Il a dit : Je me détournerai d''eux,'
  - type: text
    content: je verrai quel sera leur avenir ;
  - type: text
    content: car c'est une génération versatile,
  - type: text
    content: ce sont des fils inconstants.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'provoqué ma jalousie v. 16+ ; 1Co 10.22. –  ce qui n''est pas Dieu (hébreu ’El , v. 12+) v. 17. –  futilités  : désignation méprisante des idoles. –  provoquer leur jalousie Rm 10.19  ; 11.11 ; cf. Am 9.7. –  ce qui n''est pas un peuple  : hébreu lo’-‘am , cf. Os 1.9n.'
  - type: text
    content: Ils ont provoqué ma jalousie par ce qui n'est pas Dieu,
  - type: text
    content: ils m'ont contrarié par leurs futilités ;
  - type: text
    content: moi, je vais provoquer leur jalousie par ce qui n'est pas un peuple,
  - type: text
    content: je vais les contrarier par une nation folle.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '11.17. –  de ma colère  : litt. dans mes narines , cf. Es 65.5 ; Jr 15.14 ; 17.4 ; Ps 18.9. –  du séjour des morts  : cf. Ps 86.13 ; 139.8. –  fondations des montagnes Ps 18.8.'
  - type: text
    content: Car le feu de ma colère s'est allumé,
  - type: text
    content: il brûle jusqu'au fond du séjour des morts ;
  - type: text
    content: il dévore la terre et sa production,
  - type: text
    content: il embrase les fondations des montagnes.
  '23':
  - type: text
    content: ' '
  - type: note
    content: malheurs 31.21+. –  flèches v. 42 ; Ez 5.16 ; Ps 18.15 ; 38.3 ; 77.18 ; Jb 6.4+.
  - type: text
    content: J'accumulerai sur eux les malheurs,
  - type: text
    content: j'épuiserai mes flèches contre eux.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'famine 28.48,53-57. –  fièvre  : le mot hébreu pourrait aussi désigner la foudre  ; voir Ha 3.5n. –  une épidémie  : traduction incertaine ; le mot évoque une épidémie en Ps 91.6, un phénomène destructeur en Es 28.2n  ; voir aussi Os 13.14n. –  terrible  : litt. amère . –  dents des bêtes Lv 26.22-28 ; Ez 5.17 ; 14.15,21 ; cf. Ap 6.8.'
  - type: text
    content: Ils seront exténués par la famine, rongés par la fièvre
  - type: text
    content: et par une épidémie terrible ;
  - type: text
    content: j'enverrai contre eux les dents des bêtes
  - type: text
    content: et le venin des reptiles !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'l''épée tuera…  : autres traductions l''épée les privera d''enfants ; l''épée leur fera perdre leurs enfants  ; cf. Gn 27.45 ; 42.36 ; Lv 26.22 ; 1S 15.33n. –  jeune fille  : litt. vierge . –  nourrisson / cheveux blancs 28.50.'
  - type: text
    content: Au dehors, l'épée tuera leurs enfants,
  - type: text
    content: et au dedans, la terreur ;
  - type: text
    content: il en sera du jeune homme comme de la jeune fille,
  - type: text
    content: du nourrisson comme de l'homme aux cheveux blancs.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Je les emporterais d''un souffle  : sens incertain ; autre traduction je les réduirais en poussière . –  je ferais disparaître  : cf. 9.14+ ; Ps 34.17. –  leur souvenir  : autre traduction leur nom  ; cf. 25.19+.'
  - type: text
    content: 'J''ai dit : « Je les emporterais d''un souffle,'
  - type: text
    content: je ferais disparaître leur souvenir d'entre les hommes
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'd''être contrarié…  : litt. la contrariété de l''ennemi  ; cf. v. 19+ ; voir aussi 9.28. –  se méprennent  : cf. Jr 19.4n. –  Notre main est puissante (litt. élevée ) : cf. 2R 18.35 ; Es 10.13s.'
  - type: text
    content: – si je ne redoutais d'être contrarié par l'ennemi ;
  - type: text
    content: de peur que leurs adversaires ne se méprennent,
  - type: text
    content: 'qu''ils ne disent : “Notre main est puissante,'
  - type: text
    content: 'ce n''est pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui a fait tout cela !” »'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'dont les projets périssent  : autres traductions incapable de réfléchir, rebelle à tout conseil  ; cf. Jr 49.7 ; Lc 19.42.'
  - type: text
    content: Car c'est une nation dont les projets périssent,
  - type: text
    content: il n'y a pas d'intelligence chez eux.
  '29':
  - type: text
    content: ' '
  - type: note
    content: avenir v. 20.
  - type: text
    content: S'ils étaient sages, ils discerneraient cela,
  - type: text
    content: ils considéreraient leur avenir.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'je proclamerai ou j''invoquerai  : cf. Ex 34.5-7. –  Rendez hommage  : litt. donnez (la) grandeur.'
  - type: text
    content: 'Car je proclamerai le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  - type: text
    content: Rendez hommage à notre Dieu !
  '30':
  - type: text
    content: ' '
  - type: note
    content: Es 30.17. –  vendus Jg 2.14+ ; 1S 12.9 ; Es 50.1 ; 52.3 ; Ps 44.13 ; 2Ch 24.24.
  - type: text
    content: Comment un seul en poursuivrait-il mille,
  - type: text
    content: comment deux en mettraient-ils dix mille en fuite,
  - type: text
    content: si leur Rocher ne les avait pas vendus,
  - type: text
    content: 'si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne les avait pas livrés ?'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Rocher v. 4+. –  nos ennemis en sont juges ou en sont témoins , sens incertain (cf. Ex 21.22n) ; LXX nos ennemis sont dépourvus d'intelligence  ; cf. Ex 14.25 ; Jos 2.9-11.
  - type: text
    content: Car leur Rocher n'est pas comme notre Rocher,
  - type: text
    content: nos ennemis en sont juges.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'de la vigne (ou du plant ) : cf. Es 5.2-4 ; Jr 2.21. –  Sodome / Gomorrhe Gn 13.13 ; 18.20–19.26 ; Es 1.9s.'
  - type: text
    content: Mais leur vigne vient de la vigne de Sodome
  - type: text
    content: 'et du terroir de Gomorrhe :'
  - type: text
    content: leurs raisins sont des raisins empoisonnés,
  - type: text
    content: leurs grappes sont amères ;
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'venin v. 24. –  dragons  : autre traduction reptiles (autre terme au v. 24) ; sur le terme hébreu correspondant, voir Gn 1.21n  ; Ex 7.9n. –  poison v. 32 ; 29.17.'
  - type: text
    content: leur vin, c'est le venin des dragons,
  - type: text
    content: c'est le poison cruel des vipères.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'trésors  : cf. 28.12 ; Os 13.12 ; Jb 14.17.'
  - type: text
    content: Cela n'est-il pas caché auprès de moi,
  - type: text
    content: scellé dans mes trésors ?
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'vengeance v. 41,43 ; voir aussi 7.10 ; Ps 94.1 ; Lc 21.22 ; Rm 12.19 ; Hé 10.30  ; 1P 2.23. –  rétribution  : le terme est apparenté à celui qui est traduit par payer de retour en 7.10. –  ils vacilleront… Ps 38.17s ; 94.18. –  le jour de la catastrophe…  : litt. proche (est) le jour de leur catastrophe  ; cf. Jr 18.17 ; 48.16.'
  - type: text
    content: A moi la vengeance et la rétribution,
  - type: text
    content: au temps où ils vacilleront sur leurs jambes !
  - type: text
    content: Car le jour de la catastrophe est près d'arriver sur eux,
  - type: text
    content: et leur destin se précipite.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'jugera  : certains comprennent rendra justice à et traduisent par et plutôt que par mais la conjonction qui introduit le vers suivant ; cf. Ps 135.14. –  il aura pitié  : litt. il aura du regret (pour ses serviteurs)  ; cf. Ps 90.13n  ; 135.14n. –  leur force est épuisée  : litt. la main s''en est allée  ; selon certains, il s''agirait de la main des ennemis d''Israël. –  ni esclave ni homme libre  : litt. ni retenu ni relâché  ; même expression en 1R 14.10n  ; 21.21 ; 2R 9.8 ; 14.26.'
  - type: text
    content: 'Oui, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' jugera son peuple ;'
  - type: text
    content: mais il aura pitié de ses serviteurs,
  - type: text
    content: en voyant que leur force est épuisée,
  - type: text
    content: et qu'il n'y a plus ni esclave ni homme libre.
  '37':
  - type: text
    content: ' '
  - type: note
    content: Où sont leurs dieux Jg 10.14 ; 1R 18.27 ; Jr 2.28. –  rocher v. 4+,30s.
  - type: text
    content: 'Il dira : Où sont leurs dieux,'
  - type: text
    content: le rocher qui leur servait d'abri,
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'la graisse  : cf. v. 14n  ; voir aussi Ps 50.12s.'
  - type: text
    content: ceux qui mangeaient la graisse de leurs sacrifices,
  - type: text
    content: qui buvaient le vin de leurs libations ?
  - type: text
    content: Qu'ils se lèvent, qu'ils vous secourent,
  - type: text
    content: que ce soit là une protection !
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'c''est moi, oui, moi  : litt. moi, moi, lui ou c''est moi, moi, qui suis lui  ; on a aussi compris c''est moi qui suis moi, c''est moi qui suis, c''est moi qui suis Dieu  ; la formule hébraïque qui apparaît ici est de toute évidence un renforcement de celle qu''on trouve en Es 41.4n (cf. 43.10), au sens de c''est moi ou de je suis le même  ; LXX traduit moi, je suis (ou c''est moi qui suis ), comme en Jn 8.24n  ; cf. Dt 4.35 ; Os 13.4 ; Ac 4.12. –  pas de dieu ou pas d''autre dieu . –  mourir / vivre 1S 2.6 ; 2R 5.7 ; cf. Jn 5.21. –  fracasse / guéris Es 19.22 ; 30.26 ; Os 6.1 ; Jb 5.18. –  personne ne délivre Es 43.13 ; Os 2.12+.'
  - type: text
    content: Maintenant donc, voyez que c'est moi, oui, moi,
  - type: text
    content: et qu'il n'y a pas de dieu avec moi ;
  - type: text
    content: c'est moi qui fais mourir et qui fais vivre,
  - type: text
    content: c'est moi qui fracasse et qui guéris ;
  - type: text
    content: personne ne délivre de ma main.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'le Rocher  : cf. v. 15,18,30s ; 2S 23.3 ; Es 17.10+ ; Ha 1.12 ; Ps 18.3+ ; Mt 7.24s ; 16.18. –  équité  : le même mot est traduit ailleurs par jugement, règle, droit  ; cf. v. 41 ; voir aussi Ps 145.17 ; Ap 15.3. –  Dieu  : hébreu ’El , cf. Gn 21.33n. –  de constance  : un terme apparenté est traduit par inconstants au v. 20 ; autres traductions de fidélité, de probité (2R 12.16 ; 22.7) ; le terme est apparenté au mot traditionnellement transcrit amen , cf. 27.15n  ; Es 25.1 ; 65.16n  ; Ps 33.4 ; Lm 3.23 ; 1Jn 1.9. –  pas d''injustice  : cf. Rm 9.14. Voir justice.'
  - type: text
    content: Il est le Rocher ; son action est parfaite,
  - type: text
    content: car toutes ses voies sont équité ;
  - type: text
    content: 'c''est un Dieu de constance : pas d''injustice en lui,'
  - type: text
    content: il est juste et droit.
  '40':
  - type: text
    content: ' '
  - type: note
    content: Geste et formule de serment, cf. Ex 6.8n  ; Nb 14.21,28,30 ; Jg 8.19 ; Jr 22.24 ; Ez 20.5n  ; Ap 10.5s.
  - type: text
    content: Car je lève ma main vers le ciel,
  - type: text
    content: 'et je dis : Par ma vie, qui est pour toujours,'
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'si j''aiguise…  : autre traduction quand j''aiguiserai… quand ma main saisira… –  l''éclair de mon épée  : cf. Ez 21.14-16 ; Na 3.3 ; Ha 3.11. –  jugement  : le mot hébreu correspondant est aussi traduit par équité (v. 4) , droit, règle . –  vengeance v. 35.'
  - type: text
    content: si j'aiguise l'éclair de mon épée,
  - type: text
    content: si ma main saisit le jugement,
  - type: text
    content: je tirerai vengeance de mes adversaires
  - type: text
    content: et je paierai de retour ceux qui me détestent !
  '42':
  - type: text
    content: ' '
  - type: note
    content: flèches v. 23. –  la chevelure défaite , ni coiffée ni taillée, sans doute caractéristique des chefs au combat ; autre traduction possible de la tête des chefs de l'ennemi  ; cf. Nb 6.5n  ; Jg 5.2n (terme apparenté).
  - type: text
    content: J'enivrerai mes flèches de sang,
  - type: text
    content: et mon épée se repaîtra de chair,
  - type: text
    content: du sang des victimes et des captifs
  - type: text
    content: et de la chevelure défaite de l'ennemi.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Nations, acclamez (verbe habituellement traduit par pousser des cris de joie ) …  : LXX et un ms de Qumrân portent, au lieu du premier vers  : Cieux, réjouissez-vous avec lui, et que tous les fils de Dieu se prosternent devant lui  ; LXX ajoute  : Réjouissez-vous, nations, avec son peuple, et que tous les anges de Dieu lui donnent force ; Rm 15.10 ; Hé 1.6  ; Ap 12.12. –  venge (ou vengera )… v. 35+ ; Lc 21.22 ; Ap 6.10 ; 19.2. –  ses serviteurs  : LXX, Qumrân ses enfants . –  il fait l''expiation pour sa terre (Gn 2.5n) , pour son peuple 21.8 ; LXX le Seigneur purifiera la terre de son peuple.'
  - type: text
    content: Nations, acclamez son peuple !
  - type: text
    content: Car il venge le sang de ses serviteurs,
  - type: text
    content: il tire vengeance de ses adversaires,
  - type: text
    content: et il fait l'expiation pour sa terre, pour son peuple.
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'Osée  : c.-à-d. Josué (ainsi Smr et les versions anciennes) ; cf. Nb 13.16n. –  en présence du peuple  : litt. aux oreilles du peuple.'
  - type: text
    content: Moïse vint prononcer, avec Osée, fils de Noun, toutes les paroles de ce chant en présence du peuple.
  '45':
  - type: text
    content: ' '
  - type: note
    content: tout Israël 1.1+.
  - type: text
    content: 'Lorsque Moïse eut achevé de prononcer toutes ces paroles devant tout Israël, '
  '46':
  - type: note
    content: 'Réfléchissez à… ou faites attention à… (cf. Ex 9.21), litt. mettez sur votre cœur…  ; cf. Es 57.1,11n. –  je vous conjure  : le verbe peut aussi avoir le sens d’avertir ou de prendre à témoin. –  d''instituer…  : autres traductions de commander à vos fils ; d''ordonner à vos fils ; de prescrire pour vos fils. –  qu''ils veillent… 5.1n. –  toutes les paroles de cette loi 17.19+.'
  - type: text
    content: 'il leur dit : Réfléchissez à toutes les paroles que je vous conjure aujourd''hui d''instituer pour vos fils, afin qu''ils veillent à mettre en pratique toutes les paroles de cette loi. '
  '47':
  - type: note
    content: 'votre vie 30.20. –  vous prolongerez vos jours 4.26+. –  terre 7.13+. –  vous allez prendre possession…  : litt. vous passez le Jourdain pour en prendre possession  ; cf. 1.21+ ; 31.13.'
  - type: text
    content: 'Car ce n''est pas pour vous une parole vide : c''est votre vie ; c''est par cette parole que vous prolongerez vos jours sur la terre dont vous allez prendre possession après avoir passé le Jourdain.'
  - type: heading
    content: Annonce de la mort de Moïse
  '48':
  - type: text
    content: ' '
  - type: note
    content: Nb 27.12-23.
  - type: text
    content: 'Ce jour même, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '49':
  - type: note
    content: '34.1. –  montagne des Abarim  : cf. Nb 27.12n. –  Canaan Gn 9.18n.'
  - type: text
    content: 'Monte dans cette montagne des Abarim, sur le mont Nebo en Moab, en face de Jéricho ; et regarde Canaan, que je donne comme propriété aux Israélites. '
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'S''ils se sont pervertis…  : texte obscur, fort diversement traduit par les versions anciennes ; on pourrait aussi comprendre  : ils se sont pervertis à ses yeux ; ils ne sont pas ses fils ; à eux le blâme  ; cf. v. 6,18 ; Es 1.2,4 ; Os 1.2 ; 2.6. –  génération tortueuse…  : cf. v. 20 ; 1.35+ ; Mt 12.39 ; 17.17/ / ; Ac 2.40 ; Ph 2.15.'
  - type: text
    content: S'ils se sont pervertis, ce n'est pas lui,
  - type: text
    content: 'mais ses fils qui sont à blâmer :'
  - type: text
    content: génération tortueuse et retorse !
  '50':
  - type: note
    content: réuni… Gn 25.8n,17 ; 35.29 ; 49.33. –  Aaron Nb 20.23-29.
  - type: text
    content: 'Tu mourras dans la montagne où tu vas monter et tu seras réuni aux tiens, comme Aaron, ton frère, est mort à Hor-la-Montagne et a été réuni aux siens, '
  '51':
  - type: note
    content: '1.37+. –  Meriba 33.2,8 ; Ex 17.1-7 ; Nb 20.1-13 ; 27.14. –  Qadesh  : le nom est apparenté au verbe traduit par montré ma sainteté  ; cf. Nb 20.12ns.'
  - type: text
    content: 'parce que vous avez commis un sacrilège envers moi au milieu des Israélites, aux eaux de Meriba de Qadesh, dans le désert de Tsîn, et que vous n''avez pas montré ma sainteté au milieu des Israélites. '
  '52':
  - type: note
    content: 3.27.
  - type: text
    content: Tu verras le pays devant toi ; mais tu n'entreras pas dans le pays que je donne aux Israélites.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ce que vous rendez  : le verbe peut évoquer l''idée de rendre à quelqu''un ce qu''il mérite ; autres traductions est-ce ainsi que vous traitez le Seigneur  ? Est-ce le Seigneur que vous traitez ainsi ? Terme apparenté en Ps 28.4+ ; 137.8 ; voir aussi Jl 4.4,7. –  ton père 1.31+ ; cf. Jn 8.41. –  qui t''a produit  : cf. Gn 4.1n  ; 14.19n. –  qui t''a fait  : cf. v. 15 ; Es 43.7+.'
  - type: text
    content: 'Est-ce là ce que vous rendez au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: peuple fou et dépourvu de sagesse ?
  - type: text
    content: N'est-il pas ton père, celui qui t'a produit ?
  - type: text
    content: N'est-ce pas lui qui t'a fait et qui t'a affermi ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: '4.32 ; cf. 6.20. –  Souviens-toi / considérez  : cf. 1.8n.'
  - type: text
    content: Souviens-toi des jours d'autrefois ;
  - type: text
    content: considérez les années, de génération en génération.
  - type: text
    content: Interroge ton père, et il te le racontera ;
  - type: text
    content: tes anciens, et ils te le diront.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 10 ; Ac 17.26 ; voir aussi Hé 2.5. –  les humains  : litt. les fils d''humain (hébreu ’adam ) ou des hommes  ; cf. Gn 1.26n  ; 11.5. –  d''après le nombre des Israélites  : litt. d''après le nombre des fils d''Israël  ; un commentaire juif ancien rapproche les 70 nations de Gn 10 des 70 membres de la famille de Jacob (ou Israël) recensés en Gn 46.27. La plupart des mss de LXX portent ici selon le nombre des anges de Dieu , mais quelques témoins grecs et hébreux ont lu des fils de Dieu , peut-être d''après un texte hébreu portant des fils d''El (Gn 21.33n  ; cf. Ps 29.1 ; 89.7 ; Jb 1.6+).'
  - type: text
    content: Quand le Très-Haut donna un patrimoine aux nations,
  - type: text
    content: quand il sépara les humains,
  - type: text
    content: il fixa les limites des peuples
  - type: text
    content: d'après le nombre des Israélites ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'la part  : cf. 4.19 ; 29.25. –  son patrimoine  : litt. le cordeau (ou la propriété, délimitée par le cordeau ) de son patrimoine  ; cf. 7.6+ ; Za 2.5,16.'
  - type: text
    content: 'car la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), c''est son peuple,'
  - type: text
    content: Jacob est son patrimoine.
