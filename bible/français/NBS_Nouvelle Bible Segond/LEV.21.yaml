          text: de peur de profaner (son peuple).
      marker-yv: yv-n
    - type: text
      text: 'Chef parmi les siens, il ne se rendra pas impur en se profanant. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
