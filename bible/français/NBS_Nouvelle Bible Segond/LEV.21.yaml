          text: 'mutilation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 24.20. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Règlement de la Guerre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ') 7.4ss : « Nul homme boiteux, aveugle, ou estropié, ou ayant dans sa chair une tare irréparable, ou frappé d''une impureté de sa chair, nul de ceux-là n''ira avec eux au combat. Tous, ce seront des volontaires pour le combat, et ils seront parfaits d''esprit et de corps et prêts pour le jour de la Vengeance. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se présenter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'approcher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Dis à Aaron : Parmi ta descendance, dans toutes vos générations, aucun homme qui a une malformation ne pourra se présenter pour présenter le pain de son Dieu. '
