      marker-yv: yv-n
    - type: text
      text: 'Il ne sortira pas du sanctuaire et il ne profanera pas le sanctuaire de son Dieu ; car il a été mis à part par l''huile d''onction de son Dieu. Je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prendra pour femme une vierge. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne prendra ni une veuve, ni une femme répudiée, profanée ou prostituée ; il prendra pour femme une vierge parmi les siens. '
  '15':
  - type: usfm
    marker: p
    children:
