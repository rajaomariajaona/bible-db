      marker-yv: yv-n
    - type: text
      text: 'Le prêtre qui a la supériorité sur ses frères, celui sur la tête duquel a été versée l''huile d''onction, celui qui a été investi et revêtu des vêtements sacrés, ne se défera pas les cheveux et ne déchirera pas ses vêtements. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
