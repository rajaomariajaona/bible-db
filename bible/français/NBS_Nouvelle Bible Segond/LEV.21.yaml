      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il n''ira vers aucun mort ; il ne se rendra pas impur, ni pour son père, ni pour sa mère. '
