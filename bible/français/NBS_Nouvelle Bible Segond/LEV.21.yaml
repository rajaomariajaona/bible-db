document_id: LEV.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règles concernant les prêtres
  - type: heading
    content: La vie privée des prêtres
  - type: text
    content: ' '
  - type: note
    content: 'Un prêtre  : litt. il (ou on ) ne se rendra pas… –  impur 5.2s ; cf. 10.6 ; voir pur. –  parmi les siens  : autre traduction parmi son peuple , de même aux v. 4,14s ; cf. 19.16n. –  pour un mort  : voir 19.28n  ; cf. Ez 44.25.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Parle aux fils d''Aaron, les prêtres ; tu leur diras : Un prêtre ne se rendra pas impur parmi les siens pour un mort, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'qui a la supériorité…  : litt. grand parmi ses frères , c.-à-d. le grand prêtre. –  huile d''onction 4.3n  ; 8.2,12. –  qui a été investi  : litt. dont on a rempli la main , cf. 7.37n  ; 8.33n. –  vêtements 8.7-9. –  ne déchirera pas ses vêtements  : sur les gestes de deuil, de tristesse ou de pénitence, cf. 10.6+ ; voir aussi Mt 26.65/ /.'
  - type: text
    content: 'Le prêtre qui a la supériorité sur ses frères, celui sur la tête duquel a été versée l''huile d''onction, celui qui a été investi et revêtu des vêtements sacrés, ne se défera pas les cheveux et ne déchirera pas ses vêtements. '
  '11':
  - type: note
    content: 'Il n''ira…  : cf. v. 1-4 ; 19.28n. –  impur  : voir pur.'
  - type: text
    content: 'Il n''ira vers aucun mort ; il ne se rendra pas impur, ni pour son père, ni pour sa mère. '
  '12':
  - type: note
    content: '10.7. –  mis à part  : le terme hébreu est apparenté au mot nazir, cf. 15.31n. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Il ne sortira pas du sanctuaire et il ne profanera pas le sanctuaire de son Dieu ; car il a été mis à part par l''huile d''onction de son Dieu. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '13':
  - type: text
    content: 'Il prendra pour femme une vierge. '
  '14':
  - type: text
    content: 'Il ne prendra ni une veuve, ni une femme répudiée, profanée ou prostituée ; il prendra pour femme une vierge parmi les siens. '
  '15':
  - type: note
    content: 'Il ne profanera (v. 7n) pas…  : on pourrait comprendre il n''introduira pas une descendance profane parmi les siens. –  qui le consacre  : autre traduction qui le rends saint.'
  - type: text
    content: 'Il ne profanera pas sa descendance parmi les siens : c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui le consacre.'
  - type: heading
    content: Cas d'incapacité
  '16':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '17':
  - type: note
    content: 'malformation  : le mot hébreu correspondant est traduit par mutilation en 24.20. Cf. Règlement de la Guerre (Qumrân) 7.4ss : « Nul homme boiteux, aveugle, ou estropié, ou ayant dans sa chair une tare irréparable, ou frappé d''une impureté de sa chair, nul de ceux-là n''ira avec eux au combat. Tous, ce seront des volontaires pour le combat, et ils seront parfaits d''esprit et de corps et prêts pour le jour de la Vengeance. » –  se présenter ou s''approcher, cf. 1.2n.'
  - type: text
    content: 'Dis à Aaron : Parmi ta descendance, dans toutes vos générations, aucun homme qui a une malformation ne pourra se présenter pour présenter le pain de son Dieu. '
  '18':
  - type: note
    content: 'boiteux  : autre traduction infirme. –  le nez déformé…  : traduction incertaine ; LXX le nez mutilé ou l''oreille coupée  ; on a aussi traduit, plus généralement (qu''il soit) défiguré ou difforme  ; cf. 22.23.'
  - type: text
    content: 'Aucun homme qui a une malformation ne pourra se présenter : qu''il soit aveugle, boiteux, qu''il ait le nez déformé ou un membre trop long ; '
  '19':
  - type: text
    content: 'qu''il ait une fracture au pied ou à la main ; '
  '2':
  - type: note
    content: 'ses plus proches parents  : litt. sa chair (18.6n) proche.'
  - type: text
    content: 'excepté pour ses plus proches parents, pour sa mère, pour son père, pour son fils, pour sa fille, pour son frère '
  '20':
  - type: note
    content: 'une dartre  : le mot ainsi traduit (aussi en 22.22) n''est pas le même qu''en 13.6-8 ; il s''agit ici d''une malformation permanente. –  testicules écrasés  : cf. Es 56.3-5.'
  - type: text
    content: 'qu''il soit bossu ou grêle, qu''il ait une tache à l''œil, la gale, une dartre ou les testicules écrasés. '
  '21':
  - type: note
    content: 'offrandes  : voir sacrifices.'
  - type: text
    content: 'Parmi la descendance d''Aaron, le prêtre, aucun homme qui a une malformation ne pourra s''approcher pour présenter les offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il a une malformation : il ne pourra pas s''approcher pour présenter le pain de son Dieu. '
  '22':
  - type: note
    content: La nourriture des prêtres et de leurs familles était composée en majeure partie de la portion prélevée sur les offrandes ; cf. 6.10,18s ; 7.6,14,31-36.
  - type: text
    content: 'Il pourra manger le pain de son Dieu, des choses très sacrées et des choses sacrées. '
  '23':
  - type: note
    content: 'mes sanctuaires  : ce pluriel désigne peut-être le sanctuaire et son contenu  ; autres traductions mes choses sacrées  ; voir cependant 26.31 ; Jr 51.51 ; Ez 21.7 ; 28.18 ; Am 7.9 ; Ps 68.36 ; 73.17. –  Seigneur (YHWH)  : voir noms divins. –  qui les consacre  : autre traduction qui les rends saints, cf. v. 15.'
  - type: text
    content: 'Mais il n''ira pas vers le voile et ne s''approchera pas de l''autel, car il a une malformation ; il ne profanera pas mes sanctuaires : c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui les consacre. '
  '24':
  - type: text
    content: Moïse dit cela à Aaron et à ses fils, ainsi qu'à tous les Israélites.
  '3':
  - type: note
    content: 'La femme mariée n''appartenait plus à la famille de son père, mais à celle de son mari (cf. 22.12s). –  pour celle-là  : LXX pour ceux-là.'
  - type: text
    content: 'et pour sa sœur encore vierge, qui est sa proche parente tant qu''elle n''est pas mariée ; pour celle-là il pourra se rendre impur. '
  '4':
  - type: note
    content: 'Chef  : traduction incertaine ; le mot hébreu (= Baal) peut signifier maître ou mari, de sorte que certains conjecturent  : s''il est mari, ou encore si elle (sa sœur) a un mari (cf. v. 3). –  en se profanant  : autre traduction de peur de profaner (son peuple).'
  - type: text
    content: 'Chef parmi les siens, il ne se rendra pas impur en se profanant. '
  '5':
  - type: note
    content: 19.27-28+ ; cf. 1R 18.28.
  - type: text
    content: 'Les prêtres ne se feront pas de tonsure sur la tête, ils ne se raseront pas les bords de la barbe et ils ne se feront pas d''incisions dans la chair. '
  '6':
  - type: note
    content: 'le pain  : le terme hébreu, qui désigne d''abord le pain, peut en fait s''appliquer à n''importe quelle nourriture ; de même aux v. 8,17,21s ; 3.11n  ; 22.11,13,25 ; cf. Nb 28.2 ; Ez 16.19 ; 44.7 ; Pr 9.5.'
  - type: text
    content: 'Ils seront saints pour leur Dieu et ne profaneront pas le nom de leur Dieu, car ce sont eux qui présentent les offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le pain de leur Dieu : ils seront saints. '
  '7':
  - type: note
    content: 'Cf. v. 13s ; Ez 44.22. –  profanée  : on pourrait traduire, dans un sens plus faible, déshonorée  ; cependant la situation est considérée du point de vue de la sainteté ou consécration du prêtre (v. 15), qui s''étend à toute sa famille ; cf. 18.21+. –  un prêtre…  : litt. il est saint… ou il est consacré à son Dieu.'
  - type: text
    content: 'Ils ne prendront pas une femme prostituée ou profanée, ils ne prendront pas une femme répudiée par son mari, car un prêtre est saint pour son Dieu. '
  '8':
  - type: note
    content: 'Cf. 11.44+. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Tu le regarderas comme saint, car c''est lui qui présente le pain de ton Dieu ; il sera saint pour toi, car moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), je suis saint, et c''est moi qui vous rends saints. '
  '9':
  - type: note
    content: 'jetée au feu  : litt. brûlée au feu  ; cf. Gn 38.24.'
  - type: text
    content: 'Si la fille d''un prêtre se profane en se prostituant, elle profane son père : elle sera jetée au feu.'
  - type: heading
    content: Règles relatives au grand prêtre
