      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il n'ira…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 1-4 ; 19.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
