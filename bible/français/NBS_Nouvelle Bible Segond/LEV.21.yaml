        marker: fr
        children:
        - type: text
          text: '21.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.27-28+ ; cf. 1R 18.28.
      marker-yv: yv-n
    - type: text
      text: 'Les prêtres ne se feront pas de tonsure sur la tête, ils ne se raseront pas les bords de la barbe et ils ne se feront pas d''incisions dans la chair. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu, qui désigne d''abord le pain, peut en fait s''appliquer à n''importe quelle nourriture ; de même aux v. 8,17,21s ; 3.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 22.11,13,25 ; cf. Nb 28.2 ; Ez 16.19 ; 44.7 ; Pr 9.5.'
      marker-yv: yv-n
    - type: text
      text: 'Ils seront saints pour leur Dieu et ne profaneront pas le nom de leur Dieu, car ce sont eux qui présentent les offrandes consumées par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le pain de leur Dieu : ils seront saints. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
