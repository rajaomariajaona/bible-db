          text: un prêtre…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il est '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il est consacré à son Dieu.
      marker-yv: yv-n
    - type: text
      text: 'Ils ne prendront pas une femme prostituée ou profanée, ils ne prendront pas une femme répudiée par son mari, car un prêtre est saint pour son Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 11.44+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'Tu le regarderas comme saint, car c''est lui qui présente le pain de ton Dieu ; il sera saint pour toi, car moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), je suis saint, et c''est moi qui vous rends saints. '
