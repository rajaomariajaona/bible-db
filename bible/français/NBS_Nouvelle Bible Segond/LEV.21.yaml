        - type: text
          text: déshonorée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cependant la situation est considérée du point de vue de la sainteté ou consécration du prêtre (v. 15), qui s''étend à toute sa famille ; cf. 18.21+. –  '
      - type: usfm
        marker: fq
