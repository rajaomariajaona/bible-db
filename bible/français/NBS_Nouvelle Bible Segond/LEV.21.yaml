      - type: usfm
        marker: fqa
        children:
        - type: text
          text: infirme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le nez déformé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le nez mutilé ou l'oreille coupée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; on a aussi traduit, plus généralement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (qu'il soit) défiguré ou difforme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 22.23.'
      marker-yv: yv-n
    - type: text
      text: 'Aucun homme qui a une malformation ne pourra se présenter : qu''il soit aveugle, boiteux, qu''il ait le nez déformé ou un membre trop long ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qu''il ait une fracture au pied ou à la main ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses plus proches parents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sa chair '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (18.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: proche.
      marker-yv: yv-n
    - type: text
      text: 'excepté pour ses plus proches parents, pour sa mère, pour son père, pour son fils, pour sa fille, pour son frère '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une dartre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot ainsi traduit (aussi en 22.22) n''est pas le même qu''en 13.6-8 ; il s''agit ici d''une malformation permanente. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: testicules écrasés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 56.3-5.'
      marker-yv: yv-n
    - type: text
      text: 'qu''il soit bossu ou grêle, qu''il ait une tache à l''œil, la gale, une dartre ou les testicules écrasés. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: offrandes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Parmi la descendance d''Aaron, le prêtre, aucun homme qui a une malformation ne pourra s''approcher pour présenter les offrandes consumées par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; il a une malformation : il ne pourra pas s''approcher pour présenter le pain de son Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La nourriture des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' et de leurs familles était composée en majeure partie de la portion prélevée sur les offrandes ; cf. 6.10,18s ; 7.6,14,31-36.'
      marker-yv: yv-n
    - type: text
      text: 'Il pourra manger le pain de son Dieu, des choses très sacrées et des choses sacrées. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mes sanctuaires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce pluriel désigne peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le sanctuaire et son contenu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mes choses sacrées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir cependant 26.31 ; Jr 51.51 ; Ez 21.7 ; 28.18 ; Am 7.9 ; Ps 68.36 ; 73.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui les consacre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui les rends '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saints
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 15.'
      marker-yv: yv-n
    - type: text
      text: 'Mais il n''ira pas vers le voile et ne s''approchera pas de l''autel, car il a une malformation ; il ne profanera pas mes sanctuaires : c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui les consacre. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse dit cela à Aaron et à ses fils, ainsi qu'à tous les Israélites.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La femme '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mariée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'n''appartenait plus à la famille de son père, mais à celle de son mari (cf. 22.12s). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour celle-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour ceux-là.
      marker-yv: yv-n
    - type: text
      text: 'et pour sa sœur encore vierge, qui est sa proche parente tant qu''elle n''est pas mariée ; pour celle-là il pourra se rendre impur. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
