document_id: PSA.106,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Infidélité d'Israël, fidélité de Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 105 ; ici l''accent va porter sur les infidélités du peuple ; cf. Za 7 ; Rm 11.22 ; 1Co 10.11. –  Louez le Seigneur v. 48 ; 104.35n. –  Célébrez…  : cf. 100.5+ ; 107.1 ; 118.1,29 ; 136.1ss ; Jr 33.11 ; Esd 3.11 ; 1Ch 16.34,41 ; 2Ch 5.13.'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: 'Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il est bon,'
  - type: text
    content: car sa fidélité est pour toujours !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 18.18 ; 107.2 ; Ex 14.30 ; Lc 1.71. –  repris 103.4n.
  - type: text
    content: Il les a sauvés de la main de celui qui les détestait,
  - type: text
    content: il les a repris à l'ennemi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ex 14.28 ; 15.5 ; Dt 11.4.
  - type: text
    content: 'Les eaux ont recouvert leurs adversaires :'
  - type: text
    content: il n'en est pas resté un seul.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ex 14.31 ; 15.1ss.
  - type: text
    content: Ils ont cru ses paroles,
  - type: text
    content: ils ont chanté sa louange.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'oublié v. 21 ; 78.11 ; Dt 4.9+. –  ils n''ont pas attendu  : cf. Ha 2.3 ; Lm 3.26. –  que ses projets se réalisent  : litt. son projet ou son conseil  ; même terme v. 43 ; 1.1 ; 13.3n  ; 33.10s ; 73.24 ; 107.11 ; Es 5.19n.'
  - type: text
    content: Mais ils ont vite oublié ses œuvres,
  - type: text
    content: ils n'ont pas attendu que ses projets se réalisent.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'remplis de désir  : cf. 78.29ss ; Ex 16 ; Nb 11 ; 1Co 10.6. –  provoqué 78.18nss ; 95.9. –  Dieu  : hébreu ’El , de même au v. 21 ; cf. Gn 21.33n.'
  - type: text
    content: Dans le désert, ils ont été remplis de désir,
  - type: text
    content: sur la terre aride ils ont provoqué Dieu.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ce qu''ils demandaient 1S 1.17. –  il leur a envoyé… ou il a envoyé le dépérissement dans leur gorge . –  le dépérissement  : traduction incertaine ; LXX la satiété  ; certains comprennent mais ce qu''il leur envoya ne leur suffit pas  ; cf. 78.25 ; Es 10.16 ; Mi 6.10 ( trop petit ).'
  - type: text
    content: Il leur a accordé ce qu'ils demandaient ;
  - type: text
    content: puis il leur a envoyé le dépérissement.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'jaloux… Nb 16. –  le saint (ou le sacré , c.-à-d. l''homme consacré ; cf. v. 47) du Seigneur  : cf. Lv 21.6ss ; Nb 6.5,8 ; 2R 4.9 ; 1Ch 23.13n  ; 2Ch 35.3 ; Mc 1.24.'
  - type: text
    content: Dans le camp, ils ont été jaloux de Moïse
  - type: text
    content: 'et d''Aaron, le saint du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: Nb 16.31s ; Dt 11.6.
  - type: text
    content: La terre s'est ouverte pour engloutir Datân,
  - type: text
    content: elle a recouvert la communauté d'Abiram ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Nb 16.26,35 ; Hé 10.27. –  les flammes  : litt. la flamme  ; cf. 83.15.'
  - type: text
    content: le feu a dévoré leur communauté,
  - type: text
    content: les flammes ont embrasé les méchants.
  '19':
  - type: text
    content: ' '
  - type: note
    content: taurillon ou veau  ; cf. Ex 32.4nss, Dt 9.8,11s,16,21 ; 1R 12.28,32 ; Né 9.18 ; Ac 7.41.
  - type: text
    content: Ils ont fait un taurillon à l'Horeb,
  - type: text
    content: ils se sont prosternés devant une idole de métal fondu,
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 40.6 ; Jb 26.14 ; Ec 1.8 ; Siracide 18.2ss : « Le Seigneur seul sera proclamé juste. A personne il n''a donné d''annoncer ses œuvres ; qui donc découvrira ses grandeurs ? La force de sa majesté, qui la calculera ? Qui entreprendra de raconter ses gestes de miséricorde ? On n''y peut rien retrancher ni ajouter, il n''est pas possible de découvrir les merveilles du Seigneur. Quand un homme en a fini, c''est alors qu''il commence, et lorsqu''il s''arrête, sa perplexité demeure. » –  hauts faits  : cf. 150.2 ; Dt 3.24.'
  - type: text
    content: 'Qui dira les hauts faits du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  - type: text
    content: Qui fera entendre toute sa louange ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'leur gloire  : autre lecture traditionnelle sa gloire  ; cf. Jr 2.11ss ; Os 4.7 ; Rm 1.23. –  l''image d''un bœuf Dt 4.16ss (le terme rendu ici par image est traduit là par modèle ).'
  - type: text
    content: ils ont échangé leur gloire
  - type: text
    content: contre l'image d'un bœuf qui mange de l'herbe.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ils ont oublié v. 13+ ; cf. Dt 32.18 ; Jr 2.32. –  de grandes choses en Egypte 78.43+.
  - type: text
    content: Ils ont oublié Dieu, leur Sauveur,
  - type: text
    content: qui avait fait de grandes choses en Egypte,
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cham 78.51+ ; 105.23,27 ; cf. Jr 32.21.
  - type: text
    content: des actes étonnants au pays de Cham,
  - type: text
    content: des actions redoutables sur la mer des Joncs.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 32.11ss ; Nb 14.13ss ; Dt 9.25ss ; Jr 15.1 ; Ez 22.30.
  - type: text
    content: Il a parlé de les détruire,
  - type: text
    content: sauf Moïse, celui qu'il avait choisi,
  - type: text
    content: qui s'est tenu sur la brèche devant lui,
  - type: text
    content: pour détourner sa fureur et l'empêcher d'exterminer.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Nb 13.32 ; 14 ; Dt 1.26ss,32 ; 9.23. –  renoncé à  : autres traduction rejeté ; méprisé  ; cf. Nb 14.31. –  pays de délices  : même expression en Jr 3.19 ; Za 7.14.'
  - type: text
    content: Ils ont renoncé à un pays de délices ;
  - type: text
    content: ils n'ont pas cru sa parole,
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'ils ont médit dans leurs tentes  : cf. Dt 1.27.'
  - type: text
    content: ils ont médit dans leurs tentes,
  - type: text
    content: 'ils n''ont pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '26':
  - type: text
    content: ' '
  - type: note
    content: 95.11 ; Nb 14.22s,29s ; 26.65.
  - type: text
    content: Il a levé la main contre eux
  - type: text
    content: pour les faire tomber dans le désert,
  '27':
  - type: text
    content: ' '
  - type: note
    content: '44.12 ; cf. v. 47 ; Lv 26.33 ; Dt 4.27 ; Ez 20.23. –  pour les disséminer  : autre traduction pour la disséminer . –  dans tous les pays  : litt. dans (ou parmi ) les pays.'
  - type: text
    content: pour faire tomber leur descendance parmi les nations,
  - type: text
    content: pour les disséminer dans tous les pays.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Ils se sont attachés  : même verbe en Nb 25.3,5. –  Baal-Péor Nb 23.28 ; 25.1ss ; 31.16 ; Dt 3.29n  ; 4.3 ; Jos 22.17 ; Os 9.10. –  les sacrifices des morts  : ce dernier terme désigne peut-être ici les faux dieux (115.4ss ; Lv 26.30).'
  - type: text
    content: Ils se sont attachés à Baal-Péor
  - type: text
    content: et ils ont mangé les sacrifices des morts.
  '29':
  - type: text
    content: ' '
  - type: note
    content: '78.59 ; Nb 25.5,8 ; 1Co 10.8. –  Ils l''ont contrarié  : c.-à-d. ils ont contrarié le Seigneur . –  agissements v. 39 ; 28.4 ; 77.12n. –  a éclaté  : autres traductions a causé des pertes ; a ouvert des brèches  ; cf. v. 23.'
  - type: text
    content: Ils l'ont contrarié par leurs agissements,
  - type: text
    content: et un fléau a éclaté parmi eux.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '1.1+ ; 15.2 ; 112.1ss ; Es 56.1s ; Jr 22.15 ; Pr 21.15 ; Jc 1.25. –  qui veillent à l''équité  : autres traductions qui gardent le droit ; qui observent la règle.'
  - type: text
    content: Heureux ceux qui veillent à l'équité,
  - type: text
    content: qui agissent selon la justice en tout temps !
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Nb 25.7ss. –  réglé l''affaire  : autre traduction arbitré (cf. Ex 21.22n  ; 1S 2.25n) ; LXX fait propitiation (ou expiation ).'
  - type: text
    content: Phinéas s'est levé, il a réglé l'affaire,
  - type: text
    content: et le fléau s'est arrêté ;
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'compté comme justice  : cf. Gn 15.6+. –  de génération… Nb 25.12s.'
  - type: text
    content: cela lui a été compté comme justice,
  - type: text
    content: de génération en génération, pour toujours.
  '32':
  - type: text
    content: ' '
  - type: note
    content: '95.8+ ; Ex 17.1-7 ; Nb 20.2-13 ; Dt 4.21. –  la Colère  : cf. 38.2 ; 102.11 ; Nb 1.53n.'
  - type: text
    content: Ils ont provoqué la Colère près des eaux de Meriba ;
  - type: text
    content: et cela a mal tourné pour Moïse à cause d'eux,
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'ils se sont rebellés contre…  : autre traduction ils ont aigri son esprit ou son souffle  ; on pourrait comprendre ils l''ont exaspéré (Moïse, ou moins probablement Dieu) ; cf. Gn 26.35 ; Es 63.10. –  il s''est exprimé… Nb 20.10,12 ; Dt 32.51.'
  - type: text
    content: car ils se sont rebellés contre son esprit,
  - type: text
    content: et il s'est exprimé légèrement des lèvres.
  '34':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 34.11s ; Nb 33.50ss ; Dt 7.1ss ; 20.16ss ; Jg 1.21ss.
  - type: text
    content: Ils n'ont pas détruit les peuples
  - type: text
    content: 'que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur avait indiqués.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: Jg 3.5s ; cf. Esd 9.2 ; 1Co 12.2 ; 15.33.
  - type: text
    content: Ils se sont mêlés aux nations
  - type: text
    content: et ils ont appris leurs œuvres.
  '36':
  - type: text
    content: ' '
  - type: note
    content: Ex 23.32s ; Dt 7.16 ; Jg 2.2s,12.
  - type: text
    content: Ils ont servi leurs idoles,
  - type: text
    content: et celles-ci ont été pour eux un piège ;
  '37':
  - type: text
    content: ' '
  - type: note
    content: Lv 18.21 ; Dt 12.31 ; 2R 16.3 ; 17.17 ; 21.6 ; 23.10 ; Es 57.5 ; Jr 7.31 ; 19.4s ; 32.35 ; Ez 16.20s ; 20.26 ; 23.39. –  démons Dt 32.17 ; 1Co 10.20.
  - type: text
    content: ils ont sacrifié leurs fils
  - type: text
    content: et leurs filles aux démons,
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'le pays a été profané Jr 23.2 ; Es 24.5. –  les effusions de sang  : litt. les sangs  ; cf. 2R 21.16 ; Es 1.15s ; Jr 2.34 ; 22.3,13 ; Mi 3.2s.'
  - type: text
    content: ils ont répandu le sang innocent,
  - type: text
    content: le sang de leurs fils et de leurs filles,
  - type: text
    content: qu'ils ont sacrifiés aux idoles de Canaan,
  - type: text
    content: et le pays a été profané par les effusions de sang.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 34.16 ; Jr 2.7 ; 3.6ss ; Ez 20.30 ; Os 1.2n. –  impurs  : voir pur.'
  - type: text
    content: Ils se sont rendus impurs par leurs œuvres,
  - type: text
    content: ils se sont prostitués par leurs agissements.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'souviens-toi de moi (versions anciennes de nous ) : cf. 25.7 ; Jr 15.15 ; Né 5.19 ; 13.31.'
  - type: text
    content: Seigneur
  - type: text
    content: ', souviens-toi de moi, dans ta faveur pour ton peuple !'
  - type: text
    content: Interviens pour moi par ton salut,
  '40':
  - type: text
    content: ' '
  - type: note
    content: '78.49,62 ; Jg 2.14ss. –  il a pris…  : autre traduction il a fait de ton patrimoine une abomination  ; cf. Ez 16.25.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est mis en colère contre son peuple,'
  - type: text
    content: et il a pris en abomination son patrimoine.
  '41':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 26.17 ; Né 9.27 ; Rm 1.24.
  - type: text
    content: Il les a livrés aux nations ;
  - type: text
    content: ceux qui les détestaient les ont dominés ;
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'humiliés  : le verbe hébreu rappelle le nom de Canaan ; cf. v. 38.'
  - type: text
    content: leurs ennemis les ont opprimés,
  - type: text
    content: et ils ont été humiliés sous leur main.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Jg 2.16s. –  ils ont fait des projets…  : litt. ils se sont rebellés dans leur projet ou leur conseil  ; certains s''appuient sur une variante pour lire ils se sont rebellés contre ses projets ou ses conseils  ; cf. v. 13n  ; 107.11.'
  - type: text
    content: Bien souvent il les a délivrés ;
  - type: text
    content: mais ils ont fait des projets de rebelles
  - type: text
    content: et ils se sont enfoncés dans leur faute.
  '44':
  - type: text
    content: ' '
  - type: note
    content: Cf. 107.6.
  - type: text
    content: Il a vu leur détresse
  - type: text
    content: lorsqu'il a entendu leur cri.
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'Il s''est souvenu… de son alliance 105.8+. –  il a eu pitié  : litt. il a eu du regret , cf. 90.13n  ; Jr 26.19 ; voir aussi Nb 23.19+.'
  - type: text
    content: Il s'est souvenu en leur faveur de son alliance ;
  - type: text
    content: il a eu pitié, selon sa grande fidélité,
  '46':
  - type: text
    content: ' '
  - type: note
    content: 1R 8.50n  ; Jr 42.12 ; Esd 9.9.
  - type: text
    content: et il leur a accordé la compassion
  - type: text
    content: de tous ceux qui les avaient emmenés captifs.
  - type: heading
    content: 1Ch 16.35-36
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 27 ; 107.3 ; Dt 30.3 ; 1Ch 16.35 ; 2 Maccabées 1.27 : « Rassemble ceux d''entre nous qui sont dispersés ; délivre ceux qui sont en esclavage parmi les nations, regarde favorablement ceux qui sont méprisés et objets d''abomination, afin que les nations reconnaissent que tu es notre Dieu. »'
  - type: text
    content: 'Sauve-nous, '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu,'
  - type: text
    content: et rassemble-nous d'entre les nations,
  - type: text
    content: afin que nous célébrions ton nom sacré
  - type: text
    content: et que nous mettions notre honneur à te louer !
  '48':
  - type: text
    content: ' '
  - type: note
    content: 41.14n  ; 1Ch 16.36 ; Lc 1.68. –  Que tout le peuple… Dt 27.15 ; Né 5.13 ; 8.6 ; Ap 19.4. –  Qu'il en soit ainsi ! ou Amen ! cf. 41.14 ; Dt 27.15n.
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël,'
  - type: text
    content: depuis toujours et pour toujours !
  - type: text
    content: 'Que tout le peuple dise : Qu''il en soit ainsi !'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 47. –  le bonheur de ceux que tu as choisis Es 65.9,15,22. –  j'en sois fier 105.3n  ; cf. Es 66.10.
  - type: text
    content: que je voie le bonheur de ceux que tu as choisis,
  - type: text
    content: que je me réjouisse de la joie de ta nation,
  - type: text
    content: que j'en sois fier avec ton patrimoine !
  '6':
  - type: text
    content: ' '
  - type: note
    content: Voir péché. –  comme (litt. avec ) nos pères Ex 34.7 ; Dt 7.9 ; cf. 1R 8.47 ; Jr 3.25 ; Lm 3.42 ; Dn 9.5.
  - type: text
    content: Nous avons péché comme nos pères,
  - type: text
    content: nous avons commis des fautes, nous avons agi comme les méchants ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'tes actes étonnants  : cf. v. 22 ; 78.4,11 ; 111.4 ; Ex 4.1,5,8 ; 14.11s ; Né 9.17. –  tout ce que…  : litt. la multitude de tes fidélités. –  près de la mer  : certains modifient l''expression correspondante dans le texte hébreu traditionnel pour lire contre le Très-Haut  ; cf. 78.17. –  mer des Joncs Ex 14.10ss.'
  - type: text
    content: nos pères en Egypte n'ont pas compris tes actes étonnants,
  - type: text
    content: ils ne se sont pas souvenus
  - type: text
    content: de tout ce que tu avais fait dans ta fidélité ;
  - type: text
    content: ils ont été rebelles près de la mer, à la mer des Joncs.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 109.21 ; Ez 20.9 ; cf. Ex 14.18. – Voir nom.
  - type: text
    content: Mais il les a sauvés à cause de son nom,
  - type: text
    content: pour faire connaître sa puissance.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Il a rabroué…  : cf. 9.6+ ; 78.13 ; 104.7 ; 114.3 ; Ex 14.21ss ; 15.5ss ; Na 1.4 ; Mc 4.39/ / ; Ap 16.12. –  à travers les abîmes… Es 63.13.'
  - type: text
    content: Il a rabroué la mer des Joncs, elle s'est desséchée ;
  - type: text
    content: et il les a fait marcher à travers les abîmes comme dans un désert.
