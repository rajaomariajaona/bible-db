document_id: ZEC.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Sixième vision : le rouleau volant'
  - type: text
    content: ' '
  - type: note
    content: 'je vis… 1.8+. –  un rouleau  : un livre en forme de rouleau ; cf. Jr 36 ; Ez 2.9s ; 3.1-3 ; Ap 10 ; LXX a lu une faucille , comme en Ap 14.16.'
  - type: text
    content: 'Je levai de nouveau les yeux et je vis un rouleau qui volait. '
  '10':
  - type: text
    content: 'Je dis au messager qui parlait avec moi : Où emportent-elles l''épha ? '
  '11':
  - type: note
    content: 'une maison  : peut-être au sens de temple  ; cf. 1.16+ ; 4.9. –  Shinéar ou Babylone ; cf. Gn 10.10n. –  quand elle sera prête  : traduction incertaine. –  à demeure  : autre traduction sur son piédestal.'
  - type: text
    content: 'Il me répondit : Elles vont lui bâtir une maison au pays de Shinéar ; quand elle sera prête, il sera déposé là à demeure.'
  '2':
  - type: note
    content: '4.2+. –  Le messager (ou l''ange) me dit  : litt. il me dit. –  vingt coudées…  : c.-à-d. près de 10 mètres sur 5 (voir mesures, poids et monnaies) ; cf. 1R 6.3.'
  - type: text
    content: 'Le messager me dit : Que vois-tu ? Je répondis : Je vois un rouleau qui vole ; il a vingt coudées de longueur, et dix coudées de largeur. '
  '3':
  - type: note
    content: 'Es 24.6. –  la malédiction  : autre traduction l''adjuration  ; sur le terme hébreu correspondant, voir Gn 24.41n  ; Lv 5.1n  ; Nb 5.21n  ; Dt 29.11n. –  sort  : cf. 2.7+. –  d''après elle…  : traduction incertaine ; d''autres comprennent  : tout voleur, selon elle de ce côté-ci (c.-à-d. au recto du rouleau), est resté impuni, et tout parjure (litt. quiconque jure  ; cf. v. 4), selon elle de ce côté-là (au verso), est resté impuni  ; cf. 8.17 ; Ml 3.5 ; Ps 15 ; 24.3-5.'
  - type: text
    content: 'Et il me dit : C''est la malédiction qui sort sur tout le pays ; en effet, d''après elle, tout voleur sera chassé d''ici et, d''après elle, tout parjure sera chassé d''ici.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Je la fais sortir  : cf. v. 3n  ; l''image peut être celle du rouleau qui écrase les transgresseurs ; cf. Es 9.7. –  faux serments par mon nom Lv 19.12+. –  sa charpente  : litt. ses bois  ; cf. Esd 6.11.'
  - type: text
    content: Je la fais sortir
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: afin qu'elle entre dans la maison du voleur
  - type: text
    content: et dans la maison de celui qui fait de faux serments par mon nom,
  - type: text
    content: afin qu'elle s'y loge
  - type: text
    content: et qu'elle la détruise, avec sa charpente et ses pierres.
  - type: heading
    content: 'Septième vision : l''épha'
  '5':
  - type: text
    content: 'Le messager qui parlait avec moi sortit et me dit : Lève les yeux, je te prie, et regarde ce qui sort là. '
  '6':
  - type: note
    content: 'l''épha, c.-à-d. un récipient contenant un épha (environ 20 l). –  ce que l''on voit d''eux  : litt. leur œil, peut-être au sens d’apparence ou de ce qu''ils regardent  ; LXX leur faute (graphie très proche en hébreu). –  dans tout le pays ou sur toute la terre.'
  - type: text
    content: 'Je demandai : Qu''est-ce que c''est ? Il répondit : C''est l''épha qui sort. Il ajouta : C''est ce que l''on voit d''eux dans tout le pays. '
  '7':
  - type: note
    content: Cf. Ec 7.25-26+. – Sur le terme traduit par disque, cf. Ex 29.23n.
  - type: text
    content: 'Alors un disque de plomb se souleva : il y avait une femme assise dans l''épha. '
  '8':
  - type: text
    content: 'Il dit : C''est la méchanceté. Il la rejeta dans l''épha et jeta la masse de plomb sur son ouverture.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'soufflait  : sous-entendu dans le texte. –  la cigogne  : en hébreu hassida , nom qui rappelle le terme habituellement traduit par bonté ou fidélité , voire piété  ; cf. Lv 14.7 ; Ap 12.14.'
  - type: text
    content: 'Je levai les yeux et je vis deux femmes qui sortaient. Le vent soufflait dans leurs ailes ; elles avaient des ailes comme celles de la cigogne. Elles enlevèrent l''épha entre la terre et le ciel. '
