document_id: ZEC.5,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Sixième vision : le rouleau volant'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je vis… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un rouleau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : un livre en forme de rouleau ; cf. Jr 36 ; Ez 2.9s ; 3.1-3 ; Ap 10 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une faucille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en Ap 14.16.'
      marker-yv: yv-n
    - type: text
      text: 'Je levai de nouveau les yeux et je vis un rouleau qui volait. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je dis au messager qui parlait avec moi : Où emportent-elles l''épha ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peut-être au sens de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: '  ; cf. 1.16+ ; 4.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shinéar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou Babylone ; cf. Gn 10.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quand elle sera prête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à demeure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur son piédestal.
      marker-yv: yv-n
    - type: text
      text: 'Il me répondit : Elles vont lui bâtir une maison au pays de Shinéar ; quand elle sera prête, il sera déposé là à demeure.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le messager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: me dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il me dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vingt coudées…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. près de 10 mètres sur 5 (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies) ; cf. 1R 6.3.'
      marker-yv: yv-n
    - type: text
      text: 'Le messager me dit : Que vois-tu ? Je répondis : Je vois un rouleau qui vole ; il a vingt coudées de longueur, et dix coudées de largeur. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 24.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la malédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'adjuration
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le terme hébreu correspondant, voir Gn 24.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 5.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 29.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'après elle…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; d''autres comprennent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout voleur, selon elle de ce côté-ci '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (c.-à-d. au recto du rouleau)
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', est resté impuni, et tout parjure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quiconque jure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 4)'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', selon elle de ce côté-là '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (au verso)
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', est resté impuni'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 8.17 ; Ml 3.5 ; Ps 15 ; 24.3-5.'
      marker-yv: yv-n
    - type: text
      text: 'Et il me dit : C''est la malédiction qui sort sur tout le pays ; en effet, d''après elle, tout voleur sera chassé d''ici et, d''après elle, tout parjure sera chassé d''ici.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je la fais sortir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; l''image peut être celle du rouleau qui écrase les transgresseurs ; cf. Es 9.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'faux serments par mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 19.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa charpente
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses bois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Esd 6.11.
      marker-yv: yv-n
    - type: text
      text: Je la fais sortir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '– déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées –'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'elle entre dans la maison du voleur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dans la maison de celui qui fait de faux serments par mon nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'elle s'y loge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'elle la détruise, avec sa charpente et ses pierres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Septième vision : l''épha'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le messager qui parlait avec moi sortit et me dit : Lève les yeux, je te prie, et regarde ce qui sort là. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'épha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. un récipient contenant un épha (environ 20 l). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que l'on voit d'eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur œil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', peut-être au sens d’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'apparence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qu'ils regardent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leur faute '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(graphie très proche en hébreu). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans tout le pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur toute la terre.
      marker-yv: yv-n
    - type: text
      text: 'Je demandai : Qu''est-ce que c''est ? Il répondit : C''est l''épha qui sort. Il ajouta : C''est ce que l''on voit d''eux dans tout le pays. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ec 7.25-26+. – Sur le terme traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: disque
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ex 29.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors un disque de plomb se souleva : il y avait une femme assise dans l''épha. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit : C''est la méchanceté. Il la rejeta dans l''épha et jeta la masse de plomb sur son ouverture.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: soufflait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la cigogne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : en hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hassida
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', nom qui rappelle le terme habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bonté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fidélité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: piété
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Lv 14.7 ; Ap 12.14.
      marker-yv: yv-n
    - type: text
      text: 'Je levai les yeux et je vis deux femmes qui sortaient. Le vent soufflait dans leurs ailes ; elles avaient des ailes comme celles de la cigogne. Elles enlevèrent l''épha entre la terre et le ciel. '
