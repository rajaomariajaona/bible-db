document_id: JHN.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort de Lazare, l'ami de Jésus
  - type: text
    content: ' '
  - type: note
    content: 'Lazare  : cf. Lc 16.20nss. –  Béthanie  : sur le versant oriental du mont des Oliviers, tout près de Jérusalem : cf. 1.28n  ; 11.18n  ; Mt 21.17/ /. –  Marie / Marthe Lc 10.38ss.'
  - type: text
    content: 'Il y avait un malade, Lazare, de Béthanie, le village de Marie et de Marthe, sa sœur. '
  '10':
  - type: note
    content: Cf. 1.38n  ; 12.35s ; 13.30 ; Mt 6.22s ; 1Jn 2.11.
  - type: text
    content: mais si quelqu'un marche de nuit, il trébuche, parce que la lumière n'est pas en lui.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 9.24/ / ; 27.52 ; Ac 7.60 ; 1Co 11.30 ; Ep 5.14. –  il ajoute  : litt. il leur dit . –  le réveiller de son sommeil  : le verbe correspondant n''apparaît qu''ici dans tout le N.T. ; c''est un autre verbe qui est traduit par réveiller en 12.1 etc.'
  - type: text
    content: 'Après avoir dit cela, il ajoute : Lazare, notre ami, s''est endormi, mais je vais le réveiller de son sommeil. '
  '12':
  - type: note
    content: 'il est sauvé  : litt. il sera sauvé  ; dans son sens le plus banal l''expression signifie simplement il guérira  ; cf. Mt 9.21n.'
  - type: text
    content: 'Les disciples lui dirent : Seigneur, s''il s''est endormi, il est sauvé ! '
  '13':
  - type: note
    content: 'd''un simple sommeil  : litt. de l''endormissement du sommeil, cf. v. 24n.'
  - type: text
    content: 'Jésus avait parlé de sa mort, mais eux pensèrent qu''il parlait d''un simple sommeil. '
  '14':
  - type: text
    content: 'Alors Jésus leur dit ouvertement : Lazare est mort. '
  '15':
  - type: note
    content: que vous croyiez ou que vous ayez foi v. 42 ; 1.7n.
  - type: text
    content: 'Et, pour vous, je me réjouis de n''avoir pas été là, afin que vous croyiez. Mais allons vers lui. '
  '16':
  - type: note
    content: 'Thomas 14.5 ; 20.24-28 ; 21.2 ; cf. Mt 10.3/ /. –  le Jumeau ou Didyme, en grec Didumos, terme qui signifie jumeau et dont l''équivalent araméen (te''ômâ) rappelle le nom grec Thomas. –  que nous mourions avec lui  : cf. 12.25 ; Mc 14.31/ / ; Rm 6.8.'
  - type: text
    content: 'Thomas, celui qu''on appelle le Jumeau, dit alors aux autres disciples : Allons-y, nous aussi, pour que nous mourions avec lui !'
  - type: heading
    content: La résurrection et la vie
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 6,39. –  constata  : litt. trouva.'
  - type: text
    content: 'A son arrivée, Jésus constata que Lazare était déjà dans le tombeau depuis quatre jours. '
  '18':
  - type: note
    content: 'quinze stades  : environ 3 km ; voir mesures.'
  - type: text
    content: 'Or Béthanie était proche de Jérusalem, à quinze stades environ. '
  '19':
  - type: note
    content: 'V. 45 ; 12.9-11,17-19. –  Juifs  : cf. 1.19n.'
  - type: text
    content: Beaucoup de Juifs étaient venus trouver Marthe et Marie pour les réconforter au sujet de leur frère.
  '2':
  - type: note
    content: Voir 12.1-8.
  - type: text
    content: '– C''est Marie qui répandit du parfum sur le Seigneur et qui lui essuya les pieds avec ses cheveux, et c''est son frère, Lazare, qui était malade. – '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 10.39s.
  - type: text
    content: 'Lorsque Marthe eut entendu dire que Jésus arrivait, elle vint au-devant de lui, tandis que Marie restait assise à la maison. '
  '21':
  - type: note
    content: Cf. v. 6,32,37.
  - type: text
    content: 'Marthe dit à Jésus : Seigneur, si tu avais été ici, mon frère ne serait pas mort ! '
  '22':
  - type: note
    content: 'je sais…  : cf. 16.30.'
  - type: text
    content: 'Mais maintenant même, je sais que tout ce que tu demanderas à Dieu, Dieu te le donnera. '
  '23':
  - type: text
    content: 'Jésus lui dit : Ton frère se relèvera. '
  '24':
  - type: note
    content: Cf. 5.28s ; 6.39+ ; Ac 24.15. – Les termes correspondant à se relèvera et résurrection sont apparentés (le même verbe est traduit par se lever au v. 31 ; un synonyme, qui signifie également se réveiller, est employé au v. 29, cf. 2.19n) ; de même v. 23,25 ; cf. 5.29n.
  - type: text
    content: 'Je sais, lui répondit Marthe, qu''il se relèvera à la résurrection, au dernier jour. '
  '25':
  - type: note
    content: 'C''est moi qui suis… 6.35+. –  la résurrection  : cf. 5.21,25 ; Ap 1.18. –  et la vie (ces mots sont absents de certains mss) 14.6 ; cf. 1.4 ; 1Jn 5.20. –  met sa foi  : le même verbe est aussi traduit par croire au v. 26 et par être convaincu v. 27n. –  vivra ou viendra à la vie.'
  - type: text
    content: 'Jésus lui dit : C''est moi qui suis la résurrection et la vie. Celui qui met sa foi en moi, même s''il meurt, vivra ; '
  '26':
  - type: note
    content: 'ne mourra jamais (4.14n) : cf. 3.17+ ; 5.24s ; 8.51.'
  - type: text
    content: 'et quiconque vit et met sa foi en moi ne mourra jamais. Crois-tu cela ? '
  '27':
  - type: note
    content: 'je suis convaincue  : autre traduction j''ai acquis la foi ; je crois une fois pour toutes  ; sur le temps du verbe (cf. v. 25n), cf. 6.69n  ; 16.27 ; 20.29. –  Christ / Fils de Dieu  : cf. 6.69 ; 11.27 ; 20.31 ; Mt 16.16+ ; voir aussi 1.34+. –  celui qui vient (ou qui devait venir) dans le monde 1.9+ ; cf. Mt 11.3n.'
  - type: text
    content: 'Elle lui dit : Oui, Seigneur, moi, je suis convaincue que c''est toi qui es le Christ, le Fils de Dieu, celui qui vient dans le monde.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'V. 20. –  maître  : au sens d’ enseignant.'
  - type: text
    content: 'Après avoir dit cela, elle s''en alla. Puis elle appela Marie, sa sœur, et lui dit en secret : Le maître est arrivé, il t''appelle. '
  '29':
  - type: text
    content: 'Dès qu''elle entendit cela, celle-ci se leva vite pour venir à lui ; '
  '3':
  - type: note
    content: 'quelqu''un  : sous-entendu dans le texte. –  ton ami  : litt. celui que tu aimes (d''amitié)  ; cf. 11.5n,36 ; voir aussi 13.1,23+ ; Mc 10.21 ; 2Jn 1.'
  - type: text
    content: 'Les sœurs envoyèrent quelqu''un lui dire : Seigneur, ton ami est malade. '
  '30':
  - type: text
    content: 'car Jésus n''était pas encore entré dans le village ; il était encore au lieu où Marthe était venue au-devant de lui. '
  '31':
  - type: text
    content: Les Juifs qui étaient dans la maison avec Marie pour la réconforter la virent se lever vite et sortir ; ils la suivirent, pensant qu'elle allait pleurer au tombeau.
  '32':
  - type: text
    content: ' '
  - type: note
    content: V. 21.
  - type: text
    content: 'Lorsque Marie fut arrivée là où était Jésus et qu''elle le vit, elle tomba à ses pieds et lui dit : Seigneur, si tu avais été ici, mon frère ne serait pas mort ! '
  '33':
  - type: note
    content: 'son esprit s''emporta  : litt. il s''emporta dans l''esprit (ou dans l''Esprit, cf. 13.21n) ; sur le verbe grec traduit par s''emporter (aussi v. 38n), cf. Mc 1.43n  ; d''autres le traduisent ici par frémir. –  il se troubla 5.3n  ; 12.27 ; 13.21.'
  - type: text
    content: 'Quand Jésus la vit pleurer, et qu''il vit pleurer aussi les Juifs qui étaient venus avec elle, son esprit s''emporta et il se troubla. '
  '34':
  - type: note
    content: viens voir ! cf. 1.46n.
  - type: text
    content: 'Il dit : Où l''avez-vous mis ? – Seigneur, lui répondirent-ils, viens voir ! '
  '35':
  - type: note
    content: Lc 19.41 ; Hé 5.7. Le verbe correspondant à fondit en larmes n'apparaît qu'ici dans le N.T.
  - type: text
    content: 'Jésus fondit en larmes. '
  '36':
  - type: note
    content: 'C''était vraiment…  : litt. voyez comme il l''aimait, v. 3n.'
  - type: text
    content: 'Les Juifs disaient donc : C''était vraiment son ami ! '
  '37':
  - type: note
    content: 'l''aveugle 9.1-41. –  cet homme  : litt. celui-ci. –  ne meure pas v. 21+.'
  - type: text
    content: 'Mais quelques-uns d''entre eux dirent : Lui qui a ouvert les yeux de l''aveugle, ne pouvait-il pas aussi faire en sorte que cet homme ne meure pas ?'
  - type: heading
    content: Jésus rappelle Lazare à la vie
  '38':
  - type: text
    content: ' '
  - type: note
    content: 's''emportant  : litt. s''emportant (ou frémissant ) en lui-même , v. 33n. –  tombeau / pierre  : cf. 20.1 ; Mt 27.60/ /. –  devant  : autre traduction possible dessus (auquel cas il s''agirait d''un tombeau creusé verticalement dans le sol et non horizontalement, dans une paroi).'
  - type: text
    content: 'Jésus, s''emportant de nouveau, vint au tombeau. C''était une grotte, et une pierre était placée devant. '
  '39':
  - type: note
    content: quatrième jour v. 17.
  - type: text
    content: 'Jésus dit : Enlevez la pierre. Marthe, la sœur du mort, lui dit : Seigneur, il sent déjà : c''est le quatrième jour ! '
  '4':
  - type: note
    content: 'Cf. 9.3 ; 10.33s. –  ne mène pas à la mort  : cf. 1Jn 5.16ss. –  le Fils de Dieu soit glorifié 7.39+ ; cf. 2.11+ ; voir aussi 11.45-54 ; 12.16,23,28 ; 13.31s.'
  - type: text
    content: 'Quand il entendit cela, Jésus dit : Cette maladie ne mène pas à la mort ; elle est pour la gloire de Dieu, afin que par elle le Fils de Dieu soit glorifié. '
  '40':
  - type: note
    content: 'Ne t''ai-je pas dit  : cf. v. 23-26. –  si tu crois ou si tu as foi, cf. v. 42,45,48. –  la gloire de Dieu v. 4 ; cf. 1.14+ ; 2.11.'
  - type: text
    content: 'Jésus lui dit : Ne t''ai-je pas dit que si tu crois, tu verras la gloire de Dieu ? '
  '41':
  - type: note
    content: 'la pierre  : certains mss ajoutent du lieu où le mort était couché. –  leva les yeux  : litt. leva les yeux en haut  ; cf. 17.1 ; Mt 14.19/ / ; Mc 7.34+ ; Lc 18.13 ; Ac 7.55. –  Père… Mt 11.25. –  rends grâce  : cf. Mt 26.27n. –  entendu ou écouté, exaucé  ; voir 9.31n.'
  - type: text
    content: 'Ils enlevèrent donc la pierre. Jésus leva les yeux et dit : Père, je te rends grâce de ce que tu m''as entendu. '
  '42':
  - type: note
    content: 'tu m''entends toujours  : cf. 15.7,16 ; 16.23s ; 1Jn 3.21s ; 5.14s. –  qu''ils croient v. 15 ; cf. 5.34 ; 6.29 ; 12.30 ; 17.8,21 ; cf. 1R 18.36s.'
  - type: text
    content: 'Quant à moi, je savais que tu m''entends toujours, mais j''ai parlé à cause de la foule qui se tient ici, pour qu''ils croient que c''est toi qui m''as envoyé. '
  '43':
  - type: note
    content: 'Cf. 5.28s. –  il cria  : litt. il cria d''une grande voix.'
  - type: text
    content: 'Après avoir dit cela, il cria : Lazare, sors ! '
  '44':
  - type: note
    content: Cf. 19.40 ; 20.6s.
  - type: text
    content: 'Et le mort sortit, les pieds et les mains liés de bandelettes, et le visage enveloppé d''un linge. Jésus leur dit : Déliez-le, et laissez-le aller.'
  - type: heading
    content: Le complot contre Jésus
  '45':
  - type: text
    content: ' '
  - type: note
    content: V. 19 ; 2.23+.
  - type: text
    content: 'Beaucoup de Juifs qui étaient venus chez Marie, ayant vu ce qu''il avait fait, mirent leur foi en lui. '
  '46':
  - type: note
    content: Cf. 5.15 ; voir aussi Lc 16.31.
  - type: text
    content: Mais quelques-uns d'entre eux s'en allèrent trouver les pharisiens pour leur dire ce que Jésus avait fait.
  '47':
  - type: text
    content: ' '
  - type: note
    content: sanhédrin Mt 26.3-5/ / ; Mc 8.31n. –  signes 2.11+ ; cf. 15.24.
  - type: text
    content: 'Alors les grands prêtres et les pharisiens rassemblèrent le sanhédrin et dirent : Qu''allons-nous faire ? Car cet homme produit beaucoup de signes. '
  '48':
  - type: note
    content: '12.19 ; Mt 27.18 ; Ac 4.16. –  détruire  : litt. enlever. –  notre lieu  : le terme est sans doute à entendre dans un sens fort (4.20n) ; on pourrait aussi traduire notre lieu saint, notre lieu sacré  : il s''agit de Jérusalem ou plus particulièrement du temple ; cf. Ac 6.13s.'
  - type: text
    content: 'Si nous le laissons faire, tous mettront leur foi en lui, et les Romains viendront détruire et notre lieu et notre nation. '
  '49':
  - type: note
    content: Caïphe 18.13 ; cf. Mt 26.3,57/ / ; Lc 3.2 ; Ac 4.6.
  - type: text
    content: 'Mais l''un d''eux, Caïphe, qui était grand prêtre cette année-là, leur dit : Vous, vous ne savez rien ; '
  '5':
  - type: note
    content: 'aimait  : les meilleurs mss ont ici un autre verbe qu''aux v. 3,36 ; ici c''est celui du commandement d''amour (agapaô, 13.35), là celui de l''affection ou de l''amitié (philéô) ; cependant les deux sont probablement équivalents pour Jn, qui aime à faire alterner les synonymes sans qu''une nuance particulière apparaisse dans l''emploi de tel ou tel terme (ainsi les deux verbes traduits par connaître en 8.55, les deux verbes traduits par dire en 12.49-50n, les deux verbes traduits par demander en 14.13+,16n, les deux verbes traduits par voir en 16.16n) ; cf. 20.2n  ; 21.15n.'
  - type: text
    content: Or Jésus aimait Marthe, sa sœur et Lazare.
  '50':
  - type: note
    content: 'qu''un seul homme meure pour le peuple  : cf. 18.14 ; Jon 1.12-15 ; 2Co 5.14. –  ne soit pas perdue 3.16n.'
  - type: text
    content: 'vous ne vous rendez pas compte qu''il est avantageux pour vous qu''un seul homme meure pour le peuple et que la nation ne soit pas perdue tout entière. '
  '51':
  - type: note
    content: 'grand prêtre  : cf. Ex 28.30 ; Nb 27.21. –  il annonça…  : cf. Gn 50.20. – Voir prophète. –  que Jésus allait…  : litt. qu''il allait…'
  - type: text
    content: 'Or il ne dit pas cela de lui-même ; mais, comme il était grand prêtre cette année-là, il annonça, en prophète, que Jésus allait mourir pour la nation '
  '52':
  - type: note
    content: 'non pas seulement pour la nation…  : cf. 4.42 ; 10.16 ; 1Jn 2.2 ; Es 49.5s. –  dans l''unité  : litt. en un (seul), cf. 10.16 ; 17.19-23.'
  - type: text
    content: '– et non pas seulement pour la nation, mais aussi pour rassembler dans l''unité les enfants de Dieu dispersés. '
  '53':
  - type: note
    content: 5.18+ ; 12.10 ; cf. Lc 14.31n.
  - type: text
    content: Dès ce jour-là, ils décidèrent de le tuer.
  '54':
  - type: text
    content: ' '
  - type: note
    content: 'circulait  : litt. marchait . –  ouvertement 7.4n. –  Ephraïm  : probablement à une vingtaine de kilomètres au nord-est de Jérusalem. –  avec ses disciples 2.12 ; 3.22.'
  - type: text
    content: Jésus donc ne circulait plus ouvertement parmi les Juifs ; mais il partit de là pour la région proche du désert, dans une ville appelée Ephraïm ; il y demeurait avec ses disciples.
  '55':
  - type: text
    content: ' '
  - type: note
    content: 'La Pâque des Juifs  : cf. 2.13+ ; 13.1 ; voir aussi calendrier et fêtes. –  se purifier  : cf. 2.6+ ; 18.28 ; Ex 19.10-15 ; Nb 9.9-14 ; 2Ch 30.1-3,17-20 ; Ac 21.24-26 ; 24.18.'
  - type: text
    content: 'La Pâque des Juifs était proche ; et beaucoup de gens du pays montèrent à Jérusalem avant la Pâque, pour se purifier. '
  '56':
  - type: note
    content: 7.11 ; 12.9. – Voir temple.
  - type: text
    content: 'Ils cherchaient Jésus et se disaient les uns aux autres, dans le temple : Qu''en pensez-vous ? Ne viendra-t-il pas du tout à la fête ? '
  '57':
  - type: note
    content: '7.30+,32. –  grands prêtres / pharisiens 7.32+ ; voir aussi Mt 2.4n. –  des ordres  : le terme est habituellement traduit par commandement(s) (10.18+).'
  - type: text
    content: Or les grands prêtres et les pharisiens avaient donné des ordres pour que, si quelqu'un savait où il était, il les en informe, afin qu'on l'arrête.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'au lieu où il était  : en Pérée (10.40), à une dizaine d''heures de marche de Béthanie ; cf. 11.17+,21+.'
  - type: text
    content: 'Quand donc il eut entendu dire que celui-ci était malade, il demeura encore deux jours au lieu où il était, '
  '7':
  - type: note
    content: Judée 3.22+.
  - type: text
    content: 'puis il dit aux disciples : Retournons en Judée. '
  '8':
  - type: note
    content: '8.59+ ; 10.31 ; cf. 5.18+ ; 10.18. –  tout récemment  : litt. maintenant. –  les Juifs  : cf. 1.19n.'
  - type: text
    content: 'Les disciples lui disent : '
  - type: text
    content: Rabbi,
  - type: text
    content: ' tout récemment les Juifs cherchaient à te lapider, et tu y retournes ! '
  '9':
  - type: note
    content: '9.4+. –  heures  : cf. 2.4+. –  la lumière de ce monde  : cf. 8.12+.'
  - type: text
    content: 'Jésus répondit : N''y a-t-il pas douze heures dans le jour ? Si quelqu''un marche de jour, il ne trébuche pas, parce qu''il voit la lumière de ce monde ; '
