document_id: JHN.11,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Lazare, l'ami de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Lazare
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Lc 16.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Béthanie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sur le versant oriental du mont des Oliviers, tout près de Jérusalem : cf. 1.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 21.17/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Marie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Marthe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lc 10.38ss.
      marker-yv: yv-n
    - type: text
      text: 'Il y avait un malade, Lazare, de Béthanie, le village de Marie et de Marthe, sa sœur. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.38
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.35s ; 13.30 ; Mt 6.22s ; 1Jn 2.11.'
      marker-yv: yv-n
    - type: text
      text: mais si quelqu'un marche de nuit, il trébuche, parce que la lumière n'est pas en lui.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Mt 9.24/ / ; 27.52 ; Ac 7.60 ; 1Co 11.30 ; Ep 5.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il ajoute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il leur dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le réveiller de son sommeil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe correspondant n''apparaît qu''ici dans tout le N.T. ; c''est un autre verbe qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'réveiller '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 12.1 etc.
      marker-yv: yv-n
    - type: text
      text: 'Après avoir dit cela, il ajoute : Lazare, notre ami, s''est endormi, mais je vais le réveiller de son sommeil. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il est sauvé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il sera sauvé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; dans son sens le plus banal l''expression signifie simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il guérira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mt 9.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les disciples lui dirent : Seigneur, s''il s''est endormi, il est sauvé ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un simple sommeil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'endormissement du sommeil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus avait parlé de sa mort, mais eux pensèrent qu''il parlait d''un simple sommeil. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors Jésus leur dit ouvertement : Lazare est mort. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que vous croyiez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que vous ayez foi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 42 ; 1.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Et, pour vous, je me réjouis de n''avoir pas été là, afin que vous croyiez. Mais allons vers lui. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Thomas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.5 ; 20.24-28 ; 21.2 ; cf. Mt 10.3/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Jumeau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Didyme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', en grec '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Didumos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jumeau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et dont l'équivalent araméen (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: te'ômâ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') rappelle le nom grec Thomas. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que nous mourions avec lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.25 ; Mc 14.31/ / ; Rm 6.8.'
      marker-yv: yv-n
    - type: text
      text: 'Thomas, celui qu''on appelle le Jumeau, dit alors aux autres disciples : Allons-y, nous aussi, pour que nous mourions avec lui !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La résurrection et la vie
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 6,39. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: constata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trouva.
      marker-yv: yv-n
    - type: text
      text: 'A son arrivée, Jésus constata que Lazare était déjà dans le tombeau depuis quatre jours. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quinze stades
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 3 km ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Or Béthanie était proche de Jérusalem, à quinze stades environ. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 45 ; 12.9-11,17-19. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Beaucoup de Juifs étaient venus trouver Marthe et Marie pour les réconforter au sujet de leur frère.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 12.1-8.
      marker-yv: yv-n
    - type: text
      text: '– C''est Marie qui répandit du parfum sur le Seigneur et qui lui essuya les pieds avec ses cheveux, et c''est son frère, Lazare, qui était malade. – '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lc 10.39s.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Marthe eut entendu dire que Jésus arrivait, elle vint au-devant de lui, tandis que Marie restait assise à la maison. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 6,32,37.
      marker-yv: yv-n
    - type: text
      text: 'Marthe dit à Jésus : Seigneur, si tu avais été ici, mon frère ne serait pas mort ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je sais…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.30.'
      marker-yv: yv-n
    - type: text
      text: 'Mais maintenant même, je sais que tout ce que tu demanderas à Dieu, Dieu te le donnera. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jésus lui dit : Ton frère se relèvera. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 5.28s ; 6.39+ ; Ac 24.15. – Les termes correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se relèvera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: résurrection
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sont apparentés (le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se lever '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 31 ; un synonyme, qui signifie également '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se réveiller
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', est employé au v. 29, cf. 2.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; de même v. 23,25 ; cf. 5.29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je sais, lui répondit Marthe, qu''il se relèvera à la résurrection, au dernier jour. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est moi qui suis… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.35+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la résurrection
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.21,25 ; Ap 1.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et la vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ces mots sont absents de certains mss) 14.6 ; cf. 1.4 ; 1Jn 5.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: met sa foi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'croire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 26 et par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'être convaincu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 27
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vivra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: viendra à la vie.
      marker-yv: yv-n
    - type: text
      text: 'Jésus lui dit : C''est moi qui suis la résurrection et la vie. Celui qui met sa foi en moi, même s''il meurt, vivra ; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne mourra jamais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (4.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : cf. 3.17+ ; 5.24s ; 8.51.'
      marker-yv: yv-n
    - type: text
      text: 'et quiconque vit et met sa foi en moi ne mourra jamais. Crois-tu cela ? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je suis convaincue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai acquis la foi ; je crois une fois pour toutes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le temps du verbe (cf. v. 25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), cf. 6.69
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 16.27 ; 20.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Christ '
      - type: usfm
        marker: ft
