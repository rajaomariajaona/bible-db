document_id: ROM.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Face aux autorités établies
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Pr 8.15s ; Mt 22.16-21 ; Jn 19.11 ; 1Tm 2.1 ; Tt 3.1 ; 1P 2.13-17 ; cf. Sagesse 6.3 : « Vous (rois) avez reçu du Seigneur votre pouvoir, du Très-Haut, votre souveraineté, et c''est lui qui examinera vos actes et scrutera vos desseins. » –  chacun 2.9n. –  autorités  : voir aussi Ep 6.12 et Col 1.16 où le mot désigne peut-être une réplique céleste des pouvoirs terrestres, comme les « princes » de Dn 10.13,20 ; cf. Rm 8.38s. –  établies  : autres traductions qui dominent, qui gouvernent  : même terme en Ph 2.3 ( supérieur ) ; 3.8 ( supériorité ) ; 4.7 ( qui surpasse ) ; 1P 2.13 ( souverain ). –  instituées  : termes apparentés au v. 2 pour résister, ordre.'
  - type: text
    content: 'Que chacun soit soumis aux autorités établies ; car il n''y a pas d''autorité qui ne vienne de Dieu, et celles qui existent ont été instituées par Dieu. '
  '10':
  - type: note
    content: L'amour ne fait pas de mal 1Co 13.4-7. Voir aussi Jn 14.15n.
  - type: text
    content: 'L''amour ne fait pas de mal au prochain : l''amour est donc l''accomplissement de la loi.'
  - type: heading
    content: Etre prêt pour la venue du Christ
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'en quel temps nous sommes  : litt. le temps , cf. 3.26n  ; 12.11n  ; cf. 1Co 7.26,29 ; Ep 5.16. –  c''est bien (litt. déjà ) l''heure de vous (certains mss portent de nous ) réveiller 4.24n  ; Mt 26.45s ; Jn 4.23+ ; Ep 5.14 ; 1Th 5.6. –  plus proche ou plus près (cf. 10.8). –  venus à la foi ou devenus croyants , cf. Ac 19.2.'
  - type: text
    content: 'D''autant que vous savez en quel temps nous sommes : c''est bien l''heure de vous réveiller du sommeil, car maintenant le salut est plus proche de nous que lorsque nous sommes venus à la foi. '
  '12':
  - type: note
    content: 'Cf. Jn 8.12 ; Ep 5.8ss ; 1Jn 2.8. –  s''est approché  : cf. Mt 3.2n  ; Lc 21.8 ; Jc 5.8. –  Rejetons Col 3.8+. –  œuvres des ténèbres Ep 5.11. –  armes 6.13 ; 2Co 6.7 ; 10.4 ; Ep 6.11,13-17.'
  - type: text
    content: 'La nuit est avancée, le jour s''est approché. Rejetons donc les œuvres des ténèbres et revêtons les armes de la lumière. '
  '13':
  - type: note
    content: 'Comportons-nous  : litt. marchons, cf. 6.4 ; 8.4 ; 14.15. –  convenablement  : le terme s''oppose à celui qui est traduit par honteux en 1.27n  ; cf. 1Co 7.35n  ; 1Th 4.12. –  sans orgies… Lc 21.34+. –  luxure  : litt. coucheries. Cf. 1.29+. –  débauche Mc 7.22n. –  passion jalouse ou jalousie  ; 10.2n  ; 1Co 3.3'
  - type: text
    content: 'Comportons-nous convenablement, comme en plein jour, sans orgies ni beuveries, sans luxure ni débauche, sans dispute ni passion jalouse. '
  '14':
  - type: note
    content: 'revêtez  : cf. v. 12 ; Ga 3.27 ; Ep 4.24. –  ne vous préoccupez pas  : le même mot est traduit par prévoyance en Ac 24.2. –  désirs ou convoitises v. 9+ ; Ga 5.16. Voir chair.'
  - type: text
    content: Mais revêtez le Seigneur Jésus-Christ, et ne vous préoccupez pas de la chair pour en satisfaire les désirs.
  '2':
  - type: text
    content: 'C''est pourquoi celui qui résiste à l''autorité s''oppose à l''ordre de Dieu ; ceux qui s''opposent attireront un jugement sur eux-mêmes. '
  '3':
  - type: note
    content: 'chefs  : autre traduction princes, cf. Mt 9.18n  ; Jn 3.1n  ; 1Co 2.6n. –  ne sont pas à craindre…  : litt. ne sont pas une crainte pour l''œuvre bonne, mais pour la mauvaise. –  le bien 12.2,21 ; 1P 3.13.'
  - type: text
    content: 'Les chefs, en effet, ne sont pas à craindre quand on fait le bien, mais quand on fait le mal. Veux-tu ne pas craindre l''autorité ? Fais le bien, et tu auras son approbation, '
  '4':
  - type: note
    content: 'au service de Dieu  : litt. serviteur (mot apparenté à celui de 12.7n) de Dieu, cf. 13.6n. –  pour ton bien litt. pour toi pour le bien. –  pour faire justice… litt. justicier (ou vengeur) pour la colère (1.18+ ; 3.5+ ; 12.19n) envers celui qui pratique le mal.'
  - type: text
    content: 'car elle est au service de Dieu pour ton bien. Mais si tu fais le mal, crains, car ce n''est pas pour rien qu''elle porte l''épée : elle est en effet au service de Dieu pour faire justice, pour la colère, contre celui qui pratique le mal. '
  '5':
  - type: note
    content: conscience 1P 2.19.
  - type: text
    content: C'est pourquoi il est nécessaire d'être soumis – non seulement à cause de la colère, mais encore par motif de conscience.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'les gouvernants…  : litt. ils sont serviteurs de Dieu, attachés en vue de cela même  ; le terme correspondant à serviteurs n''est pas le même qu''au v. 4n  : c''est celui d''où vient notre mot liturgie  ; il s''applique à un service officiel et public, religieux ou profane (de même en 15.16,27 ; Ac 13.2n  ; Hé 1.7 ; 8.2). –  pour cette fonction même  : litt. pour cela même.'
  - type: text
    content: 'C''est aussi pour cela que vous payez des impôts. Car les gouvernants sont attachés au service de Dieu pour cette fonction même. '
  '7':
  - type: note
    content: 'Mt 22.21/ /. –  impôt / taxe  : ces deux mots désignent sans doute respectivement les impôts directs et indirects (cf. Mc 2.14n). –  honneur 12.10.'
  - type: text
    content: Rendez à chacun ce qui lui est dû – l'impôt à qui vous devez l'impôt, la taxe à qui vous devez la taxe, la crainte à qui vous devez la crainte, l'honneur à qui vous devez l'honneur.
  - type: heading
    content: L'amour mutuel
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ne devez rien v. 7. –  si ce n''est… 1Jn 4.11. –  vous aimer 12.9 ; Jn 13.34 ; Col 3.14 ; 1Tm 1.5. –  celui qui aime…  : on pourrait aussi traduire celui qui aime a accompli l''autre loi , ou encore le reste de la loi  ; cf. Mt 22.37-40/ / ; Ga 5.14.'
  - type: text
    content: 'Ne devez rien à personne, si ce n''est de vous aimer les uns les autres ; car celui qui aime l''autre a accompli la loi. '
  '9':
  - type: note
    content: 'les commandements (mot sous-entendu dans le texte) Ex 20.13-17 ; Dt 5.17-21  ; Mt 19.18s. – Après tu ne commettras pas de vol, certains mss ajoutent tu ne feras pas de faux témoignage. –  tu ne désireras pas ou tu ne convoiteras pas, cf. 7.7ns. –  se résument  : le même verbe est traduit par réunir en Ep 1.10. –  Tu aimeras… Lv 19.18.'
  - type: text
    content: 'En effet, les commandements : '
  - type: text
    content: Tu ne commettras pas d'adultère, tu ne commettras pas de meurtre, tu ne commettras pas de vol, tu ne désireras pas,
  - type: text
    content: ' et tout autre commandement se résument dans cette parole : '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: text
    content: '. '
