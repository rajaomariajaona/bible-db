document_id: JOL.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur répandra son souffle sur tous
  - type: text
    content: ' '
  - type: note
    content: 'Dans la version latine le chapitre 3 est rattaché au chapitre 2 (v 28-32) ; en conséquence le chapitre 4 est numéroté 3 ; voir Ac 2.17ss . –  je répandrai mon souffle Es 32.15 ; 44.3 ; 59.21 ; Ez 36.25-27 ; 39.29 ; Tt 3.5s ; voir esprit. –  tous  : litt. toute chair  ; cf. Es 40.5 ; 49.26 ; 66.16,23. –  fils / filles / anciens (ou vieillards ) 2.16. –  deviendront prophètes  : autres traductions parleront en prophètes, agiront en prophètes  ; cf. Nb 11.25nss ; Jr 2.8n. –  rêves  : cf. Nb 12.6 ; Dt 13.2-6 ; Jr 23.25ss ; 27.9 ; 29.8. –  visions Es 21.2 ; 29.11 ; Ez 7.13,26 ; 12.22s,27 ; Os 12.11 ; Am 1.1 ; 7.12 ; Ab 1 ; Mi 3.6 ; Ha 2.2s ; Lm 2.9,14.'
  - type: text
    content: 'Après cela, je répandrai mon souffle sur tous :'
  - type: text
    content: vos fils et vos filles deviendront prophètes,
  - type: text
    content: vos anciens auront des rêves,
  - type: text
    content: et vos jeunes gens des visions.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'sur les esclaves…  : autres traductions sur les serviteurs et les servantes ; sur les esclaves, hommes et femmes  ; cf. Gn 12.16n  ; 1Co 12.13 ; Ga 3.28 ; Col 3.11.'
  - type: text
    content: Même sur les esclaves et sur les servantes,
  - type: text
    content: en ces jours-là, je répandrai mon souffle.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 6.22 ; Lc 21.25 ; Ap 8.7. –  colonnes de fumée Ct 3.6.
  - type: text
    content: Je ferai paraître des prodiges
  - type: text
    content: 'dans le ciel et sur la terre :'
  - type: text
    content: du sang, du feu et des colonnes de fumée ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 2.10+,11+ ; 4.14s ; Ap 6.12,17. –  jour du Seigneur 1.15+.
  - type: text
    content: le soleil se changera en ténèbres,
  - type: text
    content: la lune en sang,
  - type: text
    content: 'avant que n''arrive le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: ce jour grand et redoutable.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'quiconque invoquera (le même verbe est traduit par appeler dans la suite du v.) …  : cf. 1R 18.24 ; 2R 5.11 ; So 3.9 ; Za 13.9 ; Ps 80.19 ; 116.4+ ; Lm 3.55 ; Ac 2.21  ; 22.16 ; Rm 10.13  ; 1Co 1.2. –  au mont Sion Ab 17 ; Ap 14.1. –  des rescapés  : le terme hébreu étant au singulier, plusieurs versions anciennes ont compris le salut, la délivrance  ; cf. Es 1.9 ; 4.2 ; 10.20 ; 37.31s ; 46.13 ; Jr 42.17 ; 44.14 ; Ez 14.22 ; voir aussi Za 9.9. –  ceux que le Seigneur appelle…  : sens incertain ; autre traduction parmi les survivants que le Seigneur appelle  ; cf. Ac 2.39 ; voir aussi Es 42.6 ; 51.2 ; 55.5 ; Rm 1.6 ; 8.28 ; 9.12,24 ; 1Co 1.9,24ss ; Ga 1.15 ; 1Th 2.12 ; 5.24 ; 1P 2.9.'
  - type: text
    content: 'Alors quiconque invoquera le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' échappera,'
  - type: text
    content: car au mont Sion, à Jérusalem,
  - type: text
    content: il y aura des rescapés,
  - type: text
    content: 'comme l''a dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'et ceux que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' appelle seront parmi les survivants.'
