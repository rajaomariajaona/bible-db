document_id: PSA.150,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Louez le Seigneur  !
  - type: text
    content: ' '
  - type: note
    content: 'Ce psaume peut être lu comme la conclusion de l''ensemble du psautier (cf. 41.14n). –  Louez le Seigneur (Yah) v. 6 ; 104.35n. –  Dieu  : hébreu El  ; cf. Gn 21.33n. –  où se déploie…  : litt. de sa puissance  ; certains comprennent dans la forteresse (cf. 27.1+) de la voûte céleste (cf. 19.2 ; 29.9ss ; 148.1s ; Gn 1.6nss).'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: Louez Dieu dans son sanctuaire !
  - type: text
    content: Louez-le dans la voûte céleste où se déploie sa puissance !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 145.4.
  - type: text
    content: Louez-le pour ses hauts faits !
  - type: text
    content: Louez-le selon l'immensité de sa grandeur !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 149.3+. –  trompe 47.6+ ; cf. Né 12.35,41 ; 1Ch 15.24 ; 16.6 ; 2Ch 29.26.
  - type: text
    content: Louez-le au son de la trompe !
  - type: text
    content: Louez-le avec le luth et la lyre !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 149.3 ; Ex 15.20.
  - type: text
    content: Louez-le avec le tambourin et avec des danses !
  - type: text
    content: Louez-le avec les instruments à cordes et le chalumeau !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'de l''acclamation  : cf. 27.6+ ; Nb 10.5n  ; voir aussi 1Co 13.1.'
  - type: text
    content: Louez-le avec les cymbales sonores !
  - type: text
    content: Louez-le avec les cymbales de l'acclamation !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'tout ce qui respire  : litt. tout souffle , comme en Gn 2.7n. –  le Seigneur (Yah)  : cf. 104.35n.'
  - type: text
    content: 'Que tout ce qui respire loue le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
