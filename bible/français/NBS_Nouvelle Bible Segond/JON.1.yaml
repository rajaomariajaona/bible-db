document_id: JON.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jonas essaie de s'enfuir pour échapper au Seigneur
  - type: text
    content: ' '
  - type: note
    content: Jonas 2R 14.25 ; Mt 12.39/ / ; 16.4 ; ce nom signifie colombe (comme dans Gn 8.8-12).
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jonas, fils d''Amittaï : '
  '10':
  - type: note
    content: 'V. 3. –  eurent très peur ou furent saisis d''une grande crainte  : cf. v. 5,9,16.'
  - type: text
    content: 'Les hommes eurent très peur ; ils lui dirent : Qu''as-tu fait là ! Ils savaient, en effet, qu''il fuyait pour échapper au '
  - type: text
    content: Seigneur
  - type: text
    content: ', parce qu''il le leur avait expliqué. '
  '11':
  - type: note
    content: 'se déchaînait  : verbe hébreu apparenté au terme traduit par tempête (v. 4), de même au v. 13 ; cf. Lc 21.25.'
  - type: text
    content: 'Ils lui dirent : Que devons-nous faire de toi, pour que la mer se calme envers nous ? – Car la mer se déchaînait de plus en plus. '
  '12':
  - type: note
    content: Cf. Jn 11.50.
  - type: text
    content: 'Il leur répondit : Prenez-moi, lancez-moi à la mer et la mer se calmera envers vous : je sais que c''est moi qui attire sur vous cette grande tempête. '
  '13':
  - type: text
    content: 'Les hommes ramaient pour gagner la terre ferme, mais ils n''y parvenaient pas, parce que la mer se déchaînait toujours plus contre eux. '
  '14':
  - type: note
    content: 'ils invoquèrent le Seigneur 2.3+. –  à cause de la vie…  : autres traductions possibles  : à cause de cet homme ; avec cet homme. –  ne nous charge pas…  : c.-à-d. ne nous tiens pas pour responsables de sa mort  ; cf. Dt 21.8 ; Jr 26.15. –  sang innocent Jr 7.6+. –  Car c''est toi… ou car toi, Seigneur, tu fais tout ce que tu veux  ; cf. Ps 115.3 ; 135.6.'
  - type: text
    content: 'Alors ils invoquèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils dirent : '
  - type: text
    content: Seigneur
  - type: text
    content: ', s''il te plaît, fais en sorte que nous ne disparaissions pas à cause de la vie de cet homme, et ne nous charge pas d''un sang innocent ! Car c''est toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui as agi comme tu l''as voulu. '
  '15':
  - type: note
    content: Cf. Mc 4.39ss. –  la fureur ou la rage, cf. Pr 19.3n  ; 2Ch 16.10n.
  - type: text
    content: 'Puis ils prirent Jonas et le lancèrent à la mer, et la fureur de la mer s''arrêta. '
  '16':
  - type: note
    content: 'eurent peur…  : autre traduction craignirent le Seigneur d''une grande crainte.'
  - type: text
    content: 'Les hommes eurent peur, ils furent saisis d''une grande crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils offrirent un sacrifice au '
  - type: text
    content: Seigneur
  - type: text
    content: ' et firent des vœux.'
  '2':
  - type: note
    content: 'Lève-toi  : même verbe v. 6 ; 3.2s,6. –  Ninive  : capitale de l''empire assyrien, au nord-est du pays d''Israël ; elle a été détruite en 612 av. J.-C. (cf. Na 1.1ss ; 3.1). –  fais une proclamation  : autre traduction crie (même verbe 3.8, autre verbe 1.5 ; 3.7) ; cf. 3.4ss. –  le mal qu''elle a fait  : litt. son mal ou, peut-être, son malheur. –  jusqu''à moi  : cf. Gn 18.21.'
  - type: text
    content: 'Lève-toi, va à Ninive, la grande ville, et fais une proclamation contre elle, car le mal qu''elle a fait est monté jusqu''à moi. '
  '3':
  - type: note
    content: 'Tarsis ou Tartessos, très probablement en Espagne, sur le Guadalquivir, au-delà des colonnes d''Hercule (l''actuel détroit de Gibraltar), aux confins occidentaux du monde connu des Hébreux (cf. Gn 10.4n) ; les bateaux de Tarsis ne sont pas toujours des bateaux à destination de Tartessos ; l''expression signifie souvent, de façon plus générale, vaisseaux au long cours ou de haute mer  ; cf. 1R 10.22 ; 22.49 ; Es 2.16+ ; 23.1,14 ; 60.9 ; Ez 27.25 ; Ps 48.8 ; 72.10 ; 2Ch 9.21 ; 20.36. –  pour échapper au Seigneur ou loin du Seigneur  : expression hébraïque analogue en Gn 4.16n (de devant le Seigneur). –  Jaffa (hébreu Yapho) : port méditerranéen du pays d''Israël (Ac 9.36). –  il paya le prix du transport  : litt. il donna son prix (celui du bateau) ; certains comprennent il l''affréta. –  embarqua  : litt. y descendit, comme au début du v. (même verbe v. 5 ; 2.7) ; en hébreu on descend à bord d''un bateau. –  avec l''équipage  : litt. avec eux.'
  - type: text
    content: 'Alors Jonas voulut s''enfuir à Tarsis pour échapper au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il descendit à Jaffa et trouva un bateau qui allait à Tarsis ; il paya le prix du transport et embarqua avec l''équipage pour aller à Tarsis et échapper ainsi au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'lança  : de même aux v. 5,12,15 ; cf. Ps 107.23-30.'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lança un grand vent sur la mer, et il s''éleva sur la mer une grande tempête. Le bateau menaçait de se briser. '
  '5':
  - type: note
    content: 'eurent peur v. 10n. –  son dieu  : autre traduction ses dieux  ; même possibilité dans la suite (cf. Gn 1.1n). –  lancèrent à la mer v. 12,15 ; Ac 27.18s. –  se coucha…  : cf. 1R 19.5 ; Mt 8.24s. Le verbe hébreu traduit par s''endormit profondément (cf. Jg 4.21) est aussi traduit par être frappé de torpeur, tomber en torpeur  ; terme apparenté en Gn 2.21n.'
  - type: text
    content: 'Les marins eurent peur ; chacun d''eux cria vers son dieu, et ils lancèrent à la mer le chargement du bateau, pour l''alléger. Jonas descendit au fond du navire, se coucha et s''endormit profondément. '
  '6':
  - type: note
    content: 'ce dieu  : autre traduction Dieu (cf. v. 5n). –  pensera-t-il à nous  : traduction incertaine ; on a aussi compris intercédera-t-il pour nous ; s''apaisera-t-il envers nous.'
  - type: text
    content: 'Le chef d''équipage s''approcha de lui et lui dit : Qu''as-tu donc à dormir ? Lève-toi, invoque ton dieu ! Peut-être ce dieu pensera-t-il à nous, pour que nous ne disparaissions pas.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'tirons au sort  : litt. faisons tomber les sorts , de même dans la suite ; cf. Lv 16.8n  ; Jos 7.14 ; 1S 14.41s.'
  - type: text
    content: 'Ils se dirent l''un à l''autre : Venez, tirons au sort, pour savoir qui nous attire ce malheur. Ils tirèrent au sort, et le sort tomba sur Jonas. '
  '8':
  - type: note
    content: 'qui nous attire ce malheur  : cette proposition est absente de certains mss grecs ; on pourrait aussi comprendre explique-nous, puisque c''est toi qui nous attires ce malheur : quelle est ton activité… ?'
  - type: text
    content: 'Alors ils lui dirent : Explique-nous, s''il te plaît, qui nous attire ce malheur. Quelle est ton activité, et d''où viens-tu ? Quel est ton pays, et de quel peuple es-tu ? '
  '9':
  - type: note
    content: hébreu Gn 10.21n  ; cf. 2Co 11.22 ; Ph 3.5. –  qui a fait la mer et la terre ferme (litt. sèche, de même au v. 13 ; 2.11) ; cf. Gn 1.9ns.
  - type: text
    content: 'Il leur répondit : Je suis hébreu et je crains le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu du ciel, qui a fait la mer et la terre ferme. '
