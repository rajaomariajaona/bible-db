document_id: JON.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jonas essaie de s''enfuir pour échapper au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jonas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2R 14.25 ; Mt 12.39/ / ; 16.4 ; ce nom signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'colombe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (comme dans Gn 8.8-12).
    marker-yv: yv-n
  - type: text
    text: 'La parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' parvint à Jonas, fils d''Amittaï : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Lève-toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même verbe v. 6 ; 3.2s,6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ninive
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : capitale de l''empire assyrien, au nord-est du pays d''Israël ; elle a été détruite en 612 av. J.-C. (cf. Na 1.1ss ; 3.1). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fais une proclamation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'crie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même verbe 3.8, autre verbe 1.5 ; 3.7) ; cf. 3.4ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le mal qu'elle a fait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son mal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, peut-être, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son malheur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jusqu'à moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 18.21.'
    marker-yv: yv-n
  - type: text
    text: 'Lève-toi, va à Ninive, la grande ville, et fais une proclamation contre elle, car le mal qu''elle a fait est monté jusqu''à moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tarsis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tartessos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', très probablement en Espagne, sur le Guadalquivir, au-delà des colonnes d''Hercule (l''actuel détroit de Gibraltar), aux confins occidentaux du monde connu des Hébreux (cf. Gn 10.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bateaux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tarsis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ne sont pas toujours des bateaux à destination de Tartessos ; l''expression signifie souvent, de façon plus générale, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vaisseaux au long cours '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de haute mer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1R 10.22 ; 22.49 ; Es 2.16+ ; 23.1,14 ; 60.9 ; Ez 27.25 ; Ps 48.8 ; 72.10 ; 2Ch 9.21 ; 20.36. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour échapper au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'loin du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : expression hébraïque analogue en Gn 4.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de devant le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jaffa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yapho
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : port méditerranéen du pays d''Israël (Ac 9.36). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il paya le prix du transport
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il donna son prix '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(celui du bateau) ; certains comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il l'affréta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: embarqua
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: y descendit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme au début du v. (même verbe v. 5 ; 2.7) ; en hébreu on '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'descend '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'à bord d''un bateau. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec l'équipage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec eux.
    marker-yv: yv-n
  - type: text
    text: 'Alors Jonas voulut s''enfuir à Tarsis pour échapper au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Il descendit à Jaffa et trouva un bateau qui allait à Tarsis ; il paya le prix du transport et embarqua avec l''équipage pour aller à Tarsis et échapper ainsi au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lança
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : de même aux v. 5,12,15 ; cf. Ps 107.23-30.'
    marker-yv: yv-n
  - type: text
    text: 'Mais le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lança un grand vent sur la mer, et il s''éleva sur la mer une grande tempête. Le bateau menaçait de se briser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'eurent peur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses dieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même possibilité dans la suite (cf. Gn 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lancèrent à la mer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 12,15 ; Ac 27.18s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se coucha…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 19.5 ; Mt 8.24s. Le verbe hébreu traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''endormit profondément '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Jg 4.21) est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: être frappé de torpeur, tomber en torpeur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; terme apparenté en Gn 2.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les marins eurent peur ; chacun d''eux cria vers son dieu, et ils lancèrent à la mer le chargement du bateau, pour l''alléger. Jonas descendit au fond du navire, se coucha et s''endormit profondément. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pensera-t-il à nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; on a aussi compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: intercédera-t-il pour nous ; s'apaisera-t-il envers nous.
    marker-yv: yv-n
  - type: text
    text: 'Le chef d''équipage s''approcha de lui et lui dit : Qu''as-tu donc à dormir ? Lève-toi, invoque ton dieu ! Peut-être ce dieu pensera-t-il à nous, pour que nous ne disparaissions pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tirons au sort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faisons tomber les sorts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite ; cf. Lv 16.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jos 7.14 ; 1S 14.41s.'
    marker-yv: yv-n
  - type: text
    text: 'Ils se dirent l''un à l''autre : Venez, tirons au sort, pour savoir qui nous attire ce malheur. Ils tirèrent au sort, et le sort tomba sur Jonas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui nous attire ce malheur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette proposition est absente de certains mss grecs ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'explique-nous, puisque c''est toi qui nous attires ce malheur : quelle est ton activité… ?'
    marker-yv: yv-n
  - type: text
    text: 'Alors ils lui dirent : Explique-nous, s''il te plaît, qui nous attire ce malheur. Quelle est ton activité, et d''où viens-tu ? Quel est ton pays, et de quel peuple es-tu ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'hébreu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 10.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 2Co 11.22 ; Ph 3.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui a fait la mer et la terre ferme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sèche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 13 ; 2.11) ; cf. Gn 1.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s.
    marker-yv: yv-n
  - type: text
    text: 'Il leur répondit : Je suis hébreu et je crains le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu du ciel, qui a fait la mer et la terre ferme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'eurent très peur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: furent saisis d'une grande crainte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 5,9,16.'
    marker-yv: yv-n
  - type: text
    text: 'Les hommes eurent très peur ; ils lui dirent : Qu''as-tu fait là ! Ils savaient, en effet, qu''il fuyait pour échapper au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', parce qu''il le leur avait expliqué. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se déchaînait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : verbe hébreu apparenté au terme traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tempête '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 4), de même au v. 13 ; cf. Lc 21.25.
    marker-yv: yv-n
  - type: text
    text: 'Ils lui dirent : Que devons-nous faire de toi, pour que la mer se calme envers nous ? – Car la mer se déchaînait de plus en plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Jn 11.50.
    marker-yv: yv-n
  - type: text
    text: 'Il leur répondit : Prenez-moi, lancez-moi à la mer et la mer se calmera envers vous : je sais que c''est moi qui attire sur vous cette grande tempête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les hommes ramaient pour gagner la terre ferme, mais ils n''y parvenaient pas, parce que la mer se déchaînait toujours plus contre eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils invoquèrent le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à cause de la vie…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions possibles'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à cause de cet homme ; avec cet homme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne nous charge pas…
    - type: usfm
      marker: ft
      children:
      - type: text
