document_id: PSA.56,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un persécuté s'en remet à Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Colombe…  : traduction conjecturale ; on pourrait aussi comprendre colombe silencieuse des lointains ( ?) ou, en modifiant la vocalisation traditionnelle de l''hébreu, colombe des dieux lointains  ; il s''agit probablement du titre ou des premiers mots d''une mélodie connue. –  Hymne 16.1n. –  Lorsque les Philistins…  : cf. 1S 21.11-13.'
  - type: text
    content: Du chef de chœur. Sur « Colombe des térébinthes lointains ». Hymne. De David. Lorsque les Philistins le saisirent à Gath.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'mes ennemis reculent 9.4. –  je sais…  : cf. 124.1s ; Rm 8.31.'
  - type: text
    content: Alors mes ennemis reculent, au jour où je crie ;
  - type: text
    content: je sais que Dieu est pour moi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: V. 5n.
  - type: text
    content: C'est grâce à Dieu que je loue la parole ;
  - type: text
    content: 'c''est grâce au '
  - type: text
    content: Seigneur
  - type: text
    content: ' que je loue la parole ;'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'des humains  : c''est ici le terme général qui a donné le nom Adam  ; cf. v. 2n,5n  ; de même en 118.6 ; voir Gn 1.26n.'
  - type: text
    content: 'c''est en Dieu que j''ai mis ma confiance, je n''ai pas peur :'
  - type: text
    content: que pourraient me faire des humains ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'les vœux que je t''ai faits  : litt. tes vœux. –  je m''en acquitterai  : cf. Pr 7.14. –  des sacrifices de reconnaissance  : cf. 26.7n  ; 50.14 ; 116.17 ; Lv 7.12nss.'
  - type: text
    content: Sur moi, ô Dieu, les vœux que je t'ai faits,
  - type: text
    content: je m'en acquitterai par des sacrifices de reconnaissance,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 30.4 ; 33.19 ; 116.8s. –  lumière des vivants  : cf. 27.13 ; 36.10 ; Jb 33.30 ; Jn 8.12.'
  - type: text
    content: car tu m'as délivré de la mort.
  - type: text
    content: Mes pieds n'ont-ils pas évité la chute,
  - type: text
    content: afin que je marche devant Dieu dans la lumière des vivants ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'des hommes ou un homme  ; le terme hébreu est au singulier, probablement dans un sens collectif ; il désigne habituellement l''homme dans sa fragilité ; cf. v. 5n  ; même terme en 10.18 ; 66.12 ; voir aussi Es 2.22. –  me harcèlent ou me piétinent  ; cf. 57.4. –  sans cesse  : litt. tout le jour.'
  - type: text
    content: Fais-moi grâce, ô Dieu, car des hommes me harcèlent ;
  - type: text
    content: sans cesse ils me font la guerre, ils m'oppriment.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'nombreux 3.2+. –  Dieu d''en haut  : traduction conjecturale, litt. (d’)en haut  ; Syr ils s''élèvent contre moi  ; cf. 73.8s.'
  - type: text
    content: Sans cesse mes détracteurs me harcèlent ;
  - type: text
    content: ils sont nombreux, ils me font la guerre, Dieu d'en haut !
  '4':
  - type: text
    content: Le jour où j'ai peur,
  - type: text
    content: moi, c'est en toi que je mets ma confiance.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'à Dieu  : litt. par Dieu ou en Dieu  ; cf. v. 11 ; 130.5. –  j''ai mis ma confiance 4.6+. –  que pourraient me faire  : on pourrait aussi comprendre que pourraient faire pour moi , de même au v. 12 et en 118.6 ; 60.13. –  des humains  : litt. la chair  ; cf. v. 12n  ; voir aussi Es 31.3 ; 40.6.'
  - type: text
    content: C'est grâce à Dieu que je loue sa parole ;
  - type: text
    content: 'c''est en Dieu que j''ai mis ma confiance, je n''ai pas peur :'
  - type: text
    content: que pourraient me faire des humains ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ils me tourmentent en paroles  : traduction incertaine, litt. ils rendent mes paroles (ou mes affaires ) douloureuses  ; LXX ils méprisent mes paroles  ; Syr ils complotent contre moi  ; cf. 41.8s.'
  - type: text
    content: Sans cesse ils me tourmentent en paroles,
  - type: text
    content: ils n'ont à mon égard que de mauvaises pensées.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ils épient ou ils se cachent  ; cf. 71.10 ; 140.3 ; Jr 11.19 ; Lm 3.60. –  ils en veulent…  : litt. ils espèrent ma vie  ; cf. Lm 4.19.'
  - type: text
    content: Ils complotent, ils épient,
  - type: text
    content: ils montent la garde sur mes talons,
  - type: text
    content: parce qu'ils en veulent à ma vie.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'C''est par le mal…  : texte obscur, diversement interprété par les versions anciennes : autres traductions conjecturales  : à cause de leur malfaisance, qu''ils n''échappent pas ! ou prends bonne note de leur injustice  ; cf. v. 9 ; 5.6n  ; 36.4+ ; Os 13.12 ; Jb 14.18. –  fais tomber  : litt. fais descendre  ; cf. 59.12 ; Ab 4.'
  - type: text
    content: C'est par le mal qu'ils échapperaient !
  - type: text
    content: Dans ta colère, ô Dieu, fais tomber les peuples !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'les pas de ma vie vagabonde  : litt. mon vagabondage , ou plus généralement ma misère  ; cf. Gn 4.16n. –  larmes Es 38.5. –  inscrites  : sous-entendu dans le texte. –  dans ton livre (terme apparenté au verbe traduit par compter ) : cf. 69.29 ; Ml 3.16 ; Jb 19.23 ; Ap 3.5+.'
  - type: text
    content: Tu comptes les pas de ma vie vagabonde ;
  - type: text
    content: 'recueille mes larmes dans ton outre :'
  - type: text
    content: ne sont-elles pas inscrites dans ton livre ?
