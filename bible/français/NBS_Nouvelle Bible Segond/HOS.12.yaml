document_id: HOS.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Une politique mensongère
  - type: text
    content: ' '
  - type: note
    content: 'Ephraïm 4.17n. –  dissimulation 4.2+. –  Juda 1.7+. –  marche encore avec Dieu (hébreu ’El  ; cf. Gn 21.33n) : le sens du verbe est incertain ; on a aussi traduit erre à côté de Dieu ; est sans frein vis-à-vis de Dieu (cf. v. 3). –  aux saints (cf. Ps 89.8) ou aux consacrés (2Ch 35.3) ; certains traduisent au Très-Saint  ; selon l''interprétation du vers précédent, on pourrait aussi comprendre  : avec ( ?) le Très-Saint (qui est) fidèle ou digne de confiance (Es 49.7).'
  - type: text
    content: Ephraïm m'a entouré de dissimulation,
  - type: text
    content: et la maison d'Israël de tromperie ;
  - type: text
    content: Juda marche encore avec Dieu,
  - type: text
    content: et il est fidèle aux saints.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.16s. –  le Seigneur (YHWH), ton Dieu  : cf. 13.4s ; Ex 20.2. –  jours de rencontre festive 9.5.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu,'
  - type: text
    content: depuis l'Egypte.
  - type: text
    content: Je te ferai encore habiter sous des tentes,
  - type: text
    content: comme aux jours de rencontre festive.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai multiplié les visions  : litt. j''ai fait abonder la vision  ; cf. 1S 3.1 ; Ps 74.9 ; Lm 2.9 ; Hé 1.1.'
  - type: text
    content: J'ai parlé aux prophètes,
  - type: text
    content: j'ai multiplié les visions,
  - type: text
    content: et par l'intermédiaire des prophètes j'ai proposé des paraboles.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Galaad / malfaisance 6.8n  ; cf. Gn 31.21nss. –  Guilgal 4.15n. –  tas de pierres  : hébreu gallim , assonance avec les noms de lieux qui précèdent.'
  - type: text
    content: Si Galaad n'est que malfaisance,
  - type: text
    content: à la vérité, ils ne sont qu'illusion.
  - type: text
    content: Ils sacrifient des taureaux au Guilgal ;
  - type: text
    content: aussi leurs autels seront comme des tas de pierres
  - type: text
    content: dans les sillons des champs.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 18.1-5 ; 29.1-30. –  les troupeaux  : sous-entendu dans le texte.'
  - type: text
    content: Jacob s'enfuit au pays d'Aram,
  - type: text
    content: Israël servit pour une femme,
  - type: text
    content: et pour une femme il garda les troupeaux.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'un prophète  : Moïse ; cf. Nb 12.6-8 ; Dt 18.15-18 ; 34.10. –  monter… d''Egypte 2.17+. –  Israël (litt. il ) fut gardé , même verbe au v. 13.'
  - type: text
    content: Par un prophète
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit monter Israël d''Egypte,'
  - type: text
    content: et par un prophète Israël fut gardé.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'a causé contrariété et amertume  : litt. a contrarié les amertumes (ou, peut-être, amèrement ) ; certains voient dans le mot correspondant à amertumes un nom de divinité(s) (peut-être les forts ou le Fort  ; cf. les saints du v. 1n). –  le sang qu''il a versé  : litt. ses sangs , cf. Es 1.15n.'
  - type: text
    content: 'Ephraïm a causé contrariété et amertume :'
  - type: text
    content: son Seigneur rejettera sur lui le sang qu'il a versé,
  - type: text
    content: il fera retomber sur lui ses outrages.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'vent 8.7+ ; 13.15 ; cf. Ec 1.6. –  sans cesse  : litt. tout le jour . –  Assyrie / Egypte (puissances ennemies) 5.13+ ; 7.11. –  l''huile est sans doute un cadeau de paix, offert dans l''espoir d''une alliance politique protectrice.'
  - type: text
    content: Ephraïm se repaît de vent
  - type: text
    content: et poursuit le vent d'est ;
  - type: text
    content: il multiplie sans cesse mensonges et ravages ;
  - type: text
    content: il conclut une alliance avec l'Assyrie,
  - type: text
    content: et on porte de l'huile en Egypte.
  - type: heading
    content: Israël a pour ancêtre Jacob, le trompeur
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'litige 2.4n. –  Juda  : cf. v. 1n. –  il fera rendre des comptes à  : cf. 1.4n  ; Jr 6.15n. –  Jacob ou Israël (Gn 35.10). –  selon ses agissements Jr 17.10 ; Ps 62.13 ; Jb 34.11 ; Pr 24.12 ; Mt 16.27 ; Rm 2.6 ; 2Tm 4.14 ; Ap 2.23 ; 22.12.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a un litige avec Juda,'
  - type: text
    content: il fera rendre des comptes à Jacob selon ses voies,
  - type: text
    content: il lui rendra selon ses agissements.
  '4':
  - type: text
    content: ' '
  - type: note
    content: a saisi… par le talon , c.-à-d. supplanté , verbe rapproché du nom de Jacob ; cf. Gn 25.26n  ; 27.35-36n. –  a lutté avec Dieu Gn 32.29n.
  - type: text
    content: Dans le ventre de sa mère
  - type: text
    content: il a saisi son frère par le talon,
  - type: text
    content: et dans sa vigueur, il a lutté avec Dieu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'un messager (ou ange ) : cf. Gn 32.25n. –  il l''emporta Gn 32.29. –  il pleura…  : le sujet de ces verbes n''est pas mentionné ; il pourrait s''agir soit de Jacob , soit du messager . –  à Beth-El  : cf. 10.15 ; Gn 28.10-22. –  c''est là qu''il nous a parlé  : certains modifient le texte pour lire qu''il lui a parlé  ; cf. Gn 35.15.'
  - type: text
    content: Il lutta avec un messager, et il l'emporta,
  - type: text
    content: il pleura et le supplia.
  - type: text
    content: Il l'avait trouvé à Beth-El,
  - type: text
    content: et c'est là qu'il nous a parlé.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'c''est son nom tel qu''on l''évoque  : litt. (c''est) son évocation ou son souvenir  ; le même terme est traduit par renommée en 14.8 ; cf. Ex 3.15n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est le Dieu des Armées ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), c''est son nom tel qu''on l''évoque.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'tu reviendras 2.9+. –  à ton Dieu  : autre traduction par ton Dieu  ; certains modifient le texte hébreu pour lire dans tes tentes  ; cf. 1R 8.66n. –  Garde et veille à traduisent un seul verbe hébreu ; autre traduction observe  ; cf. Es 56.1 ; Ps 106.3.'
  - type: text
    content: Quant à toi, tu reviendras à ton Dieu.
  - type: text
    content: Garde la fidélité, veille à l'équité,
  - type: text
    content: mets constamment ton espérance en ton Dieu !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Canaan (cf. Gn 9.18n,25s) désigne les habitants du pays conquis par Israël ; ainsi nommés, les Israélites sont mis sur le même pied que les autres peuples ; le mot Cananéen peut en outre signifier marchand ; commerçant (Za 14.21n  ; Pr 31.24n). –  il aime à opprimer  : certains modifient la vocalisation du texte hébreu traditionnel pour traduire il opprime même ses alliés.'
  - type: text
    content: Canaan a dans sa main des balances fausses,
  - type: text
    content: il aime à opprimer.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'je suis devenu riche  : autre traduction je suis riche  ; cf. Ap 3.17s. –  j''ai acquis  : litt. j''ai trouvé . –  le produit de mon travail  : litt. toute ma fatigue  ; cf. Gn 31.42n  ; Ez 23.29n. – Voir péché.'
  - type: text
    content: 'Ephraïm dit :'
  - type: text
    content: A la vérité, je suis devenu riche,
  - type: text
    content: j'ai acquis de la fortune,
  - type: text
    content: mais ce n'est que le produit de mon travail ;
  - type: text
    content: on ne trouvera chez moi
  - type: text
    content: aucune faute qui soit un péché.
