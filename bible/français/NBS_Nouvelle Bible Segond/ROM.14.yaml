        - type: text
          text: '  ; cf. v. 13s.'
      marker-yv: yv-n
    - type: text
      text: 'Ne va pas détruire l''œuvre de Dieu pour un aliment. Certes, tout est pur ; mais il est mauvais de faire de sa nourriture une pierre d''achoppement. '
  '21':
  - type: usfm
