          text: une cause d'achoppement, de chute ou de faiblesse.
      marker-yv: yv-n
    - type: text
      text: 'Il est beau de ne pas manger de viande, de ne pas boire de vin, de s''abstenir de tout ce qui est pour ton frère une cause d''achoppement. '
