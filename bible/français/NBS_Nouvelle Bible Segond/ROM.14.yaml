      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lc 7.33s ; 1Tm 5.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une cause d'achoppement
      - type: usfm
        marker: ft
        children:
        - type: text
