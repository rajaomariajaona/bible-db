document_id: ROM.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ne pas juger son frère
  - type: text
    content: ' '
  - type: note
    content: 'Accueillez même verbe v. 3 ; 15.7 ; Ac 18.26n  ; 28.2 ; Phm 17. –  faible 15.1 ; 1Co 8.7-13 ; 9.22 ; 1Th 5.14. –  la foi  : voir v. 22n. –  discrimination  : le terme grec est apparenté au verbe traduit dans la suite par juger  ; cf. v. 22n. –  opinions  : le même mot est traduit par raisonnements en 1.21 ; autre traduction sans critiquer ses scrupules  ; voir aussi Ph 2.14n.'
  - type: text
    content: 'Accueillez celui qui est faible dans la foi, sans discrimination d''opinions. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'juges / méprises v. 3. –  tribunal de Dieu  : certains mss portent tribunal du Christ , 2Co 5.10 ; cf. Mt 25.31ss ; Ac 10.42 ; 17.31.'
  - type: text
    content: 'Dès lors, toi, pourquoi juges-tu ton frère ? Ou bien, toi, pourquoi méprises-tu ton frère ? Tous, en effet, nous comparaîtrons devant le tribunal de Dieu. '
  '11':
  - type: note
    content: 'Par ma vie  : litt. je suis vivant, formule de serment divin courante dans l''A.T. ; Es 49.18 ; Jr 22.24 ; Ez 5.11. –  tout genou… Es 45.23  ; Ph 2.10s. –  reconnaîtra (verbe apparenté en 10.9s) : autre traduction célébrera  ; même verbe en 15.9 ; Ph 2.11 ; voir Mt 11.25n.'
  - type: text
    content: 'Car il est écrit :'
  - type: text
    content: Par ma vie, dit le Seigneur, tout genou fléchira devant moi
  - type: text
    content: et toute langue reconnaîtra Dieu !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'rendra compte Lc 16.2+ ; Hé 4.13n. –  à Dieu  : le terme correspondant est absent de certains mss ; 2.5s,16 ; Hé 4.13.'
  - type: text
    content: Ainsi donc, chacun de nous rendra compte à Dieu pour lui-même.
  - type: heading
    content: Ne pas causer la chute de son frère
  '13':
  - type: text
    content: ' '
  - type: note
    content: pierre d'achoppement… v. 20 ; Mt 5.29 ; 17.27 ; 18.6 ; 1Co 8.9-13 ; 10.32 ; 1Jn 2.10.
  - type: text
    content: 'Ne nous jugeons donc plus les uns les autres ; usez plutôt de votre jugement pour ne pas mettre devant votre frère une pierre d''achoppement ou une cause de chute. '
  '14':
  - type: note
    content: j'en suis persuadé, dans (ou par) le Seigneur 8.38 ; 15.14 ; Ga 5.10 ; Ph 1.14 ; 2.24 ; 2Th 3.4n. –  rien n'est souillé ou impur (voir pur, impur) ; Mt 15.11n/ / ; Ac 10.15 ; 1Co 10.23-27 ; 1Tm 4.4 ; Tt 1.15.
  - type: text
    content: 'Je le sais bien, j''en suis persuadé, dans le Seigneur Jésus, rien n''est souillé en soi ; mais si quelqu''un estime qu''une chose est souillée, alors elle est souillée pour lui. '
  '15':
  - type: note
    content: 1Co 8.1,9-13.
  - type: text
    content: 'Si, pour un aliment, ton frère est attristé, tu ne marches plus selon l''amour. Ne va pas, par ton aliment, causer la perte de celui pour qui le Christ est mort. '
  '16':
  - type: note
    content: Litt. que votre (notre, selon certains mss) bien ne soit donc pas calomnié ou ne soit pas un sujet de blasphème, cf. 2.24n  ; Tt 2.5.
  - type: text
    content: 'Que personne, donc, ne puisse calomnier ce qui pour vous est bon. '
  '17':
  - type: note
    content: 'le règne ou le royaume de Dieu  : cf. 1Co 4.20 ; 8.8 ; voir aussi Mt 3.2n  ; 6.33. – Voir justice. –  paix / joie / Esprit saint 15.13 ; Ga 5.22 ; 1Th 1.6.'
  - type: text
    content: 'En effet, le règne de Dieu, ce n''est pas le manger et le boire, mais la justice, la paix et la joie, par l''Esprit saint. '
  '18':
  - type: note
    content: sert… comme un esclave 7.6n  ; 12.11n. –  agréé de Dieu 2Co 5.9 ; Ep 5.10 ; Hé 12.28 ; 13.21. –  apprécié (même terme 16.10n, cf. 1.28n) des humains (ou des hommes, des gens) 12.17s ; 1Tm 2.2 ; 6.1 ; Tt 2.9s ; cf. Lc 2.52+.
  - type: text
    content: Car celui qui, en tout cela, sert le Christ comme un esclave est agréé de Dieu et apprécié des humains.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'poursuivons ou recherchons  ; certains mss portent nous poursuivons  ; cf. 9.30+. –  la paix  : cf. 12.18+. –  ce qui est constructif pour autrui  : autre traduction ce qui contribue à la construction (traduction traditionnelle à l''édification ) de tous (litt. les uns pour les autres ) ; cf. 15.2n  ; 1Co 3.9 ; 10.23 ; 14.5,12,26 ; 2Co 12.19 ; 13.10 ; Ep 2.21 ; 4.12-16,29 ; 1Th 5.11.'
  - type: text
    content: 'Ainsi donc, poursuivons ce qui contribue à la paix et ce qui est constructif pour autrui. '
  '2':
  - type: note
    content: 'a la foi pour  : cf. v. 1.22ns. –  manger de tout 1Co 10.25-27 ; cf. 1Tm 4.3-5 ; Tt 1.15.'
  - type: text
    content: 'Tel a la foi pour manger de tout ; tel autre, qui est faible, ne mange que des légumes. '
  '20':
  - type: note
    content: 'il est mauvais…  : litt. (c''est) mauvais pour l''homme qui mange par (ou avec) achoppement  ; on peut comprendre  : il est mal, pour le « fort », de faire trébucher le faible par ce qu''il mange, ou bien il est mal, pour le « faible », de manger lui-même (ce que mange le fort) en pensant qu''il commet une faute  ; cf. v. 13s.'
  - type: text
    content: 'Ne va pas détruire l''œuvre de Dieu pour un aliment. Certes, tout est pur ; mais il est mauvais de faire de sa nourriture une pierre d''achoppement. '
  '21':
  - type: note
    content: 'viande 1Co 8.13. –  vin  : cf. Lc 7.33s ; 1Tm 5.23. –  une cause d''achoppement  : certains mss portent un texte plus long, qu''on pourrait traduire par une cause d''achoppement, de chute ou de faiblesse.'
  - type: text
    content: 'Il est beau de ne pas manger de viande, de ne pas boire de vin, de s''abstenir de tout ce qui est pour ton frère une cause d''achoppement. '
  '22':
  - type: note
    content: '1Co 10.25-27 ; 11.31. –  La foi que tu as  : certains mss portent tu as une foi  ; ici, comme aux v. 1,23, le terme correspondant à foi peut être entendu dans un sens restreint par rapport à son usage habituel : non pas la foi chrétienne en général, mais une conviction relative à un comportement donné (manger ou ne pas manger tel aliment, etc. ; cf. v. 2n,14). Cependant cette conviction se rattache évidemment à la foi, au sens plus général, telle que chaque chrétien l''interprète. –  ne se juge pas (cf. v. 23n) lui-même en exerçant son discernement  : autre traduction ne se condamne pas lui-même par (litt. dans) ce qu''il approuve  ; un terme apparenté à celui qui est ici rendu par exercer son discernement (ou approuver) a été traduit par apprécier au v. 18 ; le même verbe a été traduit par juger bon en 1.28n, discerner en 2.18 ; 12.2. Ici on peut comprendre  : Heureux celui qui n''a pas de problème de conscience au sujet de son propre comportement  ; ou, peut-être  : Heureux celui qui ne se condamne pas (en troublant les faibles) là où lui-même n''a pas de doute au sujet de son propre comportement.'
  - type: text
    content: 'La foi que tu as, toi, garde-la pour toi devant Dieu. Heureux celui qui ne se juge pas lui-même en exerçant son discernement ! '
  '23':
  - type: note
    content: 'hésite / est condamné  : les deux verbes grecs ainsi traduits sont apparentés au verbe rendu par juger, cf. v. 22n  ; 4.20n  ; 1Co 8.7 ; Jc 4.17. D''autres comprennent mais celui qui hésite au sujet de ce qu''il mange est condamné… –  ce qu''il fait ne relève pas de la foi  : litt. non pas (en vertu) d''une foi v. 22n  ; 9.32n. – Voir péché.'
  - type: text
    content: Mais celui qui hésite est condamné s'il mange, parce que ce qu'il fait ne relève pas de la foi. Or tout ce qui ne relève pas de la foi est péché.
  '3':
  - type: note
    content: méprise / juge 14.10 ; cf. 2.1+ ; Col 2.16-21.
  - type: text
    content: 'Que celui qui mange ne méprise pas celui qui ne mange pas, et que celui qui ne mange pas ne juge pas celui qui mange, car Dieu l''a accueilli. '
  '4':
  - type: note
    content: 'tienne debout (1Co 16.13+) / tombe 1Co 10.12. –  maître  : le même mot est traduit par Seigneur dans la suite. –  tiendra / tenir  : le verbe grec ainsi traduit n''est pas le même que celui qui a été rendu par tenir debout au début du v. ; cf. 11.20n.'
  - type: text
    content: Qui es-tu, toi, pour juger le domestique d'autrui ? Qu'il tienne debout ou qu'il tombe, cela regarde son maître. Et il tiendra, car le Seigneur a le pouvoir de le faire tenir.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'juge  : même verbe qu''aux v. précédents ; voir aussi les v. 10,13. –  en effet  : le terme correspondant est absent de certains mss. –  jour Ga 4.10 ; Col 2.16. Les discriminations en matière d''alimentation (v. 2s,21) et de calendrier (ici) auxquelles Paul fait allusion sont probablement liées à l''observance de la loi juive. –  les juge tous égaux  : litt. juge chaque jour . –  pleine conviction 4.21.'
  - type: text
    content: 'Tel juge, en effet, un jour supérieur à un autre ; tel autre les juge tous égaux. Que chacun, dans sa propre intelligence, soit animé d''une pleine conviction ! '
  '6':
  - type: note
    content: 'tient compte 12.3n. –  des jours  : litt. du jour. –  rend grâce Mt 26.27n  ; 1Co 10.30 ; 1Tm 4.4.'
  - type: text
    content: 'Celui qui tient compte des jours en tient compte pour le Seigneur. Celui qui mange, c''est pour le Seigneur qu''il mange, car il rend grâce à Dieu ; celui qui ne mange pas, c''est pour le Seigneur qu''il ne mange pas : il rend aussi grâce à Dieu. '
  '7':
  - type: note
    content: 'pour lui-même  : autre traduction par lui-même  ; cf. 6.2n  ; 2Co 5.15 ; Ga 2.20.'
  - type: text
    content: 'En effet, aucun de nous ne vit pour lui-même, et aucun ne meurt pour lui-même. '
  '8':
  - type: note
    content: 'si nous vivons… si nous mourons  : cf. 6.11 ; Lc 20.38 ; 1Th 4.14 ; 5.10. –  nous appartenons… au Seigneur 8.9+.'
  - type: text
    content: 'Car si nous vivons, nous vivons pour le Seigneur ; et si nous mourons, nous mourons pour le Seigneur. Soit que nous vivions, soit que nous mourions, nous appartenons donc au Seigneur. '
  '9':
  - type: note
    content: a repris vie ou il est devenu vivant  ; certains mss portent il s'est relevé et il s'est mis à vivre (voir Ap 2.8n  ; cf. Jn 12.24). –  être le Seigneur des ou exercer sa maîtrise sur, 6.9n.
  - type: text
    content: Car si le Christ est mort et a repris vie, c'est pour être le Seigneur des morts et des vivants.
