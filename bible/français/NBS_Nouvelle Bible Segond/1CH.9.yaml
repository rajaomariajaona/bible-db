document_id: 1CH.9,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Liste des habitants de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Né 11.3-19
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a été enregistré…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils ont été enregistrés… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le livre des rois d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : document qui n''a pas été conservé ; il ne s''agit pas des livres des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tels que nous les connaissons dans l''A.T., livres qui ne contiennent pas de listes de noms ; cf. 2Ch 20.34 ; voir aussi l''introduction aux Chroniques. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Juda a été exilé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir 2R 24–25 ; 2Ch 36. Le chap. 9 anticipe en parlant, ici déjà, de l''exil à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Babylone
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', puis du retour au pays (v. 2) des exilés.'
      marker-yv: yv-n
    - type: text
      text: 'Tout Israël a été enregistré et inscrit dans le livre des rois d''Israël. Juda a été exilé à Babylone, à cause de ses sacrilèges. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yehoyarib
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : des mss de LXX portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yoarim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yakîn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss de LXX portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yoakhim.
      marker-yv: yv-n
    - type: text
      text: 'Des prêtres : Yedaya ; Yehoyarib ; Yakîn ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Azaria
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Né 11.11 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Seraya
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chef de la maison de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Ch 31.13. La fonction précise de ce personnage dans le sanctuaire ne nous est pas connue.'
      marker-yv: yv-n
    - type: text
      text: 'Azaria, fils de Hilqiya, fils de Meshoullam, fils de Tsadoq, fils de Merayoth, fils d''Ahitoub, chef de la maison de Dieu ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Adaya
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : quelques mss hébreux et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' lisent ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Azarya
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pashhour, fils de Malkiya
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jr 21.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yahzéra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un ms de LXX porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yediou.
      marker-yv: yv-n
    - type: text
      text: 'Adaya, fils de Yeroham, fils de Pashhour, fils de Malkiya ; Masaï, fils d''Adiel, fils de Yahzéra, fils de Meshoullam, fils de Meshillémith, fils d''Immer, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hommes importants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : en contexte militaire, l''expression correspondante est habituellement traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vaillants guerriers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(5.24 ; 7.2ss etc.). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le service de la maison de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 18.7.'
      marker-yv: yv-n
    - type: text
      text: et leurs frères, des chefs de famille, mille sept cent soixante hommes importants travaillant pour le service de la maison de Dieu.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des lévites : Shemaya, fils de Hashoub, fils d''Azriqam, fils de Hashabia, des fils de Merari ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Baqbaqar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Né 11.17 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Baqbouqia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Héresh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Vg a compris ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Harash
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Zikri
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : quelques mss hébreux et Syr portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zabdi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Né 11.17.'
      marker-yv: yv-n
    - type: text
      text: 'Baqbaqar ; Héresh ; Galal ; Mattania, fils de Michée, fils de Zikri, fils d''Asaph ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abdias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Né 11.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shemaya
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Né 11.17 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shammoua
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Asa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : plusieurs mss hébreux ainsi que Syr portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Asaph.
      marker-yv: yv-n
    - type: text
      text: Abdias, fils de Shemaya, fils de Galal, fils de Yedoutoun ; Bérékia, fils d'Asa, fils d'Elqana, qui habitait dans les villages des Netophatites.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shalloum '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ahimân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont absents de Né 11.
      marker-yv: yv-n
    - type: text
      text: 'Et les portiers : Shalloum, Aqqoub, Thalmôn, Ahimân et leurs frères ; Shalloum était le chef, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la porte du Roi, à l'est
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 44.1-3.'
      marker-yv: yv-n
    - type: text
      text: 'et jusqu''ici il est à la porte du Roi, à l''est. Ce sont là les portiers pour les camps des fils de Lévi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour la maison de son père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour sa famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gardiens des seuils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Ch 23.4 ; 34.9 ; voir aussi 2R 12.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – La mention de la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tente '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (de la Rencontre), sanctuaire du désert, sert probablement à démontrer la vénérable ancienneté de la fonction des portiers (v. 17), à une époque où ils n'accomplissaient que des tâches subalternes très peu valorisantes.
      marker-yv: yv-n
    - type: text
      text: 'Shalloum, fils de Coré, fils d''Ebiasaph, fils de Coré, et ses frères, pour la maison de son père, les Coréites, remplissaient les fonctions de gardiens des seuils de la Tente ; leurs pères avaient gardé l''entrée du camp du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Israélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: '-'
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les prêtres, les lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 17.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Esd 10.5 ; Né 10.29,35 ; 11.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Netinim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : transcription d''un mot hébreu qui pourrait être traduit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'donnés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Nb 3.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; il désigne une catégorie particulière d'employés subalternes du sanctuaire ; cf. Esd 8.20.
      marker-yv: yv-n
    - type: text
      text: Les premiers qui s'installèrent dans leurs propriétés, dans leurs villes, étaient des Israélites, les prêtres-lévites et les Netinim.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' était avec lui'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on a aussi compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' soit avec lui ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 26.3 ; 39.2s ; Ex 3.12 ; Ac 7.9.
      marker-yv: yv-n
    - type: text
      text: 'et Phinéas, fils d''Eléazar, avait été autrefois leur chef. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' était avec lui. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Zacharie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 26.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Meshélémia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss de LXX ont compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Meshoullam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme Syr.'
      marker-yv: yv-n
    - type: text
      text: 'Zacharie, fils de Meshélémia, était portier à l''entrée de la tente de la Rencontre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Samuel, le voyant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 9.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans leur charge permanente
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme correspondant revient aux v. 26,31 ; autre traduction possible ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à cause de leur fidélité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de leur probité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même terme 2R 12.16 ; 22.7 ; 2Ch 19.9 ; 31.12,15,18 ; 34.12). Certains proposent de lire deux mots et de comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à cause de la fidélité de leurs pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à cause de leurs pères.
      marker-yv: yv-n
    - type: text
      text: 'Ils étaient en tout deux cent douze, choisis comme portiers des seuils et enregistrés selon leurs villages ; David et Samuel, le voyant, les avaient installés dans leur charge permanente. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour la garde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à leur poste.
      marker-yv: yv-n
    - type: text
      text: 'Eux et leurs fils étaient aux portes de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', de la maison de la Tente, pour la garde. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: portiers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : selon le texte hébreu traditionnel ; LXX, Syr '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: portes.
      marker-yv: yv-n
    - type: text
