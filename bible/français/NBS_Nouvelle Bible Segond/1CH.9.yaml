document_id: 1CH.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Liste des habitants de Jérusalem
  - type: heading
    content: Né 11.3-19
  - type: text
    content: ' '
  - type: note
    content: 'a été enregistré…  : litt. ils ont été enregistrés… –  le livre des rois d''Israël  : document qui n''a pas été conservé ; il ne s''agit pas des livres des Rois tels que nous les connaissons dans l''A.T., livres qui ne contiennent pas de listes de noms ; cf. 2Ch 20.34 ; voir aussi l''introduction aux Chroniques. –  Juda a été exilé  : voir 2R 24–25 ; 2Ch 36. Le chap. 9 anticipe en parlant, ici déjà, de l''exil à Babylone , puis du retour au pays (v. 2) des exilés.'
  - type: text
    content: 'Tout Israël a été enregistré et inscrit dans le livre des rois d''Israël. Juda a été exilé à Babylone, à cause de ses sacrilèges. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Yehoyarib  : des mss de LXX portent Yoarim . –  Yakîn  : certains mss de LXX portent Yoakhim.'
  - type: text
    content: 'Des prêtres : Yedaya ; Yehoyarib ; Yakîn ; '
  '11':
  - type: note
    content: 'Azaria  : cf. Né 11.11 Seraya. –  chef de la maison de Dieu  : cf. 2Ch 31.13. La fonction précise de ce personnage dans le sanctuaire ne nous est pas connue.'
  - type: text
    content: 'Azaria, fils de Hilqiya, fils de Meshoullam, fils de Tsadoq, fils de Merayoth, fils d''Ahitoub, chef de la maison de Dieu ; '
  '12':
  - type: note
    content: 'Adaya  : quelques mss hébreux et Syr lisent ici Azarya. –  Pashhour, fils de Malkiya  : cf. Jr 21.1. –  Yahzéra  : un ms de LXX porte Yediou.'
  - type: text
    content: 'Adaya, fils de Yeroham, fils de Pashhour, fils de Malkiya ; Masaï, fils d''Adiel, fils de Yahzéra, fils de Meshoullam, fils de Meshillémith, fils d''Immer, '
  '13':
  - type: note
    content: 'hommes importants  : en contexte militaire, l''expression correspondante est habituellement traduite par vaillants guerriers (5.24 ; 7.2ss etc.). –  le service de la maison de Dieu  : cf. Nb 18.7.'
  - type: text
    content: et leurs frères, des chefs de famille, mille sept cent soixante hommes importants travaillant pour le service de la maison de Dieu.
  '14':
  - type: text
    content: 'Des lévites : Shemaya, fils de Hashoub, fils d''Azriqam, fils de Hashabia, des fils de Merari ; '
  '15':
  - type: note
    content: 'Baqbaqar  : cf. Né 11.17 Baqbouqia. –  Héresh  : Vg a compris ici Harash. –  Zikri  : quelques mss hébreux et Syr portent Zabdi, cf. Né 11.17.'
  - type: text
    content: 'Baqbaqar ; Héresh ; Galal ; Mattania, fils de Michée, fils de Zikri, fils d''Asaph ; '
  '16':
  - type: note
    content: 'Abdias  : cf. Né 11.17n. –  Shemaya  : cf. Né 11.17 Shammoua. –  Asa  : plusieurs mss hébreux ainsi que Syr portent Asaph.'
  - type: text
    content: Abdias, fils de Shemaya, fils de Galal, fils de Yedoutoun ; Bérékia, fils d'Asa, fils d'Elqana, qui habitait dans les villages des Netophatites.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Shalloum et Ahimân sont absents de Né 11.
  - type: text
    content: 'Et les portiers : Shalloum, Aqqoub, Thalmôn, Ahimân et leurs frères ; Shalloum était le chef, '
  '18':
  - type: note
    content: 'la porte du Roi, à l''est  : cf. Ez 44.1-3.'
  - type: text
    content: 'et jusqu''ici il est à la porte du Roi, à l''est. Ce sont là les portiers pour les camps des fils de Lévi. '
  '19':
  - type: note
    content: 'pour la maison de son père  : autre traduction pour sa famille. –  gardiens des seuils  : cf. 2Ch 23.4 ; 34.9 ; voir aussi 2R 12.10n. – La mention de la Tente (de la Rencontre), sanctuaire du désert, sert probablement à démontrer la vénérable ancienneté de la fonction des portiers (v. 17), à une époque où ils n''accomplissaient que des tâches subalternes très peu valorisantes.'
  - type: text
    content: 'Shalloum, fils de Coré, fils d''Ebiasaph, fils de Coré, et ses frères, pour la maison de son père, les Coréites, remplissaient les fonctions de gardiens des seuils de la Tente ; leurs pères avaient gardé l''entrée du camp du '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '2':
  - type: note
    content: 'des Israélites  : litt. Israël. –  les prêtres-lévites  : autre traduction les prêtres, les lévites  ; cf. Dt 17.9n  ; voir aussi Esd 10.5 ; Né 10.29,35 ; 11.20. –  les Netinim  : transcription d''un mot hébreu qui pourrait être traduit donnés (Nb 3.9n) ; il désigne une catégorie particulière d''employés subalternes du sanctuaire ; cf. Esd 8.20.'
  - type: text
    content: Les premiers qui s'installèrent dans leurs propriétés, dans leurs villes, étaient des Israélites, les prêtres-lévites et les Netinim.
  '20':
  - type: note
    content: 'Le Seigneur était avec lui  : on a aussi compris que le Seigneur soit avec lui ! Cf. Gn 26.3 ; 39.2s ; Ex 3.12 ; Ac 7.9.'
  - type: text
    content: 'et Phinéas, fils d''Eléazar, avait été autrefois leur chef. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec lui. '
  '21':
  - type: note
    content: 'Zacharie  : cf. 26.14. –  Meshélémia  : certains mss de LXX ont compris Meshoullam, comme Syr.'
  - type: text
    content: 'Zacharie, fils de Meshélémia, était portier à l''entrée de la tente de la Rencontre. '
  '22':
  - type: note
    content: 'Samuel, le voyant  : cf. 1S 9.9. –  dans leur charge permanente  : le terme correspondant revient aux v. 26,31 ; autre traduction possible ici à cause de leur fidélité ou de leur probité (même terme 2R 12.16 ; 22.7 ; 2Ch 19.9 ; 31.12,15,18 ; 34.12). Certains proposent de lire deux mots et de comprendre à cause de la fidélité de leurs pères, ou encore à cause de leurs pères.'
  - type: text
    content: 'Ils étaient en tout deux cent douze, choisis comme portiers des seuils et enregistrés selon leurs villages ; David et Samuel, le voyant, les avaient installés dans leur charge permanente. '
  '23':
  - type: note
    content: 'pour la garde  : autre traduction à leur poste.'
  - type: text
    content: 'Eux et leurs fils étaient aux portes de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', de la maison de la Tente, pour la garde. '
  '24':
  - type: note
    content: 'portiers  : selon le texte hébreu traditionnel ; LXX, Syr portes.'
  - type: text
    content: 'Il y avait des portiers dans les directions des quatre vents : à l''est, à l''ouest, au nord et au sud. '
  '25':
  - type: note
    content: 'régulièrement  : litt. de temps à temps  ; l''expression hébraïque suggère un calendrier régulier ; voir une expression hébraïque proche en Ez 4.10ns.'
  - type: text
    content: 'Leurs frères, qui étaient dans leurs villages, devaient régulièrement venir auprès d''eux pendant sept jours. '
  '26':
  - type: note
    content: 'des trésors  : cf. 26.20.'
  - type: text
    content: 'Car ces quatre portiers supérieurs, des lévites, avaient une charge permanente ; ils étaient intendants des salles et des trésors de la maison de Dieu ; '
  '27':
  - type: note
    content: 'ce sont eux…  : autre traduction ils étaient préposés à l''ouverture (litt. la clef). Cf. 1S 3.15. LXX précise pour ouvrir les portes du temple.'
  - type: text
    content: ils passaient la nuit aux alentours de la maison de Dieu, car ils en avaient la garde ; ce sont eux qui l'ouvraient chaque matin.
  '28':
  - type: text
    content: 'Certains d''entre eux étaient responsables des ustensiles du service ; ils les comptaient pour les rentrer et pour les sortir. '
  '29':
  - type: note
    content: l'encens Ex 30.34n.
  - type: text
    content: 'D''autres étaient chargés des ustensiles, de tous les ustensiles du sanctuaire, de la fleur de farine, du vin, de l''huile, de l''encens et des essences odoriférantes. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'A Jérusalem  : le repeuplement commence par la capitale.'
  - type: text
    content: 'A Jérusalem s''installèrent des fils de Juda, des fils de Benjamin et des fils d''Ephraïm et de Manassé. '
  '30':
  - type: note
    content: 'des fils de prêtres  : c.-à-d. des membres de la classe sacerdotale. –  qui composaient ou qui préparaient les mélanges pour les parfums odoriférants (litt. parfums d''essences odoriférantes).'
  - type: text
    content: 'C''étaient des fils de prêtres qui composaient les parfums odoriférants. '
  '31':
  - type: note
    content: 'le Coréite  : omis par Syr. –  gâteaux  : cf. Lv 2. –  cuits à la poêle  : traduction incertaine ; le terme correspondant n''apparaît qu''ici.'
  - type: text
    content: 'Mattitia, l''un des lévites – c''était le premier-né de Shalloum le Coréite – avait la charge permanente des gâteaux cuits à la poêle. '
  '32':
  - type: note
    content: 'Cf. Lv 24.5-9. –  parmi les Qehatites  : LXX comprend ici Banaya le Qehatite. –  pain exposé Né 10.34+ ; cf. 1R 7.48n. – Voir sabbat.'
  - type: text
    content: Et quelques-uns de leurs frères, parmi les Qehatites, étaient responsables du pain exposé ; ils le préparaient chaque sabbat.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Selon certains, le Voici… ferait allusion à une liste qui aurait été perdue. –  les chantres  : voir chap. 25.'
  - type: text
    content: 'Voici les chantres, des chefs de famille des lévites, qui étaient dans les salles, exempts des autres fonctions parce qu''ils travaillaient jour et nuit… '
  '34':
  - type: note
    content: Les v. 34-44 sont repris de 8.28-38. Voir les notes du chap. 8. –  Ce sont là ou voici, cf. v. 33n.
  - type: text
    content: Ce sont là les chefs de famille des lévites, chefs selon leur généalogie. Ils habitaient à Jérusalem.
  - type: heading
    content: La famille de Saül
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Yéiel  : selon certains mss hébreux et des versions anciennes ; autre lecture traditionnelle Yeouel . –  habitait  : selon plusieurs mss de LXX et Syr  ; le texte hébreu traditionnel porte le pluriel. –  sa femme  : quelques mss hébreux portent sa sœur.'
  - type: text
    content: 'Le père de Gabaon, Yéiel, habitait à Gabaon, et le nom de sa femme était Maaka. '
  '36':
  - type: text
    content: 'Abdôn, son fils premier-né, puis Tsour, Qish, Baal, Ner, Nadab, '
  '37':
  - type: note
    content: 'Ahio  : LXX (son) frère.'
  - type: text
    content: 'Guedor, Ahio, Zacharie et Miqloth. '
  '38':
  - type: note
    content: 'Shiméam  : LXX Shiméa.'
  - type: text
    content: 'Miqloth engendra Shiméam. Ils étaient aussi auprès de leurs frères ; ils habitaient à Jérusalem, avec leurs frères. '
  '39':
  - type: note
    content: 'Ner / Qish / Abinadab / Esh-Baal  : cf. 8.33n.'
  - type: text
    content: 'Ner engendra Qish ; Qish engendra Saül, Saül engendra Jonathan, Malki-Shoua, Abinadab et Esh-Baal. '
  '4':
  - type: note
    content: 'Outaï  : cf. Né 11.4 Ataya. –  fils d''Imri  : omis par LXX  ; Né 11.4 fils d''Amaria. –  fils de Bani parmi…  : selon certains mss hébreux, Tg et Vg  ; autre lecture traditionnelle fils de Benjamin, fils de Pérets.'
  - type: text
    content: 'Outaï, fils d''Ammihoud, fils d''Omri, fils d''Imri, fils de Bani parmi les fils de Pérets, fils de Juda. '
  '40':
  - type: note
    content: 'Merib-Baal  : orthographe légèrement différente dans le texte hébreu, à la deuxième occurrence.'
  - type: text
    content: 'Fils de Jonathan : Merib-Baal. Merib-Baal engendra Michée. '
  '41':
  - type: note
    content: 'Tahréa  : cf. 8.35n  ; plusieurs versions anciennes ajoutent ici Achaz.'
  - type: text
    content: 'Fils de Michée : Pitôn, Mélek et Tahréa. '
  '42':
  - type: note
    content: 'Yara  : quelques mss hébreux portent Yada. –  Azmaveth  : cf. 8.36n. –  Motsa  : plusieurs mss de LXX portent Masa.'
  - type: text
    content: 'Achaz engendra Yara ; Yara engendra Alémeth, Azmaveth et Zimri ; Zimri engendra Motsa ; '
  '43':
  - type: note
    content: 'Binéa  : LXX Baana. –  Rephaya  : cf. 8.37 Rapha.'
  - type: text
    content: 'Motsa engendra Binéa. Rephaya, son fils ; Eléasa, son fils ; Atsel, son fils. '
  '44':
  - type: text
    content: 'Atsel eut six fils ; voici leurs noms : Azriqam, Bokrou, Ismaël, Shéaria, Abdias et Hanân. Ce sont là les fils d''Atsel.'
  '5':
  - type: note
    content: 'Shilonites  : certains proposent de modifier légèrement le texte pour lire Shélanites comme en Nb 26.20. –  Asaya  : cf. Né 11.5 Maaséya.'
  - type: text
    content: 'Des Shilonites : Asaya, le premier-né, et ses fils. '
  '6':
  - type: note
    content: 'Yéouel  : des mss de LXX portent ici Yéiel, comme Tg.'
  - type: text
    content: 'Des fils de Zérah : Yéouel et ses frères, six cent quatre-vingt-dix. '
  '7':
  - type: text
    content: 'Des fils de Benjamin : Sallou, fils de Meshoullam, fils de Hodavia, fils de Senoua ; '
  '8':
  - type: note
    content: 'Ela, fils d''Ouzzi  : quelques mss hébreux et un ms de LXX portent voici les fils d''Ouzzi…'
  - type: text
    content: 'Yibneya, fils de Yeroham ; Ela, fils d''Ouzzi, fils de Mikri ; Meshoullam, fils de Shephatia, fils de Réouel, fils de Yibniya ; '
  '9':
  - type: note
    content: 'neuf cent cinquante-six  : Syr neuf cent quatre-vingt-dix-neuf. –  chefs de famille…  : litt. chefs des pères pour la maison de leurs pères.'
  - type: text
    content: et leurs frères, selon leur généalogie, neuf cent cinquante-six. Tous ces hommes étaient chefs de famille, famille par famille.
