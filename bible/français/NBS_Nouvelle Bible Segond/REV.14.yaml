  - type: text
    text: 'Ce sont ceux qui ne se sont pas souillés avec des femmes – ils sont vierges. Ils suivent l''agneau partout où il va. Ils ont été achetés d''entre les humains comme prémices pour Dieu et pour l''agneau, '
