document_id: REV.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'agneau et les rachetés
  - type: text
    content: ' '
  - type: note
    content: 'l''agneau 5.6+. –  sur la montagne de Sion  : cf. Es 4.5 ; Jl 3.5 ; Ab 17 ; Ps 2.6. –  cent quarante-quatre mille 7.4n. –  son nom… 3.12+. –  sur leur front 7.3 ; cf. 13.16.'
  - type: text
    content: 'Je vis l''agneau debout sur la montagne de Sion, et avec lui cent quarante-quatre mille, qui avaient son nom et le nom de son Père écrits sur leur front. '
  '10':
  - type: note
    content: 'vin de la fureur  : cf. v. 8 ; 15.7 ; 16.19 ; Es 51.17,22 ; Jr 25.15+ ; Ps 75.9. –  feu / soufre 9.17s ; 19.20 ; 20.10,14s ; 21.8 ; cf. Gn 19.24 ; Ez 38.22 ; Ps 11.6 ; voir aussi Mt 5.22n  ; 10.28 ; 18.9 ; 25.41. –  saints anges Mc 8.38/ /.'
  - type: text
    content: 'il boira, lui aussi, du vin de la fureur de Dieu, versé sans mélange dans la coupe de sa colère, et il sera tourmenté dans le feu et le soufre, devant les saints anges et devant l''agneau ! '
  '11':
  - type: note
    content: La fumée… 19.3 ; cf. Es 34.10. –  ils n'ont de repos… 4.8n. –  se prosternent… 13.15-17. –  la marque de son nom 13.17.
  - type: text
    content: 'La fumée de leur tourment monte à tout jamais, et ils n''ont de repos ni le jour ni la nuit, ceux qui se prosternent devant la bête et devant son image, et quiconque reçoit la marque de son nom. '
  '12':
  - type: note
    content: 'C''est ici… 13.10. –  commandements  : voir loi. –  la foi de Jésus ou la foi en Jésus, cf. 2.13n  ; 12.17.'
  - type: text
    content: C'est ici la persévérance des saints, qui gardent les commandements de Dieu et la foi de Jésus.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'du ciel une voix 10.4+. –  Ecris 1.11+. –  Heureux 1.3+. – Voir Esprit . –  qu''ils (litt. pour qu''ils ) se reposent 6.11 ; cf. Hé 4.9s. –  les suivent  : autre traduction les accompagnent.'
  - type: text
    content: 'J''entendis du ciel une voix qui disait : Ecris :'
  - type: text
    content: Heureux les morts, ceux qui meurent dans le Seigneur, dès maintenant ! Oui, dit l'Esprit, qu'ils se reposent de leurs travaux, car leurs œuvres les suivent.
  - type: heading
    content: Moisson et vendange de la terre
  '14':
  - type: text
    content: ' '
  - type: note
    content: '1.13+,16+ ; Dn 7.13. – Voir fils . –  couronne d''or  : cf. 2.10n  ; voir aussi 2S 12.30 ; 1Ch 20.2. –  faucille acérée (cf. 1.16) 14.17 ; cf. Mc 4.29.'
  - type: text
    content: 'Je vis une nuée blanche, et sur la nuée était assis quelqu''un qui ressemblait à un fils d''homme. Il avait une couronne d''or sur la tête et une faucille acérée à la main. '
  '15':
  - type: note
    content: 'Un autre ange v. 6+. –  sanctuaire 7.15+. –  en criant 6.10n. –  Lance… v. 18 ; Jr 51.33 ; Jl 4.13 ; Mt 13.39 ; Jn 4.35. –  mûre  : litt. sèche.'
  - type: text
    content: 'Un autre ange sortit du sanctuaire, en criant à celui qui était assis sur la nuée :'
  - type: text
    content: Lance ta faucille et moissonne ! L'heure est venue de moissonner, car la moisson de la terre est mûre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: V. 14 ; cf. Za 5.1nss.
  - type: text
    content: Celui qui était assis sur la nuée jeta sa faucille sur la terre, et la terre fut moissonnée.
  '17':
  - type: text
    content: ' '
  - type: note
    content: V. 6+,14+,15+ ; cf. 8.3,5.
  - type: text
    content: 'Un autre ange sortit du sanctuaire qui est dans le ciel ; il avait lui aussi une faucille acérée. '
  '18':
  - type: note
    content: 'celui qui avait pouvoir ou, selon certains mss, qui avait pouvoir. –  sortit  : le verbe correspondant est omis (probablement sous-entendu) dans certains mss. –  autel 6.9+. –  cria 6.10n. –  Lance v. 15+. –  vendange Jr 25.30 ; Jl 4.13.'
  - type: text
    content: 'Un autre ange, celui qui avait pouvoir sur le feu, sortit de l''autel et cria à celui qui avait la faucille acérée :'
  - type: text
    content: Lance ta faucille acérée et vendange les grappes de la vigne de la terre, car ses raisins sont mûrs.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'la vendange  : sous-entendu dans le texte. –  la grande cuve  : autre traduction le grand pressoir  ; les meilleurs mss portent une faute d''accord que d''autres semblent corriger, certains d''entre eux suggérant un sens différent  : la cuve (ou le pressoir ) de la grande fureur… 19.15 ; cf. Es 63.1-6 ; Lm 1.15.'
  - type: text
    content: 'L''ange jeta sa faucille sur la terre. Il vendangea la vigne de la terre et jeta la vendange dans la grande cuve de la fureur de Dieu. '
  '2':
  - type: note
    content: du ciel une voix 10.4+. –  comme le bruit (ou la voix, de même dans la suite ; c'est encore le même mot qui est traduit par son) de grandes eaux 1.15n. –  tonnerre 6.1+. –  lyre 5.8+.
  - type: text
    content: 'J''entendis du ciel une voix comme le bruit de grandes eaux, comme le bruit d''un fort tonnerre ; et le son que j''entendis était comme celui de joueurs de lyre jouant de leurs instruments. '
  '20':
  - type: note
    content: 'hors de la ville  : cf. Ez 39.9-11 ; Ac 7.58 ; Hé 13.11-13. – Voir sang. –  mille six cents stades  : environ 300 km ; mais le chiffre 1 600, multiple de 4, est sans doute à comprendre comme un symbole d''universalité (cf. 4.4ss ; 7.1 ; 20.8) ; voir mesures, poids et monnaies.'
  - type: text
    content: La cuve fut foulée hors de la ville ; du sang sortit de la cuve, jusqu'aux mors des chevaux, sur une étendue de mille six cents stades.
  '3':
  - type: note
    content: 'comme  : le terme correspondant est absent de certains mss. –  chant nouveau 5.9+. –  êtres vivants / anciens 4.4+,6+. –  cent quarante-quatre mille v. 1. –  achetés 5.9n.'
  - type: text
    content: Ils chantent comme un chant nouveau devant le trône et devant les quatre êtres vivants et les anciens. Personne ne pouvait apprendre ce chant, sinon les cent quarante-quatre mille, qui ont été achetés de la terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'souillés  : voir pur, impur. –  vierges  : le terme peut être compris dans un sens symbolique ; cf. 2Co 11.2. –  suivent l''agneau Mt 10.38/ / ; Jn 10.4. –  achetés (ou rachetés ) 5.9n  ; voir rédemption. –  prémices Jr 2.3 ; Jc 1.18 ; cf. Rm. 8.23 ; 11.16 ; 16.5 ; 1Co 16.15.'
  - type: text
    content: 'Ce sont ceux qui ne se sont pas souillés avec des femmes – ils sont vierges. Ils suivent l''agneau partout où il va. Ils ont été achetés d''entre les humains comme prémices pour Dieu et pour l''agneau, '
  '5':
  - type: note
    content: 'mensonge 21.8,27+ ; Es 53.9 ; So 3.13  ; Ps 32.2 ; le terme peut évoquer le culte des faux dieux (cf. Jr 10.14 ; Rm 1.25). –  sans défaut  : cf. Ep 1.4 ; 5.27 ; Ph 2.15 ; Col 1.22 ; Hé 9.14 ; 1P 1.19 ; 2P 3.14 ; Jd 24.'
  - type: text
    content: 'et '
  - type: text
    content: dans leur bouche il ne s'est pas trouvé
  - type: text
    content: ' de mensonge ; ils sont sans défaut.'
  - type: heading
    content: Les trois anges annoncent le jugement divin
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ange  : cf. v. 8s,15,17s. –  qui volait… 8.13. –  bonne nouvelle Mt 24.14/ /. –  habitants de la terre  : cf. 3.10+ (autre formule ici en grec). –  toute nation… 5.9+.'
  - type: text
    content: 'Je vis un autre ange qui volait au milieu du ciel ; il avait une bonne nouvelle éternelle à annoncer aux habitants de la terre, à toute nation, tribu, langue et peuple. '
  '7':
  - type: note
    content: 'd''une voix forte 7.2+. –  Craignez Dieu… 15.4 ; cf. Jr 13.16. –  donnez-lui gloire 4.9 ; 11.13 ; 16.9 ; 19.7 ; 1Ch 16.28 ; Lc 17.18 ; Jn 9.24 ; Ac 12.23 ; Rm 4.20. –  prosternez-vous  : 3.9+ ; Mt 2.2+ ; voir culte. –  celui qui a fait…  : cf. 4.11+ ; 10.6+.'
  - type: text
    content: 'Il disait d''une voix forte :'
  - type: text
    content: Craignez Dieu et donnez-lui gloire, car l'heure de son jugement est venue, et prosternez-vous devant celui qui a fait le ciel, la terre, la mer et les sources d'eaux !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'un autre… v. 6+. –  Elle est tombée… 18.2 ; cf. Es 21.9. –  Babylone la Grande  : désignation probable de Rome ; cf. 16.19 ; 17.1-5 ; 18.10,21 ; Dn 4.27 ; sur Babylone , voir aussi Es 46.1-3 ; 47 ; Jr 50.29-32 ; 51.44-58 ; Za 5.5-11 ; 1P 5.13n. –  nations  : voir non-Juifs. –  vin de la fureur  : cf. v. 10+ ; Jr 51.7s ; Ez 23.32-34. –  prostitution 2.14n.'
  - type: text
    content: 'Suivit un autre ange, un deuxième, qui disait :'
  - type: text
    content: Elle est tombée, elle est tombée, Babylone la Grande, elle qui a fait boire à toutes les nations du vin de la fureur de sa prostitution !
  '9':
  - type: text
    content: ' '
  - type: note
    content: Un autre… v. 6+. –  bête / image / marque 13.15+,16.
  - type: text
    content: 'Un autre ange, un troisième, les suivit, qui disait d''une voix forte :'
  - type: text
    content: 'Si quelqu''un se prosterne devant la bête et son image et reçoit une marque sur le front ou sur la main, '
