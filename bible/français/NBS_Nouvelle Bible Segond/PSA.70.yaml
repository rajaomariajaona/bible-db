document_id: PSA.70,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Viens vite à mon secours !
  - type: text
    content: ' '
  - type: note
    content: En évocation 38.1n.
  - type: text
    content: Du chef de chœur. De David. En évocation.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 40.14-18 et les notes.
  - type: text
    content: O Dieu, délivre-moi !
  - type: text
    content: Seigneur
  - type: text
    content: ', viens vite à mon secours !'
  '3':
  - type: text
    content: Qu'ils aient honte et rougissent,
  - type: text
    content: ceux qui en veulent à ma vie !
  - type: text
    content: Qu'ils reculent et soient confus,
  - type: text
    content: ceux qui désirent mon malheur !
  '4':
  - type: text
    content: Que, pris de honte, ils s'en retournent,
  - type: text
    content: 'ceux qui disent : « Ah ! ah ! »'
  '5':
  - type: text
    content: Que tous ceux qui te cherchent
  - type: text
    content: trouvent en toi leur gaieté et leur joie !
  - type: text
    content: Que ceux qui aiment ton salut
  - type: text
    content: 'disent constamment : Dieu est grand !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 40.18+ ; 69.30.
  - type: text
    content: 'Moi, je suis pauvre et déshérité :'
  - type: text
    content: ô Dieu, agis vite en ma faveur !
  - type: text
    content: 'Tu es mon secours et mon libérateur :'
  - type: text
    content: Seigneur
  - type: text
    content: ', ne tarde pas !'
