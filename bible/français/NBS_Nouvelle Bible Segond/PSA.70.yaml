      children:
      - type: text
        text: '70.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 40.14-18 et les notes.
    marker-yv: yv-n
  - type: text
    text: O Dieu, délivre-moi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', viens vite à mon secours !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qu'ils aient honte et rougissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui en veulent à ma vie !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'ils reculent et soient confus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui désirent mon malheur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que, pris de honte, ils s'en retournent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ceux qui disent : « Ah ! ah ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que tous ceux qui te cherchent
- type: usfm
  marker: q1
  children:
  - type: text
    text: trouvent en toi leur gaieté et leur joie !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ceux qui aiment ton salut
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'disent constamment : Dieu est grand !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '70.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 40.18+ ; 69.30.
    marker-yv: yv-n
  - type: text
    text: 'Moi, je suis pauvre et déshérité :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô Dieu, agis vite en ma faveur !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu es mon secours et mon libérateur :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ne tarde pas !'
