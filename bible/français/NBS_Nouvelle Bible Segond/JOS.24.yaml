document_id: JOS.24,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Alliance solennelle à Sichem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Sichem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'secrétaires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.10+ ; 23.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Josué rassembla toutes les tribus d''Israël à Sichem ; il convoqua les anciens d''Israël, ses chefs, ses juges et ses secrétaires ; ils se tinrent debout devant Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'c''est une '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 23.5–24.11.'
      marker-yv: yv-n
    - type: text
      text: 'Mais je n''ai pas voulu écouter Balaam ; c''est une bénédiction qu''il a prononcée sur vous, et je vous ai délivrés de sa main. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je vous les ai livrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.14 ; 6.1,20 ; 10.8 ; 11.8 ; Ex 3.8.'
      marker-yv: yv-n
    - type: text
      text: 'Vous avez passé le Jourdain et vous êtes arrivés à Jéricho. Les maîtres de Jéricho vous ont fait la guerre – les Amorites, les Perizzites, les Cananéens, les Hittites, les Guirgashites, les Hivvites et les Jébusites. Je vous les ai livrés '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ps 44.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les frelons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 23.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 7.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ces deux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: douze
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rois des Amorites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sans doute une allusion à Sihôn et Og, en Transjordanie ; cf. v. 8 ; 2.10+.'
      marker-yv: yv-n
    - type: text
      text: 'et j''ai envoyé en avant de vous les frelons, qui les ont chassés devant vous (ces deux rois des Amorites). Ce n''était ni par ton épée, ni par ton arc. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je vous ai donné un pays…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 6.10-12.'
      marker-yv: yv-n
    - type: text
      text: Je vous ai donné un pays pour lequel vous ne vous étiez pas fatigués, des villes que vous habitez sans les avoir bâties, des vignes et des oliviers dont vous vous nourrissez sans les avoir plantés.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Fleuve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : de l''Euphrate. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ez 20.7s. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, craignez le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et servez-le avec intégrité et loyauté. Supprimez les dieux qu''ont servis vos pères, de l''autre côté du Fleuve et en Egypte, et servez le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'il ne vous plaît pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si (c'est) mauvais à vos yeux.
      marker-yv: yv-n
    - type: text
      text: 'Mais s''il ne vous plaît pas de servir le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), choisissez aujourd''hui qui vous voulez servir : ou les dieux que vos pères servaient de l''autre côté du Fleuve, ou les dieux des Amorites dont vous habitez le pays. Moi et ma maison, nous servirons le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) !'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jamais…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 22.29 ; 1S 2.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le peuple répondit : Jamais nous n''abandonnerions le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) pour servir d''autres dieux ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maison des esclaves '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 5.6+ –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'produit… ces grands signes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ces grands miracles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 14.11 ; Dt 6.22.'
      marker-yv: yv-n
    - type: text
      text: 'Car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) est notre Dieu ; c''est lui qui nous a fait monter de l''Egypte, de la maison des esclaves, nous et nos pères ; c''est lui qui a produit sous nos yeux ces grands signes et qui nous a gardés tout au long de la route que nous avons suivie et face à tous les peuples parmi lesquels nous sommes passés. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tous les peuples, les Amorites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11s,15 ; cf. 3.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) qui a chassé devant nous tous les peuples, les Amorites qui habitaient ce pays. Nous aussi, nous servirons le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), car c''est lui qui est notre Dieu.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Gn 21.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à la passion jalouse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 20.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 4.24 ; Na 1.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il ne pardonnera pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n'enlèvera pas… ; il ne se chargera pas de…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ex 10.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 34.7. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Josué dit au peuple : Vous ne pourrez pas servir le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), car c''est un Dieu saint, c''est un Dieu à la passion jalouse : il ne pardonnera pas vos transgressions et vos péchés. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'autrefois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: depuis toujours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de l''autre côté du Fleuve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(l''Euphrate) : certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en Transeuphratène
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon le sens de l''expression en Esd 4.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', qui englobait aussi la Haute-Mésopotamie occidentale ; cf. Gn 11.26ss ; Dt 26.5.'
      marker-yv: yv-n
    - type: text
      text: 'Josué dit à tout le peuple : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël : Vos pères, Térah, père d''Abraham et père de Nahor, habitaient autrefois de l''autre côté du Fleuve et ils servaient d''autres dieux. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous abandonnerez le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) et que vous servirez des dieux étrangers, il se retournera pour vous faire du mal et il vous exterminera, après vous avoir fait du bien.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple dit à Josué : Non ! Nous servirons le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué dit au peuple : Vous êtes témoins contre vous-mêmes que c''est vous qui avez choisi le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) pour le servir. Ils répondirent : Témoins ! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 35.2.
      marker-yv: yv-n
    - type: text
      text: '– Supprimez donc maintenant les dieux étrangers qui sont en votre sein et inclinez votre cœur vers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), le Dieu d''Israël. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple dit à Josué : C''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), notre Dieu, que nous servirons ; c''est lui que nous écouterons.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et il lui donna des prescriptions et des règles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il plaça pour lui une prescription et une règle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Ex 15.25.
      marker-yv: yv-n
    - type: text
      text: 'Josué conclut en ce jour-là une alliance pour le peuple et il lui donna des prescriptions et des règles, à Sichem. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Josué écrivit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 24.4 ; Dt 31.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ces paroles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ces choses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le livre de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.31+.
      marker-yv: yv-n
    - type: text
      text: 'Josué écrivit ces paroles dans le livre de la loi de Dieu. Il prit une grande pierre, qu''il dressa là sous le térébinthe qui était dans le sanctuaire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Cette pierre sera un témoignage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la pierre est témoin, comme l''autel en Transjordanie (cf. 22.27s) et les douze pierres au Guilgal (cf. 4.20-24). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a échangées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a dites.
      marker-yv: yv-n
    - type: text
      text: 'Et Josué dit à tout le peuple : Cette pierre sera un témoignage contre nous, car elle a entendu toutes les paroles que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a échangées avec nous ; elle sera un témoignage contre vous, de peur que vous ne reniiez votre Dieu. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis Josué renvoya le peuple, chacun dans son patrimoine.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Josué
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, Josué, fils de Noun, serviteur du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', mourut, à l''âge de cent dix ans. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ai pris Abraham…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 12.1ss.'
      marker-yv: yv-n
    - type: text
      text: 'J''ai pris Abraham, votre père, de l''autre côté du Fleuve et je lui ai fait parcourir tout Canaan ; j''ai multiplié sa descendance et je lui ai donné Isaac. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On l'ensevelit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : avant le v. 31 LXX ajoute un assez long développement, selon lequel on ensevelit avec Josué les couteaux de pierre dont il s''était servi pour circoncire les Israélites au Guilgal. Voir 5.2-9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Timnath-Sérah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 19.49-50'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mont Gaash
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 2.9.'
      marker-yv: yv-n
    - type: text
      text: 'On l''ensevelit dans le territoire qui constituait son patrimoine, à Timnath-Sérah, dans la région montagneuse d''Ephraïm, au nord du mont Gaash. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'LXX place ce v. après v. 28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui survécurent à Josué
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui prolongèrent (leurs) jours après Josué.
      marker-yv: yv-n
    - type: text
      text: 'Israël servit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pendant tous les jours de Josué et pendant tous les jours des anciens qui survécurent à Josué et qui connaissaient toute l''œuvre que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait faite en faveur d''Israël.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les ossements de Joseph
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Gn 50.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 13.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les Israélites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les fils d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 42.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qesitas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 33.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les ossements de Joseph, que les Israélites avaient emportés d''Egypte, furent ensevelis à Sichem, dans la parcelle de terre que Jacob avait achetée aux fils de Hamor, père de Sichem, pour cent qesitas. Cela fit partie du patrimoine des fils de Joseph. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur la colline… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à Guibéa, la ville de Phinéas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Jg 19.12ss).
      marker-yv: yv-n
    - type: text
      text: Eléazar, fils d'Aaron, mourut, et on l'ensevelit sur la colline de Phinéas, son fils. Elle lui avait été donnée dans la région montagneuse d'Ephraïm.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Esaü '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Séir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 32.4 ; 36.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jacob et ses fils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 46.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'descendus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 12.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'J''ai donné à Isaac Jacob et Esaü. J''ai donné en possession à Esaü la région montagneuse de Séir, mais Jacob et ses fils sont descendus en Egypte. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ai envoyé Moïse et Aaron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 3.10 ; 4.10-15 ; 6.10-13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''ai frappé l''Egypte… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 7.14–12.36 ; 7.27
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je vous en ai fait sortir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 12.37–14.31.
      marker-yv: yv-n
    - type: text
      text: 'J''ai envoyé Moïse et Aaron, et j''ai frappé l''Egypte par les fléaux que j''ai produits en son sein ; puis je vous en ai fait sortir. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la mer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la mer '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Joncs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même terme au v. 7). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ont poursuivi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 14.5-10,23 ; 15.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: attelages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: équipages.
      marker-yv: yv-n
    - type: text
      text: 'J''ai fait sortir vos pères de l''Egypte, et vous êtes arrivés à la mer. Les Egyptiens ont poursuivi vos pères à la mer des Joncs, avec des chars et leurs attelages. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils ont crié…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vos pères ont crié
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 14.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il a mis des ténèbres…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 14.19s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il a ramené sur eux la mer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 14.26-28 ; 15.10,19.'
      marker-yv: yv-n
    - type: text
      text: 'Quand ils ont crié vers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', il a mis des ténèbres entre vous et les Egyptiens ; il a ramené sur eux la mer, et elle les a recouverts. Vos yeux ont vu ce que j''ai fait contre l''Egypte. Et vous avez habité longtemps dans le désert. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Nb 21.
      marker-yv: yv-n
    - type: text
      text: 'Je vous ai conduits au pays des Amorites qui habitaient en Transjordanie, et ils vous ont fait la guerre. Je vous les ai livrés, vous avez pris possession de leur pays et je les ai détruits devant vous. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a fait la guerre à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'est levé et a fait la guerre à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il a fait appeler Balaam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 22.5 ; Dt 32.4.'
      marker-yv: yv-n
    - type: text
      text: 'Balaq, fils de Tsippor, roi de Moab, a fait la guerre à Israël. Il a fait appeler Balaam, fils de Béor, pour vous maudire. '
