document_id: JOS.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Alliance solennelle à Sichem
  - type: text
    content: ' '
  - type: note
    content: à Sichem 20.7n. –  secrétaires 1.10+ ; 23.2n.
  - type: text
    content: 'Josué rassembla toutes les tribus d''Israël à Sichem ; il convoqua les anciens d''Israël, ses chefs, ses juges et ses secrétaires ; ils se tinrent debout devant Dieu. '
  '10':
  - type: note
    content: 'c''est une bénédiction…  : cf. Nb 23.5–24.11.'
  - type: text
    content: 'Mais je n''ai pas voulu écouter Balaam ; c''est une bénédiction qu''il a prononcée sur vous, et je vous ai délivrés de sa main. '
  '11':
  - type: note
    content: 'Je vous les ai livrés  : cf. 3.14 ; 6.1,20 ; 10.8 ; 11.8 ; Ex 3.8.'
  - type: text
    content: 'Vous avez passé le Jourdain et vous êtes arrivés à Jéricho. Les maîtres de Jéricho vous ont fait la guerre – les Amorites, les Perizzites, les Cananéens, les Hittites, les Guirgashites, les Hivvites et les Jébusites. Je vous les ai livrés '
  '12':
  - type: note
    content: 'Cf. Ps 44.4. –  les frelons  : cf. Ex 23.28n  ; Dt 7.20. –  ces deux (LXX douze) rois des Amorites  : sans doute une allusion à Sihôn et Og, en Transjordanie ; cf. v. 8 ; 2.10+.'
  - type: text
    content: 'et j''ai envoyé en avant de vous les frelons, qui les ont chassés devant vous (ces deux rois des Amorites). Ce n''était ni par ton épée, ni par ton arc. '
  '13':
  - type: note
    content: 'Je vous ai donné un pays…  : cf. Dt 6.10-12.'
  - type: text
    content: Je vous ai donné un pays pour lequel vous ne vous étiez pas fatigués, des villes que vous habitez sans les avoir bâties, des vignes et des oliviers dont vous vous nourrissez sans les avoir plantés.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Voir crainte. –  du Fleuve  : de l''Euphrate. –  en Egypte  : cf. Ez 20.7s. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Maintenant, craignez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et servez-le avec intégrité et loyauté. Supprimez les dieux qu''ont servis vos pères, de l''autre côté du Fleuve et en Egypte, et servez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '15':
  - type: note
    content: 's''il ne vous plaît pas  : litt. si (c''est) mauvais à vos yeux.'
  - type: text
    content: 'Mais s''il ne vous plaît pas de servir le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), choisissez aujourd''hui qui vous voulez servir : ou les dieux que vos pères servaient de l''autre côté du Fleuve, ou les dieux des Amorites dont vous habitez le pays. Moi et ma maison, nous servirons le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) !'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Jamais…  : cf. 22.29 ; 1S 2.30n.'
  - type: text
    content: 'Le peuple répondit : Jamais nous n''abandonnerions le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) pour servir d''autres dieux ! '
  '17':
  - type: note
    content: 'maison des esclaves Dt 5.6+ –  produit… ces grands signes ou ces grands miracles  : cf. Nb 14.11 ; Dt 6.22.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est notre Dieu ; c''est lui qui nous a fait monter de l''Egypte, de la maison des esclaves, nous et nos pères ; c''est lui qui a produit sous nos yeux ces grands signes et qui nous a gardés tout au long de la route que nous avons suivie et face à tous les peuples parmi lesquels nous sommes passés. '
  '18':
  - type: note
    content: tous les peuples, les Amorites v. 11s,15 ; cf. 3.10n.
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui a chassé devant nous tous les peuples, les Amorites qui habitaient ce pays. Nous aussi, nous servirons le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), car c''est lui qui est notre Dieu.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Voir saint . –  un Dieu (hébreu ’El , Gn 21.33n) à la passion jalouse Ex 20.5n  ; Dt 4.24 ; Na 1.2. –  il ne pardonnera pas…  : autres traductions il n''enlèvera pas… ; il ne se chargera pas de… , cf. Ex 10.17n  ; 34.7. – Voir péché.'
  - type: text
    content: 'Josué dit au peuple : Vous ne pourrez pas servir le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), car c''est un Dieu saint, c''est un Dieu à la passion jalouse : il ne pardonnera pas vos transgressions et vos péchés. '
  '2':
  - type: note
    content: 'autrefois ou depuis toujours. –  de l''autre côté du Fleuve (l''Euphrate) : certains comprennent en Transeuphratène, selon le sens de l''expression en Esd 4.10n, qui englobait aussi la Haute-Mésopotamie occidentale ; cf. Gn 11.26ss ; Dt 26.5.'
  - type: text
    content: 'Josué dit à tout le peuple : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Vos pères, Térah, père d''Abraham et père de Nahor, habitaient autrefois de l''autre côté du Fleuve et ils servaient d''autres dieux. '
  '20':
  - type: text
    content: 'Lorsque vous abandonnerez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) et que vous servirez des dieux étrangers, il se retournera pour vous faire du mal et il vous exterminera, après vous avoir fait du bien.'
  '21':
  - type: text
    content: 'Le peuple dit à Josué : Non ! Nous servirons le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '22':
  - type: text
    content: 'Josué dit au peuple : Vous êtes témoins contre vous-mêmes que c''est vous qui avez choisi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) pour le servir. Ils répondirent : Témoins ! '
  '23':
  - type: note
    content: Cf. Gn 35.2.
  - type: text
    content: '– Supprimez donc maintenant les dieux étrangers qui sont en votre sein et inclinez votre cœur vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu d''Israël. '
  '24':
  - type: text
    content: 'Le peuple dit à Josué : C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu, que nous servirons ; c''est lui que nous écouterons.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Voir alliance. –  et il lui donna des prescriptions et des règles  : litt. et il plaça pour lui une prescription et une règle  ; cf. Ex 15.25.'
  - type: text
    content: 'Josué conclut en ce jour-là une alliance pour le peuple et il lui donna des prescriptions et des règles, à Sichem. '
  '26':
  - type: note
    content: 'Josué écrivit…  : cf. Ex 24.4 ; Dt 31.9. –  ces paroles  : autre traduction ces choses. –  le livre de la loi 8.31+.'
  - type: text
    content: 'Josué écrivit ces paroles dans le livre de la loi de Dieu. Il prit une grande pierre, qu''il dressa là sous le térébinthe qui était dans le sanctuaire du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '27':
  - type: note
    content: 'Cette pierre sera un témoignage  : la pierre est témoin, comme l''autel en Transjordanie (cf. 22.27s) et les douze pierres au Guilgal (cf. 4.20-24). –  a échangées  : litt. a dites.'
  - type: text
    content: 'Et Josué dit à tout le peuple : Cette pierre sera un témoignage contre nous, car elle a entendu toutes les paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a échangées avec nous ; elle sera un témoignage contre vous, de peur que vous ne reniiez votre Dieu. '
  '28':
  - type: text
    content: Puis Josué renvoya le peuple, chacun dans son patrimoine.
  - type: heading
    content: Mort de Josué
  '29':
  - type: text
    content: 'Après cela, Josué, fils de Noun, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', mourut, à l''âge de cent dix ans. '
  '3':
  - type: note
    content: 'J''ai pris Abraham…  : cf. Gn 12.1ss.'
  - type: text
    content: 'J''ai pris Abraham, votre père, de l''autre côté du Fleuve et je lui ai fait parcourir tout Canaan ; j''ai multiplié sa descendance et je lui ai donné Isaac. '
  '30':
  - type: note
    content: 'On l''ensevelit…  : avant le v. 31 LXX ajoute un assez long développement, selon lequel on ensevelit avec Josué les couteaux de pierre dont il s''était servi pour circoncire les Israélites au Guilgal. Voir 5.2-9. –  Timnath-Sérah  : cf. 19.49-50n. –  mont Gaash  : cf. Jg 2.9.'
  - type: text
    content: 'On l''ensevelit dans le territoire qui constituait son patrimoine, à Timnath-Sérah, dans la région montagneuse d''Ephraïm, au nord du mont Gaash. '
  '31':
  - type: note
    content: 'LXX place ce v. après v. 28. –  qui survécurent à Josué  : litt. qui prolongèrent (leurs) jours après Josué.'
  - type: text
    content: 'Israël servit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pendant tous les jours de Josué et pendant tous les jours des anciens qui survécurent à Josué et qui connaissaient toute l''œuvre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait faite en faveur d''Israël.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Les ossements de Joseph  : cf. Gn 50.25n  ; Ex 13.19. –  les Israélites ou les fils d''Israël , cf. Gn 42.5n. –  qesitas Gn 33.19n.'
  - type: text
    content: 'Les ossements de Joseph, que les Israélites avaient emportés d''Egypte, furent ensevelis à Sichem, dans la parcelle de terre que Jacob avait achetée aux fils de Hamor, père de Sichem, pour cent qesitas. Cela fit partie du patrimoine des fils de Joseph. '
  '33':
  - type: note
    content: sur la colline… ou à Guibéa, la ville de Phinéas (Jg 19.12ss).
  - type: text
    content: Eléazar, fils d'Aaron, mourut, et on l'ensevelit sur la colline de Phinéas, son fils. Elle lui avait été donnée dans la région montagneuse d'Ephraïm.
  '4':
  - type: note
    content: 'Esaü / Séir  : cf. Gn 32.4 ; 36.8. –  Jacob et ses fils / Egypte  : cf. Gn 46.1ss. –  descendus Gn 12.10n.'
  - type: text
    content: 'J''ai donné à Isaac Jacob et Esaü. J''ai donné en possession à Esaü la région montagneuse de Séir, mais Jacob et ses fils sont descendus en Egypte. '
  '5':
  - type: note
    content: 'J''ai envoyé Moïse et Aaron  : cf. Ex 3.10 ; 4.10-15 ; 6.10-13. –  j''ai frappé l''Egypte… Ex 7.14–12.36 ; 7.27n. –  je vous en ai fait sortir Ex 12.37–14.31.'
  - type: text
    content: 'J''ai envoyé Moïse et Aaron, et j''ai frappé l''Egypte par les fléaux que j''ai produits en son sein ; puis je vous en ai fait sortir. '
  '6':
  - type: note
    content: 'à la mer  : la mer des Joncs. –  Les Egyptiens  : autre traduction l''Egypte (même terme au v. 7). –  ont poursuivi…  : cf. Ex 14.5-10,23 ; 15.9. –  attelages  : autre traduction équipages.'
  - type: text
    content: 'J''ai fait sortir vos pères de l''Egypte, et vous êtes arrivés à la mer. Les Egyptiens ont poursuivi vos pères à la mer des Joncs, avec des chars et leurs attelages. '
  '7':
  - type: note
    content: 'ils ont crié…  : c.-à-d. vos pères ont crié  ; cf. Ex 14.10. –  il a mis des ténèbres…  : cf. Ex 14.19s. –  il a ramené sur eux la mer  : cf. Ex 14.26-28 ; 15.10,19.'
  - type: text
    content: 'Quand ils ont crié vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', il a mis des ténèbres entre vous et les Egyptiens ; il a ramené sur eux la mer, et elle les a recouverts. Vos yeux ont vu ce que j''ai fait contre l''Egypte. Et vous avez habité longtemps dans le désert. '
  '8':
  - type: note
    content: Cf. Nb 21.
  - type: text
    content: 'Je vous ai conduits au pays des Amorites qui habitaient en Transjordanie, et ils vous ont fait la guerre. Je vous les ai livrés, vous avez pris possession de leur pays et je les ai détruits devant vous. '
  '9':
  - type: note
    content: 'a fait la guerre à  : litt. s''est levé et a fait la guerre à. –  Il a fait appeler Balaam  : cf. Nb 22.5 ; Dt 32.4.'
  - type: text
    content: 'Balaq, fils de Tsippor, roi de Moab, a fait la guerre à Israël. Il a fait appeler Balaam, fils de Béor, pour vous maudire. '
