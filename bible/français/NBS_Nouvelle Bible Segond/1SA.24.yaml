document_id: 1SA.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'La grotte d''Eïn-Guédi : David épargne Saül'
  - type: text
    content: ' '
  - type: note
    content: Eïn-Guédi (nom qui signifie source du chevreau ) est une localité située sur la rive ouest de la mer Morte ; de là s'écoule un modeste cours d'eau en direction de cette mer. Cf. Jos 15.62 ; Ez 47.10.
  - type: text
    content: 'De là David monta vers les endroits escarpés d''Eïn-Guédi, où il s''installa. '
  '10':
  - type: note
    content: 'les propos  : cf. Lv 19.16 ; Pr 16.28 ; 26.20,22.'
  - type: text
    content: 'David dit à Saül : Pourquoi écoutes-tu les propos des gens qui disent : « David cherche à te faire du mal » ? '
  '11':
  - type: note
    content: 'livré à moi v. 5+. –  On m''a dit  : litt. il m''a dit, verbe dont le sujet n''a pas d''antécédent clair ; les versions anciennes ont toutes hésité devant cette tournure insolite : LXX je n''ai pas voulu  ; Vg j''ai pensé  ; Tg d''autres ont parlé de  ; Syr les hommes de ma troupe ont parlé de. On a aussi pensé que le sujet pourrait être Dieu lui-même (cf. v. 5,19). Toutefois, l''interprétation la plus généralement admise aujourd''hui est celle d''une tournure impersonnelle. –  je t''ai épargné  : litt. elle (ou il) a eu pitié de toi  ; Vg mon œil a eu pitié…  ; LXX, Syr j''ai eu pitié…'
  - type: text
    content: 'Tu le vois en ce jour, de tes propres yeux : aujourd''hui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''avait livré à moi dans la grotte. On m''a dit de te tuer, mais je t''ai épargné, en disant : « Je ne porterai pas la main sur mon seigneur, car c''est lui qui a reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: '. » '
  '12':
  - type: note
    content: 'Regarde, regarde donc  : ou, selon une autre interprétation d''un des termes hébreux qui apparaît ici, regarde, mon père, regarde… ; mon père serait alors un titre respectueux utilisé pour s''adresser à un personnage important, p. ex. un prophète (2R 2.12 ; 6.21) ou un officier supérieur (2R 5.13n) ; comparer avec mon fils, v. 17. –  tu vois bien  : litt. sache et vois  ; autre traduction constate  ; cf. 1R 20.7n  ; 2R 5.7n. –  chez moi  : litt. dans ma main. –  mauvaise intention  : litt. mal. – Voir péché. –  ma vie  : litt. mon âme  ; cf. 20.1n.'
  - type: text
    content: 'Regarde, regarde donc le pan de ton manteau dans ma main. Puisque j''ai coupé le pan de ton manteau et que je ne t''ai pas tué, tu vois bien qu''il n''y a chez moi ni mauvaise intention ni révolte, et que je n''ai pas péché contre toi. Et toi, tu pourchasses ma vie pour me la prendre ! '
  '13':
  - type: note
    content: 'juge entre toi et moi  : cf. Gn 16.5 ; 31.53 ; Jg 11.27. –  ne sera pas contre toi  : cf. 18.17 ; Pr 20.22.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera juge entre toi et moi, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me vengera de toi ; mais ma main ne sera pas contre toi. '
  '14':
  - type: note
    content: Cette maxime n'est pas connue par ailleurs ; on trouve une idée analogue en Mt 7.16-18 ; 12.35 ; Lc 6.45.
  - type: text
    content: 'Comme dit la vieille maxime :'
  - type: text
    content: C'est des méchants que sort la méchanceté.
  - type: text
    content: 'Aussi ma main ne sera-t-elle pas contre toi. '
  '15':
  - type: note
    content: 'parti en guerre  : litt. sorti  ; cf. 8.20n  ; 11.7n. –  Un chien mort 2S 9.8 ; 16.9 ; cf. 2S 3.8. –  une simple puce 26.20.'
  - type: text
    content: 'Contre qui le roi d''Israël est-il parti en guerre ? Qui poursuis-tu ? Un chien mort, une simple puce ? '
  '16':
  - type: note
    content: 'rendra la justice  : cf. v. 13 ; Ps 37.5s. –  il défendra ma cause  : cf. 25.39 ; Ps 35.23 ; 43.1 ; 119.154 ; Pr 22.23. –  il jugera…  : litt. il me jugera (ou me rendra justice) de ta main  ; cf. 2S 18.19,31.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rendra la justice ; il sera juge entre toi et moi ; il regardera, il défendra ma cause, il jugera en me délivrant de ta main.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Est-ce bien ta voix 26.17. –  mon fils  : cf. v. 12. –  se mit à sangloter 11.4n.'
  - type: text
    content: 'Lorsque David eut achevé de dire cela à Saül, Saül dit : Est-ce bien ta voix, mon fils David ? Et Saül se mit à sangloter. '
  '18':
  - type: note
    content: 'Tu es plus juste que moi  : cf. Gn 38.26.'
  - type: text
    content: 'Puis il dit à David : Tu es plus juste que moi, car tu m''as fait du bien, alors que moi je t''ai fait du mal. '
  '19':
  - type: note
    content: livré à toi v. 5+ ; 17.46+.
  - type: text
    content: 'Tu as montré aujourd''hui que tu agissais avec bonté envers moi : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''avait livré à toi et tu ne m''as pas tué. '
  '2':
  - type: note
    content: poursuite des Philistins 23.28.
  - type: text
    content: 'Lorsque Saül fut revenu de la poursuite des Philistins, on lui dit : David est dans le désert d''Eïn-Guédi. '
  '20':
  - type: note
    content: 'le laisse-t-il poursuivre tranquillement son chemin  : litt. le laisse-t-il aller sur un bon chemin.'
  - type: text
    content: 'Si quelqu''un trouve son ennemi, le laisse-t-il poursuivre tranquillement son chemin ? Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te récompense pour ce que tu m''as fait en ce jour ! '
  '21':
  - type: note
    content: tu deviendras roi 13.14 ; 15.28 ; 23.17 ; 25.30 ; 28.17.
  - type: text
    content: 'Maintenant, je le sais, tu deviendras roi et, dans ta main, la royauté d''Israël tiendra. '
  '22':
  - type: note
    content: 'Jure-moi… par le Seigneur  : cf. 30.15 ; Gn 21.23 ; 24.3 ; Jos 2.12. –  tu ne retrancheras pas ma descendance 20.14-16 ; cf. 2S 21.6-8. –  tu ne feras pas disparaître (ou tu ne détruiras pas) mon nom est une autre façon de dire tu ne feras pas mourir mes descendants, ce qui aurait pour résultat que le nom de cette branche familiale ne serait plus porté en Israël.'
  - type: text
    content: 'Jure-moi maintenant par le '
  - type: text
    content: Seigneur
  - type: text
    content: ' que tu ne retrancheras pas ma descendance après moi et que tu ne feras pas disparaître mon nom de ma famille. '
  '23':
  - type: note
    content: 'Séparation  : voir 26.25. –  forteresse 22.4s.'
  - type: text
    content: David le jura à Saül. Puis Saül s'en alla chez lui, et David et ses hommes remontèrent à la forteresse.
  '3':
  - type: note
    content: 'trois mille hommes  : cf. 13.2n. –  rochers des bouquetins  : endroit proche d''Eïn-Guédi, où l''on trouvait encore des bouquetins sauvages au milieu du XXe s. ; l''expression correspondante, qui pourrait avoir été un nom propre, n''apparaît pas ailleurs. Cf. Ps 104.18 ; Jb 39.1.'
  - type: text
    content: 'Saül prit trois mille hommes d''élite sur tout Israël et il alla chercher David et ses hommes jusque du côté des rochers des bouquetins. '
  '4':
  - type: note
    content: 'y entra  : cf. Jr 10.23 ; Pr 20.24. –  satisfaire un besoin naturel  : l''hébreu utilise aussi un euphémisme en disant se couvrir les pieds, cf. Jg 3.24n. –  la grotte  : cf. Ps 57.1 ; 142.1.'
  - type: text
    content: 'Il arriva vers des parcs à petit bétail qui étaient près du chemin ; il y avait là une grotte. Saül y entra pour satisfaire un besoin naturel. David et ses hommes étaient assis au fond de la grotte. '
  '5':
  - type: note
    content: 't''a dit  : le livre de Samuel ne rapporte pas à quelle occasion le Seigneur a adressé cette promesse à David ; cf. 26.8. –  te livre  : litt. livre… entre tes mains  ; cf. v. 11,19 ; 26.8,23. –  ton ennemi  : autre lecture traditionnelle tes ennemis. Cf. Ps 1.1 ; Pr 16.32. –  coupa furtivement  : litt. se leva et coupa furtivement. –  le pan  : cf. 15.27n. – Sur le symbolisme parfois attaché au manteau, cf. 15.27 ; 18.4 ; 1R 11.30s ; 19.19 ; 2R 2.8,13.'
  - type: text
    content: 'Les hommes de David lui dirent : Il est arrivé, le jour à propos duquel le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a dit : « C''est moi qui te livre ton ennemi ; traite-le comme il te plaira. » David coupa furtivement le pan du manteau de Saül. '
  '6':
  - type: note
    content: 'sentit battre son cœur  : d''avoir osé porter atteinte à la personne du roi ; même expression en 2S 24.10.'
  - type: text
    content: 'Après cela, David sentit battre son cœur, parce qu''il avait coupé le pan du manteau de Saül. '
  '7':
  - type: note
    content: 'Jamais ! 2.30n. –  Que le Seigneur me garde de  : cf. 26.9-11 ; 2S 1.14. –  seigneur ou maître, de même aux v. 9,11. –  l''homme qui a reçu l''onction… 2.10n.'
  - type: text
    content: 'Et il dit à ses hommes : Jamais ! Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me garde de commettre une telle action, de porter la main sur mon seigneur, sur l''homme qui a reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Car c''est lui qui a reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: note
    content: 'arrêta  : le même verbe hébreu est habituellement traduit par fendre (cf. Lv 1.17 ; 11.3 ; Jg 14.6) ; Vg brisa (l''élan de)  ; LXX persuada. –  attaquer  : litt. se lever vers (ou se dresser contre) Saül  ; le même verbe revient dans la suite (sortit…, litt. se leva de la grotte). Cf. Mt 5.44 ; Rm 12.17-21.'
  - type: text
    content: Par ces paroles, David arrêta ses hommes et les empêcha d'attaquer Saül. Saül sortit de la grotte et continua son chemin.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'sortit  : litt. se leva et sortit , cf. v. 8n. –  s''inclina… prosterné  : cf. 28.14.'
  - type: text
    content: 'Après cela, David sortit de la grotte. Il se mit alors à crier derrière Saül : O roi, mon seigneur ! Saül regarda derrière lui, et David s''inclina face contre terre, prosterné. '
