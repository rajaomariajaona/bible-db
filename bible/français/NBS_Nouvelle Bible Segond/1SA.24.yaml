document_id: 1SA.24,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'La grotte d''Eïn-Guédi : David épargne Saül'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eïn-Guédi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(nom qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: source du chevreau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) est une localité située sur la rive ouest de la mer Morte ; de là s'écoule un modeste cours d'eau en direction de cette mer. Cf. Jos 15.62 ; Ez 47.10.
      marker-yv: yv-n
    - type: text
      text: 'De là David monta vers les endroits escarpés d''Eïn-Guédi, où il s''installa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les propos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 19.16 ; Pr 16.28 ; 26.20,22.'
      marker-yv: yv-n
    - type: text
      text: 'David dit à Saül : Pourquoi écoutes-tu les propos des gens qui disent : « David cherche à te faire du mal » ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'livré à moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On m'a dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il m'a dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', verbe dont le sujet n''a pas d''antécédent clair ; les versions anciennes ont toutes hésité devant cette tournure insolite : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je n'ai pas voulu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Vg '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai pensé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'autres ont parlé de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les hommes de ma troupe ont parlé de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. On a aussi pensé que le sujet pourrait être Dieu lui-même (cf. v. 5,19). Toutefois, l''interprétation la plus généralement admise aujourd''hui est celle d''une tournure impersonnelle. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je t'ai épargné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'elle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a eu pitié de toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Vg '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon œil a eu pitié…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX, Syr '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai eu pitié…
      marker-yv: yv-n
    - type: text
      text: 'Tu le vois en ce jour, de tes propres yeux : aujourd''hui le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''avait livré à moi dans la grotte. On m''a dit de te tuer, mais je t''ai épargné, en disant : « Je ne porterai pas la main sur mon seigneur, car c''est lui qui a reçu l''onction du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. » '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Regarde, regarde donc
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ou, selon une autre interprétation d''un des termes hébreux qui apparaît ici, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'regarde, mon père, regarde… ; mon père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: serait alors un titre respectueux utilisé pour s'adresser à un personnage important, p. ex. un prophète (2R 2.12 ; 6.21) ou un officier supérieur (2R 5.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; comparer avec '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu vois bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sache et vois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: constate
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1R 20.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 5.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chez moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans ma main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mauvaise intention
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon âme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 20.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Regarde, regarde donc le pan de ton manteau dans ma main. Puisque j''ai coupé le pan de ton manteau et que je ne t''ai pas tué, tu vois bien qu''il n''y a chez moi ni mauvaise intention ni révolte, et que je n''ai pas péché contre toi. Et toi, tu pourchasses ma vie pour me la prendre ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: juge entre toi et moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 16.5 ; 31.53 ; Jg 11.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne sera pas contre toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.17 ; Pr 20.22.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' sera juge entre toi et moi, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me vengera de toi ; mais ma main ne sera pas contre toi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maxime '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: n'est pas connue par ailleurs ; on trouve une idée analogue en Mt 7.16-18 ; 12.35 ; Lc 6.45.
      marker-yv: yv-n
    - type: text
      text: 'Comme dit la vieille maxime :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est des méchants que sort la méchanceté.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussi ma main ne sera-t-elle pas contre toi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parti en guerre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sorti
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 8.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Un chien mort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2S 9.8 ; 16.9 ; cf. 2S 3.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une simple puce '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 26.20.
      marker-yv: yv-n
    - type: text
      text: 'Contre qui le roi d''Israël est-il parti en guerre ? Qui poursuis-tu ? Un chien mort, une simple puce ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rendra la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 13 ; Ps 37.5s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il défendra ma cause
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 25.39 ; Ps 35.23 ; 43.1 ; 119.154 ; Pr 22.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il jugera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il me jugera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me rendra justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ta main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2S 18.19,31.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' rendra la justice ; il sera juge entre toi et moi ; il regardera, il défendra ma cause, il jugera en me délivrant de ta main.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Est-ce bien ta voix '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '26.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se mit à sangloter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque David eut achevé de dire cela à Saül, Saül dit : Est-ce bien ta voix, mon fils David ? Et Saül se mit à sangloter. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu es plus juste que moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 38.26.'
      marker-yv: yv-n
    - type: text
      text: 'Puis il dit à David : Tu es plus juste que moi, car tu m''as fait du bien, alors que moi je t''ai fait du mal. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'livré à toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5+ ; 17.46+.
      marker-yv: yv-n
    - type: text
      text: 'Tu as montré aujourd''hui que tu agissais avec bonté envers moi : le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''avait livré à toi et tu ne m''as pas tué. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'poursuite des Philistins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 23.28.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Saül fut revenu de la poursuite des Philistins, on lui dit : David est dans le désert d''Eïn-Guédi. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le laisse-t-il poursuivre tranquillement son chemin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le laisse-t-il aller sur un bon chemin.
      marker-yv: yv-n
    - type: text
      text: 'Si quelqu''un trouve son ennemi, le laisse-t-il poursuivre tranquillement son chemin ? Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' te récompense pour ce que tu m''as fait en ce jour ! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu deviendras roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.14 ; 15.28 ; 23.17 ; 25.30 ; 28.17.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, je le sais, tu deviendras roi et, dans ta main, la royauté d''Israël tiendra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jure-moi… par le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 30.15 ; Gn 21.23 ; 24.3 ; Jos 2.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu ne retrancheras pas ma descendance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.14-16 ; cf. 2S 21.6-8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu ne feras pas disparaître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu ne détruiras pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est une autre façon de dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu ne feras pas mourir mes descendants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui aurait pour résultat que le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nom '
      - type: usfm
        marker: ft
        children:
        - type: text
