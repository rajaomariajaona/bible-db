    marker-yv: yv-n
  - type: text
    text: 'Josué dit : Pourquoi as-tu attiré le malheur sur nous ? Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' attire le malheur sur toi en ce jour. Tout Israël lui jeta des pierres. On les brûla, on les lapida. '
