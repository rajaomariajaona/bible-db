      - type: text
        text: '(Lv 20.2,27 ; 24.14,16,23 ; Nb 14.10 ; 15.35s ; Dt 21.21 ; 1R 12.18 ; Ez 16.40 ; 23.47 ; 2Ch 10.18 ; 24.21) ; c''est un synonyme de celui qui apparaît à la fin du v. (= Ex 8.22 ; 17.4 ; 19.13 ; 21.28 ; Dt 13.11 ; 17.5 ; 22.21,24 ; 1S 30.6 ; 1R 21.10,13). –  '
