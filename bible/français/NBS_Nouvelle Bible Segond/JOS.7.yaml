  - type: text
    text: 'Josué dit à Akân : Mon fils, je te prie, donne gloire au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël, et reconnais ta faute devant lui : dis-moi donc ce que tu as fait, ne me cache rien ! '
  - type: usfm
    marker: v
