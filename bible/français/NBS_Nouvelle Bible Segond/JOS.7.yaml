    marker-yv: yv-n
  - type: text
    text: 'Josué prit Akân, fils de Zérah, ainsi que l''argent, le manteau et le lingot d''or, ses fils, ses filles, son bœuf, son âne, son petit bétail, sa tente et tout ce qui lui appartenait. Tout Israël, avec Josué, les fit monter dans la vallée d''Akor. '
  - type: usfm
    marker: v
