document_id: JOS.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faute et châtiment d'Akân
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: commirent un sacrilège
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1Ch 2.7 ; voir aussi Ac 5.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: anathème
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: ', malédiction.'
    marker-yv: yv-n
  - type: text
    text: 'Mais les Israélites commirent un sacrilège en matière d''anathème : Akân, fils de Karmi, fils de Zabdi, fils de Zérah, de la tribu de Juda, prit une part de ce qui avait été frappé d''anathème, et le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se mit en colère contre les Israélites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Aï '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la Ruine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(formes voisines en Es 10.28 ; Né 11.31) ; le nom est toujours accompagné de l''article défini. Ville de la région centrale du pays d''Israël. On identifie généralement '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Aï '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: avec Et-Tell (sens analogue en arabe) où l'on a découvert les vestiges d'une ville détruite ; v. 3ss ; 8.1ss ; 9.3 ; 10.1s ; 12.9 ; Jr 49.3 ; Esd 2.28 ; Né 7.32.
    marker-yv: yv-n
  - type: text
    text: 'Josué envoya des hommes de Jéricho vers le Aï qui est près de Beth-Aven, à l''est de Beth-El. Il leur dit : Montez espionner le pays. Ces hommes montèrent pour espionner le Aï. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: N'impose pas cette fatigue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ne fatigue pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même verbe en Ec 10.15) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: là.
    marker-yv: yv-n
  - type: text
    text: 'Ils revinrent auprès de Josué et lui dirent : Que tout le peuple ne monte pas à l''assaut ! Que deux ou trois mille hommes montent à l''assaut, et ils battront le Aï ! N''impose pas cette fatigue à tout le peuple, car ils sont peu nombreux. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Environ trois mille hommes du peuple montèrent à l''assaut, et ils durent s''enfuir devant les hommes du Aï. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shebarim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : nom de lieu qui n''apparaît qu''ici ; il signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brisures, fractures '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: malheurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: … fondit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ps 22.15+.'
    marker-yv: yv-n
  - type: text
    text: Les hommes du Aï abattirent environ trente-six d'entre eux. Ils les poursuivirent depuis la porte de la ville jusqu'à Shebarim et les battirent à la descente. Le cœur du peuple fondit et devint comme de l'eau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signes de deuil ou de détresse. Cf. 1R 1.23
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Josué déchira ses vêtements et tomba face contre terre devant le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', jusqu''au soir, lui et les anciens d''Israël. Ils se jetèrent de la poussière sur la tête. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ah ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cette expression, assez rare dans l''A.T., se retrouve en Jg 6.22 ; Jr 1.6 ; 4.10 ; 14.13 ; 32.17 ; Ez 4.14 ; 9.8 ; 11.13 ; 21.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Amorites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''un des peuples cananéens ; 5.1. Voir aussi Ex 3.8,17.'
    marker-yv: yv-n
  - type: text
    text: 'Josué dit : Ah ! Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: ', pourquoi as-tu fait passer le Jourdain à ce peuple, si c''était pour nous livrer aux Amorites et pour nous faire disparaître ? Si seulement nous avions décidé de rester en Transjordanie ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le dos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la nuque.
    marker-yv: yv-n
  - type: text
    text: 'Pardon, Seigneur, mais que vais-je dire, après qu''Israël a tourné le dos devant ses ennemis ? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Les Cananéens et tous les habitants du pays l'apprendront, ils nous encercleront et retrancheront notre nom du pays. Et que feras-tu pour ton grand nom ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Josué : Lève-toi ! Pourquoi tombes-tu face contre terre ? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'passé outre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 15 ; 23.16 ; Dt 17.2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: '… instituée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ordonnée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prescrite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : cf. 23.16 ; Jg 2.20 ; Jr 11.4 ; Ps 111.9.'
    marker-yv: yv-n
  - type: text
    text: 'Israël a péché ; ils ont passé outre à l''alliance que j''avais instituée pour eux : ils ont pris une part de ce qui était frappé d''anathème, ils l''ont volée, dissimulée et mise dans leurs affaires. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils s'enfuiront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils tourneront la nuque.
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites ne pourront pas tenir devant leurs ennemis. Ils s''enfuiront devant leurs ennemis, car ils sont eux-mêmes frappés d''anathème. Je ne continuerai pas à être avec vous si vous ne détruisez pas ce qui est frappé d''anathème, si vous ne le faites pas disparaître de votre sein. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: consacre le peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 19.10-15 ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lève-toi, consacre le peuple. Tu diras : Consacrez-vous pour demain, car ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël : L''anathème est en ton sein, Israël ! Tu ne pourras pas tenir devant tes ennemis, tant que vous n''aurez pas supprimé de votre sein ce qui est frappé d''anathème. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous vous présenterez '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous vous approcherez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 22.7 ; 1S 10.20 ; Ml 3.5 ; voir Ex 28.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Voir aussi 1S 14.40-42. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: désignera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prendra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même dans la suite ; cf. 1S 16.5ss.'
    marker-yv: yv-n
  - type: text
    text: 'Vous vous présenterez au matin, tribu par tribu ; la tribu que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' désignera se présentera clan par clan ; le clan que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' désignera se présentera maison par maison, et la maison que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' désignera se présentera homme par homme. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sera jeté au feu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brûlé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme au v. 25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Gn 38.24 ; Lv 21.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: folie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 34.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 22.21 ; 1S 25.25 ; 2S 13.12.'
    marker-yv: yv-n
  - type: text
    text: 'Celui qui sera désigné pour l''anathème sera jeté au feu, lui et tout ce qui lui appartient : il a passé outre à l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', il a commis une folie en Israël !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Josué se leva de bon matin et présenta Israël tribu par tribu. La tribu de Juda fut désignée. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les clans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon quelques mss ; autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le clan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: homme par homme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : quelques mss hébreux et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: maison par maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 18.'
    marker-yv: yv-n
  - type: text
    text: 'Il présenta les clans de Juda, et il désigna le clan de Zérah. Il présenta le clan de Zérah, homme par homme. Zabdi fut désigné. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il présenta sa maison, homme par homme. Akân, fils de Karmi, fils de Zabdi, fils de Zérah, de la tribu de Juda, fut désigné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'donne '
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
      - type: text
        text: ' au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Jn 9.24+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: reconnais ta faute devant lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: donne-lui reconnaissance
    - type: usfm
