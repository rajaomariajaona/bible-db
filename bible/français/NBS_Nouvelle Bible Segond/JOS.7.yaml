    marker-yv: yv-n
  - type: text
    text: 'Akân répondit à Josué : C''est vrai, c''est moi qui ai péché contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël. Voici ce que j''ai fait : '
