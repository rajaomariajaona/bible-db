document_id: JOS.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Faute et châtiment d'Akân
  - type: text
    content: ' '
  - type: note
    content: 'commirent un sacrilège  : cf. 1Ch 2.7 ; voir aussi Ac 5.2n. –  anathème  : voir bénédiction, malédiction.'
  - type: text
    content: 'Mais les Israélites commirent un sacrilège en matière d''anathème : Akân, fils de Karmi, fils de Zabdi, fils de Zérah, de la tribu de Juda, prit une part de ce qui avait été frappé d''anathème, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre les Israélites.'
  '10':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : Lève-toi ! Pourquoi tombes-tu face contre terre ? '
  '11':
  - type: note
    content: 'Voir péché. –  passé outre v. 15 ; 23.16 ; Dt 17.2+. –  alliance… instituée (litt. ordonnée ou prescrite) : cf. 23.16 ; Jg 2.20 ; Jr 11.4 ; Ps 111.9.'
  - type: text
    content: 'Israël a péché ; ils ont passé outre à l''alliance que j''avais instituée pour eux : ils ont pris une part de ce qui était frappé d''anathème, ils l''ont volée, dissimulée et mise dans leurs affaires. '
  '12':
  - type: note
    content: 'Ils s''enfuiront  : litt. ils tourneront la nuque.'
  - type: text
    content: 'Les Israélites ne pourront pas tenir devant leurs ennemis. Ils s''enfuiront devant leurs ennemis, car ils sont eux-mêmes frappés d''anathème. Je ne continuerai pas à être avec vous si vous ne détruisez pas ce qui est frappé d''anathème, si vous ne le faites pas disparaître de votre sein. '
  '13':
  - type: note
    content: 'consacre le peuple  : cf. Ex 19.10-15 ; voir saint.'
  - type: text
    content: 'Lève-toi, consacre le peuple. Tu diras : Consacrez-vous pour demain, car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : L''anathème est en ton sein, Israël ! Tu ne pourras pas tenir devant tes ennemis, tant que vous n''aurez pas supprimé de votre sein ce qui est frappé d''anathème. '
  '14':
  - type: note
    content: 'Vous vous présenterez ou vous vous approcherez  ; cf. Ex 22.7 ; 1S 10.20 ; Ml 3.5 ; voir Ex 28.30n. Voir aussi 1S 14.40-42. –  désignera  : litt. prendra  ; de même dans la suite ; cf. 1S 16.5ss.'
  - type: text
    content: 'Vous vous présenterez au matin, tribu par tribu ; la tribu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' désignera se présentera clan par clan ; le clan que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' désignera se présentera maison par maison, et la maison que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' désignera se présentera homme par homme. '
  '15':
  - type: note
    content: 'sera jeté au feu ou brûlé, comme au v. 25n  ; cf. Gn 38.24 ; Lv 21.9. –  folie  : cf. Gn 34.7n  ; Dt 22.21 ; 1S 25.25 ; 2S 13.12.'
  - type: text
    content: 'Celui qui sera désigné pour l''anathème sera jeté au feu, lui et tout ce qui lui appartient : il a passé outre à l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', il a commis une folie en Israël !'
  '16':
  - type: text
    content: 'Josué se leva de bon matin et présenta Israël tribu par tribu. La tribu de Juda fut désignée. '
  '17':
  - type: note
    content: 'les clans  : selon quelques mss ; autre lecture traditionnelle le clan. –  homme par homme  : quelques mss hébreux et Syr portent maison par maison, cf. v. 18.'
  - type: text
    content: 'Il présenta les clans de Juda, et il désigna le clan de Zérah. Il présenta le clan de Zérah, homme par homme. Zabdi fut désigné. '
  '18':
  - type: text
    content: Il présenta sa maison, homme par homme. Akân, fils de Karmi, fils de Zabdi, fils de Zérah, de la tribu de Juda, fut désigné.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'donne gloire au Seigneur  : cf. Jn 9.24+. –  reconnais ta faute devant lui  : litt. donne-lui reconnaissance  ; autres traductions fais acte de reconnaissance envers lui ; rends-lui hommage  ; sur cette expression employée pour la confession d''une faute, voir Esd 10.11n.'
  - type: text
    content: 'Josué dit à Akân : Mon fils, je te prie, donne gloire au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, et reconnais ta faute devant lui : dis-moi donc ce que tu as fait, ne me cache rien ! '
  '2':
  - type: text
    content: ' '
  - type: note
    content: le Aï signifie la Ruine (formes voisines en Es 10.28 ; Né 11.31) ; le nom est toujours accompagné de l'article défini. Ville de la région centrale du pays d'Israël. On identifie généralement le Aï avec Et-Tell (sens analogue en arabe) où l'on a découvert les vestiges d'une ville détruite ; v. 3ss ; 8.1ss ; 9.3 ; 10.1s ; 12.9 ; Jr 49.3 ; Esd 2.28 ; Né 7.32.
  - type: text
    content: 'Josué envoya des hommes de Jéricho vers le Aï qui est près de Beth-Aven, à l''est de Beth-El. Il leur dit : Montez espionner le pays. Ces hommes montèrent pour espionner le Aï. '
  '20':
  - type: note
    content: 'Voici ce que j''ai fait  : litt. comme ceci et comme cela j''ai fait  ; expression analogue en 2S 17.15 ; 2R 5.4 ; 9.12.'
  - type: text
    content: 'Akân répondit à Josué : C''est vrai, c''est moi qui ai péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. Voici ce que j''ai fait : '
  '21':
  - type: note
    content: 'Shinéar est la région de Babylone, Gn 10.10n  ; 11.2 ; 14.1,9 ; Es 11.11 ; Za 5.11 ; Dn 1.2. –  deux cents sicles… cinquante sicles  : c.-à-d. respectivement environ 1,9 kg et près de 500 g ; voir mesures, poids et monnaies.'
  - type: text
    content: 'j''ai vu dans le butin un beau manteau de Shinéar, deux cents sicles d''argent et un lingot d''or pesant à lui seul cinquante sicles. J''en ai eu envie et je les ai pris ; ils sont maintenant cachés en terre, à l''intérieur de ma tente, l''argent par-dessous. '
  '22':
  - type: text
    content: 'Josué envoya des messagers qui coururent à la tente. Tout cela était bien caché dans sa tente, l''argent par-dessous. '
  '23':
  - type: text
    content: 'Ils prirent le tout de l''intérieur de la tente, l''apportèrent à Josué et à tous les Israélites, et le déposèrent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '24':
  - type: text
    content: ' '
  - type: note
    content: vallée d'Akor ou vallée du malheur v. 25n  ; cf. 15.7 ; voir aussi Es 65.10 ; Os 2.17. Le nom d’ Akor figure dans des mss de Qumrân  ; il a été identifié à une localité des environs.
  - type: text
    content: 'Josué prit Akân, fils de Zérah, ainsi que l''argent, le manteau et le lingot d''or, ses fils, ses filles, son bœuf, son âne, son petit bétail, sa tente et tout ce qui lui appartenait. Tout Israël, avec Josué, les fit monter dans la vallée d''Akor. '
  '25':
  - type: note
    content: 'attiré le malheur sur  : le verbe hébreu correspondant rappelle le nom Akor (v. 24n) ; 6.18+ ; 1Ch 2.7n. –  lui jeta (des pierres)  : le verbe correspondant est habituellement traduit par lapider (Lv 20.2,27 ; 24.14,16,23 ; Nb 14.10 ; 15.35s ; Dt 21.21 ; 1R 12.18 ; Ez 16.40 ; 23.47 ; 2Ch 10.18 ; 24.21) ; c''est un synonyme de celui qui apparaît à la fin du v. (= Ex 8.22 ; 17.4 ; 19.13 ; 21.28 ; Dt 13.11 ; 17.5 ; 22.21,24 ; 1S 30.6 ; 1R 21.10,13). –  On les brûla, on les lapida  : ces précisions sont absentes de LXX  ; Vg et Syr portent seulement la seconde ; certains comprennent  : on brûla les objets et on lapida les gens  ; cf. v. 15.'
  - type: text
    content: 'Josué dit : Pourquoi as-tu attiré le malheur sur nous ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' attire le malheur sur toi en ce jour. Tout Israël lui jeta des pierres. On les brûla, on les lapida. '
  '26':
  - type: note
    content: On dressa sur lui… 8.29. –  vallée d'Akor v. 24n. –  jusqu'à ce jour 4.9n.
  - type: text
    content: 'On dressa sur lui un grand tas de pierres, qui est là jusqu''à ce jour, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' revint de sa colère ardente. C''est pourquoi ce lieu porte le nom de vallée d''Akor, jusqu''à ce jour.'
  '3':
  - type: note
    content: 'N''impose pas cette fatigue  : litt. ne fatigue pas (même verbe en Ec 10.15) là.'
  - type: text
    content: 'Ils revinrent auprès de Josué et lui dirent : Que tout le peuple ne monte pas à l''assaut ! Que deux ou trois mille hommes montent à l''assaut, et ils battront le Aï ! N''impose pas cette fatigue à tout le peuple, car ils sont peu nombreux. '
  '4':
  - type: text
    content: 'Environ trois mille hommes du peuple montèrent à l''assaut, et ils durent s''enfuir devant les hommes du Aï. '
  '5':
  - type: note
    content: 'Shebarim  : nom de lieu qui n''apparaît qu''ici ; il signifie brisures, fractures ou malheurs. –  Le cœur… fondit  : cf. Ps 22.15+.'
  - type: text
    content: Les hommes du Aï abattirent environ trente-six d'entre eux. Ils les poursuivirent depuis la porte de la ville jusqu'à Shebarim et les battirent à la descente. Le cœur du peuple fondit et devint comme de l'eau.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Signes de deuil ou de détresse. Cf. 1R 1.23n.
  - type: text
    content: 'Josué déchira ses vêtements et tomba face contre terre devant le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', jusqu''au soir, lui et les anciens d''Israël. Ils se jetèrent de la poussière sur la tête. '
  '7':
  - type: note
    content: 'Ah ! cette expression, assez rare dans l''A.T., se retrouve en Jg 6.22 ; Jr 1.6 ; 4.10 ; 14.13 ; 32.17 ; Ez 4.14 ; 9.8 ; 11.13 ; 21.5. –  Amorites  : l''un des peuples cananéens ; 5.1. Voir aussi Ex 3.8,17.'
  - type: text
    content: 'Josué dit : Ah ! Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', pourquoi as-tu fait passer le Jourdain à ce peuple, si c''était pour nous livrer aux Amorites et pour nous faire disparaître ? Si seulement nous avions décidé de rester en Transjordanie ! '
  '8':
  - type: note
    content: 'le dos  : litt. la nuque.'
  - type: text
    content: 'Pardon, Seigneur, mais que vais-je dire, après qu''Israël a tourné le dos devant ses ennemis ? '
  '9':
  - type: note
    content: Voir nom.
  - type: text
    content: Les Cananéens et tous les habitants du pays l'apprendront, ils nous encercleront et retrancheront notre nom du pays. Et que feras-tu pour ton grand nom ?
