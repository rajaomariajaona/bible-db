        text: est la région de Babylone, Gn 10.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 11.2 ; 14.1,9 ; Es 11.11 ; Za 5.11 ; Dn 1.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux cents sicles… cinquante sicles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. respectivement environ 1,9 kg et près de 500 g ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'j''ai vu dans le butin un beau manteau de Shinéar, deux cents sicles d''argent et un lingot d''or pesant à lui seul cinquante sicles. J''en ai eu envie et je les ai pris ; ils sont maintenant cachés en terre, à l''intérieur de ma tente, l''argent par-dessous. '
  - type: usfm
    marker: v
    metadata:
