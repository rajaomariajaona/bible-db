document_id: PSA.96,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un chant pour le Seigneur qui vient
  - type: heading
    content: 1Ch 16.23-33
  - type: text
    content: ' '
  - type: note
    content: 'LXX donne la suscription  : Lorsqu''on rebâtissait la maison (= le temple) après la captivité. Psaume de David. –  chant nouveau 33.3+ ; 98.1 ; 149.1 ; Es 42.10 ; Ap 5.9+. –  terre entière 66.1+.'
  - type: text
    content: 'Chantez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' un chant nouveau !'
  - type: text
    content: 'Chante pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', terre entière !'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Dites… roi ! 1Ch 16.30ns. –  parmi les nations v. 3+. –  C''est le Seigneur (YHWH) qui est roi 93.1n. –  Il juge…  : cf. 9.9 ; 98.9.'
  - type: text
    content: 'Dites parmi les nations : C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est roi !'
  - type: text
    content: – Ainsi le monde est ferme, il ne vacille pas. –
  - type: text
    content: Il juge les peuples avec droiture.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le ciel (ou les cieux  ; cf. Gn 1.1n) 97.1 ; Es 44.23 ; 49.13 ; Ap 12.12 ; 18.20. –  Que la mer… 98.7 ; Es 42.10-12. –  avec tout ce qui s''y trouve  : litt. et ce qui la remplit  ; 24.1n.'
  - type: text
    content: Que le ciel se réjouisse, que la terre soit dans l'allégresse !
  - type: text
    content: Que la mer retentisse, avec tout ce qui s'y trouve !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Es 44.23 ; 55.12. –  tout ce qui s''y trouve  : litt. tout ce qui est en elle , autre expression au v. 11n.'
  - type: text
    content: Que la campagne exulte, avec tout ce qui s'y trouve,
  - type: text
    content: que tous les arbres des forêts poussent des cris de joie
  '13':
  - type: text
    content: ' '
  - type: note
    content: 98.9. –  il vient Es 40.10 ; 59.19s ; 60.1 ; 62.11. –  juger 7.9 ; 9.9n  ; 94.2+ ; Ac 17.31 ; Ap 19.11 ; voir justice . –  constance 89.2n.
  - type: text
    content: 'devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il vient !'
  - type: text
    content: Car il vient pour juger la terre ;
  - type: text
    content: il jugera le monde avec justice,
  - type: text
    content: il jugera les peuples par sa constance.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Voir nom. –  la bonne nouvelle de son salut 68.12+ ; cf. 98.2 ; Es 40.29 ; 41.27 ; 52.7 ; Na 2.1.
  - type: text
    content: 'Chantez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', bénissez son nom,'
  - type: text
    content: annoncez jour après jour la bonne nouvelle de son salut !
  '3':
  - type: text
    content: ' '
  - type: note
    content: Dites et racontez traduisent un seul verbe hébreu ; cf. 9.2+,12+ ; 105.1. – Voir gloire.
  - type: text
    content: Dites parmi les nations sa gloire,
  - type: text
    content: racontez parmi tous les peuples ses actes étonnants !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 48.2+ ; 95.3+ ; 97.9 ; 99.2 ; 145.3.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand et digne de toute louange :'
  - type: text
    content: il est redoutable, plus que tous les dieux ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'des faux dieux  : hébreu ’élilim (Es 2.8n), qui fait assonance avec ’élohim = dieu(x)  ; cf. Lv 19.4n  ; Ps 97.7n  ; 115.4ss ; 1Co 8.4ss ; LXX des démons  ; cf. 1Co 10.20 ; Ap 9.20. –  a fait le ciel 8.4 ; 121.2 ; Gn 1.1,6ss.'
  - type: text
    content: car tous les dieux des peuples sont des faux dieux,
  - type: text
    content: 'mais c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui a fait le ciel.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 89.15 ; 104.1 ; 111.3. –  puissance / splendeur  : cf. 78.61n.'
  - type: text
    content: L'éclat et la magnificence sont devant lui,
  - type: text
    content: la puissance et la splendeur sont dans son sanctuaire.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Clans des peuples  : cf. 22.28n. –  donnez au Seigneur … 29.1s.'
  - type: text
    content: 'Clans des peuples, donnez au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'donnez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' gloire et puissance !'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'des offrandes  : le terme hébreu est au singulier, sans doute collectif ; cf. 68.30 ; 76.12 ; Es 60.6ss. Voir sacrifices. –  les cours de son temple  : litt. ses cours.'
  - type: text
    content: 'Donnez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' la gloire de son nom !'
  - type: text
    content: Apportez des offrandes, entrez dans les cours de son temple !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Prosternez-vous 95.6 ; 99.9. –  quand éclate sa sainteté  : cf. 29.2n. –  Tremble devant lui (litt. devant sa face ) : cf. 55.5 ; 77.17 ; 97.4 ; 110.3n  ; 114.7.'
  - type: text
    content: 'Prosternez-vous devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' quand éclate sa sainteté.'
  - type: text
    content: Tremble devant lui, terre entière !
