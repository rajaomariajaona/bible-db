document_id: HEB.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus et Moïse
  - type: text
    content: ' '
  - type: note
    content: 'Voir saints . –  qui avez part…  : litt. qui êtes participants (ou compagnons  ; même terme en 1.9 ; expressions analogues v. 14 ; 6.4 ; 12.8) ; un verbe apparenté est traduit par partager en 2.14 ; en être à en 5.13 ; appartenir en 7.13 ; voir aussi 1Co 9.10n. –  appel (ou vocation ) céleste  : cf. 9.15 ; Ph 3.14. –  celui que nous reconnaissons…  : litt. l’ apôtre (ou l''envoyé ) et le grand prêtre (2.17+) de notre (acte de) reconnaissance ou confession  ; même terme en 4.14 ; 10.23 ; verbe apparenté en 11.13 ; 13.15 ; cf. 12.2 ; 1P 1.21.'
  - type: text
    content: 'Aussi, frères saints qui avez part à un appel céleste, considérez Jésus, celui que nous reconnaissons publiquement comme apôtre et grand prêtre. '
  '10':
  - type: note
    content: 'Voir génération. –  ils ne connaissent pas  : litt. ils n''ont pas connu  ; autre traduction ils n''ont pas compris.'
  - type: text
    content: pendant quarante ans
  - type: text
    content: .
  - type: text
    content: C'est pourquoi je fus indigné contre cette génération
  - type: text
    content: 'et je dis : Leur cœur s''égare toujours,'
  - type: text
    content: et ils ne connaissent pas mes voies
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Nb 14.21-23. –  En aucun cas ils n''entreront…  : litt. s''ils entrent… , le texte grec calque une formule de serment elliptique de l''hébreu, qui sous-entend approximativement  : que je sois maudit s''ils entrent… (cf. 1S 14.44 ; 25.22) ; voir cependant Hé 4.1,3,5. –  repos  : autre traduction lieu de repos  ; même possibilité dans la suite.'
  - type: text
    content: 'J''ai donc juré dans ma colère :'
  - type: text
    content: En aucun cas ils n'entreront dans mon repos !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'un cœur mauvais  : cf. v. 8 ; 10.22 ; 12.15 ; Jr 16.12 ; 18.12. –  qui manque de foi  : autres traductions qui refuse de croire, infidèle  ; cf. Nb 14.9,11 ; Dt 1.28,32 ; Ps 106.24. –  s''éloigne  : c''est du substantif grec correspondant au verbe utilisé ici que vient notre mot apostasie (cf. Lc 8.13n  ; 1Tm 4.1n  ; 2Th 2.3+).'
  - type: text
    content: 'Prenez donc garde, frères, que personne parmi vous n''ait un cœur mauvais qui manque de foi et s''éloigne du Dieu vivant. '
  '13':
  - type: note
    content: 'encouragez-vous  : autre traduction exhortez-vous  ; 10.25 ; 13.19,22 ; terme apparenté en 6.18 ; 12.5 ; cf. 1Th 5.11+. –  qu''on peut dire…  : litt. que l''aujourd''hui (v. 7) est appelé ou proclamé  ; cf. 1.5+ ; 4.7 ; 5.5 ; 2Co 6.1s. –  ne s''obstine  : litt. ne s''endurcisse v. 8n. –  attrait trompeur du péché Mc 4.19+ ; Rm 7.11 ; 2Th 2.10.'
  - type: text
    content: 'Au contraire, encouragez-vous mutuellement chaque jour, aussi longtemps qu''on peut dire « Aujourd''hui », pour qu''aucun de vous ne s''obstine à cause de l''attrait trompeur du péché. '
  '14':
  - type: note
    content: 'nous avons part…  : autre traduction nous sommes devenus les compagnons du Christ, cf. v. 1n  ; 1.9 ; 6.4. –  si du moins…  : cf. Rm 11.22 ; Ph 3.12. –  la réalité du commencement  : litt. le commencement de la réalité (comme en 1.3n) ; autre traduction possible notre disposition première (cf. v. 6).'
  - type: text
    content: 'Car nous avons part au Christ, si du moins nous restons fermement attachés, jusqu''à la fin, à la réalité du commencement, '
  '15':
  - type: note
    content: V. 7s.
  - type: text
    content: 'pendant qu''il est dit :'
  - type: text
    content: Aujourd'hui, si vous entendez sa voix,
  - type: text
    content: ne vous obstinez pas, comme lors de la révolte
  - type: text
    content: .
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ex 17.1-7.
  - type: text
    content: 'Qui, en effet, provoqua l''amertume après avoir entendu ? N''est-ce pas tous ceux qui étaient sortis d''Egypte sous la conduite de Moïse ? '
  '17':
  - type: note
    content: V. 10 ; Nb 14.29,32 ; 1Co 10.5.
  - type: text
    content: 'Et contre qui fut-il indigné quarante ans durant ? N''est-ce pas contre ceux qui péchèrent et dont les cadavres tombèrent dans le désert ? '
  '18':
  - type: note
    content: 'V. 11 ; cf. Dt 1.26. –  à ceux qui avaient refusé d''obéir  : autres traductions à ceux qui n''avaient pas eu confiance (cf. 2.13), aux réfractaires (11.31) ; cf. 4.6,11.'
  - type: text
    content: 'Et à qui jura-t-il qu''ils n''entreraient pas dans son repos ? N''est-ce pas à ceux qui avaient refusé d''obéir ? '
  '19':
  - type: note
    content: ils ne purent entrer Nb 14.39-45 ; Dt 1.41-45. –  manque de foi v. 12+ ; 4.6.
  - type: text
    content: Nous voyons bien qu'ils ne purent entrer à cause de leur manque de foi.
  '2':
  - type: note
    content: 'digne de la confiance… 2.17n. –  qui l''a nommé ou choisi, litt. qui l''a fait (Mc 3.14n  ; cf. Es 17.7n  ; Ps 149.2). –  dans toute sa maison  : certains mss portent seulement dans sa maison  ; v. 5 ; Nb 12.7.'
  - type: text
    content: 'Il a été digne de la confiance de celui qui l''a nommé, comme Moïse l''a été dans toute sa maison. '
  '3':
  - type: note
    content: 'une gloire plus grande que celle de Moïse 8.6 ; 2Co 3.7-11. –  celui qui bâtit une maison  : litt. celui qui a bâti la maison  ; le verbe traduit ici et au v. 4 par bâtir (aussi 11.7) est traduit par installer en 9.2,6 ; cf. 2S 7.13.'
  - type: text
    content: 'En fait, il a été jugé digne d''une gloire plus grande que celle de Moïse, dans la mesure où celui qui bâtit une maison a plus d''honneur que la maison elle-même. '
  '4':
  - type: note
    content: Cf. 1.10 ; Es 40.28.
  - type: text
    content: 'Toute maison, en effet, est bâtie par quelqu''un ; or celui qui a tout bâti, c''est Dieu. '
  '5':
  - type: note
    content: 'V. 2 ; Nb 12.7. –  serviteur  : le mot grec correspondant n''apparaît qu''ici dans le N.T. ; cf. Jos 1.2 (même terme dans LXX). –  pour rendre témoignage…  : autre traduction pour un témoignage, (c''est-à-dire) pour ce qui allait être dit (par lui-même ? par un autre ?).'
  - type: text
    content: 'Pour ce qui est de '
  - type: text
    content: Moïse,
  - type: text
    content: ' il '
  - type: text
    content: a été digne de confiance dans toute sa maison comme serviteur,
  - type: text
    content: ' pour rendre témoignage à ce qui allait être dit. '
  '6':
  - type: note
    content: 'comme Fils 1.2+ ; 1Ch 17.12s ; Jn 8.35. –  sur (et non dans, v. 5) sa maison 10.21. –  sa maison, c''est nous Ep 1.19-22 ; 1Tm 3.15 ; 1P 2.5. –  si nous conservons  : certains mss ajoutent ferme, jusqu''à la fin, comme au v. 14 ; cf. 6.18+ ; 10.23 ; Rm 5.2 ; Col 1.23. –  l''assurance 4.16 ; 10.19,35 ; Ac 2.29n  ; 1Jn 3.21. –  fiers  : cf. Rm 2.17n.'
  - type: text
    content: Mais le Christ l'est comme Fils, sur sa maison. Or sa maison, c'est nous, si nous conservons l'assurance et l'espérance dont nous sommes fiers.
  - type: heading
    content: Mise en garde contre l'infidélité
  '7':
  - type: text
    content: ' '
  - type: note
    content: l'Esprit saint 2.4+ ; 9.8 ; 10.15. –  Aujourd'hui… Ps 95.7n-11.
  - type: text
    content: 'Aussi, comme dit l''Esprit saint :'
  - type: text
    content: Aujourd'hui, si vous entendez sa voix,
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ne vous obstinez pas  : litt. n''endurcissez pas vos cœurs , de même 3.15 ; 4.7. – Dans LXX, les noms communs révolte (ou provocation ) et épreuve (ou tentation , cf. 2.18n) traduisent les noms de lieux Meriba et Massa qui apparaissent dans le texte hébreu de Ps 95.8 ; cf. Ex 17.7.'
  - type: text
    content: ne vous obstinez pas, comme lors de la révolte,
  - type: text
    content: au jour de l'épreuve dans le désert,
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'une épreuve ou un test, un examen  ; le terme correspondant n''apparaît qu''ici dans le N.T. ; un mot apparenté est traduit par s''avérer sans valeur en 6.8 ; sur la famille de termes correspondante, voir Rm 1.28n. –  et ils virent mes œuvres  : dans le psaume (95.9), cette expression est rattachée à ce qui précède  : vos pères me provoquèrent (ou me mirent à l''épreuve, me tentèrent , cf. Dt 6.16) … bien qu''ils aient vu mes œuvres (les miracles de l''Exode). Ici elle semble plutôt se rapporter au châtiment des quarante ans (v. 17 ; cf. Nb 14.32-34).'
  - type: text
    content: où vos pères me provoquèrent dans une épreuve
  - type: text
    content: — et ils virent mes œuvres
  - type: text
    content: ' '
