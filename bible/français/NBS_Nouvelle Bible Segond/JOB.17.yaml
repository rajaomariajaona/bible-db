document_id: JOB.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job (suite) : je n''ai plus d''espoir'
  - type: text
    content: ' '
  - type: note
    content: 'souffle  : autre traduction esprit . –  je suis bon pour la tombe  : litt. (ce sont les) tombes pour moi  ; cf. Es 38.10 ; Ps 88.4-6.'
  - type: text
    content: Mon souffle se perd,
  - type: text
    content: mes jours s'éteignent,
  - type: text
    content: je suis bon pour la tombe.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Vous tous , d'après quelques mss. Autre texte eux tous . –  pas un seul sage 13.5,12 ; 18.3.
  - type: text
    content: Vous tous, recommencez ! Venez, je vous prie !
  - type: text
    content: Je ne trouverai pas un seul sage parmi vous !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'désirs  : litt. possessions.'
  - type: text
    content: Mes jours sont passés, mes projets sont anéantis,
  - type: text
    content: les désirs de mon cœur…
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'ils prétendent…  : litt. ils mettent nuit pour jour  ; cf. 11.17+. –  ténèbres 19.8+.'
  - type: text
    content: Et ils prétendent que la nuit c'est le jour,
  - type: text
    content: que la lumière est proche quand les ténèbres sont là !
  '13':
  - type: text
    content: ' '
  - type: note
    content: Voir séjour des morts.
  - type: text
    content: La maison que j'espère, n'est-ce pas le séjour des morts ?
  - type: text
    content: C'est dans les ténèbres que je ferai mon lit ;
  '14':
  - type: text
    content: 'je crie à la fosse : « Tu es mon père ! »'
  - type: text
    content: '– à la vermine : « Ma mère, ma sœur ! »'
  '15':
  - type: text
    content: ' '
  - type: note
    content: espoir 13.15+. Au deuxième vers LXX a traduit verrai-je mon bonheur ? ce qui pourrait correspondre à un autre terme féminin en hébreu (cf. v. 16n).
  - type: text
    content: Mon espoir, où donc est-il ?
  - type: text
    content: Mon espoir, qui peut l'apercevoir ?
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Il descendra  : le texte hébreu traditionnel porte le pluriel (cf. v. 15n). –  poussière 20.11.'
  - type: text
    content: Il descendra vers les barreaux du séjour des morts,
  - type: text
    content: quand nous irons ensemble reposer dans la poussière.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Leurs insultes…  : litt. dans leurs insultes mon œil passe la nuit (ou loge , 19.4n) ; le mot correspondant à leurs insultes a une forme inhabituelle en hébreu ; certains modifient le texte hébreu traditionnel pour lire des amertumes.'
  - type: text
    content: N'y a-t-il pas des moqueurs autour de moi ?
  - type: text
    content: Leurs insultes ne me laissent pas fermer l'œil.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Je t''en prie, sois mon garant Ps 119.122. –  qui… prendrait des engagements pour moi  : litt. qui topera dans ma main , pour conclure un accord ; certains modifient la vocalisation traditionnelle du texte hébreu pour lire accepte mon gage  ; cf. Gn 38.17ss ; Ex 22.26 ; Dt 24.6,17 ; Né 5.3 ; voir aussi Pr 6.1 ; 9.15 ; 17.18 ; 22.26 ; Siracide 29.14ss : « L''homme de bien se porte caution pour son prochain, mais celui qui a perdu toute vergogne l''abandonne. N''oublie pas les bienfaits de ton garant : aussi bien il s''est exposé pour toi. Le pécheur dilapide les biens de son garant et l''ingrat de nature abandonne celui qui l''a sauvé. Une caution a perdu bien des gens prospères et les a désemparés comme les vagues de la mer. Elle a contraint des gens puissants à s''expatrier et les a fait errer parmi les nations étrangères. Quand un pécheur se précipite pour cautionner, s''il escompte un profit, il va au-devant de poursuites. Viens en aide au prochain dans la mesure de tes moyens, mais prends garde à ne pas te laisser prendre. »'
  - type: text
    content: Je t'en prie, sois mon garant auprès de toi-même ;
  - type: text
    content: qui d'autre prendrait des engagements pour moi ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: '18.3 ; 42.7s. – Voir cœur. –  tu ne les élèveras pas  : autre traduction tu ne les laisseras pas s''élever.'
  - type: text
    content: Puisque tu as fermé leur cœur au bon sens,
  - type: text
    content: tu ne les élèveras pas.
  '5':
  - type: text
    content: ' '
  - type: note
    content: les yeux de ses propres fils s'épuisent 11.20+ ; cf. Jr 14.6.
  - type: text
    content: Tel invite des amis au partage,
  - type: text
    content: alors que les yeux de ses propres fils s'épuisent.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Il m''avait placé…  : des versions anciennes ont lu il a fait de moi la fable des peuples , ce qui correspondrait à une autre vocalisation du même texte hébreu ; cf. Dt 28.37 ; Jr 14.9 ; Ez 14.8n. –  celui à qui l''on crache au visage  : litt. crachat ( ? hébreu topheth , comme en 2R 23.10 ; Jr 7.31n) au visage . Certains comprennent un exemple de déchéance publique . Cf. 12.4+ ; 30.9.'
  - type: text
    content: Il m'avait placé pour chef des peuples,
  - type: text
    content: je suis devenu celui à qui l'on crache au visage.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'tout mon corps  : litt. tous mes membres . Certains modifient le texte hébreu traditionnel, d''après Syr, pour lire toutes mes pensées.'
  - type: text
    content: Mon œil est affaibli par la contrariété ;
  - type: text
    content: tout mon corps est comme une ombre.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 52.15. –  atterrés ou stupéfaits Lv 26.32n. –  se soulève  : litt. s''éveille.'
  - type: text
    content: Les gens droits en sont atterrés,
  - type: text
    content: et l'innocent se soulève contre l'impie.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 27.6+. – Voir justice et pur.
  - type: text
    content: Le juste demeure ferme dans sa voie.
  - type: text
    content: Les mains pures sont de plus en plus fortes.
