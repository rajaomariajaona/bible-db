      - type: text
        text: '29.14ss : « L''homme de bien se porte caution pour son prochain, mais celui qui a perdu toute vergogne l''abandonne. N''oublie pas les bienfaits de ton garant : aussi bien il s''est exposé pour toi. Le pécheur dilapide les biens de son garant et l''ingrat de nature abandonne celui qui l''a sauvé. Une caution a perdu bien des gens prospères et les a désemparés comme les vagues de la mer. Elle a contraint des gens puissants à s''expatrier et les a fait errer parmi les nations étrangères. Quand un pécheur se précipite pour cautionner, s''il escompte un profit, il va au-devant de poursuites. Viens en aide au prochain dans la mesure de tes moyens, mais prends garde à ne pas te laisser prendre. »'
