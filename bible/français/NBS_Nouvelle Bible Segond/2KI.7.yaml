document_id: 2KI.7,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'séa (s)  : voir mesures.'
  - type: text
    content: 'Elisée dit : Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Demain, à cette heure-ci, on aura un séa de fleur de farine pour un sicle et deux séas d''orge pour un sicle à la porte de Samarie. '
  '10':
  - type: note
    content: 'un garde de la porte de la ville  : LXX, Vg une porte de la ville.'
  - type: text
    content: 'Ils allèrent appeler un garde de la porte de la ville, auquel ils firent ce rapport : Nous sommes entrés dans le camp des Araméens : il n''y a plus personne, on n''y entend aucune voix d''homme ; il n''y a que des chevaux attachés et des ânes attachés, et les tentes telles quelles. '
  '11':
  - type: text
    content: 'On appela les gardes de la porte qui firent ce rapport à l''intérieur de la maison du roi. '
  '12':
  - type: note
    content: 'en pleine nuit  : ce détail est omis par LXX.'
  - type: text
    content: 'Le roi se leva en pleine nuit ; il dit aux gens de sa cour : Laissez-moi vous dire, je vous prie, ce que nous font les Araméens. Comme ils savent que nous sommes affamés, ils ont quitté le camp pour se cacher dans la campagne, se disant : « Quand ils sortiront de la ville, nous les prendrons vivants et nous entrerons dans la ville ! » '
  '13':
  - type: note
    content: 'qui est restée, ils sont comme toute la multitude d''Israël  : cette portion de texte est absente de plusieurs mss hébreux ; LXX, Vg et Syr n''ont pas non plus la répétition. Il faut sans doute comprendre que des chevaux parvenus à ce point d''épuisement ne sauraient constituer une très grande perte. Comme pour les « lépreux », c''est un geste désespéré qui va faire apparaître la réalité du salut.'
  - type: text
    content: 'Parmi les gens de la cour, quelqu''un répondit : Je t''en prie, que l''on prenne cinq des chevaux qui restent dans la ville, – ils sont comme toute la multitude d''Israël qui est restée, ils sont comme toute la multitude d''Israël qui est épuisée. Envoyons-les, et nous verrons. '
  '14':
  - type: note
    content: 'deux chars  : LXX deux cavaliers. –  des messagers  : sous-entendu dans le texte.'
  - type: text
    content: 'On prit deux chars avec les chevaux, et le roi envoya des messagers à la poursuite des troupes d''Aram, en disant : Allez voir ! '
  '15':
  - type: text
    content: 'Ils les poursuivirent jusqu''au Jourdain : tout le chemin était plein de vêtements et d''objets que les Araméens avaient jetés dans leur précipitation. Les messagers revinrent rapporter au roi ce qu''ils avaient vu.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 1 ; voir aussi 19.35ss. –  séa… sicle  : voir mesures, poids et monnaies.'
  - type: text
    content: 'Le peuple sortit et pilla le camp des Araméens. C''est alors que l''on eut un séa de fleur de farine pour un sicle et deux séas d''orge pour un sicle, selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'qui se pressait  : sous-entendu dans le texte, de même au v. 20. –  il mourut  : l''officier qui doutait (v. 2) meurt sans avoir pu se rassasier à l''endroit même où les « lépreux » pensaient qu''ils allaient mourir (v. 3). –  quand le roi…  : LXX quand le messager…'
  - type: text
    content: 'Le roi avait affecté à la garde de la porte l''écuyer sur la main duquel il s''appuyait ; celui-ci fut piétiné par le peuple qui se pressait à la porte, et il mourut, selon la parole qu''avait prononcée l''homme de Dieu quand le roi était descendu vers lui. '
  '18':
  - type: text
    content: 'L''homme de Dieu avait dit alors au roi : On aura deux séas d''orge pour un sicle et un séa de fleur de farine pour un sicle, demain, à cette heure-ci, à la porte de Samarie. '
  '19':
  - type: note
    content: 'l''homme de Dieu  : cf. v. 2n.'
  - type: text
    content: 'Or l''écuyer avait répondu à l''homme de Dieu : Certes, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait des fenêtres au ciel, mais pareille chose pourrait-elle se produire ? Alors Elisée avait répliqué : Tu le verras de tes yeux, mais tu n''en mangeras pas. '
  '2':
  - type: note
    content: 'L''écuyer  : litt. le troisième, c.-à-d. le troisième homme à monter sur le char du roi après le roi et son cocher. Cet homme joue auprès du roi d''Israël un rôle qui rappelle celui de Naaman aux côtés du roi d''Aram, cf. 5.18. –  à l''homme de Dieu  : LXX dit à Elisée, de même au v. 19. –  des fenêtres au ciel  : le mot hébreu désigne généralement un simple trou dans le toit par où s''évacue la fumée d''un foyer (Os 13.3), mais ici (comme en Gn 7.11n  ; Ml 3.10, voire dans le poème ougaritique intitulé « Le palais de Baal ») il s''agit des ouvertures pratiquées dans le firmament pour laisser passer la pluie.'
  - type: text
    content: 'L''écuyer du roi sur la main duquel il s''appuyait répondit à l''homme de Dieu : Certes, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait des fenêtres au ciel, mais cela pourrait-il se produire ? Elisée répliqua : Tu le verras de tes yeux ; mais tu n''en mangeras pas.'
  - type: heading
    content: Le camp araméen abandonné
  '20':
  - type: text
    content: 'C''est en effet ce qui lui arriva : il fut piétiné par le peuple qui se pressait à la porte, et il mourut.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'quatre « lépreux »  : sur la « lèpre » dans la Bible, voir 5.1n  ; Lv 13.2n. –  resterions-nous  : autre traduction resterions-nous assis . –  à attendre…  : litt. jusqu''à ce que nous mourions.'
  - type: text
    content: 'Il y avait quatre « lépreux » à l''entrée de la porte de la ville ; ils se dirent l''un à l''autre : Pourquoi resterions-nous ici à attendre la mort ? '
  '4':
  - type: note
    content: 'Allons donc nous livrer (litt. tomber) : cf. Jr 21.9.'
  - type: text
    content: 'Si nous disons : Entrons dans la ville, comme la famine est dans la ville, nous y mourrons ; si nous restons ici, nous mourrons également. Allons donc nous livrer au camp des Araméens ; s''ils nous laissent vivre, nous vivrons ; s''ils nous font mettre à mort, nous mourrons. '
  '5':
  - type: note
    content: 'au crépuscule  : LXX dans les ténèbres  ; de même au v. 7.'
  - type: text
    content: 'Ils se levèrent donc au crépuscule, pour se rendre au camp des Araméens ; et lorsqu''ils arrivèrent à la limite du camp des Araméens, il n''y avait plus personne. '
  '6':
  - type: note
    content: 'Le Seigneur  : plusieurs mss portent YHWH (le Seigneur). –  un bruit de chars et un bruit de chevaux  : cf. 2.12n. –  Hittites  : cf. 1R 10.29. –  de l''Egypte  : certains modifient le texte hébreu traditionnel pour lire des Moutsrites (nom d''un peuple de Cilicie, en Asie Mineure).'
  - type: text
    content: 'Le Seigneur avait fait entendre dans le camp des Araméens un bruit de chars et un bruit de chevaux, le bruit d''une grande armée, et ils s''étaient dit l''un à l''autre : Le roi d''Israël a engagé contre nous les rois des Hittites et les rois de l''Egypte, pour venir contre nous. '
  '7':
  - type: note
    content: 'au crépuscule v. 5n. –  le camp tel qu''il était  : LXX, Vg dans le camp tel qu''il était.'
  - type: text
    content: 'Ils se levèrent et s''enfuirent au crépuscule, abandonnant leurs tentes, leur chevaux et leurs ânes, le camp tel qu''il était ; ils s''enfuirent pour sauver leur vie. '
  '8':
  - type: note
    content: 'd''autres objets  : sous-entendu dans le texte ; un ms de Qumrân précise  : ils emportèrent des charges qu''ils allèrent cacher, le premier mouvement des « lépreux » est de piller le camp plutôt que de prévenir leurs concitoyens de la fin du siège.'
  - type: text
    content: Les « lépreux », arrivés à la limite du camp, pénétrèrent dans une tente, mangèrent et burent. Ils emportèrent de l'argent, de l'or et des vêtements qu'ils allèrent cacher. Ils revinrent, pénétrèrent dans une autre tente et emportèrent d'autres objets qu'ils allèrent cacher.
  - type: heading
    content: Samarie est délivrée
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'un jour de bonne nouvelle  : LXX utilise ici le terme qui a donné évangile . –  si nous nous taisons  : cf. 2.3ss ; autre traduction possible si nous hésitons (cf. Jg 18.9). –  l''aube  : litt. la lumière du matin . –  le châtiment  : autre traduction la faute . –  nous atteindra  : litt. nous trouvera.'
  - type: text
    content: 'Puis ils se dirent l''un à l''autre : Nous n''agissons pas comme il faut. Ce jour est un jour de bonne nouvelle ; si nous nous taisons et si nous attendons jusqu''à l''aube, le châtiment nous atteindra. Venez maintenant, allons faire un rapport à la maison du roi. '
