      children:
      - type: text
        text: resterions-nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: resterions-nous assis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à attendre…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'à ce que nous mourions.
    marker-yv: yv-n
  - type: text
    text: 'Il y avait quatre « lépreux » à l''entrée de la porte de la ville ; ils se dirent l''un à l''autre : Pourquoi resterions-nous ici à attendre la mort ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Allons donc nous livrer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tomber
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : cf. Jr 21.9.'
    marker-yv: yv-n
  - type: text
    text: 'Si nous disons : Entrons dans la ville, comme la famine est dans la ville, nous y mourrons ; si nous restons ici, nous mourrons également. Allons donc nous livrer au camp des Araméens ; s''ils nous laissent vivre, nous vivrons ; s''ils nous font mettre à mort, nous mourrons. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au crépuscule
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans les ténèbres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même au v. 7.'
    marker-yv: yv-n
  - type: text
    text: 'Ils se levèrent donc au crépuscule, pour se rendre au camp des Araméens ; et lorsqu''ils arrivèrent à la limite du camp des Araméens, il n''y avait plus personne. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : plusieurs mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'YHWH '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un bruit de chars et un bruit de chevaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hittites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 10.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de l'Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des Moutsrites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (nom d'un peuple de Cilicie, en Asie Mineure).
    marker-yv: yv-n
  - type: text
    text: 'Le Seigneur avait fait entendre dans le camp des Araméens un bruit de chars et un bruit de chevaux, le bruit d''une grande armée, et ils s''étaient dit l''un à l''autre : Le roi d''Israël a engagé contre nous les rois des Hittites et les rois de l''Egypte, pour venir contre nous. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au crépuscule '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le camp tel qu'il était
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans le camp tel qu'il était.
    marker-yv: yv-n
  - type: text
    text: 'Ils se levèrent et s''enfuirent au crépuscule, abandonnant leurs tentes, leur chevaux et leurs ânes, le camp tel qu''il était ; ils s''enfuirent pour sauver leur vie. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'autres objets
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte ; un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ' précise'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils emportèrent des charges qu'ils allèrent cacher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', le premier mouvement des « lépreux » est de piller le camp plutôt que de prévenir leurs concitoyens de la fin du siège.'
    marker-yv: yv-n
  - type: text
    text: Les « lépreux », arrivés à la limite du camp, pénétrèrent dans une tente, mangèrent et burent. Ils emportèrent de l'argent, de l'or et des vêtements qu'ils allèrent cacher. Ils revinrent, pénétrèrent dans une autre tente et emportèrent d'autres objets qu'ils allèrent cacher.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samarie est délivrée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un jour de bonne nouvelle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' utilise ici le terme qui a donné '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: évangile
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: si nous nous taisons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2.3ss ; autre traduction possible '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'si nous hésitons '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Jg 18.9). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'aube
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la lumière du matin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le châtiment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la faute
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous atteindra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous trouvera.
    marker-yv: yv-n
  - type: text
    text: 'Puis ils se dirent l''un à l''autre : Nous n''agissons pas comme il faut. Ce jour est un jour de bonne nouvelle ; si nous nous taisons et si nous attendons jusqu''à l''aube, le châtiment nous atteindra. Venez maintenant, allons faire un rapport à la maison du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un garde de la porte de la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une porte de la ville.
    marker-yv: yv-n
  - type: text
    text: 'Ils allèrent appeler un garde de la porte de la ville, auquel ils firent ce rapport : Nous sommes entrés dans le camp des Araméens : il n''y a plus personne, on n''y entend aucune voix d''homme ; il n''y a que des chevaux attachés et des ânes attachés, et les tentes telles quelles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On appela les gardes de la porte qui firent ce rapport à l''intérieur de la maison du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en pleine nuit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce détail est omis par LXX.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi se leva en pleine nuit ; il dit aux gens de sa cour : Laissez-moi vous dire, je vous prie, ce que nous font les Araméens. Comme ils savent que nous sommes affamés, ils ont quitté le camp pour se cacher dans la campagne, se disant : « Quand ils sortiront de la ville, nous les prendrons vivants et nous entrerons dans la ville ! » '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui est restée, ils sont comme toute la multitude d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette portion de texte est absente de plusieurs mss hébreux ; LXX, Vg et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' n''ont pas non plus la répétition. Il faut sans doute comprendre que des chevaux parvenus à ce point d''épuisement ne sauraient constituer une très grande perte. Comme pour les « lépreux », c''est un geste désespéré qui va faire apparaître la réalité du salut.'
    marker-yv: yv-n
  - type: text
    text: 'Parmi les gens de la cour, quelqu''un répondit : Je t''en prie, que l''on prenne cinq des chevaux qui restent dans la ville, – ils sont comme toute la multitude d''Israël qui est restée, ils sont comme toute la multitude d''Israël qui est épuisée. Envoyons-les, et nous verrons. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux chars
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: deux cavaliers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des messagers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'On prit deux chars avec les chevaux, et le roi envoya des messagers à la poursuite des troupes d''Aram, en disant : Allez voir ! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils les poursuivirent jusqu''au Jourdain : tout le chemin était plein de vêtements et d''objets que les Araméens avaient jetés dans leur précipitation. Les messagers revinrent rapporter au roi ce qu''ils avaient vu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 1 ; voir aussi 19.35ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: séa… sicle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'Le peuple sortit et pilla le camp des Araméens. C''est alors que l''on eut un séa de fleur de farine pour un sicle et deux séas d''orge pour un sicle, selon la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui se pressait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte, de même au v. 20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il mourut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''officier qui doutait (v. 2) meurt sans avoir pu se rassasier à l''endroit même où les « lépreux » pensaient qu''ils allaient mourir (v. 3). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quand le roi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand le messager…
    marker-yv: yv-n
  - type: text
    text: 'Le roi avait affecté à la garde de la porte l''écuyer sur la main duquel il s''appuyait ; celui-ci fut piétiné par le peuple qui se pressait à la porte, et il mourut, selon la parole qu''avait prononcée l''homme de Dieu quand le roi était descendu vers lui. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L''homme de Dieu avait dit alors au roi : On aura deux séas d''orge pour un sicle et un séa de fleur de farine pour un sicle, demain, à cette heure-ci, à la porte de Samarie. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'homme de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Or l''écuyer avait répondu à l''homme de Dieu : Certes, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fait des fenêtres au ciel, mais pareille chose pourrait-elle se produire ? Alors Elisée avait répliqué : Tu le verras de tes yeux, mais tu n''en mangeras pas. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C''est en effet ce qui lui arriva : il fut piétiné par le peuple qui se pressait à la porte, et il mourut.'
