  - type: text
    text: 'Elisée dit : Ecoutez la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Demain, à cette heure-ci, on aura un séa de fleur de farine pour un sicle et deux séas d''orge pour un sicle à la porte de Samarie. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: L'écuyer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le troisième
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. le troisième homme à monter sur le char du roi après le roi et son cocher. Cet homme joue auprès du roi d''Israël un rôle qui rappelle celui de Naaman aux côtés du roi d''Aram, cf. 5.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à l'homme de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' dit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à Elisée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des fenêtres au ciel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu désigne généralement un simple trou dans le toit par où s''évacue la fumée d''un foyer (Os 13.3), mais ici (comme en Gn 7.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ml 3.10, voire dans le poème '
      - type: usfm
        marker: w
        children:
        - type: text
          text: ougaritique
      - type: text
        text: ' intitulé « Le palais de Baal ») il s''agit des ouvertures pratiquées dans le firmament pour laisser passer la pluie.'
    marker-yv: yv-n
  - type: text
    text: 'L''écuyer du roi sur la main duquel il s''appuyait répondit à l''homme de Dieu : Certes, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fait des fenêtres au ciel, mais cela pourrait-il se produire ? Elisée répliqua : Tu le verras de tes yeux ; mais tu n''en mangeras pas.'
- type: usfm
  marker: s1
