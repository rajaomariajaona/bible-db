    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans la partie la plus élevée des monts de Judée, à environ 35 km au sud-ouest de Jérusalem. La ville moderne construite autour du site de l''ancienne Hébron est appelée El-Khalil ou Halil ('
