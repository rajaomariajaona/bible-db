document_id: GEN.13,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 12.9ss. –  monta 12.10n.
  - type: text
    content: Abram monta d'Egypte vers le Néguev, lui, sa femme et tout ce qui lui appartenait. Loth l'accompagnait.
  - type: heading
    content: Abram et Loth se séparent
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le district  : le terme hébreu correspondant ( kikkar ), qui évoque un cercle (peut-être à la manière de notre mot circonscription ), désigne spécialement (v. 12 ; 19.17ss ; Dt 34.3 ; cf. Né 3.22n) le bassin de la mer Morte, à partir de Jéricho. –  entièrement irrigué  : autre traduction bien arrosé  ; cf. Ez 45.15n. –  Sodome / Gomorrhe 10.19n. –  le (ou un ) jardin du Seigneur  : cf. 2.8 ; 3.8 ; Es 51.3 ; Ez 28.13 ; 31.9. –  Egypte 12.10.'
  - type: text
    content: 'Loth leva les yeux et vit tout le district du Jourdain, qui était entièrement irrigué. Avant que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' anéantisse Sodome et Gomorrhe, c''était comme le jardin du '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme l''Egypte, jusque vers Tsoar. '
  '11':
  - type: text
    content: 'Loth choisit donc pour lui tout le district du Jourdain et partit vers l''est. C''est ainsi qu''ils se séparèrent l''un de l''autre. '
  '12':
  - type: note
    content: 'déplaça ses tentes…  : autres traductions dressa ses tentes (ou sa tente) à (ou vers) Sodome ; obtint un droit de pâture (pour ses troupeaux) vers Sodome  ; même verbe au v. 18 ; autre forme en Es 13.20.'
  - type: text
    content: 'Abram s''installa en Canaan ; Loth s''installa dans les villes du District et déplaça ses tentes jusqu''à Sodome. '
  '13':
  - type: note
    content: 18.20 ; Ez 16.49. – Voir péché.
  - type: text
    content: 'Les gens de Sodome étaient très mauvais et pécheurs envers le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'le sud  : le même mot hébreu a été transcrit Néguev aux v. 1,3 et en 12.9n. –  ouest 12.8n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Abram, après que Loth se fut séparé de lui : Lève les yeux, je te prie, et regarde, depuis le lieu où tu es, vers le nord, vers le sud, vers l''est et vers l''ouest ; '
  '15':
  - type: note
    content: 12.7+ ; cf. Mt 5.5.
  - type: text
    content: 'tout le pays que tu vois, je te le donnerai, à toi et à ta descendance, pour toujours. '
  '16':
  - type: note
    content: Litt. Je rendrai ta descendance comme la poussière de la terre (ou du pays)… Cf. 15.5 ; 17.4-6 ; 22.17.
  - type: text
    content: 'Je rendrai ta descendance aussi nombreuse que les grains de poussière de la terre : si l''on pouvait compter les grains de poussière de la terre, alors on pourrait aussi compter ta descendance. '
  '17':
  - type: note
    content: 'Hé 11.9. –  Parcours  : litt. lève-toi, parcours.'
  - type: text
    content: 'Parcours le pays en long et en large : je te le donnerai. '
  '18':
  - type: note
    content: 'D''après 14.13,24, Mamré (LXX, Vg Mambré) est le nom du propriétaire du térébinthe (selon des versions anciennes) ou des térébinthes (selon l''hébreu) ; mais c''est aussi le nom de la localité, peut-être juste au nord d''Hébron (23.17,19 ; 25.9 ; 49.30 ; 50.13). –  Hébron  : dans la partie la plus élevée des monts de Judée, à environ 35 km au sud-ouest de Jérusalem. La ville moderne construite autour du site de l''ancienne Hébron est appelée El-Khalil ou Halil (l''ami [de Dieu], par référence à Abraham, cf. Es 41.8 ; 2Ch 20.7 ; Jc 2.23). Mais le nom même d''Hébron pourrait être interprété au sens de compagnon, ami.'
  - type: text
    content: 'Abram déplaça ses tentes ; il vint s''installer aux térébinthes de Mamré, à Hébron. Il bâtit là un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'riche  : litt. lourd (même terme en 12.10, peser ). Cf. Ps 112.3.'
  - type: text
    content: 'Abram était très riche en troupeaux, en argent et en or. '
  '3':
  - type: text
    content: 'Il se rendit par étapes du Néguev jusqu''à Beth-El, jusqu''au lieu où avait d''abord été sa tente, entre Beth-El et le Aï, '
  '4':
  - type: note
    content: 12.8. –  invoqua le nom… 4.26+.
  - type: text
    content: 'au lieu où il avait précédemment fait un autel ; là, Abram invoqua le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 12.5.
  - type: text
    content: 'Loth, qui accompagnait Abram, avait aussi du petit bétail et du gros bétail, ainsi que des tentes. '
  '6':
  - type: note
    content: 'Cf. 36.7. –  ne leur permettait plus…  : litt. ne les supportait pas (ou ne pouvait pas les porter) pour habiter ensemble.'
  - type: text
    content: 'Le pays ne leur permettait plus d''habiter ensemble – leurs biens étaient si considérables qu''ils ne pouvaient plus habiter ensemble. '
  '7':
  - type: note
    content: Cananéens 12.6. –  Perizzites 15.20 ; 34.30 ; Jos 17.15 ; Jg 1.4.
  - type: text
    content: 'Il y eut querelle entre les bergers des troupeaux d''Abram et les bergers des troupeaux de Loth. – Les Cananéens et les Perizzites habitaient alors le pays. – '
  '8':
  - type: note
    content: 'frères  : litt. des hommes frères, c.-à-d. de proches parents (12.5). Cf. 1Co 6.6s.'
  - type: text
    content: 'Abram dit à Loth : Qu''il n''y ait pas, je te prie, de querelle entre moi et toi, ni entre mes bergers et tes bergers : nous sommes frères ! '
  '9':
  - type: note
    content: '20.15. –  Tout le pays…  : litt. tout le pays n''est-il pas devant toi ?'
  - type: text
    content: 'Tout le pays est devant toi. Sépare-toi de moi, je te prie : si tu vas à gauche, j''irai à droite ; si tu vas à droite, j''irai à gauche.'
