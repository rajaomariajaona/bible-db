        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce titre, qui s''appliquait à l''origine au gouverneur du quart d''une province, désignait sans doute, à l''époque du texte, le responsable politique d''une région à la population mêlée ; ici il s''agit '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Hérode
        - type: text
          text: ' Antipas ; cf. 12.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 14.1/ / ; voir aussi Lc 3.1.'
      marker-yv: yv-n
    - type: text
      text: 'Dans l''Eglise qui était à Antioche, il y avait des prophètes et des maîtres : Barnabé, Syméon appelé Niger, Lucius de Cyrène, Manaën, qui avait été élevé avec Hérode le tétrarque, et Saul. '
