document_id: ACT.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Barnabé et Saul envoyés en mission
  - type: text
    content: ' '
  - type: note
    content: 'l''Eglise 5.11n. –  Antioche 11.19nss. –  des prophètes 11.27+. –  maîtres ou enseignants , traditionnellement docteurs  ; cf. Mt 23.8 ; Rm 2.20 ; voir aussi 1Co 12.28 ; Ep 4.11 ; 1Tm 2.7 ; 2Tm 1.11 ; 4.3 ; Hé 5.12 ; Jc 3.1. –  Barnabé (4.36+) / Saul  : cf. 11.25ss. –  Lucius  : cf. Rm 16.21 ; des traditions plus tardives l''ont identifié (sans doute à tort) à Luc, le rédacteur de l''évangile et des Actes. –  Cyrène  : ville côtière de l''est de la Libye, cf. 2.10 ; 6.9 ; 11.20. –  Manaën  : ce nom d''origine hébraïque évoque l''idée d’ encouragement ou de consolation , cf. 4.36n. –  le tétrarque  : ce titre, qui s''appliquait à l''origine au gouverneur du quart d''une province, désignait sans doute, à l''époque du texte, le responsable politique d''une région à la population mêlée ; ici il s''agit d''Hérode Antipas ; cf. 12.1n  ; Mt 14.1/ / ; voir aussi Lc 3.1.'
  - type: text
    content: 'Dans l''Eglise qui était à Antioche, il y avait des prophètes et des maîtres : Barnabé, Syméon appelé Niger, Lucius de Cyrène, Manaën, qui avait été élevé avec Hérode le tétrarque, et Saul. '
  '10':
  - type: note
    content: 'Cf. 8.20-23 ; Siracide 1.30 : « Le Seigneur dévoilera tes secrets et t''humiliera au milieu de l''assemblée, parce que tu n''es pas venu à la crainte du Seigneur et que ton cœur est plein de ruse. » –  perfidie cf. Jr 5.27. –  fils du diable  : cf. Jn 8.44 ; voir démon, diable, Satan. – Voir justice. –  détourner (ou pervertir, cf. v. 8) les voies (ou les chemins, cf. 9.2n) …  : cf. Os 14.10 ; Pr 10.9.'
  - type: text
    content: 'et dit : Toi qui es plein de toute sorte de ruse et de perfidie, fils du diable, ennemi de toute justice, ne cesseras-tu pas de détourner les voies du Seigneur, qui sont droites ? '
  '11':
  - type: note
    content: 'la main du Seigneur est sur (ou contre) toi  : cf. Jg 2.15 ; 1S 12.15. –  pour un temps  : autre traduction jusqu''à un temps fixé (par Dieu) ; même expression en Lc 4.13n. –  obscurité  : autres traductions obscurcissement, cécité  ; cf. 9.8s ; 22.11 ; Dt 28.29.'
  - type: text
    content: 'Maintenant, la main du Seigneur est sur toi : tu seras aveugle et, pour un temps, tu ne verras plus le soleil. A l''instant même, obscurité et ténèbres tombèrent sur lui ; il errait en cherchant une main pour le guider. '
  '12':
  - type: note
    content: le proconsul v. 7+. –  ébahi Mt 7.28+ ; Lc 4.32.
  - type: text
    content: Quand le proconsul vit ce qui était arrivé, il devint croyant ; il était ébahi de l'enseignement du Seigneur.
  - type: heading
    content: Proclamation de Paul à Antioche de Pisidie
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Pamphylie  : province d''Asie Mineure située au nord-ouest de Chypre. –  Jean (12.12+,25n) se sépara d''eux 15.37s.'
  - type: text
    content: 'De Paphos, Paul et ses compagnons firent voile vers Pergé de Pamphylie. Jean se sépara d''eux et retourna à Jérusalem. '
  '14':
  - type: note
    content: 'Antioche de Pisidie  : ville romaine rattachée à la Galatie, au nord de la Pamphylie ; cf. 14.19,21 ; 2Tm 3.11. –  à la synagogue (v. 5+) le jour du sabbat v. 42,44 ; 17.2 ; 18.4.'
  - type: text
    content: 'De Pergé, ils poursuivirent leur route et arrivèrent à Antioche de Pisidie. Ils se rendirent à la synagogue le jour du sabbat et s''assirent. '
  '15':
  - type: note
    content: 'la lecture publique…  : cf. v. 27 ; 8.28n  ; 15.21 ; 2Co 3.14 ; 1Tm 4.13. –  Loi / Prophètes Mt 5.17n. –  chefs de la synagogue  : cf. Mc 5.22. –  parole d''encouragement ou d''exhortation  : cf. 2.40n  ; 9.31n  ; 15.31-32n  ; il s''agit ici du sermon qui faisait suite à la lecture biblique dans le service à la synagogue ; cf. Lc 4.16-22 et « Le culte du sabbat à la synagogue »♦.'
  - type: text
    content: 'Après la lecture publique de la Loi et des Prophètes, les chefs de la synagogue leur firent dire : Frères, si vous avez une parole d''encouragement pour le peuple, parlez.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: un signe de la main 12.17+. –  Hommes d'Israël 2.22n  ; cf. 7.2ss ; autre traduction Hommes d'Israël, vous qui craignez Dieu  ; cf. 10.2n.
  - type: text
    content: 'Paul se leva, fit un signe de la main et dit :'
  - type: text
    content: 'Hommes d''Israël et vous autres qui craignez Dieu, écoutez ! '
  '17':
  - type: note
    content: 'a choisi nos pères Dt 4.37 ; 10.15. –  fait grandir  : litt. élevé  ; cf. Es 1.2. –  son exil ou son séjour d''immigré 7.6n. –  le bras levé  : autre traduction par son bras élevé  ; cf. Dt 4.34+ ; 5.15 ; 9.26,29 ; Ex 6.1-6.'
  - type: text
    content: 'Le Dieu de ce peuple, le Dieu d''Israël, a choisi nos pères et a fait grandir le peuple pendant son exil en Egypte, puis il l''en a fait sortir le bras levé. '
  '18':
  - type: note
    content: Il les a supportés ou, selon certains mss, il les a nourris, il a pris soin d'eux  ; cf. Dt 1.31 où LXX a employé, selon les mss, l'un ou l'autre verbe grec. –  quarante ans Ex 16.35 ; Nb 14.33s ; Dt 2.7.
  - type: text
    content: 'Il les a supportés pendant environ quarante ans dans le désert ; '
  '19':
  - type: note
    content: 'sept nations Dt 7.1. –  leur  : dans les meilleurs mss le terme correspondant au premier leur, qui désigne les Israélites, est sous-entendu ; le second leur peut désigner ou bien les Israélites, ou bien les nations de Canaan. –  en héritage ou comme patrimoine  ; cf. Jos 14.1s ; Jr 3.18.'
  - type: text
    content: 'et, après avoir supprimé sept nations en Canaan, il leur a donné leur pays en héritage ; '
  '2':
  - type: note
    content: 'ils célébraient le culte du Seigneur ou ils servaient le Seigneur  ; le verbe grec est apparenté au mot qui a donné liturgie  ; celui-ci désigne habituellement un service public et officiel, religieux ou profane ; cf. Lc 1.23 ; Rm 13.6 ; 15.16,27 ; 2Co 9.12 ; Ph 2.17,25,30 ; Hé 1.7,14 ; 8.2,6 ; 9.21 ; 10.2. –  et jeûnaient  : cf. v. 3+. –  l''Esprit saint dit  : cf. 8.29+ ; 20.28 ; 1Tm 4.14. –  à part  : cf. 9.15 ; Ga 1.15+. –  pour l''œuvre…  : cf. 14.26.'
  - type: text
    content: 'Pendant qu''ils célébraient le culte du Seigneur et jeûnaient, l''Esprit saint dit : Mettez-moi à part Barnabé et Saul pour l''œuvre à laquelle je les ai appelés. '
  '20':
  - type: note
    content: 'tout cela a duré (précision sous-entendue dans le texte, selon toute vraisemblance) environ quatre cent cinquante ans  : cf. 7.6 ; Gn 15.13 ; Ex 12.40s ; 1R 6.1n  ; Ga 3.17 ; quelques mss rattachent cette période à ce qui suit  : pendant quatre cent cinquante ans il leur a donné des juges  ; cf. Jg 2.16. –  Samuel 1S 3.20.'
  - type: text
    content: 'tout cela a duré environ quatre cent cinquante ans. Après quoi il leur a donné des juges, jusqu''au prophète Samuel. '
  '21':
  - type: note
    content: 'ils ont demandé un roi 1S 8.5,10,19. –  quarante ans  : Flavius Josèphe attribue la même durée au règne de Saül (1S 9ss), dont le nom est identique dans le texte au nom araméen de Saul / Paul (9.4n  ; 13.9n), lequel appartenait également à la tribu de Benjamin (Rm 11.1 ; Ph 3.5).'
  - type: text
    content: 'Puis ils ont demandé un roi. Dieu leur a donné, pendant quarante ans, Saül, fils de Kis, un homme de la tribu de Benjamin ; '
  '22':
  - type: note
    content: 'écarté  : autre traduction déposé, cf. 1S 15.26ss. –  suscité  : le même verbe est traduit ailleurs par réveiller (au sens de ressusciter v. 30,37) ; cf. 3.15n,26n. –  David 2.25-34 ; cf. 1S 15.23 ; 16.1-13. –  J''ai trouvé…  : cf. 1S 13.14 ; Ps 89.21. –  fils de Jessé 2S 23.1. –  selon mon cœur 1S 2.35 ; 13.14 ; Jr 3.15. –  qui fera… Es 44.28.'
  - type: text
    content: 'après l''avoir écarté, il leur a suscité pour roi David, auquel il a rendu ce témoignage : J''ai trouvé David, fils de Jessé, homme selon mon cœur, qui fera toutes mes volontés. '
  '23':
  - type: note
    content: 'de sa descendance 2S 7.12 ; 22.51 ; Es 11.1 ; cf. Rm 1.3. –  a fait venir…  : autre traduction a conduit à Israël son sauveur, Jésus  ; certains mss portent ici a suscité, comme au v. 22n. –  comme sauveur  : cf. 4.12+ ; 5.31 ; Lc 2.11.'
  - type: text
    content: 'C''est de sa descendance que Dieu, selon sa promesse, a fait venir Jésus comme sauveur pour Israël. '
  '24':
  - type: note
    content: 'son arrivée  : litt. son entrée, cf. Lc 9.31n. –  Jean le Baptiseur 10.37+ ; cf. 19.4 ; voir aussi Ml 3.1 ; Lc 1.76. –  changement radical 2.38n.'
  - type: text
    content: 'Avant son arrivée, Jean avait proclamé un baptême de changement radical pour tout le peuple d''Israël. '
  '25':
  - type: note
    content: 'achevait sa course 20.24+. –  A ce que vous supposez, que suis-je ? (ou qui suis-je ? selon certains mss) : autre traduction  : je ne suis pas, moi, ce que vous supposez que je suis  ; cf. Lc 3.15 ; Jn 1.19s ; 3.28. –  dont je ne suis pas digne… Lc 3.16/ / ; Jn 1.27. –  les sandales  : litt. les sandales des pieds.'
  - type: text
    content: 'Et lorsque Jean achevait sa course, il disait : A ce que vous supposez, que suis-je ? Je ne le suis pas, moi ! Mais il vient après moi, celui dont je ne suis pas digne de détacher les sandales.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'hommes  : litt. fils . –  et vous autres qui  : litt. et (mot absent de certains mss) ceux parmi vous qui . –  craignez Dieu  : cf. v. 16 ; 10.2n. –  c''est à nous  : certains mss portent c''est à vous  ; cf. 10.36+. –  la parole de ce salut  : litt. cette parole de salut  ; cf. 5.20.'
  - type: text
    content: 'Mes frères, hommes de la lignée d''Abraham et vous autres qui craignez Dieu, c''est à nous que la parole de ce salut a été envoyée. '
  '27':
  - type: note
    content: 'les habitants de Jérusalem 1.19+. –  n''ont pas reconnu / ont méconnu  : ces deux expressions traduisent un seul verbe grec ; un terme apparenté est traduit par ignorance en 3.17n  ; cf. Jn 16.3. –  Jésus  : litt. celui-ci (démonstratif qui, en grec, pourrait éventuellement renvoyer à la parole du v. 26, mais non pas au salut, terme féminin en grec). –  les paroles  : litt. les voix (cf. 12.22). –  lues chaque sabbat v. 15 ; 15.21. –  accomplies  : cf. 2.23 ; 3.18.'
  - type: text
    content: 'Car les habitants de Jérusalem et leurs chefs n''ont pas reconnu Jésus ; ils ont méconnu les paroles des prophètes qui sont lues chaque sabbat ; ils les ont accomplies en le jugeant. '
  '28':
  - type: note
    content: '3.13s ; Lc 23.4,22/ / ; Jn 19.1ss. –  ils ont demandé…  : texte occidental reconstitué ils l''ont jugé, puis livré à Pilate pour qu''il soit mis à mort. (29) Accomplissant tout ce qui était écrit de lui, ils ont demandé à Pilate, après qu''il (Jésus) eut été crucifié, qu''il soit descendu du bois ; l''ayant obtenu, ils le descendirent et le mirent…'
  - type: text
    content: 'Sans trouver aucun motif de condamnation à mort, ils ont demandé à Pilate de l''exécuter. '
  '29':
  - type: note
    content: 'accompli…  : cf. v. 27+ ; Lc 18.31 ; 24.44. –  du bois  : cf. 5.30+ ; Lc 23.53ss/ /.'
  - type: text
    content: 'Ayant accompli tout ce qui était écrit à son sujet, ils l''ont descendu du bois et l''ont mis dans un tombeau. '
  '3':
  - type: note
    content: jeûné et prié 14.23. –  imposèrent les mains 6.6+.
  - type: text
    content: Alors, après avoir jeûné et prié, ils leur imposèrent les mains et les laissèrent partir.
  - type: heading
    content: Barnabé et Saul à Chypre
  '30':
  - type: note
    content: Dieu l'a réveillé ou relevé v. 22n  ; 3.15n  ; voir résurrection.
  - type: text
    content: 'Mais Dieu l''a réveillé d''entre les morts. '
  '31':
  - type: note
    content: Il est apparu 9.17 ; cf. 1.3 ; 1Co 15.5s. –  ses témoins 1.8,22+ ; cf. 1Jn 1.1-3.
  - type: text
    content: Il est apparu pendant de nombreux jours à ceux qui étaient montés avec lui de la Galilée à Jérusalem, et qui sont maintenant ses témoins auprès du peuple.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Cf. 26.6.
  - type: text
    content: 'Et nous, nous vous annonçons cette bonne nouvelle : la promesse faite à nos pères, '
  '33':
  - type: note
    content: 'en relevant d''entre les morts, v. 34 ; 2.24n. –  au Psaume deuxième ou, selon certains mss (notamment des témoins du texte occidental), au Psaume premier (voir Ps 2.1n) ; Ps 2.7  ; cf. Lc 3.22 ; Rm 1.4 ; Hé 1.5+ ; le texte occidental ajoute  : Demande-moi et je te donnerai les nations (ou les païens, les non-Juifs 10.45n) pour héritage, et pour possession les extrémités de la terre (Ps 2.8).'
  - type: text
    content: 'Dieu l''a pleinement accomplie pour nous, leurs enfants, en relevant Jésus, selon ce qui est écrit au Psaume deuxième :'
  - type: text
    content: Tu es mon Fils,
  - type: text
    content: c'est moi qui t'ai engendré aujourd'hui
  - type: text
    content: .
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Es 55.3  ; cf. Ps 89.29,35s. –  Je vous donnerai  : c''est le même verbe qui est traduit par laisser au v. 35. –  dignes de foi ou fidèles  ; le mot grec peut aussi être entendu au sens d’ impérissables , par opposition à la décomposition (v. 35+).'
  - type: text
    content: 'Qu''il l''ait relevé d''entre les morts de telle sorte qu''il ne retourne pas à la décomposition, c''est ce qu''il avait dit : Je '
  - type: text
    content: vous
  - type: text
    content: ' donnerai '
  - type: text
    content: les choses saintes de David, celles qui sont dignes de foi
  - type: text
    content: '. '
  '35':
  - type: note
    content: 2.27n  ; Ps 16.10n. – Voir Saint.
  - type: text
    content: 'C''est pourquoi il dit ailleurs : '
  - type: text
    content: Tu ne laisseras pas ton Saint voir la décomposition
  - type: text
    content: '. '
  '36':
  - type: note
    content: '2.29+. –  après avoir…  : traduction incertaine ; on pourrait aussi comprendre après avoir servi sa génération, selon les décisions de Dieu, ou après avoir servi les décisions de Dieu en sa génération, ou encore après avoir servi sa génération, David s''est endormi dans la mort (cf. 7.60n) selon les décisions de Dieu. –  réuni à ses pères  : cf. Jg 2.10.'
  - type: text
    content: 'Or, après avoir servi dans sa génération comme Dieu en avait décidé, David s''est endormi dans la mort, il a été réuni à ses pères et il a vu la décomposition. '
  '37':
  - type: note
    content: réveillé ou relevé v. 22n.
  - type: text
    content: Mais celui que Dieu a réveillé n'a pas vu la décomposition.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'sachez-le donc 2.14+. –  le pardon des péchés 2.38n  ; texte occidental le pardon des péchés vous est annoncé, ainsi que la repentance (ou la conversion, le changement ) de tout… –  tout ce dont vous n''avez pas pu être justifiés…  : cf. 15.10 ; Rm 8.3 ; Ga 2.16+ ; Hé 9.9.'
  - type: text
    content: 'Mes frères, sachez-le donc : c''est par lui que le pardon des péchés vous est annoncé ; de tout ce dont vous n''avez pas pu être justifiés par la loi de Moïse, '
  '39':
  - type: note
    content: quiconque croit est justifié Rm 1.16 ; 3.21-31 ; 10.4.
  - type: text
    content: 'de tout cela, en lui, quiconque croit est justifié. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Séleucie  : port d''Antioche. –  Chypre 11.19+s ; cf. 4.36 ; 15.39.'
  - type: text
    content: 'Eux donc, envoyés par l''Esprit saint, descendirent à Séleucie, et de là ils embarquèrent pour Chypre. '
  '40':
  - type: note
    content: Cf. 28.25ss.
  - type: text
    content: 'Prenez donc garde qu''il n''arrive ce qui est dit dans les Prophètes :'
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Ha 1.5 . –  jamais  : autre traduction en aucun cas.'
  - type: text
    content: Regardez, vous qui êtes pleins de mépris,
  - type: text
    content: étonnez-vous et disparaissez,
  - type: text
    content: car moi, je vais accomplir une œuvre en vos jours,
  - type: text
    content: 'une œuvre '
  - type: text
    content: que vous ne croiriez jamais si on vous la racontait
  - type: text
    content: .
  '42':
  - type: text
    content: ' '
  - type: note
    content: V. 14s.
  - type: text
    content: 'A leur sortie, on les priait de reparler de ce sujet le sabbat suivant ; '
  '43':
  - type: note
    content: 'assemblée  : le mot grec est habituellement transcrit synagogue. – Voir Juifs. –  prosélytes 2.11+ ; certains pensent que l''expression désigne ici des « craignant Dieu » (au sens de 10.2n). –  adorateurs  : litt. adorant  ; le terme grec correspondant est apparenté à celui qui est traduit par pieux en 10.2+ ; de même en 13.50 ; 16.14 ; 17.4,17 ; 18.7 ; voir d''autres emplois du même verbe en 18.13 ; 19.27 ; Mt 15.9/ / (rendre un culte). –  suivirent Paul et Barnabé  : certains témoins du texte occidental ajoutent demandant à recevoir le baptême. –  les persuadaient  : cf. 5.40n  ; 12.20 ; 14.2n,19 ; 17.4 ; 18.4 ; 19.8,26 ; 21.14 ; 23.21n  ; 26.26,28 ; 28.23s. –  rester attachés…  : cf. 11.23 ; 14.22,26 ; 15.40 ; 20.32. – Voir grâce. – A la fin du v. certains témoins du texte occidental ajoutent, avec quelques variantes, la précision suivante  : et la parole [de Dieu] se répandit dans toute la ville.'
  - type: text
    content: quand l'assemblée se fut dispersée, beaucoup de Juifs et de prosélytes adorateurs suivirent Paul et Barnabé ; ceux-ci, dans leurs entretiens avec eux, les persuadaient de rester attachés à la grâce de Dieu.
  - type: heading
    content: Paul et Barnabé se tournent vers les non-Juifs
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'la parole du Seigneur  : certains mss portent la parole de Dieu  ; texte occidental  : … se rassembla pour écouter Paul ; après qu''il eut longuement parlé du Seigneur, (45) les Juifs…'
  - type: text
    content: 'Le sabbat suivant, presque toute la ville se rassembla pour entendre la parole du Seigneur. '
  '45':
  - type: note
    content: 'Cf. 14.2. –  passion jalouse 5.17n. –  ils contredisaient Paul (litt. ce que disait Paul)… 28.19n,22 ; Lc 2.34n  ; Rm 10.21. –  des calomnies  : autre traduction des blasphèmes  ; terme apparenté 6.11 ; de même en 18.6 ; 19.37 ; 26.11 ; cf. Mc 15.29n.'
  - type: text
    content: 'Voyant les foules, les Juifs furent remplis d''une passion jalouse ; ils contredisaient Paul avec des calomnies. '
  '46':
  - type: note
    content: 'avec assurance 2.29n. –  la parole… 4.29+. –  à vous d''abord 3.26+. –  vous la repoussez  : cf. Lc 7.30. –  vous ne vous jugez pas dignes…  : cf. Mt 22.8. –  vers les non-Juifs 10.45n  ; 18.6 ; 28.28 ; Rm 1.16 ; 11.11.'
  - type: text
    content: 'Paul et Barnabé leur dirent alors avec assurance : Il était nécessaire que la parole de Dieu vous soit dite, à vous d''abord ; mais puisque vous la repoussez et que vous ne vous jugez pas dignes de la vie éternelle, nous nous tournons vers les non-Juifs. '
  '47':
  - type: note
    content: 'Es 49.6  ; cf. Lc 2.32 ; 2Co 4.3-6. –  aux extrémités de la terre  : cf. 1.8.'
  - type: text
    content: 'Car le Seigneur nous a donné cet ordre :'
  - type: text
    content: J'ai fait de toi la lumière des nations,
  - type: text
    content: pour porter le salut jusqu'aux extrémités de la terre
  - type: text
    content: .
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'les non-Juifs  : c''est le même mot qui a été traduit par nations au v. 47 ; cf. 2.41+ ; 10.45n. –  se réjouissaient 8.8+. –  tous ceux…  : litt. et ils devinrent croyants, en aussi grand nombre (cf. 2.39) qu''ils étaient destinés à la vie éternelle  ; cf. 11.18+ ; Lc 10.20 ; Rm 8.29s ; Ecrit de Damas (Qumrân) 3.20 : « Ceux qui se sont attachés (au temple véritable) sont (destinés) à la vie éternelle. »'
  - type: text
    content: 'En entendant cela, les non-Juifs se réjouissaient ; ils glorifiaient la parole du Seigneur, et tous ceux qui étaient destinés à la vie éternelle devinrent croyants. '
  '49':
  - type: text
    content: 'La parole du Seigneur se répandait dans le pays tout entier. '
  '5':
  - type: note
    content: 'Salamine  : une des principales villes de Chypre, sur la côte orientale. –  dans les synagogues  : le pluriel suggère une importante communauté juive  ; cf. v. 14,46 ; 9.20 ; 14.1 ; 16.13 ; 17.1s,10,17 ; 18.4,19,26 ; 19.8 ; cf. 5.42 ; 28.17,23. –  Jean Marc 12.12+,25.'
  - type: text
    content: Arrivés à Salamine, ils annoncèrent la parole de Dieu dans les synagogues des Juifs. Ils avaient Jean comme auxiliaire.
  '50':
  - type: note
    content: 'Cf. 14.2. –  les adoratrices (v. 43n) de haut rang (cf. 17.4,12) : il s''agit vraisemblablement de non-Juives « craignant Dieu » (au sens de 10.2n), c.-à-d. de sympathisantes du judaïsme qui n''étaient pas des prosélytes à part entière. –  notables  : litt. premiers 17.4 ; 25.2 ; 28.7n,17 ; Mc 6.21 ; Lc 19.47.'
  - type: text
    content: 'Mais les Juifs excitèrent les adoratrices de haut rang et les notables de la ville ; ils déclenchèrent une persécution contre Paul et Barnabé et les chassèrent de leur territoire. '
  '51':
  - type: note
    content: 'secouèrent contre eux (ou sur eux) …  : cf. 18.6 ; 22.23 ; Mc 6.11n  ; Lc 9.5/ / ; 10.11. –  Iconium, ville de Lycaonie, à l''est de la Pisidie ; l''ensemble de la région (y compris Lystres et Derbé, chap. 14) a été rattaché tantôt à la Galatie, tantôt à la Cappadoce.'
  - type: text
    content: 'Ceux-ci secouèrent contre eux la poussière de leurs pieds et se rendirent à Iconium. '
  '52':
  - type: note
    content: de joie (8.8+) et d'Esprit saint 2.4+ ; cf. 7.55 ; Ga 5.22 ; 1Th 1.6.
  - type: text
    content: Les disciples, quant à eux, étaient remplis de joie et d'Esprit saint.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Paphos  : au sud-ouest de l''île. –  mage  : cf. 8.8,11n  ; le terme n''apparaît qu''ici (aussi v. 8) et en Mt 2.1ss. –  prophète de mensonge ou faux prophète, pseudo-prophète  ; cf. Mt 7.15+. –  Juif  : cf. 19.13. –  Bar-Jésus signifie en araméen fils de Jésus.'
  - type: text
    content: 'Ensuite, après avoir traversé toute l''île jusqu''à Paphos, ils trouvèrent un certain mage, un prophète de mensonge, un Juif du nom de Bar-Jésus, '
  '7':
  - type: note
    content: 'proconsul  : magistrat romain qui gouvernait une province avec l''autorité d''un consul ; en temps normal, son mandat n''excédait pas un an v. 12 ; 18.12 ; 19.38.'
  - type: text
    content: 'qui était auprès du proconsul Sergius Paulus, un homme intelligent. Celui-ci fit appeler Barnabé et Saul, cherchant à entendre la parole de Dieu. '
  '8':
  - type: note
    content: 'Peut-être faut-il comprendre que le nom ou titre Elymas (qu''on a rapproché d''une racine sémitique évoquant ce qui est caché ou occulte) se traduit par mage (v. 6n). –  s''opposait à eux  : cf. 6.10n  ; 2Tm 3.8. –  détourner  : cf. v. 10 ; Lc 23.2n. – A la fin du v. le texte occidental ajoute parce qu''il aimait les entendre.'
  - type: text
    content: 'Mais Elymas le mage (c''est ainsi que se traduit son nom) s''opposait à eux et cherchait à détourner le proconsul de la foi. '
  '9':
  - type: note
    content: 'Saul est un nom juif 7.58+ ; 9.4n  ; Paul est un nom romain (cf. 9.36n  ; 22.25-30), identique dans le texte à celui du proconsul Paulus (v. 7) ; c''est sous ce seul nom que l''apôtre apparaîtra dans la suite du récit, où il passe au premier plan devant Barnabé. –  rempli d''Esprit saint  : cf. 2.4+ ; 4.8.'
  - type: text
    content: 'Alors Saul (qu''on appelle aussi Paul), rempli d''Esprit saint, le fixa '
