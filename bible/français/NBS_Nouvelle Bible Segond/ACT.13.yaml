    - type: text
      text: 'Maintenant, la main du Seigneur est sur toi : tu seras aveugle et, pour un temps, tu ne verras plus le soleil. A l''instant même, obscurité et ténèbres tombèrent sur lui ; il errait en cherchant une main pour le guider. '
