          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parce qu'il était blessé.
      marker-yv: yv-n
    - type: text
      text: Le roi Joram revint se faire soigner à Jizréel des blessures que les Araméens lui avaient infligées à Rama, lorsqu'il combattait Hazaël, roi d'Aram. Achazia, fils de Joram, roi de Juda, descendit pour voir Joram, fils d'Achab, à Jizréel, parce qu'il allait très mal.
  '3':
