      marker-yv: yv-n
    - type: text
      text: 'Achazia avait vingt-deux ans lorsqu''il devint roi ; il régna un an à Jérusalem. Le nom de sa mère était Athalie, fille d''Omri, roi d''Israël. '
  '27':
  - type: usfm
    marker: p
