          text: car il était allié par mariage à la maison d'Achab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : explication absente du texte de LXX.'
      marker-yv: yv-n
    - type: text
      text: 'Il suivit la voie de la maison d''Achab et fit ce qui déplaisait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comme la maison d''Achab, car il était allié par mariage à la maison d''Achab. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Il alla avec Joram, fils d''Achab, faire la guerre à Hazaël, roi d''Aram, à Ramoth de Galaad ; là, les Araméens blessèrent Joram. '
  '29':
  - type: usfm
