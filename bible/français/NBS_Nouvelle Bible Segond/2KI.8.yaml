document_id: 2KI.8,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fin de l'histoire de la Shounamite
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 12.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Va-t''en, toi et ta famille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ta maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta maisonnée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : le texte hébreu peut aussi être lu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: viens avec moi, ainsi que ta famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: séjourne en immigrée où tu pourras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: séjourne (en immigrée) où tu séjournes (en immigrée)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Ex 12.48
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elisée avait dit à la femme dont il avait fait revivre le fils : Va-t''en, toi et ta famille, et séjourne en immigrée où tu pourras ; car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' appelle la famine : elle vient sur le pays pour sept ans. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Va, dis-lui…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Va, dis : « Tu ne vivras pas ! » '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 14) ; le même verbe était traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'survivre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 8s.
      marker-yv: yv-n
    - type: text
      text: 'Elisée lui répondit : Va, dis-lui : « Tu vivras ! » Mais le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''a fait voir qu''il mourra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ainsi un long moment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jusqu'à la honte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 3.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Son visage se figea ; il resta ainsi un long moment ; et l''homme de Dieu se mit à pleurer. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu mettras le feu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''énumération des victimes futures d''Hazaël va du plus fort (la ville) au plus démuni (l''enfant dans le ventre de sa mère) ; cf. Es 13.16 ; Os 14.1 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu éventreras…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.16 ; voir aussi Os 14.1 ; Am 1.13.'
      marker-yv: yv-n
    - type: text
      text: 'Hazaël dit : Pourquoi pleures-tu, mon seigneur ? Elisée répondit : Parce que je sais le mal que tu feras aux Israélites ; tu mettras le feu à leurs villes fortes, tu tueras leurs jeunes gens par l''épée, tu écraseras leurs enfants et tu éventreras leurs femmes enceintes.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' m''a fait voir'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce qui explique l''attitude du prophète décrite au v. 11.'
      marker-yv: yv-n
    - type: text
      text: 'Hazaël dit : Mais que suis-je, moi, ton serviteur, un chien, pour faire une si grande chose ? Elisée dit : Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''a fait voir que tu seras roi d''Aram. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hazaël quitta Elisée et revint auprès de son seigneur ; celui-ci lui demanda : Que t''a dit Elisée ? Il répondit : Il m''a dit : « Tu vivras ! »'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il prit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on comprend ordinairement cette phrase ambiguë comme le récit d''un assassinat du roi par Hazaël ; on pourrait également conclure à une maladresse du roi. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une couverture
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot hébreu peut aussi désigner une natte.'
      marker-yv: yv-n
    - type: text
      text: Le lendemain, il prit une couverture, la plongea dans l'eau et l'étendit sur son visage ; il mourut ; Hazaël devint roi à sa place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joram, roi de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Ch 21.5-20
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Josaphat étant encore roi de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Josaphat roi de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cette précision est absente de plusieurs mss hébreux, '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: '  ; cf. 1.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.1.'
      marker-yv: yv-n
    - type: text
      text: 'La cinquième année de Joram, fils d''Achab, roi d''Israël, Josaphat étant encore roi de Juda, Joram, fils de Josaphat, devint roi de Juda. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: huit ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss de LXX portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''autres '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quarante.
      marker-yv: yv-n
    - type: text
      text: 'Il avait trente-deux ans lorsqu''il devint roi ; il régna huit ans à Jérusalem. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une fille d'Achab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Syr '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une sœur d'Achab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui déplaisait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 27 ; 3.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 11.6+.'
      marker-yv: yv-n
    - type: text
      text: 'Il suivit la voie des rois d''Israël, comme l''avait fait la maison d''Achab, car il avait pour femme une fille d''Achab, et il fit ce qui déplaisait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lui donnerait toujours… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lui assurerait toujours une lignée royale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 11.36'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à lui et à ses fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette précision est absente d''un ms de LXX ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'devant lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 1R 11.36
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Mais le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ne voulut pas détruire Juda, à cause de David, son serviteur, à qui il avait dit qu''il lui donnerait toujours une lampe, à lui et à ses fils.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'La femme agit selon la parole de l''homme de Dieu : elle s''en alla, ainsi que sa famille. Elle séjourna en immigrée sept ans au pays des Philistins. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 3.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En ses jours, Edom se révolta contre la domination de Juda et se donna un roi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jg 7.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tsaïr '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Siôr
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : lieu situé aux confins du Néguev et de la Transjordanie, identifié à Tsoar (Gn 13.10), à Tsior (Jos 15.54), voire à Séir (Gn 14.6 ; Dt 33.2) ; cf. 2Ch 21.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à ses tentes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 8.66'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Joram passa à Tsaïr, avec tous ses chars. Il se leva de nuit et battit les Edomites qui l''encerclaient ainsi que les chefs des chars, mais le peuple s''enfuit à ses tentes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Libna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ville identifiée au site de Tell Bornat, à 25 km au nord-ouest d''Hébron, ou encore à Tell es-Safi, à 9 km plus au nord ; cf. 19.8 ; 23.31 ; 24.18 ; Jos 10.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',31,39 ; 12.15 ; 15.42 ; 21.13 ; Es 37.8 ; Jr 52.1 ; 1Ch 6.42.'
      marker-yv: yv-n
    - type: text
      text: Edom s'est révolté contre la domination de Juda jusqu'à ce jour. Libna aussi se révolta en ce temps-là.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 11.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le livre des chroniques des rois de Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 14.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le reste de l''histoire de Joram, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois de Juda. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se coucha avec ses pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression en 10.35 ; 13.9,13 ; 14.16,22,29 ; 15.7,22,38 ; 16.20 ; 20.21 ; 21.18 ; 24.6 ; 1R 1.21+.'
      marker-yv: yv-n
    - type: text
      text: Joram se coucha avec ses pères et fut enseveli avec ses pères dans la Ville de David. Achazia, son fils, devint roi à sa place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Achazia, roi de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
