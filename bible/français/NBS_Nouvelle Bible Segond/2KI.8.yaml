      text: 'Pendant qu''il racontait au roi comment Elisée avait rendu la vie au mort, la femme dont il avait fait revivre le fils vint crier vers le roi au sujet de sa maison et de son champ. Guéhazi dit : O roi, mon seigneur, voici la femme, et voici son fils, qu''Elisée a fait revivre. '
