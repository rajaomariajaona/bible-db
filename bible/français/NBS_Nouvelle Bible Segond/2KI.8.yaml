document_id: 2KI.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Fin de l'histoire de la Shounamite
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 12.1. –  Va-t''en, toi et ta famille (litt. ta maison ou ta maisonnée ) : le texte hébreu peut aussi être lu  : viens avec moi, ainsi que ta famille . –  séjourne en immigrée où tu pourras  : litt. séjourne (en immigrée) où tu séjournes (en immigrée)  ; cf. Ex 12.48n.'
  - type: text
    content: 'Elisée avait dit à la femme dont il avait fait revivre le fils : Va-t''en, toi et ta famille, et séjourne en immigrée où tu pourras ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' appelle la famine : elle vient sur le pays pour sept ans. '
  '10':
  - type: note
    content: 'Va, dis-lui…  : autre lecture traditionnelle  : Va, dis : « Tu ne vivras pas ! » (cf. v. 14) ; le même verbe était traduit par survivre aux v. 8s.'
  - type: text
    content: 'Elisée lui répondit : Va, dis-lui : « Tu vivras ! » Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a fait voir qu''il mourra. '
  '11':
  - type: note
    content: 'ainsi un long moment  : litt. jusqu''à la honte, cf. 2.17n  ; Jg 3.25n.'
  - type: text
    content: 'Son visage se figea ; il resta ainsi un long moment ; et l''homme de Dieu se mit à pleurer. '
  '12':
  - type: note
    content: 'tu mettras le feu…  : l''énumération des victimes futures d''Hazaël va du plus fort (la ville) au plus démuni (l''enfant dans le ventre de sa mère) ; cf. Es 13.16 ; Os 14.1 etc. –  tu éventreras…  : cf. 15.16 ; voir aussi Os 14.1 ; Am 1.13.'
  - type: text
    content: 'Hazaël dit : Pourquoi pleures-tu, mon seigneur ? Elisée répondit : Parce que je sais le mal que tu feras aux Israélites ; tu mettras le feu à leurs villes fortes, tu tueras leurs jeunes gens par l''épée, tu écraseras leurs enfants et tu éventreras leurs femmes enceintes.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur m''a fait voir  : ce qui explique l''attitude du prophète décrite au v. 11.'
  - type: text
    content: 'Hazaël dit : Mais que suis-je, moi, ton serviteur, un chien, pour faire une si grande chose ? Elisée dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a fait voir que tu seras roi d''Aram. '
  '14':
  - type: text
    content: 'Hazaël quitta Elisée et revint auprès de son seigneur ; celui-ci lui demanda : Que t''a dit Elisée ? Il répondit : Il m''a dit : « Tu vivras ! »'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'il prit…  : on comprend ordinairement cette phrase ambiguë comme le récit d''un assassinat du roi par Hazaël ; on pourrait également conclure à une maladresse du roi. –  une couverture  : le mot hébreu peut aussi désigner une natte.'
  - type: text
    content: Le lendemain, il prit une couverture, la plongea dans l'eau et l'étendit sur son visage ; il mourut ; Hazaël devint roi à sa place.
  - type: heading
    content: Joram, roi de Juda
  - type: heading
    content: 2Ch 21.5-20
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Josaphat étant encore roi de Juda  : litt. Josaphat roi de Juda  ; cette précision est absente de plusieurs mss hébreux, LXX, Syr, Vg  ; cf. 1.17n  ; 3.1.'
  - type: text
    content: 'La cinquième année de Joram, fils d''Achab, roi d''Israël, Josaphat étant encore roi de Juda, Joram, fils de Josaphat, devint roi de Juda. '
  '17':
  - type: note
    content: 'huit ans  : certains mss de LXX portent dix, d''autres quarante.'
  - type: text
    content: 'Il avait trente-deux ans lorsqu''il devint roi ; il régna huit ans à Jérusalem. '
  '18':
  - type: note
    content: 'une fille d''Achab  : Syr une sœur d''Achab. –  ce qui déplaisait…  : cf. v. 27 ; 3.2n  ; 1R 11.6+.'
  - type: text
    content: 'Il suivit la voie des rois d''Israël, comme l''avait fait la maison d''Achab, car il avait pour femme une fille d''Achab, et il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '19':
  - type: note
    content: 'lui donnerait toujours… ou lui assurerait toujours une lignée royale  : cf. 1R 11.36n. –  à lui et à ses fils  : cette précision est absente d''un ms de LXX ; certains modifient le texte hébreu traditionnel pour lire devant lui (cf. 1R 11.36n).'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne voulut pas détruire Juda, à cause de David, son serviteur, à qui il avait dit qu''il lui donnerait toujours une lampe, à lui et à ses fils.'
  '2':
  - type: text
    content: 'La femme agit selon la parole de l''homme de Dieu : elle s''en alla, ainsi que sa famille. Elle séjourna en immigrée sept ans au pays des Philistins. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.9n.
  - type: text
    content: 'En ses jours, Edom se révolta contre la domination de Juda et se donna un roi. '
  '21':
  - type: note
    content: 'Cf. Jg 7.8n. –  Tsaïr (LXX Siôr) : lieu situé aux confins du Néguev et de la Transjordanie, identifié à Tsoar (Gn 13.10), à Tsior (Jos 15.54), voire à Séir (Gn 14.6 ; Dt 33.2) ; cf. 2Ch 21.9n. –  à ses tentes  : cf. 1R 8.66n.'
  - type: text
    content: 'Joram passa à Tsaïr, avec tous ses chars. Il se leva de nuit et battit les Edomites qui l''encerclaient ainsi que les chefs des chars, mais le peuple s''enfuit à ses tentes. '
  '22':
  - type: note
    content: 'Libna  : ville identifiée au site de Tell Bornat, à 25 km au nord-ouest d''Hébron, ou encore à Tell es-Safi, à 9 km plus au nord ; cf. 19.8 ; 23.31 ; 24.18 ; Jos 10.29n,31,39 ; 12.15 ; 15.42 ; 21.13 ; Es 37.8 ; Jr 52.1 ; 1Ch 6.42.'
  - type: text
    content: Edom s'est révolté contre la domination de Juda jusqu'à ce jour. Libna aussi se révolta en ce temps-là.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  le livre des chroniques des rois de Juda 1R 14.19n.
  - type: text
    content: 'Le reste de l''histoire de Joram, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois de Juda. '
  '24':
  - type: note
    content: 'se coucha avec ses pères  : même expression en 10.35 ; 13.9,13 ; 14.16,22,29 ; 15.7,22,38 ; 16.20 ; 20.21 ; 21.18 ; 24.6 ; 1R 1.21+.'
  - type: text
    content: Joram se coucha avec ses pères et fut enseveli avec ses pères dans la Ville de David. Achazia, son fils, devint roi à sa place.
  - type: heading
    content: Achazia, roi de Juda
  - type: heading
    content: 2Ch 22.1-6
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'La douzième année  : certains mss de LXX, ainsi que Syr, portent la onzième année , cf. 9.29. –  Joram… roi d''Israël  : le narrateur souligne le lien avec la dynastie d’ Achab . –  devint roi de Juda  : LXX devint roi.'
  - type: text
    content: 'La douzième année de Joram, fils d''Achab, roi d''Israël, Achazia, fils de Joram, devint roi de Juda. '
  '26':
  - type: note
    content: 'vingt-deux ans  : cf. 2Ch 22.2. –  roi d''Israël  : absent de 2Ch 22.2.'
  - type: text
    content: 'Achazia avait vingt-deux ans lorsqu''il devint roi ; il régna un an à Jérusalem. Le nom de sa mère était Athalie, fille d''Omri, roi d''Israël. '
  '27':
  - type: note
    content: 'car il était allié par mariage à la maison d''Achab  : explication absente du texte de LXX.'
  - type: text
    content: 'Il suivit la voie de la maison d''Achab et fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme la maison d''Achab, car il était allié par mariage à la maison d''Achab. '
  '28':
  - type: text
    content: 'Il alla avec Joram, fils d''Achab, faire la guerre à Hazaël, roi d''Aram, à Ramoth de Galaad ; là, les Araméens blessèrent Joram. '
  '29':
  - type: note
    content: 'que les Araméens lui avaient infligées  : LXX qu''ils lui avaient infligées. –  roi de Juda  : précision absente d''un ms hébreu et de LXX. –  parce qu''il allait très mal  : autres traductions parce qu''il était malade ou parce qu''il était blessé.'
  - type: text
    content: Le roi Joram revint se faire soigner à Jizréel des blessures que les Araméens lui avaient infligées à Rama, lorsqu'il combattait Hazaël, roi d'Aram. Achazia, fils de Joram, roi de Juda, descendit pour voir Joram, fils d'Achab, à Jizréel, parce qu'il allait très mal.
  '3':
  - type: note
    content: 'Au bout des sept ans  : la suite du récit et la demande du roi à Guéhazi projette le lecteur à une époque où, Elisée n''étant plus présent, on se préoccupe de transmettre son histoire. –  au sujet de sa maison  : selon le v. 5, le texte hébreu dit vers sa maison. –  son champ  : LXX porte un pluriel, de même dans la suite.'
  - type: text
    content: 'Au bout des sept ans, la femme revint du pays des Philistins et s''en alla crier vers le roi au sujet de sa maison et de son champ. '
  '4':
  - type: text
    content: 'Le roi s''entretenait avec Guéhazi, le serviteur de l''homme de Dieu ; il disait : Raconte-moi, je te prie, toutes les grandes choses qu''Elisée a faites. '
  '5':
  - type: note
    content: 'son champ  : cf. v. 3n. –  voici… voici…  : litt. celle-ci la femme et celui-ci son fils…'
  - type: text
    content: 'Pendant qu''il racontait au roi comment Elisée avait rendu la vie au mort, la femme dont il avait fait revivre le fils vint crier vers le roi au sujet de sa maison et de son champ. Guéhazi dit : O roi, mon seigneur, voici la femme, et voici son fils, qu''Elisée a fait revivre. '
  '6':
  - type: note
    content: 'désigna  : litt. donna. –  un haut fonctionnaire  : le mot hébreu peut désigner un eunuque (9.32n  ; 20.18) ; cf. Gn 37.36n  ; Est 1.10n. –  revenus  : le mot hébreu correspondant est aussi traduit par récoltes.'
  - type: text
    content: 'Le roi interrogea la femme, et elle lui raconta tout. Puis le roi lui désigna un haut fonctionnaire à qui il dit : Fais restituer à cette femme tout ce qui lui appartient, avec tous les revenus du champ, depuis le jour où elle a quitté le pays jusqu''à maintenant.'
  - type: heading
    content: Elisée et Hazaël
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ben-Hadad  : cf. 6.24n. –  L''homme de Dieu  : Elisée est connu et vénéré à Damas. On rapprochera cet épisode de 1.2-18.'
  - type: text
    content: 'Elisée se rendit à Damas. Ben-Hadad, roi d''Aram, était malade ; on lui dit : L''homme de Dieu est venu jusqu''ici. '
  '8':
  - type: note
    content: Hazaël (certains mss hébreux ont ici une orthographe inhabituelle, Hazahel) n'est pas présenté ; le récit suppose que le lecteur connaît déjà celui qui va devenir le roi d'Aram. Les annales assyriennes le présentent comme un fils de personne, c.-à-d. un usurpateur. –  offrande ou présent, cf. Gn 4.3n. –  cette maladie ou cette blessure  ; des versions anciennes portent ma maladie, de même au v. 9 ; cf. 1.2n.
  - type: text
    content: 'Le roi dit à Hazaël : Prends avec toi une offrande, va à la rencontre de l''homme de Dieu ; par lui tu consulteras le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en disant : « Survivrai-je à cette maladie ? » '
  '9':
  - type: note
    content: 'et tout ce qu''il y avait de meilleur  : certains mss de LXX portent de tout ce qu''il y avait de meilleur. –  Ben-Hadad, ton fils  : cf. 1S 24.12n.'
  - type: text
    content: 'Hazaël alla à la rencontre d''Elisée, prenant avec lui une offrande et tout ce qu''il y avait de meilleur à Damas, soit la charge de quarante chameaux. Lorsqu''il fut arrivé, il se présenta devant lui et dit : Ben-Hadad, ton fils, le roi d''Aram, m''envoie à toi pour demander : « Survivrai-je à cette maladie ? » '
