      marker-yv: yv-n
    - type: text
      text: 'Hazaël alla à la rencontre d''Elisée, prenant avec lui une offrande et tout ce qu''il y avait de meilleur à Damas, soit la charge de quarante chameaux. Lorsqu''il fut arrivé, il se présenta devant lui et dit : Ben-Hadad, ton fils, le roi d''Aram, m''envoie à toi pour demander : « Survivrai-je à cette maladie ? » '
