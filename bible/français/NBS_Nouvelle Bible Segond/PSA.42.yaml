document_id: PSA.42,104
type_code: fra
verses:
  '1':
  - type: heading
    content: LIVRE DEUXIÈME
  - type: heading
    content: Comme une biche soupire…
  - type: text
    content: ' '
  - type: note
    content: Ce psaume et le suivant semblent avoir formé un seul et même poème (32.1n), rythmé par la récurrence d'un refrain (v. 6+). –  Des fils de Coré (hébreu Qora ) 42—49 ; 84—85 ; 87—88 ; cf. Gn 36.5ss ; Ex 6.21,24 ; Nb 16 ; 26.11,58 ; 1Ch 2.43 ; 6.7,22 ; 9.19 ; 26.1,19 ; 2Ch 20.19.
  - type: text
    content: Du chef de chœur. Poème. Des fils de Coré.
  '10':
  - type: text
    content: ' '
  - type: note
    content: mon roc 18.3+. –  Pourquoi… 22.2+ ; 43.2 ; cf. 44.10,24 ; 60.12 ; 74.1. –  marcher, l'air sombre 35.14n.
  - type: text
    content: 'Je dis à Dieu, mon roc :'
  - type: text
    content: Pourquoi m'as-tu oublié ?
  - type: text
    content: Pourquoi dois-je marcher, l'air sombre,
  - type: text
    content: sous l'oppression de l'ennemi ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'm''outragent  : autre traduction me déshonorent. –  Où… v. 4+.'
  - type: text
    content: Alors que mes os se brisent, mes adversaires m'outragent
  - type: text
    content: 'en me disant sans cesse : Où est ton Dieu ?'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'mon salut  : litt. le salut de ma face  ; cf. v. 6n  ; de même en 43.5.'
  - type: text
    content: – Pourquoi être abattu,
  - type: text
    content: pourquoi gémir sur toi-même ?
  - type: text
    content: Attends Dieu !
  - type: text
    content: '– Je le célébrerai encore :'
  - type: text
    content: il est mon salut et mon Dieu.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'soupire ou languit, brame  ; cf. Jl 1.20. –  sur le lit du torrent (à sec)  : autre traduction après les torrents  ; cf. 18.16n. –  je soupire  : autre traduction mon âme soupire  ; cf. 6.4n.'
  - type: text
    content: Comme une biche qui soupire sur le lit du torrent,
  - type: text
    content: ainsi je soupire après toi, ô Dieu !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai (ou mon âme a  ; cf. 6.4n) soif de Dieu 36.10 ; 63.2 ; 84.3 ; 143.6 ; Jn 4.10-14 ; 7.37s ; 19.28. –  de Dieu (hébreu ’Elohim , Gn 1.1n) , du Dieu (hébreu ’El , de même aux v. 9s ; cf. Gn 21.33n). –  paraître…  : quelques mss hébreux et des versions anciennes portent verrai-je la face de Dieu , ce qui correspond à une autre vocalisation des mêmes lettres en hébreu ; cf. 11.7 ; 17.15 ; 27.4 ; 63.3 ; voir aussi 84.8n  ; Ex 23.15,17 ; 24.11 ; 33.20 ; Es 1.12 ; Ap 22.4.'
  - type: text
    content: 'J''ai soif de Dieu, du Dieu vivant :'
  - type: text
    content: quand irai-je paraître devant Dieu ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ma nourriture  : litt. mon pain  ; cf. 80.6 ; 102.10. –  sans cesse  : litt. tout le jour . –  Où est ton Dieu v. 11 ; 79.10 ; 115.2 ; Jl 2.17 ; Mi 7.10 ; Ml 2.17 ; cf. 2R 18.34.'
  - type: text
    content: Mes larmes sont ma nourriture jour et nuit,
  - type: text
    content: 'alors qu''on me dit sans cesse :'
  - type: text
    content: Où est ton Dieu ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'me souvenir 77.6ss ; 103.2. –  quand je me répands…  : litt. et répandre sur moi mon être ou ma vie, mon âme (Gn 1.20n) ; cf. Ps 6.4n  ; 62.9 ; 102.1n  ; 142.3ns ; 1S 1.15 ; Jb 30.16n  ; Lm 2.12n,19. –  je marchais…  : traduction conjecturale ; d''après des versions anciennes, certains modifient légèrement le texte hébreu traditionnel pour lire j''entrais (cf. 100.4 ; 118.19s) dans la hutte magnifique, dans la maison de Dieu (cf. 27.4-5n  ; 76.2 ; Lm 2.6). –  dans les cris de joie…  : cf. Ez 26.13 ; Am 5.23.'
  - type: text
    content: 'Voici pourtant ce dont je veux me souvenir, quand je me répands sur moi-même :'
  - type: text
    content: je marchais avec la foule
  - type: text
    content: et je m'avançais avec elle jusqu'à la maison de Dieu,
  - type: text
    content: dans les cris de joie et de reconnaissance
  - type: text
    content: d'une multitude en fête.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction pourquoi es-tu abattue, mon âme, pourquoi gémis-tu sur moi ? Cf. v. 2n,12 ; 43.5. –  abattu  : LXX triste  ; cf. v. 7 ; Mc 14.34/ /. –  gémir sur toi-même  : autre traduction t''agiter (cf. 39.7). –  pour son salut  : litt. le salut de sa face  ; plusieurs versions anciennes ont lu ici comme au v. 12n.'
  - type: text
    content: – Pourquoi être abattu,
  - type: text
    content: pourquoi gémir sur toi-même ?
  - type: text
    content: Attends Dieu !
  - type: text
    content: – Je le célébrerai encore
  - type: text
    content: pour son salut.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'je suis abattu ou mon âme est abattue sur moi (v. 6n) Lm 1.20 ; 3.20 ; cf. 1S 1.8 ; Jn 12.27. –  je me souviens de toi  : autres traductions j''évoque ton nom  ; je t''invoque  ; cf. 63.7 ; 77.4 ; 119.55 ; Ez 6.9 ; Za 10.9 ; Né 4.8. –  l''Hermon  : le nom est ici au pluriel, peut-être pour désigner l''ensemble de la région montagneuse du nord du pays où le Jourdain prend sa source ; cf. 89.13 ; 133.3 ; Dt 3.8 ; 4.48 ; Jos 12.1. –  Mitséar , nom inconnu par ailleurs ; il pourrait signifier la petite, l''insignifiante (cf. Gn 19.20n,22n  ; nom de la montagne ou d''une localité voisine ?).'
  - type: text
    content: Mon Dieu, je suis abattu ;
  - type: text
    content: c'est pourquoi je me souviens de toi, depuis le pays du Jourdain,
  - type: text
    content: depuis l'Hermon, depuis le mont Mitséar.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 18.5n  ; 69.3 ; 88.8 ; Jon 2.4.
  - type: text
    content: L'abîme appelle l'autre abîme au bruit de tes cascades ;
  - type: text
    content: tous tes flots, toutes tes vagues ont passé sur moi.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine ; cf. 92.2. –  dépêche  : litt. ordonne  ; cf. 105.8n  ; 133.3n  ; Es 10.6.'
  - type: text
    content: 'Le jour, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dépêche sa fidélité,'
  - type: text
    content: et que la nuit son chant m'accompagne.
  - type: text
    content: C'est une prière au Dieu de ma vie.
