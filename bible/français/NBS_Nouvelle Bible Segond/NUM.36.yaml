document_id: NUM.36,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règles pour le mariage des héritières
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 27.1+ss ; voir aussi 9.6+. –  fils de Galaad  : autre traduction Galaadites . –  Makir 26.29+ ; 32.39. –  d''entre les clans  : LXX et Vg portent le singulier.'
  - type: text
    content: 'Les chefs de famille du clan des fils de Galaad, fils de Makir, fils de Manassé, d''entre les clans des fils de Joseph, se présentèrent et parlèrent devant Moïse et devant les princes, les chefs des familles des Israélites. '
  '10':
  - type: text
    content: 'Les filles de Tselophhad firent ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse. '
  '11':
  - type: note
    content: 26.33 ; 27.1 ; Jos 17.3s.
  - type: text
    content: 'Mahla, Tirtsa, Hogla, Milka et Noa, filles de Tselophhad, se marièrent aux fils de leurs oncles ; '
  '12':
  - type: text
    content: elles se marièrent dans les clans des fils de Manassé, fils de Joseph, et leur patrimoine resta dans la tribu du clan de leur père.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'donna aux Israélites  : autre traduction institua pour les Israélites  ; cf. v. 2,6,10 ; 19.2 ; 30.17 ; Lv 27.34. –  plaines arides de Moab… 22.1n  ; 26.3+ ; 35.1s ; cf. Lv 26.46 ; 27.34.'
  - type: text
    content: 'Tels sont les commandements et les règles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donna aux Israélites, par l''intermédiaire de Moïse, dans les plaines arides de Moab, près du Jourdain, en face de Jéricho.'
  '2':
  - type: note
    content: 't''a ordonné…  : litt. a ordonné à mon seigneur, cf. 32.25. –  donner… le pays… 26.53ss. –  patrimoine de Tselophhad… 27.7.'
  - type: text
    content: 'Ils dirent : Mon seigneur, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a ordonné de donner par le sort le pays comme patrimoine aux Israélites. Tu as aussi reçu du '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''ordre de donner le patrimoine de Tselophhad, notre frère, à ses filles. '
  '3':
  - type: note
    content: 'tribu 18.2n. –  nos pères  : Syr leur père  ; cf. Dt 25.5ss.'
  - type: text
    content: 'Si elles se marient à un homme d''une autre tribu des Israélites, leur patrimoine sera retranché du patrimoine de nos pères et ajouté à celui de la tribu à laquelle elles appartiendront ; ainsi le patrimoine qui nous est échu par le sort sera diminué. '
  '4':
  - type: note
    content: 'le jubilé Lv 25.10 ; cf. 27.17ss. –  notre tribu  : litt. la tribu de nos pères, cf. 1.16n.'
  - type: text
    content: Et quand viendra le jubilé pour les Israélites, leur patrimoine sera ajouté à celui de la tribu à laquelle elles appartiendront et sera retranché de celui de notre tribu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'a raison  : cf. 27.7.'
  - type: text
    content: 'Moïse donna un commandement aux Israélites, sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il dit : La tribu des fils de Joseph a raison. '
  '6':
  - type: note
    content: Cf. Gn 24.4 ; 28.2 ; 29.19. –  à qui leur plaira 1Co 7.39.
  - type: text
    content: 'Voici ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ordonne aux filles de Tselophhad : elles se marieront à qui leur plaira, pourvu qu''elles se marient dans un clan de la tribu de leur père. '
  '7':
  - type: note
    content: 'Cf. Lv 25.23s. –  sa tribu  : litt. la tribu de ses pères.'
  - type: text
    content: 'Parmi les Israélites, aucun patrimoine ne passera d''une tribu à une autre tribu ; chacun des Israélites s''attachera au patrimoine de sa tribu. '
  '8':
  - type: note
    content: 'sa propre tribu  : litt. la tribu de son père.'
  - type: text
    content: 'Toute fille qui hérite d''un patrimoine parmi les tribus des Israélites se mariera à quelqu''un d''un clan de sa propre tribu, afin que chacun des Israélites puisse hériter du patrimoine de ses pères. '
  '9':
  - type: text
    content: 'Aucun patrimoine ne passera d''une tribu à une autre tribu : chaque tribu des Israélites s''attachera à son patrimoine.'
