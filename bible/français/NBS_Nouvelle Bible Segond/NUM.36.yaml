document_id: NUM.36,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles pour le mariage des héritières
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 27.1+ss ; voir aussi 9.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fils de Galaad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Galaadites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Makir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '26.29+ ; 32.39. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'entre les clans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' portent le singulier.'
      marker-yv: yv-n
    - type: text
      text: 'Les chefs de famille du clan des fils de Galaad, fils de Makir, fils de Manassé, d''entre les clans des fils de Joseph, se présentèrent et parlèrent devant Moïse et devant les princes, les chefs des familles des Israélites. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les filles de Tselophhad firent ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait ordonné à Moïse. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 26.33 ; 27.1 ; Jos 17.3s.
      marker-yv: yv-n
    - type: text
      text: 'Mahla, Tirtsa, Hogla, Milka et Noa, filles de Tselophhad, se marièrent aux fils de leurs oncles ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: elles se marièrent dans les clans des fils de Manassé, fils de Joseph, et leur patrimoine resta dans la tribu du clan de leur père.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: donna aux Israélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: institua pour les Israélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. v. 2,6,10 ; 19.2 ; 30.17 ; Lv 27.34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'plaines arides de Moab… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 26.3+ ; 35.1s ; cf. Lv 26.46 ; 27.34.'
      marker-yv: yv-n
    - type: text
      text: 'Tels sont les commandements et les règles que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' donna aux Israélites, par l''intermédiaire de Moïse, dans les plaines arides de Moab, près du Jourdain, en face de Jéricho.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'a ordonné…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a ordonné à mon seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 32.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'donner… le pays… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '26.53ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'patrimoine de Tselophhad… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 27.7.
      marker-yv: yv-n
    - type: text
      text: 'Ils dirent : Mon seigneur, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''a ordonné de donner par le sort le pays comme patrimoine aux Israélites. Tu as aussi reçu du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''ordre de donner le patrimoine de Tselophhad, notre frère, à ses filles. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tribu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nos pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 25.5ss.'
      marker-yv: yv-n
    - type: text
      text: 'Si elles se marient à un homme d''une autre tribu des Israélites, leur patrimoine sera retranché du patrimoine de nos pères et ajouté à celui de la tribu à laquelle elles appartiendront ; ainsi le patrimoine qui nous est échu par le sort sera diminué. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le jubilé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 25.10 ; cf. 27.17ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: notre tribu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la tribu de nos pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Et quand viendra le jubilé pour les Israélites, leur patrimoine sera ajouté à celui de la tribu à laquelle elles appartiendront et sera retranché de celui de notre tribu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a raison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 27.7.'
      marker-yv: yv-n
    - type: text
      text: 'Moïse donna un commandement aux Israélites, sur l''ordre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Il dit : La tribu des fils de Joseph a raison. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 24.4 ; 28.2 ; 29.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à qui leur plaira '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Co 7.39.
      marker-yv: yv-n
    - type: text
      text: 'Voici ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ordonne aux filles de Tselophhad : elles se marieront à qui leur plaira, pourvu qu''elles se marient dans un clan de la tribu de leur père. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lv 25.23s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa tribu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la tribu de ses pères.
      marker-yv: yv-n
    - type: text
      text: 'Parmi les Israélites, aucun patrimoine ne passera d''une tribu à une autre tribu ; chacun des Israélites s''attachera au patrimoine de sa tribu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa propre tribu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la tribu de son père.
      marker-yv: yv-n
    - type: text
      text: 'Toute fille qui hérite d''un patrimoine parmi les tribus des Israélites se mariera à quelqu''un d''un clan de sa propre tribu, afin que chacun des Israélites puisse hériter du patrimoine de ses pères. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aucun patrimoine ne passera d''une tribu à une autre tribu : chaque tribu des Israélites s''attachera à son patrimoine.'
