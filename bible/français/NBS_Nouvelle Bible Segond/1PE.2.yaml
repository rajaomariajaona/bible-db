document_id: 1PE.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Rejetez ou défaites-vous de  ; un terme apparenté est traduit par se débarrasser de en 3.21 ; cf. Col 3.8n  ; voir aussi Rm 1.29+ ; 2Co 12.20 ; Ep 4.22,31 ; Jc 1.21 ; 4.11.
  - type: text
    content: 'Rejetez donc toute malfaisance et toute ruse, l''hypocrisie, l''envie et toute médisance ; '
  '10':
  - type: note
    content: Cf. Os 1.6,9 ; 2.25  ; cf. Os 2.1,3 ; Rm 9.25 ; voir aussi Ep 2.4+.
  - type: text
    content: 'vous qui, autrefois, '
  - type: text
    content: n'étiez pas un peuple,
  - type: text
    content: ' vous êtes maintenant le peuple de Dieu ; vous qui '
  - type: text
    content: n'aviez pas obtenu compassion,
  - type: text
    content: ' vous avez maintenant obtenu compassion.'
  - type: heading
    content: Une belle conduite dans la société
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'encourage  : autre traduction exhorte  ; cf. 5.1,12 ; Rm 12.1+. –  exilés (cf. 1.17n  ; Ep 2.19n) / étrangers (cf. 1.1+) Gn 23.4 ; Ps 39.13 ; 1Ch 29.15 ; Hé 11.13n. –  vous abstenir  : cf. v. 1 ; Ac 15.20,29 ; 1Th 4.3-5 ; 5.22. –  désirs de la chair (litt. charnels , Rm 15.27n) : cf. 1P 1.14 ; 4.2 ; voir aussi Ga 5.16s,24 ; 1Jn 2.15ss. –  guerre  : cf. Rm 7.7ss ; Jc 4.1nss.'
  - type: text
    content: 'Bien-aimés, je vous encourage, comme des exilés et des étrangers, à vous abstenir des désirs de la chair qui font la guerre à l''âme. '
  '12':
  - type: note
    content: 'belle conduite  : cf. 3.1s,16 ; Jc 3.13. –  gens des nations ou païens  ; c''est le terme habituellement utilisé par les Juifs pour désigner les non-Juifs  ; cf. 4.3s ; Mt 4.15n  ; Ac 10.45n  ; 1Co 5.1n  ; Ep 2.11n. –  accusent  : verbe apparenté au terme traduit par médisance au v. 1 ; cf. Jc 4.11. –  belles œuvres  : cf. Mt 5.16 ; 26.10/ / ; voir aussi Mt 3.10 ; 7.17 ; 12.33 ; Ga 6.9s ; Ph 4.8 ; 2Th 3.13. – Voir gloire. –  de son intervention  : autres traductions de son inspection, de sa visite  ; cf. Es 10.3n  ; Jr 6.15n  ; Lc 19.44n  ; voir aussi Gn 50.24s ; Ex 3.16s ; 1S 2.21 ; 21.1 ; Ps 106.4 ; Jb 10.12 ; Sagesse 3.7 : « Au temps de l''intervention de Dieu, ils (les justes) resplendiront. »'
  - type: text
    content: 'Ayez une belle conduite parmi les gens des nations, pour que, sur le point même où ils vous accusent de faire le mal, ils voient vos belles œuvres et glorifient Dieu '
  - type: text
    content: au jour de son intervention
  - type: text
    content: .
  - type: heading
    content: Le respect dû aux institutions
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'soyez soumis v. 18 ; 3.1 ; 5.5 ; Ep 5.21+. –  institution (litt. création ) humaine  : certains comprennent à toute créature humaine  ; cf. Rm 13.1ss ; Tt 3.1. –  roi  : c''est ainsi qu''on désignait souvent l''empereur dans la partie orientale de l''Empire romain.'
  - type: text
    content: 'A cause du Seigneur, soyez soumis à toute institution humaine ; au roi, qui est souverain, '
  '14':
  - type: note
    content: Voir justice.
  - type: text
    content: 'comme aux gouverneurs qui sont envoyés par lui pour faire justice contre ceux qui font le mal, mais pour louer ceux qui font le bien ; '
  '15':
  - type: note
    content: '3.13,16. –  réduisiez au silence  : cf. Mt 22.12n. –  gens déraisonnables  : cf. Ps 14.1 ; Ep 4.17s.'
  - type: text
    content: 'la volonté de Dieu, en effet, c''est qu''en faisant le bien vous réduisiez au silence l''ignorance des gens déraisonnables ; '
  '16':
  - type: note
    content: 'soyez  : litt. comme des hommes libres… –  liberté…  : cf. 1Co 10.23s ; 2P 2.19. –  un voile…  : litt. un voile de la malfaisance. –  esclaves  : cf. v. 18 ; voir aussi Rm 6.22 ; Ga 5.13.'
  - type: text
    content: 'soyez des hommes libres, sans faire de la liberté un voile pour couvrir la malfaisance : soyez des esclaves de Dieu. '
  '17':
  - type: note
    content: 'vos frères  : litt. la fraternité, au sens de la communauté des frères, comme en 5.9 ; cf. 1.22 ; Rm 12.10. – Voir crainte. –  Dieu / roi (v. 13n) : cf. Pr 24.21 ; Mc 12.17/ /.'
  - type: text
    content: Honorez tout le monde, aimez vos frères, craignez Dieu, honorez le roi.
  - type: heading
    content: Les esclaves chrétiens
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ep 5.22–6.9 ; Col 3.18–4.1. –  Domestiques  : il s''agit selon toute vraisemblance d''esclaves, mais le terme est différent de celui qui apparaît au v. 16 ; on le retrouve en Lc 16.13 ; Ac 10.7 ; Rm 14.4 ; cf. 1Co 7.21ss ; Ep 6.5ss ; Col 3.22ss ; 1Tm 6.1s ; Tt 2.9. –  crainte  : cf. 1.17n. –  conciliants  : autre traduction bienveillants Ph 4.5n.'
  - type: text
    content: 'Domestiques, soyez, en toute crainte, soumis à vos maîtres ; non pas seulement à ceux qui sont bons et conciliants, mais aussi à ceux qui sont difficiles ; '
  '19':
  - type: note
    content: 'c''est une grâce (1.10+) : certains comprennent ici le mot au sens plus faible  : c''est une belle chose, cf. Lc 6.32nss. –  par conscience de Dieu  : on comprend habituellement par motif de conscience envers Dieu, avec la conscience de ce qui est bon aux yeux de Dieu  ; cf. 3.16+ ; Rm 13.5. –  injustement  : voir justice.'
  - type: text
    content: car c'est une grâce que de supporter des peines par conscience de Dieu, quand on souffre injustement.
  '2':
  - type: note
    content: 'comme des enfants…  : cf. 1.14,23n  ; Mc 10.14s/ / ; Hymnes (Qumrân) 7.21s : « Ils (les justes) ont ouvert la bouche comme le nourrisson vers les mamelles de sa mère, et comme l''enfant qui se délecte dans le sein de ses nourriciers. » 9.35s : « Tu es un père pour tous tes fils de vérité ; et tu as mis ta joie en eux comme celle qui aime son nourrisson, et, tel un nourricier qui soutient l''enfant dans son sein, tu prends soin de toutes tes créatures. » –  aspirez…  : le verbe est habituellement traduit par souhaiter vivement, avoir une vive affection pour  ; cf. Rm 1.11 ; 15.23 ; 1Th 3.6 ; comparer avec Ps 42.2 ; 119.20,174. –  lait  : cf. 1Co 3.2 ; Hé 5.12s. –  non frelaté  : cf. 2Co 4.2. –  de la Parole  : voir Rm 12.1n.'
  - type: text
    content: 'comme des enfants nouveau-nés, aspirez au lait non frelaté de la Parole, afin que, par lui, vous croissiez pour le salut, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.14,17 ; 4.13s,19. – Voir gloire . –  à endurer de mauvais traitements ou à être battus (le même verbe est traduit par donner des coups de poing en Mt 26.67/ /, par frapper en 2Co 12.7) ; cf. 1Co 4.11.
  - type: text
    content: Quelle gloire y a-t-il, en effet, à endurer de mauvais traitements lorsqu'on a péché ? En revanche, si vous endurez la souffrance tout en faisant le bien, c'est une grâce devant Dieu.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'appelés 3.9. –  a souffert  : certains mss portent est mort  ; cf. 3.18n. –  vous ou nous , selon certains mss ( a souffert pour nous / nous laissant… ). –  exemple ou modèle Jn 13.15. –  que vous suiviez ses traces Mt 4.19 ; 16.24/ / ; cf. Rm 4.12+.'
  - type: text
    content: C'est à cela, en effet, que vous avez été appelés,
  - type: text
    content: parce que le Christ lui-même a souffert pour vous,
  - type: text
    content: vous laissant un exemple,
  - type: text
    content: 'afin que vous suiviez ses traces :'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Es 53.9  ; Jn 8.46+ ; 2Co 5.21 ; 1Jn 3.5 ; cf. Ac 8.32ss ; Rm 4.25.
  - type: text
    content: il n'a pas commis
  - type: text
    content: ' de péché,'
  - type: text
    content: et on n'a pas trouvé de ruse dans sa bouche ;
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'ne rendait pas l''insulte 3.9 ; Mt 5.39+ ; voir aussi Es 53.7 ; Mc 14.61 ; 15.5/ /. –  s''en remettait…  : cf. 4.19 ; le même verbe a ailleurs le sens de livrer (ainsi Mc 14.41s/ /) ; voir aussi Jr 11.19s ; Lc 23.46 ; Jn 8.50. –  juge 4.5,17s.'
  - type: text
    content: quand il était insulté, il ne rendait pas l'insulte ;
  - type: text
    content: quand il souffrait, il ne proférait pas de menaces,
  - type: text
    content: mais il s'en remettait à celui qui juge justement ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'porté nos péchés Es 53.4,12  ; Jn 1.29+ ; Rm 4.25 ; Hé 9.28. –  en son corps Col 1.22 ; Hé 10.10. –  sur le bois  : cf. Dt 21.22s ; Ga 3.13. –  morts aux péchés ou ayant rompu avec les péchés  ; cf. 4.1s ; Rm 6.2,11,18 (autres termes). –  ses meurtrissures… ou sa meurtrissure Es 53.5.'
  - type: text
    content: 'il a '
  - type: text
    content: lui-même porté nos péchés
  - type: text
    content: en son corps, sur le bois,
  - type: text
    content: afin que, morts aux péchés,
  - type: text
    content: nous vivions pour la justice ;
  - type: text
    content: 'et c''est '
  - type: text
    content: par ses meurtrissures
  - type: text
    content: ' que '
  - type: text
    content: vous avez été guéris
  - type: text
    content: .
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'comme des moutons… Es 53.6s  ; cf. Ez 34.5s,16 ; Mt 9.36. –  vous êtes retournés  : autre traduction vous avez été ramenés . –  celui qui est…  : autres traductions le berger et gardien de votre vie, le berger et gardien de vos âmes , cf. 1.9n. –  berger 5.4 ; Jn 10.11 ; Hé 13.20 ; cf. Za 13.7ss. –  gardien (terme apparenté à celui qui est traduit par veiller sur en 5.2 ; c''est celui qui a donné le mot évêque et qui est transcrit ailleurs épiscope ) : cf. Jb 10.12n  ; Ac 20.28n  ; Ph 1.1n  ; cf. Sagesse 1.6 : « Dieu est le témoin de ses reins, scrute son cœur selon la vérité et se tient à l''écoute de sa langue. »'
  - type: text
    content: 'Car vous étiez '
  - type: text
    content: comme des moutons qui s'égaraient,
  - type: text
    content: mais maintenant vous êtes retournés
  - type: text
    content: vers celui qui est votre berger et votre gardien.
  '3':
  - type: note
    content: 'la bonté du Seigneur  : litt. que le Seigneur est bon (le terme grec ressemble beaucoup à celui qui est transcrit Christ, cf. Mt 11.30n  ; Rm 2.4n  ; Phm 11n) Ps 34.9  ; cf. Hé 6.5.'
  - type: text
    content: 'si '
  - type: text
    content: vous avez goûté la bonté du Seigneur
  - type: text
    content: .
  - type: heading
    content: Un culte nouveau dans un temple nouveau
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Approchez-vous  : cf. Hé 4.16 ; 7.25 ; 10.22 ; 12.22. –  pierre  : cf. Dt 32.4+ ; Ps 18.3+ ; Mt 21.42+/ / ; voir aussi Mt 18.16 ; 1Co 3.16n  ; Ep 2.20 ; cf. Règle de la Communauté (Qumrân) 8.5ss : « Le Conseil de la Communauté sera affermi dans la vérité… c''est la Maison de sainteté pour Israël et la Société de suprême sainteté pour Aaron ; ils sont… les élus de la Bienveillance divine chargés d''expier pour la terre et de faire retomber les sanctions sur les impies. C''est le mur éprouvé, la pierre d''angle précieuse ; ses fondements ne trembleront pas ni ne s''enfuiront de leur place. C''est la Demeure de suprême sainteté pour Aaron… pour faire des offrandes d''agréable odeur. » 9.5s (description de la communauté selon le modèle du temple ?) : « En ce temps-là, on séparera les membres de la Communauté : la Maison de sainteté pour Aaron, afin que soit réunie la suprême sainteté, et la Maison de communauté pour Israël, pour ceux qui vont dans la perfection. » Florilège (Qumrân) 1.6s : « Il a ordonné qu''on lui construise un sanctuaire d''homme (hébreu ’adam  : on peut comprendre aussi bien “constitué d''hommes” que “fait par des hommes”) afin qu''ils y fassent fumer (comme l''encens) pour lui, devant lui, des œuvres de la loi » (c''est nous qui traduisons). –  vivante  : autre traduction vivifiante  : cf. Nb 20 ; Es 51.1s ; Ps 78.15s ; 105.41 ; Lc 19.40. –  choisie v. 6,9. –  précieuse  : terme apparenté à celui qui est rendu par honneur au v. 7 ; un autre terme apparenté est traduit par précieux en 1.19.'
  - type: text
    content: 'Approchez-vous de lui, pierre vivante, rejetée par les humains, certes, mais choisie et précieuse aux yeux de Dieu. '
  '5':
  - type: note
    content: 'Cf. v. 9+. –  construisez-vous  : autres traductions édifiez-vous ; vous êtes construits ; vous êtes édifiés  ; cf. v. 7 ; Ep 2.21s ; 4.12+ ; cf. Mt 16.18 ; 1Co 3.9ns. – Voir saint. –  sacerdoce  : autre traduction corps sacerdotal  ; voir prêtre. –  sacrifices spirituels  : cf. Rm 12.1 ; 15.16 ; Ph 2.17 ; 4.18 ; Hé 13.15+s ; voir aussi esprit.'
  - type: text
    content: 'Vous-mêmes, comme des pierres vivantes, construisez-vous pour former une maison spirituelle, un saint sacerdoce, afin d''offrir des sacrifices spirituels, agréés de Dieu, par Jésus-Christ ; '
  '6':
  - type: note
    content: Es 28.16  ; Rm 9.33 ; 10.11 ; cf. Za 10.4n.
  - type: text
    content: 'car voici ce qu''on trouve dans l''Ecriture :'
  - type: text
    content: Je vais poser en Sion une pierre angulaire, choisie, précieuse,
  - type: text
    content: et celui qui croit en elle ne sera jamais pris de honte
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'honneur  : cf. v. 4n,6 ; voir aussi v. 17 ; 1.7 ; 3.7. –  C''est la pierre… Ps 118.22  ; Mt 21.42/ /.'
  - type: text
    content: 'L''honneur est donc pour vous qui croyez. Mais, pour les gens sans foi : '
  - type: text
    content: C'est la pierre que les constructeurs ont rejetée qui est devenue la principale, celle de l'angle,
  - type: text
    content: ' '
  '8':
  - type: note
    content: Es 8.14  ; cf. Za 12.3 ; Dn 2.34 ; Rm 9.32 ; voir aussi Mt 16.23 ; Lc 2.34. –  en refusant d'obéir (ou de se fier) à la Parole 4.17 ; cf. 3.1,20.
  - type: text
    content: 'et : '
  - type: text
    content: une pierre d'achoppement, un rocher qui cause la chute
  - type: text
    content: . Ils s'y achoppent en refusant d'obéir à la Parole ; c'est aussi à cela qu'ils ont été destinés.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 19.5s ; Dt 7.6 ; 10.15 ; Es 43. 20 -21  ; Col 3.12. –  choisie v. 4,6. –  un sacerdoce royal  : on pourrait aussi comprendre une résidence royale, un sacerdoce  ; cf. v. 5n  ; Ap 1.6 ; 9.10. –  que Dieu s''est acquis  : litt. pour l''acquisition  ; cf. Ml 3.17 ; Ac 20.28 ; Ep 1.14n. –  les hauts faits  : autres traductions les louanges ; les vertus  ; sur le terme correspondant, voir 2P 1.3n  ; voir aussi Ac 2.11. –  des ténèbres… Ac 26.18 ; 2Co 4.6 ; Ep 5.8 ; Col 1.12s ; 1Th 5.4s.'
  - type: text
    content: 'Vous, par contre, vous êtes une lignée choisie, un sacerdoce royal, une nation sainte, un peuple que Dieu '
  - type: text
    content: s'est acquis,
  - type: text
    content: ' pour que vous annonciez '
  - type: text
    content: les hauts faits
  - type: text
    content: ' de celui qui vous a appelés des ténèbres à son étonnante lumière ; '
