    marker-yv: yv-n
  - type: text
    text: J'ai vu, d'autre part, toutes les oppressions qui se commettent sous le soleil ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les larmes des opprimés – et personne pour les consoler !
- type: usfm
  marker: q1
  children:
  - type: text
    text: la force du côté de leurs oppresseurs – et personne pour les consoler !
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
