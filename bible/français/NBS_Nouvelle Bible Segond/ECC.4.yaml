      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut une poignée de repos
- type: usfm
  marker: q1
  children:
  - type: text
    text: que deux poignées de travail et de poursuite du vent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mieux vaut être à deux que seul
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J''ai vu encore une autre futilité sous le soleil :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voilà un homme seul, sans personne d'autre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il y a un et il n'y a pas de second
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. Pr 18.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jamais rassasiés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'occupation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.13+. – Cf. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.4 : « Celui qui amasse en se privant lui-même amasse pour autrui ; avec ses biens d''autres vivront dans le luxe. »'
    marker-yv: yv-n
  - type: text
    text: voilà un homme seul, sans personne d'autre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'a ni fils ni frère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et pourtant son travail n''a pas de fin :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses propres yeux ne sont jamais rassasiés de richesses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Pour qui donc est-ce que je travaille et me prive de bonheur ? »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce n'est encore là qu'une futilité et une occupation funeste.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lc 10.1 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Siracide '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.14 : « Un ami fidèle est un abri sûr, qui l''a trouvé a trouvé un trésor. »'
    marker-yv: yv-n
  - type: text
    text: 'Deux valent mieux qu''un, parce qu''ils ont un bon salaire pour leur travail. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si l'un tombe, l'autre relève son compagnon ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais quel malheur pour celui qui est seul et qui tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans avoir un autre pour le relever !
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1R 1.1s.
    marker-yv: yv-n
  - type: text
    text: De même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si deux se couchent ensemble, ils ont chaud ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui est seul, comment se réchauffera-t-il ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la corde à trois brins…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : proverbe répandu dans l''Orient ancien (cf. « l''union fait la force »).'
    marker-yv: yv-n
  - type: text
    text: Si quelqu'un peut maîtriser un homme seul, deux peuvent lui résister ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la corde à trois brins ne se rompt pas vite.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A propos du pouvoir politique
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 9.15s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prendre conseil
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se contrôler, se laisser avertir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Pr 13.10 ; 24.5s.
    marker-yv: yv-n
  - type: text
    text: Mieux vaut un enfant pauvre mais sage
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'un roi vieux et stupide qui ne sait plus prendre conseil ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte obscur ; cf. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.5 : « Bien des tyrans se sont assis par terre, et celui que l''on n''attendait pas a porté le diadème. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on peut sortir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il est sorti '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(l''enfant ?). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans son propre royaume
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour exercer la royauté.
    marker-yv: yv-n
  - type: text
    text: car on peut sortir de prison pour régner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de même qu'on peut être né pauvre dans son propre royaume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui allait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le second qui se tenait à sa place
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; il y a peut-être ici allusion à un événement historique que nous ne sommes plus en mesure d'identifier ; cf. 2S 15.10-12 ; 2R 11.12.
    marker-yv: yv-n
  - type: text
    text: J'ai vu tous les vivants qui marchent sous le soleil
- type: usfm
  marker: q1
  children:
  - type: text
    text: se mettre du côté de l'enfant qui allait succéder à l'autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à tous ceux…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : traduction incertaine ; on pourrait aussi comprendre '
    - type: usfm
