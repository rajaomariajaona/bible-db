      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je déclare… heureux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
