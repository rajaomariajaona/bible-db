document_id: ECC.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mieux vaut être mort que vivant
  - type: text
    content: ' '
  - type: note
    content: '3.16+. –  qui se commettent  : litt. qui se font  ; cf. v. 3 ; 1.9,13s etc. –  la force…  : litt. de la main de leurs oppresseurs, force.'
  - type: text
    content: J'ai vu, d'autre part, toutes les oppressions qui se commettent sous le soleil ;
  - type: text
    content: les larmes des opprimés – et personne pour les consoler !
  - type: text
    content: la force du côté de leurs oppresseurs – et personne pour les consoler !
  '10':
  - type: text
    content: Car,
  - type: text
    content: si l'un tombe, l'autre relève son compagnon ;
  - type: text
    content: mais quel malheur pour celui qui est seul et qui tombe,
  - type: text
    content: sans avoir un autre pour le relever !
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1R 1.1s.
  - type: text
    content: De même,
  - type: text
    content: si deux se couchent ensemble, ils ont chaud ;
  - type: text
    content: mais celui qui est seul, comment se réchauffera-t-il ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'la corde à trois brins…  : proverbe répandu dans l''Orient ancien (cf. « l''union fait la force »).'
  - type: text
    content: Si quelqu'un peut maîtriser un homme seul, deux peuvent lui résister ;
  - type: text
    content: la corde à trois brins ne se rompt pas vite.
  - type: heading
    content: A propos du pouvoir politique
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.15s. –  prendre conseil  : autres traductions se contrôler, se laisser avertir  ; cf. Pr 13.10 ; 24.5s.'
  - type: text
    content: Mieux vaut un enfant pauvre mais sage
  - type: text
    content: qu'un roi vieux et stupide qui ne sait plus prendre conseil ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur ; cf. Siracide 11.5 : « Bien des tyrans se sont assis par terre, et celui que l''on n''attendait pas a porté le diadème. » –  on peut sortir  : litt. il est sorti (l''enfant ?). –  dans son propre royaume  : autre traduction pour exercer la royauté.'
  - type: text
    content: car on peut sortir de prison pour régner,
  - type: text
    content: de même qu'on peut être né pauvre dans son propre royaume.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'qui allait…  : litt. le second qui se tenait à sa place  ; il y a peut-être ici allusion à un événement historique que nous ne sommes plus en mesure d''identifier ; cf. 2S 15.10-12 ; 2R 11.12.'
  - type: text
    content: J'ai vu tous les vivants qui marchent sous le soleil
  - type: text
    content: se mettre du côté de l'enfant qui allait succéder à l'autre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'à tous ceux…  : traduction incertaine ; on pourrait aussi comprendre comme à tous ceux qui étaient auparavant . –  futilité / poursuite… 1.14+,17.'
  - type: text
    content: Il n'y avait pas de fin à toute cette foule,
  - type: text
    content: à tous ceux devant lesquels il se tenait.
  - type: text
    content: Toutefois, ceux qui viendront après ne se réjouiront pas à son sujet.
  - type: text
    content: Car cela aussi n'est que futilité et poursuite du vent.
  - type: heading
    content: Ne pas trop parler devant Dieu
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Prends garde à tes pas (litt. à ton pied ), c.-à-d. ne te précipite pas, n''agis pas à la légère  ; cf. Pr 19.2. –  approche  : autre traduction présente-toi  ; cf. Lv 1.2n. –  écouter Dt 5.1,27 ; 6.4 ; Pr 1.5,8 ; Jc 1.19. –  sacrifice 1S 15.22 ; Pr 21.3. –  car ils ne savent…  : traduction incertaine ; on pourrait aussi comprendre ils ne savent même pas faire le mal. Certains modifient le texte pour lire ils ne savent pas se retenir de faire le mal.'
  - type: text
    content: Prends garde à tes pas quand tu vas à la maison de Dieu ;
  - type: text
    content: approche pour écouter,
  - type: text
    content: plutôt que pour offrir le sacrifice des gens stupides ;
  - type: text
    content: car ils ne savent même pas qu'ils agissent mal.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'je déclare… heureux  : le même verbe est traduit par faire l''éloge de en 8.15.'
  - type: text
    content: 'Moi, je déclare les morts qui sont déjà morts plus heureux que les vivants qui sont encore en vie, '
  '3':
  - type: note
    content: 6.3 ; Jr 20.18 ; Jb 3.11-16+.
  - type: text
    content: mais plus que les uns et les autres celui qui n'a pas encore été et qui n'a pas vu l'œuvre mauvaise qui se fait sous le soleil.
  - type: heading
    content: Mieux vaut le repos que le travail
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'travail / futilité 1.2-3n  ; 2.11. –  jalousie  : le même terme est traduit par passion jalouse en 9.6. –  futilité / poursuite… v. 6,16 ; 1.14n.'
  - type: text
    content: J'ai vu que tout travail et tout succès d'une œuvre ne sont que jalousie de l'homme à l'égard de son prochain. Ce n'est encore là que futilité et poursuite du vent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'stupide 2.14+. –  se croise les bras  : d''autres comprennent embrasse à pleines mains , de façon à lire ici une critique de l''activité effrénée plutôt que de la paresse (cf. v. 4,6) ; cependant le v. 6 peut aussi être lu comme l''affirmation du paresseux. –  mange sa propre chair  : on pourrait comprendre cause son propre malheur  ; cf. Pr 6.10s.'
  - type: text
    content: L'homme stupide se croise les bras et mange sa propre chair.
  '6':
  - type: text
    content: ' '
  - type: note
    content: poignée et poignées traduisent deux expressions synonymes en hébreu. –  travail ou peine  ; cf. 1.3n.
  - type: text
    content: Mieux vaut une poignée de repos
  - type: text
    content: que deux poignées de travail et de poursuite du vent.
  - type: heading
    content: Mieux vaut être à deux que seul
  '7':
  - type: text
    content: 'J''ai vu encore une autre futilité sous le soleil :'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'voilà un homme seul, sans personne d''autre  : litt. il y a un et il n''y a pas de second  ; cf. Pr 18.1. –  jamais rassasiés 5.9. –  occupation 1.13+. – Cf. Siracide 14.4 : « Celui qui amasse en se privant lui-même amasse pour autrui ; avec ses biens d''autres vivront dans le luxe. »'
  - type: text
    content: voilà un homme seul, sans personne d'autre ;
  - type: text
    content: il n'a ni fils ni frère,
  - type: text
    content: 'et pourtant son travail n''a pas de fin :'
  - type: text
    content: ses propres yeux ne sont jamais rassasiés de richesses.
  - type: text
    content: « Pour qui donc est-ce que je travaille et me prive de bonheur ? »
  - type: text
    content: Ce n'est encore là qu'une futilité et une occupation funeste.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 10.1 ; Siracide 6.14 : « Un ami fidèle est un abri sûr, qui l''a trouvé a trouvé un trésor. »'
  - type: text
    content: 'Deux valent mieux qu''un, parce qu''ils ont un bon salaire pour leur travail. '
