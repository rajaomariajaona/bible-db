    marker-yv: yv-n
  - type: text
    text: J'ai vu que tout travail et tout succès d'une œuvre ne sont que jalousie de l'homme à l'égard de son prochain. Ce n'est encore là que futilité et poursuite du vent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'stupide '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.14+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se croise les bras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: embrasse à pleines mains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de façon à lire ici une critique de l''activité effrénée plutôt que de la paresse (cf. v. 4,6) ; cependant le v. 6 peut aussi être lu comme l''affirmation du paresseux. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mange sa propre chair
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : on pourrait comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cause son propre malheur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Pr 6.10s.
    marker-yv: yv-n
  - type: text
    text: L'homme stupide se croise les bras et mange sa propre chair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
