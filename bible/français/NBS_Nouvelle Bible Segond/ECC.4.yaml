    - type: usfm
      marker: fq
      children:
      - type: text
        text: jalousie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'passion jalouse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 9.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'futilité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'poursuite… '
    - type: usfm
      marker: ft
      children:
      - type: text
