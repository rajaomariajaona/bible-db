    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 8.15.
    marker-yv: yv-n
  - type: text
    text: 'Moi, je déclare les morts qui sont déjà morts plus heureux que les vivants qui sont encore en vie, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 6.3 ; Jr 20.18 ; Jb 3.11-16+.
    marker-yv: yv-n
  - type: text
    text: mais plus que les uns et les autres celui qui n'a pas encore été et qui n'a pas vu l'œuvre mauvaise qui se fait sous le soleil.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mieux vaut le repos que le travail
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
