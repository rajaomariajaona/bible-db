document_id: ACT.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul revient en Macédoine et en Grèce
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 16.40 ; 19.21s. –  les disciples 6.1+. –  encouragés ou exhortés v. 2,12 ; 11.23+. –  Macédoine  : cf. 16.9n  ; 1Co 16.5 ; 2Co 2.12s ; 7.5-7,13-16 ; 1Tm 1.3.'
  - type: text
    content: 'Lorsque l''agitation eut cessé, Paul fit venir les disciples ; après les avoir encouragés, il les salua et partit pour la Macédoine. '
  '10':
  - type: note
    content: 'Cf. 9.36-43 ; 1R 17.17-24 ; 2R 4.8-37. –  Ne vous agitez pas…  : cf. Mc 5.35-43. –  Il est vivant  : litt. sa vie (ou son âme, même terme v. 24 ; cf. Mt 10.28n) est en lui.'
  - type: text
    content: 'Alors Paul est descendu, s''est jeté sur lui et l''a pris dans ses bras ; puis il a dit : Ne vous agitez pas ! Il est vivant. '
  '11':
  - type: note
    content: 'Cf. 28.23. –  pour manger  : d''après une reconstitution, cette précision aurait été absente du texte occidental.'
  - type: text
    content: 'Quand il est remonté, il a rompu le pain pour manger, puis il a poursuivi l''entretien encore longtemps, jusqu''à l''aube. Après quoi il est parti. '
  '12':
  - type: note
    content: 'On a ramené…  : autre traduction ils ont ramené… Le principal ms témoin du texte occidental porte  : pendant qu''ils se saluaient, il (Paul) a ramené le jeune homme (litt. le garçon) vivant. –  un immense encouragement  : autre traduction une consolation sans mesure.'
  - type: text
    content: 'On a ramené le jeune homme vivant : ce fut un immense encouragement.'
  - type: heading
    content: De Troas à Milet
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Assos  : ville côtière à une trentaine de kilomètres au sud de Troas. –  parce qu''il voulait  : autre traduction parce qu''il devait . –  passer par la route  : autre traduction faire la route à pied.'
  - type: text
    content: 'Quant à nous, nous sommes partis en premier sur le bateau et nous avons fait voile vers Assos, où nous devions reprendre Paul : ainsi en avait-il décidé, parce qu''il voulait passer par la route. '
  '14':
  - type: note
    content: Mitylène, principale ville de l'île de Lesbos.
  - type: text
    content: 'Lorsqu''il nous a rejoints à Assos, nous l''avons pris à bord, pour aller à Mitylène. '
  '15':
  - type: note
    content: 'Chio / Samos  : autres îles de la mer Egée, au sud de Lesbos ; le texte occidental ajoute une autre escale à Trogyllion, ville côtière juste en face de Samos. –  Milet  : ville côtière, à une cinquantaine de kilomètres au sud d''Ephèse ; cf. 2Tm 4.20.'
  - type: text
    content: 'De là, continuant par la mer, nous sommes arrivés le lendemain devant Chio. Le jour suivant, nous touchions Samos, et le jour d''après, nous sommes parvenus à Milet. '
  '16':
  - type: note
    content: 'au large d''Ephèse  : cf. 18.21n  ; 19.23–20.1. –  Asie 16.6n. –  Pentecôte 2.1n  ; cf. 1Co 16.8 ; voir calendrier et fêtes.'
  - type: text
    content: 'En effet, Paul avait résolu de passer au large d''Ephèse, afin de ne pas perdre de temps en Asie : il se hâtait pour être à Jérusalem, si possible, le jour de la Pentecôte.'
  - type: heading
    content: Paul s'adresse aux anciens d'Ephèse
  '17':
  - type: text
    content: ' '
  - type: note
    content: les anciens de l'Eglise 11.30+.
  - type: text
    content: 'Cependant, de Milet, il envoya chercher à Ephèse les anciens de l''Eglise. '
  '18':
  - type: note
    content: 'depuis le premier jour…  : cf. 1S 12.2 ; Ph 1.5 ; Col 1.6 ; voir 1Th 1.5+. –  en Asie  : cf. 16.6n  ; 18.19. – Avec d''autres variantes mineures, le texte occidental ajoute à la fin du v. pendant trois ans environ ou même plus, cf. v. 31.'
  - type: text
    content: 'Lorsqu''ils furent arrivés auprès de lui, il leur dit :'
  - type: text
    content: 'Vous savez bien, vous, comment je me suis comporté avec vous tout le temps, depuis le premier jour, quand j''ai mis les pieds en Asie : '
  '19':
  - type: note
    content: 'comme un esclave  : cf. 2.18n  ; Rm 12.11+ ; Ep 6.7 ; Col 3.24 ; 1Th 1.9s. –  dans les larmes v. 31 ; 2Co 2.4 ; Ph 3.18. –  épreuves Lc 4.2+ ; 2Co 1.8ss. –  complots des Juifs  : v. 3 ; 9.24+ ; 2Co 11.24 ; 1Th 2.15s.'
  - type: text
    content: 'j''ai servi le Seigneur comme un esclave, en toute humilité, dans les larmes, au milieu des épreuves que me valaient les complots des Juifs. '
  '2':
  - type: note
    content: 'en Grèce  : probablement à Corinthe, d''où Paul a écrit l''épître aux Romains.'
  - type: text
    content: 'En passant par cette région, il y prodigua de nombreux encouragements, puis il se rendit en Grèce. '
  '20':
  - type: note
    content: 'Cf. 1S 12.3-5 ; 2Co 7.2 ; 1Th 2.1-12. –  Sans rien dissimuler v. 27. –  publiquement  : cf. 18.28.'
  - type: text
    content: 'Sans rien dissimuler, je vous ai annoncé et enseigné tout ce qui était utile, publiquement comme dans les maisons, '
  '21':
  - type: note
    content: 'adjurant  : le verbe signifie aussi témoigner, attester, rendre témoignage (v. 23s ; verbe apparenté v. 26) ; 2.40+. –  Juifs et Grecs 14.1+ ; 19.10. –  de changer radicalement…  : litt. le changement radical (ou la repentance, la conversion) pour Dieu et la foi pour (ou en) notre Seigneur… 2.38n  ; 10.43+ ; cf. 14.15 ; 16.31 ; 17.30 ; 26.18,20. –  notre Seigneur Jésus 1.21+.'
  - type: text
    content: adjurant Juifs et Grecs de changer radicalement, en se tournant vers Dieu, et de mettre leur foi en notre Seigneur Jésus.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'lié par l''Esprit  : cf. 19.21n  ; 21.11.'
  - type: text
    content: 'Moi, maintenant, lié par l''Esprit, je vais à Jérusalem, sans savoir ce qui m''y arrivera, '
  '23':
  - type: note
    content: l'Esprit saint m'atteste… 8.29+ ; cf. 9.16 ; 21.4,10-12,33. –  des liens, c.-à-d. la prison. –  détresses 11.19+.
  - type: text
    content: 'sinon que, d''après ce que l''Esprit saint m''atteste de ville en ville, des liens et des détresses m''y attendent. '
  '24':
  - type: note
    content: 'de ma propre vie  : cf. v. 10n  ; cf. 15.26 ; 21.13 ; Ph 1.23. –  je mène à bonne fin  : autres traductions j''achève, j''accomplisse  ; cf. Lc 13.32n. Certains mss occidentaux ajoutent avec joie. –  ma course  : cf. 13.25 ; 1Co 9.24-27 ; Ph 3.12-14 ; 2Tm 4.7. –  le ministère ou le service, cf. 26.16-18 ; 2Co 5.18. –  rendre témoignage  : le texte occidental précise devant Juifs et Grecs, cf. v. 21. –  de la grâce  : cf. v. 32.'
  - type: text
    content: 'Pourtant je ne fais aucun cas de ma propre vie, comme si elle m''était chère, pourvu que je mène à bonne fin ma course et le ministère que j''ai reçu du Seigneur Jésus : rendre témoignage à la bonne nouvelle de la grâce de Dieu.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'vous ne me reverrez plus  : litt. vous ne verrez plus ma face  ; cf. v. 38. –  le Règne 1.3+.'
  - type: text
    content: 'Maintenant je sais bien, moi, que vous ne me reverrez plus, vous tous parmi qui je suis passé en proclamant le Règne. '
  '26':
  - type: note
    content: je suis pur… 18.6+.
  - type: text
    content: 'C''est pourquoi je vous l''atteste aujourd''hui : je suis pur de votre sang à tous, '
  '27':
  - type: note
    content: 'V. 20. –  tout ce que Dieu a décidé  : autre traduction toutes les décisions de Dieu.'
  - type: text
    content: 'car je vous ai annoncé tout ce que Dieu a décidé, sans rien dissimuler. '
  '28':
  - type: note
    content: 'à vous-mêmes  : cf. Ga 6.1. –  le troupeau Lc 12.32+. –  parmi lequel  : autre traduction dans lequel. –  épiscopes  : le terme grec épiskopos signifie proprement surveillant, inspecteur  ; c''est lui qui donnera le mot évêque  ; il exprime ici la responsabilité commune des anciens, qui consiste à veiller sur l''Eglise comme des bergers (ou pasteurs) sur le troupeau ; cf. 1.20n  ; Ph 1.1 ; 1Tm 3.1ns. –  faites paître  : cf. Ep 4.11 ; Hé 13.20 ; 1P 2.25 ; 5.2nss. –  l''Eglise de Dieu  : certains mss portent l''Eglise du Seigneur, de Jésus-Christ, etc. ; cf. 5.11n  ; 9.31 ; 1Co 1.2 ; 2Co 1.1 ; Ep 5.25-27 ; 1Th 2.14 ; 2Th 1.4 ; 1Tm 3.5,15. –  qu''il s''est acquise Ps 74.1s ; Ep 1.14 ; 1P 2.9. –  son propre sang  : certains comprennent le sang de son propre (Fils)  ; cf. 5.28 ; Lc 22.20 ; Ep 1.7 ; 1P 1.2,19 ; expression analogue en Hé 9.12.'
  - type: text
    content: 'Prenez donc garde à vous-mêmes et à tout le troupeau parmi lequel l''Esprit saint vous a nommés épiscopes ; faites paître l''Eglise de Dieu, cette Eglise qu''il s''est acquise par son propre sang. '
  '29':
  - type: note
    content: Cf. Mc 13.22/ / ; 1Tm 4.1-7 ; 2Tm 3.1–4.4 ; 2P 2.1–3.18. –  des loups… Mt 7.15 ; 10.16 ; Jn 10.12.
  - type: text
    content: 'Je sais bien, moi, qu''après mon départ s''introduiront parmi vous des loups féroces qui n''épargneront pas le troupeau, '
  '3':
  - type: note
    content: 'Texte occidental  : Il voulut faire voile vers la Syrie (terme incluant peut-être la Judée, cf. 18.18n  ; 21.3 ; Rm 15.22-29)  ; mais l''Esprit lui dit de retourner par la Macédoine. –  complot 9.24+. – Voir Juifs.'
  - type: text
    content: 'Il y passa trois mois, et il allait faire voile vers la Syrie ; mais, à la suite d''un complot des Juifs contre lui, il préféra retourner par la Macédoine. '
  '30':
  - type: note
    content: 'd''entre vous-mêmes  : cf. 1Jn 2.19. –  qui diront des choses perverses 13.10. –  pour entraîner  : cf. Ga 4.17. –  à leur suite  : litt. derrière eux  ; cf. Mc 1.7n  ; 13.16/ /.'
  - type: text
    content: 'et que d''entre vous-mêmes se lèveront des hommes qui diront des choses perverses pour entraîner les disciples à leur suite. '
  '31':
  - type: note
    content: Veillez Mc 13.35,37/ /. –  trois ans 19.8-10+. –  dans les larmes v. 19+ ; cf. 1Th 2.10-12.
  - type: text
    content: Veillez donc, en vous souvenant que, pendant trois ans, nuit et jour, je n'ai cessé, dans les larmes, d'avertir chacun de vous.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'je vous confie à Dieu (ou au Seigneur , selon certains mss) 14.23. –  la parole de sa grâce  : cf. v. 24 ; 14.3+. –  qui a la puissance  : cf. Rm 16.25 ; 1P 1.5. –  construire ou édifier , cf. 9.31 ; 1Co 3.5-17 ; Ep 2.20-22 ; 1P 2.4-10. –  assurer un héritage (litt. donner l''héritage , cf. 7.5) …  : cf. 26.18 où un terme apparenté est traduit par part d''héritage  ; Ep 1.14,18+ ; 5.5 ; Col 1.12 ; 3.24 ; Hé 9.15 ; 1P 1.4. –  ceux qui sont consacrés ou qui sont sanctifiés, qui sont devenus saints  ; cf. 9.13+ ; Dt 33.3s ; Sagesse 5.5 : « Comment donc (le juste) a-t-il été admis au nombre des fils de Dieu et partage-t-il le sort des saints ? »'
  - type: text
    content: 'Et maintenant, je vous confie à Dieu et à la parole de sa grâce, qui a la puissance de construire et d''assurer un héritage parmi tous ceux qui sont consacrés. '
  '33':
  - type: note
    content: Cf. 1S 12.3 ; 1Co 9.12,15 ; 2Co 7.2 ; Jc 5.2s.
  - type: text
    content: 'Je n''ai désiré ni l''argent, ni l''or, ni les vêtements de personne. '
  '34':
  - type: note
    content: 18.3+ ; 1Th 2.9 ; 4.11 ; 2Th 3.8.
  - type: text
    content: 'Vous le savez vous-mêmes : ce sont ces mains-là qui ont pourvu à mes besoins et à ceux de mes compagnons. '
  '35':
  - type: note
    content: 'venir en aide aux faibles  : cf. Rm 14.1,20s ; 15.1 ; 1Co 8.7-10 ; 9.22 ; voir aussi 2Ch 28.15. –  les paroles du Seigneur  : cf. 11.16 ; 1Co 7.10,12,25 ; 11.23. –  Il y a plus de bonheur…  : cette parole de Jésus n''a pas été conservée dans les évangiles. Des aphorismes analogues reviennent souvent dans la littérature grecque ; Thucydide (Ve-IVe s. av. J.-C.) semble en attribuer un, très semblable, aux Perses ; cf. Mt 10.8 ; 14.19/ /.'
  - type: text
    content: 'En tout, je vous l''ai montré, c''est en travaillant ainsi qu''il faut venir en aide aux faibles, en se rappelant les paroles du Seigneur Jésus, qui a dit lui-même : Il y a plus de bonheur à donner qu''à recevoir.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 21.5s.
  - type: text
    content: 'Après avoir dit cela, il se mit à genoux pour prier avec eux tous. '
  '37':
  - type: note
    content: Cf. Gn 33.4 ; 45.14 ; Lc 15.20 ; Rm 16.16+. –  l'embrassaient Mc 14.45n.
  - type: text
    content: 'Tous, avec de grandes lamentations, se jetaient au cou de Paul et l''embrassaient ; '
  '38':
  - type: note
    content: ne le reverraient plus v. 25n. –  ils l'accompagnèrent 15.3n.
  - type: text
    content: ils étaient surtout attristés parce qu'il avait dit qu'ils ne le reverraient plus. Puis ils l'accompagnèrent jusqu'au bateau.
  '4':
  - type: note
    content: 'Le texte occidental ajoute au début du v. tandis qu''il allait partir. –  l''accompagner  : le texte occidental précise jusqu''en Asie  ; cf. 2Co 8.16–9.5. –  Sopater ou Sosipater, d''après certains mss ; cf. Rm 16.21. –  Bérée 17.10. –  Aristarque 19.29+. –  Gaïos de Derbé  : le texte occidental a lu de Dobérès en Macédoine, cf. 19.29+. –  Timothée 16.1+. –  Tychique Ep 6.21 ; Col 4.7 ; 2Tm 4.12 ; Tt 3.12 ; texte occidental les Ephésiens Eutyque ( ?) et Trophime (v. 9 ; 21.29 ; 2Tm 4.20). –  Asie 16.6n.'
  - type: text
    content: 'Il avait pour l''accompagner Sopater, fils de Pyrrhos, de Bérée, Aristarque et Secundus de Thessalonique, Gaïos de Derbé, Timothée, ainsi que Tychique et Trophime, qui étaient originaires d''Asie. '
  '5':
  - type: note
    content: nous 16.10n. –  Troas 16.8n.
  - type: text
    content: 'Ceux-ci sont partis en avant et nous ont attendus à Troas. '
  '6':
  - type: note
    content: 'Pains sans levain 12.3+ ; cf. 16.3 ; 27.9 ; 1Co 5.7 ; 16.8. Voir calendrier et fêtes. –  à Philippes  : sans doute à Néapolis, le port de Philippes. –  sept jours 21.4 ; 28.14.'
  - type: text
    content: Quant à nous, après les jours des Pains sans levain, nous avons embarqué à Philippes ; au bout de cinq jours nous les avons rejoints à Troas, où nous avons séjourné sept jours.
  - type: heading
    content: Visite d'adieu à Troas
  '7':
  - type: text
    content: ' '
  - type: note
    content: Le premier jour de la semaine , c.-à-d. le dimanche ; cf. Mc 16.2n  ; Lc 24.1/ / ; 1Co 16.2+. –  pour rompre le pain 2.42n  ; cf. 1Co 11.23-25. –  discutait 17.2n  ; cf. 13.1-4 ; 1Co 14.
  - type: text
    content: 'Le premier jour de la semaine, nous étions rassemblés pour rompre le pain. Paul, qui allait partir le lendemain, discutait avec les assistants, et il a prolongé son discours jusqu''au milieu de la nuit '
  '8':
  - type: note
    content: la chambre à l'étage 1.13n.
  - type: text
    content: '– il y avait beaucoup de lampes dans la chambre à l''étage où nous étions rassemblés. '
  '9':
  - type: note
    content: 'du troisième étage ou, selon certains, du deuxième étage (selon que l''on compte ou non le rez-de-chaussée pour un étage). –  Quand on a voulu…  : litt. et fut relevé mort.'
  - type: text
    content: 'Mais un jeune homme nommé Eutyque, qui était assis sur le bord de la fenêtre, a été pris d''un profond sommeil pendant que Paul prolongeait la discussion ; entraîné par le sommeil, il est tombé du troisième étage. Quand on a voulu le relever, il était mort. '
