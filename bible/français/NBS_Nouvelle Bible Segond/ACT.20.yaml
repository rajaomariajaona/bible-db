      text: 'En tout, je vous l''ai montré, c''est en travaillant ainsi qu''il faut venir en aide aux faibles, en se rappelant les paroles du Seigneur Jésus, qui a dit lui-même : Il y a plus de bonheur à donner qu''à recevoir.'
