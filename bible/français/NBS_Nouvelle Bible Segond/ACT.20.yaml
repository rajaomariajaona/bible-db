      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.5 : « Comment donc (le juste) a-t-il été admis au nombre des fils de Dieu et partage-t-il le sort des saints ? »'
      marker-yv: yv-n
    - type: text
      text: 'Et maintenant, je vous confie à Dieu et à la parole de sa grâce, qui a la puissance de construire et d''assurer un héritage parmi tous ceux qui sont consacrés. '
