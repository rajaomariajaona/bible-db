document_id: ACT.20,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul revient en Macédoine et en Grèce
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 16.40 ; 19.21s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les disciples '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'encouragés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'exhortés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2,12 ; 11.23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Macédoine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 16.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Co 16.5 ; 2Co 2.12s ; 7.5-7,13-16 ; 1Tm 1.3.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque l''agitation eut cessé, Paul fit venir les disciples ; après les avoir encouragés, il les salua et partit pour la Macédoine. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.36-43 ; 1R 17.17-24 ; 2R 4.8-37. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne vous agitez pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mc 5.35-43. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il est vivant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sa vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son âme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même terme v. 24 ; cf. Mt 10.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est en lui.
      marker-yv: yv-n
    - type: text
      text: 'Alors Paul est descendu, s''est jeté sur lui et l''a pris dans ses bras ; puis il a dit : Ne vous agitez pas ! Il est vivant. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 28.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour manger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après une reconstitution, cette précision aurait été absente du texte occidental.'
      marker-yv: yv-n
    - type: text
      text: 'Quand il est remonté, il a rompu le pain pour manger, puis il a poursuivi l''entretien encore longtemps, jusqu''à l''aube. Après quoi il est parti. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On a ramené…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils ont ramené… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le principal ms témoin du texte occidental porte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pendant qu''ils se saluaient, il (Paul) a ramené '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le jeune homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le garçon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vivant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un immense encouragement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une consolation sans mesure.
      marker-yv: yv-n
    - type: text
      text: 'On a ramené le jeune homme vivant : ce fut un immense encouragement.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: De Troas à Milet
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Assos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ville côtière à une trentaine de kilomètres au sud de Troas. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parce qu'il voulait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parce qu'il devait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: passer par la route
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faire la route à pied.
      marker-yv: yv-n
    - type: text
      text: 'Quant à nous, nous sommes partis en premier sur le bateau et nous avons fait voile vers Assos, où nous devions reprendre Paul : ainsi en avait-il décidé, parce qu''il voulait passer par la route. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mitylène
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', principale ville de l''île de Lesbos.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''il nous a rejoints à Assos, nous l''avons pris à bord, pour aller à Mitylène. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Chio '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Samos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres îles de la mer Egée, au sud de Lesbos ; le texte occidental ajoute une autre escale à Trogyllion, ville côtière juste en face de Samos. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Milet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ville côtière, à une cinquantaine de kilomètres au sud d''Ephèse ; cf. 2Tm 4.20.'
      marker-yv: yv-n
    - type: text
      text: 'De là, continuant par la mer, nous sommes arrivés le lendemain devant Chio. Le jour suivant, nous touchions Samos, et le jour d''après, nous sommes parvenus à Milet. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au large d'Ephèse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 19.23–20.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Asie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pentecôte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 1Co 16.8 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes.'
      marker-yv: yv-n
    - type: text
      text: 'En effet, Paul avait résolu de passer au large d''Ephèse, afin de ne pas perdre de temps en Asie : il se hâtait pour être à Jérusalem, si possible, le jour de la Pentecôte.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul s'adresse aux anciens d'Ephèse
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
        - type: text
          text: ' de l''Eglise '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.30+.
      marker-yv: yv-n
    - type: text
      text: 'Cependant, de Milet, il envoya chercher à Ephèse les anciens de l''Eglise. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis le premier jour…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 12.2 ; Ph 1.5 ; Col 1.6 ; voir 1Th 1.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en Asie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.19. – Avec d''autres variantes mineures, le texte occidental ajoute à la fin du v. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pendant trois ans environ ou même plus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 31.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''ils furent arrivés auprès de lui, il leur dit :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous savez bien, vous, comment je me suis comporté avec vous tout le temps, depuis le premier jour, quand j''ai mis les pieds en Asie : '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme un esclave
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Rm 12.11+ ; Ep 6.7 ; Col 3.24 ; 1Th 1.9s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans les larmes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 31 ; 2Co 2.4 ; Ph 3.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'épreuves '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lc 4.2+ ; 2Co 1.8ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'complots des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : v. 3 ; 9.24+ ; 2Co 11.24 ; 1Th 2.15s.'
      marker-yv: yv-n
    - type: text
      text: 'j''ai servi le Seigneur comme un esclave, en toute humilité, dans les larmes, au milieu des épreuves que me valaient les complots des Juifs. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en Grèce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement à Corinthe, d''où Paul a écrit l''épître aux Romains.'
      marker-yv: yv-n
    - type: text
      text: 'En passant par cette région, il y prodigua de nombreux encouragements, puis il se rendit en Grèce. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1S 12.3-5 ; 2Co 7.2 ; 1Th 2.1-12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sans rien dissimuler '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: publiquement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.28.'
      marker-yv: yv-n
    - type: text
      text: 'Sans rien dissimuler, je vous ai annoncé et enseigné tout ce qui était utile, publiquement comme dans les maisons, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: adjurant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe signifie aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'témoigner, attester, rendre témoignage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 23s ; verbe apparenté v. 26) ; 2.40+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Juifs et Grecs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.1+ ; 19.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de changer radicalement…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: changement
        - type: text
          text: ' radical '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la repentance, la conversion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour Dieu et la foi pour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'notre Seigneur… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 10.43+ ; cf. 14.15 ; 16.31 ; 17.30 ; 26.18,20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'notre Seigneur Jésus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.21+.
      marker-yv: yv-n
    - type: text
      text: adjurant Juifs et Grecs de changer radicalement, en se tournant vers Dieu, et de mettre leur foi en notre Seigneur Jésus.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lié par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
