      - type: text
        text: '3.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abner devint fort dans la maison de Saül
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Abner soutint la maison de Saül.
    marker-yv: yv-n
  - type: text
    text: Pendant la guerre entre la maison de Saül et la maison de David, Abner devint fort dans la maison de Saül.
