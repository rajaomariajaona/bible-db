      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une concubine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 5.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ritspa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 21.8-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fille d'Aya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ajoutent ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et Abner alla avec elle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui équivalait à revendiquer la succession du roi défunt ; cf. 16.21s ; 1R 2.17-22.'
    marker-yv: yv-n
  - type: text
    text: 'Saül avait eu une concubine, nommée Ritspa, fille d''Aya. Or Ish-Bosheth dit à Abner : Pourquoi es-tu allé avec la concubine de mon père ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une tête de chien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Abner est bien une '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tête
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chef
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais il refuse d''être traité avec mépris par Ish-Bosheth ('
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'était une injure ; cf. 9.8 ; 16.9 ; 1S 17.43 ; 24.15). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: appartenant à Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Abner prétend avoir suffisamment montré son attachement à la dynastie de Saül et son hostilité à l''égard de David, qui règne sur la tribu de Juda. Les mots correspondants sont absents de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'livré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 9.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Très fâché par les propos d''Ish-Bosheth, Abner répondit : Suis-je une tête de chien appartenant à Juda ? Aujourd''hui, j''agis avec fidélité envers la maison de Saül, ton père, envers ses frères et ses compagnons, je ne t''ai pas livré à David, et c''est aujourd''hui que tu me demandes des comptes pour une faute avec cette femme ? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Que Dieu…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 3.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le serment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 15.28 ; 16.1 ; 28.17.'
    marker-yv: yv-n
  - type: text
    text: 'Que Dieu me fasse ceci et qu''il y ajoute cela, si je n''agis pas envers David selon le serment que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a fait à David '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: depuis Dan jusqu'à Bersabée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 3.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'de retirer la royauté à la maison de Saül et d''établir le trône de David sur Israël et sur Juda, depuis Dan jusqu''à Bersabée. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il avait peur de lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : tout roi qu''il est, Ish-Bosheth sait bien que le pouvoir réel est entre les mains d''Abner.'
    marker-yv: yv-n
  - type: text
    text: Ish-Bosheth n'osa pas répliquer un seul mot à Abner, parce qu'il avait peur de lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abner conclut une alliance avec David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'A qui appartient le pays ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'à cette question, deux réponses sont possibles ; soit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il t'appartient, à toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon le serment rappelé aux v. 9s ('
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et je vais donc t'aider à concrétiser cette situation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; soit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il nous appartient, en partie à toi et en partie à moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et je vais faire en sorte que ceux qui dépendent de mon autorité passent sous la tienne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je ferai en sorte…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ma main (sera) avec toi pour tourner vers toi tout Israël.
    marker-yv: yv-n
  - type: text
    text: 'Abner envoya des messagers à David, pour lui dire de sa part : A qui appartient le pays ? Et encore : Conclus ton alliance avec moi, et je ferai en sorte que tout Israël se rallie à toi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne parais pas en ma présence…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu ne verras pas ma face à moins que tu n'amènes devant moi Mikal, fille de Saül, quand tu viendras pour voir ma face
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 14.24 ; Gn 33.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mikal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 18.20-28.'
    marker-yv: yv-n
  - type: text
    text: 'David répondit : D''accord ! Je conclurai une alliance avec toi. Je te demande une seule chose : ne parais pas en ma présence sans amener Mikal, fille de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Seul '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ish-Bosheth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', en tant que roi et frère de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mikal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', peut exiger de celle-ci qu''elle rejoigne son premier mari, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: David.
    marker-yv: yv-n
  - type: text
