document_id: 2SA.3,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'entre la maison de Saül et la maison de David  : c.-à-d. entre les partisans du fils de Saül et ceux de David . –  de plus en plus fort  : cf. Ps 84.6-8 ; Jb 17.9. –  en s''affaiblissant  : cf. 1 Maccabées 6.57 : « Nous nous affaiblissons chaque jour davantage. »'
  - type: text
    content: La guerre dura longtemps entre la maison de Saül et la maison de David. David devenait de plus en plus fort, et la maison de Saül allait en s'affaiblissant.
  - type: heading
    content: Les fils de David nés à Hébron
  - type: heading
    content: 1Ch 3.1-4
  '10':
  - type: note
    content: 'depuis Dan jusqu''à Bersabée  : cf. 1S 3.20n.'
  - type: text
    content: 'de retirer la royauté à la maison de Saül et d''établir le trône de David sur Israël et sur Juda, depuis Dan jusqu''à Bersabée. '
  '11':
  - type: note
    content: 'il avait peur de lui  : tout roi qu''il est, Ish-Bosheth sait bien que le pouvoir réel est entre les mains d''Abner.'
  - type: text
    content: Ish-Bosheth n'osa pas répliquer un seul mot à Abner, parce qu'il avait peur de lui.
  - type: heading
    content: Abner conclut une alliance avec David
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'A qui appartient le pays ? à cette question, deux réponses sont possibles ; soit il t''appartient, à toi , selon le serment rappelé aux v. 9s ( et je vais donc t''aider à concrétiser cette situation ) ; soit il nous appartient, en partie à toi et en partie à moi ( et je vais faire en sorte que ceux qui dépendent de mon autorité passent sous la tienne ). Voir alliance . –  je ferai en sorte…  : litt. ma main (sera) avec toi pour tourner vers toi tout Israël.'
  - type: text
    content: 'Abner envoya des messagers à David, pour lui dire de sa part : A qui appartient le pays ? Et encore : Conclus ton alliance avec moi, et je ferai en sorte que tout Israël se rallie à toi. '
  '13':
  - type: note
    content: 'ne parais pas en ma présence…  : litt. tu ne verras pas ma face à moins que tu n''amènes devant moi Mikal, fille de Saül, quand tu viendras pour voir ma face, cf. 14.24 ; Gn 33.10n. –  Mikal  : cf. 1S 18.20-28.'
  - type: text
    content: 'David répondit : D''accord ! Je conclurai une alliance avec toi. Je te demande une seule chose : ne parais pas en ma présence sans amener Mikal, fille de Saül. '
  '14':
  - type: note
    content: Seul Ish-Bosheth, en tant que roi et frère de Mikal, peut exiger de celle-ci qu'elle rejoigne son premier mari, David.
  - type: text
    content: 'David envoya des messagers à Ish-Bosheth, fils de Saül, pour lui dire : Donne-moi ma femme Mikal, avec qui je me suis fiancé pour cent prépuces de Philistins. '
  '15':
  - type: note
    content: 'Paltiel  : appelé Palti en 1S 25.44.'
  - type: text
    content: 'Ish-Bosheth l''envoya prendre chez son mari, Paltiel, fils de Laïsh ; '
  '16':
  - type: note
    content: 'Bahourim  : localité située à quelques kilomètres à l''est de Jérusalem ; cf. 16.5 ; 17.18 ; 19.17. –  Allez, rentre chez toi…  : litt. va, retourne. Et il retourna.'
  - type: text
    content: 'son mari la suivit jusqu''à Bahourim en pleurant. Alors Abner lui dit : Allez, rentre chez toi ! Et il rentra chez lui.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'toujours  : litt. même hier, même avant-hier  ; voir Gn 31.2n  ; Ex 4.10n  ; 1S 4.7n  ; 21.6.'
  - type: text
    content: 'Abner adressa ce message aux anciens d''Israël : Vous avez toujours désiré avoir David comme roi ; '
  '18':
  - type: note
    content: On ne trouve pas ailleurs cette affirmation du Seigneur  ; elle permet néanmoins à Abner de jouer sur le nom d’Israël, pour amadouer ses interlocuteurs.
  - type: text
    content: 'maintenant agissez, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit de lui : « C''est par l''intermédiaire de David, mon serviteur, que je sauverai Israël, mon peuple, de la main des Philistins et de la main de tous ses ennemis. » '
  '19':
  - type: note
    content: 'à Benjamin  : litt. aux oreilles de Benjamin, c.-à-d. aux Benjaminites  ; de même plus loin aux oreilles de David  ; les Benjaminites constituent la tribu de Saül ; cf. 1S 10.20s. –  ce qu''avaient résolu  : litt. ce qui était bon aux yeux de, formule qu''on pourrait aussi rendre, selon la traduction habituelle, par ce qui plaisait à.'
  - type: text
    content: 'Abner parla aussi à Benjamin, et il se rendit à Hébron pour dire à David ce qu''avaient résolu Israël et toute la maison de Benjamin. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Des fils  : cf. Ps 127.3. –  Amnon 13.1-39.'
  - type: text
    content: 'Des fils naquirent de David à Hébron. Son premier-né fut Amnon, d''Ahinoam la Jizréélite ; '
  '20':
  - type: note
    content: 'donna un banquet  : cf. Jg 14.10.'
  - type: text
    content: 'Abner arriva auprès de David, à Hébron, avec vingt hommes ; David donna un banquet pour Abner et pour les hommes qui étaient avec lui. '
  '21':
  - type: note
    content: 'sur tout ce que tu désires  : autres traductions sur tout ce que ton âme (cf. Gn 1.20n) désire ; exactement comme tu le désires  ; cf. 1R 11.37n.'
  - type: text
    content: 'Abner dit à David : Je vais partir pour rassembler tout Israël sous ton autorité, ô roi, mon seigneur ; ils concluront une alliance avec toi, et tu régneras sur tout ce que tu désires. David laissa partir Abner, qui s''en alla en paix.'
  - type: heading
    content: Joab assassine Abner
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'd''une expédition  : le mot hébreu pourrait aussi être rendu par d''un raid  ; en 1S 30.8,15, il désignait la troupe pratiquant des raids ou des razzias.'
  - type: text
    content: 'Les hommes de David et Joab revenaient d''une expédition, ramenant un grand butin. Abner n''était plus auprès de David à Hébron, car David l''avait laissé partir, et il s''en était allé en paix. '
  '23':
  - type: text
    content: 'Lorsque arrivèrent Joab et toute l''armée qui était avec lui, on dit à Joab : Abner, fils de Ner, est venu auprès du roi, qui l''a laissé partir, et il s''en est allé en paix. '
  '24':
  - type: text
    content: 'Joab se rendit chez le roi et dit : Qu''as-tu fait ? Abner est venu te voir ; pourquoi l''as-tu laissé partir et s''en aller librement ? '
  '25':
  - type: note
    content: 'pour te duper  : cf. 10.3 ; Gn 42.9,12. –  tes plans de campagne  : litt. ta sortie et ta rentrée, cf. 1S 18.5n,6n,13.'
  - type: text
    content: 'Tu connais Abner, fils de Ner ! C''est pour te duper qu''il est venu, pour connaître tes plans de campagne, pour savoir tout ce que tu fais. '
  '26':
  - type: note
    content: 'citerne de Sira  : point d''eau dans le désert, non identifié, probablement au nord d''Hébron.'
  - type: text
    content: 'Joab, après avoir quitté David, envoya sur les traces d''Abner des messagers qui le ramenèrent depuis la citerne de Sira, à l''insu de David. '
  '27':
  - type: note
    content: 'à l''intérieur de la porte  : la porte désigne le passage aménagé dans la large muraille de fortification d''une ville ancienne du Proche-Orient ; Joab y attire Abner à l''abri des regards. –  tranquillement  : cf. Pr 26.24-26. –  le tua d''un coup au ventre  : litt. il le frappa au ventre, 2.23n  ; 4.6 ; 20.10 ; cf. 1R 2.5 ; Ac 1.18. –  Asaël  : ici le nom est orthographié comme un nom composé dans le texte hébreu traditionnel, Asa-’El, de même en 23.24 ; 1Ch 2.16+ ; sur sa mort, cf. 2.18-23.'
  - type: text
    content: Lorsque Abner fut de retour à Hébron, Joab l'attira à l'écart, à l'intérieur de la porte de la ville, pour lui parler tranquillement, et là il le tua d'un coup au ventre, pour venger le sang d'Asaël, son frère.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'innocent  : cf. 14.9 ; Jos 2.19 ; Jon 1.14 ; Daniel grec 13.46 : « Je suis innocent du sang de celle-ci. » Cf. Nb 35.33.'
  - type: text
    content: 'Quand David l''apprit, par la suite, il dit : Je suis pour toujours innocent, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', du sang d''Abner, fils de Ner, et mon règne l''est aussi. '
  '29':
  - type: note
    content: 'Qu''il retombe sur  : cf. 1.16n  ; il s''agit du sang versé, c.-à-d. du meurtre d''Abner. –  toute sa famille  : litt. toute la maison de son père. –  Qu''il y ait toujours  : litt. que ne soit pas retranché. Le v. énumère cinq malheurs qui devraient frapper sans interruption la maison de Joab… écoulement génital ou maladie honteuse (cf. Lv 15 pour une description clinique) ; lèpre (cf. Lv 13.2nss) ; descendant qui manie le fuseau (c.-à-d., peut-être, réduit à la condition d''une femme  ; mais on a aussi compris qui s''appuie sur un bâton, c.-à-d. atteint de faiblesse) ; qui tombe par l''épée (victime de la guerre) ; qui manque de pain (victime de la famine).'
  - type: text
    content: 'Qu''il retombe sur la tête de Joab et sur toute sa famille ! Qu''il y ait toujours dans la maison de Joab quelqu''un qui soit atteint d''un écoulement génital ou de la « lèpre », ou qui manie le fuseau, ou qui tombe par l''épée, ou qui manque de pain ! '
  '3':
  - type: note
    content: 'Kiléab  : appelé Dalouia dans LXX, Caleb dans Syr, et Daniel dans le texte parallèle de 1Ch 3.1 ; il n''est jamais mentionné ailleurs. –  Abigaïl  : cf. 1S 25. –  femme de Nabal  : absent de LXX. –  Absalom  : autre transcription traditionnelle Absalon  ; cf. 14.1–19.9. –  Gueshour  : petit royaume syrien, s''étendant à l''est de la mer de Kinnéreth, ou lac de Galilée.'
  - type: text
    content: 'le deuxième, Kiléab, d''Abigaïl, femme de Nabal, le Carmélite ; le troisième, Absalom, fils de Maaka, fille de Talmaï, roi de Gueshour ; '
  '30':
  - type: note
    content: Abishaï n'a pas participé activement au meurtre d'Abner (v. 27), mais il est néanmoins présenté comme complice de Joab.
  - type: text
    content: – Joab et Abishaï, son frère, avaient tué Abner parce qu'il avait mis à mort Asaël, leur frère, dans la bataille de Gabaon.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Déchirez… / mettez un sac… / lamentez-vous…  : trois rites de deuil traditionnels, cf. 1.2,11s ; 1S 4.12n  ; voir aussi 1R 21.27+. –  la civière  : litt. le lit , où reposait le corps du défunt.'
  - type: text
    content: 'David dit à Joab et à tout le peuple qui était avec lui : Déchirez vos vêtements, mettez un sac pour pagne et lamentez-vous sur Abner ! Puis le roi David se mit en marche derrière la civière. '
  '32':
  - type: note
    content: 'se mit à sangloter  : cf. 1S 11.4n.'
  - type: text
    content: 'On ensevelit Abner à Hébron. Le roi se mit à sangloter sur le tombeau d''Abner, et tout le peuple pleura. '
  '33':
  - type: note
    content: 'une complainte  : cf. 1.17-27. –  un fou  : cf. Nb 23.10 ; Pr 14.32 ; le mot hébreu correspondant est employé comme nom propre (symbolique) en 1S 25.3,25.'
  - type: text
    content: 'Le roi entonna une complainte sur Abner ; il dit :'
  - type: text
    content: Abner devait-il mourir comme meurt un fou ?
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'des entraves de bronze  : litt. des (doubles) bronzes  ; cf. Jg 16.21n  ; 2R 25.7 ; Jr 39.7. –  des injustes  : litt. des fils d''injustice  ; voir justice.'
  - type: text
    content: Tes mains n'étaient pas liées,
  - type: text
    content: ni tes pieds engagés dans des entraves de bronze !
  - type: text
    content: Comme on tombe devant des injustes,
  - type: text
    content: ainsi tu es tombé.
  - type: text
    content: 'Alors tout le peuple pleura de nouveau sur Abner. '
  '35':
  - type: note
    content: 'manger  : litt. manger du pain, comme dans la suite ; cf. 12.17. –  Que Dieu…  : cf. 1S 3.17n. –  avant le coucher du soleil  : le jeûne de toute la journée est un rite de deuil. Cf. 1.12 ; Jg 20.26 ; 1S 14.24.'
  - type: text
    content: 'Tout le peuple pressait David de manger pendant qu''il faisait encore jour ; mais David fit ce serment : Que Dieu me fasse ceci et qu''il y ajoute cela, si je goûte du pain ou quoi que ce soit d''autre avant le coucher du soleil ! '
  '36':
  - type: note
    content: David a fait ainsi la démonstration qu'il ne porte aucune responsabilité dans la mort d'Abner.
  - type: text
    content: 'Cela fut remarqué et plut à tout le peuple ; tout ce que le roi faisait plaisait à tout le peuple. '
  '37':
  - type: text
    content: 'Tout le peuple, tout Israël, sut ainsi, en ce jour-là, que ce n''était pas par ordre du roi qu''Abner, fils de Ner, avait été mis à mort. '
  '38':
  - type: note
    content: 'un prince, un grand prince  : cf. 1S 26.15.'
  - type: text
    content: 'Le roi dit aux gens de sa cour : Ne savez-vous pas qu''en ce jour un prince, un grand prince, est tombé en Israël ? '
  '39':
  - type: note
    content: 'Aujourd''hui, je suis délicat, j''ai reçu l''onction royale  : David affirme que, ayant reçu l''onction royale, il ne peut pas se permettre d''agir avec violence (contrairement aux fils de Tserouya). Mais on pourrait aussi traduire aujourd''hui, je suis faible, bien que j''aie reçu l''onction royale (parce que je n''ai pas encore l''expérience du pouvoir ; cf. 1R 3.6-9). –  trop durs pour moi  : autre traduction plus durs que moi. –  Que le Seigneur … le mal ! cf. 1R 2.5s,33 ; Es 3.11 ; Ps 28.4 ; 62.13 ; 2Tm 4.14.'
  - type: text
    content: 'Aujourd''hui, je suis délicat, j''ai reçu l''onction royale ; et ces hommes, les fils de Tserouya, sont trop durs pour moi. Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' paie de retour celui qui fait le mal selon son mal !'
  '4':
  - type: note
    content: 'Adonias  : cf. 1R 1.1–2.25. –  Shephatia  : ce fils n''est mentionné que dans le texte parallèle de 1Ch 3.3.'
  - type: text
    content: 'le quatrième, Adonias, fils de Hagguith ; le cinquième, Shephatia, fils d''Abital ; '
  '5':
  - type: note
    content: 'Yitréam  : ce fils n''est mentionné que dans le texte parallèle de 1Ch 3.3.'
  - type: text
    content: et le sixième, Yitréam, d'Egla femme de David. Voilà ceux qui naquirent de David à Hébron.
  - type: heading
    content: Abner se brouille avec Ish-Bosheth
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Abner devint fort dans la maison de Saül  : on pourrait aussi comprendre Abner soutint la maison de Saül.'
  - type: text
    content: Pendant la guerre entre la maison de Saül et la maison de David, Abner devint fort dans la maison de Saül.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'une concubine  : cf. 5.13n. –  Ritspa  : cf. 21.8-11. –  fille d''Aya  : certains mss de LXX ajoutent ici et Abner alla avec elle , ce qui équivalait à revendiquer la succession du roi défunt ; cf. 16.21s ; 1R 2.17-22.'
  - type: text
    content: 'Saül avait eu une concubine, nommée Ritspa, fille d''Aya. Or Ish-Bosheth dit à Abner : Pourquoi es-tu allé avec la concubine de mon père ? '
  '8':
  - type: note
    content: 'une tête de chien  : Abner est bien une tête, c.-à-d. un chef, mais il refuse d''être traité avec mépris par Ish-Bosheth (chien était une injure ; cf. 9.8 ; 16.9 ; 1S 17.43 ; 24.15). –  appartenant à Juda  : Abner prétend avoir suffisamment montré son attachement à la dynastie de Saül et son hostilité à l''égard de David, qui règne sur la tribu de Juda. Les mots correspondants sont absents de LXX. –  livré Gn 9.2n.'
  - type: text
    content: 'Très fâché par les propos d''Ish-Bosheth, Abner répondit : Suis-je une tête de chien appartenant à Juda ? Aujourd''hui, j''agis avec fidélité envers la maison de Saül, ton père, envers ses frères et ses compagnons, je ne t''ai pas livré à David, et c''est aujourd''hui que tu me demandes des comptes pour une faute avec cette femme ? '
  '9':
  - type: note
    content: 'Que Dieu…  : cf. 1S 3.17n. –  le serment  : cf. 1S 15.28 ; 16.1 ; 28.17.'
  - type: text
    content: 'Que Dieu me fasse ceci et qu''il y ajoute cela, si je n''agis pas envers David selon le serment que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait à David '
