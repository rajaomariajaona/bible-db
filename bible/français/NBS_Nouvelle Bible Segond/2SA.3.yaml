      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Adonias
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 1.1–2.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shephatia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce fils n''est mentionné que dans le texte parallèle de 1Ch 3.3.'
    marker-yv: yv-n
  - type: text
    text: 'le quatrième, Adonias, fils de Hagguith ; le cinquième, Shephatia, fils d''Abital ; '
  - type: usfm
    marker: v
