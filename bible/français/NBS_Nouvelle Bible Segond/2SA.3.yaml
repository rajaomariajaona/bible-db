        text: Absalon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 14.1–19.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gueshour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : petit royaume syrien, s''étendant à l''est de la mer de Kinnéreth, ou lac de Galilée.'
    marker-yv: yv-n
  - type: text
    text: 'le deuxième, Kiléab, d''Abigaïl, femme de Nabal, le Carmélite ; le troisième, Absalom, fils de Maaka, fille de Talmaï, roi de Gueshour ; '
  - type: usfm
    marker: v
