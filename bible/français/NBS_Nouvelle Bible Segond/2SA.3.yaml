    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yitréam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce fils n''est mentionné que dans le texte parallèle de 1Ch 3.3.'
    marker-yv: yv-n
  - type: text
    text: et le sixième, Yitréam, d'Egla femme de David. Voilà ceux qui naquirent de David à Hébron.
- type: usfm
  marker: s1
