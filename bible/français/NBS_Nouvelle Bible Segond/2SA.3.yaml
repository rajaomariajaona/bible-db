    marker-yv: yv-n
  - type: text
    text: 'Qu''il retombe sur la tête de Joab et sur toute sa famille ! Qu''il y ait toujours dans la maison de Joab quelqu''un qui soit atteint d''un écoulement génital ou de la « lèpre », ou qui manie le fuseau, ou qui tombe par l''épée, ou qui manque de pain ! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abishaï '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: n'a pas participé activement au meurtre d'Abner (v. 27), mais il est néanmoins présenté comme complice de Joab.
    marker-yv: yv-n
  - type: text
    text: – Joab et Abishaï, son frère, avaient tué Abner parce qu'il avait mis à mort Asaël, leur frère, dans la bataille de Gabaon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Déchirez… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mettez un sac… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lamentez-vous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : trois rites de deuil traditionnels, cf. 1.2,11s ; 1S 4.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 1R 21.27+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la civière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le lit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', où reposait le corps du défunt.'
    marker-yv: yv-n
  - type: text
    text: 'David dit à Joab et à tout le peuple qui était avec lui : Déchirez vos vêtements, mettez un sac pour pagne et lamentez-vous sur Abner ! Puis le roi David se mit en marche derrière la civière. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se mit à sangloter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 11.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'On ensevelit Abner à Hébron. Le roi se mit à sangloter sur le tombeau d''Abner, et tout le peuple pleura. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une complainte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.17-27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un fou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 23.10 ; Pr 14.32 ; le mot hébreu correspondant est employé comme nom propre (symbolique) en 1S 25.3,25.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi entonna une complainte sur Abner ; il dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Abner devait-il mourir comme meurt un fou ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des entraves de bronze
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des (doubles) bronzes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Jg 16.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2R 25.7 ; Jr 39.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des injustes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' d''injustice'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Tes mains n'étaient pas liées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni tes pieds engagés dans des entraves de bronze !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme on tombe devant des injustes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi tu es tombé.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors tout le peuple pleura de nouveau sur Abner. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: manger
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: manger du pain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme dans la suite ; cf. 12.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Que Dieu…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 3.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avant le coucher du soleil
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le jeûne de toute la journée est un rite de deuil. Cf. 1.12 ; Jg 20.26 ; 1S 14.24.'
    marker-yv: yv-n
  - type: text
    text: 'Tout le peuple pressait David de manger pendant qu''il faisait encore jour ; mais David fit ce serment : Que Dieu me fasse ceci et qu''il y ajoute cela, si je goûte du pain ou quoi que ce soit d''autre avant le coucher du soleil ! '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David a fait ainsi la démonstration qu'il ne porte aucune responsabilité dans la mort d'Abner.
    marker-yv: yv-n
  - type: text
    text: 'Cela fut remarqué et plut à tout le peuple ; tout ce que le roi faisait plaisait à tout le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tout le peuple, tout Israël, sut ainsi, en ce jour-là, que ce n''était pas par ordre du roi qu''Abner, fils de Ner, avait été mis à mort. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un prince, un grand prince
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 26.15.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi dit aux gens de sa cour : Ne savez-vous pas qu''en ce jour un prince, un grand prince, est tombé en Israël ? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.39 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aujourd''hui, je suis délicat, j''ai reçu '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'onction
      - type: text
        text: ' royale'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : David affirme que, ayant '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: reçu l'onction royale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', il ne peut pas se permettre d''agir avec violence (contrairement aux '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fils de Tserouya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). Mais on pourrait aussi traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aujourd''hui, je suis faible, bien que j''aie reçu l''onction royale '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(parce que je n''ai pas encore l''expérience du pouvoir ; cf. 1R 3.6-9). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trop durs pour moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: plus durs que moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' … le mal ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 1R 2.5s,33 ; Es 3.11 ; Ps 28.4 ; 62.13 ; 2Tm 4.14.
    marker-yv: yv-n
  - type: text
    text: 'Aujourd''hui, je suis délicat, j''ai reçu l''onction royale ; et ces hommes, les fils de Tserouya, sont trop durs pour moi. Que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' paie de retour celui qui fait le mal selon son mal !'
