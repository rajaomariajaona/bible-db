verses:
  '1':
  - type: heading
    content: Louange universelle
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur  : le nom divin YHWH est ici écrit en entier et non sous l''abréviation Yah (v. 2 ; 104.35n). –  toutes, nations 22.28ss ; 47.2 ; 72.11s ; 100.1ss ; Rm 15.11.'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous toutes, nations !'
  - type: text
    content: Faites son éloge, vous tous, peuples !
  '2':
  - type: text
    content: ' '
  - type: note
    content: sa fidélité… 103.11n. –  la loyauté… 100.5. –  Louez le Seigneur 104.35n.
  - type: text
    content: Car sa fidélité envers nous est puissante,
  - type: text
    content: 'et la loyauté du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est pour toujours.'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
