  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prescriptions concernant les prêtres
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L'holocauste
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'quelque chose de levé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.11+.
      marker-yv: yv-n
    - type: text
      text: 'On ne le fera pas cuire avec quelque chose de levé. C''est la part que je leur ai donnée sur mes offrandes consumées par le feu. C''est une chose très sacrée, comme le sacrifice pour le péché, comme le sacrifice de réparation. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tout mâle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 22 ; 7.6 ; cf. 10.14 ; 22.12s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prescription
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: générations
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout ce qui entrera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quiconque les touchera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'consacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rendu sacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 20 ; 5.2+ ; Es 65.5.'
      marker-yv: yv-n
    - type: text
      text: 'Ce sera tout mâle parmi les fils d''Aaron qui en mangera. C''est une prescription perpétuelle, pour toutes vos générations, au sujet des offrandes consumées par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : tout ce qui entrera en contact avec elles sera consacré.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'présent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le jour où il recevra '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dès le jour où il recevra l'onction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 4.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 8.1-36 ; Ex 29.21 ; Nb 7.10,84. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en offrande végétale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 2.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: constante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ou bien tous les jours à compter de son onction (cf. Nb 4.16), ou bien seulement ce jour-là avec le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: ' constant.'
      marker-yv: yv-n
    - type: text
      text: 'Voici le présent d''Aaron et de ses fils, celui qu''ils présenteront au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' le jour où il recevra l''onction : un dixième d''épha de fleur de farine, en offrande végétale constante, moitié le matin et moitié le soir. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'poêle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mélangée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cuite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent des mots rares dont le sens est incertain (autre possibilité '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: imprégnée / émiettée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Elle sera préparée à la poêle avec de l''huile, et tu l''apporteras mélangée ; tu la présenteras comme une offrande végétale cuite en morceaux, comme une odeur agréable pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parmi ses fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 10.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a reçu l'onction…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout entière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 33.10 ; Ps 51.21.'
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre qui, parmi ses fils, a reçu l''onction pour lui succéder fera cette offrande. C''est une prescription perpétuelle pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; on la fera fumer tout entière. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 23 ; 4.3-12.
      marker-yv: yv-n
    - type: text
      text: 'Toute offrande végétale d''un prêtre sera entière : on ne la mangera pas.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le sacrifice pour le péché
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Aaron et à ses '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: ' pour le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacrée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Dis à Aaron et à ses fils : Voici la loi concernant le sacrifice pour le péché. C''est dans le lieu où on immole l''holocauste qu''on immolera aussi, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le sacrifice pour le péché ; c''est une chose très sacrée. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le mangera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Os 4.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''est le prêtre qui offrira le sacrifice pour le péché qui le mangera ; on le mangera dans un lieu sacré, dans la cour de la tente de la Rencontre. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Aaron et à ses '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit dans les chap. 6–7 des droits et des devoirs des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' (7.35s) en rapport avec les différentes catégories de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: ' définies dans les chap. 1–5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: holocauste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ex 29.38-42.'
      marker-yv: yv-n
    - type: text
      text: 'Donne cet ordre à Aaron et à ses fils : Voici la loi concernant l''holocauste. L''holocauste restera sur le foyer de l''autel toute la nuit, jusqu''au matin ; le feu de l''autel y brûlera. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ag 2.11-13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu laveras…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ou, d''après des versions anciennes, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''endroit… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. la tache) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sera lavé.
      marker-yv: yv-n
    - type: text
      text: 'Tout ce qui entrera en contact avec sa viande sera consacré. Si un vêtement est aspergé de son sang, tu laveras dans un lieu sacré l''endroit qui en aura été aspergé. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 11.32s.
      marker-yv: yv-n
    - type: text
      text: 'Le récipient de terre dans lequel elle aura cuit, on le brisera ; si c''est dans un récipient de bronze qu''elle a cuit, on le récurera et on le rincera avec de l''eau. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ce sera tout mâle parmi les prêtres qui en mangera : c''est une chose très sacrée.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.5s,16 ; 10.18 ; cf. Hé 13.11. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: expiation
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais on ne mangera d''aucun sacrifice pour le péché dont on apporte du sang dans la tente de la Rencontre, pour faire l''expiation dans le sanctuaire : celui-là sera jeté au feu.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ez 44.17s ; à propos des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: caleçons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le texte hébreu précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur sa '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui est peut-être un euphémisme comme en 15.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Ex 20.26 ; 28.42.'
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre revêtira sa tunique de lin et mettra des caleçons de lin ; il prélèvera les cendres grasses produites par le feu qui aura dévoré l''holocauste sur l''autel, et il les déposera près de l''autel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Ez 44.19.'
      marker-yv: yv-n
    - type: text
      text: 'Puis il quittera ses vêtements et mettra d''autres vêtements pour emporter les cendres grasses hors du camp, dans un lieu pur. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.24+ ; d''après une tradition rapportée en '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.18-36, lors de l'exil à Babylone les prêtres auraient caché ce feu perpétuel, et on l'aurait retrouvé à l'époque de Néhémie sous forme de pétrole (« naphte ») qui se serait enflammé aux rayons du soleil.
      marker-yv: yv-n
    - type: text
      text: 'Le feu brûlera sur l''autel, il ne s''éteindra pas. Chaque matin, le prêtre y allumera du bois, disposera l''holocauste par-dessus et fera fumer la graisse des sacrifices de paix. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
