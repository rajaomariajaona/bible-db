document_id: LEV.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prescriptions concernant les prêtres
  - type: heading
    content: L'holocauste
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: quelque chose de levé 2.11+.
  - type: text
    content: 'On ne le fera pas cuire avec quelque chose de levé. C''est la part que je leur ai donnée sur mes offrandes consumées par le feu. C''est une chose très sacrée, comme le sacrifice pour le péché, comme le sacrifice de réparation. '
  '11':
  - type: note
    content: 'tout mâle v. 22 ; 7.6 ; cf. 10.14 ; 22.12s. –  prescription  : voir loi. – Voir générations. –  tout ce qui entrera…  : autre traduction quiconque les touchera. –  consacré ou rendu sacré, cf. v. 20 ; 5.2+ ; Es 65.5.'
  - type: text
    content: 'Ce sera tout mâle parmi les fils d''Aaron qui en mangera. C''est une prescription perpétuelle, pour toutes vos générations, au sujet des offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : tout ce qui entrera en contact avec elles sera consacré.'
  '12':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '13':
  - type: note
    content: 'présent 1.2n. –  le jour où il recevra l''onction  : autre traduction dès le jour où il recevra l''onction  ; cf. 4.3n  ; 8.1-36 ; Ex 29.21 ; Nb 7.10,84. –  en offrande végétale (cf. 2.1n) constante  : ou bien tous les jours à compter de son onction (cf. Nb 4.16), ou bien seulement ce jour-là avec le sacrifice constant.'
  - type: text
    content: 'Voici le présent d''Aaron et de ses fils, celui qu''ils présenteront au '
  - type: text
    content: Seigneur
  - type: text
    content: ' le jour où il recevra l''onction : un dixième d''épha de fleur de farine, en offrande végétale constante, moitié le matin et moitié le soir. '
  '14':
  - type: note
    content: poêle 2.5n. –  mélangée et cuite traduisent des mots rares dont le sens est incertain (autre possibilité imprégnée / émiettée).
  - type: text
    content: 'Elle sera préparée à la poêle avec de l''huile, et tu l''apporteras mélangée ; tu la présenteras comme une offrande végétale cuite en morceaux, comme une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '15':
  - type: note
    content: 'parmi ses fils  : cf. Dt 10.6. –  a reçu l''onction…  : cf. 4.3n. –  tout entière  : cf. Dt 33.10 ; Ps 51.21.'
  - type: text
    content: 'Le prêtre qui, parmi ses fils, a reçu l''onction pour lui succéder fera cette offrande. C''est une prescription perpétuelle pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; on la fera fumer tout entière. '
  '16':
  - type: note
    content: Cf. v. 23 ; 4.3-12.
  - type: text
    content: 'Toute offrande végétale d''un prêtre sera entière : on ne la mangera pas.'
  - type: heading
    content: Le sacrifice pour le péché
  '17':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '18':
  - type: note
    content: 'à Aaron et à ses fils  : voir prêtre. –  sacrifice pour le péché 4.1+. –  sacrée  : voir saint.'
  - type: text
    content: 'Dis à Aaron et à ses fils : Voici la loi concernant le sacrifice pour le péché. C''est dans le lieu où on immole l''holocauste qu''on immolera aussi, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le sacrifice pour le péché ; c''est une chose très sacrée. '
  '19':
  - type: note
    content: 'le mangera  : cf. Os 4.8n.'
  - type: text
    content: 'C''est le prêtre qui offrira le sacrifice pour le péché qui le mangera ; on le mangera dans un lieu sacré, dans la cour de la tente de la Rencontre. '
  '2':
  - type: note
    content: 'à Aaron et à ses fils  : il s''agit dans les chap. 6–7 des droits et des devoirs des prêtres (7.35s) en rapport avec les différentes catégories de sacrifices définies dans les chap. 1–5. –  holocauste  : cf. 1.3n  ; voir aussi Ex 29.38-42.'
  - type: text
    content: 'Donne cet ordre à Aaron et à ses fils : Voici la loi concernant l''holocauste. L''holocauste restera sur le foyer de l''autel toute la nuit, jusqu''au matin ; le feu de l''autel y brûlera. '
  '20':
  - type: note
    content: 'Cf. Ag 2.11-13. –  tu laveras…  : ou, d''après des versions anciennes, l''endroit… (c.-à-d. la tache) sera lavé.'
  - type: text
    content: 'Tout ce qui entrera en contact avec sa viande sera consacré. Si un vêtement est aspergé de son sang, tu laveras dans un lieu sacré l''endroit qui en aura été aspergé. '
  '21':
  - type: note
    content: Cf. 11.32s.
  - type: text
    content: 'Le récipient de terre dans lequel elle aura cuit, on le brisera ; si c''est dans un récipient de bronze qu''elle a cuit, on le récurera et on le rincera avec de l''eau. '
  '22':
  - type: text
    content: 'Ce sera tout mâle parmi les prêtres qui en mangera : c''est une chose très sacrée.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 4.5s,16 ; 10.18 ; cf. Hé 13.11. – Voir expiation.
  - type: text
    content: 'Mais on ne mangera d''aucun sacrifice pour le péché dont on apporte du sang dans la tente de la Rencontre, pour faire l''expiation dans le sanctuaire : celui-là sera jeté au feu.'
  '3':
  - type: note
    content: lin ou peut-être toile, cf. Ez 44.17s ; à propos des caleçons, le texte hébreu précise sur sa chair, ce qui est peut-être un euphémisme comme en 15.2n  ; cf. Ex 20.26 ; 28.42.
  - type: text
    content: 'Le prêtre revêtira sa tunique de lin et mettra des caleçons de lin ; il prélèvera les cendres grasses produites par le feu qui aura dévoré l''holocauste sur l''autel, et il les déposera près de l''autel. '
  '4':
  - type: note
    content: 4.12n  ; cf. Ez 44.19.
  - type: text
    content: 'Puis il quittera ses vêtements et mettra d''autres vêtements pour emporter les cendres grasses hors du camp, dans un lieu pur. '
  '5':
  - type: note
    content: Cf. 9.24+ ; d'après une tradition rapportée en 2 Maccabées 1.18-36, lors de l'exil à Babylone les prêtres auraient caché ce feu perpétuel, et on l'aurait retrouvé à l'époque de Néhémie sous forme de pétrole (« naphte ») qui se serait enflammé aux rayons du soleil.
  - type: text
    content: 'Le feu brûlera sur l''autel, il ne s''éteindra pas. Chaque matin, le prêtre y allumera du bois, disposera l''holocauste par-dessus et fera fumer la graisse des sacrifices de paix. '
  '6':
  - type: text
    content: Le feu brûlera constamment sur l'autel, il ne s'éteindra pas.
  - type: heading
    content: L'offrande végétale
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Voir loi. –  offrande végétale 2.1n. –  fils d''Aaron  : voir prêtre.'
  - type: text
    content: 'Voici la loi concernant l''offrande végétale. Les fils d''Aaron doivent la présenter devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', face à l''autel. '
  '8':
  - type: note
    content: 'de l''huile  : litt. de son huile, cf. 2.2n. –  l''encens 2.1n. –  en évocation 2.2n.'
  - type: text
    content: 'Le prêtre prélèvera sur l''offrande végétale une poignée de fleur de farine, de l''huile, avec tout l''encens ajouté à l''offrande végétale, et il fera fumer cela sur l''autel en évocation, comme une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '9':
  - type: note
    content: 'sans levain  : autre traduction en pains sans levain  ; cf. 10.12. –  dans un lieu sacré v. 19 ; 10.13-14n  ; 24.9 ; cf. 1Co 10.18 ; voir saint.'
  - type: text
    content: 'Ce qui en restera, ce sont Aaron et ses fils qui le mangeront ; on le mangera sans levain ; c''est dans un lieu sacré, dans la cour de la tente de la Rencontre, qu''ils le mangeront. '
