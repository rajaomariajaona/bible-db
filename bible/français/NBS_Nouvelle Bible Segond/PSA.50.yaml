document_id: PSA.50,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu paraît pour prononcer son jugement
  - type: text
    content: ' '
  - type: note
    content: 'Asaph 73–83 ; cf. Esd 2.41 ; 3.10 ; Né 7.44 ; 1Ch 6.24-28 ; 15.17 ; 16.4s,37 ; 25.1s ; 2Ch 5.12 ; 35.15. –  Dieu, Dieu  : hébreu ’El (Gn 21.33n) ’Elohim (cf. Gn 1.1n) ; voir Jos 22.22 ; des versions anciennes ont compris le Dieu des dieux (cf. Dt 10.17). –  convoque la terre Es 1.2. –  depuis le soleil levant… 113.3 ; Es 59.19 ; Ml 1.11.'
  - type: text
    content: Psaume. D'Asaph.
  - type: text
    content: 'Dieu, Dieu, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), parle et convoque la terre,'
  - type: text
    content: depuis le soleil levant jusqu'au couchant.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'par milliers  : traduction incertaine, d''après des versions anciennes ; LXX a compris avec les bœufs  ; certains modifient le texte hébreu traditionnel pour lire sur les montagnes de Dieu (36.7).'
  - type: text
    content: Car tous les animaux de la forêt sont à moi,
  - type: text
    content: toutes les bêtes des montagnes, par milliers ;
  '11':
  - type: text
    content: je connais tous les oiseaux des montagnes,
  - type: text
    content: et tout ce qui se meut dans les champs m'appartient.
  '12':
  - type: text
    content: ' '
  - type: note
    content: le monde m'appartient… 24.1n  ; cf. 1Co 10.26.
  - type: text
    content: Si j'avais faim, je ne te le dirais pas,
  - type: text
    content: car le monde m'appartient, avec tout ce qui s'y trouve.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 69.32. –  taureaux 22.13n.
  - type: text
    content: Est-ce que je mange la viande des taureaux ?
  - type: text
    content: Est-ce que je bois le sang des boucs ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 116.17s ; Jon 2.10. –  En sacrifice…  : autre traduction possible offre à Dieu un sacrifice de reconnaissance  ; de même au v. 23 ; cf. 26.7n  ; 56.13n  ; 69.31 ; Os 14.3 ; Hé 13.15. –  acquitte-toi de tes vœux 22.26+ ; Dt 23.22 ; Jb 22.27 ; Ec 5.3s ; Mt 6.33.'
  - type: text
    content: En sacrifice à Dieu, offre la reconnaissance ;
  - type: text
    content: acquitte-toi de tes vœux envers le Très-Haut.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 91.15 ; Jr 33.3 ; Jc 5.13. –  jour de la détresse 9.10+.
  - type: text
    content: 'Invoque-moi au jour de la détresse :'
  - type: text
    content: je te délivrerai, et tu me glorifieras.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Tu énumères mes prescriptions  : autre traduction tu publies mes décrets (2.7n) ; cf. Dt 6.6-9 ; Es 29.13ss. Voir loi.'
  - type: text
    content: 'Et Dieu dit au méchant :'
  - type: text
    content: Quoi donc ? Tu énumères mes prescriptions,
  - type: text
    content: et tu as mon alliance à la bouche,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'l''instruction  : autre traduction la correction  ; cf. Jr 5.3+ ; Pr 1.2n  ; 15.10. –  qui rejettes  : cf. 1R 14.9 ; Ez 23.35 ; Né 9.26.'
  - type: text
    content: toi qui détestes l'instruction,
  - type: text
    content: et qui rejettes mes paroles derrière toi !
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 7.9 ; Os 4.2 ; Rm 2.21s.
  - type: text
    content: Si tu vois un voleur, tu te plais avec lui,
  - type: text
    content: et ta part est avec les adultères.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 14.3 ; Pr 10.11 ; 15.28.
  - type: text
    content: Tu livres ta bouche au mal,
  - type: text
    content: et ta langue tisse la tromperie.
  '2':
  - type: text
    content: ' '
  - type: note
    content: De Sion… 48.3+. –  paraît dans sa splendeur ou resplendit, brille  ; même verbe en 80.2 ; 94.1 ; Dt 33.2 ; Jb 3.4 ; 10.3 ; 37.15.
  - type: text
    content: De Sion, beauté parfaite,
  - type: text
    content: Dieu paraît dans sa splendeur.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. 101.5 ; Jr 9.3s.
  - type: text
    content: Tu t'assieds et tu parles contre ton frère,
  - type: text
    content: tu diffames le fils de ta mère.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'que j''étais comme toi  : traduction incertaine, litt. tu t''es imaginé être je suis (Ex 3.14n) comme toi  ; cf. Nb 23.19 ; Os 11.9.'
  - type: text
    content: Voilà ce que tu as fait, et j'ai gardé le silence.
  - type: text
    content: Tu t'es imaginé que j'étais comme toi,
  - type: text
    content: mais je vais te faire des reproches et tout exposer sous tes yeux.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'que je ne déchire…  : le même verbe est traduit par déchiqueter en 7.3 ; 17.12 ; cf. Os 5.14.'
  - type: text
    content: Comprenez donc cela, je vous prie, vous qui oubliez Dieu,
  - type: text
    content: de peur que je ne déchire, sans que personne délivre.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Voir gloires. –  et à celui  : litt. qui place (prépare ?) sa voie  ; autres textes, d''après certains mss hébreux et des versions anciennes  : telle est la voie de celui à qui je ferai voir…  ; ou, selon d''autres versions à celui dont la voie est intègre , comme en Pr 13.6 ; ces leçons correspondraient à une variante d''une seule lettre en hébreu. –  je ferai voir… 91.16.'
  - type: text
    content: Celui qui, en sacrifice, offre la reconnaissance me glorifie,
  - type: text
    content: et à celui qui veille sur sa voie
  - type: text
    content: je ferai voir le salut de Dieu.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Il vient Es 59.20 ; 63.19. –  il ne garde pas le silence  : autre traduction il ne reste pas sans rien faire  ; cf. 83.2 ; Es 65.6. –  un feu  : cf. 18.9 ; 97.3 ; Dt 32.22 ; Es 30.27 ; 66.15 ; Dn 7.10. –  tempête 18.13 ; Ha 3.4 ; Jb 38.1 ; 40.6 ; voir aussi 1R 19.11-13.'
  - type: text
    content: Il vient, notre Dieu, il ne garde pas le silence ;
  - type: text
    content: devant lui c'est un feu dévorant,
  - type: text
    content: autour de lui une violente tempête.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Dt 31.28 ; 32.1 ; Es 1.2 ; Mi 1.2 ; 6.2.
  - type: text
    content: Il crie vers le ciel, en haut,
  - type: text
    content: 'et vers la terre, pour juger son peuple :'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 24.4-8 ; So 1.7. –  qui concluent  : cf. Gn 15.17n,18n  ; Jr 34.18n.'
  - type: text
    content: Rassemblez-moi mes fidèles,
  - type: text
    content: qui concluent mon alliance sur sacrifice !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Le ciel…  : cf. 19.2 ; 97.6. –  dira  : autre traduction racontera. –  c''est Dieu qui est juge 7.12+ ; 75.8 ; 94.2 ; Es 33.22 ; Jb 9.15 ; 23.7.'
  - type: text
    content: Le ciel dira sa justice,
  - type: text
    content: 'car c''est Dieu qui est juge. '
  - type: text
    content: Pause.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ecoute… 78.1 ; 81.9n  ; Dt 6.4 ; Os 4.1 ; Am 3.13. –  Je suis… ton Dieu 81.11 ; Ex 20.2.
  - type: text
    content: Ecoute, mon peuple, et je parlerai ;
  - type: text
    content: Israël, je témoignerai contre toi.
  - type: text
    content: Je suis Dieu, ton Dieu.
  '8':
  - type: text
    content: Ce n'est pas pour tes sacrifices que je te fais des reproches ;
  - type: text
    content: tes holocaustes sont constamment devant moi.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Je ne prendrai pas ou je ne recevrai pas  ; cf. 40.7 ; 51.18s ; voir Es 1.11+.
  - type: text
    content: Je ne prendrai pas un taureau de ta maison,
  - type: text
    content: ni des boucs de tes bergeries.
