      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Jos 10.6.'
    marker-yv: yv-n
  - type: text
    text: 'Pendant la nuit, Paul eut une vision. Un Macédonien était là, debout, qui le suppliait : Passe en Macédoine, viens à notre secours ! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
