      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : il s''agit de la région d''Ephèse, sur la côte ouest de l''Asie Mineure (6.9 ; 19.1,10,22,26s ; 20.4,16,18 ; 21.27 ; 24.19). –  '
    - type: usfm
      marker: fq
