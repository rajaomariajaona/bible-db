      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais Paul cria : Ne te fais pas de mal, nous sommes tous ici ! '
  - type: usfm
    marker: v
    metadata:
