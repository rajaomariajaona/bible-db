      marker: fr
      children:
      - type: text
        text: '16.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 2.46 ; 8.8+,39. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chez lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans la maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se réjouit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
