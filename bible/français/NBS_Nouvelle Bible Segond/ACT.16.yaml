      marker: fr
      children:
      - type: text
        text: '16.33 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: A ce moment…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à cette heure-là de la nuit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aussitôt '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le même terme est traduit par '
    - type: usfm
