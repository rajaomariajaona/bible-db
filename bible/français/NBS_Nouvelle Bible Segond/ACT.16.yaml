    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 31.'
    marker-yv: yv-n
  - type: text
    text: Il les fit monter chez lui, dressa la table et se réjouit avec toute sa maison d'avoir cru Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Texte occidental
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Quand il fit jour, les magistrats se réunirent sur la place publique et, saisis de crainte au souvenir du tremblement de terre qui avait eu lieu, ils envoyèrent les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'licteurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (fonctionnaires subalternes qui exécutaient les décisions des préteurs, v. 20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au geôlier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cette précision est sous-entendue dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Relâche ces gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains témoins du texte occidental ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que tu as reçus hier.
    marker-yv: yv-n
  - type: text
    text: 'Quand il fit jour, les magistrats envoyèrent les licteurs dire au geôlier : Relâche ces gens. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'allez en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mc 5.34+ ; cf. Jg 18.6.
    marker-yv: yv-n
  - type: text
    text: 'Le geôlier rapporta ces paroles à Paul : Les magistrats font dire de vous relâcher ; maintenant donc sortez et allez en paix. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le droit romain (v. 12
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') interdisait les châtiments corporels sur la personne des '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'citoyens romains '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; cf. 22.25+ss ; 23.27 ; voir aussi Mc 10.34. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jetés en prison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.18.
    marker-yv: yv-n
  - type: text
    text: 'Mais Paul leur répondit : Après nous avoir fait battre publiquement et sans jugement, nous qui sommes citoyens romains, ils nous ont jetés en prison, et maintenant ils nous chasseraient en secret ? Pas question ! Qu''ils viennent eux-mêmes nous libérer ! '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 22.29.
    marker-yv: yv-n
  - type: text
    text: 'Les licteurs rapportèrent ces paroles aux magistrats, qui prirent peur en apprenant qu''ils étaient citoyens romains. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: f
    children:
