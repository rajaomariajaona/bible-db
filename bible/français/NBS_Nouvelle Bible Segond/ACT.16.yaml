        marker: w
        children:
        - type: text
          text: Testament
      - type: text
        text: ' de Joseph '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.5 : « Alors que j''étais dans les chaînes, l''Egyptienne (cf. Gn 40)… vint et entendit comment je rendais grâces au Seigneur, en chantant dans la maison de ténèbres, en me réjouissant d''une voix joyeuse et en glorifiant mon Dieu d''avoir été délivré de l''Egyptienne par une fausse accusation. »'
    marker-yv: yv-n
  - type: text
    text: 'Vers le milieu de la nuit, Paul et Silas priaient et chantaient les louanges de Dieu ; les prisonniers les entendaient. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.26 '
    - type: usfm
      marker: fq
      children:
