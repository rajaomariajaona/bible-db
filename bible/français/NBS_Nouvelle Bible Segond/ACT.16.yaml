      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le récit est à la première personne du pluriel jusqu''au v. 17 et en 20.5-15 ; 21.1-18 ; 27.1–28.16 ; cf. 11.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Voir l''introduction aux Actes des Apôtres. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
