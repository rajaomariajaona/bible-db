      children:
      - type: text
        text: le Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . – Texte occidental
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: S'étant réveillé, il nous a raconté la vision et nous avons compris que Dieu nous appelait à annoncer la bonne nouvelle aux gens de Macédoine.
    marker-yv: yv-n
  - type: text
    text: Dès qu'il a eu cette vision, nous avons cherché à nous rendre en Macédoine, concluant que Dieu nous appelait à y annoncer la bonne nouvelle.
