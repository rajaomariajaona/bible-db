    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2Co 11.25.
    marker-yv: yv-n
  - type: text
    text: 'La foule aussi se dressa contre eux. Alors les magistrats leur firent arracher leurs vêtements et ordonnèrent qu''on les frappe à coups de bâton. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 12.4s.
    marker-yv: yv-n
  - type: text
    text: 'Après les avoir roués de coups, ils les jetèrent en prison, enjoignant au geôlier de les tenir sous bonne garde. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
