document_id: ACT.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul et Silas s'associent Timothée
  - type: text
    content: ' '
  - type: note
    content: 'Derbé / Lystres 14.6+. –  Timothée 17.14s ; 18.5 ; 19.22 ; 20.4 ; Rm 16.21 ; 1Co 4.17 ; 16.10 ; 2Co 1.1,19 ; Ph 1.1 ; 2.19ss ; Col 1.1 ; 1Th 1.1 ; 3.2,6 ; 2Th 1.1 ; 1Tm 1.2,18 ; 6.20 ; 2Tm 1.2 ; Phm 1 ; Hé 13.23. Voir Juif . –  croyante v. 15n  ; cf. 2Tm 1.5 ; 3.15. –  d''un Grec  : litt. d''un père grec.'
  - type: text
    content: 'Il arriva ensuite à Derbé, puis à Lystres. Or il y avait là un disciple nommé Timothée, fils d''une Juive croyante et d''un Grec. '
  '10':
  - type: note
    content: 'nous  : le récit est à la première personne du pluriel jusqu''au v. 17 et en 20.5-15 ; 21.1-18 ; 27.1–28.16 ; cf. 11.28n. Voir l''introduction aux Actes des Apôtres. –  Dieu  : certains mss portent le Seigneur. – Texte occidental  : S''étant réveillé, il nous a raconté la vision et nous avons compris que Dieu nous appelait à annoncer la bonne nouvelle aux gens de Macédoine.'
  - type: text
    content: Dès qu'il a eu cette vision, nous avons cherché à nous rendre en Macédoine, concluant que Dieu nous appelait à y annoncer la bonne nouvelle.
  - type: heading
    content: A Philippes, Lydie reçoit le baptême
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Samothrace  : île de la mer Egée, entre la Mysie et la Macédoine. –  Néapolis , port de Macédoine à une quinzaine de kilomètres de Philippes.'
  - type: text
    content: 'De Troas, nous avons fait voile droit sur Samothrace et, le lendemain, sur Néapolis. '
  '12':
  - type: note
    content: 'nous sommes allés  : le verbe est sous-entendu dans le texte. –  première ville du district…  : c''est le texte le mieux attesté ; mais la première ville de Macédoine était Thessalonique ; de plus la Macédoine était divisée en quatre districts, et la première ville du district où se trouvait Philippes (20.6 ; Ph 1.1 ; 1Th 2.2) était Amphipolis ; quelques-uns comprennent cependant première ville au sens de ville importante, ou encore comme la première ville que l''on rencontre sur ce trajet  ; d''autres corrigent légèrement le texte, d''après des versions anciennes, pour lire ville du premier district. –  colonie (le mot correspondant à romaine est sous-entendu dans le texte) : Philippes, colonie romaine depuis plus d''un siècle, comptait de nombreux citoyens romains, et ses habitants jouissaient d''un statut juridique à peu près équivalent à ceux de Rome ; cf. v. 21,37s ; Ph 1.27n  ; 3.20. Voir aussi l''introduction à l''épître aux Philippiens.'
  - type: text
    content: 'De là nous sommes allés à Philippes, première ville du district de Macédoine et colonie romaine. Nous avons séjourné quelques jours dans cette ville. '
  '13':
  - type: note
    content: 'de la ville  : précision sous-entendue dans le texte. –  près d''une rivière  : il y en avait une à environ 2 km à l''est de la ville ; cf. Ps 137. –  où nous pensions trouver… ou, selon d''autres témoins du texte  : où, selon la coutume, il devait y avoir… –  un lieu de prière pour les Juifs et les prosélytes qui se réunissaient le jour du sabbat (13.14+) ; la communauté juive de Philippes était peut-être encore trop modeste pour disposer d''une synagogue. –  assis  : cf. Lc 4.20.'
  - type: text
    content: 'Le jour du sabbat, nous sommes sortis à l''extérieur de la porte de la ville, près d''une rivière, dans un endroit où nous pensions trouver un lieu de prière. Nous nous sommes assis pour parler aux femmes qui étaient réunies. '
  '14':
  - type: note
    content: 'Lydie (v. 40) est aussi le nom de la région d''Asie où se trouve la ville de Thyatire (Ap 1.11 ; 2.18,24), qui était connue pour ses étoffes teintes de pourpre. –  adoratrice (13.43n) de Dieu  : cf. 18.7 ; voir culte. –  ouvert le cœur  : cf. Lc 24.45 ; 2 Maccabées 1.4 : « Qu''il (Dieu) ouvre votre cœur à sa Loi et à ses préceptes. » –  qu''elle s''attache 8.6+.'
  - type: text
    content: 'Il y avait là une femme nommée Lydie, marchande de pourpre, de la ville de Thyatire, adoratrice de Dieu. Elle écoutait, et le Seigneur lui a ouvert le cœur pour qu''elle s''attache à ce que disait Paul. '
  '15':
  - type: note
    content: 'Après avoir reçu…  : autre traduction lorsqu''elle a reçu… –  le baptême 2.41+. –  toute sa maison (litt. sa maison) : cf. v. 31-34 ; 10.2n  ; 11.14 ; 1Co 1.16. –  elle nous a invités  : autre traduction elle nous a suppliés. –  que je suis fidèle…  : autres traductions que je crois au Seigneur ; que je suis digne de confiance dans le Seigneur  ; cf. v. 1n  ; 18.8+. –  venez…  : cf. 10.28,48 ; 11.3 ; 18.20 ; voir aussi Mt 10.40 ; Lc 24.29 ; Rm 12.13 ; 1Tm 5.10. –  chez moi  : litt. dans ma maison. –  elle nous en a pressés…  : autre traduction elle nous y a contraints  : cf. 20.34 ; Ph 4.15s.'
  - type: text
    content: 'Après avoir reçu le baptême, avec toute sa maison, elle nous a invités en disant : Si vous jugez que je suis fidèle au Seigneur, venez chez moi et demeurez-y. Et elle nous en a pressés instamment.'
  - type: heading
    content: Paul et Silas emprisonnés et délivrés
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'lieu de prière  : cf. v. 13. –  un esprit pythique  : litt. un esprit python . Ce terme, d''abord nom du dragon associé à l''oracle de Delphes (= Puthô) inspiré par Apollon, avait fini par s''appliquer à toute sorte de divination. –  un gain important  : cf. v. 19 ; 19.24s. –  maîtres  : le même mot est aussi traduit par seigneur(s)  ; cf. Lc 19.33. –  est venue…  : cf. Mc 5.2/ /.'
  - type: text
    content: 'Comme nous allions au lieu de prière, une servante qui avait un esprit pythique et qui, par ses divinations, procurait un gain important à ses maîtres est venue au-devant de nous. '
  '17':
  - type: note
    content: 'à nous suivre…  : cf. Mt 15.23. –  Ces gens…  : cf. Mc 1.24+ ; 5.7/ / ; Lc 4.41 ; 8.28. –  esclaves  : autre traduction serviteurs, 2.18n. –  ils vous annoncent  : certains mss portent ils nous annoncent. –  la voie du salut  : cf. 2.28 ; 9.2n.'
  - type: text
    content: 'Elle s''est mise à nous suivre, Paul et nous, en criant : Ces gens sont des esclaves du Dieu Très-Haut, ils vous annoncent la voie du salut ! '
  '18':
  - type: note
    content: 'plusieurs jours  : autre traduction bien des jours. –  Par le nom de Jésus-Christ 3.6+. –  je t''enjoins…  : cf. 19.13 ; Mt 7.22 ; Mc 16.17 ; Lc 8.29. –  à ce moment même  : litt. à cette heure.'
  - type: text
    content: 'Comme elle faisait cela depuis plusieurs jours, Paul, excédé, a fini par se retourner pour dire à l''esprit : Par le nom de Jésus-Christ, je t''enjoins de sortir d''elle ! Et il est sorti à ce moment même.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 19.25. –  la place publique  : en grec agora  ; il s''agit du forum des villes romaines, la place centrale où la justice était rendue par les préteurs (v. 20n) ; cf. 17.17.'
  - type: text
    content: 'Voyant disparaître leurs espoirs de gain, les maîtres de la servante saisirent Paul et Silas et les traînèrent sur la place publique, devant les chefs. '
  '2':
  - type: note
    content: Lystres / Iconium 13.51n. –  bon témoignage 6.3+ ; cf. Lc 7.5 ; Ph 2.20-22.
  - type: text
    content: 'Les frères de Lystres et d''Iconium rendaient de lui un bon témoignage. '
  '20':
  - type: note
    content: 'magistrats  : le terme grec a donné notre nom stratège  ; il s''agit en l''occurrence des préteurs, les hommes chargés de rendre la justice dans les villes romaines (cf. v. 35n). –  jettent le trouble dans notre ville  : cf. 17.6+ ; 1R 18.17 ; Am 7.10. – Voir Juifs.'
  - type: text
    content: 'Ils les présentèrent aux magistrats en disant : Ces gens jettent le trouble dans notre ville ; ce sont des Juifs, '
  '21':
  - type: note
    content: 'qui prônent  : le même verbe a été traduit par annoncer au v. 17. –  citoyens romains  : litt. romains, cf. v. 12n  ; de même v. 37s ; 22.25ss ; 23.27 ; voir aussi 2.10n.'
  - type: text
    content: 'qui prônent des coutumes qu''il ne nous est permis ni d''accueillir ni de pratiquer, à nous qui sommes citoyens romains. '
  '22':
  - type: note
    content: Cf. Ph 1.30 ; 1Th 2.2. –  coups de bâton ou de baguette 2Co 11.25.
  - type: text
    content: 'La foule aussi se dressa contre eux. Alors les magistrats leur firent arracher leurs vêtements et ordonnèrent qu''on les frappe à coups de bâton. '
  '23':
  - type: note
    content: Cf. 12.4s.
  - type: text
    content: 'Après les avoir roués de coups, ils les jetèrent en prison, enjoignant au geôlier de les tenir sous bonne garde. '
  '24':
  - type: note
    content: 'Cf. 12.6,10. –  le cachot central  : litt. la prison intérieure. –  leur mit des entraves de bois aux pieds  : litt. leur mit les pieds au bois (même mot qu''en 5.30+) ; il s''agissait sans doute d''entraves en bois scellées dans les murs.'
  - type: text
    content: Ayant reçu cette injonction, celui-ci les jeta dans le cachot central et leur mit des entraves de bois aux pieds.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'chantaient Mt 26.30/ / ; Ep 5.19 ; Col 3.16 ; Jc 5.13 ; Testament de Joseph 8.5 : « Alors que j''étais dans les chaînes, l''Egyptienne (cf. Gn 40)… vint et entendit comment je rendais grâces au Seigneur, en chantant dans la maison de ténèbres, en me réjouissant d''une voix joyeuse et en glorifiant mon Dieu d''avoir été délivré de l''Egyptienne par une fausse accusation. »'
  - type: text
    content: 'Vers le milieu de la nuit, Paul et Silas priaient et chantaient les louanges de Dieu ; les prisonniers les entendaient. '
  '26':
  - type: note
    content: 'tremblement de terre  : cf. 4.31. –  les portes s''ouvrirent  : cf. 5.19-21 ; 12.7-11. –  tous les liens  : litt. les liens de tous (les prisonniers).'
  - type: text
    content: 'Tout à coup il se produisit un grand tremblement de terre : les fondations de la prison furent ébranlées ; à l''instant même, toutes les portes s''ouvrirent et tous les liens se détachèrent. '
  '27':
  - type: note
    content: 'il allait se supprimer  : cf. 12.18s ; 27.42.'
  - type: text
    content: 'Le geôlier se réveilla, et lorsqu''il vit les portes de la prison ouvertes, il tira son épée ; il allait se supprimer, pensant que les prisonniers s''étaient enfuis. '
  '28':
  - type: note
    content: 'cria  : cf. 7.60n.'
  - type: text
    content: 'Mais Paul cria : Ne te fais pas de mal, nous sommes tous ici ! '
  '29':
  - type: note
    content: 'tomba…  : cf. 10.25s.'
  - type: text
    content: 'Alors le geôlier demanda de la lumière, entra précipitamment et tomba tout tremblant devant Paul et Silas ; '
  '3':
  - type: note
    content: Cf. 18.18 ; 21.21 ; 1Co 9.20s ; Ga 2.3-5 ; 5.11. – Voir circoncision.
  - type: text
    content: Paul voulut l'emmener avec lui ; il le prit donc et le circoncit, à cause des Juifs de la région ; tous savaient en effet que son père était grec.
  '30':
  - type: note
    content: 'il les mena dehors  : le texte occidental précise après s''être assuré des autres (prisonniers). –  Seigneurs  : le terme peut être compris ici dans un sens analogue à Messieurs. –  que faut-il que je fasse 2.37+. –  pour être sauvé  : cf. 4.9n,12+.'
  - type: text
    content: 'il les mena dehors et dit : Seigneurs, que faut-il que je fasse pour être sauvé ? '
  '31':
  - type: note
    content: 'Crois (10.43) au Seigneur Jésus (2.36+)… Mc 16.16 ; Jn 4.53+ ; 20.28 ; Rm 10.9. –  toute ta maison  : litt. ta maison  ; cf. v. 15,32.'
  - type: text
    content: 'Ils répondirent : Crois au Seigneur Jésus et tu seras sauvé, toi et toute ta maison. '
  '32':
  - type: note
    content: '4.29+. –  chez lui  : litt. dans sa maison.'
  - type: text
    content: 'Ils lui dirent la parole du Seigneur, ainsi qu''à tous ceux qui étaient chez lui. '
  '33':
  - type: note
    content: 'A ce moment…  : litt. à cette heure-là de la nuit. –  aussitôt (le même terme est traduit par à l''instant même au v. 26) il reçut le baptême  : cf. 8.36ss.'
  - type: text
    content: 'A ce moment même, en pleine nuit, il les prit avec lui et lava leurs plaies ; aussitôt il reçut le baptême, lui et tous les siens. '
  '34':
  - type: note
    content: 'Cf. 2.46 ; 8.8+,39. –  chez lui  : litt. dans la maison. –  se réjouit  : cf. 2.26n. –  d''avoir cru Dieu ou d''avoir cru en Dieu, cf. v. 31.'
  - type: text
    content: Il les fit monter chez lui, dressa la table et se réjouit avec toute sa maison d'avoir cru Dieu.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental  : Quand il fit jour, les magistrats se réunirent sur la place publique et, saisis de crainte au souvenir du tremblement de terre qui avait eu lieu, ils envoyèrent les licteurs (fonctionnaires subalternes qui exécutaient les décisions des préteurs, v. 20n). –  au geôlier  : cette précision est sous-entendue dans le texte. –  Relâche ces gens  : certains témoins du texte occidental ajoutent que tu as reçus hier.'
  - type: text
    content: 'Quand il fit jour, les magistrats envoyèrent les licteurs dire au geôlier : Relâche ces gens. '
  '36':
  - type: note
    content: allez en paix Mc 5.34+ ; cf. Jg 18.6.
  - type: text
    content: 'Le geôlier rapporta ces paroles à Paul : Les magistrats font dire de vous relâcher ; maintenant donc sortez et allez en paix. '
  '37':
  - type: note
    content: Le droit romain (v. 12n) interdisait les châtiments corporels sur la personne des citoyens romains (v. 21n) ; cf. 22.25+ss ; 23.27 ; voir aussi Mc 10.34. –  jetés en prison 5.18.
  - type: text
    content: 'Mais Paul leur répondit : Après nous avoir fait battre publiquement et sans jugement, nous qui sommes citoyens romains, ils nous ont jetés en prison, et maintenant ils nous chasseraient en secret ? Pas question ! Qu''ils viennent eux-mêmes nous libérer ! '
  '38':
  - type: note
    content: 22.29.
  - type: text
    content: 'Les licteurs rapportèrent ces paroles aux magistrats, qui prirent peur en apprenant qu''ils étaient citoyens romains. '
  '39':
  - type: note
    content: 'Texte occidental  : Arrivés avec beaucoup d''amis à la prison, ils les supplièrent de sortir en disant : Nous ignorions que vous étiez des hommes justes. [Après les avoir fait sortir, ils leur firent cette prière :] Sortez de cette ville, de peur que ceux qui ont crié contre vous ne se rassemblent à nouveau contre nous  ; cf. 5.26. –  quitter la ville  : cf. 13.50 ; Mt 8.34.'
  - type: text
    content: 'Ils vinrent les apaiser et les libérèrent, en leur demandant de quitter la ville. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental  : En passant par les villes, ils leur annonçaient et leur transmettaient le Seigneur Jésus-Christ en toute assurance (2.29n) , tout en transmettant les prescriptions… –  les prescriptions décidées (litt. jugées ) : cf. 15.20+ss ; le terme traduit ici par prescriptions pourrait aussi être rendu par décrets (ainsi en 17.7 ; Lc 2.1) ; c''est lui qui a donné notre mot dogme  ; voir Ep 2.15n. –  les apôtres et les anciens 15.2+.'
  - type: text
    content: 'Dans les villes où ils passaient, ils transmettaient les prescriptions décidées par les apôtres et les anciens de Jérusalem, afin qu''on les observe. '
  '40':
  - type: note
    content: 'Lydie v. 14ss. –  après avoir vu  : texte occidental  : après avoir vu les frères, il leur racontèrent ce que le Seigneur avait fait pour eux… –  encouragé ou exhorté 11.23+.'
  - type: text
    content: Quand ils furent sortis de la prison, ils allèrent chez Lydie ; après avoir vu et encouragé les frères, ils partirent.
  '5':
  - type: note
    content: Eglises 5.1n. – 2.41+ss ; 6.7 ; 9.31 ; 14.22+ ; Col 2.5 ; 1P 5.9.
  - type: text
    content: Les Eglises s'affermissaient dans la foi et augmentaient en nombre de jour en jour.
  - type: heading
    content: L'appel du Macédonien
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Le voyage de Paul est guidé pas à pas vers l''Europe ; cf. 18.23 ; 1Co 16.1 ; Ga 4.13-15 ; 2Tm 4.10 ; 1P 1.1. –  Empêchés Rm 15.22+. – Voir Esprit, saint . –  dire la Parole 4.29+. –  en Asie  : il s''agit de la région d''Ephèse, sur la côte ouest de l''Asie Mineure (6.9 ; 19.1,10,22,26s ; 20.4,16,18 ; 21.27 ; 24.19). –  la Phrygie et le pays galate (Ga 1.2), vers le nord ; d''autres comprennent la Phrygie galate , c.-à-d. la partie de la Phrygie appartenant à la province romaine de Galatie.'
  - type: text
    content: 'Empêchés par l''Esprit saint de dire la Parole en Asie, ils passèrent par la Phrygie et le pays galate. '
  '7':
  - type: note
    content: 'la Mysie, au nord de la région d’Asie (v. 6n), donnant sur la mer Egée et le détroit du Bosphore. –  la Bithynie, au nord-est de la Mysie (1P 1.1), donnant sur la mer Noire. –  l''Esprit de Jésus  : cf. Rm 8.9 ; Ga 4.6 ; Ph 1.19 ; 1P 1.11.'
  - type: text
    content: 'Arrivés près de la Mysie, ils tentaient d''aller en Bithynie ; mais l''Esprit de Jésus ne le leur permit pas. '
  '8':
  - type: note
    content: 'Ils longèrent ou ils passèrent  ; texte occidental ils traversèrent. –  Troas  : ville côtière de Mysie v. 11 ; 20.5ss ; 2Co 2.12 ; 2Tm 4.13.'
  - type: text
    content: Ils longèrent alors la Mysie et descendirent à Troas.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Paul eut une vision  : litt. une vision apparut à Paul  ; cf. 9.10+ ; 18.9. –  en Macédoine  : province d''Europe, de l''autre côté de la mer Egée par rapport à Troas ; 18.5 ; 19.21s ; 20.1. –  viens à notre secours  : cf. Jos 10.6.'
  - type: text
    content: 'Pendant la nuit, Paul eut une vision. Un Macédonien était là, debout, qui le suppliait : Passe en Macédoine, viens à notre secours ! '
