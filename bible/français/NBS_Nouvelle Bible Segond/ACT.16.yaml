    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Arrivés avec beaucoup d''amis à la prison, ils les supplièrent de sortir en disant : Nous ignorions que vous étiez des hommes justes. [Après les avoir fait sortir, ils leur firent cette prière :] Sortez de cette ville, de peur que ceux qui ont crié contre vous ne se rassemblent à nouveau contre nous'
    - type: usfm
