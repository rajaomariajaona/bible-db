      - type: text
        text: '16.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ph 1.30 ; 1Th 2.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'coups de bâton '
    - type: usfm
      marker: ft
      children:
