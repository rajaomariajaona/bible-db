        text: '(Ga 1.2), vers le nord ; d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la Phrygie galate
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. la partie de la Phrygie appartenant à la province romaine de Galatie.'
    marker-yv: yv-n
  - type: text
