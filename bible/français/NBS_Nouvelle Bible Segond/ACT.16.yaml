        text: tremblement de terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les portes s'ouvrirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.19-21 ; 12.7-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tous les liens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les liens de tous (les prisonniers).
    marker-yv: yv-n
  - type: text
    text: 'Tout à coup il se produisit un grand tremblement de terre : les fondations de la prison furent ébranlées ; à l''instant même, toutes les portes s''ouvrirent et tous les liens se détachèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il allait se supprimer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.18s ; 27.42.'
    marker-yv: yv-n
  - type: text
    text: 'Le geôlier se réveilla, et lorsqu''il vit les portes de la prison ouvertes, il tira son épée ; il allait se supprimer, pensant que les prisonniers s''étaient enfuis. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cria
    - type: usfm
      marker: ft
