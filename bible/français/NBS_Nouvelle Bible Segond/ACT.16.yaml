      children:
      - type: text
        text: '  : cf. 8.36ss.'
    marker-yv: yv-n
  - type: text
    text: 'A ce moment même, en pleine nuit, il les prit avec lui et lava leurs plaies ; aussitôt il reçut le baptême, lui et tous les siens. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
