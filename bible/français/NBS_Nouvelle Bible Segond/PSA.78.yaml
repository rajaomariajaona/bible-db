document_id: PSA.78,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'histoire d'Israël, une leçon à ne pas oublier
  - type: text
    content: ' '
  - type: note
    content: 'D''Asaph 73.1+. –  Mon peuple, prête l''oreille…  : cf. 49.1-5 ; 50.7 ; 81.9 ; Dt 4.1 ; 32.1 ; Es 28.23 ; 51.4 ; Pr 22.17. –  ma loi  : autre traduction mon enseignement (hébreu tora ) ; de même au v. 5 ; cf. 89.31 ; Es 51.7 ; Jr 9.12 ; 16.11 ; 31.33 ; Os 8.1 ; voir aussi Pr 1.8n  ; 3.1 ; 4.2 etc.'
  - type: text
    content: Poème. D'Asaph.
  - type: text
    content: Mon peuple, prête l'oreille à ma loi !
  - type: text
    content: Tendez l'oreille vers les paroles de ma bouche !
  '10':
  - type: text
    content: ' '
  - type: note
    content: Voir alliance.
  - type: text
    content: Ils ne gardèrent pas l'alliance de Dieu
  - type: text
    content: et refusèrent de suivre sa loi.
  '11':
  - type: text
    content: Ils oublièrent ses hauts faits,
  - type: text
    content: les choses étonnantes qu'il leur avait fait voir.
  '12':
  - type: text
    content: ' '
  - type: note
    content: V. 43. –  une chose étonnante 77.12n. –  Tsoân ou Tanis en Egypte  ; cf. Nb 13.22n  ; Es 19.11n. Certains interprètent ici le terme correspondant à pays (habituellement traduit par champ ou campagne ) dans le sens plus précis de marécage , comme une référence au lac Menzaleh, tout près de Tanis, que plusieurs ont voulu identifier à la mer des Joncs de l'Exode.
  - type: text
    content: Devant leurs pères il avait fait une chose étonnante,
  - type: text
    content: en Egypte, au pays de Tsoân.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 33.7 ; 106.9 ; 136.13-15 ; Ex 14.16,21s ; Jos 4.23 ; Es 63.12.
  - type: text
    content: Il fendit la mer et les fit traverser,
  - type: text
    content: il dressa les eaux en une masse.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 105.39 ; Ex 13.21 ; 14.20,24 ; Nb 9.15-22 ; Dt 1.33 ; Es 4.5.
  - type: text
    content: Il les conduisit le jour par la nuée,
  - type: text
    content: et toute la nuit à la lumière d'un feu.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 17.6 ; Nb 20.11 ; 1Co 10.4. –  de l''eau…  : litt. comme (ou dans, à , selon certains mss) des abîmes, en abondance  ; cf. Gn 1.2n.'
  - type: text
    content: Il fendit des rochers dans le désert
  - type: text
    content: et leur donna à boire de l'eau en abondance, comme celle des abîmes ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: V. 20 ; 105.41 ; 114.8 ; Es 43.20 ; 48.21 ; Né 9.15.
  - type: text
    content: du roc il fit sortir des ruissellements,
  - type: text
    content: il fit descendre de l'eau comme des fleuves.
  '17':
  - type: text
    content: ' '
  - type: note
    content: V. 40,56 ; Dt 9.7. – Voir péché.
  - type: text
    content: Mais ils continuèrent à pécher contre lui,
  - type: text
    content: à se rebeller contre le Très-Haut sur la terre desséchée.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ils provoquèrent Dieu (v. 7+) ou ils mirent Dieu à l''épreuve  ; cf. v. 41,56 ; 95.8s ; 106.14 ; Ex 17.2,7n  ; Nb 11.4ss ; Dt 6.16 ; 1Co 10.9 ; Hé 3.9. –  en demandant à manger 105.40 ; 106.15 ; Ex 16.2-36. –  selon leur désir  : autre traduction possible pour leur vie (6.4n).'
  - type: text
    content: Ils provoquèrent Dieu dans leur cœur,
  - type: text
    content: en demandant à manger selon leur désir.
  '19':
  - type: text
    content: Ils parlèrent contre Dieu,
  - type: text
    content: 'ils dirent : Dieu pourrait-il'
  - type: text
    content: dresser une table dans le désert ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'pour un poème  : cf. 49.5 ; Nb 23.7n  ; le terme hébreu signifie également proverbe, fable (69.12 ; Ez 14.8n). LXX en (ou par des ) paraboles, Mt 13.35. –  j''annonce ou j''énonce , litt. je fais jaillir  ; cf. 19.3n.'
  - type: text
    content: J'ouvre la bouche pour un poème,
  - type: text
    content: j'annonce les énigmes du temps jadis.
  '20':
  - type: text
    content: ' '
  - type: note
    content: V. 16. –  des torrents ou des oueds  ; cf. 83.10 ; Gn 26.17n  ; Jb 6.15n.
  - type: text
    content: Il a frappé le rocher, l'eau a coulé,
  - type: text
    content: et des torrents se sont répandus ;
  - type: text
    content: pourra-t-il aussi donner du pain
  - type: text
    content: ou fournir de la viande à son peuple ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 59 ; Nb 11.1.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entendit, et il s''emporta ;'
  - type: text
    content: un feu s'alluma contre Jacob,
  - type: text
    content: et la colère s'éleva contre Israël,
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. Hé 3.19.
  - type: text
    content: parce qu'ils n'avaient pas mis leur foi en Dieu,
  - type: text
    content: parce qu'ils n'avaient pas mis leur confiance en son salut.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'les portes du ciel  : cf. Gn 7.11 ; 28.17 ; Ap 4.1.'
  - type: text
    content: Il donna des ordres aux nuages d'en haut,
  - type: text
    content: il ouvrit les portes du ciel ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: Ex 16.4,13-16 ; Nb 11.7-9 ; Dt 8.3 ; Né 9.15 ; Jn 6.31  ; Ap 2.17.
  - type: text
    content: il fit pleuvoir sur eux la manne pour qu'ils mangent,
  - type: text
    content: il leur donna le blé du ciel.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Chacun…  : on pourrait comprendre l''homme mangea le pain des dieux  ; la tradition juive et des versions anciennes ont interprété le pain des anges  ; cf. 103.20 ; 105.40 ; 1Co 10.3 ; Sagesse 16.20 : « Tu as distribué à ton peuple une nourriture d''anges, tu lui as procuré du ciel, sans effort de sa part, un pain tout préparé, ayant la capacité de toute saveur et adapté à tous les goûts. » Sur le terme traduit par indomptables (cf. 22.13n), voir Gn 49.24n  ; Es 10.13n.'
  - type: text
    content: Chacun eut à manger du pain des indomptables,
  - type: text
    content: il leur envoya du pain à satiété.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'il fit se lever  : litt. il leva , ce que certains comprennent à l''opposé  : il détourna le vent d''est  ; cf. Ex 10.13.'
  - type: text
    content: Dans le ciel il fit se lever le vent d'est,
  - type: text
    content: 'par sa puissance il amena le vent du sud :'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Ex 16.13 ; cf. Nb 11.31ss.
  - type: text
    content: il fit pleuvoir sur eux de la viande comme de la poussière,
  - type: text
    content: des oiseaux comme le sable des mers
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'leur camp / leurs demeures  : litt. son camp / ses demeures.'
  - type: text
    content: qu'il fit tomber au milieu de leur camp,
  - type: text
    content: tout autour de leurs demeures.
  '29':
  - type: text
    content: 'Ils mangèrent, ils furent tout à fait rassasiés :'
  - type: text
    content: il leur avait apporté ce qu'ils désiraient.
  '3':
  - type: text
    content: ' '
  - type: note
    content: V. 5 ; 44.2 ; cf. Jb 15.17s.
  - type: text
    content: Ce que nous avons entendu, ce que nous connaissons,
  - type: text
    content: ce que nos pères nous ont raconté,
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Ils n''avaient pas satisfait…  : autre traduction ils n''étaient pas encore dégoûtés de leur désir (ou de l''objet de leur désir ) ; cf. Nb 11.33-34n.'
  - type: text
    content: Ils n'avaient pas satisfait leur désir,
  - type: text
    content: ils avaient encore la bouche pleine,
  '31':
  - type: text
    content: ' '
  - type: note
    content: 1Co 10.5.
  - type: text
    content: lorsque la colère de Dieu s'éleva contre eux ;
  - type: text
    content: il tua les plus vigoureux,
  - type: text
    content: il abattit les jeunes gens d'Israël.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 106.7 ; Nb 14.11.
  - type: text
    content: Malgré tout cela, ils péchèrent encore
  - type: text
    content: et ne mirent pas leur foi dans ses actes étonnants.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Nb 14.22s. –  dans (ou par ) la futilité  : cf. Ec 1.2n.'
  - type: text
    content: Il mit fin à leurs jours dans la futilité,
  - type: text
    content: à leurs années dans l'épouvante.
  '34':
  - type: text
    content: ' '
  - type: note
    content: il allait les tuer ou il les tuait  ; cf. Jg 2.10ss ; Es 26.16.
  - type: text
    content: Quand il allait les tuer, ils le cherchaient,
  - type: text
    content: ils revenaient et recherchaient Dieu ;
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'leur rocher 18.3+. –  leur rédempteur  : cf. 19.15+ ; Es 41.14+ ; Rt 2.20n. – La fin de ce v. marque le milieu des Psaumes, d''après le nombre des versets (cf. 80.14n).'
  - type: text
    content: ils se souvenaient que Dieu était leur rocher,
  - type: text
    content: que le Dieu Très-Haut était leur rédempteur.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'duper ou séduire. –  leur bouche  : cf. Es 29.13 ; Mt 15.8.'
  - type: text
    content: Mais ils voulaient le duper par leur bouche
  - type: text
    content: et ils lui mentaient avec leur langue ;
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'leur cœur…  : cf. Ac 8.21. –  sûrement établis ou fidèles, dignes de confiance  : cf. v. 8 ; 89.29.'
  - type: text
    content: leur cœur n'était pas fermement avec lui,
  - type: text
    content: et ils n'étaient pas sûrement établis dans son alliance.
  '38':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 34.6 ; Nb 14.18 ; Dt 4.31. –  faisait l'expiation 65.4n  ; 79.9 ; 103.3 ; 1R 8.50 ; Lc 18.13.
  - type: text
    content: Mais lui, qui est compatissant,
  - type: text
    content: faisait l'expiation de la faute et ne détruisait pas ;
  - type: text
    content: souvent il retint sa colère,
  - type: text
    content: il n'éveilla pas toute sa fureur.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 39.6 ; 103.14-16 ; 144.4 ; Gn 6.3 ; Es 40.6-8 ; Jb 7.7. –  souffle  : le mot hébreu peut aussi être traduit par esprit.'
  - type: text
    content: Il se souvenait qu'ils n'étaient que chair,
  - type: text
    content: un souffle qui s'en va et ne revient pas.
  '4':
  - type: text
    content: ' '
  - type: note
    content: nous dirons et nous raconterons traduisent un seul verbe hébreu ; 9.2+ ; 75.2. –  à la génération future 22.31 ; 48.14 ; 102.19. –  les choses étonnantes v. 11,32 ; cf. Ex 15.11.
  - type: text
    content: nous ne le cacherons pas à leurs fils,
  - type: text
    content: 'mais nous dirons à la génération future les louanges du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: nous raconterons sa puissance et les choses étonnantes qu'il a faites.
  '40':
  - type: text
    content: ' '
  - type: note
    content: V. 17+.
  - type: text
    content: Que de fois ils se rebellèrent contre lui dans le désert !
  - type: text
    content: Que de fois ils l'attristèrent sur la terre aride !
  '41':
  - type: text
    content: ' '
  - type: note
    content: provoquer Dieu v. 18n. –  Saint d'Israël 71.22+.
  - type: text
    content: Ils recommencèrent à provoquer Dieu,
  - type: text
    content: à offenser le Saint d'Israël.
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Ils ne se souvinrent pas  : cf. v. 39 ; 106.7,13,21 ; 2Ch 24.22. –  sa puissance  : litt. sa main. –  de l''adversaire  : autre traduction possible de la détresse  ; même mot v. 61.'
  - type: text
    content: Ils ne se souvinrent pas de sa puissance,
  - type: text
    content: ni du jour où il les avait libérés de l'adversaire,
  '43':
  - type: text
    content: ' '
  - type: note
    content: signes 105.27 ; Ex 7.3ss. –  Egypte / Tsoân v. 12n  ; cf. 106.21s.
  - type: text
    content: ni des signes qu'il avait fait paraître en Egypte,
  - type: text
    content: ni de ses prodiges au pays de Tsoân.
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 105.28-35. –  en sang les bras de leur Nil (litt. leurs fleuves ) : cf. Ex 7.19nss ; Ap 16.4.'
  - type: text
    content: Il changea en sang les bras de leur Nil,
  - type: text
    content: ainsi que leurs ruisseaux – ils ne purent y boire.
  '45':
  - type: text
    content: ' '
  - type: note
    content: '105.30s. –  contre eux  : autre traduction parmi eux . –  mouches venimeuses Ex 8.17nss. –  grenouilles Ex 8.2ss ; cf. Ap 16.13.'
  - type: text
    content: Il envoya contre eux des mouches venimeuses qui les dévorèrent
  - type: text
    content: et des grenouilles qui les détruisirent.
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'criquets (hébreu hasil ) / sauterelles (hébreu ’arbé ) : cf. 105.34 ; Ex 10.4ss ; Ap 9.3-11 ; sur l''identification (incertaine) de ces insectes, cf. Jl 1.4n. –  le produit de leur travail  : litt. leur fatigue  ; cf. 109.11 ; 128.2.'
  - type: text
    content: Il livra leurs récoltes aux criquets,
  - type: text
    content: le produit de leur travail aux sauterelles.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'la grêle  : cf. 105.32 ; Ex 9.18ss ; Ap 8.7 ; 16.21. –  la gelée  : ce mot n''apparaît qu''ici et sa traduction, incertaine, s''inspire de LXX ; autres versions anciennes le ver, les grêlons, les criquets.'
  - type: text
    content: Il tua leurs vignes par la grêle
  - type: text
    content: et leurs sycomores par la gelée.
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 9.25. –  livra v. 50,62 ; 31.9+. –  à la foudre  : traduction incertaine ; on a aussi compris aux fièvres (cf. Dt 32.24 ; Ha 3.5) ; versions anciennes au feu, à la peste, aux oiseaux  ; cf. Ex 9.9ss.'
  - type: text
    content: Il livra leur bétail à la grêle
  - type: text
    content: et leurs troupeaux à la foudre.
  '49':
  - type: text
    content: ' '
  - type: note
    content: '88.17. –  messagers (ou anges ) de malheurs  : cf. Ex 12.23 ; Jb 10.17.'
  - type: text
    content: Il lança contre eux sa colère ardente,
  - type: text
    content: fureur, rage et détresse,
  - type: text
    content: une mission de messagers de malheurs.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'dressé  : autre traduction suscité . –  témoignage v. 56n. –  loi  : cf. v. 1n  ; Dt 32.46. –  Jacob / Israël 14.7+. –  de faire connaître à leurs fils  : cf. Ex 10.2 ; 12.26s ; 13.14 ; Dt 4.9 ; 6.7,20-25.'
  - type: text
    content: Il a dressé un témoignage en Jacob,
  - type: text
    content: il a mis une loi en Israël,
  - type: text
    content: qu'il a ordonné à nos pères de faire connaître à leurs fils
  '50':
  - type: text
    content: ' '
  - type: note
    content: 'Il donna libre cours  : cf. 58.3n. –  à la peste Ex 9.3-6.'
  - type: text
    content: Il donna libre cours à sa colère,
  - type: text
    content: il ne leur épargna pas la mort,
  - type: text
    content: il livra leur vie à la peste.
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'premier-né / prémices… 105.36 ; 135.8 ; 136.10 ; cf. Ex 11.4ss ; 12.29ss ; voir aussi Gn 49.3 ; Sagesse 18.12 : « Leur descendance la plus précieuse avait été anéantie en un instant. » –  Egypte / Cham  : cf. 105.23,27 ; 106.21s ; Gn 10.6.'
  - type: text
    content: Il frappa tout premier-né en Egypte,
  - type: text
    content: les prémices de la vigueur sous les tentes de Cham.
  '52':
  - type: text
    content: ' '
  - type: note
    content: comme du petit bétail ou comme un troupeau  ; cf. 74.1n  ; 77.21 ; 80.2. –  dans le désert 68.8 ; 136.16 ; cf. 23.2ss ; Ex 13.18 ; Dt 29.4 ; Jos 24.7 ; Jr 2.6 ; 31.2 ; Ez 20.10 ; Né 9.19,21.
  - type: text
    content: Il fit partir son peuple comme du petit bétail,
  - type: text
    content: il les conduisit comme un troupeau dans le désert.
  '53':
  - type: text
    content: ' '
  - type: note
    content: V. 12ss ; cf. 106.11 ; Ex 14.27s ; 15.10.
  - type: text
    content: Il les dirigea en toute sécurité, ils n'eurent aucune frayeur,
  - type: text
    content: et la mer recouvrit leurs ennemis.
  '54':
  - type: text
    content: ' '
  - type: note
    content: vers (ou dans ) son territoire sacré ou vers le territoire de son sanctuaire  ; cf. Ex 15.17 ; Es 56.7. –  acquise ou produite  ; sur le verbe correspondant, cf. 74.2n  ; 139.13n  ; Gn 4.1n  ; 14.19n  ; Pr 8.22.
  - type: text
    content: Il les amena vers son territoire sacré,
  - type: text
    content: vers cette montagne que sa main droite avait acquise.
  '55':
  - type: text
    content: ' '
  - type: note
    content: 'chassa des nations 105.44 ; 135.10-12 ; 136.17-21 ; Dt 4.38 ; Ac 13.19. –  leur attribua  : litt. fit tomber pour eux , c.-à-d. leur désigna par le sort  ; cf. Nb 26.55s ; Jos 23.4n. –  au cordeau 16.6.'
  - type: text
    content: Il chassa des nations devant eux,
  - type: text
    content: leur attribua un patrimoine au cordeau
  - type: text
    content: et fit demeurer dans leurs tentes les tribus d'Israël.
  '56':
  - type: text
    content: ' '
  - type: note
    content: V. 18n,40s. –  préceptes ou témoignages , même terme v. 5.
  - type: text
    content: Mais ils provoquèrent le Dieu Très-Haut,
  - type: text
    content: se rebellèrent contre lui
  - type: text
    content: et ne prirent pas garde à ses préceptes.
  '57':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 32.15 ; Jg 2.13. –  Ils se dérobèrent  : cf. 53.4. –  dévièrent  : autre traduction se retournèrent . –  un arc faussé  : autre traduction un arc trompeur  ; cf. Os 7.16.'
  - type: text
    content: Ils se dérobèrent et trahirent, comme leurs pères,
  - type: text
    content: ils dévièrent comme un arc faussé.
  '58':
  - type: text
    content: ' '
  - type: note
    content: 106.36-39. –  ils provoquèrent sa jalousie Dt 32.16.
  - type: text
    content: Ils le contrarièrent par leurs hauts lieux,
  - type: text
    content: ils provoquèrent sa jalousie par leurs statues.
  '59':
  - type: text
    content: ' '
  - type: note
    content: 'V. 21 ; cf. 60.3,12 ; 106.29 ; Dt 32.19. –  il rejeta complètement  : autre traduction il eut un grand mépris pour Israël  ; cf. v. 67 ; 53.6n.'
  - type: text
    content: Dieu entendit, et il s'emporta ;
  - type: text
    content: il rejeta complètement Israël.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Jl 1.3.
  - type: text
    content: pour que la génération future sache ;
  - type: text
    content: des fils naîtront,
  - type: text
    content: ils se lèveront et le raconteront à leurs fils.
  '60':
  - type: text
    content: ' '
  - type: note
    content: 'Silo Jos 18.1 ; 1S 4 ; cf. Jr 7.12n. –  où il demeurait , en modifiant légèrement la vocalisation traditionnelle d''après des versions anciennes ; le texte hébreu traditionnel porte il faisait demeurer , ce qui pourrait signifier la tente qu''il avait dressée  ; cf. 15.1. –  parmi les humains  : certains comprennent à Adam  ; cf. Os 6.7n  ; voir aussi Ap 21.3.'
  - type: text
    content: Il délaissa la demeure de Silo,
  - type: text
    content: la tente où il demeurait parmi les humains ;
  '61':
  - type: text
    content: ' '
  - type: note
    content: 'sa puissance / sa splendeur  : il s''agit probablement du coffre ou arche de l''alliance ; cf. 96.6 ; 1S 4–6. –  l''adversaire  : cf. v. 42n.'
  - type: text
    content: il livra sa puissance à la captivité
  - type: text
    content: et sa splendeur à l'adversaire.
  '62':
  - type: text
    content: ' '
  - type: note
    content: 106.40 ; Jr 12.7.
  - type: text
    content: Il livra son peuple à l'épée
  - type: text
    content: et s'emporta contre son patrimoine.
  '63':
  - type: text
    content: ' '
  - type: note
    content: 'ses jeunes filles  : litt. ses vierges. –  ne reçurent pas d''hommages  : litt. ne furent pas louées.'
  - type: text
    content: Un feu dévora ses jeunes gens,
  - type: text
    content: et ses jeunes filles ne reçurent pas d'hommages ;
  '64':
  - type: text
    content: ' '
  - type: note
    content: ses veuves… Jb 27.15.
  - type: text
    content: ses prêtres tombèrent par l'épée,
  - type: text
    content: et ses veuves ne pleurèrent pas.
  '65':
  - type: text
    content: ' '
  - type: note
    content: 'un héros  : autre traduction un vaillant guerrier . –  rendu triomphant par le vin  : traduction incertaine ; quelques-uns modifient légèrement le texte hébreu traditionnel pour lire, avec Tg, dégrisé de son vin  ; cf. 35.23+ ; voir aussi 1R 18.27.'
  - type: text
    content: Le Seigneur s'éveilla comme quelqu'un qui a dormi,
  - type: text
    content: comme un héros rendu triomphant par le vin.
  '66':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1S 5.6ss. –  Il frappa les arrières…  : autre traduction ses coups firent reculer ses adversaires.'
  - type: text
    content: Il frappa les arrières de ses adversaires,
  - type: text
    content: il les couvrit de déshonneur pour toujours.
  '67':
  - type: text
    content: ' '
  - type: note
    content: 'il rejeta  : autre traduction il eut du mépris pour  ; cf. v. 59. –  Joseph / Ephraïm  : cf. Gn 48.1-20 ; voir aussi Os 4.17n.'
  - type: text
    content: Cependant il rejeta la tente de Joseph,
  - type: text
    content: il ne choisit pas la tribu d'Ephraïm.
  '68':
  - type: text
    content: ' '
  - type: note
    content: Cf. 87.2 ; 132.13ss. –  mont Sion 2.6+.
  - type: text
    content: Il choisit la tribu de Juda,
  - type: text
    content: le mont Sion qu'il aimait.
  '69':
  - type: text
    content: ' '
  - type: note
    content: 'comme les lieux élevés  : traduction incertaine ; une modification du texte hébreu traditionnel permettrait de lire dans les hauteurs , comme en 148.1 ; plusieurs versions anciennes ont traduit comme les licornes  ; voir aussi 48.3+. –  comme la terre  : plusieurs mss hébreux et des versions anciennes ont lu sur la terre.'
  - type: text
    content: Il bâtit son sanctuaire comme les lieux élevés,
  - type: text
    content: comme la terre qu'il fonde pour toujours.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.11+ ; 40.5 ; 2R 18.5 ; Es 30.15 ; Pr 22.19. –  Ils fonderont…  : autre traduction ils mettront en Dieu leur confiance  ; sur ce dernier terme, voir 49.14n. –  ils n''oublieront pas  : cf. v. 42 ; 77.12 ; 103.2 ; 106.13. –  actions 77.12n. –  de Dieu  : hébreu ’El , de même aux v. 8,18s ( Dieu pourrait-il… ), 34s ( le Dieu Très-Haut ), 41 ; cf. Gn 21.33n. –  garderont ses commandements 119.115.'
  - type: text
    content: Ils fonderont en Dieu leur assurance,
  - type: text
    content: ils n'oublieront pas les actions de Dieu,
  - type: text
    content: ils garderont ses commandements ;
  '70':
  - type: text
    content: ' '
  - type: note
    content: 'choisit 89.21 ; cf. 1S 13.14 ; 1R 8.16 ; 1Ch 28.4 ; 2Ch 6.6. –  dans les bergeries  : cf. 1S 16.11ss ; 2S 7.8 ; Am 7.15.'
  - type: text
    content: Il choisit David, son serviteur ;
  - type: text
    content: il le prit dans les bergeries ;
  '71':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ez 34.23 ; Mi 7.14 ; Jn 21.16. –  les brebis  : sous-entendu dans le texte.'
  - type: text
    content: il le prit derrière les brebis qui allaitent,
  - type: text
    content: pour lui faire paître Jacob, son peuple,
  - type: text
    content: et Israël, son patrimoine.
  '72':
  - type: text
    content: ' '
  - type: note
    content: 'David…  : litt. il les fit paître.'
  - type: text
    content: Et David les fit paître avec un cœur intègre
  - type: text
    content: et il les conduisit avec des mains habiles.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'comme leurs pères 106.6. –  génération indocile et rebelle  : cf. Ex 32.9 ; 33.3,5 ; 34.9 ; Dt 9.6,13 ; 21.18,20 ; 31.27 ; 32.5 ; Za 1.4 ; Ac 2.40. –  pas sûr (ou digne de confiance, fidèle ) : cf. v. 37. –  à l''égard de Dieu  : litt. avec Dieu ou, selon d''autres mss, envers Dieu (hébreu ’El , v. 7+).'
  - type: text
    content: ils ne seront pas comme leurs pères,
  - type: text
    content: une génération indocile et rebelle,
  - type: text
    content: une génération dont le cœur n'est pas ferme
  - type: text
    content: et dont l'esprit n'est pas sûr à l'égard de Dieu.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Texte obscur ; cf. v. 67.
  - type: text
    content: Les fils d'Ephraïm, armés et tirant à l'arc,
  - type: text
    content: tournèrent le dos au jour du combat.
