document_id: 2TI.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les difficultés des derniers temps
  - type: text
    content: ' '
  - type: note
    content: 'Sache…  : cf. 2Th 2.6 ; 2P 3.17. –  derniers jours 4.3 ; cf. Es 2.2n  ; Ac 2.17 ; 1Tm 4.1+ ; Hé 1.2 ; Jc 5.3 ; 1P 1.5 ; 2P 3.3 ; Jd 18. –  difficiles  : cf. Mc 13.22/ / ; 2Th 2.2ss ; voir aussi Ga 1.4 ; Ep 5.16 ; le même terme est traduit par redoutables en Mt 8.28.'
  - type: text
    content: 'Sache que dans les derniers jours surgiront des temps difficiles. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '1Tm 4.6n. –  l''enseignement ou la doctrine  : cf. 1Tm 1.10. –  conduite  : le mot grec correspondant n''apparaît qu''ici dans le N.T. ; cf. 1Co 4.17 ; Ph 3.17 ; 1Th 2.10ss. –  les projets  : autres traductions les résolutions, les intentions  ; même terme en 1.9 ; cf. Ac 11.23 ; Ep 1.11n. –  la foi…  : cf. 2.10,12,22 ; 4.2 ; 1Tm 1.5 ; 4.12 ; 6.11 ; Tt 2.2.'
  - type: text
    content: 'Quant à toi, tu m''as bien suivi dans l''enseignement, la conduite, les projets, la foi, la patience, l''amour, la persévérance, '
  '11':
  - type: note
    content: 'Cf. 2Co 1.5ss ; 11.25 ; 12.10 ; Col 1.24 ; 2Th 1.4. –  Antioche Ac 13.14,50. –  Iconium Ac 14.1,5. –  Lystres Ac 14.8,19ss. –  Quelles persécutions…  : autre traduction toutes les persécutions que j''ai supportées. –  le Seigneur m''a délivré 4.17s ; 2Co 1.9s ; cf. Ps 34.18,20 ; 91.3ss.'
  - type: text
    content: 'les persécutions, les souffrances que j''ai subies à Antioche, à Iconium, à Lystres. Quelles persécutions n''ai-je pas supportées ! Et de toutes le Seigneur m''a délivré. '
  '12':
  - type: note
    content: Cf. Mt 10.22s ; Lc 14.26s ; Jn 15.18ss ; 16.1ss,33 ; Ac 14.22 ; Rm 8.17 ; 1Th 3.3s ; 1Jn 2.15ss. –  pieusement 1Tm 2.2n.
  - type: text
    content: 'D''ailleurs, tous ceux qui veulent vivre pieusement en Jésus-Christ seront persécutés. '
  '13':
  - type: note
    content: 'les mauvais  : cf. 2Th 3.2. –  imposteurs  : le terme grec correspondant n''apparaît qu''ici dans le N.T. –  progresseront…  : cf. v. 9n  ; 2.16 ; voir aussi 1Tm 4.15. –  égarant / s''égarant (ou égarés) : cf. Tt 3.3 ; voir aussi Ps 7.16 ; Pr 26.27 ; 28.10 ; 2Th 2.11 ; Jc 1.26.'
  - type: text
    content: Mais les mauvais et les imposteurs progresseront toujours plus dans le mal, égarant les autres et s'égarant eux-mêmes.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'demeure en  : cf. Ac 14.22 ; voir aussi 1Tm 2.15. –  ce dont tu as acquis la conviction  : le verbe grec, qui n''apparaît qu''ici dans le N.T., est apparenté au mot habituellement traduit par foi . –  de qui  : cf. 1.5 ; 2.2+,8 ; voir aussi Jn 13.20 ; Hé 13.7.'
  - type: text
    content: 'Quant à toi, demeure en ce que tu as appris, en ce dont tu as acquis la conviction ; tu sais de qui tu l''as appris : '
  '15':
  - type: note
    content: 'depuis ta plus tendre enfance  : l''expression est construite sur le terme traduit ailleurs par nouveau-né, Lc 2.12,16 ; 18.15 ; Ac 7.19 ; 1P 2.2 ; cf. Ac 16.1. –  sacrés  : voir saint. –  te donner la sagesse  : cf. Ps 19.8 ; 119.98 ; Pr 8.33. –  en vue du salut  : cf. Ph 1.19. –  par la foi  : cf. Ac 10.43 ; Ga 3.24 ; 1P 1.10. –  en Jésus-Christ  : cf. Lc 24.27,44 ; Jn 5.39,46 ; Ac 17.3,11.'
  - type: text
    content: 'depuis ta plus tendre enfance, tu connais les Ecrits sacrés ; ils peuvent te donner la sagesse en vue du salut par la foi qui est en Jésus-Christ. '
  '16':
  - type: note
    content: 'Autre traduction possible Toute Ecriture (ou tout texte) inspirée de Dieu est aussi utile…  ; cf. Rm 15.4 ; 2P 1.19ss. –  inspirée de Dieu  : terme apparenté au mot habituellement traduit par esprit (ou souffle) ; cf. 2S 23.2 ; Ac 1.16 ; 4.25 ; 28.25 ; Hé 3.7 ; 9.8 ; 10.15 ; 2P 1.21. –  utile 1Tm 4.8 ; Tt 3.8. –  enseigner  : cf. v. 10n  ; 2.15 ; 1Tm 4.13,16 ; 5.17 ; Tt 2.7 ; voir aussi Ac 8.35 ; 17.2. –  réfuter 4.2+. –  éduquer ou corriger  : cf. 2.25n  ; Ep 6.4. – Voir justice.'
  - type: text
    content: 'Toute Ecriture est inspirée de Dieu et utile pour enseigner, pour réfuter, pour redresser, pour éduquer dans la justice, '
  '17':
  - type: note
    content: 'l''homme (le terme grec désigne habituellement l''être humain en général, homme ou femme) de Dieu 1Tm 6.11+. –  à la hauteur, parfaitement équipé  : les mots grecs ainsi traduits sont apparentés ; le second apparaît également en Ac 21.5 (pour une période qui arrive à son terme). –  pour toute œuvre bonne 2.21+.'
  - type: text
    content: afin que l'homme de Dieu soit à la hauteur, parfaitement équipé pour toute œuvre bonne.
  '2':
  - type: note
    content: 'Cf. Rm 1.29+ss ; 1Tm 1.9s. –  égoïstes  : litt. amis d''eux-mêmes. –  amis de l''argent Lc 16.14 ; 1Tm 6.9s ; Hé 13.5. –  fanfarons ou présomptueux Jc 4.16 ; 1Jn 2.16n. –  orgueilleux Lc 1.51 ; Jc 4.6 ; 1P 5.5. –  blasphémateurs ou calomniateurs, insulteurs  : cf. 1Tm 1.13+. –  rebelles… Tt 1.16 ; 3.3. –  ingrats  : cf. Lc 6.35 ; Rm 1.21. –  sacrilèges 1Tm 1.9 ; voir saint.'
  - type: text
    content: 'Car les gens seront égoïstes, amis de l''argent, fanfarons, orgueilleux, blasphémateurs, rebelles envers leurs parents, ingrats, sacrilèges, '
  '3':
  - type: note
    content: 'insensibles Rm 1.31. –  médisants 1Tm 3.11n. –  ennemis du bien  : cf. Tt 1.8.'
  - type: text
    content: 'insensibles, implacables, médisants, sans maîtrise de soi, cruels, ennemis du bien, '
  '4':
  - type: note
    content: 'traîtres Mt 24.10n. –  emportés  : même terme Ac 19.36 (avec précipitation). –  aveuglés par l''orgueil ou gonflés d''orgueil 1Tm 3.6n. –  amis…  : cf. Ph 3.19.'
  - type: text
    content: 'traîtres, emportés, aveuglés par l''orgueil, amis du plaisir plus que de Dieu ; '
  '5':
  - type: note
    content: 'la forme extérieure  : le même terme est traduit par formule Rm 2.20 ; cf. Mt 7.15ss ; 23.3 ; Rm 2.20s ; 2Co 11.14. –  piété 1Tm 2.2n  ; cf. 6.5. –  renieront…  : cf. 2.12+ ; Tt 1.16. –  Eloigne-toi  : cf. Rm 16.17+.'
  - type: text
    content: ils garderont la forme extérieure de la piété, mais ils en renieront la puissance. Eloigne-toi de ces gens-là.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 's''introduisent  : cf. Jd 4 (verbe apparenté pour se glisser ). –  dans les maisons…  : cf. Mc 12.40/ / ; Tt 1.11. –  prendre à leurs filets  : litt. emmener captives  ; même verbe Lc 21.24 ; Rm 7.23 ; 2Co 10.5. –  des écervelées  : litt. des petites femmes , diminutif péjoratif. – Voir péchés . –  toutes sortes de désirs Tt 3.3.'
  - type: text
    content: 'Il en est parmi eux qui s''introduisent dans les maisons pour prendre à leurs filets des écervelées chargées de péchés et agitées par toutes sortes de désirs, '
  '7':
  - type: note
    content: 'toujours en train d''apprendre  : cf. 1Tm 2.11 ; 5.13n. –  la connaissance de la vérité 2.25 ; 1Tm 2.4n  ; cf. Rm 2.8 ; Ga 5.7.'
  - type: text
    content: 'toujours en train d''apprendre sans jamais pouvoir arriver à la connaissance de la vérité. '
  '8':
  - type: note
    content: 'Jannès et Jambrès  : noms donnés aux mages qui tinrent tête à Moïse (Ex 7.10s,22) dans plusieurs textes juifs, notamment un Targum (Tg) de l''Exode. –  s''opposent ou résistent, même verbe 4.15 ; Ac 6.10 ; 13.8 ; Ep 6.13 ; Jc 4.7 ; 1P 5.9. –  des gens à l''intelligence pervertie 1Tm 6.5n. –  inaptes…  : litt. désapprouvés (ou réprouvés, disqualifiés, qui s''avèrent inaptes à l''épreuve) en ce qui concerne la foi  ; même terme Tt 1.16 ; cf. Rm 1.28n  ; 1Co 9.27 (disqualifié) ; 2Co 13.5nss ; Hé 6.8 ; voir aussi 1Tm 1.19.'
  - type: text
    content: 'De même que Jannès et Jambrès s''opposèrent à Moïse, de même ceux-là s''opposent à la vérité ; ce sont des gens à l''intelligence pervertie, inaptes à l''épreuve de la foi. '
  '9':
  - type: note
    content: 'plus (autre traduction plus beaucoup) de progrès  : cf. v. 13 ; 2.16s. –  stupidité  : cf. 1Tm 6.9. –  évidente…  : cf. Ex 7.12 ; 8.14s ; 9.11 ; 1Tm 5.24 ; Ap 2.2.'
  - type: text
    content: Mais ils ne feront plus de progrès, car leur stupidité sera évidente pour tous, comme le fut celle de ces deux hommes.
  - type: heading
    content: Toi, reste attaché à ce que tu as appris
