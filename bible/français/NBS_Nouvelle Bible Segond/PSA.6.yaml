document_id: PSA.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ne me châtie pas dans ta colère
  - type: text
    content: ' '
  - type: note
    content: 'C''est ici le premier des sept psaumes de pénitence repris par la liturgie chrétienne (également 32 ; 38 ; 51 ; 102 ; 130 ; 143). –  instruments… 4.1n. –  la lyre à huit cordes  : traduction incertaine d''un terme dérivé du chiffre 8 ; on a aussi compris sur la huitième corde ; à l''octave  ; cf. 12.1.'
  - type: text
    content: Du chef de chœur. Avec instruments à cordes. Sur la lyre à huit cordes. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 4.4+.
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a entendu ma supplication ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' accueille ma prière.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 35.4 ; 40.15 ; 71.13 ; 83.18 ; Es 41.11 ; Jr 17.18.
  - type: text
    content: Tous mes ennemis seront saisis de honte et d'épouvante ;
  - type: text
    content: ils reculeront, soudain honteux.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Certains comprennent châtie-moi, mais pas dans ta colère…  ; cf. 38.2 ; Jr 10.24+ ; Pr 3.11s.
  - type: text
    content: Seigneur
  - type: text
    content: ', ne me châtie pas dans ta colère,'
  - type: text
    content: ne me corrige pas dans ta fureur !
  '3':
  - type: text
    content: ' '
  - type: note
    content: Fais-moi grâce / guéris-moi 41.5 ; cf. 30.3 ; 103.3 ; 107.20. –  je dépéris / mes os… 31.11 ; cf. Jr 23.9 ; Jb 4.14.
  - type: text
    content: 'Fais-moi grâce, '
  - type: text
    content: Seigneur
  - type: text
    content: ', car je dépéris ;'
  - type: text
    content: 'guéris-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', car mes os sont dans l''épouvante.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jn 12.27. –  Je suis…  : litt. mon être ou ma vie (hébreu néphesh , terme traditionnellement rendu par âme  ; cf. Gn 1.20n) est très épouvanté(e). Cette façon idiomatique de désigner le sujet sera le plus souvent rendue, dans les Psaumes, par un simple pronom personnel (ici je ) ; dans certains cas il peut suggérer des nuances particulières, notamment l''idée de désir (27.12n  ; 35.25n  ; 131.2n). –  jusqu''à quand 90.13 ; cf. 13.2s ; 62.4 ; 74.9s ; 79.5 ; 80.5 ; 89.47 ; 94.3 ; Es 6.11 ; Ha 1.2 ; Za 1.12 ; Jb 18.2 ; Ap 6.10.'
  - type: text
    content: Je suis tout épouvanté ;
  - type: text
    content: 'et toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', jusqu''à quand… ?'
  '5':
  - type: text
    content: ' '
  - type: note
    content: sauve-moi… 31.17 ; 109.26.
  - type: text
    content: 'Reviens, '
  - type: text
    content: Seigneur
  - type: text
    content: ', délivre-moi ;'
  - type: text
    content: sauve-moi, à cause de ta fidélité.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 30.10 ; 88.6,11-13 ; 115.17 ; Es 38.18. –  on n''évoque pas ton nom  : litt. il n''y a pas de souvenir (ou d''évocation ) de toi , le terme correspondant à souvenir peut désigner le nom ou son évocation ; de même 30.5 ; 97.12 ; 102.13 ; 135.13 ; 145.7 ; cf. Ex 3.15n. – Voir séjour des morts.'
  - type: text
    content: Car, dans la mort, on n'évoque pas ton nom ;
  - type: text
    content: dans le séjour des morts, qui te célébrera ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 38.9 ; 69.4 ; Jr 45.3. –  de mes pleurs  : sous-entendu dans le texte.'
  - type: text
    content: Je me fatigue à force de gémir ;
  - type: text
    content: chaque nuit je baigne mon lit de mes pleurs,
  - type: text
    content: j'arrose mon lit de mes larmes.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Mes yeux  : litt. mon œil  ; cf. 31.10n.'
  - type: text
    content: Mes yeux sont épuisés par la contrariété ;
  - type: text
    content: ils vieillissent à cause de tous mes adversaires.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 119.115 ; 139.19 ; Mt 7.23  ; 25.41 ; Lc 13.27. –  malfaisants 5.6n. –  Car le Seigneur …  : cf. Instruction de Mérikaré 134s : « Il (le dieu) a dressé un sanctuaire autour d''eux (les hommes) et, quand ils pleurent, il entend. »'
  - type: text
    content: Ecartez-vous de moi, vous tous, malfaisants !
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a entendu mes pleurs,'
