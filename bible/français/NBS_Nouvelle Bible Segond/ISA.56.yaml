document_id: ISA.56,104
type_code: fra
verses:
  '1':
  - type: heading
    content: TROISIÈME PARTIE
  - type: heading
    content: Une maison de prière pour tous les peuples
  - type: text
    content: ' '
  - type: note
    content: 'Veillez à  : autres traductions gardez ; observez  ; cf. Ps 106.3. –  équité / justice 1.27+ ; 28.17 ; Jr 22.3 ; Am 5.24. –  près d''arriver… cf. 46.13+. –  de se dévoiler ou de se révéler , cf. 40.5 ; 53.1 ; Ps 98.2.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Veillez à l'équité,
  - type: text
    content: agissez selon la justice ;
  - type: text
    content: car mon salut est près d'arriver,
  - type: text
    content: ma justice est sur le point de se dévoiler.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'guetteurs  : cf. 21.6 ; 52.8 ; Jr 6.17 ; Ez 3.17 ; 33.17. –  chiens muets  : cf. 2S 16.9. –  ils ont des rêveries  : traduction incertaine ; le terme hébreu n''apparaît qu''ici dans l''A.T.'
  - type: text
    content: Ses guetteurs sont tous aveugles,
  - type: text
    content: ils ne savent rien ;
  - type: text
    content: ce sont tous des chiens muets,
  - type: text
    content: incapables d'aboyer ;
  - type: text
    content: ils ont des rêveries,
  - type: text
    content: se tiennent couchés,
  - type: text
    content: aiment à sommeiller.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'voraces  : litt. forts de gosier ou de désir  ; sur le terme hébreu correspondant, cf. 29.8+ ; Gn 1.20n. –  bergers Jr 23.1 ; Ez 34.2. –  leur propre voie  : cf. 53.6 ; 57.17 ; Jr 6.13.'
  - type: text
    content: Ce sont des chiens voraces,
  - type: text
    content: qui ne savent pas être rassasiés.
  - type: text
    content: Ce sont des bergers
  - type: text
    content: qui ne savent rien comprendre.
  - type: text
    content: Tous suivent leur propre voie,
  - type: text
    content: 'chacun selon son intérêt, exclusivement :'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 5.11 ; 28.7. Ce v. ne figure pas dans LXX. –  alcool 5.11+ ; Lv 10.9n.
  - type: text
    content: « Venez, je vais chercher du vin,
  - type: text
    content: nous nous enivrerons d'alcool !
  - type: text
    content: 'Nous en ferons autant demain :'
  - type: text
    content: il en reste en grande abondance ! »
  '2':
  - type: text
    content: ' '
  - type: note
    content: Heureux… 30.18+. –  être humain 51.12n. –  observant (aussi v. 1,4,6) et gardant traduisent un même verbe hébreu. –  sabbat 58.13 ; Ex 20.8 ; Am 8.5. –  profaner v. 4,6 ; cf. 43.28+.
  - type: text
    content: Heureux l'homme qui fait cela,
  - type: text
    content: l'être humain qui s'y tient,
  - type: text
    content: observant le sabbat,
  - type: text
    content: pour ne pas le profaner,
  - type: text
    content: et gardant sa main de toute action mauvaise !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'l''étranger  : il ne s''agit pas ici de l’ immigré mais de l''étranger de passage, ailleurs exclu du culte et des avantages de la loi ; voir v. 6 ; cf. 43.12 ; 60.10 ; 61.5 ; 62.8 ; 65.5 ; Ex 12.43 ; Dt 14.21 ; 15.3 ; 23.4-9,21 ; Ez 44.7-9 ; Né 9.2. –  qui s''attache  : de la même racine hébraïque est tiré le nom lévite (cf. Gn 29.34n) ; de même au v. 6. –  l''eunuque cf. Lv 21.20 ; Dt 23.2.'
  - type: text
    content: 'Que l''étranger qui s''attache au '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne dise pas :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me séparera de son peuple !'
  - type: text
    content: 'Que l''eunuque ne dise pas :'
  - type: text
    content: Je suis un arbre sec !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 19.12 ; Sagesse 3.14 : « Heureux aussi (comme la femme stérile) l''eunuque, dont la main n''a pas fait de mal et qui n''a pas nourri des pensées mauvaises contre le Seigneur : il recevra pour sa fidélité une grâce de choix et une part plus délicieuse dans le Temple du Seigneur. » –  voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 1 ; 7.15). –  qui choisissent ce à quoi je prends plaisir  : cf. 65.12 ; 66.4.'
  - type: text
    content: 'Car voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: aux eunuques qui observent mes sabbats,
  - type: text
    content: qui choisissent ce à quoi je prends plaisir
  - type: text
    content: 'et qui demeurent fermes dans mon alliance :'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'un monument  : litt. une main , cf. 57.8n  ; voir aussi 1S 15.12 ; 2S 18.18n (cas d''un homme sans héritier). On pourrait également comprendre une place (le même mot est rendu par endroit en Dt 23.13) ou une part ( partie en Gn 47.24). –  un nom  : autre traduction une renommée  ; on pourrait aussi comprendre un monument à leur nom. –  meilleurs que des fils… cf. 1S 1.8 ; Sagesse 4.1 : « Mieux vaut ne pas avoir d''enfant et posséder la vertu qui laisse un souvenir riche d''immortalité. » –  un nom pour toujours…  : cf. 55.13 ; Ps 112.6 ; Ap 3.5.'
  - type: text
    content: Je leur donnerai dans ma maison et dans mes murs
  - type: text
    content: un monument et un nom
  - type: text
    content: meilleurs que des fils et des filles ;
  - type: text
    content: je leur donnerai un nom pour toujours,
  - type: text
    content: il ne sera jamais retranché.
  '6':
  - type: text
    content: ' '
  - type: note
    content: étrangers v. 3n  ; 1R 8.41-43. –  sabbat… v. 2+.
  - type: text
    content: 'Quant aux étrangers qui s''attacheront au '
  - type: text
    content: Seigneur
  - type: text
    content: afin d'officier pour lui,
  - type: text
    content: 'qui aimeront le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: au point de devenir ses serviteurs,
  - type: text
    content: tous ceux qui observeront le sabbat
  - type: text
    content: en se gardant de le profaner,
  - type: text
    content: et qui demeureront fermes dans mon alliance,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'montagne sacrée ou sainte 11.9+ ; cf. Ps 15. –  sacrifices… agréés 60.7 ; Ex 28.38n  ; Lv 1.3+. –  ma maison sera appelée… Mt 21.13/ /. –  pour tous les peuples  : autre traduction par tous les peuples.'
  - type: text
    content: je les amènerai dans ma montagne sacrée
  - type: text
    content: et je les réjouirai dans ma maison de prière ;
  - type: text
    content: leurs holocaustes et leurs sacrifices
  - type: text
    content: seront agréés sur mon autel ;
  - type: text
    content: car ma maison sera appelée
  - type: text
    content: « Maison de prière pour tous les peuples ».
  '8':
  - type: text
    content: ' '
  - type: note
    content: rassemble les bannis 11.12 ; Ps 147.2. –  J'en rassemblerai d'autres 66.18 ; Jn 10.16.
  - type: text
    content: 'Déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ','
  - type: text
    content: 'qui rassemble les bannis d''Israël :'
  - type: text
    content: J'en rassemblerai d'autres
  - type: text
    content: avec les siens déjà rassemblés.
  - type: heading
    content: Des chefs indignes
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 12.9 ; Ez 39.17-20 ; Ps 80.14. –  animaux sauvages (ou des champs, de la campagne ) cf. 43.20n.
  - type: text
    content: Vous tous, animaux sauvages, venez manger,
  - type: text
    content: vous tous, animaux de la forêt !
