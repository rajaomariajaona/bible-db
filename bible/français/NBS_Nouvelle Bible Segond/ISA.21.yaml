document_id: ISA.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Elle est tombée, Babylone
  - type: text
    content: ' '
  - type: note
    content: 'Sentence 13.1n. –  le désert de la mer  : désignation probable de la Basse-Mésopotamie (Babylonie, voir 13.1+), entourée par le golfe Persique, le Tigre et l''Euphrate ; LXX vision du désert  ; certains modifient le texte hébreu traditionnel pour lire sentence venant du désert ; un grondement vient du désert . –  balaient  : cf. 2.18n. –  désert / redoutable 30.6 ; Dt 1.19 ; 8.15 ; Jr 2.6.'
  - type: text
    content: Sentence sur le désert de la mer.
  - type: text
    content: Comme les ouragans qui balaient le Néguev,
  - type: text
    content: il arrive du désert, d'un pays redoutable.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Vous qui…  : litt. ma battue, fils de mon aire  ; cf. 28.27 ; 41.15 ; Jr 51.33 ; Am 1.3 ; Mi 4.13 ; Ha 3.12. –  ce que j''ai appris  : cf. 28.22.'
  - type: text
    content: Vous qui avez été battus comme du grain sur mon aire,
  - type: text
    content: 'ce que j''ai appris du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, Dieu d''Israël,'
  - type: text
    content: je vous l'ai dit.
  - type: heading
    content: Garde, où en est la nuit ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: Sentence 13.1n. – On situe généralement Douma en Arabie (Gn 25.14 ; 1Ch 1.30), non loin de Séir ou Edom (Gn 14.6 ; 32.4 ; Dt 2.4), au sud-est de la mer Morte. Douma signifie aussi silence (Ps 94.17 ; 115.17), d'où la traduction possible sentence silencieuse. LXX a traduit Idumée , nom plus récent d'Edom. –  Garde 62.6 ; cf. v. 6 ; Ez 33.2,6 ; Ps 130.6.
  - type: text
    content: Sentence sur Douma.
  - type: text
    content: 'On me crie de Séir :'
  - type: text
    content: Garde, où en est la nuit ?
  - type: text
    content: Garde, où en est la nuit ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'matin / nuit  : cf. 17.14 ; 37.36 ; Ps 30.6 ; 46.6 ; Rm 13.12 ; d''autres comprennent  : le matin vient, mais il fait encore nuit. –  Revenez  : cf. 1.27n.'
  - type: text
    content: 'Le garde répond :'
  - type: text
    content: Le matin vient, et la nuit aussi.
  - type: text
    content: 'Si '
  - type: text
    content: vous voulez interroger, interrogez !
  - type: text
    content: 'Revenez, '
  - type: text
    content: oui, venez !
  - type: heading
    content: Contre l'Arabie
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Sentence 13.1n. –  l''Arabie  : le terme pourrait aussi s''appliquer à toute région aride où séjournent des nomades (cf. 13.20). –  broussailles  : le terme est souvent traduit par forêt. –  de Dedân  : litt. des Dedanites , peuple nomade, cf. Gn 10.7 ; 25.2s ; Jr 25.23 ; 49.8 ; Ez 25.13 ; 27.15,20 ; 38.13.'
  - type: text
    content: Sentence contre l'Arabie.
  - type: text
    content: Vous passerez la nuit dans les broussailles de l'Arabie,
  - type: text
    content: caravanes de Dedân !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Téma  : oasis au nord-ouest de la péninsule arabique ; cf. Gn 25.15 ; 1Ch 1.30.'
  - type: text
    content: Portez de l'eau à ceux qui ont soif ;
  - type: text
    content: les habitants du pays de Téma
  - type: text
    content: vont au-devant des fugitifs avec du pain.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'les malheurs  : litt. le poids.'
  - type: text
    content: Car ils fuient devant les épées,
  - type: text
    content: devant l'épée tirée, devant l'arc tendu,
  - type: text
    content: devant les malheurs de la guerre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'années d''un salarié 16.14n. –  Qédar  : autre tribu nomade (42.11 ; 60.7 ; Gn 25.13n  ; Jr 2.10 ; Ez 27.21 ; Ps 120.5) ; elle s''était mise au service des envahisseurs (cf. Jr 49.28-33).'
  - type: text
    content: 'Car ainsi m''a parlé le Seigneur : Encore une année comme les années d''un salarié, et toute la gloire de Qédar disparaîtra. '
  '17':
  - type: note
    content: Cf. 1.9+.
  - type: text
    content: 'Il ne restera qu''un petit nombre de vaillants archers, fils de Qédar – c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, qui parle.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'terrible  : litt. dure . –  m''apparaît  : autres traductions m''est rapportée ; m''est révélée . –  traître  : Elam (11.11n) et la Médie (13.17n), peuples de l''empire perse, avaient été alliés de Babylone avant de se retourner contre elle ; cf. 24.16 ; 33.1.'
  - type: text
    content: 'Une vision terrible m''apparaît :'
  - type: text
    content: le traître trahit, le ravageur ravage.
  - type: text
    content: Pars à l'attaque, Elam ! Assiège, Médie !
  - type: text
    content: Je fais cesser tous les soupirs.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 16.11 ; cf. 13.8.
  - type: text
    content: C'est pourquoi mes reins sont remplis de souffrance ;
  - type: text
    content: des douleurs s'emparent de moi,
  - type: text
    content: comme les douleurs d'une femme qui accouche ;
  - type: text
    content: les spasmes m'empêchent d'entendre,
  - type: text
    content: l'épouvante m'empêche de voir.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'le crépuscule…  : cf. Jb 7.13s. –  s''est changé…  : autre traduction il (Dieu) l''a changé. –  tremblement ou frayeur, déroute.'
  - type: text
    content: Mon cœur est égaré,
  - type: text
    content: un frémissement me remplit d'effroi ;
  - type: text
    content: le crépuscule que je désirais s'est changé pour moi en un tremblement.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dn 5. –  la garde veille  : autre traduction on déploie les tapis  ; cette proposition est omise par LXX. –  Oignez d''huile  : le verbe a ailleurs le sens d’ oindre d''huile ou de donner l''onction (61.1) ; il est apparenté au mot traditionnellement transcrit messie (45.1n). Les boucliers de cuir étaient graissés pour que les flèches glissent dessus au lieu d''y pénétrer (2S 1.21n).'
  - type: text
    content: On dresse la table,
  - type: text
    content: la garde veille,
  - type: text
    content: on mange, on boit…
  - type: text
    content: Debout, princes !
  - type: text
    content: Oignez d'huile le bouclier !
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 11s ; 52.8 ; 56.10 ; Ez 33 ; Ha 2.1.
  - type: text
    content: 'Car ainsi m''a parlé le Seigneur :'
  - type: text
    content: va, place le guetteur ;
  - type: text
    content: qu'il annonce ce qu'il voit.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'des chars , selon le sens habituel du terme hébreu qui sera traduit plus loin par colonnes. Autre traduction possible une cavalerie. –  des chevaux  : le terme hébreu désigne habituellement l''attelage d''un char ou son équipage ; cf. Ez 26.7n,10 ; Os 1.7n.'
  - type: text
    content: Il voit des chars,
  - type: text
    content: des chevaux deux à deux,
  - type: text
    content: des colonnes d'ânes,
  - type: text
    content: des colonnes de chameaux ;
  - type: text
    content: et il était attentif, très attentif.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'il cria comme un lion  : sens incertain ; les mots du texte hébreu traditionnel se traduiraient plus naturellement un lion cria , mais cela n''est guère satisfaisant dans ce contexte. Un ms de Qumrân porte le voyant (ou celui qui regardait ) cria.'
  - type: text
    content: 'Puis il cria comme un lion :'
  - type: text
    content: Seigneur, le jour je me tiens constamment sur la tour de guet,
  - type: text
    content: et toutes les nuits je suis debout à mon poste de garde ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Des chars… v. 7n. –  Elle est tombée Jr 51.8 ; Ap 18.2. –  il les a brisées  : le sujet n''est pas exprimé (Dieu ou l''ennemi de Babylone). Plusieurs versions anciennes ont lu le passif  : elles (les statues) ont été brisées.'
  - type: text
    content: Des chars arrivent, avec des hommes ;
  - type: text
    content: des chevaux, deux à deux !
  - type: text
    content: 'Alors il dit :'
  - type: text
    content: Elle est tombée, elle est tombée, Babylone !
  - type: text
    content: Toutes les statues de ses dieux,
  - type: text
    content: il les a brisées à terre !
