document_id: 2CH.34,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Josias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 22.1-2
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josias avait huit ans lorsqu''il devint roi ; il régna trente et un ans à Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On le confia à ceux qui avaient la responsabilité de faire les travaux dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Ils le donnèrent à ceux qui faisaient les travaux, qui travaillaient dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour consolider et réparer la Maison ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils le donnèrent aux artisans, aux bâtisseurs, pour les achats de pierres de taille et de bois destinés aux assemblages ainsi que pour charpenter les maisons que les rois de Juda avaient détruites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec probité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 19.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans leur travail
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le travail
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Qehatites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' des Qehatites.'
      marker-yv: yv-n
    - type: text
      text: 'Ces hommes agirent avec probité dans leur travail. Ils étaient placés sous la responsabilité de Yahath et d''Abdias, lévites d''entre les fils de Merari, et de Zacharie et Meshoullam, d''entre les Qehatites, chargés de la surveillance. Ces lévites étaient tous d''habiles musiciens. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: surveillaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu correspondant (aussi au v. 12) est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'conduire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 1Ch 15.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chantier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot correspondant est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'service '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: travail
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''autres '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 9. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: scribes
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 24.11 ; Né 13.13.
      marker-yv: yv-n
    - type: text
      text: Ils s'occupaient des fardeaux, ils surveillaient tous ceux qui faisaient les travaux, chantier par chantier ; il y avait encore d'autres lévites, scribes, secrétaires et portiers.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le livre de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jos 8.31+ ; 2R 22.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: donné par l'intermédiaire de Moïse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par la main de Moïse.
      marker-yv: yv-n
    - type: text
      text: 'Quand on sortit l''argent qui avait été apporté dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Hilqiya, le prêtre, trouva le livre de la loi du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' donné par l''intermédiaire de Moïse. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Hilqiya dit à Shaphân, le scribe : J''ai trouvé le livre de la loi dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! Hilqiya donna le livre à Shaphân. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2R 22.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui leur a été commandé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui a été donné dans la main de tes serviteurs.
      marker-yv: yv-n
    - type: text
      text: 'Shaphân apporta le livre au roi et lui rendit aussi compte, en disant : Tes serviteurs ont fait tout ce qui leur a été commandé ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux responsables…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et ils (l’)ont donné sur la main des responsables et sur la main de ceux qui font l'ouvrage.
      marker-yv: yv-n
    - type: text
      text: 'ils ont versé l''argent qui se trouvait dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' aux responsables et à ceux qui font l''ouvrage. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shaphân, le scribe, dit encore au roi : Hilqiya, le prêtre, m''a donné un livre. Et Shaphân le lut à haute voix devant le roi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josias fait consulter la prophétesse Houlda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 22.11-20
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque le roi entendit les paroles de la loi, il déchira ses vêtements. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui convenait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit ce qui convenait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et suivit les voies de David, son père. Il ne s''en écarta ni à droite ni à gauche.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les réformes de Josias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 23.4-20
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi donna cet ordre à Hilqiya, à Ahiqam, fils de Shaphân, à Abdôn, fils de Michée, à Shaphân, le scribe, et à Asaya, serviteur du roi : '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consulter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chercher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 3,26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: observé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gardé.
      marker-yv: yv-n
    - type: text
      text: 'Allez consulter le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour moi et pour ceux qui restent en Israël et en Juda, au sujet des paroles de ce livre qu''on a trouvé ; car grande est la fureur du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui s''est répandue sur nous, parce que nos pères n''ont pas observé la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; ils n''ont pas agi selon tout ce qui est écrit dans ce livre.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avait désignés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avait envoyés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le verbe est sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la Ville Neuve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2R 22.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Hilqiya et ceux qu''avait désignés le roi allèrent trouver la prophétesse Houlda, femme de Shalloum, fils de Toqehath, fils de Hasra, gardien des vêtements. Elle habitait à Jérusalem, dans la Ville Neuve. Ils lui parlèrent comme convenu. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle leur dit : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël : Dites à l''homme qui vous a envoyés à moi : '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Jr 37.7-10 ; 38.2s ; 42.1ss etc. – Voir '
      - type: usfm
        marker: bdit
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Je fais venir sur ce lieu et sur ses habitants un malheur, toutes les malédictions écrites dans le livre qu''on a lu devant le roi de Juda. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puisqu''ils m''ont abandonné et qu''ils ont offert de l''encens à d''autres dieux, me contrariant ainsi par toutes les œuvres de leurs mains, ma fureur s''est répandue sur ce lieu : elle ne s''éteindra pas. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'consulter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais vous direz au roi de Juda qui vous a envoyés consulter le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël – les paroles que tu as entendues : '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' a été touché '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2R 22.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu t''es humilié devant Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses paroles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mes paroles.
      marker-yv: yv-n
    - type: text
      text: 'Parce que ton cœur a été touché, parce que tu t''es humilié devant Dieu en entendant ses paroles contre ce lieu et contre ses habitants, parce que tu t''es humilié devant moi, parce que tu as déchiré tes vêtements et que tu as pleuré devant moi, moi aussi, j''ai entendu – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ton tombeau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tes tombeaux.
      marker-yv: yv-n
    - type: text
      text: Je te réunirai à tes pères, tu seras recueilli en paix dans ton tombeau, et tes yeux ne verront pas tout le malheur que je ferai venir sur ce lieu et sur ses habitants. Ils rapportèrent cette réponse au roi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josias renouvelle l'alliance avec Dieu
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 23.1-3
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi fit rassembler tous les anciens de Juda et de Jérusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 14.2-4 ; 17.6 ; 31.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chercher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: consulter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: hauts
        - type: text
          text: ' lieux.'
      marker-yv: yv-n
    - type: text
      text: 'Pendant huit années de son règne, comme il était encore jeune, il commença à chercher le Dieu de David, son père ; et la douzième année, il se mit à purifier Juda et Jérusalem des hauts lieux, des poteaux cultuels (des ashéras), des statues et des idoles de métal fondu. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il leur lut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il lut à leurs oreilles.
      marker-yv: yv-n
    - type: text
      text: 'Puis le roi monta à la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
