document_id: 2CH.34,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Josias
  - type: heading
    content: 2R 22.1-2
  - type: text
    content: 'Josias avait huit ans lorsqu''il devint roi ; il régna trente et un ans à Jérusalem. '
  '10':
  - type: text
    content: 'On le confia à ceux qui avaient la responsabilité de faire les travaux dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils le donnèrent à ceux qui faisaient les travaux, qui travaillaient dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour consolider et réparer la Maison ; '
  '11':
  - type: text
    content: 'ils le donnèrent aux artisans, aux bâtisseurs, pour les achats de pierres de taille et de bois destinés aux assemblages ainsi que pour charpenter les maisons que les rois de Juda avaient détruites. '
  '12':
  - type: note
    content: 'avec probité  : cf. 19.9n. –  dans leur travail  : litt. dans le travail. –  les Qehatites  : litt. les fils des Qehatites.'
  - type: text
    content: 'Ces hommes agirent avec probité dans leur travail. Ils étaient placés sous la responsabilité de Yahath et d''Abdias, lévites d''entre les fils de Merari, et de Zacharie et Meshoullam, d''entre les Qehatites, chargés de la surveillance. Ces lévites étaient tous d''habiles musiciens. '
  '13':
  - type: note
    content: 'surveillaient  : le verbe hébreu correspondant (aussi au v. 12) est traduit par conduire en 1Ch 15.21n. –  chantier  : le mot correspondant est habituellement traduit par service ou travail. –  d''autres lévites  : cf. v. 9. –  scribes 24.11 ; Né 13.13.'
  - type: text
    content: Ils s'occupaient des fardeaux, ils surveillaient tous ceux qui faisaient les travaux, chantier par chantier ; il y avait encore d'autres lévites, scribes, secrétaires et portiers.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'le livre de la loi  : cf. Jos 8.31+ ; 2R 22.8+. –  donné par l''intermédiaire de Moïse  : litt. par la main de Moïse.'
  - type: text
    content: 'Quand on sortit l''argent qui avait été apporté dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', Hilqiya, le prêtre, trouva le livre de la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ' donné par l''intermédiaire de Moïse. '
  '15':
  - type: text
    content: 'Alors Hilqiya dit à Shaphân, le scribe : J''ai trouvé le livre de la loi dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Hilqiya donna le livre à Shaphân. '
  '16':
  - type: note
    content: '2R 22.9n. –  ce qui leur a été commandé  : litt. ce qui a été donné dans la main de tes serviteurs.'
  - type: text
    content: 'Shaphân apporta le livre au roi et lui rendit aussi compte, en disant : Tes serviteurs ont fait tout ce qui leur a été commandé ; '
  '17':
  - type: note
    content: 'aux responsables…  : litt. et ils (l’)ont donné sur la main des responsables et sur la main de ceux qui font l''ouvrage.'
  - type: text
    content: 'ils ont versé l''argent qui se trouvait dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' aux responsables et à ceux qui font l''ouvrage. '
  '18':
  - type: text
    content: 'Shaphân, le scribe, dit encore au roi : Hilqiya, le prêtre, m''a donné un livre. Et Shaphân le lut à haute voix devant le roi.'
  - type: heading
    content: Josias fait consulter la prophétesse Houlda
  - type: heading
    content: 2R 22.11-20
  '19':
  - type: text
    content: 'Lorsque le roi entendit les paroles de la loi, il déchira ses vêtements. '
  '2':
  - type: note
    content: 'ce qui convenait…  : cf. 20.32n.'
  - type: text
    content: 'Il fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ' et suivit les voies de David, son père. Il ne s''en écarta ni à droite ni à gauche.'
  - type: heading
    content: Les réformes de Josias
  - type: heading
    content: 2R 23.4-20
  '20':
  - type: text
    content: 'Le roi donna cet ordre à Hilqiya, à Ahiqam, fils de Shaphân, à Abdôn, fils de Michée, à Shaphân, le scribe, et à Asaya, serviteur du roi : '
  '21':
  - type: note
    content: 'consulter  : litt. chercher, cf. v. 3,26. –  observé  : autre traduction gardé.'
  - type: text
    content: 'Allez consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour moi et pour ceux qui restent en Israël et en Juda, au sujet des paroles de ce livre qu''on a trouvé ; car grande est la fureur du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui s''est répandue sur nous, parce que nos pères n''ont pas observé la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils n''ont pas agi selon tout ce qui est écrit dans ce livre.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'avait désignés ou avait envoyés , le verbe est sous-entendu dans le texte. –  dans la Ville Neuve  : cf. 2R 22.14n.'
  - type: text
    content: 'Hilqiya et ceux qu''avait désignés le roi allèrent trouver la prophétesse Houlda, femme de Shalloum, fils de Toqehath, fils de Hasra, gardien des vêtements. Elle habitait à Jérusalem, dans la Ville Neuve. Ils lui parlèrent comme convenu. '
  '23':
  - type: text
    content: 'Elle leur dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Dites à l''homme qui vous a envoyés à moi : '
  '24':
  - type: note
    content: Cf. Jr 37.7-10 ; 38.2s ; 42.1ss etc. – Voir bénédiction, malédiction.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je fais venir sur ce lieu et sur ses habitants un malheur, toutes les malédictions écrites dans le livre qu''on a lu devant le roi de Juda. '
  '25':
  - type: text
    content: 'Puisqu''ils m''ont abandonné et qu''ils ont offert de l''encens à d''autres dieux, me contrariant ainsi par toutes les œuvres de leurs mains, ma fureur s''est répandue sur ce lieu : elle ne s''éteindra pas. '
  '26':
  - type: note
    content: consulter v. 21n.
  - type: text
    content: 'Mais vous direz au roi de Juda qui vous a envoyés consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël – les paroles que tu as entendues : '
  '27':
  - type: note
    content: 'ton cœur a été touché 2R 22.19n. –  tu t''es humilié devant Dieu 12.6+. –  ses paroles  : certains mss et LXX portent mes paroles.'
  - type: text
    content: 'Parce que ton cœur a été touché, parce que tu t''es humilié devant Dieu en entendant ses paroles contre ce lieu et contre ses habitants, parce que tu t''es humilié devant moi, parce que tu as déchiré tes vêtements et que tu as pleuré devant moi, moi aussi, j''ai entendu – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '28':
  - type: note
    content: 'ton tombeau  : litt. tes tombeaux.'
  - type: text
    content: Je te réunirai à tes pères, tu seras recueilli en paix dans ton tombeau, et tes yeux ne verront pas tout le malheur que je ferai venir sur ce lieu et sur ses habitants. Ils rapportèrent cette réponse au roi.
  - type: heading
    content: Josias renouvelle l'alliance avec Dieu
  - type: heading
    content: 2R 23.1-3
  '29':
  - type: text
    content: 'Le roi fit rassembler tous les anciens de Juda et de Jérusalem. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 14.2-4 ; 17.6 ; 31.1. –  chercher  : autre traduction consulter . – Voir hauts lieux.'
  - type: text
    content: 'Pendant huit années de son règne, comme il était encore jeune, il commença à chercher le Dieu de David, son père ; et la douzième année, il se mit à purifier Juda et Jérusalem des hauts lieux, des poteaux cultuels (des ashéras), des statues et des idoles de métal fondu. '
  '30':
  - type: note
    content: 'Il leur lut  : litt. il lut à leurs oreilles.'
  - type: text
    content: 'Puis le roi monta à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec tous les hommes de Juda et les habitants de Jérusalem, les prêtres, les lévites et tout le peuple, du plus grand au plus petit. Il leur lut toutes les paroles du livre de l''alliance qu''on avait trouvé dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '31':
  - type: note
    content: de tout son cœur et de toute son âme (cf. Gn 1.20n) 15.12 ; 1R 2.4+.
  - type: text
    content: 'Le roi se tenait debout à sa place et, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', il conclut l''alliance en s''engageant à suivre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et à observer ses commandements, ses préceptes et ses prescriptions de tout son cœur et de toute son âme, afin de mettre en pratique les paroles de l''alliance écrites dans ce livre. '
  '32':
  - type: note
    content: 'Il fit adhérer  : litt. il fit tenir debout  ; il faut probablement sous-entendre (adhérer) à l''alliance  ; certains modifient le texte hébreu traditionnel pour lire effectivement à l''alliance au lieu de et en Benjamin (cf. v. 30). En tout cas, à la différence de 2R 23.3, c''est ici le roi qui est présenté comme la cause de l''adhésion du peuple.'
  - type: text
    content: 'Il fit adhérer tous ceux qui se trouvaient à Jérusalem et en Benjamin ; et les habitants de Jérusalem agirent selon l''alliance de Dieu, du Dieu de leurs pères. '
  '33':
  - type: note
    content: 'Il obligea / à servir traduisent deux formes du même verbe hébreu. –  toute sa vie  : litt. tous ses jours.'
  - type: text
    content: 'Josias supprima toutes les abominations venues de tous les pays et appartenant aux Israélites. Il obligea tous ceux qui se trouvaient en Israël à servir le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu. Pendant toute sa vie, ils ne s''écartèrent pas du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères.'
  '4':
  - type: note
    content: 'Voir Baals. –  brasiers à encens v. 7 ; 14.4 ; Lv 26.30n. –  sur les tombes…  : litt. sur les tombes qui leur avaient sacrifié  ; certains modifient le texte hébreu traditionnel pour lire sur les tombes où étaient ensevelis ceux qui leur avaient sacrifié.'
  - type: text
    content: 'On démolit devant lui les autels des Baals, il abattit les brasiers à encens qui étaient dessus ; il brisa les poteaux cultuels (les ashéras), les statues et les idoles de métal fondu, il les réduisit en poussière, il en jeta la poussière sur les tombes, sur ceux qui leur avaient sacrifié ; '
  '5':
  - type: note
    content: 'les autels  : autre lecture traditionnelle leurs autels.'
  - type: text
    content: 'il brûla les ossements des prêtres sur les autels. C''est ainsi qu''il purifia Juda et Jérusalem. '
  '6':
  - type: text
    content: 'Dans les villes de Manassé, d''Ephraïm, de Siméon, et jusqu''en Nephtali, parmi leurs ruines, tout autour, '
  '7':
  - type: note
    content: brasiers… v. 4+.
  - type: text
    content: il démolit les autels ; les poteaux cultuels (les ashéras) et les statues, il les mit en pièces et les réduisit en poussière ; il abattit tous les brasiers à encens dans tous le pays d'Israël. Puis il revint à Jérusalem.
  - type: heading
    content: Le grand prêtre découvre le livre de la loi
  - type: heading
    content: 2R 22.3-10
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'pour purifier  : autre traduction alors qu''il purifiait  ; d''après certains mss de LXX, quelques-uns modifient le texte hébreu traditionnel pour lire quand il eut achevé de purifier . –  la Maison  : c.-à-d. le temple. –  Shaphân, fils d''Atsalia 2R 22.3n. –  Yoah… l''archiviste  : cf. 1R 4.3 ; 2R 18.18,37 ; voir aussi 2S 8.16n.'
  - type: text
    content: 'La dix-huitième année de son règne, pour purifier le pays et la Maison, il envoya Shaphân, fils d''Atsalia, Maaséya, chef de la ville, et Yoah, fils de Joachaz, l''archiviste, pour réparer la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu. '
  '9':
  - type: text
    content: 'Ils vinrent trouver Hilqiya, le grand prêtre, et on donna l''argent qui avait été apporté dans la maison de Dieu, et que les lévites gardiens du seuil avaient recueilli de Manassé et d''Ephraïm et de tout le reste d''Israël, ainsi que de tout Juda et Benjamin ; et ils revinrent à Jérusalem. '
