  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 17.6 ; voir aussi 14.4 ; 15.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'n''avait pas encore le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre texte en 1R 22.44s.'
    marker-yv: yv-n
  - type: text
    text: 'Toutefois les hauts lieux ne disparurent pas : le peuple n''avait pas encore le cœur fermement attaché au Dieu de ses pères.'
