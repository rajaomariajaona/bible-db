      marker: fr
      children:
      - type: text
        text: '20.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Achazia, qui agissait en méchant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: ') : cf. 1R 22.53s ; même forme verbale en 22.3 ; Né 9.33+.'
    marker-yv: yv-n
  - type: text
    text: 'Après cela, Josaphat, roi de Juda, s''associa avec le roi d''Israël, Achazia, qui agissait en méchant. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bateaux qui devaient aller à Tarsis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jon 1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il s''associa avec lui pour construire des bateaux qui devaient aller à Tarsis ; ils construisirent ces bateaux à Etsiôn-Guéber. '
  - type: usfm
    marker: v
    metadata:
