    marker-yv: yv-n
  - type: text
    text: Le royaume de Josaphat fut tranquille, et son Dieu lui accorda le repos de tous côtés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fin du règne de Josaphat
  marker-yv: yv-h
- type: usfm
  marker: r
