  - type: text
    text: 'Ils se levèrent de bon matin et partirent pour le désert de Teqoa. A leur départ, Josaphat se tint debout et dit : Ecoutez-moi, Juda et habitants de Jérusalem ! Mettez votre foi dans le '
  - type: usfm
