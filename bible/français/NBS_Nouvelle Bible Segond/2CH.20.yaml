      marker: fr
      children:
      - type: text
        text: '20.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le prophète '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eliézer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'n''est mentionné nulle part ailleurs. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: détruit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe correspondant est souvent traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ouvrir une brèche (dans)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 24.7 ; 25.23 ; 1Ch 13.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 15.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors Eliézer, fils de Dodavahou de Marésha, parla en prophète sur Josaphat, il dit : Parce que tu t''es associé avec Achazia, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' détruit tes œuvres. Les bateaux se brisèrent et ne purent aller à Tarsis.'
