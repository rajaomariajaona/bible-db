    marker-yv: yv-n
  - type: text
    text: Le reste de l'histoire de Josaphat, le début et la fin, cela est écrit dans l'histoire de Jéhu, fils de Hanani, qui figure dans le livre des rois d'Israël.
- type: usfm
  marker: p
