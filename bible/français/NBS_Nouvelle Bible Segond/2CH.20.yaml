document_id: 2CH.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le royaume de Juda attaqué ; prière de Josaphat
  - type: text
    content: ' '
  - type: note
    content: et avec eux les Maonites , d'après LXX  ; texte hébreu traditionnel et avec eux parmi les Ammonites. Cf. 26.7. Les Maonites sont une tribu édomite de la région de Séir, au sud de la mer Morte ; cf. v. 10,22s.
  - type: text
    content: 'Après cela, les Moabites et les Ammonites, et avec eux les Maonites, arrivèrent pour combattre Josaphat. '
  '10':
  - type: note
    content: 'les gens de la région montagneuse de Séir  : c.-à-d. les Edomites. –  chez qui tu n''as pas permis à Israël d''entrer…  : cf. Nb 20.14-21 ; Dt 2.4-6,9,18s. –  détruits  : le même verbe hébreu est traduit par exterminer au v. 23.'
  - type: text
    content: 'Les Ammonites, les Moabites et les gens de la région montagneuse de Séir, chez qui tu n''as pas permis à Israël d''entrer quand il venait d''Egypte, – car il s''est écarté d''eux et ne les a pas détruits – '
  '11':
  - type: note
    content: 'ta possession  : cf. Dt 2.5,9,12,19 ; Jg 11.15-27 ; voir aussi Ex 15.17 ; Jr 2.7. –  que tu nous as donnée  : litt. que tu nous as fait posséder ou dont tu nous as fait prendre possession.'
  - type: text
    content: 'ceux-là nous récompensent en venant nous chasser de ta possession, que tu nous as donnée. '
  '12':
  - type: note
    content: 'nous sommes sans force  : cf. v. 6. –  cette grande multitude v. 2 ; cf. v. 15 ; 13.8+. –  contre nous et sur toi traduisent une même préposition hébraïque. –  nos yeux sont fixés sur toi  : cf. 1R 1.20.'
  - type: text
    content: 'Notre Dieu, n''exerceras-tu pas tes jugements sur eux ? Car nous sommes sans force devant cette grande multitude qui s''avance contre nous, et nous ne savons que faire : nos yeux sont fixés sur toi.'
  - type: heading
    content: Le Seigneur donne la victoire à Juda
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'se tenait…  : cf. v. 5,9. –  leurs familles ou leurs enfants  : cf. 31.18 ; Gn 34.29n.'
  - type: text
    content: 'Tout Juda se tenait debout devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec toutes leurs familles, leurs femmes et leurs fils. '
  '14':
  - type: note
    content: 'le souffle (ou l''Esprit) …  : cf. 15.1+. – Voir lévite. –  fils d''Asaph  : famille de chantres, cf. 1Ch 15.17 ; voir 1Ch 25.1ss.'
  - type: text
    content: 'Alors le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur Yahaziel, fils de Zacharie, fils de Benaya, fils de Yéiel, fils de Mattania, lévite, d''entre les fils d''Asaph, au milieu de l''assemblée. '
  '15':
  - type: note
    content: 'vous tous…  : cf. 13.4 ; 15.2. –  N''ayez pas peur, ne soyez pas terrifiés  : cf. 32.7 ; 1Ch 22.13 ; 28.20 ; voir aussi Dt 1.21 ; 31.8 ; Jos 8.1 etc. Voir crainte. –  ce n''est pas votre combat  : cf. v. 17 ; Ex 14.13s.'
  - type: text
    content: 'Et Yahaziel dit : Prêtez attention, vous tous, Juda et habitants de Jérusalem, et toi, roi Josaphat ! Ainsi vous parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : N''ayez pas peur, ne soyez pas terrifiés par cette grande multitude, car ce n''est pas votre combat, mais celui de Dieu. '
  '16':
  - type: note
    content: montée du Tsits, ou montée de la Fleur. Les sites mentionnés dans ce v. ne sont pas identifiés.
  - type: text
    content: 'Demain, descendez contre eux ; ils arrivent par la montée du Tsits, et vous les trouverez au bout de l''oued, en face du désert de Yerouel. '
  '17':
  - type: note
    content: 'Vous n''aurez pas à combattre v. 15. –  tenez-vous debout  : cf. Ex 14.13 ; 1S 12.16. –  regardez le salut que le Seigneur vous accorde  : litt. voyez le salut du Seigneur avec vous  ; cf. Ex 14.13.'
  - type: text
    content: 'Vous n''aurez pas à combattre : postez-vous là, tenez-vous debout, et regardez le salut que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous accorde. Juda et Jérusalem, n''ayez pas peur, ne soyez pas terrifiés : demain, sortez au-devant d''eux, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera avec vous !'
  '18':
  - type: text
    content: 'Josaphat s''inclina face contre terre, et tout Juda et les habitants de Jérusalem tombèrent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour se prosterner devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '19':
  - type: note
    content: 'les Qehatites… les Coréites  : litt. les fils des Qehatites… les fils des Coréites  ; cf. 1Ch 6.16-23, pour les Qehatites comme chantres ; plusieurs psaumes sont attribués aux fils de Coré, cf. Ps 42.1n.'
  - type: text
    content: 'Les lévites d''entre les Qehatites et d''entre les Coréites se levèrent pour louer le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, d''une voix très forte.'
  '2':
  - type: note
    content: 'la mer  : il s''agit de la mer Morte. –  Hatsatsôn-Tamar  : cf. Gn 14.7. –  Eïn-Guédi  : sur la rive ouest de la mer Morte, cf. Jos 15.62 ; 1S 24.1ns ; Ez 47.10 ; Ct 1.14.'
  - type: text
    content: 'On vint dire à Josaphat : Une grande multitude s''avance contre toi depuis l''autre côté de la mer, depuis Aram, et ils sont à Hatsatsôn-Tamar, c''est-à-dire Eïn-Guédi.'
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Teqoa  : cf. 11.6n  ; Am 1.1n. –  Mettez votre foi / vous tiendrez (hébreu ha''aminou / té''aménou ) : ce sont deux formes du même verbe, d''où vient le mot amen , et qui exprime la foi, la fidélité et la vérité en même temps que la solidité ; cf. Es 7.9 ; 25.1n  ; Rm 11.20n. –  ses prophètes 29.25 ; 36.16 ; 2R 7.13. –  vous vaincrez  : autres traductions vous réussirez ; vous prospérerez.'
  - type: text
    content: 'Ils se levèrent de bon matin et partirent pour le désert de Teqoa. A leur départ, Josaphat se tint debout et dit : Ecoutez-moi, Juda et habitants de Jérusalem ! Mettez votre foi dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, et vous tiendrez. Mettez votre foi dans ses prophètes, et vous vaincrez.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'pour l''éclat de sa sainteté ou avec des ornements sacrés. –  « Célébrez le Seigneur… »  : cf. 1Ch 16.34 ; Ps 136.1+.'
  - type: text
    content: 'Puis il tint conseil avec le peuple et nomma des chantres pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui le loueraient pour l''éclat de sa sainteté en sortant devant les hommes armés et en disant :'
  - type: text
    content: '« Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: car sa fidélité est pour toujours ! »
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'embuscades  : l''explication est donnée au v. 23. –  battus 13.15n.'
  - type: text
    content: 'Au moment où l''on commençait les cris de joie et les louanges, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' plaça des embuscades contre les Ammonites et les Moabites et les gens de la région montagneuse de Séir qui étaient venus en Juda, et ils furent battus. '
  '23':
  - type: note
    content: 'anathème Dt 2.34n. –  exterminèrent ou détruisirent  ; cf. v. 10n. –  ils s''employèrent à s''entretuer  : litt. ils aidèrent un homme son prochain pour la destruction  ; cf. Jg 7.22 ; 1S 14.20 ; 2R 3.23.'
  - type: text
    content: Les Ammonites et les Moabites se dressèrent contre les habitants de la région montagneuse de Séir ; ils les frappèrent d'anathème et les exterminèrent ; et quand ils en eurent fini avec les habitants de Séir, ils s'employèrent à s'entretuer.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'pas un seul rescapé  : cf. Ex 14.30.'
  - type: text
    content: 'Lorsque Juda fut arrivé au poste de guet d''où l''on observe le désert, ils se tournèrent du côté de la multitude : ce n''étaient que cadavres tombés à terre ; pas un seul rescapé ! '
  '25':
  - type: note
    content: 'ils trouvèrent…  : LXX ils trouvèrent du bétail en grand nombre. –  des cadavres  : certains mss hébreux et LXX portent des vêtements. –  enlevèrent  : la même forme verbale est traduite par dépouiller en Ex 3.22 ; 12.36.'
  - type: text
    content: 'Josaphat et son peuple vinrent piller leur butin : ils trouvèrent, en grand nombre, des biens, des cadavres et des objets précieux. Ils en enlevèrent tant qu''ils ne purent tout emporter. Ils mirent trois jours à piller le butin, car il était considérable. '
  '26':
  - type: note
    content: 'ils se rassemblèrent  : le verbe évoque habituellement l’assemblée cultuelle, cf. v. 5,14 ; 1.3,5 ; 5.2s ; 6.3,12s etc. –  Beraka  : le terme hébreu signifie bénédiction.'
  - type: text
    content: 'Le quatrième jour, ils se rassemblèrent dans la vallée de Beraka, où ils bénirent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; c''est pourquoi on a appelé ce lieu du nom de vallée de Beraka (« Bénédiction »), jusqu''à aujourd''hui.'
  '27':
  - type: text
    content: 'Tous les hommes de Juda et de Jérusalem, ayant à leur tête Josaphat, revinrent joyeux à Jérusalem, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les avait remplis de joie aux dépens de leurs ennemis. '
  '28':
  - type: note
    content: Cf. Ex 15.19s ; Jg 11.34 ; 1S 18.6.
  - type: text
    content: 'Ils entrèrent à Jérusalem avec des luths, des lyres et des trompettes, jusque dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '29':
  - type: note
    content: frayeur de Dieu Ps 36.2 ; cf. 2Ch 14.13n.
  - type: text
    content: 'La frayeur de Dieu fut sur tous les royaumes des pays, lorsqu''ils apprirent que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait combattu les ennemis d''Israël. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'décida  : litt. il donna sa face . –  consulter le Seigneur ou chercher le Seigneur  ; cf. 19.3, expression synonyme de celle qui apparaît deux fois au v. 4. –  jeûne  : cf. 1R 21.9,12 ; Jr 36.6,9 ; Jl 1.14 ; 2.12,15 ; Jon 3.5 ; Za 8.19 ; Est 4.3 ; 9.31 ; Esd 8.21 ; Né 9.1.'
  - type: text
    content: 'Josaphat eut peur et décida de consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il proclama un jeûne pour tout Juda. '
  '30':
  - type: note
    content: 'Le royaume… fut tranquille  : cf. 13.23 ; 14.4s ; 23.21 ; 2R 11.20. –  Dieu lui accorda le repos…  : cf. 14.5+s.'
  - type: text
    content: Le royaume de Josaphat fut tranquille, et son Dieu lui accorda le repos de tous côtés.
  - type: heading
    content: Fin du règne de Josaphat
  - type: heading
    content: 1R 22.41-51
  '31':
  - type: text
    content: 'Josaphat régna sur Juda : il avait trente-cinq ans lorsqu''il devint roi et régna vingt-cinq ans à Jérusalem. Le nom de sa mère était Azouba, fille de Shilhi. '
  '32':
  - type: note
    content: ce qui convenait… litt. ce qui (était) droit aux yeux de YHWH 14.1 ; 24.2 ; 25.2 ; 26.4 ; 27.2 ; 29.2 ; 34.2 ; Dt 6.18n  ; voir aussi 2Ch 28.1.
  - type: text
    content: 'Il suivit la voie d''Asa, son père, et il ne s''en écarta pas, faisant ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '33':
  - type: note
    content: 'Cf. 17.6 ; voir aussi 14.4 ; 15.17. –  n''avait pas encore le cœur…  : autre texte en 1R 22.44s.'
  - type: text
    content: 'Toutefois les hauts lieux ne disparurent pas : le peuple n''avait pas encore le cœur fermement attaché au Dieu de ses pères.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire… 1R 11.41n. –  le début et la fin  : cf. 9.29+. –  l''histoire de Jéhu, fils de Hanani (cf. 19.2) : cet ouvrage ne nous est pas connu par ailleurs. –  le livre des rois d''Israël 1Ch 9.1n  ; voir aussi 2Ch 16.11n.'
  - type: text
    content: Le reste de l'histoire de Josaphat, le début et la fin, cela est écrit dans l'histoire de Jéhu, fils de Hanani, qui figure dans le livre des rois d'Israël.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Achazia, qui agissait en méchant (voir justice) : cf. 1R 22.53s ; même forme verbale en 22.3 ; Né 9.33+.'
  - type: text
    content: 'Après cela, Josaphat, roi de Juda, s''associa avec le roi d''Israël, Achazia, qui agissait en méchant. '
  '36':
  - type: note
    content: 'bateaux qui devaient aller à Tarsis  : cf. Jon 1.3n.'
  - type: text
    content: 'Il s''associa avec lui pour construire des bateaux qui devaient aller à Tarsis ; ils construisirent ces bateaux à Etsiôn-Guéber. '
  '37':
  - type: note
    content: 'Le prophète Eliézer n''est mentionné nulle part ailleurs. –  détruit  : le verbe correspondant est souvent traduit par ouvrir une brèche (dans)  ; cf. 24.7 ; 25.23 ; 1Ch 13.11n  ; 15.13n.'
  - type: text
    content: 'Alors Eliézer, fils de Dodavahou de Marésha, parla en prophète sur Josaphat, il dit : Parce que tu t''es associé avec Achazia, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' détruit tes œuvres. Les bateaux se brisèrent et ne purent aller à Tarsis.'
  '4':
  - type: note
    content: chercher le Seigneur v. 3n.
  - type: text
    content: 'Juda se rassembla pour chercher le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et l''on vint de toutes les villes de Juda pour chercher le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '5':
  - type: note
    content: 'et de Jérusalem  : des versions anciennes ont lu à Jérusalem.'
  - type: text
    content: 'Josaphat se tint debout dans l''assemblée de Juda et de Jérusalem, dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', devant la nouvelle cour. '
  '6':
  - type: note
    content: 'Cf. 1Ch 29.11s. –  Dieu dans le ciel  : cf. Ps 2.4 ; 115.3 ; Ec 5.1.'
  - type: text
    content: 'Il dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu de nos pères, n''es-tu pas Dieu dans le ciel, et n''est-ce pas toi qui domines sur tous les royaumes des nations ? Dans ta main il y a force et puissance, et nul ne peut tenir face à toi. '
  '7':
  - type: note
    content: 'Cf. Dt 1.8,21 ; 4.1,5,21s etc. Voir aussi Ez 33.24 ; 1Ch 1–9. –  Abraham, celui qui t''aimait  : cf. Es 41.8 ; Jc 2.23.'
  - type: text
    content: 'N''est-ce pas toi, notre Dieu, qui as dépossédé les habitants de ce pays devant Israël, ton peuple, et qui l''as donné pour toujours à la descendance d''Abraham, celui qui t''aimait ? '
  '8':
  - type: note
    content: 'sanctuaire / maison (v. 5,9) : cf. 1Ch 22.19 ; 28.10. –  pour toi  : absent de certaines versions anciennes. –  pour ton nom  : cf. 6.34,38 ; 1R 8.44ss/ / ; 1Ch 29.16 ; voir aussi 2S 7.12s ; 1R 8.18ss/ /.'
  - type: text
    content: 'Ils l''ont habité, ils y ont bâti un sanctuaire pour toi, pour ton nom, en disant : '
  '9':
  - type: note
    content: 'Josaphat fait allusion ici à la prière que Salomon a prononcée pour inaugurer le temple, cf. 6.18ss/ /. –  épée / peste / famine  : cf. Lv 26.35n  ; 2S 24.13n  ; Jr 14.12+ ; 15.2+.'
  - type: text
    content: '« S''il arrive sur nous un malheur, l''épée, le jugement, la peste ou la famine, nous nous tiendrons devant cette maison et devant toi, car ton nom est dans cette maison. De notre détresse, nous crierons vers toi : tu entendras et tu sauveras ! » '
