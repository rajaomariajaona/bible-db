      marker: fr
      children:
      - type: text
        text: '20.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce qui convenait… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ce qui (était) droit aux yeux de YHWH '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.1 ; 24.2 ; 25.2 ; 26.4 ; 27.2 ; 29.2 ; 34.2 ; Dt 6.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 2Ch 28.1.'
    marker-yv: yv-n
  - type: text
    text: 'Il suivit la voie d''Asa, son père, et il ne s''en écarta pas, faisant ce qui convenait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
