document_id: 2CH.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le royaume de Juda attaqué ; prière de Josaphat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et avec eux les Maonites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '  ; texte hébreu traditionnel '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et avec eux parmi les Ammonites. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 26.7. Les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maonites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont une tribu édomite de la région de Séir, au sud de la mer Morte ; cf. v. 10,22s.
    marker-yv: yv-n
  - type: text
    text: 'Après cela, les Moabites et les Ammonites, et avec eux les Maonites, arrivèrent pour combattre Josaphat. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la mer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit de la mer Morte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hatsatsôn-Tamar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 14.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Eïn-Guédi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sur la rive ouest de la mer Morte, cf. Jos 15.62 ; 1S 24.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s ; Ez 47.10 ; Ct 1.14.
    marker-yv: yv-n
  - type: text
    text: 'On vint dire à Josaphat : Une grande multitude s''avance contre toi depuis l''autre côté de la mer, depuis Aram, et ils sont à Hatsatsôn-Tamar, c''est-à-dire Eïn-Guédi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: décida
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il donna sa face
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'consulter le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chercher le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 19.3, expression synonyme de celle qui apparaît deux fois au v. 4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jeûne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1R 21.9,12 ; Jr 36.6,9 ; Jl 1.14 ; 2.12,15 ; Jon 3.5 ; Za 8.19 ; Est 4.3 ; 9.31 ; Esd 8.21 ; Né 9.1.'
    marker-yv: yv-n
  - type: text
    text: 'Josaphat eut peur et décida de consulter le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Il proclama un jeûne pour tout Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chercher le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Juda se rassembla pour chercher le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et l''on vint de toutes les villes de Juda pour chercher le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et de Jérusalem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : des versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à Jérusalem.
    marker-yv: yv-n
  - type: text
    text: 'Josaphat se tint debout dans l''assemblée de Juda et de Jérusalem, dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', devant la nouvelle cour. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 1Ch 29.11s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dieu dans le ciel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ps 2.4 ; 115.3 ; Ec 5.1.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit : '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', Dieu de nos pères, n''es-tu pas Dieu dans le ciel, et n''est-ce pas toi qui domines sur tous les royaumes des nations ? Dans ta main il y a force et puissance, et nul ne peut tenir face à toi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Dt 1.8,21 ; 4.1,5,21s etc. Voir aussi Ez 33.24 ; 1Ch 1–9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abraham, celui qui t'aimait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 41.8 ; Jc 2.23.'
    marker-yv: yv-n
  - type: text
    text: 'N''est-ce pas toi, notre Dieu, qui as dépossédé les habitants de ce pays devant Israël, ton peuple, et qui l''as donné pour toujours à la descendance d''Abraham, celui qui t''aimait ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sanctuaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 5,9) : cf. 1Ch 22.19 ; 28.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : absent de certaines versions anciennes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour ton '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.34,38 ; 1R 8.44ss/ / ; 1Ch 29.16 ; voir aussi 2S 7.12s ; 1R 8.18ss/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Ils l''ont habité, ils y ont bâti un sanctuaire pour toi, pour ton nom, en disant : '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Josaphat fait allusion ici à la prière que Salomon a prononcée pour inaugurer le temple, cf. 6.18ss/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'épée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'peste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: famine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 26.35'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2S 24.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jr 14.12+ ; 15.2+.'
    marker-yv: yv-n
  - type: text
    text: '« S''il arrive sur nous un malheur, l''épée, le jugement, la peste ou la famine, nous nous tiendrons devant cette maison et devant toi, car ton nom est dans cette maison. De notre détresse, nous crierons vers toi : tu entendras et tu sauveras ! » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les gens de la région montagneuse de Séir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. les Edomites. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chez qui tu n'as pas permis à Israël d'entrer…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 20.14-21 ; Dt 2.4-6,9,18s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: détruits
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe hébreu est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'exterminer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 23.
    marker-yv: yv-n
  - type: text
    text: 'Les Ammonites, les Moabites et les gens de la région montagneuse de Séir, chez qui tu n''as pas permis à Israël d''entrer quand il venait d''Egypte, – car il s''est écarté d''eux et ne les a pas détruits – '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ta possession
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 2.5,9,12,19 ; Jg 11.15-27 ; voir aussi Ex 15.17 ; Jr 2.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que tu nous as donnée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que tu nous as fait posséder '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dont tu nous as fait prendre possession.
    marker-yv: yv-n
  - type: text
    text: 'ceux-là nous récompensent en venant nous chasser de ta possession, que tu nous as donnée. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous sommes sans force
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cette grande multitude '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 2 ; cf. v. 15 ; 13.8+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'contre nous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sur toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent une même préposition hébraïque. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nos yeux sont fixés sur toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 1.20.'
    marker-yv: yv-n
  - type: text
    text: 'Notre Dieu, n''exerceras-tu pas tes jugements sur eux ? Car nous sommes sans force devant cette grande multitude qui s''avance contre nous, et nous ne savons que faire : nos yeux sont fixés sur toi.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' donne la victoire à Juda'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se tenait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 5,9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'leurs familles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leurs enfants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 31.18 ; Gn 34.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout Juda se tenait debout devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', avec toutes leurs familles, leurs femmes et leurs fils. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le souffle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'Esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.1+. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévite
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' d''Asaph'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : famille de chantres, cf. 1Ch 15.17 ; voir 1Ch 25.1ss.'
    marker-yv: yv-n
  - type: text
    text: 'Alors le souffle du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fut sur Yahaziel, fils de Zacharie, fils de Benaya, fils de Yéiel, fils de Mattania, lévite, d''entre les fils d''Asaph, au milieu de l''assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous tous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 13.4 ; 15.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: N'ayez pas peur, ne soyez pas terrifiés
    - type: usfm
