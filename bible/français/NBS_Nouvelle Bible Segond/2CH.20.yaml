    text: 'Josaphat et son peuple vinrent piller leur butin : ils trouvèrent, en grand nombre, des biens, des cadavres et des objets précieux. Ils en enlevèrent tant qu''ils ne purent tout emporter. Ils mirent trois jours à piller le butin, car il était considérable. '
