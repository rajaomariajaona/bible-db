        text: 'l''histoire de Jéhu, fils de Hanani '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 19.2) : cet ouvrage ne nous est pas connu par ailleurs. –  '
    - type: usfm
