      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Josaphat régna sur Juda : il avait trente-cinq ans lorsqu''il devint roi et régna vingt-cinq ans à Jérusalem. Le nom de sa mère était Azouba, fille de Shilhi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
