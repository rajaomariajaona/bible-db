document_id: 1TH.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'Paul (2.18 ; cf. les expressions à la première personne, p. ex. 3.5 ; 5.27) / Silvain (2Co 1.19 ; cf. Ac 15.22n  ; 1P 5.12) / Timothée (3.1ss ; cf. Ac 16.1+ss ; 1Co 4.17 ; 16.10 ; Ph 1.1 ; 2.19ss ; Col 1.1 ; Phm 1 ; Hé 13.23) : voir aussi 1Co 1.1 ; 1Th 2.7 ; 2Th 1.1. –  l''Eglise , au sens d''assemblée ou de communauté locale 2.14 ; Ac 5.11n  ; 1Co 1.2 ; 2Co 1.1 ; 8.1 ; Ga 1.2 ; Col 4.16. –  Thessaloniciens v. 7n  ; 2.1s ; Ac 17.1n,11,13 ; 20.4 ; 27.2 ; Ph 4.16 ; 2Tm 4.10. –  qui est en Dieu…  : autre traduction qui est par Dieu… et par le Seigneur…  ; cf. 2.14 ; 1Co 1.2 ; Ga 1.13 ; voir aussi Rm 6.11. –  Christ  : voir onction. –  Grâce et paix… Rm 1.7+ ; certains mss ajoutent de la part de Dieu, notre Père, et du Seigneur Jésus-Christ , cf. 2Th 1.2.'
  - type: text
    content: 'Paul, Silvain et Timothée, à l''Eglise des Thessaloniciens qui est en Dieu, le Père, et dans le Seigneur Jésus-Christ : Grâce et paix à vous !'
  - type: heading
    content: La vie et la foi des Thessaloniciens
  '10':
  - type: note
    content: 'pour attendre  : le verbe correspondant n''apparaît qu''ici dans le N.T. ; cf. Rm 8.19 ; 1Co 1.7 ; Ph 3.20 ; Tt 2.13. –  des cieux Ph 3.20 ; cf. 2Co 5.1 ; voir aussi Ac 3.21. –  son Fils Rm 1.3s,9 ; 5.8ss ; 8.3,32 ; 2Co 1.19 ; Ga 1.15s ; 2.20 ; 4.4s. –  réveillé ou relevé, Rm 4.24n  ; voir résurrection. –  délivre  : cf. Rm 7.24 ; Col 1.13. –  la colère à venir (litt. qui vient) 2.16 ; 5.9 ; cf. Rm 1.18 ; 2.5,8 ; 3.5s ; 5.8s ; 12.19 ; voir aussi Jl 1.15 ; Ab 15 ; So 1.15 ; 2.2 ; Mt 3.7/ / ; 2Th 1.5-10.'
  - type: text
    content: et pour attendre des cieux son Fils qu'il a réveillé d'entre les morts, Jésus, qui nous délivre de la colère à venir.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.13 ; 3.9s ; 5.17s ; Rm 1.9 ; 1Co 1.4+ ; Ph 1.3s ; 2Th 1.3,11. –  Nous rendons… grâce  : cf. Mt 26.27n. –  Continuellement…  : certains rattachent le terme correspondant à la phrase précédente et traduisent nous faisons continuellement mention de vous dans nos prières (cf. 2.13 ; 5.17 ; Rm 1.9s).'
  - type: text
    content: 'Nous rendons toujours grâce à Dieu pour vous tous, et nous faisons mention de vous dans nos prières. Continuellement, '
  '3':
  - type: note
    content: '2Th 1.11 ; Ap 2.2,19. –  œuvre / foi  : cf. Ga 2.15s ; 3.2ss ; Jc 2.14ss. –  travail 2.9 ; 3.5 ; 5.12 (verbe apparenté pour se donner de la peine) ; 2Co 6.5 ; 10.15 ; 11.23. –  la persévérance ou l''endurance  ; autre traduction la fermeté  ; cf. 2.14 ; voir Rm 2.7n  ; 2Co 1.6n  ; 2Th 1.4 ; 3.5. –  de notre Seigneur…  : on peut comprendre l''espérance relative à notre Seigneur, à moins que cette précision se rapporte à l''ensemble foi / amour (3.12 ; 4.9s ; 2Th 3.5) / espérance (5.8 ; 1Co 13.13+) ; cf. 1Th 1.10 ; 2Th 1.3ss. –  devant notre Dieu et Père  ; certains rattachent ces mots, qui sont aussi à la fin du v. dans le texte grec, au début de la phrase  : nous nous souvenons devant notre Dieu et Père…'
  - type: text
    content: 'nous nous souvenons de tout ce qui vous caractérise : l''œuvre de la foi, le travail de l''amour et la persévérance de l''espérance de notre Seigneur Jésus-Christ, devant notre Dieu et Père. '
  '4':
  - type: note
    content: 'que (ou comment) vous avez été choisis  : litt. votre choix, c.-à-d. le choix dont vous avez été l''objet de la part de Dieu ; cf. Rm 9.11 ; 11.5,7,28 ; voir aussi Es 65.9,22 ; Lc 18.7 ; Rm 8.33 ; Col 3.12 ; 2Th 2.13n,16 ; 2P 1.10.'
  - type: text
    content: 'Nous savons, frères aimés de Dieu, que vous avez été choisis, '
  '5':
  - type: note
    content: 'bonne nouvelle ou Evangile. –  pas… en parole seulement…  : cf. 2.13s ; 1Co 2.4+s ; 4.20. –  puissance  : cf. Ac 1.8 ; Rm 1.16 ; 15.18s ; 2Co 12.12ns ; Ga 3.5. –  avec l''Esprit saint  : autre traduction avec un esprit saint  ; de même v. 6 ; Rm 5.5 ; 9.1 ; 14.17 ; 15.1 ; 1Co 12.3 ; 2Co 6.6. –  avec une pleine conviction  : d''autres traduisent avec plénitude, avec une pleine réalisation. –  vous savez…  : cf. 2.1s,5,10s ; 3.3s ; 4.2 ; 5.2. –  nous avons été  : litt. nous sommes devenus (comme au v. 6n). –  pour votre bien  : litt. à cause de vous.'
  - type: text
    content: car notre bonne nouvelle ne vous est pas arrivée en parole seulement, mais aussi avec puissance, avec l'Esprit saint et avec une pleine conviction. De fait, vous savez comment nous avons été parmi vous, pour votre bien.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'vous nous avez imités  : litt. vous êtes devenus nos imitateurs 2.14s ; 1Co 4.16 ; 11.1 ; Ph 3.17 ; 2Th 3.9. –  le Seigneur  : cf. Mt 10.18/ / ; Jn 15.20. –  en accueillant ou quand vous avez accueilli la Parole  : cf. v. 8 ; 2.13 ; Mc 4.14,20,33/ / ; Ac 8.14+ ; voir aussi Ga 6.6 ; Ph 1.14 ; Col 4.3 ; 2Tm 4.2. –  détresse 3.3nss ; cf. 2.14 ; Ac 17.4ss ; voir aussi Rm 5.3 ; 2Co 1.8 ; 6.4 ; 12.10 ; 1P 2.20s. –  la joie de l''Esprit saint v. 5n  ; cf. Ac 13.52+ ; voir aussi Mt 5.11s ; Lc 8.13 ; 1P 1.6s.'
  - type: text
    content: 'Et vous-mêmes, vous nous avez imités, nous et le Seigneur, en accueillant la Parole, au milieu de beaucoup de détresse, avec la joie de l''Esprit saint. '
  '7':
  - type: note
    content: Cf. 2Th 1.4. –  un modèle Ph 3.17+. –  Macédoine (province dont Thessalonique était la capitale, cf. 4.10 ; 2Co 1.16n) et Achaïe (2Co 1.1n) constituent l'ensemble de la Grèce selon la terminologie de l'administration romaine ; cf. 2Co 8.1s.
  - type: text
    content: 'Ainsi vous êtes devenus un modèle pour tous les croyants en Macédoine et en Achaïe. '
  '8':
  - type: note
    content: 'la parole du Seigneur…  : cf. v. 6+ ; 4.15 ; Ac 8.25+ ; 2Th 3.1 ; voir aussi Gn 15.1,4 ; Es 1.10 ; Jr 2.4. –  votre foi… Rm 1.8+.'
  - type: text
    content: 'Car la parole du Seigneur a retenti de chez vous, et pas seulement en Macédoine et en Achaïe : votre foi en Dieu s''est fait connaître en tout lieu, à tel point que nous n''avons pas besoin d''en dire quoi que ce soit. '
  '9':
  - type: note
    content: 'à notre sujet  : certains mss portent à votre sujet. –  quel accueil…  : litt. quel accès nous avons eu auprès de vous, formule analogue en 2.1 ; cf. 1.5. –  vous vous êtes tournés vers Dieu, cf. Ac 9.35n  ; 14.15 ; 15.19s ; 17.22ss ; 26.18 ; 2Co 3.16 ; Ga 4.9. –  idoles  : cf. 1Co 8.4ss ; 12.2. –  un Dieu vivant et vrai Jr 10.10 ; Jn 17.3 ; Hé 9.14.'
  - type: text
    content: 'On raconte, à notre sujet, quel accueil nous avons trouvé chez vous et comment vous vous êtes tournés vers Dieu, en vous détournant des idoles, pour servir, comme des esclaves, un Dieu vivant et vrai '
