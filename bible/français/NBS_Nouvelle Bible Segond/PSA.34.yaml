document_id: PSA.34,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur m'arrache à mes frayeurs
  - type: text
    content: ' '
  - type: note
    content: 'Psaume alphabétique irrégulier (voir v. 7n,18n  ; 25.1n). –  Lorsqu''il simula la folie  : litt. lorsqu''il changea son goût , ce dernier terme (cf. v. 9) ayant aussi le sens de (bon) jugement, discernement, sagesse  ; même formule en 1S 21.14, dans l''épisode de la comparution devant le roi Akish, auquel cette suscription renvoie de toute évidence. –  Abimélek ou, selon certains mss de LXX, Ahimélek  ; cf. Gn 20.2 ; 26.1 ; Jg 8.31 ; 1Ch 18.16.'
  - type: text
    content: De David. Lorsqu'il simula la folie devant Abimélek, que celui-ci le chassa et qu'il s'en alla.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'ses saints  : cf. 16.3. –  rien ne manque  : terme apparenté au v. 11 ; cf. 23.1 ; 111.5.'
  - type: text
    content: 'Craignez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous, ses saints !'
  - type: text
    content: Car rien ne manque à ceux qui le craignent.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Les jeunes lions  : LXX a lu les riches  ; cf. Jb 4.7-11 ; Lc 1.53. –  ceux qui cherchent le Seigneur v. 5n.'
  - type: text
    content: Les jeunes lions peuvent souffrir de la misère et de la faim,
  - type: text
    content: 'mais ceux qui cherchent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne manqueront d''aucun bien.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 49.2 ; Pr 1.8 ; 2.1 ; 3.1 ; 8.32 ; 9.10. –  mes fils  : litt. fils.'
  - type: text
    content: Venez, mes fils, écoutez-moi !
  - type: text
    content: 'Je vous apprendrai la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: '1P 3.10-12. –  qui prend plaisir…  : autre traduction qui désire la vie, qui veut avoir des jours de bonheur.'
  - type: text
    content: Quel est l'homme qui prend plaisir à la vie,
  - type: text
    content: qui aime les jours, pour voir le bonheur ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 141.3 ; Jb 27.4 ; Pr 4.24 ; 13.3 ; 21.23 ; Mt 12.36 ; Jc 1.26.
  - type: text
    content: Préserve ta langue du mal,
  - type: text
    content: tes lèvres des paroles trompeuses ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.1 ; 37.27 ; 52.5 ; Am 5.15 ; Jb 28.28 ; Pr 3.7 ; 13.19 ; 16.6s ; Hé 12.14.
  - type: text
    content: écarte-toi de ce qui est mauvais, fais ce qui est bon ;
  - type: text
    content: recherche la paix, poursuis-la.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.6 ; 32.8 ; 33.18 ; Jb 36.7.
  - type: text
    content: 'Les yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont sur les justes,'
  - type: text
    content: et ses oreilles sont attentives à leurs appels au secours.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Jb 18.17 ; 24.23 ; Pr 15.3. –  leur souvenir  : autre traduction leur nom , cf. 6.6n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se tourne contre ceux qui font du mal,'
  - type: text
    content: pour retrancher de la terre leur souvenir.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Quand ils crient  : plusieurs versions anciennes précisent qu''il s''agit des justes  ; l''ambiguïté pourrait être levée par une interversion des v. 16 et 17, les lignes correspondantes étant effectivement interverties dans plusieurs psaumes alphabétiques ; cf. v. 5+ ; 3.5+.'
  - type: text
    content: 'Quand ils crient, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entend,'
  - type: text
    content: et il les délivre de toutes leurs détresses ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: '51.19 ; Mt 5.3ss. –  esprit… écrasé  : cf. 9.10 ; Es 57.15.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est proche de ceux qui ont le cœur brisé,'
  - type: text
    content: il sauve ceux dont l'esprit est écrasé.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je bénirai 16.7 ; 145.1. –  sa louange…  : cf. Hé 13.15.'
  - type: text
    content: 'Je bénirai le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en tout temps ;'
  - type: text
    content: sa louange sera constamment dans ma bouche.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. 25.19 ; 2Tm 3.11s.
  - type: text
    content: Nombreux sont les malheurs pour le juste,
  - type: text
    content: 'mais de tous le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le délivre.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Jn 19.36.
  - type: text
    content: Il garde chacun de ses os,
  - type: text
    content: aucun d'eux ne sera brisé.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Le malheur  : autre traduction le mal . –  les ennemis du juste  : litt. ceux qui détestent le juste. –  devront réparer leurs torts ou devront le payer  ; le même verbe est traduit par sera en tort au v. 23.'
  - type: text
    content: Le malheur fait mourir le méchant,
  - type: text
    content: et les ennemis du juste devront réparer leurs torts.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 25.22 ; 31.6n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' libère ses serviteurs ;'
  - type: text
    content: aucun de ceux qui trouvent en lui un abri ne sera en tort.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Je mets ma fierté  : litt. mon être (6.4n) se loue  ; cf. 49.9n  ; 97.7 ; 105.3 ; Lc 1.46. –  les pauvres  : cf. v. 7 ; voir 9.13n.'
  - type: text
    content: 'Je mets ma fierté dans le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: les pauvres entendent, ils se réjouissent !
  '4':
  - type: text
    content: 'Magnifiez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec moi,'
  - type: text
    content: exaltons ensemble son nom !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai cherché  : autre traduction j''ai consulté  ; 9.11+ ; Am 5.5 ; 1Ch 21.30. –  de toutes mes frayeurs…  : cf. v. 8,18 ; 25.22 ; 81.8 ; Ac 7.10.'
  - type: text
    content: 'J''ai cherché le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et il m''a répondu ;'
  - type: text
    content: de toutes mes frayeurs il m'a délivré.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ceux qui…  : certains mss hébreux, LXX et Vg portent regardez vers lui et vous serez radieux, votre visage… –  sont radieux  : cf. Es 60.5.'
  - type: text
    content: Ceux qui regardent vers lui sont radieux,
  - type: text
    content: et leur visage n'a pas à rougir.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Un verset manque entre les v. 6 et 7 par rapport à l'ordre alphabétique normal (v. 1n). –  le Seigneur entend 4.4+.
  - type: text
    content: 'Quand un pauvre crie, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entend'
  - type: text
    content: et il le sauve de toutes ses détresses.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Le messager (ou l'ange ) du Seigneur 35.5s ; 91.11 ; 103.20s ; cf. Gn 32.1s ; Ex 14.19 ; 23.20 ; Jos 5.14 ; Za 9.8. –  ceux qui le craignent 15.4+.
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' dresse son camp autour de ceux qui le craignent,'
  - type: text
    content: et il les délivre.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Goûtez v. 1n  ; cf. 1S 14.24,29 ; voir aussi Hé 6.5 ; 1P 2.3. –  bon 25.8+. –  Heureux… 1.1+ ; 2.12 ; 7.2+ ; 40.5.
  - type: text
    content: 'Goûtez, et voyez combien le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est bon !'
  - type: text
    content: Heureux l'homme qui trouve en lui un abri !
