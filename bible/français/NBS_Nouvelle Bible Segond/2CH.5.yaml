document_id: 2CH.5,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les objets '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les ustensiles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; même terme au v. 5.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi furent achevés tous les travaux que Salomon fit pour la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Salomon apporta ce que David, son père, avait consacré : l''argent, l''or et tous les objets. Il les plaça parmi les trésors de la maison de Dieu.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le coffre de l'alliance déposé dans le temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1R 8.1-13
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avait données
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: y avait placées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une alliance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Il n''y avait rien dans le Coffre, sinon les deux tablettes que Moïse avait données, à l''Horeb, quand le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait conclu une alliance avec les Israélites, lorsqu''ils étaient sortis d''Egypte. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: car tous les prêtres…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le passage inséré ici (dans le texte correspondant à 1R 8.10) est propre aux Chroniques ; la fin de 1R 8.10 se retrouve à la fin de 2Ch 5.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consacrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Au moment où les prêtres sortaient du sanctuaire (car tous les prêtres qui se trouvaient là s''étaient consacrés, sans observer l''ordre des classes ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chantres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Asaph '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hémân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yedoutoun
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Ch 25.1-6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'byssos '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Ch 4.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'et tous les lévites qui étaient chantres, Asaph, Hémân, Yedoutoun, leurs fils et leurs frères, revêtus de byssos, se tenaient à l''est de l''autel avec des cymbales, des luths et des lyres, et ils avaient auprès d''eux cent vingt prêtres sonnant des trompettes), '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ap 15.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: unis dans un même son
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'une seule voix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'car il est bon, car sa fidélité est pour toujours ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'formule liturgique fréquente ; cf. 7.3 ; Ps 106.1 ; 107.1 ; 118.1,29 ; 136.1 ; Esd 3.11 ; 1Ch 16.34 ; voir aussi Jr 33.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la Maison, la maison…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la Maison fut remplie de la nuée de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: ' du Seigneur'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir Ex 40.34 ; 1R 8.10.'
      marker-yv: yv-n
    - type: text
      text: 'et lorsque ceux qui sonnaient des trompettes et les chantres, unis dans un même son pour louer et célébrer le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', firent retentir les trompettes, les cymbales et les autres instruments et louèrent le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – car il est bon, car sa fidélité est pour toujours ! – à ce moment, la Maison, la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', fut remplie d''une nuée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les prêtres ne pouvaient plus se tenir là pour officier, à cause de la nuée ; car la gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' remplissait la maison de Dieu.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'coffre de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'alliance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 6.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 25.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Salomon rassembla à Jérusalem les anciens d''Israël et tous les chefs des tribus, les princes des familles des Israélites, pour faire monter de la Ville de David, c''est-à-dire Sion, le coffre de l''alliance du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les hommes d''Israël se rassemblèrent auprès du roi pour la fête – c''était le septième mois. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les lévites portèrent le Coffre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette indication apporte une précision par rapport à 1R 8.3 qui mentionne '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les prêtres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: d'une manière générale ; cf. Nb 3.31 ; 1Ch 15.2 ; voir aussi Jos 3.3,6 ; 6.6,12 ; 8.33 ; Nb 4.15.
      marker-yv: yv-n
    - type: text
      text: 'Tous les anciens d''Israël arrivèrent, et les lévites portèrent le Coffre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: '-'
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : plusieurs mss hébreux et versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les prêtres et les lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 1R 8.4 ; voir aussi Dt 17.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 9.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Ch 23.18 ; 30.27.'
      marker-yv: yv-n
    - type: text
      text: 'Ils firent monter le Coffre, la tente de la Rencontre et tous les ustensiles sacrés qui étaient dans la tente : ce sont les prêtres-lévites qui les firent monter. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifiaient
        - type: text
          text: … en si grand nombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.6 ; 15.11.'
      marker-yv: yv-n
    - type: text
      text: 'Le roi Salomon et toute la communauté d''Israël rassemblée auprès de lui devant le Coffre sacrifiaient du petit bétail et du gros bétail, en si grand nombre qu''on ne pouvait ni le compter ni l''évaluer. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les prêtres amenèrent le coffre de l''alliance du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' en son lieu, dans le Secret de la Maison, dans le Très-Sacré, sous les ailes des keroubim. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: couvraient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : verbe synonyme (plus courant) de celui qui apparaît en Ex 25.20 ; 37.9 ; 40.3,21 ; 1R 8.7 ; 1Ch 28.18.'
      marker-yv: yv-n
    - type: text
      text: 'Les keroubim étendaient les ailes au-dessus du lieu du Coffre, les keroubim couvraient le Coffre et ses barres par-dessus. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis le Coffre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 8.8 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: depuis le sanctuaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui indique plutôt la position de l''observateur. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le Coffre est resté là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il est resté là.
      marker-yv: yv-n
    - type: text
      text: 'Les barres étaient d''une longueur telle que leurs extrémités se voyaient depuis le Coffre, devant le Secret ; mais on ne les voyait pas du dehors. Le Coffre est resté là jusqu''à ce jour. '
