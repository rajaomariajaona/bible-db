document_id: 2CH.5,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: les objets ou les ustensiles  ; même terme au v. 5.
  - type: text
    content: 'Ainsi furent achevés tous les travaux que Salomon fit pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Salomon apporta ce que David, son père, avait consacré : l''argent, l''or et tous les objets. Il les plaça parmi les trésors de la maison de Dieu.'
  - type: heading
    content: Le coffre de l'alliance déposé dans le temple
  - type: heading
    content: 1R 8.1-13
  '10':
  - type: note
    content: 'avait données  : autre traduction y avait placées. –  une alliance  : sous-entendu dans le texte.'
  - type: text
    content: 'Il n''y avait rien dans le Coffre, sinon les deux tablettes que Moïse avait données, à l''Horeb, quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait conclu une alliance avec les Israélites, lorsqu''ils étaient sortis d''Egypte. '
  '11':
  - type: note
    content: 'car tous les prêtres…  : le passage inséré ici (dans le texte correspondant à 1R 8.10) est propre aux Chroniques ; la fin de 1R 8.10 se retrouve à la fin de 2Ch 5.13. –  consacrés  : voir saint.'
  - type: text
    content: 'Au moment où les prêtres sortaient du sanctuaire (car tous les prêtres qui se trouvaient là s''étaient consacrés, sans observer l''ordre des classes ; '
  '12':
  - type: note
    content: 'chantres / Asaph / Hémân / Yedoutoun  : cf. 1Ch 25.1-6. –  byssos 1Ch 4.21n.'
  - type: text
    content: 'et tous les lévites qui étaient chantres, Asaph, Hémân, Yedoutoun, leurs fils et leurs frères, revêtus de byssos, se tenaient à l''est de l''autel avec des cymbales, des luths et des lyres, et ils avaient auprès d''eux cent vingt prêtres sonnant des trompettes), '
  '13':
  - type: note
    content: 'Cf. Ap 15.8. –  unis dans un même son  : autre traduction d''une seule voix. –  car il est bon, car sa fidélité est pour toujours ! formule liturgique fréquente ; cf. 7.3 ; Ps 106.1 ; 107.1 ; 118.1,29 ; 136.1 ; Esd 3.11 ; 1Ch 16.34 ; voir aussi Jr 33.11. –  la Maison, la maison…  : LXX la Maison fut remplie de la nuée de la gloire du Seigneur  ; cf. v. 11n  ; voir Ex 40.34 ; 1R 8.10.'
  - type: text
    content: 'et lorsque ceux qui sonnaient des trompettes et les chantres, unis dans un même son pour louer et célébrer le '
  - type: text
    content: Seigneur
  - type: text
    content: ', firent retentir les trompettes, les cymbales et les autres instruments et louèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  – car il est bon, car sa fidélité est pour toujours ! – à ce moment, la Maison, la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', fut remplie d''une nuée. '
  '14':
  - type: text
    content: 'Les prêtres ne pouvaient plus se tenir là pour officier, à cause de la nuée ; car la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remplissait la maison de Dieu.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Voir anciens. –  coffre de l''alliance  : cf. 6.11n  ; Ex 25.10n.'
  - type: text
    content: 'Alors Salomon rassembla à Jérusalem les anciens d''Israël et tous les chefs des tribus, les princes des familles des Israélites, pour faire monter de la Ville de David, c''est-à-dire Sion, le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Tous les hommes d''Israël se rassemblèrent auprès du roi pour la fête – c''était le septième mois. '
  '4':
  - type: note
    content: 'les lévites portèrent le Coffre  : cette indication apporte une précision par rapport à 1R 8.3 qui mentionne les prêtres d''une manière générale ; cf. Nb 3.31 ; 1Ch 15.2 ; voir aussi Jos 3.3,6 ; 6.6,12 ; 8.33 ; Nb 4.15.'
  - type: text
    content: 'Tous les anciens d''Israël arrivèrent, et les lévites portèrent le Coffre. '
  '5':
  - type: note
    content: 'les prêtres-lévites  : plusieurs mss hébreux et versions anciennes portent les prêtres et les lévites, comme en 1R 8.4 ; voir aussi Dt 17.9n  ; 1Ch 9.2n  ; 2Ch 23.18 ; 30.27.'
  - type: text
    content: 'Ils firent monter le Coffre, la tente de la Rencontre et tous les ustensiles sacrés qui étaient dans la tente : ce sont les prêtres-lévites qui les firent monter. '
  '6':
  - type: note
    content: 'sacrifiaient… en si grand nombre  : cf. 1.6 ; 15.11.'
  - type: text
    content: 'Le roi Salomon et toute la communauté d''Israël rassemblée auprès de lui devant le Coffre sacrifiaient du petit bétail et du gros bétail, en si grand nombre qu''on ne pouvait ni le compter ni l''évaluer. '
  '7':
  - type: text
    content: 'Les prêtres amenèrent le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en son lieu, dans le Secret de la Maison, dans le Très-Sacré, sous les ailes des keroubim. '
  '8':
  - type: note
    content: 'couvraient  : verbe synonyme (plus courant) de celui qui apparaît en Ex 25.20 ; 37.9 ; 40.3,21 ; 1R 8.7 ; 1Ch 28.18.'
  - type: text
    content: 'Les keroubim étendaient les ailes au-dessus du lieu du Coffre, les keroubim couvraient le Coffre et ses barres par-dessus. '
  '9':
  - type: note
    content: 'depuis le Coffre  : cf. 1R 8.8 depuis le sanctuaire, qui indique plutôt la position de l''observateur. –  Le Coffre est resté là  : litt. il est resté là.'
  - type: text
    content: 'Les barres étaient d''une longueur telle que leurs extrémités se voyaient depuis le Coffre, devant le Secret ; mais on ne les voyait pas du dehors. Le Coffre est resté là jusqu''à ce jour. '
