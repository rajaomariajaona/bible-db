document_id: PSA.47,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Acclamez le grand roi
  - type: text
    content: ' '
  - type: note
    content: 42.1n.
  - type: text
    content: Du chef de chœur. Des fils de Coré. Psaume.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 48.5 ; Es 2.2. –  nobles 83.12 ; 107.40 ; 118.9 ; 146.3. –  au peuple  : on pourrait aussi comprendre  : c''est le peuple…  ; LXX se réunissent avec le Dieu d''Abraham , ce qui correspond au changement d''une seule voyelle en hébreu ; cf. Ps 87 ; Gn 22.18. –  les boucliers  : ce terme (3.4+) peut désigner métaphoriquement des rois ou d''autres personnages importants ; cf. 84.10 ; 89.19. –  souverainement élevé 97.9 ; cf. 95.3 ; 96.4.'
  - type: text
    content: Les nobles des peuples se réunissent
  - type: text
    content: au peuple du Dieu d'Abraham ;
  - type: text
    content: car à Dieu sont les boucliers de la terre.
  - type: text
    content: Il est souverainement élevé.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'peuples 67.4,6 ; 68.33. –  battez des mains 98.8 ; 2R 11.12 (autres verbes hébreux). –  Acclamez  : cf. v. 6 ; 98.4,6 ; So 3.14s ; Za 9.9.'
  - type: text
    content: Vous tous, peuples, battez des mains !
  - type: text
    content: Acclamez Dieu par des cris de joie !
  '3':
  - type: text
    content: ' '
  - type: note
    content: redoutable 68.36 ; 76.8 ; 96.4 ; Dt 7.21 ; Ml 1.14 ; Dn 9.4 ; Né 1.5. –  grand roi 95.3ss ; Ml 1.14 ; cf. 1Tm 6.15. –  sur toute la terre v. 8 ; 8.2 ; 97.5 ; Za 14.9.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Très-Haut, est redoutable,'
  - type: text
    content: il est un grand roi sur toute la terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 18.48s ; 110.2 ; Jos 10.24.
  - type: text
    content: Il nous soumet des peuples,
  - type: text
    content: et des nations sous nos pieds ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'il nous choisit notre patrimoine , la Terre promise ; cf. 132.13 ; voir aussi Dt 4.38 ; 32.8s ; Es 58.14 ; LXX il nous choisit, nous, pour son patrimoine. –  l''orgueil (ou la fierté ) de Jacob (14.7+) : cf. Am 8.7 ; Na 2.3 ; voir aussi Es 24.14n.'
  - type: text
    content: il nous choisit notre patrimoine,
  - type: text
    content: 'l''orgueil de Jacob, qu''il aime. '
  - type: text
    content: Pause.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu monte…  : cf. 24.7-10 ; 68.19 ; 132.8 ; 1S 6 ; voir aussi Gn 17.22 ; 35.13 ; Jg 13.20. –  acclamations 27.6+. –  trompe 81.4 ; 98.6 ; 150.3 ; cf. Nb 29.1 ; Jos 6.4 ; 2S 15.10 ; 2R 9.13.'
  - type: text
    content: Dieu monte au milieu des acclamations,
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''avance au son de la trompe.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 30.5 ; 68.33 ; Jg 5.3. –  Chantez ou jouez de la musique  ; cf. 7.18n.
  - type: text
    content: Chantez Dieu, chantez !
  - type: text
    content: Chantez pour notre roi, chantez !
  '8':
  - type: text
    content: ' '
  - type: note
    content: roi de toute la terre 22.29+ ; cf. Es 54.5 ; Za 14.9. –  un poème 32.1n  ; on pourrait aussi comprendre chantez pour le faire savoir !
  - type: text
    content: 'Car Dieu est roi de toute la terre :'
  - type: text
    content: chantez un poème !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'son trône 9.5,8 ; 11.4 ; 45.7n  ; 89.15 ; 93.2 ; 97.2 ; 103.19 ; 1R 22.19 ; Es 6.1 ; Ap 4.2 ; 7.10. –  sacré  : voir saint.'
  - type: text
    content: Dieu est roi sur les nations,
  - type: text
    content: Dieu est assis sur son trône sacré.
