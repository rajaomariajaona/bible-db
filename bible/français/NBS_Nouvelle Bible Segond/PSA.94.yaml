document_id: PSA.94,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu vengeur de l'injustice
  - type: text
    content: ' '
  - type: note
    content: 'LXX donne la suscription  : Psaume de David, pour le quatrième jour de la semaine. –  Dieu (hébreu ’El , Gn 21.33n) des vengeances Ps 18.48n  ; cf. Dt 32.35 ; Es 35.4 ; 61.2 ; Jr 50.15 ; 51.36 ; Na 1.2 ; Rm 12.19 ; 1Th 4.6. –  parais… 50.2n  ; 80.2.'
  - type: text
    content: 'Dieu des vengeances, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: Dieu des vengeances, parais dans ta splendeur !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'qui instruit ou qui corrige , 6.2n  ; Pr 1.2n. –  n''avertirait-il pas  : autres traductions ne reprendrait-il pas ; ne réprimanderait-il pas . –  qui apprend…  : cf. Jb 28.28 ; Pr 8.'
  - type: text
    content: Celui qui instruit les nations n'avertirait-il pas,
  - type: text
    content: lui qui apprend la connaissance aux humains ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: '139.3 ; Mt 9.4 ; Rm 1.21 ; 1Co 3.20. –  les pensées ou les plans. –  futiles  : litt. futilité , comme en Ec 1.2n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' connaît les pensées des humains :'
  - type: text
    content: elles sont futiles !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Heureux (1.1+) l''homme…  : cf. 119.71 ; Jb 5.17. –  que tu instruis  : autre traduction que tu corriges  ; cf. v. 10. –  Seigneur (Yah) v. 7+ ; Ex 15.2n. –  à qui tu apprends ta loi  : cf. 25.4,9 ; 119.12 ; 143.10 ; Es 48.17.'
  - type: text
    content: 'Heureux l''homme que tu instruis, '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah),'
  - type: text
    content: à qui tu apprends ta loi,
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 49.6 ; 112.6s.
  - type: text
    content: pour lui donner la tranquillité aux jours du malheur,
  - type: text
    content: jusqu'à ce qu'une fosse soit creusée pour le méchant !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 1S 12.22 ; Lm 3.31 ; Rm 11.1s.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne délaisse pas son peuple,'
  - type: text
    content: il n'abandonne pas son patrimoine ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'à la justice  : certaines versions anciennes ont lu au juste  ; cf. Es 40.27. –  le suivront  : litt. (seront) derrière lui  ; certains modifient le texte hébreu traditionnel pour lire le deuxième vers  : et un avenir (heureux) à tous ceux qui ont le cœur droit  ; cf. 73.17s ; Jr 29.11 ; Pr 23.18 ; 24.14.'
  - type: text
    content: car le jugement reviendra à la justice,
  - type: text
    content: et tous ceux qui ont le cœur droit le suivront.
  '16':
  - type: text
    content: ' '
  - type: note
    content: se dressera pour moi , c.-à-d. défendra ma cause  ; cf. v. 2+ ; 43.1.
  - type: text
    content: Qui se dressera pour moi contre les gens mauvais ?
  - type: text
    content: Qui se tiendra debout pour moi contre les malfaisants ?
  '17':
  - type: text
    content: ' '
  - type: note
    content: Si le Seigneur … 124.1ss. –  la demeure du silence , c.-à-d. la mort, 115.17 ; cf. 88.11ss.
  - type: text
    content: 'Si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''était pas mon secours,'
  - type: text
    content: je serais bien vite dans la demeure du silence.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Je vacille… 38.17.
  - type: text
    content: 'Quand je dis : Je vacille sur mes jambes !'
  - type: text
    content: 'ta fidélité, '
  - type: text
    content: Seigneur
  - type: text
    content: ', me soutient.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 's''agite  : sous-entendu dans le texte. –  consolations  : cf. Es 66.11 ; Jr 16.7 ; 2Co 1.5.'
  - type: text
    content: Quand une foule de préoccupations s'agite au dedans de moi,
  - type: text
    content: tes consolations me remplissent de délices.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Lève-toi v. 16 ; 3.8+ ; 7.7. –  juge (50.6+) de la terre 58.12 ; 82.8 ; cf. 7.9 ; 9.9,20 ; 76.9s ; 96.10 ; Gn 18.25. –  rendre la pareille  : cf. 28.4+ ; Jr 51.56 ; Jl 4.4 ; Lm 3.64. –  orgueilleux 31.24 ; voir aussi 140.6 ; Pr 15.25 ; 16.19.'
  - type: text
    content: Lève-toi, juge de la terre,
  - type: text
    content: pour rendre la pareille aux orgueilleux !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'de malheur  : autre traduction perfide , litt. des calamités ou des perfidies , cf. 5.10 ; 52.4,9 ; 55.7 ; voir aussi 122.5 ; Dt 1.17. –  à l''aide du code  : traduction incertaine ; on pourrait aussi comprendre au mépris de la loi  ; cf. Es 10.1s.'
  - type: text
    content: A-t-il partie liée avec toi, ce trône de malheur
  - type: text
    content: qui façonne l'oppression à l'aide du code ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 56.7 ; 59.4 ; Pr 17.15. –  condamnent  : autre traduction déclarent méchant  ; cf. 37.33n. – Voir sang.'
  - type: text
    content: Ils s'attroupent contre la vie du juste
  - type: text
    content: et condamnent le sang innocent.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.2+ ; 18.3+ ; 59.17.
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est ma citadelle,'
  - type: text
    content: mon Dieu est le rocher où je m'abrite.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. 54.7. –  par leur propre mal 7.17+.
  - type: text
    content: Il fera retomber sur eux leur malfaisance,
  - type: text
    content: il les réduira au silence par leur propre mal ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, les réduira au silence.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Jusqu'à quand 6.4+. –  exulteront-ils Jr 11.15.
  - type: text
    content: 'Jusqu''à quand les méchants, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: jusqu'à quand les méchants exulteront-ils ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ils éructent 59.8n. –  insolence  : cf. 31.19+. –  malfaisants v. 16,23 ; 5.6+. –  se consultent  : traduction incertaine ; unique occurrence d''une forme réfléchie (réciproque ?) du verbe dire ; autre possibilité ils se vantent  ; cf. 73.7ss.'
  - type: text
    content: Ils éructent, ils parlent avec insolence ;
  - type: text
    content: tous les malfaisants se consultent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 14.4 ; Es 3.15. –  ton patrimoine 78.71.
  - type: text
    content: Seigneur
  - type: text
    content: ', ils écrasent ton peuple,'
  - type: text
    content: ils affligent ton patrimoine ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 22.20s ; Dt 24.17ss ; Es 1.15ss ; Mi 3.1ss ; Ml 3.5.
  - type: text
    content: ils tuent la veuve et l'immigré,
  - type: text
    content: ils assassinent les orphelins
  '7':
  - type: text
    content: ' '
  - type: note
    content: '10.11 ; 14.1 ; 73.11 ; Es 47.10. –  Le Seigneur (Yah)  : cf. v. 12 ; 68.5n  ; 104.35n  ; Ex 15.2n. –  Dieu de Jacob 14.7+.'
  - type: text
    content: 'et ils disent : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) ne voit rien,'
  - type: text
    content: le Dieu de Jacob ne comprend rien !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Comprends donc v. 7. –  peuple abruti  : litt. abrutis du peuple ou bêtes parmi le peuple  ; cf. 49.13 ; 73.22 ; 92.7 ; Pr 30.2s ; 2P 2.12. –  stupides Pr 1.22+'
  - type: text
    content: Comprends donc, peuple abruti !
  - type: text
    content: Gens stupides, quand aurez-vous du bon sens ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 4.11 ; Pr 20.12.
  - type: text
    content: Celui qui plante l'oreille n'entendrait-il pas ?
  - type: text
    content: Celui qui façonne l'œil ne verrait-il pas ?
