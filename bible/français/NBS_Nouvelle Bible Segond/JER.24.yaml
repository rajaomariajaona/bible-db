document_id: JER.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux corbeilles de figues
  - type: text
    content: ' '
  - type: note
    content: 'corbeilles de figues… devant le temple  : cf. Dt 26.2ss ; Am 8.1. –  après que Nabuchodonosor… 21.2n  ; 29.1s ; 2R 24.10-16. –  Jékonia  : hébreu Yékonyahou  ; cf. 22.24n,28.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me fit voir deux corbeilles de figues posées devant le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', après que Nabuchodonosor, roi de Babylone, eut exilé de Jérusalem et conduit à Babylone Jékonia, fils de Joïaqim, roi de Juda, les princes de Juda, les charpentiers et les serruriers. '
  '10':
  - type: note
    content: 'épée / famine / peste 14.12+. –  jusqu''à ce qu''ils aient disparu  : cf. 25.5.'
  - type: text
    content: J'enverrai parmi eux l'épée, la famine et la peste, jusqu'à ce qu'ils aient disparu de la terre que je leur avais donnée, ainsi qu'à leurs pères.
  '2':
  - type: note
    content: bonnes v. 5n-7. –  figues précoces Mi 7.1n. –  mauvaises v. 8-10 ; 29.16s ; cf. Lc 13.1-6.
  - type: text
    content: 'L''une des corbeilles contenait de très bonnes figues, comme les figues précoces de la première récolte, et l''autre corbeille de très mauvaises figues, qu''on ne pouvait manger tant elles étaient mauvaises. '
  '3':
  - type: note
    content: Cf. 1.11+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Que vois-tu, Jérémie ? Je répondis : Des figues. Les bonnes figues sont très bonnes, et les mauvaises sont très mauvaises ; on ne peut les manger tant elles sont mauvaises.'
  '4':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint : '
  '5':
  - type: note
    content: 'favorablement  : litt. pour le bien, le même terme a aussi été traduit par bonnes (ici et au v. 2) et par bonheur au v. 6 ; cf. 29.11 ; 2R 25.22-30 ; voir aussi Es 53 ; Ps 118.22. –  que j''ai envoyés 29.20.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Comme ces bonnes figues, ainsi je regarderai favorablement les exilés de Juda que j''ai envoyés de ce lieu dans le pays des Chaldéens. '
  '6':
  - type: note
    content: 'Je veillerai…  : cf. Gn 44.21n  ; Am 9.4. –  je les ramènerai 23.3+. –  je les bâtirai… 1.10+ ; 42.10 ; Am 9.15.'
  - type: text
    content: 'Je veillerai à leur bonheur, et je les ramènerai dans ce pays ; je les bâtirai, je ne raserai pas ; je les planterai, je ne déracinerai pas. '
  '7':
  - type: note
    content: 'un cœur 32.39 ; cf. 31.33. –  pour qu''ils sachent…  : cf. 9.23+. –  Ils seront mon peuple… 7.23+. –  s''ils reviennent  : autre traduction parce qu''ils reviendront.'
  - type: text
    content: 'Je leur donnerai un cœur pour qu''ils sachent que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). Ils seront mon peuple, et moi, je serai leur Dieu, s''ils reviennent à moi de tout leur cœur. '
  '8':
  - type: note
    content: 'mauvaises figues v. 2+. –  Sédécias 1.3n  ; 21.7. –  en Egypte  : cf. 44.27.'
  - type: text
    content: 'Quant aux mauvaises figues qu''on ne peut manger tant elles sont mauvaises, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : C''est ainsi que je traiterai Sédécias, roi de Juda, ses princes et le reste de Jérusalem, ceux qui sont restés dans ce pays et ceux qui habitent en Egypte. '
  '9':
  - type: note
    content: 'un sujet de terreur 15.4+ ; 29.18. –  un malheur  : le même terme a été traduit par mauvais au v. 2 ; cette précision est omise par LXX. –  outrage  : cf. 6.10n. –  fable / raillerie  : cf. 1R 9.7+. –  malédiction  : pour le sens, cf. 29.22 ; voir aussi 25.18 ; 26.6 ; 29.18 ; 42.18 ; 44.8,12,22 ; 49.13 ; Nb 5.21 ; Es 43.28.'
  - type: text
    content: 'Je ferai d''eux un sujet de terreur, un malheur, pour tous les royaumes de la terre, un sujet d''outrage, de fable, de raillerie et de malédiction dans tous les lieux où je les bannirai. '
