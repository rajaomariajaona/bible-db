document_id: JER.24,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les deux corbeilles de figues
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'corbeilles de figues… devant le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dt 26.2ss ; Am 8.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'après que Nabuchodonosor… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 29.1s ; 2R 24.10-16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jékonia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yékonyahou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 22.24
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',28.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me fit voir deux corbeilles de figues posées devant le temple du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', après que Nabuchodonosor, roi de Babylone, eut exilé de Jérusalem et conduit à Babylone Jékonia, fils de Joïaqim, roi de Juda, les princes de Juda, les charpentiers et les serruriers. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'épée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'famine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'à ce qu'ils aient disparu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 25.5.'
      marker-yv: yv-n
    - type: text
      text: J'enverrai parmi eux l'épée, la famine et la peste, jusqu'à ce qu'ils aient disparu de la terre que je leur avais donnée, ainsi qu'à leurs pères.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bonnes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'figues précoces '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mi 7.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mauvaises '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8-10 ; 29.16s ; cf. Lc 13.1-6.
      marker-yv: yv-n
    - type: text
      text: 'L''une des corbeilles contenait de très bonnes figues, comme les figues précoces de la première récolte, et l''autre corbeille de très mauvaises figues, qu''on ne pouvait manger tant elles étaient mauvaises. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.11+.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me dit : Que vois-tu, Jérémie ? Je répondis : Des figues. Les bonnes figues sont très bonnes, et les mauvaises sont très mauvaises ; on ne peut les manger tant elles sont mauvaises.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint : '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: favorablement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour le bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le même terme a aussi été traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bonnes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ici et au v. 2) et par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bonheur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 6 ; cf. 29.11 ; 2R 25.22-30 ; voir aussi Es 53 ; Ps 118.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que j''ai envoyés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 29.20.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël : Comme ces bonnes figues, ainsi je regarderai favorablement les exilés de Juda que j''ai envoyés de ce lieu dans le pays des Chaldéens. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je veillerai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 44.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Am 9.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je les ramènerai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je les bâtirai… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.10+ ; 42.10 ; Am 9.15.
      marker-yv: yv-n
    - type: text
      text: 'Je veillerai à leur bonheur, et je les ramènerai dans ce pays ; je les bâtirai, je ne raserai pas ; je les planterai, je ne déracinerai pas. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.39 ; cf. 31.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour qu'ils sachent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils seront mon peuple… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'ils reviennent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parce qu'ils reviendront.
      marker-yv: yv-n
    - type: text
      text: 'Je leur donnerai un cœur pour qu''ils sachent que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). Ils seront mon peuple, et moi, je serai leur Dieu, s''ils reviennent à moi de tout leur cœur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mauvaises figues '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sédécias '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 21.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 44.27.'
      marker-yv: yv-n
    - type: text
      text: 'Quant aux mauvaises figues qu''on ne peut manger tant elles sont mauvaises, ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : C''est ainsi que je traiterai Sédécias, roi de Juda, ses princes et le reste de Jérusalem, ceux qui sont restés dans ce pays et ceux qui habitent en Egypte. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un sujet de terreur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.4+ ; 29.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme a été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mauvais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 2 ; cette précision est omise par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: outrage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: raillerie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 9.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: malédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : pour le sens, cf. 29.22 ; voir aussi 25.18 ; 26.6 ; 29.18 ; 42.18 ; 44.8,12,22 ; 49.13 ; Nb 5.21 ; Es 43.28.'
      marker-yv: yv-n
    - type: text
      text: 'Je ferai d''eux un sujet de terreur, un malheur, pour tous les royaumes de la terre, un sujet d''outrage, de fable, de raillerie et de malédiction dans tous les lieux où je les bannirai. '
