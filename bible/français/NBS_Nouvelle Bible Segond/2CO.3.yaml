document_id: 2CO.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ministres d'une alliance nouvelle
  - type: text
    content: ' '
  - type: note
    content: nous recommander nous-mêmes 4.2 ; 5.12 ; 6.4 ; 10.12,18 ; 12.11 ; le même verbe est traduit par montrer en 7.11 et en Ga 2.18 ; cf. Rm 3.5n. –  lettres de recommandation Ac 18.27 ; Rm 16.1 ; Col 4.10 ; 3Jn 12.
  - type: text
    content: 'Recommençons-nous à nous recommander nous-mêmes ? Ou bien aurions-nous besoin, comme quelques-uns, de lettres de recommandation pour vous, ou encore de vous ? '
  '10':
  - type: note
    content: 'n''a pas été glorifié  : autre traduction n''a pas vraiment été glorifié.'
  - type: text
    content: '– Et, sous ce rapport, ce qui a été glorifié n''a pas été glorifié, à cause de cette gloire plus éminente. – '
  '11':
  - type: note
    content: ce qui était passager v. 7n,14n.
  - type: text
    content: En effet, si ce qui était passager a été marqué par la gloire, à bien plus forte raison ce qui demeure est-il entouré de gloire.
  '12':
  - type: text
    content: ' '
  - type: note
    content: assurance 7.4 ; Ac 2.29n  ; Ep 3.12+ ; Ph 1.20 ; Col 2.15n  ; 1Tm 3.13 ; Phm 8.
  - type: text
    content: 'Ayant donc une telle espérance, nous montrons d''autant plus d''assurance. '
  '13':
  - type: note
    content: 'Ex 34.33-35. –  Israélites Lc 1.16n. –  ne voient pas  : litt. ne fixent pas v. 7. –  passager v. 14n.'
  - type: text
    content: 'Nous ne faisons pas comme Moïse, qui mettait un voile sur son visage, pour que les Israélites ne voient pas la fin de ce qui était passager. '
  '14':
  - type: note
    content: 'est devenue (ou a été rendue) obtuse (litt. endurcie) Mc 3.5n  ; 4.12/ / ; Ac 28.27 ; Rm 11.7s,25. –  ancienne alliance  : cf. v. 6+ ; c''est de cette formule que vient l''expression Ancien Testament pour désigner la Bible juive, le même mot grec pouvant être traduit par alliance comme par testament  ; voir aussi Rm 7.6 ; Hé 8.13 ; 9.16n. –  il n''est pas enlevé…  : autre traduction  : il ne leur est pas dévoilé (comme au v. 18, verbe apparenté au mot traduit par voile) que dans le Christ il disparaît  ; ce dernier verbe est celui qui a été traduit par (être) passager aux v. 7n,11,13 ; cf. Rm 10.4 ; Ep 2.15 (réduire à rien).'
  - type: text
    content: 'Mais leur intelligence est devenue obtuse. En effet, jusqu''à ce jour, quand ils font la lecture publique de l''ancienne alliance, le même voile demeure ; il n''est pas enlevé, parce qu''il ne disparaît que dans le Christ. '
  '15':
  - type: note
    content: 'quand on lit Moïse (c.-à-d. la loi, Mt 19.7 ; Lc 24.27) : cf. Ac 15.21.'
  - type: text
    content: 'Jusqu''à ce jour, quand on lit Moïse, il y a un voile sur leur cœur ; '
  '16':
  - type: note
    content: 'on se tourne  : litt. il se tourne  ; cf. Ex 34.34  ; Rm 11.23-27.'
  - type: text
    content: mais lorsqu'on se tourne vers le Seigneur, le voile est enlevé
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'le Seigneur, c''est l''Esprit 1Co 6.17 ; 15.45 ; cf. Jn 4.24. –  liberté  : cf. Jn 8.36 ; Rm 7.6 ; 8.2 ; Ga 5.1.'
  - type: text
    content: 'Or le Seigneur, c''est l''Esprit ; et là où est l''Esprit du Seigneur, là est la liberté. '
  '18':
  - type: note
    content: 'contemplons comme dans un miroir  : autre traduction reflétons comme un miroir  : cf. 4.4-6 ; 1Co 13.12 ; Jc 1.22ss ; Sagesse 7.26 : « Elle (la Sagesse) est un reflet de la lumière éternelle, un miroir sans tache de l''activité de Dieu et une image de sa bonté. » –  transfigurés Mc 9.2n  ; Rm 12.2n  ; cf. Ph 3.21+. –  image 4.4 ; cf. Gn 1.26s ; Rm 8.29 ; 1Co 15.49 ; Col 3.10. –  de gloire en gloire  : cf. 2.16n  ; 4.16s ; Rm 1.17n  ; voir aussi Ex 16.7,10 ; 24.17. –  telle est l''œuvre…  : litt. comme du fait du Seigneur… –  du Seigneur, qui est l''Esprit (v. 17+) : on pourrait aussi comprendre de l''Esprit du Seigneur ou du Seigneur de l''Esprit.'
  - type: text
    content: Nous tous qui, le visage dévoilé, contemplons comme dans un miroir la gloire du Seigneur, nous sommes transfigurés en cette même image, de gloire en gloire ; telle est l'œuvre du Seigneur, qui est l'Esprit.
  '2':
  - type: note
    content: 'C''est vous qui êtes notre lettre 1Co 9.2. –  dans notre cœur  : litt. dans nos cœurs  ; certains mss portent dans vos cœurs, cf. v. 3 ; voir aussi 7.3. –  connue et lue  : cf. 1.13n.'
  - type: text
    content: 'C''est vous qui êtes notre lettre, écrite dans notre cœur, connue et lue de tous. '
  '3':
  - type: note
    content: 'Il est manifeste que…  : litt. vous êtes manifestés (comme étant)… –  confiée à notre ministère  : certains comprennent écrites par notre ministère  ; le verbe grec est apparenté au mot traduit par ministère dans la suite ; ailleurs cette famille de termes est aussi rendue par servir, service, serviteur  ; cf. 8.19s ; Mt 20.26n  ; Ac 6.1n  ; Rm 12.7n  ; 15.16 ; 1Co 3.5. –  Esprit / tablettes de chair / cœurs  : cf. Jr 31.33 ; Ez 11.19 ; 36.26 ; Pr 3.3 ; 7.3 ; Hé 8.10. –  tablettes de pierre Ex 24.12 ; 31.18 ; 34.1,28s ; Dt 9.10s.'
  - type: text
    content: 'Il est manifeste que vous êtes une lettre du Christ confiée à notre ministère : une lettre écrite, non pas avec de l''encre, mais avec l''Esprit du Dieu vivant ; non pas sur des tablettes de pierre, mais sur des tablettes de chair, sur des cœurs.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'en Dieu  : autre traduction devant Dieu.'
  - type: text
    content: 'Telle est la confiance que, par le Christ, nous avons en Dieu. '
  '5':
  - type: note
    content: 'capables  : voir 2.16n  ; Col 1.12 ; cf. Jn 15.5. –  vient de Dieu  : cf. Rm 15.18+ ; Ph 2.13 ; 4.13.'
  - type: text
    content: 'Non pas que de nous-mêmes nous soyons capables de considérer quoi que ce soit comme venant de nous-mêmes : notre capacité vient de Dieu. '
  '6':
  - type: note
    content: alliance nouvelle v. 14n  ; Jr 31.31 ; Lc 22.20+ ; 1Co 11.25 ; cf. Hé 8.8,13 ; 9.15-16n  ; 12.24 ; les membres de la communauté de Qumrân semblent également s'être considérés comme admis « dans la Nouvelle Alliance » (Ecrit de Damas 6.19). –  lettre (autre mot grec qu'au v. 2) / Esprit Rm 2.29 ; 7.5s. –  la lettre tue Rm 7.9ss. –  l'Esprit fait vivre Jn 6.63 ; 1Co 15.45+.
  - type: text
    content: C'est lui aussi qui nous a rendus capables d'être ministres d'une alliance nouvelle, non pas de la lettre, mais de l'Esprit ; car la lettre tue, mais l'Esprit fait vivre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 34.28-35. –  Israélites Lc 1.16n. –  passagère  : litt. qui est en train d''être réduite à rien  ; même terme v. 11,13-14n  ; Rm 3.3+.'
  - type: text
    content: 'Or si le ministère de la mort, gravé avec des lettres sur des pierres, s''est trouvé entouré de gloire, au point que les Israélites ne pouvaient pas fixer le visage de Moïse, à cause de la gloire, pourtant passagère, de son visage, '
  '8':
  - type: text
    content: 'comment le ministère de l''Esprit ne le sera-t-il pas à plus forte raison ? '
  '9':
  - type: note
    content: ministère de la condamnation Dt 27.26 ; Ga 3.10. –  justice Rm 1.17+.
  - type: text
    content: 'Si le ministère de la condamnation a eu de la gloire, à bien plus forte raison le ministère de la justice abonde-t-il en gloire. '
