      children:
      - type: text
        text: '  : cf. Jr 31.33 ; Ez 11.19 ; 36.26 ; Pr 3.3 ; 7.3 ; Hé 8.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tablettes de pierre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 24.12 ; 31.18 ; 34.1,28s ; Dt 9.10s.
    marker-yv: yv-n
  - type: text
    text: 'Il est manifeste que vous êtes une lettre du Christ confiée à notre ministère : une lettre écrite, non pas avec de l''encre, mais avec l''Esprit du Dieu vivant ; non pas sur des tablettes de pierre, mais sur des tablettes de chair, sur des cœurs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: devant Dieu.
    marker-yv: yv-n
  - type: text
    text: 'Telle est la confiance que, par le Christ, nous avons en Dieu. '
  - type: usfm
    marker: vlbl
    children:
