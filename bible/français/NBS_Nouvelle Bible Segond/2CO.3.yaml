      marker: ft
      children:
      - type: text
        text: v. 14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jr 31.31 ; Lc 22.20+ ; 1Co 11.25 ; cf. Hé 8.8,13 ; 9.15-16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 12.24 ; les membres de la communauté de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ' semblent également s''être considérés comme admis « dans la Nouvelle Alliance » ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ecrit de Damas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.19). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lettre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre mot grec qu''au v. 2) / '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Esprit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rm 2.29 ; 7.5s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la lettre tue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rm 7.9ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''Esprit fait vivre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jn 6.63 ; 1Co 15.45+.
    marker-yv: yv-n
  - type: text
    text: C'est lui aussi qui nous a rendus capables d'être ministres d'une alliance nouvelle, non pas de la lettre, mais de l'Esprit ; car la lettre tue, mais l'Esprit fait vivre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 34.28-35. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Israélites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 1.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
