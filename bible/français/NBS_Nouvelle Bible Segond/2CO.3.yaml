      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: capables
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir 2.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Col 1.12 ; cf. Jn 15.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vient de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Rm 15.18+ ; Ph 2.13 ; 4.13.'
    marker-yv: yv-n
  - type: text
    text: 'Non pas que de nous-mêmes nous soyons capables de considérer quoi que ce soit comme venant de nous-mêmes : notre capacité vient de Dieu. '
  - type: usfm
    marker: vlbl
