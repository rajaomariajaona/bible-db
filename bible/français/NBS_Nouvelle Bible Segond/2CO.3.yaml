      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne voient pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ne fixent pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'passager '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous ne faisons pas comme Moïse, qui mettait un voile sur son visage, pour que les Israélites ne voient pas la fin de ce qui était passager. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
