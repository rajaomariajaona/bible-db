    text: 'Mais leur intelligence est devenue obtuse. En effet, jusqu''à ce jour, quand ils font la lecture publique de l''ancienne alliance, le même voile demeure ; il n''est pas enlevé, parce qu''il ne disparaît que dans le Christ. '
