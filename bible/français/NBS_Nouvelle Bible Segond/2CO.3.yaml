        - type: text
          text: n
      - type: text
        text: '  ; 1Tm 3.13 ; Phm 8.'
    marker-yv: yv-n
  - type: text
    text: 'Ayant donc une telle espérance, nous montrons d''autant plus d''assurance. '
  - type: usfm
    marker: vlbl
