      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est vous qui êtes notre lettre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Co 9.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans notre '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
