      - type: text
        text: dans nos cœurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans vos cœurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 3 ; voir aussi 7.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: connue et lue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'C''est vous qui êtes notre lettre, écrite dans notre cœur, connue et lue de tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il est manifeste que…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous êtes manifestés (comme étant)… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: confiée à notre ministère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: écrites par notre ministère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le verbe grec est apparenté au mot traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ministère '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dans la suite ; ailleurs cette famille de termes est aussi rendue par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: servir, service, serviteur
    - type: usfm
      marker: ft
