      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 3.3+.'
    marker-yv: yv-n
  - type: text
    text: 'Or si le ministère de la mort, gravé avec des lettres sur des pierres, s''est trouvé entouré de gloire, au point que les Israélites ne pouvaient pas fixer le visage de Moïse, à cause de la gloire, pourtant passagère, de son visage, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'comment le ministère de l''Esprit ne le sera-t-il pas à plus forte raison ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ministère de la condamnation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 27.26 ; Ga 3.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rm 1.17+.
    marker-yv: yv-n
  - type: text
    text: 'Si le ministère de la condamnation a eu de la gloire, à bien plus forte raison le ministère de la justice abonde-t-il en gloire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'n''a pas été '
      - type: usfm
        marker: w
        children:
        - type: text
          text: glorifié
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: n'a pas vraiment été glorifié.
    marker-yv: yv-n
  - type: text
    text: '– Et, sous ce rapport, ce qui a été glorifié n''a pas été glorifié, à cause de cette gloire plus éminente. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce qui était passager '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: En effet, si ce qui était passager a été marqué par la gloire, à bien plus forte raison ce qui demeure est-il entouré de gloire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
