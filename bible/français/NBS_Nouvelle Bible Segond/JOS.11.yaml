      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tous ses hommes de guerre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 8.1 ; 10.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à l'improviste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 8.12,19-23 ; 10.9.'
    marker-yv: yv-n
  - type: text
    text: 'Josué, avec tous ses hommes de guerre, arriva sur eux à l''improviste près des eaux de Mérom : ils tombèrent sur eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sidon la Grande
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ville principale de la Phénicie avec Tyr (Gn 10.15). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Misrephoth-Maïm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce lieu dont le nom ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Incendies des eaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ?) évoque peut-être des marais salants est probablement à situer sur la côte méditerranéenne, à 18 km au nord d''Akko, à la frontière libanaise. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vallée de Mitspé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à l''est de Mérom ; voir v. 3+.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' les livra à Israël ; ils les battirent et les poursuivirent jusqu''à Sidon la Grande, jusqu''à Misrephoth-Maïm et jusqu''à la vallée de Mitspé, vers l''est ; ils les battirent, sans leur laisser aucun survivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Josué les traita…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mit le feu à
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brûla par le feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même au v. 11.'
    marker-yv: yv-n
  - type: text
    text: 'Josué les traita comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' le lui avait dit : il coupa les jarrets de leurs chevaux et mit le feu à leurs chars.'
