    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ville cananéenne de Haute-Galilée, au sud-ouest du lac Houleh (19.36). –  '
