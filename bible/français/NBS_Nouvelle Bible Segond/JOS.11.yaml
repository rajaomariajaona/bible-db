  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plaine aride
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ‘arava
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 8.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
