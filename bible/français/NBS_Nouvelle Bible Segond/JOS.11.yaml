      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ‘arava
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : cf. v. 2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 8.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Josué prit ainsi tout ce pays, la montagne, tout le Néguev, tout le pays de Goshen, le Bas-Pays, la plaine aride – la région montagneuse d''Israël et sa plaine côtière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le mont Chauve
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à une quarantaine de kilomètres au sud-ouest de la mer Morte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Séir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : massif montagneux au sud de la mer Morte, à l''est de la Araba ou « plaine aride » (Gn 14.6 ; Dt 2.4ss ; 33.2) ; c''est le territoire d''Edom. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baal
      - type: text
        text: -Gad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on n''a pas identifié précisément cette localité située au pied de l’'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hermon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 12.7 ; 13.5). Sur '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comme nom de divinité, voir Es 65.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Voir aussi Baal. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tous leurs rois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir la liste de 12.9-24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les mit à mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Depuis le mont Chauve qui s''élève vers Séir jusqu''à Baal-Gad, dans la dépression du Liban, au pied du mont Hermon, il captura tous leurs rois et les mit à mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La guerre que Josué fit à tous ces rois dura longtemps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gabaon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.3ss.
    marker-yv: yv-n
  - type: text
    text: 'Aucune ville ne fit la paix avec les Israélites – excepté les Hivvites qui habitaient Gabaon – ils les prirent toutes en leur faisant la guerre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur entêtement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''endurcissement de leur '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; voir Ex 4.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sans leur faire '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 7.2.'
    marker-yv: yv-n
  - type: text
    text: 'Car c''est du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' que venait leur entêtement à faire la guerre à Israël, afin que celui-ci puisse les frapper d''anathème, sans leur faire grâce, et les détruire, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné à Moïse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les Anaqites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.12-15 ; 15.13-19 ; cf. Gn 6.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 1.28+ ; 2.10-12,21 ; 9.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'montagne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'région montagneuse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent un même terme hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hébron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 10.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',36. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Debir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 10.38'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Anab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.50 ; sans doute à environ 20 km au sud-ouest d''Hébron. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'anathème '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.28+ ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: ', malédiction.'
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, Josué vint retrancher les Anaqites de la montagne, d''Hébron, de Debir, d''Anab, de toute la région montagneuse de Juda et de toute la région montagneuse d''Israël ; Josué les frappa d''anathème, avec leurs villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gaza '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ashdod
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : villes philistines ; en 13.3 seront mentionnées les cinq villes des Philistins, avec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ashqelôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Eqrôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui manquent ici.
    marker-yv: yv-n
  - type: text
    text: 'Il ne resta plus d''Anaqites dans le pays des Israélites ; il n''en subsista qu''à Gaza, à Gath et à Ashdod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: selon sa répartition
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'selon leurs parts '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leurs classes, leurs divisions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même terme désigne les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'classes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: des prêtres, des lévites etc. en 1Ch 23.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le pays fut dès lors…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même texte hébreu en 14.15.'
    marker-yv: yv-n
  - type: text
    text: 'Josué prit donc tout le pays, exactement comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait dit à Moïse. Josué le donna comme patrimoine à Israël, selon sa répartition, tribu par tribu. Le pays fut dès lors tranquille, sans guerre.'
