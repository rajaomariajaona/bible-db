    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: En ce temps-là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à l'heure dite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hatsor '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jr 49.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le principal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la tête
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. v. 1. La ville de Hatsor, située sur une importante voie commerciale, était notamment une plaque tournante pour le commerce de l'étain utilisé dans la fabrication du bronze. Elle est mentionnée dans plusieurs textes des XIX
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' et XVIII'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' s. av. J.-C., en Egypte et à Mari (actuellement en Syrie).'
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, Josué revint prendre Hatsor ; il tua son roi d''un coup d''épée. En effet, Hatsor était autrefois le principal de tous ces royaumes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'anathème '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.28+.
    marker-yv: yv-n
  - type: text
    text: 'Ils passèrent au fil de l''épée tous les êtres vivants qui s''y trouvaient ; il les frappa d''anathème : il ne resta rien de ce qui respirait. Puis il mit le feu à Hatsor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'comme Moïse… l''avait ordonné '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 7.1s ; 20.17 ; cf. Jos 11.15.
    marker-yv: yv-n
  - type: text
    text: 'Josué prit toutes les villes de ces rois et captura tous leurs rois ; il les passa au fil de l''épée ; il les frappa d''anathème, comme Moïse, serviteur du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', l''avait ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: situées sur des collines
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se tenant sur leurs tells.
    marker-yv: yv-n
  - type: text
    text: 'Mais Israël ne brûla aucune des villes situées sur des collines, à l''exception seulement de Hatsor, qui fut brûlée par Josué. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'biens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bêtes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.2,27 ; Dt 3.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce qui respirait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.40'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites prirent pour butin tous les biens de ces villes et leurs bêtes ; mais ils passèrent au fil de l''épée tous les êtres humains, jusqu''à ce qu''ils les aient détruits, sans rien laisser de ce qui respirait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Josué le fit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 12 ; voir aussi Ex 23.32s ; Nb 33.52 ; Dt 7.2 ; 20.16ss.'
    marker-yv: yv-n
  - type: text
    text: 'Ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait ordonné à Moïse, son serviteur, Moïse l''avait ordonné à Josué, et Josué le fit. Il ne négligea rien de tout ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait ordonné à Moïse.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josué achève de conquérir le pays
