document_id: JOS.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Bataille de Mérom
  - type: text
    content: ' '
  - type: note
    content: 'Yabîn  : ce nom est également mentionné en Jg 4.2,17. –  Hatsor  : ville cananéenne de Haute-Galilée, au sud-ouest du lac Houleh (19.36). –  des messagers  : sous-entendu dans le texte. –  Madôn  : on l''identifie à Khirbet-Madin, à 9 km à l''ouest du lac de Tibériade. –  Shimrôn  : à la frontière de la Galilée, à l''ouest de Nazareth. En 12.20, elle est appelée Shimrôn-Mérôn  ; cf. 19.15. –  Akshaph 12.20 ; 19.25, mentionnée dans des textes égyptiens ; peut-être à 8 km au sud d''Akko (Saint-Jean d''Acre).'
  - type: text
    content: 'A cette nouvelle, Yabîn, roi de Hatsor, envoya des messagers à Yobab, roi de Madôn, au roi de Shimrôn, au roi d''Akshaph, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'En ce temps-là  : autre traduction à l''heure dite , cf. v. 6. –  Hatsor v. 1n  ; Jr 49.28n. –  le principal  : litt. la tête  ; cf. v. 1. La ville de Hatsor, située sur une importante voie commerciale, était notamment une plaque tournante pour le commerce de l''étain utilisé dans la fabrication du bronze. Elle est mentionnée dans plusieurs textes des XIXe et XVIIIe s. av. J.-C., en Egypte et à Mari (actuellement en Syrie).'
  - type: text
    content: 'En ce temps-là, Josué revint prendre Hatsor ; il tua son roi d''un coup d''épée. En effet, Hatsor était autrefois le principal de tous ces royaumes. '
  '11':
  - type: note
    content: anathème 10.28+.
  - type: text
    content: 'Ils passèrent au fil de l''épée tous les êtres vivants qui s''y trouvaient ; il les frappa d''anathème : il ne resta rien de ce qui respirait. Puis il mit le feu à Hatsor. '
  '12':
  - type: note
    content: comme Moïse… l'avait ordonné Dt 7.1s ; 20.17 ; cf. Jos 11.15.
  - type: text
    content: 'Josué prit toutes les villes de ces rois et captura tous leurs rois ; il les passa au fil de l''épée ; il les frappa d''anathème, comme Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', l''avait ordonné. '
  '13':
  - type: note
    content: 'situées sur des collines  : litt. se tenant sur leurs tells.'
  - type: text
    content: 'Mais Israël ne brûla aucune des villes situées sur des collines, à l''exception seulement de Hatsor, qui fut brûlée par Josué. '
  '14':
  - type: note
    content: 'biens / bêtes  : cf. 8.2,27 ; Dt 3.7. –  ce qui respirait 10.40n.'
  - type: text
    content: 'Les Israélites prirent pour butin tous les biens de ces villes et leurs bêtes ; mais ils passèrent au fil de l''épée tous les êtres humains, jusqu''à ce qu''ils les aient détruits, sans rien laisser de ce qui respirait. '
  '15':
  - type: note
    content: 'Josué le fit  : cf. v. 12 ; voir aussi Ex 23.32s ; Nb 33.52 ; Dt 7.2 ; 20.16ss.'
  - type: text
    content: 'Ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse, son serviteur, Moïse l''avait ordonné à Josué, et Josué le fit. Il ne négligea rien de tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse.'
  - type: heading
    content: Josué achève de conquérir le pays
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Bas-Pays (hébreu shephéla ) / plaine aride (hébreu ‘arava ) : cf. v. 2n  ; 8.14n.'
  - type: text
    content: 'Josué prit ainsi tout ce pays, la montagne, tout le Néguev, tout le pays de Goshen, le Bas-Pays, la plaine aride – la région montagneuse d''Israël et sa plaine côtière. '
  '17':
  - type: note
    content: 'le mont Chauve  : à une quarantaine de kilomètres au sud-ouest de la mer Morte. –  Séir  : massif montagneux au sud de la mer Morte, à l''est de la Araba ou « plaine aride » (Gn 14.6 ; Dt 2.4ss ; 33.2) ; c''est le territoire d''Edom. –  Baal-Gad  : on n''a pas identifié précisément cette localité située au pied de l’Hermon (cf. 12.7 ; 13.5). Sur Gad comme nom de divinité, voir Es 65.11n. Voir aussi Baal. –  tous leurs rois  : voir la liste de 12.9-24. –  les mit à mort  : cf. 10.26n.'
  - type: text
    content: 'Depuis le mont Chauve qui s''élève vers Séir jusqu''à Baal-Gad, dans la dépression du Liban, au pied du mont Hermon, il captura tous leurs rois et les mit à mort. '
  '18':
  - type: text
    content: 'La guerre que Josué fit à tous ces rois dura longtemps. '
  '19':
  - type: note
    content: Gabaon 9.3ss.
  - type: text
    content: 'Aucune ville ne fit la paix avec les Israélites – excepté les Hivvites qui habitaient Gabaon – ils les prirent toutes en leur faisant la guerre. '
  '2':
  - type: note
    content: 'plaine aride  : hébreu ‘arava  ; cf. 8.14n  ; Dt 1.1n. –  Kinroth ou Kinnéreth 19.35 ; Dt 3.17 ; même nom en 1R 15.20 ; on rattache souvent ce nom au mot kinnor, lyre, à cause de la forme du lac de Galilée, appelé mer de Kinnéreth en hébreu (Nb 34.11 ; Dt 3.17 ; Jos 13.27). –  Dor  : probablement à 12 km au nord de Césarée (cf. 12.23 ; 17.11).'
  - type: text
    content: 'aux rois qui étaient au nord, dans la montagne, dans la plaine aride au sud de Kinroth, dans le Bas-Pays et dans la contrée de Dor à l''ouest '
  '20':
  - type: note
    content: 'leur entêtement  : litt. l''endurcissement de leur cœur  ; voir Ex 4.21n. –  sans leur faire grâce  : cf. Dt 7.2.'
  - type: text
    content: 'Car c''est du '
  - type: text
    content: Seigneur
  - type: text
    content: ' que venait leur entêtement à faire la guerre à Israël, afin que celui-ci puisse les frapper d''anathème, sans leur faire grâce, et les détruire, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'les Anaqites 14.12-15 ; 15.13-19 ; cf. Gn 6.4n  ; Dt 1.28+ ; 2.10-12,21 ; 9.2. –  montagne et région montagneuse traduisent un même terme hébreu. –  Hébron  : cf. 10.3n,36. –  Debir  : cf. 10.38ns. –  Anab 15.50 ; sans doute à environ 20 km au sud-ouest d''Hébron. –  anathème 10.28+ ; voir bénédiction, malédiction.'
  - type: text
    content: 'En ce temps-là, Josué vint retrancher les Anaqites de la montagne, d''Hébron, de Debir, d''Anab, de toute la région montagneuse de Juda et de toute la région montagneuse d''Israël ; Josué les frappa d''anathème, avec leurs villes. '
  '22':
  - type: note
    content: 'Gaza / Gath / Ashdod  : villes philistines ; en 13.3 seront mentionnées les cinq villes des Philistins, avec Ashqelôn et Eqrôn qui manquent ici.'
  - type: text
    content: 'Il ne resta plus d''Anaqites dans le pays des Israélites ; il n''en subsista qu''à Gaza, à Gath et à Ashdod. '
  '23':
  - type: note
    content: 'selon sa répartition  : litt. selon leurs parts ou leurs classes, leurs divisions  ; le même terme désigne les classes des prêtres, des lévites etc. en 1Ch 23.6n. –  Le pays fut dès lors…  : même texte hébreu en 14.15.'
  - type: text
    content: 'Josué prit donc tout le pays, exactement comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait dit à Moïse. Josué le donna comme patrimoine à Israël, selon sa répartition, tribu par tribu. Le pays fut dès lors tranquille, sans guerre.'
  '3':
  - type: note
    content: 'l''Hermon  : chaîne montagneuse (2 800 m) au sud de l''Anti-Liban, qui domine la plaine de Damas et la vallée du Jourdain. –  Mitspa (Poste de guet), nom de plusieurs lieux (cf. Gn 31.49n) ; autre forme du même nom au v. 8. Il s''agit ici de la région des sources du Jourdain, au sud de l''Anti-Liban.'
  - type: text
    content: '– les Cananéens à l''est et à l''ouest, les Amorites, les Hittites, les Perizzites, les Jébusites dans la montagne et les Hivvites au pied de l''Hermon, au pays du Mitspa. '
  '4':
  - type: note
    content: 'se mirent en campagne  : litt. sortirent. –  comme le sable…  : cf. Gn 22.17 ; Ap 20.8+.'
  - type: text
    content: 'Ils se mirent en campagne, eux et toutes leurs armées avec eux, des troupes nombreuses comme le sable qui est au bord de la mer ; les chevaux et les chars étaient très nombreux. '
  '5':
  - type: note
    content: 'eaux de Mérom  : sources ou cours d''eau près de Méiroun, à 6 km au nord de Safed.'
  - type: text
    content: 'Tous ces rois se liguèrent et vinrent dresser ensemble leur camp près des eaux de Mérom, pour faire la guerre à Israël. '
  '6':
  - type: note
    content: 'Tu couperas les jarrets  : le but n''est pas de s''approprier le matériel de guerre de l''ennemi mais de le rendre inutilisable ; même verbe en Gn 19.6 ; 2S 8.4/ / ; 1Ch 18.4 ; cf. 2S 15.1 ; 1R 1.5 ; 9.19ss.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : N''aie pas peur d''eux, car demain, à cette heure-ci, je les livre tous, blessés à mort, devant Israël. Tu couperas les jarrets de leurs chevaux et tu mettras le feu à leurs chars.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'tous ses hommes de guerre  : cf. 8.1 ; 10.7. –  à l''improviste  : cf. 8.12,19-23 ; 10.9.'
  - type: text
    content: 'Josué, avec tous ses hommes de guerre, arriva sur eux à l''improviste près des eaux de Mérom : ils tombèrent sur eux. '
  '8':
  - type: note
    content: 'Sidon la Grande  : ville principale de la Phénicie avec Tyr (Gn 10.15). –  Misrephoth-Maïm  : ce lieu dont le nom (Incendies des eaux  ?) évoque peut-être des marais salants est probablement à situer sur la côte méditerranéenne, à 18 km au nord d''Akko, à la frontière libanaise. –  vallée de Mitspé  : à l''est de Mérom ; voir v. 3+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les livra à Israël ; ils les battirent et les poursuivirent jusqu''à Sidon la Grande, jusqu''à Misrephoth-Maïm et jusqu''à la vallée de Mitspé, vers l''est ; ils les battirent, sans leur laisser aucun survivant. '
  '9':
  - type: note
    content: 'Josué les traita…  : cf. v. 3. –  mit le feu à  : litt. brûla par le feu  ; de même au v. 11.'
  - type: text
    content: 'Josué les traita comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le lui avait dit : il coupa les jarrets de leurs chevaux et mit le feu à leurs chars.'
  - type: heading
    content: Prise de Hatsor
