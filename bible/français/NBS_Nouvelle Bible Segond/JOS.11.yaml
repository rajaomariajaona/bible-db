      marker: fq
      children:
      - type: text
        text: Madôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : on l''identifie à Khirbet-Madin, à 9 km à l''ouest du lac de Tibériade. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shimrôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : à la frontière de la Galilée, à l''ouest de Nazareth. En 12.20, elle est appelée '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shimrôn-Mérôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 19.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Akshaph '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 12.20 ; 19.25, mentionnée dans des textes égyptiens ; peut-être à 8 km au sud d'Akko (Saint-Jean d'Acre).
    marker-yv: yv-n
  - type: text
    text: 'A cette nouvelle, Yabîn, roi de Hatsor, envoya des messagers à Yobab, roi de Madôn, au roi de Shimrôn, au roi d''Akshaph, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
