      children:
      - type: text
        text: 'Kinnéreth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.35 ; Dt 3.17 ; même nom en 1R 15.20 ; on rattache souvent ce nom au mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: kinnor, lyre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', à cause de la forme du lac de Galilée, appelé mer de Kinnéreth en hébreu (Nb 34.11 ; Dt 3.17 ; Jos 13.27). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : probablement à 12 km au nord de Césarée (cf. 12.23 ; 17.11).'
    marker-yv: yv-n
  - type: text
    text: 'aux rois qui étaient au nord, dans la montagne, dans la plaine aride au sud de Kinroth, dans le Bas-Pays et dans la contrée de Dor à l''ouest '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'Hermon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : chaîne montagneuse (2 800 m) au sud de l''Anti-Liban, qui domine la plaine de Damas et la vallée du Jourdain. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mitspa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Poste de guet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), nom de plusieurs lieux (cf. Gn 31.49
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; autre forme du même nom au v. 8. Il s'agit ici de la région des sources du Jourdain, au sud de l'Anti-Liban.
    marker-yv: yv-n
  - type: text
    text: '– les Cananéens à l''est et à l''ouest, les Amorites, les Hittites, les Perizzites, les Jébusites dans la montagne et les Hivvites au pied de l''Hermon, au pays du Mitspa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se mirent en campagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sortirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme le sable…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 22.17 ; Ap 20.8+.'
    marker-yv: yv-n
  - type: text
    text: 'Ils se mirent en campagne, eux et toutes leurs armées avec eux, des troupes nombreuses comme le sable qui est au bord de la mer ; les chevaux et les chars étaient très nombreux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: eaux de Mérom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sources ou cours d''eau près de Méiroun, à 6 km au nord de Safed.'
    marker-yv: yv-n
  - type: text
    text: 'Tous ces rois se liguèrent et vinrent dresser ensemble leur camp près des eaux de Mérom, pour faire la guerre à Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu couperas les jarrets
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le but n''est pas de s''approprier le matériel de guerre de l''ennemi mais de le rendre inutilisable ; même verbe en Gn 19.6 ; 2S 8.4/ / ; 1Ch 18.4 ; cf. 2S 15.1 ; 1R 1.5 ; 9.19ss.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Josué : N''aie pas peur d''eux, car demain, à cette heure-ci, je les livre tous, blessés à mort, devant Israël. Tu couperas les jarrets de leurs chevaux et tu mettras le feu à leurs chars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
