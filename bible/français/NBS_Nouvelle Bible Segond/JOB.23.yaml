document_id: JOB.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job : Dieu refuse la confrontation'
  - type: text
    content: 'Job répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps 139.1-6. –  éprouvé 7.18n. –  pur (terme sous-entendu dans le texte) comme l'or Za 13.9 ; Pr 17.3 ; 1P 1.7.
  - type: text
    content: Il connaît pourtant la voie où je me tiens ;
  - type: text
    content: quand il m'aura éprouvé,
  - type: text
    content: je sortirai pur comme l'or.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 17.5.
  - type: text
    content: Mes pieds se sont attachés à ses pas ;
  - type: text
    content: j'ai gardé sa voie et je n'en ai pas dévié.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Je n''ai pas altéré…  : autre traduction je ne me suis pas éloigné des commandements… –  j''ai fait plier ma volonté aux paroles de sa bouche  : phrase obscure ; litt. de (ou plus que ) ma prescription (le même mot est traduit par décret au v. 14) j''ai caché (ou préservé ) les paroles de sa bouche  ; LXX en mon sein j''ai caché ses paroles , ce qui correspondrait à une légère modification du texte hébreu traditionnel ; cf. 22.22.'
  - type: text
    content: Je n'ai pas altéré les commandements de ses lèvres ;
  - type: text
    content: j'ai fait plier ma volonté aux paroles de sa bouche.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 115.3 ; Es 46.10 ; Dn 4.32. –  Mais si lui prend une décision  : l''hébreu est obscur, litt. lui en un  ; autre traduction s''il s''ocupe de quelqu''un . Une modification du texte hébreu traditionnel permettrait de lire il a choisi . –  Ce qu''il désire  : litt. ce que son être (cf. Gn 1.20n) désire.'
  - type: text
    content: Mais si lui prend une décision,
  - type: text
    content: qui pourra l'en faire revenir ?
  - type: text
    content: Ce qu'il désire, il le fait.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est absent de LXX. –  le décret qui me concerne  : litt. mon décret , même formule qu''au v. 12n. –  et il en concevra bien d''autres encore  : litt. et comme ces (choses)-là, de nombreuses (sont) avec lui (ou chez lui ).'
  - type: text
    content: Il accomplira donc le décret qui me concerne,
  - type: text
    content: et il en concevra bien d'autres encore.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 119.120. –  frayeur  : voir crainte.'
  - type: text
    content: Voilà pourquoi je suis saisi d'épouvante en face de lui ;
  - type: text
    content: quand j'y réfléchis, il m'inspire de la frayeur.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'rendu mon cœur faible  : litt. amolli mon cœur . Cf. 6.4+ ; 16.12. –  le Puissant 5.17n.'
  - type: text
    content: Dieu a rendu mon cœur faible,
  - type: text
    content: le Puissant m'a rempli d'épouvante.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Verset difficile : litt. car je n''ai pas été réduit au silence (ou je n''ai pas été anéanti ) par la face des ténèbres, et par ma face (que) recouvre l''obscurité . Plusieurs interprétations en ont été données ; certains modifient le texte hébreu traditionnel pour remplacer la négation par une formule de souhait  : si seulement les ténèbres me réduisaient au silence, si l''obscurité recouvrait ma face ! Cf. 22.11.'
  - type: text
    content: Mais ce ne sont pas les ténèbres qui me réduiront au silence,
  - type: text
    content: ni l'obscurité dont je suis couvert.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'étouffe  : litt. pèse sur.'
  - type: text
    content: Aujourd'hui encore ma plainte est une révolte,
  - type: text
    content: ma main étouffe mon gémissement.
  '3':
  - type: text
    content: ' '
  - type: note
    content: V. 8s ; 9.11+.
  - type: text
    content: Ah ! si je savais où le trouver,
  - type: text
    content: si je pouvais accéder au lieu où il est installé,
  '4':
  - type: text
    content: ' '
  - type: note
    content: V. 7 ; 7.11+.
  - type: text
    content: j'exposerais mon droit devant lui,
  - type: text
    content: je remplirais ma bouche d'arguments,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 38–41.
  - type: text
    content: je connaîtrais les propos par lesquels il me répondrait,
  - type: text
    content: et je comprendrais ce qu'il me dirait !
  '6':
  - type: text
    content: Emploierait-il toute sa force à m'accuser ?
  - type: text
    content: Au contraire, il ferait attention à moi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Il y aurait là…  : autre traduction si… –  argumenterait v. 4 ; même forme verbale en Es 1.18n.'
  - type: text
    content: Il y aurait là un homme droit qui argumenterait avec lui,
  - type: text
    content: et j'échapperais pour toujours à mon juge.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'à l''est / à l''ouest  : litt. devant / derrière  ; cf. 18.20n.'
  - type: text
    content: Mais si je vais à l'est, il n'y est pas ;
  - type: text
    content: à l'ouest, je ne le discerne pas ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 3 ; 9.11+. –  au nord / au sud  : litt. à gauche / à droite , cf. 18.20n.'
  - type: text
    content: s'affaire-t-il au nord, je ne le vois pas ;
  - type: text
    content: se cache-t-il au sud, je ne l'aperçois pas.
