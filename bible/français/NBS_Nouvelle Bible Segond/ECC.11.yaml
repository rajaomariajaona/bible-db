    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.11 : « Mon fils, dans la mesure où tu le peux, traite-toi bien et présente au Seigneur les offrandes qui lui sont dues. » Un texte égyptien ('
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Enseignements de Ptah-Hotep
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
