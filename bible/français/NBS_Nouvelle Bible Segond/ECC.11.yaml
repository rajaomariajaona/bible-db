      - type: text
        text: '7.22 (discours d''une mère à ses fils) : « Je ne sais comment vous êtes apparus dans mes entrailles ; ce n''est pas moi qui vous ai gratifiés de l''esprit et de la vie, et ce n''est pas moi qui ai organisé les éléments dont chacun de vous est composé. »'
    marker-yv: yv-n
  - type: text
    text: De même que tu ne sais pas comment le souffle ou les os se forment dans le ventre de la femme enceinte, de même tu ne connais pas l'œuvre de Dieu qui fait tout.
