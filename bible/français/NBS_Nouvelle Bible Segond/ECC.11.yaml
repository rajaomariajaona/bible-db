      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') comporte l''exhortation suivante : « Suis la voie de ton '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' tant que tu es en vie, et ne fais pas attention à tout ce qu''on peut dire. Ne réduis pas les instants où tu suis la voie de ton cœur, car c''est une abomination pour l''âme que de voir se réduire le temps de sa vie. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de tes jeunes années
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de ton enfance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ton adolescence, de ta jeunesse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le texte emploie plusieurs synonymes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les regards '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
