document_id: ECC.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Savoir prendre des risques
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. a été interprété comme un appel à prendre des risques nécessaires, soit par générosité, soit dans des entreprises commerciales (plus précisément, selon certains, dans le commerce maritime). De même le v. 2 peut être interprété, soit du point de vue du partage, soit du point de vue de la prudence (cf. « ne pas mettre tous ses œufs dans le même panier »). –  avec le temps  : litt. dans (ou par ) la multitude des jours  ; cf. v. 6.'
  - type: text
    content: Jette ton pain sur l'eau,
  - type: text
    content: car avec le temps tu le retrouveras ;
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'la contrariété 1.18n. –  le malheur  : autre traduction le mal. –  fraîcheur ou aurore de la vie  ; le terme hébreu est rare et son sens est incertain. Il pourrait évoquer, selon une autre étymologie, l''âge des cheveux noirs ; cf. 12.5n.'
  - type: text
    content: Ecarte donc de ton cœur la contrariété,
  - type: text
    content: éloigne le malheur de ta chair ;
  - type: text
    content: car jeunesse et fraîcheur ne sont que futilité.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'à sept… à huit  : c.-à-d. largement ; cf. Mi 5.4.'
  - type: text
    content: donne une part à sept, et même à huit,
  - type: text
    content: car tu ne sais pas quel malheur peut arriver sur la terre.
  '3':
  - type: text
    content: Quand les nuages sont remplis de pluie,
  - type: text
    content: ils la déversent sur la terre ;
  - type: text
    content: si un arbre tombe, vers le sud ou vers le nord,
  - type: text
    content: c'est au lieu où l'arbre est tombé qu'il restera.
  '4':
  - type: text
    content: Qui observe le vent ne sème pas ;
  - type: text
    content: qui regarde les nuages ne moissonne pas.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'tu ne sais pas 3.11+. –  comment…  : litt. le chemin du souffle (le même mot hébreu peut être traduit par esprit, vent  ; cf. Pr 30.4,19 ; Jn 3.8) comme les (ou des ) os…  ; certains mss portent dans les os  ; cf. Ps 139.15ns ; 2 Maccabées 7.22 (discours d''une mère à ses fils) : « Je ne sais comment vous êtes apparus dans mes entrailles ; ce n''est pas moi qui vous ai gratifiés de l''esprit et de la vie, et ce n''est pas moi qui ai organisé les éléments dont chacun de vous est composé. »'
  - type: text
    content: De même que tu ne sais pas comment le souffle ou les os se forment dans le ventre de la femme enceinte, de même tu ne connais pas l'œuvre de Dieu qui fait tout.
  '6':
  - type: text
    content: ' '
  - type: note
    content: V. 1.
  - type: text
    content: Dès le matin sème ta semence,
  - type: text
    content: le soir ne repose pas ta main ;
  - type: text
    content: car tu ne sais pas ce qui réussira, ceci ou cela,
  - type: text
    content: ou si l'un comme l'autre sont également bons.
  - type: heading
    content: Profite de la vie avec discernement
  '7':
  - type: text
    content: ' '
  - type: note
    content: 7.11 ; 12.2 ; cf. Ct 6.10.
  - type: text
    content: La lumière est douce ;
  - type: text
    content: il est bon pour les yeux de voir le soleil.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'vit beaucoup d''années  : cf. 6.3. –  qu''il se réjouisse 2.24+. –  ténèbres 12.1ss. –  tout ce qui arrive  : litt. tout ce qui est  ; cf. 1.2+.'
  - type: text
    content: Si donc quelqu'un vit beaucoup d'années,
  - type: text
    content: qu'il se réjouisse de chacune d'elles,
  - type: text
    content: 'et qu''il se rappelle que les jours de ténèbres seront nombreux :'
  - type: text
    content: tout ce qui arrive n'est que futilité.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Plusieurs éditions rattachent les v. 9s au chap. 12, dont la numérotation est décalée en conséquence. –  réjouis-toi…  : cf. Siracide 14.11 : « Mon fils, dans la mesure où tu le peux, traite-toi bien et présente au Seigneur les offrandes qui lui sont dues. » Un texte égyptien ( Enseignements de Ptah-Hotep  ; cf. 12.2n) comporte l''exhortation suivante : « Suis la voie de ton cœur tant que tu es en vie, et ne fais pas attention à tout ce qu''on peut dire. Ne réduis pas les instants où tu suis la voie de ton cœur, car c''est une abomination pour l''âme que de voir se réduire le temps de sa vie. » –  de tes jeunes années  : litt. de ton enfance ou de ton adolescence, de ta jeunesse  ; le texte emploie plusieurs synonymes. –  les regards (litt. les visions ) de tes yeux 2.10 ; 6.9n. –  jugement 3.17+ ; cf. Jb 14.3.'
  - type: text
    content: Jeune homme, réjouis-toi de tes jeunes années,
  - type: text
    content: que ton cœur te rende heureux pendant les jours de ta jeunesse ;
  - type: text
    content: suis les voies de ton cœur et les regards de tes yeux ;
  - type: text
    content: sache que pour tout cela Dieu te fera venir en jugement.
