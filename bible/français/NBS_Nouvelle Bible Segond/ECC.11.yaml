    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce v. a été interprété comme un appel à prendre des risques nécessaires, soit par générosité, soit dans des entreprises commerciales (plus précisément, selon certains, dans le commerce maritime). De même le v. 2 peut être interprété, soit du point de vue du partage, soit du point de vue de la prudence (cf. « ne pas mettre tous ses œufs dans le même panier »). –  '
    - type: usfm
