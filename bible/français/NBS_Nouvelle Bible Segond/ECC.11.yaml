    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 1.
    marker-yv: yv-n
  - type: text
    text: Dès le matin sème ta semence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le soir ne repose pas ta main ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu ne sais pas ce qui réussira, ceci ou cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou si l'un comme l'autre sont également bons.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Profite de la vie avec discernement
  marker-yv: yv-h
- type: usfm
