    marker-yv: yv-n
  - type: text
    text: Jeune homme, réjouis-toi de tes jeunes années,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ton cœur te rende heureux pendant les jours de ta jeunesse ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: suis les voies de ton cœur et les regards de tes yeux ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sache que pour tout cela Dieu te fera venir en jugement.
- type: usfm
  marker: q1
  children:
  - type: usfm
