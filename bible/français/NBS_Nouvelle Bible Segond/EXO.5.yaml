document_id: EXO.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Moïse et Aaron chez le pharaon
  - type: text
    content: ' '
  - type: note
    content: 'Laisse partir  : autre traduction renvoie , de même dans la suite. –  qu''il célèbre une fête ou un pèlerinage  ; le verbe correspondant est apparenté au terme hébreu hag , régulièrement traduit par fête (10.9 ; 12.14 etc.) ; son équivalent arabe ( hadj ) s''applique encore, dans l''islam, au pèlerinage à la Mecque ; cf. 23.14-17 ; Dt 16.15 ; 1S 1.3 ; 30.16 ; Ps 42.5 ; 107.27n  ; Lc 2.41 ; Ac 2.5 ; voir calendrier et fêtes.'
  - type: text
    content: 'Moïse et Aaron se rendirent ensuite auprès du pharaon et lui dirent : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu d''Israël : Laisse partir mon peuple, afin qu''il célèbre une fête pour moi au désert. '
  '10':
  - type: text
    content: 'Les inspecteurs et les secrétaires du peuple allèrent dire au peuple : Ainsi parle le pharaon : Je ne vous donne plus de paille ; '
  '11':
  - type: text
    content: 'allez vous-mêmes prendre de la paille là où vous pourrez en trouver ; mais on ne diminuera en rien votre tâche. '
  '12':
  - type: note
    content: 'et le hacher  : litt. pour paille, c.-à-d. en guise de paille ou pour en faire de la paille (hachée), cf. v. 7n. Les Egyptiens laissaient le chaume sur pied lorsqu''ils moissonnaient.'
  - type: text
    content: 'Le peuple se dispersa dans toute l''Egypte, pour ramasser du chaume et le hacher. '
  '13':
  - type: note
    content: 'de chaque jour  : la même expression est traduite par à livrer chaque jour au v. 19 ; cf. 16.4n  ; Lv 23.37n.'
  - type: text
    content: 'Les inspecteurs les pressaient, en disant : Achevez votre travail de chaque jour, comme quand il y avait de la paille ! '
  '14':
  - type: note
    content: 'On frappait  : autre traduction on faisait des reproches.'
  - type: text
    content: 'On frappait même les secrétaires des Israélites, ceux qui avaient été préposés sur eux par les inspecteurs du pharaon : Pourquoi, leur disait-on, n''avez-vous pas achevé hier et aujourd''hui votre compte de briques, comme d''habitude ?'
  '15':
  - type: text
    content: 'Les secrétaires des Israélites allèrent se plaindre au pharaon ; ils lui dirent : Pourquoi nous traites-tu ainsi, nous, tes serviteurs ? '
  '16':
  - type: note
    content: 'c''est ton peuple qui pèche  : le texte hébreu est ambigu. Autres traductions c''est un péché contre ton peuple ou c''est un péché pour ton peuple. LXX tu agiras injustement contre ton peuple. Le peuple peut être soit les Egyptiens, soit les Israélites (v. 4).'
  - type: text
    content: 'On ne nous donne pas de paille, et on nous dit : Faites des briques ! Alors on nous frappe, et c''est ton peuple qui pèche ! '
  '17':
  - type: text
    content: 'Le pharaon répondit : Vous êtes des paresseux, des paresseux ! Voilà pourquoi vous dites : « Allons offrir des sacrifices au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ! » '
  '18':
  - type: text
    content: Maintenant, allez à votre tâche ; on ne vous donnera pas de paille, et vous livrerez la même quantité de briques.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'virent qu''on les mettait en mauvaise posture  : autre traduction les regardèrent avec malveillance . –  à livrer chaque jour v. 13n.'
  - type: text
    content: 'Les secrétaires des Israélites virent qu''on les mettait en mauvaise posture en disant : Vous ne diminuerez pas le nombre de briques à livrer chaque jour ! '
  '2':
  - type: note
    content: Qui est le Seigneur (YHWH) 3.15n  ; cf. Jb 21.15 ; voir aussi noms divins.
  - type: text
    content: 'Le pharaon répondit : Qui est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), pour que je l''écoute, en laissant partir Israël ? Je ne connais pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), et je ne laisserai pas partir Israël ! '
  '20':
  - type: text
    content: 'En sortant de chez le pharaon, ils rencontrèrent Moïse et Aaron qui les attendaient. '
  '21':
  - type: note
    content: 'Vous nous avez rendus odieux au pharaon  : litt. vous avez rendu notre odeur puante aux yeux de Pharaon  ; cf. 7.18,21 ; 8.10 ; 16.20,24 ; Gn 34.30n.'
  - type: text
    content: 'Ils leur dirent : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous regarde et qu''il juge ! Vous nous avez rendus odieux au pharaon et aux gens de sa cour, vous avez mis une épée dans leur main pour nous tuer. '
  '22':
  - type: note
    content: 'Seigneur / Seigneur  : hébreu YHWH / ’Adonaï, cf. 3.15n  ; 4.10.'
  - type: text
    content: 'Moïse revint vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dit : Seigneur, pourquoi as-tu fait du mal à ce peuple ? Pourquoi m''as-tu envoyé ? '
  '23':
  - type: note
    content: Voir nom.
  - type: text
    content: Depuis que je suis allé trouver le pharaon pour parler en ton nom, il fait du mal à ce peuple, et tu n'as pas délivré ton peuple !
  '3':
  - type: note
    content: 'trois journées 3.18+. – Voir sacrifices. –  frappe  : le verbe ainsi traduit signifie aussi atteindre, rencontrer  ; cf. v. 20.'
  - type: text
    content: 'Ils dirent : Le Dieu des Hébreux est venu au-devant de nous. Laisse-nous, je te prie, faire trois journées de marche dans le désert pour offrir des sacrifices au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu, afin qu''il ne nous frappe pas de la peste ou de l''épée. '
  '4':
  - type: note
    content: décharger ou dégager  ; d'autres comprennent faire en sorte que le peuple se relâche…  ; le verbe hébreu correspondant fait assonance avec le nom transcrit pharaon. –  corvées 1.11.
  - type: text
    content: 'Le roi d''Egypte leur dit : Moïse et Aaron, pourquoi voulez-vous décharger le peuple de son travail ? Allez donc à vos corvées !'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'maintenant…  : Smr maintenant qu''ils sont plus nombreux que le peuple du pays . –  cesser  : le verbe hébreu correspondant est apparenté au mot habituellement transcrit sabbat.'
  - type: text
    content: 'Le pharaon dit : C''est maintenant, quand ce peuple du pays est devenu nombreux, que vous allez lui faire cesser ses corvées ?'
  - type: heading
    content: Le pharaon augmente le travail des Israélites
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'inspecteurs 3.7n. –  secrétaires  : LXX scribes . Il s''agit de responsables israélites, cf. v. 14 ; Dt 1.15n.'
  - type: text
    content: 'Ce même jour, le pharaon donna cet ordre aux inspecteurs et aux secrétaires du peuple : '
  '7':
  - type: note
    content: 'comme d''habitude  : litt. comme hier, avant-hier  ; autre traduction comme auparavant  ; cf. 4.10 ; de même aux v. 8,14 ; 21.29,36 ; Gn 31.2n. – Voir aussi v. 12n. On mélangeait de la paille hachée à l''argile pour rendre plus résistantes les briques (qui n''étaient pas cuites, mais durcies au soleil dans des moules de bois). Ce procédé, attesté par des représentations égyptiennes (voir illustration ♦), est commun à de nombreuses régions du monde (cf. Gn 11), et il est toujours employé aujourd''hui dans certains pays.'
  - type: text
    content: 'Vous ne donnerez plus, comme d''habitude, de la paille au peuple pour faire des briques ; qu''ils aillent eux-mêmes s''en ramasser ! '
  '8':
  - type: text
    content: 'Vous leur imposerez néanmoins la quantité de briques qu''ils faisaient d''habitude, vous ne la diminuerez en rien ; car ce sont des paresseux ; voilà pourquoi ils crient : « Allons offrir des sacrifices à notre Dieu ! » '
  '9':
  - type: text
    content: Accablez ces gens de travail, qu'ils aient par là de quoi s'occuper et qu'ils ne prêtent plus attention à des paroles mensongères !
