document_id: EXO.5,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moïse et Aaron chez le pharaon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Laisse partir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: renvoie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''il célèbre une fête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un pèlerinage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le verbe correspondant est apparenté au terme hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hag
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', régulièrement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (10.9 ; 12.14 etc.) ; son équivalent arabe (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hadj
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) s'applique encore, dans l'islam, au pèlerinage à la Mecque ; cf. 23.14-17 ; Dt 16.15 ; 1S 1.3 ; 30.16 ; Ps 42.5 ; 107.27
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lc 2.41 ; Ac 2.5 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes.'
      marker-yv: yv-n
    - type: text
      text: 'Moïse et Aaron se rendirent ensuite auprès du pharaon et lui dirent : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), le Dieu d''Israël : Laisse partir mon peuple, afin qu''il célèbre une fête pour moi au désert. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les inspecteurs et les secrétaires du peuple allèrent dire au peuple : Ainsi parle le pharaon : Je ne vous donne plus de paille ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'allez vous-mêmes prendre de la paille là où vous pourrez en trouver ; mais on ne diminuera en rien votre tâche. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et le hacher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour paille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en guise de paille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour en faire de la paille (hachée)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Les Egyptiens laissaient le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chaume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sur pied lorsqu'ils moissonnaient.
      marker-yv: yv-n
    - type: text
      text: 'Le peuple se dispersa dans toute l''Egypte, pour ramasser du chaume et le hacher. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de chaque jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la même expression est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à livrer chaque jour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 19 ; cf. 16.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 23.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les inspecteurs les pressaient, en disant : Achevez votre travail de chaque jour, comme quand il y avait de la paille ! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On frappait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on faisait des reproches.
      marker-yv: yv-n
    - type: text
      text: 'On frappait même les secrétaires des Israélites, ceux qui avaient été préposés sur eux par les inspecteurs du pharaon : Pourquoi, leur disait-on, n''avez-vous pas achevé hier et aujourd''hui votre compte de briques, comme d''habitude ?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les secrétaires des Israélites allèrent se plaindre au pharaon ; ils lui dirent : Pourquoi nous traites-tu ainsi, nous, tes serviteurs ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'c''est ton peuple qui '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pèche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte hébreu est ambigu. Autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c''est un péché contre ton peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est un péché pour ton peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu agiras injustement contre ton peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: peut être soit les Egyptiens, soit les Israélites (v. 4).
      marker-yv: yv-n
    - type: text
      text: 'On ne nous donne pas de paille, et on nous dit : Faites des briques ! Alors on nous frappe, et c''est ton peuple qui pèche ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pharaon répondit : Vous êtes des paresseux, des paresseux ! Voilà pourquoi vous dites : « Allons offrir des sacrifices au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) ! » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant, allez à votre tâche ; on ne vous donnera pas de paille, et vous livrerez la même quantité de briques.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: virent qu'on les mettait en mauvaise posture
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les regardèrent avec malveillance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à livrer chaque jour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les secrétaires des Israélites virent qu''on les mettait en mauvaise posture en disant : Vous ne diminuerez pas le nombre de briques à livrer chaque jour ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui est le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Jb 21.15 ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon répondit : Qui est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), pour que je l''écoute, en laissant partir Israël ? Je ne connais pas le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), et je ne laisserai pas partir Israël ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En sortant de chez le pharaon, ils rencontrèrent Moïse et Aaron qui les attendaient. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous nous avez rendus odieux au pharaon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous avez rendu notre odeur puante aux yeux de Pharaon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 7.18,21 ; 8.10 ; 16.20,24 ; Gn 34.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils leur dirent : Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' vous regarde et qu''il juge ! Vous nous avez rendus odieux au pharaon et aux gens de sa cour, vous avez mis une épée dans leur main pour nous tuer. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.22 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: YHWH / ’Adonaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 3.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 4.10.'
      marker-yv: yv-n
    - type: text
      text: 'Moïse revint vers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et dit : Seigneur, pourquoi as-tu fait du mal à ce peuple ? Pourquoi m''as-tu envoyé ? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Depuis que je suis allé trouver le pharaon pour parler en ton nom, il fait du mal à ce peuple, et tu n'as pas délivré ton peuple !
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trois journées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.18+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: frappe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe ainsi traduit signifie aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: atteindre, rencontrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 20.'
      marker-yv: yv-n
    - type: text
      text: 'Ils dirent : Le Dieu des Hébreux est venu au-devant de nous. Laisse-nous, je te prie, faire trois journées de marche dans le désert pour offrir des sacrifices au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), notre Dieu, afin qu''il ne nous frappe pas de la peste ou de l''épée. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'décharger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dégager
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''autres comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faire en sorte que le peuple se relâche…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe hébreu correspondant fait assonance avec le nom transcrit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pharaon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'corvées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.11.
      marker-yv: yv-n
    - type: text
      text: 'Le roi d''Egypte leur dit : Moïse et Aaron, pourquoi voulez-vous décharger le peuple de son travail ? Allez donc à vos corvées !'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maintenant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Smr '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maintenant qu'ils sont plus nombreux que le peuple du pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cesser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe hébreu correspondant est apparenté au mot habituellement transcrit '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbat
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon dit : C''est maintenant, quand ce peuple du pays est devenu nombreux, que vous allez lui faire cesser ses corvées ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le pharaon augmente le travail des Israélites
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'inspecteurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: secrétaires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: scribes
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Il s'agit de responsables israélites, cf. v. 14 ; Dt 1.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce même jour, le pharaon donna cet ordre aux inspecteurs et aux secrétaires du peuple : '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
