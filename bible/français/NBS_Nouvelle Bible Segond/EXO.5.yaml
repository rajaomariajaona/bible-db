        - type: text
          text: (qui n'étaient pas cuites, mais durcies au soleil dans des moules de bois). Ce procédé, attesté par des représentations égyptiennes (voir illustration ♦), est commun à de nombreuses régions du monde (cf. Gn 11), et il est toujours employé aujourd'hui dans certains pays.
      marker-yv: yv-n
    - type: text
      text: 'Vous ne donnerez plus, comme d''habitude, de la paille au peuple pour faire des briques ; qu''ils aillent eux-mêmes s''en ramasser ! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous leur imposerez néanmoins la quantité de briques qu''ils faisaient d''habitude, vous ne la diminuerez en rien ; car ce sont des paresseux ; voilà pourquoi ils crient : « Allons offrir des sacrifices à notre Dieu ! » '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Accablez ces gens de travail, qu'ils aient par là de quoi s'occuper et qu'ils ne prêtent plus attention à des paroles mensongères !
