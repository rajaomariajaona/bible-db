        text: Cf. Ex 23.33 ; Lv 26.14ss ; Dt 28.15ss ; Jos 23.12s ; Jg 2.3 ; Ez 28.24 ; voir aussi 2Co 12.7.
    marker-yv: yv-n
  - type: text
    text: 'Mais si vous ne dépossédez pas devant vous les habitants du pays, ceux d''entre eux que vous laisserez seront comme des échardes dans vos yeux et des aiguillons dans vos flancs, ils seront vos adversaires dans le pays que vous allez habiter. '
  - type: usfm
