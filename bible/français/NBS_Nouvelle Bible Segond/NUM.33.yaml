    marker-yv: yv-n
  - type: text
    text: 'Moïse écrivit leurs déplacements d''étape en étape, sur l''ordre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Voici leurs étapes, selon leurs déplacements.
