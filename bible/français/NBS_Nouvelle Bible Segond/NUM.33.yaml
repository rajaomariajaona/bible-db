document_id: NUM.33,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les étapes depuis la sortie d'Egypte
  - type: text
    content: ' '
  - type: note
    content: 'Ce chap. mentionne quarante étapes (10.12n  ; cf. 14.33). –  armée par armée  : cf. 2.3n  ; Ex 6.26. –  sous la conduite  : litt. dans (ou par ) la main.'
  - type: text
    content: 'Voici les étapes des Israélites qui étaient sortis d''Egypte, armée par armée, sous la conduite de Moïse et d''Aaron. '
  '10':
  - type: note
    content: 'près de la mer des Joncs  : sans doute ici la mer Rouge (14.25 ; 21.4+ ; Ex 13.18n).'
  - type: text
    content: 'Ils partirent d''Elim et campèrent près de la mer des Joncs. '
  '11':
  - type: note
    content: désert de Sîn Ex 16.1.
  - type: text
    content: 'Ils partirent de la mer des Joncs et campèrent dans le désert de Sîn. '
  '12':
  - type: note
    content: Sîn Ex 16.1n. – Plusieurs noms des v. 12-14 ne se retrouvent nulle part ailleurs ; de même aux v. 18-30,34s,41s. Dophqa est parfois identifié à un site à l'est de la péninsule du Sinaï, où l'on a retrouvé des inscriptions sémitiques très anciennes.
  - type: text
    content: 'Ils partirent du désert de Sîn et campèrent à Dophqa. '
  '13':
  - type: text
    content: 'Ils partirent de Dophqa et campèrent à Aloush. '
  '14':
  - type: note
    content: Rephidim Ex 17.1n,8.
  - type: text
    content: 'Ils partirent d''Aloush et campèrent à Rephidim, où le peuple ne trouva pas d''eau à boire. '
  '15':
  - type: note
    content: campèrent dans le désert Ex 19.2. –  Sinaï Ex 16.1n.
  - type: text
    content: Ils partirent de Rephidim et campèrent dans le désert du Sinaï.
  '16':
  - type: text
    content: ' '
  - type: note
    content: du désert du Sinaï 10.12. –  Qibroth-Taava 11.34n.
  - type: text
    content: 'Ils partirent du désert du Sinaï et campèrent à Qibroth-Taava. '
  '17':
  - type: note
    content: Hatséroth 11.35n  ; 12.16 ; Dt 1.1.
  - type: text
    content: 'Ils partirent de Qibroth-Taava et campèrent à Hatséroth. '
  '18':
  - type: text
    content: 'Ils partirent de Hatséroth et campèrent à Ritma. '
  '19':
  - type: text
    content: 'Ils partirent de Ritma et campèrent à Rimmôn-Pérets. '
  '2':
  - type: note
    content: 'leurs déplacements  : litt. leurs sorties ou leurs départs. –  l''ordre  : litt. la bouche.'
  - type: text
    content: 'Moïse écrivit leurs déplacements d''étape en étape, sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: . Voici leurs étapes, selon leurs déplacements.
  '20':
  - type: note
    content: Libna (Smr Lebona), site inconnu (v. 12n) à ne pas confondre avec la ville de Canaan située à l'ouest de Jérusalem (cf. Jos 15.42).
  - type: text
    content: 'Ils partirent de Rimmôn-Pérets et campèrent à Libna. '
  '21':
  - type: text
    content: 'Ils partirent de Libna et campèrent à Rissa. '
  '22':
  - type: text
    content: 'Ils partirent de Rissa et campèrent à Qehélata. '
  '23':
  - type: text
    content: 'Ils partirent de Qehélata et campèrent au mont Shépher. '
  '24':
  - type: text
    content: 'Ils partirent du mont Shépher et campèrent à Harada. '
  '25':
  - type: text
    content: 'Ils partirent de Harada et campèrent à Maqhéloth. '
  '26':
  - type: text
    content: 'Ils partirent de Maqhéloth et campèrent à Tahath. '
  '27':
  - type: text
    content: 'Ils partirent de Tahath et campèrent à Tarah. '
  '28':
  - type: text
    content: 'Ils partirent de Tarah et campèrent à Mitqa. '
  '29':
  - type: note
    content: 'Hashmona  : LXX Selmona, cf. v. 41s ; voir aussi 34.4.'
  - type: text
    content: 'Ils partirent de Mitqa et campèrent à Hashmona. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ramsès Gn 47.11 ; Ex 1.11 ; 12.37. –  le premier mois… 28.17 ; cf. Ex 12.17,41,51 ; voir calendrier et fêtes. –  librement  : litt. à main levée , cf. 15.30n  ; Ex 14.8. –  tous les Egyptiens  : autre traduction toute l''Egypte (même possibilité au v. 4).'
  - type: text
    content: 'Ils partirent de Ramsès le premier mois, le quinzième jour du premier mois. Le lendemain de la Pâque, les Israélites sortirent librement sous les yeux de tous les Egyptiens, '
  '30':
  - type: note
    content: Pour la vraisemblance de l'itinéraire, plusieurs croient devoir intercaler le texte compris entre la deuxième partie du v. 36 et la première partie du v. 41 entre les deux sites mentionnés ici (cf. Dt 2.1-8) ; de Hashmona on passerait à Qadesh etc., puis de Hor-la-Montagne à Moséroth  ; cf. Dt 10.6.
  - type: text
    content: Ils partirent de Hashmona et campèrent à Moséroth.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Bené-Yaaqân signifie fils (au pluriel) de Yaaqân , cf. Dt 10.6n  ; sur Yaaqân , cf. Gn 36.27 et 1Ch 1.42 qui pourraient suggérer une localisation en Edom.
  - type: text
    content: 'Ils partirent de Moséroth et campèrent à Bené-Yaaqân. '
  '32':
  - type: text
    content: 'Ils partirent de Bené-Yaaqân et campèrent à Hor-Guidgad. '
  '33':
  - type: note
    content: 'Yotbata  : cf. Dt 10.7 ; ces localités et celles qui suivent sont probablement à situer près du golfe d''Aqaba, sur la mer Rouge (v. 36n).'
  - type: text
    content: 'Ils partirent de Hor-Guidgad et campèrent à Yotbata. '
  '34':
  - type: text
    content: 'Ils partirent de Yotbata et campèrent à Abrona. '
  '35':
  - type: text
    content: 'Ils partirent d''Abrona et campèrent à Etsiôn-Guéber. '
  '36':
  - type: note
    content: 'Etsiôn-Guéber (Dt 2.8n  ; 1R 9.26+), sur le golfe d''Aqaba, est à plus de 150 km au sud-sud-ouest de Qadesh. Après Tsîn, LXX ajoute  : Ils partirent du désert de Tsîn et campèrent au désert de Parân  ; cf. Nb 10.12 ; 13.21,26 ; 20.1 ; 27.14. Sur l''hypothèse d''un déplacement des v. 36-41, voir v. 30n.'
  - type: text
    content: 'Ils partirent d''Etsiôn-Guéber et campèrent dans le désert de Tsîn, c''est-à-dire à Qadesh. '
  '37':
  - type: note
    content: Hor-la-Montagne 20.22nss.
  - type: text
    content: Ils partirent de Qadesh et campèrent à Hor-la-Montagne, à l'extrémité d'Edom.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'le premier jour du cinquième mois  : en juillet ; cf. 20.24ss ; Dt 32.50 ; voir aussi 10.6.'
  - type: text
    content: 'Aaron, le prêtre, monta à Hor-la-Montagne, sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il y mourut, la quarantième année après que les Israélites furent sortis d''Egypte, le premier jour du cinquième mois. '
  '39':
  - type: note
    content: Cf. Ex 7.7 ; Dt 34.7.
  - type: text
    content: Aaron avait cent vingt-trois ans lorsqu'il mourut à Hor-la-Montagne.
  '4':
  - type: note
    content: 'premiers-nés Ex 11.5s ; 12.29. –  exécutait…  : autre traduction châtiait leurs dieux, même expression en Ex 12.12 ; Ez 5.10n.'
  - type: text
    content: 'tandis que les Egyptiens ensevelissaient ceux que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait abattus parmi eux, tous les premiers-nés ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' exécutait ses jugements contre leurs dieux.'
  '40':
  - type: text
    content: ' '
  - type: note
    content: Cf. 21.1+ss.
  - type: text
    content: Le roi cananéen d'Arad, qui habitait le Néguev, en Canaan, apprit l'arrivée des Israélites.
  '41':
  - type: text
    content: 'Ils partirent de Hor-la-Montagne et campèrent à Tsalmona. '
  '42':
  - type: note
    content: 'Pounôn  : probablement Feinan dans la Araba, au sud de la mer Morte, à l''est d''Edom ; la tradition juive y situe l''épisode des serpents (21.4ss), peut-être à cause des mines de cuivre qui s''y trouvent (cf. 21.9n) ; on trouve un nom très proche, Pinôn, dans la liste des chefs d''Edom en Gn 36.41.'
  - type: text
    content: 'Ils partirent de Tsalmona et campèrent à Pounôn. '
  '43':
  - type: note
    content: Oboth 21.10.
  - type: text
    content: 'Ils partirent de Pounôn et campèrent à Oboth. '
  '44':
  - type: note
    content: 'Iyé-Abarim  : cf. 21.11ss.'
  - type: text
    content: Ils partirent d'Oboth et campèrent à Iyé-Abarim, à la frontière de Moab.
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'd''Iyim , c.-à-d., si l''on interprète ce nom comme un nom commun, des ruines  ; Syr et Tg ont lu ici Iyé-Abarim , qui signifierait alors les ruines des Abarim , 21.11n  ; 27.12n. –  Dibôn-Gad  : cf. 21.30 ; 32.3n,34.'
  - type: text
    content: 'Ils partirent d''Iyim et campèrent à Dibôn-Gad. '
  '46':
  - type: note
    content: 'Almôn-Diblataïm  : cf. Jr 48.22 ; localité mentionnée sous une forme un peu différente dans la stèle de Mésha (Nb 32.3n) ; Syr lit Baal-Méôn, cf. 32.3n,38 ; certains l''identifient au Tophel de Dt 1.1.'
  - type: text
    content: 'Ils partirent de Dibôn-Gad et campèrent à Almôn-Diblataïm. '
  '47':
  - type: note
    content: Abarim 27.12n. –  Nebo 32.3n,38.
  - type: text
    content: 'Ils partirent d''Almôn-Diblataïm et campèrent dans les montagnes des Abarim, devant Nebo. '
  '48':
  - type: note
    content: plaines arides de Moab 22.1n.
  - type: text
    content: 'Ils partirent des montagnes des Abarim et campèrent dans les plaines arides de Moab, près du Jourdain, en face de Jéricho. '
  '49':
  - type: note
    content: 'Beth-Yeshimoth Jos 12.3 ; Abel-Shittim  : cf. 25.1 ; Jos 2.1 ; ces deux localités sont à environ 5 km l''une de l''autre, sur la rive est du Jourdain, près de son embouchure.'
  - type: text
    content: Ils campèrent près du Jourdain, depuis Beth-Yeshimoth jusqu'à Abel-Shittim, dans les plaines arides de Moab.
  - type: heading
    content: Ordres de Dieu pour le partage de Canaan
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ex 12.37. Les premiers sites mentionnés suggèrent le chemin le plus court du delta du Nil au pays de Canaan, qui longe la Méditerranée (le chemin du pays des Philistins selon Ex 13.17s).
  - type: text
    content: 'Les Israélites partirent de Ramsès et campèrent à Soukkoth. '
  '50':
  - type: text
    content: ' '
  - type: note
    content: Cf. 26.3n  ; 36.13 ; Dt 1.1.
  - type: text
    content: 'Dans les plaines arides de Moab, près du Jourdain, en face de Jéricho, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '51':
  - type: note
    content: 'Lorsque vous aurez passé…  : LXX porte seulement vous passerez…, de même 34.2 ; cf. 35.10 ; Lv 23.10 ; Dt 9.1.'
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Lorsque vous aurez passé le Jourdain pour entrer en Canaan, '
  '52':
  - type: note
    content: 'Cf. Ex 23.23ss ; 34.11s ; Dt 7.1s ; 12.2s ; 2R 23.8. –  pierres ornées  : traduction incertaine, même terme Lv 26.1 ; Ez 8.12 ; cf. ses emplois en Ps 73.7 ; Pr 18.11n  ; voir aussi 25.11 (ciselures). –  métal fondu  : cf. Lv 19.4. –  hauts lieux  : cf. Lv 26.30 ; Dt 12.2.'
  - type: text
    content: 'vous déposséderez devant vous tous les habitants du pays, vous ferez disparaître toutes leurs pierres ornées, vous ferez disparaître toutes leurs images de métal fondu et vous détruirez tous leurs hauts lieux. '
  '53':
  - type: note
    content: 'Vous prendrez possession du  : le même verbe est traduit par déposséder aux v. 52,55.'
  - type: text
    content: 'Vous prendrez possession du pays et vous l''habiterez : je vous ai donné le pays pour qu''il soit votre propriété. '
  '54':
  - type: note
    content: 26.52ss. –  vos tribus 1.16n.
  - type: text
    content: 'C''est par le sort que vous partagerez le pays qui est votre patrimoine, clan par clan. A ceux qui sont en plus grand nombre vous attribuerez un patrimoine plus grand, et à ceux qui sont en plus petit nombre vous attribuerez un patrimoine plus petit. Chacun aura ce qui lui sera échu par le sort ; vous le recevrez comme patrimoine selon vos tribus. '
  '55':
  - type: note
    content: Cf. Ex 23.33 ; Lv 26.14ss ; Dt 28.15ss ; Jos 23.12s ; Jg 2.3 ; Ez 28.24 ; voir aussi 2Co 12.7.
  - type: text
    content: 'Mais si vous ne dépossédez pas devant vous les habitants du pays, ceux d''entre eux que vous laisserez seront comme des échardes dans vos yeux et des aiguillons dans vos flancs, ils seront vos adversaires dans le pays que vous allez habiter. '
  '56':
  - type: text
    content: Je vous traiterai comme j'avais résolu de les traiter.
  '6':
  - type: note
    content: Ex 13.20.
  - type: text
    content: 'Ils partirent de Soukkoth et campèrent à Etam, qui est à l''extrémité du désert. '
  '7':
  - type: note
    content: 'revinrent vers  : texte incertain ; le verbe est au singulier ; on pourrait aussi lire s''installèrent à. –  Pi-Hiroth v. 8n.'
  - type: text
    content: 'Ils partirent d''Etam, revinrent vers Pi-Hiroth, en face de Baal-Tsephôn, et campèrent devant Migdol. '
  '8':
  - type: note
    content: 'de devant Hiroth  : ce qui pourrait aussi signifier de devant le canal  ; autre lecture traditionnelle de Pi-Hiroth  ; cf. Ex 14.2n. –  au milieu de la mer Ex 14.16,22. –  trois journées Ex 15.22. –  Mara Ex 15.23.'
  - type: text
    content: 'Ils partirent de devant Hiroth et passèrent au milieu de la mer dans la direction du désert ; ils firent trois journées de marche dans le désert d''Etam et campèrent à Mara. '
  '9':
  - type: note
    content: Elim Ex 15.27n.
  - type: text
    content: 'Ils partirent de Mara et arrivèrent à Elim ; il y avait à Elim douze sources et soixante-dix palmiers : c''est là qu''ils campèrent. '
