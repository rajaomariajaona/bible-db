    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'premiers-nés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 11.5s ; 12.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: exécutait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: châtiait leurs dieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même expression en Ex 12.12 ; Ez 5.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'tandis que les Egyptiens ensevelissaient ceux que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait abattus parmi eux, tous les premiers-nés ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' exécutait ses jugements contre leurs dieux.'
