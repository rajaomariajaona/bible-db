      - type: text
        text: Ex 15.27
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils partirent de Mara et arrivèrent à Elim ; il y avait à Elim douze sources et soixante-dix palmiers : c''est là qu''ils campèrent. '
