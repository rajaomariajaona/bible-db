    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de devant le canal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
