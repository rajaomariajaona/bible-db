      - type: text
        text: 'chemin du pays des Philistins '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: selon Ex 13.17s).
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites partirent de Ramsès et campèrent à Soukkoth. '
  - type: usfm
    marker: vlbl
