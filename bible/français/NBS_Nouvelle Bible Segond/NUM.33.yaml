    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'leurs sorties '
    - type: usfm
      marker: ft
      children:
      - type: text
