  - type: text
    text: 'C''est par le sort que vous partagerez le pays qui est votre patrimoine, clan par clan. A ceux qui sont en plus grand nombre vous attribuerez un patrimoine plus grand, et à ceux qui sont en plus petit nombre vous attribuerez un patrimoine plus petit. Chacun aura ce qui lui sera échu par le sort ; vous le recevrez comme patrimoine selon vos tribus. '
