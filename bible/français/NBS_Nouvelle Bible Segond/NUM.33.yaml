      marker: ft
      children:
      - type: text
        text: Ex 13.20.
    marker-yv: yv-n
  - type: text
    text: 'Ils partirent de Soukkoth et campèrent à Etam, qui est à l''extrémité du désert. '
  - type: usfm
    marker: vlbl
