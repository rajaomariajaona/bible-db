document_id: PSA.116,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'un homme arraché à la mort
  - type: text
    content: ' '
  - type: note
    content: 'Dans LXX et Vg, ce psaume est partagé en deux (v. 1-9 = Ps 114 ; v. 10-19 = Ps 115 ; cf. 9.1n  ; 114.1n). –  J''aime… car le Seigneur …  : texte incertain, certains comprennent J''aime le Seigneur, car il entend…  ; cf. 18.2 (autre verbe pour aimer ) ; voir aussi 5.12 ; 31.24 ; 40.17 ; Dt 5.10+. –  entend ou entendra  ; cf. 28.6 ; 30.2. –  ma voix, mes supplications ou, selon un ms hébreu et plusieurs versions anciennes, la voix de mes supplications (c.-à-d. mes supplications) ; cf. 28.2n  ; 66.19n.'
  - type: text
    content: 'J''aime… car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entend'
  - type: text
    content: ma voix, mes supplications ;
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai cru…  : traduction incertaine ; on pourrait comprendre j''ai cru, puisque je parle ou … même quand j''ai dit : Je suis très affligé. LXX j''ai cru, c''est pourquoi j''ai parlé  ; cf. 2Co 4.13. –  j''étais (ou je suis ) très affligé 119.107+.'
  - type: text
    content: J'ai cru quand j'ai parlé ;
  - type: text
    content: j'étais très affligé.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Je disais… 31.23. –  Tout homme…  : certains comprennent l''homme tout entier  ; cf. 12.2s ; 62.10 ; Rm 3.4.'
  - type: text
    content: 'Je disais, dans ma précipitation :'
  - type: text
    content: Tout homme est menteur.
  '12':
  - type: text
    content: ' '
  - type: note
    content: V. 6+.
  - type: text
    content: 'Comment rendrai-je au '
  - type: text
    content: Seigneur
  - type: text
    content: tous ses bienfaits envers moi ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'coupe  : cf. 11.6 ; 16.5 ; 23.5 ; voir aussi Nb 5.11ss ; 28.7 ; 1Co 10.16. –  du salut  : le terme hébreu correspondant est ici au pluriel.'
  - type: text
    content: Je lèverai la coupe du salut
  - type: text
    content: 'et j''invoquerai le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  '14':
  - type: text
    content: ' '
  - type: note
    content: V. 18 ; 22.26 ; 50.14s ; 56.13 ; 61.9 ; 66.13 ; Jon 2.10.
  - type: text
    content: 'je m''acquitterai de mes vœux envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: devant tout son peuple.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 72.14.
  - type: text
    content: 'Elle a du prix aux yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: la mort de ses fidèles.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Je suis ton serviteur 119.125 ; 143.12. –  fils de ta servante 86.16 ; Ex 23.12. –  détaché mes liens Jr 30.8.
  - type: text
    content: 'S''il te plaît, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Je suis ton serviteur,'
  - type: text
    content: ton serviteur, le fils de ta servante.
  - type: text
    content: Tu as détaché mes liens.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'sacrifice de reconnaissance 50.14 ; 56.13n  ; 107.22 ; Lv 7.12nss ; Hé 13.15. –  j''invoquerai…  : cf. v. 4 ; 105.1.'
  - type: text
    content: Je t'offrirai un sacrifice de reconnaissance
  - type: text
    content: '– j''invoquerai le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  '18':
  - type: text
    content: ' '
  - type: note
    content: V. 14+.
  - type: text
    content: 'je m''acquitterai de mes vœux envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: devant tout son peuple,
  '19':
  - type: text
    content: ' '
  - type: note
    content: Louez le Seigneur 104.35n.
  - type: text
    content: 'dans les cours de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: au milieu de toi, Jérusalem !
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'il a tendu… 17.6n. –  toute ma vie  : litt. dans mes jours , sens incertain ; d''après Syr, on modifie parfois le texte hébreu traditionnel pour lire le deuxième vers comme complément du premier  : le jour où je l''ai invoqué  ; cf. v. 4,17 ; 20.10 ; 138.3.'
  - type: text
    content: car il a tendu son oreille vers moi ;
  - type: text
    content: je l'invoquerai toute ma vie.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 18.5nss ; 31.11 ; 55.5 ; 120.1 ; Ac 2.24. – Voir séjour des morts. –  m''avaient atteint  : litt. m''avaient trouvé , de même dans la suite. –  le fond de  : sous-entendu dans le texte.'
  - type: text
    content: Les liens de la mort m'avaient enserré,
  - type: text
    content: et les angoisses du séjour des morts m'avaient atteint ;
  - type: text
    content: j'avais atteint le fond de la détresse et du chagrin.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'j''invoquai le nom…  : cf. v. 2,17 ; 118.5 ; Jl 3.5. –  sauve-moi 6.5.'
  - type: text
    content: 'Mais j''invoquai le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: 'S''il te plaît, '
  - type: text
    content: Seigneur
  - type: text
    content: ', sauve-moi !'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 86.15 ; 111.4 ; 145.17 ; Ex 34.6. –  est clément ou fait grâce  ; cf. 111.4 ; 112.4 ; Ex 34.16. – Voir justice.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est clément et juste,'
  - type: text
    content: notre Dieu est compatissant ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: les naïfs ou les simples  ; cf. 19.8.
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' garde les naïfs ;'
  - type: text
    content: j'étais affaibli, et il m'a sauvé.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Moi, je retourne…  : autre traduction mon âme, retourne à ton repos, car le Seigneur t''a fait…  ; 42.6 ; 103.1. –  m''a fait du bien  : cf. v. 12 ; 13.6n  ; 119.17 ; 142.8 ; voir aussi 22.32 ; Es 44.23.'
  - type: text
    content: Moi, je retourne à mon repos,
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a fait du bien.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 56.14 ; cf. 16.10s ; 49.16 ; 86.13 ; Hé 5.7 ; voir aussi Es 25.8 ; Ap 21.4.
  - type: text
    content: Oui, tu as délivré ma vie de la mort,
  - type: text
    content: mes yeux des larmes,
  - type: text
    content: mes pieds de la chute.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'sur la terre des vivants  : le mot correspondant à terre étant ici au pluriel, on pourrait aussi traduire dans les pays des vivants  ; cf. 27.13 ; 52.7 ; 142.6.'
  - type: text
    content: 'Je marcherai devant le '
  - type: text
    content: Seigneur
  - type: text
    content: sur la terre des vivants.
