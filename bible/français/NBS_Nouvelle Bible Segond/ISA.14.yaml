      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'oppresseurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 60.14 ; voir aussi 61.5+.'
      marker-yv: yv-n
    - type: text
      text: 'Des peuples les prendront et les conduiront vers leur lieu ; la maison d''Israël en fera son patrimoine sur la terre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', elle les gardera comme serviteurs et servantes. Ils retiendront captifs ceux qui les avaient faits captifs et ils domineront sur leurs oppresseurs.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fin du roi de Babylone
    marker-yv: yv-h
