      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la montagne de la Rencontre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même terme qu''en Ex 27.21), '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au plus profond du nord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : les dieux de l''Orient siègent souvent sur une montagne (cf. l''Olympe des Grecs) ; les Phéniciens situaient la montagne des dieux au mont Tsaphôn (c''est le même mot, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tsaphôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui est traduit ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Ps 48.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; celui-ci est identifié avec le mont Kasios ou Casius de l'Antiquité gréco-romaine, aujourd'hui le djebel el-Aqra‘ (1 759 m), qui domine la Méditerranée.
      marker-yv: yv-n
    - type: text
      text: 'Tu te disais : Je monterai au ciel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'élèverai mon trône au-dessus des étoiles de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je m'assiérai sur la montagne de la Rencontre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au plus profond du nord ;
