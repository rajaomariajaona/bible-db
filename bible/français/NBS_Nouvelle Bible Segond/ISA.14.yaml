      text: Est-ce là cet homme qui agitait la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui faisait trembler les royaumes,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.17 '
      - type: usfm
        marker: fq
        children:
