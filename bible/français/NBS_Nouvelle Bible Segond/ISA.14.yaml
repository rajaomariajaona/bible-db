document_id: ISA.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur aura compassion de Jacob
  - type: text
    content: ' '
  - type: note
    content: 'il leur accordera le repos  : autre traduction il les rétablira  ; cf. v. 3 ; voir aussi Ex 33.14 ; Dt 12.10 ; Jos 1.13 ; 22.4 ; 23.1 ; 2S 7.1 ; Jr 30.10 etc. –  sur leur terre  : litt. sur leur sol  ; cf. v. 2 ; Gn 2.5n  ; voir Ez 37.14. –  les immigrés  : cf. 11.10-12 ; 49.22 ; 56.3-7 ; 60.4 ; 66.20 ; Ex 12.48n  ; Za 2.15. –  maison de Jacob 2.5n.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aura compassion de Jacob, il choisira encore Israël ; il leur accordera le repos sur leur terre ; les immigrés se joindront à eux et ils s''uniront à la maison de Jacob. '
  '10':
  - type: text
    content: 'Tous te disent :'
  - type: text
    content: Toi aussi, tu es sans force comme nous,
  - type: text
    content: tu es devenu semblable à nous !
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.14 ; 16.6.
  - type: text
    content: On a fait descendre ton orgueil au séjour des morts,
  - type: text
    content: avec le son de tes luths ;
  - type: text
    content: sous toi s'étend la vermine,
  - type: text
    content: et les vers sont ta couverture.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'astre brillant  : le terme hébreu, qui n''apparaît qu''ici, est proche d''un mot arabe qui désigne la nouvelle lune ; LXX étoile du matin , cf. Ap 22.16 ; Vg Lucifer , c.-à-d. le porte-lumière (cf. Ez 28.2-12 ; Lc 10.18). Il s''agit peut-être d''une étoile particulière (probablement Vénus, étoile du matin) auquel le roi de Babylone était assimilé. – Voir fils.'
  - type: text
    content: Comment ! Tu es tombé du ciel,
  - type: text
    content: astre brillant, fils de l'aurore !
  - type: text
    content: Tu as été abattu,
  - type: text
    content: toi qui domptais des nations !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'au ciel Ps 139.8. –  Dieu  : hébreu ’El (cf. Gn 21.33n  ; Ps 82.1n) : il s''agit peut-être ici du dieu cananéen ou phénicien ’El ; cf. Ez 28.2. –  sur (ou dans ) la montagne de la Rencontre (même terme qu''en Ex 27.21), au plus profond du nord  : les dieux de l''Orient siègent souvent sur une montagne (cf. l''Olympe des Grecs) ; les Phéniciens situaient la montagne des dieux au mont Tsaphôn (c''est le même mot, tsaphôn , qui est traduit ici par nord  ; cf. Ps 48.3n) ; celui-ci est identifié avec le mont Kasios ou Casius de l''Antiquité gréco-romaine, aujourd''hui le djebel el-Aqra‘ (1 759 m), qui domine la Méditerranée.'
  - type: text
    content: 'Tu te disais : Je monterai au ciel,'
  - type: text
    content: j'élèverai mon trône au-dessus des étoiles de Dieu,
  - type: text
    content: je m'assiérai sur la montagne de la Rencontre,
  - type: text
    content: au plus profond du nord ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'je monterai / je serai semblable  : cf. Gn 3.5,22 ; 11.4ss ; Ez 28.2,6,9 ; Dn 11.36 ; 2Th 2.4. –  Très-Haut  : hébreu ’Elyôn  : c''est peut-être ici le nom d''une divinité phénicienne ; cf. Gn 14.18n.'
  - type: text
    content: je monterai sur les hauteurs des nuages,
  - type: text
    content: je serai semblable au Très-Haut.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ez 32.23.
  - type: text
    content: Mais on t'a fait descendre au séjour des morts,
  - type: text
    content: au plus profond du gouffre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: ils te considèrent attentivement ou ils réfléchissent à ton sujet.
  - type: text
    content: Ceux qui te voient fixent sur toi leurs regards,
  - type: text
    content: 'ils te considèrent attentivement :'
  - type: text
    content: Est-ce là cet homme qui agitait la terre,
  - type: text
    content: qui faisait trembler les royaumes,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'ne relâchait pas ses prisonniers  : litt. et qui n''ouvrait pas (à) ses prisonniers vers la maison  ; cf. Jr 50.33.'
  - type: text
    content: qui réduisait le monde en désert,
  - type: text
    content: qui rasait ses villes
  - type: text
    content: et ne relâchait pas ses prisonniers ?
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'sa maison  : c.-à-d. son tombeau  ; cf. 22.16.'
  - type: text
    content: Tous les rois des nations, oui, tous,
  - type: text
    content: se sont couchés dans la gloire, chacun dans sa maison.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'un rameau (le même terme est traduit par rejeton en 11.1, en hébreu nétsèr , où certains voient une allusion au nom de Nabuchodonosor, en hébreu Neboukadnetsar ) ; LXX une ordure  ; une modification du texte hébreu traditionnel permettrait de lire un avorton (cf. Jb 3.11-16). –  comme la dépouille…  : texte obscur, litt. vêtu ( ?) de tués transpercés (par) l''épée descendant sur les pierres d''un gouffre.'
  - type: text
    content: Mais toi, tu as été jeté hors de ta tombe
  - type: text
    content: comme un rameau abominable,
  - type: text
    content: comme la dépouille des gens tués à coups d'épée
  - type: text
    content: et précipités sur les pierres du gouffre,
  - type: text
    content: comme un cadavre piétiné.
  '2':
  - type: note
    content: 'elle les gardera  : sous-entendu dans le texte. –  oppresseurs 3.5n  ; cf. 60.14 ; voir aussi 61.5+.'
  - type: text
    content: 'Des peuples les prendront et les conduiront vers leur lieu ; la maison d''Israël en fera son patrimoine sur la terre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', elle les gardera comme serviteurs et servantes. Ils retiendront captifs ceux qui les avaient faits captifs et ils domineront sur leurs oppresseurs.'
  - type: heading
    content: La fin du roi de Babylone
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.25+. –  l''engeance mauvaise  : cf. 1.4n.'
  - type: text
    content: Tu n'es pas réuni à eux dans le tombeau,
  - type: text
    content: car tu as détruit ton pays,
  - type: text
    content: 'tu as tué ton peuple :'
  - type: text
    content: on ne mentionnera plus jamais l'engeance mauvaise.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'des fils  : litt. de ses fils. –  conquérir  : ou, selon la traduction habituelle du verbe correspondant, prendre possession de . –  d''hostilités  : autre traduction de villes (cf. Gn 10.10-12 ; 11.4ss).'
  - type: text
    content: Préparez le massacre des fils
  - type: text
    content: à cause de la faute de leurs pères !
  - type: text
    content: Qu'ils ne se relèvent pas pour conquérir la terre
  - type: text
    content: et remplir le monde d'hostilités.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Je me dresserai ou je me lèverai 2.19+ ; Ps 12.6. –  nom / reste (cf. 1.9+), progéniture / postérité  : hébreu shem / she''ar, nîn / néked (cf. Gn 21.23 ; Jb 18.19), double allitération.'
  - type: text
    content: Je me dresserai contre eux,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: je retrancherai le nom et le reste de Babylone,
  - type: text
    content: sa progéniture et sa postérité
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'hérisson  : traduction incertaine ; le mot hébreu, qui signifie celui qui s''enroule (cf. 38.12), se contracte , pourrait aussi désigner le butor qui hérisse son plumage.'
  - type: text
    content: J'en ferai le domaine du hérisson et un marécage,
  - type: text
    content: et je la balaierai avec le balai de la destruction,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Le Seigneur brisera l'Assyrie
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Sans faute…  : litt. sinon… , formule elliptique de serment ; cf. 5.9n. – Cf. 10.22s ; 28.22 ; 40.8 ; Pr 19.21.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées l''a juré :'
  - type: text
    content: Sans faute, il en sera selon mon intention,
  - type: text
    content: 'ce que j''ai projeté tiendra :'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'l''Assyrien 10.5+. –  joug 10.27. –  son fardeau 9.3n. –  leur épaule  : litt. son épaule.'
  - type: text
    content: je briserai l'Assyrien dans mon pays,
  - type: text
    content: je le piétinerai sur mes montagnes ;
  - type: text
    content: son joug leur sera ôté,
  - type: text
    content: et son fardeau sera ôté de leur épaule.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'le projet formé 5.19n  ; cf. 19.12,17 ; 23.8s. –  main étendue  : cf. 5.25+. –  contre  : litt. sur.'
  - type: text
    content: Voilà le projet formé contre toute la terre,
  - type: text
    content: voilà la main étendue contre toutes les nations.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Dn 4.32. –  détournera  : autre traduction brisera.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées a formé ce projet : qui lui fera échec ?'
  - type: text
    content: 'Sa main est étendue : qui la détournera ?'
  - type: heading
    content: Contre les Philistins
  '28':
  - type: text
    content: ' '
  - type: note
    content: L'année… ≈ 716 av. J.-C. ; cf. 2R 16.20. –  sentence 13.1n.
  - type: text
    content: 'L''année de la mort du roi Achaz, il y eut cette sentence :'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'bâton v. 5 ; 10.5+. –  souche ou racine  ; cf. 11.1,10. –  dragon  : hébreu saraph  ; cf. 6.2n  ; Am 5.19.'
  - type: text
    content: Ne te réjouis pas, Philistie tout entière,
  - type: text
    content: de ce que le bâton qui te frappait est brisé !
  - type: text
    content: Car de la souche du serpent sortira un aspic,
  - type: text
    content: et son rejeton sera un dragon volant.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'repos  : cf. v. 1n. –  dur esclavage  : cf. Ex 1.14.'
  - type: text
    content: 'Alors, le jour où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''aura accordé le repos, après tes peines et tes agitations, et après le dur esclavage qui te fut imposé, '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'les premiers-nés des faibles  : certains modifient le texte hébreu pour lire les faibles pourront paître dans ma prairie , autre traduction les plus faibles  ; cf. v. 32 ; Mt 5.3.'
  - type: text
    content: Alors les premiers-nés des faibles pourront paître,
  - type: text
    content: et les pauvres se coucheront en sécurité ;
  - type: text
    content: mais je ferai mourir de faim ta souche,
  - type: text
    content: et ce qui restera de toi sera tué.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'porte  : il s''agit de la porte de la ville (cf. 3.6 ; Rt 3.11). –  Défaille  : litt. fonds , autre verbe de même sens en 19.1 ; cf. Jos 2.11 ; 5.1 ; 7.5. –  du nord  : cf. v. 13 ; Jr 1.14+. –  des rangs  : litt. de ses rangs (ceux de l''envahisseur).'
  - type: text
    content: Hurle, ô porte !
  - type: text
    content: Pousse des cris, ville !
  - type: text
    content: Défaille, Philistie tout entière !
  - type: text
    content: Car du nord vient une fumée,
  - type: text
    content: et personne ne s'écarte des rangs.
  '32':
  - type: text
    content: Que répondra-t-on aux messagers de la nation ?
  - type: text
    content: '– Que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui fonde Sion,'
  - type: text
    content: et que les pauvres de son peuple y trouvent un abri.
  '4':
  - type: note
    content: 'poème  : le même mot hébreu peut être traduit par maxime, fable, etc. ; le verbe apparenté est traduit par être semblable au v. 10 ; cf. Nb 21.27 ; 23.7+ ; Mi 2.4 ; Ha 2.6 (voir aussi Jr 38.22) ; cf. Pr 1.1n. –  Comment !…  : introduction classique aux poèmes funèbres, de même au v. 12 ; cf. 1.21 ; Jr 48.17 ; Ez 26.17 ; Lm 1.1n. –  n''est plus  : litt. a cessé, comme dans la suite du verset. C''est le verbe hébreu qui a donné le mot sabbat (cf. Gn 2.2n). –  tyrannie  : sens incertain ; en modifiant une lettre du texte hébreu traditionnel avec un ms de Qumrân, on obtient un mot de la racine rhv (cf. 30.7n  ; 51.9n), que l''on peut traduire agitation, assaut ou arrogance.'
  - type: text
    content: 'alors tu prononceras ce poème contre le roi de Babylone et tu diras :'
  - type: text
    content: Comment ! L'oppresseur n'est plus !
  - type: text
    content: La tyrannie a cessé !
  '5':
  - type: text
    content: ' '
  - type: note
    content: bâton / sceptre 9.3n  ; cf. v. 29.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a brisé le bâton des méchants,'
  - type: text
    content: le sceptre des dominateurs.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'est poursuivi  : Syr a lu poursuivant , ce qui correspondrait à un changement de voyelles du texte hébreu.'
  - type: text
    content: Celui qui, dans sa fureur, frappait les peuples
  - type: text
    content: par des coups incessants ;
  - type: text
    content: celui qui, dans sa colère, dominait sur les nations
  - type: text
    content: est poursuivi sans ménagement.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'repos  : cf. v. 1n. –  cris de joie 44.23 ; 55.12 ; Ap 18.20.'
  - type: text
    content: Tout le pays jouit du repos et de la tranquillité ;
  - type: text
    content: on éclate en cris de joie.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Les rois d''Assyrie et de Babylonie pratiquaient des coupes de cyprès sur l''Amanus et de cèdres au Liban  ; cf. 37.24 ; Ha 2.17. –  tombé  : litt. couché.'
  - type: text
    content: 'Les cyprès même, les cèdres du Liban se réjouissent à ton sujet :'
  - type: text
    content: Depuis que tu es tombé,
  - type: text
    content: le bûcheron ne monte plus contre nous.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'pour t''accueillir à ton arrivée  : autre traduction pour annoncer ton arrivée. –  ombres  : hébreu repha''im , nom donné aux êtres affaiblis censés peupler le séjour des morts ; voir aussi 17.5n  ; 26.14,19. –  guides  : le mot désigne habituellement les boucs qui conduisent le troupeau ; cf. 34.6 ; Ez 34.17 ; 39.18 ; Za 10.3.'
  - type: text
    content: Le séjour des morts, en bas, s'agite
  - type: text
    content: pour t'accueillir à ton arrivée ;
  - type: text
    content: il éveille pour toi les ombres,
  - type: text
    content: tous les guides de la terre,
  - type: text
    content: il fait lever de leurs trônes tous les rois des nations.
