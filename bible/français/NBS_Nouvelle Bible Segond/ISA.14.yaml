        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: astre brillant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu, qui n''apparaît qu''ici, est proche d''un mot arabe qui désigne la nouvelle lune ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
