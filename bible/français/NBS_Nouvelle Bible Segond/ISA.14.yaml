    marker: q1
    children:
    - type: text
      text: et précipités sur les pierres du gouffre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un cadavre piétiné.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
