    - type: text
      text: 'Car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' aura compassion de Jacob, il choisira encore Israël ; il leur accordera le repos sur leur terre ; les immigrés se joindront à eux et ils s''uniront à la maison de Jacob. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous te disent :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi aussi, tu es sans force comme nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es devenu semblable à nous !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 5.14 ; 16.6.
      marker-yv: yv-n
    - type: text
      text: On a fait descendre ton orgueil au séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec le son de tes luths ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous toi s'étend la vermine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les vers sont ta couverture.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
