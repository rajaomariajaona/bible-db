      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ap 22.16 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Lucifer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le porte-lumière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Ez 28.2-12 ; Lc 10.18). Il s''agit peut-être d''une étoile particulière (probablement Vénus, étoile du matin) auquel le roi de Babylone était assimilé. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Comment ! Tu es tombé du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: astre brillant, fils de l'aurore !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as été abattu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui domptais des nations !
