    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eliaqim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shebna '
