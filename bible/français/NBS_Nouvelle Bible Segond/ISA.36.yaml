    marker-yv: yv-n
  - type: text
    text: 'Alors Eliaqim, fils de Hilqiya, l''intendant de la maison, sortit vers lui avec Shebna, le scribe, et Yoah, fils d''Asaph, l''archiviste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.8-15.
    marker-yv: yv-n
  - type: text
    text: 'Le chef d''intendance leur dit : Dites, je vous prie, à Ezéchias : Ainsi parle le grand roi, le roi d''Assyrie : En quoi donc as-tu placé ta confiance ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je te le dis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss, dont un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ', suivent 2R 18.20'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu as dit. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: paroles en l'air
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parole de lèvres. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'plan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'confiance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2R 18.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'te rebeller '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2R 18.7.
    marker-yv: yv-n
  - type: text
    text: 'Je te le dis, ce sont des paroles en l''air qui te tiennent lieu de plan et de force pour la guerre ! Et maintenant, en qui donc as-tu mis ta confiance, pour te rebeller contre moi ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: soutien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot a été traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'appui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 3.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.1+ ; cf. 30.2s,7 ; 37.9.
    marker-yv: yv-n
  - type: text
    text: 'Tu as mis ta confiance dans le soutien de l''Egypte, ce roseau cassé qui pénètre et transperce la main de quiconque s''appuie dessus : tel est le pharaon, le roi d''Egypte, pour tous ceux qui mettent leur confiance en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ezéchias… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2R 18.3s.
    marker-yv: yv-n
  - type: text
    text: 'Peut-être me diras-tu : « C''est dans le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), notre Dieu, que nous avons mis notre confiance. » Mais n''est-ce pas justement ses hauts lieux et ses autels qu''Ezéchias a supprimés, en disant à Juda et à Jérusalem : « C''est devant cet autel que vous vous prosternerez ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pari '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: défi.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant fais, je te prie, un pari avec mon maître, le roi d''Assyrie : je te donnerai deux mille chevaux, si tu peux trouver des cavaliers pour les monter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'hommes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chars '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'attelages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 31.1.
    marker-yv: yv-n
  - type: text
    text: 'Comment repousserais-tu un seul gouverneur d''entre les moindres hommes de mon maître ? C''est dans l''Egypte que tu mets ta confiance en ce qui concerne les chars et les attelages ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.5+.
    marker-yv: yv-n
  - type: text
    text: 'D''ailleurs, est-ce indépendamment du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) que j''ai attaqué ce pays pour le détruire ? C''est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) qui m''a dit : « Attaque ce pays et détruis-le. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: araméen
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : à l''époque, langue diplomatique pratiquée seulement par l''élite. Elle deviendra langue populaire des Juifs à partir du V'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' s. av. J.-C. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en judéen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en langue juive
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en hébreu. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en présence
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aux oreilles.
    marker-yv: yv-n
  - type: text
    text: 'Eliaqim, Shebna et Yoah dirent au chef d''intendance : S''il te plaît, parle-nous en araméen, nous le comprenons ; ne nous parle pas en judéen, en présence du peuple qui est sur la muraille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'excréments '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: urine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : une note traditionnelle indique en marge du texte les deux euphémismes correspondants'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'leur évacuation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'eau de leurs pieds.
    marker-yv: yv-n
  - type: text
    text: 'Le chef d''intendance répondit : Est-ce à ton maître et à toi que mon maître m''a envoyé dire cela ? N''est-ce pas à ces hommes qui sont assis sur la muraille, eux qui mangent leurs excréments et boivent leur urine avec vous ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grand roi… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 4.
    marker-yv: yv-n
  - type: text
    text: 'Puis le chef d''intendance se redressa et cria à pleine voix, en judéen : Ecoutez les paroles du grand roi, du roi d''Assyrie ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi parle le roi : Qu''Ezéchias ne vous trompe pas, car il ne pourra pas vous délivrer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 7 ; 37.10.
    marker-yv: yv-n
  - type: text
    text: 'Qu''Ezéchias ne vous amène pas à mettre votre confiance dans le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), en disant : « Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) nous délivrera ! Cette ville ne sera pas livrée au roi d''Assyrie ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 2R 18.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rendez-vous à moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sortez vers moi. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vigne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: figuier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Os 2.14+.'
    marker-yv: yv-n
  - type: text
    text: 'N''écoutez pas Ezéchias ; car ainsi parle le roi d''Assyrie : Faites la paix avec moi, rendez-vous à moi ! Chacun de vous mangera de sa vigne et de son figuier, chacun boira de l''eau de sa citerne, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2R 18.32 ajoute à la fin du v. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un pays d''oliviers à huile et de miel ; ainsi vous vivrez, vous ne mourrez pas. N''écoutez donc pas Ezéchias… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Dt 7.13 ; 11.14 ; 12.17 ; 14.23 ; Os 2.10,24.
    marker-yv: yv-n
  - type: text
    text: 'jusqu''à ce que je vienne et que je vous emmène dans un pays comme le vôtre, dans un pays de blé et de vin, un pays de pain et de vignes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Qu''Ezéchias ne vous entraîne pas en disant : « Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) nous délivrera ! » Les dieux des nations ont-ils délivré chacun son pays de la main du roi d''Assyrie ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hamath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Arpad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' / '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sepharvaïm '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2R 17.24 ; 2R 18.34 ajoute '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Héna et Ivva '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 37.13). –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Samarie
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.11.
    marker-yv: yv-n
  - type: text
    text: 'Où sont les dieux de Hamath et d''Arpad ? Où sont les dieux de Sepharvaïm ? Ont-ils délivré Samarie de ma main ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Parmi tous les dieux de ces pays, lequel d''entre eux a délivré son pays de ma main, pour que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) délivre Jérusalem de ma main ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils gardèrent le silence ; ils ne lui répondirent pas un mot, car le roi avait donné cet ordre : « Vous ne lui répondrez pas. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vêtements déchirés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : signe de deuil, de même en 37.1 ; cf. Gn 37.29,34 ; 44.13 ; Jos 7.6 ; 2S 1.11.'
    marker-yv: yv-n
  - type: text
    text: Eliaqim, fils de Hilqiya, l'intendant de la maison, Shebna, le scribe, et Yoah, fils d'Asaph, l'archiviste, vinrent trouver Ezéchias, les vêtements déchirés, et lui rapportèrent les paroles du chef d'intendance.
