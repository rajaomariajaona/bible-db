document_id: ISA.36,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sennachérib menace Jérusalem
  - type: heading
    content: 2R 18.13-37
  - type: text
    content: ' '
  - type: note
    content: Les chap. 36–39 reproduisent avec peu de changements 2R 18.13,17–20.19. Sennachérib a régné de 704 à 681 av. J.-C. Il a envahi Juda en 701.
  - type: text
    content: 'La quatorzième année du roi Ezéchias, Sennachérib, roi d''Assyrie, attaqua toutes les villes fortes de Juda et les prit. '
  '10':
  - type: note
    content: 10.5+.
  - type: text
    content: 'D''ailleurs, est-ce indépendamment du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) que j''ai attaqué ce pays pour le détruire ? C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui m''a dit : « Attaque ce pays et détruis-le. »'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'araméen  : à l''époque, langue diplomatique pratiquée seulement par l''élite. Elle deviendra langue populaire des Juifs à partir du Ve s. av. J.-C. –  en judéen ou en langue juive , c.-à-d. en hébreu. –  en présence  : litt. aux oreilles.'
  - type: text
    content: 'Eliaqim, Shebna et Yoah dirent au chef d''intendance : S''il te plaît, parle-nous en araméen, nous le comprenons ; ne nous parle pas en judéen, en présence du peuple qui est sur la muraille. '
  '12':
  - type: note
    content: 'excréments / urine  : une note traditionnelle indique en marge du texte les deux euphémismes correspondants  : leur évacuation et l''eau de leurs pieds.'
  - type: text
    content: 'Le chef d''intendance répondit : Est-ce à ton maître et à toi que mon maître m''a envoyé dire cela ? N''est-ce pas à ces hommes qui sont assis sur la muraille, eux qui mangent leurs excréments et boivent leur urine avec vous ?'
  '13':
  - type: text
    content: ' '
  - type: note
    content: grand roi… v. 4.
  - type: text
    content: 'Puis le chef d''intendance se redressa et cria à pleine voix, en judéen : Ecoutez les paroles du grand roi, du roi d''Assyrie ! '
  '14':
  - type: text
    content: 'Ainsi parle le roi : Qu''Ezéchias ne vous trompe pas, car il ne pourra pas vous délivrer. '
  '15':
  - type: note
    content: V. 7 ; 37.10.
  - type: text
    content: 'Qu''Ezéchias ne vous amène pas à mettre votre confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), en disant : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) nous délivrera ! Cette ville ne sera pas livrée au roi d''Assyrie ! » '
  '16':
  - type: note
    content: 'la paix  : 2R 18.31n. –  rendez-vous à moi  : litt. sortez vers moi. –  vigne / figuier  : cf. Os 2.14+.'
  - type: text
    content: 'N''écoutez pas Ezéchias ; car ainsi parle le roi d''Assyrie : Faites la paix avec moi, rendez-vous à moi ! Chacun de vous mangera de sa vigne et de son figuier, chacun boira de l''eau de sa citerne, '
  '17':
  - type: note
    content: 2R 18.32 ajoute à la fin du v. un pays d'oliviers à huile et de miel ; ainsi vous vivrez, vous ne mourrez pas. N'écoutez donc pas Ezéchias… Cf. Dt 7.13 ; 11.14 ; 12.17 ; 14.23 ; Os 2.10,24.
  - type: text
    content: 'jusqu''à ce que je vienne et que je vous emmène dans un pays comme le vôtre, dans un pays de blé et de vin, un pays de pain et de vignes. '
  '18':
  - type: text
    content: 'Qu''Ezéchias ne vous entraîne pas en disant : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) nous délivrera ! » Les dieux des nations ont-ils délivré chacun son pays de la main du roi d''Assyrie ? '
  '19':
  - type: note
    content: Hamath / Arpad 10.9n / Sepharvaïm 2R 17.24 ; 2R 18.34 ajoute Héna et Ivva (cf. 37.13). –  Samarie 10.11.
  - type: text
    content: 'Où sont les dieux de Hamath et d''Arpad ? Où sont les dieux de Sepharvaïm ? Ont-ils délivré Samarie de ma main ? '
  '2':
  - type: note
    content: Cf. 7.17-20 ; 8.7s. –  Lakish 2R 14.19n. –  chef d'intendance ou Rab-Shaqé 2R 18.17n. –  aqueduc… Champ du Teinturier 7.3n  ; 22.11.
  - type: text
    content: Le roi d'Assyrie envoya de Lakish à Jérusalem, vers le roi Ezéchias, le chef d'intendance, avec une puissante armée. Celui-ci se plaça à l'aqueduc du réservoir supérieur, sur la route du Champ du Teinturier.
  '20':
  - type: text
    content: 'Parmi tous les dieux de ces pays, lequel d''entre eux a délivré son pays de ma main, pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) délivre Jérusalem de ma main ?'
  '21':
  - type: text
    content: 'Ils gardèrent le silence ; ils ne lui répondirent pas un mot, car le roi avait donné cet ordre : « Vous ne lui répondrez pas. » '
  '22':
  - type: note
    content: 'vêtements déchirés  : signe de deuil, de même en 37.1 ; cf. Gn 37.29,34 ; 44.13 ; Jos 7.6 ; 2S 1.11.'
  - type: text
    content: Eliaqim, fils de Hilqiya, l'intendant de la maison, Shebna, le scribe, et Yoah, fils d'Asaph, l'archiviste, vinrent trouver Ezéchias, les vêtements déchirés, et lui rapportèrent les paroles du chef d'intendance.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Eliaqim / Shebna 22.15nss ; 37.2. – Voir scribe.
  - type: text
    content: 'Alors Eliaqim, fils de Hilqiya, l''intendant de la maison, sortit vers lui avec Shebna, le scribe, et Yoah, fils d''Asaph, l''archiviste. '
  '4':
  - type: note
    content: 10.8-15.
  - type: text
    content: 'Le chef d''intendance leur dit : Dites, je vous prie, à Ezéchias : Ainsi parle le grand roi, le roi d''Assyrie : En quoi donc as-tu placé ta confiance ? '
  '5':
  - type: note
    content: 'Je te le dis  : certains mss, dont un ms de Qumrân, suivent 2R 18.20  : tu as dit. –  paroles en l''air  : litt. parole de lèvres. –  plan 5.19n. –  confiance 2R 18.19. –  te rebeller 2R 18.7.'
  - type: text
    content: 'Je te le dis, ce sont des paroles en l''air qui te tiennent lieu de plan et de force pour la guerre ! Et maintenant, en qui donc as-tu mis ta confiance, pour te rebeller contre moi ? '
  '6':
  - type: note
    content: 'soutien  : le même mot a été traduit par appui en 3.1. –  Egypte 18.1+ ; cf. 30.2s,7 ; 37.9.'
  - type: text
    content: 'Tu as mis ta confiance dans le soutien de l''Egypte, ce roseau cassé qui pénètre et transperce la main de quiconque s''appuie dessus : tel est le pharaon, le roi d''Egypte, pour tous ceux qui mettent leur confiance en lui. '
  '7':
  - type: note
    content: Ezéchias… 2R 18.3s.
  - type: text
    content: 'Peut-être me diras-tu : « C''est dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu, que nous avons mis notre confiance. » Mais n''est-ce pas justement ses hauts lieux et ses autels qu''Ezéchias a supprimés, en disant à Juda et à Jérusalem : « C''est devant cet autel que vous vous prosternerez ! » '
  '8':
  - type: note
    content: pari ou défi.
  - type: text
    content: 'Maintenant fais, je te prie, un pari avec mon maître, le roi d''Assyrie : je te donnerai deux mille chevaux, si tu peux trouver des cavaliers pour les monter. '
  '9':
  - type: note
    content: hommes 10.8. –  chars / attelages 31.1.
  - type: text
    content: 'Comment repousserais-tu un seul gouverneur d''entre les moindres hommes de mon maître ? C''est dans l''Egypte que tu mets ta confiance en ce qui concerne les chars et les attelages ! '
