    marker-yv: yv-n
  - type: text
    text: Le roi d'Assyrie envoya de Lakish à Jérusalem, vers le roi Ezéchias, le chef d'intendance, avec une puissante armée. Celui-ci se plaça à l'aqueduc du réservoir supérieur, sur la route du Champ du Teinturier.
