    - type: text
      text: La femme stupide est frivole.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naïve, elle ne connaît rien.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle s'assied à l'entrée de sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur un siège, sur les hauteurs de la ville,
  '15':
  - type: usfm
    marker: q1
