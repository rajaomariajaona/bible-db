  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quiconque est naïf, qu'il fasse un détour par ici !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A qui est dépourvu de raison, elle dit :'
