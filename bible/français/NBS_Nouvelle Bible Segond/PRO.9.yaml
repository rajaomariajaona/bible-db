      - type: usfm
        marker: ft
        children:
        - type: text
          text: '24.19-21 : « Venez à moi (la Sagesse), vous qui me désirez, et rassasiez-vous de mes fruits. Car mon souvenir l''emporte sur le miel et ma possession sur le rayon de miel. Ceux qui me mangent auront encore faim et ceux qui me boivent auront encore soif. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'préparé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Venez, mangez de mon pain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et buvez du vin que j'ai préparé ;
  '6':
  - type: usfm
    marker: q1
