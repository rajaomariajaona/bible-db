          text: Fils, si tu es sage pour toi, sois sage aussi pour les autres, et si tu deviens mauvais, toi seul en retireras le malheur.
      marker-yv: yv-n
    - type: text
      text: Si tu es sage, c'est pour toi-même que tu es sage ;
  - type: usfm
    marker: q1
