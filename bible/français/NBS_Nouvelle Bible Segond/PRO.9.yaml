document_id: PRO.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'invitation de la sagesse
  - type: text
    content: ' '
  - type: note
    content: La Sagesse 1.20n  ; cf. 14.1 ; 24.3.
  - type: text
    content: La Sagesse a bâti sa maison,
  - type: text
    content: elle a taillé ses sept colonnes.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'la crainte du Seigneur 1.7n. –  connaissance des saints  : sans doute ici au sens de connaissance divine  ; cf. 2.5n  ; 30.3n.'
  - type: text
    content: 'Le début de la sagesse, c''est la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: la connaissance des saints, c'est l'intelligence.
  '11':
  - type: text
    content: ' '
  - type: note
    content: tes jours… 3.2n  ; 10.27.
  - type: text
    content: Car, par moi, tes jours se multiplieront,
  - type: text
    content: et des années de vie te seront ajoutées.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'LXX  : Fils, si tu es sage pour toi, sois sage aussi pour les autres, et si tu deviens mauvais, toi seul en retireras le malheur.'
  - type: text
    content: Si tu es sage, c'est pour toi-même que tu es sage ;
  - type: text
    content: si tu es insolent, c'est toi seul qui en supporteras les conséquences.
  - type: heading
    content: L'invitation de la femme stupide
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'La femme stupide  : autre traduction possible Dame Stupidité  ; cf. v. 1-6. –  frivole 7.11n.'
  - type: text
    content: La femme stupide est frivole.
  - type: text
    content: Naïve, elle ne connaît rien.
  '14':
  - type: text
    content: Elle s'assied à l'entrée de sa maison,
  - type: text
    content: sur un siège, sur les hauteurs de la ville,
  '15':
  - type: text
    content: pour crier aux passants
  - type: text
    content: 'qui vont droit leur chemin :'
  '16':
  - type: text
    content: Quiconque est naïf, qu'il fasse un détour par ici !
  - type: text
    content: 'A qui est dépourvu de raison, elle dit :'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'le pain  : cf. 20.17.'
  - type: text
    content: L'eau dérobée est douce,
  - type: text
    content: le pain caché est agréable !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'ombres 2.18n. –  ses invités  : ceux de la femme stupide. –  séjour des morts 1.12n.'
  - type: text
    content: Il ne sait pas que c'est là le lieu des ombres,
  - type: text
    content: que ses invités sont dans les profondeurs du séjour des morts.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'préparé  : litt. mêlé  ; le vin n''était généralement pas consommé pur, mais coupé d''eau ou agrémenté de jus de fruits et d''aromates ; même verbe au v. 5 ; Es 5.22 ; 19.14 ; Ps 102.10 ; terme apparenté en Ps 75.9 ; autre terme apparenté en Es 65.11 ; Pr 23.30n.'
  - type: text
    content: Elle a égorgé une bête, préparé son vin
  - type: text
    content: et dressé sa table.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'elle crie…  : cf. 1.20 ; 8.2.'
  - type: text
    content: Elle a envoyé ses servantes, elle crie
  - type: text
    content: 'sur les points culminants des hauteurs de la ville :'
  '4':
  - type: text
    content: ' '
  - type: note
    content: dépourvu de raison v. 16 ; 6.32n.
  - type: text
    content: Quiconque est naïf, qu'il fasse un détour par ici !
  - type: text
    content: 'A qui est dépourvu de raison, elle dit :'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Venez…  : cf. Es 55.1-3 ; Jn 6.35 ; Siracide 24.19-21 : « Venez à moi (la Sagesse), vous qui me désirez, et rassasiez-vous de mes fruits. Car mon souvenir l''emporte sur le miel et ma possession sur le rayon de miel. Ceux qui me mangent auront encore faim et ceux qui me boivent auront encore soif. » –  préparé v. 2n.'
  - type: text
    content: Venez, mangez de mon pain
  - type: text
    content: et buvez du vin que j'ai préparé ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'dans la voie  : cf. 2.13n.'
  - type: text
    content: abandonnez la naïveté et vous vivrez,
  - type: text
    content: dirigez-vous dans la voie de l'intelligence !
  - type: heading
    content: L'insolent et le sage
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 26.4s. –  instruit ou corrige  : le verbe hébreu est à l''origine du mot traduit par instruction en 1.2n. –  l''insolent 1.22n. –  mépris 3.35+. –  avertit ou reprend 1.23n.'
  - type: text
    content: Qui instruit l'insolent s'attire le mépris,
  - type: text
    content: qui avertit le méchant reçoit un outrage.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'avertis ou reprends 1.23n. –  insolent  : cf. Mt 7.6.'
  - type: text
    content: N'avertis pas l'insolent, de peur qu'il ne te déteste ;
  - type: text
    content: avertis le sage, et il t'aimera.
  '9':
  - type: text
    content: ' '
  - type: note
    content: savoir 1.5n.
  - type: text
    content: Donne au sage, et il deviendra plus sage ;
  - type: text
    content: donne la connaissance au juste, et il augmentera son savoir.
