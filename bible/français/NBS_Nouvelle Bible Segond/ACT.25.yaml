    marker-yv: yv-n
  - type: text
    text: 'Le lendemain, donc, Agrippa et Bérénice arrivèrent en grande pompe et entrèrent dans la salle d''audience avec les tribuns militaires et les hommes de marque de la ville. Sur l''ordre de Festus, Paul fut amené. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.24 '
    - type: usfm
      marker: fq
      children:
