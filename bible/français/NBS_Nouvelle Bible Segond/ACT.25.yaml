document_id: ACT.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul en appelle à César
  - type: text
    content: ' '
  - type: note
    content: Césarée 8.40n  ; 23.23+.
  - type: text
    content: 'Trois jours après son arrivée dans la province, Festus monta de Césarée à Jérusalem. '
  '10':
  - type: note
    content: '23.29+. –  devant le tribunal  : la même expression est traduite par au tribunal aux v. 6,17.'
  - type: text
    content: 'Paul dit : Je me tiens devant le tribunal de César et c''est là que je dois être jugé. Je n''ai fait aucun tort aux Juifs, comme tu le sais fort bien toi-même. '
  '11':
  - type: note
    content: 'me livrer  : le verbe correspondant (aussi au v. 16) est employé au sens opposé d’accorder la grâce de en 3.14+. –  J''en appelle à César v. 8n,21 ; 26.32 ; 28.19.'
  - type: text
    content: 'Si j''ai fait du tort et si j''ai commis quoi que ce soit qui mérite la mort, je ne demande pas que la mort me soit épargnée ; mais s''il n''y a rien de vrai dans les accusations qu''ils portent contre moi, personne n''a le droit de me livrer à eux. J''en appelle à César ! '
  '12':
  - type: note
    content: Cf. 19.21 ; 23.11 ; 27.1.
  - type: text
    content: 'Alors Festus, après avoir délibéré avec le conseil, répondit : Tu en as appelé à César : tu iras devant César !'
  - type: heading
    content: Paul devant Agrippa et Bérénice
  '13':
  - type: text
    content: ' '
  - type: note
    content: le roi (9.15+) Agrippa II, fils d'Hérode Agrippa Ier (12.1n), et frère de Drusille (24.24n) et de Bérénice  ; celle-ci, qui sera connue plus tard comme la maîtresse de l'empereur Titus, était alors veuve et vivait avec son frère. Agrippa, connu comme ami des Romains, avait reçu de Claude, vers l'an 50, le royaume de son oncle Hérode de Chalcis, le premier mari de Bérénice. C'est lui qui avait la responsabilité du temple de Jérusalem et le pouvoir de nommer le grand prêtre. Bien que l'étendue de son royaume ait varié au fil du temps, notamment du fait de la guerre juive (66-73), il restera roi jusqu'à sa mort, entre 90 et 100 apr. J.-C.
  - type: text
    content: 'Quelques jours après, le roi Agrippa et Bérénice arrivèrent à Césarée et vinrent saluer Festus. '
  '14':
  - type: note
    content: 24.27. –  prisonnier 23.18+.
  - type: text
    content: 'Comme ils passaient là plusieurs jours, Festus exposa au roi le cas de Paul, en disant : Félix a laissé prisonnier un homme '
  '15':
  - type: note
    content: les grands prêtres et les anciens des Juifs 4.23+. –  porté plainte v. 1s ; 24.1+.
  - type: text
    content: 'contre qui, lorsque j''étais à Jérusalem, les grands prêtres et les anciens des Juifs ont porté plainte, pour demander sa condamnation. '
  '16':
  - type: note
    content: Cf. v. 11 ; 23.35.
  - type: text
    content: 'Je leur ai répondu que les Romains n''ont pas coutume de livrer un homme avant que l''accusé soit confronté avec ses accusateurs et qu''il ait l''occasion de se défendre des charges qui pèsent sur lui. '
  '17':
  - type: note
    content: 'sans aucun délai  : cf. 24.22ss. –  j''ai donné l''ordre… v. 6.'
  - type: text
    content: 'Ils sont alors venus ici ; sans aucun délai, le lendemain même, je me suis assis au tribunal et j''ai donné l''ordre d''amener cet homme. '
  '18':
  - type: note
    content: 23.29+ ; cf. 18.14s+.
  - type: text
    content: 'Quand ses accusateurs se sont présentés, ils n''ont mis à sa charge aucune des mauvaises actions dont, moi, je le soupçonnais ; '
  '19':
  - type: note
    content: 'leur propre religion  : cf. 17.22n. –  Jésus… vivant  : cf. 17.18,32 ; 20.10 ; 26.23s ; Lc 24.5,23 ; 2Co 13.4. –  prétendait 24.9+.'
  - type: text
    content: 'ils avaient seulement avec lui des débats relatifs à leur propre religion et à un certain Jésus, qui est mort et que Paul prétendait vivant. '
  '2':
  - type: note
    content: '24.1+. –  grands prêtres (Mt 2.4n  ; Mc 11.18n) / notables des Juifs (28.17+) : 4.23+ ; Lc 22.4,52 ; 23.13 ; 24.20.'
  - type: text
    content: 'Les grands prêtres et les notables des Juifs portèrent plainte auprès de lui contre Paul. Ils le sollicitaient '
  '20':
  - type: note
    content: V. 9.
  - type: text
    content: 'Quant à moi, perplexe devant un débat de cette sorte, je lui ai demandé s''il souhaitait aller à Jérusalem pour y être jugé là-dessus. '
  '21':
  - type: note
    content: 'V. 11+s. –  l''Auguste  : titre latin de l''empereur, dont le texte porte ici l''équivalent grec Sebastos (de même au v. 25 ; cf. 27.1n).'
  - type: text
    content: 'Mais Paul a fait appel, pour que son cas soit réservé à la compétence de l''Auguste ; j''ai donc donné l''ordre qu''on le garde jusqu''à ce que je l''envoie à César. '
  '22':
  - type: note
    content: Cf. Lc 23.8-12.
  - type: text
    content: 'Agrippa dit à Festus : Moi aussi, je souhaiterais entendre cet homme. – Demain, répondit-il, tu l''entendras.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.15 ; Lc 21.12/ /. –  et les hommes…  : texte occidental reconstitué (après ou à la place de l''expression les hommes de marque de la ville  ?)  : et ceux qui étaient descendus de la province.'
  - type: text
    content: 'Le lendemain, donc, Agrippa et Bérénice arrivèrent en grande pompe et entrèrent dans la salle d''audience avec les tribuns militaires et les hommes de marque de la ville. Sur l''ordre de Festus, Paul fut amené. '
  '24':
  - type: note
    content: 'toute la multitude  : cf. v. 2. –  à Jérusalem comme ici v. 1-7. –  en clamant qu''il ne devait plus vivre 22.22+. Texte occidental reconstitué  : pour que je le livre au châtiment sans qu''il ait pu se défendre. (25) Mais je ne pouvais pas le livrer à cause des ordres que nous avons de l''Auguste. J''ai donc dit que, si quelqu''un voulait l''accuser, il fallait qu''il m''accompagne à Césarée où il (Paul) était emprisonné. Quand ils sont venus, ils ont clamé qu''il devait être mis à mort. Mais après avoir entendu les deux parties j''ai compris qu''il n''avait rien fait qui mérite la mort. Cependant, quand j''ai dit : « Veux-tu être jugé avec eux à Jérusalem ? », il en a appelé à César.'
  - type: text
    content: 'Alors Festus dit : Roi Agrippa, et vous tous qui êtes présents avec nous, vous voyez cet homme au sujet de qui toute la multitude des Juifs est intervenue auprès de moi, à Jérusalem comme ici, en clamant qu''il ne devait plus vivre. '
  '25':
  - type: note
    content: V. 18,24n  ; 23.29+ ; 26.31s ; cf. 13.28 ; Lc 23.4,14,22. –  l'Auguste v. 21n.
  - type: text
    content: 'Quant à moi, j''ai compris qu''il n''avait rien fait qui mérite la mort ; mais comme lui-même en a appelé à l''Auguste, j''ai jugé bon de le lui envoyer. '
  '26':
  - type: note
    content: 'rien de précis  : autre traduction rien de sûr. –  au souverain  : le terme correspondant est habituellement traduit par seigneur  ; cf. 12.22. –  interrogatoire  : cf. 4.9n.'
  - type: text
    content: 'N''ayant rien de précis à écrire au souverain sur son compte, je l''ai fait comparaître devant vous, et en particulier devant toi, roi Agrippa, afin d''avoir, après l''interrogatoire, quelque chose à écrire. '
  '27':
  - type: note
    content: 'un prisonnier 23.18+. –  les motifs  : cf. 19.40.'
  - type: text
    content: Car il me semble absurde d'envoyer un prisonnier sans signifier les motifs de son inculpation.
  '3':
  - type: note
    content: 'demandant  : litt. demandant contre lui (Paul)  ; cf. 23.12-30 ; 25.15. – D''après une reconstitution, le texte occidental ajouterait à la fin du v. eux qui avaient fait un vœu pour l''avoir entre leurs mains.'
  - type: text
    content: 'en demandant, comme une faveur, qu''on le fasse venir à Jérusalem ; ils préparaient un guet-apens pour le supprimer en chemin. '
  '4':
  - type: text
    content: 'Festus répondit que Paul était gardé à Césarée et que lui-même allait partir sous peu. '
  '5':
  - type: note
    content: 'qualifiés  : autre traduction influents. –  si cet homme a fait quelque chose de mal  : autre traduction  : s''il y a quelque chose d''irrégulier dans le cas de cet homme  ; cf. Lc 23.41n  ; 2Th 3.2n.'
  - type: text
    content: Que ceux d'entre vous qui sont qualifiés descendent avec moi, dit-il ; et si cet homme a fait quelque chose de mal, qu'ils l'accusent !
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.30.
  - type: text
    content: 'Festus ne séjourna pas plus de huit à dix jours parmi eux, puis il redescendit à Césarée. Le lendemain, il s''assit au tribunal et donna l''ordre d''amener Paul. '
  '7':
  - type: note
    content: 24.5-8+ ; Lc 23.14s/ /.
  - type: text
    content: 'Quand celui-ci fut arrivé, les Juifs descendus de Jérusalem l''entourèrent et portèrent contre lui des accusations nombreuses et graves, qu''ils n''étaient pas capables de prouver. '
  '8':
  - type: note
    content: défense 22.1n  ; cf. 6.13+ ; 18.13+. – Voir péché. –  contre la loi / contre le temple 6.13+. –  César était le titre de l'empereur, alors Néron (54-68 apr. J.-C.) ; cf. v. 10-12,21 ; 17.7 ; 26.32 ; 27.24 ; 28.19.
  - type: text
    content: 'Paul disait pour sa défense : Je n''ai péché en rien, ni contre la loi des Juifs, ni contre le temple, ni contre César.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: accorder… 24.27+. –  Veux-tu… v. 20.
  - type: text
    content: 'Festus, qui voulait accorder une faveur aux Juifs, répondit à Paul : Veux-tu monter à Jérusalem pour y être jugé là-dessus devant moi ? '
