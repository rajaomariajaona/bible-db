        text: toute la multitude
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à Jérusalem comme ici '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 1-7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en clamant qu''il ne devait plus vivre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 22.22+. Texte occidental reconstitué
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour que je le livre au châtiment sans qu''il ait pu se défendre. (25) Mais je ne pouvais pas le livrer à cause des ordres que nous avons de l''Auguste. J''ai donc dit que, si quelqu''un voulait l''accuser, il fallait qu''il m''accompagne à Césarée où il (Paul) était emprisonné. Quand ils sont venus, ils ont clamé qu''il devait être mis à mort. Mais après avoir entendu les deux parties j''ai compris qu''il n''avait rien fait qui mérite la mort. Cependant, quand j''ai dit : « Veux-tu être jugé avec eux à Jérusalem ? », il en a appelé à César.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Festus dit : Roi Agrippa, et vous tous qui êtes présents avec nous, vous voyez cet homme au sujet de qui toute la multitude des Juifs est intervenue auprès de moi, à Jérusalem comme ici, en clamant qu''il ne devait plus vivre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
