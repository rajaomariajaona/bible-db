document_id: ACT.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul en appelle à César
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Césarée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.40'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 23.23+.'
    marker-yv: yv-n
  - type: text
    text: 'Trois jours après son arrivée dans la province, Festus monta de Césarée à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '24.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grands '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Mt 2.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mc 11.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') / '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'notables des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(28.17+) : 4.23+ ; Lc 22.4,52 ; 23.13 ; 24.20.'
    marker-yv: yv-n
  - type: text
    text: 'Les grands prêtres et les notables des Juifs portèrent plainte auprès de lui contre Paul. Ils le sollicitaient '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: demandant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: demandant contre lui (Paul)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 23.12-30 ; 25.15. – D''après une reconstitution, le texte occidental ajouterait à la fin du v. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: eux qui avaient fait un vœu pour l'avoir entre leurs mains.
    marker-yv: yv-n
  - type: text
    text: 'en demandant, comme une faveur, qu''on le fasse venir à Jérusalem ; ils préparaient un guet-apens pour le supprimer en chemin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Festus répondit que Paul était gardé à Césarée et que lui-même allait partir sous peu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qualifiés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: influents
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: si cet homme a fait quelque chose de mal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'il y a quelque chose d'irrégulier dans le cas de cet homme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Lc 23.41'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2Th 3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Que ceux d'entre vous qui sont qualifiés descendent avec moi, dit-il ; et si cet homme a fait quelque chose de mal, qu'ils l'accusent !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 22.30.
    marker-yv: yv-n
  - type: text
    text: 'Festus ne séjourna pas plus de huit à dix jours parmi eux, puis il redescendit à Césarée. Le lendemain, il s''assit au tribunal et donna l''ordre d''amener Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 24.5-8+ ; Lc 23.14s/ /.
    marker-yv: yv-n
  - type: text
    text: 'Quand celui-ci fut arrivé, les Juifs descendus de Jérusalem l''entourèrent et portèrent contre lui des accusations nombreuses et graves, qu''ils n''étaient pas capables de prouver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'défense '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 6.13+ ; 18.13+. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'contre la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'contre le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'César '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était le titre de l'empereur, alors Néron (54-68 apr. J.-C.) ; cf. v. 10-12,21 ; 17.7 ; 26.32 ; 27.24 ; 28.19.
    marker-yv: yv-n
  - type: text
    text: 'Paul disait pour sa défense : Je n''ai péché en rien, ni contre la loi des Juifs, ni contre le temple, ni contre César.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'accorder… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '24.27+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Veux-tu… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 20.
    marker-yv: yv-n
  - type: text
    text: 'Festus, qui voulait accorder une faveur aux Juifs, répondit à Paul : Veux-tu monter à Jérusalem pour y être jugé là-dessus devant moi ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '23.29+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: devant le tribunal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la même expression est traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'au tribunal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aux v. 6,17.
    marker-yv: yv-n
  - type: text
    text: 'Paul dit : Je me tiens devant le tribunal de César et c''est là que je dois être jugé. Je n''ai fait aucun tort aux Juifs, comme tu le sais fort bien toi-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: me livrer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe correspondant (aussi au v. 16) est employé au sens opposé d’'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'accorder la grâce de '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 3.14+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''en appelle à César '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',21 ; 26.32 ; 28.19.'
    marker-yv: yv-n
  - type: text
    text: 'Si j''ai fait du tort et si j''ai commis quoi que ce soit qui mérite la mort, je ne demande pas que la mort me soit épargnée ; mais s''il n''y a rien de vrai dans les accusations qu''ils portent contre moi, personne n''a le droit de me livrer à eux. J''en appelle à César ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 19.21 ; 23.11 ; 27.1.
    marker-yv: yv-n
  - type: text
    text: 'Alors Festus, après avoir délibéré avec le conseil, répondit : Tu en as appelé à César : tu iras devant César !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul devant Agrippa et Bérénice
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(9.15+) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Agrippa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'II, fils '
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Hérode
      - type: text
        text: ' Agrippa I'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' (12.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), et frère de Drusille (24.24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') et de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bérénice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; celle-ci, qui sera connue plus tard comme la maîtresse de l''empereur Titus, était alors veuve et vivait avec son frère. Agrippa, connu comme ami des Romains, avait reçu de Claude, vers l''an 50, le royaume de son oncle Hérode de Chalcis, le premier mari de Bérénice. C''est lui qui avait la responsabilité du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: ' de Jérusalem et le pouvoir de nommer le grand '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: . Bien que l'étendue de son royaume ait varié au fil du temps, notamment du fait de la guerre juive (66-73), il restera roi jusqu'à sa mort, entre 90 et 100 apr. J.-C.
    marker-yv: yv-n
  - type: text
    text: 'Quelques jours après, le roi Agrippa et Bérénice arrivèrent à Césarée et vinrent saluer Festus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '24.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prisonnier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 23.18+.
    marker-yv: yv-n
  - type: text
    text: 'Comme ils passaient là plusieurs jours, Festus exposa au roi le cas de Paul, en disant : Félix a laissé prisonnier un homme '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les grands prêtres et les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: anciens
      - type: text
        text: ' des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.23+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'porté plainte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1s ; 24.1+.
    marker-yv: yv-n
  - type: text
    text: 'contre qui, lorsque j''étais à Jérusalem, les grands prêtres et les anciens des Juifs ont porté plainte, pour demander sa condamnation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 11 ; 23.35.
    marker-yv: yv-n
  - type: text
    text: 'Je leur ai répondu que les Romains n''ont pas coutume de livrer un homme avant que l''accusé soit confronté avec ses accusateurs et qu''il ait l''occasion de se défendre des charges qui pèsent sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sans aucun délai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 24.22ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'j''ai donné l''ordre… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 6.
    marker-yv: yv-n
  - type: text
    text: 'Ils sont alors venus ici ; sans aucun délai, le lendemain même, je me suis assis au tribunal et j''ai donné l''ordre d''amener cet homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 23.29+ ; cf. 18.14s+.
    marker-yv: yv-n
  - type: text
    text: 'Quand ses accusateurs se sont présentés, ils n''ont mis à sa charge aucune des mauvaises actions dont, moi, je le soupçonnais ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur propre religion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jésus… vivant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.18,32 ; 20.10 ; 26.23s ; Lc 24.5,23 ; 2Co 13.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prétendait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 24.9+.
    marker-yv: yv-n
  - type: text
    text: 'ils avaient seulement avec lui des débats relatifs à leur propre religion et à un certain Jésus, qui est mort et que Paul prétendait vivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 9.
    marker-yv: yv-n
  - type: text
    text: 'Quant à moi, perplexe devant un débat de cette sorte, je lui ai demandé s''il souhaitait aller à Jérusalem pour y être jugé là-dessus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 11+s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'Auguste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : titre latin de l''empereur, dont le texte porte ici l''équivalent grec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sebastos '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (de même au v. 25 ; cf. 27.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Mais Paul a fait appel, pour que son cas soit réservé à la compétence de l''Auguste ; j''ai donc donné l''ordre qu''on le garde jusqu''à ce que je l''envoie à César. '
  - type: usfm
    marker: vlbl
