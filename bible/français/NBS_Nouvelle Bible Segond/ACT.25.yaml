      children:
      - type: text
        text: V. 18,24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 23.29+ ; 26.31s ; cf. 13.28 ; Lc 23.4,14,22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''Auguste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quant à moi, j''ai compris qu''il n''avait rien fait qui mérite la mort ; mais comme lui-même en a appelé à l''Auguste, j''ai jugé bon de le lui envoyer. '
  - type: usfm
    marker: vlbl
