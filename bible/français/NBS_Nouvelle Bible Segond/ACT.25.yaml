    marker-yv: yv-n
  - type: text
    text: 'N''ayant rien de précis à écrire au souverain sur son compte, je l''ai fait comparaître devant vous, et en particulier devant toi, roi Agrippa, afin d''avoir, après l''interrogatoire, quelque chose à écrire. '
