document_id: PSA.30,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Seigneur, tu m'as fait revivre
  - type: text
    content: ' '
  - type: note
    content: 'Chant 48 ; 65–68 ; 75–76 ; 83 ; 87–88 ; 92 ; 108 ; cf. 45–46 ; 96. –  la dédicace  : en hébreu Hanoukka , nom de la fête juive d''hiver commémorant la restauration du culte à l''époque des Maccabées (Jn 10.22n  ; cf. 1R 8.63). –  de la Maison  : c.-à-d., probablement, du temple  ; mais d''autres comprennent de la maison de David , c.-à-d. du palais royal (cf. 2S 5.6ss).'
  - type: text
    content: Psaume. Chant pour la dédicace de la Maison. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '6.6+. –  verser  : sous-entendu dans le texte. –  ta loyauté  : autre traduction ta vérité  ; cf. 25.5,10.'
  - type: text
    content: Que gagnes-tu à verser mon sang,
  - type: text
    content: à me faire descendre dans la fosse ?
  - type: text
    content: La poussière te célébrera-t-elle ?
  - type: text
    content: Racontera-t-elle ta loyauté ?
  '11':
  - type: text
    content: 'Entends, '
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-moi grâce !'
  - type: text
    content: Seigneur
  - type: text
    content: ', sois mon secours !'
  '12':
  - type: text
    content: ' '
  - type: note
    content: '126.5s ; Es 61.3. –  en danse  : cf. Jr 31.13 ; Lm 5.15. –  mon sac Es 20.2.'
  - type: text
    content: Tu as changé mes lamentations en danse,
  - type: text
    content: tu as délié mon sac et tu m'as ceint de joie,
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'ma gloire , d''après LXX ; le pronom personnel absent du texte hébreu y est peut-être sous-entendu (litt. qu''une gloire te chante et ne se taise pas ) ; cf. 7.6n. –  te chante 7.18n. –  je te célébrerai toujours  : cf. 52.11 ; 79.13 ; 104.33 ; 146.2 ; Es 38.20.'
  - type: text
    content: afin que ma gloire te chante, que je ne sois pas muet.
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, je te célébrerai toujours.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je t''exalte 18.1n  ; cf. 34.4 ; 99.5,9 ; 145.1 ; Ex 15.2 ; Es 25.1. –  tu m''as relevé  : au sens propre le verbe signifie puiser (de l''eau), cf. Ex 2.16,19 ; Pr 20.5 ; voir aussi Ps 18.16 ; 30.4 ; 130.1. –  mes ennemis… 13.5+.'
  - type: text
    content: 'Je t''exalte, '
  - type: text
    content: Seigneur
  - type: text
    content: ', car tu m''as relevé,'
  - type: text
    content: tu n'as pas laissé mes ennemis se réjouir à mon sujet.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'je t''ai appelé au secours  : cf. 3.5+. –  tu m''as guéri  : cf. 6.3+.'
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu,'
  - type: text
    content: je t'ai appelé au secours, et tu m'as guéri.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 16.10+ ; 49.16 ; 56.14 ; 71.20 ; 86.13 ; 116.8s ; Es 38.16-18. – Voir séjour des morts. –  loin de (ou d'entre, parmi ) ceux qui descendent… 22.30+.
  - type: text
    content: Seigneur
  - type: text
    content: ', tu m''as fait remonter du séjour des morts,'
  - type: text
    content: tu m'as fait revivre loin de ceux qui descendent dans le gouffre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.23ss ; 35.18 ; 40.10 ; 96.1 ; 116.14. –  Chantez 7.18n. –  en évoquant son nom sacré ou son saint nom  ; litt. l'évocation (ou le souvenir , cf. Ex 3.15n) de sa sainteté  ; de même en Ps 97.12 ; cf. 140.14.
  - type: text
    content: 'Chantez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous, ses fidèles,'
  - type: text
    content: célébrez-le en évoquant son nom sacré !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 54.7s. –  dure  : sous-entendu dans le texte. –  arrivent les pleurs  : litt. les larmes viennent passer la nuit ou viennent s''installer. –  le matin 46.6 ; 90.14 ; 143.8 ; cf. 5.4 ; 59.17 ; 88.14 ; 130.6.'
  - type: text
    content: Car sa colère dure un instant,
  - type: text
    content: mais sa faveur toute la vie ;
  - type: text
    content: le soir arrivent les pleurs,
  - type: text
    content: et le matin un cri de joie.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Je ne vacillerai jamais 10.6 ; Pr 1.32 ; 1Co 10.12.
  - type: text
    content: 'Je disais dans ma tranquillité :'
  - type: text
    content: Je ne vacillerai jamais !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'tu avais puissamment…  : traduction incertaine ; on pourrait aussi comprendre tu as établi sur ma montagne une forteresse  ; au lieu de ma montagne , LXX porte mon éclat  ; certains modifient légèrement le texte pour lire tu m''as placé sur une montagne puissante  ; cf. 18.34 ; 27.5 ; 2S 5.9-11 ; 1R 15.4n  ; 2Ch 24.13. –  Tu t''es détourné  : litt. tu as caché ta face  ; 13.2+ ; cf. 104.29.'
  - type: text
    content: Seigneur
  - type: text
    content: ', par ta faveur tu avais puissamment affermi ma montagne…'
  - type: text
    content: Tu t'es détourné, et j'ai été saisi d'épouvante.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Seigneur / Seigneur  : hébreu YHWH / ’Adonaï , cf. Ex 3.15n.'
  - type: text
    content: Seigneur
  - type: text
    content: ', je t''invoque !'
  - type: text
    content: 'Je supplie le Seigneur :'
