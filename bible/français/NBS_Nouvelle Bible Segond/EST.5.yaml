        text: '5.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ma demande…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la phrase ne sera complétée qu''en 7.3.'
    marker-yv: yv-n
  - type: text
