    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.7-10,14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le roi l''avait distingué '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.1.
    marker-yv: yv-n
  - type: text
    text: 'Haman leur conta sa richesse prestigieuse, le nombre de ses fils, toutes les façons dont le roi l''avait distingué en l''élevant au-dessus des princes et des gens de la cour du roi. '
  - type: usfm
