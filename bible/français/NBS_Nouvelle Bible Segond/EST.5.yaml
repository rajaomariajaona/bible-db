  - type: text
    text: 'Quand le troisième jour fut arrivé, Esther revêtit les vêtements royaux et se présenta dans la cour intérieure de la maison du roi, face à la maison du roi. Le roi était assis sur son trône royal dans la maison royale, face à l''entrée de la maison. '
