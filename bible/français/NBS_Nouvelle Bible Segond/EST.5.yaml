    marker-yv: yv-n
  - type: text
    text: 'Zéresh, sa femme, et tous ses amis lui dirent : Qu''on dresse donc une potence haute de cinquante coudées, et demain matin tu demanderas au roi qu''on y pende Mardochée. Tu peux donc aller joyeux au banquet avec le roi. La chose plut à Haman. Il dressa la potence.'
