  - type: text
    text: 'Au moment même où le roi vit la reine Esther debout dans la cour, elle eut grâce à ses yeux. Le roi tendit à Esther le sceptre d''or qu''il avait en main. Esther approcha et toucha la pointe du sceptre. '
