      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dit-il
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dit Haman
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 3s,8 ; Pr 27.1.'
    marker-yv: yv-n
  - type: text
    text: 'Et même, leur dit-il, c''est moi et personne d''autre que la reine Esther a invité avec le roi au banquet qu''elle donnait, et demain encore c''est moi qu''elle a convié avec le roi. '
  - type: usfm
    marker: v
