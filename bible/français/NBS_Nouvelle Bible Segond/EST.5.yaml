  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 9 ; cf. 1R 21.4.
    marker-yv: yv-n
  - type: text
    text: 'Et pourtant, tout cela ne vaut rien pour moi tant que je verrai ce Juif, Mardochée, assis à la porte du roi. '
  - type: usfm
