  - type: text
    text: 'Ce jour-là Haman sortit joyeux, le cœur content. Soudain Haman vit Mardochée à la porte du Roi. Celui-ci ne se levait pas et ne tremblait pas devant lui. Alors Haman fut rempli de fureur au sujet de Mardochée. '
