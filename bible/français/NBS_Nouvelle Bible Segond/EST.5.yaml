  - type: text
    text: Si j'ai trouvé grâce à tes yeux, ô roi, et s'il te semble bon de m'accorder ma demande et d'exaucer ma requête, daigne venir avec Haman au banquet que je donne pour vous, et demain je ferai selon ta parole.
