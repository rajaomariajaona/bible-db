document_id: EST.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Démarche d'Esther auprès du roi
  - type: text
    content: ' '
  - type: note
    content: '4.11+,16. –  revêtit…  : litt. revêtit la royauté  ; expressions comparables en 6.8 ; 8.15. –  dans la cour 6.4. –  maison royale 1.5+.'
  - type: text
    content: 'Quand le troisième jour fut arrivé, Esther revêtit les vêtements royaux et se présenta dans la cour intérieure de la maison du roi, face à la maison du roi. Le roi était assis sur son trône royal dans la maison royale, face à l''entrée de la maison. '
  '10':
  - type: note
    content: 'il se domina  : litt. Haman se domina. –  ses amis / sa femme 6.13.'
  - type: text
    content: 'Mais il se domina et rentra chez lui. Il envoya chercher ses amis et Zéresh, sa femme. '
  '11':
  - type: note
    content: 'conta  : autre traduction fit le compte de. –  richesse  : cf. 3.9 ; Ps 49.7 ; 52.9 ; 1Tm 6.17. –  nombre de ses fils 9.7-10,14. –  le roi l''avait distingué 3.1.'
  - type: text
    content: 'Haman leur conta sa richesse prestigieuse, le nombre de ses fils, toutes les façons dont le roi l''avait distingué en l''élevant au-dessus des princes et des gens de la cour du roi. '
  '12':
  - type: note
    content: 'dit-il  : litt. dit Haman  ; cf. v. 3s,8 ; Pr 27.1.'
  - type: text
    content: 'Et même, leur dit-il, c''est moi et personne d''autre que la reine Esther a invité avec le roi au banquet qu''elle donnait, et demain encore c''est moi qu''elle a convié avec le roi. '
  '13':
  - type: note
    content: V. 9 ; cf. 1R 21.4.
  - type: text
    content: 'Et pourtant, tout cela ne vaut rien pour moi tant que je verrai ce Juif, Mardochée, assis à la porte du roi. '
  '14':
  - type: note
    content: '6.4 ; 7.9. –  une potence 2.23n. –  cinquante coudées  : environ 25 m ; voir mesures. –  Il dressa  : autre traduction il fit dresser.'
  - type: text
    content: 'Zéresh, sa femme, et tous ses amis lui dirent : Qu''on dresse donc une potence haute de cinquante coudées, et demain matin tu demanderas au roi qu''on y pende Mardochée. Tu peux donc aller joyeux au banquet avec le roi. La chose plut à Haman. Il dressa la potence.'
  '2':
  - type: note
    content: 'elle eut grâce…  : cf. v. 8 (autre verbe) ; 2.9n,15n. –  sceptre 4.11+.'
  - type: text
    content: 'Au moment même où le roi vit la reine Esther debout dans la cour, elle eut grâce à ses yeux. Le roi tendit à Esther le sceptre d''or qu''il avait en main. Esther approcha et toucha la pointe du sceptre. '
  '3':
  - type: note
    content: V. 6 ; 7.2 ; 9.12 ; Mc 6.23.
  - type: text
    content: 'Le roi lui dit : Qu''as-tu, reine Esther ? Quelle est ta requête ? Jusqu''à la moitié du royaume, elle te sera accordée ! '
  '4':
  - type: note
    content: 'banquet 1.3n  ; cf. v. 8,12,14 ; 7.1. –  pour toi  : on pourrait aussi comprendre pour lui (cf. v. 8).'
  - type: text
    content: 'Esther lui répondit : Si cela te semble bon, ô roi, daigne venir aujourd''hui avec Haman au banquet que je donne pour toi. '
  '5':
  - type: note
    content: 'donner suite à l''invitation  : litt. faire la parole.'
  - type: text
    content: 'Le roi dit : Pressez Haman de donner suite à l''invitation d''Esther. Le roi et Haman vinrent au banquet que donnait Esther. '
  '6':
  - type: note
    content: 'Pendant le banquet  : litt. dans le banquet du vin (même expression en 7.2,7s) ; autre traduction pendant qu''on buvait du vin  ; cf. 1.3n. –  demande / requête v. 3+. –  accordée / exaucée  : litt. donnée / faite.'
  - type: text
    content: 'Pendant le banquet, le roi dit à Esther : Quelle est ta demande ? Elle te sera accordée ! Quelle est ta requête ? Jusqu''à la moitié du royaume, elle sera exaucée ! '
  '7':
  - type: note
    content: 'Ma demande…  : la phrase ne sera complétée qu''en 7.3.'
  - type: text
    content: 'Esther répondit : Ma demande, ma requête… ? '
  '8':
  - type: note
    content: 'trouvé grâce…  : cf. v. 2 ; voir aussi 7.3 ; 8.5 ; Gn 18.3n. –  banquet v. 4+. –  je ferai selon ta parole (litt. selon la parole du roi), c.-à-d. je répondrai explicitement.'
  - type: text
    content: Si j'ai trouvé grâce à tes yeux, ô roi, et s'il te semble bon de m'accorder ma demande et d'exaucer ma requête, daigne venir avec Haman au banquet que je donne pour vous, et demain je ferai selon ta parole.
  - type: heading
    content: Haman dresse une potence pour Mardochée
  '9':
  - type: text
    content: ' '
  - type: note
    content: le cœur content 1.10n. –  porte du Roi 2.19n. –  ne se levait pas 3.2. –  fureur 1.12+ ; 3.5.
  - type: text
    content: 'Ce jour-là Haman sortit joyeux, le cœur content. Soudain Haman vit Mardochée à la porte du Roi. Celui-ci ne se levait pas et ne tremblait pas devant lui. Alors Haman fut rempli de fureur au sujet de Mardochée. '
