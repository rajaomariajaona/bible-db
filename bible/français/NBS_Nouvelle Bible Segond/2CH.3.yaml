document_id: 2CH.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La construction du temple
  - type: heading
    content: 1R 6
  - type: text
    content: ' '
  - type: note
    content: 'au mont Moriya  : la tradition juive l''identifie au lieu où Abraham a failli sacrifier son fils Isaac ; voir Gn 22.2n. –  là où il était apparu  : il faut vraisemblablement comprendre là où le Seigneur était apparu  ; autre traduction à l''endroit qui avait été indiqué . –  l''aire d''Ornân…  : cf. 1Ch 21.15 ; voir aussi 2S 24.16,18-25.'
  - type: text
    content: 'Salomon commença à bâtir la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Jérusalem, au mont Moriya, là où il était apparu à David, son père, au lieu que David avait préparé sur l''aire d''Ornân, le Jébusite. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'sculptés  : LXX en bois  ; cf. 1R 6.23.'
  - type: text
    content: 'Il fit dans la maison du Très-Sacré deux keroubim sculptés, et on les recouvrit d''or. '
  '11':
  - type: note
    content: cinq coudées ≈ 2,25 m.
  - type: text
    content: 'Les ailes des keroubim avaient vingt coudées de longueur. L''aile du premier, longue de cinq coudées, touchait la paroi de la maison et l''autre aile, longue de cinq coudées, touchait l''aile de l''autre keroub. '
  '12':
  - type: note
    content: 'de l''autre keroub… du premier keroub  : litt. d''un keroub… de l''autre keroub  ; formule identique à celle du v. 11, pour décrire deux côtés symétriques.'
  - type: text
    content: 'L''aile de l''autre keroub, longue de cinq coudées, touchait la paroi de la Maison, et l''autre aile, longue de cinq coudées, rejoignait l''aile du premier keroub. '
  '13':
  - type: note
    content: 'Ils étaient debout  : litt. ils se tenaient sur leurs pieds ou sur leurs jambes.'
  - type: text
    content: Les ailes de ces keroubim, déployées, avaient vingt coudées. Ils étaient debout, leurs faces tournées vers la Maison.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'byssos 1Ch 4.21n. –  il y représenta  : litt. il fit monter sur lui.'
  - type: text
    content: Il fit le voile de pourpre violette et rouge, de carmin et de byssos, et il y représenta des keroubim.
  - type: heading
    content: Les colonnes de bronze et l'autel
  - type: heading
    content: 1R 7.15-22
  '15':
  - type: text
    content: ' '
  - type: note
    content: trente-cinq… cinq coudées ≈ 15,70 m et 2,25 m ; voir mesures.
  - type: text
    content: 'Il fit devant la Maison deux colonnes de trente-cinq coudées de hauteur, avec un chapiteau de cinq coudées à leur sommet. '
  '16':
  - type: note
    content: 'Il fit des chaînettes…  : litt. il fit des chaînettes dans le Secret (cf. 1R 6.5n) ; certains modifient le texte hébreu traditionnel pour lire  : il fit des chaînettes en collier (même terme en Gn 41.42 ; Ez 16.11).'
  - type: text
    content: 'Il fit des chaînettes comme celles qui étaient dans le Secret, et les plaça au sommet des colonnes, et il fit cent grenades qu''il mit dans les chaînettes. '
  '17':
  - type: note
    content: 'temple  : cf. 1R 6.3+.'
  - type: text
    content: Il dressa les colonnes sur le devant du temple, l'une à droite et l'autre à gauche ; il appela celle de droite du nom de Yakîn, et celle de gauche du nom de Booz.
  '2':
  - type: note
    content: 'le deuxième jour  : précision omise par la plupart des versions anciennes.'
  - type: text
    content: 'Il commença à bâtir le deuxième jour du deuxième mois de la quatrième année de son règne. '
  '3':
  - type: note
    content: 'Voici sur quelles fondations…  : d''après Tg, certains modifient le texte hébreu traditionnel pour lire voici les dimensions que Salomon lui assigna lorsqu''il bâtit… –  soixante coudées… vingt coudées  : environ 27 m x 9 m ; contrairement à 1R 6.2, la hauteur n''est pas spécifiée (voir v. 4). –  coudées de l''ancienne mesure  : environ 45 cm (voir mesures) ; voir aussi Ez 40.5n.'
  - type: text
    content: 'Voici sur quelles fondations Salomon bâtit la maison de Dieu : la longueur était de soixante coudées, en coudées de l''ancienne mesure, et la largeur de vingt coudées. '
  '4':
  - type: note
    content: cent-vingt de hauteur ≈ 54 m.
  - type: text
    content: 'Le vestibule sur le devant avait vingt coudées de longueur, correspondant à la largeur de la Maison, et cent-vingt de hauteur. Il le recouvrit d''or pur à l''intérieur. '
  '5':
  - type: note
    content: 'grande maison  : cf. 2.4+. –  meilleur  : litt. bon, de même au v. 8 ; quelques mss hébreux et LXX portent pur.'
  - type: text
    content: 'Il couvrit de bois de cyprès la grande maison ; il la couvrit du meilleur or, et il y représenta des branches de palmiers et des chaînettes. '
  '6':
  - type: note
    content: 'de l''or de Parvaïm  : précision propre aux Chroniques ; LXX y a vu un nom de lieu (inconnu par ailleurs) ; Syr et Vg, en revanche, un qualificatif (or excellent, éprouvé).'
  - type: text
    content: 'Il recouvrit la Maison de pierres précieuses splendides ; l''or était de l''or de Parvaïm. '
  '7':
  - type: text
    content: Il couvrit d'or la Maison, les poutres, les seuils, les parois et les battants des portes, et il grava des keroubim sur les parois.
  '8':
  - type: text
    content: ' '
  - type: note
    content: la maison ou la salle , cf. v. 10. –  Très-Sacré Ex 29.37n  ; 1R 6.16+. –  six cents talents ≈ 20,5 t.
  - type: text
    content: 'Il fit la maison du Très-Sacré ; elle avait vingt coudées de longueur, ce qui correspondait à la largeur de la Maison, et vingt coudées de largeur. Il la couvrit du meilleur or, pour six cents talents, '
  '9':
  - type: text
    content: et le poids de l'or pour les clous se montait à cinquante sicles. Il couvrit aussi d'or les chambres à l'étage.
