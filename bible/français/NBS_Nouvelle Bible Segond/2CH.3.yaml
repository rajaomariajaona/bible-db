  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au mont Moriya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la tradition juive l''identifie au lieu où Abraham a failli sacrifier son fils Isaac ; voir Gn 22.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: là où il était apparu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : il faut vraisemblablement comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'là où le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' était apparu'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à l'endroit qui avait été indiqué
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'aire d'Ornân…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1Ch 21.15 ; voir aussi 2S 24.16,18-25.'
    marker-yv: yv-n
  - type: text
    text: 'Salomon commença à bâtir la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' à Jérusalem, au mont Moriya, là où il était apparu à David, son père, au lieu que David avait préparé sur l''aire d''Ornân, le Jébusite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le deuxième jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : précision omise par la plupart des versions anciennes.'
    marker-yv: yv-n
  - type: text
    text: 'Il commença à bâtir le deuxième jour du deuxième mois de la quatrième année de son règne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Voici sur quelles fondations…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ', certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'voici les dimensions que Salomon lui assigna lorsqu''il bâtit… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: soixante coudées… vingt coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 27 m x 9 m ; contrairement à 1R 6.2, la hauteur n''est pas spécifiée (voir v. 4). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: coudées de l'ancienne mesure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 45 cm (voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ) ; voir aussi Ez 40.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici sur quelles fondations Salomon bâtit la maison de Dieu : la longueur était de soixante coudées, en coudées de l''ancienne mesure, et la largeur de vingt coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cent-vingt de hauteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ≈ 54 m.
    marker-yv: yv-n
  - type: text
    text: 'Le vestibule sur le devant avait vingt coudées de longueur, correspondant à la largeur de la Maison, et cent-vingt de hauteur. Il le recouvrit d''or pur à l''intérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: grande maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.4+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: meilleur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 8 ; quelques mss hébreux et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' portent '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il couvrit de bois de cyprès la grande maison ; il la couvrit du meilleur or, et il y représenta des branches de palmiers et des chaînettes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de l'or de Parvaïm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : précision propre aux Chroniques ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' y a vu un nom de lieu (inconnu par ailleurs) ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ', en revanche, un qualificatif ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: or excellent, éprouvé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Il recouvrit la Maison de pierres précieuses splendides ; l''or était de l''or de Parvaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il couvrit d'or la Maison, les poutres, les seuils, les parois et les battants des portes, et il grava des keroubim sur les parois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la salle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Très-Sacré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 29.37
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1R 6.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'six cents talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ≈ 20,5 t.
    marker-yv: yv-n
  - type: text
    text: 'Il fit la maison du Très-Sacré ; elle avait vingt coudées de longueur, ce qui correspondait à la largeur de la Maison, et vingt coudées de largeur. Il la couvrit du meilleur or, pour six cents talents, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: et le poids de l'or pour les clous se montait à cinquante sicles. Il couvrit aussi d'or les chambres à l'étage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sculptés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en bois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 1R 6.23.
    marker-yv: yv-n
  - type: text
    text: 'Il fit dans la maison du Très-Sacré deux keroubim sculptés, et on les recouvrit d''or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cinq coudées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ≈ 2,25 m.
    marker-yv: yv-n
  - type: text
    text: 'Les ailes des keroubim avaient vingt coudées de longueur. L''aile du premier, longue de cinq coudées, touchait la paroi de la maison et l''autre aile, longue de cinq coudées, touchait l''aile de l''autre keroub. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de l'autre keroub… du premier keroub
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'un keroub… de l'autre keroub
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; formule identique à celle du v. 11, pour décrire deux côtés symétriques.'
    marker-yv: yv-n
  - type: text
    text: 'L''aile de l''autre keroub, longue de cinq coudées, touchait la paroi de la Maison, et l''autre aile, longue de cinq coudées, rejoignait l''aile du premier keroub. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils étaient debout
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils se tenaient sur leurs pieds '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur leurs jambes.
    marker-yv: yv-n
  - type: text
    text: Les ailes de ces keroubim, déployées, avaient vingt coudées. Ils étaient debout, leurs faces tournées vers la Maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'byssos '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Ch 4.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il y représenta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il fit monter sur lui.
    marker-yv: yv-n
  - type: text
    text: Il fit le voile de pourpre violette et rouge, de carmin et de byssos, et il y représenta des keroubim.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les colonnes de bronze et l'autel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1R 7.15-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'trente-cinq… cinq coudées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '≈ 15,70 m et 2,25 m ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit devant la Maison deux colonnes de trente-cinq coudées de hauteur, avec un chapiteau de cinq coudées à leur sommet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il fit des chaînettes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il fit des chaînettes dans le Secret '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 1R 6.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; certains modifient le texte hébreu traditionnel pour lire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il fit des chaînettes en collier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même terme en Gn 41.42 ; Ez 16.11).
    marker-yv: yv-n
  - type: text
    text: 'Il fit des chaînettes comme celles qui étaient dans le Secret, et les plaça au sommet des colonnes, et il fit cent grenades qu''il mit dans les chaînettes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 6.3+.'
    marker-yv: yv-n
  - type: text
    text: Il dressa les colonnes sur le devant du temple, l'une à droite et l'autre à gauche ; il appela celle de droite du nom de Yakîn, et celle de gauche du nom de Booz.
