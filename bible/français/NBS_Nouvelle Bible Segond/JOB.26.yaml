document_id: JOB.26,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Réplique de Job : quel triste secours tu m''offres là !'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Job répondit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 1.2,4,7,14 ; Pr 8.27.
      marker-yv: yv-n
    - type: text
      text: Il a tracé un cercle sur les eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à la limite entre la lumière et les ténèbres.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les colonnes du ciel s'ébranlent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sont stupéfaites quand il les rabroue.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il agite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il fend, il apaise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Es 51.15 ; Jr 31.35 ; voir aussi 7.12 ; 38.8-11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rahav
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 51.9 ; Ps 89.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Par sa force il agite la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par son intelligence il fracasse Rahav.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le ciel devient immaculé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '37.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le serpent fuyard
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : qualificatif de Léviathan (cf. 3.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 27.1).'
      marker-yv: yv-n
    - type: text
      text: Par son souffle le ciel devient immaculé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa main transperce le serpent fuyard.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de son œuvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de sa voie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quel murmure…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.12 ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la parole que nous entendons à ce sujet est bien peu de chose
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Voir aussi 28.1-28 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '43.32 : « Il y a bien des choses cachées plus grandes que celles-là, car nous n''avons vu que peu de ses œuvres. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sa puissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses hauts faits.
      marker-yv: yv-n
    - type: text
      text: Si tels sont les bords de son œuvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – et quel murmure en percevons-nous ? –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui comprendra le tonnerre de sa puissance ?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 15.11+.
      marker-yv: yv-n
    - type: text
      text: Comme tu sais bien venir au secours de celui qui n'a pas de force !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme tu sais bien sauver le bras qui n'a pas de puissance !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: raisonnement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 5.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Comme tu sais bien conseiller celui qui n'a pas de sagesse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle puissance de raisonnement tu fais connaître !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qui est-ce…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le souffle de qui sort de toi ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1R 22.24.
      marker-yv: yv-n
    - type: text
      text: A qui s'adressent tes propos ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est-ce qui t'inspire ?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'On a vu dans les v. 5-14 de ce chapitre une suite du discours de Bildad au chapitre 25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ombres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: repha'im
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme qui désigne les êtres affaiblis censés peupler le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: séjour
        - type: text
          text: ' des morts ; cf. Es 14.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 88.11.'
      marker-yv: yv-n
    - type: text
      text: Les ombres tremblent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au-dessous des eaux et de ceux qui y demeurent ;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devant lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : devant Dieu. Cf. Am 9.2 ; Ps 139.8,11s ; Pr 15.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: monde des disparus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’avaddôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’abaddôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même en 28.22 ; 31.12 ; Ps 88.12 ; Pr 15.11 ; 27.20 ; cf. Ap 9.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: devant lui le séjour des morts est nu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le monde des disparus est à découvert.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 9.6 ; 38.4,6.
      marker-yv: yv-n
    - type: text
      text: Il déploie le Nord sur le chaos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il suspend la terre sur le néant.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 37.18 ; 38.22.
      marker-yv: yv-n
    - type: text
      text: Il enferme les eaux dans ses nuages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les nuées ne crèvent pas sous leur poids.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nuée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 13.21+.
      marker-yv: yv-n
    - type: text
      text: Il couvre la face de son trône,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il déploie sur lui sa nuée.
