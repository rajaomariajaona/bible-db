document_id: JOB.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job : quel triste secours tu m''offres là !'
  - type: text
    content: 'Job répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Gn 1.2,4,7,14 ; Pr 8.27.
  - type: text
    content: Il a tracé un cercle sur les eaux,
  - type: text
    content: jusqu'à la limite entre la lumière et les ténèbres.
  '11':
  - type: text
    content: Les colonnes du ciel s'ébranlent
  - type: text
    content: et sont stupéfaites quand il les rabroue.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'il agite  : autres traductions il fend, il apaise  ; cf. Es 51.15 ; Jr 31.35 ; voir aussi 7.12 ; 38.8-11. –  Rahav  : cf. 9.13n  ; Es 51.9 ; Ps 89.11n.'
  - type: text
    content: Par sa force il agite la mer,
  - type: text
    content: par son intelligence il fracasse Rahav.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'le ciel devient immaculé 37.21. –  le serpent fuyard  : qualificatif de Léviathan (cf. 3.8n  ; Es 27.1).'
  - type: text
    content: Par son souffle le ciel devient immaculé,
  - type: text
    content: sa main transperce le serpent fuyard.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'de son œuvre  : litt. de sa voie . –  quel murmure…  : cf. 4.12 ; autre traduction la parole que nous entendons à ce sujet est bien peu de chose . Voir aussi 28.1-28 ; Siracide 43.32 : « Il y a bien des choses cachées plus grandes que celles-là, car nous n''avons vu que peu de ses œuvres. » –  sa puissance ou ses hauts faits.'
  - type: text
    content: Si tels sont les bords de son œuvre,
  - type: text
    content: – et quel murmure en percevons-nous ? –
  - type: text
    content: qui comprendra le tonnerre de sa puissance ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 15.11+.
  - type: text
    content: Comme tu sais bien venir au secours de celui qui n'a pas de force !
  - type: text
    content: Comme tu sais bien sauver le bras qui n'a pas de puissance !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'raisonnement  : cf. 5.12n.'
  - type: text
    content: Comme tu sais bien conseiller celui qui n'a pas de sagesse !
  - type: text
    content: Quelle puissance de raisonnement tu fais connaître !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Qui est-ce…  : litt. le souffle de qui sort de toi ? Cf. 1R 22.24.'
  - type: text
    content: A qui s'adressent tes propos ?
  - type: text
    content: Qui est-ce qui t'inspire ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'On a vu dans les v. 5-14 de ce chapitre une suite du discours de Bildad au chapitre 25. –  ombres  : hébreu repha''im , terme qui désigne les êtres affaiblis censés peupler le séjour des morts ; cf. Es 14.9n  ; Ps 88.11.'
  - type: text
    content: Les ombres tremblent
  - type: text
    content: au-dessous des eaux et de ceux qui y demeurent ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'devant lui  : devant Dieu. Cf. Am 9.2 ; Ps 139.8,11s ; Pr 15.11. –  monde des disparus  : hébreu ’avaddôn ou ’abaddôn , de même en 28.22 ; 31.12 ; Ps 88.12 ; Pr 15.11 ; 27.20 ; cf. Ap 9.11n.'
  - type: text
    content: devant lui le séjour des morts est nu,
  - type: text
    content: le monde des disparus est à découvert.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.6 ; 38.4,6.
  - type: text
    content: Il déploie le Nord sur le chaos,
  - type: text
    content: il suspend la terre sur le néant.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 37.18 ; 38.22.
  - type: text
    content: Il enferme les eaux dans ses nuages,
  - type: text
    content: et les nuées ne crèvent pas sous leur poids.
  '9':
  - type: text
    content: ' '
  - type: note
    content: nuée Ex 13.21+.
  - type: text
    content: Il couvre la face de son trône,
  - type: text
    content: il déploie sur lui sa nuée.
