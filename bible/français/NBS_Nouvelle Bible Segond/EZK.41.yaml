document_id: EZK.41,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'le temple , c.-à-d. le lieu dit Sacré (1R 8.8) ; cf. 1R 6.3,17 ; 8.8 ; Es 6.1n. –  six coudées ≈ 3,10 m. –  la largeur de la tente  : expression de sens incertain, omise par LXX.'
  - type: text
    content: 'Il me conduisit dans le temple. Il mesura les piliers : six coudées de largeur d''un côté, et six coudées de largeur de l''autre, la largeur de la tente.'
  '10':
  - type: note
    content: 'autour de la Maison  : c.-à-d. sur le pourtour de la cour intérieure, voir 42.1-9. –  vingt coudées ≈ 10,50 m.'
  - type: text
    content: 'et les salles autour de la Maison avait une largeur de vingt coudées, tout autour. '
  '11':
  - type: note
    content: 'l''espace libre  : litt. le lieu de l''espace libre (v. 9n) ; compte tenu de la différence de mesure (cf. v. 10) il s''agit peut-être ici d''une allée ou d''un passage dallé (cf. 40.17s) qui n''occupe qu''une partie de la cour intérieure.'
  - type: text
    content: L'entrée des pièces latérales donnait sur l'espace libre, une entrée au nord et une entrée au sud, et la largeur de l'espace libre était de cinq coudées tout autour.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'secteur  : traduction incertaine ; le mot semble apparenté à un verbe habituellement traduit par couper, tailler (on a aussi traduit cour ; espace clos , de même dans la suite et au chap. 42) ; il est situé ici entre le mur ouest (litt. chemin de la mer ) du sanctuaire et le mur d''enceinte. –  soixante-dix , cinq et quatre-vingt-dix coudées ≈ 37 m, 2,60 m et 47 m, respectivement.'
  - type: text
    content: 'Le bâtiment qui était sur le front du secteur situé du côté de l''ouest avait une largeur de soixante-dix coudées, le mur du bâtiment cinq coudées d''épaisseur tout autour, et sa longueur était de quatre-vingt-dix coudées. '
  '13':
  - type: note
    content: cent coudées ≈ 52 m.
  - type: text
    content: 'Il mesura la Maison : cent coudées de longueur, le secteur, le bâtiment et ses murs : cent coudées de longueur. '
  '14':
  - type: text
    content: 'Largeur de la façade de la Maison et du secteur, du côté de l''est : cent coudées. '
  '15':
  - type: note
    content: 'galeries  : traduction incertaine, terme technique inconnu par ailleurs ; autres possibilités passages ; terrassements (cf. v. 16 ; 42.3s). –  temple intérieur  : cf. 1R 6.14-18. –  extérieurs  : traduction d''après LXX ; hébreu de la cour.'
  - type: text
    content: 'Il mesura la longueur du bâtiment sur le front du secteur à l''arrière et ses galeries de chaque côté : cent coudées.'
  - type: heading
    content: L'intérieur du temple
  - type: text
    content: 'Le temple intérieur, les vestibules extérieurs, '
  '16':
  - type: note
    content: 'Texte obscur. –  les seuils  : LXX (étaient) lambrissés, expression se rapportant à l''énumération du v. 15. –  fenêtres grillagées 40.16n. –  galeries v. 15n. –  aux trois étages  : autre traduction sur les trois côtés. –  des seuils  : litt. du seuil (la précision est omise par LXX). –  d''un lambris de bois  : traduction conjecturale ; le mot hébreu est proche d''un terme assyro-babylonien qui désigne une variété de bois. –  fermées  : litt. couvertes, peut-être d''un treillis.'
  - type: text
    content: 'les seuils, les fenêtres grillagées, les galeries du pourtour aux trois étages en face des seuils, étaient recouverts d''un lambris de bois tout autour, depuis le sol jusqu''aux fenêtres, et les fenêtres étaient fermées. '
  '17':
  - type: note
    content: 'il y avait des mesures  : le terme hébreu correspondant est omis par LXX ; beaucoup de traducteurs en permutent deux lettres pour lire des figures ou des représentations (18) de keroubim…'
  - type: text
    content: 'Au-dessus de l''entrée, jusqu''au dedans de la Maison, au dehors sur tout le mur du pourtour, à l''intérieur et à l''extérieur, il y avait des mesures, '
  '18':
  - type: note
    content: 40.16 ; 1R 6.29.
  - type: text
    content: 'et on y avait fait des keroubim et des branches de palmiers. Il y avait une branche de palmier entre deux keroubim. Chaque keroub avait deux visages : '
  '19':
  - type: note
    content: Cf. 9.3+ ; 10.14.
  - type: text
    content: 'une face d''homme tournée d''un côté vers la branche de palmier, et une face de jeune lion tournée de l''autre côté vers l''autre branche de palmier ; il en était ainsi tout autour de la Maison. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'dix coudées (cf. 40.11 ; 1R 6.3), cinq , quarante et vingt coudées ≈ 5,20 m, 2,60 m, 21 m et 10,50 m, respectivement. –  les côtés  : litt. les côtés de l''entrée  ; il s''agit ici des pans de mur situés de chaque côté de la porte v. 3n,26 ; 40.48n  ; cf. 40.18n.'
  - type: text
    content: 'La largeur de l''entrée était de dix coudées : les côtés étaient de cinq coudées d''une part et de cinq coudées d''autre part. Il mesura la longueur : quarante coudées ; la largeur : vingt coudées. '
  '20':
  - type: note
    content: 'du temple  : le mot hébreu correspondant est signalé comme devant être omis à la lecture, dans le texte ; il revient au tout début du v. 21 (cf. 46.22n).'
  - type: text
    content: 'Depuis le sol jusqu''au-dessus de l''entrée, on avait fait des keroubim et des branches de palmiers, et aussi sur le mur du temple. '
  '21':
  - type: note
    content: 'Texte obscur ; cf. 1R 6.31-33. –  montants de porte 43.8n  ; 45.19 ; 46.2 ; même mot Ex 21.6 ; Dt 6.9 etc. – Le sanctuaire (v. 23) correspond ici au Très-Sacré du v. 4. –  avait le même aspect  : traduction conjecturale ; on pourrait aussi comprendre était conforme à la vision ou, en enchaînant avec le v. 22  : et, devant le sanctuaire, quelque chose dont l''aspect paraissait être celui (22) d''un autel de bois… (voir 1.1n).'
  - type: text
    content: Les montants de porte du temple étaient à angle droit, et la façade du sanctuaire avait le même aspect.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'autel  : cf. Ex 30.1-3 ; 1R 6.20s. –  haut de trois coudées (≈ 1,60 m) et long de deux coudées (≈ 1,05 m) : LXX ajoute et large de deux coudées  ; voir mesures, poids et monnaies. –  ses coins  : cf. 43.15,20. –  sur sa longueur  : LXX sur son socle . –  ses parois  : le mot correspondant est souvent traduit par murs . –  L''homme v. 4 ; 40.3. –  la table  : cf. Ex 25.25-30 ; Lv 24.5-9.'
  - type: text
    content: 'L''autel était en bois, haut de trois coudées et long de deux coudées. A ses coins, sur sa longueur et ses parois, il était en bois. L''homme me dit : C''est ici la table qui est devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: note
    content: sanctuaire v. 21n.
  - type: text
    content: 'Le temple et le sanctuaire avaient deux portes. '
  '24':
  - type: note
    content: Texte obscur, interprété d'après LXX ; porte(s) et battants traduisent un même mot hébreu, de sorte qu'on peut imaginer aussi bien deux portes successives à deux battants chacune que deux battants de porte composés chacun de deux panneaux mobiles ; cf. 1R 6.31-35.
  - type: text
    content: 'Il y avait aux portes deux battants, qui se rabattaient tous deux sur les portes, deux battants pour une porte et deux pour l''autre. '
  '25':
  - type: note
    content: 'entablement  : terme technique mal connu, également en 1R 7.6 ; on a aussi traduit auvent ; barrière.'
  - type: text
    content: 'On avait fait des keroubim et des branches de palmiers sur les portes du temple, comme on en avait fait sur les murs. Il y avait un entablement en bois sur la façade du vestibule, au dehors. '
  '26':
  - type: note
    content: fenêtres grillagées v. 16 ; 40.16n.
  - type: text
    content: Il y avait des fenêtres grillagées et des branches de palmiers de part et d'autre, sur les côtés du vestibule, sur les pièces latérales de la Maison et sur les entablements.
  '3':
  - type: note
    content: 'l''intérieur  : cf. v. 4n  ; on peut noter que le prophète n''y entre pas. –  deux, six et sept coudées ≈ 1,05 m, 3,10 m et 3,70 m, respectivement. –  la largeur  : LXX a lu les côtés (v. 2n) et précise à leur sujet sept coudées d''un côté et sept coudées de l''autre.'
  - type: text
    content: 'Puis il entra à l''intérieur. Il mesura les piliers de l''entrée : deux coudées ; l''entrée : six coudées ; et la largeur de l''entrée : sept coudées. '
  '4':
  - type: note
    content: 'sa longueur  : cf. 1R 6.20. –  vingt coudées ≈ 10,50 m. –  à l''avant du (ou face au) temple  ; c.-à-d. dans le prolongement du Sacré (v. 1n). –  Très-Sacré ou Saint des saints 1R 6.16 ; 7.50 ; 8.6 ; 2Ch 3.8,10.'
  - type: text
    content: 'Il mesura sa longueur : vingt coudées, et la largeur : vingt coudées, à l''avant du temple ; et il me dit : C''est le Très-Sacré.'
  - type: heading
    content: Les pièces latérales
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'la Maison 40.5n. –  six et quatre coudées ≈ 3,10 m et 2,10 m, respectivement ; voir mesures, poids et monnaies. –  des pièces latérales  : litt. du côté  ; c''est le même mot qui apparaît dans les v. suivants, au pluriel ; cf. 1R 6.5-10.'
  - type: text
    content: 'Il mesura le mur de la Maison : six coudées, et la largeur des pièces latérales tout autour de la Maison : quatre coudées. '
  '6':
  - type: note
    content: 'côte à côte  : on pourrait aussi comprendre, avec Syr, (superposées) pièce sur pièce par trois, trente fois, c.-à-d. trois étages de trente pièces (ou cellules) chacun. –  elles ne s''appuyaient pas…  : malgré l''incertitude de la traduction, l''idée est que les pièces annexes doivent être indépendantes du sanctuaire pour ne pas le profaner (voir 1R 6.6ss).'
  - type: text
    content: 'Les pièces latérales côte à côte, trente-trois fois, s''inséraient dans le mur le long de la Maison pour y appuyer ces pièces tout autour : elles ne s''appuyaient pas dans le mur même de la Maison. '
  '7':
  - type: note
    content: Texte obscur ; certains modifient le mot traduit par tournant pour lire en augmentant, ce qui rend inutile la référence à un escalier (sous-entendu dans le texte ; cf. 1R 6.8). Quoi qu'il en soit, l'idée semble être que les pièces s'élargissent vers le haut en prenant sur l'épaisseur du mur extérieur (v. 9) et non sur celui du sanctuaire proprement dit (v. 6).
  - type: text
    content: Les pièces occupaient plus d'espace, à mesure qu'elles s'élevaient, et l'on allait en tournant ; car on montait autour de la Maison par un escalier tournant. Il y avait ainsi plus d'espace dans le haut de la Maison ; on montait de l'étage inférieur à l'étage supérieur par celui du milieu.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Les pièces latérales  : autre traduction le terrassement . –  six grandes coudées  : traduction incertaine ; litt. six coudées jusqu''à l''articulation ( ?), ce qui pourrait être une autre expression de la mesure définie en 40.5n  ; on pourrait également l''interpréter comme une description de la pièce mesurée : (à partir des fondations) jusqu''à l''angle (du plafond).'
  - type: text
    content: 'Je regardai la hauteur autour de la Maison. Les pièces latérales, à partir de leurs fondations, avaient une canne pleine, six grandes coudées. '
  '9':
  - type: note
    content: 'cinq coudées ≈ 2,60 m. –  L''espace libre  : litt., d''après l''explicitation de LXX, ce qui est laissé, de même au v. 11. –  entre le bâtiment  : litt. de la maison  ; LXX entre les murs.'
  - type: text
    content: 'Le mur extérieur des pièces latérales avait une épaisseur de cinq coudées. L''espace libre entre le bâtiment des pièces latérales '
