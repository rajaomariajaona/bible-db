          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'L''édifice était rempli d''hommes et de femmes ; tous les princes de la confédération des Philistins étaient là ; il y avait environ trois mille personnes, hommes et femmes, sur le toit en terrasse, qui regardaient Samson jouer. '
  '28':
