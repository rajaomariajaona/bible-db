      marker-yv: yv-n
    - type: text
      text: 'Les princes de la confédération des Philistins montèrent chez elle et lui dirent : Dupe-le, pour savoir d''où lui vient sa grande force et comment nous aurons pouvoir sur lui ; nous le lierons pour le dompter, et nous te donnerons chacun mille cent sicles d''argent. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dalila demanda à Samson : Dis-moi, je t''en prie, d''où vient ta grande force ; avec quoi faudrait-il te lier pour te dompter ? '
