document_id: JDG.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Samson et les portes de Gaza
  - type: text
    content: ' '
  - type: note
    content: 'Gaza  : l''une des cinq principales villes philistines (1.18 ; Jos 13.3). –  prostituée 11.1 ; cf. Jos 2.1. –  alla avec elle  : litt. vint vers elle  ; même expression en Jos 2.3 ; 2S 11.4 ; 12.24 ; 16.21 ; 20.3 ; voir Gn 16.2n.'
  - type: text
    content: 'Samson partit pour Gaza ; là, il vit une prostituée et alla avec elle. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: V. 13.
  - type: text
    content: 'Dalila dit à Samson : Tu as essayé de me tromper, tu m''as dit des mensonges. Maintenant, je t''en prie, dis-moi avec quoi il faudrait te lier. '
  '11':
  - type: note
    content: 'cordes neuves 15.13. –  dont on ne se soit jamais servi  : litt. avec lesquelles on n''ait fait aucun travail.'
  - type: text
    content: 'Il lui répondit : Si on me liait avec des cordes neuves, dont on ne se soit jamais servi, je deviendrais faible et je serais comme n''importe qui. '
  '12':
  - type: note
    content: V. 8-9+.
  - type: text
    content: 'Dalila prit des cordes neuves, avec lesquelles elle le lia. Puis elle lui dit : Les Philistins sont sur toi, Samson ! – il y avait une embuscade dans la chambre. Alors il rompit les cordes qu''il avait aux bras comme un simple fil.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'V. 10. –  tresses de ma tête  : cf. v. 17ss ; 13.5. –  avec la chaîne du tissu  : LXX ajoute et les fixer avec le piquet (v. 14n) dans le mur, alors je deviendrai faible et je serai comme l''un des (autres) hommes. (14) Elle l''endormit et tissa les sept tresses de sa tête avec la chaîne du tissu, elle les fixa…'
  - type: text
    content: 'Dalila dit à Samson : Jusqu''ici tu as essayé de me tromper, tu m''as dit des mensonges. Dis-moi avec quoi il faudrait te lier ! Il lui répondit : Tu n''as qu''à tisser les sept tresses de ma tête avec la chaîne du tissu. '
  '14':
  - type: note
    content: 'piquet (cf. v. 13n) : traduction incertaine ; quelques-uns pensent qu''il s''agit ici du peigne d''un métier à tisser. –  Les Philistins… v. 9+. – LXX ajoute à la fin du v. ainsi (le secret de) sa force ne fut pas connu, cf. v. 9.'
  - type: text
    content: 'Elle les fixa au piquet, puis elle lui dit : Les Philistins sont sur toi, Samson ! Alors il se réveilla de son sommeil et il arracha le piquet du tissu avec la chaîne. '
  '15':
  - type: note
    content: Cf. 14.16. – Voir cœur.
  - type: text
    content: 'Elle lui dit : Comment peux-tu dire : « Je t''aime ! », alors que ton cœur n''est pas avec moi ? Voilà trois fois que tu as essayé de me tromper, et tu ne m''as pas dit d''où venait ta grande force. '
  '16':
  - type: note
    content: 'tourmentait 14.17. –  il finit par perdre toute patience  : litt. son être se serra à en mourir, cf. 10.16n  ; Nb 21.4n  ; sur le terme correspondant à être, voir Gn 1.20n.'
  - type: text
    content: 'Comme elle le tourmentait et le harcelait tous les jours par ses paroles, il finit par perdre toute patience ; '
  '17':
  - type: note
    content: 'il lui ouvrit  : litt. il lui annonça ou il lui dit (même verbe dans les demandes de Dalila aux v. 6,10,13,15). –  nazir… 13.4s,7.'
  - type: text
    content: 'il lui ouvrit tout son cœur et lui dit : Le rasoir n''a jamais passé sur ma tête, car je suis nazir de Dieu depuis le ventre de ma mère. Si j''étais rasé, ma force se retirerait de moi, et je deviendrais faible, je serais comme tout le monde.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: V. 5.
  - type: text
    content: 'Dalila, voyant qu''il lui avait ouvert tout son cœur, fit appeler les princes de la confédération des Philistins et leur fit dire : Montez, cette fois, car il m''a ouvert tout son cœur. Les princes de la confédération des Philistins montèrent donc chez elle et apportèrent l''argent. '
  '19':
  - type: note
    content: 'sur ses genoux  : LXX entre ses genoux. –  et rasa  : litt. et elle rasa, LXX et il rasa (sujet masculin aussi pour le verbe suivant). –  à le dompter v. 5s ; autre traduction, d''après LXX  : et il commença à faiblir.'
  - type: text
    content: 'Elle l''endormit sur ses genoux ; puis elle appela un homme et rasa les sept tresses de sa tête, commençant ainsi à le dompter. Sa force se retira de lui. '
  '2':
  - type: note
    content: 'toute la nuit  : certains modifient le texte hébreu traditionnel pour lire, à la première occurrence de l''expression correspondante, toute la journée (ceux qui veulent mettre la main sur Samson ne monteraient pas la garde pendant la nuit, car les portes sont fermées et il est normalement impossible de quitter la ville).'
  - type: text
    content: 'On dit aux gens de Gaza : Samson est venu ici. Ils le cernèrent et lui tendirent une embuscade toute la nuit à la porte de la ville. Ils restèrent tranquilles toute la nuit, disant : A l''aube, nous le tuerons. '
  '20':
  - type: note
    content: 'V. 9+. –  le Seigneur s''était retiré  : cf. v. 19 ; 1S 16.14 ; 18.12 ; 28.15s.'
  - type: text
    content: 'Elle dit alors : Les Philistins sont sur toi, Samson ! Il se réveilla de son sommeil en se disant : Je m''en sortirai comme les autres fois, je me dégagerai ! – il ne savait pas que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''était retiré de lui. '
  '21':
  - type: note
    content: 'Cf. 2R 25.7 ; Jr 39.7 ; 52.11. –  l''amenèrent  : litt. le firent descendre. –  à Gaza  : cf. v. 1n. –  des entraves de bronze  : litt. les (deux) bronzes, probablement des entraves fixées aux pieds (2S 3.34). –  tournait la meule  : travail exténuant et fastidieux réservé aux esclaves, aux prisonniers ou aux bêtes ; il rappelle la corvée domestique exécutée par les femmes avec le petit moulin manuel (Ex 11.5 ; Es 47.2 ; Jb 31.10 ; Mt 24.41).'
  - type: text
    content: Les Philistins le saisirent et lui crevèrent les yeux ; ils l'amenèrent à Gaza et l'attachèrent avec des entraves de bronze. Il tournait la meule dans la prison.
  - type: heading
    content: Dernier exploit et mort de Samson
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'ses cheveux  : litt. le poil de sa tête.'
  - type: text
    content: 'Cependant, depuis qu''il avait été rasé, ses cheveux recommençaient à pousser. '
  '23':
  - type: note
    content: 'princes de la confédération des Philistins v. 5+. –  sacrifice / se réjouir Gn 31.54. –  Dagôn  : dieu cananéen de l''agriculture, associé en particulier au blé (hébreu dagân) et adopté par les Philistins (Jos 15.41 ; 19.27 ; 1S 5.2nss).'
  - type: text
    content: 'Un jour, les princes de la confédération des Philistins se rassemblèrent pour offrir un grand sacrifice à Dagôn, leur dieu, et pour se réjouir. Ils disaient :'
  - type: text
    content: Notre dieu nous a livré Samson, notre ennemi !
  '24':
  - type: text
    content: 'Quand le peuple le vit, ils célébrèrent leur dieu en disant :'
  - type: text
    content: Notre dieu nous a livré notre ennemi,
  - type: text
    content: celui qui réduisait notre pays en ruines
  - type: text
    content: et qui faisait tant de victimes parmi nous !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'le cœur content 18.20. –  qu''il nous divertisse  : litt. qu''il joue (autre forme du même verbe au v. 27) devant nous.'
  - type: text
    content: 'Comme ils avaient le cœur content, ils dirent : Appelez Samson, qu''il nous divertisse ! Ils appelèrent Samson et le firent sortir de la prison ; il se mit à les amuser. Ils le placèrent entre les colonnes. '
  '26':
  - type: text
    content: 'Samson dit au jeune homme qui le tenait : Fais-moi toucher les colonnes sur lesquelles repose l''édifice, que je m''appuie contre elles.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'trois mille  : LXX sept cents . –  en terrasse  : sous-entendu dans le texte ; cf. Dt 22.8n. –  jouer v. 25n.'
  - type: text
    content: 'L''édifice était rempli d''hommes et de femmes ; tous les princes de la confédération des Philistins étaient là ; il y avait environ trois mille personnes, hommes et femmes, sur le toit en terrasse, qui regardaient Samson jouer. '
  '28':
  - type: note
    content: 'Cf. Hé 11.34. –  Seigneur / Seigneur  : hébreu YHWH / ’Adonaï, cf. Ex 3.15n.'
  - type: text
    content: 'Alors Samson invoqua le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il dit : Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', souviens-toi de moi, je t''en prie ; donne-moi de la force seulement cette fois-ci, ô Dieu, et que d''un seul coup je tire vengeance des Philistins pour mes deux yeux ! '
  '29':
  - type: text
    content: 'Samson toucha les deux colonnes du milieu, sur lesquelles reposait l''édifice ; il pesa sur elles, sur l''une avec sa main droite et sur l''autre avec sa main gauche. '
  '3':
  - type: note
    content: 'le verrou est la lourde traverse de bois avec laquelle on barricadait les portes de la ville pendant la nuit. –  en face  : autre traduction à l''est ; Hébron est à environ 70 km à l''est de Gaza.'
  - type: text
    content: Samson resta couché jusqu'au milieu de la nuit. Au milieu de la nuit, il se leva, saisit les battants de la porte de la ville et les deux montants, les arracha avec le verrou, les mit sur ses épaules et les porta au sommet de la montagne qui est en face d'Hébron.
  - type: heading
    content: Dalila trahit Samson
  '30':
  - type: note
    content: 'dans sa mort / sa vie  : autre traduction par sa mort / sa vie.'
  - type: text
    content: 'Puis Samson dit : Que je meure avec les Philistins ! Il s''arc-bouta avec force, et l''édifice tomba sur les princes de la confédération et sur tout le peuple qui était là : ceux qu''il fit mourir dans sa mort furent plus nombreux que ceux qu''il avait fait mourir dans sa vie. '
  '31':
  - type: note
    content: 'sa famille  : litt. la maison de son père. –  entre Tsoréa et Eshtaol 13.25. –  juge en Israël… 15.20+.'
  - type: text
    content: Ses frères et toute sa famille descendirent et l'emportèrent. Lorsqu'ils furent remontés, ils l'ensevelirent entre Tsoréa et Eshtaol, dans le tombeau de Manoah, son père. Il avait été juge en Israël pendant vingt ans.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'l''oued Soreq  : vallée à l''ouest de Tsoréa (13.2n,25+) ; le nom soreq désigne ailleurs un cépage de choix, cf. Es 5.2n. –  Dalila  : nom d''étymologie incertaine ; il pourrait évoquer en hébreu l''idée de faiblesse , et en arabe celles de langueur ou de traîtrise.'
  - type: text
    content: 'Après cela, il aima une femme dans l''oued Soreq. Elle se nommait Dalila. '
  '5':
  - type: note
    content: Dupe-le… 14.15n. –  chacun mille cent (cf. 17.2) ; puisque les princes de la confédération des Philistins sont cinq (3.3 ; Jos 13.3), le prix total est de 5 500 sicles (plus de 52 kg, voir mesures, poids et monnaies ; mais ici le nom de la monnaie est sous-entendu dans le texte) ; il s'agit en tout cas d'une somme considérable.
  - type: text
    content: 'Les princes de la confédération des Philistins montèrent chez elle et lui dirent : Dupe-le, pour savoir d''où lui vient sa grande force et comment nous aurons pouvoir sur lui ; nous le lierons pour le dompter, et nous te donnerons chacun mille cent sicles d''argent. '
  '6':
  - type: text
    content: 'Dalila demanda à Samson : Dis-moi, je t''en prie, d''où vient ta grande force ; avec quoi faudrait-il te lier pour te dompter ? '
  '7':
  - type: note
    content: Les tendons prélevés sur un cadavre d'animal (14.9n  ; 15.15) pouvaient être traités (ou séchés) pour divers usages ; on en faisait en particulier des cordes d'arc (même terme en Ps 11.2 ; Jb 4.21n  ; 30.11).
  - type: text
    content: 'Samson lui répondit : Si on me liait avec sept tendons frais, qui ne soient pas encore secs, je deviendrais faible et je serais comme n''importe qui. '
  '8':
  - type: note
    content: 'apportèrent  : litt. montèrent, cf. v. 5.'
  - type: text
    content: 'Les princes de la confédération des Philistins apportèrent à Dalila sept tendons frais, qui n''étaient pas encore secs, avec lesquels elle le lia '
  '9':
  - type: note
    content: 'Cf. 15.14. –  sur toi v. 12,14,20. –  quand il sent le feu  : c.-à-d. dès qu''il est en contact avec le feu. –  le secret de sa force  : litt. sa force.'
  - type: text
    content: '– il y avait une embuscade près d''elle, dans la chambre. Elle lui dit : Les Philistins sont sur toi, Samson ! Alors il rompit les tendons comme un cordon d''étoupe qui se rompt quand il sent le feu. Ainsi le secret de sa force ne fut pas connu.'
