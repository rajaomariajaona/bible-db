      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''il joue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre forme du même verbe au v. 27) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant nous.
      marker-yv: yv-n
    - type: text
      text: 'Comme ils avaient le cœur content, ils dirent : Appelez Samson, qu''il nous divertisse ! Ils appelèrent Samson et le firent sortir de la prison ; il se mit à les amuser. Ils le placèrent entre les colonnes. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Samson dit au jeune homme qui le tenait : Fais-moi toucher les colonnes sur lesquelles repose l''édifice, que je m''appuie contre elles.'
