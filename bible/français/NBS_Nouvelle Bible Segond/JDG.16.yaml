    - type: text
      text: 'Alors Samson invoqua le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; il dit : Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: ', souviens-toi de moi, je t''en prie ; donne-moi de la force seulement cette fois-ci, ô Dieu, et que d''un seul coup je tire vengeance des Philistins pour mes deux yeux ! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samson toucha les deux colonnes du milieu, sur lesquelles reposait l''édifice ; il pesa sur elles, sur l''une avec sa main droite et sur l''autre avec sa main gauche. '
  '3':
  - type: usfm
    marker: p
    children:
