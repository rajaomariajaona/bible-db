          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par sa mort / sa vie.
      marker-yv: yv-n
    - type: text
      text: 'Puis Samson dit : Que je meure avec les Philistins ! Il s''arc-bouta avec force, et l''édifice tomba sur les princes de la confédération et sur tout le peuple qui était là : ceux qu''il fit mourir dans sa mort furent plus nombreux que ceux qu''il avait fait mourir dans sa vie. '
