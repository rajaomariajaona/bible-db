          text: 15.20+.
      marker-yv: yv-n
    - type: text
      text: Ses frères et toute sa famille descendirent et l'emportèrent. Lorsqu'ils furent remontés, ils l'ensevelirent entre Tsoréa et Eshtaol, dans le tombeau de Manoah, son père. Il avait été juge en Israël pendant vingt ans.
