document_id: JDG.16,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson et les portes de Gaza
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gaza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''une des cinq principales villes philistines (1.18 ; Jos 13.3). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prostituée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.1 ; cf. Jos 2.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: alla avec elle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vint vers elle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; même expression en Jos 2.3 ; 2S 11.4 ; 12.24 ; 16.21 ; 20.3 ; voir Gn 16.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Samson partit pour Gaza ; là, il vit une prostituée et alla avec elle. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 13.
      marker-yv: yv-n
    - type: text
      text: 'Dalila dit à Samson : Tu as essayé de me tromper, tu m''as dit des mensonges. Maintenant, je t''en prie, dis-moi avec quoi il faudrait te lier. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cordes neuves '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dont on ne se soit jamais servi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec lesquelles on n'ait fait aucun travail.
      marker-yv: yv-n
    - type: text
      text: 'Il lui répondit : Si on me liait avec des cordes neuves, dont on ne se soit jamais servi, je deviendrais faible et je serais comme n''importe qui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 8-9+.
      marker-yv: yv-n
    - type: text
      text: 'Dalila prit des cordes neuves, avec lesquelles elle le lia. Puis elle lui dit : Les Philistins sont sur toi, Samson ! – il y avait une embuscade dans la chambre. Alors il rompit les cordes qu''il avait aux bras comme un simple fil.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tresses de ma tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 17ss ; 13.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec la chaîne du tissu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et les fixer avec le piquet '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le mur, alors je deviendrai faible et je serai comme l'un des (autres) hommes. (14) Elle l'endormit et tissa les sept tresses de sa tête avec la chaîne du tissu, elle les fixa…
      marker-yv: yv-n
    - type: text
      text: 'Dalila dit à Samson : Jusqu''ici tu as essayé de me tromper, tu m''as dit des mensonges. Dis-moi avec quoi il faudrait te lier ! Il lui répondit : Tu n''as qu''à tisser les sept tresses de ma tête avec la chaîne du tissu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'piquet '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : traduction incertaine ; quelques-uns pensent qu''il s''agit ici du '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'peigne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd''un métier à tisser. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les Philistins… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 9+. – LXX ajoute à la fin du v. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ainsi (le secret de) sa force ne fut pas connu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 9.'
      marker-yv: yv-n
    - type: text
      text: 'Elle les fixa au piquet, puis elle lui dit : Les Philistins sont sur toi, Samson ! Alors il se réveilla de son sommeil et il arracha le piquet du tissu avec la chaîne. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 14.16. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle lui dit : Comment peux-tu dire : « Je t''aime ! », alors que ton cœur n''est pas avec moi ? Voilà trois fois que tu as essayé de me tromper, et tu ne m''as pas dit d''où venait ta grande force. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tourmentait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il finit par perdre toute patience
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son être se serra à en mourir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 10.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 21.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; sur le terme correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: être
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir Gn 1.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme elle le tourmentait et le harcelait tous les jours par ses paroles, il finit par perdre toute patience ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il lui ouvrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il lui annonça '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il lui dit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même verbe dans les demandes de Dalila aux v. 6,10,13,15). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nazir… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.4s,7.
      marker-yv: yv-n
    - type: text
      text: 'il lui ouvrit tout son cœur et lui dit : Le rasoir n''a jamais passé sur ma tête, car je suis nazir de Dieu depuis le ventre de ma mère. Si j''étais rasé, ma force se retirerait de moi, et je deviendrais faible, je serais comme tout le monde.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 5.
      marker-yv: yv-n
    - type: text
      text: 'Dalila, voyant qu''il lui avait ouvert tout son cœur, fit appeler les princes de la confédération des Philistins et leur fit dire : Montez, cette fois, car il m''a ouvert tout son cœur. Les princes de la confédération des Philistins montèrent donc chez elle et apportèrent l''argent. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur ses genoux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entre ses genoux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et rasa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et elle rasa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et il rasa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(sujet masculin aussi pour le verbe suivant). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à le dompter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5s ; autre traduction, d'après LXX
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il commença à faiblir.
      marker-yv: yv-n
    - type: text
      text: 'Elle l''endormit sur ses genoux ; puis elle appela un homme et rasa les sept tresses de sa tête, commençant ainsi à le dompter. Sa force se retira de lui. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toute la nuit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains modifient le texte hébreu traditionnel pour lire, à la première occurrence de l''expression correspondante, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toute la journée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (ceux qui veulent mettre la main sur Samson ne monteraient pas la garde pendant la nuit, car les portes sont fermées et il est normalement impossible de quitter la ville).
      marker-yv: yv-n
    - type: text
      text: 'On dit aux gens de Gaza : Samson est venu ici. Ils le cernèrent et lui tendirent une embuscade toute la nuit à la porte de la ville. Ils restèrent tranquilles toute la nuit, disant : A l''aube, nous le tuerons. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' s''était retiré'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 19 ; 1S 16.14 ; 18.12 ; 28.15s.'
      marker-yv: yv-n
    - type: text
      text: 'Elle dit alors : Les Philistins sont sur toi, Samson ! Il se réveilla de son sommeil en se disant : Je m''en sortirai comme les autres fois, je me dégagerai ! – il ne savait pas que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' s''était retiré de lui. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2R 25.7 ; Jr 39.7 ; 52.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'amenèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le firent descendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Gaza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des entraves de bronze
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les (deux) bronzes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', probablement des entraves fixées aux pieds (2S 3.34). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tournait la meule
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : travail exténuant et fastidieux réservé aux esclaves, aux prisonniers ou aux bêtes ; il rappelle la corvée domestique exécutée par les femmes avec le petit moulin manuel (Ex 11.5 ; Es 47.2 ; Jb 31.10 ; Mt 24.41).'
      marker-yv: yv-n
    - type: text
      text: Les Philistins le saisirent et lui crevèrent les yeux ; ils l'amenèrent à Gaza et l'attachèrent avec des entraves de bronze. Il tournait la meule dans la prison.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dernier exploit et mort de Samson
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses cheveux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le poil de sa tête.
      marker-yv: yv-n
    - type: text
      text: 'Cependant, depuis qu''il avait été rasé, ses cheveux recommençaient à pousser. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'princes de la confédération des Philistins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se réjouir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 31.54. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dagôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dieu cananéen de l''agriculture, associé en particulier au blé (hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dagân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) et adopté par les Philistins (Jos 15.41 ; 19.27 ; 1S 5.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss).
      marker-yv: yv-n
    - type: text
      text: 'Un jour, les princes de la confédération des Philistins se rassemblèrent pour offrir un grand sacrifice à Dagôn, leur dieu, et pour se réjouir. Ils disaient :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre dieu nous a livré Samson, notre ennemi !
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Quand le peuple le vit, ils célébrèrent leur dieu en disant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre dieu nous a livré notre ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui réduisait notre pays en ruines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui faisait tant de victimes parmi nous !
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' content '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.20. –  '
      - type: usfm
