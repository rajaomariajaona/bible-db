      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'entre Tsoréa et Eshtaol '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.25. –  '
      - type: usfm
        marker: fq
