      marker-yv: yv-n
    - type: text
      text: '– il y avait une embuscade près d''elle, dans la chambre. Elle lui dit : Les Philistins sont sur toi, Samson ! Alors il rompit les tendons comme un cordon d''étoupe qui se rompt quand il sent le feu. Ainsi le secret de sa force ne fut pas connu.'
