          text: en face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à l''est ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hébron '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est à environ 70 km à l'est de Gaza.
      marker-yv: yv-n
    - type: text
      text: Samson resta couché jusqu'au milieu de la nuit. Au milieu de la nuit, il se leva, saisit les battants de la porte de la ville et les deux montants, les arracha avec le verrou, les mit sur ses épaules et les porta au sommet de la montagne qui est en face d'Hébron.
  - type: usfm
    marker: s1
