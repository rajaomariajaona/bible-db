        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'hésite pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: étends pour toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; l''expression hébraïque ainsi rendue est très peu claire ; les traducteurs anciens ont déjà été très embarrassés. Autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: continue ; va où tu veux ; allons-y ; n'écoute que ton sentiment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avec toi, comme ton propre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 15.15.'
      marker-yv: yv-n
    - type: text
      text: 'Celui qui portait ses armes lui répondit : Fais tout ce que tu as dans le cœur, n''hésite pas ; je suis avec toi, comme ton propre cœur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Eh bien, dit Jonathan, passons jusqu''à ces hommes et montrons-nous à eux ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'S''ils nous disent : « Ne bougez pas, nous vous rejoignons ! », nous resterons sur place, et nous ne monterons pas vers eux. '
