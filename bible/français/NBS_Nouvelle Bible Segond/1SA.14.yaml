document_id: 1SA.14,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jonathan attaque un poste de Philistins
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au serviteur qui portait ses armes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à son écuyer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Jg 9.54+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: poste des Philistins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 13.23.'
      marker-yv: yv-n
    - type: text
      text: 'Un jour, Jonathan, fils de Saül, dit au serviteur qui portait ses armes : Viens, et passons jusqu''au poste des Philistins, qui est là de l''autre côté. Il n''en dit rien à son père.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous les a livrés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 9.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: signe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.34 ; 10.7-9 ; Gn 24.14 ; Ex 3.12 ; Es 7.11-14.'
      marker-yv: yv-n
    - type: text
      text: 'Mais s''ils disent : « Montez vers nous ! », nous monterons, car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' nous les a livrés. Ce sera pour nous un signe.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des trous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 13.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils se montrèrent tous deux au poste des Philistins, et les Philistins dirent : Voici des Hébreux qui sortent des trous où ils s''étaient cachés. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les a livrés à Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2S 5.19 ; cf. Jg 3.28 ; 7.15.
      marker-yv: yv-n
    - type: text
      text: 'Les hommes du poste dirent à Jonathan et à celui qui portait ses armes : Montez nous voir, nous avons quelque chose à vous dire ! Jonathan dit à celui qui portait ses armes : Monte derrière moi, car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' les a livrés à Israël. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lv 26.8
      marker-yv: yv-n
    - type: text
      text: 'Jonathan monta en s''aidant des mains et des pieds, et celui qui portait ses armes montait derrière lui. Les Philistins tombèrent devant Jonathan, et celui qui portait ses armes donnait la mort derrière lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette première action
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le premier coup
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'défaite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 30 ; cf. 4.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur l'espace…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte hébreu correspondant est très difficile à comprendre ; les versions anciennes et modernes présentent diverses traductions très divergentes. L''idée générale semble être que ce massacre de Philistins a eu lieu sur un espace très limité.'
      marker-yv: yv-n
    - type: text
      text: 'Lors de cette première action, Jonathan et celui qui portait ses armes abattirent une vingtaine d''hommes sur l''espace d''environ la moitié d''un arpent de terre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le mot traduit ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'frayeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait aussi avoir le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tremblement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 13.7) ou de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: panique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : celui des Philistins ; cf. 2R 7.6s ; 19.35s ; voir aussi Ps 14.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les destructeurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 13.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La terre trembla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sens le plus probable ; on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le pays trembla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les habitants tremblèrent, furent dans l'épouvante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 4.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une frayeur de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la tournure hébraïque pourrait être comprise comme un superlatif'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une frayeur terrible
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 35.5 ; Ex 23.27 ; 2Ch 17.10 ; voir aussi 5.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: La frayeur se répandit dans le camp, dans la région et parmi tout le peuple ; le poste et les destructeurs furent également saisis de frayeur. La terre trembla. Ce fut une frayeur de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Philistins en déroute
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la multitude
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : des Philistins ; le mot hébreu correspondant est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tumulte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se dispersait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : texte hébreu peu clair, mais le sens général n''est pas douteux.'
      marker-yv: yv-n
    - type: text
      text: 'Les guetteurs de Saül, qui étaient à Guibéa de Benjamin, virent que la multitude se dispersait et allait d''un côté et de l''autre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa troupe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Faites l'appel… On fit l'appel…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: intervenez donc… ils intervinrent…
      marker-yv: yv-n
    - type: text
      text: 'Alors Saül dit à sa troupe : Faites l''appel, je vous prie, et voyez qui s''en est allé d''avec nous. On fit l''appel ; il manquait Jonathan et celui qui portait ses armes. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ahiya
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le coffre de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.4s ; 7.1s ; Ex 25.10-16. Cette mention du Coffre est surprenante car, d''après 7.1s, le coffre de l''alliance était déposé à Qiriath-Yéarim. L''expression hébraïque pourrait ici désigner une sorte de coffret contenant des objets divinatoires. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' remplace '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le coffre de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''éphod '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 3 ; 30.7s ; Nb 27.21).
      marker-yv: yv-n
    - type: text
      text: 'Saül dit à Ahiya : Fais approcher le coffre de Dieu ! – Car en ce temps le coffre de Dieu était avec les Israélites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le tumulte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Retire ta main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Saül ordonne au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' de cesser la consultation de Dieu, car la situation évolue clairement vers la déroute des Philistins.'
      marker-yv: yv-n
    - type: text
      text: 'Pendant que Saül parlait au prêtre, le tumulte dans le camp des Philistins allait toujours croissant ; alors Saül dit au prêtre : Retire ta main ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guibéa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Guéba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 13.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Migrôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 10.28 ; nom propre dérivé du mot hébreu signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aire (de battage des céréales)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec une troupe…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le peuple qui était avec lui était d''environ… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même expression aux v. 17,20) ; cf. 13.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: six cents hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 13.15+.'
      marker-yv: yv-n
    - type: text
      text: 'Saül se tenait à la limite de Guibéa, sous le grenadier qui est à Migrôn, avec une troupe d''environ six cents hommes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se rassemblèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: furent appelés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jg 4.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lieu du combat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne l''endroit où se manifeste le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tumulte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'du v. 19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chacun… son voisin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les Philistins se battent entre eux ; cf. Jg 7.22 ; 2Ch 20.23.'
      marker-yv: yv-n
    - type: text
      text: 'Puis Saül et toute sa troupe se rassemblèrent et s''avancèrent jusqu''au lieu du combat. Là, chacun tournait son épée contre son voisin : c''était une panique terrible. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme d'habitude
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme hier, avant-hier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 4.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Hébreux
      - type: usfm
        marker: ft
