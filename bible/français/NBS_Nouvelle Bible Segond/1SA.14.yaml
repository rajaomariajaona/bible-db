document_id: 1SA.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jonathan attaque un poste de Philistins
  - type: text
    content: ' '
  - type: note
    content: 'au serviteur qui portait ses armes ou à son écuyer  ; cf. Jg 9.54+. –  poste des Philistins  : cf. 13.23.'
  - type: text
    content: 'Un jour, Jonathan, fils de Saül, dit au serviteur qui portait ses armes : Viens, et passons jusqu''au poste des Philistins, qui est là de l''autre côté. Il n''en dit rien à son père.'
  '10':
  - type: note
    content: 'nous les a livrés Gn 9.2n. –  signe  : cf. 2.34 ; 10.7-9 ; Gn 24.14 ; Ex 3.12 ; Es 7.11-14.'
  - type: text
    content: 'Mais s''ils disent : « Montez vers nous ! », nous monterons, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous les a livrés. Ce sera pour nous un signe.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'des trous  : cf. 13.6n.'
  - type: text
    content: 'Ils se montrèrent tous deux au poste des Philistins, et les Philistins dirent : Voici des Hébreux qui sortent des trous où ils s''étaient cachés. '
  '12':
  - type: note
    content: les a livrés à Israël 2S 5.19 ; cf. Jg 3.28 ; 7.15.
  - type: text
    content: 'Les hommes du poste dirent à Jonathan et à celui qui portait ses armes : Montez nous voir, nous avons quelque chose à vous dire ! Jonathan dit à celui qui portait ses armes : Monte derrière moi, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les a livrés à Israël. '
  '13':
  - type: note
    content: Cf. Lv 26.8
  - type: text
    content: 'Jonathan monta en s''aidant des mains et des pieds, et celui qui portait ses armes montait derrière lui. Les Philistins tombèrent devant Jonathan, et celui qui portait ses armes donnait la mort derrière lui. '
  '14':
  - type: note
    content: 'cette première action  : litt. le premier coup  ; le même terme est traduit par défaite au v. 30 ; cf. 4.8n,10n. –  sur l''espace…  : le texte hébreu correspondant est très difficile à comprendre ; les versions anciennes et modernes présentent diverses traductions très divergentes. L''idée générale semble être que ce massacre de Philistins a eu lieu sur un espace très limité.'
  - type: text
    content: 'Lors de cette première action, Jonathan et celui qui portait ses armes abattirent une vingtaine d''hommes sur l''espace d''environ la moitié d''un arpent de terre. '
  '15':
  - type: note
    content: 'Le mot traduit ici par frayeur pourrait aussi avoir le sens de tremblement (cf. 13.7) ou de panique. –  dans le camp  : celui des Philistins ; cf. 2R 7.6s ; 19.35s ; voir aussi Ps 14.5. –  les destructeurs  : cf. 13.17. –  La terre trembla  : sens le plus probable ; on pourrait aussi comprendre le pays trembla, c.-à-d. les habitants tremblèrent, furent dans l''épouvante  ; cf. 4.5. –  une frayeur de Dieu  : la tournure hébraïque pourrait être comprise comme un superlatif  : une frayeur terrible  ; cf. Gn 35.5 ; Ex 23.27 ; 2Ch 17.10 ; voir aussi 5.11n.'
  - type: text
    content: La frayeur se répandit dans le camp, dans la région et parmi tout le peuple ; le poste et les destructeurs furent également saisis de frayeur. La terre trembla. Ce fut une frayeur de Dieu.
  - type: heading
    content: Les Philistins en déroute
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'la multitude  : des Philistins ; le mot hébreu correspondant est rendu par tumulte au v. 19. –  se dispersait…  : texte hébreu peu clair, mais le sens général n''est pas douteux.'
  - type: text
    content: 'Les guetteurs de Saül, qui étaient à Guibéa de Benjamin, virent que la multitude se dispersait et allait d''un côté et de l''autre. '
  '17':
  - type: note
    content: 'sa troupe  : cf. v. 2n. –  Faites l''appel… On fit l''appel…  : litt. intervenez donc… ils intervinrent…'
  - type: text
    content: 'Alors Saül dit à sa troupe : Faites l''appel, je vous prie, et voyez qui s''en est allé d''avec nous. On fit l''appel ; il manquait Jonathan et celui qui portait ses armes. '
  '18':
  - type: note
    content: 'Ahiya  : cf. v. 3. –  le coffre de Dieu  : cf. 4.4s ; 7.1s ; Ex 25.10-16. Cette mention du Coffre est surprenante car, d''après 7.1s, le coffre de l''alliance était déposé à Qiriath-Yéarim. L''expression hébraïque pourrait ici désigner une sorte de coffret contenant des objets divinatoires. LXX remplace le coffre de Dieu par l''éphod (cf. v. 3 ; 30.7s ; Nb 27.21).'
  - type: text
    content: 'Saül dit à Ahiya : Fais approcher le coffre de Dieu ! – Car en ce temps le coffre de Dieu était avec les Israélites. '
  '19':
  - type: note
    content: 'le tumulte  : cf. v. 16n. –  Retire ta main  : Saül ordonne au prêtre de cesser la consultation de Dieu, car la situation évolue clairement vers la déroute des Philistins.'
  - type: text
    content: 'Pendant que Saül parlait au prêtre, le tumulte dans le camp des Philistins allait toujours croissant ; alors Saül dit au prêtre : Retire ta main ! '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Guibéa  : LXX a lu Guéba  ; cf. 13.16n. –  Migrôn  : cf. Es 10.28 ; nom propre dérivé du mot hébreu signifiant aire (de battage des céréales) . –  avec une troupe…  : litt. le peuple qui était avec lui était d''environ… (même expression aux v. 17,20) ; cf. 13.4n. –  six cents hommes  : cf. 13.15+.'
  - type: text
    content: 'Saül se tenait à la limite de Guibéa, sous le grenadier qui est à Migrôn, avec une troupe d''environ six cents hommes. '
  '20':
  - type: note
    content: 'se rassemblèrent  : litt. furent appelés  ; cf. Jg 4.10n  ; 6.34n. – Le lieu du combat désigne l''endroit où se manifeste le tumulte du v. 19. –  chacun… son voisin  : les Philistins se battent entre eux ; cf. Jg 7.22 ; 2Ch 20.23.'
  - type: text
    content: 'Puis Saül et toute sa troupe se rassemblèrent et s''avancèrent jusqu''au lieu du combat. Là, chacun tournait son épée contre son voisin : c''était une panique terrible. '
  '21':
  - type: note
    content: 'comme d''habitude  : litt. comme hier, avant-hier  ; cf. 4.7n. –  des Hébreux  : cf. 13.3n. –  ils se joignirent  : plusieurs versions anciennes ont lu ils firent défection et se joignirent.'
  - type: text
    content: 'Il y avait parmi les Philistins, comme d''habitude, des Hébreux qui étaient montés avec eux dans le camp et aux alentours ; ils se joignirent aux gens d''Israël qui étaient avec Saül et Jonathan. '
  '22':
  - type: note
    content: 's''étaient cachés  : cf. 13.6. –  la région montagneuse d''Ephraïm  : cf. 1.1n.'
  - type: text
    content: 'Tous les hommes d''Israël qui s''étaient cachés dans la région montagneuse d''Ephraïm, apprenant que les Philistins fuyaient, se mirent aussi à les serrer de près dans le combat. '
  '23':
  - type: note
    content: 'sauva Israël  : cf. Ps 44.7s. –  Beth-Aven  : cf. 13.5 ; Jos 7.2.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sauva Israël en ce jour-là ; le combat se prolongea jusqu''au-delà de Beth-Aven.'
  - type: heading
    content: Le peuple sauve Jonathan
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'étaient serrés de près  : même expression en 13.6 ; il pourrait donc s''agir de la situation des Israélites confrontés aux réactions des Philistins en fuite. Mais on peut aussi rattacher cette proposition à la suivante et comprendre  : Les hommes d''Israël étaient dans une situation difficile, car Saül avait imposé… –  une adjuration  : cf. 1R 8.31n  ; il s''agit d''une formule de malédiction conditionnelle, qui pouvait aussi se présenter sous la forme  : que je (ou tu ) sois maudit, si je (ou tu ) mange ( s ) … Comparer avec la tournure fréquente Que Dieu me (ou te ) fasse ceci et qu''il y ajoute cela, si je (ou tu ) …  ; cf. 3.17n  ; voir aussi Gn 24.41n  ; Lv 5.1n  ; Nb 5.21n  ; bénédiction, malédiction. –  à la troupe  : autre traduction au peuple , même possibilité dans la suite, jusqu''au v. 34 ; cf. v. 2n  ; 13.4n. –  qui mangera  : litt. qui mangera du pain  ; cf. v. 28. Ce jeûne est probablement une pratique religieuse visant à obtenir l''aide de Dieu dans le combat.'
  - type: text
    content: 'Les hommes d''Israël étaient serrés de près en ce jour-là. Alors Saül imposa une adjuration à la troupe, en disant : Maudit soit l''homme qui mangera avant le soir, avant que je me sois vengé de mes ennemis ! Dès lors, personne ne mangea rien. '
  '25':
  - type: note
    content: 'Tous les hommes du pays  : litt. tout le pays. –  du miel d''abeilles sauvages ; cf. Mt 3.4. –  partout  : litt. sur la (sur)face de la campagne ou des champs  ; on a aussi compris jusque par terre. La précision montre en tout cas que le miel était bien visible de tous et facile d''accès.'
  - type: text
    content: 'Tous les hommes du pays étaient arrivés dans la forêt ; il y avait du miel partout. '
  '26':
  - type: note
    content: respectait (litt. craignait) le serment, c.-à-d. avait peur des conséquences d'une violation du serment ; le serment (autre traduction la parole solennelle) désigne l’adjuration du v. 24.
  - type: text
    content: 'Lorsque la troupe arriva dans la forêt, le miel y coulait ; mais personne ne porta la main à la bouche, car la troupe respectait le serment. '
  '27':
  - type: note
    content: 'n''avait pas entendu ou n''avait pas appris. –  se mirent à briller  : autre lecture traditionnelle virent (clair). Comparer avec une situation analogue en 30.12. Voir aussi Pr 24.13.'
  - type: text
    content: 'Jonathan n''avait pas entendu que son père avait fait prêter serment à la troupe ; il avança l''extrémité du bâton qu''il avait à la main, la plongea dans un rayon de miel et ramena la main à la bouche ; ses yeux se mirent à briller. '
  '28':
  - type: note
    content: Or la troupe était fatiguée ou c'est pourquoi la troupe (litt. le peuple  ; cf. v. 2n) est fatiguée.
  - type: text
    content: 'Alors quelqu''un de la troupe lui dit : Ton père a fait prêter serment à la troupe, en disant : « Maudit soit l''homme qui mangera aujourd''hui ! » Or la troupe était fatiguée. '
  '29':
  - type: note
    content: 'a attiré le malheur…  : cf. Gn 34.30+ ; Jos 6.18+ ; 1R 18.17s.'
  - type: text
    content: 'Et Jonathan dit : Mon père a attiré le malheur sur le pays ; regardez, je vous prie, comme mes yeux brillent, parce que j''ai goûté un peu de ce miel ! '
  '3':
  - type: note
    content: 'Ce v. prépare le récit des v. 36-46. –  Ahitoub  : cf. 22.9,11. –  I-Kabod  : cf. 4.19ss. –  Eli  : cf. chap. 1–4. –  Silo  : cf. 1.3n. –  portait l''éphod, c.-à-d. était prêtre  ; cf. 2.18n  ; Ex 25.7 ; 28.6-14. –  La troupe ou le peuple, cf. v. 2n.'
  - type: text
    content: 'Ahiya, fils d''Ahitoub, frère d''I-Kabod, fils de Phinéas, fils d''Eli, prêtre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Silo, portait l''éphod. La troupe ne savait pas que Jonathan s''en était allé.'
  '30':
  - type: note
    content: 'une part du butin  : litt. du butin  ; cette affirmation anticipe sur le v. 32.'
  - type: text
    content: Si la troupe avait mangé aujourd'hui une part du butin qu'elle a trouvé chez ses ennemis, la défaite des Philistins n'aurait-elle pas été bien plus grande ?
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Mikmas  : cf. 13.2n. –  Ayyalôn  : localité située à environ 25 km à l''ouest de Mikmas, et proche du territoire philistin ; cf. Jos 10.12 ; 19.42. –  fatiguée  : cf. v. 28.'
  - type: text
    content: 'Ils battirent ce jour-là les Philistins depuis Mikmas jusqu''à Ayyalôn. La troupe était très fatiguée '
  '32':
  - type: note
    content: 'elle se jeta sur le butin  : autre lecture traditionnelle elle fit du butin  ; cf. 15.19. –  sur la terre, c.-à-d. sur place, à même le sol, sans la moindre installation permettant un déroulement rituel de la procédure sacrificielle (voir la grande pierre du v. 33). –  au-dessus du sang, c.-à-d. à l''endroit même où le sang de la victime avait coulé (autre préposition, souvent employée dans le même sens, au v. 34 ; cf. Lv 19.26n  ; Ez 33.25). On a souvent traduit l''expression hébraïque correspondante par avec le sang (LXX, Vg), en y voyant seulement une allusion aux commandements qui interdisaient de consommer la viande d''un animal qui n''aurait pas été saigné rituellement (cf. Gn 9.4 ; Lv 3.17 ; 7.26s ; 17.10-14). Mais il est plus probable que le texte évoque et condamne ici un rituel particulier, considéré comme non conforme au culte du Seigneur (YHWH).'
  - type: text
    content: 'et elle se jeta sur le butin. Elle prit du petit bétail, des bœufs et des veaux, les immola sur la terre ; la troupe mangea au-dessus du sang. '
  '33':
  - type: note
    content: 'tout de suite  : litt. aujourd''hui, c.-à-d. pendant qu''il fait encore jour ; pour Israël, le jour se termine au coucher du soleil. –  une grande pierre qui servira d''autel de fortune.'
  - type: text
    content: 'On dit à Saül : La troupe pèche contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en mangeant au-dessus du sang. Saül dit : Vous vous êtes conduits comme des traîtres ! Roulez tout de suite vers moi une grande pierre. '
  '34':
  - type: note
    content: 'amena son propre bœuf  : litt. amena son bœuf par la main  ; ici l''hébreu a laissé son mouton ou sa chèvre sous-entendu ; LXX amena ce qu''il avait dans sa main (ou à sa disposition).'
  - type: text
    content: 'Puis il ajouta : Dispersez-vous dans la troupe et dites à chacun de m''amener son bœuf, son mouton ou sa chèvre, et de l''immoler ici. Vous mangerez ensuite et vous ne pécherez pas contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en mangeant au-dessus du sang. Pendant la nuit, chacun amena son propre bœuf, afin de l''immoler à cet endroit. '
  '35':
  - type: note
    content: Ce v. ne décrit sans doute pas une nouvelle entreprise de Saül, mais renvoie aux v. 32n-33n. Cf. Jg 6.24n.
  - type: text
    content: 'Saül bâtit donc un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : c''est le premier autel qu''il bâtit pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Attaquons  : litt. descendons derrière , de même au v. 37. –  jusqu''à l''aube  : litt. jusqu''à la lumière du matin . –  ce qui te plaira  : cf. v. 40 ; 3.18+. – Voir prêtre. –  Présentons-nous (ou approchons-nous ) est une invitation à consulter Dieu pour connaître sa volonté.'
  - type: text
    content: 'Saül dit : Attaquons les Philistins cette nuit, pillons-les jusqu''à l''aube et qu''il n''en reste pas un seul. Ils dirent : Fais tout ce qui te plaira. Alors le prêtre dit : Présentons-nous ici devant Dieu. '
  '37':
  - type: note
    content: 'interrogea Dieu  : cf. 10.22n  ; Jg 1.1+. –  à Israël  : litt. entre les mains d''Israël  ; cf. 4.3n. –  pas de réponse  : cf. 28.6 ; Mi 3.4,7 ; Jb 30.20 ; voir aussi 1R 18.26 ; Es 46.7.'
  - type: text
    content: 'Saül interrogea Dieu : Dois-je attaquer les Philistins ? Les livreras-tu à Israël ? Mais ce jour-là il ne lui donna pas de réponse. '
  '38':
  - type: note
    content: 'chefs  : cf. Jg 20.2n. –  péché  : cf. Jos 7.13s ; ici le silence de Dieu manifeste son irritation ; voir Mi 3.1ss.'
  - type: text
    content: 'Saül dit : Approchez ici, vous tous, chefs du peuple ! Vous voyez bien en quoi il y a eu péché aujourd''hui. '
  '39':
  - type: note
    content: 'Par la vie du Seigneur  : tournure qui est tout à la fois une confession de foi et une formule de serment (par le Dieu vivant) ; cf. v. 45 ; 19.6 ; 20.3 ; 25.26 ; Jg 8.19 ; 2S 4.9 ; 1R 2.24 ; 2R 2.2 ; Jr 5.2. –  mis à mort  : cf. 2S 12.5. –  personne ne lui répondit  : le peuple refuse de dénoncer Jonathan, et laisse à Saül la responsabilité de ses démarches (v. 40).'
  - type: text
    content: 'Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Sauveur d''Israël, même si c''est Jonathan, mon fils, qui en est l''auteur, il sera mis à mort ! Et dans tout le peuple, personne ne lui répondit. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Entre les passages…  : autre traduction parmi les passages… –  il y en avait un avec  : sous-entendu (probable) dans le texte. –  Botsets  : l''origine et le sens de ce nom propre sont inconnus. – Le nom de Senné ressemble à un mot hébreu signifiant buisson épineux , cf. Ex 3.2nss.'
  - type: text
    content: 'Entre les passages par lesquels Jonathan cherchait à passer vers le poste des Philistins, il y en avait un avec une dent de rocher d''un côté et une dent de rocher de l''autre ; l''une était nommée Botsets et l''autre Senné. '
  '40':
  - type: note
    content: 'Mettez-vous d''un côté…  : procédure analogue à celle de Jos 7.10-18 (pour la recherche d''un coupable) et à celle de 1S 10.20-24 (pour la désignation du roi). –  ce qui te plaira  : cf. v. 36.'
  - type: text
    content: 'Il dit à tout Israël : Mettez-vous d''un côté ; Jonathan, mon fils, et moi, nous serons de l''autre. Et le peuple dit à Saül : Fais ce qui te plaira. '
  '41':
  - type: note
    content: 'Il semble que le texte hébreu ait subi une amputation involontaire, à la suite d''une erreur de copie. LXX a conservé un texte long  : Dieu d''Israël, pourquoi ne m''as-tu pas répondu, à moi, ton serviteur, aujourd''hui ? Si la faute est chez moi ou chez Jonathan, mon fils, Seigneur, Dieu d''Israël, donne l''évidence (ourim, en hébreu)  ; et si tu dis ceci : « (Elle est) dans ton peuple d''Israël », donne la perfection (toummim  ; le texte hébreu porte tamim, traduit ici par vérité). Il s''agirait donc d''une consultation au moyen des objets sacrés nommés ourim et toummim, cf. 10.21s ; Ex 28.30. –  furent désignés / fut mis hors de cause  : litt. furent pris / sortit  ; cf. Ps 7.10 ; Ac 1.24.'
  - type: text
    content: 'Saül dit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Dieu d''Israël, fais connaître la vérité ! Jonathan et Saül furent désignés, et le peuple fut mis hors de cause. '
  '42':
  - type: note
    content: 'LXX présente également dans ce v. un texte long  : … entre moi et Jonathan, mon fils. Celui que le Seigneur aura désigné mourra. Mais le peuple dit à Saül : Cela ne sera pas ! Pourtant Saül l''emporta sur le peuple. On tira au sort entre lui et Jonathan, son fils. Et Jonathan fut désigné. –  Tirez au sort  : litt. faites tomber.'
  - type: text
    content: 'Saül dit : Tirez au sort entre moi et Jonathan, mon fils. Jonathan fut désigné. '
  '43':
  - type: note
    content: 'Raconte-moi ce que tu as fait  : cf. Jos 7.19 ; Jon 1.7s.'
  - type: text
    content: 'Saül dit à Jonathan : Raconte-moi ce que tu as fait. Jonathan le lui raconta : J''ai goûté un peu de miel, dit-il, avec l''extrémité du bâton que j''avais à la main ; eh bien, que je meure ! '
  '44':
  - type: note
    content: 'Que Dieu…  : cf. v. 24n  ; 3.17n.'
  - type: text
    content: 'Et Saül dit : Que Dieu fasse ceci et qu''il y ajoute cela ! Tu mourras, Jonathan ! '
  '45':
  - type: note
    content: 'a réalisé cette grande victoire  : litt. a fait ce grand salut  ; cf. 11.13 ; 19.5. –  Jamais ! cf. 2.30n. –  Par la vie du Seigneur  : cf. v. 39n. –  un seul cheveu de sa tête  : cf. 2S 14.11 ; 1R 1.52 ; Lc 21.18 ; Ac 27.34. –  c''est avec Dieu qu''il a agi  : autre traduction c''est lui qui, avec Dieu, a fait ce jour  ; cf. Ps 44.3-8. –  dégagea ou libéra, cf. Dt 7.8n.'
  - type: text
    content: 'Le peuple dit à Saül : Quoi ! Jonathan mourrait, lui qui a réalisé cette grande victoire en Israël ! Jamais ! Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', il ne tombera pas à terre un seul cheveu de sa tête, car c''est avec Dieu qu''il a agi en ce jour. Ainsi le peuple dégagea Jonathan ; il ne mourut pas. '
  '46':
  - type: text
    content: Après avoir poursuivi les Philistins, Saül remonta ; quant aux Philistins, ils s'en allèrent chez eux.
  - type: heading
    content: Les victoires de Saül ; sa famille
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'à tous ses ennemis  : l''énumération qui suit mentionne Moab et les Ammonites , à l''est, Edom , au sud, Tsoba , au nord, et les Philistins , à l''ouest ( de tous côtés ). –  il était vainqueur  : litt. il sauvait (9.16), d''après LXX, Vg et Syr. Le texte hébreu traditionnel porte il était méchant (ou il agissait méchamment ), leçon probablement issue de la gêne de certains scribes devant une affirmation positive au sujet de Saül.'
  - type: text
    content: 'Quand Saül eut pris possession de la royauté sur Israël, il fit de tous côtés la guerre à tous ses ennemis, à Moab, aux Ammonites, à Edom, aux rois de Tsoba et aux Philistins ; partout où il allait, il était vainqueur. '
  '48':
  - type: note
    content: 'Il déploya sa force, battit (cf. Nb 24.18) ou il montra sa vaillance en battant. –  Amalec  : voir chap. 15. –  de ceux qui le pillaient  : cf. Jg 2.16 ; Es 17.14 ; Jr 30.16 ; Ez 39.10.'
  - type: text
    content: Il déploya sa force, battit Amalec et délivra Israël de la main de ceux qui le pillaient.
  - type: heading
    content: 1Ch 8.33-40  ; 9.39-43
  '49':
  - type: text
    content: ' '
  - type: note
    content: 'Les fils de Saül  : cf. 31.2 ; 1Ch 8.33. –  Mérab  : cf. 18.17-19. –  Mikal  : cf. 18.20-28 ; 19.11-17 ; 2S 3.13s ; 6.16ss.'
  - type: text
    content: 'Les fils de Saül étaient Jonathan, Yishvi et Malki-Shoua. Quant au nom de ses deux filles : le nom de l''aînée était Mérab et le nom de la cadette Mikal. '
  '5':
  - type: note
    content: 'se dresse  : le mot hébreu correspondant, qui pourrait signifier colonne, n''a pas d''équivalent dans LXX, et est traduit de manière très diverse par les autres versions anciennes.'
  - type: text
    content: L'une de ces dents se dresse au nord, en face de Mikmas, et l'autre au sud, en face de Guéba.
  '50':
  - type: note
    content: 'Ahinoam  : le nom de la femme de Saül n''est mentionné nulle part ailleurs. –  Abiner  : variante orthographique du nom d’Abner (v. 51 et dans la suite) ; cf. 17.55ss ; 20.25 ; 26.5-15 etc. –  oncle de Saül  : cf. 10.14ss.'
  - type: text
    content: 'Le nom de la femme de Saül était Ahinoam, fille d''Ahimaats. Le nom du chef de son armée était Abiner, fils de Ner, oncle de Saül. '
  '51':
  - type: note
    content: 'fils d''Abiel  : cf. 9.1.'
  - type: text
    content: 'Qish, père de Saül, et Ner, père d''Abner, étaient fils d''Abiel. '
  '52':
  - type: note
    content: 'Tout homme vaillant…  : autre traduction tout vaillant guerrier  ; cf. 10.26.'
  - type: text
    content: Il y eut une guerre acharnée contre les Philistins pendant tous les jours de Saül. Tout homme vaillant et fort que Saül remarquait, il se l'adjoignait.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'incirconcis  : cf. Jg 14.3n. –  un petit nombre  : cf. Jg 7.1-8 ; 1R 20.26-30 ; 2Ch 14.7-12 ; cf. 1S 17.45-47.'
  - type: text
    content: 'Jonathan dit au serviteur qui portait ses armes : Viens, passons jusqu''au poste de ces incirconcis. Peut-être le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agira-t-il en notre faveur, car rien n''empêche le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de sauver, que ce soit par un petit nombre ou par un grand nombre. '
  '7':
  - type: note
    content: 'Fais tout…  : cf. 10.7 ; 2S 7.3/ / ; Es 10.7n. –  n''hésite pas  : litt. étends pour toi  ; l''expression hébraïque ainsi rendue est très peu claire ; les traducteurs anciens ont déjà été très embarrassés. Autres traductions continue ; va où tu veux ; allons-y ; n''écoute que ton sentiment. –  avec toi, comme ton propre cœur  : cf. 2S 15.15.'
  - type: text
    content: 'Celui qui portait ses armes lui répondit : Fais tout ce que tu as dans le cœur, n''hésite pas ; je suis avec toi, comme ton propre cœur. '
  '8':
  - type: text
    content: 'Eh bien, dit Jonathan, passons jusqu''à ces hommes et montrons-nous à eux ! '
  '9':
  - type: text
    content: 'S''ils nous disent : « Ne bougez pas, nous vous rejoignons ! », nous resterons sur place, et nous ne monterons pas vers eux. '
