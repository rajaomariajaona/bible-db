    - type: text
      text: 'Y a-t-il sur la terre une seule nation qui soit comme Israël, ton peuple, que les dieux soient allés libérer pour en faire leur peuple et pour lui donner un nom ? Tu as fait pour eux de grandes choses, tu as accompli des œuvres redoutables pour ton pays, devant ton peuple que tu as libéré de l''Egypte, de ses nations et de ses dieux, pour qu''il t''appartienne. '
