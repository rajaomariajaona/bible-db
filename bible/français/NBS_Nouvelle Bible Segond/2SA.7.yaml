  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fixerai un lieu… planterai… demeure…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : promesse d''une installation définitive et paisible dans le pays d''Israël ; cf. Es 60.21 ; Ps 80.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plus agité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : allusion à l''instabilité d''un peuple sans terre. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les hommes injustes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne recommencent plus à l''affliger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'opprimer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ex 3.7 ; Dt 8.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : voir Es 60.18 ; Lc 1.74.'
      marker-yv: yv-n
    - type: text
      text: 'je fixerai un lieu à Israël, mon peuple ; je le planterai pour qu''il y demeure et qu''il ne soit plus agité, pour que les hommes injustes ne recommencent plus à l''affliger comme par le passé. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des juges
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir Jg 2.14-16 ; l''époque des Juges était un temps troublé où Israël était continuellement menacé par ses voisins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je t'ai accordé le repos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir v. 1+ ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je t'accorderai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' joue sur le double sens du mot hébreu : ce n''est pas David qui bâtira une '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le temple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 5) pour Dieu, c''est Dieu qui lui fera une '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (= une dynastie). Cf. Ex 1.21 ; 1R 11.38.
      marker-yv: yv-n
    - type: text
      text: 'Depuis le jour où j''ai institué des juges sur Israël, mon peuple, je t''ai accordé le repos en te délivrant de tous tes ennemis ; or le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''a annoncé que c''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui fera une maison pour toi. '
