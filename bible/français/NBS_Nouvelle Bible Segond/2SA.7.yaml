document_id: 2SA.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'annonce faite à David
  - type: heading
    content: 1Ch 17.1-15
  - type: text
    content: ' '
  - type: note
    content: 'fut installé  : le même verbe est traduit par habiter dans la suite. –  sa maison  : cf. 5.11. –  repos  : cf. Dt 12.10 ; 25.19 ; Jos 21.44 ; 23.1 ; 1R 5.18. –  en le délivrant  : sous-entendu dans le texte ; cf. v. 11. –  les ennemis  : litt. ses ennemis.'
  - type: text
    content: 'Lorsque le roi fut installé dans sa maison, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui eut accordé le repos en le délivrant de tous les ennemis qui l''entouraient, '
  '10':
  - type: note
    content: 'fixerai un lieu… planterai… demeure…  : promesse d''une installation définitive et paisible dans le pays d''Israël ; cf. Es 60.21 ; Ps 80.9. –  plus agité  : allusion à l''instabilité d''un peuple sans terre. –  les hommes injustes 3.34n  ; voir justice. –  ne recommencent plus à l''affliger (ou à l''opprimer, cf. Ex 3.7 ; Dt 8.2n) : voir Es 60.18 ; Lc 1.74.'
  - type: text
    content: 'je fixerai un lieu à Israël, mon peuple ; je le planterai pour qu''il y demeure et qu''il ne soit plus agité, pour que les hommes injustes ne recommencent plus à l''affliger comme par le passé. '
  '11':
  - type: note
    content: 'des juges  : voir Jg 2.14-16 ; l''époque des Juges était un temps troublé où Israël était continuellement menacé par ses voisins. –  je t''ai accordé le repos  : voir v. 1+ ; LXX et Vg je t''accorderai. –  une maison  : le prophète joue sur le double sens du mot hébreu : ce n''est pas David qui bâtira une maison (= le temple, v. 5) pour Dieu, c''est Dieu qui lui fera une maison (= une dynastie). Cf. Ex 1.21 ; 1R 11.38.'
  - type: text
    content: 'Depuis le jour où j''ai institué des juges sur Israël, mon peuple, je t''ai accordé le repos en te délivrant de tous tes ennemis ; or le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a annoncé que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui fera une maison pour toi. '
  '12':
  - type: note
    content: 'Cf. Jn 7.42. –  tes jours seront accomplis  : cf. Es 65.20 ; Jn 7.8. –  que tu te seras couché avec tes pères  : c.-à-d. que tu seras mort  ; cf. Gn 47.30 ; 1R 1.21 ; 2.10 ; Ac 13.36. –  je susciterai  : litt. je ferai lever. –  ta descendance  : cf. Gn 3.15n. –  celui qui sera sorti de toi  : allusion à Salomon ; autre traduction celle qui sera sortie de toi (litt. de tes entrailles). –  j''affermirai son règne  : cf. 1R 2.12,46 ; 8.20.'
  - type: text
    content: 'Quand tes jours seront accomplis et que tu te seras couché avec tes pères, je susciterai après toi ta descendance, celui qui sera sorti de toi, et j''affermirai son règne. '
  '13':
  - type: note
    content: 'une maison pour mon nom  : cf. 1R 5.15–6.38 ; voir aussi 1R 3.2 ; Za 6.12 ; Mt 16.18. –  son trône royal  : cf. Es 9.6 ; Jr 33.17 ; 1Ch 28.7 ; voir aussi Ps 9.8 ; Dn 2.44 ; Lc 1.33 ; Ap 11.15. La promesse faite à David dans les v. 13-16 concerne d''abord Salomon, mais aussi toute la dynastie des rois de Juda. Elle est souvent reprise dans la Bible (Ps 2.7 ; 89.4s,30 ; Ac 2.30 ; Hé 1.5), quelquefois avec un sens messianique.'
  - type: text
    content: 'C''est lui qui bâtira une maison pour mon nom, et j''affermirai pour toujours son trône royal. '
  '14':
  - type: note
    content: 'père / fils  : cf. Ps 2.7 ; 1Ch 22.10 ; Ac 13.33 ; Hé 5.5 ; voir 2Co 6.18. –  fautes  : voir péché. –  je le châtierai (ou je l''avertirai, je le reprendrai, cf. Pr 1.23n) avec le bâton des hommes  ; on peut comprendre par l''intermédiaire des humains, comme les humains châtient, ou encore comme on châtie des humains  ; cf. 1R 11.14-40 ; Ps 89.31-33.'
  - type: text
    content: 'Moi, je serai son père, et lui, il sera mon fils. S''il commet des fautes, je le châtierai avec le bâton des hommes et avec les coups des humains ; '
  '15':
  - type: note
    content: 'ma fidélité…  : cf. 1R 11.13 ; Ps 89.34-38 ; voir grâce. –  retirée à Saül  : voir 1S 13.14 ; 15.28 ; 16.14.'
  - type: text
    content: 'mais ma fidélité ne lui sera pas retirée, comme je l''ai retirée à Saül, que j''ai écarté devant toi. '
  '16':
  - type: note
    content: 'assurés  : autre traduction stables. –  devant toi  : quelques mss hébreux et des versions anciennes portent devant moi.'
  - type: text
    content: Ta maison et ton règne seront pour toujours assurés devant toi, ton trône pour toujours affermi.
  '17':
  - type: text
    content: Nathan rapporta à David toutes ces paroles et toute cette vision.
  - type: heading
    content: Prière de David
  - type: heading
    content: 1Ch 17.16-27
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'se présenter  : litt. s''asseoir ou s''installer  ; la position assise pour prier est inhabituelle dans la Bible. –  Seigneur / Seigneur  : hébreu YHWH / ’Adonaï , cf. Ex 3.15n. –  Qui suis-je  : voir 1S 18.18+ ; cf. 1S 9.21. –  ma maison ou ma famille . –  jusqu''ici  : c.-à-d. jusqu''à la position que j''occupe.'
  - type: text
    content: 'Le roi David alla se présenter devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dit : Qui suis-je, Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', et qu''est-ce que ma maison, pour que tu m''aies fait parvenir jusqu''ici ? '
  '19':
  - type: note
    content: 'Telle est la loi (hébreu tora) de l''être humain  : phrase très obscure en hébreu ; on a pu l''interpréter comme une réflexion sur le destin, sur le sort de l''homme, ou en particulier du roi, qui se survit dans ses descendants ; on pourrait aussi la comprendre comme une interrogation  : est-ce là la loi de l''être humain ? (réponse sous-entendue : non, tu me donnes un privilège exceptionnel, ou bien : non, ce n''est pas un enseignement humain). Certains modifient le texte hébreu traditionnel pour traduire et cela, tu l''enseignes à l''homme.'
  - type: text
    content: 'C''est encore peu de chose à tes yeux, Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  ; tu parles aussi en faveur de ma maison pour des temps lointains. Telle est la loi de l''être humain, Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  ! '
  '2':
  - type: note
    content: 'une maison de cèdre  : cf. 5.11. –  une toile de tente  : litt. l''étoffe  ; voir 6.17. David oppose la fragilité de la demeure du Coffre à la solidité de son propre palais.'
  - type: text
    content: 'le roi dit à Nathan, le prophète : Regarde, je te prie : j''habite une maison de cèdre, alors que le coffre de Dieu habite dans une toile de tente. '
  '20':
  - type: note
    content: 'Tu m''as distingué  : litt. tu me connais (cf. Gn 18.19n  ; Ps 139.1s ; 144.3) ; autre traduction tu prends soin de moi (cf. Na 1.7 ; Jb 9.21).'
  - type: text
    content: 'Que pourrais-je encore te dire de plus, moi, David ? Tu m''as distingué, toi, Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  ! '
  '21':
  - type: text
    content: 'A cause de ta parole et selon ton cœur, tu as fait toutes ces grandes choses pour me les faire connaître. '
  '22':
  - type: note
    content: 'tu es grand  : cf. Ps 48.2 ; 77.14 ; 95.3 ; 104.1 ; Dn 9.4. –  pas de Dieu à part toi  : cf. Dt 3.24 ; 4.35 ; 32.39 ; Ps 86.8. –  entendu  : litt. entendu de nos oreilles  ; cf. Ps 44.2.'
  - type: text
    content: 'Que tu es grand, Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  ! Nul n''est semblable à toi, et il n''y a pas de Dieu à part toi, d''après tout ce que nous avons entendu. '
  '23':
  - type: note
    content: 'Le texte hébreu de ce verset présente de nombreuses difficultés, et son sens n''est pas toujours clair. –  comme Israël, ton peuple  : voir Dt 4.7,33. –  que les dieux soient allés libérer  : autres traductions que Dieu soit allé libérer ; qu''un dieu soit allé libérer  ; cf. Gn 1.1n. –  pour lui donner un nom, c.-à-d. pour le rendre célèbre (cf. Dt 26.19) ; mais on pourrait aussi comprendre pour se faire un nom (cf. Ex 9.16). –  Tu as fait pour eux  : litt. pour faire pour vous ( ?). –  œuvres redoutables  : voir Ex 7–12 ; Dt 10.21.'
  - type: text
    content: 'Y a-t-il sur la terre une seule nation qui soit comme Israël, ton peuple, que les dieux soient allés libérer pour en faire leur peuple et pour lui donner un nom ? Tu as fait pour eux de grandes choses, tu as accompli des œuvres redoutables pour ton pays, devant ton peuple que tu as libéré de l''Egypte, de ses nations et de ses dieux, pour qu''il t''appartienne. '
  '24':
  - type: note
    content: 'tu es devenu son Dieu  : cf. Gn 17.7s ; Ex 6.7 ; Dt 26.18s ; 29.12.'
  - type: text
    content: 'Tu as affermi Israël, ton peuple, afin qu''il soit ton peuple pour toujours ; et toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es devenu son Dieu. '
  '25':
  - type: note
    content: 'la parole  : cf. 1S 1.23+.'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, fais subsister pour toujours la parole que tu as prononcée sur moi, ton serviteur, et sur ma maison ; agis selon ta parole. '
  '26':
  - type: note
    content: 'ton nom soit grand  : voir Jr 10.6 ; Ml 1.11. –  Le Seigneur (YHWH) des Armées est Dieu sur Israël  : voir 1R 18.36 ; Ps 48.15. –  Que ma maison… soit affermie  : cf. v. 16.'
  - type: text
    content: 'Que ton nom soit grand pour toujours et que l''on dise : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées est Dieu sur Israël ! » Que ma maison à moi, David, ton serviteur, soit affermie devant toi ! '
  '27':
  - type: note
    content: 'tu m''as informé  : cf. 1S 9.15n. –  Je bâtirai une maison pour toi  : cf. v. 11n. –  j''ai trouvé le cœur  : litt. ton serviteur a trouvé son cœur, cette expression est unique dans l''A.T., et son sens n''est pas certain. –  cette prière  : cf. 1R 8.22-61.'
  - type: text
    content: 'Car toi-même, '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, Dieu d''Israël, tu m''as informé : « Je bâtirai une maison pour toi ! » C''est pourquoi j''ai trouvé le cœur de t''adresser cette prière. '
  '28':
  - type: note
    content: 'tes paroles sont vérité  : cf. Nb 23.19 ; Ps 119.160 ; Jn 17.17.'
  - type: text
    content: 'Maintenant, Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', c''est toi qui es Dieu, tes paroles sont vérité, et tu m''as annoncé ce bienfait. '
  '29':
  - type: note
    content: 'bénir ma maison  : cf. Ps 21.4-7 ; 45.3. –  bénie pour toujours  : cf. 23.5 ; Es 55.3.'
  - type: text
    content: 'Maintenant, veuille bénir ma maison, afin qu''elle subsiste pour toujours devant toi ! Car c''est toi, Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', qui as parlé, et par ta bénédiction ma maison sera bénie pour toujours.'
  '3':
  - type: note
    content: 'ce que tu as dans le cœur  : c.-à-d. selon ton idée. –  le Seigneur est avec toi  : cf. Jg 6.12+,16+.'
  - type: text
    content: 'Nathan répondit au roi : Va, fais tout ce que tu as dans le cœur, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec toi.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Révélation divine pendant la nuit  : voir Nb 12.6 ; Jg 6.25 ; 1S 15.16 ; 1R 3.5 ; Dn 2.19 ; Ac 16.9 ; 18.9.'
  - type: text
    content: 'Cette nuit-là, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Nathan : '
  '5':
  - type: note
    content: 'bâtiras une maison  : cf. 1R 5.17 ; la maison désigne ici le temple.'
  - type: text
    content: 'Va dire à David, mon serviteur : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Est-ce toi qui me bâtiras une maison pour que j''y habite ? '
  '6':
  - type: note
    content: 'monter d''Egypte Gn 12.10n  ; voir Ex 14 ; 1R 8.16. –  je me suis déplacé  : autre traduction j''étais errant  ; le même verbe est rendu par parcourir en Gn 3.8. –  avec une tente pour demeure  : litt. dans une tente et dans une demeure  ; cf. Ex 25.9n  ; 40.34-38 ; Jos 18.1 ; Ps 78.60.'
  - type: text
    content: 'Pourtant, je n''ai pas habité dans une maison depuis le jour où j''ai fait monter d''Egypte les Israélites jusqu''à ce jour, mais je me suis déplacé avec une tente pour demeure. '
  '7':
  - type: note
    content: 'à aucune des tribus  : on pourrait aussi traduire à aucun des chefs. –  une maison de cèdre  : cf. Ps 78.69 ; Ac 17.24.'
  - type: text
    content: 'Partout où je me suis déplacé avec tous les Israélites, ai-je dit un seul mot à aucune des tribus d''Israël à qui j''avais ordonné de faire paître Israël, mon peuple ? Ai-je dit : « Pourquoi ne me bâtissez-vous pas une maison de cèdre ? » '
  '8':
  - type: note
    content: pris au pâturage… 5.2 ; 6.21 ; 1S 16.11 ; Ps 78.70s.
  - type: text
    content: 'Maintenant, tu parleras ainsi à David, mon serviteur : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : C''est moi qui t''ai pris au pâturage, derrière le troupeau, pour que tu sois chef sur mon peuple, sur Israël. '
  '9':
  - type: note
    content: 'j''ai été avec toi  : cf. 1S 18.14. –  j''ai retranché tous tes ennemis  : cf. 22.38-43 ; Dt 4.38 ; 12.29 ; Jg 11.23. –  Je te ferai (autre traduction je t''ai fait) un grand nom  : cf. Gn 12.2.'
  - type: text
    content: 'Partout où tu es allé, j''ai été avec toi et j''ai retranché tous tes ennemis devant toi. Je te ferai un grand nom, comme le nom des grands de la terre ; '
