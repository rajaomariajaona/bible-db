      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 2.12,46 ; 8.20.'
      marker-yv: yv-n
    - type: text
      text: 'Quand tes jours seront accomplis et que tu te seras couché avec tes pères, je susciterai après toi ta descendance, celui qui sera sorti de toi, et j''affermirai son règne. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une maison pour mon nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 5.15–6.38 ; voir aussi 1R 3.2 ; Za 6.12 ; Mt 16.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son trône royal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 9.6 ; Jr 33.17 ; 1Ch 28.7 ; voir aussi Ps 9.8 ; Dn 2.44 ; Lc 1.33 ; Ap 11.15. La promesse faite à David dans les v. 13-16 concerne d''abord Salomon, mais aussi toute la dynastie des rois de Juda. Elle est souvent reprise dans la Bible (Ps 2.7 ; 89.4s,30 ; Ac 2.30 ; Hé 1.5), quelquefois avec un sens messianique.'
      marker-yv: yv-n
    - type: text
      text: 'C''est lui qui bâtira une maison pour mon nom, et j''affermirai pour toujours son trône royal. '
