    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  ; tu parles aussi en faveur de ma maison pour des temps lointains. Telle est la loi de l''être humain, Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  ! '
