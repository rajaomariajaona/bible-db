      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme on châtie des humains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1R 11.14-40 ; Ps 89.31-33.'
      marker-yv: yv-n
    - type: text
      text: 'Moi, je serai son père, et lui, il sera mon fils. S''il commet des fautes, je le châtierai avec le bâton des hommes et avec les coups des humains ; '
