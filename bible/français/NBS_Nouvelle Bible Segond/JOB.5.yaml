document_id: JOB.5,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'saints  : le terme peut désigner des dieux, des anges ou des hommes consacrés (comparer 4.18 avec 15.15). Voir aussi Za 14.5 ; Dn 4.14. –  t''adresseras-tu  : on a aussi compris, en mauvaise part  : t''en prendras-tu ?'
  - type: text
    content: Crie donc, je te prie !
  - type: text
    content: Y a-t-il quelqu'un qui te répondra ?
  - type: text
    content: Auquel des saints t'adresseras-tu ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'les champs  : litt. des extérieurs.'
  - type: text
    content: il répand la pluie sur la terre,
  - type: text
    content: il envoie l'eau sur les champs ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 12.16-25 ; 34.19s ; 42.10 ; 1S 2.7s ; Es 57.15 ; Ps 75.8 ; Lc 1.52s. –  les désespérés  : litt. les sombres  ; autre traduction les obscurs  ; cf. 6.16n  ; 30.28.'
  - type: text
    content: il place en haut ceux qui sont abaissés,
  - type: text
    content: et ce sont les désespérés qui parviennent au salut.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'le succès  : le terme hébreu correspondant est traduit par ressource en 6.13 ; raison en 11.6 ; 12.16 ; raisonnement en 26.3 ; voir aussi 30.22n  ; Es 28.29 ; Mi 6.9n  ; Pr 2.7n.'
  - type: text
    content: Il déjoue les plans des gens avisés,
  - type: text
    content: et leurs mains ne peuvent leur assurer le succès.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '37.24 ; 1Co 3.19. –  intelligence  : un terme apparenté est rendu par gens avisés au v. 12. –  s''avèrent irréfléchis  : autres traductions échouent ; sont renversés ; sont pris de vitesse.'
  - type: text
    content: Il prend les sages à leur propre intelligence,
  - type: text
    content: et les projets des gens retors s'avèrent irréfléchis ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: Pr 4.19 ; Mt 27.45/ / ; Jn 12.35 ; 1Jn 2.9-11.
  - type: text
    content: ils rencontrent les ténèbres en plein jour
  - type: text
    content: et tâtonnent en plein midi comme dans la nuit.
  '15':
  - type: text
    content: Mais il sauve le pauvre de l'épée de leur bouche
  - type: text
    content: et de la main de celui qui est fort ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'injustice  : voir justice.'
  - type: text
    content: alors, pour le faible, il y a de l'espoir,
  - type: text
    content: mais l'injustice ferme la bouche.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 8.5 ; Pr 3.11s ; Hé 12.5 ; Ap 3.19. –  avertit ou reprend , Pr 1.23n. –  Ne rejette pas  : autre traduction ne méprise pas . –  l''instruction ou la correction , 4.3n  ; Pr 1.2n. –  du Puissant  : hébreu Shaddaï  : c''est dans le livre de Job que ce nom de Dieu, qui rappelle l''époque des patriarches (voir Gn 17.1n  ; Ex 6.3), revient le plus souvent (6.4,14 ; 8.3,5 ; 11.7 ; 13.3 ; 15.25 ; 21.15,20 ; 22.3,17,23,25s ; 23.16 ; 24.1 ; 27.2,10ss ; 29.5 ; 31.2,35 ; 32.8 ; 33.4 ; 34.10,12s ; 35.13 ; 37.23 ; 40.2 ; voir aussi 19.29n).'
  - type: text
    content: Ainsi donc, heureux l'homme que Dieu avertit !
  - type: text
    content: Ne rejette pas l'instruction du Puissant !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Certains comprennent  : c''est lui qui panse en blessant ; lui dont les mains, en écrasant, guérissent. Cf. 33.19 ; 36.15 ; voir aussi Dt 32.39+ ; Os 6.1.'
  - type: text
    content: Car c'est lui qui blesse et qui panse ;
  - type: text
    content: il fracasse, et ses mains guérissent.
  '19':
  - type: text
    content: Six fois il te délivrera de la détresse,
  - type: text
    content: sept fois le malheur ne t'atteindra pas.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'la contrariété / la passion jalouse  : ces termes pourraient aussi désigner la colère de Dieu.'
  - type: text
    content: Car la contrariété tue l'imbécile,
  - type: text
    content: et la passion jalouse fait mourir le naïf.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 39.18 ; Ps 33.19. –  des coups  : litt. des mains.'
  - type: text
    content: Il te libérera de la mort pendant la famine
  - type: text
    content: et des coups de l'épée pendant la guerre.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'du fouet (ou du fléau  ; le même terme hébreu est traduit par destruction en 9.23) de la langue  : c.-à-d. des malédictions, des mauvais sorts aussi bien que des calomnies. Cf. Es 54.17 ; Ps 12.3-5 ; 31.21.'
  - type: text
    content: Tu seras à l'abri du fouet de la langue,
  - type: text
    content: tu n'auras pas peur quand viendra le ravage.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'faim 30.3 – tu n''auras pas peur…  : autre traduction n''aie pas peur des animaux…  ; même verbe au v. 21. –  animaux sauvages Gn 1.24n.'
  - type: text
    content: Tu te riras du ravage comme de la faim ;
  - type: text
    content: tu n'auras pas peur des animaux sauvages ;
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'pierres  : cf. 2R 3.19,25 ; Es 5.2. –  animaux sauvages (ou des champs , ou de la campagne , autre expression au v. 22) Os 2.20 ; Es 11.6-8 ; Ez 34.25 ; Mc 16.18.'
  - type: text
    content: car tu feras alliance avec les pierres des champs,
  - type: text
    content: et les animaux sauvages seront en paix avec toi.
  '24':
  - type: text
    content: Tu sauras la paix sous ta tente ;
  - type: text
    content: tu inspecteras ton domaine, et il ne te manquera rien.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Dt 28.4,11 ; Ps 128.3 ; 144.12.
  - type: text
    content: Tu sauras ta descendance nombreuse,
  - type: text
    content: et tes rejetons comme l'herbe de la terre.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Le sens précis du mot traduit ici par vigueur est incertain (de même en 30.2) ; autre traduction d'une heureuse vieillesse . Voir 42.17.
  - type: text
    content: Tu entreras dans le tombeau en pleine vigueur,
  - type: text
    content: comme on élève un tas de gerbes en son temps.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'examiné… à fond  : même verbe en 13.9 ; 28.3 ( explorer ), 27 ; 29.16 ; 32.11 ; un mot apparenté est traduit par expérience en 8.8, par profondeurs en 11.7 ; 38.16 ; voir aussi Jr 17.10 ; Ps 139.1n  ; Ec 12.9. –  A toi d''entendre  : des versions anciennes ont lu nous l''avons entendu.'
  - type: text
    content: 'Voilà, nous avons examiné la chose à fond : c''est ainsi !'
  - type: text
    content: A toi d'entendre et de le reconnaître !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai voué…  : cf. 3.8+ ; certains modifient le texte hébreu traditionnel pour lire son domaine a été voué à la malédiction . –  malédiction  : voir bénédiction.'
  - type: text
    content: J'ai vu l'imbécile prendre racine ;
  - type: text
    content: et soudain j'ai voué son domaine à la malédiction.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction ses fils sont privés de tout secours ; ils sont écrasés… –  soient privés de tout secours  : autre traduction s''éloignent du salut . –  écrasés à la porte de la ville ( de la ville est sous-entendu dans le texte), c.-à-d. condamnés au tribunal  ; cf. Pr 22.22. La porte de la ville est le lieu où l''on rendait la justice ; cf. 29.7s ; Dt 16.18n  ; 17.5n  ; Za 8.16 ; Ps 127.5 ; Rt 4.1,10n.'
  - type: text
    content: « Que ses fils soient privés de tout secours !
  - type: text
    content: Qu'ils soient écrasés à la porte de la ville,
  - type: text
    content: et qu'il n'y ait personne pour les délivrer !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'des affamés… épines  : cette phrase a donné lieu à plusieurs variantes dans les versions anciennes. –  Qu''un piège aspire…  : traduction incertaine ; autre traduction qu''un lacet (même terme en 18.9) happe… On peut aussi comprendre, avec Vg et Syr que des assoiffés engloutissent sa fortune.'
  - type: text
    content: Que des affamés dévorent sa moisson,
  - type: text
    content: qu'ils viennent la prendre jusque dans les épines !
  - type: text
    content: Qu'un piège aspire à sa fortune. »
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'mal / oppression  : cf. 4.8+. –  de la terre  : litt. du sol  ; cf. Gn 2.5n.'
  - type: text
    content: Le mal ne sort pas de la poussière,
  - type: text
    content: l'oppression ne germe pas de la terre ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'étincelles  : litt. fils de résheph . Certains voient dans ce dernier mot la désignation de l''aigle, d''autres le nom du dieu cananéen de la foudre, représenté par l''aigle (d''où la traduction étincelles ou flammèches ) ; cf. Ha 3.5n.'
  - type: text
    content: l'être humain est né pour l'oppression,
  - type: text
    content: comme les étincelles s'élèvent pour voler.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Quant à moi  : probablement au sens de si j''étais à ta place  ; autre traduction cependant moi je chercherai Dieu . –  Dieu  : hébreu ’El à la première occurrence ; autre nom de Dieu (cf. 3.4n  ; voir aussi 5.17n  ; Gn 17.1n  ; 21.33n) qui revient souvent dans le livre de Job (8.3,5,13,20 ; 9.2 ; 12.6 ; 13.3,7s ; 15.4,11,13,25 ; 16.11 ; 18.21 ; 19.22 ; 20.15,29 ; 21.14,22 ; 22.2,13,17 ; 23.16 ; 25.4 ; 27.2,9,11,13 ; 31.14,23,28 ; 32.13 ; 33.4,6,14,29 ; 34.5,10,12,23,31,37 ; 35.2,13 ; 36.5,22,26 ; 37.5,10,14 ; 38.41 ; 40.9,19).'
  - type: text
    content: Quant à moi, je chercherais Dieu,
  - type: text
    content: et c'est à Dieu que j'exposerais ma cause.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 9.10 ; Ps 40.6.
  - type: text
    content: Il fait des choses grandes et insondables,
  - type: text
    content: des choses étonnantes, sans nombre ;
