document_id: 2CH.14,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Début du règne d'Asa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1R 15.11-12
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui plaisait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : absent de 1R 15.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'convenait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 6.18 ; 1R 15.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 1R 15.11 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme David, son père.
      marker-yv: yv-n
    - type: text
      text: 'Asa fit ce qui plaisait et convenait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', son Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Mc 10.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu peux venir…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec toi il n'y a pas (de différence) pour aider entre beaucoup et (ce) qui n'a pas de force
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1S 14.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c'est sur toi que nous nous appuyons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 13.18+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cf. Ex 5.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un homme.
      marker-yv: yv-n
    - type: text
      text: 'Asa invoqua le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', son Dieu. Il dit : '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', tu peux venir au secours d''un faible aussi bien que d''un fort. Viens à notre secours, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, car c''est sur toi que nous nous appuyons, et c''est en ton nom que nous sommes venus contre cette multitude ! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', tu es notre Dieu : que l''homme ne l''emporte pas sur toi ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' battit…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 13.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 14.6.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' battit les Koushites devant Asa et Juda, et les Koushites s''enfuirent. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guérar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ancienne ville cananéenne d''Abimélek, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'roi des Philistins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Gn 26.1,8), à environ 15 km au sud-est de Gaza ; voir Gn 20.1,15 ; 26.1,6 ; Jos 13.3 ; 1Ch 4.39s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pouvoir sauver
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Asa et sa troupe les poursuivirent jusqu''à Guérar, et les Koushites tombèrent sans pouvoir sauver leur vie, car ils furent brisés devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et devant son camp. Ils emportèrent un très grand butin ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la frayeur du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression hébraïque en 17.10 ; 19.7 ; 1S 11.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',19,21 ; voir aussi en 20.29 ; Ps 36.2 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: frayeur de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'ils mirent à mal toutes les villes des environs de Guérar, car la frayeur du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' s''était emparée d''elles, et ils pillèrent toutes les villes : en effet il y avait en abondance de quoi piller. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les tentes des troupeaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : expression étrange ; semblerait désigner les tentes des bergers ; cf. 1Ch 4.41 ; voir aussi Gn 4.20 ; Jos 22.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chameaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 6.5.'
      marker-yv: yv-n
    - type: text
      text: Ils abattirent aussi les tentes des troupeaux et ils emmenèrent une grande quantité de petit bétail et de chameaux. Puis ils retournèrent à Jérusalem.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: hauts
        - type: text
          text: ' lieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 3.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: brisa les pierres levées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 31.1 ; Ex 23.24 ; 34.13 ; Dt 7.5 ; 12.3 ; 2R 18.4 ; 23.14 ; Jr 43.13 ; voir aussi 2R 3.2 ; 10.26s ; Dt 16.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: abattit les poteaux cultuels
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 31.1 ; 34.4,7 ; Dt 7.5 ; 12.3.'
      marker-yv: yv-n
    - type: text
      text: 'Il supprima les autels de l''étranger et les hauts lieux, il brisa les pierres levées et abattit les poteaux cultuels (les ashéras). '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il dit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ordonna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe est employé dans un sens analogue en 24.8 ; 29.24,27 ; 2S 1.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Est 1.17 ; 4.3 ; 9.14 ; Né 13.19 ; 1Ch 21.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chercher le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6 ; 12.14+ ; Dt 4.29 ; Os 10.12+ ; Am 5.4,6 ; 1Ch 10.13s ; 15.13 ; 16.11 ; 22.19 ; 28.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's etc. ; voir aussi Os 5.15 ; Am 8.12 ; Ps 9.11 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' et le commandement'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 24.12 ; Dt 6.1 ; 7.11 ; Jos 22.5 ; 2R 17.34,37.'
      marker-yv: yv-n
    - type: text
      text: 'Il dit à Juda de chercher le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu de ses pères, et de mettre en pratique la loi et le commandement. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'hauts lieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brasiers à encens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 34.4,7 ; Lv 26.30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le royaume fut tranquille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 13.23+ ; 20.30.'
      marker-yv: yv-n
    - type: text
      text: Il supprima de toutes les villes de Juda les hauts lieux et les brasiers à encens, et avec lui le royaume fut tranquille.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il bâtit des villes fortes…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 11.5-12 ; voir aussi 1R 15.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le pays fut tranquille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui accorda le repos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 33.14 ; Dt 3.20 ; Jos 1.13,15 ; 22.4 ; 1Ch 23.25 ; voir aussi v. 6 ; 15.15 ; 20.30 ; Jos 21.44 ; 1Ch 22.18 ; voir également Dt 12.10 ; 25.19 ; Jos 23.1 ; 2S 7.1,11 ; 1Ch 22.9.'
      marker-yv: yv-n
    - type: text
      text: 'Il bâtit des villes fortes en Juda : le pays fut tranquille, et il n''y eut pas de guerre contre lui pendant ces années-là, parce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui accorda le repos. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: portes avec des barres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de deux vantaux et de barres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de verrous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; cf. 8.5 ; Dt 3.5 ; 1S 23.7 ; Jr 49.31 ; Ez 38.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le pays… devant nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 13.9 ; 24.51 ; 34.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cherché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 3+ ; 15.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: accordé le repos de tous côtés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 5+ ; 15.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils prospérèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils réussirent.
      marker-yv: yv-n
    - type: text
      text: 'Il dit à Juda : Bâtissons ces villes et entourons-les de murailles, de tours et de portes avec des barres ; le pays est encore devant nous, car nous avons cherché le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu ; nous l''avons cherché, et il nous a accordé le repos de tous côtés. Ils bâtirent donc et ils prospérèrent.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le grand bouclier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le petit bouclier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 10.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 2Ch 9.15s.'
      marker-yv: yv-n
    - type: text
      text: Asa avait une armée de trois cent mille hommes de Juda portant le grand bouclier et la lance, et de deux cent quatre-vingt mille de Benjamin portant le petit bouclier et tirant à l'arc – c'étaient tous de vaillants guerriers.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Zérah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : peut-être un mercenaire nubien ou éthiopien ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Koushite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Gn 2.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), mais il peut aussi s'agir d'une incursion de nomades du Néguev (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Koushân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en parallèle avec '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Madiân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Ha 3.7). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: partit en campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe est traduit par '
      - type: usfm
