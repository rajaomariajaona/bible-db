document_id: 2CH.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Début du règne d'Asa
  - type: heading
    content: 1R 15.11-12
  - type: text
    content: ' '
  - type: note
    content: 'ce qui plaisait  : absent de 1R 15.11. –  convenait 20.32n  ; Dt 6.18 ; 1R 15.5+. –  son Dieu  : 1R 15.11 comme David, son père.'
  - type: text
    content: 'Asa fit ce qui plaisait et convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu. '
  '10':
  - type: note
    content: 'Cf. Mc 10.27. –  tu peux venir…  : litt. avec toi il n''y a pas (de différence) pour aider entre beaucoup et (ce) qui n''a pas de force  ; cf. 1S 14.6. –  c''est sur toi que nous nous appuyons  : cf. 13.18+. –  en ton nom cf. Ex 5.23. –  l''homme  : autre traduction un homme.'
  - type: text
    content: 'Asa invoqua le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu. Il dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu peux venir au secours d''un faible aussi bien que d''un fort. Viens à notre secours, '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, car c''est sur toi que nous nous appuyons, et c''est en ton nom que nous sommes venus contre cette multitude ! '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es notre Dieu : que l''homme ne l''emporte pas sur toi ! '
  '11':
  - type: note
    content: 'Le Seigneur battit…  : cf. 13.15n  ; 1S 14.6.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' battit les Koushites devant Asa et Juda, et les Koushites s''enfuirent. '
  '12':
  - type: note
    content: 'Guérar  : ancienne ville cananéenne d''Abimélek, roi des Philistins (Gn 26.1,8), à environ 15 km au sud-est de Gaza ; voir Gn 20.1,15 ; 26.1,6 ; Jos 13.3 ; 1Ch 4.39s. –  pouvoir sauver  : sous-entendu dans le texte.'
  - type: text
    content: 'Asa et sa troupe les poursuivirent jusqu''à Guérar, et les Koushites tombèrent sans pouvoir sauver leur vie, car ils furent brisés devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et devant son camp. Ils emportèrent un très grand butin ; '
  '13':
  - type: note
    content: 'la frayeur du Seigneur  : même expression hébraïque en 17.10 ; 19.7 ; 1S 11.7n  ; Es 2.10n,19,21 ; voir aussi en 20.29 ; Ps 36.2 (frayeur de Dieu).'
  - type: text
    content: 'ils mirent à mal toutes les villes des environs de Guérar, car la frayeur du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''était emparée d''elles, et ils pillèrent toutes les villes : en effet il y avait en abondance de quoi piller. '
  '14':
  - type: note
    content: 'les tentes des troupeaux  : expression étrange ; semblerait désigner les tentes des bergers ; cf. 1Ch 4.41 ; voir aussi Gn 4.20 ; Jos 22.8. –  chameaux  : cf. Jg 6.5.'
  - type: text
    content: Ils abattirent aussi les tentes des troupeaux et ils emmenèrent une grande quantité de petit bétail et de chameaux. Puis ils retournèrent à Jérusalem.
  '2':
  - type: note
    content: 'hauts lieux 1R 3.2n. –  brisa les pierres levées  : cf. 31.1 ; Ex 23.24 ; 34.13 ; Dt 7.5 ; 12.3 ; 2R 18.4 ; 23.14 ; Jr 43.13 ; voir aussi 2R 3.2 ; 10.26s ; Dt 16.22. –  abattit les poteaux cultuels  : cf. 31.1 ; 34.4,7 ; Dt 7.5 ; 12.3.'
  - type: text
    content: 'Il supprima les autels de l''étranger et les hauts lieux, il brisa les pierres levées et abattit les poteaux cultuels (les ashéras). '
  '3':
  - type: note
    content: 'Il dit ou il ordonna  ; le verbe est employé dans un sens analogue en 24.8 ; 29.24,27 ; 2S 1.18n  ; Est 1.17 ; 4.3 ; 9.14 ; Né 13.19 ; 1Ch 21.27. –  chercher le Seigneur  : cf. v. 6 ; 12.14+ ; Dt 4.29 ; Os 10.12+ ; Am 5.4,6 ; 1Ch 10.13s ; 15.13 ; 16.11 ; 22.19 ; 28.8ns etc. ; voir aussi Os 5.15 ; Am 8.12 ; Ps 9.11 etc. –  la loi et le commandement  : cf. Ex 24.12 ; Dt 6.1 ; 7.11 ; Jos 22.5 ; 2R 17.34,37.'
  - type: text
    content: 'Il dit à Juda de chercher le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de ses pères, et de mettre en pratique la loi et le commandement. '
  '4':
  - type: note
    content: 'hauts lieux v. 2n. –  brasiers à encens 34.4,7 ; Lv 26.30n. –  avec lui  : litt. devant lui. –  le royaume fut tranquille  : cf. 13.23+ ; 20.30.'
  - type: text
    content: Il supprima de toutes les villes de Juda les hauts lieux et les brasiers à encens, et avec lui le royaume fut tranquille.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Il bâtit des villes fortes…  : cf. 11.5-12 ; voir aussi 1R 15.23. –  le pays fut tranquille  : cf. v. 4+. –  lui accorda le repos  : cf. Ex 33.14 ; Dt 3.20 ; Jos 1.13,15 ; 22.4 ; 1Ch 23.25 ; voir aussi v. 6 ; 15.15 ; 20.30 ; Jos 21.44 ; 1Ch 22.18 ; voir également Dt 12.10 ; 25.19 ; Jos 23.1 ; 2S 7.1,11 ; 1Ch 22.9.'
  - type: text
    content: 'Il bâtit des villes fortes en Juda : le pays fut tranquille, et il n''y eut pas de guerre contre lui pendant ces années-là, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui accorda le repos. '
  '6':
  - type: note
    content: 'portes avec des barres  : litt. de deux vantaux et de barres (ou de verrous) ; cf. 8.5 ; Dt 3.5 ; 1S 23.7 ; Jr 49.31 ; Ez 38.11. –  le pays… devant nous  : cf. Gn 13.9 ; 24.51 ; 34.10. –  cherché  : cf. v. 3+ ; 15.2. –  accordé le repos de tous côtés  : cf. v. 5+ ; 15.15. –  ils prospérèrent ou ils réussirent.'
  - type: text
    content: 'Il dit à Juda : Bâtissons ces villes et entourons-les de murailles, de tours et de portes avec des barres ; le pays est encore devant nous, car nous avons cherché le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu ; nous l''avons cherché, et il nous a accordé le repos de tous côtés. Ils bâtirent donc et ils prospérèrent.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: le grand bouclier / le petit bouclier 1R 10.16n-17n  ; cf. 2Ch 9.15s.
  - type: text
    content: Asa avait une armée de trois cent mille hommes de Juda portant le grand bouclier et la lance, et de deux cent quatre-vingt mille de Benjamin portant le petit bouclier et tirant à l'arc – c'étaient tous de vaillants guerriers.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Zérah  : peut-être un mercenaire nubien ou éthiopien ( Koushite , Gn 2.13n), mais il peut aussi s''agir d''une incursion de nomades du Néguev ( Koushân en parallèle avec Madiân  ; cf. Ha 3.7). –  partit en campagne  : le même verbe est traduit par sortir au v. 9. –  un million  : litt. mille milliers  ; cf. Nb 1.16n. –  Marésha 11.8+.'
  - type: text
    content: 'Zérah, le Koushite, partit en campagne contre eux avec une armée d''un million d''hommes et trois cents chars ; il s''avança jusqu''à Marésha. '
  '9':
  - type: note
    content: 'Tsephata  : LXX a lu au nord (hébreu tsaphona) au lieu du nom propre. –  Marésha 11.8n.'
  - type: text
    content: 'Asa sortit à sa rencontre, et ils se rangèrent en ordre de bataille dans la vallée de Tsephata, près de Marésha. '
