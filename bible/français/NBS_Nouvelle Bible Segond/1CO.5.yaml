      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 7.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux du dehors
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mc 4.11 ; Col 4.5 ; 1Th 4.12 ; 1Tm 3.7.'
      marker-yv: yv-n
    - type: text
      text: 'Est-ce à moi, en effet, de juger ceux du dehors ? Et ceux du dedans, n''est-ce pas vous qui en êtes juges ? '
