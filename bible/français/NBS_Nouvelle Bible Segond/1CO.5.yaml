document_id: 1CO.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Inconduite dans l'Eglise
  - type: text
    content: ' '
  - type: note
    content: 'Partout…  : autre traduction Bref. On entend parler…  ; cf. 11.18. –  inconduite sexuelle  : cette formule traduit le grec pornéia , d''où nous vient le mot pornographie et, par l''intermédiaire du latin, fornication  ; le terme, apparenté à celui qui désigne la prostituée (6.15s), peut s''appliquer à toutes sortes de rapports sexuels illicites ; cf. v. 9n  ; 6.13,15nss ; 10.8 ; Mt 5.32n. –  on ne la rencontre même pas  : autre traduction elle n''est même pas admise  ; le verbe est sous-entendu dans le texte le plus probable ; certains mss portent elle n''est pas même nommée , cf. Ep 5.3. –  dans les nations ( ailleurs est sous-entendu dans le texte) : autres traductions chez les autres non-Juifs, chez les païens  ; c''est par le terme correspondant que les Juifs désignaient habituellement les non-Juifs (Ac 10.45n). Dans d''autres textes du N.T. il peut s''appliquer de façon très générale aux non-Juifs, chrétiens y compris ; ici toutefois il semble désigner les non-Juifs à l''exclusion des chrétiens ; de même en 12.2n  ; voir aussi Ep 2.11n  ; 4.17 ; 1P 2.12 ; 3Jn 7. –  la femme de son père  : sans doute pas sa propre mère, mais une autre femme de son père ; ce genre d''union était réprouvée par le judaïsme (Lv 18.8 ; Dt 23.1 ; 27.20) comme par le droit romain.'
  - type: text
    content: 'Partout on entend parler de l''inconduite sexuelle qui a cours parmi vous, une inconduite telle qu''on ne la rencontre même pas ailleurs dans les nations ; c''est au point que l''un de vous a la femme de son père. '
  '10':
  - type: note
    content: Cf. Rm 1.29+ss.
  - type: text
    content: 'Ce n''est pas d''une manière absolue avec tous ceux qui s''y livrent en ce monde, ni avec tous les gens avides, rapaces ou idolâtres ; autrement, vous devriez bel et bien sortir du monde. '
  '11':
  - type: note
    content: je vous ai écrit v. 9n. –  ne pas avoir de relations Rm 16.17+. –  frère 1.10 ; Ac 1.15. –  se livrerait… v. 9n.
  - type: text
    content: 'Maintenant, ce que je vous ai écrit, c''est de ne pas avoir de relations avec quelqu''un qui, tout en se nommant frère, se livrerait à l''inconduite sexuelle, à l''avidité, à l''idolâtrie, aux insultes, à l''ivrognerie ou à la rapacité – et même de ne pas manger avec un tel homme. '
  '12':
  - type: note
    content: 'juger Mt 7.1+. –  ceux du dehors  : cf. Mc 4.11 ; Col 4.5 ; 1Th 4.12 ; 1Tm 3.7.'
  - type: text
    content: 'Est-ce à moi, en effet, de juger ceux du dehors ? Et ceux du dedans, n''est-ce pas vous qui en êtes juges ? '
  '13':
  - type: note
    content: c'est Dieu qui les jugera Hé 13.4. –  Expulsez… v. 2n  ; Dt 17.7 (mêmes termes dans LXX) ; cf. Dt 13.6+. –  le mauvais ou le méchant, terme apparenté au v. 8 ; voir justice.
  - type: text
    content: 'Ceux du dehors, c''est Dieu qui les jugera. '
  - type: text
    content: Expulsez le mauvais du milieu de vous
  - type: text
    content: .
  '2':
  - type: note
    content: 'gonflés d''orgueil 4.6n. –  N''auriez-vous pas plutôt dû…  : litt. et vous n''avez pas plutôt pris le deuil… –  chose  : le terme grec correspondant est habituellement traduit par œuvre. –  enlevé (un verbe apparenté est traduit par expulser au v. 13 ; le même verbe est traduit par prendre en 6.15) du milieu de vous  : cf. Ep 4.31.'
  - type: text
    content: 'Et vous êtes gonflés d''orgueil ! N''auriez-vous pas plutôt dû en être désolés, jusqu''à ce que celui qui a fait une chose pareille soit enlevé du milieu de vous ? '
  '3':
  - type: note
    content: 'absent de corps… Col 2.5 ; cf. 2Co 13.10. –  agi  : cf. Rm 2.9n.'
  - type: text
    content: 'Quant à moi, absent de corps, mais présent d''esprit, j''ai déjà jugé, comme si j''étais présent, celui qui a agi de la sorte. '
  '4':
  - type: note
    content: 'Autres traductions  : vous vous êtes rassemblés… ; il faut que vous vous rassembliez… –  au nom de notre Seigneur  : certains mss portent seulement au nom du Seigneur  ; cf. Mt 16.19 ; 18.18ss. –  mon esprit  : cf. Rm 1.9n.'
  - type: text
    content: 'Quand vous serez rassemblés au nom de notre Seigneur Jésus, vous et mon esprit, avec la puissance de notre Seigneur Jésus, '
  '5':
  - type: note
    content: 'Cf. 11.32. –  qu''on livre (litt. livrer) … au Satan (voir démon, diable, Satan) : selon certains, l''expression signifie simplement exclure de la communauté  ; d''autres y voient un rituel de malédiction (voir bénédiction, malédiction) condamnant solennellement le coupable à mort (cf. Lv 18.19s ; 20.2ss ; Dt 13.13ss ; 17.2ss ; 1Tm 1.20 ; voir aussi Ac 5.5,10). –  destruction  : terme apparenté en 10.10 (destructeur) ; même terme 1Th 5.3 ; 2Th 1.9 ; 1Tm 6.9. –  chair / esprit  : cf. 1P 4.6. –  au jour du Seigneur  : certains mss portent au jour du [de notre] Seigneur Jésus[-Christ].'
  - type: text
    content: qu'on livre un tel homme au Satan pour la destruction de la chair, afin que l'esprit soit sauvé au jour du Seigneur !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Il n''y a pas…  : litt. il n''est pas beau, votre sujet de fierté , cf. Rm 2.17n  ; 4.2. –  levain… Ga 5.9 ; cf. Mt 16.6+/ / ; voir aussi Mt 13.33/ /.'
  - type: text
    content: 'Il n''y a pas de quoi être fiers ! Ne savez-vous pas qu''un peu de levain fait lever toute la pâte ? '
  '7':
  - type: note
    content: 'Purifiez-vous du vieux levain / vous êtes sans levain  : cf. Ex 12.19 ; 13.7 ; Mt 13.33n  ; voir aussi Rm 6.11s ; Col 3.1ss. –  le Christ, notre Pâque  : voir calendrier et fêtes ; Ex 12.11n  ; voir aussi Jn 1.29 ; 1P 1.19 ; Ap 5.6. –  sacrifié ou abattu, même verbe 10.20 ; Mc 14.12n.'
  - type: text
    content: 'Purifiez-vous du vieux levain pour être une pâte nouvelle, puisque vous êtes sans levain ; car le Christ, notre Pâque, a été sacrifié. '
  '8':
  - type: note
    content: 'la fête  : allusion à la Pâque (v. 7) et à la fête des Pains sans levain (Ex 12 ; Dt 16.1-8). –  sincérité ou pureté, transparence, limpidité (2Co 1.12 ; 2.17) ; adjectif apparenté en Ph 1.10n et 2P 3.1 (clair).'
  - type: text
    content: Célébrons donc la fête, non pas avec du vieux levain, ni avec un levain de malfaisance et de méchanceté, mais avec les pains sans levain de la sincérité et de la vérité.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'dans ma lettre  : sans doute une lettre précédente qui ne nous est pas parvenue (cf. 2Co 2.3n  ; voir aussi 6.14–7.1). –  ne pas avoir de relations v. 11+ ; 2Th 3.14. –  ceux qui se livrent à l''inconduite sexuelle  : autre traduction les prostitués , grec pornoï (cf. v. 1n  ; 6.15n) ; même mot grec dans la suite ; cf. v. 11 ; 6.9s ; Ep 5.5.'
  - type: text
    content: 'Je vous ai écrit dans ma lettre de ne pas avoir de relations avec ceux qui se livrent à l''inconduite sexuelle. '
