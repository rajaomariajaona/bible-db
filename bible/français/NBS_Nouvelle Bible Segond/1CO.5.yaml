          - type: text
            text: non-Juifs
        - type: text
          text: ', chez les païens'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; c'est par le terme correspondant que les Juifs désignaient habituellement les non-Juifs (Ac 10.45
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ). Dans d'autres textes du N.T. il peut s'appliquer de façon très générale aux non-Juifs, chrétiens y compris ; ici toutefois il semble désigner les non-Juifs à l'exclusion des chrétiens ; de même en 12.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ep 2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 4.17 ; 1P 2.12 ; 3Jn 7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la femme de son père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sans doute pas sa propre mère, mais une autre femme de son père ; ce genre d''union était réprouvée par le judaïsme (Lv 18.8 ; Dt 23.1 ; 27.20) comme par le droit romain.'
      marker-yv: yv-n
    - type: text
      text: 'Partout on entend parler de l''inconduite sexuelle qui a cours parmi vous, une inconduite telle qu''on ne la rencontre même pas ailleurs dans les nations ; c''est au point que l''un de vous a la femme de son père. '
  '10':
  - type: usfm
