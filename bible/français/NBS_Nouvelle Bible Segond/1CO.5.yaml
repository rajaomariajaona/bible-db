        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Rm 1.29+ss.
      marker-yv: yv-n
    - type: text
      text: 'Ce n''est pas d''une manière absolue avec tous ceux qui s''y livrent en ce monde, ni avec tous les gens avides, rapaces ou idolâtres ; autrement, vous devriez bel et bien sortir du monde. '
