        - type: text
          text: v. 9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, ce que je vous ai écrit, c''est de ne pas avoir de relations avec quelqu''un qui, tout en se nommant frère, se livrerait à l''inconduite sexuelle, à l''avidité, à l''idolâtrie, aux insultes, à l''ivrognerie ou à la rapacité – et même de ne pas manger avec un tel homme. '
  '12':
  - type: usfm
