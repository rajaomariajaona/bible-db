document_id: EZK.48,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les parts des tribus du nord
  - type: text
    content: ' '
  - type: note
    content: 'Sur l''ensemble, cf. Jos 14–19 ; Ap 7.4-8 ; les territoires apparaissent ici comme des bandes parallèles qui découpent le pays du nord au sud, sans tenir compte du relief ni de l''enracinement historique des tribus ; le critère qui préside à leur répartition semble plutôt être l''éloignement ou la proximité du sanctuaire. –  Voici les noms  : cf. Ex 1.1n. –  de Hetlôn… cf. 47.15nss. –  de l''est à l''ouest  : la traduction suppose, comme LXX, la formule complète qui figure dans la suite (v. 2-8,23-27), litt. du côté de l''orient jusqu''au côté de la mer (les mots correspondant à jusqu''au côté sont ici absents). –  Dan  : cf. Jos 19.40ss. –  une part  : litt. un.'
  - type: text
    content: 'Voici les noms des tribus. Depuis l''extrémité nord, le long du chemin de Hetlôn à Hamath, Hatsar-Eïnôn, la frontière de Damas au nord vers Hamath, de l''est à l''ouest : Dan, une part. '
  '10':
  - type: note
    content: à l'ouest ou vers la mer (v. 1n) ; au sud ou vers le Néguev (47.19n), de même aux v. 16,33s.
  - type: text
    content: 'C''est aux prêtres qu''appartiendra ce prélèvement sacré : 25 000 coudées au nord, 10 000 en largeur à l''ouest, 10 000 en largeur à l''est et 25 000 en longueur au sud, et le sanctuaire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera au milieu. '
  '11':
  - type: note
    content: Cf. 40.45-46n  ; 44.10ss. –  consacrés, d'après des versions anciennes ; texte hébreu traditionnel ce qui a été consacré.
  - type: text
    content: 'Cela appartiendra aux prêtres consacrés parmi les fils de Tsadoq, qui ont assuré mon service et qui ne se sont pas égarés, lorsque les Israélites s''égaraient, comme se sont égarés les lévites. '
  '12':
  - type: text
    content: Cela leur appartiendra comme une portion très sacrée, prélevée sur le prélèvement qui aura été fait sur le pays, à côté de la frontière des lévites.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '45.5. –  correspondant à la frontière  : autres traductions le long de la frontière ; correspondant au territoire ; parallèlement au territoire . –  10 000  : LXX a, la deuxième fois, vingt mille , somme de la part des prêtres et de celle des lévites.'
  - type: text
    content: 'Les lévites auront, correspondant à la frontière des prêtres, 25 000 coudées en longueur et 10 000 en largeur, 25 000 pour toute la longueur et 10 000 pour la largeur. '
  '14':
  - type: note
    content: prémices (cf. Lv 2.12n), ici au sens de meilleure part ou de part consacrée ; cf. Lv 25.32-34.
  - type: text
    content: 'Ils n''en pourront rien vendre. On ne pourra ni échanger ni aliéner ces prémices du pays, car elles sont consacrées au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Les parts de la ville et du prince
  '15':
  - type: text
    content: ' '
  - type: note
    content: '5 000 coudées (≈ 2,6 km) … en largeur  : c.-à-d. du nord au sud, sur les 25 000 coudées (≈ 13,1 km) de la partie sainte, v. 8 ; cf. 45.6 ; voir aussi mesures, poids et monnaies. –  abords Lv 25.34 ; Nb 35.2-5,7 ; Jos 21.11-19.'
  - type: text
    content: 'Les 5 000 coudées qui resteront, en largeur, sur les 25 000 seront un territoire profane, pour la ville, la zone d''habitation et les abords ; la ville sera au milieu. '
  '16':
  - type: note
    content: Cf. v. 20 ; Ap 21.16. –  4 500 coudées ≈ 2,4 km.
  - type: text
    content: 'En voici les mesures : du côté nord 4 500 coudées, du côté du midi 4 500, du côté est 4 500, et du côté ouest 4 500. '
  '17':
  - type: note
    content: 250 ≈ 130 m.
  - type: text
    content: 'La ville aura des abords de 250 coudées au nord, de 250 au sud, de 250 à l''est et de 250 à l''ouest. '
  '18':
  - type: note
    content: '10 000 coudées ≈ 5,2 km. –  servira à nourrir…  : litt. sera pour le pain des travailleurs (cf. 40.46n) de la ville.'
  - type: text
    content: 'Quant au reste sur la longueur – correspondant au prélèvement sacré – 10 000 coudées à l''est et 10 000 à l''ouest – correspondant au prélèvement sacré, sa production servira à nourrir ceux qui travailleront pour la ville. '
  '19':
  - type: note
    content: Traduction incertaine ; travailleront et cultiveront (le reste du v. 18) rendent un même verbe hébreu (cf. Gn 2.5n).
  - type: text
    content: 'Ceux qui travailleront pour la ville, de toutes les tribus d''Israël, le cultiveront. '
  '2':
  - type: text
    content: 'Contre la frontière de Dan, de l''est à l''ouest : Aser, une part. '
  '20':
  - type: note
    content: 'sur 25 000  : cf. v. 8 ; 45.1n. –  un quart  : cf. v. 15 ; certains modifient le texte hébreu traditionnel pour lire un carré (cf. v. 16+ ; 40.47 ; 43.16 ; 45.2).'
  - type: text
    content: Le prélèvement aura en tout 25 000 coudées sur 25 000 ; vous prélèverez un quart du prélèvement sacré pour la propriété de la ville.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 45.7s. –  du prélèvement  : cette répétition est absente de LXX. –  correspondant aux autres parts  : on pourrait aussi comprendre le long des autres parts, parallèle aux autres parts.'
  - type: text
    content: 'Ce qui restera sera pour le prince, des deux côtés du prélèvement sacré et de la propriété de la ville, le long des 25 000 coudées du prélèvement jusqu''à la frontière de l''est, et à l''ouest le long des 25 000 coudées vers la frontière de l''ouest. Cette part correspondant aux autres parts sera pour le prince. Le prélèvement sacré et le sanctuaire de la Maison seront au milieu. '
  '22':
  - type: note
    content: frontière ou territoire.
  - type: text
    content: Le long de la propriété des lévites et de la propriété de la ville, ce qui appartiendra au prince sera situé au milieu, entre la frontière de Juda et la frontière de Benjamin. Ce sera pour le prince.
  - type: heading
    content: Les parts des tribus du sud
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1n-7.
  - type: text
    content: 'Voici le reste des tribus. De l''est à l''ouest : Benjamin, une part. '
  '24':
  - type: text
    content: 'Contre la frontière de Benjamin, de l''est à l''ouest : Siméon, une part. '
  '25':
  - type: text
    content: 'Contre la frontière de Siméon, de l''est à l''ouest : Issacar, une part. '
  '26':
  - type: text
    content: 'Contre la frontière d''Issacar, de l''est à l''ouest : Zabulon, une part. '
  '27':
  - type: text
    content: 'Contre la frontière de Zabulon, de l''est à l''ouest : Gad, une part. '
  '28':
  - type: note
    content: Tamar / Meriba / Qadesh 47.18n-19n. –  la grande mer 47.10n.
  - type: text
    content: 'Contre la frontière de Gad, du côté sud, vers le midi, la frontière ira depuis Tamar jusqu''aux eaux de Meriba à Qadesh, jusqu''au torrent, vers la grande mer. '
  '29':
  - type: note
    content: '45.1n  ; cf. 47.22. –  telles sont leurs parts  : autres traductions telle est leur répartition ; telles sont leurs classes  ; cf. Jos 11.23n.'
  - type: text
    content: 'Voilà le pays que vous répartirez par le sort, en patrimoines pour les tribus d''Israël ; telles sont leurs parts – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: Les douze portes de Jérusalem
  '3':
  - type: text
    content: 'Contre la frontière d''Aser, de l''est à l''ouest : Nephtali, une part. '
  '30':
  - type: text
    content: 'Voici les issues de la ville : du côté nord qui mesure 4 500 coudées – '
  '31':
  - type: note
    content: portes ou porches, 40.3n  ; cf. Ap 21.12-14.
  - type: text
    content: 'les portes de la ville avec les noms des tribus d''Israël – trois portes au nord : une porte pour Ruben, une porte pour Juda, une porte pour Lévi ; '
  '32':
  - type: text
    content: 'du côté est, 4 500 coudées, trois portes : une porte pour Joseph, une porte pour Benjamin, une porte pour Dan ; '
  '33':
  - type: text
    content: 'du côté du midi, 4 500 coudées, trois portes : une porte pour Siméon, une porte pour Issacar, une porte pour Zabulon ; '
  '34':
  - type: text
    content: 'du côté ouest 4 500 coudées, trois portes : une porte pour Gad, une porte pour Aser, une porte pour Nephtali. '
  '35':
  - type: note
    content: 'Pourtour ou périmètre de la ville. –  dès ce jour  : cf. Ag 2.15n. –  le nom…  : cf. Es 1.26 ; 60.14,18 ; 61.3 ; 62.2,4,12 ; Za 8.3 ; Ap 3.12. –  Adonaï-Shamma  : hébreu YHWH shamma, YHWH (est) là (ou là-bas, cf. 40.1n) ; voir noms divins ; on a quelquefois modifié la vocalisation pour lire le Seigneur est son nom (celui de la ville) ; cf. 11.23 ; 43.4-9 ; Ps 46.6 ; voir aussi Es 7.14n  ; Ap 21.3 ; 22.20.'
  - type: text
    content: 'Pourtour : 18 000 coudées. Et, dès ce jour, le nom de la ville sera Adonaï-Shamma (« YHWH est là »).'
  '4':
  - type: text
    content: 'Contre la frontière de Nephtali, de l''est à l''ouest : Manassé, une part. '
  '5':
  - type: text
    content: 'Contre la frontière de Manassé, de l''est à l''ouest : Ephraïm, une part. '
  '6':
  - type: text
    content: 'Contre la frontière d''Ephraïm, de l''est à l''ouest : Ruben, une part. '
  '7':
  - type: text
    content: 'Contre la frontière de Ruben, de l''est à l''ouest : Juda, une part.'
  - type: heading
    content: La part du Seigneur
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'le prélèvement  : cf. v. 20 ; 45.1-6.'
  - type: text
    content: 'Contre la frontière de Juda, de l''est à l''ouest, ce sera le prélèvement, large de 25 000 coudées et long comme l''une des parts de l''est à l''ouest ; et le sanctuaire sera au milieu. '
  '9':
  - type: note
    content: 25 000 coudées ≈ 13,1 km. –  10 000 ≈ 5,2 km.
  - type: text
    content: 'Le prélèvement que vous ferez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aura 25 000 coudées de longueur et 10 000 de largeur. '
