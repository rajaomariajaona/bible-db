document_id: EZK.48,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les parts des tribus du nord
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur l''ensemble, cf. Jos 14–19 ; Ap 7.4-8 ; les territoires apparaissent ici comme des bandes parallèles qui découpent le pays du nord au sud, sans tenir compte du relief ni de l''enracinement historique des tribus ; le critère qui préside à leur répartition semble plutôt être l''éloignement ou la proximité du sanctuaire. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Voici les noms
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de Hetlôn… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. 47.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'est à l'ouest
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la traduction suppose, comme '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', la formule complète qui figure dans la suite (v. 2-8,23-27), litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du côté de l''orient jusqu''au côté de la mer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(les mots correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jusqu''au côté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sont ici absents). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jos 19.40ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un.
      marker-yv: yv-n
    - type: text
      text: 'Voici les noms des tribus. Depuis l''extrémité nord, le long du chemin de Hetlôn à Hamath, Hatsar-Eïnôn, la frontière de Damas au nord vers Hamath, de l''est à l''ouest : Dan, une part. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à l''ouest '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers la mer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au sud '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers le Néguev '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (47.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), de même aux v. 16,33s.
      marker-yv: yv-n
    - type: text
      text: 'C''est aux prêtres qu''appartiendra ce prélèvement sacré : 25 000 coudées au nord, 10 000 en largeur à l''ouest, 10 000 en largeur à l''est et 25 000 en longueur au sud, et le sanctuaire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' sera au milieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 40.45-46
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 44.10ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consacrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après des versions anciennes ; texte hébreu traditionnel '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui a été consacré.
      marker-yv: yv-n
    - type: text
      text: 'Cela appartiendra aux prêtres consacrés parmi les fils de Tsadoq, qui ont assuré mon service et qui ne se sont pas égarés, lorsque les Israélites s''égaraient, comme se sont égarés les lévites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cela leur appartiendra comme une portion très sacrée, prélevée sur le prélèvement qui aura été fait sur le pays, à côté de la frontière des lévites.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '45.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: correspondant à la frontière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le long de la frontière ; correspondant au territoire ; parallèlement au territoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 10 000
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a, la deuxième fois, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vingt mille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', somme de la part des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' et de celle des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les lévites auront, correspondant à la frontière des prêtres, 25 000 coudées en longueur et 10 000 en largeur, 25 000 pour toute la longueur et 10 000 pour la largeur. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prémices '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Lv 2.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), ici au sens de meilleure part ou de part consacrée ; cf. Lv 25.32-34.
      marker-yv: yv-n
    - type: text
      text: 'Ils n''en pourront rien vendre. On ne pourra ni échanger ni aliéner ces prémices du pays, car elles sont consacrées au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les parts de la ville et du prince
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '5 000 coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(≈ 2,6 km) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: … en largeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. du nord au sud, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur les 25 000 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'coudées (≈ 13,1 km) de la partie '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sainte
        - type: text
          text: ', v. 8 ; cf. 45.6 ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abords '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 25.34 ; Nb 35.2-5,7 ; Jos 21.11-19.
      marker-yv: yv-n
    - type: text
      text: 'Les 5 000 coudées qui resteront, en largeur, sur les 25 000 seront un territoire profane, pour la ville, la zone d''habitation et les abords ; la ville sera au milieu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 20 ; Ap 21.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '4 500 coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ≈ 2,4 km.
      marker-yv: yv-n
    - type: text
      text: 'En voici les mesures : du côté nord 4 500 coudées, du côté du midi 4 500, du côté est 4 500, et du côté ouest 4 500. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '250 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ≈ 130 m.
      marker-yv: yv-n
    - type: text
      text: 'La ville aura des abords de 250 coudées au nord, de 250 au sud, de 250 à l''est et de 250 à l''ouest. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '10 000 coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '≈ 5,2 km. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: servira à nourrir…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sera pour le pain des travailleurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 40.46
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la ville.
      marker-yv: yv-n
    - type: text
      text: 'Quant au reste sur la longueur – correspondant au prélèvement sacré – 10 000 coudées à l''est et 10 000 à l''ouest – correspondant au prélèvement sacré, sa production servira à nourrir ceux qui travailleront pour la ville. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traduction incertaine ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'travailleront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cultiveront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'reste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: du v. 18) rendent un même verbe hébreu (cf. Gn 2.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Ceux qui travailleront pour la ville, de toutes les tribus d''Israël, le cultiveront. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Contre la frontière de Dan, de l''est à l''ouest : Aser, une part. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur 25 000
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 8 ; 45.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un quart
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 15 ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un carré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 16+ ; 40.47 ; 43.16 ; 45.2).
      marker-yv: yv-n
    - type: text
      text: Le prélèvement aura en tout 25 000 coudées sur 25 000 ; vous prélèverez un quart du prélèvement sacré pour la propriété de la ville.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 45.7s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du prélèvement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette répétition est absente de LXX. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: correspondant aux autres parts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le long des autres parts, parallèle aux autres parts.
      marker-yv: yv-n
    - type: text
      text: 'Ce qui restera sera pour le prince, des deux côtés du prélèvement sacré et de la propriété de la ville, le long des 25 000 coudées du prélèvement jusqu''à la frontière de l''est, et à l''ouest le long des 25 000 coudées vers la frontière de l''ouest. Cette part correspondant aux autres parts sera pour le prince. Le prélèvement sacré et le sanctuaire de la Maison seront au milieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'frontière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: territoire.
      marker-yv: yv-n
    - type: text
      text: Le long de la propriété des lévites et de la propriété de la ville, ce qui appartiendra au prince sera situé au milieu, entre la frontière de Juda et la frontière de Benjamin. Ce sera pour le prince.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les parts des tribus du sud
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-7.'
      marker-yv: yv-n
    - type: text
      text: 'Voici le reste des tribus. De l''est à l''ouest : Benjamin, une part. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Contre la frontière de Benjamin, de l''est à l''ouest : Siméon, une part. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Contre la frontière de Siméon, de l''est à l''ouest : Issacar, une part. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Contre la frontière d''Issacar, de l''est à l''ouest : Zabulon, une part. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Contre la frontière de Zabulon, de l''est à l''ouest : Gad, une part. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tamar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Meriba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qadesh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '47.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la grande mer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '47.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Contre la frontière de Gad, du côté sud, vers le midi, la frontière ira depuis Tamar jusqu''aux eaux de Meriba à Qadesh, jusqu''au torrent, vers la grande mer. '
  '29':
