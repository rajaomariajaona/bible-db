      - type: text
        text: '13.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le rasoir… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.17 ; Nb 6.5ss ; 1S 1.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nazir '
    - type: usfm
      marker: ft
