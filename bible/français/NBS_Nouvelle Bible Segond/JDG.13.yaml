    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ici, comme en 18.7 ; 1S 27.11 ; 1R 5.8 ; 18.28 ; 2R 1.7 ; 11.14, il s''agit moins d''une loi à proprement parler que d''une coutume ou d''une manière habituelle d''agir. –  '
