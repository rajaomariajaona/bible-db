document_id: JDG.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance de Samson
  - type: text
    content: ' '
  - type: note
    content: '2.11+. –  ce qui déplaisait…  : cf. Nb 22.34n. –  Philistins 3.31 ; 10.7 ; 14.4.'
  - type: text
    content: 'Les Israélites firent encore ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les livra aux Philistins pour quarante ans.'
  '10':
  - type: note
    content: 'l''autre jour  : litt. au jour (expression qui peut aussi signifier aujourd''hui). LXX ce jour-là.'
  - type: text
    content: 'Elle courut vite dire à son mari : L''homme qui était venu vers moi l''autre jour m''est encore apparu ! '
  '11':
  - type: note
    content: 'suivit  : litt. se leva et suivit.'
  - type: text
    content: 'Manoah suivit sa femme, alla trouver l''homme et lui dit : Est-ce toi qui as parlé à cette femme ? Il répondit : C''est moi. '
  '12':
  - type: note
    content: 'se réaliseront 9.57n. –  règle  : le mot hébreu correspondant, souvent traduit par droit, peut désigner une décision de justice  ; ici, comme en 18.7 ; 1S 27.11 ; 1R 5.8 ; 18.28 ; 2R 1.7 ; 11.14, il s''agit moins d''une loi à proprement parler que d''une coutume ou d''une manière habituelle d''agir. –  la conduite à tenir…  : litt. son action  ; certains comprennent que fera-t-il ?'
  - type: text
    content: 'Manoah dit : Maintenant, quand tes paroles se réaliseront, quelles seront la règle et la conduite à tenir à l''égard de l''enfant ? '
  '13':
  - type: note
    content: 'La femme…  : LXX il se gardera de tout ce que j''ai dit à la femme. (14) Il ne mangera…'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit à Manoah : La femme se gardera de tout ce que je lui ai dit. '
  '14':
  - type: note
    content: 'la vigne  : litt. la vigne à vin, cf. v. 4 ; Nb 6.4.'
  - type: text
    content: 'Elle ne mangera d''aucun produit de la vigne, elle ne boira ni vin ni boisson alcoolisée et ne mangera rien d''impur ; elle observera tout ce que je lui ai ordonné. '
  '15':
  - type: note
    content: 6.19-22.
  - type: text
    content: 'Manoah dit au messager du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Laisse-nous te retenir et t''apprêter un chevreau, je te prie ! '
  '16':
  - type: note
    content: 'de ton pain  : autre traduction de ta nourriture.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit à Manoah : Quand tu me retiendrais, je ne mangerais pas de ton pain ; mais si tu veux faire un holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-le ! Manoah ne savait pas que c''était le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'Quel (litt. qui) est ton nom  : cf. v. 6 ; Ex 3.13-15 ; Ap 19.13. – Voir gloire.'
  - type: text
    content: 'Alors Manoah dit au messager du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Quel est ton nom, pour que nous te rendions gloire quand tes paroles se réaliseront ? '
  '18':
  - type: note
    content: 'Pourquoi… Gn 32.30. –  étonnant (cf. v. 19 ; 6.13) ou mystérieux  : on pourrait aussi comprendre ce nom, c''est Etonnant (ou Mystérieux) ; terme apparenté en Es 9.5 ; voir aussi Ps 139.6.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui répondit : Pourquoi me demandes-tu mon nom ? Il est étonnant ! '
  '19':
  - type: note
    content: 'Sur l’offrande végétale (même terme en 6.18n dans un sens plus général, voir Lv 2.1n) qui accompagne l’holocauste, cf. Nb 15.1-11 ; 28.4-6 ; voir sacrifices. –  sur le rocher 6.20. –  qui agit de façon étonnante (ou mystérieuse, v. 18n) : traduction incertaine ; on pourrait aussi comprendre et pour celui qui agit de façon étonnante  ; d''autres ont compris il se produisit une chose étonnante (ou mystérieuse) tandis que Manoah et sa femme regardaient  ; cf. 6.22s.'
  - type: text
    content: 'Manoah prit le chevreau et l''offrande végétale, et il fit un holocauste sur le rocher pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui agit de façon étonnante ; Manoah et sa femme regardaient : '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Tsoréa (à une vingtaine de kilomètres à l''ouest de Jérusalem) et le clan (18.2n) des Danites 13.25+ ; Jos 15.33 ; 19.41 ; cf. 1Ch 2.54. –  stérile  : cf. Gn 11.30 ; 18.11 ; 29.31 ; 1S 1.2 ; Lc 1.7.'
  - type: text
    content: 'Il y avait un homme de Tsoréa, du clan des Danites, nommé Manoah, dont la femme était stérile ; elle n''avait pas eu d''enfant. '
  '20':
  - type: note
    content: 'les flammes  : cf. 6.21+,22. –  montaient / monta  : le verbe hébreu rappelle le terme traduit par holocauste aux v. 16,19,23 ; voir Lv 1.3n. –  l''autel  : cf. v. 19.'
  - type: text
    content: 'comme les flammes montaient de l''autel vers le ciel, le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' monta dans les flammes de l''autel. Quand ils virent cela, Manoah et sa femme tombèrent face contre terre. '
  '21':
  - type: text
    content: 'Ainsi le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' cessa d''apparaître à Manoah et à sa femme. Alors Manoah sut que c''était le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '22':
  - type: note
    content: 6.22-23+.
  - type: text
    content: 'Manoah dit à sa femme : Nous allons mourir, car nous avons vu Dieu ! '
  '23':
  - type: note
    content: 'avait voulu  : le même verbe hébreu est aussi traduit par prendre plaisir  ; cf. Nb 14.8n. –  accepté  : litt. pris de notre main.'
  - type: text
    content: 'Sa femme lui répondit : Si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait voulu nous faire mourir, il n''aurait pas accepté l''holocauste et l''offrande végétale, il ne nous aurait pas fait voir tout cela et il ne nous aurait pas maintenant fait entendre pareilles choses.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Samson  : hébreu Shimshôn , nom dérivé du terme shémesh ( soleil ), par exemple dans Beth-Shémesh ( Maison du soleil ) ou Ir-Shémesh ( Ville du soleil ), localité proche de Tsoréa Jos 15.10 ; 19.41 ; voir Hé 11.32s. –  L''enfant grandit 1S 2.21,26 ; 3.19 ; Lc 1.80 ; 2.40. – Voir bénédiction.'
  - type: text
    content: 'La femme mit au monde un fils et elle l''appela du nom de Samson. L''enfant grandit, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le bénit. '
  '25':
  - type: note
    content: 'Le souffle 3.10+ ; cf. 14.6+ ; voir esprit. –  travailler  : d''autres formes du même verbe sont traduites par troubler en Gn 41.8 ; Ps 77.5 ; Dn 2.1,3. –  à Mahané-Dan (ou au camp de Dan), entre Tsoréa et Eshtaol  : cf. 16.31 ; 18.1s,11s ; Jos 15.33 ; 19.41.'
  - type: text
    content: 'Le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' commença à le travailler à Mahané-Dan, entre Tsoréa et Eshtaol.'
  '3':
  - type: note
    content: 'Cf. v. 7 ; Gn 16.11 ; 18.10 ; Lc 1.11-14,26-38 ; Hé 13.2. –  Le messager (ou l''ange) du Seigneur …  : cf. 2.1n.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut à cette femme et lui dit : Toi qui es stérile, qui n''as pas eu d''enfant, tu vas être enceinte et tu mettras au monde un fils. '
  '4':
  - type: note
    content: ni vin ni boisson alcoolisée v. 5n,7,14 ; cf. Lv 10.9n  ; Nb 6.3s ; 1S 1.15 ; Lc 1.15. –  rien d'impur Lv 11 ; voir pur.
  - type: text
    content: 'Maintenant, je te prie, prends bien garde : ne bois ni vin ni boisson alcoolisée, et ne mange rien d''impur. '
  '5':
  - type: note
    content: 'Le rasoir… 16.17 ; Nb 6.5ss ; 1S 1.11. –  nazir Nb 6.2n  ; Mt 2.23n  ; les règles du naziréat sont sans doute appliquées à la mère (v. 4) pour indiquer que l''enfant est mis à part dès avant sa naissance (cf. Jr 1.5). –  de sa mère  : ces mots sont sous-entendus dans le texte, de même au v. 7. –  commencera à sauver (2.16+) : cf. 1S 7.3,14 ; 9.16.'
  - type: text
    content: 'Car tu vas être enceinte et tu mettras au monde un fils. Le rasoir ne passera pas sur sa tête, car ce garçon sera un nazir de Dieu dès le ventre de sa mère. C''est lui qui commencera à sauver Israël de la main des Philistins. '
  '6':
  - type: note
    content: son nom v. 17-18+.
  - type: text
    content: 'La femme vint dire à son mari : Un homme de Dieu est venu me trouver ; il avait l''aspect d''un messager de Dieu, très redoutable. Je ne lui ai pas demandé d''où il était, et il ne m''a pas fait connaître son nom. '
  '7':
  - type: text
    content: 'Mais il m''a dit : « Tu vas être enceinte et tu mettras au monde un fils ; maintenant, ne bois ni vin ni boisson alcoolisée et ne mange rien d''impur, parce que cet enfant sera nazir de Dieu depuis le ventre de sa mère jusqu''au jour de sa mort. »'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'supplia Ex 8.4n. –  Seigneur / Seigneur  : hébreu YHWH / ’Adonaï , cf. Ex 3.15n.'
  - type: text
    content: 'Manoah supplia le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Pardon, Seigneur ! Je t''en prie, que l''homme de Dieu que tu as envoyé revienne vers nous pour nous enseigner ce que nous devons faire pour l''enfant qui naîtra ! '
  '9':
  - type: text
    content: 'Dieu entendit Manoah, et le messager de Dieu revint vers la femme. Elle était assise dans la campagne ; Manoah, son mari, n''était pas avec elle. '
