    - type: text
      text: Seigneur
  - type: text
    text: '  : Pardon, Seigneur ! Je t''en prie, que l''homme de Dieu que tu as envoyé revienne vers nous pour nous enseigner ce que nous devons faire pour l''enfant qui naîtra ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu entendit Manoah, et le messager de Dieu revint vers la femme. Elle était assise dans la campagne ; Manoah, son mari, n''était pas avec elle. '
  - type: usfm
    marker: vlbl
