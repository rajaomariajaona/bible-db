      marker: fq
      children:
      - type: text
        text: règle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu correspondant, souvent traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: droit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', peut désigner une '
    - type: usfm
