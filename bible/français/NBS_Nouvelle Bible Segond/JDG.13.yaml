    - type: usfm
      marker: fq
      children:
      - type: text
        text: de sa mère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ces mots sont sous-entendus dans le texte, de même au v. 7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'commencera à sauver '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(2.16+) : cf. 1S 7.3,14 ; 9.16.'
    marker-yv: yv-n
  - type: text
    text: 'Car tu vas être enceinte et tu mettras au monde un fils. Le rasoir ne passera pas sur sa tête, car ce garçon sera un nazir de Dieu dès le ventre de sa mère. C''est lui qui commencera à sauver Israël de la main des Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 17-18+.
    marker-yv: yv-n
  - type: text
    text: 'La femme vint dire à son mari : Un homme de Dieu est venu me trouver ; il avait l''aspect d''un messager de Dieu, très redoutable. Je ne lui ai pas demandé d''où il était, et il ne m''a pas fait connaître son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais il m''a dit : « Tu vas être enceinte et tu mettras au monde un fils ; maintenant, ne bois ni vin ni boisson alcoolisée et ne mange rien d''impur, parce que cet enfant sera nazir de Dieu depuis le ventre de sa mère jusqu''au jour de sa mort. »'
