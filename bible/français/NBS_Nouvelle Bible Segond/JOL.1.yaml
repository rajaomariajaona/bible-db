document_id: JOL.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Invasion d'insectes et sécheresse
  - type: text
    content: ' '
  - type: note
    content: Cf. Os 1.1 ; Mi 1.1 ; So 1.1 ; voir aussi Ez 1.3n. Le nom de Joël signifie YHWH est Dieu (cf. 1S 8.2 ; 1Ch 6.18,21 ; 15.7,11 ; 23.8).
  - type: text
    content: 'Parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parvint à Joël, fils de Petouel :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.19 ; Gn 27.28 ; Nb 18.12 ; Dt 7.13 ; 11.14 ; 28.51 ; 33.28 ; 2R 18.32 ; Es 36.17 ; Os 2.7,24 ; Ps 104.14s ; voir aussi 1R 8.35ss ; Am 4.7-9 ; 7.1-4. –  la terre Gn 2.5n. –  en deuil Es 33.9 ; Jr 4.28 ; 12.4 ; 23.10 ; Os 4.3 ; Am 1.2. –  vin  : autre traduction vin nouveau , même terme en 2.19,24 ; cf. Gn 27.28n. –  épuisé  : litt. asséché  ; le mot hébreu peut aussi signifier honteux ; confus  ; de même aux v. 11s,17. –  dépérit  : cf. v. 12 ; Es 16.8 ; 24.4ss ; 33.9 ; Jr 14.2 ; 15.9 ; Na 1.4.'
  - type: text
    content: Les champs sont ravagés,
  - type: text
    content: la terre est en deuil ;
  - type: text
    content: car les blés sont ravagés,
  - type: text
    content: le vin est épuisé,
  - type: text
    content: l'huile dépérit.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'laboureurs / vignerons ou fermiers / travailleurs des vergers et des vignes  ; les deux termes hébreux correspondants font assonance. –  sont épuisés (ou honteux ; confus , v. 10n) / hurlent  : on pourrait aussi traduire par des impératifs  : Soyez confus, laboureurs, hurlez, vignerons !'
  - type: text
    content: Les laboureurs sont épuisés,
  - type: text
    content: les vignerons hurlent
  - type: text
    content: au sujet du froment et de l'orge,
  - type: text
    content: parce que la moisson des champs est perdue.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lv 26.9 ; Dt 28.22s ; Es 24.7 ; Jr 3.3 ; 5.24s ; 14.1-9 ; 48.33 ; Ag 1.11. –  gaieté  : cf. v. 16+.'
  - type: text
    content: La vigne est épuisée,
  - type: text
    content: le figuier dépérit ;
  - type: text
    content: le grenadier, comme le palmier et le pommier,
  - type: text
    content: tous les arbres des champs sont secs…
  - type: text
    content: La gaieté est tarie pour les humains.
  - type: heading
    content: Appel à jeûner et à supplier le Seigneur
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'mettez des pagnes  : litt. ceignez-vous  ; cf. v. 8ns ; 2.17 ; voir aussi Es 32.11n. –  lamentez-vous  : cf. Gn 23.2 ; 50.10 ; 1S 25.1 ; 28.3 ; 2S 11.26 ; Jr 22.18 ; 34.5. –  passez la nuit Ps 134.1s. –  offrandes… v. 9n.'
  - type: text
    content: Prêtres, mettez des pagnes et lamentez-vous !
  - type: text
    content: Hurlez, officiants de l'autel !
  - type: text
    content: Venez, passez la nuit dans des sacs,
  - type: text
    content: officiants de mon Dieu !
  - type: text
    content: Car offrandes et libations font défaut à la maison de votre Dieu.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Consacrez (4.9n) un jeûne 2.12,15ss ; Jr 14.12 ; cf. 1R 21.9 ; Jon 3.5ss ; Esd 8.21 ; Né 9.1 ; 2Ch 20.3. –  une assemblée solennelle  : cf. Lv 23.36 ; Nb 29.35 ; Dt 16.8 ; Es 1.13 ; Am 5.21 ; Né 8.18 ; 2Ch 7.9 ; LXX une guérison . –  anciens / habitants v. 2+. –  criez…  : cf. v. 19+ ; Ex 14.10 ; Dt 26.7 ; Jg 3.9,15 ; 10.12 ; 1S 7.8 ; Es 19.20 ; Jon 3.8 ; Mi 3.4 ; Ps 3.5+ ; Lc 18.7.'
  - type: text
    content: Consacrez un jeûne, proclamez une assemblée solennelle,
  - type: text
    content: rassemblez les anciens, tous les habitants du pays,
  - type: text
    content: 'à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu,'
  - type: text
    content: 'et criez vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: heading
    content: Le jour du Seigneur, jour de ravage
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ah ! quel jour ! Ez 30.2. –  le jour du Seigneur 2.11 ; 3.4 ; cf. Es 13.9 ; Jr 30.7 ; Os 1.5+ ; Am 5.18 ; Za 14.1 ; Ml 3.2,19. –  proche 2.1 ; 4.14 ; Es 13.6 ; Ez 7.7 ; 30.3 ; Ab 15 ; So 1.7,14s. –  un ravage du Puissant (hébreu shod mi-Shaddaï , même assonance qu'en Es 13.6n) ; cf. Gn 17.1n  ; Ez 1.24n.
  - type: text
    content: Ah ! quel jour !
  - type: text
    content: 'Car le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est proche :'
  - type: text
    content: il vient comme un ravage du Puissant.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 5,9s,13. –  joie / allégresse Es 16.10 ; Jr 25.10 ; 48.33 ; cf. Dt 16.10s,13s ; 26.10s ; Es 35.10 ; 51.11 ; Ps 14.7 ; 16.9 ; 31.8.
  - type: text
    content: Devant nos yeux, la nourriture est retranchée
  - type: text
    content: de la maison de notre Dieu,
  - type: text
    content: la joie et l'allégresse !
  '17':
  - type: text
    content: ' '
  - type: note
    content: Traduction incertaine ; une bonne partie du vocabulaire n'apparaît qu'ici ; cf. Ag 2.19. –  épuisé v. 10n.
  - type: text
    content: Les semences ont séché sous les mottes ;
  - type: text
    content: les granges sont dévastées,
  - type: text
    content: les magasins sont rasés,
  - type: text
    content: car le blé est épuisé.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'gémissent Es 24.7 ; Jr 22.23 ; Ez 21.11 ; Pr 29.2 ; Lm 1.4,8,11,21. –  errent en pleine confusion  : même verbe en Ex 14.3 ; Est 3.15. –  en pâtissent  : autres traductions sont tenus pour coupables ou doivent réparer le tort (cf. Lv 5.6n), forme verbale inhabituelle en hébreu ; certains, avec des versions anciennes, la modifient pour lire périssent  ; cf. v. 20 ; Dt 20.14 ; Jr 14.3ss ; Os 4.3+ ; Jon 3.7–4.11 ; Ps 135.8.'
  - type: text
    content: Comme les bêtes gémissent !
  - type: text
    content: Les troupeaux de gros bétail errent en pleine confusion,
  - type: text
    content: parce qu'ils n'ont pas de pâture ;
  - type: text
    content: même les troupeaux de petit bétail en pâtissent.
  - type: heading
    content: Prière du prophète
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'C''est toi… v. 14 ; Ps 28.1 ; 30.9 ; 86.3. –  le feu 2.3 ; Am 1.4,7,10,14 ; 2.2,5 ; 7.4. –  pâturages du désert v. 20 ; 2.22 ; Jr 9.9 ; 23.10 ; Ps 65.13. –  les flammes ont brûlé  : litt. la flamme a brûlé.'
  - type: text
    content: 'C''est toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', que j''invoque !'
  - type: text
    content: Car le feu a dévoré les pâturages du désert,
  - type: text
    content: et les flammes ont brûlé tous les arbres des champs.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ecoutez Es 1.2 ; Ps 49.2. –  anciens ou vieillards Dt 19.12 ; Jos 9.11 ; Jg 8.14 ; Lm 2.10. –  habitants du pays v. 14 ; 2.1. –  Cela s'est-il passé… 2.2.
  - type: text
    content: Ecoutez, anciens !
  - type: text
    content: Prêtez l'oreille, vous tous, habitants du pays !
  - type: text
    content: Cela s'est-il passé de vos jours,
  - type: text
    content: ou même aux jours de vos pères ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'bêtes de la campagne  : autre traduction bêtes sauvages  ; cf. 2.22 ; Gn 3.14n. –  soupirent  : cf. Ps 42.2 ; voir aussi 104.21,27s. –  le lit des torrents  : cf. 4.18 ; sur le terme correspondant, voir Ps 18.16n  ; Jb 6.15n.'
  - type: text
    content: Les bêtes de la campagne soupirent aussi vers toi,
  - type: text
    content: car le lit des torrents est à sec,
  - type: text
    content: et le feu a dévoré les pâturages du désert.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 10.2 ; Jg 6.13 ; Ps 44.2 ; 78.3ss.
  - type: text
    content: Racontez-le à vos fils,
  - type: text
    content: et que vos fils le racontent à leurs fils,
  - type: text
    content: et leurs fils à la génération suivante !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Les termes hébreux de ce v. ( gazam [ qui hache ? ], arbé [ qui grouille ? ], yéléq [ qui lape ? ], hasil [ qui ronge ? ]) sont mal connus et leur identification ( chenille , sauterelle , grillon , criquet ) est conjecturale ; ou bien il s'agit de différents types de sauterelles, dont les invasions se succèdent, ou bien des divers stades de développement du même insecte ; cf. 2.25 ; Ex 10.4-19 ; Dt 28.38 ; 1R 8.37 ; Am 4.9 ; 7.1s ; Ml 3.11 ; Ps 78.46 ; 105.34s ; Ap 9.3ss.
  - type: text
    content: Ce qu'a laissé la chenille,
  - type: text
    content: la sauterelle l'a dévoré ;
  - type: text
    content: ce qu'a laissé la sauterelle,
  - type: text
    content: le grillon l'a dévoré ;
  - type: text
    content: ce qu'a laissé le grillon,
  - type: text
    content: le criquet l'a dévoré.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ivrognes  : cf. Es 5.11s ; 28.1ss,7s ; 56.12 ; Am 4.1 ; Mi 2.11. –  jus du raisin ou vin nouveau 4.18 ; Es 49.26 ; Am 9.13 ; Ac 2.13. –  enlevé  : litt. retranché , de même au v. 16.'
  - type: text
    content: Réveillez-vous, ivrognes, et pleurez !
  - type: text
    content: Vous tous, buveurs de vin, lamentez-vous,
  - type: text
    content: parce que le jus du raisin vous est enlevé de la bouche !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'une nation  : cf. 2.2,5,11 ; Pr 30.25ss. –  a envahi  : litt. est montée contre . –  innombrable Jg 6.5 ; 7.12 ; Jr 46.23. –  dents… d''un lion  : cf. Ps 58.7 ; Ap 9.8.'
  - type: text
    content: Car une nation a envahi mon pays,
  - type: text
    content: forte et innombrable.
  - type: text
    content: Elle a des dents comme celles d'un lion,
  - type: text
    content: elle a les mâchoires d'une lionne.
  '7':
  - type: text
    content: ' '
  - type: note
    content: vigne (Es 5.1+ss) / figuier 1R 5.5 ; 2R 18.31 ; Os 2.14 ; Mi 4.4 ; Za 3.10. –  mis en pièces Os 10.7n.
  - type: text
    content: Elle a dévasté ma vigne ;
  - type: text
    content: mon figuier, elle l'a mis en pièces ;
  - type: text
    content: elle l'a complètement dépouillé, abattu ;
  - type: text
    content: les pampres de la vigne ont blanchi.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Plains-toi  : sens exceptionnel (homonymie ?) d''un verbe qui signifie habituellement adjurer ou maudire (d''une malédiction conditionnelle ; cf. Gn 24.41n  ; Lv 5.1n  ; Nb 5.21n  ; Dt 29.11n) ; en hébreu le verbe est au féminin, désignant vraisemblablement la communauté ou le pays personnifié comme une femme (cf. Jr 4.11n). D''autres comprennent des plaintes comme celles d''une jeune fille (litt. une vierge ). –  un sac  : signe de deuil ( pleurer est sous-entendu dans le texte) ; cf. 2S 3.31 ; 1R 20.32 ; Es 3.24 ; 22.12 ; Jr 4.8 ; 48.37 ; Ez 27.31 ; Am 8.10 ; Jon 3.6,8. –  l''époux de sa jeunesse , peut-être son fiancé, considéré comme légalement marié mais n''ayant pas encore pris chez lui sa femme ; cf. Jr 3.4 ; Ml 2.14 ; Pr 2.17 ; voir aussi Ex 22.15s ; Dt 22.23ss.'
  - type: text
    content: Plains-toi, comme la jeune fille qui met un sac pour pagne
  - type: text
    content: afin de pleurer l'époux de sa jeunesse !
  '9':
  - type: text
    content: ' '
  - type: note
    content: Offrandes (peut-être en particulier de céréales ; cf. Lv 2.1n) et libations (Gn 35.14n  ; Nb 15.4n) ont disparu (ou ont été enlevées , même verbe aux v. 5,16) par suite des pénuries alimentaires v. 13 ; 2.14 ; Ex 29.38-42 ; 30.9 ; Lv 23.18 ; Nb 6.15,17 ; 28.3-8. –  prêtres… du Seigneur 2.17 ; Es 61.6 ; Jr 33.21.
  - type: text
    content: 'Offrandes et libations ont disparu de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: 'les prêtres, officiants du '
  - type: text
    content: Seigneur
  - type: text
    content: ', sont en deuil.'
