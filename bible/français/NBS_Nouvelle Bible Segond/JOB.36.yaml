document_id: JOB.36,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Comment Dieu éduque les humains
  - type: text
    content: 'Elihou poursuivit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'il les informe ou il les avertit , litt. il découvre leur oreille , cf. 33.16n  ; de même en 36.15. –  instruction ou correction 4.3n  ; 33.16n. –  revenir  : terme clef du vocabulaire de la repentance ou de la conversion ; voir changement radical.'
  - type: text
    content: il les informe pour leur instruction,
  - type: text
    content: il leur dit de revenir du mal.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'se soumettent  : litt. servent (voir aussi 21.15n).'
  - type: text
    content: S'ils écoutent et se soumettent,
  - type: text
    content: ils achèvent leurs jours dans le bonheur,
  - type: text
    content: leurs années dans les délices.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'javelot 33.18+ ; autre terme hébreu en 39.23+. –  sans connaissance  : autres traductions selon leur ignorance ; sans le savoir ; parce qu''ils n''ont pas de connaissance (cf. 4.21 ; Es 5.13n).'
  - type: text
    content: S'ils n'écoutent pas, ils périssent par le javelot,
  - type: text
    content: ils expirent sans connaissance.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'impies  : litt. impies de cœur (cf. 8.13+). –  il ( Dieu  ?) : autre traduction on.'
  - type: text
    content: Les impies se livrent à la colère,
  - type: text
    content: ils n'appellent pas au secours quand il les enchaîne ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'ils meurent…  : litt. leur être (terme traditionnellement traduit par âme , cf. Gn 1.20n) meurt dans leur jeunesse, leur vie parmi… –  prostitués sacrés  : litt. consacrés  ; cf. Gn 38.21ns ; Dt 23.18.'
  - type: text
    content: ils meurent dans leur jeunesse,
  - type: text
    content: parmi les prostitués sacrés.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'l''affligé ou le pauvre , même mot au v. 6. –  par (ou dans ) son affliction (v. 8,21) : cf. 5.18 ; 33.19. –  informe ou avertit v. 10n.'
  - type: text
    content: Mais il délivre l'affligé par son affliction même,
  - type: text
    content: c'est par l'oppression qu'il les informe.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 16-21 sont difficiles et ont donné lieu à des interprétations très diverses. –  de la détresse  : litt. hors de la bouche de la détresse . –  sans contrainte  : cf. 37.10n  ; 38.38n  ; ce dernier mot traduit un terme rare qui désigne parfois le métal fondu dans un moule (1R 7.37) ; cf. Gn 26.22 ; Ps 18.20. –  mets succulents  : dans le système sacrificiel, le même mot hébreu a été traduit par cendres grasses (Lv 1.16 ; 4.12 ; 6.3s ; 1R 13.3n,5 ; Jr 31.40).'
  - type: text
    content: Il te retirera aussi de la détresse,
  - type: text
    content: à la place, tu seras au large, sans contrainte,
  - type: text
    content: et ta table sera chargée de mets succulents.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'si tu juges…  : litt. tu es plein (le même terme est traduit par chargée au v. 16) du jugement du méchant , ce qui pourrait aussi signifier tu présideras au jugement du méchant . –  se saisiront de toi  : autre traduction (te) soutiendront  ; certains modifient le texte hébreu traditionnel pour lire et tes mains rendront la justice , ou bien et (si) tu frustres l''orphelin dans son droit.'
  - type: text
    content: Mais si tu juges tout à fait comme le méchant,
  - type: text
    content: le jugement et l'équité se saisiront de toi.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Texte très incertain. –  Prends garde…  : litt. car la fureur de peur qu''elle t''entraîne dans la largesse ( ?) ; autre traduction que la fureur ne t''entraîne pas à la moquerie (ou au dégoût, à l''arrogance ). Le terme hébreu pourrait renvoyer soit à l''action consistant à battre des mains , pour exprimer divers sentiments (cf. 27.23n  ; 34.37n), soit à l''idée d''abondance (d''où la traduction largesse ). –  que la valeur…  : autre traduction tu peux en soudoyer beaucoup ? Ne te fourvoie pas , ou ne te laisse pas séduire par l''idée qu''à force de cadeaux tu achèterais (Dieu) . –  pot-de-vin  : litt. rançon (33.24+ ; 1S 12.3n  ; Am 5.12n).'
  - type: text
    content: Prends garde qu'on ne t'entraîne par une largesse,
  - type: text
    content: que la valeur du pot-de-vin ne te fasse pas dévier !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Tes appels au secours…  : certains modifient le texte hébreu traditionnel pour lire, p. ex.  : ta richesse sera-t-elle utile, devant lui, dans la détresse, toute la puissance de ton opulence ?'
  - type: text
    content: Tes appels au secours suffiraient-ils pour ne pas être dans la détresse ?
  - type: text
    content: Toute la vigueur de ta force y suffirait-elle ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 21.3.
  - type: text
    content: Attends un peu, et je vais t'expliquer,
  - type: text
    content: car j'ai encore quelques propos pour la cause de Dieu.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Am 5.18. –  des peuples  : autre traduction des gens.'
  - type: text
    content: N'aspire pas à la nuit
  - type: text
    content: qui enlève des peuples de leur place.
  '21':
  - type: text
    content: ' '
  - type: note
    content: à cause de ton affliction ou plutôt que l'affliction (ou l'humiliation ) ; d'après Syr, certains modifient légèrement la vocalisation traditionnelle pour lire car c'est pour cela que l'affliction t'a choisi.
  - type: text
    content: Garde-toi de te tourner vers le mal,
  - type: text
    content: car c'est ce que tu as choisi, à cause de ton affliction.
  - type: heading
    content: La souveraineté de Dieu
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. 32.13.
  - type: text
    content: Dieu se montre sublime par sa force ;
  - type: text
    content: qui saurait enseigner comme lui ?
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Qui lui ferait rendre compte…  : la formule (de même en 34.13) pourrait aussi signifier qui lui a assigné sa fonction ? cf. 38.3 ; 40.7 ; Es 40.13s. –  sa conduite  : litt. sa voie (cf. 21.31). –  Tu as agi injustement ! cf. Ps 119.3.'
  - type: text
    content: Qui lui ferait rendre compte de sa conduite ?
  - type: text
    content: 'Qui peut lui dire : « Tu as agi injustement ! »'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 35.10.
  - type: text
    content: Souviens-toi de magnifier son action
  - type: text
    content: que les hommes chantent.
  '25':
  - type: text
    content: Tout être humain la voit,
  - type: text
    content: tout homme la contemple de loin.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Dieu est grand… Ps 145.3. –  le nombre de ses années Dn 7.9.
  - type: text
    content: Dieu est grand, mais nous ne le comprenons pas ;
  - type: text
    content: le nombre de ses années est insondable.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 28.25+. –  qui s''évaporent…  : litt. elles distillent (le même verbe est traduit par affiner en 28.1) la pluie en sa vapeur (cf. Gn 2.6n).'
  - type: text
    content: Il attire les gouttes d'eau
  - type: text
    content: qui s'évaporent et retombent en pluie ;
  '28':
  - type: text
    content: les nuages la laissent couler,
  - type: text
    content: ils la répandent sur la multitude des humains.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Ps 18.10-15. –  sa hutte Ps 18.12+.
  - type: text
    content: Qui comprendra le déploiement des nuages,
  - type: text
    content: le fracas de sa hutte ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: rendrai justice 35.2. –  celui qui me fait 31.15 (autre verbe hébreu).
  - type: text
    content: Je tirerai ma connaissance de loin
  - type: text
    content: et je rendrai justice à celui qui me fait.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'sa lumière ou ses éclairs  ; cf. 37.3,11,15. –  les profondeurs  : litt. les racines  ; cf. Ps 18.16.'
  - type: text
    content: Il déploie autour de lui sa lumière,
  - type: text
    content: il recouvre les profondeurs de la mer.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Par tout cela  : litt. par eux , c.-à-d., sans doute, par les nuages, la pluie et le tonnerre (v. 28-30) ; cf. 1R 17.1. –  il donne…  : on pourrait aussi comprendre il donne la nourriture à celui qui a beaucoup (de bouches à nourrir) . Voir Ps 104.13-15.'
  - type: text
    content: Par tout cela il juge les peuples,
  - type: text
    content: il donne la nourriture en abondance.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Il prend l''éclair…  : litt. sur les paumes il couvre la lumière . Certains modifient le texte hébreu traditionnel pour lire l''éclair danse sur ses mains.'
  - type: text
    content: Il prend l'éclair dans ses mains,
  - type: text
    content: il lui assigne sa cible.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction très incertaine. Certains modifient le texte hébreu traditionnel pour lire, p. ex.  : il en informe son berger (ou son ami ) , le troupeau… ou bien il se révèle par son tonnerre ; il soulève sa passion contre le mal.'
  - type: text
    content: Il s'annonce par son tonnerre ;
  - type: text
    content: le troupeau pressent son approche.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui est avec toi est parfait (ou intègre, sans défaut , cf. 1.1n) dans sa connaissance  : cette expression peut désigner Elihou lui-même, mais aussi Dieu.'
  - type: text
    content: Car, en vérité, mes propos ne sont pas des mensonges,
  - type: text
    content: celui qui est avec toi est parfait dans sa connaissance !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'il ne renonce pas  : autres traductions il ne méprise personne, il ne rejette pas  ; cf. 5.17 ; 7.16n  ; 34.33n. –  de son intelligence  : litt. du cœur.'
  - type: text
    content: Dieu est puissant et il ne renonce pas ;
  - type: text
    content: il est puissant par la force de son intelligence.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 8.3+.
  - type: text
    content: Il ne laisse pas vivre le méchant
  - type: text
    content: et il fait droit aux affligés.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'il place des rois…  : autre traduction il place (les justes ?) avec des rois sur le trône . –  afin qu''ils soient élevés  : autre traduction mais ils se sont élevés , c.-à-d. ils se sont enhardis, ils sont devenus hautains  ; cf. 34.24.'
  - type: text
    content: Il ne détourne pas les yeux du juste ;
  - type: text
    content: il place des rois sur le trône,
  - type: text
    content: il les y fait asseoir pour toujours, afin qu'ils soient élevés.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dn 4.25-34 ; 2Ch 33.9-13.
  - type: text
    content: Sont-ils liés de chaînes,
  - type: text
    content: sont-ils pris dans les liens de l'affliction,
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'leurs révoltes  : autre traduction leurs transgressions . –  quand ils s''enorgueillissent  : autre traduction car ils s''enorgueillissent (litt. ils se fortifient ).'
  - type: text
    content: il dénonce leurs actions
  - type: text
    content: et leurs révoltes quand ils s'enorgueillissent ;
