      - type: usfm
        marker: fqa
        children:
        - type: text
          text: consulter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; le complément d''objet direct peut être ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le Coffre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: règle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Parce que vous n''étiez pas là la première fois, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, a causé des pertes parmi nous ; car nous ne l''avons pas cherché selon la règle. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les prêtres et les lévites se consacrèrent pour faire monter le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël. '
