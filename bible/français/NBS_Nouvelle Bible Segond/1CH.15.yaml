        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a explosé parmi nous ; a éclaté contre nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ouvrir une brèche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 13.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous ne l''avons pas cherché '
      - type: usfm
        marker: ft
        children:
        - type: text
