document_id: 1CH.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David prépare le transfert du Coffre
  - type: text
    content: ' '
  - type: note
    content: 'Il (c.-à-d. David ) se fit des maisons  : cf. 2S 5.9. –  une tente  : cf. 16.1 ; voir aussi Ps 132.1-8.'
  - type: text
    content: 'Il se fit des maisons dans la Ville de David ; il prépara un lieu pour le coffre de Dieu et dressa pour lui une tente. '
  '10':
  - type: text
    content: pour les fils d'Ouzziel, Amminadab le chef et ses frères, 112.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Tsadoq et Abiathar  : cf. 2S 8.17n.'
  - type: text
    content: 'David appela les prêtres Tsadoq et Abiathar, et les lévites Uriel, Asaya, Joël, Shemaya, Eliel et Amminadab. '
  '12':
  - type: note
    content: consacrez-vous ou sanctifiez-vous, c.-à-d. préparez-vous, par des rites de purification, à transporter le coffre sacré  ; cf. Ex 19.10-14 ; voir aussi saint. –  au lieu (sous-entendu en hébreu) que je lui ai préparé v. 1,3.
  - type: text
    content: 'Il leur dit : Vous êtes les chefs de famille des lévites : consacrez-vous, vous et vos frères, et faites monter le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, au lieu que je lui ai préparé. '
  '13':
  - type: note
    content: 'la première fois  : voir le chap. 13. –  a causé des pertes parmi nous  : autres traductions a explosé parmi nous ; a éclaté contre nous  ; le même verbe est traduit par ouvrir une brèche en 13.11. –  nous ne l''avons pas cherché (le verbe correspondant peut aussi signifier consulter) ; le complément d''objet direct peut être ici le Coffre ou le Seigneur. –  règle  : voir loi.'
  - type: text
    content: 'Parce que vous n''étiez pas là la première fois, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, a causé des pertes parmi nous ; car nous ne l''avons pas cherché selon la règle. '
  '14':
  - type: text
    content: 'Les prêtres et les lévites se consacrèrent pour faire monter le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '15':
  - type: note
    content: 'Voir Ex 25.10-14 ; Nb 4.5s ; 7.9 ; 2Ch 35.3. –  Les lévites  : litt. les fils des lévites. –  des barres  : autres traductions les barres ; le brancard (terme très proche en Nb 4.10,12 ; voir Jr 27.2n) ; autre terme en Ex 25.13ss etc.'
  - type: text
    content: 'Les lévites portèrent le coffre de Dieu comme Moïse l''avait ordonné, d''après la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : sur leurs épaules, avec des barres.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Voir 6.16n  ; cf. 13.8 ; Ps 81.2-4 ; 92.2-4 ; 95.1s. –  de musique  : litt. de chant , de même en 16.42 ; 2Ch 5.13 ; 23.13,18 ; 34.12 ; cf. Am 6.5n.'
  - type: text
    content: 'David dit aux chefs des lévites de mettre en place leurs frères, les chantres, avec des instruments de musique, des luths, des lyres et des cymbales, qu''ils devaient faire retentir de sons éclatants en signe de joie. '
  '17':
  - type: note
    content: 'Hémân / Asaph / Etân  : cf. 6.18,24,29 ; 16.37-42. –  Qoushaya  : hébreu Qoushayahou.'
  - type: text
    content: 'Les lévites mirent en place Hémân, fils de Joël ; parmi ses frères, Asaph, fils de Bérékia ; et parmi les fils de Merari, leurs frères, Etân, fils de Qoushaya ; '
  '18':
  - type: note
    content: 'Zacharie / Benaya / Maaséya / Mattitia / Miqnéya  : hébreu Zekaryahou / Benayahou / Ma‘aséyahou / Mattityahou / Miqnéyahou  ; voir Jg 17.1n. –  les portiers  : voir 9.17-27.'
  - type: text
    content: 'puis, avec eux, leurs frères du second ordre : Zacharie, Ben, Yaaziel, Shemiramoth, Yehiel, Ounni, Eliab, Benaya, Maaséya, Mattitia, Eliphléhou, Miqnéya, Obed-Edom et Yéiel, les portiers. '
  '19':
  - type: text
    content: 'Les chantres Hémân, Asaph et Etân avaient des cymbales de bronze qu''ils faisaient retentir. '
  '2':
  - type: note
    content: 'les lévites… afin qu''ils portent le coffre  : voir Nb 3–4. –  officient pour lui ou le servent (le Seigneur).'
  - type: text
    content: 'C''est alors que David dit : Le coffre de Dieu ne doit être porté que par les lévites, car c''est eux que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a choisis pour toujours, afin qu''ils portent le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et qu''ils officient pour lui.'
  '20':
  - type: note
    content: 'Maaséya v. 18n  ; forme longue du même nom en Jr 35.4 ; 2Ch 23.1 ; 26.11 ; 28.7 ; 34.8. –  alamoth (cf. Ps 46.1n) : transcription d''un mot hébreu dont le sens est inconnu ; on a proposé de le rapprocher a) d''un mot signifiant jeune fille (cf. Es 7.14n) d''où pour voix de soprano ou aux notes aiguës  ; b) d''un verbe signifiant être caché, d''où en sourdine  ; c) du nom géographique Elam, d''où sur le mode élamite.'
  - type: text
    content: 'Zacharie, Aziel, Shemiramoth, Yehiel, Ounni, Eliab, Maaséya et Benaya avaient des luths « sur alamoth ». '
  '21':
  - type: note
    content: 'Azazia  : hébreu ‘Azazyahou. –  sheminith  : le sens de ce mot hébreu est incertain ; il peut être dérivé du chiffre huit, d''où à huit cordes, ou à l''octave (cf. v. 20n) ; on l''a parfois interprété comme une indication d''origine se référant à une localité inconnue. –  pour conduire (le chant est sous-entendu en hébreu) : le verbe hébreu correspondant est traduit par surveiller en 23.4 ; Esd 3.8s ; 2Ch 2.1,17 ; 34.13.'
  - type: text
    content: 'Mattitia, Eliphléhou, Miqnéya, Obed-Edom, Yéiel et Azazia avaient des lyres « sur sheminith » pour conduire le chant. '
  '22':
  - type: note
    content: 'Kenania  : hébreu Kenanyahou. –  le transport (du Coffre) : litt. l''élévation  ; le mot correspondant est traduit par charge en Nb 4.15ss ; Es 13.1n  ; il est apparenté au verbe rendu par porter aux v. 2,15 ; il pourrait aussi être compris dans le sens de donner le ton aux chanteurs. –  compétent  : autres traductions il était intelligent ; c''était un instructeur (cf. 25.7s).'
  - type: text
    content: 'Kenania, chef des lévites pour le transport, dirigeait le transport, car il était compétent. '
  '23':
  - type: note
    content: 'Bérékia  : le nom apparaît ici sous la forme abrégée, cf. 6.24n  ; Jg 17.1n. –  portiers du Coffre  : on ignore quelles étaient les fonctions précises de ces personnages.'
  - type: text
    content: 'Bérékia et Elqana étaient portiers du Coffre. '
  '24':
  - type: note
    content: 'Shebania  : hébreu Shebanyahou  ; voir aussi v. 18n. –  trompettes  : cf. 13.8n  ; cet instrument est réservé aux prêtres  ; cf. 16.6 ; Nb 10.8 ; 2Ch 5.12.'
  - type: text
    content: Shebania, Josaphat, Netanéel, Amasaï, Zacharie, Benaya et Eliézer, les prêtres, sonnaient des trompettes devant le coffre de Dieu. Obed-Edom et Yehiya étaient portiers du Coffre.
  - type: heading
    content: Arrivée du Coffre à Jérusalem
  - type: heading
    content: 2S 6.12-23
  '25':
  - type: text
    content: ' '
  - type: note
    content: La mention ici des anciens d'Israël et des chefs de phratries (ou chefs de mille, de milliers, de contingents , cf. 12.21n), qui ne figure pas dans 2S 6.12, donne au présent récit une allure beaucoup plus officielle et cérémonielle.
  - type: text
    content: 'Puis David, les anciens d''Israël et les chefs de phratries se mirent en route pour faire monter, dans la joie, le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' depuis la maison d''Obed-Edom. '
  '26':
  - type: note
    content: 'avec le secours de Dieu  : voir 11.3n. –  ils sacrifièrent  : autre traduction on sacrifia  ; en 2S 6.13, c''est David qui sacrifie.'
  - type: text
    content: 'C''est avec le secours de Dieu que les lévites portèrent le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils sacrifièrent sept taureaux et sept béliers. '
  '27':
  - type: note
    content: 'byssos  : cf. 4.21n. –  des chantres  : la deuxième fois, certains modifient le texte hébreu traditionnel pour lire des portiers.'
  - type: text
    content: 'David était revêtu d''un manteau de byssos ; il en était de même de tous les lévites qui portaient le Coffre, des chantres, du chef Kenania, des porteurs et des chantres ; et David avait sur lui un éphod de lin. '
  '28':
  - type: note
    content: A la trompe, seule mentionnée en 2S 6.15, les Chroniques ajoutent trompettes, cymbales, luths et lyres (voir 6.16n).
  - type: text
    content: 'Tout Israël fit monter le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec des acclamations et au son de la trompe, des trompettes et des cymbales, et en faisant retentir les luths et les lyres.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Voir cœur.
  - type: text
    content: 'Comme le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' entrait dans la Ville de David, Mikal, fille de Saül, regardait par la fenêtre. Elle vit le roi David jouer de la musique en bondissant, et elle le méprisa dans son cœur.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: pour faire monter le coffre exprime ici l'intention de David, qui se concrétisera dans les v. 25-29.
  - type: text
    content: 'David rassembla tout Israël à Jérusalem pour faire monter le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' au lieu qu''il lui avait préparé. '
  '4':
  - type: note
    content: les fils d'Aaron, c.-à-d. les prêtres  ; voir 6.34n.
  - type: text
    content: 'David réunit les fils d''Aaron et les lévites :'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Qehath  : cf. Nb 3.27-32.'
  - type: text
    content: pour les fils de Qehath, Uriel le chef et ses frères, 120 ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Merari  : cf. Nb 3.33-38.'
  - type: text
    content: pour les fils de Merari, Asaya le chef et ses frères, 220 ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Guershom (cf. 6.1n) : cf. Nb 3.21-26.'
  - type: text
    content: pour les fils de Guershom, Joël le chef et ses frères, 130 ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: Elitsaphân, Hébron (v. 9) et Ouzziel (v. 10) étaient des descendants de Qehath ; cf. Nb 3.27-30.
  - type: text
    content: pour les fils d'Elitsaphân, Shemaya le chef et ses frères, 200 ;
  '9':
  - type: text
    content: pour les fils d'Hébron, Eliel le chef et ses frères, 80 ;
