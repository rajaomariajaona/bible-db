            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David dit aux chefs des lévites de mettre en place leurs frères, les chantres, avec des instruments de musique, des luths, des lyres et des cymbales, qu''ils devaient faire retentir de sons éclatants en signe de joie. '
