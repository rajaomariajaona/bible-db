      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que je lui ai préparé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1,3.
      marker-yv: yv-n
    - type: text
      text: 'Il leur dit : Vous êtes les chefs de famille des lévites : consacrez-vous, vous et vos frères, et faites monter le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, au lieu que je lui ai préparé. '
  '13':
