    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '127.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '128.3ss ; cf. Pr 17.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fruit du ventre maternel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 132.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 7.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une récompense
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un salaire.
      marker-yv: yv-n
    - type: text
      text: 'Des fils sont un patrimoine du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le fruit du ventre maternel est une récompense.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Comme des flèches dans la main d'un vaillant guerrier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi sont les fils de la jeunesse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '127.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: carquois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Lm 3.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils n'auront…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit peut-être des fils (v. 4) ; beaucoup modifient le texte hébreu traditionnel pour lire le singulier'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n'aura pas honte quand il parlera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Jb 29.5ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la porte de la ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dt 16.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 21.19 ; 25.7 ; Am 5.12 ; Pr 31.23 ; Rt 4.1 ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de la ville '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est sous-entendu dans le texte.
      marker-yv: yv-n
    - type: text
      text: Heureux l'homme qui en a rempli son carquois !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n'auront pas honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ils parleront avec des ennemis à la porte de la ville.
