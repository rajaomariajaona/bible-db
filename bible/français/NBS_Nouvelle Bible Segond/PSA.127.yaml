document_id: PSA.127,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Si le Seigneur ne bâtit la maison…
  - type: text
    content: ' '
  - type: note
    content: montées 120.1n. – A cause de la mention de Salomon (72.1) certains identifient la maison au temple  ; mais la phrase peut être aussi comprise comme un proverbe de portée plus générale ; cf. 33.16 ; 113.9 ; voir aussi Gn 16.2n  ; 24 ; Ex 1.21 ; Dt 8.17s ; Jn 15.5. –  garde 121.3s.
  - type: text
    content: Chant des montées. De Salomon.
  - type: text
    content: 'Si ce n''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui bâtit la maison,'
  - type: text
    content: ceux qui la bâtissent travaillent inutilement ;
  - type: text
    content: 'si ce n''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui garde la ville,'
  - type: text
    content: celui qui la garde veille inutilement.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 6.25ss. –  le pain de la peine  : soit le pain fait avec peine , soit, moins probablement, la peine elle-même comparée à une nourriture quotidienne ; cf. Gn 3.17ss ; voir aussi Pr 4.17 ; 20.17 ; 31.27 ; Dn 10.3. –  il en donne autant…  : cf. 145.15s ; Pr 10.22 ; Mt 6.23s. –  bien-aimé 60.7. –  pendant qu''il dort  : on a aussi compris en lui donnant le sommeil  ; cf. 3.6 ; 4.9 ; 132.4.'
  - type: text
    content: C'est inutilement que vous vous levez tôt, que vous vous couchez tard
  - type: text
    content: 'et que vous mangez le pain de la peine :'
  - type: text
    content: il en donne autant à son bien-aimé pendant qu'il dort.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '128.3ss ; cf. Pr 17.6. –  fruit du ventre maternel  : cf. 132.11n  ; Dt 7.13. –  une récompense  : litt. un salaire.'
  - type: text
    content: 'Des fils sont un patrimoine du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: le fruit du ventre maternel est une récompense.
  '4':
  - type: text
    content: Comme des flèches dans la main d'un vaillant guerrier,
  - type: text
    content: ainsi sont les fils de la jeunesse.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'carquois  : cf. Lm 3.13n. –  Ils n''auront…  : il s''agit peut-être des fils (v. 4) ; beaucoup modifient le texte hébreu traditionnel pour lire le singulier  : il n''aura pas honte quand il parlera…  ; cf. Jb 29.5ss. –  à la porte de la ville  : cf. Dt 16.18n  ; 21.19 ; 25.7 ; Am 5.12 ; Pr 31.23 ; Rt 4.1 ; de la ville est sous-entendu dans le texte.'
  - type: text
    content: Heureux l'homme qui en a rempli son carquois !
  - type: text
    content: Ils n'auront pas honte,
  - type: text
    content: quand ils parleront avec des ennemis à la porte de la ville.
