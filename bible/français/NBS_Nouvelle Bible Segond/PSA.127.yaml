  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Si le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ne bâtit la maison…'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '127.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'montées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '120.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – A cause de la mention de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Salomon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(72.1) certains identifient la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: '  ; mais la phrase peut être aussi comprise comme un proverbe de portée plus générale ; cf. 33.16 ; 113.9 ; voir aussi Gn 16.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 24 ; Ex 1.21 ; Dt 8.17s ; Jn 15.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'garde '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 121.3s.
      marker-yv: yv-n
    - type: text
      text: Chant des montées. De Salomon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si ce n''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui bâtit la maison,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui la bâtissent travaillent inutilement ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'si ce n''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui garde la ville,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui la garde veille inutilement.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '127.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Mt 6.25ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le pain de la peine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : soit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le pain fait avec peine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', soit, moins probablement, la peine elle-même comparée à une nourriture quotidienne ; cf. Gn 3.17ss ; voir aussi Pr 4.17 ; 20.17 ; 31.27 ; Dn 10.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il en donne autant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 145.15s ; Pr 10.22 ; Mt 6.23s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bien-aimé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '60.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pendant qu'il dort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on a aussi compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en lui donnant le sommeil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 3.6 ; 4.9 ; 132.4.
      marker-yv: yv-n
    - type: text
      text: C'est inutilement que vous vous levez tôt, que vous vous couchez tard
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et que vous mangez le pain de la peine :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il en donne autant à son bien-aimé pendant qu'il dort.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
