document_id: LEV.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Animaux purs et impurs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur l'ensemble de ce chap., cf. 20.25 ; Dt 14.3-20 ; Mc 7.19 ; Ac 10.9-16 ; Hé 9.10. L'identification de bon nombre des animaux mentionnés dans ce chapitre repose sur les versions anciennes, mais elle est très incertaine.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse et à Aaron : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dites aux Israélites : De toutes les bêtes qui sont sur la terre, voici les animaux que vous pourrez manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous pourrez manger tout ce qui a les sabots fendus, les pieds fourchus, et qui rumine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chameau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Mt 23.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'De ceux qui ruminent, ou qui ont les sabots fendus, voici ceux que vous ne mangerez pas : le chameau, qui rumine, mais qui n''a pas les sabots fendus : il est impur pour vous ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: daman
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : petit mammifère qui vit en bande dans les rochers ; cf. Pr 30.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'le daman, qui rumine, mais qui n''a pas les sabots fendus : il est impur pour vous ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le lièvre, qui rumine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme le daman, sans doute à cause du mouvement de ses mâchoires.'
    marker-yv: yv-n
  - type: text
    text: 'le lièvre, qui rumine, mais qui n''a pas les sabots fendus : il est impur pour vous ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le porc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 65.4.'
    marker-yv: yv-n
  - type: text
    text: 'le porc, qui a les sabots fendus et les pieds fourchus, mais qui ne rumine pas : il est impur pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vous ne mangerez pas de leur viande, et vous ne toucherez pas leurs cadavres : ils sont impurs pour vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cours d'eau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot hébreu a été traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'oueds '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 23.40
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Gn 26.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'De tout ce qui est dans l''eau, voici ce que vous pourrez manger. Vous pourrez manger tout ce qui a des nageoires et des écailles et qui est dans l''eau, soit dans les mers, soit dans les cours d''eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: toutes les petites bêtes d'eau…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toute petite bête des eaux et tout être vivant qui est dans les eaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 1.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: horreur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme technique ainsi traduit dans ce chapitre désigne ce dont on doit avoir horreur d''un point de vue cultuel (cf. v. 43). Un mot très proche désigne les idoles (cf. Dt 29.16 ; Ez 5.11).'
    marker-yv: yv-n
  - type: text
    text: 'Mais de toutes les petites bêtes d''eau, de tout ce qui vit dans l''eau, soit dans les mers, soit dans les cours d''eau, tout ce qui n''a pas de nageoires ni d''écailles sera une horreur pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chair
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot hébreu est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'viande '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 8.
    marker-yv: yv-n
  - type: text
    text: 'Ce sera une horreur pour vous ; vous ne mangerez pas de leur chair, et vous considérerez leur cadavre comme une horreur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tout ce qui, dans l'eau, n'a pas de nageoires ni d'écailles sera une horreur pour vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici, parmi les oiseaux, ceux que vous considérerez comme une horreur, ceux qu''on ne mangera pas – c''est une horreur : le vautour, l''orfraie et le percnoptère ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le faucon selon ses espèces
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les diverses espèces de faucon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 15s,19,22,29 ; Gn 1.11+.'
    marker-yv: yv-n
  - type: text
    text: 'le milan, le faucon selon ses espèces ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'le corbeau selon toutes ses espèces ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'l''autruche, le hibou, la mouette, l''épervier selon ses espèces ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le chat-huant, le plongeon et la chouette ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cygne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '( ?) : le même mot est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'caméléon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pélican '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '( ?) : cf. Es 34.11 ; So 2.14 ; Ps 102.7.'
    marker-yv: yv-n
  - type: text
    text: 'le cygne, le pélican et le cormoran ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: la cigogne, le héron selon ses espèces, la huppe et la chauve-souris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'petite bête '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 10+.
    marker-yv: yv-n
  - type: text
    text: 'Toute petite bête ailée qui marche sur quatre pattes sera une horreur pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quatre pattes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quatre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui ont des jambes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''après une lecture traditionnelle et des versions anciennes ; autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui n'ont pas de jambes.
    marker-yv: yv-n
  - type: text
    text: 'Mais, parmi toutes les petites bêtes ailées qui marchent sur quatre pattes, vous pourrez manger celles qui ont des jambes au-dessus de leurs pieds, pour sauter sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les différentes espèces…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le ’arbé selon son espèce, le sol‘am selon son espèce, le hargol selon son espèce, le hagav selon son espèce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; les quatre noms hébreux ainsi transcrits désignent soit différentes espèces de criquets ou de sauterelles, soit le même insecte à différents stades de sa vie ; cf. Jl 1.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mt 3.4/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Voici celles que vous pourrez manger : les différentes espèces de criquets et de sauterelles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: autres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: Toutes les autres petites bêtes ailées à quatre pattes seront une horreur pour vous.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les contacts qui rendent impur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ceux-ci '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(les animaux énumérés à partir du v. 26) ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'celles-ci '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'petites bêtes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'du v. 23). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ceux-ci vous rendraient impurs : quiconque touche leurs cadavres sera impur jusqu''au soir ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: quiconque porte leurs cadavres lavera ses vêtements et sera impur jusqu'au soir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Toute bête qui a les sabots fendus, mais qui n''a pas les pieds fourchus ou qui ne rumine pas est impure pour vous : quiconque la touche sera impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui n'ont pas de sabots
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui marchent sur leurs pattes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur la plante de leurs pattes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; selon toute vraisemblance il s''agit non seulement des plantigrades (ours p. ex.), mais aussi des digitigrades (chiens, chats…), par opposition aux onguligrades.'
    marker-yv: yv-n
  - type: text
    text: 'Tous les animaux à quatre pattes qui n''ont pas de sabots sont impurs pour vous : quiconque touche leurs cadavres sera impur jusqu''au soir ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'quiconque porte leurs cadavres lavera ses vêtements et sera impur jusqu''au soir. Ils sont impurs pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'taupe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '( ?) : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' ont compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: belette.
    marker-yv: yv-n
  - type: text
    text: 'Voici, parmi les petites bêtes qui grouillent sur la terre, celles qui sont impures pour vous : la taupe, la souris et le lézard selon ses espèces ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'caméléon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ( ?) v. 18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'le gecko, la salamandre, la tortue, le lézard vert et le caméléon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Parmi toutes les petites bêtes, celles-ci sont impures pour vous : quiconque les touche quand elles sont mortes sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tout objet sur lequel l''une d''elles tombe morte sera impur : récipient de bois, vêtement, peau, sac, tout récipient dont on fait usage ; il sera mis dans l''eau et restera impur jusqu''au soir, après quoi il sera pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et vous briserez le récipient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et lui, vous le briserez.
    marker-yv: yv-n
  - type: text
    text: 'Tout ce qui se trouve à l''intérieur d''un récipient de terre dans lequel l''une d''elles tombe sera impur, et vous briserez le récipient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur lequel on verse de l'eau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il faut sans doute comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de l'eau venant d'un récipient rendu impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; voir cependant v. 38.'
    marker-yv: yv-n
  - type: text
    text: 'Tout aliment qui se mange et sur lequel on verse de l''eau sera impur ; toute boisson qui se boit, dans n''importe quel récipient, sera impure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tout objet sur lequel tombe un de leurs cadavres sera impur ; le four et le foyer seront démolis ; ils sont impurs, ils seront impurs pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celui qui touche…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : probablement pour le retirer de l''eau.'
    marker-yv: yv-n
  - type: text
    text: 'Toutefois une source et une citerne formant une réserve d''eau resteront pures ; mais celui qui touche leur cadavre sera impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Si un de leurs cadavres tombe sur une semence qui doit être semée, elle restera pure ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certains comprennent cette précision du grain que l'on s'apprête à faire cuire en vue de la consommation ; cf. v. 34
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: mais si l'on a mis de l'eau sur la semence, et qu'un de leurs cadavres y tombe, elle sera impure pour vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Si une des bêtes que vous pouvez manger meurt, celui qui touche son cadavre sera impur jusqu''au soir ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'celui qui mange d''un tel cadavre lavera ses vêtements et sera impur jusqu''au soir, et celui qui porte un tel cadavre lavera ses vêtements et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 29.
    marker-yv: yv-n
  - type: text
    text: 'Toutes les petites bêtes qui grouillent sur la terre sont une horreur : on ne les mangera pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Vous ne mangerez aucune des petites bêtes qui grouillent sur la terre, ni celles qui se traînent sur le ventre, ni celles qui marchent sur quatre pattes ou sur un plus grand nombre de pattes : c''est une horreur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'horreur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 20.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à cause de '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avec '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: traduisent la même préposition hébraïque.
    marker-yv: yv-n
  - type: text
    text: 'Ne faites pas de vous-mêmes une horreur à cause de toutes ces petites bêtes qui grouillent ; ne vous rendez pas impurs avec elles : vous seriez impurs à cause d''elles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.44 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' (YHWH)'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: noms
      - type: text
        text: ' divins. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous deviendrez '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saints
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous vous consacrerez, vous vous sanctifierez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; 19.2 ; 20.26 ; Ex 22.30 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 1P 1.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Mt 5.48. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'petites bêtes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui fourmillent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 1.26
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), votre Dieu : vous deviendrez saints, vous serez saints, car je suis saint ; vous ne vous rendrez pas impurs avec toutes ces petites bêtes qui fourmillent sur la terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.45 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'monter d''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 12.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour être votre Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 22.33 ; 25.38 ; 26.12+,45 ; Jr 11.4 ; 24.7.
    marker-yv: yv-n
  - type: text
    text: 'Je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) : c''est moi qui vous ai fait monter d''Egypte pour être votre Dieu ; vous serez saints, car je suis saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Telle est la loi concernant les bêtes, les oiseaux, tous les êtres vivants qui fourmillent dans l''eau et tous les êtres qui grouillent sur la terre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: pour séparer l'impur et le pur, l'animal qui se mange et l'animal qui ne se mange pas.
