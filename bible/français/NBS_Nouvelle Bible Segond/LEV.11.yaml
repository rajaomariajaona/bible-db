document_id: LEV.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Animaux purs et impurs
  - type: text
    content: ' '
  - type: note
    content: Sur l'ensemble de ce chap., cf. 20.25 ; Dt 14.3-20 ; Mc 7.19 ; Ac 10.9-16 ; Hé 9.10. L'identification de bon nombre des animaux mentionnés dans ce chapitre repose sur les versions anciennes, mais elle est très incertaine.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '10':
  - type: note
    content: 'toutes les petites bêtes d''eau…  : litt. toute petite bête des eaux et tout être vivant qui est dans les eaux, cf. Gn 1.20ns. –  horreur  : le terme technique ainsi traduit dans ce chapitre désigne ce dont on doit avoir horreur d''un point de vue cultuel (cf. v. 43). Un mot très proche désigne les idoles (cf. Dt 29.16 ; Ez 5.11).'
  - type: text
    content: 'Mais de toutes les petites bêtes d''eau, de tout ce qui vit dans l''eau, soit dans les mers, soit dans les cours d''eau, tout ce qui n''a pas de nageoires ni d''écailles sera une horreur pour vous. '
  '11':
  - type: note
    content: 'chair  : le même mot hébreu est traduit par viande au v. 8.'
  - type: text
    content: 'Ce sera une horreur pour vous ; vous ne mangerez pas de leur chair, et vous considérerez leur cadavre comme une horreur. '
  '12':
  - type: text
    content: Tout ce qui, dans l'eau, n'a pas de nageoires ni d'écailles sera une horreur pour vous.
  '13':
  - type: text
    content: 'Voici, parmi les oiseaux, ceux que vous considérerez comme une horreur, ceux qu''on ne mangera pas – c''est une horreur : le vautour, l''orfraie et le percnoptère ; '
  '14':
  - type: note
    content: 'le faucon selon ses espèces  : c.-à-d. les diverses espèces de faucon  ; cf. v. 15s,19,22,29 ; Gn 1.11+.'
  - type: text
    content: 'le milan, le faucon selon ses espèces ; '
  '15':
  - type: text
    content: 'le corbeau selon toutes ses espèces ; '
  '16':
  - type: text
    content: 'l''autruche, le hibou, la mouette, l''épervier selon ses espèces ; '
  '17':
  - type: text
    content: 'le chat-huant, le plongeon et la chouette ; '
  '18':
  - type: note
    content: 'cygne ( ?) : le même mot est traduit par caméléon au v. 30. –  pélican ( ?) : cf. Es 34.11 ; So 2.14 ; Ps 102.7.'
  - type: text
    content: 'le cygne, le pélican et le cormoran ; '
  '19':
  - type: text
    content: la cigogne, le héron selon ses espèces, la huppe et la chauve-souris.
  '2':
  - type: text
    content: 'Dites aux Israélites : De toutes les bêtes qui sont sur la terre, voici les animaux que vous pourrez manger. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: petite bête v. 10+.
  - type: text
    content: 'Toute petite bête ailée qui marche sur quatre pattes sera une horreur pour vous. '
  '21':
  - type: note
    content: 'quatre pattes  : litt. quatre. –  qui ont des jambes, d''après une lecture traditionnelle et des versions anciennes ; autre lecture traditionnelle qui n''ont pas de jambes.'
  - type: text
    content: 'Mais, parmi toutes les petites bêtes ailées qui marchent sur quatre pattes, vous pourrez manger celles qui ont des jambes au-dessus de leurs pieds, pour sauter sur la terre. '
  '22':
  - type: note
    content: 'les différentes espèces…  : litt. le ’arbé selon son espèce, le sol‘am selon son espèce, le hargol selon son espèce, le hagav selon son espèce  ; les quatre noms hébreux ainsi transcrits désignent soit différentes espèces de criquets ou de sauterelles, soit le même insecte à différents stades de sa vie ; cf. Jl 1.4n  ; Mt 3.4/ /.'
  - type: text
    content: 'Voici celles que vous pourrez manger : les différentes espèces de criquets et de sauterelles. '
  '23':
  - type: note
    content: 'autres  : sous-entendu dans le texte.'
  - type: text
    content: Toutes les autres petites bêtes ailées à quatre pattes seront une horreur pour vous.
  - type: heading
    content: Les contacts qui rendent impur
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Ceux-ci (les animaux énumérés à partir du v. 26) ou celles-ci (les petites bêtes du v. 23). –  impur  : voir pur.'
  - type: text
    content: 'Ceux-ci vous rendraient impurs : quiconque touche leurs cadavres sera impur jusqu''au soir ; '
  '25':
  - type: text
    content: quiconque porte leurs cadavres lavera ses vêtements et sera impur jusqu'au soir.
  '26':
  - type: text
    content: 'Toute bête qui a les sabots fendus, mais qui n''a pas les pieds fourchus ou qui ne rumine pas est impure pour vous : quiconque la touche sera impur. '
  '27':
  - type: note
    content: 'qui n''ont pas de sabots  : litt. qui marchent sur leurs pattes ou sur la plante de leurs pattes  ; selon toute vraisemblance il s''agit non seulement des plantigrades (ours p. ex.), mais aussi des digitigrades (chiens, chats…), par opposition aux onguligrades.'
  - type: text
    content: 'Tous les animaux à quatre pattes qui n''ont pas de sabots sont impurs pour vous : quiconque touche leurs cadavres sera impur jusqu''au soir ; '
  '28':
  - type: text
    content: 'quiconque porte leurs cadavres lavera ses vêtements et sera impur jusqu''au soir. Ils sont impurs pour vous. '
  '29':
  - type: note
    content: 'taupe ( ?) : LXX et Vg ont compris belette.'
  - type: text
    content: 'Voici, parmi les petites bêtes qui grouillent sur la terre, celles qui sont impures pour vous : la taupe, la souris et le lézard selon ses espèces ; '
  '3':
  - type: text
    content: Vous pourrez manger tout ce qui a les sabots fendus, les pieds fourchus, et qui rumine.
  '30':
  - type: note
    content: caméléon ( ?) v. 18n.
  - type: text
    content: 'le gecko, la salamandre, la tortue, le lézard vert et le caméléon. '
  '31':
  - type: text
    content: 'Parmi toutes les petites bêtes, celles-ci sont impures pour vous : quiconque les touche quand elles sont mortes sera impur jusqu''au soir. '
  '32':
  - type: text
    content: 'Tout objet sur lequel l''une d''elles tombe morte sera impur : récipient de bois, vêtement, peau, sac, tout récipient dont on fait usage ; il sera mis dans l''eau et restera impur jusqu''au soir, après quoi il sera pur. '
  '33':
  - type: note
    content: 'et vous briserez le récipient  : litt. et lui, vous le briserez.'
  - type: text
    content: 'Tout ce qui se trouve à l''intérieur d''un récipient de terre dans lequel l''une d''elles tombe sera impur, et vous briserez le récipient. '
  '34':
  - type: note
    content: 'sur lequel on verse de l''eau  : il faut sans doute comprendre de l''eau venant d''un récipient rendu impur  ; voir cependant v. 38.'
  - type: text
    content: 'Tout aliment qui se mange et sur lequel on verse de l''eau sera impur ; toute boisson qui se boit, dans n''importe quel récipient, sera impure. '
  '35':
  - type: text
    content: 'Tout objet sur lequel tombe un de leurs cadavres sera impur ; le four et le foyer seront démolis ; ils sont impurs, ils seront impurs pour vous. '
  '36':
  - type: note
    content: 'celui qui touche…  : probablement pour le retirer de l''eau.'
  - type: text
    content: 'Toutefois une source et une citerne formant une réserve d''eau resteront pures ; mais celui qui touche leur cadavre sera impur. '
  '37':
  - type: text
    content: 'Si un de leurs cadavres tombe sur une semence qui doit être semée, elle restera pure ; '
  '38':
  - type: note
    content: Certains comprennent cette précision du grain que l'on s'apprête à faire cuire en vue de la consommation ; cf. v. 34n.
  - type: text
    content: mais si l'on a mis de l'eau sur la semence, et qu'un de leurs cadavres y tombe, elle sera impure pour vous.
  '39':
  - type: text
    content: 'Si une des bêtes que vous pouvez manger meurt, celui qui touche son cadavre sera impur jusqu''au soir ; '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'chameau  : cf. Mt 23.24. –  impur  : voir pur.'
  - type: text
    content: 'De ceux qui ruminent, ou qui ont les sabots fendus, voici ceux que vous ne mangerez pas : le chameau, qui rumine, mais qui n''a pas les sabots fendus : il est impur pour vous ; '
  '40':
  - type: text
    content: 'celui qui mange d''un tel cadavre lavera ses vêtements et sera impur jusqu''au soir, et celui qui porte un tel cadavre lavera ses vêtements et sera impur jusqu''au soir. '
  '41':
  - type: note
    content: V. 29.
  - type: text
    content: 'Toutes les petites bêtes qui grouillent sur la terre sont une horreur : on ne les mangera pas. '
  '42':
  - type: text
    content: 'Vous ne mangerez aucune des petites bêtes qui grouillent sur la terre, ni celles qui se traînent sur le ventre, ni celles qui marchent sur quatre pattes ou sur un plus grand nombre de pattes : c''est une horreur. '
  '43':
  - type: note
    content: horreur v. 10n  ; 20.25. –  à cause de et avec traduisent la même préposition hébraïque.
  - type: text
    content: 'Ne faites pas de vous-mêmes une horreur à cause de toutes ces petites bêtes qui grouillent ; ne vous rendez pas impurs avec elles : vous seriez impurs à cause d''elles. '
  '44':
  - type: note
    content: 'Seigneur (YHWH)  : voir noms divins. –  vous deviendrez saints  : autres traductions vous vous consacrerez, vous vous sanctifierez  ; 19.2 ; 20.26 ; Ex 22.30 ; 1P 1.16  ; cf. Mt 5.48. –  petites bêtes (v. 10n) qui fourmillent Gn 1.26n.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu : vous deviendrez saints, vous serez saints, car je suis saint ; vous ne vous rendrez pas impurs avec toutes ces petites bêtes qui fourmillent sur la terre.'
  '45':
  - type: text
    content: ' '
  - type: note
    content: monter d'Egypte Gn 12.10n. –  pour être votre Dieu 22.33 ; 25.38 ; 26.12+,45 ; Jr 11.4 ; 24.7.
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) : c''est moi qui vous ai fait monter d''Egypte pour être votre Dieu ; vous serez saints, car je suis saint. '
  '46':
  - type: text
    content: 'Telle est la loi concernant les bêtes, les oiseaux, tous les êtres vivants qui fourmillent dans l''eau et tous les êtres qui grouillent sur la terre, '
  '47':
  - type: note
    content: 10.10n. – Voir pur.
  - type: text
    content: pour séparer l'impur et le pur, l'animal qui se mange et l'animal qui ne se mange pas.
  '5':
  - type: note
    content: 'daman  : petit mammifère qui vit en bande dans les rochers ; cf. Pr 30.26n.'
  - type: text
    content: 'le daman, qui rumine, mais qui n''a pas les sabots fendus : il est impur pour vous ; '
  '6':
  - type: note
    content: le lièvre, qui rumine, comme le daman, sans doute à cause du mouvement de ses mâchoires.
  - type: text
    content: 'le lièvre, qui rumine, mais qui n''a pas les sabots fendus : il est impur pour vous ; '
  '7':
  - type: note
    content: 'le porc  : cf. Es 65.4.'
  - type: text
    content: 'le porc, qui a les sabots fendus et les pieds fourchus, mais qui ne rumine pas : il est impur pour vous. '
  '8':
  - type: text
    content: 'Vous ne mangerez pas de leur viande, et vous ne toucherez pas leurs cadavres : ils sont impurs pour vous.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'cours d''eau  : le mot hébreu a été traduit par oueds en 23.40n  ; cf. Gn 26.17n.'
  - type: text
    content: 'De tout ce qui est dans l''eau, voici ce que vous pourrez manger. Vous pourrez manger tout ce qui a des nageoires et des écailles et qui est dans l''eau, soit dans les mers, soit dans les cours d''eau. '
