document_id: 1TH.3,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'décidé de ou préféré  ; le même verbe est traduit par vouloir en 2.8. –  rester seuls (ou seul ) à Athènes  : le pluriel ( nous ) pourrait être de pure forme et désigner l''apôtre seul, cf. v. 5 ; voir cependant 1.1+ ; voir aussi Ac 17.14ss ; 18.5.'
  - type: text
    content: 'Aussi, n''y tenant plus, nous avons décidé de rester seuls à Athènes, '
  '10':
  - type: note
    content: '1.2+s. Selon certains, ce v. prolonge la question (ou l''exclamation) du v. 9n  : … en lui adressant nuit et jour… –  de très instantes supplications  : litt. des supplications surabondantes, le même superlatif est traduit par très haute en 5.13 ; il est traduit par infiniment en Ep 3.20 ; verbe apparenté en Rm 5.20 (surabonder). –  vous revoir  : litt. voir votre face, v. 7 ; 2.17s. –  suppléer…  : cf. v. 12 ; 4.1 ; Ph 1.25 ; 2Th 1.3 ; sur le verbe, voir 2Co 13.9n.'
  - type: text
    content: Nuit et jour, nous lui adressons de très instantes supplications, pour qu'il nous soit donné de vous revoir et de suppléer ce qui manque à votre foi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Que notre Dieu…  : cf. 5.23s ; Rm 15.5s,13,33 ; Ph 4.19 ; 2Th 2.16s ; 3.5,16. –  Seigneur Jésus  : cf. 1Co 8.6.'
  - type: text
    content: 'Que notre Dieu et Père lui-même, et notre Seigneur Jésus, aplanissent notre chemin jusqu''à vous ! '
  '12':
  - type: note
    content: 'fasse foisonner…  : litt. vous fasse foisonner (Rm 5.20n) et abonder dans l''amour… Ph 1.9 ; 2Th 1.3 ; cf. Mt 22.39/ / ; Lc 10.25ss ; Rm 13.8 ; 1Co 13 ; Ga 5.14. –  pour tous  : cf. 5.15 ; Rm 12.17 ; Ga 6.10. –  celui que nous avons… 2.7ss.'
  - type: text
    content: 'Que le Seigneur fasse foisonner et abonder votre amour les uns pour les autres et pour tous, à l''exemple de celui que nous avons pour vous ! '
  '13':
  - type: note
    content: 'Qu''il affermisse votre cœur (litt. vos cœurs) …  : cf. 2.4 ; Jc 5.8. –  irréprochable 2.10 ; 5.23 ; cf. 1Co 1.8 ; Ph 1.10 ; 2.15. –  sainteté  : cf. 4.3 ; 1P 1.15s. –  l''avènement… 2.19+. –  avec tous ses saints  : désignation traditionnelle des anges, que le N.T. applique aussi aux chrétiens (cf. 4.15ss) ; voir Rm 1.7+ ; cf. Dt 33.3 ; Za 14.5 ; Dn 7.25ss ; voir aussi Ps 89.6ss ; Jb 5.1 ; 15.15 ; Dn 4.10,14,20,34 ; 7.18 ; 8.13 ; Mt 25.31 ; Mc 8.38 ; Ac 10.22 ; 2Th 1.7,10 ; Ap 14.10 ; cf. Sagesse 5.5 : « Comment donc (le juste glorifié) a-t-il été admis au nombre des fils de Dieu et partage-t-il le sort des saints ? » –  Amen ! ce terme est ici absent de plusieurs mss.'
  - type: text
    content: 'Qu''il affermisse votre cœur, pour qu''il soit irréprochable dans la sainteté devant notre Dieu et Père, à l''avènement de notre Seigneur Jésus, avec tous ses saints ! '
  - type: text
    content: Amen !
  '2':
  - type: note
    content: 'envoyé Timothée 1.1+ ; cf. 1Co 4.17 ; 16.10 ; Ph 2.19. –  notre frère  : cf. 1Co 1.1 ; 16.12,19s ; 2Co 1.1 ; 2.13 ; 8.18 ; Ph 2.25 ; 4.21s. –  collaborateur de Dieu  : certains mss portent  : (notre) collaborateur ou serviteur de Dieu  ; cf. 1Co 3.9n  ; 2Co 5.16–6.2. –  pour ou par, litt. dans. –  affermir Rm 16.25 ; 2Th 2.17. –  encourager ou exhorter, cf. v. 7 ; 2.3n.'
  - type: text
    content: 'et nous avons envoyé Timothée, notre frère, collaborateur de Dieu pour la bonne nouvelle du Christ, afin de vous affermir et de vous encourager dans l''intérêt de votre foi, '
  '3':
  - type: note
    content: 'ébranlé ou troublé  ; le verbe grec correspondant n''apparaît qu''ici dans le N.T. ; cf. 2Th 2.1s. –  dans (ou par) les détresses  : le terme correspondant, traditionnellement traduit par tribulation(s), s''applique particulièrement aux épreuves attendues par le judaïsme à la fin de ce monde-ci et pour l''avènement du monde à venir, cf. v. 4 ; 1.6 ; Dn 12.1 ; Mc 13.7ss,19/ / ; Ac 14.22 ; 2Th 1.4 ; Ap 2.9s ; 7.14 ; voir aussi Mt 12.32n. –  vous le savez 1.5+.'
  - type: text
    content: 'pour que personne ne soit ébranlé dans les détresses présentes. En effet, vous le savez vous-mêmes, c''est pour cela que nous sommes là. '
  '4':
  - type: note
    content: Lorsque nous étions chez vous 2Th 2.5 ; 3.10 ; cf. Ga 1.9+. –  nous allions connaître la détresse v. 3n.
  - type: text
    content: 'Lorsque nous étions chez vous, nous vous disions d''avance que nous allions connaître la détresse ; c''est ce qui est arrivé, vous le savez. '
  '5':
  - type: note
    content: 'Cf. v. 1ns ; voir aussi 2Co 11.28. –  foi ou fidélité  : le terme grec peut avoir ces deux sens ; de même v. 6. –  le tentateur et mis à l''épreuve traduisent deux formes du même verbe grec ; on pourrait aussi traduire que le tentateur ne vous ait tentés ; que le probateur ne vous ait mis à l''épreuve  ; cf. 2.18 ; Mt 4.1n,3 ; voir aussi 1Co 7.5 ; 2Co 2.10s ; 4.4 ; 2Th 2.9ss. –  que notre travail (1.3+) n''ait été inutile  : autre traduction que nous ne nous soyons donné de la peine en vain, cf. 1Co 15.10n  ; Ph 2.16+.'
  - type: text
    content: C'est pourquoi, n'y tenant plus, j'ai envoyé Timothée s'informer de votre foi, de peur que le tentateur ne vous ait mis à l'épreuve et que notre travail n'ait été inutile.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'nous arriver v. 1ns ; cf. Ac 18.5. –  donné de bonnes nouvelles  : c''est le verbe grec qui est traduit ailleurs par annoncer la bonne nouvelle (= l''Evangile ) et qui a donné notre verbe évangéliser , cf. 1Co 15.1s ; Ga 1.8,11,16 ; voir aussi Lc 1.19. –  foi (v. 5n) / amour (4.9) : cf. 1.3 ; Ga 5.6 ; 2Th 1.3. –  souhaitiez vivement… 2.17s ; Rm 1.11+.'
  - type: text
    content: 'Mais Timothée vient de nous arriver de chez vous ; il nous a donné de bonnes nouvelles de votre foi, de votre amour et du bon souvenir que vous gardez toujours de nous ; il nous a annoncé que vous souhaitiez vivement nous revoir, ce que nous souhaitons tout aussi vivement. '
  '7':
  - type: note
    content: 'Cf. 2Th 1.4. –  désarroi / détresse (1.6+) : les mêmes termes sont associés en So 1.15 (LXX) ; 1Co 7.26ss ; 2Co 6.4. –  puisé de l''encouragement ou été exhortés, consolés  ; cf. v. 2+.'
  - type: text
    content: 'Ainsi, au milieu de tout notre désarroi et de notre détresse, frères, nous avons puisé de l''encouragement en vous, grâce à votre foi. '
  '8':
  - type: note
    content: 'puisque…  : autre traduction tant que vous tenez ferme, cf. 1Co 16.13n  ; Ph 4.1 ; 2Th 2.15.'
  - type: text
    content: 'Maintenant, nous vivons, puisque vous tenez ferme dans le Seigneur. '
  '9':
  - type: note
    content: 'La phrase pourrait aussi être traduite sous forme exclamative  : quelles actions de grâces pourrions-nous rendre à Dieu à votre sujet… !  ; le verbe traduit ici par rendre est traduit par payer de retour en Rm 11.35. –  toute la joie 2.19s.'
  - type: text
    content: 'Comment pouvons-nous rendre grâce à Dieu à votre sujet, pour toute la joie dont nous nous réjouissons à cause de vous devant notre Dieu ? '
