document_id: ROM.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le juste jugement de Dieu
  - type: text
    content: ' '
  - type: note
    content: 14.4 ; Mt 7.1+s.
  - type: text
    content: 'Tu es donc inexcusable, toi qui juges, qui que tu sois ; en jugeant l''autre, en effet, tu te condamnes toi-même, puisque, toi qui juges, tu pratiques les mêmes choses. '
  '10':
  - type: note
    content: V. 7+ ; voir aussi paix.
  - type: text
    content: 'Gloire, honneur et paix pour quiconque œuvre au bien, pour le Juif d''abord, mais aussi pour le Grec ! '
  '11':
  - type: note
    content: 'partialité  : voir Ac 10.34n  ; cf. Lv 19.15 ; Dt 1.17 ; 10.17 ; 2Ch 19.7 ; Ga 2.6. –  chez Dieu  : autre traduction devant Dieu (cf. v. 13).'
  - type: text
    content: Car il n'y a pas de partialité chez Dieu.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.19. – Voir péché . –  sans loi 6.19n  ; 1Co 9.21. –  iront… à leur perte ou périront , cf. 9.22 ; 14.15.
  - type: text
    content: 'Tous ceux qui ont péché sans loi iront aussi à leur perte sans loi, et tous ceux qui ont péché sous la loi seront jugés au moyen de la loi. '
  '13':
  - type: note
    content: 'qui entendent  : autre traduction qui écoutent. –  ceux qui mettent la loi en pratique  : litt. les faiseurs de (la) loi  ; 10.5 ; Mt 7.21+ ; Jc 1.22-25 ; 4.11 ; 1Jn 3.7.'
  - type: text
    content: 'En effet, ce ne sont pas ceux qui entendent la loi qui sont justes devant Dieu ; ce sont ceux qui mettent la loi en pratique qui seront justifiés. '
  '14':
  - type: note
    content: 'Ac 10.35. – Voir non-Juifs. –  qui n''ont pas la loi  : autre traduction qui n''ont pas de loi.'
  - type: text
    content: 'Quand des non-Juifs, qui n''ont pas la loi, font naturellement ce que prescrit la loi, ceux-là, qui n''ont pas la loi, sont une loi pour eux-mêmes ; '
  '15':
  - type: note
    content: 'Cf. 1.32 ; Es 51.7 ; Jr 31.33 ; 2 Baruch 57.2 : « En ce temps-là (celui d''Abraham et de ses fils), la Loi non écrite existait chez eux et les œuvres des commandements étaient accomplies. » –  conscience / témoignage 9.1 ; cf. Sagesse 17.11 : « La méchanceté témoigne de sa lâcheté quand elle est condamnée par son propre témoin ; toujours elle ajoute aux difficultés lorsque la conscience l''oppresse. » –  ainsi que leurs raisonnements…  : autres traductions ainsi que les raisonnements par lesquels ils s''accusent ou se défendent les uns les autres ; et leurs raisonnements les accuseront ou les défendront (au jour où Dieu jugera…)  ; v. 16n.'
  - type: text
    content: 'ils montrent que l''œuvre de la loi est écrite dans leur cœur ; leur conscience aussi en rend témoignage, ainsi que leurs raisonnements qui les accusent ou les défendent tour à tour '
  '16':
  - type: note
    content: Cf. Lc 8.17+ ; 1Co 4.5 ; 1Th 5.2ss. –  juge ou jugera  ; certains mss portent le futur, qui, pour ce verbe, ne diffère du présent que par l'accentuation (or les accents ne sont pas écrits dans la plupart des plus anciens mss) ; du reste le présent grec peut lui-même être traduit en français par un futur ; cf. Jn 5.27 ; Ac 10.42+. –  ma bonne nouvelle ou mon Evangile, 1.1,15s ; 16.25 ; 2Tm 2.8.
  - type: text
    content: – au jour où Dieu, selon ma bonne nouvelle, juge les secrets des humains par Jésus-Christ.
  - type: heading
    content: Désobéissance d'Israël
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'le nom de Juif  : cf. v. 28s ; Ga 2.15 ; Ph 3.5 ; voir aussi Es 48.1-4 ; Mi 3.11 ; Mt 3.8s ; Jn 8.33-39 ; cf. 2 Baruch 48.22-24 : « Nous avons confiance en toi, parce que ta Loi est parmi nous, et nous savons que nous ne tomberons pas, tant que nous nous attacherons à tes alliances. Nous serons toujours heureux au moins d''une chose, de ne pas nous être mélangés aux nations. Car tous ensemble nous sommes un peuple unique, renommé, nous qui avons reçu la Loi unique de l''Unique, et la Loi, qui est parmi nous, nous aidera, et la sagesse suprême, qui est en nous, nous soutiendra. » –  sur la loi  : autre traduction sur une loi . –  qui mets ta fierté ou qui te glorifies, qui tires orgueil de Dieu, qui te vantes de Dieu  : même terme ou termes apparentés v. 23 ; 3.27 ; 4.2 ; 5.2s,11 ; 11.18 ; 15.17 ; 1Co 1.29+ss ; 2Co 1.12+ ; 7.4 ; 11.30 ; 12.9 ; Ga 6.13s ; Ep 2.9 ; Ph 1.26+ ; 1Th 2.19 ; cf. Psaumes de Salomon 17.1 : « Seigneur, tu es notre roi à jamais et toujours. C''est donc en toi, notre Dieu, que se glorifiera notre âme. »'
  - type: text
    content: 'Toi qui te donnes le nom de Juif, qui te reposes sur la loi, qui mets ta fierté en Dieu, '
  '18':
  - type: note
    content: 'connais sa volonté 12.2+ ; cf. Lc 12.47. –  discerner 1.28n. –  ce qui est important  : cf. Ph 1.10 ; voir aussi Mt 23.23.'
  - type: text
    content: 'qui connais sa volonté et qui, instruit par la loi, sais discerner ce qui est important, '
  '19':
  - type: note
    content: qui es persuadé… ou, plus littéralement, qui t'es persuadé que tu es…  ; cf. Lc 18.9. –  le guide des aveugles Mt 15.14+ ; cf. Lc 18.9 ; Jn 9.40s.
  - type: text
    content: 'toi qui es persuadé d''être le guide des aveugles, la lumière de ceux qui sont dans les ténèbres, '
  '2':
  - type: text
    content: 'Or nous savons que le jugement de Dieu contre ceux qui pratiquent de telles choses est conforme à la vérité. '
  '20':
  - type: note
    content: 'l''éducateur…  : même terme en Hé 12.9. –  gens déraisonnables  : cf. Ps 14.1 ; Pr 10.23 ; Ec 5.3 ; Lc 12.20 ; 1Co 15.36. –  à instruire…  : litt. le maître (même terme en Jn 3.10 p. ex.) des tout-petits  ; cf. Mt 23.8. –  l''essence même  : autre traduction la formulation même  ; le même terme, apparenté au mot habituellement traduit par forme (cf. Ph 2.6n), est traduit par forme extérieure en 2Tm 3.5.'
  - type: text
    content: 'l''éducateur apte à corriger les gens déraisonnables, à instruire les tout-petits, parce que tu as dans la loi l''essence même de la connaissance et de la vérité… '
  '21':
  - type: note
    content: Cf. Ps 50.16-21 ; Mt 23.3s.
  - type: text
    content: '– Toi donc qui instruis les autres, tu ne t''instruis pas toi-même ! Toi qui proclames qu''il ne faut pas voler, tu voles ! '
  '22':
  - type: note
    content: 'tu commets des sacrilèges  : le verbe grec correspondant est dérivé du terme hiéros, qui signifie sacré (voir saint) et qui peut désigner le temple (to hiéron) ; autre traduction tu pilles les temples  ; terme apparenté en Ac 19.37 ; Paul pourrait faire allusion à un commerce d''objets cultuels païens ; cf. Dt 7.25 ; Flavius Josèphe, Histoire ancienne des Juifs 4.207 : « Que personne ne blasphème les dieux que d''autres cités révèrent, ne pille les temples étrangers, ne s''empare d''un trésor dédié au nom de quelque dieu. » – Cf. Testament de Lévi 14.4 : « Mais si vous êtes plongés dans les ténèbres de l''impiété, que feront les nations qui vivent dans l''aveuglement ? »'
  - type: text
    content: 'Toi qui dis qu''il ne faut pas commettre d''adultère, tu commets l''adultère ! Toi qui as les idoles en abomination, tu commets des sacrilèges ! '
  '23':
  - type: note
    content: 'fierté v. 17n. –  transgression  : voir péché.'
  - type: text
    content: 'Toi qui mets ta fierté dans la loi, tu déshonores Dieu par la transgression de la loi ! '
  '24':
  - type: note
    content: Es 52.5  ; cf. 2S 12.14 ; Ez 36.20-22 ; 1Tm 6.1 ; Jc 2.7 ; 2P 2.2. –  qu'on calomnie ou qu'on blasphème  ; une autre forme du même verbe est traduite par calomniateurs en 3.8 ; cf. 14.16. –  les nations ou les non-Juifs.
  - type: text
    content: 'Car '
  - type: text
    content: c'est à cause de vous qu'on calomnie le nom de Dieu parmi les nations,
  - type: text
    content: ' comme il est écrit.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: circoncision (3.1) / loi Ga 5.3-6 ; voir aussi Jr 9.24s ; 1Co 7.19+.
  - type: text
    content: 'Certes, la circoncision est utile, si tu mets la loi en pratique ; mais si tu es un transgresseur de la loi, ta circoncision devient incirconcision. '
  '26':
  - type: note
    content: 'V. 14ss ; cf. Lv 18.5 ; Dt 30.16. –  l''incirconcis  : litt. l''incirconcision, de même v. 27. –  justes ordonnances 5.18n. –  comptée 4.3n.'
  - type: text
    content: 'Si donc l''incirconcis observe les justes ordonnances de la loi, son incirconcision ne sera-t-elle pas comptée comme circoncision ? '
  '27':
  - type: note
    content: 'jugera ou condamnera  : cf. 3.8n  ; 13.2 ; 14.22n  ; cf. Mt 12.41s/ /. –  toi qui la transgresses  : litt. toi transgresseur de la loi par la lettre et la circoncision  ; cf. v. 29+.'
  - type: text
    content: 'L''incirconcis de nature qui accomplit la loi ne te jugera-t-il pas, toi qui la transgresses tout en ayant la lettre de la loi et la circoncision ? '
  '28':
  - type: note
    content: vrai, vraie et vraiment (v. 29) sont sous-entendus dans le texte. – Voir chair.
  - type: text
    content: 'Le vrai Juif, ce n''est pas celui qui en a les apparences ; et la vraie circoncision, ce n''est pas celle qui est apparente, dans la chair. '
  '29':
  - type: note
    content: 'juif vient du nom de Juda, dont l''étymologie est associée à la louange dans l''A.T. hébreu ; cf. Gn 29.35n  ; 49.8-10 ; Dt 10.21n. –  dans le secret (cf. v. 16+), comme en Mt 6.4,6. –  sa (litt. la) circoncision… celle du cœur Dt 10.16 ; 30.6 ; Jr 4.4 ; 9.25 ; Ac 7.51 ; Ep 2.11 ; Ph 3.2-7 ; Col 2.11 ; cf. Jubilés 1.23 : « Après cela, ils se tourneront vers Moi en toute droiture, de tout leur cœur et de toute leur âme, Je circoncirai leur cœur et celui de leur descendance, Je leur créerai un esprit saint, Je les purifierai en sorte qu''ils ne se détourneront plus de Moi, depuis ce jour et jusque dans l''éternité. » La notion de circoncision du cœur est aussi présente dans les écrits de Qumrân. –  qui relève…  : litt. en Esprit et non en lettre  ; c.-à-d. dans l''Esprit et non pas dans la lettre ou par l''Esprit et non pas par la lettre. Sur l''opposition lettre / Esprit (v. 27), voir aussi 7.6 ; 2Co 3.6.'
  - type: text
    content: Est vraiment juif celui qui l'est dans le secret ; sa circoncision, c'est celle du cœur, qui relève, non pas de la lettre, mais de l'Esprit ; celui-là ne reçoit pas sa louange des humains, mais de Dieu.
  '3':
  - type: note
    content: 'Cf. Psaumes de Salomon 15.8 : « Ceux qui commettent l''iniquité n''échapperont pas au jugement du Seigneur. » –  Comptes-tu 4.3n.'
  - type: text
    content: 'Comptes-tu donc, toi qui juges ceux qui pratiquent de telles choses et qui les fais toi-même, échapper au jugement de Dieu ? '
  '4':
  - type: note
    content: 'tolérance  : le terme qui apparaît ici (également en 3.26) est apparenté au verbe habituellement traduit par supporter Mt 17.17/ / ; Ac 18.14n  ; 2Co 11.1,4,19s ; Ep 4.2 ; Col 3.13 ; 2Th 1.4 ; 2Tm 4.3 ; Hé 13.22 ; voir aussi Rm 9.22 ; 2P 3.9ss. –  bonté (ou générosité) : ce terme traduit ici deux mots grecs apparentés : d''abord un substantif (qui revient en 3.12 dans l''expression faire le bien, puis en 11.22), ensuite un adjectif substantivé (litt. le bon de Dieu) ; un mot composé est traduit par bonnes paroles en 16.18. Cette famille de termes est très proche, phonétiquement, du mot transcrit Christ  ; on la retrouve en Mt 11.30 ; Lc 5.39 ; 6.35 ; 1Co 13.4 ; 15.33 ; 2Co 6.6 ; Ga 5.22 ; Ep 2.7 ; 4.32 ; Col 3.12 ; Tt 3.4 ; 1P 2.3. –  changement radical  : autres traductions conversion, repentance  ; cf. Mt 3.2n  ; Ac 2.38n  ; 2Co 7.9ns ; 2P 3.9n. Epître d''Ignace d''Antioche aux Ephésiens 11.1 : « Ce sont les derniers temps ; désormais rougissons, et craignons que la longanimité de Dieu ne tourne à notre condamnation. Ou bien craignons la colère à venir (cf. Mt 3.7), ou bien aimons la grâce présente : de deux choses l''une. Que seulement nous soyons trouvés dans le Christ pour entrer dans la vie véritable. »'
  - type: text
    content: 'Ou bien méprises-tu la richesse de sa bonté, de sa tolérance et de sa patience, faute de reconnaître que la bonté de Dieu doit te conduire à un changement radical ? '
  '5':
  - type: note
    content: 'obstination  : litt. dureté  ; cf. 9.18 ; Mc 10.5n/ /. –  parce que ton cœur…  : litt. par (ou selon) ton cœur sans changement (ou inconverti, impénitent) ; terme apparenté à celui qui est traduit par changement radical au v. 4 ; cf. Dt 9.27. –  jour de la colère  : cf. Ez 7.19 ; So 1.14-18 ; 2.2s ; Ap 6.17+ ; voir aussi 2Th 1.6ss. – Voir juste.'
  - type: text
    content: 'Par ton obstination, parce que ton cœur se refuse à changer radicalement, tu t''amasses un trésor de colère pour le jour de la colère et de la révélation du juste jugement de Dieu, '
  '6':
  - type: note
    content: Es 59.18 ; Jr 17.10 ; Ps 62.13 ; Pr 24.12  ; Mt 16.27 ; voir aussi 2Co 11.15 ; 2Tm 4.14 ; 1P 1.17 ; Ap 2.23+.
  - type: text
    content: 'qui '
  - type: text
    content: 'rendra à chacun selon ses œuvres :'
  - type: text
    content: ' '
  '7':
  - type: note
    content: 'vie éternelle 5.21 ; 6.22s ; cf. Dn 12.2 ; Mt 19.16 ; Jn 3.15s ; 6.47 ; 17.3 ; Ga 6.8 ; 1Tm 6.12 ; Tt 1.2 ; 1Jn 5.13,20. –  par leur persévérance…  : litt. selon une persévérance (ou endurance) d''œuvre bonne  ; cf. 5.3s ; 8.25 ; 12.12 ; 15.4s. –  cherchent la gloire Jn 5.44 ; 7.18 ; 8.50 ; 1Th 2.6. –  l''impérissable ou la vie impérissable  : litt. la non-pourriture, cf. 1.23+ ; 1Co 9.25+. – Voir aussi v. 10 ; 1P 1.7.'
  - type: text
    content: 'vie éternelle à ceux qui, par leur persévérance dans une œuvre bonne, cherchent la gloire, l''honneur et l''impérissable ; '
  '8':
  - type: note
    content: 'colère 1.18+ ; cf. Jn 3.36. –  par ambition personnelle  : autres traductions par esprit de dispute, par rivalité, Ph 1.17. –  sont réfractaires  : cf. 15.31 ; autre traduction refusent de se laisser persuader par la vérité et se laissent persuader par l''injustice  ; c''est une autre forme du même verbe qui est traduite par être persuadé au v. 19 ; cf. 8.38 ; 10.21 ; 11.30ss ; 14.14 ; 15.14 ; Jn 3.36.'
  - type: text
    content: 'colère et fureur à ceux qui, par ambition personnelle, sont réfractaires à la vérité et se laissent persuader par l''injustice. '
  '9':
  - type: note
    content: 'Détresse (5.3+) / angoisse  : cf. Dt 28.53 ; Es 8.22. –  tout homme  : autre traduction toute âme (la même expression est traduite par chacun en 13.1) d''humain, cf. 16.4n  ; Gn 1.20n  ; Mt 10.28n  ; 1P 1.9n. –  produit  : verbe apparenté à celui qui est rendu par œuvrer à au v. 10 ; il est traduit par se livrer à en 1.27 ; produire en 4.15 ; 5.3 ; 7.8,13-20 ; 2Co 4.17 ; 5.5 ; 7.10s ; Jc 1.3 ; accomplir en 15.18 ; 1P 4.3 ; agir en 1Co 5.3 ; mettre en œuvre en Ep 6.13 ; Ph 2.12. –  Juif / Grec 1.14n,16+.'
  - type: text
    content: 'Détresse et angoisse pour tout homme qui produit le mal, pour le Juif d''abord, mais aussi pour le Grec ! '
