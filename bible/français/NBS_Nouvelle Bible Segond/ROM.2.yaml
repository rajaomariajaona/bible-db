      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'discerner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui est important
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ph 1.10 ; voir aussi Mt 23.23.'
      marker-yv: yv-n
    - type: text
      text: 'qui connais sa volonté et qui, instruit par la loi, sais discerner ce qui est important, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui es persuadé… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus littéralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui t'es persuadé que tu es…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Lc 18.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le guide des aveugles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 15.14+ ; cf. Lc 18.9 ; Jn 9.40s.
      marker-yv: yv-n
    - type: text
      text: 'toi qui es persuadé d''être le guide des aveugles, la lumière de ceux qui sont dans les ténèbres, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Or nous savons que le jugement de Dieu contre ceux qui pratiquent de telles choses est conforme à la vérité. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'éducateur…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même terme en Hé 12.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gens déraisonnables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 14.1 ; Pr 10.23 ; Ec 5.3 ; Lc 12.20 ; 1Co 15.36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à instruire…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le maître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même terme en Jn 3.10 p. ex.) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des tout-petits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mt 23.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'essence même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la formulation même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même terme, apparenté au mot habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'forme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Ph 2.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'forme extérieure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 2Tm 3.5.
      marker-yv: yv-n
    - type: text
      text: 'l''éducateur apte à corriger les gens déraisonnables, à instruire les tout-petits, parce que tu as dans la loi l''essence même de la connaissance et de la vérité… '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ps 50.16-21 ; Mt 23.3s.
      marker-yv: yv-n
    - type: text
      text: '– Toi donc qui instruis les autres, tu ne t''instruis pas toi-même ! Toi qui proclames qu''il ne faut pas voler, tu voles ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
