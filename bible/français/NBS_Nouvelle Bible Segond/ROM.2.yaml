        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juif
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 28s ; Ga 2.15 ; Ph 3.5 ; voir aussi Es 48.1-4 ; Mi 3.11 ; Mt 3.8s ; Jn 8.33-39 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Baruch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '48.22-24 : « Nous avons confiance en toi, parce que ta '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Loi
        - type: text
          text: ' est parmi nous, et nous savons que nous ne tomberons pas, tant que nous nous attacherons à tes alliances. Nous serons toujours heureux au moins d''une chose, de ne pas nous être mélangés aux nations. Car tous ensemble nous sommes un peuple unique, renommé, nous qui avons reçu la Loi unique de l''Unique, et la Loi, qui est parmi nous, nous aidera, et la sagesse suprême, qui est en nous, nous soutiendra. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur une loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui mets ta fierté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui te glorifies, qui tires orgueil de Dieu, qui te vantes de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même terme ou termes apparentés v. 23 ; 3.27 ; 4.2 ; 5.2s,11 ; 11.18 ; 15.17 ; 1Co 1.29+ss ; 2Co 1.12+ ; 7.4 ; 11.30 ; 12.9 ; Ga 6.13s ; Ep 2.9 ; Ph 1.26+ ; 1Th 2.19 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Psaumes de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Salomon
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.1 : « Seigneur, tu es notre roi à jamais et toujours. C''est donc en toi, notre Dieu, que se glorifiera notre âme. »'
      marker-yv: yv-n
    - type: text
      text: 'Toi qui te donnes le nom de Juif, qui te reposes sur la loi, qui mets ta fierté en Dieu, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
