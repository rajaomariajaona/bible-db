verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le juste jugement de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 14.4 ; Mt 7.1+s.
      marker-yv: yv-n
    - type: text
      text: 'Tu es donc inexcusable, toi qui juges, qui que tu sois ; en jugeant l''autre, en effet, tu te condamnes toi-même, puisque, toi qui juges, tu pratiques les mêmes choses. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 7+ ; voir aussi '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Gloire, honneur et paix pour quiconque œuvre au bien, pour le Juif d''abord, mais aussi pour le Grec ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
