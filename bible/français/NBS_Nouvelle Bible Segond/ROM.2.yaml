      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 3.19. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sans loi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Co 9.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'iront… à leur perte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: périront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 9.22 ; 14.15.'
      marker-yv: yv-n
    - type: text
      text: 'Tous ceux qui ont péché sans loi iront aussi à leur perte sans loi, et tous ceux qui ont péché sous la loi seront jugés au moyen de la loi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui entendent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui écoutent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ceux qui mettent la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' en pratique'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les faiseurs de (la) loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; 10.5 ; Mt 7.21+ ; Jc 1.22-25 ; 4.11 ; 1Jn 3.7.'
      marker-yv: yv-n
    - type: text
      text: 'En effet, ce ne sont pas ceux qui entendent la loi qui sont justes devant Dieu ; ce sont ceux qui mettent la loi en pratique qui seront justifiés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 10.35. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui n'ont pas la loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui n'ont pas de loi.
      marker-yv: yv-n
    - type: text
      text: 'Quand des non-Juifs, qui n''ont pas la loi, font naturellement ce que prescrit la loi, ceux-là, qui n''ont pas la loi, sont une loi pour eux-mêmes ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1.32 ; Es 51.7 ; Jr 31.33 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Baruch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '57.2 : « En ce temps-là (celui d''Abraham et de ses fils), la Loi non écrite existait chez eux et les œuvres des commandements étaient accomplies. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'conscience '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'témoignage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.1 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Sagesse
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.11 : « La méchanceté témoigne de sa lâcheté quand elle est condamnée par son propre témoin ; toujours elle ajoute aux difficultés lorsque la conscience l''oppresse. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ainsi que leurs raisonnements…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ainsi que les raisonnements par lesquels ils s'accusent ou se défendent les uns les autres ; et leurs raisonnements les accuseront ou les défendront (au jour où Dieu jugera…)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; v. 16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ils montrent que l''œuvre de la loi est écrite dans leur cœur ; leur conscience aussi en rend témoignage, ainsi que leurs raisonnements qui les accusent ou les défendent tour à tour '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lc 8.17+ ; 1Co 4.5 ; 1Th 5.2ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'juge '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jugera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains mss portent le futur, qui, pour ce verbe, ne diffère du présent que par l''accentuation (or les accents ne sont pas écrits dans la plupart des plus anciens mss) ; du reste le présent grec peut lui-même être traduit en français par un futur ; cf. Jn 5.27 ; Ac 10.42+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ma bonne nouvelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon Evangile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 1.1,15s ; 16.25 ; 2Tm 2.8.'
      marker-yv: yv-n
    - type: text
      text: – au jour où Dieu, selon ma bonne nouvelle, juge les secrets des humains par Jésus-Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Désobéissance d'Israël
    marker-yv: yv-h
  '17':
  - type: usfm
