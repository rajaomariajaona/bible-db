    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: partialité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir Ac 10.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Lv 19.15 ; Dt 1.17 ; 10.17 ; 2Ch 19.7 ; Ga 2.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chez Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'devant Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 13).
      marker-yv: yv-n
    - type: text
      text: Car il n'y a pas de partialité chez Dieu.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
