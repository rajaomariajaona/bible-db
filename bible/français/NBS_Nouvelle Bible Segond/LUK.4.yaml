document_id: LUK.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus mis à l'épreuve par le diable
  - type: heading
    content: Mt 4.1-11  ; Mc 1.12-13
  - type: text
    content: ' '
  - type: note
    content: 'rempli d''Esprit saint v. 14,18 ; 3.22 ; cf. 1.15+. –  revint (ou s''éloigna ) du Jourdain 3.3. –  par l''Esprit ou sous l''action de l''Esprit , litt. dans l''Esprit  ; cf. 1.17 ; 2.27. –  au désert  : cf. Lv 16.10 ; Es 13.21 ; 34.14 ; Os 2.16 ; Ap 17.3.'
  - type: text
    content: 'Jésus, rempli d''Esprit saint, revint du Jourdain et fut conduit par l''Esprit au désert, '
  '10':
  - type: note
    content: Ps 91.11s. Cf. Lc 11.16,29s ; 23.35ss ; voir aussi Dn 3.16ss et anges.
  - type: text
    content: 'car il est écrit :'
  - type: text
    content: Il donnera à ses anges des ordres à ton sujet,
  - type: text
    content: afin qu'ils te gardent ;
  '11':
  - type: text
    content: 'et :'
  - type: text
    content: Ils te porteront sur leurs mains,
  - type: text
    content: de peur que ton pied ne heurte une pierre
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: Dt 6.16 . –  provoqueras v. 2n  ; cf. Es 7.12 ; 1Co 10.9 ; Hé 4.15.
  - type: text
    content: 'Jésus lui répondit : Il est dit : '
  - type: text
    content: Tu ne provoqueras pas le Seigneur, ton Dieu
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'de le mettre à l''épreuve  : litt. toute épreuve ou toute tentation , cf. v. 2+ ; 22.28,40,46. –  pour un temps  : litt. jusqu''à un temps , même expression Ac 13.11 ; d''autres comprennent jusqu''au temps fixé , cf. Mc 1.15n  ; voir aussi Lc 22.3,28,39ss,53 ; Jn 6.70s ; 13.2 ; 14.30.'
  - type: text
    content: Après avoir achevé de le mettre à l'épreuve, le diable s'éloigna de lui pour un temps.
  - type: heading
    content: Jésus commence son œuvre en Galilée
  - type: heading
    content: Mt 4.12-17  ; Mc 1.14-15  ; cf. Jn 4.1-3,43-46
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'retourna  : même verbe traduit par revint v. 1. –  Galilée 5.17 ; 8.26 ; 23.5,49,55 ; Ac 10.37 ; 13.31. –  avec (ou dans ) la puissance… 1.35 ; 5.17 ; 6.19 ; 8.46/ / ; 9.1 ; 21.26s ; 24.49 ; Ac 8.10. –  Esprit v. 1+,18. –  le bruit…  : cf. v. 23,37 ; 5.15 ; 7.17 ; Mt 9.26+ ; Ac 26.26.'
  - type: text
    content: 'Jésus retourna en Galilée, avec la puissance de l''Esprit ; le bruit s''en répandit dans toute la région. '
  '15':
  - type: note
    content: enseignait ou instruisait v. 31 ; 5.3,17 ; 6.6 ; 11.1 ; 13.10,22,26 ; 19.47 ; 20.1,21 ; 21.37 ; 23.5 ; Mc 1.21 ; Ac 1.1. –  synagogues v. 16,44 ; 6.6 ; 13.10 ; Mt 4.23+ ; Mc 1.23 ; Ac 9.20 ; 13.5,14 ; 14.1 ; 17.1s,10. –  glorifié par tous 5.26 ; 7.16 ; 18.43 ; 19.37.
  - type: text
    content: Il enseignait dans leurs synagogues, et il était glorifié par tous.
  - type: heading
    content: A Nazareth, Jésus est rejeté
  - type: heading
    content: Mt 13.53-58  ; Mc 6.1-6
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Nazareth 1.26n  ; les meilleurs mss écrivent ici Nazara , comme en Mt 4.13n. –  élevé v. 24 ; 2.51s ; cf. Ac 22.3. –  synagogue (v. 15+) / sabbat v. 31 ; 13.10 ; Mc 3.1 ; 6.2 ; Ac 13.14 ; 15.21 ; 18.4. –  selon sa coutume Mc 10.1 ; Ac 17.2 ; cf. 2.46 ; 3.1 ; 4.1 ; 5.12,42 ; 21.26. –  faire la lecture  : selon le Talmud (voir « Le culte du sabbat à la synagogue ») la coutume était de lire les Prophètes (v. 17) après la Loi ; cette lecture était habituellement suivie d''un sermon explicatif ; cf. Ac 13.15,27 ; 17.2s.'
  - type: text
    content: 'Il vint à Nazareth, où il avait été élevé, et il se rendit à la synagogue, selon sa coutume, le jour du sabbat. Il se leva pour faire la lecture, '
  '17':
  - type: note
    content: écrit 7.27 ; 10.26 ; 18.31 ; 20.17 ; 21.22 ; 22.37 ; 24.44,46 ; Ac 13.29.
  - type: text
    content: 'et on lui remit le livre du prophète Esaïe. Il déroula le livre et trouva le passage où il était écrit :'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Es 61.1s  ; voir aussi Esprit . –  il m''a conféré l''onction ou il m''a oint  ; c''est le verbe dont provient le mot Christ (2.11n) ; on pourrait aussi traduire il m''a fait Christ (cf. Ac 4.26ns ; 10.38) ; voir aussi 1R 19.16 ; autre traduction possible  : il m''a conféré l''onction. Il m''a envoyé annoncer… proclamer… –  annoncer la bonne nouvelle 1.19n aux pauvres 7.22 ; cf. 6.20 ; 14.13,21 ; 16.20,22 ; 18.22 ; 19.8 ; 21.3 ; voir aussi Rm 1.16 ; 2.10 ; certains mss ajoutent pour guérir ceux qui ont le cœur brisé (cf. Es 61.1). –  délivrance  : le même mot revient dans l''expression traduite plus loin par libres  ; il a aussi le sens de pardon 1.77 ; 3.3 ; 24.47 ; Ac 2.38 ; cf. Lv 25.10ss ; Dt 15.2 (ces deux derniers passages sont associés à Es 61.1 dans un texte de Qumrân). –  aveugles 7.22. –  renvoyer libres… Es 58.6.'
  - type: text
    content: L'Esprit du Seigneur est sur moi,
  - type: text
    content: parce qu'il m'a conféré l'onction
  - type: text
    content: pour annoncer la bonne nouvelle aux pauvres ;
  - type: text
    content: il m'a envoyé
  - type: text
    content: pour proclamer aux captifs la délivrance,
  - type: text
    content: et aux aveugles le retour à la vue,
  - type: text
    content: pour renvoyer libres les opprimés,
  '19':
  - type: text
    content: ' '
  - type: note
    content: une année d'accueil de la part du Seigneur (litt. accueillie du Seigneur ) ; autre traduction une année de faveur du Seigneur  ; cf. v. 24 ; voir aussi Lv 25.10ss ; 2Co 6.2.
  - type: text
    content: pour proclamer une année d'accueil de la part du Seigneur
  - type: text
    content: .
  '2':
  - type: note
    content: 'mis à l''épreuve ou tenté  ; un verbe apparenté est traduit par provoquer au v. 12 (aussi 10.25n) ; cf. v. 13 ; 8.13 ; 11.4,16 ; 22.28,40,46 ; Mt 4.1n  ; Hé 2.18 ; 4.15 ; Jc 1.13. –  diable  : voir démon. –  quarante jours  : cf. Mt 4.2+ ; Mc 1.13 ; voir aussi Ex 16.35 ; Dt 8.2,4 ; Ac 1.3.'
  - type: text
    content: 'où il fut mis à l''épreuve par le diable pendant quarante jours. Il ne mangea rien durant ces jours-là et, quand ils furent achevés, il eut faim. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'servant 1.2n  : le même mot est traduit par auxiliaire en Ac 13.5. –  s''assit  : c''était peut-être la position habituelle pour donner la parole d''encouragement ou « sermon » qui faisait suite à la lecture (cf. Ac 13.15, où un tel sermon est pourtant donné debout) ; cf. Lc 5.3. –  yeux… fixés 22.56 ; Ac 1.10+ ; 6.15.'
  - type: text
    content: 'Puis il roula le livre, le rendit au servant et s''assit. Les yeux de tous, dans la synagogue, étaient fixés sur lui. '
  '21':
  - type: note
    content: 'Aujourd''hui 2.11+. –  cette Ecriture…  : litt. cette Ecriture (cf. Mc 12.10 ; Ac 8.35) s''est accomplie à vos oreilles  ; expressions comparables Dt 5.1 ; 2S 3.19 ; cf. Mt 5.17 ; Mc 1.15 ; Lc 2.25 ; 7.22.'
  - type: text
    content: 'Alors il se mit à leur dire : Aujourd''hui cette Ecriture, que vous venez d''entendre, est accomplie.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'lui rendaient témoignage  : autre traduction possible reconnaissaient cela  ; certains ont compris témoignaient contre lui  ; cf. Ac 6.3 ; 10.22 ; 16.2 ; 22.5,12. –  étonnés ou émerveillés  ; cf. 2.33+ ; Ac 2.7. –  paroles de grâce  : cf. 2.40,52 ; Ac 14.3 ; 20.24,32 ; voir aussi Ec 10.12 ; Ep 4.29 ; Col 4.6. –  fils de Joseph 2.33,48 ; 3.23 ; Jn 6.42.'
  - type: text
    content: 'Tous lui rendaient témoignage, étonnés des paroles de grâce qui sortaient de sa bouche ; ils disaient : N''est-ce pas le fils de Joseph ? '
  '23':
  - type: note
    content: 'proverbe  : le même mot grec est traduit ailleurs par parabole  ; cf. 5.36+ ; 6.39 ; des proverbes analogues à Médecin, guéris-toi toi-même se retrouvent dans la littérature grecque comme dans la littérature juive ; cf. 5.31 ; 23.35ss/ /. –  Capharnaüm v. 31ss ; 7.1 ; 10.15 ; cf. 4.15 ; voir Mt 4.13n  ; 11.23. –  ton pays ou ta région d''origine, de même v. 24 (autre terme au v. 25) ; cf. v. 16.'
  - type: text
    content: 'Il leur dit : Certainement, vous me citerez ce proverbe : Médecin, guéris-toi toi-même ; tout ce qui s''est produit à Capharnaüm, selon ce que nous avons appris, fais-le aussi ici, dans ton pays ! '
  '24':
  - type: note
    content: 'Amen ou en vérité, transcription de l''hébreu ou de l''araméen 12.37 ; 18.17,29 ; 21.32 ; 23.43 ; voir Mt 5.18n. –  prophète 11.49s ; 13.33. –  accueilli v. 19n  ; Jn 4.44 ; cf. Evangile selon Thomas 31 : « Jésus a dit : “Un prophète n''est pas accepté dans son propre village ; un médecin ne soigne pas ceux qui le connaissent.” »'
  - type: text
    content: 'Il leur dit encore : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, aucun prophète n''est bien accueilli dans son pays. '
  '25':
  - type: note
    content: 'En vérité…  : ici, contrairement au v. 24n, le texte emploie une formule grecque (voir aussi 9.27n) ; de même 20.21 ; 22.59 ; Mc 12.14,32 ; Ac 4.27 ; 10.34. –  Elie 1.17+. –  le ciel fut fermé… (pour qu''il ne pleuve pas) 1R 17.1 ; Ap 11.6 ; Siracide 48.3 : « Par la parole du Seigneur il (Elie) ferma le ciel. » –  trois ans et six mois  : cf. Jc 5.17 ; comparer avec 1R 18.1 ; voir aussi Dn 7.25 ; 12.7 ; Ap 11.2,6 ; 12.6,14.'
  - type: text
    content: 'En vérité, je vous le dis, il y avait beaucoup de veuves en Israël aux jours d''Elie, lorsque le ciel fut fermé trois ans et six mois et qu''il y eut une grande famine sur tout le pays ; '
  '26':
  - type: note
    content: 'mais vers…  : litt. sinon (de même v. 27) à Sarepta de Sidon (c.-à-d. hors du pays d''Israël) vers une femme veuve, 1R 17.9s.'
  - type: text
    content: 'et cependant Elie ne fut envoyé vers aucune d''elles, mais vers une veuve de Sarepta, dans le pays de Sidon. '
  '27':
  - type: note
    content: lépreux en Israël 2R 7.3ss ; 2Ch 26.19ss. –  Naaman 2R 5.1ss,9-14.
  - type: text
    content: 'Il y avait aussi beaucoup de lépreux en Israël au temps du prophète Elisée ; et cependant aucun d''eux ne fut purifié, mais Naaman le Syrien. '
  '28':
  - type: note
    content: Comparer avec Mc 6.5.
  - type: text
    content: 'Lorsqu''ils entendirent cela, tous, dans la synagogue, furent remplis de fureur. '
  '29':
  - type: note
    content: 'hors de la ville  : cf. 23.26 ; Ac 7.58 ; Hé 13.12s. –  un escarpement…  : l''endroit n''a pas pu être identifié.'
  - type: text
    content: 'Ils se levèrent, le chassèrent hors de la ville et le menèrent jusqu''à un escarpement de la montagne sur laquelle leur ville était construite, afin de le précipiter en bas. '
  '3':
  - type: note
    content: Fils de Dieu 1.32,35 ; 3.22 ; cf. 23.35ss.
  - type: text
    content: 'Alors le diable lui dit : Si tu es Fils de Dieu, dis à cette pierre de devenir du pain. '
  '30':
  - type: note
    content: Cf. v. 13 ; 13.33 ; Jn 7.30 ; 8.59n  ; 10.39 ; 18.6.
  - type: text
    content: Mais lui passa au milieu d'eux et s'en alla.
  - type: heading
    content: L'esprit de démon impur
  - type: heading
    content: Mc 1.21-28
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'descendit  : Capharnaüm (v. 23) est au bord du lac de Galilée, environ 600 m plus bas que Nazareth ; cf. Mt 4.13n  ; 9.1. –  il enseignait v. 15. –  le jour du sabbat ou un jour de sabbat  ; autre traduction possible les jours de sabbat (cf. 13.10 ; Ac 17.2).'
  - type: text
    content: 'Il descendit à Capharnaüm, ville de la Galilée ; il enseignait le jour du sabbat. '
  '32':
  - type: note
    content: 'Cf. Mt 7.28s. –  ébahis 2.48 ; 9.43. –  de l''autorité ou du pouvoir  : cf. v. 14,36 ; 5.24 ; 7.8 ; Mc 1.22n.'
  - type: text
    content: Ils étaient ébahis de son enseignement, car sa parole avait de l'autorité.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'synagogue v. 15+ ; cf. 7.5. –  un esprit de démon impur (voir pur, impur) ou un esprit, un démon impur  ; cf. v. 36. –  qui cria  : litt. qui cria d''une grande voix.'
  - type: text
    content: 'Il se trouvait dans la synagogue un homme qui avait un esprit de démon impur, et qui cria : '
  '34':
  - type: note
    content: 'Voir Mc 1.24n. –  Pourquoi… 8.28. –  pour notre perte  : cf. 8.31 ; 10.19. –  le Saint de Dieu  : cf. v. 41 ; 1.35.'
  - type: text
    content: 'Hé ! Pourquoi te mêles-tu de nos affaires, Jésus le Nazaréen ? Es-tu venu pour notre perte ? Je sais bien qui tu es : le Saint de Dieu ! '
  '35':
  - type: note
    content: 'le rabroua  : même verbe (aussi traduit par reprendre) en 4.39,41 ; 8.24 ; 9.21,42,55 ; 17.3 ; 18.15,39 ; 19.39 ; 23.40 ; voir Mt 8.26n  ; Mc 1.25n. –  sors v. 41 ; 5.8n  ; 8.29,33,38 (cf. v. 46) ; 11.24 ; Ac 16.18.'
  - type: text
    content: 'Jésus le rabroua, en disant : Tais-toi et sors de cet homme. Le démon jeta l''homme à terre au milieu de l''assemblée et sortit de lui sans lui faire aucun mal. '
  '36':
  - type: note
    content: 'saisis d''effroi 5.9 ; Mc 1.27n  ; voir aussi crainte. –  Quelle est cette parole ? autre traduction Qu''est-ce que c''est ? Le mot traduit ici par parole a le sens d’affaire en Ac 8.21 ; 15.6. –  autorité (ou pouvoir) et puissance v. 14+,32+ ; 9.1. –  esprits impurs  : cf. v. 33 ; 6.18 ; 8.29 ; 9.42 ; 11.24.'
  - type: text
    content: 'Tous furent saisis d''effroi ; ils se disaient les uns aux autres : Quelle est cette parole ? Il commande avec autorité et puissance aux esprits impurs, et ils sortent ! '
  '37':
  - type: note
    content: 'Cf. v. 14+. –  la rumeur  : le même terme (qui a donné notre mot écho) est traduit par bruit en 21.25 ; Ac 2.2 ; son Hé 12.19.'
  - type: text
    content: Et la rumeur à son sujet se répandait en tout lieu dans la région.
  - type: heading
    content: Guérisons de malades
  - type: heading
    content: Mt 8.14-17  ; Mc 1.29-34
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ac 10.38. –  chez (litt. dans la maison de ) Simon  : cf. 5.3ss ; 6.14 ; 22.31 ; 24.34 (autres personnages du même nom 6.15 ; 7.40 ; 23.26 ; Ac 8.9 ; 9.43) ; Ac 10.5,18,32 ; 11.13. –  belle-mère  : Simon (Pierre) était marié, cf. 1Co 9.5.'
  - type: text
    content: 'Il partit de la synagogue et se rendit chez Simon. La belle-mère de Simon était en proie à une forte fièvre, et ils le sollicitèrent en sa faveur. '
  '39':
  - type: note
    content: 'se pencha sur elle  : cf. 1R 17.21 ; Ac 20.10. –  rabroua  : cf. v. 35+,41. –  A l''instant même… 1.64 ; 13.13 ; Ac 3.7. –  se leva  : le même verbe signifie ailleurs ressusciter, cf. 2.34n. –  les servir 8.3+ ; sur le verbe correspondant, voir Mt 4.11n.'
  - type: text
    content: Il se pencha sur elle, rabroua la fièvre, et la fièvre la quitta. A l'instant même elle se leva et se mit à les servir.
  '4':
  - type: note
    content: Il est écrit v. 8,10 ; cf. 3.4. –  L'être humain… Dt 8.3. Certains mss ajoutent mais de toute parole de Dieu.
  - type: text
    content: 'Jésus lui répondit : Il est écrit : '
  - type: text
    content: L'être humain ne vivra pas de pain seulement
  - type: text
    content: .
  '40':
  - type: text
    content: ' '
  - type: note
    content: Ac 28.9. –  imposant les mains 13.13 ; Mt 9.18+ ; Ac 6.6+.
  - type: text
    content: 'Après le coucher du soleil, tous ceux qui avaient des malades atteints de divers maux les lui amenèrent. Il les guérissait en imposant les mains à chacun d''eux. '
  '41':
  - type: note
    content: 'démons associés à la maladie : cf. v. 39 ; 11.14 ; 13.11 ; Ac 10.38 ; 19.12. –  tu es le Fils de Dieu v. 3,9 ; 3.22 ; Mc 3.11+ ; cf. Ac 16.17 ; Jc 2.19. –  rabrouait v. 35+,39. –  pas… parler Mt 8.4+ ; Mc 1.25+. –  ils savaient Ac 19.15. –  Christ 2.11n  ; cf. 1.32,35 ; 22.67,70.'
  - type: text
    content: 'Des démons aussi sortaient de beaucoup de personnes, en criant : Toi, tu es le Fils de Dieu. Il les rabrouait et ne leur permettait pas de parler, parce qu''ils savaient qu''il était le Christ.'
  - type: heading
    content: Jésus annonce la bonne nouvelle en Galilée
  - type: heading
    content: Mt 4.23  ; Mc 1.35-39
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Lorsque le jour parut  : cf. v. 40. –  à sa recherche…  : cf. Ac 21.8ss.'
  - type: text
    content: 'Lorsque le jour parut, il sortit et alla dans un lieu désert. Les foules se mirent à sa recherche et vinrent jusqu''à lui ; elles voulaient le retenir, afin qu''il ne les quitte pas. '
  '43':
  - type: note
    content: 'Il faut…  : cf. v. 18 ; 2.49n. –  aux autres villes  : cf. v. 29,31 ; 7.11. –  la bonne nouvelle du règne (ou royaume) de Dieu 8.1 ; Mt 4.23 ; 9.35 ; 24.14 ; Mc 1.14s ; sur le règne ou royaume de Dieu chez Lc, voir 6.20 ; 7.28 ; 8.10 ; 9.2,11,27,60,62 ; 10.9,11 ; 11.2,20 ; 12.31s ; 13.18ss,28s ; 14.15 ; 16.16 ; 17.20s ; 18.16s,24s,29 ; 19.11 ; 21.31 ; 22.16,18,29s ; 23.42,51 ; Ac 1.3 ; voir aussi Es 52.7 ; Ps 93.1s ; 95.3 ; 96.10 ; 97.1 ; 98.6 ; 99.1ss.'
  - type: text
    content: 'Mais il leur dit : Il faut aussi que j''annonce aux autres villes la bonne nouvelle du règne de Dieu ; car c''est pour cela que j''ai été envoyé.'
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'il proclamait (ou il continuait à proclamer ) le message  : litt. il proclamait 3.3+ ; cf. Mc 1.38n. –  la Judée  : certains mss portent la Galilée ; Judée est sans doute à entendre ici dans son sens large, cf. 1.5n  ; comparer avec 5.17.'
  - type: text
    content: Et il proclamait le message dans les synagogues de la Judée.
  '5':
  - type: text
    content: ' '
  - type: note
    content: terre habitée 2.1+.
  - type: text
    content: 'Le diable le conduisit plus haut, lui montra en un instant tous les royaumes de la terre habitée '
  '6':
  - type: note
    content: 'toute l''autorité…  : litt. cette autorité (ou ce pouvoir) et leur gloire  ; cf. v. 32+ ; 12.11 ; 20.20 ; 22.53 ; 23.7. –  elle m''a été livrée (autres traductions confiée ; remise) : il s''agit de l’autorité ou (moins probablement) de la gloire  ; cf. 10.22 ; 22.29 ; voir aussi Jb 1.12 ; Dn 7.14 ; Mt 28.18 ; Jn 12.31 ; 14.30 ; 2Co 4.4 ; 1Jn 5.19 ; Ap 13.2.'
  - type: text
    content: 'et lui dit : Je te donnerai toute l''autorité et la gloire de ces royaumes ; car elle m''a été livrée, et je la donne à qui je veux. '
  '7':
  - type: note
    content: tu te prosternes devant moi ou tu m'adores  ; cf. 24.52 ; Ac 7.43 ; 10.25s ; voir Mt 2.2n  ; voir aussi culte.
  - type: text
    content: 'Si donc tu te prosternes devant moi, elle sera toute à toi. '
  '8':
  - type: note
    content: Dt 6.13 ; 10.20.
  - type: text
    content: 'Jésus lui répondit : Il est écrit : '
  - type: text
    content: C'est devant le Seigneur, ton Dieu, que tu te prosterneras, et c'est à lui seul que tu rendras un culte
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'à Jérusalem  : cf. Ez 8.3. –  sur le haut du temple  : voir Mt 4.5n.'
  - type: text
    content: 'Le diable le conduisit encore à Jérusalem, le plaça sur le haut du temple et lui dit : Si tu es Fils de Dieu, jette-toi d''ici en bas ; '
