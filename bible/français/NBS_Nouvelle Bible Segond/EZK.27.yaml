document_id: EZK.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Complainte sur la ruine de Tyr
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Loud ou la Lydie (Gn 10.13,22n), Pouth ou la Libye (Gn 10.6n) : voir aussi 30.5 ; 38.5 ; Es 66.19n  ; Jr 46.9.'
  - type: text
    content: La Perse, Loud et Pouth
  - type: text
    content: 'servaient dans ton armée :'
  - type: text
    content: c'étaient tes hommes de guerre ;
  - type: text
    content: ils suspendaient chez toi le bouclier et le casque,
  - type: text
    content: ils te donnaient de la magnificence.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Arvad v. 8n. –  et tes guerriers  : certains voient dans le terme hébreu correspondant un nom propre  : et de Hélek (la Cilicie ?). –  les hommes de Gammad  : il s''agit vraisemblablement d''une localité qui nous est inconnue. On a aussi traduit de vaillants hommes , mais ce sens n''est attesté nulle part ailleurs. –  carquois  : autre traduction boucliers  ; cf. 2S 8.7n  ; Ct 4.4.'
  - type: text
    content: Les fils d'Arvad et tes guerriers étaient tout autour de tes murailles, et les hommes de Gammad occupaient tes tours ; ils suspendaient leurs carquois tout autour de tes murailles, ils rendaient ta beauté parfaite.
  - type: heading
    content: Tyr, capitale du commerce
  '12':
  - type: text
    content: ' '
  - type: note
    content: Tarsis , probablement sur la péninsule ibérique, correspondait à l'époque à l'extrémité occidentale du monde connu (v. 25n  ; 38.13 ; Gn 10.4n  ; 1R 10.22 ; Jon 1.3). – Cf. Ap 18.13.
  - type: text
    content: 'Tarsis faisait du commerce avec toi, pour tous les biens que tu avais en abondance ; ils fournissaient tes marchés en argent, en fer, en étain et en plomb. '
  '13':
  - type: note
    content: 'La Grèce (ou Ionie  ; cf. Gn 10.2n), Toubal et Méshek (cf. 32.26 ; 38.2s ; 39.1 ; Es 66.19) au sud de la mer Noire (Gn 10.2nss). –  des esclaves  : litt. de l''être (ou de la vie  ; cf. Gn 1.20n) d''humain, singulier collectif, cf. Ap 18.13.'
  - type: text
    content: 'La Grèce, Toubal et Méshek commerçaient avec toi ; ils donnaient des esclaves et des objets de bronze en échange de tes marchandises. '
  '14':
  - type: note
    content: 'La maison de Togarma  : il s''agit vraisemblablement des Cimmériens (cf. Gomer en 38.6), peuple de cavaliers issus du Caucase et connus au VIIe s. av. J.-C. pour leurs invasions en Asie mineure ; selon certains, Togarma serait une déformation (confusion classique en hébreu du r et du d  ; cf. v. 15n,23n) du nom de leur chef, Tugdamme. –  bêtes d''attelage ou attelages  ; cf. 26.7n,10+.'
  - type: text
    content: 'La maison de Togarma fournissait tes marchés en chevaux, en bêtes d''attelage et en mulets. '
  '15':
  - type: note
    content: 'Les fils de Dedân v. 20 ; 25.13+ ; LXX a lu Rhodes, en hébreu Rodân (cf. Gn 10.4n). –  passait par tes mains  : traduction incertaine ; cf. v. 21.'
  - type: text
    content: 'Les fils de Dedân commerçaient avec toi ; le commerce d''une multitude d''îles passait par tes mains ; on te payait ton dû avec des cornes d''ivoire et de l''ébène. '
  '16':
  - type: note
    content: 'Aram ou la Syrie : plusieurs mss hébreux et des versions anciennes portent ici Edom. –  escarboucles…  : traduction incertaine ; cf. 28.13. –  byssos 1Ch 4.21n.'
  - type: text
    content: 'Aram faisait du commerce avec toi pour l''abondance de tes produits ; ils fournissaient tes marchés en escarboucles, en pourpre rouge, en broderies, en byssos, en corail et en rubis. '
  '17':
  - type: note
    content: 'Cf. Ac 12.20. –  de Minnith  : peut-être une appellation d''origine (cf. Jg 11.33) devenue synonyme d''excellence. –  pâtisserie  : traduction conjecturale ; Syr millet. –  baume  : cf. Gn 37.25n.'
  - type: text
    content: 'Juda et Israël commerçaient avec toi ; ils donnaient du froment de Minnith, de la pâtisserie, du miel, de l''huile et du baume en échange de tes marchandises. '
  '18':
  - type: note
    content: Le vin de Helbôn, au nord de Damas, en Syrie (cf. v. 16) est également connu par des inscriptions assyriennes (cf. Os 14.8). –  laine blanche ou laine de Tsahar, peut-être un nom de lieu non identifié avec certitude.
  - type: text
    content: 'Damas faisait du commerce avec toi pour l''abondance de tes produits, pour tous les biens que tu avais en abondance ; elle te fournissait du vin de Helbôn et de la laine blanche. '
  '19':
  - type: note
    content: 'Texte obscur ; Vedân pourrait aussi être lu et Dan, à moins qu''il ne s''agisse, comme pour Yavân (habituellement le nom hébreu de la Grèce, ainsi v. 13), du nom d''une tribu arabe de la région d’Ouzal, peut-être près de Médine (cf. Gn 10.27) ; d''après LXX, certains modifient le texte hébreu traditionnel pour lire et des jarres de vin d''Izalla, un cru dont il est question avec celui de Helbôn (v. 18) dans des inscriptions anciennes (cf. v. 12). –  casse  : fruit du cassier, plante médicinale.'
  - type: text
    content: 'Vedân et Yavân, depuis Ouzal, fournissaient tes marchés en fer travaillé, en casse et en roseau aromatique, en échange de tes marchandises. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Tyr 26.2n. –  complainte 26.17+.
  - type: text
    content: 'Toi, humain, entonne sur Tyr une complainte ! '
  '20':
  - type: note
    content: 'Dedân  : cf. v. 15n. –  équipements de cavalerie  : traduction approximative.'
  - type: text
    content: 'Dedân commerçait avec toi en équipements de cavalerie. '
  '21':
  - type: note
    content: 'Qédar  : tribu du nord de l''Arabie Gn 25.13n  ; Es 21.13-17 ; 60.7 ; Jr 49.28s ; cf. 2Ch 9.14. –  passait par tes mains v. 15. –  jeunes béliers et béliers adultes sont deux mots différents en hébreu.'
  - type: text
    content: 'Le commerce de l''Arabie et de tous les princes de Qédar passait par tes mains. Avec eux tu faisais commerce de jeunes béliers, de béliers adultes et de boucs. '
  '22':
  - type: note
    content: 'marchands et commerçaient traduisent deux formes du même verbe hébreu. –  Saba / Rama  : royaumes du sud de l''Arabie, cf. 38.13 ; Gn 10.7n  ; cf. 1R 10.1-10.'
  - type: text
    content: 'Les marchands de Saba et de Rama commerçaient avec toi ; ils fournissaient tes marchés de toutes les meilleures essences odoriférantes, de toutes sortes de pierres précieuses et d''or. '
  '23':
  - type: note
    content: 'Harrân en Haute-Mésopotamie ; cf. Gn 11.31n. –  Kanné et Eden (cf. 2R 19.12 ; Es 37.12 ; Am 1.5), soit dans le Moyen-Euphrate, soit, selon certains, en Arabie. –  Kilmad  : certains l''identifient à Kulmer (confusion du r et du d  ; cf. v. 14n,15), ville située sur un affluent du Tigre ; d''autres, s''appuyant sur Tg, modifient sensiblement le texte hébreu traditionnel pour lire kol-madaï, c.-à-d. tous les Mèdes.'
  - type: text
    content: 'Harrân, Kanné et Eden, les marchands de Saba, d''Assyrie, de Kilmad, commerçaient avec toi ; '
  '24':
  - type: note
    content: 'de luxe  : litt. de perfection  ; cf. 23.12 ; 38.4. –  collections  : le mot correspondant est traduit par coffres en Est 3.9 ; 4.7. –  cordes liées et serrées  : autre traduction possible liées et serrées par des cordes.'
  - type: text
    content: 'ils faisaient avec toi le commerce de luxe : manteaux de pourpre, broderies, collections d''étoffes, cordes liées et serrées pour ton commerce. '
  '25':
  - type: note
    content: 'bateaux de Tarsis (cf. v. 12n) : l''expression est peut-être simplement ici à prendre dans le sens de navires au long cours  ; cf. Es 2.16n  ; 23.7n. –  transportaient tes marchandises  : autre traduction étaient les caravanes de ton commerce. –  Tu étais au comble…  : litt. tu étais remplie et glorieuse (ou lourde, le mot hébreu a les deux sens) à l''extrême. –  au cœur des mers v. 4+.'
  - type: text
    content: Les bateaux de Tarsis transportaient tes marchandises.
  - type: heading
    content: Suite de la complainte de Tyr
  - type: text
    content: Tu étais au comble de la richesse et de la gloire,
  - type: text
    content: au cœur des mers.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'grandes eaux  : cf. 1.24 ; Es 23.3. –  un vent d''est , destructeur ; cf. 17.10 ; Ex 14.21 ; Jr 18.17 ; Os 13.15 ; Ps 48.8 ; Jb 1.19 ; 27.21.'
  - type: text
    content: 'Les rameurs t''ont fait voguer sur de grandes eaux :'
  - type: text
    content: un vent d'est t'a brisée au cœur des mers.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'qui sont chez toi…  : ou, d''après plusieurs mss hébreux et versions anciennes, parmi toute l''assemblée…'
  - type: text
    content: Tes richesses, tes marchés et tes marchandises, tes marins et tes matelots, ceux qui réparent tes avaries et ceux qui négocient tes marchandises, tous les hommes de guerre qui sont chez toi et toute l'assemblée qui est au milieu de toi tomberont au cœur des mers au jour de ta chute.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 26.18. –  les plages  : sens douteux ; autre traduction les vagues (se soulèveront)  ; un terme apparenté est traduit par (mer) agitée en Es 57.20.'
  - type: text
    content: Aux cris de détresse de tes matelots,
  - type: text
    content: les plages trembleront ;
  '29':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ap 18.17-19.
  - type: text
    content: et tous ceux qui manient la rame descendront de leurs bateaux,
  - type: text
    content: les marins, tous les matelots de la mer.
  - type: text
    content: Ils se tiendront sur la terre ;
  '3':
  - type: note
    content: 'Tu diras…  : autre traduction Tu diras à Tyr : Toi qui es assise… –  aux abords de la mer 26.3n. –  îles 26.15n. –  parfaite en beauté  : cf. 28.12.'
  - type: text
    content: 'Tu diras à Tyr, qui est assise aux abords de la mer, qui commerce avec tous les peuples, qui est tournée vers une multitude d''îles : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: 'Toi, Tyr, tu disais :'
  - type: text
    content: « Je suis parfaite en beauté ! »
  '30':
  - type: text
    content: ' '
  - type: note
    content: Signes de deuil, de tristesse ou de pénitence ; cf. Jos 7.6 ; 1S 4.12 ; Jr 6.26 ; Mi 1.10 ; Jb 2.8,12 ; 16.15 ; Né 9.1 ; Ap 18.9,15,18s.
  - type: text
    content: ils feront entendre leur voix sur toi
  - type: text
    content: et pousseront des cris amers ;
  - type: text
    content: ils jetteront de la poussière sur leurs têtes
  - type: text
    content: et se rouleront dans la cendre ;
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. ne figure pas dans LXX. – Cf. 7.18+ ; Gn 37.34 ; 2S 3.31 ; Es 22.12 ; Jr 16.6 ; Jb 1.20. –  la tête  : sous-entendu dans le texte.'
  - type: text
    content: ils se raseront la tête à cause de toi,
  - type: text
    content: ils mettront un sac pour pagne
  - type: text
    content: et ils pleureront sur toi amèrement,
  - type: text
    content: ils feront d'amères lamentations.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'ils entonneront  : certains mss hébreux et des versions anciennes ont lu leurs fils entonneront . –  complainte 26.17+ ; cf. Ap 18.11. –  Qui était comme Tyr…  : cette deuxième partie du v. est absente de LXX. –  réduite au silence  : autres traductions perdue ; détruite  ; une version ancienne a lu orgueilleuse.'
  - type: text
    content: Dans leur douleur ils entonneront une complainte sur toi,
  - type: text
    content: 'ils te plaindront :'
  - type: text
    content: « Qui était comme Tyr,
  - type: text
    content: comme cette ville réduite au silence au milieu de la mer ? »
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'les produits de tes marchés  : litt. tes marchés . –  sortaient des mers ou arrivaient par les mers . –  les rois de la terre  : cf. Ap 18.3.'
  - type: text
    content: Quand les produits de tes marchés sortaient des mers, tu rassasiais une multitude de peuples ; par l'abondance de tes biens et de tes marchandises, tu enrichissais les rois de la terre.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'quand  : tournure insolite ; LXX maintenant . –  tu as été brisée par les mers  : autre traduction tu as été brisée et tu as disparu des mers.'
  - type: text
    content: Et quand tu as été brisée par les mers,
  - type: text
    content: c'est dans les profondeurs des eaux
  - type: text
    content: que sont tombées tes marchandises
  - type: text
    content: et toute l'assemblée qui était au milieu de toi.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 26.18 ; 32.10.
  - type: text
    content: Tous les habitants des îles
  - type: text
    content: sont atterrés à cause de toi ;
  - type: text
    content: leurs rois sont saisis d'effroi,
  - type: text
    content: leur visage est bouleversé.
  '36':
  - type: text
    content: ' '
  - type: note
    content: sifflent d'horreur 1R 9.8 ; Jr 18.16n  ; So 2.15 ; Lm 2.16. –  un objet d'épouvante… 26.21+.
  - type: text
    content: Ceux qui font du commerce parmi les peuples sifflent d'horreur à ton sujet ;
  - type: text
    content: tu es un objet d'épouvante,
  - type: text
    content: tu n'es plus, tu ne seras jamais plus !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'au cœur des mers v. 25 ; 28.2. –  ceux qui t''ont bâtie  : dans ce chapitre Tyr est comparée à un navire magnifique qui va sombrer.'
  - type: text
    content: Ton territoire est au cœur des mers ;
  - type: text
    content: ceux qui t'ont bâtie ont rendu ta beauté parfaite.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Senir  : sans doute le mont Hermon (Dt 3.9), ou, plus généralement, la chaîne de l''Anti-Liban. –  cèdre du Liban 17.3+.'
  - type: text
    content: Avec des cyprès de Senir ils ont fait
  - type: text
    content: tous tes bordages ;
  - type: text
    content: ils ont pris un cèdre du Liban
  - type: text
    content: pour t'élever un mât ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'chênes du (litt. de ) Bashân (cf. 39.18n) : Es 2.13+ ; Za 11.1s. –  tes bancs  : traduction incertaine ; autres possibilités ton pont, ton habitacle, ta barre  ; le mot est aussi traduit par planche(s) en Ex 26.15ss. –  en provenance d''Assyrie  : litt. fille des Assyriens (le mot hébreu pour ivoire est féminin) ; on pourrait regrouper et vocaliser différement les lettres du texte hébreu, de façon à lire (incrusté) dans du buis (comme en Es 41.19 ; ou une variété de cèdre, voir Ez 31.3n) des îles de Chypre (cf. Gn 10.4n  ; Es 23.1).'
  - type: text
    content: ils ont fabriqué tes rames avec des chênes du Bashân
  - type: text
    content: et tes bancs avec de l'ivoire
  - type: text
    content: en provenance d'Assyrie
  - type: text
    content: et apporté des îles de Chypre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'fin lin d''Egypte  : cf. Pr 7.16. –  pavillon  : mot habituellement rendu par bannière  ; cf. Es 5.26+. –  pourpre / rouge  : cf. 23.6+ ; Ex 25.4n. –  Elisha  : peut-être Chypre, Carthage ou les îles Ioniennes (cf. Gn 10.4n). –  tentures  : traduction incertaine ; cf. Pr 31.22.'
  - type: text
    content: Tes voiles étaient de fin lin d'Egypte avec des broderies
  - type: text
    content: et te servaient de pavillon ;
  - type: text
    content: la pourpre violette et rouge des îles d'Elisha
  - type: text
    content: faisaient tes tentures.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Sidon (28.21-24) / Arvad  : autres ports phéniciens situés au nord de Tyr (Gn 10.15,18). –  sages  : autre traduction habiles , même terme au v. 9 ; cf. Es 23.8 ; voir aussi Ex 28.3n.'
  - type: text
    content: Les habitants de Sidon et d'Arvad
  - type: text
    content: étaient tes rameurs,
  - type: text
    content: et les plus sages de chez toi, ô Tyr,
  - type: text
    content: étaient tes matelots.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Guébal , c.-à-d. Byblos, port célèbre entre Sidon et Arvad (cf. Jos 13.5 ; 1R 5.32). –  avaries  : cf. v. 27 ; le même terme hébreu est aussi traduit par fissures en 2R 12.6ss ; 22.5.'
  - type: text
    content: Les anciens de Guébal et ses sages étaient chez toi
  - type: text
    content: pour réparer tes avaries ;
  - type: text
    content: tous les bateaux de la mer et leurs marins étaient chez toi
  - type: text
    content: pour négocier tes marchandises.
