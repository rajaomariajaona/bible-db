      - type: text
        text: '16.7ss : « Quiconque se retournait était sauvé, non par l''objet regardé, mais par toi, le Sauveur de tous. Et ainsi tu as prouvé à nos ennemis que c''est toi qui délivres de tout mal… La dent même des serpents venimeux ne put les réduire, car ta miséricorde vint à leur rencontre et les guérit. Pour qu''ils se rappellent tes paroles, ils recevaient des coups d''aiguillon, mais ils étaient vite délivrés, de peur que, tombés dans un oubli profond, ils ne soient soustraits à ton action bienfaisante. Et ni herbe ni pommade ne vint les soulager, mais ta Parole, Seigneur, elle qui guérit tout. »'
    marker-yv: yv-n
  - type: text
    text: Moïse fit un serpent de bronze et le plaça sur la perche ; si quelqu'un était mordu par un serpent et regardait le serpent de bronze, il restait en vie.
