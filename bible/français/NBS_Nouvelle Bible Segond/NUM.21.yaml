document_id: NUM.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire des Israélites sur les Cananéens
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 4 ; 14.39-45 ; 20.21 ; Jg 1.16s. –  le roi d''Arad 33.40 ; cf. Jos 12.14. –  Arad  : à une trentaine de kilomètres à l''est de Bersabée ; Syr de Gadar . –  Néguev 13.17. –  le chemin des Atarim  : site inconnu ; plusieurs versions anciennes ont lu le chemin des explorateurs (cf. 13.17ss).'
  - type: text
    content: 'Le Cananéen, le roi d''Arad, qui habitait le Néguev, apprit qu''Israël venait par le chemin des Atarim. Il combattit Israël et fit des captifs. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'partirent  : cf. v. 4 ; 33.41ss. –  Oboth  : probablement dans la Araba (la plaine aride entre la mer Morte et le golfe d''Aqaba).'
  - type: text
    content: 'Les Israélites partirent et campèrent à Oboth. '
  '11':
  - type: note
    content: Dt 2.8 – Iyé-Abarim (33.44), peut-être à l'est de la mer Morte, dans les monts d'Abarim (de l'Autre côté), cf. v. 20n  ; 27.12 ; 33.45nss ; Dt 32.49. –  du côté du soleil levant Jg 11.18 (à l'est [de Moab]).
  - type: text
    content: 'Ils partirent d''Oboth et campèrent à Iyé-Abarim, dans le désert qui est en face de Moab, du côté du soleil levant. '
  '12':
  - type: note
    content: Cf. Dt 2.13,24 ; à la fin du v. Smr ajoute le texte de Dt 2.17-19. –  l'oued Zéred, qui débouche à l'extrémité sud de la mer Morte, marque la frontière entre Moab et Edom ; voir aussi Gn 26.17n.
  - type: text
    content: 'De là ils partirent et campèrent à l''oued Zéred. '
  '13':
  - type: note
    content: 'l''Arnon se jette dans la mer Morte, vers le milieu de sa côte orientale ; cf. Dt 2.24+. –  dans le désert  : cf. Dt 2.26. –  territoire et frontière traduisent le même terme hébreu. –  Amorites 13.29+. –  l''Arnon est la frontière de Moab 22.36 ; Jg 11.18.'
  - type: text
    content: 'De là ils partirent et campèrent de l''autre côté de l''Arnon, qui coule dans le désert en sortant du territoire des Amorites ; car l''Arnon est la frontière de Moab, entre Moab et les Amorites. '
  '14':
  - type: note
    content: 'Les v. 14s sont obscurs (cf. v. 17s,27ss) ; dans le texte hébreu traditionnel, ils semblent constituer une description géographique (cf. Jos 15–19), dont l''intérêt principal est de désigner l''Arnon comme la frontière nord de Moab (v. 13) ; les versions anciennes les ont diversement interprétés, plutôt dans le sens d''un récit de victoires du fait qu''ils sont extraits d''un livre des Guerres du Seigneur inconnu par ailleurs ; cf. Jos 10.13 ; 2S 1.18 (le livre du Juste) ; voir aussi 1S 18.17 ; 25.28. –  Vaheb  : LXX et Syr ont lu la flamme ou il enflamma. –  Soupha  : Smr a lu la mer des Joncs (hébreu yam souph v. 4n) ; cf. Dt 1.1. –  les oueds  : cf. Gn 26.17n.'
  - type: text
    content: 'C''est pourquoi il est dit dans le livre des Guerres du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Vaheb en Soupha, et les oueds,
  - type: text
    content: 'l''Arnon '
  '15':
  - type: note
    content: 'Smr qui leur fit posséder et habiter la ville (cf. v. 14n) : au lieu de Ar Smr lit ‘ir, la forme la plus courante du mot hébreu qui signifie ville  ; cf. les variations entre la ville et Ar, Ar-Moab, pour désigner la même localité située à la frontière de Moab, dans les gorges de l''Arnon v. 28 ; 22.36 ; Dt 2.9,18,29 ; Es 15.1.'
  - type: text
    content: et le cours des oueds,
  - type: text
    content: qui s'étend du côté d'Ar
  - type: text
    content: et s'appuie sur la frontière de Moab.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'ils allèrent  : sous-entendu dans le texte. –  Béer signifie puits (v. 17) ; cf. 20.8ss ; voir aussi Es 15.8. –  où  : autre traduction au sujet duquel.'
  - type: text
    content: 'De là ils allèrent à Béer (« Puits »). C''est là le puits où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Rassemble le peuple ; je leur donnerai de l''eau. '
  '17':
  - type: note
    content: 'Texte obscur et interprétation incertaine ; cf. v. 14s,27ss. –  chanta  : litt. chanta ce chant  ; cf. Ex 15.1+. –  Monte  : autre traduction fais monter ton eau  ; certains modifient légèrement le texte hébreu traditionnel pour lire célébrez le puits  ; voir aussi Gn 2.6n  ; Jn 4.10ss. –  Entonnez un chœur en son honneur  : autre traduction répondez-lui, cf. Ex 15.21n.'
  - type: text
    content: 'Alors Israël chanta :'
  - type: text
    content: Monte, puits ! Entonnez un chœur en son honneur !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'bâton de commandement / cannes  : cf. 20.8s ; Gn 49.10 ; Ps 60.9 ; d''autres comprennent à leurs frais, avec leur appui . –  Du désert  : LXX du puits . –  Mattana signifie don  ; localisation inconnue.'
  - type: text
    content: Puits que des princes ont foré,
  - type: text
    content: que les nobles du peuple ont creusé
  - type: text
    content: avec le bâton de commandement, avec leurs cannes !
  - type: text
    content: 'Du désert ils allèrent à Mattana ; '
  '19':
  - type: note
    content: Sans doute vers le nord-est de la mer Morte. –  Nahaliel signifie oued (ou torrent) d'El ou de Dieu. –  Bamoth signifie Hauteurs ou Hauts lieux  ; cf. v. 28n  ; 22.41 ; Jos 13.17.
  - type: text
    content: 'de Mattana, à Nahaliel ; de Nahaliel, à Bamoth ; '
  '2':
  - type: note
    content: 'ses villes…  : LXX a lu lui et ses villes  ; cf. 18.14+ ; 33.55 ; Lv 27.29 ; Dt 2.34n  ; 7.1ss ; 13.15s ; Jos 6.17ss ; 8.26s.'
  - type: text
    content: 'Alors Israël fit un vœu au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il dit : Si tu me livres ce peuple, je frapperai ses villes d''anathème. '
  '20':
  - type: note
    content: 'Pisga  : à 3 km au nord-ouest du mont Nebo, à l''extrémité nord de la chaîne de montagnes (Abarim, cf. v. 11n) qui s''étend à l''est de la mer Morte (alt. 710 m) ; cf. Dt 3.17,27 ; 32.49 ; 34.1 ; Jos 13.20. –  et qui s''incline…  : traduction incertaine ; avec Smr et des versions anciennes, beaucoup modifient le texte hébreu traditionnel pour lire le sommet du Pisga, qui domine la terre aride (expression presque identique en 23.28) ; le mot hébreu yeshimôn, qui est traduit par terre aride, s''applique spécialement au désert de Juda (1S 23.19 ; 26.1), qu''on voit effectivement depuis le Pisga  ; mais il pourrait aussi désigner ici une autre région désertique.'
  - type: text
    content: de Bamoth, à la vallée qui est dans le pays de Moab, au sommet du Pisga, et qui s'incline en face de la terre aride.
  - type: heading
    content: Victoires sur les rois Sihôn et Og
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 32.33ss ; Dt 2.24–3.7 ; 29.6 ; Jos 12.5 ; Jg 11.19ss ; 1R 4.19 ; Ps 135.11 ; 136.19s ; Né 9.22. –  Israël  : LXX lit Moïse et ajoute avec des paroles de paix , cf. Dt 2.26. –  Amorites  : cf. 13.29+ ; Am 2.9.'
  - type: text
    content: 'Israël envoya des messagers à Sihôn, roi des Amorites, pour lui dire : '
  '22':
  - type: note
    content: 'Je voudrais passer par ton pays  : LXX que nous passions par ton pays  ; Smr ajoute je suivrai la route royale et je ne m''écarterai ni à droite ni à gauche  ; cf. 20.17n  ; Dt 2.27ss.'
  - type: text
    content: 'Je voudrais passer par ton pays ; nous ne nous écarterons pas dans les champs ni dans les vignes, nous ne boirons pas l''eau des puits ; nous suivrons la route royale, jusqu''à ce que nous ayons passé ton territoire. '
  '23':
  - type: note
    content: 'Yahats (ou Yahtsa) : cf. Dt 2.32 ; Jos 13.18n  ; Jg 11.20.'
  - type: text
    content: 'Sihôn n''accorda pas à Israël le passage sur son territoire ; Sihôn rassembla tout son peuple et sortit à la rencontre d''Israël, dans le désert ; il vint à Yahats et fit la guerre à Israël. '
  '24':
  - type: note
    content: 'Le Yabboq, affluent du Jourdain qui le rejoint de l''est vers le milieu de son cours. –  jusqu''à la frontière des Ammonites  : litt. jusqu''aux fils d''Ammon  ; les Ammonites habitaient sur les rives du Yabboq, à l''est et au nord du royaume de Sihôn, cf. Dt 2.37 ; Jos 12.2 ; 13.10. –  car la frontière…  : LXX car Yazer (v. 32) est la frontière des Ammonites.'
  - type: text
    content: 'Israël le passa au fil de l''épée et prit possession de son pays depuis l''Arnon jusqu''au Yabboq, jusqu''à la frontière des Ammonites ; car la frontière des Ammonites était fortifiée. '
  '25':
  - type: note
    content: 'V. 31. –  Heshbôn, au nord-nord-est du mont Nebo, à environ 25 km à l''est de la mer Morte, cf. 32.3. –  les localités qui en dépendent  : litt. ses filles  ; de même au v. 32 ; cf. Ez 16.46n  ; voir aussi Jos 13.17 ; Jg 11.26.'
  - type: text
    content: 'Israël prit toutes ces villes-là. Israël s''installa dans toutes les villes des Amorites, à Heshbôn et dans toutes les localités qui en dépendent. '
  '26':
  - type: note
    content: 'Moab était peut-être un peuple semi-nomade à cette époque. –  qui était là avant  : litt. le premier  ; autre traduction au premier roi de Moab. –  jusqu''à l''Arnon  : LXX depuis Aroër jusqu''à l''Arnon  ; certains modifient le texte hébreu traditionnel pour lire depuis le Yabboq jusqu''à l''Arnon.'
  - type: text
    content: 'Car Heshbôn était la ville de Sihôn, roi des Amorites ; il avait fait la guerre au roi de Moab qui était là avant et il lui avait pris tout son pays jusqu''à l''Arnon. '
  '27':
  - type: note
    content: 'Texte obscur et interprétation difficile ; cf. v. 14s,17s ; Jg 11.13ss. –  les poètes  : cf. 23.7n. –  Venez à Heshbôn…  : autres traductions venez, Heshbôn sera rebâtie, la ville de Sihôn sera rétablie ; venez à Heshbôn, elle est bien bâtie et établie, la ville de Sihôn  ; cf. 32.37.'
  - type: text
    content: 'C''est pourquoi les poètes disent :'
  - type: text
    content: Venez à Heshbôn !
  - type: text
    content: Que la ville de Sihôn soit rebâtie et rétablie !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 48.45s. –  Ar-Moab  : LXX jusqu''à Moab  ; cf. v. 15n. –  les maîtres (autre traduction les Baals ) …  : d''après LXX, certains modifient légèrement le texte hébreu traditionnel pour lire elle a englouti les hauteurs (ou hauts lieux ) de l''Arnon (ou Bamoth-Arnon , cf. v. 19n) ; voir aussi 22.41.'
  - type: text
    content: Car un feu est sorti de Heshbôn,
  - type: text
    content: des flammes de la ville de Sihôn ;
  - type: text
    content: elle a dévoré Ar-Moab,
  - type: text
    content: les maîtres des hauteurs de l'Arnon.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Il a fait…  : le pronom sujet renvoie sans doute à Kemosh , dieu de Moab (également mentionné sur la stèle de Mésha, cf. 32.3n  ; 2R 3.4), qui a été la perte de ses fils et de ses filles , c.-à-d. ses adorateurs, les Moabites ; cf. Jg 11.24 ; 1R 11.7,33. –  des rescapés  : autre traduction des fugitifs.'
  - type: text
    content: Quel malheur pour toi, Moab !
  - type: text
    content: Tu es perdu, peuple de Kemosh !
  - type: text
    content: Il a fait de ses fils des rescapés
  - type: text
    content: et il a livré ses filles à la captivité,
  - type: text
    content: – à Sihôn, roi des Amorites.
  '3':
  - type: note
    content: 'Cf. v. 23,35 ; 23.7ss ; 31.7. –  livra les Cananéens (litt. le Cananéen, comme au v. 1) : Smr et plusieurs versions anciennes ajoutent dans sa main (v. 2), selon la traduction habituelle lui livra les Cananéens (Gn 9.2n). –  anathème  : voir bénédiction, malédiction. –  Horma  : terme apparenté au verbe traduit par frapper d''anathème (LXX le traduit ici Anathème) ; cf. 14.45n  ; Dt 2.34n  ; Za 14.11n  ; voir aussi Jos 12.14 ; 15.30 ; 19.4 ; Jg 1.17 ; 1Ch 4.30.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entendit Israël et livra les Cananéens. On les frappa d''anathème, eux et leurs villes, et on appela ce lieu du nom de Horma (« Anathème »).'
  - type: heading
    content: Les serpents brûlants
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Texte très obscur et traduction conjecturale ; certains le remanient considérablement, de façon à lire Heshbôn a fait périr les enfants jusqu''à Dibôn (près de l''Arnon, à une trentaine de km au sud de Heshbôn) , les femmes jusqu''à Nophah (site inconnu) , les hommes jusqu''à Medba (ou Madaba , à une dizaine de kilomètres au sud de Heshbôn) ; cf. Es 15.2. –  criblés de flèches  : cf. Ex 19.13n. –  qui touche à Medba  : certains, s''inspirant de LXX, modifient légèrement le texte hébreu traditionnel pour lire nous avons mis le feu jusqu''à Medba (LXX Moab ).'
  - type: text
    content: 'Nous les avons criblés de flèches :'
  - type: text
    content: Heshbôn est détruit jusqu'à Dibôn ;
  - type: text
    content: nous avons semé la dévastation jusqu'à Nophah,
  - type: text
    content: qui touche à Medba.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'dans le pays  : Smr dans les villes (v. 25).'
  - type: text
    content: 'Ainsi Israël s''installa dans le pays des Amorites. '
  '32':
  - type: note
    content: 'Yazer  : sans doute à la frontière entre le royaume de Sihôn et celui d''Og, en tout cas à l''est du Jourdain ; cf. v. 24n  ; 32.34ss ; Jos 13.24ss ; voir aussi Né 9.22. –  il déposséda  : LXX, Smr ils dépossédèrent.'
  - type: text
    content: Moïse envoya des espions reconnaître Yazer. Ils prirent les localités qui en dépendaient ; il déposséda les Amorites qui s'y trouvaient.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Cf. 32.33ss ; Dt 1.4s ; 3.1ss,8,10s,14 ; 4.47 ; 29.6s ; 31.4 ; Jos 9.10 ; 12.4s ; 13.12,29ss ; 19.10 ; 1R 4.13 ; Ps 135.11s ; 136.20ss ; Né 9.22. – Le Bashân , au nord-est du Jourdain. –  Edréi , à une cinquantaine de kilomètres au sud-est du lac de Tibériade (ou mer de Galilée).
  - type: text
    content: 'Ils remontèrent par le chemin du Bashân. Og, roi du Bashân, sortit à leur rencontre avec tout son peuple, pour leur faire la guerre à Edréi. '
  '34':
  - type: note
    content: 'Cf. 32.33 ; Dt 2.24 ; 3.2,11 ; 1S 17.46s. –  qui habitait  : autre traduction qui régnait.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : N''aie pas peur de lui : je te l''ai livré, lui, tout son peuple et son pays ; tu le traiteras comme tu as traité Sihôn, roi des Amorites, qui habitait à Heshbôn. '
  '35':
  - type: note
    content: 'ses fils  : le terme correspondant est omis par Smr ; cf. Dt 7.2 ; Jos 10.33 ; Jg 4.16.'
  - type: text
    content: Ils le battirent, lui, ses fils et tout son peuple, sans lui laisser aucun survivant, et ils prirent possession de son pays.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ils partirent… v. 10 ; 20.22. –  mer des Joncs  : hébreu yam souph (cf. Soupha au v. 14), vers le sud-ouest ; cf. 14.25 ; Ex 13.18n  ; 23.31 ; Dt 2.1 ; 1R 9.26. –  contourner… 20.21. –  perdit patience  : voir Jg 10.16n  ; 16.16n  ; Za 11.8n.'
  - type: text
    content: 'Ils partirent de Hor-la-Montagne par le chemin de la mer des Joncs, pour contourner Edom. En route, le peuple perdit patience '
  '5':
  - type: note
    content: 'monter d''Egypte Gn 12.10n. –  nous avons  : autre traduction possible notre gosier a, cf. 11.6n  ; sur le terme hébreu correspondant, cf. Gn 1.20n. –  pris en horreur 22.3n. –  ce pain méprisable ou cette nourriture de misère  ; il s''agit de la manne ; cf. 11.4ss ; 14.2 ; 16.13 ; 20.2ss ; Ex 14.11 ; 17.3.'
  - type: text
    content: 'et parla contre Dieu et contre Moïse : Pourquoi nous avez-vous fait monter d''Egypte si nous devons mourir dans le désert ? Il n''y a ici ni pain ni eau, et nous avons pris en horreur ce pain méprisable ! '
  '6':
  - type: note
    content: 'Cf. 1Co 10.9. –  contre le peuple  : autre traduction dans le peuple. –  des serpents  : litt. les serpents  ; cf. Jr 8.17. –  brûlants  : c''est le sens premier de l''hébreu seraphim, cf. Es 6.2n  ; LXX traduit mortels  ; cf. Dt 8.15. –  beaucoup de gens  : litt. un peuple nombreux.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' envoya contre le peuple des serpents brûlants ; ils mordirent le peuple, et il mourut beaucoup de gens en Israël. '
  '7':
  - type: note
    content: V. 5 ; cf. Ex 22.27. – Voir péché.
  - type: text
    content: 'Le peuple vint trouver Moïse et dit : Nous avons péché : nous avons parlé contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et contre toi. Prie le '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour qu''il éloigne de nous ces serpents ! Moïse pria pour le peuple. '
  '8':
  - type: note
    content: 'un serpent brûlant  : litt. un brûlant, cf. v. 6n  ; 2R 18.4 ; voir aussi Ex 15.25 ; 2R 2.21s ; voir encore Gn 3.1ss ; Jn 3.14ss. –  sur une perche  : terme habituellement traduit par signal ou étendard (Ex 17.15) ; LXX et Vg l''ont rendu par signe. –  le verra  : autre traduction le regardera, un verbe hébreu synonyme est traduit par regarder au v. 9. –  restera en vie  : litt. vivra.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Fais-toi un serpent brûlant et place-le sur une perche ; quiconque a été mordu et le verra restera en vie. '
  '9':
  - type: note
    content: 'un serpent de bronze  : en hébreu les deux termes (nahash / nehosheth) font assonance ; voir aussi 2R 18.4. –  par un serpent  : litt. par le serpent  ; cf. Es 27.1 ; Am 9.3. – Cf. Sagesse 16.7ss : « Quiconque se retournait était sauvé, non par l''objet regardé, mais par toi, le Sauveur de tous. Et ainsi tu as prouvé à nos ennemis que c''est toi qui délivres de tout mal… La dent même des serpents venimeux ne put les réduire, car ta miséricorde vint à leur rencontre et les guérit. Pour qu''ils se rappellent tes paroles, ils recevaient des coups d''aiguillon, mais ils étaient vite délivrés, de peur que, tombés dans un oubli profond, ils ne soient soustraits à ton action bienfaisante. Et ni herbe ni pommade ne vint les soulager, mais ta Parole, Seigneur, elle qui guérit tout. »'
  - type: text
    content: Moïse fit un serpent de bronze et le plaça sur la perche ; si quelqu'un était mordu par un serpent et regardait le serpent de bronze, il restait en vie.
  - type: heading
    content: Les étapes jusqu'au mont Pisga
