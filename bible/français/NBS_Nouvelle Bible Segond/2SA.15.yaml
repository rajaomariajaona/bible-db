      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se fit un char
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gardes du corps…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 8.11+.'
      marker-yv: yv-n
    - type: text
      text: 'Après cela Absalom se procura un char, des chevaux et cinquante gardes du corps qui allaient devant lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des agents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu correspondant est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: espion(s)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais ici la tâche de ces agents ne consiste pas tant à espionner qu''à faire passer le message du prétendant au trône. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le son de la trompe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.28+.
      marker-yv: yv-n
    - type: text
      text: 'Absalom envoya des agents dans toutes les tribus d''Israël, en leur disant : Quand vous entendrez le son de la trompe, vous direz : Absalom est devenu roi à Hébron ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Deux cents… invités
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on ne sait pas si c''étaient des personnalités importantes, qu''Absalom voulait compromettre dans sa tentative, ou simplement des gens modestes, destinés à faire nombre. Cf. 1S 9.13,22 ; 1R 1.41,49. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en toute bonne foi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en leur intégrité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1R 22.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans se douter de rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils ne connaissaient pas toute la chose '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la parole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Deux cents hommes de Jérusalem, qui avaient été invités, allèrent avec Absalom ; ils le firent en toute bonne foi, sans se douter de rien. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: envoya chercher… Ahitophel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre qu''Absalom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: charge Ahitophel d'une mission
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à exécuter à partir de sa ville de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guilo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guilo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : localité située à 10 km environ au nord-ouest d''Hébron (cf. Jos 15.51). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ahitophel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 34 ; 16.23 ; 17.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La conspiration
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 16.20 ; 2R 12.21 ; 14.19 ; 15.15,30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les partisans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: du prétendant au trône.
      marker-yv: yv-n
    - type: text
      text: Pendant qu'Absalom offrait les sacrifices, il envoya chercher à la ville de Guilo Ahitophel, le Guilonite, conseiller de David. La conspiration devint puissante, et le peuple était de plus en plus nombreux avec Absalom.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David s'enfuit de Jérusalem
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6 ; cf. Jg 9.3.
      marker-yv: yv-n
    - type: text
      text: 'Quelqu''un vint dire à David : Le cœur des hommes d''Israël suit Absalom. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Prenons la fuite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 3.1. – Par sa fuite, David veut éviter la guerre civile qui ne manquerait pas de provoquer de lourdes pertes dans la population de Jérusalem.'
      marker-yv: yv-n
    - type: text
      text: 'Alors David dit à tous les gens de sa cour qui étaient avec lui à Jérusalem : Prenons la fuite, sans quoi nous n''échapperons pas à Absalom. Partez vite, sinon il aura vite fait de nous atteindre et d''attirer le malheur sur nous, en passant la ville au fil de l''épée. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.11 ; 1S 14.7 ; 16.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ô roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ô roi, mon seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous sommes à ton service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 16.16.'
      marker-yv: yv-n
    - type: text
      text: 'Les gens du roi lui dirent : Quoi que tu décides, ô roi, nous sommes à ton service ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sa maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa maisonnée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le suivait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: était sur ses pieds
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur ses traces
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; mais on peut aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le roi et toute sa famille sortirent à pied
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', affirmation contrastant avec celle du v. 1 (le char et les chevaux d''Absalom) ; de même au v. 17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: concubines
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le palais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (aussi 16.21).
      marker-yv: yv-n
    - type: text
      text: 'Le roi sortit, et toute sa famille le suivait ; il laissa dix concubines pour garder le palais. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''expression ne désigne pas '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les habitants de Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', et encore moins '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: '), mais simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tous ceux qui l''accompagnaient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous ses serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le suivait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils s'arrêtèrent à la dernière maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : après la traversée des rues étroites de la cité, le roi et ses proches s''arrêtent sur un terrain dégagé pour organiser l''ordre de progression ; les soldats (v. 18) vont constituer dès lors l''avant-garde du cortège.'
      marker-yv: yv-n
    - type: text
      text: 'Le roi sortit, et tout le peuple le suivait ; ils s''arrêtèrent à la dernière maison. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Kérétites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pélétites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gatites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un troisième corps de légion étrangère au service de David ; cette troupe est un héritage du temps où David était au service d''Akish, roi de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1S 27) ; voir aussi Jos 13.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à sa suite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à ses pieds.
      marker-yv: yv-n
    - type: text
      text: Tous ses hommes, tous les Kérétites et tous les Pélétites, passèrent à ses côtés ; et tous les Gatites, au nombre de six cents hommes, venus de Gath à sa suite, passèrent devant le roi.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ittaï, le Gatite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le chef des soldats de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec le roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec le nouveau roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu es déjà un exilé pour ton propre pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour ton lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu es un expatrié.
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit à Ittaï, le Gatite : Pourquoi viendrais-tu aussi avec nous ? Retourne et reste avec le roi, car tu es un étranger ; tu es déjà un exilé pour ton propre pays. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui menait à la porte de la ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette porte ouvrait généralement sur une place publique où l''on rendait la justice ; cf. Dt 21.19 ; 22.15 ; Rt 4.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour obtenir un jugement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir Dt 17.8s ; 25.1 ; 1R 3.16-28 ; Lc 18.3.'
      marker-yv: yv-n
    - type: text
      text: 'Il se levait de bon matin et se tenait au bord du chemin qui menait à la porte de la ville ; et chaque fois que quelqu''un avait un litige et se rendait auprès du roi pour obtenir un jugement, Absalom l''interpellait et lui demandait : De quelle ville es-tu ? Lorsqu''il avait répondu : Je suis de telle tribu d''Israël, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hier
      - type: usfm
        marker: ft
        children:
