      text: 'On dit à David : Ahitophel est avec Absalom parmi les conspirateurs. David dit : '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', je t''en prie, rends stupides les conseils d''Ahitophel ! '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'là où l''on se prosterne devant Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: signale vraisemblablement la présence d'un ancien lieu de culte ; autre traduction, moins probable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: où il se prosterna devant Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Houshaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.16-19 ; 17.5-16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'Arkite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : membre d''un clan signalé en Jos 16.2 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' précise ici déjà qu''il était '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ami de David '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir v. 37
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la tunique déchirée et la tête couverte de terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Gn 2.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) 1S 4.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque David fut arrivé au sommet, là où l''on se prosterne devant Dieu, Houshaï, l''Arkite, vint à sa rencontre, la tunique déchirée et la tête couverte de terre. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu me seras à charge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 19.36.'
      marker-yv: yv-n
    - type: text
      text: 'David lui dit : Si tu passes avec moi, tu me seras à charge ; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu déjoueras pour moi les conseils d'Ahitophel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 17.5-7.'
      marker-yv: yv-n
    - type: text
      text: 'au contraire, si tu retournes à la ville et que tu dises à Absalom : « O roi, je suis ton serviteur ; j''étais autrefois le serviteur de ton père, mais maintenant je suis ton serviteur », tu déjoueras pour moi les conseils d''Ahitophel. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sont là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne sont-ils pas là ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La question rhétorique de forme négative équivaut à une affirmation renforcée. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu le diras… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 17.15s.
      marker-yv: yv-n
    - type: text
      text: 'Les prêtres Tsadoq et Abiathar sont là, avec toi. Tout ce que tu apprendras de la maison du roi, tu le diras aux prêtres Tsadoq et Abiathar ; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par leur intermédiaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 17.17.'
      marker-yv: yv-n
    - type: text
      text: 'et comme ils ont auprès d''eux leurs deux fils, Ahimaats, pour Tsadoq, et Jonathan, pour Abiathar, c''est par leur intermédiaire que vous me ferez dire tout ce que vous aurez appris. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.37 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'ami de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le titre d’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ami du roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était donné à un confident et conseiller du roi.
      marker-yv: yv-n
    - type: text
      text: Houshaï, l'ami de David, retourna donc à la ville au moment où Absalom faisait son entrée à Jérusalem.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ah ! si j'étais juge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui me fera juge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; en revendiquant une fonction de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: juge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Absalom réclame de fait la royauté (cf. 14.1-17 ; 1R 3.16-28). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: viendrait à moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 22.2 ; Mt 11.28.'
      marker-yv: yv-n
    - type: text
      text: 'Absalom disait : Ah ! si j''étais juge dans le pays ! Tout homme qui aurait un litige ou un droit à défendre viendrait à moi, et je lui ferais justice ! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'embrassait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.33+ ; voir aussi Pr 29.5.'
      marker-yv: yv-n
    - type: text
      text: 'Et quand quelqu''un s''approchait pour se prosterner devant lui, il lui tendait la main, le saisissait et l''embrassait. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'volait le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rm 16.18.'
      marker-yv: yv-n
    - type: text
      text: Absalom agissait ainsi à l'égard de tous les gens d'Israël qui se rendaient auprès du roi pour obtenir un jugement ; ainsi Absalom volait le cœur des gens d'Israël.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Au bout de quarante ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''après d''autres textes, David n''a régné que quarante ans ; on comprend donc en général '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers la fin des quarante ans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(du règne de David). Des versions anciennes offrent la variante '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au bout de quatre ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui conviendrait bien dans ce contexte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Hébron '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; c''est le lieu de naissance d''Absalom, voir 3.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: m'acquitte du vœu
      - type: usfm
        marker: ft
