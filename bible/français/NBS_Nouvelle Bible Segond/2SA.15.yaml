        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dt 23.22.'
      marker-yv: yv-n
    - type: text
      text: 'Au bout de quarante ans, Absalom dit au roi : Laisse-moi aller à Hébron, je te prie, pour que je m''acquitte du vœu que j''ai fait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 28.20-22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gueshour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 13.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 14.23,32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je servirai le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : quelques mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoutent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à Hébron.
      marker-yv: yv-n
    - type: text
      text: 'Car moi, ton serviteur, j''ai fait un vœu, pendant que j''habitais à Gueshour, en Aram ; j''ai dit : Si le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me ramène à Jérusalem, je servirai le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Va en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 18.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: partit
      - type: usfm
