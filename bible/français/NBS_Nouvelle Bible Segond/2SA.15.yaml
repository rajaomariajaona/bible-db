document_id: 2SA.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Absalom intrigue pour devenir roi
  - type: text
    content: ' '
  - type: note
    content: 'se procura un char  : litt. se fit un char . –  gardes du corps…  : cf. 1S 8.11+.'
  - type: text
    content: 'Après cela Absalom se procura un char, des chevaux et cinquante gardes du corps qui allaient devant lui. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'des agents  : le terme hébreu correspondant est habituellement traduit par espion(s) , mais ici la tâche de ces agents ne consiste pas tant à espionner qu''à faire passer le message du prétendant au trône. –  le son de la trompe 2.28+.'
  - type: text
    content: 'Absalom envoya des agents dans toutes les tribus d''Israël, en leur disant : Quand vous entendrez le son de la trompe, vous direz : Absalom est devenu roi à Hébron ! '
  '11':
  - type: note
    content: 'Deux cents… invités  : on ne sait pas si c''étaient des personnalités importantes, qu''Absalom voulait compromettre dans sa tentative, ou simplement des gens modestes, destinés à faire nombre. Cf. 1S 9.13,22 ; 1R 1.41,49. –  en toute bonne foi  : litt. en leur intégrité  ; cf. 1R 22.34n. –  sans se douter de rien  : litt. ils ne connaissaient pas toute la chose (ou la parole).'
  - type: text
    content: 'Deux cents hommes de Jérusalem, qui avaient été invités, allèrent avec Absalom ; ils le firent en toute bonne foi, sans se douter de rien. '
  '12':
  - type: note
    content: 'envoya chercher… Ahitophel  : on pourrait aussi comprendre qu''Absalom charge Ahitophel d''une mission, à exécuter à partir de sa ville de Guilo. –  Guilo  : localité située à 10 km environ au nord-ouest d''Hébron (cf. Jos 15.51). –  Ahitophel  : cf. v. 34 ; 16.23 ; 17.23. –  La conspiration  : cf. 1R 16.20 ; 2R 12.21 ; 14.19 ; 15.15,30. –  le peuple désigne ici les partisans du prétendant au trône.'
  - type: text
    content: Pendant qu'Absalom offrait les sacrifices, il envoya chercher à la ville de Guilo Ahitophel, le Guilonite, conseiller de David. La conspiration devint puissante, et le peuple était de plus en plus nombreux avec Absalom.
  - type: heading
    content: David s'enfuit de Jérusalem
  '13':
  - type: text
    content: ' '
  - type: note
    content: Le cœur… v. 6 ; cf. Jg 9.3.
  - type: text
    content: 'Quelqu''un vint dire à David : Le cœur des hommes d''Israël suit Absalom. '
  '14':
  - type: note
    content: 'Prenons la fuite  : cf. Ps 3.1. – Par sa fuite, David veut éviter la guerre civile qui ne manquerait pas de provoquer de lourdes pertes dans la population de Jérusalem.'
  - type: text
    content: 'Alors David dit à tous les gens de sa cour qui étaient avec lui à Jérusalem : Prenons la fuite, sans quoi nous n''échapperons pas à Absalom. Partez vite, sinon il aura vite fait de nous atteindre et d''attirer le malheur sur nous, en passant la ville au fil de l''épée. '
  '15':
  - type: note
    content: 'Cf. 9.11 ; 1S 14.7 ; 16.16. –  ô roi  : litt. ô roi, mon seigneur. –  nous sommes à ton service  : cf. 1S 16.16.'
  - type: text
    content: 'Les gens du roi lui dirent : Quoi que tu décides, ô roi, nous sommes à ton service ! '
  '16':
  - type: note
    content: 'sa famille  : litt. sa maison ou sa maisonnée. –  le suivait  : litt. était sur ses pieds, c.-à-d. sur ses traces  ; mais on peut aussi comprendre le roi et toute sa famille sortirent à pied, affirmation contrastant avec celle du v. 1 (le char et les chevaux d''Absalom) ; de même au v. 17. –  concubines  : cf. 5.13n. –  le palais  : litt. la maison (aussi 16.21).'
  - type: text
    content: 'Le roi sortit, et toute sa famille le suivait ; il laissa dix concubines pour garder le palais. '
  '17':
  - type: note
    content: 'tout le peuple  : l''expression ne désigne pas tous les habitants de Jérusalem, et encore moins tout Israël (Vg), mais simplement tous ceux qui l''accompagnaient (cf. LXX tous ses serviteurs). –  le suivait v. 16n. –  ils s''arrêtèrent à la dernière maison  : après la traversée des rues étroites de la cité, le roi et ses proches s''arrêtent sur un terrain dégagé pour organiser l''ordre de progression ; les soldats (v. 18) vont constituer dès lors l''avant-garde du cortège.'
  - type: text
    content: 'Le roi sortit, et tout le peuple le suivait ; ils s''arrêtèrent à la dernière maison. '
  '18':
  - type: note
    content: 'Kérétites / Pélétites 8.18n. –  Gatites  : un troisième corps de légion étrangère au service de David ; cette troupe est un héritage du temps où David était au service d''Akish, roi de Gath (1S 27) ; voir aussi Jos 13.3n. –  à sa suite  : litt. à ses pieds.'
  - type: text
    content: Tous ses hommes, tous les Kérétites et tous les Pélétites, passèrent à ses côtés ; et tous les Gatites, au nombre de six cents hommes, venus de Gath à sa suite, passèrent devant le roi.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Ittaï, le Gatite  : le chef des soldats de Gath . –  avec le roi  : c.-à-d. avec le nouveau roi . –  tu es déjà un exilé pour ton propre pays (litt. pour ton lieu ) : c.-à-d. tu es un expatrié.'
  - type: text
    content: 'Le roi dit à Ittaï, le Gatite : Pourquoi viendrais-tu aussi avec nous ? Retourne et reste avec le roi, car tu es un étranger ; tu es déjà un exilé pour ton propre pays. '
  '2':
  - type: note
    content: 'qui menait à la porte de la ville  : cette porte ouvrait généralement sur une place publique où l''on rendait la justice ; cf. Dt 21.19 ; 22.15 ; Rt 4.1. –  pour obtenir un jugement  : voir Dt 17.8s ; 25.1 ; 1R 3.16-28 ; Lc 18.3.'
  - type: text
    content: 'Il se levait de bon matin et se tenait au bord du chemin qui menait à la porte de la ville ; et chaque fois que quelqu''un avait un litige et se rendait auprès du roi pour obtenir un jugement, Absalom l''interpellait et lui demandait : De quelle ville es-tu ? Lorsqu''il avait répondu : Je suis de telle tribu d''Israël, '
  '20':
  - type: note
    content: 'hier, c.-à-d. il y a peu de temps. –  quand je ne sais pas moi-même où je vais  : litt. et moi je vais où je vais, tournure hébraïque indiquant l''indétermination ; cf. 1S 23.13n. –  Fidélité et loyauté  : LXX que le Seigneur agisse envers toi avec compassion et vérité, Vg parce que tu as montré grâce et fidélité  ; Tg agis avec eux avec loyauté et fidélité  ; cf. 2.6 ; Ps 61.8.'
  - type: text
    content: 'Tu es arrivé hier, et aujourd''hui je te ferais errer avec nous, quand je ne sais pas moi-même où je vais ! Retourne et ramène tes frères avec toi. Fidélité et loyauté ! '
  '21':
  - type: note
    content: 'Par la vie du Seigneur …  : cf. 1S 1.26n  ; 14.39n  ; 25.26. –  là aussi je serai  : cf. Rt 1.16 ; Lc 9.57 ; 22.33 ; Jn 6.66-69.'
  - type: text
    content: 'Ittaï répondit au roi : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et par ta vie, ô roi, mon seigneur, au lieu où tu seras, soit pour mourir, soit pour vivre, là aussi je serai, moi, ton serviteur. '
  '22':
  - type: note
    content: 'leurs familles  : le mot hébreu correspondant désigne collectivement tous les êtres humains (femmes, enfants, vieillards) qui ne sont pas aptes à servir dans l''armée ; cf. Gn 34.29n  ; Jg 18.21n. Les familles des soldats étrangers seraient les premières victimes de la vengeance du nouveau roi, si elles restaient sur place.'
  - type: text
    content: 'David dit alors à Ittaï : Va, passe ! Et Ittaï, le Gatite, passa, ainsi que tous les hommes qui étaient avec lui et leurs familles.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Tout le pays , c.-à-d. toute la population . –  l''oued Cédron (ou la vallée du Cédron ), à l''est de Jérusalem, sépare la ville du mont des Oliviers. –  en face du chemin du désert  : description topographique peu claire en hébreu.'
  - type: text
    content: 'Tout le pays pleurait à grand bruit au passage de tout le peuple. Le roi passa l''oued Cédron, et tout le peuple passa en face du chemin du désert. '
  '24':
  - type: note
    content: 'Tsadoq  : cf. 8.17 ; même le clergé se solidarise avec David. –  les lévites / le coffre  : cf. 1S 6.15n. –  Abiathar  : cf. 1S 22.20n  ; selon 2S 20.25, il était le second prêtre du roi, aux côtés de Tsadoq  ; selon 8.17, c''est son fils Ahimélek qui occupait ce poste. –  montait ou offrait des sacrifices.'
  - type: text
    content: 'Tsadoq aussi était là, et avec lui tous les lévites portant le coffre de l''alliance de Dieu ; ils posèrent le coffre de Dieu, et Abiathar montait, pendant que tout le peuple achevait de sortir de la ville. '
  '25':
  - type: note
    content: 'Ramène le coffre  : la place du Coffre est au cœur de la cité, et non pas dans les pérégrinations incertaines du roi ; celui-ci refuse de faire pression sur Dieu en emmenant le coffre avec lui. –  Si je trouve grâce aux yeux du Seigneur ou si le Seigneur m''accorde sa bienveillance  ; cf. 1S 16.22n. –  le Coffre et son domaine 6.12-16 ; cf. Ps 26.8 ; 27.4 ; 84.2s.'
  - type: text
    content: 'Le roi dit à Tsadoq : Ramène le coffre de Dieu dans la ville. Si je trouve grâce aux yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: ', il me ramènera et il me fera voir le Coffre et son domaine. '
  '26':
  - type: note
    content: 'Je ne prends pas plaisir en toi (cf. Nb 14.8n  ; Ml 1.10) ou je ne me plais pas avec toi  ; ou encore tu ne me plais pas (cf. 1S 18.22n  ; 19.1). –  ce qu''il lui plaira  : litt. ce qui est bon à ses yeux  ; cf. 3.19,36 ; 19.38 ; voir 1S 3.18+.'
  - type: text
    content: 'Mais s''il dit : « Je ne prends pas plaisir en toi », qu''il me fasse ce qu''il lui plaira. '
  '27':
  - type: note
    content: 'Toi  : litt. vois-tu ? ( ?) Certains comprennent  : es-tu voyant ? (cf. 1S 9.9). –  Ahimaats et Jonathan reparaîtront au v. 36.'
  - type: text
    content: 'Le roi dit encore à Tsadoq, le prêtre : Toi, retourne en paix dans la ville, ainsi que ton fils Ahimaats et Jonathan, fils d''Abiathar – vos deux fils avec vous. '
  '28':
  - type: note
    content: 'je resterai  : le même verbe est traduit par s''attarder en Gn 19.16 ; cf. Jg 19.8n. –  dans les plaines du désert  : autre lecture traditionnelle dans les lieux de passage du désert, ce qui peut désigner soit des ravins menant de Jérusalem au Jourdain, soit des gués permettant de traverser le Jourdain ; cf. 1S 23.24n. –  un rapport de votre part  : lorsqu''il renvoie les prêtres en ville, la motivation cultuelle de David, manifestée au v. 25, n''exclut pas une motivation stratégique et pratique : avoir des observateurs sur place.'
  - type: text
    content: 'Regardez. Moi, je resterai dans les plaines du désert, jusqu''à ce qu''il m''arrive un rapport de votre part. '
  '29':
  - type: text
    content: Ainsi Tsadoq et Abiathar ramenèrent le coffre de Dieu à Jérusalem et y restèrent.
  - type: heading
    content: David envoie Houshaï espionner Absalom
  '3':
  - type: note
    content: 'personne ne t''écoutera chez le roi  : cf. 8.15 ; 23.3.'
  - type: text
    content: 'Absalom lui disait : Regarde, ta cause est bonne et juste ; mais personne ne t''écoutera chez le roi. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'montée des Oliviers  : cf. v. 23n  ; Lc 19.29,37. –  la tête couverte ou voilée  : en signe de douleur ; voir 19.5 ; Jr 14.3s ; Est 6.12. –  nu-pieds  : cf. Es 20.2-4 ; Mi 1.8.'
  - type: text
    content: 'David montait la montée des Oliviers. Il montait en pleurant, la tête couverte, il marchait nu-pieds ; tous ceux qui étaient avec lui s''étaient aussi couvert la tête, et ils montaient en pleurant. '
  '31':
  - type: note
    content: 'On dit à David  : d''après quelques mss hébreux et la plupart des versions anciennes ; le texte hébreu traditionnel dit David dit. –  Ahitophel v. 12+. –  rends stupides les conseils  : cf. 16.23 ; 17.14,23 ; voir aussi Ps 33.10 ; Jb 5.13.'
  - type: text
    content: 'On dit à David : Ahitophel est avec Absalom parmi les conspirateurs. David dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', je t''en prie, rends stupides les conseils d''Ahitophel ! '
  '32':
  - type: note
    content: 'là où l''on se prosterne devant Dieu signale vraisemblablement la présence d''un ancien lieu de culte ; autre traduction, moins probable  : où il se prosterna devant Dieu. –  Houshaï  : cf. 16.16-19 ; 17.5-16. –  l''Arkite  : membre d''un clan signalé en Jos 16.2 ; LXX précise ici déjà qu''il était ami de David (voir v. 37n). –  la tunique déchirée et la tête couverte de terre (Gn 2.5n) 1S 4.12n.'
  - type: text
    content: 'Lorsque David fut arrivé au sommet, là où l''on se prosterne devant Dieu, Houshaï, l''Arkite, vint à sa rencontre, la tunique déchirée et la tête couverte de terre. '
  '33':
  - type: note
    content: 'tu me seras à charge  : cf. 19.36.'
  - type: text
    content: 'David lui dit : Si tu passes avec moi, tu me seras à charge ; '
  '34':
  - type: note
    content: 'tu déjoueras pour moi les conseils d''Ahitophel  : cf. 17.5-7.'
  - type: text
    content: 'au contraire, si tu retournes à la ville et que tu dises à Absalom : « O roi, je suis ton serviteur ; j''étais autrefois le serviteur de ton père, mais maintenant je suis ton serviteur », tu déjoueras pour moi les conseils d''Ahitophel. '
  '35':
  - type: note
    content: 'sont là  : litt. ne sont-ils pas là ? La question rhétorique de forme négative équivaut à une affirmation renforcée. –  tu le diras… 17.15s.'
  - type: text
    content: 'Les prêtres Tsadoq et Abiathar sont là, avec toi. Tout ce que tu apprendras de la maison du roi, tu le diras aux prêtres Tsadoq et Abiathar ; '
  '36':
  - type: note
    content: 'par leur intermédiaire  : voir 17.17.'
  - type: text
    content: 'et comme ils ont auprès d''eux leurs deux fils, Ahimaats, pour Tsadoq, et Jonathan, pour Abiathar, c''est par leur intermédiaire que vous me ferez dire tout ce que vous aurez appris. '
  '37':
  - type: note
    content: 'l''ami de David  : le titre d’ami du roi était donné à un confident et conseiller du roi.'
  - type: text
    content: Houshaï, l'ami de David, retourna donc à la ville au moment où Absalom faisait son entrée à Jérusalem.
  '4':
  - type: note
    content: 'Ah ! si j''étais juge  : autre traduction qui me fera juge  ; en revendiquant une fonction de juge, Absalom réclame de fait la royauté (cf. 14.1-17 ; 1R 3.16-28). –  viendrait à moi  : cf. 1S 22.2 ; Mt 11.28.'
  - type: text
    content: 'Absalom disait : Ah ! si j''étais juge dans le pays ! Tout homme qui aurait un litige ou un droit à défendre viendrait à moi, et je lui ferais justice ! '
  '5':
  - type: note
    content: 'l''embrassait  : cf. 14.33+ ; voir aussi Pr 29.5.'
  - type: text
    content: 'Et quand quelqu''un s''approchait pour se prosterner devant lui, il lui tendait la main, le saisissait et l''embrassait. '
  '6':
  - type: note
    content: 'volait le cœur  : cf. Rm 16.18.'
  - type: text
    content: Absalom agissait ainsi à l'égard de tous les gens d'Israël qui se rendaient auprès du roi pour obtenir un jugement ; ainsi Absalom volait le cœur des gens d'Israël.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Au bout de quarante ans  : d''après d''autres textes, David n''a régné que quarante ans ; on comprend donc en général vers la fin des quarante ans (du règne de David). Des versions anciennes offrent la variante au bout de quatre ans , qui conviendrait bien dans ce contexte. –  à Hébron 2.1n  ; c''est le lieu de naissance d''Absalom, voir 3.3. –  m''acquitte du vœu  : cf. Dt 23.22.'
  - type: text
    content: 'Au bout de quarante ans, Absalom dit au roi : Laisse-moi aller à Hébron, je te prie, pour que je m''acquitte du vœu que j''ai fait au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: note
    content: 'Cf. Gn 28.20-22. –  Gueshour  : cf. 13.38n  ; 14.23,32. –  je servirai le Seigneur  : quelques mss de LXX ajoutent à Hébron.'
  - type: text
    content: 'Car moi, ton serviteur, j''ai fait un vœu, pendant que j''habitais à Gueshour, en Aram ; j''ai dit : Si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me ramène à Jérusalem, je servirai le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '9':
  - type: note
    content: 'Va en paix  : cf. Jg 18.6+. –  partit  : cf. 14.23n.'
  - type: text
    content: 'Le roi lui dit : Va en paix. Alors Absalom partit pour Hébron.'
