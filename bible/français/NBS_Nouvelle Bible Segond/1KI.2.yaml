document_id: 1KI.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dernières volontés de David
  - type: text
    content: ' '
  - type: note
    content: 'le moment…  : litt. les jours de David s''approchaient pour mourir . Même expression hébraïque rare employée également pour Jacob-Israël (Gn 47.29) et Moïse (Dt 31.14).'
  - type: text
    content: 'Comme le moment de sa mort approchait, David donna ses ordres à Salomon, son fils ; il lui dit : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'se coucha avec ses pères 1.21n. –  la Ville de David  : voir 2S 5.7,9 et les notes.'
  - type: text
    content: 'David se coucha avec ses pères et il fut enseveli dans la Ville de David. '
  '11':
  - type: note
    content: 'Le temps (litt. les jours) que David régna… 1Ch 29.27. Voir « Le temps des rois »♦. –  à Hébron… sept ans  : en 2S 2.11 et 5.5, le règne de David dure sept ans et six mois.'
  - type: text
    content: 'Le temps que David régna sur Israël fut de quarante ans : à Hébron il régna sept ans, et à Jérusalem il régna trente-trois ans.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Salomon s''assit sur le trône  : certains mss de LXX précisent à l''âge de douze ans  ; cf. 1Ch 29.23. –  son règne… affermi  : cf. v. 46.'
  - type: text
    content: Salomon s'assit sur le trône de David, son père, et son règne fut bien affermi.
  - type: heading
    content: Salomon se débarrasse d'Adonias
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Sur l''élimination des éventuels prétendants au trône au début du règne de Salomon, comparer 2R 9–10. –  Adonias, fils de Hagguith 1.5n. –  Bethsabée, mère de Salomon 1.11+ ; LXX ajoute et se prosterna devant elle  ; cf. v. 19. –  Viens-tu pour la paix ? / Oui (litt. paix ) : autre traduction comment vas-tu ? / Bien . Cf. 1S 16.4n.'
  - type: text
    content: 'Adonias, fils de Hagguith, vint trouver Bethsabée, mère de Salomon. Elle lui dit : Viens-tu pour la paix ? Il répondit : Oui ! '
  '14':
  - type: text
    content: 'Et il ajouta : J''ai un mot à te dire. Elle dit : Parle ! '
  '15':
  - type: note
    content: Aux yeux de l'auteur, c'est la volonté de Dieu, en l'occurrence opposée à celle du peuple, qui légitime la royauté de Salomon.
  - type: text
    content: 'Il dit : Tu sais que la royauté m''était destinée : tout Israël portait ses regards sur moi pour que je devienne roi. Mais la royauté est passée à mon frère, car elle lui était destinée par le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '16':
  - type: note
    content: 'une seule demande  : quelques mss hébreux et grecs portent une seule petite demande, comme au v. 20. –  Ne me la refuse pas  : litt. ne détourne pas ma face  ; même expression hébraïque aux v. 17,20.'
  - type: text
    content: 'Maintenant, je te fais une seule demande. Ne me la refuse pas ! Elle lui répondit : Parle ! '
  '17':
  - type: note
    content: 'il ne te le refusera pas  : cf. v. 16n. –  Abishag, la Shounamite 1.3n. Cette demande d''Adonias pouvait être interprétée comme l''expression d''une prétention à la succession de David (v. 22) ; cf. 2S 3.7n  ; 16.21ns.'
  - type: text
    content: 'Il dit : Dis, je te prie, au roi Salomon – car il ne te le refusera pas – qu''il me donne pour femme Abishag, la Shounamite. '
  '18':
  - type: text
    content: 'Bethsabée dit : Bien ! je parlerai moi-même au roi en ta faveur.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'se prosterna devant elle  : cf. 1.16n. LXX il lui donna un baiser . –  un trône pour la mère du roi  : cf. 15.13 ; Jr 13.18. –  à sa droite  : la place d''honneur (cf. Ps 45.10 ; 110.1).'
  - type: text
    content: 'Bethsabée se rendit auprès du roi Salomon, pour lui parler en faveur d''Adonias. Le roi se leva pour aller à sa rencontre, il se prosterna devant elle et s''assit sur son trône. Il fit placer un trône pour la mère du roi, et elle s''assit à sa droite. '
  '2':
  - type: note
    content: 'selon le sort commun à tous  : litt. dans la voie (ou par le chemin) de toute la terre  ; cette expression est employée pour parler de la mort inévitable ; cf. Jos 23.14 ; voir aussi Gn 19.31n.'
  - type: text
    content: 'Moi, je m''en vais selon le sort commun à tous. Sois fort et sois un homme ! '
  '20':
  - type: note
    content: 'une seule petite demande  : cf. v. 16n. –  ne me la refuse pas / je ne te la refuserai pas  : cf. v. 16n.'
  - type: text
    content: 'Puis elle dit : J''ai une seule petite demande à te faire : ne me la refuse pas ! Le roi lui dit : Fais ta demande, ma mère ; je ne te la refuserai pas. '
  '21':
  - type: text
    content: 'Elle dit : Qu''Abishag, la Shounamite, soit donnée pour femme à Adonias, ton frère. '
  '22':
  - type: note
    content: 'pour Abiathar… et pour Joab  : LXX porte  : et il a pour lui (comme partisans) Abiathar, le prêtre, et Joab.'
  - type: text
    content: 'Le roi Salomon répondit à sa mère : Pourquoi demandes-tu Abishag, la Shounamite, pour Adonias ? Demande donc la royauté pour lui, puisqu''il est mon frère aîné ! – pour lui, pour Abiathar, le prêtre, et pour Joab, fils de Tserouya !'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Que Dieu me fasse…  : même expression hébraïque en 2S 3.35 ; 19.14 ; 2R 6.31 ; cf. 1S 3.17 ; 14.44 ; 25.22 ; 2S 3.9.'
  - type: text
    content: 'Alors le roi Salomon fit ce serment par le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Que Dieu me fasse ceci et qu''il y ajoute cela, si ce n''est pas au prix de sa vie qu''Adonias a prononcé cette parole ! '
  '24':
  - type: note
    content: 'par la vie du Seigneur 1.29n. –  fait une maison  : cf. 2S 7.11 ; voir aussi Dt 25.9 ; 2S 7.27 ; 1R 11.38 (bâtir une maison). –  comme il l''avait dit  : dans sa promesse à David (2S 7.12s).'
  - type: text
    content: 'Maintenant donc, par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui m''a affermi et m''a fait asseoir sur le trône de David, mon père, et qui a fait une maison pour moi, comme il l''avait dit, aujourd''hui même Adonias sera mis à mort. '
  '25':
  - type: note
    content: 'donna des ordres à  : litt. envoya par la main de  ; autre traduction le livra au pouvoir de. –  Benaya 1.8n.'
  - type: text
    content: Le roi Salomon donna des ordres à Benaya, fils de Joïada, qui l'exécuta ; c'est ainsi qu'il mourut.
  - type: heading
    content: Salomon chasse Abiathar de Jérusalem
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Abiathar avait fait partie d''un complot destiné à mettre Adonias , frère de Salomon, sur le trône (1.7) ; de plus, il était de la famille d''Eli à qui le sacerdoce avait été retiré par un oracle divin proféré par Samuel (1S 2.31-36 ; 14.3 ; 22.20). Voir aussi v. 27. –  Anatoth  : ville lévitique de Benjamin (Jos 21.18), patrie de Jérémie (Jr 1.1), actuellement Ras-el-Haroub, à 5 km au nord-est de Jérusalem, près du village d''Anata. –  tes terres  : dans de nombreux mss hébreux et versions anciennes, on trouve ta terre . –  tu mérites la mort  : litt. tu es un homme de mort (même expression hébraïque en 2S 19.29). Cf. 1S 20.31 ; 26.16 ; 2S 12.5 ( fils de mort ). –  parce que tu as porté  : cf. 2S 15.24-29. –  le coffre  : LXX et Tg ajoutent de l''alliance . –  du Seigneur  : hébreu ’Adonaï , omis par quelques mss hébreux, LXX et Syr. –  Dieu  : cf. Gn 15.2n. –  tu as eu part à toutes les afflictions… ou tu as enduré tout ce que mon père a enduré . Cf. 1S 22.20-23.'
  - type: text
    content: 'Le roi dit ensuite à Abiathar, le prêtre : Va-t''en à Anatoth, sur tes terres, car tu mérites la mort ; mais je ne te ferai pas mettre à mort en ce jour, parce que tu as porté le coffre du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' devant David, mon père, et parce que tu as eu part à toutes les afflictions que mon père a subies. '
  '27':
  - type: note
    content: 'sacerdoce  : voir prêtre. –  de sorte que s''accomplit…  : litt. pour remplir la parole du Seigneur qu''il dit. Même expression rare en 2Ch 36.21. –  sur la maison d''Eli à Silo  : cf. 1S 2.30-36.'
  - type: text
    content: 'Ainsi Salomon chassa Abiathar du sacerdoce du '
  - type: text
    content: Seigneur
  - type: text
    content: ', de sorte que s''accomplit la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait prononcée sur la maison d''Eli à Silo.'
  - type: heading
    content: Salomon se débarrasse de Joab
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Absalom  : plusieurs mss de LXX, de Vg et de Syr portent Salomon à la place d’ Absalom . Cf. v. 5 ; 1.7. –  saisit les cornes de l''autel 1.50n.'
  - type: text
    content: 'La nouvelle parvint à Joab. Or Joab avait pris parti pour Adonias, alors qu''il n''avait pas pris parti pour Absalom ; Joab s''enfuit dans la tente du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et saisit les cornes de l''autel. '
  '29':
  - type: note
    content: 'Alors Salomon envoya  : LXX porte alors Salomon envoya dire à Joab : Qu''est-ce qui t''a pris de fuir vers l''autel ? Joab dit : J''ai eu peur de toi et j''ai fui auprès du Seigneur. Alors Salomon envoya Benaya…'
  - type: text
    content: 'On dit au roi Salomon que Joab s''était enfui dans la tente du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et qu''il était à côté de l''autel. Alors Salomon envoya Benaya, fils de Joïada, en lui disant : Va, exécute-le. '
  '3':
  - type: note
    content: 'Garde les observances  : expression traduite ailleurs par assurer le service  ; le verbe et son complément sont apparentés en hébreu ; même expression hébraïque en Gn 26.5 ; Lv 8.35 ; 18.30 ; 22.9 ; Nb 3.7 ; 18.4s ; Jos 22.3 ; 2R 11.6s ; Ez 44.15s ; 1Ch 23.32. –  ses préceptes  : autre traduction ses témoignages. –  selon ce qui est écrit dans la loi de Moïse Esd 3.2 ; 2Ch 23.18. –  afin de réussir…  : cf. Dt 29.8 ; voir aussi Dt 17.18ss ; Jos 1.7.'
  - type: text
    content: 'Garde les observances du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en suivant ses voies et en observant ses prescriptions, ses commandements, ses règles et ses préceptes, selon ce qui est écrit dans la loi de Moïse, afin de réussir dans tout ce que tu feras et partout où tu iras, '
  '30':
  - type: note
    content: 'Mais il répondit…  : LXX porte, ainsi que Syr et Vg  : Mais il lui répondit : Je ne sortirai pas !'
  - type: text
    content: 'Benaya arriva à la tente du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dit à Joab : Ainsi parle le roi : « Sors ! » Mais il répondit : Non ! C''est ici que je mourrai ! Benaya rapporta la chose au roi, en disant : C''est ainsi qu''a parlé Joab ; c''est ainsi qu''il m''a répondu. '
  '31':
  - type: note
    content: 'tu écarteras  : deux mss hébreux portent j''écarterai  ; LXX ajoute aujourd''hui.'
  - type: text
    content: 'Le roi lui dit : Fais comme il a dit ; exécute-le, puis ensevelis-le ; ainsi tu écarteras de moi et de ma famille le sang que Joab a répandu sans raison. '
  '32':
  - type: note
    content: 'fera retomber  : litt. fera revenir, comme au v. 33. –  son sang (LXX le sang de son injustice, de même Tg) sur sa tête  : cf. v. 37 ; Jos 2.19 ; 2S 1.16 ; Ez 33.4 ; Ac 18.6 ; voir aussi Dt 19.13 ; Jr 51.35 ; Ez 18.13 ; Ps 7.17 ; Mt 27.25. – Voir justice. –  chef de l''armée d''Israël  : cf. 2S 2.8. –  Amasa  : cf. 2S 20.8-10. –  chef de l''armée de Juda  : cf. 2S 17.25 ; 19.14 ; 20.4. –  sans que David, mon père…  : cf. 2S 3.26s.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera retomber son sang sur sa tête, parce qu''il a exécuté deux hommes plus justes et meilleurs que lui : Abner, fils de Ner, le chef de l''armée d''Israël, et Amasa, fils de Yéter, le chef de l''armée de Juda ; il les a tués par l''épée, sans que David, mon père, le sache. '
  '33':
  - type: note
    content: 'Leur sang retombera…  : cf. v. 32n. –  tout ira toujours bien ou il y aura pour toujours la paix.'
  - type: text
    content: 'Leur sang retombera sur la tête de Joab et sur la tête de sa descendance, pour toujours. Mais, grâce au '
  - type: text
    content: Seigneur
  - type: text
    content: ', tout ira toujours bien pour David, pour sa descendance, pour sa maison et pour son trône. '
  '34':
  - type: note
    content: 'monta  : à l''autel ; cf. 1.53. –  chez lui  : litt. dans sa maison, c.-à-d. à Beth-Léhem (cf. 2S 2.32). –  au désert  : le désert de Juda.'
  - type: text
    content: 'Benaya, fils de Joïada, monta exécuter Joab ; il le mit à mort. Il fut enseveli chez lui, au désert. '
  '35':
  - type: note
    content: 'à la tête de l''armée  : litt. sur l''armée, cf. 4.4n. –  quant à Tsadoq, le prêtre, il le nomma  : LXX porte et il nomma le prêtre Tsadoq comme premier prêtre. –  Abiathar 1.7n. – A la fin du v. LXX ajoute un long développement  : Le Seigneur donna à Salomon de l''intelligence, une sagesse extraordinairement grande, un cœur aussi vaste que le sable qui est au bord de la mer. L''intelligence de Salomon surpassa de beaucoup celle de tous les anciens et de tous les sages d''Egypte. Il épousa la fille du pharaon et l''installa dans la Ville de David, jusqu''à ce qu''il eût achevé sa maison, la maison du Seigneur tout d''abord, et la muraille de Jérusalem tout autour. Il fit cela et l''acheva en sept ans. Salomon avait soixante-dix mille porteurs de fardeaux et quatre-vingt mille tailleurs de pierre dans la montagne. Salomon fit la mer et les socles, les grands bassins et les colonnes, la fontaine de la cour et la mer de cuivre. Il bâtit la citadelle comme fortification et retrancha (fit une brèche à ?) la Ville de David. Ainsi la fille du pharaon montait (directement) de la Ville de David à sa maison, celle qu''il lui avait bâtie. Alors il bâtit la citadelle. Salomon apportait trois fois par an des holocaustes et des sacrifices de paix sur l''autel qu''il avait bâti pour le Seigneur, et il sacrifiait devant le Seigneur. Il acheva la maison. Les chefs préposés aux travaux de Salomon étaient trois mille six cents, préposés à la tête de ceux qui faisaient les travaux. Il bâtit Assour, Meguiddo, Guézer, Beth-Horôn-le-Haut et Baalath. C''est après avoir bâti la maison du Seigneur et le mur d''enceinte de Jérusalem qu''il bâtit ces villes. De son vivant, David avait donné cet ordre à Salomon : Tu as avec toi Shiméi, fils de Guéra, fils de la descendance de Yamini (= Benjaminite), d''Hébron. Celui-ci a proféré contre moi une grave malédiction le jour où je partais au camp (= en exil). Il est descendu à ma rencontre au Jourdain, et je lui ai juré par le Seigneur : « Tu ne seras pas tué par l''épée. » Mais maintenant, tu ne dois pas le laisser impuni ; tu es un homme intelligent et tu sais ce que tu dois lui faire ; c''est dans le sang que tu feras descendre ses cheveux blancs dans le séjour des morts. Cf. 3.1 ; 5.9s,14,29 ; 6.38 ; chap. 7 ; 8.9 ; 9.15ss,23ss,30 ; 11.27.'
  - type: text
    content: A sa place, le roi nomma Benaya, fils de Joïada, à la tête de l'armée ; quant à Tsadoq, le prêtre, il le nomma à la place d'Abiathar.
  - type: heading
    content: Salomon se débarrasse de Shiméi
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Shiméi v. 8s ; 1.8n. –  ni d''un côté ni de l''autre  : même expression hébraïque rare v. 42 ; 2R 5.25.'
  - type: text
    content: 'Le roi envoya appeler Shiméi et lui dit : Bâtis-toi une maison à Jérusalem ; tu y habiteras, et tu n''en sortiras pas, ni d''un côté ni de l''autre. '
  '37':
  - type: note
    content: 'l''oued Cédron  : cours d''eau qui a donné son nom à la vallée, orientée nord-sud, qui sépare la colline de Sion du mont des Oliviers. –  ton sang sera sur ta tête  : cf. v. 32n. LXX ajoute et le roi lui jura cela le jour-même  ; cf. v. 42.'
  - type: text
    content: 'Sache bien que tu mourras le jour où tu sortiras pour passer l''oued Cédron ; ton sang sera sur ta tête. '
  '38':
  - type: note
    content: 'C''est bien  : litt. c''est une bonne parole (ou chose, ou affaire  ; ces autres sens sont possibles). Cf. v. 42 ; 18.24 ; Ex 18.17 ; Dt 1.14 ; 1S 26.16 ; Né 5.9. –  longtemps  : LXX porte trois ans.'
  - type: text
    content: 'Shiméi répondit au roi : C''est bien ! Je ferai ce qu''a dit mon seigneur le roi. Shiméi habita longtemps à Jérusalem.'
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Akish, fils de Maaka, roi de Gath  : cf. 1S 21.11,13 ; 27.2 et les notes. –  Gath  : une des 5 principales villes philistines. Cf. Jos 10.41n  ; 11.22n.'
  - type: text
    content: 'Au bout de trois ans, deux serviteurs de Shiméi s''enfuirent chez Akish, fils de Maaka, roi de Gath. On le dit à Shiméi : Tes serviteurs sont à Gath ! '
  '4':
  - type: note
    content: 'réalise  : litt. fasse lever, autre traduction confirme  ; cf. 2Ch 10.15. –  Si tes fils…  : cf. 8.25 ; Ps 132.12 ; 2Ch 6.16. –  de tout leur cœur et de toute leur âme (cf. Gn 1.20n) 8.48 ; Dt 4.29 ; 6.5 ; 10.12 ; 11.13 ; 13.4 ; 26.16 ; 30.2,6,10 ; Jos 22.5 ; 23.14 ; 2R 23.3,25 ; Jr 32.41 ; 2Ch 15.12 ; 34.31. –  tu auras toujours…  : litt. il ne sera pas retranché pour toi d''homme de dessus le trône d''Israël  ; cf. 8.25 ; 9.5 ; Jr 33.17 ; 2Ch 6.16 ; 7.18. Voir aussi 1S 2.33 ; Jr 35.19.'
  - type: text
    content: 'et afin que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' réalise la parole qu''il a prononcée sur moi : « Si tes fils prennent garde à leur voie, en marchant loyalement devant moi, de tout leur cœur et de toute leur âme, tu auras toujours un successeur sur le trône d''Israël. » '
  '40':
  - type: note
    content: 'Shiméi s''en alla donc  : absent dans un ms de LXX et dans Vg.'
  - type: text
    content: Shiméi sella son âne et s'en alla à Gath chez Akish pour chercher ses serviteurs. Shiméi s'en alla donc et ramena ses serviteurs de Gath.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'et qu''il était de retour  : LXX et qu''il avait ramené ses serviteurs.'
  - type: text
    content: 'On dit à Salomon que Shiméi était allé de Jérusalem à Gath, et qu''il était de retour. '
  '42':
  - type: note
    content: 'le jour où tu sortiras  : LXX ajoute de Jérusalem. –  pour aller d''un côté ou de l''autre v. 36n. –  Ne m''as-tu pas…  : absent de LXX.'
  - type: text
    content: 'Le roi envoya appeler Shiméi et lui dit : Ne t''ai-je pas fait prêter serment par le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et ne t''ai-je pas donné cet avertissement : « Sache bien que tu mourras le jour où tu sortiras pour aller d''un côté ou de l''autre ! » Ne m''as-tu pas alors répondu : « C''est bien ! j''ai entendu ! » '
  '43':
  - type: note
    content: 'gardé et observé traduisent un seul et même verbe hébreu. –  le serment du Seigneur  : cf. Ex 22.10 ; 2S 21.7 (même expression hébraïque).'
  - type: text
    content: 'Pourquoi donc n''as-tu pas gardé le serment du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et observé le commandement que je t''avais donné ? '
  '44':
  - type: note
    content: 'tu sais tout le mal que ton cœur sait avoir fait  : certains suppriment cette répétition du texte hébreu traditionnel. –  fera retomber… sur ta tête  : même expression hébraïque en Jg 9.57 ; 1S 25.39 ; 2Ch 6.23. –  ce mal  : litt. ton mal.'
  - type: text
    content: 'Et le roi dit à Shiméi : Toi, tu sais tout le mal que ton cœur sait avoir fait à David, mon père ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera retomber ce mal sur ta tête. '
  '45':
  - type: note
    content: 'Voir bénédiction. –  le trône… affermi  : cf. 2S 7.16 ; Ps 93.2 ; Pr 16.12 ; 1Ch 17.14.'
  - type: text
    content: 'Mais le roi Salomon est béni, et le trône de David sera pour toujours affermi devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '46':
  - type: note
    content: 'la royauté… affermie  : cf. v. 12 ; 2Ch 1.1.'
  - type: text
    content: Le roi donna ses ordres à Benaya, fils de Joïada, qui sortit pour l'exécuter ; c'est ainsi qu'il mourut. Ainsi la royauté fut affermie dans la main de Salomon.
  '5':
  - type: note
    content: 'Joab, fils de Tserouya 1.7n. –  Abner, fils de Ner v. 32 ; 1S 14.50n  ; 26.5,14 ; 2S 2.8,12 ; 3.23,25,28,37 ; 1Ch 26.28. –  Amasa, fils de Yéter (fils de Yitra en 2S 17.25) v. 32 ; voir aussi 2S 3.26-39 ; 20.4-13 ; 1Ch 2.17. –  il a versé  : LXX il a vengé.'
  - type: text
    content: 'Tu sais bien ce que m''a fait Joab, fils de Tserouya, ce qu''il a fait aux deux chefs des armées d''Israël, à Abner, fils de Ner, et à Amasa, fils de Yéter. Il les a tués, il a versé le sang de la guerre pendant la paix, et il a mis le sang de la guerre sur la ceinture qu''il avait aux reins et sur les sandales qu''il avait aux pieds. '
  '6':
  - type: note
    content: 'tu ne laisseras pas ses cheveux blancs…  : pour cette expression, cf. v. 9 ; Gn 42.38 ; 44.29,31.'
  - type: text
    content: 'Tu agiras selon ta sagesse, et tu ne laisseras pas ses cheveux blancs descendre en paix au séjour des morts. '
  '7':
  - type: note
    content: 'les fils de Barzillaï  : cf. Esd 2.61 ; Né 7.63 ; voir aussi 2S 17.27ss ; 21.8. –  ceux qui mangent à ta table  : manger à la table du roi, c''est recevoir sa protection ; cf. 18.19 ; 2S 9.7,11 ; 19.29 ; 2R 25.29s ; Né 5.17. –  ils se sont joints à moi  : litt. ils se sont approchés de moi (pour me venir en aide). –  alors que je fuyais…  : cf. 2S 15.14-18 ; 17.27ss ; 19.32-40 ; Ps 3.1.'
  - type: text
    content: 'Tu agiras avec fidélité envers les fils de Barzillaï, le Galaadite ; ils seront de ceux qui mangent à ta table ; car ils ont agi de la même manière quand ils se sont joints à moi alors que je fuyais pour échapper à Absalom, ton frère. '
  '8':
  - type: note
    content: 'Shiméi 1.8n. –  Bahourim en Benjamin (2S 3.16 ; 16.5 ; 17.18 ; 19.16), peut-être à 3 km au nord-est de Jérusalem. –  malédictions  : voir bénédiction, malédiction. –  violentes  : litt. douloureuses  ; cf. Mi 2.10 ; Jb 6.25n. –  Mahanaïm (Les Deux Camps ou Les Deux Troupes), forteresse de Galaad (4.14 ; Gn 32.3 ; Jos 13.26,30 ; 21.38 ; 2S 2.8,12,29 ; 17.24,27 ; 19.33 ; 1Ch 6.65) dont le site est discuté ; peut-être à 40 km à l''est de Naplouse. –  Je ne te ferai pas mettre à mort par l''épée  : cf. 2S 16.5-13 ; 19.17-24.'
  - type: text
    content: 'Tu as avec toi Shiméi, fils de Guéra, Benjaminite, de Bahourim. Il a prononcé contre moi des malédictions violentes le jour où j''allais à Mahanaïm. Mais il descendit à ma rencontre vers le Jourdain, et je lui fis ce serment par le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : « Je ne te ferai pas mettre à mort par l''épée. » '
  '9':
  - type: note
    content: 'Maintenant  : certains mss de LXX et Vg ont lu toi  ; cf. 1.18n. –  ne le laisse pas impuni  : autre traduction ne le tiens pas pour innocent. –  un homme sage  : cf. v. 6. –  C''est dans le sang…  : cf. v. 6n. – Voir séjour des morts.'
  - type: text
    content: Maintenant, ne le laisse pas impuni ; car tu es un homme sage, et tu sais comment tu dois le traiter. C'est dans le sang que tu feras descendre ses cheveux blancs au séjour des morts.
  - type: heading
    content: David meurt et Salomon lui succède
  - type: heading
    content: 1Ch 29.26-30
