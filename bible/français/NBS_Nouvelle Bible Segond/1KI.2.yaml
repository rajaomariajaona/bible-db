    text: 'Tu as avec toi Shiméi, fils de Guéra, Benjaminite, de Bahourim. Il a prononcé contre moi des malédictions violentes le jour où j''allais à Mahanaïm. Mais il descendit à ma rencontre vers le Jourdain, et je lui fis ce serment par le '
