  - type: text
    text: 'Tu sais bien ce que m''a fait Joab, fils de Tserouya, ce qu''il a fait aux deux chefs des armées d''Israël, à Abner, fils de Ner, et à Amasa, fils de Yéter. Il les a tués, il a versé le sang de la guerre pendant la paix, et il a mis le sang de la guerre sur la ceinture qu''il avait aux reins et sur les sandales qu''il avait aux pieds. '
