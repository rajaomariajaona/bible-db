      - type: text
        text: 'Le Seigneur donna à Salomon de l''intelligence, une sagesse extraordinairement grande, un cœur aussi vaste que le sable qui est au bord de la mer. L''intelligence de Salomon surpassa de beaucoup celle de tous les anciens et de tous les sages d''Egypte. Il épousa la fille du pharaon et l''installa dans la Ville de David, jusqu''à ce qu''il eût achevé sa maison, la maison du Seigneur tout d''abord, et la muraille de Jérusalem tout autour. Il fit cela et l''acheva en sept ans. Salomon avait soixante-dix mille porteurs de fardeaux et quatre-vingt mille tailleurs de pierre dans la montagne. Salomon fit la mer et les socles, les grands bassins et les colonnes, la fontaine de la cour et la mer de cuivre. Il bâtit la citadelle comme fortification et retrancha (fit une brèche à ?) la Ville de David. Ainsi la fille du pharaon montait (directement) de la Ville de David à sa maison, celle qu''il lui avait bâtie. Alors il bâtit la citadelle. Salomon apportait trois fois par an des holocaustes et des sacrifices de paix sur l''autel qu''il avait bâti pour le Seigneur, et il sacrifiait devant le Seigneur. Il acheva la maison. Les chefs préposés aux travaux de Salomon étaient trois mille six cents, préposés à la tête de ceux qui faisaient les travaux. Il bâtit Assour, Meguiddo, Guézer, Beth-Horôn-le-Haut et Baalath. C''est après avoir bâti la maison du Seigneur et le mur d''enceinte de Jérusalem qu''il bâtit ces villes. De son vivant, David avait donné cet ordre à Salomon : Tu as avec toi Shiméi, fils de Guéra, fils de la descendance de Yamini (= Benjaminite), d''Hébron. Celui-ci a proféré contre moi une grave malédiction le jour où je partais au camp (= en exil). Il est descendu à ma rencontre au Jourdain, et je lui ai juré par le Seigneur : « Tu ne seras pas tué par l''épée. » Mais maintenant, tu ne dois pas le laisser impuni ; tu es un homme intelligent et tu sais ce que tu dois lui faire ; c''est dans le sang que tu feras descendre ses cheveux blancs dans le séjour des morts'
    - type: usfm
