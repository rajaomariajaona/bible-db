document_id: MAT.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jean le Baptiseur
  - type: heading
    content: Mc 1.2-6  ; Lc 3.1-6  ; cf. Jn 1.19-23
  - type: text
    content: ' '
  - type: note
    content: 'Jean le Baptiseur , selon le sens du terme traditionnellement transcrit Baptiste  ; cf. Mc 1.4n. –  proclamait 4.17,23 ; 9.35 ; 10.7,27 ; 11.1 ; 12.41 ; 24.14 ; 26.13 ; Mc 1.4n. –  désert (cf. 4.1 ; 11.7 ; 14.13 ; 24.26) de Judée  : partie plus ou moins stérile du territoire de Judée, s''étendant à l''est jusqu''à la mer Morte et aux environs du Jourdain (Jg 1.16) ; cf. 1 Maccabées 2.29 : « Alors beaucoup de gens qui recherchaient la justice et l''équité descendirent au désert pour s''y établir. » La communauté de Qumrân, qui nous est connue depuis la découverte des manuscrits de la mer Morte, fournit quelques analogies avec ce que nous savons de Jean le Baptiseur (Mc 1.4n).'
  - type: text
    content: 'En ces jours-là parut Jean le Baptiseur ; il proclamait dans le désert de Judée : '
  '10':
  - type: note
    content: 'est prête…  : litt. se tient contre la racine des arbres  ; cf. 7.19 ; 13.42 ; Ml 3.19 ; Jn 15.6. –  de beau fruit  : autre traduction de bons fruits. – Cf. Le Pasteur d''Hermas, Sim. IV,4 : « Mais les gentils (c.-à-d. les païens ; voir non-Juifs) et les pécheurs, – les arbres secs que tu as vus, – seront trouvés tels : secs et stériles dans ce monde-là, et comme du bois mort, ils seront brûlés, et il sera clair que leur conduite, au cours de leur vie, fut mauvaise. Car les pécheurs seront brûlés parce qu''ils ont péché et ne se sont pas repentis, et les gentils seront brûlés parce qu''ils n''ont pas connu leur Créateur. »'
  - type: text
    content: 'Déjà la hache est prête à attaquer les arbres à la racine : tout arbre donc qui ne produit pas de beau fruit est coupé et jeté au feu.'
  - type: heading
    content: Celui qui vient
  - type: heading
    content: Mc 1.7-8  ; Lc 3.15-17  ; cf. Jn 1.24-28
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'je vous baptise…  : cf. Mc 1.8+ ; Jn 1.26,33 ; Ac 1.5 ; 2.3,38 ; 11.16 ; 19.4. –  dans l''eau / dans l''Esprit saint  : autre traduction d''eau / d''Esprit saint . –  changement radical v. 2n. –  derrière  : autre traduction après  ; même préposition 4.19n  ; 10.38n  ; 16.23ns ; 24.18n  ; cf. Jn 1.15n. –  puissant 12.29. –  ce serait encore trop d''honneur pour moi…  : litt. je ne suis pas suffisant pour… , au sens d’ assez compétent ou assez digne  ; même expression en 8.8. –  de lui ôter  : c''est le geste de l''esclave ; autre traduction de lui porter ses sandales . –  feu v. 10,12 ; Za 13.9 ; Ml 3.2 ; 1P 1.7.'
  - type: text
    content: 'Moi, je vous baptise dans l''eau, pour un changement radical ; mais celui qui vient derrière moi est plus puissant que moi, et ce serait encore trop d''honneur pour moi que de lui ôter ses sandales. Lui vous baptisera dans l''Esprit saint et le feu. '
  '12':
  - type: note
    content: 'fourche ou van  ; on utilisait diverses sortes de pelles, de fourches ou de plateaux percés pour vanner, c.-à-d. secouer le blé et séparer le grain de la balle. L''opération consistait généralement à lancer le tout en l''air pour que la balle s''envole et que le grain retombe sur l’aire  ; cf. 13.30 ; Es 27.12s ; Jl 4.12s ; Ap 14.14ss. –  son blé dans la grange  : certains mss portent le blé dans la grange, le blé dans sa grange ou son blé dans sa grange. –  feu…  : cf. 5.22+.'
  - type: text
    content: Il a sa fourche à la main, il nettoiera son aire, il recueillera son blé dans la grange, mais il brûlera la paille dans un feu qui ne s'éteint pas.
  - type: heading
    content: Jésus reçoit le baptême
  - type: heading
    content: Mc 1.9-11  ; Lc 3.21-22  ; cf. Jn 1.29-34
  '13':
  - type: text
    content: ' '
  - type: note
    content: 2.22.
  - type: text
    content: 'Alors Jésus arrive de Galilée au Jourdain, vers Jean, pour recevoir de lui le baptême. '
  '14':
  - type: note
    content: 'Cf. 11.2-6 ; Jn 13.6. Evangile des ébionites (Epiphane, Panarion, 30,13,7s) : « S''étant alors prosterné (après le baptême de Jésus et la voix venue du ciel, cf. Lc 3.21n), Jean lui dit : “Je te prie, Seigneur, toi aussi, baptise-moi.” Mais Jésus l''empêcha en disant : “Laisse, car c''est ainsi qu''il convient que tout soit accompli.” »'
  - type: text
    content: 'Mais Jean s''y opposait en disant : C''est moi qui ai besoin de recevoir de toi le baptême, et c''est toi qui viens à moi ! '
  '15':
  - type: note
    content: '5.17 ; Lc 2.21-24. –  toute justice ou tout ce qui est juste  ; la justice est pour Matthieu une fidélité absolue à Dieu, comprise comme obéissance à sa loi ou plus généralement à sa volonté 5.6,10,20 ; 6.1,33 ; 21.32 ; voir aussi 1.19n  ; cf. Rm 1.16s ; Jc 1.20. –  il le laissa faire, c.-à-d. Jean accéda à la requête de Jésus. – Un ms latin du IVe s. ajoute  : Et tandis qu''il recevait le baptême, une lumière intense jaillit de l''eau, de sorte que tous ceux qui étaient là eurent peur.'
  - type: text
    content: 'Jésus lui répondit : Laisse faire maintenant, car il convient qu''ainsi nous accomplissions toute justice. Alors il le laissa faire. '
  '16':
  - type: note
    content: 'les cieux s''ouvrirent Es 61.1 ; 63.19 ; Ez 1.1 ; Jn 1.33,51 ; Ac 7.56 ; 10.11-16 ; Ap 4.1 ; 19.11. –  pour lui  : cette précision est absente de certains mss. –  l''Esprit / colombe Gn 1.2n  ; voir aussi Gn 8.12-16 ; Ct 2.14 ; 5.2.'
  - type: text
    content: 'Aussitôt baptisé, Jésus remonta de l''eau. Alors les cieux s''ouvrirent pour lui, il vit l''Esprit de Dieu descendre comme une colombe et venir sur lui. '
  '17':
  - type: note
    content: 'Es 42.1 ; Ps 2.7. –  voix 17.5 ; Jn 12.28-30 ; cf. Dn 4.28 ; Ap 11.12. –  mon Fils bien-aimé ou mon Fils, le bien-aimé. –  c''est en lui…  : autres traductions celui qui a ma faveur, celui qui m''a plu, celui qu''il m''a plu de choisir, cf. 11.26 ; 12.18 ; 17.5 ; voir aussi Jn 10.17.'
  - type: text
    content: 'Et une voix retentit des cieux : Celui-ci est mon Fils bien-aimé ; c''est en lui que j''ai pris plaisir.'
  '2':
  - type: note
    content: '4.17. –  Changez radicalement  : traduction traditionnelle repentez-vous. Le terme grec implique davantage que le regret du passé ; il signifie un changement intérieur, profond, qui se manifeste par un changement de comportement engageant l''avenir ; autre traduction convertissez-vous  ; terme apparenté v. 8,11 ; 11.20s ; 12.41 ; cf. Es 6.10 ; Ez 3.19 ; Sagesse 11.23 : « Tu détournes les yeux des péchés des hommes pour les amener au repentir. » 12.19 : « Tu as rempli tes fils d''espérance puisque tu offres le repentir pour les péchés. » –  règne ou royaume  : c''est un même mot grec qui est traduit, selon le contexte, par règne (4.17,23 ; 6.10,33 ; 9.35 etc.), royaume (4.8 ; 5.3,10,19s ; 7.21 ; 8.11s etc.) ou royauté (16.28 ; Lc 19.12,15). Selon l''usage juif qui évite d''employer le nom de Dieu (Mt 5.48 ; 6.9 ; 7.21), Matthieu préfère l''expression règne ou royaume des cieux (voir Dn 4.23n) à règne ou royaume de Dieu (seulement 12.28 ; 19.24 ; 21.31,43). –  s''est approché  : on pourrait aussi traduire est tout proche, voire est là  ; cf. 4.17 ; 10.7 (même forme verbale, dans les deux sens temporel et spatial, en 26.45s) ; cf. 12.28 ; 21.34 ; voir aussi Lc 10.9,11 ; 21.8,20 ; Rm 13.12 ; Jc 5.8 ; 1P 4.7.'
  - type: text
    content: Changez radicalement, car le règne des cieux s'est approché !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'du prophète Esaïe 1.22+ ; Es 40.3  ; cf. Lc 1.76 ; Jn 1.6s,23. –  celui  : litt. la voix de celui . –  rendez droits  : autre traduction aplanissez.'
  - type: text
    content: 'C''est de lui qu''il a été dit, par l''entremise du prophète Esaïe :'
  - type: text
    content: 'C''est celui qui crie dans le désert :'
  - type: text
    content: Préparez le chemin du Seigneur,
  - type: text
    content: rendez droits
  - type: text
    content: ' ses '
  - type: text
    content: sentiers !
  '4':
  - type: text
    content: ' '
  - type: note
    content: vêtement de poil 11.8 ; 2R 1.8 (Elie, cf. Ml 3.23 ; Mt 17.9-13) ; cf. Za 13.4. –  criquets ou sauterelles Lv 11.21s. –  miel sauvage Jg 14.8.
  - type: text
    content: Jean avait un vêtement de poil de chameau et une ceinture de cuir autour des reins. Il se nourrissait de criquets et de miel sauvage.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '11.7 ; Jn 5.35. –  Les habitants de  : sous-entendu dans le texte.'
  - type: text
    content: 'Les habitants de Jérusalem, de toute la Judée et de toute la région du Jourdain se rendaient auprès de lui '
  '6':
  - type: note
    content: 'recevaient de lui le baptême ou se faisaient baptiser par lui, de même dans la suite ; cf. Jn 1.28. –  le Jourdain  : litt. le fleuve Jourdain. –  reconnaissant publiquement (verbe apparenté en 10.32n  ; cf. Mc 1.5n) leurs péchés Lv 5.5 ; Ps 32.5 ; Pr 28.13.'
  - type: text
    content: et recevaient de lui le baptême dans le Jourdain, en reconnaissant publiquement leurs péchés.
  - type: heading
    content: Le message de Jean le Baptiseur
  - type: heading
    content: Lc 3.7-9
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'baptême v. 1. –  pharisiens / sadducéens (22.23s ; cf. Ez 40.46n) 16.1,6,11s ; 22.34. –  Vipères  : litt. descendance (ou engeance ) de vipères , de même 12.34 ; 23.33 ; voir aussi Jn 8.43s ; cf. Gn 3.15n  ; Ps 140.4. –  colère Es 30.27-33 ; Jn 3.36 ; Rm 1.18 ; 1Th 1.10.'
  - type: text
    content: 'Comme il voyait beaucoup de pharisiens et de sadducéens venir au baptême, il leur dit : Vipères, qui vous a montré comment fuir la colère à venir ? '
  '8':
  - type: note
    content: du changement radical ou de la repentance, de la conversion v. 2n.
  - type: text
    content: 'Produisez donc un fruit digne du changement radical ; '
  '9':
  - type: note
    content: 'susciter  : le même verbe signifie aussi, selon les contextes, réveiller, faire lever, ressusciter, cf. 2.13n.'
  - type: text
    content: 'et ne pensez pas pouvoir dire : « Nous avons Abraham pour père ! » Car je vous dis que de ces pierres Dieu peut susciter des enfants à Abraham. '
