      text: 'Moi, je vous baptise dans l''eau, pour un changement radical ; mais celui qui vient derrière moi est plus puissant que moi, et ce serait encore trop d''honneur pour moi que de lui ôter ses sandales. Lui vous baptisera dans l''Esprit saint et le feu. '
