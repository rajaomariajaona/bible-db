        - type: text
          text: ', Sim. IV,4 : « Mais les gentils (c.-à-d. les païens ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: ') et les pécheurs, – les arbres secs que tu as vus, – seront trouvés tels : secs et stériles dans ce monde-là, et comme du bois mort, ils seront brûlés, et il sera clair que leur conduite, au cours de leur vie, fut mauvaise. Car les pécheurs seront brûlés parce qu''ils ont péché et ne se sont pas repentis, et les gentils seront brûlés parce qu''ils n''ont pas connu leur Créateur. »'
      marker-yv: yv-n
    - type: text
      text: 'Déjà la hache est prête à attaquer les arbres à la racine : tout arbre donc qui ne produit pas de beau fruit est coupé et jeté au feu.'
