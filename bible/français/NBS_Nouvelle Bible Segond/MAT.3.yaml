        - type: text
          text: '), Jean lui dit : “Je te prie, Seigneur, toi aussi, baptise-moi.” Mais Jésus l''empêcha en disant : “Laisse, car c''est ainsi qu''il convient que tout soit accompli.” »'
      marker-yv: yv-n
    - type: text
      text: 'Mais Jean s''y opposait en disant : C''est moi qui ai besoin de recevoir de toi le baptême, et c''est toi qui viens à moi ! '
