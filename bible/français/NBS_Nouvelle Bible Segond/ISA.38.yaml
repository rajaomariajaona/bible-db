      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je suis privé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : en rattachant le verbe à ce qui précède, certains traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je suis assigné aux portes du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: séjour
        - type: text
          text: ' des morts pour le reste… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: – Cf. Jb 17.11-13.
      marker-yv: yv-n
    - type: text
      text: 'Je me disais :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand mes jours sont en repos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je dois m'en aller
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux portes du séjour des morts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis privé du reste de mes années !
