          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de la cessation. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L''expression pourrait désigner le séjour des morts (cf. Ec 9.5s). C''est en intervertissant deux lettres qu''on obtient la leçon '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du monde '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même mot qu'en Ps 17.14 ; 49.2).
      marker-yv: yv-n
    - type: text
      text: 'Je disais : Je ne verrai plus le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (Yah),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (Yah), sur la terre des vivants ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne contemplerai plus aucun être humain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parmi les habitants du monde !
