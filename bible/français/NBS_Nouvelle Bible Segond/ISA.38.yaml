    - type: text
      text: 'En ces jours-là, Ezéchias fut atteint d''une maladie mortelle. Esaïe, fils d''Amots, le prophète, vint lui dire : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Donne tes ordres à ta maison, car tu vas mourir ; tu ne vivras plus. '
