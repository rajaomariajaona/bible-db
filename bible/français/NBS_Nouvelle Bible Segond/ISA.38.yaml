document_id: ISA.38,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Maladie et guérison d'Ezéchias
  - type: heading
    content: 2R 20.1-11
  - type: text
    content: ' '
  - type: note
    content: 'Esaïe, fils d''Amots 1.1+. –  Donne tes ordres…  : cf. 2S 17.23. –  ta maison  : cf. 7.2.'
  - type: text
    content: 'En ces jours-là, Ezéchias fut atteint d''une maladie mortelle. Esaïe, fils d''Amots, le prophète, vint lui dire : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Donne tes ordres à ta maison, car tu vas mourir ; tu ne vivras plus. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'quand mes jours sont en repos  : autres traductions au milieu de mes jours ; dans l''anéantissement de mes jours. LXX à l''apogée de mes jours. –  Je suis privé…  : en rattachant le verbe à ce qui précède, certains traduisent je suis assigné aux portes du séjour des morts pour le reste… – Cf. Jb 17.11-13.'
  - type: text
    content: 'Je me disais :'
  - type: text
    content: quand mes jours sont en repos,
  - type: text
    content: je dois m'en aller
  - type: text
    content: aux portes du séjour des morts.
  - type: text
    content: Je suis privé du reste de mes années !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur (Yah)  : cf. 12.2+. –  sur la terre des vivants Ps 27.13+. –  du monde  : litt. de la cessation. L''expression pourrait désigner le séjour des morts (cf. Ec 9.5s). C''est en intervertissant deux lettres qu''on obtient la leçon du monde (même mot qu''en Ps 17.14 ; 49.2).'
  - type: text
    content: 'Je disais : Je ne verrai plus le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah),'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah), sur la terre des vivants ;'
  - type: text
    content: je ne contemplerai plus aucun être humain
  - type: text
    content: parmi les habitants du monde !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jb 6.9n  ; 7.6 ; Ec 12.6 ; voir aussi Ps 90.5s ; Jb 14.2. –  Ma demeure  : autre traduction mon existence (le mot est habituellement traduit par génération ). –  j''enroule (ou je tranche ) ma vie  : comme un tisserand une étoffe terminée ; certains modifient légèrement le texte pour lire tu enroules ou tu tranches  ; cf. Jr 51.13n  ; Ez 7.25n. –  du métier ou de la misère.'
  - type: text
    content: Ma demeure est enlevée
  - type: text
    content: et exilée loin de moi,
  - type: text
    content: comme une tente de berger ;
  - type: text
    content: comme un tisserand j'enroule ma vie.
  - type: text
    content: Il m'arrache du métier.
  - type: text
    content: Du jour à la nuit tu m'auras achevé !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Je me suis contenu…  : un ms de Qumrân porte avant le matin je serai réduit à néant. Tg je crie (comme un lion). –  lion 31.4 ; Jb 10.16. –  brisait tous mes os Ps 51.10.'
  - type: text
    content: Je me suis contenu jusqu'au matin ;
  - type: text
    content: comme un lion, il brisait tous mes os,
  - type: text
    content: du jour à la nuit tu m'auras achevé !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Je poussais des petits cris 8.19n. –  en voltigeant  : autre traduction plaintive. Certains voient dans le mot hébreu en question le nom d''un deuxième oiseau. –  colombe 59.11 ; Ez 7.16 ; Na 2.8. –  je levais les yeux en haut Ps 121.1 ; 123.1s. –  Seigneur ou, selon certains mss Seigneur (YHWH). –  sois mon garant Jb 17.3.'
  - type: text
    content: Je poussais des petits cris comme une hirondelle en voltigeant,
  - type: text
    content: je gémissais comme la colombe ;
  - type: text
    content: 'misérable, je levais les yeux en haut :'
  - type: text
    content: Seigneur, je suis oppressé,
  - type: text
    content: sois mon garant !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Il m''a répondu  : autres traductions et (que) me dira-t-il ? ou pour qu''il me réponde. Tg comment parlerai-je et que lui dirai-je ? ou comment parlerai-je ? J''ai dit : … –  Je marcherai humblement  : litt. je traînerai, je déambulerai.'
  - type: text
    content: Que dirai-je ? Il m'a répondu,
  - type: text
    content: et c'est lui-même qui a agi.
  - type: text
    content: Je marcherai humblement pendant toutes mes années,
  - type: text
    content: à cause de mon amertume.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Texte hébreu obscur. Litt. (le) Seigneur sur eux, ils vivront et pour tout ce qui est en elles (ou en cela ) vie de mon esprit (ou de mon souffle ) ; cf. Ps 36.10. –  tu me rétablis… Os 6.1s ; Ps 30.3s.
  - type: text
    content: Seigneur, c'est par tes bontés que l'on vit,
  - type: text
    content: c'est par elles que je respire encore ;
  - type: text
    content: tu me rétablis, tu me rends à la vie.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'amertume s''est changée  : jeu d''assonance, en hébreu, mar… mar. –  paix Hé 12.11. –  tu t''es épris…  : autres traductions en t''attachant à ma vie tu l''as arrachée de la fosse… ; tu t''es attaché à me retirer… (ou à retirer ma vie ) ; sur les termes correspondants à moi et à vie , cf. Gn 1.20n. Même verbe en Dt 7.7+. –  tu as rejeté… mes péchés  : cf. 33.24 ; voir aussi 1R 14.9 ; Ez 23.35 ; Né 9.26.'
  - type: text
    content: Mon amertume s'est changée en paix.
  - type: text
    content: Toi, tu t'es épris de moi au point de me retirer de la fosse du néant,
  - type: text
    content: car tu as rejeté derrière ton dos tous mes péchés.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 6.6 ; 30.10 ; 88.6,11-13 ; 115.17s ; Ec 9.10. Cf. Baruch 2.17 : « Ce ne sont pas les morts dans l''Hadès, eux dont le souffle fut retiré des entrailles, qui rendront gloire et justice au Seigneur. » –  n''espèrent  : même verbe en Ps 104.27 ; 119.166 ; 145.15 ; 146.5. –  ta loyauté ou ta vérité  ; de même au v. 19.'
  - type: text
    content: Car ce n'est pas le séjour des morts qui te célébrera,
  - type: text
    content: ce n'est pas la mort qui te louera ;
  - type: text
    content: ceux qui descendent dans le gouffre n'espèrent plus rien de
  - type: text
    content: ta loyauté.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ps 119.175 ; 146.2. –  père / fils Dt 4.9 ; Ps 78.3-7.
  - type: text
    content: Le vivant, le vivant, c'est celui-là qui te célèbre,
  - type: text
    content: comme moi aujourd'hui ;
  - type: text
    content: le père fait connaître aux fils ta loyauté.
  '2':
  - type: text
    content: 'Ezéchias tourna son visage vers le mur et pria le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'm''a sauvé  : litt. pour me sauver , ce qui pourrait aussi justifier d''autres traductions  : puisque tu m''as sauvé, nous ferons… ; sauve-moi, et nous ferons… Cf. 12.2. –  mes instruments (Ps 33.3) ou mes mélodies. Le grec a partout la première personne du singulier, le syriaque la première du pluriel. –  à (litt. sur ou près de ) la maison du Seigneur 37.1.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a sauvé !'
  - type: text
    content: Nous ferons résonner mes instruments,
  - type: text
    content: tous les jours de notre vie,
  - type: text
    content: 'à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '21':
  - type: text
    content: ' '
  - type: note
    content: '2R 20.7. –  et Ezéchias vivra  : litt. et il vivra.'
  - type: text
    content: 'Esaïe avait dit : Qu''on apporte un gâteau de figues sèches et qu''on l''applique sur l''ulcère ; et Ezéchias vivra. '
  '22':
  - type: note
    content: 2R 20.8. –  signe v. 7.
  - type: text
    content: 'Ezéchias avait dit : Quel est le signe que je monterai à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  '3':
  - type: note
    content: Voir cœur.
  - type: text
    content: 'Il disait : S''il te plaît, '
  - type: text
    content: Seigneur
  - type: text
    content: ', souviens-toi, je t''en prie, que j''ai marché devant toi avec loyauté et d''un cœur entier, et que j''ai fait ce qui te plaît ! Et Ezéchias se mit à pleurer abondamment.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2R 20.4s, plus détaillé.
  - type: text
    content: 'Alors la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Esaïe : '
  '5':
  - type: note
    content: 'ton père, c.-à-d. ton ancêtre. –  larmes Jr 9.17 ; Ps 39.13 ; 56.9. –  à ta vie  : litt. à tes jours.'
  - type: text
    content: 'Va dire à Ezéchias : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de David, ton père : J''ai entendu ta prière, j''ai vu tes larmes. J''ajoute quinze années à ta vie. '
  '6':
  - type: note
    content: 37.35+.
  - type: text
    content: 'Je te délivrerai, ainsi que cette ville, de la main du roi d''Assyrie ; je protégerai cette ville. '
  '7':
  - type: note
    content: le signe 7.11+ ; 37.30 ; cf. v. 21s, qui précèdent dans le texte parallèle (2R 20.7-11).
  - type: text
    content: 'Voici quel sera pour toi, de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le signe que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera ce qu''il a dit : '
  '8':
  - type: note
    content: 'degrés d''un cadran solaire ou d''un escalier : un ms de Qumrân porte les degrés de la chambre à l''étage (Jg 3.20n), ce qui pèse en faveur de la seconde hypothèse. –  Achaz 1.1 ; 7.1.'
  - type: text
    content: Je fais revenir de dix degrés en arrière, avec le soleil, l'ombre des degrés qui est descendue sur les degrés d'Achaz. Et le soleil revint de dix degrés sur les degrés où il était descendu.
  - type: heading
    content: Prière d'Ezéchias après sa guérison
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ecrit  : le mot hébreu ressemble à celui qui est traduit par hymne dans la suscription des Ps 16 ; 56–60. LXX prière. Ce poème (v. 9-20) ne figure pas dans le texte de 2R 20. Sur l''ensemble, cf. Ps 6 ; 30 ; Jon 2.'
  - type: text
    content: Ecrit d'Ezéchias, roi de Juda, lorsqu'il fut malade et survécut à sa maladie.
