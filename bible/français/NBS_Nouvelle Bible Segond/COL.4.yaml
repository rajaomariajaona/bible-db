      marker-yv: yv-n
    - type: text
      text: 'Epaphras, qui est des vôtres, vous salue : esclave de Jésus-Christ, il ne cesse de combattre pour vous dans ses prières, afin que, parvenus à l''accomplissement et pleinement convaincus de la volonté de Dieu, vous teniez bon. '
