document_id: COL.4,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Maître(s) 3.22n  ; cf. Lv 25.43,53 ; Ep 6.9. –  ce qui est juste et équitable  : cf. Mt 20.4. –  vous avez un Maître ou un Seigneur  : cf. Ec 5.7 ; 1Tm 6.15.'
  - type: text
    content: Maîtres, accordez à vos esclaves ce qui est juste et équitable, sachant que, vous aussi, vous avez un Maître dans le ciel.
  - type: heading
    content: Attitude à l'égard de ceux du dehors
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Phm 24. –  Aristarque Ac 19.29+. –  compagnon de captivité Rm 16.7 ; Phm 23. –  Marc Ac 12.12+ ; 2Tm 4.11. –  Barnabé Ac 4.36+ ; cf. 15.37-39. –  faites-lui bon accueil  : cf. Ac 18.27+.'
  - type: text
    content: 'Aristarque, mon compagnon de captivité, vous salue, ainsi que Marc, le cousin de Barnabé – au sujet duquel vous avez reçu des instructions : s''il vient vous voir, faites-lui bon accueil. '
  '11':
  - type: note
    content: 'Aussi Jésus…  : cf. Phm 23n  ; il faut vraisemblablement comprendre  : Jésus… vous salue aussi. –  les circoncis  : litt. ceux qui sont de la circoncision, cf. 3.11n  ; Ga 2.12+ ; Tt 1.10n. –  le royaume (ou le règne) de Dieu  : cf. 1.13 ; 1Co 4.20.'
  - type: text
    content: 'Aussi Jésus, qu''on appelle Justus. Parmi les circoncis ce sont les seuls qui collaborent avec moi pour le royaume de Dieu ; ils ont été pour moi un réconfort. '
  '12':
  - type: note
    content: Epaphras 1.7+ ; Phm 23. –  esclave de Jésus-Christ (ou, selon certains mss, du Christ) ; cf. Rm 1.1 ; Ph 1.1. –  combattre… 1.28-29+ ; cf. Gn 18.17-32 ; 32.29 ; Ex 32.11-14 ; Rm 15.30. –  parvenus à l'accomplissement 1.28n. –  pleinement convaincus Rm 4.21+.
  - type: text
    content: 'Epaphras, qui est des vôtres, vous salue : esclave de Jésus-Christ, il ne cesse de combattre pour vous dans ses prières, afin que, parvenus à l''accomplissement et pleinement convaincus de la volonté de Dieu, vous teniez bon. '
  '13':
  - type: note
    content: Laodicée (2.1n) et Hiérapolis, villes voisines de Colosses.
  - type: text
    content: 'Je lui rends ce témoignage qu''il se donne beaucoup de mal pour vous, pour ceux de Laodicée et pour ceux de Hiérapolis. '
  '14':
  - type: note
    content: Luc / Démas Phm 24 ; cf. 2Tm 4.10+s.
  - type: text
    content: Luc, le médecin bien-aimé, vous salue, ainsi que Démas.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Nympha ou Nymphas , femme ou homme selon les mss. –  l'Eglise… Rm 16.5 ; Phm 2.
  - type: text
    content: 'Saluez les frères qui sont à Laodicée, ainsi que Nympha et l''Eglise qui est dans sa maison. '
  '16':
  - type: note
    content: 'Cf. 1Th 5.27. –  celle… de Laodicée  : cette lettre est probablement perdue ; certains cependant l''identifient à notre épître aux Ephésiens (voir Ep 1.1n et l''introduction).'
  - type: text
    content: 'Quand cette lettre aura été lue chez vous, faites en sorte qu''elle soit aussi lue dans l''Eglise des Laodicéens, et que, vous, vous lisiez également celle qui vous arrivera de Laodicée. '
  '17':
  - type: note
    content: Archippe Phm 2. –  ministère ou service, 1.7n,23n.
  - type: text
    content: 'Dites à Archippe : Prends garde au ministère que tu as reçu dans le Seigneur, afin de bien le remplir.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'de ma propre main 1Co 16.21+ ; 2Th 3.17 ; Phm 19. –  ma condition de prisonnier  : litt. mes liens , Ph 1.7n  ; cf. Ep 3.1+ ; 2Tm 1.8 ; 2.19 ; Phm 1,9s,13. –  Que la grâce soit avec vous 1Tm 6.21 ; 2Tm 4.22. – Certains mss portent, avec diverses variantes, l''indication suivante  : Aux Colossiens, écrite de Rome, par l''entremise de Tychique et d''Onésime.'
  - type: text
    content: Je vous salue, moi, Paul, de ma propre main. Souvenez-vous de ma condition de prisonnier. Que la grâce soit avec vous !
  '2':
  - type: text
    content: ' '
  - type: note
    content: Consacrez-vous assidûment à la prière Ac 2.42+ ; Rm 12.12 ; Ep 6.18 ; Ph 4.6 ; 1Th 5.17s ; cf. Lc 18.1-8. –  par elle (ou en elle ) , veillez Mt 26.41 ; 1Th 5.6. –  dans l'action de grâces 1.3+ ; 2.7.
  - type: text
    content: 'Consacrez-vous assidûment à la prière ; par elle, veillez, dans l''action de grâces. '
  '3':
  - type: note
    content: 'Rm 15.30+ ; Ep 6.19 ; 1Th 5.25 ; 2Th 3.1. –  une porte Ac 14.27+ ; cf. 1Co 16.9 ; 2Co 2.12. –  que se dise  : litt. dire  ; le même verbe est traduit par parler à la fin du v. 4. –  mystère  : cf. 1.26 ; 2.2. –  en prison  : litt. lié.'
  - type: text
    content: 'Priez également pour nous, afin que Dieu nous ouvre une porte pour la Parole et que se dise le mystère du Christ, pour lequel je suis en prison ; '
  '4':
  - type: note
    content: 'Ep 6.20 ; cf. 1Co 9.16. –  que j''en parle clairement…  : autre traduction que je le rende manifeste quand il me faut parler.'
  - type: text
    content: 'que j''en parle clairement comme je dois en parler. '
  '5':
  - type: note
    content: 'Comportez-vous  : litt. marchez  ; cf. Ep 5.15n. –  ceux du dehors Mc 4.11+ ; cf. 1Co 5.12s ; 1Th 4.12 ; 1Tm 3.7 ; voir aussi Rm 12.17 ; 1P 2.12. –  Rachetez le temps  : on pourrait comprendre ici saisissez l''occasion  ; cf. Ep 5.16.'
  - type: text
    content: 'Comportez-vous avec sagesse envers ceux du dehors. Rachetez le temps. '
  '6':
  - type: note
    content: 'Cf. 3.16 ; Ep 4.29. –  accompagnée de grâce  : litt. en grâce, cf. Pr 10.32 ; 15.23 ; 25.11 ; Ec 10.12. –  assaisonnée de sel  : cf. Mt 5.13+. –  répondre à chacun  : cf. 1P 3.15.'
  - type: text
    content: Que votre parole soit toujours accompagnée de grâce, assaisonnée de sel, pour que vous sachiez comment vous devez répondre à chacun.
  - type: heading
    content: Messages personnels et salutations
  '7':
  - type: text
    content: ' '
  - type: note
    content: En ce qui me concerne Ph 1.12+. –  Tychique Ac 20.4+ ; Ep 6.19n,21n  ; 2Tm 4.12 ; Tt 3.12. –  ministre / compagnon d'esclavage 1.7n.
  - type: text
    content: 'En ce qui me concerne, Tychique, qui est, dans le Seigneur, le frère bien-aimé, le ministre digne de confiance et le compagnon d''esclavage, vous mettra au courant de tout. '
  '8':
  - type: note
    content: 'Ep 6.22. –  qu''il vous encourage  : litt. qu''il encourage (ou console) vos cœurs 2.2n.'
  - type: text
    content: 'Je vous l''envoie tout exprès pour que vous connaissiez notre situation, et pour qu''il vous encourage. '
  '9':
  - type: note
    content: Onésime Phm 10-12.
  - type: text
    content: Je l'envoie avec Onésime, le frère bien-aimé et digne de confiance, qui est des vôtres. Ils vous mettront au courant de tout ce qui se passe ici.
