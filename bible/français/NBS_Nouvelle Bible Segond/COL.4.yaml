      marker-yv: yv-n
    - type: text
      text: 'Aussi Jésus, qu''on appelle Justus. Parmi les circoncis ce sont les seuls qui collaborent avec moi pour le royaume de Dieu ; ils ont été pour moi un réconfort. '
