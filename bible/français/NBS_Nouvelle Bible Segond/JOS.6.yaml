document_id: JOS.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Israélites s'emparent de Jéricho
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jéricho…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : dans '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ce chap. est beaucoup plus court que dans le texte hébreu traditionnel. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Personne n'en sortait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Nb 27.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jéricho était complètement fermée devant les Israélites. Personne n''en sortait et personne n''y entrait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les vaillants guerriers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains rattachent cette expression au v. 3 (elle désignerait alors les soldats de Josué) ; d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jéricho, son roi et ses vaillants guerriers.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Josué : Regarde, je t''ai livré Jéricho, son roi, les vaillants guerriers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous ferez le tour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous tournerez… autour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : mêmes verbes Ps 48.13.'
    marker-yv: yv-n
  - type: text
    text: 'Vous tous, les hommes de guerre, vous ferez le tour de la ville ; vous tournerez une fois autour de la ville. Tu feras ainsi pendant six jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce v. est absent de LXX. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sept trompes, les cornes de bélier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sept trompes de béliers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir aussi v. 6,8,13). Ce genre de trompe (hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: shophar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') est utilisé pour la guerre (Jg 7.7-20), mais aussi pour certaines cérémonies religieuses comme le jour de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'Expiation
      - type: text
        text: ' (Lv 25.9).'
    marker-yv: yv-n
  - type: text
    text: 'Sept prêtres porteront sept trompes, les cornes de bélier, devant le Coffre. Le septième jour, vous ferez sept fois le tour de la ville, et les prêtres sonneront de la trompe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'retentir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 19.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la corne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ici, le mot ordinaire pour la corne d''un animal (voir v. 4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: Quand on fera retentir la corne de bélier, quand vous entendrez le son de la trompe, tout le peuple lancera une grande acclamation ; le rempart de la ville s'écroulera sur lui-même et le peuple montera à l'assaut, chacun devant soi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Josué, fils de Noun, appela les prêtres et leur dit : Portez le coffre de l''alliance ; que sept prêtres portent sept trompes, les cornes de bélier, devant le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils dirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'avant-garde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''armé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'équipé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Le terme est assez rare ; on a traduit '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avant-garde '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd''après le v. 9 qui lui oppose une '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: arrière-garde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même mot hébreu apparaît en 4.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Puis il dit au peuple : Passez, faites le tour de la ville, et que l''avant-garde passe devant le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il en fut comme Josué l''avait dit au peuple. Les sept prêtres qui portaient les sept trompes, les cornes de bélier, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', passèrent et sonnèrent de la trompe. Le coffre de l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' les suivait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avant-garde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 4.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: arrière-garde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même mot hébreu au v. 13 ; Nb 10.25 ; Es 52.12 ; 58.8 ; cf. v. 7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On marchait au son de la trompe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: marcher et sonner de la trompe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même au v. 13.'
    marker-yv: yv-n
  - type: text
    text: 'L''avant-garde marchait devant les prêtres qui sonnaient de la trompe, et l''arrière-garde suivait le Coffre. On marchait au son de la trompe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Josué avait donné cet ordre au peuple : Vous ne lancerez pas d''acclamation, vous ne ferez pas entendre votre voix, et il ne sortira pas une seule parole de votre bouche, jusqu''au jour où je vous dirai : « Lancez une acclamation ! » Alors, vous lancerez une acclamation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fit le tour de la ville ; il tourna une fois, puis ils rentrèrent au camp et y passèrent la nuit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Josué se leva de bon matin et les prêtres se remirent à porter le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les sept prêtres qui portaient les sept trompes, les cornes de bélier, devant le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se remirent en marche et sonnèrent de la trompe. L''avant-garde marchait devant eux, et l''arrière-garde suivait le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. On marchait au son de la trompe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils firent une fois le tour de la ville, le deuxième jour ; puis ils retournèrent au camp. Ils firent de même pendant six jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils se levèrent avec l'aurore
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils se levèrent comme montait l'aurore
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de la même manière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: selon cette règle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme hébreu correspondant est souvent traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: droit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il peut aussi avoir le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: coutume.
    marker-yv: yv-n
  - type: text
    text: 'Le septième jour, ils se levèrent avec l''aurore et firent le tour de la ville de la même manière, sept fois. Ce fut le seul jour où ils firent sept fois le tour de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La septième fois, les prêtres sonnèrent de la trompe et Josué dit au peuple : Lancez une acclamation, car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' vous a donné la ville ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Hé 11.31 ; Jc 2.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'caché '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 25 ; cf. 2R 6.29
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les messagers que nous avions envoyés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir chap. 2.'
    marker-yv: yv-n
  - type: text
    text: 'La ville sera frappée d''anathème pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', elle et tout ce qui s''y trouve. Seule Rahab, la prostituée, aura la vie sauve, elle et tout ce qui est avec elle dans sa maison, car elle a caché les messagers que nous avions envoyés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de peur qu'après avoir frappé d'anathème…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de peur que poussés par la convoitise…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 7.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne rendiez anathème
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne frappiez d'anathème
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: ', malédiction. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: attirant ainsi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gn 34.30+.'
    marker-yv: yv-n
  - type: text
    text: 'Seulement, vous, gardez-vous de ce qui est frappé d''anathème, de peur qu''après avoir frappé d''anathème, vous ne preniez de ce qui est frappé d''anathème et ne rendiez anathème le camp d''Israël, attirant ainsi le malheur sur lui ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: consacrés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout l''argent, l''or et les objets de bronze et de fer sont consacrés au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : ils entreront dans le trésor du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le rempart s'écroula
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Hé 11.30.'
    marker-yv: yv-n
  - type: text
    text: 'Le peuple lança une acclamation, et on sonna de la trompe. Lorsque le peuple entendit le son de la trompe, il lança une grande acclamation, le rempart s''écroula sur lui-même, et le peuple monta à l''assaut de la ville, chacun devant soi. Ils prirent la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils frappèrent d'anathème
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils exécutèrent l'anathème sur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au fil de l'épée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à bouche d'épée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même expression hébraïque en 8.24 ; 10.28,30,32,35,37,39 ; 11.11s,14 ; 19.47 ; cf. Gn 34.26 ; Dt 13.16 ; 20.13 ; Jg 18.27 ; 1S 15.8 ; Jb 1.15,17.'
    marker-yv: yv-n
  - type: text
