document_id: JOS.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Israélites s'emparent de Jéricho
  - type: text
    content: ' '
  - type: note
    content: 'Jéricho…  : dans LXX ce chap. est beaucoup plus court que dans le texte hébreu traditionnel. –  Personne n''en sortait…  : cf. Nb 27.17n.'
  - type: text
    content: 'Jéricho était complètement fermée devant les Israélites. Personne n''en sortait et personne n''y entrait. '
  '10':
  - type: text
    content: 'Josué avait donné cet ordre au peuple : Vous ne lancerez pas d''acclamation, vous ne ferez pas entendre votre voix, et il ne sortira pas une seule parole de votre bouche, jusqu''au jour où je vous dirai : « Lancez une acclamation ! » Alors, vous lancerez une acclamation. '
  '11':
  - type: text
    content: 'Le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit le tour de la ville ; il tourna une fois, puis ils rentrèrent au camp et y passèrent la nuit.'
  '12':
  - type: text
    content: 'Josué se leva de bon matin et les prêtres se remirent à porter le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Les sept prêtres qui portaient les sept trompes, les cornes de bélier, devant le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se remirent en marche et sonnèrent de la trompe. L''avant-garde marchait devant eux, et l''arrière-garde suivait le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: '. On marchait au son de la trompe. '
  '14':
  - type: text
    content: 'Ils firent une fois le tour de la ville, le deuxième jour ; puis ils retournèrent au camp. Ils firent de même pendant six jours. '
  '15':
  - type: note
    content: 'ils se levèrent avec l''aurore  : litt. ils se levèrent comme montait l''aurore. –  de la même manière  : litt. selon cette règle  ; le terme hébreu correspondant est souvent traduit par droit  ; il peut aussi avoir le sens de coutume.'
  - type: text
    content: 'Le septième jour, ils se levèrent avec l''aurore et firent le tour de la ville de la même manière, sept fois. Ce fut le seul jour où ils firent sept fois le tour de la ville. '
  '16':
  - type: text
    content: 'La septième fois, les prêtres sonnèrent de la trompe et Josué dit au peuple : Lancez une acclamation, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a donné la ville ! '
  '17':
  - type: note
    content: 'Cf. Hé 11.31 ; Jc 2.25. –  caché v. 25 ; cf. 2R 6.29n. –  les messagers que nous avions envoyés  : voir chap. 2.'
  - type: text
    content: 'La ville sera frappée d''anathème pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', elle et tout ce qui s''y trouve. Seule Rahab, la prostituée, aura la vie sauve, elle et tout ce qui est avec elle dans sa maison, car elle a caché les messagers que nous avions envoyés. '
  '18':
  - type: note
    content: 'de peur qu''après avoir frappé d''anathème…  : LXX de peur que poussés par la convoitise…, cf. 7.21. –  ne rendiez anathème  : autre traduction ne frappiez d''anathème  ; voir bénédiction, malédiction. –  attirant ainsi…  : cf. 7.25n  ; Gn 34.30+.'
  - type: text
    content: 'Seulement, vous, gardez-vous de ce qui est frappé d''anathème, de peur qu''après avoir frappé d''anathème, vous ne preniez de ce qui est frappé d''anathème et ne rendiez anathème le camp d''Israël, attirant ainsi le malheur sur lui ! '
  '19':
  - type: note
    content: 'consacrés  : voir saint.'
  - type: text
    content: 'Tout l''argent, l''or et les objets de bronze et de fer sont consacrés au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : ils entreront dans le trésor du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: note
    content: 'les vaillants guerriers  : certains rattachent cette expression au v. 3 (elle désignerait alors les soldats de Josué) ; d''autres comprennent Jéricho, son roi et ses vaillants guerriers.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : Regarde, je t''ai livré Jéricho, son roi, les vaillants guerriers. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'le rempart s''écroula  : cf. Hé 11.30.'
  - type: text
    content: 'Le peuple lança une acclamation, et on sonna de la trompe. Lorsque le peuple entendit le son de la trompe, il lança une grande acclamation, le rempart s''écroula sur lui-même, et le peuple monta à l''assaut de la ville, chacun devant soi. Ils prirent la ville. '
  '21':
  - type: note
    content: 'Ils frappèrent d''anathème  : autre traduction ils exécutèrent l''anathème sur. –  au fil de l''épée  : litt. à bouche d''épée  ; même expression hébraïque en 8.24 ; 10.28,30,32,35,37,39 ; 11.11s,14 ; 19.47 ; cf. Gn 34.26 ; Dt 13.16 ; 20.13 ; Jg 18.27 ; 1S 15.8 ; Jb 1.15,17.'
  - type: text
    content: 'Ils frappèrent d''anathème tout ce qui était dans la ville : hommes et femmes, enfants et vieillards, bœufs, moutons et ânes, ils les passèrent au fil de l''épée.'
  - type: heading
    content: Josué laisse la vie à Rahab
  '22':
  - type: text
    content: 'Josué avait dit aux deux hommes qui avaient espionné le pays : Allez à la maison de la prostituée et faites-en sortir cette femme et tout ce qui lui appartient, comme vous le lui avez juré. '
  '23':
  - type: note
    content: 'tout son clan ou toute sa famille, litt. tous ses clans (LXX et Syr ont le singulier). –  Ils les installèrent  : autre traduction ils leur donnèrent un lieu de repos.'
  - type: text
    content: 'Les jeunes gens, les espions, allèrent et firent sortir Rahab, son père, sa mère, ses frères et tout ce qui lui appartenait ; ils firent sortir tout son clan. Ils les installèrent en dehors du camp d''Israël. '
  '24':
  - type: text
    content: 'Ils mirent le feu à la ville et à tout ce qui s''y trouvait, sauf l''argent, l''or et les objets de bronze et de fer, qu''ils mirent dans le trésor de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '25':
  - type: note
    content: 'à sa famille  : litt. à la maison de son père  ; cf. 2.12. –  jusqu''à ce jour 4.9n. –  caché v. 4+.'
  - type: text
    content: Josué laissa la vie à Rahab, la prostituée, à sa famille et à tout ce qui lui appartenait. Elle habite au sein d'Israël jusqu'à ce jour, parce qu'elle avait caché les messagers que Josué avait envoyés pour espionner Jéricho.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'ce serment  : autre traduction cette parole solennelle  ; ici, selon toute vraisemblance, le texte sous-entend un serment par lequel les Israélites s''engagent à ne pas reconstruire Jéricho sous peine de malédiction (voir bénédiction, malédiction) ; cf. 1S 14.26nss. –  devant le Seigneur  : cette expression est absente d''un ms hébreu et de certains mss de LXX ; d''autres l''associent à l''introduction du discours ( fit prononcer ce serment devant le Seigneur ). –  rebâtira  : litt. se lèvera et bâtira . –  de Jéricho  : absent de LXX. –  au prix de  : autres traductions au moyen de ; sur  ; cf. 1R 16.34n  ; voir aussi 2R 2.19.'
  - type: text
    content: 'En ce temps-là, Josué fit prononcer ce serment : Maudit soit devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''homme qui rebâtira cette ville de Jéricho. Il en posera les fondations au prix de son premier-né ; il en installera les portes au prix de son cadet.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur était avec Josué  : cf. 1.5+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec Josué, et on entendit parler de lui dans tout le pays.'
  '3':
  - type: note
    content: 'vous ferez le tour / vous tournerez… autour  : mêmes verbes Ps 48.13.'
  - type: text
    content: 'Vous tous, les hommes de guerre, vous ferez le tour de la ville ; vous tournerez une fois autour de la ville. Tu feras ainsi pendant six jours. '
  '4':
  - type: note
    content: 'Ce v. est absent de LXX. – Voir prêtre. –  sept trompes, les cornes de bélier  : autre traduction sept trompes de béliers (voir aussi v. 6,8,13). Ce genre de trompe (hébreu shophar) est utilisé pour la guerre (Jg 7.7-20), mais aussi pour certaines cérémonies religieuses comme le jour de l''Expiation (Lv 25.9).'
  - type: text
    content: 'Sept prêtres porteront sept trompes, les cornes de bélier, devant le Coffre. Le septième jour, vous ferez sept fois le tour de la ville, et les prêtres sonneront de la trompe. '
  '5':
  - type: note
    content: 'retentir Ex 19.13n. –  la corne  : ici, le mot ordinaire pour la corne d''un animal (voir v. 4n).'
  - type: text
    content: Quand on fera retentir la corne de bélier, quand vous entendrez le son de la trompe, tout le peuple lancera une grande acclamation ; le rempart de la ville s'écroulera sur lui-même et le peuple montera à l'assaut, chacun devant soi.
  '6':
  - type: text
    content: 'Josué, fils de Noun, appela les prêtres et leur dit : Portez le coffre de l''alliance ; que sept prêtres portent sept trompes, les cornes de bélier, devant le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: note
    content: 'il dit  : autre lecture traditionnelle ils dirent. –  l''avant-garde  : litt. l''armé ou l''équipé. Le terme est assez rare ; on a traduit avant-garde d''après le v. 9 qui lui oppose une arrière-garde  ; le même mot hébreu apparaît en 4.13n.'
  - type: text
    content: 'Puis il dit au peuple : Passez, faites le tour de la ville, et que l''avant-garde passe devant le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Il en fut comme Josué l''avait dit au peuple. Les sept prêtres qui portaient les sept trompes, les cornes de bélier, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', passèrent et sonnèrent de la trompe. Le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' les suivait. '
  '9':
  - type: note
    content: 'avant-garde  : cf. v. 7n  ; 4.13n. –  arrière-garde  : même mot hébreu au v. 13 ; Nb 10.25 ; Es 52.12 ; 58.8 ; cf. v. 7n. –  On marchait au son de la trompe  : litt. marcher et sonner de la trompe  ; de même au v. 13.'
  - type: text
    content: 'L''avant-garde marchait devant les prêtres qui sonnaient de la trompe, et l''arrière-garde suivait le Coffre. On marchait au son de la trompe. '
