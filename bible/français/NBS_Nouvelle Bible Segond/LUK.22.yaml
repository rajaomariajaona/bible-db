document_id: LUK.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le complot contre Jésus
  - type: heading
    content: Mt 26.1-5,14-16  ; Mc 14.1-2,10-11
  - type: text
    content: ' '
  - type: note
    content: 'La fête des Pains sans levain, celle qu''on appelle la Pâque (2.41+) : Lc identifie les deux fêtes, cf. v. 7 ; comparer avec Ex 12 ; Dt 16.1ss ; Mc 14.1+ ; voir calendrier et fêtes.'
  - type: text
    content: 'La fête des Pains sans levain, celle qu''on appelle la Pâque, approchait. '
  '10':
  - type: note
    content: Mc 14.13n  ; cf. 1S 10.2-7.
  - type: text
    content: 'Il leur répondit : Quand vous serez entrés dans la ville, un homme portant une cruche d''eau viendra à votre rencontre ; suivez-le dans la maison où il entrera, '
  '11':
  - type: note
    content: Le maître 3.12n  ; cf. 19.31. –  la salle 2.7n.
  - type: text
    content: 'et vous direz au maître de maison : Le maître te dit : « Où est la salle où je mangerai la Pâque avec mes disciples ? » '
  '12':
  - type: note
    content: Mc 14.15n.
  - type: text
    content: 'Il vous montrera une grande chambre à l''étage, aménagée : c''est là que vous ferez les préparatifs. '
  '13':
  - type: note
    content: Cf. 19.32.
  - type: text
    content: Ils partirent, trouvèrent les choses comme il leur avait dit et préparèrent la Pâque.
  - type: heading
    content: La Cène
  - type: heading
    content: Mt 26.20,26-29  ; Mc 14.17,22-25  ; cf. 1Co 11.23-26
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'L''heure  : cf. v. 53. –  se mit à table  : cf. 7.36n (autre verbe, synonyme) ; la coutume consistant à manger la Pâque debout (Ex 12.11) avait été abandonnée au temps de Jésus. –  les apôtres 6.13n  ; 17.5.'
  - type: text
    content: 'L''heure venue, il se mit à table, et les apôtres avec lui. '
  '15':
  - type: note
    content: 'J''ai vivement désiré (cf. 15.16) : litt. j''ai désiré de désir  ; on retrouve la même formule en Gn 31.30 (LXX). –  manger cette Pâque  : cf. v. 7n  ; Evangile des ébionites (Epiphane, Panarion, 30,22,4) : « Ce n''est pas que j''ai tellement désiré manger cette Pâque, de la viande, avec vous. » Voir calendrier et fêtes. –  souffrir  : le verbe correspondant évoque souvent la mort dans le N.T. ; cf. 17.25 ; 24.26,46 ; Ac 1.3 ; 3.18 ; 17.3 ; Hé 2.18 ; 9.26 ; 13.12 ; 1P 2.21,23.'
  - type: text
    content: 'Il leur dit : J''ai vivement désiré manger cette Pâque avec vous, avant de souffrir, '
  '16':
  - type: note
    content: 'Cf. v. 18. –  je ne la mangerai plus  : autre traduction possible (la seule possible selon certains mss)  : je ne la mangerai jamais plus. –  accomplie  : cf. 4.21 ; 9.31 ; 24.44 ; Ac 1.16 ; 3.18. –  dans le royaume  : autres traductions par le royaume, lors du règne (4.43+) ; cf. 13.29+ ; 14.15 ; Mt 3.2n.'
  - type: text
    content: 'car, je vous le dis, je ne la mangerai plus jusqu''à ce qu''elle soit accomplie dans le royaume de Dieu. '
  '17':
  - type: note
    content: 'Il prit  : autre traduction il reçut. –  rendit grâce v. 19 ; 1Tm 4.4s. –  partagez-le  : même verbe 23.34 ; cf. Ac 2.3n,45 ; voir aussi 1Co 10.16ss. Cf. Didachè 9.1ss : « Pour l''eucharistie (ou l''action de grâce), rendez grâce de cette manière : D''abord pour la coupe : Nous te rendons grâce, notre Père, pour la sainte vigne de David, ton serviteur, que tu nous as révélée par Jésus, ton serviteur. Gloire à toi, dans les siècles ! Puis, pour le pain rompu : Nous te rendons grâce, notre Père, pour la vie et la connaissance que tu nous as révélées par Jésus, ton serviteur. Gloire à toi, dans les siècles ! Comme ce pain rompu, disséminé sur les montagnes, a été rassemblé pour être un, que ton Eglise soit rassemblée de la même manière des extrémités de la terre dans ton royaume. Car c''est à toi qu''appartiennent la gloire et la puissance par Jésus-Christ dans les siècles ! »'
  - type: text
    content: 'Il prit une coupe, rendit grâce et dit : Prenez ceci et partagez-le entre vous ; '
  '18':
  - type: note
    content: 'Cf. v. 16 ; Mc 14.25/ / ; 1Co 11.26. –  règne  : le même terme est traduit par royaume aux v. 16s,29s ; cf. 4.43+ ; 11.2 ; 17.20.'
  - type: text
    content: car, je vous le dis, je ne boirai plus désormais du produit de la vigne jusqu'à ce que vienne le règne de Dieu.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Co 11.24 ; voir aussi Dt 16.3. –  rendu grâce v. 17. –  le rompit 24.30,35 ; Mt 14.19n  ; Ac 2.42,46 ; 20.7,11 ; 27.35. –  qui est donné  : autre traduction qui va être donné  ; même possibilité au v. 20, qui va être répandu . Le verbe ici traduit par donner est rendu par offrir en 2.24 ; un verbe apparenté est traduit par livrer  ; cf. Mc 10.45 ; Jn 6.51 ; 2Co 8.5 ; Ga 1.4 ; 1Tm 2.6 ; Tt 2.14. Quelques mss omettent la fin du v. 19 (à partir d''ici) et le v. 20. –  pour vous  : voir Mc 14.24n. –  en mémoire ou en souvenir de moi  : cf. 1Co 11.20,26 ; voir aussi Ex 3.15n  ; 12.14 ; 13.9 ; Dt 16.3.'
  - type: text
    content: 'Puis il prit du pain ; après avoir rendu grâce, il le rompit et le leur donna en disant : C''est mon corps, qui est donné pour vous ; faites ceci en mémoire de moi. '
  '2':
  - type: note
    content: 'Cf. 19.47+,48+ ; 20.1,19+. –  grands prêtres / scribes  : cf. Mt 2.4n  ; Mc 8.31n. –  supprimer  : litt. enlever  ; le même terme sera traduit par exécuter en 23.32.'
  - type: text
    content: Les grands prêtres et les scribes cherchaient comment le supprimer ; car ils avaient peur du peuple.
  '20':
  - type: note
    content: 'la coupe, après le dîner, habituellement nommée coupe de bénédiction (cf. 1Co 10.16n). –  Cette coupe  : cf. Ps 116.13. –  l''alliance nouvelle Jr 31.31ss ; 2Co 3.6,14 ; Hé 7.22+. –  en mon sang…  : cf. Ex 24.8 ; Za 9.11. –  répandu (11.50) pour vous Mc 14.24n.'
  - type: text
    content: 'Il fit de même avec la coupe, après le dîner, en disant : Cette coupe est l''alliance nouvelle en mon sang, qui est répandu pour vous.'
  - type: heading
    content: Jésus annonce qu'il va être trahi
  - type: heading
    content: Mt 26.21-25  ; Mc 14.18-21
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jn 13.21ss. –  celui qui me livre  : litt. la main de celui qui me livre  ; cf. 1S 24.13ss ; Mt 26.23.'
  - type: text
    content: 'Pourtant, celui qui me livre est à cette table, avec moi. '
  '22':
  - type: note
    content: 'Fils de l''homme 5.24+. –  selon ce qui est arrêté  : cf. 13.33 ; même verbe en Ac 2.23n. –  quel malheur… 6.24+ ; 17.1.'
  - type: text
    content: 'Le Fils de l''homme s''en va, selon ce qui est arrêté ; mais quel malheur pour cet homme par qui il est livré ! '
  '23':
  - type: note
    content: Cf. Mt 26.25 ; Jn 13.22,26ss.
  - type: text
    content: Et ils commencèrent à débattre pour savoir lequel d'entre eux pourrait bien faire une chose pareille.
  - type: heading
    content: Qui est le plus grand ?
  - type: heading
    content: Mt 20.24-28  ; 19.28  ; Mc 10.41-45
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.46ss ; Mc 10.35ss/ /. –  contestation  : terme apparenté en 1Co 11.16. –  devait-il être considéré comme  : autre traduction semblait-il . –  le plus grand Mt 11.11+.'
  - type: text
    content: 'Il s''éleva aussi parmi eux une contestation : lequel d''entre eux devait-il être considéré comme le plus grand ? '
  '25':
  - type: note
    content: 'des nations ou des non-Juifs 12.30n. –  bienfaiteurs  : titre hellénistique (généralement transcrit Evergète) donné à des dieux, à des rois ou à des princes ; cf. Ac 10.38n.'
  - type: text
    content: 'Il leur dit : Les rois des nations les dominent en seigneurs et ceux qui exercent l''autorité sur elles se font appeler bienfaiteurs. '
  '26':
  - type: note
    content: 'Cf. 9.48. –  le plus jeune  : même terme 15.12s ; cf. Ac 5.6 ; 1Tm 5.1 ; Tt 2.6 ; 1P 5.5. –  celui qui dirige Ac 15.22n  ; Hé 13.7+. –  celui qui sert  : cf. Ac 6.1ns.'
  - type: text
    content: 'Chez vous, rien de semblable. Au contraire, que le plus grand parmi vous devienne comme le plus jeune, et celui qui dirige comme celui qui sert. '
  '27':
  - type: note
    content: Cf. v. 8 ; 12.37 ; Jn 13.4ss.
  - type: text
    content: En effet, qui est le plus grand, celui qui est à table, ou celui qui sert ? N'est-ce pas celui qui est à table ? Et moi, cependant, je suis au milieu de vous comme celui qui sert.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Vous v. 14. –  persévéré ou enduré 8.15+ ; on pourrait aussi comprendre qui êtes restés avec moi  ; cf. 23.49. –  mes épreuves  : cf. 4.2+,13 ; 11.16 ; Ac 20.19 ; Hé 2.18n.'
  - type: text
    content: 'Vous, vous êtes ceux qui ont persévéré avec moi dans mes épreuves ; '
  '29':
  - type: note
    content: 'Cf. Jn 15.9 ; 17.18,21s ; 20.21. –  je dispose  : le verbe est apparenté à celui qui est traduit par alliance au v. 20, et qui peut aussi désigner un testament  ; le même verbe est traduit par établir (une alliance) en Ac 3.25 ; Hé 8.10 ; 10.16 ; une de ses formes est rendue par le substantif testateur en Hé 9.16ns ; certains mss portent je fais alliance avec vous… –  du Royaume ou de la royauté  : cf. 1.32s ; 4.43+ ; 12.32 ; 19.12-15 ; 23.42 ; Mt 3.2n.'
  - type: text
    content: 'c''est pourquoi je dispose du Royaume en votre faveur, comme mon Père en a disposé en ma faveur, '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Satan (voir démon, diable, Satan) : cf. v. 31,53 ; 10.18+ ; voir aussi 4.13. –  entra…  : cf. 8.30ss ; Jn 13.2,27 ; Martyre d''Isaïe 3.11 : « Bélial (= Satan) s''installa dans le cœur de Manassé et des chefs de Juda et de Benjamin, des eunuques et des conseillers du roi. » –  Judas 6.16n. –  Douze 6.13 ; 8.1+ ; cf. Jn 6.70s ; Ac 1.17.'
  - type: text
    content: 'Alors Satan entra en Judas, celui qu''on appelle Iscariote et qui était du nombre des Douze. '
  '30':
  - type: note
    content: Mt 19.28n. –  mangiez et buviez… 13.29+ ; 14.15.
  - type: text
    content: afin que vous mangiez et buviez à ma table, dans mon royaume, et que vous soyez assis sur des trônes pour juger les douze tribus d'Israël.
  - type: heading
    content: Jésus annonce que Pierre le reniera
  - type: heading
    content: Mt 26.31-35  ; Mc 14.27-31  ; Jn 13.37-38
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Simon, Simon 4.38+ ; cf. 10.41 ; 13.34. –  le Satan (v. 3+) vous a réclamés…  : cf. v. 53 ; Jb 1.6ss ; 2Co 2.11 ; Testament de Benjamin 3.3 : « Si les esprits de Béliar vous réclament pour vous affliger de toute espèce de maux, ils ne vous domineront pas » ; voir démon. –  passer au crible Am 9.9.'
  - type: text
    content: 'Simon, Simon, le Satan vous a réclamés pour vous passer au crible comme le blé. '
  '32':
  - type: note
    content: 'j''ai prié pour toi  : cf. v. 61 ; voir aussi Jn 17.6,9,11,15,20. –  ta foi ou ta fidélité  ; cf. v. 28. –  ne disparaisse pas tout à fait  : autre traduction ne te fasse pas défaut, même verbe 16.9 ; 23.45 ; Hé 1.12 (finir) ; cf. Mt 14.31. –  quand tu seras revenu (à moi ? à Jérusalem ?) …  : autres traductions, moins probables  : ramène tes frères et affermis-les ; recommence à affermir tes frères  ; cf. 24.34 ; sur le verbe traduit par revenir, voir 17.4n  ; Jn 21.20n  ; Ac 3.19n  ; voir aussi 2S 15.20. Sur le verbe traduit par affermis, cf. 9.51n  ; 16.26n  ; Ac 16.5 ; verbe apparenté 15.41 ; 18.23 ; voir aussi Ps 51.15 ; Mt 16.17ss ; Jn 21.15ss.'
  - type: text
    content: 'Mais j''ai prié pour toi, afin que ta foi ne disparaisse pas tout à fait ; et toi, quand tu seras revenu, affermis tes frères. '
  '33':
  - type: note
    content: 'Cf. v. 54 ; Mt 14.28ss ; Jn 13.37. –  Pierre lui dit  : litt. il lui dit. –  en prison Ac 5.18 ; 12.3.'
  - type: text
    content: 'Pierre lui dit : Seigneur, je suis prêt à aller avec toi et en prison et à la mort. '
  '34':
  - type: note
    content: V. 57,61.
  - type: text
    content: 'Il lui répondit : Pierre, je te le dis, un coq ne chantera pas aujourd''hui que tu n''aies nié par trois fois me connaître.'
  - type: heading
    content: La bourse, le sac et l'épée
  '35':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.3 ; 10.4.
  - type: text
    content: 'Il leur dit encore : Quand je vous ai envoyés sans bourse, ni sac, ni sandales, avez-vous manqué de quoi que ce soit ? Ils répondirent : De rien. '
  '36':
  - type: note
    content: 'Cf. Mt 10.34. –  Maintenant…  : cf. Ac 8.1ss ; 9.1s ; 12.1ss. –  que celui qui n''a pas d''épée…  : traduction incertaine ; on pourrait aussi comprendre que celui qui n''en a pas (de bourse ou de sac) vende son vêtement pour acheter une épée  ; ou encore que celui qui a prenne sa bourse, et aussi son sac ; et que celui qui n''a pas vende…  ; cf. v. 49ss ; voir aussi Ep 6.11ss.'
  - type: text
    content: 'Il leur dit : Maintenant, au contraire, que celui qui a une bourse la prenne, de même celui qui a un sac, et que celui qui n''a pas d''épée vende son vêtement pour en acheter une. '
  '37':
  - type: note
    content: 'Il a même été compté…  : cf. v. 52 ; 23.2ss,32s ; Es 53.12  ; Ac 8.32s ; Psaumes de Salomon 16.5 : « Tu ne m''as pas compté au nombre des pécheurs pour me perdre. » –  ce qui me concerne  : cf. 24.19,27. – Le mot correspondant à fin est apparenté au verbe traduit par s''accomplisse  ; cf. 18.31+.'
  - type: text
    content: 'Car, je vous le dis, il faut que ce qui est écrit s''accomplisse en moi : '
  - type: text
    content: Il a même été compté avec les sans-loi
  - type: text
    content: '. Et, en effet, ce qui me concerne touche à sa fin. '
  '38':
  - type: note
    content: 'C''est assez  : on peut comprendre : deux épées suffisent ; selon certains, les apôtres n''ayant pas saisi ce que Jésus voulait leur dire, celui-ci se refuse simplement à poursuivre sur un malentendu ; cf. Dt 3.26.'
  - type: text
    content: 'Ils dirent : Seigneur, voici deux épées. Et il leur dit : C''est assez.'
  - type: heading
    content: Jésus prie au mont des Oliviers
  - type: heading
    content: Mt 26.36-46  ; Mc 14.32-42
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'selon sa coutume  : même expression 1.9 ; 2.42 ; cf. 4.16 ; voir 21.37+. –  au mont des Oliviers 19.29 ; cf. 6.12 ; 9.28 ; Mt 26.30 ; Mc 14.26.'
  - type: text
    content: 'Il sortit et alla, selon sa coutume, au mont des Oliviers. Ses disciples le suivirent. '
  '4':
  - type: note
    content: 'grands prêtres 9.22+ ; cf. Ac 4.6. –  chefs des gardes  : traduction incertaine ; il s''agit sans doute de fonctionnaires du temple (des lévites  ?), cf. v. 52 ; le même terme, au singulier, sera traduit par commandant en Ac 4.1+. –  livrer 9.44+.'
  - type: text
    content: 'Celui-ci alla s''entendre avec les grands prêtres et les chefs des gardes sur la manière de le leur livrer. '
  '40':
  - type: note
    content: 'cet endroit  : cf. Mc 14.32 ; Jn 18.2. –  ne pas entrer dans l''épreuve ou en tentation v. 46 ; 4.2+ ; 11.4+.'
  - type: text
    content: 'Arrivé à cet endroit, il leur dit : Priez, afin de ne pas entrer dans l''épreuve. '
  '41':
  - type: note
    content: 's''écarta  : le même verbe est traduit par s''arracher à en Ac 21.1. –  à la distance d''un jet de pierre  : sur ce type de mesure approximative, cf. Gn 21.16. –  se mit à genoux  : cf. Ac 7.60 ; 9.40 ; 20.36 ; 21.5. –  prier 3.21+.'
  - type: text
    content: 'Puis il s''écarta d''eux, à la distance d''un jet de pierre environ, et il se mit à genoux pour prier, '
  '42':
  - type: note
    content: 'Cf. Jn 12.27ss. –  Père 11.2. –  si telle est ta décision  : autres traductions si tu le veux, si tu le souhaites  ; le verbe n''est pas apparenté au terme traduit dans la suite par volonté  ; le substantif correspondant est rendu par décision en 7.30 ; 23.51 ; certains mss portent si tu décides d''éloigner… –  coupe Mc 10.38+ ; Jn 18.11. –  volonté  : cf. Mt 6.10 ; Ac 21.14 ; 22.14.'
  - type: text
    content: 'en disant : Père, si telle est ta décision, éloigne de moi cette coupe. Toutefois, que ce ne soit pas ma volonté qui advienne, mais la tienne. [ '
  '43':
  - type: note
    content: 'Les v. 43s sont absents des meilleurs mss. –  un ange lui apparut, du ciel  : autre traduction un ange du ciel lui apparut  ; sur le verbe, cf. 1.11+ ; voir aussi 1R 19.4ss ; Mt 4.11 ; Jn 12.29. –  pour lui redonner des forces  : même verbe Ac 9.19.'
  - type: text
    content: 'Alors un ange lui apparut, du ciel, pour lui redonner des forces. '
  '44':
  - type: note
    content: 'angoisse  : le terme grec correspondant, qui n''apparaît qu''ici dans le N.T., a donné notre mot agonie  ; les termes apparentés évoquent plutôt le combat. –  ferveur Ac 12.5n. –  devint comme…  : on a aussi compris devint des gouttes de sang qui tombaient à terre, mais cette interprétation est nettement moins probable.'
  - type: text
    content: 'En proie à l''angoisse, il priait avec plus de ferveur encore, et sa sueur devint comme des gouttes de sang tombant à terre.] '
  '45':
  - type: note
    content: 'releva  : voir résurrection. –  endormis  : cf. 9.32. –  de tristesse  : cf. 24.41 ; Mc 14.34.'
  - type: text
    content: 'Il se releva de sa prière et vint vers les disciples, qu''il trouva endormis de tristesse ; '
  '46':
  - type: note
    content: 'Pourquoi…  : autre traduction Comment ! Vous dormez ! –  Levez-vous  : cf. 1.39n. –  priez… v. 40+.'
  - type: text
    content: 'il leur dit alors : Pourquoi dormez-vous ? Levez-vous, priez, afin de ne pas entrer dans l''épreuve.'
  - type: heading
    content: L'arrestation de Jésus
  - type: heading
    content: Mt 26.47-56  ; Mc 14.43-49  ; Jn 18.3-11
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Judas v. 3+. –  allait devant elle Ac 1.16. –  embrasser  : verbe apparenté au terme traduit par baiser au v. 48 ; cf. Mc 14.44s.'
  - type: text
    content: 'Il parlait encore quand une foule arriva ; celui qui s''appelait Judas, l''un des Douze, allait devant elle. Il s''approcha de Jésus pour l''embrasser. '
  '48':
  - type: note
    content: livres 9.44+. –  Fils de l'homme 5.24+.
  - type: text
    content: 'Jésus lui dit : Judas, c''est par un baiser que tu livres le Fils de l''homme !'
  '49':
  - type: text
    content: ' '
  - type: note
    content: Comparer avec Mc 14.50. –  avec l'épée v. 36ss.
  - type: text
    content: 'Voyant ce qui allait arriver, ceux qui étaient avec lui dirent : Seigneur, devons-nous frapper avec l''épée ? '
  '5':
  - type: note
    content: Cf. Mc 14.11.
  - type: text
    content: 'Ils se réjouirent et convinrent de lui donner de l''argent. '
  '50':
  - type: note
    content: Cf. Jn 18.10,26.
  - type: text
    content: 'Et l''un d''eux frappa l''esclave du grand prêtre et lui emporta l''oreille droite. '
  '51':
  - type: note
    content: 'Laissez (le même verbe est traduit par permettre en 4.41), cela suffit  : traduction incertaine ; on pourrait aussi comprendre laissez-les aller jusque-là  ; cf. v. 22,38 ; Mt 26.52 ; Jn 18.11.'
  - type: text
    content: 'Mais Jésus dit : Laissez, cela suffit ! Puis il toucha l''oreille de l''homme et le guérit.'
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'grands prêtres…  : cf. 9.22+ ; Mc 14.43. –  chefs des gardes du temple v. 4n. –  sortis  : cf. v. 39. –  comme si…  : litt. comme pour un bandit  ; cf. v. 37 ; 23.32ss ; Jn 18.40.'
  - type: text
    content: 'Jésus dit alors aux grands prêtres, aux chefs des gardes du temple et aux anciens, qui étaient venus contre lui : Vous êtes sortis avec des épées et des bâtons, comme si j''étais un bandit. '
  '53':
  - type: note
    content: 'Cf. 19.47 ; 21.37 ; Mc 14.49 ; Jn 18.20. –  mettre la main sur moi / votre heure  : cf. v. 6 ; voir Jn 7.30 ; 8.20. –  l''autorité (ou le pouvoir, Mc 1.22n) des ténèbres  : cf. Lc 11.35s ; Ac 26.18 ; Col 1.13 ; voir aussi Jn 1.5 ; 3.19 ; 12.35 ; 13.30 ; 19.11.'
  - type: text
    content: Tous les jours, j'étais avec vous dans le temple et vous n'êtes pas venus mettre la main sur moi. Mais c'est bien là votre heure et l'autorité des ténèbres.
  - type: heading
    content: Pierre renie Jésus
  - type: heading
    content: Mt 26.57–27.1  ; Mc 14.53–15.1  ; Jn 18.13-27
  '54':
  - type: text
    content: ' '
  - type: note
    content: 's''être emparés de lui Mc 14.46ss ; Ac 1.16n. – Voir grand prêtre . –  Pierre (5.8+) suivait  : cf. v. 33. –  de loin 23.49.'
  - type: text
    content: 'Après s''être emparés de lui, ils l''emmenèrent et le conduisirent dans la maison du grand prêtre. Pierre suivait de loin. '
  '55':
  - type: text
    content: 'Ils allumèrent du feu au milieu de la cour et s''assirent. Pierre était assis au milieu d''eux. '
  '56':
  - type: note
    content: 'du feu  : sous-entendu dans le texte. –  le fixa 4.20+. –  avec lui  : cf. Ac 4.13.'
  - type: text
    content: 'Une servante, qui le vit assis à la lumière du feu, le fixa et dit : Celui-ci aussi était avec lui. '
  '57':
  - type: note
    content: Cf. v. 34 ; 8.45n.
  - type: text
    content: 'Mais il le nia, en disant : Femme, je ne le connais pas. '
  '58':
  - type: note
    content: 'un autre ou, peut-être, quelqu''un d''autre  ; cf. Mc 14.69. –  Je ne le suis pas  : litt. homme (le terme signifie être humain et pourrait éventuellement s''appliquer à une femme, mais ce sens est peu probable dans ce contexte), je n''en suis pas  ; de même v. 60 ; 5.20n.'
  - type: text
    content: 'Peu après, un autre le vit et dit : Toi aussi, tu es l''un d''entre eux. Et Pierre dit : Je ne le suis pas. '
  '59':
  - type: note
    content: 'un autre encore  : cf. Mc 14.70 ; Jn 18.26. –  insistait  : le même verbe est traduit par soutenir Ac 12.15. –  En vérité 4.25n. –  galiléen (4.14+) 23.6 ; cf. Mt 26.73.'
  - type: text
    content: 'Après un intervalle d''environ une heure, un autre encore insistait : En vérité, celui-ci aussi était avec lui, car il est également galiléen. '
  '6':
  - type: note
    content: 'Il accepta  : le même verbe est traduit par célébrer en 10.21, par reconnaître publiquement Mc 1.5n/ /. –  à l''insu de la foule  : cf. 19.48 ; 20.26 ; on pourrait aussi comprendre sans provoquer d''attroupement (cf. Ac 24.18n) ; Mc 14.2.'
  - type: text
    content: Il accepta et se mit à chercher une occasion pour le leur livrer à l'insu de la foule.
  - type: heading
    content: Jésus fait préparer la Pâque
  - type: heading
    content: Mt 26.17-19  ; Mc 14.12-16
  '60':
  - type: note
    content: A l'instant même 1.64+.
  - type: text
    content: 'Pierre répondit : Je ne sais pas ce que tu veux dire. A l''instant même, comme il parlait encore, un coq chanta. '
  '61':
  - type: note
    content: 'le Seigneur 7.13+. –  se souvint…  : cf. v. 34 ; Ac 11.16.'
  - type: text
    content: 'Alors le Seigneur se retourna et regarda Pierre. Pierre se souvint de la parole que le Seigneur lui avait dite : Avant qu''un coq ait chanté aujourd''hui, tu m''auras renié par trois fois. '
  '62':
  - type: note
    content: Quelques témoins omettent ce v. Cf. Mt 26.75 ; voir aussi Es 22.4.
  - type: text
    content: Il sortit et, dehors, il pleura amèrement.
  '63':
  - type: text
    content: ' '
  - type: note
    content: 'qui tenaient Jésus  : litt. qui le tenaient ou qui l''entouraient . –  se moquaient  : cf. 18.32 ; Es 50.5s ; 53.3ss.'
  - type: text
    content: 'Les hommes qui tenaient Jésus se moquaient de lui et le battaient. '
  '64':
  - type: note
    content: Voir prophète.
  - type: text
    content: 'Ils lui voilaient le visage et l''interrogeaient, en disant : Fais le prophète ! Dis qui t''a frappé ! '
  '65':
  - type: note
    content: 'l''injuriaient ou le calomniaient, blasphémaient contre lui  : cf. 23.39n  ; voir aussi 18.32n.'
  - type: text
    content: Et ils l'injuriaient encore de bien d'autres manières.
  - type: heading
    content: Jésus comparaît devant le sanhédrin
  '66':
  - type: text
    content: ' '
  - type: note
    content: 'Comparer avec Mc 14.55ss ; 15.1/ /. –  anciens / grands prêtres / scribes  : cf. 9.22n. –  on fit amener Jésus  : litt. on le fit amener ou ils le firent amener . –  leur sanhédrin Mc 8.31n  ; Ac 4.15.'
  - type: text
    content: 'Quand il fit jour, le collège des anciens du peuple – les grands prêtres et les scribes – se rassembla, et on fit amener Jésus devant leur sanhédrin. '
  '67':
  - type: note
    content: 'Cf. Jn 10.24ss. –  le Christ ou le Messie 2.11n  ; voir onction. –  Si je vous le dis… Jr 38.15. –  vous ne le croirez jamais (ou en aucun cas, de même v. 68) : cf. Jn 3.12 ; 8.45.'
  - type: text
    content: 'Ils dirent : Si c''est toi qui es le Christ, dis-le-nous. Il leur répondit : Si je vous le dis, vous ne le croirez jamais, '
  '68':
  - type: note
    content: 'Cf. 20.3-8. –  vous ne répondrez jamais  : certains mss portent vous ne me répondrez pas ni ne me relâcherez.'
  - type: text
    content: 'et si je vous interroge, vous ne répondrez jamais. '
  '69':
  - type: note
    content: 'Désormais v. 18 ; 1.48+ ; cf. Mt 26.64 (autre tournure grecque). –  le Fils de l''homme 5.24+ ; 11.30 ; 12.8s ; 21.27 ; Dn 7.13. –  assis à la droite… 20.42/ / ; Ps 110.1 ; Ac 2.34ss ; Ep 1.20 ; 1P 3.22 ; cf. Ac 7.56. –  puissance de Dieu  : formules analogues dans LXX Jos 4.24 ; 1Ch 12.23 ; cf. Rm 1.16 ; 1Co 1.18ss.'
  - type: text
    content: 'Désormais le Fils de l''homme sera assis à la droite de la puissance de Dieu. '
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1+. –  sacrifier (ou abattre ) la Pâque (c.-à-d. l'agneau de la Pâque ), cf. Ex 12.8ss,11n,14-21 ; Dt 16.2,6 ; Esd 6.20 ; Mc 14.12n  ; 1Co 5.7 ; voir aussi calendrier et fêtes.
  - type: text
    content: 'Le jour des Pains sans levain, où l''on devait sacrifier la Pâque, arriva. '
  '70':
  - type: note
    content: Fils de Dieu 1.32s,35+ ; cf. Mc 14.61 ; Jn 10.24,36.
  - type: text
    content: 'Tous dirent : Est-ce donc toi qui es le Fils de Dieu ? Il leur répondit : C''est vous qui dites que je le suis. '
  '71':
  - type: note
    content: 'témoignage…  : cf. Mc 14.55ss/ /.'
  - type: text
    content: 'Alors ils dirent : Qu''avons-nous encore besoin de témoignage ? Nous l''avons entendu nous-mêmes, de sa propre bouche.'
  '8':
  - type: note
    content: 'Jésus envoya  : litt. il envoya. –  Pierre et Jean 5.8+,10+ ; 8.51+.'
  - type: text
    content: 'Jésus envoya Pierre et Jean, en disant : Allez nous préparer la Pâque, pour que nous la mangions. '
  '9':
  - type: text
    content: 'Ils lui dirent : Où veux-tu que nous la préparions ? '
