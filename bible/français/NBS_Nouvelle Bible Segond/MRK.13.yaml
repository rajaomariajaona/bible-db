document_id: MRK.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La destruction du temple
  - type: heading
    content: Mt 24.1-3  ; Lc 21.5-7
  - type: text
    content: ' '
  - type: note
    content: 'Selon Flavius Josèphe, la reconstruction du temple de Jérusalem, entreprise par Hérode le Grand, était toujours en cours au temps de Jésus (Jn 2.20n) ; le nouveau temple ne sera achevé qu''en l''an 64, six ans seulement avant sa destruction par les Romains. –  Maître  : au sens d’ enseignant.'
  - type: text
    content: 'Alors qu''il sort du temple, un de ses disciples lui dit : Maître, regarde, quelles pierres, quelles constructions ! '
  '10':
  - type: note
    content: que la bonne nouvelle (1.1n) soit proclamée (1.4n) à toutes les nations 14.9 ; 16.15 ; Mt 24.14 ; 28.18ss ; Col 1.23 ; Ap 14.6 ; cf. Lc 21.24 ; Rm 11.25 ; voir aussi non-Juifs.
  - type: text
    content: 'Il faut d''abord que la bonne nouvelle soit proclamée à toutes les nations. '
  '11':
  - type: note
    content: 'Mt 10.19s ; Lc 12.11s ; cf. Jn 14.26. –  ce moment même  : litt. cette heure-là. – Voir aussi Esprit et saint.'
  - type: text
    content: Quand on vous emmènera pour vous livrer, ne vous inquiétez pas à l'avance de ce que vous direz, mais dites ce qui vous sera donné à ce moment même ; car ce n'est pas vous qui parlerez, c'est l'Esprit saint.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Mi 7.6 ; Mt 10.21+.
  - type: text
    content: 'Le frère livrera son frère à la mort, et le père son enfant ; les enfants se dresseront contre leurs parents et les feront mettre à mort. '
  '13':
  - type: note
    content: 'Voir Mt 10.22+ ; cf. 24.9,13 ; Jn 15.18-21 ; 16.2 ; 1P 4.14 ; Epître de Barnabé 4.9 : « Prenons donc garde dans les derniers jours, car il ne nous servira de rien tout le temps de notre vie et de notre foi, à moins que maintenant, dans le siècle impie et dans les scandales à venir, nous ne résistions comme il convient à des fils de Dieu. »'
  - type: text
    content: Vous serez détestés de tous à cause de mon nom ; mais celui qui persévérera jusqu'à la fin sera sauvé.
  - type: heading
    content: Une grande détresse
  - type: heading
    content: Mt 24.15-22  ; Lc 21.20-24
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'l''abominable dévastateur  : litt. l''abomination ou l''horreur de la dévastation (traduction traditionnelle l''abomination de la désolation ) ; l''expression pourrait aussi signifier l''abomination dévastatrice , mais la suite est au masculin ; voir Dn 9.27 ; 11.31 ; 12.1  ; cf. Mt 24.15+ ; 2Th 2.3s. –  fuient  : cf. Jr 4.6 ; 6.1 ; 48.6 ; 49.8,30 ; 51.6 ; Ez 7.16.'
  - type: text
    content: 'Lorsque vous verrez '
  - type: text
    content: l'abominable dévastateur
  - type: text
    content: ' installé là où il ne doit pas être – que le lecteur comprenne – alors, que ceux qui seront en Judée fuient dans les montagnes ; '
  '15':
  - type: note
    content: Voir Mt 24.17n  ; Lc 17.31.
  - type: text
    content: 'que celui qui sera sur le toit en terrasse n''en descende pas, qu''il ne rentre pas pour prendre quelque chose chez lui ; '
  '16':
  - type: note
    content: 'arrière  : le même terme a été traduit derrière en 1.7n etc.'
  - type: text
    content: 'et que celui qui sera aux champs ne retourne pas en arrière pour prendre son vêtement. '
  '17':
  - type: note
    content: Lc 21.23 ; 23.29. –  Quel malheur Mt 11.21n.
  - type: text
    content: Quel malheur pour les femmes enceintes et pour celles qui allaiteront en ces jours-là !
  '18':
  - type: text
    content: 'Priez pour que cela n''arrive pas en hiver. '
  '19':
  - type: note
    content: 'détresse Mt 24.21n  ; 1Th 3.3n  ; voir Dn 12.1 ; cf. Ex 9.18 ; Dt 4.32 ; Jl 2.2. –  du monde que Dieu a créé  : litt. de la création que Dieu a créée.'
  - type: text
    content: 'Car ces jours-là seront des jours de détresse, d''une détresse telle qu''il n''y en a pas eu de semblable depuis le commencement du monde que Dieu a créé jusqu''à maintenant, et qu''il n''y en aura jamais plus. '
  '2':
  - type: note
    content: Jr 7.14 ; 9.11+ ; Lc 19.44. – A la fin du v., certains mss ajoutent et après trois jours un autre sera érigé (le même verbe étant traduit ailleurs par relever, ressusciter) sans (le secours des) mains (de l'homme), cf. 14.58.
  - type: text
    content: 'Jésus lui répondit : Tu vois ces grandes constructions ? Il ne restera pas pierre sur pierre qui ne soit renversée.'
  - type: heading
    content: Les signes annonciateurs de la fin
  - type: heading
    content: Mt 24.4-8  ; Lc 21.8-11
  '20':
  - type: note
    content: 'Mt 24.22n. –  ces jours  : litt. les jours. –  à cause de ceux…  : litt. à cause des choisis (ou élus) qu''il a choisis  ; cf. v. 22,27 ; Ap 7.'
  - type: text
    content: Si le Seigneur n'avait abrégé ces jours, personne ne serait sauvé ; mais il a abrégé ces jours à cause de ceux qu'il a choisis.
  - type: heading
    content: Mt 24.23-25
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 17.20s.
  - type: text
    content: 'Si alors quelqu''un vous dit : « Le Christ est ici ! », « il est là-bas ! », ne le croyez pas. '
  '22':
  - type: note
    content: 'des christs…  : autres traductions de faux christs et de faux prophètes  ; des pseudo-christs et des pseudo-prophètes  ; cf. Ac 5.36s ; voir aussi Jr 6.13 ; 14.14. –  ils donneront  : cf. 8.12 ; certains mss portent ils feront (expression habituellement traduite par produire des signes…). –  signes / prodiges  : cf. Dt 13.2ss ; 2Th 2.9s ; Ap 13.13s.'
  - type: text
    content: 'Car des christs de mensonge et des prophètes de mensonge se lèveront ; ils donneront des signes et des prodiges pour égarer, si possible, ceux qui ont été choisis. '
  '23':
  - type: note
    content: 'je vous ai bien prévenus  : litt. je vous ai tout dit à l''avance  ; le même verbe est traduit par parler d''avance en Ac 1.16.'
  - type: text
    content: Soyez sur vos gardes ; je vous ai bien prévenus.
  - type: heading
    content: La venue du Fils de l'homme
  - type: heading
    content: Mt 24.29-31  ; Lc 21.25-28
  '24':
  - type: text
    content: ' '
  - type: note
    content: Es 13.10  ; Ez 32.7s ; Jl 2.10 ; 3.4 ; 4.15 ; Ap 6.12-14 ; 8.12.
  - type: text
    content: Mais en ces jours-là, après cette détresse-là,
  - type: text
    content: le soleil s'obscurcira,
  - type: text
    content: la lune ne donnera plus sa clarté,
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Es 34.4  ; Jl 2.10 ; 4.16 ; Ag 2.6,21 ; Hé 12.26s ; Ap 6.13 ; Siracide 16.18 : « Le ciel et les cieux des cieux, l''abîme et la terre sont ébranlés lors de sa visite (c.-à-d. l''intervention de Dieu). » Epître de Barnabé 15.5 : « Lorsque son fils sera venu pour mettre fin au temps de l''Inique, pour juger les impies et pour changer le soleil, la lune et les étoiles… »'
  - type: text
    content: les étoiles tomberont
  - type: text
    content: ' du ciel,'
  - type: text
    content: et les puissances qui sont dans les cieux
  - type: text
    content: ' seront ébranlées.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: Dn 7.13s  ; cf. Mt 16.27s ; Mc 8.38 ; 9.9+ ; 14.62 ; 1Th 4.17 ; Ap 1.7 ; 14.14. –  Fils de l'homme 2.10+ ; Mt 8.20n. – Voir gloire.
  - type: text
    content: 'Alors on verra '
  - type: text
    content: le Fils de l'homme venant sur les nuées
  - type: text
    content: ' avec beaucoup de puissance, '
  - type: text
    content: avec gloire
  - type: text
    content: '. '
  '27':
  - type: note
    content: Mt 24.31+ ; cf. Dt 30.4 ; Ez 37.9ss ; Za 2.10 ; Né 1.9 ; voir aussi anges. –  ceux qu'il a choisis (ou ses élus) ; certains mss portent les élus, c.-à-d. ceux qui sont choisis  ; v. 20+.
  - type: text
    content: Alors il enverra les anges et rassemblera des quatre vents, de l'extrémité de la terre jusqu'à l'extrémité du ciel, ceux qu'il a choisis.
  - type: heading
    content: La parabole du figuier
  - type: heading
    content: Mt 24.32-36  ; Lc 21.29-33
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 11.13s. –  deviennent tendres  : c.-à-d. bourgeonnent.'
  - type: text
    content: 'Laissez-vous instruire par la parabole tirée du figuier : dès que ses branches deviennent tendres et que les feuilles poussent, vous savez que l''été est proche. '
  '29':
  - type: note
    content: 'il (le Fils de l''homme, ou plus généralement l''événement) est proche Ph 4.5. –  aux portes (de la ville ?) : cf. Jc 5.9 ; Ap 3.20.'
  - type: text
    content: De même, vous aussi, quand vous verrez ces choses arriver, sachez qu'il est proche, aux portes.
  '3':
  - type: text
    content: ' '
  - type: note
    content: mont des Oliviers 11.1n. – Voir temple . –  Pierre, Jacques, Jean (5.37+) et André 1.16ss. –  l'interroger, en privé 4.10+.
  - type: text
    content: 'Comme il était assis sur le mont des Oliviers, en face du temple, Pierre, Jacques, Jean et André se mirent à l''interroger, en privé : '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Amen Mt 5.18n. –  cette génération 8.12+ ; cf. 9.1. –  pas  : autres traductions jamais ; en aucun cas (de même v. 31).'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, cette génération ne passera pas que tout cela n''arrive. '
  '31':
  - type: note
    content: 'Mt 5.18 ; Lc 16.17. Evangile selon Thomas 11 : « Ce ciel passera, et celui qui est au-dessus de lui passera ; ceux qui sont morts ne vivent pas, et ceux qui vivent ne mourront pas. »'
  - type: text
    content: Le ciel et la terre passeront, mais mes paroles ne passeront pas.
  - type: heading
    content: Dieu seul connaît le moment de la fin
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 24.36+ ; 1Th 5.1s. –  pas même le Fils 12.6s ; cf. Mt 11.27/ /. – Voir anges . –  le Père seul  : cf. 10.18,27,40 ; Ac 1.7.'
  - type: text
    content: Pour ce qui est du jour ou de l'heure, personne ne les connaît, pas même les anges dans le ciel, pas même le Fils, mais le Père seul.
  - type: heading
    content: Mt 25.13-15  ; Lc 19.12-13
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'restez éveillés  : certains mss ajoutent et priez , cf. 14.38. Voir aussi Mt 24.42ss ; Lc 21.36 ; Ep 6.18.'
  - type: text
    content: Prenez garde, restez éveillés, car vous ne savez pas quand ce sera le moment.
  '34':
  - type: text
    content: ' '
  - type: note
    content: un homme qui, partant en voyage… 12.1. –  sa tâche ou son œuvre  ; cf. 14.6.
  - type: text
    content: 'Il en sera comme d''un homme qui, partant en voyage, laisse sa maison, donne autorité à ses esclaves, à chacun sa tâche, et commande au gardien de la porte de veiller. '
  '35':
  - type: note
    content: Veillez v. 37+. –  vous ne savez pas… Lc 12.38,40.
  - type: text
    content: 'Veillez donc, car vous ne savez pas quand viendra le maître de maison : le soir, ou au milieu de la nuit, ou au chant du coq, ou au matin ; '
  '36':
  - type: note
    content: Cf. Mt 25.5 ; voir aussi craignez.
  - type: text
    content: 'craignez qu''il n''arrive à l''improviste et ne vous trouve endormis. '
  '37':
  - type: note
    content: 'vous / à tous  : cf. v. 3 ; Lc 12.41ss. –  Veillez Mt 24.42 ; Ac 20.31 ; 1Co 16.13 ; 1Th 5.6,10 ; 1P 5.8.'
  - type: text
    content: 'Ce que je vous dis, je le dis à tous : Veillez.'
  '4':
  - type: note
    content: la fin ou l'achèvement (cf. Mt 13.39n) ; litt. le signe quand toutes ces choses vont s'achever  ; cf. 24.3 ; Lc 21.7.
  - type: text
    content: Dis-nous, quand cela arrivera-t-il ? Quel sera le signe annonçant la fin de toutes ces choses ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: Voir Mt 24.4n,6+ ; cf. Mt 10.17-22.
  - type: text
    content: 'Jésus se mit alors à leur dire : Prenez garde que personne ne vous égare. '
  '6':
  - type: note
    content: Beaucoup et une multitude de gens traduisent le même mot grec. –  en se servant de mon nom ou en mon nom, comme en 9.39+. –  C'est moi 6.50n.
  - type: text
    content: 'Beaucoup viendront en se servant de mon nom, en disant : « C''est moi ! », et ils égareront une multitude de gens. '
  '7':
  - type: note
    content: 'cela doit arriver  : cf. Dn 2.28.'
  - type: text
    content: 'Quand vous entendrez parler de guerres et de rumeurs de guerres, ne vous alarmez pas : cela doit arriver, mais ce n''est pas encore la fin. '
  '8':
  - type: note
    content: Cf. Es 13.13 ; 19.2 ; Jr 14.12+ ; 2Ch 15.6 ; Mt 24.7n,8n.
  - type: text
    content: Car nation se dressera contre nation et royaume contre royaume ; dans divers lieux il y aura des tremblements de terre, il y aura des famines. Ce sera le commencement des douleurs de l'accouchement.
  - type: heading
    content: Mt 10.17-22  ; Lc 21.12-17
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'aux tribunaux  : litt. aux sanhédrins  ; il s''agit de toute évidence ici, non du grand sanhédrin de Jérusalem, mais des conseils locaux des synagogues . –  témoignage 1.44+.'
  - type: text
    content: 'Prenez garde à vous-mêmes ; on vous livrera aux tribunaux et vous serez battus dans les synagogues ; vous comparaîtrez devant des gouverneurs et des rois à cause de moi ; ce sera pour eux un témoignage. '
