      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à cause des choisis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: élus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'il a choisis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 22,27 ; Ap 7.'
      marker-yv: yv-n
    - type: text
      text: Si le Seigneur n'avait abrégé ces jours, personne ne serait sauvé ; mais il a abrégé ces jours à cause de ceux qu'il a choisis.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 24.23-25
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lc 17.20s.
      marker-yv: yv-n
    - type: text
      text: 'Si alors quelqu''un vous dit : « Le Christ est ici ! », « il est là-bas ! », ne le croyez pas. '
