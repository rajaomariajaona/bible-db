  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lc 21.23 ; 23.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Quel malheur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 11.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Quel malheur pour les femmes enceintes et pour celles qui allaiteront en ces jours-là !
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Priez pour que cela n''arrive pas en hiver. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'détresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 24.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Th 3.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir Dn 12.1 ; cf. Ex 9.18 ; Dt 4.32 ; Jl 2.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du monde que Dieu a créé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la création que Dieu a créée.
      marker-yv: yv-n
    - type: text
      text: 'Car ces jours-là seront des jours de détresse, d''une détresse telle qu''il n''y en a pas eu de semblable depuis le commencement du monde que Dieu a créé jusqu''à maintenant, et qu''il n''y en aura jamais plus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jr 7.14 ; 9.11+ ; Lc 19.44. – A la fin du v., certains mss ajoutent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et après trois jours un autre sera érigé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le même verbe étant traduit ailleurs par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: relever, ressusciter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sans (le secours des) mains (de l'homme)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 14.58.'
      marker-yv: yv-n
    - type: text
      text: 'Jésus lui répondit : Tu vois ces grandes constructions ? Il ne restera pas pierre sur pierre qui ne soit renversée.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les signes annonciateurs de la fin
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 24.4-8  ; Lc 21.8-11
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
