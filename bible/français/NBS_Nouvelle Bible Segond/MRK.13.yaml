    - type: text
      text: 'Prenez garde à vous-mêmes ; on vous livrera aux tribunaux et vous serez battus dans les synagogues ; vous comparaîtrez devant des gouverneurs et des rois à cause de moi ; ce sera pour eux un témoignage. '
