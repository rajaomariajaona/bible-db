    children:
    - type: text
      text: La destruction du temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 24.1-3  ; Lc 21.5-7
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon Flavius '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Josèphe
        - type: text
          text: ', la reconstruction du '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Jérusalem, entreprise par Hérode le Grand, était toujours en cours au temps de Jésus (Jn 2.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; le nouveau temple ne sera achevé qu''en l''an 64, six ans seulement avant sa destruction par les Romains. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Maître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : au sens d’'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enseignant.
      marker-yv: yv-n
    - type: text
      text: 'Alors qu''il sort du temple, un de ses disciples lui dit : Maître, regarde, quelles pierres, quelles constructions ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que la bonne nouvelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'soit proclamée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à toutes les nations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.9 ; 16.15 ; Mt 24.14 ; 28.18ss ; Col 1.23 ; Ap 14.6 ; cf. Lc 21.24 ; Rm 11.25 ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il faut d''abord que la bonne nouvelle soit proclamée à toutes les nations. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 10.19s ; Lc 12.11s ; cf. Jn 14.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce moment même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette heure-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Voir aussi '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esprit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Quand on vous emmènera pour vous livrer, ne vous inquiétez pas à l'avance de ce que vous direz, mais dites ce qui vous sera donné à ce moment même ; car ce n'est pas vous qui parlerez, c'est l'Esprit saint.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mi 7.6 ; Mt 10.21+.
      marker-yv: yv-n
    - type: text
      text: 'Le frère livrera son frère à la mort, et le père son enfant ; les enfants se dresseront contre leurs parents et les feront mettre à mort. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Mt 10.22+ ; cf. 24.9,13 ; Jn 15.18-21 ; 16.2 ; 1P 4.14 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Epître de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Barnabé
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.9 : « Prenons donc garde dans les derniers jours, car il ne nous servira de rien tout le temps de notre vie et de notre foi, à moins que maintenant, dans le siècle impie et dans les scandales à venir, nous ne résistions comme il convient à des fils de Dieu. »'
      marker-yv: yv-n
    - type: text
      text: Vous serez détestés de tous à cause de mon nom ; mais celui qui persévérera jusqu'à la fin sera sauvé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une grande détresse
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 24.15-22  ; Lc 21.20-24
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'abominable dévastateur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''abomination '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''horreur de la dévastation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(traduction traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'abomination de la désolation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; l''expression pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'abomination dévastatrice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais la suite est au masculin ; voir '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.27 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 11.31 ; 12.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Mt 24.15+ ; 2Th 2.3s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fuient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jr 4.6 ; 6.1 ; 48.6 ; 49.8,30 ; 51.6 ; Ez 7.16.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque vous verrez '
    - type: usfm
      marker: it
      children:
      - type: text
        text: l'abominable dévastateur
    - type: text
      text: ' installé là où il ne doit pas être – que le lecteur comprenne – alors, que ceux qui seront en Judée fuient dans les montagnes ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Mt 24.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lc 17.31.'
      marker-yv: yv-n
    - type: text
      text: 'que celui qui sera sur le toit en terrasse n''en descende pas, qu''il ne rentre pas pour prendre quelque chose chez lui ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.16 '
      - type: usfm
        marker: fq
