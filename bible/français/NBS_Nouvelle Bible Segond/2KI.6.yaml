    marker-yv: yv-n
  - type: text
    text: 'Le roi d''Israël vint à passer sur la muraille, et une femme lui cria : Sauve-nous, ô roi, mon seigneur ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
