      children:
      - type: text
        text: 'messager '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dans la phrase précédente (les deux termes se ressemblent en hébreu). En suivant le texte hébreu traditionnel, on peut supposer que le roi suit son messager de près.
    marker-yv: yv-n
  - type: text
    text: 'Il leur parlait encore que déjà le messager était descendu vers lui ; il disait : Ce malheur vient du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! Que puis-je encore attendre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ?'
