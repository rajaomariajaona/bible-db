    marker-yv: yv-n
  - type: text
    text: 'Il répondit : Si le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne te sauve pas, avec quoi te sauverais-je ? Avec le produit de l''aire ou du pressoir ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cette femme…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les deux femmes se disputant un enfant rappellent, dans une version macabre, le jugement de Salomon (1R 3.16-28).'
    marker-yv: yv-n
  - type: text
    text: 'Le roi lui dit encore : Qu''as-tu ? Elle répondit : Cette femme-là m''a dit : « Donne ton fils ; nous le mangerons aujourd''hui, et demain nous mangerons mon fils ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nous avons fait cuire…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lm 4.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle a caché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : comme en Jos 6.17,25 ; 1R 18.4,13 ; Es 49.2 où apparaît la même forme verbale en hébreu, il s''agit de cacher pour sauver.'
    marker-yv: yv-n
  - type: text
    text: 'Nous avons fait cuire mon fils, et nous l''avons mangé. Le jour suivant, je lui ai dit : « Donne ton fils, que nous le mangions ! » Mais elle a caché son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
