      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : plusieurs rois araméens portent ce nom, celui-ci pourrait être Ben-Hadad II (vers 880-841), également connu sous le nom de Hadad-Ezer dans les textes assyriens. Il mourra étouffé par Hazaël à qui Elisée prédit la royauté en 8.7-15. Le roi d''Israël qui lui fait face ici serait Joram. Il n''est pas impossible toutefois que ce récit concerne une guerre plus tardive (vers 810) entre Ben-Hadad III, fils d''Hazaël et Joas d''Israël.'
    marker-yv: yv-n
  - type: text
    text: 'Après cela, Ben-Hadad, roi d''Aram, rassembla toutes ses troupes et vint assiéger Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
