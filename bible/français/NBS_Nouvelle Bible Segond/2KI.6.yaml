      - type: text
        text: ') : selon la lecture traditionnelle attestée dans LXX et par Flavius '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Josèphe
      - type: text
        text: '  ; ce dernier supposait qu''on utilisait la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fiente de pigeon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comme un ersatz de sel ; d'autres supposent qu'elle servait de combustible, faute de bois. Une autre possibilité serait de voir dans le terme hébreu le nom d'une plante peu comestible, mais recherchée en cas de famine.
    marker-yv: yv-n
  - type: text
    text: Il y eut une grande famine dans Samarie. Le siège fut tel qu'une tête d'âne finit par valoir quatre-vingts pièces d'argent, et le quart d'un qab de fiente de pigeon cinq pièces d'argent.
