      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : allusion possible à la persécution dont ont été victimes les prophètes de YHWH sous Achab et Jézabel (1R 18.4).'
    marker-yv: yv-n
  - type: text
    text: 'Or Elisée était assis chez lui, et les anciens étaient assis auprès de lui. Le roi envoya un homme de son entourage. Mais avant que le messager soit arrivé, Elisée avait dit aux anciens : Vous voyez, ce fils de meurtrier envoie quelqu''un pour me couper la tête ! Regardez. Quand le messager arrivera, fermez la porte et repoussez-le avec la porte. Le bruit des pas de son maître n''est-il pas derrière lui ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il disait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après 7.2,17s, il s''agirait du roi et non pas du messager ; de ce fait, beaucoup modifient avec Flavius '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Josèphe
      - type: text
        text: ' le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'roi '
    - type: usfm
      marker: ft
