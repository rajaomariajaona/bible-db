      - type: text
        text: ', en signe de deuil ou de tristesse, peut-être aussi de rage en l''occurrence (cf. v. 31) ; cf. 2.12 ; 5.7 ; 1S 4.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1R 21.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Esd 9.3+,5. –  '
