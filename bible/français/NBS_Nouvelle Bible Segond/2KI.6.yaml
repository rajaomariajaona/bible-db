        text: comme il se tenait.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le roi entendit les paroles de cette femme, il déchira ses vêtements. Comme il passait sur la muraille, le peuple vit qu''il avait par-dessous un sac sur le corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
