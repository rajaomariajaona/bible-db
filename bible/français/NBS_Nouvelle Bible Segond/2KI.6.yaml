document_id: 2KI.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La cognée perdue
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' des prophètes'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 2.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: où nous sommes assis devant toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: où nous habitons avec toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; mais il s'agit plus probablement du lieu où les disciples d'Elisée reçoivent son enseignement (l'élève est assis devant le maître, cf. Ac 22.3).
    marker-yv: yv-n
  - type: text
    text: 'Les prophètes dirent à Elisée : Le lieu où nous sommes assis devant toi est trop étroit pour nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour y tenir séance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour y habiter.
    marker-yv: yv-n
  - type: text
    text: 'S''il te plaît, allons jusqu''au Jourdain ; nous y prendrons chacun une poutre et nous nous ferons là un lieu pour y tenir séance. Il répondit : Allez ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec tes serviteurs.
    marker-yv: yv-n
  - type: text
    text: 'L''un d''eux dit : Accepte de venir avec nous, je te prie ! Il répondit : J''irai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il alla donc avec eux. Arrivés au Jourdain, ils coupèrent des arbres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: emprunté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : après les épisodes de 4.1-7,38-44, ce récit vient conforter l''idée de l''extrême pauvreté des confréries prophétiques.'
    marker-yv: yv-n
  - type: text
    text: 'Comme l''un d''eux abattait une poutre, le fer tomba dans l''eau. Il s''écria : Ah ! maître, il était emprunté ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''homme de Dieu dit : Où est-il tombé ? Il lui montra l''endroit. Alors Elisée coupa un morceau de bois, le jeta au même endroit et fit flotter le fer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis il dit : Reprends-le ! L''autre tendit la main et le prit.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elisée capture des soldats araméens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: J'établirai mon campement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : des versions anciennes ont compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tendons un piège
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tel et tel endroit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 21.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi d''Aram était en guerre contre Israël ; il tint conseil avec les gens de sa cour et dit : J''établirai mon campement à tel et tel endroit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'homme de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Elisée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 10.'
    marker-yv: yv-n
  - type: text
    text: 'Mais l''homme de Dieu fit dire au roi d''Israël : Garde-toi de passer par ce lieu ; les Araméens y descendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: indiqué
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dit et signalé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '( ?) ; le second terme est absent de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cela se produisit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ni une (fois) ni deux.
    marker-yv: yv-n
  - type: text
    text: Alors le roi d'Israël envoya des gens à l'endroit que l'homme de Dieu lui avait indiqué, pour y monter la garde.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Cela se produisit plusieurs fois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui, parmi les nôtres, travaille pour…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre lecture possible '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui nous trahit pour le roi d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Le roi pense qu'un espion dévoile ses plans à son ennemi.
    marker-yv: yv-n
  - type: text
    text: 'Le roi d''Aram eut le cœur troublé par cette affaire. Il appela les gens de sa cour et leur dit : Ne me direz-vous pas qui, parmi les nôtres, travaille pour le roi d''Israël ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''un d''eux répondit : Personne, ô roi ! C''est Elisée, le prophète qui est en Israël, qui rapporte au roi d''Israël les paroles que tu prononces dans ta chambre à coucher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dotân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : aujourd''hui Tell Dotân, ville située à 10 km au sud de Djenin, sur la route qui va de Sichem à la plaine côtière ; cf. Gn 37.17 ; voir '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Judith
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.9 ; 4.6 ; 7.3,18 ; 8.3.
    marker-yv: yv-n
  - type: text
    text: 'Le roi dit : Allez voir où il est, et je l''enverrai prendre. On vint lui dire : Il est à Dotân. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des chevaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX met le mot au singulier (comme au v. 15) mais il peut s''agir d''un nom collectif.'
    marker-yv: yv-n
  - type: text
    text: 'Il y envoya des chevaux, des chars et une forte troupe, qui arrivèrent de nuit et encerclèrent la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'auxiliaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.43+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: homme de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le serviteur dit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: garçon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lui dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Le serviteur qui n''est pas nommé pourrait être celui de l''auxiliaire ; il est toutefois plus simple de penser que le serviteur et l''auxiliaire sont un seul et même homme, peut-être Guéhazi. Sur '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: auxiliaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 4.38,43.'
    marker-yv: yv-n
  - type: text
    text: 'L''auxiliaire de l''homme de Dieu se leva de bonne heure et sortit. Une troupe cernait la ville, avec des chevaux et des chars. Le serviteur dit à l''homme de Dieu : Ah ! maître, comment ferons-nous ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il répondit : N''aie pas peur, car ceux qui sont avec nous sont plus nombreux que ceux qui sont avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chars de feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Elisée pria : '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ouvre ses yeux, je t''en prie, pour qu''il voie ! Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ouvrit les yeux du serviteur, et il vit : la montagne était pleine de chevaux et de chars de feu, tout autour d''Elisée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les Araméens descendirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils descendirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cécité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : même terme en Gn 19.11. Après avoir ouvert les yeux de son serviteur sur sa puissance, le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' rend aveugles les ennemis de son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il les frappa de cécité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains mss de LXX précisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Seigneur les frappa de cécité.
    marker-yv: yv-n
  - type: text
    text: 'Les Araméens descendirent vers Elisée. Celui-ci pria le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', en disant : Frappe cette troupe de cécité, je t''en prie ! Il les frappa de cécité, selon la parole d''Elisée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elisée leur dit : Ce n''est pas ce chemin-ci, ce n''est pas cette ville-ci ! Suivez-moi, je vous conduirai à l''homme que vous cherchez ! Il les conduisit à Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsqu''ils furent entrés dans Samarie, Elisée dit : '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ouvre les yeux de ces gens, pour qu''ils voient ! Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ouvrit leurs yeux, et ils virent qu''ils étaient dans Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à Elisée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : absent de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dois-je les abattre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la répétition est omise par plusieurs versions anciennes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi d''Israël, en les voyant, dit à Elisée : Dois-je les abattre, dois-je les abattre, père ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mets devant eux…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.44 ; Pr 25.21 ; Rm 12.20.'
    marker-yv: yv-n
  - type: text
    text: 'Il lui répondit : Tu ne les abattras pas ; abats-tu ceux que tu emmènes captifs avec ton épée et ton arc ? Mets devant eux du pain et de l''eau, afin qu''ils mangent et boivent. Qu''ils s''en aillent ensuite chez leur seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le roi d'Israël leur fit servir un grand repas, et ils mangèrent et burent ; puis il les laissa partir, et ils s'en allèrent vers leur seigneur. Les troupes araméennes ne revinrent plus dans le pays d'Israël.
