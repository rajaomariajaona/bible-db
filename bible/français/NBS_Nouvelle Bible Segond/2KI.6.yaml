    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte absent de LXX. Parce qu''Elisée a souvent sauvé son peuple, la situation tragique de ce dernier peut avoir été attribuée par le roi à une défection du prophète ; cf. 1R 19.1s.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi disait : Que Dieu me fasse ceci et qu''il y ajoute cela, si la tête d''Elisée, fils de Shaphath, reste aujourd''hui sur lui !'
