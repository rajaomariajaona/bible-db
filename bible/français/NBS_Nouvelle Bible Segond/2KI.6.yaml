document_id: 2KI.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La cognée perdue
  - type: text
    content: ' '
  - type: note
    content: 'Les prophètes  : litt. les fils des prophètes , cf. 2.3n. –  où nous sommes assis devant toi  : autre traduction où nous habitons avec toi  ; mais il s''agit plus probablement du lieu où les disciples d''Elisée reçoivent son enseignement (l''élève est assis devant le maître, cf. Ac 22.3).'
  - type: text
    content: 'Les prophètes dirent à Elisée : Le lieu où nous sommes assis devant toi est trop étroit pour nous. '
  '10':
  - type: note
    content: 'indiqué  : litt. dit et signalé ( ?) ; le second terme est absent de LXX. –  Cela se produisit…  : litt. ni une (fois) ni deux.'
  - type: text
    content: Alors le roi d'Israël envoya des gens à l'endroit que l'homme de Dieu lui avait indiqué, pour y monter la garde.
  - type: text
    content: 'Cela se produisit plusieurs fois. '
  '11':
  - type: note
    content: 'Voir cœur. –  qui, parmi les nôtres, travaille pour…  : autre lecture possible qui nous trahit pour le roi d''Israël. Le roi pense qu''un espion dévoile ses plans à son ennemi.'
  - type: text
    content: 'Le roi d''Aram eut le cœur troublé par cette affaire. Il appela les gens de sa cour et leur dit : Ne me direz-vous pas qui, parmi les nôtres, travaille pour le roi d''Israël ? '
  '12':
  - type: text
    content: 'L''un d''eux répondit : Personne, ô roi ! C''est Elisée, le prophète qui est en Israël, qui rapporte au roi d''Israël les paroles que tu prononces dans ta chambre à coucher. '
  '13':
  - type: note
    content: 'Dotân  : aujourd''hui Tell Dotân, ville située à 10 km au sud de Djenin, sur la route qui va de Sichem à la plaine côtière ; cf. Gn 37.17 ; voir Judith 3.9 ; 4.6 ; 7.3,18 ; 8.3.'
  - type: text
    content: 'Le roi dit : Allez voir où il est, et je l''enverrai prendre. On vint lui dire : Il est à Dotân. '
  '14':
  - type: note
    content: 'des chevaux  : LXX met le mot au singulier (comme au v. 15) mais il peut s''agir d''un nom collectif.'
  - type: text
    content: 'Il y envoya des chevaux, des chars et une forte troupe, qui arrivèrent de nuit et encerclèrent la ville. '
  '15':
  - type: note
    content: 'auxiliaire 4.43+. –  homme de Dieu  : cf. v. 9ns. –  Le serviteur dit…  : litt. son serviteur (ou garçon) lui dit. Le serviteur qui n''est pas nommé pourrait être celui de l''auxiliaire ; il est toutefois plus simple de penser que le serviteur et l''auxiliaire sont un seul et même homme, peut-être Guéhazi. Sur serviteur / auxiliaire, cf. 4.38,43.'
  - type: text
    content: 'L''auxiliaire de l''homme de Dieu se leva de bonne heure et sortit. Une troupe cernait la ville, avec des chevaux et des chars. Le serviteur dit à l''homme de Dieu : Ah ! maître, comment ferons-nous ? '
  '16':
  - type: text
    content: 'Il répondit : N''aie pas peur, car ceux qui sont avec nous sont plus nombreux que ceux qui sont avec eux. '
  '17':
  - type: note
    content: 'chars de feu  : cf. 2.11n.'
  - type: text
    content: 'Elisée pria : '
  - type: text
    content: Seigneur
  - type: text
    content: ', ouvre ses yeux, je t''en prie, pour qu''il voie ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ouvrit les yeux du serviteur, et il vit : la montagne était pleine de chevaux et de chars de feu, tout autour d''Elisée.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Les Araméens descendirent  : litt. ils descendirent . –  cécité  : même terme en Gn 19.11. Après avoir ouvert les yeux de son serviteur sur sa puissance, le Seigneur rend aveugles les ennemis de son prophète. –  Il les frappa de cécité  : certains mss de LXX précisent le Seigneur les frappa de cécité.'
  - type: text
    content: 'Les Araméens descendirent vers Elisée. Celui-ci pria le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en disant : Frappe cette troupe de cécité, je t''en prie ! Il les frappa de cécité, selon la parole d''Elisée. '
  '19':
  - type: text
    content: 'Elisée leur dit : Ce n''est pas ce chemin-ci, ce n''est pas cette ville-ci ! Suivez-moi, je vous conduirai à l''homme que vous cherchez ! Il les conduisit à Samarie. '
  '2':
  - type: note
    content: 'pour y tenir séance  : autre traduction pour y habiter.'
  - type: text
    content: 'S''il te plaît, allons jusqu''au Jourdain ; nous y prendrons chacun une poutre et nous nous ferons là un lieu pour y tenir séance. Il répondit : Allez ! '
  '20':
  - type: text
    content: 'Lorsqu''ils furent entrés dans Samarie, Elisée dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', ouvre les yeux de ces gens, pour qu''ils voient ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ouvrit leurs yeux, et ils virent qu''ils étaient dans Samarie. '
  '21':
  - type: note
    content: 'à Elisée  : absent de LXX. –  dois-je les abattre  : la répétition est omise par plusieurs versions anciennes. –  père  : litt. mon père  ; cf. 2.12n.'
  - type: text
    content: 'Le roi d''Israël, en les voyant, dit à Elisée : Dois-je les abattre, dois-je les abattre, père ? '
  '22':
  - type: note
    content: 'Mets devant eux…  : cf. 4.44 ; Pr 25.21 ; Rm 12.20.'
  - type: text
    content: 'Il lui répondit : Tu ne les abattras pas ; abats-tu ceux que tu emmènes captifs avec ton épée et ton arc ? Mets devant eux du pain et de l''eau, afin qu''ils mangent et boivent. Qu''ils s''en aillent ensuite chez leur seigneur. '
  '23':
  - type: text
    content: Le roi d'Israël leur fit servir un grand repas, et ils mangèrent et burent ; puis il les laissa partir, et ils s'en allèrent vers leur seigneur. Les troupes araméennes ne revinrent plus dans le pays d'Israël.
  - type: heading
    content: La famine à Samarie
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Ben-Hadad  : plusieurs rois araméens portent ce nom, celui-ci pourrait être Ben-Hadad II (vers 880-841), également connu sous le nom de Hadad-Ezer dans les textes assyriens. Il mourra étouffé par Hazaël à qui Elisée prédit la royauté en 8.7-15. Le roi d''Israël qui lui fait face ici serait Joram. Il n''est pas impossible toutefois que ce récit concerne une guerre plus tardive (vers 810) entre Ben-Hadad III, fils d''Hazaël et Joas d''Israël.'
  - type: text
    content: 'Après cela, Ben-Hadad, roi d''Aram, rassembla toutes ses troupes et vint assiéger Samarie. '
  '25':
  - type: note
    content: 'quatre-vingts  : LXX cinquante. –  pièces  : sous-entendu dans le texte. –  le quart d''un qab  : peut-être environ 30 cl (voir mesures). –  fiente de pigeon (ou de colombe) : selon la lecture traditionnelle attestée dans LXX et par Flavius Josèphe  ; ce dernier supposait qu''on utilisait la fiente de pigeon comme un ersatz de sel ; d''autres supposent qu''elle servait de combustible, faute de bois. Une autre possibilité serait de voir dans le terme hébreu le nom d''une plante peu comestible, mais recherchée en cas de famine.'
  - type: text
    content: Il y eut une grande famine dans Samarie. Le siège fut tel qu'une tête d'âne finit par valoir quatre-vingts pièces d'argent, et le quart d'un qab de fiente de pigeon cinq pièces d'argent.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Sauve-nous  : autre traduction au secours  ; litt. sauve (formule comparable en 19.19 ; cf. Ps 118.25n, où le même verbe apparaît dans l''expression traduite par accorde le salut , qui sera transcrite en grec hosanna ) ; certains mss de LXX, ainsi que Syr et Vg, portent sauve-moi.'
  - type: text
    content: 'Le roi d''Israël vint à passer sur la muraille, et une femme lui cria : Sauve-nous, ô roi, mon seigneur ! '
  '27':
  - type: note
    content: 'Si le Seigneur ne te sauve pas ou non ! Que le Seigneur te sauve ! Ou encore, dans le sens d''une malédiction dictée par le désespoir  : Que le Seigneur ne te sauve pas ! –  le produit de  : probablement sous-entendu dans le texte.'
  - type: text
    content: 'Il répondit : Si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne te sauve pas, avec quoi te sauverais-je ? Avec le produit de l''aire ou du pressoir ? '
  '28':
  - type: note
    content: 'Cette femme…  : les deux femmes se disputant un enfant rappellent, dans une version macabre, le jugement de Salomon (1R 3.16-28).'
  - type: text
    content: 'Le roi lui dit encore : Qu''as-tu ? Elle répondit : Cette femme-là m''a dit : « Donne ton fils ; nous le mangerons aujourd''hui, et demain nous mangerons mon fils ! » '
  '29':
  - type: note
    content: 'Nous avons fait cuire…  : cf. Lm 4.10. –  elle a caché  : comme en Jos 6.17,25 ; 1R 18.4,13 ; Es 49.2 où apparaît la même forme verbale en hébreu, il s''agit de cacher pour sauver.'
  - type: text
    content: 'Nous avons fait cuire mon fils, et nous l''avons mangé. Le jour suivant, je lui ai dit : « Donne ton fils, que nous le mangions ! » Mais elle a caché son fils. '
  '3':
  - type: note
    content: 'avec nous  : litt. avec tes serviteurs.'
  - type: text
    content: 'L''un d''eux dit : Accepte de venir avec nous, je te prie ! Il répondit : J''irai. '
  '30':
  - type: note
    content: 'il déchira ses vêtements, en signe de deuil ou de tristesse, peut-être aussi de rage en l''occurrence (cf. v. 31) ; cf. 2.12 ; 5.7 ; 1S 4.12n  ; 1R 21.27n  ; Esd 9.3+,5. –  Comme il passait  : cf. v. 26 ; certains mss de LXX portent comme il se tenait.'
  - type: text
    content: 'Lorsque le roi entendit les paroles de cette femme, il déchira ses vêtements. Comme il passait sur la muraille, le peuple vit qu''il avait par-dessous un sac sur le corps. '
  '31':
  - type: note
    content: 'fils de Shaphath  : texte absent de LXX. Parce qu''Elisée a souvent sauvé son peuple, la situation tragique de ce dernier peut avoir été attribuée par le roi à une défection du prophète ; cf. 1R 19.1s.'
  - type: text
    content: 'Le roi disait : Que Dieu me fasse ceci et qu''il y ajoute cela, si la tête d''Elisée, fils de Shaphath, reste aujourd''hui sur lui !'
  - type: heading
    content: Elisée annonce la fin de la famine
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'les anciens…  : face au roi, on trouve aux côtés du prophète les représentants de la ville plus comme témoins de ce qui va se passer que comme alliés potentiels ; cf. Jr 19.1 ; Ez 8.1 ; 14.1 ; 20.1. –  ce fils de meurtrier  : allusion possible à la persécution dont ont été victimes les prophètes de YHWH sous Achab et Jézabel (1R 18.4).'
  - type: text
    content: 'Or Elisée était assis chez lui, et les anciens étaient assis auprès de lui. Le roi envoya un homme de son entourage. Mais avant que le messager soit arrivé, Elisée avait dit aux anciens : Vous voyez, ce fils de meurtrier envoie quelqu''un pour me couper la tête ! Regardez. Quand le messager arrivera, fermez la porte et repoussez-le avec la porte. Le bruit des pas de son maître n''est-il pas derrière lui ? '
  '33':
  - type: note
    content: 'il disait  : d''après 7.2,17s, il s''agirait du roi et non pas du messager ; de ce fait, beaucoup modifient avec Flavius Josèphe le texte hébreu traditionnel pour lire roi au lieu de messager dans la phrase précédente (les deux termes se ressemblent en hébreu). En suivant le texte hébreu traditionnel, on peut supposer que le roi suit son messager de près.'
  - type: text
    content: 'Il leur parlait encore que déjà le messager était descendu vers lui ; il disait : Ce malheur vient du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Que puis-je encore attendre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  '4':
  - type: text
    content: 'Il alla donc avec eux. Arrivés au Jourdain, ils coupèrent des arbres. '
  '5':
  - type: note
    content: 'emprunté  : après les épisodes de 4.1-7,38-44, ce récit vient conforter l''idée de l''extrême pauvreté des confréries prophétiques.'
  - type: text
    content: 'Comme l''un d''eux abattait une poutre, le fer tomba dans l''eau. Il s''écria : Ah ! maître, il était emprunté ! '
  '6':
  - type: text
    content: 'L''homme de Dieu dit : Où est-il tombé ? Il lui montra l''endroit. Alors Elisée coupa un morceau de bois, le jeta au même endroit et fit flotter le fer. '
  '7':
  - type: text
    content: 'Puis il dit : Reprends-le ! L''autre tendit la main et le prit.'
  - type: heading
    content: Elisée capture des soldats araméens
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'J''établirai mon campement  : des versions anciennes ont compris tendons un piège . –  tel et tel endroit  : cf. 1S 21.3n.'
  - type: text
    content: 'Le roi d''Aram était en guerre contre Israël ; il tint conseil avec les gens de sa cour et dit : J''établirai mon campement à tel et tel endroit. '
  '9':
  - type: note
    content: 'l''homme de Dieu  : LXX porte Elisée, de même au v. 10.'
  - type: text
    content: 'Mais l''homme de Dieu fit dire au roi d''Israël : Garde-toi de passer par ce lieu ; les Araméens y descendent. '
