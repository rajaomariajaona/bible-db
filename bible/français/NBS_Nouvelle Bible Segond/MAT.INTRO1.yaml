  - type: text
    content: Les répétitions structurelles
  - type: text
    content: 'A cinq reprises une même for­mule vient ponctuer le texte, avec quelques variantes : '
  - type: text
    content: Quand Jésus eut acheve ces discours...
  - type: text
    content: ' (7.28 ; cf. 11.1 ; 13.53 ; 19.1 ; 26.1). Elle fixe les limites des '
  - type: text
    content: cinq grands discours
  - type: text
    content: ' de l''évangile et introduit à chaque fois une partie narrative, composée essentielle­ment de récits de miracles et de morceaux biographiques. Ces cinq cycles peuvent évoquer les cinq rouleaux de la loi mosaïque et suggérer au lecteur que le Christ est un nouveau Moïse – en fait, pour Matthieu, Jésus est plus grand que Moïse en ce que lui a autorité sur la loi (cf. les '
  - type: text
    content: mais moi, je vous dis
  - type: text
    content: ', du Sermon sur la montagne, Mt 5.22+). On a aussi discerné une répétition structurelle dans la formule '
  - type: text
    content: des lors Jésus commença
  - type: text
    content: ', en 4.17 et 16.21.'
  - type: text
    content: Donc, un texte facile à mémo­riser et à transmettre. Encore fallait-il, pour expliquer la faveur dont il fut l'objet, que le contenu de l'évangile fut pertinent ! Or, à l'évidence, Matthieu fournit aux communautés destinataires bien des éléments utiles à leur construction et à leur développement.
  - type: text
    content: Un evangile pour se défendre
  - type: text
    content: Si Matthieu a été publié vers l'an 80, comme on le pense d'or­dinaire, il faut se souvenir de la situation religieuse de l'époque pour le bien comprendre.
  - type: text
    content: 'Le temple* a été incendié et presque totalement détruit en 70, lors de la prise de Jérusalem par Titus. Le service sacrificiel a cessé. Aprés la ruine du temple, le clergé et les sadducéens* ont perdu la source méme de leur in­fluence. Les pharisiens*, eux, pensent que seules leurs traditions peuvent permettre au ju­daïsme de surmonter la catas­trophe. Comme substitut des sacrifices devenus impossibles, ils proposent l''observation et l''étude de la loi juive. Plus n''est question de pluralisme : la liste des textes sacrés acceptables (donc canoniques) est arrêtée ; il faut réglementer l''interprétation des traditions anciennes. Le judaïsme finira par introduire dans le service synagogal une prière contre les hérétiques, qui va pratiquement interdire l''accès de la synagogue à tous les oppo­sants, et en particulier aux chrétiens (voir l''introduction à l''Evangile selon Jean, p.${XEvJn). A la fin du I'
  - type: text
    content: er
  - type: text
    content: ' siècle, le judaïsme sera devenu un '
  - type: text
    content: judaïsme pharisien
  - type: text
    content: .
  - type: text
    content: 'Les chrétiens seront non seule­ment exclus des synagogues, mais encore persécutés pour avoir reconnu en Jésus le '
  - type: text
    content: Messie
  - type: text
    content: ' promis. Dès son introduction en forme de généalogie (1.1-17), l''Evangile selon Matthieu leur donne de quoi argumenter. Avec force, il annonce que Jésus est bien le Messie par excellence, fils d''Abraham le père fondateur, mais aussi fils de David, la figure messianique incontestée.'
  - type: text
    content: 'Le Christ récapitule en outre la '
  - type: text
    content: destinée d'Israël
  - type: text
    content: '. Tout comme le peuple, ce premier-né du '
  - type: heading
    content: Seigneur
  - type: text
    content: ' (Ex 4.22), il dut fuir en Egypte pour échapper à la mort et en remonter (Mt 2.13-15). Lui aussi dut passer au désert une période d''épreuve (4.1-11).'
  - type: text
    content: 'Pour Matthieu, ce n''est pas tra­hir Israël que d''adhérer au Christ Jésus. Lui seul est l''accomplisse­ment de l''Ecriture. Seule son in­terprétation de la loi est nor­mative (5.17ss) et non celles, accommodantes (19.8) et pour­tant lourdes à porter (23.4), que recommandent les pharisiens. De sa propre autorité Jésus met '
  - type: text
    content: l'amour au centre de la loi
  - type: text
    content: ' (5.43-­48 ; 7.29 ; 22.34-40).'
  - type: text
    content: Un évangile qui prend l'offensive
  - type: text
    content: L'Evangile selon Matthieu est aussi un texte de combat. Clai­rement et fortement, il affirme que rejeter le Christ, c'est rejeter Dieu. Et puisque telle est l'atti­tude des autorités juives, c'est l'Eglise, communauté de Juifs et de païens, qui recevra le Royaume (21.43).
  - type: text
    content: 'Ces '
  - type: text
    content: païens
  - type: text
    content: ', on les trouve deja dans la généalogie. Et des '
  - type: text
    content: fem­mes
  - type: text
    content: ', souvent en marge de l''idéal du mariage ! '
  - type: text
    content: Tamar
  - type: text
    content: ', la belle-fille de Juda ; '
  - type: text
    content: Rahab
  - type: text
    content: ', la prostituée cananéenne ; '
  - type: text
    content: Ruth
  - type: text
    content: ', la Moabite ; Bethsabée, '
  - type: text
    content: la femme d'Urie
  - type: text
    content: ' le Hittite (1.3'
  - type: text
    content: n
  - type: text
    content: 'ss). Celles-ci montrent que la lignée davidique, et '
  - type: text
    content: à fortiori
  - type: text
    content: ' l''ascendance du Fils de Dieu, ne répond pas à des critères éthniques ou purement juridi­ques. Sont rejetés ceux qui se croient suffisamment justes au regard de la loi : les pharisiens eux-mêmes, denoncés pour leur hypocrisie et leur religion au visage double (5.20 ; 12.24ss ; 23). Les mysteres du royaume leur sont inaccessibles. D''où le parler en paraboles, qui laisse '
  - type: text
    content: dehors
  - type: text
    content: ' les orgueilleux tandis qu''aux disciples de Jésus il est '
  - type: text
    content: donné de connaître les mystères du règne des cieux
  - type: text
    content: ' (13.10-17).'
  - type: text
    content: 'S''il y a malheureusement rejet, il concerne davantage les autori­tés que les '
  - type: text
    content: moutons perdus
  - type: text
    content: ' d''Is­raël (15.24 ; cf. 9.36). C''est vers ces derniers que va le Christ. C''est aussi vers eux qu''il envoie ses disciples (10.6). Cependant, en rapportant la guérison accomplie en faveur de la Cananéenne (15.21ss), Matthieu sug­gère aussi que tous, les non-Juifs comme les pécheurs d''Is­raël (9.9-13), sont finalement au bénéfice de la bonne nouvelle (cf. 28.16ss).'
  - type: text
    content: Un évangile pour les disciples
  - type: text
    content: 'Les ennemis dénoncés, reste à donner un contenu à la foi. Plus que tout autre, l''Evangile selon Matthieu mettra en valeur l''etat de '
  - type: text
    content: disciple
  - type: text
    content: ' (73 fois dans le premier évangile, contre 46 chez Marc et 37 chez Luc), au point qu''on peut le considérer comme un manuel destiné aux disciples.'
  - type: text
    content: 'Tout disciple a besoin d''un enseignement. Au cœur de l''Evangile selon Matthieu, le premier des cinq discours, le «Sermon sur la montagne» (chap. 5-7), constitue '
  - type: text
    content: la charte du royaume
  - type: text
    content: '. En trois chapitres d''une richesse et d''une densité inégalées sont regroupés des encouragements (p. ex. les béatitudes, 5.1-12), les fameuses antithèses sur l''interprétation de la loi où Jésus dépasse la casuistique pharisienne (5.27-48), des conseils de piété (p. ex. sur la prière, 6.5-18), des mises en garde aussi (p. ex. ne pas amasser des '
  - type: text
    content: trésors sur la terre
  - type: text
    content: ', 6.19). Dans son expérience quotidienne, le disciple se rapportera sans cesse à cet enseignement d''une redoutable exigence, puisque c''est la perfection divine qui est ici la référence : '
  - type: text
    content: Vous serez donc parfaits, comme votre Père cèleste est parfait
  - type: text
    content: ' (5.48). Mais cette perfection est celle d''un Dieu plein de sollicitude, le Créateur qui dispense ses bienfaits sur les méchants comme sur les bons (5.45). La parole absolue, excessive, de Jésus, n''est pas une simple morale plus performante que les autres. Elle est la parole même du règne de Dieu qui fait surgir, pour celui qui la reçoit dans la foi, une nouvelle compréhension de Dieu, du monde et des autres.'
  - type: text
    content: 'S''il se préoccupe fortement du disciple pris individuellement, Matthieu le considère aussi en tant que membre d''une '
  - type: text
    content: communauté
  - type: text
    content: ', au point que le premier évangile est souvent appelé « l''évangile de l''Eglise ». Le discours du chapitre 18 énonce les règles fondamentales de la vie communautaire : être humble comme un enfant ; ne pas constituer une occasion de chute pour ses frères ; rechercher la brebis égarée ; pardonner sans limite.'
  - type: text
    content: 'Le discours missionnaire (chap. 10) rappelle en outre à la communauté des disciples que la foi est '
  - type: text
    content: mission
  - type: text
    content: ', résumée en six verbes qui sont autant de défis : aller, proclamer, guérir, réveiller, purifier, chasser. Ce discours prépare l''envoi final (28.16ss).'
  - type: text
    content: 'Etre disciple, enfin, c''est attendre le Maître qui doit revenir. La '
  - type: text
    content: fin des temps
  - type: text
    content: ' et ses corollaires, le retour du Christ et le jugement, jouent un rôle déterminant chez Matthieu (on peut retrouver la notion de jugement dans près d''un paragraphe sur deux).'
  - type: text
    content: 'Il fait peu de doute que les premiers chrétiens furent surpris et désappointés : le Maître ne tardait-il pas à venir ? Le dernier discours (chap. 24-25) est donc là pour rassurer. Ils n''ont pas à craindre le temps qui passe. L''homme parti en voyage ne revient que '
  - type: text
    content: longtemps après
  - type: text
    content: ' (25.19). Dans l''intervalle, il leur faut veiller (24.13,42,44), non pas d''une veille stérilement attentiste, mais d''une veille active dans la foi. Le jugement vient en effet qui séparera les moutons des chèvres, les justes des injustes, ceux qui auront secouru les malades, visité les prisonniers et accueilli les étrangers, de ceux qui se seront enfermés dans une coupable abstention (25.31-46).'
  - type: text
    content: Un évangile de l'éternelle présence
  - type: text
    content: 'Lorsque l''enfant paraît à Bethléem, Matthieu rappelle par une citation d''Esaïe quel doit être son nom : '
  - type: text
    content: 'Emmanuel, ce qui se traduit: Dieu avec nous'
  - type: text
    content: ' (1.23).'
  - type: text
    content: 'Lorsque le Christ apparaît après la résurrection, il laisse cette promesse aux Onze venus le retrouver en Galilée : '
  - type: text
    content: Je suis avec vous tous les jours, jusqu'a' la fin du monde
  - type: text
    content: ' (28.20).'
  - type: text
    content: Cette inclusion qui ouvre et referme l'évangile n'est pas pur artifice littéraire. A la différence de Luc, Matthieu ne rapporte pas l'ascension du Christ. Ainsi, la dernière parole que nous laisse le premier évangile est, pour ses destinataires initiaux comme pour nous, celle d'un Christ qui demeure éternellement avec les siens.
