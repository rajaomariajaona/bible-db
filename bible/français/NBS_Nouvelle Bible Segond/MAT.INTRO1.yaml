document_id: MAT.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Commencement de la
    - type: text
      text: ' '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: bonne nouvelle
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: de Jésus-Christ…
    - type: text
      text: ' C''est par ces mots que s''ouvre l''Evangile selon Marc, le plus ancien sans doute de nos quatre évangiles.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '« Evangile » est un mot aux résonances multiples. A l''origine, le mot grec '
    - type: usfm
      marker: it
      children:
      - type: text
        text: euaggelion,
    - type: text
      text: ' qu''on s''est généralement borné à transcrire « Evangile » en français et que la présente traduction rend par '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bonne nouvelle
    - type: text
      text: ', désigne l''annonce d''un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: événement heureux
    - type: text
      text: ', et en particulier la proclamation d''une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: victoire
    - type: text
      text: '. Dans le Nouveau Testament, où il apparaît plus de soixante-dix fois, il se rapporte à la bonne nouvelle du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: salut
    - type: text
      text: ', celle de la victoire remportée par le Christ.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Pour beaucoup, lire l'Evangile, c'est lire le Nouveau Testament, voire la Bible tout entière. Abus de langage, certes, mais qui recèle une large part de vérité. L'Evangile n'est-il pas pour les chrétiens le point culminant de toute la révélation divine ?
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Reste que « l''Evangile » se dit aussi au '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: pluriel
    - type: text
      text: '  : il se présente sous les noms de Matthieu, de Marc, de Luc et de Jean. Et nous voilà avec quatre évangiles, quatre communiqués de victoire, ce qui est pour le moins surprenant.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La question se pose donc : pourquoi quatre évangiles ? L''Eglise ancienne, pour faire droit à plusieurs tendances en son sein, aurait-elle admis des versions concurrentes du message ? A-t-il fallu compléter le texte de Marc par celui de Matthieu, de Luc ou de Jean ?'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: 'Au commencement : Jésus de Nazareth'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'C''est l''évidence, mais il convient de le souligner : pas d''évangiles sans '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Jésus
    - type: text
      text: ' de Nazareth. Un homme, une vie dont on ne peut pas tout dire, à telle enseigne que le quatrième évangile s''achèvera sur cette remarque : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jésus a fait encore beaucoup d'autres choses ; si on les écrivait en détail, le monde même, j'imagine, ne pourrait contenir les livres qu'on écrirait
    - type: text
      text: ' (Jn 21.25).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Cependant, à partir de l''événement le plus terrible et le plus fondateur – la crucifixion du Maître, d''où jaillit la parole inouïe de la résurrection (Mc 14 à 16/ /) – le désir et la nécessité du récit '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: remontent le temps
    - type: text
      text: '  : on rapporte les conflits de Jésus avec ses adversaires (Mc 7), ses actes libérateurs (Mc 1–2), son enseignement (Mt 5–7 ; 13), ses rencontres avec des gens de toutes conditions, comme la pécheresse (Lc 7.36-50), le jeune homme riche (Lc 18.18-30), Zachée le collecteur des taxes (Lc 19.1-10), Nicodème le sanhédrite (Jn 3). On s''intéresse à sa vocation et au début de son ministère (Mc 1/ /), et même parfois à son enfance et à sa naissance (Mt 1–2 ; Lc 1–2).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Des témoins qui racontent
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Nous sommes sur le parvis du temple de Jérusalem, dans la cour qui est accessible aux non-Juifs. La foule des pèlerins venus de toutes les parties du monde romain se presse autour des tables où l''on change l''argent païen en monnaie admise dans l''enceinte sacrée, et où l''on achète des animaux pour les sacrifices (voir aussi Dt 14.22ss). Pour éviter de contourner l''aire du temple, des porteurs de fardeaux se fraient un chemin entre les groupes rassemblés autour de leurs rabbis. Ici et là les gens s''écartent devant des prêtres aux habits somptueux et à la démarche solennelle, des scribes au front grave. Soudain, un jeune rabbi se met à renverser les tables : il tonne, bouscule les marchands, effraie les animaux, créant un désordre indescriptible. Au nom de Dieu, il déclenche un scandale inouï dans la maison de Dieu (cf. Mc 11.15ss/ /).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Une fois passés les premiers instants de stupeur, que feront les témoins de la scène ? Rentreront-ils tranquillement chez eux, comme si de rien n'était, sans rien dire ? Impossible ! Et que feront ceux qui les auront entendus, sinon réfléchir à ce qui s'est passé et en parler à leur tour ?
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ainsi s''écrivent les premiers fragments d''évangiles. Non pas sur du papyrus ou des parchemins, mais dans la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: mémoire
    - type: text
      text: ' des foules. On appelle cette étape «  '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: tradition orale
    - type: text
      text: '  ». C''est la période où l''histoire de Jésus circule de bouche à oreille, par bribes (un miracle ; une parabole ; une petite phrase etc.). Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: prédicateurs
    - type: text
      text: ' en font usage, soulignant les traits qui correspondent aux besoins particuliers de leur communauté. Certes, nous sommes enclins à nous méfier d''un tel mode de communication, dans la mesure où, aujourd''hui, l''écrit seul nous paraît digne de foi. Mais il n''en était pas ainsi à l''époque. Il est d''ailleurs bien établi que des procédés mnémotechniques élaborés rendaient très fiable la transmission orale. De plus, il est probable qu''on commença d''assez bonne heure à coucher par écrit ces fragments de tradition orale.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Des traditions qui se regroupent
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Que se passe-t-il lorsque, entre amis, quelqu'un commence à évoquer des souvenirs ? C'est l'inévitable enchaînement. Un souvenir en appelle un autre. Il s'opère souvent, d'ailleurs, une sorte de classification spontanée. Pour les évangiles en construction, quelque chose d'assez semblable a dû se produire. Quelqu'un racontait un miracle et celui qui avait entendu un récit analogue s'empressait de l'ajouter. Les prédicateurs recueillaient et classaient. Ainsi se sont sans doute regroupés les récits de miracles, les paraboles et les discours de Jésus. Systématisation qui allait rendre la narration plus facile à suivre, donc plus commode pour l'enseignement.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un Evangile à proclamer dans le monde entier
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La tradition orale dépend largement des premiers témoins et de ceux qui les ont entendus raconter ce qu'ils ont vu. C'est le poids des témoins et leur accord qui confèrent à la tradition orale sa fiabilité.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Un temps arrive où les témoins oculaires viennent à disparaître. Il devient donc nécessaire de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: fixer par écrit
    - type: text
      text: ' ce qu''on avait d''abord transmis oralement. Ainsi l''histoire sera préservée. En outre, la forme écrite facilitera la propagation de l''Evangile. A Ephèse, à Corinthe, à Rome, on pourra non seulement l''entendre, mais aussi le lire.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: De l'Evangile aux évangiles
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Peut-on préciser davantage comment se sont constitués nos quatre évangiles ? Une illustration familière aidera peut-être à s'en faire une idée.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Quatre amis partent visiter l'Orient biblique. Chacun a le projet de réaliser un montage audiovisuel à partir des images qu'il aura prises. Tandis qu'ils arpentent les sites célèbres, les prises de vues se succèdent. Eventuellement, on enregistre quelques commentaires donnés par le guide.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Au retour, il faut procéder au dépouillement. Il convient d''abord de trier les documents, en regroupant les vues d''un même lieu : ici Jérusalem ; là le désert de Juda ; là encore le lac de Tibériade. Puis il s''agira de classer dans un ordre déterminé, non seulement les photos à l''intérieur de chaque dossier, mais encore les dossiers entre eux. Faut-il commencer par la Galilée ou par Jérusalem ? Quand chaque dossier, chaque document aura trouvé sa place, il ne restera plus qu''à réaliser le montage. Moment très important, où il faudra se poser ces questions fondamentales : Quel est le public visé ? Que veut-on lui dire ? Ainsi, un montage destiné à un public connaissant déjà les lieux n''aura pas la même présentation qu''un autre qui s''adresserait à un groupe ignorant tout du pays.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Au moment de rédiger, les auteurs des évangiles se sont pareillement trouvés devant des dossiers – en fait des morceaux d'évangile – qui avaient déjà circulé sous forme de tradition orale. Il y avait fort probablement des dossiers « paroles de Jésus », « miracles », « paraboles », « récits de la Passion », et ainsi de suite. Chacun, en fonction du public auquel il devait s'adresser et du but qu'il visait, a choisi dans ces dossiers les documents qui lui paraissaient les plus adéquats. Il les a classés suivant son dessein. Enfin il a rédigé son commentaire.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les ressemblances entre les évangiles (voir le tableau p.${Xsynopt}) proviennent du stock de documents disponibles. L''Evangile selon Marc est probablement le premier des quatre montages. Matthieu et Luc se sont largement inspirés de sa trame. Il y a en effet entre ces trois évangiles une incontestable ressemblance. C''est pour cette raison qu''on les nomme synoptiques (du grec '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sunopsis
    - type: text
      text: ', vue commune). Outre l''Evangile selon Marc (ou du moins un état ancien de celui-ci), Matthieu et Luc ont peut-être utilisé une autre source, rapportant principalement des paroles de Jésus (voir « Un document caché dans l''Evangile selon Luc ? », p.${Xdocluc}). Quant au quatrième évangile, il se classe nettement à part. Jean a dû disposer de son propre lot d''informations, même s''il n''ignore pas les traditions synoptiques. A l''accumulation d''images traitées brièvement – c''est plutôt le style des synoptiques – il substitue volontiers le discours et le commentaire sur l''événement.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'A la fin du processus de rédaction, on obtient quatre montages différents : quatre évangiles. Inutile, voire périlleux, de chercher à les superposer. Respecter les évangiles, c''est laisser à chacun son caractère propre.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Une reconstitution confirmée
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Luc, dans le prologue de son évangile, s''en explique ainsi : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Puisque beaucoup ont entrepris de composer un récit des faits qui se sont accomplis parmi nous, tels que nous les ont transmis ceux qui, dès le commencement, en ont été les témoins oculaires et sont devenus serviteurs de la Parole, il m'a semblé bon, à moi aussi, après m'être informé exactement de tout depuis les origines, de te l'exposer par écrit d'une manière suivie, très excellent Théophile, afin que tu connaisses la certitude des enseignements que tu as reçus
    - type: text
      text: ' (Lc 1.1-4).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ces versets énoncent à leur manière les différentes étapes de la rédaction des évangiles :'
  - type: usfm
    marker: im
    children:
    - type: text
      text: '1) Des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: événements
    - type: text
      text: ' se sont accomplis'
  - type: usfm
    marker: im
    children:
    - type: text
      text: '2) devant des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: témoins
    - type: text
      text: ' oculaires'
  - type: usfm
    marker: im
    children:
    - type: text
      text: '3) qui les ont '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: transmis
    - type: text
      text: ' (tradition orale)'
  - type: usfm
    marker: im
    children:
    - type: text
      text: '4) à beaucoup de gens qui ont voulu '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: composer un récit
    - type: text
      text: ' (regroupement des traditions).'
  - type: usfm
    marker: im
    children:
    - type: text
      text: '5) Luc '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: s'informe exactement
    - type: text
      text: ' (il étudie les documents dont il dispose) ;'
  - type: usfm
    marker: im
    children:
    - type: text
      text: 6) il dresse un plan
    - type: usfm
      marker: bd
      children:
      - type: text
        text: suivi
    - type: text
      text: ' (il classe les documents) ;'
  - type: usfm
    marker: im
    children:
    - type: text
      text: '7) il se met à '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: écrire
    - type: text
      text: ' (rédaction)'
  - type: usfm
    marker: im
    children:
    - type: text
      text: '8) à l''intention de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Théophile
    - type: text
      text: ' (en fonction du public visé)'
  - type: usfm
    marker: im
    children:
    - type: text
      text: '9) pour que celui-ci '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: connaisse la certitude des enseignements reçus
    - type: text
      text: ' (en fonction du message qu''il veut transmettre).'
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Selon Matthieu
  - type: usfm
    marker: is1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''Evangile selon Matthieu sert de portail d''entrée au Nouveau Testament. C''est souvent par lui que le lecteur s''initie à l''Ecriture sainte. Cette préférence n''est pas nouvelle. Mentionné le premier dans les listes canoniques alors que l''évangile de Marc a sans doute été rédigé avant lui (cf. « De l''Evangile aux quatre évan­giles », p.${XEv4ev), Matthieu est le plus cité dès le debut de l''histoire chrétienne. Dans la '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Didachè*,
    - type: text
      text: ' qui remonte peut-être à la deuxième moitié du I'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: er
    - type: text
      text: ' siècle, on respire souvent l''atmosphère du premier évangile (cf. Mt 6.9'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ' ). A la fin du I'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: er
    - type: text
      text: ' siecle, Clement de Rome semble en citer des éléments ; de même, au seuil du II'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siecle, les lettres d''Ignace* d''Antioche et celle de Barnabé*.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: D'où vient ce privilège ? Mat­thieu est-il à ce point original ? Certes non. Sur les 1071 versets qui le composent, 330 semblent venir tels quels de Marc et 230 autres se retrouvent également dans Luc. La primitive Eglise eut pourtant bien des raisons de donner à Matthieu le premier rang.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un évangile où Jésus enseigne et guérit
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Matthieu, comme Luc, a vraisemblablement developpé l''Evangile selon Marc, au moins dans un état ancien, en y ajoutant des traditions sur les paroles de Jésus – certaines qu''il semble tirer d''un fonds commun partagé par Luc, d''autres qui lui sont propres (voir « Un document caché dans l''Evangile selon Luc ? », p.${XEvLc). Sa principale originalité est d''avoir composé une présenta­tion solennelle du ministere de Jésus en '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: deux tableaux
    - type: text
      text: ' encadrés par deux résumés rédigés en ter­mes semblables (4.23 et 9.35). La proclamation de la bonne nou­velle se fait par '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'enseignement
    - type: text
      text: ' (5-7) et par des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: actes salutaires
    - type: text
      text: ' (8-9). L''interprète de la loi est aussi celui qui sauve et guérit. La seconde originalité de Mat­thieu est d''avoir souligné le lien entre le Christ et ses disciples, en faisant suivre immédiatement cet ensemble par l'''
    - type: usfm
      marker: bd
      children:
      - type: text
        text: envoi des Douze
    - type: text
      text: ' (10), qui préfigure et pré­pare l''envoi final (28.16ss). L''am­pleur de la tâche rend indispensable la participation des disciples à la proclamation de leur Maître, mais leur seule mis­sion consiste a démultiplier son action.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un evangile ou l'Ecriture s'accomplit
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Des quatre évangiles, c''est Matthieu qui est le plus nourri de l''Ancien Testament : plus de 130 allusions et 43 citations for­melles. Les chrétiens d''origine juive s''y trouvèrent donc en ter­rain connu, d''autant plus que Matthieu voit dans les événements qu''il décrit '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'l''accomplissement de la Loi et des Prophètes '
    - type: text
      text: (voir l'introduction à l'Ancien Testament, p.${XIntAT). Sous une forme variant à peine, cette idée d'accomplissement s'y rencontre au moins 11 fois (voir 1.22+) contre seulement 2 chez Marc, 2 chez Luc et 6 chez Jean.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'A l''instar de l''Israël contempo­rain, les communautés dans les­quelles l''Evangile selon Matthieu a vu le jour comprenaient de toute évidence des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: scribes*
    - type: text
      text: ' (23.34). Sans doute le rôle de ces scribes chrétiens consistait-il non seulement à transmettre l''enseignement de Jésus et à l''appliquer à des situations nou­velles, mais aussi à relire les Ecri­tures d''Israël à la lumiere des pa­roles et de la vie du Maître. Tout porte à croire que Matthieu dévoile son propre programme dans cette remarque : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tout scribe instruit du règne des cieux est semblable à un maître de maison qui tire de son trésor des choses nouvelles et des choses anciennes
    - type: text
      text: ' (13.52).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un évangile facile a mémoriser
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Pour l''Eglise naissante chargée de porter la bonne nouvelle du salut jusqu''aux confins de la terre, l''Evangile selon Matthieu met en œuvre des moyens mné­motechniques qui rendent plus aisées la transmission et la mé­morisation de l''enseignement du Maître :'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Les regroupements numériques
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les chiffres '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: '7 '
    - type: text
      text: 'et '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: '3 '
    - type: text
      text: semblent être ici en faveur, d'une manière encore plus nette que chez Marc et chez Luc. Ainsi, les sept de­mandes du Notre Pere (6.9-13), les sept paraboles du règne ou du royaume (13.1-52), les sept «malheurs» proferés contre les pharisiens (chap. 23), sans compter les sept pains et les sept corbeilles restantes (15.32­-39), les sept maris (22.23-33) et le pardon jusqu'a soixante-dix-sept fois sept fois (18.22); ainsi encore les trois tentations (4.1­-11), les triades aumone-priére-jeune en 6.2-17, menthe-aneth-cumin et justice-compassion-foi en 23.23, et les trois prières dans le jardin de Gethsémani (26.36­-46). Les deux chiffres sont peut-être combinés dans la généalo­gie du chapitre 1, ou Jésus-Christ apparaît au terme de trois fois quatorze (3x2x7) générations.
  - type: usfm
    marker: im
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Les parallélismes
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'En 7.24-27 on trouve un parallélisme antithétique développé :'
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ainsi,
    - type: text
      text: ' quiconque entend de moi ces paroles'
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'B et les '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: met en pratique
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'C sera comme un homme '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: avisé
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'D qui a construit sa maison sur le '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: roc
    - type: text
      text: .
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'E La pluie est tombée, les tor­rents sont venus, les vents ont souffle et se sont '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: précipités
    - type: text
      text: ' sur cette maison :'
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'F elle '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: n'est pas tombée, car elle etait fondée sur le roc.
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'A'' '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Mais
    - type: text
      text: ' quiconque entend de moi ces paroles'
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'B'' et '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: ne
    - type: text
      text: ' les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: met pas en pratique
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'C'' sera comme un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: fou
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'D'' qui a construit sa maison sur le '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: sable
    - type: text
      text: .
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'E'' La pluie est tombée, les tor­rents sont venus, les vents ont soufflé et se sont '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'abattus '
    - type: text
      text: 'sur cette maison :'
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'F'' elle '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: est tombée, et sa chute a été grande
    - type: text
      text: ' .'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'En fait les parallélismes abon­dent, souvent si brefs qu''on les remarque à peine, tel le modèle croisé (chiasme) de 16.25 :'
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'A Car quiconque voudra '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: sauver
    - type: text
      text: ' sa vie'
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'B la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: perdra
    - type: text
      text: ','
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'B'' mais quiconque '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: perdra
    - type: text
      text: ' sa vie'
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: 'A'' la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: trouvera
    - type: text
      text: .
  - type: usfm
    marker: im
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Les répétitions structurelles
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'A cinq reprises une même for­mule vient ponctuer le texte, avec quelques variantes : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Quand Jésus eut acheve ces discours...
    - type: text
      text: ' (7.28 ; cf. 11.1 ; 13.53 ; 19.1 ; 26.1). Elle fixe les limites des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: cinq grands discours
    - type: text
      text: ' de l''évangile et introduit à chaque fois une partie narrative, composée essentielle­ment de récits de miracles et de morceaux biographiques. Ces cinq cycles peuvent évoquer les cinq rouleaux de la loi mosaïque et suggérer au lecteur que le Christ est un nouveau Moïse – en fait, pour Matthieu, Jésus est plus grand que Moïse en ce que lui a autorité sur la loi (cf. les '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mais moi, je vous dis
    - type: text
      text: ', du Sermon sur la montagne, Mt 5.22+). On a aussi discerné une répétition structurelle dans la formule '
    - type: usfm
      marker: it
      children:
      - type: text
        text: des lors Jésus commença
    - type: text
      text: ', en 4.17 et 16.21.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Donc, un texte facile à mémo­riser et à transmettre. Encore fallait-il, pour expliquer la faveur dont il fut l'objet, que le contenu de l'évangile fut pertinent ! Or, à l'évidence, Matthieu fournit aux communautés destinataires bien des éléments utiles à leur construction et à leur développement.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un evangile pour se défendre
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Si Matthieu a été publié vers l'an 80, comme on le pense d'or­dinaire, il faut se souvenir de la situation religieuse de l'époque pour le bien comprendre.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le temple* a été incendié et presque totalement détruit en 70, lors de la prise de Jérusalem par Titus. Le service sacrificiel a cessé. Aprés la ruine du temple, le clergé et les sadducéens* ont perdu la source méme de leur in­fluence. Les pharisiens*, eux, pensent que seules leurs traditions peuvent permettre au ju­daïsme de surmonter la catas­trophe. Comme substitut des sacrifices devenus impossibles, ils proposent l''observation et l''étude de la loi juive. Plus n''est question de pluralisme : la liste des textes sacrés acceptables (donc canoniques) est arrêtée ; il faut réglementer l''interprétation des traditions anciennes. Le judaïsme finira par introduire dans le service synagogal une prière contre les hérétiques, qui va pratiquement interdire l''accès de la synagogue à tous les oppo­sants, et en particulier aux chrétiens (voir l''introduction à l''Evangile selon Jean, p.${XEvJn). A la fin du I'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: er
    - type: text
      text: ' siècle, le judaïsme sera devenu un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: judaïsme pharisien
    - type: text
      text: .
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les chrétiens seront non seule­ment exclus des synagogues, mais encore persécutés pour avoir reconnu en Jésus le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Messie
    - type: text
      text: ' promis. Dès son introduction en forme de généalogie (1.1-17), l''Evangile selon Matthieu leur donne de quoi argumenter. Avec force, il annonce que Jésus est bien le Messie par excellence, fils d''Abraham le père fondateur, mais aussi fils de David, la figure messianique incontestée.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le Christ récapitule en outre la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: destinée d'Israël
    - type: text
      text: '. Tout comme le peuple, ce premier-né du '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (Ex 4.22), il dut fuir en Egypte pour échapper à la mort et en remonter (Mt 2.13-15). Lui aussi dut passer au désert une période d''épreuve (4.1-11).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Pour Matthieu, ce n''est pas tra­hir Israël que d''adhérer au Christ Jésus. Lui seul est l''accomplisse­ment de l''Ecriture. Seule son in­terprétation de la loi est nor­mative (5.17ss) et non celles, accommodantes (19.8) et pour­tant lourdes à porter (23.4), que recommandent les pharisiens. De sa propre autorité Jésus met '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'amour au centre de la loi
    - type: text
      text: ' (5.43-­48 ; 7.29 ; 22.34-40).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un évangile qui prend l'offensive
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L'Evangile selon Matthieu est aussi un texte de combat. Clai­rement et fortement, il affirme que rejeter le Christ, c'est rejeter Dieu. Et puisque telle est l'atti­tude des autorités juives, c'est l'Eglise, communauté de Juifs et de païens, qui recevra le Royaume (21.43).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ces '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: païens
    - type: text
      text: ', on les trouve deja dans la généalogie. Et des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: fem­mes
    - type: text
      text: ', souvent en marge de l''idéal du mariage ! '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tamar
    - type: text
      text: ', la belle-fille de Juda ; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rahab
    - type: text
      text: ', la prostituée cananéenne ; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ruth
    - type: text
      text: ', la Moabite ; Bethsabée, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: la femme d'Urie
    - type: text
      text: ' le Hittite (1.3'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: 'ss). Celles-ci montrent que la lignée davidique, et '
    - type: usfm
      marker: it
      children:
      - type: text
        text: à fortiori
    - type: text
      text: ' l''ascendance du Fils de Dieu, ne répond pas à des critères éthniques ou purement juridi­ques. Sont rejetés ceux qui se croient suffisamment justes au regard de la loi : les pharisiens eux-mêmes, denoncés pour leur hypocrisie et leur religion au visage double (5.20 ; 12.24ss ; 23). Les mysteres du royaume leur sont inaccessibles. D''où le parler en paraboles, qui laisse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dehors
    - type: text
      text: ' les orgueilleux tandis qu''aux disciples de Jésus il est '
    - type: usfm
      marker: it
      children:
      - type: text
        text: donné de connaître les mystères du règne des cieux
    - type: text
      text: ' (13.10-17).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'S''il y a malheureusement rejet, il concerne davantage les autori­tés que les '
    - type: usfm
      marker: it
      children:
      - type: text
        text: moutons perdus
    - type: text
      text: ' d''Is­raël (15.24 ; cf. 9.36). C''est vers ces derniers que va le Christ. C''est aussi vers eux qu''il envoie ses disciples (10.6). Cependant, en rapportant la guérison accomplie en faveur de la Cananéenne (15.21ss), Matthieu sug­gère aussi que tous, les non-Juifs comme les pécheurs d''Is­raël (9.9-13), sont finalement au bénéfice de la bonne nouvelle (cf. 28.16ss).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un évangile pour les disciples
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les ennemis dénoncés, reste à donner un contenu à la foi. Plus que tout autre, l''Evangile selon Matthieu mettra en valeur l''etat de '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: disciple
    - type: text
      text: ' (73 fois dans le premier évangile, contre 46 chez Marc et 37 chez Luc), au point qu''on peut le considérer comme un manuel destiné aux disciples.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Tout disciple a besoin d''un enseignement. Au cœur de l''Evangile selon Matthieu, le premier des cinq discours, le «Sermon sur la montagne» (chap. 5-7), constitue '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: la charte du royaume
    - type: text
      text: '. En trois chapitres d''une richesse et d''une densité inégalées sont regroupés des encouragements (p. ex. les béatitudes, 5.1-12), les fameuses antithèses sur l''interprétation de la loi où Jésus dépasse la casuistique pharisienne (5.27-48), des conseils de piété (p. ex. sur la prière, 6.5-18), des mises en garde aussi (p. ex. ne pas amasser des '
    - type: usfm
      marker: it
      children:
      - type: text
        text: trésors sur la terre
    - type: text
      text: ', 6.19). Dans son expérience quotidienne, le disciple se rapportera sans cesse à cet enseignement d''une redoutable exigence, puisque c''est la perfection divine qui est ici la référence : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vous serez donc parfaits, comme votre Père cèleste est parfait
    - type: text
      text: ' (5.48). Mais cette perfection est celle d''un Dieu plein de sollicitude, le Créateur qui dispense ses bienfaits sur les méchants comme sur les bons (5.45). La parole absolue, excessive, de Jésus, n''est pas une simple morale plus performante que les autres. Elle est la parole même du règne de Dieu qui fait surgir, pour celui qui la reçoit dans la foi, une nouvelle compréhension de Dieu, du monde et des autres.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'S''il se préoccupe fortement du disciple pris individuellement, Matthieu le considère aussi en tant que membre d''une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: communauté
    - type: text
      text: ', au point que le premier évangile est souvent appelé « l''évangile de l''Eglise ». Le discours du chapitre 18 énonce les règles fondamentales de la vie communautaire : être humble comme un enfant ; ne pas constituer une occasion de chute pour ses frères ; rechercher la brebis égarée ; pardonner sans limite.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le discours missionnaire (chap. 10) rappelle en outre à la communauté des disciples que la foi est '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: mission
    - type: text
      text: ', résumée en six verbes qui sont autant de défis : aller, proclamer, guérir, réveiller, purifier, chasser. Ce discours prépare l''envoi final (28.16ss).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Etre disciple, enfin, c''est attendre le Maître qui doit revenir. La '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: fin des temps
    - type: text
      text: ' et ses corollaires, le retour du Christ et le jugement, jouent un rôle déterminant chez Matthieu (on peut retrouver la notion de jugement dans près d''un paragraphe sur deux).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Il fait peu de doute que les premiers chrétiens furent surpris et désappointés : le Maître ne tardait-il pas à venir ? Le dernier discours (chap. 24-25) est donc là pour rassurer. Ils n''ont pas à craindre le temps qui passe. L''homme parti en voyage ne revient que '
    - type: usfm
      marker: it
      children:
      - type: text
        text: longtemps après
    - type: text
      text: ' (25.19). Dans l''intervalle, il leur faut veiller (24.13,42,44), non pas d''une veille stérilement attentiste, mais d''une veille active dans la foi. Le jugement vient en effet qui séparera les moutons des chèvres, les justes des injustes, ceux qui auront secouru les malades, visité les prisonniers et accueilli les étrangers, de ceux qui se seront enfermés dans une coupable abstention (25.31-46).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un évangile de l'éternelle présence
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Lorsque l''enfant paraît à Bethléem, Matthieu rappelle par une citation d''Esaïe quel doit être son nom : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Emmanuel, ce qui se traduit: Dieu avec nous'
    - type: text
      text: ' (1.23).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Lorsque le Christ apparaît après la résurrection, il laisse cette promesse aux Onze venus le retrouver en Galilée : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Je suis avec vous tous les jours, jusqu'a' la fin du monde
    - type: text
      text: ' (28.20).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Cette inclusion qui ouvre et referme l'évangile n'est pas pur artifice littéraire. A la différence de Luc, Matthieu ne rapporte pas l'ascension du Christ. Ainsi, la dernière parole que nous laisse le premier évangile est, pour ses destinataires initiaux comme pour nous, celle d'un Christ qui demeure éternellement avec les siens.
