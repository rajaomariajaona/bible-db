  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Commencement de la
  - type: text
    content: ' '
  - type: text
    content: bonne nouvelle
  - type: text
    content: ' '
  - type: text
    content: de Jésus-Christ…
  - type: text
    content: ' C''est par ces mots que s''ouvre l''Evangile selon Marc, le plus ancien sans doute de nos quatre évangiles.'
  - type: text
    content: '« Evangile » est un mot aux résonances multiples. A l''origine, le mot grec '
  - type: text
    content: euaggelion,
  - type: text
    content: ' qu''on s''est généralement borné à transcrire « Evangile » en français et que la présente traduction rend par '
  - type: text
    content: bonne nouvelle
  - type: text
    content: ', désigne l''annonce d''un '
  - type: text
    content: événement heureux
  - type: text
    content: ', et en particulier la proclamation d''une '
  - type: text
    content: victoire
  - type: text
    content: '. Dans le Nouveau Testament, où il apparaît plus de soixante-dix fois, il se rapporte à la bonne nouvelle du '
  - type: text
    content: salut
  - type: text
    content: ', celle de la victoire remportée par le Christ.'
  - type: text
    content: Pour beaucoup, lire l'Evangile, c'est lire le Nouveau Testament, voire la Bible tout entière. Abus de langage, certes, mais qui recèle une large part de vérité. L'Evangile n'est-il pas pour les chrétiens le point culminant de toute la révélation divine ?
  - type: text
    content: 'Reste que « l''Evangile » se dit aussi au '
  - type: text
    content: pluriel
  - type: text
    content: '  : il se présente sous les noms de Matthieu, de Marc, de Luc et de Jean. Et nous voilà avec quatre évangiles, quatre communiqués de victoire, ce qui est pour le moins surprenant.'
  - type: text
    content: 'La question se pose donc : pourquoi quatre évangiles ? L''Eglise ancienne, pour faire droit à plusieurs tendances en son sein, aurait-elle admis des versions concurrentes du message ? A-t-il fallu compléter le texte de Marc par celui de Matthieu, de Luc ou de Jean ?'
  - type: text
    content: 'Au commencement : Jésus de Nazareth'
  - type: text
    content: 'C''est l''évidence, mais il convient de le souligner : pas d''évangiles sans '
  - type: text
    content: Jésus
  - type: text
    content: ' de Nazareth. Un homme, une vie dont on ne peut pas tout dire, à telle enseigne que le quatrième évangile s''achèvera sur cette remarque : '
  - type: text
    content: Jésus a fait encore beaucoup d'autres choses ; si on les écrivait en détail, le monde même, j'imagine, ne pourrait contenir les livres qu'on écrirait
  - type: text
    content: ' (Jn 21.25).'
  - type: text
    content: 'Cependant, à partir de l''événement le plus terrible et le plus fondateur – la crucifixion du Maître, d''où jaillit la parole inouïe de la résurrection (Mc 14 à 16/ /) – le désir et la nécessité du récit '
  - type: text
    content: remontent le temps
  - type: text
    content: '  : on rapporte les conflits de Jésus avec ses adversaires (Mc 7), ses actes libérateurs (Mc 1–2), son enseignement (Mt 5–7 ; 13), ses rencontres avec des gens de toutes conditions, comme la pécheresse (Lc 7.36-50), le jeune homme riche (Lc 18.18-30), Zachée le collecteur des taxes (Lc 19.1-10), Nicodème le sanhédrite (Jn 3). On s''intéresse à sa vocation et au début de son ministère (Mc 1/ /), et même parfois à son enfance et à sa naissance (Mt 1–2 ; Lc 1–2).'
  - type: text
    content: Des témoins qui racontent
  - type: text
    content: 'Nous sommes sur le parvis du temple de Jérusalem, dans la cour qui est accessible aux non-Juifs. La foule des pèlerins venus de toutes les parties du monde romain se presse autour des tables où l''on change l''argent païen en monnaie admise dans l''enceinte sacrée, et où l''on achète des animaux pour les sacrifices (voir aussi Dt 14.22ss). Pour éviter de contourner l''aire du temple, des porteurs de fardeaux se fraient un chemin entre les groupes rassemblés autour de leurs rabbis. Ici et là les gens s''écartent devant des prêtres aux habits somptueux et à la démarche solennelle, des scribes au front grave. Soudain, un jeune rabbi se met à renverser les tables : il tonne, bouscule les marchands, effraie les animaux, créant un désordre indescriptible. Au nom de Dieu, il déclenche un scandale inouï dans la maison de Dieu (cf. Mc 11.15ss/ /).'
  - type: text
    content: Une fois passés les premiers instants de stupeur, que feront les témoins de la scène ? Rentreront-ils tranquillement chez eux, comme si de rien n'était, sans rien dire ? Impossible ! Et que feront ceux qui les auront entendus, sinon réfléchir à ce qui s'est passé et en parler à leur tour ?
  - type: text
    content: 'Ainsi s''écrivent les premiers fragments d''évangiles. Non pas sur du papyrus ou des parchemins, mais dans la '
  - type: text
    content: mémoire
  - type: text
    content: ' des foules. On appelle cette étape «  '
  - type: text
    content: tradition orale
  - type: text
    content: '  ». C''est la période où l''histoire de Jésus circule de bouche à oreille, par bribes (un miracle ; une parabole ; une petite phrase etc.). Les '
  - type: text
    content: prédicateurs
  - type: text
    content: ' en font usage, soulignant les traits qui correspondent aux besoins particuliers de leur communauté. Certes, nous sommes enclins à nous méfier d''un tel mode de communication, dans la mesure où, aujourd''hui, l''écrit seul nous paraît digne de foi. Mais il n''en était pas ainsi à l''époque. Il est d''ailleurs bien établi que des procédés mnémotechniques élaborés rendaient très fiable la transmission orale. De plus, il est probable qu''on commença d''assez bonne heure à coucher par écrit ces fragments de tradition orale.'
  - type: text
    content: Des traditions qui se regroupent
  - type: text
    content: Que se passe-t-il lorsque, entre amis, quelqu'un commence à évoquer des souvenirs ? C'est l'inévitable enchaînement. Un souvenir en appelle un autre. Il s'opère souvent, d'ailleurs, une sorte de classification spontanée. Pour les évangiles en construction, quelque chose d'assez semblable a dû se produire. Quelqu'un racontait un miracle et celui qui avait entendu un récit analogue s'empressait de l'ajouter. Les prédicateurs recueillaient et classaient. Ainsi se sont sans doute regroupés les récits de miracles, les paraboles et les discours de Jésus. Systématisation qui allait rendre la narration plus facile à suivre, donc plus commode pour l'enseignement.
  - type: text
    content: Un Evangile à proclamer dans le monde entier
  - type: text
    content: La tradition orale dépend largement des premiers témoins et de ceux qui les ont entendus raconter ce qu'ils ont vu. C'est le poids des témoins et leur accord qui confèrent à la tradition orale sa fiabilité.
  - type: text
    content: 'Un temps arrive où les témoins oculaires viennent à disparaître. Il devient donc nécessaire de '
  - type: text
    content: fixer par écrit
  - type: text
    content: ' ce qu''on avait d''abord transmis oralement. Ainsi l''histoire sera préservée. En outre, la forme écrite facilitera la propagation de l''Evangile. A Ephèse, à Corinthe, à Rome, on pourra non seulement l''entendre, mais aussi le lire.'
  - type: text
    content: De l'Evangile aux évangiles
  - type: text
    content: Peut-on préciser davantage comment se sont constitués nos quatre évangiles ? Une illustration familière aidera peut-être à s'en faire une idée.
  - type: text
    content: Quatre amis partent visiter l'Orient biblique. Chacun a le projet de réaliser un montage audiovisuel à partir des images qu'il aura prises. Tandis qu'ils arpentent les sites célèbres, les prises de vues se succèdent. Eventuellement, on enregistre quelques commentaires donnés par le guide.
  - type: text
    content: 'Au retour, il faut procéder au dépouillement. Il convient d''abord de trier les documents, en regroupant les vues d''un même lieu : ici Jérusalem ; là le désert de Juda ; là encore le lac de Tibériade. Puis il s''agira de classer dans un ordre déterminé, non seulement les photos à l''intérieur de chaque dossier, mais encore les dossiers entre eux. Faut-il commencer par la Galilée ou par Jérusalem ? Quand chaque dossier, chaque document aura trouvé sa place, il ne restera plus qu''à réaliser le montage. Moment très important, où il faudra se poser ces questions fondamentales : Quel est le public visé ? Que veut-on lui dire ? Ainsi, un montage destiné à un public connaissant déjà les lieux n''aura pas la même présentation qu''un autre qui s''adresserait à un groupe ignorant tout du pays.'
  - type: text
    content: Au moment de rédiger, les auteurs des évangiles se sont pareillement trouvés devant des dossiers – en fait des morceaux d'évangile – qui avaient déjà circulé sous forme de tradition orale. Il y avait fort probablement des dossiers « paroles de Jésus », « miracles », « paraboles », « récits de la Passion », et ainsi de suite. Chacun, en fonction du public auquel il devait s'adresser et du but qu'il visait, a choisi dans ces dossiers les documents qui lui paraissaient les plus adéquats. Il les a classés suivant son dessein. Enfin il a rédigé son commentaire.
  - type: text
    content: 'Les ressemblances entre les évangiles (voir le tableau p.${Xsynopt}) proviennent du stock de documents disponibles. L''Evangile selon Marc est probablement le premier des quatre montages. Matthieu et Luc se sont largement inspirés de sa trame. Il y a en effet entre ces trois évangiles une incontestable ressemblance. C''est pour cette raison qu''on les nomme synoptiques (du grec '
  - type: text
    content: sunopsis
  - type: text
    content: ', vue commune). Outre l''Evangile selon Marc (ou du moins un état ancien de celui-ci), Matthieu et Luc ont peut-être utilisé une autre source, rapportant principalement des paroles de Jésus (voir « Un document caché dans l''Evangile selon Luc ? », p.${Xdocluc}). Quant au quatrième évangile, il se classe nettement à part. Jean a dû disposer de son propre lot d''informations, même s''il n''ignore pas les traditions synoptiques. A l''accumulation d''images traitées brièvement – c''est plutôt le style des synoptiques – il substitue volontiers le discours et le commentaire sur l''événement.'
  - type: text
    content: 'A la fin du processus de rédaction, on obtient quatre montages différents : quatre évangiles. Inutile, voire périlleux, de chercher à les superposer. Respecter les évangiles, c''est laisser à chacun son caractère propre.'
  - type: text
    content: Une reconstitution confirmée
  - type: text
    content: 'Luc, dans le prologue de son évangile, s''en explique ainsi : '
  - type: text
    content: Puisque beaucoup ont entrepris de composer un récit des faits qui se sont accomplis parmi nous, tels que nous les ont transmis ceux qui, dès le commencement, en ont été les témoins oculaires et sont devenus serviteurs de la Parole, il m'a semblé bon, à moi aussi, après m'être informé exactement de tout depuis les origines, de te l'exposer par écrit d'une manière suivie, très excellent Théophile, afin que tu connaisses la certitude des enseignements que tu as reçus
  - type: text
    content: ' (Lc 1.1-4).'
  - type: text
    content: 'Ces versets énoncent à leur manière les différentes étapes de la rédaction des évangiles :'
  - type: text
    content: '1) Des '
  - type: text
    content: événements
  - type: text
    content: ' se sont accomplis'
  - type: text
    content: '2) devant des '
  - type: text
    content: témoins
  - type: text
    content: ' oculaires'
  - type: text
    content: '3) qui les ont '
  - type: text
    content: transmis
  - type: text
    content: ' (tradition orale)'
  - type: text
    content: '4) à beaucoup de gens qui ont voulu '
  - type: text
    content: composer un récit
  - type: text
    content: ' (regroupement des traditions).'
  - type: text
    content: '5) Luc '
  - type: text
    content: s'informe exactement
  - type: text
    content: ' (il étudie les documents dont il dispose) ;'
  - type: text
    content: 6) il dresse un plan
  - type: text
    content: suivi
  - type: text
    content: ' (il classe les documents) ;'
  - type: text
    content: '7) il se met à '
  - type: text
    content: écrire
  - type: text
    content: ' (rédaction)'
  - type: text
    content: '8) à l''intention de '
  - type: text
    content: Théophile
  - type: text
    content: ' (en fonction du public visé)'
  - type: text
    content: '9) pour que celui-ci '
  - type: text
    content: connaisse la certitude des enseignements reçus
  - type: text
    content: ' (en fonction du message qu''il veut transmettre).'
  - type: text
    content: Selon Matthieu
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'L''Evangile selon Matthieu sert de portail d''entrée au Nouveau Testament. C''est souvent par lui que le lecteur s''initie à l''Ecriture sainte. Cette préférence n''est pas nouvelle. Mentionné le premier dans les listes canoniques alors que l''évangile de Marc a sans doute été rédigé avant lui (cf. « De l''Evangile aux quatre évan­giles », p.${XEv4ev), Matthieu est le plus cité dès le debut de l''histoire chrétienne. Dans la '
  - type: text
    content: Didachè*,
  - type: text
    content: ' qui remonte peut-être à la deuxième moitié du I'
  - type: text
    content: er
  - type: text
    content: ' siècle, on respire souvent l''atmosphère du premier évangile (cf. Mt 6.9'
  - type: text
    content: n
  - type: text
    content: ' ). A la fin du I'
  - type: text
    content: er
  - type: text
    content: ' siecle, Clement de Rome semble en citer des éléments ; de même, au seuil du II'
  - type: text
    content: e
  - type: text
    content: ' siecle, les lettres d''Ignace* d''Antioche et celle de Barnabé*.'
  - type: text
    content: D'où vient ce privilège ? Mat­thieu est-il à ce point original ? Certes non. Sur les 1071 versets qui le composent, 330 semblent venir tels quels de Marc et 230 autres se retrouvent également dans Luc. La primitive Eglise eut pourtant bien des raisons de donner à Matthieu le premier rang.
  - type: text
    content: Un évangile où Jésus enseigne et guérit
  - type: text
    content: 'Matthieu, comme Luc, a vraisemblablement developpé l''Evangile selon Marc, au moins dans un état ancien, en y ajoutant des traditions sur les paroles de Jésus – certaines qu''il semble tirer d''un fonds commun partagé par Luc, d''autres qui lui sont propres (voir « Un document caché dans l''Evangile selon Luc ? », p.${XEvLc). Sa principale originalité est d''avoir composé une présenta­tion solennelle du ministere de Jésus en '
  - type: text
    content: deux tableaux
  - type: text
    content: ' encadrés par deux résumés rédigés en ter­mes semblables (4.23 et 9.35). La proclamation de la bonne nou­velle se fait par '
  - type: text
    content: l'enseignement
  - type: text
    content: ' (5-7) et par des '
  - type: text
    content: actes salutaires
  - type: text
    content: ' (8-9). L''interprète de la loi est aussi celui qui sauve et guérit. La seconde originalité de Mat­thieu est d''avoir souligné le lien entre le Christ et ses disciples, en faisant suivre immédiatement cet ensemble par l'''
  - type: text
    content: envoi des Douze
  - type: text
    content: ' (10), qui préfigure et pré­pare l''envoi final (28.16ss). L''am­pleur de la tâche rend indispensable la participation des disciples à la proclamation de leur Maître, mais leur seule mis­sion consiste a démultiplier son action.'
  - type: text
    content: Un evangile ou l'Ecriture s'accomplit
  - type: text
    content: 'Des quatre évangiles, c''est Matthieu qui est le plus nourri de l''Ancien Testament : plus de 130 allusions et 43 citations for­melles. Les chrétiens d''origine juive s''y trouvèrent donc en ter­rain connu, d''autant plus que Matthieu voit dans les événements qu''il décrit '
  - type: text
    content: 'l''accomplissement de la Loi et des Prophètes '
  - type: text
    content: (voir l'introduction à l'Ancien Testament, p.${XIntAT). Sous une forme variant à peine, cette idée d'accomplissement s'y rencontre au moins 11 fois (voir 1.22+) contre seulement 2 chez Marc, 2 chez Luc et 6 chez Jean.
  - type: text
    content: 'A l''instar de l''Israël contempo­rain, les communautés dans les­quelles l''Evangile selon Matthieu a vu le jour comprenaient de toute évidence des '
  - type: text
    content: scribes*
  - type: text
    content: ' (23.34). Sans doute le rôle de ces scribes chrétiens consistait-il non seulement à transmettre l''enseignement de Jésus et à l''appliquer à des situations nou­velles, mais aussi à relire les Ecri­tures d''Israël à la lumiere des pa­roles et de la vie du Maître. Tout porte à croire que Matthieu dévoile son propre programme dans cette remarque : '
  - type: text
    content: Tout scribe instruit du règne des cieux est semblable à un maître de maison qui tire de son trésor des choses nouvelles et des choses anciennes
  - type: text
    content: ' (13.52).'
  - type: text
    content: Un évangile facile a mémoriser
  - type: text
    content: 'Pour l''Eglise naissante chargée de porter la bonne nouvelle du salut jusqu''aux confins de la terre, l''Evangile selon Matthieu met en œuvre des moyens mné­motechniques qui rendent plus aisées la transmission et la mé­morisation de l''enseignement du Maître :'
  - type: text
    content: Les regroupements numériques
  - type: text
    content: 'Les chiffres '
  - type: text
    content: '7 '
  - type: text
    content: 'et '
  - type: text
    content: '3 '
  - type: text
    content: semblent être ici en faveur, d'une manière encore plus nette que chez Marc et chez Luc. Ainsi, les sept de­mandes du Notre Pere (6.9-13), les sept paraboles du règne ou du royaume (13.1-52), les sept «malheurs» proferés contre les pharisiens (chap. 23), sans compter les sept pains et les sept corbeilles restantes (15.32­-39), les sept maris (22.23-33) et le pardon jusqu'a soixante-dix-sept fois sept fois (18.22); ainsi encore les trois tentations (4.1­-11), les triades aumone-priére-jeune en 6.2-17, menthe-aneth-cumin et justice-compassion-foi en 23.23, et les trois prières dans le jardin de Gethsémani (26.36­-46). Les deux chiffres sont peut-être combinés dans la généalo­gie du chapitre 1, ou Jésus-Christ apparaît au terme de trois fois quatorze (3x2x7) générations.
  - type: text
    content: Les parallélismes
