      marker-yv: yv-n
    - type: text
      text: 'Gédéon leur dit : Je vais vous faire une demande : donnez-moi chacun un anneau de votre butin. (Les ennemis avaient en effet des anneaux d''or, car ils étaient Ismaélites.) '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.25 '
