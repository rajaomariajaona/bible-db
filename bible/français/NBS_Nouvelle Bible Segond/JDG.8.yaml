      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un éphod
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit sans doute ici, non pas du vêtement de lin (1S 2.18 ; 22.18), mais d''un objet cultuel à usage divinatoire ; peut-être un réceptacle pour les sorts sacrés, cf. 17.5 ; 18.14-20 ; 1S 2.28 ; 14.3 ; 21.9s ; 23.6,9 ; 30.7 ; Os 3.4 ; voir aussi Ex 25.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se prostitua avec lui '
      - type: usfm
        marker: ft
        children:
        - type: text
