      - type: usfm
        marker: fqa
        children:
        - type: text
          text: derrière lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : au figuré, la prostitution peut évoquer l''idolâtrie ; cf. 2.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'piège '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.3+.
      marker-yv: yv-n
    - type: text
      text: Gédéon en fit un éphod et le plaça dans sa ville, à Ophra ; là, tout Israël se prostitua avec lui ; ce fut un piège pour Gédéon et pour sa maison.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
