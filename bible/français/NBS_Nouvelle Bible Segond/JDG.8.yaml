        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: C'est à vous que Dieu a livré les chefs de Madiân, Oreb et Zéeb. Qu'ai-je donc pu faire en comparaison de vous ? Lorsqu'il eut dit cela, leur colère contre lui s'apaisa.
  - type: usfm
