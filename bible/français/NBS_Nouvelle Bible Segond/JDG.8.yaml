      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le manteau.
      marker-yv: yv-n
    - type: text
      text: 'Ils dirent : Nous les donnerons volontiers. Ils étendirent donc un manteau sur lequel chacun jeta un anneau de son butin. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.26 '
      - type: usfm
