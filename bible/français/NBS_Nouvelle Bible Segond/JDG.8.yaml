        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le poids des anneaux d''or qu''il avait demandés fut de mille sept cents sicles d''or, sans compter les croissants, les pendants d''oreilles et les vêtements de pourpre rouge que portaient les rois de Madiân, et sans compter les colliers qui étaient aux cous de leurs chameaux. '
  '27':
  - type: usfm
