document_id: JDG.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mécontentement des Ephraïmites
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 12.1-6 ; sur Ephraïm , cf. Gn 48.13-20. –  lui dirent  : c.-à-d. dirent à Gédéon . –  Que signifie…  : litt. quelle est cette chose que tu nous as faite de ne pas nous avoir appelés…'
  - type: text
    content: 'Les hommes d''Ephraïm lui dirent : Que signifie cette manière d''agir envers nous ? Pourquoi ne pas nous avoir appelés, quand tu es allé faire la guerre à Madiân ? Ils eurent avec lui une violente querelle. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Qarqor  : localité inconnue. –  avec leurs troupes  : litt. leurs camps avec eux . –  tous ceux qui étaient restés…  : cette formule pourrait aussi être rattachée à ce qui suit et s''appliquer aux victimes plutôt qu''aux survivants. –  fils de l''Orient 6.3n. –  cent vingt mille…  : cf. 7.1–8.3.'
  - type: text
    content: 'Zébah et Tsalmounna étaient à Qarqor avec leurs troupes – environ quinze mille hommes, tous ceux qui étaient restés de toute la troupe des fils de l''Orient ; cent vingt mille hommes tirant l''épée étaient tombés. '
  '11':
  - type: note
    content: 'Nobah / Yogboha (ou Yogbeha, selon certains mss), à l''est du Jourdain, Nb 32.35,42. –  qui se croyait en sécurité  : litt. et le camp (ou la troupe) était en sécurité  ; cf. Gn 34.25n.'
  - type: text
    content: 'Gédéon monta par le chemin de ceux qui demeurent sous les tentes, à l''est de Nobah et de Yogboha, et il battit la troupe qui se croyait en sécurité. '
  '12':
  - type: note
    content: 'mit en déroute  : LXX extermina. –  toutes les troupes  : litt. tout le camp.'
  - type: text
    content: Zébah et Tsalmounna prirent la fuite ; Gédéon les poursuivit. Il captura les deux rois de Madiân, Zébah et Tsalmounna, et mit en déroute toutes les troupes.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Hérès 1.35n  ; la troupe de Gédéon semble être remontée vers le nord, de sorte qu'elle surprend Soukkoth avant Penouel (cf. v. 6-9,14-17).
  - type: text
    content: 'Gédéon, fils de Joas, revint de la bataille par la montée de Hérès. '
  '14':
  - type: note
    content: 'soixante-dix-sept  : cf. v. 30+ ; Gn 4.24 ; Mt 18.22.'
  - type: text
    content: 'Il captura un jeune homme de Soukkoth et l''interrogea ; celui-ci lui écrivit les noms des chefs et des anciens de Soukkoth, soixante-dix-sept hommes. '
  '15':
  - type: note
    content: 'V. 6n. –  Zébah et Tsalmounna sont-ils déjà en ton pouvoir  : litt. la paume (ou la main) de Zébah et Tsalmounna (est-elle) maintenant dans ta main…'
  - type: text
    content: 'Puis il vint trouver les gens de Soukkoth et dit : Voici Zébah et Tsalmounna, au sujet desquels vous m''avez outragé, en disant : « Zébah et Tsalmounna sont-ils déjà en ton pouvoir, pour que nous donnions du pain à tes hommes épuisés ? » '
  '16':
  - type: note
    content: 'pour corriger…  : litt. et il fit connaître en (ou par) elles (ou eux) ; des versions anciennes semblent avoir lu ici le même verbe qu''au v. 7n. Certains mss de LXX précisent et les écorcha.'
  - type: text
    content: 'Alors il prit les anciens de la ville, ainsi que des épines du désert et des ronces, pour corriger les gens de Soukkoth. '
  '17':
  - type: text
    content: Il démolit aussi la tour de Penouel et tua les gens de la ville.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Zébah / Tsalmounna v. 5n. –  Tabor 4.6n  ; allusion obscure : les frères de Gédéon semblent avoir été exécutés en raison de leur rang.'
  - type: text
    content: 'Puis il demanda à Zébah et à Tsalmounna : Comment étaient les hommes que vous avez tués au Tabor ? Ils répondirent : Ils étaient comme toi ; chacun avait l''air d''un fils de roi. '
  '19':
  - type: note
    content: fils de ma mère Gn 43.29 ; Dt 13.7 ; Ct 8.1. – Sur la vengeance des proches parents, cf. Gn 4.14s,23s ; Nb 35.19-34 ; Jos 20.1-3 ; 2S 3.27,30 ; 14.7 ; 21.1-9.
  - type: text
    content: 'Il dit alors : C''étaient mes frères, les fils de ma mère. Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', si vous les aviez laissés vivre, je ne vous tuerais pas ! '
  '2':
  - type: note
    content: 'En réalité  : le terme hébreu est habituellement traduit par maintenant. –  grappillage  : cf. Es 17.6 ; Mi 7.1. –  Abiézer 6.11 ; cf. 7.7ss.'
  - type: text
    content: 'Il leur répondit : En réalité, qu''ai-je fait en comparaison de vous ? Le grappillage d''Ephraïm ne vaut-il pas mieux que la vendange d''Abiézer ? '
  '20':
  - type: note
    content: Tue-les ! litt. lève-toi, tue-les !
  - type: text
    content: 'Puis il dit à Yéter, son premier-né : Tue-les ! Mais le jeune homme ne tira pas son épée, car il avait peur : ce n''était encore qu''un jeune homme. '
  '21':
  - type: note
    content: 'Exécute-nous… Gédéon tua…  : litt. lève-toi toi-même et frappe-nous !… Gédéon se leva et tua… –  tel est l''homme…  : sans doute une sorte de proverbe ; certains mss de LXX portent ta force à toi est celle d''un homme  ; cf. v. 18 ; 6.14 ; les Madianites demandent à être exécutés rapidement par Gédéon en personne. –  les croissants  : probablement des amulettes ; cf. v. 26.'
  - type: text
    content: 'Zébah et Tsalmounna dirent : Exécute-nous toi-même ! Car tel est l''homme, telle est sa force. Ainsi Gédéon tua Zébah et Tsalmounna. Il prit ensuite les croissants qui étaient aux cous de leurs chameaux.'
  - type: heading
    content: Fin de la vie de Gédéon
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.2,17. –  Sois notre maître  : autre traduction domine sur nous  ; cf. Gn 1.18n  ; de même au v. 23 ; 9.2.'
  - type: text
    content: 'Les hommes d''Israël dirent à Gédéon : Sois notre maître, toi, puis ton fils, puis le fils de ton fils ; car tu nous as sauvés de la main de Madiân. '
  '23':
  - type: note
    content: 1S 8.6s ; 12.12.
  - type: text
    content: 'Gédéon leur dit : Je ne serai pas votre maître, ni moi ni mon fils ; c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui sera votre maître.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 35.2-4 ; Ex 32.2s ; Nb 31.50 ; 2S 8.11s. –  Les ennemis avaient  : litt. ils avaient . –  Ismaélites semble être ici un terme générique pour désigner les peuples nomades ; cf. Gn 37.25-28 ; 39.1.'
  - type: text
    content: 'Gédéon leur dit : Je vais vous faire une demande : donnez-moi chacun un anneau de votre butin. (Les ennemis avaient en effet des anneaux d''or, car ils étaient Ismaélites.) '
  '25':
  - type: note
    content: 'un manteau  : litt. le manteau.'
  - type: text
    content: 'Ils dirent : Nous les donnerons volontiers. Ils étendirent donc un manteau sur lequel chacun jeta un anneau de son butin. '
  '26':
  - type: note
    content: 'Cf. v. 21. –  mille sept cents sicles  : plus de 16 kg ; voir mesures, poids et monnaies. –  pourpre rouge Ex 25.4n.'
  - type: text
    content: 'Le poids des anneaux d''or qu''il avait demandés fut de mille sept cents sicles d''or, sans compter les croissants, les pendants d''oreilles et les vêtements de pourpre rouge que portaient les rois de Madiân, et sans compter les colliers qui étaient aux cous de leurs chameaux. '
  '27':
  - type: note
    content: 'un éphod  : il s''agit sans doute ici, non pas du vêtement de lin (1S 2.18 ; 22.18), mais d''un objet cultuel à usage divinatoire ; peut-être un réceptacle pour les sorts sacrés, cf. 17.5 ; 18.14-20 ; 1S 2.28 ; 14.3 ; 21.9s ; 23.6,9 ; 30.7 ; Os 3.4 ; voir aussi Ex 25.7+. –  se prostitua avec lui (litt. derrière lui) : au figuré, la prostitution peut évoquer l''idolâtrie ; cf. 2.17+. –  piège 2.3+.'
  - type: text
    content: Gédéon en fit un éphod et le plaça dans sa ville, à Ophra ; là, tout Israël se prostitua avec lui ; ce fut un piège pour Gédéon et pour sa maison.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 3.11+,30.
  - type: text
    content: Madiân fut humilié devant les Israélites et ne releva plus la tête. Le pays fut tranquille pendant quarante ans, pendant les jours de Gédéon.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Yeroub-Baal 6.32n  ; 9.1.
  - type: text
    content: 'Yeroub-Baal, fils de Joas, s''en retourna et resta chez lui. '
  '3':
  - type: note
    content: 'Oreb et Zéeb 7.24-25n. –  colère  : le même mot est habituellement traduit par souffle ou esprit.'
  - type: text
    content: C'est à vous que Dieu a livré les chefs de Madiân, Oreb et Zéeb. Qu'ai-je donc pu faire en comparaison de vous ? Lorsqu'il eut dit cela, leur colère contre lui s'apaisa.
  - type: heading
    content: Gédéon en Transjordanie
  '30':
  - type: note
    content: 'soixante-dix fils 9.2,5,24,26 ; 2R 10.1. –  tous issus de lui  : litt. sortis de sa cuisse, cf. Gn 46.26n. –  beaucoup de femmes  : cf. Dt 17.17.'
  - type: text
    content: 'Gédéon eut soixante-dix fils, tous issus de lui, car il avait beaucoup de femmes. '
  '31':
  - type: note
    content: 'Sa concubine (19.1n) … à Sichem  : il existait apparemment un type d''union où la femme demeurait dans la maison de son père ; cf. chap. 14. –  Abimélek signifie mon père est roi  ; cf. v. 22s ; 9.1ss.'
  - type: text
    content: 'Sa concubine, qui était à Sichem, lui donna aussi un fils qu''il appela du nom d''Abimélek. '
  '32':
  - type: note
    content: 10.2,5 ; 12.7,10,12,15 ; 16.31 ; 1Ch 29.28. –  heureuse vieillesse Gn 15.15n  ; 25.8. –  Joas… 6.11n.
  - type: text
    content: Gédéon, fils de Joas, mourut dans une heureuse vieillesse ; il fut enseveli dans le tombeau de Joas, son père, à Ophra l'Abiezrite.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.11+,13,17+,19. –  Baal-Berith  : le Seigneur de l''alliance (9.4,46n), nom du Baal de Sichem (v. 31 ; 9.1ss), peut-être considéré comme garant des alliances et des serments ; une expression très proche en hébreu désigne des alliés en Gn 14.13n.'
  - type: text
    content: 'Lorsque Gédéon fut mort, les Israélites recommencèrent à se prostituer avec les Baals : ils prirent Baal-Berith pour dieu. '
  '34':
  - type: note
    content: Cf. Dt 8.19s ; 1S 12.10s.
  - type: text
    content: 'Les Israélites ne se souvinrent pas du '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, qui les avait délivrés de la main de tous les ennemis qui les entouraient. '
  '35':
  - type: note
    content: 'malgré  : autre traduction selon.'
  - type: text
    content: Ils n'agirent pas non plus avec fidélité envers la maison de Yeroub-Baal, de Gédéon, malgré tout le bien qu'il avait fait à Israël.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.7–8.3. –  mais ils continuaient leur poursuite  : LXX et affamés (cf. v. 5).'
  - type: text
    content: 'Gédéon arriva au Jourdain et il le passa, lui et les trois cents hommes qui étaient avec lui ; ils étaient épuisés, mais ils continuaient leur poursuite. '
  '5':
  - type: note
    content: 'Soukkoth  : au nord du confluent du Yabboq et du Jourdain, Gn 33.17 ; Jos 13.27. –  des pains ronds Ex 29.23n. –  qui m''accompagnent  : litt. à mes pieds  ; même expression en 4.10 ; 5.15 (sur ses pas). –  épuisés  : cf. 1S 14.31. –  Zébah pourrait signifier sacrifice, Tsalmounna ombre (ou protection) refusée (cf. v. 21) ; Ps 83.12. –  rois  : cf. v. 3 ; 7.25.'
  - type: text
    content: 'Il dit aux gens de Soukkoth : Donnez, je vous prie, des pains ronds aux hommes qui m''accompagnent, car ils sont épuisés. Je suis à la poursuite de Zébah et de Tsalmounna, les rois de Madiân. '
  '6':
  - type: note
    content: 'V. 15. –  en ton pouvoir  : litt. dans ta main.'
  - type: text
    content: 'Les chefs de Soukkoth répondirent : Zébah et Tsalmounna sont-ils déjà en ton pouvoir, pour que nous donnions du pain à ton armée ? '
  '7':
  - type: note
    content: 'Cf. 21.8-11. –  je vous châtierai  : litt. je foulerai (ou je battrai) votre chair avec (LXX dans, ou par) les épines du désert, ce qui pourrait être la description d''un supplice pratiqué dans l''Antiquité (des chars passant sur les corps des vaincus, ici allongés sur des épines) ; même verbe en Am 1.3. –  des ronces  : traduction incertaine ; le terme correspondant n''apparaît qu''ici et au v. 16.'
  - type: text
    content: 'Alors Gédéon dit : Eh bien, lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''aura livré Zébah et Tsalmounna, je vous châtierai avec des épines du désert et avec des ronces. '
  '8':
  - type: note
    content: Penouel sur le Yabboq, Gn 32.31s ; 1R 12.25.
  - type: text
    content: 'De là il monta à Penouel et fit aux gens de Penouel la même demande. Les gens de Penouel lui répondirent comme avaient répondu les gens de Soukkoth. '
  '9':
  - type: note
    content: 'victorieux  : litt. en paix  ; cf. Jos 10.21n.'
  - type: text
    content: 'Alors il dit aussi aux gens de Penouel : Quand je reviendrai victorieux, je démolirai cette tour.'
