document_id: JDG.8,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mécontentement des Ephraïmites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 12.1-6 ; sur '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ephraïm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 48.13-20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui dirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dirent à Gédéon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que signifie…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quelle est cette chose que tu nous as faite de ne pas nous avoir appelés…
      marker-yv: yv-n
    - type: text
      text: 'Les hommes d''Ephraïm lui dirent : Que signifie cette manière d''agir envers nous ? Pourquoi ne pas nous avoir appelés, quand tu es allé faire la guerre à Madiân ? Ils eurent avec lui une violente querelle. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qarqor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : localité inconnue. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec leurs troupes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leurs camps avec eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous ceux qui étaient restés…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette formule pourrait aussi être rattachée à ce qui suit et s''appliquer aux victimes plutôt qu''aux survivants. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de l''Orient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cent vingt mille…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 7.1–8.3.'
      marker-yv: yv-n
    - type: text
      text: 'Zébah et Tsalmounna étaient à Qarqor avec leurs troupes – environ quinze mille hommes, tous ceux qui étaient restés de toute la troupe des fils de l''Orient ; cent vingt mille hommes tirant l''épée étaient tombés. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nobah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Yogboha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yogbeha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon certains mss), à l''est du Jourdain, Nb 32.35,42. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui se croyait en sécurité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et le camp '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la troupe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: était en sécurité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 34.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Gédéon monta par le chemin de ceux qui demeurent sous les tentes, à l''est de Nobah et de Yogboha, et il battit la troupe qui se croyait en sécurité. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mit en déroute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: extermina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toutes les troupes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout le camp.
      marker-yv: yv-n
    - type: text
      text: Zébah et Tsalmounna prirent la fuite ; Gédéon les poursuivit. Il captura les deux rois de Madiân, Zébah et Tsalmounna, et mit en déroute toutes les troupes.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hérès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.35'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; la troupe de Gédéon semble être remontée vers le nord, de sorte qu''elle surprend Soukkoth avant Penouel (cf. v. 6-9,14-17).'
      marker-yv: yv-n
    - type: text
      text: 'Gédéon, fils de Joas, revint de la bataille par la montée de Hérès. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: soixante-dix-sept
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 30+ ; Gn 4.24 ; Mt 18.22.'
      marker-yv: yv-n
    - type: text
      text: 'Il captura un jeune homme de Soukkoth et l''interrogea ; celui-ci lui écrivit les noms des chefs et des anciens de Soukkoth, soixante-dix-sept hommes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Zébah et Tsalmounna sont-ils déjà en ton pouvoir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la paume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Zébah et Tsalmounna (est-elle) maintenant dans ta main…
      marker-yv: yv-n
    - type: text
      text: 'Puis il vint trouver les gens de Soukkoth et dit : Voici Zébah et Tsalmounna, au sujet desquels vous m''avez outragé, en disant : « Zébah et Tsalmounna sont-ils déjà en ton pouvoir, pour que nous donnions du pain à tes hommes épuisés ? » '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour corriger…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et il fit connaître en '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'elles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; des versions anciennes semblent avoir lu ici le même verbe qu'au v. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Certains mss de LXX précisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et les écorcha.
      marker-yv: yv-n
    - type: text
      text: 'Alors il prit les anciens de la ville, ainsi que des épines du désert et des ronces, pour corriger les gens de Soukkoth. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il démolit aussi la tour de Penouel et tua les gens de la ville.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zébah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tsalmounna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tabor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; allusion obscure : les frères de Gédéon semblent avoir été exécutés en raison de leur rang.'
      marker-yv: yv-n
    - type: text
      text: 'Puis il demanda à Zébah et à Tsalmounna : Comment étaient les hommes que vous avez tués au Tabor ? Ils répondirent : Ils étaient comme toi ; chacun avait l''air d''un fils de roi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fils de ma mère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 43.29 ; Dt 13.7 ; Ct 8.1. – Sur la '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: vengeance des proches parents
        - type: text
          text: ', cf. Gn 4.14s,23s ; Nb 35.19-34 ; Jos 20.1-3 ; 2S 3.27,30 ; 14.7 ; 21.1-9.'
      marker-yv: yv-n
    - type: text
      text: 'Il dit alors : C''étaient mes frères, les fils de ma mère. Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', si vous les aviez laissés vivre, je ne vous tuerais pas ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En réalité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maintenant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: grappillage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 17.6 ; Mi 7.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abiézer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.11 ; cf. 7.7ss.
      marker-yv: yv-n
    - type: text
      text: 'Il leur répondit : En réalité, qu''ai-je fait en comparaison de vous ? Le grappillage d''Ephraïm ne vaut-il pas mieux que la vendange d''Abiézer ? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tue-les ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lève-toi, tue-les !
      marker-yv: yv-n
    - type: text
      text: 'Puis il dit à Yéter, son premier-né : Tue-les ! Mais le jeune homme ne tira pas son épée, car il avait peur : ce n''était encore qu''un jeune homme. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Exécute-nous… Gédéon tua…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lève-toi toi-même et frappe-nous !… Gédéon se leva et tua… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tel est l'homme…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sans doute une sorte de proverbe ; certains mss de LXX portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta force à toi est celle d'un homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 18 ; 6.14 ; les Madianites demandent à être exécutés rapidement par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gédéon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en personne. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les croissants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement des amulettes ; cf. v. 26.'
      marker-yv: yv-n
    - type: text
      text: 'Zébah et Tsalmounna dirent : Exécute-nous toi-même ! Car tel est l''homme, telle est sa force. Ainsi Gédéon tua Zébah et Tsalmounna. Il prit ensuite les croissants qui étaient aux cous de leurs chameaux.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fin de la vie de Gédéon
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.2,17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sois notre maître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: domine sur nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Gn 1.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; de même au v. 23 ; 9.2.'
      marker-yv: yv-n
    - type: text
      text: 'Les hommes d''Israël dirent à Gédéon : Sois notre maître, toi, puis ton fils, puis le fils de ton fils ; car tu nous as sauvés de la main de Madiân. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1S 8.6s ; 12.12.
      marker-yv: yv-n
    - type: text
      text: 'Gédéon leur dit : Je ne serai pas votre maître, ni moi ni mon fils ; c''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) qui sera votre maître.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 35.2-4 ; Ex 32.2s ; Nb 31.50 ; 2S 8.11s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les ennemis avaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
