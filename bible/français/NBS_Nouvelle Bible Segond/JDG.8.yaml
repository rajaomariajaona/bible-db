        marker: ft
        children:
        - type: text
          text: 3.11+,30.
      marker-yv: yv-n
    - type: text
      text: Madiân fut humilié devant les Israélites et ne releva plus la tête. Le pays fut tranquille pendant quarante ans, pendant les jours de Gédéon.
