document_id: 1CH.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'annonce faite à David
  - type: heading
    content: 2S 7.1-17
  - type: text
    content: ' '
  - type: note
    content: 'dans sa maison  : le texte parallèle de 2S 7.1 ajoute ici et que le Seigneur lui eut accordé le repos en le délivrant de tous les ennemis qui l''entouraient.'
  - type: text
    content: 'Lorsque David fut installé dans sa maison, il dit à Nathan, le prophète : J''habite une maison de cèdre, alors que le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est sous des toiles de tente. '
  '10':
  - type: note
    content: 'j''ai humilié…  : 2S 7.11 je t''ai accordé le repos en te délivrant de tous tes ennemis  ; cf. Dt 9.4 ; Jg 4.23 ; Ps 81.15 ; 107.12. –  je t''ai annoncé que…  : 2S 7.11 le Seigneur t''a annoncé que c''est le Seigneur qui fera une maison pour toi.'
  - type: text
    content: 'Depuis les jours où j''ai institué des juges sur Israël, mon peuple, j''ai humilié tous tes ennemis, et je t''ai annoncé que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui bâtira une maison pour toi. '
  '11':
  - type: text
    content: 'Quand tes jours seront accomplis et que tu iras auprès de tes pères, je susciterai après toi ta descendance, l''un de tes fils, et j''affermirai son règne. '
  '12':
  - type: text
    content: 'C''est lui qui bâtira une maison pour moi, et j''affermirai pour toujours son trône. '
  '13':
  - type: note
    content: 'il sera mon fils  : 2S 7.14 ajoute s''il commet des fautes, je le châtierai avec le bâton des hommes et avec les coups des humains. –  celui qui t''a précédé  : le nom de Saül n''est pas mentionné ici, contrairement à 2 Samuel.'
  - type: text
    content: 'Moi, je serai son père, et lui, il sera mon fils ; je ne lui retirerai pas ma fidélité, comme je l''ai retirée à celui qui t''a précédé. '
  '14':
  - type: note
    content: 'Je l''établirai… mon royaume  : 2S 7.16 ta maison et ton règne seront pour toujours assurés devant toi.'
  - type: text
    content: 'Je l''établirai pour toujours dans ma maison et dans mon royaume, et son trône sera pour toujours affermi. '
  '15':
  - type: text
    content: Nathan rapporta à David toutes ces paroles et toute cette vision.
  - type: heading
    content: Prière de David
  - type: heading
    content: 2S 7.18-29
  '16':
  - type: text
    content: 'Le roi David alla se présenter devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dit : Qui suis-je, '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, et qu''est-ce que ma maison, pour que tu m''aies fait parvenir jusqu''ici ? '
  '17':
  - type: note
    content: 'ma maison  : litt. la maison de ton serviteur. –  Tu me regardes…  : phrase difficile en hébreu, qui a donné lieu à diverses interprétations, p. ex. tu me regardes à la manière des hommes, toi qui es élevé  ; 2S 7.19 présente un texte différent, mais également difficile  : telle est la loi de l''être humain, Seigneur Dieu  !'
  - type: text
    content: 'C''est peu de chose à tes yeux, ô Dieu ; tu parles de ma maison pour des temps lointains. Tu me regardes comme un homme haut placé, '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu ! '
  '18':
  - type: note
    content: Litt. que t'ajoute encore David pour la gloire à ton serviteur ? C'est toi qui as connu ton serviteur.
  - type: text
    content: 'Que pourrais-je encore te dire, pour la gloire que tu m''accordes ? C''est toi qui m''as distingué. '
  '19':
  - type: note
    content: 'à cause de moi, ton serviteur  : 2S 7.21 à cause de ta parole.'
  - type: text
    content: Seigneur
  - type: text
    content: ', c''est à cause de moi, ton serviteur, et selon ton cœur, que tu as fait toutes ces grandes choses, pour les faire connaître ! '
  '2':
  - type: note
    content: Voir cœur.
  - type: text
    content: 'Nathan répondit à David : Fais tout ce que tu as dans le cœur, car Dieu est avec toi.'
  '20':
  - type: note
    content: 2S 7.22 commence par que tu es grand, Seigneur.
  - type: text
    content: Seigneur
  - type: text
    content: ', nul n''est semblable à toi, et il n''y a pas de Dieu à part toi, d''après tout ce que nous avons entendu. '
  '21':
  - type: note
    content: 'qu''un dieu  : autres traductions que son dieu ; que Dieu. –  te faire un nom v. 8.'
  - type: text
    content: 'Y a-t-il sur la terre une seule nation qui soit comme Israël, ton peuple, qu''un dieu soit allé libérer pour en faire son peuple ? Pour te faire un nom tu as fait de grandes choses, des choses redoutables ; tu as chassé des nations devant ton peuple que tu avais libéré de l''Egypte. '
  '22':
  - type: text
    content: 'Tu as destiné Israël, ton peuple, à être ton peuple pour toujours ; et toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es devenu son Dieu. '
  '23':
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', que la parole que tu as prononcée sur moi, ton serviteur, et sur ma maison se confirme pour toujours ! Agis selon ta parole. '
  '24':
  - type: note
    content: 'Qu''elle se confirme  : le mot hébreu correspondant (aussi au v. 23) ne figure pas en 2S 7.26.'
  - type: text
    content: 'Qu''elle se confirme, afin que ton nom soit grand pour toujours et que l''on dise : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël, est Dieu pour Israël ! » Que ma maison à moi, David, ton serviteur, soit affermie devant toi ! '
  '25':
  - type: note
    content: 'le courage  : sous-entendu ( ?) dans le texte ; 2S 7.27 porte le cœur.'
  - type: text
    content: 'Car toi-même, mon Dieu, tu m''as informé que tu bâtirais une maison pour moi. C''est pourquoi j''ai trouvé le courage de prier devant toi. '
  '26':
  - type: note
    content: 'qui es Dieu  : 2S 7.28 ajoute ici tes paroles sont vérité.'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', c''est toi qui es Dieu, et tu m''as annoncé ce bienfait. '
  '27':
  - type: note
    content: 'ce que tu bénis est béni pour toujours  : d''après le texte, quelque peu différent, de 2S 7.29, il s''agit de la maison de David  ; mais on peut aussi comprendre celui que tu bénis (le roi ?) est béni pour toujours, ou encore béni sois-tu pour toujours.'
  - type: text
    content: 'Maintenant, tu as bien voulu bénir ma maison, afin qu''elle subsiste pour toujours devant toi ! Car c''est toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui as béni, et ce que tu bénis est béni pour toujours.'
  '3':
  - type: text
    content: 'Cette nuit-là, la parole de Dieu parvint à Nathan : '
  '4':
  - type: text
    content: 'Va dire à David, mon serviteur : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Ce n''est pas toi qui me bâtiras la maison dans laquelle j''habiterai. '
  '5':
  - type: note
    content: 'j''ai fait monter Israël  : d''Egypte, comme le dit explicitement 2S 7.6 ; cf. Gn 12.10n. –  de tente en tente…  : litt. de tente en tente et de demeure  ; LXX dans une demeure et dans une tente  ; cette expression ne signifie pas que Dieu ait fréquemment changé de sanctuaire, mais qu''il n''a pas eu de domicile fixe construit en dur (par opposition à la maison de cèdre, v. 1) ; 2S 7.6 mais je me suis déplacé avec une tente pour demeure.'
  - type: text
    content: 'Pourtant je n''ai pas habité dans une maison depuis le jour où j''ai fait monter Israël jusqu''à ce jour, mais j''ai été de tente en tente et de demeure en demeure. '
  '6':
  - type: text
    content: 'Partout où je me suis déplacé avec tout Israël, ai-je dit un seul mot à aucun des juges d''Israël à qui j''avais ordonné de faire paître mon peuple, ai-je dit : Pourquoi ne me bâtissez-vous pas une maison de cèdre ? '
  '7':
  - type: text
    content: 'Maintenant, tu parleras ainsi à David, mon serviteur : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : C''est moi qui t''ai pris au pâturage, derrière le troupeau, pour que tu sois chef sur Israël, mon peuple. '
  '8':
  - type: note
    content: Je te ferai (autre traduction je t'ai fait) un nom v. 20.
  - type: text
    content: 'Partout où tu es allé, j''ai été avec toi et j''ai retranché tous tes ennemis devant toi. Je te ferai un nom comme le nom des grands de la terre. '
  '9':
  - type: note
    content: 'injustes  : voir justice. –  à abuser de lui  : 2S 7.10 à l''affliger.'
  - type: text
    content: 'Je fixerai un lieu à Israël, mon peuple ; je le planterai pour qu''il y demeure et ne soit plus agité, pour que les hommes injustes ne recommencent plus à abuser de lui comme par le passé. '
