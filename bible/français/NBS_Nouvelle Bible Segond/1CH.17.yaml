document_id: 1CH.17,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'annonce faite à David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 7.1-17
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans sa maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le texte parallèle de 2S 7.1 ajoute ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' lui eut accordé le repos en le délivrant de tous les ennemis qui l''entouraient.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque David fut installé dans sa maison, il dit à Nathan, le prophète : J''habite une maison de cèdre, alors que le coffre de l''alliance du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est sous des toiles de tente. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai humilié…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 7.11 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je t'ai accordé le repos en te délivrant de tous tes ennemis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 9.4 ; Jg 4.23 ; Ps 81.15 ; 107.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je t'ai annoncé que…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 7.11 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' t''a annoncé que c''est le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui fera une maison pour toi.
      marker-yv: yv-n
    - type: text
      text: 'Depuis les jours où j''ai institué des juges sur Israël, mon peuple, j''ai humilié tous tes ennemis, et je t''ai annoncé que c''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui bâtira une maison pour toi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand tes jours seront accomplis et que tu iras auprès de tes pères, je susciterai après toi ta descendance, l''un de tes fils, et j''affermirai son règne. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est lui qui bâtira une maison pour moi, et j''affermirai pour toujours son trône. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il sera mon fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 7.14 ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'il commet des fautes, je le châtierai avec le bâton des hommes et avec les coups des humains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celui qui t'a précédé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Saül '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: n'est pas mentionné ici, contrairement à 2 Samuel.
      marker-yv: yv-n
    - type: text
      text: 'Moi, je serai son père, et lui, il sera mon fils ; je ne lui retirerai pas ma fidélité, comme je l''ai retirée à celui qui t''a précédé. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je l'établirai… mon royaume
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 7.16 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta maison et ton règne seront pour toujours assurés devant toi.
      marker-yv: yv-n
    - type: text
      text: 'Je l''établirai pour toujours dans ma maison et dans mon royaume, et son trône sera pour toujours affermi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nathan rapporta à David toutes ces paroles et toute cette vision.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 7.18-29
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi David alla se présenter devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et dit : Qui suis-je, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu, et qu''est-ce que ma maison, pour que tu m''aies fait parvenir jusqu''ici ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la maison de ton serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu me regardes…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : phrase difficile en hébreu, qui a donné lieu à diverses interprétations, p. ex. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu me regardes à la manière des hommes, toi qui es élevé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; 2S 7.19 présente un texte différent, mais également difficile'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'telle est la loi de l''être humain, Seigneur '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Dieu
        - type: text
          text: '  !'
      marker-yv: yv-n
    - type: text
      text: 'C''est peu de chose à tes yeux, ô Dieu ; tu parles de ma maison pour des temps lointains. Tu me regardes comme un homme haut placé, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que t''ajoute encore David pour la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: ' à ton serviteur ? C''est toi qui as connu ton serviteur.'
      marker-yv: yv-n
    - type: text
      text: 'Que pourrais-je encore te dire, pour la gloire que tu m''accordes ? C''est toi qui m''as distingué. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à cause de moi, ton serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 7.21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à cause de ta parole.
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', c''est à cause de moi, ton serviteur, et selon ton cœur, que tu as fait toutes ces grandes choses, pour les faire connaître ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Nathan répondit à David : Fais tout ce que tu as dans le cœur, car Dieu est avec toi.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2S 7.22 commence par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que tu es grand, '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', nul n''est semblable à toi, et il n''y a pas de Dieu à part toi, d''après tout ce que nous avons entendu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'un dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que son dieu ; que Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'te faire un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8.
      marker-yv: yv-n
    - type: text
      text: 'Y a-t-il sur la terre une seule nation qui soit comme Israël, ton peuple, qu''un dieu soit allé libérer pour en faire son peuple ? Pour te faire un nom tu as fait de grandes choses, des choses redoutables ; tu as chassé des nations devant ton peuple que tu avais libéré de l''Egypte. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as destiné Israël, ton peuple, à être ton peuple pour toujours ; et toi, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', tu es devenu son Dieu. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', que la parole que tu as prononcée sur moi, ton serviteur, et sur ma maison se confirme pour toujours ! Agis selon ta parole. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qu'elle se confirme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant (aussi au v. 23) ne figure pas en 2S 7.26.'
      marker-yv: yv-n
    - type: text
      text: 'Qu''elle se confirme, afin que ton nom soit grand pour toujours et que l''on dise : « Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël, est Dieu pour Israël ! » Que ma maison à moi, David, ton serviteur, soit affermie devant toi ! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le courage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu ( ?) dans le texte ; 2S 7.27 porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le cœur.
      marker-yv: yv-n
    - type: text
      text: 'Car toi-même, mon Dieu, tu m''as informé que tu bâtirais une maison pour moi. C''est pourquoi j''ai trouvé le courage de prier devant toi. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui es Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 7.28 ajoute ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tes paroles sont vérité.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', c''est toi qui es Dieu, et tu m''as annoncé ce bienfait. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que tu '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénis
        - type: text
          text: ' est béni pour toujours'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après le texte, quelque peu différent, de 2S 7.29, il s''agit de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la maison de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; mais on peut aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'celui que tu bénis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le roi ?) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est béni pour toujours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: béni sois-tu pour toujours.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, tu as bien voulu bénir ma maison, afin qu''elle subsiste pour toujours devant toi ! Car c''est toi, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qui as béni, et ce que tu bénis est béni pour toujours.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette nuit-là, la parole de Dieu parvint à Nathan : '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Va dire à David, mon serviteur : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Ce n''est pas toi qui me bâtiras la maison dans laquelle j''habiterai. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai fait monter Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme le dit explicitement 2S 7.6 ; cf. Gn 12.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de tente en tente…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de tente en tente et de demeure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans une demeure et dans une tente
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cette expression ne signifie pas que Dieu ait fréquemment changé de sanctuaire, mais qu''il n''a pas eu de domicile fixe construit en dur (par opposition à la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maison de cèdre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 1) ; 2S 7.6 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais je me suis déplacé avec une tente pour demeure.
      marker-yv: yv-n
    - type: text
      text: 'Pourtant je n''ai pas habité dans une maison depuis le jour où j''ai fait monter Israël jusqu''à ce jour, mais j''ai été de tente en tente et de demeure en demeure. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Partout où je me suis déplacé avec tout Israël, ai-je dit un seul mot à aucun des juges d''Israël à qui j''avais ordonné de faire paître mon peuple, ai-je dit : Pourquoi ne me bâtissez-vous pas une maison de cèdre ? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, tu parleras ainsi à David, mon serviteur : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées : C''est moi qui t''ai pris au pâturage, derrière le troupeau, pour que tu sois chef sur Israël, mon peuple. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je te ferai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je t'ai fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
