document_id: ECC.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Comme les Proverbes, Job et certains psaumes, l''Ecclésiaste (selon la traduction grecque) ou  '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Qohéleth
    - type: text
      text: '  (selon l''hébreu) appartient aux écrits de  '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'sagesse  '
    - type: text
      text: (voir « La littérature de sagesse », p.${Xsagesse}). La tradition juive l'attribue d'ailleurs unanimement à Salomon, le « patron » des sages d'Israël, et le livre lui-même semble faire allusion à son règne (1.1,12-18, en particulier v. 16 ; 2.1-26, en particulier v. 7-9). Mais, tandis que le livre des Proverbes et les Psaumes « sapientiaux » s'inscrivent dans le courant d'une sagesse traditionnelle, Qohéleth, avec Job, prend le parti de ne pas accepter sans plus les idées reçues de la majorité de ses contemporains. Il en résulte un ouvrage fort original, dont la présence dans le « canon » de l'Ecriture sainte a suscité de vifs débats dans les premiers siècles de notre ère, tant parmi les juifs que parmi les chrétiens.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Là où Job questionne violemment, Qohéleth, lui,  '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: conteste paisiblement
    - type: text
      text: '. Il remet tranquillement en cause les prétendues évidences concernant le travail (1.12–2.11), la sagesse (2.12-23), la vie humaine (3.18-22 ; 8.1-8), la justice (3.16s ; 8.14), les biens matériels (5.7–6.12), et même la religion traditionnelle (4.17–5.6). Avec lucidité et courage, il regarde, il compare, il s''interroge. Du même coup, il nous oblige à nous interroger à notre tour. Qohéleth sape ainsi les systèmes d''explication que nous nous fabriquons si volontiers pour dissiper nos incertitudes ou chasser nos angoisses. Il détruit les fausses sécurités dont nous nous protégeons et nous oblige ainsi indirectement à ne faire confiance qu''au Dieu vivant (12.1) et à le  '
    - type: usfm
      marker: it
      children:
      - type: text
        text: craindre*
    - type: text
      text: '  (8.12), alors même que son œuvre paraît déconcertante (3.10s ; 6.1s).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Maître de sagesse non conformiste, Qohéleth aide ses élèves et ses lecteurs — il semble avoir visé un large auditoire, cf. 12.9 — à vivre en êtres responsables devant Dieu au cœur d''un  '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: monde complexe
    - type: text
      text: '  et plein d''énigmes, où l''on rencontre aussi bien le scandaleux que le délicieux, bref, le monde où nous essayons de vivre.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Qohéleth est connu pour la fameuse formule, traditionnellement rendue par « vanité des vanités », qui encadre son message (1.2 et 12.8). Il s''agit en hébreu d''une tournure  '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: superlative
    - type: text
      text: ', d''où la traduction : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Futilité complète
    - type: text
      text: ',  '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tout n'est que futilité
    - type: text
      text: . Le mot traduit par « vanité » ou « futilité » signifie proprement « buée, vapeur, haleine » et évoque l'insignifiance ou l'inconsistance. L'expression varie d'ailleurs un peu de forme, mais aussi de nuance, comme on pourra s'en rendre compte en comparant 2.11,17,26 ; 4.4,16 ; 6.9, sans compter 4.7 ; 5.6, etc.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Il semble impossible de dégager dans l''œuvre de Qohéleth un  '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: plan
    - type: text
      text: ', ni même une articulation logique des développements qui se succèdent. On constate plutôt un entrecroisement des thèmes : travail et bonheur, sagesse et sens de la vie, ordre et désordre, vie et mort, richesse et pauvreté, etc.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: auteur
    - type: text
      text: '  est présenté sous le titre énigmatique de  '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Qohéleth
    - type: text
      text: '  (1.1'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ').  '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Qohéleth
    - type: text
      text: '  est un mot féminin en hébreu, mais il entraîne presque toujours un accord au masculin (sauf en 7.27'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ) ; du reste, le féminin peut aussi représenter une abstraction ou une fonction (cf. Esd 2.55
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ). On a voulu voir, sous cette appellation, unique dans toute la Bible, une allusion à un « rassemblement » (d'élèves autour du maître ?). Certains y ont discerné une allusion à la mort qui nous convoque tous en un même lieu. Pour d'autres, le titre signifierait « le Disputeur » ou « la Contestation ».
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Un deuxième titre,  '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Fils de David
    - type: text
      text: ', n''est pas moins mystérieux : faut-il le prendre au sens strict (il désignerait alors Salomon, le sage par excellence), large (un descendant plus ou moins lointain du roi David), ou même prophétique (le roi-sauveur attendu par Israël) ?'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Il y a sans doute peu d'aide à attendre des réponses apportées à ces questions pour comprendre cet étonnant petit livre, dont l'apparent scepticisme est celui d'un croyant lucide sur lui-même et sur ce monde, dans lequel seul le Dieu vivant peut faire du sens.
