document_id: JER.49,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur les Ammonites
  - type: text
    content: ' '
  - type: note
    content: 'les Ammonites  : cf. 9.25 ; 25.21 ; 27.3 ; 40.11 ; Gn 19.38n  ; Dt 2.19 ; 2R 24.2 ; Am 1.13. – Voir fils. –  héritier  : le terme hébreu est une forme du verbe traduit plus loin par prendre possession ( a-t-il pris possession ) ou déposséder (v. 2). – Au lieu de leur roi (hébreu malkam ), des versions anciennes ont lu ici et au v. 3 le nom de Milkom , dieu d''Ammon (cf. 1R 11.5,7n,33 ; 2R 23.13). –  Gad  : cf. Nb 21.24 ; 32 ; Jos 13.24-28 ; peut-être les Ammonites s''étaient-ils approprié les territoires transjordaniens d''Israël après la chute du royaume du Nord en 722/1 av. J.-C.'
  - type: text
    content: Sur les Ammonites.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Israël n'a-t-il pas de fils ?
  - type: text
    content: N'a-t-il pas d'héritier ?
  - type: text
    content: Pourquoi leur roi a-t-il pris possession de Gad ?
  - type: text
    content: Pourquoi son peuple habite-t-il ses villes ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ab 6 ; Ml 1.3. –  son repaire  : litt. ses cachettes . –  il ne sera plus  : traduction incertaine : une version ancienne fait de cette phrase l''introduction du v. 11  : il n''en est plus un pour dire : (11) Abandonne…'
  - type: text
    content: Car moi, j'ai mis Esaü à nu,
  - type: text
    content: j'ai exposé son repaire,
  - type: text
    content: il ne pourra plus se cacher ;
  - type: text
    content: sa descendance, ses frères, ses voisins seront livrés au ravage,
  - type: text
    content: et il ne sera plus.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jb 31.16ss ; 1Tm 5.5.
  - type: text
    content: Abandonne tes orphelins,
  - type: text
    content: c'est moi qui les ferai vivre,
  - type: text
    content: et que tes veuves mettent leur confiance en moi !
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. 25.15-29 ; Es 63.1-6 ; Lm 4.21.
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Ceux qu''aucun jugement ne condamnait à boire la coupe devront la boire ; et toi, tu serais innocenté ! Tu ne seras pas innocenté, tu devras la boire. '
  '13':
  - type: note
    content: 'je le jure… 22.5+. –  Botsra ancienne capitale d''Edom, à une trentaine de kilomètres au sud-est de la mer Morte (à ne pas confondre avec celle de 48.24n, en Moab) Gn 36.33 ; Es 34.6 ; 63.1 ; Am 1.12. –  livrée… aux outrages  : cf. 6.10n  ; 9.10+ ; 24.9+. –  malédictions  : voir bénédiction. –  toutes ses villes… 19.15 ; 34.1 ; Es 6.11.'
  - type: text
    content: 'Car je le jure par moi-même – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – Botsra sera livrée à la dévastation, aux outrages, à la ruine et aux malédictions ; toutes ses villes deviendront des ruines pour toujours.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ab 1-4 ; cf. Es 13.4.
  - type: text
    content: J'ai appris une nouvelle
  - type: text
    content: 'de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'et un émissaire a été envoyé parmi les nations :'
  - type: text
    content: Rassemblez-vous, venez contre elle !
  - type: text
    content: Levez-vous pour la guerre !
  '15':
  - type: text
    content: Car je t'ai rendu petit parmi les nations,
  - type: text
    content: méprisé parmi les humains.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Ta présomption  : traduction incertaine ; on pourrait aussi comprendre ton idole (terme proche en 1R 15.13n), ou encore la terreur que tu inspirais . – Voir cœur. –  dans les creux des rochers (Ct 2.14) ou, si l''on prend le dernier mot comme un nom propre, de Séla (Jg 1.36n  ; 2R 14.7), localité que la tradition a souvent identifiée à Pétra, où l''on a retrouvé nombre d''habitations taillées dans les falaises ; en tout cas le territoire rocheux et accidenté d''Edom était facile à défendre ; voir aussi Nb 24.21 ; Es 14.13ss ; Jr 51.53 ; Ha 2.9 ; Jb 39.27.'
  - type: text
    content: Ta présomption – l'arrogance de ton cœur – t'a trompé,
  - type: text
    content: toi qui demeures dans les creux des rochers
  - type: text
    content: et qui occupes la hauteur des collines.
  - type: text
    content: Quand tu placerais ton nid aussi haut que l'aigle,
  - type: text
    content: je t'en ferais descendre
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: 18.16n. –  à cause de toutes ses plaies 19.8n  ; 50.13.
  - type: text
    content: Edom sera dévasté ; tous ceux qui passeront près de lui seront atterrés et siffleront d'horreur à cause de toutes ses plaies.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Comme… de Sodome et de Gomorrhe… 23.14+ ; cf. 20.16+ ; 50.40 ; Gn 19.24-25+ ; Es 1.9+ ; 13.19s ; Am 4.11 ; So 2.9. –  des villes voisines  : autre traduction de ceux qui y demeuraient . –  personne n''habitera… v. 33 ; 51.43. –  séjournera  : le verbe ainsi traduit est apparenté au substantif habituellement rendu par immigré , cf. Ex 12.48n.'
  - type: text
    content: 'Comme lors de la destruction de Sodome et de Gomorrhe, et des villes voisines, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: personne n'habitera plus là,
  - type: text
    content: aucun être humain n'y séjournera.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '50.44-46. –  fourrés du Jourdain 12.5n. –  inépuisable 5.15n. –  j''en ferai fuir Edom  : litt. je l''en ferai courir  : ce vers et le suivant sont obscurs, et leur traduction est conjecturale ; certains modifient le texte hébreu traditionnel pour lire, p. ex., je ferai fuir ses petits, et je prendrai pour moi le meilleur de ses béliers . –  Qui donc est semblable à moi 10.6+. –  Qui me donnera des consignes  : litt. qui me convoquera ou qui me fera comparaître (cf. Jb 9.19). –  berger  : sans doute ici au sens de roi ou chef  ; cf. 2.8+.'
  - type: text
    content: Tel un lion, il monte des fourrés du Jourdain
  - type: text
    content: contre un domaine inépuisable ;
  - type: text
    content: soudain j'en ferai fuir Edom,
  - type: text
    content: et j'y mettrai en place celui que j'ai choisi.
  - type: text
    content: Qui donc est semblable à moi ?
  - type: text
    content: Qui me donnera des consignes ?
  - type: text
    content: Et quel est le berger qui tiendra devant moi ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'acclamations de la guerre 4.19 ; 20.16 ; 50.15 ; Jos 6.5ss,20 ; Es 42.13 ; Ez 21.27 ; Am 1.14 ; 2.2 ; cf. Ps 27.6+. –  Rabba-des-Ammonites ou Rabbath d''Ammon (actuellement Amman, en Jordanie) ; Dt 3.11 ; 1S 11.1 ; Ez 21.25 ; 25.5 ; cf. Am 1.14. –  tertre 30.18n  ; cf. Jos 8.28. –  les localités qui en dépendent  : litt. ses filles  ; cf. Ez 16.46n. –  dépossédera… v. 1n.'
  - type: text
    content: C'est pourquoi les jours viennent
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: où je ferai retentir les acclamations de la guerre contre Rabba-des-Ammonites ;
  - type: text
    content: elle deviendra un tertre de dévastation,
  - type: text
    content: et les localités qui en dépendent seront détruites par le feu ;
  - type: text
    content: alors Israël dépossédera
  - type: text
    content: ceux qui l'avaient dépossédé,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 30 ; 50.45 ; 51.12 ; Es 14.26 ; 19.17 ; Mi 4.12. –  ils seront traînés  : autre traduction de jeunes pâtres les emporteront . –  il dévastera… ou, avec une légère modification de la vocalisation traditionnelle, leur domaine sera dévasté.'
  - type: text
    content: A cause de cela, écoutez le projet
  - type: text
    content: 'que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a formé contre Edom,'
  - type: text
    content: et les plans qu'il a préparés contre les habitants de Témân !
  - type: text
    content: Sans faute, ils seront traînés comme les petits du troupeau ;
  - type: text
    content: sans faute, il dévastera leur domaine.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Au bruit de leur chute… Ez 26.15. –  la terre ou le pays . –  jusqu''à la mer des Joncs  : ou bien la mer Rouge, ou peut-être une autre région aux confins de l''Egypte ; cf. Ex 10.19 ; 13.18n.'
  - type: text
    content: Au bruit de leur chute
  - type: text
    content: la terre tremble ;
  - type: text
    content: des cris se font entendre jusqu'à la mer des Joncs.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'V. 24+ ; 48.40-41+. –  sur sa proie  : sous-entendu dans le texte.'
  - type: text
    content: Tel l'aigle, il monte, il fond sur sa proie, il déploie ses ailes au-dessus Botsra, et le cœur des guerriers d'Edom est en ce jour-là comme le cœur d'une femme en travail.
  - type: heading
    content: Sur Damas
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Damas , ville principale de Syrie, qui est passée sous le joug babylonien peu après la bataille de Karkemish en 605 av. J.-C. (46.2n) ; cf. 2S 8.5 ; 2R 14.28 ; Es 7.8 ; 17.1. –  Hamath sur l''Oronte, 39.5 ; 2R 18.34 ; Es 10.9. –  Arpad , à une trentaine de kilomètres au nord d''Alep 2R 19.13. –  défaillent  : litt. fondent . –  dans la mer…  : certains modifient le texte hébreu traditionnel pour lire comme la mer… (cf. Es 57.20) ou leur cœur fond d''inquiétude, il ne peut rester tranquille.'
  - type: text
    content: Sur Damas.
  - type: text
    content: Hamath et Arpad ont honte,
  - type: text
    content: 'car elles ont appris une mauvaise nouvelle :'
  - type: text
    content: elles défaillent.
  - type: text
    content: C'est une tourmente dans la mer,
  - type: text
    content: qui ne peut rester tranquille.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 22+ ; 4.31+ ; 50.43 ; Es 13.8.
  - type: text
    content: Damas est affaiblie, elle se tourne pour fuir
  - type: text
    content: et un tremblement s'empare d'elle ;
  - type: text
    content: la détresse et les douleurs la saisissent,
  - type: text
    content: comme une femme qui accouche.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Comment ! cf. Lm 1.1. –  N''est-elle pas abandonnée  : le texte hébreu traditionnel se comprend naturellement comme une simple négation, elle n''est pas abandonnée , qui surprend dans ce contexte. Certains l''interprètent au sens d''une évacuation : parce que la ville n''a pas été abandonnée à temps par ses habitants, ceux-ci périront ; une version ancienne omet toutefois la négation, et beaucoup modifient le texte hébreu traditionnel en conséquence ( elle est abandonnée… ). –  de ma louange  : litt. de louange , ce qui peut signifier tout simplement célèbre . –  de ma gaieté ou, d''après des versions anciennes, de gaieté.'
  - type: text
    content: Comment ! N'est-elle pas abandonnée,
  - type: text
    content: la ville de ma louange,
  - type: text
    content: la cité de ma gaieté ?
  '26':
  - type: text
    content: ' '
  - type: note
    content: 50.30.
  - type: text
    content: 'En effet, ses jeunes gens tombent sur ses places, et tous ses hommes de guerre sont réduits au silence en ce jour-là – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées. '
  '27':
  - type: note
    content: palais 6.5+ ; 17.27. –  Ben-Hadad, nom de plusieurs rois de Syrie ; cf. 1R 15.18 ; 2R 13.3,24 ; voir aussi Am 1.4.
  - type: text
    content: Je mettrai le feu à la muraille de Damas, et il dévorera les palais de Ben-Hadad.
  - type: heading
    content: Sur les royaumes arabes
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'les royaumes de Hatsor ( parc à bétail  ?) ; cf. Jos 11.10n  ; l''expression désigne peut-être ici les communautés arabes sédentarisées dans les oasis, par opposition aux nomades ou semi-nomades de Qédar (cf. 2.10n  ; 25.24 ; Es 21.13-17) ; d''autres y voient un nom de lieu dans le désert de Syrie (cf. v. 30,33). –  Nabuchodonosor (21.2n) ; les chroniques babyloniennes rapportent des incursions chez les populations arabes vers 599 av. J.-C. –  Envahissez  : litt. levez-vous, envahissez , de même au v. 31. –  fils de l''Orient (hébreu qèdèm , en assonance avec Qédar ) cf. Gn 29.1n  ; Es 11.14 ; Jb 1.3+.'
  - type: text
    content: Sur Qédar et les royaumes de Hatsor, que battit Nabuchodonosor, roi de Babylone.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Envahissez Qédar,
  - type: text
    content: et ravagez les fils de l'Orient !
  '29':
  - type: text
    content: ' '
  - type: note
    content: 4.20+. –  Effroi de tous côtés 6.25+ ; 46.5.
  - type: text
    content: Qu'on prenne leurs tentes et leurs troupeaux,
  - type: text
    content: qu'on enlève leurs toiles, tout leur équipement, leurs chameaux,
  - type: text
    content: 'qu''on crie sur eux : Effroi de tous côtés !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Heshbôn  : à la frontière des territoires de Gad et de Ruben, cette ville moabite selon 48.2n a dû passer quelque temps aux mains des Ammonites. –  Aï signifie ruine  ; il s''agit ou bien d''une référence au tertre (v. 2+) ainsi nommé près de Jéricho, de l''autre côté du Jourdain (Jos 7.2-5 ; 8.1-29), ou bien d''un autre site non identifié en Transjordanie. –  sac 4.8 ; Ez 7.18. –  leur roi (cf. v. 1n) s''en va… 48.7 ; Am 1.15.'
  - type: text
    content: Hurle, Heshbôn, car Aï a été ravagée !
  - type: text
    content: Poussez des cris, filles de Rabba,
  - type: text
    content: mettez un sac pour pagne,
  - type: text
    content: lamentez-vous
  - type: text
    content: et courez ça et là le long des murailles !
  - type: text
    content: Car leur roi s'en va en exil,
  - type: text
    content: avec ses prêtres et ses princes.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'V. 8. –  allez-vous-en  : le verbe correspondant avait le sens de vagabonder, être vagabond en 4.1, fuir en 50.8 ; mais il évoque aussi les gestes qui accompagnent un malheur (15.5n  ; 18.16n  ; 48.17n,27) ; certains comprennent ici plaignez-vous amèrement . –  Nabuchodonosor…  : LXX a seulement le roi de Babylone . –  contre vous  : autre lecture traditionnelle contre eux.'
  - type: text
    content: Fuyez, allez-vous-en vite, terrez-vous profond,
  - type: text
    content: habitants de Hatsor !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Car Nabuchodonosor, roi de Babylone, a formé un projet contre vous,
  - type: text
    content: il a préparé un plan contre vous.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Envahissez  : cf. v. 28n.'
  - type: text
    content: Envahissez la nation tranquille,
  - type: text
    content: qui habite en sécurité !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Elle n'a ni porte, ni verrous,
  - type: text
    content: elle demeure solitaire.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'je les disséminerai v. 36 ; autre traduction je les vannerai  ; cf. 4.11n  ; 15.7n  ; 51.2. –  ceux qui se rasent… 9.25n. –  sur eux la catastrophe  : litt. leur catastrophe . –  de tous les côtés  : autre traduction de tous ceux qui passent près d''eux  ; cf. v. 17 ; 22.20n.'
  - type: text
    content: Leurs chameaux seront livrés au pillage,
  - type: text
    content: et la multitude de leurs troupeaux comme butin ;
  - type: text
    content: je les disséminerai à tous les vents,
  - type: text
    content: ceux qui se rasent les tempes,
  - type: text
    content: et je ferai venir sur eux la catastrophe de tous les côtés
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '33':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 18n.
  - type: text
    content: Hatsor sera un repaire de chacals,
  - type: text
    content: un lieu dévasté pour toujours ;
  - type: text
    content: personne n'habitera plus là,
  - type: text
    content: aucun être humain n'y séjournera.
  - type: heading
    content: Sur Elam
  '34':
  - type: text
    content: ' '
  - type: note
    content: Elam 25.25 ; Gn 10.22n  ; Es 11.11n  ; Ez 32.24s. –  Sédécias 1.3n.
  - type: text
    content: 'Voici la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parvint à Jérémie, le prophète, au sujet d''Elam, au commencement du règne de Sédécias, roi de Juda :'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'l''arc d''Elam  : les archers élamites étaient réputés dans l''Orient ancien ; cf. Es 22.6.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Je brise l'arc d'Elam,
  - type: text
    content: prémices de sa vaillance.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'V. 32+. –  quatre vents  : cf. Ap 7.1.'
  - type: text
    content: Je ferai venir sur Elam quatre vents
  - type: text
    content: des quatre extrémités du ciel,
  - type: text
    content: je les disséminerai à tous ces vents, et il n'y aura pas une seule nation où n'arrivent des bannis d'Elam.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Je terrifierai  : cf. 1.17. –  ceux qui en veulent… 11.21n. –  colère ardente  : cf. 4.8+. –  J''enverrai l''épée… 9.15.'
  - type: text
    content: Je terrifierai les Elamites devant leurs ennemis
  - type: text
    content: et devant ceux qui en veulent à leur vie.
  - type: text
    content: J'amènerai sur eux un malheur,
  - type: text
    content: ma colère ardente
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: J'enverrai l'épée derrière eux,
  - type: text
    content: jusqu'à ce que je les aie exterminés.
  '38':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.15n.
  - type: text
    content: Je placerai mon trône en Elam,
  - type: text
    content: et j'en ferai disparaître le roi et les princes
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '39':
  - type: text
    content: ' '
  - type: note
    content: 48.47+.
  - type: text
    content: Mais dans la suite des temps,
  - type: text
    content: je rétablirai la situation d'Elam
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction conjecturale. –  es-tu fière  : litt. te loues-tu , 4.2n. –  tes vallées…  : certains modifient le texte hébreu traditionnel pour lire simplement ta vallée qui s''écoule  : l''expression pourrait à la fois faire allusion à la vallée où coule le Yabboq et signifier ta force qui s''épuise  ; cf. 21.13 ; Lm 4.9 (même verbe). –  fille rebelle 31.22. –  qui mettais ta confiance… 48.7 ; cf. Es 32.9. –  et qui disais , d''après certains mss hébreux et des versions anciennes.'
  - type: text
    content: Pourquoi es-tu fière de tes vallées ?
  - type: text
    content: Ta vallée s'écoule, fille rebelle,
  - type: text
    content: qui mettais ta confiance dans tes trésors
  - type: text
    content: 'et qui disais : Qui viendra contre moi ?'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'frayeur 48.43+s. –  du Seigneur… des Armées  : LXX porte seulement du Seigneur . –  de tous tes alentours ou de tous côtés  ; la formule peut rappeler celle de 6.25+. –  chacun de son côté  : litt. chacun devant soi  ; cf. Am 4.3n. –  personne ne rassemblera… Na 3.18.'
  - type: text
    content: Je fais venir sur toi la frayeur,
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: elle viendra de tous tes alentours ;
  - type: text
    content: vous serez bannis, chacun de son côté,
  - type: text
    content: et personne ne rassemblera les fuyards.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 48.47+. Absent de LXX.
  - type: text
    content: Mais après cela,
  - type: text
    content: je rétablirai la situation des Ammonites
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Sur Edom
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Edom 40.11 ; Gn 25.30 ; 2S 8.14 ; 1R 9.26 ; 2R 8.20-22 ; 16.6 ; Am 1.11 ; Ps 137.7. –  sagesse / Témân Jb 2.11n  ; cf. Ab 8ns ; voir aussi Es 19.11 ; 29.14. –  conseils  : le même mot est traduit par projet aux v. 20,30 ; cf. 18.18n. –  chez les hommes intelligents  : litt. chez les fils , peut-être au sens de disciples ou élèves  ; mais plusieurs versions anciennes ont compris chez les intelligents , ce qui correspond en hébreu à un homonyme (cf. Pr 4.1). –  a-t-elle pourri  : traduction incertaine ; cette forme verbale n''apparaît qu''ici dans l''A.T.'
  - type: text
    content: Sur Edom.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: N'y a-t-il plus de sagesse en Témân ?
  - type: text
    content: Les conseils ont-ils disparu chez les hommes intelligents ?
  - type: text
    content: Leur sagesse a-t-elle pourri ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: Fuyez… v. 30. –  Dedân 25.23+ ; cette oasis, beaucoup plus au sud, est sans doute mentionnée ici en raison de ses rapports commerciaux avec Edom. –  Esaü ou Edom  ; cf. Gn 25.25n,30 ; 36.1. –  je lui ferai rendre des comptes 6.15n  ; 48.44n  ; 50.31n.
  - type: text
    content: Fuyez, rebroussez chemin,
  - type: text
    content: terrez-vous profond,
  - type: text
    content: habitants de Dedân !
  - type: text
    content: Car je fais venir la catastrophe sur Esaü,
  - type: text
    content: c'est le temps où je lui ferai rendre des comptes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'On pourrait aussi comprendre ce v. comme une interrogation  : Si les vendangeurs venaient… ne laisseraient-ils pas de grappillage ? Si des voleurs venaient… ne détruiraient-ils pas seulement selon leurs besoins ? (10) Mais moi… cf. Ab 5.'
  - type: text
    content: Si des vendangeurs viennent chez toi,
  - type: text
    content: ils ne laisseront rien à grappiller,
  - type: text
    content: si des voleurs viennent, la nuit,
  - type: text
    content: ils détruiront selon leurs besoins.
