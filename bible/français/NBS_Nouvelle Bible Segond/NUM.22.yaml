document_id: NUM.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Histoire de Balaam : l''appel du roi Balaq'
  - type: text
    content: ' '
  - type: note
    content: 'partirent 21.10. –  plaines arides de Moab  : cette expression désigne le plateau de Moab , qui s''étend à l''est de la mer Morte ; cf. 21.10-20 ; 26.3,63 ; 31.12 ; 33.48ss ; 35.1 ; 36.13. Sur le terme hébreu traduit par plaines arides , cf. Dt 1.1n  ; Jos 8.14n. –  en Transjordanie, en face de Jéricho  : litt. de l''autre côté du Jourdain de Jéricho (cf. 32.19n,32 ; 34.15 ; 35.14), c.-à-d. à l''est du cours inférieur du Jourdain près de la mer Morte ; cf. 26.3n  ; voir aussi Jos 4.13 ; 5.10.'
  - type: text
    content: 'Les Israélites partirent et campèrent dans les plaines arides de Moab, en Transjordanie, en face de Jéricho. '
  '10':
  - type: note
    content: 'pour me dire  : d''après LXX, Syr, Vg ; autre traduction m''a envoyé chercher.'
  - type: text
    content: 'Balaam répondit à Dieu : Balaq, fils de Tsippor, roi de Moab, les a envoyés pour me dire : '
  '11':
  - type: note
    content: 'V. 5s. –  voue… à la malédiction  : cette formule (v. 17 ; 23.8,11,13,25,27 ; 24.10) traduit un verbe hébreu plus rare, mais approximativement de même sens, que celui qui est traduit par maudire (v. 6,12 ; 23.7 ; 24.9) ; sur le premier verbe, voir Jb 3.8 ; 5.3 ; Pr 11.26 ; 24.24 ; voir aussi Lv 24.11n.'
  - type: text
    content: '« Le peuple qui sort d''Egypte couvre le pays ; maintenant, va, voue-le pour moi à la malédiction ; peut-être pourrai-je le combattre et le chasser. » '
  '12':
  - type: note
    content: 'Cf. 23.23. –  il est béni  : Targum (Tg) du pseudo-Jonathan : ils sont bénis de moi depuis les jours de leurs pères  ; cf. Gn 12.1ss.'
  - type: text
    content: 'Dieu dit à Balaam : Tu n''iras pas avec eux ; tu ne maudiras pas ce peuple, car il est béni. '
  '13':
  - type: note
    content: 'dans votre pays  : LXX chez votre maître.'
  - type: text
    content: 'Balaam se leva au matin et dit aux princes de Balaq : Allez dans votre pays, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' refuse de me laisser aller avec vous. '
  '14':
  - type: text
    content: 'Les princes de Moab revinrent trouver Balaq et lui dirent : Balaam a refusé de venir avec nous.'
  '15':
  - type: text
    content: 'Balaq envoya de nouveau des princes, plus nombreux et plus considérés que les précédents. '
  '16':
  - type: note
    content: Cf. Ac 9.38. –  que rien ne t'empêche 24.11n.
  - type: text
    content: 'Ils vinrent trouver Balaam et lui dirent : Ainsi parle Balaq, fils de Tsippor : Je t''en prie, que rien ne t''empêche de venir me voir ; '
  '17':
  - type: note
    content: 'je te couvrirai de gloire  : autre traduction je t''accorderai de grandes richesses  ; cf. v. 18,37 ; 24.11 ; voir aussi Ex 20.12 ; Pr 3.9. –  voue… v. 11n.'
  - type: text
    content: 'je te couvrirai de gloire et je ferai tout ce que tu me diras ; viens, je te prie, voue ce peuple à la malédiction pour moi ! '
  '18':
  - type: note
    content: 'en rien  : litt. pour rien faire de petit ou de grand, cf. v. 38 ; 23.5 ; 24.13 ; 31.8,16 ; Jos 13.22 ; sur l''expression, cf. Gn 19.11n  ; 1S 20.2n  ; 22.15n  ; 25.36 ; 1R 22.31.'
  - type: text
    content: 'Balaam répondit aux gens de Balaq : Quand Balaq me donnerait tout l''argent et l''or de sa maison, je ne pourrais en rien passer outre aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu ! '
  '19':
  - type: note
    content: Cf. v. 8ss.
  - type: text
    content: 'Maintenant, je vous prie, restez ici cette nuit, vous aussi, que je sache ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dira encore. '
  '2':
  - type: note
    content: Balaq v. 4 ; Jg 11.25. –  tout ce qu'Israël avait fait… 21.21-32.
  - type: text
    content: 'Balaq, fils de Tsippor, vit tout ce qu''Israël avait fait aux Amorites. '
  '20':
  - type: note
    content: 'V. 12,35,38. –  Dieu  : Smr l''ange de Dieu. –  ce que je te dirai  : autre traduction la parole que je te dirai.'
  - type: text
    content: 'Dieu vint à Balaam pendant la nuit ; il lui dit : Puisque ces hommes sont venus t''appeler, va avec eux ; mais tu feras ce que je te dirai.'
  - type: heading
    content: L'ânesse de Balaam
  '21':
  - type: text
    content: 'Balaam se leva au matin ; il sella son ânesse et partit avec les princes de Moab. '
  '22':
  - type: note
    content: 'Cf. Gn 32.24ss ; 1Co 1.27. –  le messager (ou l''ange) du Seigneur Gn 16.7 ; 21.17 ; 22.11,15 ; Ex 3.2 ; voir aussi Ps 35.5s. –  pour s''opposer à lui  : litt. en adversaire (ou en satan  ; voir démon, diable, Satan) pour lui, cf. v. 32n. –  Balaam  : litt. il. –  ses deux serviteurs  : autre traduction deux de ses serviteurs.'
  - type: text
    content: 'Dieu se mit en colère parce qu''il était parti ; le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se posta sur le chemin pour s''opposer à lui. Balaam était monté sur son ânesse, et ses deux serviteurs étaient avec lui. '
  '23':
  - type: note
    content: 'Cf. v. 31 ; Jos 5.13 ; 1Ch 21.16. –  l''ânesse s''écarta…  : le comportement des animaux était souvent pris comme un augure en Mésopotamie.'
  - type: text
    content: 'L''ânesse vit le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' posté sur le chemin, son épée tirée ; l''ânesse s''écarta du chemin et alla dans les champs. Balaam frappa l''ânesse pour la ramener sur le chemin. '
  '24':
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se plaça alors dans un sentier entre les vignes ; il y avait une clôture d''un côté et une clôture de l''autre. '
  '25':
  - type: text
    content: 'Quand l''ânesse vit le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ', elle se serra contre le mur et serra la jambe de Balaam contre le mur. Il la frappa de nouveau. '
  '26':
  - type: note
    content: 'de place  : litt. de chemin.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' passa plus loin et se plaça dans un endroit resserré où il n''y avait pas de place pour s''écarter à droite ni à gauche. '
  '27':
  - type: text
    content: 'Quand l''ânesse vit le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ', elle se coucha sous Balaam. Balaam se mit en colère ; il frappa l''ânesse avec son bâton. '
  '28':
  - type: note
    content: ouvrit la bouche de l'ânesse 2P 2.16.
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ouvrit la bouche de l''ânesse ; elle dit à Balaam : Que t''ai-je fait, pour que tu m''aies frappée par trois fois ? '
  '29':
  - type: text
    content: 'Balaam répondit à l''ânesse : Tu t''es jouée de moi ! Si j''avais une épée à la main, je t''aurais tuée maintenant. '
  '3':
  - type: note
    content: 'le peuple…  : cf. 23.9. –  prit… en horreur  : le verbe hébreu peut exprimer la crainte, le dégoût et la haine ; cf. 21.5 ; Gn 27.46n  ; Ex 1.12 ; Lv 20.23 ; 1R 11.25 ; Es 7.6,16 (épouvanter) ; Pr 3.11 ; voir aussi Ex 15.15.'
  - type: text
    content: 'Moab fut très effrayé devant le peuple, tant il était nombreux ; Moab prit les Israélites en horreur. '
  '30':
  - type: note
    content: 'de tout temps  : même expression hébraïque en Gn 48.15.'
  - type: text
    content: 'L''ânesse dit à Balaam : Ne suis-je pas ton ânesse, celle que tu as montée de tout temps, jusqu''à ce jour ? Ai-je l''habitude d''agir ainsi envers toi ? Il répondit : Non !'
  '31':
  - type: text
    content: ' '
  - type: note
    content: ouvrit les yeux Gn 21.19 ; cf. 2R 6.17s. –  le messager… v. 23 ; cf. Jos 5.13.
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ouvrit les yeux de Balaam : il vit le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' posté sur le chemin, son épée tirée ; il s''inclina et se prosterna face contre terre. '
  '32':
  - type: note
    content: 'pour m''opposer à toi  : litt. en adversaire (v. 22n) ; la précision à toi figure explicitement dans Smr et plusieurs versions anciennes. –  à mes yeux…  : texte et traduction incertains ; la traduction s''inspire de versions anciennes ; cf. 2Co 1.17.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Pourquoi as-tu frappé ton ânesse par trois fois ? Je suis sorti pour m''opposer à toi, car à mes yeux ce voyage est inconsidéré. '
  '33':
  - type: text
    content: 'L''ânesse m''a vu, et elle s''est écartée devant moi par trois fois ; si elle ne s''était pas écartée de moi, c''est toi que j''aurais tué ; elle, je lui aurais laissé la vie ! '
  '34':
  - type: note
    content: 'Voir péché. –  cela ne te plaît pas  : litt. (c''est) mauvais à tes yeux, cf. 32.13 ; Dt 4.25 ; 9.18 ; 17.2 ; 31.29 ; Jg 13.1 ; 1S 15.19.'
  - type: text
    content: 'Balaam dit au messager du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : J''ai péché ; je ne savais pas que tu m''attendais sur le chemin ; si maintenant cela ne te plaît pas, je vais m''en retourner ! '
  '35':
  - type: note
    content: 'Va avec ces hommes v. 20. –  ce que je te dirai  : litt. la parole que je te dirai  ; cf. 24.13.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Balaam : Va avec ces hommes ; mais tu diras seulement ce que je te dirai. Balaam s''en alla donc avec les princes de Balaq.'
  - type: heading
    content: Rencontre de Balaam et Balaq
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'la ville de Moab  : autre traduction Ir-Moab  : cf. 21.15n,28 ; 24.19n. –  frontière et territoire traduisent un même mot hébreu : il doit s''agir en l''occurrence de la frontière nord de Moab (cf. 21.13+).'
  - type: text
    content: 'Balaq apprit que Balaam était arrivé ; il sortit à sa rencontre jusqu''à la ville de Moab qui est sur la frontière de l''Arnon, à l''extrémité de son territoire. '
  '37':
  - type: note
    content: 'V. 17s. –  plus tôt  : sous-entendu dans le texte. – Voir gloire.'
  - type: text
    content: 'Balaq dit à Balaam : Ne t''avais-je pas fait appeler ? Pourquoi n''es-tu pas venu me voir plus tôt ? Vraiment, ne suis-je pas capable de te couvrir de gloire ? '
  '38':
  - type: note
    content: 'serai-je capable de dire…  : autre traduction suis-je capable… –  la parole…  : cf. v. 18,20,35 ; 23.5,12,16s,26 ; 24.13 ; Dt 18.18 ; Jr 1.9.'
  - type: text
    content: 'Balaam dit à Balaq : Maintenant que je suis venu te voir, serai-je capable de dire quoi que ce soit ? Je dirai la parole que Dieu mettra dans ma bouche ! '
  '39':
  - type: note
    content: 'Qiriath-Houtsoth  : localisation incertaine ; on l''a parfois identifiée à Qir-Haréseth ou Kérak, la capitale, au sud, mais on peut aussi penser à un lieu de la frontière nord (cf. v. 36).'
  - type: text
    content: 'Balaam alla avec Balaq ; ils arrivèrent à Qiriath-Houtsoth. '
  '4':
  - type: note
    content: 'Madiân, peuple nomade habituellement situé au sud d''Edom ; cf. 10.29 ; 25.6ss ; 31.1ss,16 ; Gn 36.35. –  cette assemblée  : autre traduction cette multitude  ; ici le terme n''a pas nécessairement son sens cultuel habituel (cf. 10.7 ; 14.5 ; 15.1 ; 16.3 ; 17.1 etc. ; Ex 12.6 etc.).'
  - type: text
    content: 'Moab dit aux anciens de Madiân : Maintenant cette assemblée va brouter tout ce qui nous entoure, comme le bœuf broute la verdure de la campagne. Balaq, fils de Tsippor, était roi de Moab en ce temps-là. '
  '40':
  - type: note
    content: 'il en envoya  : c.-à-d. il envoya des portions de la viande des animaux sacrifiés. Cf. Gn 14.18ss ; 18.6ss ; Ex 18.12 ; 1S 9.13,23s ; 2S 6.17ss.'
  - type: text
    content: Balaq sacrifia du gros bétail et du petit bétail et il en envoya à Balaam et aux princes qui étaient avec lui.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 23.13s. –  Bamoth-Baal ou les hauts lieux de Baal  ; 21.19ns,28n  ; Jos 13.17. –  d''où il put voir ou pour qu''il voie  ; cette vision semble avoir été considérée comme nécessaire à l''efficacité de la malédiction. –  une partie  : litt. une extrémité.'
  - type: text
    content: Au matin, Balaq prit Balaam et le fit monter à Bamoth-Baal, d'où il put voir une partie du peuple.
  '5':
  - type: note
    content: 'Balaam, fils de Béor  : cf. 31.8,16 ; Gn 36.32n  ; sur ce personnage, attesté en dehors des récits bibliques, voir « Les inscriptions de Deir ‘Allah »♦ ; voir aussi Dt 23.5s ; Jos 13.22 ; 24.9s ; Mi 6.5 ; Né 13.2 ; 2P 2.15s ; Jd 11 ; Ap 2.14. –  le fleuve  : sans autre précision, il s''agit habituellement de l''Euphrate, où l''on connaît une ville de Pitrou ou Pedrou (= Petor  ?) à 20 km en aval de Karkemish ; ici cependant Balaam semble venir de Transjordanie (v. 36ss ; voir aussi Gn 36.37n). Au lieu de à Petor, Syr et Vg ont lu le devin  ; cf. Dt 23.5. –  son pays  : litt. le pays des fils de son peuple, expression qui n''apparaît qu''ici (cf. Gn 24.7 ; 31.13) ; d''autres y voient un nom propre, des fils d''Amaw  ; une ville de ce nom est connue entre Alep en Syrie et Karkemish (cf. 23.7n) ; quelques mss hébreux et versions anciennes ont lu des fils d''Ammon, c.-à-d. des Ammonites, cf. Dt 23.4ss. –  un peuple… v. 3,11. –  le pays  : litt. l''œil du pays, cf. v. 11 ; Ex 10.5n,15. –  en face de moi 21.10.'
  - type: text
    content: 'Il envoya des messagers auprès de Balaam, fils de Béor, à Petor sur le fleuve, son pays, pour l''appeler ; il lui fit dire : Il y a là un peuple qui est sorti d''Egypte, qui couvre le pays et qui habite en face de moi. '
  '6':
  - type: note
    content: 'maudis  : cf. v. 11n. –  plus fort que moi ou trop fort pour moi  ; LXX plus fort que nous ; peut-être ainsi pourrons-nous les battre. –  celui que tu bénis est béni…  : cf. Gn 27.29,33ss ; 48.15-20.'
  - type: text
    content: 'Maintenant viens, je te prie, maudis ce peuple pour moi, car il est plus fort que moi : peut-être ainsi pourrai-je le battre et le chasser du pays ; car je sais que celui que tu bénis est béni, et que celui que tu maudis est maudit.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'des présents pour le devin  : litt. des divinations , sans doute un terme technique pour les honoraires du devin ; cf. 1S 9.7 ; 1R 13.7 ; 14.3 ; 2R 5.5,16,20ss ; 8.8 ; Mi 3.5ss ; 2P 2.15.'
  - type: text
    content: 'Les anciens de Moab et les anciens de Madiân s''en allèrent, en emportant des présents pour le devin. Ils vinrent trouver Balaam et lui rapportèrent les paroles de Balaq. '
  '8':
  - type: note
    content: 'La divination par les rêves était une pratique courante dans l''Orient ancien ; cf. v. 19s ; 12.6 ; Gn 20.3n. –  d''après ce que le Seigneur …  : cf. v. 13,18s,38 ; 23.3,12.'
  - type: text
    content: 'Il leur dit : Passez la nuit ici, et je vous donnerai réponse, d''après ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dira. Les princes de Moab restèrent donc chez Balaam.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'vint à  : la même expression est traduite par venir trouver au v. 7.'
  - type: text
    content: 'Dieu vint à Balaam ; il dit : Qui sont ces hommes chez toi ? '
