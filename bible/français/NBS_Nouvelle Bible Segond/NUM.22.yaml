document_id: NUM.22,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Histoire de Balaam : l''appel du roi Balaq'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'partirent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plaines arides de Moab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette expression désigne le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: plateau de Moab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui s''étend à l''est de la mer Morte ; cf. 21.10-20 ; 26.3,63 ; 31.12 ; 33.48ss ; 35.1 ; 36.13. Sur le terme hébreu traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plaines arides
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Dt 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jos 8.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en Transjordanie, en face de Jéricho
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de l''autre côté du Jourdain de Jéricho '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 32.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',32 ; 34.15 ; 35.14), c.-à-d. à l''est du cours inférieur du Jourdain près de la mer Morte ; cf. 26.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Jos 4.13 ; 5.10.'
      marker-yv: yv-n
    - type: text
      text: 'Les Israélites partirent et campèrent dans les plaines arides de Moab, en Transjordanie, en face de Jéricho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour me dire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après LXX, Syr, Vg ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: m'a envoyé chercher.
      marker-yv: yv-n
    - type: text
      text: 'Balaam répondit à Dieu : Balaq, fils de Tsippor, roi de Moab, les a envoyés pour me dire : '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 5s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: voue… à la malédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette formule (v. 17 ; 23.8,11,13,25,27 ; 24.10) traduit un verbe hébreu plus rare, mais approximativement de même sens, que celui qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maudire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 6,12 ; 23.7 ; 24.9) ; sur le premier verbe, voir Jb 3.8 ; 5.3 ; Pr 11.26 ; 24.24 ; voir aussi Lv 24.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '« Le peuple qui sort d''Egypte couvre le pays ; maintenant, va, voue-le pour moi à la malédiction ; peut-être pourrai-je le combattre et le chasser. » '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 23.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il est béni
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Targum '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du pseudo-Jonathan : ils sont bénis de moi depuis les jours de leurs pères'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 12.1ss.'
      marker-yv: yv-n
    - type: text
      text: 'Dieu dit à Balaam : Tu n''iras pas avec eux ; tu ne maudiras pas ce peuple, car il est béni. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans votre pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chez votre maître.
      marker-yv: yv-n
    - type: text
      text: 'Balaam se leva au matin et dit aux princes de Balaq : Allez dans votre pays, car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' refuse de me laisser aller avec vous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les princes de Moab revinrent trouver Balaq et lui dirent : Balaam a refusé de venir avec nous.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Balaq envoya de nouveau des princes, plus nombreux et plus considérés que les précédents. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ac 9.38. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que rien ne t''empêche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '24.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils vinrent trouver Balaam et lui dirent : Ainsi parle Balaq, fils de Tsippor : Je t''en prie, que rien ne t''empêche de venir me voir ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je te couvrirai de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je t'accorderai de grandes richesses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 18,37 ; 24.11 ; voir aussi Ex 20.12 ; Pr 3.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'voue… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'je te couvrirai de gloire et je ferai tout ce que tu me diras ; viens, je te prie, voue ce peuple à la malédiction pour moi ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour rien faire de petit ou de grand
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 38 ; 23.5 ; 24.13 ; 31.8,16 ; Jos 13.22 ; sur l''expression, cf. Gn 19.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 20.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 22.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 25.36 ; 1R 22.31.'
      marker-yv: yv-n
    - type: text
      text: 'Balaam répondit aux gens de Balaq : Quand Balaq me donnerait tout l''argent et l''or de sa maison, je ne pourrais en rien passer outre aux ordres du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', mon Dieu ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 8ss.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, je vous prie, restez ici cette nuit, vous aussi, que je sache ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me dira encore. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Balaq '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 4 ; Jg 11.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tout ce qu''Israël avait fait… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 21.21-32.
      marker-yv: yv-n
    - type: text
      text: 'Balaq, fils de Tsippor, vit tout ce qu''Israël avait fait aux Amorites. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 12,35,38. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Smr
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'ange de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que je te dirai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la parole que je te dirai.
      marker-yv: yv-n
    - type: text
      text: 'Dieu vint à Balaam pendant la nuit ; il lui dit : Puisque ces hommes sont venus t''appeler, va avec eux ; mais tu feras ce que je te dirai.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'ânesse de Balaam
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Balaam se leva au matin ; il sella son ânesse et partit avec les princes de Moab. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 32.24ss ; 1Co 1.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le messager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 16.7 ; 21.17 ; 22.11,15 ; Ex 3.2 ; voir aussi Ps 35.5s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour s'opposer à lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en adversaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en satan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: démon
        - type: text
          text: ', diable, Satan) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Balaam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses deux serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: deux de ses serviteurs.
      marker-yv: yv-n
    - type: text
      text: 'Dieu se mit en colère parce qu''il était parti ; le messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' se posta sur le chemin pour s''opposer à lui. Balaam était monté sur son ânesse, et ses deux serviteurs étaient avec lui. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 31 ; Jos 5.13 ; 1Ch 21.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'ânesse s'écarta…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le comportement des animaux était souvent pris comme un augure en Mésopotamie.'
      marker-yv: yv-n
    - type: text
      text: 'L''ânesse vit le messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' posté sur le chemin, son épée tirée ; l''ânesse s''écarta du chemin et alla dans les champs. Balaam frappa l''ânesse pour la ramener sur le chemin. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Le messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' se plaça alors dans un sentier entre les vignes ; il y avait une clôture d''un côté et une clôture de l''autre. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Quand l''ânesse vit le messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', elle se serra contre le mur et serra la jambe de Balaam contre le mur. Il la frappa de nouveau. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de chemin.
      marker-yv: yv-n
    - type: text
      text: 'Le messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
