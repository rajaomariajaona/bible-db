document_id: 1CH.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Le lecteur décidé qui ne se laisse rebuter ni par un titre ingrat, ni par une entrée en matière constituée de neuf chapitres de généalogies, s''expose à une troisième déconvenue : fréquemment les Chroniques se contentent de reproduire mot pour mot les récits correspondants des livres de Samuel et des Rois. Quelle a donc pu être l'''
  - type: text
    content: intention
  - type: text
    content: ' du Chroniste ? Pour qui ne juge pas inepte ce qu''il n''a pas assez tôt compris, la difficulté éveille la curiosité et stimule la recherche.'
  - type: text
    content: 'Le titre est en partie trompeur. Tout d''abord, la division en deux livres ne doit pas laisser penser que l''on aurait affaire à deux œuvres distinctes (elle apparaît pour la première fois dans la '
  - type: text
    content: Septante ;
  - type: text
    content: ' voir LXX*). Mais surtout, s''il s''agit bien de chroniques royales, celles-ci ne sont pas simplement collectionnées comme des documents d''archives. L''ouvrage répond au projet cohérent d''un auteur que révèlent aussi bien les parties '
  - type: text
    content: originales
  - type: text
    content: ' de l''œuvre (généalogies, discours) que les modifications apportées aux '
  - type: text
    content: sources
  - type: text
    content: ' qu''il utilise (voir « Les textes parallèles des Chroniques », p.${Xparallch}). Ces sources, ce sont d''abord les livres canoniques de '
  - type: text
    content: Samuel-Rois,
  - type: text
    content: ' qu''il semble d''ailleurs connaître dans une première édition parfois plus proche de la '
  - type: text
    content: Septante
  - type: text
    content: ' et des fragments retrouvés à Qumrân que de notre texte hébreu traditionnel. Mais le Chroniste renvoie aussi expressément à plusieurs écrits '
  - type: text
    content: historiques
  - type: text
    content: ' qui ne nous sont pas parvenus, comme le '
  - type: text
    content: livre des rois d'Israël
  - type: text
    content: ' (1Ch 9.1 ; 2Ch 20.34), les '
  - type: text
    content: chroniques du roi David
  - type: text
    content: ' (1Ch 27.24), le '
  - type: text
    content: livre des rois de Juda et d'Israël
  - type: text
    content: ' (2Ch 16.11 ; cf. 27.7), le '
  - type: text
    content: commentaire
  - type: text
    content: ' (hébreu '
  - type: text
    content: midrash*
  - type: text
    content: ') '
  - type: text
    content: du livre des rois
  - type: text
    content: ' (2Ch 24.27) et l’'
  - type: text
    content: histoire des rois d'Israël
  - type: text
    content: ' (2Ch 33.18), ainsi qu''à d''autres ouvrages associés à divers '
  - type: text
    content: prophètes
  - type: text
    content: ' (1Ch 29.29 ; 2Ch 9.29 ; 12.15 ; 13.22 ; 20.34 ; 26.22 ; 32.32 ; 33.19 ; 35.25). Sans les signaler pareillement, il a soin d''insérer dans son récit des morceaux '
  - type: text
    content: liturgiques
  - type: text
    content: ' (comparer 1Ch 16.7ss avec les Psaumes 96 ; 105 ; 106) et sait intégrer finement la '
  - type: text
    content: loi
  - type: text
    content: ' et la '
  - type: text
    content: prophétie
  - type: text
    content: ' (comparer 2Ch 36.21 avec Lv 26.34s et Jr 25.11).'
  - type: text
    content: David, l'homme du temple
  - type: text
    content: 'Le plan d''ensemble des Chroniques met en œuvre des '
  - type: text
    content: choix
  - type: text
    content: ' significatifs. A la différence de Samuel et des Rois qui couvrent toute l''histoire royale depuis les origines et font alterner à partir du schisme les annales des deux royaumes (Juda et Israël), le Chroniste commence son récit proprement dit à l''avènement de '
  - type: text
    content: David
  - type: text
    content: ' et ne s''intéresse qu''à l''histoire du royaume de '
  - type: text
    content: Juda
  - type: text
    content: ' — c''est-à-dire à la dynastie de David. S''il rétrécit ainsi le champ, il universalise la vision : il plonge plus profond dans le passé et projette son regard plus loin dans l''avenir. De longues listes généalogiques, partant d'''
  - type: text
    content: Adam
  - type: text
    content: ' comme une nouvelle Genèse, égrènent inlassablement les noms des descendants des douze fils d''Israël jusqu''à la '
  - type: text
    content: reconstruction du temple
  - type: text
    content: ' (cf. 2Ch 36.22s). Ainsi David et sa maison sont situés dans un vaste contexte : depuis les origines de l''humanité jusqu''à l''édit de l''empereur perse Cyrus le Grand autorisant la reconstruction du temple de Jérusalem. Du coup, c''est l'''
  - type: text
    content: histoire universelle
  - type: text
    content: ' qui trouve son centre et son sens dans l''histoire de la dynastie davidique.'
  - type: text
    content: 'L''ouvrage se découpe aisément :'
  - type: text
    content: —généalogies (1Ch 1–9) ;
  - type: text
    content: —chronique du règne de David (1Ch 10–29) ;
  - type: text
    content: —chronique du règne de Salomon (2Ch 1–9) ;
  - type: text
    content: —chroniques du royaume de Juda (2Ch 10–36).
  - type: text
    content: 'Dans sa peinture des règnes de '
  - type: text
    content: David
  - type: text
    content: ' et de '
  - type: text
    content: Salomon
  - type: text
    content: ', l''auteur laisse dans l''ombre les '
  - type: text
    content: fautes
  - type: text
    content: ' graves qui leur sont reprochées ailleurs : l''adultère et le meurtre dont David s''est rendu coupable (2S 11–12) comme l''idolâtrie associée à la fin du règne de Salomon (1R 11). Il ne mentionne pas non plus les troubles internes de l''époque de David qui, selon la prophétie de Nathan (2S 12.10ss), ont résulté du péché commis. La manière dont il souligne, davantage que ses prédécesseurs, la culpabilité de David lors du recensement (comparer 1Ch 21.3s,7s et 2S 24.3s,10) montre pourtant qu''il n''entend pas faire de David un homme parfait. Cependant, il campe en David la figure du roi élu de Dieu, tout préoccupé du '
  - type: text
    content: temple
  - type: text
    content: ' et de son service : Salomon n''aura plus qu''à exécuter le travail méticuleusement préparé par son père suivant les plans tracés par Dieu lui-même (1Ch 28.19). L''image plus sereine qu''il donne ainsi du règne des deux hommes qui sont à l''origine du premier temple est propre à encourager et à inspirer ceux qui, à la faveur de l''édit de Cyrus le Grand, entreprennent de le rebâtir.'
  - type: text
    content: Histoire et rétribution
  - type: text
    content: 'Lorsqu''il retrace l''histoire des successeurs de David et de Salomon, le Chroniste prend soin de noter, plus systématiquement que ses prédécesseurs, la manière dont Dieu '
  - type: text
    content: rétribue
  - type: text
    content: ' le bien ou le mal. Alors que l''auteur du livre des Rois se contentait le plus souvent d''un jugement global, il a soin de relever telle bonne action d''un mauvais roi ou telle faute d''un bon roi, et la manière dont Dieu les a récompensées ou punies. Le règne de Roboam est affermi pendant trois ans, car pendant trois ans il a suivi la voie de David et de Salomon (2Ch 11.17). Le roi Ozias est frappé de la lèpre parce qu''il a empiété sur les prérogatives des prêtres en pénétrant dans le temple pour y offrir le parfum (2Ch 26.16-22 ; l''incident n''est pas rapporté dans le livre des Rois). Si le bon roi Josias est mortellement blessé à la bataille de Meguiddo, dans laquelle il s''est imprudemment engagé, c''est parce qu''il a négligé l''avertissement du pharaon, avertissement qui venait '
  - type: text
    content: de la bouche de Dieu
  - type: text
    content: ' (2Ch 35.21s).'
  - type: text
    content: 'Ce Dieu qui récompense et punit laisse aussi, entre le mal et sa sanction, une place pour un '
  - type: text
    content: changement radical
  - type: text
    content: ' du pécheur, ainsi qu''en témoigne l''histoire du roi Manassé. Ce parangon du péché n''a en effet dû la prolongation de son règne et ses grandes réalisations qu''à sa repentance '
  - type: text
    content: 'in extremis :'
  - type: text
    content: ' dans la détresse, il chercha à apaiser le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), s''humilia profondément et fut exaucé (2Ch 33.11-13). En réponse à la prière de dédicace du temple, Dieu lance cet appel et cette promesse dont l''écho résonne encore aujourd''hui : '
  - type: text
    content: si mon peuple, sur qui est invoqué mon nom, s'humilie, prie et me recherche, s'il revient de ses voies mauvaises, moi, je l'entendrai depuis le ciel, je pardonnerai son péché et je guérirai son pays
  - type: text
    content: ' (2Ch 7.14). Par-delà le péché dont il est coupable, ce qui perd l''homme, c''est le refus de revenir à Dieu. Ce qui perd Sédécias, le dernier davidide, c''est qu''il ne s''est pas humilié devant le prophète Jérémie (2Ch 36.12). Ce qui perd le peuple finalement, c''est son orgueilleuse résistance aux appels divins : '
  - type: text
    content: ils se moquaient des messagers de Dieu, ils méprisaient ses paroles et raillaient ses prophètes
  - type: text
    content: ' (2Ch 36.16).'
  - type: text
    content: 'En évoquant pour finir l''« édit de Cyrus » ordonnant la reconstruction du temple, l''auteur montre pourquoi il a entrepris de récrire l''histoire de la lignée royale et du temple : au seuil d''une nouvelle étape, le peuple puisera dans son passé la vision et la force de son '
  - type: text
    content: avenir
  - type: text
    content: '. L''histoire de Juda, centrée sur le temple de Jérusalem, n''est pas un simple épisode sans lendemain : le pardon de Dieu peut lui assurer une suite. Quelque modeste que fût la restauration aux VI'
  - type: text
    content: e
  - type: text
    content: ' et V'
  - type: text
    content: e
  - type: text
    content: ' siècles av. J.-C., l''œuvre du Chroniste n''est pas restée sans lendemain. A sa manière, au I'
  - type: text
    content: er
  - type: text
    content: ' siècle apr. J.-C., l''évangéliste Luc reprendra le flambeau. Chroniste du Nouveau Testament, il commencera son récit dans le temple reconstruit ; il célébrera le Sauveur à la fois comme le fils de David et comme le fils d''Adam venu au monde alors qu''un autre empereur promulguait un autre édit… (Lc 1–3).'
