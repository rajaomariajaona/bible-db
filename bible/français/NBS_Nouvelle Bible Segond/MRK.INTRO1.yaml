document_id: MRK.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Un « évangile »
  - type: text
    content: 'Tandis que Matthieu commence par une  '
  - type: text
    content: généalogie
  - type: text
    content: '  de Jésus, que Luc présente son ouvrage comme un exposé  '
  - type: text
    content: 'suivi  '
  - type: text
    content: 'ou ordonné, Marc, d''emblée, annonce le sien comme  '
  - type: text
    content: 'bonne nouvelle  '
  - type: text
    content: ou « évangile » (Mc 1.1
  - type: text
    content: n
  - type: text
    content: ).
  - type: text
    content: 'Marc transmet donc un message de salut. Mais, au lieu de l''exposé magistral que l''on pourrait attendre, il choisit le mode du  '
  - type: text
    content: récit
  - type: text
    content: '. Ce choix révèle une intuition pédagogique de premier ordre car, mieux que tout autre genre, le récit invite le lecteur ou l''auditeur à s''identifier à tel ou tel personnage et donc à devenir lui aussi participant de l''événement qui survient quand la  '
  - type: text
    content: bonne nouvelle
  - type: text
    content: '  est entendue.'
  - type: text
    content: 'Bonne nouvelle  '
  - type: text
    content: de Jésus
  - type: text
    content: ', précise Marc dès les premiers mots de son livre. S''agit-il ici de la bonne nouvelle annoncée par Jésus ou de la bonne nouvelle concernant Jésus ? C''est probablement dans le second sens qu''il faut comprendre l''expression car, lorsqu''il parle du message proclamé par Jésus, Marc utilise la tournure  '
  - type: text
    content: bonne nouvelle de Dieu
  - type: text
    content: '  (1.14) ou  '
  - type: text
    content: bonne nouvelle
  - type: text
    content: '  tout court (1.15).'
  - type: text
    content: 'Si donc l’« évangile » selon Marc veut être reçu comme un  '
  - type: text
    content: message
  - type: text
    content: '  de salut, on évitera d''y chercher autre chose que ce qu''il veut donner, et en particulier de le lire comme un reportage ou une biographie de Jésus. La manière dont il traite l''épisode de l''appel des premiers disciples (1.16-20) appuie clairement cette recommandation. La scène n''est vraisemblable que si les quatre pêcheurs connaissaient déjà Jésus, pour l''avoir entendu et peut-être même rencontré (comparer les scènes correspondantes de Lc 5 ou de Jn 1). On le voit : ce qui compte pour Marc n''est donc pas de rapporter tout le détail de « ce qui s''est exactement passé », mais de faire ressortir la vérité du message. Quand Jésus, en effet, proclame que  '
  - type: text
    content: le règne de Dieu s'est approché
  - type: text
    content: '  et appelle à  '
  - type: text
    content: changer* radicalement
  - type: text
    content: '  (1.15), cela n''a de sens que si des gens  '
  - type: text
    content: le suivent
  - type: text
    content: ', s''engageant derrière lui sur la voie nouvelle qu''il ouvre.'
  - type: text
    content: Les destinataires
  - type: text
    content: Message de salut destiné à une communauté concrète, le texte de Marc reflète nécessairement les particularités culturelles et les préoccupations de ses destinataires.
  - type: text
    content: On a observé que Marc prend soin d'expliquer certains termes difficiles (12.42
  - type: text
    content: n
  - type: text
    content: '  ; 15.16), de préciser les indications géographiques (1.9 ; 11.1), de donner l''équivalent des mots araméens qu''il cite ('
  - type: text
    content: Boanergès
  - type: text
    content: ',  '
  - type: text
    content: Béelzéboul
  - type: text
    content: ', voir 3.17'
  - type: text
    content: n
  - type: text
    content: ',22'
  - type: text
    content: n
  - type: text
    content: '). Il juge nécessaire d''expliquer les coutumes juives (rites de purification : 7.3s ; voir aussi 14.12 ; 15.42). Il souligne volontiers que la bonne nouvelle concerne aussi les non-Juifs, les « païens » (7.27-29 ; 11.17 ; 13.10). Tous ces détails renvoient à une communauté de petites gens d''origine non juive et ne connaissant pas le pays des Juifs. Tablant enfin sur une quinzaine de latinismes propres à Marc, certains spécialistes inclinent à situer ses premiers lecteurs à Rome. D''autres penchent plutôt pour Antioche de Syrie.'
  - type: text
    content: 'Il semble que Marc écrive pour des gens dont l''attachement à Jésus est mis à rude épreuve en une période de  '
  - type: text
    content: persécution
  - type: text
    content: '  (4.17 ; 10.30 ; 13.9-13). Après Jean le Baptiseur (1.14), après leur Maître lui-même (8.31 ; 9.31 ; 10.33s), les disciples de Jésus doivent s''attendre à être eux aussi  '
  - type: text
    content: livrés
  - type: text
    content: '  aux détenteurs du pouvoir (13.9,11s). La bonne nouvelle doit les aider en ces temps difficiles. Certains voient dans cette situation d''urgence une explication de nombreuses caractéristiques du style heurté, haletant de Marc (cf. les  '
  - type: text
    content: 'aussitôt,  '
  - type: text
    content: '1.10'
  - type: text
    content: n
  - type: text
    content: ',12,18,20 ; les temps des verbes, 1.12'
  - type: text
    content: n
  - type: text
    content: ).
  - type: text
    content: Composition de l'évangile
  - type: text
    content: 'Le texte de Marc est, pour une notable part, constitué de  '
  - type: text
    content: petites unités
  - type: text
    content: '  bien délimitées, munies d''introductions et de conclusions et se suffisant en quelque sorte à elles-mêmes. A titre d''exemples : récits de guérisons (1.23-26,40-45), controverses (voir 2.6ss), paraboles (voir 4.2) ou encore débats (12.13-17,18-27,28-34, etc.). Le récit du dernier repas (14.22-25) est un cas particulièrement éclairant. Il est, en effet, connu de l''apôtre Paul sous une forme assez voisine (1Co 11.23-26). Or Paul déclare l''avoir  '
  - type: text
    content: reçu du Seigneur
  - type: text
    content: '  avant de le transmettre aux Corinthiens. Il se réfère ainsi à une tradition qui remonte au Seigneur, et qu''on peut appeler la  '
  - type: text
    content: tradition apostolique
  - type: text
    content: '  ; elle a été transmise oralement avant d''être fixée par écrit.'
  - type: text
    content: 'Chez Marc, certaines de ces unités apparaissent groupées en  '
  - type: text
    content: séquences
  - type: text
    content: '  : récits de guérisons (1.23-45), de miracles (4.35–5.43), controverses avec les autorités du judaïsme (2.1–3.6), questions pièges (12.13-37), paraboles (chap. 4). Il est fort possible que Marc ait reçu certaines de ces séquences déjà constituées. Ainsi la suite « miracle des pains » / « marche sur les eaux » (6.30-52), qui apparaît aussi chez Jean (6.1-21).'
  - type: text
    content: Il est difficile de dire si Marc reformule les matériaux qu'il utilise, et comment il le fait le cas échéant. Il est clair en tout cas qu'il les organise en fonction de son projet. Ainsi la place qu'il affecte aux deux récits de guérisons d'aveugles (8.22-26 et 10.46-52) leur confère sans doute une portée fortement symbolique. En effet, ces récits suivent chacun un passage qui fait ressortir l'aveuglement spirituel des disciples.
  - type: text
    content: 'De plus, en un certain nombre de points stratégiques, Marc a inséré quelques lignes personnelles destinées à structurer le récit. Ce sont des  '
  - type: text
    content: sommaires
  - type: text
    content: ', caractérisés, par exemple, par une information de genre plus général et l''emploi de l''imparfait (ainsi 1.14s ; 3.7-12 ; 6.12s,53-56), des  '
  - type: text
    content: transitions
  - type: text
    content: '  (comme en 1.21s,39 ; 2.13 ; 4.1 ; 6.6, etc.) et des  '
  - type: text
    content: introductions
  - type: text
    content: '  (comme 13.1-5 ; 14.1s). Ces divers passages révèlent l''intention de Marc et les articulations de son récit. Ainsi le résumé qu''il donne en 1.15 de la proclamation de Jésus est déterminant pour comprendre la suite : engagement de disciples, guérisons, enseignement, prises de position face aux objections du judaïsme pharisien, autant d''aspects ou de conséquences de  '
  - type: text
    content: la bonne nouvelle de Dieu
  - type: text
    content: '  résumée ainsi : '
  - type: text
    content: le règne de Dieu s'est approché
  - type: text
    content: .
  - type: text
    content: Le but de Marc
  - type: text
    content: a) Qui est Jésus ?
  - type: text
    content: Tous les paragraphes de l'Evangile selon Marc ont pour personnage central Jésus (à l'exception de 6.14-29, consacré à la mort de Jean le Baptiseur), Jésus restant toujours une figure déconcertante, dont le mystère n'est entièrement dévoilé qu'à la croix.
  - type: text
    content: 'Ceux qui rencontrent Jésus l''appellent surtout  '
  - type: text
    content: Christ
  - type: text
    content: '  (=  '
  - type: text
    content: 'Messie, Oint,  '
  - type: text
    content: 'voir onction*) ou  '
  - type: text
    content: Fils de Dieu
  - type: text
    content: '  (voir 1.1'
  - type: text
    content: n
  - type: text
    content: ), mais Jésus semble vouloir faire taire ceux qui le saluent ainsi (voir 3.11s ; 8.29s). Ce n'est qu'à la fin, lorsque l'issue tragique est imminente, qu'il accepte les deux titres (14.61s). Seule la mort du supplicié sur la croix lève le voile sur sa véritable identité de Fils de Dieu (15.39). Ces deux titres traditionnels acquièrent ainsi un contenu nouveau.
  - type: text
    content: 'En revanche, Jésus évoque fréquemment, 13 fois chez Marc, la mystérieuse figure du  '
  - type: text
    content: Fils* de l'homme
  - type: text
    content: '  (voir 2.10'
  - type: text
    content: n
  - type: text
    content: '  ; 8.29-31 ; 14.61s). Dans la tradition apocalyptique juive, le  '
  - type: text
    content: Fils de l'homme
  - type: text
    content: '  est cet énigmatique personnage qui apparaît comme le Juge de la fin des temps (Dn 7.13, suivi par le livre d''Hénoch*). Cette référence éclaire certainement des passages comme 8.38 ; 13.26 ou 14.62, mais semble moins convenir en d''autres cas, comme 2.10,27s ; 8.31. L''usage que Jésus fait ici de l''expression rappelle la tournure sémitique qui désigne  '
  - type: text
    content: l'être humain
  - type: text
    content: '. Jésus invite l''être humain à entrer dans ce monde nouveau qu''il nomme le  '
  - type: text
    content: règne
  - type: text
    content: '  – ou le  '
  - type: text
    content: 'royaume  '
  - type: text
    content: '–  '
  - type: text
    content: de Dieu
  - type: text
    content: '  et qu''il a placé au cœur de son message (1.15). Puisqu''il inaugure ce règne, on ne s''étonnera pas que l''appellation  '
  - type: text
    content: Fils de l'homme
  - type: text
    content: '  lui serve aussi à se désigner lui-même.'
  - type: text
    content: 'L''énorme espace occupé par le récit de la Passion, et de nombreuses allusions, dès les premiers chapitres, montrent l''importance que Marc accorde à  '
  - type: text
    content: la mort de Jésus
  - type: text
    content: '. Ce qui vaut pour l''ensemble de l''évangile vaut aussi pour le récit de la Passion : on n''est pas ici devant un reportage, mais devant un récit qui fait ressortir la  '
  - type: text
    content: signification
  - type: text
    content: '  de cette mort pour le lecteur-disciple.'
  - type: text
    content: 'Une douloureuse question se pose, en effet : comment comprendre ce qui apparaît comme un scandale : la mort infamante du Fils de Dieu ? La réponse ne peut se trouver que dans les Ecritures, puisque c''est là que se révèle le dessein de Dieu. D''où les nombreuses références scripturaires (citations ou allusions) qu''on trouve dans le récit de la Passion (cf. 14.20s). Marc n''ignore pas l''explication, fréquente dans le Nouveau Testament, de la mort de Jésus comme sacrifice. Il décrit la mort de Jésus comme une  '
  - type: text
    content: rançon
  - type: text
    content: '  (10.45 ; cf. 14.24). Mais il se réfère plus souvent aux Psaumes du  '
  - type: text
    content: Juste persécuté
  - type: text
    content: '  (22 ; 41 ; 69). Jésus, qui jusqu''au moment suprême a choisi, plutôt que la vie sauve, de rester fidèle au règne de Dieu qu''il annonce (14.36), est en effet le Juste par excellence. Il va même plus loin que le juste du Psaume 22, puisque sa fidélité le conduit à perdre la vie en s''exposant aux ennemis de Dieu.'
  - type: text
    content: b) Qu'est-ce qu'être disciple de Jésus ?
  - type: text
    content: 'On l''a vu, Jésus ne conçoit pas sa mission sans  '
  - type: text
    content: disciples
  - type: text
    content: ', c''est-à-dire sans des gens qui le  '
  - type: text
    content: suivent
  - type: text
    content: ', qui s''engagent derrière lui et après lui sur la voie nouvelle qu''il trace. Dans la mesure où Jésus met en question de prétendus ordres établis, la voie qu''il suit est dangereuse. Le suivre est difficile (mais  '
  - type: text
    content: 'tout est possible pour Dieu,  '
  - type: text
    content: cf. 10.27). Marc souligne à l'envi l'incompréhension des disciples (4.13) et leurs défaillances (14.50,68-72).
  - type: text
    content: Selon Marc, le groupe des disciples est assez large. Au-delà du cercle des Douze, il comprend un certain nombre de femmes (15.40s).
  - type: text
    content: 'Parmi les disciples, Jésus en désigne douze  '
  - type: text
    content: afin de les avoir avec lui et de les envoyer
  - type: text
    content: '  (3.14s). D''où le nom d'''
  - type: text
    content: apôtres
  - type: text
    content: '  (= envoyés) que Marc leur donne à leur retour de mission (6.30).'
  - type: text
    content: c)
  - type: text
    content: '  On rejoint ici la  '
  - type: text
    content: perspective universelle
  - type: text
    content: '  de Marc, qui affleure en maints passages de son évangile. Ainsi la mission de Jésus commence en Galilée, région de population mixte comportant de nombreuses localités de tradition païenne. Les pas de Jésus le conduisent parfois en pays étranger (l'''
  - type: text
    content: autre rive
  - type: text
    content: '  en 4.35 ; 5.1, mais aussi le territoire de Tyr en 7.24, de la Décapole en 7.31). Le rendez-vous donné aux disciples en Galilée après la résurrection (14.28 ; 16.7) annonce déjà la mission universelle de la communauté de Jésus, mission expressément voulue par le Maître (13.10).'
  - type: text
    content: Plan de l'évangile ?
  - type: text
    content: Devant un texte aussi foisonnant, on hésite à dégager un plan. On en trouve, en effet, presque autant que de commentateurs.
  - type: text
    content: On se contentera ici de suggérer quelques grandes masses.
  - type: text
    content: Après les passages introductifs de 
  - type: text
    content: 1.1-13
  - type: text
    content: ', '
  - type: text
    content: 1.14–8.26
  - type: text
    content: '  présente le messager du règne de Dieu. On pourrait intituler cette section « Qui  est cet homme ? » ou « Le mystère de Jésus ».'
  - type: text
    content: 8.27–10.52
  - type: text
    content: '  pourrait constituer un deuxième ensemble développant ces deux thèmes conjoints : Le Fils de l''homme va être livré. Les disciples – ceux et celles qui le suivent – vont-ils enfin devenir clairvoyants ?'
  - type: text
    content: 11.1–13.37
  - type: text
    content: '  : le Maître aujourd''hui, et les disciples demain, face à l''opposition.'
  - type: text
    content: 14.1–16.8
  - type: text
    content: '  : Passion et résurrection.'
  - type: text
    content: Le texte de Marc s'achève de façon tellement surprenante qu'on s'est mis très tôt à lui adjoindre, sur la base des autres traditions évangéliques, une conclusion jugée plus satisfaisante (Mc 16.9
  - type: text
    content: n
  - type: text
    content: -20). Si cet appendice nous renseigne sur la foi du christianisme primitif au même titre que l'ensemble des récits évangéliques, il ne nous éclaire pas sur l'entreprise propre de Marc, dont il ne fait manifestement pas partie.
  - type: text
    content: Date, auteur
  - type: text
    content: La plupart des spécialistes situent la rédaction de Marc peu avant ou peu après l'an 70.
  - type: text
    content: Mais à qui doit-on le deuxième évangile ? Rien dans le texte lui-même ne l'indique, pas même l'épisode du jeune homme en 14.51s. Le fait est qu'on peut le lire avec profit sans savoir qui en est l'auteur.
  - type: text
    content: Une tradition qu'on peut situer entre les années 100 et 150 (Papias, évêque d'Hiérapolis) le rattache au Marc qui était en relation avec Pierre (Ac 12.12 ; 1P 5.13) et qui fut aux côtés de Paul (Ac 12.25 ; 13.13 ; 15.36-39 ; Col 4.10 ; 2Tm 4.11 ; Phm 24).
