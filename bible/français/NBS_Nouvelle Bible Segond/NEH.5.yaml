document_id: NEH.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Néhémie met fin aux injustices sociales
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'plainte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 3.7,9 ; 1S 9.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leurs frères judéens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 5 ; Ml 3.5.'
    marker-yv: yv-n
  - type: text
    text: 'Il s''éleva de la part des gens du peuple et de leurs femmes une grande plainte contre leurs frères judéens. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nous, nos fils…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains modifient très légèrement le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nous engageons '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(comme au v. 3, c.-à-d. nous donnons en gage) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nos fils et nos filles pour recevoir du blé… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. v. 5 ; Ex 22.25ss ; Dt 24.10ss ; Es 5.8 ; Am 2.8 ; 4.1 ; 5.11 ; Mi 2.2 ; Ha 2.6s ; voir aussi Gn 47.18s ; Ex 21.7s ; Lv 25.39s ; Es 50.1 ; Am 2.6 ; 8.6 ; Mt 18.25.
    marker-yv: yv-n
  - type: text
    text: 'Les uns disaient : Nous, nos fils et nos filles, nous sommes nombreux ; nous voulons recevoir du blé, afin de pouvoir manger et vivre. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pendant la famine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour manger.
    marker-yv: yv-n
  - type: text
    text: 'D''autres disaient : Nous engageons nos champs, nos vignes et nos maisons, pour recevoir du blé pendant la famine. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur nos champs…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nos champs et nos vignes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sens incertain ; LXX ajoute '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et nos maisons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le tribut du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Esd 4.13 ; 6.8 ; 7.20.'
    marker-yv: yv-n
  - type: text
    text: 'D''autres disaient : Nous avons emprunté de l''argent sur nos champs et nos vignes pour le tribut du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pourtant… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ml 2.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous réduisons à l'esclavage…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 21.2ss ; Lv 25.42ss ; 2Ch 28.10 ; les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'filles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'vendues comme esclaves étaient le plus souvent traitées en concubines. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous sommes sans ressources…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous ne pouvons rien faire, car nos champs…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; sur l''expression correspondante, cf. Dt 28.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Pourtant notre chair est comme la chair de nos frères, nos fils sont comme leurs fils ; nous réduisons à l'esclavage nos fils et nos filles ; plusieurs de nos filles y sont déjà réduites, nous sommes sans ressources, nos champs et nos vignes appartiennent à d'autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leurs cris
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leur cri et ces paroles.
    marker-yv: yv-n
  - type: text
    text: 'Je fus très fâché lorsque j''entendis leurs cris. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je résolus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' décida pour moi'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'notables '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'magistrats '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 17
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous prêtez à intérêt '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le même mot est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dette '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 10) : Ex 22.24 ; Dt 23.20 ; beaucoup modifient très légèrement la lecture traditionnelle du texte pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous imposez un fardeau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 10s). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même terme en Dt 33.4.'
    marker-yv: yv-n
  - type: text
    text: 'Je résolus de faire des reproches aux notables et aux magistrats, et je leur dis : Quoi ! vous prêtez à intérêt à vos frères ! Et je convoquai, à leur sujet, une grande assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: racheté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 25.47s ; Ap 5.9 ; 14.3s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'païens ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: non-Juifs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 6.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et c'est à nous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ', certains modifient le texte hébreu pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: est-ce à nous de les racheter ?
    marker-yv: yv-n
  - type: text
    text: 'Je leur dis : Nous, nous avons racheté selon nos moyens nos frères judéens vendus aux nations ; vous, vous vendriez vos frères, et c''est à nous qu''ils seraient vendus ! Ne trouvant rien à répondre, ils se turent. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je dis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas bien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 18.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vivre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aller, marcher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: crainte
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'outragés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: déshonorés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 2.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Puis je dis : Vous n''agissez pas bien. Ne devriez-vous pas vivre dans la crainte de notre Dieu, pour ne pas être outragés par les nations, par nos ennemis ? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'serviteurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Moi aussi, mes frères et mes serviteurs, nous leur avons prêté de l''argent et du blé. Remettons-leur cette dette, je vous prie ! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rendez-leur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 25.13,23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le centième…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la traduction, incertaine, suppose qu''il s''agit du taux d’'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'intérêt '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 'ss), soit 1% (peut-être par mois, dans ce cas 12% par an), à moins qu''il ne faille comprendre plus généralement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pourcentage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; d''autres modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la dette '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 10) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'argent, de blé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Nb 18.12 ; Dt 7.13 ; Jr 31.12. Os 2.10 ; Jl 2.19 ; Ag 1.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vin nouveau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 27.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je vous en prie, rendez-leur aujourd''hui même leurs champs, leurs vignes, leurs oliviers et leurs maisons, ainsi que le centième de l''argent, du blé, du vin et de l''huile que vous avez exigé d''eux comme intérêt. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jr 34.8ss ; la présence des '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: authentifie le serment.
    marker-yv: yv-n
  - type: text
    text: 'Ils répondirent : Nous les rendrons, nous ne leur demanderons rien ; nous ferons ce que tu dis. Alors j''appelai les prêtres, devant lesquels je les fis jurer de tenir parole. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la poche de mon manteau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ma bourse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1R 11.30s ; Mc 6.11/ / ; Ac 13.51 ; 18.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''il en soit ainsi ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Amen ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 8.6 ; Dt 27.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 'ss ; 1R 1.36 ; Jr 11.5 ; 28.6 ; Ps 106.48 ; 1Ch 16.36. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tint parole
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fit de même.
    marker-yv: yv-n
  - type: text
    text: 'Et je secouai la poche de mon manteau en disant : Que Dieu secoue de la même manière hors de sa maison et du produit de son travail tout homme qui n''aura pas tenu parole, et qu''ainsi cet homme soit secoué et laissé à vide ! Toute l''assemblée dit : Qu''il en soit ainsi ! et loua le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Et le peuple tint parole.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le roi
    - type: usfm
      marker: ft
      children:
      - type: text
