document_id: NEH.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Néhémie met fin aux injustices sociales
  - type: text
    content: ' '
  - type: note
    content: 'plainte Ex 3.7,9 ; 1S 9.16. –  leurs frères judéens  : cf. v. 5 ; Ml 3.5.'
  - type: text
    content: 'Il s''éleva de la part des gens du peuple et de leurs femmes une grande plainte contre leurs frères judéens. '
  '10':
  - type: note
    content: serviteurs 4.10n.
  - type: text
    content: 'Moi aussi, mes frères et mes serviteurs, nous leur avons prêté de l''argent et du blé. Remettons-leur cette dette, je vous prie ! '
  '11':
  - type: note
    content: 'rendez-leur Lv 25.13,23. –  le centième…  : la traduction, incertaine, suppose qu''il s''agit du taux d’intérêt (v. 7nss), soit 1% (peut-être par mois, dans ce cas 12% par an), à moins qu''il ne faille comprendre plus généralement le pourcentage  ; d''autres modifient le texte hébreu traditionnel pour lire la dette (v. 10) d''argent, de blé…  ; cf. Nb 18.12 ; Dt 7.13 ; Jr 31.12. Os 2.10 ; Jl 2.19 ; Ag 1.11. –  vin  : autre traduction vin nouveau, cf. Gn 27.28n.'
  - type: text
    content: 'Je vous en prie, rendez-leur aujourd''hui même leurs champs, leurs vignes, leurs oliviers et leurs maisons, ainsi que le centième de l''argent, du blé, du vin et de l''huile que vous avez exigé d''eux comme intérêt. '
  '12':
  - type: note
    content: Cf. Jr 34.8ss ; la présence des prêtres authentifie le serment.
  - type: text
    content: 'Ils répondirent : Nous les rendrons, nous ne leur demanderons rien ; nous ferons ce que tu dis. Alors j''appelai les prêtres, devant lesquels je les fis jurer de tenir parole. '
  '13':
  - type: note
    content: 'la poche de mon manteau  : autre traduction ma bourse  ; cf. 1R 11.30s ; Mc 6.11/ / ; Ac 13.51 ; 18.6. –  Qu''il en soit ainsi ! ou Amen ! cf. 8.6 ; Dt 27.15nss ; 1R 1.36 ; Jr 11.5 ; 28.6 ; Ps 106.48 ; 1Ch 16.36. –  tint parole  : autre traduction fit de même.'
  - type: text
    content: 'Et je secouai la poche de mon manteau en disant : Que Dieu secoue de la même manière hors de sa maison et du produit de son travail tout homme qui n''aura pas tenu parole, et qu''ainsi cet homme soit secoué et laissé à vide ! Toute l''assemblée dit : Qu''il en soit ainsi ! et loua le '
  - type: text
    content: Seigneur
  - type: text
    content: . Et le peuple tint parole.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'le roi  : sous-entendu dans le texte. –  ordonna…  : autre traduction m''institua gouverneur sur eux…  ; ou d''après un ms et Vg m''institua gouverneur dans le pays de Juda . –  depuis la vingtième année… 1.1n  ; 2.1. –  trente-deuxième année 13.6. –  n''avons vécu…  : litt. n''avons mangé le pain du gouverneur (v. 15n), c.-à-d. l''impôt que le gouverneur avait le droit de prélever sur le peuple pour sa propre subsistance ; de même au v. 18 ; cf. 1S 12.2ss.'
  - type: text
    content: 'Dès le jour où le roi ordonna que je sois leur gouverneur dans le pays de Juda, depuis la vingtième année jusqu''à la trente-deuxième année du roi Artaxerxès, pendant douze ans, ni moi ni mes frères n''avons vécu des revenus du gouverneur. '
  '15':
  - type: note
    content: 'les premiers gouverneurs  : cf. 2.7,9 ; 3.7 ; Ag 1.1,14 ; 2.2,21 ; Esd 5.3,6,14 ; 6.6s,13 ; 8.36. –  du pain et du vin…  : d''après Vg, certains modifient le texte hébreu traditionnel pour lire du pain (v. 14n) pour quarante sicles d''argent par jour  ; le sicle peut être une mesure de poids (40 sicles font un peu moins de 400 g) et une unité monétaire (voir mesures, poids et monnaies). –  serviteurs 4.10n. –  dominaient en maîtres sur  : le verbe correspondant est traduit par se rendre maître en Est 9.1 ; par avoir (le) pouvoir, exercer le pouvoir en Ec 2.19 ; 8.9n.'
  - type: text
    content: 'Avant moi, les premiers gouverneurs accablaient le peuple et percevaient de lui du pain et du vin, ainsi que quarante sicles d''argent ; leurs serviteurs eux-mêmes dominaient en maîtres sur le peuple. Mais moi, par crainte de Dieu, je n''ai pas agi de la sorte. '
  '16':
  - type: note
    content: nous n'avons acheté ou, d'après certains mss hébreux et des versions anciennes, je n'ai acheté  ; d'autres comprennent bien que nous n'ayons pas acheté le moindre champ, c.-à-d. que nous n'ayons eu aucun intérêt personnel dans la restauration de Jérusalem.
  - type: text
    content: 'Bien plus, j''ai travaillé à la réparation de cette muraille ; nous n''avons acheté aucun champ, et tous mes serviteurs rassemblés étaient à l''ouvrage. '
  '17':
  - type: note
    content: 'Judéens  : certains modifient le texte hébreu pour lire notables, comme au v. 7 ; cf. 2.16n  ; 1R 10.4ss.'
  - type: text
    content: 'J''avais à ma table cent cinquante hommes, Judéens et magistrats, sans compter ceux qui venaient à nous des nations d''alentour. '
  '18':
  - type: note
    content: 'Cf. 1R 5.2s. –  des volailles  : LXX un bouc. –  tout le vin nécessaire  : autre texte une outre de vin  ; certains modifient pour lire des outres de vin.'
  - type: text
    content: On apprêtait chaque jour pour mon compte un bœuf, six moutons choisis et des volailles ; et tous les dix jours on préparait en abondance tout le vin nécessaire. Malgré cela, je n'ai pas réclamé les revenus du gouverneur, parce que le service pesait sur ce peuple.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '3.36+. –  favorablement  : litt. pour le bien , cf. 13.31 ; Ps 86.17n  ; Esd 8.22.'
  - type: text
    content: Souviens-toi favorablement de moi, mon Dieu, à cause de tout ce que j'ai fait pour ce peuple !
  '2':
  - type: note
    content: 'Nous, nos fils…  : certains modifient très légèrement le texte hébreu traditionnel pour lire nous engageons (comme au v. 3, c.-à-d. nous donnons en gage) nos fils et nos filles pour recevoir du blé… cf. v. 5 ; Ex 22.25ss ; Dt 24.10ss ; Es 5.8 ; Am 2.8 ; 4.1 ; 5.11 ; Mi 2.2 ; Ha 2.6s ; voir aussi Gn 47.18s ; Ex 21.7s ; Lv 25.39s ; Es 50.1 ; Am 2.6 ; 8.6 ; Mt 18.25.'
  - type: text
    content: 'Les uns disaient : Nous, nos fils et nos filles, nous sommes nombreux ; nous voulons recevoir du blé, afin de pouvoir manger et vivre. '
  '3':
  - type: note
    content: 'pendant la famine  : LXX pour manger.'
  - type: text
    content: 'D''autres disaient : Nous engageons nos champs, nos vignes et nos maisons, pour recevoir du blé pendant la famine. '
  '4':
  - type: note
    content: 'sur nos champs…  : litt. nos champs et nos vignes, sens incertain ; LXX ajoute et nos maisons. –  le tribut du roi  : cf. Esd 4.13 ; 6.8 ; 7.20.'
  - type: text
    content: 'D''autres disaient : Nous avons emprunté de l''argent sur nos champs et nos vignes pour le tribut du roi. '
  '5':
  - type: note
    content: 'Pourtant… Ml 2.10. –  nous réduisons à l''esclavage…  : cf. Ex 21.2ss ; Lv 25.42ss ; 2Ch 28.10 ; les filles vendues comme esclaves étaient le plus souvent traitées en concubines. –  nous sommes sans ressources…  : autre traduction nous ne pouvons rien faire, car nos champs…  ; sur l''expression correspondante, cf. Dt 28.32n.'
  - type: text
    content: Pourtant notre chair est comme la chair de nos frères, nos fils sont comme leurs fils ; nous réduisons à l'esclavage nos fils et nos filles ; plusieurs de nos filles y sont déjà réduites, nous sommes sans ressources, nos champs et nos vignes appartiennent à d'autres.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'leurs cris  : litt. leur cri et ces paroles.'
  - type: text
    content: 'Je fus très fâché lorsque j''entendis leurs cris. '
  '7':
  - type: note
    content: 'Je résolus  : litt. mon cœur décida pour moi. –  notables / magistrats v. 17n  ; 2.16+. –  vous prêtez à intérêt (le même mot est traduit par dette au v. 10) : Ex 22.24 ; Dt 23.20 ; beaucoup modifient très légèrement la lecture traditionnelle du texte pour lire vous imposez un fardeau (cf. v. 10s). –  assemblée  : même terme en Dt 33.4.'
  - type: text
    content: 'Je résolus de faire des reproches aux notables et aux magistrats, et je leur dis : Quoi ! vous prêtez à intérêt à vos frères ! Et je convoquai, à leur sujet, une grande assemblée. '
  '8':
  - type: note
    content: 'racheté  : cf. Lv 25.47s ; Ap 5.9 ; 14.3s. –  nations  : autre traduction païens ; non-Juifs  ; cf. 6.16n. –  et c''est à nous…  : traduction incertaine ; d''après Vg, certains modifient le texte hébreu pour lire est-ce à nous de les racheter ?'
  - type: text
    content: 'Je leur dis : Nous, nous avons racheté selon nos moyens nos frères judéens vendus aux nations ; vous, vous vendriez vos frères, et c''est à nous qu''ils seraient vendus ! Ne trouvant rien à répondre, ils se turent. '
  '9':
  - type: note
    content: 'je dis  : autre lecture traditionnelle il dit. –  pas bien Ex 18.17. –  vivre  : litt. aller, marcher. – Voir crainte. –  outragés ou déshonorés, 2.17n.'
  - type: text
    content: 'Puis je dis : Vous n''agissez pas bien. Ne devriez-vous pas vivre dans la crainte de notre Dieu, pour ne pas être outragés par les nations, par nos ennemis ? '
