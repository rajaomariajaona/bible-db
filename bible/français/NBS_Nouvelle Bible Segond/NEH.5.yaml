    marker-yv: yv-n
  - type: text
    text: On apprêtait chaque jour pour mon compte un bœuf, six moutons choisis et des volailles ; et tous les dix jours on préparait en abondance tout le vin nécessaire. Malgré cela, je n'ai pas réclamé les revenus du gouverneur, parce que le service pesait sur ce peuple.
