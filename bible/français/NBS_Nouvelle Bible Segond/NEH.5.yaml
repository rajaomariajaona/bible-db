  - type: text
    text: 'Avant moi, les premiers gouverneurs accablaient le peuple et percevaient de lui du pain et du vin, ainsi que quarante sicles d''argent ; leurs serviteurs eux-mêmes dominaient en maîtres sur le peuple. Mais moi, par crainte de Dieu, je n''ai pas agi de la sorte. '
