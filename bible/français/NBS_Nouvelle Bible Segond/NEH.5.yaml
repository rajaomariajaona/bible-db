    marker-yv: yv-n
  - type: text
    text: 'Dès le jour où le roi ordonna que je sois leur gouverneur dans le pays de Juda, depuis la vingtième année jusqu''à la trente-deuxième année du roi Artaxerxès, pendant douze ans, ni moi ni mes frères n''avons vécu des revenus du gouverneur. '
