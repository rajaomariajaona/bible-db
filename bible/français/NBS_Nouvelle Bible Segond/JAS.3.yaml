document_id: JAS.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La langue
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Co 14. –  maîtres ou enseignants , traduction traditionnelle docteurs  ; cf. Mt 23.8 ; Lc 2.46 ; Ac 13.1 ; Rm 12.7 ; 1Co 12.28s ; Ep 4.11 ; 1Tm 2.7 ; 2Tm 1.11 ; 4.3 ; Hé 5.12. –  nous  : c.-à-d. les maîtres . –  un jugement plus sévère (litt. plus grand  ; autre traduction très sévère ) : cf. Mc 12.40/ / ; voir aussi Mt 7.21ss ; 12.36 ; Rm 13.2n.'
  - type: text
    content: 'Ne soyez pas nombreux à devenir des maîtres, mes frères : vous le savez, nous recevrons un jugement plus sévère. '
  '10':
  - type: note
    content: Cf. Rm 3.14 ; Ep 4.29.
  - type: text
    content: 'De la même bouche sortent la bénédiction et la malédiction. Il ne faut pas, mes frères, qu''il en soit ainsi. '
  '11':
  - type: note
    content: 'l''eau douce et l''eau amère  : litt. le doux et l''amer  ; Ex 15.23ss ; Jr 23.15.'
  - type: text
    content: 'La source fait-elle jaillir par le même orifice l''eau douce et l''eau amère ? '
  '12':
  - type: note
    content: 'figuier / olives / figues  : cf. Es 5.1ss ; Os 9.10 ; Mc 11.12ss,20ss/ / ; 13.28ss ; Lc 13.6ss ; voir aussi Mt 7.16ss ; 12.33 ; Lc 6.43s. –  Une source…  : certains mss portent de même aucune source ne peut donner de l''eau salée et de l''eau douce.'
  - type: text
    content: Mes frères, un figuier peut-il produire des olives, ou une vigne des figues ? Une source salée ne peut pas non plus produire de l'eau douce.
  - type: heading
    content: Sagesse terrestre et sagesse d'en haut
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'On pourrait aussi considérer ce v. comme la conclusion des v. 1-12 ; cf. 2.18. –  Qui est sage… Mt 11.29 ; 23.34 ; cf. 1Co 1.17–2.16 ; voir aussi Jb 28.28 ; Pr 1.7 ; 9.10 ; cf. Siracide 19.20 : « Toute sagesse est crainte du Seigneur, en toute sagesse il y a la pratique de la Loi. » –  et intelligent Dt 1.13 ; 4.6. –  belle conduite 1Tm 4.12 ; Hé 13.7 ; 1P 1.15+ ; 2.12 ; 2P 3.11. –  avec…  : litt. dans une douceur de sagesse 1.21+.'
  - type: text
    content: 'Qui est sage et intelligent parmi vous ? Que celui-là montre ses œuvres par sa belle conduite, avec douceur et sagesse. '
  '14':
  - type: note
    content: 'Voir cœur. –  une passion jalouse  : le terme grec a donné notre mot zèle  ; cf. v. 16 ; 4.2 ; 1Co 3.3 ; 2Co 12.20 ; Ga 5.20. –  amère Ep 4.31. –  ambition personnelle  : autre traduction rivalité v. 16 ; Rm 2.8 ; 2Co 12.20 ; Ga 5.20 ; Ph 1.17 ; 2.3. –  n''en soyez pas fiers  : autre traduction ne faites pas les fiers (au dépens de la vérité)  ; cf. 1.9+ ; même verbe en 2.13n  ; Rm 11.18. –  ne mentez pas contre la vérité  : cf. 1.18 ; 5.19 ; 1Jn 1.6 ; 2.4.'
  - type: text
    content: 'Mais si vous avez au cœur une passion jalouse et amère ou une ambition personnelle, n''en soyez pas fiers et ne mentez pas contre la vérité. '
  '15':
  - type: note
    content: 'celle qui descend d''en haut  : cf. v. 17 ; 1.5,17 ; voir aussi Jn 3.1-21. –  terrestre Jn 3.31 ; 8.23 ; 1Co 15.47 ; Ph 3.19 ; Col 3.2. –  animale  : litt. psychique, relevant de l’« âme » (grec psychè, latin anima), c.-à-d. de l''être naturel, par opposition au spirituel qui relève de l’Esprit  ; même terme en 1Co 2.14n  ; 15.44,46 ; Jd 19n. –  démoniaque 1Tm 4.1.'
  - type: text
    content: 'Cette sagesse-là n''est pas celle qui descend d''en haut : elle est terrestre, animale, démoniaque. '
  '16':
  - type: note
    content: passion jalouse v. 14n. –  désordre 1.8n  ; même terme Lc 21.9 ; 1Co 14.33 ; 2Co 6.5 ; 12.20.
  - type: text
    content: 'En effet, là où il y a passion jalouse et ambition personnelle, il y a du désordre et toutes sortes de pratiques mauvaises. '
  '17':
  - type: note
    content: 'Cf. v. 15+ ; 1Co 13.4ss ; Ga 5.22ss. –  pure 2Co 7.11 ; 11.2 ; Ph 4.8 ; Tt 2.5 ; 1P 3.2 ; 1Jn 3.3. –  pacifique  : même terme en Hé 12.11 (de paix) ; cf. 1P 3.10s. –  conciliante ou bienveillante Ph 4.5n  ; 1P 2.18. –  raisonnable ou docile. –  compassion 2.13+. –  bons fruits Mt 7.16ss ; 21.43 ; Jn 15.1ss ; Ga 5.22 ; Ep 5.9 ; Ph 1.11. –  sans parti pris  : cf. 2.1 ; un terme apparenté est traduit par distinction en 2.4n. –  sans hypocrisie Rm 12.9+ ; 1P 1.22.'
  - type: text
    content: 'La sagesse d''en haut, elle, est d''abord pure, ensuite pacifique, conciliante, raisonnable, pleine de compassion et de bons fruits, sans parti pris, sans hypocrisie. '
  '18':
  - type: note
    content: 'fruit de la justice Am 6.12 ; Pr 3.9 ; 11.30 ; 13.2 ; cf. Es 32.17 ; Ga 5.22 ; Ep 5.9 ; Ph 1.11. –  justice (1.20 ; 2.23) / paix Mt 6.33 ; Hé 12.11 ; 1P 3.10s. –  par (autre traduction pour) les artisans de paix (litt. ceux qui font de la paix) : cf. 4.17+ ; Mt 5.9.'
  - type: text
    content: Or le fruit de la justice est semé dans la paix par les artisans de paix.
  '2':
  - type: note
    content: 'Nous trébuchons  : cf. 2.10n  ; même verbe en Rm 11.11 ; 2P 1.10 ; voir aussi 1R 8.46 ; Jb 15.14s ; Pr 20.9 ; Ec 7.20 ; Jn 8.7 ; Rm 3.9-18 ; 1Jn 1.8. –  en parole  : cf. 1.19+ ; Siracide 14.1 : « Heureux l''homme dont la bouche n''a pas failli et qui n''est pas tourmenté par le regret de ses fautes. » 19.16 « Tel glisse sans mauvaise intention : qui donc n''a jamais péché en paroles ? » –  parfait ou accompli 1.4+. –  tout son corps  : litt. tout le corps, cf. v. 3,6 ; Rm 12.1,5. –  en bride 1.26.'
  - type: text
    content: Nous trébuchons tous à maintes reprises. Si quelqu'un ne trébuche pas en parole, c'est un homme parfait, capable de tenir tout son corps en bride.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 32.9 ; les exemples choisis par Jc sont fréquents dans la littérature grecque. –  Si…  : certains mss portent une affirmation  : nous mettons…'
  - type: text
    content: 'Si nous mettons le mors dans la bouche des chevaux pour qu''ils nous obéissent, nous dirigeons aussi leur corps tout entier. '
  '4':
  - type: note
    content: 'gouvernail Ac 27.40. –  au gré…  : litt. où le décide le mouvement (cf. Ac 14.5) du pilote. Cf. Instruction d''Aménémopé XVIII : « Ne manœuvre pas avec ta langue ; si la langue de l''homme est le gouvernail du bateau, c''est le Seigneur de tout qui en est le pilote. »'
  - type: text
    content: 'Voyez encore les bateaux : si grands qu''ils soient, et poussés par des vents impétueux, ils sont dirigés par un tout petit gouvernail, au gré des décisions du pilote. '
  '5':
  - type: note
    content: 'Cf. Pr 16.21,27 ; Siracide 5.13 : « La langue de l''homme peut devenir sa ruine. »'
  - type: text
    content: 'De même, la langue est une petite partie du corps, mais elle a de grandes prétentions. Voyez comme un petit feu peut embraser une grande forêt ! '
  '6':
  - type: note
    content: 'Traduction incertaine ; le texte grec juxtapose les formules sans établir toujours une relation claire entre elles ; sur l''idée générale, cf. Mt 12.36s ; 15.11,18s. –  le monde 1.27+ ; autre traduction la parure, cf. 1P 3.3. –  dans notre corps ou dans tout notre corps  : litt. dans (ou parmi) les parties de notre corps (ou nos membres). –  tache  : terme apparenté en 1.27 ; même verbe en Jd 23. –  corps v. 2+. –  le cours  : litt. la roue ou le cycle  ; cf. Ec 12.6 ; Siracide 33.5 : « Les sentiments du sot sont comme une roue de char, et son raisonnement comme un essieu qui tourne. » –  existence  : le terme grec, qui a donné notre mot genèse (allitération avec géhenne Mt 5.22n) signifie souvent naissance (1.23n) ; d''après ses autres sens on pourrait aussi comprendre le cycle du devenir ou le cycle de la nature.'
  - type: text
    content: 'Or la langue aussi est un feu, elle est le monde de l''injustice : la langue a sa place dans notre corps, elle tache tout le corps et elle embrase tout le cours de l''existence, étant elle-même embrasée par la géhenne. '
  '7':
  - type: note
    content: 'Cf. Gn 9.2 ; voir aussi 1.28 ; Ps 8.7. –  espèce(s)  : le mot est habituellement traduit par nature. –  domptées  : même verbe en Mc 5.4.'
  - type: text
    content: 'Toutes les espèces de bêtes sauvages, d''oiseaux, de reptiles, d''animaux marins peuvent être domptées et ont été domptées par l''espèce humaine ; '
  '8':
  - type: note
    content: un fléau litt. un mal. –  incontrôlable ou fluctuant  ; le terme grec correspondant est traduit par inconstant en 1.8n  ; certains mss portent un autre terme qui signifie plus précisément qui ne peut être maîtrisé. –  venin (le même terme grec désigne la rouille en 5.3 ; cf. Rm 3.13) mortel Ps 140.4 ; Rm 3.13.
  - type: text
    content: 'mais la langue, aucun homme ne peut la dompter : c''est un fléau incontrôlable ; elle est pleine d''un venin mortel. '
  '9':
  - type: note
    content: 'Cf. Ps 62.5 ; Siracide 5.9 ; 6.1 parlent du « pécheur à la langue double » ; 28.12 : « Souffle sur une étincelle, elle s''enflamme, mais crache dessus, elle s''éteint ; l''un et l''autre résultat provient de ta bouche. » –  nous bénissons Es 63.16 ; 1Ch 29.10 ; Mc 6.41/ / ; 14.22/ /. –  Seigneur et Père  : cf. 1.1n,27 ; Mt 11.25. –  nous maudissons Ps 10.7 ; 109.28 ; Jb 31.30 ; Lc 6.28 ; Rm 12.14. –  à la ressemblance de Dieu  : cf. Gn 1.26s ; 9.6, 1Co 11.7 ; voir aussi Jc 2.5s ; Ml 2.10.'
  - type: text
    content: 'Par elle nous bénissons celui qui est Seigneur et Père, et par elle nous maudissons les humains qui sont à la ressemblance de Dieu. '
