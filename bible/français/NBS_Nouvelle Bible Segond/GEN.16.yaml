  - type: text
    text: 'Saraï dit à Abram : Puisque le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a empêchée d''avoir des enfants, va avec ma servante, je te prie ; peut-être aurai-je un fils par elle. Abram écouta Saraï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ainsi, après qu''Abram eut habité dix ans en Canaan, Saraï, femme d''Abram, prit Hagar l''Egyptienne, sa servante, et elle la donna comme femme à Abram, son mari. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il alla avec Hagar, et elle fut enceinte. Quand elle se vit enceinte, sa maîtresse ne compta plus à ses yeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
