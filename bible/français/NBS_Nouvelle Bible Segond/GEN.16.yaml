  - type: text
    text: 'Alors Saraï dit à Abram : Que la violence qui m''est faite retombe sur toi ! C''est moi-même qui ai placé ma servante sur ton sein ; et maintenant qu''elle se voit enceinte, je ne compte plus à ses yeux. Que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' soit juge entre moi et toi ! '
