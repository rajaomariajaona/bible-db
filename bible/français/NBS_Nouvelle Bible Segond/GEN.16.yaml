document_id: GEN.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance d'Ismaël
  - type: text
    content: ' '
  - type: note
    content: 'égyptienne  : cf. 12.10ss ; la domination égyptienne s''est parfois étendue sur les nomades arabes du sud du pays de Juda, comme les Hagarites dont le nom rappelle celui de Hagar . Cf. Ps 83.7 ; 1Ch 5.10,19s ; 27.31 ; Ga 4.21-31.'
  - type: text
    content: 'Saraï, femme d''Abram, ne lui avait pas donné d''enfant. Elle avait une servante égyptienne du nom de Hagar. '
  '10':
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Je multiplierai ta descendance ; on ne pourra pas la compter, tant elle sera nombreuse. '
  '11':
  - type: note
    content: 'Cf. Es 7.14 ; Lc 1.31. –  Ismaël (hébreu Yishma''él) signifie Dieu (hébreu ’El, 21.33n) entend ou entendra, écoutera, c.-à-d. exaucera. Cf. 21.17n  ; 29.33n  ; Mi 7.7-9 ; Ps 34.18. –  t''a entendue dans ton affliction  : litt. a entendu (ou écouté) ton affliction (ou ton humiliation), cf. v. 6,9 ; 29.32 ; 31.42 ; 41.52 ; Ex 3.7,17.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit :'
  - type: text
    content: Te voici enceinte ;
  - type: text
    content: Tu vas mettre au monde un fils,
  - type: text
    content: et tu l'appelleras du nom d'Ismaël (« Dieu entend ») ;
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a entendue dans ton affliction.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Il sera comme un âne sauvage  : litt. et lui, ce sera un âne sauvage d''humain (mêmes termes hébreux en Jb 11.12), c.-à-d. : il aura le tempérament d''un âne sauvage (solitaire et ombrageux ? cf. Ps 104.11+). Les Ismaélites sont des nomades dans le désert (25.12-18 ; Ps 83.7).'
  - type: text
    content: Il sera comme un âne sauvage ;
  - type: text
    content: sa main sera contre tous,
  - type: text
    content: et la main de tous sera contre lui ;
  - type: text
    content: il établira sa demeure face à tous ses frères.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'appela… Tu es…  : autre traduction invoqua le nom du Seigneur (YHWH), qui lui avait parlé, (et elle dit) : Tu es…  ; ou appela le Seigneur, qui lui avait parlé, du nom d''Atta-el-Roï…  ; cf. v. 7ss ; 4.26n. –  El-Roï signifie le Dieu (hébreu ’El , 21.33n) qui me voit (cf. 22.14n  ; Ps 10.14) ; d''autres comprennent le Dieu que l''on voit , ou même le Dieu qui pourvoit . –  car, dit-elle  : autre traduction car elle avait dit . –  Ai-je vu…  : texte obscur et traduction incertaine ; autre possibilité est-ce ici que j''ai vu (Dieu) après qu''il m''a vue ? Certains modifient le texte hébreu traditionnel pour lire j''ai vu Dieu après qu''il m''a vue , ou bien ai-je vraiment vu Dieu, et suis-je demeurée en vie (cf. v. 14n) après l''avoir vu ?'
  - type: text
    content: 'Elle appela le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui lui avait parlé : « Tu es El-Roï – le Dieu qui me voit », car, dit-elle : « Ai-je vu ici après qu''il m''a vue ? » '
  '14':
  - type: note
    content: on a appelé ou il a appelé. –  Lahaï-Roï signifie probablement Au Vivant (nom de divinité ?) qui me voit (v. 13n) ; mais d'autres interprétations sont possibles. –  Qadesh 14.7n. –  Béred, au sud-ouest de la mer Morte.
  - type: text
    content: 'C''est pourquoi on a appelé ce puits Puits Lahaï-Roï (« Au Vivant qui me voit ») ; il est entre Qadesh et Béred. '
  '15':
  - type: note
    content: V. 11.
  - type: text
    content: 'Hagar donna un fils à Abram ; Abram appela du nom d''Ismaël le fils que Hagar lui avait donné. '
  '16':
  - type: text
    content: Abram avait quatre-vingt-six ans lorsque Hagar donna Ismaël à Abram.
  '2':
  - type: note
    content: 'Cf. Gn 30.3,9. D''après certains témoignages historiques cette coutume était répandue dans le Proche-Orient ancien. Cf. Code d''Hammourabi 146 : « Lorsqu''un homme épouse une prostituée sacrée (cf. 38.21n), que celle-ci donne sa servante à son mari et qu''elle a des enfants, si plus tard cette servante revendique l''égalité avec sa maîtresse parce qu''elle a eu des enfants, sa maîtresse ne pourra pas la vendre ; elle pourra lui imposer la marque des esclaves et la compter parmi les esclaves. Si elle n''a pas eu d''enfants, sa maîtresse pourra la vendre. » –  va avec  : litt. viens vers ou entre chez, expression très fréquente pour évoquer les relations sexuelles d''un homme avec une femme. –  aurai-je un fils  : litt. serai-je bâtie  ; le verbe hébreu correspondant rappelle le mot habituellement traduit par fils  ; de même en 30.3 ; Jr 12.16n.'
  - type: text
    content: 'Saraï dit à Abram : Puisque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a empêchée d''avoir des enfants, va avec ma servante, je te prie ; peut-être aurai-je un fils par elle. Abram écouta Saraï. '
  '3':
  - type: text
    content: 'Ainsi, après qu''Abram eut habité dix ans en Canaan, Saraï, femme d''Abram, prit Hagar l''Egyptienne, sa servante, et elle la donna comme femme à Abram, son mari. '
  '4':
  - type: text
    content: 'Il alla avec Hagar, et elle fut enceinte. Quand elle se vit enceinte, sa maîtresse ne compta plus à ses yeux. '
  '5':
  - type: note
    content: 'Que la violence…  : litt. ma violence sur toi ! –  sur ton sein  : le même terme est utilisé dans des expressions de sens comparable en Dt 13.7 ; 28.54,56 ; 2S 12.3,8 ; 1R 1.2 ; Mi 7.5 ; dans des sens différents, voir aussi Ex 4.6ns ; Nb 11.12 ; 1R 3.20 ; 17.19n  ; Rt 4.16 ; Lm 2.12.'
  - type: text
    content: 'Alors Saraï dit à Abram : Que la violence qui m''est faite retombe sur toi ! C''est moi-même qui ai placé ma servante sur ton sein ; et maintenant qu''elle se voit enceinte, je ne compte plus à ses yeux. Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit juge entre moi et toi ! '
  '6':
  - type: note
    content: 'à l''affliger ou à l''humilier, à l''opprimer  ; cf. v. 9 ; 21.9-21. –  Hagar…  : litt. elle s''enfuit… –  pour lui échapper  : autre traduction de chez elle  ; cf. v. 8.'
  - type: text
    content: 'Abram répondit à Saraï : Ta servante est entre tes mains ; agis à son égard comme il te plaira. Alors Saraï se mit à l''affliger, et Hagar s''enfuit pour lui échapper.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Le messager (ou l''ange ) du Seigneur  : cf. v. 13. –  Shour  : ce mot peut signifier muraille (49.22n). Certains pensent qu''il vient du « Mur du Prince », une fortification bâtie par le pharaon Aménemhat (≈ 1991-1962 av. J.-C.), à la hauteur de l''isthme de Suez, pour protéger la frontière de l''Egypte des incursions venues d''Asie (25.18 ; cf. Ex 15.22 ; 1S 15.7 ; voir aussi « L''Egypte et les Egyptiens »♦).'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' la trouva près d''une source dans le désert, celle qui est sur le chemin de Shour. '
  '8':
  - type: note
    content: 'pour échapper à Saraï  : autre traduction de chez Saraï.'
  - type: text
    content: 'Il dit : Hagar, servante de Saraï, d''où viens-tu et où vas-tu ? Elle répondit : Je me suis enfuie pour échapper à Saraï, ma maîtresse. '
  '9':
  - type: note
    content: 'par elle  : litt. sous ses mains  ; cf. v. 6.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Retourne chez ta maîtresse et laisse-toi affliger par elle. '
