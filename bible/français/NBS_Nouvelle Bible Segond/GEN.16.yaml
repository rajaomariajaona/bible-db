        text: 'ma violence sur toi ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur ton sein
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme est utilisé dans des expressions de sens comparable en Dt 13.7 ; 28.54,56 ; 2S 12.3,8 ; 1R 1.2 ; Mi 7.5 ; dans des sens différents, voir aussi Ex 4.6'
      - type: usfm
        marker: ord
