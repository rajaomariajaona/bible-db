      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Alors ces hommes dirent : Nous ne trouverons aucun motif d''accusation contre ce Daniel, à moins que nous n''en trouvions un dans la loi de son Dieu.'
    - type: text
      text: ' '
  '7':
