document_id: DAN.6,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Plusieurs traductions rattachent ce verset au chapitre 5, de sorte que les versets du chapitre 6 se trouvent décalés. –  Darius  : cf. 9.1 ; s''il s''agit ici du roi perse mentionné par le livre d''Esdras (4.5 ; 5.5 etc.) et connu pour l''institution des satrapies (cf. v. 2n), le livre ne se tient pas à un ordre chronologique strict (cf. v. 29). Certains identifient cependant Darius, le Mède (cf. 2.39n  ; Jr 51.11) à d''autres personnages du temps de Cyrus.'
  - type: text
    content: Darius, le Mède, reçut la royauté, à l'âge de soixante-deux ans.
  - type: heading
    content: Les ennemis de Daniel lui tendent un piège
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le décret d''interdiction  : litt. le décret et l''interdiction.'
  - type: text
    content: Là-dessus, le roi Darius signa le décret d'interdiction.
  - type: heading
    content: Daniel est jeté dans la fosse aux lions
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'dans la direction de Jérusalem / trois fois par jour  : rite adopté par les Juifs après l''exil ; cf. Ps 28.2 ; 55.18. –  il priait  : cf. 9.3ss.'
  - type: text
    content: Lorsque Daniel sut que le décret était signé, il monta chez lui, dans la chambre à l'étage dont les fenêtres étaient ouvertes dans la direction de Jérusalem ; trois fois par jour il se mettait à genoux, il priait et louait son Dieu, comme il le faisait auparavant.
  - type: text
    content: ' '
  '12':
  - type: note
    content: se précipitèrent v. 7n.
  - type: text
    content: Alors ces hommes se précipitèrent et trouvèrent Daniel qui suppliait et invoquait son Dieu.
  - type: text
    content: ' '
  '13':
  - type: note
    content: V. 8s.
  - type: text
    content: 'Puis ils allèrent trouver le roi et lui parlèrent de l''interdiction royale : N''as-tu pas signé une interdiction stipulant que quiconque, pendant trente jours, adresserait des prières à un autre dieu ou à un autre homme que toi, ô roi, serait jeté dans la fosse aux lions ? Le roi répondit : La chose est certaine, selon la loi des Mèdes et des Perses qui ne peut être abrogée.'
  - type: text
    content: ' '
  '14':
  - type: note
    content: n'a tenu aucun compte 3.12n.
  - type: text
    content: 'Ils prirent de nouveau la parole et dirent, devant le roi : Daniel, l''un des exilés de Juda, n''a tenu aucun compte de toi, ô roi, ni de l''interdiction que tu as signée, et il fait sa prière trois fois par jour.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 38.5 ; Daniel grec 14.30 : « Le roi vit qu''ils le pressaient vivement ; cédant à la nécessité, il leur livra Daniel. »'
  - type: text
    content: Le roi fut très affligé quand il entendit cela ; il voulut délivrer Daniel ; jusqu'au coucher du soleil il s'efforça de le délivrer.
  - type: text
    content: ' '
  '16':
  - type: note
    content: V. 7n,9+ ; cf. Mc 6.26.
  - type: text
    content: 'Mais ces hommes se précipitèrent à nouveau chez le roi et dirent au roi : Sache, ô roi, que la loi des Mèdes et des Perses exige que toute interdiction ou tout décret confirmé par le roi soit irrévocable.'
  - type: text
    content: ' '
  '17':
  - type: note
    content: 'fosse aux lions v. 8+. –  Ton Dieu…  : cf. 3.17 ; voir aussi Daniel grec 14.31s : « Eux (les Babyloniens) jetèrent Daniel dans la fosse aux lions, et il y fut six jours. Il y avait dans la fosse sept lions. On leur donnait chaque jour deux corps et deux brebis ; mais alors on ne leur donna rien, afin qu''ils mangent Daniel. »'
  - type: text
    content: 'Alors le roi ordonna d''amener Daniel et de le jeter dans la fosse aux lions. Le roi dit à Daniel : Ton Dieu, que tu sers avec persévérance, te délivrera !'
  - type: text
    content: ' '
  '18':
  - type: note
    content: L’anneau royal tenait lieu de sceau ; cf. Gn 41.42n  ; Est 8.8 ; voir aussi Mt 27.64-66.
  - type: text
    content: On apporta une pierre et on la mit sur l'ouverture de la fosse ; le roi la scella de son anneau et de l'anneau de ses grands, afin que rien ne soit changé à l'égard de Daniel.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'concubine  : le terme araméen n''apparaît qu''ici (au pluriel) et sa traduction est incertaine ; autres possibilités instruments de musique, danseuses , ou aliments (ainsi la version grecque de Théodotion).'
  - type: text
    content: Le roi se rendit ensuite dans son palais ; il passa la nuit à jeun et il ne fit pas venir de concubine auprès de lui ; le sommeil le fuyait.
  - type: heading
    content: Daniel sort indemne de la fosse aux lions
  '2':
  - type: text
    content: ' '
  - type: note
    content: Les satrapes (terme d'origine perse) étaient les gouverneurs des provinces (ou satrapies) de l'empire perse (cf. v. 1n  ; Est 8.9,12). Le mot est cependant déjà employé en 3.2 ; le système administratif des Perses était encore, pour l'essentiel, en vigueur à la période hellénistique.
  - type: text
    content: Darius trouva bon d'établir sur le royaume cent vingt satrapes répartis dans tout le royaume.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: Le roi se leva au point du jour, avec l'aurore, et il se rendit en toute hâte à la fosse aux lions.
  - type: text
    content: ' '
  '21':
  - type: note
    content: délivrer des lions 2Tm 4.17.
  - type: text
    content: 'En s''approchant de la fosse, il appela Daniel d''une voix triste. Le roi demanda à Daniel : Daniel, serviteur du Dieu vivant, ton Dieu, que tu sers avec persévérance, a-t-il pu te délivrer des lions ?'
  - type: text
    content: ' '
  '22':
  - type: note
    content: 2.4+.
  - type: text
    content: 'Et Daniel dit au roi : O roi, puisses-tu vivre toujours !'
  - type: text
    content: ' '
  '23':
  - type: note
    content: 'envoyé son messager (ou ange) : cf. 3.28 ; Ac 12.11. –  fermer la gueule des lions  : cf. 1 Maccabées 2.60 : « Daniel, pour sa droiture, fut sauvé de la gueule des lions. » Voir aussi Hé 11.33.'
  - type: text
    content: Mon Dieu a envoyé son messager pour fermer la gueule des lions ; ils ne m'ont fait aucun mal, parce que j'ai été trouvé innocent devant lui ; et devant toi non plus, ô roi, je n'ai rien fait de mal.
  - type: text
    content: ' '
  '24':
  - type: note
    content: 'on le trouva indemne  : autre traduction on ne trouva sur lui aucune blessure  ; cf. 3.25.'
  - type: text
    content: Alors le roi, tout joyeux, ordonna qu'on retire Daniel de la fosse. Daniel fut retiré de la fosse et on le trouva indemne, parce qu'il avait mis sa foi en son Dieu.
  - type: text
    content: ' '
  '25':
  - type: note
    content: 'accusé  : cf. 3.8n.'
  - type: text
    content: Le roi ordonna qu'on amène les hommes qui avaient accusé Daniel et qu'on les jette dans la fosse aux lions, eux, leurs enfants et leurs femmes ; ils n'étaient pas arrivés au fond de la fosse que les lions s'étaient rués sur eux et leur avaient brisé tous les os.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.31.
  - type: text
    content: 'Après cela, le roi Darius écrivit aux gens de tous peuples, nations et langues qui habitaient sur toute la terre : Que votre paix soit grande !'
  - type: text
    content: ' '
  '27':
  - type: note
    content: 'l''étendue  : litt. la domination. –  crainte / respect  : cf. 3.29. –  Dieu vivant… toujours  : cf. 4.31+ ; 1P 1.23n  ; Ap 4.9. –  Son royaume… jusqu''à la fin 2.44+.'
  - type: text
    content: Je donne l'ordre que, dans toute l'étendue de mon royaume, on ait de la crainte et du respect devant le Dieu de Daniel.
  - type: text
    content: Car il est le Dieu vivant
  - type: text
    content: et il subsiste toujours !
  - type: text
    content: Son royaume ne sera jamais détruit,
  - type: text
    content: et sa domination durera jusqu'à la fin.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'signes / prodiges 3.32s. –  la griffe  : litt. la main.'
  - type: text
    content: C'est lui qui délivre et qui sauve,
  - type: text
    content: qui produit des signes et des prodiges
  - type: text
    content: dans le ciel et sur la terre.
  - type: text
    content: C'est lui qui a délivré Daniel
  - type: text
    content: de la griffe des lions.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1n  ; 1.21.
  - type: text
    content: Daniel lui-même prospéra sous le règne de Darius et sous le règne de Cyrus le Perse.
  '3':
  - type: note
    content: 'trois chefs (terme d''origine perse) : cf. 5.7n. –  préjudice  : même terme araméen en Esd 4.13.'
  - type: text
    content: Il mit à leur tête trois chefs – l'un d'eux était Daniel – à qui ces satrapes devaient rendre compte, afin que le roi ne subisse aucun préjudice.
  - type: text
    content: ' '
  '4':
  - type: note
    content: souffle extraordinaire 5.12n.
  - type: text
    content: Daniel lui-même surpassait les chefs et les satrapes, parce qu'il y avait en lui un souffle extraordinaire ; et le roi projetait de le placer à la tête de tout le royaume.
  '5':
  - type: text
    content: ' '
  - type: text
    content: Alors les chefs et les satrapes se mirent en quête d'une affaire d'Etat pour accuser Daniel. Mais ils ne purent trouver aucun motif d'accusation, aucune erreur, parce qu'il était digne de confiance, et qu'on ne trouvait chez lui ni négligence, ni erreur.
  - type: text
    content: ' '
  '6':
  - type: note
    content: la loi de son Dieu Es 1.10 ; Ez 7.26 ; Os 4.6 ; Ps 37.31.
  - type: text
    content: 'Alors ces hommes dirent : Nous ne trouverons aucun motif d''accusation contre ce Daniel, à moins que nous n''en trouvions un dans la loi de son Dieu.'
  - type: text
    content: ' '
  '7':
  - type: note
    content: 'se précipitèrent  : verbe rare, de traduction incertaine : certains y voient plutôt une connotation de concertation sournoise (de même aux v. 12,16). –  puisses-tu vivre toujours ! 2.4+.'
  - type: text
    content: 'Puis ces chefs et ces satrapes se précipitèrent chez le roi et lui dirent : Roi Darius, puisses-tu vivre toujours !'
  - type: text
    content: ' '
  '8':
  - type: note
    content: 'intendants…  : cf. v. 2n  ; 3.2n. –  à un autre… que toi  : cf. 11.37s ; Judith 3.8 : « C''était pour lui (Holopherne, cf. Dn 2.38n) chose résolue que d''exterminer tous les dieux de la terre afin que toutes les nations adorent Nabuchodonosor et lui seul et que toutes les langues et les races l''invoquent comme dieu. » –  lions  : cf. Ps 22.14-29 ; 91.13.'
  - type: text
    content: 'Tous les chefs du royaume, les intendants, les satrapes, les conseillers et les gouverneurs sont d''avis que soit publié un édit royal mettant en vigueur cette interdiction : « Quiconque, pendant trente jours, adressera des prières à un autre dieu ou à un autre homme que toi, ô roi, sera jeté dans la fosse aux lions. »'
  - type: text
    content: ' '
  '9':
  - type: note
    content: loi des Mèdes et des Perses… Est 1.19n  ; 8.8.
  - type: text
    content: Maintenant, ô roi, confirme l'interdiction et signe le décret, afin qu'il soit irrévocable, selon la loi des Mèdes et des Perses qui ne peut être abrogée.
