    - type: usfm
      marker: it
      children:
      - type: text
        text: Daniel lui-même surpassait les chefs et les satrapes, parce qu'il y avait en lui un souffle extraordinaire ; et le roi projetait de le placer à la tête de tout le royaume.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors les chefs et les satrapes se mirent en quête d'une affaire d'Etat pour accuser Daniel. Mais ils ne purent trouver aucun motif d'accusation, aucune erreur, parce qu'il était digne de confiance, et qu'on ne trouvait chez lui ni négligence, ni erreur.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
