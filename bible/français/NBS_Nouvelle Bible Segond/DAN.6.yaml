      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Son royaume… jusqu''à la fin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.44+.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Je donne l'ordre que, dans toute l'étendue de mon royaume, on ait de la crainte et du respect devant le Dieu de Daniel.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Car il est le Dieu vivant
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et il subsiste toujours !
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Son royaume ne sera jamais détruit,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et sa domination durera jusqu'à la fin.
