          children:
          - type: text
            text: n
        - type: text
          text: ') chose résolue que d''exterminer tous les dieux de la terre afin que toutes les nations adorent Nabuchodonosor et lui seul et que toutes les langues et les races l''invoquent comme dieu. » –  '
      - type: usfm
