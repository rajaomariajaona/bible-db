        children:
        - type: text
          text: lions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 22.14-29 ; 91.13.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Tous les chefs du royaume, les intendants, les satrapes, les conseillers et les gouverneurs sont d''avis que soit publié un édit royal mettant en vigueur cette interdiction : « Quiconque, pendant trente jours, adressera des prières à un autre dieu ou à un autre homme que toi, ô roi, sera jeté dans la fosse aux lions. »'
    - type: text
      text: ' '
