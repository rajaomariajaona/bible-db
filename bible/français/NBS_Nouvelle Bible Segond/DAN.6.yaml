document_id: DAN.6,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Plusieurs traductions rattachent ce verset au chapitre 5, de sorte que les versets du chapitre 6 se trouvent décalés. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Darius
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.1 ; s''il s''agit ici du roi perse mentionné par le livre d''Esdras (4.5 ; 5.5 etc.) et connu pour l''institution des satrapies (cf. v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), le livre ne se tient pas à un ordre chronologique strict (cf. v. 29). Certains identifient cependant '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Darius, le Mède '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 2.39
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 51.11) à d''autres personnages du temps de Cyrus.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Darius, le Mède, reçut la royauté, à l'âge de soixante-deux ans.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les ennemis de Daniel lui tendent un piège
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le décret d'interdiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le décret et l'interdiction.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Là-dessus, le roi Darius signa le décret d'interdiction.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel est jeté dans la fosse aux lions
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la direction de Jérusalem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trois fois par jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : rite adopté par les Juifs après l''exil ; cf. Ps 28.2 ; 55.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il priait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.3ss.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lorsque Daniel sut que le décret était signé, il monta chez lui, dans la chambre à l'étage dont les fenêtres étaient ouvertes dans la direction de Jérusalem ; trois fois par jour il se mettait à genoux, il priait et louait son Dieu, comme il le faisait auparavant.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se précipitèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors ces hommes se précipitèrent et trouvèrent Daniel qui suppliait et invoquait son Dieu.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 8s.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Puis ils allèrent trouver le roi et lui parlèrent de l''interdiction royale : N''as-tu pas signé une interdiction stipulant que quiconque, pendant trente jours, adresserait des prières à un autre dieu ou à un autre homme que toi, ô roi, serait jeté dans la fosse aux lions ? Le roi répondit : La chose est certaine, selon la loi des Mèdes et des Perses qui ne peut être abrogée.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'n''a tenu aucun compte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ils prirent de nouveau la parole et dirent, devant le roi : Daniel, l''un des exilés de Juda, n''a tenu aucun compte de toi, ô roi, ni de l''interdiction que tu as signée, et il fait sa prière trois fois par jour.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Jr 38.5 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Daniel
        - type: text
          text: ' grec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.30 : « Le roi vit qu''ils le pressaient vivement ; cédant à la nécessité, il leur livra Daniel. »'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Le roi fut très affligé quand il entendit cela ; il voulut délivrer Daniel ; jusqu'au coucher du soleil il s'efforça de le délivrer.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',9+ ; cf. Mc 6.26.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Mais ces hommes se précipitèrent à nouveau chez le roi et dirent au roi : Sache, ô roi, que la loi des Mèdes et des Perses exige que toute interdiction ou tout décret confirmé par le roi soit irrévocable.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fosse aux lions '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ton Dieu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.17 ; voir aussi '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Daniel
        - type: text
          text: ' grec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.31s : « Eux (les Babyloniens) jetèrent Daniel dans la fosse aux lions, et il y fut six jours. Il y avait dans la fosse sept lions. On leur donnait chaque jour deux corps et deux brebis ; mais alors on ne leur donna rien, afin qu''ils mangent Daniel. »'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Alors le roi ordonna d''amener Daniel et de le jeter dans la fosse aux lions. Le roi dit à Daniel : Ton Dieu, que tu sers avec persévérance, te délivrera !'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'anneau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: royal tenait lieu de sceau ; cf. Gn 41.42
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Est 8.8 ; voir aussi Mt 27.64-66.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: On apporta une pierre et on la mit sur l'ouverture de la fosse ; le roi la scella de son anneau et de l'anneau de ses grands, afin que rien ne soit changé à l'égard de Daniel.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: concubine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme araméen n''apparaît qu''ici (au pluriel) et sa traduction est incertaine ; autres possibilités '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: instruments de musique, danseuses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aliments '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (ainsi la version grecque de Théodotion).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Le roi se rendit ensuite dans son palais ; il passa la nuit à jeun et il ne fit pas venir de concubine auprès de lui ; le sommeil le fuyait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel sort indemne de la fosse aux lions
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'satrapes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (terme d'origine perse) étaient les gouverneurs des provinces (ou satrapies) de l'empire perse (cf. v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Est 8.9,12). Le mot est cependant déjà employé en 3.2 ; le système administratif des Perses était encore, pour l''essentiel, en vigueur à la période hellénistique.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Darius trouva bon d'établir sur le royaume cent vingt satrapes répartis dans tout le royaume.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Le roi se leva au point du jour, avec l'aurore, et il se rendit en toute hâte à la fosse aux lions.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'délivrer des lions '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Tm 4.17.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'En s''approchant de la fosse, il appela Daniel d''une voix triste. Le roi demanda à Daniel : Daniel, serviteur du Dieu vivant, ton Dieu, que tu sers avec persévérance, a-t-il pu te délivrer des lions ?'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.4+.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Et Daniel dit au roi : O roi, puisses-tu vivre toujours !'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'envoyé son messager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. 3.28 ; Ac 12.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fermer la gueule des lions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.60 : « Daniel, pour sa droiture, fut sauvé de la gueule des lions. » Voir aussi Hé 11.33.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mon Dieu a envoyé son messager pour fermer la gueule des lions ; ils ne m'ont fait aucun mal, parce que j'ai été trouvé innocent devant lui ; et devant toi non plus, ô roi, je n'ai rien fait de mal.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on le trouva indemne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on ne trouva sur lui aucune blessure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 3.25.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors le roi, tout joyeux, ordonna qu'on retire Daniel de la fosse. Daniel fut retiré de la fosse et on le trouva indemne, parce qu'il avait mis sa foi en son Dieu.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: accusé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Le roi ordonna qu'on amène les hommes qui avaient accusé Daniel et qu'on les jette dans la fosse aux lions, eux, leurs enfants et leurs femmes ; ils n'étaient pas arrivés au fond de la fosse que les lions s'étaient rués sur eux et leur avaient brisé tous les os.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 3.31.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Après cela, le roi Darius écrivit aux gens de tous peuples, nations et langues qui habitaient sur toute la terre : Que votre paix soit grande !'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'étendue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la domination. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
