document_id: 1KI.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'L''essentiel des remarques formulées à propos de la '
  - type: text
    content: division
  - type: text
    content: ' du livre de Samuel (voir l''introduction à Samuel, p.${Xintsm}) pourrait être repris au sujet des Rois. La division en deux parties est artificielle et due principalement à des raisons de commodité. On sait que la version grecque des '
  - type: text
    content: Septante
  - type: text
    content: ' (LXX*) intitule « livres des Règnes » l''ensemble Samuel-Rois. La Vulgate (Vg*), de son côté, appelle ces écrits « les quatre livres des Rois ». Le choix du lieu de la coupure entre 1 et 2 Rois semble déterminé par la répartition des cycles narratifs : celui du prophète Elie dans le premier et celui du prophète Elisée dans le second. Et tant pis pour la notice royale concernant Achazia, coupée en deux.'
  - type: text
    content: Prophétiques,
  - type: text
    content: ' les livres des Rois ne doivent pas être considérés comme une sèche énonciation de l''histoire des cours de Jérusalem et de Samarie. L''ouvrage se donne en réalité pour une reprise des chroniques royales ; il y fait des emprunts, l''essentiel étant la mise en perspective théologique d''où émerge une nouvelle appréciation du dessein de Dieu (cf. 1R 11.41 ; 14.19,29 ; 15.7,23,31 ; 22.46).'
  - type: text
    content: Les dernières années de David
  - type: text
    content: 'Les quatre premiers versets du livre (1R 1.1-4) ont une portée politique. La question est de savoir si le roi est encore capable de '
  - type: text
    content: gouverner
  - type: text
    content: '. L''échec de la prescription des gens de la cour est patent : le roi ne recouvre pas sa chaleur vitale et Abishag la Sunamite, l’« infirmière » introduite dans le harem royal (cf. 1R 2.13-22), ne sera jamais véritablement épouse.'
  - type: text
    content: Alors
  - type: text
    content: ' (1R 1.5) un fils de David, '
  - type: text
    content: Adonias
  - type: text
    content: ', pense que son heure est arrivée. Aîné des fils survivants, il se considère comme l''héritier présomptif de la couronne. Mais comme deux précautions valent mieux qu''une, il se promène en ville sur un char de guerre, entouré d''une garde personnelle. L''indulgence que David a toujours montrée à son égard (1.6) encourage Adonias à tenter sa chance.'
  - type: text
    content: Un sacre manqué, un autre réussi
  - type: text
    content: 'Tel est au moins l''aspect profane de l''affaire. Adonias organise une sorte de banquet rituel, à 2 km au sud de la capitale, près d''une source, comme il convient sans doute à un '
  - type: text
    content: sacre royal
  - type: text
    content: . Comme par hasard, au nombre de ses supporters invités se trouve aussi Abiathar, le prêtre de Nob (1S 22.9,20), un personnage très en vue.
  - type: text
    content: 'Le dessein divin se manifeste alors par l''entremise du prophète Nathan. Informé, ce proche de David en réfère à '
  - type: text
    content: Bethsabée
  - type: text
    content: ', qui a peut-être le statut de « grande dame » ou de reine-mère, pour déjouer la manœuvre. Rien ne doit se faire sans elle ; et elle seule a le pouvoir d''interpeller le roi.'
  - type: text
    content: 'Avec une promptitude sans égale, le vieux roi '
  - type: text
    content: David
  - type: text
    content: ' prend alors une série de dispositions habiles et spectaculaires où l''on reconnaît encore une fois sa manière. A une source sacrée (Eïn-Roguel) on en opposera une autre (Guihôn) ; à un prêtre (Abiathar) on en opposera un autre (Tsadoq) ; et pour faire bonne mesure Salomon sera juché sur la mule royale de David, tandis que les sonneries prescrites (v. 32-34) se chargeront d''avertir les conjurés de leur disgrâce. La foule en liesse en fera un énorme tintamarre (v. 39s).'
  - type: text
    content: 'Bientôt l''on assiste, après le sacre rondement mené, à l''installation de Salomon sur le trône de David. Ainsi entre-t-on en '
  - type: text
    content: corégence.
  - type: text
    content: ' Jusqu''à sa mort, David aura régné, le temps de la corégence n''étant pas tant celui de la passation des pouvoirs que celui de la transmission de la promesse (1R 2.3s).'
  - type: text
    content: 'Ainsi, une nouvelle fois, un '
  - type: text
    content: cadet
  - type: text
    content: ' aura eu préséance sur l''aîné. Car Salomon, onzième fils de David, est celui que Dieu a choisi, tout comme il avait choisi Isaac, Jacob, Joseph, Pérets et David lui-même contre la coutume ou le choix des hommes (Gn 17.15-21 ; 25.23 ; 27 ; 37 ; 38.27-30 ; 1S 16.6-12 ; Mt 1.3).'
  - type: text
    content: La sagesse de Salomon
  - type: text
    content: 'Un holocauste démesuré — mille taureaux — inaugure, sur le haut lieu de Gabaon, le règne de Salomon. Tout, à partir de cette heure, prend des proportions surprenantes ; c''est comme si, enfin, allait s''établir sur la terre d''Israël et de Juda la réalisation plénière du '
  - type: text
    content: royaume idéal
  - type: text
    content: .
  - type: text
    content: 'Le motif théologique de ces chapitres tient en un seul mot : la '
  - type: text
    content: sagesse.
  - type: text
    content: ' Parce qu''il '
  - type: text
    content: aimait le Seigneur
  - type: text
    content: ' (1R 3.3), Salomon reçoit, lorsque Dieu se manifeste à lui pour la première fois (3.5), la promesse d''une réussite inimaginable. En des pages où le rédacteur ne retient pas sa joie sont décrites les réalisations prestigieuses que le génie de l''organisation et de la diplomatie permet à ce jeune prince d''accomplir.'
  - type: text
    content: 'Sa sagesse proverbiale est d''abord mise en évidence avec l''épisode célèbre du '
  - type: text
    content: jugement
  - type: text
    content: ' rendu dans l''affaire des deux prostituées (3.16). C''est ensuite l''organisation de son gouvernement, dont la moitié appartient à la caste sacerdotale (4.1-6), puis celle des préfectures et des corvées, qui sont relatées avec une évidente approbation (4.20).'
  - type: text
    content: L'alliance de Salomon avec le pharaon d'Egypte, dont il épouse une fille (3.1 ; 9.16,24), la constitution d'une arme de cavalerie (5.6 ; 9.15,19 ; 10.26-29) et d'une flotte marchande (9.26), l'extension fantastique du royaume depuis la Méditerranée jusqu'au-delà de l'Euphrate et depuis les sources du Jourdain jusqu'à la mer Rouge, cependant qu'
  - type: text
    content: il était en paix avec tous les pays environnants
  - type: text
    content: ' (5.4s), sont autant d''arguments ajoutés à la thèse de la sagesse de Dieu qui apporte la '
  - type: text
    content: prospérité
  - type: text
    content: .
  - type: text
    content: 'Salomon détient les clefs de toute la science. Jérusalem devient une véritable '
  - type: text
    content: université
  - type: text
    content: ' où tous affluent pour écouter les leçons du maître. Jusqu''à la reine de Saba, qui '
  - type: text
    content: en eut le souffle coupé
  - type: text
    content: ' (10.5) ; sa venue vaut au lecteur de prendre part avec elle à la visite des palais (chap. 10).'
  - type: text
    content: Le bâtisseur du temple
  - type: text
    content: 'Mais la grande œuvre de Salomon, celle qui reste à tout jamais attachée à son nom, c''est la construction du premier '
  - type: text
    content: temple
  - type: text
    content: '* de Jérusalem, appelé à devenir le centre symbolique de la religion d''Israël. La construction du temple marque d''ailleurs aussi, pour la mystique biblique, le centre du temps : douze générations se sont succédé depuis la sortie d''Egypte (soit 480 ans) ; douze encore et c''est (à peu près) le retour de l''Exil. Mais surtout le temple est le lieu auquel YHWH, le '
  - type: text
    content: Seigneur,
  - type: text
    content: ' a attaché son nom.'
  - type: text
    content: Deux oracles (1R 6.11-13), le second au cours d'une nouvelle
  - type: text
    content: manifestation divine
  - type: text
    content: ' (9.2-9), recommandent à Salomon de s''attacher à la loi*, condition d''une prospérité durable. Si au contraire il abandonne l''unique Seigneur, ce sera le malheur pour la nation entière.'
  - type: text
    content: 'C''est ici un tournant du livre, où le triomphalisme cède la place à la condamnation. Car Salomon, le roi sage par excellence, va être aussi décrit, à l''instar de la plupart de ses successeurs, comme un '
  - type: text
    content: idolâtre
  - type: text
    content: ' (1R 11). Jusqu''à la fin les livres des Rois méditeront les conséquences désastreuses de cette ambivalence et exhorteront à en tirer les leçons. Car la prophétie porte loin : non seulement les tribus d''Israël qui avaient fait acte d''allégeance personnelle à David (2S 5.1-2) seront, en cas de désobéissance, retranchées du royaume, mais même le temple ne bénéficiera plus du soutien de Dieu (1R 9.8). Jérusalem tombera un jour, malgré le temple.'
  - type: text
    content: La déchirure
  - type: text
    content: 'Diverses difficultés se sont amoncelées sur la fin du règne de Salomon. Edom, Damas et Ephraïm sèment la guerre ou la révolte. En pareil cas l''homme antique a coutume de se tourner vers les divinités tutélaires pour réclamer un secours. Le chapitre 11 attribue aux nombreuses '
  - type: text
    content: femmes étrangères
  - type: text
    content: ' du harem de Salomon la responsabilité de la multiplication, à Jérusalem même et en particulier sur le mont des Oliviers, de cultes concurrents de celui de YHWH (cf. 16.31 ; Esd 9–10 ; Né 13.23ss).'
  - type: text
    content: 'Comme en 1S 15.27s, la déchirure symbolique du manteau du prophète (1R 11.30s) sert de préface théologique aux lendemains politiques de l''assemblée de Sichem (chap. 12). Il est frappant de constater comment les promesses faites à David, puis à Salomon, servent ici de références pour conférer une note de '
  - type: text
    content: légitimité
  - type: text
    content: ' à l''anti-royaume des dix tribus. Ainsi comprend-on que l''histoire du royaume du Nord, le futur royaume de Samarie, figure aussi dans la Bible. La grande leçon prophétique sur la conduite des rois et l''action de Dieu trouve également sa matière dans ces événements-là.'
  - type: text
    content: Elévation et disparition de Jéroboam
  - type: text
    content: 'Il n''y a presque rien à dire de '
  - type: text
    content: Roboam
  - type: text
    content: ', le fils de Salomon : le destin de sa royauté était scellé (11.11). Il prend rang dans ce récit parmi les fils qui auront été châtiés pour la faute de leur père (11.12), non sans porter sa propre part de responsabilité (12.6-11).'
  - type: text
    content: Jéroboam
  - type: text
    content: ' est d''une autre trempe. Architecte et meneur d''hommes, il est appelé à la tête du parti réformateur qui fera sécession à Sichem. Du point de vue du livre des Rois et de son souci du culte centralisé à Jérusalem, Jéroboam est un ennemi machiavélique, qui a osé subordonner la religion à ses fins politiques : il a recruté qui il voulait pour exercer les fonctions sacerdotales (13.33) et il a implanté un culte du '
  - type: text
    content: taurillon
  - type: text
    content: ' ou « veau d''or » à Dan et à Beth-El, allant jusqu''à décaler la date d''un pèlerinage (12.32-33), de manière à consommer la rupture : c''est là le « péché de Jéroboam » qui sera régulièrement stigmatisé par le récit relatif au royaume du Nord. Les chapitres 13 et 14 servent à annoncer le malheur sur l''autel de Beth-El, puis sur le jeune fils de Jéroboam, qui paiera de sa vie d''innocent (14.13) les erreurs de son père.'
  - type: text
    content: Les notices royales (1R 14.21 etc.)
  - type: text
    content: 'Après l''histoire de Salomon, la trame du livre est constituée par l''énumération des noms des dix-neuf rois de Juda, alternant avec ceux des dix-neuf rois d''Israël. S''y ajoutent ici et là des développements parfois considérables au gré des intentions pédagogiques, donc de la '
  - type: text
    content: théologie
  - type: text
    content: ' que les écrivains bibliques avaient à communiquer. Une dizaine de figures prophétiques apparaissent dans le récit et s''intercalent aux moments opportuns. La geste d''Elie, celle d''Elisée (bien différentes quoiqu''il s''agisse du maître puis du disciple), enfin un épisode de l''activité d''Esaïe, sous le règne d''Ezéchias, constituent autant de joyaux dont l''éclat éclipse souvent le restant du livre.'
  - type: text
    content: 'Les notices de base pourraient provenir d''une collection de fiches au modèle '
  - type: text
    content: stéréotypé
  - type: text
    content: '. On y trouve : le nom du roi ; son âge au moment de son accession au pouvoir (plusieurs cas de corégence sont patents, d''autres probables ; voir « Le temps des rois », p.${Xtpsrois}) ; le nom de son père ; celui de sa mère (systématiquement pour les rois de Juda, ce qui n''a rien d''un hasard) ; la mention de telles constructions ou réalisations particulières sous le règne du monarque considéré ; enfin la durée de son règne et, souvent, le lieu de sa sépulture.'
  - type: text
    content: 'Dans plus d''une trentaine de cas, le lecteur est renvoyé, pour de plus amples renseignements, aux '
  - type: text
    content: chroniques des rois de Juda
  - type: text
    content: ' ou aux '
  - type: text
    content: chroniques des rois d'Israël.
  - type: text
    content: ' Pour Salomon, on se référait à un '
  - type: text
    content: livre de l'histoire de Salomon.
  - type: text
    content: ' Ces '
  - type: text
    content: documents
  - type: text
    content: ', qui ne nous sont pas parvenus, n''ont en tout cas rien à voir avec les Chroniques qui concluent la Bible hébraïque (voir l''introduction aux Chroniques, p.${Xintch}).'
  - type: text
    content: La cote d'amour
  - type: text
    content: 'L''intention principale du livre réside dans le '
  - type: text
    content: jugement
  - type: text
    content: ' porté sur la vie de chacun de ces rois. Tandis que le simple chroniqueur se contentait de formules toutes faites ('
  - type: text
    content: le reste de l'histoire de… ce qu'il a fait… sa vaillance…
  - type: text
    content: '), la Bible dit le jugement de Dieu sur ces rois sacrés, au moins en ce qui concerne Juda, par le rite de l''onction* divine. Elle les classe en trois catégories : ils sont '
  - type: text
    content: mauvais
  - type: text
    content: ' dans la grande majorité des cas ('
  - type: text
    content: il faisait ce qui déplaisait au Seigneur
  - type: text
    content: ') ; ils sont '
  - type: text
    content: bons
  - type: text
    content: ' dans six cas seulement : à côté de Salomon qui bénéficie d''une considération spéciale, Asa, qui '
  - type: text
    content: fit ce qui convenait au Seigneur
  - type: text
    content: ' et dont le cœur fut '
  - type: text
    content: tout entier avec le Seigneur pendant tous ses jours
  - type: text
    content: ' (1R 15.11,14), puis Josaphat (1R 22.43), Joas (2R 12.3), Amatsia (2R 14.3), Ozias (2R 15.3) et Jotam (2R 15.34).'
  - type: text
    content: 'Trois monarques enfin constituent la '
  - type: text
    content: référence idéale.
  - type: text
    content: ' Le premier d''entre eux reste David, en dépit de l''affaire d''Urie (1R 15.5), les deux autres étant les célèbres réformateurs que furent Ezéchias (2R 18.3-7) et surtout Josias (2R 22.2 ; 23.25). A l''opposé, on peut noter qu''aucun roi du royaume d''Israël n''est jugé bon. Même le réformateur Jéhu, pourtant présenté d''une façon assez positive dans le récit, n''a pas cet honneur.'
  - type: text
    content: 'Une seule préoccupation préside à cette classification : le '
  - type: text
    content: culte exclusif de YHWH
  - type: text
    content: ', Dieu d''Israël. Avec une constance sans faille, l''ouvrage explique le succès ou l''échec des règnes à partir de leur degré de compromission avec l''idolâtrie, désignée sous le terme générique de '
  - type: text
    content: péchés de Jéroboam, fils de Nebath
  - type: text
    content: ' (16.31).'
  - type: text
    content: 'Nul doute, dans ces conditions, que la grande réforme du culte menée à bien par le roi '
  - type: text
    content: Josias,
  - type: text
    content: ' dans l''esprit du Deutéronome retrouvé, puisse être considérée comme une clef pour la compréhension du message théologique du livre (2R 23.2 ; voir plus loin le paragraphe sur Josias).'
  - type: text
    content: La chronique des deux royaumes
  - type: text
    content: 'La sécession des tribus du Nord n''a pas effacé le sentiment d''appartenir, de part et d''autre de la frontière de Benjamin, à un '
  - type: text
    content: même peuple
  - type: text
    content: . A preuve le règlement cultuel imposé par Jéroboam, qui doit réactiver le vieux sanctuaire de Beth-El pour dissuader (peut-être en partie pour des raisons fiscales) ses sujets de se rendre en pèlerinage à Jérusalem (voir aussi 1R 15.17
  - type: text
    content: n
  - type: text
    content: '). A preuve aussi le curieux système de datation synchronique de la durée des règnes. Les rois de Juda sont en effet datés par référence aux années de règne de ceux d''Israël et '
  - type: text
    content: vice versa
  - type: text
    content: .
  - type: text
    content: Le désordre comme principe politique
  - type: text
    content: 'N''eût été l''usurpation du trône de Juda par la reine-mère Athalie, une seule et même dynastie, celle de David, aurait tenu les rênes du pouvoir à Jérusalem. On ne peut pas en dire autant du royaume des dix tribus, puisque '
  - type: text
    content: neuf dynasties
  - type: text
    content: ' s''y succèdent, dont deux seulement perdurent au-delà de la deuxième génération : celles d''Omri et de Jéhu. Cet étonnant contraste donne à réfléchir sur la nature même de l''idéal monarchique en Israël. L''écrivain biblique, qui est judéen, laisse transparaître ici et là le sentiment que les tribus du Nord agissent avec un certain '
  - type: text
    content: a priori
  - type: text
    content: ' de non-conformisme. Leur premier prince, Jéroboam, n''est-il pas déjà un parvenu qui s''est imposé, enhardi par la prophétie d''Ahiya de Silo et à la suite d''une sorte de plébiscite venu la ratifier ?'
  - type: text
    content: 'Pendant les deux siècles qui vont suivre, on assiste souvent au '
  - type: text
    content: même scénario
  - type: text
    content: '  : le vieux roi vient à mourir ; son fils accède au trône ; il est assassiné avec toute sa famille (voir déjà Jg 9.5) ; l''assassin monte sur le trône ; les militaires qui ont favorisé le '
  - type: text
    content: pronunciamiento
  - type: text
    content: ' deviennent les appuis politiques du nouveau règne.'
  - type: text
    content: Les Omrides ou la gloire de Samarie
  - type: text
    content: 'Tandis que le général Omri fait le siège d''une ville de la plaine philistine de Guibbetôn, son collègue '
  - type: text
    content: Zimri,
  - type: text
    content: ' commandant d''un régiment de chars, règle son compte au roi ivrogne d''Israël et liquide par la même occasion tous les membres de la famille royale qui auraient pu prétendre au trône. Il se proclame roi à son tour, mais il échoue et meurt au bout de sept jours dans l''incendie de son propre palais. Omri, qui pensait supplanter Zimri, se heurte à la volonté populaire qui lui préfère '
  - type: text
    content: Tibni.
  - type: text
    content: ' Enfin, au bout de quatre années de guerre civile, '
  - type: text
    content: Omri
  - type: text
    content: ' s''empare du pouvoir.'
  - type: text
    content: Or Omri est un génie politique.
  - type: text
    content: 'A l''instar de David déplaçant sa capitale pour n''être l''homme lige de personne, Omri prend l''initiative d''acheter une colline pour y construire de toutes pièces une capitale dont la destinée sera fabuleuse. L''ancien chef-lieu du royaume du Nord, Tirtsa, l''actuel Tell el-Farah à l''extrémité de la vallée transversale du même nom, est naturellement relié au Jourdain et aux plaines de Moab. '
  - type: text
    content: Samarie
  - type: text
    content: ' ou '
  - type: text
    content: Samerina,
  - type: text
    content: ' comme l''appelèrent les Assyriens, était naturellement ouverte au vent du large. Car Omri regarde aussi vers la Phénicie et il est quelque peu envoûté par l''avance technologique des peuples de la côte sidonienne. Le palais qu''il construisit, dont les ruines imposantes forcent encore aujourd''hui l''admiration, témoigne de cette influence.'
  - type: text
    content: 'Du même coup il suscite en Israël une résurgence du culte de '
  - type: text
    content: Baal*,
  - type: text
    content: ' une divinité climatique dont le culte, rival de celui de YHWH (cf. 1R 18), sera imposé par Jézabel, fille d''Eth-Baal ou Ithobaal, roi de Sidon, qui deviendra l''épouse d''Achab, fils d''Omri.'
  - type: text
    content: 'Pendant plus de quarante ans, Omri et ses descendants régneront sur Israël. Longtemps les documents assyro-babyloniens dénommeront Israël '
  - type: text
    content: Bit Houmri,
  - type: text
    content: ' maison d''Omri, accordant à ce prince une importance que l''historien biblique ne semble pas lui reconnaître.'
  - type: text
    content: Elie ou la puissance de Dieu
  - type: text
    content: Avec l'avènement d'
  - type: text
    content: Achab,
  - type: text
    content: ' fils d''Omri, une lutte ouverte s''instaure entre la foi prônée par les prophètes de YHWH et le culte de Baal, qui se développe à Samarie sous l''influence de la Phénicienne '
  - type: text
    content: Jézabel,
  - type: text
    content: ' appuyée sur son clergé de huit cent cinquante sectateurs du Baal-au-Foudre et de sa parèdre Ashéra (1R 18.19). Le cycle d''Elie s''ouvre sur l''entrée en scène d''un héros jailli de nulle part et dont la disparition prodigieuse, une fois son œuvre accomplie, fera de lui la figure mystérieuse du prophète qui doit (re)venir (Ml 3.23+).'
  - type: text
    content: 'Face à la croyance naturiste en Baal, dieu de l''orage, détenteur à la fois de l''éclair terrifiant (le '
  - type: text
    content: feu du ciel
  - type: text
    content: ) et de la pluie nécessaire aux cultures, la geste d'
  - type: text
    content: Elie
  - type: text
    content: ' révèle YHWH, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', sous des traits à la fois redoutables et bienveillants. Que ce soit au Kerith, à Sarepta ou au Carmel, il s''agit de savoir une fois pour toutes qui est vraiment Dieu, quitte à ridiculiser le rival, et du même coup le pouvoir royal qui s''en réclame (chap. 18).'
  - type: text
    content: 'L''outrance du style épique apparaît à nouveau dans ces pages. Mais le ton change lorsque Dieu se manifeste à '
  - type: text
    content: l'Horeb
  - type: text
    content: ' (le Sinaï ?). Après avoir fait défiler devant Elie les spasmes violents d''une création déchaînée, Dieu se révèle à lui dans '
  - type: text
    content: un calme, une voix ténue
  - type: text
    content: ' (1R 19.12). La réponse à la quête d''Elie se trouve dans une douceur qui ouvre la voie à une nouvelle conception de la relation avec le divin et à une nouvelle vision de l''agir même de Dieu (Mt 11.29 ; cf. 5.5).'
  - type: text
    content: Le personnage d'Elisée
  - type: text
    content: La place considérable occupée par la geste d'
  - type: text
    content: Elisée
  - type: text
    content: ' (pas moins de treize chapitres) devrait suffire à mettre en garde contre la tendance, si habituelle, qui consiste à la considérer comme une sorte de répétition de celle d''Elie, le génie en moins. Certes, la parenté entre les deux cycles est indéniable ; elle est même revendiquée explicitement par les récits du transfert des pouvoirs (1R 19.16,19 et 2R 2) avec, en particulier, la symbolique du mystérieux '
  - type: text
    content: manteau
  - type: text
    content: ' du prophète qui sera peut-être reprise en compte par Jean le Baptiseur (Mc 1.6-8/ /) et même par l''islam.'
  - type: text
    content: 'En si bon chemin, on ne manquera pas de noter les correspondances qui existent entre nombre de situations rapportées par le cycle d''Elisée et les récits évangéliques sur '
  - type: text
    content: Jésus
  - type: text
    content: . Méritent particulièrement d'être rapprochés l'appel d'Elisée et celui des disciples (1R 19.20 ; Lc 9.57-62/ /), les résurrections d'enfants (1R 17.17-24 ; 2R 4.18-37 ; Mc 5.21-43/ / ; Lc 7.12-16) ou les multiplications des pains (2R 4.42-44 ; Mc 6.32-44/ / ; 8.1-10/ / ; voir « Elie et Elisée », p.${Xeliesee}).
  - type: text
    content: 'La comparaison des hauts faits accomplis par Elie et par Elisée montre, à n''en pas douter, certaines '
  - type: text
    content: ressemblances
  - type: text
    content: . Mais en aucun cas il ne s'agit d'un simple décalque, comme s'il y avait eu un désir ou une nécessité pour la Bible d'ériger le personnage d'Elisée à une hauteur comparable à celle d'Elie. En fait, sur la double série de sept miracles accomplis par Elisée, peu trouvent une correspondance thématique évidente dans la geste d'Elie.
  - type: text
    content: 'Elisée est lié à plusieurs communautés ou écoles de '
  - type: text
    content: prophètes
  - type: text
    content: ' auprès desquelles il apparaît nettement comme un maître. Au Carmel, à Beth-El, au Guilgal, à Jéricho, il est en contact avec des groupes de cette sorte. Ses disciples se tiennent assis devant lui pour recevoir son enseignement (2R 4.38 ; 6.1,32).'
  - type: text
    content: 'Personnage de '
  - type: text
    content: transition
  - type: text
    content: ' entre le charismatisme désordonné des confréries populaires d''inspirés, qu''on pouvait aisément qualifier de « fous » (2R 9.11), et la haute tradition des prophètes écrivains, tels Amos ou Esaïe, Elisée aura été cet oracle de profession qui demande de la musique pour se livrer à son art (2R 3.15), ce voyant qui demande à un roi d''accomplir un geste étrange avec des flèches pour fixer le destin (2R 13.14-19). Mais en même temps, il est une figure importante de la politique internationale, à l''aise avec les grands, redouté d''eux. Pour son temps et à sa manière, il aura porté la parole de Dieu dans cette histoire du monde qui n''est jamais véritablement considérée comme profane. Comme une trêve au milieu des conflits entre les peuples, le récit de Naaman, ce général araméen conduit à confesser la foi au Dieu d''Israël, est à coup sûr un sommet de la narration biblique (2R 5).'
  - type: text
    content: Les dernières années de Samarie (841-722/1)
  - type: text
    content: 'L''avènement de '
  - type: text
    content: Jéhu,
  - type: text
    content: ' adorateur de YHWH et liquidateur du parti baaliste dans le royaume du Nord, ne sauvera pas le pays du désastre. Le chapitre 17 de 2 Rois dresse un véritable '
  - type: text
    content: bilan théologique
  - type: text
    content: ' de l''histoire qui explique l''échec de toutes les entreprises de redressement par une cause unique : l''abandon du culte exclusif de YHWH par le peuple et par ses chefs.'
  - type: text
    content: 'La touchante histoire des quatre lépreux et de la délivrance miraculeuse de Samarie (2R 6.24–7.20) fait maintenant place, après bien des péripéties, à la '
  - type: text
    content: prise de Samarie (722/1)
  - type: text
    content: ' par Salmanasar et à l''exil en Assyrie de populations dont l''histoire perdra la trace. Tout au plus peut-on, pour essayer de comprendre cette époque, méditer sur la portée symbolique du récit de 17.24-33, où les lions du désert prennent le relais de la prophétie défaillante.'
  - type: text
    content: 'La notice sur les '
  - type: text
    content: Samaritains
  - type: text
    content: ' « nouvelle manière », qui évoque d''un point de vue très particulier les événements du VIII'
  - type: text
    content: e
  - type: text
    content: ' siècle av. J.-C., ne saurait expliquer à elle seule la situation au temps de Jésus (Jn 4 etc.) ; bien d''autres faits significatifs sont intervenus dans cette province, en particulier dans la période du IV'
  - type: text
    content: e
  - type: text
    content: ' au II'
  - type: text
    content: e
  - type: text
    content: ' siècle avant J.-C. (voir Samaritains*).'
  - type: text
    content: Le temps des réformes
  - type: text
    content: 'Protecteurs désignés du temple, les rois de Jérusalem ont eu l''occasion, à diverses reprises, de manifester leur piété en conduisant une politique de '
  - type: text
    content: restauration
  - type: text
    content: ' de l''édifice.'
  - type: text
    content: 'Le premier à entreprendre des réparations fut le jeune roi '
  - type: text
    content: Joas
  - type: text
    content: ' de Juda, rescapé grâce à la protection du grand prêtre Joïada du massacre ourdi par Athalie (2R 11). Près d''un siècle après sa construction par Salomon, le temple devait être en piteux état : on ne l''avait jamais entretenu. Joas met alors en place, vers 820, un système de financement et de conduite des chantiers, qui restera un modèle du genre (2R 12).'
  - type: text
    content: 'Il ne parvient cependant pas à réaliser une véritable réforme du culte. C''est '
  - type: text
    content: Ezéchias,
  - type: text
    content: ' fils d''Achaz et contemporain d''Esaïe le prophète, qui s''illustrera par une première tentative de purification du culte de YHWH (2R 18.3-8). Les chapitres 18 à 20 du second livre des Rois (règne d''Ezéchias) étant repris en Esaïe (chap. 36–39), on se reportera dans l''introduction à ce livre à la rubrique intitulée '
  - type: text
    content: Le temps d'Esaïe,
  - type: text
    content: ' qui en traite spécialement (p.${Xtpses}).'
  - type: text
    content: 'Hélas ! '
  - type: text
    content: Manassé
  - type: text
    content: ', tyran orgueilleux et sanguinaire, rétablit les cultes concurrents dans toute leur ampleur en dépit des avertissements de prophètes anonymes (2R 21.1-17). A l''instar de Jéroboam pour le royaume du Nord, Manassé apparaîtra, pour le royaume de Juda, comme l''emblème de l''apostasie et la cause du malheur national.'
  - type: text
    content: Quand Josias découvre le Deutéronome
  - type: text
    content: 'Le véritable réformateur fut le roi '
  - type: text
    content: Josias.
  - type: text
    content: ' Le chapitre 22 du second livre des Rois rapporte en détail comment '
  - type: text
    content: le livre de la loi
  - type: text
    content: ' fut découvert dans le temple à l''occasion de travaux qu''il avait ordonnés (v. 8ss).'
  - type: text
    content: 'On a souvent rapproché ce rouleau du livre du '
  - type: text
    content: Deutéronome
  - type: text
    content: ' (cf. Dt 28.61+), ou du moins de sa partie centrale. On en reconnaît bien les accents dans l''engagement à suivre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et à observer ses commandements '
  - type: text
    content: de tout son cœur et de toute son âme
  - type: text
    content: ' (comparer 2R 23.3 avec Dt 13.4 etc.), ainsi que dans l''ensemble des mesures visant à établir la '
  - type: text
    content: centralisation du culte
  - type: text
    content: ' (Dt 12) et à extirper le paganisme idolâtre (cf. Dt 12.29–13.19 ; 16.21–17.7 ; 18.9-14 ; 2R 23.24-25), et tout spécialement dans l''obligation de venir célébrer la'
  - type: text
    content: Pâque
  - type: text
    content: ' chaque année au temple de Jérusalem (Dt 16.5 ; 2R 23.21-23).'
  - type: text
    content: 'Par contraste, le catalogue des erreurs des rois de Juda, tel qu''il figure au chapitre 23, est assez effarant. On aurait peine à comprendre comment tant d''abominations avaient pu trouver place dans le temple de YHWH et ses alentours si l''on ne se souvenait des '
  - type: text
    content: pressions idéologiques
  - type: text
    content: ' que ces princes eurent à subir de leurs puissants suzerains étrangers.'
  - type: text
    content: 'Suivant le livre des Chroniques, l''action réformatrice de Josias aurait en effet débuté à la douzième année de son règne, ce qui coïncide à peu près avec la mort d''Assourbanipal (≈ 630). Josias aurait ainsi bénéficié d''une période de relative '
  - type: text
    content: faiblesse de l'Assyrie
  - type: text
    content: . Selon le seul livre des Rois, Josias a étendu son action purificatrice depuis Guéba de Benjamin jusqu'à Bersabée, ainsi qu'à Beth-El et dans les villes de Samarie ; d'après les Chroniques, cette action s'est étendue jusqu'aux frontières mêmes de la Phénicie, en Nephtali (2R 23.8-20 ; 2Ch 34.3-7).
  - type: text
    content: 'Ainsi Josias apparaît-il, deux siècles avant Esdras, comme un véritable '
  - type: text
    content: réformateur biblique
  - type: text
    content: ', s''appuyant sur le texte de l''Ecriture pour accomplir le dessein de Dieu.'
  - type: text
    content: Le premier siège de Jérusalem (597)
  - type: text
    content: 'Ce zèle réformateur n''empêchera pas les événements de se précipiter. Partisan, comme Jérémie, de la soumission à '
  - type: text
    content: Nabuchodonosor
  - type: text
    content: ' de Babylone, Josias avait voulu empêcher le pharaon Néko de rejoindre les forces assyriennes d''Assour-Ouballit à Karkemish, sur l''Euphrate. En vain, puisqu''il fut mortellement blessé à Meguiddo en 609 (2R 23.29-30).'
  - type: text
    content: 'Plébiscité par le peuple, '
  - type: text
    content: Joachaz,
  - type: text
    content: ' fils de Josias, est aussitôt récusé par le pharaon Néko, de retour de Harrân, qui l''envoie en exil. A sa place Néko installe sur le trône un autre fils de Josias, '
  - type: text
    content: Eliaqim,
  - type: text
    content: ' dont il change le nom, selon la coutume et pour le principe, en '
  - type: text
    content: Joïaqim.
  - type: text
    content: ' Celui-ci était l''aîné du précédent ; mais le peuple ne l''aimait pas. Une page de Jérémie le dépeint comme un profiteur sans scrupules qui mérite '
  - type: text
    content: la sépulture d'un âne
  - type: text
    content: ' (Jr 22.11-19).'
  - type: text
    content: Joïakîn,
  - type: text
    content: ' fils de Joïaqim, devient roi. Le 16 mars 597, Nabuchodonosor, roi de Babylone et vainqueur de l''Assyrie, prend Jérusalem. Affolé, Joïakîn essaie de composer (2R 24.12-14). Inflexible, le conquérant emmène l''élite de la population en exil à Babylone. Joïakîn subit le même sort. A sa place, Nabuchodonosor installe l''oncle de Joïakîn, un certain Mattania dont il change à son tour le nom en '
  - type: text
    content: Sédécias.
  - type: text
    content: La chute de Jérusalem et la fin de la monarchie israélite (587/6)
  - type: text
    content: 'Sédécias se '
  - type: text
    content: révolte
  - type: text
    content: ' cependant contre son suzerain (2R 24.20). Cette fois-ci le Babylonien se déplace '
  - type: text
    content: avec toute son armée.
  - type: text
    content: ' Le siège est mis devant la ville, qui résistera tout de même deux ans. Mais la famine sévit. Une nuit, on perce une poterne et le roi Sédécias parvient à s''enfuir avec ses gens. Mais il est bien vite repris et conduit jusqu''à Ribla, au nord du pays de Damas. Là se déroule une scène atroce, destinée à mettre le point final à la royauté de Juda : tous les fils de Sédécias sont égorgés devant leur père, après quoi on lui crève les yeux et on le jette en prison à Babylone (2R 25.7). Jérusalem est démantelée, le temple en ruine, la population exilée.'
  - type: text
    content: 'Tout est achevé. Le récit lui-même se termine d''une façon abrupte, qui pourrait donner à penser qu''il a été rédigé peu de temps après les événements : le retour en grâce de Joïakîn apparaît comme la seule lueur d''espoir disponible (2R 25.27ss). En tout état de cause, l''exil clôt bel et bien la première grande histoire d''Israël, celle qui a débuté avec l''installation en Terre promise (Josué). Le moment est venu d''entrer dans une grande méditation théologique sur le destin des peuples et la volonté de Dieu. L''exil fera naître une nouvelle piété et une nouvelle espérance, avec ce qu''on commencera à appeler le '
  - type: text
    content: 'judaïsme :'
  - type: text
    content: ' la foi réformée des Judéens, pensée à Babylone et vécue dans l''ère nouvelle du retour et de la restauration.'
