document_id: ZEC.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur seul donne la prospérité et la liberté
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 28.12 ; 1R 18.41-45 ; Jr 5.24 ; Os 6.3 ; Jl 2.23. –  Il leur donnera  : certains modifient le texte hébreu traditionnel pour lire il vous donnera… ou encore il donnera du pain à l''homme, de l''herbe dans la campagne.'
  - type: text
    content: 'Demandez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' qu''il pleuve'
  - type: text
    content: au temps de la pluie printanière !
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui produit les orages.'
  - type: text
    content: Il leur donnera une averse de pluie,
  - type: text
    content: il donnera à chacun de l'herbe dans la campagne.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Es 11.11 ; 27.13. –  je les rassemblerai Os 2.2. –  Galaad à l''est du Jourdain, le Liban au nord du pays d''Israël, indications d''un territoire élargi ; cf. Mi 7.14. –  l''espace ne leur suffira pas  : litt. il ne sera pas trouvé pour eux , même expression en Jos 17.16.'
  - type: text
    content: Je les ramènerai d'Egypte
  - type: text
    content: et je les rassemblerai de l'Assyrie ;
  - type: text
    content: je les ferai venir au Galaad et au Liban,
  - type: text
    content: et l'espace ne leur suffira pas.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Il (c.-à-d. Dieu ) passera  : LXX ils passeront . –  la mer de détresse ou la mer étroite , hébreu yam tsara , expression qui rappelle la formule beaucoup plus fréquente traduite par jour de détresse ( yom tsara , p. ex. So 1.15) et le nom de l''Egypte (hébreu mitsrayim ) ; cf. Ex 14–15 ; Es 11.15s ; 51.10 ; Ps 106.9. –  l''orgueil (cf. 9.6 ; 11.3n) de l''Assyrie Es 10.12. –  le sceptre ou le bâton  ; cf. Es 9.3n.'
  - type: text
    content: Il passera la mer de détresse,
  - type: text
    content: il frappera les flots de la mer,
  - type: text
    content: et toutes les profondeurs du Nil seront desséchées ;
  - type: text
    content: l'orgueil de l'Assyrie sera abattu,
  - type: text
    content: et le sceptre de l'Egypte sera écarté.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mi 4.5.
  - type: text
    content: 'J''en ferai des héros par le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et ils marcheront en son nom
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: teraphim ou idoles domestiques Gn 31.19 ; Jg 18.14-20 ; 1S 19.13-16 ; Ez 21.26. –  malfaisantes , ou peut-être qui ne valent rien , hébreu ’awèn (= Aven, cf. Os 4.15n  ; 6.8n  ; Am 5.5n) ; cf. Es 44.20 ; 46.7 ; 58.9 ; Jr 10.5 ; Ps 115.5-7. –  visions mensongères Ez 13.6+. –  ils (le peuple, et non les teraphim etc.) errent… Ez 34.5n  ; Mt 9.36/ /.
  - type: text
    content: Car les paroles des teraphim sont malfaisantes,
  - type: text
    content: les devins ont des visions mensongères,
  - type: text
    content: les rêves disent l'illusion
  - type: text
    content: et leur consolation est futile.
  - type: text
    content: C'est pourquoi ils errent comme du petit bétail ;
  - type: text
    content: ils sont affligés, parce qu'il n'y a pas de berger.
  - type: heading
    content: Un nouvel exode
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'contre les bergers Ez 34.10+. –  je ferai rendre des comptes / est intervenu en faveur de  : cf. Jr 6.15n. –  aux boucs en tant que conducteurs du troupeau. –  le Seigneur … est intervenu… So 2.7. –  son cheval d''honneur  : cf. 6.13n  ; autres traductions son cheval fier ; son cheval dont il est fier  ; cf. Jb 39.20.'
  - type: text
    content: Je suis en colère contre les bergers,
  - type: text
    content: je ferai rendre des comptes aux boucs ;
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées est intervenu'
  - type: text
    content: en faveur de son troupeau, la maison de Juda,
  - type: text
    content: il en a fait son cheval d'honneur à la guerre ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'de lui  : il faut vraisemblablement comprendre de Juda  ; cf. v. 3 ; Dt 17.15. –  sortira 2.7+. –  la pierre angulaire  : litt. l''angle , même terme en 14.10 ; cf. 4.7n  ; le terme hébreu qui apparaît ici désigne souvent les chefs du peuple (Jg 20.2n  ; 1S 14.38 ; Es 19.13) ; cf. Es 28.16 ; Ps 118.22. –  piquet (de tente), métaphore analogue ; cf. Es 22.23n  ; 33.20 ; Esd 9.8n. –  chefs  : le terme hébreu a été traduit par oppresseur en 9.8 ; cf. Ex 3.7n  ; Es 60.17.'
  - type: text
    content: de lui sortira la pierre angulaire,
  - type: text
    content: de lui le piquet,
  - type: text
    content: de lui l'arc de guerre ;
  - type: text
    content: de lui sortiront les chefs, tous ensemble.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'héros  : autre traduction guerriers  ; même possibilité aux v. 7,12 ; cf. 9.13. –  le Seigneur sera avec eux 8.23 ; Es 7.14n. –  ceux qui sont montés sur des chevaux  : autre traduction les conducteurs de chars (12.4) ; cf. 9.10+ ; Es 31.1-3.'
  - type: text
    content: Ils seront comme des héros à la guerre,
  - type: text
    content: foulant la boue des rues ;
  - type: text
    content: ils combattront,
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera avec eux ;'
  - type: text
    content: et ceux qui sont montés sur des chevaux
  - type: text
    content: seront couverts de honte.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Joseph ou Ephraïm ; cf. v. 7 ; 9.10n. –  je les rétablirai  : forme verbale rare, qui rappelle les verbes hébreux pour revenir et s''installer  ; cf. Es 14.1 ; Jr 27.11 ; Ez 11.17+ ; 37.14. –  j''ai de la compassion… Es 54.6-8.'
  - type: text
    content: Je rendrai héroïque la maison de Juda,
  - type: text
    content: et je sauverai la maison de Joseph ;
  - type: text
    content: je les rétablirai,
  - type: text
    content: car j'ai de la compassion pour eux,
  - type: text
    content: et ils seront comme si je ne les avais pas rejetés ;
  - type: text
    content: 'je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu,'
  - type: text
    content: et je leur répondrai.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'leur cœur sera dans l''allégresse…  : cf. 1S 2.1.'
  - type: text
    content: Ephraïm sera comme un héros ;
  - type: text
    content: leur cœur aura la joie que donne le vin ;
  - type: text
    content: leurs fils le verront et se réjouiront,
  - type: text
    content: 'leur cœur sera dans l''allégresse à cause du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Je sifflerai  : cf. Es 5.26+. –  ils se multiplieront Ez 36.11.'
  - type: text
    content: Je sifflerai pour les rassembler,
  - type: text
    content: car je les libère,
  - type: text
    content: et ils se multiplieront comme ils se multipliaient.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 30.1-3. –  sèmerai  : cf. Os 2.25 ; certains voient ici une référence à l''exil et traduisent je les ai dispersés  ; cf. Jr 31.10 ; Ez 11.16 ; 34.5. –  ils se souviendront de moi  : autres traductions ils m''invoqueront ; ils penseront à moi ; ils évoqueront mon nom  ; cf. Jr 51.50 ; Ez 6.9 ; 36.31 ; Lm 3.20. –  ils vivront, eux et leurs fils  : des versions anciennes semblent avoir lu ils feront vivre (ou ils élèveront ) leurs fils , ce qui correspond à une vocalisation différente des mêmes lettres en hébreu.'
  - type: text
    content: Je les sèmerai parmi les peuples,
  - type: text
    content: et au loin ils se souviendront de moi ;
  - type: text
    content: ils vivront, eux et leurs fils,
  - type: text
    content: et ils reviendront.
