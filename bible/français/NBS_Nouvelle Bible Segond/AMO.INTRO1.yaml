document_id: AMO.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: is2
  children:
  - type: text
    text: L'époque d'Amos
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''activité du prophète Amos, probablement assez brève, est à situer entre les années 760 et 750 av. J.-C., dans le royaume du Nord (« Israël »), vers la fin du règne long et prospère de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Jéroboam II
  - type: text
    text: ' (≈ 783-743 ; voir 2R 14.23ss). Ce roi, que la Bible juge assez sévèrement, a achevé victorieusement une guerre de cent ans qui opposait Israël aux Araméens (ou Syriens) depuis le règne d''Achab (≈ 874-853). Jéroboam II a notamment reconquis la partie transjordanienne du royaume (2R 14.25). Amos fait allusion, non sans ironie, à deux succès de cette reconquête (voir Am 6.13'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: s).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Avec la paix revient la prospérité, au moins pour certaines couches de la population, grâce aux échanges commerciaux renoués en particulier avec la Phénicie. Mais la fortune des uns s''édifie aux dépens des autres. Une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: inégalité criante
  - type: text
    text: ' règne partout. Déjà, un siècle plus tôt, le roi Achab s''était attaqué, en la personne de Naboth, à l''institution du patrimoine inaliénable (1R 21), selon laquelle chaque famille israélite devait pouvoir disposer de sa maison et de son champ, sur une terre qui ne pouvait être vendue, parce qu''elle n''appartenait qu''à Dieu. L''esprit mercantile, cananéen (cf. Gn 9.18n ; Os 12.8n) concurrence sérieusement la tradition égalitaire d''Israël. Sous Jéroboam II, l''affairisme a gagné l''ensemble des classes dirigeantes. Les paysans, pour payer leurs dettes, doivent se défaire de leur patrimoine. Devenus simples métayers, puis acculés à la faillite par de nouvelles dettes, ils en viennent à vendre leurs propres enfants, puis à se vendre eux-mêmes comme esclaves. Cette pratique, confirmée par les découvertes archéologiques, est vigoureusement dénoncée par Amos. En cette période de prospérité économique, son message retentit comme un coup de tonnerre dans un ciel bleu.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le prophète Amos
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Amos est un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: rural
  - type: text
    text: ', probablement prospère. Il a son point d''attache à Teqoa (Am 1.1), une bourgade de Juda située à une dizaine de kilomètres au sud de Beth-Léhem. Il y élève des bovins (pour lui-même ? pour le roi de Juda ?), mais il est aussi cultivateur de sycomores, dont les fruits servaient principalement à l''alimentation du bétail (1.1'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '  ; 7.14'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ). Comme le sycomore ne pousse pas à l'altitude de Teqoa (≈ 1000 m), Amos devait voyager pour exercer sa spécialité. D'où, peut-être, sa connaissance étendue des lieux, des gens et des événements bien au-delà du territoire de son clan.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Tout judéen qu''il soit, c''est dans le royaume rival du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Nord
  - type: text
    text: ' qu''il fait soudain entendre son message sévère. Outre le fait qu''il dérange l''ordre social, religieux et politique établi, son intervention est ressentie comme une intrusion étrangère. Malgré la communauté de langue, malgré la référence au même Dieu, Amos est mal reçu en Israël. Il finit par être expulsé de Beth-El (7.10-13), ville frontière entre les deux royaumes qui abritait depuis près de 200 ans un sanctuaire royal, concurrent de celui de Jérusalem (voir 1R 12.26-33).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Contestataire contesté, Amos se défend d''être un professionnel du message divin : ni '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prophète
  - type: text
    text: ' (de métier, comme ceux qui officiaient à la cour du roi Achab ; voir 1R 22.5s) ni '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fils de prophète
  - type: text
    text: ' (ou membre de confréries prophétiques comme celles qui accueillaient Elisée ; voir 2R 2–9), Amos est et reste un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: laïc
  - type: text
    text: ', comme on dirait aujourd''hui (7.14). Il intervient donc à titre exceptionnel, et ce simple fait devait déjà donner à réfléchir à ses contemporains. Il répond à une voix qui n''admet pas de résistance (Am 1.2 ; 3.8 ; 7.15). C''est tout ce que l''on sait de sa vocation particulière.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Les références d'Amos
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A quoi Amos se réfère-t-il pour légitimer son redoutable message ? En ce qui le concerne lui-même, on l''a vu, c''est à cette injonction irrésistible qu''il a reçue de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Dieu
  - type: text
    text: ', injonction qu''il compare au rugissement du lion (3.8).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pour ses auditeurs, il est vrai, une telle référence reste de peu de poids. Afin de les amener à prendre conscience de leur situation, Amos les renvoie donc à eux-mêmes, c''est-à-dire à ce que Dieu a accompli pour eux. Il fait ainsi plusieurs allusions à «  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: l'histoire sainte
  - type: text
    text: '  », ce récit des interventions de Dieu dans la vie passée de son peuple : destruction de Sodome et Gomorrhe (4.11), choix d''Israël, sortie d''Egypte, marche au désert, conquête du pays amorite (voir 2.9), mission des prophètes. Ces interventions de Dieu, qui font désormais partie intégrante de la tradition spirituelle d''Israël, se sont prolongées jusqu''en un passé récent par de graves avertissements (4.6-11). Tout cela aurait dû amener le peuple qui se réclame de Dieu a prendre conscience de sa trahison.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Mais le point sur lequel Amos revient avec le plus d'insistance, c'est l'
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: équité
  - type: text
    text: ' et la '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: justice
  - type: text
    text: ' (voir 5.7). Le terme traduit par '
  - type: usfm
    marker: it
    children:
    - type: text
      text: équité
  - type: text
    text: ' peut aussi désigner plus concrètement le droit, c''est-à-dire l''ensemble des règles qui permettent la vie en communauté. En Israël, le droit est considéré comme institué par Dieu lui-même, qui garantit ainsi l''existence des plus faibles, les plus menacés. Quand le droit est respecté, alors règne la justice, c''est-à-dire l''ordre que Dieu veut voir instauré au sein de son peuple, ordre qui inclut justice au tribunal et justice sociale.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le message d'Amos
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'S''appuyant sur ces diverses marques de l''autorité qu''Israël devait reconnaître à son Dieu, Amos tourne son regard vers le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: présent
  - type: text
    text: ' et l'''
  - type: usfm
    marker: bd
    children:
    - type: text
      text: avenir
  - type: text
    text: .
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Vers le présent d''abord, pour critiquer vigoureusement le désordre qui sévit en Israël en matière économique, sociale et religieuse — les trois étant liés. Amos apparaît comme un champion des « droits de l''homme », si l''on entend par cette expression les droits que Dieu revendique pour les humains, droits qu''il a lui-même conçus et formulés. On remarquera que cette revendication de Dieu proclamée par Amos concerne '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: tous les peuples
  - type: text
    text: ', à commencer par les voisins immédiats d''Israël (1.3–2.3). On trouvera dans le début de l''épître de Paul aux Romains l''écho de cette exigence universelle de Dieu (Rm 1.18-32).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La revendication de Dieu est d''autant plus vive à l''égard de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: son propre peuple
  - type: text
    text: ' que celui-ci aurait dû mettre à profit la longue éducation dont il a bénéficié. Dieu ne plaisante pas avec les droits de l''homme.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'C''est pourquoi l''avenir, tel que le voit et le décrit Amos, est chargé de lourdes menaces pour tous, mais plus particulièrement pour le peuple qui se réclame du Dieu vivant (voir 3.2). Parmi ces menaces, la plus inattendue et la plus redoutable est celle du '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: jour du Seigneur
  - type: text
    text: ' (YHWH). Sous cette expression les contemporains d''Amos attendaient, de la part de Dieu, une manifestation soudaine de puissance, qui leur assurerait revanche et triomphe sur leurs ennemis. Amos annonce au contraire que ce jour sera nuit sombre. Loin de leur apporter une victoire définitive, il marquera leur jugement (5.18-20).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pour transmettre son message, Amos recourt à plusieurs '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: formes littéraires
  - type: text
    text: ' qui resteront classiques dans les livres prophétiques. D''abord la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: déclaration
  - type: text
    text: ' proprement dite, qui commence en général par une interpellation ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: écoutez
  - type: text
    text: ', 3.1), une formule de messager ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: ainsi parle le Seigneur
  - type: text
    text: ', 1.3,6,9 etc.) ou encore un appel à témoins (3.9). Suit une dénonciation du ou des faits incriminés (voir 1.3), puis une annonce du jugement (voir 1.5), souvent introduite par le terrible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: c'est pourquoi
  - type: text
    text: ' (voir 4.12). Il arrive aussi qu''Amos entonne par avance un chant de deuil (5.2,16s) ou qu''il lance une sentence de malheur (5.18 ; 6.1). Il développe plus rarement un enseignement (5.4-7,14s), poussé parfois jusqu''à la parodie (4.4s ; 5.26), et recourt une fois au genre du réquisitoire (4.6-11). Cette variété et, en général, la brièveté de ses interventions donnent à son message une vigueur redoutable.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les déclarations et les visions ne sont pas classées dans l''ordre '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: chronologique
  - type: text
    text: . Ainsi, les première et deuxième visions sont antérieures aux déclarations de la première ou de la deuxième partie.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Trois morceaux '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: hymniques
  - type: text
    text: ' à la gloire du Créateur se trouvent enchâssés dans la deuxième et la troisième partie du livre : 4.13 ; 5.8s ; 9.5s. S''agit-il de trois strophes d''un même hymne ?'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Organisation du livre d'Amos
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Si les spécialistes divergent sur la façon dont le livre d''Amos s''est constitué, les grandes '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: articulations
  - type: text
    text: ' du texte sont claires.'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 1.1s Amos
  - type: text
    text: ' en son temps.'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 1.3–2.16
  - type: text
    text: ' Collection de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sept déclarations
  - type: text
    text: ' sur les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: nations
  - type: text
    text: ' coupables d''avoir violé les droits des peuples et de la personne humaine. '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Juda et Israël
  - type: text
    text: ' sont du nombre.'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 3.1–6.14
  - type: text
    text: ' Série de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: déclarations
  - type: text
    text: ' concernant, cette fois, le seul '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Israël
  - type: text
    text: .
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 7.1–9.10 Cinq visions
  - type: text
    text: ' rapportées à la première personne du singulier. Amos y raconte comment il découvre progressivement le jugement inéluctable que Dieu réserve à son peuple. Entre la troisième et la quatrième s''insère un court récit biographique autour d''une altercation qui a opposé Amos au prêtre en chef de Beth-El. Les deux premières visions sont suivies chacune d''une brève intercession pour le peuple menacé. Les deux dernières débouchent sur des déclarations prophétiques.'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 9.11-15 Conclusion
  - type: text
    text: '. Par-delà le jugement annoncé, deux déclarations ouvrent une perspective de restauration. On relèvera notamment la première (9.11s), qui concerne la dynastie de David et prend une portée messianique. A l''assemblée de Jérusalem (Ac 15.16-18), Jacques la citera en entier pour en souligner la perspective élargie à '
  - type: usfm
    marker: it
    children:
    - type: text
      text: toutes les nations
  - type: text
    text: ' et montrer ainsi que le dessein de Dieu inclut aussi les non-Juifs. Soumis, comme Israël, au jugement de Dieu (Am 1–2), ils sont, comme le peuple « à son nom » (Ac 15.14), appelés eux aussi à découvrir le salut.'
