type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: L'époque d'Amos
  - type: text
    content: 'L''activité du prophète Amos, probablement assez brève, est à situer entre les années 760 et 750 av. J.-C., dans le royaume du Nord (« Israël »), vers la fin du règne long et prospère de '
  - type: text
    content: Jéroboam II
  - type: text
    content: ' (≈ 783-743 ; voir 2R 14.23ss). Ce roi, que la Bible juge assez sévèrement, a achevé victorieusement une guerre de cent ans qui opposait Israël aux Araméens (ou Syriens) depuis le règne d''Achab (≈ 874-853). Jéroboam II a notamment reconquis la partie transjordanienne du royaume (2R 14.25). Amos fait allusion, non sans ironie, à deux succès de cette reconquête (voir Am 6.13'
  - type: text
    content: n
  - type: text
    content: s).
  - type: text
    content: 'Avec la paix revient la prospérité, au moins pour certaines couches de la population, grâce aux échanges commerciaux renoués en particulier avec la Phénicie. Mais la fortune des uns s''édifie aux dépens des autres. Une '
  - type: text
    content: inégalité criante
  - type: text
    content: ' règne partout. Déjà, un siècle plus tôt, le roi Achab s''était attaqué, en la personne de Naboth, à l''institution du patrimoine inaliénable (1R 21), selon laquelle chaque famille israélite devait pouvoir disposer de sa maison et de son champ, sur une terre qui ne pouvait être vendue, parce qu''elle n''appartenait qu''à Dieu. L''esprit mercantile, cananéen (cf. Gn 9.18n ; Os 12.8n) concurrence sérieusement la tradition égalitaire d''Israël. Sous Jéroboam II, l''affairisme a gagné l''ensemble des classes dirigeantes. Les paysans, pour payer leurs dettes, doivent se défaire de leur patrimoine. Devenus simples métayers, puis acculés à la faillite par de nouvelles dettes, ils en viennent à vendre leurs propres enfants, puis à se vendre eux-mêmes comme esclaves. Cette pratique, confirmée par les découvertes archéologiques, est vigoureusement dénoncée par Amos. En cette période de prospérité économique, son message retentit comme un coup de tonnerre dans un ciel bleu.'
  - type: text
    content: Le prophète Amos
  - type: text
    content: 'Amos est un '
  - type: text
    content: rural
  - type: text
    content: ', probablement prospère. Il a son point d''attache à Teqoa (Am 1.1), une bourgade de Juda située à une dizaine de kilomètres au sud de Beth-Léhem. Il y élève des bovins (pour lui-même ? pour le roi de Juda ?), mais il est aussi cultivateur de sycomores, dont les fruits servaient principalement à l''alimentation du bétail (1.1'
  - type: text
    content: n
  - type: text
    content: '  ; 7.14'
  - type: text
    content: n
  - type: text
    content: ). Comme le sycomore ne pousse pas à l'altitude de Teqoa (≈ 1000 m), Amos devait voyager pour exercer sa spécialité. D'où, peut-être, sa connaissance étendue des lieux, des gens et des événements bien au-delà du territoire de son clan.
  - type: text
    content: 'Tout judéen qu''il soit, c''est dans le royaume rival du '
  - type: text
    content: Nord
  - type: text
    content: ' qu''il fait soudain entendre son message sévère. Outre le fait qu''il dérange l''ordre social, religieux et politique établi, son intervention est ressentie comme une intrusion étrangère. Malgré la communauté de langue, malgré la référence au même Dieu, Amos est mal reçu en Israël. Il finit par être expulsé de Beth-El (7.10-13), ville frontière entre les deux royaumes qui abritait depuis près de 200 ans un sanctuaire royal, concurrent de celui de Jérusalem (voir 1R 12.26-33).'
  - type: text
    content: 'Contestataire contesté, Amos se défend d''être un professionnel du message divin : ni '
  - type: text
    content: prophète
  - type: text
    content: ' (de métier, comme ceux qui officiaient à la cour du roi Achab ; voir 1R 22.5s) ni '
  - type: text
    content: fils de prophète
  - type: text
    content: ' (ou membre de confréries prophétiques comme celles qui accueillaient Elisée ; voir 2R 2–9), Amos est et reste un '
  - type: text
    content: laïc
  - type: text
    content: ', comme on dirait aujourd''hui (7.14). Il intervient donc à titre exceptionnel, et ce simple fait devait déjà donner à réfléchir à ses contemporains. Il répond à une voix qui n''admet pas de résistance (Am 1.2 ; 3.8 ; 7.15). C''est tout ce que l''on sait de sa vocation particulière.'
  - type: text
    content: Les références d'Amos
  - type: text
    content: 'A quoi Amos se réfère-t-il pour légitimer son redoutable message ? En ce qui le concerne lui-même, on l''a vu, c''est à cette injonction irrésistible qu''il a reçue de '
  - type: text
    content: Dieu
  - type: text
    content: ', injonction qu''il compare au rugissement du lion (3.8).'
  - type: text
    content: 'Pour ses auditeurs, il est vrai, une telle référence reste de peu de poids. Afin de les amener à prendre conscience de leur situation, Amos les renvoie donc à eux-mêmes, c''est-à-dire à ce que Dieu a accompli pour eux. Il fait ainsi plusieurs allusions à «  '
  - type: text
    content: l'histoire sainte
  - type: text
    content: '  », ce récit des interventions de Dieu dans la vie passée de son peuple : destruction de Sodome et Gomorrhe (4.11), choix d''Israël, sortie d''Egypte, marche au désert, conquête du pays amorite (voir 2.9), mission des prophètes. Ces interventions de Dieu, qui font désormais partie intégrante de la tradition spirituelle d''Israël, se sont prolongées jusqu''en un passé récent par de graves avertissements (4.6-11). Tout cela aurait dû amener le peuple qui se réclame de Dieu a prendre conscience de sa trahison.'
  - type: text
    content: Mais le point sur lequel Amos revient avec le plus d'insistance, c'est l'
  - type: text
    content: équité
  - type: text
    content: ' et la '
  - type: text
    content: justice
  - type: text
    content: ' (voir 5.7). Le terme traduit par '
  - type: text
    content: équité
  - type: text
    content: ' peut aussi désigner plus concrètement le droit, c''est-à-dire l''ensemble des règles qui permettent la vie en communauté. En Israël, le droit est considéré comme institué par Dieu lui-même, qui garantit ainsi l''existence des plus faibles, les plus menacés. Quand le droit est respecté, alors règne la justice, c''est-à-dire l''ordre que Dieu veut voir instauré au sein de son peuple, ordre qui inclut justice au tribunal et justice sociale.'
  - type: text
    content: Le message d'Amos
  - type: text
    content: 'S''appuyant sur ces diverses marques de l''autorité qu''Israël devait reconnaître à son Dieu, Amos tourne son regard vers le '
  - type: text
    content: présent
  - type: text
    content: ' et l'''
  - type: text
    content: avenir
  - type: text
    content: .
  - type: text
    content: 'Vers le présent d''abord, pour critiquer vigoureusement le désordre qui sévit en Israël en matière économique, sociale et religieuse — les trois étant liés. Amos apparaît comme un champion des « droits de l''homme », si l''on entend par cette expression les droits que Dieu revendique pour les humains, droits qu''il a lui-même conçus et formulés. On remarquera que cette revendication de Dieu proclamée par Amos concerne '
  - type: text
    content: tous les peuples
  - type: text
    content: ', à commencer par les voisins immédiats d''Israël (1.3–2.3). On trouvera dans le début de l''épître de Paul aux Romains l''écho de cette exigence universelle de Dieu (Rm 1.18-32).'
  - type: text
    content: 'La revendication de Dieu est d''autant plus vive à l''égard de '
  - type: text
    content: son propre peuple
  - type: text
    content: ' que celui-ci aurait dû mettre à profit la longue éducation dont il a bénéficié. Dieu ne plaisante pas avec les droits de l''homme.'
  - type: text
    content: 'C''est pourquoi l''avenir, tel que le voit et le décrit Amos, est chargé de lourdes menaces pour tous, mais plus particulièrement pour le peuple qui se réclame du Dieu vivant (voir 3.2). Parmi ces menaces, la plus inattendue et la plus redoutable est celle du '
  - type: text
    content: jour du Seigneur
  - type: text
    content: ' (YHWH). Sous cette expression les contemporains d''Amos attendaient, de la part de Dieu, une manifestation soudaine de puissance, qui leur assurerait revanche et triomphe sur leurs ennemis. Amos annonce au contraire que ce jour sera nuit sombre. Loin de leur apporter une victoire définitive, il marquera leur jugement (5.18-20).'
  - type: text
    content: 'Pour transmettre son message, Amos recourt à plusieurs '
  - type: text
    content: formes littéraires
  - type: text
    content: ' qui resteront classiques dans les livres prophétiques. D''abord la '
  - type: text
    content: déclaration
  - type: text
    content: ' proprement dite, qui commence en général par une interpellation ('
  - type: text
    content: écoutez
  - type: text
    content: ', 3.1), une formule de messager ('
  - type: text
    content: ainsi parle le Seigneur
  - type: text
    content: ', 1.3,6,9 etc.) ou encore un appel à témoins (3.9). Suit une dénonciation du ou des faits incriminés (voir 1.3), puis une annonce du jugement (voir 1.5), souvent introduite par le terrible '
  - type: text
    content: c'est pourquoi
  - type: text
    content: ' (voir 4.12). Il arrive aussi qu''Amos entonne par avance un chant de deuil (5.2,16s) ou qu''il lance une sentence de malheur (5.18 ; 6.1). Il développe plus rarement un enseignement (5.4-7,14s), poussé parfois jusqu''à la parodie (4.4s ; 5.26), et recourt une fois au genre du réquisitoire (4.6-11). Cette variété et, en général, la brièveté de ses interventions donnent à son message une vigueur redoutable.'
  - type: text
    content: 'Les déclarations et les visions ne sont pas classées dans l''ordre '
  - type: text
    content: chronologique
  - type: text
    content: . Ainsi, les première et deuxième visions sont antérieures aux déclarations de la première ou de la deuxième partie.
  - type: text
    content: 'Trois morceaux '
  - type: text
    content: hymniques
  - type: text
    content: ' à la gloire du Créateur se trouvent enchâssés dans la deuxième et la troisième partie du livre : 4.13 ; 5.8s ; 9.5s. S''agit-il de trois strophes d''un même hymne ?'
  - type: text
    content: Organisation du livre d'Amos
  - type: text
    content: 'Si les spécialistes divergent sur la façon dont le livre d''Amos s''est constitué, les grandes '
  - type: text
    content: articulations
  - type: text
    content: ' du texte sont claires.'
  - type: text
    content: 1.1s Amos
  - type: text
    content: ' en son temps.'
  - type: text
    content: 1.3–2.16
  - type: text
    content: ' Collection de '
  - type: text
    content: sept déclarations
  - type: text
    content: ' sur les '
  - type: text
    content: nations
  - type: text
    content: ' coupables d''avoir violé les droits des peuples et de la personne humaine. '
  - type: text
    content: Juda et Israël
  - type: text
    content: ' sont du nombre.'
  - type: text
    content: 3.1–6.14
  - type: text
    content: ' Série de '
  - type: text
    content: déclarations
  - type: text
    content: ' concernant, cette fois, le seul '
  - type: text
    content: Israël
  - type: text
    content: .
  - type: text
    content: 7.1–9.10 Cinq visions
  - type: text
    content: ' rapportées à la première personne du singulier. Amos y raconte comment il découvre progressivement le jugement inéluctable que Dieu réserve à son peuple. Entre la troisième et la quatrième s''insère un court récit biographique autour d''une altercation qui a opposé Amos au prêtre en chef de Beth-El. Les deux premières visions sont suivies chacune d''une brève intercession pour le peuple menacé. Les deux dernières débouchent sur des déclarations prophétiques.'
  - type: text
    content: 9.11-15 Conclusion
  - type: text
    content: '. Par-delà le jugement annoncé, deux déclarations ouvrent une perspective de restauration. On relèvera notamment la première (9.11s), qui concerne la dynastie de David et prend une portée messianique. A l''assemblée de Jérusalem (Ac 15.16-18), Jacques la citera en entier pour en souligner la perspective élargie à '
  - type: text
    content: toutes les nations
  - type: text
    content: ' et montrer ainsi que le dessein de Dieu inclut aussi les non-Juifs. Soumis, comme Israël, au jugement de Dieu (Am 1–2), ils sont, comme le peuple « à son nom » (Ac 15.14), appelés eux aussi à découvrir le salut.'
