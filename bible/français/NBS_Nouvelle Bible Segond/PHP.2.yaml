document_id: PHP.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'humilité et la grandeur du Christ
  - type: text
    content: ' '
  - type: note
    content: 'encouragement (ou exhortation , Rm 12.8+) / réconfort 1Th 2.12+. –  communion (ou solidarité , 1.5n) de l''Esprit 2Co 13.13. –  tendresse  : voir 1.8n. –  magnanimité  : le terme grec correspondant est au pluriel, cf. Rm 12.1n  ; 2Co 1.3n.'
  - type: text
    content: 'S''il y a donc quelque encouragement dans le Christ, s''il y a quelque réconfort de l''amour, s''il y a quelque communion de l''Esprit, s''il y a quelque tendresse et quelque magnanimité, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: tout genou fléchisse Es 45.23 ; Rm 14.11 ; Ep 3.14. –  dans les cieux… Ap 5.3,13+ ; cf. Ep 1.20s ; 4.10 ; Col 1.18-20.
  - type: text
    content: pour qu'au nom de Jésus
  - type: text
    content: tout genou fléchisse
  - type: text
    content: dans les cieux, sur la terre et sous la terre,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'que toute langue reconnaisse (même verbe Rm 14.9n  ; verbe apparenté en Rm 10.9n) ; certains mss portent toute langue reconnaîtra Es 45.23. –  le Seigneur  : c''est ce nom (v. 9) qui, dans la lecture de la synagogue comme dans la traduction grecque de l''A.T., remplaçait le nom même de Dieu (YHWH, habituellement rendu par le Seigneur , cf. Ex 3.15n) ; dans le N.T., il est souvent appliqué d''une façon analogue à Jésus-Christ ; voir Ac 2.21,36 ; Rm 10.9+ ; 1Co 12.3 ; Ap 19.16. –  à la gloire… 1.11+ ; Rm 11.36 ; 15.7ss ; 1Co 15.24-28.'
  - type: text
    content: et que toute langue reconnaisse
  - type: text
    content: que Jésus-Christ est le Seigneur
  - type: text
    content: à la gloire de Dieu, le Père.
  - type: heading
    content: Briller comme des flambeaux dans le monde
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'bien-aimés 4.1. –  obéi  : cf. v. 8 ; 3.17 ; 4.9 ; Rm 1.5+. –  non pas seulement…  : texte et traduction incertains ; au lieu de en fonction de (litt. comme en ) ma présence certains comprennent en vue de mon retour v. 19ss ; 1.27 ; sur le terme correspondant à présence , cf. 1Co 16.17n. –  mettez en œuvre votre salut  : autres traductions possibles travaillez à votre salut, produisez votre salut  ; le verbe grec est apparenté à celui qui est traduit par opérer et faire au v. 13 ; un terme apparenté est traduit par opération en 3.21 ; voir Rm 2.9n. –  crainte et tremblement 1Co 2.3 ; 2Co 7.15+ ; 1P 1.17.'
  - type: text
    content: 'Ainsi, mes bien-aimés, comme vous avez toujours obéi, non pas seulement en fonction de ma présence mais d''autant plus maintenant, en mon absence, mettez en œuvre votre salut avec crainte et tremblement. '
  '13':
  - type: note
    content: 'Cf. 1.6+ ; 4.13 ; Jn 15.5 ; 1Co 15.10 ; 2Co 3.5+ ; Ep 2.10 ; Hé 13.21. –  opère et faire traduisent un même verbe grec (v. 12n) ; cf. 1Co 12.6 ; 1Th 2.13. –  en vous ou parmi vous, v. 5n. –  vouloir 2Co 8.10s. –  pour son bon plaisir  : litt. pour le bon plaisir 1.15n  ; Ep 1.5n  ; 2Th 1.11n  ; on pourrait aussi comprendre pour le bien, pour une bonne entente.'
  - type: text
    content: Car c'est Dieu qui opère en vous le vouloir et le faire pour son bon plaisir.
  '14':
  - type: text
    content: ' '
  - type: note
    content: maugréer Jn 6.41n  ; 1Co 10.10+. –  discuter ou contester , cf. 1Tm 2.8 ; le terme grec est souvent traduit par raisonnement(s) Mc 7.21/ / ; Lc 2.35+ ; Rm 1.21 ; 1Co 3.20 ; autres traductions du même terme en Lc 24.38n ( doutes ) ; Rm 14.1n ( opinions ). – Cf. Nb 14.2,9,27.
  - type: text
    content: 'Faites tout sans maugréer ni discuter, '
  '15':
  - type: note
    content: 'irréprochables  : cf. 1.10 (autre terme) ; 3.6 ; 1Th 3.13+ ; 5.23. –  purs ou simples, même mot en Mt 10.16 ; Rm 16.19. –  génération… Dt 32.5 ; Mt 12.39+ ; 17.17 ; Ac 2.40. –  comme les lumières du monde  : litt. comme des luminaires (même terme en Gn 1.14-16 LXX  ; il a le sens d’éclat en Ap 21.11) dans le monde Mt 5.14-16+ ; Jn 8.12+ ; Ep 5.8-11 ; 1Th 5.5 ; cf. Dn 12.3.'
  - type: text
    content: 'pour être irréprochables et purs, enfants de Dieu sans défaut au milieu d''une génération perverse et dévoyée, dans laquelle vous brillez comme les lumières du monde, '
  '16':
  - type: note
    content: 'la parole de la vie  : cf. Ac 5.20+. –  ma fierté 1.26+ ; cf. 2Co 1.14 ; 1Th 2.19. –  au jour du Christ 1.6+. –  couru 3.12-16 ; cf. Ga 2.2 ; voir aussi Ac 20.24 ; 1Co 9.24-26 ; 2Tm 4.7. –  je ne me serai pas donné de la peine…  : cf. Es 49.4 ; 65.23 ; 1Th 2.1 ; 3.5.'
  - type: text
    content: 'en portant la parole de la vie. Ce sera ma fierté, au jour du Christ : ainsi je n''aurai pas couru en vain, je ne me serai pas donné de la peine en vain. '
  '17':
  - type: note
    content: 'si je dois…  : autres traductions si mon sang doit être répandu comme une libation… ; si je répands une libation…  ; cf. 3.3 ; 4.18 ; 2Co 12.15 ; 2Tm 4.6 ; sur les libations, offrandes de liquides accompagnant les sacrifices, voir aussi Gn 35.14n  ; Ex 24.6-8 ; 29.40s ; Nb 15.1-16 ; 28.7 ; 29.6 ; Hé 9.19. –  le sacrifice Rm 12.1+. –  service, comme au v. 30 ; le terme grec correspondant a donné notre mot liturgie  ; sur ce terme, voir aussi v. 25nss ; Ac 13.2n  ; Rm 13.6 ; 15.27 ; 2Co 9.12. –  je m''en réjouis 1.4+.'
  - type: text
    content: 'Mais même si je dois être répandu comme une libation sur le sacrifice qu''est le service de votre foi, je m''en réjouis, et je me réjouis avec vous tous ; '
  '18':
  - type: note
    content: Cf. 3.1.
  - type: text
    content: vous aussi, réjouissez-vous-en ; réjouissez-vous avec moi !
  - type: heading
    content: Mission de Timothée et d'Epaphrodite
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'J''espère Rm 15.24 ; 1Co 16.7 ; Phm 22. –  vous envoyer… Timothée 1.1+ ; cf. Ac 19.21s. –  être… rasséréné  : le verbe grec ainsi traduit est apparenté à celui qui est rendu par partager les sentiments au v. 20 ; tous deux sont construits sur le mot traduit par âme en 1.27+.'
  - type: text
    content: 'J''espère, dans le Seigneur Jésus, vous envoyer bientôt Timothée, pour être moi-même rasséréné par les nouvelles que j''aurai de vous ; '
  '2':
  - type: note
    content: 'joie 1.4+. –  en étant (litt. que vous soyez) bien d''accord / ayez… une seule pensée (ou un même objectif, cf. 1.7n) : les deux expressions sont très proches en grec (litt. pensez la même chose / pensant une seule chose) ; cf. 2.14 ; 4.2 ; voir Rm 12.16n  ; 15.5 ; 2Co 13.11 ; voir aussi 1Co 1.10-16. –  une même âme 1.27+.'
  - type: text
    content: 'comblez ma joie en étant bien d''accord ; ayez un même amour, une même âme, une seule pensée ; '
  '20':
  - type: note
    content: 'Cf. Ac 16.2 ; 1Co 16.10. –  sincèrement  : autre traduction légitimement.'
  - type: text
    content: 'car je n''ai personne d''autre qui partage mes sentiments, pour s''inquiéter sincèrement de votre situation ; '
  '21':
  - type: note
    content: Cf. v. 4n.
  - type: text
    content: 'tous les autres, en effet, cherchent leurs propres intérêts et non pas ceux de Jésus-Christ. '
  '22':
  - type: note
    content: 'il a fait ses preuves  : cf. 1.10n  ; 2Tm 2.15. –  tel un enfant… 1Co 4.17 ; 1Tm 1.2,18 ; 2Tm 1.2 ; 2.1. –  travaillé… comme un esclave 1.1+. –  la bonne nouvelle 1.1n,5+.'
  - type: text
    content: 'Mais lui, vous savez qu''il a fait ses preuves : tel un enfant auprès de son père, il a travaillé avec moi, comme un esclave, pour la bonne nouvelle. '
  '23':
  - type: text
    content: 'J''espère donc vous l''envoyer dès que je verrai clair dans ma situation ; '
  '24':
  - type: note
    content: 'persuadé  : autre traduction confiant, cf. 1.6n.'
  - type: text
    content: je suis d'ailleurs persuadé, dans le Seigneur, que je viendrai bientôt moi-même.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai estimé nécessaire  : cf. 1.24 ; 2Co 9.5 ; le passé dit « épistolaire » équivaut souvent à un présent, de sorte que l''envoi d’ Epaphrodite (Ph 4.18) n''est pas nécessairement antérieur (c''est probablement lui qui porte l''épître). –  collaborateur 4.3 ; 1Co 3.9n. –  compagnon d''armes Phm 2. –  l''apôtre…  : litt. votre apôtre ou votre envoyé, votre délégué (Ga 1.1n) ; cf. Ac 20.4 ; 2Co 8.23n. –  en le chargeant…  : litt. serviteur (le terme est apparenté à celui qui est traduit par service aux v. 17n,30) de mes besoins 4.15-19 ; Rm 12.13.'
  - type: text
    content: 'J''ai estimé nécessaire de vous renvoyer Epaphrodite, mon frère, mon collaborateur et mon compagnon d''armes, l''apôtre que vous m''aviez envoyé en le chargeant de pourvoir à mes besoins ; '
  '26':
  - type: note
    content: 'comme il a une vive affection pour vous tous  : certains mss portent comme il désirait vivement vous voir tous.'
  - type: text
    content: 'comme il a une vive affection pour vous tous, il était fort peiné que vous ayez appris sa maladie. '
  '27':
  - type: text
    content: 'Il a été malade, en effet, et tout près de la mort ; mais Dieu a eu compassion de lui – et non pas seulement de lui, mais aussi de moi, pour que je n''aie pas tristesse sur tristesse. '
  '28':
  - type: text
    content: 'Je l''ai donc envoyé avec beaucoup d''empressement, pour que vous vous réjouissiez de le revoir, et que je sois moi-même moins triste. '
  '29':
  - type: note
    content: 1Co 16.16.
  - type: text
    content: 'Accueillez-le, dans le Seigneur, avec une joie entière ; honorez de telles personnes ; '
  '3':
  - type: note
    content: 'ambition personnelle 1.15,17. –  vanité  : cf. 3.19 ; mot apparenté Ga 5.26. –  humilité v. 8n  ; 1P 5.5. –  estimez les autres… Rm 12.10n.'
  - type: text
    content: 'ne faites rien par ambition personnelle ni par vanité ; avec humilité, au contraire, estimez les autres supérieurs à vous-mêmes. '
  '30':
  - type: note
    content: 'l''œuvre du Christ  : certains mss portent l''œuvre du Seigneur  ; cf. 1.6+. –  vie  : le même mot grec est traduit par âme en 1.27+ ; cf. Mt 10.28n  ; Ac 20.24. –  suppléer à votre absence (des termes apparentés sont traduits par manque en 4.11s) ; 1Co 16.17n  ; 2Co 8.14 ; 9.12 ; cf. Col 1.24. –  service v. 17n,25n.'
  - type: text
    content: car c'est pour l'œuvre du Christ qu'il a été près de mourir ; il a risqué sa vie afin de suppléer à votre absence dans votre service pour moi.
  '4':
  - type: note
    content: Autre traduction que chacun veille non seulement à ses propres intérêts, mais aussi à ceux des autres (formule analogue au v. 21) ; 1Co 10.24,33 ; 13.5.
  - type: text
    content: Que chacun, au lieu de regarder à ce qui lui est propre, s'intéresse plutôt aux autres.
  '5':
  - type: text
    content: ' '
  - type: note
    content: entre vous ou en vous Rm 15.5. –  les dispositions ou les pensées , v. 2 ; 1.7n. –  qui sont ou qui étaient , le verbe n'étant pas exprimé dans le texte ; on pourrait aussi comprendre ces dispositions que l'on a quand on est en Jésus-Christ  ; cf. Jn 13.15 ; 1Jn 2.6.
  - type: text
    content: 'Ayez entre vous les dispositions qui sont en Jésus-Christ :'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'qui était (ou qui est ) vraiment divin  : litt. existant en forme (ou en figure ) de Dieu , cf. v. 7n  ; le mot correspondant à forme ou figure évoque souvent la nature ou l''identité véritables et non une simple apparence ; on traduit aussi lui qui possédait (ou qui possède ) la condition divine… il a pris la condition d''un esclave…  ; termes apparentés pour configurer en 3.10,21n  ; Gn 1.26s ; 5.1 ; Jn 1.1s ; 3.13+ ; 17.5 ; Col 1.15 ; Hé 1.3 ; 1Jn 1.1s. –  il ne s''est pas prévalu…  : traduction incertaine, litt. il n''a pas estimé (comme une) proie (d’)être égal à Dieu  ; on a aussi compris il n''a pas retenu jalousement le rang qui l''égalait à Dieu ; il n''a pas profité de l''aubaine pour se faire l''égal de Dieu  ; cf. Jn 5.18 ; voir aussi Gn 3.5,22 ; Es 14.13s ; Rm 5.14 ; 1Co 15.45-47.'
  - type: text
    content: lui qui était vraiment divin,
  - type: text
    content: il ne s'est pas prévalu
  - type: text
    content: d'un rang d'égalité avec Dieu,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'vidé , même verbe 1Co 9.15n  ; 2Co 9.3 ( réduire à néant ) ; cf. 8.9 ; Es 53.12n. –  en se faisant vraiment (litt. en prenant forme de , v. 6n) esclave  : autre traduction serviteur 1.1+ ; Es 53.3,11 ; Mt 20.28/ /. –  devenant (Jn 1.3n,14 ; Rm 1.3n) semblable aux humains Rm 8.3+ ; 1Tm 2.5 ; Hé 2.14-17. –  reconnu  : litt. trouvé , terme qui peut aussi signifier jugé , cf. 3.9+. –  à son aspect  : un verbe apparenté est traduit par transformer en 3.21+. Voir 1Co 7.31n.'
  - type: text
    content: mais il s'est vidé de lui-même
  - type: text
    content: en se faisant vraiment esclave,
  - type: text
    content: en devenant semblable aux humains ;
  - type: text
    content: reconnu à son aspect comme humain,
  '8':
  - type: text
    content: ' '
  - type: note
    content: il s'est abaissé ou humilié , un terme apparenté est traduit par humilité au v. 3 ; même verbe en Lc 14.11+ ; cf. Hé 2.9. –  obéissant Mt 26.39/ / ; Jn 4.34 ; 6.38 ; 10.17s ; Rm 5.19 ; 6.16-18 ; Hé 5.8. –  la mort sur la croix Ac 2.23 ; 1Co 1.17–2.2 ; Ga 3.13 ; 6.14 ; Hé 12.2.
  - type: text
    content: il s'est abaissé lui-même
  - type: text
    content: en devenant obéissant jusqu'à la mort
  - type: text
    content: – la mort sur la croix.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu l''a souverainement élevé Ac 2.24,32s ; 5.31 ; cf. Es 52.13 ; 53.12 ; Ps 97.9 (LXX) ; Jn 12.32 ; Rm 1.4+. –  lui a accordé  : le verbe grec correspondant est apparenté au terme habituellement traduit par grâce , cf. 1.29 ; Rm 8.32n. –  au-dessus de tout nom v. 11n  ; Ep 1.20ss ; Hé 1.3s ; voir aussi Mt 28.18.'
  - type: text
    content: C'est pourquoi Dieu l'a souverainement élevé
  - type: text
    content: et lui a accordé le nom
  - type: text
    content: qui est au-dessus de tout nom,
