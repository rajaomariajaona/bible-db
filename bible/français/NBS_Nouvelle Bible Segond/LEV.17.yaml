document_id: LEV.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prescriptions relatives au sang
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: sang 3.17+.
  - type: text
    content: 'Si un homme de la maison d''Israël ou parmi les immigrés qui séjournent au milieu d''eux mange du sang, quel que soit ce sang, je me retournerai contre celui qui mange le sang et je le retrancherai du sein de son peuple. '
  '11':
  - type: note
    content: 'sur vous  : autres traductions sur vos êtres ; sur vos vies  ; c''est le même mot hébreu, au singulier, qui est traduit deux fois par vie dans ce v. (voir Gn 1.20n) ; il est rendu par celui au v. 10 et aucun au v. 12. –  par la vie (sous-entendu  : qui est en lui) ; autre traduction pour la vie  ; cf. Nb 35.33 ; Hé 9.13,22. –  expiation 1.4+ ; cf. chap. 16.'
  - type: text
    content: 'Car la vie de la chair est dans le sang. C''est moi qui l''ai placé pour vous sur l''autel, afin de faire l''expiation sur vous, car c''est le sang qui, par la vie, fait l''expiation. '
  '12':
  - type: text
    content: 'C''est pourquoi j''ai dit aux Israélites : Aucun d''entre vous ne mangera du sang. L''immigré qui séjourne au milieu de vous ne mangera pas non plus de sang. '
  '13':
  - type: note
    content: Dt 12.16,24 ; 15.23.
  - type: text
    content: 'Si un homme parmi les Israélites ou parmi les immigrés qui séjournent au milieu d''eux prend à la chasse un animal ou un oiseau qui se mange, il en répandra le sang et le couvrira de poussière. '
  '14':
  - type: note
    content: 'par sa vie  : autre traduction en elle (v. 11n) ; cette précision est absente de plusieurs versions anciennes.'
  - type: text
    content: 'Car la vie de toute chair, c''est son sang, par sa vie, et j''ai dit aux Israélites : Vous ne mangerez le sang d''aucune chair, car la vie de toute chair, c''est son sang ; quiconque le mangera sera retranché.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 7.24+. –  autochtones / immigrés 16.29+. – Sur les deux verbes traduits par laver (de même au v. 16), voir 14.8n. – Voir pur.
  - type: text
    content: 'Quiconque parmi les autochtones ou les immigrés mange une bête crevée ou déchiquetée lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir, après quoi il sera pur. '
  '16':
  - type: note
    content: 'ses vêtements  : ici sous-entendu dans le texte. –  son corps  : cf. 14.9n.'
  - type: text
    content: S'il ne lave pas ses vêtements, s'il ne lave pas son corps, il sera chargé de sa faute.
  '2':
  - type: text
    content: 'Parle à Aaron, à ses fils et à tous les Israélites ; tu leur diras : Voici ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné. '
  '3':
  - type: note
    content: 'immole ou égorge  : dans la perspective de ce texte (le camp d''Israël dans le désert) tout abattage est un sacrifice et doit avoir lieu au sanctuaire ; cf. Dt 12.8-28.'
  - type: text
    content: 'Si un homme de la maison d''Israël immole dans le camp ou hors du camp un bœuf, un mouton ou une chèvre '
  '4':
  - type: note
    content: retranché… 7.20n.
  - type: text
    content: 'et ne l''amène pas à l''entrée de la tente de la Rencontre pour l''offrir en présent au '
  - type: text
    content: Seigneur
  - type: text
    content: ', devant la demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: ', du sang sera porté au compte de cet homme-là ; il a répandu du sang : cet homme-là sera retranché du sein de son peuple. '
  '5':
  - type: note
    content: 'dans la campagne  : litt. à la (sur)face de la campagne (ou des champs) ; on pourrait comprendre n''importe où ou bien sur le sol (cf. v. 13). – Voir prêtre.'
  - type: text
    content: 'Ainsi les Israélites, au lieu d''offrir leurs sacrifices dans la campagne, les amèneront au '
  - type: text
    content: Seigneur
  - type: text
    content: ', à l''entrée de la tente de la Rencontre, devant le prêtre ; ils les offriront au '
  - type: text
    content: Seigneur
  - type: text
    content: ' en sacrifices de paix. '
  '6':
  - type: note
    content: graisse 3.3n. –  odeur agréable 1.9n.
  - type: text
    content: 'Le prêtre aspergera du sang l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', à l''entrée de la tente de la Rencontre, et il fera fumer la graisse ; ce sera une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: note
    content: 'boucs  : le mot correspondant peut désigner, non seulement l''animal (16.5), mais aussi un démon du désert qu''on se représentait sous une forme analogue (16.8n  ; Es 13.21n  ; 34.14 ; voir aussi 2Ch 11.15 ; 1Co 10.20). –  ils se prostituent ou ils sont infidèles  : l''idolâtrie est assimilée à une infidélité de type conjugal à l''égard de YHWH, cf. 19.5 ; Ex 34.15s ; Os 1.2n. –  prescription  : voir loi. – Voir générations.'
  - type: text
    content: 'Ils n''offriront plus leurs sacrifices aux boucs avec lesquels ils se prostituent. C''est une prescription perpétuelle pour eux, pour toutes leurs générations. '
  '8':
  - type: note
    content: 'immigrés  : cf. Ex 12.48n.'
  - type: text
    content: 'Tu leur diras donc : Si un homme de la maison d''Israël ou parmi les immigrés qui séjournent au milieu d''eux offre un holocauste ou un sacrifice '
  '9':
  - type: note
    content: 'pour l''offrir  : litt. pour le faire. –  retranché de son peuple (ou des siens) 7.20n.'
  - type: text
    content: 'et ne l''amène pas à l''entrée de la tente de la Rencontre pour l''offrir au '
  - type: text
    content: Seigneur
  - type: text
    content: ', cet homme-là sera retranché de son peuple.'
