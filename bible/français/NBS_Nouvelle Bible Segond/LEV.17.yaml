document_id: LEV.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prescriptions relatives au sang
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle à Aaron, à ses fils et à tous les Israélites ; tu leur diras : Voici ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'immole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: égorge
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans la perspective de ce texte (le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'camp '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: d'Israël dans le désert) tout abattage est un sacrifice et doit avoir lieu au sanctuaire ; cf. Dt 12.8-28.
    marker-yv: yv-n
  - type: text
    text: 'Si un homme de la maison d''Israël immole dans le camp ou hors du camp un bœuf, un mouton ou une chèvre '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'retranché… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'et ne l''amène pas à l''entrée de la tente de la Rencontre pour l''offrir en présent au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', devant la demeure du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', du sang sera porté au compte de cet homme-là ; il a répandu du sang : cet homme-là sera retranché du sein de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la campagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à la (sur)face de la campagne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des champs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; on pourrait comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'n''importe où '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou bien '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sur le sol '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 13). – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi les Israélites, au lieu d''offrir leurs sacrifices dans la campagne, les amèneront au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', à l''entrée de la tente de la Rencontre, devant le prêtre ; ils les offriront au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' en sacrifices de paix. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'graisse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'odeur agréable '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre aspergera du sang l''autel du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', à l''entrée de la tente de la Rencontre, et il fera fumer la graisse ; ce sera une odeur agréable pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: boucs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot correspondant peut désigner, non seulement l''animal (16.5), mais aussi un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: démon
      - type: text
        text: ' du désert qu''on se représentait sous une forme analogue (16.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Es 13.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 34.14 ; voir aussi 2Ch 11.15 ; 1Co 10.20). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils se prostituent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils sont infidèles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''idolâtrie est assimilée à une infidélité de type conjugal à l''égard de YHWH, cf. 19.5 ; Ex 34.15s ; Os 1.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prescription
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: générations
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils n''offriront plus leurs sacrifices aux boucs avec lesquels ils se prostituent. C''est une prescription perpétuelle pour eux, pour toutes leurs générations. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: immigrés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 12.48'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu leur diras donc : Si un homme de la maison d''Israël ou parmi les immigrés qui séjournent au milieu d''eux offre un holocauste ou un sacrifice '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour l'offrir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour le faire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'retranché de son peuple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des siens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) 7.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'et ne l''amène pas à l''entrée de la tente de la Rencontre pour l''offrir au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', cet homme-là sera retranché de son peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.10 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.17+.
    marker-yv: yv-n
  - type: text
    text: 'Si un homme de la maison d''Israël ou parmi les immigrés qui séjournent au milieu d''eux mange du sang, quel que soit ce sang, je me retournerai contre celui qui mange le sang et je le retrancherai du sein de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur vos êtres ; sur vos vies
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; c''est le même mot hébreu, au singulier, qui est traduit deux fois par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dans ce v. (voir Gn 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; il est rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'celui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 10 et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aucun '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par la vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (sous-entendu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui est en lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour la vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Nb 35.33 ; Hé 9.13,22. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: expiation
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.4+ ; cf. chap. 16.
    marker-yv: yv-n
  - type: text
    text: 'Car la vie de la chair est dans le sang. C''est moi qui l''ai placé pour vous sur l''autel, afin de faire l''expiation sur vous, car c''est le sang qui, par la vie, fait l''expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C''est pourquoi j''ai dit aux Israélites : Aucun d''entre vous ne mangera du sang. L''immigré qui séjourne au milieu de vous ne mangera pas non plus de sang. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 12.16,24 ; 15.23.
    marker-yv: yv-n
  - type: text
    text: 'Si un homme parmi les Israélites ou parmi les immigrés qui séjournent au milieu d''eux prend à la chasse un animal ou un oiseau qui se mange, il en répandra le sang et le couvrira de poussière. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par sa vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en elle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; cette précision est absente de plusieurs versions anciennes.
    marker-yv: yv-n
  - type: text
    text: 'Car la vie de toute chair, c''est son sang, par sa vie, et j''ai dit aux Israélites : Vous ne mangerez le sang d''aucune chair, car la vie de toute chair, c''est son sang ; quiconque le mangera sera retranché.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.24+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'autochtones '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'immigrés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.29+. – Sur les deux verbes traduits par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'laver '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (de même au v. 16), voir 14.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quiconque parmi les autochtones ou les immigrés mange une bête crevée ou déchiquetée lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir, après quoi il sera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ses vêtements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ici sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son corps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: S'il ne lave pas ses vêtements, s'il ne lave pas son corps, il sera chargé de sa faute.
