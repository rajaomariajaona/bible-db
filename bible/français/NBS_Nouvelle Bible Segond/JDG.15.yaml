      children:
      - type: text
        text: ' : cf. Gn 38.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le père de sa femme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
