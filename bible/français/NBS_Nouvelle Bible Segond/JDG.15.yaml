  - type: text
    text: 'Dieu fendit donc la cavité qui est à Léhi, et il en sortit de l''eau. Samson but, son souffle lui revint, et il reprit vie. C''est pourquoi on a appelé cette source du nom d''Eïn-Qoré (« Source de celui qui invoque »). Elle est à Léhi, jusqu''à ce jour. '
