    marker-yv: yv-n
  - type: text
    text: 'Quelque temps plus tard, aux jours de la moisson des blés, Samson rendit visite à sa femme avec un chevreau. Il disait : Je vais entrer dans la chambre de ma femme. Mais le père de sa femme ne lui permit pas d''entrer. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que tu ne l'aimais pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que tu la détestais '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que tu la haïssais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; cf. 14.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s ; voir aussi Dt 21.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 22.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 24.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je l''ai donnée… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 6 ; 14.20 ; cf. Dt 24.1 ; Jr 3.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Prends-la
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'elle soit à toi.
    marker-yv: yv-n
  - type: text
    text: 'Le père de sa femme dit : J''étais persuadé que tu ne l''aimais pas, et je l''ai donnée à ton compagnon. Sa jeune sœur n''est-elle pas mieux qu''elle ? Prends-la à sa place, je t''en prie ! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 14.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je ne serai pas coupable '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon la traduction habituelle du verbe hébreu, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je suis innocent.
    marker-yv: yv-n
  - type: text
    text: 'Samson leur dit : Cette fois je ne serai pas coupable envers les Philistins, si je leur fais du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: renards
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chacals.
    marker-yv: yv-n
  - type: text
    text: 'Samson s''en alla donc. Il attrapa trois cents renards ; il prit des torches, tourna les renards queue contre queue et attacha une torche entre deux queues, au milieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jusqu'aux plantations d'oliviers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'aux vignes et aux oliviers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2S 14.30.'
    marker-yv: yv-n
  - type: text
    text: Il mit le feu aux torches, lâcha les renards dans les blés des Philistins et incendia aussi bien les meules que le blé sur pied, et jusqu'aux plantations d'oliviers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle et son père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certaines versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'elle et la maison de son père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sa famille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), comme en 14.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Philistins dirent : Qui a fait cela ? On répondit : C''est Samson, le gendre du Timnite, parce que celui-ci a pris sa femme et l''a donnée à son compagnon. Alors les Philistins montèrent et la brûlèrent, elle et son père. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Samson leur dit : Puisque vous agissez ainsi, je n''aurai de cesse que je ne me sois vengé de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à plate couture
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cuisse sur hanche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '( ?) ; les termes hébreux sont à peu près synonymes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur infligeant une grande défaite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.33'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1S 4.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 23.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Etam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : en Juda (v. 9-11), localisation incertaine ; il ne s''agit sans doute pas du même lieu qu''en 2Ch 11.6.'
    marker-yv: yv-n
  - type: text
    text: Il les battit à plate couture, leur infligeant une grande défaite ; puis il descendit et se retira dans la fente du rocher d'Etam.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson et la mâchoire d'âne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Léhi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mâchoire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 15-17) ; cf. 2S 23.11.
    marker-yv: yv-n
  - type: text
    text: 'Alors les Philistins montèrent, dressèrent leur camp en Juda et se déployèrent jusqu''à Léhi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les hommes de Juda dirent : Pourquoi êtes-vous montés contre nous ? Ils répondirent : Nous sommes montés pour lier Samson, afin de le traiter comme il nous a traités. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rocher d''Etam '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les Philistins sont maîtres chez nous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 13.1 ; 14.4.
    marker-yv: yv-n
  - type: text
    text: 'Sur quoi trois mille hommes de Juda descendirent à la fente du rocher d''Etam et dirent à Samson : Ne sais-tu pas que les Philistins sont maîtres chez nous ? Qu''est-ce que tu nous as fait ? Il leur répondit : Je les ai traités comme ils m''ont traité. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils lui dirent : Nous sommes descendus pour te lier, afin de te livrer aux Philistins. Samson leur dit : Jurez-moi que vous ne m''exécuterez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cordes neuves '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils lui répondirent : Non ! Nous voulons seulement te lier et te livrer à eux ; nous ne te mettrons pas à mort. Ils le lièrent avec deux cordes neuves et le firent remonter du rocher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en poussant des cris
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en lançant des acclamations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 7.21 ; Jos 6.5,10,16,20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le souffle du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.10+ ; 14.6 ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: esprit
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les cordes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 16.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tombèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fondirent.
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''il arriva à Léhi, les Philistins vinrent à sa rencontre en poussant des cris. Alors le souffle du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' s''empara de lui. Les cordes qu''il avait aux bras devinrent comme du lin brûlé par le feu, et ses liens tombèrent de ses mains. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une mâchoire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 14.8-9+.'
    marker-yv: yv-n
  - type: text
    text: 'Il trouva une mâchoire d''âne fraîche, tendit la main et la prit ; avec elle il tua mille hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un âne parmi les ânes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine, litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un âne (de) deux ânes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; mais il pourrait aussi s''agir d''un homonyme'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un tas, deux tas (de cadavres)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; d''après des versions anciennes, certains modifient légèrement la vocalisation traditionnelle de l''hébreu (tout en conservant l''assonance) pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je les ai mis en tas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; une racine de même forme évoque la couleur rouge.'
    marker-yv: yv-n
  - type: text
    text: 'Samson dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec la mâchoire de l'âne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un âne parmi les ânes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec la mâchoire de l'âne
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai abattu mille hommes.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il jeta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il jeta de sa main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ramath-Léhi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hauteur de la mâchoire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
