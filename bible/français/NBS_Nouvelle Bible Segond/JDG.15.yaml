document_id: JDG.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vengeance de Samson
  - type: text
    content: ' '
  - type: note
    content: 'Quelque temps plus tard 11.4n. –  rendit visite à sa femme 14.10n. –  un chevreau  : cf. Gn 38.17. –  le père de sa femme  : litt. son père (à elle) , de même au v. 2.'
  - type: text
    content: 'Quelque temps plus tard, aux jours de la moisson des blés, Samson rendit visite à sa femme avec un chevreau. Il disait : Je vais entrer dans la chambre de ma femme. Mais le père de sa femme ne lui permit pas d''entrer. '
  '10':
  - type: text
    content: 'Les hommes de Juda dirent : Pourquoi êtes-vous montés contre nous ? Ils répondirent : Nous sommes montés pour lier Samson, afin de le traiter comme il nous a traités. '
  '11':
  - type: note
    content: rocher d'Etam v. 8n. –  les Philistins sont maîtres chez nous 13.1 ; 14.4.
  - type: text
    content: 'Sur quoi trois mille hommes de Juda descendirent à la fente du rocher d''Etam et dirent à Samson : Ne sais-tu pas que les Philistins sont maîtres chez nous ? Qu''est-ce que tu nous as fait ? Il leur répondit : Je les ai traités comme ils m''ont traité. '
  '12':
  - type: text
    content: 'Ils lui dirent : Nous sommes descendus pour te lier, afin de te livrer aux Philistins. Samson leur dit : Jurez-moi que vous ne m''exécuterez pas. '
  '13':
  - type: note
    content: cordes neuves 16.11n.
  - type: text
    content: 'Ils lui répondirent : Non ! Nous voulons seulement te lier et te livrer à eux ; nous ne te mettrons pas à mort. Ils le lièrent avec deux cordes neuves et le firent remonter du rocher.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'en poussant des cris  : autre traduction en lançant des acclamations  ; cf. 7.21 ; Jos 6.5,10,16,20. –  le souffle du Seigneur 3.10+ ; 14.6 ; voir esprit. –  Les cordes…  : cf. 16.9. –  tombèrent  : litt. fondirent.'
  - type: text
    content: 'Lorsqu''il arriva à Léhi, les Philistins vinrent à sa rencontre en poussant des cris. Alors le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''empara de lui. Les cordes qu''il avait aux bras devinrent comme du lin brûlé par le feu, et ses liens tombèrent de ses mains. '
  '15':
  - type: note
    content: 'une mâchoire  : cf. v. 9n  ; voir aussi 14.8-9+.'
  - type: text
    content: 'Il trouva une mâchoire d''âne fraîche, tendit la main et la prit ; avec elle il tua mille hommes. '
  '16':
  - type: note
    content: 'un âne parmi les ânes  : traduction incertaine, litt. un âne (de) deux ânes  ; mais il pourrait aussi s''agir d''un homonyme  : un tas, deux tas (de cadavres)  ; d''après des versions anciennes, certains modifient légèrement la vocalisation traditionnelle de l''hébreu (tout en conservant l''assonance) pour lire je les ai mis en tas  ; une racine de même forme évoque la couleur rouge.'
  - type: text
    content: 'Samson dit :'
  - type: text
    content: Avec la mâchoire de l'âne,
  - type: text
    content: un âne parmi les ânes,
  - type: text
    content: avec la mâchoire de l'âne
  - type: text
    content: j'ai abattu mille hommes.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'il jeta  : litt. il jeta de sa main . –  Ramath-Léhi  : hauteur de la mâchoire , cf. v. 9n.'
  - type: text
    content: 'Quand il eut achevé de parler, il jeta la mâchoire. Et on appela ce lieu Ramath-Léhi. '
  '18':
  - type: note
    content: 'qui as réalisé…  : litt. qui as donné dans (ou par) ma main ce grand salut. –  vais-je mourir…  : cf. Gn 25.32. –  incirconcis 14.3n  ; voir circoncision.'
  - type: text
    content: 'Pressé par la soif, il invoqua le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en disant : C''est toi qui as réalisé cette grande victoire par moi, ton serviteur ; et maintenant, vais-je mourir de soif et tomber aux mains des incirconcis ? '
  '19':
  - type: note
    content: 'Cf. Ex 17.6 ; Ps 78.15s. –  la cavité ou le mortier  : le terme hébreu maktesh désigne une dépression circulaire, grande ou petite, comme il y en a beaucoup dans le désert de Juda. –  Eïn-Qoré peut signifier source de celui qui invoque ou qui appelle (v. 18), mais aussi source de la perdrix.'
  - type: text
    content: 'Dieu fendit donc la cavité qui est à Léhi, et il en sortit de l''eau. Samson but, son souffle lui revint, et il reprit vie. C''est pourquoi on a appelé cette source du nom d''Eïn-Qoré (« Source de celui qui invoque »). Elle est à Léhi, jusqu''à ce jour. '
  '2':
  - type: note
    content: 'que tu ne l''aimais pas  : litt. que tu la détestais (ou que tu la haïssais) ; cf. 14.16ns ; voir aussi Dt 21.15n  ; 22.13n  ; 24.3. –  je l''ai donnée… v. 6 ; 14.20 ; cf. Dt 24.1 ; Jr 3.1. –  Prends-la  : litt. qu''elle soit à toi.'
  - type: text
    content: 'Le père de sa femme dit : J''étais persuadé que tu ne l''aimais pas, et je l''ai donnée à ton compagnon. Sa jeune sœur n''est-elle pas mieux qu''elle ? Prends-la à sa place, je t''en prie ! '
  '20':
  - type: note
    content: 'Samson fut juge  : litt. il jugea, cf. 2.16n  ; cf. 16.31.'
  - type: text
    content: Samson fut juge en Israël, aux jours des Philistins, pendant vingt ans.
  '3':
  - type: note
    content: Cf. 14.4. –  je ne serai pas coupable ou, selon la traduction habituelle du verbe hébreu, je suis innocent.
  - type: text
    content: 'Samson leur dit : Cette fois je ne serai pas coupable envers les Philistins, si je leur fais du mal. '
  '4':
  - type: note
    content: 'renards  : autre traduction chacals.'
  - type: text
    content: 'Samson s''en alla donc. Il attrapa trois cents renards ; il prit des torches, tourna les renards queue contre queue et attacha une torche entre deux queues, au milieu. '
  '5':
  - type: note
    content: 'jusqu''aux plantations d''oliviers  : autre traduction jusqu''aux vignes et aux oliviers  ; cf. 2S 14.30.'
  - type: text
    content: Il mit le feu aux torches, lâcha les renards dans les blés des Philistins et incendia aussi bien les meules que le blé sur pied, et jusqu'aux plantations d'oliviers.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'V. 2+. –  elle et son père  : certaines versions anciennes ont lu elle et la maison de son père (ou sa famille ), comme en 14.15n.'
  - type: text
    content: 'Les Philistins dirent : Qui a fait cela ? On répondit : C''est Samson, le gendre du Timnite, parce que celui-ci a pris sa femme et l''a donnée à son compagnon. Alors les Philistins montèrent et la brûlèrent, elle et son père. '
  '7':
  - type: text
    content: 'Samson leur dit : Puisque vous agissez ainsi, je n''aurai de cesse que je ne me sois vengé de vous. '
  '8':
  - type: note
    content: 'à plate couture  : traduction incertaine ; litt. cuisse sur hanche ( ?) ; les termes hébreux sont à peu près synonymes. –  leur infligeant une grande défaite  : cf. 11.33n  ; 1S 4.10n  ; 23.5. –  Etam  : en Juda (v. 9-11), localisation incertaine ; il ne s''agit sans doute pas du même lieu qu''en 2Ch 11.6.'
  - type: text
    content: Il les battit à plate couture, leur infligeant une grande défaite ; puis il descendit et se retira dans la fente du rocher d'Etam.
  - type: heading
    content: Samson et la mâchoire d'âne
  '9':
  - type: text
    content: ' '
  - type: note
    content: Léhi signifie mâchoire (v. 15-17) ; cf. 2S 23.11.
  - type: text
    content: 'Alors les Philistins montèrent, dressèrent leur camp en Juda et se déployèrent jusqu''à Léhi. '
