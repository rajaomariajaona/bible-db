document_id: DEU.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les prémices et la confession de foi
  - type: text
    content: ' '
  - type: note
    content: 25.19.
  - type: text
    content: 'Lorsque tu seras entré dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne comme patrimoine, lorsque tu en auras pris possession et que tu l''habiteras, '
  '10':
  - type: note
    content: 'prémices v. 2+. –  devant le Seigneur  : cf. 12.7+ ; voir aussi 27.7.'
  - type: text
    content: 'Maintenant j''apporte les prémices du fruit de la terre que tu m''as donnée, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! »'
  - type: text
    content: 'Tu les déposeras devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, et tu te prosterneras devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu. '
  '11':
  - type: note
    content: lévite 12.12. –  immigré 10.18+. –  pour tous les biens ou pour tout le bonheur (cf. 4.40n).
  - type: text
    content: 'Puis tu te réjouiras, avec le lévite et avec l''immigré qui sont en ton sein, pour tous les biens que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a donnés, à toi et à ta maison.'
  - type: heading
    content: La dîme de la troisième année
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'tes revenus  : autre traduction tes récoltes  ; 14.22+,28ns. – Voir lévite.'
  - type: text
    content: 'Lorsque tu auras achevé de prendre toute la dîme de tes revenus, la troisième année, l''année de la dîme, tu la donneras au lévite, à l''immigré, à l''orphelin et à la veuve ; ils mangeront et seront rassasiés dans tes villes. '
  '13':
  - type: note
    content: 'devant le Seigneur v. 10. –  J''ai ôté  : le verbe correspondant peut être traduit par éliminer, comme en 13.6n  ; de même au v. 14 où il faut sans doute voir une allusion à un rituel non conforme à la loi. –  que tu as institués pour moi  : autre traduction que tu m''as donnés. –  passé outre  : cf. 17.2+.'
  - type: text
    content: 'Tu diras devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu : J''ai ôté de ma maison ce qui est consacré et je l''ai donné au lévite, à l''immigré, à l''orphelin et à la veuve, selon tous les commandements que tu as institués pour moi ; je n''ai passé outre à aucun de tes commandements, je n''en ai oublié aucun. '
  '14':
  - type: note
    content: 'quand j''étais impur  : autre traduction pour un usage impur. Voir pur. –  pour un mort 14.1n. –  écouté le Seigneur ou obéi au Seigneur, cf. 4.30n.'
  - type: text
    content: 'Je n''ai rien mangé de cela quand j''étais en deuil, je n''en ai rien ôté quand j''étais impur et je n''en ai rien donné pour un mort ; j''ai écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu ; j''ai fait exactement ce que tu m''as ordonné. '
  '15':
  - type: note
    content: 'Penche-toi Ps 102.20. –  séjour  : même terme en 1S 2.29n  ; Jr 25.30 ; So 3.7 ; Za 2.17 ; Ps 26.8 ; 68.6 ; 2Ch 30.27 ; 36.15 ; il a été traduit par repaire en Jr 9.10 ; 10.22 ; 49.33 ; 51.37 ; Na 2.12 ; par refuge en Ps 71.3 ; 90.1 ; 91.9 ; par tanière en Jb 37.8 ; 38.40. –  sacré ou saint, cf. v. 19 ; autre traduction du séjour de ta sainteté. – Voir bénédiction. –  juré 1.8+.'
  - type: text
    content: Penche-toi de ton séjour sacré, du ciel ; bénis Israël, ton peuple, et la terre que tu nous as donnée, comme tu l'avais juré à nos pères – ce pays ruisselant de lait et de miel.
  - type: heading
    content: Israël, peuple du Seigneur
  '16':
  - type: text
    content: ' '
  - type: note
    content: En ce jour 1.10+. –  tu les observeras… 4.6n. –  de tout ton cœur et de toute ton âme (voir Gn 1.20n) 4.29+.
  - type: text
    content: 'En ce jour, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''ordonne de mettre en pratique ces prescriptions et ces règles ; tu les observeras et tu les mettras en pratique, de tout ton cœur et de toute ton âme. '
  '17':
  - type: note
    content: 'promettre  : litt. dire, de même au v. 18.'
  - type: text
    content: 'Aujourd''hui, tu as fait promettre au '
  - type: text
    content: Seigneur
  - type: text
    content: ' d''être ton Dieu, afin que tu suives ses voies, que tu observes ses prescriptions, ses commandements et ses règles, et que tu l''écoutes ; '
  '18':
  - type: note
    content: 7.6+.
  - type: text
    content: 'aujourd''hui, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a fait promettre d''être son bien propre, comme il te l''a dit, et d''observer tous ses commandements, '
  '19':
  - type: note
    content: 'très haut 28.1 ; c''est le même terme qui, appliqué à Dieu, est rendu par Très-Haut (Gn 14.18n). –  en honneur, en renom  : litt. en louange, en nom  ; cf. Jr 13.11. –  peuple saint 7.6+.'
  - type: text
    content: 'afin qu''il te place très haut en honneur, en renom et en splendeur, au-dessus de toutes les nations qu''il a créées, et que tu sois un peuple saint pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, comme il te l''a dit.'
  '2':
  - type: note
    content: 'prémices v. 10 ; 18.4 ; Ex 23.19 ; 34.26 ; Lv 23.10. –  de tout le fruit (ou de tous les produits) de la terre (Gn 2.5n) : cf. Gn 4.3. –  corbeille 28.5,17. –  au lieu que… 12.5+. –  y faire demeurer son nom 14.23 ; 16.2.'
  - type: text
    content: 'tu prendras des prémices de tout le fruit de la terre que tu recueilleras de ton pays, celui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne ; tu les mettras dans une corbeille et tu iras au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, choisira pour y faire demeurer son nom. '
  '3':
  - type: note
    content: 1.8+.
  - type: text
    content: 'Tu iras vers le prêtre qui sera en fonction en ces jours-là et tu lui diras : « Je déclare aujourd''hui au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, que je suis entré dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a juré à nos pères de nous donner. » '
  '4':
  - type: text
    content: 'Le prêtre prendra la corbeille de ta main et la déposera devant l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu. '
  '5':
  - type: note
    content: 'Les v. 5-10 sont une ancienne confession de foi, sans doute prononcée à l''origine lors d''une fête de la récolte (v. 2-4) ; cf. 6.21-23 ; 11.3-6 ; Jos 24.2-13 ; Ps 105 ; 136. –  un Araméen Gn 25.20 ; 28.5 ; 31.20,24 ; vraisemblablement il s''agit ici de Jacob (cf. 1S 12.8) ; voir aussi Ez 16.3n. –  nomade  : litt. perdu, c.-à-d. errant  ; cf. Jr 50.6 ; Ez 34.4,16 ; Ps 119.176 ; Lc 15.4-6. –  il est descendu en Egypte Gn 12.10n  ; 46.8-26 ; Ac 7.15. –  avec peu de gens (litt. d''hommes) : même expression en 28.62 ; cf. 4.27n  ; 10.22. –  pour y séjourner en immigré  : cf. 10.19+ ; Ex 12.48n. –  une nation grande…  : cf. 7.7 ; Ex 1.7+.'
  - type: text
    content: 'Et toi, tu diras devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu : « Mon père était un Araméen nomade ; il est descendu en Egypte avec peu de gens pour y séjourner en immigré ; là, il est devenu une nation grande, forte et nombreuse. '
  '6':
  - type: note
    content: Ex 1.11-14 ; Nb 20.15. –  affligés 8.2n.
  - type: text
    content: 'Les Egyptiens nous ont maltraités, affligés et soumis à un dur esclavage. '
  '7':
  - type: note
    content: Ex 2.23-25. –  Dieu de nos pères 1.11+.
  - type: text
    content: 'Nous avons crié vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de nos pères. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a entendus et il a vu notre affliction, notre peine et notre oppression. '
  '8':
  - type: note
    content: 4.34+.
  - type: text
    content: 'D''une main forte, d''un bras étendu, par une grande terreur, avec des signes et des prodiges, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a fait sortir d''Egypte. '
  '9':
  - type: note
    content: 11.9 ; Ex 3.8n.
  - type: text
    content: 'Il nous a amenés dans ce lieu et il nous a donné ce pays, un pays ruisselant de lait et de miel. '
