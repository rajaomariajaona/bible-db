      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 25.19.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque tu seras entré dans le pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, te donne comme patrimoine, lorsque tu en auras pris possession et que tu l''habiteras, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prémices '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 10 ; 18.4 ; Ex 23.19 ; 34.26 ; Lv 23.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de tout le fruit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de tous les produits
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de la terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Gn 2.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : cf. Gn 4.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'corbeille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '28.5,17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au lieu que… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.5+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'y faire demeurer son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.23 ; 16.2.
    marker-yv: yv-n
  - type: text
    text: 'tu prendras des prémices de tout le fruit de la terre que tu recueilleras de ton pays, celui que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, te donne ; tu les mettras dans une corbeille et tu iras au lieu que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, choisira pour y faire demeurer son nom. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.8+.
    marker-yv: yv-n
  - type: text
    text: 'Tu iras vers le prêtre qui sera en fonction en ces jours-là et tu lui diras : « Je déclare aujourd''hui au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, que je suis entré dans le pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a juré à nos pères de nous donner. » '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le prêtre prendra la corbeille de ta main et la déposera devant l''autel du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 5-10 sont une ancienne confession de foi, sans doute prononcée à l''origine lors d''une fête de la récolte (v. 2-4) ; cf. 6.21-23 ; 11.3-6 ; Jos 24.2-13 ; Ps 105 ; 136. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un Araméen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 25.20 ; 28.5 ; 31.20,24 ; vraisemblablement il s'agit ici de Jacob (cf. 1S 12.8) ; voir aussi Ez 16.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nomade
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: perdu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: errant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jr 50.6 ; Ez 34.4,16 ; Ps 119.176 ; Lc 15.4-6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il est descendu en Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 12.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 46.8-26 ; Ac 7.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avec peu de gens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : même expression en 28.62 ; cf. 4.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 10.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour y séjourner en immigré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.19+ ; Ex 12.48'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une nation grande…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.7 ; Ex 1.7+.'
    marker-yv: yv-n
  - type: text
    text: 'Et toi, tu diras devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu : « Mon père était un Araméen nomade ; il est descendu en Egypte avec peu de gens pour y séjourner en immigré ; là, il est devenu une nation grande, forte et nombreuse. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 1.11-14 ; Nb 20.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'affligés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Egyptiens nous ont maltraités, affligés et soumis à un dur esclavage. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 2.23-25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dieu de nos pères '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.11+.
    marker-yv: yv-n
  - type: text
    text: 'Nous avons crié vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu de nos pères. Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous a entendus et il a vu notre affliction, notre peine et notre oppression. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.34+.
    marker-yv: yv-n
  - type: text
    text: 'D''une main forte, d''un bras étendu, par une grande terreur, avec des signes et des prodiges, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous a fait sortir d''Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 11.9 ; Ex 3.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il nous a amenés dans ce lieu et il nous a donné ce pays, un pays ruisselant de lait et de miel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prémices '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'devant le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.7+ ; voir aussi 27.7.'
    marker-yv: yv-n
  - type: text
    text: 'Maintenant j''apporte les prémices du fruit de la terre que tu m''as donnée, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! »'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tu les déposeras devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, et tu te prosterneras devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.11 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévite
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'immigré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.18+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour tous les biens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour tout le bonheur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 4.40
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Puis tu te réjouiras, avec le lévite et avec l''immigré qui sont en ton sein, pour tous les biens que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, t''a donnés, à toi et à ta maison.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La dîme de la troisième année
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tes revenus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tes récoltes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; 14.22+,28
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévite
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque tu auras achevé de prendre toute la dîme de tes revenus, la troisième année, l''année de la dîme, tu la donneras au lévite, à l''immigré, à l''orphelin et à la veuve ; ils mangeront et seront rassasiés dans tes villes. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'devant le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: J'ai ôté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe correspondant peut être traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: éliminer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 13.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; de même au v. 14 où il faut sans doute voir une allusion à un rituel non conforme à la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que tu as institués pour moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que tu m'as donnés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: passé outre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.2+.'
    marker-yv: yv-n
  - type: text
    text: 'Tu diras devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu : J''ai ôté de ma maison ce qui est consacré et je l''ai donné au lévite, à l''immigré, à l''orphelin et à la veuve, selon tous les commandements que tu as institués pour moi ; je n''ai passé outre à aucun de tes commandements, je n''en ai oublié aucun. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quand j'étais impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour un usage impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour un mort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'écouté le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'obéi au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 4.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je n''ai rien mangé de cela quand j''étais en deuil, je n''en ai rien ôté quand j''étais impur et je n''en ai rien donné pour un mort ; j''ai écouté le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', mon Dieu ; j''ai fait exactement ce que tu m''as ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
