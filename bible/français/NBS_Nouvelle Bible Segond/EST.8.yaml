  - type: text
    text: En chaque province, en chaque ville, en tout lieu atteint par l'ordre et l'édit du roi, il y eut parmi les Juifs joie et gaieté, banquets et jour de fête. Beaucoup parmi les peuples du pays se firent Juifs, car la frayeur des Juifs s'était abattue sur eux.
