    marker-yv: yv-n
  - type: text
    text: 'Esther parla encore au roi, en tombant à ses pieds et en pleurant ; elle le supplia de déjouer le projet malveillant de Haman, l''Agaguite, le plan qu''il avait conçu contre les Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.11+.
    marker-yv: yv-n
  - type: text
    text: 'Le roi tendit le sceptre d''or à Esther. Alors Esther se releva et se présenta devant le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2.9 ; 5.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: révoquer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faire revenir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 8 ; 1.19.'
    marker-yv: yv-n
  - type: text
    text: 'Si cela te semble bon, dit-elle, et si j''ai trouvé grâce à tes yeux, si la chose te convient, ô roi, et si je te plais, qu''on écrive pour révoquer les lettres conçues par Haman, fils de Hammedata, l''Agaguite, et rédigées dans le dessein de faire disparaître les Juifs dans toutes les provinces du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comment pourrais-je regarder le malheur qui va trouver mon peuple, comment pourrais-je regarder la disparition de ma parenté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(terme traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'origines '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 2.10,20) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ' ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 7.4.
    marker-yv: yv-n
  - type: text
    text: Comment pourrais-je donc supporter de voir le malheur atteindre mon peuple ? Comment pourrais-je supporter de voir les miens disparaître ?
- type: usfm
  marker: p
