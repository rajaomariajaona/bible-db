    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bon jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 9.17,19,22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du pays '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
