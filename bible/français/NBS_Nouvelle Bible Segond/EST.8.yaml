      - type: text
        text: 'V. 7 ; cf. 1R 21.15s ; voir aussi Ps 39.7 ; 49.18 ; Jb 27.17 ; Pr 13.22 ; Ec 2.21 ; Lc 12.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Esther avait dit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.10.
    marker-yv: yv-n
  - type: text
    text: 'Ce même jour, le roi Xerxès fit don à la reine Esther de la maison de Haman, l''adversaire des Juifs, et Mardochée se présenta devant le roi, car Esther avait dit ce qu''il était pour elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bague à cachet '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à la tête…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur la maison de Haman
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 41.40 ; Dn 2.48.'
    marker-yv: yv-n
  - type: text
    text: Alors le roi retira la bague à cachet qu'il avait reprise à Haman et la donna à Mardochée. De son côté, Esther plaça Mardochée à la tête de la maison de Haman.
- type: usfm
  marker: s1
  children:
  - type: text
