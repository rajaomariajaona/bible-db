document_id: EST.8,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: V. 7 ; cf. 1R 21.15s ; voir aussi Ps 39.7 ; 49.18 ; Jb 27.17 ; Pr 13.22 ; Ec 2.21 ; Lc 12.20. –  Esther avait dit 2.10.
  - type: text
    content: 'Ce même jour, le roi Xerxès fit don à la reine Esther de la maison de Haman, l''adversaire des Juifs, et Mardochée se présenta devant le roi, car Esther avait dit ce qu''il était pour elle. '
  '10':
  - type: note
    content: 'On écrivit  : autre traduction il écrivit (même possibilité dans la suite du v.). –  pur-sang sélectionnés dans les haras de l''Etat  : traduction incertaine d''un mot hébreu d''origine perse, de même au v. 14 ; d''autres pensent qu''il s''agit de mulets.'
  - type: text
    content: 'On écrivit les lettres au nom du roi Xerxès, on les scella avec le cachet du roi et on les envoya par l''intermédiaire des courriers à cheval, montant des pur-sang sélectionnés dans les haras de l''Etat. '
  '11':
  - type: note
    content: 'Cf. 3.13 ; 9.2-16 ; Jr 50.29 ; Ez 39.10 ; Ps 109.16-19 ; 137.8s ; Jb 27.13-23 ; Ap 18.6. –  se rassembler  : le verbe hébreu correspondant évoque habituellement l’assemblée cultuelle (cf. 9.2,15ss). –  pour défendre leur vie  : litt. pour leur être (sur ce terme, voir Gn 1.20n). –  qui les persécuteraient  : litt. d''adversaires, comme en 3.10+. –  Ils pouvaient  : sous-entendu dans le texte.'
  - type: text
    content: 'Le roi autorisait les Juifs de toute ville à se rassembler pour défendre leur vie, à détruire, à tuer, et à faire disparaître toutes les troupes populaires ou provinciales qui les persécuteraient, avec leurs femmes et toutes leurs familles. Ils pouvaient les piller pour en prendre du butin. '
  '12':
  - type: note
    content: Cf. 3.7n,13+ ; 9.1.
  - type: text
    content: 'Cela, en un seul jour, dans toutes les provinces du roi Xerxès, le treize du douzième mois – le mois d''Adar. '
  '13':
  - type: note
    content: 3.15 ; 9.14.
  - type: text
    content: 'Il y avait une copie de l''écrit pour communiquer à chaque province l''édit qui devait être rendu public parmi tous les peuples, afin que les Juifs se tiennent prêts ce jour-là à se venger de leurs ennemis. '
  '14':
  - type: note
    content: 'V. 10n. –  à bride abattue  : litt. se dépêchant et se hâtant. –  Suse la citadelle 1.2n.'
  - type: text
    content: Les courriers montant des pur-sang sélectionnés dans les haras de l'Etat sortirent, à bride abattue, par ordre du roi, et l'édit fut communiqué à Suse la citadelle.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.6,11+ ; 6.8. –  de lin  : autre traduction blancs  ; cf. 1.6n. –  byssos  : cf. 1Ch 4.21n. –  Suse était en liesse  : cf. 3.15+.'
  - type: text
    content: 'Mardochée se retira de devant le roi, en vêtements royaux de pourpre violette et de lin, portant une grande couronne d''or et un manteau de byssos et de pourpre rouge. La ville de Suse était en liesse et en joie. '
  '16':
  - type: text
    content: 'Les Juifs étaient rayonnants de joie et de gaieté, et comblés d''honneurs. '
  '17':
  - type: note
    content: 'jour de fête  : litt. bon jour  ; cf. 9.17,19,22. –  du pays ou de la terre. –  se firent Juifs 9.27 ; cf. Ex 12.49 ; Es 56.3,6 ; le texte grec porte beaucoup d''entre les nations (ou beaucoup de non-Juifs) se soumettaient à la circoncision et se faisaient Juifs. –  la frayeur des Juifs (c.-à-d. la frayeur qu''inspiraient les Juifs) s''était abattue sur eux (litt. était tombée sur eux) : cf. 6.13n  ; de même en 9.2ns.'
  - type: text
    content: En chaque province, en chaque ville, en tout lieu atteint par l'ordre et l'édit du roi, il y eut parmi les Juifs joie et gaieté, banquets et jour de fête. Beaucoup parmi les peuples du pays se firent Juifs, car la frayeur des Juifs s'était abattue sur eux.
  '2':
  - type: note
    content: 'bague à cachet 3.10+. –  à la tête…  : litt. sur la maison de Haman  ; cf. Gn 41.40 ; Dn 2.48.'
  - type: text
    content: Alors le roi retira la bague à cachet qu'il avait reprise à Haman et la donna à Mardochée. De son côté, Esther plaça Mardochée à la tête de la maison de Haman.
  - type: heading
    content: Edit royal en faveur des Juifs
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'parla encore  : cf. 1.18. –  tombant  : cf. 6.13n. –  déjouer…  : litt. faire passer le mal de Haman . –  l''Agaguite 3.1n.'
  - type: text
    content: 'Esther parla encore au roi, en tombant à ses pieds et en pleurant ; elle le supplia de déjouer le projet malveillant de Haman, l''Agaguite, le plan qu''il avait conçu contre les Juifs. '
  '4':
  - type: note
    content: 4.11+.
  - type: text
    content: 'Le roi tendit le sceptre d''or à Esther. Alors Esther se releva et se présenta devant le roi. '
  '5':
  - type: note
    content: 'Si… 1.19n  ; 2.9 ; 5.8. –  révoquer  : litt. faire revenir  ; cf. v. 8 ; 1.19.'
  - type: text
    content: 'Si cela te semble bon, dit-elle, et si j''ai trouvé grâce à tes yeux, si la chose te convient, ô roi, et si je te plais, qu''on écrive pour révoquer les lettres conçues par Haman, fils de Hammedata, l''Agaguite, et rédigées dans le dessein de faire disparaître les Juifs dans toutes les provinces du roi. '
  '6':
  - type: note
    content: Litt. comment pourrais-je regarder le malheur qui va trouver mon peuple, comment pourrais-je regarder la disparition de ma parenté (terme traduit par origines en 2.10,20)  ? cf. 7.4.
  - type: text
    content: Comment pourrais-je donc supporter de voir le malheur atteindre mon peuple ? Comment pourrais-je supporter de voir les miens disparaître ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: '7.9–8.1. –  reine Esther / Juif Mardochée  : cf. 9.29. –  pour avoir porté la main  : cf. 2.21-23.'
  - type: text
    content: 'Le roi Xerxès dit à la reine Esther et au Juif Mardochée : J''ai donné à Esther la maison de Haman ; lui, on l''a pendu à la potence pour avoir porté la main sur les Juifs. '
  '8':
  - type: note
    content: 'comme bon vous semble  : expression traduite ailleurs comme cela vous plaira  ; cf. Jg 21.25. –  le cachet ou la bague à cachet  ; cf. v. 2 ; 3.10+. –  on ne peut l''annuler  : cf. v. 5+ ; 1.19n.'
  - type: text
    content: 'Vous, au nom du roi, écrivez comme bon vous semble au sujet des Juifs, et scellez-le avec le cachet du roi. Car un écrit fait au nom du roi et scellé avec le cachet du roi, on ne peut l''annuler. '
  '9':
  - type: note
    content: 'Cf. 3.12. –  Sivân  : mai-juin. –  dispositions  : litt. ordres  ; cf. 3.12. –  cent vingt-sept provinces 1.1+.'
  - type: text
    content: 'On convoqua les scribes du roi ce même jour, qui était le vingt-troisième du troisième mois, le mois de Sivân, et on écrivit toutes les dispositions de Mardochée pour les Juifs à l''intention des satrapes et des gouverneurs, des princes de toutes les provinces depuis l''Inde jusqu''à Koush, cent vingt-sept provinces, à chaque province dans son écriture, à chaque peuple dans sa langue, aux Juifs en particulier dans leur écriture et dans leur langue. '
