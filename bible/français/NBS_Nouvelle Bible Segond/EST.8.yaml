    - type: usfm
      marker: fq
      children:
      - type: text
        text: Suse était en liesse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 3.15+.'
    marker-yv: yv-n
  - type: text
    text: 'Mardochée se retira de devant le roi, en vêtements royaux de pourpre violette et de lin, portant une grande couronne d''or et un manteau de byssos et de pourpre rouge. La ville de Suse était en liesse et en joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les Juifs étaient rayonnants de joie et de gaieté, et comblés d''honneurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
