    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour avoir porté la main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2.21-23.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi Xerxès dit à la reine Esther et au Juif Mardochée : J''ai donné à Esther la maison de Haman ; lui, on l''a pendu à la potence pour avoir porté la main sur les Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme bon vous semble
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : expression traduite ailleurs '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme cela vous plaira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jg 21.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le cachet '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la bague à cachet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 2 ; 3.10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on ne peut l'annuler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 5+ ; 1.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous, au nom du roi, écrivez comme bon vous semble au sujet des Juifs, et scellez-le avec le cachet du roi. Car un écrit fait au nom du roi et scellé avec le cachet du roi, on ne peut l''annuler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 3.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sivân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : mai-juin. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dispositions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ordres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 3.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cent vingt-sept provinces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.1+.
    marker-yv: yv-n
  - type: text
    text: 'On convoqua les scribes du roi ce même jour, qui était le vingt-troisième du troisième mois, le mois de Sivân, et on écrivit toutes les dispositions de Mardochée pour les Juifs à l''intention des satrapes et des gouverneurs, des princes de toutes les provinces depuis l''Inde jusqu''à Koush, cent vingt-sept provinces, à chaque province dans son écriture, à chaque peuple dans sa langue, aux Juifs en particulier dans leur écriture et dans leur langue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On écrivit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il écrivit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même possibilité dans la suite du v.). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pur-sang sélectionnés dans les haras de l'Etat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine d''un mot hébreu d''origine perse, de même au v. 14 ; d''autres pensent qu''il s''agit de mulets.'
    marker-yv: yv-n
  - type: text
    text: 'On écrivit les lettres au nom du roi Xerxès, on les scella avec le cachet du roi et on les envoya par l''intermédiaire des courriers à cheval, montant des pur-sang sélectionnés dans les haras de l''Etat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 3.13 ; 9.2-16 ; Jr 50.29 ; Ez 39.10 ; Ps 109.16-19 ; 137.8s ; Jb 27.13-23 ; Ap 18.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se rassembler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu correspondant évoque habituellement l’'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'assemblée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cultuelle (cf. 9.2,15ss). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour défendre leur vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour leur être '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (sur ce terme, voir Gn 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui les persécuteraient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'adversaires
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 3.10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils pouvaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi autorisait les Juifs de toute ville à se rassembler pour défendre leur vie, à détruire, à tuer, et à faire disparaître toutes les troupes populaires ou provinciales qui les persécuteraient, avec leurs femmes et toutes leurs familles. Ils pouvaient les piller pour en prendre du butin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 3.7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',13+ ; 9.1.'
    marker-yv: yv-n
  - type: text
    text: 'Cela, en un seul jour, dans toutes les provinces du roi Xerxès, le treize du douzième mois – le mois d''Adar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.15 ; 9.14.
    marker-yv: yv-n
  - type: text
    text: 'Il y avait une copie de l''écrit pour communiquer à chaque province l''édit qui devait être rendu public parmi tous les peuples, afin que les Juifs se tiennent prêts ce jour-là à se venger de leurs ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à bride abattue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se dépêchant et se hâtant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Suse la citadelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Les courriers montant des pur-sang sélectionnés dans les haras de l'Etat sortirent, à bride abattue, par ordre du roi, et l'édit fut communiqué à Suse la citadelle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
