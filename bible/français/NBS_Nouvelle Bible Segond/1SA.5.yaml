document_id: 1SA.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le coffre de Dieu chez les Philistins
  - type: text
    content: ' '
  - type: note
    content: 'Philistins / Eben-Ezer  : cf. 4.1n. –  Ashdod  : l''une des cinq principales villes des Philistins (avec Gaza, Ashqelôn, Gath [v. 8] et Eqrôn [v. 10] ; voir 6.17 ; Jos 13.3 ; cf. Am 1.7s), dans la plaine côtière, au sud de Jaffa.'
  - type: text
    content: 'Les Philistins prirent le coffre de Dieu et l''emportèrent d''Eben-Ezer à Ashdod. '
  '10':
  - type: note
    content: 'Eqrôn  : cf. v. 1n. –  chez nous…  : litt. chez moi… pour me faire mourir, et mon peuple  ; cf. Ex 10.7. La ville est ici personnifiée, comme au v. 11.'
  - type: text
    content: 'Alors ils envoyèrent le coffre de Dieu à Eqrôn. Lorsque le coffre de Dieu entra dans Eqrôn, les Eqronites s''écrièrent : On a transféré chez nous le coffre du Dieu d''Israël pour nous faire mourir, nous et notre peuple ! '
  '11':
  - type: note
    content: 'à son lieu  : autre traduction chez lui. –  qu''il ne nous…  : litt. qu''il ne me fasse pas mourir, moi et mon peuple. –  une panique de mort  : l''expression est peut-être à comprendre comme un superlatif, une panique épouvantable  ; un ms de Qumrân porte une panique de YHWH (c.-à-d. provoquée par YHWH, le Seigneur). –  la main de Dieu  : autre traduction la main des dieux.'
  - type: text
    content: 'Ils firent chercher et rassemblèrent tous les princes de la confédération des Philistins. Ils dirent : Renvoyez le coffre du Dieu d''Israël ; qu''il retourne à son lieu et qu''il ne nous fasse pas mourir, nous et notre peuple ! Car dans toute la ville c''était une panique de mort : la main de Dieu s''y faisait très pesante. '
  '12':
  - type: note
    content: 'les appels au secours…  : cf. Ex 2.23 ; 2S 22.7.'
  - type: text
    content: Ceux qui ne mouraient pas étaient atteints de tumeurs, et les appels au secours de la ville montaient jusqu'au ciel.
  '2':
  - type: note
    content: 'la maison de Dagôn  : c.-à-d. le temple de Dagôn ; Dagôn ou Dagân (Jg 16.23 ; 1Ch 10.10) était un dieu agraire du panthéon proche-oriental, adoré en Syrie du Nord et en Canaan dès le IIIe millénaire av. J.-C. ; il avait été adopté par les Philistins. Son nom est identique à un mot hébreu qui désigne le blé. Certains cependant l''identifient aussi à un dieu de la mer, en le rapprochant d''un autre mot hébreu (dag) qui signifie poisson.'
  - type: text
    content: 'Les Philistins prirent le coffre de Dieu, ils l''amenèrent à la maison de Dagôn et le placèrent à côté de Dagôn. '
  '3':
  - type: note
    content: 'Le lendemain…  : LXX les Ashdodites se levèrent et se rendirent à la maison de Dagôn. –  tombé… devant le coffre  : cf. Es 19.1 ; 46.1 ; Ps 97.7. –  le remirent à sa place  : cf. Es 46.7 ; l''expression rendue par à sa place est traduite par à son lieu au v. 11 ; de même en 6.2.'
  - type: text
    content: 'Le lendemain, les Ashdodites se levèrent de bon matin : Dagôn était tombé face contre terre devant le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils prirent Dagôn et le remirent à sa place. '
  '4':
  - type: note
    content: 'gisaient  : sous-entendu dans le texte. –  détachées  : cf. Jr 10.14s ; Ez 6.6. –  sur le seuil ou sur l''estrade, cf. So 1.9n. –  que le tronc ou que le corps  ; litt. seul Dagôn restait sur lui-même  ; cf. Ps 115.1-8.'
  - type: text
    content: 'Le lendemain, ils se levèrent de bon matin : Dagôn était tombé face contre terre devant le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; la tête de Dagôn et ses deux mains gisaient, détachées, sur le seuil ; il ne lui restait que le tronc. '
  '5':
  - type: text
    content: C'est pourquoi les prêtres de Dagôn et tous ceux qui entrent dans la maison de Dagôn à Ashdod ne marchent pas sur le seuil de Dagôn, jusqu'à ce jour.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'se fit pesante  : cf. v. 11 ; Ps 32.4. –  tumeurs (ou abcès, bubons ) ou hémorroïdes  : la tradition juive présente deux variantes de lecture à cet endroit, de même dans la suite (mais pas en 6.11n,17) et en Dt 28.27 ; cf. Ps 78.66. –  à Ashdod et dans son territoire  : litt. Ashdod et son territoire.'
  - type: text
    content: 'La main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se fit pesante sur les Ashdodites ; il sema la dévastation parmi eux et les frappa de tumeurs, à Ashdod et dans son territoire. '
  '7':
  - type: note
    content: 'les gens  : autre traduction les hommes  ; même possibilité au v. 9. –  il nous traite durement  : litt. sa main est dure sur nous.'
  - type: text
    content: 'Voyant qu''il en était ainsi, les gens d''Ashdod dirent : Le coffre du Dieu d''Israël ne restera pas chez nous, car il nous traite durement, nous et Dagôn, notre dieu. '
  '8':
  - type: note
    content: 'Gath  : cf. v. 1n.'
  - type: text
    content: 'Ils firent chercher et rassemblèrent auprès d''eux tous les princes de la confédération des Philistins. Ils dirent : Que devons-nous faire du coffre du Dieu d''Israël ? Ils répondirent : Que le coffre du Dieu d''Israël soit transféré à Gath. On y transféra donc le coffre du Dieu d''Israël. '
  '9':
  - type: text
    content: 'Mais après ce transfert, la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur la ville, et ce fut une panique terrible ; il frappa les gens de la ville, depuis le plus petit jusqu''au plus grand : ils eurent une éruption de tumeurs. '
