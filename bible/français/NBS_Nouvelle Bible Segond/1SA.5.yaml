  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Philistins '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Eben-Ezer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 4.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ashdod
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : l''une des cinq principales villes des Philistins (avec Gaza, Ashqelôn, Gath [v. 8] et Eqrôn [v. 10] ; voir 6.17 ; Jos 13.3 ; cf. Am 1.7s), dans la plaine côtière, au sud de Jaffa.'
    marker-yv: yv-n
  - type: text
    text: 'Les Philistins prirent le coffre de Dieu et l''emportèrent d''Eben-Ezer à Ashdod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la maison de Dagôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le temple de Dagôn ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dagôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dagân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Jg 16.23 ; 1Ch 10.10) était un dieu agraire du panthéon proche-oriental, adoré en Syrie du Nord et en Canaan dès le III
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' millénaire av. J.-C. ; il avait été adopté par les Philistins. Son nom est identique à un mot hébreu qui désigne le blé. Certains cependant l''identifient aussi à un dieu de la mer, en le rapprochant d''un autre mot hébreu ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dag
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: poisson.
    marker-yv: yv-n
  - type: text
    text: 'Les Philistins prirent le coffre de Dieu, ils l''amenèrent à la maison de Dagôn et le placèrent à côté de Dagôn. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le lendemain…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les Ashdodites se levèrent et se rendirent à la maison de Dagôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tombé… devant le coffre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 19.1 ; 46.1 ; Ps 97.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le remirent à sa place
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 46.7 ; l''expression rendue par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à sa place '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à son lieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 11 ; de même en 6.2.
    marker-yv: yv-n
  - type: text
    text: 'Le lendemain, les Ashdodites se levèrent de bon matin : Dagôn était tombé face contre terre devant le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Ils prirent Dagôn et le remirent à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: gisaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: détachées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 10.14s ; Ez 6.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sur le seuil '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur l'estrade
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. So 1.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que le tronc '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que le corps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: seul Dagôn restait sur lui-même
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ps 115.1-8.'
    marker-yv: yv-n
  - type: text
    text: 'Le lendemain, ils se levèrent de bon matin : Dagôn était tombé face contre terre devant le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; la tête de Dagôn et ses deux mains gisaient, détachées, sur le seuil ; il ne lui restait que le tronc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C'est pourquoi les prêtres de Dagôn et tous ceux qui entrent dans la maison de Dagôn à Ashdod ne marchent pas sur le seuil de Dagôn, jusqu'à ce jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se fit pesante
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 11 ; Ps 32.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tumeurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: abcès, bubons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hémorroïdes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la tradition juive présente deux variantes de lecture à cet endroit, de même dans la suite (mais pas en 6.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',17) et en Dt 28.27 ; cf. Ps 78.66. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à Ashdod et dans son territoire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ashdod et son territoire.
    marker-yv: yv-n
  - type: text
    text: 'La main du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se fit pesante sur les Ashdodites ; il sema la dévastation parmi eux et les frappa de tumeurs, à Ashdod et dans son territoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même possibilité au v. 9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il nous traite durement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sa main est dure sur nous.
    marker-yv: yv-n
  - type: text
    text: 'Voyant qu''il en était ainsi, les gens d''Ashdod dirent : Le coffre du Dieu d''Israël ne restera pas chez nous, car il nous traite durement, nous et Dagôn, notre dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils firent chercher et rassemblèrent auprès d''eux tous les princes de la confédération des Philistins. Ils dirent : Que devons-nous faire du coffre du Dieu d''Israël ? Ils répondirent : Que le coffre du Dieu d''Israël soit transféré à Gath. On y transféra donc le coffre du Dieu d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais après ce transfert, la main du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fut sur la ville, et ce fut une panique terrible ; il frappa les gens de la ville, depuis le plus petit jusqu''au plus grand : ils eurent une éruption de tumeurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Eqrôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chez nous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chez moi… pour me faire mourir, et mon peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 10.7. La ville est ici personnifiée, comme au v. 11.'
    marker-yv: yv-n
  - type: text
    text: 'Alors ils envoyèrent le coffre de Dieu à Eqrôn. Lorsque le coffre de Dieu entra dans Eqrôn, les Eqronites s''écrièrent : On a transféré chez nous le coffre du Dieu d''Israël pour nous faire mourir, nous et notre peuple ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à son lieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chez lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'il ne nous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'il ne me fasse pas mourir, moi et mon peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une panique de mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''expression est peut-être à comprendre comme un superlatif, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une panique épouvantable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ' porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'une panique de YHWH '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'provoquée par YHWH, le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la main de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la main des dieux.
    marker-yv: yv-n
  - type: text
    text: 'Ils firent chercher et rassemblèrent tous les princes de la confédération des Philistins. Ils dirent : Renvoyez le coffre du Dieu d''Israël ; qu''il retourne à son lieu et qu''il ne nous fasse pas mourir, nous et notre peuple ! Car dans toute la ville c''était une panique de mort : la main de Dieu s''y faisait très pesante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les appels au secours…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 2.23 ; 2S 22.7.'
    marker-yv: yv-n
  - type: text
    text: Ceux qui ne mouraient pas étaient atteints de tumeurs, et les appels au secours de la ville montaient jusqu'au ciel.
