document_id: AMO.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Complainte funèbre sur Israël
  - type: text
    content: ' '
  - type: note
    content: 'complainte  : cf. v. 16s ; Ez 19.1 ; voir aussi 2S 1.17ss ; Jr 7.29 ; Mi 1.8 ; Lm.'
  - type: text
    content: Ecoutez cette parole, cette complainte que j'entonne sur vous, maison d'Israël !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.10ss. –  qui les accuse ou qui les avertit ; qui les reprend (Pr 1.23n) ; même expression en Es 29.21. –  à la porte ( de la ville est sous-entendu dans le texte) : lieu où l''on rendait la justice v. 12,15 ; Dt 16.18n  ; 25.7 ; Ps 127.5 ; Pr 31.23 ; Rt 4.1s.'
  - type: text
    content: Ils détestent celui qui les accuse à la porte de la ville
  - type: text
    content: et ils ont en abomination celui qui parle sincèrement.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'foulé… 4.1+. –  maisons… / vignes…  : cf. 3.15 ; 9.14 ; Dt 28.30ss,39 ; Es 65.21s ; Jr 31.5 ; Mi 6.14s ; So 1.13 ; voir aussi Za 5.3s.'
  - type: text
    content: Aussi, parce que vous avez foulé aux pieds le pauvre,
  - type: text
    content: et que vous avez pris de lui du blé en présent,
  - type: text
    content: vous avez bâti des maisons en pierres de taille,
  - type: text
    content: mais vous ne les habiterez pas ;
  - type: text
    content: vous avez planté d'excellentes vignes,
  - type: text
    content: mais vous n'en boirez pas le vin.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.6s. –  nombreux  : autre traduction graves  ; cf. Jr 30.14n. –  vous acceptez des pots-de-vin  : autre traduction possible vous rançonnez  ; le terme traduit par pots-de-vin a aussi le sens de rançon , cf. Ex 21.30n  ; Nb 35.31ns ; 1S 12.3n  ; Es 43.3 ; Jb 36.18n  ; voir expiation. –  vous écartez… Es 29.21.'
  - type: text
    content: Car, je le sais, vos transgressions sont multitude,
  - type: text
    content: vos péchés sont nombreux ;
  - type: text
    content: vous opprimez le juste, vous acceptez des pots-de-vin
  - type: text
    content: et à la porte de la ville vous écartez les pauvres.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'l''homme de bon sens se tait  : cf. 3.8 ; 7.15 ; Lc 23.9/ /. –  ces temps sont mauvais Mi 2.3 ; Ep 5.16.'
  - type: text
    content: Voilà pourquoi, en des temps comme ceux-ci, l'homme de bon sens se tait,
  - type: text
    content: car ces temps sont mauvais.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'cherchez v. 4n. –  mauvais / bon  : cf. v. 15 ; Es 5.20 ; Mi 3.2. –  soit avec vous Gn 26.3 ; 28.15 ; 31.3 ; Ex 3.12 ; Nb 14.42 ; 23.21 ; Jos 1.5 ; 3.7 ; Jg 1.19 ; 6.13,16. –  comme vous le dites  : cf. v. 18 ; 9.10 ; Jr 7.4 ; Mi 3.11.'
  - type: text
    content: Ne cherchez pas ce qui est mauvais, mais ce qui est bon,
  - type: text
    content: afin que vous viviez,
  - type: text
    content: 'et qu''ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées, soit avec vous,'
  - type: text
    content: comme vous le dites.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Détestez ce qui est mauvais… Ps 97.10 ; Pr 8.13 ; Rm 12.9 ; cf. Dt 30.19s. –  faites régner  : litt. placez . –  équité v. 7n,24 ; Es 1.17. –  Dieu des Armées 3.13n. –  fera-t-il grâce… Dt 32.36. –  reste v. 3 ; 3.12+ ; 4.6ss ; 9.8 ; Es 1.9+. –  Joseph v. 6n.'
  - type: text
    content: Détestez ce qui est mauvais, aimez ce qui est bon,
  - type: text
    content: faites régner l'équité à la porte de la ville ;
  - type: text
    content: 'peut-être le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées, fera-t-il grâce'
  - type: text
    content: au reste de Joseph.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1 ; 8.10 ; Es 15.3 ; Jr 9.9,16-20.
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu des Armées, le Seigneur :'
  - type: text
    content: Sur toutes les places, on se lamentera ;
  - type: text
    content: 'dans toutes les rues, on dira : Hélas ! hélas !'
  - type: text
    content: On appellera le laboureur au deuil,
  - type: text
    content: et aux lamentations ceux qui s'y connaissent en chants funèbres.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Dans toutes les vignes Es 16.9s ; Jr 48.33 ; cf. Ps 4.8. –  je passerai…  : cf. Ex 12.12 ; Es 5.5ss.'
  - type: text
    content: Dans toutes les vignes, on se lamentera,
  - type: text
    content: lorsque je passerai au milieu de toi,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Le jour du Seigneur
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'le jour du Seigneur 2.16+ ; Jl 1.15+ss ; cf. Es 2.6ss ; Jr 30.5ss ; Ez 22.24 ; So 1.17s ; Lm 2.22. –  Qu''attendez-vous  : litt. pourquoi cela pour vous  ; autre traduction à quoi bon pour vous . –  lumière / ténèbres  : cf. v. 20 ; Es 5.20 ; 8.23ss ; 45.7 ; Jr 15.9 ; Jl 2.2 ; Mi 7.8s ; So 1.15 ; Mc 13.24s/ / ; 15.33/ / ; Ap 6.12ss.'
  - type: text
    content: 'Quel malheur pour ceux qui désirent le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: 'Qu''attendez-vous du jour du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  - type: text
    content: Il ne sera pas lumière, mais ténèbres.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.13ss ; 3.14n  ; 9.1ss ; Es 24.18 ; Jr 48.44. –  lion / ours Os 13.7s ; Pr 28.15 ; Lm 3.10.
  - type: text
    content: Il en sera comme d'un homme qui fuit pour échapper au lion
  - type: text
    content: et qui rencontre l'ours ;
  - type: text
    content: il rentre chez lui, appuie sa main contre le mur
  - type: text
    content: – et le serpent le mord.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Elle est tombée… 8.13s ; cf. 5.6 ; 9.11. –  Israël la jolie  : litt. la vierge d''Israël  ; cf. Jg 11.37ss ; Es 1.8 ; 10.32 ; 37.22 ; Jr 18.13 ; 31.4,21. –  sur sa propre terre  : litt. sur son sol  ; cf. Gn 2.5n.'
  - type: text
    content: Elle est tombée, elle ne se relèvera plus,
  - type: text
    content: Israël la jolie ;
  - type: text
    content: elle est étendue sur sa propre terre,
  - type: text
    content: personne ne la relève.
  '20':
  - type: text
    content: 'Le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est-il lumière ? N''est-il pas plutôt ténèbres ?'
  - type: text
    content: N'est-il pas obscur, sans clarté ?
  - type: heading
    content: Un culte insupportable à Dieu
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 5 ; 4.4s ; 1S 15.22 ; Es 1.11-17 ; Jr 6.20 ; 7.21ss ; Os 6.6 ; 8.13 ; Mi 6.6ss ; Ml 1.10 ; 2.13 ; Ps 40.7ss ; 50.8ss ; 51.18s ; Pr 15.8 ; 21.3,27. –  fêtes / assemblées solennelles  : cf. Es 1.13 ; Jr 9.1n  ; Jl 1.14 ; 2.2. –  je les rejette  : autre traduction je les méprise , cf. 2.4. –  je ne veux plus sentir  : cf. Gn 8.21.'
  - type: text
    content: Je déteste vos fêtes, je les rejette,
  - type: text
    content: je ne veux plus sentir vos assemblées solennelles.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 20.24. –  holocaustes Lv 1.3n. –  offrandes ou, peut-être, offrandes végétales  ; cf. Gn 4.3n  ; Lv 2.1n. –  sacrifices de paix  : autre traduction sacrifices de communion  ; cf. Lv 3.1n.'
  - type: text
    content: Quand vous me présentez vos holocaustes et vos offrandes,
  - type: text
    content: je ne les agrée pas ;
  - type: text
    content: vos sacrifices de paix et vos bêtes grasses,
  - type: text
    content: je ne les regarde pas.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1S 10.5 ; 2S 6.5,15. –  le tumulte  : autre traduction le murmure  ; cf. Ez 26.13.'
  - type: text
    content: Eloigne de moi le tumulte de tes chants !
  - type: text
    content: Je n'écoute pas le son de tes luths,
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction et l''équité coulera (ou jaillira ) … v. 7,12 ; 2.6ss ; 4.1 ; 8.4ss ; cf. Es 58.8ss ; Mt 5.23s. – Voir justice. –  torrent (ou oued ) intarissable  : la même expression est traduite par cours d''eau pérenne en Dt 21.4n  ; cf. Jr 15.18 ; Ps 74.15 ; Jb 6.15nss ; 12.19.'
  - type: text
    content: mais que l'équité coule comme de l'eau,
  - type: text
    content: et la justice comme un torrent intarissable.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 43.22ss ; Jr 2.2s ; 7.22 ; Os 2.16s ; 9.10 ; Ac 7.42s.
  - type: text
    content: M'avez-vous fait des sacrifices et des offrandes
  - type: text
    content: pendant les quarante années du désert, maison d'Israël ?
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur, qui semble désigner des divinités assyro-babyloniennes, Sag-Kout et Kayyawân, associées dans des textes akkadiens à la planète (= l''étoile ) Saturne ; cf. 2R 17.29ss ; voir aussi Dt 4.19 ; 17.3 ; 2R 17.16 ; 21.3,5. –  Emportez Es 46.1,7 ; Jr 48.7 ; 49.3. –  Sikkouth, votre roi (hébreu mélek )… : LXX la tente (= hébreu soukkath ) du (dieu) Moloch (cf. 1.15n  ; So 1.15) et l''étoile de votre dieu Raiphân, ces figures que vous vous êtes fabriquées  ; cf. Ac 7.43 . –  toutes ces choses…  : litt. que vous vous êtes faites  ; autre traduction celui que vous avez fait.'
  - type: text
    content: Emportez donc Sikkouth, votre roi,
  - type: text
    content: et Kiyoun, vos images,
  - type: text
    content: l'étoile de votre dieu,
  - type: text
    content: toutes ces choses que vous avez faites !
  '27':
  - type: text
    content: ' '
  - type: note
    content: au-delà de Damas 1.3n, c.-à-d. en Assyrie ; cf. v. 5 ; 6.7,14 ; 7.11,17 ; 9.4. –  Dieu des Armées 3.13n.
  - type: text
    content: Je vous exilerai au-delà de Damas,
  - type: text
    content: 'dit celui dont le nom est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu des Armées.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 15 ; 3.12+ ; 6.9 ; voir aussi Gn 18.23-32 ; Dt 28.62. –  le Seigneur Dieu 3.7+.
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: la ville qui mettait en campagne mille hommes
  - type: text
    content: n'en conservera que cent,
  - type: text
    content: et celle qui mettait en campagne cent hommes
  - type: text
    content: n'en conservera que dix,
  - type: text
    content: pour la maison d'Israël.
  - type: heading
    content: Cherchez le Seigneur et vivez
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 5s,14s ; Dt 4.29 ; 30.15ss ; Es 55.6 ; Jr 29.13 ; Os 10.12 ; Ps 69.33 ; 105.4 ; 1Ch 16.11 ; 22.19 ; 28.9 ; 2Ch 15.2ss ; Mt 6.33 ; 19.16s. –  voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 3,16). –  Cherchez-moi ou consultez-moi  ; cf. 1R 22.5,7ns.'
  - type: text
    content: 'Car voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' à la maison d''Israël :'
  - type: text
    content: Cherchez-moi et vivez !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Beth-El / Guilgal 4.4+. –  ne vous rendez pas  : litt. ne passez pas  ; le même verbe a aussi le sens de passer outre, transgresser . –  Bersabée  : autre sanctuaire au sud de Juda ; cf. 8.14 ; Gn 21.14n,31ss ; 26.23ss ; 28.10. –  exilé (v. 27+), hébreu galo yiglè  ; le texte joue, par assonance, sur le nom Guilgal . –  à rien  : le terme hébreu ’avên signifie souvent injustice ou malfaisance , et peut aussi désigner un mal subi (le sens serait alors Beth-El aura un sort funeste  ; cf. Jr 4.14s ; Pr 12.21) ; cependant le même mot pourrait aussi signifier rien, néant ou nullité  ; cf. Nb 23.21n  ; Es 41.29n  ; voir Os 4.15n ( Beth-El = Beth-Aven ) ; 12.12 ; Ha 3.7n.'
  - type: text
    content: Ne cherchez pas à Beth-El,
  - type: text
    content: n'allez pas au Guilgal,
  - type: text
    content: ne vous rendez pas à Bersabée.
  - type: text
    content: Car le Guilgal sera exilé,
  - type: text
    content: et Beth-El sera réduit à rien.
  '6':
  - type: text
    content: ' '
  - type: note
    content: V. 4+. –  comme un feu (litt. le feu ) 7.4 ; Dt 32.22 ; Ez 22.21. –  la maison de Joseph , au sens strict les tribus d'Ephraïm et de Manassé, ici pour tout le royaume du Nord v. 15 ; 1.1n  ; 6.6. –  sans personne… v. 2+ ; Es 1.31+.
  - type: text
    content: 'Cherchez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et vivez !'
  - type: text
    content: Craignez qu'il ne s'empare comme un feu
  - type: text
    content: de la maison de Joseph,
  - type: text
    content: et que ce feu ne la dévore,
  - type: text
    content: sans personne à Beth-El pour l'éteindre
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 18ss. –  l''équité  : autre traduction le droit  ; même terme aux v. 15,24. –  en absinthe 6.12 ; cf. Dt 29.17 ; Jr 9.14 ; 23.15 ; Os 10.4n  ; Lm 3.15n,19 ; Ap 8.10s ; voir aussi Es 5.20.'
  - type: text
    content: – vous qui changez l'équité en absinthe
  - type: text
    content: et qui jetez à terre la justice !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 4.13+. –  Pléiades / Orion Jb 9.9n  ; 38.31s. –  l'ombre de mort ou l'obscurité profonde , cf. Jb 3.5n. –  nuit Ps 104.20. –  il appelle… 9.6. –  les répand Ps 104.6ss ; Jb 12.15 ; 36.27ss. –  son nom, c'est le Seigneur … 4.13 ; 9.6 ; Es 51.15 ; 54.5 ; Jr 10.16 ; 33.2 ; 51.19 ; Ps 68.5.
  - type: text
    content: Il fait les Pléiades et Orion,
  - type: text
    content: il change l'ombre de mort en aurore,
  - type: text
    content: il obscurcit le jour pour en faire la nuit,
  - type: text
    content: il appelle les eaux de la mer
  - type: text
    content: 'et les répand sur la terre :'
  - type: text
    content: 'son nom, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Texte obscur et traduction conjecturale ; cf. 1S 2.1ss ; Lc 1.46ss.
  - type: text
    content: Il déchaîne le ravage sur le puissant,
  - type: text
    content: et le ravage survient sur la place forte.
