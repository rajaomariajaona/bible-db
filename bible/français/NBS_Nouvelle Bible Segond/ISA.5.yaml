document_id: ISA.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vigne du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'vigne v. 7 ; voir aussi 3.14 ; 27.2-5 ; Gn 49.11 ; Nb 13.23s ; Dt 8.8 ; 1R 5.5 ; Jr 2.21 ; 5.10 ; 6.9 ; 8.13 ; 12.10 ; Ez 15.1-8 ; 17.6-10 ; 19.10-14 ; Os 9.10 ; 10.1 ; Ps 80.9-17 ; Mt 20.1ss ; 21.33ss ; Jn 15.1-8 ; cf. Ct 1.6-14 ; 2.15 ; 8.12. –  un coteau fertile  : litt. une corne, un fils d''huile (ou de graisse ).'
  - type: text
    content: Laissez-moi, je vous prie, chanter pour mon ami
  - type: text
    content: le chant de mon bien-aimé pour sa vigne.
  - type: text
    content: Mon ami avait une vigne
  - type: text
    content: sur un coteau fertile.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lv 26.20 ; Dt 28.38. –  dix arpents… un bath  : c.-à-d. une quarantaine de litres de vin pour environ deux hectares et demi de vigne. –  homer / épha  : on ne recueillera qu''un dixième de ce qu''on a semé. Voir mesures.'
  - type: text
    content: Même dix arpents de vigne ne produiront qu'un bath,
  - type: text
    content: et un homer de semence ne produira qu'un épha.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 22.13 ; 28.1 ; 56.12 ; Am 6.4-6 ; Pr 23.30 ; Ec 10.16. –  l'alcool v. 22 ; 24.9 ; 28.7 ; 29.9 ; 56.12 ; Lv 10.9n.
  - type: text
    content: Quel malheur pour ceux qui se lèvent de bon matin
  - type: text
    content: afin de rechercher l'alcool,
  - type: text
    content: pour ceux qui traînent au crépuscule, échauffés par le vin !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'animent  : sous-entendu dans le texte. –  ils n''aperçoivent pas l''action du Seigneur  : cf. v. 19 ; 10.12 ; 22.11 ; 28.21 ; 31.1 ; 45.11 ; cf. Ps 28.5.'
  - type: text
    content: La lyre et le luth, le tambourin, la flûte
  - type: text
    content: et le vin animent leurs banquets ;
  - type: text
    content: 'mais ils n''aperçoivent pas l''action du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: ils ne voient pas l'œuvre de ses mains.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'est exilé  : autre traduction sera exilé . –  parce qu''il n''a pas de connaissance  : autre traduction sans le savoir  ; cf. Os 4.1,6 ; Jb 36.12n. –  sa gloire  : autres traductions sa noblesse, son élite. –  ce sont des gens affamés  : d''après deux mss hébreux et des versions anciennes, on pourrait lire (ce sont) des morts de faim  ; certains modifient le texte hébreu traditionnel pour lire sera affaiblie par la faim. –  soif  : cf. Am 8.13.'
  - type: text
    content: C'est pourquoi mon peuple est exilé,
  - type: text
    content: parce qu'il n'a pas de connaissance ;
  - type: text
    content: sa gloire, ce sont des gens affamés,
  - type: text
    content: et sa multitude est desséchée par la soif.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'séjour des morts 14.9n. –  gosier  : sur le terme ainsi traduit, voir Gn 1.20n  ; Ex 15.9n  ; Ha 2.5n. –  l''élite comme la multitude de la ville  : litt. son élite et sa multitude  ; les possessifs (qui s''accordent avec le possesseur en hébreu) sont au féminin, ce qui correspond à la façon hébraïque de désigner les villes. –  sa liesse  : litt. celui qui s''amuse  ; autre traduction l''élite comme la multitude de la ville descendent, son vacarme et celui qui s''y amuse.'
  - type: text
    content: C'est pourquoi le séjour des morts ouvre tout grand son gosier,
  - type: text
    content: il ouvre sa bouche sans limite ;
  - type: text
    content: l'élite comme la multitude de la ville y descendent,
  - type: text
    content: son vacarme et sa liesse.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'courbé / abaissé 2.9+. –  les yeux  : voir 2.11n.'
  - type: text
    content: L'être humain est courbé,
  - type: text
    content: l'homme est abaissé,
  - type: text
    content: et les yeux des gens hautains sont abaissés.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 's''élève ou est élevé  ; un terme apparenté est traduit par hautains au v. 15. –  Dieu  : hébreu ’El , cf. Gn 21.33n. –  saint 1.4+. –  montre sa sainteté ou est proclamé saint , traduction traditionnelle se sanctifie (ou est sanctifié ) ; cf. 8.13 ; 29.22s ; Lv 10.3 ; Nb 20.13 ; Ez 20.41+ ; 36.23. –  justice 10.22 ; 30.18n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées s''élève par l''équité,'
  - type: text
    content: le Dieu saint montre sa sainteté par la justice.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Des moutons seront là… 17.2 ; 32.14. –  riches  : litt. gras . L''ensemble de la proposition est obscur ; on pourrait aussi comprendre  : des bêtes grasses se nourriront sur les ruines (où elles étaient) étrangères ; dans les ruines où étaient les bêtes grasses, des nomades se nourriront ; des troupeaux en transhumance brouteront les ruines désertées par les riches  ; certains modifient le texte hébreu traditionnel pour lire des chevreaux engraissés brouteront sur les ruines.'
  - type: text
    content: Des moutons seront là comme sur leur pâturage,
  - type: text
    content: et des étrangers dévoreront
  - type: text
    content: les possessions ruinées des riches.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Certains voient dans ces expressions des allusions à des pratiques magiques. –  liens 2S 22.6 ; Ps 119.61 ; Pr 5.22. – Voir péché.
  - type: text
    content: Quel malheur pour ceux qui tirent le mal avec les liens de l'illusion,
  - type: text
    content: le péché comme avec les chaînes d'un chariot,
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'projets…  : le mot hébreu (au singulier dans le texte) est aussi rendu ailleurs, selon le contexte, par conseil ou plan  ; cf. 8.10 ; 11.2 ; 14.26s ; 19.3,11,17 ; 25.1 ; 28.29 ; 30.1 ; 36.5 ; 40.13 ; 44.26 ; 46.10s ; 47.13 ; Ps 106.13+. –  Saint d''Israël 1.4n. –  viennent à se réaliser  : litt. s''approche et vienne  ; cf. Jr 17.15 ; 2P 3.3s. –  et nous saurons  : autre traduction et nous le connaîtrons  ; cf. 9.8 ; 28.9s ; 30.11.'
  - type: text
    content: 'et qui disent : Qu''il se hâte,'
  - type: text
    content: qu'il fasse vite son œuvre,
  - type: text
    content: afin que nous voyions !
  - type: text
    content: Que les projets du Saint d'Israël
  - type: text
    content: viennent à se réaliser,
  - type: text
    content: et nous saurons !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'un cépage de choix  : le terme hébreu ainsi traduit ( soreq ) évoque un rouge clair ; il s''agit peut-être ici (et en Jr 2.21) du nom propre d''un cépage renommé (cf. Jg 16.4) ; autres termes proches en Gn 49.11 ( cep de qualité ) ; Es 16.8 . –  tour de surveillance, à cause des animaux et des voleurs (cf. la cabane de 1.8). –  fruits puants  : autre traduction des fruits sauvages  ; la racine hébraïque correspondante évoque souvent une mauvaise odeur, cf. Gn 34.30n  ; voir aussi Dt 32.32.'
  - type: text
    content: Il en travailla la terre, ôta les pierres
  - type: text
    content: et y planta un cépage de choix ;
  - type: text
    content: il bâtit une tour au milieu d'elle,
  - type: text
    content: il y creusa aussi une cuve.
  - type: text
    content: Il espérait qu'elle produirait des raisins,
  - type: text
    content: mais elle a produit des fruits puants !
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.15 ; Am 5.7 ; Mi 3.2 ; Pr 17.15.
  - type: text
    content: Quel malheur pour ceux qui disent le mauvais bon
  - type: text
    content: et le bon mauvais,
  - type: text
    content: qui font des ténèbres une lumière
  - type: text
    content: et de la lumière des ténèbres,
  - type: text
    content: qui font de l'amertume une douceur
  - type: text
    content: et de la douceur une amertume !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'qui se croient sages…  : litt. (qui sont) sages à leurs yeux et intelligents devant leur face  ; cf. 29.14 ; Pr 3.7 ; 26.12 ; 28.11 ; Rm 11.25 ; 12.16.'
  - type: text
    content: Quel malheur pour ceux qui se croient sages
  - type: text
    content: et qui se considèrent comme intelligents !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'de la préparation…  : litt. pour mélanger les boissons alcoolisées  ; le même terme est traduit par alcool au v. 11 ; voir 19.14n  ; Lv 10.9n  ; Pr 9.2n.'
  - type: text
    content: Quel malheur pour ceux qui sont vaillants quand il s'agit de boire du vin,
  - type: text
    content: pour les héros de la préparation de l'alcool !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'acquittent le coupable  : autre traduction déclarent juste (ou justifient ) le méchant  ; cf. Dt 25.1n  ; Jb 9.20n. –  pot-de-vin 1.23 ; Ex 23.8+.'
  - type: text
    content: Ils acquittent le coupable pour un pot-de-vin
  - type: text
    content: et retirent au juste sa justice !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'chaume 33.11 ; 40.24 ; 47.14. –  rejeté  : autre traduction méprisé . –  la loi du Seigneur 30.9. –  bafoué 1.4.'
  - type: text
    content: C'est pourquoi, comme une langue de feu dévore le chaume
  - type: text
    content: et comme le foin livré aux flammes se consume,
  - type: text
    content: ainsi leur racine sera comme la pourriture,
  - type: text
    content: et leur fleur se dissipera comme la poussière ;
  - type: text
    content: 'car ils ont rejeté la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées'
  - type: text
    content: et bafoué la parole du Saint d'Israël.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'C''est pourquoi 9.16+. –  les montagnes tremblent Ha 3.6 ; Ps 18.8. –  les cadavres 14.19s ; 34.3 ; 66.24 ; Dt 28.26 ; Jr 7.33 ; 8.1 ; 25.33 ; 31.40 ; 36.30s. –  Malgré tout cela (litt. en tout cela ) … 9.11,16,20 ; 10.4 ; Os 7.10 ; cf. Am 4.6-11 (autre formule hébraïque). –  sa main est encore étendue  : cf. 14.26s ; 23.11 ; 30.30 ; Ex 6.6 ; 7.5 ; Dt 4.34 ; 5.15 ; Jr 6.12+ ; Ez 6.14 ; So 1.4 ; Ps 136.12 ; voir aussi Jr 4.8.'
  - type: text
    content: 'C''est pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se met en colère contre son peuple,'
  - type: text
    content: il étend la main sur lui et il le frappe ;
  - type: text
    content: les montagnes tremblent,
  - type: text
    content: les cadavres sont comme des balayures dans les rues.
  - type: text
    content: Malgré tout cela, sa colère ne s'en retourne pas,
  - type: text
    content: sa main est encore étendue.
  - type: heading
    content: Un envahisseur que rien n'arrête
  '26':
  - type: text
    content: ' '
  - type: note
    content: une bannière 11.10,12 ; 13.2 ; 18.3 ; 30.17 ; 49.22 ; 62.10 ; Jr 4.6 ; le mot hébreu est diversement traduit selon le contexte ; cf. 33.23 ( voiles ) ; Nb 21.8 ( perche ) ; Ez 27.7 ( pavillon ). – L'expression peuples lointains désigne vraisemblablement l'Assyrie ; cf. 7.20 ; 8.4,7 ; 10.5 ; 14.25 ; 19.23 ; 20.1 ; 30.31 ; 31.8 ; 36—37. –  siffle 7.18 ; cf. Jr 5.15 ; Za 10.8.
  - type: text
    content: Il dresse une bannière pour les peuples lointains ;
  - type: text
    content: il en siffle un des extrémités de la terre,
  - type: text
    content: et il arrive vite, avec rapidité.
  '27':
  - type: text
    content: ' '
  - type: note
    content: ne sommeille ni ne dort 56.10 ; Na 3.18 ; même vers au sujet de Dieu en Ps 121.4.
  - type: text
    content: Chez lui personne n'est épuisé, personne ne trébuche ;
  - type: text
    content: aucun ne sommeille ni ne dort ;
  - type: text
    content: aucun n'a la ceinture de ses reins détachée,
  - type: text
    content: ni la lanière de ses sandales rompue.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Ses flèches sont aiguisées  : cf. Ps 45.6. –  sabots / roues 36.8 ; cf. Jr 47.3.'
  - type: text
    content: Ses flèches sont aiguisées
  - type: text
    content: et tous ses arcs bandés ;
  - type: text
    content: les sabots de ses chevaux sont comme de la pierre,
  - type: text
    content: les roues de ses chars comme un ouragan.
  '29':
  - type: text
    content: ' '
  - type: note
    content: lionne / jeunes lions Jr 2.15 ; Os 5.14 ; Am 3.8 ; cf. Na 2.12-14 (comme symbole de l'Assyrie).
  - type: text
    content: Son rugissement est comme celui d'une lionne ;
  - type: text
    content: il rugit comme les jeunes lions, il gronde,
  - type: text
    content: il saisit sa proie, il l'emporte en lieu sûr,
  - type: text
    content: et personne ne vient la délivrer.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'habitants…  : litt. habitant de Jérusalem et homme de Juda.'
  - type: text
    content: Maintenant, habitants de Jérusalem, hommes de Juda,
  - type: text
    content: soyez juges, je vous prie, entre moi et ma vigne !
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'sur lui ou contre lui. Il peut s''agir du peuple d''Israël, ou encore du peuple assyrien qui sera puni à son tour (cf. 10.12 ; 30.31). –  ténèbres / angoisse 8.22 ; Jl 2.2 ; Am 5.18 ; So 1.15. –  par les (litt. ses ) orages  : le possessif renvoie peut-être au mot traduit par grondement  ; le mot hébreu rendu par orages ne se rencontre qu''ici, et sa traduction est incertaine (autre possibilité brouillard ). Le verbe correspondant apparaît en Dt 32.2 ( se déverser [comme la pluie]) ; 33.28 ( distiller [la rosée]).'
  - type: text
    content: En ce jour-là, il y aura sur lui un grondement
  - type: text
    content: comme le grondement de la mer ;
  - type: text
    content: 'on regardera le pays :'
  - type: text
    content: ce seront les ténèbres, l'angoisse,
  - type: text
    content: la lumière sera enténébrée par les orages.
  '4':
  - type: text
    content: Qu'y avait-il encore à faire à ma vigne
  - type: text
    content: que je n'aie pas fait pour elle ?
  - type: text
    content: Pourquoi, quand j'espérais
  - type: text
    content: qu'elle produirait des raisins,
  - type: text
    content: a-t-elle produit des fruits puants ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: dévorée 3.14n  ; cf. Os 2.14 ; Ps 80.13.
  - type: text
    content: Maintenant laissez-moi, je vous prie, vous faire savoir
  - type: text
    content: ce que je ferai à ma vigne.
  - type: text
    content: J'en arracherai la haie,
  - type: text
    content: pour qu'elle soit dévorée ;
  - type: text
    content: j'ouvrirai des brèches dans sa clôture,
  - type: text
    content: pour qu'elle soit foulée aux pieds.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ruine  : le mot hébreu n''apparaît qu''ici et sa traduction est incertaine. –  sarclée  : même verbe en 7.25. –  ronces / épines 7.23-25 ; 9.17 ; 10.17 ; 27.4n  ; 32.13 ; Os 10.8 ; Mi 7.4 ; cf. Gn 3.18 (autres termes hébreux). –  pluie Dt 11.14 ; 28.23s ; Am 4.7.'
  - type: text
    content: 'Je la réduirai en ruine :'
  - type: text
    content: elle ne sera plus taillée, ni sarclée ;
  - type: text
    content: les ronces et les épines y croîtront.
  - type: text
    content: Je donnerai mes ordres aux nuages,
  - type: text
    content: afin qu'ils ne laissent plus tomber de pluie sur elle.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'vigne / Israël v. 1+. –  les hommes  : au singulier dans l''hébreu. –  qu''il chérissait  : litt. de ses délices  ; même terme en Jr 31.20 ; Ps 119.24,77,92,143,174 ; Pr 8.30s. –  l''équité (ou le droit , hébreu mishpath , cf. 1.17,21), le crime ( mispah  : le terme hébreu n''apparaît qu''ici dans l''A.T. ; on l''a aussi traduit par complicité ), la justice ( tsedaqa ), les cris des victimes ou les cris de misère ( tse‘aqa  : Ex 3.7,9 ; Ps 9.13) : double allitération en hébreu.'
  - type: text
    content: 'Or la vigne du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: c'est la maison d'Israël,
  - type: text
    content: et les hommes de Juda,
  - type: text
    content: c'est le plant qu'il chérissait.
  - type: text
    content: Il espérait l'équité,
  - type: text
    content: et voici le crime !
  - type: text
    content: – la justice,
  - type: text
    content: et voici les cris des victimes !
  - type: heading
    content: Ceux qui provoquent la colère du Seigneur
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Quel malheur pour… 1.4 ; 5.11,18,20,21,22 ; 10.1,5. –  maison à maison…  : le texte dénonce les grands propriétaires qui étendent leurs exploitations aux dépens des petits, sans doute contraints à vendre leurs terres à cause de difficultés économiques ; cf. 1R 21.1-16 ; Mi 2.2 ; voir aussi Lv 25.23-28 ; Dt 1.8 ; 15.1-11.'
  - type: text
    content: Quel malheur pour ceux qui ajoutent maison à maison
  - type: text
    content: et qui joignent champ à champ,
  - type: text
    content: jusqu'à ce qu'il n'y ait plus d'espace !
  - type: text
    content: Il n'y a de place que pour vous seuls dans le pays !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Voici le serment…  : litt. à mes oreilles YHWH des Armées . L''expression correspondant à Sans faute (litt. sinon , sous-entendu  : que je sois maudit, que tel malheur m''arrive ) est caractéristique des formules de serment (le mot correspondant à serment ne figure pas expressément dans le texte hébreu ; cf. 14.24n  ; 22.14n) ; elle est parfois aussi traduite par à coup sûr (cf. Jr 15.11 ; Ez 5.11 ; 20.33). –  dévastées 1.7+ ; cf. Am 3.15.'
  - type: text
    content: 'Voici le serment du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, tel que je l''ai entendu :'
  - type: text
    content: Sans faute, ces maisons nombreuses seront dévastées,
  - type: text
    content: ces grandes et belles maisons n'auront plus d'habitants.
