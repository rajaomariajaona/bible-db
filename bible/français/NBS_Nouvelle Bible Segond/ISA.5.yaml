    - type: text
      text: Laissez-moi, je vous prie, chanter pour mon ami
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le chant de mon bien-aimé pour sa vigne.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon ami avait une vigne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur un coteau fertile.
