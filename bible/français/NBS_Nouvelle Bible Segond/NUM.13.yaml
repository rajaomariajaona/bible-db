      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'près de la mer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Méditerranée (Gn 10.6,15-18) et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur les rives '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le long
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Jourdain.
      marker-yv: yv-n
    - type: text
      text: Les Amalécites habitent le Néguev ; les Hittites, les Jébusites et les Amorites habitent la montagne ; les Cananéens habitent près de la mer et sur les rives du Jourdain.
