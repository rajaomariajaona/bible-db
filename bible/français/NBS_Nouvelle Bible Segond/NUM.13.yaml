      marker-yv: yv-n
    - type: text
      text: 'Et ils se mirent à décrier devant les Israélites le pays qu''ils avaient exploré. Ils dirent : Le pays que nous avons parcouru pour l''explorer est un pays qui dévore ses habitants ; tout le peuple que nous y avons vu, ce sont des hommes de haute taille ; '
