    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''oued Eshkol '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Grappe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 24), au nord d''Hébron, cf. 32.9 ; Gn 14.13,24 ; Dt 1.24s ; voir aussi Gn 26.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'perche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils prirent aussi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Ils arrivèrent jusqu''à l''oued Eshkol, où ils coupèrent un sarment de vigne avec une grappe de raisin, qu''ils durent porter à deux, au moyen d''une perche ; ils prirent aussi des grenades et des figues. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: On appela cet endroit oued Eshkol (« oued de la Grappe ») à cause de la grappe que les Israélites y coupèrent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les espions font leur rapport
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils furent de retour de l''exploration du pays au bout de quarante jours. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qadesh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Le Sacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Le Saint
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : oasis à environ 80 km au sud-ouest de Bersabée (cf. 32.8 ; 34.4), ici associée au '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'désert de Parân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 3+), habituellement située dans le désert de Tsîn (cf. v. 21 ; 20.1 ; 33.36), en tout cas à la limite sud du Néguev ; cf. Gn 14.7 ; Dt 1.2. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ' ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Réqem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', nom qui désigne peut-être Pétra (homonyme en Jos 18.27).'
      marker-yv: yv-n
    - type: text
      text: 'A leur arrivée, ils se rendirent auprès de Moïse, d''Aaron et de toute la communauté des Israélites à Qadesh, dans le désert de Parân. Ils leur firent un rapport, ainsi qu''à toute la communauté, et leur montrèrent le fruit du pays. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils racontèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils lui racontèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(probablement à Moïse) ; cf. v. 31ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un pays ruisselant… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 3.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 33.3.'
      marker-yv: yv-n
    - type: text
      text: 'Ils racontèrent : Nous sommes arrivés dans le pays où tu nous as envoyés. C''est bien un pays ruisselant de lait et de miel, et en voici le fruit. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jos 14.12.
      marker-yv: yv-n
    - type: text
      text: 'Mais le peuple qui habite ce pays est puissant, les villes sont fortifiées, très grandes ; nous y avons même vu des Anaqites. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 15.19ss ; Ex 3.8,17 ; Dt 1.7 ; Jos 9.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amalécites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.43 ; 24.20 ; Gn 14.7 ; 36.12 ; Ex 17.8ss ; Jg 3.13 ; 5.14 ; 6.3 ; 7.12 ; 12.15 ; 1S 15.4ss ; 27.8 ; 1Ch 4.42s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Néguev
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le sud
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hittites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 23.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jébusites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jos 15.63. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amorites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 10.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
