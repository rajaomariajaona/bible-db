          text: ) ; selon certains, cette ville aurait été construite ou reconstruite au XVIII
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C. ; un commentaire de la Genèse retrouvé à '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ' ainsi que le livre des '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Jubilés
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: situent cette (re)construction au temps d'Abraham. Mais la ville est surtout connue comme capitale des pharaons à partir de l'époque de David (comparer 1R 2.11 ; 1Ch 29.27).
      marker-yv: yv-n
    - type: text
      text: 'Ils montèrent dans le Néguev et allèrent jusqu''à Hébron, où étaient Ahimân, Shéshaï et Talmaï, les Anaqites. Hébron avait été bâtie sept ans avant Tsoân d''Egypte. '
