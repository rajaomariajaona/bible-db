document_id: NUM.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Moïse envoie des espions en Canaan
  - type: text
    content: ' '
  - type: note
    content: Smr fait précéder ces paroles de Dieu d'une explication tirée de Dt 1.20-23.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit alors à Moïse : '
  '10':
  - type: text
    content: 'pour la tribu de Zabulon : Gaddiel, fils de Sodi ;'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Joseph englobe habituellement Ephraïm (v. 8) et Manassé  ; cf. Gn 48.
  - type: text
    content: 'pour la tribu de Joseph, pour la tribu de Manassé : Gaddi, fils de Sousi ;'
  '12':
  - type: text
    content: 'pour la tribu de Dan : Ammiel, fils de Guemalli ;'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Michel ou Micaël , même nom en Dn 10.13 etc.
  - type: text
    content: 'pour la tribu d''Aser : Setour, fils de Michel ;'
  '14':
  - type: text
    content: 'pour la tribu de Nephtali : Nahbi, fils de Vophsi ;'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Maki  : Smr Miki ou Meki.'
  - type: text
    content: 'pour la tribu de Gad : Guéouel, fils de Maki.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Osée / Josué  : les deux noms (en hébreu Hoshéa‘ et Yehoshoua‘ ) sont formés sur la même racine, qui signifie sauver, délivrer, donner la victoire  ; le second comprend en outre le nom divin YHWH sous la forme Yeho ( le Seigneur sauve, le Seigneur est salut  ; cf. Ex 3.14s ; 6.3) ; LXX le transcrira en grec Iésous , nom identique à celui de Jésus  ; cf. v. 8n  ; 11.28 ; 27.18n  ; Ex 17.9ss ; 24.13 ; 32.17 ; 33.11 ; Dt 31.23 ; Jos 1–24 ; voir aussi Gn 17.5 ; 35.10 ; Es 1.1n  ; Mt 1.21n.'
  - type: text
    content: Tels sont les noms des hommes que Moïse envoya explorer le pays. Moïse appela Osée, fils de Noun, du nom de Josué.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Montez-y…  : autres traductions montez au Néguev ; montez ici, par le Néguev ou par le sud  ; le mot néguev peut être un nom commun désignant le sud, ou le nom propre qui désigne la région semi-désertique au sud d''Hébron (v. 22s). –  dans la montagne  : c.-à-d. dans la région montagneuse qui constitue la Judée, de Bersabée à Hébron, au sud de Jérusalem.'
  - type: text
    content: 'Moïse les envoya explorer Canaan. Il leur dit : Montez-y par le Néguev, puis vous monterez dans la montagne. '
  '18':
  - type: text
    content: 'Vous verrez le pays, ce qu''il est ; le peuple qui l''habite, s''il est fort ou faible, s''il est en petit ou en grand nombre ; '
  '19':
  - type: text
    content: 'ce qu''est le pays où il habite, s''il est bon ou mauvais ; ce que sont les villes où il habite, si ce sont des campements ou des forteresses ; '
  '2':
  - type: note
    content: 'explorer  : cf. 10.33n  ; 15.39n  ; 21.32 ; Gn 13.17 ; Dt 1.19-40 ; Jos 2.1ss ; 7.2s ; 14.6-15 ; 18.4-9 ; Jg 1.23ss ; Ez 20.6. –  Canaan Gn 9.18n. –  un homme de chaque tribu  : litt. un homme, un homme pour la tribu de ses pères, cf. 1.16n. –  prince  : cf. 1.5-16.'
  - type: text
    content: 'Envoie des hommes explorer Canaan, que je donne aux Israélites. Vous enverrez un homme de chaque tribu ; chacun d''eux sera un prince. '
  '20':
  - type: note
    content: 'fertile ou pauvre  : litt. gras ou maigre. –  le temps des premiers raisins (litt. des premiers fruits des raisins, cf. Lv 2.14n), soit fin juillet ; LXX au printemps  ; Smr des figues précoces et des raisins  ; cf. Nb 18.13 ; 28.26 ; voir aussi Jos 3.15 ; 2S 11.1.'
  - type: text
    content: ce qu'est le pays, s'il est fertile ou pauvre, s'il y a des arbres ou pas. Soyez forts. Prenez du fruit du pays – c'était le temps des premiers raisins.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'le désert de Tsîn  : limite sud de la Terre promise, au nord-ouest d''Edom v. 26n  ; 34.4. –  Rehob , non identifié mais sans doute tout au nord de Canaan, cf. Jg 18.28 ; 2S 10.6-8. –  l''entrée de Hamath (hébreu Lebo-Hamath ), défilé entre les chaînes montagneuses du Liban et de l''Anti-Liban, par lequel on accédait au royaume de Hamath, sur l''Oronte (34.8 ; Jos 13.5 ; Jg 3.3 ; 1R 8.65 ; 2R 14.25 ; Ez 47.15n-20 ; 48.1 ; Am 6.14 ; 1Ch 13.5 ; 2Ch 7.8).'
  - type: text
    content: 'Ils montèrent donc et explorèrent le pays, depuis le désert de Tsîn jusqu''à Rehob, à l''entrée de Hamath. '
  '22':
  - type: note
    content: 'Cf. v. 17ss. –  montèrent  : cf. Gn 12.10n. –  allèrent  : d''après quelques mss hébreux et des versions anciennes ; le texte hébreu traditionnel porte le singulier. –  jusqu''à Hébron, à une quarantaine de km au sud de Jérusalem et à environ 120 km de Qadesh, cf. v. 21n  ; 32.8s ; Dt 1.24. –  Ahimân… Jg 1.10,20. –  les Anaqites  : litt. les enfants de l''Anaq, de même au v. 28 ; cf. v. 33 ; Dt 1.28 ; 2.10s ; 9.2 ; Jos 11.21s ; 14.12,15 ; 15.13s ; certains interprètent cette appellation au sens d’hommes aux colliers (termes apparentés en Jg 8.26 ; Ps 73.6 ; Pr 1.9 ; Ct 4.9) ou hommes au long cou. –  Tsoân (ou Tanis) d''Egypte, dans l''est du delta du Nil (Es 19.11n) ; selon certains, cette ville aurait été construite ou reconstruite au XVIIIe s. av. J.-C. ; un commentaire de la Genèse retrouvé à Qumrân ainsi que le livre des Jubilés situent cette (re)construction au temps d''Abraham. Mais la ville est surtout connue comme capitale des pharaons à partir de l''époque de David (comparer 1R 2.11 ; 1Ch 29.27).'
  - type: text
    content: 'Ils montèrent dans le Néguev et allèrent jusqu''à Hébron, où étaient Ahimân, Shéshaï et Talmaï, les Anaqites. Hébron avait été bâtie sept ans avant Tsoân d''Egypte. '
  '23':
  - type: note
    content: 'l''oued Eshkol (Grappe, cf. v. 24), au nord d''Hébron, cf. 32.9 ; Gn 14.13,24 ; Dt 1.24s ; voir aussi Gn 26.17n. –  perche 4.10n. –  ils prirent aussi  : sous-entendu dans le texte.'
  - type: text
    content: 'Ils arrivèrent jusqu''à l''oued Eshkol, où ils coupèrent un sarment de vigne avec une grappe de raisin, qu''ils durent porter à deux, au moyen d''une perche ; ils prirent aussi des grenades et des figues. '
  '24':
  - type: text
    content: On appela cet endroit oued Eshkol (« oued de la Grappe ») à cause de la grappe que les Israélites y coupèrent.
  - type: heading
    content: Les espions font leur rapport
  '25':
  - type: text
    content: 'Ils furent de retour de l''exploration du pays au bout de quarante jours. '
  '26':
  - type: note
    content: 'Qadesh (Le Sacré ou Le Saint) : oasis à environ 80 km au sud-ouest de Bersabée (cf. 32.8 ; 34.4), ici associée au désert de Parân (v. 3+), habituellement située dans le désert de Tsîn (cf. v. 21 ; 20.1 ; 33.36), en tout cas à la limite sud du Néguev ; cf. Gn 14.7 ; Dt 1.2. Syr, Tg ont lu Réqem, nom qui désigne peut-être Pétra (homonyme en Jos 18.27).'
  - type: text
    content: 'A leur arrivée, ils se rendirent auprès de Moïse, d''Aaron et de toute la communauté des Israélites à Qadesh, dans le désert de Parân. Ils leur firent un rapport, ainsi qu''à toute la communauté, et leur montrèrent le fruit du pays. '
  '27':
  - type: note
    content: 'Ils racontèrent  : litt. ils lui racontèrent (probablement à Moïse) ; cf. v. 31ss. –  un pays ruisselant… Ex 3.8n  ; 33.3.'
  - type: text
    content: 'Ils racontèrent : Nous sommes arrivés dans le pays où tu nous as envoyés. C''est bien un pays ruisselant de lait et de miel, et en voici le fruit. '
  '28':
  - type: note
    content: Cf. Jos 14.12.
  - type: text
    content: 'Mais le peuple qui habite ce pays est puissant, les villes sont fortifiées, très grandes ; nous y avons même vu des Anaqites. '
  '29':
  - type: note
    content: 'Cf. Gn 15.19ss ; Ex 3.8,17 ; Dt 1.7 ; Jos 9.1. –  Amalécites  : cf. 14.43 ; 24.20 ; Gn 14.7 ; 36.12 ; Ex 17.8ss ; Jg 3.13 ; 5.14 ; 6.3 ; 7.12 ; 12.15 ; 1S 15.4ss ; 27.8 ; 1Ch 4.42s. –  le Néguev  : autre traduction le sud. –  Hittites Gn 23.3n. –  Jébusites Jos 15.63. –  Amorites Gn 10.16n. –  les Cananéens, terme qui désigne souvent l''ensemble des populations de la région avant l''installation des Israélites, sont peut-être ici plus particulièrement les Phéniciens, près de la mer Méditerranée (Gn 10.6,15-18) et sur les rives (ou le long) du Jourdain.'
  - type: text
    content: Les Amalécites habitent le Néguev ; les Hittites, les Jébusites et les Amorites habitent la montagne ; les Cananéens habitent près de la mer et sur les rives du Jourdain.
  '3':
  - type: note
    content: désert de Parân v. 26 ; 10.12n  ; 12.16. –  sur l'ordre… 9.18n.
  - type: text
    content: 'Moïse les envoya depuis le désert de Parân, sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; tous ces hommes étaient des chefs des Israélites. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Caleb  : cf. 14.6+,24 ; Jos 15.13s. –  fit taire  : cf. 14.4. –  devant Moïse  : autres traductions assemblé près de Moïse ; qui parlait contre Moïse ; au sujet de Moïse ; à cause de Moïse . –  Montons  : autre traduction attaquons (cf. v. 31).'
  - type: text
    content: 'Caleb fit taire le peuple devant Moïse. Il dit : Montons et prenons possession du pays ; nous serons vainqueurs !'
  '31':
  - type: text
    content: 'Mais les hommes qui étaient montés avec lui dirent : Nous ne pouvons pas monter vers ce peuple, car il est plus fort que nous. '
  '32':
  - type: note
    content: 'décrier…  : litt. faire sortir… la médisance du pays, cf. v. 26ss ; 14.36. –  qui dévore ses habitants  : expression difficile ; elle signifie peut-être que le pays serait frappé d''une sorte de malédiction (exposé aux maladies, aux bêtes sauvages, aux invasions ?) ; cf. Lv 26.38 ; Ez 36.13ss.'
  - type: text
    content: 'Et ils se mirent à décrier devant les Israélites le pays qu''ils avaient exploré. Ils dirent : Le pays que nous avons parcouru pour l''explorer est un pays qui dévore ses habitants ; tout le peuple que nous y avons vu, ce sont des hommes de haute taille ; '
  '33':
  - type: note
    content: 'les Anaqites (litt. les fils d''Anaq), qui sont d''entre les Nephilim  : LXX traduit simplement les géants  ; cf. v. 22 ; Dt 2.10 ; 9.2 ; Jos 11.21s ; sur les Nephilim et les Anaqites, voir Gn 6.4n  ; 14.5n. –  comme des criquets ou des sauterelles  ; cf. Es 40.22. – A la fin du v. Smr ajoute le texte de Dt 1.27-33.'
  - type: text
    content: 'nous avons vu là les Nephilim, les Anaqites, qui sont d''entre les Nephilim : nous étions à nos propres yeux comme des criquets, et c''est ce que nous étions aussi à leurs yeux !'
  '4':
  - type: text
    content: 'Voici leurs noms :'
  - type: text
    content: 'Pour la tribu de Ruben : Shammoua, fils de Zakkour ;'
  '5':
  - type: text
    content: 'pour la tribu de Siméon : Shaphath, fils de Hori ;'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Caleb 34.19 ; cf. 32.12 ; Jos 14.6+ ; 15.13s ; Jg 1.10ss.
  - type: text
    content: 'pour la tribu de Juda : Caleb, fils de Yephounné ;'
  '7':
  - type: text
    content: 'pour la tribu d''Issacar : Yigal, fils de Joseph ;'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ephraïm  : cf. v. 11n. –  Osée  : Smr Josué , cf. v. 16+.'
  - type: text
    content: 'pour la tribu d''Ephraïm : Osée, fils de Noun ;'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Raphou  : Syr Daphou.'
  - type: text
    content: 'pour la tribu de Benjamin : Palti, fils de Raphou ;'
