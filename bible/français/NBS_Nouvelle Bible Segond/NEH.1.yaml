  - type: text
    text: S'il te plaît, Seigneur, que ton oreille soit attentive à ma prière et à la prière de tes serviteurs qui désirent craindre ton nom ! Donne-moi aujourd'hui de réussir et accorde-moi la compassion de cet homme.
