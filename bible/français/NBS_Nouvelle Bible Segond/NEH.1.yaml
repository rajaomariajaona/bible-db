document_id: NEH.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Néhémie reçoit des nouvelles de Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Paroles  : on pourrait aussi traduire actes ou histoire , le mot hébreu signifiant aussi bien chose, événement , que parole (cf. 1R 11.41 ; 2Ch 12.15 ; 20.34) ; 2 Maccabées 2.13 parle des « mémoires de Néhémie » ; cf. Siracide 49.13 : « De Néhémie aussi le souvenir est grand, lui qui releva nos remparts écroulés, rétablit portes et verrous et releva nos habitations. » –  Néhémie ( YHWH console ) , fils de Hakalia 10.2 ; autres personnages du même nom 3.16 ; 7.7 ; Esd 2.2. –  la vingtième année d''Artaxerxès Ier (2.1 ; Esd 4.7n  ; cf. 7.1n), environ 445 av. J.-C. ; ou bien les années sont ici comptées, exceptionnellement pour l''époque, d''automne en automne, de sorte que Kislev (novembre-décembre) précède Nisân (mars-avril, premier mois en Esd 7.9n) de la même vingtième année (2.1), ou bien il faut lire ici la dix-neuvième année. –  Suse la citadelle  : cf. 2.8 ; 7.2 ; voir aussi Est 1.2n  ; Dn 8.2 ; Esd 6.2.'
  - type: text
    content: Paroles de Néhémie, fils de Hakalia.
  - type: text
    content: 'Au mois de Kislev, la vingtième année, comme j''étais à Suse la citadelle, '
  '10':
  - type: note
    content: Ex 32.11 ; Dt 9.29.
  - type: text
    content: 'Ils sont tes serviteurs et ton peuple, que tu as libérés par ta grande puissance et par ta main forte. '
  '11':
  - type: note
    content: 'que ton oreille…  : cf. v. 6+. –  ma prière  : litt. la prière de ton serviteur. –  qui désirent ou qui prennent plaisir à, cf. Ps 40.9. – Voir crainte. –  accorde-moi  : litt. donne-le (ou livre-le [ton serviteur]) à la compassion devant cet homme, cf. Gn 39.21 ; expressions analogues en Gn 43.14 ; 1R 8.50 ; Jr 42.12 ; Ps 106.46 ; 2Ch 30.9. –  cet homme  : le roi Artaxerxès (cf. 2.1-4). –  échanson ou sommelier, litt. celui qui verse à boire (2.1ss), fonction et distinction honorifique de haut rang ; cf. Gn 40.1 ; Tobit 1.21s : « Asarhaddon… chargea Ahikar… de toutes les finances de son royaume, et celui-ci eut donc la haute main sur toute l''administration… Ahikar, en effet, avait été grand échanson, garde du sceau, chef de l''administration et des finances sous Sennakérib, roi d''Assyrie, et Asarhaddon l''avait reconduit dans ses fonctions. » Un ms de LXX a lu eunuque, les deux mots étant assez voisins en grec. Quoi qu''il en soit, il est tout à fait possible que Néhémie, servant en présence de la reine, ait été un eunuque (2.6 ; cf. Dt 23.2 ; Es 56.3ss).'
  - type: text
    content: S'il te plaît, Seigneur, que ton oreille soit attentive à ma prière et à la prière de tes serviteurs qui désirent craindre ton nom ! Donne-moi aujourd'hui de réussir et accorde-moi la compassion de cet homme.
  - type: text
    content: Or moi, j'étais alors échanson du roi.
  '2':
  - type: note
    content: 'Hanani 7.2. –  frères  : soit au sens propre, soit au sens de proche parent (cf. Gn 14.16 ; 24.48). –  des Judéens  : autre traduction des Juifs  ; même terme en 2.16 ; 4.6,33s ; 5.1,8,17 ; 6.6 ; 13.23 ; cf. 2R 16.6n. –  restés  : cf. Esd 1.4+ ; il s''agit sans doute ici de ceux qui sont revenus d''exil (Esd 1–2 ; cf. 4.1n). –  captivité Esd 2.1+.'
  - type: text
    content: 'Hanani, l''un de mes frères, et quelques hommes arrivèrent de Juda. Je les interrogeai au sujet des Judéens rescapés qui étaient restés de la captivité, et au sujet de Jérusalem. '
  '3':
  - type: note
    content: 'province Esd 2.1n. –  malheur 2.17. –  déshonneur  : cf. 2.17n  ; Es 54.4 ; Ps 44.14 ; 79.4 ; 89.51. –  ses portes… 2.3,13 ; outre les restes de la grande destruction de 587/6 av. J.-C. (2R 25.10ss ; Es 64.10 ; Jr 52.12ss ; 2Ch 36.19), il y a sans doute ici une allusion à d''autres événements de l''époque perse, qui ont pu résulter de l''hostilité décrite en Esd 4.6-23.'
  - type: text
    content: 'Ils me répondirent : Ceux qui sont restés de la captivité sont là dans la province, au comble du malheur et du déshonneur ; il y a des brèches dans la muraille de Jérusalem, et ses portes ont été détruites par le feu.'
  - type: heading
    content: La prière de Néhémie en faveur des Judéens
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'je m''assis et je me mis à pleurer Ps 137.1 ; Esd 9.3 ; 10.1. –  deuil Dn 10.2 ; Esd 10.6. –  je jeûnai, je priai  : cf. 3.36+ ; Dn 9.3 ; Esd 8.23. –  Dieu du ciel Esd 1.2n.'
  - type: text
    content: 'Lorsque j''entendis ces paroles, je m''assis et je me mis à pleurer. Pendant plusieurs jours, je pris le deuil, je jeûnai, je priai devant le Dieu du ciel ; '
  '5':
  - type: note
    content: 9.32. –  grand et redoutable 4.8 ; Dt 7.21 ; 10.17 ; Dn 9.4. –  qui gardes l'alliance… Dt 7.9,12 ; 1R 8.23 ; Dn 9.4 ; 2Ch 6.14 ; gardes et observent traduisent un même verbe hébreu.
  - type: text
    content: 'je dis :'
  - type: text
    content: 'S''il te plaît, '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu du ciel, Dieu grand et redoutable, toi qui gardes l''alliance et la fidélité envers ceux qui t''aiment et qui observent tes commandements ! '
  '6':
  - type: note
    content: 'que ton oreille…  : cf. v. 11 ; 1R 8.25 ; Ps 5.2s ; 17.6 ; 130.2 ; 2Ch 6.20,40 ; 7.15. –  entendre ou écouter, exaucer. –  pour les Israélites, tes serviteurs 1S 12.19. –  confessant 9.2+. –  ma famille ou mes ancêtres, litt. la maison de mon père. –  nous avons péché  : cf. 9.32ss ; Dn 9.5ss ; Esd 9.6ss.'
  - type: text
    content: 'Je t''en prie, que ton oreille soit attentive, que tes yeux soient ouverts, pour entendre la prière que je t''adresse, moi, ton serviteur. Je suis en prière devant toi aujourd''hui, jour et nuit, pour les Israélites, tes serviteurs, en confessant les péchés des Israélites, nos péchés contre toi ; moi et ma famille, nous avons péché. '
  '7':
  - type: note
    content: 'mal agi  : expression très proche en Jb 34.31. –  commandements / prescriptions / règles Dt 5.31 ; 6.1 ; 7.11 ; 8.11 ; 11.1 ; voir loi. –  Moïse, ton serviteur v. 8 ; 9.14 ; Jos 1.1ss.'
  - type: text
    content: 'Nous avons vraiment mal agi envers toi ; nous n''avons pas observé les commandements, les prescriptions et les règles que tu as donnés à Moïse, ton serviteur. '
  '8':
  - type: note
    content: 'Cette citation est en fait une combinaison de formules issues principalement du Deutéronome, cf. Dt 30.1-4 ; Né 9.11n. –  donnée  : litt. ordonnée ou instituée. –  Lorsque…  : un ms hébreu et LXX ont lu si vous êtes infidèles…  ; le texte hébreu traditionnel porte seulement vous serez infidèles…  ; mais le si peut être sous-entendu. –  sacrilèges Esd 9.2n  ; voir saint. –  disperserai Dt 4.27 ; 28.63ss ; cf. Gn 11.4ss.'
  - type: text
    content: 'Souviens-toi, je t''en prie, de cette parole que tu as donnée à Moïse, ton serviteur : « Lorsque vous commettrez des sacrilèges, je vous disperserai parmi les peuples ; '
  '9':
  - type: note
    content: si vous revenez (litt. vous reviendrez, cf. v. 8n) à moi Dt 30.2,4,8 ; 1S 7.3 ; 1R 8.47s. –  pour y faire demeurer mon nom Dt 12.11 ; 14.23 ; 16.6,11 ; 26.2.
  - type: text
    content: 'mais si vous revenez à moi et si vous gardez mes commandements et les mettez en pratique, alors, quand même vous seriez bannis aux extrémités du ciel, de là je vous rassemblerai et je vous ramènerai vers le lieu que j''ai choisi pour y faire demeurer mon nom. » '
