    marker-yv: yv-n
  - type: text
    text: 'Ils me répondirent : Ceux qui sont restés de la captivité sont là dans la province, au comble du malheur et du déshonneur ; il y a des brèches dans la muraille de Jérusalem, et ses portes ont été détruites par le feu.'
