  - type: text
    text: 'Si ton frère, fils de ta mère, ton fils, ta fille, la femme qui dort sur ton sein, ou ton ami que tu aimes comme toi-même, essaie de t''entraîner secrètement en disant : « Allons servir d''autres dieux ! » – des dieux que ni toi ni tes pères n''avez connus, '
  - type: usfm
