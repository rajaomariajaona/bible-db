document_id: DEU.13,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Certaines éditions rattachent ce verset au chap. 12 et décalent en conséquence la numérotation du chap. 13. –  vous veillerez… ou vous l'observerez pour le mettre en pratique , cf. 5.1n. –  Tu (1.8n) n'y ajouteras rien… 4.2+.
  - type: text
    content: Tout ce que je vous ordonne, vous veillerez à le mettre en pratique. Tu n'y ajouteras rien et tu n'en retrancheras rien.
  - type: heading
    content: Contre les adorateurs des faux dieux
  '10':
  - type: note
    content: 17.7 ; cf. Jos 7.25s ; Jn 8.7.
  - type: text
    content: 'Tu le tueras ; tu lèveras le premier la main sur lui pour le mettre à mort, et tout le peuple ensuite ; '
  '11':
  - type: note
    content: tu le lapideras 17.5 ; 21.21 ; 22.21,24 ; sur cette pratique, voir aussi Ex 19.13 ; 21.28 ; Nb 15.35 ; Jos 7.25s ; 1R 21.10 ; Jn 8.2-11 ; 10.31-33.
  - type: text
    content: 'tu le lapideras, et il mourra, parce qu''il a cherché à t''entraîner loin du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, qui te fait sortir de l''Egypte, de la maison des esclaves. '
  '12':
  - type: note
    content: 17.13 ; 19.20 ; 21.21.
  - type: text
    content: Tout Israël l'apprendra et sera dans la crainte, et on ne commettra plus une action aussi mauvaise en ton sein.
  '13':
  - type: text
    content: 'Si tu entends dire au sujet de l''une des villes que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a données pour y habiter : '
  '14':
  - type: note
    content: 'Des hommes sans morale  : litt. des hommes, des fils de beliya‘al  ; le terme beliya‘al (plus connu sous la forme Bélial, cf. 2Co 6.15n) est traditionnellement interprété dans le sens de sans valeur ou sans profit. Dans l''A.T. il peut désigner une puissance de destruction (2S 22.5 ; Na 1.11 ; 2.1 ; Ps 18.5 ; 41.9 ; 101.3). Il s''applique souvent à des gens qui transgressent les règles de la société humaine, d''où la traduction sans morale (Dt 15.9n  ; Jg 19.22 ; 20.13 ; 1S 1.16 ; 2.12 ; 10.27 ; 25.17,25 ; 30.22 ; 2S 16.7 ; 20.1 ; 23.6 ; 1R 21.10,13 ; Jb 34.18n  ; Pr 6.12 ; 16.27 ; 19.28 ; 2Ch 13.7). –  ont entraîné  : même verbe aux v. 6,11 ; voir aussi 30.17n. –  Allons servir v. 7.'
  - type: text
    content: '« Des hommes sans morale sont sortis de toi et ont entraîné les habitants de leur ville en disant : “Allons servir d''autres dieux !” » – des dieux que vous ne connaissez pas – '
  '15':
  - type: note
    content: recherche 17.4 ; 19.18.
  - type: text
    content: 'tu procéderas à une recherche, à une enquête, à des interrogatoires sérieux. La chose est-elle vraie, le fait est-il établi, cette abomination a-t-elle été commise en ton sein, '
  '16':
  - type: note
    content: 'anathème 2.34n  ; voir bénédiction, malédiction. –  y compris les bêtes : tu les passeras au fil de l''épée  : cette précision est absente de certains mss grecs.'
  - type: text
    content: 'alors tu passeras au fil de l''épée les habitants de cette ville ; tu la frapperas d''anathème, elle et tout ce qui s''y trouve, y compris les bêtes : tu les passeras au fil de l''épée. '
  '17':
  - type: note
    content: 'de la place  : litt. de sa place (c.-à-d. de la place publique de la ville). –  tu les détruiras complètement ou en offrande entière  ; cf. 33.10 ; voir sacrifice. –  tertre inhabité  : hébreu tel, d''où vient le mot d''origine arabe tell qui désigne un monceau de ruines recouvert de terre ; cf. Jos 8.28.'
  - type: text
    content: 'Tu rassembleras tout son butin au milieu de la place et tu mettras le feu à la ville et à tout le butin qui s''y trouve, tu les détruiras complètement pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu : elle sera pour toujours un tertre inhabité, elle ne sera jamais rebâtie. '
  '18':
  - type: note
    content: 'qu''il t''accorde sa compassion  : litt. qu''il te donne compassion et ait compassion de toi 4.31+.'
  - type: text
    content: 'Rien de ce qui a été frappé d''anathème ne s''attachera à ta main, afin que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' revienne de sa colère ardente, qu''il t''accorde sa compassion et qu''il te multiplie, comme il l''a juré à tes pères, '
  '19':
  - type: note
    content: écoutes 4.30n. –  tous ses commandements… 4.2n. –  ce qui convient… 6.18+.
  - type: text
    content: 'pourvu que tu écoutes le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en observant tous ses commandements, tels que je les institue pour toi aujourd''hui, et en faisant ce qui convient au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'un faiseur de rêves  : litt. un rêveur de rêve  ; cf. Jr 23.25 ; voir prophète. –  qui t''annonce  : litt. qui te donne . –  signe / prodige  : cf. 4.34+ ; Ex 4.30s ; 7.11 ; 1R 18.36-39 ; Mt 24.24/ / ; Ac 8.11 ; 2Th 2.9 ; Ap 13.13s.'
  - type: text
    content: 'S''il se lève en ton sein un prophète ou un faiseur de rêves qui t''annonce un signe ou un prodige, '
  '3':
  - type: note
    content: 'qu''arrive le signe…  : cf. 18.21s. –  Suivons… 6.14n.'
  - type: text
    content: 'et qu''arrive le signe ou le prodige dont il t''a parlé, en disant : « Suivons d''autres dieux » – des dieux que vous ne connaissez pas – « et servons-les ! » '
  '4':
  - type: note
    content: vous met à l'épreuve 8.2+ ; cf. 1Co 11.19. –  si vous aimez… 5.10+ ; 6.5. –  de tout votre cœur et de toute votre âme (cf. Gn 1.20n) 4.29+.
  - type: text
    content: 'tu n''écouteras pas les paroles de ce prophète ou de ce faiseur de rêves : c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, qui vous met à l''épreuve pour savoir si vous aimez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, de tout votre cœur et de toute votre âme. '
  '5':
  - type: note
    content: 'suivrez 6.14n. –  Seigneur (YHWH)  : voir noms divins. –  craindrez 4.10+. –  observerez 4.6n. –  écouterez 4.30n. –  servirez 10.12n. –  vous vous attacherez 10.20+.'
  - type: text
    content: 'Vous suivrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, et vous le craindrez, vous observerez ses commandements, vous l''écouterez, c''est lui que vous servirez, et vous vous attacherez à lui. '
  '6':
  - type: note
    content: 'appelé à la subversion (ou à l''apostasie) contre…  : cf. 19.16 ; Es 1.5 ; 31.6 ; 59.13 ; même expression en Jr 28.16 ; 29.32. –  vous / te 1.8n. –  fait sortir / libère 7.8+,19. –  maison des esclaves 5.6+. –  Tu élimineras  : le verbe hébreu correspondant a aussi le sens de consumer, dévorer, parfois balayer  ; de même en 17.7,12 ; 19.13,19 ; 21.9,21 ; 22.21s ; 24.7 ; 26.13ns (ôter) ; Jg 20.13 ; 1R 14.10n  ; 22.47 ; 2R 23.24 ; 2Ch 19.3 ; cf. 1Co 5.13.'
  - type: text
    content: 'Ce prophète ou ce faiseur de rêves sera mis à mort, car il a appelé à la subversion contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, qui vous fait sortir d''Egypte et qui te libère de la maison des esclaves ; il a voulu t''entraîner hors de la voie que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a ordonné de suivre. Tu élimineras ainsi de ton sein ce qui est mauvais.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'fils de ta mère  : Smr, LXX fils de ton père ou fils de ta mère . –  qui dort sur ton sein  : litt. de ton sein  ; 28.54,56. –  ton ami  : le même mot est traduit par prochain en Lv 19.18. –  que tu aimes  : litt. qui (est). –  comme toi-même  : autre traduction comme ton âme (sur le terme hébreu correspondant, voir Gn 1.20n). –  servir (10.12n) d''autres dieux  : cf. 6.14+ ; voir aussi 13.14 ; 17.3.'
  - type: text
    content: 'Si ton frère, fils de ta mère, ton fils, ta fille, la femme qui dort sur ton sein, ou ton ami que tu aimes comme toi-même, essaie de t''entraîner secrètement en disant : « Allons servir d''autres dieux ! » – des dieux que ni toi ni tes pères n''avez connus, '
  '8':
  - type: text
    content: 'd''entre les dieux des peuples qui vous entourent, de ceux qui sont proches de toi comme de ceux qui sont loin de toi, d''une extrémité de la terre à l''autre – '
  '9':
  - type: note
    content: sans pitié 7.16+.
  - type: text
    content: 'tu n''y consentiras pas, tu ne l''écouteras pas ; ton œil sera sans pitié : tu ne l''épargneras pas, tu ne le couvriras pas. '
