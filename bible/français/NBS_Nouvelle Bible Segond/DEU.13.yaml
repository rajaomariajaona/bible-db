    - type: text
      text: '8'
  - type: text
    text: 'd''entre les dieux des peuples qui vous entourent, de ceux qui sont proches de toi comme de ceux qui sont loin de toi, d''une extrémité de la terre à l''autre – '
  - type: usfm
