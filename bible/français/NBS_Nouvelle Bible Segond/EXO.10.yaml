document_id: EXO.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Huitième fléau : les criquets'
  - type: text
    content: ' '
  - type: note
    content: 'qui l''ai rendu obtus  : litt. qui ai alourdi son cœur et le cœur de ses serviteurs 7.14n. –  signes 7.3+. –  au milieu d''eux  : autre traduction en lui  ; cf. 3.20n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Va trouver le pharaon, car c''est moi qui l''ai rendu obtus, lui et les gens de sa cour, pour placer mes signes au milieu d''eux. '
  '10':
  - type: note
    content: 'Il leur dit  : c.-à-d. le pharaon leur dit. –  Que le Seigneur …  : vœu ironique. –  et toutes vos familles  : autre traduction et vos enfants  ; cf. Gn 34.29n. –  vous avez de mauvaises intentions  : litt. un mal (ou un malheur) (est) devant vos faces, ce qui pourrait aussi signifier vous allez au-devant d''un malheur.'
  - type: text
    content: 'Il leur dit : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) soit donc avec vous quand je vous laisserai partir, vous et toutes vos familles… vous voyez bien que vous avez de mauvaises intentions ! '
  '11':
  - type: note
    content: '8.21+. –  on les chassa  : litt. il les chassa  ; Smr, LXX, Syr ont lu le pluriel (qui correspond plus naturellement à l''indéfini on).'
  - type: text
    content: 'N''y comptez pas ! Allez-y, je vous prie, vous, les hommes, et servez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), puisque c''est là ce que vous cherchez ! Sur quoi on les chassa de devant le pharaon.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'pour faire venir les criquets  : litt. pour les criquets.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Etends ta main sur l''Egypte pour faire venir les criquets ; qu''ils montent sur l''Egypte, qu''ils dévorent toute l''herbe de la terre, tout ce que la grêle a laissé. '
  '13':
  - type: note
    content: 'brandit  : le même verbe est traduit par étendre au v. 12 ; cf. 9.23n.'
  - type: text
    content: 'Moïse brandit son bâton sur l''Egypte ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit souffler un vent d''est sur le pays toute la journée et toute la nuit. Au matin, le vent d''est avait amené les criquets. '
  '14':
  - type: note
    content: 'une masse  : litt. très lourd, cf. 9.18n.'
  - type: text
    content: 'Les criquets montèrent sur toute l''Egypte et se posèrent dans tout le territoire de l''Egypte ; il y avait une masse de criquets telle qu''il n''y en avait jamais eu auparavant et qu''il n''y en aurait plus jamais par la suite. '
  '15':
  - type: note
    content: V. 5n.
  - type: text
    content: Ils couvrirent tout le pays, et la terre fut obscurcie ; ils dévorèrent toute l'herbe de la terre et tous les fruits des arbres, tout ce qui était resté après la grêle ; dans toute l'Egypte il ne resta aucune verdure aux arbres ni à l'herbe des champs.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 9.27+.
  - type: text
    content: 'Le pharaon se hâta d''appeler Moïse et Aaron. Il leur dit : J''ai péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, et contre vous. '
  '17':
  - type: note
    content: 'pardonne mon péché  : autres traductions enlève mon péché ; charge-toi de mon péché  ; cf. 23.21n  ; 28.38n,43 ; 32.32n  ; 34.7n  ; Gn 50.17n. –  intercédez 8.4+. –  ce fléau mortel  : litt. cette mort.'
  - type: text
    content: 'Maintenant, je t''en prie, pardonne mon péché, cette fois encore ; intercédez auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, afin qu''au moins il éloigne de moi ce fléau mortel. '
  '18':
  - type: text
    content: 'Moïse sortit de chez le pharaon et il intercéda auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '19':
  - type: note
    content: 'd''ouest  : litt. de la mer, désignation géographique à comprendre du point de vue d''Israël (cf. Gn 12.8n), de même en 26.22. –  la mer des Joncs 13.18n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit souffler un vent d''ouest très fort qui emporta les criquets et les précipita dans la mer des Joncs ; il ne resta pas un seul criquet dans tout le territoire de l''Egypte. '
  '2':
  - type: note
    content: 'que tu racontes… 12.26s ; 13.8,14 ; Dt 4.9 ; 6.7,20-23 ; Ps 78.3-7. –  à ton fils  : litt. aux oreilles de ton fils. –  des Egyptiens  : autre traduction de l''Egypte. –  fait apparaître  : litt. mis. –  saurez 7.17+. –  YHWH  : voir noms divins.'
  - type: text
    content: 'C''est aussi pour que tu racontes à ton fils et au fils de ton fils comment je me suis joué des Egyptiens, et quels signes j''ai fait apparaître chez eux. Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '20':
  - type: note
    content: s'entête 4.21n  ; 7.3n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit en sorte que le pharaon s''entête : il ne laissa pas partir les Israélites.'
  - type: heading
    content: 'Neuvième fléau : les ténèbres'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'ténèbres Ps 105.28 ; Ap 16.10s. –  palpables  : selon LXX ; la même racine hébraïque a le sens de tâter en Gn 27.12,22, de fouiller en Gn 31.34,37. On pourrait aussi comprendre ici des ténèbres où l''on tâtonne (cf. Dt 28.29 ; Jb 5.14 ; 12.25, même verbe).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Tends ta main vers le ciel ; qu''il y ait des ténèbres sur l''Egypte, des ténèbres palpables. '
  '22':
  - type: text
    content: 'Moïse tendit sa main vers le ciel ; il y eut d''épaisses ténèbres dans toute l''Egypte pendant trois jours. '
  '23':
  - type: note
    content: Cf. 8.18+. Sur l'opposition ténèbres / lumière, voir Gn 1.2-4+.
  - type: text
    content: Les gens ne pouvaient pas se voir les uns les autres ; personne ne se leva de sa place pendant trois jours. Mais tous les Israélites avaient de la lumière là où ils habitaient.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.21+. –  toutes vos familles v. 10 ; Gn 34.29n.
  - type: text
    content: 'Le pharaon appela Moïse et lui dit : Allez, servez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). Vous ne laisserez sur place que votre petit bétail et votre gros bétail ; toutes vos familles pourront aller avec vous. '
  '25':
  - type: note
    content: 'Tu nous donneras toi-même  : autre traduction tu mettras toi-même dans nos mains  ; voir aussi sacrifices.'
  - type: text
    content: 'Moïse répondit : Tu nous donneras toi-même de quoi faire les sacrifices et les holocaustes que nous offrirons au '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu. '
  '26':
  - type: note
    content: 'Cf. 3.12n. –  nous en aurons besoin  : litt. nous en prendrons. –  avec quoi  : autre traduction comment.'
  - type: text
    content: 'Nos troupeaux aussi iront avec nous, il n''en restera pas même un sabot ; car nous en aurons besoin pour servir le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu ; d''ailleurs, tant que nous ne serons pas arrivés là-bas, nous ne saurons pas avec quoi nous devrons servir le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '27':
  - type: note
    content: 'V. 20+ –  fit en sorte que le pharaon s''entête  : 4.21n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit en sorte que le pharaon s''entête : il ne voulut pas les laisser partir.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Le pharaon lui dit  : c.-à-d. le pharaon dit à Moïse . –  reparaître en ma présence  : litt. revoir ma face.'
  - type: text
    content: 'Le pharaon lui dit : Sors de chez moi ! Garde-toi de reparaître en ma présence, car le jour où tu paraîtras en ma présence, tu mourras ! '
  '29':
  - type: note
    content: Cf. 11.4,8.
  - type: text
    content: 'Tu l''as dit, répliqua Moïse : je ne reparaîtrai plus en ta présence.'
  '3':
  - type: note
    content: 't''abaisser  : autre traduction t''humilier.'
  - type: text
    content: 'Moïse et Aaron se rendirent auprès du pharaon ; ils lui dirent : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu des Hébreux : Jusqu''à quand refuseras-tu de t''abaisser devant moi ? Laisse partir mon peuple, pour qu''il me serve. '
  '4':
  - type: note
    content: criquets Ps 78.46 ; 105.34 ; cf. Jl 1.4-12 ; Na 3.15-17 ; Ap 9.1-11.
  - type: text
    content: 'Si tu refuses de laisser partir mon peuple, demain je ferai venir des criquets sur ton territoire. '
  '5':
  - type: note
    content: 'le pays  : litt. l''œil du pays, sans doute au sens d’apparence, d''où la suite : on ne pourra plus voir… (terre et pays traduisent un même mot hébreu) ; de même au v. 15. Cf. Nb 22.5,11. –  le reste  : cf. 9.32.'
  - type: text
    content: 'Ils couvriront le pays, et on ne pourra plus voir la terre ; ils dévoreront le reste de ce qui a échappé, tout ce que vous a laissé la grêle ; ils dévoreront tous les arbres qui poussent pour vous dans la campagne ; '
  '6':
  - type: note
    content: 'toute l''Egypte  : autre traduction tous les Egyptiens. –  terre ou sol, cf. Gn 2.5n.'
  - type: text
    content: 'ils rempliront tes maisons, les maisons de tous les gens de ta cour et les maisons de toute l''Egypte. Tes pères et les pères de tes pères n''ont rien vu de pareil depuis qu''ils sont sur cette terre, jusqu''à ce jour. Il ressortit de chez le pharaon. '
  '7':
  - type: note
    content: 'ces gens  : litt. les hommes, cf. v. 8ss.'
  - type: text
    content: 'Les gens de la cour du pharaon lui dirent : Jusqu''à quand cet homme sera-t-il pour nous un piège ? Laisse partir ces gens, et qu''ils servent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu. Ne sais-tu pas encore que l''Egypte périt ?'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.21+.
  - type: text
    content: 'On fit revenir Moïse et Aaron auprès du pharaon : Allez, leur dit-il, servez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu. Quels sont ceux qui iront ? '
  '9':
  - type: note
    content: fête 5.1n.
  - type: text
    content: 'Moïse répondit : Nous irons avec nos jeunes gens et nos vieillards, nous irons avec nos fils et nos filles, avec notre petit bétail et notre gros bétail : c''est une fête du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour nous. '
