document_id: EXO.10,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Huitième fléau : les criquets'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui l'ai rendu obtus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui ai alourdi son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' et le cœur de ses serviteurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'signes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au milieu d'eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 3.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Va trouver le pharaon, car c''est moi qui l''ai rendu obtus, lui et les gens de sa cour, pour placer mes signes au milieu d''eux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il leur dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le pharaon leur dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' …'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : vœu ironique. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et toutes vos familles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et vos enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 34.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous avez de mauvaises intentions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un mal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (est) devant vos faces
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous allez au-devant d'un malheur.
      marker-yv: yv-n
    - type: text
      text: 'Il leur dit : Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) soit donc avec vous quand je vous laisserai partir, vous et toutes vos familles… vous voyez bien que vous avez de mauvaises intentions ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on les chassa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il les chassa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Smr, LXX, Syr ont lu le pluriel (qui correspond plus naturellement à l''indéfini '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'N''y comptez pas ! Allez-y, je vous prie, vous, les hommes, et servez le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), puisque c''est là ce que vous cherchez ! Sur quoi on les chassa de devant le pharaon.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour faire venir les criquets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour les criquets.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Etends ta main sur l''Egypte pour faire venir les criquets ; qu''ils montent sur l''Egypte, qu''ils dévorent toute l''herbe de la terre, tout ce que la grêle a laissé. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: brandit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'étendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 12 ; cf. 9.23
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse brandit son bâton sur l''Egypte ; le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit souffler un vent d''est sur le pays toute la journée et toute la nuit. Au matin, le vent d''est avait amené les criquets. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une masse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: très lourd
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 9.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les criquets montèrent sur toute l''Egypte et se posèrent dans tout le territoire de l''Egypte ; il y avait une masse de criquets telle qu''il n''y en avait jamais eu auparavant et qu''il n''y en aurait plus jamais par la suite. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Ils couvrirent tout le pays, et la terre fut obscurcie ; ils dévorèrent toute l'herbe de la terre et tous les fruits des arbres, tout ce qui était resté après la grêle ; dans toute l'Egypte il ne resta aucune verdure aux arbres ni à l'herbe des champs.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.27+.
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon se hâta d''appeler Moïse et Aaron. Il leur dit : J''ai péché contre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), votre Dieu, et contre vous. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pardonne mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enlève mon péché ; charge-toi de mon péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 23.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 28.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',43 ; 32.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 34.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Gn 50.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'intercédez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce fléau mortel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette mort.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, je t''en prie, pardonne mon péché, cette fois encore ; intercédez auprès du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), votre Dieu, afin qu''au moins il éloigne de moi ce fléau mortel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Moïse sortit de chez le pharaon et il intercéda auprès du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'ouest
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la mer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', désignation géographique à comprendre du point de vue d''Israël (cf. Gn 12.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), de même en 26.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la mer des Joncs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit souffler un vent d''ouest très fort qui emporta les criquets et les précipita dans la mer des Joncs ; il ne resta pas un seul criquet dans tout le territoire de l''Egypte. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que tu racontes… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.26s ; 13.8,14 ; Dt 4.9 ; 6.7,20-23 ; Ps 78.3-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à ton fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux oreilles de ton fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fait apparaître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'saurez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'C''est aussi pour que tu racontes à ton fils et au fils de ton fils comment je me suis joué des Egyptiens, et quels signes j''ai fait apparaître chez eux. Ainsi vous saurez que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''entête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 7.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit en sorte que le pharaon s''entête : il ne laissa pas partir les Israélites.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Neuvième fléau : les ténèbres'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ténèbres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 105.28 ; Ap 16.10s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: palpables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : selon LXX ; la même racine hébraïque a le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tâter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Gn 27.12,22, de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fouiller '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Gn 31.34,37. On pourrait aussi comprendre ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des ténèbres où l''on tâtonne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Dt 28.29 ; Jb 5.14 ; 12.25, même verbe).
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Tends ta main vers le ciel ; qu''il y ait des ténèbres sur l''Egypte, des ténèbres palpables. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Moïse tendit sa main vers le ciel ; il y eut d''épaisses ténèbres dans toute l''Egypte pendant trois jours. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 8.18+. Sur l''opposition '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: ténèbres
        - type: text
          text: ' / '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lumière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir Gn 1.2-4+.'
      marker-yv: yv-n
    - type: text
      text: Les gens ne pouvaient pas se voir les uns les autres ; personne ne se leva de sa place pendant trois jours. Mais tous les Israélites avaient de la lumière là où ils habitaient.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 8.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'toutes vos familles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10 ; Gn 34.29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon appela Moïse et lui dit : Allez, servez le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). Vous ne laisserez sur place que votre petit bétail et votre gros bétail ; toutes vos familles pourront aller avec vous. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu nous donneras toi-même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu mettras toi-même dans nos mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir aussi '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse répondit : Tu nous donneras toi-même de quoi faire les sacrifices et les holocaustes que nous offrirons au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 3.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous en aurons besoin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous en prendrons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec quoi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comment.
      marker-yv: yv-n
    - type: text
      text: 'Nos troupeaux aussi iront avec nous, il n''en restera pas même un sabot ; car nous en aurons besoin pour servir le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu ; d''ailleurs, tant que nous ne serons pas arrivés là-bas, nous ne saurons pas avec quoi nous devrons servir le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 20+ –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fit en sorte que le pharaon s'entête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 4.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit en sorte que le pharaon s''entête : il ne voulut pas les laisser partir.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le pharaon lui dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le pharaon dit à Moïse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: reparaître en ma présence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: revoir ma face.
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon lui dit : Sors de chez moi ! Garde-toi de reparaître en ma présence, car le jour où tu paraîtras en ma présence, tu mourras ! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 11.4,8.
      marker-yv: yv-n
    - type: text
      text: 'Tu l''as dit, répliqua Moïse : je ne reparaîtrai plus en ta présence.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'abaisser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: t'humilier.
      marker-yv: yv-n
    - type: text
      text: 'Moïse et Aaron se rendirent auprès du pharaon ; ils lui dirent : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), le Dieu des Hébreux : Jusqu''à quand refuseras-tu de t''abaisser devant moi ? Laisse partir mon peuple, pour qu''il me serve. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'criquets '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 78.46 ; 105.34 ; cf. Jl 1.4-12 ; Na 3.15-17 ; Ap 9.1-11.
      marker-yv: yv-n
    - type: text
      text: 'Si tu refuses de laisser partir mon peuple, demain je ferai venir des criquets sur ton territoire. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'œil du pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sans doute au sens d’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: apparence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''où la suite : '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on ne pourra plus voir… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent un même mot hébreu) ; de même au v. 15. Cf. Nb 22.5,11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le reste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.32.'
      marker-yv: yv-n
    - type: text
      text: 'Ils couvriront le pays, et on ne pourra plus voir la terre ; ils dévoreront le reste de ce qui a échappé, tout ce que vous a laissé la grêle ; ils dévoreront tous les arbres qui poussent pour vous dans la campagne ; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toute l'Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sol
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 2.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ils rempliront tes maisons, les maisons de tous les gens de ta cour et les maisons de toute l''Egypte. Tes pères et les pères de tes pères n''ont rien vu de pareil depuis qu''ils sont sur cette terre, jusqu''à ce jour. Il ressortit de chez le pharaon. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ces gens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 8ss.'
      marker-yv: yv-n
    - type: text
      text: 'Les gens de la cour du pharaon lui dirent : Jusqu''à quand cet homme sera-t-il pour nous un piège ? Laisse partir ces gens, et qu''ils servent le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), leur Dieu. Ne sais-tu pas encore que l''Egypte périt ?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 8.21+.
      marker-yv: yv-n
    - type: text
      text: 'On fit revenir Moïse et Aaron auprès du pharaon : Allez, leur dit-il, servez le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), votre Dieu. Quels sont ceux qui iront ? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse répondit : Nous irons avec nos jeunes gens et nos vieillards, nous irons avec nos fils et nos filles, avec notre petit bétail et notre gros bétail : c''est une fête du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour nous. '
