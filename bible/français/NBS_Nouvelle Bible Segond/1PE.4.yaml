document_id: 1PE.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Rompre avec le passé
  - type: text
    content: ' '
  - type: note
    content: 'souffert dans la chair  : cf. 2.21,24 ; 3.18n (les mss présentent ici des variantes analogues  : mort / pour vous ou pour nous ). –  vous aussi  : cf. 2Co 5.14s. –  en a fini avec le péché Rm 6.2,6s,11 ; cf. 8.3 ; Hé 5.8s.'
  - type: text
    content: 'Ainsi donc, puisque le Christ a souffert dans la chair, vous aussi, armez-vous de la même pensée ; car celui qui a souffert dans la chair en a fini avec le péché, '
  '10':
  - type: note
    content: 'Litt. selon que chacun a reçu un don, mettez-le au service… –  don… de la grâce  : le terme grec, dérivé de celui qui est habituellement traduit par grâce, a donné notre mot charisme(s) Rm 1.11n  ; 12.6n  ; 1Co 12.4n. –  bons  : le terme peut également signifier beau(x)  ; cf. 1Tm 1.8n. –  intendants  : cf. Lc 12.42+ss. –  diverse  : cf. 1Co 12.'
  - type: text
    content: 'Que chacun mette au service des autres le don qu''il a reçu de la grâce ; vous serez ainsi de bons intendants de la grâce si diverse de Dieu. '
  '11':
  - type: note
    content: 'paroles  : le terme grec est un dérivé d''un des mots habituellement traduits par parole, cf. 1.23 ; 2.8 ; 3.1 ; voir Ac 7.38n  ; voir aussi Jn 12.50 ; Rm 12.6 ; 2Co 2.17. –  sert  : le verbe correspondant est apparenté aux mots qui ont donné diacre, diaconat, et qui sont aussi traduits par ministre, ministère (de même au v. 10, mettre au service), voir Rm 12.7n  ; 1Tm 3.8n  ; voir aussi Ac 6.1nss. –  qu''en tout… 1Co 10.31. –  la gloire… Rm 16.27+. –  le pouvoir 5.11 ; 1Tm 6.16n  ; Jd 25 ; cf. Ap 5.12ss. –  à tout jamais  : traduction traditionnelle aux siècles des siècles, cf. 5.11 ; Ga 1.5n  ; 2Tm 4.18 ; 2P 3.18 ; Ap 1.6+.'
  - type: text
    content: 'Si quelqu''un parle, qu''il parle de façon à communiquer les paroles de Dieu ; si quelqu''un sert, qu''il serve par la force que Dieu lui accorde, afin qu''en tout Dieu soit glorifié par Jésus-Christ, à qui sont la gloire et le pouvoir à tout jamais. '
  - type: text
    content: Amen !
  - type: heading
    content: Heureux de souffrir pour le Christ
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Bien-aimés 2.11. –  ne soyez pas surpris  : même verbe v. 4 ; c''est un terme apparenté qui est traduit par étrange . Cf. 1Jn 3.13. –  l''embrasement…  : cf. 1.7. –  mettre à l''épreuve 1.6 ; Jc 1.2+.'
  - type: text
    content: 'Bien-aimés, ne soyez pas surpris de l''embrasement qui sévit parmi vous pour vous mettre à l''épreuve, comme s''il vous arrivait quelque chose d''étrange. '
  '13':
  - type: note
    content: réjouissez-vous 1.6 ; Mt 5.11s/ / ; Ac 5.41 ; 2Co 12.9. –  avoir part aux (ou être solidaires des  ; verbe apparenté au mot habituellement traduit par communion, cf. 5.1) souffrances du Christ Rm 8.17 ; Col 1.24. –  révélation (1Co 1.7+) de sa gloire Mt 25.31 ; cf. Col 3.4.
  - type: text
    content: 'Au contraire, réjouissez-vous d''avoir part aux souffrances du Christ, afin qu''aussi vous vous réjouissiez et soyez transportés d''allégresse à la révélation de sa gloire. '
  '14':
  - type: note
    content: 'insultés  : autre terme grec qu''en 2.23 ; cf. Mc 15.32/ / ; Rm 15.3 ; Hé 10.33n  ; 11.26 ; 13.13 ; voir aussi Ps 89.51s. –  pour (litt. en, comme au v. 16) le nom du Christ ou au nom du Christ  ; cf. 2.20 ; 3.14,17 ; Mt 10.22 ; Ac 5.41 ; Jc 2.7. –  l''Esprit…  : cf. Mt 10.20/ / ; Jn 16.8ss ; Rm 8.11 ; voir aussi Nb 11.25 ; Es 11.2  ; Mt 3.16/ / ; Lc 10.6. –  glorieux  : litt. de la gloire  ; cf. Ex 40.36ss ; certains mss ajoutent et de la puissance  ; d''autres ajoutent à la fin du v. il est blasphémé par eux mais glorifié par vous  ; cf. Hymnes (Qumrân) 9.10ss : « J''ai aimé mon jugement, et dans les coups qui me frappaient je me suis complu… tu n''as pas repoussé mon bonheur. Et tu n''as pas déserté mon espérance, et en face des coups tu as fait résister mon esprit. » 9.24ss : « Mon châtiment est devenu pour moi une joie et une allégresse, et les coups qui me frappaient une guérison éternelle et [un bonheur] sans fin ; et le mépris de mes adversaires est devenu pour moi une couronne glorieuse, et mon trébuchement une puissance éternelle. »'
  - type: text
    content: 'Si vous êtes insultés pour le nom du Christ, heureux êtes-vous, car l''Esprit glorieux, '
  - type: text
    content: l'Esprit de Dieu, repose
  - type: text
    content: ' sur vous ! '
  '15':
  - type: note
    content: 'fait le mal  : cf. 2.12,14. –  parce qu''il se mêle des affaires d''autrui  : litt. comme surveillant d''autrui, mais le sens exact du terme grec est incertain ; on a aussi compris comme délateur.'
  - type: text
    content: 'Cependant, qu''aucun de vous ne souffre comme meurtrier, comme voleur, parce qu''il fait le mal ou parce qu''il se mêle des affaires d''autrui ; '
  '16':
  - type: note
    content: 'chrétien Ac 11.26+. –  qu''il n''en ait pas honte Ph 1.20 ; 2Tm 1.12 ; voir aussi Mc 8.38/ / ; Ac 5.41 ; Rm 1.16. –  en ce nom  : cf. v. 14n.'
  - type: text
    content: 'mais si c''est comme chrétien, qu''il n''en ait pas honte ; qu''il glorifie plutôt Dieu en ce nom. '
  '17':
  - type: note
    content: 'moment 1.5n. –  jugement v. 5+ ; cf. Jr 7.12ss ; Am 3.2 ; Ha 1–3 ; So 1–2 ; Ml 3.1ss ; 1Co 3.10ss ; 4.5 ; 11.30-32 ; 2Th 1.5 ; Ap 3.2 ; 14.13. –  par la maison de Dieu  : cf. 2.5 ; Hé 3.6+ ; voir Ez 9.6. –  ceux qui refusent d''obéir  : cf. 2.8+ ; 2Th 1.8 ; voir aussi Jr 25.29 ; Lc 23.31.'
  - type: text
    content: 'Car c''est le moment où le jugement commence par la maison de Dieu. Or si c''est par nous qu''il débute, quelle sera la fin de ceux qui refusent d''obéir à la bonne nouvelle de Dieu ? '
  '18':
  - type: note
    content: 'Cf. 3.12 ; Pr 11.31. –  que deviendra  : litt. où paraîtra.'
  - type: text
    content: 'Et '
  - type: text
    content: si le juste n'est sauvé que difficilement, que deviendra celui qui est impie et pécheur ?
  - type: text
    content: ' '
  '19':
  - type: note
    content: '2.20+. –  en faisant le bien 2.12,14s,20 ; 3.13,16s. –  s''en remettent  : autre traduction remettent leur âme (1.9n) 2.23 ; cf. Ps 31.6 ; Lc 23.46. –  digne de confiance ou fidèle 5.12 ; voir aussi 1.21n  ; 1Co 1.9n.'
  - type: text
    content: Ainsi, qu'en faisant le bien ceux qui souffrent selon la volonté de Dieu s'en remettent au Créateur, qui est digne de confiance.
  '2':
  - type: note
    content: 'Cf. 2.11 ; 1Jn 2.16s. –  qui lui reste…  : autre traduction qui vous reste (litt. le temps qui reste en chair).'
  - type: text
    content: 'afin de vivre, non plus selon des désirs humains, mais selon la volonté de Dieu pendant le temps qui lui reste à vivre dans la chair. '
  '3':
  - type: note
    content: 'Cf. Rm 1.29+ss ; 13.13 ; Ga 5.19ss. –  passé 1.14,18+ ; cf. Ep 2.2s ; Tt 3.3. –  la volonté  : autre terme grec qu''au v. 2 ; celui-ci est traduit par décision(s) en Ac 27.43 ; Rm 9.19. –  gens des nations 2.12n  ; voir non-Juifs. –  en vous livrant à  : litt. en allant ou en marchant dans. –  des idolâtries infâmes ou illicites (le même terme est traduit par interdit en Ac 10.28) : l''expression pourrait faire allusion aux excès de certains cultes d''Asie, condamnés même par la loi romaine.'
  - type: text
    content: 'En effet, vous avez suffisamment accompli, dans le passé, la volonté des gens des nations, en vous livrant à la débauche, aux désirs, à l''ivrognerie, aux orgies, aux beuveries et à des idolâtries infâmes. '
  '4':
  - type: note
    content: 'surpris v. 12n. –  débauche  : cf. Lc 15.13 (terme apparenté). –  calomnient  : autre traduction blasphèment  ; cf. Jc 2.7 ; voir bénédiction, malédiction.'
  - type: text
    content: 'Ils sont surpris que vous ne couriez pas avec eux vers ce débordement de débauche, et ils calomnient : '
  '5':
  - type: note
    content: 'rendront compte  : cf. 3.12,15n. –  juger (v. 17 ; 1.17 ; 2.24) les vivants et les morts Ac 10.42 ; 2Tm 4.1.'
  - type: text
    content: 'ils en rendront compte à celui qui est prêt à juger les vivants et les morts. '
  '6':
  - type: note
    content: 'même aux morts…  : autre traduction même aux morts il (le Christ) a été annoncé comme une bonne nouvelle  ; cf. 1.12,25 ; 3.18-19n  ; voir aussi 1Th 4.13ss. –  humainement  : litt. selon les humains ou selon des humains  ; cf. Rm 3.5+. –  chair / Esprit 3.18+ ; cf. Rm 8.10 ; 1Co 5.5.'
  - type: text
    content: C'est pour cela, en effet, que même aux morts la bonne nouvelle a été annoncée, afin qu'après avoir été jugés humainement, quant à la chair, ils vivent selon Dieu quant à l'Esprit.
  - type: heading
    content: Intendants de la grâce
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'La fin de tout (1Co 10.11+) s''est approchée  : cf. Mc 1.15n  ; Rm 13.11ss ; 1Co 7.29 ; Hé 10.25 ; 1Jn 2.18. –  pondérés et sobres  : cf. 1.13+ ; Rm 12.3 ; voir aussi Mc 13.33ss ; 1Th 4.11 ; 2Th 2.2 ; Ap 22.11. –  en vue de la prière (litt. de prières ) : cf. 3.7 ; Lc 21.36 ; voir aussi Mc 14.37ss/ /.'
  - type: text
    content: 'La fin de tout s''est approchée ; soyez donc pondérés et sobres en vue de la prière. '
  '8':
  - type: note
    content: Avant tout 1Co 13 ; Ga 5.13 ; Jc 2.8 ; 1Jn 2.10. –  un amour fervent 1.22nss ; 3.8ss. –  l'amour couvre… Pr 10.12  ; cf. Ps 32.1 ; Mt 5.7 ; 6.14s ; 18.35 ; Mc 11.25 ; Lc 7.47 ; 1Co 13.7 ; Jc 2.13 ; 5.20. – Voir péchés.
  - type: text
    content: 'Avant tout, ayez les uns pour les autres un amour fervent, car '
  - type: text
    content: l'amour couvre une multitude de péchés
  - type: text
    content: '. '
  '9':
  - type: note
    content: 'hospitalité  : cf. Rm 12.13n  ; Hé 13.2 ; voir aussi Mt 25.35. –  sans maugréer  : cf. Jn 6.41n  ; 1Co 10.10+ ; Ph 2.14.'
  - type: text
    content: 'Exercez l''hospitalité les uns envers les autres, sans maugréer. '
