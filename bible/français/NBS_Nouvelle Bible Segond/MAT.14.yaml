        - type: text
          text: n
      - type: text
        text: ). Il avait épousé sa nièce Hérodiade, qui l'avait abandonné après lui avoir donné une fille, Salomé, mentionnée dans la suite du récit.
    marker-yv: yv-n
  - type: text
    text: 'Car Hérode avait fait arrêter Jean, il l''avait fait lier et mettre en prison, à cause d''Hérodiade, femme de Philippe, son frère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 20.14 ; Lv 18.16 ; 20.21 ; cf. Mc 6.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour femme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'En effet, Jean lui disait : Il ne t''est pas permis de l''avoir pour femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hérode voulait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il voulait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; 11.9 ; 21.26/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jean… '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 21.26+.'
    marker-yv: yv-n
  - type: text
    text: Hérode voulait le tuer, mais il avait peur de la foule, parce qu'elle tenait Jean pour un prophète.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Gn 40.20ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au milieu des convives
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Or, pour l''anniversaire de la naissance d''Hérode, la fille d''Hérodiade dansa au milieu des convives et plut à Hérode, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'engagea
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'déclarer, reconnaître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (7.23 ; 10.32
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; cf. Ac 7.17 ; voir aussi Est 5.6.
    marker-yv: yv-n
  - type: text
    text: 'tant et si bien qu''il s''engagea par serment à lui donner ce qu''elle demanderait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: A l'instigation de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: poussée en avant par
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en Ac 19.33 ; cf. Ez 16.44 ; 2Ch 22.3.'
    marker-yv: yv-n
  - type: text
    text: 'A l''instigation de sa mère, elle dit : Donne-moi ici même, sur un plat, la tête de Jean le Baptiseur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certains mss portent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Le roi fut attristé, mais à cause de ses serments… il commanda…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jg 11.35 ; Pr 29.25.'
    marker-yv: yv-n
  - type: text
    text: 'Attristé, à cause de ses serments et des convives, le roi commanda de la lui donner '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et envoya décapiter Jean dans la prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On apporta sa tête sur un plat et on la donna à la jeune fille, qui la porta à sa mère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ac 8.2.
    marker-yv: yv-n
  - type: text
    text: Les disciples de Jean vinrent prendre son corps et l'ensevelirent. Et ils allèrent l'annoncer à Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus nourrit cinq mille hommes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mc 6.30-44  ; Lc 9.10-17  ; Jn 6.1-15  ; cf. Mt 15.32-39/ /
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: A cette nouvelle…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 4.12.'
    marker-yv: yv-n
  - type: text
    text: 'A cette nouvelle, Jésus prit un bateau pour se retirer à l''écart, dans un lieu désert ; les foules l''apprirent, quittèrent les villes et le suivirent à pied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.36 ; 15.30,32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il en fut ému
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.36'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leurs malades
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même mot, qui évoque étymologiquement la faiblesse, revient en Mc 6.5,13 ; 16.18 ; il est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'infirmes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 1Co 11.30.
    marker-yv: yv-n
  - type: text
    text: Quand il descendit du bateau, il vit une grande foule, et il en fut ému ; il guérit leurs malades.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 15.23.
    marker-yv: yv-n
  - type: text
    text: 'Le soir venu, les disciples vinrent lui dire : Ce lieu est désert, et l''heure est déjà avancée ; renvoie les foules, pour qu''elles aillent s''acheter des vivres dans les villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.32ss/ / ; 2R 4.42ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jésus leur dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent seulement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il leur dit.
    marker-yv: yv-n
  - type: text
    text: 'Mais Jésus leur dit : Elles n''ont pas besoin de s''en aller ; donnez-leur vous-mêmes à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils lui disent : Nous n''avons ici que cinq pains et deux poissons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et il dit : Apportez-les-moi ici. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mc 14.22 ; Jn 6.23 ; Ac 27.35. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'leva les yeux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jn 11.41+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prononça la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bénit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les bénit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (avec un complément d'objet sous-entendu), de même 26.26 ; cf. Mc 8.7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rompit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: partagea
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ac 2.42'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et les disciples…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et les disciples aux foules.
    marker-yv: yv-n
  - type: text
    text: 'Il ordonna aux foules de s''installer sur l''herbe, prit les cinq pains et les deux poissons, leva les yeux vers le ciel et prononça la bénédiction. Puis il rompit les pains et les donna aux disciples, et les disciples en donnèrent aux foules. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: morceaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme grec est dérivé du verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rompre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: restaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe correspondant est habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: abonder, dépasser.
    marker-yv: yv-n
  - type: text
    text: 'Tous mangèrent et furent rassasiés, et on emporta douze paniers pleins des morceaux qui restaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sans compter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même en 15.38.'
    marker-yv: yv-n
  - type: text
    text: Ceux qui avaient mangé étaient environ cinq mille hommes, sans compter les femmes et les enfants.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus marche sur la mer
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mc 6.45-52  ; Jn 6.16-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ensuite, il obligea les disciples à monter dans le bateau et à le précéder sur l''autre rive, pendant qu''il renverrait les foules. '
  - type: usfm
