document_id: MAT.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La mort de Jean le Baptiseur
  - type: heading
    content: Mc 6.14-16  ; Lc 9.7-9
  - type: text
    content: ' '
  - type: note
    content: Hérode le tétrarque , c.-à-d. Hérode Antipas Lc 3.1.
  - type: text
    content: 'En ce temps-là, Hérode le tétrarque entendit parler de Jésus ; '
  '10':
  - type: text
    content: 'et envoya décapiter Jean dans la prison. '
  '11':
  - type: text
    content: 'On apporta sa tête sur un plat et on la donna à la jeune fille, qui la porta à sa mère. '
  '12':
  - type: note
    content: Cf. Ac 8.2.
  - type: text
    content: Les disciples de Jean vinrent prendre son corps et l'ensevelirent. Et ils allèrent l'annoncer à Jésus.
  - type: heading
    content: Jésus nourrit cinq mille hommes
  - type: heading
    content: Mc 6.30-44  ; Lc 9.10-17  ; Jn 6.1-15  ; cf. Mt 15.32-39/ /
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'A cette nouvelle…  : cf. 4.12.'
  - type: text
    content: 'A cette nouvelle, Jésus prit un bateau pour se retirer à l''écart, dans un lieu désert ; les foules l''apprirent, quittèrent les villes et le suivirent à pied. '
  '14':
  - type: note
    content: '9.36 ; 15.30,32. –  il en fut ému  : cf. 9.36n. –  leurs malades  ; le même mot, qui évoque étymologiquement la faiblesse, revient en Mc 6.5,13 ; 16.18 ; il est traduit par infirmes en 1Co 11.30.'
  - type: text
    content: Quand il descendit du bateau, il vit une grande foule, et il en fut ému ; il guérit leurs malades.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 15.23.
  - type: text
    content: 'Le soir venu, les disciples vinrent lui dire : Ce lieu est désert, et l''heure est déjà avancée ; renvoie les foules, pour qu''elles aillent s''acheter des vivres dans les villages. '
  '16':
  - type: note
    content: '15.32ss/ / ; 2R 4.42ss. –  Jésus leur dit  : certains mss portent seulement il leur dit.'
  - type: text
    content: 'Mais Jésus leur dit : Elles n''ont pas besoin de s''en aller ; donnez-leur vous-mêmes à manger. '
  '17':
  - type: text
    content: 'Ils lui disent : Nous n''avons ici que cinq pains et deux poissons. '
  '18':
  - type: text
    content: 'Et il dit : Apportez-les-moi ici. '
  '19':
  - type: note
    content: 'Mc 14.22 ; Jn 6.23 ; Ac 27.35. –  leva les yeux Jn 11.41+. –  prononça la bénédiction  : litt. bénit  ; d''autres comprennent les bénit (avec un complément d''objet sous-entendu), de même 26.26 ; cf. Mc 8.7n. –  rompit  : autre traduction partagea  ; cf. Ac 2.42n. –  et les disciples…  : litt. et les disciples aux foules.'
  - type: text
    content: 'Il ordonna aux foules de s''installer sur l''herbe, prit les cinq pains et les deux poissons, leva les yeux vers le ciel et prononça la bénédiction. Puis il rompit les pains et les donna aux disciples, et les disciples en donnèrent aux foules. '
  '2':
  - type: note
    content: 'aux gens de sa cour  : litt. à ses serviteurs (8.6n). –  Jean le Baptiseur 16.14/ /. –  réveillé  : autre traduction relevé, cf. 2.13n  ; voir résurrection. –  il a le pouvoir de faire des miracles  : litt. les puissances sont à l''œuvre en lui ou les miracles s''opèrent par lui, cf. 7.22n  ; 13.54 ; Ga 3.5.'
  - type: text
    content: 'il dit aux gens de sa cour : C''est Jean le Baptiseur ! Il s''est réveillé d''entre les morts, et c''est pour cela qu''il a le pouvoir de faire des miracles.'
  - type: heading
    content: Mc 6.17-29  ; Lc 3.19-20
  '20':
  - type: note
    content: 'morceaux  : le terme grec est dérivé du verbe traduit par rompre au v. 19. –  restaient  : le verbe correspondant est habituellement traduit par abonder, dépasser.'
  - type: text
    content: 'Tous mangèrent et furent rassasiés, et on emporta douze paniers pleins des morceaux qui restaient. '
  '21':
  - type: note
    content: '16.9. –  sans compter  : litt. sans, de même en 15.38.'
  - type: text
    content: Ceux qui avaient mangé étaient environ cinq mille hommes, sans compter les femmes et les enfants.
  - type: heading
    content: Jésus marche sur la mer
  - type: heading
    content: Mc 6.45-52  ; Jn 6.16-21
  '22':
  - type: text
    content: 'Ensuite, il obligea les disciples à monter dans le bateau et à le précéder sur l''autre rive, pendant qu''il renverrait les foules. '
  '23':
  - type: note
    content: 15.39/ /. –  montagne 5.1n.
  - type: text
    content: Après avoir renvoyé les foules, il monta sur la montagne pour prier à l'écart ; le soir venu, il était encore là, seul.
  '24':
  - type: text
    content: ' '
  - type: note
    content: '8.23-27/ /. –  déjà à plusieurs (ou de nombreux ) stades (c.-à-d. plusieurs centaines de mètres  ; voir mesures) de la terre  : quelques mss portent au milieu de la mer (cf. Mc 6.47). –  malmené  : litt. tourmenté , comme en 8.6 ; Mc 5.7.'
  - type: text
    content: 'Le bateau était déjà à plusieurs stades de la terre, malmené par les vagues ; car le vent était contraire. '
  '25':
  - type: note
    content: mer de Galilée ; 4.13n. Cf. Es 43.16 ; Ps 77.20 ; Jb 9.8.
  - type: text
    content: 'A la quatrième veille de la nuit, il vint vers eux en marchant sur la mer. '
  '26':
  - type: note
    content: 'Lc 24.37. –  dans leur crainte  : cf. 9.8.'
  - type: text
    content: 'Quand les disciples le virent marcher sur la mer, ils furent troublés et dirent : C''est un fantôme ! Et, dans leur crainte, ils poussèrent des cris. '
  '27':
  - type: note
    content: 'Jésus leur dit  : certains mss portent il leur dit. –  Courage 9.2 ; Es 41.13. –  C''est moi  : la formule, naturelle en grec (cf. 26.22,25), pourrait aussi se traduire, dans d''autres contextes  : je suis ou c''est moi qui suis (22.32 ; 24.5) ; cf. Jn 4.26n  ; 8.24n,28,58. –  n''ayez pas peur 1.20+.'
  - type: text
    content: 'Jésus leur dit aussitôt : Courage ! C''est moi, n''ayez pas peur ! '
  '28':
  - type: note
    content: Cf. Lc 5.8 ; Jn 21.7.
  - type: text
    content: 'Pierre lui répondit : Si c''est toi, ordonne-moi de venir vers toi sur les eaux. '
  '29':
  - type: text
    content: '– Viens ! dit-il. Pierre descendit du bateau, marcha sur les eaux et vint vers Jésus. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 4.12 ; 11.2n  ; Lc 3.19s. – Le premier mari d’ Hérodiade n'était pas Philippe le tétrarque (Lc 3.1), mais un autre fils d'Hérode le Grand (Mc 6.17n). Il avait épousé sa nièce Hérodiade, qui l'avait abandonné après lui avoir donné une fille, Salomé, mentionnée dans la suite du récit.
  - type: text
    content: 'Car Hérode avait fait arrêter Jean, il l''avait fait lier et mettre en prison, à cause d''Hérodiade, femme de Philippe, son frère. '
  '30':
  - type: note
    content: 'Certains mss omettent le mot fort, de sorte qu''on lit  : en voyant le vent ou en prenant garde au vent. –  couler  : le même verbe est traduit par noyer en 18.6.'
  - type: text
    content: 'Mais en voyant que le vent était fort, il eut peur, et, comme il commençait à couler, il s''écria : Seigneur, sauve-moi ! '
  '31':
  - type: note
    content: 6.30+ ; 28.17 ; cf. Jc 1.6.
  - type: text
    content: 'Aussitôt Jésus tendit la main, le saisit et lui dit : Homme de peu de foi, pourquoi as-tu douté ? '
  '32':
  - type: text
    content: 'Ils montèrent dans le bateau, et le vent tomba. '
  '33':
  - type: note
    content: 'se prosternèrent (voir culte) : cf. 2.2n,11. –  Fils de Dieu ou fils de Dieu, un fils de Dieu, le Fils de Dieu  ; 3.17 ; 4.3 ; 16.16+ ; Jn 1.49 ; Rm 1.4.'
  - type: text
    content: 'Ceux qui étaient dans le bateau se prosternèrent devant lui et dirent : Tu es vraiment Fils de Dieu !'
  - type: heading
    content: Guérisons à Gennésareth
  - type: heading
    content: Mc 6.53-56  ; cf. Jn 6.22-25
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Gennésareth  : la localisation précise est incertaine ; l''endroit serait sans doute à chercher dans la région au nord-ouest du lac de Tibériade, appelé aussi lac de Gennésareth (Lc 5.1). – Cf. Jn 6.22-25.'
  - type: text
    content: 'Ils achevèrent la traversée et arrivèrent à Gennésareth. '
  '35':
  - type: note
    content: '4.24. –  le firent annoncer  : litt. envoyèrent (sous-entendu : des messagers).'
  - type: text
    content: 'Les gens de l''endroit le reconnurent et le firent annoncer dans toute la région, et on lui amena tous les malades. '
  '36':
  - type: note
    content: '9.20n. –  le touchèrent (Jésus) ou la touchèrent (la frange) : litt. tous ceux qui touchèrent. –  furent sauvés ou tout à fait sauvés, tout à fait guéris  ; le verbe habituellement traduit par sauver (1.21n  ; 9.21ns) est ici renforcé par un préfixe ; de même Lc 7.3 ; Ac 23.24 (sain et sauf) ; 27.43ns ; 28.1,4 ; 1P 3.20.'
  - type: text
    content: On le suppliait de leur laisser toucher ne serait-ce que la frange de son vêtement. Et tous ceux qui le touchèrent furent sauvés.
  '4':
  - type: note
    content: 'Ex 20.14 ; Lv 18.16 ; 20.21 ; cf. Mc 6.18. –  pour femme  : sous-entendu dans le texte.'
  - type: text
    content: 'En effet, Jean lui disait : Il ne t''est pas permis de l''avoir pour femme. '
  '5':
  - type: note
    content: 'Hérode voulait  : litt. il voulait  ; 11.9 ; 21.26/ /. –  Jean… prophète  : cf. 21.26+.'
  - type: text
    content: Hérode voulait le tuer, mais il avait peur de la foule, parce qu'elle tenait Jean pour un prophète.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 40.20ss. –  au milieu des convives  : sous-entendu dans le texte.'
  - type: text
    content: 'Or, pour l''anniversaire de la naissance d''Hérode, la fille d''Hérodiade dansa au milieu des convives et plut à Hérode, '
  '7':
  - type: note
    content: 's''engagea  : le même verbe est traduit ailleurs par déclarer, reconnaître (7.23 ; 10.32n) ; cf. Ac 7.17 ; voir aussi Est 5.6.'
  - type: text
    content: 'tant et si bien qu''il s''engagea par serment à lui donner ce qu''elle demanderait. '
  '8':
  - type: note
    content: 'A l''instigation de  : litt. poussée en avant par, comme en Ac 19.33 ; cf. Ez 16.44 ; 2Ch 22.3.'
  - type: text
    content: 'A l''instigation de sa mère, elle dit : Donne-moi ici même, sur un plat, la tête de Jean le Baptiseur. '
  '9':
  - type: note
    content: 'Certains mss portent  : Le roi fut attristé, mais à cause de ses serments… il commanda…  ; cf. Jg 11.35 ; Pr 29.25.'
  - type: text
    content: 'Attristé, à cause de ses serments et des convives, le roi commanda de la lui donner '
