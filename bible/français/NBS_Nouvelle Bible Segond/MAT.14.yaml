        text: ' '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hérodiade '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'n''était pas '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Philippe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le tétrarque (Lc 3.1), mais un autre fils d'Hérode le Grand (Mc 6.17
      - type: usfm
