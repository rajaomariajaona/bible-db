    marker-yv: yv-n
  - type: text
    text: 'Sache donc aujourd''hui que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, marche lui-même devant toi comme un feu dévorant ; c''est lui qui les détruira, c''est lui qui les humiliera devant toi ; tu les déposséderas, tu les feras disparaître bien vite, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' te l''a dit.'
