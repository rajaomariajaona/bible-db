      marker: ft
      children:
      - type: text
        text: 'Ex 19.20 ; 20.18-21 ; 24.12-18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tablettes de pierre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quarante jours… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 18 ; Ex 34.28 ; 1R 19.8 ; Mt 4.2/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sans manger ni boire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je n'ai pas mangé de pain et je n'ai pas bu d'eau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 18 ; cf. Ex 34.28.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque je suis monté dans la montagne pour prendre les tablettes de pierre, les tablettes de l''alliance que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a conclue avec vous, je suis resté dans la montagne quarante jours et quarante nuits, sans manger ni boire ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.22 ; cf. 4.11+ ; Ex 31.18 ; 32.16 ; Ac 7.38.
    marker-yv: yv-n
  - type: text
    text: 'le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a donné les deux tablettes de pierre écrites du doigt de Dieu, selon toutes les paroles que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' vous avait dites dans la montagne, du milieu du feu, au jour de l''assemblée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
