        text: '9.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'comme un feu dévorant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.24+ ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hé 12.29. '
    - type: usfm
      marker: ft
      children:
      - type: text
