      children:
      - type: text
        text: '  ; cf. 1.8+.'
    marker-yv: yv-n
  - type: text
    text: 'Non, ce n''est pas à cause de ta justice et de la droiture de ton cœur que tu entres en possession de leur pays ; mais c''est à cause de la méchanceté de ces nations que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, les dépossède devant toi, et c''est pour réaliser le serment que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a fait à tes pères, à Abraham, à Isaac et à Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bon pays '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.25+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rétif
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à la nuque raide '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 13 ; 10.16 ; 31.27 ; Ex 32.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Sache donc que ce n''est pas à cause de ta justice que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, te donne ce bon pays pour que tu en prennes possession ; car tu es un peuple rétif.'
- type: usfm
  marker: s1
  children:
  - type: text
