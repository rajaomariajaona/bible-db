  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 32.19.
    marker-yv: yv-n
  - type: text
    text: J'ai saisi les deux tablettes, je les ai jetées de mes deux mains et je les ai brisées sous vos yeux.
