        text: '9.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 12. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: ' contre le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
