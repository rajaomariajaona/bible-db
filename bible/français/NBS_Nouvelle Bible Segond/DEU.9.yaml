    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Anaqites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' d''Anaqites / les fils d''Anaq'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; 1.28+.'
    marker-yv: yv-n
  - type: text
    text: 'd''un peuple grand et de haute taille, les Anaqites, que tu connais, et dont tu as entendu dire : « Qui pourra tenir devant les Anaqites ? » '
  - type: usfm
    marker: vlbl
