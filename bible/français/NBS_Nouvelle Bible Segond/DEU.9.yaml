  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a dit alors : Descends vite d''ici ; car ton peuple, que tu as fait sortir d''Egypte, s''est perverti. Ils se sont bien vite écartés de la voie que je leur avais prescrite ; ils se sont fait une idole de métal fondu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
