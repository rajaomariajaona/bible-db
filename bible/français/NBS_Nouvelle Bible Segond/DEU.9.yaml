      - type: text
        text: Ex 32–34 ; cf. Nb 11.1 ; 14.1-4 ; 16.1-3 ; 17.6s ; 20.1-5 ; 21.4s.
    marker-yv: yv-n
  - type: text
    text: 'Souviens-toi, n''oublie pas que tu as irrité le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, dans le désert. Depuis le jour où tu es sorti d''Egypte jusqu''à votre arrivée en ce lieu, vous avez été rebelles envers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'A l''Horeb '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vouloir
    - type: usfm
      marker: ft
      children:
      - type: text
