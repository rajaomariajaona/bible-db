    marker-yv: yv-n
  - type: text
    text: 'J''ai vu alors que vous aviez péché contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu : vous vous étiez fait un taurillon de métal fondu, vous vous étiez bien vite écartés de la voie que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' vous avait prescrite. '
  - type: usfm
    marker: vlbl
