    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 6+.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a dit : J''ai vu ce peuple : c''est un peuple rétif. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 32.7-10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'effacer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.6,19 ; 29.19 ; cf. 32.27 ; Jg 21.17 ; 2R 14.27 ; Ps 9.6 ; 69.29 ; Ap 3.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que ce peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que lui.
    marker-yv: yv-n
  - type: text
    text: 'Laisse-moi les détruire, effacer leur nom de dessous le ciel ; je ferai de toi une nation plus forte et plus nombreuse que ce peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je suis redescendu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je me suis tourné et je suis descendu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 1.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 32.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'toute en feu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.11+.
    marker-yv: yv-n
  - type: text
    text: 'Je suis redescendu de la montagne, les deux tablettes de l''alliance dans mes mains ; la montagne était toute en feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
