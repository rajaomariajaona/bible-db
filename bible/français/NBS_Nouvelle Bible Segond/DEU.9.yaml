document_id: DEU.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël n'a aucun mérite
  - type: text
    content: ' '
  - type: note
    content: Ecoute, Israël ! 4.1+. –  jusqu'au ciel 1.28n.
  - type: text
    content: 'Ecoute, Israël ! Tu passes aujourd''hui le Jourdain pour entrer en possession de nations plus grandes et plus fortes que toi, de villes grandes et fortifiées jusqu''au ciel, '
  '10':
  - type: note
    content: 5.22 ; cf. 4.11+ ; Ex 31.18 ; 32.16 ; Ac 7.38.
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a donné les deux tablettes de pierre écrites du doigt de Dieu, selon toutes les paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous avait dites dans la montagne, du milieu du feu, au jour de l''assemblée. '
  '11':
  - type: text
    content: 'C''est au bout de quarante jours et de quarante nuits que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a donné les deux tablettes de pierre, les tablettes de l''alliance.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'V. 16. –  Descends  : litt. lève-toi, descends.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit alors : Descends vite d''ici ; car ton peuple, que tu as fait sortir d''Egypte, s''est perverti. Ils se sont bien vite écartés de la voie que je leur avais prescrite ; ils se sont fait une idole de métal fondu. '
  '13':
  - type: note
    content: V. 6+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : J''ai vu ce peuple : c''est un peuple rétif. '
  '14':
  - type: note
    content: 'Ex 32.7-10. –  effacer 25.6,19 ; 29.19 ; cf. 32.27 ; Jg 21.17 ; 2R 14.27 ; Ps 9.6 ; 69.29 ; Ap 3.5. –  que ce peuple  : litt. que lui.'
  - type: text
    content: 'Laisse-moi les détruire, effacer leur nom de dessous le ciel ; je ferai de toi une nation plus forte et plus nombreuse que ce peuple. '
  '15':
  - type: note
    content: 'Je suis redescendu  : litt. je me suis tourné et je suis descendu, 1.7n  ; Ex 32.15. –  toute en feu 4.11+.'
  - type: text
    content: 'Je suis redescendu de la montagne, les deux tablettes de l''alliance dans mes mains ; la montagne était toute en feu. '
  '16':
  - type: note
    content: V. 12. –  péché contre le Seigneur 1.41. –  taurillon ou veau, voir Ex 32.4n.
  - type: text
    content: 'J''ai vu alors que vous aviez péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu : vous vous étiez fait un taurillon de métal fondu, vous vous étiez bien vite écartés de la voie que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous avait prescrite. '
  '17':
  - type: note
    content: Ex 32.19.
  - type: text
    content: J'ai saisi les deux tablettes, je les ai jetées de mes deux mains et je les ai brisées sous vos yeux.
  - type: heading
    content: Moïse intercède
  '18':
  - type: text
    content: ' '
  - type: note
    content: comme la première fois ou comme précédemment (cf. 10.10n, autre expression). –  quarante jours… v. 9+,25. –  en faisant ce qui lui déplaisait Nb 22.34n.
  - type: text
    content: 'Je suis resté prostré devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme la première fois, quarante jours et quarante nuits, sans manger ni boire, à cause de tous les péchés que vous aviez commis, parce que vous aviez contrarié le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en faisant ce qui lui déplaisait. '
  '19':
  - type: note
    content: Hé 12.21.
  - type: text
    content: 'Car j''étais effrayé par la colère et la fureur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui était irrité contre vous au point de vouloir vous détruire. Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a entendu encore cette fois. '
  '2':
  - type: note
    content: 'les Anaqites  : litt. les fils d''Anaqites / les fils d''Anaq  ; 1.28+.'
  - type: text
    content: 'd''un peuple grand et de haute taille, les Anaqites, que tu connais, et dont tu as entendu dire : « Qui pourra tenir devant les Anaqites ? » '
  '20':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était en grande colère contre Aaron, au point de vouloir le détruire ; mais j''ai aussi prié pour Aaron en ce temps-là. '
  '21':
  - type: note
    content: 'Cf. 7.25s. –  l''oued  : cf. Gn 26.17n.'
  - type: text
    content: J'ai pris le taurillon, ce péché que vous aviez fait, je l'ai jeté au feu, je l'ai mis en pièces, je l'ai pulvérisé, jusqu'à ce qu'il soit réduit en poussière, et j'ai jeté sa poussière dans l'oued qui descend de la montagne.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Tabééra Nb 11.3. –  Massa 6.16+. –  Qibroth-Taava Nb 11.34.
  - type: text
    content: 'A Tabééra, à Massa et à Qibroth-Taava, vous avez irrité le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: note
    content: 'Qadesh-Barnéa 1.2n,19,46 ; cf. Nb 13.26–14.36. –  vous avez été rebelles…  : cf. 1.26,43. –  pas écouté 4.30n.'
  - type: text
    content: 'Et lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a envoyés de Qadesh-Barnéa en disant : « Attaquez et prenez possession du pays que je vous donne », vous avez été rebelles aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu ; vous ne l''avez pas cru, vous ne l''avez pas écouté. '
  '24':
  - type: note
    content: 'rebelles Ez 23 ; Ps 78.8 ; Ac 7.51. –  depuis que je vous connais  : Smr et LXX portent depuis qu''il s''est fait connaître à vous.'
  - type: text
    content: 'Vous avez été rebelles envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' depuis que je vous connais.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: V. 18s.
  - type: text
    content: 'Je suis tombé devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', je suis resté prostré quarante jours et quarante nuits, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit qu''il voulait vous détruire. '
  '26':
  - type: note
    content: 'Cf. Ex 32.9-13 ; Nb 14.11-20. –  Seigneur / Seigneur  : hébreu YHWH / ’Adonaï, cf. Ex 3.15n  ; voir noms divins. –  libéré 7.8n. –  main forte 3.24+.'
  - type: text
    content: 'J''ai prié le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; j''ai dit : Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', ne détruis pas ton peuple, ton patrimoine, que tu as libéré dans ta grandeur, que tu as fait sortir d''Egypte d''une main forte ! '
  '27':
  - type: note
    content: 'Abraham…  : cf. v. 5. –  Ne regarde pas  : litt. ne te tourne pas vers. –  obstination  : cf. Rm 2.5.'
  - type: text
    content: 'Souviens-toi d''Abraham, Isaac et Jacob, tes serviteurs. Ne regarde pas l''obstination de ce peuple, sa méchanceté et son péché, '
  '28':
  - type: note
    content: '32.27 ; Nb 14.15s ; Ps 115.2. –  qu''il leur avait promis  : litt. qu''il leur avait dit. –  ou  : litt. et.'
  - type: text
    content: 'de peur que les gens du pays d''où tu nous as fait sortir ne disent : « C''est parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne pouvait pas les faire entrer dans le pays qu''il leur avait promis, ou parce qu''il les détestait, qu''il les a fait sortir pour les faire mourir dans le désert. » '
  '29':
  - type: note
    content: 'fait sortir  : LXX ajoute d''Egypte. –  grande puissance…  : cf. 4.34+.'
  - type: text
    content: Ils sont ton peuple, ton patrimoine, que tu as fait sortir par ta grande puissance, par ton bras étendu !
  '3':
  - type: note
    content: comme un feu dévorant 4.24+ ; Hé 12.29. –  déposséderas 4.38+.
  - type: text
    content: 'Sache donc aujourd''hui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, marche lui-même devant toi comme un feu dévorant ; c''est lui qui les détruira, c''est lui qui les humiliera devant toi ; tu les déposséderas, tu les feras disparaître bien vite, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te l''a dit.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ne te dis pas  : litt. ne dis pas en ton cœur Rm 10.6. –  ma justice 6.25+. –  à cause de la méchanceté  : cf. Gn 15.16 ; Rm 1–3 ; 11.30-32.'
  - type: text
    content: 'Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, les repoussera devant toi, ne te dis pas : « C''est à cause de ma justice que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me fait entrer en possession de ce pays ! » Car c''est à cause de la méchanceté de ces nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les dépossède devant toi. '
  '5':
  - type: note
    content: 'ce n''est pas à cause…  : cf. 4.32-38 ; 7.7+ ; Tt 3.5. –  réaliser  : litt. faire tenir debout  ; autre traduction confirmer  ; cf. 8.18n. –  le serment…  : litt. la parole que le Seigneur a jurée  ; cf. 1.8+.'
  - type: text
    content: 'Non, ce n''est pas à cause de ta justice et de la droiture de ton cœur que tu entres en possession de leur pays ; mais c''est à cause de la méchanceté de ces nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, les dépossède devant toi, et c''est pour réaliser le serment que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait à tes pères, à Abraham, à Isaac et à Jacob. '
  '6':
  - type: note
    content: 'bon pays 1.25+. –  rétif  : litt. à la nuque raide v. 13 ; 10.16 ; 31.27 ; Ex 32.9n.'
  - type: text
    content: 'Sache donc que ce n''est pas à cause de ta justice que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne ce bon pays pour que tu en prennes possession ; car tu es un peuple rétif.'
  - type: heading
    content: 'Le « veau d''or » : la faute du peuple'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ex 32–34 ; cf. Nb 11.1 ; 14.1-4 ; 16.1-3 ; 17.6s ; 20.1-5 ; 21.4s.
  - type: text
    content: 'Souviens-toi, n''oublie pas que tu as irrité le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, dans le désert. Depuis le jour où tu es sorti d''Egypte jusqu''à votre arrivée en ce lieu, vous avez été rebelles envers le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: note
    content: 'A l''Horeb 4.10. –  vouloir  : sous-entendu dans le texte.'
  - type: text
    content: 'A l''Horeb, vous avez irrité le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est mis en colère contre vous au point de vouloir vous détruire. '
  '9':
  - type: note
    content: 'dans la montagne Ex 19.20 ; 20.18-21 ; 24.12-18. –  tablettes de pierre 4.13+. –  quarante jours… v. 18 ; Ex 34.28 ; 1R 19.8 ; Mt 4.2/ /. –  sans manger ni boire  : litt. je n''ai pas mangé de pain et je n''ai pas bu d''eau, de même au v. 18 ; cf. Ex 34.28.'
  - type: text
    content: 'Lorsque je suis monté dans la montagne pour prendre les tablettes de pierre, les tablettes de l''alliance que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a conclue avec vous, je suis resté dans la montagne quarante jours et quarante nuits, sans manger ni boire ; '
