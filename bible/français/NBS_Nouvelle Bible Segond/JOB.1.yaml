document_id: JOB.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: PROLOGUE
  - type: text
    content: ' '
  - type: note
    content: 'Le pays d’ Outs est habituellement à situer au sud-est du pays d''Israël, dans le territoire d''Edom, en Arabie (cf. Gn 36.28 ; Jr 25.20 ; Lm 4.21), ou au nord-est, chez les Araméens (cf. Gn 10.23 ; 22.21). En tout cas Job n''est pas présenté comme un Israélite. Sur Job , voir Ez 14.14-20 ; Jc 5.11 (cf. le Yobab de Gn 36.33, identifié à Job par un Tg  ; Jb 42.17n). Ce nom est peut-être à rapprocher de la racine hébraïque évoquant l''hostilité ou l''adversité ; en modifiant la vocalisation on l''a aussi interprété comme une question  : où est (mon) père ? –  intègre (cf. 31.40n) et droit v. 8 ; 2.3,9 ; 12.4 ; Gn 6.9+ ; cf. Lv 1.3n  ; Ps 26.1. –  craignait Dieu / s''écartait du mal v. 8 ; 2.3 ; 28.28 ; Pr 14.16.'
  - type: text
    content: 'Il y avait au pays d''Outs un homme nommé Job. Cet homme était intègre et droit ; il craignait Dieu et s''écartait du mal. '
  '10':
  - type: note
    content: 'protégé  : litt. entouré d''une haie  ; cf. 3.23n. –  s''accroît ou, plus litt., éclate, explose  ; cf. Gn 28.14n.'
  - type: text
    content: 'Ne l''as-tu pas protégé, lui, sa maison et tout ce qui lui appartient ? Tu as béni l''œuvre de ses mains, et son troupeau s''accroît dans le pays. '
  '11':
  - type: note
    content: V. 5n  ; 2.5. –  à coup sûr ou sans faute, cf. Es 5.9n  ; autre traduction tu verras s'il ne te maudit pas.
  - type: text
    content: 'Mais étends ta main, je te prie, et touche à tout ce qui lui appartient : à coup sûr, il te maudira en face. '
  '12':
  - type: note
    content: Cf. 2.5s.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à l''Adversaire : Eh bien, tout ce qui lui appartient est en ta main ; seulement, ne porte pas la main sur lui ! Alors l''Adversaire se retira de devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'les fils et les filles de Job  : litt. ses fils et ses filles.'
  - type: text
    content: 'Un jour que les fils et les filles de Job mangeaient et buvaient du vin chez leur frère, le premier-né, '
  '14':
  - type: text
    content: 'il arriva auprès de Job un messager qui dit : Les bœufs labouraient et les ânesses paissaient à côté d''eux ; '
  '15':
  - type: note
    content: 'des Sabéens… les ont pris  : litt. Saba (sur ce royaume d''Arabie, voir Gn 10.7n) est tombé et les a pris. Le terme Sabéens désigne probablement ici des nomades (cf. 6.19), de façon assez vague (de même les Chaldéens au v. 17). Cf. Jg 6.3-6 ; 1S 27.8s. –  au fil de l''épée  : litt. à bouche d''épée, de même au v. 17.'
  - type: text
    content: 'des Sabéens se sont jetés dessus, ils les ont pris et ils ont passé les serviteurs au fil de l''épée. Je me suis échappé, moi seul, pour te l''annoncer. '
  '16':
  - type: note
    content: 'Le feu de Dieu  : la foudre, cf. Ex 9.23n  ; voir aussi Lv 10.2 ; 2R 1.10-14 ; Ps 104.4 ; Lc 9.54.'
  - type: text
    content: 'Il parlait encore lorsqu''un autre arriva et dit :'
  - type: text
    content: Le feu de Dieu est tombé du ciel,
  - type: text
    content: il a brûlé le petit bétail et les serviteurs et les a dévorés.
  - type: text
    content: Je me suis échappé, moi seul, pour te l'annoncer.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Chaldéens (hébreu Kasdim ) : voir v. 15n  ; sur les Chaldéens de Mésopotamie, cf. Gn 10.22 ; 11.28n  ; 22.22n. –  trois bandes Jg 7.16n  ; 1S 11.11 ; 13.17.'
  - type: text
    content: 'Il parlait encore lorsqu''un autre arriva et dit :'
  - type: text
    content: Des Chaldéens, formés en trois bandes,
  - type: text
    content: se sont précipités sur les chameaux, ils les ont pris
  - type: text
    content: et ils ont passé les serviteurs au fil de l'épée.
  - type: text
    content: Je me suis échappé, moi seul, pour te l'annoncer.
  '18':
  - type: text
    content: 'Il parlait encore, lorsqu''un autre arriva et dit :'
  - type: text
    content: Tes fils et tes filles mangeaient et buvaient du vin chez leur frère, le premier-né,
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'vent / maison  : cf. 27.21 ; Mt 7.27 ; voir aussi Gn 41.6n. –  jeunes gens  : c''est le même terme qui est traduit par serviteurs aux v. 15-17 ; cf. 24.5n  ; 29.5n. –  ils sont morts  : cf. 8.4.'
  - type: text
    content: quand un grand vent venu d'au-delà du désert
  - type: text
    content: a frappé les quatre coins de la maison ;
  - type: text
    content: elle s'est écroulée sur les jeunes gens,
  - type: text
    content: et ils sont morts.
  - type: text
    content: Je me suis échappé, moi seul, pour te l'annoncer.
  '2':
  - type: text
    content: 'Sept fils et trois filles naquirent de lui. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Signes de deuil, de tristesse ou de pénitence ; voir aussi 2.12 ; 16.15 ; Lv 10.6+ ; Jos 7.6 ; Ez 27.30s.
  - type: text
    content: 'Alors Job se leva, déchira son manteau et se rasa la tête ; puis il tomba à terre, se prosterna, '
  '21':
  - type: note
    content: 'Cf. Gn 2.7,25n  ; 3.19 ; Ps 49.18 ; Ec 5.14 ; 1Tm 6.7. Cf. Siracide 40.1 : « De grands tracas ont été créés pour tout homme et un joug pesant est sur les fils d''Adam depuis le jour où ils sortent du sein de leur mère jusqu''au jour où ils retournent à la mère universelle. » (Voir aussi Jb 14.1+.) –  que le nom du Seigneur (YHWH) soit béni Ps 113.2 ; voir Jc 5.11.'
  - type: text
    content: 'et dit :'
  - type: text
    content: Nu je suis sorti du ventre de ma mère,
  - type: text
    content: et nu j'y retournerai.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a donné,'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ôté ;'
  - type: text
    content: 'que le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit béni !'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.10. – Voir péché. –  choquant  : un mot hébreu apparenté évoque la fadeur (6.6 ; cf. 24.12n  ; Jr 23.13 ; Lm 2.14).'
  - type: text
    content: En tout cela, Job ne pécha pas et n'attribua à Dieu rien de choquant.
  '3':
  - type: note
    content: Cf. Gn 12.16 ; 24.35 ; 26.14. –  fils de l'Orient Gn 29.1n  ; Jg 6.3 ; 1R 5.10 ; Es 11.14 ; Jr 49.28 ; Ez 25.4.
  - type: text
    content: Il avait un troupeau de 7 000 têtes de petit bétail, 3 000 chameaux, 500 paires de bœufs, 500 ânesses, et un très grand nombre de serviteurs. Cet homme était le plus grand de tous les fils de l'Orient.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'à tour de rôle  : litt. à son jour , voir aussi 3.1n.'
  - type: text
    content: 'Ses fils se réunissaient chez chacun d''eux, à tour de rôle, pour un banquet, et ils invitaient leurs trois sœurs à manger et à boire avec eux. '
  '5':
  - type: note
    content: 'consacrer Ex 19.10 ; 1S 16.5. –  holocauste  : voir sacrifices. – Voir péché. –  maudit  : le texte hébreu traditionnel porte béni, sans doute par euphémisme, pour éviter que l''on parle de maudire Dieu (ce qui est ici le sens probable). De même au v. 11 ; 2.5,9. – Voir cœur. –  toujours  : litt. tous les jours.'
  - type: text
    content: 'Quand les jours de banquet étaient révolus, Job les faisait venir pour les consacrer ; il se levait de bon matin et offrait pour chacun d''eux un holocauste ; car Job disait : « Peut-être mes fils ont-ils péché, peut-être ont-ils maudit Dieu dans leur cœur. » Job agissait toujours ainsi.'
  - type: heading
    content: Première épreuve de Job
  '6':
  - type: text
    content: ' '
  - type: note
    content: fils de Dieu 2.1 ; 38.7 ; voir Gn 6.2n. Sur leur assemblée, voir 1R 22.19-22 ; Dn 7.10 ; Hé 12.22 ; Ap 5.11. –  l'Adversaire ou l'accusateur , en hébreu le satân  ; cf. Gn 26.21n  ; Za 3.1ns ; Ps 109.6 ; 1Ch 21.1 ; Ap 12.9,12. Voir démon, diable, Satan.
  - type: text
    content: 'Un jour, les fils de Dieu vinrent se présenter devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et l''Adversaire aussi vint au milieu d''eux. '
  '7':
  - type: note
    content: parcourir la terre 2.2 ; cf. Za 1.10+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à l''Adversaire : D''où viens-tu ? L''Adversaire répondit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : De parcourir la terre, pour m''y promener. '
  '8':
  - type: note
    content: 'As-tu remarqué  : litt. as-tu mis ton cœur sur. – Voir crainte.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à l''Adversaire : As-tu remarqué Job, mon serviteur ? Il n''y a personne comme lui sur la terre ; c''est un homme intègre et droit, qui craint Dieu et s''écarte du mal. '
  '9':
  - type: note
    content: 'pour rien  : le terme hébreu correspondant est apparenté au mot habituellement traduit par grâce  ; autre traduction gratuitement (cf. 2.3 ; 9.17 ; 22.6 sans raison).'
  - type: text
    content: 'L''Adversaire répondit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Est-ce pour rien que Job craint Dieu ? '
