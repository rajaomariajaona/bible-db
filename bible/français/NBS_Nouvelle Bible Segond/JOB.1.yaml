      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''écartait du mal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8 ; 2.3 ; 28.28 ; Pr 14.16.
      marker-yv: yv-n
    - type: text
      text: 'Il y avait au pays d''Outs un homme nommé Job. Cet homme était intègre et droit ; il craignait Dieu et s''écartait du mal. '
