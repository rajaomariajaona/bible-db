      marker-yv: yv-n
    - type: text
      text: 'Alors tout le clan s''est dressé contre moi, en disant : « Livre celui qui a abattu son frère ! Nous le mettrons à mort, pour la vie de son frère qu''il a tué ; nous le ferons disparaître, lui, l''héritier ! » Ils éteindraient ainsi le tison qui me reste, pour ne laisser à mon mari ni nom ni reste sur la terre. '
