        marker: fr
        children:
        - type: text
          text: '14.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Rentre chez toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: va dans ta maison.
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit à la femme : Rentre chez toi. Je donnerai des ordres à ton sujet. '
  '9':
