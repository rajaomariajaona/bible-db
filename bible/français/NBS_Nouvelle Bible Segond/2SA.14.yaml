document_id: 2SA.14,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le retour d'Absalom à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Joab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' du roi était porté vers Absalom'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on interprète généralement ce verset en conformité avec le sens habituellement retenu pour 13.39 ; mais on pourrait aussi aller dans le sens de la variante proposée en 13.39'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' et traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le roi était hostile à Absalom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . L'intervention de Joab viserait donc à amener le roi à changer d'attitude.
      marker-yv: yv-n
    - type: text
      text: 'Joab, fils de Tserouya, sut que le cœur du roi était porté vers Absalom. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il ne s'en prendra plus à toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ne te touchera plus.
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit : Si quelqu''un parle contre toi, amène-le-moi, et il ne s''en prendra plus à toi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Souviens-toi… du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu correspondant implique quelque chose de plus qu''un effort de mémoire ; il s''agit de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'faire mention du nom du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dans une formule de serment qui engage très sérieusement son auteur ; cf. 1S 24.22+. – Le '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: rédempteur
        - type: text
          text: ' du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était le parent proche d'une victime, qui avait le droit et le devoir de mettre à mort le meurtrier (Nb 35.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 19 ; Jos 20). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'augmente pas la ruine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne continue pas le massacre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 14.39'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un seul cheveu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1S 14.45+.
      marker-yv: yv-n
    - type: text
      text: 'Elle dit : Souviens-toi, je t''en prie, ô roi, du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, afin que le rédempteur du sang n''augmente pas la ruine, et qu''on ne fasse pas disparaître mon fils ! Et il dit : Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', il ne tombera pas à terre un seul cheveu de ton fils !'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Par ces mots, la femme prépare le roi à passer de la fiction (le cas de son fils) à la réalité (le cas d'Absalom).
      marker-yv: yv-n
    - type: text
      text: 'La femme dit : Laisse-moi te dire un mot, je t''en prie, ô roi. Et il dit : Parle ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'égard du peuple de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : après la mort d''Amnon, fils aîné de David, c''est Absalom qui est l''héritier du trône ; si David ne le fait pas revenir, c''est l''avenir même d''Israël qui est en jeu (on ignore ce qu''était devenu Kiléab, deuxième fils de David, selon 3.3). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celui que tu as banni
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le chap. 13 ne parle pas d''un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bannissement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'par David, mais de la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fuite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: volontaire d'Absalom ; cependant, le résultat est le même, et seul le pardon de David peut mettre fin à l'exil du meurtrier.
      marker-yv: yv-n
    - type: text
      text: 'Elle dit : Pourquoi alors as-tu cette attitude à l''égard du peuple de Dieu, puisqu''il résulte de tes paroles mêmes que tu as tort de ne pas faire revenir celui que tu as banni ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu de ce v. est peu clair et le sens en est incertain. L''idée générale semble être que '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout le monde doit mourir un jour, disparaître comme l'eau qu'on répand à terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu n'ôte pas la vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. : il ne veut pas la mort d''Absalom, il veut au contraire qu''il revienne de son exil pour assumer sa fonction lorsqu''il en sera temps. D''autres comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu ne relève pas un mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. : il ne va pas ramener Amnon à la vie, c''est pourquoi il faut qu''Absalom revienne d''exil.'
      marker-yv: yv-n
    - type: text
      text: 'Mortels, nous mourons, comme de l''eau répandue à terre ne se rassemble plus. Mais Dieu n''ôte pas la vie, et il a conçu des plans pour que celui qui est banni loin de lui ne le reste pas. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le peuple m'a effrayée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'semble avoir ici un sens très vague, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des gens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la femme ne veut pas dévoiler l''identité de celui qui l''a envoyée.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, ô roi, si je suis venue te dire cela, c''est que le peuple m''a effrayée. Alors j''ai dit : Je vais parler au roi ; peut-être le roi fera-t-il ce que, moi, sa servante, je dirai. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'me faire disparaître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même verbe v. 7,11) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: … du patrimoine de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la mise à mort du second fils marquerait la fin de la lignée familiale, et préfigurerait donc la fin de la mère elle-même ; il n''y aurait plus de place pour eux au sein du peuple de Dieu (= le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: patrimoine de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir 1S 10.1).'
      marker-yv: yv-n
    - type: text
      text: 'Oui, le roi m''écoutera et me délivrera de la main de l''homme qui veut me faire disparaître, avec mon fils, du patrimoine de Dieu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'soit source d''apaisement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de repos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'elle mette fin au cycle infernal des morts successives
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Es 32.17 ; Ps 72.1-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme un messager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 20 ; 19.28 ; 1S 29.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour ce qui est d'entendre le bon et le mauvais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. capable de distinguer le bon et le mauvais, et donc de juger avec impartialité, cf. 1R 3.9,28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: soit avec toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : pour t''aider dans ce discernement.'
      marker-yv: yv-n
    - type: text
      text: 'J''ai dit : Que ta parole, ô roi, soit source d''apaisement, je t''en prie ! Car tu es comme un messager de Dieu, pour ce qui est d''entendre le bon et le mauvais. Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, soit avec toi ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Parle…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ec 8.2-4.'
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit à la femme : Je vais te demander quelque chose. Ne me cache rien ! La femme dit : Parle, je te prie, ô roi, mon seigneur ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: N'y aurait-il pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la main de Joab est-elle avec toi dans tout cela ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c''est bien Joab qui agit au travers de ton intervention, n''est-ce pas ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Par ta vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 1.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'induire en erreur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aller à droite ou à gauche de ce que dit mon seigneur le roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce que tu dis correspond exactement à la réalité ; malheur à celui qui s'écarte de ce que tu dis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui a placé toutes ces paroles dans ma bouche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui m'a dicté tout ce que je devais dire.
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit alors : N''y aurait-il pas du Joab dans tout cela ? La femme répondit : Par ta vie, ô roi, on ne peut pas t''induire en erreur. C''est en effet Joab, ton serviteur, qui m''a donné des ordres et qui a placé toutes ces paroles dans ma bouche. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Teqoa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : localité située à 15 km environ au sud de Jérusalem ; patrie du prophète Amos (Am 1.1). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: habile, avisée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 20 ; 20.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne te parfume pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne te frotte pas avec de l'huile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 12.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il envoya chercher à Teqoa une femme sage et lui dit : Mets-toi en deuil, je te prie : revêts des habits de deuil, ne te parfume pas, sois comme une femme qui porte depuis longtemps le deuil d''un mort. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: changer le cours des événements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faire apparaître l'affaire sous un autre jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'retourner la face de la parole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la chose
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour connaître… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour comprendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 18.13 ; Pr 25.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur la terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le pays.
      marker-yv: yv-n
    - type: text
      text: C'est pour changer le cours des événements que ton serviteur Joab a fait cela. Mais toi, mon seigneur, tu es aussi sage qu'un messager de Dieu, pour connaître tout ce qui se passe sur la terre.
  '21':
  - type: usfm
    marker: p
