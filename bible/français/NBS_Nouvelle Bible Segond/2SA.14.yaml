            text: n
        - type: text
          text: ',4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sur moi la faute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : si le meurtrier est épargné, la loi n''est pas appliquée avec toute sa rigueur (cf. Nb 35.16-21,31) ; la femme, jouant son rôle avec habileté, déclare être prête à assumer elle-même la responsabilité de cette situation. –  '
      - type: usfm
