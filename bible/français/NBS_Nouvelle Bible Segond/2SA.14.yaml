document_id: 2SA.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le retour d'Absalom à Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Joab 2.13n. –  le cœur du roi était porté vers Absalom  : on interprète généralement ce verset en conformité avec le sens habituellement retenu pour 13.39 ; mais on pourrait aussi aller dans le sens de la variante proposée en 13.39n et traduire le roi était hostile à Absalom . L''intervention de Joab viserait donc à amener le roi à changer d''attitude.'
  - type: text
    content: 'Joab, fils de Tserouya, sut que le cœur du roi était porté vers Absalom. '
  '10':
  - type: note
    content: 'il ne s''en prendra plus à toi  : litt. il ne te touchera plus.'
  - type: text
    content: 'Le roi dit : Si quelqu''un parle contre toi, amène-le-moi, et il ne s''en prendra plus à toi. '
  '11':
  - type: note
    content: 'Souviens-toi… du Seigneur  : le verbe hébreu correspondant implique quelque chose de plus qu''un effort de mémoire ; il s''agit de faire mention du nom du Seigneur, dans une formule de serment qui engage très sérieusement son auteur ; cf. 1S 24.22+. – Le rédempteur du sang était le parent proche d''une victime, qui avait le droit et le devoir de mettre à mort le meurtrier (Nb 35.12n  ; Dt 19 ; Jos 20). –  n''augmente pas la ruine, c.-à-d. ne continue pas le massacre. –  Par la vie du Seigneur  : cf. 1S 14.39n. –  un seul cheveu 1S 14.45+.'
  - type: text
    content: 'Elle dit : Souviens-toi, je t''en prie, ô roi, du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, afin que le rédempteur du sang n''augmente pas la ruine, et qu''on ne fasse pas disparaître mon fils ! Et il dit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', il ne tombera pas à terre un seul cheveu de ton fils !'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Par ces mots, la femme prépare le roi à passer de la fiction (le cas de son fils) à la réalité (le cas d'Absalom).
  - type: text
    content: 'La femme dit : Laisse-moi te dire un mot, je t''en prie, ô roi. Et il dit : Parle ! '
  '13':
  - type: note
    content: 'à l''égard du peuple de Dieu  : après la mort d''Amnon, fils aîné de David, c''est Absalom qui est l''héritier du trône ; si David ne le fait pas revenir, c''est l''avenir même d''Israël qui est en jeu (on ignore ce qu''était devenu Kiléab, deuxième fils de David, selon 3.3). –  celui que tu as banni  : le chap. 13 ne parle pas d''un bannissement par David, mais de la fuite volontaire d''Absalom ; cependant, le résultat est le même, et seul le pardon de David peut mettre fin à l''exil du meurtrier.'
  - type: text
    content: 'Elle dit : Pourquoi alors as-tu cette attitude à l''égard du peuple de Dieu, puisqu''il résulte de tes paroles mêmes que tu as tort de ne pas faire revenir celui que tu as banni ? '
  '14':
  - type: note
    content: 'Le texte hébreu de ce v. est peu clair et le sens en est incertain. L''idée générale semble être que tout le monde doit mourir un jour, disparaître comme l''eau qu''on répand à terre. –  Dieu n''ôte pas la vie  : c.-à-d. : il ne veut pas la mort d''Absalom, il veut au contraire qu''il revienne de son exil pour assumer sa fonction lorsqu''il en sera temps. D''autres comprennent Dieu ne relève pas un mort, c.-à-d. : il ne va pas ramener Amnon à la vie, c''est pourquoi il faut qu''Absalom revienne d''exil.'
  - type: text
    content: 'Mortels, nous mourons, comme de l''eau répandue à terre ne se rassemble plus. Mais Dieu n''ôte pas la vie, et il a conçu des plans pour que celui qui est banni loin de lui ne le reste pas. '
  '15':
  - type: note
    content: 'le peuple m''a effrayée  : le mot peuple semble avoir ici un sens très vague, des gens ou on  ; la femme ne veut pas dévoiler l''identité de celui qui l''a envoyée.'
  - type: text
    content: 'Maintenant, ô roi, si je suis venue te dire cela, c''est que le peuple m''a effrayée. Alors j''ai dit : Je vais parler au roi ; peut-être le roi fera-t-il ce que, moi, sa servante, je dirai. '
  '16':
  - type: note
    content: 'me faire disparaître (même verbe v. 7,11) … du patrimoine de Dieu  : la mise à mort du second fils marquerait la fin de la lignée familiale, et préfigurerait donc la fin de la mère elle-même ; il n''y aurait plus de place pour eux au sein du peuple de Dieu (= le patrimoine de Dieu  ; voir 1S 10.1).'
  - type: text
    content: 'Oui, le roi m''écoutera et me délivrera de la main de l''homme qui veut me faire disparaître, avec mon fils, du patrimoine de Dieu. '
  '17':
  - type: note
    content: 'soit source d''apaisement (litt. de repos), c.-à-d. qu''elle mette fin au cycle infernal des morts successives  ; cf. Es 32.17 ; Ps 72.1-7. –  comme un messager (ou ange) de Dieu  : cf. v. 20 ; 19.28 ; 1S 29.9n. –  pour ce qui est d''entendre le bon et le mauvais  : c.-à-d. capable de distinguer le bon et le mauvais, et donc de juger avec impartialité, cf. 1R 3.9,28. –  soit avec toi  : pour t''aider dans ce discernement.'
  - type: text
    content: 'J''ai dit : Que ta parole, ô roi, soit source d''apaisement, je t''en prie ! Car tu es comme un messager de Dieu, pour ce qui est d''entendre le bon et le mauvais. Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, soit avec toi ! '
  '18':
  - type: note
    content: 'Parle…  : cf. Ec 8.2-4.'
  - type: text
    content: 'Le roi dit à la femme : Je vais te demander quelque chose. Ne me cache rien ! La femme dit : Parle, je te prie, ô roi, mon seigneur ! '
  '19':
  - type: note
    content: 'N''y aurait-il pas…  : litt. la main de Joab est-elle avec toi dans tout cela ? c.-à-d. c''est bien Joab qui agit au travers de ton intervention, n''est-ce pas ? –  Par ta vie  : cf. 1S 1.26n. –  t''induire en erreur  : litt. aller à droite ou à gauche de ce que dit mon seigneur le roi  ; autres traductions ce que tu dis correspond exactement à la réalité ; malheur à celui qui s''écarte de ce que tu dis. –  qui a placé toutes ces paroles dans ma bouche, c.-à-d. qui m''a dicté tout ce que je devais dire.'
  - type: text
    content: 'Le roi dit alors : N''y aurait-il pas du Joab dans tout cela ? La femme répondit : Par ta vie, ô roi, on ne peut pas t''induire en erreur. C''est en effet Joab, ton serviteur, qui m''a donné des ordres et qui a placé toutes ces paroles dans ma bouche. '
  '2':
  - type: note
    content: 'Teqoa  : localité située à 15 km environ au sud de Jérusalem ; patrie du prophète Amos (Am 1.1). –  sage ou habile, avisée  ; cf. v. 20 ; 20.16. –  ne te parfume pas  : litt. ne te frotte pas avec de l''huile  ; cf. 12.20n.'
  - type: text
    content: 'Il envoya chercher à Teqoa une femme sage et lui dit : Mets-toi en deuil, je te prie : revêts des habits de deuil, ne te parfume pas, sois comme une femme qui porte depuis longtemps le deuil d''un mort. '
  '20':
  - type: note
    content: 'changer le cours des événements  : autre traduction faire apparaître l''affaire sous un autre jour, litt. retourner la face de la parole ou de la chose. –  pour connaître… ou pour comprendre  ; cf. 18.13 ; Pr 25.2. –  sur la terre ou dans le pays.'
  - type: text
    content: C'est pour changer le cours des événements que ton serviteur Joab a fait cela. Mais toi, mon seigneur, tu es aussi sage qu'un messager de Dieu, pour connaître tout ce qui se passe sur la terre.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Je veux bien faire cela  : certains mss portent voilà donc ce que tu as fait.'
  - type: text
    content: 'Le roi dit à Joab : Je veux bien faire cela ; va, ramène le jeune Absalom. '
  '22':
  - type: note
    content: 'tomba face contre terre v. 4n. –  bénit a ici, comme parfois ailleurs, le sens de remercia. –  j''ai trouvé grâce à tes yeux  : cf. 1S 16.22n.'
  - type: text
    content: 'Joab tomba face contre terre, prosterné, et bénit le roi. Puis il dit : Je sais aujourd''hui que j''ai trouvé grâce à tes yeux, ô roi, mon seigneur, puisque tu as agi selon ma parole. '
  '23':
  - type: note
    content: 'partit  : litt. se leva et partit, de même en 15.9. –  Gueshour  : cf. 13.38n.'
  - type: text
    content: 'Joab partit pour Gueshour et ramena Absalom à Jérusalem. '
  '24':
  - type: note
    content: 'qu''il ne paraisse pas en ma présence  : litt. qu''il ne voie pas ma face (de même aux v. 28,32) ; Absalom n''est pas admis à venir se présenter devant le roi son père ; cf. Ex 10.28.'
  - type: text
    content: 'Mais le roi dit : Qu''il se retire chez lui et qu''il ne paraisse pas en ma présence. Alors Absalom se retira chez lui et ne parut pas en la présence du roi.'
  - type: heading
    content: David se réconcilie avec Absalom
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'beau  : comme Saül (voir 1S 9.2) et David lui-même (1S 16.18) ; cf. Ps 45.3.'
  - type: text
    content: 'Il n''y avait pas dans tout Israël d''homme aussi beau ni aussi comblé d''éloges qu''Absalom : depuis les pieds jusqu''au crâne il n''y avait en lui aucun défaut. '
  '26':
  - type: note
    content: 'La construction de la phrase est assez lourde en hébreu, mais le sens général est clair. –  chaque année  : litt. à la fin de jours aux jours, expression dont le sens précis n''est pas assuré ; on a aussi interprété à la fin de chaque mois. –  sa chevelure lui pesait  : litt. elle était lourde sur lui. –  deux cents sicles  : environ 2 kg ; la précision selon le poids royal indique la coexistence, à certaines époques, de divers systèmes de poids et mesures, qu''il reste difficile d''identifier aujourd''hui avec certitude.'
  - type: text
    content: 'Lorsqu''il se rasait la tête – il se la rasait chaque année, parce que sa chevelure lui pesait – le poids de ses cheveux était de deux cents sicles, selon le poids royal. '
  '27':
  - type: note
    content: 'trois fils  : selon d''autres traditions, Absalom n''avait pas de fils (voir 18.18), mais une fille qui s''appelait Maaka (1R 15.2).'
  - type: text
    content: Il naquit d'Absalom trois fils et une fille nommée Tamar, qui devint une belle femme.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'sans paraître en la présence du roi  : litt. sans voir la face du roi  ; cf. v. 24n.'
  - type: text
    content: 'Absalom resta deux ans à Jérusalem, sans paraître en la présence du roi. '
  '29':
  - type: note
    content: Absalom insiste pour que Joab reprenne son rôle d'intermédiaire entre lui et son père.
  - type: text
    content: 'Il fit demander Joab pour l''envoyer auprès du roi ; mais Joab ne voulut pas venir le voir. Il le fit encore demander une deuxième fois ; mais Joab ne voulut toujours pas venir. '
  '3':
  - type: note
    content: 'de telle et telle manière  : litt. comme cette parole. –  l''instruisit de  : litt. mit dans sa bouche, c.-à-d. lui dicta.'
  - type: text
    content: 'Tu iras ainsi vers le roi et tu lui parleras de telle et telle manière – Joab l''instruisit de ce qu''elle devait dire. '
  '30':
  - type: note
    content: 'à côté de la mienne  : litt. à côté de moi. –  mirent le feu au champ  : cf. Jg 15.4s. LXX, partiellement appuyée par un ms hébreu de Qumrân, ajoute  : Les serviteurs de Joab vinrent vers lui, les vêtements déchirés, et dirent : Les hommes d''Absalom ont mis le feu à la parcelle.'
  - type: text
    content: 'Absalom dit alors à ses hommes : Regardez, la parcelle de Joab est à côté de la mienne ; il y a là de l''orge ; allez y mettre le feu. Les hommes d''Absalom mirent le feu au champ. '
  '31':
  - type: text
    content: 'Joab vint trouver Absalom chez lui. Il lui dit : Pourquoi tes hommes ont-ils mis le feu à la parcelle qui m''appartient ? '
  '32':
  - type: note
    content: 'paraître en la présence du roi  : cf. v. 24n. –  s''il y a  : cf. 1S 20.8. –  qu''il me fasse mettre à mort  : cf. 1S 20.8 ; Ac 25.11.'
  - type: text
    content: 'Absalom répondit à Joab : Je t''avais fait dire : « Viens ici, et je t''enverrai dire au roi de ma part : “Pourquoi suis-je revenu de Gueshour ? Mieux vaudrait pour moi que j''y sois encore.” Maintenant je désire paraître en la présence du roi ; et s''il y a une faute en moi, qu''il me fasse mettre à mort. » '
  '33':
  - type: note
    content: 'il appela…  : autre traduction le roi fit appeler Absalom, qui se rendit chez lui… –  se prosterna  : cf. v. 4n. –  embrassa  : c''est le baiser de la réconciliation ; cf. 15.5 ; 19.40 ; Gn 33.4 ; 45.14s.'
  - type: text
    content: Joab se rendit chez le roi et lui dit tout cela. Puis il appela Absalom, qui se rendit chez le roi et se prosterna devant lui, face contre terre. Le roi embrassa Absalom.
  '4':
  - type: note
    content: 'teqoïte  : de Teqoa. –  alla parler au roi  : litt. dit au roi, mais certains mss portent vint chez le roi. –  Elle tomba face contre terre, prosternée  : cf. 9.6 ; 1S 25.23. –  sauve-moi  : litt. sauve  ; cf. 2R 6.26.'
  - type: text
    content: 'La femme teqoïte alla parler au roi. Elle tomba face contre terre, prosternée, et dit : O roi, sauve-moi ! '
  '5':
  - type: note
    content: 'Les v. 5-7 constituent une sorte de parabole analogue à celle de 12.1-4 ; David s''y implique fortement, alors même qu''il croyait prendre une décision qui ne le concernait pas directement. –  mon mari est mort  : cf. 2R 4.1.'
  - type: text
    content: 'Le roi lui dit : Qu''as-tu ? Elle répondit : Hélas, je suis veuve, mon mari est mort ! '
  '6':
  - type: note
    content: Cf. 13.28s ; Gn 4.8 ; 27.41-45.
  - type: text
    content: 'J''avais deux fils, ils se sont querellés tous les deux dans la campagne, et il n''y avait personne pour les séparer ; l''un a frappé l''autre à mort. '
  '7':
  - type: note
    content: 'Nous le mettrons à mort  : cf. Gn 9.5s ; Dt 19.11-13. –  lui, l''héritier  : autres traductions même s''il est l''héritier ; et du même coup nous ferons disparaître l''héritier. Ces mots trahissent peut-être les motifs intéressés des justiciers, qui espèrent qu''ainsi l''héritage du père reviendra à l''ensemble du clan (cf. Mt 21.38). Tout Israélite, comme signe de sa participation à l''alliance, possédait une portion du territoire national. –  le tison ou la braise (cf. 22.9,13) : image de l''existence, menacée, du fils survivant ; cf. Es 42.3 ; Mt 12.20. –  sur la terre  : autre traduction dans le pays.'
  - type: text
    content: 'Alors tout le clan s''est dressé contre moi, en disant : « Livre celui qui a abattu son frère ! Nous le mettrons à mort, pour la vie de son frère qu''il a tué ; nous le ferons disparaître, lui, l''héritier ! » Ils éteindraient ainsi le tison qui me reste, pour ne laisser à mon mari ni nom ni reste sur la terre. '
  '8':
  - type: note
    content: Rentre chez toi ou va dans ta maison.
  - type: text
    content: 'Le roi dit à la femme : Rentre chez toi. Je donnerai des ordres à ton sujet. '
  '9':
  - type: note
    content: 'teqoïte  : c.-à-d. de Teqoa, v. 2n,4. –  Sur moi la faute  : si le meurtrier est épargné, la loi n''est pas appliquée avec toute sa rigueur (cf. Nb 35.16-21,31) ; la femme, jouant son rôle avec habileté, déclare être prête à assumer elle-même la responsabilité de cette situation. –  ô roi, mon seigneur  : la même formule est simplement traduite par ô roi dans la suite (v. 12,15,17,19). –  en sois innocent ou ne sois pas tenu pour responsable (d''une non-application de la loi). –  ton trône signifie ici l''institution royale.'
  - type: text
    content: 'La femme teqoïte dit au roi : Sur moi la faute, ô roi, mon seigneur, et sur la maison de mon père ! Que tu en sois innocent, toi et ton trône. '
