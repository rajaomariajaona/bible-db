document_id: LEV.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: is2
  children:
  - type: text
    text: La grande synthèse cultuelle
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre du Lévitique a souvent été éclipsé, dans la tradition chrétienne, par la richesse narrative de ses voisins : d''un côté, la Genèse et l''Exode, qui vont des récits des origines à la sortie d''Egypte et à l''alliance du Sinaï ; de l''autre, les Nombres et le Deutéronome, qui relatent le séjour d''Israël au désert jusqu''au seuil de la Terre promise.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le Lévitique s''insère pourtant dans le même '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: cadre général
  - type: text
    text: '  : les lois qui le composent auraient été données au Sinaï, dans l''espace d''un mois et vingt jours, au début de la deuxième année à compter de la sortie d''Egypte (comparer Ex 40.2,17 avec Nb 10.11). Le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sanctuaire
  - type: text
    text: ' est désormais le lieu habituel de la révélation (Lv 1.1 ; cf. 7.38 ; voir cependant 25.1 ; 26.46 ; 27.34), depuis que la gloire* de Dieu, avec la nuée et le feu qui la représentent, a quitté la montagne pour la tente cultuelle (comparer Ex 24.16s et 40.34ss ; cf. Lv 9.6,23s). Le chapitre 8 du Lévitique, récit de l''investiture des prêtres, reprend la description de l''inauguration du sanctuaire là où l''Exode l''avait laissée (cf. Ex 28–29 ; 39–40). Les offrandes des princes, en Nombres 7, se rapportent encore au même événement. Cependant l''action ne redémarrera vraiment qu''au chapitre 10 des Nombres, quand Israël lèvera le camp pour poursuivre ses pérégrinations dans le désert.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Hormis cette insertion d''ensemble dans l''épopée ancestrale et telle ou telle anecdote qui fournit le contexte de lois particulières (chap. 10, le sacrilège et le châtiment de Nadab et Abihou, les deux fils aînés d''Aaron ; 24.10ss, un cas de blasphème), le Lévitique se présente avant tout comme une réglementation minutieuse, qui peut paraître fastidieuse au lecteur moderne. Il expose en effet le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: système rituel
  - type: text
    text: ' dont le sanctuaire est le centre. Ce texte, sans doute le plus complet de la Bible hébraïque dans son domaine (voir ci-dessous « Plan du Lévitique »), a d''ailleurs été rédigé avec tant de soin qu''il en reste l''un des mieux conservés : les divergences du texte massorétique avec les autres témoins (LXX*, Smr*, mss de Qumrân*) sont ici minimes (voir l''introduction à l''Ancien Testament, p.${Xintat}).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'En dépit de son nom usuel qui lui vient, comme pour les autres livres du Pentateuque, de la table des matières de la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Septante
  - type: text
    text: ' grecque (LXX) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: via
  - type: text
    text: ' la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vulgate
  - type: text
    text: ' latine (Vg*), le livre du Lévitique ne concerne pas directement les lévites*, qui ne sont mentionnés qu''incidemment en 25.32-34 : les obligations et les droits spécifiques de ces derniers, en tant qu''ils sont distingués des prêtres, sont plutôt exposés dans le livre des Nombres (1.50s ; 3.9ss ; 4 ; 8 ; 18 ; 35). En fait le Lévitique est tout particulièrement consacré, surtout dans sa première partie (chap. 1–16), à l''office des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prêtres
  - type: text
    text: '* (également décrit, au milieu d''autres textes, en Ex 28ss et Nb, ainsi que dans le livre d''Ezéchiel [44.15ss] et les Chroniques [p. ex. 1Ch 24]). Ceux-ci sont ici représentés par Aaron et ses fils (1.5ss ; 2.2 ; 3.2 etc.), qui sont ailleurs rattachés à la tribu de Lévi (cf. Ex 4.14 ; Nb 17.18 ; Dt 17.9 etc.). La tradition juive, qui nomme en principe le livre d''après ses premiers mots (en hébreu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wayyiqra’, [et il] appela
  - type: text
    text: '), le désigne également, en particulier dans le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Talmud*,
  - type: text
    text: ' comme « loi des prêtres » ou « loi des offrandes » ; la traduction syriaque* l''intitule « livre des prêtres ».'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A l''opposé de la relative désaffection dont il souffre d''ordinaire dans la lecture chrétienne de l''Ancien Testament, le Lévitique occupe une place centrale dans la tradition juive : situé au milieu de la Torah (voir loi*), il peut être considéré comme le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: cœur symbolique
  - type: text
    text: ' de cet ensemble fondamental. L''étude de la Torah débute normalement avec ce livre. Un '
  - type: usfm
    marker: it
    children:
    - type: text
      text: midrash*
  - type: text
    text: ' rend compte de cette coutume en ces termes : « Pourquoi les petits enfants commencent-ils par le manuel des prêtres et non pas par la Genèse ? — Sans doute parce que les petits enfants sont purs et que les sacrifices aussi sont purs ; que les purs viennent donc et s''engagent à l''étude du pur. »'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Sainteté et pureté
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Un des principaux rôles des prêtres, selon le Lévitique, est '
  - type: usfm
    marker: it
    children:
    - type: text
      text: de
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: séparer
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: le sacré
  - type: text
    text: ' (ou « le saint »)'
  - type: usfm
    marker: it
    children:
    - type: text
      text: et le profane, l'impur et le pur
  - type: text
    text: ' (10.10 ; cf. 11.47 ; 20.25 ; Ez 22.26 ; 44.23).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ces concepts-clefs du Lévitique méritent d''être définis précisément. La '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sainteté
  - type: text
    text: ' et la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pureté
  - type: text
    text: ' si souvent évoquées dans ses pages sont en effet spontanément comprises du lecteur chrétien ou post-chrétien dans un sens spirituel ou moral, alors qu''elles revêtent ici un sens prioritairement '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: rituel
  - type: text
    text: ' ou '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: cultuel.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ainsi la '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: sainteté
  - type: text
    text: ', surtout évoquée dans la seconde partie de l''ouvrage qu''on a parfois appelée « Loi de sainteté » (chap. 17–26), relève davantage du domaine sacral que de l''éthique. C''est la nature même de Dieu (11.45 ; 19.2 ; 20.7s,26 ; 21.6ss,15,23 ; 22.9,16,32 ; cf. Ex 15.11 ; Ez 39.7), de ce qui lui appartient en propre (ce qui est intrinsèquement '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacré,
  - type: text
    text: ' à commencer par son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nom*,
  - type: text
    text: ' 20.3 ; 22.2,32 ; cf. Ez 36.20ss) et de ce qui s''en approche (ce qui est '
  - type: usfm
    marker: it
    children:
    - type: text
      text: consacré
  - type: text
    text: '), notamment le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sanctuaire,
  - type: text
    text: ' son mobilier et ses ustensiles (6.9,19ss ; Ez 42.13 ; 46.19), les offrandes (3.11 ; 22.12 ; cf. Dt 26.13) et bien sûr les prêtres (cf. 8.9ss,15,30 ; 21.6ss,12,15,23). Outre les personnes et les choses, peuvent être déclarés sacrés des temps particuliers : le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sabbat*
  - type: text
    text: ' et les fêtes du calendrier* annuel (23.1ss), les années sabbatiques et le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: jubilé
  - type: text
    text: ' (25.10ss). Le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacré
  - type: text
    text: ' ou '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saint
  - type: text
    text: ' connaît parfois des degrés : dans certains textes un '
  - type: usfm
    marker: it
    children:
    - type: text
      text: très-sacré
  - type: text
    text: ' ou « sacro-saint » se distingue (2.3+ ; 6.10,20 ; cf. Ex 29.37n ; Ez 41.4) ; l’'
  - type: usfm
    marker: it
    children:
    - type: text
      text: anathème
  - type: text
    text: ' aussi peut être considéré comme un niveau supérieur de consécration (27.21,28s ; Ez 44.29, voir Dt 2.34'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Trésor du peuple de l''alliance, la sainteté est pour lui une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: exigence
  - type: text
    text: ' permanente (cf. le leitmotiv '
  - type: usfm
    marker: it
    children:
    - type: text
      text: vous serez saints, car je suis saint,
  - type: text
    text: ' 11.44s ; cf. 19.2 ; 20.3,7s,26 ; 21.8,23 ; 22.9,16,32 ; Ex 22.30), voire une menace : on ne s''approche de Dieu que selon des règles rituelles précises, à l''égard desquelles la moindre infraction, même avec les meilleures intentions, constitue une '
  - type: usfm
    marker: it
    children:
    - type: text
      text: profanation
  - type: text
    text: ' (18.21 ; 19.8,12,29 ; 20.3 ; 21.4ss,12,15,23 ; 22.9s,15,32) ou un '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrilège
  - type: text
    text: ' (5.15'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ',21 ; 26.40) qui peut entraîner la mort du contrevenant (10.1-3 ; cf. 15.31 ; 1S 6.19s ; voir aussi Jos 7, qui évoque une malédiction collective, et 2Ch 26.16ss, un autre châtiment).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Corollaire mais non point synonyme de la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sainteté
  - type: text
    text: ' (les deux concepts sont associés, mais non identifiés, en 11.44s ; 16.19 ; cf. 2Ch 29.15ss), la '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: pureté,
  - type: text
    text: ' à laquelle sont particulièrement consacrés les chapitres 11 à 15, est la condition requise de ceux qui s''approchent de Dieu (les prêtres d''abord, qui ne peuvent exercer leur sacerdoce que dans des conditions de pureté particulièrement strictes ; cf. chap. 8–9 ; 16.4 ; 21.1ss,11s ; 22.3ss ; cf. Ez 44.25ss, mais aussi, de façon plus ponctuelle, ceux qui prennent part au culte, cf. 7.19ss). Dans la seconde partie du livre, elle est régulièrement exigée, dans un sens plus large, de tout le peuple qui vit en relation avec Dieu. Les souillures ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: impuretés, abominations, horreurs
  - type: text
    text: ', cf. 7.21 ; 11.10ss ; 18.22ss ; 20.25) qu''elle exclut coïncident quelquefois avec ce que nous pouvons considérer comme des fautes morales ; mais il s''agit plus souvent de choses, d''états ou de phénomènes naturels quoique perçus, à certains égards, comme des anomalies. L''impureté, dans la logique particulière des prêtres, est incompatible avec la sainteté de Dieu : le contact entre l''impur et le sacré est mortel (15.31 ; cf. 7.20s ; 20.25s ; 22.3ss ; voir aussi Es 6.3,5,7). Les interdits relatifs au sacré et à l''impureté, qui présentent de nombreuses analogies avec les textes rituels du Proche-Orient ancien, ont été fréquemment rapprochés de la notion de « tabou », qui joue dans l''histoire des religions un rôle central quoique diversement apprécié.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La pureté se conçoit souvent comme une notion négative, dans la mesure où c''est comme absence d''impureté qu''elle se laisse le plus volontiers définir : elle est à la pureté, dans le domaine rituel, ce que la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: propreté
  - type: text
    text: ' est à la saleté dans la vie quotidienne (cf. Dt 23.13ss). Mais on l''a aussi pensée de façon positive, comme un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: ordre
  - type: text
    text: ' sans cesse menacé par un désordre qu''il ne peut intégrer (témoin le rejet des défauts physiques permanents, comparable à celui de l''impureté provisoire, en 21.17'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: 'ss). La distinction théorique entre pur et impur qui constitue, on l''a vu, l''une des principales responsabilités des prêtres, entraîne dans la pratique la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: séparation
  - type: text
    text: ' des choses (10.10 ; cf. le rejet plus général des mélanges en 18.23 ; 19.19). L''impureté se caractérise en effet par son pouvoir de contagion, bien plus systématique encore que celui du sacré : tout ce qui entre en contact avec l''impur devient impur à son tour, au moins dans les conditions prévues par la loi (11.32ss ; cf. Ag 2.12ss).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Sont ainsi déclarées impures non seulement les pathologies sexuelles (chap. 15), mais la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sexualité
  - type: text
    text: ' elle-même, qu''elle soit ou non conforme aux règles morales et sociales (15.16ss ; cf. 18.20ss ; 20.10,15,18 ; 21.9), et avec elle les règles féminines (15.19ss ; 18.19) et l''accouchement (chap. 12) ; la «  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: lèpre
  - type: text
    text: '  » des personnes, mais aussi des vêtements et des maisons (chap. 13–14 ; cf. 13.2'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ') ; la consommation de la viande de certains '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: animaux
  - type: text
    text: ' ou le simple contact avec leur cadavre (5.2 ; chap. 11 ; 17.15 ; cf. Dt 14) ; la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: mort
  - type: text
    text: ' et les rites de deuil (21.1ss ; cf. Nb 19) ; telle ou telle '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: pratique,
  - type: text
    text: ' probablement religieuse ou magique à l''origine (18.21,24ss ; 19.3,31 ; 20.3). Toutes ces impuretés peuvent être considérées, indépendamment de toute faute morale, comme relevant de la catégorie du '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: 'péché* :'
  - type: text
    text: ' le terme hébreu correspondant à la fois au '
  - type: usfm
    marker: it
    children:
    - type: text
      text: péché
  - type: text
    text: ' et au '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifice pour le péché
  - type: text
    text: ' se trouve associé à des impuretés rituelles parfois inévitables (12.6ss ; 14.10'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: 'ss ; 16.16,19,30 ; cf. Es 6.5,7 ; Ez 14.11 ; 18.6,11,15 ; 23.49 ; 37.23 ; 39.24), qui appellent une purification (12.7s ; 14.19s,31 ; 15.15,30) plutôt qu''un pardon (4.20,26,31,35 ; 5.10,13). L''impureté atteint le sanctuaire et risque d''en chasser Dieu lui-même (15.31 ; 20.2s ; cf. Nb 19.20 ; Jr 7.30s ; 32.34s ; Ez 5.11 ; 2Ch 36.14). Du coup elle éloigne de Dieu et, concrètement, du sanctuaire, tout ce qui la touche, et elle requiert un cérémoniel de purification adéquat (le plus souvent par l''eau, 11.32,40 ; 13.58 ; 14.8 ; 15.16ss ; 17.15 ; 22.6 ; cf. Nb 19.19 ; 31.23s ; Ez 36.25). Faute de purification, l''impur risque non seulement la mort, mais, chose plus grave encore dans la logique rituelle, le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: retranchement
  - type: text
    text: ' de la communauté cultuelle (7.20n ; cf. 17.4,9s,14 ; 18.29 ; 19.8 ; 20.3ss,17s).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les explications éthiques ou hygiéniques souvent avancées pour justifier, aux yeux des modernes, les règles déconcertantes qui en résultent, sont des anachronismes qui passent à côté de la logique propre au Lévitique, dont l''une des caractéristiques littéraires est précisément de ne pas '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: motiver
  - type: text
    text: ' les règles qu''il énonce. Autant dire qu''il faut accepter un total dépaysement pour pénétrer dans ce livre.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'On aurait cependant tort de croire que la sainteté et la pureté rituelles chères au Lévitique excluent la préoccupation '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: éthique
  - type: text
    text: '. Celle-ci apparaît dans de nombreuses règles énoncées par le livre. Le chapitre 19 en est sans doute l''exemple le plus remarquable, mêlant sans distinction ni hiérarchie apparentes, et sans autre justification que le refrain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: je suis le Seigneur (YHWH),
  - type: text
    text: ' des prescriptions que nous n''hésiterions pas à classer dans l''observance rituelle (v. 3-8,19,23-31) et des préceptes que nous qualifierions volontiers de moraux : respect des parents et des personnes âgées (v. 3,19), sollicitude envers les pauvres, les étrangers, les infirmes (v. 9s,13s,33s), interdiction du mensonge et du parjure (v. 11s), exhortation à l''équité judiciaire ou à l''honnêteté commerciale (v. 15s,35s). C''est même dans ce chapitre que se trouve le commandement célèbre '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tu aimeras ton prochain comme toi-même,
  - type: text
    text: ' qui semble fort éloigné du rituel et qui dépasse aussi les limites habituelles de l''éthique. Cette liste surprenante donne à penser que les '
  - type: usfm
    marker: it
    children:
    - type: text
      text: commandements du Seigneur
  - type: text
    text: ' si souvent évoqués dans les pages du Lévitique (4.2,13,22,27 etc.) sont tout autant les préceptes moraux que les prescriptions rituelles. Seulement l''éthique du Lévitique, à l''opposé de celle de l''humanisme, n''est jamais considérée comme autonome : respecter le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', c''est aussi bien respecter le sabbat ou les interdits alimentaires que les droits des plus démunis.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Les sacrifices
- type: usfm
  marker: ip
  children:
  - type: text
    text: Au cœur du système cultuel du Lévitique, la législation sur les sacrifices* occupe toute la première partie du livre (chap. 1–7). Ils y sont répertoriés selon une nomenclature précise (chap. 1–5), qui n'atteint nulle part ailleurs dans la Bible un tel degré de systématisation (
  - type: usfm
    marker: it
    children:
    - type: text
      text: holocaustes
  - type: text
    text: ' ou offrandes totales, 1.3'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: 'ss ; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: offrandes végétales,
  - type: text
    text: ' 2.1'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: 'ss ; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifices de paix*
  - type: text
    text: ' ou de communion, 3.1'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: 'ss ; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifices pour le péché
  - type: text
    text: ', 4.1ss ; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifices de réparation,
  - type: text
    text: ' 5.6'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ',14ss ; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifices de reconnaissance,
  - type: text
    text: ' 7.12'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '  ; voir « Les animaux offerts en sacrifice », p.${Xsacrif}).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans d''autres textes de l''Ancien Testament, les sacrifices apparaissent surtout comme l''occasion d''une communion joyeuse entre les hommes et avec Dieu. Cette fonction socio-religieuse est bien présente ici : d''une part dans les '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifices de paix
  - type: text
    text: ' ou de '
  - type: usfm
    marker: it
    children:
    - type: text
      text: reconnaissance,
  - type: text
    text: ' qui restent l''occasion d''un repas sacré ; d''autre part dans l’'
  - type: usfm
    marker: it
    children:
    - type: text
      text: odeur agréable
  - type: text
    text: ' ou « apaisante » (pour Dieu) qui constitue l''aboutissement de tous les sacrifices, y compris du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifice pour le péché
  - type: text
    text: ' (4.31 ; cf. 1.9'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '). Cependant le Lévitique met l''accent sur une autre fonction du sacrifice, celle qui consiste à '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: restaurer
  - type: text
    text: ' un ordre sacral sans cesse menacé par les inévitables irruptions de l’'
  - type: usfm
    marker: it
    children:
    - type: text
      text: impureté
  - type: text
    text: ' et du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: péché
  - type: text
    text: ' (au sens rituel) dans l''existence du peuple et de chacun de ses membres.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Dans cette perspective, le Lévitique accorde une place importante au rite d’
  - type: usfm
    marker: bd
    children:
    - type: text
      text: expiation
  - type: text
    text: '*, c''est-à-dire d''absolution ou d''annulation du péché, qui correspond sans doute à un geste accompli par le prêtre au cours du sacrifice (4.20'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '). L''expiation a naturellement sa place dans le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifice pour le péché
  - type: text
    text: ' et le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifice de réparation ;
  - type: text
    text: ' mais ici même l''holocauste, où toute la bête est brûlée en signe de sa consécration totale à Dieu, est revêtu d''une valeur expiatoire (1.4). Le '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: sang
  - type: text
    text: ' de la victime, utilisé dans divers rites d''aspersion (voir 1.5'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '  ; 4.6'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '), est tout particulièrement associé à l''expiation dans le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifice pour le péché
  - type: text
    text: '. C''est lui qui '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ôte le péché
  - type: text
    text: ' (8.15 ; 14.49,52 ; cf. Ex 29.36 ; Ez 43.20ss ; 45.18 ; voir aussi Nb 8.21 ; 19.9ss ; 31.19ss) ; c''est par lui que le « pécheur » ou l''impur préalablement purifié est rétabli dans une juste relation avec Dieu. Le sang est un symbole particulièrement riche de sens : d''une part il participe du sacré (il est, avec la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: graisse,
  - type: text
    text: ' la part systématiquement réservée à Dieu dans le sacrifice, cf. 3.17 ; 7.25ss) ; d''autre part il est fréquemment vecteur d''impureté (cf. 12.2ss ; 15.19ss ; 18.19 ; Nb 35.33 ; Es 64.5 ; cf. Ez 16.6,9). Si son efficacité expiatoire paraît automatique, il ne la doit pourtant pas à un pouvoir autonome, mais à une disposition divine : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: c'est moi qui l'ai placé pour vous sur l'autel, afin de faire l'expiation sur vous
  - type: text
    text: ' (17.11'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '  ; cf. Hé 9.7,12s,22s,25 ; 10.4 ; 13.11).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le système sacrificiel culmine dans le '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: jour de l'Expiation
  - type: text
    text: ' (chap. 16) qui, une fois l''an, annule collectivement les péchés de la prêtrise et de tout Israël, ou du moins leurs conséquences, en rétablissant le sanctuaire lui-même, et en particulier l''autel, dans sa fonction (16.16,19ss,33 ; cf. 8.15 ; Ez 43.20,22 ; 45.18). On y trouve, outre l''application la plus large du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifice pour le péché,
  - type: text
    text: ' étendu à toutes les fautes possibles des prêtres et du peuple, l''étonnant rituel du « bouc émissaire » ou '
  - type: usfm
    marker: it
    children:
    - type: text
      text: bouc pour Azazel,
  - type: text
    text: ' chargé de tous les péchés du peuple avant d''être envoyé dans le désert (16.8'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ss ; à rapprocher du rôle de l'oiseau vivant dans le rite de purification du lépreux en 14.7,53). L'ensemble de la cérémonie vise à restaurer dans son intégrité la relation du peuple avec son Dieu, comme l'indique le rituel des holocaustes, offrandes totales, qui fait suite à l'envoi du bouc (16.23ss).
- type: usfm
  marker: is2
  children:
  - type: text
    text: Livre des prêtres, livre du peuple
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'S''il intéresse en particulier les prêtres, le Lévitique n''est pas pour autant un manuel d''initiation rédigé à leur seule intention. Dans de nombreux cas, les instructions qu''il renferme sont expressément adressées à tout le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: peuple
  - type: text
    text: ' d''Israël (1.2 ; 4.2 ; 7.13,29,38 ; 9.3 etc.). Il est '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tora,
  - type: text
    text: ' terme qui peut désigner la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loi
  - type: text
    text: ' dans son ensemble mais qui se réfère d''abord à un '
  - type: usfm
    marker: it
    children:
    - type: text
      text: enseignement
  - type: text
    text: ' précis (6.2,7,18 ; 11.46 ; 12.7 ; 13.59 ; 14.32,54,57 ; 15.32) que le prêtre doit non seulement appliquer, mais communiquer à ceux qui le consultent (cf. Dt 24.8 ; Ag 2.11). Le Lévitique lui-même souligne la responsabilité d''enseignement qui incombe aux prêtres (10.11 ; cf. Dt 31.9 ; 33.10 ; 2R 12.3 ; 17.27s ; Jr 2.8 ; 18.18 ; Mi 3.11 ; Ml 2.7 ; 2Ch 15.3). On notera que la loi des sacrifices semble d''ailleurs laisser une part importante dans l''accomplissement même du rituel au « laïc » qui offre le sacrifice (1.4ss) : le prêtre ne prend le relais que pour présenter l''offrande sur l''autel. En outre, le service rituel qu''elle propose n''est pas réservé aux Israélites de souche (17.8 ; comparer avec 22.25 ; Ez 44.9 ; cf. Ex 18.12 ; 2R 5.17 ; Jon 1.16).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Si, dans le détail, le code rituel peut apparaître comme un système relativement clos, relevant de sa seule logique propre, il ne faut pas perdre de vue le sens global que lui confère son appartenance à la Torah. De ce point de vue, le service du sanctuaire n''est pas une fin en soi : il est la condition requise pour que s''opère la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Rencontre,
  - type: text
    text: ' la relation vivante et vivifiante entre Dieu et son peuple, qui rejaillit sur chacun de ses membres (voir Ex 29.42-46).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'De fait, le code du Lévitique est tout entier orienté vers la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: vie
  - type: text
    text: '  : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Vous observerez mes prescriptions et mes règles : celui qui les mettra en pratique vivra par elles'
  - type: text
    text: ' (18.5 ; cf. Ez 20.11,13,21). L''une des tâches essentielles du prêtre consiste à '
  - type: usfm
    marker: it
    children:
    - type: text
      text: bénir*
  - type: text
    text: ' le peuple (9.22s ; cf. 26.2ss ; Nb 6.23ss). Tout le rituel, en un sens, est là pour rendre possible cette bénédiction efficace qui permet aux adorateurs de mener heureusement leur existence dans le cadre du peuple saint.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La loi rituelle, dès lors, se veut '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: raisonnable
  - type: text
    text: ' et, si l''on ose dire, humaine. Pour reprendre la parole de Marc 2.27/ / au sujet du sabbat, c''est elle qui est faite pour l''homme, et non pas l''inverse. Elle distingue les péchés commis '
  - type: usfm
    marker: it
    children:
    - type: text
      text: par erreur
  - type: text
    text: ' des transgressions délibérées (4.2,13). Elle met en outre le rituel vital à la portée de tous, prévoyant des offrandes de substitution pour les pauvres : ainsi, en 5.7-13, l''expiation peut exceptionnellement être produite par une offrande non sanglante (comparer avec 4.27-35) ; le rituel sur l’'
  - type: usfm
    marker: it
    children:
    - type: text
      text: offrande végétale
  - type: text
    text: ' a pu être inséré là où il se trouve (2.1ss) parce qu''on le considérait, dans certains cas, comme offrande de substitution pour l''holocauste (chap. 1) ; l''élément économique entre aussi en considération pour les sacrifices accompagnant la purification de la femme qui a accouché (12.8) ou du lépreux guéri (14.21ss). Par ailleurs, l''impureté et son pouvoir de contagion sont clairement circonscrits : ainsi l''âne est impur en ce sens qu''il est impropre à la consommation, mais le contact d''un âne dans les activités quotidiennes ne rend pas impur (11.1ss). La purification des objets entraîne la destruction d''un récipient de terre, mais le simple lavage d''un récipient de bois ou de métal, objet plus rare et plus précieux, surtout pour les foyers les plus modestes (11.32s). L''impureté normalement communiquée à l''eau ne peut s''appliquer à un puits ou à une citerne, ce qui entraînerait une perte trop lourde (11.36s). Si une maison risque d''être déclarée impure, la loi prévoit qu''on la vide de tout ce qu''elle contient avant l''inspection du prêtre, afin que les habitants ne perdent pas tous leurs biens (14.36). Par toutes ces exceptions à la stricte logique rituelle, le Lévitique se distingue aussi d''une conception purement magique du rituel.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'On notera enfin que le Lévitique débouche sur un idéal '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: social
  - type: text
    text: ' élevé, particulièrement visible dans la loi relative aux '
  - type: usfm
    marker: it
    children:
    - type: text
      text: années sabbatiques
  - type: text
    text: ' et au '
  - type: usfm
    marker: it
    children:
    - type: text
      text: jubilé,
  - type: text
    text: ' qui prévoit, à intervalles réguliers, une remise de toutes les dettes et un affranchissement général des esclaves (chap. 25). C''est dire, à tout le moins, que les tenants de la logique rituelle n''attendent pas de l''éthique individuelle, même articulée à un système sacral, la solution de tous les problèmes.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le rituel et ses limites
- type: usfm
  marker: ip
  children:
  - type: text
    text: La logique rituelle dont le Lévitique est un sommet a fini par ne plus être comprise du grand nombre, même en Israël. Alors que, dans son principe, elle englobe la morale, les prophètes déjà éprouvent souvent le besoin de lui opposer la morale (Es 1.10ss). Au seuil de l'ère chrétienne, Philon* d'Alexandrie, un juif de langue et de culture grecques, estime nécessaire, pour la rendre actuelle dans le contexte de la culture hellénistique, d'en proposer une lecture allégorique dans laquelle le rituel perd sa valeur propre pour devenir image de concepts philosophiques et moraux. Le pharisaïsme*, avec son insistance sur la piété individuelle et familiale, la décentre de son lieu naturel, le temple*. La victoire définitive de cette école sur le ritualisme sadducéen*, à la faveur de la destruction du temple en 70, marquera la fin du système rituel des sacrifices.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Quant au christianisme, il puisera ici et là dans les codes rituels de l'Ancien Testament une typologie doctrinale (lorsqu'il applique les notions de sacrifice ou d'expiation à la mort du Christ, Rm 3.25 ; 1Co 5.7 ; Ep 5.2 ; 1Jn 2.2 ; et surtout l'épître aux Hébreux, 2.17 etc.), ainsi que des métaphores spirituelles et morales (Rm 12.1s ; Ph 2.17 ; 4.18), mais il abandonnera vite la pratique même du système rituel (Mc 7/ / ; Col 2.16s). La loi sacrale de l'Ancien Testament apparaîtra essentiellement, pour les chrétiens des générations ultérieures, comme un élément de la pédagogie divine qui devait conduire au Christ (cf. Ga 4.1ss).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Reste que le rituel délaissé ne cesse de faire retour, aussi bien dans les prescriptions domestiques et synagogales du judaïsme pharisien et rabbinique que dans les liturgies chrétiennes. Aux crises du malentendu sanctionnant l'échec d'un ritualisme qui n'a pas réussi à communiquer son sens, et qui dès lors est passé pour vide aux yeux des meilleurs, succède invariablement une soif de rituel. La foi la plus pure, sous peine de verser dans l'abstraction ou le moralisme, demande des symboles, des gestes porteurs de sens, des célébrations communautaires susceptibles d'enrichir un discours théologique et moral qui ne tarde pas à être à son tour perçu comme creux ou inefficace… avant que les retours au rituel ne soient eux-mêmes battus en brèche par de nouveaux prophètes du sens.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pourquoi donc lire aujourd''hui le Lévitique, alors même que nul ne rêverait ni ne craindrait de le voir concrètement remis en vigueur ? Au moins pour retrouver le contexte originel, si étrange et déroutant soit-il, d''un mystérieux commandement d''amour qui continue de nous défier et de nous échapper dans sa simplicité et son intemporalité apparentes. Quand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: aimer son prochain comme soi-même
  - type: text
    text: ' serait le seul espace sacré possible dans un monde apparemment dépourvu de toute distinction entre sacré et profane, entre pur et impur, c''est d''abord à l''antique pensée sacerdotale d''Israël qu''il faudrait retourner pour le comprendre comme tel.'
