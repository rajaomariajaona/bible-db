      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.1 : « Il est trois choses que mon âme désire passionnément et qui sont belles aux yeux du Seigneur et des hommes : la concorde entre frères, l''amitié entre voisins, une femme et un homme en parfait accord. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''habiter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de rester
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de s''asseoir ensemble '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de se retrouver entre frères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; formule analogue en Gn 13.6 ; 36.7 ; Dt 25.5 ; voir aussi 2Co 13.11 ; Ph 4.19.
      marker-yv: yv-n
    - type: text
      text: Chant des montées. De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'il est bon, qu'il est beau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour des frères d'habiter ensemble !
