document_id: PSA.133,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Qu'il est bon pour des frères d'habiter ensemble !
  - type: text
    content: ' '
  - type: note
    content: 'montées 120.1n. –  Qu''il est bon…  : cf. 127.3ss ; Siracide 25.1 : « Il est trois choses que mon âme désire passionnément et qui sont belles aux yeux du Seigneur et des hommes : la concorde entre frères, l''amitié entre voisins, une femme et un homme en parfait accord. » –  d''habiter ou de rester , voire de s''asseoir ensemble (c.-à-d. de se retrouver entre frères ) ; formule analogue en Gn 13.6 ; 36.7 ; Dt 25.5 ; voir aussi 2Co 13.11 ; Ph 4.19.'
  - type: text
    content: Chant des montées. De David.
  - type: text
    content: Qu'il est bon, qu'il est beau
  - type: text
    content: pour des frères d'habiter ensemble !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'le parfum  : litt. la bonne huile  ; cf. 23.5+ ; même expression en 2R 20.13 ; Es 39.2 ; Ec 7.1 ; cf. Ct 1.3n. –  répandu  : sous-entendu dans le texte. –  d''Aaron 115.10 ; Ex 29.7 ; 30.30ss ; Lv 8.30.'
  - type: text
    content: C'est comme le parfum
  - type: text
    content: répandu sur la tête,
  - type: text
    content: qui descend sur la barbe, sur la barbe d'Aaron,
  - type: text
    content: qui descend sur le bord de ses vêtements.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'rosée 110.3 ; Gn 27.28 ; Dt 32.2 ; Es 26.19 ; Os 14.6 ; Pr 19.12. –  l''Hermon , montagne au nord du pays, 42.7n. –  de Sion  : certains modifient le texte hébreu traditionnel pour lire d''Iyôn (au pied du mont Hermon ; cf. 1R 15.20 ; 2R 15.29 ; 2Ch 16.4), ou encore sur les collines arides. –  assigne ou ordonne  ; cf. 20.3+ ; 42.9n  ; 44.5 ; voir aussi Lv 25.21 ; Dt 28.8. – Voir bénédiction.'
  - type: text
    content: C'est comme la rosée de l'Hermon
  - type: text
    content: qui descend sur les montagnes de Sion ;
  - type: text
    content: 'car c''est là que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' assigne la bénédiction,'
  - type: text
    content: la vie, pour toujours.
