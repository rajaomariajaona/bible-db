document_id: EXO.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu choisit Moïse pour libérer Israël
  - type: text
    content: ' '
  - type: note
    content: 'petit bétail  : chèvres et moutons (Gn 4.2n). –  Jéthro  : cf. 2.18n  ; 4.18 ; 18.1. – Voir prêtre . –  montagne de Dieu 4.27 ; 18.5 ; 24.13 ; 1R 19.8 ; cf. Nb 10.33. –  Horeb signifie sécheresse . Ce nom alterne avec celui de Sinaï (voir 16.1n) pour désigner la montagne où la loi fut donnée à Moïse (chap. 19ss).'
  - type: text
    content: 'Moïse faisait paître le petit bétail de Jéthro, son beau-père, qui était prêtre de Madiân ; il mena le troupeau au-delà du désert et arriva à la montagne de Dieu, à l''Horeb. '
  '10':
  - type: note
    content: pharaon 1.8,11.
  - type: text
    content: Maintenant, va, je t'envoie auprès du pharaon ; fais sortir d'Egypte mon peuple, les Israélites !
  '11':
  - type: text
    content: 'Moïse dit à Dieu : Qui suis-je pour aller auprès du pharaon et pour faire sortir d''Egypte les Israélites ? '
  '12':
  - type: note
    content: 'Dieu dit  : litt. il dit. –  Je serai (ou je suis) avec toi  : cf. v. 14n  ; 4.12n  ; Jos 1.5. –  signe Gn 4.15 ; 9.12 ; 17.11 ; cf. Jg 6.17s,36-40 ; 1S 14.10 ; 2R 19.29 ; Jn 2.11+. –  vous servirez Dieu  : cf. 7.16 ; Ac 7.7.'
  - type: text
    content: 'Dieu dit : Je serai avec toi ; et voici quel sera pour toi le signe que c''est moi qui t''envoie : quand tu auras fait sortir d''Egypte le peuple, vous servirez Dieu sur cette montagne.'
  - type: heading
    content: Dieu révèle son nom à Moïse
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 6.2s ; Gn 4.26 ; Jn 17.6,26.
  - type: text
    content: 'Moïse dit à Dieu : Supposons que j''aille vers les Israélites et que je leur dise : « Le Dieu de vos pères m''a envoyé vers vous. » S''ils me demandent quel est son nom, que leur répondrai-je ? '
  '14':
  - type: note
    content: 'Je serai qui (ou ce que) je serai (cf. v. 12n) : formule traditionnellement rendue par je suis celui qui suis, et dont le sens pourrait aussi être je suis qui je suis ou encore je suis (celui qui est) Je suis. Dans cette tournure inhabituelle et énigmatique (cf. Gn 32.30 ; Jg 13.18), le verbe être est exprimé en hébreu, alors qu''il est d''ordinaire sous-entendu (p. ex. au v. 11 ; 20.2). Certains modifient la vocalisation traditionnelle du texte hébreu pour lire je ferai être qui (ou ce que) je ferai être  ; LXX a traduit  : Je suis celui qui est (cf. Es 43.10ss). Voir aussi Ex 33.19 ; Es 52.6 ; Ez 12.25n  ; Os 1.9n  ; Za 2.9n  ; Jn 8.24+ ; Ap 1.4+.'
  - type: text
    content: 'Dieu dit à Moïse : Je serai qui je serai. Et il ajouta : C''est ainsi que tu répondras aux Israélites : « “Je serai” m''a envoyé vers vous. » '
  '15':
  - type: note
    content: 'Le nom du Dieu d''Israël est rendu dans l''ensemble de l''A.T. par le Seigneur, conformément à la lecture traditionnelle juive qui substitue systématiquement le terme ’Adonaï (= Seigneur, cf. Gn 22.14n) aux quatre lettres hébraïques (tétragramme) ici transcrites YHWH (cf. Gn 2.4n  ; 15.2n). Ce mot de quatre consonnes est ici rapproché du verbe être (v. 14). Il est ou Il sera, voire Il fait être (troisième personne de la forme employée au v. 14) donnerait en hébreu biblique les consonnes YHYH, mais il se peut que YHWH corresponde à une forme plus ancienne. L''équivalent traditionnel l''Eternel tentait de rendre compte de ce rapprochement, mais la notion d''éternité ne semble pas, ici, directement visée. –  mon nom tel qu''on l''évoquera (ou que l''on rappellera, dont on se souviendra, dont on fera mémoire) : litt. mon évocation ou mon souvenir  ; le terme est ici employé comme synonyme du premier mot traduit par nom  ; même terme en 17.14 (cf. 23.13) ; Dt 25.19 ; 32.26 ; Es 26.8n,14 ; Os 12.6n  ; Ps 6.6n  ; 102.13 ; 135.13 ; Jb 18.17 ; Pr 10.7 ; Ec 9.5 ; Est 9.28 (commémoration).'
  - type: text
    content: 'Dieu dit encore à Moïse : Tu diras aux Israélites : « C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu de vos pères, le Dieu d''Abraham, le Dieu d''Isaac et le Dieu de Jacob, qui m''a envoyé vers vous. » C''est là mon nom pour toujours, c''est mon nom tel qu''on l''évoquera de génération en génération. '
  '16':
  - type: note
    content: J'interviens… 4.31 ; 20.5n  ; cf. Gn 21.1 ; 50.24s ; Jr 6.15n  ; 29.10.
  - type: text
    content: 'Va, rassemble les anciens d''Israël et dis-leur : « C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu de vos pères, qui m''est apparu – le Dieu d''Abraham, d''Isaac et de Jacob. Il a dit : “J''interviens pour vous ; à cause de ce qu''on vous fait en Egypte '
  '17':
  - type: note
    content: 'd''Egypte, où vous êtes affligés  : litt. de l''affliction (ou humiliation, oppression) de l''Egypte, cf. v. 7s.'
  - type: text
    content: 'j''ai dit : Je vous ferai monter d''Egypte, où vous êtes affligés, vers le pays des Cananéens, des Hittites, des Amorites, des Perizzites, des Hivvites et des Jébusites, un pays ruisselant de lait et de miel.” » '
  '18':
  - type: note
    content: t'écouteront 4.8ns. –  venu à notre rencontre ou au-devant de nous  ; autre terme, synonyme et quasi-homonyme, en 5.3. –  trois journées 5.3 ; 8.23 ; cf. Gn 22.4. – Voir sacrifices.
  - type: text
    content: 'Alors ils t''écouteront. Tu iras, toi et les anciens d''Israël, auprès du roi d''Egypte, et vous lui direz : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu des Hébreux, est venu à notre rencontre. Maintenant, je te prie, accorde-nous de faire trois journées de marche dans le désert pour offrir des sacrifices au '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu. '
  '19':
  - type: note
    content: 'pas même…  : sens incertain ; LXX si ce n''est…'
  - type: text
    content: 'Je sais bien, moi, que le roi d''Egypte ne vous permettra pas d''y aller, pas même sous l''action d''une main forte. '
  '2':
  - type: note
    content: 'messager (ou ange) : cf. 14.19 ; Ac 7.30. –  feu flamboyant  : litt. flamme de feu  ; cf. Ps 104.4 (autre terme). –  d''un buisson  : litt. du (cf. 2.15n) buisson, hébreu sené, qui rappelle le mot Sinaï. Cf. Dt 33.16. –  Moïse vit  : litt. il vit. –  en feu  : litt. brûlant (comme au v. 3) de feu, comme en Dt 4.11+. –  ne se consumait pas  : litt. n''était pas dévoré.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui apparut dans un feu flamboyant, du milieu d''un buisson. Moïse vit que le buisson était en feu, mais que le buisson ne se consumait pas. '
  '20':
  - type: note
    content: 'en y faisant  : litt. en faisant en son sein ou au milieu d''elle, cf. 8.18 ; 10.1.'
  - type: text
    content: 'J''étendrai alors la main et je frapperai l''Egypte en y faisant toutes sortes de choses étonnantes. Après cela il vous laissera partir. '
  '21':
  - type: note
    content: 'donnerai… de la grâce… 11.3 ; 12.36 ; Gn 39.21. –  des Egyptiens  : autre traduction de l''Egypte, cf. v. 8n,22.'
  - type: text
    content: 'Je donnerai à ce peuple de la grâce aux yeux des Egyptiens ; quand vous partirez, vous ne partirez pas les mains vides. '
  '22':
  - type: note
    content: 'Cf. 11.2s ; 12.35s ; Gn 15.14. –  qui séjourne  : le verbe hébreu est apparenté au mot habituellement traduit par immigré  ; cf. 2.22n  ; 12.48n. –  l''Egypte  : autre traduction les Egyptiens.'
  - type: text
    content: Chaque femme demandera à sa voisine et à celle qui séjourne chez elle des objets d'argent, des objets d'or et des vêtements, que vous mettrez sur vos fils et vos filles, et vous dépouillerez l'Egypte.
  '3':
  - type: note
    content: 'faire un détour  : cf. Rt 4.1n. –  ce phénomène  : le même terme est traduit par aspect en 24.17 ; cf. Ez 1.1n.'
  - type: text
    content: 'Moïse dit : Je vais faire un détour pour voir ce phénomène extraordinaire : pourquoi le buisson ne brûle-t-il pas ? '
  '4':
  - type: note
    content: 'Cf. Gn 22.11-14. –  Je suis là  : cf. Gn 22.1n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vit qu''il faisait un détour pour voir ; alors Dieu l''appela du milieu du buisson : Moïse ! Moïse ! Il répondit : Je suis là ! '
  '5':
  - type: note
    content: 'Dieu dit  : litt. il dit. –  ôte tes sandales Jos 5.15. –  une terre (cf. Gn 2.5n) sacrée  : autre traduction une terre sainte.'
  - type: text
    content: 'Dieu dit : N''approche pas d''ici ; ôte tes sandales de tes pieds, car le lieu où tu te tiens est une terre sacrée. '
  '6':
  - type: note
    content: 'Dieu d''Abraham… 4.5 ; 6.3 ; Mt 22.32/ / ; Ac 7.32  ; cf. Ac 3.13. –  Moïse se détourna  : litt. Moïse cacha sa face  ; cf. Dt 31.17s ; Ps 13.2+. –  il avait peur…  : cf. 19.21 ; 33.20 ; Gn 28.11-17 ; 32.31 ; Lv 16.2 ; Nb 4.20 ; Dt 5.24s ; Jg 6.22s ; 13.22s ; Es 6.5 ; Jb 13.11+ ; voir aussi Mt 17.6 ; 28.4 ; Lc 5.8s etc. ; voir crainte.'
  - type: text
    content: 'Il ajouta : Je suis le Dieu de ton père, le Dieu d''Abraham, le Dieu d''Isaac et le Dieu de Jacob. Moïse se détourna, car il avait peur de diriger ses regards vers Dieu.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: V. 9 ; 2.24s. –  l'affliction v. 17 ; 4.31 ; Gn 16.11+. –  ses tyrans ou ceux qui le pressent  ; cf. v. 9 ; le même terme sera traduit par inspecteur en 5.6,10,13s ; cf. Dt 15.2s ( presser ) ; 1S 13.6 ; 14.24 ( serrer de près ) ; 2R 23.35 ( contraindre ) ; Es 3.5n  ; 9.3 ; 14.2,4 ; 53.7 ( maltraiter ) ; 58.3 ; 60.17 ; Za 9.8n  ; Jb 3.18n ( oppresseur ) ; Dn 11.20.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : J''ai bien vu l''affliction de mon peuple qui est en Egypte, et j''ai entendu les cris que lui font pousser ses tyrans ; je connais ses douleurs. '
  '8':
  - type: note
    content: 'des Egyptiens  : autre traduction de l''Egypte (de même au v. 9) ; cf. v. 21n  ; 1.13n. –  le faire monter Gn 12.10n. –  ruisselant de lait et de miel  : c.-à-d., sans doute, bon pour l''élevage (lait) et les cultures (le mot traduit par miel pourrait désigner du sirop de fruits plutôt que du miel d''abeilles) v. 17 ; 13.5 ; 33.3 ; Lv 20.24 ; Nb 13.27 ; 14.8 ; 16.13s ; Dt 11.9+ ; Jos 5.6 ; Jr 11.5 ; 32.22 ; Ez 20.6,15. –  là où…  : litt. vers (ou dans) le lieu des. –  Cananéens Gn 9.25n. –  Hittites Gn 10.15n. –  Amorites Gn 10.16n. –  Perizzites Gn 13.7+. –  Hivvites Gn 10.17+. –  Jébusites Gn 10.16n.'
  - type: text
    content: 'Je suis descendu pour le délivrer de la main des Egyptiens et pour le faire monter de ce pays vers un bon et vaste pays, un pays ruisselant de lait et de miel, là où habitent les Cananéens, les Hittites, les Amorites, les Perizzites, les Hivvites et les Jébusites. '
  '9':
  - type: text
    content: 'Maintenant, les cris des Israélites sont venus jusqu''à moi, et j''ai vu l''oppression que les Egyptiens leur font subir. '
