      marker-yv: yv-n
    - type: text
      text: 'Elle dit encore à son père : Que ceci me soit accordé : laisse-moi un délai de deux mois. Je m''en irai, j''irai sur les montagnes et je pleurerai ma virginité avec mes amies. '
