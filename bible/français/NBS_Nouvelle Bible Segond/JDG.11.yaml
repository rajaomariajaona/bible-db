    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jephté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yiphtah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jos 19.14) signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ouvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Hé 11.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vaillant guerrier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 6.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fils d'une prostituée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fils d'une femme infidèle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Galaad '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: peut désigner la région, la population et un personnage (v. 2) ; cf. 5.17+ ; 10.8.
      marker-yv: yv-n
    - type: text
      text: 'Jephté, le Galaadite, était un vaillant guerrier. Il était fils d''une prostituée ; c''est Galaad qui avait engendré Jephté. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jr 42.5 ; Ml 2.14 ; voir aussi 1S 12.5 ; Jr 29.23 ; Rm 1.9+.
      marker-yv: yv-n
    - type: text
      text: 'Les anciens de Galaad dirent à Jephté : Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' nous entendra les uns et les autres, si nous n''agissons pas selon ta parole. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dit toutes ses paroles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit sans doute d''un engagement solennel pris au sanctuaire local (cf. 10.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Gn 31.49). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au Mitspa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 11.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi Jephté partit avec les anciens de Galaad. Le peuple le mit à sa tête comme chef et capitaine. Jephté dit toutes ses paroles devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', au Mitspa.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Messages de Jephté aux Ammonites
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que t'ai-je fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quoi à moi et à toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'ai-je à faire avec toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; dans d''autres contextes la même expression est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pourquoi te mêles-tu de mes affaires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2S 16.10 ; 19.23 ; 1R 17.18+ ; 2Ch 35.21 ; Mc 1.24 ; Jn 2.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à mon pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans mon pays.
      marker-yv: yv-n
    - type: text
      text: 'Jephté envoya des messagers au roi des Ammonites, pour lui dire : Que t''ai-je fait, que tu viennes à moi pour faire la guerre à mon pays ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'monté d''Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 12.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rends-le
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rends-les '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (les territoires susmentionnés, cf. v. 22
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 2.17-23) ; plusieurs versions anciennes portent le singulier. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pacifiquement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le roi des Ammonites répondit aux messagers de Jephté : C''est qu''Israël, quand il est monté d''Egypte, a pris mon pays, depuis l''Arnon jusqu''au Yabboq et au Jourdain. Maintenant, rends-le pacifiquement.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jephté envoya de nouveau des messagers au roi des Ammonites, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 18,25) / '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ammonites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 4ss) : cf. v. 22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 2.9,19 ; 3.16s ; Jos 12.2s.'
      marker-yv: yv-n
    - type: text
      text: 'pour lui dire : Ainsi parle Jephté : Israël n''a pas pris le pays de Moab, ni le pays des Ammonites. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nb 14.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qadesh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 20.1 ; 33.36.
      marker-yv: yv-n
    - type: text
      text: 'En effet, lorsque Israël est monté d''Egypte, il a marché dans le désert jusqu''à la mer des Joncs et il est arrivé à Qadesh. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 20.14-21.
      marker-yv: yv-n
    - type: text
      text: 'Alors Israël a envoyé des messagers au roi d''Edom, pour lui dire : « Laisse-moi passer par ton pays, je te prie. » Mais le roi d''Edom n''a rien voulu entendre. Il en a aussi envoyé au roi de Moab, qui a refusé. Ainsi Israël est resté à Qadesh. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Edom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nb 21.4 ; Dt 2.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nb 21.11-15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'territoire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'frontière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent un même mot hébreu.
      marker-yv: yv-n
    - type: text
      text: 'Puis il a marché dans le désert, il a contourné Edom et Moab, il est passé à l''est de Moab ; ils ont campé au-delà de l''Arnon, sans entrer sur le territoire de Moab – car l''Arnon est la frontière de Moab. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Heshbôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 21.21-24 ; Dt 2.26-36 ; Jos 13.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour rejoindre notre lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jusqu'à mon lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le singulier et le pluriel alternent dans le texte (cf. v. 17).'
      marker-yv: yv-n
    - type: text
      text: 'Israël a envoyé des messagers à Sihôn, roi des Amorites, roi de Heshbôn ; Israël lui a dit : « Laisse-nous, je te prie, passer par ton pays pour rejoindre notre lieu. » '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 7-11 ; Gn 21.10.
      marker-yv: yv-n
    - type: text
      text: 'La femme de Galaad lui donna des fils. Les fils de cette femme, devenus grands, chassèrent Jephté et lui dirent : Tu n''auras pas de patrimoine dans la maison de notre père, car tu es le fils d''une autre femme. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'a pas eu assez confiance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: n'a pas cru
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toutes ses troupes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout son peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Yahtsa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jos 13.18 ; Jr 48.21 ; 1Ch 6.63 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yahats '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 21.23 ; Dt 2.32 ; Es 15.4 ; Jr 48.34.
      marker-yv: yv-n
    - type: text
      text: 'Mais Sihôn n''a pas eu assez confiance en Israël pour le laisser passer sur son territoire ; Sihôn a rassemblé toutes ses troupes et il a dressé son camp à Yahtsa pour faire la guerre à Israël. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, a livré Sihôn et toutes ses troupes à Israël, qui les a battus. Israël a pris possession de tout le pays des Amorites qui habitaient ce pays. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le territoire en question correspond à celui de Moab, cf. v. 13,24
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 21.24,26 ; Dt 2.37.'
      marker-yv: yv-n
    - type: text
      text: 'Ils ont pris possession de tout le territoire des Amorites, depuis l''Arnon jusqu''au Yabboq et depuis le désert jusqu''au Jourdain. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 4.38. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dépossédé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre sens du verbe traduit aux v. 21s,24 par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rester en possession de.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), le Dieu d''Israël, a dépossédé les Amorites devant Israël, son peuple, est-ce toi qui vas le déposséder ? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Kemosh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est le dieu de Moab et non celui d''Ammon, ce qui correspond au territoire sur lequel porte le litige (v. 22) ; cf. Nb 21.29 ; 1R 11.5-7 ; 2R 23.13 ; voir aussi Dt 4.19+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous ne resterions pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
