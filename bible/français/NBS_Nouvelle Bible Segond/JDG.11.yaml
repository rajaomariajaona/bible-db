document_id: JDG.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jephté devient chef d'Israël
  - type: text
    content: ' '
  - type: note
    content: 'Jephté (hébreu Yiphtah , cf. Jos 19.14) signifie il ouvre  ; cf. Hé 11.32. –  vaillant guerrier  : cf. 6.12+. –  fils d''une prostituée  : autre traduction fils d''une femme infidèle . –  Galaad peut désigner la région, la population et un personnage (v. 2) ; cf. 5.17+ ; 10.8.'
  - type: text
    content: 'Jephté, le Galaadite, était un vaillant guerrier. Il était fils d''une prostituée ; c''est Galaad qui avait engendré Jephté. '
  '10':
  - type: note
    content: Cf. Jr 42.5 ; Ml 2.14 ; voir aussi 1S 12.5 ; Jr 29.23 ; Rm 1.9+.
  - type: text
    content: 'Les anciens de Galaad dirent à Jephté : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous entendra les uns et les autres, si nous n''agissons pas selon ta parole. '
  '11':
  - type: note
    content: 'dit toutes ses paroles  : il s''agit sans doute d''un engagement solennel pris au sanctuaire local (cf. 10.17n  ; Gn 31.49). –  au Mitspa  : cf. Jos 11.3n.'
  - type: text
    content: 'Ainsi Jephté partit avec les anciens de Galaad. Le peuple le mit à sa tête comme chef et capitaine. Jephté dit toutes ses paroles devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', au Mitspa.'
  - type: heading
    content: Messages de Jephté aux Ammonites
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Que t''ai-je fait  : litt. quoi à moi et à toi  ; autre traduction qu''ai-je à faire avec toi  ; dans d''autres contextes la même expression est traduite par pourquoi te mêles-tu de mes affaires , cf. 2S 16.10 ; 19.23 ; 1R 17.18+ ; 2Ch 35.21 ; Mc 1.24 ; Jn 2.4n. –  à mon pays  : autre traduction dans mon pays.'
  - type: text
    content: 'Jephté envoya des messagers au roi des Ammonites, pour lui dire : Que t''ai-je fait, que tu viennes à moi pour faire la guerre à mon pays ? '
  '13':
  - type: note
    content: 'monté d''Egypte Gn 12.10n. –  rends-le  : litt. rends-les (les territoires susmentionnés, cf. v. 22n  ; Dt 2.17-23) ; plusieurs versions anciennes portent le singulier. –  pacifiquement  : litt. en paix  ; cf. v. 31n.'
  - type: text
    content: 'Le roi des Ammonites répondit aux messagers de Jephté : C''est qu''Israël, quand il est monté d''Egypte, a pris mon pays, depuis l''Arnon jusqu''au Yabboq et au Jourdain. Maintenant, rends-le pacifiquement.'
  '14':
  - type: text
    content: 'Jephté envoya de nouveau des messagers au roi des Ammonites, '
  '15':
  - type: note
    content: 'Moab (v. 18,25) / Ammonites (v. 4ss) : cf. v. 22n,24n  ; Dt 2.9,19 ; 3.16s ; Jos 12.2s.'
  - type: text
    content: 'pour lui dire : Ainsi parle Jephté : Israël n''a pas pris le pays de Moab, ni le pays des Ammonites. '
  '16':
  - type: note
    content: Nb 14.25. –  Qadesh Nb 20.1 ; 33.36.
  - type: text
    content: 'En effet, lorsque Israël est monté d''Egypte, il a marché dans le désert jusqu''à la mer des Joncs et il est arrivé à Qadesh. '
  '17':
  - type: note
    content: Nb 20.14-21.
  - type: text
    content: 'Alors Israël a envoyé des messagers au roi d''Edom, pour lui dire : « Laisse-moi passer par ton pays, je te prie. » Mais le roi d''Edom n''a rien voulu entendre. Il en a aussi envoyé au roi de Moab, qui a refusé. Ainsi Israël est resté à Qadesh. '
  '18':
  - type: note
    content: Edom Nb 21.4 ; Dt 2.8. –  Moab Nb 21.11-15. –  territoire et frontière traduisent un même mot hébreu.
  - type: text
    content: 'Puis il a marché dans le désert, il a contourné Edom et Moab, il est passé à l''est de Moab ; ils ont campé au-delà de l''Arnon, sans entrer sur le territoire de Moab – car l''Arnon est la frontière de Moab. '
  '19':
  - type: note
    content: 'Heshbôn  : cf. Nb 21.21-24 ; Dt 2.26-36 ; Jos 13.17. –  pour rejoindre notre lieu  : litt. jusqu''à mon lieu  ; le singulier et le pluriel alternent dans le texte (cf. v. 17).'
  - type: text
    content: 'Israël a envoyé des messagers à Sihôn, roi des Amorites, roi de Heshbôn ; Israël lui a dit : « Laisse-nous, je te prie, passer par ton pays pour rejoindre notre lieu. » '
  '2':
  - type: note
    content: Cf. v. 7-11 ; Gn 21.10.
  - type: text
    content: 'La femme de Galaad lui donna des fils. Les fils de cette femme, devenus grands, chassèrent Jephté et lui dirent : Tu n''auras pas de patrimoine dans la maison de notre père, car tu es le fils d''une autre femme. '
  '20':
  - type: note
    content: 'n''a pas eu assez confiance  : litt. n''a pas cru. –  toutes ses troupes  : autre traduction tout son peuple, de même au v. 21. –  Yahtsa Jos 13.18 ; Jr 48.21 ; 1Ch 6.63 ; cf. Yahats Nb 21.23 ; Dt 2.32 ; Es 15.4 ; Jr 48.34.'
  - type: text
    content: 'Mais Sihôn n''a pas eu assez confiance en Israël pour le laisser passer sur son territoire ; Sihôn a rassemblé toutes ses troupes et il a dressé son camp à Yahtsa pour faire la guerre à Israël. '
  '21':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, a livré Sihôn et toutes ses troupes à Israël, qui les a battus. Israël a pris possession de tout le pays des Amorites qui habitaient ce pays. '
  '22':
  - type: note
    content: Le territoire en question correspond à celui de Moab, cf. v. 13,24n  ; Nb 21.24,26 ; Dt 2.37.
  - type: text
    content: 'Ils ont pris possession de tout le territoire des Amorites, depuis l''Arnon jusqu''au Yabboq et depuis le désert jusqu''au Jourdain. '
  '23':
  - type: note
    content: 'Dt 4.38. –  Seigneur (YHWH)  : voir noms divins. –  dépossédé  : autre sens du verbe traduit aux v. 21s,24 par prendre ou rester en possession de.'
  - type: text
    content: 'Maintenant que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu d''Israël, a dépossédé les Amorites devant Israël, son peuple, est-ce toi qui vas le déposséder ? '
  '24':
  - type: note
    content: 'Kemosh est le dieu de Moab et non celui d''Ammon, ce qui correspond au territoire sur lequel porte le litige (v. 22) ; cf. Nb 21.29 ; 1R 11.5-7 ; 2R 23.13 ; voir aussi Dt 4.19+. –  nous ne resterions pas…  : autre traduction nous resterons… (v. 23n).'
  - type: text
    content: 'Ce dont Kemosh, ton dieu, te fait prendre possession, n''en prends-tu pas possession ? Et nous, nous ne resterions pas en possession de tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu, a mis en notre possession ? '
  '25':
  - type: note
    content: Balaq Nb 22–24 ; Jos 24.9s.
  - type: text
    content: 'Vaux-tu donc mieux que Balaq, fils de Tsippor, roi de Moab ? A-t-il cherché querelle à Israël, lui a-t-il fait la guerre ? '
  '26':
  - type: note
    content: à Heshbôn et dans les localités qui en dépendent (litt. ses filles, cf. 1.27n), v. 19 ; Nb 21.25n. –  Aroër Jos 13.25s.
  - type: text
    content: 'Voilà trois cents ans qu''Israël habite à Heshbôn et dans les localités qui en dépendent, à Aroër et dans les localités qui en dépendent, et dans toutes les villes qui sont sur les bords de l''Arnon : pourquoi ne les avez-vous pas délivrées pendant ce temps-là ? '
  '27':
  - type: note
    content: Voir péché.
  - type: text
    content: 'Ce n''est pas moi qui ai péché contre toi, c''est toi qui agis mal envers moi en me faisant la guerre. Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le juge, soit aujourd''hui juge entre les Israélites et les Ammonites ! '
  '28':
  - type: note
    content: 'lui avait fait dire  : litt. lui avait envoyées (v. 14).'
  - type: text
    content: Mais le roi des Ammonites n'écouta pas les paroles que Jephté lui avait fait dire.
  - type: heading
    content: Le vœu de Jephté
  '29':
  - type: text
    content: ' '
  - type: note
    content: le souffle… 3.10+ ; voir esprit. –  traversa et passa traduisent le même verbe hébreu ; cf. 12.1n. –  Mitspé de Galaad v. 11n  ; 10.17n.
  - type: text
    content: 'Alors le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur Jephté ; celui-ci traversa le Galaad et Manassé ; il passa à Mitspé de Galaad ; de Mitspé de Galaad, il passa chez les Ammonites. '
  '3':
  - type: note
    content: 's''enfuit pour échapper à ses frères  : autre traduction s''enfuit de chez ses frères. –  Tob  : sans doute au nord du Galaad, vers la Syrie ; cf. 2S 10.6,8. –  hommes de rien 9.4n  ; cf. 1S 22.2 ; 27.8. –  faisaient campagne  : litt. sortirent.'
  - type: text
    content: Jephté s'enfuit pour échapper à ses frères et s'installa au pays de Tob. Des hommes de rien se rassemblèrent auprès de Jephté ; ils faisaient campagne avec lui.
  '30':
  - type: note
    content: Cf. v. 35s ; 1S 14.24-45.
  - type: text
    content: 'Jephté fit un vœu au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il dit : Si vraiment tu me livres les Ammonites, '
  '31':
  - type: note
    content: 'Cf. v. 34ss. –  victorieux ou sain et sauf, litt. en paix  ; Jos 10.21+. –  en holocauste  : voir sacrifices  ; cf. Gn 22.1-19 ; 2R 3.26s ; Mi 6.7 ; voir aussi Lv 18.21 ; 20.2-5 ; Dt 12.31 ; 18.10.'
  - type: text
    content: 'quiconque sortira des portes de ma maison à ma rencontre, lorsque je reviendrai victorieux de chez les Ammonites, sera pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et je l''offrirai en holocauste.'
  '32':
  - type: text
    content: 'Jephté passa chez les Ammonites pour les combattre, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les lui livra. '
  '33':
  - type: note
    content: 'Il leur infligea une très grande défaite  : cf. 15.8n. –  jusque vers  : comme en 6.4n. –  Minnith  : sans doute au nord de Heshbôn (cf. Ez 27.17n). –  Abel-Keramim  : plus à l''est, au sud de Rabba d''Ammon (l''actuelle Amman, capitale de la Jordanie).'
  - type: text
    content: Il leur infligea une très grande défaite, depuis Aroër jusque vers Minnith – vingt villes – et jusqu'à Abel-Keramim. Les Ammonites furent humiliés devant les Israélites.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Mitspa 10.17n. –  sortit à sa rencontre v. 31. –  tambourins / danses  : cf. Ex 15.20 ; 1S 18.6 ; Ps 150.4. –  C''était son unique enfant  : litt. rien qu''elle, unique . –  à part cela  : LXX, Syr, Tg à part elle  ; le texte hébreu traditionnel porte le masculin (litt. à part lui ).'
  - type: text
    content: 'Comme Jephté revenait chez lui, au Mitspa, sa fille sortit à sa rencontre avec des tambourins et des danses. C''était son unique enfant ; à part cela, il n''avait ni fils ni fille. '
  '35':
  - type: note
    content: 'Les verbes correspondant à déchira (cf. Jos 7.6) / accables / attires le malheur font assonance dans le texte hébreu. –  Ah ! 6.22n. –  Toi aussi…  : litt. tu es de ceux qui attirent le malheur…  ; cf. Gn 34.30+. –  Je me suis engagé  : litt. j''ai ouvert (toute grande) la bouche  ; certains comprennent j''ai trop parlé ou j''ai parlé trop vite  ; de même au v. 36 ; voir aussi Jb 35.16. –  je ne peux pas revenir…  : cf. Nb 30.3 ; Ec 5.3-5 ; voir aussi Lv 27.'
  - type: text
    content: 'Dès qu''il la vit, il déchira ses vêtements et dit : Ah ! ma fille, tu m''accables ! Toi aussi, tu attires le malheur sur moi ! Je me suis engagé devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et je ne peux pas revenir en arrière. '
  '36':
  - type: note
    content: 'agis envers moi…  : litt. fais pour moi comme il est sorti de ta bouche (v. 35n) après que le Seigneur a fait pour toi les vengeances de tes ennemis  ; cf. Nb 32.24n.'
  - type: text
    content: 'Elle lui dit : Père, tu t''es engagé devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; agis envers moi selon l''engagement que tu as pris, maintenant que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a vengé de tes ennemis, les Ammonites. '
  '37':
  - type: note
    content: 'j''irai  : litt. je descendrai  ; en Es 15.3 le même verbe est traduit par fondre (en larmes)  ; certains modifient le texte hébreu traditionnel pour traduire que j''aille errer. –  je pleurerai ma virginité  : pour une femme, mourir sans s''être mariée et avoir eu des enfants pouvait être considéré comme un déshonneur.'
  - type: text
    content: 'Elle dit encore à son père : Que ceci me soit accordé : laisse-moi un délai de deux mois. Je m''en irai, j''irai sur les montagnes et je pleurerai ma virginité avec mes amies. '
  '38':
  - type: text
    content: 'Il répondit : Va ! Et il la laissa partir pour deux mois. Elle s''en alla sur les montagnes, avec ses amies, pour pleurer sa virginité. '
  '39':
  - type: note
    content: 'vœu v. 30s. –  eu de relations avec  : litt. connu, cf. Gn 4.1n  ; Lc 1.34. –  une prescription  : voir loi  ; autre traduction une coutume  ; cf. 2Ch 35.25.'
  - type: text
    content: 'Au bout des deux mois, elle revint vers son père, et il s''acquitta sur elle du vœu qu''il avait fait. Elle n''avait jamais eu de relations avec un homme. Dès lors ce fut une prescription en Israël : '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Quelque temps plus tard  : litt. (au bout) de jours  ; de même en 14.8. –  Ammonites 10.7-9.'
  - type: text
    content: 'Quelque temps plus tard, les Ammonites firent la guerre à Israël. '
  '40':
  - type: note
    content: 'chaque année  : litt. de jours en jours  ; même expression en 21.19 ; Ex 13.10 ; 1S 1.3n. –  célébrer  : comme en 5.11 ; plusieurs versions anciennes ont lu se lamenter sur. Cette coutume, dont il n''est question nulle part ailleurs dans la Bible, a été mise en relation avec les rites de deuil associés à divers cultes de la fertilité pratiqués en Canaan et dans les pays environnants, rites dans lesquels les femmes jouaient un rôle prépondérant (cf. Ez 8.14n  ; Os 6.2n  ; Za 12.11n).'
  - type: text
    content: chaque année les filles d'Israël s'en vont célébrer la fille de Jephté, le Galaadite, quatre jours par an.
  '5':
  - type: note
    content: V. 3n.
  - type: text
    content: 'Comme les Ammonites faisaient la guerre à Israël, les anciens de Galaad allèrent chercher Jephté au pays de Tob. '
  '6':
  - type: note
    content: 10.17s. –  capitaine v. 11 ; Jos 10.24 ; Es 22.3 ; Mi 3.1n  ; Dn 11.18n.
  - type: text
    content: 'Ils dirent à Jephté : Viens, tu seras notre capitaine, et nous ferons la guerre aux Ammonites. '
  '7':
  - type: note
    content: V. 2 ; cf. Gn 26.27. –  détresse 10.9.
  - type: text
    content: 'Jephté répondit aux anciens de Galaad : N''est-ce pas vous qui me détestiez et qui m''avez chassé de la maison de mon père ? Pourquoi venez-vous à moi maintenant que vous êtes dans la détresse ?'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 10.18n.
  - type: text
    content: 'Les anciens de Galaad dirent à Jephté : C''est bien pour cela que nous revenons vers toi maintenant, afin que tu marches avec nous, que tu fasses la guerre aux Ammonites et que tu sois notre chef, celui de tous les habitants de Galaad. '
  '9':
  - type: note
    content: Cf. 1S 8.20.
  - type: text
    content: 'Jephté répondit aux anciens de Galaad : Si vous me ramenez pour faire la guerre aux Ammonites, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les livre devant moi, c''est moi qui serai votre chef. '
