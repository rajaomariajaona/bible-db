    - type: text
      text: Maintenant une multitude de nations s'est rassemblée contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tous ceux qui disent : « Qu''elle soit profanée !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que Sion nous soit offerte en spectacle ! »
