document_id: MIC.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem, capitale de la paix
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 2.2ss ; voir aussi Jn 4.21ss. –  Dans la suite des temps (litt. des jours ) : même formule en Gn 49.1 ; Nb 24.14 ; Dt 4.30 ; 31.29 ; Jr 23.20 ; 30.24 ; 48.47 ; 49.39 ; Ez 38.16 ; Os 3.5 ; Dn 10.14. –  sera établie Ps 46.6 ; 48.9. –  au sommet…  : cf. Ps 48.3 ; 121.1 ; Mt 5.14. –  afflueront  : cf. Jr 51.44.'
  - type: text
    content: Dans la suite des temps,
  - type: text
    content: 'la montagne de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: sera établie au sommet des montagnes ;
  - type: text
    content: elle s'élèvera au-dessus des collines,
  - type: text
    content: et les peuples y afflueront.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Sion la belle  : litt. fille de Sion  ; cf. v. 8n. –  ville / champs  : cf. 5.10 ; Os 2.16s ; 3.4s ; 11.1 ; 12.10 ; 13.4s ; Am 2.9s ; 3.1s. –  jusqu''à Babylone  : cf. 2R 20.12ss. –  le Seigneur te reprendra (ou assurera ta rédemption ) Ex 6.6+ ; Jr 31.11 ; Lc 1.74.'
  - type: text
    content: Souffre et gémis, Sion la belle,
  - type: text
    content: comme une femme qui accouche !
  - type: text
    content: Car maintenant tu sortiras de la ville
  - type: text
    content: et tu feras ta demeure dans les champs,
  - type: text
    content: tu iras jusqu'à Babylone ;
  - type: text
    content: et là tu seras délivrée,
  - type: text
    content: 'c''est là que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te reprendra à tes ennemis.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 18.31ss ; Es 17.12ss ; 29.1ss ; 31.4ss ; Ez 38–39 ; Jl 4.9ss ; Za 12.3 ; 14.2 ; Ps 46.5ss ; Ap 19.11ss ; 20.7ss. –  Qu''elle soit profanée ! cf. Es 24.5 ; Jr 3.1 ; 23.11 : voir saint. –  Que Sion nous soit…  : litt. que nos yeux voient (dans) Sion ! Il faut sans doute comprendre que les ennemis prendront plaisir à voir la ruine de Jérusalem : construction analogue d''un verbe synonyme 7.9-10n  ; Ab 12ns.'
  - type: text
    content: Maintenant une multitude de nations s'est rassemblée contre toi,
  - type: text
    content: 'tous ceux qui disent : « Qu''elle soit profanée !'
  - type: text
    content: Que Sion nous soit offerte en spectacle ! »
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'ne connaissent pas Es 5.12 ; 55.8s ; Ps 28.5. –  les pensées ou les plans  ; cf. Es 55.7nss. –  ses projets Jr 50.45. –  il les a rassemblés  : cf. Jr 25.9 ; 27.6 ; voir aussi Dt 32.27 ; Es 10.5ss ; Ha 1.5ss. –  comme des gerbes Jr 51.33.'
  - type: text
    content: 'Ceux-là ne connaissent pas les pensées du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'ils ne comprennent pas ses projets :'
  - type: text
    content: il les a rassemblés comme des gerbes sur l'aire.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Lève-toi et piétine  : sur l''image du battage employée dans ce v., cf. Dt 25.4 ; Es 41.14ss ; Ml 3.21. –  Sion la belle  : litt. fille de Sion , v. 8n. –  corne de fer  : cf. Dt 33.17 ; 1S 2.10 ; Ps 132.17 ; voir aussi 1R 22.11. –  tu frapperas… d''anathème , avec une légère modification du texte hébreu traditionnel qui porte je frapperai d''anathème  ; sur cette expression, voir Lv 27.21n  ; Nb 21.2s ; Dt 2.34n  ; Za 14.11n. –  leurs profits , c.-à-d. le butin que tu en tireras ; cf. Es 60.3ss ; Ps 72.10s ; Ap 21.24. –  le Seigneur / le Seigneur  : hébreu YHWH / ’Adonaï , cf. Ex 3.15n. –  Seigneur de toute la terre 1.2.'
  - type: text
    content: Lève-toi et piétine, Sion la belle !
  - type: text
    content: Je te ferai une corne de fer
  - type: text
    content: et je te ferai des sabots de bronze,
  - type: text
    content: tu broieras une multitude de peuples,
  - type: text
    content: 'tu frapperas leurs profits d''anathème pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: leurs richesses pour le Seigneur de toute la terre.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. semble faire suite à 1.16 ; Vg en fait le début du chapitre 5, d''où le décalage de la numérotation des v. dans certaines éditions. –  fais-toi des incisions , comme invocation magique (1R 18.28) ou en signe de deuil ; cf. Dt 14.1 ; Jr 16.6 ; 41.5 ; 47.5 ; Os 7.14n  ; le verbe hébreu correspondant rappelle le mot traduit par troupes  ; d''autres traduisent fille de troupes, rassemble tes troupes ! Il y a également assonance entre les mots traduits par bâton (ou sceptre  ; cf. 7.14n  ; 2S 7.14 ; Es 9.3n  ; Ps 2.9n) et juge (cf. Am 2.3). –  On nous assiège  : autre traduction on nous inflige la détresse . –  sur la joue 1R 22.24 ; Ps 3.8 ; Jb 16.10 ; Mt 26.67/ / ; cf. 2R 18.17ss.'
  - type: text
    content: Maintenant, fille de troupes,
  - type: text
    content: fais-toi des incisions !
  - type: text
    content: On nous assiège ;
  - type: text
    content: avec le bâton on frappe sur la joue
  - type: text
    content: le juge d'Israël.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Une multitude de nations… Es 56.6ss ; 60.11ss ; 66.18ss ; Jr 3.17 ; Ag 2.7 ; Za 8.20ss ; 14.16. –  Venez, montons Jr 31.6. –  Dieu de Jacob 2S 23.1 ; Ps 20.2+. –  Il nous enseignera… 2Ch 6.27. –  ses voies / ses sentiers  : cf. 6.8 ; Es 55.8ss ; Jr 7.23 ; Ps 25.4. –  de Sion sortira…  : cf. Es 51.4. –  loi / parole  : cf. 3.11n  ; Jr 18.18.'
  - type: text
    content: 'Une multitude de nations s''y rendra ; ils diront :'
  - type: text
    content: 'Venez, montons à la montagne du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: à la maison du Dieu de Jacob !
  - type: text
    content: Il nous enseignera ses voies,
  - type: text
    content: et nous suivrons ses sentiers.
  - type: text
    content: Car de Sion sortira la loi,
  - type: text
    content: 'de Jérusalem la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'juge  : cf. 3.11+. –  De leurs épées…  : cf. Jl 4.10 ; voir aussi Es 11.6ss ; Ez 39.9 ; Os 2.20.'
  - type: text
    content: Il sera juge entre une multitude de peuples,
  - type: text
    content: il sera l'arbitre de nations fortes, même lointaines.
  - type: text
    content: De leurs épées ils forgeront des socs de charrue,
  - type: text
    content: 'de leurs lances des serpes :'
  - type: text
    content: une nation ne lèvera plus l'épée contre une autre,
  - type: text
    content: et on n'apprendra plus la guerre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'habitera  : autre traduction sera assis . –  sous sa vigne…  : image de paix et de prospérité ; cf. 1R 5.5 ; 2R 18.31 ; Za 3.10. –  personne pour les troubler Lv 26.6 ; Es 11.9 ; Jr 30.10 ; 46.27 ; Ez 39.26. –  c''est la bouche… Es 1.20. –  Seigneur (YHWH) des Armées Ml 1.6 ; cf. 1S 1.3n  ; Es 1.9n.'
  - type: text
    content: Chacun d'eux habitera sous sa vigne et sous son figuier,
  - type: text
    content: et il n'y aura personne pour les troubler
  - type: text
    content: '– c''est la bouche du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées qui parle.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 2.5 ; Za 10.12. –  au nom de son dieu ou de ses dieux.
  - type: text
    content: Tandis que tous les peuples marchent
  - type: text
    content: chacun au nom de son dieu,
  - type: text
    content: nous marchons, nous,
  - type: text
    content: 'au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: pour toujours, à jamais.
  - type: heading
    content: Le Seigneur régnera à Jérusalem
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.12s ; Ez 34.11ss ; voir aussi Es 54.7 ; Jr 23.3 ; Ez 37.21. –  ce qui boite ou celle (la brebis) qui boite , de même dans la suite ; cf. Gn 32.32 ; So 3.19. –  ce qui était banni ou chassé  ; cf. Dt 22.1 ; 34.4 ; voir aussi Dt 30.3ss ; Es 11.12 ; 56.8 ; Ps 147.2.
  - type: text
    content: En ce jour-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: je recueillerai ce qui boite,
  - type: text
    content: je rassemblerai ce qui était banni,
  - type: text
    content: ce que j'avais maltraité.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.12+ ; 5.1 ; voir aussi Es 60.22 ; Mt 13.31ss/ / ; 1Co 1.26ss. –  Le Seigneur sera roi sur eux  : cf. 5.1 ; Es 24.23 ; 52.7 ; Ps 99.2 ; Dn 7.27 ; Lc 1.33 ; Ap 1.6 ; 11.15.'
  - type: text
    content: De ce qui boite, je ferai un reste ;
  - type: text
    content: de ce qui était mis à l'écart, une nation forte.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera roi sur eux, au mont Sion,'
  - type: text
    content: dès maintenant et pour toujours.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.1 ; 2S 7.16 ; Ps 78.70ss. –  Tour du troupeau  : hébreu migdal-‘éder , comme en Gn 35.21n  ; ce terme (peut-être ici le nom d''un quartier ou d''un édifice de Jérusalem), désigne la ville comme lieu de refuge (cf. Es 5.2). –  Ophel  : ce nom désigne une élévation, une colline probablement fortifiée (cf. 2R 5.24n), qui était à Jérusalem le lieu du palais royal, au sud du temple ; cf. Es 32.14n  ; Né 3.26s ; 11.21 ; 2Ch 27.3 ; 33.14. –  Sion la belle  : litt. fille de Sion , de même aux v. 10,13 ; 1.13n  ; pareillement ici Jérusalem la belle pour fille de Jérusalem , c.-à-d. Jérusalem personnifiée comme une jeune fille ; voir Es 1.8n  ; Jr 4.11n,31n. –  à toi…  : litt. jusqu''à toi arrivera et viendra la domination première.'
  - type: text
    content: Et toi, Tour du troupeau,
  - type: text
    content: Ophel de Sion la belle,
  - type: text
    content: à toi reviendra
  - type: text
    content: la domination première,
  - type: text
    content: un royaume pour Jérusalem la belle.
  - type: heading
    content: Epreuves et délivrance de Jérusalem
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 8.19 ; voir aussi 2R 16 ; Es 7–8 ; 2Ch 28. –  pousses-tu des cris  : le terme hébreu que traduit cette expression est généralement rendu par lancer des acclamations . –  conseiller  : un terme apparenté est traduit par projet au v. 12 ; cf. 2S 15.12 ; Es 1.26 ; 3.2s ; 5.19n  ; 9.5. –  comme une femme… v. 10 ; Es 21.3 ; 26.17s ; 54.1ss ; 66.7ss ; Jr 4.31 ; 6.24 ; 22.23 ; 30.6 ; 50.43 ; Os 13.13 ; Ps 48.7 ; Mt 24.8/ / ; Jn 16.19ss ; Ap 12.2.'
  - type: text
    content: Maintenant, pourquoi pousses-tu des cris ?
  - type: text
    content: N'y a-t-il pas de roi chez toi ?
  - type: text
    content: Ton conseiller est-il perdu,
  - type: text
    content: pour que la douleur te saisisse
  - type: text
    content: comme une femme qui accouche ?
