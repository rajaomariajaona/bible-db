    children:
    - type: text
      text: comme une femme qui accouche !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car maintenant tu sortiras de la ville
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu feras ta demeure dans les champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu iras jusqu'à Babylone ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et là tu seras délivrée,
  - type: usfm
    marker: q1
