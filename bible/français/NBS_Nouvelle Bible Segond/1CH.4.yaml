      marker-yv: yv-n
    - type: text
      text: 'Réaya, fils de Shobal, engendra Yahath ; Yahath engendra Ahoumaï et Lahad. Ce sont les clans des Tsoréatites. '
  '20':
  - type: usfm
    marker: p
