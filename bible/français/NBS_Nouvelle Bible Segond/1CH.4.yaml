        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'byssos '
      - type: usfm
        marker: ft
        children:
        - type: text
