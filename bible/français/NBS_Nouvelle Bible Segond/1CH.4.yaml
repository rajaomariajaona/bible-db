document_id: 1CH.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Autre liste des descendants de Juda
  - type: text
    content: ' '
  - type: note
    content: 'Fils de Juda  : cf. 2.3-55.'
  - type: text
    content: 'Fils de Juda : Pérets, Hetsrôn, Karmi, Hour et Shobal. '
  '10':
  - type: note
    content: 'bénis  : cf. Gn 32.27 ; Pr 10.22. –  ta main est avec moi  : cf. Es 41.10 ; 59.1 ; Ps 119.173. –  tu me préserves du malheur  : cf. Ps 41.3 ; 97.10 ; 121.7 ; 2Tm 4.18. –  de toute peine…  : la phrase semble rester en suspens ; autre traduction si tu me bénis, alors tu agrandiras mon territoire, ta main sera avec moi, tu me préserveras du malheur et de toute peine. –  Dieu accorda  : cf. Ps 66.18-20 ; 116.1-9 ; 145.19 ; Jb 22.27.'
  - type: text
    content: 'Yabets invoqua le Dieu d''Israël, en disant : Si tu me bénis en agrandissant mon territoire, si ta main est avec moi, si tu me préserves du malheur et de toute peine… Et Dieu accorda ce qu''il avait demandé.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Keloub  : certaines versions anciennes portent Caleb.'
  - type: text
    content: 'Keloub, frère de Shouha, engendra Mehir, qui fut père d''Eshtôn. '
  '12':
  - type: note
    content: 'père de la ville de Nahash  : LXX précise frère d''Eshlôn, le Qenizzite. –  Réka  : des versions anciennes ont lu Rékab (cf. 2.55).'
  - type: text
    content: Eshtôn engendra la maison de Rapha, Paséah, et Tehinna, père de la ville de Nahash. Ce sont là les hommes de Réka.
  - type: heading
    content: Jg 1.13
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Fils (au pluriel) d''Otniel  : cf. Jg 1.13 ; 3.9-11. –  Hatath  : des mss de LXX et Vg ajoutent et Méonotaï.'
  - type: text
    content: 'Fils de Qenaz : Otniel et Seraya. Fils d''Otniel : Hatath ; '
  '14':
  - type: note
    content: 'vallée des artisans  : sur ce nom de lieu, cf. Né 11.35.'
  - type: text
    content: Méonotaï engendra Ophra. Seraya engendra Joab, père de la vallée des artisans ; car ils étaient artisans.
  - type: heading
    content: Nb 13.6
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Caleb, fils de Yephounné  : cf. Nb 13.6+.'
  - type: text
    content: 'Fils de Caleb, fils de Yephounné : Irou, Ela et Naam, et les fils d''Ela, et Qenaz. '
  '16':
  - type: note
    content: 'Ziph  : cf. 2.42 ; voir aussi 1S 23.14nss.'
  - type: text
    content: 'Fils de Yehalléléel : Ziph, Zipha, Tiria et Asaréel. '
  '17':
  - type: note
    content: 'Fils  : plusieurs mss hébreux, LXX et Vg ont le pluriel, contrairement au texte hébreu traditionnel qui porte le singulier. –  La femme de Méred  : sous-entendu probable (cf. v. 18), litt. elle conçut  ; LXX porte et Yalôn ; et Yéter conçut… –  Shammaï 2.28-33,44s. –  père (2.18n) d''Eshtemoa  : cf. v. 19 ; 6.42 ; Jos 15.50 ; 21.14 ; 1S 30.28.'
  - type: text
    content: 'Fils d''Esdras : Yéter, Méred, Epher et Yalôn. La femme de Méred conçut Miriam, Shammaï, et Yishbah, père d''Eshtemoa. '
  '18':
  - type: note
    content: 'la Judéenne  : autre traduction la Juive  ; cf. 2R 16.6n. –  pour femme  : sous-entendu dans le texte.'
  - type: text
    content: 'Sa femme, la Judéenne, mit au monde Yéred, père de Guedor, Héber, père de Soko, et Yeqoutiel, père de Zanoah. Ce sont là les fils de Bitia, fille du pharaon, que Méred avait prise pour femme. '
  '19':
  - type: note
    content: 'Naham  : LXX ajoute ici toute une phrase qui pourrait bien avoir disparu par erreur du texte hébreu  : Dalia, père de Qéila, et Shimôn, père de Yomân ; fils de Naham, le père de Qéila… –  Qéila  : cf. Jos 15.44 ; 1S 23.1ss ; Né 3.17s.'
  - type: text
    content: 'Fils de la femme de Hodiya, sœur de Naham : le père de Qéila, le Garmite, et Eshtemoa, le Maakatite. '
  '2':
  - type: note
    content: 'Shobal / Tsoréatites  : cf. 2.50-53.'
  - type: text
    content: 'Réaya, fils de Shobal, engendra Yahath ; Yahath engendra Ahoumaï et Lahad. Ce sont les clans des Tsoréatites. '
  '20':
  - type: note
    content: 'Tilôn  : selon une lecture traditionnelle et plusieurs versions anciennes ; le texte hébreu traditionnel porte Tolôn. –  Ben-Zoheth  : LXX a lu les fils de Zoheth.'
  - type: text
    content: 'Fils de Shimôn : Amnon, Rinna, Ben-Hanân et Tilôn. Fils de Yishéi : Zoheth et Ben-Zoheth.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Le byssos est un tissu précieux, probablement de lin blanc et très fin ; le terme hébreu bouts a donné le grec bussos employé dans le même sens ; notre mot byssus qui en dérive désigne la sécrétion de certains mollusques ; cf. 15.27 ; Ez 27.16 ; Est 1.6 ; 8.15 ; 2Ch 2.13 ; 3.14 ; 5.12 ; voir aussi Lc 16.19n.
  - type: text
    content: 'Fils de Shéla, fils de Juda : Er, père de Léka, Lada, père de Marésha, et les clans de la maison où l''on travaille le byssos, de la maison d''Ashbéa, '
  '22':
  - type: note
    content: 'Yashoubi-Léhem  : texte hébreu peu clair et traduction incertaine ; Tg et Vg ont lu ils revinrent à Beth-Léhem.'
  - type: text
    content: 'et Yoqim, et les hommes de Kozéba, Joas et Saraph, qui dominèrent sur Moab, et Yashoubi-Léhem. Tout cela est ancien. '
  '23':
  - type: note
    content: 'C''étaient les potiers…  : versions anciennes et Tg c''étaient les potiers qui habitaient… –  des plantations et des enclos ou, comme LXX, de Netaïm et de Guedéra, noms de localités (cf. Jos 15.36).'
  - type: text
    content: C'étaient les potiers et les habitants des plantations et des enclos ; ils habitaient là près du roi et travaillaient pour lui.
  - type: heading
    content: Les descendants de Siméon
  - type: heading
    content: Cf. Gn 46.10  ; Nb 26.12-13
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 6.15. –  Fils de Siméon  : Syr place cette indication au début du v. 5. –  Nemouel  : cf. Gn 46.10 ; Ex 6.15 ( Yemouel ). –  Yarib  : cf. Nb 26.12 ( Yakîn ). –  Zérah  : cf. Gn 46.10 ; Ex 6.15 ( Tsohar ).'
  - type: text
    content: 'Fils de Siméon : Nemouel, Yamîn, Yarib, Zérah, Saül ; '
  '25':
  - type: note
    content: 'Shalloum, son fils  : omis par Syr.'
  - type: text
    content: 'Shalloum, son fils ; Mibsam, son fils, Mishma, son fils. '
  '26':
  - type: note
    content: 'Fils de Mishma  : omis par LXX.'
  - type: text
    content: 'Fils de Mishma : Hammouel, son fils ; Zakkour, son fils ; Shiméi, son fils. '
  '27':
  - type: note
    content: 'six filles  : LXX trois filles. –  Tous leurs clans  : selon LXX et deux mss hébreux ; texte hébreu traditionnel tout leur clan.'
  - type: text
    content: Shiméi eut seize fils et six filles. Ses frères n'eurent pas beaucoup de fils. Tous leurs clans ne se multiplièrent pas autant que les fils de Juda.
  - type: heading
    content: Jos 19.1-8
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'à Bersabée  : LXX ajoute à Shema.'
  - type: text
    content: 'Ils habitaient à Bersabée, à Molada, à Hatsar-Shoual, '
  '29':
  - type: note
    content: 'Bilha  : orthographes différentes en Jos 15.29 ; 19.3. –  Tolad  : Syr porte Eltolad, cf. Jos 15.30 ; 19.4.'
  - type: text
    content: 'à Bilha, à Etsem, à Tolad, '
  '3':
  - type: note
    content: 'Voici…  : litt. voici (pluriel) le père d''Etam  ; autre possibilité voici les fils de Hour, père d''Etam, d''après v. 4. –  père (LXX fils) d''Etam  : cf. 2.18n, de même dans les versets suivants.'
  - type: text
    content: 'Voici la descendance du père d''Etam : Jizréel, Yishma et Yidbash ; le nom de leur sœur était Hatselelponi. '
  '30':
  - type: note
    content: 'Betouel  : appelé Betoul en Jos 19.4. –  Tsiqlag  : Syr ajoute d''autres noms ; cf. Jos 15.27,31.'
  - type: text
    content: 'à Betouel, à Horma, à Tsiqlag, '
  '31':
  - type: note
    content: 'Hatsar-Sousim  : cf. Jos 19.5 Hatsar-Soussa. –  Beth-Biréi  : appelé Beth-Lebaoth en Jos 19.6 ; cf. Jos 15.32. –  Shaaraïm  : appelé Shilhim en Jos 15.32 ; cf. Jos 19.6. –  jusqu''au règne de David  : quelques mss hébreux et des versions anciennes portent jusqu''au roi David.'
  - type: text
    content: 'à Beth-Markaboth, à Hatsar-Sousim, à Beth-Biréi et à Shaaraïm. Telles furent leurs villes jusqu''au règne de David, '
  '32':
  - type: note
    content: 'Aïn, Rimmôn  : le texte hébreu traditionnel semble ici les compter comme deux villes ; LXX lit un seul nom, Eïn-Rimmôn, mais compte quand même cinq villes ; cf. Jos 15.32n  ; 19.7n.'
  - type: text
    content: 'avec les villages qui en dépendent, ainsi qu''Etam, Aïn, Rimmôn, Token et Ashân, cinq villes ; '
  '33':
  - type: note
    content: 'Baal est nommé Baalath dans un ms de LXX ; c''est probablement la même localité que Baalath-Béer de Jos 19.8. –  registre  : litt. enregistrement.'
  - type: text
    content: et tous les villages qui sont autour de ces villes, jusqu'à Baal. Voilà leurs lieux d'habitation et leur registre.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 34-37 sont absents de Syr. –  Meshobab ; Yamlek  : certains mss de LXX traduisent étant revenu, il (Yosha ?) a régné.'
  - type: text
    content: 'Meshobab ; Yamlek ; Yosha, fils d''Amatsia ; '
  '35':
  - type: text
    content: 'Joël, Jéhu, fils de Yoshibia, fils de Seraya, fils d''Asiel, '
  '36':
  - type: note
    content: 'Adiel, Yesimiel  : omis par un ms de LXX ; d''autres portent pour le deuxième nom Ismaël, comme deux mss hébreux.'
  - type: text
    content: 'Elioénaï, Yaaqoba ; Yeshohaya, Asaya, Adiel, Yesimiel, Benaya, '
  '37':
  - type: note
    content: 'Shemaya  : un ms de LXX porte Siméon.'
  - type: text
    content: 'Ziza, fils de Shiphéi, fils d''Allôn, fils de Yedaya, fils de Shimri, fils de Shemaya. '
  '38':
  - type: note
    content: s'accrurent ou, plus litt., éclatèrent, explosèrent. Cf. Gn 28.14n.
  - type: text
    content: 'Ceux qui viennent d''être nommés étaient princes dans leurs clans, et leurs familles s''accrurent considérablement. '
  '39':
  - type: note
    content: 'Guedor  : LXX porte Guedara.'
  - type: text
    content: 'Ils allèrent vers l''entrée de Guedor, jusqu''à l''est de la vallée, afin de chercher des pâturages pour leur petit bétail. '
  '4':
  - type: note
    content: 'Penouel…  : Syr Penouel, Housha. Ce sont là… –  Ephrata  : cf. 2.19+.'
  - type: text
    content: 'Penouel était père de Guedor et Ezer père de Housha. Ce sont là les fils de Hour, premier-né d''Ephrata, père de Beth-Léhem. '
  '40':
  - type: note
    content: 'vaste  : litt. large de deux mains. –  de Cham  : c''étaient des Cananéens (cf. Gn 9.22) ; LXX porte des fils de Cham.'
  - type: text
    content: 'Ils trouvèrent des pâturages gras et bons et un pays vaste, tranquille et paisible ; ceux qui l''habitaient auparavant descendaient de Cham. '
  '41':
  - type: note
    content: 'Ezéchias  : cf. 3.13n. –  abris  : autre lecture traditionnelle Maonites, ainsi LXX ; cf. 2Ch 20.1 ; 26.7-8n. –  anathème  : cf. Dt 2.34n.'
  - type: text
    content: 'Aux jours d''Ezéchias, roi de Juda, ces hommes, inscrits par leur nom, arrivèrent ; ils abattirent les tentes et les abris qui se trouvaient là ; ils les frappèrent d''anathème – jusqu''à ce jour. Ils s''installèrent à leur place, car il y avait là des pâturages pour leur petit bétail. '
  '42':
  - type: note
    content: 'Séir  : cf. Gn 36.8s. –  Pelatia  : nom apparenté au terme traduit par rescapés au v. 44. –  Néaria  : LXX porte Noadia, Syr a lu Mattitya.'
  - type: text
    content: 'Il y eut aussi des fils de Siméon, au nombre de cinq cents hommes, qui se rendirent dans la région montagneuse de Séir. Ils avaient à leur tête Pelatia, Néaria, Rephaya et Ouzziel, fils de Yishéi. '
  '43':
  - type: note
    content: 'Amalec  : cf. 1S 15.2n.'
  - type: text
    content: Ils battirent le reste des rescapés d'Amalec, et ils habitent là jusqu'à ce jour.
  '5':
  - type: note
    content: 'Héléa et Naara  : les noms correspondants sont omis par Syr.'
  - type: text
    content: 'Ashhour, père de Teqoa, eut deux femmes, Héléa et Naara. '
  '6':
  - type: text
    content: 'Naara lui donna Ahouzzam, Hépher, Témeni et Ahashtari : ce sont là les fils de Naara. '
  '7':
  - type: note
    content: Tsohar ou Yitsehar, selon deux lectures traditionnelles du texte hébreu.
  - type: text
    content: 'Fils de Héléa : Tséréth, Tsohar et Etnân. '
  '8':
  - type: text
    content: 'Qots engendra Anoub et Hatsobéba, et les clans d''Aharhel, fils de Haroum. '
  '9':
  - type: note
    content: 'peine  : le terme hébreu correspondant fait assonnace avec le nom de Yabets, cf. 2.55 ; voir aussi Gn 3.16 ; 35.16-18.'
  - type: text
    content: 'Yabets était plus considéré que ses frères ; sa mère l''appela du nom de Yabets en disant : C''est parce que je l''ai mis au monde dans la peine. '
