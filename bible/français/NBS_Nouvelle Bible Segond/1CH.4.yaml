        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Shéla, fils de Juda : Er, père de Léka, Lada, père de Marésha, et les clans de la maison où l''on travaille le byssos, de la maison d''Ashbéa, '
  '22':
  - type: usfm
    marker: p
