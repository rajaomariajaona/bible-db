        marker: fq
        children:
        - type: text
          text: vaste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: large de deux mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Cham
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c''étaient des Cananéens (cf. Gn 9.22) ; LXX porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des fils de Cham.
      marker-yv: yv-n
    - type: text
      text: 'Ils trouvèrent des pâturages gras et bons et un pays vaste, tranquille et paisible ; ceux qui l''habitaient auparavant descendaient de Cham. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.41 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ezéchias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: abris
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Maonites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ainsi LXX ; cf. 2Ch 20.1 ; 26.7-8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: anathème
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 2.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Aux jours d''Ezéchias, roi de Juda, ces hommes, inscrits par leur nom, arrivèrent ; ils abattirent les tentes et les abris qui se trouvaient là ; ils les frappèrent d''anathème – jusqu''à ce jour. Ils s''installèrent à leur place, car il y avait là des pâturages pour leur petit bétail. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.42 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Séir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 36.8s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pelatia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : nom apparenté au terme traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rescapés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 44. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Néaria
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Noadia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Syr a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mattitya.
      marker-yv: yv-n
    - type: text
      text: 'Il y eut aussi des fils de Siméon, au nombre de cinq cents hommes, qui se rendirent dans la région montagneuse de Séir. Ils avaient à leur tête Pelatia, Néaria, Rephaya et Ouzziel, fils de Yishéi. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.43 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amalec
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 15.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Ils battirent le reste des rescapés d'Amalec, et ils habitent là jusqu'à ce jour.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Héléa et Naara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les noms correspondants sont omis par Syr.'
      marker-yv: yv-n
    - type: text
      text: 'Ashhour, père de Teqoa, eut deux femmes, Héléa et Naara. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Naara lui donna Ahouzzam, Hépher, Témeni et Ahashtari : ce sont là les fils de Naara. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tsohar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yitsehar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon deux lectures traditionnelles du texte hébreu.'
      marker-yv: yv-n
    - type: text
      text: 'Fils de Héléa : Tséréth, Tsohar et Etnân. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Qots engendra Anoub et Hatsobéba, et les clans d''Aharhel, fils de Haroum. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: peine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant fait assonnace avec le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yabets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.55 ; voir aussi Gn 3.16 ; 35.16-18.'
      marker-yv: yv-n
    - type: text
      text: 'Yabets était plus considéré que ses frères ; sa mère l''appela du nom de Yabets en disant : C''est parce que je l''ai mis au monde dans la peine. '
