          text: pour femme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Sa femme, la Judéenne, mit au monde Yéred, père de Guedor, Héber, père de Soko, et Yeqoutiel, père de Zanoah. Ce sont là les fils de Bitia, fille du pharaon, que Méred avait prise pour femme. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
