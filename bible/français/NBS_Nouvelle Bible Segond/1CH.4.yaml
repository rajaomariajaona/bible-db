      - type: usfm
        marker: fq
        children:
        - type: text
          text: Naham
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX ajoute ici toute une phrase qui pourrait bien avoir disparu par erreur du texte hébreu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dalia, père de Qéila, et Shimôn, père de Yomân ; fils de Naham, le père de Qéila… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qéila
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 15.44 ; 1S 23.1ss ; Né 3.17s.'
      marker-yv: yv-n
    - type: text
      text: 'Fils de la femme de Hodiya, sœur de Naham : le père de Qéila, le Garmite, et Eshtemoa, le Maakatite. '
