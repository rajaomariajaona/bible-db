      - type: usfm
        marker: fq
        children:
        - type: text
          text: de toute peine…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la phrase semble rester en suspens ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si tu me bénis, alors tu agrandiras mon territoire, ta main sera avec moi, tu me préserveras du malheur et de toute peine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu accorda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 66.18-20 ; 116.1-9 ; 145.19 ; Jb 22.27.'
      marker-yv: yv-n
    - type: text
      text: 'Yabets invoqua le Dieu d''Israël, en disant : Si tu me bénis en agrandissant mon territoire, si ta main est avec moi, si tu me préserves du malheur et de toute peine… Et Dieu accorda ce qu''il avait demandé.'
