      marker-yv: yv-n
    - type: text
      text: 'Puis Abraham se releva de devant le corps de sa femme et dit aux Hittites : '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'immigré… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.13+ ; Hé 11.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour que je puisse…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et j'ensevelirai mon mort de devant ma face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 8.'
      marker-yv: yv-n
    - type: text
      text: 'Je suis un immigré et un résident temporaire chez vous ; donnez-moi une propriété funéraire chez vous, pour que je puisse ensevelir le corps de ma femme hors de ma vue. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les Hittites répondirent à Abraham : '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ecoute-nous, mon seigneur : tu es un prince de Dieu au milieu de nous ; ensevelis le corps de ta femme dans le plus beau de nos tombeaux ; aucun de nous ne te refusera son tombeau pour ensevelir le corps de ta femme. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le peuple du pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette expression semble désigner ici l''assemblée des hommes libres dans l''exercice de leurs droits civiques ; d''autres pensent que l''expression souligne ici qu''il s''agit d''une population étrangère à Israël ; de même aux v. 12s ; cf. Jr 1.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Esd 3.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Abraham se leva et se prosterna devant le peuple du pays – devant les Hittites. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si vous consentez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''il est avec votre être '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'votre âme, votre désir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'enseveli… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il leur parla ainsi : Si vous consentez à ce que le corps de ma femme soit enseveli hors de ma vue, écoutez-moi et intercédez en ma faveur auprès d''Ephrôn, fils de Tsohar. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la grotte de Makpéla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a traduit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la grotte double '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(sens possible du mot '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Makpéla '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en hébreu).
      marker-yv: yv-n
    - type: text
      text: Qu'il me donne la grotte de Makpéla qui lui appartient, à l'extrémité de son champ ; qu'il me la donne contre sa pleine valeur en argent, au milieu de vous, comme propriété funéraire.
