      marker-yv: yv-n
    - type: text
      text: 'Ainsi le champ d''Ephrôn à Makpéla, en face de Mamré – le champ, la grotte qui s''y trouve, et tous les arbres situés dans les limites du champ – '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
