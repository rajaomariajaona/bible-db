        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies.'
      marker-yv: yv-n
    - type: text
      text: 'Abraham entendit Ephrôn ; Abraham pesa pour Ephrôn la somme d''argent qu''il avait dite, en présence des Hittites : quatre cents sicles d''argent ayant cours chez le marchand.'
  '17':
  - type: usfm
