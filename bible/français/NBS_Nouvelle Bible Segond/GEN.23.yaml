          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Non, mon seigneur, écoute-moi ! Je te donne le champ et je te donne la grotte qui s''y trouve. Je te la donne, sous les yeux des gens de mon peuple : ensevelis le corps de ta femme. '
