      marker-yv: yv-n
    - type: text
      text: 'Il dit à Ephrôn, en présence du peuple du pays : Si tu le veux bien, écoute-moi plutôt. Je donne le prix du champ : accepte-le de ma part, et j''y ensevelirai le corps de ma femme. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais Ephrôn répondit à Abraham : '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mon seigneur, écoute-moi ! Une terre de quatre cents sicles d''argent, qu''est-ce que cela entre toi et moi ? Ensevelis le corps de ta femme ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
