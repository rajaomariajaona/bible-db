        marker: fr
        children:
        - type: text
          text: '23.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ac 7.5.
      marker-yv: yv-n
    - type: text
      text: 'devinrent la propriété d''Abraham sous les yeux des Hittites, de tous ceux qui entraient par la porte de sa ville. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Après cela, Abraham ensevelit Sara, sa femme, dans la grotte du champ de Makpéla, en face de Mamré, c''est-à-dire à Hébron, en Canaan. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qiriath-Arba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ville de Quatre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. 35.27 ; Jos 14.15 ; 15.13 ; 20.7 ; Jg 1.10 ; Né 11.25 ; voir aussi Nb 13.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se lamenter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chanter une complainte.
      marker-yv: yv-n
    - type: text
      text: 'Sara mourut à Qiriath-Arba, c''est-à-dire Hébron, en Canaan ; Abraham vint se lamenter sur Sara et la pleurer. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.7-10 ; 49.29-32 ; 50.13 ; cf. 1R 13.22.
      marker-yv: yv-n
    - type: text
      text: Le champ et la grotte qui s'y trouve passèrent donc des Hittites à Abraham, comme propriété funéraire.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
