document_id: GEN.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort de Sara. Abraham achète un tombeau
  - type: text
    content: ' '
  - type: note
    content: 'la durée  : litt. les années.'
  - type: text
    content: 'La vie de Sara fut de cent vingt-sept ans : telle fut la durée de la vie de Sara. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'était assis  : autre traduction habitait . –  en présence  : litt. aux oreilles  ; de même aux v. 13,16. –  la porte 34.20 ; voir Dt 16.18n.'
  - type: text
    content: 'Or Ephrôn était assis au milieu des Hittites. Ephrôn, le Hittite, répondit à Abraham, en présence des Hittites, de tous ceux qui entraient par la porte de sa ville : '
  '11':
  - type: note
    content: gens (litt. fils) de mon peuple 19.38n.
  - type: text
    content: 'Non, mon seigneur, écoute-moi ! Je te donne le champ et je te donne la grotte qui s''y trouve. Je te la donne, sous les yeux des gens de mon peuple : ensevelis le corps de ta femme. '
  '12':
  - type: text
    content: 'Abraham se prosterna devant le peuple du pays. '
  '13':
  - type: note
    content: 'Cf. 2S 24.20-24. –  en présence  : litt. aux oreilles. –  Si tu le veux…  : litt. seulement si (c''est) toi, écoute-moi plutôt. –  le prix  : litt. l''argent.'
  - type: text
    content: 'Il dit à Ephrôn, en présence du peuple du pays : Si tu le veux bien, écoute-moi plutôt. Je donne le prix du champ : accepte-le de ma part, et j''y ensevelirai le corps de ma femme. '
  '14':
  - type: text
    content: 'Mais Ephrôn répondit à Abraham : '
  '15':
  - type: text
    content: 'Mon seigneur, écoute-moi ! Une terre de quatre cents sicles d''argent, qu''est-ce que cela entre toi et moi ? Ensevelis le corps de ta femme ! '
  '16':
  - type: note
    content: 'Cf. Jr 32.8-12. –  en présence des Hittites  : litt. aux oreilles des fils de Heth. –  quatre cents sicles…  : environ 4 kg ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Abraham entendit Ephrôn ; Abraham pesa pour Ephrôn la somme d''argent qu''il avait dite, en présence des Hittites : quatre cents sicles d''argent ayant cours chez le marchand.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Mamré 13.18n.
  - type: text
    content: 'Ainsi le champ d''Ephrôn à Makpéla, en face de Mamré – le champ, la grotte qui s''y trouve, et tous les arbres situés dans les limites du champ – '
  '18':
  - type: note
    content: Ac 7.5.
  - type: text
    content: 'devinrent la propriété d''Abraham sous les yeux des Hittites, de tous ceux qui entraient par la porte de sa ville. '
  '19':
  - type: text
    content: 'Après cela, Abraham ensevelit Sara, sa femme, dans la grotte du champ de Makpéla, en face de Mamré, c''est-à-dire à Hébron, en Canaan. '
  '2':
  - type: note
    content: 'Qiriath-Arba (Ville de Quatre) : cf. 35.27 ; Jos 14.15 ; 15.13 ; 20.7 ; Jg 1.10 ; Né 11.25 ; voir aussi Nb 13.22. –  se lamenter ou chanter une complainte.'
  - type: text
    content: 'Sara mourut à Qiriath-Arba, c''est-à-dire Hébron, en Canaan ; Abraham vint se lamenter sur Sara et la pleurer. '
  '20':
  - type: note
    content: 25.7-10 ; 49.29-32 ; 50.13 ; cf. 1R 13.22.
  - type: text
    content: Le champ et la grotte qui s'y trouve passèrent donc des Hittites à Abraham, comme propriété funéraire.
  '3':
  - type: note
    content: 'le corps de sa femme  : litt. son mort, de même dans la suite. –  Hittites  : litt. fils de Heth (10.15n), de même dans la suite. Cf. 26.34 ; Nb 13.29 ; Jos 11.3.'
  - type: text
    content: 'Puis Abraham se releva de devant le corps de sa femme et dit aux Hittites : '
  '4':
  - type: note
    content: 'immigré… 15.13+ ; Hé 11.13. –  pour que je puisse…  : litt. et j''ensevelirai mon mort de devant ma face, de même au v. 8.'
  - type: text
    content: 'Je suis un immigré et un résident temporaire chez vous ; donnez-moi une propriété funéraire chez vous, pour que je puisse ensevelir le corps de ma femme hors de ma vue. '
  '5':
  - type: text
    content: 'Les Hittites répondirent à Abraham : '
  '6':
  - type: text
    content: 'Ecoute-nous, mon seigneur : tu es un prince de Dieu au milieu de nous ; ensevelis le corps de ta femme dans le plus beau de nos tombeaux ; aucun de nous ne te refusera son tombeau pour ensevelir le corps de ta femme. '
  '7':
  - type: note
    content: 'le peuple du pays  : cette expression semble désigner ici l''assemblée des hommes libres dans l''exercice de leurs droits civiques ; d''autres pensent que l''expression souligne ici qu''il s''agit d''une population étrangère à Israël ; de même aux v. 12s ; cf. Jr 1.18n  ; Esd 3.3n.'
  - type: text
    content: 'Abraham se leva et se prosterna devant le peuple du pays – devant les Hittites. '
  '8':
  - type: note
    content: 'Si vous consentez  : litt. s''il est avec votre être ou votre âme, votre désir (cf. 1.20n). –  enseveli… v. 4n.'
  - type: text
    content: 'Il leur parla ainsi : Si vous consentez à ce que le corps de ma femme soit enseveli hors de ma vue, écoutez-moi et intercédez en ma faveur auprès d''Ephrôn, fils de Tsohar. '
  '9':
  - type: note
    content: 'la grotte de Makpéla  : LXX a traduit la grotte double (sens possible du mot Makpéla en hébreu).'
  - type: text
    content: Qu'il me donne la grotte de Makpéla qui lui appartient, à l'extrémité de son champ ; qu'il me la donne contre sa pleine valeur en argent, au milieu de vous, comme propriété funéraire.
