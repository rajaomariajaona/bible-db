  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Noé : Entre dans l''arche, toi et toute ta maison ; car j''ai vu qu''au sein de cette génération, devant moi, tu es juste. '
  - type: usfm
    marker: v
    metadata:
