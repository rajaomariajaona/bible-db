      marker: fr
      children:
      - type: text
        text: '7.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bêtes '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pures
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 11 ; 20.25s ; Dt 14.1-21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prends
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prends pour toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; l''expression correspondante est souvent employée pour les animaux destinés à un sacrifice ; ainsi en 15.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sept
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.19 ; 8.20s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mâle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: femelle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''hébreu emploie ici une autre formule (litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'homme et sa femme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) qu'au v. 3 et en 6.19.
    marker-yv: yv-n
  - type: text
    text: 'De toutes les bêtes pures, prends sept couples, le mâle et sa femelle ; des bêtes qui ne sont pas pures, un couple, le mâle et sa femelle ; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'aussi des oiseaux du ciel, sept couples, mâle et femelle, afin de garder en vie leur descendance sur toute la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pluie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.5 ; 19.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'j''effacerai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de la terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la surface du sol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tous les êtres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tout ce qui se tient debout '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui est établi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme au v. 23.'
    marker-yv: yv-n
  - type: text
    text: 'Encore sept jours, en effet, et je vais faire venir la pluie sur la terre quarante jours et quarante nuits ; j''effacerai de la terre tous les êtres que j''ai faits. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Noé fit exactement ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui avait ordonné.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le déluge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
