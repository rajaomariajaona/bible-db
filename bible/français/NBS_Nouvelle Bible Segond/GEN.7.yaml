        text: '7.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ses '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ', sa femme… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 6.18+.
    marker-yv: yv-n
  - type: text
    text: 'Noé entra dans l''arche, lui et ses fils, sa femme et les femmes de ses fils avec lui, pour échapper aux eaux du déluge. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: pures
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tout ce qui fourmille… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Des bêtes pures et des bêtes impures, des oiseaux et de tout ce qui fourmille sur la terre, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il en vint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il en était venu.
    marker-yv: yv-n
  - type: text
    text: 'il en vint vers Noé, deux par deux, un mâle et une femelle, pour entrer dans l''arche, comme Dieu l''avait ordonné à Noé. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Sept jours après, les eaux du déluge étaient sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dix-septième jour…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 24 ; 8.3-5,13s : en tout la grande inondation dure une année solaire (12 mois lunaires + 11 jours = 365 jours) ; cf. 5.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abîme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.2+ ; cf. Ez 26.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fenêtres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ouvertures
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du ciel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.2 ; 2R 7.2,19 ; Es 24.18 ; Ml 3.10 (cf. Gn 1.6s) ; autres emplois du terme traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fenêtres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Es 60.8 ; Os 13.3 ; Ec 12.3.
    marker-yv: yv-n
  - type: text
    text: 'L''an six cent de la vie de Noé, le dix-septième jour du deuxième mois, en ce jour-là toutes les sources du grand abîme jaillirent, et les fenêtres du ciel s''ouvrirent. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pluie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre mot qu''au v. 4, comme en 8.2 ; cf. 1R 18.41-45 ; Ez 1.28.'
    marker-yv: yv-n
  - type: text
    text: 'Il y eut de la pluie sur la terre quarante jours et quarante nuits. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ce jour même
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 1 ; la même expression hébraïque (litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans l'os de ce jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') revient en 17.23,26 ; Ex 12.17,41,51 ; Lv 23.21,28ss ; Jos 5.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Noé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 1 ; 5.32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: entrèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: étaient entrés.
    marker-yv: yv-n
  - type: text
    text: 'Ce jour même Noé, Sem, Cham et Japhet, fils de Noé, la femme de Noé et les trois femmes de ses fils avec eux entrèrent dans l''arche '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les animaux sauvages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les animaux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(détaillés dans la suite). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'selon leurs espèces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.11+ ; 6.20.
    marker-yv: yv-n
  - type: text
    text: 'avec tous les animaux sauvages selon leurs espèces, tout le bétail selon ses espèces, toutes les bestioles qui fourmillent sur la terre selon leurs espèces, tous les oiseaux selon leurs espèces, tout ce qui vole et qui a des ailes ; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'toute '
      - type: usfm
        marker: w
        children:
        - type: text
          text: chair
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'souffle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 6.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 6.17.
    marker-yv: yv-n
  - type: text
    text: 'de tout ce qui avait souffle de vie, il en vint vers Noé, deux par deux, pour entrer dans l''arche. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ceux qui vinrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'entrèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent un même verbe hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de toute sorte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de toute chair.
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui vinrent, mâle et femelle, de toute sorte, entrèrent, comme Dieu l''avait ordonné à Noé. Puis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ferma la porte sur lui. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il y eut le déluge sur la terre pendant quarante jours. Les eaux montèrent et emportèrent l''arche, qui fut soulevée au-dessus de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les eaux grossirent et montèrent énormément sur la terre, et l''arche s''en alla sur les eaux. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les eaux grossirent de plus en plus sur la terre. Toutes les hautes montagnes qui sont sous le ciel furent recouvertes. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
