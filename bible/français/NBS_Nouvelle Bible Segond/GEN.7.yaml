  - type: text
    text: 'Dieu effaça tous les êtres qui étaient sur la terre : depuis les humains jusqu''au bétail, aux bestioles et aux oiseaux du ciel, ils furent effacés de la terre. Il ne resta que Noé et ceux qui étaient avec lui dans l''arche. '
