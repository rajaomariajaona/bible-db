document_id: GEN.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Noé entre dans l'arche
  - type: text
    content: ' '
  - type: note
    content: ta maison ou ta maisonnée, ta famille . –  génération / juste 6.8-9n  ; cf. 1S 16.1 ; 2R 8.13.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Noé : Entre dans l''arche, toi et toute ta maison ; car j''ai vu qu''au sein de cette génération, devant moi, tu es juste. '
  '10':
  - type: text
    content: 'Sept jours après, les eaux du déluge étaient sur la terre. '
  '11':
  - type: note
    content: 'dix-septième jour…  : cf. v. 24 ; 8.3-5,13s : en tout la grande inondation dure une année solaire (12 mois lunaires + 11 jours = 365 jours) ; cf. 5.23n. –  abîme 1.2+ ; cf. Ez 26.19. –  fenêtres (ou ouvertures) du ciel 8.2 ; 2R 7.2,19 ; Es 24.18 ; Ml 3.10 (cf. Gn 1.6s) ; autres emplois du terme traduit par fenêtres en Es 60.8 ; Os 13.3 ; Ec 12.3.'
  - type: text
    content: 'L''an six cent de la vie de Noé, le dix-septième jour du deuxième mois, en ce jour-là toutes les sources du grand abîme jaillirent, et les fenêtres du ciel s''ouvrirent. '
  '12':
  - type: note
    content: 'pluie  : autre mot qu''au v. 4, comme en 8.2 ; cf. 1R 18.41-45 ; Ez 1.28.'
  - type: text
    content: 'Il y eut de la pluie sur la terre quarante jours et quarante nuits. '
  '13':
  - type: note
    content: 'Ce jour même  : cf. v. 1 ; la même expression hébraïque (litt. dans l''os de ce jour) revient en 17.23,26 ; Ex 12.17,41,51 ; Lv 23.21,28ss ; Jos 5.11. –  Noé…  : cf. v. 1 ; 5.32. –  entrèrent  : autre traduction étaient entrés.'
  - type: text
    content: 'Ce jour même Noé, Sem, Cham et Japhet, fils de Noé, la femme de Noé et les trois femmes de ses fils avec eux entrèrent dans l''arche '
  '14':
  - type: note
    content: 'les animaux sauvages  : autre traduction les animaux (détaillés dans la suite). –  selon leurs espèces 1.11+ ; 6.20.'
  - type: text
    content: 'avec tous les animaux sauvages selon leurs espèces, tout le bétail selon ses espèces, toutes les bestioles qui fourmillent sur la terre selon leurs espèces, tous les oiseaux selon leurs espèces, tout ce qui vole et qui a des ailes ; '
  '15':
  - type: note
    content: 'tout  : litt. toute chair. –  souffle (ou esprit, 6.3n) de vie 6.17.'
  - type: text
    content: 'de tout ce qui avait souffle de vie, il en vint vers Noé, deux par deux, pour entrer dans l''arche. '
  '16':
  - type: note
    content: 'Ceux qui vinrent et entrèrent traduisent un même verbe hébreu. –  de toute sorte  : litt. de toute chair.'
  - type: text
    content: 'Ceux qui vinrent, mâle et femelle, de toute sorte, entrèrent, comme Dieu l''avait ordonné à Noé. Puis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ferma la porte sur lui. '
  '17':
  - type: text
    content: 'Il y eut le déluge sur la terre pendant quarante jours. Les eaux montèrent et emportèrent l''arche, qui fut soulevée au-dessus de la terre. '
  '18':
  - type: text
    content: 'Les eaux grossirent et montèrent énormément sur la terre, et l''arche s''en alla sur les eaux. '
  '19':
  - type: text
    content: 'Les eaux grossirent de plus en plus sur la terre. Toutes les hautes montagnes qui sont sous le ciel furent recouvertes. '
  '2':
  - type: note
    content: 'bêtes pures  : cf. Lv 11 ; 20.25s ; Dt 14.1-21. –  prends  : litt. prends pour toi  ; l''expression correspondante est souvent employée pour les animaux destinés à un sacrifice ; ainsi en 15.10n. –  sept  : cf. 6.19 ; 8.20s. –  mâle / femelle  : l''hébreu emploie ici une autre formule (litt. l''homme et sa femme) qu''au v. 3 et en 6.19.'
  - type: text
    content: 'De toutes les bêtes pures, prends sept couples, le mâle et sa femelle ; des bêtes qui ne sont pas pures, un couple, le mâle et sa femelle ; '
  '20':
  - type: note
    content: 'Les eaux montèrent…  : litt. les eaux grossirent de quinze coudées (environ 7 m, voir mesures) au-dessus.'
  - type: text
    content: 'Les eaux montèrent quinze coudées plus haut, et les montagnes furent recouvertes. '
  '21':
  - type: note
    content: 'périt  : litt. expira, cf. 6.17. –  les animaux  : il faut sans doute comprendre les animaux sauvages, par opposition au bétail  ; cf. 1.24n  ; 8.1 ; 9.10n  ; Lv 25.7n. –  les petites bêtes…  : cf. 1.20n.'
  - type: text
    content: 'Tout ce qui fourmillait sur la terre périt, tant les oiseaux que le bétail et les animaux, toutes les petites bêtes qui grouillaient sur la terre, et tous les humains. '
  '22':
  - type: note
    content: 'souffle de vie  : ici litt. souffle (comme en 2.7) d''esprit (comme en 6.3n,17) de vie.'
  - type: text
    content: 'Tout ce qui avait souffle de vie dans les narines et qui était sur la terre ferme mourut. '
  '23':
  - type: note
    content: effaça tous les êtres v. 4n  ; 6.7.
  - type: text
    content: 'Dieu effaça tous les êtres qui étaient sur la terre : depuis les humains jusqu''au bétail, aux bestioles et aux oiseaux du ciel, ils furent effacés de la terre. Il ne resta que Noé et ceux qui étaient avec lui dans l''arche. '
  '24':
  - type: note
    content: 'cent cinquante jours  : cf. v. 11n  ; 8.3.'
  - type: text
    content: Les eaux grossirent sur la terre pendant cent cinquante jours.
  '3':
  - type: text
    content: 'aussi des oiseaux du ciel, sept couples, mâle et femelle, afin de garder en vie leur descendance sur toute la terre. '
  '4':
  - type: note
    content: 'pluie  : cf. 2.5 ; 19.24. –  j''effacerai 6.7. –  de la terre ou de la surface du sol, cf. 2.5n. –  tous les êtres  : litt. tout ce qui se tient debout ou qui est établi, comme au v. 23.'
  - type: text
    content: 'Encore sept jours, en effet, et je vais faire venir la pluie sur la terre quarante jours et quarante nuits ; j''effacerai de la terre tous les êtres que j''ai faits. '
  '5':
  - type: note
    content: 6.22n.
  - type: text
    content: 'Noé fit exactement ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait ordonné.'
  - type: heading
    content: Le déluge
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'six cents ans  : cf. 5.32.'
  - type: text
    content: 'Noé avait six cents ans lorsqu''il y eut le déluge – les eaux – sur la terre. '
  '7':
  - type: note
    content: 6.18n. –  ses fils, sa femme… 6.18+.
  - type: text
    content: 'Noé entra dans l''arche, lui et ses fils, sa femme et les femmes de ses fils avec lui, pour échapper aux eaux du déluge. '
  '8':
  - type: note
    content: pures v. 2n. –  tout ce qui fourmille… 1.26n.
  - type: text
    content: 'Des bêtes pures et des bêtes impures, des oiseaux et de tout ce qui fourmille sur la terre, '
  '9':
  - type: note
    content: '6.20n. –  il en vint  : autre traduction il en était venu.'
  - type: text
    content: 'il en vint vers Noé, deux par deux, un mâle et une femelle, pour entrer dans l''arche, comme Dieu l''avait ordonné à Noé. '
