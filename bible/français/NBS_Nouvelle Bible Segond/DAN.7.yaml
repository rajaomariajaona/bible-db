document_id: DAN.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Première vision de Daniel : les quatre bêtes'
  - type: text
    content: ' '
  - type: note
    content: 'Les chapitres 7 à 12 de Daniel relèvent du genre apocalyptique, et leur interprétation est difficile. Selon de nombreux commentateurs, ils visent en particulier des événements survenus au IIe s. av. J.-C., à l''époque de la grande persécution menée par Antiochos IV Epiphane (175-164) contre le judaïsme ; les notes qui suivent informent en priorité sur ces événements là où le texte semble y faire allusion. Mais bien d''autres interprétations ont été avancées. –  Belshatsar 5.1n. –  des visions de son esprit 4.2n. –  Début du récit (litt. des paroles , pluriel du terme traduit par message au v. 28) : d''autres comprennent il les résuma ainsi.'
  - type: text
    content: 'La première année de Belshatsar, roi de Babylone, Daniel eut un rêve, des visions de son esprit, pendant qu''il était sur son lit. Ensuite il écrivit le rêve. Début du récit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'fleuve  : cf. Ps 18.12s. –  le servaient Hé 1.14. –  dix mille fois dix mille ou une myriade de myriades , c.-à-d. 100 millions, évocation de l’ armée du ciel  ; Lc 2.13 ; Ap 5.11. –  Les juges  : litt. le jugement ou la cour, le tribunal. –  s''assirent  : sur les trônes du v. 9 ; cf. Mt 19.28 ; 25.31 ; Lc 22.30 ; Jn 5.22 ; 1Co 6.2s. –  livres  : contenant le souvenir des actions (cf. 10.21 ; Es 65.6s ; Jr 17.1 ; Ps 56.9 ; Ap 20.12) ou la liste des justes (12.1 ; Ex 32.32s ; Es 4.3 ; Ml 3.16 ; Ps 69.29 ; Lc 10.20 ; Ph 4.3 ; Ap 3.5+).'
  - type: text
    content: Un fleuve de feu coulait
  - type: text
    content: et sortait de devant lui.
  - type: text
    content: Mille milliers le servaient,
  - type: text
    content: dix mille fois dix mille se tenaient debout devant lui.
  - type: text
    content: Les juges s'assirent,
  - type: text
    content: et des livres furent ouverts.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'paroles arrogantes v. 8n. –  la bête fut tuée Ap 19.19-21. –  au feu…  : litt. à la brûlure du feu  ; cf. Es 66.16 ; Lc 16.24 ; Ap 20.14.'
  - type: text
    content: Je regardais alors, à cause des paroles arrogantes que prononçait la corne ; et, tandis que je regardais, la bête fut tuée ; son corps périt et fut livré au feu pour y être brûlé.
  - type: text
    content: ' '
  '12':
  - type: note
    content: 'leur puissance  : cf. v. 14,18. –  pour un temps déterminé  : litt. pour un temps et une époque, termes traduits, dans l''ordre inverse, par temps (ou année, cf. v. 25n) et circonstances (ou saisons) en 2.21n.'
  - type: text
    content: Les autres bêtes furent dépouillées de leur puissance, mais une prolongation de vie leur fut accordée pour un temps déterminé.
  - type: text
    content: ' '
  '13':
  - type: note
    content: 'Sur l''exploitation de ce texte dans le N.T., voir Mt 24.30/ / ; 26.64/ / ; Ap 1.7, 13 ; 14.14-16. –  avec  : LXX sur. –  les nuées  : cf. Ex 34.5 ; Lv 16.2 ; Nb 11.25. –  quelqu''un qui ressemblait à un être humain  : litt. comme un fils d''homme (cf. 10.16,18 ; Ez 1.26-28 ; Mt 8.20n), par opposition aux bêtes de la vision. –  on le fit approcher  : cf. Jr 30.21n  ; Ps 65.5.'
  - type: text
    content: Dans mes visions nocturnes,
  - type: text
    content: je vis alors arriver, avec les nuées du ciel,
  - type: text
    content: quelqu'un qui ressemblait à un être humain ;
  - type: text
    content: il s'avança vers le vieillard,
  - type: text
    content: et on le fit approcher de lui.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ap 5.13. –  domination… v. 18 ; cf. Mt 28.18 ; Ap 11.15. –  les peuples, les nations et les langues 3.4n. –  se mirent à le servir  : on peut comprendre, ou bien se soumirent à lui , ou bien se mirent à lui rendre un culte  ; cf. 2.46n. –  domination… toujours 2.44+.'
  - type: text
    content: On lui donna la domination, l'honneur et la royauté ;
  - type: text
    content: tous les peuples, les nations et les langues se mirent à le servir.
  - type: text
    content: Sa domination durera toujours,
  - type: text
    content: elle ne passera pas,
  - type: text
    content: et son royaume ne sera jamais détruit.
  - type: heading
    content: Interprétation de la première vision
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'je fus troublé…  : litt. mon esprit (ou mon souffle ) fut troublé dans son fourreau  ; certains modifient légèrement le texte araméen traditionnel pour lire fut troublé à cause de cela  ; cf. 2.1-3. –  les visions de mon esprit 2.28n  ; 4.2n.'
  - type: text
    content: Moi, Daniel, je fus troublé au plus profond de moi ; les visions de mon esprit m'épouvantaient.
  - type: text
    content: ' '
  '16':
  - type: note
    content: 'ce qu''il y avait de certain dans  : autre traduction l''interprétation de  ; cf. 2.41-43 ; 4.17-23 ; 5.26-28 ; Ez 40–42 ; Za 1.9 ; 2.2 etc. ; Ap 7.13s.'
  - type: text
    content: 'Je m''approchai de l''un de ceux qui étaient là et lui demandai ce qu''il y avait de certain dans tout cela. Il me le dit et m''en fit connaître l''interprétation :'
  - type: text
    content: ' '
  '17':
  - type: note
    content: quatre rois ou quatre royaumes  ; cf. v. 3nss.
  - type: text
    content: Ces quatre bêtes énormes, ce sont quatre rois qui se lèveront sur la terre ;
  - type: text
    content: ' '
  '18':
  - type: note
    content: 'les saints v. 22,25,27 ; 8.24 ; cf. 4.10n où le même terme désigne des anges ; voir aussi Ex 19.6 ; Ps 16.3,10 ; 34.10 ; Es 4.3 ; Ac 9.13 ; Rm 1.7 ; Col 1.12 ; Sagesse 5.5 : « Comment donc a-t-il (le juste glorifié) été admis au nombre des fils de Dieu et partage-t-il le sort des saints ? » –  du Très-Haut  : d''après des versions anciennes ; l''araméen a un pluriel, de sorte qu''on pourrait aussi lire les saints très-hauts ou dans les lieux très hauts, bien que le terme désigne habituellement Dieu. –  recevront la royauté ou le royaume, cf. Lc 12.32 ; Hé 12.28 ; Ap 5.10 ; 20.4-6 ; 22.5.'
  - type: text
    content: mais les saints du Très-Haut recevront la royauté, ils posséderont la royauté pour toujours, à tout jamais.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'griffes (ou ongles ) de bronze  : précision absente du v. 7.'
  - type: text
    content: Ensuite je désirai avoir une certitude sur la quatrième bête, qui était différente de toutes les autres, particulièrement terrible, avec des dents de fer et des griffes de bronze, qui mangeait, pulvérisait et foulait aux pieds ce qui restait ;
  - type: text
    content: ' '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'vision nocturne 2.19+. –  quatre vents  : cf. 8.8 ; 11.4 ; Jr 49.36 ; Ez 37.9 ; Za 2.10 ; 6.5 ; Ap 7.1. –  la grande mer  : cf. Es 17.12s ; 51.10 ; Jr 6.23 ; Ps 29.3 ; 77.17 ; 93.3s ; Jb 7.12+.'
  - type: text
    content: 'Daniel dit : Dans ma vision nocturne, je vis les quatre vents du ciel agiter la grande mer.'
  - type: text
    content: ' '
  '20':
  - type: note
    content: 'V. 7s. –  les autres  : litt. ses compagnes.'
  - type: text
    content: et sur les dix cornes qu'elle avait sur la tête, et sur l'autre qui était sortie et devant laquelle trois étaient tombées, cette corne qui avait des yeux et une bouche parlant avec arrogance, et qui paraissait plus forte que les autres.
  - type: text
    content: ' '
  '21':
  - type: note
    content: 8.24 ; Ap 11.7 ; 13.7.
  - type: text
    content: Je regardai cette corne faire la guerre aux saints et l'emporter sur eux,
  - type: text
    content: ' '
  '22':
  - type: note
    content: 'V. 9-14. –  rendre justice  : autre traduction remettre le jugement. –  le temps arrive Mc 1.15 ; Lc 21.8.'
  - type: text
    content: jusqu'à ce que le vieillard vienne rendre justice aux saints du Très-Haut, et que le temps arrive où les saints soient en possession de la royauté.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 2.40-43.
  - type: text
    content: 'Il me dit : La quatrième bête,'
  - type: text
    content: c'est un quatrième royaume
  - type: text
    content: qui sera sur la terre,
  - type: text
    content: différent de tous les royaumes,
  - type: text
    content: et qui dévorera toute la terre,
  - type: text
    content: la foulera et la pulvérisera.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'dix cornes / dix rois v. 7 ; Ap 17.12. –  il abaissera (cf. 5.19) trois rois  : Antiochos IV Epiphane, délivré par Rome en échange de son neveu Démétrios, accède au trône grâce à l''assassinat de son frère Séleucos IV et attaque traîtreusement son rival Ptolémée VI Philométor ; cf. 11.21,25.'
  - type: text
    content: Les dix cornes,
  - type: text
    content: ce sont dix rois
  - type: text
    content: qui s'élèveront de ce royaume.
  - type: text
    content: Un autre s'élèvera après eux,
  - type: text
    content: différent des premiers,
  - type: text
    content: et il abaissera trois rois.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Très-Haut 3.26+. –  les temps  : le mot correspondant est traduit par circonstances (ou saisons ) en 2.21n. Il désigne ici le calendrier liturgique prescrit par la loi de Moïse ; cf. 1 Maccabées 1.44-49 : « Le roi (Antiochos IV Epiphane) envoya aussi à Jérusalem et aux villes de Juda des lettres… prescrivant de suivre des coutumes étrangères au pays, de bannir du sanctuaire holocaustes, sacrifices et libations, de profaner sabbats et fêtes, de souiller le sanctuaire et les choses saintes, d''élever autels, sanctuaires et temples d''idoles, de sacrifier des porcs et des animaux impurs, de laisser leurs fils incirconcis et de se rendre abominables par toutes sortes d''impuretés et de profanations, oubliant ainsi la Loi et altérant toutes les pratiques. » –  un temps (même mot que v. 12n  ; 2.21n  ; 4.13n) , des temps et la moitié d''un temps  : de toute évidence, trois ans et demi ; cf. les diverses expressions de la même durée en 9.27 ; 12.7 (voir aussi 8.14 ; 12.11s) ; Ap 11.2 ; 12.14 ; 13.5 (voir aussi Lc 4.25 ; Jc 5.17). L''oppression des Juifs par Antiochos dura un peu plus de 3 ans, de 167 à 164 av. J.-C.'
  - type: text
    content: Il prononcera des paroles contre le Très-Haut,
  - type: text
    content: il opprimera les saints du Très-Haut,
  - type: text
    content: il espérera changer les temps et la loi,
  - type: text
    content: et les saints lui seront livrés
  - type: text
    content: pendant un temps, des temps
  - type: text
    content: et la moitié d'un temps.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'définitivement  : litt. jusqu''à la fin.'
  - type: text
    content: Puis viendra le jugement, et on lui ôtera sa domination,
  - type: text
    content: qui sera anéantie et définitivement perdue.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'V. 14,18+. –  de tous les royaumes…  : litt. des royaumes sous tous les cieux . –  tous les dominateurs  : litt. toutes les dominations . –  l''écouteront  : autre traduction lui obéiront.'
  - type: text
    content: La royauté, la domination
  - type: text
    content: et la grandeur de tous les royaumes qui sont sous le ciel
  - type: text
    content: seront données au peuple des saints du Très-Haut.
  - type: text
    content: Son règne durera toujours,
  - type: text
    content: et tous les dominateurs le serviront et l'écouteront.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'je pâlis  : litt. mes couleurs changèrent sur moi  ; cf. 5.6n. –  je conservai… dans mon cœur Lc 2.19,51.'
  - type: text
    content: C'est ici la fin du message. Moi, Daniel, je fus extrêmement épouvanté par mes pensées, je pâlis et je conservai ces paroles dans mon cœur.
  '3':
  - type: note
    content: 'Ap 11.7 ; 13.1. –  Quatre bêtes énormes  : sur leur signification, voir v. 17 ; 2.38,39n,40n (les commentateurs se partagent ici aussi entre les mêmes interprétations).'
  - type: text
    content: Quatre bêtes énormes montèrent de la mer, différentes l'une de l'autre.
  - type: text
    content: ' '
  '4':
  - type: note
    content: 'Cf. Ez 1.10 ; Ap 13.2. –  lion (Jr 50.17 ; Ez 32.2) et aigle (Ez 17.3 ; Ha 1.8) rappellent les lions ailés de l''iconographie babylonienne. –  cœur d''homme…  : cf. 4.13,31.'
  - type: text
    content: La première était comme un lion et avait des ailes d'aigle ; tandis que je regardais, ses ailes furent arrachées ; elle fut soulevée de terre et mise debout sur ses jambes, comme un homme, et un cœur d'homme lui fut donné.
  - type: text
    content: ' '
  '5':
  - type: note
    content: 'trois côtes  : autre traduction trois crocs  ; cf. Am 3.13 ; 5.19.'
  - type: text
    content: 'Puis il y eut une deuxième bête, semblable à un ours ; elle se dressait sur un côté ; elle avait trois côtes dans la gueule, entre les dents, et on lui disait : Lève-toi, mange beaucoup de chair.'
  - type: text
    content: ' '
  '6':
  - type: note
    content: 'quatre têtes  : pour certains, quatre souverains perses (cf. 11.2n) ; d''autres y voient une allusion à l''extension rapide de l''empire perse aux quatre points cardinaux. D''autres encore pensent qu''il s''agit ici, déjà, de l''empire grec (cf. 2.39n).'
  - type: text
    content: Après cela, j'en vis une autre, comme un léopard, qui avait sur le dos quatre ailes d'oiseau ; cette bête avait quatre têtes, et la domination lui fut donnée.
  - type: text
    content: ' '
  '7':
  - type: note
    content: '2.40 ; 8.5-7,21 ; 10.20 ; 11.3. –  dix cornes  : ici probablement les rois de la période hellénistique, après les conquêtes d''Alexandre le Grand ; cf. Ap 12.3 ; 13.1 ; 17.12.'
  - type: text
    content: Après cela, dans mes visions nocturnes, je vis une quatrième bête, terrible, effrayante et extraordinairement forte ; elle avait de grandes dents de fer ; elle dévorait, elle pulvérisait et foulait aux pieds ce qui restait ; elle était différente de toutes les bêtes précédentes, et elle avait dix cornes.
  - type: text
    content: ' '
  '8':
  - type: note
    content: 'corne, petite 8.22s. –  qui parlait avec arrogance  : autre traduction qui disait des choses monstrueuses  ; cf. v. 25 ; 8.25 ; 11.36 ; 1 Maccabées 1.24 : « Il (Antiochos IV Epiphane) avait fait un carnage et avait proféré des paroles d''une extrême arrogance. » Voir aussi Ap 13.5,7.'
  - type: text
    content: Je considérais les cornes, quand une autre corne, petite, sortit d'entre elles, et trois des premières cornes furent arrachées devant elle ; et sur cette corne, il y avait des yeux comme des yeux d'homme et une bouche qui parlait avec arrogance.
  - type: heading
    content: Le vieillard et « quelqu'un qui ressemble à un être humain »
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'des trônes Ap 20.4. –  un vieillard  : litt. un ancien de jours (formule traditionnellement rendue par l''Ancien des jours ), figure du Dieu éternel. –  s''assit Ap 20.11s. –  neige / laine Ap 1.14 ; cf. Mt 17.2/ / ; 28.3. –  feu flamboyant 10.6 ; Ex 19.18 ; Ps 50.3 ; 97.3 ; Ap 1.14+. –  roues  : cf. Ez 1.'
  - type: text
    content: Tandis que je regardais,
  - type: text
    content: on installa des trônes,
  - type: text
    content: et un vieillard s'assit.
  - type: text
    content: Son vêtement était blanc comme la neige,
  - type: text
    content: et les cheveux de sa tête purs comme de la laine ;
  - type: text
    content: son trône était comme un feu flamboyant,
  - type: text
    content: et ses roues comme un feu ardent.
