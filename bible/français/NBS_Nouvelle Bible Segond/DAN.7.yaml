      - type: text
        text: quatre têtes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : pour certains, quatre souverains perses (cf. 11.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; d'autres y voient une allusion à l'extension rapide de l'empire perse aux quatre points cardinaux. D'autres encore pensent qu'il s'agit ici, déjà, de l'empire grec (cf. 2.39
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Après cela, j'en vis une autre, comme un léopard, qui avait sur le dos quatre ailes d'oiseau ; cette bête avait quatre têtes, et la domination lui fut donnée.
