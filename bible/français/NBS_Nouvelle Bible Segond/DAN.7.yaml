  - type: usfm
    marker: it
    children:
    - type: text
      text: La première était comme un lion et avait des ailes d'aigle ; tandis que je regardais, ses ailes furent arrachées ; elle fut soulevée de terre et mise debout sur ses jambes, comme un homme, et un cœur d'homme lui fut donné.
  - type: text
    text: ' '
  - type: usfm
