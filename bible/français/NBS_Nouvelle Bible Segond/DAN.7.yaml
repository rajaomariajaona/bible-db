    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Après cela, dans mes visions nocturnes, je vis une quatrième bête, terrible, effrayante et extraordinairement forte ; elle avait de grandes dents de fer ; elle dévorait, elle pulvérisait et foulait aux pieds ce qui restait ; elle était différente de toutes les bêtes précédentes, et elle avait dix cornes.
