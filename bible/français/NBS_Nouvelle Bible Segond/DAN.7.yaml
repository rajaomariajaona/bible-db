    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Je considérais les cornes, quand une autre corne, petite, sortit d'entre elles, et trois des premières cornes furent arrachées devant elle ; et sur cette corne, il y avait des yeux comme des yeux d'homme et une bouche qui parlait avec arrogance.
