    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les chapitres 7 à 12 de Daniel relèvent du genre apocalyptique, et leur interprétation est difficile. Selon de nombreux commentateurs, ils visent en particulier des événements survenus au II
