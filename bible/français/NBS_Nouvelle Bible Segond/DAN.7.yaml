      - type: text
        text: trois crocs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Am 3.13 ; 5.19.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Puis il y eut une deuxième bête, semblable à un ours ; elle se dressait sur un côté ; elle avait trois côtes dans la gueule, entre les dents, et on lui disait : Lève-toi, mange beaucoup de chair.'
