document_id: 1SA.26,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Au désert de Ziph : David épargne de nouveau Saül'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 23.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les Ziphites se rendirent auprès de Saül, à Guibéa, et dirent : David est caché dans les collines de Hakila, en face de la terre aride. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.39'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' seul de le frapper'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 25.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's ; Ps 94.23 ; Rm 12.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que son jour vienne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit du jour de la mort naturelle ; cf. Ps 37.13 ; Jb 14.5 ; Ec 3.2 ; 9.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au combat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 31.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'soit emporté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 27.1.'
      marker-yv: yv-n
    - type: text
      text: 'Et David dit : Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', c''est au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' seul de le frapper, soit que son jour vienne et qu''il meure, soit qu''il descende au combat et qu''il y soit emporté. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 24.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jamais…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 24.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 17.54 ; 18.4 ; 31.10.'
      marker-yv: yv-n
    - type: text
      text: 'Jamais ! Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me garde de porter la main sur l''homme qui a reçu l''onction du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! Maintenant, je te prie, prends la lance qui est près de sa tête, avec la cruche d''eau, et allons-nous-en. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une torpeur venant du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une torpeur de YHWH '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un profond sommeil, un sommeil surnaturel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; même terme hébreu en Gn 2.21 ; 15.12 ; Es 29.10 ; Jb 4.13 ; 33.15 ; Pr 19.15.
      marker-yv: yv-n
    - type: text
      text: 'David prit donc la lance et la cruche d''eau qui étaient près de la tête de Saül, et ils s''en allèrent. Personne ne les vit, personne n''en eut connaissance, personne ne se réveilla, car ils dormaient tous. En effet, une torpeur venant du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' était tombée sur eux.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: passa de l'autre côté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : dans cette région de Hakila, Saül a installé son camp sur une colline (v. 3) ; David et Abishaï franchissent le vallonnement et grimpent au sommet de la colline voisine. Cf. Jg 9.7.'
      marker-yv: yv-n
    - type: text
      text: 'David passa de l''autre côté et s''arrêta à bonne distance, au sommet de la colline voisine ; il y avait beaucoup d''espace entre eux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vers le roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les mots correspondants sont absents de certains mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David cria vers le peuple et vers Abner, fils de Ner : Ne répondras-tu pas, Abner ? Abner répondit : Qui es-tu, toi qui pousses des cris vers le roi ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'N''es-tu pas un homme ? Qui est ton pareil en Israël ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ces deux questions, rhétoriques, équivalent en fait à des affirmations renforcées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu es un homme, n''est-ce pas (et non pas une femmelette), tu n''as pas ton pareil en Israël ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gardé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: protégé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même au v. 16.'
      marker-yv: yv-n
    - type: text
      text: 'David dit à Abner : N''es-tu pas un homme ? Qui est ton pareil en Israël ? Pourquoi donc n''as-tu pas gardé le roi, ton seigneur ? Quelqu''un du peuple est venu pour faire périr le roi ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.39'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous méritez la mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'homme qui a reçu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 24.7,11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Regarde maintenant où sont… ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'regarde maintenant : où sont… ?'
      marker-yv: yv-n
    - type: text
      text: 'Ce que tu as fait là n''est pas bien. Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', vous méritez la mort, pour n''avoir pas gardé votre seigneur, l''homme qui a reçu l''onction du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! Regarde maintenant où sont la lance du roi et la cruche d''eau qui étaient près de sa tête !'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 24.17.
      marker-yv: yv-n
    - type: text
      text: 'Saül reconnut la voix de David ; il dit : Est-ce bien ta voix, David, mon fils ? Et David répondit : C''est ma voix, ô roi, mon seigneur ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'me poursuis-tu ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cf. 24.10-12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En quoi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'y a-t-il de mauvais dans ma main ?
      marker-yv: yv-n
    - type: text
      text: 'Et il dit : Pourquoi me poursuis-tu ? Qu''ai-je fait ? En quoi me suis-je mal conduit ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'si c''est le '
        - type: usfm
          marker: nd
          children:
          - type: text
