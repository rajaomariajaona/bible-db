        - type: text
          text: '  : cf. 24.15.'
      marker-yv: yv-n
    - type: text
      text: 'Oh ! que mon sang ne tombe pas à terre loin de la face du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! Car le roi d''Israël est parti en guerre pour chercher une simple puce, comme on chasserait une perdrix dans les montagnes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''ai '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.24+ ; cf. 24.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: stupidement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 13.13+.'
      marker-yv: yv-n
    - type: text
      text: 'Saül dit : J''ai péché ; reviens, David, mon fils ! Je ne te ferai plus de mal, puisqu''en ce jour ma vie a été précieuse à tes yeux. J''ai agi stupidement, j''ai commis une grande erreur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Voici la lance du roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: voici la lance, ô roi.
      marker-yv: yv-n
    - type: text
      text: 'David répondit : Voici la lance du roi ; que l''un de tes serviteurs vienne la prendre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 24.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sa '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: ' et sa probité'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 7.9 ; 18.21-27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'avait livré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 24.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'homme qui a reçu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' rendra à chacun selon sa justice et sa probité ; car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''avait livré aujourd''hui à moi, et je n''ai pas voulu porter la main sur l''homme qui a reçu l''onction du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un grand prix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: grande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aux yeux du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 72.14 ; 116.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il me délivrera de toute détresse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 4.9 ; 22.1 ; Ps 34.20 ; 2Co 1.10 ; 2Tm 4.18.'
      marker-yv: yv-n
    - type: text
      text: 'Et comme en ce jour ta vie a été d''un grand prix à mes yeux, ainsi ma vie sera d''un grand prix aux yeux du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et il me délivrera de toute détresse. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sois '
        - type: usfm
          marker: w
          children:
          - type: text
            text: béni
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 25.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'David, mon fils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 24.17 ; cf. 24.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tout ce que tu feras…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu agiras et tu réussiras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jos 1.8 ; Ps 1.3 ; Jb 22.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chez lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à son lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: Séparation
        - type: text
          text: '  : voir 24.23.'
      marker-yv: yv-n
    - type: text
      text: 'Saül dit à David : Sois béni, David, mon fils ! Tout ce que tu feras, tu le réussiras ! David continua son chemin, et Saül rentra chez lui.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au bord de la route
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur la route
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; alors que David et ses hommes se déplacent sans problème '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le désert
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Saül et son armée préfèrent rester à proximité des voies de communication. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: S'étant aperçu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il vit que Saül venait derrière lui vers le désert '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: était arrivé après lui dans le désert
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; toutefois le v. 4 montre bien que David n''a pas vu de ses yeux l''arrivée de Saül, mais qu''il en a été informé, puisqu''il en cherche la confirmation.'
      marker-yv: yv-n
    - type: text
      text: 'Il installa son campement dans les collines de Hakila, en face de la terre aride, au bord de la route. David habitait alors dans le désert. S''étant aperçu que Saül le poursuivait jusqu''au désert, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: effectivement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : expression hébraïque rendue par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à l''endroit convenu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 23.23
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'il envoya des espions et sut ainsi que Saül était effectivement arrivé. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.50'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au milieu du camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 17.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Alors David parvint au lieu où Saül campait. Il vit le lieu où couchait Saül, ainsi qu'Abner, fils de Ner, chef de son armée. Saül couchait au milieu du camp, et le peuple campait autour de lui.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ahimélek, le Hittite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'n''est jamais mentionné ailleurs, mais on trouvera un autre Hittite, Urie, dans l''entourage militaire de David, cf. 2S 11 ; 23.39. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abishaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2S 2.24 ; 23.18 ; il était un neveu de David, sa mère '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tserouya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'étant une sœur de David, cf. 1Ch 2.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui veut descendre avec moi… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. Jg 7.9-11.
      marker-yv: yv-n
    - type: text
      text: 'David demanda à Ahimélek, le Hittite, et à Abishaï, fils de Tserouya et frère de Joab : Qui veut descendre avec moi dans le camp vers Saül ? Abishaï répondit : Moi, je descendrai avec toi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David et Abishaï allèrent de nuit vers le peuple. Saül était couché et dormait au milieu du camp, sa lance était plantée en terre, près de sa tête. Abner et le peuple étaient couchés autour de lui. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'a livré…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 24.5+,19+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: laisse-moi… avec ma lance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que je le frappe de la lance en terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. 2S 16.9 ; Lc 9.54.
      marker-yv: yv-n
    - type: text
      text: 'Abishaï dit à David : Aujourd''hui Dieu t''a livré ton ennemi ; laisse-moi, je te prie, le clouer à terre avec ma lance, d''un seul coup ; je n''aurai pas à lui en donner un second ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne le fais pas périr
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne le détruis pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ps 57.1 ; 58.1 ; 59.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: porter la main sur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 24.7s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''homme qui a reçu '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 9.16 ; 10.1 ; 15.1,17.'
      marker-yv: yv-n
    - type: text
      text: 'Mais David dit à Abishaï : Ne le fais pas périr ! Qui donc pourrait porter la main sur l''homme qui a reçu l''onction du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et être déclaré innocent ? '
