          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Saül descendit au désert de Ziph, avec trois mille hommes de l''élite d''Israël, pour chercher David dans le désert de Ziph. '
