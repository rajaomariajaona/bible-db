document_id: 1SA.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Au désert de Ziph : David épargne de nouveau Saül'
  - type: text
    content: ' '
  - type: note
    content: Cf. 23.19n.
  - type: text
    content: 'Les Ziphites se rendirent auprès de Saül, à Guibéa, et dirent : David est caché dans les collines de Hakila, en face de la terre aride. '
  '10':
  - type: note
    content: 'Par la vie du Seigneur  : cf. 14.39n. –  au Seigneur seul de le frapper  : cf. 25.38ns ; Ps 94.23 ; Rm 12.19. –  que son jour vienne  : il s''agit du jour de la mort naturelle ; cf. Ps 37.13 ; Jb 14.5 ; Ec 3.2 ; 9.12. –  au combat  : cf. 31.6. –  soit emporté 12.25n  ; 27.1.'
  - type: text
    content: 'Et David dit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', c''est au '
  - type: text
    content: Seigneur
  - type: text
    content: ' seul de le frapper, soit que son jour vienne et qu''il meure, soit qu''il descende au combat et qu''il y soit emporté. '
  '11':
  - type: note
    content: 'Cf. 24.5+. –  Jamais…  : cf. 2.30n  ; 24.7. –  lance  : cf. 17.54 ; 18.4 ; 31.10.'
  - type: text
    content: 'Jamais ! Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me garde de porter la main sur l''homme qui a reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Maintenant, je te prie, prends la lance qui est près de sa tête, avec la cruche d''eau, et allons-nous-en. '
  '12':
  - type: note
    content: 'une torpeur venant du Seigneur  : litt. une torpeur de YHWH (c.-à-d. un profond sommeil, un sommeil surnaturel) ; même terme hébreu en Gn 2.21 ; 15.12 ; Es 29.10 ; Jb 4.13 ; 33.15 ; Pr 19.15.'
  - type: text
    content: 'David prit donc la lance et la cruche d''eau qui étaient près de la tête de Saül, et ils s''en allèrent. Personne ne les vit, personne n''en eut connaissance, personne ne se réveilla, car ils dormaient tous. En effet, une torpeur venant du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était tombée sur eux.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'passa de l''autre côté  : dans cette région de Hakila, Saül a installé son camp sur une colline (v. 3) ; David et Abishaï franchissent le vallonnement et grimpent au sommet de la colline voisine. Cf. Jg 9.7.'
  - type: text
    content: 'David passa de l''autre côté et s''arrêta à bonne distance, au sommet de la colline voisine ; il y avait beaucoup d''espace entre eux. '
  '14':
  - type: note
    content: 'vers le roi  : les mots correspondants sont absents de certains mss de LXX.'
  - type: text
    content: 'David cria vers le peuple et vers Abner, fils de Ner : Ne répondras-tu pas, Abner ? Abner répondit : Qui es-tu, toi qui pousses des cris vers le roi ? '
  '15':
  - type: note
    content: 'N''es-tu pas un homme ? Qui est ton pareil en Israël ? Ces deux questions, rhétoriques, équivalent en fait à des affirmations renforcées  : tu es un homme, n''est-ce pas (et non pas une femmelette), tu n''as pas ton pareil en Israël ! –  gardé ou protégé  ; de même au v. 16.'
  - type: text
    content: 'David dit à Abner : N''es-tu pas un homme ? Qui est ton pareil en Israël ? Pourquoi donc n''as-tu pas gardé le roi, ton seigneur ? Quelqu''un du peuple est venu pour faire périr le roi ! '
  '16':
  - type: note
    content: 'Par la vie du Seigneur  : cf. 14.39n. –  vous méritez la mort  : cf. 20.31n. –  l''homme qui a reçu…  : cf. 24.7,11. –  Regarde maintenant où sont… ! ou regarde maintenant : où sont… ?'
  - type: text
    content: 'Ce que tu as fait là n''est pas bien. Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous méritez la mort, pour n''avoir pas gardé votre seigneur, l''homme qui a reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Regarde maintenant où sont la lance du roi et la cruche d''eau qui étaient près de sa tête !'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Voir 24.17.
  - type: text
    content: 'Saül reconnut la voix de David ; il dit : Est-ce bien ta voix, David, mon fils ? Et David répondit : C''est ma voix, ô roi, mon seigneur ! '
  '18':
  - type: note
    content: 'me poursuis-tu ? cf. 24.10-12. –  En quoi…  : litt. qu''y a-t-il de mauvais dans ma main ?'
  - type: text
    content: 'Et il dit : Pourquoi me poursuis-tu ? Qu''ai-je fait ? En quoi me suis-je mal conduit ? '
  '19':
  - type: note
    content: 'si c''est le Seigneur qui t''incite à me faire du tort  : cf. 2S 16.10. –  qu''il accepte une offrande  : litt. qu''il respire une offrande  ; l''offrande faite au Seigneur était brûlée sur l''autel, afin que le Seigneur en apprécie l''agréable odeur ; cf. Gn 8.21 ; Lv 2.2 ; Ps 20.4 ; voir sacrifices. –  des humains  : litt. des fils de l''homme ou les fils de l''homme. –  qu''ils soient maudits devant le Seigneur  : cf. Jos 6.26. –  pour me détacher du patrimoine du Seigneur  : litt. d''avoir une part dans le patrimoine de YHWH  ; le verbe (avoir une part) figure déjà en 2.36 (attache-moi) ; le patrimoine du Seigneur est tout à la fois le peuple d''Israël et le pays d''Israël. –  Seigneur (YHWH)  : voir noms divins. –  Va servir d''autres dieux  : dans l''Antiquité, on concevait souvent qu''une divinité était liée à un pays, à un territoire ; un homme chassé de son pays était en quelque sorte condamné à ne plus pouvoir servir son (ou ses) dieu(x), et par conséquent était obligé d''en servir d''autres. Cf. 2R 5.17 (Naaman veut emporter de la terre d''Israël pour offrir, en Syrie, des sacrifices au Dieu d''Israël) ; 17.26-28 ; Ps 137.4. Cf. Dt 13.2s ; Jg 3.6n.'
  - type: text
    content: 'Maintenant, ô roi, mon seigneur, écoute-moi, je te prie : si c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui t''incite à me faire du tort, qu''il accepte une offrande ; mais si ce sont des humains, qu''ils soient maudits devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', puisqu''ils me chassent aujourd''hui pour me détacher du patrimoine du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), en disant : « Va servir d''autres dieux ! » '
  '2':
  - type: note
    content: 'Cf. 23.24s. –  trois mille hommes  : cf. 13.2n.'
  - type: text
    content: 'Saül descendit au désert de Ziph, avec trois mille hommes de l''élite d''Israël, pour chercher David dans le désert de Ziph. '
  '20':
  - type: note
    content: 'que mon sang ne tombe pas à terre  : cf. Gn 4.10 ; 2R 9.26 ; Ap 6.10. –  loin de la face du Seigneur  : cf. Lv 26.38 ; Jr 22.12. –  puce / perdrix  : cf. 24.15.'
  - type: text
    content: 'Oh ! que mon sang ne tombe pas à terre loin de la face du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Car le roi d''Israël est parti en guerre pour chercher une simple puce, comme on chasserait une perdrix dans les montagnes. '
  '21':
  - type: note
    content: 'J''ai péché 15.24+ ; cf. 24.18. –  stupidement  : cf. 13.13+.'
  - type: text
    content: 'Saül dit : J''ai péché ; reviens, David, mon fils ! Je ne te ferai plus de mal, puisqu''en ce jour ma vie a été précieuse à tes yeux. J''ai agi stupidement, j''ai commis une grande erreur. '
  '22':
  - type: note
    content: Voici la lance du roi ou voici la lance, ô roi.
  - type: text
    content: 'David répondit : Voici la lance du roi ; que l''un de tes serviteurs vienne la prendre. '
  '23':
  - type: note
    content: 'Cf. 24.16. –  sa justice et sa probité  : cf. Ps 7.9 ; 18.21-27. –  t''avait livré  : cf. 24.5+. –  l''homme qui a reçu…  : cf. 2.10n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rendra à chacun selon sa justice et sa probité ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''avait livré aujourd''hui à moi, et je n''ai pas voulu porter la main sur l''homme qui a reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '24':
  - type: note
    content: 'd''un grand prix  : litt. grande. –  aux yeux du Seigneur  : cf. Ps 72.14 ; 116.15. –  il me délivrera de toute détresse  : cf. 2S 4.9 ; 22.1 ; Ps 34.20 ; 2Co 1.10 ; 2Tm 4.18.'
  - type: text
    content: 'Et comme en ce jour ta vie a été d''un grand prix à mes yeux, ainsi ma vie sera d''un grand prix aux yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et il me délivrera de toute détresse. '
  '25':
  - type: note
    content: 'Sois béni  : cf. 15.13n  ; 25.32n. –  David, mon fils 24.17 ; cf. 24.12n. –  Tout ce que tu feras…  : autre traduction tu agiras et tu réussiras  ; cf. Jos 1.8 ; Ps 1.3 ; Jb 22.28. –  chez lui  : litt. à son lieu. –  Séparation  : voir 24.23.'
  - type: text
    content: 'Saül dit à David : Sois béni, David, mon fils ! Tout ce que tu feras, tu le réussiras ! David continua son chemin, et Saül rentra chez lui.'
  '3':
  - type: note
    content: 'au bord de la route  : litt. sur la route  ; alors que David et ses hommes se déplacent sans problème dans le désert, Saül et son armée préfèrent rester à proximité des voies de communication. –  S''étant aperçu…  : litt. il vit que Saül venait derrière lui vers le désert ou était arrivé après lui dans le désert  ; toutefois le v. 4 montre bien que David n''a pas vu de ses yeux l''arrivée de Saül, mais qu''il en a été informé, puisqu''il en cherche la confirmation.'
  - type: text
    content: 'Il installa son campement dans les collines de Hakila, en face de la terre aride, au bord de la route. David habitait alors dans le désert. S''étant aperçu que Saül le poursuivait jusqu''au désert, '
  '4':
  - type: note
    content: 'effectivement  : expression hébraïque rendue par à l''endroit convenu en 23.23n.'
  - type: text
    content: 'il envoya des espions et sut ainsi que Saül était effectivement arrivé. '
  '5':
  - type: note
    content: 'Abner 14.50n. –  au milieu du camp  : cf. 17.20n.'
  - type: text
    content: Alors David parvint au lieu où Saül campait. Il vit le lieu où couchait Saül, ainsi qu'Abner, fils de Ner, chef de son armée. Saül couchait au milieu du camp, et le peuple campait autour de lui.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ahimélek, le Hittite n''est jamais mentionné ailleurs, mais on trouvera un autre Hittite, Urie, dans l''entourage militaire de David, cf. 2S 11 ; 23.39. –  Abishaï  : cf. 2S 2.24 ; 23.18 ; il était un neveu de David, sa mère Tserouya étant une sœur de David, cf. 1Ch 2.16. –  Qui veut descendre avec moi… ? cf. Jg 7.9-11.'
  - type: text
    content: 'David demanda à Ahimélek, le Hittite, et à Abishaï, fils de Tserouya et frère de Joab : Qui veut descendre avec moi dans le camp vers Saül ? Abishaï répondit : Moi, je descendrai avec toi. '
  '7':
  - type: text
    content: 'David et Abishaï allèrent de nuit vers le peuple. Saül était couché et dormait au milieu du camp, sa lance était plantée en terre, près de sa tête. Abner et le peuple étaient couchés autour de lui. '
  '8':
  - type: note
    content: 't''a livré…  : cf. 24.5+,19+. –  laisse-moi… avec ma lance  : litt. que je le frappe de la lance en terre. Cf. 2S 16.9 ; Lc 9.54.'
  - type: text
    content: 'Abishaï dit à David : Aujourd''hui Dieu t''a livré ton ennemi ; laisse-moi, je te prie, le clouer à terre avec ma lance, d''un seul coup ; je n''aurai pas à lui en donner un second ! '
  '9':
  - type: note
    content: 'Ne le fais pas périr  : litt. ne le détruis pas  ; cf. Ps 57.1 ; 58.1 ; 59.1. –  porter la main sur  : cf. 24.7s. –  l''homme qui a reçu l''onction…  : cf. 2.10n  ; 9.16 ; 10.1 ; 15.1,17.'
  - type: text
    content: 'Mais David dit à Abishaï : Ne le fais pas périr ! Qui donc pourrait porter la main sur l''homme qui a reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et être déclaré innocent ? '
