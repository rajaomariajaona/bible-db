        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'il respire une offrande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; l''offrande faite au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' était brûlée sur l''autel, afin que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' en apprécie l''agréable odeur ; cf. Gn 8.21 ; Lv 2.2 ; Ps 20.4 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des humains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de l''homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les fils de l'homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''ils soient maudits devant le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 6.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour me détacher du patrimoine du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'avoir une part dans le patrimoine de YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avoir une part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) figure déjà en 2.36 (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: attache-moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'patrimoine du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est tout à la fois '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le peuple d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le pays d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Va servir d'autres dieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans l''Antiquité, on concevait souvent qu''une divinité était liée à un pays, à un territoire ; un homme chassé de son pays était en quelque sorte condamné à ne plus pouvoir servir son (ou ses) dieu(x), et par conséquent était obligé d''en servir d''autres. Cf. 2R 5.17 (Naaman veut emporter de la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'terre d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pour offrir, en Syrie, des sacrifices au '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; 17.26-28 ; Ps 137.4. Cf. Dt 13.2s ; Jg 3.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, ô roi, mon seigneur, écoute-moi, je te prie : si c''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui t''incite à me faire du tort, qu''il accepte une offrande ; mais si ce sont des humains, qu''ils soient maudits devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', puisqu''ils me chassent aujourd''hui pour me détacher du patrimoine du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), en disant : « Va servir d''autres dieux ! » '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 23.24s. –  '
      - type: usfm
        marker: fq
        children:
