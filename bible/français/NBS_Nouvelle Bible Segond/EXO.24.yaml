    marker-yv: yv-n
  - type: text
    text: 'Moïse vint rapporter au peuple toutes les paroles du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et toutes les règles. Tout le peuple répondit d''une seule voix : Tout ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a dit, nous le ferons. '
  - type: usfm
    marker: v
