    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous obéirons ; nous entendrons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; la tradition juive insiste sur la priorité de la mise en pratique sur l''écoute dans la formulation de ce texte ; cf. Jos 24.24.'
    marker-yv: yv-n
  - type: text
    text: 'Il prit le livre de l''alliance et le lut au peuple ; ils dirent : Tout ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a dit, nous le ferons et nous l''écouterons. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
