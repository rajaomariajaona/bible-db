      marker: fr
      children:
      - type: text
        text: '24.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bassines
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir Ct 7.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
