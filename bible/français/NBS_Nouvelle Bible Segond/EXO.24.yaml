  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Puis il se leva de bon matin ; il bâtit un autel au pied de la montagne, avec douze pierres levées pour les douze tribus d''Israël. '
  - type: usfm
    marker: v
    metadata:
