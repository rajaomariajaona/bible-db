        text: d'après.
    marker-yv: yv-n
  - type: text
    text: 'Moïse prit le sang et en aspergea le peuple, en disant : Voici le sang de l''alliance que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a conclue avec vous sur toutes ces paroles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moïse monta avec Aaron, Nadab, Abihou et soixante-dix des anciens d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
