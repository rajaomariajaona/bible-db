document_id: EXO.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu conclut l'alliance avec Israël
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 19.10-25. –  Il avait dit  : c.-à-d. Dieu avait dit (ou dit ). –  Aaron  : voir prêtre. –  Nadab / Abihou 6.23.'
  - type: text
    content: 'Il avait dit à Moïse : Monte vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', toi, Aaron, Nadab, Abihou et soixante-dix des anciens d''Israël ; vous vous prosternerez à distance. '
  '10':
  - type: note
    content: 'de lapis-lazuli étincelant  : litt. de brique (cf. 1.14 etc.) de lapis-lazuli (hébreu sappir, d''où vient notre mot saphir, cf. Ap 21.19, mais qui désignait plus probablement à l''origine le lapis-lazuli, une autre pierre également bleue ; le terme se retrouve en 28.18 ; 39.11 ; Es 54.11 ; Ez 1.26+ ; Jb 28.6,16 ; Ct 5.14 ; Lm 4.7). Le mot hébreu correspondant à brique est proche de la racine évoquant la blancheur ou la clarté. Cf. Ez 1.26 ; voir aussi Jb 37.22 ; Ap 4.2s.'
  - type: text
    content: 'Ils virent le Dieu d''Israël ; sous ses pieds, c''était comme un ouvrage de lapis-lazuli étincelant, comme le ciel lui-même dans sa pureté. '
  '11':
  - type: note
    content: 'l''élite  : le terme hébreu correspondant est très rare et son sens est incertain ; Tg les jeunes gens  ; cf. v. 9. –  Ils virent ou ils contemplèrent  ; autre verbe qu''au v. 10 ; on le retrouve en Ps 63.3 ; Jb 19.26s ; voir aussi Es 17.7s ; 24.23. –  mangèrent et burent  : repas rituel d''alliance, cf. 18.12+ ; Es 25.6.'
  - type: text
    content: Il n'étendit pas la main sur l'élite des Israélites. Ils virent Dieu, puis ils mangèrent et burent.
  - type: heading
    content: Moïse rencontre Dieu sur la montagne
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Les mots correspondants à loi et instruire sont apparentés. Au lieu de pour les instruire (les Israélites), on pourrait comprendre pour les enseigner ( la loi et le commandement ). –  que j''ai écrits  : cf. v. 4 ; voir aussi 31.18 ; 32.15s ; 34.1,28 ; Dt 10.4s ; 1R 8.9.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Monte vers moi, dans la montagne, et reste là ; je te donnerai des tablettes de pierre, la loi et le commandement que j''ai écrits pour les instruire. '
  '13':
  - type: note
    content: 'Moïse…  : litt. Moïse se leva, et Josué… et Moïse monta. Sur Josué, voir 17.9+ ; 32.17 ; 33.11 ; Nb 11.28 ; 13.8,16n  ; 14.6 ; Dt 34.9 ; Jos 1.1. –  auxiliaire  : le terme correspondant est une forme du verbe traduit par officier en 28.35,43 etc. ; cf. Gn 39.4n  ; Nb 3.6n.'
  - type: text
    content: 'Moïse et Josué, son auxiliaire, montèrent dans la montagne de Dieu. '
  '14':
  - type: note
    content: 'Aaron  : cf. chap. 32.'
  - type: text
    content: 'Il dit aux anciens : Attendez-nous ici, jusqu''à ce que nous revenions auprès de vous. Aaron et Hour sont avec vous ; si quelqu''un a une affaire à régler, qu''il s''adresse à eux. '
  '15':
  - type: note
    content: nuée 13.21n.
  - type: text
    content: 'Moïse monta dans la montagne, et la nuée couvrit la montagne. '
  '16':
  - type: note
    content: 'gloire 16.7+. –  de l''intérieur  : cf. v. 18.'
  - type: text
    content: 'La gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' demeura sur le mont Sinaï, et la nuée le couvrit pendant six jours. Le septième jour, il appela Moïse de l''intérieur de la nuée. '
  '17':
  - type: note
    content: 'aspect  : cf. 3.3n.'
  - type: text
    content: 'L''aspect de la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était, sous les yeux des Israélites, comme un feu dévorant au sommet de la montagne. '
  '18':
  - type: note
    content: 'nuée  : cf. Mt 17.1-8/ / ; Siracide 45.5 : « Il lui fit entendre sa voix (à Moïse) et l''introduisit dans la nuée. Il lui donna face à face les commandements. » –  quarante jours… 34.28 ; Dt 9.9 ; 1R 19.8 ; Mt 4.2/ /.'
  - type: text
    content: Moïse pénétra à l'intérieur de la nuée et monta dans la montagne. Moïse fut dans la montagne quarante jours et quarante nuits.
  '2':
  - type: text
    content: 'Moïse seul s''approchera du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; les autres ne s''approcheront pas, et le peuple ne montera pas avec lui. '
  '3':
  - type: note
    content: 'paroles / règles 20.1 ; 21.1 ; voir loi. –  Tout ce que le Seigneur a dit  : autre traduction toutes les paroles que le Seigneur a dites.'
  - type: text
    content: 'Moïse vint rapporter au peuple toutes les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et toutes les règles. Tout le peuple répondit d''une seule voix : Tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit, nous le ferons. '
  '4':
  - type: note
    content: 'Moïse écrivit 17.14+ ; cf. 24.12. –  douze pierres levées  : cf. Jos 4.3-9,20-24 ; 1R 18.31.'
  - type: text
    content: 'Moïse écrivit toutes les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Puis il se leva de bon matin ; il bâtit un autel au pied de la montagne, avec douze pierres levées pour les douze tribus d''Israël. '
  '5':
  - type: note
    content: 'Cf. Ps 50.5. –  de jeunes Israélites  : autre traduction des serviteurs des Israélites. – Voir sacrifices, paix.'
  - type: text
    content: 'Il envoya de jeunes Israélites offrir des holocaustes et des sacrifices de paix au '
  - type: text
    content: Seigneur
  - type: text
    content: ', des taureaux. '
  '6':
  - type: note
    content: 'bassines  : cf. 12.22n  ; voir Ct 7.3n. –  aspergea  : cf. v. 8 ; 27.3 ; 29.16,20 (autre verbe au v. 21) ; Lv 1.5n.'
  - type: text
    content: 'Moïse prit la moitié du sang, qu''il mit dans des bassines ; de l''autre moitié du sang il aspergea l''autel. '
  '7':
  - type: note
    content: 'livre de l''alliance 2R 23.2,21 ; 2Ch 25.4 ; 34.30 ; 35.12. –  au peuple 11.2n. –  nous l''écouterons  : autres traductions nous obéirons ; nous entendrons  ; la tradition juive insiste sur la priorité de la mise en pratique sur l''écoute dans la formulation de ce texte ; cf. Jos 24.24.'
  - type: text
    content: 'Il prit le livre de l''alliance et le lut au peuple ; ils dirent : Tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit, nous le ferons et nous l''écouterons. '
  '8':
  - type: note
    content: 'le sang de l''alliance Hé 9.19-20  ; cf. Mt 26.28/ / ; Hé 10.29 ; 13.20. –  sur  : autre traduction d''après.'
  - type: text
    content: 'Moïse prit le sang et en aspergea le peuple, en disant : Voici le sang de l''alliance que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a conclue avec vous sur toutes ces paroles.'
  '9':
  - type: text
    content: 'Moïse monta avec Aaron, Nadab, Abihou et soixante-dix des anciens d''Israël. '
