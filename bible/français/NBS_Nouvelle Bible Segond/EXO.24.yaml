      marker: fr
      children:
      - type: text
        text: '24.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' de l''alliance '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hé 9.19-20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Mt 26.28/ / ; Hé 10.29 ; 13.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur
    - type: usfm
      marker: ft
      children:
      - type: text
