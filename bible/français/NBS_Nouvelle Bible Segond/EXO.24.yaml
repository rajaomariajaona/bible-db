      children:
      - type: text
        text: ' : cf. v. 4 ; voir aussi 31.18 ; 32.15s ; 34.1,28 ; Dt 10.4s ; 1R 8.9.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : Monte vers moi, dans la montagne, et reste là ; je te donnerai des tablettes de pierre, la loi et le commandement que j''ai écrits pour les instruire. '
  - type: usfm
    marker: v
