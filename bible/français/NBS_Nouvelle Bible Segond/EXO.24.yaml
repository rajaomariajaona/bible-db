      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Moïse…
    - type: usfm
