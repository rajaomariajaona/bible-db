    marker-yv: yv-n
  - type: text
    text: 'Moïse prit la moitié du sang, qu''il mit dans des bassines ; de l''autre moitié du sang il aspergea l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'livre de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'alliance
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2R 23.2,21 ; 2Ch 25.4 ; 34.30 ; 35.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au peuple '
    - type: usfm
      marker: ft
