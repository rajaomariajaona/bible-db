    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aaron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. chap. 32.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit aux anciens : Attendez-nous ici, jusqu''à ce que nous revenions auprès de vous. Aaron et Hour sont avec vous ; si quelqu''un a une affaire à régler, qu''il s''adresse à eux. '
