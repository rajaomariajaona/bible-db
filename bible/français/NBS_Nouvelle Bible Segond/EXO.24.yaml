    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de lapis-lazuli étincelant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de brique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 1.14 etc.) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de lapis-lazuli '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sappir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''où vient notre mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: saphir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ap 21.19, mais qui désignait plus probablement à l''origine le lapis-lazuli, une autre pierre également bleue ; le terme se retrouve en 28.18 ; 39.11 ; Es 54.11 ; Ez 1.26+ ; Jb 28.6,16 ; Ct 5.14 ; Lm 4.7). Le mot hébreu correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est proche de la racine évoquant la blancheur ou la clarté. Cf. Ez 1.26 ; voir aussi Jb 37.22 ; Ap 4.2s.
    marker-yv: yv-n
  - type: text
    text: 'Ils virent le Dieu d''Israël ; sous ses pieds, c''était comme un ouvrage de lapis-lazuli étincelant, comme le ciel lui-même dans sa pureté. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'élite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu correspondant est très rare et son sens est incertain ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les jeunes gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils virent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils contemplèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre verbe qu''au v. 10 ; on le retrouve en Ps 63.3 ; Jb 19.26s ; voir aussi Es 17.7s ; 24.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mangèrent et burent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : repas rituel d''alliance, cf. 18.12+ ; Es 25.6.'
    marker-yv: yv-n
  - type: text
    text: Il n'étendit pas la main sur l'élite des Israélites. Ils virent Dieu, puis ils mangèrent et burent.
- type: usfm
