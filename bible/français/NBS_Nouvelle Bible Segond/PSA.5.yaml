      text: Demande-leur réparation, ô Dieu !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que leurs desseins amènent leur chute !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rejette-les à cause de leurs transgressions sans nombre,
  - type: usfm
    marker: q1
