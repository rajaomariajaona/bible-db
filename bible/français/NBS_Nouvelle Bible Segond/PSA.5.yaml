document_id: PSA.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'un homme reçu dans la maison du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'flûtes  : traduction incertaine ; le mot hébreu n''apparaît qu''ici sous cette forme.'
  - type: text
    content: Du chef de chœur. Avec les flûtes. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'dans leur bouche  : litt. dans sa bouche , mais la suite demande le pluriel, cf. 10.7 ; 36.4. –  Leur sein ou leurs entrailles, leur intérieur (cf. 55.12). –  n''est que ruine  : autres traductions n''est qu''un gouffre, n''est que perfidie (même terme en 52.4). –  leur gosier… Rm 3.13. –  se fait glissante  : litt. ils la rendent glissante  ; au sens figuré, le terme correspondant peut évoquer la flatterie, des paroles enjôleuses ou complaisantes (12.3s ; 36.3n) ; cf. 10.7 ; 31.21 ; 50.19 ; 52.4 ; 55.22 ; 64.4 ; 109.2 ; 120.2s ; 140.4 ; Es 59.3 ; Jr 9.2,7 ; Os 10.2n  ; Pr 2.16 ; 7.5 ; 28.23 ; Jc 3.6.'
  - type: text
    content: Car il n'y a rien de sûr dans leur bouche.
  - type: text
    content: Leur sein n'est que ruine,
  - type: text
    content: leur gosier est une tombe ouverte,
  - type: text
    content: et leur langue se fait glissante.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '69.28s. –  Demande-leur réparation  : autres traductions fais-les payer, condamne-les, traite-les en coupables  ; cf. 34.22s ; Es 24.6 ; Os 10.2n.'
  - type: text
    content: Demande-leur réparation, ô Dieu !
  - type: text
    content: Que leurs desseins amènent leur chute !
  - type: text
    content: Rejette-les à cause de leurs transgressions sans nombre,
  - type: text
    content: car ils se rebellent contre toi !
  '12':
  - type: text
    content: ' '
  - type: note
    content: '64.11. –  leur vie sera toujours un cri de joie  : litt. ils crieront (de joie) pour toujours. –  ceux qui aiment ton nom 69.37 ; 119.132.'
  - type: text
    content: Alors tous ceux qui trouvent en toi un abri se réjouiront ;
  - type: text
    content: leur vie sera toujours un cri de joie.
  - type: text
    content: Tu les protégeras, et ils exulteront en toi,
  - type: text
    content: ceux qui aiment ton nom.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'comme un grand bouclier  : autre traduction comme d''un grand bouclier  ; autre mot qu''en 3.4+ ; il s''agit ici du bouclier qui protège la totalité du corps ; cf. 35.2 ; 91.4 ; 1S 17.7,41 ; 1R 10.16s ; Jr 46.3 ; Ez 23.24 ; 26.8 ; 38.4 ; 39.9. –  tu l''entoures  : autre traduction tu le couronnes (cf. 8.6 ; 65.12 ; 103.4).'
  - type: text
    content: 'Car toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu bénis le juste ;'
  - type: text
    content: comme un grand bouclier tu l'entoures de faveur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 17.1 ; 31.3 ; 39.13 ; 54.4 ; 55.2s ; 84.9 ; 86.1,6 ; 88.3 ; 102.3 ; 140.7 ; 141.1 ; 143.1. –  mon murmure ou mon gémissement.
  - type: text
    content: 'Prête l''oreille à mes paroles, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: comprends mon murmure !
  '3':
  - type: text
    content: ' '
  - type: note
    content: Sois attentif 61.2 ; 66.19 ; 86.6 ; 102.18 ; 130.2 ; 142.7 ; Né 1.6. –  mon roi, mon Dieu 84.4 ; cf. 44.5 ; 68.25 ; 74.12 ; 145.1.
  - type: text
    content: Sois attentif à mes appels au secours, mon roi, mon Dieu !
  - type: text
    content: C'est à toi que j'adresse ma prière.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'le matin 30.6+ ; 59.17 ; 88.14. –  je me présente à toi  : traduction incertaine ; on pourrait aussi comprendre  : je te présente un sacrifice  ; cf. Lv 6.5 ; Nb 23.1ss. –  je guette  : même verbe 37.32 ( épier ) ; 66.7 ( surveiller ) ; cf. Mi 7.7 ; Ha 2.1.'
  - type: text
    content: Seigneur
  - type: text
    content: ', le matin tu m''entends ;'
  - type: text
    content: le matin je me présente à toi et je guette.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'tu n''es pas… 2Ch 19.7. –  un Dieu  : hébreu ’El , cf. Gn 21.33n. –  le mal  : autre traduction le mauvais  ; cf. Ps 15. –  séjourne  : le verbe ainsi traduit est apparenté au terme habituellement rendu par immigré , cf. Ex 12.48n.'
  - type: text
    content: Car tu n'es pas un Dieu qui prenne plaisir à la méchanceté ;
  - type: text
    content: le mal ne séjourne pas auprès de toi.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ceux qui font les fiers 73.3n  ; 75.5. –  les malfaisants ou ceux qui commettent l'injustice  ; cf. 6.9 ; 14.4 ; 28.3 ; 36.13 ; 53.5 ; 59.3 ; 64.3 ; 92.8ss ; 94.4,16 ; 101.8 ; 125.5 ; 141.4,9 ; voir aussi 7.15+ ; 36.4+ ; Es 31.2n  ; Os 6.8n.
  - type: text
    content: Ceux qui font les fiers ne tiennent pas devant tes yeux ;
  - type: text
    content: tu détestes tous les malfaisants.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'a en abomination  : cf. 31.7 ; 45.8 ; Judith 5.17 : « Ils (les Juifs) ont avec eux un Dieu qui hait l''injustice. » Sagesse 14.9s : « Dieu déteste également l''impie et son impiété, et l''œuvre sera châtiée avec l''ouvrier. » –  sanguinaire et trompeur  : litt. de sangs et de tromperie 55.24 ; cf. 2S 16.7n.'
  - type: text
    content: Tu fais disparaître ceux qui profèrent le mensonge.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a en abomination l''homme sanguinaire et trompeur.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'par ta grande fidélité  : litt. par l''abondance de ta fidélité. –  je viens à ta maison 42.3 ; 66.13 ; 100.4 ; 132.7. –  dans la crainte…  : litt. dans ta crainte. –  je me prosterne devant (ou en direction de ) ton temple sacré…  : cf. 11.4n  ; 28.2 ; 138.2 ; 1R 8.44,48 ; Dn 6.11.'
  - type: text
    content: Mais moi, par ta grande fidélité, je viens à ta maison ;
  - type: text
    content: dans la crainte qui t'est due, je me prosterne devant ton temple sacré.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'conduis-moi 27.11 ; 61.3 ; 119.35 ; 139.24 ; cf. 25.5. –  aplanis ta voie…  : certains, d''après quelques mss hébreux et grecs, modifient le texte hébreu traditionnel pour lire aplanis ma voie devant toi  ; cf. 25.12 ; 32.8s ; Es 45.13 ; Os 14.10 ; Pr 3.6 ; 11.5.'
  - type: text
    content: Seigneur
  - type: text
    content: ', conduis-moi dans ta justice, à cause de mes détracteurs ;'
  - type: text
    content: aplanis ta voie devant moi.
