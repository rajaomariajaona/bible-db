document_id: 2SA.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David décide d'amener le Coffre à Jérusalem
  - type: heading
    content: 1Ch 13.1-14
  - type: text
    content: ' '
  - type: note
    content: 'rassembla  : le verbe hébreu correspondant peut aussi être compris dans le sens de recommença (encore avec toute l''élite…) . –  encore  : cet adverbe renvoie à une autre (ou d''autres) occasion(s) antérieure(s), non précisée(s). –  trente mille  : certains mss grecs et latins parlent de soixante-dix mille.'
  - type: text
    content: 'David rassembla encore toute l''élite d''Israël, au nombre de trente mille hommes ; '
  '10':
  - type: note
    content: 'Ville de David  : cf. 5.7n. –  Obed-Edom, le Gatite (c.-à-d. originaire de Gath, une ville philistine où David s''était fait des amis, sans forcément y habiter) ; cf. Jos 13.3n  ; voir 1S 27 ; 29 ; 2S 15.18-22 ; selon 1Ch 15–16, Obed-Edom entrera au service du Coffre, à Jérusalem, et sera assimilé aux lévites.'
  - type: text
    content: 'Il ne voulut pas prendre le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' chez lui, dans la Ville de David, et il le fit conduire dans la maison d''Obed-Edom, le Gatite. '
  '11':
  - type: note
    content: 'le Seigneur bénit  : cf. Gn 1.28 ; 12.2s ; 39.5 ; Dt 7.13 ; Jg 13.24 ; Ps 5.13 ; Jb 42.12 ; Pr 3.33 ; 2Ch 31.10. –  bénit Obed-Edom  : cf. 1Ch 26.4s.'
  - type: text
    content: 'Le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' resta trois mois dans la maison d''Obed-Edom, le Gatite, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' bénit Obed-Edom et toute sa maison.'
  - type: heading
    content: Arrivée du Coffre à Jérusalem
  - type: heading
    content: 1Ch 15.25–16.3
  '12':
  - type: text
    content: 'On dit au roi David : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a béni la maison d''Obed-Edom et tout ce qui lui appartient, à cause du coffre de Dieu. Alors David se mit en route et, dans la joie, il fit monter le coffre de Dieu depuis la maison d''Obed-Edom jusqu''à la Ville de David. '
  '13':
  - type: note
    content: 'un taureau et une bête grasse  : un ms de Qumrân parle de sept taureaux et sept béliers, comme le texte parallèle de 1Ch 15.26. Cf. 1R 8.5.'
  - type: text
    content: 'Quand ceux qui portaient le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' eurent fait six pas, il sacrifia un taureau et une bête grasse. '
  '14':
  - type: note
    content: 'dansait  : le verbe hébreu indique une danse tournoyante ; de même au v. 16. Cf. Ex 15.20 ; Ps 31.8 ; 149.3 ; 150.4. –  portait…  : litt. était ceint d''un éphod de lin  ; cf. Ex 25.7n  ; 1S 2.18n.'
  - type: text
    content: 'David dansait de toute sa force devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; David portait un éphod de lin comme un pagne. '
  '15':
  - type: note
    content: 'au son de la trompe  : cf. Ps 47.6 ; 98.6.'
  - type: text
    content: 'David et toute la maison d''Israël firent monter le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec des acclamations et au son de la trompe.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Mikal  : cf. 1S 18.20-28. –  sauter  : autre traduction se démener  ; une autre forme du même verbe évoque l''agilité en Gn 49.24. –  danser v. 14n. –  méprisa  : cf. 1S 17.42n.'
  - type: text
    content: 'Comme le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' entrait dans la Ville de David, Mikal, fille de Saül, regardait par la fenêtre ; elle vit le roi David sauter et danser devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et elle le méprisa dans son cœur.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'en son lieu  : autre traduction à sa place . –  à l''intérieur  : autre traduction au milieu . –  la tente… dressée pour lui  : cf. Ps 132.8. –  des holocaustes et des sacrifices  : cf. 1S 6.14s ; 1R 8.62-64.'
  - type: text
    content: 'Après qu''on eut amené le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', on le plaça en son lieu, à l''intérieur de la tente que David avait dressée pour lui ; et David offrit devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' des holocaustes et des sacrifices de paix. '
  '18':
  - type: note
    content: bénit 1R 8.14,55 ; cf. Lv 9.22s ; Nb 6.22-27 ; 2Ch 30.27.
  - type: text
    content: 'Quand David eut achevé d''offrir l''holocauste et les sacrifices de paix, il bénit le peuple au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées. '
  '19':
  - type: note
    content: 'il distribua…  : cf. 2Ch 30.24 ; 35.7. –  un gâteau de dattes  : le sens du mot hébreu correspondant (qui n''apparaît qu''ici et dans le passage parallèle de 1Ch 16.3) est très incertain.'
  - type: text
    content: Puis il distribua à tout le peuple, à toute la multitude d'Israël, hommes et femmes, à chacun un gâteau de pain, un gâteau de dattes et un gâteau de raisins. Et tout le peuple s'en alla chacun chez soi.
  '2':
  - type: note
    content: 'Baalé-Juda  : probablement Qiriath-Yéarim, voir Jos 15.9,60 ; 18.14 ; 1S 6.21 ; 7.1. –  le coffre de Dieu 1S 4.1–7.1. –  du Seigneur … des Armées  : cf. 1S 1.3n. –  keroubim  : cf. 1S 4.4+. –  au-dessus du Coffre  : litt. sur lui.'
  - type: text
    content: 'David, et tout le peuple qui était avec lui, partit de Baalé-Juda pour en faire monter le coffre de Dieu sur lequel est invoqué le Nom, le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, qui est assis sur les keroubim, au-dessus du Coffre. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'bénir sa maison (cf. 7.11n) : voir Gn 49.28 ; 1Ch 16.43. –  exposé ou dévêtu  : l''officiant du culte sacrificiel ne portait sans doute qu''un minimum de vêtements (cf. Ex 28.42s) ; David, qui a accompli certains rites religieux en tant que roi, se voit reprocher par Mikal une tenue qu''elle juge inconvenante. –  un homme de rien  : cf. Jg 9.4n  ; 11.3.'
  - type: text
    content: 'David revint pour bénir sa maison, et Mikal, fille de Saül, sortit à sa rencontre. Elle dit : Quelle gloire aujourd''hui pour le roi d''Israël de s''être exposé aux yeux des servantes de ses gens comme s''exposerait un homme de rien ! '
  '21':
  - type: note
    content: 'que j''ai agi ainsi  : ces quelques mots sont sous-entendus en hébreu ; LXX que je danserai. Béni soit le Seigneur, lui qui… –  qui m''a choisi 1S 13.14 ; 16.1-13. –  toute sa maison  : autre traduction toute ta famille. –  chef  : cf. 1S 9.16n. –  jouer de la musique  : le verbe hébreu correspondant (aussi au v. 5) a également été interprété dans le sens de danser  ; LXX en donne une double traduction jouer et danser.'
  - type: text
    content: 'David répondit à Mikal : C''est devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' que j''ai agi ainsi, lui qui m''a choisi de préférence à ton père et à toute sa maison pour m''instituer chef sur le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', Israël, et c''est devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' que je continuerai à jouer de la musique. '
  '22':
  - type: note
    content: 'paraître encore moins  : litt. être encore plus léger  ; la racine hébraïque s''oppose à celle qui évoque la gloire et le poids (cf. ce qui pèse, ce qui compte, ce qui a de la valeur). –  à mes propres yeux  : LXX à tes yeux. Cf. Mt 23.12 ; Lc 17.10n  ; 2Co 12.10 ; Hé 11.26.'
  - type: text
    content: 'Je veux paraître encore moins que cela et m''abaisser à mes propres yeux ; et c''est auprès des servantes dont tu parles que je veux avoir ma gloire. '
  '23':
  - type: note
    content: Voir pourtant 21.8 ; cf. 1S 2.5.
  - type: text
    content: Mikal, fille de Saül, n'eut pas d'enfant jusqu'au jour de sa mort.
  '3':
  - type: note
    content: 'un chariot neuf  : cf. Nb 7.3,9 ; 1S 6.7. –  Abinadab  : cf. 1S 7.1. –  Ouzza  : ce nom rappelle le mot qui signifie puissance en Ps 132.8n. –  Ahio  : certains pensent qu''au lieu du nom propre, le texte primitif disait, avec les mêmes consonnes, son frère ou ses frères (ainsi LXX).'
  - type: text
    content: 'Ils chargèrent le coffre de Dieu sur un chariot neuf et l''emportèrent de la maison d''Abinadab qui est sur la colline ; Ouzza et Ahio, fils d''Abinadab, conduisaient le chariot neuf. '
  '4':
  - type: note
    content: 'Bien des spécialistes pensent que le dernier mot du v. 3 (neuf) et le début du v. 4 (Ils l''emportèrent donc de la maison d''Abinadab qui est sur la colline) résultent d''une erreur de copie (on aurait recopié accidentellement deux fois une phrase du v. 3). Ces mots ne se trouvent pas dans un ms de Qumrân ni dans LXX. Le texte primitif serait … conduisaient le char (4) avec le coffre de Dieu ; Ahio allait devant le Coffre. –  avec le coffre  : certains interprètent Ouzza allait avec le coffre.'
  - type: text
    content: 'Ils l''emportèrent donc de la maison d''Abinadab qui est sur la colline, avec le coffre de Dieu ; Ahio allait devant le Coffre. '
  '5':
  - type: note
    content: Cf. 1S 18.6s ; Ps 68.25s ; 150.
  - type: text
    content: 'David et toute la maison d''Israël jouaient devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur toutes sortes d''instruments en bois de cyprès, sur des lyres, des luths, des tambourins, des sistres et des cymbales.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Nakôn  : endroit non identifié ; cf. 1Ch 13.9 ( Kidôn ). –  la main  : le mot correspondant est absent du texte hébreu traditionnel, mais est attesté dans un ms de Qumrân et dans la plupart des versions anciennes. –  avaient glissé  : le sens du verbe hébreu n''est pas sûr ; on a aussi traduit se relâchaient ; avaient fait un écart ; le faisaient pencher ; l''avaient fait tomber ; allaient le renverser.'
  - type: text
    content: 'Lorsqu''ils arrivèrent à l''aire de Nakôn, Ouzza étendit la main vers le coffre de Dieu et le saisit, parce que les bœufs avaient glissé. '
  '7':
  - type: note
    content: 'se mit en colère  : voir 1S 11.6+. –  insolence  : le mot hébreu correspondant n''apparaît qu''ici dans l''A.T. ; on l''a rapproché du mot traduit par inconsidérément en Dn 3.29 ; dans des versions anciennes il a aussi été rendu par faute, témérité, geste irréfléchi. Le texte parallèle de 1Ch 13.10 dit parce qu''il avait étendu la main vers le Coffre.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre Ouzza, et Dieu l''abattit là, à cause de cette insolence. Ouzza mourut là, près du coffre de Dieu. '
  '8':
  - type: note
    content: Pérets-Ouzza signifie Brèche d'Ouzza  ; en hébreu, le nom Pérets est apparenté à l'expression rendue par avait ouvert une brèche, qui décrit le châtiment d'Ouzza (on pourrait aussi traduire avait éclaté contre Ouzza). Cf. 5.20n  ; Gn 38.29.
  - type: text
    content: 'David se fâcha parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ouvert une brèche en Ouzza ; c''est pourquoi on appelle ce lieu Pérets-Ouzza (« Brèche d''Ouzza »), jusqu''à ce jour. '
  '9':
  - type: note
    content: 'fut saisi par la crainte…  : autre traduction eut peur du Seigneur. David redoute la proximité du Coffre, qui vient de manifester une fois de plus sa puissance insurpassable ; voir 1S 5.10s ; 6.20 ; cf. Lc 5.8s ; Ac 5.5,11.'
  - type: text
    content: 'En ce jour-là, David fut saisi par la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il dit : Comment le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pourrait-il entrer chez moi ? '
