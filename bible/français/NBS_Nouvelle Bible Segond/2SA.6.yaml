    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rassembla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe hébreu correspondant peut aussi être compris dans le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: recommença (encore avec toute l'élite…)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: encore
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cet adverbe renvoie à une autre (ou d''autres) occasion(s) antérieure(s), non précisée(s). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trente mille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss grecs et latins parlent de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soixante-dix mille.
      marker-yv: yv-n
    - type: text
      text: 'David rassembla encore toute l''élite d''Israël, au nombre de trente mille hommes ; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ville de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Obed-Edom, le Gatite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: originaire de Gath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', une ville philistine où David s''était fait des amis, sans forcément y habiter) ; cf. Jos 13.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir 1S 27 ; 29 ; 2S 15.18-22 ; selon 1Ch 15–16, Obed-Edom entrera au service du Coffre, à Jérusalem, et sera assimilé aux lévites.'
      marker-yv: yv-n
    - type: text
      text: 'Il ne voulut pas prendre le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' chez lui, dans la Ville de David, et il le fit conduire dans la maison d''Obed-Edom, le Gatite. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 1.28 ; 12.2s ; 39.5 ; Dt 7.13 ; Jg 13.24 ; Ps 5.13 ; Jb 42.12 ; Pr 3.33 ; 2Ch 31.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bénit Obed-Edom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Ch 26.4s.'
      marker-yv: yv-n
    - type: text
      text: 'Le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' resta trois mois dans la maison d''Obed-Edom, le Gatite, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' bénit Obed-Edom et toute sa maison.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrivée du Coffre à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Ch 15.25–16.3
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'On dit au roi David : Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a béni la maison d''Obed-Edom et tout ce qui lui appartient, à cause du coffre de Dieu. Alors David se mit en route et, dans la joie, il fit monter le coffre de Dieu depuis la maison d''Obed-Edom jusqu''à la Ville de David. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un taureau et une bête grasse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ' parle de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sept taureaux et sept béliers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme le texte parallèle de 1Ch 15.26. Cf. 1R 8.5.'
      marker-yv: yv-n
    - type: text
      text: 'Quand ceux qui portaient le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' eurent fait six pas, il sacrifia un taureau et une bête grasse. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dansait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu indique une danse tournoyante ; de même au v. 16. Cf. Ex 15.20 ; Ps 31.8 ; 149.3 ; 150.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: portait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: était ceint d'un éphod de lin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 25.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 2.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David dansait de toute sa force devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; David portait un éphod de lin comme un pagne. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au son de la trompe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 47.6 ; 98.6.'
      marker-yv: yv-n
    - type: text
      text: 'David et toute la maison d''Israël firent monter le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avec des acclamations et au son de la trompe.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mikal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 18.20-28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sauter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se démener
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; une autre forme du même verbe évoque l''agilité en Gn 49.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'danser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: méprisa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 17.42'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' entrait dans la Ville de David, Mikal, fille de Saül, regardait par la fenêtre ; elle vit le roi David sauter et danser devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et elle le méprisa dans son cœur.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en son lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à sa place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'intérieur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au milieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la tente… dressée pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ps 132.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des holocaustes et des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 6.14s ; 1R 8.62-64.'
      marker-yv: yv-n
    - type: text
      text: 'Après qu''on eut amené le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', on le plaça en son lieu, à l''intérieur de la tente que David avait dressée pour lui ; et David offrit devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' des holocaustes et des sacrifices de paix. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 8.14,55 ; cf. Lv 9.22s ; Nb 6.22-27 ; 2Ch 30.27.
      marker-yv: yv-n
    - type: text
      text: 'Quand David eut achevé d''offrir l''holocauste et les sacrifices de paix, il bénit le peuple au nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il distribua…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Ch 30.24 ; 35.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un gâteau de dattes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le sens du mot hébreu correspondant (qui n''apparaît qu''ici et dans le passage parallèle de 1Ch 16.3) est très incertain.'
      marker-yv: yv-n
    - type: text
      text: Puis il distribua à tout le peuple, à toute la multitude d'Israël, hommes et femmes, à chacun un gâteau de pain, un gâteau de dattes et un gâteau de raisins. Et tout le peuple s'en alla chacun chez soi.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Baalé-Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement Qiriath-Yéarim, voir Jos 15.9,60 ; 18.14 ; 1S 6.21 ; 7.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le coffre de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1S 4.1–7.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' … des Armées'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: keroubim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 4.4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au-dessus du Coffre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur lui.
      marker-yv: yv-n
    - type: text
      text: 'David, et tout le peuple qui était avec lui, partit de Baalé-Juda pour en faire monter le coffre de Dieu sur lequel est invoqué le Nom, le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, qui est assis sur les keroubim, au-dessus du Coffre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bénir sa maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 7.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : voir Gn 49.28 ; 1Ch 16.43. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'exposé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dévêtu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''officiant du culte sacrificiel ne portait sans doute qu''un minimum de vêtements (cf. Ex 28.42s) ; David, qui a accompli certains rites religieux en tant que roi, se voit reprocher par Mikal une tenue qu''elle juge inconvenante. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un homme de rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jg 9.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.3.'
      marker-yv: yv-n
    - type: text
      text: 'David revint pour bénir sa maison, et Mikal, fille de Saül, sortit à sa rencontre. Elle dit : Quelle gloire aujourd''hui pour le roi d''Israël de s''être exposé aux yeux des servantes de ses gens comme s''exposerait un homme de rien ! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
