document_id: 2CO.6,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'nous sommes ses collaborateurs  : litt. nous collaborons (avec Dieu) , cf. 1.24n  ; on peut aussi comprendre nous travaillons ensemble , cf. 1Co 3.9. –  nous vous encourageons ou nous vous supplions, nous vous exhortons  ; cf. 5.20n  ; Rm 12.1+. – Voir grâce . –  en vain 1Co 15.10n.'
  - type: text
    content: 'Puisque nous sommes ses collaborateurs, nous vous encourageons à ne pas accueillir la grâce de Dieu en vain. '
  '10':
  - type: note
    content: 'pauvres / riches 8.9 ; Ph 4.12s. –  n''ayant rien / possédant tout  : les deux verbes sont apparentés en grec ; cf. Jc 2.5 ; Ap 2.9.'
  - type: text
    content: comme attristés, quoique toujours joyeux ; comme pauvres, alors que nous faisons beaucoup de riches ; comme n'ayant rien, quoique possédant tout.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Nous vous avons parlé…  : litt. notre bouche s''est ouverte pour vous ou auprès de vous, chez vous . –  notre cœur s''est largement ouvert v. 13 ; cf. Ps 119.32n.'
  - type: text
    content: 'Nous vous avons parlé librement, Corinthiens, notre cœur s''est largement ouvert. '
  '12':
  - type: note
    content: '7.2s. –  dans vos propres sentiments  : litt. dans vos entrailles, considérées comme siège des émotions et en particulier de la compassion ; le même terme est traduit par tendresse en 7.15 ; cf. Lc 1.78n  ; Ep 4.32n  ; Ph 1.8+ ; Phm 7n  ; terme apparenté en Jc 5.11. –  à l''étroit v. 4n.'
  - type: text
    content: 'Vous n''êtes pas à l''étroit en nous, mais c''est dans vos propres sentiments que vous êtes à l''étroit. '
  '13':
  - type: note
    content: 'comme à mes enfants  : autre traduction comme à des enfants 1Co 4.14+.'
  - type: text
    content: En contrepartie – je vous parle comme à mes enfants – ouvrez-vous largement, vous aussi !
  - type: heading
    content: Le sanctuaire du Dieu vivant
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'De 6.14 à 7.1 le texte présente des analogies particulièrement nombreuses avec les textes retrouvés à Qumrân  : opposition entre justice et mal ou entre lumière et ténèbres (cf. Ep 5.7,11), notion de parts différentes attribuées aux « fils de la lumière » et aux « fils des ténèbres » (v. 15), combinaison de citations bibliques de provenance diverse (v. 16s), condamnation sévère de l''idolâtrie et peut-être représentation de la communauté comme un temple (v. 16 ; cf. 1Co 3.16s), appel à la séparation d''avec les infidèles (v. 17), idée de souillure et de purification de la chair, mais aussi de l''esprit (7.1). On trouve encore d''autres parallèles dans la littérature juive (p. ex. dans les Testaments des Douze patriarches ). –  non-croyants ou infidèles, gens sans foi , cf. 4.4. –  un attelage disparate  : cf. Lv 19.19 ; Dt 22.10. –  le mal Mt 7.23+ ; Rm 6.19n  ; 2Th 2.3n  ; Hé 1.9. –  communion ou solidarité , 1.7n.'
  - type: text
    content: 'Ne formez pas avec les non-croyants un attelage disparate. En effet, quelle association peut-il y avoir entre la justice et le mal ? Quelle communion entre la lumière et les ténèbres ? '
  '15':
  - type: note
    content: 1Co 10.20s ; cf. 1R 18.21. –  Bélial, Béliar ou Bélian, selon les mss, est la transcription grecque d'une formule hébraïque dont le sens est incertain (sans valeur  ? sans morale  ? destructeur  ? ; cf. Dt 13.14n  ; Ps 18.5n) et qui était devenue un nom propre, pratiquement synonyme de Satan, dans les écrits de Qumrân et dans les Testaments des Douze patriarches  ; voir démon, diable, Satan.
  - type: text
    content: 'Quel accord entre le Christ et Bélial ? Quelle part, pour le croyant, avec le non-croyant ? '
  '16':
  - type: note
    content: le sanctuaire du Dieu vivant 1Co 3.16+. –  J'habiterai… Lv 26.11s  ; cf. Ex 29.45 ; Jn 14.23+ ; Ap 21.3. –  je serai… Jr 31.33 ; Ez 37.27  ; cf. 1P 2.10.
  - type: text
    content: 'Quel contrat, pour le sanctuaire de Dieu, avec les idoles ? En effet, nous sommes, nous, le sanctuaire du Dieu vivant, ainsi que Dieu l''a dit :'
  - type: text
    content: J'habiterai et je marcherai au milieu d'eux ;
  - type: text
    content: je serai leur Dieu, et eux, ils seront mon peuple
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: Es 52.11 ; Jr 51.45 ; Ez 20.34,41  ; cf. Ac 19.9 ; Ap 18.4.
  - type: text
    content: 'Aussi '
  - type: text
    content: sortez du milieu d'eux
  - type: text
    content: et séparez-vous, dit le Seigneur ;
  - type: text
    content: ne touchez pas ce qui est impur,
  - type: text
    content: et moi, je vous accueillerai
  - type: text
    content: .
  '18':
  - type: text
    content: ' '
  - type: note
    content: '2S 7.14  ; Es 43.6 ; Jr 31.9 ; Os 2.1. – Voir fils . –  dit le Seigneur tout-puissant (voir Ap 1.8n) : même expression grecque en Am 3.13n (LXX).'
  - type: text
    content: Je serai
  - type: text
    content: ' pour vous '
  - type: text
    content: un père,
  - type: text
    content: et
  - type: text
    content: ' vous, vous serez '
  - type: text
    content: pour moi des fils
  - type: text
    content: ' et des filles,'
  - type: text
    content: dit le Seigneur tout-puissant
  - type: text
    content: .
  '2':
  - type: note
    content: 'il (Dieu ? ou elle, l''Ecriture ?) dit… Es 49.8. –  maintenant  : cf. Lc 4.19,21.'
  - type: text
    content: 'Car il dit :'
  - type: text
    content: Au temps favorable je t'ai exaucé,
  - type: text
    content: au jour du salut je t'ai secouru
  - type: text
    content: .
  - type: text
    content: Eh bien, c'est maintenant le temps vraiment favorable ; c'est maintenant le jour du salut.
  - type: heading
    content: Ministres de Dieu
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'sujet ou pierre d''achoppement  : cf. 1Co 10.32. –  le ministère ou service  ; certains mss portent notre ministère 3.3n  ; 5.18n. –  pris en défaut ou critiqué , cf. 8.20s.'
  - type: text
    content: 'Nous ne donnons aucun sujet d''achoppement à personne, pour que le ministère ne soit pas pris en défaut. '
  '4':
  - type: note
    content: 'nous nous recommandons…  : cf. 3.1+. –  ministres ou serviteurs 3.3n  ; 5.18n. –  endurance 1.6n. –  détresses 1.4n. –  désarrois  : autre traduction privations  ; litt. nécessités, cf. 12.10 ; 1Co 7.26n. –  angoisses  : terme apparenté à celui qui est traduit par être à l''étroit au v. 12 et écrasés en 4.8 ; de même en 12.10.'
  - type: text
    content: 'Mais nous nous recommandons nous-mêmes, à tous égards, comme ministres de Dieu : par beaucoup d''endurance dans les détresses, dans les désarrois, dans les angoisses, '
  '5':
  - type: note
    content: '11.23-27 ; 1Co 4.11+ ; cf. Ac 16.23 ; 19.29 ; 21.30. –  prisons  : autre traduction emprisonnements. –  désordres ou émeutes  : même terme 12.20 ; Lc 21.9 ; 1Co 14.33 ; Jc 3.16. –  jeûnes Ph 4.12.'
  - type: text
    content: 'sous les coups, dans les prisons, dans les désordres, dans les travaux pénibles, dans les veilles, dans les jeûnes ; '
  '6':
  - type: note
    content: 'dans (comme au v. 5) ou par, même possibilité au v. 7. –  pureté 11.3n. –  l''Esprit saint  : autre traduction un esprit saint, cf. Ga 5.22+. –  un amour sans hypocrisie Rm 12.9+.'
  - type: text
    content: 'dans la pureté, dans la connaissance, dans la patience, dans la bonté, dans l''Esprit saint, dans un amour sans hypocrisie, '
  '7':
  - type: note
    content: 'la puissance de Dieu 1Co 2.4+. –  les armes…  : litt. les armes de la justice, celles de la main droite (= offensives, comme l''épée) et celles de la main gauche (= défensives, comme le bouclier) ; cf. 10.4 ; Rm 13.12+ ; Ep 6.16s.'
  - type: text
    content: 'dans la parole de vérité, dans la puissance de Dieu ; par les armes offensives et défensives de la justice ; '
  '8':
  - type: note
    content: 'Voir gloire. –  imposteurs ou trompeurs  : cf. Mt 27.63n. –  vrais  : autre traduction véridiques.'
  - type: text
    content: 'par la gloire et le déshonneur, par la mauvaise et la bonne réputation ; regardés comme imposteurs, quoique vrais ; '
  '9':
  - type: note
    content: mourants / nous vivons 4.10s+. –  châtiés / non mis à mort Ps 118.17s ; Ac 14.19.
  - type: text
    content: 'comme inconnus, quoique bien connus ; comme mourants, et pourtant nous vivons ; comme châtiés, quoique non mis à mort ; '
