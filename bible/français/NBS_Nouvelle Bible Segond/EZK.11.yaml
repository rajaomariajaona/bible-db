      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ce n''est pas pour peu de temps qu''on bâtit des maisons ; n''a-t-on pas vite reconstruit les maisons ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
