    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), vous qui n''avez pas suivi mes prescriptions ni mis mes règles en pratique, mais qui avez agi selon les règles des nations qui vous entourent.'
