document_id: EZK.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem va être jugée pour ses transgressions
  - type: text
    content: ' '
  - type: note
    content: Un souffle ou le Souffle , cf. v. 24 ; 2.2n  ; 3.12.
  - type: text
    content: 'Un souffle m''enleva et me transporta à la porte est de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', à celle qui donne sur l''est. A l''entrée de la porte, il y avait vingt-cinq hommes ; et je vis au milieu d''eux Yaazania, fils d''Azzour, et Pelatia, fils de Benaya, princes du peuple. '
  '10':
  - type: note
    content: 'à la frontière  : autre traduction dans le territoire, même possibilité au v. 11 (vers la frontière) ; cf. 2R 25.18-21 ; Jr 39.1-6 ; 52.24-27.'
  - type: text
    content: 'Vous tomberez par l''épée, je vous jugerai à la frontière d''Israël, et ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '11':
  - type: note
    content: 'V. 3+. –  La ville  : sous-entendu dans le texte (litt. elle ne sera pas).'
  - type: text
    content: 'La ville ne sera pas pour vous une marmite, de sorte que vous seriez la viande au milieu d''elle : c''est vers la frontière d''Israël que je vous jugerai. '
  '12':
  - type: note
    content: 'mis… en pratique (v. 20) / agi 5.7n. –  selon les règles  : cf. 5.7n  ; Lv 18.3 ; Dt 12.30.'
  - type: text
    content: 'Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), vous qui n''avez pas suivi mes prescriptions ni mis mes règles en pratique, mais qui avez agi selon les règles des nations qui vous entourent.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Pelatia ( Rescapé de YHWH ) v. 2s. –  face contre terre 1.28n. –  je m''écriai  : litt. je criai d''une grande voix . –  le reste d''Israël 9.8.'
  - type: text
    content: 'Alors, comme je parlais en prophète, Pelatia, fils de Benaya, mourut. Je tombai face contre terre et je m''écriai : Ah ! Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', c''est toi qui extermines le reste d''Israël !'
  - type: heading
    content: Dieu rassemblera le peuple dispersé
  '14':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ta parenté  : litt. ta rédemption , c.-à-d. les proches parents qui seraient en mesure d''agir en tant que rédempteurs (Ex 6.6+ ; Rt 2.20n). –  Restez (cf. v. 3n) loin du Seigneur  : l''exil qui éloignait du sanctuaire semblait rendre impossible la relation cultuelle avec le Seigneur  ; cf. Dt 4.28 ; 1S 26.19 ; Jr 16.13 ; Os 9.3. –  ce pays nous a été donné… 33.24 ; cf. 25.4,10 ; 36.2-5 ; Gn 15.17 ; Ex 6.8.'
  - type: text
    content: 'Humain, ce sont tes frères, tes frères, les gens de ta parenté, et la maison d''Israël tout entière, à qui les habitants de Jérusalem disent : Restez loin du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ce pays nous a été donné en possession. '
  '16':
  - type: note
    content: 'dans tous les pays  : litt. dans les pays. –  un peu  : cette précision est parfois interprétée au sens de quelque temps  ; elle est plus probablement à comprendre, dans ce contexte, au sens de dans une certaine mesure, en quelque sorte  ; cf. Tg je leur ai donné des synagogues, distinctes de mon sanctuaire, et ils étaient peu nombreux dans les pays où ils ont été conduits. –  un sanctuaire dans les pays…  : cf. v. 22-24 ; voir Es 8.13-14+.'
  - type: text
    content: 'A cause de cela, dis : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Même si je les ai éloignés parmi les nations, si je les ai dispersés dans tous les pays, j''ai été pour eux, un peu, un sanctuaire dans les pays où ils sont venus. '
  '17':
  - type: note
    content: Cf. 20.34,41s ; 28.25 ; 34.13 ; 36.24 ; 37.21 ; 38.8 ; 39.27 ; Dt 30.3s ; Es 11.12+ ; Jr 3.18+ ; Os 2.2 ; Mi 2.12 ; 4.6s ; So 3.19s ; Za 10.8s ; Ps 147.2 ; Né 1.9.
  - type: text
    content: 'A cause de cela, dis : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je vous rassemblerai d''entre les peuples, je vous recueillerai des pays où vous êtes dispersés et je vous donnerai la terre d''Israël. '
  '18':
  - type: note
    content: 'supprimeront  : le verbe hébreu correspondant est rendu par ôter au v. 19 ; cf. 16.50. –  horreurs / abominations 5.9+,11+.'
  - type: text
    content: 'C''est là qu''ils viendront ; ils en supprimeront toutes les horreurs et toutes les abominations. '
  '19':
  - type: note
    content: 'un même cœur  : litt. un seul cœur  ; LXX un autre cœur (légère variante du texte hébreu) ; quelques mss hébreux et des versions araméennes portent un cœur nouveau  ; cf. 18.31 ; 36.26 ; Jr 32.39 ; Ps 51.12 ; voir aussi Dt 30.6 ; Jr 4.4 ; Ps 24.3s ; 51.12 ; Mt 5.8. –  un souffle (ou un esprit) nouveau  : cf. 39.29+. –  pierre / chair  : cf. 2Co 3.3. Compte tenu de l''emploi du mot hébreu correspondant à cœur, l''opposition du cœur de pierre et du cœur de chair n''est sans doute pas à restreindre au domaine des sentiments ou des émotions, mais à comprendre plus généralement comme un passage de la mort à la vie pour tout l''être, facultés intellectuelles incluses (cf. chap. 37).'
  - type: text
    content: 'Je leur donnerai un même cœur, je mettrai en vous un souffle nouveau ; j''ôterai de leur chair le cœur de pierre et je leur donnerai un cœur de chair, '
  '2':
  - type: note
    content: 'Il me dit  : LXX le Seigneur me dit. –  Humain 2.1n. –  qui préparent…  : cf. Mi 2.1. –  plans malfaisants Ps 36.5. –  qui font de mauvais projets  : autre traduction qui donnent de mauvais conseils 7.26 ; Es 5.19n.'
  - type: text
    content: 'Il me dit : Humain, ce sont ces hommes-là qui préparent des plans malfaisants, qui font de mauvais projets dans cette ville. '
  '20':
  - type: note
    content: ils seront mon peuple… 14.11 ; 34.24n  ; 36.28 ; 37.23,27 ; Ex 6.7 ; Lv 26.12 ; Jr 11.4 ; 24.7 ; 31.33 ; Za 8.8+ ; Ap 21.3,7.
  - type: text
    content: 'afin qu''ils suivent mes prescriptions, qu''ils observent mes règles et les mettent en pratique ; alors ils seront mon peuple, et moi, je serai leur Dieu. '
  '21':
  - type: note
    content: 'pour ceux dont le cœur se plaît…  : texte obscur et traduction incertaine. –  leur voie sur leur tête 9.10n.'
  - type: text
    content: 'Mais pour ceux dont le cœur se plaît à leurs horreurs et à leurs abominations, je ferai retomber leur voie sur leur tête – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: La gloire de Dieu quitte Jérusalem
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.19.
  - type: text
    content: 'Les keroubim qui étaient avec les roues déployèrent leurs ailes ; la gloire du Dieu d''Israël était sur eux, en haut. '
  '23':
  - type: note
    content: 'Cf. 9.3+ ; 43.2,4. –  s''éleva de la ville  : litt. s''éleva de l''intérieur (ou du milieu) de la ville. –  la montagne qui est à l''est…  : c.-à-d. le mont des Oliviers ; cf. 2S 15.30 ; Za 14.4.'
  - type: text
    content: 'La gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''éleva de la ville, et se plaça sur la montagne qui est à l''est de la ville. '
  '24':
  - type: note
    content: 'Un souffle m''enleva v. 1. –  en Chaldée  : autre nom de la Babylonie ; cf. 1.1n  ; Gn 11.28 ; Es 23.13n. –  vision  : c''est ici le terme habituellement traduit par aspect (cf. 1.1n).'
  - type: text
    content: 'Un souffle m''enleva et me transporta en Chaldée auprès des exilés, en vision, par le souffle de Dieu ; et la vision que j''avais eue disparut au-dessus de moi. '
  '25':
  - type: note
    content: 'révélées  : litt. fait voir.'
  - type: text
    content: 'Je dis aux exilés toutes les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: ', celles qu''il m''avait révélées.'
  '3':
  - type: note
    content: 'On n''est pas près de…  : peut-être parce que depuis l''exil (1.2n) les habitants sont trop peu nombreux pour occuper les maisons existantes et pensent n''avoir à redouter aucune autre destruction (cf. v. 15) ; autres traductions ce n''est pas pour peu de temps qu''on bâtit des maisons ; n''a-t-on pas vite reconstruit les maisons ? –  La ville (litt. elle), c''est la marmite  : ses remparts nous protègent du feu de l''assaillant ; cf. v. 7,11 ; 24.3-5 ; Jr 1.13 ; Mi 3.3,11.'
  - type: text
    content: 'Ils disent : On n''est pas près de bâtir des maisons. La ville, c''est la marmite, et nous, nous sommes la viande ! '
  '4':
  - type: note
    content: parle en prophète 4.7n.
  - type: text
    content: A cause de cela, parle en prophète sur eux, parle en prophète, humain !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'le souffle (ou l''Esprit , 2.2n  ; le même terme est rendu par esprit dans la suite du v.) du Seigneur tomba sur moi  : cf. 8.1. –  ce qui vous monte à l''esprit  : litt. les montées de votre esprit , ce qui pourrait aussi signifier votre arrogance.'
  - type: text
    content: 'Alors le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' tomba sur moi. Il me dit :'
  - type: text
    content: 'Dis : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Voilà comment vous parlez, maison d''Israël ! Et ce qui vous monte à l''esprit, moi, je le connais. '
  '6':
  - type: note
    content: Cf. 22.1-31 ; voir aussi 30.11 ; 35.8 ; Ap 11.8. –  victimes 9.7n.
  - type: text
    content: 'Vous avez multiplié vos victimes dans cette ville, vous avez rempli ses rues de victimes. '
  '7':
  - type: note
    content: 'V. 3+. –  on vous en fera sortir  : de nombreux mss hébreux et des versions anciennes ont lu je vous en ferai sortir (cf. v. 9).'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Vos victimes, celles que vous avez mises au milieu d''elle, c''est la viande ; elle, c''est la marmite ; mais vous, on vous en fera sortir. '
  '8':
  - type: note
    content: 'l''épée  : cf. 5.1n,12+ ; 14.17 ; 21.25,33 ; 29.8 ; 38.21 ; Jr 12.12 ; 42.16 ; 47.6 ; Za 13.7.'
  - type: text
    content: 'Vous avez peur de l''épée ; eh bien, je ferai venir l''épée sur vous – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Je vous ferai sortir du milieu d''elle, je vous livrerai à des étrangers et j''exécuterai contre vous mes jugements. '
