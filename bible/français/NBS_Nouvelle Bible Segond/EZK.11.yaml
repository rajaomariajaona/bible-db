      marker-yv: yv-n
    - type: text
      text: 'Alors, comme je parlais en prophète, Pelatia, fils de Benaya, mourut. Je tombai face contre terre et je m''écriai : Ah ! Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: ', c''est toi qui extermines le reste d''Israël !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu rassemblera le peuple dispersé
    marker-yv: yv-h
