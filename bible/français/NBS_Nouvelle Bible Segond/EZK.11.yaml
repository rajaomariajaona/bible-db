          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.12.'
      marker-yv: yv-n
    - type: text
      text: 'Un souffle m''enleva et me transporta à la porte est de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', à celle qui donne sur l''est. A l''entrée de la porte, il y avait vingt-cinq hommes ; et je vis au milieu d''eux Yaazania, fils d''Azzour, et Pelatia, fils de Benaya, princes du peuple. '
  '10':
