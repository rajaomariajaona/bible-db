    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la frontière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le territoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même possibilité au v. 11 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
