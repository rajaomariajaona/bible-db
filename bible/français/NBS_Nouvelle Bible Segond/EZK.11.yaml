      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 10.19.
      marker-yv: yv-n
    - type: text
      text: 'Les keroubim qui étaient avec les roues déployèrent leurs ailes ; la gloire du Dieu d''Israël était sur eux, en haut. '
