          text: elle ne sera pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'La ville ne sera pas pour vous une marmite, de sorte que vous seriez la viande au milieu d''elle : c''est vers la frontière d''Israël que je vous jugerai. '
