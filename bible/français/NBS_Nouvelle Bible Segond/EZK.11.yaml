      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte obscur et traduction incertaine. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur voie sur leur tête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais pour ceux dont le cœur se plaît à leurs horreurs et à leurs abominations, je ferai retomber leur voie sur leur tête – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La gloire de Dieu quitte Jérusalem
    marker-yv: yv-h
  '22':
  - type: usfm
