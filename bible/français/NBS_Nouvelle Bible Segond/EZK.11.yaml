        marker: fq
        children:
        - type: text
          text: ', c''est la marmite'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ses remparts nous protègent du feu de l''assaillant ; cf. v. 7,11 ; 24.3-5 ; Jr 1.13 ; Mi 3.3,11.'
      marker-yv: yv-n
    - type: text
      text: 'Ils disent : On n''est pas près de bâtir des maisons. La ville, c''est la marmite, et nous, nous sommes la viande ! '
  '4':
  - type: usfm
