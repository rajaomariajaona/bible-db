      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. 2R 25.18-21 ; Jr 39.1-6 ; 52.24-27.
      marker-yv: yv-n
    - type: text
      text: 'Vous tomberez par l''épée, je vous jugerai à la frontière d''Israël, et ainsi vous saurez que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
