      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ap 21.15-17.
    marker-yv: yv-n
  - type: text
    text: 'Je dis : Où vas-tu ? Il me dit : Je vais mesurer Jérusalem pour voir quelle est sa largeur et quelle est sa longueur. '
  - type: usfm
    marker: v
