document_id: ZEC.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Deuxième vision : les cornes et les forgerons'
  - type: text
    content: ' '
  - type: note
    content: 'Dans certaines versions, les v. 1-4 sont rattachés au chap. 1 et la numérotation est décalée en conséquence. –  je vis… 1.8+. –  cornes  : signes de puissance, souvent politique et militaire (cf. Dn 7–8 ; Ap 13.1).'
  - type: text
    content: 'Je levai les yeux et je vis quatre cornes. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Holà ! cf. Es 18.1n  ; 55.1n. –  du pays du nord  : de Babylone (Jr 1.13ns) ; cf. Es 48.20 ; Jr 50.8 ; Ap 18.4. –  je vous ai dispersés… 7.14 ; Ez 5.10+ ; 17.21. –  quatre vents 6.5 ; cf. Ez 37.9n  ; Dn 7.2+ ; Mt 24.31/ /.'
  - type: text
    content: Holà ! Holà !
  - type: text
    content: Fuyez du pays du nord !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: puisque je vous ai dispersés aux quatre vents du ciel
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 52.2 ; certains modifient le texte hébreu traditionnel pour traduire  : Echappez-vous vers Sion, vous qui habitez Babylone ! –  Babylone la belle  : litt. la fille de Babylone , personnification poétique ; cf. v. 14n  ; Es 1.8n  ; Jr 4.11n,31n.'
  - type: text
    content: Holà ! Sion, échappe-toi,
  - type: text
    content: toi qui habites chez Babylone la belle !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'en vue de la gloire  : litt. après la gloire  ; expression obscure, diversement interprétée ; on pourrait aussi comprendre après que la Gloire m''a envoyé…  ; cf. v. 13+ ; Ps 73.24n. –  de mon œil  : d''après une indication des scribes, tel était le texte originel qui a été modifié, dans les mss, en de son œil , par respect pour Dieu ; cf. Dt 32.10 ; Ps 17.8 (autre expression en hébreu).'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Il m'a envoyé, en vue de la gloire,
  - type: text
    content: vers les nations qui vous ont pris comme butin
  - type: text
    content: – car celui qui vous touche
  - type: text
    content: touche la prunelle de mon œil.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'J''agite ma main  : comme en Es 10.32+. –  elles deviendront le butin Jr 50.10 ; Ez 39.10. –  vous saurez… v. 15 ; 4.9 ; 6.15 ; Ez 33.33.'
  - type: text
    content: 'J''agite ma main contre elles :'
  - type: text
    content: elles deviendront le butin de leurs esclaves ;
  - type: text
    content: 'ainsi vous saurez que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées qui m''a envoyé.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Pousse des cris… 9.9 ; Es 12.6 ; 52.9 ; So 3.14. –  Sion la belle  : litt. fille de Sion  ; cf. v. 11n  ; Es 1.8n  ; Jr 4.11n,31n. –  je viens et je demeurerai… 8.3 ; cf. Ez 37.27 ; Ap 3.11 ; 21.3.'
  - type: text
    content: Pousse des cris de joie,
  - type: text
    content: réjouis-toi, Sion la belle !
  - type: text
    content: Car je viens
  - type: text
    content: et je demeurerai au milieu de toi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: '8.22s ; 14.16 ; Ps 102.23. –  mon peuple  : LXX son peuple . –  Je demeurerai  : cf. v. 14 ; LXX elles demeureront.'
  - type: text
    content: 'Une multitude de nations s''attachera au '
  - type: text
    content: Seigneur
  - type: text
    content: ' en ce jour-là'
  - type: text
    content: et deviendra mon peuple.
  - type: text
    content: Je demeurerai au milieu de toi,
  - type: text
    content: 'et ainsi tu sauras que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées qui m''a envoyé vers toi.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: la terre (cf. Gn 2.5n) sacrée ou sainte . –  il portera encore son choix… 1.17.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''attribuera Juda comme son patrimoine, comme sa part sur la terre sacrée,'
  - type: text
    content: il portera encore son choix sur Jérusalem.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Silence Es 41.1 ; Ha 2.20 ; So 1.7 ; Ps 76.9s ; Ap 8.1. –  vous tous  : litt. toute chair . –  il s''éveille Ps 35.23. –  et sort  : sous-entendu dans le texte. –  séjour sacré ou saint  ; cf. Dt 26.15n.'
  - type: text
    content: 'Silence devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous tous !'
  - type: text
    content: Car il s'éveille et sort de son séjour sacré.
  '2':
  - type: note
    content: Cf. 1.9+.
  - type: text
    content: 'Je dis au messager qui parlait avec moi : Celles-là, que sont-elles ? Et il me dit : Ce sont les cornes qui ont disséminé Juda, Israël et Jérusalem.'
  '3':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me fit voir quatre forgerons. '
  '4':
  - type: text
    content: 'Je dis : Que viennent faire ceux-là ? Il répondit : Ce sont les cornes qui ont disséminé Juda à tel point que personne ne relève la tête ; ceux-là sont venus pour les faire trembler, pour abattre les cornes des nations qui ont levé la corne contre Juda afin de le disséminer.'
  - type: heading
    content: 'Troisième vision : le cordeau'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'cordeau  : autre terme hébreu qu''en 1.16n.'
  - type: text
    content: 'Je levai les yeux et je vis un homme qui tenait à la main un cordeau à mesurer. '
  '6':
  - type: note
    content: Cf. Ap 21.15-17.
  - type: text
    content: 'Je dis : Où vas-tu ? Il me dit : Je vais mesurer Jérusalem pour voir quelle est sa largeur et quelle est sa longueur. '
  '7':
  - type: note
    content: 'sortit  : cf. 4.7 ; 5.3ss ; 6.1,5ss ; 9.14 ; 10.4 ; 14.2s,8. LXX a lu la première fois se tenait debout.'
  - type: text
    content: 'Alors le messager qui parlait avec moi sortit, et un autre messager sortit à sa rencontre. '
  '8':
  - type: note
    content: 'ce jeune homme  : cf. v. 5s. –  sera une ville sans murailles  : litt. sera habitée (comme les) villes sans murailles Dt 3.5+ ; cf. Ez 36.37s ; Mi 2.12.'
  - type: text
    content: 'Il lui dit : Cours dire à ce jeune homme :'
  - type: text
    content: Jérusalem sera une ville sans murailles,
  - type: text
    content: tant les humains et les bêtes y seront nombreux.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Je serai  : comme en Ex 3.12,14n  ; cf. Os 1.9n. –  sa gloire Es 60.19.'
  - type: text
    content: Je serai moi-même pour elle
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: une muraille de feu tout autour ;
  - type: text
    content: et je serai sa gloire au milieu d'elle.
  - type: heading
    content: Le Seigneur rappelle les exilés
