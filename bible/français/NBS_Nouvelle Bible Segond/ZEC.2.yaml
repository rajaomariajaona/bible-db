        text: ' : signes de puissance, souvent politique et militaire (cf. Dn 7–8 ; Ap 13.1).'
    marker-yv: yv-n
  - type: text
    text: 'Je levai les yeux et je vis quatre cornes. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1.9+.
    marker-yv: yv-n
  - type: text
    text: 'Je dis au messager qui parlait avec moi : Celles-là, que sont-elles ? Et il me dit : Ce sont les cornes qui ont disséminé Juda, Israël et Jérusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me fit voir quatre forgerons. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je dis : Que viennent faire ceux-là ? Il répondit : Ce sont les cornes qui ont disséminé Juda à tel point que personne ne relève la tête ; ceux-là sont venus pour les faire trembler, pour abattre les cornes des nations qui ont levé la corne contre Juda afin de le disséminer.'
