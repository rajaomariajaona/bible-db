document_id: JOS.9,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'alliance avec les Gabaonites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au-delà du Jourdain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 10.1 ; 11.1. La liste des régions est proche de celle de Dt 1.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bas-Pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shephéla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la grande mer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Hittites, les Amorites…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : liste des peuples identique à celle de 12.8 ; Dt 20.17 ; cf. Jos 3.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.16-20 ; Es 8.9s.'
      marker-yv: yv-n
    - type: text
      text: 'Quand ils l''apprirent, tous les rois qui étaient au-delà du Jourdain, de la montagne, du Bas-Pays et de toute la côte de la grande mer, du côté du Liban, les Hittites, les Amorites, les Cananéens, les Perizzites, les Hivvites et les Jébusites '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sihôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Og '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Nb 21.21-35 ; Dt 2.26–3.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ashtaroth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.4 ; 13.12,31 ; Dt 1.4 ; 1Ch 6.56 ; cf. Gn 14.5 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ashteroth-Qarnaïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les Astartés de Qarnaïm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; la ville est mentionnée dans des textes égyptiens et assyriens.
      marker-yv: yv-n
    - type: text
      text: 'et de tout ce qu''il a fait aux deux rois des Amorites, en Transjordanie – à Sihôn, roi de Heshbôn, et à Og, roi du Bashân, qui était à Ashtaroth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Maintenant, concluez… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Nos anciens et tous les habitants de notre pays nous ont dit : « Prenez des provisions de route et allez à leur rencontre. Vous leur direz : “Nous sommes vos serviteurs. Maintenant, concluez une alliance pour nous.” » '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: emporté… comme provision
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en miettes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici notre pain, il était tout chaud quand nous l''avons emporté de chez nous comme provision pour la route, le jour où nous sommes partis pour aller vers vous. Maintenant, il est tout sec et en miettes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ces outres à vin que nous avions remplies neuves, elles sont déchirées ; nos vêtements et nos sandales, ils sont tout usés tant le chemin a été long. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils prirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les princes prirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sans interroger le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils n''avaient pas interrogé la bouche du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la bouche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est absent de LXX.
      marker-yv: yv-n
    - type: text
      text: 'Ils prirent de leurs provisions sans interroger le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les princes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 12.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Josué fit la paix et conclut une alliance pour eux, en leur garantissant la vie ; les princes de la communauté leur prêtèrent serment.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Trois jours après avoir conclu une alliance pour eux, ils apprirent qu''ils étaient leurs voisins et qu''ils habitaient parmi eux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gabaon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Kephira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ha-kephira, la jeune lionne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le petit village
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 18.26 ; Esd 2.25/ / ; peut-être à 8 km au sud-ouest de Gabaon, sur la route de Jérusalem à Jaffa. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Bééroth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Puits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. 18.25 ; 2S 4.2 ; Esd 2.25/ / ; cette localité est peut-être à situer à 15 km au nord de Jérusalem. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qiriath-Yéarim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ville des forêts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) 15.60 ; 18.28 ; certains la situent à 12 km à l'ouest de Jérusalem, sur la route de Jaffa.
      marker-yv: yv-n
    - type: text
      text: 'Les Israélites partirent et arrivèrent dans leurs villes le troisième jour. Leurs villes, c''étaient Gabaon, Kephira, Bééroth et Qiriath-Yéarim. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les princes de la communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Cependant les Israélites ne les tuèrent pas, à cause du serment que les princes de la communauté leur avaient fait par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël. Mais toute la communauté se mit à maugréer contre les princes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tous les princes dirent à toute la communauté : Nous, nous leur avons fait un serment par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël ; maintenant nous ne pouvons plus les toucher. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 8.30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se rassemblèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se coalisèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un commun accord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'une seule bouche.
      marker-yv: yv-n
    - type: text
      text: se rassemblèrent, d'un commun accord, pour faire la guerre à Josué et à Israël.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la Colère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 22.20 ; Nb 1.53'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.5.'
      marker-yv: yv-n
    - type: text
      text: 'Voici comment nous les traiterons : Nous les laisserons vivre pour ne pas attirer sur nous la Colère, à cause du serment que nous leur avons fait. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Et ils devinrent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais qu'ils deviennent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 27.'
      marker-yv: yv-n
    - type: text
      text: 'Les princes leur dirent donc : Qu''ils vivent ! Et ils devinrent bûcherons et puiseurs d''eau pour toute la communauté, selon ce que les princes avaient dit à leur sujet.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Josué les appela et leur dit : Pourquoi nous avez-vous trompés en disant : « Nous demeurons à une grande distance de vous », alors que vous habitez parmi nous ? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous êtes maudits ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'soyez maudits ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Aucun de vous…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ne sera pas retranché de vous un esclave.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, vous êtes maudits ! Aucun de vous ne cessera d''être esclave ; vous serez bûcherons et puiseurs d''eau pour la maison de mon Dieu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Nous avons eu très peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nous avons beaucoup craint pour nous-mêmes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour nos vies '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Ils répondirent à Josué : C''est qu''on nous a raconté, à nous, tes serviteurs, que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, avait ordonné à Moïse, son serviteur, de vous donner tout ce pays et de détruire devant vous tous les habitants du pays. Nous avons eu très peur de vous, voilà pourquoi nous avons agi de la sorte. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme il te plaira…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme (il est) bon et droit à tes yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jr 26.14.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant nous sommes entre tes mains. Traite-nous comme il te plaira, comme il te conviendra de nous traiter. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'C''est ainsi qu''il les traita ; il les délivra de la main des Israélites, et ceux-ci ne les tuèrent pas. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
