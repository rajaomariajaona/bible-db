document_id: JOS.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'alliance avec les Gabaonites
  - type: text
    content: ' '
  - type: note
    content: 'au-delà du Jourdain 5.1n  ; cf. 10.1 ; 11.1. La liste des régions est proche de celle de Dt 1.7. –  Bas-Pays  : hébreu shephéla . –  la grande mer 1.4n. –  les Hittites, les Amorites…  : liste des peuples identique à celle de 12.8 ; Dt 20.17 ; cf. Jos 3.10n  ; 11.16-20 ; Es 8.9s.'
  - type: text
    content: 'Quand ils l''apprirent, tous les rois qui étaient au-delà du Jourdain, de la montagne, du Bas-Pays et de toute la côte de la grande mer, du côté du Liban, les Hittites, les Amorites, les Cananéens, les Perizzites, les Hivvites et les Jébusites '
  '10':
  - type: note
    content: Sihôn / Og 2.10n  ; cf. Nb 21.21-35 ; Dt 2.26–3.11. –  Ashtaroth 12.4 ; 13.12,31 ; Dt 1.4 ; 1Ch 6.56 ; cf. Gn 14.5 Ashteroth-Qarnaïm (litt. les Astartés de Qarnaïm) ; la ville est mentionnée dans des textes égyptiens et assyriens.
  - type: text
    content: 'et de tout ce qu''il a fait aux deux rois des Amorites, en Transjordanie – à Sihôn, roi de Heshbôn, et à Og, roi du Bashân, qui était à Ashtaroth. '
  '11':
  - type: note
    content: Maintenant, concluez… v. 6n.
  - type: text
    content: 'Nos anciens et tous les habitants de notre pays nous ont dit : « Prenez des provisions de route et allez à leur rencontre. Vous leur direz : “Nous sommes vos serviteurs. Maintenant, concluez une alliance pour nous.” » '
  '12':
  - type: note
    content: 'emporté… comme provision  : cf. v. 4n. –  en miettes v. 5n.'
  - type: text
    content: 'Voici notre pain, il était tout chaud quand nous l''avons emporté de chez nous comme provision pour la route, le jour où nous sommes partis pour aller vers vous. Maintenant, il est tout sec et en miettes. '
  '13':
  - type: text
    content: 'Ces outres à vin que nous avions remplies neuves, elles sont déchirées ; nos vêtements et nos sandales, ils sont tout usés tant le chemin a été long. '
  '14':
  - type: note
    content: 'Ils prirent  : LXX les princes prirent. –  sans interroger le Seigneur  : litt. ils n''avaient pas interrogé la bouche du Seigneur  ; le terme correspondant à la bouche est absent de LXX.'
  - type: text
    content: 'Ils prirent de leurs provisions sans interroger le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '15':
  - type: note
    content: 'les princes  : cf. Nb 2. –  la communauté Ex 12.3n.'
  - type: text
    content: Josué fit la paix et conclut une alliance pour eux, en leur garantissant la vie ; les princes de la communauté leur prêtèrent serment.
  '16':
  - type: text
    content: 'Trois jours après avoir conclu une alliance pour eux, ils apprirent qu''ils étaient leurs voisins et qu''ils habitaient parmi eux. '
  '17':
  - type: note
    content: 'Gabaon v. 3n. –  Kephira  : hébreu ha-kephira, la jeune lionne ou le petit village  ; cf. 18.26 ; Esd 2.25/ / ; peut-être à 8 km au sud-ouest de Gabaon, sur la route de Jérusalem à Jaffa. –  Bééroth (Puits) : cf. 18.25 ; 2S 4.2 ; Esd 2.25/ / ; cette localité est peut-être à situer à 15 km au nord de Jérusalem. –  Qiriath-Yéarim (Ville des forêts) 15.60 ; 18.28 ; certains la situent à 12 km à l''ouest de Jérusalem, sur la route de Jaffa.'
  - type: text
    content: 'Les Israélites partirent et arrivèrent dans leurs villes le troisième jour. Leurs villes, c''étaient Gabaon, Kephira, Bééroth et Qiriath-Yéarim. '
  '18':
  - type: note
    content: les princes de la communauté v. 15n.
  - type: text
    content: 'Cependant les Israélites ne les tuèrent pas, à cause du serment que les princes de la communauté leur avaient fait par le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. Mais toute la communauté se mit à maugréer contre les princes. '
  '19':
  - type: text
    content: 'Tous les princes dirent à toute la communauté : Nous, nous leur avons fait un serment par le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël ; maintenant nous ne pouvons plus les toucher. '
  '2':
  - type: note
    content: 'Cf. 8.30n. –  se rassemblèrent  : autre traduction se coalisèrent. –  d''un commun accord  : litt. d''une seule bouche.'
  - type: text
    content: se rassemblèrent, d'un commun accord, pour faire la guerre à Josué et à Israël.
  '20':
  - type: note
    content: 'la Colère  : cf. 22.20 ; Nb 1.53n  ; 18.5.'
  - type: text
    content: 'Voici comment nous les traiterons : Nous les laisserons vivre pour ne pas attirer sur nous la Colère, à cause du serment que nous leur avons fait. '
  '21':
  - type: note
    content: 'Et ils devinrent…  : autre traduction mais qu''ils deviennent…  ; cf. v. 27.'
  - type: text
    content: 'Les princes leur dirent donc : Qu''ils vivent ! Et ils devinrent bûcherons et puiseurs d''eau pour toute la communauté, selon ce que les princes avaient dit à leur sujet.'
  '22':
  - type: text
    content: 'Josué les appela et leur dit : Pourquoi nous avez-vous trompés en disant : « Nous demeurons à une grande distance de vous », alors que vous habitez parmi nous ? '
  '23':
  - type: note
    content: 'vous êtes maudits ! autre traduction soyez maudits ! Voir bénédiction, malédiction. –  Aucun de vous…  : litt. il ne sera pas retranché de vous un esclave.'
  - type: text
    content: 'Maintenant, vous êtes maudits ! Aucun de vous ne cessera d''être esclave ; vous serez bûcherons et puiseurs d''eau pour la maison de mon Dieu. '
  '24':
  - type: note
    content: 'Nous avons eu très peur  : autres traductions nous avons beaucoup craint pour nous-mêmes ou pour nos vies (cf. Gn 1.20n).'
  - type: text
    content: 'Ils répondirent à Josué : C''est qu''on nous a raconté, à nous, tes serviteurs, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, avait ordonné à Moïse, son serviteur, de vous donner tout ce pays et de détruire devant vous tous les habitants du pays. Nous avons eu très peur de vous, voilà pourquoi nous avons agi de la sorte. '
  '25':
  - type: note
    content: 'comme il te plaira…  : litt. comme (il est) bon et droit à tes yeux  ; cf. Jr 26.14.'
  - type: text
    content: 'Maintenant nous sommes entre tes mains. Traite-nous comme il te plaira, comme il te conviendra de nous traiter. '
  '26':
  - type: text
    content: 'C''est ainsi qu''il les traita ; il les délivra de la main des Israélites, et ceux-ci ne les tuèrent pas. '
  '27':
  - type: note
    content: 'des bûcherons… v. 21 ; voir aussi 2S 21.2ss. –  jusqu''à ce jour 4.9n. –  au lieu qu''il (plusieurs versions anciennes portent que le Seigneur) choisirait  : cf. Dt 12.'
  - type: text
    content: 'Josué fit d''eux, en ce jour-là, des bûcherons et des puiseurs d''eau pour la communauté et pour l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', jusqu''à ce jour, au lieu qu''il choisirait.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Gabaon  : hébreu Gib‘ôn , actuellement El-Djib, à environ 10 km au nord-nord-ouest de Jérusalem (10.2 ; 18.25 ; 21.17).'
  - type: text
    content: 'Les habitants de Gabaon avaient appris comment Josué avait traité Jéricho et le Aï. '
  '4':
  - type: note
    content: 'Mais eux  : autre traduction eux aussi de leur côté. –  ils partirent déguisés ou ils se firent passer pour des émissaires, le sens du verbe hébreu étant incertain. Suite à une confusion entre deux lettres très proches par la forme, quelques mss hébreux et des versions anciennes ont lu comme au v. 12 ils allèrent faire des provisions.'
  - type: text
    content: 'Mais eux eurent recours à une ruse ; ils partirent déguisés, en prenant des sacs usés pour leurs ânes et des outres à vin usées, déchirées et rapiécées ; '
  '5':
  - type: note
    content: 'en miettes  : autre traduction taché (moisi ?), même possibilité au v. 12 ; même adjectif en Gn 30.32 tacheté.'
  - type: text
    content: 'ils avaient aux pieds de vieilles sandales, usées et recousues, et ils portaient de vieux vêtements usés ; tout le pain de leurs provisions était sec et en miettes. '
  '6':
  - type: note
    content: 'camp du Guilgal  : cf. 4.19n. –  aux hommes d''Israël  : litt. à l''homme d''Israël (de même au v. 7 et en 10.24), le singulier étant de toute évidence à comprendre ici comme un collectif (cf. Dt 27.14n). Des mss et des versions arabes portent aux fils d''Israël, formule habituellement traduite par les Israélites  ; certains mss de LXX portent tout Israël. –  Nous arrivons d''un pays lointain  : Dt 7.2 interdit toute alliance entre Israël et les autochtones habitant la Terre promise. –  concluez une alliance…  : cf. Gn 15.18n.'
  - type: text
    content: 'Ils allèrent trouver Josué au camp du Guilgal et lui dirent, à lui et aux hommes d''Israël : Nous arrivons d''un pays lointain. Maintenant, concluez une alliance pour nous. '
  '7':
  - type: note
    content: 'les hommes d''Israël  : litt. l''homme d''Israël  ; cf. v. 6n  ; LXX les fils d''Israël (c.-à-d. les Israélites). –  au Hivvite  : autre traduction aux Hivvites, mais la suite est au singulier dans le texte ; cf. 11.19. En 2S 21.2 les Gabaonites sont désignés sous le nom général d’Amorites. –  chez moi  : litt. en mon sein, c.-à-d. dans mon territoire  ; la même formule est traduite par parmi aux v. 16,22.'
  - type: text
    content: 'Mais les hommes d''Israël dirent au Hivvite : Peut-être habites-tu chez moi ; comment alors pourrais-je conclure une alliance pour toi ? '
  '8':
  - type: text
    content: 'Ils dirent alors à Josué : Nous sommes tes serviteurs. Josué leur demanda : Qui êtes-vous et d''où venez-vous ? '
  '9':
  - type: note
    content: 'pour le nom  : autre traduction à cause de la renommée. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Ils lui répondirent : Nous, tes serviteurs, nous arrivons d''un pays très lointain, pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu ; car nous avons entendu parler de lui, de tout ce qu''il a fait en Egypte '
