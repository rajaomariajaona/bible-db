document_id: PSA.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Entouré d'ennemis
  - type: text
    content: ' '
  - type: note
    content: 'De (ou à ) David  : le sens exact de la préposition employée dans les suscriptions des Psaumes est incertain ; elle peut désigner l''auteur même du poème ( David 73 fois, cf. 1S 16.16-23 ; 18.10 ; 2S 1.17,19-27 ; 3.33s ; 22.1s ; 23.1s ; Am 6.5 ; Esd 3.10 ; Né 12.36 ; 1Ch 15–16 ; 22.2ss ; 23.4s) ou celui qui, par sa vie, l''a inspiré (cf. l''histoire de David et Absalom en 2S 15–18) ; elle peut aussi indiquer l''appartenance à une collection de textes antérieure au psautier (cf. Ha 3.1n).'
  - type: text
    content: Psaume. De David. Lorsqu'il s'enfuit pour échapper à Absalom, son fils.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 25.19 ; 38.20 ; 56.3 ; 69.5 ; 119.157.
  - type: text
    content: Seigneur
  - type: text
    content: ', qu''ils sont nombreux, mes adversaires,'
  - type: text
    content: nombreux ceux qui se dressent contre moi,
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'à mon sujet  : cf. 22.9 ; 71.11. –  Pause , ici et dans la suite, traduit un terme hébreu ( séla ) dont le sens précis nous est inconnu (interlude ? répétition ? geste d''élévation ou d''inclination ?).'
  - type: text
    content: 'nombreux ceux qui disent à mon sujet :'
  - type: text
    content: 'Pas de salut pour lui auprès de Dieu ! '
  - type: text
    content: Pause.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'bouclier  : cf. 5.13n  ; 18.3 ; 28.7 ; 84.12 ; 89.19 ; 91.4 ; 115.9-11 ; 119.114 ; Gn 15.1 ; Dt 33.29. –  ma gloire 62.8. –  tu relèves ma tête 27.6 ; 110.7 ; cf. Gn 40.13n  ; Siracide 11.12s : « Tel est faible et dépourvu de soutien… mais les yeux du Seigneur l''ont regardé avec bienveillance, il l''a redressé de son humiliation. Il lui a relevé la tête et beaucoup s''en sont étonnés. »'
  - type: text
    content: 'Mais toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es pour moi un bouclier ;'
  - type: text
    content: tu es ma gloire, tu relèves ma tête.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Je crie vers le Seigneur  : litt. ma voix vers YHWH je crie (ou j''invoque YHWH ) 4.2,4 ; 18.7 ; 22.3,6 ; 28.1 ; 30.3 ; 31.23 ; 34.7,18 ; 55.17 ; 57.3 ; 61.3 ; 86.3,7 ; 107.6 ; 120.1 ; 130.1 ; 140.7 ; 141.1 ; Ex 8.8 ; Nb 20.16 ; Dt 26.7 ; Jos 24.7 ; Jg 3.9 ; 1S 7.8 ; Es 19.20 ; 58.9 ; Jl 1.19s ; Jon 2.3 ; 3.8 ; Jb 30.20. –  et il me répond  : autre traduction car il m''a répondu. –  montagne sacrée ou sainte 2.6+ ; cf. 20.3.'
  - type: text
    content: 'Je crie vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'et il me répond de sa montagne sacrée. '
  - type: text
    content: Pause.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'On pourrait aussi traduire les trois verbes au passé  : je me suis couché…  ; cf. 4.9 ; 91.5s ; Pr 3.24. –  le Seigneur me soutient 37.17,24.'
  - type: text
    content: Je me couche, et je m'endors ;
  - type: text
    content: 'je me réveille, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me soutient.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Je n''ai pas peur 23.4 ; 27.1,3. –  de gens  : le mot est souvent traduit par peuple.'
  - type: text
    content: Je n'ai pas peur des dizaines de milliers de gens
  - type: text
    content: qui se placent tout autour de moi pour m'attaquer.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Lève-toi 7.7 ; 9.20 ; 10.12 ; 21.14 ; 44.27 ; 68.2 ; 74.22 ; 82.8 ; 94.2 ; 132.8 ; Nb 10.35 ; 2Ch 6.41. –  tu frappes / brises ou tu as frappé / brisé  ; cf. 58.7 ; Jb 29.17.
  - type: text
    content: 'Lève-toi, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Sauve-moi, mon Dieu !'
  - type: text
    content: Car tu frappes à la joue tous mes ennemis,
  - type: text
    content: tu brises les dents des méchants.
  '9':
  - type: text
    content: ' '
  - type: note
    content: au Seigneur qu'appartient le salut 37.39+ ; Jon 2.10 ; Pr 21.31. – Voir bénédiction.
  - type: text
    content: 'C''est au '
  - type: text
    content: Seigneur
  - type: text
    content: ' qu''appartient le salut !'
  - type: text
    content: 'Que ta bénédiction soit sur ton peuple ! '
  - type: text
    content: Pause.
