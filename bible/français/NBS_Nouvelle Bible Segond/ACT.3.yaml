document_id: ACT.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Guérison d'un infirme
  - type: text
    content: ' '
  - type: note
    content: 'Pierre et Jean  : cf. 1.13+ ; 2.47n  ; voir aussi 3.4,11 ; 4.7,13,19 ; 8.14 ; Lc 22.8. –  l''heure de la prière 10.3,9,30 ; Dn 9.21 ; Esd 9.5. –  la neuvième heure depuis le lever du soleil, soit entre 2 h et 3 h de l''après-midi environ, cf. 10.3.'
  - type: text
    content: 'Pierre et Jean montaient au temple à l''heure de la prière (la neuvième heure). '
  '10':
  - type: note
    content: 'On le reconnaissait  : cf. Jn 9.8-10,18ss. –  d''émoi (autre traduction d''effroi  ; terme apparenté v. 11) et de stupéfaction (10.10n) : cf. 2.12s ; 8.13 ; 14.11 ; 28.6 ; voir aussi Mc 1.27n  ; 9.15n  ; Lc 2.18 ; 4.36 ; 5.9,26 ; 7.16.'
  - type: text
    content: 'On le reconnaissait : c''était lui qui était assis à la Belle Porte du temple pour demander des actes de compassion ; les gens furent remplis d''émoi et de stupéfaction au sujet de ce qui lui était arrivé.'
  - type: heading
    content: Discours de Pierre dans le temple
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental  : Comme Pierre et Jean sortaient, il sortit avec eux sans les quitter (litt. les retenant ) ; les (spectateurs) en émoi s''arrêtèrent au portique… de Salomon (galerie située à l''entrée de la partie du temple ouverte aux non-Juifs ; cf. 5.12 ; Jn 10.23).'
  - type: text
    content: 'Comme il ne quittait pas Pierre et Jean, tout le peuple, en émoi, accourut vers eux, au portique dit de Salomon. '
  '12':
  - type: note
    content: 'Hommes d''Israël 2.22n. –  comme si…  : cf. 10.26 ; 14.15. –  puissance 4.7,33. –  piété 10.2+ ; même terme 1Tm 2.2n.'
  - type: text
    content: 'Quand il vit cela, Pierre dit au peuple : Hommes d''Israël, pourquoi vous étonnez-vous de cela ? Pourquoi nous fixez-vous, comme si c''était nous qui avions fait marcher cet homme par notre propre puissance ou par notre piété ? '
  '13':
  - type: note
    content: 'Le Dieu d''Abraham…  : certains mss portent le Dieu d''Abraham, d''Isaac et de Jacob… 7.32 ; Ex 3.6,15s  ; Lc 20.37/ /. –  a glorifié son serviteur (le mot grec peut aussi signifier enfant, fils) 3.26 ; 4.27,30 ; cf. Es 52.13 ; Mt 12.18 ; voir aussi Jn 13.32. –  que vous, vous avez livré  : cf. 2.23+ ; Lc 22.6 ; 24.20 ; 1Co 11.23. –  renié  : le même verbe (aussi 7.35) est traduit par nier en 4.16 ; cf. Lc 8.45n  ; 12.9. –  devant Pilate… Lc 23.13ss/ /.'
  - type: text
    content: Le Dieu d'Abraham, le Dieu d'Isaac, le Dieu de Jacob – le Dieu de nos pères –
  - type: text
    content: ' a glorifié son serviteur Jésus, que vous, vous avez livré et renié devant Pilate, alors que celui-ci avait jugé bon de le relâcher. '
  '14':
  - type: note
    content: 'le Saint 2.27n  ; 4.27,30. –  le Juste 7.52 ; 22.14 ; cf. Es 53.11 ; Mt 27.19 ; Lc 23.47 ; 1P 3.18 ; 1Jn 2.1+. –  vous avez demandé… Lc 23.18-25/ /. –  qu''on vous accorde la grâce  : voir 25.11n,16 ; 27.24 ; Lc 7.21n  ; Rm 8.32n.'
  - type: text
    content: 'Vous, vous avez renié le Saint, le Juste, et vous avez demandé qu''on vous accorde la grâce d''un meurtrier. '
  '15':
  - type: note
    content: 'pionnier  : autres traductions celui qui est à l''origine de la vie, l''initiateur de la vie  ; d''autres comprennent le prince de la vie (cf. 5.31) ; même terme grec Hé 2.10 ; 12.2, dérivé d''un mot qui peut avoir le sens de commencement et celui de principe  ; cf. Ac 26.23 ; Col 1.15,18. –  réveillé (cf. 12.7) ou relevé  : le verbe grec (autre que celui de 2.24n dont il est pratiquement synonyme) signifie aussi susciter, rétablir  ; c''est lui qui est traduit par faire lever au v. 7 ; relever en 9.8 ; 10.26 ; susciter en 13.22 ; cf. 4.10 ; 5.30 ; 10.40 ; 13.30,37. Voir résurrection. –  témoins 1.22+.'
  - type: text
    content: 'Vous avez tué le pionnier de la vie : Dieu l''a réveillé d''entre les morts ; nous, nous en sommes témoins. '
  '16':
  - type: note
    content: 'la foi de son nom  : c.-à-d. la foi associée à son nom, déterminée par son nom, voire engendrée par son nom  ; cf. Ga 2.16n. Sur le nom, voir aussi v. 6 ; 2.21,38+ ; cf. 4.7,10,12,30 ; 5.41 ; 9.14,21 ; 21.13 ; 22.16 ; Ph 2.9s. –  la foi, la foi par Jésus  : litt. la foi (qui est) par lui  ; cf. v. 5 ; 14.9 ; Lc 8.48/ / ; 17.6 ; 1Co 12.9 ; 13.2.'
  - type: text
    content: C'est par la foi de son nom que son nom même a rendu fort cet homme que vous voyez et connaissez ; c'est la foi, la foi par Jésus, qui lui a donné ce complet rétablissement devant vous tous.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ignorance ou méconnaissance , 13.27n  ; 17.30 ; Lc 23.34s ; Rm 10.3n  ; 1Tm 1.13 ; cf. 2Co 3.14-16.
  - type: text
    content: 'Maintenant, mes frères, je sais que vous avez agi par ignorance, tout comme vos chefs. '
  '18':
  - type: note
    content: 'tous les prophètes  : cf. v. 24 ; 13.29 ; 26.22+ ; Lc 24.25-27+,44,46 ; 1Co 15.3s. –  son Christ ou son messie, son oint, l''homme qui a reçu son onction, cf. 4.26s.'
  - type: text
    content: 'Dieu a accompli de cette façon ce qu''il avait annoncé d''avance par la bouche de tous les prophètes : que son Christ souffrirait. '
  '19':
  - type: note
    content: 'Changez… 2.38n. –  faites demi-tour ou revenez, tournez-vous vers Dieu  ; un verbe apparenté est traduit par détourner au v. 26 ; on retrouve le même verbe en 9.35n  ; 11.21 ; 14.15 ; 15.19 ; 26.18-20 ; Lc 22.32n. –  que vos péchés (2.38+) soient effacés  : cf. Col 2.14.'
  - type: text
    content: 'Changez donc radicalement, faites demi-tour, pour que vos péchés soient effacés ; '
  '2':
  - type: note
    content: 'infirme (8.7 ; 14.8 ; Mt 11.5+) de naissance (litt. depuis le sein de sa mère) : même expression 14.8 ; voir aussi Jn 5.1ss ; 9.1ss. –  la Belle  : il s''agit vraisemblablement d''une porte qui donnait accès à la partie du temple réservée aux Juifs. –  un acte de compassion  : autre traduction l''aumône  ; cf. v. 3,10 ; 9.36 ; 10.2,4,31 ; 24.17 ; voir Mt 6.2n.'
  - type: text
    content: 'Or on portait un homme infirme de naissance, qui était placé tous les jours à la porte du temple appelée la Belle, pour demander un acte de compassion à ceux qui entraient dans le temple. '
  '20':
  - type: note
    content: 'qu''ainsi des temps…  : cf. 2P 3.12. –  de réconfort ou, plus littéralement, de rafraîchissement  ; cf. 2Tm 1.16n. –  du Seigneur  : litt. de la face du Seigneur, sémitisme. –  le Christ… Jésus 2.36+. –  destiné  : même verbe 22.14 ; 26.16.'
  - type: text
    content: 'qu''ainsi des temps de réconfort viennent du Seigneur, et qu''il envoie le Christ qui vous a été destiné, Jésus. '
  '21':
  - type: note
    content: 'devait  : litt. doit. –  du rétablissement (autre traduction de la réalisation) de tout… ou de toutes choses, (temps) dont Dieu a parlé…  ; cf. 1.6+ ; 3.25 ; Mt 17.11 ; 19.28 ; 2P 3.13 ; Ap 21.1-5 ; voir aussi Ml 3.23s. –  par la bouche…  : cf. Lc 1.69s.'
  - type: text
    content: 'C''est lui que le ciel devait accueillir jusqu''aux temps du rétablissement de tout ce dont Dieu a parlé par la bouche de ses saints prophètes d''autrefois. '
  '22':
  - type: note
    content: Cf. 7.25-37 ; Dt 18.15-20  ; voir aussi Mc 9.4-7/ / ; Jn 1.21 ; 6.14 ; 7.40. –  suscitera v. 26n.
  - type: text
    content: 'Moïse a dit : '
  - type: text
    content: Le Seigneur, votre Dieu, suscitera pour vous, d'entre vos frères, un prophète comme moi ; vous l'écouterez en tout ce qu'il
  - type: text
    content: ' vous '
  - type: text
    content: dira
  - type: text
    content: '. '
  '23':
  - type: note
    content: 'quiconque  : autre traduction toute âme qui (cf. Mt 10.28n) ; Lv 23.29. –  il disparaîtra (sous-entendu dans le texte) du peuple  : cf. 15.14-17.'
  - type: text
    content: Mais quiconque n'écoutera pas ce prophète sera détruit, il disparaîtra du peuple
  - type: text
    content: '. '
  '24':
  - type: note
    content: 'Tous les prophètes… v. 18+ ; 10.43. –  depuis Samuel 13.20 ; Hé 11.32. –  ces jours-là  : autre traduction ces jours-ci.'
  - type: text
    content: 'Tous les prophètes, depuis Samuel et ses successeurs, ont aussi parlé de ces jours-là et les ont annoncés. '
  '25':
  - type: note
    content: 'fils… de l''alliance  : cf. 7.8 ; Ez 30.5 ; la même expression apparaît dans les Psaumes de Salomon (17.15) ; Rm 9.4s ; Ep 2.12. –  que Dieu a établie avec vos pères (certains mss portent nos pères) : cf. v. 13 ; Jr 11.10 ; Lc 22.29n. –  Toutes les familles… Gn 22.18 ; 26.4  ; cf. 12.3n  ; 18.18 ; Ga 3.8. –  en (ou par) ta descendance  : le mot traduit par descendance désigne habituellement, de façon collective, les descendants ; ici cependant il semble s''appliquer en particulier au Christ (v. 26) ; cf. Ga 3.16,19.'
  - type: text
    content: 'Vous, vous êtes les fils des prophètes et de l''alliance que Dieu a établie avec vos pères en disant à Abraham : '
  - type: text
    content: Toutes les familles de la terre seront bénies en ta descendance
  - type: text
    content: '. '
  '26':
  - type: note
    content: 'd''abord  : cf. 2.39 ; même adverbe en 13.46 ; Rm 1.16 ; 2.9 ; ici il pourrait aussi se rapporter au verbe  : ayant d''abord suscité, comme en v. 22 ; le verbe traduit par susciter a aussi le sens de relever ou ressusciter (2.24n). –  son serviteur v. 13+. –  l''a envoyé v. 20 ; 7.35 ; 10.36 ; Lc 4.18. –  pour vous bénir v. 25 ; cf. Rm 15.29 ; 1P 3.9. –  en détournant… v. 19n  ; cf. 5.31 ; Ez 3.18 ; 18.27-30 ; 33.12-19. –  de sa méchanceté  : autre traduction de ses actes mauvais.'
  - type: text
    content: C'est à vous d'abord que Dieu, après avoir suscité son serviteur, l'a envoyé pour vous bénir, en détournant chacun de vous de sa méchanceté.
  '3':
  - type: note
    content: 'il se mit…  : litt. il demandait à recevoir un acte de compassion (ou l''aumône, v. 2n) ; certains mss omettent à recevoir.'
  - type: text
    content: 'Voyant Pierre et Jean qui allaient entrer dans le temple, il se mit à demander un acte de compassion. '
  '4':
  - type: note
    content: Cf. 13.9 ; 14.9.
  - type: text
    content: 'Pierre, avec Jean, le fixa et dit : Regarde-nous. '
  '5':
  - type: text
    content: 'Lui les observait, s''attendant à recevoir d''eux quelque chose. '
  '6':
  - type: note
    content: 'Je ne possède… 2.44 ; 4.32. –  par le nom… 3.16+ ; 4.7,10 ; cf. 9.34 ; 16.18 ; 19.13. –  le Nazoréen 2.22+. –  lève-toi et marche  : certains mss portent simplement marche  ; 14.10 ; cf. Mt 8.15/ / ; Jn 5.8.'
  - type: text
    content: 'Mais Pierre dit : Je ne possède ni argent, ni or ; mais ce que j''ai, je te le donne : par le nom de Jésus-Christ le Nazoréen, lève-toi et marche ! '
  '7':
  - type: note
    content: 'il le fit lever  : cf. v. 15. –  A l''instant même Lc 4.39+.'
  - type: text
    content: 'Le saisissant par la main droite, il le fit lever. A l''instant même, ses pieds et ses chevilles devinrent fermes ; '
  '8':
  - type: note
    content: 'dans le temple Jn 5.14. –  sautant  : cf. Es 35.6. –  louant Dieu 2.47+.'
  - type: text
    content: 'd''un bond il fut debout et il se mit à marcher. Il entra avec eux dans le temple, marchant, sautant et louant Dieu. '
  '9':
  - type: text
    content: 'Tout le peuple le vit marcher et louer Dieu. '
