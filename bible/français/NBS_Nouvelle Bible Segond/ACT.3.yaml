document_id: ACT.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d'un infirme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pierre et Jean
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1.13+ ; 2.47'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 3.4,11 ; 4.7,13,19 ; 8.14 ; Lc 22.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''heure de la prière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.3,9,30 ; Dn 9.21 ; Esd 9.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la neuvième heure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: depuis le lever du soleil, soit entre 2 h et 3 h de l'après-midi environ, cf. 10.3.
    marker-yv: yv-n
  - type: text
    text: 'Pierre et Jean montaient au temple à l''heure de la prière (la neuvième heure). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'infirme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(8.7 ; 14.8 ; Mt 11.5+) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de naissance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: depuis le sein de sa mère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : même expression 14.8 ; voir aussi Jn 5.1ss ; 9.1ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la Belle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit vraisemblablement d''une porte qui donnait accès à la partie du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: ' réservée aux Juifs. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un acte de compassion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'aumône
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 3,10 ; 9.36 ; 10.2,4,31 ; 24.17 ; voir Mt 6.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Or on portait un homme infirme de naissance, qui était placé tous les jours à la porte du temple appelée la Belle, pour demander un acte de compassion à ceux qui entraient dans le temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il se mit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il demandait à recevoir un acte de compassion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'aumône
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', v. 2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; certains mss omettent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à recevoir.
    marker-yv: yv-n
  - type: text
    text: 'Voyant Pierre et Jean qui allaient entrer dans le temple, il se mit à demander un acte de compassion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 13.9 ; 14.9.
    marker-yv: yv-n
  - type: text
    text: 'Pierre, avec Jean, le fixa et dit : Regarde-nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lui les observait, s''attendant à recevoir d''eux quelque chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je ne possède… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.44 ; 4.32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.16+ ; 4.7,10 ; cf. 9.34 ; 16.18 ; 19.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Nazoréen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.22+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lève-toi et marche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent simplement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: marche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; 14.10 ; cf. Mt 8.15/ / ; Jn 5.8.'
    marker-yv: yv-n
  - type: text
    text: 'Mais Pierre dit : Je ne possède ni argent, ni or ; mais ce que j''ai, je te le donne : par le nom de Jésus-Christ le Nazoréen, lève-toi et marche ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il le fit lever
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'A l''instant même '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 4.39+.
    marker-yv: yv-n
  - type: text
    text: 'Le saisissant par la main droite, il le fit lever. A l''instant même, ses pieds et ses chevilles devinrent fermes ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans le temple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jn 5.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sautant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 35.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'louant Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.47+.
    marker-yv: yv-n
  - type: text
    text: 'd''un bond il fut debout et il se mit à marcher. Il entra avec eux dans le temple, marchant, sautant et louant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tout le peuple le vit marcher et louer Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On le reconnaissait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jn 9.8-10,18ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''émoi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'effroi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; terme apparenté v. 11) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'et de stupéfaction '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (10.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : cf. 2.12s ; 8.13 ; 14.11 ; 28.6 ; voir aussi Mc 1.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 9.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 2.18 ; 4.36 ; 5.9,26 ; 7.16.'
    marker-yv: yv-n
  - type: text
    text: 'On le reconnaissait : c''était lui qui était assis à la Belle Porte du temple pour demander des actes de compassion ; les gens furent remplis d''émoi et de stupéfaction au sujet de ce qui lui était arrivé.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Discours de Pierre dans le temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Texte occidental
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Comme Pierre et Jean sortaient, il sortit avec eux sans les quitter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les retenant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les (spectateurs) en émoi s''arrêtèrent '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au portique… de Salomon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (galerie située à l'entrée de la partie du temple ouverte aux non-Juifs ; cf. 5.12 ; Jn 10.23).
    marker-yv: yv-n
  - type: text
    text: 'Comme il ne quittait pas Pierre et Jean, tout le peuple, en émoi, accourut vers eux, au portique dit de Salomon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hommes d''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme si…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.26 ; 14.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'puissance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.7,33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'piété '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.2+ ; même terme 1Tm 2.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand il vit cela, Pierre dit au peuple : Hommes d''Israël, pourquoi vous étonnez-vous de cela ? Pourquoi nous fixez-vous, comme si c''était nous qui avions fait marcher cet homme par notre propre puissance ou par notre piété ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le Dieu d'Abraham…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le Dieu d''Abraham, d''Isaac et de Jacob… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.32 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ex 3.6,15s
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Lc 20.37/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'a '
      - type: usfm
        marker: w
        children:
        - type: text
          text: glorifié
      - type: text
        text: ' son serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le mot grec peut aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: enfant, fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') 3.26 ; 4.27,30 ; cf. Es 52.13 ; Mt 12.18 ; voir aussi Jn 13.32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que vous, vous avez livré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.23+ ; Lc 22.6 ; 24.20 ; 1Co 11.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: renié
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe (aussi 7.35) est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 4.16 ; cf. Lc 8.45
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 12.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'devant Pilate… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 23.13ss/ /.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Le Dieu d'Abraham, le Dieu d'Isaac, le Dieu de Jacob – le Dieu de nos pères –
  - type: text
    text: ' a glorifié son serviteur Jésus, que vous, vous avez livré et renié devant Pilate, alors que celui-ci avait jugé bon de le relâcher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Saint
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 4.27,30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juste
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.52 ; 22.14 ; cf. Es 53.11 ; Mt 27.19 ; Lc 23.47 ; 1P 3.18 ; 1Jn 2.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous avez demandé… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lc 23.18-25/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qu''on vous accorde la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir 25.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',16 ; 27.24 ; Lc 7.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 8.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous, vous avez renié le Saint, le Juste, et vous avez demandé qu''on vous accorde la grâce d''un meurtrier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pionnier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui qui est à l'origine de la vie, l'initiateur de la vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le prince de la vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 5.31) ; même terme grec Hé 2.10 ; 12.2, dérivé d''un mot qui peut avoir le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'commencement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et celui de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: principe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ac 26.23 ; Col 1.15,18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'réveillé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 12.7) ou '
    - type: usfm
