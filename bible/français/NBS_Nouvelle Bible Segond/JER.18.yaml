document_id: JER.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie chez le potier
  - type: text
    content: 'Parole qui parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  '10':
  - type: note
    content: 'Cf. v. 8+ ; Gn 6.6s. –  cette nation  : sous-entendu dans le texte. –  ce qui me déplaît  : litt. ce qui (est) mauvais à mes yeux  ; cf. 1R 11.6n.'
  - type: text
    content: 'mais si cette nation fait ce qui me déplaît, sans m''écouter, je renonce au bien que j''avais parlé de lui faire. '
  '11':
  - type: note
    content: hommes de Juda… 32.32. –  Je façonne ou je prépare  ; le verbe hébreu correspondant est identique au mot pour potier. –  Que chacun de vous revienne (3.12n) de sa voie mauvaise 23.22 ; 25.5 ; 35.15 ; 2R 17.13 ; Za 1.4 ; cf. Ac 3.19 ; Rm 2.4. –  Réformez 7.3n.
  - type: text
    content: 'Maintenant, je te prie, dis aux hommes de Juda et aux habitants de Jérusalem : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je façonne un malheur pour vous, je prépare un plan contre vous. Que chacun de vous revienne de sa voie mauvaise ! Réformez vos voies et vos agissements ! '
  '12':
  - type: note
    content: A quoi bon ? 2.25n. –  nos pensées ou nos plans  ; cf. v. 18. –  obstination… 3.17n.
  - type: text
    content: 'Mais ils disent : A quoi bon ? Nous suivrons nos pensées, chacun de nous agira selon l''obstination de son cœur mauvais.'
  - type: heading
    content: Israël a oublié son Dieu
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Faites votre enquête…  : cf. 2.10s. –  Israël la jolie  : litt. la vierge d''Israël  ; cf. 14.17+. –  horribles excès 5.30.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: 'Faites votre enquête parmi les nations, je vous prie :'
  - type: text
    content: qui a jamais entendu pareilles choses ?
  - type: text
    content: Israël la jolie a commis d'horribles excès.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur, diversement rendu par les versions anciennes ; la traduction est conjecturale ; avec quelques modifications textuelles, on a aussi compris  : Les silex disparaissent-ils des champs, la neige du Liban ? Les villes sont-elles déracinées par les eaux, la cité par les flots ? –  de loin  : litt. étrangère ou des étrangers.'
  - type: text
    content: Abandonne-t-on ce qui sort du rocher en pleine campagne,
  - type: text
    content: ou la neige du Liban ?
  - type: text
    content: Se défait-on de l'eau fraîche qui vient de loin ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'oublié 2.32+. –  offrent de l''encens 1.16+. –  inutilement  : même expression 2.30 ; 4.30 ; 6.29 ; 46.11 ; le sens est peut-être ici aux idoles (décrites par mépris comme du néant  ; cf. 2.8,11). –  on les a fait trébucher  : LXX semble avoir lu ils ont trébuché  ; cf. v. 23 ; 6.15,21. –  routes d''autrefois 6.16n.'
  - type: text
    content: Cependant mon peuple m'a oublié.
  - type: text
    content: Ils offrent de l'encens inutilement ;
  - type: text
    content: on les a fait trébucher dans leurs voies,
  - type: text
    content: dans les routes d'autrefois,
  - type: text
    content: pour qu'ils suivent des sentiers
  - type: text
    content: et des voies non frayés.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'lieu dévasté et sont atterrés traduisent deux termes hébreux apparentés ; cf. 1R 9.8n. – Le sifflement exprime sans doute une horreur (terme sous-entendu dans le texte) accompagnée de crainte superstitieuse ; de même en 19.8 ; 25.9,18 ; 29.18 ; 51.37 ; cf. 49.17 ; 50.13 ; 1R 9.8 ; Ez 27.36 ; Mi 6.16 ; So 2.15 ; Jb 27.23 ; Lm 2.15s ; 2Ch 29.8 ; voir aussi Lv 26.32 ; Jr 44.22 ; signification analogue pour l''expression de dégoût ils hochent la tête (litt. ils hochent la tête ) : cf. 15.5n  ; 48.27 ; Ps 22.8 ; 44.15 ; Mt 27.39.'
  - type: text
    content: Ils ont réduit leur pays en un lieu dévasté,
  - type: text
    content: en un objet de sifflement d'horreur, pour toujours ;
  - type: text
    content: tous ceux qui y passent sont atterrés
  - type: text
    content: et de dégoût ils hochent la tête.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Le vent d''est est celui du désert, porteur de sécheresse et de destruction ; cf. 4.11 ; 13.24 ; Jb 27.21 ; 38.24+. –  disperserai 9.15+. –  devant  : litt. en face de , comme dans la suite. –  ce n''est pas de face…  : c.-à-d. je les mettrai en fuite  ; cf. Ex 23.27n  ; des versions anciennes ont lu je leur ferai voir le dos… , c.-à-d. je leur tournerai le dos  ; cf. 2.27+. –  au jour…  : litt. au jour de leur catastrophe.'
  - type: text
    content: Pareil au vent d'est, je les disperserai
  - type: text
    content: devant l'ennemi ;
  - type: text
    content: ce n'est pas de face que je les verrai, mais de dos,
  - type: text
    content: au jour où la catastrophe s'abattra sur eux.
  - type: heading
    content: Complot contre Jérémie ; prière du prophète
  '18':
  - type: text
    content: ' '
  - type: note
    content: '11.18+. –  préparons un plan  : cf. Ps 83.4. –  loi / prêtre  : cf. 2.8n  ; Lm 2.9s. –  ne fera pas défaut au  : autre traduction ne disparaîtra pas faute de  ; cf. Ez 7.26. –  conseil  : le même terme est traduit par projet au v. 23 ; cf. Es 5.19n. –  par la langue  : cf. 9.2,7 ; d''après des versions anciennes, certains modifient le texte hébreu traditionnel pour lire frappons-le au moyen de sa propre langue, prêtons attention à toutes ses paroles  ; cf. Lc 11.53s.'
  - type: text
    content: 'Ils ont dit : Venez, préparons un plan contre Jérémie ! Car la loi ne fera pas défaut au prêtre, ni le conseil au sage, ni la parole au prophète. Venez, frappons-le par la langue, et ne prêtons pas attention à toutes ses paroles !'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 5.3.
  - type: text
    content: '– Prête attention à moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: entends ce que disent mes adversaires !
  '2':
  - type: note
    content: 'Cf. Mt 27.10 ; Siracide 38.32-34 (à propos du potier [v. 11n] et d''autres artisans, considérés comme inférieurs aux scribes) : « Sans eux il ne se bâtit pas de ville, on n''y habiterait pas, on n''y circulerait pas, mais au conseil du peuple on ne demandera pas leur avis et dans l''assemblée ils n''accéderont pas aux places d''honneur… ils ne comprennent pas les dispositions du droit et ils ne font briller ni l''instruction ni le droit. On ne les trouvera pas occupés par des proverbes, mais ils affermiront la création éternelle et leur prière concerne leur métier. » –  Descends  : litt. Lève-toi et descends.'
  - type: text
    content: 'Descends chez le potier ; là, je te ferai entendre mes paroles. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'le mal pour le bien Ps 35.12. –  pour m''ôter la vie  : cf. v. 22. –  devant toi 15.19+ ; cf. 15.1. –  parler en leur faveur  : cf. 7.16+ ; 17.16n. –  détourner d''eux ta fureur  : cf. Ps 106.30.'
  - type: text
    content: Rendra-t-on le mal pour le bien ?
  - type: text
    content: Car ils ont creusé une fosse pour m'ôter la vie.
  - type: text
    content: Souviens-toi que je me suis tenu devant toi
  - type: text
    content: pour parler en leur faveur
  - type: text
    content: et détourner d'eux ta fureur.
  '21':
  - type: text
    content: ' '
  - type: note
    content: '17.18+. –  livre leurs fils…  : cf. 6.11 ; 11.22 ; Es 9.16 ; Ps 63.11+ ; 109.13. –  précipite-les…  : le verbe signifie habituellement faire couler, verser (cf. Mi 1.6 ; Ps 75.9) ; autre traduction livre-les au pouvoir de l''épée , cf. Ez 35.5 ; Ps 63.11. –  leurs femmes… Ps 109.9. –  par la mort  : le terme désigne parfois la peste ; cf. 14.12+ ; 15.2+ ; voir aussi 9.20.'
  - type: text
    content: A cause de cela, livre leurs fils à la famine,
  - type: text
    content: précipite-les sur le tranchant de l'épée ;
  - type: text
    content: que leurs femmes soient privées d'enfants et deviennent veuves,
  - type: text
    content: et que leurs maris soient atteints par la mort ;
  - type: text
    content: que leurs jeunes gens soient frappés par l'épée pendant la guerre !
  '22':
  - type: text
    content: ' '
  - type: note
    content: une fosse v. 20. –  des filets Ps 9.16 ; 140.6.
  - type: text
    content: Qu'on entende des cris sortir de leurs maisons,
  - type: text
    content: quand tu feras venir contre eux, à l'improviste, une troupe armée !
  - type: text
    content: Car ils ont creusé une fosse pour me prendre,
  - type: text
    content: ils ont caché des filets sous mes pieds.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'tu connais 12.3 ; cf. Ha 1.13 ; Ps 35.22. –  Ne fais pas l''expiation  : autre traduction ne pardonne pas  ; cf. Ps 109.14 ; Né 3.37 ; 6.14. – Voir péché. –  trébuchent v. 15+ ; cf. Ez 21.20n.'
  - type: text
    content: 'Et toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu connais'
  - type: text
    content: tous les projets meurtriers qu'ils forment contre moi.
  - type: text
    content: Ne fais pas l'expiation sur leur faute,
  - type: text
    content: n'efface pas leur péché de devant toi !
  - type: text
    content: Qu'ils trébuchent devant toi !
  - type: text
    content: Agis contre eux au temps de ta colère !
  '3':
  - type: note
    content: 'tour  : litt. les deux pierres (même mot, dans un autre sens, en Ex 1.16n) ; cf. Siracide 38.29s : « Ainsi en est-il du potier assis à son travail et faisant tourner le tour avec ses pieds… Avec son bras il façonne l''argile et avec ses pieds il fait fléchir sa résistance. »'
  - type: text
    content: 'Je descendis chez le potier ; il faisait un ouvrage sur le tour. '
  '4':
  - type: note
    content: 'comme il arrive…  : d''après quelques mss ; l''autre leçon pourrait signifier  : la poterie qu''il faisait avec l''argile fut manquée (litt. s''abîma, comme en 13.7n) dans la main du potier. –  telle qu''il lui plut…  : litt. selon qu''il était droit (c.-à-d. correct) aux yeux du potier.'
  - type: text
    content: 'La poterie qu''il faisait fut manquée, comme il arrive avec l''argile dans la main du potier. Il en refit une autre poterie, telle qu''il lui plut de la faire. '
  '5':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint : '
  '6':
  - type: note
    content: 'Cf. Gn 2.7n  ; Es 29.16 ; 45.9 ; 64.7 ; Jb 10.8s ; Rm 9.19-21 ; Siracide 33.10-14 : « Les hommes aussi sont tous tirés du sol et c''est de la terre qu''Adam fut créé. Le Seigneur pourtant, dans sa grande sagesse, les a distingués et les a fait marcher dans des voies différentes. Il a béni et exalté certains d''entre eux, il a consacré certains autres et se les est attachés. Il en a maudit et abaissé d''autres, il les a renversés de leur position. Comme l''argile qui se trouve dans la main du potier peut être façonnée selon son bon plaisir, ainsi sont les hommes entre les mains de leur auteur qui les rétribuera selon son jugement. En face du mal, il y a le bien, et en face de la mort, la vie : ainsi, face à l''homme pieux se trouve le pécheur. »'
  - type: text
    content: 'Ne puis-je pas agir envers vous comme ce potier, maison d''Israël ? – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Comme l''argile dans la main du potier, ainsi vous êtes dans ma main, maison d''Israël ! '
  '7':
  - type: note
    content: 'Tantôt  : le mot hébreu peut aussi signifier soudain ou tout à coup, de même au v. 9 (cf. 4.20). –  déraciner… 1.10+.'
  - type: text
    content: 'Tantôt je parle, à propos d''une nation ou d''un royaume, de déraciner, de démolir et de faire disparaître ; '
  '8':
  - type: note
    content: 'mal  : le même terme est traduit par malheur au v. 11+. –  je renonce…  : autre traduction je regrette le mal…  ; cf. v. 10 ; 4.28+ ; 26.3,13,19 ; 42.10 ; Ez 18.21s ; Jl 2.13 ; Jon 3.10 ; voir aussi Nb 23.19+.'
  - type: text
    content: 'mais si cette nation contre laquelle j''ai parlé revient du mal qu''elle a fait, je renonce au mal que je pensais lui faire. '
  '9':
  - type: note
    content: V. 7n  ; cf. 1.10+.
  - type: text
    content: 'Et tantôt je parle, à propos d''une nation ou d''un royaume, de bâtir et de planter ; '
