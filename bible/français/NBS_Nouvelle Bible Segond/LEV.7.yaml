document_id: LEV.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sacrifice de réparation
  - type: text
    content: ' '
  - type: note
    content: 5.15+. – Voir sacrifices.
  - type: text
    content: 'Voici la loi concernant le sacrifice de réparation : c''est une chose très sacrée. '
  '10':
  - type: note
    content: 'pétrie à l''huile 2.1,4,15. –  sèche 5.11+. –  fils d''Aaron  : voir prêtre. –  sans distinction  : litt. l''homme (c.-à-d. chacun) comme son frère  ; même expression en Ez 47.14.'
  - type: text
    content: Toute offrande végétale pétrie à l'huile ou sèche sera pour tous les fils d'Aaron, sans distinction.
  - type: heading
    content: Le sacrifice de paix
  '11':
  - type: text
    content: ' '
  - type: note
    content: '3.1+. – Voir loi. –  qu''on présente  : litt. qu''il présente.'
  - type: text
    content: 'Voici la loi concernant le sacrifice de paix qu''on présente au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'Si quelqu''un…  : litt. s''il le présente… –  reconnaissance ou louange, confession  ; certains comprennent avec un sacrifice de reconnaissance (ou de louange, de confession) ; cf. 22.29 ; Jr 17.26 ; 33.11 ; Am 4.5 ; Ps 26.7n  ; 50.14,23 ; 56.13 ; 95.2 ; 100.1,4 ; 107.21s ; 116.17 ; 2Ch 29.31 ; 33.16 ; Hé 13.15 ; de l''énumération de Nb 15.3, on déduit parfois que ce sacrifice était offert à l''occasion d''une fête. –  arrosées d''huile 2.4+.'
  - type: text
    content: 'Si quelqu''un le présente pour une « reconnaissance », il présentera, avec le sacrifice de reconnaissance, des gâteaux sans levain pétris à l''huile, des galettes sans levain arrosées d''huile et de la fleur de farine en gâteaux pétris à l''huile. '
  '13':
  - type: note
    content: 'levés  : cf. 2.11+. –  reconnaissance v. 12n. –  paix 3.1n.'
  - type: text
    content: 'Il offrira son présent avec des gâteaux levés, en plus de son sacrifice de reconnaissance et de paix. '
  '14':
  - type: note
    content: 'Il présentera  : autre traduction on présentera  ; cf. v. 11n. –  prélèvement v. 32,34 ; 6.8 ; 10.14s ; 22.12 ; un verbe apparenté est rendu par prélever en 4.8,10,19 ; 6.3 ; cf. Ex 25.2n  ; Ez 20.40.'
  - type: text
    content: 'Il présentera en prélèvement pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' une portion de chaque présent ; elle sera pour le prêtre qui a fait l''aspersion du sang du sacrifice de paix. '
  '15':
  - type: note
    content: on n'en laissera rien… 22.30 ; cf. Ex 12.10 ; à part la portion réservée au prêtre et les éléments brûlés sur l'autel (Lv 3.3-5 ; 7.29-34), la victime était mangée par celui qui offre et sa famille (cf. 1S 1.3-5 ; 2.12-17).
  - type: text
    content: On mangera la viande du sacrifice de reconnaissance et de paix le jour où on l'offrira en présent ; on n'en laissera rien jusqu'au matin.
  '16':
  - type: text
    content: ' '
  - type: note
    content: vœu / offrande volontaire (cf. 10.1n) 22.18-23 ; Ex 25.2n  ; Nb 15.3 ; Dt 16.10 ; Ez 46.12 ; Ps 22.26 ; 50.14 ; 56.13 ; 66.13 ; 116.14,18 ; Esd 1.4 ; 3.5 ; 2Ch 31.14.
  - type: text
    content: 'Si le présent de quelqu''un correspond à un vœu ou à une offrande volontaire, on mangera son sacrifice le jour où on le présentera, et on pourra manger ce qui en restera le lendemain. '
  '17':
  - type: text
    content: 'Ce qui restera de la viande du sacrifice sera jeté au feu le troisième jour. '
  '18':
  - type: note
    content: 'une chose impropre  : le terme technique correspondant n''apparaît qu''ici et en 19.7 ; Es 65.4 ; Ez 4.14. –  celui  : litt. l''être, de même aux v. 20s,25 (cf. 2.1n  ; Gn 1.20n). –  faute  : voir péché.'
  - type: text
    content: 'Si l''on mangeait de la viande de son sacrifice de paix le troisième jour, celui qui l''a présenté ne serait pas agréé, il ne lui en serait pas tenu compte ; c''est une chose impropre : celui qui en mange sera chargé de sa faute.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Sinon…  : litt. et la viande, quiconque…  ; la seconde partie du v. se rapporte de nouveau à la viande propre à la consommation rituelle, comme au v. 15. –  pur  : cf. v. 20s.'
  - type: text
    content: 'La viande qui a touché quelque chose d''impur, on ne la mangera pas, on la jettera au feu. Sinon, quiconque est pur peut manger de la viande ; '
  '2':
  - type: note
    content: 'On aspergera  : litt. il aspergera, de même dans la suite.'
  - type: text
    content: 'C''est dans le lieu où on immole l''holocauste qu''on immolera aussi le sacrifice de réparation. On aspergera de son sang le pourtour de l''autel. '
  '20':
  - type: note
    content: 'Cf. 5.2s ; 13.45s ; 15.2s,19 ; 22.3-7. –  retranché de son peuple (ou des siens) : selon certains, cette expression n''évoquerait pas tant la peine de mort elle-même qu''une exclusion socio-religieuse, associée ou non à la peine de mort ; cf. v. 21,25,27 ; 17.9 ; 19.8 ; 20.2-6 ; 23.29s ; Gn 17.14n  ; Ex 12.15-19 ; 30.33,38 ; 31.14 ; Nb 9.13.'
  - type: text
    content: 'mais celui qui, se trouvant en état d''impureté, mange de la viande du sacrifice de paix qui appartient au '
  - type: text
    content: Seigneur
  - type: text
    content: ', celui-là sera retranché de son peuple. '
  '21':
  - type: note
    content: 'qui touche…  : chap. 11–15.'
  - type: text
    content: 'Celui qui touche quelque chose d''impur, une impureté humaine, une bête impure ou quelque autre horreur impure, et qui mange de la viande du sacrifice de paix qui appartient au '
  - type: text
    content: Seigneur
  - type: text
    content: ', celui-là sera retranché de son peuple.'
  - type: heading
    content: Prescriptions à l'usage du peuple
  '22':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '23':
  - type: note
    content: 3.3n.
  - type: text
    content: 'Dis aux Israélites : Vous ne mangerez pas de graisse de bœuf, de mouton ni de chèvre. '
  '24':
  - type: note
    content: bête crevée ou déchiquetée 17.15 ; 22.8 ; cf. Ex 22.30 ; Dt 14.21 ; Ez 4.14+.
  - type: text
    content: 'La graisse d''une bête crevée ou déchiquetée pourra servir à n''importe quel autre usage ; mais vous ne la mangerez pas. '
  '25':
  - type: text
    content: 'En effet, quiconque mange la graisse d''une bête qu''on présente au '
  - type: text
    content: Seigneur
  - type: text
    content: ' en offrande consumée par le feu, celui-là sera retranché de son peuple. '
  '26':
  - type: note
    content: 3.17+. – Voir sang.
  - type: text
    content: 'Vous ne mangerez pas de sang, ni sang d''oiseau, ni sang de bête, dans tous vos lieux d''habitation. '
  '27':
  - type: text
    content: Quiconque mange du sang, quel que soit ce sang, sera retranché de son peuple.
  '28':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '29':
  - type: note
    content: présent 1.2n  ; il s'agit ici de la part du sacrifice de paix (3.1+) réservée à Dieu et aux prêtres (7.15n).
  - type: text
    content: 'Dis aux Israélites : Celui qui présente son sacrifice de paix au '
  - type: text
    content: Seigneur
  - type: text
    content: ' apportera au '
  - type: text
    content: Seigneur
  - type: text
    content: ' son présent, pris sur son sacrifice de paix. '
  '3':
  - type: note
    content: queue 3.9n.
  - type: text
    content: 'On présentera toute sa graisse, la queue, la graisse qui couvre les entrailles, '
  '30':
  - type: note
    content: 'qu''on dédie rituellement  : l''étymologie du verbe hébreu correspondant semble évoquer un mouvement de va-et-vient ; il s''agit peut-être ici d''un balancement d''arrière en avant, la portion étant ainsi symboliquement offerte à Dieu, qui la donnerait ensuite aux prêtres ; cf. v. 34 ; 8.27,29 ; 9.21 ; 10.14s ; 14.12,21,24 ; 23.11ss ; voir aussi Ex 29.24+ ; Nb 18.11n  ; Es 30.32n.'
  - type: text
    content: 'Il apportera de ses propres mains la graisse en offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il l''apportera avec la poitrine, la poitrine qu''on dédie rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '31':
  - type: note
    content: 'Cf. Dt 18.3. –  pour Aaron et pour ses fils  : voir prêtre.'
  - type: text
    content: 'Le prêtre fera fumer la graisse sur l''autel, et la poitrine sera pour Aaron et pour ses fils. '
  '32':
  - type: note
    content: cuisse droite Ex 29.22 ; 1S 9.24 ; cf. Gn 24.2n  ; 32.26n (autre terme hébreu).
  - type: text
    content: 'Dans vos sacrifices de paix, vous donnerez la cuisse droite en prélèvement pour le prêtre. '
  '33':
  - type: text
    content: 'Celui des fils d''Aaron qui présente le sang et la graisse du sacrifice de paix aura la cuisse droite pour part : '
  '34':
  - type: note
    content: 'en les prenant…  : autre traduction de la part des Israélites  ; cf. 24.8 ; Ex 29.28.'
  - type: text
    content: 'je prends sur les sacrifices de paix offerts par les Israélites la poitrine qu''on dédie rituellement et la cuisse qu''on prélève ; je les donne à Aaron, le prêtre, et à ses fils, par une prescription perpétuelle, en les prenant sur ce qui appartient aux Israélites. '
  '35':
  - type: note
    content: 'Cf. 6.2n. –  le droit que l''onction… leur donnera  : le terme hébreu ainsi traduit ressemble à celui qui est rendu par onction au v. 36 ; cf. 4.3n  ; mais il se peut qu''il vienne d''une autre racine et signifie simplement part réservée, prérogative. –  on les présentera  : litt. il les présentera.'
  - type: text
    content: 'C''est là le droit que l''onction d''Aaron et de ses fils leur donnera sur les offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', depuis le jour où on les présentera afin qu''ils exercent le sacerdoce pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '36':
  - type: note
    content: 'Cf. Ml 3.7-10 ; Né 10.33-40 ; 12.44–13.31. –  prescription  : voir loi.'
  - type: text
    content: 'C''est ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ordonne aux Israélites de leur donner le jour où ils reçoivent l''onction ; c''est une prescription perpétuelle, pour toutes leurs générations. '
  '37':
  - type: note
    content: 'l''investiture  : le terme est dérivé de la racine hébraïque qui signifie remplir, accomplir (cf. 8.33n  ; Ex 28.41n) ; il s''applique à l''ensemble de la cérémonie décrite au chap. 8 (cf. Jg 17.5-12), et plus particulièrement ici au sacrifice qu''elle comportait (8.22-30).'
  - type: text
    content: 'Telle est la loi relative à l''holocauste, à l''offrande végétale, au sacrifice pour le péché, au sacrifice de réparation, à l''investiture et au sacrifice de paix, '
  '38':
  - type: note
    content: Autre traduction telle que le Seigneur la prescrivit à (ou la donna à ; l'institua pour, verbe apparenté au terme habituellement traduit par commandement) …
  - type: text
    content: 'selon ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ordonna à Moïse au mont Sinaï, le jour où il ordonna aux Israélites d''offrir leurs présents au '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans le désert du Sinaï.'
  '4':
  - type: text
    content: 'les deux rognons et la graisse qui les entoure, celle qui couvre les flancs, et le lobe du foie, qu''on détachera près des rognons. '
  '5':
  - type: text
    content: 'Le prêtre fera fumer cela sur l''autel en offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. C''est un sacrifice de réparation. '
  '6':
  - type: note
    content: 'tout mâle (6.11+) parmi les prêtres  : c.-à-d. appartenant à une famille sacerdotale.'
  - type: text
    content: 'Ce sera tout mâle parmi les prêtres qui en mangera ; on le mangera dans un lieu sacré ; c''est une chose très sacrée. '
  '7':
  - type: text
    content: 'Il en est du sacrifice de réparation comme du sacrifice pour le péché ; la loi est la même pour les deux : il sera pour le prêtre qui fait l''expiation.'
  - type: heading
    content: Ce qui revient aux prêtres
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'la peau de l''holocauste…  : cf. 1.3nss ; voir sacrifices.'
  - type: text
    content: Quand un prêtre présente l'holocauste de quelqu'un, la peau de l'holocauste qu'il a offert sera pour le prêtre.
  '9':
  - type: text
    content: ' '
  - type: note
    content: gril / poêle 2.5n,7n.
  - type: text
    content: 'Toute offrande végétale cuite au four, préparée sur le gril ou à la poêle, sera pour le prêtre qui l''a présentée. '
