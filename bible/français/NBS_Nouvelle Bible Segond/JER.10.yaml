document_id: JER.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Dieu vivant face aux idoles
  - type: text
    content: ' '
  - type: note
    content: 2.4+.
  - type: text
    content: 'Ecoutez la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononce contre vous, maison d''Israël ! '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur (YHWH) est Dieu en vérité  : autre traduction le Seigneur Dieu est (la) vérité  ; cf. 4.2n. –  Dieu vivant Dt 5.26+. –  roi de toujours ou d''éternité  ; cf. Gn 21.33 ; Es 40.28 ; Mi 4.7 ; Ps 93.1 ; 1Tm 1.17 ; Ap 15.3n. –  La terre (ou le pays ) tremble Ps 18.8. –  sa colère 50.13+. –  ne supportent pas sa fureur Na 1.6.'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est Dieu en vérité,'
  - type: text
    content: il est le Dieu vivant et le roi de toujours.
  - type: text
    content: La terre tremble devant sa colère,
  - type: text
    content: les nations ne supportent pas sa fureur.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ce v. est en araméen dans le texte, peut-être pour signaler une proclamation solennelle à l'adresse des nations (c'est la langue internationale de l'époque) ; cf. Es 2.18 ; Na 1.14. –  fait et disparaîtront font assonance en hébreu.
  - type: text
    content: 'Vous leur direz :'
  - type: text
    content: Les dieux qui n'ont pas fait le ciel et la terre
  - type: text
    content: disparaîtront de la terre et de dessous le ciel.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '51.15-19 ; cf. 27.5+ ; Es 44.24 ; 45.18. –  sagesse / intelligence  : cf. Ps 104.24 ; 136.5 ; Pr 3.19.'
  - type: text
    content: Il fait la terre par sa puissance,
  - type: text
    content: il met en place le monde par sa sagesse,
  - type: text
    content: il a déployé le ciel par son intelligence.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Lorsqu''il fait entendre sa voix  : traduction incertaine ; LXX omet ces mots, qui décrivent de toute évidence le tonnerre (Ps 29). –  les eaux s''amassent  : litt. multitude (ou tumulte ) des eaux . –  il fait monter… Ps 135.7 ; 147.8 ; Jb 38.34s. –  des extrémités  : litt. de l''extrémité . –  le vent  : le même mot hébreu est traduit par souffle au v. 14 ; LXX la lumière . –  ses réserves ou ses trésors , cf. Dt 28.12 ; Ps 33.7 ; Jb 38.22n.'
  - type: text
    content: Lorsqu'il fait entendre sa voix,
  - type: text
    content: les eaux s'amassent dans le ciel ;
  - type: text
    content: il fait monter les nuages des extrémités de la terre,
  - type: text
    content: il produit les éclairs pour la pluie,
  - type: text
    content: il fait sortir le vent de ses réserves.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ils sont tous  : litt. tout homme (est) . –  trop abrutis pour savoir  : autres traductions abrutis, sans connaissance ; abrutis par (leur) connaissance  ; cf. Jb 12.17 ; Rm 1.22 ; 1Co 1.20. –  honteux Es 2.20 ; 42.17 ; 45.16. –  ses idoles  : litt. ce qu''il a coulé ou fondu . –  souffle ou esprit  ; cf. v. 13n.'
  - type: text
    content: Ils sont tous trop abrutis pour savoir,
  - type: text
    content: tout orfèvre est honteux de sa statue ;
  - type: text
    content: car ses idoles ne sont que mensonge,
  - type: text
    content: il n'y a pas de souffle en elles.
  '15':
  - type: text
    content: ' '
  - type: note
    content: futilité v. 3+. –  au temps… 6.15n.
  - type: text
    content: Elles ne sont que futilité,
  - type: text
    content: œuvre ridicule ;
  - type: text
    content: elles disparaîtront
  - type: text
    content: au temps où ils rendront des comptes.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui est la part de Jacob  : litt. la part de Jacob  ; Ps 16.5 ; cf. Nb 18.20 ; Dt 10.9. –  façonne 1.5n. –  la tribu…  : litt. la tribu de son patrimoine  ; cf. 12.7s ; 50.11 ; Dt 4.20 ; 32.9 ; Za 2.16 ; Ps 28.9. –  Son nom… 32.18 ; 33.2 ; 46.18 ; 48.15 ; 50.34 ; 51.19,57 ; cf. 16.21 ; Ex 15.3 ; Es 48.2 ; 51.15 ; 54.5 ; Am 4.13.'
  - type: text
    content: Celui qui est la part de Jacob n'est pas comme elles,
  - type: text
    content: car c'est lui qui façonne tout ;
  - type: text
    content: Israël est la tribu qui constitue son patrimoine.
  - type: text
    content: 'Son nom, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Le désastre est imminent
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Ramasse  : la forme verbale de l''hébreu suppose un sujet féminin ; cf. 46.19 ; Ez 12.3. –  tes affaires  : traduction incertaine ; le mot hébreu rappelle le nom de Canaan ; cf. Ez 16.29n  ; Os 12.8n  ; voir aussi Gn 9.18n. –  par terre  : litt. de la terre ou du pays . –  en état de siège  : autre traduction dans la détresse (cf. Dt 28.53n).'
  - type: text
    content: Ramasse tes affaires par terre,
  - type: text
    content: toi qui es en état de siège !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'je lance…  : cf. 16.13 ; 22.26,28 ; 1S 25.29. –  afin qu''ils n''échappent pas  : texte obscur et traduction incertaine, litt. pour qu''ils trouvent  ; plusieurs versions anciennes ont lu pour qu''ils soient trouvés , c.-à-d. jugés ou châtiés  ; certains modifient le texte hébreu traditionnel pour lire pour qu''ils sortent  ; d''autres interprètent  : pour qu''ils trouvent (le châtiment de) leur faute (cf. Gn 44.16), ou encore pour qu''ils me trouvent . D''autres encore pensent que le texte fait allusion au tir à mitraille où l''on rassemble des projectiles que l''on tire ensemble, et traduisent donc je les enserrerai pour qu''ils atteignent le but.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Cette fois, je lance comme avec une fronde les habitants du pays ;
  - type: text
    content: je vais les serrer de près,
  - type: text
    content: afin qu'ils n'échappent pas.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'brisée  : cf. 4.6n  ; 6.14n  ; 8.21. –  Ma plaie…  : cf. 14.17,19 ; 15.18 ; 30.12.'
  - type: text
    content: – Quel malheur pour moi ! je suis brisée !
  - type: text
    content: Ma plaie est douloureuse !
  - type: text
    content: 'Et moi qui disais :'
  - type: text
    content: « C'est là mon mal,
  - type: text
    content: je le supporterai ! »
  '2':
  - type: note
    content: 'les pratiques  : litt. la voie  ; cf. 12.16 ; Rm 12.2. –  signes du ciel  : cf. Gn 1.14n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Ne cherchez pas à apprendre les pratiques des nations,
  - type: text
    content: et ne soyez pas terrifiés par les signes du ciel
  - type: text
    content: comme le sont les nations.
  '20':
  - type: text
    content: ' '
  - type: note
    content: '4.20+ ; cf. Am 9.11. –  ils ne sont plus  : traduction incertaine, litt. ils sont sortis de moi (cf. v. 18n) ; LXX ainsi que mon troupeau.'
  - type: text
    content: Ma tente est ravagée,
  - type: text
    content: tous mes cordages sont rompus ;
  - type: text
    content: mes fils m'ont quittée,
  - type: text
    content: ils ne sont plus ;
  - type: text
    content: il n'y a plus personne pour dresser de nouveau ma tente,
  - type: text
    content: pour relever mes abris de toile.
  '21':
  - type: text
    content: ' '
  - type: note
    content: bergers 2.8+. –  pas de bon sens ou pas de succès . –  leurs troupeaux sont dispersés 23.1 ; 50.6 ; 1R 22.17 ; Es 53.6 ; Ez 34.5s ; Mc 6.34/ / ; 1P 2.25.
  - type: text
    content: Car les bergers sont abrutis,
  - type: text
    content: 'ils ne cherchent pas le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: C'est pour cela qu'ils n'ont pas de bon sens
  - type: text
    content: et que tous leurs troupeaux sont dispersés.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'tremblement  : le terme correspondant peut désigner un tremblement de terre (cf. v. 10, où un verbe apparenté est traduit par trembler ) ou un grondement (ainsi en 47.3). –  du pays du nord 1.14n. –  pour réduire… 9.10+.'
  - type: text
    content: Un bruit ! Il approche !
  - type: text
    content: Un grand tremblement arrive du pays du nord
  - type: text
    content: pour réduire les villes de Juda en un lieu dévasté,
  - type: text
    content: en un repaire de chacals.
  - type: heading
    content: Prière de Jérémie pour son peuple
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 31.16 ; 37.23 ; Pr 16.1,9 ; 20.24 ; Dn 5.23.
  - type: text
    content: 'Je sais, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qu'à l'être humain n'appartient pas sa voie ;
  - type: text
    content: il n'appartient pas à l'homme qui marche
  - type: text
    content: de diriger ses pas.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Corrige-moi (ou instruis-moi , 2.19 ; 5.3+) ; LXX corrige-nous , de même tu ne nous réduises…  ; cf. 30.11 ; 31.18 ; 46.28. –  mais avec équité  : litt. seulement selon le droit , ce qui peut aussi signifier avec mesure  ; tournure analogue en 30.11 ; cf. Ps 6.2 ; 38.2 ; 99.8 ; 118.18 ; 143.2 ; Jb 33.19-30 ; Sagesse 12.20s : « Si tu as puni les ennemis de tes enfants et des hommes voués à la mort avec un tel souci d''indulgence, en leur donnant le temps et l''occasion de renoncer au mal, avec combien plus de précautions as-tu jugé tes fils, après avoir offert à leurs pères des serments et des alliances aux promesses magnifiques. »'
  - type: text
    content: 'Corrige-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: mais avec équité !
  - type: text
    content: Non pas dans ta colère,
  - type: text
    content: de peur que tu ne me réduises à rien.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'sur les nations  : cf. 2.3+ ; Ps 79.6s ; voir aussi Ez 25 ; Jl 42 ; Na 1.2 ; Ap 16.1 ; 2 Maccabées 6.14 : « Pour châtier les autres nations, le souverain Maître attend en effet avec longanimité qu''elles arrivent à combler la mesure de leurs iniquités ; mais ce n''est pas ainsi qu''il a jugé juste d''agir avec nous. » –  qui ne te connaissent pas 1Th 4.5 ; 2Th 1.8. –  peuples 1.15n. –  Jacob 2.4+. –  ils le dévorent (une seule fois dans LXX, voir 8.16+) fait assonance en hébreu avec ils l''exterminent . –  son domaine 25.30 ; 31.23n  ; 33.12 ; Ps 79.7.'
  - type: text
    content: Répands ta fureur sur les nations
  - type: text
    content: qui ne te connaissent pas,
  - type: text
    content: sur les peuples
  - type: text
    content: qui n'invoquent pas ton nom !
  - type: text
    content: Car ils dévorent Jacob,
  - type: text
    content: ils le dévorent,
  - type: text
    content: ils l'exterminent,
  - type: text
    content: ils dévastent son domaine.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'futilité v. 8,15 ; 2.5+ ; 8.19n. –  on coupe du bois…  : cf. Es 40.19s ; 44.9-20. –  la main de l''artisan le travaille  : litt. ouvrage des mains de l''artisan  ; cf. v. 9 ; 25.6+.'
  - type: text
    content: 'Car les prescriptions des peuples ne sont que futilité :'
  - type: text
    content: on coupe du bois dans la forêt,
  - type: text
    content: la main de l'artisan le travaille au ciseau ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: Es 41.7.
  - type: text
    content: on l'embellit avec de l'argent et de l'or,
  - type: text
    content: on le fixe avec des clous, au marteau,
  - type: text
    content: pour qu'il ne vacille pas.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'comme un palmier d''argent martelé  : traduction incertaine, autre traduction ils sont comme un arbre décoré  ; des versions anciennes ont compris comme une colonne massive  ; l''hébreu pourrait aussi signifier comme un épouvantail dans un champ de concombres (même image, semble-t-il, dans la Lettre de Jérémie 69) ; cf. Es 1.8. –  ne parlent pas  : cf. Ps 83.2 ; 115.4-7. –  aucun mal / aucun bien  : cf. Es 41.23 ; So 1.12 ; voir aussi Ha 2.18.'
  - type: text
    content: Ils sont comme un palmier d'argent martelé,
  - type: text
    content: ils ne parlent pas ;
  - type: text
    content: il faut les porter,
  - type: text
    content: car ils ne peuvent pas faire un pas !
  - type: text
    content: N'ayez pas peur d'eux,
  - type: text
    content: car ils ne sauraient faire aucun mal,
  - type: text
    content: de même qu'ils sont incapables de faire aucun bien.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 6-10 sont absents de LXX. –  Nul n''est semblable à toi  : l''hébreu présente ici et au v. 7 une forme inhabituelle qu''on pourrait aussi traduire y a-t-il donc (quelqu''un qui soit) comme toi ou comment donc pourrait-on être comme toi ? cf. 49.19 ; Dt 3.24 ; Es 40.18n  ; Ps 86.8-10. –  par sa puissance  : litt. par la puissance.'
  - type: text
    content: '– Nul n''est semblable à toi, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: tu es grand, et ton nom est grand par sa puissance.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Qui ne te craindrait  : cf. 5.22+ ; Ap 15.3s. –  parmi tous les sages… Rm 16.27.'
  - type: text
    content: Qui ne te craindrait, roi des nations ?
  - type: text
    content: Cela t'est dû,
  - type: text
    content: car parmi tous les sages des nations
  - type: text
    content: et dans tous leurs royaumes
  - type: text
    content: nul n'est semblable à toi.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Tous, sans exception  : litt. tous ensemble . –  abrutis / stupides  : cf. v. 14 ; Za 10.2. –  L''instruction…  : traduction incertaine ; cf. 5.3n. –  futilités / bois v. 3+ss.'
  - type: text
    content: Tous, sans exception, sont abrutis et stupides.
  - type: text
    content: L'instruction des futilités, ce n'est que du bois !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Tarsis Gn 10.4n  ; Jon 1.3n. –  Ouphaz Dn 10.5n  ; plusieurs versions anciennes ont lu Ophir (1R 10.11 ; Ps 45.10). –  l''artisan les travaille  : litt. ouvrage (ou œuvre ) de l''artisan  ; cf. v. 3. –  pourpre violette et rouge  : cf. Ex 25.4n. –  d''art  : litt. de sages  ; cf. v. 7.'
  - type: text
    content: On apporte de Tarsis des lames d'argent
  - type: text
    content: et d'Ouphaz de l'or ;
  - type: text
    content: l'artisan les travaille, les mains de l'orfèvre les cisèlent ;
  - type: text
    content: 'on les habille de pourpre violette et rouge :'
  - type: text
    content: ce ne sont que des œuvres d'art.
