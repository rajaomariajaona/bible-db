document_id: TIT.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Personnes âgées, jeunes gens, esclaves
  - type: text
    content: ' '
  - type: note
    content: 'dis v. 15n. –  ce qui convient  : cf. v. 3 ; 1Tm 2.10+. –  l''enseignement sain 1.9+ ; cf. 2.8.'
  - type: text
    content: Quant à toi, dis ce qui convient à l'enseignement sain.
  '10':
  - type: note
    content: 'détournent  : même verbe Ac 5.2s ; cf. Phm 18. –  qu''ils se montrent…  : cf. 3.2 ; 2Co 8.24 ; Hé 6.10s. –  confiance  : le mot est habituellement traduit par foi. –  faire honneur  : litt. orner. –  Dieu, notre Sauveur 1.3+.'
  - type: text
    content: ne détournent rien, mais qu'ils se montrent toujours entièrement dignes de confiance, pour faire honneur en tout à l'enseignement de Dieu, notre Sauveur.
  - type: heading
    content: Un peuple qui appartient à Jésus-Christ
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.4. –  s''est manifestée  : litt. a été manifestée  ; cf. v. 13 ; 3.4 ; 1Tm 3.16 (autre verbe) ; 1Jn 1.1s ; voir aussi Gn 35.7 ; Jn 3.19 ; 8.12 ; 9.5 ; 12.46 ; 2Tm 1.10. –  la grâce de Dieu 1Co 15.10 ; 2Co 6.1 ; cf. Jn 1.16s. –  source de salut  : autres traductions salvatrice pour, salutaire pour  ; le même terme est traduit par salut en Lc 2.30 ; 3.6 ; Ac 28.28 ; Ep 6.17. –  pour tous les humains 1Tm 2.4+.'
  - type: text
    content: 'Car elle s''est manifestée, la grâce de Dieu, source de salut pour tous les humains. '
  '12':
  - type: note
    content: 'apprend ou éduque  : cf. 1Tm 1.20 ; 2Tm 2.25n. –  renier ou renoncer à  ; même verbe en 1.16+ ; cf. Rm 6.3ss ; 1P 4.2ss. –  impiété Rm 1.18ss ; 11.26 ; 2Tm 2.16. –  désirs 3.3 ; Ga 5.16 ; Ep 2.3 ; 2P 1.4 ; 1Jn 2.16. –  de ce monde  : même adjectif Hé 9.1n (terrestre) ; cf. 1Co 1.20 ; 2.12 ; 3.19 ; 2Co 7.10. –  le temps (ou le monde, l''âge, terme traditionnellement rendu par siècle) présent  : cf. Rm 12.2n  ; 1Co 1.20 ; 2.6 ; 2Co 4.4 ; Ga 1.4-5n  ; 1Tm 6.17 ; 2Tm 4.10. –  pondérée, juste 1.8+ ; cf. 1Co 1.30 ; Ep 1.4. –  pieuse 1.1+.'
  - type: text
    content: 'Elle nous apprend à renier l''impiété et les désirs de ce monde, et à vivre dans le temps présent d''une manière pondérée, juste et pieuse, '
  '13':
  - type: note
    content: 'attendant… 1Co 1.7 ; Ph 3.20 ; 1Th 1.10 ; cf. Ac 24.15 ; Ga 5.5 ; 2P 3.12ss. –  bienheureuse 1Tm 1.11 ; 6.15. –  espérance (c.-à-d. objet de l''espérance) : cf. Ac 23.6 ; Rm 8.24 ; Col 1.5 ; Ep 6.18 ; 1Tm 1.1. –  manifestation  : cf. v. 11 ; 1Tm 6.14n. –  gloire Rm 5.2 ; Col 1.27 ; cf. Mt 25.31 ; 1P 4.13. –  grand Dieu Ex 18.11 ; Dt 10.17 ; Dn 9.4 ; Né 1.5 ; certains comprennent du grand Dieu et de notre Sauveur, Jésus-Christ (1.4+). Cf. Rm 9.5n  ; 2P 1.1n.'
  - type: text
    content: 'en attendant la bienheureuse espérance et la manifestation de la gloire de notre grand Dieu et Sauveur, Jésus-Christ. '
  '14':
  - type: note
    content: 's''est donné 1Tm 2.6+. –  afin  : cf. Ph 2.10 ; 1P 2.24 ; 3.18. –  rédimer ou accorder la rédemption  : même verbe Ps 130.8 (libérer, LXX) ; Lc 24.21 ; 1P 1.18 ; un terme apparenté est traduit par rançon en Mc 10.45/ /. –  mal  : litt. non-loi  ; Mt 7.23+ ; Rm 6.19+ ; 2Th 2.3n  ; Hé 1.9 ; 1Jn 3.4. –  purifier  : litt. purifier pour lui-même  ; cf. 3.5 ; Ez 37.23 ; Hé 9.14,22 ; 1Jn 1.7. –  un peuple qui soit son bien propre  : cf. Ex 19.5 ; Dt 7.6 ; 14.2 ; Ep 1.14 ; 1P 2.9. –  et qui se passionne ou qui soit zélé  : cf. Ac 21.20 ; 22.3 ; Rm 10.2 ; Ga 1.14 ; 1P 3.13. –  belles œuvres v. 7n  ; 3.8,14 ; cf. Ep 2.10 ; Hé 10.24.'
  - type: text
    content: Il s'est donné lui-même pour nous, afin de nous rédimer de tout mal et de purifier un peuple qui soit son bien propre et qui se passionne pour les belles œuvres.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'parler  : le même verbe est traduit par dire au v. 1. –  encourager ou exhorter v. 6. –  reprendre ou réfuter, confondre 1.9n  ; cf. 2Tm 4.2. –  autorité  : le même terme est traduit par ordre en 1.3+ ; 1Co 7.6. –  Que personne…  : cf. 1Tm 4.12.'
  - type: text
    content: C'est ainsi que tu dois parler, encourager et reprendre, avec une pleine autorité. Que personne ne te méprise !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'vieillards  : dans d''autres contextes (cf. v. 3ss) le même terme désigne les anciens de l''Eglise ; cf. 1Tm 4.14n  ; 5.1n. –  sobres  : cf. 1.7,12 ; 1Tm 3.2n,11. –  dignes v. 7 ; 1Tm 2.2n. –  pondérés v. 4nss,12 ; 1.8+. –  sains dans la foi 1.13. –  l''amour  : cf. Rm 12.9ss ; 1Co 13.4ss. –  persévérance ou endurance 1Th 1.3n  ; 2Th 1.3s ; 1Tm 6.11 ; 2Tm 3.10 ; cf. 1Co 13.13+.'
  - type: text
    content: Que les vieillards soient sobres, dignes, pondérés, sains dans la foi, l'amour et la persévérance.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Tm 2.9 ; 3.8,11 ; 5.2. –  médisantes 1Tm 3.11n. –  esclaves des  : autre traduction asservies aux  ; cf. 3.3 ; Rm 6.6 ; 16.18. –  enseignent le bien ou qu''elles donnent un bel enseignement  : cf. 1Tm 1.8n  ; 2.12 ; 2Tm 1.5.'
  - type: text
    content: 'Que les femmes âgées, de même, aient un comportement qui convienne à des personnes consacrées ; qu''elles ne soient ni médisantes, ni esclaves des excès de vin ; qu''elles enseignent le bien, '
  '4':
  - type: note
    content: 'apprendre  : verbe apparenté au mot traduit par pondéré aux v. 2,5s.'
  - type: text
    content: 'afin d''apprendre aux jeunes femmes à aimer mari et enfants, '
  '5':
  - type: note
    content: 'pondérées v. 2+. –  chastes ou pures 2Co 6.6 ; 11.2 ; 1Tm 2.15 ; 5.2,22 ; Jc 3.17 ; 1P 3.2. –  aux travaux domestiques ou à la maison  : cf. 1Tm 5.14. –  bonnes  : cf. 1P 2.18. –  soumises…  : cf. 1Co 14.34 ; Ep 5.22ss ; Col 3.18 ; 1Tm 2.12 ; 1P 3.1ss. –  pour… v. 8,10. –  qu''on ne calomnie pas  : autre traduction qu''on ne blasphème pas  ; cf. 3.2 ; Rm 2.24 ; 14.16 ; 1Tm 6.1 ; 1P 2.12 ; 2P 2.2. –  la parole de Dieu 2Tm 2.9.'
  - type: text
    content: à être pondérées, chastes, occupées aux travaux domestiques, bonnes, soumises à leur mari, pour qu'on ne calomnie pas la parole de Dieu.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Encourage ou exhorte 1.9+. –  pondérés v. 2+.
  - type: text
    content: 'Encourage de même les jeunes gens à être pondérés '
  '7':
  - type: note
    content: 'à tous égards pourrait aussi se rattacher à ce qui suit (en te montrant toi-même, à tous égards, un modèle…). –  modèle 1Tm 4.12+. –  belles œuvres v. 14 ; 3.8,14 ; 1Tm 3.1n. –  avec un enseignement pur…  : litt. dans l''enseignement, non-corruption (le terme est apparenté à celui qui est habituellement rendu par impérissable  ; cf. 2Co 4.2,16+ ; 1Tm 1.17+), dignité… (cf. v. 2+).'
  - type: text
    content: 'à tous égards, en te montrant toi-même un modèle de belles œuvres, avec un enseignement pur, digne, '
  '8':
  - type: note
    content: 'une parole saine  : cf. v. 1+ ; 2Tm 1.13. –  inattaquable  : terme apparenté en Ga 2.11 (avoir tort) ; cf. 2Co 13.8. –  l''adversaire  : cf. 1.9 ; 1Tm 5.14 (autre terme) ; 1P 2.12,15. –  soit confus ou ait honte  : cf. 1Co 4.14 ; 2Th 3.14.'
  - type: text
    content: une parole saine, inattaquable, pour que l'adversaire soit confus et n'ait rien de mal à dire de nous.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ep 6.5ss ; Col 3.22ss ; 1Tm 6.1 ; 1P 2.18. –  de leur être agréables  : cf. Rm 12.2 ; 2Co 5.9 ; Ph 4.18 ; Col 3.20. –  ne les contredisent pas  : cf. 1.9+.'
  - type: text
    content: 'Que les esclaves soient soumis en tout à leurs maîtres, qu''ils s''efforcent de leur être agréables, qu''ils ne les contredisent pas, '
