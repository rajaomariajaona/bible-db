document_id: ACT.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: En attendant l'Esprit saint
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 1.1-4. –  ce que Jésus a commencé…  : autre traduction  : ce que Jésus a fait et enseigné depuis le commencement  ; cf. v. 22 ; 10.37 ; Lc 3.23+ ; 23.5 ; 24.19,47.'
  - type: text
    content: Cher Théophile,
  - type: text
    content: 'J''ai parlé, dans mon premier livre, de tout ce que Jésus a commencé de faire et d''enseigner '
  '10':
  - type: note
    content: 'fixaient 3.4,12 ; 6.15 ; 7.55 ; 10.4 ; 11.6 ; 13.9 ; 14.9 ; 23.1 ; Lc 4.20+. –  il s''en allait  : cf. 1P 3.22. –  deux hommes… Lc 24.4-6.'
  - type: text
    content: 'Et comme ils fixaient le ciel, pendant qu''il s''en allait, deux hommes en habits blancs se présentèrent à eux '
  '11':
  - type: note
    content: Hommes (v. 16n) de Galilée 2.7 ; 13.31. –  viendra ou reviendra  ; cf. 3.21 ; Lc 21.27 ; 22.69 ; Ap 1.7.
  - type: text
    content: 'et dirent : Hommes de Galilée, pourquoi restez-vous là à scruter le ciel ? Ce Jésus, qui a été enlevé au ciel du milieu de vous, viendra de la même manière que vous l''avez vu aller au ciel.'
  - type: heading
    content: Le groupe des apôtres
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'mont… des Oliviers Mc 11.1n  ; Lc 24.50,52. –  le rayon…  : litt. la distance d''un chemin de sabbat (un peu moins d''un kilomètre). Sur le sabbat , voir Ex 20.8ss ; Col 2.16 ; Hé 4.9.'
  - type: text
    content: Alors ils retournèrent à Jérusalem, depuis le mont dit des Oliviers, qui est près de Jérusalem, dans le rayon des déplacements autorisés le jour du sabbat.
  - type: heading
    content: Mt 10.2-4  ; Mc 3.16-19  ; Lc 6.13-16
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'chambre à l''étage ou chambre haute  : pièce aménagée sur le toit en terrasse d''une maison 9.37 ; 20.8 ; Lc 12.3 ; 22.12/ / ; voir Jg 3.20n. –  Matthieu Mt 9.9. –  fils  : le terme correspondant est sous-entendu (litt. Jacques d''Alphée… Judas de Jacques ). – Voir Zélote.'
  - type: text
    content: 'Quand ils furent rentrés, ils montèrent dans la chambre à l''étage où ils se tenaient d''ordinaire ; il y avait Pierre, Jean, Jacques et André, Philippe et Thomas, Barthélemy et Matthieu, Jacques, fils d''Alphée, Simon le Zélote et Judas, fils de Jacques. '
  '14':
  - type: note
    content: 'd''un commun accord 2.1n,46 ; 4.24 ; 5.12 ; cf. 15.25. –  assidus v. 42,46 ; 6.4 ; 8.13. –  la prière  : certains mss ajoutent et la supplication  ; cf. 2.42 ; 6.4 ; Rm 12.12+ ; Col 4.2. –  avec des femmes  : on pourrait aussi comprendre avec leurs femmes ; avec les femmes (Lc 8.2s ; 23.49) ; texte occidental avec femmes et enfants (cf. 17.5). –  les frères de celui-ci Mt 12.46 ; 13.55+ ; cf. Lc 8.19 ; Jn 7.3-5 ; 1Co 9.5.'
  - type: text
    content: Tous, d'un commun accord, étaient assidus à la prière, avec des femmes, Marie, mère de Jésus, et les frères de celui-ci.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'des frères  : cf. 11.1 ; 12.17 ; 14.2 ; 21.17 ; cf. Lc 8.21. –  le nombre des personnes  : litt. la foule des noms . –  réunies  : même expression grecque en 2.1 ( en un même lieu ), 44 ( ensemble ), 47n ( la communauté ) ; 4.26n  ; Lc 17.35n  ; 1Co 11.20.'
  - type: text
    content: 'En ces jours-là, Pierre se leva au milieu des frères – le nombre des personnes réunies était d''environ cent vingt – et dit : '
  '16':
  - type: note
    content: 'Mes frères  : litt. hommes, frères (de même 2.29,37n  ; 7.2+ ; 13.26,38 ; 15.7,13 ; 23.1,6 ; 28.17) ; le mot ici traduit par hommes (très fréquent dans les interpellations des Actes ; on le retrouve p. ex. v. 11 ; 2.14,22+ ; 14.15n  ; 17.5 ; 19.35) désigne habituellement les adultes de sexe masculin, par opposition aux femmes et aux enfants ; toutefois l''usage pourrait être plus souple, puisqu''il semble inclure une femme au moins en 17.34n. –  il fallait  : texte occidental il faut. –  l''Ecriture 1.20 ; cf. Ps 41.10. – Voir Esprit, saint. –  David… 2.30s. –  a servi de guide Lc 22.47. –  qui se sont emparés  : le même verbe sera traduit par faire appréhender 12.3 ; cf. 23.27 ; Lc 22.54.'
  - type: text
    content: 'Mes frères, il fallait que soit accomplie l''Ecriture dans laquelle l''Esprit saint, par la bouche de David, a parlé d''avance de Judas, qui a servi de guide à ceux qui se sont emparés de Jésus. '
  '17':
  - type: note
    content: Il était compté… Lc 22.3. –  même ministère ou service 1.25.
  - type: text
    content: 'Il était compté parmi nous et il avait eu part à ce même ministère. '
  '18':
  - type: note
    content: 'acquis un champ  : cf. Mt 27.3-10. –  le salaire (ou la récompense) de l''injustice  : autre traduction un salaire mal acquis  ; cf. 8.23 ; 2P 2.15 ; voir aussi Mt 5.12+. –  est tombé en avant…  : en rapprochant le terme du verbe, peut-être apparenté, qui est employé en 28.8, on pourrait aussi comprendre a enflé  ; cf. 5.5,10 ; 12.23+ ; Sagesse 4.16,19 : « La mort du juste condamne la survie des impies… Ensuite ils deviendront un cadavre infâme, un perpétuel objet de honte parmi les morts ; il les précipitera, sans qu''ils puissent dire mot, la tête la première, il les ébranlera jusqu''en leurs fondements et ils resteront en friche jusqu''à la fin ; ils seront dans la douleur et leur souvenir périra. » –  s''est éventré  : litt. s''est fracassé par le milieu.'
  - type: text
    content: 'Après avoir acquis un champ avec le salaire de l''injustice, il est tombé en avant et s''est éventré, de sorte que tous ses intestins se sont répandus. '
  '19':
  - type: note
    content: 'habitants de Jérusalem 2.5n,14n  ; 4.16 ; 9.42 ; 13.27 ; cf. 19.17 ; Lc 24.18. –  dans leur langue  : en araméen. –  Champ du sang Mt 27.8.'
  - type: text
    content: 'La chose a été connue de tous les habitants de Jérusalem, à tel point que ce champ a été appelé dans leur langue '
  - type: text
    content: Hakeldamah,
  - type: text
    content: ' c''est-à-dire « Champ du sang ». '
  '2':
  - type: note
    content: 'Cf. Mt 28.18-20. –  par l''Esprit saint (ou le Saint-Esprit) : cette précision pourrait à la rigueur se rapporter à l''ascension (enlevé par l''Esprit saint, 1.9-11 ; 2R 2.9-11 ; Mc 16.19 ; Lc 24.50-53 ; 1Tm 3.16) ou au choix des apôtres (qu''il avait choisis par l''Esprit saint), Ac 1.25s ; 2.14,37 ; Lc 6.13n/ / ; 24.48s. Le texte occidental (voir l''introduction) portait probablement  : le jour où il choisit les apôtres par l''Esprit saint et leur prescrivit de proclamer la bonne nouvelle.'
  - type: text
    content: jusqu'au jour où il fut enlevé après avoir donné ses ordres, par l'Esprit saint, aux apôtres qu'il avait choisis.
  '20':
  - type: note
    content: Que sa demeure… Ps 69.26  ; Mt 23.38. –  Qu'un autre… Ps 109.8. – Le mot traduit par charge a donné le mot épiscopat  ; il est apparenté au terme traduit par épiscope en 20.28n  ; cf. 1Tm 3.1ss.
  - type: text
    content: 'Or il est écrit dans le livre des Psaumes :'
  - type: text
    content: Que sa demeure devienne déserte,
  - type: text
    content: et que personne ne l'habite !
  - type: text
    content: 'Et :'
  - type: text
    content: Qu'un autre prenne sa charge !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'parmi les hommes…  : cf. Lc 1.2 ; Jn 15.27. –  le Seigneur Jésus 4.33 ; 11.20 ; 16.31 ; 20.21,24,35. –  allait et venait  : litt. entrait et sortait , cf. 9.28 ; Nb 27.17.'
  - type: text
    content: 'Il faut donc que parmi les hommes qui nous ont accompagnés tout le temps que le Seigneur Jésus allait et venait à notre tête, '
  '22':
  - type: note
    content: à commencer par le baptême de Jean… Lc 3.21 ; 16.16 ; voir aussi Jn 1.35ss. –  enlevé 1.2+. –  témoin (1.8+) de sa résurrection (litt. son relèvement, cf. 2.24n) 2.32 ; 3.15 ; 4.33 ; 5.32 ; 10.39-42 ; 13.31 ; 22.20 ; 1Co 15.15.
  - type: text
    content: à commencer par le baptême de Jean et jusqu'au jour où il a été enlevé du milieu de nous, l'un de ceux-là devienne avec nous témoin de sa résurrection.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Ils en présentèrent  : texte occidental il (Pierre) en présenta…'
  - type: text
    content: 'Ils en présentèrent deux : Joseph, appelé Barsabbas et surnommé Justus, et Matthias. '
  '24':
  - type: note
    content: qui connais le cœur 15.8 ; Lc 16.15.
  - type: text
    content: 'Puis ils prièrent en ces termes : Seigneur, toi qui connais le cœur de tous, désigne lequel de ces deux tu as choisi, '
  '25':
  - type: note
    content: 'que Judas a quitté  : litt. dont Judas s''est écarté  ; le même verbe est traduit par transgresser en Mt 15.2s ; cf. Dt 9.16 ; 17.20. –  à la place qui lui convenait  : litt. en son propre lieu  ; c''est le même terme qui est employé dans l''expression traduite au début du v. par qu''il prenne sa place  ; certains mss portent vers sa propre part (v. 17) ; cf. Lc 16.28.'
  - type: text
    content: 'afin qu''il prenne sa place dans ce ministère, cet apostolat, que Judas a quitté pour aller à la place qui lui convenait. '
  '26':
  - type: note
    content: 'Cf. 6.3ss ; Pr 16.33. –  Ils tirèrent au sort entre eux  : autre traduction possible ils leur donnèrent des sorts  ; certains mss portent ils tirèrent leurs sorts. –  onze apôtres  : cf. Mt 28.16.'
  - type: text
    content: Ils tirèrent au sort entre eux, et le sort tomba sur Matthias, qui fut adjoint aux onze apôtres.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'il se présenta vivant Lc 24.5,36-42 ; Jn 20.19s,26s. –  pendant quarante jours  : cf. Lc 24.51 ; voir aussi Ex 24.18 ; Nb 13.25 ; Dt 9.18 ; 1R 19.8 ; Jon 3.4 ; Lc 4.2/ /. –  règne ou royaume de Dieu 8.12 ; 14.22 ; 19.8 ; 20.25 ; 28.23,31 ; cf. 1.6 ; Mt 3.2n  ; Lc 4.43+.'
  - type: text
    content: C'est à eux aussi qu'avec beaucoup de preuves il se présenta vivant après avoir souffert ; il leur apparut pendant quarante jours, parlant du règne de Dieu.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'il se trouvait avec eux  : autre traduction possible  : il mangeait avec eux , cf. 10.40s ; Lc 24.41-43. –  enjoignit  : même terme 4.18 ; 5.28,40 ; 10.42 ; 15.5 ; 16.18,23s ; 17.30 ; 23.22,30 ; Lc 5.14 ; 8.29,56 ; 9.21 ; 1Th 4.2+. –  ce que le Père avait promis  : litt. la promesse du Père , cf. 2.33,39 ; Lc 24.49 ; Jn 14.16+ ; voir aussi Ga 3.14n  ; Ep 1.13 ; Hé 6.12n. –  leur dit-il  : sous-entendu dans le texte.'
  - type: text
    content: 'Comme il se trouvait avec eux, il leur enjoignit de ne pas s''éloigner de Jérusalem, mais d''attendre ce que le Père avait promis – ce dont, leur dit-il, vous m''avez entendu parler : '
  '5':
  - type: note
    content: 'Autre traduction  : car Jean a baptisé d''eau… –  baptisé d''eau / dans (ou par) l''Esprit saint  : cf. v. 8 ; 2.33,38 ; 8.15-17 ; 9.17 ; 10.44-48 ; 19.5s ; Lc 3.16/ /.'
  - type: text
    content: Jean a baptisé d'eau, mais vous, c'est un baptême dans l'Esprit saint que vous recevrez d'ici peu de jours.
  - type: heading
    content: L'ascension de Jésus
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ceux qui s''étaient réunis  : autre traduction possible un jour qu''ils étaient réunis, ils lui demandaient . –  est-ce en ce temps-ci  : cf. Lc 17.20s ; 19.11 ; 21.8. –  que tu vas rétablir…  : autre traduction possible que tu vas restituer la royauté (le même mot est traduit par règne au v. 3) à Israël  ; cf. 3.21 ; Am 9.11s ; Ml 3.23 ; Mt 17.11 ; Mc 9.12 ; Lc 24.21 ; Siracide 36.13-16 : « Rassemble toutes les tribus de Jacob. Remets-les en possession du patrimoine comme au début. »'
  - type: text
    content: 'Ceux qui s''étaient réunis lui demandaient : Seigneur, est-ce en ce temps-ci que tu vas rétablir le Royaume pour Israël ? '
  '7':
  - type: note
    content: 'les temps (v. 6) ou les moments (le même terme est traduit par temps en 3.20 ; 7.20 etc., saisons en 14.17) : cf. 3.20s ; 7.17 ; 17.26,30 ; Mt 24.36+/ / ; 1Th 5.1. –  a fixés…  : autre traduction tient en son pouvoir.'
  - type: text
    content: 'Il leur répondit : Il ne vous appartient pas de connaître les temps ou les moments que le Père a fixés de sa propre autorité. '
  '8':
  - type: note
    content: 'puissance / Esprit saint Lc 4.1,14,18 ; Rm 15.19 ; 1Co 2.4 ; Ep 3.16 ; 1Th 1.5 ; on pourrait aussi traduire vous recevrez une puissance, celle de l''Esprit saint survenant sur vous. –  sur vous Es 32.15. –  témoins v. 22+ ; 8.25 ; 18.5 ; 20.24 ; 22.15,18,20 ; 23.11 ; 26.16,22 ; 28.23 ; Lc 24.48 ; Jn 15.26s ; 1P 5.1 ; cf. Es 43.10. –  à Jérusalem 5.28 ; 10.39. –  Samarie 8.1+ss. –  jusqu''aux extrémités de la terre  : la même expression désigne sans doute Rome (cf. Ac 28) en Psaumes de Salomon 8.15 ; cf. Es 49.6.'
  - type: text
    content: Mais vous recevrez de la puissance quand l'Esprit saint viendra sur vous, et vous serez mes témoins à Jérusalem, dans toute la Judée et en Samarie, et jusqu'aux extrémités de la terre.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'V. 2+ ; cf. Jn 6.62 ; 1Tm 3.16. –  une nuée…  : texte occidental reconstitué une nuée l''enveloppa, puis il fut enlevé  ; cf. Lc 9.34 ; 21.27 ; 1Th 4.17 ; Ap 11.12 ; cf. Ex 13.21s ; Dn 7.13 ; 1 Hénoch 39.3 : « Un tourbillon m''a enlevé de la face de la terre et m''a déposé à la frange des cieux. »'
  - type: text
    content: 'Après avoir dit cela, pendant qu''ils regardaient, il fut élevé et une nuée le déroba à leurs yeux. '
