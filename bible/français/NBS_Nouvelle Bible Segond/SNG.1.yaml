document_id: SNG.1,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Le plus beau des chants  : litt. le chant des chants (d''où le titre traditionnel cantique des cantiques ) ; sur cette tournure superlative, cf. Gn 9.25 ; Ex 26.33 ; Dt 10.17 ; 1R 8.27 ; Ez 16.7 ; 26.7 ; Ec 1.2 ; 12.8. –  de (ou à , comme dans les suscriptions des Psaumes ; cf. Ps 3.1n) Salomon ( le Pacifique  ; cf. 7.1n) 3.7,9,11 ; 8.11s ; 1R 5.12.'
  - type: text
    content: Le plus beau des chants – de Salomon.
  - type: heading
    content: Le dialogue des amoureux
  - type: heading
    content: Elle
  '10':
  - type: text
    content: ' '
  - type: note
    content: Tes joues 5.13. –  ton cou 4.4 ; 7.5.
  - type: text
    content: Tes joues sont jolies au milieu des bijoux,
  - type: text
    content: ton cou est beau au milieu des colliers.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.9.
  - type: text
    content: Nous te ferons des bijoux d'or,
  - type: text
    content: avec des points d'argent.
  - type: heading
    content: Elle
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Tandis que…  : autre traduction jusqu''à ce que (même formule en 2.7,17, avant que ) le roi (cf. v. 4n) soit… –  avec son entourage  : terme rare (Ps 140.10 ceux qui m''entourent ) ; il a aussi été traduit sur son divan, à sa table ou dans son enclos (4.12–5.1 ; 6.2). –  nard (hébreu néred ) : plante aromatique d''origine indienne, réputée aphrodisiaque ; cf. 4.13s ; voir aussi Mc 14.3 ; Jn 12.3. –  a exhalé  : litt. a donné , de même en 2.13 ; 7.14.'
  - type: text
    content: Tandis que le roi était avec son entourage,
  - type: text
    content: mon nard a exhalé sa senteur.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'bien-aimé  : en hébreu ce mot n''est pas apparenté au verbe habituellement traduit par aimer , mais au terme pour caresses (v. 2,4 etc.), qui ressemble beaucoup au nom de David (cf. 4.4n). –  myrrhe 3.6 ; 4.6,14 ; 5.1,5,13 ; cf. Pr 7.17 ; Est 2.12 ; voir aussi Ex 30.23 ; Mt 2.11 ; Mc 15.23 ; Jn 19.39. –  il repose  : autre traduction il passe la nuit (cf. 7.12) ; l''expression peut s''entendre à la fois du bouquet (probablement un sachet de poudre de myrrhe séchée porté au cou) et du bien-aimé.'
  - type: text
    content: Mon bien-aimé est pour moi un bouquet de myrrhe,
  - type: text
    content: il repose entre mes seins.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'henné  : hébreu kopher  ; autres traductions troène ; cyprès. –  Eïn-Guédi (« Source du chevreau ») : oasis sur la rive occidentale de la mer Morte (1S 24.1s).'
  - type: text
    content: Mon bien-aimé est pour moi une grappe de henné
  - type: text
    content: dans les vignes d'Eïn-Guédi.
  - type: heading
    content: Lui
  '15':
  - type: text
    content: ' '
  - type: note
    content: tu es belle 2.14 ; 4.7 ; 5.9 ; 6.1,4,9 ; 7.7. –  yeux / colombes 4.1 ; 5.12.
  - type: text
    content: Que tu es belle, mon amie, que tu es belle !
  - type: text
    content: Tes yeux sont des colombes.
  - type: heading
    content: Elle
  '16':
  - type: text
    content: ' '
  - type: note
    content: beau / doux 7.7.
  - type: text
    content: Que tu es beau, mon bien-aimé, que tu es doux !
  - type: text
    content: Notre lit, c'est la verdure.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'cèdres / cyprès  : cf. 2.3 ; voir aussi 1R 5.22 ; 6.15,34.'
  - type: text
    content: Les solives de nos maisons sont des cèdres,
  - type: text
    content: nos lambris sont des cyprès.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '(Elle)  : les indications des personnages qui parlent [aussi, dans la suite, (Lui), (Autres)] ne figurent pas dans le texte hébreu ; elles sont souvent hypothétiques (voir l''introduction p.$). –  Qu''il me couvre de baisers (litt. qu''il me baise des baisers de sa bouche  ; cf. 8.1n) / tes caresses (LXX a lu, ici et ailleurs, tes seins  ; cf. v. 13n) : la poésie hébraïque oscille souvent entre la 2e et la 3e personne sans qu''il y ait pour autant changement de sujet réel. –  vin v. 4 ; 2.4 ; 4.10 ; 5.1 ; 7.10 ; 8.2 ; Ec 2.3.'
  - type: text
    content: Qu'il me couvre de baisers !
  - type: text
    content: Oui, tes caresses sont meilleures que le vin.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'nom  : hébreu shèm , en assonance avec le mot traduit par parfum (litt. huile ), shémên. –  les jeunes filles  : sur le terme hébreu, cf. 6.8s ; Gn 24.43 ; Ex 2.8 ; Es 7.14n  ; Ps 68.26 ; Pr 30.19.'
  - type: text
    content: La senteur de tes parfums est si bonne !
  - type: text
    content: Ton nom est un parfum qui se répand ;
  - type: text
    content: c'est pourquoi les jeunes filles t'aiment.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Le roi  : cf. v. 12 ; 3.9,11 ; 7.2 ; ce terme peut ici s''appliquer au bien-aimé. –  allégresse / réjouirons / célébrerons (litt. rappellerons ou évoquerons ) : cf. Es 9.2 ; 25.9 ; 66.10 ; Za 10.7 ; Ps 9.2s ; 43.4s. –  en toi  : au féminin en hébreu ; c''est probablement le roi qui fait l''éloge de la jeune fille. –  que l''on t''aime  : autre traduction qu''elles t''aiment.'
  - type: text
    content: Entraîne-moi à ta suite, courons !
  - type: text
    content: Le roi m'a introduite dans ses appartements…
  - type: text
    content: Nous serons dans l'allégresse, nous nous réjouirons en toi ;
  - type: text
    content: nous célébrerons tes caresses plus que le vin.
  - type: text
    content: C'est à bon droit que l'on t'aime !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'noire , c.-à-d. brunie par le soleil, à l''opposé des canons de beauté de l''époque (les femmes de la bonne société ne s''exposent pas au soleil) ; cf. v. 6 où un terme apparenté est rendu par noiraude . –  filles de Jérusalem 2.7 ; 3.5,11 ; 5.8,16 ; 8.4. –  tentes de Qédar (Gn 25.13n  ; ce nom est associé à une racine qui signifie être noir ou sombre ) : cf. Jr 49.28s ; Ps 120.5 ; il s''agissait probablement de tentes sombres, en poil de chèvre (cf. 4.1n), en contraste avec les toiles de Salomon , lesquelles illustrent combien la jeune fille est jolie.'
  - type: text
    content: Je suis noire, mais je suis jolie, filles de Jérusalem,
  - type: text
    content: comme les tentes de Qédar, comme les toiles de Salomon.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Les fils de ma mère 8.8. –  mère 3.4,11 ; 6.9 ; 8.2,5. –  se sont fâchés  : le terme hébreu évoque aussi l''idée de brûlure. –  Ma vigne à moi  : cf. v. 14 ; 2.15 ; 7.13 ; 8.11s ; Es 5.1 ; Ps 80.9ss ; 128.3.'
  - type: text
    content: 'Ne faites pas attention si je suis noiraude :'
  - type: text
    content: c'est le soleil qui m'a brunie.
  - type: text
    content: Les fils de ma mère se sont fâchés contre moi,
  - type: text
    content: ils m'ont faite gardienne des vignes.
  - type: text
    content: Ma vigne à moi, je ne l'ai pas gardée.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'mon cœur  : autre traduction mon âme (cf. Gn 1.20n). –  où  : l''interrogatif ainsi traduit n''a le même sens qu''en 2R 6.13 ; ailleurs il signifie plutôt comment  ; c''est le quoi donc ! qui ouvre les complaintes (cf. Es 14.4n  ; Lm 1.1). Voir aussi 3.1-4 ; Gn 37.16 ; Jn 20.1ss. –  où tu fais paître ton troupeau  : litt. où tu pais  ; cf. 2.16n  ; Es 40.11 ; Ps 23.1. –  égarée (cf. Jr 31.22) ; certains, rapprochant le mot hébreu de la racine qui signifie s''envelopper (cf. Gn 38.14), comprennent comme une prostituée.'
  - type: text
    content: Dis-moi, toi que mon cœur aime,
  - type: text
    content: où tu fais paître ton troupeau,
  - type: text
    content: où tu le fais coucher à midi ;
  - type: text
    content: pourquoi serais-je comme égarée
  - type: text
    content: près des troupeaux de tes compagnons ?
  - type: heading
    content: Autres
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ce v. est apparemment la réponse d'un chœur ; cf. 2.15 ; 5.1 ; 6.1 ; 7.1 ; 8.8s.
  - type: text
    content: Si tu ne le sais pas, toi, la plus belle des femmes,
  - type: text
    content: sors sur les traces du petit bétail
  - type: text
    content: et fais paître tes chevrettes
  - type: text
    content: près des demeures des bergers.
  - type: heading
    content: Lui
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'A une jument  : autres traductions possibles à ma jument ; à la cavalerie  ; cf. Es 63.13. –  chars du pharaon  : cf. 1R 3.1 ; 10.28s.'
  - type: text
    content: A une jument des chars du pharaon
  - type: text
    content: je te compare, mon amie.
