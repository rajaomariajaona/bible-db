document_id: JER.36,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le rouleau brûlé
  - type: text
    content: ' '
  - type: note
    content: 'La quatrième année…  : 605/4 av. J.-C. ; cf. 1.3n  ; 25.1 ; 35.1 ; 45.1.'
  - type: text
    content: 'La quatrième année de Joïaqim, fils de Josias, roi de Juda, cette parole parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  '10':
  - type: note
    content: 'la salle de Guemaria (hébreu Guemaryahou) ou l''office de Guemaria  ; cf. v. 12,20s. –  Guemaria, fils de Shaphân  : cf. v. 11,19,25 ; 26.24n  ; voir scribe. –  cour supérieure…  : cf. 2R 21.5 ; 2Ch 20.5.'
  - type: text
    content: 'Baruch lut dans le livre les paroles de Jérémie. Il les lut dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans la salle de Guemaria, fils de Shaphân, le scribe, dans la cour supérieure, à l''entrée de la porte Neuve de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il les lut à tout le peuple. '
  '11':
  - type: text
    content: 'Michée, fils de Guemaria, fils de Shaphân, entendit toutes les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: ' contenues dans le livre '
  '12':
  - type: note
    content: 'étaient installés  : autres traductions étaient assis ; siégeaient. –  Elnathan 26.22. –  Hanania  : hébreu Hananyahou.'
  - type: text
    content: 'et descendit à la maison du roi, dans la salle du scribe, où étaient installés tous les princes, Elishama, le scribe, Delaya, fils de Shemaya, Elnathan, fils d''Akbor, Guemaria, fils de Shaphân, Sédécias, fils de Hanania, et tous les autres princes. '
  '13':
  - type: text
    content: Michée leur rapporta toutes les paroles qu'il avait entendues, lorsque Baruch lisait le livre au peuple.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Shélémia  : hébreu Shélémyahou . –  Koushi  : ce nom pourrait signifier Nubien  ; cf. 13.23 ; 38.7ss. –  Nériya  : hébreu Nériyahou.'
  - type: text
    content: 'Alors tous les princes envoyèrent à Baruch Yehoudi, fils de Netania, fils de Shélémia, fils de Koushi, pour lui dire : Prends le rouleau que tu as lu au peuple, et viens ! Baruch, fils de Nériya, prit le rouleau et se rendit auprès d''eux. '
  '15':
  - type: note
    content: 'lis-le-nous… le leur lut  : litt. lis-le à nos oreilles… le lut à leurs oreilles, v. 6n.'
  - type: text
    content: 'Ils lui dirent : Assieds-toi, je t''en prie, et lis-le-nous. Baruch le leur lut. '
  '16':
  - type: note
    content: 'avec frayeur  : cf. v. 24. –  à Baruch  : omis par LXX.'
  - type: text
    content: 'Lorsqu''ils eurent entendu toutes ces paroles, ils se regardèrent avec frayeur les uns les autres et dirent à Baruch : Nous allons rapporter toutes ces paroles au roi. '
  '17':
  - type: note
    content: 'sous sa dictée (v. 4n) : omis par LXX.'
  - type: text
    content: 'Ils interrogèrent alors Baruch : Dis-nous, je te prie, comment tu as écrit toutes ces paroles sous sa dictée. '
  '18':
  - type: note
    content: 'Il m''a dicté…  : litt. de sa bouche il proclamait.'
  - type: text
    content: 'Baruch leur répondit : Il m''a dicté toutes ces paroles, et je les écrivais dans ce livre avec de l''encre. '
  '19':
  - type: text
    content: 'Les princes dirent à Baruch : Va, cache-toi, ainsi que Jérémie, et que personne ne sache où vous êtes.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'livre-rouleau  : cf. 30.2+ ; même expression Ez 2.9. –  sur Israël  : cf. 3.6-13 ; 30.1ss ; LXX sur Jérusalem  ; cf. 25.2. –  Josias 1.2n.'
  - type: text
    content: 'Prends un livre-rouleau ; tu y écriras toutes les paroles que je t''ai dites sur Israël, sur Juda et sur toutes les nations depuis le jour où je t''ai parlé, depuis les jours de Josias, jusqu''à ce jour. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'au roi  : litt. aux oreilles du roi.'
  - type: text
    content: 'Ils allèrent ensuite à la cour vers le roi, laissant le livre en dépôt dans la salle d''Elishama, le scribe, et ils en rapportèrent toutes les paroles au roi. '
  '21':
  - type: text
    content: 'Le roi envoya Yehoudi prendre le rouleau. Yehoudi le prit dans la salle d''Elishama, le scribe, et il le lut au roi et à tous les princes qui se tenaient auprès du roi. '
  '22':
  - type: note
    content: 'un brasero  : versions anciennes le feu d''un brasero.'
  - type: text
    content: 'Le roi était assis dans la maison d''hiver – c''était au neuvième mois – et un brasero brûlait devant lui. '
  '23':
  - type: note
    content: 'le roi…  : litt. il les découpait. –  canif  : le même mot est traduit ailleurs par rasoir Nb 6.5 ; 8.7 ; Es 7.20 ; Ez 5.1 ; Ps 52.4.'
  - type: text
    content: 'A mesure que Yehoudi lisait trois ou quatre colonnes, le roi les découpait avec le canif du scribe et les jetait dans le feu du brasero, jusqu''à ce que tout le rouleau soit consumé. '
  '24':
  - type: note
    content: Cf. v. 16 ; 2.19+ ; Es 37.1.
  - type: text
    content: 'Ainsi le roi et tous les gens de sa cour qui entendirent toutes ces paroles ne furent pas effrayés et ne déchirèrent pas leurs vêtements. '
  '25':
  - type: note
    content: 'étaient intervenus  : cf. Es 53.12n.'
  - type: text
    content: 'Pourtant Elnathan, Delaya et Guemaria étaient intervenus auprès du roi pour qu''on ne brûle pas le rouleau ; mais il ne les avait pas écoutés. '
  '26':
  - type: note
    content: 'fils du roi  : certains pensent qu''il s''agit ici d''une fonction ou d''un titre de noblesse ; cf. 38.6 ; 1R 22.26.'
  - type: text
    content: 'Le roi ordonna à Yerahméel, fils du roi, à Seraya, fils d''Azriel, et à Shélémia, fils d''Abdéel, d''arrêter Baruch, le scribe, et Jérémie, le prophète. Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les cacha.'
  - type: heading
    content: Contre le roi
  '27':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie, après que le roi eut brûlé le rouleau avec les paroles que Baruch avait écrites sous la dictée de Jérémie : '
  '28':
  - type: note
    content: Cf. Ex 34.1.
  - type: text
    content: 'Prends un autre rouleau, et tu y écriras toutes les paroles qui étaient dans le premier rouleau qu''a brûlé Joïaqim, roi de Juda. '
  '29':
  - type: note
    content: les humains et les bêtes 4.25+ ; 7.20.
  - type: text
    content: 'Et contre Joïaqim, roi de Juda, tu diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : C''est toi qui as brûlé ce rouleau, en disant : « Pourquoi y as-tu écrit ces paroles : “Le roi de Babylone viendra sans faute, il détruira ce pays et il en fera disparaître les humains et les bêtes.” »'
  '3':
  - type: note
    content: 'Cf. v. 7 ; 8.8 ; 26.3+. –  prendra-t-elle garde à  : litt. entendra-t-elle.'
  - type: text
    content: Peut-être la maison de Juda prendra-t-elle garde à tout le mal que je me prépare à lui faire, de sorte que chacun d'eux reviendra de sa voie mauvaise ; alors je pardonnerai leur faute et leur péché.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 29). –  Aucun des siens ne s''assiéra ou ne sera assis  ; cf. 22.30+ à propos de Joïakîn, fils de Joïaqim, qui n''a régné que trois mois. –  son cadavre sera exposé… 8.2 ; cf. 22.18s.'
  - type: text
    content: 'A cause de cela, voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre Joïaqim, roi de Juda : Aucun des siens ne s''assiéra sur le trône de David ; son cadavre sera exposé à la chaleur pendant le jour et au froid pendant la nuit. '
  '31':
  - type: note
    content: 'Je leur ferai rendre des comptes…  : cf. 6.15n  ; 25.12n. –  le malheur… 19.15. –  bien qu''ils n''aient pas écouté  : cf. 7.26n  ; 35.17.'
  - type: text
    content: Je leur ferai rendre des comptes pour leurs fautes, à lui, à sa descendance et aux gens de sa cour, et je ferai venir sur eux, sur les habitants de Jérusalem et sur les hommes de Juda tout le malheur que je leur ai annoncé – bien qu'ils n'aient pas écouté.
  '32':
  - type: text
    content: ' '
  - type: note
    content: V. 2,28.
  - type: text
    content: Jérémie prit un autre rouleau et le donna à Baruch, fils de Nériya, le scribe. Baruch y écrivit, sous la dictée de Jérémie, toutes les paroles du livre qu'avait brûlé au feu Joïaqim, roi de Juda. Beaucoup d'autres paroles semblables y furent encore ajoutées.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Baruch v. 18,32 ; 32.12n. –  sous la dictée  : litt. de la bouche , de même dans la suite.'
  - type: text
    content: 'Jérémie appela Baruch, fils de Nériya ; sous la dictée de Jérémie, Baruch écrivit dans un livre-rouleau toutes les paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dites à Jérémie. '
  '5':
  - type: note
    content: 'retenu  : le mot hébreu correspondant est rendu par détenu en 33.1 ; 39.15, mais ici le prophète semble libre (v. 19,26) ; peut-être lui avait-on interdit l''accès au temple (cf. 20.1-6) ; cf. l''emploi de la même expression en 1Ch 12.1 ; voir aussi Né 6.10n.'
  - type: text
    content: 'Puis Jérémie donna cet ordre à Baruch : Puisque je suis retenu et que je ne peux aller à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '6':
  - type: note
    content: 'au peuple  : litt. aux oreilles du peuple, de même dans la suite et en 29.29. –  un jour de jeûne  : peut-être l''expression visait-elle dans un premier temps le jour de l''expiation, au début de l''automne (Lv 16.6n,29n) ; mais l''exécution de l''ordre aura lieu plus tard (v. 9ss). En tout cas il s''agit d''un rassemblement solennel.'
  - type: text
    content: 'tu iras toi-même et tu liras dans le rouleau que tu as écrit sous ma dictée les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; tu les liras au peuple, dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', un jour de jeûne ; tu les liras aussi à tous les gens de Juda qui seront venus de leurs villes. '
  '7':
  - type: note
    content: 'Peut-être v. 3+. –  parviendra-t-elle  : litt. tombera-t-elle, de même en 38.26 ; 42.2,9 ; cf. Dn 9.18n. –  colère / fureur 7.20+.'
  - type: text
    content: 'Peut-être leur supplication parviendra-t-elle devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et reviendront-ils, chacun de sa voie mauvaise ; car grande est la colère, la fureur que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a exprimée envers ce peuple. '
  '8':
  - type: note
    content: L'exécution de cette mission est rapportée avec plus de détails dans les v. suivants.
  - type: text
    content: 'Baruch, fils de Nériya, fit exactement ce que lui avait ordonné Jérémie, le prophète ; il lut dans le livre les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'cinquième année / neuvième mois  : novembre-décembre 604 av. J.-C. (cf. v. 1) ; certains, d''après LXX, modifient le texte hébreu traditionnel pour lire la huitième année (601). –  jeûne 2Ch 20.3s.'
  - type: text
    content: 'La cinquième année de Joïaqim, fils de Josias, roi de Juda, le neuvième mois, on proclama un jeûne devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour tout le peuple de Jérusalem et pour tout le peuple venu des villes de Juda à Jérusalem. '
