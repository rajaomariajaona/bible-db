    marker-yv: yv-n
  - type: text
    text: 'Ils lui dirent : Assieds-toi, je t''en prie, et lis-le-nous. Baruch le leur lut. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec frayeur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à Baruch
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : omis par LXX.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''ils eurent entendu toutes ces paroles, ils se regardèrent avec frayeur les uns les autres et dirent à Baruch : Nous allons rapporter toutes ces paroles au roi. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sous sa dictée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : omis par LXX.'
    marker-yv: yv-n
  - type: text
    text: 'Ils interrogèrent alors Baruch : Dis-nous, je te prie, comment tu as écrit toutes ces paroles sous sa dictée. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il m'a dicté…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de sa bouche il proclamait.
    marker-yv: yv-n
  - type: text
    text: 'Baruch leur répondit : Il m''a dicté toutes ces paroles, et je les écrivais dans ce livre avec de l''encre. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les princes dirent à Baruch : Va, cache-toi, ainsi que Jérémie, et que personne ne sache où vous êtes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aux oreilles du roi.
    marker-yv: yv-n
  - type: text
    text: 'Ils allèrent ensuite à la cour vers le roi, laissant le livre en dépôt dans la salle d''Elishama, le scribe, et ils en rapportèrent toutes les paroles au roi. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi envoya Yehoudi prendre le rouleau. Yehoudi le prit dans la salle d''Elishama, le scribe, et il le lut au roi et à tous les princes qui se tenaient auprès du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un brasero
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : versions anciennes '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le feu d'un brasero.
    marker-yv: yv-n
  - type: text
    text: 'Le roi était assis dans la maison d''hiver – c''était au neuvième mois – et un brasero brûlait devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le roi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il les découpait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: canif
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot est traduit ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rasoir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 6.5 ; 8.7 ; Es 7.20 ; Ez 5.1 ; Ps 52.4.
    marker-yv: yv-n
  - type: text
    text: 'A mesure que Yehoudi lisait trois ou quatre colonnes, le roi les découpait avec le canif du scribe et les jetait dans le feu du brasero, jusqu''à ce que tout le rouleau soit consumé. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 16 ; 2.19+ ; Es 37.1.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi le roi et tous les gens de sa cour qui entendirent toutes ces paroles ne furent pas effrayés et ne déchirèrent pas leurs vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: étaient intervenus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 53.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Pourtant Elnathan, Delaya et Guemaria étaient intervenus auprès du roi pour qu''on ne brûle pas le rouleau ; mais il ne les avait pas écoutés. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.26 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' du roi'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains pensent qu''il s''agit ici d''une fonction ou d''un titre de noblesse ; cf. 38.6 ; 1R 22.26.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi ordonna à Yerahméel, fils du roi, à Seraya, fils d''Azriel, et à Shélémia, fils d''Abdéel, d''arrêter Baruch, le scribe, et Jérémie, le prophète. Mais le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' les cacha.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre le roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' parvint à Jérémie, après que le roi eut brûlé le rouleau avec les paroles que Baruch avait écrites sous la dictée de Jérémie : '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ex 34.1.
    marker-yv: yv-n
  - type: text
    text: 'Prends un autre rouleau, et tu y écriras toutes les paroles qui étaient dans le premier rouleau qu''a brûlé Joïaqim, roi de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les humains et les bêtes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.25+ ; 7.20.
    marker-yv: yv-n
  - type: text
    text: 'Et contre Joïaqim, roi de Juda, tu diras : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : C''est toi qui as brûlé ce rouleau, en disant : « Pourquoi y as-tu écrit ces paroles : “Le roi de Babylone viendra sans faute, il détruira ce pays et il en fera disparaître les humains et les bêtes.” »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voici ce que dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la formule correspondante est habituellement traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ainsi parle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(p. ex. v. 29). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aucun des siens ne s''assiéra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne sera assis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 22.30+ à propos de Joïakîn, fils de Joïaqim, qui n''a régné que trois mois. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'son cadavre sera exposé… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.2 ; cf. 22.18s.
    marker-yv: yv-n
  - type: text
    text: 'A cause de cela, voici ce que dit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' contre Joïaqim, roi de Juda : Aucun des siens ne s''assiéra sur le trône de David ; son cadavre sera exposé à la chaleur pendant le jour et au froid pendant la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je leur ferai rendre des comptes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 25.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le malheur… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bien qu'ils n'aient pas écouté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 35.17.'
    marker-yv: yv-n
  - type: text
    text: Je leur ferai rendre des comptes pour leurs fautes, à lui, à sa descendance et aux gens de sa cour, et je ferai venir sur eux, sur les habitants de Jérusalem et sur les hommes de Juda tout le malheur que je leur ai annoncé – bien qu'ils n'aient pas écouté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 2,28.
    marker-yv: yv-n
  - type: text
    text: Jérémie prit un autre rouleau et le donna à Baruch, fils de Nériya, le scribe. Baruch y écrivit, sous la dictée de Jérémie, toutes les paroles du livre qu'avait brûlé au feu Joïaqim, roi de Juda. Beaucoup d'autres paroles semblables y furent encore ajoutées.
