    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 7 ; 8.8 ; 26.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prendra-t-elle garde à
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: entendra-t-elle.
    marker-yv: yv-n
  - type: text
    text: Peut-être la maison de Juda prendra-t-elle garde à tout le mal que je me prépare à lui faire, de sorte que chacun d'eux reviendra de sa voie mauvaise ; alors je pardonnerai leur faute et leur péché.
