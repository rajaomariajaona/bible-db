  - type: text
    text: 'Prends un livre-rouleau ; tu y écriras toutes les paroles que je t''ai dites sur Israël, sur Juda et sur toutes les nations depuis le jour où je t''ai parlé, depuis les jours de Josias, jusqu''à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
