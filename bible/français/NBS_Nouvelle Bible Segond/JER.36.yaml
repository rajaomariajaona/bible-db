    text: 'Alors tous les princes envoyèrent à Baruch Yehoudi, fils de Netania, fils de Shélémia, fils de Koushi, pour lui dire : Prends le rouleau que tu as lu au peuple, et viens ! Baruch, fils de Nériya, prit le rouleau et se rendit auprès d''eux. '
