  - type: text
    text: 'Jérémie appela Baruch, fils de Nériya ; sous la dictée de Jérémie, Baruch écrivit dans un livre-rouleau toutes les paroles que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
