document_id: PSA.65,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu de la prière, Dieu de l'univers
  - type: text
    content: ' '
  - type: note
    content: Chant 30.1+.
  - type: text
    content: Du chef de chœur. Psaume. De David. Chant.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Tu t''occupes de la terre  : autres traductions tu prends soin de la terre ; tu visites la terre  ; cf. 8.4n. –  le canal de Dieu 1.3+ ; 46.5 ; cf. Es 33.21 ; Ez 47 ; Jl 4.18 ; Za 14.8. –  le blé  : litt. leur blé  ; cf. Os 2.10 ; Jl 2.19.'
  - type: text
    content: Tu t'occupes de la terre et tu lui donnes l'abondance,
  - type: text
    content: tu la combles de richesses ;
  - type: text
    content: le canal de Dieu est plein d'eau ;
  - type: text
    content: tu prépares le blé quand tu la prépares ainsi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Termes peu connus et traduction incertaine ; cf. 104.10-15 ; Es 30.23 ; Jl 2.23s. –  ses germes ou sa germination.
  - type: text
    content: En abreuvant ses sillons, en aplanissant ses mottes,
  - type: text
    content: tu la détrempes par des ondées, tu bénis ses germes.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 72.16 ; 85.13 ; Am 9.13. –  Tu couronnes ou tu entoures  ; 5.13n  ; 103.4. –  tes sentiers , c.-à-d. les sentiers où tu passes  ; cf. 68.9s ; Dt 33.26. –  de sève  : litt. de graisse  ; cf. 36.9n.'
  - type: text
    content: Tu couronnes l'année de tes biens,
  - type: text
    content: et tes sentiers ruissellent de sève ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'pâturages du désert  : cf. 1S 17.28. –  se ceignent  : autre verbe qu''au v. 7.'
  - type: text
    content: ils ruissellent, les pâturages du désert,
  - type: text
    content: et les collines se ceignent d'allégresse ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 96.12 ; 98.8 ; Es 55.12.
  - type: text
    content: les prés se recouvrent de petit bétail,
  - type: text
    content: et les vallées se revêtent de blé.
  - type: text
    content: Les acclamations et les chants retentissent.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Pour toi…  : des versions anciennes ont lu à toi la louange convient , ce qui correspondrait à une variante d''une seule voyelle dans le texte hébreu ; cf. 62.6. –  Dieu, dans Sion ou Dieu qui es dans Sion  ; 9.12 ; 132.13 ; 135.21 ; Es 12.6 ; 31.9 ; 46.13 ; Jr 8.19 ; 31.6 ; Jl 4.17 ; Lm 4.11. –  on s''acquittera des vœux 22.26+. –  qu''on t''a fait  : litt. pour toi.'
  - type: text
    content: Pour toi le silence est louange, ô Dieu, dans Sion ;
  - type: text
    content: on s'acquittera des vœux qu'on t'a fait.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'qui entends la prière  : cf. 17.1 ; 34.16 ; 66.19s ; Jon 2.8 ; Pr 15.29. –  tous  : litt. toute chair  ; cf. Es 66.23.'
  - type: text
    content: Toi qui entends la prière,
  - type: text
    content: tous viendront à toi.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Le poids  : litt. les paroles , mais le terme hébreu a aussi le sens de choses . –  me dépasse  : LXX nous dépasse  ; cf. 32.3-5 ; 38.5ss ; Gn 4.13. –  tu feras l''expiation de ou tu effaceras, tu couvriras  ; de même 78.38 ; 79.9 ; le verbe est apparenté aux termes habituellement traduits par expiation, expiatoire  ; cf. Dt 21.8.'
  - type: text
    content: Le poids des fautes me dépasse ;
  - type: text
    content: tu feras l'expiation de nos transgressions.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Heureux (1.1+) celui que tu choisis  : cf. 33.12. –  que tu fais approcher  : autre traduction que tu laisses se présenter (devant toi)  ; cf. Lv 1.2n  ; Nb 16.5n. –  les cours de ton temple  : litt. tes cours  ; 84.3,11 ; 92.14 ; 96.8 ; 100.4 ; 135.2 ; Es 1.12 ; Za 3.7 ; cf. Ps 15.1 ; 23.6 ; 24.3ss ; 27.4+ ; 84.5. –  Nous serons rassasiés… 36.9 ; 90.14. –  des choses sacrées…  : c.-à-d. des offrandes et des sacrifices ; on pourrait aussi comprendre de la sainteté de ton temple  ; d''autres modifient le texte hébreu traditionnel pour lire ton temple est saint  ; cf. 22.26s ; 23.5 ; Jr 31.14.'
  - type: text
    content: Heureux celui que tu choisis et que tu fais approcher,
  - type: text
    content: pour qu'il demeure dans les cours de ton temple !
  - type: text
    content: Nous serons rassasiés du bonheur de ta maison,
  - type: text
    content: des choses sacrées de ton temple.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'actions redoutables  : cf. 45.5 ; Dt 10.21 ; Es 64.2. –  les extrémités lointaines…  : Tg les extrémités de la terre et les îles lointaines  ; cf. Es 66.19.'
  - type: text
    content: Par des actions redoutables, avec justice,
  - type: text
    content: tu nous réponds, Dieu de notre salut,
  - type: text
    content: toi à qui se fient toutes les extrémités lointaines de la terre et de la mer !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'affermit (ou installe ) … 24.2 ; 119.90 ; Jr 10.12. –  ceint  : comme celui qui se prépare au combat, cf. 18.33,40 ; 30.12 ; 93.1 ; Jr 1.17n.'
  - type: text
    content: Il affermit les montagnes par sa force,
  - type: text
    content: il est ceint de puissance ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 46.3s ; 89.10 ; 107.29 ; Es 51.9ss ; Jr 5.22 ; Mc 4.39+/ / ; Lc 21.25. –  et le tumulte…  : LXX a lu les peuples sont en tumulte (à rattacher au v. 9) ; cf. 2.1.'
  - type: text
    content: il apaise le mugissement des mers, le mugissement de leurs flots,
  - type: text
    content: et le tumulte des peuples.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 67.4s. –  du monde  : sous-entendu dans le texte. –  l''orient et l''occident  : litt. les issues (ou les portes ) du matin et du soir  ; cf. Jb 38.7ss.'
  - type: text
    content: Ceux qui habitent les extrémités du monde sont dans la crainte à cause de tes signes ;
  - type: text
    content: tu remplis de cris de joie l'orient et l'occident.
