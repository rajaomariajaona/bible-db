segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les villes des lévites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Cf. 1Ch 6.39-66
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les chefs de famille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 14.1 ; voir aussi 1Ch 6.39ss. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévite
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les chefs de famille des lévites s''approchèrent d''Eléazar, le prêtre, de Josué, fils de Noun, et des chefs de famille des tribus des Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: A Silo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 18.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Par l''intermédiaire de Moïse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'on nous donne des villes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 35.1-8.'
    marker-yv: yv-n
  - type: text
    text: 'A Silo, en Canaan, ils leur dirent : Par l''intermédiaire de Moïse, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a ordonné qu''on nous donne des villes pour y habiter, ainsi que leurs abords pour nos bêtes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 41 ; Nb 35.6s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ces villes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: conformément à l'ordre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur la bouche.
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites donnèrent alors aux lévites, sur leur patrimoine, ces villes avec leurs abords, conformément à l''ordre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qehatites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ex 6.16-25 ; Nb 3.17-19,27-32.'
    marker-yv: yv-n
  - type: text
    text: 'On tira le sort pour les clans des Qehatites ; parmi les lévites, les fils d''Aaron, le prêtre, eurent par le sort treize villes de la tribu de Juda, de la tribu de Siméon et de la tribu de Benjamin ; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'les autres fils de Qehath eurent par le sort dix villes des clans de la tribu d''Ephraïm, de la tribu de Dan et de la demi-tribu de Manassé. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' de Guershôn…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 27-32.'
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Guershôn eurent par le sort treize villes des clans de la tribu d''Issacar, de la tribu d''Aser, de la tribu de Nephtali et de la demi-tribu de Manassé, au Bashân. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les fils de Merari…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 34-40.'
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Merari, clan par clan, eurent douze villes de la tribu de Ruben, de la tribu de Gad et de la tribu de Zabulon. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ces villes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3. Pour les v. 1-8, cf. Gn 49.5-7 ; Nb 35.1-8 ; voir aussi Dt 33.8-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par l''intermédiaire de Moïse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites donnèrent aux lévites, par le sort, ces villes avec leurs abords, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné par l''intermédiaire de Moïse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: désignées par leur nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'il appelle par nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Pour les v. 9-26, cf. 1Ch 6.39-46.
    marker-yv: yv-n
  - type: text
    text: 'De la tribu des fils de Juda et de la tribu des fils de Siméon, ils donnèrent ces villes désignées par leur nom, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'qui furent pour les fils d''Aaron, d''entre les clans des Qehatites, d''entre les fils de Lévi, car le sort les avait désignés en premier. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: père d'Anaq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: capitale d'Anaq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 15.13.'
    marker-yv: yv-n
  - type: text
    text: 'Ils leur donnèrent Qiriath-Arba – Qiriath d''Arba, père d''Anaq (c''est-à-dire Hébron) – dans la région montagneuse de Juda, avec ses abords, tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Caleb, fils de Yephounné '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.6+.
    marker-yv: yv-n
  - type: text
    text: 'Mais les champs de la ville et les villages qui en dépendent, ils les donnèrent comme propriété à Caleb, fils de Yephounné. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la ville de refuge pour les meurtriers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 20.2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hébron '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 11 ; 20.7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Libna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Aux fils d''Aaron, le prêtre, ils donnèrent la ville de refuge pour les meurtriers : Hébron, avec ses abords ; Libna, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Yattir, avec ses abords ; Eshtemoa, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Holôn, avec ses abords ; Debir, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aïn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; certains modifient le texte hébreu traditionnel d''après LXX pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ashân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 15.42.'
    marker-yv: yv-n
  - type: text
    text: 'Aïn, avec ses abords ; Youtta, avec ses abords ; Beth-Shémesh, avec ses abords : neuf villes de ces deux tribus ; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'de la tribu de Benjamin, Gabaon, avec ses abords ; Guéba, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Anatoth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à 5 km au nord-est de Jérusalem, ville natale de Jérémie. Cf. Jr 1.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Almôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : au nord-est d''Anatoth.'
    marker-yv: yv-n
  - type: text
    text: 'Anatoth, avec ses abords ; Almôn, avec ses abords : quatre villes. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Total des villes des fils d''Aaron, les prêtres : treize villes avec leurs abords.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les autres lévites appartenant aux clans des fils de Qehath eurent par le sort des villes de la tribu d''Ephraïm. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'On leur donna la ville de refuge pour les meurtriers : Sichem, avec ses abords, dans la région montagneuse d''Ephraïm ; Guézer, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Qibtsaïm, avec ses abords ; Beth-Horôn, avec ses abords : quatre villes ; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'de la tribu de Dan, Elteqé, avec ses abords ; Guibbetôn, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ayyalôn, avec ses abords ; Gath-Rimmôn, avec ses abords : quatre villes ; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gath-Rimmôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 24 ; 19.45 ; certains remplacent ici par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yibléam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1Ch 6.55'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'de la demi-tribu de Manassé, Taanak, avec ses abords ; Gath-Rimmôn, avec ses abords : deux villes. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Total des villes : dix, avec leurs abords, pour les clans des autres fils de Qehath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aux fils de Guershôn…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : pour les v. 27-42, cf. 1Ch 6.52-66.'
    marker-yv: yv-n
  - type: text
    text: 'Aux fils de Guershôn, d''entre les clans des lévites : de la demi-tribu de Manassé, la ville de refuge pour les meurtriers : Golân, au Bashân, avec ses abords ; Béeshtra, avec ses abords : deux villes ; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'de la tribu d''Issacar, Qishiôn, avec ses abords ; Dabrath, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Yarmouth, avec ses abords ; Eïn-Gannim, avec ses abords : quatre villes ; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'de la tribu d''Aser, Mishéal, avec ses abords ; Abdôn, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Helqath, avec ses abords ; Rehob, avec ses abords : quatre villes ; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'de la tribu de Nephtali, la ville de refuge pour les meurtriers : Qédesh, en Galilée, avec ses abords ; Hammoth-Dor, avec ses abords ; Qartân, avec ses abords : trois villes. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Total des villes des Guershonites, clan par clan : treize villes, avec leurs abords.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Aux autres lévites appartenant aux clans des fils de Merari : de la tribu de Zabulon, Yoqnéam, avec ses abords ; Qarta, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dimna, avec ses abords ; Nahalal, avec ses abords : quatre villes ; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de la tribu de Ruben…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les v. 36s, absents de plusieurs mss hébreux, se trouvent cependant dans LXX et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' ainsi que dans le texte hébreu parallèle de 1Ch 6.63s.'
    marker-yv: yv-n
  - type: text
    text: 'de la tribu de Ruben, Bétser, avec ses abords ; Yahtsa, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Qedémoth, avec ses abords ; Méphaath, avec ses abords : quatre villes ; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'de la tribu de Gad, la ville de refuge pour les meurtriers : Ramoth, au Galaad, avec ses abords ; Mahanaïm, avec ses abords ; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Heshbôn, avec ses abords ; Yazer, avec ses abords : en tout quatre villes. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Total des villes qui échurent par le sort aux fils de Merari, clan par clan, aux autres des clans des lévites : douze villes. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Total des villes des lévites au milieu de la propriété des Israélites : quarante-huit villes avec leurs abords. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Chacune de ces villes avait ses abords, tout autour ; il en était de même pour toutes ces villes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est ainsi que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' …'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : avant ce v., LXX répète le récit de la remise à Josué d''un patrimoine (19.49-51) et ajoute le récit du dépôt des couteaux de la circoncision à la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'colline des Araloth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 5.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ). Pour les v. 43-45, cf. chap. 23 ; Gn 15.18-21 ; Ps 105.8-11,42,45 ; Né 9.8,22-25.
    marker-yv: yv-n
  - type: text
    text: 'C''est ainsi que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' donna à Israël tout le pays qu''il avait juré de donner à leurs pères ; ils en prirent possession et s''y installèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.44 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: accorda le repos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.4+.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' leur accorda le repos de tous côtés, tout comme il l''avait juré à leurs pères ; aucun de leurs ennemis ne put leur résister : le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' leur livra tous leurs ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.45 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aucune ne resta sans effet : toutes se réalisèrent'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ne tomba aucune parole, tout arriva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; formules analogues en 23.14s.'
    marker-yv: yv-n
  - type: text
    text: 'De toutes les bonnes paroles que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait dites à la maison d''Israël, aucune ne resta sans effet : toutes se réalisèrent.'
