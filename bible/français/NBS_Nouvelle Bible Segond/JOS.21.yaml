document_id: JOS.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les villes des lévites
  - type: heading
    content: Cf. 1Ch 6.39-66
  - type: text
    content: ' '
  - type: note
    content: 'Les chefs de famille  : cf. 14.1 ; voir aussi 1Ch 6.39ss. – Voir lévite .'
  - type: text
    content: 'Les chefs de famille des lévites s''approchèrent d''Eléazar, le prêtre, de Josué, fils de Noun, et des chefs de famille des tribus des Israélites. '
  '10':
  - type: text
    content: 'qui furent pour les fils d''Aaron, d''entre les clans des Qehatites, d''entre les fils de Lévi, car le sort les avait désignés en premier. '
  '11':
  - type: note
    content: 'père d''Anaq  : LXX capitale d''Anaq, cf. 15.13.'
  - type: text
    content: 'Ils leur donnèrent Qiriath-Arba – Qiriath d''Arba, père d''Anaq (c''est-à-dire Hébron) – dans la région montagneuse de Juda, avec ses abords, tout autour. '
  '12':
  - type: note
    content: Caleb, fils de Yephounné 14.6+.
  - type: text
    content: 'Mais les champs de la ville et les villages qui en dépendent, ils les donnèrent comme propriété à Caleb, fils de Yephounné. '
  '13':
  - type: note
    content: 'la ville de refuge pour les meurtriers  : cf. 20.2+. –  Hébron v. 11 ; 20.7n. –  Libna 10.29n.'
  - type: text
    content: 'Aux fils d''Aaron, le prêtre, ils donnèrent la ville de refuge pour les meurtriers : Hébron, avec ses abords ; Libna, avec ses abords ; '
  '14':
  - type: text
    content: 'Yattir, avec ses abords ; Eshtemoa, avec ses abords ; '
  '15':
  - type: text
    content: 'Holôn, avec ses abords ; Debir, avec ses abords ; '
  '16':
  - type: note
    content: 'Aïn  : cf. 15.32n  ; certains modifient le texte hébreu traditionnel d''après LXX pour lire Ashân, cf. 15.42.'
  - type: text
    content: 'Aïn, avec ses abords ; Youtta, avec ses abords ; Beth-Shémesh, avec ses abords : neuf villes de ces deux tribus ; '
  '17':
  - type: text
    content: 'de la tribu de Benjamin, Gabaon, avec ses abords ; Guéba, avec ses abords ; '
  '18':
  - type: note
    content: 'Anatoth  : à 5 km au nord-est de Jérusalem, ville natale de Jérémie. Cf. Jr 1.1. –  Almôn  : au nord-est d''Anatoth.'
  - type: text
    content: 'Anatoth, avec ses abords ; Almôn, avec ses abords : quatre villes. '
  '19':
  - type: text
    content: 'Total des villes des fils d''Aaron, les prêtres : treize villes avec leurs abords.'
  '2':
  - type: note
    content: 'A Silo  : cf. 18.1n. –  Par l''intermédiaire de Moïse 14.2n. –  qu''on nous donne des villes  : cf. Nb 35.1-8.'
  - type: text
    content: 'A Silo, en Canaan, ils leur dirent : Par l''intermédiaire de Moïse, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné qu''on nous donne des villes pour y habiter, ainsi que leurs abords pour nos bêtes. '
  '20':
  - type: text
    content: 'Les autres lévites appartenant aux clans des fils de Qehath eurent par le sort des villes de la tribu d''Ephraïm. '
  '21':
  - type: text
    content: 'On leur donna la ville de refuge pour les meurtriers : Sichem, avec ses abords, dans la région montagneuse d''Ephraïm ; Guézer, avec ses abords ; '
  '22':
  - type: text
    content: 'Qibtsaïm, avec ses abords ; Beth-Horôn, avec ses abords : quatre villes ; '
  '23':
  - type: text
    content: 'de la tribu de Dan, Elteqé, avec ses abords ; Guibbetôn, avec ses abords ; '
  '24':
  - type: text
    content: 'Ayyalôn, avec ses abords ; Gath-Rimmôn, avec ses abords : quatre villes ; '
  '25':
  - type: note
    content: Gath-Rimmôn v. 24 ; 19.45 ; certains remplacent ici par Yibléam, cf. 1Ch 6.55n.
  - type: text
    content: 'de la demi-tribu de Manassé, Taanak, avec ses abords ; Gath-Rimmôn, avec ses abords : deux villes. '
  '26':
  - type: text
    content: 'Total des villes : dix, avec leurs abords, pour les clans des autres fils de Qehath.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Aux fils de Guershôn…  : pour les v. 27-42, cf. 1Ch 6.52-66.'
  - type: text
    content: 'Aux fils de Guershôn, d''entre les clans des lévites : de la demi-tribu de Manassé, la ville de refuge pour les meurtriers : Golân, au Bashân, avec ses abords ; Béeshtra, avec ses abords : deux villes ; '
  '28':
  - type: text
    content: 'de la tribu d''Issacar, Qishiôn, avec ses abords ; Dabrath, avec ses abords ; '
  '29':
  - type: text
    content: 'Yarmouth, avec ses abords ; Eïn-Gannim, avec ses abords : quatre villes ; '
  '3':
  - type: note
    content: 'Cf. v. 41 ; Nb 35.6s. –  ces villes  : cf. v. 8. –  conformément à l''ordre  : litt. sur la bouche.'
  - type: text
    content: 'Les Israélites donnèrent alors aux lévites, sur leur patrimoine, ces villes avec leurs abords, conformément à l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '30':
  - type: text
    content: 'de la tribu d''Aser, Mishéal, avec ses abords ; Abdôn, avec ses abords ; '
  '31':
  - type: text
    content: 'Helqath, avec ses abords ; Rehob, avec ses abords : quatre villes ; '
  '32':
  - type: text
    content: 'de la tribu de Nephtali, la ville de refuge pour les meurtriers : Qédesh, en Galilée, avec ses abords ; Hammoth-Dor, avec ses abords ; Qartân, avec ses abords : trois villes. '
  '33':
  - type: text
    content: 'Total des villes des Guershonites, clan par clan : treize villes, avec leurs abords.'
  '34':
  - type: text
    content: 'Aux autres lévites appartenant aux clans des fils de Merari : de la tribu de Zabulon, Yoqnéam, avec ses abords ; Qarta, avec ses abords ; '
  '35':
  - type: text
    content: 'Dimna, avec ses abords ; Nahalal, avec ses abords : quatre villes ; '
  '36':
  - type: note
    content: 'de la tribu de Ruben…  : les v. 36s, absents de plusieurs mss hébreux, se trouvent cependant dans LXX et Vg ainsi que dans le texte hébreu parallèle de 1Ch 6.63s.'
  - type: text
    content: 'de la tribu de Ruben, Bétser, avec ses abords ; Yahtsa, avec ses abords ; '
  '37':
  - type: text
    content: 'Qedémoth, avec ses abords ; Méphaath, avec ses abords : quatre villes ; '
  '38':
  - type: text
    content: 'de la tribu de Gad, la ville de refuge pour les meurtriers : Ramoth, au Galaad, avec ses abords ; Mahanaïm, avec ses abords ; '
  '39':
  - type: text
    content: 'Heshbôn, avec ses abords ; Yazer, avec ses abords : en tout quatre villes. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Qehatites  : cf. Ex 6.16-25 ; Nb 3.17-19,27-32.'
  - type: text
    content: 'On tira le sort pour les clans des Qehatites ; parmi les lévites, les fils d''Aaron, le prêtre, eurent par le sort treize villes de la tribu de Juda, de la tribu de Siméon et de la tribu de Benjamin ; '
  '40':
  - type: text
    content: 'Total des villes qui échurent par le sort aux fils de Merari, clan par clan, aux autres des clans des lévites : douze villes. '
  '41':
  - type: text
    content: 'Total des villes des lévites au milieu de la propriété des Israélites : quarante-huit villes avec leurs abords. '
  '42':
  - type: text
    content: Chacune de ces villes avait ses abords, tout autour ; il en était de même pour toutes ces villes.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'C''est ainsi que le Seigneur …  : avant ce v., LXX répète le récit de la remise à Josué d''un patrimoine (19.49-51) et ajoute le récit du dépôt des couteaux de la circoncision à la colline des Araloth (cf. 5.3n). Pour les v. 43-45, cf. chap. 23 ; Gn 15.18-21 ; Ps 105.8-11,42,45 ; Né 9.8,22-25.'
  - type: text
    content: 'C''est ainsi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donna à Israël tout le pays qu''il avait juré de donner à leurs pères ; ils en prirent possession et s''y installèrent. '
  '44':
  - type: note
    content: 'accorda le repos  : cf. 22.4+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur accorda le repos de tous côtés, tout comme il l''avait juré à leurs pères ; aucun de leurs ennemis ne put leur résister : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur livra tous leurs ennemis. '
  '45':
  - type: note
    content: 'aucune ne resta sans effet : toutes se réalisèrent  : litt. il ne tomba aucune parole, tout arriva  ; formules analogues en 23.14s.'
  - type: text
    content: 'De toutes les bonnes paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dites à la maison d''Israël, aucune ne resta sans effet : toutes se réalisèrent.'
  '5':
  - type: text
    content: 'les autres fils de Qehath eurent par le sort dix villes des clans de la tribu d''Ephraïm, de la tribu de Dan et de la demi-tribu de Manassé. '
  '6':
  - type: note
    content: 'Les fils de Guershôn…  : cf. v. 27-32.'
  - type: text
    content: 'Les fils de Guershôn eurent par le sort treize villes des clans de la tribu d''Issacar, de la tribu d''Aser, de la tribu de Nephtali et de la demi-tribu de Manassé, au Bashân. '
  '7':
  - type: note
    content: 'Les fils de Merari…  : cf. v. 34-40.'
  - type: text
    content: 'Les fils de Merari, clan par clan, eurent douze villes de la tribu de Ruben, de la tribu de Gad et de la tribu de Zabulon. '
  '8':
  - type: note
    content: 'ces villes  : cf. v. 3. Pour les v. 1-8, cf. Gn 49.5-7 ; Nb 35.1-8 ; voir aussi Dt 33.8-11. –  par l''intermédiaire de Moïse 14.2n.'
  - type: text
    content: 'Les Israélites donnèrent aux lévites, par le sort, ces villes avec leurs abords, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné par l''intermédiaire de Moïse.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'désignées par leur nom  : litt. qu''il appelle par nom . Pour les v. 9-26, cf. 1Ch 6.39-46.'
  - type: text
    content: 'De la tribu des fils de Juda et de la tribu des fils de Siméon, ils donnèrent ces villes désignées par leur nom, '
