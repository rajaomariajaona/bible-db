document_id: JER.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Une prostituée obstinée
  - type: text
    content: ' '
  - type: note
    content: 'En hébreu le v. commence par la formule qui introduit habituellement le discours direct dans un récit et qui est simplement rendue, en 1.4 p. ex., par deux points ( :). Certains pensent qu''il portait à l''origine la parole du Seigneur me parvint : … –  reviendra-t-il…  : LXX reviendra-t-elle vers lui ? Cette femme-là (au lieu de Ce pays ou cette terre  ; cf. v. 2 ; 2.7+) n''en serait-elle pas… Dt 24.1-4 ; cf. Os 3.1-3. –  profané v. 2,9 ; 23.11n,15 ; Nb 35.33 ; Es 24.5n  ; Mi 4.11. –  prostituée 2.20+. –  tu reviendrais (même verbe que retourner ) v. 12 ; 4.1 ; cf. Lc 15.18ss.'
  - type: text
    content: Lorsqu'un homme répudie sa femme
  - type: text
    content: et qu'elle le quitte pour un autre,
  - type: text
    content: reviendra-t-il à elle ?
  - type: text
    content: Ce pays-là n'en serait-il pas profané ?
  - type: text
    content: Et toi qui t'es prostituée avec une multitude de compagnons,
  - type: text
    content: tu reviendrais à moi !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '10':
  - type: note
    content: 'de tout son cœur 24.7 ; 29.13 ; 32.41. –  c''était faux  : cf. v. 4s ; 2.23,27,35 ; 8.8 ; 13.25+ ; Os 6.1nss ; 7.13.'
  - type: text
    content: 'Pourtant malgré tout cela sa sœur, Juda la traîtresse, n''est pas revenue vers moi de tout son cœur ; c''était faux – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'est plus juste que  : autre traduction s''est justifiée plus que  ; cf. Ez 16.51.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Israël l''infidèle est plus juste que Juda la traîtresse. '
  '12':
  - type: note
    content: 'vers le nord v. 6n,18+ ; voir aussi 1.14n  ; le texte hébreu ajoute et tu diras. –  Reviens / l''infidèle  : hébreu shouva meshouva, termes apparentés et en assonance, v. 7,11,14n  ; 4.1 ; 8.4n  ; 11.18 ; cf. Dt 30.2-10 ; Es 31.6 ; Os 14.2 ; Za 1.3. –  Je n''aurai plus…  : litt. je ne ferai pas tomber mon visage contre vous  ; cf. Gn 4.5ns ; Jb 29.24n. –  je ne garde pas… v. 5n  ; cf. Lm 3.31.'
  - type: text
    content: 'Va, crie ces paroles vers le nord :'
  - type: text
    content: Reviens, Israël l'infidèle !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Je n'aurai plus pour vous un visage sévère ;
  - type: text
    content: car je suis fidèle,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: je ne garde pas rancune pour toujours.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Reconnais…  : cf. Lv 26.40 ; Pr 28.13. –  Tu t''es prodiguée  : litt. tu as dispersé tes voies , expression qui peut signifier tu as gaspillé tes forces  ; cf. Pr 31.3. –  étrangers 2.25n. –  sous tout arbre… 2.20n. –  vous ne m''avez pas écouté  : LXX tu ne m''as pas écouté  ; cf. v. 25+.'
  - type: text
    content: 'Reconnais seulement ta faute :'
  - type: text
    content: 'c''est contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu,'
  - type: text
    content: que tu t'es révoltée.
  - type: text
    content: Tu t'es prodiguée aux étrangers
  - type: text
    content: sous tout arbre verdoyant,
  - type: text
    content: et vous ne m'avez pas écouté
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Rassemblement universel à Jérusalem
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Les mots hébreux pour Revenez (hébreu shouvou ) et rebelles ( shovavim ) sont apparentés, de même au v. 22 (cf. v. 12n) ; cf. 2Ch 29.6. – Voir fils. –  qui suis votre maître  : le verbe hébreu est apparenté au nom Baal , que le Seigneur semble ici revendiquer pour lui seul (cf. Os 2.18ns). –  je vous ramènerai 23.3. –  Sion  : c.-à-d. Jérusalem.'
  - type: text
    content: 'Revenez, fils rebelles, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – car c''est moi qui suis votre maître. Je vous prendrai, un d''une ville, deux d''un clan, et je vous ramènerai à Sion. '
  '15':
  - type: note
    content: 'des bergers 2.8+ ; 23.4 ; cf. Ez 34.23 ; Ep 4.11. –  selon mon cœur  : cf. 1S 2.35.'
  - type: text
    content: 'Je vous donnerai des bergers selon mon cœur ; ils vous feront paître avec intelligence et bon sens. '
  '16':
  - type: note
    content: 'vous vous multiplierez… 23.3 ; cf. 29.6 ; 30.19+ ; Gn 1.22+ ; Dt 6.3 ; Es 54.1 ; Ez 36.11 ; Za 10.8 ; Ac 6.7. – Le coffre de l''alliance (Ex 25.10n) n''a plus été mentionné depuis 1R 8.4 ; cf. Ap 2.17n  ; 11.19. –  il ne viendra (litt. montera) plus au cœur, c.-à-d. à la pensée  ; même expression en 7.31 ; 19.5 ; 32.35 ; 51.50 ; sur l''ensemble, cf. Es 43.18 ; 65.17 ; 1Co 2.9. –  on ne remarquera plus son absence  : le verbe hébreu est parfois traduit par visiter  ; il évoque sans doute ici une inspection ou un inventaire qui pourrait signaler l''absence du Coffre.'
  - type: text
    content: 'Lorsque vous vous multiplierez et que vous deviendrez féconds dans le pays, en ces jours-là, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – on ne parlera plus du coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il ne viendra plus au cœur ; on ne s''en souviendra plus, on ne remarquera plus son absence, et on n''en fera pas d''autre. '
  '17':
  - type: note
    content: 'Trône du Seigneur  : cette expression s''appliquait traditionnellement au coffre de l''alliance (v. 16) surmonté des keroubim ; cf. 2R 19.15 ; Ez 43.7 ; Ap 22.3 ; voir aussi Jr 14.21+. –  toutes les nations  : cf. 12.14-16 ; Es 2.2+ ; 60.14. –  se dirigeront vers elle  : autre traduction mettront leur espérance en elle. –  au nom du Seigneur 7.10 ; Dt 12.5,11,21. –  vers Jérusalem  : cette précision est omise par LXX. –  l''obstination  : autres traductions l''assurance ou la volonté  ; expression analogue 7.24 ; 9.13 ; 11.8 ; 13.10 ; 16.12 ; 18.12 ; 23.17 ; Dt 29.18 ; cf. Es 65.2 ; Ps 81.13 ; voir aussi cœur.'
  - type: text
    content: 'En ce temps-là, on appellera Jérusalem « Trône du '
  - type: text
    content: Seigneur
  - type: text
    content: '  » ; toutes les nations se dirigeront vers elle, au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vers Jérusalem, et elles ne suivront plus l''obstination de leur cœur mauvais.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'marchera avec  : certains comprennent marchera sur les traces de  ; sur la réunion de Juda et Israël , cf. 23.6 ; 31.6 ; 50.4 ; Es 11.13 ; Ez 37.16-28 ; Os 2.2 ; Za 9.13 ; 10.6. –  du pays du nord v. 12+ ; 1.14n  ; 16.15 ; 23.8 ; 31.8. –  au pays… 7.7.'
  - type: text
    content: En ces jours-là, la maison de Juda marchera avec la maison d'Israël ; puis elles viendront ensemble du pays du nord au pays que j'ai donné pour patrimoine à vos pères.
  - type: heading
    content: Le retour du peuple rebelle
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Comme je voudrais  : litt. Comment ! Je voudrais… –  te compter (le texte hébreu traditionnel suppose un référent féminin) parmi les fils  : cf. Dt 32.5s ; Es 1.2n  ; l''épouse ou les filles n''avaient habituellement pas droit au patrimoine réservé aux fils (cf. Nb 27.4,7). –  et te donner  : autre traduction alors je t''ai donné… –  un pays de délices…  : cf. 12.10 ; Ml 3.12 ; Ps 106.24+ ; voir aussi Ex 3.8+ ; Ez 20.6 ; Dn 8.9 ; 11.16. –  le plus beau patrimoine  : texte incertain ; litt. un patrimoine, l''ornement des ornements  ; on pourrait lire aussi un patrimoine, la plus belle des armées des nations  ; cf. Am 6.1. –  Tu m''appelleras / tu ne te détourneras pas  : autre lecture traditionnelle vous m''appellerez / vous ne vous détournerez pas . –  Père v. 4n  ; 2.27 ; Es 63.16.'
  - type: text
    content: 'Moi, je me disais :'
  - type: text
    content: Comme je voudrais te compter parmi les fils
  - type: text
    content: et te donner un pays de délices,
  - type: text
    content: le plus beau patrimoine des nations !
  - type: text
    content: 'Je me disais :'
  - type: text
    content: Tu m'appelleras « Père »,
  - type: text
    content: et tu ne te détourneras pas de moi.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'les pistes des caravanes, dans le désert  ; autres traductions possible les crêtes, les coteaux pelés  ; cf. v. 21 ; 4.11 ; 7.29 ; 12.12 ; 14.6 ; Nb 23.3n  ; Es 41.18n  ; 49.9. –  profité de toi  : le verbe est aussi traduit par violer Dt 28.30 ; Es 13.16 ; Za 14.2. –  au bord des chemins  : cf. Gn 38.14 ; Ez 16.15,25 ; Pr 7.12. –  le Bédouin  : autre traduction l''Arabe  ; cf. Es 13.20n  ; LXX le corbeau . –  le pays ou la terre  ; cf. v. 1n.'
  - type: text
    content: 'Lève tes yeux vers les pistes, et regarde :'
  - type: text
    content: Où n'a-t-on pas profité de toi ?
  - type: text
    content: Tu t'es assise pour eux au bord des chemins,
  - type: text
    content: comme le Bédouin dans le désert,
  - type: text
    content: et tu as profané le pays
  - type: text
    content: par ta prostitution et par le mal que tu as fait.
  '20':
  - type: text
    content: ' '
  - type: note
    content: trahit v. 7n  ; 5.11.
  - type: text
    content: Mais, comme une femme qui trahit son compagnon,
  - type: text
    content: ainsi vous m'avez trahi, maison d'Israël !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'les pistes ( du désert étant sous-entendu) : cf. v. 2n  ; de même 7.29 ; 14.6 ; voir aussi 4.11 ; 12.12 où se trouve l''expression complète. –  les pleurs…  : on pourrait aussi comprendre des pleurs, des supplications pour les fils d''Israël 31.9,15,18 ; 50.4. –  ils ont rendu leur chemin tortueux , c.-à-d. ils se sont dévoyés ou fourvoyés  ; cf. v. 13n. –  ils ont oublié 2.32+.'
  - type: text
    content: 'Sur les pistes du désert on entend une rumeur :'
  - type: text
    content: ce sont les pleurs, les supplications des Israélites ;
  - type: text
    content: car ils ont rendu leur chemin tortueux,
  - type: text
    content: 'ils ont oublié le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Revenez / rebelles / infidélités  : cf. v. 12n,14n. –  je vous guérirai 30.17 ; 33.6 ; Es 30.26 ; Os 14.5. –  nous venons à toi  : texte incertain ; LXX nous sommes tes serviteurs , Syr nous sommes à toi.'
  - type: text
    content: Revenez, fils rebelles,
  - type: text
    content: je vous guérirai de vos infidélités.
  - type: text
    content: – Nous sommes là, nous venons à toi,
  - type: text
    content: 'car tu es le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'les collines…  : traduction incertaine, d''après LXX ; le mot traduit par tumulte signifie également multitude . Avec une légère modification du texte hébreu traditionnel, on pourrait aussi comprendre c''est pour le mensonge qu''on revient des collines et du tumulte des montagnes (cf. 4.1). En tout cas le texte fait probablement allusion aux fêtes des cultes idolâtriques 2.20n  ; cf. Ex 32.6,18 ; Nb 25.1-3 ; 1R 18.26-29 ; Es 65.7 ; Ez 6.2n  ; 36.1ss. –  dans le Seigneur … le salut Ps 3.9 ; cf. Es 43.3 ; 45.17.'
  - type: text
    content: Vraiment, les collines et le tumulte des montagnes ne sont que mensonge ;
  - type: text
    content: 'vraiment, c''est dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu,'
  - type: text
    content: qu'est le salut d'Israël.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'la Honte  : appellation souvent donnée aux idoles et aux dieux étrangers (notamment Baal) pour éviter de prononcer leur nom 11.13 ; cf. Os 2.19 ; 9.10. –  a dévoré… Dt 28.33. –  le produit du travail  : litt. la fatigue  ; cf. 20.5.'
  - type: text
    content: 'Depuis notre jeunesse, la Honte a dévoré le produit du travail de nos pères :'
  - type: text
    content: leur petit bétail et leur gros bétail,
  - type: text
    content: leurs fils et leurs filles.
  '25':
  - type: text
    content: ' '
  - type: note
    content: notre honte v. 24n  ; 22.22 ; Ps 44.16 ; Esd 9.6s. –  nous avons péché 8.14 ; 14.7,20. –  nous et nos pères Lv 26.40. –  depuis notre jeunesse 22.21 ; 31.19 ; 32.30. –  pas écouté le Seigneur (litt. la voix de YHWH )… v. 13 ; 7.26+ ; 22.21 ; 2R 18.12.
  - type: text
    content: Couchons donc dans notre honte,
  - type: text
    content: et que notre confusion nous recouvre !
  - type: text
    content: 'Car nous avons péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu,'
  - type: text
    content: nous et nos pères,
  - type: text
    content: depuis notre jeunesse jusqu'à ce jour ;
  - type: text
    content: 'nous n''avons pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: pluie 5.24s ; 14.4 ; Dt 28.24 ; Am 4.7. –  tu n'acceptais pas d'être confuse (v. 25 ; 14.3 ; 20.11 ; 22.22 ; 23.40 ; 31.19 ; 51.51) ; cf. 6.15 ; 8.12 ; voir aussi Ez 16.27n.
  - type: text
    content: Aussi les ondées ont-elles été retenues,
  - type: text
    content: il n'y a pas eu de pluie printanière ;
  - type: text
    content: mais tu avais le front d'une prostituée,
  - type: text
    content: tu n'acceptais pas d'être confuse.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Et maintenant  : litt. à partir de maintenant  ; certains modifient le texte hébreu traditionnel pour lire tu m''appelles « Ma demeure ». –  Père ! (litt. mon père ) v. 19 ; cf. 2.27 ; Ex 4.22 ; Dt 32.6 ; Os 2.1 ; 11.1 ; Ml 1.6. –  l''intime (ou le confident  ; le même terme est traduit par confiant en 11.19) de ma jeunesse  : cf. Pr 2.17 ; voir aussi Mi 7.5 ; Ps 55.14.'
  - type: text
    content: Et maintenant, n'est-ce pas,
  - type: text
    content: 'tu cries vers moi : Père !'
  - type: text
    content: Toi, l'intime de ma jeunesse !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Gardera-t-il…  : cf. v. 12 ; cf. 2.35 ; Es 57.16 ; 64.8 ; même expression en Lv 19.18 ; Na 1.2 ; Ps 103.9. –  ce que tu disais  : cf. Os 6.1nss ; en modifiant la vocalisation traditionnelle on pourrait comprendre ainsi tu as parlé et tu as agi, tu as fait du mal et tu as réussi (même verbe 20.7 tu l''as emporté ).'
  - type: text
    content: Gardera-t-il rancune pour toujours ?
  - type: text
    content: Tiendra-t-il rigueur à jamais ?
  - type: text
    content: – Voilà ce que tu disais,
  - type: text
    content: tout en faisant du mal ;
  - type: text
    content: et tu as réussi !
  - type: heading
    content: Israël l'infidèle et Juda la traîtresse
  '6':
  - type: text
    content: ' '
  - type: note
    content: Josias 1.2n. –  Israël désigne ici le royaume du Nord (v. 8n,11s) ; cf. Ez 16 ; 23. –  Elle est allée… 2.20n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit, aux jours du roi Josias : As-tu vu ce qu''a fait Israël l''infidèle ? Elle est allée sur toute montagne élevée et sous tout arbre verdoyant, et là elle s''est prostituée. '
  '7':
  - type: note
    content: elle reviendra 31.21 ; cf. v. 12+ ; Es 1.27n  ; 30.15 ; 31.6. – Cf. Na 3.6 ; Lc 13.1-5.
  - type: text
    content: 'Je me suis dit : Après avoir fait tout cela, elle reviendra à moi. Mais elle n''est pas revenue. Et sa sœur, Juda la traîtresse, l''a vu. '
  '8':
  - type: note
    content: 'j''aie répudié (cf. v. 1) : allusion à la chute de Samarie (722/1 av. J.-C.), capitale du royaume du Nord (v. 6n), et à l''exil de sa population (2R 17) ; cf. Es 50.1+. –  j''ai vu  : texte incertain ; plusieurs témoins anciens (un ms hébreu, des mss de LXX, Syr) ont lu quoiqu''elle ait vu que j''avais répudié Israël l''inconstante… Juda la traîtresse n''a pas eu de crainte.'
  - type: text
    content: 'Quoique j''aie répudié Israël l''infidèle à cause de tous ses adultères et que je lui aie donné son attestation de rupture, j''ai vu que sa sœur, Juda la traîtresse, n''a pas eu de crainte et qu''elle est allée se prostituer elle aussi. '
  '9':
  - type: note
    content: 'Par sa prostitution bruyante  : traduction incertaine (litt. par la voix [ou le bruit] de sa prostitution) ; des versions anciennes ont compris par la légèreté de sa prostitution, ce qui correspondrait à une autre racine hébraïque. –  Israël (litt. elle) a profané le pays  : avec une modification de la vocalisation traditionnelle du texte hébreu. D''après des versions anciennes, la lecture traditionnelle pourrait signifier le pays (ou la terre) a été profané ou elle (Israël) s''est profanée avec son pays (sa terre) ; cf. v. 1+. –  pierre / bois 2.27n.'
  - type: text
    content: 'Par sa prostitution bruyante, Israël a profané le pays, elle a commis l''adultère avec la pierre et le bois. '
