document_id: EZK.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem comme une enfant abandonnée
  - type: text
    content: ' '
  - type: note
    content: Cf. chap. 23 ; Es 1.21 ; Jr 2.2 ; 3.6-11 ; Os 1–3.
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: 'étoffe brodée  : le mot hébreu correspondant (également v. 13,18) évoque des couleurs chatoyantes en 17.3. –  de dauphin  : traduction incertaine (cf. Ex 25.5n) ; certains traduisent l''ensemble chaussée de cuir fin.'
  - type: text
    content: 'Je t''ai habillée d''étoffe brodée, chaussée de dauphin, drapée de fin lin, couverte de soie. '
  '11':
  - type: note
    content: 'ornements  : cf. v. 7n  ; voir aussi 23.42 ; Gn 24.47 ; Es 3.18-23.'
  - type: text
    content: 'Je te parai d''ornements : je mis des bracelets à tes mains, un collier à ton cou, '
  '12':
  - type: text
    content: 'je mis un anneau à ton nez, des boucles à tes oreilles et une couronne de splendeur sur ta tête. '
  '13':
  - type: note
    content: 'Tu mangeais…  : cf. v. 19 ; Dt 32.13s. –  digne de la royauté  : autre traduction et tu es parvenue à la royauté.'
  - type: text
    content: 'Ainsi tu fus parée d''or et d''argent et tu fus vêtue de fin lin, de soie et d''étoffe brodée. Tu mangeais de la fleur de farine, du miel et de l''huile. Tu devins de plus en plus belle, digne de la royauté. '
  '14':
  - type: note
    content: 'renommée  : le mot correspondant est habituellement traduit par nom  ; de même au v. 15. –  beauté… parfaite  : autre expression hébraïque qu''au v. 7n  ; voir Lm 2.15. –  dont je t''avais ornée  : cf. Os 2.10.'
  - type: text
    content: 'Ta renommée se répandit parmi les nations, à cause de ta beauté, car elle était parfaite, grâce à l''éclat dont je t''avais ornée – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: Jérusalem comme une prostituée
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'tu as mis ta confiance… 33.13 ; cf. Ps 13.6 ; 25.2 ; 26.1 ; 37.3-5. –  ta beauté v. 14,25. –  prostituée Os 1.2n. –  tu es devenue sa chose  : traduction d''après des versions anciennes (cf. v. 8 tu fus à moi ) ; le texte hébreu traditionnel (litt. qu''il soit à lui ) est obscur ; certains le modifient pour lire cela n''arrivera jamais , comme au v. 16.'
  - type: text
    content: 'Mais tu as mis ta confiance dans ta beauté et tu t''es prostituée, à la faveur de ta renommée. Tu as prodigué ta prostitution à chaque passant, tu es devenue sa chose. '
  '16':
  - type: note
    content: 'Cf. Jr 2.20. –  rien de semblable… n''arrivera jamais  : texte obscur et traduction conjecturale.'
  - type: text
    content: 'Tu as pris de tes vêtements, tu t''es fait des hauts lieux bariolés et tu t''y es prostituée : rien de semblable n''était arrivé et n''arrivera jamais. '
  '17':
  - type: note
    content: 'Cf. 7.20 ; Ex 32.2s ; Os 2.10. –  les bijoux (litt. les objets) de ta parure  ; autre traduction tes bijoux splendides  ; le terme correspondant à parure est traduit par splendeur au v. 12 (et en 23.42 ; 24.25) ; de même au v. 39 ; 23.26. –  des images masculines (litt. de mâle) : cf. Dt 4.16.'
  - type: text
    content: 'Tu as pris les bijoux de ta parure, l''or et l''argent que je t''avais donnés, et tu en as fait des images masculines, avec lesquelles tu t''es prostituée. '
  '18':
  - type: note
    content: tu les en as couverts Jr 10.9. –  mon huile (cf. Gn 28.18 ; Ex 27.20s ; Lv 6.14 ; Mi 6.7) et mon encens 23.41 ; Ex 30.7s ; cf. Os 2.7.
  - type: text
    content: 'Tu as pris tes vêtements brodés, tu les en as couverts et tu leur as offert mon huile et mon encens. '
  '19':
  - type: note
    content: 'V. 13 ; cf. Lv 2.11. –  Mon pain  : cf. 44.7+. –  odeur agréable 6.13+.'
  - type: text
    content: 'Mon pain que je t''avais donné, la fleur de farine, l''huile et le miel dont je te nourrissais, tu as présenté tout cela devant eux comme une offrande d''odeur agréable. Voilà ce qui est arrivé – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: Humain 2.1n. –  abominations 5.9+ ; cf. 20.4 ; 22.2s.
  - type: text
    content: 'Humain, fais connaître à Jérusalem ses abominations ! '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 20.25s ; 23.37 ; 2R 3.27 ; 16.3 ; 21.6 ; 23.10 ; Es 57.5 ; Jr 7.30s ; 19.5 ; 32.35.
  - type: text
    content: 'Tu as pris tes fils et tes filles, que tu m''avais donnés, et tu les leur as sacrifiés pour qu''ils les dévorent ! Ta prostitution ne te suffisait-elle pas ? '
  '21':
  - type: note
    content: 'par le feu  : ces mots ne sont pas dans le texte hébreu ; toutefois la formule traduite par en les faisant passer est une expression consacrée du rituel des sacrifices d''enfants ; cf. 20.26n,31n  ; 23.37 ; Lv 18.21n.'
  - type: text
    content: 'Tu as immolé mes fils et tu les leur as livrés, en les faisant passer par le feu. '
  '22':
  - type: note
    content: V. 6s ; Es 54.4.
  - type: text
    content: Avec toutes tes abominations et ta prostitution, tu ne t'es pas souvenue des jours de ta jeunesse, du temps où tu étais toute nue et où tu te débattais dans ton sang.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'le mal que tu avais fait  : litt. ton mal  ; cf. v. 57.'
  - type: text
    content: 'Après tout le mal que tu avais fait – quel malheur, quel malheur pour toi ! (déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ') – '
  '24':
  - type: note
    content: un cabanon, d'après des versions anciennes qui ont compris maison de prostitution (de même aux v. 31,39) ; autre traduction un tertre (synonyme de monticule) ; il s'agirait alors d'un haut lieu artificiel ; cf. Jr 11.13.
  - type: text
    content: 'tu t''es bâti un cabanon, tu as fait pour toi un monticule sur toutes les places ; '
  '25':
  - type: note
    content: 'V. 15. –  ton monticule  : un ms porte tes monticules. –  tu t''es offerte  : on pourrait traduire, plus littéralement, tu as écarté les jambes.'
  - type: text
    content: 'à l''entrée de chaque chemin tu as bâti ton monticule, tu as fait de ta beauté une abomination, tu t''es offerte à chaque passant, tu as multiplié ta prostitution. '
  '26':
  - type: note
    content: 'prostituée  : l''expression ne vise plus seulement ici la participation aux cultes idolâtriques (voir Os 1.2n) mais aussi les alliances politiques avec l''étranger, les deux étant du reste souvent liées (cf. 1R 11). –  Egyptiens 17.15 ; 20.8 ; 23.3,19 ; 29.6s,20 ; 2R 17.4 ; 18.21 ; Es 30.2,7 ; 31.1 ; Jr 2.18 ; 42.15 ; Os 7.11 ; 12.2. –  membre énorme  : litt. grands de chair, expression qui a été comprise comme un euphémisme sexuel inspiré de certaines représentations des dieux égyptiens ; cf. 23.20. –  en multipliant… Jr 3.1.'
  - type: text
    content: 'Tu t''es prostituée avec les Egyptiens, tes voisins au membre énorme, tu m''as contrarié en multipliant ta prostitution. '
  '27':
  - type: note
    content: 'J''ai étendu ma main 6.14+. –  ton patrimoine  : litt. ce qui était prescrit pour toi  ; on pourrait aussi traduire tes ressources  ; cf. 15.4n  ; Os 2.11. –  à l''appétit ou au désir  ; sur le terme hébreu correspondant, cf. Gn 1.20n  ; Pr 6.30n  ; voir aussi Ps 27.12. –  tes ennemies  : litt. celles qui te détestent  ; cf. v. 37. –  les filles (cf. v. 46) des Philistins  : ces derniers avaient réussi à annexer une partie du territoire de Juda, cf. 25.15-17 ; 2Ch 28.18. –  confuses v. 52,54,61,63 ; 32.24s,30 ; 36.32 ; 39.26 ; 43.10ss ; la racine hébraïque correspondante est habituellement employée de façon similaire à celle qui évoque la honte  ; dans un sens actif, elle peut aussi évoquer les insultes (cf. 34.29 ; 36.6-7n,15) ; Jr 3.3+. –  tes voies (ou ta conduite cf. v. 61) infâmes  : cf. v. 43+.'
  - type: text
    content: 'J''ai étendu ma main sur toi, j''ai diminué ton patrimoine, je t''ai livrée à l''appétit de tes ennemies, les filles des Philistins, qui étaient elles-mêmes confuses devant tes voies infâmes. '
  '28':
  - type: note
    content: 'Assyriens  : litt. fils de l''Assyrie  ; cf. 23.7,9,12,23 ; voir aussi 2R 15.19 ; 16.7-11 ; Os 5.13 ; 7.8-12 ; 8.8-10 ; 12.2.'
  - type: text
    content: 'Tu t''es prostituée avec les Assyriens, parce que tu n''étais pas rassasiée ; tu t''es prostituée avec eux et tu n''en as pas non plus été rassasiée. '
  '29':
  - type: note
    content: 'avec Canaan…  : on pourrait aussi traduire  : vers un pays de commerce (comme en 17.4), la Chaldée, c.-à-d. l''empire néo-babylonien ; cf. 11.24n  ; Es 23.8n.'
  - type: text
    content: Tu as multiplié ta prostitution avec Canaan, vers la Chaldée, et tu n'en as pas non plus été rassasiée.
  '3':
  - type: note
    content: 'Cf. v. 45 ; allusion aux origines cananéennes (plus précisément jébusites) de la ville de Jérusalem ; cf. Gn 15.19-21 ; Jos 3.10 ; 10.1-5 ; Jg 1.21 ; 19.10s ; 2S 5.6-10 ; voir aussi Dt 26.5. –  Voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 36,59). –  ta naissance  : autre traduction ta famille  ; cf. Gn 11.28n. –  de Canaan  : litt. du pays du Cananéen ou des Cananéens, cf. v. 29n  ; voir Gn 9.18n.'
  - type: text
    content: 'Tu diras : Voici ce que dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', à Jérusalem : Par ton origine et ta naissance tu es de Canaan ; ton père était un Amorite, et ta mère une Hittite. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Quelle faiblesse de cœur…  : traduction incertaine ; certains modifient le texte hébreu traditionnel pour lire Comme je suis rempli de fureur contre toi !'
  - type: text
    content: 'Quelle faiblesse de cœur tu as eue – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – en faisant toutes ces choses, qui sont l''œuvre d''une maîtresse prostituée ! '
  '31':
  - type: note
    content: cabanon / monticules v. 24n  ; cf. Es 57.7.
  - type: text
    content: 'Quand tu as bâti ton cabanon à l''entrée de chaque chemin et que tu as fait tes monticules sur toutes les places, tu n''étais même pas comme la prostituée : tu te moquais du salaire. '
  '32':
  - type: note
    content: 'reçoit des étrangers  : LXX reçoit des cadeaux  ; cf. v. 33. –  à la place de son mari  : sur cette expression, cf. 23.5n  ; Nb 5.19n.'
  - type: text
    content: 'La femme adultère reçoit des étrangers à la place de son mari. '
  '33':
  - type: note
    content: 'Os 8.9 ; cf. 2R 15.19 ; 16.8. –  dans ta prostitution  : autre traduction par ta prostitution.'
  - type: text
    content: 'A toutes les prostituées on donne un cadeau ; quant à toi, c''est toi qui as donné ton cadeau à tous tes amants : tu les as gagnés par des présents, afin de les attirer à toi, de toutes parts, dans ta prostitution. '
  '34':
  - type: note
    content: 'fait le contraire  : cf. Es 29.16n. –  on ne te recherchait pas  : litt. derrière toi on ne se prostituait pas. –  le contraire  : le même terme hébreu est traduit par perversité en Es 29.16.'
  - type: text
    content: 'Tu as fait le contraire des autres femmes dans ta prostitution : on ne te recherchait pas ; en donnant un salaire au lieu d''en recevoir un, tu as été le contraire.'
  '35':
  - type: text
    content: 'A cause de cela, prostituée, écoute la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '36':
  - type: note
    content: 'tes trésors ont été répandus  : traduction incertaine ; l''expression est sans doute à prendre comme une équivalence de ta nudité a été exposée, soit par métaphore (le substantif signifiant habituellement cuivre ou bronze, d''où monnaie et trésors), soit plus directement (rattaché à une autre racine, le même mot pourrait désigner le sexe féminin ou être un équivalent de prostitution) ; sur la nudité… exposée ou découverte  ; cf. 22.10+ ; 23.10,18,29. –  le sang de tes fils… v. 20s ; cf. Gn 4.10+.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que tes trésors ont été répandus, parce que ta nudité a été exposée dans ta prostitution avec tes amants et avec toutes tes idoles, toutes tes abominations, comme le sang de tes fils que tu leur as donnés, '
  '37':
  - type: note
    content: 'Cf. 23.10,22,29. –  tes amants v. 26-29. –  avec lesquels tu te plaisais  : autre traduction pour lesquels tu avais été (si) douce  ; certains modifient le texte traditionnel pour lire pour lesquels tu t''étais prise de passion (cf. 23.5ss). –  ceux que tu as détestés  : autre traduction ceux que tu n''as pas aimés  ; cf. Dt 21.15n. –  je leur exposerai… Jr 13.26 ; Na 3.5.'
  - type: text
    content: 'à cause de cela, je rassemble tous tes amants avec lesquels tu te plaisais, tous ceux que tu as aimés et tous ceux que tu as détestés ; je les rassemblerai de toutes parts contre toi, je leur exposerai ta nudité, et ils verront toute ta nudité. '
  '38':
  - type: note
    content: 'comme on juge…  : cf. 23.45. –  je te mettrai en sang…  : traduction incertaine ; en s''inspirant partiellement de LXX, quelques-uns modifient le texte hébreu traditionnel pour lire je répandrai sur toi la fureur et la passion jalouse.'
  - type: text
    content: 'Je te jugerai comme on juge les femmes adultères et celles qui répandent du sang, et je te mettrai en sang par la fureur et la passion jalouse. '
  '39':
  - type: note
    content: cabanon / monticules v. 24n. –  ils te dépouilleront… 23.26 ; cf. Ap 17.16. –  nue… v. 7s.
  - type: text
    content: 'Je te livrerai à eux ; ils raseront ton cabanon et démoliront tes monticules ; ils te dépouilleront de tes vêtements, prendront les bijoux de ta parure et te laisseront nue, entièrement nue. '
  '4':
  - type: note
    content: 'pour être purifiée  : sens incertain. –  frottée avec du sel…  : soins habituellement donnés aux nouveau-nés à l''époque.'
  - type: text
    content: 'A ta naissance, au jour où tu naquis, ton cordon n''a pas été coupé, tu n''as pas été lavée avec de l''eau pour être purifiée, tu n''as pas été frottée avec du sel, tu n''as pas été enveloppée dans des langes. '
  '40':
  - type: note
    content: Cf. 23.46-48.
  - type: text
    content: 'Ils lanceront une assemblée à l''assaut contre toi, ils te lapideront et te transperceront à coups d''épée ; '
  '41':
  - type: note
    content: 'exécuteront leurs jugements  : cf. 5.10n.'
  - type: text
    content: 'ils mettront le feu à tes maisons et ils exécuteront leurs jugements contre toi, sous les yeux d''une multitude de femmes. Je ferai cesser ta prostitution, et désormais tu ne donneras plus de salaires. '
  '42':
  - type: note
    content: 'Cf. 5.13n. –  tranquille  : c.-à-d. apaisé, calmé.'
  - type: text
    content: 'J''assouvirai ma fureur contre toi, et la jalousie de ma passion s''éloignera de toi. Je serai tranquille, je ne serai plus contrarié. '
  '43':
  - type: note
    content: 'tu t''es agitée contre moi  : certains modifient le texte hébreu traditionnel d''après des versions anciennes pour lire tu m''as irrité ou tu m''as troublé (même forme 1S 28.15 ; Jb 12.6). –  ta voie ou ta conduite, cf. v. 27n,47,61 ; 9.10. –  sur ta tête  : litt. sur la tête. –  N''as-tu pas commis…  : l''interrogation n''est pas indiquée en hébreu (de même au v. 56) ; on pourrait aussi traduire comme si tu n''avais pas commis… ! –  infamie  : cf. v. 27.'
  - type: text
    content: 'Parce que tu ne t''es pas souvenue des jours de ta jeunesse, parce que par tout cela tu t''es agitée contre moi, eh bien, à mon tour, moi, je fais retomber ta voie sur ta tête – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: . N'as-tu pas commis l'infamie par-dessus toutes tes abominations ?
  - type: heading
    content: Jérusalem pire que les autres cités
  '44':
  - type: text
    content: 'Tout faiseur de maximes t''appliquera cette maxime : « Telle mère, telle fille ! » '
  '45':
  - type: note
    content: 'de tes sœurs  : d''après certains mss hébreux et des versions anciennes ; texte hébreu traditionnel de ta sœur. –  leurs enfants v. 20. –  Votre mère… v. 3n.'
  - type: text
    content: 'Tu es bien la fille de ta mère, qui a eu en aversion son mari et ses enfants ; tu es bien la sœur de tes sœurs, qui ont eu en aversion leurs maris et leurs enfants. Votre mère était une Hittite, et votre père un Amorite. '
  '46':
  - type: note
    content: 'Cf. v. 55. –  à ta gauche, c.-à-d. au nord ; cf. 4.4n. –  Samarie  : capitale du royaume israélite du Nord, tombée devant les Assyriens en 722/1 av. J.-C. ; voir 4.5n  ; 2R 17. –  ses filles  : c''est ainsi qu''on appelait les localités qui dépendaient d''une ville fortifiée ; cf. Nb 21.25n  ; Jos 15.45n. –  à ta droite  : au sud, cf. 47.1. –  Sodome  : cf. Gn 18.16–19.29 ; Es 1.9+.'
  - type: text
    content: 'Ta grande sœur, qui habite à ta gauche, c''est Samarie avec ses filles et ta petite sœur qui habite à ta droite, c''est Sodome avec ses filles. '
  '47':
  - type: note
    content: 'Cf. v. 52 ; 5.6 ; 23.11 ; Lm 4.6 ; voir aussi Mt 10.15 ; 11.24. –  cela ne te suffisait pas  : traduction incertaine (cf. v. 20) ; on pourrait aussi comprendre  : tu es vite devenue plus pervertie ou, moins bien en contexte, tu es presque devenue plus pervertie.'
  - type: text
    content: 'Tu n''as pas seulement suivi leurs voies, commis les mêmes abominations, cela ne te suffisait pas ; tu as été plus pervertie qu''elles dans toutes tes voies. '
  '48':
  - type: note
    content: Par ma vie 5.11n.
  - type: text
    content: 'Par ma vie, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – Sodome, ta sœur, et ses filles n''ont pas fait ce que vous avez fait, toi et tes filles. '
  '49':
  - type: note
    content: 'orgueil  : cf. Siracide 16.8 : « Il n''a pas épargné la ville de Loth dont il avait l''orgueil en abomination. » Voir aussi Ab 3s (le site de Sodome appartenait au territoire d''Edom). –  du pain à satiété  : cf. Dt 8.10-20. –  elle ne faisait rien…  : litt. elle ne fortifiait pas la main du pauvre…  ; cf. 13.22n  ; voir aussi Es 1.17.'
  - type: text
    content: 'Voici quelle a été la faute de Sodome, ta sœur : elle avait de l''orgueil, du pain à satiété, une insouciante tranquillité, elle et ses filles, et elle ne faisait rien pour redonner courage au pauvre et au déshérité. '
  '5':
  - type: note
    content: 'Personne n''a… pitié  : litt. (aucun) œil n''a eu pitié de toi  ; cf. 5.11+ ; 20.17. –  dans les champs  : cf. Dt 32.10 ; Jr 31.2 ; Os 2.10 ; l''abandon des enfants, en particulier des filles, était, semble-t-il, chose assez courante dans le Proche-Orient ancien. –  on t''avait…  : litt. on avait ton être… (cf. Gn 1.20n).'
  - type: text
    content: Personne n'a porté sur toi un regard de pitié pour te faire une seule de ces choses, pour t'épargner ; tu as été jetée dans les champs, le jour de ta naissance, parce qu'on t'avait en aversion.
  '50':
  - type: note
    content: 'Elles se sont enhardies  : autre traduction elles sont devenues hautaines (cf. 2Ch 17.6n). –  Quand j''ai vu cela  : certains mss hébreux et des versions anciennes portent comme tu as vu.'
  - type: text
    content: 'Elles se sont enhardies et elles ont commis des abominations devant moi. Quand j''ai vu cela, je les ai supprimées. '
  '51':
  - type: note
    content: 'que les siennes, d''après certains mss ; autre lecture traditionnelle que les leurs. –  tu as justifié  : cf. Jr 3.11. –  tes sœurs, d''après certains mss hébreux et des versions anciennes ; autre lecture ta sœur  ; cf. v. 45n.'
  - type: text
    content: 'Quant à Samarie, elle n''a pas commis la moitié de tes péchés ; tes abominations ont été plus nombreuses que les siennes, et tu as justifié tes sœurs par toutes les abominations que tu as faites. '
  '52':
  - type: note
    content: 'Toi qui condamnais v. 56 ; cf. Ex 21.22n  ; autre traduction toi qui as innocenté tes sœurs (à cause de tes propres péchés…). –  sois… chargée de  : cf. 4.4n. –  confusion v. 27+ ; 34.29n. –  plus abominable qu''elles v. 47+.'
  - type: text
    content: Toi qui condamnais tes sœurs, sois à ton tour chargée de ta confusion, à cause de tes péchés, par lesquels tu t'es rendue plus abominable qu'elles et qui les rendent plus justes que toi. Aie honte à ton tour, sois chargée de ta confusion, puisque tu as justifié tes sœurs.
  '53':
  - type: text
    content: ' '
  - type: note
    content: 'Je rétablirai leur situation  : la formule évoque partout ailleurs le retour à une situation heureuse ; cf. 29.14 ; 39.25 ; voir aussi Dt 30.3n  ; Jr 29.14n  ; 30.3 ; Am 9.14 ; Ps 85.2s. La dernière occurrence de l''expression ( je rétablirai ta situation ) suppose une légère modification du texte hébreu traditionnel, obscur, d''après des versions anciennes.'
  - type: text
    content: 'Je rétablirai leur situation, celle de Sodome et de ses filles, celle de Samarie et de ses filles, et je rétablirai ta situation au milieu d''elles, '
  '54':
  - type: note
    content: 'consolation  : cf. 14.22+.'
  - type: text
    content: 'afin que tu sois chargée de ta confusion, que tu sois confuse de tout ce que tu as fait, en étant pour elles un sujet de consolation. '
  '55':
  - type: note
    content: 'V. 46. –  reviendront à leur premier état  : autre traduction reviendront comme au temps jadis  ; formule analogue en 36.11.'
  - type: text
    content: 'Tes sœurs, Sodome et ses filles, reviendront à leur premier état, Samarie et ses filles reviendront à leur premier état ; et toi et tes filles, vous reviendrez à votre premier état. '
  '56':
  - type: note
    content: ne faisait-elle pas… ? cf. v. 43n,52 ; voir Es 1.9+ ; Rm 2.1.
  - type: text
    content: 'Ta bouche ne faisait-elle pas entendre des rumeurs sur ta sœur Sodome quand tu t''enorgueillissais, '
  '57':
  - type: note
    content: 'ton mal  : cf. v. 23n. –  lorsque tu as été…  : traduction incertaine : certains comprennent  : aussi c''est le temps pour toi d''être outragée…  ; d''après des versions anciennes, d''autres modifient le texte hébreu pour lire comme elle (Sodome), tu es maintenant outragée… –  les filles d''Aram  : les Syriens (cf. 2R 24.2) ; de nombreux mss hébreux portent les filles d''Edom (les deux noms se ressemblent beaucoup en hébreu) ; voir 25.12-14 ; 35.1-15 ; Ab 8-15. –  filles des Philistins v. 27n.'
  - type: text
    content: 'avant que ton mal soit mis à découvert, lorsque tu as été outragée par les filles d''Aram et de tous ses alentours, et par les filles des Philistins qui te méprisaient de tous côtés ? '
  '58':
  - type: note
    content: 23.35,49.
  - type: text
    content: 'Tu es chargée de ton infamie et de tes abominations – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '59':
  - type: text
    content: ' '
  - type: note
    content: 'l''adjuration  : autre traduction la malédiction (voir bénédiction, malédiction) ; le terme évoque la malédiction conditionnelle qui est censée s''accomplir en cas de rupture de l’ alliance (v. 8) ; cf. 17.13,16ss ; Gn 24.41n  ; Lv 5.1n  ; Nb 5.21n  ; Dt 29.11n  ; 1R 8.31n.'
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : J''agirai envers toi comme tu as agi, toi qui as méprisé l''adjuration en rompant l''alliance. '
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'te débattre  : forme réfléchie d''un verbe qui signifie habituellement piétiner, fouler au pieds et qui rappelle l''ancien nom de Jérusalem, Jébus (cf. v. 3n), de même au v. 22. –  je te dis…  : la répétition est absente de plusieurs mss hébreux et de versions anciennes ; autre traduction je te dis, alors que tu étais dans ton sang : vis !  ; cf. Lv 12.'
  - type: text
    content: 'Je passai près de toi, je t''aperçus en train de te débattre dans ton sang et je te dis : Vis dans ton sang ! Je te dis : Vis dans ton sang ! '
  '60':
  - type: note
    content: 'l''alliance que j''ai faite avec toi  : litt. mon alliance avec toi. –  alliance perpétuelle 37.26 ; Es 24.5n  ; 55.3 ; Jr 50.5 ; Hé 13.20 ; cf. Jr 31.31-34 ; Os 2.16-25.'
  - type: text
    content: 'Mais moi, je me souviendrai de l''alliance que j''ai faite avec toi aux jours de ta jeunesse et j''établirai pour toi une alliance perpétuelle. '
  '61':
  - type: note
    content: 'Tu te souviendras… 36.31. –  tes voies  : cf. v. 27n,43. –  tes sœurs… filles  : cf. v. 46n. –  pas en vertu de ton alliance  : autre traduction sans qu''elles soient de ton alliance  ; cf. Za 2.16.'
  - type: text
    content: 'Tu te souviendras de tes voies et tu en seras confuse, quand tu recevras tes sœurs, les grandes et les petites ; je te les donnerai pour filles, mais ce ne sera pas en vertu de ton alliance. '
  '62':
  - type: note
    content: tu sauras 6.7+.
  - type: text
    content: 'Moi, j''établirai mon alliance avec toi, et ainsi tu sauras que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), '
  '63':
  - type: note
    content: 'que tu n''ouvres plus la bouche  : cf. Es 52.15 ; Jb 5.16 ; 21.5 ; 40.4 ; Rm 3.19. – Voir expiation.'
  - type: text
    content: 'afin que tu te souviennes, que tu aies honte et que tu n''ouvres plus la bouche en raison de ta confusion, quand je ferai pour toi l''expiation de tout ce que tu as fait – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '7':
  - type: note
    content: 'Je t''ai multipliée par dix mille  : LXX a lu un impératif qui serait à rattacher au v. 6  : vis (7) et multiplie-toi…, c.-à-d. grandis (même verbe pour tu t''es développée) ; cf. Ex 1.7. –  tu devins d''une beauté parfaite, litt. tu entras dans l''ornement des ornements (même mot au v. 11 ; cf. v. 14n  ; sur cette tournure superlative voir Ct 1.1n) ; certains proposent de modifier légèrement le texte pour lire tu entras dans le temps des règles, comme en Es 64.5n. –  ta chevelure poussa  : autre traduction tes poils poussèrent. –  nue, entièrement nue v. 22 ; cf. Os 2.5.'
  - type: text
    content: 'Je t''ai multipliée par dix mille, comme les pousses des champs. Et tu t''es développée. Tu grandis, tu devins d''une beauté parfaite ; tes seins se formèrent, ta chevelure poussa. Mais tu étais nue, entièrement nue. '
  '8':
  - type: note
    content: 'le pan de mon vêtement  : le même mot signifie également aile  ; cf. Dt 32.11 ; l''expression signifie épouser  ; cf. Dt 23.1 ; Rt 3.9n. –  je contractai (litt. j''entrai dans) une alliance v. 60ss ; cf. Es 54.4-8 ; Jr 2.2 ; voir aussi Ml 2.14 ; Pr 2.17.'
  - type: text
    content: 'Je passai près de toi et je te regardai : c''était ton temps, le temps des amours. J''étendis sur toi le pan de mon vêtement, je couvris ta nudité, je te fis un serment, je contractai une alliance avec toi – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – et ainsi tu m''appartins.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'rincé  : comme en Lv 15.11s ; cf. Ep 5.26. –  parfumée ou frottée d''huile Dt 28.40n  ; 2S 14.2 ; cf. Os 2.7,10 ; Am 6.6.'
  - type: text
    content: 'Je t''ai lavée avec de l''eau, j''ai rincé le sang qui était sur toi et je t''ai parfumée. '
