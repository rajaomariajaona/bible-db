    text: 'Tu es bien la fille de ta mère, qui a eu en aversion son mari et ses enfants ; tu es bien la sœur de tes sœurs, qui ont eu en aversion leurs maris et leurs enfants. Votre mère était une Hittite, et votre père un Amorite. '
