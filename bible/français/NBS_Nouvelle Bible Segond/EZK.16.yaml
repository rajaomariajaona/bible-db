document_id: EZK.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérusalem comme une enfant abandonnée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. chap. 23 ; Es 1.21 ; Jr 2.2 ; 3.6-11 ; Os 1–3.
    marker-yv: yv-n
  - type: text
    text: 'La parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me parvint :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Humain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abominations '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.9+ ; cf. 20.4 ; 22.2s.
    marker-yv: yv-n
  - type: text
    text: 'Humain, fais connaître à Jérusalem ses abominations ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 45 ; allusion aux origines cananéennes (plus précisément jébusites) de la ville de Jérusalem ; cf. Gn 15.19-21 ; Jos 3.10 ; 10.1-5 ; Jg 1.21 ; 19.10s ; 2S 5.6-10 ; voir aussi Dt 26.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Voici ce que dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la formule correspondante est habituellement traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ainsi parle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(p. ex. v. 36,59). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ta naissance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ta famille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 11.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de Canaan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'du pays du Cananéen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des Cananéens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir Gn 9.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu diras : Voici ce que dit le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: ', à Jérusalem : Par ton origine et ta naissance tu es de Canaan ; ton père était un Amorite, et ta mère une Hittite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour être '
      - type: usfm
        marker: w
        children:
        - type: text
          text: purifiée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sens incertain. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: frottée avec du sel…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : soins habituellement donnés aux nouveau-nés à l''époque.'
    marker-yv: yv-n
  - type: text
    text: 'A ta naissance, au jour où tu naquis, ton cordon n''a pas été coupé, tu n''as pas été lavée avec de l''eau pour être purifiée, tu n''as pas été frottée avec du sel, tu n''as pas été enveloppée dans des langes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Personne n'a… pitié
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (aucun) œil n'a eu pitié de toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 5.11+ ; 20.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans les champs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 32.10 ; Jr 31.2 ; Os 2.10 ; l''abandon des enfants, en particulier des filles, était, semble-t-il, chose assez courante dans le Proche-Orient ancien. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on t'avait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on avait ton être… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Gn 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: Personne n'a porté sur toi un regard de pitié pour te faire une seule de ces choses, pour t'épargner ; tu as été jetée dans les champs, le jour de ta naissance, parce qu'on t'avait en aversion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: te débattre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : forme réfléchie d''un verbe qui signifie habituellement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'piétiner, fouler au pieds '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: et qui rappelle l'ancien nom de Jérusalem, Jébus (cf. v. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), de même au v. 22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je te dis…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la répétition est absente de plusieurs mss hébreux et de versions anciennes ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je te dis, alors que tu étais dans ton sang : vis !'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Lv 12.
    marker-yv: yv-n
  - type: text
    text: 'Je passai près de toi, je t''aperçus en train de te débattre dans ton sang et je te dis : Vis dans ton sang ! Je te dis : Vis dans ton sang ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je t'ai multipliée par dix mille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a lu un impératif qui serait à rattacher au v. 6'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vis (7) et multiplie-toi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. grandis (même verbe pour '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu t'es développée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; cf. Ex 1.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu devins d'une beauté parfaite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu entras dans l''ornement des ornements '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même mot au v. 11 ; cf. v. 14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; sur cette tournure superlative voir Ct 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; certains proposent de modifier légèrement le texte pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu entras dans le temps des règles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en Es 64.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ta chevelure poussa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tes poils poussèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nue, entièrement nue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 22 ; cf. Os 2.5.
    marker-yv: yv-n
  - type: text
    text: 'Je t''ai multipliée par dix mille, comme les pousses des champs. Et tu t''es développée. Tu grandis, tu devins d''une beauté parfaite ; tes seins se formèrent, ta chevelure poussa. Mais tu étais nue, entièrement nue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le pan de mon vêtement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot signifie également '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aile
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 32.11 ; l''expression signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: épouser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 23.1 ; Rt 3.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je contractai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j'entrai dans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une '
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 60ss ; cf. Es 54.4-8 ; Jr 2.2 ; voir aussi Ml 2.14 ; Pr 2.17.
    marker-yv: yv-n
  - type: text
    text: 'Je passai près de toi et je te regardai : c''était ton temps, le temps des amours. J''étendis sur toi le pan de mon vêtement, je couvris ta nudité, je te fis un serment, je contractai une alliance avec toi – déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  – et ainsi tu m''appartins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rincé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : comme en Lv 15.11s ; cf. Ep 5.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parfumée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'frottée d''huile '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 28.40
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2S 14.2 ; cf. Os 2.7,10 ; Am 6.6.'
    marker-yv: yv-n
  - type: text
    text: 'Je t''ai lavée avec de l''eau, j''ai rincé le sang qui était sur toi et je t''ai parfumée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: étoffe brodée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu correspondant (également v. 13,18) évoque des couleurs '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chatoyantes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 17.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de dauphin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine (cf. Ex 25.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; certains traduisent l''ensemble '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chaussée de cuir fin.
    marker-yv: yv-n
  - type: text
    text: 'Je t''ai habillée d''étoffe brodée, chaussée de dauphin, drapée de fin lin, couverte de soie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ornements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 23.42 ; Gn 24.47 ; Es 3.18-23.'
    marker-yv: yv-n
  - type: text
    text: 'Je te parai d''ornements : je mis des bracelets à tes mains, un collier à ton cou, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'je mis un anneau à ton nez, des boucles à tes oreilles et une couronne de splendeur sur ta tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu mangeais…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 19 ; Dt 32.13s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: digne de la royauté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et tu es parvenue à la royauté.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi tu fus parée d''or et d''argent et tu fus vêtue de fin lin, de soie et d''étoffe brodée. Tu mangeais de la fleur de farine, du miel et de l''huile. Tu devins de plus en plus belle, digne de la royauté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: renommée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot correspondant est habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même au v. 15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: beauté… parfaite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre expression hébraïque qu''au v. 7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir Lm 2.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dont je t'avais ornée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Os 2.10.'
    marker-yv: yv-n
  - type: text
    text: 'Ta renommée se répandit parmi les nations, à cause de ta beauté, car elle était parfaite, grâce à l''éclat dont je t''avais ornée – déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérusalem comme une prostituée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
