  - type: text
    text: 'Voici quelle a été la faute de Sodome, ta sœur : elle avait de l''orgueil, du pain à satiété, une insouciante tranquillité, elle et ses filles, et elle ne faisait rien pour redonner courage au pauvre et au déshérité. '
