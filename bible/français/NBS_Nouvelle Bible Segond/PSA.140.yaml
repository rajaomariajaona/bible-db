document_id: PSA.140,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'un homme en fuite
  - type: text
    content: Du chef de chœur. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Certains modifient le texte hébreu traditionnel pour lire, en reliant les v. 9 et 10  : de peur que ceux qui me méprisent tout autour ne relèvent la tête (cf. 27.6)  ; que le malheur préparé par leurs lèvres (Pr 12.13) les recouvre ! cf. Ps 7.15n,17.'
  - type: text
    content: Que sur la tête de ceux qui m'entourent
  - type: text
    content: retombe le malheur préparé par leurs lèvres !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'braises 11.6 ; 120.4 ; Gn 19.24 ; Pr 25.22. –  se déversent  : litt. vacillent ou tombent  ; certains modifient le texte hébreu traditionnel pour lire pleuvent. –  Qu''on les fasse tomber ou qu''il les fasse tomber  ; des versions anciennes ont lu tu les feras tomber.'
  - type: text
    content: Que des braises se déversent sur eux !
  - type: text
    content: Qu'on les fasse tomber dans le feu,
  - type: text
    content: dans des fondrières, d'où ils ne se relèveront plus !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Le beau parleur  : litt. l''homme de langue. –  sans répit ou de ses coups , texte et traduction incertains.'
  - type: text
    content: Le beau parleur ne s'affermira pas sur la terre ;
  - type: text
    content: l'homme violent, le malheur le pourchassera sans répit.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 146.7 ; cf. 9.5,19 ; 34.7 ; 72.4 ; Jb 36.6. – Voir justice.
  - type: text
    content: 'Je sais que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rend justice aux pauvres'
  - type: text
    content: et qu'il défend le droit des déshérités.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '30.5. – Voir nom. –  les gens droits  : litt. les droits. –  habiteront en ta présence  : cf. 11.7 ; 23.6 ; 25.13 ; 27.4 ; 37.9,11.'
  - type: text
    content: Oui, les justes célébreront ton nom,
  - type: text
    content: les gens droits habiteront en ta présence.
  '2':
  - type: text
    content: ' '
  - type: note
    content: V. 5 ; 18.49 ; 43.1 ; 2Th 3.2.
  - type: text
    content: Seigneur
  - type: text
    content: ', délivre-moi de l''homme mauvais !'
  - type: text
    content: Préserve-moi de l'homme violent !
  '3':
  - type: text
    content: ' '
  - type: note
    content: '21.12 ; 41.8ss ; 56.6 ; 120.7. – Voir cœur. –  sans cesse  : litt. tout le jour . –  complotent…  : traduction incertaine ; beaucoup modifient la vocalisation traditionnelle pour lire excitent les guerres  ; cf. Pr 15.18 ; 28.25 ; 29.22.'
  - type: text
    content: Ils préparent des plans malveillants dans leur cœur
  - type: text
    content: et sans cesse ils complotent la guerre !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 10.7 ; 58.5 ; Jb 20.16 ; Rm 3.13  ; Jc 3.8. –  vipère  : traduction incertaine, d''après plusieurs versions anciennes ; texte de Qumrân, Tg  : araignée.'
  - type: text
    content: Ils aiguisent leur langue comme un serpent,
  - type: text
    content: 'ils ont sous leurs lèvres un venin de vipère. '
  - type: text
    content: Pause.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'V. 2+. –  qui préparent ma chute  : litt. qui pensent à renverser mes pas , c.-à-d. qui cherchent à me faire trébucher dans ma marche.'
  - type: text
    content: Seigneur
  - type: text
    content: ', préserve-moi des mains du méchant !'
  - type: text
    content: Garde-moi des hommes violents
  - type: text
    content: qui préparent ma chute !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'tendent  : litt. cachent  ; cf. 9.16 ; 35.7 ; 64.6 ; 141.9 ; 142.4 ; Jb 18.10.'
  - type: text
    content: Des orgueilleux me tendent un piège et préparent des liens pour moi,
  - type: text
    content: ils placent des filets le long du sentier,
  - type: text
    content: 'ils installent des traquenards pour moi. '
  - type: text
    content: Pause.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Je dis… 16.2 ; 31.15 ; cf. 22.11+. –  Dieu  : hébreu ’El , cf. Gn 21.33n. –  prête l''oreille 17.6n. –  mes supplications 28.2n  ; cf. 141.1 ; 142.6s.'
  - type: text
    content: 'Je dis au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Tu es mon Dieu !'
  - type: text
    content: Seigneur
  - type: text
    content: ', prête l''oreille à mes supplications !'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Tu couvres ma tête pour la protéger. –  au jour où l''on prend les armes  : litt. au jour des armes (même terme en Jb 20.24 ; 39.21 ; cf. Né 3.19n), c.-à-d. au jour du combat.'
  - type: text
    content: Dieu
  - type: text
    content: ', Seigneur, force de mon salut !'
  - type: text
    content: Tu couvres ma tête au jour où l'on prend les armes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'de peur qu''il ne s''élève  : texte obscur ; le verbe hébreu est au pluriel ; cf. v. 10n.'
  - type: text
    content: Seigneur
  - type: text
    content: ', n''accorde pas au méchant ce qu''il désire,'
  - type: text
    content: 'ne fais pas aboutir ses projets, de peur qu''il ne s''élève ! '
  - type: text
    content: Pause.
