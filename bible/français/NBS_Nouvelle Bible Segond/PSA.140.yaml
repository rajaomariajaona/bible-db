        children:
        - type: text
          text: ' : texte obscur ; le verbe hébreu est au pluriel ; cf. v. 10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', n''accorde pas au méchant ce qu''il désire,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ne fais pas aboutir ses projets, de peur qu''il ne s''élève ! '
