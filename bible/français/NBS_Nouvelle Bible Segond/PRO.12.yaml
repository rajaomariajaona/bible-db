document_id: PRO.12,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'On pourrait aussi comprendre  : celui qui aime la connaissance aime être instruit (ou corrigé )  ; celui qui est bête déteste les avertissements . –  instruction ou correction 1.2n  ; cf. 10.17 ; 13.18 ; 15.5. –  avertissements 1.23n  ; cf. Siracide 21.6 : « Qui déteste la remontrance suit les traces du pécheur ; mais qui craint le Seigneur se repentira dans son cœur. »'
  - type: text
    content: Celui qui aime l'instruction aime la connaissance ;
  - type: text
    content: celui qui déteste les avertissements est bête.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'prend soin… bêtes  : litt. connaît la vie (sur le terme hébreu correspondant, voir Gn 1.20n) de sa bête  ; cf. 27.23 ; Dt 25.4 ; Siracide 7.22 : « As-tu des troupeaux ? Surveille-les. Si tu en tires profit, conserve-les. » –  les entrailles  : autre traduction les sentiments  ; le terme est habituellement traduit par compassion  ; cf. Gn 43.14.'
  - type: text
    content: Le juste prend soin de ses bêtes ;
  - type: text
    content: les entrailles des méchants sont cruelles.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui… 28.19. –  sa terre Gn 2.5n. –  des chimères  : litt. des (choses) vides . –  dépourvu de raison 6.32n.'
  - type: text
    content: Celui qui cultive sa terre est rassasié de pain ;
  - type: text
    content: celui qui poursuit des chimères est dépourvu de raison.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Le méchant convoite…  : en modifiant légèrement le texte, certains ont compris les fondations des mauvais seront dévastées ou encore la convoitise agite le filet des mauvais . –  donne ( du fruit  ?) : LXX est dans une forteresse (ou dans un sol ferme ).'
  - type: text
    content: Le méchant convoite le coup de filet des mauvais ;
  - type: text
    content: la racine des justes donne.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 24.16. –  l''offense  : autre traduction la transgression  ; cf. 10.12n. –  un piège pernicieux  : autre traduction un piège pour l''individu mauvais  ; LXX le pécheur est pris au piège  ; cf. 10.14,19 ; 18.7.'
  - type: text
    content: Il y a dans l'offense des lèvres un piège pernicieux ;
  - type: text
    content: le juste peut sortir de la détresse.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Par le fruit de sa bouche  : c.-à-d. par ses paroles 13.2 ; 18.20-21. –  on / chacun  : l''hébreu emploie deux termes qui désignent l''homme  ; certains y voient une opposition l''un est rassasié… à l''autre il revient… –  selon l''œuvre de ses mains  : autre traduction ce que lui ont mérité ses mains  ; cf. Lc 6.37s.'
  - type: text
    content: Par le fruit de sa bouche on est rassasié de bonnes choses ;
  - type: text
    content: à chacun il revient selon l'œuvre de ses mains.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'L''imbécile (1.7n) estime…  : litt. la voie de l''imbécile est droite à ses yeux  ; autre traduction la voie de l''imbécile lui convient toujours  ; cf. 14.12 ; 16.25 ; 21.2 ; voir aussi 3.7 ; 26.12,16. –  conseils 1.25n.'
  - type: text
    content: L'imbécile estime que sa voie est la bonne ;
  - type: text
    content: celui qui écoute les conseils est sage.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'L''imbécile…  : litt. l''imbécile, le jour même, sa contrariété est connue . –  couvre l''outrage ou cache (cf. v. 23) un outrage  ; le terme hébreu traduit par outrage peut aussi signifier mépris (verbe apparenté au v. 9 ; cf. 3.35+) ; voir aussi 29.11 ; 2S 13.20ss,32. –  avisé  : cf. v. 23 ; 1.4n.'
  - type: text
    content: L'imbécile laisse voir à l'instant même sa contrariété ;
  - type: text
    content: celui qui couvre l'outrage est avisé.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'qui dépose  : le verbe, traduit par proférer en 6.19n, s''applique sans doute ici à la déposition du témoin . –  probité v. 22 ; 13.17n. –  fait un rapport juste…  : litt. dit (ou rapporte ) la justice, mais le faux témoin, la tromperie.'
  - type: text
    content: Celui qui dépose avec probité fait un rapport juste ;
  - type: text
    content: le faux témoin trompe.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'la langue…  : cf. 15.4 ; 16.27 ; Ps 57.5 ; 59.8.'
  - type: text
    content: Tel, qui bavarde à la légère, blesse comme une épée ;
  - type: text
    content: la langue des sages guérit.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'loyale  : litt. de loyauté ou de vérité . –  langue menteuse 6.17+.'
  - type: text
    content: La lèvre loyale subsiste à jamais ;
  - type: text
    content: la langue menteuse ne dure qu'un instant.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'la faveur 11.27n. –  intrigues  : le même terme est traduit par réflexion en 1.4+ ; cf. 14.17 ; 24.8. –  il le condamne  : autre traduction il le déclare méchant (cf. Dt 25.1n  ; Jb 9.20n). Le sujet du verbe, sous-entendu, peut être le Seigneur ou l’ homme de bien.'
  - type: text
    content: 'L''homme de bien obtient la faveur du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: l'homme d'intrigues, il le condamne.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'qui font des projets de paix  : autres traductions qui conseillent la paix ; qui font des projets de bonheur  ; cf. Mt 5.9.'
  - type: text
    content: La tromperie est dans le cœur de ceux qui trament le mal ;
  - type: text
    content: la joie est pour ceux qui font des projets de paix.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. 11.21 ; Ps 91.10.
  - type: text
    content: Rien de mauvais n'arrive au juste ;
  - type: text
    content: les méchants sont comblés de maux.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'lèvres menteuses…  : cf. 6.12 ; 10.18 ; 11.20 ; 17.7 ; Siracide 20.24 : « C''est une tache honteuse sur un homme que le mensonge ; il se trouve continuellement dans la bouche des imbéciles. »'
  - type: text
    content: 'Les lèvres menteuses sont une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: ceux qui agissent avec probité ont sa faveur.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Instruction d''Aménémopé 22.15s : « Mieux vaut un homme qui garde son discours pour lui (litt. “dans son ventre”) que celui qui le proclame au risque de faire du tort. » –  homme avisé v. 16 ; 1.4n. –  couvre la connaissance  : peut-être au sens de cache son savoir  ; d''autres comprennent, au contraire, expose son savoir . –  stupides 1.22+.'
  - type: text
    content: L'homme avisé couvre la connaissance ;
  - type: text
    content: le cœur des gens stupides clame l'imbécillité.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'gouverne  : autres traductions dirige ; domine . –  la main nonchalante  : litt. le nonchalant  ; cf. v. 27 ; 29.15 ; voir aussi 6.6+.'
  - type: text
    content: La main des hommes actifs gouverne ;
  - type: text
    content: la main nonchalante est astreinte à la corvée.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Y a-t-il…  : autre traduction l''inquiétude dans le cœur de l''homme l''accable, mais une bonne parole le réjouit . – Les termes hébreux correspondant à il la réprime et la change en joie font assonance ; cf. 15.13.'
  - type: text
    content: Y a-t-il de l'inquiétude au cœur de l'homme, il la réprime ;
  - type: text
    content: une bonne parole la change en joie.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Le juste est un guide…  : texte douteux et sens incertain. La forme verbale correspondante est unique dans toute la Bible, mais on s''accorde généralement à la faire dériver d''un verbe signifiant explorer (Nb 10.33n  ; 13.2 etc.). Certains comprennent cependant le juste l''emporte sur son prochain  ; d''autres modifient le texte hébreu traditionnel pour lire le juste trouve son pâturage ou le juste s''écarte du mal . LXX un arbitre juste est ami de lui-même, mais les avis des impies sont déraisonnables. Des maux poursuivront les pécheurs, et la voie des impies les égarera. Voir aussi 2.13+.'
  - type: text
    content: Le juste est un guide pour son compagnon ;
  - type: text
    content: la voie des méchants les égare.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Le nonchalant  : litt. la nonchalance , même mot hébreu v. 24.'
  - type: text
    content: Le nonchalant ne rôtit pas son gibier ;
  - type: text
    content: le bien précieux d'un homme, c'est d'être actif.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'justice  : cf. 11.4n. –  il y a une voie…  : texte incertain, litt. et une voie, chemin (de) non-mort  ; au lieu de non-mort , plusieurs mss hébreux et versions anciennes ont lu vers la mort  ; on a aussi modifié le texte hébreu traditionnel pour lire la voie de l''abomination (ou de l''infidélité  ; LXX des rancuniers ou des malveillants ) conduit à la mort  ; cf. 2.19n  ; voir aussi Mt 7.13s ; Jn 14.6 ; Rm 6.21-23.'
  - type: text
    content: La vie est dans le sentier de la justice ;
  - type: text
    content: il y a une voie bien tracée vers la mort.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'la méchanceté  : cf. 10.25.'
  - type: text
    content: Par la méchanceté on ne s'affermit pas ;
  - type: text
    content: la racine des justes ne vacille pas.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 18.22. –  de valeur  : litt. vaillante , de même en 31.10n  ; cf. Rt 2.1n  ; 3.11 ; Siracide 26.1-3 : « Femme bonne fait un mari heureux et double le nombre de ses jours. Femme vaillante fait la joie de son mari qui passera dans la paix toutes ses années. Femme bonne signifie un bon lot ; c''est la part accordée à ceux qui craignent le Seigneur. »'
  - type: text
    content: Une femme de valeur est la couronne de son mari ;
  - type: text
    content: celle qui fait honte est comme la carie dans ses os.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'font / fait  : autre traduction sont équité… est tromperie . –  équité 1.3n. –  la stratégie  : le terme est habituellement traduit par l''art de diriger  ; cf. 1.5n.'
  - type: text
    content: Les pensées des justes font l'équité ;
  - type: text
    content: la stratégie des méchants fait la tromperie.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'paroles des méchants…  : cf. 1.11,18 ; 11.9 ; 14.3. –  meurtrière  : litt. de sang.'
  - type: text
    content: Les paroles des méchants sont une embuscade meurtrière ;
  - type: text
    content: la bouche des gens droits les délivre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'les méchants ne sont plus  : cf. Ps 37.36. –  la maison  : cf. Mt 7.24-27.'
  - type: text
    content: Renversés, les méchants ne sont plus ;
  - type: text
    content: la maison des justes reste debout.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'le cœur pervers  : LXX le cœur lent (ou l''esprit lourd ).'
  - type: text
    content: Un homme est loué pour son bon sens ;
  - type: text
    content: le cœur pervers est un objet de mépris.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'méprisé v. 16n. –  alors qu''on a un serviteur  : texte incertain ; d''après plusieurs mss hébreux et des versions anciennes (LXX et Syr), on pourrait aussi comprendre alors qu''on travaille pour soi . –  manque de pain  : cf. 13.7 ; Siracide 10.27 : « Mieux vaut celui qui travaille et qui en tout a plus qu''il ne faut, que celui qui va se glorifiant et manque de pain. »'
  - type: text
    content: Mieux vaut être méprisé alors qu'on a un serviteur
  - type: text
    content: que de faire le glorieux alors qu'on manque de pain.
