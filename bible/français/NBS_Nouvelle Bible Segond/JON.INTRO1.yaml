verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Les grands poissons vomissent-ils leurs proies toutes vivantes sur les plages ? Compose-t-on des psaumes au fond de la mer, ou dans les entrailles d'un monstre ? Les grandes capitales se convertissent-elles en un jour ? Les arbres poussent-ils en une nuit ? Si tout cela ne nous étonne pas, alors nous ne sommes pas capables de comprendre Jonas.
  - type: text
    content: 'Car la stratégie de ce petit livre est précisément d''assener au lecteur le martèlement du '
  - type: text
    content: miracle
  - type: text
    content: ' afin de l''obliger à changer de registre mental. Ainsi sommes-nous contraints de nous mettre à réfléchir pour finalement renouveler notre approche de la vie et de la mort, de Dieu et de son dessein. Au bout du compte nous ne pourrons éviter la question de notre propre implication dans le projet divin.'
  - type: text
    content: 'Bref, ce document n''est pas à prendre comme une histoire inventée pour les enfants. Bien au contraire, ce livre vise un lecteur adulte, et sans doute aussi une '
  - type: text
    content: communauté
  - type: text
    content: ', auprès de qui il réussira à provoquer le choc nécessaire. La découverte du sens est à ce prix.'
  - type: text
    content: '*'
  - type: text
    content: '* *'
  - type: text
    content: Pour bien y parvenir, ce livret renvoie à un personnage bien réel (et pas du tout romanesque), celui de
  - type: text
    content: Jonas, fils d'Amittaï.
  - type: text
    content: ' Car il y a un Jonas fils d''Amittaï en 2R 14.25 : un '
  - type: text
    content: prophète
  - type: text
    content: ' de Gath-Hépher, en Galilée. Puisque ce Jonas-là est manifestement moins connu que celui du recueil des Douze prophètes, tournons-nous vers lui quelques instants.'
  - type: text
    content: Le Jonas de 2 Rois 14.25
  - type: text
    content: 'A la manière d''un Elie, d''un Elisée (dont les récits, émaillés de miracles, comportent aussi des missions à l''étranger) ou même de l''Esaïe des chapitres 36–39, le premier Jonas apparaît d''abord comme un «  '
  - type: text
    content: prophète raconté
  - type: text
    content: '  ». C''est le ton du chroniqueur en effet qui est employé à son propos : point de reprise du message prophétique, point de proclamation haute et ferme d''une parole de Dieu, mais le froid compte rendu d''activité qu''aurait pu rédiger un scribe à propos d''un monarque : « Untel, à tel moment, s''illustra en réalisant ceci et cela. »'
  - type: text
    content: 'La Bible situe l''activité de cet obscur Jonas sous le règne de '
  - type: text
    content: Jéroboam II
  - type: text
    content: ', roi de Samarie, de 787 à 747 av. J.-C. Ce mauvais prince '
  - type: text
    content: fit
  - type: text
    content: ', nous dit 2R 14.24,'
  - type: text
    content: ce qui déplaisait au Seigneur
  - type: text
    content: ' '
  - type: text
    content: (YHWH)
  - type: text
    content: . Il remporta cependant des succès militaires et parvint à rétablir Israël dans ses frontières historiques les plus étendues.
  - type: text
    content: 'Les entreprises de Jéroboam II, vraisemblablement inspirées par un '
  - type: text
    content: prophète patriote
  - type: text
    content: ' — notre Jonas de Gath-Hépher — vont constituer un défi pour la grande puissance de l''époque, l''orgueilleuse Ninive nord-mésopotamienne, qui faisait trembler tout l''Orient.'
  - type: text
    content: Portrait d'un prophète rebelle
  - type: text
    content: 'Tout comme la première histoire de Jonas, le livre qui porte son nom use aussi du '
  - type: text
    content: style indirect
  - type: text
    content: '. On parle '
  - type: text
    content: de
  - type: text
    content: ' Jonas, à la troisième personne.'
  - type: text
    content: 'Tout au plus parvient-on à découvrir, dans ces quatre chapitres, cinq mots (en hébreu) qui peuvent constituer ce que, dans un langage conventionnel, on appellerait un oracle au style direct : '
  - type: text
    content: Encore
  - type: text
    content: ' | quarante | jours, | et Ninive | est détruite ! (Jon 3.4).'
  - type: text
    content: 'Cette histoire '
  - type: text
    content: sur
  - type: text
    content: ' Jonas est celle du '
  - type: text
    content: nationaliste impénitent
  - type: text
    content: ' qui voulait bien faire la guerre à l''ennemi héréditaire, mais qui à aucun prix ne voudra se résoudre à lui annoncer la paix. Pas de bonne nouvelle pour Ninive, pas de quartier, voilà ce qui sous-tend toute la conduite du personnage : '
  - type: text
    content: Je savais que tu es un Dieu clément
  - type: text
    content: '… '
  - type: text
    content: C'est pourquoi j'ai préféré fuir à Tarsis
  - type: text
    content: ' (4.2).'
  - type: text
    content: Péripéties
  - type: text
    content: 'Le portrait de ce personnage emblématique est bien dans le ton. Tout, dans le comportement de Jonas, est '
  - type: text
    content: excessif
  - type: text
    content: '. Non seulement il ne va pas à Ninive comme Dieu le lui a ordonné, mais il ne prend même pas le temps de réfléchir ou de se plaindre à la manière d''un Jérémie. Non, en vérité, Dieu ne le dupera pas, et il ne se laissera pas duper (cf. Jr 20.7). Il emploie même les grands moyens pour s''en persuader. Sans hésiter, il décide de se rendre aux « antipodes » : non plus à Ninive, vers l''orient, mais à l''extrême occident, à Tarsis, sans doute sur la côte andalouse, au-delà même du détroit de Gibraltar (les antiques colonnes d''Hercule).'
  - type: text
    content: Et Jonas ne veut pas attendre. Point de bâtiment léger, tant pis, il prendra un cargo, un « bateau de Tarsis » (voir 1.3
  - type: text
    content: n
  - type: text
    content: '). Il paie le prix sans barguigner et cingle vers le large. Las ! Dieu le tient encore en sa sainte garde. Et la '
  - type: text
    content: tempête
  - type: text
    content: ' surnaturelle qui épouvante les matelots va procurer à notre homme l''occasion de dire quand même sa foi dans le Dieu des Hébreux. Le calme ne reviendra qu''à l''instant où Jonas sera jeté par-dessus bord en dépit des scrupules des marins ; exclu, vomi du sein de cette communauté avant d''être vomi une nouvelle fois, après le voyage en grand poisson, sur la terre ferme qu''il n''aurait jamais dû quitter.'
  - type: text
    content: Le Cantique des profondeurs (chap. 2)
  - type: text
    content: 'Le « Cantique des profondeurs » transporte Jonas dans l''univers du '
  - type: text
    content: temple
  - type: text
    content: . Le prophète visualise le rituel du culte et s'y projette. Il se voit offrant le sacrifice, en une action de grâces personnelle qui anticipe sur un repentir qu'il ne formule pas, même s'il l'éprouve.
  - type: text
    content: 'Sa situation abyssale transcende les indications du récit sur le '
  - type: text
    content: grand poisson
  - type: text
    content: ' et ses hospitalières entrailles. C''est aussi la raison pour laquelle il n''y a pas lieu de demander au texte plus qu''il ne dit sur l''animal. Le rôle de ce dernier est purement '
  - type: text
    content: instrumental
  - type: text
    content: . Il est le vecteur qui fait passer le héros d'un endroit à un autre. Et si ce poisson est véritablement, par sa taille, un animal monstrueux, il est aussi un monstre aimable puisqu'il est l'instrument direct de la compassion divine.
  - type: text
    content: 'L''incise de 2.3-10 constitue le '
  - type: text
    content: pôle théologique
  - type: text
    content: ' du livret. Elle appelle trois remarques :'
  - type: text
    content: 'Le style et le vocabulaire, à l''évidence, diffèrent de ceux du restant du livre. Tout se passe comme si le fil du récit était interrompu pour établir un '
  - type: text
    content: bilan provisoire
  - type: text
    content: . Un tel changement de registre, dans le déroulement du drame, n'a cependant rien d'inhabituel. Il correspond, dans les habitudes rédactionnelles de la Bible, aux reprises de sens que constituent le cantique de Moïse, celui d'Anne ou de Houlda (Ex 15 ; 1S 2.1-12 ; 2R 22.14-20) et, dans les pages du Nouveau Testament, celui de Marie ou de Zacharie (Lc 1.4-55,67-79).
  - type: text
    content: La visée de cette réflexion dépasse évidemment le cadre occasionnel du récit. On ne sait plus très bien où se trouve le poète. En tout cas, les perspectives qui s'ouvrent à lui sont bien plus vastes que celles des entrailles d'un animal marin. Il se trouve, dit-il, au sein de l'
  - type: text
    content: abîme
  - type: text
    content: ' (v. 6) qui, dans le cadre culturel de l''Antiquité proche-orientale et biblique, signifie l''abîme primordial.'
  - type: text
    content: 'Aussi bien la méditation du psaume revêt-elle une signification fondamentale : c''est la révélation de l''être intime du croyant placé dans une '
  - type: text
    content: situation limite
  - type: text
    content: ', à la frontière du néant ou de la mort. Pour lui, la vie apparaît alors comme la grâce reçue, le pardon accordé. On remarquera l''anticipation du v. 7 : '
  - type: text
    content: Tu m'as fait remonter vivant de la fosse
  - type: text
    content: ', où le captif des profondeurs rend déjà grâce pour son élargissement ; le moribond, pour sa résurrection. C''est un programme de nouvelle naissance.'
  - type: text
    content: La conversion de Ninive
  - type: text
    content: 'La conversion spectaculaire de Ninive (chap. 3) ne surprend pas Jonas (4.2), mais l''irrite au plus haut point (4.1). Au chapitre 4, les échanges d''actes et de paroles entre Dieu et le prophète visent à initier progressivement ce dernier à la '
  - type: text
    content: compassion
  - type: text
    content: ' sans borne du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Le texte nous laisse dans l''incertitude quant à l''efficacité de cette pédagogie. La question que Dieu pose à Jonas et, par lui, à Israël nous est désormais adressée : que faisons-nous de la compassion universelle de Dieu ? N''y aurait-il pas sous nos yeux quelque Ninive dont nous nous complaisons à noircir les desseins et que nous ne souhaitons surtout pas voir s''amender, parce que nous nous justifions nous-mêmes par la réalité ou le mythe de sa méchanceté ?'
