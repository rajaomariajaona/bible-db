document_id: GEN.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Abram, les rois et Malki-Tsédeq
  - type: text
    content: ' '
  - type: note
    content: Amraphel, roi de Shinéar (10.10+), a parfois été identifié à Hammourabi, roi de Babylone, mais cette identification est peu probable. –  Elam 10.22n. –  Tidal est le nom d'un roi hittite. –  Goyim signifie habituellement nations  ; c'est le terme qui désigne les non-Juifs dans le judaïsme.
  - type: text
    content: 'En leurs jours, Amraphel, roi de Shinéar, Ariok, roi d''Ellasar, Kedorlaomer, roi d''Elam, et Tidal, roi de Goyim, '
  '10':
  - type: note
    content: bitume 11.3.
  - type: text
    content: 'La vallée de Siddim était couverte de puits de bitume ; dans leur fuite, le roi de Sodome et celui de Gomorrhe y tombèrent, et les autres s''enfuirent vers la montagne. '
  '11':
  - type: note
    content: 'Les vainqueurs prirent  : litt. ils prirent.'
  - type: text
    content: 'Les vainqueurs prirent tous les biens de Sodome et de Gomorrhe, avec toutes leurs provisions ; puis ils s''en allèrent. '
  '12':
  - type: note
    content: '13.12. –  Loth habitait…  : litt. il habitait…'
  - type: text
    content: 'Ils prirent aussi Loth, fils du frère d''Abram, avec ses biens, et ils s''en allèrent – Loth habitait à Sodome. '
  '13':
  - type: note
    content: 'Un rescapé  : litt. le rescapé  ; cf. 2S 18.24ss. –  Hébreu 10.21n. –  Mamré 13.18 ; 18.1. –  Amorite v. 7. –  Eshkol (« La Grappe ») est le nom d''une vallée proche d''Hébron (Nb 13.23s). –  les alliés  : litt. les seigneurs (ou les maîtres, les hommes, hébreu ba`al) de l''alliance  ; cf. Jg 8.33n.'
  - type: text
    content: 'Un rescapé vint l''annoncer à Abram, l''Hébreu ; celui-ci demeurait aux térébinthes de Mamré l''Amorite, frère d''Eshkol et d''Aner, qui étaient les alliés d''Abram. '
  '14':
  - type: note
    content: 'frère  : cf. v. 16 ; le terme hébreu peut désigner, de façon plus générale, un parent (12.5n  ; 13.8n). –  il arma…  : litt. il vida ses consacrés, peut-être au sens de  : il fit sortir ses hommes (comme on dégaine une épée) ; certains modifient le texte, d''après plusieurs témoins anciens, pour lire il compta… – Une tradition juive voit dans le chiffre trois cent dix-huit (318) une allusion à Eliézer (15.2), nom dont la valeur numérique est précisément de 318. –  il se lança à leur poursuite  : litt. il poursuivit. –  Dan  : près des sources du Jourdain (voir Jg 18.28s).'
  - type: text
    content: 'Dès qu''Abram apprit que son frère avait été capturé, il arma trois cent dix-huit de ses meilleurs hommes, ceux qui étaient nés dans sa maison, et il se lança à leur poursuite, jusqu''à Dan. '
  '15':
  - type: note
    content: 'au nord  : litt. à gauche (on s’oriente face au soleil levant).'
  - type: text
    content: 'Il divisa sa troupe pour les attaquer de nuit, lui et ses serviteurs ; il les battit et les poursuivit jusqu''à Hoba, qui est au nord de Damas. '
  '16':
  - type: note
    content: 'Cf. 1S 30 ; Jr 41.11-18. –  les gens  : autre traduction le peuple.'
  - type: text
    content: Il ramena tous les biens ; il ramena aussi Loth, son frère, avec ses biens, ainsi que les femmes et les gens.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Shavé  : cf. v. 5n. –  la vallée du Roi est vraisemblablement à situer dans les environs immédiats de Jérusalem. Cf. 2S 18.18.'
  - type: text
    content: 'Le roi de Sodome sortit à sa rencontre, après qu''il fut revenu vainqueur de Kedorlaomer et des rois qui étaient avec lui, dans la vallée de Shavé, c''est-à-dire la vallée du Roi. '
  '18':
  - type: note
    content: 'Malki-Tsédeq  : traditionnellement Melchisédek (roi de justice ou mon roi est juste  ; cf. Jos 10.1n). –  Salem (hébreu shalém, complet ou paisible  ; LXX Salem). On pense généralement qu''il s''agit de Jérusalem (cf. Ps 76.3) ; voir cependant Gn 33.18n. –  fit apporter ou apporta, litt. fit sortir. –  pain 3.19+. –  vin 9.21+ ; Ex 29.40 ; Nb 15.4ss. –  prêtre Ps 110.4+. –  Dieu Très-Haut  : traduction incertaine de l''hébreu ’El-‘Elyôn, cf. 21.33n  ; sur ‘Elyôn, voir Nb 24.16 ; Dt 32.8 ; Es 14.14 ; Ps 18.14 ; 46.5 ; 73.11 ; 78.35,56 (’Elohim ‘Elyôn dans ce dernier v.) ; 82.6 ; voir aussi noms divins. Le présent récit affirme l''unicité de Dieu malgré la diversité de ses appellations. – Cf. Hé 7.1-3.'
  - type: text
    content: 'Malki-Tsédeq, roi de Salem, fit apporter du pain et du vin : il était prêtre du Dieu Très-Haut. '
  '19':
  - type: note
    content: 'Voir bénédiction. –  qui produit  : autres traductions qui engendre ; qui conçoit ; qui enfante ; qui acquiert  ; sur les sens possibles du verbe hébreu correspondant (de même au v. 22), voir 4.1n  ; voir aussi Dt 32.6n  ; Ps 78.54n  ; 139.13n  ; Pr 8.22. –  le ciel et la terre  : cf. 1.1 ; 24.3.'
  - type: text
    content: 'Il le bénit en disant :'
  - type: text
    content: Béni soit Abram
  - type: text
    content: par le Dieu Très-Haut
  - type: text
    content: qui produit le ciel et la terre !
  '2':
  - type: note
    content: Adma / Tseboïm 10.19n. –  Tsoar 19.22s.
  - type: text
    content: 'firent la guerre à Béra, roi de Sodome, à Birsha, roi de Gomorrhe, à Shinéab, roi d''Adma, à Sheméber, roi de Tseboïm, et au roi de Béla, c''est-à-dire Tsoar. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'livré  : cf. 9.2n, autre verbe ; le verbe qui apparaît ici figure aussi en Os 11.8. –  la dîme  : c.-à-d. un dixième  ; cf. 28.22.'
  - type: text
    content: Béni soit le Dieu Très-Haut
  - type: text
    content: qui t'a livré tes adversaires !
  - type: text
    content: 'Et Abram lui donna la dîme de tout. '
  '21':
  - type: note
    content: 'les gens  : cf. 1.20n  ; 12.5n.'
  - type: text
    content: 'Le roi de Sodome dit à Abram : Donne-moi les gens, et prends les biens. '
  '22':
  - type: note
    content: 'lève la main  : geste de serment ; cf. Dt 32.40 ; Ez 20.5s etc. –  le Seigneur  : hébreu YHWH  ; le terme correspondant est absent de plusieurs versions anciennes. –  qui produit… v. 19n.'
  - type: text
    content: 'Abram répondit au roi de Sodome : Je lève la main vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu Très-Haut qui produit le ciel et la terre. '
  '23':
  - type: text
    content: 'Pas même un fil ni une lanière de sandale, je ne prendrai rien de tout ce qui t''appartient, pour que tu ne puisses pas dire : « C''est moi qui ai enrichi Abram ! » '
  '24':
  - type: note
    content: 'V. 13. –  les jeunes gens  : autre traduction les serviteurs (autre terme hébreu au v. 15).'
  - type: text
    content: Rien pour moi, seulement ce qu'ont mangé les jeunes gens et la part des hommes qui sont allés avec moi, Aner, Eshkol et Mamré ; eux, ils prendront leur part.
  '3':
  - type: note
    content: la mer du Sel, c.-à-d. la mer Morte.
  - type: text
    content: 'Tous ceux-ci se liguèrent et se rassemblèrent dans la vallée de Siddim, c''est-à-dire la mer du Sel. '
  '4':
  - type: note
    content: 'ils avaient été soumis à  : litt. ils avaient servi. –  mais la treizième année  : on pourrait aussi comprendre  : et pendant treize ans.'
  - type: text
    content: 'Pendant douze ans ils avaient été soumis à Kedorlaomer, mais la treizième année ils s''étaient rebellés. '
  '5':
  - type: note
    content: Avec les Anaqites (Nb 13.22 ; Dt 1.28), les populations mentionnées dans ce v. semblent être les habitants primitifs de Canaan (15.20) qui ont laissé le souvenir de géants fabuleux (Dt 2.10s). Les localités citées sont situées en Transjordanie. Sur Ashteroth-Qarnaïm, cf. Jos 9.10n. –  dans la plaine de Qiriataïm ou à Shavé-Qiriataïm, cf. v. 17.
  - type: text
    content: 'La quatorzième année, Kedorlaomer et les rois qui étaient avec lui arrivèrent et battirent les Rephaïtes à Ashteroth-Qarnaïm, les Zouzites à Ham, les Emites dans la plaine de Qiriataïm '
  '6':
  - type: note
    content: 'Horites  : ce nom a été interprété au sens de troglodytes  ; il s''agirait alors d''une population habitant des grottes ou des cavernes creusées dans le roc ; on l''a aussi rapproché des Hourrites, un peuple indo-européen fondateur du royaume du Mitanni qui, à partir du XVIe s. av. J.-C., a étendu son influence jusqu''en Syrie et en Canaan ; cf. 36.20 ; Dt 2.12,22. –  leur montagne  : autre traduction leur région montagneuse. –  Séir (33.14,16 ; 36.8,20n) et Parân (21.21n) sont des régions désertiques au sud de la mer Morte.'
  - type: text
    content: 'et les Horites dans leur montagne, Séir, jusqu''au chêne de Parân, qui est près du désert. '
  '7':
  - type: note
    content: 'Eïn-Mishpath (Source du Jugement, cf. Nb 5.17ss ; voir aussi Ex 15.25) est identifié par le texte à Qadesh (le Sacré ou le Saint), une oasis du désert, au sud-ouest de la mer Morte (Nb 13–14 ; 20). –  les Amalécites dans tout leur pays  : litt. tout le pays (terme également traduit par campagne ou champ) de l''Amalécite  ; LXX a lu tous les chefs des Amalécites, ce qui correspond à une variante d''une lettre en hébreu. Les Amalécites sont un peuple nomade du désert situé entre le Néguev et le Sinaï (Ex 17.8+). –  Amorites 10.16n. –  Hatsatsôn-Tamar ou Eïn-Guédi (2Ch 20.2), sur la rive occidentale de la mer Morte.'
  - type: text
    content: 'Puis ils s''en retournèrent, arrivèrent à Eïn-Mishpath (c''est-à-dire Qadesh) et battirent les Amalécites dans tout leur pays, ainsi que les Amorites qui habitaient à Hatsatsôn-Tamar. '
  '8':
  - type: note
    content: V. 2s.
  - type: text
    content: 'Alors le roi de Sodome, le roi de Gomorrhe, le roi d''Adma, le roi de Tseboïm et le roi de Béla, c''est-à-dire Tsoar, se mirent en campagne ; ils se rangèrent en ordre de bataille contre eux dans la vallée de Siddim : '
  '9':
  - type: note
    content: V. 1.
  - type: text
    content: 'contre Kedorlaomer, roi d''Elam, Tidal, roi de Goyim, Amraphel, roi de Shinéar, et Ariok, roi d''Ellasar : quatre rois contre cinq. '
