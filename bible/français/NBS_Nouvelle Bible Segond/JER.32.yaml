document_id: JER.32,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie rachète le champ de son oncle
  - type: text
    content: ' '
  - type: note
    content: 'Parole… 1.2n  ; 30.1. –  dixième année de Sédécias (1.3n) : c.-à-d. en 588/7 av. J.-C. ; cf. v. 2 ; 21.3s ; 25.1 ; 37.5s ; 39.1. –  dix-huitième année… 52.29.'
  - type: text
    content: 'Parole qui parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ', la dixième année de Sédécias, roi de Juda. C''était la dix-huitième année de Nabuchodonosor.'
  '10':
  - type: note
    content: 'un contrat  : litt. dans le livre  ; cf. v. 44.'
  - type: text
    content: 'J''écrivis un contrat que je scellai, je pris des témoins et je pesai l''argent dans une balance. '
  '11':
  - type: note
    content: 'Le contrat était probablement écrit en deux exemplaires, l''un roulé et scellé ou cacheté (cf. Ap 5.1), donc tenu à l''abri de toute altération pour servir de témoin en cas de désaccord, l''autre ouvert pour la consultation courante (cf. v. 14). –  avec l''acte et les clauses  : litt. le commandement et les prescriptions, mots absents de LXX.'
  - type: text
    content: 'Je pris ensuite le contrat d''achat, celui qui était scellé, avec l''acte et les clauses, ainsi que celui qui était ouvert, '
  '12':
  - type: note
    content: 'Baruch  : secrétaire (ou scribe) de Jérémie v. 16 ; 36.4-32 ; 43.3 ; 45.1ss. –  fils de Nériya…  : cf. 51.59. –  les Judéens  : autre traduction les Juifs  ; même terme en 34.9 ; 38.19 ; 40.11s ; 41.3 ; 43.9 ; 44.1 ; 52.28ss (identique au nom propre Yehoudi, 36.14ss) ; cf. 2R 16.6n.'
  - type: text
    content: 'et je remis le contrat d''achat à Baruch, fils de Nériya, fils de Mahséya, à la vue de Hanaméel, fils de mon oncle, à la vue des témoins qui avaient signé le contrat d''achat, et à la vue de tous les Judéens qui étaient dans la cour de la garde. '
  '13':
  - type: note
    content: 'en leur présence  : litt. sous leurs yeux.'
  - type: text
    content: 'Et je donnai en leur présence cet ordre à Baruch : '
  '14':
  - type: note
    content: V. 11n.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Prends ces contrats, ce contrat d''achat, celui qui est scellé et ce contrat qui est ouvert, et mets-les dans un récipient de terre, pour qu''ils se conservent longtemps. '
  '15':
  - type: note
    content: V. 43s.
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : On achètera encore des maisons, des champs et des vignes dans ce pays.'
  '16':
  - type: text
    content: 'Après avoir remis le contrat d''achat à Baruch, fils de Nériya, j''adressai cette prière au '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: heading
    content: La prière de Jérémie
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 21 ; 27.5. –  rien n'est étonnant… v. 27 ; Gn 18.14 ; Za 8.6 ; Mt 19.26.
  - type: text
    content: 'Ah ! Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', c''est toi qui as fait le ciel et la terre par ta grande puissance, par ton bras étendu : rien n''est étonnant de ta part. '
  '18':
  - type: note
    content: 'tu paies de retour (16.18n) … directement  : litt. dans le sein (ou le giron) de leurs fils  ; cf. 31.29s ; Ex 20.5s ; 34.7, Es 65.6ns. –  le Dieu  : hébreu ’El  ; cf. Gn 21.33n. –  et vaillant  : autre traduction le Héros 20.11 ; cf. Dt 10.17 ; Es 9.5 ; 10.21 ; Ps 24.8,10. –  dont le nom… 10.16+.'
  - type: text
    content: 'Tu agis avec fidélité jusqu''à la millième génération ; pour la faute des pères, tu paies de retour leurs fils après eux, directement. Tu es le Dieu grand et vaillant, dont le nom est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées. '
  '19':
  - type: note
    content: 'Tes projets…  : litt. grand en conseil (cf. Es 5.19n  ; 9.5) et abondant en hauts faits (cf. Ps 9.12 ; 66.5 ; 77.13) : voir Es 28.29. –  tu as les yeux ouverts 16.17 ; cf. 11.20+ ; Pr 5.21. –  pour donner à chacun… 17.10+.'
  - type: text
    content: 'Tes projets sont grands et tes hauts faits magnifiques ; tu as les yeux ouverts sur toutes les voies des êtres humains, pour donner à chacun selon ses voies, selon le fruit de ses agissements. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: assiégeait 34.1 ; 52.4 ; 2R 25.1 ; Ez 24.2. –  était détenu… v. 8,12 ; 33.1 ; 37.15,20s ; 38.6,13,28 ; 39.14s ; Né 3.25.
  - type: text
    content: 'L''armée du roi de Babylone assiégeait alors Jérusalem, et Jérémie, le prophète, était détenu dans la cour de la garde, dans la maison du roi de Juda. '
  '20':
  - type: note
    content: 'Ps 78.43 ; Ac 7.36. –  voilà pourquoi…  : autre traduction le nom que tu as en ce jour  ; cf. 25.18+ ; Né 9.10.'
  - type: text
    content: 'Tu as fait paraître des signes et des prodiges en Egypte, jusqu''à ce jour, en Israël et dans l''humanité, et tu t''es fait un nom – voilà pourquoi il en est ainsi en ce jour. '
  '21':
  - type: note
    content: 'Cf. v. 17+ ; Dt 26.8. –  en inspirant…  : litt. avec une grande crainte.'
  - type: text
    content: 'Tu as fait sortir d''Egypte Israël, ton peuple, avec des signes et des prodiges, d''une main forte, d''un bras étendu, en inspirant une grande crainte. '
  '22':
  - type: note
    content: 11.5+.
  - type: text
    content: 'Tu leur as donné ce pays que tu avais juré à leurs pères de leur donner, un pays ruisselant de lait et de miel. '
  '23':
  - type: note
    content: 7.26+ ; Né 9.30. –  ta loi 2.8n  ; autre lecture traditionnelle tes lois ou tes enseignements  ; cf. Dn 9.10n.
  - type: text
    content: 'Ils sont venus et ils en ont pris possession. Mais ils ne t''ont pas écouté, ils n''ont pas suivi ta loi, ils n''ont pas fait tout ce que tu leur avais ordonné de faire. Et c''est alors que tu as fait venir sur eux tout ce malheur ! '
  '24':
  - type: note
    content: 'On élève…  : litt. des remblais viennent  ; cf. 6.6n  ; voir aussi 14.12+ ; 21.7 ; 33.3s.'
  - type: text
    content: 'On élève des remblais pour prendre la ville ; la ville sera livrée aux Chaldéens qui l''attaquent, vaincue par l''épée, par la famine et par la peste. La parole que tu as prononcée est arrivée, et tu le vois. '
  '25':
  - type: note
    content: V. 7ss.
  - type: text
    content: 'Néanmoins, Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', tu m''as dit : Achète un champ pour de l''argent, prends des témoins… Et la ville est livrée aux Chaldéens !'
  - type: heading
    content: La réponse du Seigneur à Jérémie
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'parvint à Jérémie  : LXX me parvint  ; cf. 1.2n.'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie : '
  '27':
  - type: note
    content: 'Dieu de tous  : litt. Dieu de toute chair  ; cf. Nb 16.22. –  étonnant v. 17+.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu de tous. Y a-t-il rien qui soit étonnant de ma part ? '
  '28':
  - type: note
    content: V. 3+.
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je livre cette ville aux Chaldéens et à Nabuchodonosor, roi de Babylone, et il la prendra. '
  '29':
  - type: note
    content: 'sur les toits…  : cf. 19.13n. –  on m''a contrarié… 7.18n. – Voir Baal.'
  - type: text
    content: 'Les Chaldéens qui attaquent cette ville vont entrer, ils mettront le feu à cette ville et la brûleront, avec les maisons sur les toits en terrasse desquelles on m''a contrarié en offrant de l''encens au Baal et en répandant des libations pour d''autres dieux. '
  '3':
  - type: note
    content: en prophète 2.8n. –  Je livre cette ville… 21.10 ; 38.3.
  - type: text
    content: 'Sédécias, roi de Juda, l''avait fait placer en détention, en disant : Pourquoi annonces-tu en prophète : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je livre cette ville au roi de Babylone, et il la prendra ; '
  '30':
  - type: note
    content: 'les Israélites et les Judéens  : litt. les fils d''Israël et les fils de Juda  ; cf. v. 12n  ; 7.30+. –  depuis leur jeunesse 3.25+. –  me contrarier par l''œuvre de leurs mains 25.6+ ; cette dernière proposition est omise par LXX.'
  - type: text
    content: 'Car les Israélites et les Judéens n''ont fait, depuis leur jeunesse, que ce qui me déplaisait ; les Israélites n''ont fait que me contrarier par l''œuvre de leurs mains – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '31':
  - type: note
    content: 'colère / fureur 7.20+. –  depuis le jour…  : cf. 2.20n  ; Ez 16.3-5,45. –  je vais l''écarter  : cf. 2R 17.18,23 ; 23.27.'
  - type: text
    content: 'Car elle est pour moi une cause de colère et de fureur, cette ville, depuis le jour où on l''a bâtie jusqu''à ce jour, à tel point que je vais l''écarter de ma vue, '
  '32':
  - type: note
    content: leurs rois, leurs princes… 2.26+. –  hommes de Juda… 4.4.
  - type: text
    content: 'tant les Israélites et les Judéens m''ont contrarié par tout le mal qu''ils ont fait, eux, leurs rois, leurs princes, leurs prêtres et leurs prophètes, les hommes de Juda et les habitants de Jérusalem. '
  '33':
  - type: note
    content: 'face / dos 2.27+ ; 15.6. –  j''ai eu beau…  : d''après des versions anciennes ; dans le texte hébreu traditionnel le sujet du verbe n''est pas spécifié : litt. les instruire, inlassablement (7.13n) instruire. –  recevoir la leçon 5.3+.'
  - type: text
    content: 'Ils ne m''ont pas présenté leur face, mais leur dos ; j''ai eu beau les instruire, inlassablement, ils n''ont pas écouté de façon à recevoir la leçon. '
  '34':
  - type: note
    content: '7.30s. –  leurs horreurs 4.1n  ; 16.18. –  sur laquelle mon nom… 7.10+. –  impure  : voir pur.'
  - type: text
    content: 'Ils ont placé leurs horreurs dans la maison sur laquelle mon nom est invoqué, la rendant ainsi impure. '
  '35':
  - type: note
    content: 7.31n. –  Molek Lv 18.21n  ; 2R 23.10.
  - type: text
    content: 'Ils ont bâti les hauts lieux du Baal dans la vallée du Fils de Hinnom, pour faire passer au Molek leurs fils et leurs filles, chose que je ne leur avais pas ordonnée et qui ne m''était pas venue au cœur : commettre une telle abomination pour faire pécher Juda !'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'vous dites  : LXX tu dis  ; cf. v. 3+,43n.'
  - type: text
    content: 'A cause de cela, maintenant, voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, au sujet de cette ville dont vous dites : « Elle sera livrée au roi de Babylone, vaincue par l''épée, par la famine et par la peste » :'
  '37':
  - type: text
    content: ' '
  - type: note
    content: Je les rassemblerai 23.3+. –  de tous les pays 16.15. –  dans ma colère… v. 31 ; 21.5. –  en sécurité 23.6+.
  - type: text
    content: 'Je les rassemblerai de tous les pays où je les ai bannis dans ma colère, dans ma fureur et dans ma grande irritation ; je les ramènerai en ce lieu et je les y ferai habiter en sécurité. '
  '38':
  - type: note
    content: 7.23+.
  - type: text
    content: 'Ils seront mon peuple, et moi, je serai leur Dieu. '
  '39':
  - type: note
    content: 'un même cœur…  : litt. un cœur unique et un chemin unique  ; au lieu d’unique LXX a lu autre et Syr nouveau  ; cf. 17.9 ; 24.7 ; 31.33 ; Ez 11.19+.'
  - type: text
    content: 'Je leur donnerai un même cœur et une même voie, afin qu''ils me craignent toujours, pour leur bonheur et celui de leurs fils après eux. '
  '4':
  - type: note
    content: il lui parlera… litt. sa bouche parlera avec sa bouche et ses yeux verront ses yeux  ; cf. 21.7 ; 34.2s ; 2R 25.6.
  - type: text
    content: 'Sédécias, roi de Juda, n''échappera pas aux Chaldéens ; il sera livré au roi de Babylone, il lui parlera et le verra face à face ; '
  '40':
  - type: note
    content: 'une alliance perpétuelle ou éternelle 50.5 ; cf. 31.31+ ; Es 24.5n  ; 55.3 ; Ez 16.40 ; Hé 13.20. –  je ne me détournerai…  : litt. je ne reviendrai plus de derrière eux. –  je leur ferai du bien  : cf. 29.11,32. –  ma crainte…  : c.-à-d. je ferai en sorte qu''ils me craignent, 2.19+.'
  - type: text
    content: 'Je conclurai pour eux une alliance perpétuelle, je ne me détournerai plus d''eux, je leur ferai du bien, et je mettrai ma crainte dans leur cœur, afin qu''ils ne s''écartent pas de moi. '
  '41':
  - type: note
    content: 'Je serai content…  : cf. Dt 28.63 ; Es 65.19 ; So 3.17 ; Lc 15.7. –  je les planterai 1.10+ ; 2.21 ; 24.6 ; Am 9.15. –  solidement  : autre traduction en vérité.'
  - type: text
    content: 'Je serai content de leur faire du bien ; je les planterai solidement dans ce pays, de tout mon cœur et de toute mon âme. '
  '42':
  - type: note
    content: Cf. 31.28.
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : de même que j''ai fait venir sur ce peuple tout ce grand malheur, de même je ferai venir sur eux tout le bien dont je parle à leur sujet. '
  '43':
  - type: note
    content: 'V. 15. –  dont vous dites  : LXX dont tu dis  ; cf. v. 36n  ; 33.10.'
  - type: text
    content: 'On achètera des champs dans ce pays dont vous dites : C''est un lieu dévasté, il n''y a plus là ni humains ni bêtes, il est livré aux Chaldéens. '
  '44':
  - type: note
    content: 'contrats v. 10-11n. –  au pays de Benjamin… 1.1n  ; 31.15n. –  la montagne 17.26n. –  Bas-Pays  : hébreu shephéla. –  je rétablirai leur situation 29.14n.'
  - type: text
    content: 'On achètera des champs pour de l''argent, on écrira des contrats, on les scellera, on prendra des témoins, au pays de Benjamin et dans les environs de Jérusalem, dans les villes de Juda, dans les villes de la montagne, dans les villes du Bas-Pays et dans les villes du Néguev, car je rétablirai leur situation – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '5':
  - type: note
    content: 'on emmènera  : litt. il (le roi de Babylone) emmènera. –  que j''intervienne pour lui  : on pourrait aussi comprendre contre lui (cf. 6.15n) ; voir cependant 27.22 ; 34.5 ; la fin du v. est absente de LXX. –  vous ne vaincrez pas  : cf. 37.9s ; 2Ch 13.12.'
  - type: text
    content: 'on emmènera Sédécias à Babylone, où il restera jusqu''à ce que j''intervienne pour lui – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: . Si vous faites la guerre aux Chaldéens, vous ne vaincrez pas.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 13.1+.
  - type: text
    content: 'Jérémie dit : La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint : '
  '7':
  - type: note
    content: 'à Anatoth 1.1n  ; 11.21. –  droit (ou devoir) de rédemption  : cf. Lv 25.25 ; Rt 2.20n  ; 4.4 ; voir aussi Ex 6.6+. – Cf. Mt 27.10.'
  - type: text
    content: 'Hanaméel, fils de ton oncle Shalloum, vient te trouver pour te dire : Achète mon champ qui est à Anatoth, car tu as le droit de rédemption pour l''acheter. '
  '8':
  - type: text
    content: 'Hanaméel, fils de mon oncle, vint me trouver – selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' dans la cour de la garde – et il me dit : Achète, je te prie, mon champ qui est à Anatoth, au pays de Benjamin, car tu as le droit de possession et de rédemption ; achète-le ! Je reconnus que c''était la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '9':
  - type: note
    content: dix-sept sicles ≈ 165 g ; voir mesures, poids et monnaies.
  - type: text
    content: 'J''achetai à Hanaméel, fils de mon oncle, le champ qui est à Anatoth, et je lui pesai l''argent, dix-sept sicles d''argent. '
