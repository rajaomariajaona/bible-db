document_id: JER.32,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérémie rachète le champ de son oncle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Parole… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 30.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dixième année de Sédécias '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : c.-à-d. en 588/7 av. J.-C. ; cf. v. 2 ; 21.3s ; 25.1 ; 37.5s ; 39.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dix-huitième année… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 52.29.
      marker-yv: yv-n
    - type: text
      text: 'Parole qui parvint à Jérémie de la part du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', la dixième année de Sédécias, roi de Juda. C''était la dix-huitième année de Nabuchodonosor.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un contrat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le livre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 44.'
      marker-yv: yv-n
    - type: text
      text: 'J''écrivis un contrat que je scellai, je pris des témoins et je pesai l''argent dans une balance. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le contrat était probablement écrit en deux exemplaires, l''un roulé et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'scellé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cacheté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Ap 5.1), donc tenu à l''abri de toute altération pour servir de témoin en cas de désaccord, l''autre '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ouvert '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pour la consultation courante (cf. v. 14). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec l'acte et les clauses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le commandement et les prescriptions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mots absents de LXX.'
      marker-yv: yv-n
    - type: text
      text: 'Je pris ensuite le contrat d''achat, celui qui était scellé, avec l''acte et les clauses, ainsi que celui qui était ouvert, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Baruch
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : secrétaire (ou '
        - type: usfm
          marker: w
          children:
          - type: text
            text: scribe
        - type: text
          text: ') de Jérémie v. 16 ; 36.4-32 ; 43.3 ; 45.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fils de Nériya…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 51.59. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Judéens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même terme en 34.9 ; 38.19 ; 40.11s ; 41.3 ; 43.9 ; 44.1 ; 52.28ss (identique au nom propre Yehoudi, 36.14ss) ; cf. 2R 16.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'et je remis le contrat d''achat à Baruch, fils de Nériya, fils de Mahséya, à la vue de Hanaméel, fils de mon oncle, à la vue des témoins qui avaient signé le contrat d''achat, et à la vue de tous les Judéens qui étaient dans la cour de la garde. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en leur présence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sous leurs yeux.
      marker-yv: yv-n
    - type: text
      text: 'Et je donnai en leur présence cet ordre à Baruch : '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël : Prends ces contrats, ce contrat d''achat, celui qui est scellé et ce contrat qui est ouvert, et mets-les dans un récipient de terre, pour qu''ils se conservent longtemps. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 43s.
      marker-yv: yv-n
    - type: text
      text: 'Car ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël : On achètera encore des maisons, des champs et des vignes dans ce pays.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir remis le contrat d''achat à Baruch, fils de Nériya, j''adressai cette prière au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  :'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La prière de Jérémie
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 21 ; 27.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rien n''est étonnant… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 27 ; Gn 18.14 ; Za 8.6 ; Mt 19.26.
      marker-yv: yv-n
    - type: text
      text: 'Ah ! Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: ', c''est toi qui as fait le ciel et la terre par ta grande puissance, par ton bras étendu : rien n''est étonnant de ta part. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu paies de retour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (16.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: … directement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans le sein '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le giron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de leurs fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 31.29s ; Ex 20.5s ; 34.7, Es 65.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 21.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et vaillant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le Héros '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.11 ; cf. Dt 10.17 ; Es 9.5 ; 10.21 ; Ps 24.8,10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dont le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.16+.
      marker-yv: yv-n
    - type: text
      text: 'Tu agis avec fidélité jusqu''à la millième génération ; pour la faute des pères, tu paies de retour leurs fils après eux, directement. Tu es le Dieu grand et vaillant, dont le nom est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tes projets…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'grand en conseil '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Es 5.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 9.5) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et abondant en hauts faits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Ps 9.12 ; 66.5 ; 77.13) : voir Es 28.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu as les yeux ouverts '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.17 ; cf. 11.20+ ; Pr 5.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour donner à chacun… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 17.10+.
      marker-yv: yv-n
    - type: text
      text: 'Tes projets sont grands et tes hauts faits magnifiques ; tu as les yeux ouverts sur toutes les voies des êtres humains, pour donner à chacun selon ses voies, selon le fruit de ses agissements. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'assiégeait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '34.1 ; 52.4 ; 2R 25.1 ; Ez 24.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'était détenu… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8,12 ; 33.1 ; 37.15,20s ; 38.6,13,28 ; 39.14s ; Né 3.25.
      marker-yv: yv-n
    - type: text
      text: 'L''armée du roi de Babylone assiégeait alors Jérusalem, et Jérémie, le prophète, était détenu dans la cour de la garde, dans la maison du roi de Juda. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 78.43 ; Ac 7.36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: voilà pourquoi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le nom que tu as en ce jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 25.18+ ; Né 9.10.'
      marker-yv: yv-n
    - type: text
      text: 'Tu as fait paraître des signes et des prodiges en Egypte, jusqu''à ce jour, en Israël et dans l''humanité, et tu t''es fait un nom – voilà pourquoi il en est ainsi en ce jour. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 17+ ; Dt 26.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en inspirant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avec une grande '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu as fait sortir d''Egypte Israël, ton peuple, avec des signes et des prodiges, d''une main forte, d''un bras étendu, en inspirant une grande crainte. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.5+.
      marker-yv: yv-n
    - type: text
      text: 'Tu leur as donné ce pays que tu avais juré à leurs pères de leur donner, un pays ruisselant de lait et de miel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.26+ ; Né 9.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ta '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tes lois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tes enseignements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dn 9.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils sont venus et ils en ont pris possession. Mais ils ne t''ont pas écouté, ils n''ont pas suivi ta loi, ils n''ont pas fait tout ce que tu leur avais ordonné de faire. Et c''est alors que tu as fait venir sur eux tout ce malheur ! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On élève…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des remblais viennent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 6.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi 14.12+ ; 21.7 ; 33.3s.'
      marker-yv: yv-n
    - type: text
      text: 'On élève des remblais pour prendre la ville ; la ville sera livrée aux Chaldéens qui l''attaquent, vaincue par l''épée, par la famine et par la peste. La parole que tu as prononcée est arrivée, et tu le vois. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 7ss.
      marker-yv: yv-n
    - type: text
      text: 'Néanmoins, Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: ', tu m''as dit : Achète un champ pour de l''argent, prends des témoins… Et la ville est livrée aux Chaldéens !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'La réponse du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' à Jérémie'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.26 '
      - type: usfm
        marker: fq
