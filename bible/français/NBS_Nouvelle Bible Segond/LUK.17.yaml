document_id: LUK.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les causes de chute
  - type: heading
    content: Mt 18.6-7  ; Mc 9.42
  - type: text
    content: ' '
  - type: note
    content: causes de chute 7.23+. –  quel malheur… 6.24+.
  - type: text
    content: 'Il dit à ses disciples : Il est impossible qu''il n''y ait pas de causes de chute, mais quel malheur pour celui par qui cela arrive ! '
  '10':
  - type: note
    content: 'De même, vous aussi  : cf. 21.31 ; 22.26. –  inutiles  : traduction incertaine ; on a aussi compris  : de simples esclaves, des esclaves sans mérite, quelconques, non indispensables  ; même terme Mt 25.30 ; LXX emploie le terme en 2S 6.22n (pour David qui s''abaisse, qui devient sans valeur aux yeux de Mikal, selon le texte grec).'
  - type: text
    content: 'De même, vous aussi, quand vous aurez fait tout ce qui vous a été ordonné, dites : « Nous sommes des esclaves inutiles, nous avons fait ce que nous devions faire. »'
  - type: heading
    content: Jésus guérit dix lépreux
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'voyage vers Jérusalem 9.51+s ; 13.22. –  entre  : on a aussi compris à travers . –  Samarie 9.52+ ; Ac 1.8 ; 8.1+. –  Galilée 4.14+ ; cf. Mc 9.30.'
  - type: text
    content: Au cours de son voyage vers Jérusalem, il passait entre la Samarie et la Galilée.
  '12':
  - type: text
    content: ' '
  - type: note
    content: dix lépreux 5.12+ ; cf. 2R 7.3. –  à distance Lv 13.45s ; Nb 5.2s.
  - type: text
    content: 'Comme il entrait dans un village, dix lépreux vinrent à sa rencontre. Se tenant à distance, '
  '13':
  - type: note
    content: élevèrent la voix 11.27. –  maître 5.5n. –  aie compassion 16.24+.
  - type: text
    content: 'ils élevèrent la voix et dirent : Jésus, maître, aie compassion de nous ! '
  '14':
  - type: note
    content: 'vous montrer aux prêtres 5.14+ ; cf. 16.17. –  Pendant qu''ils y allaient…  : cf. 7.7ss ; 2R 5.10ss. – Voir pur, impur.'
  - type: text
    content: 'Quand il les vit, il leur dit : Allez vous montrer aux prêtres. Pendant qu''ils y allaient, ils furent purifiés.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: glorifiant Dieu 2.20+ ; 5.25+ ; 2R 5.15 ; Ac 11.18.
  - type: text
    content: 'L''un d''eux, se voyant guéri, revint sur ses pas, glorifiant Dieu à pleine voix. '
  '16':
  - type: note
    content: 'aux pieds de Jésus  : litt. à ses pieds  ; cf. 5.12. – Voir grâce. –  Samaritain  : cf. 9.52s ; 10.29ss,33 ; Ac 8.5ss.'
  - type: text
    content: 'Il tomba face contre terre aux pieds de Jésus et lui rendit grâce. C''était un Samaritain. '
  '17':
  - type: text
    content: 'Jésus demanda : N''ont-ils pas été purifiés tous les dix ? Et les neuf autres, où sont-ils ? '
  '18':
  - type: note
    content: donner gloire à Dieu Jn 9.24 ; Ac 12.23.
  - type: text
    content: 'Ne s''est-il trouvé que cet étranger pour revenir donner gloire à Dieu ? '
  '19':
  - type: note
    content: Cf. 7.50 ; 8.48 ; 18.42.
  - type: text
    content: 'Puis il lui dit : Lève-toi et va ; ta foi t''a sauvé.'
  - type: heading
    content: La venue du règne de Dieu
  '2':
  - type: note
    content: 'une pierre de moulin  : soit la petite meule d''un moulin manuel (v. 35), soit la grande meule tournée par une bête de somme (comme dans Mt et Mc) ; cf. Jg 9.53 ; Ap 18.21. –  s''il doit…  : litt. plutôt qu''il ne cause la chute…'
  - type: text
    content: 'Il serait avantageux pour lui qu''on lui attache autour du cou une pierre de moulin et qu''on le jette à la mer, s''il doit causer la chute de l''un de ces petits. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'les pharisiens 5.17+ ; cf. Ac 23.6ss. –  quand viendrait (litt. vient ) le règne (ou le royaume ) de Dieu 9.27+ ; 19.11 ; cf. 11.2 ; 22.18 ; voir aussi Dn 7.14,18 ; 9.2. –  l''observer  : sur le terme, voir 14.1+ ; cf. 11.29 ; 12.54ss ; 16.27ss ; Mc 13.32/ / ; Ac 1.7 ; 1Th 5.1 ; voir aussi Jn 3.3 ; 18.36 ; comparer avec Sagesse 8.8 : « Désire-t-on encore profiter d''une longue expérience ? Elle connaît le passé et conjecture l''avenir, elle sait interpréter les sentences et résoudre les énigmes, elle prévoit signes et prodiges, les moments et les temps favorables. »'
  - type: text
    content: 'Interrogé par les pharisiens pour savoir quand viendrait le règne de Dieu, il leur répondit : Le règne de Dieu ne vient pas de telle sorte qu''on puisse l''observer. '
  '21':
  - type: note
    content: 'il est ici… v. 23 ; Mc 13.21/ /. –  est (ou, selon certains, sera) au milieu de vous  : traduction incertaine ; ce n''est pas la formule habituellement traduite par au milieu de (2.46 ; 8.7 ; 10.3) ; cf. 11.20 ; Jn 1.26. On pourrait aussi comprendre à votre portée. L''interprétation classique est au dedans de vous, mais le contexte (réponse aux pharisiens, v. 20) ne semble pas la recommander. Le même terme désigne cependant l''intérieur en Mt 23.26 ; LXX l''utilise pour évoquer l''intériorité en Ps 39.4 ; 103.1 ; 109.22 ; cf. Evangile selon Thomas 3 : « Jésus a dit : “Si ceux qui vous guident vous disent : ‘Voici, le Royaume est dans le ciel’, alors les oiseaux du ciel vous précéderont ; s''ils vous disent qu''il est dans la mer, alors les poissons vous précéderont. Mais le Royaume est à l''intérieur de vous ; et il est à l''extérieur de vous. Lorsque vous vous connaîtrez, alors on vous connaîtra ; et vous saurez que c''est vous les fils du Père vivant. Si au contraire vous ne vous connaissez pas, alors vous êtes dans la pauvreté, et c''est vous la pauvreté.” » 113 : « Ses disciples lui demandèrent : “Quand le Royaume viendra-t-il ?” Jésus répondit : “Il ne viendra pas parce qu''on l''attend ; on ne dira pas : ‘Voici qu''il est ici’ ou ‘Voici qu''il est là.’ Plutôt, le Royaume du Père est répandu sur la terre, et les hommes ne le voient pas.” »'
  - type: text
    content: 'On ne dira même pas : « Regardez, il est ici ! », ou : « Il est là-bas ! » En effet, le règne de Dieu est au milieu de vous.'
  - type: heading
    content: Les jours du Fils de l'homme
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jn 7.34 ; Evangile selon Thomas 38 : « Jésus a dit : “Bien des fois vous avez désiré entendre ces paroles que je vous dis, sans avoir nul autre de qui les entendre. Il y aura des jours où vous me chercherez, mais vous ne me trouverez pas.” » –  Les jours viendront 5.35+. –  vous désirerez voir un seul des jours (cf. v. 26,28 ; 9.51) du Fils de l''homme (v. 24,26,30 ; 5.24+) : cf. Mt 10.23+ ; Ap 6.10. –  vous ne le verrez pas  : cf. v. 20.'
  - type: text
    content: 'Et il dit aux disciples : Les jours viendront où vous désirerez voir un seul des jours du Fils de l''homme, et vous ne le verrez pas.'
  - type: heading
    content: Mt 24.26-27  ; Mc 13.21-22
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 21 ; 19.11 ; 21.8s.
  - type: text
    content: 'On vous dira : « Il est là-bas ! » ou : « Il est ici ! » N''y allez pas, n''y courez pas. '
  '24':
  - type: note
    content: 'comme l''éclair…  : litt. comme l''éclair éclatant (9.29n) brille depuis (ce qui est) sous le ciel jusqu''à (ce qui est) dessous le ciel  ; cf. Testament de Lévi 18.4 : « Il (le Prêtre nouveau) resplendira comme le soleil sur la terre, il supprimera toutes ténèbres de dessous le ciel, et la paix régnera sur toute la terre. » –  en son jour  : cette précision est absente de certains mss.'
  - type: text
    content: 'En effet, comme l''éclair brille d''une extrémité du ciel à l''autre, ainsi sera le Fils de l''homme en son jour. '
  '25':
  - type: note
    content: Cf. 9.22+ ; 24.26. –  cette génération 7.31+.
  - type: text
    content: Mais il faut d'abord qu'il souffre beaucoup et qu'il soit rejeté par cette génération.
  - type: heading
    content: Mt 24.37-39
  '26':
  - type: text
    content: ' '
  - type: note
    content: Noé 3.36 ; 1P 3.20.
  - type: text
    content: 'Ce qui arriva aux jours de Noé arrivera de même aux jours du Fils de l''homme. '
  '27':
  - type: note
    content: 'Cf. Gn 6.11ss ; 7.7,10,17,21s ; 2P 2.5. –  hommes et femmes se mariaient  : litt. épousaient, étaient épousées  ; cf. 20.34ns.'
  - type: text
    content: Les gens mangeaient, buvaient, hommes et femmes se mariaient, jusqu'au jour où Noé entra dans l'arche ; le déluge vint et les fit tous disparaître.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Loth (Gn 11.27) à Sodome (v. 29) Gn 18.20s ; 19.1-15,23 ; 2P 2.6s ; voir Ez 16.46-52. –  mangeaient… 12.18s. –  achetaient 14.18s. –  vendaient 19.45.
  - type: text
    content: 'Il en sera aussi comme aux jours de Loth. Les gens mangeaient, buvaient, achetaient, vendaient, plantaient, construisaient, '
  '29':
  - type: note
    content: 'le jour où Loth sortit…  : cf. 9.5 ; Gn 19.15ss. –  pluie de feu et de soufre (c.-à-d. de soufre enflammé) Gn 19.24s ; cf. Dt 29.22s ; Es 30.33 ; Ez 38.22 ; Ps 11.6 ; Jb 18.15 ; Ap 9.17s ; 14.10+. –  tomba du ciel  : autre traduction il (Dieu) fit tomber du ciel une pluie… et les fit tous disparaître.'
  - type: text
    content: 'mais le jour où Loth sortit de Sodome, une pluie de feu et de soufre tomba du ciel et les fit tous disparaître. '
  '3':
  - type: note
    content: 'Prenez garde…  : cf. 12.1 ; 21.34. Cette phrase pourrait aussi être considérée comme l''introduction de ce qui suit. –  frère Ac 1.15 ; 6.3 ; 9.30 ; 10.23. –  a péché  : certains mss ajoutent contre toi. –  reprends-le  : le même verbe est traduit par rabrouer en 4.35n  ; cf. Lv 19.17 ; Mt 18.15n  ; Testament de Gad 6.3ss : « Aimez-vous les uns les autres de tout cœur, et si quelqu''un a péché contre toi, parle-lui calmement, en bannissant le venin de la haine et sans garder de ruse dans ton âme et, s''il avoue et se repent, pardonne-lui. Mais s''il nie, ne te querelle pas avec lui, de peur qu''il ne jure et que tu commettes un double péché… Si, tout en niant, il a honte, parce qu''il est convaincu de sa faute, cesse de lui faire des reproches. En effet, même en persistant dans ses dénégations, il se repent et ne commettra plus de faute envers toi, mais il te respectera, te craindra et se tiendra en paix. Mais s''il est effronté et persévère dans la malice, même dans ce cas pardonne-lui de tout cœur et laisse la vengeance à Dieu. » –  s''il change radicalement ou s''il se repent 3.3+. –  pardonne-lui  : cf. 5.20.'
  - type: text
    content: Prenez garde à vous-mêmes.
  - type: heading
    content: Le pardon
  - type: heading
    content: Mt 18.15,21-22
  - type: text
    content: 'Si ton frère a péché, reprends-le ; s''il change radicalement, pardonne-lui. '
  '30':
  - type: note
    content: Mt 24.39. –  sera révélé ou se révélera 1Co 1.7+.
  - type: text
    content: Il en sera de même le jour où le Fils de l'homme sera révélé.
  - type: heading
    content: Mt 24.17-18  ; Mc 13.15-16
  '31':
  - type: text
    content: ' '
  - type: note
    content: '21.21. –  terrasse  : voir Mt 24.17n. –  chez lui  : litt. dans sa maison . –  en arrière ou derrière , cf. 9.23n,62 ; Gn 19.17,26.'
  - type: text
    content: 'En ce jour-là, que celui qui sera sur le toit en terrasse et qui aura ses affaires chez lui ne descende pas pour les prendre ; et que celui qui sera aux champs ne retourne pas non plus en arrière. '
  '32':
  - type: note
    content: Gn 19.26n.
  - type: text
    content: 'Souvenez-vous de la femme de Loth. '
  '33':
  - type: note
    content: '9.24+. –  sauvegarder ou acquérir  ; même verbe Ac 20.28 ; 1Tm 3.13 ; terme apparenté Hé 10.39n, le mot traduit ici par vie étant rendu par âme dans ce texte ; le même verbe est employé par LXX en Jos 6.17 ; Ez 13.18s ; Ps 79.11 au sens de sauver une vie, laisser la vie sauve. –  la préservera  : autres traductions la fera vivre, l''engendrera à une vie nouvelle, même verbe Ac 7.19 (rester en vie) ; 1Tm 6.13 (donner la vie) ; LXX utilise le même verbe en Ex 1.17s,22 ; Jg 8.19 ; 1S 27.9,11 ; 1R 20.31 ; 2R 7.4, dans un sens analogue au verbe traduit par sauvegarder.'
  - type: text
    content: Celui qui cherchera à sauvegarder sa vie la perdra, et celui qui la perdra la préservera.
  - type: heading
    content: Mt 24.40-41
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 24.40ns. –  cette nuit-là  : autre traduction ce soir-là  ; cf. Mt 24.43 ; 25.6 ; Mc 13.35 ; 1Th 5.2. –  deux personnes ou deux hommes  ; le texte porte seulement deux , mais la suite est au masculin (litt. l''un et l''autre ). Le v. 35 présente une construction analogue avec le féminin. –  sur un même lit  : pour la nuit, ou éventuellement pour le repas du soir (7.36n). – Cf. Evangile selon Thomas 61 : « Jésus a dit : “Il y en aura deux qui se reposeront sur un lit : l''un mourra, et l''autre vivra.” Salomé dit : “Qui es-tu, homme, fils de qui ? Tu es monté sur mon lit et tu as mangé à ma table.” Jésus lui répondit : “Je suis celui qui est issu de celui qui demeure égal à lui-même. Il m''a été donné de ce qui est à mon Père.” Salomé dit : “Je suis ta disciple.” Jésus lui dit : “C''est pourquoi je dis : ‘Quand il sera réduit à l''unité, il sera rempli de lumière ; mais, tant qu''il sera divisé, il sera rempli de ténèbres.’” »'
  - type: text
    content: 'Je vous le dis, cette nuit-là, de deux personnes qui seront sur un même lit, l''une sera prise et l''autre laissée ; '
  '35':
  - type: note
    content: 'moudront v. 2n. –  ensemble  : même expression grecque Ac 1.15n.'
  - type: text
    content: 'de deux femmes qui moudront ensemble, l''une sera prise et l''autre laissée. [ '
  '36':
  - type: note
    content: 'Certains mss ajoutent  : de deux (hommes qui) seront dans un champ, l''un sera pris et l''autre laissé  ; cf. Mt 24.40.'
  - type: text
    content: '] '
  '37':
  - type: note
    content: 'Où  : cf. v. 20s,23. –  Seigneur 5.8,12. –  le corps  : dans le même sens de cadavre, 23.52,55 ; 24.3,23 ; Ac 9.40 ; Mt 24.27s emploie un autre mot. –  les vautours ou les aigles  : voir Mt 24.28n.'
  - type: text
    content: 'Ils lui dirent : Où donc, Seigneur ? Et il répondit : Où sera le corps, là se rassembleront les vautours.'
  '4':
  - type: note
    content: 'sept (cf. 8.2) fois par jour Ps 119.164 ; Mt 18.21. –  il revienne (à toi est omis dans certains mss) : le même verbe est traduit par ramener en 1.16s ; 22.32n. –  Je vais changer…  : autres traductions je regrette, je me repens.'
  - type: text
    content: 'Et s''il pèche contre toi sept fois par jour, et que sept fois il revienne à toi, en disant : « Je vais changer radicalement », tu lui pardonneras.'
  - type: heading
    content: La foi
  - type: heading
    content: Mt 17.19-20
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'apôtres 6.13n  ; 22.14. –  dirent  : cf. 11.1 ; 12.41. –  Seigneur 7.13+. –  Donne-nous plus de foi (5.20+) : litt. ajoute-nous la foi , ce qui pourrait aussi signifier accorde-nous la foi en plus de ce que nous avons déjà  ; cf. Mc 9.24.'
  - type: text
    content: 'Les apôtres dirent au Seigneur : Donne-nous plus de foi. '
  '6':
  - type: note
    content: 'Cf. Mt 21.21 ; Mc 11.22s ; 1Co 13.2. –  graine de moutarde 13.19+. –  ce mûrier  : le nom grec de cet arbre est aussi employé dans LXX pour traduire le mot hébreu désignant le sycomore (1R 10.27 ; 1Ch 27.28 ; 2Ch 1.15 ; 9.27). Mais Lc donne au sycomore son nom grec habituel en 19.4. –  Déracine-toi / plante-toi  : cf. Jr 1.10.'
  - type: text
    content: 'Le Seigneur répondit : Si vous aviez de la foi comme une graine de moutarde, vous diriez à ce mûrier : « Déracine-toi et plante-toi dans la mer », et il vous obéirait.'
  - type: heading
    content: L'esclave qui n'a fait que son devoir
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Comparer avec 12.37. –  quand il rentre des champs  : cf. 15.25.'
  - type: text
    content: 'Qui de vous, s''il a un esclave qui laboure ou fait paître les troupeaux, lui dira, quand il rentre des champs : « Viens tout de suite te mettre à table ! » '
  '8':
  - type: note
    content: 'mets-toi en tenue…  : litt. t''étant ceint, sers-moi, voir 12.35n,37n  ; sur le verbe traduit par servir (du service aux tables, puis plus généralement du ministère chrétien), voir Ac 6.1n.'
  - type: text
    content: 'Ne lui dira-t-il pas au contraire : « Prépare-moi à dîner, mets-toi en tenue pour me servir, jusqu''à ce que j''aie mangé et bu ; après cela, toi aussi, tu pourras manger et boire. » '
  '9':
  - type: note
    content: 'Saura-t-il gré ou aura-t-il de la reconnaissance  : cf. 6.32nss. – A la fin du v. certains mss ajoutent Je ne le pense pas.'
  - type: text
    content: 'Saura-t-il gré à cet esclave d''avoir fait ce qui lui était ordonné ? '
