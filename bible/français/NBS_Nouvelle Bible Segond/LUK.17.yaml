      - type: text
        text: 'servir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (du service aux tables, puis plus généralement du ministère chrétien), voir Ac 6.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne lui dira-t-il pas au contraire : « Prépare-moi à dîner, mets-toi en tenue pour me servir, jusqu''à ce que j''aie mangé et bu ; après cela, toi aussi, tu pourras manger et boire. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saura-t-il gré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aura-t-il de la reconnaissance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 'ss. – A la fin du v. certains mss ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Je ne le pense pas.
    marker-yv: yv-n
  - type: text
    text: 'Saura-t-il gré à cet esclave d''avoir fait ce qui lui était ordonné ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
