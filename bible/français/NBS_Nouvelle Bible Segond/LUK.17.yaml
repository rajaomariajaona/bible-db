      children:
      - type: text
        text: '  : cf. 21.31 ; 22.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: inutiles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; on a aussi compris'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de simples esclaves, des esclaves sans mérite, quelconques, non indispensables
    - type: usfm
      marker: ft
      children:
