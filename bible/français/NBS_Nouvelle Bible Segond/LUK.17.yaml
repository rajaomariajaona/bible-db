    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : soit la petite meule d''un moulin manuel (v. 35), soit la grande meule tournée par une bête de somme (comme dans Mt et Mc) ; cf. Jg 9.53 ; Ap 18.21. –  '
