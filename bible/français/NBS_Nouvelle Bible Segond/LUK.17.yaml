    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(1R 10.27 ; 1Ch 27.28 ; 2Ch 1.15 ; 9.27). Mais Lc donne au sycomore son nom grec habituel en 19.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Déracine-toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plante-toi
    - type: usfm
      marker: ft
