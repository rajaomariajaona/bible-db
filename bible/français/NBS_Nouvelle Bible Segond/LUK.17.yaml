        text: '  ; même terme Mt 25.30 ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' emploie le terme en 2S 6.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' (pour David qui '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'abaisse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui devient '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sans valeur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aux yeux de Mikal, selon le texte grec).
    marker-yv: yv-n
  - type: text
    text: 'De même, vous aussi, quand vous aurez fait tout ce qui vous a été ordonné, dites : « Nous sommes des esclaves inutiles, nous avons fait ce que nous devions faire. »'
