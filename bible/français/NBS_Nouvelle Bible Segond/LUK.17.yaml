      - type: text
        text: '61 : « Jésus a dit : “Il y en aura deux qui se reposeront sur un lit : l''un mourra, et l''autre vivra.” Salomé dit : “Qui es-tu, homme, fils de qui ? Tu es monté sur mon lit et tu as mangé à ma table.” Jésus lui répondit : “Je suis celui qui est issu de celui qui demeure égal à lui-même. Il m''a été donné de ce qui est à mon Père.” Salomé dit : “Je suis ta disciple.” Jésus lui dit : “C''est pourquoi je dis : ‘Quand il sera réduit à l''unité, il sera rempli de lumière ; mais, tant qu''il sera divisé, il sera rempli de ténèbres.’” »'
    marker-yv: yv-n
