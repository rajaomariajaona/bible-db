          text: Testament
      - type: text
        text: ' de Gad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.3ss : « Aimez-vous les uns les autres de tout cœur, et si quelqu''un a péché contre toi, parle-lui calmement, en bannissant le venin de la haine et sans garder de ruse dans ton âme et, s''il avoue et se repent, pardonne-lui. Mais s''il nie, ne te querelle pas avec lui, de peur qu''il ne jure et que tu commettes un double péché… Si, tout en niant, il a honte, parce qu''il est convaincu de sa faute, cesse de lui faire des reproches. En effet, même en persistant dans ses dénégations, il se repent et ne commettra plus de faute envers toi, mais il te respectera, te craindra et se tiendra en paix. Mais s''il est effronté et persévère dans la malice, même dans ce cas pardonne-lui de tout cœur et laisse la vengeance à Dieu. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''il '
      - type: usfm
        marker: w
        children:
        - type: text
          text: change
      - type: text
        text: ' radicalement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 's''il se repent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pardonne-lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.20.'
    marker-yv: yv-n
  - type: text
    text: Prenez garde à vous-mêmes.
