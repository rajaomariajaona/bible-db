        text: '3 : « Jésus a dit : “Si ceux qui vous guident vous disent : ‘Voici, le Royaume est dans le ciel’, alors les oiseaux du ciel vous précéderont ; s''ils vous disent qu''il est dans la mer, alors les poissons vous précéderont. Mais le Royaume est à l''intérieur de vous ; et il est à l''extérieur de vous. Lorsque vous vous connaîtrez, alors on vous connaîtra ; et vous saurez que c''est vous les fils du Père vivant. Si au contraire vous ne vous connaissez pas, alors vous êtes dans la pauvreté, et c''est vous la pauvreté.” » 113 : « Ses disciples lui demandèrent : “Quand le Royaume viendra-t-il ?” Jésus répondit : “Il ne viendra pas parce qu''on l''attend ; on ne dira pas : ‘Voici qu''il est ici’ ou ‘Voici qu''il est là.’ Plutôt, le Royaume du Père est répandu sur la terre, et les hommes ne le voient pas.” »'
