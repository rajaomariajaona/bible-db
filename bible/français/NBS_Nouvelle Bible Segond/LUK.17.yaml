    marker-yv: yv-n
  - type: text
    text: 'Qui de vous, s''il a un esclave qui laboure ou fait paître les troupeaux, lui dira, quand il rentre des champs : « Viens tout de suite te mettre à table ! » '
  - type: usfm
    marker: vlbl
