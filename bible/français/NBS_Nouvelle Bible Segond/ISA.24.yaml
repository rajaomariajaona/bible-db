document_id: ISA.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Bouleversement et deuil sur la terre
  - type: text
    content: ' '
  - type: note
    content: vide (19.3n) la terre ou le pays  ; cf. Na 2.3n,11.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vide la terre et la dépeuple,'
  - type: text
    content: 'il en bouleverse la surface, il en disperse les habitants :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'ville du chaos ou ville déserte, ville du néant  ; le terme hébreu tohou (cf. 29.21, sans fondement  ; 34.11 ; 40.17,23 ; 45.18s ; 49.4 ; 59.4 ; Gn 1.2n) s''applique souvent aux idoles (cf. Es 41.29 ; 44.9 ; voir aussi 1S 12.21, néant ). On ne peut identifier avec certitude la ville dont il est question ici : cf. 16.7-10 ; 21.9 ; 25.2 ; 26.1,5 ; 32.14 ; Ap 17.5.'
  - type: text
    content: La ville du chaos est démolie.
  - type: text
    content: Toutes les maisons sont fermées,
  - type: text
    content: on n'y entre plus.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'parce que le vin manque  : litt. sur le vin. –  du pays (celui qui a pour capitale la ville du v. 10 ?) ou de la terre  ; cf. v. 1n.'
  - type: text
    content: On crie dans les rues,
  - type: text
    content: parce que le vin manque,
  - type: text
    content: toute joie s'est assombrie,
  - type: text
    content: la gaieté du pays est exilée.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 51.58. –  dévastation 1.7+.
  - type: text
    content: Il ne reste que dévastation dans la ville,
  - type: text
    content: et les portes abattues sont en ruine.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 17.6.
  - type: text
    content: Car il en est dans le pays, au milieu des peuples,
  - type: text
    content: comme lors du gaulage de l'olivier,
  - type: text
    content: comme lors du grappillage quand la vendange est achevée.
  - type: heading
    content: Une joie prématurée
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'ceux-ci  : probablement le reste sauvé d''Israël ; cf. 12.6. –  de l''ouest  : litt. de la mer  ; cf. Gn 12.8n. –  pour la majesté  : le terme hébreu a habituellement le sens d’ orgueil ou de fierté  ; cf. 2.10,19,21 ; 60.15 ; voir aussi Ex 15.7 ; Mi 5.3 ; Ps 47.5n.'
  - type: text
    content: Mais ceux-ci élèvent la voix,
  - type: text
    content: ils poussent des cris de joie ;
  - type: text
    content: de l'ouest ils poussent des cris d'allégresse
  - type: text
    content: 'pour la majesté du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'dans les lieux où brille la lumière  : litt. dans les lumières (du soleil levant ou couchant ?). –  îles 11.11+.'
  - type: text
    content: 'Glorifiez donc le '
  - type: text
    content: Seigneur
  - type: text
    content: dans les lieux où brille la lumière,
  - type: text
    content: 'le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu d''Israël,'
  - type: text
    content: dans les îles de la mer !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'les extrémités  : litt. l''aile  ; cf. 11.12n. –  Honneur  : le mot est habituellement traduit par ornement ou beauté  ; cf. 4.2 ; 13.19 ; 23.9 ; 28.1,4,5n. – Le juste peut être Dieu (45.21 ; cf. Ps 7.10,12 ; 11.7 ; 116.5 ; 119.137 ; 129.4 ; 145.17) ou Israël (26.2 ; 60.21 ; Ps 14.5 ; 97.11 ; 112.6) ; voir aussi Ha 2.4. –  Je suis perdu  : le terme hébreu n''apparaît qu''ici. Certains comprennent  : je connais le secret. –  Quel malheur pour moi ! 6.5. –  traîtres / trahissent / trahison  : cf. 21.2n  ; 33.1n.'
  - type: text
    content: Depuis les extrémités de la terre
  - type: text
    content: 'nous entendons des chants :'
  - type: text
    content: « Honneur au juste ! »
  - type: text
    content: 'Mais moi, je dis : Je suis perdu !'
  - type: text
    content: Je suis perdu ! Quel malheur pour moi !
  - type: text
    content: Des traîtres trahissent ;
  - type: text
    content: trahison ! Des traîtres trahissent.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 48.43s. –  frayeur / fosse / filet  : hébreu pahad / pahath / pah. Sur l''assonance, cf. 22.5n  ; Lm 3.47. –  habitant de la terre ou du pays  : cf. v. 1n,5s ; 26.21.'
  - type: text
    content: La frayeur, la fosse et le filet
  - type: text
    content: sont sur toi, habitant de la terre !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Am 5.19. –  fenêtres (cf. 60.8n) d''en haut  : cf. Gn 7.11n. –  les fondations… Ps 18.8,16 ; 82.5.'
  - type: text
    content: Celui qui fuit le bruit de la frayeur
  - type: text
    content: tombe dans la fosse,
  - type: text
    content: et celui qui monte de la fosse
  - type: text
    content: est pris au filet ;
  - type: text
    content: car les fenêtres d'en haut s'ouvrent,
  - type: text
    content: et les fondations de la terre tremblent.
  '19':
  - type: text
    content: ' '
  - type: note
    content: LXX la terre est accablée de détresse, la terre est dans la perplexité  ; cf. Lc 24.25n.
  - type: text
    content: La terre se fissure,
  - type: text
    content: la terre craque,
  - type: text
    content: la terre vacille,
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.2s ; Os 4.9.
  - type: text
    content: il en est du prêtre comme du peuple,
  - type: text
    content: du maître comme du serviteur,
  - type: text
    content: de la maîtresse comme de la servante,
  - type: text
    content: du vendeur comme de l'acheteur,
  - type: text
    content: du prêteur comme de l'emprunteur,
  - type: text
    content: du créancier comme du débiteur.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'titube / branlante 10.29. –  comme une cabane  : litt. comme la cabane  ; cf. 1.8. –  sa transgression pèse Ps 38.5 ; voir péché. –  elle tombe… Am 5.2.'
  - type: text
    content: la terre titube comme titube l'ivrogne,
  - type: text
    content: elle est branlante comme une cabane ;
  - type: text
    content: sa transgression pèse sur elle,
  - type: text
    content: elle tombe et ne se relève plus.
  - type: heading
    content: Fin des empires, début du règne de Dieu
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'fera rendre des comptes  : le verbe est parfois traduit par visiter, intervenir  ; voir v. 22n. –  l''armée d''en haut  : cette expression désigne aussi bien les astres (v. 23 ; cf. Gn 2.1 ; Dt 4.19) que les personnages surnaturels des religions orientales (cf. Jd 13). Voir aussi 14.12-15 ; Ps 2.2.'
  - type: text
    content: 'En ce jour-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera rendre des comptes'
  - type: text
    content: en haut à l'armée d'en haut,
  - type: text
    content: et sur la terre aux rois de la terre.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'cachot  : cf. Gn 40.15 ; Ex 12.29 ; Jr 37.11. –  enfermés  : cf. 2P 2.4 ; Jd 6. –  rendront des comptes (comme au v. 21n) : le verbe peut être pris en mauvaise part (cf. 10.3n,12n  ; 13.4n,11n  ; 26.14,21 ; 27.1-3) ou en bonne part (23.17 ; 26.16n  ; 34.16), même au sens de faire grâce (Jr 6.15n).'
  - type: text
    content: On les réunira
  - type: text
    content: comme des prisonniers dans un cachot,
  - type: text
    content: ils seront enfermés dans une forteresse,
  - type: text
    content: et, après un grand nombre de jours,
  - type: text
    content: ils rendront des comptes.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'est ou sera , de même dans la suite. –  La lune / le soleil  : litt. la blanche / la chaude (comme en 30.26n  ; Jb 30.28 ; Ct 6.10) ; cf. v. 21. –  rougit  : de honte, cf. 1.29 ; 33.9 ; 54.4. –  est roi (Ps 93.1+) au mont Sion Mi 4.7. –  la gloire pourrait désigner Dieu lui-même ; autre traduction il y a (ou il y aura ) de la gloire en face de ses anciens  ; cf. 4.5 ; 60.1-3 ; cf. Ex 24.9s ; Ap 4.2-4 ; 19.4-6.'
  - type: text
    content: La lune rougit,
  - type: text
    content: le soleil a honte ;
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées est roi'
  - type: text
    content: au mont Sion, à Jérusalem,
  - type: text
    content: et la gloire est en face de ses anciens.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'c''est le Seigneur …  : cf. 1.2n  ; 14.26.'
  - type: text
    content: La terre est complètement vidée, totalement pillée
  - type: text
    content: '– c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: '33.9 ; Os 4.3. –  les gens haut placés…  : litt. la hauteur du peuple de la terre (ou du pays ). Avec d''autres voyelles, certains lisent  : la hauteur (c.-à-d. le ciel , cf. v. 18,21, en haut ) avec la terre. Voir aussi 26.5.'
  - type: text
    content: La terre est dans le deuil, épuisée,
  - type: text
    content: le monde épuisé dépérit,
  - type: text
    content: ils dépérissent, les gens haut placés de la terre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'profanée  : terme apparenté au mot pour impie en 9.16+ ; cf. 32.6 ; Nb 35.33 ; Jr 3.1+ss ; Mi 4.11 ; Ps 106.38 ; Dn 11.32. –  par  : litt. sous. – Voir loi. –  l''alliance perpétuelle ou éternelle  ; autre traduction l''alliance d''autrefois  ; cf. 55.3 ; 61.8 ; Jr 32.40 ; 50.5 ; Ez 16.60 ; 37.26 ; il s''agit en tout cas ici d''une alliance déjà conclue, soit pour toute la terre (cf. Gn 9.16), soit pour Israël (Gn 17.7,13,19 ; Ex 31.16 ; Lv 24.8 ; Ps 105.10 ; 1Ch 16.17) ; cf. Hé 13.20.'
  - type: text
    content: La terre a été profanée par ses habitants ;
  - type: text
    content: car ils passaient outre aux lois,
  - type: text
    content: altéraient les prescriptions,
  - type: text
    content: ils rompaient l'alliance perpétuelle.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'la malédiction  : sur le terme hébreu correspondant, cf. Lv 5.1n  ; Nb 5.21n  ; 1R 8.31n. –  doivent faire réparation  : autres traductions doivent payer, sont coupables, sont condamnés  ; cf. Lv 5.6n. –  consumés  : litt. brûlés (même verbe en Ez 15.5 ; 24.10s) ; cf. Lv 26.15s.'
  - type: text
    content: C'est pourquoi la malédiction dévore la terre,
  - type: text
    content: ses habitants doivent faire réparation ;
  - type: text
    content: c'est pourquoi les habitants de la terre sont consumés,
  - type: text
    content: et il ne reste qu'un petit nombre d'hommes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '16.9s ; 32.12. –  vin  : autre traduction vin nouveau , cf. Gn 27.28n.'
  - type: text
    content: Le vin est en deuil,
  - type: text
    content: la vigne dépérit ;
  - type: text
    content: tous ceux qui avaient le cœur joyeux soupirent.
  '8':
  - type: text
    content: La gaieté des tambourins a cessé,
  - type: text
    content: le vacarme de la liesse a pris fin,
  - type: text
    content: la gaieté de la lyre a cessé.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 5.11+ ; Am 6.5-7.
  - type: text
    content: On ne boit plus de vin en chantant,
  - type: text
    content: l'alcool est amer au buveur.
