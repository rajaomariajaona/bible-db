document_id: ISA.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange au Dieu sauveur
  - type: text
    content: ' '
  - type: note
    content: Tu diras en ce jour-là 25.9 ; 26.1 ; 27.2 ; cf. 52.6 ; Za 12.3+. – 10.25 (cf. 5.25+) ; Jr 33.10s ; Ps 118.21.
  - type: text
    content: 'Tu diras en ce jour-là :'
  - type: text
    content: 'Je te célèbre, '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: tu as été en colère contre moi,
  - type: text
    content: mais ta colère s'en est retournée,
  - type: text
    content: tu m'as consolé.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu (hébreu ’El , cf. Gn 21.33n) de mon salut  : cf. 43.3+ ; Ps 27.1. –  le Seigneur …  : cf. 26.4 ; voir aussi 38.11n. –  est ma force et ma puissance ou mon chant  : cf. v. 5n  ; 51.3 ; Ex 15.2n  ; Ps 118.14.'
  - type: text
    content: C'est le Dieu de mon salut ;
  - type: text
    content: j'ai confiance, rien ne m'effraie.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah), le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), est ma force et ma puissance,'
  - type: text
    content: il est mon salut.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.6 ; 55.1 ; Jg 5.11 ; Jr 2.13 ; 17.13 ; Ez 47.1 ; Jl 4.18 ; Za 14.8 ; Ps 36.9s ; Jn 4.14 ; 9.11. D'après la tradition juive, les expressions des v. 2s appartenaient au rituel de la fête de la Récolte (Ex 23.16) ou fête des Huttes (Lv 23.34).
  - type: text
    content: Vous puiserez de l'eau gaiement
  - type: text
    content: aux sources du salut.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'invoquez ou proclamez  ; cf. Ps 105.1 ; 148.13 ; Jn 17.6. –  ses hauts faits Ps 9.12n. –  rappelez…  : autre traduction évoquez-le, car son nom est sublime (litt. élevé ).'
  - type: text
    content: 'En ce jour-là, vous direz :'
  - type: text
    content: 'Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', invoquez son nom,'
  - type: text
    content: faites connaître parmi les peuples ses hauts faits,
  - type: text
    content: rappelez combien son nom est sublime !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Chantez  : sur ce verbe, qui rappelle le mot traduit par puissance au v. 2n, cf. Ps 7.18n. –  connues par toute la terre 11.9.'
  - type: text
    content: 'Chantez le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: car il a fait des choses magnifiques.
  - type: text
    content: Qu'elles soient connues par toute la terre !
  '6':
  - type: text
    content: ' '
  - type: note
    content: cris de joie… 52.8s ; 54.1. –  Saint d'Israël 1.4+ ; cf. Os 11.9.
  - type: text
    content: Triomphe et pousse des cris de joie, habitante de Sion !
  - type: text
    content: Car il est grand en ton sein, le Saint d'Israël !
