document_id: EST.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vengeance des Juifs
  - type: text
    content: ' '
  - type: note
    content: '8.11s. –  il y eut un retournement de situation ou un changement (cf. v. 22), un bouleversement (même terme en Gn 19.25+). –  ceux qui les détestaient  : cf. v. 5,16 ; voir aussi 8.11+ ; 2S 22.41.'
  - type: text
    content: 'Le treizième jour du douzième mois (le mois d''Adar), quand l''ordre et l''édit du roi devaient entrer en vigueur, le jour où les ennemis des Juifs espéraient se rendre maîtres d''eux, il y eut un retournement de situation : ce sont les Juifs qui se rendirent maîtres de ceux qui les détestaient. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'fils de Haman v. 14+ ; 5.11. –  on ne porta (ou ils ne portèrent ) pas la main (v. 1s) sur le butin  : autre traduction on ne se livra pas au pillage  ; cf. v. 15s ; 8.11 ; voir aussi 3.9n.'
  - type: text
    content: 'les dix fils de Haman, fils de Hammedata, adversaire des Juifs, furent tués. Mais on ne porta pas la main sur le butin. '
  '11':
  - type: note
    content: 'Le jour même  : litt. en ce jour-là, cf. Es 12.1+.'
  - type: text
    content: Le jour même, le nombre de ceux qui avaient été tués à Suse la citadelle parvint au roi.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'demande / requête  : cf. 5.6 ; 7.2.'
  - type: text
    content: 'Le roi dit à la reine Esther : A Suse la citadelle, les Juifs ont tué, ils ont fait disparaître cinq cents hommes et les dix fils de Haman. Que n''auront-ils pas fait dans le reste des provinces royales ! Mais quelle est ta demande ? Elle te sera accordée ! Quelle est encore ta requête ? Elle sera exaucée. '
  '13':
  - type: note
    content: 'comme aujourd''hui  : litt. comme la loi (ou l''édit) d''aujourd''hui  ; cf. v. 15+. –  qu''on pende v. 25 ; 2.23+ ; 7.9s ; sur l''exposition (infamante) de cadavres, cf. Jos 10.26 ; 1S 31.10 ; 2S 4.12.'
  - type: text
    content: 'Esther répondit : Si cela te semble bon, ô roi, qu''il soit aussi permis aux Juifs de Suse d''agir demain comme aujourd''hui, et qu''on pende les dix fils de Haman à la potence ! '
  '14':
  - type: note
    content: 3.15 ; 8.14.
  - type: text
    content: 'Le roi dit de faire ainsi. On publia l''édit à Suse, et les dix fils de Haman furent pendus. '
  '15':
  - type: note
    content: 'de Suse  : cf. v. 6. –  le quatorzième jour v. 17-19,21 ; cf. 2 Maccabées 15.36 : « Ils décrétèrent tous par un vote public de ne pas laisser passer ce jour (celui de la victoire de Judas Maccabée sur Nikanor) sans le signaler, mais de célébrer le treizième jour du douzième mois, appelé Adar en araméen, la veille du jour dit de Mardochée. » –  ils ne portèrent pas la main… v. 10+.'
  - type: text
    content: Les Juifs de Suse se rassemblèrent donc aussi le quatorzième jour du mois d'Adar et tuèrent trois cents hommes ; mais ils ne portèrent pas la main sur le butin.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'défendre leur vie 8.11n. –  se débarrasser  : litt. être en repos , cf. v. 18 ; de même au v. 22.'
  - type: text
    content: 'Les autres Juifs, ceux des provinces royales, se rassemblèrent pour défendre leur vie et se débarrasser de leurs ennemis. Ils tuèrent soixante-quinze mille de ceux qui les détestaient – mais ils ne portèrent pas la main sur le butin – '
  '17':
  - type: note
    content: banquet 1.3n  ; 8.15-17.
  - type: text
    content: 'le treizième jour du mois d''Adar. En repos le quatorzième jour, ils en firent un jour de banquet et de joie. '
  '18':
  - type: note
    content: V. 15+.
  - type: text
    content: 'Quant aux Juifs de Suse, ils se rassemblèrent le treize et le quatorze ; en repos le quinze, ils en firent un jour de banquet et de joie. '
  '19':
  - type: note
    content: 'des campagnes  : le mot hébreu est très proche de celui qui est traduit par sans murailles  ; cf. Dt 3.5+. – Voir calendrier et fêtes. –  cadeaux  : le même mot est traduit par nourriture en 2.9n  ; cf. v. 22 ; Né 8.10-12 ; Ap 11.10.'
  - type: text
    content: C'est pourquoi les Juifs des campagnes, ceux qui habitent des villes sans murailles, font du quatorzième jour du mois d'Adar un jour de joie, de banquet et de fête où chacun envoie des cadeaux à son voisin.
  - type: heading
    content: Institution d'une fête commémorative
  '2':
  - type: note
    content: 'porter la main sur 2.21+. –  la frayeur des Juifs  : litt. leur frayeur  ; cf. 8.17n.'
  - type: text
    content: 'Dans leurs villes, dans toutes les provinces du roi Xerxès, les Juifs se rassemblèrent pour porter la main sur ceux qui cherchaient leur malheur. Personne ne put tenir devant eux, car la frayeur des Juifs s''était abattue sur tous les peuples. '
  '20':
  - type: text
    content: 'Mardochée écrivit cela dans des lettres qu''il envoya à tous les Juifs de toutes les provinces du roi Xerxès, proches et lointaines, '
  '21':
  - type: note
    content: V. 15+.
  - type: text
    content: 'pour qu''ils observent l''institution du quatorzième jour du mois d''Adar, ainsi que du quinzième, d''année en année. '
  '22':
  - type: note
    content: 's''étaient débarrassés ou avaient eu du repos  ; cf. v. 16n. –  leur chagrin s''était changé (v. 1n) en joie  : cf. 8.17 ; Ps 30.12 ; Pr 11.10 ; Jn 16.20. –  cadeaux v. 19n.'
  - type: text
    content: 'A l''exemple de ces journées où les Juifs s''étaient débarrassés de leurs ennemis, en ce mois où leur chagrin s''était changé en joie, et leur deuil en fête, ils devaient en faire des jours de banquet et de joie où chacun envoie des cadeaux à son voisin et fait des dons aux pauvres. '
  '23':
  - type: note
    content: 'firent une tradition  : le verbe hébreu a donné le mot kabbale ou cabale. –  de leur célébration initiale  : litt. de ce qu''ils avaient commencé à faire. –  et de ce que Mardochée leur avait écrit  : on pourrait aussi comprendre cette formule comme l''introduction des v. 24s, qui donneraient alors la teneur même de l''écrit de Mardochée.'
  - type: text
    content: 'Les Juifs firent une tradition de leur célébration initiale et de ce que Mardochée leur avait écrit. '
  '24':
  - type: note
    content: 'Agaguite 3.1n. –  adversaire 3.10+. –  tiré  : litt. fait tomber, cf. 6.13n. –  le Pour, c''est-à-dire le sort 3.7n. –  les frapper de panique  : cf. Ex 14.24 ; 23.27 ; Dt 2.15n  ; le verbe hébreu fait assonance avec le nom de Haman.'
  - type: text
    content: 'Car Haman, fils de Hammedata, l''Agaguite, adversaire de tous les Juifs, avait conçu le plan de faire disparaître les Juifs. Il avait tiré le Pour, c''est-à-dire le sort, pour les frapper de panique et les faire disparaître. '
  '25':
  - type: note
    content: 'lorsque l''affaire fut présentée…  : litt. lorsqu''elle arriva devant le roi  ; on pourrait aussi comprendre comme Vg, Syr lorsque Esther arriva devant le roi. –  retombe  : litt. revienne  ; cf. 3.5-15 ; 6.5-13 ; 7.9s ; Ps 7.17. –  ainsi que ses fils  : cf. v. 10,13s.'
  - type: text
    content: 'Mais lorsque l''affaire fut présentée devant le roi, celui-ci ordonna par écrit : Que le plan funeste qu''il a conçu contre les Juifs retombe sur sa tête ! Qu''on le pende à la potence, ainsi que ses fils ! '
  '26':
  - type: note
    content: V. 24+.
  - type: text
    content: 'C''est pourquoi on a appelé ces jours-là Pourim, d''après le nom du Pour. Ainsi, à cause de tout ce que disait cette lettre, de ce qu''ils avaient vu et de ce qui leur était arrivé, '
  '27':
  - type: note
    content: 'ceux qui se joindraient à eux 8.17. –  ces deux jours  : cf. v. 13-21.'
  - type: text
    content: 'les Juifs instituèrent une tradition irrévocable pour eux, pour leur descendance et pour ceux qui se joindraient à eux : on célébrerait ces deux jours selon ce qui est écrit, au temps fixé, d''année en année. '
  '28':
  - type: note
    content: 'irrévocables  : cf. 1.19+. –  commémoration  : autres traductions évocation ; souvenir  ; cf. Ex 3.15n  ; 12.14 ; Lv 23.24.'
  - type: text
    content: Ces jours seraient commémorés et célébrés de génération en génération, dans chaque clan, dans chaque province, dans chaque ville. Ces jours des Pourim sont irrévocables parmi les Juifs, leur commémoration ne se perdra pas dans leur descendance.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'La reine Esther / le Juif Mardochée  : cf. 8.7. –  Abihaïl 2.15. –  écrivirent  : litt. écrivit (au féminin). –  avec toute leur autorité  : traduction incertaine ; on pourrait aussi comprendre toutes les choses prodigieuses (qui étaient arrivées) ; le même mot est traduit par puissance en 10.2. –  seconde lettre  : cf. v. 20-22 ; 3.13 ; 8.5-13.'
  - type: text
    content: 'La reine Esther, fille d''Abihaïl, et le Juif Mardochée écrivirent avec toute leur autorité afin de confirmer cette seconde lettre des Pourim. '
  '3':
  - type: note
    content: Cf. 3.12+.
  - type: text
    content: 'Tous les princes des provinces, les satrapes, les gouverneurs et les fonctionnaires du roi soutinrent les Juifs, car la frayeur de Mardochée s''était abattue sur eux. '
  '30':
  - type: note
    content: '1.1+. –  on envoya  : autre traduction il envoya. –  paix / loyauté (le même mot est aussi traduit par vérité) : cf. Es 32.17s ; Ps 85.9,11n  ; 122.6,8. – Ce v. est absent de LXX.'
  - type: text
    content: 'A tous les Juifs des cent vingt-sept provinces du royaume de Xerxès on envoya des lettres, messages de paix et de loyauté ; '
  '31':
  - type: note
    content: 'pour eux-mêmes  : autre traduction pour leur propre vie (sur le terme hébreu correspondant, cf. Gn 1.20n). –  jeûne / lamentations (litt. cri) 4.1ss.'
  - type: text
    content: 'pour instituer ces jours des Pourim à leur date, comme le Juif Mardochée et la reine Esther les avaient institués, comme ils les avaient institués pour eux-mêmes et pour leur descendance, des jours de jeûne et de lamentations. '
  '32':
  - type: note
    content: 'L''histoire  : autre traduction l''ordre. –  dans ce livre  : litt. dans le livre (cf. v. 29 ; 10.2 ; 1R 14.19,29). Esther grec F.11 : « La quatrième année du règne de Ptolémée et de Cléopâtre, Dosithos, se déclarant prêtre et lévite, ainsi que son fils Ptolémée apportèrent la lettre ci-dessus. Ils affirmaient que celle-ci était la lettre des Destinées et qu''elle avait été traduite par Lysimaque, fils de Ptolémée, de ceux de Jérusalem. »'
  - type: text
    content: L'histoire d'Esther institue le rituel des Pourim ; c'est pourquoi elle est écrite dans ce livre.
  '4':
  - type: note
    content: 'dans la maison du roi  : cf. 3.1n  ; 2S 22.44.'
  - type: text
    content: En effet, Mardochée était devenu un homme important dans la maison du roi. Sa renommée se répandait dans toutes les provinces, car c'était un homme de plus en plus important.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ce v. est absent de LXX.
  - type: text
    content: 'Ainsi les Juifs frappèrent tous leurs ennemis à coups d''épée, ils les tuèrent, ils les firent disparaître ; ils traitèrent à leur gré ceux qui les détestaient. '
  '6':
  - type: note
    content: Suse la citadelle 1.2n  ; cf. v. 12,15.
  - type: text
    content: Rien qu'à Suse la citadelle, les Juifs tuèrent, ils firent disparaître cinq cents hommes,
  '7':
  - type: text
    content: ' '
  - type: note
    content: Les dix noms sont habituellement disposés sur deux colonnes dans les mss hébreux.
  - type: text
    content: et Parshandatha,
  - type: text
    content: et Dalphôn,
  - type: text
    content: et Aspata,
  '8':
  - type: text
    content: et Porata,
  - type: text
    content: et Adalia,
  - type: text
    content: et Aridata,
  '9':
  - type: text
    content: et Parmashta,
  - type: text
    content: et Arizaï,
  - type: text
    content: et Aridaï,
  - type: text
    content: et Vaïzata,
