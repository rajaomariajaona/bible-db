verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vengeance des Juifs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.11s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il y eut un retournement de situation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un changement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 22), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un bouleversement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même terme en Gn 19.25+). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux qui les détestaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 5,16 ; voir aussi 8.11+ ; 2S 22.41.'
      marker-yv: yv-n
    - type: text
      text: 'Le treizième jour du douzième mois (le mois d''Adar), quand l''ordre et l''édit du roi devaient entrer en vigueur, le jour où les ennemis des Juifs espéraient se rendre maîtres d''eux, il y eut un retournement de situation : ce sont les Juifs qui se rendirent maîtres de ceux qui les détestaient. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fils de Haman '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 14+ ; 5.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on ne porta '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ne portèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas la main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 1s) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur le butin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on ne se livra pas au pillage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 15s ; 8.11 ; voir aussi 3.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'les dix fils de Haman, fils de Hammedata, adversaire des Juifs, furent tués. Mais on ne porta pas la main sur le butin. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le jour même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en ce jour-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Es 12.1+.'
      marker-yv: yv-n
    - type: text
      text: Le jour même, le nombre de ceux qui avaient été tués à Suse la citadelle parvint au roi.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'demande '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: requête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 5.6 ; 7.2.'
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit à la reine Esther : A Suse la citadelle, les Juifs ont tué, ils ont fait disparaître cinq cents hommes et les dix fils de Haman. Que n''auront-ils pas fait dans le reste des provinces royales ! Mais quelle est ta demande ? Elle te sera accordée ! Quelle est encore ta requête ? Elle sera exaucée. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme aujourd'hui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'comme la loi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'édit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'aujourd'hui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''on pende '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 25 ; 2.23+ ; 7.9s ; sur l'exposition (infamante) de cadavres, cf. Jos 10.26 ; 1S 31.10 ; 2S 4.12.
      marker-yv: yv-n
    - type: text
      text: 'Esther répondit : Si cela te semble bon, ô roi, qu''il soit aussi permis aux Juifs de Suse d''agir demain comme aujourd''hui, et qu''on pende les dix fils de Haman à la potence ! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.15 ; 8.14.
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit de faire ainsi. On publia l''édit à Suse, et les dix fils de Haman furent pendus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Suse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le quatorzième jour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 17-19,21 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.36 : « Ils décrétèrent tous par un vote public de ne pas laisser passer ce jour (celui de la victoire de Judas Maccabée sur Nikanor) sans le signaler, mais de célébrer le treizième jour du douzième mois, appelé Adar en araméen, la veille du jour dit de Mardochée. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils ne portèrent pas la main… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10+.
      marker-yv: yv-n
    - type: text
      text: Les Juifs de Suse se rassemblèrent donc aussi le quatorzième jour du mois d'Adar et tuèrent trois cents hommes ; mais ils ne portèrent pas la main sur le butin.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'défendre leur vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se débarrasser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: être en repos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 18 ; de même au v. 22.'
      marker-yv: yv-n
    - type: text
      text: 'Les autres Juifs, ceux des provinces royales, se rassemblèrent pour défendre leur vie et se débarrasser de leurs ennemis. Ils tuèrent soixante-quinze mille de ceux qui les détestaient – mais ils ne portèrent pas la main sur le butin – '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'banquet '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 8.15-17.'
      marker-yv: yv-n
    - type: text
      text: 'le treizième jour du mois d''Adar. En repos le quatorzième jour, ils en firent un jour de banquet et de joie. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 15+.
      marker-yv: yv-n
    - type: text
      text: 'Quant aux Juifs de Suse, ils se rassemblèrent le treize et le quatorze ; en repos le quinze, ils en firent un jour de banquet et de joie. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des campagnes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu est très proche de celui qui est traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans murailles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 3.5+. – Voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cadeaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même mot est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nourriture '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 2.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. v. 22 ; Né 8.10-12 ; Ap 11.10.'
      marker-yv: yv-n
    - type: text
      text: C'est pourquoi les Juifs des campagnes, ceux qui habitent des villes sans murailles, font du quatorzième jour du mois d'Adar un jour de joie, de banquet et de fête où chacun envoie des cadeaux à son voisin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Institution d'une fête commémorative
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porter la main sur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la frayeur des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur frayeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 8.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Dans leurs villes, dans toutes les provinces du roi Xerxès, les Juifs se rassemblèrent pour porter la main sur ceux qui cherchaient leur malheur. Personne ne put tenir devant eux, car la frayeur des Juifs s''était abattue sur tous les peuples. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mardochée écrivit cela dans des lettres qu''il envoya à tous les Juifs de toutes les provinces du roi Xerxès, proches et lointaines, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 15+.
      marker-yv: yv-n
    - type: text
      text: 'pour qu''ils observent l''institution du quatorzième jour du mois d''Adar, ainsi que du quinzième, d''année en année. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''étaient débarrassés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avaient eu du repos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur chagrin s''était changé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en joie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.17 ; Ps 30.12 ; Pr 11.10 ; Jn 16.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cadeaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'A l''exemple de ces journées où les Juifs s''étaient débarrassés de leurs ennemis, en ce mois où leur chagrin s''était changé en joie, et leur deuil en fête, ils devaient en faire des jours de banquet et de joie où chacun envoie des cadeaux à son voisin et fait des dons aux pauvres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: firent une tradition
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu a donné le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'kabbale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cabale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de leur célébration initiale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ce qu'ils avaient commencé à faire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et de ce que Mardochée leur avait écrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre cette formule comme l''introduction des v. 24s, qui donneraient alors la teneur même de l''écrit de Mardochée.'
      marker-yv: yv-n
    - type: text
      text: 'Les Juifs firent une tradition de leur célébration initiale et de ce que Mardochée leur avait écrit. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Agaguite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'adversaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tiré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fait tomber
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 6.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Pour, c''est-à-dire le sort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les frapper de panique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 14.24 ; 23.27 ; Dt 2.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; le verbe hébreu fait assonance avec le nom de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Haman.
      marker-yv: yv-n
    - type: text
      text: 'Car Haman, fils de Hammedata, l''Agaguite, adversaire de tous les Juifs, avait conçu le plan de faire disparaître les Juifs. Il avait tiré le Pour, c''est-à-dire le sort, pour les frapper de panique et les faire disparaître. '
