        - type: text
          text: 'F.11 : « La quatrième année du règne de Ptolémée et de Cléopâtre, Dosithos, se déclarant prêtre et lévite, ainsi que son fils Ptolémée apportèrent la lettre ci-dessus. Ils affirmaient que celle-ci était la lettre des Destinées et qu''elle avait été traduite par Lysimaque, fils de Ptolémée, de ceux de Jérusalem. »'
      marker-yv: yv-n
