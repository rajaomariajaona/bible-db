document_id: EXO.38,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'autel des sacrifices et la cuve
  - type: text
    content: ' '
  - type: note
    content: 'autel 27.1+. –  holocaustes  : voir sacrifices. –  cinq coudées  : environ 2,20 m ; trois coudées  : environ 1,30 m ; voir mesures.'
  - type: text
    content: 'Il fit l''autel des holocaustes en bois d''acacia, d''une longueur de cinq coudées et d''une largeur de cinq coudées ; il était carré, et sa hauteur était de trois coudées. '
  '10':
  - type: text
    content: 'avec leurs vingt colonnes et leurs vingt socles de bronze ; les crochets des colonnes et leurs tringles étaient d''argent. '
  '11':
  - type: note
    content: 'cent coudées  : environ 45 m.'
  - type: text
    content: 'Dans la direction du nord, il y avait cent coudées avec leurs vingt colonnes et leurs vingt socles de bronze ; les crochets des colonnes et leurs tringles étaient d''argent. '
  '12':
  - type: note
    content: 'cinquante coudées  : environ 22 m.'
  - type: text
    content: 'Dans la direction de l''ouest, il y avait cinquante coudées de tentures, avec leurs dix colonnes et leurs dix socles ; les crochets des colonnes et leurs tringles étaient d''argent. '
  '13':
  - type: text
    content: 'Dans la direction de l''est, au levant, il y avait cinquante coudées : '
  '14':
  - type: note
    content: 'quinze coudées  : environ 6,70 m.'
  - type: text
    content: 'pour un côté, quinze coudées de tentures, avec leurs trois colonnes et leurs trois socles ; '
  '15':
  - type: text
    content: 'et pour l''autre côté – de part et d''autre de la porte de la cour – quinze coudées de tentures, avec leurs trois colonnes et leurs trois socles. '
  '16':
  - type: text
    content: 'Toutes les tentures qui formaient l''enceinte de la cour étaient de fin lin retors. '
  '17':
  - type: note
    content: 'les crochets… tringles  : un texte ancien porte seulement leurs crochets.'
  - type: text
    content: 'Les socles pour les colonnes étaient de bronze, les crochets des colonnes et leurs tringles étaient d''argent, et leurs chapiteaux étaient couverts d''argent. Toutes les colonnes de la cour étaient jointes par des tringles d''argent. '
  '18':
  - type: note
    content: 'vingt coudées  : environ 9 m ; cinq coudées  : environ 2,20 m.'
  - type: text
    content: 'Le rideau de la porte de la cour – c''était un ouvrage de brodeur – était de pourpre violette et rouge, d''écarlate et de fin lin retors ; il avait une longueur de vingt coudées, et sa hauteur était de cinq coudées, comme la largeur des tentures de la cour ; '
  '19':
  - type: text
    content: 'les quatre colonnes et leurs quatre socles étaient de bronze, les crochets et leurs tringles étaient d''argent, et leurs chapiteaux étaient couverts d''argent. '
  '2':
  - type: text
    content: 'Il fit des cornes aux quatre angles ; ses cornes étaient d''une seule pièce avec lui ; il le couvrit de bronze. '
  '20':
  - type: text
    content: Tous les piquets de l'enceinte de la Demeure et de la cour étaient de bronze.
  - type: heading
    content: Les quantités de métaux utilisées
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'comptes / établis  : les termes hébreux ainsi traduits sont issus de la même racine, parfois rendue par visiter ou intervenir (cf. Gn 40.4n). Le terme correspondant ici à comptes sera traduit par gens… qui furent recensés au v. 25, cf. Nb 1.45 ; 2.32 etc. LXX le rend par un mot grec qui pourrait signifier disposition . – Voir lévites et prêtre.'
  - type: text
    content: 'Voici les comptes de la Demeure – la demeure du Témoignage – établis sur l''ordre de Moïse, par les soins des lévites, sous la direction d''Itamar, fils d''Aaron, le prêtre. '
  '22':
  - type: text
    content: 'Betsaléel, fils d''Ouri, fils de Hour, de la tribu de Juda, fit tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse ; '
  '23':
  - type: text
    content: avec lui Oholiab, fils d'Ahisamak, de la tribu de Dan, sculpteur et artiste, qui brodait aussi sur la pourpre violette et rouge, l'écarlate et le fin lin.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'dédié rituellement  : cf. 29.24+. –  vingt-neuf talents et sept cent trente sicles  : près d''une tonne ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Le total de l''or employé au travail, pour tous les travaux du sanctuaire, – or que l''on avait dédié rituellement – se montait à vingt-neuf talents et sept cent trente sicles, selon le sicle du sanctuaire. '
  '25':
  - type: note
    content: 'communauté 12.3n. –  recensés 30.12+. –  cent talents et mille sept cent soixante-quinze sicles  : environ 3,4 tonnes ; voir mesures, poids et monnaies.'
  - type: text
    content: 'L''argent des gens de la communauté qui furent recensés se montait à cent talents et mille sept cent soixante-quinze sicles, selon le sicle du sanctuaire. '
  '26':
  - type: note
    content: 'un béqa  : environ 6 g.'
  - type: text
    content: 'C''était un béqa par tête, la moitié d''un sicle, selon le sicle du sanctuaire, pour chaque homme qui passait au recensement, depuis l''âge de vingt ans et au-dessus, soit pour six cent trois mille cinq cent cinquante hommes. '
  '27':
  - type: note
    content: 'Soit 40 socles pour chacun des côtés, 16 pour le fond et 4 pour le voile (36.24,26,30,36). –  un talent  : environ 34 kg.'
  - type: text
    content: 'Les cent talents d''argent servirent à fondre les socles du sanctuaire et les socles du voile, cent socles pour les cent talents, un talent par socle. '
  '28':
  - type: note
    content: 'mille sept cent soixante-quinze sicles  : près de 17 kg. –  on fit  : litt. il fit, de même jusqu''au v. 30.'
  - type: text
    content: 'Avec les mille sept cent soixante-quinze sicles on fit les crochets et les tringles pour les colonnes, et on couvrit leurs chapiteaux. '
  '29':
  - type: note
    content: 'soixante-dix talents et deux mille quatre cents sicles  : environ 2,4 tonnes.'
  - type: text
    content: 'Le bronze qu''on avait dédié rituellement se montait à soixante-dix talents et deux mille quatre cents sicles. '
  '3':
  - type: note
    content: 27.3.
  - type: text
    content: 'Il fit tous les ustensiles de l''autel, ses récipients, ses pelles, ses calices, ses fourchettes et ses cassolettes ; il fit tous ses ustensiles de bronze. '
  '30':
  - type: text
    content: 'Avec lui on fit les socles de l''entrée de la tente de la Rencontre, l''autel de bronze avec sa grille de bronze, et tous les ustensiles de l''autel, '
  '31':
  - type: text
    content: les socles de la cour, tout autour, et les socles de la porte de la cour, tous les piquets de l'enceinte de la Demeure et les piquets de l'enceinte de la cour.
  '4':
  - type: text
    content: 'Il fit pour l''autel une grille de bronze, une sorte de treillis, qu''il plaça au-dessous du rebord de l''autel, à partir du bas, jusqu''à la moitié de la hauteur. '
  '5':
  - type: text
    content: 'Il fondit quatre anneaux qu''il mit aux quatre coins de la grille de bronze, pour recevoir les barres. '
  '6':
  - type: text
    content: 'Il fit les barres en bois d''acacia et les couvrit de bronze. '
  '7':
  - type: text
    content: Il introduisit dans les anneaux, sur les côtés de l'autel, les barres qui servaient à le porter. Il le fit creux, avec des panneaux.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'cuve 30.18+. –  les miroirs de l''Antiquité étaient en métal poli ; cf. Jb 37.18 ; 1Co 13.12 ; 2Co 3.18. –  des femmes qui accomplissaient leur service  : le verbe hébreu correspondant évoque habituellement un service militaire ; il est apparenté à un terme couramment traduit par armée  ; il s''agit sans doute ici d''un office rituel, comparable à celui des lévites en Nb 4.23 ; 8.24 (même verbe) ; cf. 1S 2.22 ; voir aussi Jg 21.21 ; Ps 68.26 ; Lc 2.37.'
  - type: text
    content: Il fit la cuve de bronze et sa base de bronze avec les miroirs des femmes qui accomplissaient leur service à l'entrée de la tente de la Rencontre.
  - type: heading
    content: Les toiles de la cour
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'cour 27.9+. –  cent coudées  : environ 45 m.'
  - type: text
    content: 'Il fit la cour. Dans la direction du midi, au sud, il y avait, pour former la cour, des tentures de fin lin retors, sur une longueur de cent coudées, '
