document_id: EXO.38
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'autel des sacrifices et la cuve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'autel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '27.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: holocaustes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cinq coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : environ 2,20 m ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trois coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : environ 1,30 m ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit l''autel des holocaustes en bois d''acacia, d''une longueur de cinq coudées et d''une largeur de cinq coudées ; il était carré, et sa hauteur était de trois coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit des cornes aux quatre angles ; ses cornes étaient d''une seule pièce avec lui ; il le couvrit de bronze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 27.3.
    marker-yv: yv-n
  - type: text
    text: 'Il fit tous les ustensiles de l''autel, ses récipients, ses pelles, ses calices, ses fourchettes et ses cassolettes ; il fit tous ses ustensiles de bronze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il fit pour l''autel une grille de bronze, une sorte de treillis, qu''il plaça au-dessous du rebord de l''autel, à partir du bas, jusqu''à la moitié de la hauteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il fondit quatre anneaux qu''il mit aux quatre coins de la grille de bronze, pour recevoir les barres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit les barres en bois d''acacia et les couvrit de bronze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il introduisit dans les anneaux, sur les côtés de l'autel, les barres qui servaient à le porter. Il le fit creux, avec des panneaux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cuve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '30.18+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les miroirs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de l''Antiquité étaient en métal poli ; cf. Jb 37.18 ; 1Co 13.12 ; 2Co 3.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des femmes qui accomplissaient leur service
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe hébreu correspondant évoque habituellement un service militaire ; il est apparenté à un terme couramment traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: armée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; il s''agit sans doute ici d''un office rituel, comparable à celui des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
      - type: text
        text: ' en Nb 4.23 ; 8.24 (même verbe) ; cf. 1S 2.22 ; voir aussi Jg 21.21 ; Ps 68.26 ; Lc 2.37.'
    marker-yv: yv-n
  - type: text
    text: Il fit la cuve de bronze et sa base de bronze avec les miroirs des femmes qui accomplissaient leur service à l'entrée de la tente de la Rencontre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les toiles de la cour
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '27.9+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cent coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : environ 45 m.'
    marker-yv: yv-n
  - type: text
    text: 'Il fit la cour. Dans la direction du midi, au sud, il y avait, pour former la cour, des tentures de fin lin retors, sur une longueur de cent coudées, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'avec leurs vingt colonnes et leurs vingt socles de bronze ; les crochets des colonnes et leurs tringles étaient d''argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cent coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 45 m.'
    marker-yv: yv-n
  - type: text
    text: 'Dans la direction du nord, il y avait cent coudées avec leurs vingt colonnes et leurs vingt socles de bronze ; les crochets des colonnes et leurs tringles étaient d''argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cinquante coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 22 m.'
    marker-yv: yv-n
  - type: text
    text: 'Dans la direction de l''ouest, il y avait cinquante coudées de tentures, avec leurs dix colonnes et leurs dix socles ; les crochets des colonnes et leurs tringles étaient d''argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dans la direction de l''est, au levant, il y avait cinquante coudées : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quinze coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 6,70 m.'
    marker-yv: yv-n
  - type: text
    text: 'pour un côté, quinze coudées de tentures, avec leurs trois colonnes et leurs trois socles ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et pour l''autre côté – de part et d''autre de la porte de la cour – quinze coudées de tentures, avec leurs trois colonnes et leurs trois socles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Toutes les tentures qui formaient l''enceinte de la cour étaient de fin lin retors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les crochets… tringles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : un texte ancien porte seulement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leurs crochets.
    marker-yv: yv-n
  - type: text
    text: 'Les socles pour les colonnes étaient de bronze, les crochets des colonnes et leurs tringles étaient d''argent, et leurs chapiteaux étaient couverts d''argent. Toutes les colonnes de la cour étaient jointes par des tringles d''argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vingt coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 9 m ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cinq coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 2,20 m.'
    marker-yv: yv-n
  - type: text
    text: 'Le rideau de la porte de la cour – c''était un ouvrage de brodeur – était de pourpre violette et rouge, d''écarlate et de fin lin retors ; il avait une longueur de vingt coudées, et sa hauteur était de cinq coudées, comme la largeur des tentures de la cour ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'les quatre colonnes et leurs quatre socles étaient de bronze, les crochets et leurs tringles étaient d''argent, et leurs chapiteaux étaient couverts d''argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tous les piquets de l'enceinte de la Demeure et de la cour étaient de bronze.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les quantités de métaux utilisées
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'comptes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: établis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : les termes hébreux ainsi traduits sont issus de la même racine, parfois rendue par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'visiter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'intervenir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Gn 40.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). Le terme correspondant ici à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'comptes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sera traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'gens… qui furent recensés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 25, cf. Nb 1.45 ; 2.32 etc. LXX le rend par un mot grec qui pourrait signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: disposition
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici les comptes de la Demeure – la demeure du Témoignage – établis sur l''ordre de Moïse, par les soins des lévites, sous la direction d''Itamar, fils d''Aaron, le prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Betsaléel, fils d''Ouri, fils de Hour, de la tribu de Juda, fit tout ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait ordonné à Moïse ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: avec lui Oholiab, fils d'Ahisamak, de la tribu de Dan, sculpteur et artiste, qui brodait aussi sur la pourpre violette et rouge, l'écarlate et le fin lin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dédié rituellement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 29.24+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vingt-neuf talents et sept cent trente sicles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : près d''une tonne ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'Le total de l''or employé au travail, pour tous les travaux du sanctuaire, – or que l''on avait dédié rituellement – se montait à vingt-neuf talents et sept cent trente sicles, selon le sicle du sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'communauté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'recensés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '30.12+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cent talents et mille sept cent soixante-quinze sicles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 3,4 tonnes ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'L''argent des gens de la communauté qui furent recensés se montait à cent talents et mille sept cent soixante-quinze sicles, selon le sicle du sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un béqa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 6 g.'
    marker-yv: yv-n
  - type: text
    text: 'C''était un béqa par tête, la moitié d''un sicle, selon le sicle du sanctuaire, pour chaque homme qui passait au recensement, depuis l''âge de vingt ans et au-dessus, soit pour six cent trois mille cinq cent cinquante hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Soit 40 socles pour chacun des côtés, 16 pour le fond et 4 pour le voile (36.24,26,30,36). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un talent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 34 kg.'
    marker-yv: yv-n
  - type: text
    text: 'Les cent talents d''argent servirent à fondre les socles du sanctuaire et les socles du voile, cent socles pour les cent talents, un talent par socle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mille sept cent soixante-quinze sicles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : près de 17 kg. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on fit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il fit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même jusqu''au v. 30.'
    marker-yv: yv-n
  - type: text
    text: 'Avec les mille sept cent soixante-quinze sicles on fit les crochets et les tringles pour les colonnes, et on couvrit leurs chapiteaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: soixante-dix talents et deux mille quatre cents sicles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 2,4 tonnes.'
    marker-yv: yv-n
  - type: text
    text: 'Le bronze qu''on avait dédié rituellement se montait à soixante-dix talents et deux mille quatre cents sicles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Avec lui on fit les socles de l''entrée de la tente de la Rencontre, l''autel de bronze avec sa grille de bronze, et tous les ustensiles de l''autel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
