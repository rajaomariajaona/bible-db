      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ex 12.4).'
      marker-yv: yv-n
    - type: text
      text: Joseph pourvut à tous les besoins de son père, de ses frères et de toute la maison de son père, selon le nombre de leurs familles.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La politique de Joseph pendant la famine
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
