      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'plus de pain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: plus de nourriture
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; 3.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il n''y avait plus de pain nulle part dans le pays, car la famine était très sévère ; l''Egypte et Canaan dépérissaient à cause de la famine. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '41.56s ; Pr 11.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: recueillit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : une autre forme du même verbe est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ramasser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 31.46 ; cf. Ex 16.4ss.
      marker-yv: yv-n
    - type: text
      text: 'Joseph recueillit tout l''argent qui se trouvait en Egypte et en Canaan, en échange du grain qu''on achetait ; il fit entrer cet argent dans la maison du pharaon. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous les Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toute l'Egypte.
      marker-yv: yv-n
    - type: text
      text: 'Quand l''argent d''Egypte et de Canaan fut épuisé, tous les Egyptiens vinrent à Joseph en disant : Donne-nous du pain ! Faut-il que nous mourions devant toi parce que l''argent manque ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot ne figure pas dans le texte hébreu traditionnel, mais il est présent dans Smr, LXX, Tg (cf. 3.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 37.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 41.54'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Joseph dit : Donnez vos troupeaux, et je vous donnerai du pain en échange de vos troupeaux, puisque l''argent manque. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ils amenèrent leurs troupeaux à Joseph, et Joseph leur donna du pain en échange des chevaux, des troupeaux de petit bétail, des troupeaux de gros bétail et des ânes. Il leur fournit ainsi du pain cette année-là en échange de tous leurs troupeaux.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lm 1.11 ; 5.9 ; Né 5.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous-mêmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nos corps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: terres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’adama '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (2.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), de même dans la suite.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque cette année fut écoulée, ils vinrent à lui, l''année suivante, et lui dirent : Nous ne te cacherons pas, mon seigneur, que l''argent est épuisé ; les troupeaux de bêtes sont à toi, il ne nous reste plus à t''offrir que nous-mêmes et nos terres. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Pourquoi devrions-nous mourir sous tes yeux, avec nos terres ? Achète-nous, avec nos terres, en échange de pain, et nous serons esclaves du pharaon, nous et nos terres. Donne-nous de quoi semer ; ainsi nous resterons en vie, nous ne mourrons pas et nos terres ne resteront pas désertes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il avait pris
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il prit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cinq
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 41.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il avait pris cinq de ses frères, qu''il présenta au pharaon. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En Egypte le pharaon était généralement considéré comme le propriétaire de toutes les terres du pays. Cf. 1R 21 ; Es 5.8-10 ; Mi 2.1-5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: était forte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: était forte sur eux.
      marker-yv: yv-n
    - type: text
      text: 'Joseph acheta ainsi toutes les terres de l''Egypte pour le pharaon ; les Egyptiens vendirent leur champ, parce que la famine était forte. Dès lors le pays appartint au pharaon. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Joseph
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: transféra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il soumit à l''esclavage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (la variante s'expliquerait par une différence d'une seule lettre en hébreu).
      marker-yv: yv-n
    - type: text
      text: 'Il transféra le peuple dans les villes, d''une extrémité à l''autre du territoire de l''Egypte. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une prescription
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un privilège
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 26 ; 49.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui vivaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui mangeaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. 1R 4.1-7.
      marker-yv: yv-n
    - type: text
      text: 'Toutefois, il n''acheta pas les terres des prêtres, parce qu''il y avait une prescription du pharaon en faveur des prêtres, qui vivaient grâce à cette prescription que leur avait accordée le pharaon : c''est pourquoi ils ne vendirent pas leurs terres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 45.6.
      marker-yv: yv-n
    - type: text
      text: 'Joseph dit au peuple : Je vous ai achetés aujourd''hui, avec vos terres, pour le pharaon ; voici de la semence pour vous ; vous pourrez ensemencer les terres. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 26 ; 41.34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et toutes vos familles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et vos enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 34.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'A la récolte, vous donnerez un cinquième au pharaon, et vous aurez les quatre autres parties pour ensemencer les champs et pour vous nourrir, vous, vos maisons et toutes vos familles. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Puissions-nous… trouver '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '33.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils dirent : Tu nous rends la vie ! Puissions-nous toujours trouver grâce à tes yeux, mon seigneur ! Nous serons esclaves du pharaon. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prescription '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 22
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Esd 7.24.
      marker-yv: yv-n
    - type: text
      text: 'Joseph fit de cela une prescription, qui subsiste jusqu''à ce jour pour les terres de l''Egypte : un cinquième revient au pharaon ; il n''y a que les terres des prêtres qui n''appartiennent pas au pharaon.'
  - type: usfm
    marker: s1
