document_id: GEN.47,104
type_code: fra
verses:
  '1':
  - type: text
    content: 'Joseph vint informer le pharaon ; il lui dit : Mes frères et mon père sont arrivés de Canaan, avec leur petit bétail et leur gros bétail, et tout ce qui leur appartient ; ils sont au pays de Goshen. '
  '10':
  - type: note
    content: V. 7.
  - type: text
    content: 'Jacob bénit le pharaon, et il se retira de devant le pharaon. '
  '11':
  - type: note
    content: Ramsès Ex 1.11 ; 12.37 ; Nb 33.3,5.
  - type: text
    content: 'Joseph installa son père et ses frères ; il leur donna une propriété en Egypte, dans la meilleure partie du pays, au pays de Ramsès, comme le pharaon l''avait ordonné. '
  '12':
  - type: note
    content: 'la maison de son père  : autre traduction sa famille. –  selon le nombre…  : litt. du pain (cf. v. 12) pour la bouche de la famille (ou des enfants, cf. v. 24 ; 34.29n) ; mais l''expression correspondant à pour la bouche est souvent employée pour indiquer une proportion (d''où la traduction selon le nombre, cf. Ex 12.4).'
  - type: text
    content: Joseph pourvut à tous les besoins de son père, de ses frères et de toute la maison de son père, selon le nombre de leurs familles.
  - type: heading
    content: La politique de Joseph pendant la famine
  '13':
  - type: text
    content: ' '
  - type: note
    content: plus de pain ou plus de nourriture  ; 3.19n.
  - type: text
    content: 'Il n''y avait plus de pain nulle part dans le pays, car la famine était très sévère ; l''Egypte et Canaan dépérissaient à cause de la famine. '
  '14':
  - type: note
    content: '41.56s ; Pr 11.26. –  recueillit  : une autre forme du même verbe est traduite par ramasser en 31.46 ; cf. Ex 16.4ss.'
  - type: text
    content: 'Joseph recueillit tout l''argent qui se trouvait en Egypte et en Canaan, en échange du grain qu''on achetait ; il fit entrer cet argent dans la maison du pharaon. '
  '15':
  - type: note
    content: 'tous les Egyptiens  : autre traduction toute l''Egypte.'
  - type: text
    content: 'Quand l''argent d''Egypte et de Canaan fut épuisé, tous les Egyptiens vinrent à Joseph en disant : Donne-nous du pain ! Faut-il que nous mourions devant toi parce que l''argent manque ? '
  '16':
  - type: note
    content: 'du pain  : le mot ne figure pas dans le texte hébreu traditionnel, mais il est présent dans Smr, LXX, Tg (cf. 3.19n  ; 37.25n  ; 41.54n).'
  - type: text
    content: 'Joseph dit : Donnez vos troupeaux, et je vous donnerai du pain en échange de vos troupeaux, puisque l''argent manque. '
  '17':
  - type: text
    content: Ils amenèrent leurs troupeaux à Joseph, et Joseph leur donna du pain en échange des chevaux, des troupeaux de petit bétail, des troupeaux de gros bétail et des ânes. Il leur fournit ainsi du pain cette année-là en échange de tous leurs troupeaux.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lm 1.11 ; 5.9 ; Né 5.3. –  nous-mêmes  : litt. nos corps . –  terres  : hébreu ’adama (2.5n), de même dans la suite.'
  - type: text
    content: 'Lorsque cette année fut écoulée, ils vinrent à lui, l''année suivante, et lui dirent : Nous ne te cacherons pas, mon seigneur, que l''argent est épuisé ; les troupeaux de bêtes sont à toi, il ne nous reste plus à t''offrir que nous-mêmes et nos terres. '
  '19':
  - type: text
    content: 'Pourquoi devrions-nous mourir sous tes yeux, avec nos terres ? Achète-nous, avec nos terres, en échange de pain, et nous serons esclaves du pharaon, nous et nos terres. Donne-nous de quoi semer ; ainsi nous resterons en vie, nous ne mourrons pas et nos terres ne resteront pas désertes. '
  '2':
  - type: note
    content: 'Il avait pris  : autre traduction il prit. –  cinq  : cf. 41.34n.'
  - type: text
    content: 'Il avait pris cinq de ses frères, qu''il présenta au pharaon. '
  '20':
  - type: note
    content: 'En Egypte le pharaon était généralement considéré comme le propriétaire de toutes les terres du pays. Cf. 1R 21 ; Es 5.8-10 ; Mi 2.1-5. –  était forte  : litt. était forte sur eux.'
  - type: text
    content: 'Joseph acheta ainsi toutes les terres de l''Egypte pour le pharaon ; les Egyptiens vendirent leur champ, parce que la famine était forte. Dès lors le pays appartint au pharaon. '
  '21':
  - type: note
    content: 'Il (c.-à-d. Joseph) transféra  : LXX porte il soumit à l''esclavage (la variante s''expliquerait par une différence d''une seule lettre en hébreu).'
  - type: text
    content: 'Il transféra le peuple dans les villes, d''une extrémité à l''autre du territoire de l''Egypte. '
  '22':
  - type: note
    content: 'une prescription  : autre traduction un privilège  ; cf. v. 26 ; 49.10n. –  qui vivaient  : litt. qui mangeaient. Cf. 1R 4.1-7.'
  - type: text
    content: 'Toutefois, il n''acheta pas les terres des prêtres, parce qu''il y avait une prescription du pharaon en faveur des prêtres, qui vivaient grâce à cette prescription que leur avait accordée le pharaon : c''est pourquoi ils ne vendirent pas leurs terres. '
  '23':
  - type: note
    content: 45.6.
  - type: text
    content: 'Joseph dit au peuple : Je vous ai achetés aujourd''hui, avec vos terres, pour le pharaon ; voici de la semence pour vous ; vous pourrez ensemencer les terres. '
  '24':
  - type: note
    content: 'V. 26 ; 41.34n. –  et toutes vos familles  : autre traduction et vos enfants  ; cf. 34.29n.'
  - type: text
    content: 'A la récolte, vous donnerez un cinquième au pharaon, et vous aurez les quatre autres parties pour ensemencer les champs et pour vous nourrir, vous, vos maisons et toutes vos familles. '
  '25':
  - type: note
    content: Puissions-nous… trouver grâce… 33.15n.
  - type: text
    content: 'Ils dirent : Tu nous rends la vie ! Puissions-nous toujours trouver grâce à tes yeux, mon seigneur ! Nous serons esclaves du pharaon. '
  '26':
  - type: note
    content: V. 20n,24. –  prescription v. 22n. –  prêtres Esd 7.24.
  - type: text
    content: 'Joseph fit de cela une prescription, qui subsiste jusqu''à ce jour pour les terres de l''Egypte : un cinquième revient au pharaon ; il n''y a que les terres des prêtres qui n''appartiennent pas au pharaon.'
  - type: heading
    content: Les dernières volontés d'Israël
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Le nom d’ Israël (cf. 46.1n) commence à désigner les descendants du patriarche (les Israélites ). –  Goshen 45.10n. –  Ils y furent propriétaires  : autre traduction ils en furent propriétaires . –  féconds… 35.11 ; 46.3 ; Dt 26.5 ; Ps 105.24.'
  - type: text
    content: 'Israël s''installa en Egypte, au pays de Goshen. Ils y furent propriétaires. Ils furent féconds, ils se multiplièrent, ils devinrent très nombreux. '
  '28':
  - type: note
    content: Cf. v. 9 ; 5.3n  ; 25.7 ; 35.28.
  - type: text
    content: 'Jacob vécut dix-sept ans en Egypte ; les jours que vécut Jacob furent de cent quarante-sept ans. '
  '29':
  - type: note
    content: 'Comme le moment…  : cf. Dt 31.14 ; 1R 2.1n. –  cuisse 24.2n  ; 32.24n. –  fidélité / loyauté 21.23 ; 24.12,14,49 ; 39.21 ; Ex 34.6 ; Nb 14.18.'
  - type: text
    content: 'Comme le moment de sa mort approchait, Israël appela son fils Joseph et lui dit : Si j''ai trouvé grâce à tes yeux, mets ta main sous ma cuisse, je te prie, et agis envers moi avec fidélité et loyauté : je t''en prie, ne m''ensevelis pas en Egypte ! '
  '3':
  - type: text
    content: 'Le pharaon dit aux frères de Joseph : Quelles sont vos activités ? Ils répondirent au pharaon : Nous, tes serviteurs, nous sommes bergers de petit bétail, comme l''étaient nos pères. '
  '30':
  - type: note
    content: 'couché avec mes pères  : expression courante pour désigner la mort et l''ensevelissement (cf. 15.15n  ; 1R 1.21n). –  leur tombeau  : certains modifient le texte hébreu traditionnel pour lire dans mon tombeau  ; cf. 49.29-31 ; 50.5n-13,24s. Sur l''importance du tombeau familial, voir 1R 13.22 ; 14.13.'
  - type: text
    content: 'Quand je me serai couché avec mes pères, tu m''emporteras d''Egypte et tu m''enseveliras dans leur tombeau. Il répondit : Je ferai ce que tu me dis. '
  '31':
  - type: note
    content: 'se prosterna 37.10. –  sur la tête de son lit (48.2 ; 49.33 ; 1R 1.47) : LXX sur l''extrémité de son bâton  ; cf. 32.11 ; Hé 11.21.'
  - type: text
    content: 'Il reprit : Jure-le-moi. Il le lui jura. Puis Israël se prosterna sur la tête de son lit.'
  '4':
  - type: note
    content: Dt 26.5.
  - type: text
    content: 'Ils dirent au pharaon : Nous sommes venus pour immigrer dans le pays : il n''y a plus de pâturage pour notre petit bétail, car la famine est sévère en Canaan ; maintenant, je te prie, permets-nous de nous installer au pays de Goshen. '
  '5':
  - type: note
    content: 'Ici et au v. 6 l''ordre des phrases est différent dans LXX  : Jacob et sa famille rencontrent d''abord le pharaon, qui informe Joseph de leur arrivée.'
  - type: text
    content: 'Le pharaon dit à Joseph : Ton père et tes frères sont venus auprès de toi. '
  '6':
  - type: text
    content: L'Egypte est à ta disposition ; installe ton père et tes frères dans la meilleure partie du pays. Qu'ils s'installent au pays de Goshen ; si tu sais qu'il y a parmi eux des hommes de valeur, nomme-les responsables de mes propres troupeaux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: bénit v. 10 ; 14.19 ; Ex 12.32 ; cf. Hé 7.7.
  - type: text
    content: 'Joseph fit venir Jacob, son père, et il le présenta au pharaon ; Jacob bénit le pharaon. '
  '8':
  - type: text
    content: 'Le pharaon dit à Jacob : Quel est le nombre des années de ta vie ? '
  '9':
  - type: note
    content: 'La durée  : litt. les jours des années. –  vie d''immigré  : cf. 17.8 ; 28.4 ; 36.7 ; 37.1 ; Ex 6.4 ; Hé 11.13. –  cent trente ans  : cf. v. 28+ ; 50.22. –  peu nombreuses…  : comparer avec 25.7 ; 35.28 ; cf. Ps 90.9s ; Jb 14.1 ; Ep 5.16. –  mauvaises  : allusion aux péripéties multiples et souvent douloureuses de la vie de Jacob (cf. 37.25 ; 45.27).'
  - type: text
    content: 'Jacob répondit au pharaon : La durée de ma vie d''immigré est de cent trente ans. Les années de ma vie ont été peu nombreuses et mauvaises ; elles n''ont pas atteint la durée de la vie de mes pères, celles de leur vie d''immigrés. '
