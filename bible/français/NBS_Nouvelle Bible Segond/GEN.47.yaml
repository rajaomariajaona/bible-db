      text: 'Comme le moment de sa mort approchait, Israël appela son fils Joseph et lui dit : Si j''ai trouvé grâce à tes yeux, mets ta main sous ma cuisse, je te prie, et agis envers moi avec fidélité et loyauté : je t''en prie, ne m''ensevelis pas en Egypte ! '
