verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Joseph vint informer le pharaon ; il lui dit : Mes frères et mon père sont arrivés de Canaan, avec leur petit bétail et leur gros bétail, et tout ce qui leur appartient ; ils sont au pays de Goshen. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 7.
      marker-yv: yv-n
    - type: text
      text: 'Jacob bénit le pharaon, et il se retira de devant le pharaon. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ramsès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 1.11 ; 12.37 ; Nb 33.3,5.
      marker-yv: yv-n
    - type: text
      text: 'Joseph installa son père et ses frères ; il leur donna une propriété en Egypte, dans la meilleure partie du pays, au pays de Ramsès, comme le pharaon l''avait ordonné. '
