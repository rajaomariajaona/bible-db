        - type: text
          text: ') ; mais l''expression correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour la bouche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est souvent employée pour indiquer une proportion (d''où la traduction '
      - type: usfm
