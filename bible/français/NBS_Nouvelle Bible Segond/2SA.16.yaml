    marker-yv: yv-n
  - type: text
    text: 'Le roi David était arrivé jusqu''à Bahourim. De là sortit un homme du clan de la maison de Saül, nommé Shiméi, fils de Guéra. Il s''avança en prononçant des malédictions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les guerriers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il jeta des pierres sur David et sur tous les gens du roi David, tandis que tout le peuple et tous les guerriers étaient à la droite et à la gauche de celui-ci. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dehors, dehors…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sors, sors, homme de sangs, homme de bélial
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'homme de sangs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(au pluriel) est un homme coupable d''un crime, cf. Ps 5.7 ; 26.9 ; sur '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: homme sans morale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Dt 13.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Shiméi parlait ainsi en le maudissant : Dehors, dehors, sanguinaire, homme sans morale ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' de la maison de Saül'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : allusion probable à l''épisode raconté en 21.1-9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu l'as mérité, ton malheur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'te voilà dans ton malheur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ton mal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sanguinaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de sangs.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fait retomber sur toi tout le sang de la maison de Saül, à la place de qui tu es devenu roi ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a confié la royauté à Absalom, ton fils ; tu l''as mérité, ton malheur, car tu es un homme sanguinaire ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abishaï
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 26.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce chien mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 24.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: couper la tête
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 26.7s.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Abishaï, fils de Tserouya, dit au roi : Pourquoi ce chien mort te maudit-il, ô roi, mon seigneur ? Laisse-moi aller lui couper la tête, je t''en prie ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pourquoi vous mêlez-vous de mes affaires
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quoi à moi et à vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en quoi cela nous regarde-t-il
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 19.23 ; Jg 11.12 ; Jn 2.4 ; David s''adresse conjointement à Abishaï et à son frère Joab, qui sont souvent mentionnés ensemble, cf. 2.18,24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' lui a dit'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 18.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pourquoi agis-tu ainsi ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. Jb 2.10 ; 9.12 ; Rm 9.20.
    marker-yv: yv-n
  - type: text
    text: 'Mais le roi dit : Pourquoi vous mêlez-vous de mes affaires, fils de Tserouya ? S''il maudit, c''est que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui a dit : « Maudis David ! » Qui donc peut lui dire : « Pourquoi agis-tu ainsi ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui est sorti de moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui est sorti de mon ventre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mes entrailles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 7.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en veut à ma vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cherche ma vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1S 20.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir 2S 12.11. –  '
    - type: usfm
      marker: fq
