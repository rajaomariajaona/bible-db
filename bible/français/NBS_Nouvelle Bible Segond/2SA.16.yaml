document_id: 2SA.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David et Tsiba
  - type: text
    content: ' '
  - type: note
    content: 'le sommet  : du mont des Oliviers, cf. 15.30,32. –  Tsiba / Mephi-Bosheth  : cf. chap. 9. –  deux ânes bâtés  : cf. 1S 25.18. –  cent gâteaux de raisins secs  : litt. cent raisins secs  ; certains mss de LXX portent un épha (mesure de capacité d''environ 21 l) de raisins secs  ; cf. 1S 30.12. –  cent de fruits d''été  : au lieu de cent , certains mss de LXX portent deux cents  ; un ms de Qumrân porte un épha  ; pour les fruits d''été LXX traduit dattes . –  une outre de vin  : cf. 1S 10.3.'
  - type: text
    content: 'Alors que David venait de passer le sommet, Tsiba, serviteur de Mephi-Bosheth, vint à sa rencontre avec deux ânes bâtés, sur lesquels il y avait deux cents pains, cent gâteaux de raisins secs, cent de fruits d''été et une outre de vin. '
  '10':
  - type: note
    content: 'Pourquoi vous mêlez-vous de mes affaires  : litt. quoi à moi et à vous  ; autre traduction en quoi cela nous regarde-t-il  ; cf. 19.23 ; Jg 11.12 ; Jn 2.4 ; David s''adresse conjointement à Abishaï et à son frère Joab, qui sont souvent mentionnés ensemble, cf. 2.18,24. –  le Seigneur lui a dit  : cf. 2R 18.25. –  Pourquoi agis-tu ainsi ? cf. Jb 2.10 ; 9.12 ; Rm 9.20.'
  - type: text
    content: 'Mais le roi dit : Pourquoi vous mêlez-vous de mes affaires, fils de Tserouya ? S''il maudit, c''est que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui a dit : « Maudis David ! » Qui donc peut lui dire : « Pourquoi agis-tu ainsi ? » '
  '11':
  - type: note
    content: 'qui est sorti de moi  : litt. qui est sorti de mon ventre ou mes entrailles  ; cf. 7.12. –  en veut à ma vie  : litt. cherche ma vie, cf. 1S 20.1n  ; voir 2S 12.11. –  ce Benjaminite  : de la même tribu que Saül, cf. 1S 9.1 ; 10.21.'
  - type: text
    content: 'David dit à Abishaï et à tous ses gens : Mon propre fils, qui est sorti de moi, en veut à ma vie ; à plus forte raison ce Benjaminite ! Laissez-le et qu''il maudisse, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le lui a dit. '
  '12':
  - type: note
    content: 'ma peine ou ma misère  : sens inhabituel, mais possible, d''un terme souvent traduit par faute  ; cf. Gn 29.32 ; 1S 1.11 ; Ps 25.18 ; 31.8 ; autre lecture traditionnelle mon œil, généralement interprété au sens de mes larmes. –  me fera-t-il du bien  : litt. fera-t-il venir pour moi du bien. –  la malédiction qu''il prononce  : litt. sa malédiction  ; quelques mss portent ma malédiction. Cf. Pr 17.5 ; 24.17s ; 25.21s.'
  - type: text
    content: 'Peut-être le '
  - type: text
    content: Seigneur
  - type: text
    content: ' regardera-t-il ma peine ; peut-être le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me fera-t-il du bien à la place de la malédiction qu''il prononce en ce jour.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: parallèlement à lui et contre lui traduisent la même expression hébraïque (autre traduction près de lui ) ; certains pensent que la deuxième fois elle est due à une erreur de copie.
  - type: text
    content: 'David et ses hommes continuèrent leur chemin ; Shiméi marchait sur le flanc de la montagne, parallèlement à lui ; en marchant, il maudissait, il jetait des pierres contre lui, il faisait voler la poussière. '
  '14':
  - type: note
    content: 'arrivèrent  : LXX précise au bord du Jourdain. –  épuisés  : certains commentateurs ont parfois voulu voir dans le mot hébreu correspondant un nom de localité, mais aucune proposition ne s''est imposée.'
  - type: text
    content: Le roi et tout le peuple qui était avec lui arrivèrent épuisés ; là ils purent reprendre haleine.
  - type: heading
    content: Houshaï rejoint Absalom
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'tout le peuple , c.-à-d. tous ses partisans  ; de même au v. 18. –  entrés dans Jérusalem  : cf. 15.37. –  Ahitophel  : cf. 15.12+.'
  - type: text
    content: 'Absalom et tout le peuple, les hommes d''Israël, étaient entrés dans Jérusalem ; et Ahitophel était avec lui. '
  '16':
  - type: note
    content: 'Houshaï  : cf. 15.32+. –  l''ami de David  : cf. 15.37n. –  Vive le roi ! cf. 1R 1.25,34.'
  - type: text
    content: 'Lorsque Houshaï, l''Arkite, l''ami de David, fut arrivé auprès d''Absalom, il lui dit : Vive le roi ! Vive le roi ! '
  '17':
  - type: note
    content: la fidélité ou la loyauté, cf. 2.5s.
  - type: text
    content: 'Et Absalom dit à Houshaï : C''est là toute la fidélité que tu montres envers ton ami ! Pourquoi n''es-tu donc pas allé avec ton ami ? '
  '18':
  - type: note
    content: 'J''appartiendrai…  : autre lecture traditionnelle je n''appartiendrai pas (à…), tournure plus difficile à comprendre dans ce contexte.'
  - type: text
    content: 'Houshaï répondit à Absalom : Non ! J''appartiendrai à celui qu''ont choisi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', tout ce peuple, tous les hommes d''Israël ; c''est avec lui que je veux rester. '
  '19':
  - type: note
    content: Cf. 15.34.
  - type: text
    content: Deuxièmement, qui pourrais-je servir ? N'est-ce pas son fils ? Comme j'ai servi ton père, ainsi je te servirai.
  - type: heading
    content: Absalom et les concubines de David
  '2':
  - type: note
    content: 'montures  : cf. Jg 5.10n  ; 10.4 ; 12.14. –  le pain  : selon une tradition juive ; une autre tradition juive dit (serviront de montures…) pour faire la guerre. –  les jeunes gens sont les soldats. –  dans le désert  : cf. 17.27-29.'
  - type: text
    content: 'Le roi dit à Tsiba : Que veux-tu faire de cela ? Tsiba répondit : Les ânes serviront de montures à la maison du roi, le pain et les fruits d''été seront pour nourrir les jeunes gens et le vin pour désaltérer ceux qui seront épuisés dans le désert. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Tenez conseil  : le pluriel s''adresse soit à Ahitophel et à Houshaï, soit plus probablement à Ahitophel et à d''autres membres de l''entourage du roi.'
  - type: text
    content: 'Absalom dit à Ahitophel : Tenez conseil sur ce que nous devons faire. '
  '21':
  - type: note
    content: 'Va avec Gn 16.2n. –  les concubines…  : cf. 15.16+. Par cet acte, Absalom s''affiche comme successeur de son père, cf. 3.7n. Voir aussi 12.11s. –  odieux  : cf. 1S 13.4n. –  et tous ceux qui…  : litt. et les mains de tous ceux qui sont avec toi se fortifieront  ; cf. 2.7+.'
  - type: text
    content: 'Et Ahitophel dit à Absalom : Va avec les concubines que ton père a laissées pour garder le palais ; ainsi tout Israël apprendra que tu t''es rendu odieux à ton père, et tous ceux qui sont avec toi prendront courage. '
  '22':
  - type: note
    content: 'une tente  : litt. la tente. –  sur le toit en terrasse  : cf. 11.2n. –  alla avec Gn 16.2n.'
  - type: text
    content: 'On dressa une tente sur le toit en terrasse pour Absalom, et Absalom alla avec les concubines de son père, sous les yeux de tout Israël. '
  '23':
  - type: note
    content: 'avaient autant d''autorité…  : litt. (étaient) comme quand on interroge (ou, selon une autre tradition de lecture, quand un homme interroge) la parole de Dieu  ; cf. Ac 12.22.'
  - type: text
    content: Les conseils d'Ahitophel, en ces jours-là, avaient autant d'autorité qu'une parole de Dieu. Il en était ainsi de tous les conseils d'Ahitophel, soit pour David, soit pour Absalom.
  '3':
  - type: note
    content: 'le fils de ton maître, c.-à-d. Mephi-Bosheth, fils de Jonathan et petit-fils de Saül. –  resté à Jérusalem  : cf. 9.13. –  il a dit ou il s''est dit, il a pensé  ; Tsiba calomnie Mephi-Bosheth (cf. 19.25-31) avec l''espoir d''obtenir de David une récompense. –  la maison d''Israël ou le peuple d''Israël. –  de mon père  : de Saül, qui était en fait son grand-père.'
  - type: text
    content: 'Le roi dit : Où est le fils de ton maître ? Tsiba répondit au roi : Il est resté à Jérusalem, car il a dit : Aujourd''hui la maison d''Israël me rendra le royaume de mon père. '
  '4':
  - type: note
    content: Que je trouve toujours grâce à tes yeux Gn 33.15n  ; cf. 1S 16.22n.
  - type: text
    content: 'Le roi dit à Tsiba : Tout ce qui appartenait à Mephi-Bosheth t''appartient. Tsiba dit : Je me prosterne ! Que je trouve toujours grâce à tes yeux, ô roi, mon seigneur !'
  - type: heading
    content: Shiméi maudit David
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Bahourim  : cf. 3.16n. –  Shiméi reparaîtra en 19.17-24 ; 1R 2.8s,36-46. –  malédictions  : cf. Ex 22.27 ; Ec 10.20 ; voir bénédiction, malédiction.'
  - type: text
    content: 'Le roi David était arrivé jusqu''à Bahourim. De là sortit un homme du clan de la maison de Saül, nommé Shiméi, fils de Guéra. Il s''avança en prononçant des malédictions. '
  '6':
  - type: note
    content: 'les guerriers  : cf. 10.7n.'
  - type: text
    content: 'Il jeta des pierres sur David et sur tous les gens du roi David, tandis que tout le peuple et tous les guerriers étaient à la droite et à la gauche de celui-ci. '
  '7':
  - type: note
    content: 'Dehors, dehors…  : litt. sors, sors, homme de sangs, homme de bélial. Un homme de sangs (au pluriel) est un homme coupable d''un crime, cf. Ps 5.7 ; 26.9 ; sur homme sans morale, cf. Dt 13.14n.'
  - type: text
    content: 'Shiméi parlait ainsi en le maudissant : Dehors, dehors, sanguinaire, homme sans morale ! '
  '8':
  - type: note
    content: 'le sang de la maison de Saül  : allusion probable à l''épisode raconté en 21.1-9. –  tu l''as mérité, ton malheur  : litt. te voilà dans ton malheur (ou ton mal). –  sanguinaire  : litt. de sangs.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait retomber sur toi tout le sang de la maison de Saül, à la place de qui tu es devenu roi ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a confié la royauté à Absalom, ton fils ; tu l''as mérité, ton malheur, car tu es un homme sanguinaire ! '
  '9':
  - type: note
    content: 'Abishaï  : cf. 1S 26.6n. –  ce chien mort  : cf. 1S 24.15n. –  couper la tête  : cf. 1S 26.7s.'
  - type: text
    content: 'Alors Abishaï, fils de Tserouya, dit au roi : Pourquoi ce chien mort te maudit-il, ô roi, mon seigneur ? Laisse-moi aller lui couper la tête, je t''en prie ! '
