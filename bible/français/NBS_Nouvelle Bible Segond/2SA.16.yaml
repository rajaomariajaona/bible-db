  - type: text
    text: 'Alors que David venait de passer le sommet, Tsiba, serviteur de Mephi-Bosheth, vint à sa rencontre avec deux ânes bâtés, sur lesquels il y avait deux cents pains, cent gâteaux de raisins secs, cent de fruits d''été et une outre de vin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: montures
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 5.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 10.4 ; 12.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le pain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon une tradition juive ; une autre tradition juive dit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (serviront de montures…) pour faire la guerre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les jeunes gens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les soldats
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans le désert
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.27-29.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi dit à Tsiba : Que veux-tu faire de cela ? Tsiba répondit : Les ânes serviront de montures à la maison du roi, le pain et les fruits d''été seront pour nourrir les jeunes gens et le vin pour désaltérer ceux qui seront épuisés dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le fils de ton maître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mephi-Bosheth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', fils de Jonathan et petit-fils de Saül. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: resté à Jérusalem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il a dit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il s'est dit, il a pensé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Tsiba calomnie Mephi-Bosheth (cf. 19.25-31) avec l''espoir d''obtenir de David une récompense. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la maison d''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le peuple d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de mon père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de Saül
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui était en fait son grand-père.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi dit : Où est le fils de ton maître ? Tsiba répondit au roi : Il est resté à Jérusalem, car il a dit : Aujourd''hui la maison d''Israël me rendra le royaume de mon père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que je trouve toujours '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: ' à tes yeux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 33.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 1S 16.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi dit à Tsiba : Tout ce qui appartenait à Mephi-Bosheth t''appartient. Tsiba dit : Je me prosterne ! Que je trouve toujours grâce à tes yeux, ô roi, mon seigneur !'
