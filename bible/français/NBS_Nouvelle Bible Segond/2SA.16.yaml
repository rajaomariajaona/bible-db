    marker-yv: yv-n
  - type: text
    text: 'David dit à Abishaï et à tous ses gens : Mon propre fils, qui est sorti de moi, en veut à ma vie ; à plus forte raison ce Benjaminite ! Laissez-le et qu''il maudisse, car le '
  - type: usfm
