      text: 'Ils se sont rebellés contre moi et ils n''ont pas voulu m''écouter. Aucun n''a rejeté les horreurs qui attiraient ses yeux, et ils n''ont pas abandonné les idoles de l''Egypte. J''ai parlé de répandre ma fureur sur eux au milieu de l''Egypte, pour aller jusqu''au bout de ma colère contre eux. '
