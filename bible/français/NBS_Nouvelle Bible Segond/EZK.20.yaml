document_id: EZK.20,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu a conduit Israël malgré ses révoltes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: septième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 591 av. J.-C. (1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'anciens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour consulter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 3.'
      marker-yv: yv-n
    - type: text
      text: 'La septième année, le dixième jour du cinquième mois, des hommes parmi les anciens d''Israël vinrent pour consulter le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et s''assirent devant moi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jr 2.6.
      marker-yv: yv-n
    - type: text
      text: 'Je les ai fait sortir d''Egypte et je les ai conduits au désert. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour vivre par elles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 13,21 ; cf. 18.9+ ; Lv 18.5+ ; Dt 4.1+.
      marker-yv: yv-n
    - type: text
      text: 'Je leur ai donné mes prescriptions et je leur ai fait connaître mes règles, que l''homme doit mettre en pratique pour vivre par elles. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.12 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbats
        - type: text
          text: ' comme un signe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 31.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui les rends '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saints
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui les consacre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 20.8 ; 22.9.
      marker-yv: yv-n
    - type: text
      text: 'Je leur ai aussi donné mes sabbats comme un signe entre moi et eux, pour qu''ils sachent que c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui les rends saints.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 16,21,24 ; cf. Ex 14.11s ; 15.24 ; 16.2s,20,27s ; Nb 11.1,4-6 ; 14.1-4 ; 16.1-15 ; 20.1-5 ; 27.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rejeté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: méprisé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 5.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour vivre… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: outrageusement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: beaucoup
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mes sabbats '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 20 ; 22.8,26 ; Ex 23.12 ; Lv 19.3,30.
      marker-yv: yv-n
    - type: text
      text: 'Mais la maison d''Israël s''est rebellée contre moi dans le désert. Ils n''ont pas suivi mes prescriptions, ils ont rejeté mes règles, que l''homme doit mettre en pratique pour vivre par elles, et ils ont outrageusement profané mes sabbats. J''ai parlé de répandre sur eux ma fureur dans le désert, pour les exterminer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en présence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aux yeux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sous les yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 22.'
      marker-yv: yv-n
    - type: text
      text: 'Néanmoins j''ai agi par égard pour mon nom, afin qu''il ne soit pas profané aux yeux des nations en présence desquelles je les avais fait sortir d''Egypte. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 6+ ; Nb 14.21-23 ; Dt 1.34s.
      marker-yv: yv-n
    - type: text
      text: 'Dans le désert, c''est aussi moi qui leur ai juré, à main levée, de ne pas les conduire dans le pays que je leur avais donné, un pays ruisselant de lait et de miel, le plus beau de tous les pays, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 13+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: restait attaché à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: marchait derrière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: suivait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 6.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '– et cela parce qu''ils rejetaient mes règles, qu''ils ne suivaient pas mes prescriptions, qu''ils profanaient mes sabbats, car leur cœur restait attaché à leurs idoles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un regard de pitié
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais j''ai eu pour eux un regard de pitié : je ne les ai pas détruits, je ne les ai pas exterminés dans le désert. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai dit à leurs fils, dans le désert : Ne suivez pas les prescriptions de vos pères, n''observez pas leurs règles et ne vous rendez pas impurs avec leurs idoles ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1R 8.58. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mettez-les en pratique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 6.12 ; Jr 11.6,8.'
      marker-yv: yv-n
    - type: text
      text: 'Je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), votre Dieu. Suivez mes prescriptions, observez mes règles et mettez-les en pratique. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 12s ; cf. 44.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on saura
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous saurez.
      marker-yv: yv-n
    - type: text
      text: 'Faites de mes sabbats des jours sacrés, et ils seront entre moi et vous un signe, par lequel on saura que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), votre Dieu.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 13+,11+,8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Ex 32.10,25-29 ; Nb 17.10 ; 21.4-6.'
      marker-yv: yv-n
    - type: text
      text: 'Mais les fils se sont rebellés contre moi. Ils n''ont pas suivi mes prescriptions, ils n''ont pas veillé à mettre en pratique mes règles, – ces règles que l''homme doit mettre en pratique pour vivre par elles – ils ont profané mes sabbats. J''ai parlé de répandre ma fureur sur eux dans le désert, pour aller jusqu''au bout de ma colère contre eux. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai retiré ma main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour mon nom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9+.
      marker-yv: yv-n
    - type: text
      text: 'Néanmoins j''ai retiré ma main, et j''ai agi par égard pour mon nom, afin qu''il ne soit pas profané aux yeux des nations en présence desquelles je les avais fait sortir d''Egypte. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 5.10+ ; 6.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.15.'
      marker-yv: yv-n
    - type: text
      text: 'Dans le désert, c''est aussi moi qui leur ai juré, à main levée, de les disperser parmi les nations, de les disséminer dans tous les pays, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 13+.
      marker-yv: yv-n
    - type: text
      text: 'parce qu''ils ne mettaient pas mes règles en pratique, qu''ils rejetaient mes prescriptions, qu''ils profanaient mes sabbats et qu''ils gardaient les yeux sur les idoles de leurs pères. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 11+,26 ; voir aussi Rm 3.20+.
      marker-yv: yv-n
    - type: text
      text: 'C''est aussi moi qui leur ai donné des prescriptions qui n''étaient pas bonnes et des règles par lesquelles ils ne pouvaient pas vivre. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 31 ; 16.20s ; cf. Ex 13.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par le feu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette précision est absente du texte hébreu, contrairement au v. 31 ; cf. 16.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 23.37. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: né le premier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir Ex 13.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je les ai rendus impurs par leurs dons, quand ils faisaient passer par le feu tout être né le premier de sa mère ; j''ai ainsi fait en sorte qu''ils soient atterrés, pour qu''ils sachent que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH).'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu mettra un terme à l'idolâtrie des Israélites
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cause de cela, parle à la maison d''Israël, humain ; tu leur diras : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Vos pères m''ont encore injurié, en commettant des sacrilèges envers moi. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.13+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'juré, à main levée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jeté les yeux sur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs présents contrariants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la contrariété '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 8.17 ; 16.26) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de leurs présents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur ce dernier terme, cf. 40.43 ; Lv 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: libations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 23.13 ; Nb 15.1-16.'
      marker-yv: yv-n
    - type: text
      text: 'Je les ai conduits dans le pays que j''avais juré, à main levée, de leur donner, et ils ont jeté les yeux sur toute colline élevée et sur tout arbre touffu. C''est là qu''ils ont fait leurs sacrifices, offert leurs présents contrariants, disposé leurs offrandes d''odeur agréable et répandu leurs libations. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce haut lieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’ha-bama '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.3+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'où vous allez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
