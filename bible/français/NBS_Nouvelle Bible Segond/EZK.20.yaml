        - type: text
          text: '36.4 : « Tu (Dieu) leur as montré ta sainteté à l''œuvre chez nous. »'
      marker-yv: yv-n
    - type: text
      text: 'Je vous accueillerai favorablement, comme une offrande d''odeur agréable, quand je vous aurai fait sortir d''entre les peuples et que je vous aurai rassemblés des pays où vous êtes dispersés ; et je montrerai ma sainteté parmi vous sous les yeux des nations. '
