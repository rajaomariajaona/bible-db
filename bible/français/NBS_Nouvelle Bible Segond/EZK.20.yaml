document_id: EZK.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu a conduit Israël malgré ses révoltes
  - type: text
    content: ' '
  - type: note
    content: 'septième année  : 591 av. J.-C. (1.2n). –  anciens 8.1+. –  pour consulter  : cf. v. 3.'
  - type: text
    content: 'La septième année, le dixième jour du cinquième mois, des hommes parmi les anciens d''Israël vinrent pour consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et s''assirent devant moi. '
  '10':
  - type: note
    content: Jr 2.6.
  - type: text
    content: 'Je les ai fait sortir d''Egypte et je les ai conduits au désert. '
  '11':
  - type: note
    content: pour vivre par elles v. 13,21 ; cf. 18.9+ ; Lv 18.5+ ; Dt 4.1+.
  - type: text
    content: 'Je leur ai donné mes prescriptions et je leur ai fait connaître mes règles, que l''homme doit mettre en pratique pour vivre par elles. '
  '12':
  - type: note
    content: sabbats comme un signe Ex 31.13. –  qui les rends saints ou qui les consacre Lv 20.8 ; 22.9.
  - type: text
    content: 'Je leur ai aussi donné mes sabbats comme un signe entre moi et eux, pour qu''ils sachent que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui les rends saints.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'V. 16,21,24 ; cf. Ex 14.11s ; 15.24 ; 16.2s,20,27s ; Nb 11.1,4-6 ; 14.1-4 ; 16.1-15 ; 20.1-5 ; 27.14. –  rejeté  : autre traduction méprisé  ; cf. 5.6. –  pour vivre… v. 11+. –  outrageusement  : litt. beaucoup . –  mes sabbats v. 20 ; 22.8,26 ; Ex 23.12 ; Lv 19.3,30.'
  - type: text
    content: 'Mais la maison d''Israël s''est rebellée contre moi dans le désert. Ils n''ont pas suivi mes prescriptions, ils ont rejeté mes règles, que l''homme doit mettre en pratique pour vivre par elles, et ils ont outrageusement profané mes sabbats. J''ai parlé de répandre sur eux ma fureur dans le désert, pour les exterminer. '
  '14':
  - type: note
    content: 'V. 9+. –  en présence  : litt. aux yeux ou sous les yeux, de même au v. 22.'
  - type: text
    content: 'Néanmoins j''ai agi par égard pour mon nom, afin qu''il ne soit pas profané aux yeux des nations en présence desquelles je les avais fait sortir d''Egypte. '
  '15':
  - type: note
    content: Cf. v. 6+ ; Nb 14.21-23 ; Dt 1.34s.
  - type: text
    content: 'Dans le désert, c''est aussi moi qui leur ai juré, à main levée, de ne pas les conduire dans le pays que je leur avais donné, un pays ruisselant de lait et de miel, le plus beau de tous les pays, '
  '16':
  - type: note
    content: 'V. 13+. – Voir cœur. –  restait attaché à  : litt. marchait derrière, c.-à-d. suivait  ; cf. Dt 6.14n.'
  - type: text
    content: '– et cela parce qu''ils rejetaient mes règles, qu''ils ne suivaient pas mes prescriptions, qu''ils profanaient mes sabbats, car leur cœur restait attaché à leurs idoles. '
  '17':
  - type: note
    content: 'un regard de pitié  : cf. 16.5n.'
  - type: text
    content: 'Mais j''ai eu pour eux un regard de pitié : je ne les ai pas détruits, je ne les ai pas exterminés dans le désert. '
  '18':
  - type: text
    content: 'J''ai dit à leurs fils, dans le désert : Ne suivez pas les prescriptions de vos pères, n''observez pas leurs règles et ne vous rendez pas impurs avec leurs idoles ! '
  '19':
  - type: note
    content: 'Cf. 1R 8.58. –  mettez-les en pratique  : cf. 1R 6.12 ; Jr 11.6,8.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu. Suivez mes prescriptions, observez mes règles et mettez-les en pratique. '
  '2':
  - type: text
    content: 'Et la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '20':
  - type: note
    content: 'V. 12s ; cf. 44.24. –  on saura  : autre traduction vous saurez.'
  - type: text
    content: 'Faites de mes sabbats des jours sacrés, et ils seront entre moi et vous un signe, par lequel on saura que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 13+,11+,8n  ; cf. Ex 32.10,25-29 ; Nb 17.10 ; 21.4-6.
  - type: text
    content: 'Mais les fils se sont rebellés contre moi. Ils n''ont pas suivi mes prescriptions, ils n''ont pas veillé à mettre en pratique mes règles, – ces règles que l''homme doit mettre en pratique pour vivre par elles – ils ont profané mes sabbats. J''ai parlé de répandre ma fureur sur eux dans le désert, pour aller jusqu''au bout de ma colère contre eux. '
  '22':
  - type: note
    content: 'j''ai retiré ma main  : cf. 6.14+. –  pour mon nom v. 9+.'
  - type: text
    content: 'Néanmoins j''ai retiré ma main, et j''ai agi par égard pour mon nom, afin qu''il ne soit pas profané aux yeux des nations en présence desquelles je les avais fait sortir d''Egypte. '
  '23':
  - type: note
    content: Cf. 5.10+ ; 6.8n  ; 12.15.
  - type: text
    content: 'Dans le désert, c''est aussi moi qui leur ai juré, à main levée, de les disperser parmi les nations, de les disséminer dans tous les pays, '
  '24':
  - type: note
    content: V. 13+.
  - type: text
    content: 'parce qu''ils ne mettaient pas mes règles en pratique, qu''ils rejetaient mes prescriptions, qu''ils profanaient mes sabbats et qu''ils gardaient les yeux sur les idoles de leurs pères. '
  '25':
  - type: note
    content: Cf. v. 11+,26 ; voir aussi Rm 3.20+.
  - type: text
    content: 'C''est aussi moi qui leur ai donné des prescriptions qui n''étaient pas bonnes et des règles par lesquelles ils ne pouvaient pas vivre. '
  '26':
  - type: note
    content: 'V. 31 ; 16.20s ; cf. Ex 13.12n. –  par le feu  : cette précision est absente du texte hébreu, contrairement au v. 31 ; cf. 16.21n  ; 23.37. –  né le premier  : voir Ex 13.2n.'
  - type: text
    content: 'Je les ai rendus impurs par leurs dons, quand ils faisaient passer par le feu tout être né le premier de sa mère ; j''ai ainsi fait en sorte qu''ils soient atterrés, pour qu''ils sachent que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  - type: heading
    content: Dieu mettra un terme à l'idolâtrie des Israélites
  '27':
  - type: text
    content: 'A cause de cela, parle à la maison d''Israël, humain ; tu leur diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Vos pères m''ont encore injurié, en commettant des sacrilèges envers moi. '
  '28':
  - type: note
    content: '6.13+. –  juré, à main levée v. 5n. –  jeté les yeux sur  : litt. vu. –  leurs présents contrariants  : litt. la contrariété (cf. 8.17 ; 16.26) de leurs présents  ; sur ce dernier terme, cf. 40.43 ; Lv 1.2n. –  libations  : cf. Lv 23.13 ; Nb 15.1-16.'
  - type: text
    content: 'Je les ai conduits dans le pays que j''avais juré, à main levée, de leur donner, et ils ont jeté les yeux sur toute colline élevée et sur tout arbre touffu. C''est là qu''ils ont fait leurs sacrifices, offert leurs présents contrariants, disposé leurs offrandes d''odeur agréable et répandu leurs libations. '
  '29':
  - type: note
    content: 'ce haut lieu (hébreu ’ha-bama 6.3+) où vous allez (hébreu ha-ba''im) : l''assonance des deux termes sert ici d''explication au nom usuel des hauts lieux.'
  - type: text
    content: 'Je leur dis : Qu''est-ce que ce haut lieu où vous allez ? Et on les a appelés du nom de hauts lieux, jusqu''à ce jour.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Par ma vie 5.11n. –  je ne me laisserai pas consulter  : cf. v. 1,31s ; 14.3 ; 1R 22.5,7ns ; voir aussi Ez 36.37n.'
  - type: text
    content: 'Humain, parle aux anciens d''Israël ; tu leur diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Est-ce pour me consulter que vous êtes venus ? Par ma vie, je ne me laisserai pas consulter par vous – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'à la manière  : litt. sur la voie  ; cf. v. 43s. –  prostituez-vous 6.9+. –  avec leurs horreurs  : litt. derrière leurs horreurs  ; cf. 5.11+.'
  - type: text
    content: 'A cause de cela, dis à la maison d''Israël : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Ne vous rendez-vous pas impurs à la manière de vos pères ? Ne vous prostituez-vous pas avec leurs horreurs ? '
  '31':
  - type: note
    content: 'par le feu  : cf. v. 26 ; 16.21n  ; la précision est absente de LXX. –  consulter v. 1,3.'
  - type: text
    content: 'En présentant vos dons, en faisant passer vos enfants par le feu, vous vous rendez impurs avec toutes vos idoles, jusqu''à aujourd''hui. Moi, je me laisserais consulter par vous, maison d''Israël ! Par ma vie, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – je ne me laisserai pas consulter par vous ! '
  '32':
  - type: note
    content: 'Il n''y aura pas…  : litt. ce qui monte à votre esprit ne sera pas. –  comme les nations  : cf. 25.8. –  bois / pierre Dt 4.28+.'
  - type: text
    content: 'Il n''y aura pas de réalisation à ce que vous imaginez, quand vous dites : Nous voulons être comme les nations, comme les clans des pays, nous voulons officier pour le bois et la pierre. '
  '33':
  - type: note
    content: 'Par ma vie… 5.11n. –  à coup sûr 5.11n. –  je régnerai  : cf. 1S 8.5ss. –  d''une main forte… Dt 4.34+ ; cf. Ex 3.19s ; 6.1,6 ; Jr 21.5. –  en répandant…  : litt. d''une fureur répandue, de même au v. 34.'
  - type: text
    content: 'Par ma vie, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – à coup sûr, je régnerai sur vous d''une main forte, d''un bras étendu, en répandant ma fureur. '
  '34':
  - type: note
    content: 'Je vous ferai sortir…  : cf. v. 41 ; cf. 2Co 6.17.'
  - type: text
    content: 'Je vous ferai sortir d''entre les peuples et je vous rassemblerai des pays où vous êtes dispersés, d''une main forte, d''un bras étendu, en répandant ma fureur. '
  '35':
  - type: note
    content: 'le désert des peuples  : cf. v. 32,36 ; Os 2.16.'
  - type: text
    content: 'Je vous amènerai dans le désert des peuples et là j''entrerai en jugement avec vous face à face. '
  '36':
  - type: note
    content: V. 10-27.
  - type: text
    content: 'Comme je suis entré en jugement avec vos pères dans le désert d''Egypte, ainsi j''entrerai en jugement avec vous – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '37':
  - type: note
    content: 'sous la houlette  : image du berger qui compte et trie les moutons (cf. 34.17 ; voir aussi Lv 27.32n  ; Mi 7.14 ; Pr 23.7) ; le même terme désigne aussi le sceptre du roi. –  et je vous conduirai…  : autre traduction et je vous ferai entrer dans le lien de l''alliance  ; LXX a lu je vous ferai passer au dénombrement, dans la ligne de l''image précédente ; le mot pour alliance serait alors dû à une erreur de copie. –  par (ou dans) le lien  : hébreu masoreth, nom qui n''apparaît qu''ici dans l''A.T. et qui en est venu plus tard à désigner la tradition juive (cf. Massore, massorétique).'
  - type: text
    content: 'Je vous ferai passer sous la houlette et je vous conduirai par le lien de l''alliance. '
  '38':
  - type: note
    content: séjournent en immigrés 14.7 ; Ex 12.48n. –  ils ne viendront pas, d'après quelques mss hébreux et des versions anciennes ; le texte hébreu traditionnel porte il ne viendra pas  ; cf. 13.9.
  - type: text
    content: 'Je séparerai de vous ceux qui se rebellent et se révoltent contre moi ; je les ferai sortir du pays où ils séjournent en immigrés, mais ils ne viendront pas sur la terre d''Israël. Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'ne m''écouterez-vous pas  : la tournure de l''hébreu pourrait aussi être lue comme une formule de serment, d''où l''autre traduction possible  : je vous garantis que vous m''écouterez . –  mon nom sacré ou mon saint nom.'
  - type: text
    content: 'Et vous, maison d''Israël, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Allez, que chacun serve ses idoles ! Mais après cela, ne m''écouterez-vous pas ? Vous ne profanerez plus mon nom sacré par vos dons et par vos idoles. '
  '4':
  - type: note
    content: 16.2 ; 22.2s ; 23.36 ; sur l'ensemble du chap., cf. Ps 106.
  - type: text
    content: Les jugeras-tu, les jugeras-tu, humain ? Fais-leur connaître les abominations de leurs pères !
  '40':
  - type: note
    content: 'dans ma montagne… 17.23n  ; 28.14 ; 40.2 ; 43.7 ; Es 2.1-2+ ; 11.9 ; Za 8.3 ; Ps 2.6+ ; 48.3. –  je les accueillerai favorablement ou je les agréerai, de même au v. 41 ; cf. 43.27. –  prélèvements 44.30 ; 45.1n,13,16 ; voir Ex 25.2n. –  les prémices de vos dons  : c.-à-d. le meilleur de vos dons  ; autre traduction les prémices de vos gains.'
  - type: text
    content: 'Car dans ma montagne sacrée, dans la montagne qui domine Israël, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – là, toute la maison d''Israël, tous ceux qui seront dans le pays me serviront ; là je les accueillerai favorablement ; je rechercherai vos prélèvements, les prémices de vos dons et tout ce que vous consacrerez. '
  '41':
  - type: note
    content: 'odeur agréable v. 28 ; 6.13+ ; cf. Ep 5.2 ; Ph 4.18. –  quand je vous aurai fait sortir… v. 34. –  je montrerai ma sainteté parmi vous (ou en vous) : termes apparentés pour saint et sacré dans les v. précédents ; autre traduction vous montrerez ma sainteté 28.22,25 ; 36.23 ; 38.16,23 ; 39.27 ; Lv 10.3n  ; Nb 20.13n  ; cf. Ex 31.13 ; 1S 17.46 ; Es 5.16 ; Mt 6.9 ; Siracide 36.4 : « Tu (Dieu) leur as montré ta sainteté à l''œuvre chez nous. »'
  - type: text
    content: 'Je vous accueillerai favorablement, comme une offrande d''odeur agréable, quand je vous aurai fait sortir d''entre les peuples et que je vous aurai rassemblés des pays où vous êtes dispersés ; et je montrerai ma sainteté parmi vous sous les yeux des nations. '
  '42':
  - type: note
    content: V. 5n,28. –  vous saurez 5.13+ ; cf. v. 44 ; 34.30 ; Ex 6.7 ; 16.12 ; 29.46 ; 1R 13.28.
  - type: text
    content: 'Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand je vous ramènerai sur la terre d''Israël, dans le pays que j''avais juré, à main levée, de donner à vos pères. '
  '43':
  - type: note
    content: 'vos voies  : cf. 14.22+. –  vous n''oserez plus… 6.9n.'
  - type: text
    content: 'Là vous vous souviendrez de vos voies et de tous les agissements par lesquels vous vous êtes rendus impurs ; vous n''oserez plus vous regarder en face, à cause de tous les méfaits que vous avez commis. '
  '44':
  - type: text
    content: 'Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand j''agirai avec vous par égard pour mon nom, et non pas d''après vos voies mauvaises et vos agissements pervers, maison d''Israël ! – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai choisi Israël  : cf. Dt 7.6 ; 10.15 ; 14.2. –  j''ai fait serment (ou j''ai juré v. 6) , à main levée, à  : litt. j''ai levé ma main pour , de même dans la suite du chap. et en 36.7 ; 44.12 ; 47.14 ; cf. Gn 14.22 ; Ex 6.6-8 ; Nb 14.30 ; Dt 1.8+ ; 32.40. –  Je suis le Seigneur … Ex 3.14 ; 20.2 ; Lv 18.2,4-6 etc.'
  - type: text
    content: 'Tu leur diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Le jour où j''ai choisi Israël, j''ai fait serment, à main levée, à la descendance de la maison de Jacob, et je me suis fait connaître à eux en Egypte ; je leur ai fait serment à main levée : Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu. '
  '6':
  - type: note
    content: 'exploré  : cf. Nb 10.33n  ; 13.2,21 ; Dt 11.12. –  lait / miel Ex 3.8n  ; Jr 11.5+. –  le plus beau…  : litt. la beauté (ou l''ornement) de tous les pays, de même au v. 15 ; cf. Jr 3.19 ; Dn 8.9n.'
  - type: text
    content: 'En ce jour-là, je leur ai juré, à main levée, de les faire sortir d''Egypte, vers un pays que j''avais exploré pour eux, un pays ruisselant de lait et de miel, le plus beau de tous les pays. '
  '7':
  - type: note
    content: 'horreurs 5.11+. –  qui attirent ses yeux  : litt. de ses yeux, de même au v. 8. –  impurs  : voir pur. –  de l''Egypte  : cf. 23.3,8,19-21 ; voir aussi 16.26 ; Lv 18.3 ; Jr 46.25.'
  - type: text
    content: 'Je leur dis : Que chacun d''entre vous rejette les horreurs qui attirent ses yeux ! Ne vous rendez pas impurs avec les idoles de l''Egypte ! Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'répandre ma fureur… 5.13+. –  aller jusqu''au bout  : le même verbe est traduit par exterminer au v. 13.'
  - type: text
    content: 'Ils se sont rebellés contre moi et ils n''ont pas voulu m''écouter. Aucun n''a rejeté les horreurs qui attiraient ses yeux, et ils n''ont pas abandonné les idoles de l''Egypte. J''ai parlé de répandre ma fureur sur eux au milieu de l''Egypte, pour aller jusqu''au bout de ma colère contre eux. '
  '9':
  - type: note
    content: 'par égard pour mon nom  : cf. v. 5 ; voir aussi v. 14,22 ; 36.20-22 ; 39.25 ; Ex 32.12 ; Nb 14.13-16 ; Es 48.11 ; Ps 109.21. –  en les faisant sortir  : autre traduction pour les faire sortir.'
  - type: text
    content: 'Néanmoins j''ai agi par égard pour mon nom, afin qu''il ne soit pas profané sous les yeux des nations parmi lesquelles ils se trouvaient, et sous les yeux desquelles je m''étais fait connaître à eux en les faisant sortir d''Egypte. '
