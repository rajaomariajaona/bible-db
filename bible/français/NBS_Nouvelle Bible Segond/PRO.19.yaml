document_id: PRO.19,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 1s sont absents de LXX. –  Mieux vaut le pauvre… 28.6. –  qui suit la voie…  : litt. qui marche dans son intégrité  ; autre traduction qui se conduit honnêtement  ; de même en 20.7 ; cf. Ps 26.1n. –  qu''un homme qui…  : litt. que le tortueux (ou pervers ) des lèvres  ; cf. 4.24n. –  stupide 1.22+.'
  - type: text
    content: Mieux vaut le pauvre qui suit la voie de l'intégrité
  - type: text
    content: qu'un homme qui, sous un langage tortueux, est stupide.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'stupide 1.22+. –  un esclave…  : cf. 30.22 ; Ec 10.7.'
  - type: text
    content: Il ne convient pas à un homme stupide de vivre dans les délices ;
  - type: text
    content: combien moins à un esclave de dominer sur des princes !
  '11':
  - type: text
    content: ' '
  - type: note
    content: patient 14.29+.
  - type: text
    content: Celui qui a du bon sens est patient ;
  - type: text
    content: il met son honneur à passer sur une offense.
  '12':
  - type: text
    content: ' '
  - type: note
    content: L'irritation (v. 3n) du roi 20.2 ; cf. 14.35n  ; 16.14n. Voir aussi 16.15.
  - type: text
    content: L'irritation du roi est comme le grondement d'un jeune lion ;
  - type: text
    content: sa faveur est comme la rosée sur l'herbe.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'fils stupide  : cf. 1.22+ ; 10.1. –  querelles d''une femme  : cf. 21.9,19 ; 25.24 ; Siracide 25.16 : « J''aimerais mieux habiter avec un lion ou un dragon que d''habiter avec une femme mauvaise. » –  une gouttière… 27.15.'
  - type: text
    content: Un fils stupide est une calamité pour son père ;
  - type: text
    content: les querelles d'une femme sont une gouttière qui ne cesse de couler.
  '14':
  - type: text
    content: ' '
  - type: note
    content: une femme 18.22n.
  - type: text
    content: Une maison et des biens, voilà le patrimoine qu'on reçoit des pères ;
  - type: text
    content: 'une femme qui a du bon sens est un don du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'La paresse… 6.6n  ; cf. 20.13. –  fait tomber en torpeur  : cf. Gn 2.21+ ; autre traduction fait tomber dans un profond sommeil , cf. Jg 4.21 ; Jon 1.5. –  celui qui est nonchalant  : cf. 10.4.'
  - type: text
    content: La paresse fait tomber en torpeur ;
  - type: text
    content: celui qui est nonchalant aura faim.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui garde ou qui observe les préceptes (ou le commandement , 2.1n) : cf. 3.21s ; Lc 11.28. –  ses voies  : certains comprennent qu''il s''agit des voies de Dieu  ; d''autres traduisent son autorité  ; d''autres encore modifient le texte hébreu traditionnel pour lire la parole (cf. 13.13). LXX ses propres voies . –  mourra  : autre lecture traditionnelle sera mis à mort  ; cf. 16.17.'
  - type: text
    content: Celui qui garde les préceptes se garde lui-même ;
  - type: text
    content: celui qui méprise ses voies mourra.
  '17':
  - type: text
    content: ' '
  - type: note
    content: fait grâce… 14.31 ; 28.8 ; cf. 28.27 ; Mt 25.40. Voir aussi Pr 22.2n.
  - type: text
    content: 'Celui qui fait grâce au pauvre prête au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui lui rendra ce qui lui est dû.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Instruis ou corrige 9.7n. –  tant qu''il y a de l''espoir  : LXX a compris  : car il y a de l''espoir  ; cf. Dt 21.18-21. Voir aussi Pr 13.24 ; Ep 6.4.'
  - type: text
    content: Instruis ton fils tant qu'il y a de l'espoir ;
  - type: text
    content: n'en viens pas à souhaiter sa mort.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Celui…  : texte obscur ; une lecture traditionnelle permettrait de comprendre celui qui est grand de fureur porte l''amende  ; les termes hébreux correspondant à ces deux derniers mots font assonance ; certains interprètent ici doit porter des chaînes . –  si tu l''exemptes…  : sens très incertain, comme en témoignent les variantes dans les versions anciennes. On a aussi compris  : si tu t''en dispenses, tu ajouteras encore (à sa colère) , ou cela ne fait qu''accroître (le mal)  ; ou encore, dans l''hypothèse des chaînes  : si tu les lui enlèves, tu devras les lui remettre.'
  - type: text
    content: 'Celui que la fureur emporte doit en payer le prix :'
  - type: text
    content: si tu l'exemptes, tu aggraves encore son cas.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Il n''est pas bon…  : on pourrait rattacher ce v. au v. 1 et traduire pire encore…  ; autres traductions le manque de connaissance n''est bon pour personne ou n''est pas bon pour la vie ; sans la connaissance, le désir n''est pas bon  ; sur le terme correspondant à se (méconnaître), personne, vie ou désir , voir Gn 1.20n. –  à se précipiter…  : litt. celui qui se précipite avec ses pieds manque le but (ou pèche ) ; cf. 8.36n  ; 20.2n.'
  - type: text
    content: Il n'est pas bon de se méconnaître ;
  - type: text
    content: à se précipiter on manque le but.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoute 1.8n. –  conseils  : le même terme est rendu par projets au v. 21 ; cf. 1.25+ ; Es 5.19n. –  instruction 1.2n.'
  - type: text
    content: Ecoute les conseils, reçois l'instruction,
  - type: text
    content: afin que par la suite tu deviennes sage.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'dans le cœur  : cf. 16.1,9. –  les projets  : cf. Es 46.10 ; Ps 33.11 ; 115.3 ; Jb 23.13. – Cf. Instruction d''Aménémopé 19.16s : « Les paroles que les hommes prononcent sont une chose, ce que le dieu fait en est une autre. »'
  - type: text
    content: Il y a dans le cœur de l'homme beaucoup de pensées ;
  - type: text
    content: 'ce sont les projets du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui tiennent.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Ce qu''on désire…  : LXX le fruit d''un homme, c''est sa compassion ; mieux vaut un pauvre juste qu''un riche menteur.'
  - type: text
    content: Ce qu'on désire chez quelqu'un, c'est la fidélité ;
  - type: text
    content: mieux vaut un pauvre qu'un menteur.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'crainte du Seigneur 1.7n. –  mène à la vie  : cf. 13.14+ ; 14.27+ ; Ps 34.10. –  on se couche  : litt. il passe la nuit  ; cf. 15.31n.'
  - type: text
    content: 'La crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ' mène à la vie ;'
  - type: text
    content: on se couche rassasié, sans être visité par le malheur.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Le paresseux 26.15 ; cf. 6.6-11.
  - type: text
    content: Le paresseux plonge sa main dans le plat ;
  - type: text
    content: il ne la ramène même pas à sa bouche.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Frappe l''insolent  : cf. v. 29 ; 9.7 ; 21.11. –  naïf / avisé 1.4n.'
  - type: text
    content: Frappe l'insolent, et le naïf deviendra avisé ;
  - type: text
    content: avertis l'homme intelligent, et il comprendra la connaissance.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'ruine son père…  : cf. 20.20+ ; 23.22 ; 30.11,17 ; Ex 21.17 ; Siracide 3.16 : « C''est un blasphémateur, celui qui abandonne son père. Il est maudit du Seigneur, celui qui irrite sa mère. » –  fait rougir 13.5.'
  - type: text
    content: Celui qui ruine son père et qui fait fuir sa mère
  - type: text
    content: est un fils qui fait honte et qui fait rougir.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cesse, mon fils…  : sens incertain et interprétations diverses. LXX un fils qui cesse de garder l''instruction de son père méditera des paroles mauvaises . –  l''instruction 1.2n.'
  - type: text
    content: Cesse, mon fils, d'écouter l'instruction,
  - type: text
    content: si c'est pour t'égarer loin des discours de la connaissance.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'sans morale  : cf. 6.12 ; 16.27 ; Dt 13.14n. –  se moque  : autre traduction agit avec insolence à l''égard de  ; cf. 1.22n. –  l''équité  : autre traduction le droit  ; cf. 19.26n. –  la bouche des méchants  : cf. 15.28.'
  - type: text
    content: Le témoin sans morale se moque de l'équité avec insolence ;
  - type: text
    content: la bouche des méchants dévore le mal.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.13. –  insolents / stupides 1.22+.
  - type: text
    content: Les jugements sont prêts pour les insolents ;
  - type: text
    content: les coups, pour le dos des gens stupides.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'L''imbécillité de l''être humain  : cf. Jc 1.13-15 ; Siracide 21.19 : « Comme des entraves aux pieds, telle est l''instruction pour l''imbécile, et comme des menottes à la main droite. » –  s''irrite  : v. 12 ; le terme correspondant peut évoquer une gamme de sentiments et d''émotions négatifs, de la mauvaise humeur à la rage (cf. v. 12 ; Gn 40.6 ; 1R 20.43 ; 21.4 ; Es 30.30 ; Jon 1.15 ; Mi 7.9 ; Dn 1.10 ; 2Ch 16.10 ; 26.19 ; 28.9).'
  - type: text
    content: L'imbécillité de l'être humain pervertit sa voie ;
  - type: text
    content: 'et c''est contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' que son cœur s''irrite.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'richesse… pauvre  : cf. 14.20+ ; Siracide 12.8s : « Ce n''est pas dans le bonheur qu''on reconnaît l''ami, mais dans le malheur l''ennemi ne reste pas caché. Quand un homme est heureux, ses ennemis sont dans l''affliction, mais dans ses malheurs, même son ami s''écarte de lui. » –  tenu à l''écart par  : autre traduction séparé de . –  compagnon Gn 26.26+.'
  - type: text
    content: La richesse augmente le nombre des amis ;
  - type: text
    content: le pauvre est tenu à l'écart par son compagnon.
  '5':
  - type: text
    content: ' '
  - type: note
    content: faux témoin / profère le mensonge v. 9 ; 6.19n  ; cf. 21.28 ; Dt 19.18s.
  - type: text
    content: Le faux témoin ne sera pas tenu pour innocent ;
  - type: text
    content: celui qui profère le mensonge n'échappera pas.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Beaucoup Ec 5.10. –  cherchent la faveur  : litt. caressent la face  ; cf. Jb 11.19n, voir Ex 32.11+ ( chercher à apaiser ) ; voir aussi Pr 29.26. –  noble ou généreux  ; le mot hébreu peut avoir les deux sens. –  chacun est l''ami…  : cf. Ec 5.10 ; Siracide 13.5s : « Si tu as du bien, il vivra avec toi, il te grugera sans remords. A-t-il besoin de toi ? Il te dupera, il te sourira et te donnera de l''espoir ; il te fera des compliments et dira : “Que puis-je faire pour toi ?” » –  fait des cadeaux  : cf. 17.8.'
  - type: text
    content: Beaucoup de gens cherchent la faveur du noble ;
  - type: text
    content: chacun est l'ami de celui qui fait des cadeaux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'les frères du pauvre… 14.20+ ; cf. Siracide 13.21 : « Le riche qui chancelle est soutenu par ses amis, mais l''humble qui tombe est repoussé par les siens. » –  de ses paroles  : litt. de paroles.'
  - type: text
    content: Tous les frères du pauvre le détestent ;
  - type: text
    content: à plus forte raison ses compagnons s'éloignent-ils de lui !
  - type: text
    content: Il les poursuit de ses paroles, mais ils ne sont plus là.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'la raison  : litt. le cœur ou du cœur  ; cf. 15.32.'
  - type: text
    content: Celui qui acquiert la raison s'aime lui-même ;
  - type: text
    content: celui qui garde l'intelligence trouve le bonheur.
  '9':
  - type: text
    content: ' '
  - type: note
    content: faux témoin v. 5n.
  - type: text
    content: Le faux témoin ne sera pas tenu pour innocent ;
  - type: text
    content: celui qui profère le mensonge disparaîtra.
