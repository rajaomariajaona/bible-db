document_id: GEN.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Isaac et Abimélek
  - type: text
    content: ' '
  - type: note
    content: Sur l'ensemble du chap., cf. 12.10-20 ; 20.1-18.
  - type: text
    content: 'Il y eut une famine dans le pays – en plus de la première famine qui avait eu lieu aux jours d''Abraham. Isaac alla chez Abimélek, roi des Philistins, à Guérar. '
  '10':
  - type: note
    content: 'Cf. Pr 6.29. –  tu nous aurais mis en tort  : autres traductions tu nous aurais rendus coupables ; tu nous aurais fait du tort.'
  - type: text
    content: 'Abimélek lui dit : Qu''est-ce que tu nous as fait ? Peu s''en est fallu que quelqu''un du peuple ne couche avec ta femme : tu nous aurais mis en tort ! '
  '11':
  - type: text
    content: 'Alors Abimélek donna cet ordre à tout le peuple : Celui qui touchera à cet homme et à sa femme sera mis à mort.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'au centuple  : hébreu méa (= cent ) she‘arim , expression obscure ; peut-être le deuxième mot est-il le nom d''une mesure de grain ; cf. Rt 3.15n.'
  - type: text
    content: 'Isaac sema dans ce pays, et il récolta au centuple cette année-là : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le bénit. '
  '13':
  - type: note
    content: 'riche  : litt. grand.'
  - type: text
    content: 'Il devint un homme riche, il alla s''enrichissant de plus en plus : il finit par être vraiment très riche. '
  '14':
  - type: text
    content: Il avait des troupeaux de petit bétail, des troupeaux de gros bétail et un grand nombre de serviteurs ; les Philistins furent jaloux de lui.
  - type: heading
    content: Isaac fait alliance avec Abimélek
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'de terre  : litt. de poussière.'
  - type: text
    content: 'Tous les puits qu''avaient creusés les serviteurs de son père, aux jours d''Abraham, son père, les Philistins les bouchèrent en les remplissant de terre. '
  '16':
  - type: note
    content: 'Ex 1.9. –  beaucoup trop…  : autre traduction beaucoup plus puissant que nous  ; cf. 18.18+.'
  - type: text
    content: 'Alors Abimélek dit à Isaac : Va-t''en de chez nous, car tu es beaucoup trop puissant pour nous. '
  '17':
  - type: note
    content: 'oued  : ce mot d''origine arabe traduit souvent le terme hébreu nahal  ; celui-ci peut désigner un cours d''eau formé essentiellement par le ruissellement des pluies, mais aussi (c''est le cas ici) la vallée ou le ravin que suit le lit de ce cours d''eau. Il s''agit souvent (pas toujours, cf. 32.24 ; Dt 21.4n) de cours d''eau intermittents, qui sont habituellement à sec en été (1R 17.4ss ; Jb 6.15n) mais qui peuvent connaître, à la suite d''un orage par exemple, des crues soudaines et violentes (cf. Jg 5.21).'
  - type: text
    content: 'Isaac partit de là et installa son campement dans l''oued de Guérar, où il habita. '
  '18':
  - type: text
    content: 'Isaac creusa de nouveau les puits qu''on avait creusés aux jours d''Abraham, son père, et que les Philistins avaient bouchés après la mort d''Abraham. Il les appela des mêmes noms dont son père les avait appelés. '
  '19':
  - type: text
    content: 'Les serviteurs d''Isaac creusèrent encore dans l''oued et y trouvèrent un puits d''eau vive. '
  '2':
  - type: note
    content: Cf. 12.1,10n  ; 28.13-15 ; 46.3 ; Hé 11.9.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui apparut et dit : Ne descends pas en Egypte, demeure dans le pays que je te dirai. '
  '20':
  - type: note
    content: 'cherchèrent querelle aux…  : autre traduction se querellèrent avec… –  Eseq signifie dispute  ; c''est un verbe apparenté qui est rendu par on s''était disputé (autre traduction ils s''étaient disputés).'
  - type: text
    content: 'Les bergers de Guérar cherchèrent querelle aux bergers d''Isaac en disant : L''eau nous appartient ! Il appela donc le puits du nom d''Eseq (« Dispute »), parce qu''on s''était disputé avec lui. '
  '21':
  - type: note
    content: Sitna (= Opposition ou Accusation, cf. Esd 4.6) vient de la racine stn, qui signifie s'opposer à ou accuser et qui a donné le nom Satan (Za 3.1n  ; Jb 1.6n).
  - type: text
    content: 'Ils creusèrent un autre puits, au sujet duquel il y eut aussi querelle ; il l''appela du nom de Sitna (« Opposition »). '
  '22':
  - type: note
    content: 'Rehoboth (= Largeurs) : cf. 10.11 ; 36.37 ; Ps 18.20. –  nous pourrons être féconds 1.22+ ou, plus généralement, nous prospérerons Dt 28.4,8 ; Ps 144.12-15.'
  - type: text
    content: 'Il leva le camp et creusa un autre puits, au sujet duquel il n''y eut pas querelle ; il l''appela du nom de Rehoboth (« Largeurs »), car, dit-il, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a maintenant mis au large, et nous pourrons être féconds dans le pays.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Bersabée 21.14n,31n.
  - type: text
    content: 'De là il monta à Bersabée. '
  '24':
  - type: note
    content: n'aie pas peur 15.1+ ; voir crainte.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui apparut cette nuit-là et dit : Je suis le Dieu d''Abraham, ton père ; n''aie pas peur, car je suis avec toi ; je te bénirai et je multiplierai ta descendance à cause d''Abraham, mon serviteur. '
  '25':
  - type: note
    content: autel 8.20+. –  invoqua le nom… 4.26+.
  - type: text
    content: 'Là, Isaac bâtit un autel et invoqua le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). Là, il dressa sa tente ; là, les serviteurs d''Isaac forèrent un puits.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'se rendit  : autre traduction s''était rendu . –  Ahouzath  : ce nom peut signifier propriété, possession  ; au lieu de Ahouzath, son compagnon , certains comprennent avec le groupe de ses familiers (cf. Jg 14.11,20 ; 15.2,6 ; 2S 3.8 ; Jb 6.14 ; Pr 19.4,7). –  Pikol 21.22,32.'
  - type: text
    content: 'Abimélek se rendit auprès de lui depuis Guérar, avec Ahouzath, son compagnon, et Pikol, le chef de son armée. '
  '27':
  - type: note
    content: 'renvoyé  : c''est la même forme verbale qui est traduite par laisser partir aux v. 29,31.'
  - type: text
    content: 'Isaac leur dit : Pourquoi êtes-vous venus me voir, alors que vous me détestez et que vous m''avez renvoyé de chez vous ? '
  '28':
  - type: note
    content: avec toi 39.3 ; 1S 18.14. –  adjuration 24.41n.
  - type: text
    content: 'Ils répondirent : Nous voyons bien que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec toi. C''est pourquoi nous disons : Qu''il y ait, je te prie, une adjuration entre nous, entre nous et toi. Concluons avec toi une alliance : '
  '29':
  - type: note
    content: 'maltraité  : litt. touché. C''est du même verbe que vient le mot habituellement traduit par fléau. –  laissé partir v. 27n. –  en paix Jos 10.21n. –  béni du Seigneur 24.31.'
  - type: text
    content: 'tu ne nous feras aucun mal, de même que nous ne t''avons pas maltraité, que nous t''avons fait seulement du bien et que nous t''avons laissé partir en paix. Tu es maintenant béni du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: note
    content: '12.3+,7+ ; 22.16 ; 28.15. –  Séjourne en immigré  : cf. 12.10n  ; 20.1n. – Voir bénédiction. –  tous ces pays ou toutes ces terres  ; c''est ici le seul passage où la promesse du pays est énoncée au pluriel (aussi v. 4).'
  - type: text
    content: 'Séjourne en immigré dans ce pays-ci ; je serai avec toi et je te bénirai, car c''est à toi et à ta descendance que je donnerai tous ces pays ; je tiendrai ainsi le serment que j''ai fait à Abraham, ton père. '
  '30':
  - type: note
    content: 'Isaac…  : litt. il leur fit un banquet  ; il s''agit ici d''un repas rituel qui scelle l''alliance, 31.46,54 ; Ex 24.11.'
  - type: text
    content: 'Isaac donna pour eux un banquet ; ils mangèrent et burent. '
  '31':
  - type: note
    content: laissa partir v. 27n.
  - type: text
    content: Puis ils se levèrent de bon matin et s'engagèrent par serment l'un envers l'autre. Isaac les laissa partir, et ils le quittèrent en paix.
  '32':
  - type: text
    content: 'Ce jour-là, des serviteurs d''Isaac vinrent lui dire, au sujet du puits qu''ils avaient creusé : Nous avons trouvé de l''eau ! '
  '33':
  - type: note
    content: Shiba / Bersabée (hébreu Be'er-Shéba‘) ; les mots hébreux correspondants peuvent évoquer le serment (v. 31) ou le chiffre sept (sens habituel de la forme Shiba) ; Vg a vu ici l'idée d'abondance ; voir 21.31nss.
  - type: text
    content: Isaac l'appela Shiba (« Serment »). C'est pourquoi le nom de la ville est Bersabée (« Puits du Serment »), jusqu'à ce jour.
  - type: heading
    content: Mariage d'Esaü
  '34':
  - type: text
    content: ' '
  - type: note
    content: Hittite 10.15n.
  - type: text
    content: 'Esaü, à l''âge de quarante ans, prit pour femmes Judith, fille de Bééri, le Hittite, et Basmath, fille d''Elôn, le Hittite. '
  '35':
  - type: note
    content: 'un sujet d''amertume  : litt. une amertume d''esprit. Sur le mariage avec des femmes étrangères, cf. 24.3+ ; 27.46–28.9.'
  - type: text
    content: Elles furent un sujet d'amertume pour Isaac et Rébecca.
  '4':
  - type: note
    content: 12.3n.
  - type: text
    content: 'Je multiplierai ta descendance comme les étoiles du ciel ; je donnerai tous ces pays à ta descendance. Toutes les nations de la terre se béniront par ta descendance, '
  '5':
  - type: text
    content: 'parce qu''Abraham m''a écouté et qu''il a gardé mes observances, mes commandements, mes prescriptions et mes lois. '
  '6':
  - type: text
    content: Ainsi Isaac s'installa à Guérar.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ne le tuent  : litt. ne me tuent.'
  - type: text
    content: 'Lorsque les hommes du lieu posaient des questions sur sa femme, il disait : « C''est ma sœur. » Il avait peur de dire : « C''est ma femme », de crainte que les hommes du lieu ne le tuent à cause de Rébecca, car elle était belle. '
  '8':
  - type: note
    content: 'qui s''amusait  : le texte joue sur le nom d’Isaac  ; cf. 17.17+ ; 21.9n.'
  - type: text
    content: 'Comme son séjour se prolongeait, Abimélek, roi des Philistins, regardant par la fenêtre, vit Isaac qui s''amusait avec Rébecca, sa femme. '
  '9':
  - type: text
    content: 'Abimélek appela Isaac et lui dit : C''est donc ta femme ! Comment as-tu pu dire : « C''est ma sœur ! » Isaac lui répondit : J''ai parlé ainsi de crainte de mourir à cause d''elle. '
