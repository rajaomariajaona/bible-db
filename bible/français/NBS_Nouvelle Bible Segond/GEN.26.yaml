document_id: GEN.26,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaac et Abimélek
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur l'ensemble du chap., cf. 12.10-20 ; 20.1-18.
      marker-yv: yv-n
    - type: text
      text: 'Il y eut une famine dans le pays – en plus de la première famine qui avait eu lieu aux jours d''Abraham. Isaac alla chez Abimélek, roi des Philistins, à Guérar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Pr 6.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu nous aurais mis en tort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu nous aurais rendus coupables ; tu nous aurais fait du tort.
      marker-yv: yv-n
    - type: text
      text: 'Abimélek lui dit : Qu''est-ce que tu nous as fait ? Peu s''en est fallu que quelqu''un du peuple ne couche avec ta femme : tu nous aurais mis en tort ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors Abimélek donna cet ordre à tout le peuple : Celui qui touchera à cet homme et à sa femme sera mis à mort.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au centuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'méa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: she‘arim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression obscure ; peut-être le deuxième mot est-il le nom d''une mesure de grain ; cf. Rt 3.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Isaac sema dans ce pays, et il récolta au centuple cette année-là : le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' le bénit. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: riche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: grand.
      marker-yv: yv-n
    - type: text
      text: 'Il devint un homme riche, il alla s''enrichissant de plus en plus : il finit par être vraiment très riche. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il avait des troupeaux de petit bétail, des troupeaux de gros bétail et un grand nombre de serviteurs ; les Philistins furent jaloux de lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaac fait alliance avec Abimélek
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de poussière.
      marker-yv: yv-n
    - type: text
      text: 'Tous les puits qu''avaient creusés les serviteurs de son père, aux jours d''Abraham, son père, les Philistins les bouchèrent en les remplissant de terre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 1.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: beaucoup trop…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: beaucoup plus puissant que nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 18.18+.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Abimélek dit à Isaac : Va-t''en de chez nous, car tu es beaucoup trop puissant pour nous. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: oued
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce mot d''origine arabe traduit souvent le terme hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nahal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; celui-ci peut désigner un cours d''eau formé essentiellement par le ruissellement des pluies, mais aussi (c''est le cas ici) la vallée ou le ravin que suit le lit de ce cours d''eau. Il s''agit souvent (pas toujours, cf. 32.24 ; Dt 21.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) de cours d'eau intermittents, qui sont habituellement à sec en été (1R 17.4ss ; Jb 6.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) mais qui peuvent connaître, à la suite d'un orage par exemple, des crues soudaines et violentes (cf. Jg 5.21).
      marker-yv: yv-n
    - type: text
      text: 'Isaac partit de là et installa son campement dans l''oued de Guérar, où il habita. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Isaac creusa de nouveau les puits qu''on avait creusés aux jours d''Abraham, son père, et que les Philistins avaient bouchés après la mort d''Abraham. Il les appela des mêmes noms dont son père les avait appelés. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les serviteurs d''Isaac creusèrent encore dans l''oued et y trouvèrent un puits d''eau vive. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 12.1,10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 28.13-15 ; 46.3 ; Hé 11.9.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui apparut et dit : Ne descends pas en Egypte, demeure dans le pays que je te dirai. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cherchèrent querelle aux…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se querellèrent avec… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eseq '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dispute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; c''est un verbe apparenté qui est rendu par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on s''était disputé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils s'étaient disputés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Les bergers de Guérar cherchèrent querelle aux bergers d''Isaac en disant : L''eau nous appartient ! Il appela donc le puits du nom d''Eseq (« Dispute »), parce qu''on s''était disputé avec lui. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sitna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Opposition '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Accusation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Esd 4.6) vient de la racine '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: stn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''opposer à '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'accuser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et qui a donné le nom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Satan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Za 3.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jb 1.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Ils creusèrent un autre puits, au sujet duquel il y eut aussi querelle ; il l''appela du nom de Sitna (« Opposition »). '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Rehoboth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Largeurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. 10.11 ; 36.37 ; Ps 18.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous pourrons être féconds '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.22+ ou, plus généralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nous prospérerons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 28.4,8 ; Ps 144.12-15.
      marker-yv: yv-n
    - type: text
      text: 'Il leva le camp et creusa un autre puits, au sujet duquel il n''y eut pas querelle ; il l''appela du nom de Rehoboth (« Largeurs »), car, dit-il, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' nous a maintenant mis au large, et nous pourrons être féconds dans le pays.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Bersabée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'De là il monta à Bersabée. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'n''aie pas peur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.1+ ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui apparut cette nuit-là et dit : Je suis le Dieu d''Abraham, ton père ; n''aie pas peur, car je suis avec toi ; je te bénirai et je multiplierai ta descendance à cause d''Abraham, mon serviteur. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'autel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.20+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'invoqua le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.26+.
      marker-yv: yv-n
    - type: text
      text: 'Là, Isaac bâtit un autel et invoqua le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). Là, il dressa sa tente ; là, les serviteurs d''Isaac forèrent un puits.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se rendit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'était rendu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ahouzath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce nom peut signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: propriété, possession
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; au lieu de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ahouzath, son compagnon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avec le groupe de ses familiers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Jg 14.11,20 ; 15.2,6 ; 2S 3.8 ; Jb 6.14 ; Pr 19.4,7). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pikol '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 21.22,32.
      marker-yv: yv-n
    - type: text
      text: 'Abimélek se rendit auprès de lui depuis Guérar, avec Ahouzath, son compagnon, et Pikol, le chef de son armée. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: renvoyé
      - type: usfm
        marker: ft
        children:
        - type: text
