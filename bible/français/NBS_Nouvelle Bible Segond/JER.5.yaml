document_id: JER.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Corruption générale à Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.27 ; Gn 11.5ss ; 18.16-21 ; Ez 9 ; Ps 14.2 ; Lc 18.8. –  équité / probité (ou fidélité ) : cf. 4.2n  ; 7.28 ; 9.23 ; 22.13 ; Mi 6.8 ; 7.2 ; Mt 23.23. –  alors je pardonnerai à la ville  : litt. et je lui pardonnerai (à elle), cf. Gn 18.22-33 ; Es 53 ; Ez 22.30.'
  - type: text
    content: Parcourez les rues de Jérusalem,
  - type: text
    content: regardez, je vous prie, informez-vous ;
  - type: text
    content: cherchez sur les places
  - type: text
    content: s'il s'y trouve un homme,
  - type: text
    content: s'il y en a un qui agisse selon l'équité,
  - type: text
    content: qui recherche la probité
  - type: text
    content: – alors je pardonnerai à la ville.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '39.8ss. –  n''exterminez pas 4.27+. –  ses sarments  : comme en Es 18.5 ; cf. Jn 15.2 ; LXX a traduit en sens contraire  : préservez ses sarments, car ils appartiennent au Seigneur.'
  - type: text
    content: Montez sur ses murailles et détruisez
  - type: text
    content: – mais n'exterminez pas !
  - type: text
    content: Enlevez ses sarments,
  - type: text
    content: 'car ils n''appartiennent pas au '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '11':
  - type: text
    content: ' '
  - type: note
    content: trahi 3.20+ ; cf. Es 24.16.
  - type: text
    content: Car la maison d'Israël et la maison de Juda m'ont tout à fait trahi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Ils renient ou ils usent de dissimulation envers  ; cf. Jos 24.27 ; Es 59.13. –  Il n''est rien  : litt. pas lui ! ou pas cela ! Autres traductions possibles  : il ne compte pas, il est sans importance, il n''existe pas  ; cf. So 1.12 ; Ps 10.4 ; 14.1. –  Le malheur ne viendra pas 23.17 ; Es 28.15 ; Am 9.10 ; Mi 311. –  épée / famine 11.22 ; 14.13 ; 18.21 ; cf. 14.12+.'
  - type: text
    content: 'Ils renient le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'ils disent : Il n''est rien !'
  - type: text
    content: Le malheur ne viendra pas sur nous,
  - type: text
    content: nous ne verrons ni l'épée ni la famine !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Les prophètes…  : litt. les prophètes seront pour un souffle . Le mot correspondant à souffle peut désigner l’ esprit ou le vent  ; on peut voir ici une ironie sur l’ inspiration des prophètes ; cf. Jb 6.26 ; 15.2. –  il n''y a pas de parole en eux  : LXX il n''y avait pas en eux de parole du Seigneur . –  Qu''ainsi il leur soit fait  : sens incertain : la phrase appelle sur les prophètes, ou bien une malédiction sous-entendue comme dans certaines formules de serment (Rt 1.17), ou bien l''accomplissement de leurs propres menaces. Autre traduction qu''ils soient traités en conséquence ! Certains modifient le texte hébreu traditionnel pour lire que (la parole du Seigneur) soit pour eux une brûlure !'
  - type: text
    content: 'Les prophètes seront emportés par le souffle :'
  - type: text
    content: il n'y a pas de parole en eux.
  - type: text
    content: Qu'ainsi il leur soit fait !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur … 2.19n. –  je mets…  : autre traduction je fais de mes paroles qui sont dans ta bouche (1.9+) un feu , 20.9 ; 23.29 ; Es 10.17 ; Ap 11.5.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées :'
  - type: text
    content: Puisque vous avez prononcé cette parole,
  - type: text
    content: je mets mes paroles dans ta bouche comme un feu,
  - type: text
    content: et ce peuple sera le bois que ce feu dévorera.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '6.22 ; Dt 28.49-52 ; Es 5.26-29 ; 28.11 ; Ha 1.6-11. –  forte  : autre traduction ancienne (le même mot est traduit par inépuisable en 49.19 ; 50.44).'
  - type: text
    content: Je fais venir de loin
  - type: text
    content: une nation contre vous, maison d'Israël
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: C'est une nation forte,
  - type: text
    content: c'est une nation qui est depuis toujours,
  - type: text
    content: une nation dont tu ne connais pas la langue,
  - type: text
    content: et dont tu ne comprendras pas ce qu'elle dit.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ps 5.10. –  guerriers ou héros.
  - type: text
    content: 'Son carquois est comme une tombe ouverte :'
  - type: text
    content: ce sont tous des guerriers.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 6.12 ; Lv 26.16 ; Dt 28.30,33 ; Am 5.11 ; Mi 6.15 ; Ha 3.17 ; cf. Es 65.22 ; 62.8s. –  ils dévoreront ou on dévorera  ; un autre ms porte elle dévorera.
  - type: text
    content: Elle dévorera ta moisson et ton pain,
  - type: text
    content: ils dévoreront tes fils et tes filles,
  - type: text
    content: elle dévorera ton petit bétail et ton gros bétail,
  - type: text
    content: elle dévorera ta vigne et ton figuier,
  - type: text
    content: elle démantèlera par l'épée tes villes fortes, dans lesquelles tu mets ta confiance.
  '18':
  - type: text
    content: ' '
  - type: note
    content: V. 10 ; 4.27+.
  - type: text
    content: 'Mais même en ces jours-là – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – je ne vous exterminerai pas. '
  '19':
  - type: note
    content: 'S''ils disent  : litt., selon le texte hébreu traditionnel, si vous dites. –  Pourquoi 13.22 ; 16.10s ; 22.8s ; Dt 29.23-27 ; 1R 9.8s ; 2Ch 7.21s. –  abandonné 2.13+. –  dieux étrangers  : litt. dieux d''étranger  ; cf. 2.25n  ; 16.13+ ; Dt 28.47s.'
  - type: text
    content: 'S''ils disent alors : Pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous fait-il tout cela ? Tu leur répondras : Comme vous m''avez abandonné pour servir des dieux étrangers dans votre pays, ainsi vous servirez des étrangers dans un pays qui n''est pas le vôtre.'
  - type: heading
    content: Quand l'autorité de Dieu n'est plus reconnue
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Par la vie du Seigneur 4.2n. –  faux serments  : cf. 7.9 ; Lv 19.12.'
  - type: text
    content: 'Même quand ils disent :'
  - type: text
    content: '« Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! »,'
  - type: text
    content: ils font de faux serments.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Jacob / Juda  : cf. 2.4+.'
  - type: text
    content: Annoncez ceci à la maison de Jacob,
  - type: text
    content: 'faites-le entendre en Juda :'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 4,23 ; 8.7 ; Es 6.9s ; 43.8 ; Ez 12.2 ; Mt 13.13-15/ / ; Mc 8.18 . –  déraisonnable  : litt. sans cœur , au sens de sans intelligence  ; cf. Pr 6.32n.'
  - type: text
    content: Ecoute, je te prie, peuple stupide, déraisonnable !
  - type: text
    content: Ils ont des yeux et ne voient pas,
  - type: text
    content: ils ont des oreilles et n'entendent pas.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'craindrez / tremblerez  : cf. v. 24 ; 2.19n  ; 10.7 ; Ap 14.7. –  à la mer le sable pour frontière Ps 104.9 ; Jb 38.8-11 ; Pr 8.29 ; 4 Esdras 4.17 : « Le sable s''éleva et les contint (les flots) ». –  qu''elle ne passera pas  : autre traduction qui ne passera pas . –  grondent 6.23.'
  - type: text
    content: Ne me craindrez-vous pas ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Ne tremblerez-vous pas devant moi
  - type: text
    content: qui ai donné à la mer le sable pour frontière,
  - type: text
    content: comme une limite permanente qu'elle ne passera pas ?
  - type: text
    content: Ses flots s'agitent, mais ils sont impuissants ;
  - type: text
    content: ils grondent, mais ils ne passent pas.
  '23':
  - type: text
    content: ' '
  - type: note
    content: V. 21 ; 2.31 ; 6.28 ; Dt 31.27 ; Os 11.7.
  - type: text
    content: Mais ce peuple a le cœur indocile et rebelle ;
  - type: text
    content: ils se retirent et s'en vont.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Ils ne se disent pas  : litt. ils ne disent pas dans leur cœur . –  qui donne la pluie  : cf. 3.3+ ; 10.13 ; Jl 2.23 ; Za 10.1 ; Ac 14.17. –  d''automne / de printemps  : cf. Dt 11.14+ ; Jc 5.7. –  fixées  : litt. prescrites  ; cf. 31.35 ; 33.25.'
  - type: text
    content: 'Ils ne se disent pas :'
  - type: text
    content: 'Craignons le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu,'
  - type: text
    content: qui donne la pluie en son temps,
  - type: text
    content: la pluie d'automne et la pluie de printemps,
  - type: text
    content: et qui nous garde les semaines fixées pour la moisson.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.17 ; 3.3 ; 14.1-7 ; Gn 3.17-19 ; Es 59.2. –  qui ont tout perturbé  : litt. qui ont détourné ces choses  ; certains modifient la vocalisation traditionnelle du texte hébreu pour lire qui provoquent la malédiction  ; cf. 4.12n. – Voir péché.'
  - type: text
    content: Ce sont vos fautes qui ont tout perturbé,
  - type: text
    content: ce sont vos péchés qui vous privent de ces biens.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 10.9 ; Pr 1.11.
  - type: text
    content: Car il se trouve des méchants dans mon peuple ;
  - type: text
    content: ils épient comme celui qui pose des pièges,
  - type: text
    content: ils tendent un filet et prennent des hommes.
  '27':
  - type: text
    content: Comme une cage est remplie d'oiseaux,
  - type: text
    content: leurs maisons sont remplies de tromperie ;
  - type: text
    content: c'est ainsi qu'ils deviennent puissants et riches.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Ils sont devenus gras, resplendissants (ou luisants ) : ce vers est absent de LXX  ; cf. Dt 32.15 ; Ps 73.3-12 ; 119.70. –  ils dépassent toute mesure…  : traduction incertaine ; quelques-uns modifient le texte hébreu traditionnel pour lire ils soutiennent le mal (ou le mauvais ) dans son procès . –  orphelin / pauvres 7.6+ ; Es 1.23 ; Ml 3.5. –  ils prospèrent  : autre traduction ils réussissent.'
  - type: text
    content: Ils sont devenus gras, resplendissants,
  - type: text
    content: ils dépassent toute mesure dans le mal ;
  - type: text
    content: ils ne rendent pas la justice, ils ne rendent pas justice à l'orphelin,
  - type: text
    content: et ils prospèrent ;
  - type: text
    content: ils ne respectent pas le droit des pauvres.
  '29':
  - type: text
    content: ' '
  - type: note
    content: V. 9n.
  - type: text
    content: A de telles gens, ne ferais-je pas rendre des comptes ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Ne me vengerais-je pas d'une pareille nation ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'ne cherchent-ils ou ne voient-ils , le verbe est sous-entendu dans le texte. –  probité v. 1n. –  frappés… 2.30 ; 3.3 ; Am 4.6-11. –  exterminés  : autres traductions détruits ; consumés  ; cf. v. 10. –  refusé… l''instruction 5.5n  ; 6.8 ; 7.28 ; 17.23 ; 30.14 ; 32.33 ; 35.13 ; sur le mot correspondant à instruction ou correction  ; cf. 10.24n  ; Es 26.16n  ; 53.5n  ; Ez 5.15 ; Os 5.2 ; So 3.2,7 ; voir aussi Pr 1.2n. –  durci  : litt. fortifié  ; cf. Es 48.4 ; 50.7 ; Ez 3.8. –  Ils ont refusé de revenir ou de se convertir , 2.31 ; 3.1,12+ ; 8.5 ; 15.7 ; Es 1.27+.'
  - type: text
    content: Seigneur
  - type: text
    content: ', tes yeux ne cherchent-ils pas la probité ?'
  - type: text
    content: Tu les as frappés,
  - type: text
    content: et ils n'en souffrent pas ;
  - type: text
    content: tu les as exterminés,
  - type: text
    content: et ils ont refusé de recevoir l'instruction ;
  - type: text
    content: ils ont durci leur visage plus qu'un roc.
  - type: text
    content: Ils ont refusé de revenir.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 18.13 ; 23.14 ; Os 6.10.
  - type: text
    content: 'Ce qui se passe dans le pays est atterrant, terrible :'
  '31':
  - type: text
    content: ' '
  - type: note
    content: '6.13 ; 14.14+ ; 23.11 ; Mi 3.11 ; So 3.4 ; Lm 4.13. –  mensongèrement  : on pourrait aussi comprendre  : par le Mensonge , c.-à-d. par le Baal  ; cf. 2.8 ; 3.24n  ; 10.14 ; 13.25+ ; 16.19 ; 20.6 ; 23.13. –  exercent leur pouvoir…  : traduction incertaine, litt. prennent (ou dominent ) sur leurs mains (cf. Jg 14.9) ; on a aussi compris profitent de leur fonction pour s''enrichir ou bien renoncent à leur consécration . –  mon peuple aime 14.10 ; cf. Mi 2.11 ; Lc 6.26 ; Jn 3.19. –  pour l''avenir du pays (litt. son avenir ) : autres traductions quand le pays arrivera à sa fin , ou quand tout cela prendra fin  ; cf. Es 10.3 ; Os 9.5.'
  - type: text
    content: les prophètes parlent mensongèrement,
  - type: text
    content: les prêtres exercent leur pouvoir à leur guise,
  - type: text
    content: et mon peuple aime qu'il en soit ainsi !
  - type: text
    content: Mais que ferez-vous pour l'avenir du pays ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 21. –  ils ne connaissent pas 8.7 ; 9.23+ ; Es 1.3. –  l''équité  : autre traduction le droit.'
  - type: text
    content: 'Je disais : Ce ne sont que de petites gens,'
  - type: text
    content: ils agissent comme des fous
  - type: text
    content: 'parce qu''ils ne connaissent pas la voie du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: l'équité de leur Dieu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.8 ; 6.28 ; Es 1.23 ; Mi 3.1. –  joug 2.20n. –  liens  : le mot hébreu rappelle celui qui a été traduit par instruction au v. 3 ; cf. 2.20 ; Ps 2.3.'
  - type: text
    content: Je m'en irai plutôt vers les grands
  - type: text
    content: et je leur parlerai ;
  - type: text
    content: 'car eux, ils connaissent la voie du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: l'équité de leur Dieu ;
  - type: text
    content: mais eux aussi, tous ensemble, ont brisé le joug,
  - type: text
    content: rompu les liens.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'lion (2.15+) / loup  : cf. Ez 22.27 ; Os 13.7. –  broussailles 12.8. –  attaque  : litt. frappe . –  plaines arides Dt 1.1n. –  est aux aguets  : litt. veille , comme en 1.12n. –  leurs transgressions ou leurs révoltes  ; cf. 30.15 ; voir péché.'
  - type: text
    content: C'est pourquoi le lion des broussailles les attaque,
  - type: text
    content: le loup des plaines arides les ravage,
  - type: text
    content: la panthère est aux aguets devant leurs villes ;
  - type: text
    content: tous ceux qui en sortiront seront déchiquetés ;
  - type: text
    content: car leurs transgressions sont nombreuses,
  - type: text
    content: leurs infidélités se sont multipliées.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'pardonnerais v. 1. –  abandonné 2.13+. –  serments (4.2n) : le mot hébreu fait assonance avec celui qui est traduit par rassasiés. –  pas Dieu 2.11+ ; cf. Ex 23.13. –  adultère 9.1+. –  ils hantent  : traduction incertaine ; autres possibilités ils s''attroupent dans , ou ils se font des incisions comme en 16.6 ; cf. 41.5 ; 47.5 ; Dt 14.1 ; 1R 18.28 ; Za 13.6 ; autre texte, d''après certains mss et LXX  : ils fréquentent la maison… –  prostituée Os 1.2n.'
  - type: text
    content: Est-ce pour cela que je te pardonnerais ?
  - type: text
    content: Tes fils m'ont abandonné,
  - type: text
    content: et ils font des serments par ce qui n'est pas Dieu.
  - type: text
    content: Je les avais rassasiés et ils commettent l'adultère,
  - type: text
    content: ils hantent la maison de la prostituée.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.6 ; 13.27 ; Ez 22.11 ; 23.20. –  sauvages  : autres traductions en rut, non castrés , ou encore de Méshek (cf. Ez 27.13s ; 38.3s). –  bien nourris  : autre traduction possible, d''après une autre lecture traditionnelle  : bien membrés.'
  - type: text
    content: Ce sont des chevaux sauvages bien nourris,
  - type: text
    content: chacun d'eux hennit après la femme de son prochain.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'A de telles gens  : autre traduction pour de telles choses  ; cf. v. 29 ; 9.8n. –  ne ferais-je pas rendre des comptes ou n''interviendrais-je pas , cf. 6.15n. –  Ne me vengerais-je pas  : litt. mon être (ou ma vie, mon âme  ; cf. Gn 1.20n) ne se vengera-t-il pas , de même en 5.29 ; 9.8 ; cf. 50.15+ ; voir aussi 11.22 ; 21.14 ; 46.25.'
  - type: text
    content: A de telles gens, ne ferais-je pas rendre des comptes ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Ne me vengerais-je pas d'une pareille nation ?
