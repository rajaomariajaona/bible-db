document_id: NAM.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Dans Vg, ce v. est rattaché au chapitre 1 (v. 15), et la numérotation des versets suivants varie en conséquence. –  les pas  : litt. les pieds  ; cf. Es 52.7 ; Rm 10.15 . –  celui qui porte la bonne nouvelle  : cf. Es 41.27 ; 52.7 ; Ac 10.36 ; Ep 6.5. –  fêtes / vœux  : cf. 1S 1.21 ; voir aussi Nb 30.3 ; 2S 15.7 ; Es 19.21 ; 30.29 ; Ps 22.26+ ; Pr 7.14. –  le destructeur (ou l''homme sans morale  ; litt. Bélial , 1.11n  ; Dt 13.14n) ne passera plus… Es 52.1 ; Jl 4.17 ; Za 9.8.'
  - type: text
    content: Ils arrivent, sur les montagnes,
  - type: text
    content: les pas de celui qui porte la bonne nouvelle, qui proclame la paix !
  - type: text
    content: Célèbre tes fêtes, Juda,
  - type: text
    content: acquitte-toi de tes vœux !
  - type: text
    content: Car le destructeur ne passera plus au milieu de toi,
  - type: text
    content: il est entièrement retranché…
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Pillez  : LXX a lu ils pillent ou on pille  : cf. Ha 2.8 ; Ps 109.11. –  trésors sans fin  : cf. 3.9 ; Es 2.7. –  objets de valeur Os 13.15 ; Dn 11.8.'
  - type: text
    content: Pillez l'argent ! Pillez l'or !
  - type: text
    content: Il y a des trésors sans fin,
  - type: text
    content: des richesses en objets de valeur de toutes sortes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Carnage, saccage et ravage  : assonance en hébreu bouqa oumebouqa oumeboullaqa  ; cf. Jr 30.16 ; So 2.13 ; voir aussi Es 24.1 ; 29.2 ; Ez 33.9 ; So 1.15. –  Les cœurs fondent  : cf. Dt 1.28n  ; 20.8 ; Jos 2.11n  ; 5.1 ; 7.5 ; Es 13.7 ; 19.1 ; Jr 4.9 ; Ez 21.12 ; Ps 22.15. –  les genoux flageolent  : un verbe apparenté est traduit par vaciller Es 28.7 ; Jr 10.4. –  les reins souffrent ou tremblent  ; cf. Es 21.3. –  les visages pâlissent ou rougissent Jl 2.6n  ; cf. Dn 5.6.'
  - type: text
    content: Carnage, saccage et ravage !
  - type: text
    content: Les cœurs fondent,
  - type: text
    content: les genoux flageolent,
  - type: text
    content: tous les reins souffrent,
  - type: text
    content: tous les visages pâlissent.
  - type: heading
    content: Ninive est comme un lion vaincu
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'repaire Jr 9.10+. –  lions Es 5.29 ; Jr 4.7 ; 51.38. –  domaine  : litt. pâturage  ; certains modifient le texte hébreu traditionnel pour lire gîte . –  la lionne  : au lieu du mot correspondant LXX a lu un verbe, d''où l''autre traduction possible  : où le lion va se retirer . –  personne pour les troubler Lv 26.6 ; Dt 28.26 ; Es 17.2 ; Jr 7.33 ; Jb 11.19.'
  - type: text
    content: Où en est ce repaire de lions,
  - type: text
    content: ce domaine des jeunes lions,
  - type: text
    content: que parcouraient le lion, la lionne, le petit du lion,
  - type: text
    content: sans qu'il y eût personne pour les troubler ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 10 ; Es 10.6,13s ; voir aussi Gn 49.27 ; Ez 19.3,6 ; 22.25,27 ; Os 5.14 ; Mi 5.7 ; Ps 22.15 ; les mots hébreux pour déchiquette une proie , proies (aussi v. 14) et dépouilles sont apparentés (voir aussi 3.1).
  - type: text
    content: Le lion qui déchiquette une proie pour ses petits,
  - type: text
    content: qui étrangle pour ses lionnes,
  - type: text
    content: remplissait de proies ses antres,
  - type: text
    content: de dépouilles ses repaires.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Je m''oppose à toi (au féminin, désignant Ninive, d''après la vocalisation traditionnelle) ; cf. 3.5 ; Jr 21.13 ; 23.30ss ; Ez 5.8+ ; 13.8,20 ; 21.8 ; 26.3 ; 28.22. –  Seigneur (YHWH) des Armées 1S 1.3n. –  Je réduirai…  : au lieu de ses chars , des versions anciennes ont lu ta multitude  ; certains modifient le texte hébreu traditionnel pour traduire je viderai ton trou (ou, selon la traduction habituelle du terme, ta citerne , parfois repaire du lion ; cf. 2S 23.20) avec de la fumée  ; voir Ez 39.9. –  L''épée dévorera 3.15 ; Dt 32.42. –  je retrancherai (1.14) ta proie (ou tes rapines ) du pays (ou de la terre ) ; cf. Ez 19.8s. –  tes messagers ou ton messager , texte incertain ; LXX tes œuvres  ; cf. 2R 19.23.'
  - type: text
    content: Je m'oppose à toi !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: text
    content: Je réduirai ses chars en fumée.
  - type: text
    content: L'épée dévorera tes jeunes lions,
  - type: text
    content: je retrancherai ta proie du pays,
  - type: text
    content: et on n'entendra plus tes messagers.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.14 ; Es 21.2 ; Jr 50.21 ; 51.12 ; Jl 1.6 ; Ha 3.16. –  Une troupe d''assaut  : en Pr 25.18 le même mot hébreu semble désigner une arme ( massue ) ; cf. Jr 6.26 ; 12.12. –  Garde la forteresse ou le rempart  ; traduction incertaine d''une expression dont les deux mots font assonance ; on pourrait aussi comprendre monte bien la garde . –  Surveille  : le verbe est habituellement traduit par guetter (cf. Ez 3.17 ; Ha 2.1).'
  - type: text
    content: Une troupe d'assaut monte contre toi.
  - type: text
    content: Garde la forteresse !
  - type: text
    content: Surveille la route !
  - type: text
    content: Affermis tes reins,
  - type: text
    content: prends courage, sois très fort !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 60.1. –  rétablit  : autre traduction revient avec  ; cf. Ps 126.1,4 ; voir aussi So 3.14ss ; Ps 6.3 ; 7.8 ; 71.20 ; 80.15 ; 85.7 ; 90.13. –  l''orgueil ou la fierté  ; sur ce terme, voir Jr 12.5n  ; certains modifient le texte hébreu traditionnel pour lire la vigne (voir Es 5.1ss) ; cf. Am 6.8 ; 8.7 ; voir aussi Es 4.2 ; Rm 2.17. –  Jacob / Israël  : cf. Es 40.27 ; 43.1 ; 44.1 ; 46.3 ; Mi 3.1 ; voir aussi Es 11.13 ; Jr 3.18 ; 23.6 ; 31.27s,33 ; 33.7 ; Ez 37.15ss ; Os 2.2 ; Za 10.6. –  pillards / pillés  : la racine hébraïque correspondante est traduite par vider en Es 24.1,3. –  détruit leurs sarments  : cf. Es 5.5s ; Ps 80.13ss.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rétablit l''orgueil de Jacob'
  - type: text
    content: comme l'orgueil d'Israël,
  - type: text
    content: parce que les pillards les ont pillés
  - type: text
    content: et ont détruit leurs sarments…
  - type: heading
    content: Ninive prise d'assaut et pillée
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 14.3ss ; So 2.13ss. –  rougis / écarlate Ez 23.6,14. –  le fer qui étincelle  : litt. le feu du fer , mais le mot traduit par fer n''apparaît qu''ici (LXX et Vg ont traduit les rênes ). On a aussi compris les étoffes des chars sont couleur de feu . –  les lances  : litt. les cyprès ou genévriers (du bois dont étaient faites les lances ?) ; LXX et Syr ont lu les cavaliers , mais le mot hébreu correspondant peut aussi signifier coursiers ou attelages (Ez 27.10n).'
  - type: text
    content: Les boucliers de ses guerriers sont rougis,
  - type: text
    content: les hommes vaillants sont revêtus d'écarlate ;
  - type: text
    content: avec le fer qui étincelle apparaissent les chars
  - type: text
    content: au jour où on les prépare,
  - type: text
    content: et les lances s'agitent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '3.2 ; Jr 46.9. –  sur les places (hébreu rehoboth  ; cf. Gn 10.11). –  on dirait des flambeaux Jl 2.4ns. –  ils courent…  : autre traduction des éclairs qui mettent en fuite ou qui terrorisent.'
  - type: text
    content: Les chars roulent avec furie dans les rues,
  - type: text
    content: ils se précipitent sur les places ;
  - type: text
    content: on dirait des flambeaux,
  - type: text
    content: ils courent comme des éclairs…
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Il bat le rappel  : autre traduction il se souvient  ; il s''agit peut-être du roi de Ninive (cf. 3.18) ; d''autres pensent qu''il est question du chef des assaillants, dont les soldats trébuchent (cf. Jr 46.12,16) dans leur hâte de donner l''assaut. –  braves 3.18 ; cf. Jg 5.13. –  la défense  : le terme peut désigner le grand bouclier collectif sous lequel les assaillants se protégeaient pour s''approcher du rempart (cf. 2R 19.32 ; Ez 26.8).'
  - type: text
    content: Il bat le rappel de ses braves,
  - type: text
    content: mais ils trébuchent dans leur marche ;
  - type: text
    content: on se hâte vers la muraille de la ville,
  - type: text
    content: la défense est établie.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Les portes des fleuves  : probablement les portes de Ninive donnant sur les fleuves (le Tigre et son affluent), donc le côté le mieux protégé de la ville ; cf. Es 45.1s ; mais voir aussi Na 1.4 ; Ps 93.3 ; Jb 38.8ss. –  le palais  : le mot hébreu est aussi traduit par temple . –  s''écroule  : litt. fond ; s''effondre (Es 14.31n  ; Ps 75.4) ; certains rattachent ici le premier mot du v. 8 pour lire le palais fond et se répand.'
  - type: text
    content: Les portes des fleuves sont ouvertes,
  - type: text
    content: et le palais s'écroule.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'elle  : traduction conjecturale ; le terme hébreu correspondant ( l''installé , masculin, mais les verbes suivants sont au féminin) a été compris tantôt de la reine (Ps 45.10), tantôt d''une idole (p. ex. la statue d''Ishtar, déesse de la ville) ; les servantes seraient alors des prêtresses ; certains modifient le texte hébreu traditionnel pour traduire la princesse est mise à nu ou exilée (le verbe hébreu peut avoir les deux sens) ; cf. Os 10.5s. –  colombes Es 38.14 ; 59.11 ; Ez 7.16. –  la poitrine  : litt. sur leur cœur.'
  - type: text
    content: C'en est fait, elle est mise à nu,
  - type: text
    content: elle est emmenée ;
  - type: text
    content: ses servantes geignent comme des colombes,
  - type: text
    content: en se frappant la poitrine.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'comme un réservoir…  : texte obscur ; la traduction, s''inspirant de LXX, modifie légèrement le texte hébreu traditionnel, qu''on a aussi tenté de comprendre comme suit  : Ninive était depuis toujours comme un réservoir…  ; cf. Jr 6.7 ; Ps 104.7. –  personne ne se retourne Jr 46.5.'
  - type: text
    content: Ninive est comme un réservoir d'eau qui fuit…
  - type: text
    content: Arrêtez ! Arrêtez !
  - type: text
    content: Mais personne ne se retourne…
