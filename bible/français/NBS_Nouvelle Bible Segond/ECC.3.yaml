      marker-yv: yv-n
    - type: text
      text: 'Car le sort des humains et le sort de la bête ne sont pas différents ; l''un meurt comme l''autre, ils ont tous un même souffle, et la supériorité de l''humain sur la bête est nulle : tout n''est que futilité. '
