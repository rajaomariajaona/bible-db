        children:
        - type: text
          text: rien à y ajouter…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.6 : « On n''y peut rien retrancher ni ajouter, il n''est pas possible de découvrir les merveilles du Seigneur. » 42.21 : « Il a disposé avec ordre les œuvres grandioses de sa sagesse, car il est avant l''éternité et jusqu''à l''éternité. Rien n''a été ajouté, rien n''a été ôté. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''on le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: craigne
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.6 ; 7.18 ; 8.12 ; 12.13 ; cf. Pr 1.7 ; 9.10.
      marker-yv: yv-n
    - type: text
      text: 'Je sais que tout ce que Dieu fait est pour toujours :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y a rien à y ajouter et rien à en retrancher.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu fait en sorte qu'on le craigne.
