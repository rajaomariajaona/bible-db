      marker-yv: yv-n
    - type: text
      text: 'Je le sais :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y a rien de bon pour lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sinon de se réjouir et de faire son bonheur pendant sa vie ;
  '13':
  - type: usfm
