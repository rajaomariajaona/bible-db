        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chaque chose '
      - type: usfm
        marker: ft
