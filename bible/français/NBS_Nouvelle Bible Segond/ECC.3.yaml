document_id: ECC.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un temps pour chaque chose
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 11. –  chaque chose v. 17 ; 8.6 ; voir 5.3n.
  - type: text
    content: 'Il y a un moment pour tout, un temps pour chaque chose sous le ciel :'
  '10':
  - type: note
    content: 1.13n.
  - type: text
    content: 'J''ai vu l''occupation que Dieu impose aux humains. '
  '11':
  - type: note
    content: 'Tout ce qu''il a fait…  : autre traduction il a fait toute chose pour le temps qui lui convient  ; cf. v. 1-8 ; 7.10 ; Siracide 39.16 : « Qu''elles sont belles, toutes les œuvres du Seigneur, et chacun de ses ordres se réalise en son temps. Il n''y a pas lieu de dire : “Qu''est ceci ? Pourquoi cela ?” car toute chose aura sa solution en son temps. » –  la durée  : autre traduction l''éternité, hébreu ha-‘olam, terme qui vient d''une racine signifiant être caché, secret, et qui peut, selon le contexte, désigner un avenir ou un passé lointains, la durée apparemment illimitée du monde ou de Dieu (le même mot est traduit par toujours au v. 14) et, au moins dans l''hébreu post-biblique, le monde lui-même dans la totalité de sa durée. – Voir cœur. –  sans que…  : autre traduction bien que l''être humain… –  puisse trouver  : autres traductions puisse découvrir ; puisse saisir  ; cf. 6.12 ; 7.14,24ss ; 8.17 ; 11.5 ; Ps 139.17 ; Rm 11.33 ; Siracide 11.4 : « Les œuvres du Seigneur sont admirables, mais cachées aux humains. » –  Dieu 2.24n.'
  - type: text
    content: 'Tout ce qu''il a fait est beau en son temps ; aussi il a mis la durée dans leur cœur, sans que l''être humain puisse trouver l''œuvre que Dieu a faite depuis le commencement jusqu''à la fin. '
  '12':
  - type: note
    content: 'pour lui  : litt. pour eux  ; cf. 2.24+.'
  - type: text
    content: 'Je le sais :'
  - type: text
    content: Il n'y a rien de bon pour lui,
  - type: text
    content: sinon de se réjouir et de faire son bonheur pendant sa vie ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'voir le bonheur…  : cf. 2.24n. –  don de Dieu 5.18.'
  - type: text
    content: et aussi que, pour chacun, manger, boire et voir le bonheur dans tout son travail est un don de Dieu.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'est pour toujours ou sera toujours  ; v. 11n  ; cf. Ps 33.11. –  rien à y ajouter…  : cf. Siracide 18.6 : « On n''y peut rien retrancher ni ajouter, il n''est pas possible de découvrir les merveilles du Seigneur. » 42.21 : « Il a disposé avec ordre les œuvres grandioses de sa sagesse, car il est avant l''éternité et jusqu''à l''éternité. Rien n''a été ajouté, rien n''a été ôté. » –  qu''on le craigne 5.6 ; 7.18 ; 8.12 ; 12.13 ; cf. Pr 1.7 ; 9.10.'
  - type: text
    content: 'Je sais que tout ce que Dieu fait est pour toujours :'
  - type: text
    content: Il n'y a rien à y ajouter et rien à en retrancher.
  - type: text
    content: Dieu fait en sorte qu'on le craigne.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Ce qui est  : la même formule a été traduite par ce qui a été en 1.9. –  Dieu va à la recherche…  : litt. Dieu (cf. 2.24n) recherche ce (ou celui ) qui est poursuivi.'
  - type: text
    content: Ce qui est a déjà été, et ce qui sera a déjà été,
  - type: text
    content: Dieu va à la recherche de ce qui a fui.
  - type: heading
    content: La mort est la fin de tout
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.1 ; 5.7. –  la méchanceté  : d''après des versions anciennes, certains modifient le texte pour lire la transgression ou la révolte à la deuxième occurrence. – Voir justice.'
  - type: text
    content: 'Voici encore ce que j''ai vu sous le soleil :'
  - type: text
    content: A la place du droit, là est la méchanceté,
  - type: text
    content: à la place de la justice, là est la méchanceté.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu jugera 11.9 ; 12.14 ; cf. Pr 11.31+. –  il y a un temps  : cf. v. 1-8. –  et un lieu pour (juger ?) chaque œuvre  : traduction incertaine, litt. et sur toute œuvre, là.'
  - type: text
    content: 'Je me suis dit :'
  - type: text
    content: Dieu jugera le juste et le méchant,
  - type: text
    content: car il y a un temps pour chaque chose et un lieu pour chaque œuvre.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'humains 1.13n. –  eux-mêmes qu''ils ne sont que des bêtes  : jeu d''assonances en hébreu  : shehem behéma hemma lahem.'
  - type: text
    content: 'Je me suis dit, au sujet des humains, que Dieu les éprouvait, pour qu''ils voient eux-mêmes qu''ils ne sont que des bêtes. '
  '19':
  - type: note
    content: 'des humains  : litt. des fils de l''homme (ou d''Adam  ; cf. Gn 1.26n) ; cf. 1.13n  ; 2.8n. –  ne sont pas différents  : litt. un sort unique pour eux  ; cf. 9.2 ; Ps 49.13,21. –  un même souffle  : litt. un souffle (ou esprit, de même au v. 21) unique.'
  - type: text
    content: 'Car le sort des humains et le sort de la bête ne sont pas différents ; l''un meurt comme l''autre, ils ont tous un même souffle, et la supériorité de l''humain sur la bête est nulle : tout n''est que futilité. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Sur ces quatorze antithèses, cf. 7.1n.
  - type: text
    content: un temps pour mettre au monde et un temps pour mourir ;
  - type: text
    content: un temps pour planter et un temps pour arracher ce qui a été planté ;
  '20':
  - type: note
    content: 'un même lieu 6.6. –  poussière 12.7 ; Gn 2.7,19 ; 3.19 ; Ps 104.29 ; Jb 34.15 ; cf. Siracide 16.30–17.1 : « De toute espèce d''animaux il en a couvert la surface (de la terre), et c''est à elle qu''ils doivent retourner. Le Seigneur a créé l''homme de la terre et il l''y fait à nouveau retourner. »'
  - type: text
    content: Tout va dans un même lieu ;
  - type: text
    content: tout vient de la poussière,
  - type: text
    content: et tout retourne à la poussière.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Qui sait…  : lecture appuyée par des versions anciennes ; le texte hébreu traditionnel porte qui connaît le souffle (v. 19n) des humains, qui s''élève vers le haut, et le souffle des bêtes, qui descend…  ; cf. 12.7.'
  - type: text
    content: 'Qui sait si le souffle des humains s''élève vers les hauteurs, et si le souffle des bêtes descend vers le bas, vers la terre ? '
  '22':
  - type: note
    content: '2.24+. –  qui le fera revenir  : cf. v. 11+ ; 6.12 ; 8.7 ; 10.14.'
  - type: text
    content: 'J''ai vu qu''il n''y a rien de mieux pour l''être humain que de se réjouir de ses œuvres : c''est là sa part. En effet,'
  - type: text
    content: qui le fera revenir pour voir ce qui sera après lui ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'démolir  : autres traductions faire éclater ; ouvrir des brèches (cf. 10.8).'
  - type: text
    content: un temps pour tuer et un temps pour guérir ;
  - type: text
    content: un temps pour démolir et un temps pour bâtir ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'pour se lamenter…  : litt. de se lamenter et un temps de danser (ou bondir  ; construction différente, cf. v. 5n,8) ; cf. Mt 11.17/ /.'
  - type: text
    content: un temps pour pleurer et un temps pour rire ;
  - type: text
    content: un temps pour se lamenter et un temps pour danser ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'pour ramasser  : litt. de ramasser.'
  - type: text
    content: un temps pour jeter des pierres et un temps pour ramasser des pierres ;
  - type: text
    content: un temps pour étreindre et un temps pour s'éloigner de l'étreinte ;
  '6':
  - type: text
    content: un temps pour chercher et un temps pour perdre ;
  - type: text
    content: un temps pour garder et un temps pour jeter ;
  '7':
  - type: text
    content: un temps pour déchirer et un temps pour coudre ;
  - type: text
    content: un temps pour se taire et un temps pour parler ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: aimer / détester (ou haïr ) 9.1,6.
  - type: text
    content: un temps pour aimer et un temps pour détester ;
  - type: text
    content: un temps de guerre et un temps de paix.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 1.3n.
  - type: text
    content: 'Quel avantage le travailleur retire-t-il de son travail ? '
