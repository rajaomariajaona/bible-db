  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tout ce qu'il a fait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a fait toute chose pour le temps qui lui convient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 1-8 ; 7.10 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '39.16 : « Qu''elles sont belles, toutes les œuvres du Seigneur, et chacun de ses ordres se réalise en son temps. Il n''y a pas lieu de dire : “Qu''est ceci ? Pourquoi cela ?” car toute chose aura sa solution en son temps. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la durée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'éternité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ha-‘olam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme qui vient d''une racine signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: être caché, secret
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', et qui peut, selon le contexte, désigner un avenir ou un passé lointains, la durée apparemment illimitée du monde ou de Dieu (le même mot est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toujours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 14) et, au moins dans l''hébreu post-biblique, le monde lui-même dans la totalité de sa durée. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans que…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bien que l''être humain… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: puisse trouver
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: puisse découvrir ; puisse saisir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 6.12 ; 7.14,24ss ; 8.17 ; 11.5 ; Ps 139.17 ; Rm 11.33 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.4 : « Les œuvres du Seigneur sont admirables, mais cachées aux humains. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tout ce qu''il a fait est beau en son temps ; aussi il a mis la durée dans leur cœur, sans que l''être humain puisse trouver l''œuvre que Dieu a faite depuis le commencement jusqu''à la fin. '
  '12':
  - type: usfm
    marker: p
