  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abraham '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.11 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ex 3.6,15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Ac 7.32 ; Hé 11.16.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: C'est moi qui suis le Dieu d'Abraham, le Dieu d'Isaac et le Dieu de Jacob.
  - type: text
