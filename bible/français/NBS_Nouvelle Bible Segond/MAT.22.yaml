        text: 'à ces deux commandements toute la loi est suspendue, et les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 7.12 ; Rm 13.10 ; voir aussi Lc 19.48'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: De ces deux commandements dépendent toute la Loi et les Prophètes.
