      - type: text
        text: à son frère.
    marker-yv: yv-n
  - type: text
    text: 'Maître, Moïse a dit : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Si quelqu'un meurt sans enfants, son frère épousera la veuve et suscitera une descendance au défunt
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Or il y avait parmi nous sept frères. Le premier se maria et mourut, et comme il n''avait pas de descendance, il laissa sa femme à son frère. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il en fut de même du deuxième, puis du troisième, jusqu''au septième. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Après eux tous, la femme mourut. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'A la résurrection, duquel des sept sera-t-elle donc la femme ? Car tous l''ont eue ! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
