    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.24 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dt 25.5s
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 38.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au défunt
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
