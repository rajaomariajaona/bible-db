        text: . Cf. 1Jn 4.8.
    marker-yv: yv-n
  - type: text
    text: 'Il lui répondit : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme et de toute ton intelligence
  - type: text
