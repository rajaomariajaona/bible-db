      - type: text
        text: '22.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ténèbres… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pleurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grincements… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.12+ ; cf. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.2 : « Ils gisaient, prisonniers des ténèbres et enchaînés à une longue nuit…, bannis de la providence éternelle. »'
    marker-yv: yv-n
  - type: text
    text: 'Alors le roi dit aux serviteurs : Liez-lui les pieds et les mains, et chassez-le dans les ténèbres du dehors ; c''est là qu''il y aura des pleurs et des grincements de dents. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir aussi Lc 13.23. Cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '4 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Esdras
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.3 : « Beaucoup sont créés, mais peu sont sauvés. » '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Evangile selon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Thomas
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '23 : « Je vous choisirai, un entre mille et deux entre dix mille, et ils se tiendront debout, en étant un seul. » 74s : « Il a dit : “Seigneur, il y en a beaucoup autour du puits, mais il n''y a personne dans le puits.” (Sentence également connue '
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Origène
      - type: text
        text: '.) Jésus a dit : “Il y en a beaucoup qui se tiennent près de la porte, mais ce sont les solitaires qui entreront dans la chambre nuptiale.” » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: choisis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon le sens du terme traditionnellement traduit par '
    - type: usfm
