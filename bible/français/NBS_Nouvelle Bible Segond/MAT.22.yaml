  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.43 ; 19.19 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Lv 19.18,34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Voir aussi Rm 13.8s ; Ga 5.14 ; Jc 2.8.
    marker-yv: yv-n
  - type: text
    text: 'Un second cependant lui est semblable : '
  - type: usfm
    marker: it
    children:
