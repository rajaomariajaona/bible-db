    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.15 ; 18.23 ; Ap 19.7,9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un homme roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un homme, un roi.
    marker-yv: yv-n
  - type: text
    text: 'Il en va du règne des cieux comme d''un roi qui faisait les noces de son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il envoya… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.34'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne voulurent pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 23.37 ; Lc 19.14 ; Jn 5.40.
    marker-yv: yv-n
  - type: text
    text: 'Il envoya ses esclaves appeler ceux qui étaient invités aux noces ; mais ils ne voulurent pas venir. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
