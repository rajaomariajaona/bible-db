    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'autres esclaves '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.36. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: J'ai préparé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Pr 9.2s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: déjeuner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme grec peut s''entendre d''un repas pris le matin ou dans la journée, cf. Lc 11.37s ; 14.12 ; Jn 21.12,15.'
    marker-yv: yv-n
  - type: text
    text: 'Il envoya encore d''autres esclaves en leur disant : Allez dire aux invités : « J''ai préparé mon déjeuner, mes bœufs et mes bêtes grasses ont été abattus, tout est prêt ; venez aux noces ! » '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Hé 2.3.
    marker-yv: yv-n
  - type: text
    text: 'Ils ne s''en soucièrent pas et s''en allèrent, celui-ci à son champ, celui-là à son commerce ; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.35 ; 23.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se saisirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'arrêter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faire arrêter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 21.46 ; 26.4,48,50,55,57. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des esclaves
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ses esclaves.
    marker-yv: yv-n
  - type: text
    text: 'les autres se saisirent des esclaves, les outragèrent et les tuèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.34 ; 21.41.
    marker-yv: yv-n
  - type: text
    text: 'Le roi se mit en colère ; il envoya son armée pour faire disparaître ces meurtriers et brûler leur ville. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ac 13.46.
    marker-yv: yv-n
  - type: text
    text: 'Alors il dit à ses esclaves : Les noces sont prêtes, mais les invités n''en étaient pas dignes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 28.19 ; Ac 28.28.
    marker-yv: yv-n
  - type: text
    text: 'Allez donc aux carrefours, et invitez aux noces tous ceux que vous trouverez. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mauvais et bons '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.45 ; 13.47s.
    marker-yv: yv-n
  - type: text
    text: 'Ces esclaves s''en allèrent par les chemins, rassemblèrent tous ceux qu''ils trouvèrent, mauvais et bons, et la salle des noces fut remplie de convives. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2R 10.22s ; Es 61.10 ; Ep 4.24 ; Ap 19.8.
    marker-yv: yv-n
  - type: text
    text: 'Le roi entra pour voir les convives, et il aperçut là un homme qui n''avait pas revêtu d''habit de noces. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mon ami
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 20.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: resta muet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'réduit au silence '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 34 ; '
    - type: usfm
