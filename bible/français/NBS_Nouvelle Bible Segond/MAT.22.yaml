    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous vous égarez '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous êtes dans l'erreur
    - type: usfm
      marker: ft
      children:
      - type: text
