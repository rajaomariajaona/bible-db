  - type: text
    text: 'Ils envoient leurs disciples, avec les hérodiens, pour lui dire : Maître, nous savons que tu es franc et que tu enseignes la voie de Dieu en toute vérité, sans te soucier de personne, car tu ne regardes pas à l''apparence des gens. '
  - type: usfm
    marker: v
    metadata:
