      children:
      - type: text
        text: 'se taire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Mc 1.25 ; 4.39 ; Lc 4.35 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'museler '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 1Tm 5.8 ; cf. 1P 2.15. cf. Ps 107.42.
    marker-yv: yv-n
  - type: text
    text: 'Il lui dit : Mon ami, comment as-tu pu entrer ici sans avoir un habit de noces ? L''homme resta muet. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
