      - type: text
        text: V. 37 ; Rm 13.7 ; 1P 2.17.
    marker-yv: yv-n
  - type: text
    text: '– De César, lui répondent-ils. Alors il leur dit : Rendez donc à César ce qui est à César, et à Dieu ce qui est à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Etonnés de ce qu'ils avaient entendu, ils le laissèrent et s'en allèrent.
