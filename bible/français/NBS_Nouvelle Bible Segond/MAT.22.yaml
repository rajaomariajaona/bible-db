document_id: MAT.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La parabole des noces
  - type: heading
    content: Lc 14.15-24
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 14.16nss.
  - type: text
    content: 'Jésus leur parla encore en paraboles ; il dit : '
  '10':
  - type: note
    content: mauvais et bons 5.45 ; 13.47s.
  - type: text
    content: 'Ces esclaves s''en allèrent par les chemins, rassemblèrent tous ceux qu''ils trouvèrent, mauvais et bons, et la salle des noces fut remplie de convives. '
  '11':
  - type: note
    content: Cf. 2R 10.22s ; Es 61.10 ; Ep 4.24 ; Ap 19.8.
  - type: text
    content: 'Le roi entra pour voir les convives, et il aperçut là un homme qui n''avait pas revêtu d''habit de noces. '
  '12':
  - type: note
    content: 'Mon ami  : cf. 20.13n. –  resta muet  : le même verbe est traduit par réduit au silence au v. 34 ; se taire en Mc 1.25 ; 4.39 ; Lc 4.35 ; museler en 1Tm 5.8 ; cf. 1P 2.15. cf. Ps 107.42.'
  - type: text
    content: 'Il lui dit : Mon ami, comment as-tu pu entrer ici sans avoir un habit de noces ? L''homme resta muet. '
  '13':
  - type: note
    content: 'ténèbres… / pleurs / grincements… 8.12+ ; cf. Sagesse 17.2 : « Ils gisaient, prisonniers des ténèbres et enchaînés à une longue nuit…, bannis de la providence éternelle. »'
  - type: text
    content: 'Alors le roi dit aux serviteurs : Liez-lui les pieds et les mains, et chassez-le dans les ténèbres du dehors ; c''est là qu''il y aura des pleurs et des grincements de dents. '
  '14':
  - type: note
    content: 'Voir aussi Lc 13.23. Cf. 4 Esdras 8.3 : « Beaucoup sont créés, mais peu sont sauvés. » Evangile selon Thomas 23 : « Je vous choisirai, un entre mille et deux entre dix mille, et ils se tiendront debout, en étant un seul. » 74s : « Il a dit : “Seigneur, il y en a beaucoup autour du puits, mais il n''y a personne dans le puits.” (Sentence également connue d''Origène.) Jésus a dit : “Il y en a beaucoup qui se tiennent près de la porte, mais ce sont les solitaires qui entreront dans la chambre nuptiale.” » –  choisis, selon le sens du terme traditionnellement traduit par élus  ; cf. 24.22+.'
  - type: text
    content: Car beaucoup sont appelés, mais peu sont choisis.
  - type: heading
    content: L'impôt dû à César
  - type: heading
    content: Mc 12.13-17  ; Lc 20.20-26
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'pharisiens 21.45+. –  tenir conseil 12.14 ; Es 29.21 ; Ps 56.7. –  en parole  : cf. Lc 11.54.'
  - type: text
    content: 'Alors les pharisiens allèrent tenir conseil sur les moyens de le prendre au piège en parole. '
  '16':
  - type: note
    content: 'hérodiens Mc 3.6+. –  Maître  : au sens d’enseignant (de même v. 24,36). –  nous savons… Jn 3.2. –  franc  : litt. véridique ou vrai. –  voie (ou chemin) de Dieu… Gn 18.19 ; Ps 25.9 ; 51.15. –  à l''apparence  : litt. à la face. Cf. 1S 16.7 ; une expression proche évoque la partialité ou le favoritisme (Lc 20.21n  ; Ac 10.34n  ; Ga 2.6n).'
  - type: text
    content: 'Ils envoient leurs disciples, avec les hérodiens, pour lui dire : Maître, nous savons que tu es franc et que tu enseignes la voie de Dieu en toute vérité, sans te soucier de personne, car tu ne regardes pas à l''apparence des gens. '
  '17':
  - type: note
    content: 'capitation  : impôt direct levé par les Romains (sur César, voir Lc 3.1n), sous la dépendance desquels se trouvaient les Juifs ; cf. 17.25n.'
  - type: text
    content: 'Dis-nous donc ce que tu en penses : est-il permis ou non de payer la capitation à César ? '
  '18':
  - type: note
    content: 'connaissait 12.15+. –  leurs mauvaises intentions  : autre traduction leur méchanceté (même terme Mc 7.22 ; Lc 11.39 ; Ac 3.26 ; Rm 1.29 etc.). –  à l''épreuve v. 35 ; 4.1n. –  hypocrites 6.2n  ; 15.7+. – Cf. Jn 8.5s.'
  - type: text
    content: 'Mais Jésus, qui connaissait leurs mauvaises intentions, répondit : Pourquoi me mettez-vous à l''épreuve, hypocrites ? '
  '19':
  - type: note
    content: 'monnaie / denier  : voir mesures, poids et monnaies.'
  - type: text
    content: 'Montrez-moi la monnaie avec laquelle on paie la capitation. Ils lui présentèrent un denier. '
  '2':
  - type: note
    content: '9.15 ; 18.23 ; Ap 19.7,9. –  un roi  : litt. un homme roi ou un homme, un roi.'
  - type: text
    content: 'Il en va du règne des cieux comme d''un roi qui faisait les noces de son fils. '
  '20':
  - type: note
    content: Mc 12.16n.
  - type: text
    content: 'Il leur demande : De qui sont cette image et cette inscription ? '
  '21':
  - type: note
    content: V. 37 ; Rm 13.7 ; 1P 2.17.
  - type: text
    content: '– De César, lui répondent-ils. Alors il leur dit : Rendez donc à César ce qui est à César, et à Dieu ce qui est à Dieu. '
  '22':
  - type: text
    content: Etonnés de ce qu'ils avaient entendu, ils le laissèrent et s'en allèrent.
  - type: heading
    content: Une question sur la résurrection
  - type: heading
    content: Mc 12.18-27  ; Lc 20.27-38
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'des sadducéens  : certains mss portent les sadducéens  ; 3.7+ ; Mc 12.18n  ; Ac 4.1s ; 23.6-8 ; cf. 1Co 15.12. –  résurrection ou relèvement (des morts)  ; un terme apparenté est traduit par susciter au v. 24 ; même mot v. 28ss, et verbe correspondant pour se lever en 12.41 ; cf. 17.9n.'
  - type: text
    content: 'Le même jour, des sadducéens, qui disent qu''il n''y a pas de résurrection, vinrent l''interroger : '
  '24':
  - type: note
    content: 'Dt 25.5s  ; cf. Gn 38.8. –  au défunt  : litt. à son frère.'
  - type: text
    content: 'Maître, Moïse a dit : '
  - type: text
    content: Si quelqu'un meurt sans enfants, son frère épousera la veuve et suscitera une descendance au défunt
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Or il y avait parmi nous sept frères. Le premier se maria et mourut, et comme il n''avait pas de descendance, il laissa sa femme à son frère. '
  '26':
  - type: text
    content: 'Il en fut de même du deuxième, puis du troisième, jusqu''au septième. '
  '27':
  - type: text
    content: 'Après eux tous, la femme mourut. '
  '28':
  - type: text
    content: 'A la résurrection, duquel des sept sera-t-elle donc la femme ? Car tous l''ont eue ! '
  '29':
  - type: note
    content: Vous vous égarez ou vous êtes dans l'erreur, cf. 18.12 ; 24.4. –  puissance Ac 26.8 ; 1Co 6.14 ; 15.34.
  - type: text
    content: 'Jésus leur répondit : Vous vous égarez, parce que vous ne comprenez ni les Ecritures, ni la puissance de Dieu. '
  '3':
  - type: note
    content: Il envoya… 21.34n. –  ne voulurent pas 23.37 ; Lc 19.14 ; Jn 5.40.
  - type: text
    content: 'Il envoya ses esclaves appeler ceux qui étaient invités aux noces ; mais ils ne voulurent pas venir. '
  '30':
  - type: note
    content: 'Mc 12.25n. –  comme des anges  : certains mss portent comme les anges de Dieu.'
  - type: text
    content: 'Car, à la résurrection, on ne prend ni femme ni mari, mais on est comme des anges dans le ciel. '
  '31':
  - type: text
    content: 'Pour ce qui est de la résurrection des morts, n''avez-vous pas lu ce qui vous a été dit par Dieu : '
  '32':
  - type: note
    content: Abraham 8.11 ; Ex 3.6,15  ; Ac 7.32 ; Hé 11.16.
  - type: text
    content: C'est moi qui suis le Dieu d'Abraham, le Dieu d'Isaac et le Dieu de Jacob.
  - type: text
    content: ' Il n''est pas le Dieu des morts, mais des vivants. '
  '33':
  - type: note
    content: '7.28+. –  qui écoutaient  : autre traduction qui entendaient.'
  - type: text
    content: Les foules qui écoutaient étaient ébahies de son enseignement.
  - type: heading
    content: Le plus grand commandement
  - type: heading
    content: Mc 12.28-34  ; cf. Lc 10.25-37
  '34':
  - type: text
    content: ' '
  - type: note
    content: pharisiens / sadducéens 3.7+. –  réduit au silence v. 12n.
  - type: text
    content: 'Les pharisiens apprirent qu''il avait réduit au silence les sadducéens. Ils se rassemblèrent '
  '35':
  - type: note
    content: 'un spécialiste de la loi  : le terme correspondant est absent de certains mss. Voir scribe.'
  - type: text
    content: 'et l''un d''eux, un spécialiste de la loi, lui posa cette question pour le mettre à l''épreuve : '
  '36':
  - type: note
    content: le grand, c.-à-d. le plus grand.
  - type: text
    content: 'Maître, quel est le grand commandement de la loi ? '
  '37':
  - type: note
    content: Dt 6.5 ; Jos 22.5 (LXX). Cf. 1Jn 4.8.
  - type: text
    content: 'Il lui répondit : '
  - type: text
    content: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme et de toute ton intelligence
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'C''est là le grand commandement, le premier. '
  '39':
  - type: note
    content: 5.43 ; 19.19 ; Lv 19.18,34. Voir aussi Rm 13.8s ; Ga 5.14 ; Jc 2.8.
  - type: text
    content: 'Un second cependant lui est semblable : '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: text
    content: '. '
  '4':
  - type: note
    content: 'autres esclaves 21.36. –  J''ai préparé…  : cf. Pr 9.2s. –  déjeuner  : le terme grec peut s''entendre d''un repas pris le matin ou dans la journée, cf. Lc 11.37s ; 14.12 ; Jn 21.12,15.'
  - type: text
    content: 'Il envoya encore d''autres esclaves en leur disant : Allez dire aux invités : « J''ai préparé mon déjeuner, mes bœufs et mes bêtes grasses ont été abattus, tout est prêt ; venez aux noces ! » '
  '40':
  - type: note
    content: Litt. à ces deux commandements toute la loi est suspendue, et les prophètes 5.17n  ; 7.12 ; Rm 13.10 ; voir aussi Lc 19.48n.
  - type: text
    content: De ces deux commandements dépendent toute la Loi et les Prophètes.
  - type: heading
    content: Le Christ et David
  - type: heading
    content: Mc 12.35-37  ; Lc 20.41-44
  '41':
  - type: text
    content: ' '
  - type: note
    content: pharisiens v. 15,34 ; 21.45+.
  - type: text
    content: 'Comme les pharisiens étaient rassemblés, Jésus leur posa cette question : '
  '42':
  - type: note
    content: Christ (1.16n) … fils… David 9.27+ ; Mc 12.35+ ; Jn 7.42 ; cf. 2S 7.12,16 ; Es 11.1s ; Jr 23.5.
  - type: text
    content: 'Que pensez-vous du Christ ? De qui est-il le fils ? Ils lui répondirent : De David. '
  '43':
  - type: note
    content: 'par l''Esprit  : autre traduction en esprit 2S 23.2 ; 2P 1.21. –  peut-il l''appeler  : litt. l''appelle-t-il.'
  - type: text
    content: 'Il reprit : Comment donc David, par l''Esprit, peut-il l''appeler Seigneur, lorsqu''il dit :'
  '44':
  - type: text
    content: ' '
  - type: note
    content: '26.64 ; Ez 1.26 ; Ps 110.1  ; Mc 16.19 ; Ac 2.34s ; 7.55s ; 1Co 15.25,27 ; Hé 1.13 ; 2.8 ; 10.12s ; Ap 3.21. –  jusqu''à ce que je mette…  : autre traduction que je mette… –  sous tes pieds  : certains mss portent  : comme marchepied de tes pieds ; Ps 8.7  ; 1Co 15.25 ; Hé 2.8.'
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur :'
  - type: text
    content: Assieds-toi à ma droite,
  - type: text
    content: jusqu'à ce que je mette tes ennemis sous tes pieds.
  '45':
  - type: text
    content: ' '
  - type: note
    content: Rm 1.3s.
  - type: text
    content: 'Si donc David l''appelle Seigneur, comment peut-il être son fils ? '
  '46':
  - type: note
    content: Mc 12.34 ; Lc 20.40.
  - type: text
    content: Personne ne put lui répondre un mot. Et, depuis ce jour-là, personne n'osa plus l'interroger.
  '5':
  - type: note
    content: Cf. Hé 2.3.
  - type: text
    content: 'Ils ne s''en soucièrent pas et s''en allèrent, celui-ci à son champ, celui-là à son commerce ; '
  '6':
  - type: note
    content: '21.35 ; 23.37. –  se saisirent  : le même verbe est traduit par arrêter ou faire arrêter  ; cf. 21.46 ; 26.4,48,50,55,57. –  des esclaves  : litt. de ses esclaves.'
  - type: text
    content: 'les autres se saisirent des esclaves, les outragèrent et les tuèrent. '
  '7':
  - type: note
    content: 18.34 ; 21.41.
  - type: text
    content: 'Le roi se mit en colère ; il envoya son armée pour faire disparaître ces meurtriers et brûler leur ville. '
  '8':
  - type: note
    content: Cf. Ac 13.46.
  - type: text
    content: 'Alors il dit à ses esclaves : Les noces sont prêtes, mais les invités n''en étaient pas dignes. '
  '9':
  - type: note
    content: Cf. 28.19 ; Ac 28.28.
  - type: text
    content: 'Allez donc aux carrefours, et invitez aux noces tous ceux que vous trouverez. '
