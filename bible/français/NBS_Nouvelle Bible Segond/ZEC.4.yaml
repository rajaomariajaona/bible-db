document_id: ZEC.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Cinquième vision : le porte-lampes et les oliviers'
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.9+.
  - type: text
    content: 'Le messager qui parlait avec moi revint et me réveilla comme un homme que l''on réveille de son sommeil. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'des petits commencements  : litt. des petites choses Ag 2.3-5 ; Esd 3.12. –  la pierre d''étain  : certains croient qu''il s''agit de la pierre du v. 7, peut-être gravée d''une inscription brillante à l''étain (cf. 3.9) ; d''après des découvertes archéologiques, d''autres pensent à un lingot précieux qu''on aurait eu coutume de déposer dans les fondations d''un sanctuaire (v. 9) ; cf. Am 7.7n (autre terme). –  Ces sept-là  : il faut peut-être rattacher ces mots, ainsi que la fin du chap., à la description des v. 2-5 ; il s''agirait alors des sept lampes. –  les yeux… 3.9 ; Ap 5.6.'
  - type: text
    content: Qui donc a méprisé le jour des petits commencements ?
  - type: text
    content: On se réjouira en voyant
  - type: text
    content: la pierre d'étain dans la main de Zorobabel.
  - type: text
    content: 'Ces sept-là sont les yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parcourent toute la terre. '
  '11':
  - type: note
    content: V. 3.
  - type: text
    content: 'Je lui demandai : Que sont ces deux oliviers, à la droite du porte-lampes et à sa gauche ? '
  '12':
  - type: note
    content: 'de l''or  : désignation métaphorique de l''huile dorée.'
  - type: text
    content: 'Je l''interrogeai une deuxième fois : Que sont les deux rameaux d''olivier, qui sont près des deux conduits d''or d''où coule de l''or ? '
  '13':
  - type: text
    content: 'Il me répondit : Ne sais-tu pas ce qu''ils sont ? Je dis : Non, mon seigneur. '
  '14':
  - type: note
    content: 'Ap 11.4. –  les deux hommes de l''huile nouvelle  : litt. les deux fils de l''huile fraîche  ; il s''agit probablement du grand prêtre Josué (3.1+) et du gouverneur Zorobabel, de la famille royale (v. 6 ; 1Ch 3.17-19). –  qui se tiennent debout  : cf. 3.7. –  le Seigneur de toute la terre 6.5.'
  - type: text
    content: 'Alors il dit : Ce sont les deux hommes de l''huile nouvelle, qui se tiennent debout devant le Seigneur de toute la terre.'
  '2':
  - type: note
    content: 'Que vois-tu ? 5.2 ; Jr 1.11-13 ; Am 7.8 ; 8.2. –  un porte-lampes (hébreu menora) : cf. Ex 25.31-40 ; 26.35 ; 30.27 ; 1R 7.49 ; Jr 52.19 ; Ap 1.12 ; 4.5. –  un réservoir ou une coupe  ; même terme en 1R 7.41ns (évasé) ; Ec 12.6n, de même dans la suite. –  sommet  : le mot correspondant est habituellement traduit par tête. –  sept becs  : certains comprennent sept conduits ou supports de mèches pour chaque lampe, ce qui donnerait en tout 49 flammes.'
  - type: text
    content: 'Il me dit : Que vois-tu ? Je répondis : Je vois un porte-lampes tout en or avec un réservoir à son sommet et sept lampes dessus. Il y a sept becs sur les sept lampes qui sont à son sommet ; '
  '3':
  - type: note
    content: V. 11.
  - type: text
    content: 'deux oliviers le surplombent, l''un à la droite du réservoir, et l''autre à sa gauche. '
  '4':
  - type: text
    content: 'Je demandai au messager qui parlait avec moi : Qu''est-ce donc, mon seigneur ? '
  '5':
  - type: note
    content: Cf. v. 10n-14.
  - type: text
    content: 'Le messager qui parlait avec moi me répondit : Ne sais-tu pas ce que c''est ? Je dis : Non, mon seigneur. '
  '6':
  - type: note
    content: 'Certains pensent que le texte original se présentait dans un ordre différent ; selon eux, il faudrait lire les v. 10 (deuxième partie) à 14 avant les v. 6 (deuxième partie) à 10 (première partie). –  Zorobabel v. 14n  ; Ag 1.1 ; Esd 2.2 ; 3.2. –  puissance  : le mot signifie habituellement armée  ; il a aussi, parfois, le sens de richesse  ; cf. Os 1.7 ; voir aussi 1S 17.47 ; Es 31.1 ; Ps 20.8 ; 33.16. –  mon souffle ou mon Esprit  : cf. Ag 2.5+.'
  - type: text
    content: 'Alors il me dit :'
  - type: text
    content: 'Voici la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour Zorobabel :'
  - type: text
    content: Ce n'est pas par la puissance,
  - type: text
    content: ce n'est pas par la force,
  - type: text
    content: mais c'est par mon souffle,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'La grande montagne a été diversement interprétée : il s''agirait soit du monceau de décombres qui occupait l''emplacement du temple (cf. Ag 1.2-4 ; Esd 3.2s), soit d''une montagne proprement dite d''où l''on extrayait des pierres pour la reconstruction, soit, au figuré, des divers obstacles à la restauration (cf. Es 40.4 ; 42.16 ; Esd 4). –  Il fera sortir 2.7+. –  la pierre principale (litt. de tête ) : pierre de fondement ou pierre faîtière ; cf. Es 28.16 ; 1P 2.4-8. –  Grâce, grâce  : il peut s''agir d''une invocation de la grâce de Dieu sur le nouveau temple, mais aussi, selon les autres sens du mot, d''une simple acclamation  : Qu''elle est belle ! ou encore Merci !'
  - type: text
    content: Qui es-tu, grande montagne ?
  - type: text
    content: Devant Zorobabel, tu seras aplanie.
  - type: text
    content: Il fera sortir la pierre principale
  - type: text
    content: 'aux cris de : « Grâce, grâce pour elle ! »'
  '8':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'maison 1.16+. –  l''achèveront  : cf. Esd 6.14. –  tu sauras  : plusieurs mss hébreux et des versions anciennes portent vous saurez , cf. 2.13+.'
  - type: text
    content: Les mains de Zorobabel ont fondé cette maison,
  - type: text
    content: ses mains l'achèveront,
  - type: text
    content: 'et ainsi tu sauras que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées qui m''a envoyé vers vous.'
