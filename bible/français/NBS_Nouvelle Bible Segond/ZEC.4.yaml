document_id: ZEC.4,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Cinquième vision : le porte-lampes et les oliviers'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.9+.
      marker-yv: yv-n
    - type: text
      text: 'Le messager qui parlait avec moi revint et me réveilla comme un homme que l''on réveille de son sommeil. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des petits commencements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des petites choses '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ag 2.3-5 ; Esd 3.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la pierre d'étain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains croient qu''il s''agit de la pierre du v. 7, peut-être gravée d''une inscription brillante à l''étain (cf. 3.9) ; d''après des découvertes archéologiques, d''autres pensent à un lingot précieux qu''on aurait eu coutume de déposer dans les fondations d''un sanctuaire (v. 9) ; cf. Am 7.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' (autre terme). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ces sept-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il faut peut-être rattacher ces mots, ainsi que la fin du chap., à la description des v. 2-5 ; il s''agirait alors des sept lampes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les yeux… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.9 ; Ap 5.6.
      marker-yv: yv-n
    - type: text
      text: Qui donc a méprisé le jour des petits commencements ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On se réjouira en voyant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la pierre d'étain dans la main de Zorobabel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces sept-là sont les yeux du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui parcourent toute la terre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 3.
      marker-yv: yv-n
    - type: text
      text: 'Je lui demandai : Que sont ces deux oliviers, à la droite du porte-lampes et à sa gauche ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : désignation métaphorique de l''huile dorée.'
      marker-yv: yv-n
    - type: text
      text: 'Je l''interrogeai une deuxième fois : Que sont les deux rameaux d''olivier, qui sont près des deux conduits d''or d''où coule de l''or ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me répondit : Ne sais-tu pas ce qu''ils sont ? Je dis : Non, mon seigneur. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ap 11.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les deux hommes de l'huile nouvelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les deux '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de l''huile fraîche'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agit probablement du grand prêtre Josué (3.1+) et du gouverneur Zorobabel, de la famille royale (v. 6 ; 1Ch 3.17-19). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui se tiennent debout
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Seigneur de toute la terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.5.
      marker-yv: yv-n
    - type: text
      text: 'Alors il dit : Ce sont les deux hommes de l''huile nouvelle, qui se tiennent debout devant le Seigneur de toute la terre.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que vois-tu ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.2 ; Jr 1.11-13 ; Am 7.8 ; 8.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un porte-lampes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: menora
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. Ex 25.31-40 ; 26.35 ; 30.27 ; 1R 7.49 ; Jr 52.19 ; Ap 1.12 ; 4.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un réservoir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une coupe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même terme en 1R 7.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: évasé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; Ec 12.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sommet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot correspondant est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sept becs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sept conduits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou supports de mèches pour chaque lampe, ce qui donnerait en tout 49 flammes.
      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Que vois-tu ? Je répondis : Je vois un porte-lampes tout en or avec un réservoir à son sommet et sept lampes dessus. Il y a sept becs sur les sept lampes qui sont à son sommet ; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 11.
      marker-yv: yv-n
    - type: text
      text: 'deux oliviers le surplombent, l''un à la droite du réservoir, et l''autre à sa gauche. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je demandai au messager qui parlait avec moi : Qu''est-ce donc, mon seigneur ? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-14.'
      marker-yv: yv-n
    - type: text
      text: 'Le messager qui parlait avec moi me répondit : Ne sais-tu pas ce que c''est ? Je dis : Non, mon seigneur. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains pensent que le texte original se présentait dans un ordre différent ; selon eux, il faudrait lire les v. 10 (deuxième partie) à 14 avant les v. 6 (deuxième partie) à 10 (première partie). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zorobabel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ag 1.1 ; Esd 2.2 ; 3.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: puissance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot signifie habituellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: armée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il a aussi, parfois, le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: richesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Os 1.7 ; voir aussi 1S 17.47 ; Es 31.1 ; Ps 20.8 ; 33.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ag 2.5+.'
      marker-yv: yv-n
    - type: text
      text: 'Alors il me dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour Zorobabel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n'est pas par la puissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce n'est pas par la force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c'est par mon souffle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grande montagne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a été diversement interprétée : il s''agirait soit du monceau de décombres qui occupait l''emplacement du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: ' (cf. Ag 1.2-4 ; Esd 3.2s), soit d''une montagne proprement dite d''où l''on extrayait des pierres pour la reconstruction, soit, au figuré, des divers obstacles à la restauration (cf. Es 40.4 ; 42.16 ; Esd 4). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il fera sortir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la pierre principale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : pierre de fondement ou pierre faîtière ; cf. Es 28.16 ; 1P 2.4-8. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Grâce
        - type: text
          text: ', grâce'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il peut s''agir d''une invocation de la grâce de Dieu sur le nouveau temple, mais aussi, selon les autres sens du mot, d''une simple acclamation'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qu''elle est belle ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Merci !
      marker-yv: yv-n
    - type: text
      text: Qui es-tu, grande montagne ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant Zorobabel, tu seras aplanie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fera sortir la pierre principale
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'aux cris de : « Grâce, grâce pour elle ! »'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.16+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'achèveront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Esd 6.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu sauras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : plusieurs mss hébreux et des versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous saurez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.13+.'
      marker-yv: yv-n
    - type: text
      text: Les mains de Zorobabel ont fondé cette maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses mains l'achèveront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ainsi tu sauras que c''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées qui m''a envoyé vers vous.'
