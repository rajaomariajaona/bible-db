  - type: text
    text: 'En effet, comme un homme attache une ceinture à ses reins, ainsi je m''étais attaché toute la maison d''Israël et toute la maison de Juda – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – pour qu''elles soient mon peuple, mon nom, ma louange et ma splendeur. Mais ils n''ont pas écouté.'
