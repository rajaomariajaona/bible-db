    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) qui passait près du village de Para (Jos 18.23), à quelques kilomètres au nord-est d'Anatoth. Ce lieu serait alors pris par le prophète comme emblème de Babylone ; cf. 2.18 ; voir aussi 51.63.
    marker-yv: yv-n
  - type: text
    text: 'Prends la ceinture que tu as achetée et que tu as sur les reins ; va vers l''Euphrate et, là, cache-la dans la fente d''un rocher. '
