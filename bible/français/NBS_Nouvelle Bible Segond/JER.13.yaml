  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël : Toutes les outres sont faites pour être remplies de vin. Et ils te diront : Ne savons-nous pas que toutes les outres sont faites pour être remplies de vin ? '
