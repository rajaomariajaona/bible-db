document_id: JER.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie et la ceinture de lin
  - type: text
    content: ' '
  - type: note
    content: 'Gestes prophétiques : voir aussi 19.10s ; 27–28 ; 32 ; 43.8-13 ; 51.59-64. –  une ceinture de lin  : cf. Ex 28.39 ; Ez 9.2. –  pas dans l''eau  : selon certains, en s''abstenant de la laver Jérémie favoriserait sa détérioration ; selon d''autres, au contraire, c''est en humidifiant la ceinture que Jérémie aurait favorisé sa détérioration, et celle-ci ne devait pas lui être imputable.'
  - type: text
    content: 'Ainsi m''a parlé le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Va t''acheter une ceinture de lin ; tu la passeras à tes reins, mais tu ne la mettras pas dans l''eau. '
  '10':
  - type: note
    content: 11.10 ; 16.11. –  refuse d'écouter 7.26n. –  obstination 3.17n. –  qui suit… 7.6+. –  bonne à rien v. 7n  ; cf. Ez 15.5.
  - type: text
    content: 'Ce peuple mauvais qui refuse d''écouter mes paroles, qui va selon l''obstination de son cœur et qui suit d''autres dieux pour les servir et se prosterner devant eux, qu''il devienne comme cette ceinture, qui n''est plus bonne à rien ! '
  '11':
  - type: note
    content: 'comme un homme…  : litt. comme la ceinture s''attache (même verbe en Gn 2.24 ; 34.3) aux reins d''un homme  ; cf. Jb 40.2 ; voir aussi Dt 4.4 ; 10.20 ; 11.22 ; 13.5 ; 30.20 ; 2R 18.6s ; Ps 63.9 ; 119.31 ; 1Co 6.17. –  mon peuple  : cf. 7.23+. –  nom  : autre traduction renom. –  louange / splendeur (ou parure  ; cf. v. 20) : cf. 33.9 ; voir aussi Dt 26.19 ; So 3.20.'
  - type: text
    content: 'En effet, comme un homme attache une ceinture à ses reins, ainsi je m''étais attaché toute la maison d''Israël et toute la maison de Juda – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – pour qu''elles soient mon peuple, mon nom, ma louange et ma splendeur. Mais ils n''ont pas écouté.'
  - type: heading
    content: Le vin de la colère de Dieu
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Tu leur diras…  : LXX tu diras à ce peuple : Toutes… –  outres ou cruches.'
  - type: text
    content: 'Tu leur diras cette parole : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Toutes les outres sont faites pour être remplies de vin. Et ils te diront : Ne savons-nous pas que toutes les outres sont faites pour être remplies de vin ? '
  '13':
  - type: note
    content: 'C''est d''ivresse que je remplis…  : cf. 12.6n  ; voir 25.15-29 ; 49.12 ; 51.39 ; Es 51.17 : Ez 23.32 ; Na 3.11 ; Ha 2.16 ; Lm 4.21 ; Ap 16.'
  - type: text
    content: 'Alors tu leur diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : C''est d''ivresse que je remplis tous les habitants de ce pays, les rois qui sont assis sur le trône de David, les prêtres, les prophètes et tous les habitants de Jérusalem. '
  '14':
  - type: note
    content: Je n'épargnerai personne… 21.7 ; 51.3 ; cf. 15.5. –  détruire v. 9n.
  - type: text
    content: 'Je vais les mettre en pièces les uns contre les autres, pères et fils ensemble – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: . Je n'épargnerai personne, je n'aurai aucune pitié, je n'aurai aucune compassion ; rien ne m'empêchera de les détruire.
  - type: heading
    content: Ecouter avant qu'il ne soit trop tard
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ecoutez 7.26n  ; cf. Es 1.2n,10 ; 28.23.
  - type: text
    content: Ecoutez, prêtez l'oreille !
  - type: text
    content: Ne soyez plus hautains !
  - type: text
    content: '– c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Donnez gloire…  : l''expression peut signifier aussi reconnaissez vos torts devant le Seigneur  ; cf. Jos 7.19 ; Jn 9.24. –  avant… les ténèbres (cf. 4.23) Ec 12.1s ; Jn 9.4 ; 11.9s ; 12.35 ; Ap 14.7 ; voir aussi Es 5.30 ; 8.22 ; Am 8.9. –  ombre de mort 2.6 ; Jb 3.5+.'
  - type: text
    content: 'Donnez gloire au '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu,'
  - type: text
    content: avant qu'il ne fasse venir les ténèbres,
  - type: text
    content: avant que vos pieds ne viennent se heurter
  - type: text
    content: aux montagnes du crépuscule ;
  - type: text
    content: alors vous espérerez la lumière,
  - type: text
    content: et il la changera en ombre de mort,
  - type: text
    content: il en fera une obscurité épaisse.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'je pleurerai 8.23+. –  votre  : sous-entendu dans le texte. –  orgueil  : terme apparenté au v. 9, cf. Jb 22.29 ; 33.17. –  mes yeux fondront en larmes 14.17 ; Ps 119.136.'
  - type: text
    content: Si vous n'écoutez pas,
  - type: text
    content: je pleurerai en secret
  - type: text
    content: à cause de votre orgueil ;
  - type: text
    content: je verserai des larmes,
  - type: text
    content: mes yeux fondront en larmes,
  - type: text
    content: 'parce que le troupeau du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera emmené captif.'
  - type: heading
    content: Le peuple infidèle déshonoré et dispersé
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'roi  : probablement Joïakîn (1.3n). –  la grande dame  : litt. la puissante  ; autre traduction la reine-mère  ; de même en 29.2 ; cf. 22.26 ; 2R 24.8,12,15 ; voir aussi 1R 2.19 ; 15.13 ; même terme en Gn 16.4,8s etc. ( maîtresse ) ; 1R 11.19 ; 15.13 ; 2R 10.13 ; Es 47.5,7 ( souveraine ). –  asseyez-vous par terre  : litt. abaissez-vous, asseyez-vous . –  votre couvre-chef  : traduction incertaine ; des versions anciennes ont lu de votre tête . –  votre couronne de splendeur  : autre traduction la couronne de votre splendeur  ; cf. Es 62.3n  ; Ez 21.26 ; Lm 5.16.'
  - type: text
    content: '– Dis au roi et à la grande dame :'
  - type: text
    content: asseyez-vous par terre !
  - type: text
    content: Car il est tombé, votre couvre-chef,
  - type: text
    content: votre couronne de splendeur.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'du Néguev , au sud de Juda, alors que l''ennemi vient du nord (v. 20) : c''est dire que tout Juda est envahi.'
  - type: text
    content: Les villes du Néguev ont été fermées,
  - type: text
    content: il n'y a personne pour ouvrir.
  - type: text
    content: Tout Juda est exilé,
  - type: text
    content: il est exilé tout entier.
  '2':
  - type: text
    content: 'J''achetai la ceinture selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et je la passai à mes reins.'
  '20':
  - type: text
    content: ' '
  - type: note
    content: du nord 1.14n.
  - type: text
    content: Lève les yeux et regarde
  - type: text
    content: ceux qui viennent du nord.
  - type: text
    content: Où est le troupeau qui t'a été donné,
  - type: text
    content: le petit bétail qui faisait ta splendeur ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'on te fera rendre des comptes ou on interviendra  ; LXX ils interviendront  ; cf. 6.15n  ; d''autres modifient le texte hébreu traditionnel pour lire quand ils (les moutons) viendront à manquer (cf. 23.4n). –  à profiter…  : texte obscur et traduction conjecturale (cf. 3.4) ; d''autres comprennent à se comporter en maîtres à ton égard  ; cf. 2R 16.7 ; 20.12-19. –  Les douleurs… 4.31+.'
  - type: text
    content: Que diras-tu quand on te fera rendre des comptes ?
  - type: text
    content: C'est toi-même qui leur as appris
  - type: text
    content: à profiter de ton intimité à tes dépens.
  - type: text
    content: Les douleurs ne te saisiront-elles pas,
  - type: text
    content: comme celles d'une femme qui accouche ?
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Pourquoi 5.19+. –  le bas de ta robe sous-entendu dans le texte ; cf. v. 26 ; Es 47.2s ; Ez 16.37 ; Ha 2.16 ; Lm 1.8s ; Ap 17.16. –  tes talons…  : il s''agit peut-être d''un euphémisme pour décrire un viol.'
  - type: text
    content: 'Si tu te dis :'
  - type: text
    content: Pourquoi cela m'arrive-t-il ?
  - type: text
    content: C'est à cause de la multitude de tes fautes
  - type: text
    content: qu'on a relevé le bas de ta robe
  - type: text
    content: et que tes talons sont violemment meurtris.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Un Koushite ou un Nubien  ; LXX un Ethiopien (38.7ss ; Gn 2.13n), c.-à-d. un Noir ; cf. 6.29 ; 17.1+ ; Ps 55.20 ; Mt 12.34.
  - type: text
    content: Un Koushite peut-il changer sa peau,
  - type: text
    content: un léopard ses taches ?
  - type: text
    content: Et vous, pourriez-vous faire du bien,
  - type: text
    content: vous qui êtes exercés à faire du mal ?
  '24':
  - type: text
    content: ' '
  - type: note
    content: disperserai 9.15+ ; cf. 18.17. –  comme la paille Ps 1.4+ ; 83.14.
  - type: text
    content: Je les disperserai,
  - type: text
    content: comme la paille emportée par le vent du désert.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'ton lot ou ton sort  ; cf. Lv 16.8n  ; Es 57.6. –  qui t''est mesurée par moi  : LXX de tes rébellions  ; cf. Jb 20.29 ; 27.13. –  tu m''as oublié 2.32+. –  tu as mis ta confiance dans le mensonge (voir 5.31n) : expression analogue en 28.15 ; 29.31 ; voir aussi 3.10+ ; 6.13 ; 7.4,8s ; 8.8,10 ; 9.1s ; 10.14 ; 14.14 ; 16.19 ; 20.6 ; 23.25s,32 ; 27.10,14s ; 29.9,21,23.'
  - type: text
    content: Voilà ton lot, la part qui t'est mesurée par moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: parce que tu m'as oublié
  - type: text
    content: et que tu as mis ta confiance dans le mensonge.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'V. 22+. –  ton ignominie  : le terme hébreu correspondant est également traduit par mépris  ; cf. Os 4.7 ; Na 3.5.'
  - type: text
    content: Je relèverai le bas de ta robe sur ton visage,
  - type: text
    content: on verra ton ignominie.
  '27':
  - type: text
    content: ' '
  - type: note
    content: adultères / hennissements 5.8+ ; voir aussi 8.16n. –  prostitution… 2.20+. –  horreurs 4.1n. –  n'es pas pure 4.14+ ; Ez 24.13 ; Os 8.5. –  Combien de temps tarderas-tu encore ? texte obscur ; plusieurs versions anciennes ont compris qui ne te purifies pas derrière moi (ou à ma suite ) , pour combien de temps encore ?
  - type: text
    content: J'ai vu tes adultères et tes hennissements,
  - type: text
    content: ta prostitution infâme
  - type: text
    content: sur les collines et dans la campagne,
  - type: text
    content: j'ai vu tes horreurs.
  - type: text
    content: Quel malheur pour toi, Jérusalem,
  - type: text
    content: qui n'es pas pure !
  - type: text
    content: Combien de temps tarderas-tu encore ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.2n.
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint une deuxième fois : '
  '4':
  - type: note
    content: 'va  : litt. lève-toi, va, de même au v. 6. –  vers l''Euphrate  : hébreu perath, nom habituel du fleuve de Babylone, objet du message du prophète ; une version ancienne a traduit vers Phara  ; certains pensent qu''il s''agirait ici d''un torrent (le Ouadi Fara) qui passait près du village de Para (Jos 18.23), à quelques kilomètres au nord-est d''Anatoth. Ce lieu serait alors pris par le prophète comme emblème de Babylone ; cf. 2.18 ; voir aussi 51.63.'
  - type: text
    content: 'Prends la ceinture que tu as achetée et que tu as sur les reins ; va vers l''Euphrate et, là, cache-la dans la fente d''un rocher. '
  '5':
  - type: note
    content: 'près de l''Euphrate  : litt. dans l''Euphrate (ou à Parah  ; cf. v. 4n).'
  - type: text
    content: 'J''allai et je la cachai près de l''Euphrate, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me l''avait ordonné. '
  '6':
  - type: note
    content: 'Longtemps après  : litt. à la fin de jours nombreux  ; cf. Gn 4.3n  ; 1R 17.7n. –  Va  : cf. v. 4n.'
  - type: text
    content: 'Longtemps après, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Va vers l''Euphrate et là, prends la ceinture que je t''avais ordonné d''y cacher. '
  '7':
  - type: note
    content: 'était abîmée ou pourrie  ; cf. 18.4n. –  plus bonne à rien  : l''expression est dérivée d''un terme traduit ailleurs par réussir (cf. 12.1) ; cf. v. 10.'
  - type: text
    content: J'allai vers l'Euphrate, je fouillai et je repris la ceinture au lieu où je l'avais cachée ; mais la ceinture était abîmée, elle n'était plus bonne à rien.
  '8':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint : '
  '9':
  - type: note
    content: 'je détruirai  : autre forme du verbe hébreu traduit par était abîmée au v. 7 ; de même au v. 14. –  orgueil 12.5n  ; cf. Lv 26.19 ; Es 3.16-26.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : C''est de la même manière que je détruirai l''orgueil de Juda, le grand orgueil de Jérusalem. '
