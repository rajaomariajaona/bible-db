    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : selon certains, en s''abstenant de la laver Jérémie favoriserait sa détérioration ; selon d''autres, au contraire, c''est en humidifiant la ceinture que Jérémie aurait favorisé sa détérioration, et celle-ci ne devait pas lui être imputable.'
    marker-yv: yv-n
  - type: text
    text: 'Ainsi m''a parlé le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Va t''acheter une ceinture de lin ; tu la passeras à tes reins, mais tu ne la mettras pas dans l''eau. '
