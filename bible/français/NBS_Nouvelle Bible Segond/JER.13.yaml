  - type: text
    text: 'Ce peuple mauvais qui refuse d''écouter mes paroles, qui va selon l''obstination de son cœur et qui suit d''autres dieux pour les servir et se prosterner devant eux, qu''il devienne comme cette ceinture, qui n''est plus bonne à rien ! '
  - type: usfm
    marker: vlbl
