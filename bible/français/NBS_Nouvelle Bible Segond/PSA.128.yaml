document_id: PSA.128,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Bonheur familial
  - type: text
    content: ' '
  - type: note
    content: montées 120.1n. –  Heureux… 1.1+ ; 112.1 ; 119.1. – Voir crainte.
  - type: text
    content: Chant des montées.
  - type: text
    content: 'Heureux quiconque craint le '
  - type: text
    content: Seigneur
  - type: text
    content: et suit ses voies !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 3.10 ; 65.21ss ; Ag 1.11 ; cf. Lm 5.1ss. –  Tu jouis  : litt. tu manges. –  du produit de ton travail  : litt. de la fatigue de tes mains.'
  - type: text
    content: Tu jouis alors du produit de ton travail ;
  - type: text
    content: heureux es-tu, le bonheur est pour toi !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'femme Pr 18.22 ; 19.14. –  vigne féconde  : cf. Ez 19.10. –  fils 127.3ss. –  plants d''olivier 144.12.'
  - type: text
    content: Ta femme est comme une vigne féconde
  - type: text
    content: au fond de ta maison ;
  - type: text
    content: tes fils sont comme des plants d'olivier,
  - type: text
    content: autour de la table.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Voir bénédiction.
  - type: text
    content: C'est ainsi qu'est béni
  - type: text
    content: 'l''homme qui craint le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: 134.3 ; cf. 20.3 ; 36.9ss.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te bénira de Sion,'
  - type: text
    content: et tu verras le bonheur de Jérusalem
  - type: text
    content: tous les jours de ta vie ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'les fils de tes fils  : cf. Jb 42.16. –  Que la paix… 125.5+.'
  - type: text
    content: tu verras les fils de tes fils.
  - type: text
    content: Que la paix soit sur Israël !
