document_id: 1PE.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Modeste par ses dimensions, sobre dans son expression, cette épître retient l''attention à trois titres au moins, indépendamment de l''autorité que lui confère son appartenance à l''ensemble canonique : elle se rattache à Pierre, le grand'
  - type: text
    content: apôtre des origines
  - type: text
    content: ', ce qui est l''exception dans le Nouveau Testament ; on s''accorde ensuite à reconnaître l'''
  - type: text
    content: ancienneté
  - type: text
    content: ' des éléments qu''elle rassemble : c''est un témoin privilégié des tout premiers temps de l''Eglise ; on est frappé, enfin, par l'''
  - type: text
    content: actualité
  - type: text
    content: ' de son message.'
  - type: text
    content: Auteur et date de rédaction
  - type: text
    content: 'L''auteur se nomme '
  - type: text
    content: Pierre, apôtre de Jésus-Christ
  - type: text
    content: ' (1.1). Nombreux sont ceux qui, aujourd''hui encore, font crédit à cette déclaration claire en elle-même. Cependant, dès le XIX'
  - type: text
    content: e
  - type: text
    content: ' siècle, on a mis en doute que Pierre lui-même ou quelqu''un de son école soit à l''origine de cet écrit, et le débat sur la question se poursuit.'
  - type: text
    content: 'La discussion porte d''abord sur la '
  - type: text
    content: période de rédaction
  - type: text
    content: '. On a cherché à la déterminer à partir des persécutions évoquées dans l''épître. On a envisagé :'
  - type: text
    content: –le règne de Trajan (98-117), d'après les indications données par Pline le Jeune sur la répression qui frappa les chrétiens d'Asie Mineure au début du II
  - type: text
    content: e
  - type: text
    content: ' siècle,'
  - type: text
    content: –celui de Domitien (81-96), période où interviennent les premiers décrets impériaux contre les Eglises,
  - type: text
    content: –celui de Néron qui, en 64-65, sévit contre les chrétiens de Rome.
  - type: text
    content: Toutefois il est sage de renoncer à dater sur un tel critère, car il n'est pas acquis que l'on soit, ici, en présence de persécutions générales et officielles. Les divers tracas, les coups, les spoliations, les emprisonnements subis par les chrétiens de la part des autorités locales à l'instigation des foules, depuis les origines ou presque, pourraient fournir un cadre largement suffisant aux données de l'épître.
  - type: text
    content: 'Aussi fait-on appel aux '
  - type: text
    content: critères théologiques
  - type: text
    content: . On a tenté de situer la rédaction en fonction de l'évolution des rapports entre la Synagogue et l'Eglise, car il n'y a plus trace ici de polémique contre le judaïsme.
  - type: text
    content: 'Mais la datation des thèmes doctrinaux est une entreprise des plus délicates. Certains perçoivent des affinités avec les écrits les plus tardifs du Nouveau Testament, telle l''appellation '
  - type: text
    content: peuple de Dieu
  - type: text
    content: ' donnée à l''Eglise et non plus à Israël (2.10), alors que d''autres sont sensibles à l''ancienneté de plusieurs motifs : la description du Christ comme serviteur souffrant (2.22s), inspirée d''Esaïe 53, l''attente toujours vive d''une fin proche (4.7), l''organisation de l''Eglise qui compte seulement un collège d''anciens encore assimilé au groupe des plus âgés (5.1-5).'
  - type: text
    content: 'On en revient alors aux considérations sur la '
  - type: text
    content: personnalité de l'auteur
  - type: text
    content: ', alors même que la lettre n''a pas un caractère personnel très marqué (son rôle affleure seulement en 5.1,12) et que le ton est davantage celui de l''exhortation douce que celui de l''autorité. Dans l''Antiquité, on ne doutait pas que cet écrit soit bien l''œuvre de Pierre. Les principaux arguments avancés par des modernes contre cette opinion sont les suivants :'
  - type: text
    content: –la généralité du propos,
  - type: text
    content: –l'absence de tout appui sur des relations personnelles privilégiées avec Jésus,
  - type: text
    content: –une théologie trop proche de celle de Paul dans sa formulation,
  - type: text
    content: –le caractère anormal d'une correspondance adressée à des Eglises fondées non par Pierre lui-même, mais, pour la plupart au moins, par Paul,
  - type: text
    content: '–un poids particulier attribué aux aspects formels : la langue (un grec de bonne qualité), l''expression aisée, les citations empruntées directement à la traduction grecque ('
  - type: text
    content: Septante,
  - type: text
    content: ' voir LXX*) dépasseraient, dit-on, les moyens d''un ancien pêcheur du lac de Galilée.'
  - type: text
    content: 'L''obstacle formel peut cependant être contourné grâce à la mention de '
  - type: text
    content: Silvain
  - type: text
    content: ' en 5.12. Ce Silvain, ou Silas, originaire de la '
  - type: text
    content: diaspora
  - type: text
    content: ' mais lié à l''Eglise de Jérusalem (Ac 15.22,40 ; 1Th 1.1), maître et évangéliste, a pu jouer un rôle de « secrétaire » plus ou moins important, voire être l''auteur sous l''autorité de Pierre. On propose une solution encore plus souple, celle du rattachement à une '
  - type: text
    content: « école pétrinienne »,
  - type: text
    content: ' qui se réclamait de Pierre.'
  - type: text
    content: 'Rien d''incontestable ne s''oppose donc au lien qui unit cette œuvre à l''apôtre. L''attribution à Pierre lui-même conduirait à situer sa rédaction vers 64-65, peu avant son martyre, peut-être à Rome, si l''on comprend ainsi la mention de '
  - type: text
    content: Babylone
  - type: text
    content: ' en 5.13'
  - type: text
    content: n
  - type: text
    content: . L'hypothèse de « l'école pétrinienne » explique qu'on la date quelquefois après l'an 70.
  - type: text
    content: Arrière-plan théologique et ecclésial
  - type: text
    content: 'L''arrière-plan est d''abord celui de l''Ancien Testament (nombreuses citations ou allusions). L''enracinement dans l''Ecriture apparaît, par exemple, dans le rôle que joue le Psaume 34 (2.3 ; 3.10ss et plusieurs allusions) ou dans la place accordée au livre d''Esaïe : Es 8.12ss (1P 2.7s ; 3.14s) ; Es 28.16 (1P 2.6) ; Es 40.6ss (1P 1.24s) ; Es 43.20s (1P 2.9) ; Es 53.6ss (1P 2.22ss).'
  - type: text
    content: 'Ce sont avant tout les '
  - type: text
    content: catégories de l'Ancien Testament
  - type: text
    content: ' qui structurent la théologie de l''épître, en particulier :'
  - type: text
    content: –celle de l'
  - type: text
    content: Exode
  - type: text
    content: ' (2.9), sur laquelle vient se greffer le thème de l''exil (2.11) et de la '
  - type: text
    content: diaspora
  - type: text
    content: ' (1.1'
  - type: text
    content: n
  - type: text
    content: ') : c''est vers le Christ, invisible mais vivant, que doivent désormais se tourner les regards, et non plus vers le pays et le temple ;'
  - type: text
    content: '–celle du '
  - type: text
    content: sacrifice
  - type: text
    content: ' (1.2 ; 1.18s ; 2.5,21ss ; 3.18) ;'
  - type: text
    content: '–celle du '
  - type: text
    content: juste persécuté
  - type: text
    content: ' mais récompensé, particulièrement adaptée à une situation de persécution (3.9s ; 5.9s).'
  - type: text
    content: L'épître se nourrit aussi de l'
  - type: text
    content: enseignement de Jésus
  - type: text
    content: '  : dans une forme proche de celle de Matthieu, on perçoit des échos du « Sermon sur la montagne » (Mt 5.10 en 2.19ss et 3.9,14 ; Mt 5.16 en 2.12 ; Mt 6.9ss en 1.17 ; Mt 6.19-21 en 1.4). Epître « de la tradition », comme on l''a qualifiée, elle donne accès, en outre, à la prédication et à la catéchèse des communautés primitives. Elle sait même imprimer une marque spécifiquement chrétienne à des codes de relations sociales que l''on trouve déjà dans les textes de la sagesse païenne ou juive.'
  - type: text
    content: 'Les '
  - type: text
    content: apports originaux
  - type: text
    content: ' ne font cependant pas défaut ; on relève, parmi ceux-ci :'
  - type: text
    content: –la thèse du sacerdoce de tous les croyants (2.5,9),
  - type: text
    content: '–l''accent sur une espérance présentée comme '
  - type: text
    content: vivante
  - type: text
    content: ' (1.3),'
  - type: text
    content: –l'appel à rendre compte de cette espérance (3.15),
  - type: text
    content: –la perspective d'un jugement inauguré dans les détresses de l'Eglise (4.17ss).
  - type: text
    content: On peut ajouter à cette liste les textes de 3.19ss et de 4.6, mais leur indéniable originalité s'associe à la difficulté qu'on éprouve aujourd'hui à en donner une interprétation assurée.
  - type: text
    content: Intention et message
  - type: text
    content: 'La présence de plusieurs centres d''intérêt rend délicate la recherche d''une intention globale. Il est juste, néanmoins, de prendre en compte la déclaration de 5.12 : '
  - type: text
    content: Je vous écris… pour vous encourager et pour témoigner que c'est bien dans la vraie grâce de Dieu que vous vous tenez
  - type: text
    content: .
  - type: text
    content: 'Ici s''exprime le souci de '
  - type: text
    content: rassurer,
  - type: text
    content: ' et de '
  - type: text
    content: stimuler
  - type: text
    content: ' à la fois, des chrétiens troublés qui s''interrogent sur le message dont ils vivent. Cette perplexité, susceptible de ralentir leur marche et d''affaiblir leur témoignage, ne naît pas d''une « autre bonne nouvelle » (contrairement à Ga 1.6, il n''y a pas ici de polémique interne au christianisme), mais de la difficulté d''intégrer dans la conception de la vie sous la grâce des réalités aussi sombres que l''ostracisme social, la persécution et la mort. La difficulté n''est pas seulement existentielle, mais aussi théologique.'
  - type: text
    content: Structure
  - type: text
    content: 'La '
  - type: text
    content: structure
  - type: text
    content: ' de la lettre (voir « Plan de l''épître ») n''a rien de systématique. La thèse selon laquelle l''indicatif des déclarations doctrinales suivrait ici l''impératif de l''exhortation (à l''inverse de ce que l''on trouve chez Paul) ne se vérifie pas toujours. La coupure la plus clairement marquée se situe entre 2.10 et 11, avec, dans ce dernier verset, l''appellation '
  - type: text
    content: bien-aimés
  - type: text
    content: ' et l''annonce – prolongée en 2.12 – d''un thème nouveau : la conduite parmi les gens des nations (non juives). On peut encore mentionner quelques indices littéraires, comme la présence de doxologies en 4.11 et 5.10s.'
  - type: text
    content: Genre littéraire et destinataires
  - type: text
    content: Est-ce une vraie lettre ?
  - type: text
    content: 'En raison de la tonalité d''ensemble, d''assez nombreux modernes pensent qu''on aurait plutôt affaire à un '
  - type: text
    content: sermon,
  - type: text
    content: ' muni après coup d''une introduction et d''une salutation. On a même cherché à être plus précis : homélie baptismale, voire liturgie baptismale.'
  - type: text
    content: Rien n'interdit vraiment de lui reconnaître une authentique forme épistolaire, et il est artificiel de rattacher tout le message au baptême (seule mention explicite en 3.21).
  - type: text
    content: A qui cette lettre est-elle envoyée ?
  - type: text
    content: A ceux qui ont été choisis et qui vivent en étrangers dans la dispersion – dans le Pont, en Galatie, en Cappadoce, en Asie et en Bithynie
  - type: text
    content: '. Ces cinq provinces représentent, selon la terminologie de l''administration romaine, l''essentiel de ce vaste territoire qu''est '
  - type: text
    content: l'Asie Mineure
  - type: text
    content: ' (correspondant '
  - type: text
    content: grosso modo
  - type: text
    content: ' à l''actuelle Turquie). Un regard jeté sur une carte de cette région au I'
  - type: text
    content: er
  - type: text
    content: ' siècle de notre ère met en évidence le caractère à première vue peu logique de l''énumération, qui sépare des provinces voisines comme le Pont et la Bithynie. L''explication la plus vraisemblable de cette curiosité est celle d''un ordre correspondant au circuit accompli par le porteur de la lettre, partant d''un des ports de la mer Noire pour revenir à un autre.'
  - type: text
    content: 'L''épître fournit peu d''informations sur la vie des '
  - type: text
    content: communautés
  - type: text
    content: ' visées. Elle souligne leur dissémination (1.1). Le trait le plus accusé est celui de l''inconfort ressenti en présence d''un contexte social peu favorable, où l''incompréhension se mue aisément en hostilité (2.12 ; 4.1-4). On note un vigoureux appel à l''amour fraternel (1.22 ; 3.8 ; 4.8) et au bon usage des charismes (4.10s). Le devoir du témoignage dans le monde doit être assumé avec joie (1.14ss ; 2.11s, etc.). L''organisation de l''Eglise est simple : un collège d''anciens a la lourde mais belle responsabilité de '
  - type: text
    content: paître le troupeau de Dieu
  - type: text
    content: ' (5.2).'
  - type: text
    content: Il faut reconnaître que notre connaissance du christianisme d'Asie au I
  - type: text
    content: er
  - type: text
    content: ' siècle est fortement lacunaire. Il faut s''en remettre aux quelques informations fournies par les épîtres de Paul, le livre des Actes, l''Apocalypse de Jean et les lettres d''Ignace d''Antioche (au début du II'
  - type: text
    content: e
  - type: text
    content: ' s. apr. J.-C.). Si nous ne trouvons ici que peu de chose pour satisfaire notre curiosité, nous recevons par contre d''utiles exhortations à nous rappeler qu''il suffit au disciple d''être traité comme son Maître.'
  - type: text
    content: 'L''Eglise d''aujourd''hui, en situation de post-chrétienté ou dans des pays où le christianisme est relativement récent et minoritaire, retrouve dans une large mesure les sentiments et les difficultés des premiers destinataires, '
  - type: text
    content: étrangers dans la dispersion.
