document_id: EZK.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le cadre historique
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Nous sommes en 598 av. J.-C. Quelques années auparavant, en 605, Nabuchodonosor, roi de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Babylone
    - type: text
      text: ', a battu les Egyptiens à Karkemish, s''assurant ainsi la domination sur tout le pays d''Israël. Joïaqim, roi de Juda, s''est soumis. Puis, profitant de difficultés passagères des Babyloniens, il s''est révolté, provoquant ainsi, à terme, la ruine de son Etat. Il meurt sans doute en décembre 598, juste à temps pour ne pas voir Jérusalem tomber aux mains des troupes babyloniennes.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Son fils, Joïakîn, âgé de 18 ans, règne 3 mois, assiégé ; puis il est emmené en '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: captivité
    - type: text
      text: ' à Babylone, avec l''élite du pays, dix mille chefs de famille au total (2R 24.1-17). Le trésor du palais et celui du temple, ainsi que ses ustensiles en or, sont confisqués (2R 24.13). Le pays est ruiné politiquement et économiquement, même si l''oncle de Joïakîn, Mattania, est installé sur le trône par l''ennemi, sous le nom de Sédécias.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un prêtre devenu prophète
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Parmi les exilés de 597 se trouve un jeune prêtre, Ezéchiel, fils du prêtre Bouzi (1.3). Il n''exercera pas son sacerdoce au temple de Jérusalem. Cependant son appartenance à la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: prêtrise
    - type: text
      text: ' jouera sans doute un rôle important, quoique souvent paradoxal, dans sa vie et son œuvre. De fait, c''est avec les textes dits « sacerdotaux » de la Torah, et en particulier le Lévitique, que le livre d''Ezéchiel offre les ressemblances littéraires les plus marquées.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Pendant cinq ans, il vit à Babylone avec les autres exilés, sur les rives du Kebar (1.1
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: '). Puis, un jour de 593, sur cette terre étrangère, il a une vision de la gloire de Dieu, c''est-à-dire de sa présence éclatante (1.1-3,15). Parmi les Juifs exilés à Babylone, il s''attache désormais à extirper les faux espoirs, comme Jérémie, un autre prêtre, le fait de son côté à Jérusalem. On est en pleine guerre : le prophète est la sentinelle (3.17). Ce n''est plus le moment de donner des conseils (3.26) : il lui faudra parfois rester muet (3.26) et même immobile (4.4-8). Sa personne ne fera qu''un avec son message (3.1-3). Il n''est plus avec des frères, mais au milieu de ronces et de scorpions (2.6). Il devient, par son comportement, un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: présage
    - type: text
      text: ' pour Israël (12.6 ; 24.24) ; sa douleur personnelle sert de signe : la mort de sa femme devient ainsi l''annonce de la chute de Jérusalem (24.16-22). Il lui faut une ténacité à toute épreuve, un '
    - type: usfm
      marker: it
      children:
      - type: text
        text: front comme un diamant, plus dur que le roc
    - type: text
      text: ' (3.9).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'On ne s''étonnera donc pas du grand nombre de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: paroles-gestes
    - type: text
      text: ', qui sont sa première forme de prédication (voir 4.1 et « Les paroles-gestes des prophètes », p.${Xgstproph}). Si la dernière — deux bâtons réunis bout à bout dans une seule main pour symboliser la réunification d''Israël et de Juda (37.15-28) — est simple et sereine, que dire de ces 390 jours que le prophète passe immobile, couché sur le côté (4.4-8), pour porter la faute d''Israël ?'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Mais ce mime souffrant est aussi un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: poète
    - type: text
      text: ' passionné et un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: polémiste
    - type: text
      text: ' redoutable. Il attire la curiosité des exilés qui se pressent pour l''entendre (33.31s). Il excelle dans l''allégorie vengeresse (voir 15.2), jointe à l''ironie mordante des lamentations funèbres (19 ; 27). On le surnomme le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: conteur de fables
    - type: text
      text: ' (21.5). Tout son langage, en effet, repose sur l''image : la prédication des faux prophètes est un replâtrage qui ne résistera pas à la pluie torrentielle (13.12) ; Tyr la superbe sombrera comme un navire qu''un vent d''est a brisé au cœur des mers (27.1-36). Sans parler d''Ezéchiel juriste (18.1-32), architecte (40–42) et visionnaire (1.1)…'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ce foisonnement est cependant très '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: structuré
    - type: text
      text: '  : l''ensemble du livre se présente comme un récit à la première personne (à l''exception de 1.3). La formule '
    - type: usfm
      marker: it
      children:
      - type: text
        text: la parole du Seigneur
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: (YHWH)
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me parvint
    - type: text
      text: ' apparaît une cinquantaine de fois en introduction ; en conclusion on retrouve souvent les mots '
    - type: usfm
      marker: it
      children:
      - type: text
        text: déclaration du Seigneur Dieu
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: (YHWH)
    - type: text
      text: '. Mais la formule la plus caractéristique du prophète est celle-ci : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vous saurez / ils sauront que je suis le Seigneur (YHWH)
    - type: text
      text: ' (5.13+).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le ministère d''Ezéchiel, d''une durée de près de vingt-deux ans (593-571), s''articule autour de la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: chute de Jérusalem
    - type: text
      text: ' en 587/6, qui est en quelque sorte son centre de gravité. Les quatorze dates mentionnées dans ce livre (voir 1.1'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ) sont essentiellement groupées entre 593 et 586 (33.21).
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le message du prophète
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Chaque fois que Dieu parle, c''est un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: événement
    - type: text
      text: ' dont Ezéchiel doit rendre compte : un jour, tous sauront que Dieu a parlé et qu''il a dit vrai.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La première action prophétique (4.1-3) plante le décor : Jérusalem est en état de siège et rien ne pourra la sauver. Mais la destruction de toutes les structures politiques et religieuses n''est pas une défaite de YHWH. Celui-ci n''est pas lié à la royauté ni au temple. Lorsqu''il n''est pas reconnu comme Seigneur, il peut partir et mener le combat ailleurs. Sa '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: gloire
    - type: text
      text: ' — sa présence rayonnante — quittera Jérusalem, laissant ainsi la place au destructeur (8–11). Dieu n''est pas l''emblème d''un peuple, ni sa projection ; il est vraiment le Seigneur, libre d''apparaître au prophète en Babylonie, près du Kebar.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Idolâtrie et injustice
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ce sont l''idolâtrie et l''injustice qui amènent YHWH à quitter le temple et la ville. Ezéchiel n''a pas de mots assez durs pour stigmatiser les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: idoles
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: abominations
    - type: text
      text: ' ou '
    - type: usfm
      marker: it
      children:
      - type: text
        text: horreurs
    - type: text
      text: ' (20.4,7s). Il nous fait faire la « visite guidée » du temple où s''étalent des figures de divinités animales, végétales et astrales (chap. 8). Tout au long du livre sera martelée cette évidence : parce qu''il s''est aligné sur les autres peuples (6.9), Israël ne peut plus se targuer d''être le peuple de Dieu.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L'a-t-il jamais été, vrai peuple fidèle et obéissant ? La réponse est terrible, parce qu'elle interdit de se raccrocher au passé — au séjour au désert, par exemple. L'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: histoire d'Israël
    - type: text
      text: ' est impure dès le départ, dès avant la sortie d''Egypte (20.6-8), ce qu''aucun prophète n''avait encore osé dire. Pour Ezéchiel Jérusalem n''est plus qu''une ville de Cananéens (16.3'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ) ; elle ne vaut pas mieux que Samarie, ni même que Sodome (16.46-56). Israël n'a fait que profaner le nom de Dieu parmi les nations (36.20-23 ; cf. Rm 2.24). Le départ de Dieu est la conclusion logique de toute l'histoire d'Israël. Jérusalem n'est plus habitable pour Dieu.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: injustice
    - type: text
      text: ' est inséparable de l''idolâtrie (8.17). Jérusalem mérite le nom de '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ville sanguinaire
    - type: text
      text: ' (22.2 ; 24.6-9), nom que Nahoum avait donné à Ninive (Na 3.1). Elle est le théâtre de la violence (7.11). Toutes les élites de la nation, prophètes, prêtres, dirigeants, grands propriétaires, ont failli à leur mission (22.25-30). L''oppression et l''exploitation des plus faibles sont partout (18.7).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ainsi Ezéchiel est contraint de dire que sans Dieu Israël n'est pas viable et n'a plus de raison d'être.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Les nations
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La défaite d''Israël ne doit pas être interprétée comme la victoire des autres nations. Celles-ci accompagneront Israël dans la ruine (25.2). Ce n''est d''ailleurs pas une consolation pour Israël, au contraire : rien ne peut résister au jugement de Dieu. Il ne faut surtout rien attendre de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'Egypte
    - type: text
      text: ' (chap. 29 à 32). L''arrogance des peuples (29.3) a mis l''équilibre du monde en danger. La richesse de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Tyr
    - type: text
      text: ' l''a conduite à la démesure (27.3ss ; 28.1-4). Par son commerce, Tyr s''est livrée à une exploitation des autres qu''Ezéchiel n''hésite pas à qualifier de violence et de péché (28.5,16-18).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'On pourrait être surpris de l''absence de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Babylone
    - type: text
      text: ' dans ces déclarations prophétiques. N''oublions pas qu''Ezéchiel était prisonnier à Babylone ! Du reste, le prophète est conséquent. Son message est radical : aucune combinaison politique ne permettra à Jérusalem d''échapper à la défaite. En dépit de quelques difficultés, Babylone doit aller jusqu''au bout de sa victoire (29.17-19). Toutefois les chapitres énigmatiques sur Gog (38–39) pourraient cacher l''annonce de la défaite finale de toutes les autres nations, y compris Babylone.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Renaissance
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Jérusalem tombée (33.21-29), Ezéchiel s''attelle désormais à une autre tâche : annoncer l'''
    - type: usfm
      marker: bd
      children:
      - type: text
        text: espérance
    - type: text
      text: ' d''une vie nouvelle. Il ne s''agit pas vraiment d''un autre ministère : lui-même reste une sentinelle et la responsabilité de chacun est toujours engagée (33.1-20 reprend 3.16-21 et le chap. 18).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ezéchiel ne conçoit pas de vie possible en dehors d''une certaine '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: responsabilité personnelle
    - type: text
      text: '  : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Je vous jugerai, chacun selon ses voies
    - type: text
      text: ' (18.30 ; 33.20), c''est-à-dire selon sa manière de vivre. Le désordre cultuel, sexuel, social est porteur de mort (18.1-18). Ezéchiel refuse tout unanimisme et toute fausse réconciliation. Les bergers — ceux qui avaient un certain pouvoir spirituel, politique ou économique — ont failli, ils seront écartés (34.10) ; les profiteurs et les exploiteurs seront éliminés (34.11-16). C''est l''affirmation de la droiture et de l''impartialité de Dieu.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Au reste Dieu donne ce qu''il ordonne : il régénère la volonté et offre les moyens d''une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: vie nouvelle
    - type: text
      text: ' (36.25-27). La vision des ossements (37.1-14) atteste la radicalité de la transformation nécessaire. Israël passera de la mort à la vie par la seule puissance de son Dieu. Cette vision montre que Dieu ouvre la voie à un avenir libre, qui ne sera pas obéré par le péché des générations précédentes (33.10s). Si chacun doit endosser la responsabilité de ses actes (18.4), le cadre reste celui de la solidarité d''un peuple. La terre sera restaurée (36.29-37). Israël et Juda formeront à nouveau un seul peuple (37.15-23). Pour sceller cette unité, Dieu suscitera un nouveau David, roi (37.24) ou prince (34.23 ; 37.25), dont le gouvernement sera intègre, à l''opposé de tant de tyrannies passées (45.8s). La faim et l''insécurité disparaîtront : ce sera l'''
    - type: usfm
      marker: it
      children:
      - type: text
        text: alliance de paix
    - type: text
      text: ' (34.25 ; 37.26).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: pays
    - type: text
      text: ' sera divisé en treize bandes horizontales, une pour chaque tribu, sept au nord et cinq au sud de la bande réservée à Jérusalem, au temple, aux prêtres et au prince (45.1-8 ; 47.13–48.29). Ce découpage garantira l''égalité et le respect de tous (46.16-18). Ezéchiel entre dans les détails de la disposition du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: temple
    - type: text
      text: ' et de son service idéal (40–46 ; voir le plan p.${Xtplez}). Ce temple sera la source même de la vie. Le torrent qui en sortira répandra la vie dans le désert et jusque dans les eaux de la mer Morte (47.1-12). Tout l''avenir pourrait se résumer en un seul mot, et c''est le dernier : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: YHWH est là
    - type: text
      text: ' (48.35).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: A cause de mon saint nom…
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ezéchiel a forcé Israël à rester éveillé, à comprendre et à mesurer l''étendue du désastre, qui ne se limitait pas à un écrasement militaire inévitable face à une grande puissance. Après lui avoir ôté toute fausse assurance, Ezéchiel demande à Israël un acte de vraie '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: foi
    - type: text
      text: '  : le salut n''est pas dû aux mérites d''Israël, mais à la capacité et à la volonté de Dieu d''être lui-même : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: à cause de mon nom sacré
    - type: text
      text: ' (36.22,31s). La grandeur d''Israël est d''avoir reconnu dans ce livre impitoyable une parole de Dieu et d''en avoir fait du même coup une parole pour d''autres temps. Idolâtrie, injustice, violence, manque de cohésion sociale, insécurité, famine, iniquité du commerce international, arrogance des grandes puissances, faux recours à l''histoire, démission des cadres responsables, dérèglement sexuel ou désordre économique, autant de maux qui n''ont hélas rien perdu de leur actualité, et que le livre d''Ezéchiel nous invite à combattre.'
