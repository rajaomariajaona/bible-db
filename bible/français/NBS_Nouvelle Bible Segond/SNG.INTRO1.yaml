  - type: text
    content: L'amour est fort comme la mort
  - type: text
    content: 8.8-14
  - type: text
    content: 'Epilogue : le rapport aux frères, aux amis, à Salomon.'
  - type: text
    content: Quelques personnages
  - type: text
    content: Les amoureux sont-ils seuls au monde ? Ceux du Cantique aspirent à l'
  - type: text
    content: intimité
  - type: text
    content: ' et ne pensent que l''un à l''autre. Mais plusieurs personnages interviennent alentour.'
  - type: text
    content: 'Les '
  - type: text
    content: frères
  - type: text
    content: ', d''abord (1.6 ; 8.8-9) : ce sont les représentants de l''autorité familiale qui, conformément à la coutume, s''érigent en gardiens de leur jeune sœur. Mais celle-ci finit par leur échapper (1.6 ; 8.10).'
  - type: text
    content: Salomon
  - type: text
    content: ', ensuite, mentionné à six reprises (1.1 puis 1.5 ; 3.7,11 ; 8.11,12). Son rôle dans l''intrigue demeure énigmatique, tout comme sa relation au roi mentionné en 1.4,12 et 7.6 et au berger bien-aimé. S''agit-il d''une seule et même personne ? Le bien-aimé est-il le roi Salomon de l''histoire ? Est-il au contraire un fiancé rustique dont Salomon, séducteur, voudrait la détourner ? Dans ce cas Salomon servirait de contre-modèle, de repoussoir à la figure du bien-aimé. Ou bien encore, l''humble berger est-il paré par l''amour de la dignité du plus glorieux des rois d''Israël ?'
  - type: text
    content: 'Les '
  - type: text
    content: filles de Jérusalem
  - type: text
    content: '  : évoquées plus d''une fois (1.5 ; 2.7 ; 3.5,11 ; 5.8,16 ; 8.4), elles semblent même prendre la parole en 5.9 et 6.1. En 3.10-11 ce sont des admiratrices de Salomon et de son faste. En leur qualité de citadines, elles gardent le teint clair qui correspond alors au canon convenu de la beauté. Elles contrasteraient ainsi avec la bien-aimée (1.5 ; cf. Es 3.16-26).'
  - type: text
    content: 'Les '
  - type: text
    content: gardes
  - type: text
    content: ' enfin (3.3 et 5.7) : ces serviteurs de l''ordre, obtus et brutaux, symbolisent l''insensibilité prétendument virile à l''égard des sentiments.'
  - type: text
    content: Une flamme du Seigneur…
  - type: text
    content: Le Cantique des cantiques montre que l'
  - type: text
    content: amour
  - type: text
    content: ', don du Créateur, engage toute la personne, corps et âme, de ceux qui aiment. Exclusif (2.16 ; 6.9 etc), il se suffit à lui-même et n''a nul besoin, pour s''épanouir, de confort ou de raffinement (1.17 ; 8.12) ; et il n''a pas de prix (8.7). La merveille qu''il recèle ouvre l''existence humaine sur un au-delà d''elle-même. C''est la seule réalité terrestre qui se mesure avec la mort. Les grandes eaux ne sauraient éteindre son feu ; c''est une '
  - type: text
    content: flamme du Seigneur
  - type: text
    content: ' (8.6'
  - type: text
    content: n
  - type: text
    content: s).
