document_id: SNG.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le Cantique des cantiques dans la Bible
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ce petit livre, que beaucoup se sont étonnés de trouver dans la Bible, a provoqué quantité de débats passionnés. Rien que dans la littérature de la synagogue on en a recensé 49 commentaires officiels. A la lecture on découvrira que la majeure partie du texte est occupée par le dialogue de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: deux amoureux
  - type: text
    text: ', exprimé sous une forme poétique tout émaillée d''images champêtres, comme si la joie des amours s''étendait à la nature entière, en une fête de tous les sens. Dans le ruissellement des métaphores scintillent de nombreuses significations symboliques — celles que nous discernons et celles que nous pressentons sans en avoir la clef.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le recours au vocabulaire de la tendresse physique dans la Bible a souvent paru choquant. Tant dans le judaïsme ancien que dans les Eglises chrétiennes on a vu se développer un certain nombre d''interprétations allégoriques : on y a lu un poème des fiançailles entre Dieu et son peuple (en référence, par exemple, à Es 62.4s ou à Os 2.18,22) ou entre le Christ et son Eglise (cf. 2Co 11.2 ; Ep 5.26ss et l''Apocalypse), voire entre Dieu (ou le Christ) et l''âme humaine (de nombreux mystiques, à l''instar de saint Jean de la Croix). Ainsi pensait-on justifier la présence, fort discutée à l''origine, du Cantique dans le canon des Ecritures. Rien dans le texte n''exige pourtant pareilles lectures. Les nombreuses références et allusions à Salomon, que la tradition juive considère comme l''auteur même du Cantique (cf. 1.1 ; voir aussi 1.5 ; 3.7ss ; 6.8n ; 7.1n ; 8.10ss), l''apparentent plutôt à la littérature de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sagesse
  - type: text
    text: ' qui se donne pour horizon le monde des humains et ses mystères (voir « La littérature de sagesse », p.${Xsagesse}). De fait, la majeure partie des exégètes penchent aujourd''hui pour le sens le plus littéral : le Cantique apparaît comme l''expression de l''émerveillement face à l''expérience de l''amour entre un homme et une femme.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le plus beau des chants
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Cantique des cantiques
  - type: text
    text: ' est un décalque de l''hébreu, qui s''apparente à d''autres tournures du même type comme « Dieu des dieux, Seigneur des seigneurs » (Dt 10.17) pour exprimer une sorte de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: superlatif
  - type: text
    text: '  : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: le plus beau des chants.
- type: usfm
  marker: is2
  children:
  - type: text
    text: Recueil de poèmes ou drame lyrique ?
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Faut-il voir dans le Cantique une anthologie de poèmes juxtaposés sans ordre bien défini, comme les Psaumes ou les Proverbes ? Ou au contraire une progression qui ferait de ce livret une sorte de drame lyrique ? Chacune de ces hypothèses a ses défenseurs. La récurrence d''un refrain comme '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Je vous en adjure, filles de Jérusalem…
  - type: text
    text: ' (2.7 ; 3.5 ; 5.8 ; 8.4 ; voir aussi 1.5 ; 5.16) plaide en faveur de la présence d''une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: structure
  - type: text
    text: . De même, le retour à la fin du livre des motifs énoncés au début (course, vigne, frères) signale un effort de composition littéraire (comparer 1.4-6 avec 8.8-14).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'On ne sait pas toujours '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: qui parle
  - type: text
    text: ' dans les dialogues (le bien-aimé, Salomon, la bien-aimée, un chœur, les filles de Jérusalem, les amis, les frères ?) Cette réserve faite, on proposera le découpage suivant :'
- type: text
  text: '1.2-6Thème du poème1.7–2.7Dialogue des amoureux2.8–3.5Le chant de la bien-aimée3.6–5.1Le faste de Salomon et le chant du bien-aimé5.2–6.3Le cauchemar de la rencontre manquée6.4–8.4Duo des amoureux8.5-7L''amour est fort comme la mort8.8-14Epilogue : le rapport aux frères, aux amis, à Salomon.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Quelques personnages
- type: usfm
  marker: ip
  children:
  - type: text
    text: Les amoureux sont-ils seuls au monde ? Ceux du Cantique aspirent à l'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: intimité
  - type: text
    text: ' et ne pensent que l''un à l''autre. Mais plusieurs personnages interviennent alentour.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: frères
  - type: text
    text: ', d''abord (1.6 ; 8.8-9) : ce sont les représentants de l''autorité familiale qui, conformément à la coutume, s''érigent en gardiens de leur jeune sœur. Mais celle-ci finit par leur échapper (1.6 ; 8.10).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Salomon
  - type: text
    text: ', ensuite, mentionné à six reprises (1.1 puis 1.5 ; 3.7,11 ; 8.11,12). Son rôle dans l''intrigue demeure énigmatique, tout comme sa relation au roi mentionné en 1.4,12 et 7.6 et au berger bien-aimé. S''agit-il d''une seule et même personne ? Le bien-aimé est-il le roi Salomon de l''histoire ? Est-il au contraire un fiancé rustique dont Salomon, séducteur, voudrait la détourner ? Dans ce cas Salomon servirait de contre-modèle, de repoussoir à la figure du bien-aimé. Ou bien encore, l''humble berger est-il paré par l''amour de la dignité du plus glorieux des rois d''Israël ?'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: filles de Jérusalem
  - type: text
    text: '  : évoquées plus d''une fois (1.5 ; 2.7 ; 3.5,11 ; 5.8,16 ; 8.4), elles semblent même prendre la parole en 5.9 et 6.1. En 3.10-11 ce sont des admiratrices de Salomon et de son faste. En leur qualité de citadines, elles gardent le teint clair qui correspond alors au canon convenu de la beauté. Elles contrasteraient ainsi avec la bien-aimée (1.5 ; cf. Es 3.16-26).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: gardes
  - type: text
    text: ' enfin (3.3 et 5.7) : ces serviteurs de l''ordre, obtus et brutaux, symbolisent l''insensibilité prétendument virile à l''égard des sentiments.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Une flamme du Seigneur…
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le Cantique des cantiques montre que l'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: amour
  - type: text
    text: ', don du Créateur, engage toute la personne, corps et âme, de ceux qui aiment. Exclusif (2.16 ; 6.9 etc), il se suffit à lui-même et n''a nul besoin, pour s''épanouir, de confort ou de raffinement (1.17 ; 8.12) ; et il n''a pas de prix (8.7). La merveille qu''il recèle ouvre l''existence humaine sur un au-delà d''elle-même. C''est la seule réalité terrestre qui se mesure avec la mort. Les grandes eaux ne sauraient éteindre son feu ; c''est une '
  - type: usfm
    marker: it
    children:
    - type: text
      text: flamme du Seigneur
  - type: text
    text: ' (8.6'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: s).
