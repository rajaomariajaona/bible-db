  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Le Cantique des cantiques dans la Bible
  - type: text
    content: 'Ce petit livre, que beaucoup se sont étonnés de trouver dans la Bible, a provoqué quantité de débats passionnés. Rien que dans la littérature de la synagogue on en a recensé 49 commentaires officiels. A la lecture on découvrira que la majeure partie du texte est occupée par le dialogue de '
  - type: text
    content: deux amoureux
  - type: text
    content: ', exprimé sous une forme poétique tout émaillée d''images champêtres, comme si la joie des amours s''étendait à la nature entière, en une fête de tous les sens. Dans le ruissellement des métaphores scintillent de nombreuses significations symboliques — celles que nous discernons et celles que nous pressentons sans en avoir la clef.'
  - type: text
    content: 'Le recours au vocabulaire de la tendresse physique dans la Bible a souvent paru choquant. Tant dans le judaïsme ancien que dans les Eglises chrétiennes on a vu se développer un certain nombre d''interprétations allégoriques : on y a lu un poème des fiançailles entre Dieu et son peuple (en référence, par exemple, à Es 62.4s ou à Os 2.18,22) ou entre le Christ et son Eglise (cf. 2Co 11.2 ; Ep 5.26ss et l''Apocalypse), voire entre Dieu (ou le Christ) et l''âme humaine (de nombreux mystiques, à l''instar de saint Jean de la Croix). Ainsi pensait-on justifier la présence, fort discutée à l''origine, du Cantique dans le canon des Ecritures. Rien dans le texte n''exige pourtant pareilles lectures. Les nombreuses références et allusions à Salomon, que la tradition juive considère comme l''auteur même du Cantique (cf. 1.1 ; voir aussi 1.5 ; 3.7ss ; 6.8n ; 7.1n ; 8.10ss), l''apparentent plutôt à la littérature de '
  - type: text
    content: sagesse
  - type: text
    content: ' qui se donne pour horizon le monde des humains et ses mystères (voir « La littérature de sagesse », p.${Xsagesse}). De fait, la majeure partie des exégètes penchent aujourd''hui pour le sens le plus littéral : le Cantique apparaît comme l''expression de l''émerveillement face à l''expérience de l''amour entre un homme et une femme.'
  - type: text
    content: Le plus beau des chants
  - type: text
    content: Cantique des cantiques
  - type: text
    content: ' est un décalque de l''hébreu, qui s''apparente à d''autres tournures du même type comme « Dieu des dieux, Seigneur des seigneurs » (Dt 10.17) pour exprimer une sorte de '
  - type: text
    content: superlatif
  - type: text
    content: '  : '
  - type: text
    content: le plus beau des chants.
  - type: text
    content: Recueil de poèmes ou drame lyrique ?
  - type: text
    content: 'Faut-il voir dans le Cantique une anthologie de poèmes juxtaposés sans ordre bien défini, comme les Psaumes ou les Proverbes ? Ou au contraire une progression qui ferait de ce livret une sorte de drame lyrique ? Chacune de ces hypothèses a ses défenseurs. La récurrence d''un refrain comme '
  - type: text
    content: Je vous en adjure, filles de Jérusalem…
  - type: text
    content: ' (2.7 ; 3.5 ; 5.8 ; 8.4 ; voir aussi 1.5 ; 5.16) plaide en faveur de la présence d''une '
  - type: text
    content: structure
  - type: text
    content: . De même, le retour à la fin du livre des motifs énoncés au début (course, vigne, frères) signale un effort de composition littéraire (comparer 1.4-6 avec 8.8-14).
  - type: text
    content: 'On ne sait pas toujours '
  - type: text
    content: qui parle
  - type: text
    content: ' dans les dialogues (le bien-aimé, Salomon, la bien-aimée, un chœur, les filles de Jérusalem, les amis, les frères ?) Cette réserve faite, on proposera le découpage suivant :'
  - type: text
    content: 1.2-6
  - type: text
    content: Thème du poème
  - type: text
    content: 1.7–2.7
  - type: text
    content: Dialogue des amoureux
  - type: text
    content: 2.8–3.5
  - type: text
    content: Le chant de la bien-aimée
  - type: text
    content: 3.6–5.1
  - type: text
    content: Le faste de Salomon et le chant du bien-aimé
  - type: text
    content: 5.2–6.3
  - type: text
    content: Le cauchemar de la rencontre manquée
  - type: text
    content: 6.4–8.4
  - type: text
    content: Duo des amoureux
  - type: text
