document_id: HOS.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël mangera une nourriture impure
  - type: text
    content: ' '
  - type: note
    content: 'transporté d''allégresse  : même expression hébraïque en Jb 3.22. –  comme les peuples 7.8. –  prostitué 1.2+. –  salaire 2.14. –  les aires à blé , hauts lieux tout désignés pour le culte des divinités agraires (cf. v. 2-7).'
  - type: text
    content: Ne te réjouis pas, Israël,
  - type: text
    content: ne sois pas transporté d'allégresse, comme les peuples,
  - type: text
    content: alors que tu t'es prostitué en abandonnant ton Dieu,
  - type: text
    content: alors que tu as aimé un salaire impur
  - type: text
    content: sur toutes les aires à blé !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'dans le désert 2.16+ ; cf. Dt 32.10. –  figues précoces Es 28.4+ ; Mi 7.1n. –  comme les prémices…  : litt. d''un figuier en ses prémices (cf. Gn 1.1n). –  Baal-Péor Nb 25.1-3 ; Dt 3.29n. –  ils se sont voués  : terme apparenté au mot pour nazir Nb 6.2n. –  la Honte , en hébreu Bosheth , terme parfois substitué par mépris au nom du dieu Baal Jr 3.24 ; 11.13. –  horreurs comme…  : cf. Jr 2.5+. –  comme l''objet de leur amour  : litt. comme leur amour.'
  - type: text
    content: J'ai trouvé Israël
  - type: text
    content: comme des raisins dans le désert.
  - type: text
    content: J'ai vu vos pères
  - type: text
    content: comme des figues précoces,
  - type: text
    content: comme les prémices d'un figuier.
  - type: text
    content: Mais ils sont allés vers Baal-Péor,
  - type: text
    content: ils se sont voués à la Honte,
  - type: text
    content: et ils sont devenus des horreurs comme l'objet de leur amour.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Sa gloire  : litt. leur gloire . –  plus de…  : autre traduction dès la naissance, dès la grossesse, dès la conception.'
  - type: text
    content: 'Ephraïm ? Sa gloire s''envolera comme un oiseau :'
  - type: text
    content: plus de naissance,
  - type: text
    content: plus de grossesse,
  - type: text
    content: plus de conception.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'je les leur tuerai  : litt. je les en priverai . –  avant qu''ils ne soient des hommes  : autre traduction et il n''en restera personne  ; cf. Dt 32.25.'
  - type: text
    content: S'ils élèvent leurs fils,
  - type: text
    content: je les leur tuerai avant qu'ils ne soient des hommes.
  - type: text
    content: Vraiment, quel malheur pour eux, quand je m'éloignerai d'eux !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'quand je l''ai vu…  : sens incertain ; autre traduction bien qu''il soit à mes yeux comme Tyr, planté… (cf. Ez 26–28) ; LXX (Ephraïm) a exposé ses enfants comme un gibier.'
  - type: text
    content: Ephraïm, quand je l'ai vu, était comme une palmeraie plantée dans une oasis ;
  - type: text
    content: mais Ephraïm devra faire sortir ses enfants vers le tueur.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jb 3.11s ; Lc 23.29.
  - type: text
    content: 'Donne-leur, '
  - type: text
    content: Seigneur
  - type: text
    content: …
  - type: text
    content: Que leur donneras-tu ?
  - type: text
    content: Donne-leur un ventre qui avorte
  - type: text
    content: et des seins desséchés !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'se montre ou s''est montré , le verbe est sous-entendu en hébreu. –  Guilgal 4.15n  ; cf. 1S 15. –  détestés  : autre terme (plus courant) qu''aux v. 7s ; cf. Dt 21.15n. –  agissements mauvais Dt 28.20n  ; Jr 4.4n. –  je les chasserai  : l''image est probablement celle de la répudiation de l''épouse infidèle. –  ma maison 8.1n. –  les aimer 14.5.'
  - type: text
    content: Tout leur mal se montre au Guilgal ;
  - type: text
    content: c'est là que je les ai détestés.
  - type: text
    content: A cause de leurs agissements mauvais,
  - type: text
    content: je les chasserai de ma maison.
  - type: text
    content: Je ne continuerai pas à les aimer ;
  - type: text
    content: tous leurs princes sont des rebelles.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'plus de fruit  : le mot hébreu fait assonance avec le nom d’ Ephraïm (cf. 8.9n) ; il en va de même d''autres termes apparentés, qui évoquent la fertilité ou la fécondité (13.15n  ; 14.3n,9n  ; cf. Gn 41.52n). –  du ventre maternel  : litt. de leur ventre (maternel).'
  - type: text
    content: Ephraïm est abattu,
  - type: text
    content: sa racine s'est desséchée ;
  - type: text
    content: ils ne porteront plus de fruit ;
  - type: text
    content: et s'ils ont des enfants,
  - type: text
    content: je ferai mourir le fruit chéri du ventre maternel.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Mon Dieu  : LXX Dieu.'
  - type: text
    content: Mon Dieu les rejettera,
  - type: text
    content: parce qu'ils ne l'ont pas écouté ;
  - type: text
    content: ils seront des fuyards parmi les nations.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'vin ou vin nouveau , cf. 2.10n. –  sera décevant  : autres traductions sera trompeur ; manquera  ; la racine hébraïque évoque ailleurs la dissimulation (4.2+) ; cf. 2.11 ; 8.7 ; Dt 28.38ss ; Ha 3.17.'
  - type: text
    content: L'aire et le pressoir ne les repaîtront pas,
  - type: text
    content: et le vin sera décevant.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ephraïm 4.17n. –  en Egypte 8.13+. –  en Assyrie 10.6 ; 11.5. –  aliments impurs Lv 11 ; cf. Ez 4.13 ; Am 7.17 ; voir pur.
  - type: text
    content: 'Ils ne resteront pas dans le pays du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: Ephraïm retournera en Egypte,
  - type: text
    content: et ils mangeront en Assyrie des aliments impurs.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'pain de deuil , évoquant à la fois l''impureté et la tristesse ; Nb 19.14-22 ; Dt 26.14 ; Ez 24.17n. –  gosier  : sur le terme hébreu correspondant, voir Gn 1.20n.'
  - type: text
    content: 'Ils ne répandront pas de libations de vin pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: leurs sacrifices ne lui seront pas doux.
  - type: text
    content: Ce sera pour eux comme un pain de deuil,
  - type: text
    content: tous ceux qui en mangeront se rendront impurs ;
  - type: text
    content: car leur pain ne sera que pour leur gosier,
  - type: text
    content: 'il n''entrera pas dans la maison de '
  - type: text
    content: Dieu
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: '2.13. –  jour de la rencontre festive (cf. 12.10) : allusion à la fête des Huttes (Lv 23.42-43 ; Né 8.14-18 ; voir calendrier et fêtes) ou à la tente de la Rencontre (Ex 33.7 ; Lv 3.8).'
  - type: text
    content: Que ferez-vous au jour de la rencontre festive,
  - type: text
    content: 'au jour de la fête du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 8.2 ; 25.33. –  Moph ou Noph est Memphis, dans le delta du Nil, célèbre pour ses pyramides funéraires et sa nécropole. –  argent précieux 8.4.
  - type: text
    content: Car ils partent à cause du ravage ;
  - type: text
    content: l'Egypte les recueillera,
  - type: text
    content: Moph les ensevelira ;
  - type: text
    content: l'ortie prendra possession de leur argent précieux,
  - type: text
    content: et les ajoncs croîtront dans leurs tentes.
  - type: heading
    content: On s'en prend au prophète
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'jours où ils vont rendre des comptes 1.4+ ; cf. Lc 21.22. –  imbécile ou fou . –  du Souffle ou de l''Esprit (divin) qui anime les prophètes . –  hostilité  : soit la rébellion d''Israël contre Dieu, soit la colère de Dieu contre Israël, ou encore l''attaque de l''ennemi.'
  - type: text
    content: Ils arrivent, les jours où ils vont rendre des comptes,
  - type: text
    content: 'ils arrivent, les jours de la rétribution :'
  - type: text
    content: Israël va l'éprouver !
  - type: text
    content: Le prophète est un imbécile,
  - type: text
    content: l'homme du Souffle délire
  - type: text
    content: à cause de la grandeur de ta faute
  - type: text
    content: et d'une grande hostilité.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction incertaine. –  Guetteur / prophète  : cf. Es 56.10 ; Jr 6.17 ; Ez 3.17 ; 33.2-7 ; d''autres comprennent Ephraïm fait le guet devant mon Dieu, le prophète est un filet…  ; d''autres encore modifient le texte hébreu traditionnel pour lire Ephraïm fait le guet devant la tente du prophète . –  hostilité  : cf. v. 7n  ; sur la persécution des prophètes, cf. Jr 20.1-6 ; 36.26 ; 37.15s ; 38.4-6 ; Am 7.10-17 ; 2Ch 24.20s ; Mt 23.29-36/ /.'
  - type: text
    content: Guetteur d'Ephraïm, le prophète est avec mon Dieu ;
  - type: text
    content: un filet d'oiseleur est sur toutes ses voies,
  - type: text
    content: il y a de l'hostilité dans la maison de son Dieu.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ils sont plongés…  : litt. ils ont approfondi (cf. 5.2n) , ils se sont pervertis . –  Guibéa 10.9 ; Jg 19–21. –  Il (c.-à-d. Dieu) se souvient… 7.2+ ; 8.13. –  il leur fait rendre des comptes ou il intervient contre eux  ; cf. Jr 6.15n. – Voir péché.'
  - type: text
    content: Ils sont plongés dans la perversité,
  - type: text
    content: comme aux jours de Guibéa.
  - type: text
    content: Il se souvient de leurs fautes,
  - type: text
    content: il leur fait rendre des comptes pour leurs péchés.
  - type: heading
    content: Les conséquences d'une vieille idolâtrie
