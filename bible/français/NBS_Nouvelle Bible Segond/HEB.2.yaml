document_id: HEB.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'prêter une attention d''autant plus vive ou nous attacher d''autant plus (même verbe en Ac 8.6). –  à la dérive  : cf. 6.19.'
  - type: text
    content: 'C''est pourquoi nous devons prêter une attention d''autant plus vive à ce que nous avons entendu, de peur d''aller à la dérive. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'pour qui et par qui Rm 11.36+. –  existe  : sous-entendu dans le texte. –  voulait conduire…  : cf. Rm 8.29. –  son accomplissement ou sa perfection, son achèvement , litt. rende parfait ou accomplisse (cf. Lc 13.32) ; LXX utilise le verbe correspondant pour décrire l''institution ou la consécration des prêtres  ; cf. 5.8s,14n  ; 7.11,19,28 ; 9.9 ; 10.14 ; 11.40 ; 12.2,23. –  le pionnier (12.2) : litt. l''initiateur, celui qui est à l''origine (cf. 6.20) ; voir Ac 3.15n.'
  - type: text
    content: 'En effet, puisque celui pour qui et par qui tout existe voulait conduire beaucoup de fils à la gloire, il convenait qu''il porte à son accomplissement, par des souffrances, le pionnier de leur salut. '
  '11':
  - type: note
    content: 'consacre  : autre traduction sanctifie (un terme apparenté est traduit par saint au v. 4, en 3.1 etc.) ; cf. 9.13 ; 13.12 ; Ex 31.13 ; Jn 17.17,19. –  consacrés ou sanctifiés 10.10,14,29 ; cf. 12.14 ; 1Th 4.3. –  issus d''un seul ou, peut-être, d''une même origine  ; l''expression est diversement interprétée (Dieu ? Adam ? Abraham ? cf. 11.12 ; Es 51.2 ; Ez 33.24 ; Ac 17.26 ; Rm 5.12-21 ; 1Co 8.6 ; 15.22,45ss). –  pas honte 11.16. –  frères v. 12,14 ; Mt 28.10 ; Mc 3.34s ; Jn 20.17.'
  - type: text
    content: 'Car celui qui consacre et ceux qui sont consacrés sont tous issus d''un seul. C''est la raison pour laquelle il n''a pas honte de les appeler frères, '
  '12':
  - type: note
    content: 'Ps 22.23. –  J''annoncerai ton nom  : cf. Jn 17.6. –  assemblée  : grec ekklèsia, qui a donné le mot Eglise  ; de même 12.23n.'
  - type: text
    content: 'lorsqu''il dit :'
  - type: text
    content: J'annoncerai ton nom à mes frères,
  - type: text
    content: je te louerai au milieu de l'assemblée
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: Moi, je mettrai… 2S 22.3 ; Es 8.17 ; 12.2 . –  Me voici… Es 8.18.
  - type: text
    content: 'Et encore :'
  - type: text
    content: Moi, je mettrai ma confiance en lui
  - type: text
    content: .
  - type: text
    content: 'Et encore :'
  - type: text
    content: Me voici, moi et les enfants que Dieu m'a donnés
  - type: text
    content: .
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'ces enfants  : litt. les enfants . –  ont en commun  : le verbe correspondant est apparenté au mot habituellement traduit par communion ou solidarité  ; autres termes apparentés en 10.33 ; 13.16. –  a partagé  : cf. 3.1n,14. –  la même condition  : litt. les mêmes (sang et chair) . –  réduire à rien… le diable (voir démon, diable, Satan) : cf. Jn 8.44n  ; Rm 8.3 ; 1Co 15.55 ; 2Tm 1.10 ; 1Jn 3.8 ; Ap 12.10.'
  - type: text
    content: 'Ainsi donc, puisque ces enfants ont en commun le sang et la chair, lui aussi, pareillement, a partagé la même condition, pour réduire à rien, par sa mort, celui qui détenait le pouvoir de la mort, c''est-à-dire le diable, '
  '15':
  - type: note
    content: Cf. Ga 5.1.
  - type: text
    content: 'et délivrer tous ceux qui, par crainte de la mort, étaient retenus dans l''esclavage toute leur vie. '
  '16':
  - type: note
    content: 'à la descendance d''Abraham  : cf. Es 41.8-14 ; Rm 4.13+.'
  - type: text
    content: 'Assurément, en effet, ce n''est pas à des anges qu''il vient en aide, mais c''est à la descendance d''Abraham qu''il vient en aide. '
  '17':
  - type: note
    content: 'semblable Ph 2.7. –  frères v. 11s. –  grand prêtre 3.1 ; 4.14 ; 5.5,10 ; 6.20 ; 7.26 ; 8.1 ; 9.11 ; cf. 10.21 (expression unique dans le N.T., litt. un prêtre grand) ; voir aussi 1S 2.35. –  compatissant 4.15–5.10. –  digne de confiance ou fidèle  ; le mot grec correspondant (qui signifie aussi croyant) peut également être compris ici dans le sens d’accrédité, autorisé, reconnu (de même en 3.2,5). –  dans le service de Dieu  : litt. (pour) ce qui concerne Dieu, de même en 5.1 ; autre traduction représentant Dieu  ; la même expression est utilisée dans LXX pour tenir la place de Dieu en Ex 4.16 ; cf. Rm 15.17n. –  l''expiation des péchés ou la propitiation pour les péchés  ; termes apparentés en 8.12 (faire grâce) ; 9.5 (expiatoire) ; Lv 1.4+ ; Lc 18.13n  ; Rm 3.25n  ; 1Jn 2.2+.'
  - type: text
    content: 'Aussi devait-il devenir en tout semblable à ses frères, afin d''être un grand prêtre compatissant et digne de confiance dans le service de Dieu, pour faire l''expiation des péchés du peuple. '
  '18':
  - type: note
    content: 'mis à l''épreuve  : autre traduction tenté(s)  : cf. 3.8s ; 4.15 ; 11.17 ; Mt 4.1nss/ / ; 26.41/ / ; Lc 22.28.'
  - type: text
    content: Car du fait qu'il a souffert lui-même quand il a été mis à l'épreuve, il peut secourir ceux qui sont mis à l'épreuve.
  '2':
  - type: note
    content: 'si…  : cf. 10.28s ; 12.25. –  prononcée  : le même verbe est traduit par annoncer au v. 3 et souvent par parler (v. 5 ; 1.1s). –  par des anges  : cf. Ac 7.53n  ; Ga 3.19. –  s''est confirmée  : litt. est devenue ferme  ; même terme en 3.14 ; 6.19 ; 9.17 ; mots apparentés au v. 3 et en 6.16 ; 13.9 ; cf. Rm 4.16n. –  rétribution  : le même mot est traduit par récompense en 10.35 ; 11.6,26.'
  - type: text
    content: 'En effet, si la parole prononcée par des anges s''est confirmée, si toute transgression et toute désobéissance ont reçu une juste rétribution, '
  '3':
  - type: note
    content: 'comment échapperons-nous  : cf. Mt 3.7. –  si nous négligeons Mt 22.5. –  qui a commencé… Lc 1.2 ; Ac 10.37s. –  par l''entremise du Seigneur  : Jésus 7.14 ; 13.20. –  confirmé v. 2n  ; cf. 1Co 1.6.'
  - type: text
    content: 'comment échapperons-nous si nous négligeons un si grand salut, qui a commencé à être annoncé par l''entremise du Seigneur et qui nous a été confirmé par ceux qui l''ont entendu, '
  '4':
  - type: note
    content: Mc 16.17-20 ; Ac 5.12 ; Rm 15.19 ; 2Co 12.12. –  miracles Mc 6.2n  ; 1Co 12.10n. –  communications… 1Co 12.4,11. –  Esprit saint 3.7 ; 6.4 ; 9.8 ; 10.15.
  - type: text
    content: Dieu appuyant leur témoignage par des signes, des prodiges, des miracles de toutes sortes et des communications d'Esprit saint selon sa volonté ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'pas à des anges  : cf. Dt 32.8n. –  le monde 1.6n. –  à venir 6.5 ; 13.14 ; Ep 1.21.'
  - type: text
    content: 'Car ce n''est pas à des anges qu''il a soumis le monde à venir dont nous parlons. '
  '6':
  - type: note
    content: 'rendu… ce témoignage  : le verbe correspondant n''apparaît qu''ici dans Hé et évoque peut-être un témoignage particulièrement solennel ; l''auteur emploie plus souvent, dans un sens comparable, un verbe apparenté, en particulier pour faire appel au témoignage de l''Ecriture (7.8,17 ; 10.15 ; 11.2,4s,39). –  Qu''est-ce que l''homme (autre traduction un homme… un fils d''homme) … Ps 8.5-7  ; cf. Gn 1.26. –  que tu t''occupes de lui  : litt. que tu le visites  ; le verbe grec correspond à une famille de termes hébreux qui revient fréquemment dans l''A.T. pour évoquer une intervention divine, soit positive soit négative (châtiment) ; cf. Jr 6.15n.'
  - type: text
    content: 'Mais quelqu''un a rendu quelque part ce témoignage :'
  - type: text
    content: Qu'est-ce que l'homme, pour que tu te souviennes de lui ?
  - type: text
    content: Qu'est-ce que le fils d'homme, pour que tu t'occupes de lui ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'un peu  : autres traductions de peu ; pour un peu de temps (mêmes possibilités au v. 9). –  aux anges  : cf. Ps 8.6n. – Certains mss ajoutent, comme dans le Ps (LXX)  : Tu l''as institué sur les œuvres de tes mains.'
  - type: text
    content: Tu l'as fait un peu inférieur aux anges,
  - type: text
    content: tu l'as couronné de gloire et d'honneur,
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'sous ses pieds  : cf. 1.13n  ; 1Co 15.27 ; Ep 1.22 ; Ph 3.21. –  nous ne voyons pas  : autre verbe au v. 9 ; cf. Rm 8.24s ; 2Co 5.7.'
  - type: text
    content: tu as tout mis sous ses pieds
  - type: text
    content: .
  - type: text
    content: 'En lui soumettant tout, en effet, il n''a rien laissé qui ne lui soit soumis. Maintenant, certes, nous ne voyons pas encore que tout lui soit soumis, '
  '9':
  - type: note
    content: 'un peu  : v. 7n  ; cf. Ph 2.8s. –  gloire / honneur 5.4s ; cf. Jn 17.5. –  par la grâce de Dieu  : certains mss portent une formule différente qui pourrait signifier sans Dieu (même préposition en 4.15, sans péché  ; cf. Mt 27.46) ou éventuellement sauf Dieu, Dieu excepté  ; (comparer le v. 8 et 1Co 15.27, qui emploie un terme différent). –  goûté la mort Mt 16.28+/ /. –  pour tous 2Co 5.14.'
  - type: text
    content: cependant nous voyons celui qui a été fait un peu inférieur aux anges, Jésus, couronné de gloire et d'honneur, à cause de la mort qu'il a soufferte ; ainsi, par la grâce de Dieu, il a goûté la mort pour tous.
