    marker-yv: yv-n
  - type: text
    text: 'Aucun homme de cette génération mauvaise ne verra le bon pays que j''ai juré de donner à vos pères, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Nb 14.24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'excepté Caleb, fils de Yephounné ; il le verra, lui, et je lui donnerai, à lui et à ses fils, le pays où il a marché, parce qu''il a rempli ses obligations envers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.26s ; 4.21 ; 31.2 ; 32.50-52 ; 34.4-6 ; cf. Nb 20.12 ; 27.12-14 ; Ps 106.32.
    marker-yv: yv-n
  - type: text
    text: 'Même contre moi le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' s''est mis en colère à cause de vous ; il a dit : Toi non plus, tu n''y entreras pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui se tient à ton service
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui se tient debout devant toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 3.21,28 ; 10.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 31.3,7s,14s,23 ; 34.9 ; Nb 27.18-23 ; Jos 1.1,5-9 ; 1R 10.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Josué, fils de Noun, qui se tient à ton service, y entrera ; rends-le fort, car c''est lui qui donnera ce pays comme patrimoine à Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nb 14.3,31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vos familles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vos enfants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 34.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: connaissent…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 2.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '– Et vos familles, dont vous avez dit : « Elles seront livrées au pillage ! », et vos fils, qui aujourd''hui ne connaissent pas ce qui est bon ou mauvais, ce sont eux qui y entreront ; c''est à eux que je le donnerai, ce sont eux qui en prendront possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.40 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'repartez '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 7+.
    marker-yv: yv-n
  - type: text
    text: Quant à vous, repartez pour le désert, dans la direction de la mer des Joncs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.41 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: ' contre le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.16.
    marker-yv: yv-n
  - type: text
    text: 'Vous m''avez alors répondu : Nous avons péché contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; nous monterons et nous combattrons, exactement comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', notre Dieu, nous l''a ordonné. Vous avez pris vos armes à la ceinture et vous avez cru qu''il vous serait facile de monter dans la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.42 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parmi vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '31.17 ; cf. 28.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: battus par vos ennemis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: frappés d'un fléau devant vos ennemis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 28.7,25 ; Lv 26.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 14.42'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a dit alors : Dis-leur : « Ne montez pas et ne combattez pas, car je ne suis pas parmi vous ; ainsi vous ne serez pas battus par vos ennemis. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous avez été rebelles…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 26 ; 9.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'arrogance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 17.13 ; 18.20 ; Ex 18.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jr 50.29 ; Né 9.10,16,29.'
    marker-yv: yv-n
  - type: text
    text: 'Je vous ai parlé, mais vous n''avez pas écouté ; vous avez été rebelles aux ordres du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et vous avez eu l''arrogance de monter dans la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 14.39-45
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 21.1-3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abeilles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 118.12.
    marker-yv: yv-n
  - type: text
    text: 'Alors les Amorites, qui habitent dans cette montagne, sont sortis à votre rencontre et vous ont poursuivis comme le font les abeilles ; en Séir, jusqu''à Horma, ils vous ont taillés en pièces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.45 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à vos plaintes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à vous.
    marker-yv: yv-n
  - type: text
    text: 'A votre retour, vous avez pleuré devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; mais le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne vous a pas entendus, il n''a pas prêté l''oreille à vos plaintes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.46 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qadesh '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aussi longtemps…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des jours nombreux comme les jours où vous êtes restés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Nb 14.34.'
    marker-yv: yv-n
  - type: text
    text: C'est ainsi que vous êtes restés à Qadesh aussi longtemps que vous y êtes restés.
