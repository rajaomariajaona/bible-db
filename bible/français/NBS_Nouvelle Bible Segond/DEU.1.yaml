    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 11.35
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 12.16 ; 33.17s.'
    marker-yv: yv-n
  - type: text
    text: 'Telles sont les paroles que Moïse adressa à tout Israël en Transjordanie, dans le désert, dans la plaine aride, en face de Souph, entre Parân, Tophel, Laban, Hatséroth et Di-Zahab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Horeb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre nom du '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sinaï
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Ex 3.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Séir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 33.2 ; Gn 14.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 25.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 32.4 ; 36.21 ; Nb 24.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qadesh-Barnéa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', également appelée '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Qadesh '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 19 ; Gn 14.7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 13.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 32.8 ; 34.4.'
    marker-yv: yv-n
  - type: text
    text: 'Il y a onze journées depuis l''Horeb, par le chemin de la région montagneuse de Séir, jusqu''à Qadesh-Barnéa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Nb 1.54+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avait ordonné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avait ordonné pour eux.
    marker-yv: yv-n
  - type: text
    text: 'Dans la quarantième année, le premier jour du onzième mois, Moïse parla aux Israélites exactement comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' le lui avait ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.24–3.7 ; 4.46-49 ; Nb 21.21-35 ; Jos 2.10 ; 12.2-6 ; 13.15-31 ; Ps 135.11 ; 136.17-22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Edréi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.1,10 ; Nb 21.33
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'C''était après qu''il eut battu Sihôn, roi des Amorites, qui habitait à Heshbôn, et Og, roi du Bashân, qui habitait à Ashtaroth et à Edréi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Transjordanie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au pays de Moab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nb 21.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'expliquer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: exposer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cette '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '27.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Ha 2.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'En Transjordanie, au pays de Moab, Moïse décida d''expliquer cette loi ; il dit :'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu donne à Israël l'ordre du départ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A l''Horeb le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', notre Dieu, nous a dit : Vous êtes restés assez longtemps près de cette montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ex 23.31 ; Jos 1.4 ; 1R 5.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Repartez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tournez-vous et partez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; formules analogues au v. 40 ; 2.1,3,8 ; 3.1 ; 9.15 ; 10.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la montagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la région montagneuse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plaine aride
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ‘arava
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; outre la région désignée au v. 1, le terme peut s''appliquer à toute autre partie de la grande dépression qui s''étend au nord de la mer Morte jusqu''au Liban et qui constitue en particulier la vallée du Jourdain ; cf. Jos 8.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bas-Pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shephéla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', région de collines entre la plaine côtière et la montagne.'
    marker-yv: yv-n
  - type: text
    text: 'Repartez ; entrez dans la montagne des Amorites et chez tous leurs voisins, dans la plaine aride, dans la montagne, dans le Bas-Pays, dans le Néguev, sur la côte de la mer, au pays des Cananéens et au Liban, jusqu''au grand fleuve, l''Euphrate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Regarde '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le passage du pluriel au singulier, et vice-versa, est particulièrement fréquent dans le Deutéronome. Voir l''introduction. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prenez possession '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 21+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pays que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' a juré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: promis par serment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 35 ; 6.10 ; 7.13 ; 8.1 ; 9.5 ; 10.11 ; 11.9 ; 26.3,15 ; 31.7,21,23 ; 34.4 ; Gn 12.7 ; 15.7-19 ; 26.2-5 ; 28.13-15 ; Jos 1.6 ; 5.6 ; 21.43 ; Jr 11.5.
    marker-yv: yv-n
  - type: text
    text: 'Regarde, j''ai mis le pays devant vous ; entrez-y et prenez possession du pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a juré à vos pères, Abraham, Isaac et Jacob, de leur donner, à eux et à leur descendance après eux !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moïse institue des juges
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 16.18-20 ; 17.8-13 ; 25.1-3 ; Ex 18.13-26 ; 23.2-8 ; Nb 11.11-17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: En ce temps-là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à ce moment-là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 2.34 ; 3.4.
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, je vous ai dit : Je ne peux pas vous porter tout seul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aujourd''hui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.4,8,40 ; 5.1 ; 6.6 ; 7.11 ; 8.1,11 ; 10.13 ; 11.13,26-28 ; 13.19 ; 26.16-18 ; 27.4,10 ; 28.1,13 ; 30.2,8,11,15s ; Ex 34.11 ; Jos 22.31 ; cf. Hé 3.7-13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aussi nombreux que les étoiles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.22 ; 28.62 ; Gn 15.5 ; 22.17 ; Hé 11.12.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, vous a multipliés, et vous êtes aujourd''hui aussi nombreux que les étoiles du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Dieu de vos pères '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 21 ; 4.1 ; 6.3 ; 12.1 ; 26.7 ; 27.3 ; 29.24 ; Ex 3.13 ; Jos 18.3 ; Jg 2.12. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu de vos pères, vous augmente mille fois autant et qu''il vous bénisse, comme il vous l''a dit ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
