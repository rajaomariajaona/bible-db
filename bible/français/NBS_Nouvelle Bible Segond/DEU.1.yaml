document_id: DEU.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: PREMIER DISCOURS DE MOÏSE
  - type: text
    content: ' '
  - type: note
    content: 'Telles sont les paroles  : ces mots servent de titre au livre dans la Bible hébraïque. –  tout Israël 5.1 ; 11.6 ; 13.12 ; 21.21 ; 27.9 ; 29.1 ; 31.1,7,11 ; 32.45 ; 34.12. –  en Transjordanie  : litt. de l''autre côté du Jourdain (par rapport à Canaan, c.-à-d. à l''est du Jourdain), cf. v. 5 ; 3.8,20,25 ; 4.41,46ss ; 11.30 ; Nb 22.1n  ; 32.19n  ; Jos 1.14+s. –  la plaine aride ou la Araba (hébreu ‘arava ) ; ici comme en 2.8 le terme semble désigner ce que la géographie moderne appelle la Araba , c.-à-d. la plaine aride entre la mer Morte (parfois appelée mer de la plaine aride ou mer de la Araba , cf. 3.17) et la mer Rouge, mais ce n''est pas toujours le cas (cf. v. 7n) ; cf. Jos 8.14n. –  Souph  : nom traduit par Joncs en Ex 13.18 ; cf. Nb 21.14. –  Parân Gn 21.21n  ; Nb 10.12. –  Tophel et Di-Zahab , qui ne sont mentionnés nulle part ailleurs dans la Bible, rappellent des noms de lieux de la péninsule arabique. –  Laban  : cf. Libna (Nb 33.20). –  Hatséroth Nb 11.35n  ; 12.16 ; 33.17s.'
  - type: text
    content: 'Telles sont les paroles que Moïse adressa à tout Israël en Transjordanie, dans le désert, dans la plaine aride, en face de Souph, entre Parân, Tophel, Laban, Hatséroth et Di-Zahab. '
  '10':
  - type: note
    content: aujourd'hui 4.4,8,40 ; 5.1 ; 6.6 ; 7.11 ; 8.1,11 ; 10.13 ; 11.13,26-28 ; 13.19 ; 26.16-18 ; 27.4,10 ; 28.1,13 ; 30.2,8,11,15s ; Ex 34.11 ; Jos 22.31 ; cf. Hé 3.7-13. –  aussi nombreux que les étoiles 10.22 ; 28.62 ; Gn 15.5 ; 22.17 ; Hé 11.12.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous a multipliés, et vous êtes aujourd''hui aussi nombreux que les étoiles du ciel. '
  '11':
  - type: note
    content: le Dieu de vos pères v. 21 ; 4.1 ; 6.3 ; 12.1 ; 26.7 ; 27.3 ; 29.24 ; Ex 3.13 ; Jos 18.3 ; Jg 2.12. – Voir bénédiction.
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de vos pères, vous augmente mille fois autant et qu''il vous bénisse, comme il vous l''a dit ! '
  '12':
  - type: note
    content: 'litiges  : autre traduction querelles.'
  - type: text
    content: 'Comment pourrais-je porter seul la charge et le fardeau de vos litiges ? '
  '13':
  - type: text
    content: 'Désignez parmi vous des hommes sages, intelligents et connus dans vos tribus, et je les mettrai à votre tête. '
  '14':
  - type: text
    content: 'Vous m''avez répondu en disant : Ce que tu proposes de faire est bon. '
  '15':
  - type: note
    content: 'chefs  : le mot hébreu correspondant est parfois rendu par prince(s). –  secrétaires ou scribes  ; cf. 16.18 ; 20.5,8s ; 29.9 ; 31.28 ; Ex 5.6,10,14s,19 ; Jos 3.2 ; 1Ch 23.4.'
  - type: text
    content: 'J''ai pris alors ceux qui étaient à la tête de vos tribus, des hommes sages et connus ; je les ai mis à votre tête comme chefs de mille, chefs de cent, chefs de cinquante, chefs de dix et secrétaires dans vos tribus. '
  '16':
  - type: note
    content: 'En ce temps-là  : cf. v. 9n. –  Ecoutez…  : cf. 17.4 ; Jn 7.51. – Voir justice. –  un immigré  : litt. son immigré, cf. Ex 12.48n.'
  - type: text
    content: 'En ce temps-là, j''ai donné cet ordre à vos juges : Ecoutez vos frères et jugez selon la justice entre un homme et son frère ou un immigré. '
  '17':
  - type: note
    content: 'Vous ne vous montrerez pas partiaux  : litt. vous ne reconnaîtrez pas les faces (ou les visages) ; cf. 10.17n  ; Lv 19.15 ; Pr 24.23 ; Jc 2.9.'
  - type: text
    content: 'Vous ne vous montrerez pas partiaux dans le jugement ; vous écouterez le petit comme le grand ; vous ne craindrez aucun homme, car c''est à Dieu qu''appartient le jugement ; lorsqu''une affaire sera trop difficile pour vous, vous la présenterez devant moi, pour que je l''entende. '
  '18':
  - type: text
    content: C'est ainsi que je vous ai ordonné, en ce temps-là, tout ce que vous deviez faire.
  - type: heading
    content: Rébellion d'Israël au seuil du pays promis
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.19 ; 29.4 ; Ex 13.17s. –  Amorites Gn 10.16n. –  à Qadesh-Barnéa v. 2 ; Nb 13.26.
  - type: text
    content: 'Nous sommes partis de l''Horeb et nous avons parcouru tout ce grand et redoutable désert que vous avez vu ; nous avons pris le chemin de la montagne des Amorites, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous l''avait ordonné, et nous sommes arrivés à Qadesh-Barnéa. '
  '2':
  - type: note
    content: 'Horeb  : autre nom du Sinaï, Ex 3.1n. –  Séir 33.2 ; Gn 14.6n  ; 25.25n  ; 32.4 ; 36.21 ; Nb 24.18. –  Qadesh-Barnéa, également appelée Qadesh v. 19 ; Gn 14.7n  ; Nb 13.26n  ; 32.8 ; 34.4.'
  - type: text
    content: 'Il y a onze journées depuis l''Horeb, par le chemin de la région montagneuse de Séir, jusqu''à Qadesh-Barnéa. '
  '20':
  - type: text
    content: 'Je vous ai dit : Vous êtes arrivés à la montagne des Amorites, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous donne. '
  '21':
  - type: note
    content: prends-en possession 4.5,14,22 ; 6.1 ; 7.1 ; 9.1,5 ; 11.8,11,29 ; 12.29 ; 23.21 ; 28.21,63 ; 30.16 ; 31.13 ; 32.47 ; Jos 1.11. –  n'aie pas peur 3.2,22 ; 7.18 ; 20.1 ; 31.8 ; Jos 8.1 ; 10.8 ; 11.6 ; 1Ch 22.13 ; 28.20 ; voir crainte.
  - type: text
    content: 'Regarde : le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a mis le pays devant toi ; monte, prends-en possession, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de tes pères, te l''a dit ; n''aie pas peur, ne sois pas terrifié. '
  '22':
  - type: note
    content: Cf. Nb 13.2-16.
  - type: text
    content: 'Vous vous êtes tous présentés devant moi pour me dire : Envoyons des hommes en avant de nous : ils exploreront le pays et ils nous feront un rapport sur le chemin par lequel nous y monterons et sur les villes où nous arriverons. '
  '23':
  - type: text
    content: 'Cette parole m''a plu ; j''ai pris douze hommes parmi vous, un homme par tribu. '
  '24':
  - type: note
    content: oued Eshkol Nb 13.23n.
  - type: text
    content: 'Ils sont repartis, sont montés dans la montagne et sont arrivés jusqu''à l''oued Eshkol, qu''ils ont inspecté. '
  '25':
  - type: note
    content: 'nous l''ont apporté  : litt. l''ont fait descendre vers nous Nb 13.17-25. –  bon pays v. 35 ; 3.25 ; 4.21s ; 6.18 ; 8.7,10 ; 9.6 ; 11.17 ; Nb 14.7 ; cf. Jos 23.13 (autre terme).'
  - type: text
    content: 'Ils ont pris du fruit du pays et nous l''ont apporté ; ils nous ont fait le rapport suivant : C''est un bon pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous donne. '
  '26':
  - type: note
    content: 'aux ordres  : litt. à la bouche.'
  - type: text
    content: 'Mais vous n''avez pas voulu y monter ; vous avez été rebelles aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu. '
  '27':
  - type: note
    content: Vous avez médit… Ps 106.25. –  de nous livrer Gn 9.2n.
  - type: text
    content: 'Vous avez médit dans vos tentes, vous avez dit : C''est parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous déteste qu''il nous a fait sortir d''Egypte, afin de nous livrer aux Amorites et de nous détruire ! '
  '28':
  - type: note
    content: 'ont fait fondre notre cœur  : c.-à-d. nous ont fait perdre courage  ; cf. 20.8n. –  jusqu''au ciel  : litt. dans le ciel. –  des Anaqites  : litt. des fils d''Anaqites  ; 2.10,21 ; 9.2 ; cf. Nb 13.22+,28-33.'
  - type: text
    content: 'Où monterions-nous ? Nos frères ont fait fondre notre cœur, en disant : « C''est un peuple grand, et de plus haute taille que nous ; ce sont des villes grandes et fortifiées jusqu''au ciel ; nous y avons même vu des Anaqites. » '
  '29':
  - type: note
    content: 7.21 ; 20.1-4 ; 31.6 ; Jos 1.9.
  - type: text
    content: 'Je vous ai dit : Ne vous épouvantez pas, n''ayez pas peur d''eux. '
  '3':
  - type: note
    content: 'Cf. Nb 1.54+. –  avait ordonné  : litt. avait ordonné pour eux.'
  - type: text
    content: 'Dans la quarantième année, le premier jour du onzième mois, Moïse parla aux Israélites exactement comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le lui avait ordonné. '
  '30':
  - type: note
    content: combattra… pour vous 3.22 ; 20.4 ; Ex 14.25 ; Jos 10.14,42 ; 23.3,10 ; Za 14.3 ; cf. Jos 6 ; Jg 7.1-22 ; 1S 7.10 ; 17.45-47 ; 2Ch 20.15-25. –  en Egypte 4.34+ ; 29.1s ; Ex 3–12.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, qui marche devant vous, combattra lui-même pour vous, tout comme il l''a fait pour vous sous vos yeux en Egypte, '
  '31':
  - type: note
    content: 'tu (v. 8n) as vu 3.21,24 ; 4.3,9,35 ; 5.24 ; 7.19 ; 10.21 ; 11.2-7 ; voir 29.1-3 ; cf. Ex 14.31. –  son fils  : cf. 14.1+ ; Ex 4.22+ ; Es 63.16 ; 64.7 ; Jr 31.9 ; Os 11.3s ; Ac 13.18.'
  - type: text
    content: 'puis au désert, où tu as vu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a porté comme un homme porte son fils, sur tout le chemin où vous avez marché jusqu''à votre arrivée en ce lieu. '
  '32':
  - type: text
    content: 'Dans cette circonstance, vous n''avez pas mis votre foi dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, '
  '33':
  - type: note
    content: Cf. Ex 13.21n  ; Nb 10.33n.
  - type: text
    content: qui marchait devant vous sur le chemin pour vous chercher un lieu de campement – la nuit dans un feu pour vous montrer le chemin où vous deviez marcher, et le jour dans une nuée.
  '34':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a entendus. Dans sa colère, il a juré : '
  '35':
  - type: note
    content: génération 2.14 ; 32.5,20 ; Nb 14.22s,29s ; Ps 95.11 ; Jn 6.49 ; 1Co 10.1-5 ; Hé 3.8-19. –  bon pays v. 8,25+.
  - type: text
    content: 'Aucun homme de cette génération mauvaise ne verra le bon pays que j''ai juré de donner à vos pères, '
  '36':
  - type: note
    content: Cf. Nb 14.24n.
  - type: text
    content: 'excepté Caleb, fils de Yephounné ; il le verra, lui, et je lui donnerai, à lui et à ses fils, le pays où il a marché, parce qu''il a rempli ses obligations envers le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '37':
  - type: note
    content: 3.26s ; 4.21 ; 31.2 ; 32.50-52 ; 34.4-6 ; cf. Nb 20.12 ; 27.12-14 ; Ps 106.32.
  - type: text
    content: 'Même contre moi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est mis en colère à cause de vous ; il a dit : Toi non plus, tu n''y entreras pas. '
  '38':
  - type: note
    content: 'qui se tient à ton service  : litt. qui se tient debout devant toi  ; cf. 3.21,28 ; 10.8n  ; 31.3,7s,14s,23 ; 34.9 ; Nb 27.18-23 ; Jos 1.1,5-9 ; 1R 10.8n.'
  - type: text
    content: 'Josué, fils de Noun, qui se tient à ton service, y entrera ; rends-le fort, car c''est lui qui donnera ce pays comme patrimoine à Israël. '
  '39':
  - type: note
    content: 'Nb 14.3,31. –  vos familles  : autre traduction vos enfants  ; cf. Gn 34.29n. –  connaissent…  : cf. Gn 2.9n.'
  - type: text
    content: '– Et vos familles, dont vous avez dit : « Elles seront livrées au pillage ! », et vos fils, qui aujourd''hui ne connaissent pas ce qui est bon ou mauvais, ce sont eux qui y entreront ; c''est à eux que je le donnerai, ce sont eux qui en prendront possession. '
  '4':
  - type: note
    content: 2.24–3.7 ; 4.46-49 ; Nb 21.21-35 ; Jos 2.10 ; 12.2-6 ; 13.15-31 ; Ps 135.11 ; 136.17-22. –  Edréi 3.1,10 ; Nb 21.33n.
  - type: text
    content: 'C''était après qu''il eut battu Sihôn, roi des Amorites, qui habitait à Heshbôn, et Og, roi du Bashân, qui habitait à Ashtaroth et à Edréi. '
  '40':
  - type: note
    content: repartez v. 7+.
  - type: text
    content: Quant à vous, repartez pour le désert, dans la direction de la mer des Joncs.
  '41':
  - type: text
    content: ' '
  - type: note
    content: péché contre le Seigneur 9.16.
  - type: text
    content: 'Vous m''avez alors répondu : Nous avons péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; nous monterons et nous combattrons, exactement comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous l''a ordonné. Vous avez pris vos armes à la ceinture et vous avez cru qu''il vous serait facile de monter dans la montagne. '
  '42':
  - type: note
    content: 'parmi vous 31.17 ; cf. 28.7. –  battus par vos ennemis  : autre traduction frappés d''un fléau devant vos ennemis, cf. 28.7,25 ; Lv 26.17n  ; Nb 14.42n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit alors : Dis-leur : « Ne montez pas et ne combattez pas, car je ne suis pas parmi vous ; ainsi vous ne serez pas battus par vos ennemis. » '
  '43':
  - type: note
    content: 'vous avez été rebelles…  : cf. v. 26 ; 9.23. –  arrogance 17.13 ; 18.20 ; Ex 18.11n  ; Jr 50.29 ; Né 9.10,16,29.'
  - type: text
    content: 'Je vous ai parlé, mais vous n''avez pas écouté ; vous avez été rebelles aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et vous avez eu l''arrogance de monter dans la montagne. '
  '44':
  - type: note
    content: Nb 14.39-45n  ; 21.1-3n. –  abeilles Ps 118.12.
  - type: text
    content: 'Alors les Amorites, qui habitent dans cette montagne, sont sortis à votre rencontre et vous ont poursuivis comme le font les abeilles ; en Séir, jusqu''à Horma, ils vous ont taillés en pièces. '
  '45':
  - type: note
    content: 'à vos plaintes  : litt. à vous.'
  - type: text
    content: 'A votre retour, vous avez pleuré devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne vous a pas entendus, il n''a pas prêté l''oreille à vos plaintes. '
  '46':
  - type: note
    content: 'Qadesh v. 2. –  aussi longtemps…  : litt. des jours nombreux comme les jours où vous êtes restés  ; cf. Nb 14.34.'
  - type: text
    content: C'est ainsi que vous êtes restés à Qadesh aussi longtemps que vous y êtes restés.
  '5':
  - type: note
    content: Transjordanie v. 1n. –  au pays de Moab Nb 21.26. –  expliquer (autre traduction exposer) cette loi 27.8n  ; cf. Ha 2.2n.
  - type: text
    content: 'En Transjordanie, au pays de Moab, Moïse décida d''expliquer cette loi ; il dit :'
  - type: heading
    content: Dieu donne à Israël l'ordre du départ
  '6':
  - type: text
    content: 'A l''Horeb le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous a dit : Vous êtes restés assez longtemps près de cette montagne. '
  '7':
  - type: note
    content: 'Cf. Ex 23.31 ; Jos 1.4 ; 1R 5.1. –  Repartez  : litt. tournez-vous et partez  ; formules analogues au v. 40 ; 2.1,3,8 ; 3.1 ; 9.15 ; 10.5. –  la montagne  : autre traduction la région montagneuse, de même au v. 19. –  plaine aride  : hébreu ‘arava  ; outre la région désignée au v. 1, le terme peut s''appliquer à toute autre partie de la grande dépression qui s''étend au nord de la mer Morte jusqu''au Liban et qui constitue en particulier la vallée du Jourdain ; cf. Jos 8.14n. –  Bas-Pays  : hébreu Shephéla, région de collines entre la plaine côtière et la montagne.'
  - type: text
    content: 'Repartez ; entrez dans la montagne des Amorites et chez tous leurs voisins, dans la plaine aride, dans la montagne, dans le Bas-Pays, dans le Néguev, sur la côte de la mer, au pays des Cananéens et au Liban, jusqu''au grand fleuve, l''Euphrate. '
  '8':
  - type: note
    content: 'Regarde / vous  : le passage du pluriel au singulier, et vice-versa, est particulièrement fréquent dans le Deutéronome. Voir l''introduction. –  prenez possession v. 21+. –  pays que le Seigneur a juré (ou promis par serment) … v. 35 ; 6.10 ; 7.13 ; 8.1 ; 9.5 ; 10.11 ; 11.9 ; 26.3,15 ; 31.7,21,23 ; 34.4 ; Gn 12.7 ; 15.7-19 ; 26.2-5 ; 28.13-15 ; Jos 1.6 ; 5.6 ; 21.43 ; Jr 11.5.'
  - type: text
    content: 'Regarde, j''ai mis le pays devant vous ; entrez-y et prenez possession du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a juré à vos pères, Abraham, Isaac et Jacob, de leur donner, à eux et à leur descendance après eux !'
  - type: heading
    content: Moïse institue des juges
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 16.18-20 ; 17.8-13 ; 25.1-3 ; Ex 18.13-26 ; 23.2-8 ; Nb 11.11-17. –  En ce temps-là  : autre traduction à ce moment-là  ; cf. 2.34 ; 3.4.'
  - type: text
    content: 'En ce temps-là, je vous ai dit : Je ne peux pas vous porter tout seul. '
