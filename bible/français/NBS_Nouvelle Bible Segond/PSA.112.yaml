document_id: PSA.112,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le bonheur tranquille des gens droits
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 111.1n. –  Heureux 1.1+ ; 15.4+ ; 115.13 ; 128.1 ; cf. Siracide 34.14ss : « Ceux qui craignent le Seigneur auront une longue vie, car leur espérance repose sur celui qui peut les sauver. Celui qui craint le Seigneur n''a rien à redouter, jamais il ne s''effraie, car c''est lui son espoir. Heureuse l''âme de celui qui craint le Seigneur ! » –  plaisir 1.2 ; 111.2 ; cf. 119.24,77,92,143,174. –  commandements  : voir loi.'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: 'Heureux l''homme qui craint le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui trouve un grand plaisir dans ses commandements !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'grince des dents 35.16 ; 37.12 ; Mt 8.12 ; Ac 7.54. –  se consume  : litt. fond  ; cf. 68.3. –  Le désir des méchants…  : cf. 1.6 ; 9.19 ; Jb 8.13 ; Pr 10.28 ; 11.7.'
  - type: text
    content: Le méchant le voit, il est contrarié ;
  - type: text
    content: il grince des dents et se consume.
  - type: text
    content: Le désir des méchants disparaîtra.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Sa descendance sera vaillante  : certains modifient le texte hébreu traditionnel pour lire sera maître dans le pays (ou sur la terre , cf. Gn 10.8n) ; voir aussi 25.13 ; 37.11,26 ; 102.29 ; Pr 11.21 ; 20.7 ; Mt 5.5. –  la génération des gens droits  : soit la postérité des gens droits , ou simplement les gens droits (14.5n  ; 24.6n  ; 73.15n) ; cf. v. 4 ; 111.1. – Voir bénédiction.'
  - type: text
    content: Sa descendance sera vaillante dans le pays,
  - type: text
    content: la génération des gens droits sera bénie.
  '3':
  - type: text
    content: ' '
  - type: note
    content: des biens et des richesses 111.5 ; 1R 3.13 ; Pr 3.10,16 ; 8.18 ; 13.18 ; 22.4. –  sa justice… v. 9 ; 111.3+.
  - type: text
    content: Il a dans sa maison des biens et des richesses,
  - type: text
    content: et sa justice subsiste à jamais.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'La lumière 97.11 ; cf. 27.1 ; 36.10 ; Es 9.1 ; 10.17 ; 58.10 ; Jb 22.28 ; 29.3 ; voir aussi Jn 1.5 ; 2Co 4.6. –  pour celui…  : traduction incertaine ; les termes qui suivent semblent ici définir les gens droits (v. 2) ; certains les rapportent cependant à Dieu (cf. 111.4). –  clément  : le verbe apparenté est traduit par faire grâce au v. 5.'
  - type: text
    content: La lumière se lève dans les ténèbres pour les gens droits,
  - type: text
    content: pour celui qui est clément, compatissant et juste.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Il est bon Es 3.10 ; Lm 3.26s. –  grâce / prête  : cf. v. 9+ ; 37.26 ; Lv 25.35ss ; Dt 15.7ss ; Pr 14.21 ; 19.17 ; Lc 6.35.'
  - type: text
    content: Il est bon qu'un homme fasse grâce et qu'il prête,
  - type: text
    content: qu'il règle ses affaires équitablement !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'il ne vacillera jamais 15.5 ; cf. 55.23. –  le souvenir  : autre traduction le nom (6.6n  ; 111.4+) : cf. Pr 10.7.'
  - type: text
    content: Car il ne vacillera jamais ;
  - type: text
    content: le souvenir du juste dure toujours.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Il ne craint pas…  : cf. v. 8 ; 23.4 ; 27.3 ; Jr 49.23 ; Pr 28.1. –  son cœur est ferme 27.14 ; 57.8 ; 108.2 ; 130.5 ; cf. Hé 13.9. –  confiance 4.6+ ; 13.6 ; 28.7.'
  - type: text
    content: Il ne craint pas de mauvaise nouvelle ;
  - type: text
    content: 'son cœur est ferme, sa confiance est dans le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'inébranlable 111.8. –  ses adversaires…  : litt. jusqu''à ce qu''il voie (dans) ses adversaires  ; cf. 54.9n  ; 118.7.'
  - type: text
    content: 'Son cœur est inébranlable, il n''a pas de crainte :'
  - type: text
    content: ses adversaires lui seront offerts en spectacle.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'V. 5+ ; 37.21 ; Pr 11.24 ; 21.26 ; 28.27 ; 2Co 9.9. –  sa justice… v. 3+. –  sa corne…  : cf. 75.5n,11n  ; 92.11n  ; 132.17n.'
  - type: text
    content: Il fait des largesses, il donne aux pauvres ;
  - type: text
    content: sa justice subsiste à jamais ;
  - type: text
    content: sa corne s'élève, glorieuse.
