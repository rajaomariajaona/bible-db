document_id: HEB.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les yeux fixés sur Jésus
  - type: text
    content: ' '
  - type: note
    content: 'témoins  : c''est du terme grec correspondant que vient le mot martyr(s) 11.2-40 ; cf. 1Tm 6.12. –  rejetons Col 3.8+. – Voir péché . –  enlace  : autres traductions enveloppe ; entrave . –  persévérance 10.36n. –  l''épreuve  : le terme peut aussi être entendu dans son sens sportif ; le même mot grec est traduit ailleurs par combat (2Tm 4.7) ; cf. Hé 10.32 (autre terme) ; 1Co 9.24-27 ; Ph 3.12 ; 2Tm 2.5 ; 4 Maccabées 16.16 (paroles d''encouragement de la mère à ses fils martyrs [11.35n]) : « Mes fils, digne est le combat (= épreuve ) auquel vous avez été appelés en témoignage pour la nation ; combattez avec ardeur pour les lois de votre patrie. » 17.10-15 (commentaire sur les mêmes événements) : « Ceux-là ont aussi vengé leur nation en tournant leurs regards vers (même verbe en Hé 12.2) Dieu et en persévérant dans les souffrances jusqu''à la mort. Car c''est vraiment un combat divin qui s''est livré en eux. Alors, en effet, la vertu présidait au combat, sanctionnant par l''incorruptibilité et la vie éternelle la victoire de la persévérance… Le monde et les hommes vivants étaient les spectateurs ; et la piété a remporté la victoire et couronné ses propres athlètes. »'
  - type: text
    content: 'Nous donc aussi, puisque nous sommes entourés d''une si grande nuée de témoins, rejetons tout fardeau et le péché qui nous enlace si facilement, et courons avec persévérance l''épreuve qui nous est proposée, '
  '10':
  - type: note
    content: 'Cf. 2Co 4.17+. –  Celui-là…  : litt. Ceux-là… –  peu de temps  : litt. peu de jours. –  pour notre véritable intérêt…  : litt. pour ce qui est utile, cf. 1Co 12.7n. –  que nous ayons part  : même verbe 6.7. –  sainteté  : un terme apparenté est traduit par consécration au v. 14.'
  - type: text
    content: 'Celui-là, en effet, nous corrigeait pour peu de temps, comme il lui semblait bon ; celui-ci nous corrige pour notre véritable intérêt, afin que nous ayons part à sa sainteté. '
  '11':
  - type: note
    content: 'formés ou exercés  : cf. 5.14n. –  un fruit de paix, la justice  : autre traduction un fruit de paix et de justice, litt. un paisible fruit de justice  ; cf. Ph 1.11+ ; Jc 3.18.'
  - type: text
    content: Toute correction, il est vrai, ne semble pas être au premier abord un sujet de joie, mais un sujet de tristesse ; plus tard, toutefois, elle procure à ceux qu'elle a formés un fruit de paix, la justice.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Es 35.3 ; Jb 4.3s. –  qui flageolent  : autre traduction paralysés.'
  - type: text
    content: 'Redressez donc les mains qui retombent et les genoux qui flageolent. '
  '13':
  - type: note
    content: 'Pr 4.26 (LXX). –  boiteux  : autre traduction infirme  ; cf. Mt 11.5+. –  ne se torde pas davantage  : autres traductions ne se disloque pas ; ne dévie pas.'
  - type: text
    content: Préparez pour vos pieds des pistes droites, afin que ce qui est boiteux ne se torde pas davantage, mais plutôt guérisse.
  - type: heading
    content: Des premiers-nés inscrits dans les cieux
  '14':
  - type: text
    content: ' '
  - type: note
    content: Poursuivez (ou recherchez ) la paix Ps 34.15 ; Rm 12.18 ; 14.19 ; 2Tm 2.22 ; 1P 3.11 ; voir aussi Mt 5.9 ; Mc 9.50 ; 2Co 13.11 ; 1Th 5.13. –  consécration ou sanctification (voir saint), v. 10n  ; cf. 2.11n  ; 1Th 4.3. –  verra le Seigneur Mt 5.8 ; 1Jn 3.2s.
  - type: text
    content: 'Poursuivez la paix avec tous, ainsi que la consécration sans laquelle personne ne verra le Seigneur. '
  '15':
  - type: note
    content: 'Veillez  : c''est du verbe grec correspondant que vient le nom habituellement transcrit épiscope ou évêque, cf. Ac 20.28n  ; 1Tm 3.1n. –  ne se prive  : voir 4.1n. –  qu''aucune racine…  : cf. 6.4-8 ; 10.26-31 ; voir Dt 29.17n  ; Ac 8.23. –  qu''une multitude (ou, selon certains mss, la multitude) n''en soit souillée ou infectée  ; même verbe Jn 18.28 ; Tt 1.15 ; Jd 8 ; voir aussi pur, impur.'
  - type: text
    content: 'Veillez à ce que personne ne se prive de la grâce de Dieu ; '
  - type: text
    content: à ce qu'aucune racine d'amertume, en produisant des rejetons, ne cause des perturbations,
  - type: text
    content: ' et qu''une multitude n''en soit souillée. '
  '16':
  - type: note
    content: Gn 25.33s. –  inconduite sexuelle 13.4 ; Mt 5.32n  ; 1Co 5.9n.
  - type: text
    content: 'Veillez à ce que personne ne se livre à l''inconduite sexuelle ou n''agisse en profanateur, comme Esaü, qui pour un seul plat vendit son droit d''aînesse. '
  '17':
  - type: note
    content: 'Gn 27.30-40. –  hériter la bénédiction  : cf. 1P 3.9. –  rejeté  : un terme apparenté est traduit par sans valeur en 6.8 ; même terme Mc 8.31 ; 12.10/ /. –  il ne trouva…  : litt. il ne trouva pas de lieu de changement  ; le terme correspondant à ce dernier mot est traduit par changement radical en 6.1,6 (traductions traditionnelles conversion, repentance) ; cf. Sagesse 12.10 : « En exerçant progressivement ta justice, tu offrais une occasion de repentir » (même formule en grec) ; d''autres ici comprennent il ne réussit pas à faire changer d''avis à son père. –  l''ait recherché ou recherchée  ; en grec le verbe peut avoir pour complément le changement (ou la repentance, la conversion) ou, moins vraisemblablement, la bénédiction.'
  - type: text
    content: Vous savez que, plus tard, quand il voulut hériter la bénédiction, il fut rejeté ; en effet, il ne trouva aucune possibilité de changement, bien qu'il l'ait recherché dans les larmes.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 19 ; Dt 4.11 ; 5.22s. –  de choses palpables  : autre traduction d''un feu ardent palpable, ni d''obscurité…  ; certains mss portent un texte légèrement différent qu''on pourrait traduire  : d''une montagne palpable et embrasée, ni d''obscurité…  ; cf. v. 22.'
  - type: text
    content: 'Vous ne vous êtes pas approchés, en effet, de choses palpables : ni d''un feu ardent, ni d''une obscurité, ni de ténèbres, ni d''une tempête, '
  '19':
  - type: note
    content: Cf. v. 25ss ; Ex 19.16-19 ; 20.18s ; Dt 4.12.
  - type: text
    content: 'ni d''un son de trompette, ni d''une clameur de paroles telle que ceux qui l''entendirent demandèrent qu''on ne leur adresse pas un mot de plus. '
  '2':
  - type: note
    content: 'les yeux fixés sur  : litt. tournant les regards vers, cf. v. 1n. –  pionnier ou initiateur  : voir 2.10n. –  Au lieu de  : autre traduction en vue de  ; cf. Mt 25.21. –  qui lui était proposée  : même expression qu''au v. 1. –  enduré  : le verbe grec est apparenté au terme traduit par persévérance au v. 1 ; de même v. 3,7 ; cf. 10.32n,36 ; Ph 2.6-11. –  il s''est assis à la droite 1.3+.'
  - type: text
    content: les yeux fixés sur Jésus, qui est le pionnier de la foi et qui la porte à son accomplissement. Au lieu de la joie qui lui était proposée, il a enduré la croix, méprisant la honte, et il s'est assis à la droite du trône de Dieu.
  '20':
  - type: note
    content: Ex 19.12s.
  - type: text
    content: 'Car ils ne supportaient pas cette injonction : « Qui touche la montagne – même une bête – sera lapidé. » '
  '21':
  - type: note
    content: 'Dt 9.19. –  terrifiant  : voir crainte.'
  - type: text
    content: 'Le spectacle était si terrifiant que Moïse dit : «  '
  - type: text
    content: Je suis épouvanté
  - type: text
    content: ' et tout tremblant. » '
  '22':
  - type: note
    content: 'vous vous êtes approchés 4.16+ ; cf. Ep 2.6. –  Sion Ps 74.2 ; Ap 14.1+. –  la cité 11.10+. –  Jérusalem céleste Ga 4.26+ ; cf. Ph 3.20. –  dizaines de milliers d''anges Ap 5.11+. –  de la réunion  : on pourrait aussi rattacher l''expression correspondante à ce qui précède et traduire de dizaines de milliers d''anges en réunion de fête.'
  - type: text
    content: 'Mais vous vous êtes approchés de la montagne de Sion et de la cité du Dieu vivant, la Jérusalem céleste ; de dizaines de milliers d''anges ; de la réunion '
  '23':
  - type: note
    content: 'l''assemblée ou l''Eglise  : cf. 2.12n. –  premiers-nés  : cf. 1.6 ; 11.28 ; Nb 3.12s ; Jc 1.18. –  inscrits dans les cieux Lc 10.20+. –  juge de tous 2Tm 4.8 ; Jc 4.12 ; 5.9. –  esprits…  : cf. v. 9+ ; 1 Hénoch 22.5-9 range parmi les esprits des justes celui d''Abel, dont la voix accuse jusqu''à la fin des temps (cf. v. 24). –  accomplissement 2.10n  ; 11.40.'
  - type: text
    content: 'et de l''assemblée des premiers-nés inscrits dans les cieux ; de Dieu, juge de tous ; des esprits des justes portés à leur accomplissement ; '
  '24':
  - type: note
    content: 'alliance neuve  : cf. 8.8s ; 9.15 ; voir aussi 7.22+. –  sang de l''aspersion  : cf. 9.13,19s ; 10.29 ; 1P 1.2. –  mieux que (ou d''une façon supérieure à, cf. 1.4n) celui d''Abel  : voir v. 23n  ; 11.4+.'
  - type: text
    content: de Jésus, le médiateur d'une alliance neuve ; et du sang de l'aspersion qui parle mieux que celui d'Abel.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'V. 19. –  repousser  : dans le texte grec, le même verbe entre dans la composition de l''expression traduite au v. 19 par demander qu''on ne leur adresse pas une parole de plus . –  si ceux-là n''ont pas échappé 2.2s. –  les avertissait  : autre traduction leur communiquait l''avertissement divin 8.5+.'
  - type: text
    content: 'Prenez garde de ne pas repousser celui qui parle. En effet, si ceux-là n''ont pas échappé qui ont repoussé celui qui les avertissait sur la terre, à bien plus forte raison n''échapperons-nous pas si nous nous détournons de celui qui nous avertit depuis les cieux. '
  '26':
  - type: note
    content: Sa voix ébranla… Jg 5.4s ; Ps 68.9 ; 77.19 ; 114.7. –  Une fois encore… Ag 2.6,21  ; cf. Mt 24.29/ /.
  - type: text
    content: 'Sa voix ébranla alors la terre, et maintenant il a fait cette promesse :'
  - type: text
    content: Une fois encore, je ferai moi-même trembler
  - type: text
    content: ' non seulement '
  - type: text
    content: la terre,
  - type: text
    content: ' mais aussi '
  - type: text
    content: le ciel
  - type: text
    content: .
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'que doit être mis à l''écart  : litt. la mise à l''écart (ou le changement, le transport, le déplacement ) ; même terme en 7.12 ; 11.5n. –  ayant été fait  : cf. 9.11 ; voir aussi Es 66.22 ; Ps 96.9-11.'
  - type: text
    content: 'Ce «  '
  - type: text
    content: une fois encore
  - type: text
    content: '  » montre bien que doit être mis à l''écart ce qui, ayant été fait, peut être ébranlé, pour que demeure ce qui ne peut être ébranlé. '
  '28':
  - type: note
    content: 'un royaume inébranlable  : cf. 1.8 ; Dn 7.14,18. –  montrons notre gratitude ou rendons grâce  ; autre traduction, moins probable  : tenons ferme la grâce (cf. 13.9) par laquelle nous rendrons à Dieu un culte qui sera agréé de lui 8.5n  ; cf. 11.5s ; 13.16,21.'
  - type: text
    content: 'Aussi, puisque nous recevons un royaume inébranlable, montrons notre gratitude en rendant à Dieu un culte qui soit agréé de lui, avec piété et avec crainte. '
  '29':
  - type: note
    content: 10.31 ; Ex 24.17 ; Dt 4.24 ; 9.3  ; cf. Es 33.14.
  - type: text
    content: 'Car notre '
  - type: text
    content: Dieu est
  - type: text
    content: ' aussi '
  - type: text
    content: un feu dévorant
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'opposition  : litt. contradiction  ; cf. Lc 2.34 ; le texte grec le plus probable précise une telle opposition contre lui-même  ; certains mss portent contre eux-mêmes (c.-à-d. une opposition contraire à leur intérêt) ; cf. Nb 17.3n. –  que vous ne vous lassiez pas Ga 6.9 ; cf. Dt 20.3. –  par découragement  : autre traduction l''âme découragée (cf. 10.38ns).'
  - type: text
    content: Considérez en effet celui qui a enduré une telle opposition de la part des pécheurs, pour que vous ne vous lassiez pas, par découragement.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.32-36. – Voir sang.
  - type: text
    content: 'Vous n''avez pas encore résisté jusqu''au sang dans votre combat contre le péché, '
  '5':
  - type: note
    content: '5.8 ; Pr 3.11s  ; cf. 1Co 11.32. –  l''encouragement ou l''exhortation  ; cf. 3.13+. –  qui vous est adressé…  : autre traduction où l''on vous parle comme à des fils  ; cf. Ac 17.2n. –  ne prends pas à la légère  : autre traduction ne cherche pas à amoindrir (ou à alléger). –  correction ou éducation, de même dans la suite.'
  - type: text
    content: 'et vous avez oublié l''encouragement qui vous est adressé comme à des fils :'
  - type: text
    content: Mon fils, ne prends pas à la légère la correction du Seigneur,
  - type: text
    content: et ne te décourage pas lorsqu'il te reprend
  - type: text
    content: .
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'il donne…  : autre traduction il fait donner des coups de fouet ; il châtie . –  qu''il agrée  : autres traductions qu''il accueille, qu''il reconnaît comme tel  ; cf. Ap 3.19.'
  - type: text
    content: Car le Seigneur corrige celui qu'il aime,
  - type: text
    content: il donne des coups de fouet à tout fils qu'il agrée
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'correction  : autre traduction éducation  ; cf. Lm 3.28-30 ; Psaumes de Salomon 10.2 : « Le Seigneur est bon pour qui supporte la correction. »'
  - type: text
    content: 'C''est pour votre correction que vous endurez ; Dieu vous traite comme des fils. Quel est en effet le fils que le père ne corrige pas ? '
  '8':
  - type: note
    content: Cf. Dt 8.5 ; 2S 7.14. –  ont part 3.1n.
  - type: text
    content: 'Si vous êtes exempts de la correction à laquelle tous ont part, c''est que vous n''êtes pas des fils, mais des bâtards. '
  '9':
  - type: note
    content: 'nous avons tous eu…  : litt. nous avions nos pères de la chair ou les pères de notre chair 5.7+. –  Père des esprits  : cf. v. 23 ; 1.14 ; Nb 16.22 ; 27.16 ; Ap 22.6.'
  - type: text
    content: 'Puisque nous avons tous eu un père de notre chair qui nous corrigeait et que nous respections, ne devons-nous pas à plus forte raison nous soumettre au Père des esprits, pour que nous vivions ? '
