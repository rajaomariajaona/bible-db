      marker-yv: yv-n
    - type: text
      text: 'L''Esprit et la mariée disent : Viens ! Que celui qui entend dise : Viens ! Que celui qui a soif vienne ; que celui qui veut prenne de l''eau de la vie, gratuitement !'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Dt 4.2 ; 13.1 ; Pr 30.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fléaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.18+ ; 15.1+ ; cf. Dt 29.19.
      marker-yv: yv-n
    - type: text
      text: 'Moi, je l''atteste à quiconque entend les paroles de la prophétie de ce livre : si quelqu''un y ajoute quelque chose, Dieu lui ajoutera les fléaux décrits dans ce livre ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 15.
      marker-yv: yv-n
    - type: text
      text: et si quelqu'un retranche des paroles du livre de cette prophétie, Dieu retranchera sa part de l'arbre de la vie et de la ville sainte décrits dans ce livre.
  '2':
  - type: usfm
