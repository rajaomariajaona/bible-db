  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le paradis
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
