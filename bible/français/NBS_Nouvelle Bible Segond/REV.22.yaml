          text: '  : cf. Dt 23.19 ; Ph 3.2.'
      marker-yv: yv-n
    - type: text
      text: Dehors les chiens, les sorciers, les prostitués, les meurtriers, les idolâtres et quiconque aime et fait le mensonge !
