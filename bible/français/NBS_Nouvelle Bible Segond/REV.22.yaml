        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fleuve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 2.10 ; Ez 47.1-12 ; Za 14.8 ; Ps 46.5 ; Jn 7.38 ; cf. Dn 7.10 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hénoch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.19 : « Aux pieds du trône coulaient des fleuves de feu flamboyant, et je ne pouvais en soutenir la vue. »'
      marker-yv: yv-n
    - type: text
      text: 'Il me montra un fleuve d''eau de la vie, limpide comme du cristal, sortant du trône de Dieu et de l''agneau. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne tiens pas secrètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
