          children:
          - type: text
            text: Salomon
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.3 : « Le paradis du Seigneur, les arbres de vie, ce sont ses saints. » (cf. Es 61.3). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: produisant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faisant douze fruits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'guérison des nations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (2.26
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : cf. Jr 3.17 ; Jl 1.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ml 3.20 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Au milieu de la grande rue de la ville et sur les deux bords du fleuve, un arbre de vie produisant douze récoltes et donnant son fruit chaque mois. Les feuilles de l''arbre sont pour la guérison des nations. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
