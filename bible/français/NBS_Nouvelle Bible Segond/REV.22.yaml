      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le temps est proche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.3.
      marker-yv: yv-n
    - type: text
      text: 'Puis il me dit : Ne tiens pas secrètes les paroles de la prophétie de ce livre, car le temps est proche. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ez 3.27 ; Dn 12.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'injuste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'consacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sanctifié
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; terme apparenté à celui qui est traduit par '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Que celui qui est injuste soit encore injuste, que celui qui est sale se salisse encore, que le juste fasse encore la justice, et que celui qui est saint soit encore consacré !
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je viens bientôt '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma récompense
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ma rétribution ; mon salaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(11.18+) ; cf. Es 40.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à chacun selon son œuvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.23+ ; Mt 16.27.'
      marker-yv: yv-n
    - type: text
      text: 'Je viens bientôt, et j''apporte avec moi ma récompense, pour rendre à chacun selon son œuvre. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.8+,17+ ; 21.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: L'alpha et l'oméga, le premier et le dernier, le commencement et la fin, c'est moi.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
