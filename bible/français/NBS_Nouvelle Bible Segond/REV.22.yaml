document_id: REV.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le paradis
  - type: text
    content: ' '
  - type: note
    content: 'fleuve Gn 2.10 ; Ez 47.1-12 ; Za 14.8 ; Ps 46.5 ; Jn 7.38 ; cf. Dn 7.10 ; 1 Hénoch 14.19 : « Aux pieds du trône coulaient des fleuves de feu flamboyant, et je ne pouvais en soutenir la vue. »'
  - type: text
    content: 'Il me montra un fleuve d''eau de la vie, limpide comme du cristal, sortant du trône de Dieu et de l''agneau. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ne tiens pas secrètes  : litt. ne scelle pas , cf. 10.4n. –  le temps est proche 1.3.'
  - type: text
    content: 'Puis il me dit : Ne tiens pas secrètes les paroles de la prophétie de ce livre, car le temps est proche. '
  '11':
  - type: note
    content: Cf. Ez 3.27 ; Dn 12.10. –  injuste 2.11n (voir justice). –  consacré ou sanctifié  ; terme apparenté à celui qui est traduit par saint.
  - type: text
    content: Que celui qui est injuste soit encore injuste, que celui qui est sale se salisse encore, que le juste fasse encore la justice, et que celui qui est saint soit encore consacré !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Je viens bientôt 3.11+. –  ma récompense  : autres traductions ma rétribution ; mon salaire (11.18+) ; cf. Es 40.10. –  à chacun selon son œuvre  : cf. 2.23+ ; Mt 16.27.'
  - type: text
    content: 'Je viens bientôt, et j''apporte avec moi ma récompense, pour rendre à chacun selon son œuvre. '
  '13':
  - type: note
    content: 1.8+,17+ ; 21.6n.
  - type: text
    content: L'alpha et l'oméga, le premier et le dernier, le commencement et la fin, c'est moi.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Heureux… 1.3+. –  lavent leurs robes 7.14+. –  avoir droit à ou, selon la traduction habituelle du terme correspondant dans l'Apocalypse, avoir pouvoir sur (cf. 2.26n  ; Jn 1.12n  ; 10.17s ; 1Co 8.9n). –  l'arbre de la vie v. 2 ; 2.7+ ; cf. Gn 3.22. –  entrer par les portes 21.12-14,25 ; cf. Ps 118.19s.
  - type: text
    content: 'Heureux ceux qui lavent leurs robes pour avoir droit à l''arbre de la vie et pour entrer par les portes dans la ville ! '
  '15':
  - type: note
    content: '21.8+ ; cf. 22.19. –  chiens  : cf. Dt 23.19 ; Ph 3.2.'
  - type: text
    content: Dehors les chiens, les sorciers, les prostitués, les meurtriers, les idolâtres et quiconque aime et fait le mensonge !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai envoyé mon ange 1.1 ; cf. Ml 3.1n. –  au sujet des Eglises  : certains comprennent dans les Eglises 1.4. –  le rejeton et la postérité (ou la lignée ) de David 5.5n  ; cf. Rm 1.3. –  l''étoile… 2.28+.'
  - type: text
    content: Moi, Jésus, j'ai envoyé mon ange pour vous apporter ce témoignage au sujet des Eglises. C'est moi qui suis le rejeton et la postérité de David, l'étoile resplendissante du matin.
  '17':
  - type: text
    content: ' '
  - type: note
    content: L'Esprit / celui qui entend 2.7+. –  la mariée 19.7+. –  celui qui a soif 7.17+ ; 21.6.
  - type: text
    content: 'L''Esprit et la mariée disent : Viens ! Que celui qui entend dise : Viens ! Que celui qui a soif vienne ; que celui qui veut prenne de l''eau de la vie, gratuitement !'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 4.2 ; 13.1 ; Pr 30.6. –  fléaux 9.18+ ; 15.1+ ; cf. Dt 29.19.
  - type: text
    content: 'Moi, je l''atteste à quiconque entend les paroles de la prophétie de ce livre : si quelqu''un y ajoute quelque chose, Dieu lui ajoutera les fléaux décrits dans ce livre ; '
  '19':
  - type: note
    content: Cf. v. 15.
  - type: text
    content: et si quelqu'un retranche des paroles du livre de cette prophétie, Dieu retranchera sa part de l'arbre de la vie et de la ville sainte décrits dans ce livre.
  '2':
  - type: note
    content: 'Autre traduction possible  : au milieu de la grande rue (21.21) et du fleuve, (qui coule) de part et d''autre, il y a… –  un arbre  : le mot signifie également bois  ; il peut aussi désigner, collectivement, des arbres  ; cf. v. 14,19 ; 2.7+ ; Gn 2.9 ; Ez 47.12 ; voir aussi Psaumes de Salomon 14.3 : « Le paradis du Seigneur, les arbres de vie, ce sont ses saints. » (cf. Es 61.3). –  produisant…  : litt. faisant douze fruits. –  guérison des nations (2.26n) : cf. Jr 3.17 ; Jl 1.14n  ; Ml 3.20 ; voir non-Juifs.'
  - type: text
    content: 'Au milieu de la grande rue de la ville et sur les deux bords du fleuve, un arbre de vie produisant douze récoltes et donnant son fruit chaque mois. Les feuilles de l''arbre sont pour la guérison des nations. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 3.11+ ; cf. 1Co 11.26 ; 16.22n.
  - type: text
    content: 'Celui qui atteste ces choses dit : Oui, je viens bientôt. '
  - type: text
    content: Amen !
  - type: text
    content: ' Viens, Seigneur Jésus !'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 2Th 3.18+.
  - type: text
    content: Que la grâce du Seigneur Jésus soit avec tous !
  '3':
  - type: note
    content: plus de malédiction (voir bénédiction, malédiction) Za 14.11 ; cf. Gn 3.14-24 ; Rm 8.1 ; voir Mt 26.74n. –  trône de Dieu et de l'agneau 3.21 ; 4.2+ ; 5.6. –  esclaves ou serviteurs v. 6 ; 1.1+. –  lui rendront un culte 7.15.
  - type: text
    content: 'Il n''y aura plus de malédiction. Le trône de Dieu et de l''agneau sera dans la ville. Ses esclaves lui rendront un culte ; '
  '4':
  - type: note
    content: 'verront son visage (ou sa face) Ps 11.7 ; 17.15 ; 42.3 ; Mt 5.8 ; 1Co 13.12 ; 1Jn 3.2. –  son nom  : cf. 14.1.'
  - type: text
    content: 'ils verront son visage, et son nom sera sur leur front. '
  '5':
  - type: note
    content: 21.23+,25+. –  ils régneront 1.6 ; cf. 5.10+.
  - type: text
    content: La nuit ne sera plus, et ils n'auront besoin ni de la lumière d'une lampe, ni de la lumière du soleil, car c'est le Seigneur Dieu qui les éclairera. Et ils régneront à tout jamais.
  - type: heading
    content: Je viens bientôt
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'certaines / vraies 21.5n. –  Dieu des esprits…  : cf. 19.10 ; Nb 27.16n  ; 1Co 14.32. –  a envoyé son ange… v. 16 ; 1.1+.'
  - type: text
    content: 'Il me dit : Ces paroles sont certaines et vraies ; le Seigneur, le Dieu des esprits des prophètes, a envoyé son ange pour montrer à ses esclaves ce qui doit arriver bientôt. '
  '7':
  - type: note
    content: Je viens bientôt v. 12,20 ; 3.11+. –  Heureux… v. 10 ; 1.3+.
  - type: text
    content: Je viens bientôt. Heureux celui qui garde les paroles de la prophétie de ce livre !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Jean 1.1+. –  entendu / vu  : cf. 1Jn 1.1-3. –  je suis tombé… 19.10+.'
  - type: text
    content: 'C''est moi, Jean, qui ai entendu et vu ces choses. Quand j''ai entendu et vu, je suis tombé aux pieds de l''ange qui me les montrait, pour me prosterner devant lui. '
  '9':
  - type: text
    content: 'Mais il me dit : Garde-toi de faire cela ! Je ne suis que ton compagnon d''esclavage et celui de tes frères, les prophètes, et de ceux qui gardent les paroles de ce livre. Prosterne-toi devant Dieu !'
