      marker-yv: yv-n
    - type: text
      text: Moi, Jésus, j'ai envoyé mon ange pour vous apporter ce témoignage au sujet des Eglises. C'est moi qui suis le rejeton et la postérité de David, l'étoile resplendissante du matin.
