        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Celui qui atteste ces choses dit : Oui, je viens bientôt. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen !
    - type: text
      text: ' Viens, Seigneur Jésus !'
  '21':
