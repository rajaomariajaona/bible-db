          - type: text
            text: n
        - type: text
          text: '  ; 10.17s ; 1Co 8.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''arbre de la vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2 ; 2.7+ ; cf. Gn 3.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'entrer par les portes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 21.12-14,25 ; cf. Ps 118.19s.
      marker-yv: yv-n
    - type: text
      text: 'Heureux ceux qui lavent leurs robes pour avoir droit à l''arbre de la vie et pour entrer par les portes dans la ville ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
