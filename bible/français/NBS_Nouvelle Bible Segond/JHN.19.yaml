document_id: JHN.19
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mt 20.19 ; 27.28s/ /.
    marker-yv: yv-n
  - type: text
    text: 'Alors Pilate prit Jésus et le fit fouetter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Lc 23.11 ; 1Co 1.23.
    marker-yv: yv-n
  - type: text
    text: 'Les soldats tressèrent une couronne d''épines qu''ils lui mirent sur la tête, et ils l''habillèrent d''un vêtement de pourpre ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bonjour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: réjouis-toi !
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; c''est la salutation courante dans le monde grec, cf. Mt 26.49'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'roi des Juifs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.33+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gifles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.22 ; cf. Es 50.8.
    marker-yv: yv-n
  - type: text
    text: 'ils venaient à lui en disant : Bonjour, roi des Juifs ! et ils lui donnaient des gifles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.38 ; cf. Lc 23.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dit aux Juifs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leur dit.
    marker-yv: yv-n
  - type: text
    text: 'Pilate sortit de nouveau et dit aux Juifs : Je vous l''amène dehors, pour que vous sachiez que je ne trouve en lui aucun motif de condamnation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Voici '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 1.29) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'homme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 14.'
    marker-yv: yv-n
  - type: text
    text: 'Jésus sortit donc, portant la couronne d''épines et le vêtement de pourpre. Et Pilate leur dit : Voici l''homme !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 15 ; 18.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grands '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Mt 2.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mc 11.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Crucifie-le
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: crucifie !
    marker-yv: yv-n
  - type: text
    text: 'Lorsque les grands prêtres et les gardes le virent, ils crièrent : Crucifie-le ! Crucifie-le ! Pilate leur dit : Prenez-le vous-mêmes et crucifiez-le ; car moi, je ne trouve pas de motif de condamnation en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 5.18+ ; 10.30-36 ; cf. Lv 24.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'selon cette '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: selon notre loi.
    marker-yv: yv-n
  - type: text
    text: 'Les Juifs lui répondirent : Nous, nous avons une loi, et selon cette loi, il doit mourir, parce qu''il s''est fait Fils de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Quand Pilate entendit cette parole, sa crainte augmenta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'D''où es-tu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.27+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pas de réponse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 26.62s/ / ; 27.12-14/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Il rentra dans le prétoire et dit à Jésus : D''où es-tu, toi ? Mais Jésus ne lui donna pas de réponse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: j'ai le pouvoir…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sur l''expression, cf. 1.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 10.17s.'
    marker-yv: yv-n
  - type: text
    text: 'Pilate lui dit alors : Tu ne me parles pas, à moi ? Ne sais-tu pas que j''ai le pouvoir de te relâcher comme j''ai le pouvoir de te crucifier ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: donné d'en haut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.27 ; Ac 2.23 ; Rm 13.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celui qui me livre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.64+ ; 18.30,35. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: est coupable…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'a un plus grand '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 8.21-24 ; 9.41 ; 15.22-24 ; 16.8s.'
    marker-yv: yv-n
  - type: text
    text: 'Jésus répondit : Tu n''aurais sur moi aucun pouvoir s''il ne t''avait été donné d''en haut. C''est pourquoi celui qui me livre à toi est coupable d''un plus grand péché.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ami de César
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : peut-être Pilate portait-il le titre officiel d’'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ami de l''empereur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ce dernier étant alors Tibère) ; d''autres comprennent l''expression dans un sens plus général, c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu n'es pas un loyal serviteur de César
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'César '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.33+,37 ; cf. Lc 23.2 ; Ac 17.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se déclare contre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Lc 2.34'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Dès lors, Pilate cherchait à le relâcher. Mais les Juifs crièrent : Si tu le relâches, tu n''es pas ami de César. Quiconque se fait roi se déclare contre César. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'assit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction possible '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le fit asseoir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 12.31 ; c''est normalement le juge qui est assis et l''accusé qui est debout. Voir l''introduction. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Pavé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dallage ou mosaïque ; le nom araméen '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gabbatha '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'suggère une élévation ; il pourrait désigner d''une façon générale le palais du procurateur, situé sur une hauteur, ou plus précisément une estrade où était placé le siège du '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tribunal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Ac 12.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Après avoir entendu ces paroles, Pilate amena donc Jésus dehors et s''assit au tribunal, au lieu dit le Pavé – en hébreu Gabbatha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le jour de la Préparation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ici, à la fois le vendredi, veille du sabbat, et la veille de la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pâque
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mt 27.62 ; Mc 15.42 ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: calendrier
      - type: text
        text: ' et fêtes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sixième heure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : vers midi ; c''était, semble-t-il, l''heure à laquelle on tuait les agneaux pour le repas pascal ; cf. v. 36 ; 1.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'votre roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 6.15+ ; 18.33-37.
    marker-yv: yv-n
  - type: text
    text: 'C''était le jour de la Préparation de la Pâque, vers la sixième heure. Il dit aux Juifs : Voici votre roi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: A mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: enlève
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même verbe en 1.29 ; cf. Lc 23.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ac 21.36 ; 22.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nous n'avons pas d'autre roi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 8.23 ; 1S 8.7.'
    marker-yv: yv-n
  - type: text
    text: 'Mais ils s''écrièrent : A mort ! A mort ! Crucifie-le ! Pilate leur dit : Vais-je crucifier votre roi ? Les grands prêtres répondirent : Nous n''avons pas d''autre roi que César. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils prirent donc Jésus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et l'emmenèrent.
    marker-yv: yv-n
  - type: text
    text: Alors il le leur livra pour qu'il soit crucifié.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est crucifié
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 27.32-44  ; Mc 15.21-32  ; Lc 23.26-43
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils prirent donc Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Portant lui-même la croix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 27.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '/ / ; voir aussi Gn 22.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il sortit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Hé 13.12s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Golgotha '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mt 27.33/ /.
    marker-yv: yv-n
  - type: text
    text: 'Portant lui-même la croix, il sortit vers le lieu qu''on appelle le Crâne, ce qui se dit en hébreu Golgotha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 27.38/ / ; cf. Es 53.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au milieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 20.19.'
    marker-yv: yv-n
  - type: text
    text: 'C''est là qu''ils le crucifièrent, et avec lui deux autres, un de chaque côté et Jésus au milieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Nazoréen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.5+.
    marker-yv: yv-n
  - type: text
