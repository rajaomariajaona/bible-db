document_id: JHN.19,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Mt 20.19 ; 27.28s/ /.
  - type: text
    content: 'Alors Pilate prit Jésus et le fit fouetter. '
  '10':
  - type: note
    content: 'j''ai le pouvoir…  : sur l''expression, cf. 1.12n  ; 10.17s.'
  - type: text
    content: 'Pilate lui dit alors : Tu ne me parles pas, à moi ? Ne sais-tu pas que j''ai le pouvoir de te relâcher comme j''ai le pouvoir de te crucifier ? '
  '11':
  - type: note
    content: 'donné d''en haut  : cf. 3.27 ; Ac 2.23 ; Rm 13.1. –  celui qui me livre  : cf. 6.64+ ; 18.30,35. –  est coupable…  : litt. a un plus grand péché  ; cf. 8.21-24 ; 9.41 ; 15.22-24 ; 16.8s.'
  - type: text
    content: 'Jésus répondit : Tu n''aurais sur moi aucun pouvoir s''il ne t''avait été donné d''en haut. C''est pourquoi celui qui me livre à toi est coupable d''un plus grand péché.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'ami de César  : peut-être Pilate portait-il le titre officiel d’ ami de l''empereur (ce dernier étant alors Tibère) ; d''autres comprennent l''expression dans un sens plus général, c.-à-d. tu n''es pas un loyal serviteur de César . –  roi / César 18.33+,37 ; cf. Lc 23.2 ; Ac 17.7. –  se déclare contre  : cf. Lc 2.34n.'
  - type: text
    content: 'Dès lors, Pilate cherchait à le relâcher. Mais les Juifs crièrent : Si tu le relâches, tu n''es pas ami de César. Quiconque se fait roi se déclare contre César. '
  '13':
  - type: note
    content: 's''assit  : autre traduction possible le fit asseoir, cf. 12.31 ; c''est normalement le juge qui est assis et l''accusé qui est debout. Voir l''introduction. –  le Pavé  : dallage ou mosaïque ; le nom araméen Gabbatha suggère une élévation ; il pourrait désigner d''une façon générale le palais du procurateur, situé sur une hauteur, ou plus précisément une estrade où était placé le siège du tribunal (cf. Ac 12.21n).'
  - type: text
    content: 'Après avoir entendu ces paroles, Pilate amena donc Jésus dehors et s''assit au tribunal, au lieu dit le Pavé – en hébreu Gabbatha. '
  '14':
  - type: note
    content: 'le jour de la Préparation  : ici, à la fois le vendredi, veille du sabbat, et la veille de la Pâque  ; cf. v. 31n  ; Mt 27.62 ; Mc 15.42 ; voir calendrier et fêtes. –  sixième heure  : vers midi ; c''était, semble-t-il, l''heure à laquelle on tuait les agneaux pour le repas pascal ; cf. v. 36 ; 1.29. –  Juifs  : cf. 1.19n. –  votre roi 6.15+ ; 18.33-37.'
  - type: text
    content: 'C''était le jour de la Préparation de la Pâque, vers la sixième heure. Il dit aux Juifs : Voici votre roi ! '
  '15':
  - type: note
    content: 'A mort  : litt. enlève  ; même verbe en 1.29 ; cf. Lc 23.18n  ; Ac 21.36 ; 22.23. –  Nous n''avons pas d''autre roi…  : cf. Jg 8.23 ; 1S 8.7.'
  - type: text
    content: 'Mais ils s''écrièrent : A mort ! A mort ! Crucifie-le ! Pilate leur dit : Vais-je crucifier votre roi ? Les grands prêtres répondirent : Nous n''avons pas d''autre roi que César. '
  '16':
  - type: note
    content: 'Ils prirent donc Jésus  : certains mss ajoutent et l''emmenèrent.'
  - type: text
    content: Alors il le leur livra pour qu'il soit crucifié.
  - type: heading
    content: Jésus est crucifié
  - type: heading
    content: Mt 27.32-44  ; Mc 15.21-32  ; Lc 23.26-43
  - type: text
    content: 'Ils prirent donc Jésus. '
  '17':
  - type: note
    content: 'Portant lui-même la croix  : cf. Mt 27.32n/ / ; voir aussi Gn 22.6. –  il sortit  : cf. Hé 13.12s. –  Golgotha Mt 27.33/ /.'
  - type: text
    content: 'Portant lui-même la croix, il sortit vers le lieu qu''on appelle le Crâne, ce qui se dit en hébreu Golgotha. '
  '18':
  - type: note
    content: 'Mt 27.38/ / ; cf. Es 53.12. –  au milieu  : cf. 20.19.'
  - type: text
    content: 'C''est là qu''ils le crucifièrent, et avec lui deux autres, un de chaque côté et Jésus au milieu. '
  '19':
  - type: note
    content: le Nazoréen 18.5+.
  - type: text
    content: 'Pilate fit aussi un écriteau qu''il plaça sur la croix. Il y était inscrit :'
  - type: text
    content: « Jésus le Nazoréen, le roi des Juifs. »
  '2':
  - type: note
    content: Cf. Lc 23.11 ; 1Co 1.23.
  - type: text
    content: 'Les soldats tressèrent une couronne d''épines qu''ils lui mirent sur la tête, et ils l''habillèrent d''un vêtement de pourpre ; '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 42 ; 12.20-32+.
  - type: text
    content: 'Beaucoup de Juifs lurent cet écriteau, parce que le lieu où Jésus fut crucifié était proche de la ville ; l''inscription était en hébreu, en latin et en grec. '
  '21':
  - type: note
    content: 'grands prêtres  : cf. Mt 2.4n  ; Mc 11.18n. –  mais…  : autre traduction mais (écris) que cet individu a prétendu être le roi des Juifs.'
  - type: text
    content: 'Les grands prêtres des Juifs dirent à Pilate : N''écris pas : « Le roi des Juifs », mais : « Celui-là a dit : Je suis le roi des Juifs. » '
  '22':
  - type: text
    content: 'Pilate répondit : Ce que j''ai écrit, je l''ai écrit.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: La loi romaine accordait au bourreau ce que le condamné portait sur lui.
  - type: text
    content: 'Les soldats, après avoir crucifié Jésus, prirent ses vêtements et en firent quatre parts, une part pour chaque soldat. Ils prirent aussi sa tunique, qui était sans couture, d''un seul tissu d''en haut jusqu''en bas. '
  '24':
  - type: note
    content: 'Ne la déchirons pas  : cf. 21.11 ; un terme apparenté est traduit par division en 7.43 ; 9.16 ; 10.19 ; cf. Ex 28.32 ; Lv 21.10 ; Mc 1.10n  ; 15.38. –  Ps 22.19.'
  - type: text
    content: 'Ils se dirent entre eux : Ne la déchirons pas, mais désignons par le sort celui à qui elle appartiendra. C''était pour que soit accomplie l''Ecriture :'
  - type: text
    content: Ils se sont partagé mes vêtements
  - type: text
    content: et ils ont tiré au sort ma robe
  - type: text
    content: .
  - type: text
    content: Voilà ce que firent les soldats.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Auprès (1.39n) de la croix  : cf. Mt 27.55s/ /. –  sa mère 2.1-4. –  Clopas  : cf. Lc 24.18 ( ?). –  Madeleine , c.-à-d. de Magdala , cf. Mt 27.56n.'
  - type: text
    content: 'Auprès de la croix de Jésus se tenaient sa mère et la sœur de sa mère, Marie, femme de Clopas, et Marie-Madeleine. '
  '26':
  - type: note
    content: 'sa mère  : litt. la mère. –  le disciple qu''il aimait 13.23+. –  Femme 2.4n.'
  - type: text
    content: 'Jésus, voyant sa mère et, près d''elle, le disciple qu''il aimait, dit à sa mère : Femme, voici ton fils. '
  '27':
  - type: note
    content: 'dès cette heure-là (ou dès ce moment même) : cf. 12.27 ; voir aussi 16.32 ; Ac 1.14. –  chez lui  : cf. 1.11n.'
  - type: text
    content: 'Puis il dit au disciple : Voici ta mère. Et dès cette heure-là, le disciple la prit chez lui.'
  - type: heading
    content: La mort de Jésus
  - type: heading
    content: Mt 27.45-56  ; Mc 15.33-41  ; Lc 23.44-49
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'accomplie (autre terme v. 24,36) et achevé (v. 30 ; cf. 13.1n) traduisent ici deux verbes grecs apparentés ; voir 4.34+ ; Lc 12.50. –  sachant… 13.1+. –  J''ai soif  : cf. Ps 22.16 ; 63.2.'
  - type: text
    content: 'Après cela, pour que l''Ecriture soit accomplie, Jésus, sachant que déjà tout était achevé, dit : J''ai soif. '
  '29':
  - type: note
    content: 'Il y avait là 2.6n. –  vin aigre ou vinaigre Mt 27.48n/ / ; Ps 69.22. –  hysope  : il s''agit normalement d''une petite plante qui pousse dans les pierres ou sur les murailles (1R 5.13) ; elle est employée dans des rites de purification (Lv 14.4ss ; Nb 19.18). Un ms du XIe s. porte un mot grec ressemblant qui signifie javelot  ; voir aussi Ex 12.22n.'
  - type: text
    content: 'Il y avait là un récipient plein de vin aigre. On fixa à une tige d''hysope une éponge imbibée de vin aigre et on l''approcha de sa bouche. '
  '3':
  - type: note
    content: 'Bonjour  : litt. réjouis-toi !  ; c''est la salutation courante dans le monde grec, cf. Mt 26.49n. –  roi des Juifs 18.33+. –  gifles 18.22 ; cf. Es 50.8.'
  - type: text
    content: 'ils venaient à lui en disant : Bonjour, roi des Juifs ! et ils lui donnaient des gifles.'
  '30':
  - type: note
    content: 'achevé  : voir v. 28n. –  rendit (le même verbe est habituellement traduit par livrer ou transmettre) l''esprit  : cf. 10.18 ; voir aussi 7.39 ; 16.5-7 ; 20.22 ; Mc 15.37n,39.'
  - type: text
    content: 'Quand il eut pris le vin aigre, Jésus dit : Tout est achevé. Puis il baissa la tête et rendit l''esprit.'
  - type: heading
    content: Le coup de lance
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Préparation v. 14n. –  pour que les corps…  : cf. Dt 21.22s ; Ga 3.13n. –  un grand jour ou un grand sabbat  ; cf. 7.37 ; l''expression désigne peut-être un sabbat qui est aussi un jour de fête annuelle (voir calendrier et fêtes), mais elle n''est pas attestée ailleurs dans ce sens au Ier s. ; cf. Ex 12.16. –  Juifs  : cf. 1.19n. –  brisé les jambes  : pour hâter la mort par asphyxie ; voir aussi « L’Evangile de Pierre  »♦.'
  - type: text
    content: 'C''était le jour de la Préparation et, pour que les corps ne demeurent pas en croix pendant le sabbat – car ce sabbat-là était un grand jour – les Juifs demandèrent à Pilate de les faire enlever après leur avoir brisé les jambes. '
  '32':
  - type: text
    content: 'Les soldats vinrent donc et brisèrent les jambes du premier, puis de l''autre qui avait été crucifié avec lui. '
  '33':
  - type: note
    content: V. 36.
  - type: text
    content: 'Quand ils vinrent à Jésus, ils virent qu''il était déjà mort et ils ne lui brisèrent pas les jambes ; '
  '34':
  - type: note
    content: 'transperça v. 37. –  le côté 20.20,25. –  du sang et de l''eau  : cf. 4.14 ; 6.53-56 ; 7.38s ; 1Jn 5.6-8 ; voir aussi Ez 47.1+.'
  - type: text
    content: 'mais un des soldats lui transperça le côté avec une lance ; aussitôt il en sortit du sang et de l''eau. '
  '35':
  - type: note
    content: 'Cf. v. 26s ; 21.24. –  témoignage  : cf. 1.7+ ; 3.11 ; 15.26s. –  lui  : litt. celui-là, démonstratif souvent utilisé par Jn, en particulier (mais pas exclusivement) pour désigner Dieu, le Christ ou l''Esprit (ainsi en 3.28,30 ; 7.11 ; 9.28 ; 1Jn 2.6 ; 3.3,5,7,16 ; 4.17) ; il désigne le disciple que Jésus aimait en 13.25n  ; 21.7,23 ; cf. Jn 5.31s ; 8.13s ; 3Jn 12. –  vous croyiez ou vous ayez foi 1.7n  ; 20.31.'
  - type: text
    content: 'Celui qui l''a vu en a témoigné, et son témoignage est vrai ; lui, il sait qu''il dit vrai, pour que vous aussi vous croyiez. '
  '36':
  - type: note
    content: Ex 12.10,46  ; Nb 9.12 ; Ps 34.21.
  - type: text
    content: 'Cela est arrivé pour que soit accomplie l''Ecriture : '
  - type: text
    content: Aucun de ses os ne sera brisé
  - type: text
    content: '. '
  '37':
  - type: note
    content: Cf. 3.14s ; 8.28 ; 12.32 ; Za 12.10  ; Ap 1.7.
  - type: text
    content: 'Et une autre Ecriture dit encore : '
  - type: text
    content: Ils regarderont vers celui qu'ils ont transpercé
  - type: text
    content: .
  - type: heading
    content: Jésus est mis au tombeau
  - type: heading
    content: Mt 27.57-61  ; Mc 15.42-47  ; Lc 23.50-56
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 27.57-60. –  d''Arimathée  : cf. Mt 27.57n. –  crainte des Juifs 7.13+. –  enlever le corps  : cf. 1R 13.29s. –  Joseph vint  : litt. il vint.'
  - type: text
    content: 'Après cela, Joseph d''Arimathée, qui était disciple de Jésus, mais en secret, par crainte des Juifs, demanda à Pilate la permission d''enlever le corps de Jésus. Pilate le lui permit. Joseph vint donc et enleva le corps. '
  '39':
  - type: note
    content: 'Nicodème 3.1s. –  cent livres  : un peu plus de 30 kg (12.3n  ; voir mesures). –  myrrhe / aloès  : cf. 12.3 ; voir aussi Mt 2.11 ; Ps 45.9 ; Pr 7.17.'
  - type: text
    content: 'Nicodème, qui était d''abord venu le trouver de nuit, vint aussi en apportant un mélange d''environ cent livres de myrrhe et d''aloès. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: '18.38 ; cf. Lc 23.4. –  dit aux Juifs  : litt. leur dit.'
  - type: text
    content: 'Pilate sortit de nouveau et dit aux Juifs : Je vous l''amène dehors, pour que vous sachiez que je ne trouve en lui aucun motif de condamnation. '
  '40':
  - type: note
    content: Cf. 11.44 ; 20.5-7 ; Lc 24.12n.
  - type: text
    content: 'Ils prirent donc le corps de Jésus et le lièrent de bandelettes, avec les aromates, comme les Juifs ont coutume d''ensevelir. '
  '41':
  - type: note
    content: 'un jardin  : cf. 20.15 ; voir aussi 18.1.'
  - type: text
    content: 'Or il y avait un jardin au lieu où il avait été crucifié et, dans le jardin, un tombeau neuf où encore personne n''avait été mis. '
  '42':
  - type: note
    content: Préparation v. 14n.
  - type: text
    content: C'est donc là qu'ils mirent Jésus, à cause de la Préparation des Juifs, parce que le tombeau était proche.
  '5':
  - type: note
    content: 'Voici (cf. 1.29) l''homme  : cf. v. 14.'
  - type: text
    content: 'Jésus sortit donc, portant la couronne d''épines et le vêtement de pourpre. Et Pilate leur dit : Voici l''homme !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'V. 15 ; 18.31. –  grands prêtres  : cf. Mt 2.4n  ; Mc 11.18n. –  Crucifie-le  : litt. crucifie !'
  - type: text
    content: 'Lorsque les grands prêtres et les gardes le virent, ils crièrent : Crucifie-le ! Crucifie-le ! Pilate leur dit : Prenez-le vous-mêmes et crucifiez-le ; car moi, je ne trouve pas de motif de condamnation en lui. '
  '7':
  - type: note
    content: 'Cf. 5.18+ ; 10.30-36 ; cf. Lv 24.16. –  selon cette loi  : certains mss portent selon notre loi.'
  - type: text
    content: 'Les Juifs lui répondirent : Nous, nous avons une loi, et selon cette loi, il doit mourir, parce qu''il s''est fait Fils de Dieu.'
  '8':
  - type: text
    content: 'Quand Pilate entendit cette parole, sa crainte augmenta. '
  '9':
  - type: note
    content: 'D''où es-tu 7.27+. –  pas de réponse  : cf. Mt 26.62s/ / ; 27.12-14/ /.'
  - type: text
    content: 'Il rentra dans le prétoire et dit à Jésus : D''où es-tu, toi ? Mais Jésus ne lui donna pas de réponse. '
