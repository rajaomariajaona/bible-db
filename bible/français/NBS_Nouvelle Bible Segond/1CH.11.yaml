document_id: 1CH.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David reçoit l'onction royale
  - type: heading
    content: 2S 5.1-3
  - type: text
    content: ' '
  - type: note
    content: 'se rassembla  : LXX vint.'
  - type: text
    content: 'Tout Israël se rassembla auprès de David à Hébron en disant : Nous sommes tes os et ta chair. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'lui prêtèrent main-forte  : litt. se fortifièrent (ou se montrèrent forts ) avec lui  ; cf. Dn 10.21 ; 2Ch 16.9. –  dans sa conquête de la royauté  : litt. dans sa royauté , qui pourrait se comprendre durant son règne , mais le contexte ( pour qu''il devienne roi ) montre qu''il s''agit probablement de l''accession au trône. –  selon la parole du Seigneur …  : cf. v. 3n.'
  - type: text
    content: 'Voici les chefs des vaillants hommes de David, ceux qui, avec tout Israël, lui prêtèrent main-forte dans sa conquête de la royauté, pour qu''il devienne roi selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' au sujet d''Israël. '
  '11':
  - type: note
    content: 'la liste  : litt. le compte  ; 2S 23.8 les noms. –  qui appartenait à l''élite…  : autres traductions chef des trente ; chef de division  ; voir 2S 23.8n. –  trois cents hommes  : 2S 23.8 huit cents hommes.'
  - type: text
    content: Voici la liste des vaillants hommes de David.
  - type: text
    content: Yashobéam, fils de Hakmoni, qui appartenait à l'élite de la garde. C'est lui qui brandit sa lance sur trois cents hommes, qu'il transperça en une seule fois.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Dodo  : LXX porte Dodaï , cf. 27.4.'
  - type: text
    content: 'Après lui, Eléazar, fils de Dodo, l''Ahohite, l''un des trois vaillants hommes. '
  '13':
  - type: note
    content: 'Pas-Dammim  : cette précision est absente de 2S 23.9 ; cf. 1S 17.1n. –  d''orge  : certains mss de LXX portent de lentilles, comme en 2S 23.11.'
  - type: text
    content: 'C''est lui qui était avec David à Pas-Dammim, où les Philistins s''étaient rassemblés pour le combat. Il y avait là une parcelle de terre couverte d''orge ; le peuple fuyait pour échapper aux Philistins. '
  '14':
  - type: note
    content: 'Ils se tinrent  : 2S 23.9-12 attribue ces hauts faits à Eléazar et à Shamma. –  réalisa une grande victoire  : litt. sauva d''un grand salut  ; LXX et Syr portent réalisa… comme en 2S 23.10n,12 (2S et 1Ch emploient deux verbes hébreux différents).'
  - type: text
    content: 'Ils se tinrent debout au milieu de la parcelle, la reprirent et battirent les Philistins. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' réalisa une grande victoire.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'dans les rochers  : litt. sur le (ou près du ) rocher  : 2S 23.13 au temps de la moisson.'
  - type: text
    content: 'Trois des trente chefs descendirent auprès de David dans les rochers, dans la grotte d''Adoullam, alors que le camp des Philistins était dressé dans la vallée des Rephaïtes. '
  '16':
  - type: note
    content: 'endroits escarpés  : le terme correspondant est traduit par forteresse aux v. 5,7 ; cf. 12.9,17 ; voir 1S 23.14n. –  une garnison  : autre traduction un préfet, cf. 1S 10.5n.'
  - type: text
    content: 'David était alors dans les endroits escarpés ; il y avait alors une garnison des Philistins à Beth-Léhem. '
  '17':
  - type: text
    content: 'David exprima un désir en disant : Qui me fera boire de l''eau de la citerne qui est à la porte de Beth-Léhem ? '
  '18':
  - type: note
    content: 'les trois  : cf. v. 15.'
  - type: text
    content: 'Alors les trois forcèrent le camp des Philistins et puisèrent de l''eau de la citerne qui est à la porte de Beth-Léhem. Ils l''apportèrent et la présentèrent à David ; mais David ne voulut pas la boire et il la répandit en libation pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '19':
  - type: note
    content: 'Jamais ! 1S 2.30n  ; 1R 21.3+. –  Que mon Dieu  : LXX que Dieu. –  qui ont agi…  : autre traduction au prix de leur vie  ; expression légèrement différente en 2S 23.17 (qui y sont allés au péril de leur vie).'
  - type: text
    content: 'Il dit : Jamais ! Que mon Dieu me garde de faire cela ! Boirais-je le sang de ces hommes qui ont agi au péril de leur vie ? Car c''est au péril de leur vie qu''ils l''ont apportée ! Et il ne voulut pas la boire. Voilà ce que firent les trois vaillants hommes.'
  '2':
  - type: text
    content: 'Déjà, lorsque Saül était roi, c''était toujours toi qui menais Israël en campagne et qui l''en ramenais. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a dit : « C''est toi qui feras paître Israël, mon peuple ; c''est toi qui seras chef sur Israël, mon peuple. » '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Abshaï  : cf. 2.16 ; Tg et Vg portent Abishaï , comme 2S 23.18. –  et qui se fit ainsi un nom  : d''après certains mss hébreux et des versions anciennes ; le texte hébreu traditionnel porte ici une négation mais il ne se fit pas… –  les trois  : certains modifient le texte hébreu traditionnel pour lire les trente.'
  - type: text
    content: 'Abshaï, frère de Joab, était à la tête des trois. C''est lui qui brandit sa lance sur trois cents hommes qu''il transperça et qui se fit ainsi un nom parmi les trois. '
  '21':
  - type: note
    content: 'de la deuxième série  : ces mots ne figurent pas dans le texte de 2S 23.19n. On pourrait aussi les rattacher au verbe et traduire il a eu deux fois plus de gloire que les trois.'
  - type: text
    content: 'C''est lui qui a eu le plus de gloire parmi les trois de la deuxième série. Il fut leur chef ; mais il n''égala pas les trois. '
  '22':
  - type: note
    content: 'Benaya  : hébreu Benayahou au v. 24 et en 2S 23.20. –  un homme de valeur  : autre traduction fils d''un homme de valeur.'
  - type: text
    content: 'Benaya, fils de Joïada, était un homme de valeur, originaire de Qabtséel, qui avait fait de nombreux exploits. C''est lui qui abattit les deux Ariel de Moab. C''est lui qui descendit et abattit un lion dans une citerne, un jour de neige. '
  '23':
  - type: note
    content: 'd''une stature de cinq coudées  : environ 2,25 m (voir mesures, poids et monnaies) ; LXX avait fière allure, cf. 2S 23.21. –  une lance comme l''ensouple des tisserands  : cf. 1S 17.7n.'
  - type: text
    content: 'C''est lui qui abattit un Egyptien d''une stature de cinq coudées. Dans la main de l''Egyptien, il y avait une lance comme l''ensouple des tisserands ; il descendit vers lui avec un bâton, arracha la lance de la main de l''Egyptien et le tua avec sa lance. '
  '24':
  - type: note
    content: 'il se fit ainsi un nom  : cf. v. 20.'
  - type: text
    content: 'Voilà ce que fit Benaya, fils de Joïada, et il se fit ainsi un nom parmi les trois vaillants hommes. '
  '25':
  - type: note
    content: 'l''affecta à sa garde personnelle  : cf. 1S 22.14n  ; LXX l''admit dans sa famille.'
  - type: text
    content: C'est lui qui a eu le plus de gloire parmi les trente ; mais il n'égala pas les trois. David l'affecta à sa garde personnelle.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Vaillants guerriers  : après la liste des chefs et le rappel de leurs exploits (v. 10-25), suit la simple énumération des soldats de la troupe d''élite (v. 26-47). –  Asaël 2.16n. –  Dodo  : certains mss de LXX portent Dodi.'
  - type: text
    content: 'Vaillants guerriers :'
  - type: text
    content: Asaël, frère de Joab ;
  - type: text
    content: Elhanân, fils de Dodo, de Beth-Léhem ;
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'le Harorite  : certains modifient le texte hébreu traditionnel pour lire le Harodite , comme en 2S 23.25. –  le Pelonite  : Syr porte ici le Paltite , comme en 2S 23.'
  - type: text
    content: Shammoth, le Harorite ;
  - type: text
    content: Hélets, le Pelonite ;
  '28':
  - type: text
    content: Ira, fils d'Iqqesh, le Teqoïte ;
  - type: text
    content: Abiézer, l'Anatotite ;
  '29':
  - type: text
    content: Sibbekaï, le Houshatite ;
  - type: text
    content: Ilaï, l'Ahohite ;
  '3':
  - type: note
    content: 'David  : un ms hébreu ainsi que LXX et Syr portent le roi David. –  selon la parole… Samuel  : ces mots sont absents de 2S 5. Les Chroniques soulignent souvent que les événements de l''histoire humaine sont conformes à la volonté de Dieu.'
  - type: text
    content: 'Ainsi tous les anciens d''Israël vinrent auprès du roi à Hébron, et David conclut une alliance pour eux à Hébron, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils conférèrent l''onction à David pour qu''il soit roi sur Israël, selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononcée par Samuel.'
  - type: heading
    content: David s'empare de Jérusalem
  - type: heading
    content: 2S 5.6-10
  '30':
  - type: text
    content: Maharaï, le Netophatite ;
  - type: text
    content: Héled, fils de Baana, le Netophatite ;
  '31':
  - type: text
    content: Itaï, fils de Ribaï, de Guibéa des Benjaminites ;
  - type: text
    content: Benaya, le Piratonite ;
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'plaine aride  : hébreu ‘arava  ; cf. Dt 1.1n.'
  - type: text
    content: Houraï, des oueds du Gaash ;
  - type: text
    content: Abiel, de la plaine aride ;
  '33':
  - type: text
    content: Azmaveth, le Baharoumite ;
  - type: text
    content: Eliahba, le Shaalbonite ;
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'le Guizonite  : de Guizôn, inconnue par ailleurs ; certains proposent de lire le Gounite , comme certains mss de LXX ; d''autres le Guimzonite , de Guimzo, cf. 2Ch 28.18.'
  - type: text
    content: Bené-Hashem, le Guizonite ;
  - type: text
    content: Jonathan, fils de Shagué, le Hararite ;
  '35':
  - type: text
    content: Ahiam, fils de Sakar, le Hararite ;
  - type: text
    content: Eliphal, fils d'Our ;
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'le Pelonite  : cf. v. 27.'
  - type: text
    content: Hépher, le Mekératite ;
  - type: text
    content: Ahiya, le Pelonite ;
  '37':
  - type: text
    content: Hetsro, le Carmélite ;
  - type: text
    content: Naaraï, fils d'Ezbaï ;
  '38':
  - type: text
    content: Joël, frère de Nathan ;
  - type: text
    content: Mibhar, fils de Hagri ;
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'le Bérotite  : le Béérotite en 2S 23.37, de Bééroth (cf. Jos 9.17n). –  qui portait  : des mss de LXX et Tg ont le pluriel qui portaient.'
  - type: text
    content: Tséleq, l'Ammonite ;
  - type: text
    content: Nahraï, le Bérotite, qui portait les armes de Joab, fils de Tserouya ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 4s résument quelque peu le texte parallèle. –  tout Israël  : LXX semble porter les hommes d''Israël ou ses hommes.'
  - type: text
    content: 'David marcha avec tout Israël sur Jérusalem, c''est-à-dire Jébus. C''est là qu''étaient les Jébusites qui habitaient le pays. '
  '40':
  - type: text
    content: Ira, le Yitrite ;
  - type: text
    content: Gareb, le Yitrite ;
  '41':
  - type: text
    content: ' '
  - type: note
    content: A la liste des trente-sept noms de 2S 23, les Chroniques ajoutent (à partir de Zabad ) seize noms supplémentaires, sans donner de total.
  - type: text
    content: Urie, le Hittite ;
  - type: text
    content: Zabad, fils d'Ahlaï ;
  '42':
  - type: text
    content: Adina, fils de Shiza, le Rubénite, chef des Rubénites, et trente avec lui ;
  '43':
  - type: text
    content: ' '
  - type: note
    content: Josaphat, le Mitnite (d'un site inconnu) ou et Josaphat, les Mitnites.
  - type: text
    content: Hanân, fils de Maaka ;
  - type: text
    content: Josaphat, le Mitnite ;
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'l''Ashtératite  : d''Ashtaroth, cf. Jos 9.10n. –  l''Aroérite  : d''Aroër, cf. Nb 32.34n  ; Dt 2.36+ ; 2S 24.5n.'
  - type: text
    content: Ouzzia, l'Ashtératite ;
  - type: text
    content: Shama et Yehiel, fils de Hotam, l'Aroérite ;
  '45':
  - type: text
    content: ' '
  - type: note
    content: Yoha… le Titsite (d'une localité inconnue par ailleurs) ou et Yoha… les Titsites.
  - type: text
    content: Yediaël, fils de Shimri ;
  - type: text
    content: Yoha, son frère, le Titsite ;
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'le Mahavite  : traduction incertaine ; le texte hébreu porte une forme plurielle les Mahavites , que certains proposent de comprendre les Mahanaïmites , cf. 1R 2.8n.'
  - type: text
    content: Eliel, le Mahavite ;
  - type: text
    content: Yeribaï et Yoshavia, fils d'Elnaam ;
  - type: text
    content: Yitma, le Moabite ;
  '47':
  - type: text
    content: ' '
  - type: note
    content: Yaasiel-Metsobaya pourrait être une déformation de Yaasiel, de Tsoba.
  - type: text
    content: Eliel, Obed et Yaasiel-Metsobaya.
  '5':
  - type: note
    content: 'forteresse  : même terme hébreu aux v. 7,16 (endroits escarpés) ; cf. 1S 22.4n.'
  - type: text
    content: 'Les habitants de Jébus dirent à David : Tu n''entreras pas ici ! Mais David prit la forteresse de Sion, c''est-à-dire la Ville de David. '
  '6':
  - type: note
    content: Joab 2S 2.13n.
  - type: text
    content: 'David avait dit : Quiconque battra en premier les Jébusites sera chef et prince. Joab, fils de Tserouya, partit le premier à l''attaque et il devint chef. '
  '7':
  - type: text
    content: 'David s''installa dans la forteresse ; c''est pourquoi on l''a appelée Ville de David. '
  '8':
  - type: note
    content: 'Le texte hébreu de ce v. est peu clair. –  redonna vie  : on a parfois compris cette expression dans le sens de laissa en vie (les habitants), c.-à-d. épargna  ; mais l''emploi analogue en Né 3.34 suggère plutôt une idée de restauration.'
  - type: text
    content: 'Il bâtit tout autour de la ville, depuis le Millo et tout autour ; Joab redonna vie au reste de la ville. '
  '9':
  - type: note
    content: 'le Seigneur (YHWH) des Armées  : cf. 1S 1.3n.'
  - type: text
    content: 'David s''élevait de plus en plus, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées était avec lui.'
  - type: heading
    content: Les vaillants hommes de David
  - type: heading
    content: 2S 23.8-39  ; cf. 1Ch 27.2-15
