      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Dn 10.21 ; 2Ch 16.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans sa conquête de la royauté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans sa royauté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui pourrait se comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: durant son règne
      - type: usfm
        marker: ft
        children:
        - type: text
