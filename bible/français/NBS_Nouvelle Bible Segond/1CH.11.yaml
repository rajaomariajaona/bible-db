      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour qu'il devienne roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') montre qu''il s''agit probablement de l''accession au trône. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'selon la parole du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' …'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici les chefs des vaillants hommes de David, ceux qui, avec tout Israël, lui prêtèrent main-forte dans sa conquête de la royauté, pour qu''il devienne roi selon la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' au sujet d''Israël. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la liste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le compte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; 2S 23.8 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les noms
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui appartenait à l'élite…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chef des trente ; chef de division
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir 2S 23.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trois cents hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 23.8 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: huit cents hommes.
      marker-yv: yv-n
    - type: text
      text: Voici la liste des vaillants hommes de David.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yashobéam, fils de Hakmoni, qui appartenait à l'élite de la garde. C'est lui qui brandit sa lance sur trois cents hommes, qu'il transperça en une seule fois.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dodo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dodaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 27.4.'
      marker-yv: yv-n
    - type: text
      text: 'Après lui, Eléazar, fils de Dodo, l''Ahohite, l''un des trois vaillants hommes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pas-Dammim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette précision est absente de 2S 23.9 ; cf. 1S 17.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'orge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss de LXX portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de lentilles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 2S 23.11.'
      marker-yv: yv-n
    - type: text
      text: 'C''est lui qui était avec David à Pas-Dammim, où les Philistins s''étaient rassemblés pour le combat. Il y avait là une parcelle de terre couverte d''orge ; le peuple fuyait pour échapper aux Philistins. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils se tinrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 23.9-12 attribue ces hauts faits à Eléazar et à Shamma. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réalisa une grande victoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sauva d'un grand salut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'réalisa… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comme en 2S 23.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',12 (2S et 1Ch emploient deux verbes hébreux différents).'
      marker-yv: yv-n
    - type: text
      text: 'Ils se tinrent debout au milieu de la parcelle, la reprirent et battirent les Philistins. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' réalisa une grande victoire.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans les rochers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur le '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: près du
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rocher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 2S 23.13 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au temps de la moisson.
      marker-yv: yv-n
    - type: text
      text: 'Trois des trente chefs descendirent auprès de David dans les rochers, dans la grotte d''Adoullam, alors que le camp des Philistins était dressé dans la vallée des Rephaïtes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: endroits escarpés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'forteresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 5,7 ; cf. 12.9,17 ; voir 1S 23.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une garnison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un préfet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1S 10.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David était alors dans les endroits escarpés ; il y avait alors une garnison des Philistins à Beth-Léhem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David exprima un désir en disant : Qui me fera boire de l''eau de la citerne qui est à la porte de Beth-Léhem ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les trois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 15.'
      marker-yv: yv-n
    - type: text
      text: 'Alors les trois forcèrent le camp des Philistins et puisèrent de l''eau de la citerne qui est à la porte de Beth-Léhem. Ils l''apportèrent et la présentèrent à David ; mais David ne voulut pas la boire et il la répandit en libation pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jamais ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1S 2.30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 21.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que mon Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui ont agi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au prix de leur vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; expression légèrement différente en 2S 23.17 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui y sont allés au péril de leur vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Il dit : Jamais ! Que mon Dieu me garde de faire cela ! Boirais-je le sang de ces hommes qui ont agi au péril de leur vie ? Car c''est au péril de leur vie qu''ils l''ont apportée ! Et il ne voulut pas la boire. Voilà ce que firent les trois vaillants hommes.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Déjà, lorsque Saül était roi, c''était toujours toi qui menais Israël en campagne et qui l''en ramenais. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, t''a dit : « C''est toi qui feras paître Israël, mon peuple ; c''est toi qui seras chef sur Israël, mon peuple. » '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abshaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.16 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abishaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme 2S 23.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et qui se fit ainsi un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''après certains mss hébreux et des versions anciennes ; le texte hébreu traditionnel porte ici une négation '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais il ne se fit pas… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les trois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les trente.
      marker-yv: yv-n
    - type: text
      text: 'Abshaï, frère de Joab, était à la tête des trois. C''est lui qui brandit sa lance sur trois cents hommes qu''il transperça et qui se fit ainsi un nom parmi les trois. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la deuxième série
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ces mots ne figurent pas dans le texte de 2S 23.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. On pourrait aussi les rattacher au verbe et traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il a eu deux fois plus de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: ' que les trois.'
      marker-yv: yv-n
    - type: text
      text: 'C''est lui qui a eu le plus de gloire parmi les trois de la deuxième série. Il fut leur chef ; mais il n''égala pas les trois. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Benaya
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Benayahou '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 24 et en 2S 23.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un homme de valeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
