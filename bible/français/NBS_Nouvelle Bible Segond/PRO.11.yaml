document_id: PRO.11,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: balance 16.11 ; 20.10,23 ; Lv 19.36 ; Dt 25.13-16 ; cf. Os 12.8 ; Am 8.5s ; Mi 6.10s.
  - type: text
    content: 'La balance fausse est une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: le poids exact a sa faveur.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Quand les justes sont heureux  : autre traduction par la bonté des justes . –  justes / méchants 28.12,28 ; 29.2,16.'
  - type: text
    content: Quand les justes sont heureux, la ville exulte ;
  - type: text
    content: quand les méchants disparaissent, ce sont des cris de joie.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'la bénédiction  : autre traduction la bienfaisance  ; cf. 10.6.'
  - type: text
    content: Par la bénédiction des gens droits, la ville s'élève ;
  - type: text
    content: par la bouche des méchants, elle est rasée.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui méprise…  : cf. 14.21. –  dépourvu de raison 6.32n.'
  - type: text
    content: Celui qui méprise son prochain est dépourvu de raison ;
  - type: text
    content: l'homme qui a de l'intelligence se tait.
  '13':
  - type: text
    content: ' '
  - type: note
    content: calomnie 10.18 ; 20.19 ; cf. 17.27s. –  les secrets 20.19 ; 25.9 ; cf. 3.32+. – Voir esprit. –  les couvre ou les cache  ; litt. couvre la chose ou la parole , le mot hébreu pouvant avoir ces deux sens.
  - type: text
    content: Celui qui répand la calomnie dévoile les secrets ;
  - type: text
    content: l'esprit sûr les couvre.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'l''art de diriger 1.5n. –  salut ou victoire  ; cf. 21.31 ; 24.6 ; voir aussi 15.22 ; Sagesse 6.24 : « La multitude des sages, au contraire, assure le salut du monde, et un roi avisé, le bien-être d''un peuple. » Voir aussi 1R 12.1ss.'
  - type: text
    content: Quand l'art de diriger fait défaut, le peuple tombe ;
  - type: text
    content: le salut est dans le grand nombre des conseillers.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'garant 6.1-5. –  engagements  : autre traduction les poignées de main , litt. les tapes , geste d''engagement commercial ou financier (voir 6.1).'
  - type: text
    content: Celui qui se porte garant pour un autre s'en trouve mal ;
  - type: text
    content: celui qui déteste les engagements est en sécurité.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Une femme… 31.10ss ; LXX une femme gracieuse fait l'honneur de son mari, celle qui fait fi de la justice est un trône de déshonneur. Les indolents manquent de ressources, les brutes acquièrent la richesse. –  se saisit de (ou assure 5.5n) la gloire 29.23.
  - type: text
    content: Une femme gracieuse se saisit de la gloire ;
  - type: text
    content: les brutes se saisissent de la richesse.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'fidèle  : autre traduction bienveillant . –  se fait du bien  : autre traduction se récompense . –  homme cruel  : cf. Siracide 14.6 : « Il n''y a pas pire que celui qui se maltraite soi-même, c''est là la rançon de sa méchanceté. » –  attire le malheur v. 29 ; 15.6,27 ; Gn 34.30+.'
  - type: text
    content: L'homme fidèle se fait du bien à lui-même ;
  - type: text
    content: l'homme cruel attire le malheur sur sa propre chair.
  '18':
  - type: text
    content: ' '
  - type: note
    content: gain ou salaire (le mot hébreu est un synonyme de celui qui est traduit par salaire dans la deuxième partie du verset) ; cf. 2Co 9.6 ; Ga 6.8.
  - type: text
    content: Le méchant se procure un gain trompeur ;
  - type: text
    content: celui qui sème la justice a un salaire véritable.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Ainsi…  : un ms hébreu porte un fils de justice , c.-à-d. un juste . LXX, Syr un fils juste  ; certains modifient le texte hébreu traditionnel pour lire celui qui acquiert la justice ou celui qui pèse justement (cf. 16.2 ; 21.2 ; 24.12).'
  - type: text
    content: Ainsi la justice aboutit à la vie ;
  - type: text
    content: celui qui poursuit le mal aboutit à sa mort.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Les mots hébreux correspondant à arrogance et mépris (3.35) font assonance ; cf. 16.18 ; 18.3. –  modestes  : cf. 13.10 ; 15.33 ; 18.12 ; 21.24 ; 29.23.'
  - type: text
    content: Quand vient l'arrogance vient aussi le mépris ;
  - type: text
    content: la sagesse est avec les modestes.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'cœurs tortueux  : cf. Ps 101.4+. –  sont une abomination 12.22 ; 15.9.'
  - type: text
    content: 'Les cœurs tortueux sont une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: sa faveur est pour ceux qui vont dans la voie de l'intégrité.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'En aucun cas  : litt. main à main , expression habituellement interprétée comme une allusion au geste marquant la conclusion d''un contrat ; on pourrait aussi comprendre quoi qu''il fasse, quelles que soient ses alliances ou ses protections, le mauvais ne sera pas…  ; de même en 16.5. –  ne sera tenu pour innocent  : autre traduction ne restera impuni 16.5 ; cf. 12.21. –  sera délivrée  : litt. s''échappera.'
  - type: text
    content: En aucun cas le mauvais ne sera tenu pour innocent ;
  - type: text
    content: la descendance des justes sera délivrée.
  '22':
  - type: text
    content: Un anneau d'or au groin d'un cochon,
  - type: text
    content: telle est une femme belle et dépourvue de jugement.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'le bonheur  : autre traduction le bien . –  l''espoir…  : LXX l''espoir des méchants se perd  ; cf. 10.28.'
  - type: text
    content: Le désir des justes, c'est le bonheur ;
  - type: text
    content: l'espoir des méchants, c'est la colère.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'devient plus riche  : litt. et il lui est encore ajouté . –  ne fait que s''appauvrir  : litt. seulement pour la privation.'
  - type: text
    content: Tel, qui fait des largesses, devient plus riche ;
  - type: text
    content: tel, qui épargne à l'excès, ne fait que s'appauvrir.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui répand la bénédiction  : autre traduction la personne généreuse , v. 11 ; Ps 112.9 ; 2Co 9.9 ; cf. Es 58.7-11 ; Mt 7.2 ; 10.42. –  est dans l''abondance  : litt. engraisse  ; de même 13.4 ; 28.25 ; cf. 15.30. –  celui qui abreuve  : autres traductions celui qui arrose ; celui qui désaltère  ; cf. 5.19n.'
  - type: text
    content: Celui qui répand la bénédiction est dans l'abondance ;
  - type: text
    content: celui qui abreuve est lui-même abreuvé.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'le voue…  : cf. 24.24 ; Nb 22.11n.'
  - type: text
    content: Celui qui refuse le blé, le peuple le voue à la malédiction ;
  - type: text
    content: la bénédiction est sur la tête de celui qui vend le grain.
  '27':
  - type: text
    content: ' '
  - type: note
    content: la faveur (de Dieu) ; on pourrait aussi comprendre celui qui tend vers le bien, la faveur le recherchera  ; cf. 5.22 ; 8.35 ; 9.16 ; 10.2 ; 12.2 ; Ps 7.17.
  - type: text
    content: Celui qui tend vers le bien recherche la faveur ;
  - type: text
    content: celui qui cherche le mal, le mal lui arrive.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'les justes s''épanouissent  : cf. Ps 1.3s ; 52.9s ; 92.13 ; Mc 10.23.'
  - type: text
    content: Celui qui met sa confiance dans ses richesses tombe ;
  - type: text
    content: les justes s'épanouissent comme le feuillage.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui attire le malheur…  : sur le verbe hébreu correspondant, cf. v. 17+ ; en s''appuyant sur LXX qui porte une négation, on a aussi compris celui qui n''oriente pas bien sa maison (sera importuné par le vent)  ; mais le texte grec signifie sans doute plutôt celui qui ne s''occupe pas bien de sa maison . –  l''imbécile 1.7n  ; on pourrait aussi comprendre il sera l''esclave de l''imbécile, pour l''homme au cœur sage.'
  - type: text
    content: Celui qui attire le malheur sur sa maison aura le vent pour patrimoine ;
  - type: text
    content: l'imbécile sera l'esclave de l'homme au cœur sage.
  '3':
  - type: text
    content: ' '
  - type: note
    content: L'intégrité 13.6. –  traîtres v. 6 ; 2.22 ; 13.2,15 ; 21.18 ; 22.12 ; 23.28 ; 25.19.
  - type: text
    content: L'intégrité des gens droits les conduit ;
  - type: text
    content: mais la perversité des traîtres les détruit.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'du juste  : LXX de la justice  ; cf. Ps 1. –  arbre de vie  : cf. 3.8 ; Gn 2.9. –  le sage…  : LXX les violents sont enlevés avant leur temps . –  s''empare des gens  : sens incertain ; autres traductions acquiert des gens (une grande maisonnée ? des disciples ?) ; prend des vies.'
  - type: text
    content: Le fruit du juste est un arbre de vie ;
  - type: text
    content: le sage s'empare des gens.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1P 4.17s. –  est payé de retour  : cf. Ps 37.25s. – Voir péché.'
  - type: text
    content: Si le juste est payé de retour sur la terre,
  - type: text
    content: à plus forte raison le méchant et le pécheur !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ce v. est absent de LXX. –  fortune Ps 49.7-9. –  jour de la colère Ez 7.19 ; So 1.18 ; Jb 21.30. –  justice ou générosité , 10.2n.
  - type: text
    content: La fortune ne sert à rien au jour de la colère ;
  - type: text
    content: c'est la justice qui délivre de la mort.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 6. –  aplanit  : autre traduction rend droite  ; cf. 3.6 ; Es 40.3 ; 45.13. –  par sa méchanceté ou dans sa méchanceté.'
  - type: text
    content: La justice de l'homme intègre aplanit sa voie ;
  - type: text
    content: le méchant tombe par sa méchanceté.
  '6':
  - type: text
    content: ' '
  - type: note
    content: avidité 10.3n. –  traîtres v. 3+.
  - type: text
    content: La justice des gens droits les délivre ;
  - type: text
    content: par leur avidité, les traîtres sont pris au piège.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'du méchant  : litt. de l''homme méchant . LXX à la mort de l''homme juste, son espoir ne disparaît pas, mais la fierté des impies disparaît  ; cf. 10.28n.'
  - type: text
    content: A la mort du méchant, son espoir disparaît ;
  - type: text
    content: le mal qu'il attendait se perd.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Le juste… Ps 34.20.
  - type: text
    content: Le juste est délivré de la détresse ;
  - type: text
    content: le méchant y vient à sa place.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Par sa bouche…  : cf. 29.5.'
  - type: text
    content: Par sa bouche l'impie veut détruire son prochain ;
  - type: text
    content: les justes sont délivrés par la connaissance.
