segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'obscurité épaisse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 20.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors Salomon dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a dit qu''il demeurerait dans l''obscurité épaisse !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et moi, j'ai bâti une maison qui sera ta résidence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un lieu où tu habiteras toujours !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Discours de consécration du temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1R 8.14-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi se retourna et bénit toute l''assemblée d''Israël. Toute l''assemblée d''Israël était debout. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Béni
      - type: text
        text: ' soit le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ', le Dieu d''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 1.48+.
    marker-yv: yv-n
  - type: text
    text: 'Il dit : Béni soit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël, qui, de sa bouche, a parlé à David, mon père, et qui, de ses mains, a accompli ce qu''il avait dit : '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'où résiderait mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour que mon nom soit là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même expression au v. 6 ; 7.16 ; cf. 1R 8.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '« Depuis le jour où j''ai fait sortir d''Egypte mon peuple, je n''ai pas choisi de ville parmi toutes les tribus d''Israël pour qu''y soit bâtie une maison où résiderait mon nom, et je n''ai pas choisi d''homme pour qu''il soit chef sur Israël, mon peuple ; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'mais j''ai choisi Jérusalem pour que mon nom y réside, et j''ai choisi David pour qu''il soit à la tête d''Israël, mon peuple. » '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'a eu à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2S 7.3.
    marker-yv: yv-n
  - type: text
    text: 'David, mon père, a eu à cœur de bâtir une maison pour le nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a dit à David, mon père : « Puisque tu as eu à cœur de bâtir une maison pour mon nom, tu as bien fait d''avoir eu cela à cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce sera ton fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : plusieurs mss hébreux, certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', ainsi que '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mais ce sera ton fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 1R 8.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: maison pour mon nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2S 7.12s.'
    marker-yv: yv-n
  - type: text
    text: 'Seulement, ce n''est pas toi qui bâtiras la Maison ; ce sera ton fils, celui qui est sorti de tes reins ; c''est lui qui bâtira la maison pour mon nom. » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a réalisé la parole qu''il avait dite. J''ai succédé à David, mon père, je me suis assis sur le trône d''Israël, comme l''avait dit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et j''ai bâti la maison pour le nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'alliance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tablettes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (de pierre) de 5.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'J''y ai mis le coffre où est l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', celle qu''il a conclue avec les Israélites.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La prière solennelle de Salomon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1R 8.22-53
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il se tint debout devant l''autel du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', en face de toute l''assemblée d''Israël. Il tendit les mains. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: En effet… les mains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette portion est absente de 1R 8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: longue de cinq coudées…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à peu près 2,25 m x 2,25 m x 1,35 m ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se mit à genoux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il s'agenouilla sur ses genoux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 7.1 ; voir aussi 1R 8.22,54.'
    marker-yv: yv-n
  - type: text
    text: 'En effet, Salomon avait fait une tribune de bronze, et l''avait placée à l''intérieur de l''enceinte ; elle était longue de cinq coudées, large de cinq coudées et haute de trois coudées. Il s''y tint et se mit à genoux en face de toute l''assemblée d''Israël. Il tendit les mains vers le ciel '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu gardes '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'alliance
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 7.9,12.
    marker-yv: yv-n
  - type: text
    text: 'et dit : '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), Dieu d''Israël, il n''y a pas de dieu semblable à toi, ni dans le ciel, ni sur la terre : tu gardes l''alliance et la fidélité envers tes serviteurs qui marchent devant toi de tout leur cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voilà pourquoi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 2.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi tu as gardé pour ton serviteur David, mon père, ce que tu lui avais dit ; ce que tu avais dit, de ta bouche, tu l''as accompli de ta main – voilà pourquoi il en est ainsi en ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu auras toujours… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 2.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'suivent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: marchent dans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'as marché '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent deux formes du même verbe hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ma loi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans mon nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', les mots grecs pour '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'loi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nom '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont proches.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', Dieu d''Israël, garde pour ton serviteur David, mon père, ce que tu lui as dit : « Tu auras toujours devant moi un successeur assis sur le trône d''Israël, pourvu que tes fils gardent leur voie et qu''ils suivent ma loi comme tu as marché devant moi. » '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ton serviteur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 1R 8.26 ajoute '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon père.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', Dieu d''Israël, que se confirme la parole que tu as dite à David, ton serviteur !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le ciel et le ciel du ciel…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2.4s.'
    marker-yv: yv-n
  - type: text
    text: 'Mais Dieu habiterait-il vraiment avec l''être humain sur la terre ? Le ciel et le ciel du ciel ne peuvent te contenir : combien moins cette maison que j''ai bâtie ! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je t'adresse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aujourd'hui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1R 8.28.'
    marker-yv: yv-n
  - type: text
    text: 'Cependant, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', mon Dieu, tu te tourneras vers ma prière, ma supplication, pour entendre le cri, la prière, que moi, ton serviteur, je t''adresse. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que tes yeux… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 40. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu y placerais ton '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 1R 9.3+.
    marker-yv: yv-n
  - type: text
    text: 'Que tes yeux soient ouverts jour et nuit sur cette maison, sur le lieu dont tu as dit que tu y placerais ton nom ! Entends la prière que je fais vers ce lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 23,25 ; 1R 8.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Tu entendras mes supplications et celles d'Israël, ton peuple, lorsque nous prierons vers ce lieu. Toi, tu entendras, de ce lieu que tu habites, depuis le ciel ; tu entendras et tu pardonneras.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
