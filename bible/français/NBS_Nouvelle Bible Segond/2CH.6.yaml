    marker-yv: yv-n
  - type: text
    text: 'Quand ton peuple partira en guerre contre ses ennemis, par le chemin sur lequel tu l''auras envoyé, s''ils te prient dans la direction de cette ville que tu as choisie et de la maison que j''ai bâtie pour ton nom, '
