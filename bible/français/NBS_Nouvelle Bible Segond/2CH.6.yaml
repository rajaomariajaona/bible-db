    marker-yv: yv-n
  - type: text
    text: 'Quand ils pécheront contre toi, – car il n''y a pas d''être humain qui ne pèche – quand tu seras en colère contre eux et que tu les livreras devant l''ennemi, quand ceux qui les auront faits captifs les emmèneront en captivité dans un pays lointain ou proche, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 's''ils réfléchissent dans le pays où ils auront été emmenés captifs, s''ils reviennent, s''ils t''adressent des supplications au pays de leur captivité et qu''ils disent : « Nous avons péché, nous avons commis des fautes, nous avons agi en méchants ! », '
  - type: usfm
    marker: v
    metadata:
