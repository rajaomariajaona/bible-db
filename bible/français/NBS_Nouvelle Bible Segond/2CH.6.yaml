document_id: 2CH.6,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: obscurité épaisse Ex 20.21n.
  - type: text
    content: 'Alors Salomon dit :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit qu''il demeurerait dans l''obscurité épaisse !'
  '10':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a réalisé la parole qu''il avait dite. J''ai succédé à David, mon père, je me suis assis sur le trône d''Israël, comme l''avait dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et j''ai bâti la maison pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '11':
  - type: note
    content: 'l''alliance  : il s''agit des tablettes (de pierre) de 5.10n.'
  - type: text
    content: 'J''y ai mis le coffre où est l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', celle qu''il a conclue avec les Israélites.'
  - type: heading
    content: La prière solennelle de Salomon
  - type: heading
    content: 1R 8.22-53
  '12':
  - type: text
    content: 'Il se tint debout devant l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', en face de toute l''assemblée d''Israël. Il tendit les mains. '
  '13':
  - type: note
    content: 'En effet… les mains  : cette portion est absente de 1R 8. –  longue de cinq coudées…  : à peu près 2,25 m x 2,25 m x 1,35 m ; voir mesures. –  se mit à genoux  : litt. il s''agenouilla sur ses genoux  ; cf. 7.1 ; voir aussi 1R 8.22,54.'
  - type: text
    content: 'En effet, Salomon avait fait une tribune de bronze, et l''avait placée à l''intérieur de l''enceinte ; elle était longue de cinq coudées, large de cinq coudées et haute de trois coudées. Il s''y tint et se mit à genoux en face de toute l''assemblée d''Israël. Il tendit les mains vers le ciel '
  '14':
  - type: note
    content: tu gardes l'alliance Dt 7.9,12.
  - type: text
    content: 'et dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), Dieu d''Israël, il n''y a pas de dieu semblable à toi, ni dans le ciel, ni sur la terre : tu gardes l''alliance et la fidélité envers tes serviteurs qui marchent devant toi de tout leur cœur. '
  '15':
  - type: note
    content: 'voilà pourquoi…  : cf. Dt 2.30n.'
  - type: text
    content: 'Ainsi tu as gardé pour ton serviteur David, mon père, ce que tu lui avais dit ; ce que tu avais dit, de ta bouche, tu l''as accompli de ta main – voilà pourquoi il en est ainsi en ce jour. '
  '16':
  - type: note
    content: 'Tu auras toujours… 1R 2.4n. –  suivent (litt. marchent dans) et as marché traduisent deux formes du même verbe hébreu. –  ma loi  : un ms de LXX porte dans mon nom, les mots grecs pour loi et nom sont proches.'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Israël, garde pour ton serviteur David, mon père, ce que tu lui as dit : « Tu auras toujours devant moi un successeur assis sur le trône d''Israël, pourvu que tes fils gardent leur voie et qu''ils suivent ma loi comme tu as marché devant moi. » '
  '17':
  - type: note
    content: 'ton serviteur  : 1R 8.26 ajoute mon père.'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Israël, que se confirme la parole que tu as dite à David, ton serviteur !'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Le ciel et le ciel du ciel…  : cf. 2.4s.'
  - type: text
    content: 'Mais Dieu habiterait-il vraiment avec l''être humain sur la terre ? Le ciel et le ciel du ciel ne peuvent te contenir : combien moins cette maison que j''ai bâtie ! '
  '19':
  - type: note
    content: 'je t''adresse  : LXX et Syr ajoutent aujourd''hui, cf. 1R 8.28.'
  - type: text
    content: 'Cependant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, tu te tourneras vers ma prière, ma supplication, pour entendre le cri, la prière, que moi, ton serviteur, je t''adresse. '
  '2':
  - type: text
    content: Et moi, j'ai bâti une maison qui sera ta résidence,
  - type: text
    content: un lieu où tu habiteras toujours !
  - type: heading
    content: Discours de consécration du temple
  - type: heading
    content: 1R 8.14-21
  '20':
  - type: note
    content: Que tes yeux… v. 40. –  tu y placerais ton nom cf. 1R 9.3+.
  - type: text
    content: 'Que tes yeux soient ouverts jour et nuit sur cette maison, sur le lieu dont tu as dit que tu y placerais ton nom ! Entends la prière que je fais vers ce lieu. '
  '21':
  - type: note
    content: V. 23,25 ; 1R 8.30n.
  - type: text
    content: Tu entendras mes supplications et celles d'Israël, ton peuple, lorsque nous prierons vers ce lieu. Toi, tu entendras, de ce lieu que tu habites, depuis le ciel ; tu entendras et tu pardonneras.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Voir péché. –  adjuration  : le même terme est traduit par malédictions en 34.24.'
  - type: text
    content: 'Si quelqu''un commet un péché contre son prochain et qu''on lui impose une adjuration, s''il vient pour l''adjuration devant ton autel, dans cette maison, '
  '23':
  - type: note
    content: '1R 8.30n,32n. –  punir  : litt. faire revenir, c.-à-d. rendre (au méchant selon le mal qu''il a fait). –  sa voie ou sa conduite, cf. v. 27,30s. –  le traiter selon sa justice 1S 26.23.'
  - type: text
    content: toi, tu entendras, depuis le ciel ; tu agiras et tu jugeras tes serviteurs, pour punir le coupable et faire retomber sa voie sur sa tête, pour acquitter le juste et le traiter selon sa justice.
  '24':
  - type: text
    content: 'Si Israël, ton peuple, est battu par l''ennemi, parce qu''ils auront péché contre toi, s''ils reviennent et célèbrent ton nom, s''ils t''adressent des prières, des supplications, dans cette maison, '
  '25':
  - type: note
    content: 'V. 21n. –  la terre  : cf. Gn 2.5n. –  que tu leur as donnée, à eux et à leurs pères  : cf. 1R 8.34.'
  - type: text
    content: toi, tu entendras, depuis le ciel. Tu pardonneras le péché d'Israël, ton peuple ; tu les ramèneras sur la terre que tu leur as donnée, à eux et à leurs pères.
  '26':
  - type: text
    content: 'Quand le ciel sera fermé et qu''il n''y aura pas de pluie, parce qu''ils auront péché contre toi ; s''ils prient vers ce lieu, célèbrent ton nom et reviennent de leurs péchés, parce que tu les auras affligés, '
  '27':
  - type: note
    content: 'V. 21n  ; cf. 1R 8.36+. –  enseigneras  : le verbe hébreu correspondant est apparenté au terme hébreu tora habituellement traduit par loi ou enseignement.'
  - type: text
    content: toi, tu entendras, dans le ciel ; tu pardonneras le péché de tes serviteurs, celui d'Israël, ton peuple. Car tu leur enseigneras la bonne voie qu'ils doivent suivre, et tu feras venir la pluie sur ton pays, celui que tu as donné comme patrimoine à ton peuple.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'quand l''ennemi…  : litt. quand ses ennemis l''assiégeront dans le pays . –  assiégera  : le verbe hébreu correspondant est traduit par être dans la détresse en 28.22n.'
  - type: text
    content: 'Quand il y aura la famine dans le pays, quand il y aura la peste, quand il y aura la rouille et la nielle, le criquet et la sauterelle, quand l''ennemi assiégera ton peuple dans son pays, aux portes de ses villes, quand il y aura toutes sortes de fléaux et de maladies, '
  '29':
  - type: note
    content: tendra les mains v. 12s ; 1R 8.22n.
  - type: text
    content: 'chaque prière, chaque supplication de tout homme et de tout ton peuple, Israël – alors que chacun, connaissant sa plaie et sa douleur, tendra les mains vers cette maison, '
  '3':
  - type: text
    content: 'Le roi se retourna et bénit toute l''assemblée d''Israël. Toute l''assemblée d''Israël était debout. '
  '30':
  - type: note
    content: 'V. 21n,33. –  le lieu que tu habites  : cf. v. 21+,33.'
  - type: text
    content: 'toi, tu entendras, depuis le ciel, le lieu que tu habites ; tu pardonneras et tu rendras à chacun selon ses voies, parce que tu connais son cœur ; toi seul connais le cœur des humains. '
  '31':
  - type: note
    content: 'Voir crainte. –  sur la terre  : litt. sur la face du sol, cf. v. 25 ; Gn 2.5n.'
  - type: text
    content: Ainsi ils te craindront et suivront tes voies tous les jours qu'ils vivront sur la terre que tu as donnée à nos pères.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'quand on viendra prier…  : voir Es 56.6s.'
  - type: text
    content: 'De même pour l''étranger, celui qui n''est pas d''Israël, ton peuple ; quand il viendra d''un pays lointain, à cause de ton grand nom, de ta main forte et de ton bras étendu ; quand on viendra prier vers cette maison, '
  '33':
  - type: note
    content: V. 30n.
  - type: text
    content: toi, tu entendras, depuis le ciel, depuis le lieu que tu habites, et tu accorderas à l'étranger tout ce pour quoi il t'aura invoqué, afin que tous les peuples de la terre connaissent ton nom et te craignent, comme Israël, ton peuple, et qu'ils sachent que ton nom est invoqué sur cette maison que j'ai bâtie !
  '34':
  - type: text
    content: ' '
  - type: note
    content: dans la direction de cette ville v. 38.
  - type: text
    content: 'Quand ton peuple partira en guerre contre ses ennemis, par le chemin sur lequel tu l''auras envoyé, s''ils te prient dans la direction de cette ville que tu as choisie et de la maison que j''ai bâtie pour ton nom, '
  '35':
  - type: text
    content: depuis le ciel tu entendras leurs prières, leurs supplications, et tu défendras leur droit !
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'un pays  : 1R 8.46 précise un pays ennemi.'
  - type: text
    content: 'Quand ils pécheront contre toi, – car il n''y a pas d''être humain qui ne pèche – quand tu seras en colère contre eux et que tu les livreras devant l''ennemi, quand ceux qui les auront faits captifs les emmèneront en captivité dans un pays lointain ou proche, '
  '37':
  - type: text
    content: 's''ils réfléchissent dans le pays où ils auront été emmenés captifs, s''ils reviennent, s''ils t''adressent des supplications au pays de leur captivité et qu''ils disent : « Nous avons péché, nous avons commis des fautes, nous avons agi en méchants ! », '
  '38':
  - type: note
    content: 'de tout leur cœur et de toute leur âme 1R 2.4+. –  en direction du pays… de la ville…  : cf. v. 34+.'
  - type: text
    content: 's''ils reviennent à toi de tout leur cœur et de toute leur âme et si, au pays de leur captivité, où on les a emmenés captifs, ils te prient en direction du pays que tu as donné à leurs pères, de la ville que tu as choisie et de la maison que j''ai bâtie pour ton nom, '
  '39':
  - type: note
    content: 'V. 30n. –  Tu pardonneras…  : cf. v. 21,25,27,30.'
  - type: text
    content: 'depuis le ciel, du lieu que tu habites, tu entendras leurs prières, leurs supplications, et tu défendras leur droit. Tu pardonneras à ton peuple, qui a péché contre toi. '
  '4':
  - type: note
    content: Béni soit le Seigneur, le Dieu d'Israël 1R 1.48+.
  - type: text
    content: 'Il dit : Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, qui, de sa bouche, a parlé à David, mon père, et qui, de ses mains, a accompli ce qu''il avait dit : '
  '40':
  - type: note
    content: 'que tes yeux soient ouverts…  : cf. 7.15 ; 1R 8.52n  ; Né 1.6.'
  - type: text
    content: Maintenant, mon Dieu, je t'en prie, que tes yeux soient ouverts, et que tes oreilles soient attentives à la prière de ce lieu !
  - type: heading
    content: Ps 132.8-10
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'viens  : sous-entendu dans le texte. –  ton lieu de repos  : terme apparenté en Ps 132.8. –  se revêtent de salut (cf. Ps 132.9 de justice ) : cf. Es 51.9 ; 59.17 ; Ps 35.26 ; 109.18s,29 ; Jb 29.14. –  dans leur bonheur  : autre traduction dans le bien.'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, lève-toi, viens à ton lieu de repos,'
  - type: text
    content: toi et le coffre de ta puissance !
  - type: text
    content: 'Que tes prêtres, '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, se revêtent de salut,'
  - type: text
    content: que tes fidèles se réjouissent dans leur bonheur !
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'ne repousse pas…  : litt. ne détourne pas la face de…  ; cf. Ps 132.10 ; voir aussi 1R 2.16s,20 ; Es 55.3n. –  l''homme qui a reçu ton onction 1S 2.10+. –  a fait avec fidélité  : cf. 32.32 ; 35.26 ; Ps 17.7+.'
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, ne repousse pas l''homme qui a reçu ton onction !'
  - type: text
    content: Souviens-toi de ce que David, ton serviteur, a fait avec fidélité !
  '5':
  - type: note
    content: 'où résiderait mon nom  : litt. pour que mon nom soit là, même expression au v. 6 ; 7.16 ; cf. 1R 8.16n.'
  - type: text
    content: '« Depuis le jour où j''ai fait sortir d''Egypte mon peuple, je n''ai pas choisi de ville parmi toutes les tribus d''Israël pour qu''y soit bâtie une maison où résiderait mon nom, et je n''ai pas choisi d''homme pour qu''il soit chef sur Israël, mon peuple ; '
  '6':
  - type: text
    content: 'mais j''ai choisi Jérusalem pour que mon nom y réside, et j''ai choisi David pour qu''il soit à la tête d''Israël, mon peuple. » '
  '7':
  - type: note
    content: a eu à cœur 2S 7.3.
  - type: text
    content: 'David, mon père, a eu à cœur de bâtir une maison pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '8':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit à David, mon père : « Puisque tu as eu à cœur de bâtir une maison pour mon nom, tu as bien fait d''avoir eu cela à cœur. '
  '9':
  - type: note
    content: 'ce sera ton fils  : plusieurs mss hébreux, certains mss de LXX, ainsi que Syr et Vg portent mais ce sera ton fils, comme en 1R 8.19. –  maison pour mon nom  : cf. 2S 7.12s.'
  - type: text
    content: 'Seulement, ce n''est pas toi qui bâtiras la Maison ; ce sera ton fils, celui qui est sorti de tes reins ; c''est lui qui bâtira la maison pour mon nom. » '
