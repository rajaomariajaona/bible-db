      text: '24'
  - type: text
    text: 'Si Israël, ton peuple, est battu par l''ennemi, parce qu''ils auront péché contre toi, s''ils reviennent et célèbrent ton nom, s''ils t''adressent des prières, des supplications, dans cette maison, '
