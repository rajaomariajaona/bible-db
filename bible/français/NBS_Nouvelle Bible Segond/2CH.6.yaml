  - type: text
    text: toi, tu entendras, depuis le ciel, depuis le lieu que tu habites, et tu accorderas à l'étranger tout ce pour quoi il t'aura invoqué, afin que tous les peuples de la terre connaissent ton nom et te craignent, comme Israël, ton peuple, et qu'ils sachent que ton nom est invoqué sur cette maison que j'ai bâtie !
