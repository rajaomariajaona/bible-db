    marker-yv: yv-n
  - type: text
    text: 'De même pour l''étranger, celui qui n''est pas d''Israël, ton peuple ; quand il viendra d''un pays lointain, à cause de ton grand nom, de ta main forte et de ton bras étendu ; quand on viendra prier vers cette maison, '
  - type: usfm
