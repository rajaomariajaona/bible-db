  - type: text
    text: 'Quand il y aura la famine dans le pays, quand il y aura la peste, quand il y aura la rouille et la nielle, le criquet et la sauterelle, quand l''ennemi assiégera ton peuple dans son pays, aux portes de ses villes, quand il y aura toutes sortes de fléaux et de maladies, '
