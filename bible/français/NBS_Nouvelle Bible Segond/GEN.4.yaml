        - type: text
          text: '1Jn 3.12-15. –  '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Targum du pseudo-Jonathan : Caïn dit à son frère Abel : « Viens, sortons tous deux dans la campagne. » Et il advint que lorsque tous deux furent sortis dans la campagne, Caïn répondit et dit à Abel : « Je vois que le monde a été créé par amour mais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '['
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Neofiti : n''a pas été créé par amour (et)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''il n''est pas régi selon le fruit des bonnes œuvres et qu''il y a, dans le jugement, acception de personnes. Pourquoi ton offrande a-t-elle été accueillie avec faveur et mon offrande à moi n''a-t-elle pas été accueillie avec faveur ? » Abel répondit à Caïn, en disant : « Le monde a été créé par amour et il est régi selon le fruit des bonnes œuvres et il n''y a point dans le jugement acception de personnes. Parce que les fruits de mes œuvres étaient meilleurs que les tiens et antérieurs aux tiens, mon offrande a été accueillie avec faveur. » Caïn répondit et dit à Abel : « Il n''y a ni jugement ni juge ni un autre monde ! Point de remise de récompense pour les justes ni de châtiment pour les méchants ! » Abel répliqua à Caïn, en disant : « Il y a un jugement et il y a un juge et il y a un autre monde ; il y a remise de récompense pour les justes et un châtiment pour les méchants ! » Sur ces questions, ils se querellaient en pleine campagne. Et Caïn se dressa contre son frère Abel et, lui enfonçant une pierre dans le front, le tua.'
