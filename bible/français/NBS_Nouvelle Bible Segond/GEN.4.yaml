document_id: GEN.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Caïn et Abel
  - type: text
    content: ' '
  - type: note
    content: 'L''homme  : cf. v. 25 ; 1.26n. –  eut (ou avait eu ) des relations avec  : litt. connut ou avait connu  ; de même aux v. 17,25 ; 19.5,8 ; 24.16 ; 38.26 ; Nb 31.17ss ; Jg 11.39 ; 19.22 ; 21.11. –  J''ai produit ou, selon certains, j''ai acquis, j''ai conçu, j''ai enfanté  : le nom de Caïn (hébreu qayin ) est rapproché du verbe qana , que l''on peut comprendre dans l''une ou l''autre de ses acceptions  : produire , voire créer ou procréer (14.19n,22 ; Dt 32.6 ; Ps 78.54 ; 139.13n  ; Pr 8.22n), mais aussi acheter, acquérir (Gn 25.10 ; 33.19). Cf. Caïnân ou Qénân 5.9 et les Caïnites ou Qénites 15.19 ; Nb 10.29 ; 24.21ss ; Jg 1.16 ; 4.11n. Indépendamment du meurtre d''Abel (v. 2-16), la généalogie rattachera à Caïn toutes les acquisitions de la civilisation : les villes, les arts, le travail des métaux, mais aussi la violence (v. 17,21ss). –  avec  : c''est le sens le plus courant de la préposition qui apparaît ici ; certains comprennent avec l''aide du Seigneur  ; d''autres au même titre que le Seigneur (YHWH).'
  - type: text
    content: 'L''homme eut des relations avec Eve, sa femme ; elle fut enceinte et mit au monde Caïn. Elle dit : J''ai produit un homme avec le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '10':
  - type: note
    content: 'Qu''as-tu fait ? 3.11,13 ; cf. 2S 12 ; 1R 21. –  Le sang  : litt. la voix des sangs 9.4-6 ; 37.26 ; Es 26.21 ; Ez 3.18n  ; Jb 16.18n  ; Mt 23.35. –  crie 18.21 ; Ps 34.18 ; Jc 5.4 ; cf. Hé 11.4 ; 12.24. –  terre le terme hébreu (’adama, 2.5n) fait assonance avec celui qui est traduit par sang (dam) 9.6n  ; Nb 35.33 ; Ez 24.7ns.'
  - type: text
    content: 'Alors il reprit : Qu''as-tu fait ? Le sang de ton frère crie de la terre jusqu''à moi. '
  '11':
  - type: note
    content: 'maudit (3.14n,17), chassé (sous-entendu dans le texte) de la terre (’adama, v. 2 ; 2.5n) : autres traductions maudit de la terre ou maudit à cause de la terre. Voir bénédiction.'
  - type: text
    content: 'Maintenant, tu seras maudit, chassé de la terre qui a ouvert sa bouche pour recevoir de ta main le sang de ton frère. '
  '12':
  - type: note
    content: 'cultiveras la terre v. 2n. –  sa force  : autre traduction son produit. –  errant / vagabond  : hébreu na‘ (Am 4.8 ; 8.12 ; 9.4,9 ; Ps 109.10 ; Jb 15.22s ; Lm 4.14s) / nad (proprement  : en mouvement, cf. Nod v. 16 ; Jr 4.1 ; Ps 56.9). Cf. Pr 28.17.'
  - type: text
    content: 'Quand tu cultiveras la terre, elle ne te donnera plus sa force. Tu seras errant et vagabond sur la terre. '
  '13':
  - type: note
    content: 'Ma faute…  : autre traduction ma peine est trop lourde pour être supportée (un même mot hébreu désigne la faute et la peine qui en résulte) ; mais on pourrait aussi comprendre ma faute est trop grande pour être enlevée, c.-à-d. pardonnée (v. 7n  ; cf. 50.17n  ; Ez 4.4n).'
  - type: text
    content: 'Caïn dit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Ma faute est trop grande pour être prise en charge. '
  '14':
  - type: note
    content: 'Tu me chasses 3.22. –  de cette terre  : litt. de la face du sol (’adama, 2.5n) ; cf. 4.2n. –  je serai caché, tu ne me verras plus  : litt. je serai caché (ou je devrai me cacher) de ta face (ou de devant toi) ; cf. Am 9.3s ; Ps 139.7-12.'
  - type: text
    content: 'Tu me chasses aujourd''hui de cette terre ; je serai caché, tu ne me verras plus, je serai errant et vagabond sur la terre ; et si quelqu''un me trouve, il me tuera. '
  '15':
  - type: note
    content: 'Alors…  : certains modifient le texte hébreu traditionnel pour lire pas du tout ! si quelqu''un…  ; cf. v. 24 ; 26.11 ; 31.32 ; 44.9s. –  signe  : cf. 1.14 ; 9.12s,17 ; 17.11 etc. ; voir aussi Ez 9.4n  ; certains ont vu dans cette marque protectrice une allusion à une sorte de tatouage qui aurait distingué les Caïnites (cf. v. 1n), mais l''existence d''une telle marque n''est pas établie.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Alors, si quelqu''un tue Caïn, on le vengera sept fois. Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' mit un signe sur Caïn pour que ceux qui le trouveraient ne l''abattent pas. '
  '16':
  - type: note
    content: 'de devant le Seigneur  : autre traduction loin du Seigneur  ; cf. v. 14n  ; 41.46 ; 47.10 ; Jon 1.3n. –  s''installa ou habita, même verbe au v. 20. –  Nod (nom de lieu par ailleurs inconnu) signifie peut-être vagabondage, mouvement  ; le terme fait assonance avec celui qui est traduit par vagabond aux v. 12n,14. –  à l''est 2.8n  ; 3.24.'
  - type: text
    content: 'Puis Caïn se retira de devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et s''installa au pays de Nod (« Vagabondage »), à l''est d''Eden.'
  - type: heading
    content: Les descendants de Caïn
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'eut des relations avec v. 1n. –  Hénoch  : la racine hébraïque correspondant le plus vraisemblablement à ce nom signifie dédier, inaugurer  ; de la même racine dérive le nom hébreu de la fête de la Dédicace, Hanoukka . Cf. 5.18-24 ; 25.4 ; 46.9 ; Esd 6.16n  ; Jn 10.22n. –  Il se mit…  : certains modifient le texte hébreu traditionnel pour lire celui-ci (Hénoch) devint bâtisseur d''une ville et il appela cette ville de son propre nom, Hénoch  ; cf. 11.1-11.'
  - type: text
    content: 'Caïn eut des relations avec sa femme ; elle fut enceinte et mit au monde Hénoch. Il se mit ensuite à bâtir une ville et appela cette ville du nom d''Hénoch, son fils. '
  '18':
  - type: note
    content: 'Irad  : le nom rappelle le terme hébreu traduit par ville au v. 17. Cf. Yéred 5.15. –  Mehouyaël  : la seconde fois le texte hébreu traditionnel porte Méhiyaël  ; cf. Mahalaléel 5.12. –  Metoushaël  : cf. Mathusalem (hébreu Metoushélah) 5.21. –  Lémek  : cf. 5.25.'
  - type: text
    content: 'D''Hénoch naquit Irad ; Irad engendra Mehouyaël, Mehouyaël engendra Metoushaël, et Metoushaël engendra Lémek. '
  '19':
  - type: note
    content: 'Ada  : Ornement ( ?). –  Tsilla  : Ombre ( ?).'
  - type: text
    content: 'Lémek prit deux femmes : le nom de l''une était Ada et le nom de l''autre Tsilla. '
  '2':
  - type: note
    content: 'Le nom Abel (hébreu hével) signifie souffle, vapeur, fumée et désigne souvent la futilité du transitoire, de ce qui passe (cf. Ps 39.6s,12 ; 144.4 ; Jb 7.16 ; Ec 1.2n). –  petit bétail  : le terme hébreu correspondant désigne habituellement les moutons et les chèvres. –  cultivateur  : litt. cultivateur du sol (’adama), comme en 2.5n.'
  - type: text
    content: 'Elle mit encore au monde Abel, son frère. Abel devint berger de petit bétail et Caïn cultivateur. '
  '20':
  - type: note
    content: 'de ceux qui habitent…  : litt. de l''habitant de la tente et du troupeau, c.-à-d. des éleveurs nomades ; cf. 2Ch 14.14. Voir aussi Gn 9.21,27.'
  - type: text
    content: 'Ada mit au monde Yabal : c''est lui le père de ceux qui habitent dans des tentes et ont des troupeaux. '
  '21':
  - type: note
    content: lyre / chalumeau Ps 150.4 ; Jb 21.13 ; 30.31.
  - type: text
    content: 'Le nom de son frère était Youbal : c''est lui le père de tous ceux qui jouent de la lyre et du chalumeau. '
  '22':
  - type: note
    content: 'Toubal-Caïn  : cf. Ez 27.13. –  outils ou artisans  ; on pourrait aussi comprendre qui formait tous les artisans du bronze et du fer  ; voir 1S 13.20 ; 1R 9.26ss ; 10.22. –  Naama  : Grâce.'
  - type: text
    content: 'Tsilla, de son côté, mit au monde Toubal-Caïn, qui forgeait tous les outils de bronze et de fer. La sœur de Toubal-Caïn était Naama. '
  '23':
  - type: note
    content: 'Cf. d''autres « poèmes-slogans » Ex 15.21 ; Jg 15.16 ; 1S 17.44 ; 18.7. –  écoutez-moi  : litt. écoutez ma voix (3.8n).'
  - type: text
    content: 'Lémek dit à ses femmes :'
  - type: text
    content: Ada et Tsilla, écoutez-moi !
  - type: text
    content: Femmes de Lémek, prêtez l'oreille à ma parole !
  - type: text
    content: J'ai tué un homme pour ma blessure
  - type: text
    content: et un enfant pour ma meurtrissure.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 15 ; voir aussi Mt 18.21s.
  - type: text
    content: Si Caïn doit être vengé sept fois,
  - type: text
    content: Lémek le sera soixante-dix-sept fois !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'L''homme et Adam correspondent à un seul mot hébreu ; celui-ci est employé ici sans article, comme un nom propre ; cf. v. 1 ; 1.26n  ; 5.1nss. –  dit-elle  : sous-entendu en hébreu, ajouté en revanche par LXX et Vg. –  attribué  : hébreu shath  ; ce verbe qui signifie habituellement placer ou établir fait assonance avec le nom de Seth (en hébreu Sheth ) ; cf. 5.3.'
  - type: text
    content: 'L''homme – Adam – eut encore des relations avec sa femme ; elle mit au monde un fils et l''appela du nom de Seth (« Attribué »), car, dit-elle, Dieu m''a attribué une autre descendance à la place d''Abel, que Caïn a tué. '
  '26':
  - type: note
    content: 'Enosh  : comme Adam, ce nom signifie homme (1.26n), parfois avec la même connotation de fragilité que notre mot mortel (Ps 103.15). –  commença  : le même verbe hébreu, diversement traduit, revient en 6.1 ; 9.20 (devint) ; 10.8 (le premier) ; 11.6. –  invoquer (ou, moins probablement, proclamer) le nom du Seigneur (YHWH)  : cette expression peut suggérer une connaissance du nom divin YHWH. Mais elle pourrait aussi être prise de manière beaucoup plus générale, pour évoquer l''origine du culte 12.8 ; 13.4 ; 21.33 ; 26.25 ; cf. 2.4n  ; Ex 3.14nss ; 6.2s ; 33.19 ; Jr 10.25 ; Jl 3.5.'
  - type: text
    content: 'De Seth aussi naquit un fils qu''il appela du nom d''Enosh. C''est alors que l''on commença à invoquer le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '3':
  - type: note
    content: 'Après quelque temps  : litt. à la fin de jours  ; cf. 1R 17.7n  ; Jr 13.6n. –  fruit de la terre 3.17ss ; cf. Dt 26.2,10. –  offrande  : le même terme hébreu est traduit par présent en 32.14ss ; 33.10 ; 43.11ss ; il prend ailleurs le sens plus précis d''offrande religieuse, puis d''offrande végétale (voir Lv 2.1n) ; cf. Jg 3.15ss ; 6.18n  ; 13.19n  ; voir aussi sacrifice.'
  - type: text
    content: 'Après quelque temps, Caïn apporta du fruit de la terre en offrande au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '4':
  - type: note
    content: 'apporta  : autre traduction avait apporté. –  premiers-nés Ex 13.12 ; Dt 12.6,17 etc. –  graisse  : voir Lv 3.3n. –  regard favorable  : cf. Hé 11.4.'
  - type: text
    content: 'Abel, lui aussi, apporta des premiers-nés de son petit bétail avec leur graisse. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' porta un regard favorable sur Abel et sur son offrande ; '
  '5':
  - type: note
    content: 'il se renfrogna  : litt. sa face tomba  ; cf. Nb 6.26 ; Jr 3.12n.'
  - type: text
    content: 'mais il ne porta pas un regard favorable sur Caïn ni sur son offrande. Caïn fut très fâché, et il se renfrogna. '
  '6':
  - type: note
    content: 'Pourquoi…  : cf. Jon 3.4,9.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Caïn : Pourquoi es-tu fâché ? Pourquoi es-tu renfrogné ? '
  '7':
  - type: note
    content: 'ne relèveras-tu pas la tête  : litt. n’(y aura-t-il) pas élévation ? On peut comprendre le terme correspondant à élévation soit au sens d’enlèvement de la faute, c.-à-d. de pardon, comme en 18.24n,26 ; 50.17 ; Ps 32.5, soit au sens de retour en grâce, comme en 40.13, en interprétant relever le visage par opposition à 4.5n (cf. 19.21n). Relever le visage est traduit par accueillir favorablement en 32.21, faire bon accueil à en Ml 1.8 et favoriser en Ps 82.2. L''expression vient sans doute du geste d''accueil consistant à relever celui qui se prosterne. LXX Si tu as présenté (ton offrande) correctement, mais que tu n''aies pas partagé correctement, n''as-tu pas péché  ? Reste tranquille. –  tapi (ou couché) à ta porte (litt. à la porte) : le verbe hébreu rabats, qui se dit généralement d''un animal au repos (29.2 être au repos  ; 49.9,14 se coucher, 25 étendu), peut faire penser au démon babylonien Rabitsou qui, tapi sur le seuil, se tenait prêt à bondir sur celui qui passait ; cf. Dt 29.19n  ; voir aussi Pr 24.15n. –  ta porte  : litt. l''ouverture ou l''entrée. –  désir / dominer  : cf. 3.16. –  à toi de le dominer  : on pourrait aussi traduire toi, domine-le ou le domineras-tu ? –  Targum (Tg) du pseudo-Jonathan : N''est-il pas vrai que si tu agis bien, ta faute te sera pardonnée ? Mais si tu n''agis pas bien en ce monde, ton péché est retenu pour le jour du grand jugement. Aux portes de ton cœur gît le péché, mais entre tes mains j''ai remis le contrôle du mauvais penchant ; son désir le portera vers toi et tu pourras le dominer soit pour la justification, soit pour le péché.'
  - type: text
    content: 'Si tu agis bien, ne relèveras-tu pas la tête ? Mais si tu n''agis pas bien, le péché est tapi à ta porte, et son désir se porte vers toi ; à toi de le dominer ! '
  '8':
  - type: note
    content: 'parla  : litt. dit. LXX porte, après Abel, son frère  : Allons dans la campagne ! La phrase est également attestée dans Smr, Syr, Vg et Tg (voir ci-après) ; sa forme hébraïque pourrait signifier simplement  : sortons ! –  tua 1Jn 3.12-15. –  Targum du pseudo-Jonathan : Caïn dit à son frère Abel : « Viens, sortons tous deux dans la campagne. » Et il advint que lorsque tous deux furent sortis dans la campagne, Caïn répondit et dit à Abel : « Je vois que le monde a été créé par amour mais [Neofiti : n''a pas été créé par amour (et)] qu''il n''est pas régi selon le fruit des bonnes œuvres et qu''il y a, dans le jugement, acception de personnes. Pourquoi ton offrande a-t-elle été accueillie avec faveur et mon offrande à moi n''a-t-elle pas été accueillie avec faveur ? » Abel répondit à Caïn, en disant : « Le monde a été créé par amour et il est régi selon le fruit des bonnes œuvres et il n''y a point dans le jugement acception de personnes. Parce que les fruits de mes œuvres étaient meilleurs que les tiens et antérieurs aux tiens, mon offrande a été accueillie avec faveur. » Caïn répondit et dit à Abel : « Il n''y a ni jugement ni juge ni un autre monde ! Point de remise de récompense pour les justes ni de châtiment pour les méchants ! » Abel répliqua à Caïn, en disant : « Il y a un jugement et il y a un juge et il y a un autre monde ; il y a remise de récompense pour les justes et un châtiment pour les méchants ! » Sur ces questions, ils se querellaient en pleine campagne. Et Caïn se dressa contre son frère Abel et, lui enfonçant une pierre dans le front, le tua.'
  - type: text
    content: 'Caïn parla à Abel, son frère ; comme ils étaient en pleine campagne, Caïn se jeta sur Abel, son frère, et le tua. '
  '9':
  - type: note
    content: 'Où  : cf. 3.9. –  gardien  : cf. berger au v. 2.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Caïn : Où est Abel, ton frère ? Il répondit : Je ne sais pas. Suis-je le gardien de mon frère ? '
