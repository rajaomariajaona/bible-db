document_id: PRO.15,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'détourne  : autre traduction calme  ; cf. 29.8. –  la fureur  : cf. 25.15 ; 1R 12.12-19. –  une parole blessante  : litt. une parole de peine ou une parole douloureuse . Cf. Siracide 6.5 : « Des paroles aimables multiplient les amis, une langue affable multiplie les paroles courtoises. »'
  - type: text
    content: Une réponse douce détourne la fureur ;
  - type: text
    content: une parole blessante excite la colère.
  '10':
  - type: text
    content: ' '
  - type: note
    content: correction 1.2n  ; 3.11n. –  avertissements 1.23n.
  - type: text
    content: Une correction sévère attend celui qui abandonne le sentier ;
  - type: text
    content: celui qui déteste les avertissements mourra.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Le séjour des morts 1.12n  ; 11.20. –  le monde des disparus  : hébreu ’avaddôn (ou ’abaddôn ) cf. 27.20n  ; Jb 26.6n  ; Ap 9.11n. –  le cœur  : cf. 2Ch 6.30 ; Jr 17.9s ; Ps 7.10 ; 44.22 ; Jn 2.24s ; 21.17 ; Ac 1.24. Voir aussi Siracide 42.18 : « Il sonde l''abîme et le cœur, il perce à jour leurs manœuvres, car le Très-Haut possède toute science, il a le regard fixé sur les signes des temps. »'
  - type: text
    content: 'Le séjour des morts et le monde des disparus sont devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: à plus forte raison le cœur des humains !
  '12':
  - type: text
    content: ' '
  - type: note
    content: L'insolent… 1.22n  ; 9.8. –  avertisse 1.23n  ; 3.11n.
  - type: text
    content: L'insolent n'aime pas qu'on l'avertisse ;
  - type: text
    content: il ne va pas vers les sages.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'aimable  : litt. bon  ; autre traduction donne une belle apparence  ; 17.22 ; cf. 12.25 ; 18.14 ; Siracide 13.25 : « C''est le cœur de l''homme qui modèle son visage, que ce soit en bien ou en mal. »'
  - type: text
    content: Un cœur joyeux rend le visage aimable ;
  - type: text
    content: quand le cœur est dans la peine, l'esprit est abattu.
  '14':
  - type: text
    content: ' '
  - type: note
    content: cœur intelligent 18.15. –  stupides 1.22+.
  - type: text
    content: Un cœur intelligent recherche la connaissance ;
  - type: text
    content: la bouche des gens stupides se repaît d'imbécillité.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Siracide 30.25 : « Un cœur réjoui favorise le bon appétit, à ses aliments il fait grande attention. » –  pauvre  : autre traduction malheureux.'
  - type: text
    content: Tous les jours du pauvre sont mauvais ;
  - type: text
    content: le cœur content est un constant banquet.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Mieux vaut peu 16.8 ; 17.1 ; Ps 37.16 ; cf. Pr 13.8. –  crainte du Seigneur 1.7n. –  la panique  : cf. 1S 5.9,11 ; 14.20 ; autres traductions le désordre, des désordres Ez 22.5n  ; Am 3.9. – Cf. Instruction d''Aménémopé 9.5ss : « Mieux vaut la pauvreté dans la main du dieu que des richesses dans une grange ; mieux vaut du pain, quand le cœur est heureux, que des richesses avec du chagrin. »'
  - type: text
    content: 'Mieux vaut peu, avec la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qu'un grand trésor avec la panique.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Mieux vaut… v. 16n. Cf. Instruction de Mérikaré 128 : « La vertu d''un homme droit est plus agréable au dieu (cf. v. 8 ; ou bien : “vaut mieux”) que le bœuf de celui qui fait le mal. »'
  - type: text
    content: Mieux vaut un plat de légumes là où règne l'amour
  - type: text
    content: qu'un bœuf engraissé là où l'on se déteste.
  '18':
  - type: text
    content: ' '
  - type: note
    content: provoque (28.4n) les disputes 28.25 ; 29.22. –  patient 14.29n  ; cf. Mt 5.9.
  - type: text
    content: Un homme furieux provoque les disputes ;
  - type: text
    content: celui qui est patient apaise les querelles.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'chemin / sentier 2.13n. –  paresseux…  : cf. 24.30s.'
  - type: text
    content: Le chemin du paresseux est comme une haie d'épines ;
  - type: text
    content: le sentier des gens droits est une route bien frayée.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'La langue des sages…  : cf. v. 28 ; 12.23n  ; Ec 10.12. –  rend la connaissance meilleure  : autre traduction embellit la connaissance  ; certains modifient le texte hébreu traditionnel pour lire distillent la connaissance . –  gens stupides 1.22+. –  éructe v. 28 ; 1.23n  ; Ps 59.8n.'
  - type: text
    content: La langue des sages rend la connaissance meilleure ;
  - type: text
    content: la bouche des gens stupides éructe l'imbécillité.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Un fils sage… 10.1n. –  un homme stupide… 1.22+ ; cf. 17.25 ; 23.22 ; 30.17.
  - type: text
    content: Un fils sage fait la joie de son père ;
  - type: text
    content: un homme stupide méprise sa mère.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'imbécillité  : cf. 10.23. –  dépourvu de raison 6.32n.'
  - type: text
    content: L'imbécillité est une joie pour celui qui est dépourvu de raison ;
  - type: text
    content: un homme intelligent va droit dans sa marche.
  '22':
  - type: text
    content: ' '
  - type: note
    content: délibérations secrètes 3.32n  ; 11.13+. –  conseillers 11.14n.
  - type: text
    content: Les plans échouent faute de délibérations secrètes ;
  - type: text
    content: ils se réalisent quand les conseillers sont nombreux.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'réparties ou réponses  ; cf. Siracide 20.6 : « Tel se tait parce qu''il n''a pas de réponse, tel autre se tait parce qu''il sait le bon moment. »'
  - type: text
    content: L'homme trouve de la joie dans les réparties de sa bouche ;
  - type: text
    content: une parole dite en son temps, que c'est bon !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'sentier de la vie  : cf. 2.19n. LXX les pensées de l''homme intelligent sont des chemins de vie, pour que, t''éloignant du séjour des morts, tu sois sauvé . –  séjour des morts 1.12n. –  en bas  : cf. Ec 3.21.'
  - type: text
    content: Celui qui a du bon sens, le sentier de la vie le mène en haut,
  - type: text
    content: pour qu'il s'écarte du séjour des morts, qui est en bas.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'orgueilleux  : cf. 2.21s ; 8.13 ; 11.2 ; 12.7 ; 14.11. –  la propriété  : le terme hébreu, qui est habituellement traduit par frontière ou territoire , peut désigner ici un terrain ou sa limite  ; cf. 22.28 ; 23.10s ; Dt 19.14 ; 27.17 ; Os 5.10.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' renverse la maison des orgueilleux ;'
  - type: text
    content: il consolide la propriété de la veuve.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'pensées mauvaises  : cf. 6.18.'
  - type: text
    content: 'Les pensées mauvaises sont une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: les paroles belles sont pures.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'avide de gain 1.19n. –  les présents ou les pots-de-vin  : il s''agit vraisemblablement ici de présents apportés à quelqu''un pour le corrompre et obtenir une faveur ; autre terme en 17.23 ; cf. Dt 16.19 ; 27.25 ; 1S 8.3 ; Es 1.23 ; 5.23 ; Am 2.6 ; 5.7-13. – Après ce v. LXX ajoute le texte correspondant à 16.6.'
  - type: text
    content: Celui qui est avide de gain illicite attire le malheur sur sa maison ;
  - type: text
    content: celui qui déteste les présents vivra.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'médite  : autre traduction murmure  ; on pourrait aussi traduire plus globalement le juste réfléchit pour répondre  ; cf. 24.2 ; sur le verbe correspondant à médite , voir Ps 1.2n. –  la bouche des méchants 19.28. –  éructe v. 2+. – Après ce v. LXX ajoute le texte correspondant à 16.7.'
  - type: text
    content: Le cœur du juste médite pour répondre ;
  - type: text
    content: la bouche des méchants éructe des paroles mauvaises.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'loin  : cf. Es 59.2. –  il entend  : cf. Ps 10.17 ; 34.19 ; 145.18s. – Après ce v. LXX ajoute le texte correspondant à 16.8s.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est loin des méchants ;'
  - type: text
    content: il entend la prière des justes.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Les yeux du Seigneur  : cf. 5.21 ; 16.2 ; Jr 16.17 ; 32.19 ; Za 4.10 ; Ps 7.10 ; 139.1ss ; Jb 34.21 ; Siracide 23.19 : « Les yeux des hommes, voilà ce qu''il redoute et il ignore que les yeux du Seigneur sont infiniment plus lumineux que le soleil, qu''ils observent toutes les démarches des hommes et pénètrent les plus secrets recoins. »'
  - type: text
    content: 'Les yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont en tout lieu,'
  - type: text
    content: surveillant les mauvais et les bons.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Un regard lumineux  : litt. la lumière (terme habituellement traduit par luminaire  ; cf. Gn 1.14n) des yeux  ; certains modifient le texte hébreu traditionnel pour lire la vision des yeux  ; cf. Ps 90.8n. –  fortifie tout le corps  : litt. engraisse les os  ; cf. 11.25n  ; 25.25.'
  - type: text
    content: Un regard lumineux réjouit le cœur ;
  - type: text
    content: une bonne nouvelle fortifie tout le corps.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est absent de LXX. –  Celui qui  : litt. l''oreille qui  ; cf. 25.12. –  les avertissements (1.23n  ; 3.11n) de la vie 10.17. –  a sa place  : le verbe hébreu est habituellement traduit par passer la nuit ou loger, séjourner.'
  - type: text
    content: Celui qui écoute les avertissements de la vie
  - type: text
    content: a sa place parmi les sages.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'l''instruction ou la correction 1.2n. –  se méprise  : autres traductions se rejette lui-même ; renonce à lui-même  ; cf. 3.11n. –  avertissements v. 31+. –  acquiert 4.5+. –  la raison  : litt. le cœur  ; cf. v. 10 ; 10.17 ; 19.20.'
  - type: text
    content: Celui qui fait peu de cas de l'instruction se méprise lui-même ;
  - type: text
    content: celui qui écoute les avertissements acquiert la raison.
  - type: heading
    content: Le Seigneur et la vie quotidienne
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'crainte du Seigneur 1.7n. –  instruit de la sagesse  : autre traduction est une correction de la sagesse (cf. 1.2n) ; certains modifient le texte hébreu traditionnel pour lire est le fondement de la sagesse . –  l''humilité  : autres traductions l''affliction ; la pauvreté  ; cf. 18.12 ; voir aussi 9.10 ; 11.2. – Voir gloire.'
  - type: text
    content: 'La crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ' instruit de la sagesse ;'
  - type: text
    content: l'humilité précède la gloire.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Une langue bienfaisante  : litt. la guérison (ou la bonne santé ) de la langue  ; le mot correspondant à guérison est traduit par remède en 16.24. Cf. Siracide 36.28 : « Si elle (l''épouse) a sur sa langue bonté et douceur, son mari échappe à la condition ordinaire des hommes. » –  arbre de vie 3.18n  ; voir aussi 13.14n. –  la perversité…  : cf. 12.8,18. – Voir esprit.'
  - type: text
    content: Une langue bienfaisante est un arbre de vie ;
  - type: text
    content: la perversité en elle brise l'esprit.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'imbécile 1.7n. –  l''instruction ou la correction v. 10 ; 1.2n  ; 3.11n. –  avertissements 1.23n. –  avisé  : cf. 1.4n.'
  - type: text
    content: L'imbécile méprise l'instruction de son père ;
  - type: text
    content: celui qui tient compte des avertissements se montre avisé.
  '6':
  - type: text
    content: ' '
  - type: note
    content: revenus 3.9n.
  - type: text
    content: Il y a grande richesse dans la maison du juste ;
  - type: text
    content: les revenus du méchant attirent le malheur.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'le cœur…  : autre traduction il n''en est pas ainsi du cœur des gens stupides (1.22+).'
  - type: text
    content: Les lèvres des sages disséminent la connaissance ;
  - type: text
    content: le cœur des gens stupides est sans fermeté.
  '8':
  - type: text
    content: ' '
  - type: note
    content: sacrifice des méchants… 21.27 ; cf. 1S 15.22 ; Es 1.11 ; Jr 6.20 ; Am 5.22. –  sa faveur 11.20 ; 12.22.
  - type: text
    content: 'Le sacrifice des méchants est une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: la prière des gens droits a sa faveur.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'La voie du méchant…  : cf. 2.13n  ; 11.20.'
  - type: text
    content: 'La voie du méchant est une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: il aime celui qui poursuit la justice.
