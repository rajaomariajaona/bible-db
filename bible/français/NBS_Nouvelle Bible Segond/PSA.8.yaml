document_id: PSA.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La magnificence du nom de Dieu
  - type: text
    content: ' '
  - type: note
    content: la guittith ou la gatite  ; transcription d'un terme technique (81.1 ; 84.1) qui pourrait désigner, soit un instrument de musique, soit une mélodie ou un genre musical connus (peut-être un chant des vendanges puisque le mot semble être dérivé de gath = pressoir , qui est également le nom d'une cité philistine [Gath] ; cf. Jos 13.3n).
  - type: text
    content: Du chef de chœur. Sur la guittith. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: V. 2+.
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Seigneur,'
  - type: text
    content: que ton nom est magnifique sur toute la terre !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'V. 10 ; cf. 19.5 ; 57.6 ; 99.2 ; 104 ; 113.1-3 ; Es 6.3 ; Ha 3.3 ; Siracide 43.28 : « Où trouver la force de le glorifier ? Car il est le Grand, il dépasse toutes ses œuvres. » – Voir nom . –  magnifique 76.5 ; 93.4 ; 136.18 ; Es 33.21. –  toi qui te rends…  : texte hébreu obscur ; autres traductions  : rends-toi plus éclatant que le ciel ; place ta majesté au-dessus du ciel ; elle ( la terre ) chante ton éclat plus haut que le ciel (cf. 19.2-7).'
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Seigneur,'
  - type: text
    content: que ton nom est magnifique sur toute la terre,
  - type: text
    content: toi qui te rends plus éclatant que le ciel !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Par la bouche…  : cf. 148.12s ; Sagesse 10.21 (à propos du chant des Israélites après le passage de la mer Rouge) : « Car la Sagesse ouvrit la bouche des muets et délia la langue des tout-petits. » Mt 21.16  ; cf. 11.25. –  une force  : autre traduction une forteresse  ; Syr a lu ta gloire , LXX une louange. –  pour imposer silence  : litt. pour faire cesser , verbe apparenté au mot traduit par sabbat. –  l''ennemi vindicatif  : litt. l''ennemi et celui qui se venge  ; cf. 44.17.'
  - type: text
    content: Par la bouche des enfants, des nourrissons,
  - type: text
    content: tu as fondé une force, à cause de tes adversaires,
  - type: text
    content: pour imposer silence à l'ennemi vindicatif.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ton ciel 20.7 ; 115.16 ; 144.5 ; Lm 3.66. –  œuvre de tes doigts  : cf. 19.2 ; 33.6 ; 95.5 ; 102.26 ; 136.5 ; voir aussi Ex 8.15 ; Lc 11.20. –  la lune et les étoiles  : certains pensent que ce psaume était chanté lors d''une cérémonie nocturne, cf. 134.1 ; Es 30.29 ; 1Ch 9.33.'
  - type: text
    content: Quand je regarde ton ciel, œuvre de tes doigts,
  - type: text
    content: la lune et les étoiles que tu as mises en place,
  '5':
  - type: text
    content: ' '
  - type: note
    content: '144.3 ; Jb 7.17s ; Hé 2.6-8. –  l''homme / l''être humain  : autres traductions un homme / un fils d''humain. –  que tu t''occupes de lui ou que tu le visites  ; le verbe hébreu, souvent traduit par intervenir (pour ou contre quelqu''un) est aussi rendu par inspecter en 17.3 ; cf. 59.6 ; 65.10 ; voir Jr 6.15n  ; 23.2.'
  - type: text
    content: qu'est-ce que l'homme, pour que tu te souviennes de lui,
  - type: text
    content: qu'est-ce que l'être humain, pour que tu t'occupes de lui ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'à un dieu  : autres traductions à Dieu, aux dieux (cf. 82.1+) ; LXX aux anges ( Hé 2.7 ) ; cf. Gn 1.26+,27. –  tu l''as couronné  : autre traduction tu l''entoures  ; cf. 5.13n  ; 21.6+.'
  - type: text
    content: Tu l'as fait de peu inférieur à un dieu,
  - type: text
    content: tu l'as couronné de gloire et de magnificence.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'la domination  : cf. Gn 1.28 ; Sagesse 9.1-3 : « Dieu des pères et Seigneur miséricordieux qui as fait l''univers par ta parole, formé l''homme par ta Sagesse afin qu''il domine sur les créatures appelées par toi à l''existence, qu''il gouverne le monde avec piété et justice, et rende ses jugements avec droiture d''âme. » Siracide 17.2-4 : « Il (Dieu) a assigné aux hommes un nombre précis de jours et un temps déterminé, il leur a donné pouvoir sur les choses de la terre. Comme lui-même il les a revêtus de force, il les a faits à son image. Il les a fait redouter de tout être vivant, pour qu''ils soient les maîtres des bêtes sauvages et des oiseaux. » –  tu as tout mis sous ses pieds  : cf. 1Co 15.27 ; Ep 1.22.'
  - type: text
    content: Tu lui as donné la domination sur les œuvres de tes mains,
  - type: text
    content: tu as tout mis sous ses pieds,
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'les bêtes sauvages  : autre traduction les bêtes des champs.'
  - type: text
    content: moutons et chèvres, bœufs, tous ensemble,
  - type: text
    content: et même les bêtes sauvages,
  '9':
  - type: text
    content: les oiseaux du ciel et les poissons de la mer,
  - type: text
    content: tout ce qui parcourt les sentiers des mers.
