document_id: PSA.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La gloire du Seigneur dans l'univers ; la loi du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 13.1+.
  - type: text
    content: Du chef de chœur. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'La crainte du Seigneur 111.10 ; cf. 15.4+ ; Es 33.6 ; Jb 28.28 ; Pr 1.7 ; 9.10 ; 10.27 ; 14.27 ; 19.23. –  pure  : cf. 12.7 ; Jc 1.27. –  vérité (ou loyauté ) / justes  : cf. Ap 16.7.'
  - type: text
    content: 'La crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est pure, elle subsiste à jamais ;'
  - type: text
    content: 'les règles du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont vérité, elles sont toutes justes ;'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'plus précieuses que l''or 119.127. – Notre mot miel traduit ici deux termes hébreux différents ; cf. 119.103 ; Siracide 24.19s : « Venez à moi (la Sagesse), vous qui me désirez, et rassasiez-vous de mes fruits. Car mon souvenir l''emporte en douceur sur le miel et ma possession sur le rayon de miel. »'
  - type: text
    content: elles sont plus précieuses que l'or, que beaucoup d'or fin ;
  - type: text
    content: plus douces que le miel, que le miel qui coule des rayons.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Moi-même…  : autre traduction ton serviteur est averti ou illuminé (homonymie possible en hébreu).'
  - type: text
    content: Moi-même, ton serviteur, je suis averti par elles ;
  - type: text
    content: pour qui les observe l'avantage est grand.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'erreurs involontaires  : le mot hébreu correspondant, qui n''apparaît qu''ici dans l''A.T., est proche de celui qui est traduit par (par) erreur en Lv 4.2 ; Nb 15.24. –  Tiens-moi pour innocent  : litt. innocente-moi , même verbe au v. 14.'
  - type: text
    content: Qui peut connaître ses erreurs involontaires ?
  - type: text
    content: Tiens-moi pour innocent de ce qui m'est caché.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'gens arrogants 86.14 ; 119.21,51,69,78,85,122 ; Es 13.11 ; Jr 43.2 ; Ml 3.15. –  transgression  : voir péché.'
  - type: text
    content: Préserve-moi aussi des gens arrogants ;
  - type: text
    content: qu'ils ne dominent pas sur moi !
  - type: text
    content: Alors je serai intègre, innocent de toute transgression grave.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 104.34 ; 119.108. –  le murmure 1.2n  ; 9.17n. –  de toi  : litt. devant toi  ; autre traduction reçois favorablement les paroles de ma bouche… –  mon rocher 18.3+. –  mon rédempteur ou mon libérateur 78.35 ; cf. 69.19 ; 72.14 ; 74.2 ; 77.16 ; 103.4n  ; 106.10 ; 107.2 ; 119.154 ; Es 41.14+ ; voir aussi Ex 6.6+ ; Jb 19.25n  ; Rt 2.20n.'
  - type: text
    content: Que les paroles de ma bouche
  - type: text
    content: et le murmure de mon cœur soient agréés de toi,
  - type: text
    content: Seigneur
  - type: text
    content: ', mon rocher et mon rédempteur !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: '50.6 ; 89.6 ; 97.6 ; 148.3s ; cf. 8.4 ; Rm 1.20 ; Siracide 43.1 : « Quelle splendeur que les hauteurs du pur firmament, quel spectacle que le ciel quand on voit sa gloire  ! » –  Dieu  : hébreu ’El , cf. Gn 21.33n. –  la voûte céleste 150.1 ; Gn 1.6nss ; Ez 1.22-25.'
  - type: text
    content: Le ciel raconte la gloire de Dieu,
  - type: text
    content: la voûte céleste dit l'œuvre de ses mains.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'l''annonce  : litt. fait jaillir le langage (ou le discours , même terme au v. 4) ; sur le verbe correspondant, voir 59.8n  ; 78.2n  ; 119.171n  ; 145.7n  ; Pr 1.23n  ; le terme décrit un procédé de fermentation en Ec 10.1n. –  l''explique  : litt. explique la connaissance  ; même verbe en Jb 15.17 ; 32.6,10,17 ; 36.2. – Cf. Os 2.23s.'
  - type: text
    content: Le jour l'annonce au jour,
  - type: text
    content: la nuit l'explique à la nuit.
  '4':
  - type: text
    content: ' '
  - type: note
    content: On pourrait aussi comprendre avec LXX ce n'est pas un langage… dont la voix n'est (ou ne soit ) pas entendue.
  - type: text
    content: Ce n'est pas un langage, ce ne sont pas des paroles,
  - type: text
    content: on n'entend pas leur voix.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Leurs mesures  : litt. leur cordeau ou leur règle , hébreu qaw  ; cf. Es 28.10n  ; LXX leur voix , cf. Rm 10.18. –  aux extrémités  : litt. à l''extrémité . –  c''est là  : litt. en eux , vraisemblablement dans le ciel (v. 2, pluriel en hébreu) ; certains modifient le texte hébreu traditionnel pour lire dans la mer  ; cf. 9.8 ; 24.1. LXX a lu il a placé sa tente dans le soleil  ; cf. Gn 1.17.'
  - type: text
    content: Leurs mesures apparaissent sur toute la terre,
  - type: text
    content: leurs accents vont aux extrémités du monde ;
  - type: text
    content: c'est là qu'il a placé une tente pour le soleil.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Siracide 43.2-5 : « Le soleil qui paraît proclame à son lever quelle chose admirable est l''œuvre du Très-Haut. A son midi il dessèche la terre, devant son ardeur qui peut tenir ? (…) Il est grand, le Seigneur qui l''a créé ; par ses paroles il dirige sa course rapide. » –  un marié…  : cf. Jl 2.16. –  tout content…  : litt. est content comme un guerrier (ou un héros ) de courir la route.'
  - type: text
    content: Celui-ci, tel un marié sortant de sa chambre,
  - type: text
    content: tout content, se met en route, tel un vaillant guerrier.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'des extrémités du ciel… Dt 4.32. –  achève sa course  : le terme peut évoquer le cycle annuel du soleil, cf. Ex 34.22+. –  à l''abri  : litt. caché.'
  - type: text
    content: Il s'élance des extrémités du ciel
  - type: text
    content: et achève sa course à l'autre extrémité ;
  - type: text
    content: rien n'est à l'abri de sa chaleur.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'La structure poétique des v. 8-15, consacrés à la loi du Seigneur (cf. 1.2 ; 37.30s ; 40.7s ; 119), diffère de la première partie de ce psaume. Peut-être s''agissait-il à l''origine de deux poèmes indépendants. –  La loi (autre traduction l''enseignement ) … parfaite  : cf. Jc 1.25. –  la vie ou l''être (cf. Gn 1.20n) ; autre traduction elle ranime  ; cf. 6.4n  ; 23.3. –  le témoignage ou les préceptes  ; cf. 25.10n  ; 93.5n. –  rend sage le naïf ou le simple  ; cf. 119.130.'
  - type: text
    content: 'La loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est parfaite, elle restaure la vie ;'
  - type: text
    content: 'le témoignage du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est sûr, il rend sage le naïf.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'réjouissent le cœur  : cf. 104.15. –  fait briller les yeux , c.-à-d. redonne la vie  ; cf. 13.4 ; 1S 14.27-30 ; Pr 29.13 ; Esd 9.8 ; d''autres comprennent rend clairvoyant.'
  - type: text
    content: 'Les directives du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont droites, elles réjouissent le cœur ;'
  - type: text
    content: 'le commandement du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est limpide, il fait briller les yeux.'
