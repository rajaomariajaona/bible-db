  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elle était posée sur douze bœufs, trois tournés vers le nord, trois tournés vers l''ouest, trois tournés vers le sud, et trois tournés vers l''est ; la Mer reposait sur eux, et toute la partie postérieure de leur corps était en dedans. '
