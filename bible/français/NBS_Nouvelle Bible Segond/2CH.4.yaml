  - type: text
    text: 'En dessous d''elle étaient représentés des bœufs qui l''entouraient tout autour, dix par coudée ; ils faisaient tout le tour de la Mer. Les bœufs, sur deux rangs, étaient fondus avec elle en une seule pièce. '
  - type: usfm
    marker: v
