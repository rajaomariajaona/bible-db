document_id: 2CH.4,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'autel de bronze  : cf. 1R 8.64 ; 9.25 ; 2R 16.14 ; voir aussi Ex 27.1 ; 38.1. –  long de vingt coudées…  : environ 9 m x 9 m x 4,50 m.'
  - type: text
    content: Il fit un autel de bronze, long de vingt coudées, large de vingt coudées et haut de dix coudées.
  - type: heading
    content: La Mer de fonte et les dix cuves
  - type: heading
    content: 1R 7.23-26
  '10':
  - type: note
    content: 1R 7.39.
  - type: text
    content: 'Il plaça la Mer du côté droit, au sud-est. '
  '11':
  - type: note
    content: récipients v. 16 ; le même terme sera traduit par marmites en 35.13 ; cf. Ex 27.3n  ; voir aussi 1R 7.40n. –  Houram 1R 5.15n  ; à la deuxième occurrence, des versions anciennes portent l'autre lecture traditionnelle Hiram.
  - type: text
    content: Houram fit les récipients, les pelles et les calices.
  - type: text
    content: 'Houram acheva les travaux qu''il avait faits pour le roi Salomon dans la maison de Dieu : '
  '12':
  - type: text
    content: 'deux colonnes, avec les deux chapiteaux évasés au sommet des deux colonnes ; les deux treillis, pour couvrir les deux chapiteaux évasés au sommet des colonnes ; '
  '13':
  - type: text
    content: 'les quatre cents grenades pour les deux treillis, deux rangées de grenades par treillis, pour couvrir les deux chapiteaux évasés au sommet des colonnes. '
  '14':
  - type: note
    content: 'Il fit les bases…  : LXX il fit les dix bases…  ; cf. 1R 7.43.'
  - type: text
    content: 'Il fit les bases, et il fit les cuves sur les bases ; '
  '15':
  - type: text
    content: 'la Mer, une, et les douze bœufs en dessous d''elle ; '
  '16':
  - type: note
    content: 'Houram-Abiv (Houram est son père) : cf. 1R 5.15n  ; 7.13n  ; LXX a lu que Hiram avait faits et offerts au roi Salomon… –  bruni ou poli (synonyme en 1R 7.45) : le mot qui apparaît ici est traduit par fourbir en Jr 46.4.'
  - type: text
    content: 'les récipients, les pelles et les fourchettes. Tous ces objets que Houram-Abiv avait faits pour le roi Salomon, pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', étaient de bronze bruni. '
  '17':
  - type: note
    content: 'de la terre  : litt. du sol, cf. Gn 2.5n. –  Tseréda  : le texte hébreu traditionnel porte Tserédata, qui pourrait signifier dans la direction de Tseréda  ; cf. 1R 7.46 (Tsartân) ; 11.26n.'
  - type: text
    content: 'C''est dans le district du Jourdain que le roi les fondit, dans l''épaisseur de la terre, entre Soukkoth et Tseréda. '
  '18':
  - type: note
    content: 'en si grande quantité  : la formule hébraïque correspondante est légèrement différente en 1R 7.47.'
  - type: text
    content: Salomon fit tous ces objets en si grande quantité qu'on ne put évaluer le poids du bronze.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Les v. 19-22 sont absents de Syr.
  - type: text
    content: 'Salomon fit tous les objets de la maison de Dieu : l''autel d''or ; les tables, sur lesquelles on mettait le pain offert ; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'dix , cinq , trente coudées ≈ 4,50 m, 2,25 m, 13,50 m, respectivement ; voir mesures. –  d''un bord à l''autre  : LXX de diamètre.'
  - type: text
    content: 'Il fit la Mer de fonte. Elle avait dix coudées d''un bord à l''autre, une forme entièrement ronde, cinq coudées de hauteur et une circonférence que mesurait un cordeau de trente coudées. '
  '20':
  - type: note
    content: d'or fin 1R 6.20n.
  - type: text
    content: 'les porte-lampes et leurs lampes d''or fin, qu''on devait allumer selon la règle devant le Secret, '
  '21':
  - type: note
    content: or très pur cf. 9.17 ; Ex 25.11+ ; 1Ch 28.17,18.
  - type: text
    content: 'les fleurs, les lampes et les mouchettes d''or, d''or très pur ; '
  '22':
  - type: note
    content: Très-Sacré Ex 29.37n  ; 1R 6.16+.
  - type: text
    content: les couteaux, les calices, les tasses et les cassolettes d'or fin ; l'entrée de la Maison, les battants d'or des portes intérieures du Très-Sacré et les battants des portes de la Maison, du temple.
  '3':
  - type: note
    content: 'Ce v. est absent de Syr. –  étaient représentés des bœufs  : litt. une ressemblance de bœufs (cf. Ez 1.5n) ; voir 1R 7.24+ (coloquintes). – Une coudée ≈ 45 cm.'
  - type: text
    content: 'En dessous d''elle étaient représentés des bœufs qui l''entouraient tout autour, dix par coudée ; ils faisaient tout le tour de la Mer. Les bœufs, sur deux rangs, étaient fondus avec elle en une seule pièce. '
  '4':
  - type: text
    content: 'Elle était posée sur douze bœufs, trois tournés vers le nord, trois tournés vers l''ouest, trois tournés vers le sud, et trois tournés vers l''est ; la Mer reposait sur eux, et toute la partie postérieure de leur corps était en dedans. '
  '5':
  - type: note
    content: 'Ce v. est absent de Syr. –  un palme ≈ 7,5 cm. –  trois mille baths  : soit 63 m3  ; cf. 1R 7.26 (deux mille).'
  - type: text
    content: Son épaisseur était d'un palme ; son bord était façonné comme le bord d'une coupe, en fleur de lis. Elle pouvait contenir trois mille baths.
  - type: heading
    content: 1R 7.38-39
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'nettoyait  : le verbe correspondant apparaît aussi en Es 4.4 ; Ez 40.38 ; voir aussi Jr 51.34n. –  holocaustes 1.6+. –  servait aux prêtres…  : cf. Ex 30.18-21.'
  - type: text
    content: Il fit dix cuves ; il en plaça cinq à droite et cinq à gauche, pour qu'on s'y lave ; on y nettoyait ce qui servait aux holocaustes. La Mer servait aux prêtres pour qu'ils s'y lavent.
  - type: heading
    content: Liste récapitulative des objets de métal
  - type: heading
    content: 1R 7.40-51
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'dix porte-lampes d''or, selon la règle (litt. leur règle ) : cf. Ex 25.31-39 ; 37.17-24 ; voir aussi Nb 8.2+ss. –  dans le temple v. 8 ; cf. 1R 7.49s.'
  - type: text
    content: 'Il fit les dix porte-lampes d''or, selon la règle, et il les plaça dans le temple, cinq à droite et cinq à gauche. '
  '8':
  - type: note
    content: 'tables v. 19 ; cf. 1R 7.48 ; 2Ch 28.16. –  calices  : Syr cent vingt.'
  - type: text
    content: 'Il fit dix tables et les posa dans le temple, cinq à droite et cinq à gauche. Il fit cent calices d''or. '
  '9':
  - type: note
    content: 'la cour des prêtres  : cf. 1R 6.36 ; 7.8s,12 ; voir aussi Ez 42.13. –  enceinte  : en hébreu, le mot rendu ici par enceinte est propre aux descriptions du livre des Chroniques (voir aussi 6.13) ; il peut également désigner un socle, cf. Ez 43.14.'
  - type: text
    content: 'Il fit la cour des prêtres et la grande enceinte, ainsi que les portes de l''enceinte, dont il couvrit de bronze les battants. '
