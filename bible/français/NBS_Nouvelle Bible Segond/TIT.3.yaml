document_id: TIT.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Consignes pour la conduite des fidèles
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 13.1ss ; 1Tm 2.1s ; 1P 2.13ss. –  Rappelle-leur 2Tm 2.14. –  princes  : autre traduction principats  ; cf. Rm 13.1ss ; 15.24n  ; Ep 1.21+ ; Col 1.16n. –  obéir ou être dociles  : même verbe Ac 27.21. –  prêts 2Tm 3.17 ; 1P 3.15. –  à toute œuvre bonne  : cf. 1.16 ; 2.14+ ; Rm 13.3 ; voir aussi Ac 5.29 ; Ga 6.10.'
  - type: text
    content: 'Rappelle-leur d''être soumis aux princes, aux autorités ; d''obéir, d''être prêts à toute œuvre bonne, '
  '10':
  - type: note
    content: 'Celui qui cause des dissensions  : autres traductions l''homme de parti ; le sectaire  ; le terme grec correspondant a donné notre mot hérétique  ; il est dérivé d''un verbe qui signifie choisir  ; un terme apparenté est traduit par parti (Ac 5.17n), dissension (1Co 11.19n) ou doctrine (2P 2.1n). –  éloigne-le 1Tm 4.7n  ; cf. 1.20 ; Rm 16.17s. –  après un premier…  : cf. Mt 18.15ss.'
  - type: text
    content: 'Celui qui cause des dissensions, éloigne-le après un premier et un second avertissement, '
  '11':
  - type: note
    content: 'un tel individu ou un tel homme, cf. 1Co 5.5,11. –  dévoyé ou perverti, perturbé  : cf. 1Tm 6.4s. – Voir péché. –  se condamne lui-même  : cf. Lc 19.22 ; Jn 3.18 ; 8.9ss.'
  - type: text
    content: 'sachant qu''un tel individu est dévoyé et qu''il pèche : il se condamne lui-même.'
  - type: heading
    content: Dernières recommandations et salutations
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Tychique Ac 20.4+ ; 2Tm 4.12. –  tâche…  : un terme apparenté est traduit par avoir soin au v. 13 ; cf. 2Tm 4.9n. –  Nicopolis  : plusieurs villes de l''Antiquité portaient ce nom. Celle qui est désignée ici se trouvait sans doute en Epire, aux confins de la Grèce et de l''Illyrie, sur la rive de l''Adriatique ; cf. 2Tm 4.10n. –  passer l''hiver  : cf. Ac 27.12 ; 28.11 ; 1Co 16.6.'
  - type: text
    content: 'Lorsque je t''enverrai Artémas ou Tychique, tâche de venir me rejoindre à Nicopolis, car c''est là que j''ai résolu de passer l''hiver. '
  '13':
  - type: note
    content: 'fournir…  : cf. Ac 15.3n  ; Rm 15.24n. –  le spécialiste de la loi  : cf. Mt 22.35 ; Lc 7.30 ; 10.25 ; 11.45s,52 ; autre traduction le juriste. –  Apollos Ac 18.24+ ; 1Co 1.12+ ; 16.12.'
  - type: text
    content: 'Aie soin de fournir à Zénas, le spécialiste de la loi, et à Apollos ce dont ils ont besoin pour leur voyage, afin que rien ne leur manque. '
  '14':
  - type: note
    content: 'les nôtres  : cf. 1Tm 3.7. –  exceller…  : cf. v. 8+. –  subvenir…  : cf. Ep 4.28s. –  sans fruit ou stériles  : cf. Mc 4.19/ / ; 1Co 14.14 ; Ep 5.11 ; 2P 1.8 ; Jd 12 ; voir aussi Mt 7.16ss/ / ; Jn 15.8.'
  - type: text
    content: Il faut que les nôtres aussi apprennent à exceller dans les belles œuvres, pour subvenir aux nécessités urgentes, afin de ne pas être sans fruit.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui sont avec moi  : même expression Ac 20.34 ( mes compagnons ) ; cf. Ga 1.2 ; Ph 4.22. –  ceux qui sont nos amis ou qui nous aiment . –  dans la foi ou fidèlement  : cf. 1.4 ; 1Tm 1.2. –  Que la grâce…  : cf. 2Th 3.18 ; Hé 13.25. – Certains mss ajoutent, avec diverses variantes, l''indication suivante  : A Tite [premier évêque ordonné de l''Eglise de Crète], écrite de Nicopolis [en Crète] [en Macédoine]  ; cf. 1Tm 6.21n  ; 2Tm 4.22n.'
  - type: text
    content: Tous ceux qui sont avec moi te saluent. Salue ceux qui sont nos amis dans la foi.
  - type: text
    content: Que la grâce soit avec vous tous !
  '2':
  - type: note
    content: 'calomnier ou insulter  : le terme grec a donné notre verbe blasphémer  ; cf. 2.5 ; Mc 7.22 ; Ac 19.37 ; Ep 4.31 ; Col 3.8 ; 1Tm 1.13+ ; Jd 8s. –  pacifiques, conciliants 1Tm 3.3n. –  et de faire…  : cf. 2.10+. –  douceur 2Tm 2.25+. –  envers tous les humains (ou envers tous  ; cf. 2.11) Rm 12.17 ; Ga 6.10 ; Ph 4.5.'
  - type: text
    content: de ne calomnier personne, d'être pacifiques, conciliants, et de faire toujours preuve de douceur envers tous les humains.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 1.29+. –  Nous aussi  : cf. Ep 2.2s ; 1Tm 1.13ss. –  autrefois Ga 1.13,23 ; Ep 5.8 ; Col 3.7 ; 1P 4.3. –  stupides Rm 1.14n  ; 1Tm 6.9 ; cf. 1Co 2.14. –  rebelles 1.16+. –  égarés 2Tm 3.13. –  esclaves 2.3+. –  toutes sortes de  : cf. 2Tm 3.6 ; Hé 13.9 ; Jc 1.2 ; 1P 1.6. –  désirs 2.12. –  plaisirs Lc 8.14 ; Jc 4.1,3 ; 2P 2.13. –  malfaisance ou mal Ac 8.22n  ; Rm 1.29 ; 1Co 5.8 ; 14.20 ; Ep 4.31 ; Col 3.8 ; Jc 1.21 ; 1P 2.1. –  envie Ph 1.15 ; 1Tm 6.4. –  odieux ou pleins de haine (un terme apparenté est traduit par ennemis de Dieu en Rm 1.30n). –  nous nous détestions…  : cf. Mt 24.10.'
  - type: text
    content: Nous aussi, en effet, nous étions autrefois stupides, rebelles, égarés, esclaves de toutes sortes de désirs et de plaisirs ; nous vivions dans la malfaisance et dans l'envie, nous étions odieux et nous nous détestions les uns les autres.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.11 ; 2Tm 1.10. –  lorsque  : cf. Ga 1.15 ; 4.4. –  la bonté ou la générosité  : le terme grec rappelle le mot Christ (voir onction) ; cf. Lc 6.35 ; Rm 2.4n  ; 11.22 ; Ep 2.7 ; 4.32 ; Phm 11n  ; 1P 2.3 ; voir aussi Ps 31.20. –  Dieu, notre Sauveur 1.3+. –  son amour pour les humains ou son humanité  : le terme grec a donné notre mot philanthropie  ; il a qualifié la Sagesse, puis Dieu dans le judaïsme hellénistique ; ainsi, en Sagesse 1.6 : « La Sagesse est un esprit bienveillant (ou : philanthrope). » Cf. Ac 27.3n  ; 28.2. –  se sont manifestés  : litt. ont été manifestés 2.11+ ; cf. 1.3+.'
  - type: text
    content: Mais lorsque la bonté de Dieu, notre Sauveur,
  - type: text
    content: et son amour pour les humains
  - type: text
    content: se sont manifestés
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'non pas… œuvres de justice (litt. en justice ) : autre traduction non pas en vertu des œuvres de justice que nous avons faites…  ; cf. Rm 3.24 ; 9.11 ; Ga 2.16 ; Ep 2.4s,8s ; 2Tm 1.9 ; voir aussi Dt 9.5 ; Ez 20.44 ; Règlement de la Guerre (Qumrân) 11.3s : « Tu nous as sauvés maintes fois, à cause de ta miséricorde, et non pas selon nos œuvres, par lesquelles nous avons fait le mal. » –  par le bain…  : cf. Mc 16.16 ; 1Co 6.11 ; Ep 5.26 ; Hé 10.22 ; 1P 3.21. –  nouvelle naissance  : même terme en Mt 19.28 ; cf. Jn 3.5ss ; Ac 3.21 ; 2Co 5.17 ; 1P 1.3,23 ; 1Jn 3.9 ; 4.7 ; 5.1,18. –  renouvellement Rm 12.2 ; cf. Es 43.19 ; Jr 31.31ss ; Ez 36.26 ; Ps 51.12 ; 104.30 ; Rm 6.4 ; 7.6 ; 2Co 4.16 ; Ep 2.10,15 ; 4.24 ; Col 3.10 ; Règle de la Communauté (Qumrân) 4.25 : « Jusqu''au terme décisif, celui du Renouvellement. » Hymnes 11.10-14 : « C''est à cause de ta gloire que tu as purifié l''homme du péché… afin qu''il se renouvelle avec tout [ce qui est et] sera. » –  procédant (terme sous-entendu dans le texte) de l''Esprit saint  : cf. Gn 1.2 ; Lc 3.21s ; Jn 3.5 ; 6.63 ; Rm 8.2,15,23 ; 1Co 6.11 ; 12.13 ; 2Co 1.22 ; 3.18 ; Ga 3.3 ; Ep 1.13s ; 2Th 2.13 ; Hé 6.4s.'
  - type: text
    content: – non pas parce que nous aurions fait des œuvres de justice,
  - type: text
    content: mais en vertu de sa propre compassion –
  - type: text
    content: il nous a sauvés par le bain de la nouvelle naissance
  - type: text
    content: et du renouvellement procédant de l'Esprit saint ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'répandu Jl 3.1 ; Ac 2.17,33 ; 10.45 ; Rm 5.5. –  largement  : litt. richement , Rm 10.12 ; Ep 2.4 ; Col 3.16 ; 1Tm 6.17 ; 2P 1.11 ; cf. Jn 3.34. –  par Jésus-Christ  : cf. 2.14 ; Jn 7.39 ; 14.16 ; 1Tm 2.5. –  notre Sauveur 1.4+.'
  - type: text
    content: il l'a répandu sur nous largement
  - type: text
    content: par Jésus-Christ, notre Sauveur,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'justifiés par sa grâce (litt. la grâce de celui-là  : Dieu, ou Jésus-Christ, cf. v. 6) Rm 3.24+. –  héritiers Rm 8.17 ; Ga 4.7. –  selon l''espérance…  : autre traduction nous devenions, selon l''espérance, héritiers de la vie éternelle (1.2+) ; cf. 2.13 ; Rm 8.23s ; Ep 1.18 ; voir aussi Mt 19.29.'
  - type: text
    content: afin que, justifiés par sa grâce,
  - type: text
    content: nous devenions héritiers, selon l'espérance de la vie éternelle.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cette parole est certaine 1Tm 1.15+. –  je souhaite 1Tm 2.8n. –  que tu l''affirmes catégoriquement  : cf. 1Tm 1.7 (même verbe grec). –  ceux qui ont placé leur foi en Dieu 2Tm 1.12n. –  exceller (autre traduction s''engager activement ) … v. 14 ; cf. 2.14n  ; le même verbe est traduit par diriger en 1Tm 3.4+. –  beau 1Tm 2.3. –  utile 1Tm 4.8 ; 2Tm 3.16.'
  - type: text
    content: 'Cette parole est certaine, et je souhaite que tu l''affirmes catégoriquement, afin que ceux qui ont placé leur foi en Dieu s''appliquent à exceller dans les belles œuvres. Voilà qui est beau et utile aux humains ! '
  '9':
  - type: note
    content: 'Cf. 2Tm 2.14,16. –  débats extravagants 2Tm 2.23n  ; cf. Ep 5.4. –  généalogies 1Tm 1.4n. –  disputes 1Tm 6.4. –  querelles…  : cf. 2Tm 2.23. –  relatives à la loi  : cf. 1.14 ; 1Tm 1.7ss. –  inutile Hé 7.18. –  futile 1.10+ ; cf. 1Co 3.20 ; 15.17 ; Jc 1.26.'
  - type: text
    content: 'Mais évite les débats extravagants, les généalogies, les disputes, les querelles relatives à la loi, car tout cela est inutile et futile. '
