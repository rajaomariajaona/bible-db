document_id: LAM.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem, une veuve abandonnée
  - type: text
    content: ' '
  - type: note
    content: 'Comment ! Cette interjection (hébreu ’eika ), qui sert souvent à introduire les complaintes (cf. Es 14.4n), constitue le titre du livre dans la Bible hébraïque. La première lettre de chaque verset du chapitre correspond à l''ordre traditionnel des 22 lettres de l''alphabet hébreu (cf. 2.1n  ; 3.1n  ; Ps 25.1n). Sur l''ensemble, cf. 2R 24–25. –  assise solitaire  : la même expression hébraïque est traduite par habiter seul en Lv 13.46 ; le même verbe hébreu signifie habiter et s''asseoir, être assis ou siéger au v. 3 ; 2.10 ; 3.6,28,63 ; 4.12,21 ; 5.19. –  grande  : autre traduction nombreuse , c.-à-d. (très) peuplée . –  veuve  : c.-à-d. sans soutien ; cf. 5.3 ; Dt 27.19 ; Baruch 4.12 : « Que personne ne se réjouisse si je (Jérusalem) suis veuve et abandonnée de beaucoup. J''ai été rendue déserte à cause du péché de mes enfants… »'
  - type: text
    content: Comment !
  - type: text
    content: Elle est assise solitaire,
  - type: text
    content: cette ville si grande !
  - type: text
    content: Elle est devenue comme une veuve !
  - type: text
    content: Elle, si grande parmi les nations,
  - type: text
    content: princesse sur les provinces,
  - type: text
    content: elle est astreinte à la corvée !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'précieux v. 7+ ; cf. 2R 24.13 ; Es 64.10. –  les nations…  : cf. Dt 23.4s ; Ez 44.7-9 ; Ac 21.28.'
  - type: text
    content: L'adversaire a étendu la main
  - type: text
    content: 'sur tout ce qu''elle avait de précieux :'
  - type: text
    content: elle a vu pénétrer dans son sanctuaire
  - type: text
    content: les nations auxquelles tu avais défendu d'entrer
  - type: text
    content: dans ton assemblée.
  '11':
  - type: text
    content: ' '
  - type: note
    content: pain Jr 52.6 ; cf. Dt 28.51. –  afin de ranimer leur vie ou leur être, leurs forces  ; de même aux v. 16,19 ; sur le terme hébreu correspondant, voir Gn 1.20n.
  - type: text
    content: Tout son peuple gémit,
  - type: text
    content: il cherche du pain ;
  - type: text
    content: ils ont donné tout ce qu'ils avaient de précieux pour manger,
  - type: text
    content: afin de ranimer leur vie.
  - type: text
    content: 'Regarde, '
  - type: text
    content: Seigneur
  - type: text
    content: ', vois'
  - type: text
    content: comme je suis méprisée !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''il n''en soit pas ainsi…  : Vg a lu, sans la négation  : O vous tous qui passez…  ; cf. 2.15. –  s''il est une douleur…  : cf. 2.13 ; Dn 9.12 ; 12.1 ; Mt 24.21. –  au traitement…  : cf. v. 22 ; 2.20 ; 3.51n. –  jour… ardente 2.1,4,21s ; 4.11 ; Ez 7.19 ; So 2.2s ; Ps 110.5 ; Jb 20.28 ; Pr 11.4 ; Rm 2.5 ; Ap 6.17.'
  - type: text
    content: Qu'il n'en soit pas ainsi pour vous tous qui passez votre chemin !
  - type: text
    content: Regardez et voyez
  - type: text
    content: s'il est une douleur pareille à ma douleur,
  - type: text
    content: au traitement qu'on m'a fait subir !
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a causé du chagrin'
  - type: text
    content: au jour de sa colère ardente.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'dans mes os  : cf. 3.4 ; Es 38.13 ; Ps 31.11 ; 51.10. –  il les piétine  : traduction incertaine ; autres possibilités  : il le commande (le feu ?) ; il les soumet (les os ?) ; ils ont été détruits ; il (le feu) y est descendu. –  filet Ps 9.16+. –  reculer v. 8. –  dévastée  : cf. v. 4 ; 2S 13.20 ; Es 54.1 ( délaissée ). –  sans cesse  : litt. tout le jour . –  souffrante  : cf. v. 20,22 ; 2.18s ; 5.17 ; ici, ce terme rappelle peut-être aussi (cf. v. 8n) l''indisposition des règles, comme en Lv 15.33 ; 20.18.'
  - type: text
    content: D'en haut il a lancé un feu dans mes os,
  - type: text
    content: il les piétine ;
  - type: text
    content: il a tendu un filet sous mes pieds,
  - type: text
    content: il m'a fait reculer ;
  - type: text
    content: il m'a laissée dévastée,
  - type: text
    content: je suis sans cesse souffrante.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'joug  : cf. Dt 28.48 ; Jr 27.2–28.14. –  il a fait vaciller (litt. trébucher ) ma force  : cf. Ps 31.11 ; Né 4.4.'
  - type: text
    content: Sa main a lié le joug de mes transgressions ;
  - type: text
    content: elles se sont entrelacées,
  - type: text
    content: elles me sont montées à la gorge ;
  - type: text
    content: il a fait vaciller ma force ;
  - type: text
    content: le Seigneur m'a livrée
  - type: text
    content: à des mains contre lesquelles je ne peux tenir.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'a repoussé…  : autre traduction a entassé (comme des gerbes à la moisson ; cf. Jr 50.26 où figure un verbe très proche) tous mes puissants guerriers (ou indomptables , voir Gn 49.24n) en mon sein. –  rencontre festive  : cf. v. 4n  ; 2.6s,22. Ici l''expression s''applique au rassemblement guerrier des ennemis de Jérusalem. –  foulé au pressoir  : cf. Es 63.1-6 ; Jl 4.13 ; Ap 14.19s. –  Juda la jolie  : litt. la vierge de la fille de Juda  ; cf. v. 6n  ; 2.2,5,13 ; voir aussi Jr 8.21 ; 18.13 ; 31.4,21 ; Am 5.2.'
  - type: text
    content: Le Seigneur a repoussé tous les puissants guerriers
  - type: text
    content: qui étaient avec moi ;
  - type: text
    content: il a convoqué contre moi une rencontre festive
  - type: text
    content: pour briser mes jeunes gens ;
  - type: text
    content: le Seigneur a foulé au pressoir
  - type: text
    content: Juda la jolie.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'je pleure  : cf. Jr 8.23 ; 9.17 ; 13.17. –  consolateur v. 2+. –  ranimer ma vie  : autre traduction me rendre des forces  ; cf. v. 11n. –  atterrés ou dans la dévastation.'
  - type: text
    content: C'est sur eux que je pleure ;
  - type: text
    content: mes yeux fondent en larmes,
  - type: text
    content: car il est loin de moi, le consolateur,
  - type: text
    content: celui qui pourrait ranimer ma vie.
  - type: text
    content: Mes fils sont atterrés,
  - type: text
    content: parce que l'ennemi a été le plus fort.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'personne… v. 2+. –  le Seigneur a dépêché…  : autre traduction le Seigneur a donné des ordres contre Jacob à ses adversaires d''alentour  ; cf. Ps 42.9n. –  une souillure  : autre traduction une femme souillée (par ses règles) v. 8n.'
  - type: text
    content: Sion a tendu les mains,
  - type: text
    content: et personne ne la console ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dépêché contre Jacob'
  - type: text
    content: les adversaires qui l'entourent ;
  - type: text
    content: Jérusalem est devenue
  - type: text
    content: une souillure au milieu d'eux.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'juste  : cf. Jr 12.1 ; Ps 51.6. –  j''ai été rebelle  : cf. v. 20,22 ; 3.42 ; 5.16. –  ses ordres  : litt. sa bouche. –  jeunes filles  : litt. vierges  ; cf. v. 4,15.'
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui est juste :'
  - type: text
    content: j'ai été rebelle à ses ordres.
  - type: text
    content: Ecoutez, je vous prie, vous tous, peuples,
  - type: text
    content: et voyez ma douleur !
  - type: text
    content: Mes jeunes filles et mes jeunes gens
  - type: text
    content: sont allés en captivité.
  '19':
  - type: text
    content: ' '
  - type: note
    content: ceux qui m'aimaient v. 2+ ; voir 4.17n. –  ranimer… v. 11n.
  - type: text
    content: J'ai appelé ceux qui m'aimaient,
  - type: text
    content: et ils m'ont trompée.
  - type: text
    content: Mes prêtres et mes anciens
  - type: text
    content: ont expiré dans la ville,
  - type: text
    content: alors qu'ils cherchaient de quoi manger
  - type: text
    content: afin de ranimer leur vie.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Elle passe… Ps 6.7. –  ceux qui l''aimaient v. 19 ; cf. Jr 3.1 ; 30.14 ; Os 2 ; Za 13.6. –  console v. 9,16s,21 ; cf. Es 12.1 ; 40.1 ; Ps 69.21 ; 71.21 ; 86.17 ; Ec 4.1 ; Lc 2.25 ; Jn 14.16+. –  ennemis  : cf. 2R 24.2.'
  - type: text
    content: Elle passe la nuit à pleurer,
  - type: text
    content: ses joues ruissellent de larmes.
  - type: text
    content: De tous ceux qui l'aimaient,
  - type: text
    content: personne ne la console ;
  - type: text
    content: tous ses amis l'ont trahie,
  - type: text
    content: ils sont devenus ses ennemis.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'détresse  : le même mot est traduit par adversaire au v. 5n. –  Mes entrailles 2.11 ; Es 16.11 ; Jr 4.19. –  a tué mes enfants  : litt. a privé d''enfants  ; cf. Dt 32.25n. –  au dedans, c''est la mort  : litt. dans la maison comme la mort  ; cf. Jr 9.20.'
  - type: text
    content: Seigneur
  - type: text
    content: ', regarde ma détresse !'
  - type: text
    content: Mes entrailles bouillonnent,
  - type: text
    content: mon cœur est bouleversé au dedans de moi,
  - type: text
    content: car j'ai vraiment été rebelle.
  - type: text
    content: Au dehors, l'épée a tué mes enfants,
  - type: text
    content: au dedans, c'est la mort.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'tu as fait venir  : Syr porte fais venir. –  le jour…  : cf. Jl 1.15 ; Am 5.18.'
  - type: text
    content: On m'a entendue gémir,
  - type: text
    content: mais personne ne me console ;
  - type: text
    content: tous mes ennemis ont appris mon malheur,
  - type: text
    content: ils se sont égayés, parce que c'est toi qui l'as fait ;
  - type: text
    content: tu as fait venir le jour que tu avais annoncé.
  - type: text
    content: Qu'ils deviennent comme moi !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'le mal qu''ils ont fait  : autre traduction leur méchanceté  ; cf. Jr 51.35. –  souffrant  : cf. v. 13n.'
  - type: text
    content: Que tout le mal qu'ils ont fait vienne devant toi.
  - type: text
    content: Traite-les
  - type: text
    content: comme tu m'as traitée
  - type: text
    content: à cause de toutes mes transgressions !
  - type: text
    content: Car nombreux sont mes gémissements,
  - type: text
    content: et mon cœur est souffrant.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'affligée ou opprimée, humiliée  ; cf. Es 48.10 ( adversité ). –  durement asservie  : autre traduction victime d''un terrible esclavage  ; cf. Ex 1.14 ; Es 14.3. –  repos 5.5 ; cf. Rt 1.9 ; 3.1. –  ceux qui la poursuivaient  : autre traduction ses persécuteurs  ; cf. v. 6n. –  détresses  : le mot hébreu correspondant ( metsarim , traduit par angoisses en Ps 116.3) est peut-être une allusion à l''Egypte (hébreu Mitsrayim ), lieu de la première servitude d''Israël (Ex 1–15) et alliée inutile contre Babylone (cf. Es 31.1) ; on y a aussi vu une allusion au nom du conquérant babylonien Nabuchodonosor (en hébreu Neboukadnetsar ).'
  - type: text
    content: Juda est exilée, affligée
  - type: text
    content: et durement asservie ;
  - type: text
    content: elle est assise parmi les nations
  - type: text
    content: et elle ne trouve pas le repos ;
  - type: text
    content: tous ceux qui la poursuivaient l'ont atteinte
  - type: text
    content: au milieu des détresses.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'en deuil Jr 14.2. –  aux rencontres festives  : pèlerinages annuels au temple de Jérusalem, où le peuple venait à la rencontre (même mot en Ex 27.21) de son Dieu ; voir aussi v. 15n  ; 2.6ns. –  portes Es 3.26. –  dévastées v. 13n. –  jeunes filles  : litt. vierges (même terme v. 15), aussi v. 18 ; 2.10,21 ; 5.11. –  en proie au chagrin  : LXX a lu emmenées. –  amertume  : mot habituellement associé à la mort ; cf. 1S 15.32 ; Rt 1.13,20 ; Ec 7.26.'
  - type: text
    content: Les chemins de Sion sont en deuil,
  - type: text
    content: car on ne vient plus aux rencontres festives.
  - type: text
    content: Toutes ses portes sont dévastées,
  - type: text
    content: ses prêtres gémissent,
  - type: text
    content: ses jeunes filles sont en proie au chagrin,
  - type: text
    content: et elle-même est dans l'amertume.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'adversaires  : hébreu tsar (cf. v. 20n), où certains ont vu une allusion à Nabuchodonosor, en hébreu Neboukadnetsar , le destructeur de Jérusalem. –  ont pris le dessus  : litt. sont à (la) tête  ; cf. Dt 28.44.'
  - type: text
    content: Ses adversaires ont pris le dessus,
  - type: text
    content: ses ennemis sont tranquilles ;
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui a causé du chagrin'
  - type: text
    content: à cause de ses nombreuses transgressions ;
  - type: text
    content: ses enfants sont partis en captivité
  - type: text
    content: devant l'adversaire.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Sion la belle (litt. la fille de Sion , c.-à-d. Jérusalem personnifiée comme une jeune fille ; de même 2.1,4,8,10,13,18 ; 4.22 ; cf. v. 15n  ; 2.15n  ; 4.21n  ; voir Es 1.8n) a perdu tout son éclat  : litt. tout son éclat est sorti  ; cf. Ez 10.18-22 ; 11.22s. –  le chasseur  : litt. celui qui poursuit , poursuivant ou persécuteur, cf. v. 3.'
  - type: text
    content: Sion la belle a perdu
  - type: text
    content: tout son éclat ;
  - type: text
    content: ses princes sont devenus comme des cerfs
  - type: text
    content: qui ne trouvent plus de pâture,
  - type: text
    content: et qui s'en vont, privés de force,
  - type: text
    content: devant le chasseur.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'affliction / vie errante 3.19. –  ce qu''elle avait de précieux v. 10s ; 2.4n  ; cf. les autres emplois du même terme hébreu en 1R 20.6 ( ce qui a de la valeur ) ; Ez 24.16,21 ( délices ). –  ils ont ri  : cf. Ps 13.5 ; 35.19 ; 38.17. –  disparition  : terme de la même racine que le mot sabbat.'
  - type: text
    content: Jérusalem se souvient,
  - type: text
    content: aux jours de son affliction et de sa vie errante,
  - type: text
    content: de tout ce qu'elle avait de précieux
  - type: text
    content: aux jours de jadis.
  - type: text
    content: Quand son peuple est tombé aux mains de l'adversaire,
  - type: text
    content: sans personne pour la secourir,
  - type: text
    content: ses adversaires l'ont vue,
  - type: text
    content: et ils ont ri de sa disparition.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'une souillure  : le terme évoque la souillure des règles, de même au v. 17n  ; cf. Lv 12.2n  ; 15.19ss ; Ez 7.19n. –  nudité Es 47.3 ; Ez 16.37.'
  - type: text
    content: Jérusalem a multiplié ses péchés,
  - type: text
    content: c'est pourquoi elle est devenue une souillure ;
  - type: text
    content: tous ceux qui la glorifiaient la méprisent
  - type: text
    content: en voyant sa nudité ;
  - type: text
    content: elle-même gémit
  - type: text
    content: et recule.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Son impureté  : litt. son impureté dans son bas (de robe). –  elle n''a pas songé  : autre traduction elle ne s''est pas souvenue. –  son avenir ou sa fin, sa suite  ; cf. Dt 32.29 ; Es 47.7n  ; Ps 73.17. –  Regarde v. 11 ; 2.20 ; 3.59 ; 5.1. –  triomphe  : litt. grandit ou se grandit.'
  - type: text
    content: Son impureté est sur sa robe ;
  - type: text
    content: elle n'a pas songé à son avenir.
  - type: text
    content: Elle est tombée dans une déchéance inouïe,
  - type: text
    content: et personne ne la console.
  - type: text
    content: 'Regarde mon affliction, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: car l'ennemi triomphe !
