document_id: HAB.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: is2
  children:
  - type: text
    text: Un temps de crise
- type: usfm
  marker: ip
  children:
  - type: text
    text: Si le livre d'Habacuc ne nous livre guère d'indication biographique sur le prophète qui porte ce nom (1.1), il nous transporte de toute évidence dans l'une des périodes les plus sombres de l'histoire d'Israël.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Chaldéens
  - type: text
    text: ' ou Babyloniens, qui sont présentés en Habacuc 1.6 comme un fléau suscité par Dieu, mettent en péril la puissance assyrienne autour de 630 av. J.-C. Dès ce moment, des luttes opposent les candidats à la domination du Moyen-Orient. A partir de 610, Babylone soumet les petits peuples à l''ouest de l''Euphrate, y compris Juda. Les successeurs du roi Josias (mort en 609 à la bataille de Meguiddo) hésitent entre le recours à l''Egypte et l''allégeance à Babylone. Ces atermoiements entraîneront la fin du royaume de Juda, scellée par la destruction de Jérusalem et du temple en 587/6. La prédication d''Habacuc retentit vraisemblablement vers la fin du VII'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècle, lorsque apparaissent les signes précurseurs de la catastrophe.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le livre d'Habacuc dépeint le conquérant sous les traits de l'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: ennemi-type
  - type: text
    text: ' (1.6-11), porteur d''une puissance quasi démoniaque (1.11'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ). Il énumère par ailleurs ses méfaits concrets (2.6-20). Les images employées pour le décrire — animaux prédateurs (1.8), filet (1.14-16) ou gosier insatiable (2.5s) — montrent l'impuissance des victimes irrésistiblement entraînées vers la mort.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: chefs d'accusation
  - type: text
    text: ' contre cet ennemi sont les suivants : extorsion des biens d''autrui (2.6-8), profit malhonnête (2.9-11), violence politique (2.12-14,15-17), idolâtrie (2.19s). On comprend que la question de la violence et du mal ait tourmenté les victimes.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre d''Habacuc porte les questions que les peuples et les personnes se posent dans les périodes de crise. C''est pourquoi il a été lu postérieurement en fonction de situations analogues. La communauté de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Qumrân*
  - type: text
    text: ', par exemple, y trouve un éclairage sur les événements de son propre temps. Son fameux commentaire d''Habacuc, retrouvé dans une des grottes du désert de Juda, comporte le texte hébreu des deux premiers chapitres.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le dialogue du prophète avec Dieuou la force de la plainte
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le premier chapitre et le chapitre deux, au moins dans son début, rapportent un échange entre le prophète et son Dieu. Le dialogue surgit de la question du prophète : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jusqu'à quand, Seigneur, appellerai-je au secours sans que tu entendes ? Jusqu'à quand
  - type: text
    text: ' (1.2 ; 2.6) et '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pourquoi
  - type: text
    text: ' (1.3,13) sont les deux grandes questions de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: complainte
  - type: text
    text: ' telle qu''on la trouve dans la Bible, en particulier dans les Psaumes, dans Job et chez certains prophètes. Elles expriment l''incompréhension de l''homme et son désarroi devant le mal et la non-intervention de Dieu. Elles ne sont pas un signe d''incrédulité : elles naissent à l''intérieur de la foi. Au lieu de sombrer dans le doute, le fatalisme ou l''immoralisme, ceux qui les posent en appellent à Dieu contre son silence même. C''est cet appel qui ouvre la possibilité d''entendre une réponse, fût-ce sous une forme insolite.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: La manifestation de Dieu
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Selon la première réponse que Dieu donne au prophète (1.6-11), l''oppression et la violence existantes, en Israël ou contre lui, se verront délogées par les Chaldéens qui amèneront avec eux un mal plus terrible encore. Cette réponse fait rebondir la question du prophète et le confirme dans la vocation de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: protester
  - type: text
    text: ' devant Dieu, d''attendre et de guetter sa réponse. La deuxième réponse lui indique que le juste pourra vivre (2.4) alors que l''oppresseur recevra son châtiment (2.7,10s, 16s,19). Elle ne parle pas du sort de l''oppresseur de manière directe, mais en citant les '
  - type: usfm
    marker: it
    children:
    - type: text
      text: énigmes satiriques
  - type: text
    text: ' (v. 6) que les victimes elles-mêmes vont élaborer à son sujet. Enfin le prophète en appelle à la compassion de Dieu et exprime sa confiance en lui (cf. 3.2,18s).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Après le dialogue, les questions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: jusqu'à quand
  - type: text
    text: ' et '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pourquoi
  - type: text
    text: ' (chap. 1) sont absorbées dans la nouvelle prière du prophète ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: dans ta colère, souviens-toi de ta compassion,
  - type: text
    text: ' 3.2), qui introduit une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: manifestation divine
  - type: text
    text: . La complainte du premier chapitre affrontait l'apparente injustice des voies divines, la prière du chapitre 3 exalte la révélation souveraine de Dieu.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les v. 3-15 développent les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: images traditionnelles
  - type: text
    text: ' que l''Orient ancien employait pour parler des divinités : descente de la montagne sacrée, bouleversements cosmiques, char de la victoire… Tous ces éléments, que l''on retrouve dans d''autres textes bibliques décrivant des manifestations divines, indiquent que c''est '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: YHWH (
  - type: text
    text: 'le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur,
  - type: text
    text: ' le Dieu d''Israël) qui est Dieu. Ils sont mis en relation avec les interventions glorieuses de YHWH dans l''histoire de son peuple (3.7 et surtout v. 15). Ils concourent à affirmer sa victoire sur les forces du chaos et de la mort.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Quoi qu''il arrive, le prophète et ceux qui après lui redisent son psaume savent que le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: dernier mot
  - type: text
    text: ' est à Dieu et non pas aux forces de destruction.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: La foi du juste
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La réponse, que le prophète reçoit au chapitre 2 sous la forme d''une vision qu''il doit écrire, n''est pas clairement délimitée. Le sens fondamental semble en être donné au v. 4 : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: le juste vivra en tenant ferme ;
  - type: text
    text: ' telle est sans doute l''affirmation centrale qui doit être transmise et reçue (v. 2). Le terme hébreu traduit par '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tenir ferme
  - type: text
    text: ' évoque habituellement, suivant les contextes, la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: solidité,
  - type: text
    text: ' la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: constance
  - type: text
    text: ' ou la'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: probité.
  - type: text
    text: ' Paul, lisant le texte en grec, y discernera aussi le sens de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: foi.
  - type: text
    text: ' Dans le livre d''Habacuc, le juste, opposé au méchant, peut être le peuple souffrant de la tyrannie ou un individu représentatif de tous les justes. Assailli qu''il est par l''oppression, il ne pourra subsister que par une confiance inébranlable en Dieu et en sa parole donnée. Alors, même au sein de la détresse, il pourra s''adresser, comme Habacuc, au Dieu de son salut (3.13,18s).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Fidèle à la directive divine, le prophète a « écrit la vision » pour les générations à venir (cf. 2.2s). Des siècles plus tard, dans un autre contexte, la certitude que '
  - type: usfm
    marker: it
    children:
    - type: text
      text: le juste vivra par la foi
  - type: text
    text: ' a eu une importance décisive pour '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Paul
  - type: text
    text: ' et la prédication des communautés chrétiennes naissantes (cf. Rm 1.17 ; Ga 3.11 ; voir aussi Hé 10.38). L''apôtre reprend la prophétie d''Habacuc à la lumière de la mort et de la résurrection de Jésus : Dieu justifie et fait vivre tout être humain qui accepte le message de l''Evangile et s''attache par la foi à la manifestation de Dieu en Jésus-Christ.'
