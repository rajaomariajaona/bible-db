      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Pardon, Seigneur, mais je ne suis pas un homme à la parole facile, et ce n''est ni d''hier, ni d''avant-hier, ni depuis que tu me parles, à moi, ton serviteur : j''ai la bouche et la langue pesantes. '
