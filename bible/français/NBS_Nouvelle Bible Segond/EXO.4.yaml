      marker-yv: yv-n
    - type: text
      text: 'Moïse s''en alla ; de retour auprès de Jéthro, son beau-père, il lui dit : Laisse-moi, je te prie, retourner vers mes frères qui sont en Egypte, pour voir s''ils sont encore en vie. Jéthro dit à Moïse : Va en paix !'
