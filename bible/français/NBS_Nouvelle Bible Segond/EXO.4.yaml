document_id: EXO.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu révèle sa puissance à Moïse
  - type: text
    content: ' '
  - type: note
    content: croiront v. 31 ; 14.31 ; 19.9 ; cf. Mt 13.58 ; Jn 12.37ss.
  - type: text
    content: 'Moïse répondit : Ils ne me croiront pas ; ils ne m''écouteront pas. Ils diront : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne t''est pas apparu ! » '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Seigneur / Seigneur  : hébreu YHWH / ’Adonaï , cf. 3.15n. –  Pardon… v. 13 ; 22.10 ; Gn 43.20n  ; Jg 6.13. –  à la parole facile  : litt. de paroles . –  ni d''hier, ni d''avant-hier  : cf. 5.7n. –  j''ai la bouche…  : litt. je suis pesant de bouche et pesant de langue  ; cf. 6.12,30 ; Jr 1.6-9.'
  - type: text
    content: 'Moïse dit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Pardon, Seigneur, mais je ne suis pas un homme à la parole facile, et ce n''est ni d''hier, ni d''avant-hier, ni depuis que tu me parles, à moi, ton serviteur : j''ai la bouche et la langue pesantes. '
  '11':
  - type: note
    content: 'Cf. Ps 94.9 ; Pr 20.12. –  YHWH  : cf. 3.15n  ; voir noms divins.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Qui a donné une bouche à l''être humain ? Et qui rend muet ou sourd, voyant ou aveugle ? N''est-ce pas moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ? '
  '12':
  - type: note
    content: 'je serai moi-même…  : cf. 3.12n,14 ; Dt 18.18 ; 34.10n  ; Mt 10.19s/ / ; Jn 3.31-34 ; 8.26.'
  - type: text
    content: Maintenant, va ; je serai moi-même avec ta bouche, et je t'enseignerai ce que tu devras dire.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Moïse dit  : litt. il dit . –  envoie quelqu''un d''autre…  : litt. envoie donc par la main (que) tu enverras  ; autre traduction donne-moi un intermédiaire (cf. v. 14-16).'
  - type: text
    content: 'Moïse dit : Pardon, Seigneur ! Je t''en prie, envoie quelqu''un d''autre, qui tu voudras ! '
  '14':
  - type: note
    content: Voir lévite. – Voir cœur.
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre Moïse ; il dit : N''y a-t-il pas Aaron, ton frère, le lévite ? Je sais qu''il parle facilement. D''ailleurs, il vient lui-même à ta rencontre. Quand il te verra, son cœur se réjouira. '
  '15':
  - type: note
    content: 'je vous enseignerai  : verbe apparenté au terme tora, habituellement traduit par loi.'
  - type: text
    content: 'Tu lui parleras et tu mettras les paroles dans sa bouche ; moi, je serai avec ta bouche et avec sa bouche, et je vous enseignerai ce que vous devrez faire. '
  '16':
  - type: note
    content: 'il sera ta bouche…  : litt. il sera pour toi une bouche, et tu seras pour lui un dieu (cf. 7.1s ; Jr 1.9 ; 15.19).'
  - type: text
    content: 'Il parlera pour toi au peuple ; il sera ta bouche, et tu seras son dieu. '
  '17':
  - type: note
    content: 7.9,17,20 ; 9.23 ; 10.13 ; 14.16 ; 17.5,9.
  - type: text
    content: Prends ce bâton avec lequel tu produiras les signes.
  - type: heading
    content: Moïse retourne auprès de son peuple
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'mes frères  : voir 2.11n. – Voir paix.'
  - type: text
    content: 'Moïse s''en alla ; de retour auprès de Jéthro, son beau-père, il lui dit : Laisse-moi, je te prie, retourner vers mes frères qui sont en Egypte, pour voir s''ils sont encore en vie. Jéthro dit à Moïse : Va en paix !'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Madiân 2.15. –  en voulaient à ta vie  : litt. cherchaient ta vie . Voir 2.15,23 ; cf. Mt 2.20.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse, en Madiân : Va, retourne en Egypte, car ils sont morts, tous ceux qui en voulaient à ta vie. '
  '2':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Qu''y a-t-il dans ta main ? Il répondit : Un bâton. '
  '20':
  - type: note
    content: 'femme / fils  : cf. 18.2. –  bâton de Dieu  : cf. v. 2-4,21n.'
  - type: text
    content: Moïse prit sa femme et ses fils, il les fit monter sur des ânes et retourna en Egypte. Moïse prit le bâton de Dieu.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'je ferai en sorte qu''il s''entête  : litt. je fortifierai (ou je conforterai ) son cœur  ; de même en 7.13,22 ; 8.15 ; 9.12,35 ; 10.20,27 ; 11.10 ; 14.4,8,17 etc. ; cf. les autres verbes utilisés dans un sens analogue en 7.3n,14n  ; voir aussi Dt 2.30 (encore un autre verbe) ; Es 63.17 ; Lm 3.65.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Maintenant que tu retournes en Egypte, regarde tous les prodiges que j''ai mis dans ta main : tu les feras devant le pharaon. Et moi, je ferai en sorte qu''il s''entête : il ne laissera pas partir le peuple. '
  '22':
  - type: note
    content: 'mon fils Dt 1.31 ; 14.1 ; 32.6 ; Os 11.1+. –  premier-né  : cf. 13.12n  ; Sagesse 18.13 : « Ils reconnurent, devant la perte de leurs premiers-nés, que ce peuple était fils de Dieu. »'
  - type: text
    content: 'Tu diras au pharaon : « Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) : Israël est mon fils, mon premier-né. '
  '23':
  - type: note
    content: '12.29+. –  pour qu''il me serve  : autre traduction qu''il me rende un culte (cf. 3.12 etc.). –  je vais tuer  : autre traduction je tue.'
  - type: text
    content: 'Je t''ai dit : “Laisse partir mon fils, pour qu''il me serve”, et tu refuses de le laisser partir ; alors je vais tuer ton fils, ton premier-né. »'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 32.25-33 ; 38.7ss ; Ct 3.8n. –  Pendant le voyage  : autre traduction en chemin.'
  - type: text
    content: 'Pendant le voyage, au campement, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le rencontra et chercha à le faire mourir. '
  '25':
  - type: note
    content: 'Séphora 2.21. –  silex  : la circoncision était pratiquée avec un couteau de pierre, cf. Jos 5.2s. –  son fils (à elle) : le possessif est au féminin en hébreu. –  ses pieds ou ses jambes (à lui)  ; il pourrait s''agir des pieds de Moïse, de l''enfant ou même de Dieu. Certains y voient un euphémisme pour les organes génitaux (cf. Es 6.2n). – Le mot traduit par époux (ou marié, cf. Ps 19.6+) est de la même racine sémitique que le verbe correspondant à circoncire en arabe. – Voir sang.'
  - type: text
    content: 'Séphora prit un silex, coupa le prépuce de son fils et lui fit toucher ses pieds, en disant : Tu es pour moi un époux de sang ! '
  '26':
  - type: note
    content: 'il le laissa  : cf. 12.13. –  circoncision Gn 17.10ss.'
  - type: text
    content: 'Alors il le laissa, quand elle dit : « Epoux de sang », à cause de la circoncision.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: montagne de Dieu 3.1+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Aaron : Va à la rencontre de Moïse, dans le désert. Il partit, rejoignit Moïse à la montagne de Dieu et l''embrassa. '
  '28':
  - type: note
    content: 'qu''il lui avait ordonné…  : autre traduction qu''il lui avait prescrits.'
  - type: text
    content: 'Moïse fit connaître à Aaron toutes les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui l''avait envoyé, et tous les signes qu''il lui avait ordonné de produire. '
  '29':
  - type: note
    content: 3.16.
  - type: text
    content: 'Moïse et Aaron s''en allèrent et rassemblèrent tous les anciens des Israélites. '
  '3':
  - type: note
    content: '7.9s. –  le bâton devint  : litt. il devint.'
  - type: text
    content: 'Il dit : Jette-le par terre. Il le jeta par terre, et le bâton devint un serpent. Moïse se mit à fuir pour lui échapper. '
  '30':
  - type: text
    content: 'Aaron dit toutes les paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dites à Moïse, et il produisit les signes sous les yeux du peuple. '
  '31':
  - type: note
    content: 'ils apprirent  : litt. ils entendirent  ; LXX ils se réjouirent. –  intervenait 3.16+.'
  - type: text
    content: 'Le peuple crut. Quand ils apprirent que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' intervenait en faveur des Israélites, qu''il avait vu leur affliction, ils s''inclinèrent et se prosternèrent.'
  '4':
  - type: note
    content: 'le serpent redevint  : litt. il devint.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Tends ta main et saisis-le par la queue. Il tendit la main et le saisit : le serpent redevint un bâton dans sa main. '
  '5':
  - type: text
    content: '– C''est afin qu''ils croient que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères, le Dieu d''Abraham, le Dieu d''Isaac et le Dieu de Jacob, t''est apparu. '
  '6':
  - type: note
    content: 'sur ta poitrine  : litt. dans ton sein  ; cf. Gn 16.5 ; autre traduction dans ton vêtement. –  « lèpre » Lv 13.2nss. –  comme de la neige Nb 12.10 ; 2R 5.27.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit encore : Mets ta main sur ta poitrine, je te prie. Il mit sa main sur sa poitrine ; puis il la ressortit : sa main était couverte de « lèpre », elle était blanche comme de la neige. '
  '7':
  - type: note
    content: 'le reste de  : sous-entendu dans le texte.'
  - type: text
    content: 'Il dit : Remets ta main sur ta poitrine. Il remit sa main sur sa poitrine, puis il la ressortit ; elle était redevenue comme le reste de sa chair. '
  '8':
  - type: note
    content: 'ne prêtent pas attention  : litt. n''écoutent pas, cf. 3.18.'
  - type: text
    content: '– S''ils ne te croient pas et ne prêtent pas attention au premier signe, ils croiront à ce dernier signe. '
  '9':
  - type: note
    content: 7.17+. – Voir sang.
  - type: text
    content: S'ils ne croient pas même à ces deux signes et ne t'écoutent pas, tu prendras de l'eau du Nil, tu la répandras sur la terre ferme, et l'eau que tu auras prise du Nil se changera en sang sur la terre ferme.
  - type: heading
    content: Dieu adjoint Aaron à Moïse
