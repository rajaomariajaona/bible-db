      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Maintenant que tu retournes en Egypte, regarde tous les prodiges que j''ai mis dans ta main : tu les feras devant le pharaon. Et moi, je ferai en sorte qu''il s''entête : il ne laissera pas partir le peuple. '
  '22':
  - type: usfm
