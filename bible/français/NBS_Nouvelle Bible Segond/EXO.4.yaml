    - type: text
      text: 'Alors le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' se mit en colère contre Moïse ; il dit : N''y a-t-il pas Aaron, ton frère, le lévite ? Je sais qu''il parle facilement. D''ailleurs, il vient lui-même à ta rencontre. Quand il te verra, son cœur se réjouira. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je vous enseignerai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : verbe apparenté au terme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tora
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', habituellement traduit par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu lui parleras et tu mettras les paroles dans sa bouche ; moi, je serai avec ta bouche et avec sa bouche, et je vous enseignerai ce que vous devrez faire. '
