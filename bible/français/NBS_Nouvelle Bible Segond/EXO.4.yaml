        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.13 : « Ils reconnurent, devant la perte de leurs premiers-nés, que ce peuple était fils de Dieu. »'
      marker-yv: yv-n
    - type: text
      text: 'Tu diras au pharaon : « Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) : Israël est mon fils, mon premier-né. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour qu'il me serve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''il me rende un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: culte
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 3.12 etc.). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je vais tuer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je tue.
      marker-yv: yv-n
    - type: text
      text: 'Je t''ai dit : “Laisse partir mon fils, pour qu''il me serve”, et tu refuses de le laisser partir ; alors je vais tuer ton fils, ton premier-né. »'
