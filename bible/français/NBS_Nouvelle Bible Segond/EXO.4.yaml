        - type: text
          text: '  ; Mt 10.19s/ / ; Jn 3.31-34 ; 8.26.'
      marker-yv: yv-n
    - type: text
      text: Maintenant, va ; je serai moi-même avec ta bouche, et je t'enseignerai ce que tu devras dire.
