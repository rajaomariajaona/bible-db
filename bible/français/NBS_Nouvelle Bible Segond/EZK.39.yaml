document_id: EZK.39,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Gog (suite)
  - type: text
    content: ' '
  - type: note
    content: 38.2ns.
  - type: text
    content: 'Toi, humain, parle en prophète sur Gog ! Tu diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je m''oppose à toi, Gog, prince de Rosh, de Méshek et de Toubal ! '
  '10':
  - type: note
    content: forêts ou broussailles. –  ceux qui les ont pillés Es 17.14 ; 33.1 ; Jr 30.16 ; Za 2.12.
  - type: text
    content: 'Ils ne ramasseront pas de bois dans la campagne et n''en couperont pas dans les forêts, car c''est avec les armes qu''ils feront du feu. Ils prendront comme butin ceux qui les avaient pris comme butin, ils pilleront ceux qui les ont pillés – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '11':
  - type: note
    content: 'En ce jour-là 38.10,18 ; cf. Es 12.1+ ; 27.2. –  un lieu  : litt. un lieu là  ; un ms hébreu et plusieurs versions anciennes ont lu un lieu de nom, c.-à-d. un lieu renommé (variante d''une voyelle en hébreu) ; certains voient là une allusion au mausolée de Gygès, célèbre dans l''Antiquité (cf. 38.2n). –  la vallée des voyageurs  : (litt. des passants, hébreu ‘ovrim, de même dans la suite) ; certains modifient la vocalisation traditionnelle pour lire ici vallée des Abarim, c.-à-d. la profonde vallée de l''Arnon (comme en Nb 27.12 ; Dt 32.49 ; Jr 22.20), à l''est de la mer Morte (comme en 47.8). –  elle ferme le passage  : certains rapportent le verbe, non à la vallée, mais à la sépulture. –  vallée de la Multitude (ou du tumulte ; de l''abondance 7.12n) : hébreu gé hamôn (de même au v. 15, cf. v. 16) ; certains voient dans ce nom une allusion (par assonance) à la vallée de Hinnom (= gé Hinnom, qui a donné le mot géhenne  ; voir séjour des morts), au sud-est de Jérusalem, où l''on avait fait passer (voir ci-dessus la note sur voyageurs) des enfants par le feu (cf. 16.21n  ; Jr 32.35).'
  - type: text
    content: 'En ce jour-là, je donnerai à Gog un lieu de sépulture en Israël : la vallée des voyageurs, à l''est de la mer ; elle ferme le passage aux voyageurs : c''est là qu''on ensevelira Gog et toute sa multitude, et on l''appellera « vallée de la Multitude de Gog ». '
  '12':
  - type: note
    content: 'les ensevelira  : cf. v. 4 ; 29.5+. –  afin de purifier  : cf. Nb 19.11.'
  - type: text
    content: 'La maison d''Israël les ensevelira, afin de purifier le pays ; cela durera sept mois. '
  '13':
  - type: note
    content: 'il sera renommé pour cela  : litt. ce sera pour eux un nom. –  je me glorifierai  : autre traduction je serai glorifié  ; cf. 28.22n.'
  - type: text
    content: 'Tout le peuple du pays les ensevelira, il sera renommé pour cela, le jour où je me glorifierai – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '14':
  - type: note
    content: 'On mettra à part  : le même verbe hébreu est traduit par séparer en 22.26 ; 42.20. –  pays et terre traduisent le même mot hébreu ; cf. Gn 2.5n. –  avec l''aide des voyageurs (v. 11n) : ces mots sont absents de plusieurs versions anciennes ; on pourrait aussi traduire ils enseveliront les voyageurs, ceux qui sont restés…'
  - type: text
    content: 'On mettra à part des hommes pour parcourir constamment le pays. Ils enseveliront, avec l''aide des voyageurs, les corps restés par terre, pour purifier le pays : ils se mettront à la recherche au bout des sept mois. '
  '15':
  - type: note
    content: 'Ces voyageurs parcourront  : litt. les passants passeront dans (le pays), v. 11n. –  repère  : cf. 2R 23.17n. –  pour que…  : litt. jusqu''à ce que les fossoyeurs l''ensevelissent.'
  - type: text
    content: 'Ces voyageurs parcourront le pays ; quand l''un d''eux verra des ossements humains, il érigera près de là un repère, pour que les fossoyeurs l''ensevelissent dans la vallée de la Multitude de Gog. '
  '16':
  - type: note
    content: 'Hamona  : ce nom rappelle celui de la vallée, cf. v. 11n  ; toute identification de la ville est conjecturale. –  qu''on purifiera  : autre traduction qu''ils purifieront.'
  - type: text
    content: – Hamona (« Multitude ») est aussi le nom d'une ville. – C'est ainsi qu'on purifiera le pays.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Es 56.9 ; Ap 19.17s. –  mon sacrifice  : cf. Es 34.6-8 ; Jr 46.10 ; So 1.7s, ici sur le modèle des sacrifices de paix où l''on mangeait en commun la victime (Lv 6.11ss).'
  - type: text
    content: 'Toi, humain, – ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – dis aux oiseaux de toute sorte et à tous les animaux sauvages : Rassemblez-vous, venez, réunissez-vous de toutes parts pour mon sacrifice, celui que j''offre moi-même pour vous, le grand sacrifice sur les montagnes d''Israël ! Vous mangerez de la chair et vous boirez du sang. '
  '18':
  - type: note
    content: héros ou guerriers  ; cf. 32.21+. –  béliers adultes et jeunes béliers sont deux mots différents en hébreu. –  au (litt. de) Bashân (27.6+), en Transjordanie, région d'élevage réputée Dt 32.14 ; Am 4.1.
  - type: text
    content: 'Vous mangerez la chair des héros et vous boirez le sang des princes de la terre, béliers adultes, jeunes béliers, boucs, taureaux, tous engraissés au Bashân. '
  '19':
  - type: note
    content: 'graisse / sang  : cf. Lv 3.3n,17n.'
  - type: text
    content: 'Vous mangerez de la graisse à satiété et vous boirez du sang jusqu''à l''ivresse, à mon sacrifice, celui que j''offre pour vous. '
  '2':
  - type: note
    content: 'Cf. 38.4,8s. –  je te conduirai  : traduction incertaine.'
  - type: text
    content: 'Je t''entraînerai, je te conduirai, je te ferai monter du plus profond du nord et je te ferai venir sur les montagnes d''Israël. '
  '20':
  - type: note
    content: 'et des attelages  : le mot hébreu signifie habituellement char  ; LXX et des cavaliers (ou conducteurs de chars, cf. Ps 76.7n), ce qui pourrait supposer une légère variante par rapport à la vocalisation traditionnelle du texte hébreu.'
  - type: text
    content: 'Vous serez rassasiés, à ma table, des chevaux et des attelages, des héros et de tous les hommes de guerre – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '21':
  - type: note
    content: 'gloire  : cf. 1.28+. –  ma main  : cf. 6.14+ ; Ex 7.4.'
  - type: text
    content: 'Je mettrai ma gloire parmi les nations ; toutes les nations verront les jugements que j''exercerai et ma main, que je poserai sur elles. '
  '22':
  - type: note
    content: Cf. 5.13+ ; Jl 2.27.
  - type: text
    content: 'A partir de ce jour, la maison d''Israël saura que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), son Dieu.'
  - type: heading
    content: Résumé du message d'Ezéchiel
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'je me suis détourné d''eux  : litt. je leur ai caché ma face  ; cf. v. 24,29 ; Es 54.8+ ; Ps 13.2+.'
  - type: text
    content: 'Ainsi les nations sauront que c''est à cause de ses fautes que la maison d''Israël a été exilée, à cause des sacrilèges qu''elle a commis envers moi ; c''est pour cela que je me suis détourné d''eux et que je les ai livrés à leurs adversaires, afin qu''ils tombent tous par l''épée. '
  '24':
  - type: note
    content: 'impuretés  : voir pur. –  transgressions  : voir péché.'
  - type: text
    content: Je les ai traités selon leurs impuretés et leurs transgressions, et je me suis détourné d'eux.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'je vais rétablir… (16.53n) Jacob 20.5. –  une passion jalouse (5.13+) pour mon nom sacré  : cf. 20.9+ ; 36.21-23 ; voir aussi saint.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Maintenant je vais rétablir la situation de Jacob ; j''aurai pitié de toute la maison d''Israël et je montrerai une passion jalouse pour mon nom sacré. '
  '26':
  - type: note
    content: 'Ils resteront chargés…  : certains modifient le texte hébreu traditionnel pour lire ils oublieront leur confusion et tous leurs sacrilèges  ; cf. 14.10 ; 16.27n,52,54 ; 32.24s,30 ; 34.29n. –  ils habiteront en sécurité… 28.26+ ; cf. 34.28 ; 38.8.'
  - type: text
    content: 'Ils resteront chargés de leur confusion et de tous les sacrilèges qu''ils ont commis envers moi, alors même qu''ils habiteront en sécurité sur leur terre et qu''il n''y aura personne pour les troubler. '
  '27':
  - type: note
    content: 20.41+ ; 36.23s. –  parmi eux ou en eux.
  - type: text
    content: 'Quand je les ramènerai d''entre les peuples, quand je les rassemblerai des pays de leurs ennemis, je montrerai ma sainteté parmi eux sous les yeux d''une multitude de nations. '
  '28':
  - type: note
    content: 11.17+.
  - type: text
    content: 'Ainsi on saura que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu, quand, après les avoir exilés parmi les nations, je les aurai réunis sur leur terre ; je ne laisserai là-bas aucun d''entre eux '
  '29':
  - type: note
    content: 'je ne me détournerai plus d''eux  : cf. v. 23ns. –  répandu mon souffle 11.19 ; 36.27 ; 37.14 ; cf. Es 44.3+ ; Jl 3.1 ; voir aussi esprit.'
  - type: text
    content: 'et je ne me détournerai plus d''eux, car j''aurai répandu mon souffle sur la maison d''Israël – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '3':
  - type: text
    content: 'J''abattrai ton arc de ta main gauche et je ferai tomber tes flèches de ta main droite. '
  '4':
  - type: note
    content: 'de toute sorte  : litt. de toute (sorte d’)aile, de même au v. 17 ; cf. 17.23n. –  je te donnerai en pâture  : 29.5n  ; cf. v. 11-12+,17-20 ; 31.13 ; 32.4s.'
  - type: text
    content: 'Tu tomberas sur les montagnes d''Israël, toi, toutes tes troupes et les peuples qui seront avec toi ; aux rapaces, aux oiseaux de toute sorte et aux animaux sauvages je te donnerai en pâture. '
  '5':
  - type: note
    content: Cf. 33.27n.
  - type: text
    content: 'Tu tomberas en rase campagne, car moi, j''ai parlé – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'un feu  : cf. 38.22+ ; voir aussi 5.4 ; 21.2 ; 28.18 ; Ap 20.9. –  îles 26.15n  ; Es 11.11+.'
  - type: text
    content: 'J''enverrai un feu dans Magog et parmi ceux qui habitent en sécurité dans les îles ; ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '7':
  - type: note
    content: 'profaner  : cf. 20.9. –  mon nom sacré ou saint. –  le Saint en Israël  : cf. 20.39-41 ; 36.23 ; quelques mss hébreux et des versions anciennes portent le Saint d''Israël, comme en Es 1.4n.'
  - type: text
    content: 'Je ferai connaître mon nom sacré au milieu d''Israël, mon peuple, et je ne laisserai plus profaner mon nom sacré ; ainsi les nations sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Saint en Israël.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'le jour  : cf. 30.2s.'
  - type: text
    content: 'Tout cela vient, tout cela sera – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. C''est le jour dont j''ai parlé. '
  '9':
  - type: note
    content: 'les armes des ennemis ; cf. v. 10 ; 38.4 ; Es 2.4 ; 9.4 ; Ps 46.10. –  bâtons  : traduction incertaine ; litt. bâton de main.'
  - type: text
    content: 'Alors les habitants des villes d''Israël sortiront, ils brûleront et livreront aux flammes les armes, les petits boucliers et les grands boucliers, les arcs et les flèches, les bâtons et les lances ; ils en feront du feu pendant sept ans. '
