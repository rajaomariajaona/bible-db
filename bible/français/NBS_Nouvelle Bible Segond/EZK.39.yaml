    marker-yv: yv-n
  - type: text
    text: 'Toi, humain, – ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  – dis aux oiseaux de toute sorte et à tous les animaux sauvages : Rassemblez-vous, venez, réunissez-vous de toutes parts pour mon sacrifice, celui que j''offre moi-même pour vous, le grand sacrifice sur les montagnes d''Israël ! Vous mangerez de la chair et vous boirez du sang. '
  - type: usfm
    marker: v
    metadata:
