      - type: text
        text: '39.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils resteront chargés…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
