  - type: text
    text: 'A cause de cela, ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Maintenant je vais rétablir la situation de Jacob ; j''aurai pitié de toute la maison d''Israël et je montrerai une passion jalouse pour mon nom sacré. '
  - type: usfm
    marker: v
