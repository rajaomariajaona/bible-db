      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous mangerez de la graisse à satiété et vous boirez du sang jusqu''à l''ivresse, à mon sacrifice, celui que j''offre pour vous. '
  - type: usfm
    marker: v
