document_id: EZK.39
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Gog (suite)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '38.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s.
    marker-yv: yv-n
  - type: text
    text: 'Toi, humain, parle en prophète sur Gog ! Tu diras : Ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Je m''oppose à toi, Gog, prince de Rosh, de Méshek et de Toubal ! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 38.4,8s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je te conduirai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine.'
    marker-yv: yv-n
  - type: text
    text: 'Je t''entraînerai, je te conduirai, je te ferai monter du plus profond du nord et je te ferai venir sur les montagnes d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'J''abattrai ton arc de ta main gauche et je ferai tomber tes flèches de ta main droite. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de toute sorte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de toute (sorte d’)aile
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 17 ; cf. 17.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je te donnerai en pâture
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 29.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. v. 11-12+,17-20 ; 31.13 ; 32.4s.'
    marker-yv: yv-n
  - type: text
    text: 'Tu tomberas sur les montagnes d''Israël, toi, toutes tes troupes et les peuples qui seront avec toi ; aux rapaces, aux oiseaux de toute sorte et aux animaux sauvages je te donnerai en pâture. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 33.27
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu tomberas en rase campagne, car moi, j''ai parlé – déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 38.22+ ; voir aussi 5.4 ; 21.2 ; 28.18 ; Ap 20.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'îles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '26.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Es 11.11+.'
    marker-yv: yv-n
  - type: text
    text: 'J''enverrai un feu dans Magog et parmi ceux qui habitent en sécurité dans les îles ; ainsi ils sauront que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH). '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: profaner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 20.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' sacré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Saint en Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 20.39-41 ; 36.23 ; quelques mss hébreux et des versions anciennes portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Saint d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en Es 1.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je ferai connaître mon nom sacré au milieu d''Israël, mon peuple, et je ne laisserai plus profaner mon nom sacré ; ainsi les nations sauront que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), le Saint en Israël.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 30.2s.'
    marker-yv: yv-n
  - type: text
    text: 'Tout cela vient, tout cela sera – déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '. C''est le jour dont j''ai parlé. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les armes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'des ennemis ; cf. v. 10 ; 38.4 ; Es 2.4 ; 9.4 ; Ps 46.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bâtons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bâton de main.
    marker-yv: yv-n
  - type: text
    text: 'Alors les habitants des villes d''Israël sortiront, ils brûleront et livreront aux flammes les armes, les petits boucliers et les grands boucliers, les arcs et les flèches, les bâtons et les lances ; ils en feront du feu pendant sept ans. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'forêts '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: broussailles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ceux qui les ont pillés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Es 17.14 ; 33.1 ; Jr 30.16 ; Za 2.12.
    marker-yv: yv-n
  - type: text
    text: 'Ils ne ramasseront pas de bois dans la campagne et n''en couperont pas dans les forêts, car c''est avec les armes qu''ils feront du feu. Ils prendront comme butin ceux qui les avaient pris comme butin, ils pilleront ceux qui les ont pillés – déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'En ce jour-là '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '38.10,18 ; cf. Es 12.1+ ; 27.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un lieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un lieu là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; un ms hébreu et plusieurs versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un lieu de nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un lieu renommé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (variante d'une voyelle en hébreu) ; certains voient là une allusion au mausolée de Gygès, célèbre dans l'Antiquité (cf. 38.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la vallée des voyageurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : (litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des passants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ‘ovrim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite) ; certains modifient la vocalisation traditionnelle pour lire ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vallée des Abarim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. la profonde vallée de l''Arnon (comme en Nb 27.12 ; Dt 32.49 ; Jr 22.20), '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à l''est de la mer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Morte (comme en 47.8). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle ferme le passage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains rapportent le verbe, non à la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vallée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais à la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sépulture. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vallée de la Multitude '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'du tumulte ; de l''abondance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'gé hamôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(de même au v. 15, cf. v. 16) ; certains voient dans ce nom une allusion (par assonance) à la vallée de Hinnom (= '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: gé Hinnom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui a donné le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: géhenne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: séjour
      - type: text
        text: ' des morts), au sud-est de Jérusalem, où l''on avait fait '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'passer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir ci-dessus la note sur '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voyageurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) des enfants par le feu (cf. 16.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jr 32.35).'
    marker-yv: yv-n
  - type: text
    text: 'En ce jour-là, je donnerai à Gog un lieu de sépulture en Israël : la vallée des voyageurs, à l''est de la mer ; elle ferme le passage aux voyageurs : c''est là qu''on ensevelira Gog et toute sa multitude, et on l''appellera « vallée de la Multitude de Gog ». '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les ensevelira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 4 ; 29.5+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'afin de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: purifier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 19.11.'
    marker-yv: yv-n
  - type: text
    text: 'La maison d''Israël les ensevelira, afin de purifier le pays ; cela durera sept mois. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il sera renommé pour cela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce sera pour eux un nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je me glorifierai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je serai glorifié
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 28.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout le peuple du pays les ensevelira, il sera renommé pour cela, le jour où je me glorifierai – déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On mettra à part
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe hébreu est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'séparer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 22.26 ; 42.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pays '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: traduisent le même mot hébreu ; cf. Gn 2.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avec l''aide des voyageurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : ces mots sont absents de plusieurs versions anciennes ; on pourrait aussi traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils enseveliront les voyageurs, ceux qui sont restés…
    marker-yv: yv-n
  - type: text
    text: 'On mettra à part des hommes pour parcourir constamment le pays. Ils enseveliront, avec l''aide des voyageurs, les corps restés par terre, pour purifier le pays : ils se mettront à la recherche au bout des sept mois. '
  - type: usfm
    marker: v
    metadata:
