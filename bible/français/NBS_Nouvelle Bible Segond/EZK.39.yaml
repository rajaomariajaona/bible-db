        text: en eux.
    marker-yv: yv-n
  - type: text
    text: 'Quand je les ramènerai d''entre les peuples, quand je les rassemblerai des pays de leurs ennemis, je montrerai ma sainteté parmi eux sous les yeux d''une multitude de nations. '
  - type: usfm
    marker: v
    metadata:
