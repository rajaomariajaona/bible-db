    marker-yv: yv-n
  - type: text
    text: 'Vous mangerez la chair des héros et vous boirez le sang des princes de la terre, béliers adultes, jeunes béliers, boucs, taureaux, tous engraissés au Bashân. '
  - type: usfm
    marker: v
