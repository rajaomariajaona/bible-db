    marker-yv: yv-n
  - type: text
    text: 'Ainsi les nations sauront que c''est à cause de ses fautes que la maison d''Israël a été exilée, à cause des sacrilèges qu''elle a commis envers moi ; c''est pour cela que je me suis détourné d''eux et que je les ai livrés à leurs adversaires, afin qu''ils tombent tous par l''épée. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
