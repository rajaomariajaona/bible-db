        - type: text
          text: pur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 25.11+.
    marker-yv: yv-n
  - type: text
    text: 'Il la couvrit d''or pur et il lui fit une bordure d''or tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
