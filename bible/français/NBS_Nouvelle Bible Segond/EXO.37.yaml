      marker-yv: yv-n
    - type: text
      text: 'Betsaléel fit le Coffre en bois d''acacia, d''une longueur de deux coudées et demie, d''une largeur d''une coudée et demie et d''une hauteur d''une coudée et demie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'table '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux coudées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : environ 90 cm ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une coudée et demie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : environ 70 cm ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit la table en bois d''acacia ; sa longueur était de deux coudées, sa largeur d''une coudée et sa hauteur d''une coudée et demie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'or '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.11+.
      marker-yv: yv-n
    - type: text
      text: 'Il la couvrit d''or pur et il lui fit une bordure d''or tout autour. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un palme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il lui fit, tout autour, un cadre d''un palme ; il fit une bordure d''or au cadre, tout autour. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fondit pour elle quatre anneaux d''or et mit les anneaux aux quatre coins correspondant aux quatre pieds. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les anneaux étaient près du cadre ; ils recevaient les barres pour porter la table. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit les barres en bois d''acacia et les couvrit d''or ; elles servaient à porter la table. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.29+.
      marker-yv: yv-n
    - type: text
      text: Il fit les ustensiles qu'on devait mettre sur la table, ses plats, ses coupes, ses bols et ses aiguières pour les libations ; il les fit d'or pur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le porte-lampes à sept branches
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte-lampes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.31+. Pour l'ensemble de la description, voir 25.31-39.
      marker-yv: yv-n
    - type: text
      text: 'Il fit le porte-lampes d''or pur ; il fit le porte-lampes d''or martelé. Son pied et sa tige, ses calices, ses boutons et ses fleurs étaient d''une seule pièce. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six branches sortaient de ses côtés, trois branches d''un côté du porte-lampes et trois branches de l''autre côté du porte-lampes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait sur une branche trois calices en forme d''amande, avec des boutons et des fleurs, et sur l''autre branche trois calices en forme d''amande, avec des boutons et des fleurs – ainsi pour les six branches qui sortaient du porte-lampes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'or '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.11+.
      marker-yv: yv-n
    - type: text
      text: 'Il le couvrit d''or pur à l''intérieur et à l''extérieur et il lui fit une bordure d''or tout autour. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur le porte-lampes, il y avait quatre calices en forme d''amande, avec leurs boutons et leurs fleurs. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un bouton sous ses deux premières branches, un bouton sous les deux branches suivantes et un bouton sous les deux dernières branches – il en était ainsi pour les six branches qui en sortaient. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Leurs boutons et leurs branches étaient d''une seule pièce ; le tout était d''or martelé, d''or pur. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cendriers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit ses sept lampes, ses mouchettes et ses cendriers d''or pur. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour le faire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour faire le porte-lampes.
      marker-yv: yv-n
    - type: text
      text: Il employa un talent d'or pur pour le faire, avec tous ses ustensiles.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'autel de l'encens
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 25-28 sont omis par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'autel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '30.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une coudée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : environ 45 cm ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit l''autel de l''encens en bois d''acacia ; sa longueur était d''une coudée et sa largeur d''une coudée ; il était carré, et sa hauteur était de deux coudées. Ses cornes étaient d''une seule pièce avec lui. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'or '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.11+.
      marker-yv: yv-n
    - type: text
      text: 'Il le couvrit d''or pur, avec son plateau, ses parois et ses cornes, tout autour, et il lui fit une bordure d''or tout autour. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit au-dessous de la bordure deux anneaux d''or, des deux côtés ; il en fit de part et d''autre, pour recevoir les barres qui servaient à le porter. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit des barres en bois d'acacia et les couvrit d'or.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'huile pour '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '30.22-25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacrée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il fit l'huile pour l'onction sacrée et l'encens aromatique, pur ; c'était un ouvrage de parfumeur.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fondit pour lui quatre anneaux d''or qu''il mit à ses quatre coins, deux anneaux d''un côté et deux anneaux de l''autre côté. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit des barres en bois d''acacia et il les couvrit d''or. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il introduisit les barres dans les anneaux sur les côtés du Coffre pour porter le Coffre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'expiatoire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit un expiatoire d''or pur ; sa longueur était de deux coudées et demie et sa largeur d''une coudée et demie. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'keroubim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'expiatoire
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit deux keroubim d''or, aux deux extrémités de l''expiatoire ; il les fit d''or martelé, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'un keroub à une extrémité et un keroub à l''autre extrémité ; il fit les keroubim d''une seule pièce avec l''expiatoire, à ses deux extrémités. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les keroubim étendaient les ailes vers le haut, couvrant de leurs ailes l'expiatoire et se faisant face l'un à l'autre ; les keroubim avaient la face tournée vers l'expiatoire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La table du pain offert
    marker-yv: yv-h
