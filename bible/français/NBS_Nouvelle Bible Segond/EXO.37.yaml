      marker: fr
      children:
      - type: text
        text: '37.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un palme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il lui fit, tout autour, un cadre d''un palme ; il fit une bordure d''or au cadre, tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il fondit pour elle quatre anneaux d''or et mit les anneaux aux quatre coins correspondant aux quatre pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les anneaux étaient près du cadre ; ils recevaient les barres pour porter la table. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il fit les barres en bois d''acacia et les couvrit d''or ; elles servaient à porter la table. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 25.29+.
    marker-yv: yv-n
  - type: text
    text: Il fit les ustensiles qu'on devait mettre sur la table, ses plats, ses coupes, ses bols et ses aiguières pour les libations ; il les fit d'or pur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le porte-lampes à sept branches
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'porte-lampes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 25.31+. Pour l'ensemble de la description, voir 25.31-39.
    marker-yv: yv-n
  - type: text
    text: 'Il fit le porte-lampes d''or pur ; il fit le porte-lampes d''or martelé. Son pied et sa tige, ses calices, ses boutons et ses fleurs étaient d''une seule pièce. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Six branches sortaient de ses côtés, trois branches d''un côté du porte-lampes et trois branches de l''autre côté du porte-lampes. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il y avait sur une branche trois calices en forme d''amande, avec des boutons et des fleurs, et sur l''autre branche trois calices en forme d''amande, avec des boutons et des fleurs – ainsi pour les six branches qui sortaient du porte-lampes. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Sur le porte-lampes, il y avait quatre calices en forme d''amande, avec leurs boutons et leurs fleurs. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il y avait un bouton sous ses deux premières branches, un bouton sous les deux branches suivantes et un bouton sous les deux dernières branches – il en était ainsi pour les six branches qui en sortaient. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Leurs boutons et leurs branches étaient d''une seule pièce ; le tout était d''or martelé, d''or pur. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cendriers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.38'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit ses sept lampes, ses mouchettes et ses cendriers d''or pur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour le faire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour faire le porte-lampes.
    marker-yv: yv-n
  - type: text
    text: Il employa un talent d'or pur pour le faire, avec tous ses ustensiles.
