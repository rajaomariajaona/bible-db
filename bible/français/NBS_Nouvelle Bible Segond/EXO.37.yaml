  - type: text
    text: 'Il fit la table en bois d''acacia ; sa longueur était de deux coudées, sa largeur d''une coudée et sa hauteur d''une coudée et demie. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
