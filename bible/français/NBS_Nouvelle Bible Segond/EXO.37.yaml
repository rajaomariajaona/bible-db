  - type: text
    text: 'Betsaléel fit le Coffre en bois d''acacia, d''une longueur de deux coudées et demie, d''une largeur d''une coudée et demie et d''une hauteur d''une coudée et demie. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'or '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 25.11+.
    marker-yv: yv-n
  - type: text
    text: 'Il le couvrit d''or pur à l''intérieur et à l''extérieur et il lui fit une bordure d''or tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il fondit pour lui quatre anneaux d''or qu''il mit à ses quatre coins, deux anneaux d''un côté et deux anneaux de l''autre côté. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il fit des barres en bois d''acacia et il les couvrit d''or. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il introduisit les barres dans les anneaux sur les côtés du Coffre pour porter le Coffre. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'expiatoire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit un expiatoire d''or pur ; sa longueur était de deux coudées et demie et sa largeur d''une coudée et demie. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'keroubim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'expiatoire
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit deux keroubim d''or, aux deux extrémités de l''expiatoire ; il les fit d''or martelé, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'un keroub à une extrémité et un keroub à l''autre extrémité ; il fit les keroubim d''une seule pièce avec l''expiatoire, à ses deux extrémités. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les keroubim étendaient les ailes vers le haut, couvrant de leurs ailes l'expiatoire et se faisant face l'un à l'autre ; les keroubim avaient la face tournée vers l'expiatoire.
- type: usfm
