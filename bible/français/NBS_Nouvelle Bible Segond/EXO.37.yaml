document_id: EXO.37,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le coffre du Témoignage
  - type: text
    content: ' '
  - type: note
    content: 'Coffre 25.10+. –  deux coudées et demie  : environ 1,10 m ; une coudée et demie  : environ 70 cm ; voir mesures.'
  - type: text
    content: 'Betsaléel fit le Coffre en bois d''acacia, d''une longueur de deux coudées et demie, d''une largeur d''une coudée et demie et d''une hauteur d''une coudée et demie. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'table 25.23+. –  deux coudées  : environ 90 cm ; une coudée et demie  : environ 70 cm ; voir mesures.'
  - type: text
    content: 'Il fit la table en bois d''acacia ; sa longueur était de deux coudées, sa largeur d''une coudée et sa hauteur d''une coudée et demie. '
  '11':
  - type: note
    content: or pur 25.11+.
  - type: text
    content: 'Il la couvrit d''or pur et il lui fit une bordure d''or tout autour. '
  '12':
  - type: note
    content: un palme 25.25n.
  - type: text
    content: 'Il lui fit, tout autour, un cadre d''un palme ; il fit une bordure d''or au cadre, tout autour. '
  '13':
  - type: text
    content: 'Il fondit pour elle quatre anneaux d''or et mit les anneaux aux quatre coins correspondant aux quatre pieds. '
  '14':
  - type: text
    content: 'Les anneaux étaient près du cadre ; ils recevaient les barres pour porter la table. '
  '15':
  - type: text
    content: 'Il fit les barres en bois d''acacia et les couvrit d''or ; elles servaient à porter la table. '
  '16':
  - type: note
    content: 25.29+.
  - type: text
    content: Il fit les ustensiles qu'on devait mettre sur la table, ses plats, ses coupes, ses bols et ses aiguières pour les libations ; il les fit d'or pur.
  - type: heading
    content: Le porte-lampes à sept branches
  '17':
  - type: text
    content: ' '
  - type: note
    content: porte-lampes 25.31+. Pour l'ensemble de la description, voir 25.31-39.
  - type: text
    content: 'Il fit le porte-lampes d''or pur ; il fit le porte-lampes d''or martelé. Son pied et sa tige, ses calices, ses boutons et ses fleurs étaient d''une seule pièce. '
  '18':
  - type: text
    content: 'Six branches sortaient de ses côtés, trois branches d''un côté du porte-lampes et trois branches de l''autre côté du porte-lampes. '
  '19':
  - type: text
    content: 'Il y avait sur une branche trois calices en forme d''amande, avec des boutons et des fleurs, et sur l''autre branche trois calices en forme d''amande, avec des boutons et des fleurs – ainsi pour les six branches qui sortaient du porte-lampes. '
  '2':
  - type: note
    content: or pur 25.11+.
  - type: text
    content: 'Il le couvrit d''or pur à l''intérieur et à l''extérieur et il lui fit une bordure d''or tout autour. '
  '20':
  - type: text
    content: 'Sur le porte-lampes, il y avait quatre calices en forme d''amande, avec leurs boutons et leurs fleurs. '
  '21':
  - type: text
    content: 'Il y avait un bouton sous ses deux premières branches, un bouton sous les deux branches suivantes et un bouton sous les deux dernières branches – il en était ainsi pour les six branches qui en sortaient. '
  '22':
  - type: text
    content: 'Leurs boutons et leurs branches étaient d''une seule pièce ; le tout était d''or martelé, d''or pur. '
  '23':
  - type: note
    content: cendriers 25.38n.
  - type: text
    content: 'Il fit ses sept lampes, ses mouchettes et ses cendriers d''or pur. '
  '24':
  - type: note
    content: 'pour le faire  : c.-à-d. pour faire le porte-lampes.'
  - type: text
    content: Il employa un talent d'or pur pour le faire, avec tous ses ustensiles.
  - type: heading
    content: L'autel de l'encens
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 25-28 sont omis par LXX. –  autel 30.1+. –  une coudée  : environ 45 cm ; voir mesures.'
  - type: text
    content: 'Il fit l''autel de l''encens en bois d''acacia ; sa longueur était d''une coudée et sa largeur d''une coudée ; il était carré, et sa hauteur était de deux coudées. Ses cornes étaient d''une seule pièce avec lui. '
  '26':
  - type: note
    content: or pur 25.11+.
  - type: text
    content: 'Il le couvrit d''or pur, avec son plateau, ses parois et ses cornes, tout autour, et il lui fit une bordure d''or tout autour. '
  '27':
  - type: text
    content: 'Il fit au-dessous de la bordure deux anneaux d''or, des deux côtés ; il en fit de part et d''autre, pour recevoir les barres qui servaient à le porter. '
  '28':
  - type: text
    content: Il fit des barres en bois d'acacia et les couvrit d'or.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'huile pour l''onction 30.22-25+. –  sacrée  : voir saint.'
  - type: text
    content: Il fit l'huile pour l'onction sacrée et l'encens aromatique, pur ; c'était un ouvrage de parfumeur.
  '3':
  - type: text
    content: 'Il fondit pour lui quatre anneaux d''or qu''il mit à ses quatre coins, deux anneaux d''un côté et deux anneaux de l''autre côté. '
  '4':
  - type: text
    content: 'Il fit des barres en bois d''acacia et il les couvrit d''or. '
  '5':
  - type: text
    content: 'Il introduisit les barres dans les anneaux sur les côtés du Coffre pour porter le Coffre. '
  '6':
  - type: note
    content: expiatoire 25.17n.
  - type: text
    content: 'Il fit un expiatoire d''or pur ; sa longueur était de deux coudées et demie et sa largeur d''une coudée et demie. '
  '7':
  - type: note
    content: keroubim 25.18n. –  l'expiatoire 25.17n.
  - type: text
    content: 'Il fit deux keroubim d''or, aux deux extrémités de l''expiatoire ; il les fit d''or martelé, '
  '8':
  - type: text
    content: 'un keroub à une extrémité et un keroub à l''autre extrémité ; il fit les keroubim d''une seule pièce avec l''expiatoire, à ses deux extrémités. '
  '9':
  - type: text
    content: Les keroubim étendaient les ailes vers le haut, couvrant de leurs ailes l'expiatoire et se faisant face l'un à l'autre ; les keroubim avaient la face tournée vers l'expiatoire.
  - type: heading
    content: La table du pain offert
