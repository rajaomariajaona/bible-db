document_id: LAM.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Détresse et espoir
  - type: text
    content: ' '
  - type: note
    content: 'Poème alphabétique (cf. 1.1n) plus élaboré : ici les v. sont regroupés trois par trois, les trois v. de chaque strophe commençant par la même lettre hébraïque ; même interversion dans l''ordre alphabétique qu''au chap. 2 (v. 46-48 et v. 49-51 ; cf. 2.1n). –  l''homme…  : cf. v. 39n  ; Es 41.8+. –  sa colère ou sa fureur , comme en 2.2.'
  - type: text
    content: Je suis l'homme qui a vu l'affliction
  - type: text
    content: sous le bâton de sa colère.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Os 13.7s ; Ps 17.12 ; Jb 10.16. –  dans son repaire  : litt. dans des cachettes.'
  - type: text
    content: Il a été pour moi un ours en embuscade,
  - type: text
    content: un lion dans son repaire.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'mes pas  : litt. mes voies.'
  - type: text
    content: Il a détourné mes pas, il m'a déchiré,
  - type: text
    content: il m'a livré à la dévastation.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 2.4 ; Jb 6.4 ; 16.12s.
  - type: text
    content: Il a tendu son arc et m'a placé
  - type: text
    content: comme une cible pour sa flèche.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'les profondeurs de mon être  : litt. mes reins  ; cf. Jr 12.2n. –  les traits  : litt. les fils  ; cf. Ps 127.4s.'
  - type: text
    content: Il a fait entrer dans les profondeurs de mon être
  - type: text
    content: les traits de son carquois.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'la risée / l''objet de leurs chansons v. 63 ; Dt 28.37 ; Jr 20.7 ; Ps 69.12s ; Jb 30.9. –  tout mon peuple  : plusieurs mss et Syr portent tous les peuples.'
  - type: text
    content: Je suis devenu la risée de tout mon peuple,
  - type: text
    content: je suis sans cesse l'objet de leurs chansons.
  '15':
  - type: text
    content: ' '
  - type: note
    content: V. 19+ ; Ps 69.22 ; Mt 27.34/ /. Au lieu de herbes amères et absinthe , LXX porte amertume et fiel  ; cf. Dt 29.17n  ; Ac 8.23.
  - type: text
    content: Il m'a rassasié d'herbes amères,
  - type: text
    content: il m'a abreuvé d'absinthe.
  '16':
  - type: text
    content: ' '
  - type: note
    content: gravier / dents Pr 20.17.
  - type: text
    content: Sur le gravier il m'a cassé les dents,
  - type: text
    content: il m'a piétiné dans la cendre.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Tu m''as rejeté  : autre traduction tu as rejeté ma vie (ou mon être  ; cf. Gn 1.20n) ; LXX il a rejeté…  ; Vg ma vie (ou mon âme ) est rejetée. –  de la paix  : cf. Jr 16.5.'
  - type: text
    content: Tu m'as rejeté loin de la paix ;
  - type: text
    content: j'ai oublié ce qu'est le bonheur.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ma majesté  : cette expression pourrait désigner Dieu ; autre traduction ma confiance a disparu  ; sur le terme hébreu correspondant (ou des homonymes ?), cf. 1S 15.29n  ; Es 63.6n.'
  - type: text
    content: 'Et j''ai dit : Ma majesté a disparu,'
  - type: text
    content: 'je n''attends plus rien du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Souviens-toi  : LXX je me suis souvenu. –  affliction / vie errante 1.7 ; cf. Ps 56.9. –  absinthe / poison v. 5n,15 ; cf. Dt 29.17 ; Jr 9.14 ; 23.15.'
  - type: text
    content: Souviens-toi de mon affliction et de ma vie errante,
  - type: text
    content: de l'absinthe et du poison ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'lumière / ténèbres  : cf. Gn 1.1-5 ; Es 9.1 ; 45.7 ; Am 5.18 ; Jn 8.12.'
  - type: text
    content: Il m'a conduit, il m'a fait aller
  - type: text
    content: non pas dans la lumière, mais dans les ténèbres.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'je m''en souviens…  : autre traduction mon être (ou ma vie , v. 17n) s''en souvient… il est replié sur moi (ce qui pourrait aussi signifier je médite ) ; selon une tradition des scribes, l''original aurait été  : ton être…  ; dans cette hypothèse, le sens serait  : tu t''en souviens bien, tu t''es penché sur moi.'
  - type: text
    content: je m'en souviens bien,
  - type: text
    content: je suis abattu.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'je réfléchis  : litt. je fais revenir vers mon cœur  ; cf. Es 44.19n.'
  - type: text
    content: Voici à quoi je réfléchis,
  - type: text
    content: 'voici pourquoi j''attends :'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'LXX omet les v. 22-24. –  la fidélité du Seigneur  : litt. les fidélités de YHWH ou ce que YHWH fait avec fidélité , d''où les bontés du Seigneur selon certains ; cf. v. 32 ; Ps 17.7+. –  n''est pas épuisée , d''après un ms hébreu et certaines versions anciennes ; texte hébreu traditionnel  : la fidélité de YHWH, c''est que nous ne sommes pas (totalement) épuisés  ; cf. Ex 34.6s.'
  - type: text
    content: 'C''est que la fidélité du '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''est pas épuisée,'
  - type: text
    content: que sa compassion n'est pas à son terme ;
  '23':
  - type: text
    content: elle se renouvelle chaque matin.
  - type: text
    content: Grande est ta constance !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai dit  : autre traduction mon être (ou mon âme , v. 17n) a dit. –  ma part  : cf. Ps 16.5s ; 73.26 ; 142.6. –  c''est pourquoi ou voici pourquoi (renvoyant à la suite) ; cf. v. 21. –  l''attends  : même verbe au v. 21 ; cf. Mi 7.7.'
  - type: text
    content: 'J''ai dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est ma part ;'
  - type: text
    content: c'est pourquoi je l'attends.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Les v. 25-27 commencent chacun par le mot hébreu tov, bon (voir v. 1n). Cf. Es 8.17 ; Ps 25.3,8 ; 40.2 ; 69.7. –  celui (litt. l'être ou l'âme  ; cf. v. 17n) qui le cherche Ps 9.11.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est bon pour qui met en lui son espérance,'
  - type: text
    content: pour celui qui le cherche.
  '26':
  - type: text
    content: Il est bon d'attendre en silence
  - type: text
    content: 'le salut du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '27':
  - type: text
    content: Il est bon pour l'homme
  - type: text
    content: de porter le joug dans sa jeunesse.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''il s''assoie  : cf. 1.1 ; 2.10 ; Jr 15.17. –  car c''est… imposé  : autre traduction quand il (Dieu) le lui impose.'
  - type: text
    content: Qu'il s'assoie solitaire et silencieux,
  - type: text
    content: car c'est ce qui lui est imposé ;
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est absent de LXX. –  peut-être…  : cf. 2S 12.15-23. –  espoir  : même racine que le verbe rendu par mettre son espérance au v. 25 et espérer en 2.16 ; autre terme v. 18,21,24n,26.'
  - type: text
    content: 'qu''il mette sa bouche dans la poussière :'
  - type: text
    content: peut-être y a-t-il de l'espoir !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Contre moi  : autre traduction contre moi seul. –  sans cesse  : litt. tout le jour.'
  - type: text
    content: Contre moi il tourne et retourne
  - type: text
    content: sa main sans cesse.
  '30':
  - type: text
    content: ' '
  - type: note
    content: Es 50.6 ; Mt 5.39.
  - type: text
    content: Qu'il tende la joue à celui qui le frappe,
  - type: text
    content: qu'il soit rassasié d'outrages.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Es 54.7-9 ; Jr 3.12.
  - type: text
    content: Car le Seigneur
  - type: text
    content: ne rejette pas pour toujours.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Es 63.7.
  - type: text
    content: Mais, lorsqu'il cause du chagrin, il a compassion
  - type: text
    content: selon sa grande fidélité ;
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'volontiers  : litt. de son cœur  ; cf. Ez 33.11.'
  - type: text
    content: car ce n'est pas volontiers qu'il afflige les humains
  - type: text
    content: et qu'il leur cause du chagrin.
  '34':
  - type: text
    content: ' '
  - type: note
    content: Cf. Am 1.6,9.
  - type: text
    content: Quand on écrase sous ses pieds
  - type: text
    content: tous les prisonniers d'un pays,
  '35':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 16.19 ; 27.19 ; 1S 8.3 ; Am 5.7-10.
  - type: text
    content: quand on porte atteinte au droit d'un homme
  - type: text
    content: à la face du Très-Haut,
  '36':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 94.5-9.
  - type: text
    content: quand on maltraite l'homme dans son procès,
  - type: text
    content: le Seigneur ne le voit-il pas ?
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Qui n''a qu''à dire…  : litt. qui (est) celui qui a dit, et (la chose) fut ? –  N''est-ce pas le Seigneur (ou le Seigneur [YHWH] , selon certains mss) …  : autre traduction quand le Seigneur ne l''a pas ordonné  ; cf. Gn 1 ; Ps 33.9 ; 148.5.'
  - type: text
    content: Qui n'a qu'à dire pour que la chose soit ?
  - type: text
    content: N'est-ce pas le Seigneur qui ordonne ?
  '38':
  - type: text
    content: ' '
  - type: note
    content: Es 45.7.
  - type: text
    content: N'est-ce pas de la bouche du Très-Haut que sortent
  - type: text
    content: les malheurs comme le bonheur ?
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions pourquoi l''homme se plaindrait-il (même verbe Nb 11.1), lui qui vit malgré ses péchés ? ou encore  : Pourquoi l''homme vivant se plaindrait-il ? Qu''il soit plutôt vaillant (litt. un homme , comme au v. 1) contre ses péchés ! cf. Gn 4.7n  ; Jr 45.5 ; Rm 5.12 ; 6.23. –  se plaigne  : sous-entendu dans le texte.'
  - type: text
    content: Pourquoi l'homme vivant se plaindrait-il ?
  - type: text
    content: Que chacun se plaigne de ses propres péchés !
  '4':
  - type: text
    content: ' '
  - type: note
    content: mes os 1.13+ ; Jb 30.30.
  - type: text
    content: Il a flétri ma chair et ma peau,
  - type: text
    content: il a brisé mes os.
  '40':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.21 ; Es 55.7 ; Jr 3.22 ; Os 6.1.
  - type: text
    content: Réfléchissons à nos voies, examinons-les à fond,
  - type: text
    content: 'et revenons au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'comme nos mains  : litt. vers les paumes  ; cf. 2.19+. –  Dieu  : hébreu ’El , cf. Gn 21.33n.'
  - type: text
    content: élevons notre cœur comme nos mains
  - type: text
    content: 'vers Dieu qui est au ciel :'
  '42':
  - type: text
    content: ' '
  - type: note
    content: 1.18+ ; cf. Jr 3.25 ; 8.14 ; 14.7.
  - type: text
    content: Nous nous sommes révoltés, rebellés !
  - type: text
    content: Et toi, tu n'as pas pardonné.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'enveloppé  : autre traduction armé (le mot est écrit un peu différemment au v. 44 dans le texte hébreu traditionnel).'
  - type: text
    content: Tu t'es enveloppé de colère, et tu nous as poursuivis ;
  - type: text
    content: tu as tué, tu n'as épargné personne ;
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'enveloppé  : cf. v. 43n. –  que la prière ne passe pas  : cf. v. 8 ; Jr 7.16 ; 11.14 ; 14.11.'
  - type: text
    content: tu t'es enveloppé d'une nuée,
  - type: text
    content: pour que la prière ne passe pas.
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 28.37. –  un objet de mépris  : autre traduction un rebut  ; le même terme est traduit par rejeter en 5.22.'
  - type: text
    content: Tu nous a traités comme des balayures,
  - type: text
    content: tu as fait de nous un objet de mépris parmi les peuples.
  '46':
  - type: text
    content: ' '
  - type: note
    content: 2.16.
  - type: text
    content: Ils ouvrent la bouche contre nous,
  - type: text
    content: tous nos ennemis.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'frayeur / fosse  : hébreu pahad / pahath  ; cf. Es 24.17s ; Jr 48.43s. –  désastre 2.11n.'
  - type: text
    content: Pour nous, ce fut frayeur et fosse,
  - type: text
    content: destruction et désastre.
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 119.136. –  des torrents  : litt. des canaux , cf. Pr 21.1n. –  de la belle…  : litt. de la fille de mon peuple (cf. 1.6n) ; Jr 14.17.'
  - type: text
    content: Mes yeux répandent des torrents d'eau,
  - type: text
    content: à cause du désastre de la belle, de mon peuple.
  '49':
  - type: text
    content: ' '
  - type: note
    content: 'Mes yeux  : litt. mon œil. –  sans répit 2.18n.'
  - type: text
    content: Mes yeux ruissellent sans répit,
  - type: text
    content: sans relâche,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Il m''assiège  : litt. il a bâti (des ouvrages de siège) contre moi  ; cf. v. 7 ; Dt 20.20. –  de poison  : autre traduction d''amertume  ; même mot hébreu v. 19 ; c''est un homonyme du mot souvent traduit par tête , qui peut aussi désigner un chef (Dt 1.15) ou une capitale (Jos 11.10) ; certains comprennent il investit la capitale et sa colline  ; d''autres modifient légèrement le texte hébreu traditionnel pour lire il entoure ma tête de lassitude.'
  - type: text
    content: Il m'assiège,
  - type: text
    content: il m'a encerclé de poison et de lassitude.
  '50':
  - type: text
    content: ' '
  - type: note
    content: Es 63.15 ; Ps 14.2 ; 102.20.
  - type: text
    content: 'jusqu''à ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fasse attention'
  - type: text
    content: et voie depuis le ciel ;
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'mes yeux me font souffrir  : litt. mon œil maltraite mon être (ou ma vie, mon âme  ; cf. v. 17n) ; certains modifient le texte hébreu traditionnel pour lire le malheur qui m''a frappé épuise mes yeux  ; cf. Ps 69.4. –  les filles  : peut-être les villages proches de Jérusalem.'
  - type: text
    content: mes yeux me font souffrir
  - type: text
    content: à cause de toutes les filles de ma ville.
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui…  : cf. Ps 35.19 ; 69.5.'
  - type: text
    content: Ils m'ont donné la chasse comme à l'oiseau,
  - type: text
    content: ceux qui, sans raison, sont mes ennemis.
  '53':
  - type: text
    content: ' '
  - type: note
    content: 'réduit… au silence ou étouffé. –  citerne ou gouffre  ; cf. Gn 37.20 ; Jr 38.6 ; Jon 2.6s ; Ps 88.7. –  des pierres  : litt. une pierre  ; ou bien le terme est à prendre comme un singulier collectif, ou bien il s''agit de la pierre qui fermait la citerne ; cf. Jos 10.18,27.'
  - type: text
    content: Ils ont réduit ma vie au silence dans la citerne,
  - type: text
    content: et ils ont jeté des pierres sur moi.
  '54':
  - type: text
    content: ' '
  - type: note
    content: 'Les eaux  : cf. Jon 2.4 ; Ps 42.8 ; 69.2s. –  perdu  : litt. coupé ou exclu , cf. Es 53.8 ; Ps 88.6n.'
  - type: text
    content: Les eaux ont recouvert ma tête ;
  - type: text
    content: 'je disais : Je suis perdu !'
  '55':
  - type: text
    content: ' '
  - type: note
    content: des profondeurs Ps 130.1s. –  citerne v. 53n.
  - type: text
    content: 'J''ai invoqué ton nom, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: des profondeurs de la citerne.
  '56':
  - type: text
    content: ' '
  - type: note
    content: 'ne ferme pas ton oreille  : cf. Lv 20.4n. –  cherchant le soulagement  : le verbe signifie habituellement souffler, reprendre haleine  ; autre traduction ne détourne pas ton oreille de mes soupirs et de mes appels au secours ! cf. Ps 28.1s.'
  - type: text
    content: 'Tu m''as entendu :'
  - type: text
    content: ne ferme pas ton oreille quand, cherchant le soulagement, je t'appelle au secours !
  '57':
  - type: text
    content: ' '
  - type: note
    content: N'aie pas peur Es 41.10+ ; Jr 1.8 ; 30.10.
  - type: text
    content: Au jour où je t'ai invoqué, tu t'es approché,
  - type: text
    content: 'tu as dit : N''aie pas peur !'
  '58':
  - type: text
    content: ' '
  - type: note
    content: 'ma cause  : litt. la cause de mon être ou de ma vie  ; cf. v. 17n. –  tu as assuré la rédemption  : cf. Ex 6.6+.'
  - type: text
    content: Seigneur, tu as défendu ma cause,
  - type: text
    content: tu as assuré la rédemption de ma vie.
  '59':
  - type: text
    content: ' '
  - type: note
    content: 'tu as vu 1.9+. –  établis mon droit  : autre traduction, pour rendre le jeu du texte hébreu sur deux termes apparentés, fais droit à mon droit.'
  - type: text
    content: Seigneur
  - type: text
    content: ', tu as vu mon écrasement :'
  - type: text
    content: établis mon droit !
  '6':
  - type: text
    content: ' '
  - type: note
    content: habiter ou asseoir , comme en 1.1n. –  les gens d'autrefois… Ps 143.3.
  - type: text
    content: Il me fait habiter dans les ténèbres,
  - type: text
    content: comme les gens d'autrefois qui sont morts.
  '60':
  - type: text
    content: ' '
  - type: note
    content: Jr 11.18s ; 18.23.
  - type: text
    content: Tu as vu toute leur vengeance,
  - type: text
    content: tous les plans qu'ils ont faits contre moi.
  '61':
  - type: text
    content: ' '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu as entendu leurs outrages,'
  - type: text
    content: tous les plans qu'ils ont faits contre moi,
  '62':
  - type: text
    content: ' '
  - type: note
    content: 'discours  : litt. lèvres.'
  - type: text
    content: les discours de ceux qui se dressent contre moi,
  - type: text
    content: ce qu'ils murmurent contre moi sans cesse.
  '63':
  - type: text
    content: ' '
  - type: note
    content: 'V. 14+. –  assis / debout  : cf. Dt 6.7 ; Ps 139.2.'
  - type: text
    content: 'Qu''ils soient assis ou debout, regarde :'
  - type: text
    content: je suis l'objet de leurs chansons.
  '64':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 59.18 ; Jr 51.56 ; Ps 28.4+.
  - type: text
    content: 'Tu leur rendras ce qu''ils méritent, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: selon l'œuvre de leurs mains ;
  '65':
  - type: text
    content: ' '
  - type: note
    content: 'tu les frapperas de stupeur  : traduction incertaine, litt. tu leur donneras une cuirasse ( ?) de cœur  ; d''autres comprennent tu leur donneras de l''angoisse  ; cf. Ex 4.21n  ; Ez 36.26.'
  - type: text
    content: tu les frapperas de stupeur ;
  - type: text
    content: ta malédiction sera contre eux ;
  '66':
  - type: text
    content: tu les poursuivras avec colère et tu les détruiras
  - type: text
    content: 'de dessous le ciel du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Il m''a emmuré v. 9 ; Jb 3.23 ; 19.8. –  il a fait peser…  : litt. il a alourdi mon bronze  ; cf. 2R 25.7n  ; Es 47.6.'
  - type: text
    content: Il m'a emmuré, pour que je ne sorte pas ;
  - type: text
    content: il a fait peser des chaînes sur moi.
  '8':
  - type: text
    content: ' '
  - type: note
    content: prière v. 44.
  - type: text
    content: J'ai beau crier et appeler au secours,
  - type: text
    content: il ferme tout accès à ma prière.
  '9':
  - type: text
    content: ' '
  - type: note
    content: V. 7.
  - type: text
    content: Il a muré mon chemin avec des pierres de taille,
  - type: text
    content: il a fait dévier mes sentiers.
