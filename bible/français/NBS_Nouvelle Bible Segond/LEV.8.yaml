        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ainsi vous ne mourrez pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 19.12 ; 20.18s ; Es 6.5-7.
    marker-yv: yv-n
  - type: text
    text: 'Vous resterez sept jours à l''entrée de la tente de la Rencontre, jour et nuit, puis vous assurerez le service du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; ainsi vous ne mourrez pas : c''est là ce qui m''a été ordonné. '
