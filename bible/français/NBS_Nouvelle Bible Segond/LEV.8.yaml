    marker-yv: yv-n
  - type: text
    text: 'Pendant sept jours, vous ne quitterez pas l''entrée de la tente de la Rencontre, jusqu''à ce que les jours de votre investiture soient achevés : il faudra sept jours pour vous investir. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ce qui s''est fait en ce jour, c''est ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a ordonné de faire, pour faire l''expiation sur vous. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
