  - type: text
    text: Consécration d'Aaron et de ses fils
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur l'ensemble du chap., cf. 6.12-16 ; Ex 29.1-37 ; 40.9-15 et les notes.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vêtements '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 28.1-43 ; 39.1-31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'huile '
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'onction
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 30.22-33. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifice
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Prends Aaron et ses fils avec lui, les vêtements, l''huile d''onction, le taureau du sacrifice pour le péché, les deux béliers et la corbeille de pains sans levain, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rassemble
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe correspondant (aussi au v. 4) évoque habituellement l''assemblée cultuelle (4.13s,21 ; 16.17,33).'
    marker-yv: yv-n
  - type: text
    text: 'et rassemble toute la communauté à l''entrée de la tente de la Rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse fit ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui avait ordonné ; la communauté se rassembla à l''entrée de la tente de la Rencontre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moïse dit à la communauté : Voici ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a ordonné de faire. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse présenta Aaron et ses fils ; il les lava avec de l''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur Aaron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'il serra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 29.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il mit sur Aaron la tunique, le ceignit de l''écharpe, le revêtit de la robe et mit sur lui l''éphod, qu''il serra avec la ceinture de l''éphod, dont il le ceignit. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 28.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il posa sur lui le pectoral et mit dans le pectoral l''ourim et le toummim. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'diadème '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 29.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sacré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il posa le turban sur sa tête et posa sur le devant du turban la lame d''or, le diadème sacré, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné à Moïse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 40.9-11.
    marker-yv: yv-n
  - type: text
    text: 'Moïse prit l''huile d''onction ; conféra l''onction à la Demeure et à tout ce qui s''y trouvait ; il consacra tout cela. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il en fit sept fois l''aspersion sur l''autel ; il conféra l''onction à l''autel et à tous ses ustensiles, à la cuve et à sa base, pour les consacrer. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il versa de l''huile d''onction sur la tête d''Aaron ; il lui conféra l''onction, pour le consacrer. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse présenta les fils d''Aaron ; il les revêtit d''une tunique, les ceignit d''une écharpe et leur attacha une tiare sur la tête, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné à Moïse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il fit approcher le taureau du sacrifice pour le péché ; Aaron et ses fils posèrent les mains sur la tête du taureau du sacrifice pour le péché. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 4.7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cornes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 27.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ôta… le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: ' de'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: purifia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 14.49 ; Ez 43.20-22 ; cf. Hé 9.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour faire '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'expiation
      - type: text
        text: ' sur lui'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on peut comprendre cette formule de deux façons : ou bien '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour faire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en faisant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'expiation pour lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou bien '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour y faire (par la suite) l'expiation (pour d'autres).
    marker-yv: yv-n
  - type: text
    text: 'Moïse l''immola ; avec son doigt, il prit le sang et en mit sur les cornes de l''autel, tout autour ; il ôta ainsi le péché de l''autel ; il versa le reste du sang sur le socle de l''autel, qu''il consacra pour faire l''expiation sur lui. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il prit toute la graisse qui couvre les entrailles, le lobe du foie et les deux rognons, avec leur graisse ; Moïse fit fumer cela sur l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jeta au feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brûla au feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 9.11 ; Ex 29.14.'
    marker-yv: yv-n
  - type: text
    text: 'Mais il jeta au feu, hors du camp, le taureau, sa peau, sa chair et ses excréments, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné à Moïse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il présenta le bélier de l''holocauste. Aaron et ses fils posèrent les mains sur la tête du bélier. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moïse l''immola et aspergea du sang le pourtour de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il coupa le bélier en morceaux. Moïse fit fumer la tête, les morceaux et la graisse. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il lava avec de l''eau les entrailles et les pattes, puis il fit fumer tout le bélier sur l''autel ; ce fut un holocauste, une odeur agréable, ce fut une offrande consumée par le feu pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné à Moïse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'investiture '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.37'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il présenta le second bélier, le bélier d''investiture ; Aaron et ses fils posèrent les mains sur la tête du bélier. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 14.14,25.
    marker-yv: yv-n
  - type: text
    text: 'Moïse l''immola, prit de son sang et en mit sur le lobe de l''oreille droite d''Aaron, sur le pouce de sa main droite et sur le pouce de son pied droit. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il présenta les fils d''Aaron ; Moïse mit du sang sur le lobe de leur oreille droite, sur le pouce de leur main droite et sur le pouce de leur pied droit, puis Moïse aspergea du reste du sang le pourtour de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'queue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Il prit la graisse, la queue, toute la graisse qui couvre les entrailles, le lobe du foie, les deux rognons, avec leur graisse, et la cuisse droite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il prit aussi dans la corbeille de pains sans levain placée devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' un gâteau sans levain, un gâteau de pain à l''huile et une galette, et il les posa sur les graisses et sur la cuisse droite. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il mit le tout dans les mains d''Aaron et de ses fils et le leur fit dédier rituellement devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Puis Moïse le prit de leurs mains et le fit fumer sur l''autel, par-dessus l''holocauste : ce fut un sacrifice d''investiture, une odeur agréable, ce fut une offrande consumée par le feu pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 7.29-36 et les notes.
    marker-yv: yv-n
  - type: text
    text: 'Moïse prit la poitrine du bélier d''investiture et il la dédia rituellement devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; ce fut la portion de Moïse, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné à Moïse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ex 24.8 ; Hé 9.18-22.
    marker-yv: yv-n
  - type: text
    text: Moïse prit de l'huile d'onction et du sang qui était sur l'autel ; il en fit l'aspersion sur Aaron et sur ses vêtements, sur ses fils et sur les vêtements de ses fils avec lui ; il consacra Aaron, ses vêtements, ses fils et les vêtements de ses fils avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moïse dit à Aaron et à ses fils : Faites cuire la viande à l''entrée de la tente de la Rencontre ; c''est là que vous la mangerez, avec le pain qui est dans la corbeille d''investiture, comme je l''ai ordonné, en disant : Ce sont Aaron et ses fils qui la mangeront. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ce qui restera de la viande et du pain, vous le jetterez au feu. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
