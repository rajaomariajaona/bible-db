document_id: LEV.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Consécration d'Aaron et de ses fils
  - type: text
    content: ' '
  - type: note
    content: Sur l'ensemble du chap., cf. 6.12-16 ; Ex 29.1-37 ; 40.9-15 et les notes.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ex 40.9-11.
  - type: text
    content: 'Moïse prit l''huile d''onction ; conféra l''onction à la Demeure et à tout ce qui s''y trouvait ; il consacra tout cela. '
  '11':
  - type: text
    content: 'Il en fit sept fois l''aspersion sur l''autel ; il conféra l''onction à l''autel et à tous ses ustensiles, à la cuve et à sa base, pour les consacrer. '
  '12':
  - type: text
    content: 'Il versa de l''huile d''onction sur la tête d''Aaron ; il lui conféra l''onction, pour le consacrer. '
  '13':
  - type: text
    content: 'Moïse présenta les fils d''Aaron ; il les revêtit d''une tunique, les ceignit d''une écharpe et leur attacha une tiare sur la tête, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '14':
  - type: text
    content: 'Il fit approcher le taureau du sacrifice pour le péché ; Aaron et ses fils posèrent les mains sur la tête du taureau du sacrifice pour le péché. '
  '15':
  - type: note
    content: 'Cf. 4.7n. – Voir sang. –  cornes Ex 27.2n. –  ôta… le péché de, c.-à-d. purifia  ; cf. 14.49 ; Ez 43.20-22 ; cf. Hé 9.21. –  pour faire l''expiation sur lui  : on peut comprendre cette formule de deux façons : ou bien pour faire (ou en faisant) l''expiation pour lui, ou bien pour y faire (par la suite) l''expiation (pour d''autres).'
  - type: text
    content: 'Moïse l''immola ; avec son doigt, il prit le sang et en mit sur les cornes de l''autel, tout autour ; il ôta ainsi le péché de l''autel ; il versa le reste du sang sur le socle de l''autel, qu''il consacra pour faire l''expiation sur lui. '
  '16':
  - type: text
    content: 'Il prit toute la graisse qui couvre les entrailles, le lobe du foie et les deux rognons, avec leur graisse ; Moïse fit fumer cela sur l''autel. '
  '17':
  - type: note
    content: 'jeta au feu  : litt. brûla au feu  ; cf. 9.11 ; Ex 29.14.'
  - type: text
    content: 'Mais il jeta au feu, hors du camp, le taureau, sa peau, sa chair et ses excréments, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '18':
  - type: text
    content: 'Il présenta le bélier de l''holocauste. Aaron et ses fils posèrent les mains sur la tête du bélier. '
  '19':
  - type: text
    content: 'Moïse l''immola et aspergea du sang le pourtour de l''autel. '
  '2':
  - type: note
    content: vêtements Ex 28.1-43 ; 39.1-31. –  huile d'onction 4.3n  ; Ex 30.22-33. – Voir sacrifice.
  - type: text
    content: 'Prends Aaron et ses fils avec lui, les vêtements, l''huile d''onction, le taureau du sacrifice pour le péché, les deux béliers et la corbeille de pains sans levain, '
  '20':
  - type: text
    content: 'Il coupa le bélier en morceaux. Moïse fit fumer la tête, les morceaux et la graisse. '
  '21':
  - type: text
    content: 'Il lava avec de l''eau les entrailles et les pattes, puis il fit fumer tout le bélier sur l''autel ; ce fut un holocauste, une odeur agréable, ce fut une offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: investiture 7.37n.
  - type: text
    content: 'Il présenta le second bélier, le bélier d''investiture ; Aaron et ses fils posèrent les mains sur la tête du bélier. '
  '23':
  - type: note
    content: Cf. 14.14,25.
  - type: text
    content: 'Moïse l''immola, prit de son sang et en mit sur le lobe de l''oreille droite d''Aaron, sur le pouce de sa main droite et sur le pouce de son pied droit. '
  '24':
  - type: text
    content: 'Il présenta les fils d''Aaron ; Moïse mit du sang sur le lobe de leur oreille droite, sur le pouce de leur main droite et sur le pouce de leur pied droit, puis Moïse aspergea du reste du sang le pourtour de l''autel. '
  '25':
  - type: note
    content: queue 3.9n.
  - type: text
    content: Il prit la graisse, la queue, toute la graisse qui couvre les entrailles, le lobe du foie, les deux rognons, avec leur graisse, et la cuisse droite.
  '26':
  - type: text
    content: 'Il prit aussi dans la corbeille de pains sans levain placée devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' un gâteau sans levain, un gâteau de pain à l''huile et une galette, et il les posa sur les graisses et sur la cuisse droite. '
  '27':
  - type: text
    content: 'Il mit le tout dans les mains d''Aaron et de ses fils et le leur fit dédier rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Puis Moïse le prit de leurs mains et le fit fumer sur l''autel, par-dessus l''holocauste : ce fut un sacrifice d''investiture, une odeur agréable, ce fut une offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '29':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.29-36 et les notes.
  - type: text
    content: 'Moïse prit la poitrine du bélier d''investiture et il la dédia rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ce fut la portion de Moïse, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '3':
  - type: note
    content: 'rassemble  : le verbe correspondant (aussi au v. 4) évoque habituellement l''assemblée cultuelle (4.13s,21 ; 16.17,33).'
  - type: text
    content: 'et rassemble toute la communauté à l''entrée de la tente de la Rencontre. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 24.8 ; Hé 9.18-22.
  - type: text
    content: Moïse prit de l'huile d'onction et du sang qui était sur l'autel ; il en fit l'aspersion sur Aaron et sur ses vêtements, sur ses fils et sur les vêtements de ses fils avec lui ; il consacra Aaron, ses vêtements, ses fils et les vêtements de ses fils avec lui.
  '31':
  - type: text
    content: 'Moïse dit à Aaron et à ses fils : Faites cuire la viande à l''entrée de la tente de la Rencontre ; c''est là que vous la mangerez, avec le pain qui est dans la corbeille d''investiture, comme je l''ai ordonné, en disant : Ce sont Aaron et ses fils qui la mangeront. '
  '32':
  - type: text
    content: 'Ce qui restera de la viande et du pain, vous le jetterez au feu. '
  '33':
  - type: note
    content: 'il faudra sept jours…  : litt. car sept jours on (ou il, c.-à-d. Dieu  ?) remplira vos mains  ; cf. v. 27 ; 7.37n.'
  - type: text
    content: 'Pendant sept jours, vous ne quitterez pas l''entrée de la tente de la Rencontre, jusqu''à ce que les jours de votre investiture soient achevés : il faudra sept jours pour vous investir. '
  '34':
  - type: text
    content: 'Ce qui s''est fait en ce jour, c''est ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné de faire, pour faire l''expiation sur vous. '
  '35':
  - type: note
    content: 'puis vous assurerez le service  : autre traduction et vous observerez l''observance  ; cf. 18.30 ; 22.9 ; Nb 1.53+ ; 3.7n  ; Dt 4.6n  ; 11.1n. –  ainsi vous ne mourrez pas Ex 19.12 ; 20.18s ; Es 6.5-7.'
  - type: text
    content: 'Vous resterez sept jours à l''entrée de la tente de la Rencontre, jour et nuit, puis vous assurerez le service du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ainsi vous ne mourrez pas : c''est là ce qui m''a été ordonné. '
  '36':
  - type: note
    content: 'par l''intermédiaire (litt. par la main) de Moïse  : cf. Jos 14.2n.'
  - type: text
    content: 'Aaron et ses fils firent tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné par l''intermédiaire de Moïse.'
  '4':
  - type: text
    content: 'Moïse fit ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait ordonné ; la communauté se rassembla à l''entrée de la tente de la Rencontre.'
  '5':
  - type: text
    content: 'Moïse dit à la communauté : Voici ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné de faire. '
  '6':
  - type: text
    content: 'Moïse présenta Aaron et ses fils ; il les lava avec de l''eau. '
  '7':
  - type: note
    content: 'sur Aaron  : litt. sur lui. –  qu''il serra  : cf. Ex 29.5n.'
  - type: text
    content: 'Il mit sur Aaron la tunique, le ceignit de l''écharpe, le revêtit de la robe et mit sur lui l''éphod, qu''il serra avec la ceinture de l''éphod, dont il le ceignit. '
  '8':
  - type: note
    content: Ex 28.30n.
  - type: text
    content: 'Il posa sur lui le pectoral et mit dans le pectoral l''ourim et le toummim. '
  '9':
  - type: note
    content: 'diadème Ex 29.6n. –  sacré  : voir saint.'
  - type: text
    content: 'Il posa le turban sur sa tête et posa sur le devant du turban la lame d''or, le diadème sacré, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
