document_id: 2SA.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Gabaonites et les descendants de Saül
  - type: text
    content: ' '
  - type: note
    content: 'Aux jours de David  : cette précision temporelle très générale indique que l''épisode qu''elle introduit se situait de manière imprécise à un moment donné du règne de David . Beaucoup pensent que les chap. 21–24 ne racontent pas des événements classés chronologiquement et postérieurs à ceux des chapitres précédents, mais une série d''éléments divers qui n''avaient pas trouvé place dans le corps du livre et qui ont été regroupés en une sorte d''appendice, pour qu''ils ne soient pas perdus. –  une famine  : cf. 1R 17.1 ; 2R 8.1 ; Rt 1.1. –  rechercha le Seigneur  : litt. rechercha la face de YHWH  ; on pourrait aussi traduire rechercha la faveur du Seigneur  ; cf. 12.16n  ; 1S 23.2 ; Ps 27.8+ ; l''expression suggère que David est allé consulter Dieu dans le sanctuaire. –  sa maison, qui a versé le sang  : litt. sa maison de sangs  ; LXX a traduit il y a une faute sur Saül et sur sa maison . –  il a fait mettre à mort les Gabaonites  : l''A.T. ne rapporte pas ailleurs cet épisode de la vie de Saul. – Sur les Gabaonites , voir Jos 9.3-27.'
  - type: text
    content: 'Aux jours de David, il y eut une famine qui dura trois années de suite. David rechercha le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : C''est à cause de Saül et de sa maison, qui a versé le sang, parce qu''il a fait mettre à mort les Gabaonites. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ritspa , mère de deux des suppliciés, veille sur les corps des défunts, qu''on a laissés exposés jusqu''à l''arrivée de la première pluie (malgré la loi de Dt 21.22s). –  un sac  : litt. le sac , l''étoffe grossière dont se revêtaient les gens en deuil, voir 3.31n  ; Gn 37.34 ; 2R 6.30. –  les oiseaux du ciel  : en l''occurrence des charognards. –  sauvages  : litt. de la campagne.'
  - type: text
    content: 'Ritspa, fille d''Aya, prit un sac et l''étendit pour elle sur le rocher, depuis le commencement de la moisson jusqu''à ce que l''eau du ciel tombe sur eux ; elle empêchait les oiseaux du ciel de se poser sur eux pendant le jour, et les animaux sauvages pendant la nuit. '
  '11':
  - type: note
    content: 'concubine  : cf. 5.13n.'
  - type: text
    content: 'On dit à David ce qu''avait fait Ritspa, fille d''Aya, concubine de Saül. '
  '12':
  - type: note
    content: 'Voir 1S 31.11-13 et les notes. –  les habitants  : litt. les maîtres, c.-à-d. les notables. –  Beth-Shân  : cf. 1S 31.10n. –  battu Saül à Guilboa  : cf. 1S 31.1-9.'
  - type: text
    content: 'Alors David alla prendre les ossements de Saül et les ossements de Jonathan, son fils, chez les habitants de Yabesh de Galaad, qui les avaient enlevés de la place de Beth-Shân, où les Philistins les avaient pendus le jour où ils avaient battu Saül à Guilboa. '
  '13':
  - type: text
    content: 'Il emporta de là les ossements de Saül et les ossements de Jonathan, son fils ; et on recueillit aussi les ossements des corps qui avaient été exposés. '
  '14':
  - type: note
    content: 'Après les ossements de Saül et de Jonathan, son fils, LXX ajoute et des suppliciés  ; mais on peut aussi comprendre le texte hébreu comme signifiant on les ensevelit (les ossements des suppliciés, cf. v. 13) avec les ossements de Saül et de son fils Jonathan. –  Tséla  : localité benjaminite, mentionnée en Jos 18.28, située à quelques kilomètres au nord-ouest de Jérusalem. –  Qish  : cf. 1S 9.1-3. –  Dieu se laissa fléchir  : la famine (v. 1), considérée comme un châtiment divin, prend fin ; cf. 24.25 ; Gn 25.21n.'
  - type: text
    content: On ensevelit les ossements de Saül et de Jonathan, son fils, au pays de Benjamin, à Tséla, dans le tombeau de Qish, père de Saül ; on fit tout ce que le roi avait ordonné. Après cela, Dieu se laissa fléchir en faveur du pays.
  - type: heading
    content: Combats contre les Philistins
  - type: heading
    content: 1Ch 20.4-8
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Les Philistins firent encore la guerre  : cf. 1S 4.16n. –  descendit  : les Philistins sont installés dans la plaine côtière ; les Israélites doivent donc descendre de la région montagneuse de Juda.'
  - type: text
    content: 'Les Philistins firent encore la guerre à Israël. David descendit avec ses hommes, et ils combattirent les Philistins. David était épuisé. '
  '16':
  - type: note
    content: 'Le texte hébreu de ce v. est peu clair, et la traduction incertaine. –  de Rapha (à rapprocher des Rephaïtes, cf. Gn 14.5 ; Dt 2.11 ?) ou de Harapha. –  une lance  : on ne sait pas exactement quelle espèce d''arme est désignée par le terme hébreu. –  sicles  : le mot hébreu correspondant est sous-entendu ; s''il s''agit bien d''une lance, la pointe métallique à elle seule pesait environ 3 kg. –  et il avait une épée neuve à la ceinture  : litt. et il était ceint d''une neuve  ; des versions anciennes parlent d''une épée ou d''un baudrier. On peut aussi penser à une ceinture.'
  - type: text
    content: 'Yishbi-Benob, qui était un descendant de Rapha, avait une lance du poids de trois cents sicles – poids du bronze – et il avait une épée neuve à la ceinture. Il parla d''abattre David. '
  '17':
  - type: note
    content: 'Abishaï  : cf. 1S 26.6n. –  mit à mort le Philistin  : litt. frappa le Philistin et le mit à mort. –  lui firent prêter serment  : autre traduction lui jurèrent. –  Tu n''iras plus à la guerre avec nous  : cf. 18.3. –  la lampe  : symbole de la vie qui se maintient, ici de la royauté qui se perpétue ; cf. 1R 11.36 ; Ps 132.17 ; voir aussi en 2S 14.7 une image analogue.'
  - type: text
    content: 'Abishaï, fils de Tserouya, vint au secours de David et mit à mort le Philistin. Alors les gens de David lui firent prêter serment, en lui disant : Tu n''iras plus à la guerre avec nous, tu n''éteindras pas la lampe d''Israël.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Gob  : endroit inconnu. –  Sibbekaï…  : cf. 1Ch 11.29. –  le Houshatite  : venant de Housha (cf. 1Ch 4.4), à l''ouest de Beth-Léhem. –  tua  : litt. frappa , cf. 1S 4.2n  ; de même dans les v. suivants.'
  - type: text
    content: Après cela, le combat reprit à Gob avec les Philistins. Alors Sibbekaï, le Houshatite, tua Saph qui était un descendant de Rapha.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1S 17 ; 1Ch 20.5. –  Yaaré-Oreguim  : nom propre surprenant, signifiant les forêts des tisserands  ; le terme ici transcrit Oreguim est traduit par tisserands à la fin du v. (cf. 1S 17.7n) ; s''il s''agit d''une répétition accidentelle, le nom du père d’ Elhanân pourrait avoir été Yaari (cf. Yaïr en 1Ch 20.5). –  le Gatite  : cf. Jos 13.3n.'
  - type: text
    content: Le combat reprit à Gob avec les Philistins. Elhanân, fils de Yaaré-Oreguim, le Bethléhémite, tua Goliath, le Gatite, qui avait une lance dont le bois était comme l'ensouple des tisserands.
  '2':
  - type: note
    content: 'Les Amorites étaient d''anciens habitants du pays de Canaan ; voir Jos 10.1-6 ; 1S 7.14n. –  les Israélites…  : litt. les fils d''Israël et de Juda.'
  - type: text
    content: Le roi appela les Gabaonites pour leur parler. – Les Gabaonites ne faisaient pas partie des Israélites, mais c'était un reste des Amorites ; les Israélites s'étaient engagés envers eux par un serment, et néanmoins Saül avait cherché à les abattre, dans sa passion jalouse pour les Israélites et les Judéens.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Gath  : cf. 1S 5.1n. –  de haute taille  : le mot hébreu est interprété par le parallèle de 1Ch 20.6. Autres lectures possibles de Madiân ; de dispute, de querelle  ; dans la dernière hypothèse, il s''agirait d''un champion qui provoque les Israélites au combat (cf. v. 21). –  issu de Rapha  : litt. né à Rapha  ; même formule au v. 22.'
  - type: text
    content: 'Il y eut encore un combat à Gath. Il y avait là un homme de haute taille qui avait six doigts à chaque main et à chaque pied, vingt-quatre en tout, et qui était également issu de Rapha. '
  '21':
  - type: note
    content: 'Il défia  : autres traductions outragea, déshonora  ; cf. 1S 17.10n. –  Shiméa  : appelé Shamma en 1S 16.9 ; 17.13.'
  - type: text
    content: 'Il défia Israël ; et Jonathan, fils de Shiméa, frère de David, le tua. '
  '22':
  - type: note
    content: 'Ces quatre hommes…  : litt. ces quatre étaient nés de Rapha à Gath. –  sous les coups  : litt. par la main.'
  - type: text
    content: Ces quatre hommes de Gath étaient issus de Rapha. Ils tombèrent sous les coups de David et de ses hommes.
  '3':
  - type: text
    content: ' '
  - type: note
    content: avec quoi ferai-je expiation , c.-à-d. de quelle manière puis-je réparer le tort (ou le mal ) que vous avez subi . –  le patrimoine du Seigneur , c.-à-d. le peuple d'Israël  ; cf. 20.19n  ; 1S 10.1n. – Voir bénédiction.
  - type: text
    content: 'David dit aux Gabaonites : Que puis-je faire pour vous et avec quoi ferai-je expiation, afin que vous bénissiez le patrimoine du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? '
  '4':
  - type: note
    content: 'd''argent ou d''or  : les Gabaonites refusent d''emblée une compensation pécuniaire. –  dans nos rapports  : sous-entendu dans le texte. –  nous n''avons personne à mettre à mort en Israël signifie probablement nous n''avons pas le droit de mettre à mort un Israélite  ; ils suggèrent ainsi prudemment que seule la mort de quelques-uns des membres de la famille du coupable pourrait réparer le tort commis, mais qu''une décision de cette importance est entre les mains du roi. –  Ce que vous direz, je le ferai  : David comprend à demi-mot la suggestion des Gabaonites, et les invite à formuler clairement leur requête.'
  - type: text
    content: 'Les Gabaonites lui répondirent : Il ne s''agit pas pour nous d''argent ou d''or dans nos rapports avec Saül et sa maison, et nous n''avons personne à mettre à mort en Israël. Le roi dit : Ce que vous direz, je le ferai pour vous. '
  '5':
  - type: note
    content: 'exterminer / détruire / disparaître  : cf. Dt 7.22s.'
  - type: text
    content: 'Ils répondirent au roi : Puisque cet homme a voulu nous exterminer, puisqu''il avait le projet de nous détruire, pour que nous disparaissions de tout le territoire d''Israël, '
  '6':
  - type: note
    content: 'sept  : chiffre probablement symbolique, représentant la totalité. –  nous exposerons leurs corps  : le sens du verbe hébreu ainsi rendu n''est pas assuré ; on l''a aussi traduit par nous les pendrons, nous les écartèlerons, nous les empalerons  ; de même aux v. 9,13. –  à Guibéa  : cf. 1S 10.5n  ; certaines versions anciennes parlent de Gabaon. –  celui que le Seigneur avait choisi, ou l''élu de YHWH (cf. 1S 10.24) : cette désignation de Saül (mentionné une seule fois dans le texte) est peut-être ironique dans la bouche des Gabaonites.'
  - type: text
    content: 'qu''on nous livre sept hommes parmi ses fils, et nous exposerons leurs corps devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Guibéa de Saül – Saül, celui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait choisi. Le roi dit : Je les livrerai. '
  '7':
  - type: note
    content: 'Mephi-Bosheth  : cf. 4.4n  ; 9.1-13. –  serment  : cf. 1S 20.14-17,42.'
  - type: text
    content: 'Le roi épargna Mephi-Bosheth, fils de Jonathan, fils de Saül, à cause du serment du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – le serment que David et Jonathan, fils de Saül, avaient fait entre eux. '
  '8':
  - type: note
    content: 'Ritspa  : cf. 3.7. –  Mikal  : cf. 1S 14.49+. –  Adriel de Mehola  : cf. 1S 18.19, où il est mentionné comme époux de Mérab, fille aînée de Saül ; cela explique que certains mss hébreux et plusieurs versions anciennes portent ici le nom de Mérab au lieu de celui de Mikal.'
  - type: text
    content: 'Mais le roi prit les deux fils que Ritspa, fille d''Aya, avait donnés à Saül, Armoni et Mephi-Bosheth, et les cinq fils que Mikal, fille de Saül, avait donnés à Adriel de Mehola, fils de Barzillaï. '
  '9':
  - type: note
    content: 'qui exposèrent leurs corps  : cf. v. 6n,13. –  dans la montagne  : cette montagne n''est pas identifiée. –  aux premiers jours de la moisson  : au début du printemps.'
  - type: text
    content: 'Il les livra aux Gabaonites, qui exposèrent leurs corps dans la montagne, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: . Ils tombèrent tous les sept ensemble ; ils furent mis à mort aux premiers jours de la moisson, au commencement de la moisson des orges.
