  - type: text
    text: 'Alors David alla prendre les ossements de Saül et les ossements de Jonathan, son fils, chez les habitants de Yabesh de Galaad, qui les avaient enlevés de la place de Beth-Shân, où les Philistins les avaient pendus le jour où ils avaient battu Saül à Guilboa. '
