document_id: 2SA.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Gabaonites et les descendants de Saül
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aux jours de David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cette précision temporelle très générale indique que l''épisode qu''elle introduit se situait de manière imprécise '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à un moment donné du règne de David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Beaucoup pensent que les chap. 21–24 ne racontent pas des événements classés chronologiquement et postérieurs à ceux des chapitres précédents, mais une série d''éléments divers qui n''avaient pas trouvé place dans le corps du livre et qui ont été regroupés en une sorte d''appendice, pour qu''ils ne soient pas perdus. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une famine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1R 17.1 ; 2R 8.1 ; Rt 1.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rechercha le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rechercha la face de YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; on pourrait aussi traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rechercha la faveur du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 12.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1S 23.2 ; Ps 27.8+ ; l''expression suggère que David est allé consulter Dieu dans le sanctuaire. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sa maison, qui a versé le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sa maison de sangs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a traduit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il y a une faute sur Saül et sur sa maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il a fait mettre à mort les Gabaonites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : l''A.T. ne rapporte pas ailleurs cet épisode de la vie de Saul. – Sur '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Gabaonites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir Jos 9.3-27.'
    marker-yv: yv-n
  - type: text
    text: 'Aux jours de David, il y eut une famine qui dura trois années de suite. David rechercha le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit : C''est à cause de Saül et de sa maison, qui a versé le sang, parce qu''il a fait mettre à mort les Gabaonites. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amorites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: étaient d'anciens habitants du pays de Canaan ; voir Jos 10.1-6 ; 1S 7.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Israélites…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' d''Israël et de Juda.'
    marker-yv: yv-n
  - type: text
    text: Le roi appela les Gabaonites pour leur parler. – Les Gabaonites ne faisaient pas partie des Israélites, mais c'était un reste des Amorites ; les Israélites s'étaient engagés envers eux par un serment, et néanmoins Saül avait cherché à les abattre, dans sa passion jalouse pour les Israélites et les Judéens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avec quoi ferai-je '
      - type: usfm
        marker: w
        children:
        - type: text
          text: expiation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de quelle manière puis-je réparer le tort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le mal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que vous avez subi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le patrimoine du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le peuple d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 20.19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1S 10.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'David dit aux Gabaonites : Que puis-je faire pour vous et avec quoi ferai-je expiation, afin que vous bénissiez le patrimoine du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'argent ou d'or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les Gabaonites refusent d''emblée une compensation pécuniaire. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans nos rapports
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nous n''avons personne à mettre à mort en Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie probablement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous n'avons pas le droit de mettre à mort un Israélite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ils suggèrent ainsi prudemment que seule la mort de quelques-uns des membres de la famille du coupable pourrait '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: réparer le tort commis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais qu''une décision de cette importance est entre les mains du roi. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ce que vous direz, je le ferai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : David comprend à demi-mot la suggestion des Gabaonites, et les invite à formuler clairement leur requête.'
    marker-yv: yv-n
  - type: text
    text: 'Les Gabaonites lui répondirent : Il ne s''agit pas pour nous d''argent ou d''or dans nos rapports avec Saül et sa maison, et nous n''avons personne à mettre à mort en Israël. Le roi dit : Ce que vous direz, je le ferai pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'exterminer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'détruire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: / disparaître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 7.22s.'
    marker-yv: yv-n
  - type: text
    text: 'Ils répondirent au roi : Puisque cet homme a voulu nous exterminer, puisqu''il avait le projet de nous détruire, pour que nous disparaissions de tout le territoire d''Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sept
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : chiffre probablement symbolique, représentant la totalité. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous exposerons leurs corps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le sens du verbe hébreu ainsi rendu n''est pas assuré ; on l''a aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous les pendrons, nous les écartèlerons, nous les empalerons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même aux v. 9,13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à Guibéa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 10.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; certaines versions anciennes parlent de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gabaon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'celui que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' avait choisi'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''élu de YHWH '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 1S 10.24) : cette désignation de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saül '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (mentionné une seule fois dans le texte) est peut-être ironique dans la bouche des Gabaonites.
    marker-yv: yv-n
  - type: text
    text: 'qu''on nous livre sept hommes parmi ses fils, et nous exposerons leurs corps devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' à Guibéa de Saül – Saül, celui que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait choisi. Le roi dit : Je les livrerai. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mephi-Bosheth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 9.1-13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: serment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 20.14-17,42.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi épargna Mephi-Bosheth, fils de Jonathan, fils de Saül, à cause du serment du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – le serment que David et Jonathan, fils de Saül, avaient fait entre eux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ritspa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mikal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 14.49+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Adriel de Mehola
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 18.19, où il est mentionné comme époux de Mérab, fille aînée de Saül ; cela explique que certains mss hébreux et plusieurs versions anciennes portent ici le nom de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mérab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au lieu de celui de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mikal.
    marker-yv: yv-n
  - type: text
    text: 'Mais le roi prit les deux fils que Ritspa, fille d''Aya, avait donnés à Saül, Armoni et Mephi-Bosheth, et les cinq fils que Mikal, fille de Saül, avait donnés à Adriel de Mehola, fils de Barzillaï. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui exposèrent leurs corps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la montagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'montagne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'n''est pas identifiée. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux premiers jours de la moisson
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : au début du printemps.'
    marker-yv: yv-n
  - type: text
    text: 'Il les livra aux Gabaonites, qui exposèrent leurs corps dans la montagne, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Ils tombèrent tous les sept ensemble ; ils furent mis à mort aux premiers jours de la moisson, au commencement de la moisson des orges.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ritspa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mère de deux des suppliciés, veille sur les corps des défunts, qu''on a laissés exposés jusqu''à l''arrivée de la première pluie (malgré la loi de Dt 21.22s). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un sac
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
