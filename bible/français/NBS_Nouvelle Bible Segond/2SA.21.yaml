  - type: text
    text: 'Ritspa, fille d''Aya, prit un sac et l''étendit pour elle sur le rocher, depuis le commencement de la moisson jusqu''à ce que l''eau du ciel tombe sur eux ; elle empêchait les oiseaux du ciel de se poser sur eux pendant le jour, et les animaux sauvages pendant la nuit. '
