  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.1 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: '-'
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'consumées par le feu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lv 1.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils se nourriront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1Co 9.13.'
    marker-yv: yv-n
  - type: text
    text: 'Les prêtres-lévites, toute la tribu de Lévi, n''auront aucune part au patrimoine d''Israël ; c''est des offrandes consumées par le feu pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et de son patrimoine qu''ils se nourriront. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte hébreu est au singulier (litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il n'aura pas de patrimoine au milieu de ses frères…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; cf. 10.9+.
    marker-yv: yv-n
  - type: text
    text: 'Ils n''auront pas de patrimoine parmi leurs frères : le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est leur patrimoine, selon ce qu''il a dit à leur sujet. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lv 7.31-34 ; 10.14 ; Nb 6.20 ; 18.18s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on donnera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il donne.
    marker-yv: yv-n
  - type: text
    text: 'Voici quel sera le droit des prêtres sur le peuple, sur ceux qui offriront un sacrifice, un bovin, un mouton ou une chèvre : on donnera au prêtre l''épaule, les joues et l''estomac. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '26.1-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vin nouveau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 27.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu lui donneras les prémices de ton blé, de ton vin et de ton huile, et les prémices de la toison de ton petit bétail ; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '33.8-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour officier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . – Plusieurs témoins du texte ajoutent, avec des variantes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'afin qu''il se tienne (debout) devant le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ', ton Dieu, qu''il serve et qu''il '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénisse
      - type: text
        text: ' en son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour toujours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous les jours.
    marker-yv: yv-n
  - type: text
    text: 'car c''est lui que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, a choisi entre toutes les tribus, afin qu''il se tienne debout pour officier au nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', lui et ses fils, pour toujours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'une de tes villes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une de tes portes (de ville)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 16.2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: séjourne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe ainsi traduit est apparenté au substantif habituellement rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: immigré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ex 12.48'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: autant qu'il le désire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 12.15,20s.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''un lévite viendra de l''une de tes villes, quel que soit l''endroit où il séjourne en Israël, il pourra venir autant qu''il le désire au lieu que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' choisira. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2R 23.8s.
    marker-yv: yv-n
  - type: text
    text: 'Il officiera au nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, comme tous ses frères, les lévites qui se tiennent là, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L''interprétation de la fin du v. est incertaine (cf. v. 2) ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en déduisant ce que lui rapportera la vente des biens de ses pères '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses ventes sur les pères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: Il recevra pour sa nourriture une part égale à la leur, indépendamment de ce que pourra lui rapporter la vente des biens de ses pères.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les devins et le vrai prophète
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abominations '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.25+ ; cf. Lv 18.3.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque tu entreras dans le pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, te donne, tu n''apprendras pas à imiter les abominations de ces nations-là. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: personne qui…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.31+ ; Lv 19.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2R 21.6 ; 23.24 ; cf. Ac 19.19.'
    marker-yv: yv-n
  - type: text
    text: 'Qu''on ne trouve chez toi personne qui fasse passer son fils ou sa fille par le feu, personne qui se livre à la magie, qui cherche des présages, qui pratique la divination ou la sorcellerie, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui jette des sorts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui lie un lien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Es 47.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'spirites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'médiums '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lv 19.31 ; 20.6 ; Es 8.19 ; 19.3.
    marker-yv: yv-n
  - type: text
    text: 'qui jette des sorts, qui interroge les spirites ou les médiums, qui consulte les morts. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abomination '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.25+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dépossède '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.38+.
    marker-yv: yv-n
  - type: text
    text: 'En effet, quiconque se livre à ces pratiques est une abomination pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; c''est à cause de ces abominations que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, dépossède ces nations devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parfait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sans défaut ; intègre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu seras indéfectiblement attaché au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Mt 5.48.'
    marker-yv: yv-n
  - type: text
    text: 'Tu seras parfait à l''égard du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne t'a rien donné de semblable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne t'a pas donné ainsi.
    marker-yv: yv-n
  - type: text
    text: 'Car ces nations que tu dépossèdes écoutent les chercheurs de présages et les devins ; mais à toi, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, ne t''a rien donné de semblable. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' comme moi'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 34.10 ; Nb 12.6-8 ; Mc 9.4-7/ / ; Lc 24.25,27,44 ; Jn 1.21,45 ; 5.46 ; 6.14 ; 7.40 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ac 3.22 ; 7.37.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, suscitera pour toi, de ton propre sein, d''entre tes frères, un prophète comme moi : vous l''écouterez ! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.23-31. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' porte le pluriel'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nous ne continuerons pas à entendre la voix du Seigneur, notre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ton
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon certains mss) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu, et nous ne verrons plus ce grand feu.
    marker-yv: yv-n
  - type: text
    text: 'C''est exactement cela que tu as demandé au '
  - type: usfm
    marker: nd
    children:
    - type: text
