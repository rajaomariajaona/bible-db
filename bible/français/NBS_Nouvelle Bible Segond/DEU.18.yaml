document_id: DEU.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les droits des lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
