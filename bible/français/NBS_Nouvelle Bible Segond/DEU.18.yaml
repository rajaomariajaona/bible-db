document_id: DEU.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les droits des lévites
  - type: text
    content: ' '
  - type: note
    content: 'prêtres-lévites 17.9n. –  consumées par le feu Lv 1.9n  ; voir sacrifices. –  ils se nourriront  : cf. 1Co 9.13.'
  - type: text
    content: 'Les prêtres-lévites, toute la tribu de Lévi, n''auront aucune part au patrimoine d''Israël ; c''est des offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et de son patrimoine qu''ils se nourriront. '
  '10':
  - type: note
    content: 'personne qui…  : cf. 12.31+ ; Lv 19.26n  ; 2R 21.6 ; 23.24 ; cf. Ac 19.19.'
  - type: text
    content: 'Qu''on ne trouve chez toi personne qui fasse passer son fils ou sa fille par le feu, personne qui se livre à la magie, qui cherche des présages, qui pratique la divination ou la sorcellerie, '
  '11':
  - type: note
    content: 'qui jette des sorts  : litt. qui lie un lien  ; cf. Es 47.9n. –  spirites / médiums Lv 19.31 ; 20.6 ; Es 8.19 ; 19.3.'
  - type: text
    content: 'qui jette des sorts, qui interroge les spirites ou les médiums, qui consulte les morts. '
  '12':
  - type: note
    content: abomination 7.25+. –  dépossède 4.38+.
  - type: text
    content: 'En effet, quiconque se livre à ces pratiques est une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; c''est à cause de ces abominations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, dépossède ces nations devant toi. '
  '13':
  - type: note
    content: parfait ou sans défaut ; intègre  ; autre traduction tu seras indéfectiblement attaché au Seigneur  ; cf. Mt 5.48.
  - type: text
    content: 'Tu seras parfait à l''égard du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'ne t''a rien donné de semblable  : litt. ne t''a pas donné ainsi.'
  - type: text
    content: 'Car ces nations que tu dépossèdes écoutent les chercheurs de présages et les devins ; mais à toi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, ne t''a rien donné de semblable. '
  '15':
  - type: note
    content: 'un prophète comme moi  : cf. 34.10 ; Nb 12.6-8 ; Mc 9.4-7/ / ; Lc 24.25,27,44 ; Jn 1.21,45 ; 5.46 ; 6.14 ; 7.40 ; Ac 3.22 ; 7.37.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, suscitera pour toi, de ton propre sein, d''entre tes frères, un prophète comme moi : vous l''écouterez ! '
  '16':
  - type: note
    content: '5.23-31. LXX porte le pluriel  : nous ne continuerons pas à entendre la voix du Seigneur, notre (ou ton, selon certains mss) Dieu, et nous ne verrons plus ce grand feu.'
  - type: text
    content: 'C''est exactement cela que tu as demandé au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, à l''Horeb, au jour de l''assemblée, quand tu disais : « Que je ne continue pas à entendre la voix du '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, et que je ne voie plus ce grand feu, afin que je ne meure pas ! » '
  '17':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : Ce qu''ils ont dit est bon. '
  '18':
  - type: note
    content: 'Ex 4.15 ; Es 51.16 ; 59.21 ; Jr 1.9 ; Ez 3.1-10 ; Ap 10.9ss. –  parmi leurs frères  : litt. du sein de leurs frères (cf. v. 15).'
  - type: text
    content: 'Je susciterai pour eux, parmi leurs frères, un prophète comme toi ; je mettrai mes paroles dans sa bouche, et il leur dira tout ce que je lui ordonnerai. '
  '19':
  - type: note
    content: Ac 3.23. – Voir nom.
  - type: text
    content: 'Si quelqu''un n''écoute pas mes paroles, celles qu''il dira en mon nom, c''est moi qui lui en demanderai compte. '
  '2':
  - type: note
    content: Le texte hébreu est au singulier (litt. il n'aura pas de patrimoine au milieu de ses frères…) ; cf. 10.9+.
  - type: text
    content: 'Ils n''auront pas de patrimoine parmi leurs frères : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est leur patrimoine, selon ce qu''il a dit à leur sujet. '
  '20':
  - type: note
    content: Jr 28.15-17. –  arrogance 1.43+. –  autres dieux 6.14+ ; cf. 13.2s.
  - type: text
    content: 'Mais le prophète qui aura l''arrogance de dire en mon nom une parole que je ne lui aurai pas ordonné de dire, ou qui parlera au nom d''autres dieux, ce prophète-là sera mis à mort. '
  '21':
  - type: note
    content: 'te diras-tu  : litt. diras-tu en ton cœur.'
  - type: text
    content: 'Peut-être te diras-tu : « Comment reconnaîtrons-nous la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a pas dite ? » '
  '22':
  - type: note
    content: 'Cf. Jr 28.7-9. –  du Seigneur (YHWH) Ex 3.15n. –  ne se réalise pas  : litt. ne sera pas ou n''est pas.'
  - type: text
    content: 'Quand le prophète parle au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) et que la parole ne se réalise pas, qu''elle n''arrive pas, c''est une parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a pas dite. C''est par arrogance que le prophète l''a dite : tu n''auras pas peur de lui.'
  '3':
  - type: note
    content: 'Cf. Lv 7.31-34 ; 10.14 ; Nb 6.20 ; 18.18s. –  on donnera  : litt. il donne.'
  - type: text
    content: 'Voici quel sera le droit des prêtres sur le peuple, sur ceux qui offriront un sacrifice, un bovin, un mouton ou une chèvre : on donnera au prêtre l''épaule, les joues et l''estomac. '
  '4':
  - type: note
    content: '26.1-11. –  vin  : autre traduction vin nouveau, cf. Gn 27.28n.'
  - type: text
    content: 'Tu lui donneras les prémices de ton blé, de ton vin et de ton huile, et les prémices de la toison de ton petit bétail ; '
  '5':
  - type: note
    content: '33.8-11. –  pour officier 10.8n. – Plusieurs témoins du texte ajoutent, avec des variantes  : afin qu''il se tienne (debout) devant le Seigneur, ton Dieu, qu''il serve et qu''il bénisse en son nom. – Voir fils. –  pour toujours  : litt. tous les jours.'
  - type: text
    content: 'car c''est lui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a choisi entre toutes les tribus, afin qu''il se tienne debout pour officier au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', lui et ses fils, pour toujours.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'l''une de tes villes  : litt. une de tes portes (de ville) , comme en 16.2+. –  séjourne  : le verbe ainsi traduit est apparenté au substantif habituellement rendu par immigré , cf. Ex 12.48n. –  autant qu''il le désire  : cf. 12.15,20s.'
  - type: text
    content: 'Lorsqu''un lévite viendra de l''une de tes villes, quel que soit l''endroit où il séjourne en Israël, il pourra venir autant qu''il le désire au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' choisira. '
  '7':
  - type: note
    content: Cf. 2R 23.8s.
  - type: text
    content: 'Il officiera au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, comme tous ses frères, les lévites qui se tiennent là, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: note
    content: L'interprétation de la fin du v. est incertaine (cf. v. 2) ; on pourrait aussi comprendre en déduisant ce que lui rapportera la vente des biens de ses pères (litt. ses ventes sur les pères).
  - type: text
    content: Il recevra pour sa nourriture une part égale à la leur, indépendamment de ce que pourra lui rapporter la vente des biens de ses pères.
  - type: heading
    content: Les devins et le vrai prophète
  '9':
  - type: text
    content: ' '
  - type: note
    content: abominations 7.25+ ; cf. Lv 18.3.
  - type: text
    content: 'Lorsque tu entreras dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne, tu n''apprendras pas à imiter les abominations de ces nations-là. '
