document_id: EXO.39,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Les vêtements du grand prêtre : l''éphod'
  - type: text
    content: ' '
  - type: note
    content: 'on fit les vêtements (28.2+ ; 31.10n) …  : dans LXX ce texte (jusqu''au v. 31) fait suite à 36.8n. –  spéciaux 31.10n. –  sacrés  : voir saint.'
  - type: text
    content: 'Avec la pourpre violette et rouge et l''écarlate, on fit les vêtements spéciaux pour officier dans le sanctuaire. On fit les vêtements sacrés pour Aaron, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '10':
  - type: text
    content: 'On y sertit quatre rangées de pierres : première rangée, une sardoine, une topaze, une émeraude ; '
  '11':
  - type: text
    content: 'deuxième rangée, une escarboucle, un lapis-lazuli, un diamant ; '
  '12':
  - type: text
    content: 'troisième rangée, une opale, une agate, une améthyste ; '
  '13':
  - type: text
    content: 'quatrième rangée, une chrysolithe, un onyx, un jaspe. Ces pierres étaient enchâssées dans leurs montures d''or. '
  '14':
  - type: note
    content: Voir nom.
  - type: text
    content: 'Les pierres étaient aux noms des fils d''Israël ; il y en avait douze, d''après leurs noms ; elles étaient gravées d''une gravure de sceau, chacune avec le nom de l''une des douze tribus. '
  '15':
  - type: note
    content: or pur 25.11+.
  - type: text
    content: 'Sur le pectoral on fit des chaînettes d''or pur, en forme de cordes tressées. '
  '16':
  - type: text
    content: 'On fit deux montures d''or et deux anneaux d''or, et on mit les deux anneaux aux deux extrémités du pectoral. '
  '17':
  - type: text
    content: 'On mit les deux cordes d''or dans les deux anneaux aux deux extrémités du pectoral ; '
  '18':
  - type: text
    content: 'on mit les deux autres extrémités des deux cordes aux deux montures placées sur les épaulettes de l''éphod, par devant. '
  '19':
  - type: text
    content: 'On fit encore deux anneaux d''or qu''on plaça aux deux extrémités du pectoral, sur le bord intérieur appliqué contre l''éphod. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'On fit  : litt. il fit  ; Smr et Syr lisent le pluriel, qui correspond plus naturellement à l''indéfini (ainsi dans la suite du texte hébreu traditionnel).'
  - type: text
    content: 'On fit l''éphod d''or, de pourpre violette et rouge, d''écarlate et de fin lin retors. '
  '20':
  - type: text
    content: 'On fit deux autres anneaux d''or et on les mit au bas des deux épaulettes de l''éphod, par devant, près de la jointure, au-dessus de la ceinture de l''éphod. '
  '21':
  - type: text
    content: 'Avec un cordon de pourpre violette, on fixa le pectoral par ses anneaux aux anneaux de l''éphod, pour que le pectoral soit sur la ceinture de l''éphod et qu''il ne puisse pas se séparer de l''éphod, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  - type: heading
    content: Les autres vêtements sacrés
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'On fit  : litt. il fit . –  robe de l''éphod 28.31-35.'
  - type: text
    content: 'On fit la robe de l''éphod, ouvrage de tisserand, tout entière de pourpre violette. '
  '23':
  - type: note
    content: vêtement de cuir tressé 28.32n.
  - type: text
    content: 'L''ouverture de la robe était au milieu, comme l''ouverture d''un vêtement de cuir tressé ; il y avait un ourlet tout autour, afin que la robe ne se déchire pas. '
  '24':
  - type: text
    content: 'On fit sur le bas de la robe des grenades de pourpre violette et rouge, d''écarlate et de fil retors ; '
  '25':
  - type: text
    content: 'on fit des clochettes d''or pur ; on mit les clochettes entre les grenades sur tout le tour, au bas de la robe, entre les grenades : '
  '26':
  - type: text
    content: 'une clochette et une grenade, une clochette et une grenade, sur tout le tour, au bas de la robe, pour qu''il officie comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: tuniques de fin lin 28.39+. – Voir fils.
  - type: text
    content: 'On fit les tuniques de fin lin, ouvrage de tisserand, pour Aaron et pour ses fils ; '
  '28':
  - type: note
    content: 'les parures des tiares  : cf. Es 61.3n  ; Ez 24.17n.'
  - type: text
    content: 'le turban de fin lin, les parures des tiares, de fin lin ; les caleçons de lin, de fin lin retors ; '
  '29':
  - type: text
    content: 'l''écharpe de fin lin retors, brodée, de pourpre violette et rouge et d''écarlate ; c''était un ouvrage de brodeur, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse. '
  '3':
  - type: text
    content: 'On étendit des lames d''or et on les coupa en fils, qu''on entrelaça dans la pourpre violette et rouge, l''écarlate et le fin lin ; c''était un ouvrage d''artisan. '
  '30':
  - type: note
    content: 'lame 28.36n. –  diadème 29.6n. –  sacré  : voir saint. –  YHWH  : voir noms divins.'
  - type: text
    content: 'On fit d''or pur la lame, le diadème sacré, et on y écrivit, d''une gravure de sceau : Consacré au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '31':
  - type: text
    content: 'On lui mit un cordon de pourpre violette pour le placer sur le turban, en haut, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  - type: heading
    content: Le travail est terminé
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'LXX omet la première partie du v. –  tout le service de la Demeure  : autre traduction tout le travail pour la Demeure.'
  - type: text
    content: 'Ainsi fut achevé tout le service de la Demeure, de la tente de la Rencontre. Les Israélites firent exactement ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse. Ainsi firent-ils. '
  '33':
  - type: note
    content: 'Liste récapitulative : cf. 1R 7.40-50. –  ses éléments  : le même terme est traduit par ustensiles dans la suite (v. 35,39).'
  - type: text
    content: 'On apporta la Demeure à Moïse : la tente et tous ses éléments, ses agrafes, ses planches, ses traverses, ses colonnes et ses socles ; '
  '34':
  - type: text
    content: 'la couverture en peau de bélier teinte en rouge, la couverture en peau de dauphin et le voile qui sert de rideau ; '
  '35':
  - type: note
    content: expiatoire 25.17n.
  - type: text
    content: 'le coffre du Témoignage, ses barres, et l''expiatoire ; '
  '36':
  - type: text
    content: 'la table, tous ses ustensiles et le pain offert ; '
  '37':
  - type: note
    content: Voir pur.
  - type: text
    content: 'le porte-lampes pur, ses lampes, – les lampes à y disposer – tous ses ustensiles et l''huile pour le luminaire ; '
  '38':
  - type: note
    content: 'huile d''onction  : cf. 30.25+ ; 40.13,15.'
  - type: text
    content: 'l''autel d''or, l''huile d''onction et l''encens aromatique, ainsi que le rideau de l''entrée de la tente ; '
  '39':
  - type: note
    content: Absent de LXX.
  - type: text
    content: 'l''autel de bronze, sa grille de bronze, ses barres et tous ses ustensiles, la cuve et sa base ; '
  '4':
  - type: text
    content: 'On lui fit des épaulettes attachées par ses deux extrémités pour le fixer. '
  '40':
  - type: text
    content: 'les tentures de la cour, ses colonnes, ses socles, le rideau de la porte de la cour, ses cordages, ses piquets, et tous les ustensiles pour le service de la Demeure, pour la tente de la Rencontre ; '
  '41':
  - type: note
    content: 'sacrés  : voir saint. – Voir prêtre.'
  - type: text
    content: 'les vêtements spéciaux pour officier dans le sanctuaire, les vêtements sacrés pour Aaron, le prêtre, et les vêtements sacerdotaux de ses fils. '
  '42':
  - type: text
    content: 'Tout ce travail, les Israélites le firent exactement comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse. '
  '43':
  - type: note
    content: Voir bénédiction.
  - type: text
    content: 'Moïse vit tout le travail : ils l''avaient fait comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné. Ainsi avaient-ils fait. Alors Moïse les bénit.'
  '5':
  - type: note
    content: Cf. 28.8n.
  - type: text
    content: 'La ceinture qui l''entourait était d''une seule pièce avec lui ; elle était faite de la même façon : d''or, de pourpre violette et rouge, d''écarlate et de fin lin retors, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse. '
  '6':
  - type: note
    content: montures 28.11n. –  les noms des fils d'Israël 28.9n.
  - type: text
    content: 'On travailla les pierres d''onyx, enchâssées dans des montures d''or. On y grava, d''une gravure de sceau, les noms des fils d''Israël. '
  '7':
  - type: note
    content: 'On les mit  : litt. il les mit, de même dans la suite, jusqu''au v. 9.'
  - type: text
    content: 'On les mit sur les épaulettes de l''éphod comme des pierres d''évocation pour les fils d''Israël, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  - type: heading
    content: Le pectoral
  '8':
  - type: text
    content: 'On fit le pectoral – c''était un ouvrage d''artisan – de la même façon que l''éphod : d''or, de pourpre violette et rouge, d''écarlate et de fin lin retors. '
  '9':
  - type: text
    content: 'Il était carré ; on fit le pectoral double ; sa longueur était d''un empan et sa largeur d''un empan ; il était double. '
