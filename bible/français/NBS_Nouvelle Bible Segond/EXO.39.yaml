document_id: EXO.39,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les vêtements du grand prêtre : l''éphod'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on fit les vêtements '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (28.2+ ; 31.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ce texte (jusqu''au v. 31) fait suite à 36.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'spéciaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '31.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Avec la pourpre violette et rouge et l''écarlate, on fit les vêtements spéciaux pour officier dans le sanctuaire. On fit les vêtements sacrés pour Aaron, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'On y sertit quatre rangées de pierres : première rangée, une sardoine, une topaze, une émeraude ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'deuxième rangée, une escarboucle, un lapis-lazuli, un diamant ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'troisième rangée, une opale, une agate, une améthyste ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'quatrième rangée, une chrysolithe, un onyx, un jaspe. Ces pierres étaient enchâssées dans leurs montures d''or. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les pierres étaient aux noms des fils d''Israël ; il y en avait douze, d''après leurs noms ; elles étaient gravées d''une gravure de sceau, chacune avec le nom de l''une des douze tribus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'or '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.11+.
      marker-yv: yv-n
    - type: text
      text: 'Sur le pectoral on fit des chaînettes d''or pur, en forme de cordes tressées. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'On fit deux montures d''or et deux anneaux d''or, et on mit les deux anneaux aux deux extrémités du pectoral. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'On mit les deux cordes d''or dans les deux anneaux aux deux extrémités du pectoral ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'on mit les deux autres extrémités des deux cordes aux deux montures placées sur les épaulettes de l''éphod, par devant. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'On fit encore deux anneaux d''or qu''on plaça aux deux extrémités du pectoral, sur le bord intérieur appliqué contre l''éphod. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On fit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il fit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; Smr et Syr lisent le pluriel, qui correspond plus naturellement à l'indéfini (ainsi dans la suite du texte hébreu traditionnel).
      marker-yv: yv-n
    - type: text
      text: 'On fit l''éphod d''or, de pourpre violette et rouge, d''écarlate et de fin lin retors. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'On fit deux autres anneaux d''or et on les mit au bas des deux épaulettes de l''éphod, par devant, près de la jointure, au-dessus de la ceinture de l''éphod. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Avec un cordon de pourpre violette, on fixa le pectoral par ses anneaux aux anneaux de l''éphod, pour que le pectoral soit sur la ceinture de l''éphod et qu''il ne puisse pas se séparer de l''éphod, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les autres vêtements sacrés
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On fit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il fit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'robe de l''éphod '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 28.31-35.
      marker-yv: yv-n
    - type: text
      text: 'On fit la robe de l''éphod, ouvrage de tisserand, tout entière de pourpre violette. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vêtement de cuir tressé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'L''ouverture de la robe était au milieu, comme l''ouverture d''un vêtement de cuir tressé ; il y avait un ourlet tout autour, afin que la robe ne se déchire pas. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'On fit sur le bas de la robe des grenades de pourpre violette et rouge, d''écarlate et de fil retors ; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'on fit des clochettes d''or pur ; on mit les clochettes entre les grenades sur tout le tour, au bas de la robe, entre les grenades : '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'une clochette et une grenade, une clochette et une grenade, sur tout le tour, au bas de la robe, pour qu''il officie comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tuniques de fin lin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.39+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit les tuniques de fin lin, ouvrage de tisserand, pour Aaron et pour ses fils ; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les parures des tiares
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 61.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ez 24.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'le turban de fin lin, les parures des tiares, de fin lin ; les caleçons de lin, de fin lin retors ; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'l''écharpe de fin lin retors, brodée, de pourpre violette et rouge et d''écarlate ; c''était un ouvrage de brodeur, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'On étendit des lames d''or et on les coupa en fils, qu''on entrelaça dans la pourpre violette et rouge, l''écarlate et le fin lin ; c''était un ouvrage d''artisan. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lame '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.36'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'diadème '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '29.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'On fit d''or pur la lame, le diadème sacré, et on y écrivit, d''une gravure de sceau : Consacré au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'On lui mit un cordon de pourpre violette pour le placer sur le turban, en haut, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le travail est terminé
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.32 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' omet la première partie du v. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout le service de la Demeure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout le travail pour la Demeure.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi fut achevé tout le service de la Demeure, de la tente de la Rencontre. Les Israélites firent exactement ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait ordonné à Moïse. Ainsi firent-ils. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Liste récapitulative : cf. 1R 7.40-50. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses éléments
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ustensiles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans la suite (v. 35,39).
      marker-yv: yv-n
    - type: text
      text: 'On apporta la Demeure à Moïse : la tente et tous ses éléments, ses agrafes, ses planches, ses traverses, ses colonnes et ses socles ; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'la couverture en peau de bélier teinte en rouge, la couverture en peau de dauphin et le voile qui sert de rideau ; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.35 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: expiatoire
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'le coffre du Témoignage, ses barres, et l''expiatoire ; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'la table, tous ses ustensiles et le pain offert ; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'le porte-lampes pur, ses lampes, – les lampes à y disposer – tous ses ustensiles et l''huile pour le luminaire ; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'huile '
