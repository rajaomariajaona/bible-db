    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''un feu éclate et se propage à des épines, s''il brûle du blé en gerbes ou sur pied, ou bien le champ, celui qui a causé l''incendie donnera une compensation. '
  - type: usfm
