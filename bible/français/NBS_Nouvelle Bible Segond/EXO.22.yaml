        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: acceptera ce serment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine, litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prendra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
