    - type: usfm
      marker: ft
      children:
      - type: text
        text: '266 : « Si une intervention divine (c.-à-d. un malheur, un fléau) s''est produite dans un enclos, ou si un lion a tué une bête, le berger produira la preuve de son innocence devant le dieu, et le propriétaire de l''enclos recevra de lui l''animal qui a été frappé dans l''enclos. »'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''un homme donne à garder à son prochain un âne, un bœuf, un mouton, une chèvre ou toute autre bête qui meurt, se casse un membre ou est enlevé, sans que personne ait vu les faits, '
  - type: usfm
    marker: v
    metadata:
