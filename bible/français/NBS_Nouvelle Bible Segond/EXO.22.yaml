      - type: text
        text: par une bête féroce (de même au v. 30). Cf. Gn 31.39
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Am 3.12.'
    marker-yv: yv-n
  - type: text
    text: Si l'animal a été déchiqueté, il le produira en témoignage et il n'aura pas de compensation à donner pour ce qui a été déchiqueté.
- type: usfm
