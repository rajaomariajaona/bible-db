    - type: usfm
      marker: ft
      children:
      - type: text
        text: '57 : « Si un berger ne s''est pas mis d''accord avec le propriétaire d''un champ pour y faire paître des moutons, s''il a fait paître des moutons dans le champ sans le consentement du propriétaire du champ, quand le propriétaire du champ moissonnera son champ, le berger qui a fait paître les moutons dans le champ sans le consentement du propriétaire du champ donnera vingt kours (mesure de capacité) de grain pour dix-huit ikous (mesure de superficie) au propriétaire du champ. »'
    marker-yv: yv-n
  - type: text
    text: Lorsqu'un homme fait paître son bétail dans un champ ou dans une vigne, s'il envoie ses bêtes paître dans le champ d'un autre, il donnera en compensation du meilleur produit de son champ et du meilleur produit de sa vigne.
