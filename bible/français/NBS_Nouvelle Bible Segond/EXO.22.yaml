  - type: text
    text: 'Dans toute affaire litigieuse concernant un bœuf, un âne, un mouton ou une chèvre, un vêtement ou un objet perdu, au sujet duquel on peut dire : « C''est bien celui-ci ! », le litige des deux parties ira jusqu''à Dieu ; celui que Dieu condamnera donnera à son prochain une compensation au double.'
