      children:
      - type: text
        text: '8 : « Si un homme a volé un bœuf, un mouton, un âne, un cochon ou un bateau qui appartient au temple ou à l''Etat, il restituera trente fois plus ; si ce qu''il a volé appartient à un particulier, il fera dix fois compensation. Si le voleur n''a pas de quoi restituer, il sera mis à mort. » 21 : « Si un homme a fait un trou dans une maison, on le mettra à mort devant le trou et on l''y emmurera. »'
    marker-yv: yv-n
  - type: text
    text: '– Si un voleur est surpris en flagrant délit d''effraction, qu''il soit frappé et meure, on ne sera pas coupable de meurtre pour lui ; '
