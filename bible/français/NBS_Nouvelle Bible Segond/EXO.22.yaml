  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' interviendra entre les deux parties ; celui qui a gardé l''animal déclarera qu''il n''a pas porté la main sur le bien de son prochain ; le propriétaire de l''animal acceptera ce serment, et l''autre n''aura pas à donner de compensation. '
  - type: usfm
