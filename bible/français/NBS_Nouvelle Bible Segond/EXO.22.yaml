document_id: EXO.22,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'un voleur  : litt. le voleur . –  en flagrant délit d''effraction  : même expression en Jr 2.34. Le terme vient d''une racine qui signifie entre autres percer  : les voleurs s''introduisaient souvent dans les maisons en pratiquant une ouverture dans un mur de pisé (cf. Ez 12.7 ; Mt 6.19). –  on ne sera pas coupable…  : litt. il n''y a pas pour lui de sangs , c.-à-d. d''effusion de sang susceptible d''appeler vengeance ; même tournure au v. 2. – Cf. Code d''Hammourabi 8 : « Si un homme a volé un bœuf, un mouton, un âne, un cochon ou un bateau qui appartient au temple ou à l''Etat, il restituera trente fois plus ; si ce qu''il a volé appartient à un particulier, il fera dix fois compensation. Si le voleur n''a pas de quoi restituer, il sera mis à mort. » 21 : « Si un homme a fait un trou dans une maison, on le mettra à mort devant le trou et on l''y emmurera. »'
  - type: text
    content: '– Si un voleur est surpris en flagrant délit d''effraction, qu''il soit frappé et meure, on ne sera pas coupable de meurtre pour lui ; '
  '10':
  - type: note
    content: 'celui qui a gardé l''animal déclarera  : sous-entendu dans le texte. –  acceptera ce serment  : traduction incertaine, litt. prendra  ; on pourrait aussi comprendre reprendra (l''animal tel quel).'
  - type: text
    content: 'le serment du '
  - type: text
    content: Seigneur
  - type: text
    content: ' interviendra entre les deux parties ; celui qui a gardé l''animal déclarera qu''il n''a pas porté la main sur le bien de son prochain ; le propriétaire de l''animal acceptera ce serment, et l''autre n''aura pas à donner de compensation. '
  '11':
  - type: text
    content: 'Si l''animal a été volé chez lui, il donnera une compensation au propriétaire. '
  '12':
  - type: note
    content: déchiqueté par une bête féroce (de même au v. 30). Cf. Gn 31.39n  ; Am 3.12.
  - type: text
    content: Si l'animal a été déchiqueté, il le produira en témoignage et il n'aura pas de compensation à donner pour ce qui a été déchiqueté.
  '13':
  - type: text
    content: 'Lorsqu''un homme emprunte à son prochain une bête qui se casse un membre ou qui meurt en l''absence de son propriétaire, il donnera une compensation. '
  '14':
  - type: note
    content: 'Si l''animal…  : LXX si c''est un salarié, (l''animal) lui tiendra lieu de salaire.'
  - type: text
    content: Si le propriétaire est avec lui, il n'aura pas à donner de compensation. Si l'animal a été loué, le prix du louage suffira.
  '15':
  - type: text
    content: ' '
  - type: note
    content: La dot (hébreu mohar , cf. Gn 34.12n), selon l'usage actuel du terme dot en Afrique, était payée au père de la jeune fille par le futur gendre ou par le père de ce dernier. Cf. Dt 22.28s ; voir aussi Os 2.16.
  - type: text
    content: 'Lorsqu''un homme séduit une vierge qui n''est pas fiancée et couche avec elle, il paiera sa dot, puis il la prendra pour femme. '
  '16':
  - type: text
    content: Si le père refuse de la lui donner, il paiera en argent la valeur de la dot des vierges.
  - type: heading
    content: Lois morales et religieuses diverses
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 19.31+ ; 20.6 ; Dt 18.10s.
  - type: text
    content: Tu ne laisseras pas vivre la sorcière.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 18.23 ; 20.15s ; Dt 27.21.
  - type: text
    content: Quiconque couche avec une bête sera mis à mort.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 17.2ss ; cf. 1R 16.31-33 ; 2R 21.3-5. – Voir sacrifices . –  frappé d''anathème  : autre traduction subira l''anathème  ; voir Dt 2.34n.'
  - type: text
    content: 'Celui qui offre des sacrifices à d''autres dieux qu''au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) seul sera frappé d''anathème.'
  '2':
  - type: note
    content: 'est levé  : litt. s''est levé (ou a brillé) sur lui. –  Il (selon toute vraisemblance, le voleur évoqué en 21.37) donnera une compensation  : LXX a compris il (celui qui aura abattu le voleur) paiera de sa mort. –  vendu comme esclave.'
  - type: text
    content: 'si le soleil est levé, on sera coupable de meurtre pour lui. – Il donnera une compensation ; s''il n''a rien, il sera vendu pour son vol. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: exploiteras Lv 19.33 ; 25.14n,17 ; Dt 23.17. –  immigré 12.48n  ; cf. 23.9 ; Lv 19.33s ; Dt 10.19 ; 24.17s ; 27.19 ; Jr 22.3 ; Ez 22.7 ; voir aussi Ps 146.9.
  - type: text
    content: 'Tu n''exploiteras pas l''immigré, tu ne l''opprimeras pas : vous avez été des immigrés en Egypte.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'jamais…  : autre traduction aucune veuve ni (aucun) orphelin  ; cf. v. 24n  ; 1.11s. –  veuve / orphelin Ps 146.9+.'
  - type: text
    content: 'Vous n''affligerez jamais la veuve ni l''orphelin. '
  '22':
  - type: note
    content: Cf. 3.7.
  - type: text
    content: 'Si tu les affliges et qu''ils crient vers moi, j''entendrai leurs cris ; '
  '23':
  - type: text
    content: 'je me mettrai en colère, et je vous tuerai par l''épée : vos femmes seront veuves, et vos enfants orphelins.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'quelqu''un de mon peuple  : litt. mon peuple  ; le terme hébreu correspondant peut aussi désigner le compatriote  ; LXX ton frère . –  pauvre  : autres traductions humble, affligé  ; le terme correspondant est apparenté au verbe traduit par affliger aux v. 21s ; autres mots de sens analogue en 23.3,6. –  chez toi  : litt. avec toi . –  intérêt Lv 25.35-37 ; Dt 23.20s ; Ps 15.5 ; Né 5.1-13.'
  - type: text
    content: 'Si tu prêtes de l''argent à quelqu''un de mon peuple, au pauvre qui est chez toi, tu ne te comporteras pas à son égard comme un prêteur sur gages : tu n''exigeras pas de lui un intérêt. '
  '25':
  - type: note
    content: gage Dt 15.6 ; 24.6,10-13,17 ; Am 2.8.
  - type: text
    content: 'Si tu prends en gage le manteau de ton prochain, tu le lui rendras avant le coucher du soleil ; '
  '26':
  - type: note
    content: 'je suis clément  : autre traduction je fais grâce  ; cf. 34.6.'
  - type: text
    content: 'car sa seule couverture, c''est le manteau qu''il a sur la peau : dans quoi coucherait-il ? S''il crie vers moi, je l''entendrai, car je suis clément.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Ec 10.20 ; Ac 23.5. –  maudiras et prononceras une malédiction traduisent deux verbes hébreux synonymes ; voir bénédiction, malédiction.
  - type: text
    content: Tu ne maudiras pas Dieu, et tu ne prononceras pas de malédiction contre un prince de ton peuple.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Tu ne retiendras pas  : autres traductions tu ne tarderas pas à offrir ; tu n''offriras pas à d''autres (dieux)  ; cf. Os 2.7. –  ta pleine cuvée  : autres traductions ton excédent ; la première récolte de ton pressoir  ; même terme en Nb 18.27 ; Dt 22.9 ( tout le produit ). LXX les prémices de ton aire et de ton pressoir . – Le mot traduit par récolte d''huile n''apparaît qu''ici ; il semble apparenté à un terme qui désigne les larmes ( ?). Il désigne selon toute vraisemblance un liquide, mais son sens précis reste incertain (autres possibilités vin nouveau ; jus de fruits ). –  premier-né 13.12+. – Voir fils.'
  - type: text
    content: 'Tu ne retiendras pas ta pleine cuvée et ta récolte d''huile. Tu me donneras le premier-né de tes fils. '
  '29':
  - type: note
    content: 'Cf. Lv 22.27. –  le premier-né restera  : litt. il sera.'
  - type: text
    content: 'Tu feras de même pour ton bœuf et ton petit bétail : le premier-né restera sept jours avec sa mère ; le huitième jour, tu me le donneras.'
  '3':
  - type: note
    content: Cf. Pr 6.31.
  - type: text
    content: Si l'on retrouve encore vivant entre ses mains ce qu'il a dérobé, bœuf, âne, mouton ou chèvre, il donnera une compensation au double.
  - type: heading
    content: Les atteintes à la propriété
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'saints  : autre traduction consacrés  ; Lv 11.44 ; 19.2. –  viande… déchiquetée  : cf. v. 12n  ; voir Lv 7.24+ ; 22.8 ; Dt 14.21 ; Ez 4.14.'
  - type: text
    content: Vous serez pour moi des hommes saints. Vous ne mangerez pas la viande d'une bête trouvée déchiquetée dans la campagne ; vous la jetterez aux chiens.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Les termes traduits par paître , bêtes (v. 4), celui qui a causé , incendie (v. 5) sont tous issus d''une même racine hébraïque ( b‘r ) qui comporte les sens de dévorer, consumer, consommer , d''où de possibles variantes de traduction évoquant divers types de dégâts. Cf. Code d''Hammourabi 57 : « Si un berger ne s''est pas mis d''accord avec le propriétaire d''un champ pour y faire paître des moutons, s''il a fait paître des moutons dans le champ sans le consentement du propriétaire du champ, quand le propriétaire du champ moissonnera son champ, le berger qui a fait paître les moutons dans le champ sans le consentement du propriétaire du champ donnera vingt kours (mesure de capacité) de grain pour dix-huit ikous (mesure de superficie) au propriétaire du champ. »'
  - type: text
    content: Lorsqu'un homme fait paître son bétail dans un champ ou dans une vigne, s'il envoie ses bêtes paître dans le champ d'un autre, il donnera en compensation du meilleur produit de son champ et du meilleur produit de sa vigne.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Le terme champ désigne peut-être ici le premier état de la culture, à savoir le blé en herbe.
  - type: text
    content: 'Lorsqu''un feu éclate et se propage à des épines, s''il brûle du blé en gerbes ou sur pied, ou bien le champ, celui qui a causé l''incendie donnera une compensation. '
  '6':
  - type: note
    content: 'Cf. Lv 5.21-26. Voir aussi Code d''Hammourabi 125 : « Si un homme a donné des biens à garder et que ses biens aient disparu du lieu où il les avait placés, de même que les biens du propriétaire de la maison… le propriétaire de la maison qui, par négligence, a laissé se perdre ce qui lui avait été donné à garder… restituera les biens à leur propriétaire ; le propriétaire de la maison recherchera ses biens perdus pour les reprendre au voleur. »'
  - type: text
    content: 'Lorsqu''un homme donne à son prochain de l''argent ou des objets à garder, si on les vole dans la maison de ce dernier, le voleur donnera une compensation au double, dans le cas où on le retrouverait. '
  '7':
  - type: note
    content: 'se présentera devant Dieu  : cf. v. 10 ; 21.6n  ; voir aussi 12.48n. –  pour déclarer qu''il n''a pas  : litt. s''il n''a pas (de même au v. 10) ; il s''agit probablement d''un serment.'
  - type: text
    content: Si on ne retrouve pas le voleur, le maître de la maison se présentera devant Dieu pour déclarer qu'il n'a pas porté la main sur le bien de son prochain.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'litigieuse  : litt. de transgression . –  le litige des deux parties  : litt. la parole (ou la cause, l''affaire ) des deux . –  condamnera  : autre traduction déclarera méchant  ; voir justice  ; cf. 23.7n.'
  - type: text
    content: 'Dans toute affaire litigieuse concernant un bœuf, un âne, un mouton ou une chèvre, un vêtement ou un objet perdu, au sujet duquel on peut dire : « C''est bien celui-ci ! », le litige des deux parties ira jusqu''à Dieu ; celui que Dieu condamnera donnera à son prochain une compensation au double.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'les faits  : sous-entendu dans le texte. Cf. Code d''Hammourabi 266 : « Si une intervention divine (c.-à-d. un malheur, un fléau) s''est produite dans un enclos, ou si un lion a tué une bête, le berger produira la preuve de son innocence devant le dieu, et le propriétaire de l''enclos recevra de lui l''animal qui a été frappé dans l''enclos. »'
  - type: text
    content: 'Lorsqu''un homme donne à garder à son prochain un âne, un bœuf, un mouton, une chèvre ou toute autre bête qui meurt, se casse un membre ou est enlevé, sans que personne ait vu les faits, '
