    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lv 5.21-26. Voir aussi '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Code d''Hammourabi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '125 : « Si un homme a donné des biens à garder et que ses biens aient disparu du lieu où il les avait placés, de même que les biens du propriétaire de la maison… le propriétaire de la maison qui, par négligence, a laissé se perdre ce qui lui avait été donné à garder… restituera les biens à leur propriétaire ; le propriétaire de la maison recherchera ses biens perdus pour les reprendre au voleur. »'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''un homme donne à son prochain de l''argent ou des objets à garder, si on les vole dans la maison de ce dernier, le voleur donnera une compensation au double, dans le cas où on le retrouverait. '
