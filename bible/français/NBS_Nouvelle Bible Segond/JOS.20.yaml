  - type: text
    text: Les villes de refuge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Josué : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Donnez-vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: désignez pour vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les villes de refuge
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3 ; 21.13,21,27,32,38 ; Nb 35.6,11,13s ; Dt 19.1-13 ; 4.41ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par l''intermédiaire de Moïse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Ex 21.13.'
    marker-yv: yv-n
  - type: text
    text: 'Dis aux Israélites : Donnez-vous les villes de refuge dont je vous ai parlé par l''intermédiaire de Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par méprise
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sans connaissance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 5 ; Dt 4.42 ; 19.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: rédempteur
      - type: text
        text: ' du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 35.12
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Ex 6.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le meurtrier qui a tué quelqu''un par erreur, par méprise, pourra s''y enfuir ; elles vous serviront de refuge contre le rédempteur du sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à l'entrée de la porte de la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''endroit où se tiennent ordinairement les tribunaux. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: exposera son cas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dira ses paroles aux oreilles des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: anciens
      - type: text
        text: ' de la ville'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 19.12. Voir aussi Nb 35.22s.'
    marker-yv: yv-n
  - type: text
    text: 'Il s''enfuira vers l''une de ces villes, s''arrêtera à l''entrée de la porte de la ville et exposera son cas aux anciens de cette ville ; ceux-ci le recueilleront auprès d''eux dans la ville et lui donneront un lieu chez eux pour qu''il y habite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'livreront '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 23.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par méprise '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si le rédempteur du sang le poursuit, ils ne lui livreront pas le meurtrier ; car c''est par méprise qu''il a tué son prochain, alors que d''habitude il ne le détestait pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il restera… jusqu''à la mort du grand '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 35.12,24s,28 ; Dt 17.9 ; 19.17 ; 26.3.'
    marker-yv: yv-n
  - type: text
    text: Il restera dans cette ville jusqu'à ce qu'il ait comparu en jugement devant la communauté – jusqu'à la mort du grand prêtre qui sera en fonction en ces jours-là. Ensuite, le meurtrier reviendra ; il rentrera dans sa ville et dans sa maison, dans la ville d'où il s'était enfui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils consacrèrent Qédesh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe et le nom de lieu sont apparentés en hébreu. Voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sichem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : en Ephraïm, entre les monts Ebal et Garizim (8.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',33). Ce sera un centre religieux et politique important ; cf. 24.1,25ss ; voir aussi Gn 12.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hébron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ville sainte également (jusqu''à nos jours, dans le judaïsme et l''islam) ; cf. 10.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils consacrèrent Qédesh en Galilée, dans la région montagneuse de Nephtali ; Sichem, dans la région montagneuse d''Ephraïm ; et Qiriath-Arba (c''est-à-dire Hébron), dans la région montagneuse de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bétser… Ramoth… Golân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 4.41,43'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'En Transjordanie, à l''est de Jéricho, ils désignèrent Bétser, au désert, sur le plateau, dans la tribu de Ruben ; Ramoth, au Galaad, dans la tribu de Gad ; et Golân, au Bashân, dans la tribu de Manassé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Telles furent les villes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 2s ; Nb 35.6s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux immigrés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à l'immigré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 12.48'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Telles furent les villes assignées à tous les Israélites et aux immigrés qui séjournent au milieu d'eux, afin que celui qui tue quelqu'un par erreur s'y enfuie, et qu'il ne meure pas de la main du rédempteur du sang avant d'avoir comparu devant la communauté.
