document_id: JOS.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les villes de refuge
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : '
  '2':
  - type: note
    content: 'Donnez-vous  : autre traduction désignez pour vous  ; cf. v. 8. –  les villes de refuge  : cf. v. 3 ; 21.13,21,27,32,38 ; Nb 35.6,11,13s ; Dt 19.1-13 ; 4.41ss. –  par l''intermédiaire de Moïse 14.2n  ; voir aussi Ex 21.13.'
  - type: text
    content: 'Dis aux Israélites : Donnez-vous les villes de refuge dont je vous ai parlé par l''intermédiaire de Moïse. '
  '3':
  - type: note
    content: 'par méprise  : litt. sans connaissance, de même au v. 5 ; Dt 4.42 ; 19.4n. –  le rédempteur du sang Nb 35.12n  ; cf. Ex 6.6n.'
  - type: text
    content: 'Le meurtrier qui a tué quelqu''un par erreur, par méprise, pourra s''y enfuir ; elles vous serviront de refuge contre le rédempteur du sang. '
  '4':
  - type: note
    content: 'à l''entrée de la porte de la ville  : l''endroit où se tiennent ordinairement les tribunaux. –  exposera son cas…  : litt. dira ses paroles aux oreilles des anciens de la ville  ; cf. Dt 19.12. Voir aussi Nb 35.22s.'
  - type: text
    content: 'Il s''enfuira vers l''une de ces villes, s''arrêtera à l''entrée de la porte de la ville et exposera son cas aux anciens de cette ville ; ceux-ci le recueilleront auprès d''eux dans la ville et lui donneront un lieu chez eux pour qu''il y habite. '
  '5':
  - type: note
    content: livreront Dt 23.16n. –  par méprise v. 3n.
  - type: text
    content: 'Si le rédempteur du sang le poursuit, ils ne lui livreront pas le meurtrier ; car c''est par méprise qu''il a tué son prochain, alors que d''habitude il ne le détestait pas. '
  '6':
  - type: note
    content: 'Il restera… jusqu''à la mort du grand prêtre  : cf. Nb 35.12,24s,28 ; Dt 17.9 ; 19.17 ; 26.3.'
  - type: text
    content: Il restera dans cette ville jusqu'à ce qu'il ait comparu en jugement devant la communauté – jusqu'à la mort du grand prêtre qui sera en fonction en ces jours-là. Ensuite, le meurtrier reviendra ; il rentrera dans sa ville et dans sa maison, dans la ville d'où il s'était enfui.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ils consacrèrent Qédesh  : le verbe et le nom de lieu sont apparentés en hébreu. Voir saint. –  Sichem  : en Ephraïm, entre les monts Ebal et Garizim (8.30n,33). Ce sera un centre religieux et politique important ; cf. 24.1,25ss ; voir aussi Gn 12.6n. –  Hébron  : ville sainte également (jusqu''à nos jours, dans le judaïsme et l''islam) ; cf. 10.3n.'
  - type: text
    content: 'Ils consacrèrent Qédesh en Galilée, dans la région montagneuse de Nephtali ; Sichem, dans la région montagneuse d''Ephraïm ; et Qiriath-Arba (c''est-à-dire Hébron), dans la région montagneuse de Juda. '
  '8':
  - type: note
    content: 'Bétser… Ramoth… Golân  : cf. Dt 4.41,43n.'
  - type: text
    content: 'En Transjordanie, à l''est de Jéricho, ils désignèrent Bétser, au désert, sur le plateau, dans la tribu de Ruben ; Ramoth, au Galaad, dans la tribu de Gad ; et Golân, au Bashân, dans la tribu de Manassé. '
  '9':
  - type: note
    content: 'Telles furent les villes…  : cf. v. 2s ; Nb 35.6s. –  aux immigrés  : litt. à l''immigré  ; cf. Ex 12.48n.'
  - type: text
    content: Telles furent les villes assignées à tous les Israélites et aux immigrés qui séjournent au milieu d'eux, afin que celui qui tue quelqu'un par erreur s'y enfuie, et qu'il ne meure pas de la main du rédempteur du sang avant d'avoir comparu devant la communauté.
