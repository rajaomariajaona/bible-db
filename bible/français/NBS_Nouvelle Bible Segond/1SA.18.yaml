document_id: 1SA.18,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Jonathan  : fils de Saül, cf. 14.1. –  Jonathan s''attacha…  : litt. l''être de Jonathan s''attacha à l''être de David, et Jonathan l''aima comme son être  ; cf. 19.1 ; 20.17,34 ; 23.16-18 ; 2S 1.26 ; voir Gn 44.30. Le verbe traduit par s''attacher peut aussi avoir le sens de conspirer , ainsi en 22.8,13. Sur le mot correspondant à être , voir Gn 1.20n.'
  - type: text
    content: 'Dès que David eut achevé de parler à Saül, Jonathan s''attacha à David ; Jonathan l''aima comme lui-même. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'un mauvais souffle  : cf. 16.14n  ; voir esprit. –  faire le prophète  : cf. 10.5n. –  David jouait  : cf. 16.23. –  comme les autres jours  : litt. comme un jour dans un jour.'
  - type: text
    content: 'Le lendemain, un mauvais souffle de Dieu s''empara de Saül, qui se mit à faire le prophète au milieu de la maison. David jouait, comme les autres jours, et Saül avait sa lance à la main. '
  '11':
  - type: note
    content: 'brandit sa lance  : cf. 19.10 ; 20.33. –  Je vais clouer David au mur  : litt. je frapperai David et le mur. Sur le verbe frapper, cf. 4.2n. –  l''évita  : cf. Ps 37.32s.'
  - type: text
    content: 'Saül brandit sa lance en disant : Je vais clouer David au mur. Mais David l''évita par deux fois. '
  '12':
  - type: note
    content: 'eut peur de David  : cf. v. 29. –  était avec David  : cf. 3.19+ ; 17.37+. –  s''était éloigné (ou écarté) de Saül  : cf. 16.14+.'
  - type: text
    content: 'Saül eut peur de David, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec David et qu''il s''était éloigné de Saül. '
  '13':
  - type: note
    content: 'éloigna David  : litt. l''éloigna de lui, même formule qu''au v. 12. –  chef de mille hommes ou chef de phratrie, cf. Nb 1.16n. –  partait en campagne et en revenait  : litt. sortait et rentrait  ; cf. v. 5s,16 ; 2S 5.2.'
  - type: text
    content: 'Saül éloigna David et le fit chef de mille hommes. David partait en campagne et en revenait devant la troupe. '
  '14':
  - type: note
    content: 'réussissait  : cf. v. 5. –  ses entreprises  : litt. ses chemins ou ses voies.'
  - type: text
    content: 'David réussissait dans toutes ses entreprises, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec lui. '
  '15':
  - type: note
    content: La réussite grandissante de David a pour conséquence la frayeur croissante de Saül (v. 12,15), mais aussi l'affection du peuple (v. 16).
  - type: text
    content: 'Voyant qu''il réussissait toujours, Saül était effrayé par lui ; '
  '16':
  - type: text
    content: mais tout Israël et Juda aimaient David, parce que c'était lui qui partait en campagne et en revenait devant eux.
  - type: heading
    content: David épouse Mikal, fille de Saül
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'ma fille aînée, Mérab  : cf. 14.49 ; 17.25. –  sers-moi… avec vaillance  : litt. sois pour moi un fils de puissance  ; cf. 1R 1.52. –  les guerres du Seigneur  : cf. 25.28 ; Nb 21.14 ; Tg les guerres du peuple du Seigneur . –  Que ce ne soit pas moi…  : litt. que ma main ne soit pas sur lui, mais que soit sur lui la main des Philistins . A cette époque, les guerres du Seigneur opposent principalement Israël aux Philistins ; Saül espère que David mourra au combat, ce qui lui éviterait de se débarrasser personnellement de son dangereux concurrent. Cf. 2S 11.15.'
  - type: text
    content: 'Saül dit à David : Voici ma fille aînée, Mérab ; je te la donnerai pour femme ; sers-moi seulement avec vaillance et mène les guerres du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Saül se disait : Que ce ne soit pas moi qui le tue, mais les Philistins ! '
  '18':
  - type: note
    content: 'Qui suis-je  : cf. 2S 7.18 ; Ps 8.5 ; 144.3 ; 1Ch 29.14. –  qu''est mon lignage  : une modification minime de la vocalisation du mot hébreu correspondant permet de retrouver ce sens qui convient bien au contexte ; la vocalisation actuelle en a fait un mot courant (vie), tout à fait inattendu ici. –  le clan de mon père est en hébreu une apposition explicative au mot ancien lignage, dont le sens n''était plus guère connu ; cf. 9.21.'
  - type: text
    content: 'David répondit à Saül : Qui suis-je et qu''est mon lignage, le clan de mon père en Israël, pour que je devienne le gendre du roi ? '
  '19':
  - type: note
    content: 'Adriel  : cf. 2S 21.8. –  Mehola  : localité plus connue sous le nom composé Abel-Mehola, cf. Jg 7.22n  ; 1R 4.12.'
  - type: text
    content: Lorsque arriva le temps où Mérab, fille de Saül, devait être donnée à David, elle fut donnée pour femme à Adriel, de Mehola.
  '2':
  - type: note
    content: il ne le laissa pas retourner pour s'occuper du troupeau familial, cf. 16.19 ; 17.15.
  - type: text
    content: 'Ce même jour Saül retint David ; il ne le laissa pas retourner chez son père. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Mikal  : cf. 14.49+. –  aimait  : autre traduction tomba amoureuse de . –  lui convint  : litt. fut droite à ses yeux.'
  - type: text
    content: 'Mikal, fille de Saül, aimait David. On le dit à Saül, et la chose lui convint. '
  '21':
  - type: note
    content: 'et que les Philistins le tuent  : litt. et que la main des Philistins soit sur lui, comme au v. 17. –  Par deux fois donc, Saül dit à David  : cf. v. 17. On a aussi traduit Saül dit à David pour la seconde fois : …'
  - type: text
    content: 'Saül se disait : Je la lui donnerai, afin qu''elle soit pour lui un piège, et que les Philistins le tuent. Par deux fois donc, Saül dit à David : Aujourd''hui tu vas t''allier par mariage avec moi.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Voir Ps 12.3 ; 55.22 ; Pr 29.5. –  Tu plais au roi  : autre traduction le roi se plaît avec toi  ; cf. 19.1 ; Gn 34.19 ; Nb 14.8 ; 2S 22.20 ; Ps 18.20 ; 41.12 ; le même verbe hébreu est traduit par désirer au v. 25. –  les gens de sa cour t''aiment  : cf. v. 16.'
  - type: text
    content: 'Saül donna cet ordre aux gens de sa cour : Dites à David, sur le ton de la confidence : « Tu plais au roi et les gens de sa cour t''aiment ; allie-toi au roi par mariage. » '
  '23':
  - type: note
    content: 'à David  : litt. aux oreilles de David. –  peu de chose  : autre traduction chose méprisable. –  pauvre  : donc incapable de payer la dot vraisemblablement élevée exigible pour une fille de roi (v. 25). –  je suis peu de chose  : cf. v. 18 (qui suis-je ?).'
  - type: text
    content: 'Les gens de la cour de Saül dirent cela à David ; David répliqua : Est-ce peu de chose à vos yeux que de s''allier au roi par mariage ? Moi, je suis pauvre, je suis peu de chose. '
  '24':
  - type: text
    content: 'Les gens de la cour de Saül lui rapportèrent les paroles de David. '
  '25':
  - type: note
    content: 'La dot était la somme d''argent versée par le fiancé au père de la jeune fille ; il ne s''agissait pourtant pas d''un achat, mais d''une compensation donnée à la famille, le montant, variable selon la situation sociale, devant revenir à terme à la femme elle-même. Le mot hébreu correspondant apparaît en Gn 34.12 ; Ex 22.15ns. –  cent prépuces  : la somme d''argent de la dot était parfois remplacée par un paiement sous une autre forme : prestation de travail (cf. Gn 29.15-30) ou action courageuse (ici, et en Jos 15.16/ /) ; les Philistins étant des incirconcis (cf. 17.26), la récolte des prépuces (ou plus probablement des parties viriles, selon une coutume guerrière bien attestée dans l''Antiquité) ne pouvait se faire qu''à leurs dépens. –  vengé de ses ennemis  : cf. 14.24. –  aux mains des Philistins  : autre traduction par l''intermédiaire des Philistins  ; cf. v. 17.'
  - type: text
    content: 'Saül dit : Vous direz à David : « Le roi ne désire pas de dot, mais cent prépuces de Philistins, pour être vengé de ses ennemis. » Saül comptait faire tomber David aux mains des Philistins. '
  '26':
  - type: note
    content: 'convint à David  : cf. v. 20. –  Avant le terme fixé  : litt. les jours n''étaient pas pleins (c.-à-d. écoulés) ; une expression semblable apparaît en Gn 29.21.'
  - type: text
    content: 'Les gens de la cour rapportèrent ces paroles à David, et l''idée convint à David : c''est ainsi qu''il s''allierait au roi par mariage. Avant le terme fixé, '
  '27':
  - type: note
    content: 'deux cents hommes  : même en doublant le danger, David ne tombe pas entre les mains des Philistins. LXX parle ici de cent hommes, nombre qui correspond aux cent prépuces demandés (v. 25). –  on en livra au roi le nombre complet  : litt. ils les livrèrent pleinement au roi. –  Mikal  : cf. v. 20 ; 2S 3.14.'
  - type: text
    content: David partit avec ses hommes et tua deux cents hommes parmi les Philistins. David apporta leurs prépuces, et l'on en livra au roi le nombre complet, afin qu'il puisse s'allier au roi par mariage. Alors Saül lui donna pour femme Mikal, sa fille.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur était avec David  : cf. v. 12. –  quant à Mikal… elle aimait David  : cette seconde affirmation pourrait être aussi une constatation de Saül  : et que Mikal, sa propre fille, aimait vraiment David  ; le texte marquerait alors une progression par rapport au v. 20 ; cf. 19.11-17. – Au lieu de Mikal, fille de Saül , LXX porte tout Israël.'
  - type: text
    content: 'Saül vit et sut que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec David ; quant à Mikal, fille de Saül, elle aimait David. '
  '29':
  - type: note
    content: 'La double constatation de Saül (v. 28) provoque une crainte grandissante chez lui, puisque non seulement Dieu, mais aussi quelqu''un de sa propre famille, prend le parti du concurrent. –  désormais (sous-entendu dans le texte) Saül fut toujours (litt. tous les jours, cf. 23.14) l''ennemi…  : les chapitres suivants montrent l''hostilité constante de Saül à l''égard de David, alors même que David manifeste un profond respect envers le roi choisi par Dieu. Cf. Ps 37.12,14.'
  - type: text
    content: 'Saül craignit de plus en plus David ; désormais Saül fut toujours l''ennemi de David. '
  '3':
  - type: note
    content: 'conclut une alliance 20.8 ; 23.18 ; cf. 2S 9.1-13. –  comme lui-même  : comme au v. 1 ; cf. Lv 19.18.'
  - type: text
    content: 'Jonathan conclut une alliance avec David, parce qu''il l''aimait comme lui-même. '
  '30':
  - type: note
    content: 'faisaient des incursions  : litt. sortirent  ; cf. v. 5n  ; cf. v. 5,14s. –  son nom devint très célèbre  : cf. 2S 7.9.'
  - type: text
    content: Les chefs des Philistins faisaient des incursions ; chaque fois, David réussissait mieux que tous les gens de la cour de Saül, et son nom devint très célèbre.
  '4':
  - type: note
    content: 17.38s ; cf. Gn 41.42 ; 2R 2.13s ; Rt 3.9.
  - type: text
    content: 'Il ôta le manteau qu''il portait pour le donner à David, ainsi que ses habits et même son épée, son arc et sa ceinture. '
  '5':
  - type: note
    content: 'partait en campagne  : litt. sortait, même emploi aux v. 13,16 ; cf. 8.20n  ; 11.7n. –  tout lui réussissait v. 14s,30 ; cf. Gn 39.2,23. – Le v. 5, par son allusion à de nombreuses expéditions militaires (partout où  ; cf. v. 14 ; 23.5 ; 27.8-11 ; 30.1-20) résume en une phrase une période plus ou moins longue de l''existence de David, pendant laquelle lui fut confié le commandement de l''armée. –  à tout le peuple, même aux gens de la cour  : autre traduction à tous les soldats, même aux officiers.'
  - type: text
    content: David partait en campagne partout où l'envoyait Saül, et tout lui réussissait ; Saül le mit à la tête des hommes de guerre et il plut à tout le peuple, même aux gens de la cour de Saül.
  - type: heading
    content: Saül essaie de tuer David
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'revenaient de campagne  : litt. rentraient . –  le Philistin  : cf. chap. 17. –  et en dansant  : litt. et (avec) les danses . – Accueil de vainqueur par des femmes : cf. Ex 15.20 ; Jg 11.34 ; Judith 15.12 : « Toutes les femmes d''Israël accoururent pour la voir et elles la bénirent. Certaines d''entre elles firent un chœur pour elle. » –  au son… des cris de joie  : litt. avec de la joie , qu''on peut aussi comprendre avec des chants joyeux . –  des triangles  : le mot hébreu correspondant ne se trouve que dans ce texte ; il désigne probablement un instrument de musique, difficilement identifiable, lequel, selon l''étymologie, semblerait avoir comporté trois éléments (on a aussi pensé à des luths à trois cordes) ; autre traduction, d''après Vg  : sistres.'
  - type: text
    content: 'Au moment où les gens revenaient de campagne, lors du retour de David, après qu''il eut abattu le Philistin, les femmes sortirent de toutes les villes d''Israël en chantant et en dansant, à la rencontre du roi Saül, au son des tambourins, des cris de joie et des triangles. '
  '7':
  - type: note
    content: 'qui jouaient de la musique…  : autres traductions se répondaient en riant… ; s''amusaient à se répondre…  ; même verbe en 2S 6.5,21n. –  les unes aux autres  : sans doute par des chants en chœurs alternés. –  Saül a abattu…  : cf. 21.12 ; 29.5.'
  - type: text
    content: 'Les femmes qui jouaient de la musique se répondaient les unes aux autres :'
  - type: text
    content: Saül a abattu ses milliers,
  - type: text
    content: et David ses dizaines de milliers !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'très fâché  : cf. 11.6+. –  cela (litt. la parole ou la chose ) lui déplut  : cf. 8.6 ; 2S 11.25,27 ; 1Ch 21.7. –  la royauté  : cf. 15.28.'
  - type: text
    content: 'Saül fut très fâché ; cela lui déplut. Il dit : On donne les dizaines de milliers à David, et, à moi, on me donne les milliers ! Il ne lui manque plus que la royauté ! '
  '9':
  - type: note
    content: 'avec malveillance  : autre traduction avec méfiance.'
  - type: text
    content: A partir de ce jour, Saül regarda David avec malveillance.
