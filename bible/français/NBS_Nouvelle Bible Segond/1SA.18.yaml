      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il ne le laissa pas retourner '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: pour s'occuper du troupeau familial, cf. 16.19 ; 17.15.
    marker-yv: yv-n
  - type: text
    text: 'Ce même jour Saül retint David ; il ne le laissa pas retourner chez son père. '
  - type: usfm
    marker: vlbl
