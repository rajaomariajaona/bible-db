    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot hébreu correspondant ne se trouve que dans ce texte ; il désigne probablement un instrument de musique, difficilement identifiable, lequel, selon l''étymologie, semblerait avoir comporté trois éléments (on a aussi pensé à des '
    - type: usfm
