  - type: text
    text: 'Dès que David eut achevé de parler à Saül, Jonathan s''attacha à David ; Jonathan l''aima comme lui-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
