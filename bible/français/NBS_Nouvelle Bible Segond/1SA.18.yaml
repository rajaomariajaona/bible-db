        text: comme lui-même
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : comme au v. 1 ; cf. Lv 19.18.'
    marker-yv: yv-n
  - type: text
    text: 'Jonathan conclut une alliance avec David, parce qu''il l''aimait comme lui-même. '
