    marker-yv: yv-n
  - type: text
    text: 'Au moment où les gens revenaient de campagne, lors du retour de David, après qu''il eut abattu le Philistin, les femmes sortirent de toutes les villes d''Israël en chantant et en dansant, à la rencontre du roi Saül, au son des tambourins, des cris de joie et des triangles. '
  - type: usfm
    marker: vlbl
