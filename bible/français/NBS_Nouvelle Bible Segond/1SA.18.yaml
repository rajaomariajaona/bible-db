  - type: text
    text: 'Le lendemain, un mauvais souffle de Dieu s''empara de Saül, qui se mit à faire le prophète au milieu de la maison. David jouait, comme les autres jours, et Saül avait sa lance à la main. '
  - type: usfm
    marker: vlbl
