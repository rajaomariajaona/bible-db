  - type: text
    text: David partit avec ses hommes et tua deux cents hommes parmi les Philistins. David apporta leurs prépuces, et l'on en livra au roi le nombre complet, afin qu'il puisse s'allier au roi par mariage. Alors Saül lui donna pour femme Mikal, sa fille.
