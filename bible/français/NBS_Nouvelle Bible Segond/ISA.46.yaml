document_id: ISA.46,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dieux qu'on porte, le Dieu qui porte
  - type: text
    content: ' '
  - type: note
    content: 'Bel  : ce mot qui, comme Baal, signifie seigneur ou maître , était utilisé comme un autre nom du dieu suprême de Babylone, Mardouk (cf. Jr 50.2 ; 51.44). –  Nebo ou Nabou , fils du précédent, dieu de la sagesse, de l''éloquence et de l''écriture, dont le nom se retrouve dans celui de Nabuchodonosor (en hébreu Neboukadnetsar ). –  sur des bêtes  : à Babylone, on transportait solennellement les idoles (cf. v. 7 ; 45.20) le jour du nouvel an. La procession est ici interrompue par l''invasion (cf. v. 2). –  vous les portiez  : cf. v. 3s. –  l''animal  : sous-entendu dans le texte.'
  - type: text
    content: Bel s'agenouille,
  - type: text
    content: Nebo se courbe ;
  - type: text
    content: on met leurs idoles sur des animaux, sur des bêtes ;
  - type: text
    content: vous les portiez, et les voilà chargés,
  - type: text
    content: devenus un fardeau pour l'animal épuisé !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'dès le commencement  : cf. 40.21+ ; c''est ici le terme de Gn 1.1n. –  dès le temps jadis 45.21. –  Mes projets  : cf. v. 11 ; 5.19n  ; Ps 33.11. –  ce que je désire 44.28.'
  - type: text
    content: J'annonce dès le commencement
  - type: text
    content: ce qui vient par la suite
  - type: text
    content: et dès le temps jadis
  - type: text
    content: ce qui n'est pas encore fait.
  - type: text
    content: 'Je dis : Mes projets se réaliseront,'
  - type: text
    content: et je ferai tout ce que je désire.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'de l''orient 41.2,25. –  d''un pays lointain ou d''une terre lointaine. –  de mes projets  : cf. 5.19n  ; 40.13n. –  ce que j''ai façonné…  : autre traduction ce que j''ai préparé, je l''exécute  ; cf. 43.1+.'
  - type: text
    content: J'appelle de l'orient un oiseau de proie,
  - type: text
    content: d'un pays lointain l'homme de mes projets.
  - type: text
    content: Ce que j'ai dit,
  - type: text
    content: je le fais arriver ;
  - type: text
    content: ce que j'ai façonné,
  - type: text
    content: je le fais.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'hommes…  : litt. indomptables de cœur  ; cf. 1.24+ ; 49.26+ ; Gn 49.24n  ; Ps 76.6.'
  - type: text
    content: Ecoutez-moi, hommes au cœur indomptable,
  - type: text
    content: vous qui êtes loin de la justice !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'approcher 51.5 ; cf. 50.8 ; 55.6 ; 56.1. –  justice / salut 45.8+. –  pour Israël…  : autre traduction à Israël je donnerai ma splendeur.'
  - type: text
    content: Je fais approcher ma justice
  - type: text
    content: – elle n'est pas loin –
  - type: text
    content: et mon salut – il ne tardera pas.
  - type: text
    content: Je mettrai le salut en Sion,
  - type: text
    content: pour Israël, ma splendeur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'en captivité  : cf. 2S 5.21 ; Jr 43.12 ; 48.7 ; 49.3n.'
  - type: text
    content: Ensemble ils se sont courbés, ils se sont agenouillés,
  - type: text
    content: ils ne peuvent libérer le fardeau
  - type: text
    content: et ils s'en vont eux-mêmes en captivité.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'reste 1.9+ ; cf. Am 5.15. –  depuis le ventre… 44.2n. –  porte  : cf. v. 1n. –  depuis le sein maternel  : autre traduction depuis votre naissance.'
  - type: text
    content: Ecoutez-moi, maison de Jacob,
  - type: text
    content: et vous tous, reste de la maison d'Israël,
  - type: text
    content: vous que je prends à ma charge depuis le ventre de votre mère,
  - type: text
    content: que je porte depuis le sein maternel !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps 71.17s.
  - type: text
    content: Jusqu'à votre vieillesse, c'est moi ;
  - type: text
    content: jusqu'au temps des cheveux blancs je vous soutiendrai ;
  - type: text
    content: je l'ai fait et je veux encore porter,
  - type: text
    content: soutenir et libérer.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 40.18+.
  - type: text
    content: A qui me comparerez-vous
  - type: text
    content: et me rendrez-vous égal ?
  - type: text
    content: A qui me ferez-vous ressembler,
  - type: text
    content: pour que nous soyons semblables ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'à la balance  : litt. au roseau , terme désignant vraisemblablement le fléau de la balance. –  un dieu 40.18n. –  font des révérences 44.15+.'
  - type: text
    content: Ils versent l'or de leur bourse
  - type: text
    content: et pèsent l'argent à la balance ;
  - type: text
    content: ils paient un orfèvre,
  - type: text
    content: pour qu'il en fasse un dieu,
  - type: text
    content: et ils font des révérences
  - type: text
    content: et se prosternent.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'à sa place  : l''expression peut être prise au sens concret, mais elle peut aussi signifier, au figuré, au lieu de lui (c.-à-d. au lieu que ce soit lui qui porte… cf. 55.13 ; 60.15 ; 61.3,7) ; voir aussi 1S 5.1ss. –  Même si l''on crie  : cf. 1R 18.26-29 ; Ps 115.6. –  ne sauve pas 45.20+.'
  - type: text
    content: Ils le portent,
  - type: text
    content: ils le soutiennent avec l'épaule,
  - type: text
    content: ils le déposent à sa place.
  - type: text
    content: Il ne bouge pas de son lieu !
  - type: text
    content: Même si l'on crie vers lui,
  - type: text
    content: il ne répond pas,
  - type: text
    content: il ne sauve pas de la détresse.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Souvenez-vous 44.21. –  soyez des hommes  : traduction incertaine d''un verbe qui n''apparaît qu''ici ; autres traductions soyez fermes , ou ranimez votre ardeur. –  Réfléchissez-y  : cf. 42.25n  ; 44.19n. –  transgresseurs  : autre traduction révoltés.'
  - type: text
    content: Souvenez-vous de cela,
  - type: text
    content: et soyez des hommes !
  - type: text
    content: Réfléchissez-y, transgresseurs !
  '9':
  - type: text
    content: ' '
  - type: note
    content: lointain passé 41.22+ ; cf. 43.18. –  Dieu traduit successivement ici les mots hébreux ’El (40.18n  ; Gn 21.33n) et ’Elohim (Gn 1.1n).
  - type: text
    content: Souvenez-vous du lointain passé ;
  - type: text
    content: car je suis Dieu,
  - type: text
    content: et il n'y en a pas d'autre,
  - type: text
    content: je suis Dieu,
  - type: text
    content: et rien n'est semblable à moi.
