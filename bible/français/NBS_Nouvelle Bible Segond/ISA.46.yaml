document_id: ISA.46,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dieux qu'on porte, le Dieu qui porte
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce mot qui, comme '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Baal
        - type: text
          text: ', signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', était utilisé comme un autre nom du dieu suprême de Babylone, Mardouk (cf. Jr 50.2 ; 51.44). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nebo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Nabou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', fils du précédent, dieu de la sagesse, de l''éloquence et de l''écriture, dont le nom se retrouve dans celui de Nabuchodonosor (en hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Neboukadnetsar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur des bêtes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : à Babylone, on transportait solennellement les idoles (cf. v. 7 ; 45.20) le jour du nouvel an. La procession est ici interrompue par l''invasion (cf. v. 2). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous les portiez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 3s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'animal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: Bel s'agenouille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nebo se courbe ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on met leurs idoles sur des animaux, sur des bêtes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous les portiez, et les voilà chargés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devenus un fardeau pour l'animal épuisé !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dès le commencement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 40.21+ ; c''est ici le terme de Gn 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dès le temps jadis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '45.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mes projets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 11 ; 5.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 33.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que je désire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 44.28.
      marker-yv: yv-n
    - type: text
      text: J'annonce dès le commencement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce qui vient par la suite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dès le temps jadis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce qui n'est pas encore fait.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis : Mes projets se réaliseront,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ferai tout ce que je désire.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de l''orient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '41.2,25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''un pays lointain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd''une terre lointaine. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de mes projets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 5.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 40.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que j'ai façonné…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce que j'ai préparé, je l'exécute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 43.1+.
      marker-yv: yv-n
    - type: text
      text: J'appelle de l'orient un oiseau de proie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'un pays lointain l'homme de mes projets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que j'ai dit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le fais arriver ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que j'ai façonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le fais.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hommes…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'indomptables de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1.24+ ; 49.26+ ; Gn 49.24
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 76.6.'
      marker-yv: yv-n
    - type: text
      text: Ecoutez-moi, hommes au cœur indomptable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui êtes loin de la justice !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'approcher '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '51.5 ; cf. 50.8 ; 55.6 ; 56.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'salut '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '45.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour Israël…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à Israël je donnerai ma splendeur.
      marker-yv: yv-n
    - type: text
      text: Je fais approcher ma justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – elle n'est pas loin –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon salut – il ne tardera pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai le salut en Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour Israël, ma splendeur.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en captivité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2S 5.21 ; Jr 43.12 ; 48.7 ; 49.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Ensemble ils se sont courbés, ils se sont agenouillés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne peuvent libérer le fardeau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils s'en vont eux-mêmes en captivité.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'reste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.9+ ; cf. Am 5.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'depuis le ventre… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '44.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: porte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis le sein maternel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: depuis votre naissance.
      marker-yv: yv-n
    - type: text
      text: Ecoutez-moi, maison de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous tous, reste de la maison d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous que je prends à ma charge depuis le ventre de votre mère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je porte depuis le sein maternel !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 71.17s.
      marker-yv: yv-n
    - type: text
      text: Jusqu'à votre vieillesse, c'est moi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'au temps des cheveux blancs je vous soutiendrai ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je l'ai fait et je veux encore porter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: soutenir et libérer.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 40.18+.
      marker-yv: yv-n
    - type: text
      text: A qui me comparerez-vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et me rendrez-vous égal ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A qui me ferez-vous ressembler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que nous soyons semblables ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la balance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au roseau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme désignant vraisemblablement le fléau de la balance. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '40.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'font des révérences '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 44.15+.
      marker-yv: yv-n
    - type: text
      text: Ils versent l'or de leur bourse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pèsent l'argent à la balance ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils paient un orfèvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'il en fasse un dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils font des révérences
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se prosternent.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à sa place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''expression peut être prise au sens concret, mais elle peut aussi signifier, au figuré, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au lieu de lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au lieu que ce soit lui qui porte… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cf. 55.13 ; 60.15 ; 61.3,7) ; voir aussi 1S 5.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Même si l'on crie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1R 18.26-29 ; Ps 115.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne sauve pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 45.20+.
      marker-yv: yv-n
    - type: text
      text: Ils le portent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils le soutiennent avec l'épaule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils le déposent à sa place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne bouge pas de son lieu !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même si l'on crie vers lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne répond pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne sauve pas de la détresse.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Souvenez-vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '44.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: soyez des hommes
      - type: usfm
