  - type: text
    text: 'Maintenant, concluons une alliance pour notre Dieu, en renvoyant toutes ces femmes et leurs enfants, suivant ton avis, mon seigneur, et suivant l''avis de ceux qui tremblent au commandement de notre Dieu. Que l''on agisse selon la loi ! '
