      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 13.13ss ; Za 14.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
