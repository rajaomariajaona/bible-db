    marker-yv: yv-n
  - type: text
    text: 'Puis Esdras se retira de devant la maison de Dieu et il alla dans la salle de Yohanân, fils d''Eliashib ; quand il y fut entré, il ne mangea rien et il ne but rien, parce qu''il était dans le deuil à cause du sacrilège commis par les exilés. '
