    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: confisqués
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: voués par anathème
    - type: usfm
      marker: ft
      children:
      - type: text
