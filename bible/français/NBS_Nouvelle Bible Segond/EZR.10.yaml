  - type: text
    text: 'Alors Shekania, fils de Yehiel, qui était d''entre les Elamites, dit à Esdras : Nous avons commis un sacrilège envers notre Dieu en épousant des femmes étrangères d''entre les peuples du pays. Mais maintenant, il y a encore une espérance pour Israël à ce sujet. '
