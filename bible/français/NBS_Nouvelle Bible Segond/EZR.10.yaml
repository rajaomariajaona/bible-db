  - type: text
    text: 'Pendant qu''Esdras, en pleurs et prostré devant la maison de Dieu, faisait cette prière et cette confession, une assemblée très nombreuse de gens d''Israël, hommes, femmes et enfants s''était réunie auprès de lui, et le peuple répandait d''abondantes larmes. '
