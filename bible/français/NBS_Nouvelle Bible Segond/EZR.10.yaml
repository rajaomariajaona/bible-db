      children:
      - type: text
        text: '  : le verbe hébreu correspondant n''apparaît qu''ici et en Ps 104.32 ; Dn 10.11 ; termes apparentés en Ex 15.15 ; Es 33.14 ; Ps 2.11 ; 48.7 ; 55.6 ; Jb 4.14.'
    marker-yv: yv-n
  - type: text
    text: 'Tous les hommes de Juda et de Benjamin se rassemblèrent à Jérusalem dans les trois jours. C''était le vingtième jour du neuvième mois. Tout le peuple se tenait sur la place de la maison de Dieu, frissonnant à cause de la circonstance et par suite de la pluie. '
  - type: usfm
    marker: vlbl
