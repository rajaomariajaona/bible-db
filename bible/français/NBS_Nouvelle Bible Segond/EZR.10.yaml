document_id: EZR.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Judéens renvoient les femmes étrangères
  - type: text
    content: ' '
  - type: note
    content: 'Esdras  : cf. 7.27n. –  en pleurs… Né 1.4. –  devant la maison  : cf. 1R 8.29s,35,42 ; Dn 6.11. –  confession  : cf. v. 11n  ; Lv 5.5 ; 16.21 ; 26.40 ; Nb 5.7 ; Dn 9.4,20 ; Né 1.6 ; 9.2s. –  s''était réunie  : le verbe correspondant est habituellement traduit par rassembler (cf. v. 7,9).'
  - type: text
    content: 'Pendant qu''Esdras, en pleurs et prostré devant la maison de Dieu, faisait cette prière et cette confession, une assemblée très nombreuse de gens d''Israël, hommes, femmes et enfants s''était réunie auprès de lui, et le peuple répandait d''abondantes larmes. '
  '10':
  - type: note
    content: V. 2+. –  torts 9.6+.
  - type: text
    content: 'Esdras, le prêtre, se leva et leur dit : Vous avez commis un sacrilège en épousant des femmes étrangères, et vous avez ajouté aux torts d''Israël. '
  '11':
  - type: note
    content: 'Reconnaissez…  : litt. donnez reconnaissance, expression qui peut signifier aussi bien rendez grâce que reconnaissez vos torts  ; même formule, dans un contexte de confession analogue, en Jos 7.19 ; cf. 1S 6.5 ; Jr 13.16 ; Ml 2.2 ; voir aussi Lv 7.12n  ; Né 12.27,31n  ; un verbe apparenté est rendu par confesser en Né 9.2+. –  faute  : voir péché. –  faites sa volonté Ps 40.8 ; 143.10. –  Séparez-vous 6.21+.'
  - type: text
    content: 'Reconnaissez maintenant votre faute devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de vos pères, et faites sa volonté ! Séparez-vous des peuples du pays et des femmes étrangères. '
  '12':
  - type: note
    content: Cf. v. 5,16.
  - type: text
    content: 'Toute l''assemblée répondit d''une voix forte : D''accord ! A nous de faire comme tu l''as dit ! '
  '13':
  - type: text
    content: 'Mais le peuple est nombreux, le temps est à la pluie, et il n''est pas possible de rester dehors ; d''ailleurs, ce n''est pas l''œuvre d''un jour ou deux, car beaucoup parmi nous sont impliqués dans cette transgression. '
  '14':
  - type: note
    content: 'aux dates fixées  : même expression en Né 10.35 ; 13.31. –  la colère ardente  : cf. Es 13.9,13 ; Na 1.6 ; So 2.2. –  détournée 2Ch 29.10. –  au sujet de, d''après deux mss hébreux et des versions anciennes ; le texte hébreu traditionnel porte jusqu''à.'
  - type: text
    content: 'Que nos chefs restent pour toute l''assemblée, s''il te plaît ; et tous ceux qui, dans nos villes, ont épousé des femmes étrangères viendront aux dates fixées, avec les anciens et les juges de chaque ville, jusqu''à ce que la colère ardente de notre Dieu se soit détournée de nous au sujet de cette affaire. '
  '15':
  - type: note
    content: 'à combattre cet avis  : LXX a lu au contraire furent les seuls avec moi dans cette affaire  ; on pourrait aussi comprendre  : Jonathan et Yahzia… furent les seuls à combattre…, mais Meshoullam (cf. v. 29) et Shabthaï les soutinrent (les réformateurs, v. 14) (15) et les exilés firent ce qu''on avait dit. Voir aussi l''introduction au livre de Ruth♦.'
  - type: text
    content: 'Jonathan, fils d''Asaël, et Yahzia, fils de Tiqva, appuyés par Meshoullam et par le lévite Shabtaï, furent les seuls à combattre cet avis. '
  '16':
  - type: note
    content: 'firent ce qu''on avait dit  : litt. firent ainsi. –  On mit à part Esdras  : 3 Esdras 9.16 : « Esdras le prêtre choisit pour lui-même les chefs de leurs familles… » ce qui correspondrait à un texte hébreu très voisin. –  Ils s''assirent  : position du juge ; cf. v. 14.'
  - type: text
    content: 'Mais les exilés firent ce qu''on avait dit. On mit à part Esdras, le prêtre, et des chefs de famille, famille par famille, tous désignés par leur nom. Ils s''assirent le premier jour du dixième mois pour examiner la chose. '
  '17':
  - type: note
    content: Le premier jour du premier mois (mars-avril, cf. 7.9n), soit trois mois après le début de la réforme (v. 9n,16).
  - type: text
    content: Le premier jour du premier mois, ils en finirent avec tous les hommes qui avaient épousé des femmes étrangères.
  - type: heading
    content: Liste des Judéens fautifs
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.1s. –  fils des prêtres ou prêtres  ; cf. 2.36ss ; 2.61n  ; Né 7.39ss. –  Josué 2.2n  ; 3.2.
  - type: text
    content: 'Parmi les fils des prêtres, il s''en trouva qui avaient épousé des femmes étrangères : des fils de Josué, fils de Yotsadaq, et de ses frères, Maaséya, Eliézer, Yarib et Guedalia. '
  '19':
  - type: note
    content: 'Ils s''engagèrent  : litt. ils donnèrent leur main  ; cf. 2R 10.15n  ; Ez 17.18n  ; 1Ch 29.24n  ; 2Ch 30.8 ; voir aussi Lm 5.6. –  en réparation de leurs torts  : texte incertain ; en modifiant la vocalisation traditionnelle, on pourrait lire à offrir un bélier en sacrifice de réparation, à cause de leurs torts  ; cf. Lv 5.6n,15.'
  - type: text
    content: Ils s'engagèrent à renvoyer leurs femmes et à offrir un bélier en réparation de leurs torts ;
  '2':
  - type: note
    content: 'Elamites  : litt. fils d''Elam  ; cf. 2.7 ; 8.7. –  Nous avons commis un sacrilège  : cf. 9.2+,6ss ; voir saint. –  en épousant…  : litt. en faisant habiter, c.-à-d. en installant, en introduisant des femmes étrangères (ou inconnues, cf. Pr 2.16n) dans la communauté ; même expression aux v. 10,14,17s ; Né 13.23,27. –  peuples du pays, c.-à-d. populations locales  ; cf. v. 11 ; 3.3n. –  une espérance pour Israël  : cf. Jr 31.17 ; Jb 11.18 ; 14.7 ; Rt 1.12 ; Lm 3.29 ; 1Ch 29.15 ; cf. Hymnes (Qumrân) 6.6 : « Et j''ai su qu''il y avait de l''espérance pour ceux qui se convertissent de la rébellion et qui abandonnent le péché… » –  à ce sujet  : autre traduction malgré cela.'
  - type: text
    content: 'Alors Shekania, fils de Yehiel, qui était d''entre les Elamites, dit à Esdras : Nous avons commis un sacrilège envers notre Dieu en épousant des femmes étrangères d''entre les peuples du pays. Mais maintenant, il y a encore une espérance pour Israël à ce sujet. '
  '20':
  - type: text
    content: des fils d'Immer, Hanani et Zebadia ;
  '21':
  - type: text
    content: des fils de Harim, Maaséya, Elie, Shemaya, Yehiel et Ozias ;
  '22':
  - type: text
    content: des fils de Pashhour, Elioénaï, Maaséya, Ismaël, Netanéel, Yozabad et Eléasa.
  '23':
  - type: text
    content: 'Parmi les lévites : Yozabad, Shiméi, Qélaya, appelé aussi Qelita, Petahia, Juda et Eliézer.'
  '24':
  - type: text
    content: 'Parmi les chantres : Eliashib.'
  - type: text
    content: 'Parmi les portiers : Shalloum, Télem et Ouri.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'les gens d''Israël , le peuple par opposition aux fonctionnaires du temple. –  Malkiya  : dans la deuxième occurrence 3 Esdras 9.26 lit « Asebias ».'
  - type: text
    content: 'Parmi les gens d''Israël : des fils de Paréosh, Ramia, Yizziya, Malkiya, Miyamîn, Eléazar, Malkiya et Benaya ;'
  '26':
  - type: text
    content: des fils d'Elam, Mattania, Zacharie, Yehiel, Abdi, Yerémoth et Elie ;
  '27':
  - type: text
    content: des fils de Zattou, Elioénaï, Eliashib, Mattania, Yerémoth, Zabad et Aziza ;
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Zabbaï  : cf. Né 3.20.'
  - type: text
    content: des fils de Bébaï, Yohanân, Hanania, Zabbaï et Athlaï ;
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Bani  : cf. v. 34 ; certains modifient le texte hébreu traditionnel pour lire Bigvaï dans l''un ou l''autre cas ; LXX Banouï (cf. Binnouï au v. 38). –  Yeramoth ou Yerémoth ; autre lecture traditionnelle et Ramoth.'
  - type: text
    content: des fils de Bani, Meshoullam, Mallouk, Adaya, Yashoub, Shéal, Yeramoth ;
  '3':
  - type: note
    content: 'une alliance  : cf. v. 5 ; voir aussi 2R 11.17 ; Jr 34.8,10,15 ; 2Ch 15.12 ; 29.10 ; 34.31. –  toutes ces femmes  : litt. toutes les femmes, un ms hébreu, certains mss de LXX et Syr précisent les femmes étrangères  ; cf. 3 Esdras 8.93 : « Toutes nos femmes d''origine étrangère, avec leurs enfants. » –  suivant ton avis, mon seigneur  : d''après un ms hébreu ; lecture traditionnelle selon l''avis du Seigneur ou, selon quelques mss hébreux, du Seigneur (YHWH) ; 3 Esdras 8.94 : « Comme tu (Esdras) en as décidé, ainsi que ceux qui tremblent…  » 9.4+. –  la loi  : cf. 9.2+ ; voir aussi Dt 7.1ss ; 23.4ss ; Né 8.'
  - type: text
    content: 'Maintenant, concluons une alliance pour notre Dieu, en renvoyant toutes ces femmes et leurs enfants, suivant ton avis, mon seigneur, et suivant l''avis de ceux qui tremblent au commandement de notre Dieu. Que l''on agisse selon la loi ! '
  '30':
  - type: text
    content: des fils de Pahath-Moab, Adna, Kelal, Benaya, Maaséya, Mattania, Betsaléel, Binnouï et Manassé ;
  '31':
  - type: text
    content: ' '
  - type: note
    content: des fils , d'après certains mss hébreux et des versions anciennes ; autre texte les fils de Harim.
  - type: text
    content: 'des fils de Harim, Eliézer, Yishiya, Malkiya, Shemaya, Siméon, '
  '32':
  - type: text
    content: Benjamin, Mallouk et Shemaria ;
  '33':
  - type: text
    content: des fils de Hashoum, Matnaï, Mattatta, Zabad, Eliphéleth, Yerémaï, Manassé et Shiméi ;
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Bani  : cf. v. 29n,38n.'
  - type: text
    content: 'des fils de Bani, Maadaï, Amram, Ouel, '
  '35':
  - type: note
    content: 'Kelouhi  : autre lecture traditionnelle Kelouhou.'
  - type: text
    content: 'Benaya, Bédia, Kelouhi, '
  '36':
  - type: note
    content: 'Vania  : les mss hébreux et les versions anciennes donnent des formes très divergentes de ce nom.'
  - type: text
    content: 'Vania, Merémoth, Eliashib, '
  '37':
  - type: note
    content: Yaasav ou Yaasou, Yaaso  ; autre lecture traditionnelle Yaasaï.
  - type: text
    content: 'Mattania, Matnaï, Yaasav, '
  '38':
  - type: note
    content: 'Bani…  : certains, d''après LXX, modifient légèrement le texte hébreu traditionnel pour lire des fils de Binnouï, Shiméi  ; cf. v. 34+.'
  - type: text
    content: 'Bani, Binnouï, Shiméi, '
  '39':
  - type: note
    content: Shélémia v. 41 ; Né 3.30 ; 13.13.
  - type: text
    content: 'Shélémia, Nathan, Adaya, '
  '4':
  - type: note
    content: 'Cf. Jos 1.6,9 ; Ag 2.4 ; 1Ch 22.16 ; 28.10,20 ; 2Ch 19.11. –  tout repose sur toi  : litt. la chose (ou la parole) est sur toi.'
  - type: text
    content: 'Lève-toi, car tout repose sur toi. Nous sommes avec toi. Sois fort et agis ! '
  '40':
  - type: note
    content: 'Maknadbaï  : texte incertain : LXX des fils d''Ezor  ; certains suggèrent des fils de Zakkaï.'
  - type: text
    content: 'Maknadbaï, Shashaï, Sharaï, '
  '41':
  - type: note
    content: 'Shélémia  : ici, hébreu Shélémiahou.'
  - type: text
    content: 'Azaréel, Shélémia, Shemaria, '
  '42':
  - type: text
    content: Shalloum, Amaria et Joseph ;
  '43':
  - type: text
    content: des fils de Nebo, Yéiel, Mattitia, Zabad, Zebina, Yaddaï, Joël et Benaya.
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'Texte incertain et traduction conjecturale. 3 Esdras 9.36 : « Tous ceux-là avaient pris des femmes étrangères, et ils les renvoyèrent avec leurs enfants » est peut-être ici plus proche du texte originel.'
  - type: text
    content: Tous ceux-là avaient pris des femmes étrangères ; plusieurs en avaient eu des enfants.
  '5':
  - type: note
    content: 'Cf. Né 13.25. –  aux chefs des prêtres-lévites…  : autres traductions possibles, avec ou sans modification du texte hébreu traditionnel  : aux chefs des prêtres, aux lévites et à tout Israël ; aux chefs des prêtres, des lévites et de tout Israël ; aux chefs des prêtres-lévites et de tout Israël.'
  - type: text
    content: 'Esdras se leva et fit jurer aux chefs des prêtres-lévites et à tout Israël de faire ce qui venait d''être dit. Ils le jurèrent. '
  '6':
  - type: note
    content: 'la salle ou l''office  ; cf. 8.29 ; Né 13.4 ; cf. 2R 23.11 ; Jr 35.4 ; 36.10. –  Yohanân  : cf. Né 12.10s,22s. D''après des documents de la colonie juive d''Eléphantine, un Yohanân était grand prêtre à Jérusalem vers 410 av. J.-C., sous le règne de Darius II (423-404 av. J.-C., cf. 7.1n). –  Eliashib  : cf. Né 3.1 ; 13.28. –  quand il y fut entré  : litt. et il y alla ; 3 Esdras et LXX semblent avoir lu un autre verbe, et il y passa la nuit, c.-à-d. il y resta. –  il ne mangea rien…  : litt. il ne mangea pas de pain et il ne but pas d''eau  ; cf. Ex 34.28 ; Dt 9.9,18 ; 1R 13.8 ; Ez 4.17 ; Est 4.15s.'
  - type: text
    content: 'Puis Esdras se retira de devant la maison de Dieu et il alla dans la salle de Yohanân, fils d''Eliashib ; quand il y fut entré, il ne mangea rien et il ne but rien, parce qu''il était dans le deuil à cause du sacrilège commis par les exilés. '
  '7':
  - type: note
    content: Juda / Jérusalem 9.9+. –  proclamation 1.1n. –  les exilés 4.1n.
  - type: text
    content: 'On diffusa dans Juda et à Jérusalem une proclamation selon laquelle tous les exilés devaient se rassembler à Jérusalem ; '
  '8':
  - type: note
    content: 'confisqués  : litt. voués par anathème  ; l''expression s''applique ici, non à une destruction totale, mais à une confiscation sacrée au profit du temple ; cf. Lv 27.21n  ; Nb 18.14+ ; Dt 2.34n  ; 13.13ss ; Za 14.11n. –  séparé, ici au sens d’exclu, cf. 6.21+.'
  - type: text
    content: 'et d''après l''avis des chefs et des anciens, quiconque n''y viendrait pas dans les trois jours aurait tous ses biens confisqués et serait lui-même séparé de l''assemblée des exilés. '
  '9':
  - type: note
    content: 'Juda / Benjamin 1.5+. –  neuvième mois (novembre-décembre, pendant la saison des pluies dans la région), soit quatre mois après l''arrivée d''Esdras à Jérusalem (cf. 7.8n) ; certains situent dans l''intervalle les événements dont traite Né 7.72–8.18 (cf. Esd 7.10,25s ; 9.1). –  sur la place  : cf. Né 8.1,3. –  frissonnant  : le verbe hébreu correspondant n''apparaît qu''ici et en Ps 104.32 ; Dn 10.11 ; termes apparentés en Ex 15.15 ; Es 33.14 ; Ps 2.11 ; 48.7 ; 55.6 ; Jb 4.14.'
  - type: text
    content: 'Tous les hommes de Juda et de Benjamin se rassemblèrent à Jérusalem dans les trois jours. C''était le vingtième jour du neuvième mois. Tout le peuple se tenait sur la place de la maison de Dieu, frissonnant à cause de la circonstance et par suite de la pluie. '
