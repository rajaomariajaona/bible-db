document_id: 1PE.5,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'J''encourage ou j''exhorte , v. 12 ; 2.11. –  les anciens (le terme grec a donné le mot presbytre ) : cf. v. 5 ; Ac 11.30+ ; 1Tm 4.14n  ; 5.17 ; Tt 1.5ss ; 2Jn 1. –  témoin  : le terme grec a donné le mot martyr  ; il se pourrait que ce sens (celui qui témoigne au prix de sa vie) soit déjà en partie présent ici ; cf. v. 12 ; Ac 1.8+,22 ; 5.32 ; voir aussi Ac 22.20 ; Ap 2.13 ; 17.6. –  souffrances du Christ  : cf. 4.13. –  ayant part (4.13n) à la gloire  : cf. Mt 17.6 ; 2P 1.16ss. –  révélée 1.7 ; 4.14.'
  - type: text
    content: 'J''encourage donc les anciens qui sont parmi vous, moi qui suis un ancien comme eux, un témoin des souffrances du Christ ayant part à la gloire qui va être révélée : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.3ss ; 1Th 5.23ss ; 2Th 2.16ss ; Hé 13.20ss. –  souffert un peu de temps ou un peu 1.6n  ; cf. Rm 8.17s ; 2Co 4.17. –  en Jésus-Christ  : certains mss portent seulement dans le Christ . –  appelés à sa gloire 1Th 2.12 ; 5.24 ; 2P 1.3+. –  vous formera ou achèvera votre formation  ; sur le verbe correspondant, voir 2Co 13.9n. –  vous affermira 2Th 3.3 ; 2P 1.12. –  vous rendra… inébranlables  : litt. vous fondera , cf. Ep 3.17.'
  - type: text
    content: 'Quand vous aurez souffert un peu de temps, le Dieu de toute grâce, qui, en Jésus-Christ, vous a appelés à sa gloire éternelle, vous formera lui-même, vous affermira, vous rendra forts et inébranlables. '
  '11':
  - type: note
    content: '4.11+. –  pour toujours  : certains mss ont la formule développée rendue traditionnellement par aux siècles des siècles, dans la présente traduction à tout jamais.'
  - type: text
    content: 'A lui le pouvoir pour toujours ! '
  - type: text
    content: Amen !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Silvain  : probablement une forme latinisée de Silas, cf. Ac 15.27+ ; 1Th 1.1 ; 2Th 1.1. –  digne de confiance ou fidèle 4.19n. –  ces quelques mots… Hé 13.22. –  encourager (ou consoler, exhorter ) / témoigner  : cf. v. 1+. –  c''est bien…  : cf. Rm 5.2 ; certains témoins du texte lisent  : que telle est bien la vraie grâce de Dieu ; tenez-vous-y.'
  - type: text
    content: C'est par Silvain, que je considère comme un frère digne de confiance, que je vous écris ces quelques mots, pour vous encourager et pour témoigner que c'est bien dans la vraie grâce de Dieu que vous vous tenez.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Celle qui… a été choisie comme vous ou avec vous  : c.-à-d. l''Eglise, cf. 1.1+s ; 2Jn 1,13. –  Babylone  : sans doute une désignation symbolique de Rome ; cf. 1.1+s ; Ap 14.8+ ; 17.5 ; cf. Oracles sibyllins 5.159ss : « Elle (une grande étoile tombée du ciel pour exécuter le jugement divin) consumera la mer profonde, Babylone elle-même et la terre italienne à cause de laquelle ont péri bien des Hébreux saints et fidèles et le peuple de vérité. » –  Marc Ac 12.12+ss ; Col 4.10 ; 2Tm 4.11 ; Phm 24.'
  - type: text
    content: 'Celle qui, à Babylone, a été choisie comme vous vous salue, de même que mon fils Marc. '
  '14':
  - type: note
    content: 'le baiser de l''amour  : litt. un baiser d''amour  ; cf. Rm 16.16+ ; 1Co 16.20. –  Paix 1.2 ; voir aussi Ep 6.23.'
  - type: text
    content: Saluez-vous les uns les autres par le baiser de l'amour.
  - type: text
    content: Paix à vous tous qui êtes dans le Christ !
  '2':
  - type: note
    content: 'faites paître (verbe apparenté au mot habituellement traduit par berger au v. 4) / veillez sur lui (le terme correspondant, absent de certains mss, est apparenté à celui qui a donné le mot évêque et qui est transcrit épiscope) 2.25n  ; Jn 21.15ss ; Ac 20.28n  ; voir aussi Ez 34.13ss ; Ps 23 ; Jn 10. –  non pas par contrainte  : cf. Phm 14 ; voir aussi 1Tm 3.1 ; Hé 13.17 ; cf. Ecrit de Damas (Qumrân) 13.7-9 : « Et voici la règle relative à l''inspecteur (ou : surveillant) du camp. Il instruira les Nombreux des œuvres de Dieu, et il leur apprendra Ses exploits merveilleux, et il racontera devant eux les événements d''autrefois… Et il aura pitié d''eux comme un père de ses enfants, et il les portera en tout leur accablement comme un pasteur son troupeau. » –  gains honteux  : cf. 1Tm 3.2ss,8 ; 5.17ss ; Tt 1.7ss,11.'
  - type: text
    content: 'faites paître le troupeau de Dieu qui est chez vous ; veillez sur lui, non pas par contrainte, mais volontairement, selon Dieu ; non pas pour des gains honteux, mais avec ardeur ; '
  '3':
  - type: note
    content: 'dominant comme des seigneurs (ou des maîtres) : cf. Mc 10.42/ / ; Jn 13.15ss ; le verbe grec, apparenté au mot généralement traduit par seigneur, est dérivé de celui qui est traduit par exercer une maîtrise sur en Rm 6.9n  ; 2Co 1.24. –  ceux qui vous ont été confiés ou qui vous sont échus en partage  ; le terme grec est apparenté au mot traduit par héritage (1.4+) ; on pourrait aussi comprendre ceux qui sont l''héritage ou le patrimoine (de Dieu). –  modèles  : cf. 2.21 ; 4.1s ; 1Co 4.16 ; 11.1 ; Ph 3.17 ; 1Tm 4.12 ; Tt 2.7.'
  - type: text
    content: 'non pas en dominant comme des seigneurs sur ceux qui vous ont été confiés, mais en étant des modèles pour le troupeau ; '
  '4':
  - type: note
    content: 'le maître berger ou le berger (= pasteur) en chef 2.25 ; Mt 9.36 ; 25.31 ; 26.31/ / ; Lc 15.3ss/ / ; Jn 10 ; Hé 13.20. –  se manifestera  : litt. aura été manifesté 1.20+ ; Col 3.4+. –  vous obtiendrez (1.9) la couronne inaltérable de la gloire (ou de la gloire inaltérable) : cf. 1.4n  ; Es 28.5 ; Jr 13.18 ; 1Co 9.25 ; Jc 1.12 ; Ap 2.10 ; voir aussi 2P 1.11 ; la couronne de gloire apparaît aussi dans des textes juifs comme Siracide 47.6 ; Testament de Benjamin 4.1 ; Règle de la Communauté (Qumrân) 4.7 ; Hymnes 9.25.'
  - type: text
    content: et, lorsque le maître berger se manifestera, vous obtiendrez la couronne inaltérable de la gloire.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'jeunes gens  : cf. Tt 2.6ss. –  soyez soumis 2.13+. –  anciens  : cf. v. 1+. –  revêtez-vous (ou ceignez-vous , comme pour se préparer à servir ; le verbe grec correspondant n''apparaît qu''ici dans le N.T.) de l''humilité  : cf. Jn 13.4ss ; Ep 2.3ss. –  Dieu résiste… Pr 3.34  ; cf. 1S 2.7 ; Ez 17.24 ; Ps 18.27 ; 31.23 ; Lc 1.51ss ; 14.11+ ; Jc 4.6.'
  - type: text
    content: 'De même, jeunes gens, soyez soumis aux anciens. Tous, revêtez-vous de l''humilité dans vos rapports mutuels, car Dieu '
  - type: text
    content: résiste aux orgueilleux, mais il accorde sa grâce aux humbles
  - type: text
    content: .
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jc 4.10 ; voir aussi Gn 16.9n  ; Jb 22.29 ; Ph 2.8ss.
  - type: text
    content: 'Abaissez-vous donc sous la main puissante de Dieu, pour qu''il vous élève en temps voulu. '
  '7':
  - type: note
    content: Ps 55.23 ; Mt 6.25+ss.
  - type: text
    content: Déchargez-vous sur lui de toutes vos inquiétudes, car il prend soin de vous.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'sobres (1.13+) / veillez (Mc 13.37+) : cf. 1Th 5.6. –  adversaire Mt 5.25/ / ; cf. Pr 18.17. –  rôde  : cf. Jb 1.7. –  lion rugissant Ps 22.14  ; cf. Ez 22.25 ; 2Tm 4.17.'
  - type: text
    content: 'Soyez sobres, veillez. Votre adversaire, le diable, rôde '
  - type: text
    content: comme un lion rugissant,
  - type: text
    content: ' cherchant qui dévorer ; '
  '9':
  - type: note
    content: 'opposez-vous à lui Ep 6.11ss,16 ; Jc 4.7 ; cf. Mt 5.39. –  fermes dans la foi ou par la foi 1.4 ; Ac 16.5+. –  sont imposées à  : litt. s''accomplissent dans. –  vos frères  : litt. la fraternité, même terme en 2.17n.'
  - type: text
    content: opposez-vous à lui, fermes dans la foi, sachant que les mêmes souffrances sont imposées à vos frères dans le monde.
