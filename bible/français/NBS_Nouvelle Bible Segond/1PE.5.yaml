        children:
        - type: text
          text: '5.159ss : « Elle (une grande étoile tombée du ciel pour exécuter le jugement divin) consumera la mer profonde, Babylone elle-même et la terre italienne à cause de laquelle ont péri bien des Hébreux saints et fidèles et le peuple de vérité. » –  '
