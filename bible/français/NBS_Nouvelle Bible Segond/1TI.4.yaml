document_id: 1TI.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Des enseignements de démons
  - type: text
    content: ' '
  - type: note
    content: 'l''Esprit dit  : cf. Ac 11.27s ; 13.2 ; 20.23 ; 21.11 ; 1Co 12.7,10 ; Ap 2.7,11,17,29 ; 3.6,13,22 ; voir aussi Mt 24.11,23s/ / ; Ac 20.29s. –  les derniers temps  : cf. 1Co 7.29 ; 10.11 ; 2Tm 3.1+ ; 2P 3.3 ; 1Jn 2.18 ; Jd 18. –  s''éloigneront  : verbe apparenté au terme qui a donné notre mot apostasie (2Th 2.3n) ; cf. Lc 8.13n  ; Hé 3.12. –  esprits d''égarement ou imposteurs , cf. Mt 27.63n  ; autre traduction inspirations trompeuses  : l''adjectif grec est dérivé du terme habituellement traduit par erreur ou égarement  ; cf. 1Jn 4.6 ; voir aussi 1R 22.22 ; Es 19.14 ; 2Co 6.8 ; 2Tm 3.13 ; 2P 2.1,18 ; 3.17. –  de démons  : cf. Jc 3.15 ; voir aussi 2Co 4.4 ; 11.13ss.'
  - type: text
    content: 'Pourtant l''Esprit dit expressément que, dans les derniers temps, quelques-uns s''éloigneront de la foi pour s''attacher à des esprits d''égarement et à des enseignements de démons, '
  '10':
  - type: note
    content: 'Cf. 1Co 15.19,30ss,58. –  nous nous donnons de la peine  : autre traduction nous travaillons  ; cf. 5.17 ; 1Co 4.12 ; 15.10 ; 16.16 ; Ga 4.11 ; 1Th 1.3 ; Ap 2.2. –  luttons ou combattons 6.12 ; 1Co 9.25 ; Col 1.29 ; 2Tm 4.7. –  nous avons mis notre espérance 5.5 ; 1Co 15.19 ; 2Co 1.10 ; cf. 1Jn 3.3. –  un Dieu vivant ou le Dieu vivant, cf. 3.15+. –  sauveur (1.1+) de tous les humains 2.4+. –  en particulier (autre traduction surtout) des croyants  : cf. v. 12 ; Ga 6.10 ; 1P 4.17s ; voir aussi Rm 8.24 ; 15.13 ; Ep 2.5,8.'
  - type: text
    content: si nous nous donnons de la peine et si nous luttons, c'est parce que nous avons mis notre espérance dans un Dieu vivant, qui est le sauveur de tous les humains, et en particulier des croyants.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 5.7 ; 6.2.
  - type: text
    content: Voilà ce que tu dois enjoindre et enseigner.
  - type: heading
    content: Un modèle pour les croyants
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Que personne… ta jeunesse  : cf. 5.1s,17,19 ; 1Co 16.10s ; Tt 2.15 ; voir aussi Jb 32.9+. –  un modèle Tt 2.7s ; 1P 5.3 ; cf. Ph 3.17+. –  conduite 3.15 ; Ga 1.13 ; Hé 13.7 ; Jc 3.13 ; 1P 2.12 ; 3.16. –  foi ou fidélité , cf. v. 10+ ; voir aussi Ga 5.22+. –  pureté 5.2,22 ; cf. 2Co 6.6 ; 11.3 ; Ph 1.17 ; 1P 3.2.'
  - type: text
    content: Que personne ne méprise ta jeunesse ! Sois pour les croyants un modèle en parole, en conduite, en amour, en foi, en pureté.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Jusqu''à ce que je vienne 3.14. –  la lecture ( publique des Ecritures est sous-entendu dans le texte) : cf. Jos 1.8 ; Ps 1.2 ; Né 8.7s ; Mc 2.25+ ; Lc 4.16ss ; Ac 8.28n  ; 13.14ss ; 15.21 ; 2Co 3.14 ; 1Th 5.27 ; Ap 1.3. –  encouragement ou exhortation , 1.3+ ; cf. Ac 13.15 ; Rm 12.8 ; 15.4 ; 1Co 14.3 ; Tt 1.9 ; Hé 13.22. –  enseignement ou doctrine 1.10+ ; 5.17 ; 2Tm 3.10 ; 4.3,6,16 ; Tt 2.1,7,10 ; cf. Rm 12.7.'
  - type: text
    content: 'Jusqu''à ce que je vienne, applique-toi à la lecture publique des Ecritures, à l''encouragement, à l''enseignement. '
  '14':
  - type: note
    content: 'le don  : grec kharisma (qui a donné notre mot « charisme ») ; cf. 2Tm 1.6 ; cf. Rm 12.6 ; 1Co 12.4ss ; 1P 4.10. – Voir grâce. –  par un message de prophète 1.18+ ; cf. 2Tm 2.2. –  l''imposition des mains 5.22 ; 2Tm 1.6 ; cf. Mt 19.18+ ; Mc 5.23+ ; Ac 6.6+ ; 8.17ss ; Hé 6.2. –  du collège des anciens  : autre traduction pour te conférer la charge d''ancien ou de presbytre  ; le terme grec est un dérivé du comparatif presbuteros (plus âgé), qui a donné notre mot « prêtre » (cf. « presbytère ») ; le même mot est traduit par vieillard, au féminin par femmes âgées, en 5.1s ; Tt 2.2 ; Phm 9 ; cf. 5.17 ; Ac 11.30+ ; Jc 5.14 ; 1P 5.1 ; voir aussi Ac 16.1ss.'
  - type: text
    content: 'Ne néglige pas le don de la grâce qui est en toi et qui t''a été accordé par un message de prophète, avec l''imposition des mains du collège des anciens. '
  '15':
  - type: note
    content: 'Prends cela à cœur  : autre traduction médite sur tout cela, cf. Jos 1.8 ; Ps 1.2 ; 77.6,13 ; 119.15,148 ; 143.5. –  progrès Ph 1.25+. –  manifestes pour tous  : cf. 3.7 ; Ac 4.16 ; voir aussi 24.16 ; 1Co 4.9 ; 2Co 1.12 ; 4.9.'
  - type: text
    content: 'Prends cela à cœur, sois tout entier à la tâche, afin que tes progrès soient manifestes pour tous. '
  '16':
  - type: note
    content: 'Veille sur toi-même…  : cf. Ac 20.28. –  ton enseignement v. 13n  ; cf. 1.3. –  demeure  : cf. Col 1.23 ; 2Tm 3.14. –  tu sauveras…  : cf. 2.15. –  toi-même  : cf. Ez 3.19 ; 33.9 ; Dn 12.3 ; 1Co 9.16,23,27 ; Hé 13.7 ; Jc 5.20 ; 1P 5.4. –  qui t''écoutent  : autre traduction qui t''obéissent  ; cf. Rm 11.14+.'
  - type: text
    content: Veille sur toi-même et sur ton enseignement ; demeure dans tout cela. Car en agissant ainsi, tu sauveras et toi-même et ceux qui t'écoutent.
  '2':
  - type: note
    content: 'hypocrisie  : cf. Mt 23.28 ; 1P 2.1 ; voir aussi Mt 7.15. –  discoureurs de mensonge  : cf. 6.20. –  marqués au fer rouge  : cette expression fait peut-être allusion à la marque infamante appliquée à des criminels ou à des esclaves fugitifs ; d''autres pensent qu''elle évoque l''endurcissement et l''insensibilité d''une conscience comme cautérisée (ce verbe vient du terme grec qui est employé ici) ; cf. Ep 4.19.'
  - type: text
    content: 'par l''hypocrisie de discoureurs de mensonge marqués au fer rouge dans leur propre conscience. '
  '3':
  - type: note
    content: 'Cf. v. 8 ; 2Tm 2.18. –  se marier  : cf. Mc 12.25/ / ; 1Co 7.1nss,36ss. –  prescrivent  : sous-entendu dans le texte, litt. et de s''abstenir… –  aliments  : cf. Gn 9.3 ; Mc 7.19 ; voir aussi Ac 15.20,29 ; 21.25 ; Rm 14.2 ; Col 2.16ss. –  pris ou partagés, terme apparenté en Ac 2.46n. –  avec actions de grâces v. 4 ; Mc 6.41 ; 8.6s ; 14.22 ; Ac 27.35 ; Rm 14.6 ; 1Co 10.30s ; Ep 5.20 ; Ph 4.6 ; Col 3.17 ; Tt 1.13ss. –  croyants ou fidèles v. 12 ; cf. Rm 8.28. –  connaissent la vérité 2.4n.'
  - type: text
    content: 'Ils interdisent de se marier et prescrivent de s''abstenir d''aliments que Dieu a créés pour qu''ils soient pris avec actions de grâces par ceux qui sont croyants et qui connaissent la vérité. '
  '4':
  - type: note
    content: ce que Dieu a créé est bon (ou beau, 1.8n) Gn 1.4,30s ; 2.18ss ; Mc 7.19 ; Ac 10.11ss ; Rm 14.14.
  - type: text
    content: 'Or tout ce que Dieu a créé est bon, et rien n''est à rejeter, pourvu qu''on le prenne avec actions de grâces, '
  '5':
  - type: note
    content: 'consacré ou sanctifié  : cf. 2.15n  ; Jn 17.17ss ; Rm 15.16 ; 1Co 1.2 ; 2Tm 2.21. –  par la parole Jn 15.3n  ; cf. Ps 24.1 ; 145.15s ; 1Co 10.26. –  la prière  : c''est le terme traduit par supplications en 2.1.'
  - type: text
    content: car tout est consacré par la parole de Dieu et la prière.
  - type: heading
    content: Dieu, sauveur de tous
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'frères 5.1 ; 6.2 ; 2Tm 4.21 ; cf. Ac 1.15. –  bon ou beau , cf. 1.8n. –  ministre ou serviteur , cf. 3.8n  ; voir aussi 1.12 ; 1Co 3.5. –  nourri  : litt. te nourrissant  ; cf. 1Co 3.2 ; Hé 5.12 ; 1P 2.2 ; voir aussi 2Tm 3.15. –  enseignement 1.10 ; 6.3. –  bien suivi  : même verbe 2Tm 3.10 ; voir aussi Lc 1.3n.'
  - type: text
    content: 'En exposant cela aux frères, tu seras un bon ministre de Jésus-Christ, nourri des paroles de la foi et du bel enseignement que tu as toujours bien suivi. '
  '7':
  - type: note
    content: 'repousse  : même verbe 5.11 (refuser) ; 2Tm 2.23 ; Tt 3.10 (éloigner) ; Hé 12.25n. –  fables 1.4n. –  profanatrices ou profanes 1.9+ ; 6.20 ; 2Tm 2.16 ; voir saint. –  Exerce-toi  : métaphore de l''athlète ; le terme grec et celui qui est traduit par exercice au v. 8 donneront notre mot gymnastique  ; cf. 1Co 9.24ss ; Ga 2.2 ; 5.7 ; Ph 2.16 ; 3.12ss ; 2Tm 2.5 ; 4.7 ; Hé 12.1 ; même verbe en Hé 5.14 ; 12.11 (former) ; 2P 2.14. –  à (autre traduction selon) la piété 2.2n.'
  - type: text
    content: Mais repousse les fables profanatrices, les contes de vieilles femmes.
  - type: text
    content: 'Exerce-toi plutôt à la piété ; '
  '8':
  - type: note
    content: 'l''exercice corporel, auquel la civilisation grecque accordait beaucoup d''importance v. 7n  ; cf. Col 2.23. –  utile à tout  : cf. 6.6 ; voir aussi Dt 28.1ss ; Ps 1.1ss ; Rm 8.28 ; 2P 1.3,7s. –  promesse 2Tm 1.1. –  la vie, pour le présent et l''avenir  : litt. la vie de maintenant et celle qui va venir  ; cf. 1.16 ; 6.19 ; voir aussi Mc 10.30/ / ; Ep 6.2s ; Tt 1.2 ; 2.12.'
  - type: text
    content: 'l''exercice corporel, en effet, est utile à peu de chose, tandis que la piété est utile à tout : elle a la promesse de la vie, pour le présent et l''avenir. '
  '9':
  - type: note
    content: 1.15+.
  - type: text
    content: 'C''est une parole certaine et digne d''être pleinement accueillie : '
