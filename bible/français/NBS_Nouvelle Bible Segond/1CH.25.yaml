document_id: 1CH.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les classes de chantres
  - type: text
    content: ' '
  - type: note
    content: 'les fonctionnaires  : litt. les chefs de l''armée , mais il s''agit en fait des responsables des groupes de chantres et non de militaires. –  séparèrent  : autre traduction mirent à part , cf. 23.13. –  Asaph / Hémân / Yedoutoun  : cf. 6.18n  ; 15.17+. – Voir prophète. –  avec des lyres…  : cf. 1S 10.5. –  le nombre  : cf. v. 7 ; autre traduction l''énumération.'
  - type: text
    content: David et les fonctionnaires séparèrent pour le service les fils d'Asaph, de Hémân et de Yedoutoun qui parlaient en prophètes avec des lyres, des luths et des cymbales. Voici le nombre de ceux qui avaient des fonctions à remplir.
  '10':
  - type: text
    content: 'le troisième : Zakkour, ses fils et ses frères, douze ;'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Yitseri  : cf. v. 3 Tseri.'
  - type: text
    content: le quatrième, à Yitseri, ses fils et ses frères, douze ;
  '12':
  - type: text
    content: 'le cinquième : Netania, ses fils et ses frères, douze ;'
  '13':
  - type: text
    content: 'le sixième : Bouqqiya, ses fils et ses frères, douze ;'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Yesarééla  : cf. v. 2 Asarééla.'
  - type: text
    content: 'le septième : Yesarééla, ses fils et ses frères, douze ;'
  '15':
  - type: text
    content: 'le huitième : Esaïe, ses fils et ses frères, douze ;'
  '16':
  - type: text
    content: 'le neuvième : Mattania, ses fils et ses frères, douze ;'
  '17':
  - type: text
    content: 'le dixième : Shiméi, ses fils et ses frères, douze ;'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Azaréel  : cf. v. 4 Ouzziel.'
  - type: text
    content: 'le onzième : Azaréel, ses fils et ses frères, douze ;'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Hashabia  : cf. v. 3 (forme légèrement différente).'
  - type: text
    content: le douzième, à Hashabia, ses fils et ses frères, douze ;
  '2':
  - type: text
    content: 'Pour les fils d''Asaph : Zakkour, Joseph, Netania et Asarééla, fils d''Asaph, sous la direction d''Asaph, qui parlait en prophète, sous la direction du roi. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Shoubaël  : cf. v. 4 Shebouel.'
  - type: text
    content: 'pour le treizième : Shoubaël, ses fils et ses frères, douze ;'
  '21':
  - type: text
    content: 'pour le quatorzième : Mattitia, ses fils et ses frères, douze ;'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Yerémoth  : cf. v. 4 Yerimoth.'
  - type: text
    content: pour le quinzième, à Yerémoth, ses fils et ses frères, douze ;
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Hanania  : hébreu Hananyahou , de même en Jr 36.12 ; 2Ch 26.4 ; forme brève au v. 4.'
  - type: text
    content: pour le seizième, à Hanania, ses fils et ses frères, douze ;
  '24':
  - type: text
    content: pour le dix-septième, à Yoshbeqasha, ses fils et ses frères, douze ;
  '25':
  - type: text
    content: pour le dix-huitième, à Hanani, ses fils et ses frères, douze ;
  '26':
  - type: text
    content: pour le dix-neuvième, à Malloti, ses fils et ses frères, douze ;
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Eliyata  : cf. v. 4 Eliata.'
  - type: text
    content: pour le vingtième, à Eliyata, ses fils et ses frères, douze ;
  '28':
  - type: text
    content: pour le vingt et unième, à Hotir, ses fils et ses frères, douze ;
  '29':
  - type: text
    content: pour le vingt-deuxième, à Guiddalti, ses fils et ses frères, douze ;
  '3':
  - type: note
    content: 'six  : avec un ms hébreu et LXX, certains proposent de rajouter entre Esaïe et Hashabia (hébreu Hashavyahou  ; de même en 26.30 ; 2Ch 35.9) un sixième nom, Shiméi, que l''on trouve au v. 17 (voir aussi Né 11.17 ; 1Ch 9.16).'
  - type: text
    content: 'Pour Yedoutoun, les fils de Yedoutoun : Guedalia, Tseri, Esaïe, Hashabia, Mattitia, six, sous la direction de leur père Yedoutoun, qui parlait en prophète avec la lyre pour célébrer et louer le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '30':
  - type: text
    content: pour le vingt-troisième, à Mahazioth, ses fils et ses frères, douze ;
  '31':
  - type: text
    content: pour le vingt-quatrième, à Romamti-Ezer, ses fils et ses frères, douze.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Bouqqiya, Mattania  : hébreu Bouqqiyahou / Mattanyahou . – Les neuf derniers noms de ce verset ( Hanania… Mahazioth ) forment en hébreu une phrase composée d''expressions de louange qu''on pourrait traduire par  : Fais grâce, Seigneur, / fais-moi grâce. / Tu es mon Dieu. / J''ai exalté, / j''ai magnifié (ton) secours. / Assis dans l''épreuve, / j''ai parlé : / Donne abondamment / des visions . – Les vingt-trois noms énumérés dans les v. 2-4 se retrouvent (avec Shiméi en plus, cf. v. 3n) dans la liste numérotée des v. 9-31 avec parfois des variantes orthographiques plus ou moins importantes.'
  - type: text
    content: 'Pour Hémân, les fils de Hémân : Bouqqiya, Mattania, Ouzziel, Shebouel, Yerimoth, Hanania, Hanani, Eliata, Guiddalti, Romamti-Ezer, Yoshbeqasha, Malloti, Hotir, Mahazioth. '
  '5':
  - type: note
    content: 'visionnaire du roi  : comme Gad, en 21.9. –  les affaires de Dieu  : autre traduction les paroles de Dieu. –  élever la corne  : sens incertain ; on pourrait comprendre exalter la puissance (de Dieu ? du roi ?) ; ou bien, en rattachant cette précision à ce qui suit  : afin d''élever la puissance de Hémân, Dieu lui avait donné quatorze fils… D''autres voient là une allusion à un instrument de musique (le terme correspondant à corne, en araméen, est traduit par cor en Dn 3.5,7,15).'
  - type: text
    content: 'Tous ceux-là sont des fils de Hémân, qui était le visionnaire du roi pour les affaires de Dieu, afin d''élever la corne ; Dieu avait donné à Hémân quatorze fils et trois filles. '
  '6':
  - type: text
    content: 'Tous ceux-là étaient sous la direction de leur père pour le chant de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec des cymbales, des luths et des lyres pour le service de la maison de Dieu.'
  - type: text
    content: 'Asaph, Yedoutoun et Hémân étaient sous la direction du roi. '
  '7':
  - type: note
    content: '288  : total des vingt-quatre groupes de douze personnes énumérés dans les v. 9-31. –  experts…  : autre traduction formés au chant. –  instructeurs  : autre traduction compétents, cf. 15.22.'
  - type: text
    content: 'Ils étaient au nombre de 288, avec leurs frères experts en ce qui concerne le chant pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', tous instructeurs. '
  '8':
  - type: note
    content: 'Ils tirèrent au sort  : voir 6.39n  ; 24.31n. –  instructeurs (même terme en Esd 8.16) et disciples  : autre traduction compétents ou débutants, cf. v. 7+.'
  - type: text
    content: Ils tirèrent au sort pour leurs postes, petits et grands, instructeurs et disciples.
  '9':
  - type: text
    content: Le premier sort échut, pour Asaph, à Joseph ;
  - type: text
    content: 'le deuxième : Guedalia, lui, ses frères et ses fils, douze ;'
