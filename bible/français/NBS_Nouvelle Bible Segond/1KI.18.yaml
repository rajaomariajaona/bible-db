document_id: 1KI.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Elie et Abdias
  - type: text
    content: ' '
  - type: note
    content: 'Bien des jours s''écoulèrent  : litt. après de nombreux jours . –  la troisième année , après l''annonce de la sécheresse, 17.1 ; cf. Lc 4.25 ; Jc 5.17. –  Achab 16.28n. –  sur la terre  : litt. sur la face du sol , cf. Gn 2.5n.'
  - type: text
    content: 'Bien des jours s''écoulèrent, et la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Elie, la troisième année : Va, parais devant Achab, et j''enverrai de la pluie sur la terre. '
  '10':
  - type: note
    content: Par la vie… 1.29n.
  - type: text
    content: 'Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, il n''est ni nation ni royaume où mon seigneur ne t''ait envoyé chercher ; et quand on disait que tu n''y étais pas, il faisait jurer au royaume ou à la nation en question que l''on ne t''avait pas trouvé. '
  '11':
  - type: text
    content: 'Et maintenant, toi, tu dis : « Va dire à ton seigneur : “J''ai trouvé Elie !” » '
  '12':
  - type: note
    content: 'le souffle (voir esprit) … t''emportera  : cf. 2R 2.16 ; Ez 3.14 ; 8.3 ; 11.1 ; 43.5 ; Ac 8.39.'
  - type: text
    content: 'Puis, lorsque je t''aurai quitté, le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''emportera je ne sais où ; j''irai faire mon rapport à Achab, qui ne te trouvera pas et qui me tuera. Pourtant je crains le '
  - type: text
    content: Seigneur
  - type: text
    content: ' depuis ma jeunesse. '
  '13':
  - type: note
    content: 'mon seigneur désigne Elie. –  J''ai caché…  : cf. v. 4+. –  nourris v. 4n.'
  - type: text
    content: 'Ne t''a-t-on pas rapporté, mon seigneur, ce que j''ai fait quand Jézabel tuait les prophètes du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? J''ai caché cent prophètes du '
  - type: text
    content: Seigneur
  - type: text
    content: ', par cinquante dans deux grottes et je les ai nourris de pain et d''eau. '
  '14':
  - type: text
    content: 'Et maintenant, toi, tu dis : « Va dire à ton seigneur : “J''ai trouvé Elie !” » Il me tuera ! '
  '15':
  - type: note
    content: 'Par la vie 1.29n. –  Seigneur (YHWH) des Armées  : cf. 1S 1.11n. –  au service duquel je me tiens  : cf. 10.8n  ; 17.1. –  devant Achab  : litt. devant lui.'
  - type: text
    content: 'Mais Elie dit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, au service duquel je me tiens, aujourd''hui je paraîtrai devant Achab.'
  - type: heading
    content: Elie et Achab
  '16':
  - type: text
    content: 'Abdias alla à la rencontre d''Achab et lui fit son rapport. Alors Achab se rendit à la rencontre d''Elie. '
  '17':
  - type: note
    content: 'toi qui attires le malheur  : cf. Gn 34.30+ ; voir aussi Lc 23.2.'
  - type: text
    content: 'Lorsqu''il aperçut Elie, Achab lui dit : Est-ce toi qui attires le malheur sur Israël ? '
  '18':
  - type: note
    content: 'les commandements (voir loi) : absent de LXX. –  tu as suivi…  : cf. 16.25s,30-33.'
  - type: text
    content: 'Elie répondit : Ce n''est pas moi qui attire le malheur sur Israël ; au contraire, c''est toi et la maison de ton père, puisque vous avez abandonné les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) et que tu as suivi les Baals. '
  '19':
  - type: note
    content: 'mont Carmel  : massif montagneux de 552 m de haut, qui domine la ville moderne de Haïfa. Il a été un lieu de culte de toutes les religions qui se sont succédé dans le pays, et en particulier le culte du Baal. Carmel était aussi le nom d''une divinité de l''orage et de la pluie, comme Baal. –  l''Ashéra 15.13+.'
  - type: text
    content: Maintenant, fais rassembler tout Israël auprès de moi au mont Carmel, avec les quatre cent cinquante prophètes du Baal et les quatre cents prophètes de l'Ashéra qui mangent à la table de Jézabel.
  - type: heading
    content: Elie et les prophètes du Baal au Carmel
  '2':
  - type: note
    content: Samarie 16.24n.
  - type: text
    content: Elie s'en alla pour paraître devant Achab.
  - type: text
    content: 'La famine pressait Samarie. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'des messagers  : sous-entendu dans le texte. –  les prophètes  : cf. v. 19.'
  - type: text
    content: 'Achab envoya des messagers à tous les Israélites et il rassembla les prophètes au mont Carmel. '
  '21':
  - type: note
    content: 'Cf. 2Co 6.15. –  sauterez-vous d''un pied sur l''autre  : traduction incertaine ; on a aussi compris à pieds joints ; sur des bâtons. Le verbe sauter traduit le verbe hébreu pasah, qui a donné Pésah, la Pâque ; cf. Ex 12.11n. L''expression traduite par sauter d''un pied sur l''autre se réfère sans doute aux danses sacrées du culte du Baal (voir v. 26). Elle a souvent été interprétée, dans la bouche d''Elie, comme une allusion ironique à l''hésitation d''Israël entre Dieu et le Baal, mais rien n''indique avec certitude qu''elle avait à l''origine ce sens en hébreu. –  Si c''est le Seigneur (YHWH)…  : il s''agit surtout de savoir de quel dieu (ou Dieu) Israël est le peuple.'
  - type: text
    content: 'Alors Elie s''approcha de tout le peuple et dit : Jusqu''à quand sauterez-vous d''un pied sur l''autre ? Si c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est Dieu, suivez-le ! Si c''est le Baal, suivez-le ! Le peuple ne lui répondit rien. '
  '22':
  - type: note
    content: 'Je suis resté moi seul  : de même 19.10,14.'
  - type: text
    content: 'Elie dit au peuple : Je suis resté moi seul prophète du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), et il y a quatre cent cinquante prophètes du Baal. '
  '23':
  - type: note
    content: 'qu''ils le découpent  : cf. Ex 29.17 ; Lv 1.6,12 ; 8.20. –  je le placerai sur le bois  : absent de LXX.'
  - type: text
    content: 'Que l''on nous donne deux taureaux ; qu''ils se choisissent un taureau, qu''ils le découpent et qu''ils le mettent sur le bois, sans y mettre le feu ; quant à moi, je préparerai l''autre taureau, et je le placerai sur le bois, sans y mettre le feu. '
  '24':
  - type: note
    content: 'par le feu  : il faut sans doute comprendre par la foudre (l''un des attributs de Baal) ; cf. 1Ch 21.26. Il s''agit ici d''une sorte d''ordalie (Nb 5.11n), où on en appelle aux dieux eux-mêmes pour trancher un litige religieux ; YHWH combat ici, en quelque sorte, sur le terrain de Baal, mais il s''en distinguera en 1R 19.11s. –  D''accord  : litt. c''est une bonne chose ! ou c''est bien ! comme en 2.38,42 ; même expression hébraïque en Dt 1.14.'
  - type: text
    content: 'Vous invoquerez le nom de votre dieu, et moi, j''invoquerai le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). Le dieu qui répondra par le feu, c''est celui-là qui sera Dieu ! Tout le peuple répondit : D''accord !'
  '25':
  - type: text
    content: 'Elie dit aux prophètes du Baal : Choisissez-vous un taureau, préparez-le les premiers, car vous êtes les plus nombreux ; invoquez le nom de votre dieu, mais ne mettez pas le feu. '
  '26':
  - type: note
    content: 'qu''on leur donna  : absent de LXX. –  ils sautaient devant (litt. sur) l''autel  : la danse sacrée fait partie des rites de certaines religions ; cf. v. 21n. –  qu''on avait fait  : litt. qu''il avait fait  ; certains mss hébreux et des versions anciennes ont lu le pluriel qu''ils avaient fait.'
  - type: text
    content: 'Ils prirent le taureau qu''on leur donna et le préparèrent ; et ils invoquèrent le nom du Baal, depuis le matin jusqu''à midi, en disant : Baal, réponds-nous ! Mais il n''y eut ni voix ni réponse. Et ils sautaient devant l''autel qu''on avait fait. '
  '27':
  - type: note
    content: 'peut-être qu''il dort et qu''il va se réveiller  : Baal, contrairement à YHWH, vivant et toujours présent et agissant, était conçu comme un dieu périodiquement absent, ou endormi, ou même momentanément mort comme dans les textes mythologiques d''Ougarit.'
  - type: text
    content: 'A midi, Elie se moqua d''eux ; il dit : Criez à pleine voix, puisqu''il est dieu ! Il doit penser à quelque chose, ou bien il est occupé, ou encore il est en voyage ; peut-être qu''il dort et qu''il va se réveiller ! '
  '28':
  - type: note
    content: 'ils se firent… des incisions  : cette pratique, qui est une cérémonie funèbre en l''honneur du Baal, est attestée dans les textes d''Ougarit : à l''occasion de la mort du Baal, le dieu El « fait résonner la forêt de ses clameurs, il se déchire les joues et le menton, il laboure l''articulation de son bras (l''épaule), sa poitrine comme un jardin. Il déchire son dos (y formant) comme une vallée, il élève la voix et crie… » Cf. Lv 19.28 ; Dt 14.1 ; voir aussi Jr 16.6 ; 41.5 ; 47.5 ; Os 7.14n  ; Mi 4.14n. –  selon leur règle  : le terme est traduit ailleurs par droit  ; il peut aussi avoir le sens de coutume  ; cf. Jg 13.12n.'
  - type: text
    content: 'Ils crièrent à pleine voix et ils se firent, selon leur règle, des incisions avec des épées et avec des lances, jusqu''à ce que le sang coule sur eux. '
  '29':
  - type: note
    content: 'ils se mirent à faire les prophètes  : cf. 1S 10.5n. –  à l''heure de la présentation de l''offrande  : litt. au (moment de) faire monter l''offrande (ou l''offrande végétale, cf. Lv 1.2n) ; cf. Ex 29.38-41 ; il s''agit ici de l’offrande du soir. Cf. v. 36. –  ni voix  : cf. 2R 4.31.'
  - type: text
    content: Lorsque midi fut passé, ils se mirent à faire les prophètes jusqu'à l'heure de la présentation de l'offrande. Mais il n'y eut ni voix, ni réponse, ni signe d'attention.
  '3':
  - type: note
    content: 'Abdias  : hébreu ‘Ovadyahou, Serviteur de YHWH. –  l''intendant de la maison 4.6n.'
  - type: text
    content: 'Achab fit appeler Abdias, l''intendant de la maison. – Or Abdias craignait beaucoup le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'restaurer  : le verbe hébreu est habituellement traduit par guérir . –  rasé  : sans doute par des Israélites partisans du culte du Baal.'
  - type: text
    content: 'Elie dit alors à tout le peuple : Approchez-vous de moi ! Tout le peuple s''approcha de lui. Alors Elie se mit à restaurer l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui avait été rasé. '
  '31':
  - type: note
    content: 'douze pierres  : cf. Ex 24.4 ; voir aussi Es 8.14 ; Jr 16.14s ; 31.1,31 ; Ez 37.16-19 etc. –  Ton nom sera Israël Gn 32.29 ; 35.10.'
  - type: text
    content: 'Elie prit douze pierres, d''après le nombre des tribus des fils de Jacob, à qui la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était parvenue en ces termes : « Ton nom sera Israël » ; '
  '32':
  - type: note
    content: 'un fossé  : le même terme est rendu par aqueduc en 2R 18.17 etc. ; cf. Ez 31.4n. –  deux séas  : environ 14 l ; voir mesures.'
  - type: text
    content: 'il bâtit avec ces pierres un autel au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il fit autour de l''autel un fossé de la capacité de deux séas de semence. '
  '33':
  - type: text
    content: 'Il disposa le bois, découpa le taureau et le mit sur le bois. '
  '34':
  - type: note
    content: 'Remplissez d''eau…  : ce détail semble augmenter la difficulté de l''épreuve et rendre ainsi la victoire de YHWH plus éclatante. –  holocauste  : voir sacrifices. –  sur le bois  : LXX ajoute et ils firent ainsi.'
  - type: text
    content: 'Puis il dit : Remplissez d''eau quatre cruches et versez-les sur l''holocauste et sur le bois. Il dit : Faites-le une deuxième fois. Ils le firent une deuxième fois. Il dit : Faites-le une troisième fois. Ils le firent une troisième fois. '
  '35':
  - type: text
    content: L'eau coula autour de l'autel ; on remplit aussi d'eau le fossé.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'la présentation de l''offrande v. 29n. –  Dieu d''Abraham, d''Isaac et d''Israël  : cf. 1Ch 29.18 ; 2Ch 30.6 ; voir aussi Ex 3.6,15s etc. –  que l''on sache aujourd''hui…  : cf. Ex 4.5 ; Nb 16.28. –  par ta parole  : cf. 13.1s,5,9,17s,32 ; 20.35 ; 1S 3.21.'
  - type: text
    content: 'Au moment de la présentation de l''offrande, Elie, le prophète, s''avança et dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), Dieu d''Abraham, d''Isaac et d''Israël, que l''on sache aujourd''hui que c''est toi qui es Dieu en Israël, que je suis ton serviteur et que c''est par ta parole que j''ai fait tout cela ! '
  '37':
  - type: note
    content: 'Réponds-moi, Seigneur, réponds-moi  : cf. Ps 13.4 ; 69.14 ; 86.1 ; 99.6 ; 118.5 ; 119.145 ; 143.7. –  ramènes leur cœur Ml 3.24 ; Lc 1.17.'
  - type: text
    content: 'Réponds-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', réponds-moi, afin que ce peuple sache que c''est toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui es Dieu, et que c''est toi qui ramènes leur cœur !'
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'le feu du Seigneur tomba  : cf. v. 24n  ; 1.10,12,14 ; Gn 19.24 ; Lv 9.24 ; Nb 11.1,3 ; Ez 38.22 ; Jb 1.16 ; voir aussi Jg 6.21. –  assécha  : litt. lécha.'
  - type: text
    content: 'Alors le feu du '
  - type: text
    content: Seigneur
  - type: text
    content: ' tomba ; il dévora l''holocauste, le bois, les pierres et la terre, et il assécha l''eau qui était dans le fossé. '
  '39':
  - type: note
    content: 'Cf. 1Co 14.25. –  C''est le Seigneur (YHWH) qui est Dieu  : cf. 8.60 ; Dt 4.35,39 ; 2Ch 33.13.'
  - type: text
    content: 'Quand tout le peuple vit cela, ils tombèrent face contre terre et dirent : C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est Dieu ! C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est Dieu ! '
  '4':
  - type: note
    content: 'Jézabel 16.31n. –  massacrait  : litt. retranchait  ; le même verbe est traduit par abattre au v. 5. –  prophètes… cachés…  : cf. v. 13 ; 2R 6.29n. –  nourris  : le verbe hébreu (le même au v. 13) a généralement été traduit par pourvoir à tous les besoins de, cf. 4.7 ; 17.4,9.'
  - type: text
    content: 'lorsque Jézabel massacrait les prophètes du '
  - type: text
    content: Seigneur
  - type: text
    content: ', Abdias avait pris cent prophètes, les avait cachés par cinquante dans deux grottes, et les avait nourris de pain et d''eau. – '
  '40':
  - type: note
    content: 'Cf. Dt 13.6. –  l''oued Qishôn  : au pied du Carmel, Jg 4.7n. Le massacre des prophètes du Baal met fin au désordre religieux et climatique (cf. 2S 21.1-14).'
  - type: text
    content: 'Elie leur dit : Saisissez les prophètes du Baal, qu''aucun d''eux n''échappe ! Ils les saisirent. Elie les fit descendre à l''oued Qishôn, où il les égorgea.'
  - type: heading
    content: Elie annonce le retour de la pluie
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Monte  : cf. v. 42,44. –  mange et bois  : le roi avait peut-être jeûné pour obtenir la pluie.'
  - type: text
    content: 'Elie dit à Achab : Monte, mange et bois ; ce grondement, c''est la pluie. '
  '42':
  - type: note
    content: 'se courbant  : le verbe hébreu correspondant n''apparaît qu''ici et en 2R 4.34ns.'
  - type: text
    content: 'Achab monta pour manger et pour boire. Mais Elie monta au sommet du Carmel et, se courbant jusqu''à terre, il mit son visage entre ses genoux '
  '43':
  - type: text
    content: 'et dit à son serviteur : Monte, je te prie, regarde du côté de la mer. Celui-ci monta, regarda et dit : Il n''y a rien. Sept fois, Elie lui dit : Retourne ! '
  '44':
  - type: text
    content: 'La septième fois, il dit : Un petit nuage s''élève de la mer, il est comme la main d''un homme. Elie dit : Monte dire à Achab : « Attelle et redescends, que la pluie ne t''arrête pas ! » '
  '45':
  - type: note
    content: 'De toutes parts  : litt. jusqu''ainsi et jusqu''ainsi, expression n''apparaissant qu''ici et diversement interprétée ; autres traductions peu à peu ; en quelques instants. –  de nuages…  : litt. de nuages et de vent. –  Jizréel  : ville située dans la plaine du même nom et qui sépare la Galilée de la Samarie ; cf. 21.1 ; 2R 8.29 ; 9.30.'
  - type: text
    content: 'De toutes parts le ciel devint noir de nuages, le vent se leva, et une forte pluie se mit à tomber. Achab monta sur son char et partit pour Jizréel. '
  '46':
  - type: note
    content: 'La main du Seigneur fut sur…  : cette expression décrit souvent l''action par laquelle la divinité « s''empare » d''un prophète pour le faire parler ou agir en son nom (cf. 2R 3.15 ; Ez 1.3 ; 3.22). –  passa une ceinture  : le terme hébreu correspondant n''apparaît qu''ici ; on repliait généralement à la ceinture les pans des vêtements amples avant de travailler, de se battre ou, comme ici, de courir. Voir aussi 2R 1.8 ; 4.29 ; 9.1. –  jusqu''à l''entrée de Jizréel  : soit 27 km depuis le mont Carmel.'
  - type: text
    content: 'La main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur Elie, qui passa une ceinture à ses reins et courut devant Achab jusqu''à l''entrée de Jizréel.'
  '5':
  - type: note
    content: 'Va  : LXX ajoute nous allons voyager. –  chevaux / mulets  : cf. 1.33 ; 2S 13.29 ; 18.9.'
  - type: text
    content: 'Achab dit à Abdias : Va par le pays, vers toutes les sources et vers tous les oueds ; peut-être y trouvera-t-on de l''herbe, de sorte que nous pourrons garder en vie les chevaux et les mulets : nous n''aurons pas besoin d''abattre des bêtes. '
  '6':
  - type: text
    content: Ils se partagèrent le pays pour le traverser ; Achab alla seul par un chemin, et Abdias alla seul par un autre chemin.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'tomba face contre terre  : c.-à-d. qu’ il se prosterna  ; de même au v. 39.'
  - type: text
    content: 'Comme Abdias était en chemin, Elie vint à sa rencontre. Abdias le reconnut, tomba face contre terre et dit : Est-ce bien toi, mon seigneur Elie ? '
  '8':
  - type: note
    content: 'J''ai trouvé Elie  : litt. voici Elie (de même dans la suite).'
  - type: text
    content: 'Il lui répondit : C''est moi ; va dire à ton seigneur : « J''ai trouvé Elie ! » '
  '9':
  - type: note
    content: livres Gn 9.2n.
  - type: text
    content: 'Alors Abdias dit : Quel péché ai-je commis, moi, ton serviteur, pour que tu me livres à Achab et qu''il me fasse mettre à mort ? '
