          text: 'au v. 5. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophètes
        - type: text
          text: … cachés…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 13 ; 2R 6.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nourris
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu (le même au v. 13) a généralement été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pourvoir à tous les besoins de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 4.7 ; 17.4,9.'
      marker-yv: yv-n
    - type: text
      text: 'lorsque Jézabel massacrait les prophètes du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Abdias avait pris cent prophètes, les avait cachés par cinquante dans deux grottes, et les avait nourris de pain et d''eau. – '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Dt 13.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'oued Qishôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au pied du Carmel, Jg 4.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: . Le massacre des prophètes du Baal met fin au désordre religieux et climatique (cf. 2S 21.1-14).
      marker-yv: yv-n
    - type: text
      text: 'Elie leur dit : Saisissez les prophètes du Baal, qu''aucun d''eux n''échappe ! Ils les saisirent. Elie les fit descendre à l''oued Qishôn, où il les égorgea.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elie annonce le retour de la pluie
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.41 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Monte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 42,44. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mange et bois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le roi avait peut-être jeûné pour obtenir la pluie.'
      marker-yv: yv-n
    - type: text
      text: 'Elie dit à Achab : Monte, mange et bois ; ce grondement, c''est la pluie. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.42 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se courbant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu correspondant n''apparaît qu''ici et en 2R 4.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: 'Achab monta pour manger et pour boire. Mais Elie monta au sommet du Carmel et, se courbant jusqu''à terre, il mit son visage entre ses genoux '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et dit à son serviteur : Monte, je te prie, regarde du côté de la mer. Celui-ci monta, regarda et dit : Il n''y a rien. Sept fois, Elie lui dit : Retourne ! '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La septième fois, il dit : Un petit nuage s''élève de la mer, il est comme la main d''un homme. Elie dit : Monte dire à Achab : « Attelle et redescends, que la pluie ne t''arrête pas ! » '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.45 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: De toutes parts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jusqu'ainsi et jusqu'ainsi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression n''apparaissant qu''ici et diversement interprétée ; autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: peu à peu ; en quelques instants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de nuages…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de nuages et de vent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jizréel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ville située dans la plaine du même nom et qui sépare la Galilée de la Samarie ; cf. 21.1 ; 2R 8.29 ; 9.30.'
      marker-yv: yv-n
    - type: text
      text: 'De toutes parts le ciel devint noir de nuages, le vent se leva, et une forte pluie se mit à tomber. Achab monta sur son char et partit pour Jizréel. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.46 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La main du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' fut sur…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette expression décrit souvent l''action par laquelle la divinité « s''empare » d''un prophète pour le faire parler ou agir en son nom (cf. 2R 3.15 ; Ez 1.3 ; 3.22). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: passa une ceinture
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant n''apparaît qu''ici ; on repliait généralement à la ceinture les pans des vêtements amples avant de travailler, de se battre ou, comme ici, de courir. Voir aussi 2R 1.8 ; 4.29 ; 9.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'à l'entrée de Jizréel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : soit 27 km depuis le mont Carmel.'
      marker-yv: yv-n
    - type: text
      text: 'La main du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fut sur Elie, qui passa une ceinture à ses reins et courut devant Achab jusqu''à l''entrée de Jizréel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Va
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous allons voyager
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chevaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mulets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.33 ; 2S 13.29 ; 18.9.'
      marker-yv: yv-n
    - type: text
      text: 'Achab dit à Abdias : Va par le pays, vers toutes les sources et vers tous les oueds ; peut-être y trouvera-t-on de l''herbe, de sorte que nous pourrons garder en vie les chevaux et les mulets : nous n''aurons pas besoin d''abattre des bêtes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils se partagèrent le pays pour le traverser ; Achab alla seul par un chemin, et Abdias alla seul par un autre chemin.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tomba face contre terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. qu’'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il se prosterna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; de même au v. 39.
      marker-yv: yv-n
    - type: text
      text: 'Comme Abdias était en chemin, Elie vint à sa rencontre. Abdias le reconnut, tomba face contre terre et dit : Est-ce bien toi, mon seigneur Elie ? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ai trouvé Elie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'voici Elie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (de même dans la suite).
      marker-yv: yv-n
    - type: text
      text: 'Il lui répondit : C''est moi ; va dire à ton seigneur : « J''ai trouvé Elie ! » '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'livres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 9.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Abdias dit : Quel péché ai-je commis, moi, ton serviteur, pour que tu me livres à Achab et qu''il me fasse mettre à mort ? '
