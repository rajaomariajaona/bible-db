      marker-yv: yv-n
    - type: text
      text: 'Ils prirent le taureau qu''on leur donna et le préparèrent ; et ils invoquèrent le nom du Baal, depuis le matin jusqu''à midi, en disant : Baal, réponds-nous ! Mais il n''y eut ni voix ni réponse. Et ils sautaient devant l''autel qu''on avait fait. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: peut-être qu'il dort et qu'il va se réveiller
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Baal
        - type: text
          text: ', contrairement à YHWH, vivant et toujours présent et agissant, était conçu comme un dieu périodiquement absent, ou endormi, ou même momentanément mort comme dans les textes mythologiques '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Ougarit
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'A midi, Elie se moqua d''eux ; il dit : Criez à pleine voix, puisqu''il est dieu ! Il doit penser à quelque chose, ou bien il est occupé, ou encore il est en voyage ; peut-être qu''il dort et qu''il va se réveiller ! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils se firent… des incisions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette pratique, qui est une cérémonie funèbre en l''honneur du Baal, est attestée dans les textes d''Ougarit : à l''occasion de la mort du Baal, le dieu El « fait résonner la forêt de ses clameurs, il se déchire les joues et le menton, il laboure l''articulation de son bras (l''épaule), sa poitrine comme un jardin. Il déchire son dos (y formant) comme une vallée, il élève la voix et crie… » Cf. Lv 19.28 ; Dt 14.1 ; voir aussi Jr 16.6 ; 41.5 ; 47.5 ; Os 7.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mi 4.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: selon leur règle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme est traduit ailleurs par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: droit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il peut aussi avoir le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: coutume
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jg 13.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils crièrent à pleine voix et ils se firent, selon leur règle, des incisions avec des épées et avec des lances, jusqu''à ce que le sang coule sur eux. '
