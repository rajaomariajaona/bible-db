document_id: 1KI.18,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elie et Abdias
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bien des jours s'écoulèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: après de nombreux jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la troisième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', après l''annonce de la sécheresse, 17.1 ; cf. Lc 4.25 ; Jc 5.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Achab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur la face du sol
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 2.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Bien des jours s''écoulèrent, et la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parvint à Elie, la troisième année : Va, parais devant Achab, et j''enverrai de la pluie sur la terre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, il n''est ni nation ni royaume où mon seigneur ne t''ait envoyé chercher ; et quand on disait que tu n''y étais pas, il faisait jurer au royaume ou à la nation en question que l''on ne t''avait pas trouvé. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant, toi, tu dis : « Va dire à ton seigneur : “J''ai trouvé Elie !” » '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: … t'emportera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2R 2.16 ; Ez 3.14 ; 8.3 ; 11.1 ; 43.5 ; Ac 8.39.'
      marker-yv: yv-n
    - type: text
      text: 'Puis, lorsque je t''aurai quitté, le souffle du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''emportera je ne sais où ; j''irai faire mon rapport à Achab, qui ne te trouvera pas et qui me tuera. Pourtant je crains le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' depuis ma jeunesse. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne Elie. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ai caché…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nourris '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne t''a-t-on pas rapporté, mon seigneur, ce que j''ai fait quand Jézabel tuait les prophètes du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ? J''ai caché cent prophètes du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', par cinquante dans deux grottes et je les ai nourris de pain et d''eau. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant, toi, tu dis : « Va dire à ton seigneur : “J''ai trouvé Elie !” » Il me tuera ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH) des Armées'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 1.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au service duquel je me tiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 17.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devant Achab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant lui.
      marker-yv: yv-n
    - type: text
      text: 'Mais Elie dit : Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, au service duquel je me tiens, aujourd''hui je paraîtrai devant Achab.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elie et Achab
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abdias alla à la rencontre d''Achab et lui fit son rapport. Alors Achab se rendit à la rencontre d''Elie. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toi qui attires le malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 34.30+ ; voir aussi Lc 23.2.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''il aperçut Elie, Achab lui dit : Est-ce toi qui attires le malheur sur Israël ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les commandements '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ') : absent de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu as suivi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.25s,30-33.'
      marker-yv: yv-n
    - type: text
      text: 'Elie répondit : Ce n''est pas moi qui attire le malheur sur Israël ; au contraire, c''est toi et la maison de ton père, puisque vous avez abandonné les commandements du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) et que tu as suivi les Baals. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mont Carmel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : massif montagneux de 552 m de haut, qui domine la ville moderne de Haïfa. Il a été un lieu de culte de toutes les religions qui se sont succédé dans le pays, et en particulier le culte du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Baal
        - type: text
          text: '. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Carmel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était aussi le nom d''une divinité de l''orage et de la pluie, comme Baal. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''Ashéra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 15.13+.
      marker-yv: yv-n
    - type: text
      text: Maintenant, fais rassembler tout Israël auprès de moi au mont Carmel, avec les quatre cent cinquante prophètes du Baal et les quatre cents prophètes de l'Ashéra qui mangent à la table de Jézabel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elie et les prophètes du Baal au Carmel
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Samarie
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Elie s'en alla pour paraître devant Achab.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La famine pressait Samarie. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des messagers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 19.'
      marker-yv: yv-n
    - type: text
      text: 'Achab envoya des messagers à tous les Israélites et il rassembla les prophètes au mont Carmel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2Co 6.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sauterez-vous d'un pied sur l'autre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; on a aussi compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à pieds joints ; sur des bâtons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sauter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduit le verbe hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pasah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui a donné '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Pésah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', la Pâque ; cf. Ex 12.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. L''expression traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sauter d''un pied sur l''autre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'se réfère sans doute aux danses sacrées du culte du Baal (voir v. 26). Elle a souvent été interprétée, dans la bouche d''Elie, comme une allusion ironique à l''hésitation d''Israël entre Dieu et le Baal, mais rien n''indique avec certitude qu''elle avait à l''origine ce sens en hébreu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Si c''est le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit surtout de savoir de quel dieu (ou Dieu) Israël est le peuple.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Elie s''approcha de tout le peuple et dit : Jusqu''à quand sauterez-vous d''un pied sur l''autre ? Si c''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) qui est Dieu, suivez-le ! Si c''est le Baal, suivez-le ! Le peuple ne lui répondit rien. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je suis resté moi seul
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : de même 19.10,14.'
      marker-yv: yv-n
    - type: text
      text: 'Elie dit au peuple : Je suis resté moi seul prophète du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), et il y a quatre cent cinquante prophètes du Baal. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'ils le découpent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 29.17 ; Lv 1.6,12 ; 8.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je le placerai sur le bois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : absent de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Que l''on nous donne deux taureaux ; qu''ils se choisissent un taureau, qu''ils le découpent et qu''ils le mettent sur le bois, sans y mettre le feu ; quant à moi, je préparerai l''autre taureau, et je le placerai sur le bois, sans y mettre le feu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par le feu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il faut sans doute comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'par la foudre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (l'un des attributs de Baal) ; cf. 1Ch 21.26. Il s'agit ici d'une sorte d'ordalie (Nb 5.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), où on en appelle aux dieux eux-mêmes pour trancher un litige religieux ; YHWH combat ici, en quelque sorte, sur le terrain de Baal, mais il s''en distinguera en 1R 19.11s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: D'accord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c''est une bonne chose ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c''est bien ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comme en 2.38,42 ; même expression hébraïque en Dt 1.14.
      marker-yv: yv-n
    - type: text
      text: 'Vous invoquerez le nom de votre dieu, et moi, j''invoquerai le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). Le dieu qui répondra par le feu, c''est celui-là qui sera Dieu ! Tout le peuple répondit : D''accord !'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elie dit aux prophètes du Baal : Choisissez-vous un taureau, préparez-le les premiers, car vous êtes les plus nombreux ; invoquez le nom de votre dieu, mais ne mettez pas le feu. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'on leur donna
      - type: usfm
        marker: ft
