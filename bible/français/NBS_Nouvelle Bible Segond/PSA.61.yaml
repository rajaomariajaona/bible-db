document_id: PSA.61,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Je voudrais être toujours dans ta tente
  - type: text
    content: ' '
  - type: note
    content: 'instruments…  : d''après plusieurs mss hébreux et versions anciennes (cf. 4.1+) ; d''autres mss ont le singulier (forme inhabituelle).'
  - type: text
    content: Du chef de chœur. Sur instruments à cordes. De David.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 5.2-3+ ; 17.1 ; 28.2 ; 54.4 ; 55.2s ; 64.2 ; 141.1.
  - type: text
    content: O Dieu, entends mon cri,
  - type: text
    content: sois attentif à ma prière !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Des extrémités  : litt. de l''extrémité  ; cf. 46.10 ; voir aussi 42.7 ; 84.3 ; 120.5 ; Es 41.9. –  je t''invoque ou je crie vers toi  ; cf. 3.5+. –  cœur défaillant 102.1 ; 142.4 ; 143.4 ; Jon 2.8. –  sur le rocher…  : cf. 27.5s ; voir aussi 18.3+.'
  - type: text
    content: Des extrémités de la terre je t'invoque, le cœur défaillant ;
  - type: text
    content: conduis-moi sur le rocher qui est trop élevé pour moi !
  '4':
  - type: text
    content: ' '
  - type: note
    content: abri 7.2+ ; 46.2. –  tour forte Pr 18.10.
  - type: text
    content: Car tu es pour moi un abri,
  - type: text
    content: une tour forte, en face de l'ennemi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 15.1 ; 17.8+ ; 23.6+ ; 27.4-5n  ; voir aussi Es 33.20. –  séjourner  : le verbe correspondant est apparenté au substantif rendu habituellement par immigré , cf. Ex 12.48n.'
  - type: text
    content: Je voudrais séjourner toujours dans ta tente,
  - type: text
    content: 'trouver un abri au secret de tes ailes. '
  - type: text
    content: Pause.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'tu donnes…  : ou, peut-être, tu me donnes , texte incertain ; plusieurs modifient le texte hébreu traditionnel pour lire tu donnes à ceux qui craignent ton nom ce qu''ils souhaitent (comme en 21.3) ; cf. Ap 11.18.'
  - type: text
    content: Car toi, ô Dieu, tu entends mes vœux,
  - type: text
    content: tu donnes ce que possèdent ceux qui craignent ton nom.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ajoute des jours… 21.5+. –  de génération en génération  : litt. comme génération et génération  ; cf. 89.30 ; 90.1.'
  - type: text
    content: Ajoute des jours aux jours du roi ;
  - type: text
    content: que ses années se prolongent de génération en génération !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'installé  : autre traduction assis  ; cf. 110.1 ; Es 16.5. –  fidélité / loyauté 25.10+ ; cf. 43.3 ; Pr 20.28.'
  - type: text
    content: Qu'il soit installé pour toujours devant Dieu !
  - type: text
    content: Fais que ta fidélité et ta loyauté le gardent !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 18.50 ; 145.1. –  je chanterai 7.18n. –  vœux 22.26+.
  - type: text
    content: Ainsi je chanterai ton nom sans cesse,
  - type: text
    content: je m'acquitterai de mes vœux jour après jour !
