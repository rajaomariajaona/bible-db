  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'or est terni !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'or pur est altéré !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pierres sacrées sont éparpillées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux coins de toutes les rues !
