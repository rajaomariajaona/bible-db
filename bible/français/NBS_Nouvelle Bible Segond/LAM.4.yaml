document_id: LAM.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: C'est la fin
  - type: text
    content: ' '
  - type: note
    content: 'Comment ! 1.1n  ; le quatrième poème a la même structure que le deuxième (cf. 2.1n). –  or / or pur  : cf. Pr 25.12. –  Les pierres sacrées ou les pierres du sanctuaire. –  aux coins… 2.19n.'
  - type: text
    content: Comment !
  - type: text
    content: L'or est terni !
  - type: text
    content: L'or pur est altéré !
  - type: text
    content: Les pierres sacrées sont éparpillées
  - type: text
    content: aux coins de toutes les rues !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.20+. –  désastre 2.11n. –  de la belle…  : litt. de la fille de mon peuple (cf. 1.6n).'
  - type: text
    content: Ces femmes, compatissantes, de leurs mains,
  - type: text
    content: ont fait cuire leurs enfants ;
  - type: text
    content: ils leur servent d'aliment
  - type: text
    content: dans le désastre de la belle, de mon peuple.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 1.12+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est allé jusqu''au bout de sa fureur,'
  - type: text
    content: il a répandu sa colère ardente ;
  - type: text
    content: il a mis dans Sion un feu
  - type: text
    content: qui en dévore les fondations.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Ils n''auraient pas cru…  : cf. Es 52.15–53.1. –  adversaire / ennemi 1.5n.'
  - type: text
    content: Ils n'auraient pas cru, les rois de la terre,
  - type: text
    content: ni tous les habitants du monde
  - type: text
    content: que l'adversaire, que l'ennemi entrerait
  - type: text
    content: par les portes de Jérusalem.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 5.31 ; 6.13 ; 23.11.
  - type: text
    content: A cause des péchés de ses prophètes,
  - type: text
    content: des fautes de ses prêtres
  - type: text
    content: qui ont répandu en son sein
  - type: text
    content: le sang des justes !
  '14':
  - type: text
    content: ' '
  - type: note
    content: aveugles 5.17. –  sang Nb 35.33 ; Es 59.3.
  - type: text
    content: Ils erraient comme des aveugles dans les rues,
  - type: text
    content: 'ils étaient souillés de sang :'
  - type: text
    content: on ne pouvait toucher leurs vêtements.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lv 13.45s ; Es 52.11. –  séjourneront  : le verbe ainsi traduit évoque habituellement le séjour de l''immigré, cf. Ex 12.48n.'
  - type: text
    content: « Ecartez-vous, impurs ! » leur criait-on.
  - type: text
    content: « Ecartez-vous, écartez-vous, ne touchez rien ! »
  - type: text
    content: 'Tandis qu''ils fuyaient, errants, on disait parmi les nations :'
  - type: text
    content: « Ils ne séjourneront pas plus longtemps ! »
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur lui-même  : litt. la face de YHWH  ; cf. Es 63.9n  ; ici expression de la colère de Dieu ; cf. Ps 34.17. –  on n''a pas eu de respect  : litt. ils n''ont pas élevé la face (des prêtres)  ; cf. Dt 28.50 ; voir aussi Gn 4.7n  ; 2R 3.14n. –  vieillards ou anciens 5.12,14.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui-même les a dispersés,'
  - type: text
    content: il ne les regarde plus ;
  - type: text
    content: on n'a pas eu de respect pour les prêtres,
  - type: text
    content: on n'a pas fait grâce aux vieillards.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Nos yeux… 2.11+. –  à nos postes de guet…  : autres traductions nous ne cessions de guetter, avec espoir nous guettions. –  une nation…  : l''Egypte ; cf. 1.19 ; 5.6 ; Es 18.1n  ; Jr 37.5-7 ; Ez 29.6-16.'
  - type: text
    content: Nos yeux s'épuisaient encore
  - type: text
    content: à attendre futilement le secours ;
  - type: text
    content: à nos postes de guet, nous guettions
  - type: text
    content: une nation qui ne nous a pas sauvés.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 7.1-14.
  - type: text
    content: On épiait nos pas,
  - type: text
    content: pour nous empêcher d'aller sur nos places ;
  - type: text
    content: notre fin approchait, nos jours étaient accomplis…
  - type: text
    content: Notre fin est arrivée !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'poursuivants ou persécuteurs , 1.3n. –  plus rapides que les aigles 2S 1.23 ; Jr 4.13. –  ils nous ont poursuivis  : même verbe Gn 31.36 ; 1S 17.53 ; cf. Ps 10.2.'
  - type: text
    content: Nos poursuivants étaient plus rapides
  - type: text
    content: que les aigles du ciel ;
  - type: text
    content: sur les montagnes ils nous ont poursuivis avec ardeur,
  - type: text
    content: ils nous ont tendu une embuscade dans le désert.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 19.10s ; 2Co 4.7.
  - type: text
    content: Les fils de Sion si précieux,
  - type: text
    content: qui valaient leur pesant d'or fin,
  - type: text
    content: – comment ! – on les considère comme des vases de terre,
  - type: text
    content: œuvre des mains du potier !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui était notre vie  : litt. le souffle de nos narines  ; cf. Gn 2.7 ; 6.17 ; 7.15. –  l''homme qui avait reçu l''onction du Seigneur  : il s''agit ici du roi (cf. 1S 2.10,35 ; 12.3,5 ; 24.5-8 ; Ps 2.2), sans doute Sédécias (voir 2R 25.4-7 ; Jr 52.6-11) ; cf. Os 10.3. –  a été capturé…  : d''autres comprennent est captif dans leurs oubliettes.'
  - type: text
    content: 'Celui qui était notre vie, l''homme qui avait reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: a été capturé dans leurs fosses,
  - type: text
    content: 'lui de qui nous disions :'
  - type: text
    content: A son ombre, nous vivrons parmi les nations.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'réjouis-toi  : cf. Es 66.10. –  Edom la belle (litt. fille d''Edom  ; cf. 1.6n), de même au v. 22 ; Es 34.5+ ; cf. Jr 49.8 ; Ez 25.14 ; Jl 4.19 ; Am 1.11 ; Ab. –  Outs  : voir Gn 10.23n  ; 36.28. –  la coupe Es 51.17 ; Jr 25.15-29 ; 49.12 ; 51.7 ; Ha 2.15s ; voir aussi Gn 9.20.'
  - type: text
    content: Egaie-toi, réjouis-toi, Edom la belle,
  - type: text
    content: habitante du pays d'Outs !
  - type: text
    content: A toi aussi on passera la coupe,
  - type: text
    content: tu t'enivreras et tu te mettras à nu.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Ta faute  : le terme hébreu peut désigner la faute elle-même ou ses conséquences, le châtiment. –  à son terme  : litt. parfaite, accomplie  ; cf. Es 40.2. –  Sion la belle / Edom la belle  : litt. fille de Sion / fille d''Edom  ; cf. v. 21n  ; 1.6n. –  exilera / mettra… à découvert  : deux formes du même verbe hébreu : cf. 2.14n. –  Il te fera rendre des comptes  : autres traductions te châtiera ; interviendra contre toi  ; sur le verbe hébreu correspondant, cf. Jr 6.15n.'
  - type: text
    content: Ta faute est à son terme, Sion la belle ;
  - type: text
    content: il ne t'exilera plus.
  - type: text
    content: Il te fera rendre des comptes pour ta faute, Edom la belle !
  - type: text
    content: Il mettra tes péchés à découvert.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'chacals Es 43.20. –  la belle…  : litt. la fille de mon peuple (cf. 1.6n). –  autruches  : cf. Jb 39.13-18.'
  - type: text
    content: Même les chacals présentent la mamelle
  - type: text
    content: et allaitent leurs petits ;
  - type: text
    content: mais la belle, mon peuple, est devenue cruelle
  - type: text
    content: comme les autruches du désert.
  '4':
  - type: text
    content: ' '
  - type: note
    content: soif Es 41.17.
  - type: text
    content: De soif, la langue du nourrisson
  - type: text
    content: s'attache à son palais ;
  - type: text
    content: les enfants demandent du pain,
  - type: text
    content: et personne ne leur en donne.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'l''écarlate , symbole de richesse, cf. Ex 25.4n. –  le fumier  : il s''agit ici de la décharge publique ; cf. 1S 2.8 ; Ps 113.7 ; Jb 2.8 ; Né 2.13.'
  - type: text
    content: Ceux qui se nourrissaient de mets délicats
  - type: text
    content: expirent dans les rues ;
  - type: text
    content: ceux qui étaient élevés dans l'écarlate
  - type: text
    content: étreignent le fumier.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 19.29 ; Es 1.9s ; Jr 23.14 ; Ez 16.46-52 ; Mt 10.15 ; 11.23s. –  de la belle…  : litt. de la fille de mon peuple (cf. 1.6n). –  Sodome Gn 18.20. –  détruite Gn 19.21+. –  sans que personne…  : litt. et des mains n''ont pas tourné ( ?) en elle  ; autre traduction sans que personne n''ait pu lui venir en aide.'
  - type: text
    content: La faute de la belle, de mon peuple, est plus grande
  - type: text
    content: que le péché de Sodome,
  - type: text
    content: qui fut détruite en un instant,
  - type: text
    content: sans que personne ait levé la main contre elle.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'nazirs  : autre traduction princes  ; cf. Gn 49.26n  ; Nb 6.2nss ; Jg 13.5ss. –  le corps  : le mot hébreu correspondant peut aussi être traduit par os. –  corail  : cf. Pr 3.15n. –  figure  : traduction incertaine ; le terme hébreu pourrait signifier contour , d''où apparence. –  lapis-lazuli Ex 24.10n  ; Ct 5.14.'
  - type: text
    content: Ses nazirs étaient plus purs que la neige,
  - type: text
    content: plus blancs que le lait ;
  - type: text
    content: ils avaient le corps plus vermeil que le corail ;
  - type: text
    content: leur figure était de lapis-lazuli.
  '8':
  - type: text
    content: Leur aspect est devenu plus sombre que le noir ;
  - type: text
    content: on ne les reconnaît pas dans les rues ;
  - type: text
    content: ils ont la peau collée sur les os,
  - type: text
    content: elle est devenue sèche comme du bois.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'ont eu plus de chance  : litt. ont été plus heureux. –  exténuées  : litt. transpercées , c.-à-d. blessées à mort ou, selon certains, diaphanes. –  produits des champs Dt 32.13.'
  - type: text
    content: Les victimes de l'épée ont eu plus de chance
  - type: text
    content: que les victimes de la faim,
  - type: text
    content: qui s'étiolent exténuées,
  - type: text
    content: privées des produits des champs.
