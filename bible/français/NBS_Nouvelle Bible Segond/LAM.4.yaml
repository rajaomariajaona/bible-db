      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils n'ont pas élevé la face (des prêtres)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Dt 28.50 ; voir aussi Gn 4.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 3.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vieillards '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'anciens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.12,14.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui-même les a dispersés,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne les regarde plus ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on n'a pas eu de respect pour les prêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on n'a pas fait grâce aux vieillards.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nos yeux… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à nos postes de guet…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nous ne cessions de guetter, avec espoir nous guettions. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une nation…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''Egypte ; cf. 1.19 ; 5.6 ; Es 18.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 37.5-7 ; Ez 29.6-16.'
      marker-yv: yv-n
    - type: text
      text: Nos yeux s'épuisaient encore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à attendre futilement le secours ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à nos postes de guet, nous guettions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une nation qui ne nous a pas sauvés.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ez 7.1-14.
      marker-yv: yv-n
    - type: text
      text: On épiait nos pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour nous empêcher d'aller sur nos places ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notre fin approchait, nos jours étaient accomplis…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre fin est arrivée !
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'poursuivants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: persécuteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'plus rapides que les aigles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2S 1.23 ; Jr 4.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils nous ont poursuivis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même verbe Gn 31.36 ; 1S 17.53 ; cf. Ps 10.2.'
      marker-yv: yv-n
    - type: text
      text: Nos poursuivants étaient plus rapides
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les aigles du ciel ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les montagnes ils nous ont poursuivis avec ardeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils nous ont tendu une embuscade dans le désert.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jr 19.10s ; 2Co 4.7.
      marker-yv: yv-n
    - type: text
      text: Les fils de Sion si précieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui valaient leur pesant d'or fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – comment ! – on les considère comme des vases de terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: œuvre des mains du potier !
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Celui qui était notre vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le souffle de nos narines
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Gn 2.7 ; 6.17 ; 7.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''homme qui avait reçu l''onction du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit ici du roi (cf. 1S 2.10,35 ; 12.3,5 ; 24.5-8 ; Ps 2.2), sans doute Sédécias (voir 2R 25.4-7 ; Jr 52.6-11) ; cf. Os 10.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a été capturé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''autres comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est captif dans leurs oubliettes.
      marker-yv: yv-n
    - type: text
