      marker-yv: yv-n
    - type: text
      text: Ces femmes, compatissantes, de leurs mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ont fait cuire leurs enfants ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils leur servent d'aliment
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le désastre de la belle, de mon peuple.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.12+.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est allé jusqu''au bout de sa fureur,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a répandu sa colère ardente ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a mis dans Sion un feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui en dévore les fondations.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils n'auraient pas cru…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 52.15–53.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'adversaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ennemi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Ils n'auraient pas cru, les rois de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni tous les habitants du monde
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l'adversaire, que l'ennemi entrerait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par les portes de Jérusalem.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jr 5.31 ; 6.13 ; 23.11.
      marker-yv: yv-n
    - type: text
      text: A cause des péchés de ses prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des fautes de ses prêtres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ont répandu en son sein
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le sang des justes !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aveugles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sang '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 35.33 ; Es 59.3.
      marker-yv: yv-n
    - type: text
      text: Ils erraient comme des aveugles dans les rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils étaient souillés de sang :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne pouvait toucher leurs vêtements.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lv 13.45s ; Es 52.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: séjourneront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe ainsi traduit évoque habituellement le séjour de l''immigré, cf. Ex 12.48'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: « Ecartez-vous, impurs ! » leur criait-on.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ecartez-vous, écartez-vous, ne touchez rien ! »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tandis qu''ils fuyaient, errants, on disait parmi les nations :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ils ne séjourneront pas plus longtemps ! »
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
