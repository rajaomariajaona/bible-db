document_id: 1SA.29,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Philistins renvoient David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs troupes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 28.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Apheq
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la source
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il pourrait s''agir de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la source de Harod
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jg 7.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jizréel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ville située dans la riche plaine du même nom, dans le nord du pays d''Israël ; cf. 25.43.'
      marker-yv: yv-n
    - type: text
      text: 'Les Philistins rassemblèrent toutes leurs troupes à Apheq, et Israël dressa son camp près de la source qui est à Jizréel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui sont venus avec toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX a conservé, après ces mots, un passage qui pourrait avoir figuré à l''origine dans le texte hébreu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et vous irez au lieu où je vous ai installés ; n''aie pas en ton cœur une pensée funeste, car tu es bon à mes yeux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu me plais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: A présent, lève-toi de bon matin, toi et les hommes de ton maître qui sont venus avec toi ; levez-vous de bon matin et partez dès qu'il fera jour.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Jizréel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 1.'
      marker-yv: yv-n
    - type: text
      text: David et ses hommes se levèrent de bonne heure pour partir dès le matin et retourner au pays des Philistins ; quant aux Philistins, ils montèrent à Jizréel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les princes de la confédération
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.8 ; 6.4 ; 7.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs centaines et leurs milliers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leurs compagnies et leurs régiments
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'arrière-garde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en arrière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Akish
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 28.1s.'
      marker-yv: yv-n
    - type: text
      text: 'Les princes de la confédération des Philistins avancèrent avec leurs centaines et leurs milliers, et David et ses hommes avançaient à l''arrière-garde avec Akish. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les chefs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : militaires. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ces Hébreux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis des jours et des années
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'depuis un an ou deux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(sur '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '= '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un an
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 27.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: depuis des jours, c'est la deuxième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à lui reprocher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contre lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis son arrivée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: depuis le jour où il est descendu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cette expression fait allusion à la défection de David à l''égard de Saül et à son ralliement sous l''autorité d''Akish.'
      marker-yv: yv-n
    - type: text
      text: 'Les chefs des Philistins dirent : Qu''est-ce que ces Hébreux ? Et Akish répondit aux chefs des Philistins : C''est David, qui était au service de Saül, roi d''Israël. Il est avec moi depuis des jours et des années, et je n''ai rien trouvé à lui reprocher depuis son arrivée jusqu''à ce jour. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au lieu que tu lui as fixé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'endroit où tu lui as permis de s'installer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à Tsiqlag
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 27.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un adversaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant (cf. Nb 22.22,32 ; 1R 11.14,23 ; Jb 1.6s) a donné le nom Satan ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: démon
        - type: text
          text: ', diable, Satan. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au prix des têtes de nos hommes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ces hommes-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : la position de David, au cœur de l''armée philistine, lui permettrait de trahir ses compagnons pour regagner la faveur de Saül.'
      marker-yv: yv-n
    - type: text
      text: 'Mais les chefs des Philistins s''irritèrent contre Akish et lui dirent : Renvoie cet homme, et qu''il retourne au lieu que tu lui as fixé ; qu''il ne descende pas avec nous au combat, afin qu''il ne devienne pas pour nous un adversaire pendant le combat ! Comment cet homme regagnerait-il la faveur de son seigneur, sinon au prix des têtes de nos hommes ? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 18.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'N''est-ce pas ce David pour qui l''on chantait en dansant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saül a abattu ses milliers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et David ses dizaines de milliers !
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 14.39'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cette formule est surprenante dans la bouche du roi philistin. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: partir en campagne…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 8.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Akish appela David et lui dit : Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', tu es un homme droit, et cela me plaît de te voir partir en campagne et revenir au camp avec moi, car je n''ai rien trouvé de mauvais en toi depuis ta venue auprès de moi jusqu''à ce jour, mais tu ne plais pas aux princes de la confédération. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 10.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2S 15.9.'
      marker-yv: yv-n
    - type: text
      text: 'A présent, retourne et va en paix, pour ne rien faire qui déplaise aux princes de la confédération des Philistins. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les ennemis de mon seigneur le roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette expression signifie naturellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tes ennemis, ô roi, mon seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais David pourrait entretenir ici une ambiguïté volontaire en pensant aux '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ennemis de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Saül ; comparer avec 28.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David dit à Akish : Mais qu''ai-je fait, et qu''as-tu trouvé en moi, ton serviteur, depuis que je suis auprès de toi jusqu''à ce jour, pour que je n''aille pas combattre les ennemis de mon seigneur le roi ? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un messager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 14.17,20 ; 19.28. L''expression élogieuse répond à la désignation de David comme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'adversaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 4.
      marker-yv: yv-n
    - type: text
      text: 'Akish répondit à David : Je le sais, car tu me plais autant qu''un messager de Dieu ; mais les chefs des Philistins ont dit : « Il ne montera pas avec nous au combat ! » '
