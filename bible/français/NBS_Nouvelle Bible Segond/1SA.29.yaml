document_id: 1SA.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Philistins renvoient David
  - type: text
    content: ' '
  - type: note
    content: 'leurs troupes  : cf. 28.1n. –  Apheq  : cf. 4.1n. –  la source  : il pourrait s''agir de la source de Harod , cf. Jg 7.1n. –  Jizréel  : ville située dans la riche plaine du même nom, dans le nord du pays d''Israël ; cf. 25.43.'
  - type: text
    content: 'Les Philistins rassemblèrent toutes leurs troupes à Apheq, et Israël dressa son camp près de la source qui est à Jizréel. '
  '10':
  - type: note
    content: 'qui sont venus avec toi  : LXX a conservé, après ces mots, un passage qui pourrait avoir figuré à l''origine dans le texte hébreu  : et vous irez au lieu où je vous ai installés ; n''aie pas en ton cœur une pensée funeste, car tu es bon à mes yeux (c.-à-d. tu me plais).'
  - type: text
    content: A présent, lève-toi de bon matin, toi et les hommes de ton maître qui sont venus avec toi ; levez-vous de bon matin et partez dès qu'il fera jour.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'à Jizréel  : cf. v. 1.'
  - type: text
    content: David et ses hommes se levèrent de bonne heure pour partir dès le matin et retourner au pays des Philistins ; quant aux Philistins, ils montèrent à Jizréel.
  '2':
  - type: note
    content: 'Les princes de la confédération  : cf. 5.8 ; 6.4 ; 7.7. –  leurs centaines et leurs milliers, c.-à-d. leurs compagnies et leurs régiments. –  à l''arrière-garde  : litt. en arrière. –  Akish  : cf. 28.1s.'
  - type: text
    content: 'Les princes de la confédération des Philistins avancèrent avec leurs centaines et leurs milliers, et David et ses hommes avançaient à l''arrière-garde avec Akish. '
  '3':
  - type: note
    content: 'Les chefs  : militaires. –  ces Hébreux  : cf. 4.6n. –  depuis des jours et des années  : autre traduction depuis un an ou deux (sur des jours = un an, cf. 1.21n  ; 27.7n) ; LXX depuis des jours, c''est la deuxième année. –  à lui reprocher  : litt. en lui ou contre lui. –  depuis son arrivée  : litt. depuis le jour où il est descendu  ; cette expression fait allusion à la défection de David à l''égard de Saül et à son ralliement sous l''autorité d''Akish.'
  - type: text
    content: 'Les chefs des Philistins dirent : Qu''est-ce que ces Hébreux ? Et Akish répondit aux chefs des Philistins : C''est David, qui était au service de Saül, roi d''Israël. Il est avec moi depuis des jours et des années, et je n''ai rien trouvé à lui reprocher depuis son arrivée jusqu''à ce jour. '
  '4':
  - type: note
    content: 'au lieu que tu lui as fixé ou à l''endroit où tu lui as permis de s''installer, c.-à-d. à Tsiqlag, cf. 27.6n. –  un adversaire  : le mot hébreu correspondant (cf. Nb 22.22,32 ; 1R 11.14,23 ; Jb 1.6s) a donné le nom Satan ; voir démon, diable, Satan. –  au prix des têtes de nos hommes (litt. de ces hommes-là) : la position de David, au cœur de l''armée philistine, lui permettrait de trahir ses compagnons pour regagner la faveur de Saül.'
  - type: text
    content: 'Mais les chefs des Philistins s''irritèrent contre Akish et lui dirent : Renvoie cet homme, et qu''il retourne au lieu que tu lui as fixé ; qu''il ne descende pas avec nous au combat, afin qu''il ne devienne pas pour nous un adversaire pendant le combat ! Comment cet homme regagnerait-il la faveur de son seigneur, sinon au prix des têtes de nos hommes ? '
  '5':
  - type: note
    content: Cf. 18.7n.
  - type: text
    content: 'N''est-ce pas ce David pour qui l''on chantait en dansant :'
  - type: text
    content: Saül a abattu ses milliers
  - type: text
    content: et David ses dizaines de milliers !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Par la vie du Seigneur  : cf. 14.39n  ; cette formule est surprenante dans la bouche du roi philistin. –  partir en campagne…  : cf. 8.20n  ; 18.5n,6n.'
  - type: text
    content: 'Akish appela David et lui dit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es un homme droit, et cela me plaît de te voir partir en campagne et revenir au camp avec moi, car je n''ai rien trouvé de mauvais en toi depuis ta venue auprès de moi jusqu''à ce jour, mais tu ne plais pas aux princes de la confédération. '
  '7':
  - type: note
    content: en paix Jos 10.21n  ; 2S 15.9.
  - type: text
    content: 'A présent, retourne et va en paix, pour ne rien faire qui déplaise aux princes de la confédération des Philistins. '
  '8':
  - type: note
    content: 'les ennemis de mon seigneur le roi  : cette expression signifie naturellement tes ennemis, ô roi, mon seigneur, mais David pourrait entretenir ici une ambiguïté volontaire en pensant aux ennemis de Saül ; comparer avec 28.2n.'
  - type: text
    content: 'David dit à Akish : Mais qu''ai-je fait, et qu''as-tu trouvé en moi, ton serviteur, depuis que je suis auprès de toi jusqu''à ce jour, pour que je n''aille pas combattre les ennemis de mon seigneur le roi ? '
  '9':
  - type: note
    content: 'un messager (ou un ange) de Dieu  : cf. 2S 14.17,20 ; 19.28. L''expression élogieuse répond à la désignation de David comme adversaire au v. 4.'
  - type: text
    content: 'Akish répondit à David : Je le sais, car tu me plais autant qu''un messager de Dieu ; mais les chefs des Philistins ont dit : « Il ne montera pas avec nous au combat ! » '
