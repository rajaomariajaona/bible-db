document_id: PSA.10,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.1n. –  Pourquoi… 22.2 ; 42.10 ; 74.1 ; Ha 1.3+. –  te caches-tu  : cf. 55.2n. –  temps de détresse 9.10+.'
  - type: text
    content: 'Pourquoi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', te tiens-tu si loin ?'
  - type: text
    content: Pourquoi te caches-tu dans les temps de détresse ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. –  Il se courbe…  : traduction incertaine ; on a aussi compris écrasés, jetés à terre, les faibles tombent…  ; LXX il tombera au moment même où il s''emparera des faibles.'
  - type: text
    content: Il se courbe, il se baisse,
  - type: text
    content: et les pauvres tombent en son pouvoir.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 44.25 ; 73.11 ; 74.23 ; 94.7 ; Ez 8.12 ; 9.9 ; Jb 22.13. –  Dieu  : hébreu ’El , de même au v. 12 ; cf. Gn 21.33n. –  Il se détourne  : litt. il cache sa face  ; cf. 13.2+.'
  - type: text
    content: 'Il se dit : Dieu oublie !'
  - type: text
    content: Il se détourne, il ne regarde jamais !
  '12':
  - type: text
    content: ' '
  - type: note
    content: Lève-toi 3.8+ ; 9.20. –  les affligés ou les humbles  ; le terme correspondant est apparenté au mot habituellement traduit par pauvre (cf. v. 9ss,17 ; 9.13n).
  - type: text
    content: 'Lève-toi, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Dieu, élève ta main !
  - type: text
    content: N'oublie pas les affligés !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Tu ne punis pas  : litt. tu ne cherches pas  ; cf. v. 4,15n.'
  - type: text
    content: Pourquoi le méchant bafoue-t-il Dieu ?
  - type: text
    content: 'Pourquoi se dit-il : Tu ne punis pas ?'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction possible  : Tu as vu (cf. v. 11,13 ; 31.8 ; Gn 31.42 ; Ex 3.7) , car tu regardes l''oppression et la contrariété, pour prendre en main (ou pour donner de ta main ). –  orphelin v. 18+.'
  - type: text
    content: Tu as vu, quant à toi, l'oppression et la contrariété ;
  - type: text
    content: tu regardes pour prendre en main ;
  - type: text
    content: c'est à toi que s'abandonne le faible,
  - type: text
    content: c'est toi qui viens au secours de l'orphelin.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Brise… 37.17. –  punis…  : autre traduction tu chercheras sa méchanceté sans la retrouver  ; autre lecture possible qu''on cherche sa méchanceté sans la retrouver ! cf. Jr 50.20.'
  - type: text
    content: Brise le bras du méchant, du mauvais,
  - type: text
    content: punis sa méchanceté, que tu ne la trouves plus !
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.6,8 ; 29.10 ; 145.13 ; 146.10 ; Ex 15.18s ; Ap 11.15. –  les nations… , c.-à-d. les non-Israélites ; autre traduction les autres nations disparaissent de sa terre.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est roi pour toujours, à jamais ;'
  - type: text
    content: les nations disparaissent de son pays.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'affligés  : cf. v. 12 ; 9.13n. – Voir cœur.'
  - type: text
    content: 'Tu entends le désir des affligés, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: tu affermis leur cœur ; tu prêtes une oreille attentive
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'rendre justice… 72.4 ; 82.3 ; 103.6 ; 140.13 ; 146.7 ; Dt 10.18 ; Es 1.17 ; Jr 5.28 ; Jb 36.6. –  écrasé  : cf. 9.10. –  que l''homme… ou qu''on ne continue plus à faire trembler d''effroi l''homme tiré de la terre.'
  - type: text
    content: pour rendre justice à l'orphelin, à celui qui est écrasé,
  - type: text
    content: afin que l'homme tiré de la terre ne continue plus à faire trembler d'effroi.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 2-4 sont obscurs et ne correspondent plus clairement à une structure alphabétique (9.1n). –  Les méchants…  : litt. le méchant… poursuit (ou brûle , cf. Ps 7.14 ; le même verbe est traduit par poursuivre en Gn 31.36) le pauvre  ; dans le second vers les verbes sont au pluriel. –  ils sont pris…  : ou bien les pauvres (9.13n) sont victimes des intrigues des méchants , ou bien les méchants seront victimes de leurs propres intrigues (cf. v. 4n).'
  - type: text
    content: Les méchants dans leur orgueil poursuivent les pauvres,
  - type: text
    content: ils sont pris dans les intrigues qu'ils ont montées.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'de ce qu''il désire  : litt. du désir de son être (6.4n) ; on pourrait aussi comprendre de parvenir à ses fins  ; cf. Ez 33.31 ; 2P 2.14. –  maudit  : litt. bénit , sans doute par euphémisme pour ne pas écrire maudire Dieu (1R 21.10n,13 ; Jb 1.5n,11 ; 2.5,9). –  bafoue le Seigneur  : cf. 74.10,18.'
  - type: text
    content: Car le méchant est fier de ce qu'il désire,
  - type: text
    content: 'le profiteur maudit et bafoue le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Le méchant dit…  : traduction conjecturale ; litt. le méchant, selon la hauteur de son nez (ou de sa colère ) , il ne cherche pas  ; cf. v. 13,15n  ; 9.13n  ; 36.2s. –  pas de Dieu ! cf. v. 11,13 ; 14.1 ; Jr 5.12 ; So 1.12 ; Tt 1.16 ; 4 Esdras 7.22s : « Ils ont pris pour règle la vanité de leurs pensées et ils se sont proposé de coupables erreurs. Ils ont affirmé que le Très-Haut n''existait pas et ils ont ignoré ses voies. » 8.58 : « Ils ont dit dans leurs cœurs qu''il n''y avait pas de Dieu, en sachant pourtant bien qu''ils étaient mortels. » –  toute son astuce ou toutes ses intrigues , même mot v. 2.'
  - type: text
    content: 'Le méchant dit avec arrogance : Il ne punit pas !'
  - type: text
    content: Il n'y a pas de Dieu ! – Voilà toute son astuce.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ses voies réussissent  : cf. 73.4-12. –  souffle  : cf. 12.6.'
  - type: text
    content: Ses voies réussissent en tout temps ;
  - type: text
    content: tes jugements sont trop hauts pour l'atteindre,
  - type: text
    content: tous ses adversaires, il leur souffle dessus.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Je ne vacillerai pas 30.7+. –  je serai à l''abri du malheur  : sens probable d''un texte hébreu incertain (voir aussi v. 7n).'
  - type: text
    content: 'Il se dit : Je ne vacillerai pas,'
  - type: text
    content: de génération en génération, je serai à l'abri du malheur !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 3.14. –  de malédictions  : autre traduction d''adjurations  ; sur le terme hébreu correspondant, que certains rattachent au v. 6 pour rétablir la structure originelle du psaume (9.1n), cf. 59.13 ; Gn 24.41n  ; Lv 5.1n  ; Nb 5.21n  ; Jb 31.30. –  oppression / mal  : cf. 7.15+.'
  - type: text
    content: Sa bouche est pleine de malédictions, de tromperies et de violences ;
  - type: text
    content: il y a sous sa langue l'oppression et le mal.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '37.32. –  dans son repaire  : litt. dans des cachettes (même terme, au singulier, au v. 9) ; autre traduction dans un lieu retiré  ; cf. 17.12 ; 64.5 ; Ha 3.14 ; Lm 3.10. –  le faible  : le terme hébreu correspondant n''apparaît qu''ici et, sous une autre forme, aux v. 10,14.'
  - type: text
    content: Il se tient en embuscade près des villages,
  - type: text
    content: il tue l'innocent dans son repaire ;
  - type: text
    content: ses yeux épient le faible.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 64.3-7 ; 140.6 ; Jr 5.26 ; Os 6.9. –  comme le lion 7.3+ ; cf. 17.12. –  sa tanière 27.5n  ; Jr 25.38. –  dans son filet 9.16+.
  - type: text
    content: Il est en embuscade dans son repaire, comme le lion dans sa tanière,
  - type: text
    content: il est en embuscade pour surprendre le pauvre ;
  - type: text
    content: il surprend le pauvre en l'entraînant dans son filet.
