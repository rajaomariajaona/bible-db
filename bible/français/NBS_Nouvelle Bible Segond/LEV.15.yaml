document_id: LEV.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Impuretés sexuelles de l'homme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse et à Aaron : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un écoulement génital
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un écoulement dans sa '
      - type: usfm
        marker: w
        children:
        - type: text
          text: chair
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ici euphémisme pour les organes génitaux (cf. v. 7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 6.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; le terme hébreu s'applique aussi bien (v. 32s) à un écoulement pathologique (v. 2-15) qu'à une activité sexuelle normale (v. 16-30) ; voir aussi 22.4 ; Nb 5.2 ; 2S 3.29.
    marker-yv: yv-n
  - type: text
    text: 'Dites aux Israélites : Tout homme atteint d''un écoulement génital est impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici en quoi consiste l''impureté liée à son écoulement – que sa chair le laisse couler, ou qu''elle le retienne, telle est son impureté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tout lit sur lequel se couche celui qui est atteint d''un écoulement sera impur, et tout objet sur lequel il s''assied sera impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se lavera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Hé 9.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jusqu''au soir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.46+.
    marker-yv: yv-n
  - type: text
    text: 'Celui qui touche son lit lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quiconque s''assied sur l''objet sur lequel s''est assis celui qui est atteint d''un écoulement lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le corps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la chair '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), de même dans la suite.
    marker-yv: yv-n
  - type: text
    text: 'Quiconque touche le corps de celui qui est atteint d''un écoulement lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si celui qui est atteint d''un écoulement crache sur un homme pur, celui-ci lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Toute selle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout siège (de char)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même terme en Ct 3.10.'
    marker-yv: yv-n
  - type: text
    text: 'Toute selle sur laquelle est monté celui qui est atteint d''un écoulement sera impure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quiconque touche une chose qui a été sous lui, quelle qu''elle soit, sera impur jusqu''au soir ; celui qui porte de telles choses lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quiconque est touché par celui qui est atteint d''un écoulement et ne s''est pas rincé les mains avec de l''eau lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le récipient de terre qu'a touché celui qui est atteint d'un écoulement, on le brisera ; tout récipient de bois, on le rincera avec de l'eau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'eau vive '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.5.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque celui qui est atteint d''un écoulement sera purifié de son écoulement, il comptera sept jours pour sa purification ; il lavera ses vêtements, il lavera son corps avec de l''eau vive, et il sera pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le huitième jour, il prendra deux tourterelles ou deux colombes ; il viendra devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', à l''entrée de la tente de la Rencontre, et il les donnera au prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifice
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: expiation
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre en offrira une en sacrifice pour le péché, et l''autre en holocauste ; le prêtre fera sur lui, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', l''expiation de son écoulement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 32 ; 22.4 ; cf. Dt 23.11s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de semence
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de sperme.
    marker-yv: yv-n
  - type: text
    text: 'L''homme qui a un épanchement de semence lavera tout son corps avec de l''eau et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tout vêtement et toute peau atteints par la semence seront lavés avec de l''eau et seront impurs jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ex 19.15 ; 1S 21.5s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des rapports sexuels
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la formule hébraïque reprend le terme traduit dans les v. 16s par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'semence '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: épanchement de semence
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même en 19.20 ; Nb 5.13.'
    marker-yv: yv-n
  - type: text
    text: Lorsqu'un homme a des rapports sexuels avec une femme, ils se laveront avec de l'eau et seront impurs jusqu'au soir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Impuretés sexuelles de la femme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.2+ ; cf. 2S 11.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'souillure menstruelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'La femme qui a un écoulement de sang restera sept jours dans sa souillure menstruelle. Quiconque la touche sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Gn 31.34s.
    marker-yv: yv-n
  - type: text
    text: 'Tout lit sur lequel elle se couche pendant sa souillure menstruelle sera impur, et toute chose sur laquelle elle s''assied sera impure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quiconque touche son lit lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Quiconque touche un objet sur lequel elle s''est assise lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'S''il y a quelque chose sur le lit ou sur l''objet sur lequel elle s''est assise, en y touchant on se rendra impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.19+.
    marker-yv: yv-n
  - type: text
    text: Si un homme couche avec elle et que sa souillure menstruelle vienne sur lui, il sera impur pendant sept jours ; tout lit sur lequel il se couchera sera impur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 12.2 ; Mt 9.20/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plusieurs jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de nombreux jours.
    marker-yv: yv-n
  - type: text
    text: 'La femme qui est atteinte d''un écoulement de sang pendant plusieurs jours en dehors du temps de sa souillure menstruelle, ou celle dont l''écoulement dure au-delà de sa souillure menstruelle, sera impure tous les jours de son écoulement impur, comme les jours de sa souillure menstruelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 12.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout lit sur lequel elle se couche pendant la durée de cet écoulement sera comme le lit de sa souillure menstruelle, et tout objet sur lequel elle s''assied sera impur de la même impureté que celle de sa souillure menstruelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quiconque y touche sera impur ; celui-ci lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Si elle est purifée de son écoulement, elle comptera sept jours ; ensuite elle sera pure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le huitième jour, elle prendra deux tourterelles ou deux colombes, et elle les apportera au prêtre, à l''entrée de la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifice
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de son écoulement impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de l'écoulement de son impureté.
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre en offrira une en sacrifice pour le péché, et l''autre en holocauste ; le prêtre fera sur elle, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', l''expiation de son écoulement impur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se tiennent à l'écart
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe hébreu est apparenté au terme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nazir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 21.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 22.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 25.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 6 ; Ez 14.7 ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous tiendrez les Israélites à l'écart de leurs impuretés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous mettrez les Israélites en garde contre leurs impuretés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ma demeure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 26.11s ; Ex 25.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 5.3 ; Ez 37.27 ; 43.9 ; 2Co 6.16 ; Ap 21.3.'
    marker-yv: yv-n
  - type: text
    text: 'Vous ferez en sorte que les Israélites se tiennent à l''écart quand ils sont en état d''impureté : ainsi ils ne mourront pas à cause de leurs impuretés, en rendant impure ma demeure, qui est au milieu d''eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
