document_id: LEV.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Impuretés sexuelles de l'homme
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '10':
  - type: text
    content: 'Quiconque touche une chose qui a été sous lui, quelle qu''elle soit, sera impur jusqu''au soir ; celui qui porte de telles choses lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  '11':
  - type: text
    content: 'Quiconque est touché par celui qui est atteint d''un écoulement et ne s''est pas rincé les mains avec de l''eau lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  '12':
  - type: text
    content: Le récipient de terre qu'a touché celui qui est atteint d'un écoulement, on le brisera ; tout récipient de bois, on le rincera avec de l'eau.
  '13':
  - type: text
    content: ' '
  - type: note
    content: eau vive 14.5.
  - type: text
    content: 'Lorsque celui qui est atteint d''un écoulement sera purifié de son écoulement, il comptera sept jours pour sa purification ; il lavera ses vêtements, il lavera son corps avec de l''eau vive, et il sera pur. '
  '14':
  - type: note
    content: Voir prêtre.
  - type: text
    content: 'Le huitième jour, il prendra deux tourterelles ou deux colombes ; il viendra devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', à l''entrée de la tente de la Rencontre, et il les donnera au prêtre. '
  '15':
  - type: note
    content: Voir sacrifice et expiation.
  - type: text
    content: 'Le prêtre en offrira une en sacrifice pour le péché, et l''autre en holocauste ; le prêtre fera sur lui, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', l''expiation de son écoulement.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: V. 32 ; 22.4 ; cf. Dt 23.11s. –  de semence , c.-à-d. de sperme.
  - type: text
    content: 'L''homme qui a un épanchement de semence lavera tout son corps avec de l''eau et sera impur jusqu''au soir. '
  '17':
  - type: text
    content: 'Tout vêtement et toute peau atteints par la semence seront lavés avec de l''eau et seront impurs jusqu''au soir. '
  '18':
  - type: note
    content: 'Cf. Ex 19.15 ; 1S 21.5s. –  des rapports sexuels  : la formule hébraïque reprend le terme traduit dans les v. 16s par semence ou épanchement de semence  ; de même en 19.20 ; Nb 5.13.'
  - type: text
    content: Lorsqu'un homme a des rapports sexuels avec une femme, ils se laveront avec de l'eau et seront impurs jusqu'au soir.
  - type: heading
    content: Impuretés sexuelles de la femme
  '19':
  - type: text
    content: ' '
  - type: note
    content: 12.2+ ; cf. 2S 11.4. –  souillure menstruelle 12.2n.
  - type: text
    content: 'La femme qui a un écoulement de sang restera sept jours dans sa souillure menstruelle. Quiconque la touche sera impur jusqu''au soir. '
  '2':
  - type: note
    content: 'un écoulement génital  : litt. un écoulement dans sa chair, ici euphémisme pour les organes génitaux (cf. v. 7n  ; 6.3n) ; le terme hébreu s''applique aussi bien (v. 32s) à un écoulement pathologique (v. 2-15) qu''à une activité sexuelle normale (v. 16-30) ; voir aussi 22.4 ; Nb 5.2 ; 2S 3.29.'
  - type: text
    content: 'Dites aux Israélites : Tout homme atteint d''un écoulement génital est impur. '
  '20':
  - type: note
    content: Cf. Gn 31.34s.
  - type: text
    content: 'Tout lit sur lequel elle se couche pendant sa souillure menstruelle sera impur, et toute chose sur laquelle elle s''assied sera impure. '
  '21':
  - type: text
    content: 'Quiconque touche son lit lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  '22':
  - type: text
    content: 'Quiconque touche un objet sur lequel elle s''est assise lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  '23':
  - type: text
    content: 'S''il y a quelque chose sur le lit ou sur l''objet sur lequel elle s''est assise, en y touchant on se rendra impur jusqu''au soir. '
  '24':
  - type: note
    content: 18.19+.
  - type: text
    content: Si un homme couche avec elle et que sa souillure menstruelle vienne sur lui, il sera impur pendant sept jours ; tout lit sur lequel il se couchera sera impur.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 12.2 ; Mt 9.20/ /. –  plusieurs jours  : autre traduction de nombreux jours.'
  - type: text
    content: 'La femme qui est atteinte d''un écoulement de sang pendant plusieurs jours en dehors du temps de sa souillure menstruelle, ou celle dont l''écoulement dure au-delà de sa souillure menstruelle, sera impure tous les jours de son écoulement impur, comme les jours de sa souillure menstruelle. '
  '26':
  - type: note
    content: Cf. 12.2n.
  - type: text
    content: 'Tout lit sur lequel elle se couche pendant la durée de cet écoulement sera comme le lit de sa souillure menstruelle, et tout objet sur lequel elle s''assied sera impur de la même impureté que celle de sa souillure menstruelle. '
  '27':
  - type: text
    content: 'Quiconque y touche sera impur ; celui-ci lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  '28':
  - type: text
    content: 'Si elle est purifée de son écoulement, elle comptera sept jours ; ensuite elle sera pure. '
  '29':
  - type: note
    content: Voir prêtre.
  - type: text
    content: 'Le huitième jour, elle prendra deux tourterelles ou deux colombes, et elle les apportera au prêtre, à l''entrée de la tente de la Rencontre. '
  '3':
  - type: text
    content: 'Voici en quoi consiste l''impureté liée à son écoulement – que sa chair le laisse couler, ou qu''elle le retienne, telle est son impureté. '
  '30':
  - type: note
    content: 'Voir sacrifice. –  de son écoulement impur  : litt. de l''écoulement de son impureté.'
  - type: text
    content: 'Le prêtre en offrira une en sacrifice pour le péché, et l''autre en holocauste ; le prêtre fera sur elle, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', l''expiation de son écoulement impur.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'se tiennent à l''écart  : le verbe hébreu est apparenté au terme nazir , cf. 21.12n  ; 22.2n  ; 25.5n  ; Nb 6 ; Ez 14.7 ; autre traduction vous tiendrez les Israélites à l''écart de leurs impuretés  ; certains modifient le texte hébreu traditionnel pour lire vous mettrez les Israélites en garde contre leurs impuretés . –  ma demeure 26.11s ; Ex 25.9n  ; Nb 5.3 ; Ez 37.27 ; 43.9 ; 2Co 6.16 ; Ap 21.3.'
  - type: text
    content: 'Vous ferez en sorte que les Israélites se tiennent à l''écart quand ils sont en état d''impureté : ainsi ils ne mourront pas à cause de leurs impuretés, en rendant impure ma demeure, qui est au milieu d''eux.'
  '32':
  - type: text
    content: 'Telle est la loi concernant celui qui est atteint d''un écoulement, celui qui se rend impur par un épanchement de semence, '
  '33':
  - type: note
    content: 'celle qui est souillée…  : litt. celle qui a ses règles, dans sa souillure (menstruelle)  ; cf. 12.2n. –  l''homme ou la femme  : litt. le mâle et pour la femelle.'
  - type: text
    content: celle qui est souillée par ses règles, l'homme ou la femme qui a un écoulement génital, et l'homme qui couche avec une femme impure.
  '4':
  - type: text
    content: 'Tout lit sur lequel se couche celui qui est atteint d''un écoulement sera impur, et tout objet sur lequel il s''assied sera impur. '
  '5':
  - type: note
    content: se lavera 14.8n  ; cf. Hé 9.10. –  jusqu'au soir 14.46+.
  - type: text
    content: 'Celui qui touche son lit lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  '6':
  - type: text
    content: 'Quiconque s''assied sur l''objet sur lequel s''est assis celui qui est atteint d''un écoulement lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  '7':
  - type: note
    content: 'le corps  : litt. la chair (cf. v. 2n), de même dans la suite.'
  - type: text
    content: 'Quiconque touche le corps de celui qui est atteint d''un écoulement lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  '8':
  - type: text
    content: 'Si celui qui est atteint d''un écoulement crache sur un homme pur, celui-ci lavera ses vêtements, se lavera avec de l''eau et sera impur jusqu''au soir. '
  '9':
  - type: note
    content: 'Toute selle  : autre traduction tout siège (de char)  ; même terme en Ct 3.10.'
  - type: text
    content: 'Toute selle sur laquelle est monté celui qui est atteint d''un écoulement sera impure. '
