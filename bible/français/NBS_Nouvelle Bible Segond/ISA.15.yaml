      - type: usfm
        marker: fq
        children:
        - type: text
          text: Nebo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : à une trentaine de kilomètres au nord de Dibôn (cf. Nb 32.3,38 ; Dt 34.1 ; Jr 48.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',22 ; 1Ch 5.8). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Medba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : actuellement Madaba, près du mont Nebo (Nb 21.30 ; Jos 13.9,16ss). –  '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: têtes rasées…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 7.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: On monte à Bayith et à Dibôn,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux hauts lieux, pour pleurer ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Moab hurle sur Nebo et sur Medba :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes les têtes sont rasées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes les barbes sont coupées.
