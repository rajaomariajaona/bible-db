      marker-yv: yv-n
    - type: text
      text: Dans ses rues, on a mis un sac pour pagne ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur ses toits en terrasse et sur ses places,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chacun hurle et fond en larmes.
