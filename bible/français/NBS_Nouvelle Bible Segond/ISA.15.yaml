document_id: ISA.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Moab
  - type: text
    content: ' '
  - type: note
    content: 'Sentence 13.1n. –  Moab  : le royaume situé sur le plateau fertile, à l''est de la mer Morte. D''après la répartition géographique des villes citées dans ce chapitre qui ont pu être identifiées, ce chant funèbre semble décrire une invasion venue de l''est, qui aurait dispersé la population à la fois vers le nord et vers le sud ; cf. 25.10s ; Nb 21.27-30 ; Jr 48 ; Ez 25.8-11 ; Am 2.1-3 ; So 2.8-11. –  Ar-Moab (Nb 21.15,28), à environ 15 km au nord-est de Qir-Moab , la capitale politique (cf. ses autres noms en 16.7,11 ; Jr 48.31), les deux villes principales au sud de l''Arnon. –  est réduite au silence  : autres traductions est perdue ; a péri  ; cf. 6.5n.'
  - type: text
    content: Sentence sur Moab.
  - type: text
    content: En une nuit elle a été ravagée !
  - type: text
    content: Ar-Moab est réduite au silence.
  - type: text
    content: En une nuit elle a été ravagée !
  - type: text
    content: Qir-Moab est réduite au silence.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'On monte ou il monte. –  Bayith , c.-à-d. la maison ou le temple (cf. 6.1n  ; il s''agit probablement ici du temple de Kemosh, le dieu national). Des versions anciennes ont lu la fille de Dibôn , comme en Jr 48.18, ce qui supposerait une variante d''une lettre dans le texte hébreu. –  Dibôn  : capitale religieuse, à 5 km au nord de l''Arnon (Nb 21.30). –  aux hauts lieux ou sur les hauteurs 16.12 ; cf. Nb 21.19n. –  Nebo  : à une trentaine de kilomètres au nord de Dibôn (cf. Nb 32.3,38 ; Dt 34.1 ; Jr 48.1n,22 ; 1Ch 5.8). –  Medba  : actuellement Madaba, près du mont Nebo (Nb 21.30 ; Jos 13.9,16ss). –  têtes rasées…  : cf. 7.20n.'
  - type: text
    content: On monte à Bayith et à Dibôn,
  - type: text
    content: aux hauts lieux, pour pleurer ;
  - type: text
    content: 'Moab hurle sur Nebo et sur Medba :'
  - type: text
    content: toutes les têtes sont rasées,
  - type: text
    content: toutes les barbes sont coupées.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'on a mis…  : litt. ils ont ceint le sac , geste de tristesse ou de deuil, cf. 3.24 ; voir aussi 22.12 ; Jon 3.6,8. –  en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n. –  fond…  : litt. descend dans les larmes  ; cf. Jr 9.17 ; Lm 1.16 ; 3.48.'
  - type: text
    content: Dans ses rues, on a mis un sac pour pagne ;
  - type: text
    content: sur ses toits en terrasse et sur ses places,
  - type: text
    content: chacun hurle et fond en larmes.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Heshbôn  : à 6 km au nord-nord-est de Nebo (Nb 21.25 ; Ct 7.5). –  Eléalé  : à 3 km au nord-nord-est de Heshbôn (Nb 32.3,37). –  Yahats  : bien plus au sud, à 4 km au nord-est de Dibôn, peut-être à la frontière (Nb 21.23). –  poussent des cris  : autre traduction lancent des acclamations (guerrières) ; certains modifient le texte hébreu traditionnel pour lire tremblent. –  Moab vacille  : litt. son âme (cf. Gn 1.20n) tremble pour lui  ; autre traduction leur âme est sans courage.'
  - type: text
    content: Heshbôn et Eléalé crient,
  - type: text
    content: on les entend jusqu'à Yahats ;
  - type: text
    content: c'est pourquoi les hommes armés de Moab poussent des cris,
  - type: text
    content: Moab vacille.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Mon cœur  : LXX le cœur de Moab. –  Tsoar Gn 13.10 ; 14.2 ; 19.30. –  Eglath-Shelishiya signifie génisse de trois ans ou troisième génisse (cf. Jr 48.34). On peut y voir un simple qualificatif de Tsoar , mais aussi une allusion au culte du veau ou taurillon (cf. 1R 12.28s ; Os 8.6). –  ils montent…  : cf. Jr 48.5n. –  Louhith et Horonaïm ne sont pas identifiées avec certitude ; elles étaient sans doute situées sur une route de montagne, à une quinzaine de kilomètres au sud-ouest de Qir-Moab. –  sur le chemin…  : autre traduction un cri déchirant réveille le chemin de Horonaïm. –  cris de désastre ou cris de destruction.'
  - type: text
    content: 'Mon cœur crie sur Moab :'
  - type: text
    content: il y a des fugitifs jusqu'à Tsoar
  - type: text
    content: – Eglath-Shelishiya.
  - type: text
    content: Car ils montent, en pleurant, la montée de Louhith,
  - type: text
    content: sur le chemin de Horonaïm ils font retentir des cris de désastre ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Nimrim  : oasis au sud-est de la mer Morte ; cf. Jr 48.34. –  taries…  : cf. 2R 3.25.'
  - type: text
    content: car les eaux de Nimrim sont taries,
  - type: text
    content: car l'herbe est desséchée,
  - type: text
    content: le gazon est détruit,
  - type: text
    content: la verdure n'est plus.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ils ramassent ce qui leur reste  : litt. il fait un reste. –  emportent…  : traduction incertaine ; autre possibilité  : on leur enlève leur garde (c.-à-d. le contrôle du territoire) sur l''oued des Saules (cf. Lv 23.40n  ; Jb 40.22). Ce cours d''eau n''est pas identifié avec certitude. Certains pensent à un affluent du Jourdain, tout au nord de Moab, d''autres l''identifient avec le Zéred (cf. Dt 2.13n).'
  - type: text
    content: C'est pourquoi ils ramassent ce qui leur reste
  - type: text
    content: et emportent leurs réserves au-delà de l'oued des Saules.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'le territoire…  : autre traduction les frontières de Moab sont entourées de cris. –  Eglaïm  : à l''extrémité nord de la mer Morte, selon Ez 47.10. –  Béer-Elim  : à la frontière nord-est de Moab (cf. Nb 21.16).'
  - type: text
    content: Car le territoire de Moab est recouvert de cris ;
  - type: text
    content: ses hurlements retentissent jusqu'à Eglaïm,
  - type: text
    content: ses hurlements retentissent jusqu'à Béer-Elim.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Dimôn (assonance avec dam, sang ). Un ms de Qumrân ainsi que Vg portent Dibôn , comme au v. 2 ; cf. Jr 48.2n. –  de nouveaux malheurs  : litt. des suppléments. –  lion  : cf. 2R 17.25 ; Am 1.2 ; 3.8. –  la terre  : litt. le sol  ; cf. Gn 2.5n.'
  - type: text
    content: Les eaux de Dimôn sont pleines de sang ;
  - type: text
    content: j'enverrai sur Dimôn de nouveaux malheurs,
  - type: text
    content: un lion contre les rescapés de Moab,
  - type: text
    content: contre ce qui reste sur la terre.
