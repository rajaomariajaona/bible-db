      - type: usfm
        marker: fq
        children:
        - type: text
          text: Moab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le royaume situé sur le plateau fertile, à l''est de la mer Morte. D''après la répartition géographique des villes citées dans ce chapitre qui ont pu être identifiées, ce chant funèbre semble décrire une invasion venue de l''est, qui aurait dispersé la population à la fois vers le nord et vers le sud ; cf. 25.10s ; Nb 21.27-30 ; Jr 48 ; Ez 25.8-11 ; Am 2.1-3 ; So 2.8-11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ar-Moab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Nb 21.15,28), à environ 15 km au nord-est de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qir-Moab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', la capitale politique (cf. ses autres noms en 16.7,11 ; Jr 48.31), les deux villes principales au sud de l''Arnon. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: est réduite au silence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est perdue ; a péri
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 6.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Sentence sur Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En une nuit elle a été ravagée !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ar-Moab est réduite au silence.
  - type: usfm
    marker: q1
    children:
