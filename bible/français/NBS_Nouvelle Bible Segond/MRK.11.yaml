    marker-yv: yv-n
  - type: text
    text: Il entra à Jérusalem, dans le temple. Quand il eut tout regardé, comme il était déjà tard, il sortit vers Béthanie avec les Douze.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le figuier sans figues
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 21.18-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2.23 ; Jn 4.7 ; 19.28.
    marker-yv: yv-n
  - type: text
    text: 'Le lendemain, comme ils sortaient de Béthanie, il eut faim. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 13.28 ; Lc 13.6-9 ; voir aussi Jr 8.13 ; Os 9.16s ; Jl 1.7 ; Mi 7.1.
    marker-yv: yv-n
  - type: text
    text: 'Apercevant de loin un figuier qui avait des feuilles, il alla voir s''il y trouverait quelque chose ; mais, en y arrivant, il n''y trouva que des feuilles – car ce n''était pas la saison des figues. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 20ss ; voir aussi Jon 4.4-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'entendirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'entendaient.
    marker-yv: yv-n
  - type: text
    text: 'Il lui dit alors : Que plus jamais personne ne mange un fruit de toi ! Et ses disciples l''entendirent.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus chasse les vendeurs du temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
