document_id: MRK.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'entrée de Jésus à Jérusalem
  - type: heading
    content: Mt 21.1-9  ; Lc 19.28-40  ; Jn 12.12-16
  - type: text
    content: ' '
  - type: note
    content: Bethphagé et Béthanie (Mt 21.1n,17n  ; Lc 19.29), sur les pentes du mont des Oliviers 13.3 ; 14.26 ; Lc 21.37 ; Jn 8.1 ; Ac 1.12 ; cf. Za 14.4.
  - type: text
    content: 'Alors qu''ils approchent de Jérusalem, vers Bethphagé et Béthanie, près du mont des Oliviers, il envoie deux de ses disciples '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le règne de David  : cf. 10.47n  ; Lc 1.32s ; 19.38. –  dans les lieux très hauts Ps 148.1 ; Jb 16.19.'
  - type: text
    content: Béni soit le règne qui vient,
  - type: text
    content: le règne de David, notre père !
  - type: text
    content: Hosanna dans les lieux très hauts !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 21.10,17. –  dans le temple cf. 11.15ss. –  tout regardé 3.5n. –  comme il était déjà tard  : litt. comme c''était déjà l''heure du soir.'
  - type: text
    content: Il entra à Jérusalem, dans le temple. Quand il eut tout regardé, comme il était déjà tard, il sortit vers Béthanie avec les Douze.
  - type: heading
    content: Le figuier sans figues
  - type: heading
    content: Mt 21.18-19
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.23 ; Jn 4.7 ; 19.28.
  - type: text
    content: 'Le lendemain, comme ils sortaient de Béthanie, il eut faim. '
  '13':
  - type: note
    content: Cf. 13.28 ; Lc 13.6-9 ; voir aussi Jr 8.13 ; Os 9.16s ; Jl 1.7 ; Mi 7.1.
  - type: text
    content: 'Apercevant de loin un figuier qui avait des feuilles, il alla voir s''il y trouverait quelque chose ; mais, en y arrivant, il n''y trouva que des feuilles – car ce n''était pas la saison des figues. '
  '14':
  - type: note
    content: 'Cf. v. 20ss ; voir aussi Jon 4.4-11. –  l''entendirent  : litt. l''entendaient.'
  - type: text
    content: 'Il lui dit alors : Que plus jamais personne ne mange un fruit de toi ! Et ses disciples l''entendirent.'
  - type: heading
    content: Jésus chasse les vendeurs du temple
  - type: heading
    content: Mt 21.12-17  ; Lc 19.45-46  ; cf. Jn 2.13-17
  '15':
  - type: text
    content: ' '
  - type: note
    content: chasser (voir 5.40n) ceux qui vendaient… Mt 21.12n  ; cf. Za 14.21n.
  - type: text
    content: 'Ils arrivent à Jérusalem. Entré dans le temple, il se mit à chasser ceux qui vendaient et ceux qui achetaient dans le temple ; il renversa les tables des changeurs et les sièges des vendeurs de colombes. '
  '16':
  - type: note
    content: 'La cour des non-Juifs (ou : des païens, des nations, cf. v. 17 ; Mt 4.15n), où se déroule la scène, servait probablement de raccourci à ceux qui entraient dans la ville en venant de l''est ; voir temple.'
  - type: text
    content: 'Et il ne laissait personne transporter un objet à travers le temple. '
  '17':
  - type: note
    content: Es 56.7 ; Jr 7.11.
  - type: text
    content: 'Il les instruisait et disait : N''est-il pas écrit :'
  - type: text
    content: Ma maison sera appelée maison de prière pour toutes les nations.
  - type: text
    content: 'Mais vous en avez fait une '
  - type: text
    content: caverne de bandits
  - type: text
    content: .
  '18':
  - type: text
    content: ' '
  - type: note
    content: '12.12/ / ; 14.1s/ / ; Mt 12.14+ ; Lc 20.19 ; 22.2 ; Ac 5.26. –  grands prêtres  : il s''agit ici des membres du sanhédrin (8.31n) issus des grandes familles sacerdotales ; cf. Mt 2.4n. –  scribes 2.6+. –  ils avaient peur… v. 32. –  ébahie 1.22+.'
  - type: text
    content: Les grands prêtres et les scribes l'entendirent ; ils cherchaient comment le faire disparaître ; ils avaient peur de lui, parce que toute la foule était ébahie de son enseignement.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Jésus et ses disciples sortirent  : litt. ils sortaient  ; certains mss portent il sortait  ; on pourrait aussi comprendre le soir venu, Jésus et ses disciples sortaient de la ville.'
  - type: text
    content: Quand le soir fut venu, Jésus et ses disciples sortirent de la ville.
  - type: heading
    content: 'A propos du figuier : la foi et la prière'
  - type: heading
    content: Mt 21.20-22
  '2':
  - type: note
    content: 'un ânon  : cf. Za 9.9 ; voir aussi 1R 1.33-40. –  attaché Gn 49.11. –  sur lequel aucun homme…  : cf. Nb 19.2 ; Dt 21.3 ; 1S 6.7.'
  - type: text
    content: 'en leur disant : Allez au village qui est devant vous ; sitôt que vous y serez entrés, vous trouverez un ânon attaché, sur lequel aucun homme ne s''est encore assis ; détachez-le et amenez-le. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: V. 12-14 ; cf. Jn 1.48n.
  - type: text
    content: 'Le matin, en passant, les disciples virent le figuier desséché depuis les racines. '
  '21':
  - type: note
    content: 'Pierre, se rappelant  : cf. 14.72. –  Rabbi 9.5n. –  maudit  : voir bénédiction, malédiction.'
  - type: text
    content: 'Pierre, se rappelant ce qui s''était passé, lui dit : '
  - type: text
    content: Rabbi,
  - type: text
    content: ' regarde, le figuier que tu as maudit s''est desséché.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Ayez la foi de Dieu  : autres traductions ayez une foi de Dieu ; ayez foi en Dieu ; attachez-vous à la fidélité de Dieu  ; le terme grec est apparenté au verbe traduit par croire aux v. 23s.'
  - type: text
    content: 'Jésus leur dit : Ayez la foi de Dieu. '
  '23':
  - type: note
    content: 'Cf. 9.23 ; Mt 17.20+ ; 18.19n. –  Amen Mt 5.18n. –  sans hésiter ou sans douter, cf. Rm 4.20 ; Jc 1.6s ; voir aussi cœur. –  cela lui sera accordé  : litt. cela sera pour lui  ; même tournure au v. 24.'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, celui qui dira à cette montagne : « Ote-toi de là et jette-toi dans la mer », sans hésiter dans son cœur, mais en croyant que ce qu''il dit arrive, cela lui sera accordé. '
  '24':
  - type: note
    content: Cf. Mt 7.7+ss ; 18.19 ; 1Jn 5.14.
  - type: text
    content: 'C''est pourquoi je vous dis : Tout ce que vous demandez en priant, croyez que vous l''avez reçu, et cela vous sera accordé.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 5.23s ; 6.14 ; 18.21ss. –  votre Père qui est dans les cieux Mt 6.9+. –  fautes  : voir péché.'
  - type: text
    content: 'Et lorsque vous êtes debout en prière, si vous avez quelque chose contre quelqu''un, pardonnez, afin que votre Père qui est dans les cieux vous pardonne aussi vos fautes. [ '
  '26':
  - type: note
    content: 'Certains mss ajoutent  : Mais si vous ne pardonnez pas, votre Père qui est dans les cieux ne vous pardonnera pas non plus vos fautes (Mt 6.15).'
  - type: text
    content: ']'
  - type: heading
    content: L'autorité de Jésus en question
  - type: heading
    content: Mt 21.23-27  ; Lc 20.1-8
  '27':
  - type: text
    content: ' '
  - type: note
    content: Voir temple . –  grands prêtres / scribes / anciens 8.31n  ; Mt 2.4n  ; 16.21.
  - type: text
    content: 'Ils retournent à Jérusalem ; comme il marchait dans le temple, les grands prêtres, les scribes et les anciens viennent le trouver '
  '28':
  - type: note
    content: 'De quelle autorité (1.22+) …  : autres traductions par quel pouvoir… ; de quel droit… –  fais-tu cela  : cf. v. 15ss ; Mt 21.23 ; Lc 20.1.'
  - type: text
    content: 'pour lui demander : De quelle autorité fais-tu cela ? Qui t''a donné autorité pour le faire ? '
  '29':
  - type: text
    content: 'Jésus leur répondit : Je vais vous poser une seule question ; répondez-moi, et je vous dirai de quelle autorité je fais cela. '
  '3':
  - type: note
    content: 'Cf. 14.14. –  Le Seigneur  : cf. 5.19 ; certains ont compris son maître, le mot grec pouvant avoir les deux sens. –  il le renverra  : litt. il l''envoie  ; il faut sans doute comprendre : Jésus ne tardera pas à le rendre à son propriétaire ; selon certains mss, il ne s''agirait plus de ce que les disciples doivent dire, mais de la suite du discours que Jésus leur adresse  : et il (le quelqu''un qui ferait objection) le laissera aussitôt venir ici (v. 6) ; cf. Mt 21.3n.'
  - type: text
    content: 'Si quelqu''un vous dit : « Pourquoi faites-vous cela ? », répondez : « Le Seigneur en a besoin ; il le renverra ici tout de suite. »'
  '30':
  - type: note
    content: 'baptême de Jean  : cf. 1.4n. –  du ciel ou des humains ? Ac 5.38s.'
  - type: text
    content: 'Le baptême de Jean venait-il du ciel ou des humains ? Répondez-moi. '
  '31':
  - type: note
    content: pas cru Mt 21.32 ; Lc 7.30.
  - type: text
    content: 'Mais ils raisonnaient ainsi entre eux : Si nous répondons : « Du ciel », il dira : « Alors pourquoi ne l''avez-vous pas cru ? » '
  '32':
  - type: note
    content: 'Cf. v. 18+. –  un véritable prophète  : cf. Mt 14.5.'
  - type: text
    content: 'Et si nous répondons : « Des humains »… – ils avaient peur de la foule, car tous tenaient Jean pour un véritable prophète. '
  '33':
  - type: note
    content: 'Nous ne savons pas  : cf. Jn 9.29ss.'
  - type: text
    content: 'Ils répondent donc à Jésus : Nous ne savons pas. Alors Jésus leur dit : Moi non plus, je ne vous dis pas de quelle autorité je fais cela.'
  '4':
  - type: text
    content: 'Ils s''en allèrent et trouvèrent un ânon attaché dehors, près d''une porte, dans la rue ; ils le détachent. '
  '5':
  - type: text
    content: 'Quelques-uns de ceux qui étaient là se mirent à leur dire : Qu''est-ce que vous faites ? Pourquoi détachez-vous l''ânon ? '
  '6':
  - type: text
    content: Ils leur répondirent comme Jésus l'avait dit, et on les laissa aller.
  '7':
  - type: text
    content: 'Ils amènent à Jésus l''ânon, sur lequel ils lancent leurs vêtements ; il s''assit dessus. '
  '8':
  - type: note
    content: Cf. 2R 9.13 ; Mt 21.8n  ; voir aussi Lv 23.40 ; Jn 12.13n.
  - type: text
    content: 'Beaucoup de gens étendirent leurs vêtements sur le chemin, et d''autres des rameaux qu''ils avaient coupés dans la campagne. '
  '9':
  - type: note
    content: Ps 118.25s. –  Hosanna ! voir Mt 21.9n. –  celui qui vient Mt 11.3n. – Voir aussi Béni et nom.
  - type: text
    content: 'Ceux qui précédaient et ceux qui suivaient criaient :'
  - type: text
    content: Hosanna !
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur !
