        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils arrivent à Jérusalem. Entré dans le temple, il se mit à chasser ceux qui vendaient et ceux qui achetaient dans le temple ; il renversa les tables des changeurs et les sièges des vendeurs de colombes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La cour des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: non-Juifs
      - type: text
        text: ' (ou : des païens, des nations, cf. v. 17 ; Mt 4.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), où se déroule la scène, servait probablement de raccourci à ceux qui entraient dans la ville en venant de l''est ; voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Et il ne laissait personne transporter un objet à travers le temple. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.17 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Es 56.7 ; Jr 7.11.
    marker-yv: yv-n
  - type: text
    text: 'Il les instruisait et disait : N''est-il pas écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ma maison sera appelée maison de prière pour toutes les nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais vous en avez fait une '
  - type: usfm
    marker: it
    children:
