    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 10.47'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 1.32s ; 19.38. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans les lieux très hauts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ps 148.1 ; Jb 16.19.
    marker-yv: yv-n
  - type: text
    text: Béni soit le règne qui vient,
- type: usfm
  marker: q1
