    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mont des Oliviers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 13.3 ; 14.26 ; Lc 21.37 ; Jn 8.1 ; Ac 1.12 ; cf. Za 14.4.
    marker-yv: yv-n
  - type: text
    text: 'Alors qu''ils approchent de Jérusalem, vers Bethphagé et Béthanie, près du mont des Oliviers, il envoie deux de ses disciples '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un ânon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Za 9.9 ; voir aussi 1R 1.33-40. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'attaché '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 49.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur lequel aucun homme…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 19.2 ; Dt 21.3 ; 1S 6.7.'
    marker-yv: yv-n
  - type: text
    text: 'en leur disant : Allez au village qui est devant vous ; sitôt que vous y serez entrés, vous trouverez un ânon attaché, sur lequel aucun homme ne s''est encore assis ; détachez-le et amenez-le. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 14.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.19 ; certains ont compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son maître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', le mot grec pouvant avoir les deux sens. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il le renverra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il l'envoie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il faut sans doute comprendre : Jésus ne tardera pas à le rendre à son propriétaire ; selon certains mss, il ne s''agirait plus de ce que les disciples doivent dire, mais de la suite du discours que Jésus leur adresse'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et il '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quelqu''un '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui ferait objection) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le laissera aussitôt venir ici '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 6) ; cf. Mt 21.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si quelqu''un vous dit : « Pourquoi faites-vous cela ? », répondez : « Le Seigneur en a besoin ; il le renverra ici tout de suite. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils s''en allèrent et trouvèrent un ânon attaché dehors, près d''une porte, dans la rue ; ils le détachent. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quelques-uns de ceux qui étaient là se mirent à leur dire : Qu''est-ce que vous faites ? Pourquoi détachez-vous l''ânon ? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils leur répondirent comme Jésus l'avait dit, et on les laissa aller.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils amènent à Jésus l''ânon, sur lequel ils lancent leurs vêtements ; il s''assit dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2R 9.13 ; Mt 21.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Lv 23.40 ; Jn 12.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Beaucoup de gens étendirent leurs vêtements sur le chemin, et d''autres des rameaux qu''ils avaient coupés dans la campagne. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ps 118.25s
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hosanna ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir Mt 21.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'celui qui vient '
    - type: usfm
      marker: ft
      children:
      - type: text
