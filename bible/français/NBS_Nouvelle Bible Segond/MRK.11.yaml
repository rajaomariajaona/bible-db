      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Béni
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui précédaient et ceux qui suivaient criaient :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hosanna !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Béni soit celui qui vient au nom du Seigneur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
