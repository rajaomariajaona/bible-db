document_id: PSA.141,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Seigneur, veille sur mes paroles
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.5+ ; 5.2s ; 140.7 ; 142.7. –  vite 31.3+. –  Prête l'oreille 17.6n.
  - type: text
    content: Psaume. De David.
  - type: text
    content: Seigneur
  - type: text
    content: ', je t''invoque ; agis vite en ma faveur !'
  - type: text
    content: Prête l'oreille, quand je t'invoque !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'tombent…  : autre traduction tombent ensemble… et que moi j''échappe. –  leurs filets  : litt. ses filets  ; cf. 7.16+ ; 9.16 ; 35.8 ; Pr 26.27. –  j''échapperai  : litt. je passerai  ; cf. 1.6.'
  - type: text
    content: Que les méchants tombent dans leurs filets
  - type: text
    content: pendant que, moi, j'échapperai !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'te soit offerte  : litt. soit placée devant toi. –  comme l''encens Ap 5.8 ; 8.3s ; cf. Es 1.13 ; Jr 41.5 ; Né 13.5,9. –  l''élévation de mes mains 28.2n  ; 134.2. –  offrande du soir Ex 29.38ss.'
  - type: text
    content: Que ma prière te soit offerte comme l'encens,
  - type: text
    content: et l'élévation de mes mains comme l'offrande du soir !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 34.14 ; 39.2 ; Pr 13.3 ; Siracide 22.27–23.3 : « Qui placera une garde sur ma bouche et, sur mes lèvres, le sceau de la discrétion, pour les empêcher de causer ma chute et ma langue de me perdre ? Seigneur, Père et Maître de ma vie, ne m''abandonne pas à leur penchant et ne permets pas qu''elles me fassent tomber. Qui imposera les verges à mes pensées et, à mon cœur, la discipline de la sagesse, sans les épargner dans mes égarements ni laisser passer leurs fautes ? De peur que ne se multiplient mes erreurs et que mes péchés ne s''accumulent ; pour que je ne tombe pas devant mes adversaires et que mon ennemi ne s''en félicite. » 28.24ss : « Vois, tu entoures ton domaine d''une haie d''épines : fais aussi une balance et des poids pour tes paroles. Tu serres soigneusement ton argent et ton or : fais aussi à ta bouche une porte et un verrou. Prends garde que ta langue ne te fasse trébucher, si tu ne veux pas tomber aux mains de celui qui te guette. »'
  - type: text
    content: Seigneur
  - type: text
    content: ', veille sur ma bouche,'
  - type: text
    content: garde la porte de mes lèvres !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Voir cœur. –  vers ce qui est mauvais ou vers une parole mauvaise  ; cf. Mt 6.13. –  avec les hommes…  : cf. v. 9 ; 5.6+ ; voir aussi 1.1 ; Pr 1.10ss ; 4.14s. –  leurs banquets  : le mot hébreu n''apparaît qu''ici et sa traduction précise est incertaine ; il est apparenté à celui qui est traduit par belles au v. 6.'
  - type: text
    content: N'incline pas mon cœur vers ce qui est mauvais.
  - type: text
    content: Que je ne me livre pas à des agissements méchants
  - type: text
    content: avec les hommes malfaisants !
  - type: text
    content: Que je ne goûte pas à leurs banquets !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'une faveur  : autre traduction une marque de fidélité  ; cf. 23.6n  ; 25.10n  ; Est 2.9n. –  c''est de l''huile… 23.5+. Jusqu''au v. 7 le texte est obscur et la traduction conjecturale. Au prix d''importantes modifications du texte hébreu traditionnel certains comprennent  : que le juste me frappe, que le fidèle me fasse des reproches, mais que l''huile du méchant ne vienne pas sur ma tête ; ma prière demeure toujours, malgré le mal qu''ils font  ; cf. 84.11. –  ma prière s''élèvera…  : litt. encore et ma prière dans leurs maux (ou dans leurs malheurs ).'
  - type: text
    content: Que le juste me frappe, c'est une faveur ;
  - type: text
    content: 'qu''il me fasse des reproches, c''est de l''huile sur ma tête :'
  - type: text
    content: ma tête ne s'y refusera pas ;
  - type: text
    content: mais de nouveau ma prière s'élèvera contre leurs méfaits.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Certains modifient le texte hébreu traditionnel pour lire qu'ils tombent aux mains de leurs juges, et l'on écoutera (ou qu'ils écoutent ) …  ; d'autres interprètent la seconde partie du v. eux qui ont pris plaisir à écouter mes paroles , comme l'introduction du v. 7, où ils voient l'extrait d'un chant des exilés (cf. 137.3) ; voir aussi 1.6 ; 73.19 ; Nb 16.32s ; Es 5.14.
  - type: text
    content: Que leurs juges soient jetés contre les parois des rochers,
  - type: text
    content: et l'on écoutera mes paroles, car elles sont belles.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Certains modifient le texte hébreu traditionnel, assez obscur, pour lire comme lorsqu''un rocher (cf. v. 6) se fend et déchire la terre  ; ou encore comme lorsqu''une meule brise tout sur le sol . –  nos ossements  : versions anciennes leurs ossements , 53.6 ; Ez 37.11. –  devant la bouche  : autre traduction à l''entrée  ; le séjour des morts peut être représenté comme un lieu souterrain et comme un monstre qui engloutit ses victimes (cf. Nb 16.30ss ; Es 5.14).'
  - type: text
    content: Comme lorsque la terre se déchire et se fend,
  - type: text
    content: nos ossements sont dispersés devant la bouche du séjour des morts.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'vers toi… mes yeux 25.15 ; 123.2. –  se tournent  : sous-entendu dans le texte. –  je trouve un abri 7.2+.'
  - type: text
    content: 'C''est vers toi, '
  - type: text
    content: Dieu
  - type: text
    content: ', Seigneur, que se tournent mes yeux,'
  - type: text
    content: 'c''est en toi que je trouve un abri :'
  - type: text
    content: n'expose pas ma vie !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 31.5 ; 119.110 ; 140.6+.
  - type: text
    content: Préserve-moi du piège qu'ils me tendent,
  - type: text
    content: et des traquenards des malfaisants !
