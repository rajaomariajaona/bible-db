      - type: text
        text: '22.27–23.3 : « Qui placera une garde sur ma bouche et, sur mes lèvres, le sceau de la discrétion, pour les empêcher de causer ma chute et ma langue de me perdre ? Seigneur, Père et Maître de ma vie, ne m''abandonne pas à leur penchant et ne permets pas qu''elles me fassent tomber. Qui imposera les verges à mes pensées et, à mon cœur, la discipline de la sagesse, sans les épargner dans mes égarements ni laisser passer leurs fautes ? De peur que ne se multiplient mes erreurs et que mes péchés ne s''accumulent ; pour que je ne tombe pas devant mes adversaires et que mon ennemi ne s''en félicite. » 28.24ss : « Vois, tu entoures ton domaine d''une haie d''épines : fais aussi une balance et des poids pour tes paroles. Tu serres soigneusement ton argent et ton or : fais aussi à ta bouche une porte et un verrou. Prends garde que ta langue ne te fasse trébucher, si tu ne veux pas tomber aux mains de celui qui te guette. »'
