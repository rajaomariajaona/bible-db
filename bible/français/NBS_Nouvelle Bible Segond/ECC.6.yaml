document_id: ECC.6,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'qui accable  : litt. qui abonde sur , ce qui pourrait aussi signifier qui est fréquent (chez l''être humain).'
  - type: text
    content: 'Il est un malheur que j''ai vu sous le soleil, et qui accable l''être humain. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ce qui est  : autre traduction ce qui a été  ; cf. 1.9 ; 3.15n. –  ce qu''est l''humain  : autre traduction que (ce nom) est Adam (= Homme , celui qui a été tiré de la terre) ; cf. Gn 1.26n  ; 2.5n,7 ; 5.2n.'
  - type: text
    content: Ce qui est a déjà été appelé par son nom ;
  - type: text
    content: 'et on sait ce qu''est l''humain : il ne peut contester avec plus puissant que lui.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 5.2+.
  - type: text
    content: 'Quand il y a beaucoup de paroles, il y a beaucoup de futilités :'
  - type: text
    content: que reste-t-il à l'être humain ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Qui donc sait  : cf. 3.11+. –  sa vie futile  : autre traduction la vie de sa futilité  ; cf. 1.2+ ; 7.15 ; 9.9n. –  comme une ombre 8.13 ; Ps 39.7 ; 102.12 ; 109.23 ; Jb 8.9 ; 14.2 ; 1Ch 29.15. –  Qui peut dire 3.22+.'
  - type: text
    content: Qui donc sait ce qui est bon pour l'être humain pendant la vie, pendant le nombre des jours de sa vie futile, qu'il mène comme une ombre ? Qui peut dire à l'être humain ce qui sera après lui sous le soleil ?
  '2':
  - type: note
    content: 'richesse… 5.18 ; cf. 2Ch 1.11s. –  c''est un étranger…  : cf. 2.18+ ; 4.8+ ; Pr 5.10. –  un mal affligeant  : litt. une maladie mauvaise  ; cf. 5.16n.'
  - type: text
    content: 'Il y a tel homme à qui Dieu a donné richesse, biens et gloire, à qui rien ne manque de tout ce qu''il désire, mais Dieu ne lui a pas accordé le pouvoir de s''en nourrir : c''est un étranger qui s''en nourrira. C''est là une futilité et un mal affligeant.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'un grand nombre d''années…  : cf. Ex 20.12 ; Dt 5.16 ; 22.7. –  l''avorton 4.3+.'
  - type: text
    content: Si un homme engendrait cent fils
  - type: text
    content: et vivait un grand nombre d'années, aussi nombreux que soient les jours de sa vie,
  - type: text
    content: s'il n'est pas rassasié de bonheur, et qu'il n'ait même pas de sépulture,
  - type: text
    content: je dis que l'avorton est plus heureux que lui.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Voir nom.
  - type: text
    content: Car il est venu dans la futilité,
  - type: text
    content: il s'en va dans les ténèbres,
  - type: text
    content: et son nom sera recouvert par les ténèbres ;
  '5':
  - type: text
    content: il n'a ni vu, ni connu le soleil ;
  - type: text
    content: il y a plus de repos pour lui que pour l'autre.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions quand il vivrait deux fois mille ans, il ne verrait pas le bonheur (cf. 2.24n) ; qu''est-ce que vivre deux fois mille ans, sans voir le bonheur ? –  un même lieu 3.20 ; cf. Siracide 41.4 : « Telle est (la mort) la sentence du Seigneur à l''égard de tout être de chair. Pourquoi discuter sur le bon plaisir du Très-Haut ? Que tu vives dix, cent ou mille ans, au séjour des morts on ne te chicanera pas sur ta vie. »'
  - type: text
    content: Quand il vivrait deux fois mille ans, sans voir le bonheur, tout ne va-t-il pas dans un même lieu ?
  - type: heading
    content: La vie insatisfaisante de l'homme
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'pour sa bouche  : certains comprennent  : pour la bouche du séjour des morts (le lieu évoqué au v. 6), représenté comme un monstre insatiable ; cf. Es 5.14n  ; Pr 30.15s. –  son désir  : sur le terme hébreu correspondant, voir Gn 1.20n  ; Pr 6.30n  ; ici on pourrait également traduire son gosier n''est pas rempli , ou encore lui-même n''est jamais satisfait.'
  - type: text
    content: Tout le travail de l'être humain est pour sa bouche,
  - type: text
    content: et pourtant son désir n'est pas comblé.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'sage / stupide 2.14+s. –  qui sait, pour marcher…  : traduction incertaine ; d''autres proposent qui sait affronter la vie ou qui sait se conduire.'
  - type: text
    content: Que reste-t-il de plus au sage qu'à l'homme stupide ?
  - type: text
    content: Quel avantage a-t-il, le pauvre qui sait, pour marcher devant les vivants ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Mieux vaut…  : litt. mieux vaut la vision des yeux (cf. 11.9+) que la marche de l''être (ou du désir , cf. v. 7n). –  futilité / poursuite… 1.14n.'
  - type: text
    content: 'Mieux vaut voir de ses yeux que de laisser aller son imagination :'
  - type: text
    content: c'est encore là futilité et poursuite du vent.
