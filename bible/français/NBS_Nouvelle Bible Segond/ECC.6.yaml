    - type: text
      text: 'Il y a tel homme à qui Dieu a donné richesse, biens et gloire, à qui rien ne manque de tout ce qu''il désire, mais Dieu ne lui a pas accordé le pouvoir de s''en nourrir : c''est un étranger qui s''en nourrira. C''est là une futilité et un mal affligeant.'
