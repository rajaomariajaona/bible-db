    - type: text
      text: Qui donc sait ce qui est bon pour l'être humain pendant la vie, pendant le nombre des jours de sa vie futile, qu'il mène comme une ombre ? Qui peut dire à l'être humain ce qui sera après lui sous le soleil ?
