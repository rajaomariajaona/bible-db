document_id: JER.39,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La prise de Jérusalem
  - type: heading
    content: 2R 25.1-21  ; cf. Jr 52
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 52.4-16 ; 2R 25.1-12 et les notes. –  dixième mois  : probablement décembre-janvier 589/8 av. J.-C. –  Nabuchodonosor 21.2n.'
  - type: text
    content: 'La neuvième année de Sédécias, roi de Juda, le dixième mois, Nabuchodonosor, roi de Babylone, vint avec toute son armée devant Jérusalem et l''assiégea. '
  '10':
  - type: note
    content: 40.7+.
  - type: text
    content: Mais les petites gens du peuple, ceux qui n'avaient rien, Nebouzaradân, chef des gardes, leur permit de rester au pays de Juda et il leur donna en ce jour-là des vignes et des champs.
  - type: heading
    content: Jérémie est libéré
  '11':
  - type: text
    content: 'Nabuchodonosor, roi de Babylone, avait donné cet ordre au sujet de Jérémie par l''intermédiaire de Nebouzaradân, chef des gardes : '
  '12':
  - type: note
    content: Cf. 40.4.
  - type: text
    content: 'Prends-le, veille sur lui, ne lui fais aucun mal, mais agis à son égard comme il te dira. '
  '13':
  - type: note
    content: Cf. v. 3n.
  - type: text
    content: 'Nebouzaradân, chef des gardes, Neboushazbân, chef des hauts fonctionnaires, Nergal-Sarétser, chef des mages, et tous les chefs du roi de Babylone '
  '14':
  - type: note
    content: 'dans la cour de la garde v. 15 ; 37.21+. –  Guedalia (ou Guedaliahou, selon les passages), fils d''Ahiqam…  : cf. 26.24+ ; voir aussi 40.5s ; 2R 25.22. –  pour qu''il l''emmène chez lui  : litt. pour le faire sortir vers la maison  ; cf. 37.4.'
  - type: text
    content: envoyèrent prendre Jérémie dans la cour de la garde et le remirent à Guedalia, fils d'Ahiqam, fils de Shaphân, pour qu'il l'emmène chez lui. Et il resta au milieu du peuple.
  - type: heading
    content: Ebed-Mélek aura la vie sauve
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 28.12s.
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie, pendant qu''il était détenu dans la cour de la garde : '
  '16':
  - type: note
    content: '38.7nss. –  non pas pour son bonheur…  : autre traduction non pas pour le bien, mais pour le mal 21.10.'
  - type: text
    content: 'Va, parle à Ebed-Mélek, le Koushite ; tu lui diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Je fais venir sur cette ville ce que j''ai prononcé, non pas pour son bonheur, mais pour son malheur ; cela arrivera en ce jour-là devant toi. '
  '17':
  - type: note
    content: Cf. 20.13 ; Ps 37.40.
  - type: text
    content: 'Mais en ce jour-là je te délivrerai – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – et tu ne seras pas livré aux hommes qui t''effraient. '
  '18':
  - type: note
    content: ta vie sera ton butin 21.9n.
  - type: text
    content: 'Je te ferai échapper, et tu ne tomberas pas par l''épée ; ta vie sera ton butin, parce que tu as mis ta confiance en moi – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: note
    content: 'le neuvième jour du quatrième mois  : probablement fin juin 587 av. J.-C.'
  - type: text
    content: 'La onzième année de Sédécias, le neuvième jour du quatrième mois, une brèche fut ouverte dans la ville. '
  '3':
  - type: note
    content: 'vinrent s''asseoir  : position du juge ; 1.15+ ; cf. 26.10. –  Samgar-Nebou  : par rapprochement avec des documents babyloniens on pourrait décomposer ce nom différemment et lire Nergal-Sarétser, (prince) de Samgar (la ville de Sin-Magir), Nebou-Sarsekim, chef des hauts fonctionnaires (ou Rab-Saris, chef des eunuques 29.2n  ; sur ce titre, cf. v. 13 ; Dn 1.3). –  chef des mages  : traduction conjecturale d''un autre titre babylonien (Rab-Mag).'
  - type: text
    content: 'Alors tous les princes du roi de Babylone vinrent s''asseoir à la porte du Milieu : Nergal-Sarétser, Samgar-Nebou, Sarsekim, chef des hauts fonctionnaires, Nergal-Sarétser, chef des mages, et tous les autres princes du roi de Babylone. '
  '4':
  - type: note
    content: 'Les v. 4-13 sont absents de LXX. –  Jardin du Roi  : cf. Né 3.15 ; Sédécias prend le chemin du sud (la plaine aride  : hébreu ‘arava  ; cf. Dt 1.1n), à l''opposé de l''envahisseur babylonien (1.14n).'
  - type: text
    content: 'Dès qu''ils les eurent vus, Sédécias, roi de Juda, et tous les hommes de guerre s''enfuirent et sortirent de la ville, de nuit, par le chemin du Jardin du Roi, par la porte entre les deux murs ; ils sortirent par le chemin de la plaine aride. '
  '5':
  - type: note
    content: 'Cf. 44.30. –  rattrapa  : le terme hébreu est habituellement traduit par atteindre  ; cf. 42.16 ; Es 59.9. –  Ribla sur l''Oronte, à environ 80 km au sud de Hamath, dans le nord de la Syrie ; cf. 52.9.'
  - type: text
    content: 'Mais l''armée des Chaldéens les poursuivit et rattrapa Sédécias dans la plaine aride de Jéricho. Ils le prirent et le firent monter à Ribla, au pays de Hamath, devant Nabuchodonosor, roi de Babylone ; et celui-ci prononça des jugements contre lui. '
  '6':
  - type: text
    content: 'Le roi de Babylone fit égorger les fils de Sédécias sous ses yeux, à Ribla. Le roi de Babylone fit aussi égorger tous les notables de Juda. '
  '7':
  - type: note
    content: 'crever les yeux  : des bas-reliefs assyriens montrent Sargon crevant les yeux de prisonniers ; cf. Ez 12.13. –  l''emmener à Babylone 32.5.'
  - type: text
    content: 'Puis il fit crever les yeux de Sédécias et le fit attacher avec des entraves de bronze, pour l''emmener à Babylone. '
  '8':
  - type: note
    content: 'aux maisons  : litt. à la maison  ; cf. 6.5 ; 17.27 ; 52.13.'
  - type: text
    content: 'Les Chaldéens mirent le feu à la maison du roi et aux maisons du peuple, et ils démolirent les murailles de Jérusalem. '
  '9':
  - type: note
    content: 'le reste du peuple…  : au lieu de cette répétition, 52.15 porte le reste des artisans. –  Nebouzaradân  : cf. 41.10 ; 52.12,30.'
  - type: text
    content: 'Quant au reste du peuple, ceux qui étaient restés dans la ville, ceux qui s''étaient rendus à lui – le reste du peuple, ceux qui étaient restés – Nebouzaradân, chef des gardes, les exila. '
