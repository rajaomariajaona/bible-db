document_id: JER.39
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La prise de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2R 25.1-21  ; cf. Jr 52
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 52.4-16 ; 2R 25.1-12 et les notes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dixième mois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : probablement décembre-janvier 589/8 av. J.-C. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nabuchodonosor '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'La neuvième année de Sédécias, roi de Juda, le dixième mois, Nabuchodonosor, roi de Babylone, vint avec toute son armée devant Jérusalem et l''assiégea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le neuvième jour du quatrième mois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : probablement fin juin 587 av. J.-C.'
    marker-yv: yv-n
  - type: text
    text: 'La onzième année de Sédécias, le neuvième jour du quatrième mois, une brèche fut ouverte dans la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vinrent s'asseoir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : position du juge ; 1.15+ ; cf. 26.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Samgar-Nebou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : par rapprochement avec des documents babyloniens on pourrait décomposer ce nom différemment et lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Nergal-Sarétser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', (prince) de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Samgar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(la ville de Sin-Magir), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebou-Sarsekim, chef des hauts fonctionnaires '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Rab-Saris, chef des eunuques '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '29.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; sur ce titre, cf. v. 13 ; Dn 1.3). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chef des mages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction conjecturale d''un autre titre babylonien ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rab-Mag
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Alors tous les princes du roi de Babylone vinrent s''asseoir à la porte du Milieu : Nergal-Sarétser, Samgar-Nebou, Sarsekim, chef des hauts fonctionnaires, Nergal-Sarétser, chef des mages, et tous les autres princes du roi de Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 4-13 sont absents de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jardin du Roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Né 3.15 ; Sédécias prend le chemin du sud ('
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la plaine aride
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ‘arava
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), à l'opposé de l'envahisseur babylonien (1.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Dès qu''ils les eurent vus, Sédécias, roi de Juda, et tous les hommes de guerre s''enfuirent et sortirent de la ville, de nuit, par le chemin du Jardin du Roi, par la porte entre les deux murs ; ils sortirent par le chemin de la plaine aride. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 44.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rattrapa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu est habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: atteindre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 42.16 ; Es 59.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ribla '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sur l''Oronte, à environ 80 km au sud de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hamath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dans le nord de la Syrie ; cf. 52.9.'
    marker-yv: yv-n
  - type: text
    text: 'Mais l''armée des Chaldéens les poursuivit et rattrapa Sédécias dans la plaine aride de Jéricho. Ils le prirent et le firent monter à Ribla, au pays de Hamath, devant Nabuchodonosor, roi de Babylone ; et celui-ci prononça des jugements contre lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi de Babylone fit égorger les fils de Sédécias sous ses yeux, à Ribla. Le roi de Babylone fit aussi égorger tous les notables de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: crever les yeux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : des bas-reliefs assyriens montrent Sargon crevant les yeux de prisonniers ; cf. Ez 12.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''emmener à Babylone '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 32.5.
    marker-yv: yv-n
  - type: text
    text: 'Puis il fit crever les yeux de Sédécias et le fit attacher avec des entraves de bronze, pour l''emmener à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux maisons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à la maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 6.5 ; 17.27 ; 52.13.'
    marker-yv: yv-n
  - type: text
    text: 'Les Chaldéens mirent le feu à la maison du roi et aux maisons du peuple, et ils démolirent les murailles de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le reste du peuple…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : au lieu de cette répétition, 52.15 porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le reste des artisans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nebouzaradân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 41.10 ; 52.12,30.'
    marker-yv: yv-n
  - type: text
    text: 'Quant au reste du peuple, ceux qui étaient restés dans la ville, ceux qui s''étaient rendus à lui – le reste du peuple, ceux qui étaient restés – Nebouzaradân, chef des gardes, les exila. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 40.7+.
    marker-yv: yv-n
  - type: text
    text: Mais les petites gens du peuple, ceux qui n'avaient rien, Nebouzaradân, chef des gardes, leur permit de rester au pays de Juda et il leur donna en ce jour-là des vignes et des champs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérémie est libéré
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nabuchodonosor, roi de Babylone, avait donné cet ordre au sujet de Jérémie par l''intermédiaire de Nebouzaradân, chef des gardes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 40.4.
    marker-yv: yv-n
  - type: text
    text: 'Prends-le, veille sur lui, ne lui fais aucun mal, mais agis à son égard comme il te dira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Nebouzaradân, chef des gardes, Neboushazbân, chef des hauts fonctionnaires, Nergal-Sarétser, chef des mages, et tous les chefs du roi de Babylone '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans la cour de la garde '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 15 ; 37.21+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Guedalia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Guedaliahou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon les passages)'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ', fils d''Ahiqam…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 26.24+ ; voir aussi 40.5s ; 2R 25.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour qu'il l'emmène chez lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour le faire sortir vers la maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 37.4.'
    marker-yv: yv-n
  - type: text
    text: envoyèrent prendre Jérémie dans la cour de la garde et le remirent à Guedalia, fils d'Ahiqam, fils de Shaphân, pour qu'il l'emmène chez lui. Et il resta au milieu du peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ebed-Mélek aura la vie sauve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 28.12s.
    marker-yv: yv-n
  - type: text
    text: 'La parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' parvint à Jérémie, pendant qu''il était détenu dans la cour de la garde : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '38.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 'ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: non pas pour son bonheur…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'non pas pour le bien, mais pour le mal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 21.10.
    marker-yv: yv-n
  - type: text
    text: 'Va, parle à Ebed-Mélek, le Koushite ; tu lui diras : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, le Dieu d''Israël : Je fais venir sur cette ville ce que j''ai prononcé, non pas pour son bonheur, mais pour son malheur ; cela arrivera en ce jour-là devant toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 20.13 ; Ps 37.40.
    marker-yv: yv-n
  - type: text
    text: 'Mais en ce jour-là je te délivrerai – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – et tu ne seras pas livré aux hommes qui t''effraient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ta vie sera ton butin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je te ferai échapper, et tu ne tomberas pas par l''épée ; ta vie sera ton butin, parce que tu as mis ta confiance en moi – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
