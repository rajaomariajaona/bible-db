document_id: JHN.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'arrestation de Jésus
  - type: text
    content: ' '
  - type: note
    content: 'Jésus sortit  : cf. 14.31. –  de l''autre côté de l''oued Cédron  : c.-à-d. sur le mont des Oliviers, cf. 2S 15.23 ; 1R 2.37 ; Jr 31.40 ; Mt 26.30-36/ /. Le mot grec traduit par oued est apparenté à celui qui signifie hiver (10.22) ; il désigne habituellement un torrent intermittent, qui coule surtout en hiver, et la vallée où il coule ; cf. Gn 26.17n.'
  - type: text
    content: Après avoir dit cela, Jésus sortit avec ses disciples pour aller de l'autre côté de l'oued Cédron, où se trouvait un jardin dans lequel il entra, lui et ses disciples.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Simon Pierre 1.40-42. –  épée Lc 22.36-38. –  esclave  : autre traduction serviteur . –  l''oreille  : autre traduction le lobe de l''oreille (Mc 14.47n).'
  - type: text
    content: 'Simon Pierre, qui avait une épée, la tira, frappa l''esclave du grand prêtre et lui trancha l''oreille droite. Le nom de l''esclave était Malchos. '
  '11':
  - type: note
    content: 'Mt 26.52. –  La coupe  : cf. 12.27 ; Mt 20.22s ; 26.32/ / ; voir aussi Es 51.17,22 ; Jr 25.15,17,28 ; 49.12 ; Ez 23.31s ; Lm 4.21.'
  - type: text
    content: 'Jésus dit à Pierre : Remets ton épée dans son fourreau. La coupe que le Père m''a donnée, ne la boirai-je pas ?'
  - type: heading
    content: Jésus devant Anne
  - type: heading
    content: Mt 26.57-58  ; Mc 14.53-54  ; Lc 22.54
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'le tribun militaire  : c''est normalement le titre d''un officier romain (voir Ac 21.31n) ; certains pensent cependant qu''il s''agirait ici du commandant de la garde juive du temple (cf. v. 3n).'
  - type: text
    content: 'La cohorte, le tribun militaire et les gardes des Juifs s''emparèrent alors de Jésus et le lièrent. '
  '13':
  - type: note
    content: Anne avait été grand prêtre jusqu'en l'an 15 apr. J.-C., où il avait été destitué par le procurateur romain et remplacé par Caïphe  ; il exerçait toujours une grande influence sur les décisions du sanhédrin ; cf. Mt 26.3+ ; Lc 3.2 ; Ac 4.6.
  - type: text
    content: 'Ils le conduisirent d''abord à Anne : c''était le beau-père de Caïphe, qui était grand prêtre cette année-là, '
  '14':
  - type: note
    content: 11.49ss.
  - type: text
    content: 'ce Caïphe qui avait donné aux Juifs le conseil suivant : « Il est avantageux qu''un seul homme meure pour le peuple. »'
  - type: heading
    content: Pierre nie être disciple de Jésus
  - type: heading
    content: Mt 26.69-70  ; Mc 14.66-68  ; Lc 22.55-57
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 26.69-70/ /. –  un autre disciple  : cf. v. 16 ; d''après 20.2-4 beaucoup l''identifient à celui que Jésus aimait , 13.23+. –  grand prêtre  : cf. 11.49 ; Lc 3.2n. –  dans le palais ou dans la cour  ; voir Mt 26.3n.'
  - type: text
    content: 'Simon Pierre, ainsi qu''un autre disciple, suivait Jésus. Ce disciple était connu du grand prêtre, et il entra avec Jésus dans le palais du grand prêtre ; '
  '16':
  - type: text
    content: 'Pierre, lui, se tenait dehors, près de la porte. L''autre disciple, celui qui était connu du grand prêtre, sortit, parla à la gardienne de la porte et fit entrer Pierre. '
  '17':
  - type: note
    content: 'Je ne le suis pas  : litt. je ne suis pas, comme en 1.20s ; cf. 4.26n  ; voir 13.36-38 ; 18.25-27 ; 21.15-17.'
  - type: text
    content: 'Alors la servante qui gardait la porte dit à Pierre : N''es-tu pas, toi aussi, l''un des disciples de cet homme ? Il dit : Je ne le suis pas. '
  '18':
  - type: note
    content: 'un feu de braises  : cf. 21.9.'
  - type: text
    content: Les esclaves et les gardes se tenaient là ; ils avaient fait un feu de braises, car il faisait froid, et ils se chauffaient. Pierre aussi se tenait avec eux et se chauffait.
  - type: heading
    content: Le grand prêtre interroge Jésus
  - type: heading
    content: Mt 26.59-66  ; Mc 14.55-64  ; Lc 22.66-71
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 26.55s,59-66/ /.
  - type: text
    content: 'Le grand prêtre interrogea Jésus sur ses disciples et sur son enseignement. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'qui le livrait  : autre traduction qui allait le livrer  ; même expression v. 5 ; 6.64+. –  souvent réunis Lc 21.37.'
  - type: text
    content: Judas, qui le livrait, connaissait le lieu, parce que Jésus et ses disciples s'y étaient souvent réunis.
  - type: heading
    content: Mt 26.47-56  ; Mc 14.43-50  ; Lc 22.47-53
  '20':
  - type: note
    content: 'parlé et dit traduisent le même verbe grec. –  ouvertement 7.4n,26 ; cf. Es 45.19 ; 48.16 ; Ac 26.26. –  synagogue 6.59 ; cf. Mt 4.23. –  temple 5.14 ; 7.14,28 ; 10.22s ; Lc 19.47. –  Juifs  : cf. 1.19n.'
  - type: text
    content: 'Jésus lui répondit : Moi, j''ai parlé ouvertement au monde ; j''ai toujours enseigné dans la synagogue et dans le temple, là où tous les Juifs se rassemblent, et je n''ai rien dit en secret. '
  '21':
  - type: note
    content: Cf. 7.51.
  - type: text
    content: 'Pourquoi m''interroges-tu ? Ce dont j''ai parlé, demande-le à ceux qui m''ont entendu ; ils savent bien, eux, ce que, moi, j''ai dit ! '
  '22':
  - type: note
    content: gifle 19.3 ; cf. Mt 26.67/ / ; Ex 22.27 ; Ac 23.2-5.
  - type: text
    content: 'A ces mots, un des gardes qui étaient là donna une gifle à Jésus, en disant : Est-ce ainsi que tu réponds au grand prêtre ? '
  '23':
  - type: note
    content: '8.46 ; cf. Mt 5.39. –  Si j''ai mal parlé…  : autre traduction si j''ai tort… si j''ai raison… (expressions analogues en 4.17 ; 8.48 ; 13.13). –  prouve-le  : litt. témoigne du mal (que j''ai dit).'
  - type: text
    content: 'Jésus lui répondit : Si j''ai mal parlé, prouve-le ; et si j''ai bien parlé, pourquoi me bats-tu ? '
  '24':
  - type: note
    content: V. 13n.
  - type: text
    content: Alors Anne l'envoya, lié, à Caïphe, le grand prêtre.
  - type: heading
    content: Pierre renie de nouveau Jésus
  - type: heading
    content: Mt 26.71-75  ; Mc 14.69-72  ; Lc 22.58-62
  '25':
  - type: text
    content: ' '
  - type: note
    content: V. 15-18 ; Mt 26.69-75/ /.
  - type: text
    content: 'Simon Pierre se tenait là et se chauffait. On lui dit : N''es-tu pas, toi aussi, l''un de ses disciples ? Il le nia en disant : Je ne le suis pas. '
  '26':
  - type: note
    content: 'V. 1,10. –  grand prêtre  : cf. 11.49 ; Lc 3.2n.'
  - type: text
    content: 'Un des esclaves du grand prêtre, qui était parent de celui à qui Pierre avait tranché l''oreille, dit : Ne t''ai-je pas vu, moi, dans le jardin, avec lui ? '
  '27':
  - type: note
    content: 13.36-38.
  - type: text
    content: Pierre le nia encore. Et aussitôt un coq chanta.
  - type: heading
    content: Jésus devant Pilate
  - type: heading
    content: Mt 27.1-2,11-14  ; Mc 15.1-5  ; Lc 23.1-5
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'au prétoire  : résidence officielle du gouverneur ou procurateur romain. –  ne pas se souiller  : cf. Ac 10.28 ; 11.3 ; voir aussi Mt 8.8/ / ; voir aussi pur, impur. –  manger la Pâque  : cf. 19.14 ; voir calendrier et fêtes.'
  - type: text
    content: De chez Caïphe, ils emmènent Jésus au prétoire ; c'était le matin. Ils n'entrèrent pas eux-mêmes dans le prétoire, afin de ne pas se souiller et de pouvoir manger la Pâque.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Pilate  : voir Mt 27.2n.'
  - type: text
    content: 'Pilate sortit vers eux et dit : Quelle accusation portez-vous contre cet homme ? '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'la cohorte  : le terme grec désigne habituellement la cohorte romaine, d''environ six cents hommes, et parfois une unité inférieure (« manipule ») d''environ deux cents hommes ; l''emploi de ce mot suggère naturellement un détachement de soldats romains ; selon certains, il s''agirait cependant de la garde juive du temple  ; voir aussi v. 12n  ; Mt 27.27/ / ; Ac 21.31 ; 23.23. –  gardes 7.32+. –  grands prêtres / pharisiens 7.32+ ; voir aussi Mt 2.4n.'
  - type: text
    content: 'Judas, donc, qui avait emmené la cohorte et des gardes fournis par les grands prêtres et par les pharisiens, arrive là avec des torches, des lanternes et des armes. '
  '30':
  - type: note
    content: 'malfaisant  : certains mss portent un malfaiteur  ; cf. 7.48.'
  - type: text
    content: 'Ils lui répondirent : Si cet individu n''était pas malfaisant, nous ne te l''aurions pas livré. '
  '31':
  - type: note
    content: '19.6s ; cf. Ac 18.15. –  Il ne nous est pas permis…  : quelques-uns pensent que cette règle était limitée à certains crimes ou à certains types d''exécution (comparer avec 8.1-11,59+) ; cf. v. 32 ; 19.6 ; Ac 7.57ss.'
  - type: text
    content: 'Pilate leur dit donc : Prenez-le vous-mêmes, et jugez-le selon votre loi ! Les Juifs lui dirent : Il ne nous est pas permis de tuer quelqu''un ! '
  '32':
  - type: note
    content: 'de quelle mort…  : le texte fait selon toute vraisemblance allusion au supplice romain de la crucifixion ; cependant, à d''autres époques au moins, la crucifixion a aussi été pratiquée par les Juifs ; voir 3.14+ ; 12.32-33n  ; voir aussi Mt 20.19.'
  - type: text
    content: – cela afin que s'accomplisse la parole que Jésus avait dite, pour signifier de quelle mort il allait mourir.
  '33':
  - type: text
    content: ' '
  - type: note
    content: prétoire v. 28n. –  roi (6.15+) des Juifs v. 39 ; 19.14s,19-22 ; Mt 27.11/ /.
  - type: text
    content: 'Pilate rentra dans le prétoire, appela Jésus et lui dit : Es-tu le roi des Juifs, toi ? '
  '34':
  - type: text
    content: 'Jésus répondit : Est-ce de toi-même que tu dis cela, ou bien est-ce d''autres qui te l''ont dit de moi ? '
  '35':
  - type: note
    content: 'Cf. 1.11. –  grands prêtres  : cf. Mt 2.4n  ; Mc 11.18n.'
  - type: text
    content: 'Pilate répondit : Suis-je donc juif, moi ? C''est ta nation et les grands prêtres qui t''ont livré à moi ! Qu''as-tu fait ? '
  '36':
  - type: note
    content: 'royauté  : le mot grec signifie également royaume ou règne  ; cf. 3.3nss ; Mt 3.2n. –  pas de ce monde 1.10n  ; 8.23+. –  Si…  : cf. Mt 26.53. –  mes gens  : le même mot est traduit par gardes au v. 3 ; cf. 7.32+. –  en fait  : litt. maintenant.'
  - type: text
    content: 'Jésus répondit : Ma royauté n''est pas de ce monde. Si ma royauté était de ce monde, mes gens auraient combattu pour que je ne sois pas livré aux Juifs ; en fait ma royauté n''est pas d''ici. '
  '37':
  - type: note
    content: 'que je suis roi 6.15+. –  roi / vérité  : cf. 2S 14.17-20. –  venu dans le monde 1.9+. –  témoignage à la vérité 5.33 ; cf. 1.18 ; 3.11,32s ; 8.32+ ; voir aussi 1Tm 6.13. –  Quiconque est de la vérité  : cf. 3.21 ; 17.6+ ; voir 1Jn 3.19. –  entend (autre traduction écoute) ma voix 10.3+.'
  - type: text
    content: 'Pilate lui dit : Toi, tu es donc roi ? Jésus répondit : C''est toi qui dis que je suis roi. Moi, si je suis né et si je suis venu dans le monde, c''est pour rendre témoignage à la vérité. Quiconque est de la vérité entend ma voix. '
  '38':
  - type: note
    content: Cf. Ac 24.25 ; 26.28. –  il sortit de nouveau… v. 29 ; 19.4 ; Mt 27.15-23/ /.
  - type: text
    content: 'Pilate lui dit : Qu''est-ce que la vérité ?'
  - type: heading
    content: Jésus est condamné à mort
  - type: heading
    content: Mt 27.15-31  ; Mc 15.6-20  ; Lc 23.13-25
  - type: text
    content: 'Après avoir dit cela, il sortit de nouveau vers les Juifs et leur dit : Moi, je ne trouve aucun motif de condamnation en lui. '
  '39':
  - type: note
    content: 'décidez…  : autre traduction souhaitez-vous donc que je vous relâche… Jn emploie un autre verbe grec que Mc 15.9/ /. –  roi des Juifs v. 33+.'
  - type: text
    content: 'Comme il est d''usage chez vous que je vous relâche quelqu''un pour la Pâque, décidez donc : vous relâcherai-je le roi des Juifs ? '
  '4':
  - type: note
    content: 'sachant tout… 13.1+ ; cf. 12.20-28 ; 19.28. –  ce qui allait lui arriver  : litt. ce qui venait sur lui. –  s''avança  : litt. sortit  ; cf. 10.18.'
  - type: text
    content: 'Jésus, sachant tout ce qui allait lui arriver, s''avança et leur dit : Qui cherchez-vous ? '
  '40':
  - type: note
    content: 'un bandit  : comme en 10.1,8 ; le terme a souvent qualifié les sicaires ou les zélotes en révolte contre le joug romain ; cf. Ac 3.14.'
  - type: text
    content: 'Alors ils se remirent à crier : Pas cet individu, mais Barabbas ! Or Barabbas était un bandit.'
  '5':
  - type: note
    content: 'Jésus le Nazoréen v. 7 ; 19.19 ; voir Mt 2.23n. –  C''est moi  : litt. je suis (voir 4.26n), de même dans la suite.'
  - type: text
    content: 'Ils lui répondirent : Jésus le Nazoréen. Il leur dit : C''est moi. Judas, qui le livrait, se tenait avec eux. '
  '6':
  - type: note
    content: Cf. 7.46 ; Ex 19.22 ; 2S 6.7. –  C'est moi 4.26n  ; 8.24n. –  ils reculèrent 6.66n.
  - type: text
    content: 'Lorsqu''il leur dit : « C''est moi », ils reculèrent et tombèrent par terre.'
  '7':
  - type: text
    content: 'Il leur demanda de nouveau : Qui cherchez-vous ? Et ils dirent : Jésus le Nazoréen. '
  '8':
  - type: text
    content: 'Jésus répondit : Je vous l''ai dit, c''est moi. Si donc c''est moi que vous cherchez, laissez-les s''en aller. '
  '9':
  - type: note
    content: 6.39+ ; 10.28 ; 17.12.
  - type: text
    content: 'C''était pour que s''accomplisse la parole qu''il avait dite : « Je n''ai perdu aucun de ceux que tu m''as donnés. »'
