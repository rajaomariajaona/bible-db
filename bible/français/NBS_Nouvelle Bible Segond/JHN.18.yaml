document_id: JHN.18,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'arrestation de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jésus sortit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 14.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'autre côté de l'oued Cédron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. sur le mont des Oliviers, cf. 2S 15.23 ; 1R 2.37 ; Jr 31.40 ; Mt 26.30-36/ /. Le mot grec traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'oued '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est apparenté à celui qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'hiver '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (10.22) ; il désigne habituellement un torrent intermittent, qui coule surtout en hiver, et la vallée où il coule ; cf. Gn 26.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Après avoir dit cela, Jésus sortit avec ses disciples pour aller de l'autre côté de l'oued Cédron, où se trouvait un jardin dans lequel il entra, lui et ses disciples.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Simon Pierre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.40-42. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'épée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lc 22.36-38. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: esclave
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'oreille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le lobe de l''oreille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Mc 14.47
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Simon Pierre, qui avait une épée, la tira, frappa l''esclave du grand prêtre et lui trancha l''oreille droite. Le nom de l''esclave était Malchos. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 26.52. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La coupe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.27 ; Mt 20.22s ; 26.32/ / ; voir aussi Es 51.17,22 ; Jr 25.15,17,28 ; 49.12 ; Ez 23.31s ; Lm 4.21.'
      marker-yv: yv-n
    - type: text
      text: 'Jésus dit à Pierre : Remets ton épée dans son fourreau. La coupe que le Père m''a donnée, ne la boirai-je pas ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant Anne
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 26.57-58  ; Mc 14.53-54  ; Lc 22.54
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le tribun militaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c''est normalement le titre d''un officier romain (voir Ac 21.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; certains pensent cependant qu''il s''agirait ici du commandant de la garde '
        - type: usfm
          marker: w
          children:
          - type: text
            text: juive
        - type: text
          text: ' du temple (cf. v. 3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'La cohorte, le tribun militaire et les gardes des Juifs s''emparèrent alors de Jésus et le lièrent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Anne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'avait été grand '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' jusqu''en l''an 15 apr. J.-C., où il avait été destitué par le procurateur romain et remplacé par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Caïphe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il exerçait toujours une grande influence sur les décisions du sanhédrin ; cf. Mt 26.3+ ; Lc 3.2 ; Ac 4.6.'
      marker-yv: yv-n
    - type: text
      text: 'Ils le conduisirent d''abord à Anne : c''était le beau-père de Caïphe, qui était grand prêtre cette année-là, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.49ss.
      marker-yv: yv-n
    - type: text
      text: 'ce Caïphe qui avait donné aux Juifs le conseil suivant : « Il est avantageux qu''un seul homme meure pour le peuple. »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre nie être disciple de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 26.69-70  ; Mc 14.66-68  ; Lc 22.55-57
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 26.69-70/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un autre disciple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 16 ; d''après 20.2-4 beaucoup l''identifient à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: celui que Jésus aimait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 13.23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grand '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 11.49 ; Lc 3.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans le palais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la cour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; voir Mt 26.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Simon Pierre, ainsi qu''un autre disciple, suivait Jésus. Ce disciple était connu du grand prêtre, et il entra avec Jésus dans le palais du grand prêtre ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Pierre, lui, se tenait dehors, près de la porte. L''autre disciple, celui qui était connu du grand prêtre, sortit, parla à la gardienne de la porte et fit entrer Pierre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je ne le suis pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je ne suis pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 1.20s ; cf. 4.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir 13.36-38 ; 18.25-27 ; 21.15-17.'
      marker-yv: yv-n
    - type: text
      text: 'Alors la servante qui gardait la porte dit à Pierre : N''es-tu pas, toi aussi, l''un des disciples de cet homme ? Il dit : Je ne le suis pas. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un feu de braises
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.9.'
      marker-yv: yv-n
    - type: text
      text: Les esclaves et les gardes se tenaient là ; ils avaient fait un feu de braises, car il faisait froid, et ils se chauffaient. Pierre aussi se tenait avec eux et se chauffait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le grand prêtre interroge Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 26.59-66  ; Mc 14.55-64  ; Lc 22.66-71
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Mt 26.55s,59-66/ /.
      marker-yv: yv-n
    - type: text
      text: 'Le grand prêtre interrogea Jésus sur ses disciples et sur son enseignement. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui le livrait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui allait le livrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; même expression v. 5 ; 6.64+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'souvent réunis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lc 21.37.
      marker-yv: yv-n
    - type: text
      text: Judas, qui le livrait, connaissait le lieu, parce que Jésus et ses disciples s'y étaient souvent réunis.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 26.47-56  ; Mc 14.43-50  ; Lc 22.47-53
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parlé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent le même verbe grec. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ouvertement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',26 ; cf. Es 45.19 ; 48.16 ; Ac 26.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'synagogue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.59 ; cf. Mt 4.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.14 ; 7.14,28 ; 10.22s ; Lc 19.47. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus lui répondit : Moi, j''ai parlé ouvertement au monde ; j''ai toujours enseigné dans la synagogue et dans le temple, là où tous les Juifs se rassemblent, et je n''ai rien dit en secret. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 7.51.
      marker-yv: yv-n
    - type: text
      text: 'Pourquoi m''interroges-tu ? Ce dont j''ai parlé, demande-le à ceux qui m''ont entendu ; ils savent bien, eux, ce que, moi, j''ai dit ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gifle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.3 ; cf. Mt 26.67/ / ; Ex 22.27 ; Ac 23.2-5.
      marker-yv: yv-n
    - type: text
      text: 'A ces mots, un des gardes qui étaient là donna une gifle à Jésus, en disant : Est-ce ainsi que tu réponds au grand prêtre ? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.46 ; cf. Mt 5.39. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si j'ai mal parlé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'si j''ai tort… si j''ai raison… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(expressions analogues en 4.17 ; 8.48 ; 13.13). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prouve-le
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: témoigne du mal (que j'ai dit).
      marker-yv: yv-n
    - type: text
      text: 'Jésus lui répondit : Si j''ai mal parlé, prouve-le ; et si j''ai bien parlé, pourquoi me bats-tu ? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Alors Anne l'envoya, lié, à Caïphe, le grand prêtre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre renie de nouveau Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
