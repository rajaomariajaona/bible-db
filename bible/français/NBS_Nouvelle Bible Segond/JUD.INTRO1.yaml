document_id: JUD.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''épître de Jude est l''un des plus '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: courts écrits
    - type: text
      text: ' de toute la Bible. Elle dépasse de peu Philémon et Abdias.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Son message, pour autant, ne manque ni de densité, ni d''originalité. Certes, la Seconde de Pierre offre un certain nombre de points communs avec Jude, mais il semble établi que l''antériorité appartient à Jude (voir « La Seconde de Pierre et Jude : quelques éléments de comparaison », p. xxx).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Qui est ce '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Judas
    - type: text
      text: ' que l''on a coutume d''appeler '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Jude,
    - type: text
      text: ' pour le distinguer du traître ? La notice du v. 1 vise manifestement à situer l''auteur dans le sillage des grands responsables de l''Eglise primitive (cf. Ac 15.13 ; Ga 2.9). Etait-il membre du groupe des Douze ? Une certaine lecture de l''expression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judas de Jacques
    - type: text
      text: ' (Lc 6.16) pourrait donner à le penser, si on la traduit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judas, frère de Jacques
    - type: text
      text: .
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Cette idée se heurte à deux objections tirées du texte même de l''épître de Jude. En effet, l''auteur se désigne lui-même comme '
    - type: usfm
      marker: it
      children:
      - type: text
        text: esclave de Jésus-Christ
    - type: text
      text: ' (v. 1) et non comme apôtre. Si l''on se souvient de l''extrême importance attachée à ce dernier titre par ceux qui pouvaient légitimement s''en réclamer (cf. Ga 1.1 ; Ac 20.24), il serait bien étonnant que Judas, s''il avait été apôtre, ait omis de le signaler au début de sa lettre. Par ailleurs, la manière dont il se réfère aux apôtres dénote de sa part une certaine distance par rapport à eux (Jd 17s).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La meilleure piste est encore celle qui nous est offerte en Marc 6.3 : Judas pourrait être, tout comme le Jacques auquel est attribuée l''épître du même nom, l''un des frères du Seigneur.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: destinataires
    - type: text
      text: ' sont évidemment chrétiens (v. 1). Mais appartiennent-ils à une communauté locale bien définie, ou à un groupe d''Eglises en butte aux mêmes difficultés ? Rien, dans le texte, ne permet de l''affirmer. De même, il ne faut pas se hâter de les ranger parmi les chrétiens d''origine païenne plutôt que juive, car il y a des arguments dans les deux sens : les non-Juifs semblent davantage exposés aux aventures de l''immoralité, n''ayant jamais reçu l''éducation morale du judaïsme ; cependant la surabondance des allusions à la littérature juive s''accommode mal d''un groupe d''origine païenne.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’
    - type: usfm
      marker: bd
      children:
      - type: text
        text: objet
    - type: text
      text: ' de l''épître est bien précis et concerne toutes les époques, jusqu''à la nôtre. Il est bien établi en effet que des Eglises naissent là où la foi et la tradition des apôtres ont été transmises une fois pour toutes (v. 17s et 3-5). Malheureusement il arrive assez souvent que des prédicateurs itinérants s''infiltrent dans les communautés pour y dispenser un enseignement nouveau et pervers. Le cas s''est produit chez les Galates (Ga 2.4 ; 3.1) ; selon les Actes des Apôtres, Paul l''annonçait aux Ephésiens dans le discours de Milet (Ac 20.29) ; cela s''est produit à Corinthe (2 Co 10.12) ; cela se perpétue autour de Judas et des siens.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Certes, la fausse doctrine ainsi véhiculée n''est pas toujours la même, mais les procédés sont identiques. La grâce de Dieu en Jésus-Christ est pervertie. Des '
    - type: usfm
      marker: it
      children:
      - type: text
        text: êtres animaux
    - type: text
      text: ' (« psychiques », v. 19'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ') l''ont convertie en débauche (v. 4) : ils enseignent l''impiété, c''est-à-dire le processus qui va de la foi consciente et réfléchie au reniement de cette même foi au nom de principes qui la dénaturent.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La démonstration qui constitue la partie centrale de l''épître procède par énoncés de preuves scripturaires (ou littéraires) suivis d''une violente diatribe contre les impies actuels (voir ci-contre « Le cœur de l''épître de Jude : une analyse structurelle »).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La place occupée dans cette épître par la littérature dite « intertestamentaire » est considérable. Cette familiarité avec des écrits théologiques peu fréquentés par les autres auteurs du Nouveau Testament lui a valu d''être longtemps rejetée du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: canon
    - type: text
      text: '. C''est naturellement le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Livre d'Hénoch
    - type: text
      text: ' ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: 1 Hénoch
    - type: text
      text: ), expressément cité au v. 14, qui a le plus retenu l'attention. De nos jours, on ne s'offusque plus de ces références à ce qui était, après tout, de la littérature d'édification.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: conclusion
    - type: text
      text: ' de l''épître de Jude s''ouvre au v. 17, qui rappelle les propos du v. 3. Que l''on retourne aux apôtres (c.-à-d. au Nouveau Testament en train de se constituer), et tout ira bien.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: On aurait tort de rester sur le goût amer de la polémique en quittant cette épître. L'auteur exhorte à la compassion et incite bien davantage à condamner les idées fausses que les personnes. Toutes les condamnations qu'il évoque sont en réalité un ultime effort pour faire changer d'avis, donc de cœur, et pour convertir à la vérité du Christ.
