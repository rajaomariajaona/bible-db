document_id: ECC.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Maximes et réflexions de la sagesse
  - type: text
    content: ' '
  - type: note
    content: 'On a rapproché les sept paradoxes qui suivent des quatorze antithèses de 3.2-8. – Les termes correspondant à nom (qui peut aussi avoir le sens de renommée ) et huile (cf. Ct 1.3n) font assonance en hébreu ; par ailleurs le même mot hébreu est rendu par Mieux vaut et parfumée (litt. bonne  ; cf. 2R 20.13 ; Ps 133.2) : hébreu tov shem mishémên tov. Cf. Pr 22.1 ; Siracide 41.12s : « Préoccupe-toi de ton nom car il te survivra plus que mille monceaux d''or. Une vie heureuse ne dure qu''un nombre limité de jours, mais la bonne renommée demeure à jamais. » –  le jour de la mort  : cf. v. 8.'
  - type: text
    content: Mieux vaut un nom que de l'huile parfumée
  - type: text
    content: – et le jour de la mort que le jour de la naissance.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.11 ; Siracide 39.34 : « Il n''y a pas lieu de dire : ceci est pire que cela, car toute chose, en son temps, sera reconnue bonne. »'
  - type: text
    content: 'Ne dis pas : « Pourquoi les jours passés étaient-ils meilleurs que ceux-ci ? »'
  - type: text
    content: Car ce n'est pas la sagesse qui te ferait poser cette question.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Autre traduction avec (ou comme ) un patrimoine, la sagesse est bonne ; elle reste (cf. 1.3n) à ceux qui voient le soleil  ; cf. 9.18 ; Pr 16.16.
  - type: text
    content: La sagesse vaut un patrimoine,
  - type: text
    content: elle est un avantage pour ceux qui voient le soleil.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'l''avantage 1.3n. –  des sages  : litt. de ses maîtres, de ceux qui la possèdent , pluriel du terme hébreu ba`al  ; cf. 8.8n,13 ; Pr 3.18.'
  - type: text
    content: Car à l'ombre de la sagesse on est comme à l'ombre de l'argent ;
  - type: text
    content: l'avantage de la connaissance, c'est que la sagesse assure la vie des sages.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.15.
  - type: text
    content: 'Regarde l''œuvre de Dieu :'
  - type: text
    content: qui pourra redresser ce qu'il a courbé ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu a fait l''un… comme l''autre Es 45.7 ; Jb 2.10. –  ne trouve  : cf. v. 24ss ; 3.11n. –  de son avenir  : litt. après lui , 3.22+.'
  - type: text
    content: Au jour du bonheur, sois heureux,
  - type: text
    content: 'et au jour du malheur, regarde :'
  - type: text
    content: Dieu a fait l'un exactement comme l'autre,
  - type: text
    content: de telle sorte que l'être humain ne trouve rien de son avenir.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'mes jours futiles  : cf. 6.12+. –  par sa justice / par sa méchanceté  : autre traduction dans sa justice / dans sa méchanceté  ; cf. 3.17 ; 8.12-14 ; 9.2 ; cf. Ps 37. –  son existence  : sous-entendu dans le texte.'
  - type: text
    content: J'ai vu tout cela pendant mes jours futiles.
  - type: text
    content: Il y a tel juste qui disparaît par sa justice,
  - type: text
    content: et tel méchant qui prolonge son existence par sa méchanceté.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'te détruirais-tu  : le même verbe est habituellement traduit par dévaster  ; cf. Jr 18.16n.'
  - type: text
    content: Ne sois pas juste à l'excès
  - type: text
    content: 'et ne te montre pas trop sage : pourquoi te détruirais-tu ?'
  '17':
  - type: text
    content: Ne sois pas méchant à l'excès,
  - type: text
    content: 'ne sois pas fou : pourquoi mourrais-tu avant ton temps ?'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'sans laisser échapper  : litt. et que tu ne relâches pas ta main de. –  qui craint Dieu 3.14+. –  trouve une issue…  : autre traduction mène tout à terme.'
  - type: text
    content: Il est bon que tu retiennes ceci sans laisser échapper cela ;
  - type: text
    content: car celui qui craint Dieu trouve une issue en toutes situations.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.14-16. –  rend le sage plus fort  : autre traduction, d''après LXX et un ms de Qumrân, est plus utile au sage  ; cf. Pr 21.22 ; 24.5.'
  - type: text
    content: La sagesse rend le sage plus fort que dix gouverneurs dans une ville.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 90.12. –  doit y réfléchir  : litt. donne à son cœur.'
  - type: text
    content: Mieux vaut aller à la maison de deuil que d'aller à la maison de banquet ;
  - type: text
    content: c'est dans celle-là que se trouve la fin de tout être humain,
  - type: text
    content: et le vivant doit y réfléchir.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 1R 8.46 ; Ps 130.3 ; 143.2 ; Jb 4.17 ; 14.4 ; Pr 20.9 ; Rm 3.10  ; 1Jn 1.8s.
  - type: text
    content: Il n'y a pas sur la terre de juste qui fasse le bien sans pécher.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Ne prête pas attention  : litt. ne donne pas ton cœur  ; cf. 1.13n. –  que tu n''entendes…  : cf. 10.20. –  te maudire  : autre traduction dire du mal de toi  ; voir bénédiction.'
  - type: text
    content: 'Ne prête pas attention à toutes les paroles qu''on dit, de peur que tu n''entendes ton serviteur te maudire ; '
  '22':
  - type: note
    content: Jc 3.2,9.
  - type: text
    content: car tu sais bien que tu en as toi-même maudit d'autres.
  - type: heading
    content: Peu de gens parviennent à la sagesse
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jb 28.12+.
  - type: text
    content: Tout cela, je l'ai mis à l'épreuve par la sagesse.
  - type: text
    content: 'J''ai dit : « J''aurai de la sagesse »,'
  - type: text
    content: mais elle reste loin de moi.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'ce qui est  : autre traduction ce qui a été , cf. 1.9 ; 3.15n. –  le trouver v. 14+.'
  - type: text
    content: Lointain est ce qui est ; profond, profond ; qui peut le trouver ?
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Je me suis appliqué  : litt. je me suis tourné (cf. 2.20n) , moi et mon cœur  ; cf. 1.13n. –  explorer 1.13n. –  raison v. 27,29n  ; 9.10. –  à savoir…  : autre traduction à connaître la méchanceté, l''insanité, la folie et la démence.'
  - type: text
    content: Je me suis appliqué à savoir, à explorer et à chercher la sagesse et la raison,
  - type: text
    content: à savoir que la méchanceté est stupide, et la folie démente.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'plus amer que la mort  : cf. 1S 15.32. –  la femme, qui est un piège  : on pourrait aussi comprendre la femme qui est un piège (c.-à-d. une femme mauvaise, celle qui est un piège… ). Un texte babylonien qui rapporte le dialogue d''un maître et de son esclave, plaçant dans la bouche de ce dernier un enseignement de sagesse paradoxale, lui fait dire cette parole (§ 8) : « N''aime pas, mon maître, n''aime pas. La femme est un puits [un puits, un trou, une fosse]. La femme est un poignard de fer aiguisé pour trancher la gorge de l''homme. » Cf. Gn 39.7-20 ; Jg 16.5ss,16 ; Pr 2.16-19 ; 5.3-14 ; Siracide 42.14 : « Mieux vaut la méchanceté d''un homme que la bonté d''une femme. » – Voir cœur. –  le pécheur… Pr 22.14.'
  - type: text
    content: 'Or j''ai trouvé plus amer que la mort :'
  - type: text
    content: la femme, qui est un piège,
  - type: text
    content: dont le cœur est un filet et dont les mains sont des liens ;
  - type: text
    content: celui qui plaît à Dieu lui échappe,
  - type: text
    content: mais le pécheur sera pris par elle.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'dit  : le verbe hébreu est ici au féminin, contrairement à 12.8 ( Qohéleth peut être lu comme un mot féminin ; cf. 1.1n). –  en les considérant une à une  : autre traduction en considérant une chose après l''autre.'
  - type: text
    content: Voilà ce que j'ai trouvé, dit Qohéleth,
  - type: text
    content: en les considérant une à une pour en trouver la raison ;
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai trouvé…  : autre traduction j''ai trouvé un être humain (digne de ce nom, cf. Pr 20.6) sur mille, mais parmi tous ceux-là je n''ai pas trouvé de femme  ; cf. Pr 31.10 ; Ct 6.9n.'
  - type: text
    content: je cherche encore, et je n'ai pas trouvé.
  - type: text
    content: J'ai trouvé un homme entre mille ;
  - type: text
    content: mais une femme entre elles toutes, je ne l'ai pas trouvée.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu a fait les humains (litt. l''humain , hébreu ’adam ) droits  : cf. 3.11 ; Gn 1.31. –  subtilités  : le même terme hébreu apparaît en 2Ch 26.15 avec le sens d’ inventions, machines (de guerre) ; c''est le pluriel du mot traduit par raison au v. 25+. Cf. Gn 3 ; Siracide 15.11,14 : « Ne dis pas : “C''est à cause du Seigneur que je me suis écarté”, car ce qu''il déteste, il ne le fait pas (…). Lui-même a créé l''homme au commencement et l''a laissé à son propre conseil. »'
  - type: text
    content: 'Voilà seulement ce que j''ai trouvé :'
  - type: text
    content: c'est que Dieu a fait les humains droits ;
  - type: text
    content: mais eux ont cherché bien des subtilités.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'contrariété 1.18+. –  avec un visage triste…  : litt. un mauvais visage fait du bien au cœur  ; selon les divers sens du mot hébreu correspondant à cœur , la formule peut signifier (paradoxalement) on a le cœur content (cf. 9.7 ; 11.9) ou bien on pense mieux (le cœur étant vu comme le siège de la réflexion) ; cf. Pr 14.13 ; voir aussi Ps 126.5 ; Mt 5.4 ; Lc 6.21,25.'
  - type: text
    content: Mieux vaut la contrariété que le rire,
  - type: text
    content: car avec un visage triste le cœur devient meilleur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: stupides 2.14+.
  - type: text
    content: Le cœur des sages est dans la maison de deuil ;
  - type: text
    content: le cœur des gens stupides dans la maison de joie.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 141.5 ; Pr 27.5s. –  reproches Pr 13.1n.
  - type: text
    content: Mieux vaut écouter les reproches d'un sage
  - type: text
    content: qu'être homme à écouter la chanson des gens stupides.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Litt. comme le bruit des épines…  ; il y a assonance en hébreu entre les mots épines ( sirim ) et marmite ( sir ) ; cf. Ps 58.10 ; 118.12.
  - type: text
    content: Comme les épines qui crépitent sous la marmite,
  - type: text
    content: tel est le rire des gens stupides.
  - type: text
    content: C'est encore là une futilité.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'fait du sage un fou  : autre traduction fait perdre la tête au sage  ; cf. Es 44.25. –  les cadeaux ou les pots-de-vin  ; cf. Ex 23.8 ; Mi 7.3 ; Ps 15.5 ; Pr 15.27. –  la raison  : litt. le cœur.'
  - type: text
    content: L'oppression fait du sage un fou ;
  - type: text
    content: les cadeaux font perdre la raison.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'la fin d''une chose ou l''aboutissement d''une affaire  ; cf. 10.13. –  un esprit patient…  : litt. longueur d''esprit que hauteur d''esprit.'
  - type: text
    content: Mieux vaut la fin d'une chose que son commencement ;
  - type: text
    content: mieux vaut un esprit patient qu'un esprit hautain.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'contrariété  : cf. 1.18n  ; voir aussi Pr 14.29 ; 22.24s ; Jc 1.19s.'
  - type: text
    content: Ne te presse pas d'être contrarié dans ton esprit,
  - type: text
    content: car c'est sur le sein des gens stupides que repose la contrariété.
