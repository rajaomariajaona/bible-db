document_id: JOB.35,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Job n'a rien de sérieux à dire
  - type: text
    content: ' '
  - type: note
    content: reprit 34.1n.
  - type: text
    content: 'Elihou reprit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu… qui m''a fait ou qui me fait , cf. 4.17 ; 31.15n  ; voir aussi Ec 12.1. –  psaumes  : cf. 36.24.'
  - type: text
    content: 'mais personne ne dit : « Où est Dieu, lui qui m''a fait,'
  - type: text
    content: lui qui inspire des psaumes pendant la nuit,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'nous instruit  : cf. 32.8 ; Es 28.26. –  bêtes / oiseaux 12.7+ ; 39.17.'
  - type: text
    content: lui qui nous instruit plus que les bêtes de la terre,
  - type: text
    content: qui nous donne plus de sagesse qu'aux oiseaux du ciel ? »
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Alors  : litt. là (cf. 23.7n).'
  - type: text
    content: Alors on crie, mais il ne répond pas,
  - type: text
    content: à cause de l'orgueil des mauvais.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Autre traduction le mensonge seul, Dieu ne l'écoute pas… Cf. 6.26. –  le Puissant 5.17n.
  - type: text
    content: 'Vraiment, c''est inutile : Dieu n''entend pas,'
  - type: text
    content: le Puissant ne le voit pas !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 9.11+.
  - type: text
    content: Mais c'est toi qui dis que tu ne le vois pas,
  - type: text
    content: que ta cause est devant lui, que tu l'attends !
  '15':
  - type: text
    content: Maintenant, parce que sa colère n'intervient pas
  - type: text
    content: et qu'il ignore les pires révoltes,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 34.35 ; 38.2.
  - type: text
    content: Job ouvre la bouche pour des futilités,
  - type: text
    content: il abonde en propos dépourvus de connaissance.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis plus juste que Dieu  : autre traduction ma justice vient de Dieu , cf. 4.17n  ; 32.2+ ; 36.3.'
  - type: text
    content: Penses-tu être dans ton droit ?
  - type: text
    content: 'Peux-tu dire : « Je suis plus juste que Dieu ! »'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.20 ; 9.22. –  Que me sert-il…  : traduction incertaine ; on pourrait aussi bien comprendre qu''ai-je de plus que si je péchais ou que m''apporte le fait de pécher.'
  - type: text
    content: 'Car tu dis : « Est-ce utile pour toi ?'
  - type: text
    content: Que me sert-il de ne pas pécher ? »
  '4':
  - type: text
    content: ' '
  - type: note
    content: 32.12-14.
  - type: text
    content: C'est moi qui vais te répondre,
  - type: text
    content: à toi et à tes amis avec toi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '22.12+ ; cf. Gn 15.5 ; Es 55.9. –  Regarde  : le même verbe est traduit par voir aux v. 13s.'
  - type: text
    content: Considère le ciel et vois !
  - type: text
    content: 'Regarde les nuées :'
  - type: text
    content: comme elles sont élevées au-dessus de toi !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'quel tort lui causes-tu  : litt. que fais-tu contre lui ? Cf. 7.20+. –  transgressions  : autre traduction révoltes.'
  - type: text
    content: Si tu pèches, quel tort lui causes-tu ?
  - type: text
    content: Quand tes transgressions se multiplieraient, que lui ferais-tu ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 22.3+.
  - type: text
    content: Si tu es juste, que lui donnes-tu ?
  - type: text
    content: Que reçoit-il de toi ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 7.19. –  un être humain  : litt. un fils d''homme.'
  - type: text
    content: Ta méchanceté ne peut nuire qu'à un homme comme toi,
  - type: text
    content: ta justice n'est utile qu'à un être humain.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'On crie 24.12+ ; Ec 4.1. –  à cause de la violence  : litt. à cause du bras (cf. 22.8n). –  d''un grand nombre  : autre traduction des grands ou des puissants.'
  - type: text
    content: On crie à cause de la multitude des oppresseurs,
  - type: text
    content: on appelle au secours à cause de la violence d'un grand nombre ;
