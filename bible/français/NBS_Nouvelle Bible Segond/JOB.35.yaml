  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job n'a rien de sérieux à dire
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'reprit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '34.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elihou reprit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu… qui m''a fait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui me fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 4.17 ; 31.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ec 12.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: psaumes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 36.24.'
      marker-yv: yv-n
    - type: text
      text: 'mais personne ne dit : « Où est Dieu, lui qui m''a fait,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui inspire des psaumes pendant la nuit,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous instruit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 32.8 ; Es 28.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bêtes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'oiseaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.7+ ; 39.17.
      marker-yv: yv-n
    - type: text
      text: lui qui nous instruit plus que les bêtes de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui nous donne plus de sagesse qu'aux oiseaux du ciel ? »
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Alors
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'là '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 23.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Alors on crie, mais il ne répond pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de l'orgueil des mauvais.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le mensonge seul, Dieu ne l''écoute pas… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 6.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Puissant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Vraiment, c''est inutile : Dieu n''entend pas,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Puissant ne le voit pas !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.11+.
      marker-yv: yv-n
    - type: text
      text: Mais c'est toi qui dis que tu ne le vois pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que ta cause est devant lui, que tu l'attends !
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Maintenant, parce que sa colère n'intervient pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il ignore les pires révoltes,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 34.35 ; 38.2.
      marker-yv: yv-n
    - type: text
      text: Job ouvre la bouche pour des futilités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il abonde en propos dépourvus de connaissance.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je suis plus '
        - type: usfm
          marker: w
          children:
          - type: text
            text: juste
        - type: text
          text: ' que Dieu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ma justice vient de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 4.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 32.2+ ; 36.3.'
      marker-yv: yv-n
    - type: text
      text: Penses-tu être dans ton droit ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Peux-tu dire : « Je suis plus juste que Dieu ! »'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 7.20 ; 9.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que me sert-il…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ; on pourrait aussi bien comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''ai-je de plus que si je '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péchais
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que m'apporte le fait de pécher.
      marker-yv: yv-n
    - type: text
      text: 'Car tu dis : « Est-ce utile pour toi ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que me sert-il de ne pas pécher ? »
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 32.12-14.
      marker-yv: yv-n
    - type: text
      text: C'est moi qui vais te répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à toi et à tes amis avec toi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.12+ ; cf. Gn 15.5 ; Es 55.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Regarde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'voir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 13s.
      marker-yv: yv-n
    - type: text
      text: Considère le ciel et vois !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Regarde les nuées :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme elles sont élevées au-dessus de toi !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quel tort lui causes-tu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que fais-tu contre lui ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 7.20+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: transgressions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: révoltes.
      marker-yv: yv-n
    - type: text
      text: Si tu pèches, quel tort lui causes-tu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tes transgressions se multiplieraient, que lui ferais-tu ?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 22.3+.
      marker-yv: yv-n
    - type: text
      text: Si tu es juste, que lui donnes-tu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que reçoit-il de toi ?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jr 7.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un être humain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''homme.'
      marker-yv: yv-n
    - type: text
      text: Ta méchanceté ne peut nuire qu'à un homme comme toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta justice n'est utile qu'à un être humain.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'On crie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '24.12+ ; Ec 4.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à cause de la violence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à cause du bras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 22.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un grand nombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des grands '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des puissants.
      marker-yv: yv-n
    - type: text
      text: On crie à cause de la multitude des oppresseurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on appelle au secours à cause de la violence d'un grand nombre ;
