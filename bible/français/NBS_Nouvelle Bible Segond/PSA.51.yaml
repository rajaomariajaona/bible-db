document_id: PSA.51,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour obtenir le pardon
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 32 ; 38.
  - type: text
    content: 'Du chef de chœur. Psaume. De David. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Annonce-moi  : litt. fais-moi entendre  ; cf. Es 35.10. –  la gaieté  : cf. v. 14 ; 45.8 ; 105.43 ; 119.111. –  les os…  : cf. Ez 37.1-14.'
  - type: text
    content: Annonce-moi la gaieté et la joie,
  - type: text
    content: et les os que tu as écrasés seront dans l'allégresse.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 9.27. –  Détourne-toi…  : litt. cache ta face…  ; cf. 13.2+. –  efface v. 3.'
  - type: text
    content: Détourne-toi de mes péchés,
  - type: text
    content: efface toutes mes fautes.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Crée Gn 1.1n  ; cf. 1S 10.9 ; Jr 24.7 ; 31.33ss ; 32.39 ; Ez 11.19 ; 36.26ss ; 2Co 5.17 ; Ep 4.23s. –  souffle ou esprit (cf. v. 19), de même dans la suite. –  sûr ou ferme  ; cf. v. 14 ; 78.37 ; 112.7 ; Mc 14.38/ /.
  - type: text
    content: Crée en moi un cœur pur, ô Dieu,
  - type: text
    content: rends à nouveau le souffle sûr en moi.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ne me rejette pas 27.9 ; 41.13 ; 71.9 ; 140.14. –  loin de toi  : litt. de devant ta face ou de devant toi . –  ton souffle (ou ton Esprit ) sacré (ou saint ) : cf. Es 63.11.'
  - type: text
    content: Ne me rejette pas loin de toi,
  - type: text
    content: ne me prends pas ton souffle sacré.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'un souffle (ou un esprit ) généreux  : cf. v. 12+ ; 143.10.'
  - type: text
    content: Rends-moi la gaieté de ton salut,
  - type: text
    content: et qu'un souffle généreux me soutienne !
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.23ss.
  - type: text
    content: J'apprendrai tes voies à ceux qui se révoltent,
  - type: text
    content: et les pécheurs reviendront à toi.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu de mon salut 24.5+ ; Es 17.10. –  du sang  : l''expression (litt. des sangs ) peut désigner soit le crime commis, soit la vengeance qui menace en retour le meurtrier ; il s''agit, selon le cas, d''une requête de pardon ou de grâce. –  ma langue… 35.28+.'
  - type: text
    content: O Dieu, Dieu de mon salut, délivre-moi du sang,
  - type: text
    content: et ma langue criera ta justice.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 40.4 ; 63.6 ; 71.8 ; 119.171.
  - type: text
    content: Seigneur, ouvre mes lèvres,
  - type: text
    content: et ma bouche dira ta louange.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'LXX a compris  : car si tu prenais plaisir au sacrifice, j''en offrirais  ; on pourrait aussi rattacher le milieu du v. à la fin et traduire tu ne prends pas plaisir au sacrifice ; si j''offrais un holocauste, tu ne l''agréerais pas  ; cf. 40.7+ ; 54.8. –  offrirais  : litt. donnerais.'
  - type: text
    content: Car tu ne prends pas plaisir au sacrifice
  - type: text
    content: – sinon, j'en offrirais ;
  - type: text
    content: tu n'agrées pas l'holocauste.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Les sacrifices de Dieu  : certains modifient la vocalisation traditionnelle de l''hébreu pour lire mon sacrifice, ô Dieu, c''est un esprit (v. 12n) brisé  ; cf. 34.19 ; 69.21 ; Es 57.15 ; 61.1 ; 66.2 ; Os 6.6 ; Mi 6.7s ; Daniel grec 3.39s : « Puissions-nous néanmoins, avec une âme brisée et un esprit humilié, être agréés comme avec un holocauste de béliers et de taureaux ; et comme avec des myriades d''agneaux gras, qu''ainsi notre sacrifice soit aujourd''hui en ta présence. »'
  - type: text
    content: 'Les sacrifices de Dieu, c''est un esprit brisé :'
  - type: text
    content: un cœur brisé, écrasé,
  - type: text
    content: ô Dieu, tu ne le méprises pas.
  '2':
  - type: note
    content: 2S 12.1-14.
  - type: text
    content: Lorsque Nathan, le prophète, vint à lui, après que David fut allé avec Bethsabée.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. 69.36 ; 102.14-18 ; 147.2 ; Es 26.1 ; 33.20 ; 62.6 ; Jr 31.38 ; Ez 36.33 ; voir Né.
  - type: text
    content: Dans ta faveur, fais du bien à Sion,
  - type: text
    content: bâtis les murs de Jérusalem !
  '21':
  - type: text
    content: ' '
  - type: note
    content: sacrifices de justice 4.6n. –  holocaustes… Lv 1.3n  ; 6.15+s.
  - type: text
    content: Alors tu prendras plaisir aux sacrifices de justice
  - type: text
    content: – holocaustes et offrandes totales.
  - type: text
    content: Alors on offrira des taureaux sur ton autel.
  '3':
  - type: text
    content: ' '
  - type: note
    content: fais-moi grâce 41.5 ; cf. Nb 14.19 ; Né 13.22. –  efface mes transgressions v. 5,11 ; 109.14 ; Es 43.25 ; 44.22 ; cf. Ex 32.32 ; Nb 5.23 ; Ps 69.28 ; voir aussi Es 6.7 ; Mi 7.18s.
  - type: text
    content: O Dieu, fais-moi grâce, selon ta fidélité ;
  - type: text
    content: selon ta grande compassion, efface mes transgressions !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 36.25 ; 37.23. – Voir pur.
  - type: text
    content: Lave-moi complètement de ma faute,
  - type: text
    content: purifie-moi de mon péché !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'je connais…  : autre traduction je reconnais  ; cf. 32.5+. –  devant moi 44.16 ; Es 59.12.'
  - type: text
    content: Car je connais mes transgressions,
  - type: text
    content: et mon péché est constamment devant moi.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Envers toi…  : cf. Gn 39.9 ; 2S 12.13 ; Lc 15.18. –  ce qui te déplaisait Dt 4.25 ; 1R 11.6n. –  dans ton jugement , c.-à-d., sans doute, quand tu jugeras  ; LXX emploie une formule ambiguë qui peut être comprise par quand tu entreras en jugement ou quand tu seras jugé (formules analogues, dans le grec, en 37.33 ; 109.7 ; mais aussi en Es 50.8 ; Jb 9.3 ; 13.19 ; 1Co 6.1,6) ; cf. Ps 7.12+ ; Jos 7.19 ; Rm 3.4n.'
  - type: text
    content: Envers toi, toi seul, j'ai péché ;
  - type: text
    content: j'ai fait ce qui te déplaisait,
  - type: text
    content: de sorte que tu seras juste dans ta parole,
  - type: text
    content: sans reproche dans ton jugement.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 143.2 ; Gn 8.21 ; Jb 14.4 ; 15.14s ; 25.4ss ; Jn 3.6 ; 9.34 ; Rm 7.14. –  dans la faute / dans le péché  : autre traduction possible par une faute / par un péché. –  m''a conçu  : le verbe hébreu correspondant ne se retrouve qu''en Gn 30.38-41 ; 31.10, où il s''applique à des animaux ( entrer en chaleur ).'
  - type: text
    content: Je suis né dans la faute,
  - type: text
    content: ma mère m'a conçu dans le péché.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'dans le fond du cœur  : traduction incertaine d''un terme hébreu rare ; une interprétation juive traditionnelle comprend dans les reins  ; autres traductions possibles dans les ténèbres, dans le lieu caché  ; cf. Jr 17.9-10n. –  au plus secret de moi-même  : litt. dans ce qui est secret.'
  - type: text
    content: Mais tu prends plaisir à la loyauté dans le fond du cœur ;
  - type: text
    content: au plus secret de moi-même, fais-moi connaître la sagesse !
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ote mon péché ou tu ôteras mon péché (cf. Ex 29.36 ; Lv 8.15 ; 14.49,52) / lave-moi ou tu me laveras , même possibilité de traduction au v. 10. –  hysope Ex 12.22n  ; Nb 19.6,18. –  plus blanc que la neige Es 1.18.
  - type: text
    content: Ote mon péché avec l'hysope, et je serai pur ;
  - type: text
    content: lave-moi, et je serai plus blanc que la neige.
