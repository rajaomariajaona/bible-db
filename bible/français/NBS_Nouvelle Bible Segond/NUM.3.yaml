document_id: NUM.3,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les tâches des lévites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 4.1ss ; 26.57ss ; Ex 4.14 ; 6.16ss ; 1Ch 5.27ss ; 6.35ss ; 23.12ss ; 24.1s ; voir aussi Dt 10.8s ; 18.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Voici la généalogie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 2.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Dans la suite il n''est pas question des descendants de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Moïse.
      marker-yv: yv-n
    - type: text
      text: 'Voici la généalogie d''Aaron et de Moïse, au jour où le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parla à Moïse au mont Sinaï.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour qu'ils exercent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur la tente du Témoignage ; ils exerceront leur sacerdoce pour tout ce qui concerne l'autel et pour ce qui est à l'intérieur, au-delà du voile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 18.7 ; voir aussi 16.8ss ; 1S 2.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le profane… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 38 ; 1.51
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 17.5 ; 18.7,22.'
      marker-yv: yv-n
    - type: text
      text: Tu installeras Aaron et ses fils pour qu'ils exercent leur sacerdoce ; le profane qui approchera sera mis à mort.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 40ss ; 1.48ss.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.14ss ; 18.15ss ; Ex 13.1s,11ss ; 22.27ss ; 34.19s ; cf. Gn 22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de tout Israélite…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Smr
        - type: text
          text: ' et LXX ajoutent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils seront leur rançon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 46ss). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'né le premier… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 13.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moi, j''ai pris les lévites d''entre les Israélites à la place de tous les premiers-nés, de tout Israélite né le premier de sa mère : les lévites m''appartiennent.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ex 11 ; 12.29 ; 13.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'Car tout premier-né m''appartient ; le jour où j''ai frappé tous les premiers-nés en Egypte, je me suis consacré tous les premiers-nés en Israël ; ceux des hommes comme ceux des bêtes m''appartiennent. Je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH).'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Premier recensement des lévites
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.1ss,19.
      marker-yv: yv-n
    - type: text
      text: 'Dans le désert du Sinaï, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 18.16.
      marker-yv: yv-n
    - type: text
      text: 'Recense les fils de Lévi famille par famille, clan par clan ; tu recenseras tous les mâles depuis l''âge d''un mois et au-dessus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Moïse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et Aaron.
      marker-yv: yv-n
    - type: text
      text: 'Moïse les recensa sur l''ordre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comme cela lui avait été ordonné.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Ch 6.1-14
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 26.57s ; Gn 46.11 ; Ex 6.16-25 ; 1Ch 5.27–6.15 ; 15.1-10 ; 23.6-23.
      marker-yv: yv-n
    - type: text
      text: 'Voici quels sont les noms des fils de Lévi : Guershôn, Qehath et Merari. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Voici les noms des fils de Guershôn, clan par clan : Libni et Shiméi ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'les fils de Qehath, clan par clan : Amram, Yitsehar, Hébron et Ouzziel ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 26.60 ; Ex 6.23 ; 28.1 ; 1Ch 5.29.
      marker-yv: yv-n
    - type: text
      text: 'Voici les noms des fils d''Aaron : Nadab, le premier-né, Abihou, Eléazar et Itamar. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'les fils de Merari, clan par clan : Mahli et Moushi. Ce sont là les clans des lévites, famille par famille.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 18 ; 4.38ss ; 2Ch 29.12 ; 34.12 ; voir aussi 1Ch 23.
      marker-yv: yv-n
    - type: text
      text: 'De Guershôn, le clan de Libni et le clan de Shiméi ; ce sont là les clans des Guershonites. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ceux qui furent recensés parmi eux, en comptant tous les mâles depuis l''âge d''un mois et au-dessus, ceux qui furent recensés parmi eux étaient 7 500. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'derrière… à l''ouest '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 38 ; 2.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les clans des Guershonites campaient derrière la Demeure, à l''ouest. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Prince de la famille des Guershonites : Eliasaph, fils de Laël. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.53+ ; Ex 26 ; 36.
      marker-yv: yv-n
    - type: text
      text: 'Pour ce qui concerne la tente de la Rencontre, les fils de Guershôn étaient responsables de la Demeure : de la tente, de la couverture, du rideau qui est à l''entrée de la tente de la Rencontre, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 27 ; 38. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cordages '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 35.18 ; 39.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de tout ce qui en dépend
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour tout son service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même aux v. 31,36 ; cf. 4.25s.'
      marker-yv: yv-n
    - type: text
      text: des tentures de la cour et du rideau de l'entrée de la cour, tout autour de la Demeure et de l'autel, de tous ses cordages et de tout ce qui en dépend.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 19.
      marker-yv: yv-n
    - type: text
      text: 'De Qehath, le clan des Amramites, le clan des Yitseharites, le clan des Hébronites et le clan des Ouzziélites ; ce sont là les clans des Qehatites. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au début un ms hébreu et plusieurs versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui furent recensés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme aux v. 22,34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 8 600
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 8 300
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui s''accorde avec le total donné au v. 39'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En comptant tous les mâles depuis l''âge d''un mois et au-dessus, il y en eut 8 600 pour assurer le service du sanctuaire. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Les clans des fils de Qehath campaient sur le côté sud de la Demeure. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd''huile sacrée : Ex 28.41 ; 29.29 ; 30.30 ; 40.15 ; Lv 7.36 ; 8.30 ; 10.7 ; cf. Ex 29.7 ; Lv 4.3 ; 8.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui furent investis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dont on remplit les mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur cette expression, voir Ex 28.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 7.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 8.1ss,27s,33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 17.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Voilà les noms des fils d''Aaron, les prêtres ayant reçu l''onction, ceux qui furent investis pour exercer le sacerdoce. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Prince de la famille des clans des Qehatites : Elitsaphân, fils d''Ouzziel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 25 ; 27 ; 30 ; 37. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rideau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'voile '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Ex 26.31ss ; 36.35ss ; 40.3,21 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Smr
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la cuve et son socle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout ce qui en dépend
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout son service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout leur service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même au v. 36.'
