document_id: NUM.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les tâches des lévites
  - type: text
    content: ' '
  - type: note
    content: Cf. 4.1ss ; 26.57ss ; Ex 4.14 ; 6.16ss ; 1Ch 5.27ss ; 6.35ss ; 23.12ss ; 24.1s ; voir aussi Dt 10.8s ; 18.1ss. –  Voici la généalogie Gn 2.4n. Dans la suite il n'est pas question des descendants de Moïse.
  - type: text
    content: 'Voici la généalogie d''Aaron et de Moïse, au jour où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parla à Moïse au mont Sinaï.'
  '10':
  - type: note
    content: 'pour qu''ils exercent…  : LXX sur la tente du Témoignage ; ils exerceront leur sacerdoce pour tout ce qui concerne l''autel et pour ce qui est à l''intérieur, au-delà du voile, cf. 18.7 ; voir aussi 16.8ss ; 1S 2.28. –  le profane… v. 38 ; 1.51n  ; 17.5 ; 18.7,22.'
  - type: text
    content: Tu installeras Aaron et ses fils pour qu'ils exercent leur sacerdoce ; le profane qui approchera sera mis à mort.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 40ss ; 1.48ss.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '12':
  - type: note
    content: '8.14ss ; 18.15ss ; Ex 13.1s,11ss ; 22.27ss ; 34.19s ; cf. Gn 22. –  de tout Israélite…  : Smr et LXX ajoutent ils seront leur rançon (v. 46ss). –  né le premier… Ex 13.2n.'
  - type: text
    content: 'Moi, j''ai pris les lévites d''entre les Israélites à la place de tous les premiers-nés, de tout Israélite né le premier de sa mère : les lévites m''appartiennent.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 11 ; 12.29 ; 13.2. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Car tout premier-né m''appartient ; le jour où j''ai frappé tous les premiers-nés en Egypte, je me suis consacré tous les premiers-nés en Israël ; ceux des hommes comme ceux des bêtes m''appartiennent. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  - type: heading
    content: Premier recensement des lévites
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.1ss,19.
  - type: text
    content: 'Dans le désert du Sinaï, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '15':
  - type: note
    content: un mois 18.16.
  - type: text
    content: 'Recense les fils de Lévi famille par famille, clan par clan ; tu recenseras tous les mâles depuis l''âge d''un mois et au-dessus. '
  '16':
  - type: note
    content: 'Moïse  : LXX ajoute et Aaron.'
  - type: text
    content: 'Moïse les recensa sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme cela lui avait été ordonné.'
  - type: heading
    content: 1Ch 6.1-14
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 26.57s ; Gn 46.11 ; Ex 6.16-25 ; 1Ch 5.27–6.15 ; 15.1-10 ; 23.6-23.
  - type: text
    content: 'Voici quels sont les noms des fils de Lévi : Guershôn, Qehath et Merari. '
  '18':
  - type: text
    content: 'Voici les noms des fils de Guershôn, clan par clan : Libni et Shiméi ; '
  '19':
  - type: text
    content: 'les fils de Qehath, clan par clan : Amram, Yitsehar, Hébron et Ouzziel ; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 26.60 ; Ex 6.23 ; 28.1 ; 1Ch 5.29.
  - type: text
    content: 'Voici les noms des fils d''Aaron : Nadab, le premier-né, Abihou, Eléazar et Itamar. '
  '20':
  - type: text
    content: 'les fils de Merari, clan par clan : Mahli et Moushi. Ce sont là les clans des lévites, famille par famille.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 18 ; 4.38ss ; 2Ch 29.12 ; 34.12 ; voir aussi 1Ch 23.
  - type: text
    content: 'De Guershôn, le clan de Libni et le clan de Shiméi ; ce sont là les clans des Guershonites. '
  '22':
  - type: text
    content: 'Ceux qui furent recensés parmi eux, en comptant tous les mâles depuis l''âge d''un mois et au-dessus, ceux qui furent recensés parmi eux étaient 7 500. '
  '23':
  - type: note
    content: derrière… à l'ouest v. 38 ; 2.3n.
  - type: text
    content: 'Les clans des Guershonites campaient derrière la Demeure, à l''ouest. '
  '24':
  - type: text
    content: 'Prince de la famille des Guershonites : Eliasaph, fils de Laël. '
  '25':
  - type: note
    content: 1.53+ ; Ex 26 ; 36.
  - type: text
    content: 'Pour ce qui concerne la tente de la Rencontre, les fils de Guershôn étaient responsables de la Demeure : de la tente, de la couverture, du rideau qui est à l''entrée de la tente de la Rencontre, '
  '26':
  - type: note
    content: 'Ex 27 ; 38. –  cordages Ex 35.18 ; 39.40. –  de tout ce qui en dépend  : litt. pour tout son service  ; de même aux v. 31,36 ; cf. 4.25s.'
  - type: text
    content: des tentures de la cour et du rideau de l'entrée de la cour, tout autour de la Demeure et de l'autel, de tous ses cordages et de tout ce qui en dépend.
  '27':
  - type: text
    content: ' '
  - type: note
    content: V. 19.
  - type: text
    content: 'De Qehath, le clan des Amramites, le clan des Yitseharites, le clan des Hébronites et le clan des Ouzziélites ; ce sont là les clans des Qehatites. '
  '28':
  - type: note
    content: 'Au début un ms hébreu et plusieurs versions anciennes ont lu ceux qui furent recensés, comme aux v. 22,34. –  8 600  : LXX 8 300, ce qui s''accorde avec le total donné au v. 39n.'
  - type: text
    content: 'En comptant tous les mâles depuis l''âge d''un mois et au-dessus, il y en eut 8 600 pour assurer le service du sanctuaire. '
  '29':
  - type: text
    content: 'Les clans des fils de Qehath campaient sur le côté sud de la Demeure. '
  '3':
  - type: note
    content: 'onction d''huile sacrée : Ex 28.41 ; 29.29 ; 30.30 ; 40.15 ; Lv 7.36 ; 8.30 ; 10.7 ; cf. Ex 29.7 ; Lv 4.3 ; 8.12. –  qui furent investis  : litt. dont on remplit les mains  ; sur cette expression, voir Ex 28.41n  ; Lv 7.37n  ; 8.1ss,27s,33n  ; Jg 17.5n.'
  - type: text
    content: 'Voilà les noms des fils d''Aaron, les prêtres ayant reçu l''onction, ceux qui furent investis pour exercer le sacerdoce. '
  '30':
  - type: text
    content: 'Prince de la famille des clans des Qehatites : Elitsaphân, fils d''Ouzziel. '
  '31':
  - type: note
    content: 'Ex 25 ; 27 ; 30 ; 37. –  rideau  : cf. le voile en Ex 26.31ss ; 36.35ss ; 40.3,21 ; Smr ajoute la cuve et son socle. –  tout ce qui en dépend  : litt. tout son service, LXX tout leur service  ; de même au v. 36.'
  - type: text
    content: 'Ils étaient responsables du Coffre, de la table, du porte-lampes, des autels, des ustensiles du sanctuaire dont on se sert pour officier, du rideau et de tout ce qui en dépend. '
  '32':
  - type: note
    content: 'Prince suprême  : litt. prince des princes  ; voir 1.16n. –  il avait  : sous-entendu dans le texte.'
  - type: text
    content: 'Prince suprême des lévites : Eléazar, fils d''Aaron, le prêtre ; il avait la surveillance de ceux qui assuraient le service du sanctuaire.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: V. 20.
  - type: text
    content: 'De Merari, le clan de Mahli et le clan de Moushi ; ce sont là les clans de Merari. '
  '34':
  - type: text
    content: 'Ceux qui furent recensés parmi eux, en comptant tous les mâles depuis l''âge d''un mois et au-dessus, étaient 6 200. '
  '35':
  - type: text
    content: 'Prince de la famille des clans de Merari : Touriel, fils d''Abihaïl. Ils campaient sur le côté nord de la Demeure. '
  '36':
  - type: note
    content: 4.31s ; Ex 26.15ss ; 36.20ss.
  - type: text
    content: 'Les fils de Merari s''étaient vu confier la responsabilité des planches de la Demeure, de ses barres, de ses colonnes et de ses socles, de tous ses ustensiles et de tout ce qui en dépend, '
  '37':
  - type: note
    content: Ex 27.9ss ; 38.10ss. –  piquets / cordages Ex 27.19 ; 35.18 ; 38.20 ; 39.40.
  - type: text
    content: des colonnes de la cour, tout autour, de leurs socles, de leurs piquets et de leurs cordages.
  '38':
  - type: text
    content: ' '
  - type: note
    content: '1.53. –  à l''est, devant v. 23 ; 2.3n. –  sanctuaire  : même terme en 10.21 ; 18.1,29 ; ailleurs c''est un autre mot de la même famille qui est traduit par sanctuaire . –  le profane… v. 10 ; 1.51n  ; voir saint, sainteté, sanctification.'
  - type: text
    content: Moïse, Aaron et ses fils campaient devant la Demeure, à l'est, devant la tente de la Rencontre, au levant ; ils assuraient le service du sanctuaire pour les Israélites ; le profane qui approcherait devait être mis à mort.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'V. 15. –  Tous les lévites  : litt. tous les recensés des lévites . –  et Aaron  : cette précision est absente de plusieurs mss hébreux et de Syr, et elle est distinguée du reste du texte dans les mss traditionnels, peut-être pour signaler qu''elle devait être omise. –  22 000  : le total des chiffres ci-dessus donnerait 22 300 ; certains supposent que la différence est due à une erreur de copie (v. 28n), d''autres pensent qu''on aurait déduit le chiffre des premiers-nés des lévites qui ne pouvaient intervenir dans la substitution (cf. v. 40-43) ; cf. 26.57-62.'
  - type: text
    content: 'Tous les lévites que Moïse et Aaron recensèrent sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', clan par clan, tous les mâles depuis l''âge d''un mois et au-dessus, étaient 22 000.'
  - type: heading
    content: Le rachat des premiers-nés
  '4':
  - type: note
    content: '26.61 ; Lv 10.1ss ; 1Ch 24.2. –  Abihou  : LXX Abioud  ; cf. 1Ch 8.3. –  feu profane  : litt. feu étranger, c.-à-d. irrégulier, non conforme  ; cf. 1.51n  ; 26.61 ; Ex 30.9 (encens profane) ; voir saint. –  Eléazar et Itamar correspondent respectivement à la dynastie des prêtres Tsadoq et Abiathar (2S 20.25). –  sous la surveillance d''Aaron  : autres traductions devant Aaron ; en présence d''Aaron.'
  - type: text
    content: 'Nadab et Abihou moururent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' quand ils présentèrent un feu profane devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans le désert du Sinaï ; ils n''avaient pas de fils. Eléazar et Itamar exercèrent le sacerdoce sous la surveillance d''Aaron, leur père.'
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 12s ; 18.15ss. –  fais-en le dénombrement…  : litt. relève le nombre de leurs noms.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Recense tous les premiers-nés mâles parmi les Israélites, depuis l''âge d''un mois et au-dessus ; fais-en le dénombrement d''après leurs noms. '
  '41':
  - type: note
    content: 'V. 11ss,45 ; 8.16ss. –  lévites 8.6+. –  Seigneur (YHWH)  : voir noms divins. –  les bêtes  : cf. Ex 13.12 ; 22.29 ; Lv 27.27 ; Dt 15.19-23.'
  - type: text
    content: 'Tu prendras les lévites pour moi – je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) – à la place de tous les premiers-nés des Israélites, et les bêtes des lévites à la place de tous les premiers-nés des bêtes des Israélites. '
  '42':
  - type: text
    content: 'Moïse recensa tous les premiers-nés des Israélites, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le lui avait ordonné. '
  '43':
  - type: note
    content: Cf. v. 39,41,49 ; 1.46n.
  - type: text
    content: Tous les premiers-nés mâles qui furent recensés parmi eux, en comptant les noms, depuis l'âge d'un mois et au-dessus, étaient 22 273.
  '44':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '45':
  - type: note
    content: V. 41.
  - type: text
    content: 'Prends les lévites à la place de tous les premiers-nés des Israélites, et les bêtes des lévites à la place de leurs bêtes : les lévites m''appartiennent. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '46':
  - type: note
    content: Cf. Ex 13.13.
  - type: text
    content: 'Pour dégager les 273 premiers-nés des Israélites qui sont en surnombre par rapport aux lévites, '
  '47':
  - type: note
    content: 'cinq sicles…  : environ 50 g ; voir mesures, poids et monnaies ; 18.16 ; Ex 30.13 ; Lv 5.15 ; 27.3,25 ; Ez 45.12.'
  - type: text
    content: 'tu prendras cinq sicles par tête, selon le sicle du sanctuaire, qui est de vingt guéras. '
  '48':
  - type: note
    content: Cf. 18.13ss.
  - type: text
    content: 'Tu donneras l''argent à Aaron et à ses fils, pour dégager ceux qui sont en surnombre. '
  '49':
  - type: note
    content: Les mots rançon et ceux qui avaient été dégagés traduisent deux termes hébreux apparentés ; voir rédemption.
  - type: text
    content: 'L''argent de la rançon, Moïse le reçut de ceux qui étaient en surnombre par rapport à ceux qui avaient été dégagés par les lévites ; '
  '5':
  - type: text
    content: ' '
  - type: note
    content: 4.1ss ; 8.5ss ; cf. 18.1ss ; Ez 44.6ss.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '50':
  - type: note
    content: '1 365 sicles  : environ 13 kg ; voir mesures, poids et monnaies.'
  - type: text
    content: 'il prit l''argent des premiers-nés des Israélites : 1 365 sicles, selon le sicle du sanctuaire. '
  '51':
  - type: text
    content: 'Moïse donna l''argent de la rançon à Aaron et à ses fils, sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '6':
  - type: note
    content: 'Cf. 16.8ss ; Dt 10.8s ; 2R 23.8s ; Ez 44.7ss. –  tu la mettras à la disposition d''Aaron  : autre traduction tu la placeras debout devant Aaron. –  pour qu''elle l''assiste  : autres traductions pour qu''elle soit à son service ; pour qu''elle accomplisse des tâches d''auxiliaires  ; dans le contexte du service cultuel, le même verbe est fréquemment traduit par officier  ; cf. v. 31 ; 1.50 ; 4.9ss ; 8.26 ; 11.28 ; 16.9 ; 18.2 ; Gn 39.4n  ; Ex 24.13n  ; 28.35,43 etc.'
  - type: text
    content: 'Présente la tribu de Lévi ; tu la mettras à la disposition d''Aaron, le prêtre, pour qu''elle l''assiste. '
  '7':
  - type: note
    content: '1Ch 23.32. –  Ils assureront le service (1.53+) …  : litt. ils assureront son service et le service de toute la communauté, cf. v. 8n  ; 17.28ss. Les expressions synonymes traduites par assurer le service (Nb 1.53+ ; 9.19n  ; cf. Gn 26.5n) et accomplir le service (cf. 4.23+ ; 8.22 ; 18.21 ; cf. Ex 1.14n) sont chacune composées d''un verbe et d''un complément apparenté : la première est construite sur le verbe correspondant habituellement à garder, observer, et la seconde sur celui qui est généralement rendu par servir, travailler, rendre un culte. Cf. 4.3,23 ; Ez 40.46n  ; 1Ch 23.32n. –  tente de la Rencontre 1.1+. –  Demeure 1.50+s.'
  - type: text
    content: 'Ils assureront le service pour lui et pour toute la communauté devant la tente de la Rencontre : ils accompliront le service de la Demeure. '
  '8':
  - type: note
    content: 'Cf. 18.3ss. –  Ils seront responsables…  : litt. ils garderont tous les ustensiles… et la garde des Israélites. Cf. v. 7n.'
  - type: text
    content: 'Ils seront responsables de tous les ustensiles de la tente de la Rencontre et assureront le service pour les Israélites : ils accompliront le service de la Demeure. '
  '9':
  - type: note
    content: 'lévites 8.6+. – Voir fils. –  donnés  : c''est un mot hébreu très proche qui est transcrit Netinim en Esd 2.43n  ; 1Ch 9.2 ; plusieurs mss hébreux et LXX ont lu ils me seront donnés (ou consacrés), comme en Nb 8.16ss ; cf. 18.6. Sur les hommes donnés comme fonctionnaires subalternes pour le service du temple, cf. Nb 31.25ss ; Jos 9.23ss ; 1Ch 6.33n. –  d''entre les Israélites  : autre traduction de la part des Israélites  ; cf. 8.11.'
  - type: text
    content: 'Tu donneras les lévites à Aaron et à ses fils, à titre de « donnés » ; ils lui seront donnés d''entre les Israélites. '
