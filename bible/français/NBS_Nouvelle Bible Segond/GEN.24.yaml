        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leurs paroles.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque le serviteur d''Abraham entendit cela, il se prosterna jusqu''à terre devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.53 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son frère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss de LXX et Vg portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses frères.
      marker-yv: yv-n
    - type: text
      text: 'Le serviteur sortit des objets d''argent, des objets d''or et des vêtements qu''il donna à Rébecca ; il fit aussi de riches présents à son frère et à sa mère. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Après cela, lui et les gens qui l''accompagnaient mangèrent et burent, et ils passèrent la nuit. Au matin, quand ils se levèrent, le serviteur dit : Laissez-moi repartir vers mon maître. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Le frère et la mère dirent : Que la jeune fille reste avec nous quelque temps encore, une dizaine de jours ; ensuite tu pourras partir. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'Il leur répondit : Ne me retardez pas, puisque le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a fait aboutir mon voyage ; laissez-moi repartir pour rentrer chez mon maître. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.57 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: demandons-lui son avis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: interrogeons sa bouche.
      marker-yv: yv-n
    - type: text
      text: 'Alors ils répondirent : Appelons la jeune fille et demandons-lui son avis. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.58 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Veux-tu aller '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je veux bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: iras-tu / j'irai.
      marker-yv: yv-n
    - type: text
      text: 'Ils appelèrent donc Rébecca et lui dirent : Veux-tu aller avec cet homme ? Elle répondit : Je veux bien.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Ils laissèrent alors partir leur sœur Rébecca et sa nourrice avec le serviteur d''Abraham et ses gens. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Abraham lui répondit : Garde-toi d''y ramener mon fils ! '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.60 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'milliers… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.3. Le terme traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dizaines de milliers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: myriades
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') fait assonance avec le nom de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Rébecca. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des villes… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses ennemis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui la haïssent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains mss portent le terme qui désigne les ennemis en 22.17.'
      marker-yv: yv-n
    - type: text
      text: 'Ils bénirent Rébecca et lui dirent :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, notre sœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deviens des milliers de dizaines de milliers !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta descendance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prenne possession des villes de ses ennemis !
  '61':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: Rébecca et ses servantes montèrent sur les chameaux et suivirent l'homme. Le serviteur prit Rébecca et partit.
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.62 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Isaac était venu de venir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '( ?) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au puits…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; d''après Smr et LXX, certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Isaac était allé dans le désert du puits… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Lahaï-Roï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 16.13-14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 25.11.'
      marker-yv: yv-n
    - type: text
      text: 'Isaac était revenu du Puits Lahaï-Roï et il s''était installé dans le Néguev. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.63 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se promener
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après l''arabe et le syriaque. LXX et Vg traduisent le verbe correspondant, qui n''apparaît qu''ici, par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: méditer.
      marker-yv: yv-n
    - type: text
      text: 'Vers le soir, Isaac sortit pour se promener dans la campagne ; il leva les yeux et vit des chameaux qui arrivaient. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.64 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sauta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tomba.
      marker-yv: yv-n
    - type: text
      text: 'Rébecca leva les yeux et vit Isaac ; elle sauta du chameau '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.65 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: voile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant ne revient qu''en 38.14,19. La coutume exigeait qu''une femme se voile devant un étranger, et en particulier devant l''homme qui devait devenir son mari (cf. 29.23ss).'
      marker-yv: yv-n
    - type: text
      text: 'et dit au serviteur : Qui est cet homme dans la campagne qui vient à notre rencontre ? Le serviteur répondit : C''est mon maître. Alors elle prit son voile et se couvrit. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'Le serviteur raconta à Isaac tout ce qu''il avait fait. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.67 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: après la perte de sa mère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: après sa mère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: après la mort de son père.
      marker-yv: yv-n
    - type: text
      text: Isaac conduisit Rébecca dans la tente de Sara, sa mère. Il prit Rébecca qui devint sa femme, et il l'aima. C'est ainsi qu'Isaac fut consolé après la perte de sa mère.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu du ciel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et Dieu de la terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 3). Voir cependant Dn 2.18,28 ; Né 1.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'juré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de donner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en disant : Je donnerai'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'descendance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: messager
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 23.20+.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu du ciel, qui m''a pris de la maison de mon père et du pays de mes origines, lui qui m''a parlé et qui m''a juré de donner ce pays à ma descendance, lui-même enverra son messager devant toi ; c''est là-bas que tu prendras une femme pour mon fils. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jos 2.20.
      marker-yv: yv-n
    - type: text
      text: 'Si la femme ne veut pas te suivre, tu seras dégagé de ce serment que je t''impose. Mais tu ne ramèneras pas mon fils là-bas. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le serviteur mit sa main sous la cuisse d'Abraham, son maître, et il s'engagea envers lui par serment au sujet de cette affaire.
