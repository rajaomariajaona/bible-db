document_id: GEN.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Une femme pour Isaac
  - type: text
    content: ' '
  - type: note
    content: béni en tout v. 35 ; 2.2+.
  - type: text
    content: 'Abraham était vieux, avancé en âge, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait béni en tout. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'avec tout…  : autre traduction avec tous les biens de son maître  ; plusieurs versions anciennes ont lu avec (une partie) de tous les biens… –  Mésopotamie 10.22n. –  ville de Nahor  : peut-être Harrân, cf. 11.27-32. Mais il y avait aussi non loin de là une ville nommée Nahourou.'
  - type: text
    content: 'Le serviteur prit dix chameaux parmi les chameaux de son maître et il partit, avec tout ce que son maître possédait de meilleur. Il se rendit en Mésopotamie, à la ville de Nahor. '
  '11':
  - type: note
    content: Cf. 29.2ss ; Ex 2.16ss.
  - type: text
    content: Il fit agenouiller les chameaux à l'extérieur de la ville, près d'un puits, le soir, à l'heure où les femmes sortent pour puiser de l'eau.
  '12':
  - type: text
    content: 'Alors il dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Abraham, mon maître, accorde-moi, je te prie, de faire une heureuse rencontre aujourd''hui, et agis avec fidélité envers Abraham, mon maître ! '
  '13':
  - type: text
    content: 'Je me tiens près de la source, et les filles des gens de la ville sortent pour puiser de l''eau. '
  '14':
  - type: note
    content: Cf. Pr 19.14.
  - type: text
    content: 'Que la jeune fille à laquelle je dirai : « Penche ta cruche, je te prie, pour que je boive », et qui répondra : « Bois, je donnerai aussi à boire à tes chameaux ! », soit celle que tu as destinée à Isaac, ton serviteur ! Ainsi je saurai que tu as agi avec fidélité envers mon maître.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'pas encore…  : cf. Es 65.24. –  fille de…  : litt. née de Betouel…  ; cf. 22.20-23.'
  - type: text
    content: 'Il n''avait pas encore achevé que sortait Rébecca, la fille de Betouel, fils de Milka, la femme de Nahor, frère d''Abraham. Elle avait sa cruche sur l''épaule. '
  '16':
  - type: text
    content: 'C''était une très belle jeune fille ; elle était vierge, aucun homme n''avait jamais eu de relations avec elle. Elle descendit à la source, remplit sa cruche et remonta. '
  '17':
  - type: note
    content: Cf. Jn 4.7.
  - type: text
    content: 'Le serviteur courut à sa rencontre et dit : Donne-moi, je te prie, quelques gorgées d''eau de ta cruche. '
  '18':
  - type: note
    content: 'd''incliner  : autre traduction de descendre  ; litt. et elle fit descendre sa cruche sur sa main. Sans doute la portait-on sur l''épaule ou sur la tête.'
  - type: text
    content: 'Elle répondit : Bois, mon seigneur ! Et elle s''empressa d''incliner sa cruche et de lui donner à boire. '
  '19':
  - type: text
    content: 'Quand elle eut achevé de lui donner à boire, elle dit : Je puiserai aussi pour tes chameaux, jusqu''à ce qu''ils aient assez bu. '
  '2':
  - type: note
    content: 'Une tradition identifie ce serviteur à Eliézer (15.2). –  ancien ou vieux, terme apparenté au v. 1. –  sous ma cuisse  : il s''agit selon toute vraisemblance d''un euphémisme qui désigne les organes génitaux, sources de la vie et porteurs des descendants (cf. 32.26n  ; 47.29 ; Ex 1.5n).'
  - type: text
    content: 'Abraham dit à son serviteur, le plus ancien de sa maison, celui qui administrait tous ses biens : Je te prie, mets ta main sous ma cuisse, '
  '20':
  - type: text
    content: 'Elle s''empressa de vider sa cruche dans l''abreuvoir et courut pour puiser encore au puits ; elle puisa pour tous les chameaux. '
  '21':
  - type: note
    content: 'faire aboutir son voyage  : litt. faire réussir son chemin (de même au v. 42) ; cf. Jg 18.5.'
  - type: text
    content: 'L''homme s''interrogeait en silence à son sujet, se demandant si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' allait faire aboutir son voyage.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'anneau  : Smr précise qu''il s''agit d''un anneau nasal , cf. v. 47 ; Ez 16.11s. –  un demi-sicle  : litt. un demi (hébreu béqa ), soit environ 5,7 g ; voir mesures, poids et monnaies. –  pour les poignets…  : litt. pour ses poignées (à elle).'
  - type: text
    content: 'Quand les chameaux eurent achevé de boire, l''homme prit un anneau d''or du poids d''un demi-sicle et, pour les poignets de la jeune fille, deux bracelets du poids de dix sicles d''or. '
  '23':
  - type: text
    content: 'Il dit : De qui es-tu la fille ? Dis-le-moi, je te prie. Y a-t-il un lieu chez ton père pour que nous y passions la nuit ? '
  '24':
  - type: text
    content: 'Elle lui dit : Je suis la fille de Betouel, le fils que Milka a donné à Nahor. '
  '25':
  - type: text
    content: 'Elle ajouta : Il y a chez nous de la paille et du fourrage en abondance, et aussi un lieu pour passer la nuit. '
  '26':
  - type: text
    content: 'Alors l''homme s''inclina et, prosterné devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '27':
  - type: note
    content: 'qui n''a cessé d''être fidèle et loyal  : litt. qui n''a pas abandonné sa fidélité et sa loyauté. –  Le Seigneur a conduit mes pas  : litt. moi, le Seigneur m''a conduit sur le chemin (cf. v. 48n). –  les frères  : des versions anciennes portent le frère (v. 48).'
  - type: text
    content: 'il dit : Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Abraham, mon maître, qui n''a cessé d''être fidèle et loyal envers mon maître ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a conduit mes pas jusque chez les frères de mon maître. '
  '28':
  - type: text
    content: 'La jeune fille courut raconter tout cela chez sa mère. '
  '29':
  - type: text
    content: 'Rébecca avait un frère nommé Laban. Laban courut dehors vers l''homme, près de la source. '
  '3':
  - type: note
    content: 'Dieu / ciel / terre 14.19. –  filles des Cananéens  : cf. 26.34s ; 28.1-10 ; 29.1-20 ; Dt 7.3s ; Esd 10.2ss ; Né 13.23ss.'
  - type: text
    content: 'et je te ferai jurer par le '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu du ciel et Dieu de la terre, que tu ne prendras pas pour mon fils une femme d''entre les filles des Cananéens parmi lesquels j''habite. '
  '30':
  - type: text
    content: '– Dès qu''il vit l''anneau et les bracelets aux mains de sa sœur et qu''il entendit les paroles de Rébecca, sa sœur, qui disait : « Ainsi m''a parlé cet homme », il vint vers l''homme, qui se tenait auprès des chameaux, près de la source. – '
  '31':
  - type: note
    content: 'J''ai préparé  : la même forme verbale a le sens de vider en Lv 14.36.'
  - type: text
    content: 'Il lui dit : Viens, toi qui es béni du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Pourquoi restes-tu dehors ? J''ai préparé la maison et j''ai fait une place pour les chameaux. '
  '32':
  - type: note
    content: 'L''homme entra…  : Vg il fit entrer l''homme… –  Laban fit décharger  : litt. il fit décharger. –  se lavent les pieds 18.4n.'
  - type: text
    content: 'L''homme entra dans la maison. Laban fit décharger les chameaux et donna de la paille et du fourrage pour les chameaux, ainsi que de l''eau pour que l''homme et les gens qui l''accompagnaient se lavent les pieds. '
  '33':
  - type: note
    content: 'Laban dit  : litt. il dit.'
  - type: text
    content: 'Puis on plaça devant lui de quoi manger. Mais il dit : Je ne mangerai pas avant d''avoir dit ce que j''ai à dire. Laban dit : Parle !'
  '34':
  - type: text
    content: 'Alors il dit : Je suis le serviteur d''Abraham. '
  '35':
  - type: note
    content: 'qui est devenu… important  : litt. et il a grandi. Cf. 13.2.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a grandement béni mon maître, qui est devenu un homme important. Il lui a donné du petit bétail et du gros bétail, de l''argent et de l''or, des serviteurs et des servantes, des chameaux et des ânes. '
  '36':
  - type: note
    content: 'dans (litt. après) sa vieillesse  : le texte hébreu traditionnel se réfère à la vieillesse de Sara, LXX et Smr à celle d''Abraham (comme en 21.2). –  c''est à ce fils (litt. à lui) qu''il a donné tout… 25.5.'
  - type: text
    content: 'Sara, la femme de mon maître, a, dans sa vieillesse, donné un fils à mon maître ; c''est à ce fils qu''il a donné tout ce qui lui appartient. '
  '37':
  - type: text
    content: 'Mon maître m''a fait prêter serment, en disant : « Tu ne prendras pas pour mon fils une femme d''entre les filles des Cananéens dans le pays desquels j''habite ; '
  '38':
  - type: note
    content: sans faute Es 5.9n.
  - type: text
    content: 'tu iras sans faute dans ma famille, dans mon clan, prendre une femme pour mon fils. » '
  '39':
  - type: text
    content: 'J''ai dit à mon maître : « Peut-être la femme ne me suivra-t-elle pas. » '
  '4':
  - type: text
    content: 'Tu iras dans mon pays, au lieu de mes origines, et là tu prendras une femme pour Isaac, mon fils. '
  '40':
  - type: note
    content: Cf. v. 7.
  - type: text
    content: 'Il m''a répondu : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', devant qui j''ai marché, enverra son messager avec toi et fera aboutir ton voyage ; tu prendras pour mon fils une femme de mon clan, de ma famille. '
  '41':
  - type: note
    content: 'dégagé  : le terme évoque souvent l’innocence, cf. v. 8. –  de mon adjuration  : litt. de ma malédiction (Lv 5.1n  ; Nb 5.21nss ; Dt 29.11nss ; Né 10.30), le terme évoque plus précisément la malédiction conditionnelle (voir bénédiction) annoncée en cas de non-respect du serment ou de l''alliance (cf. Rt 1.17n). –  si on ne t''accorde pas…  : litt. s''ils ne te donnent pas.'
  - type: text
    content: 'Tu seras dégagé de mon adjuration quand tu seras arrivé dans mon clan ; si on ne t''accorde pas la jeune fille, tu seras dégagé de mon adjuration. » '
  '42':
  - type: note
    content: 'si tu daignes…  : autre traduction fais aboutir, je te prie, le voyage…  ; cf. v. 21n.'
  - type: text
    content: 'Je suis arrivé aujourd''hui à la source et j''ai dit : «  '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Abraham, mon maître, si tu daignes faire aboutir le voyage que j''ai entrepris… '
  '43':
  - type: note
    content: 'la jeune fille  : sur le terme qui apparaît ici, voir Es 7.14n.'
  - type: text
    content: 'je me tiens près de la source ; que la jeune fille qui sortira pour puiser, à qui je dirai : “Donne-moi à boire, je te prie, un peu d''eau de ta cruche”, '
  '44':
  - type: text
    content: 'et qui me répondra : “Bois donc ; je puiserai aussi pour tes chameaux !” – que celle-là soit la femme que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a destinée au fils de mon maître ! » '
  '45':
  - type: text
    content: 'Avant que je n''aie achevé de parler en mon cœur, Rébecca sort, sa cruche sur l''épaule ; elle descend à la source et puise. Je lui ai dit : « Donne-moi à boire, je te prie. » '
  '46':
  - type: text
    content: 'Elle s''est empressée d''incliner la cruche qu''elle portait et elle a dit : « Bois, je donnerai aussi à boire à tes chameaux ! » J''ai bu, puis elle a aussi donné à boire aux chameaux. '
  '47':
  - type: text
    content: 'Je lui ai demandé : « De qui es-tu la fille ? » Elle a répondu : « Je suis la fille de Betouel, le fils de Nahor, celui que Milka lui a donné. » J''ai mis l''anneau à son nez et les bracelets à ses poignets. '
  '48':
  - type: note
    content: 'loyalement conduit  : litt. conduit sur le chemin de loyauté (ou de vérité), cf. v. 27.'
  - type: text
    content: 'Puis je me suis incliné et prosterné devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et j''ai béni le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Abraham, mon maître, qui m''a loyalement conduit à prendre, pour son fils, la fille du frère de mon maître. '
  '49':
  - type: note
    content: 'et je serai fixé  : litt. et je me tournerai à droite ou à gauche.'
  - type: text
    content: Maintenant, si vous voulez agir avec fidélité et loyauté envers mon maître, dites-le-moi ; sinon, dites-le-moi, et je serai fixé.
  '5':
  - type: text
    content: 'Le serviteur lui répondit : Peut-être la femme ne voudra-t-elle pas me suivre dans ce pays-ci ; devrai-je ramener ton fils dans le pays d''où tu es sorti ? '
  '50':
  - type: text
    content: ' '
  - type: note
    content: 'Cette affaire  : autre traduction cette parole . –  vient  : litt. est sortie . –  ni pour ni contre  : litt. de mauvais ou de bon  ; cf. 2.9n  ; 31.24n,29 ; Nb 24.13.'
  - type: text
    content: 'Laban et Betouel répondirent : Cette affaire vient du '
  - type: text
    content: Seigneur
  - type: text
    content: ', nous ne pouvons rien t''en dire, ni pour ni contre. '
  '51':
  - type: note
    content: 'prends-la et va-t''en  : cf. 12.19.'
  - type: text
    content: 'Rébecca est là, devant toi ; prends-la et va-t''en ; qu''elle devienne la femme du fils de ton maître, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a dit !'
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'cela  : litt. leurs paroles.'
  - type: text
    content: 'Lorsque le serviteur d''Abraham entendit cela, il se prosterna jusqu''à terre devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '53':
  - type: note
    content: 'son frère  : certains mss de LXX et Vg portent ses frères.'
  - type: text
    content: 'Le serviteur sortit des objets d''argent, des objets d''or et des vêtements qu''il donna à Rébecca ; il fit aussi de riches présents à son frère et à sa mère. '
  '54':
  - type: text
    content: 'Après cela, lui et les gens qui l''accompagnaient mangèrent et burent, et ils passèrent la nuit. Au matin, quand ils se levèrent, le serviteur dit : Laissez-moi repartir vers mon maître. '
  '55':
  - type: text
    content: 'Le frère et la mère dirent : Que la jeune fille reste avec nous quelque temps encore, une dizaine de jours ; ensuite tu pourras partir. '
  '56':
  - type: text
    content: 'Il leur répondit : Ne me retardez pas, puisque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait aboutir mon voyage ; laissez-moi repartir pour rentrer chez mon maître. '
  '57':
  - type: note
    content: 'demandons-lui son avis  : litt. interrogeons sa bouche.'
  - type: text
    content: 'Alors ils répondirent : Appelons la jeune fille et demandons-lui son avis. '
  '58':
  - type: note
    content: 'Veux-tu aller / Je veux bien  : litt. iras-tu / j''irai.'
  - type: text
    content: 'Ils appelèrent donc Rébecca et lui dirent : Veux-tu aller avec cet homme ? Elle répondit : Je veux bien.'
  '59':
  - type: text
    content: 'Ils laissèrent alors partir leur sœur Rébecca et sa nourrice avec le serviteur d''Abraham et ses gens. '
  '6':
  - type: text
    content: 'Abraham lui répondit : Garde-toi d''y ramener mon fils ! '
  '60':
  - type: note
    content: 'milliers… 28.3. Le terme traduit par dizaines de milliers (ou myriades) fait assonance avec le nom de Rébecca. –  des villes… 22.17n. –  ses ennemis  : litt. ceux qui la haïssent  ; certains mss portent le terme qui désigne les ennemis en 22.17.'
  - type: text
    content: 'Ils bénirent Rébecca et lui dirent :'
  - type: text
    content: Toi, notre sœur,
  - type: text
    content: deviens des milliers de dizaines de milliers !
  - type: text
    content: Que ta descendance
  - type: text
    content: prenne possession des villes de ses ennemis !
  '61':
  - type: text
    content: Rébecca et ses servantes montèrent sur les chameaux et suivirent l'homme. Le serviteur prit Rébecca et partit.
  '62':
  - type: text
    content: ' '
  - type: note
    content: Litt. Isaac était venu de venir ( ?) au puits…  ; d'après Smr et LXX, certains modifient le texte hébreu traditionnel pour lire Isaac était allé dans le désert du puits… –  Lahaï-Roï 16.13-14n  ; 25.11.
  - type: text
    content: 'Isaac était revenu du Puits Lahaï-Roï et il s''était installé dans le Néguev. '
  '63':
  - type: note
    content: 'se promener  : d''après l''arabe et le syriaque. LXX et Vg traduisent le verbe correspondant, qui n''apparaît qu''ici, par méditer.'
  - type: text
    content: 'Vers le soir, Isaac sortit pour se promener dans la campagne ; il leva les yeux et vit des chameaux qui arrivaient. '
  '64':
  - type: note
    content: 'sauta  : litt. tomba.'
  - type: text
    content: 'Rébecca leva les yeux et vit Isaac ; elle sauta du chameau '
  '65':
  - type: note
    content: 'voile  : le terme hébreu correspondant ne revient qu''en 38.14,19. La coutume exigeait qu''une femme se voile devant un étranger, et en particulier devant l''homme qui devait devenir son mari (cf. 29.23ss).'
  - type: text
    content: 'et dit au serviteur : Qui est cet homme dans la campagne qui vient à notre rencontre ? Le serviteur répondit : C''est mon maître. Alors elle prit son voile et se couvrit. '
  '66':
  - type: text
    content: 'Le serviteur raconta à Isaac tout ce qu''il avait fait. '
  '67':
  - type: note
    content: '25.20. –  après la perte de sa mère  : litt. après sa mère  ; certains modifient le texte hébreu traditionnel pour lire après la mort de son père.'
  - type: text
    content: Isaac conduisit Rébecca dans la tente de Sara, sa mère. Il prit Rébecca qui devint sa femme, et il l'aima. C'est ainsi qu'Isaac fut consolé après la perte de sa mère.
  '7':
  - type: note
    content: 'Dieu du ciel  : LXX ajoute et Dieu de la terre (v. 3). Voir cependant Dn 2.18,28 ; Né 1.4. –  juré 22.16. –  de donner  : litt. en disant : Je donnerai. –  pays / descendance 12.7+. –  messager  : autre traduction ange  ; cf. Ex 23.20+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu du ciel, qui m''a pris de la maison de mon père et du pays de mes origines, lui qui m''a parlé et qui m''a juré de donner ce pays à ma descendance, lui-même enverra son messager devant toi ; c''est là-bas que tu prendras une femme pour mon fils. '
  '8':
  - type: note
    content: Cf. Jos 2.20.
  - type: text
    content: 'Si la femme ne veut pas te suivre, tu seras dégagé de ce serment que je t''impose. Mais tu ne ramèneras pas mon fils là-bas. '
  '9':
  - type: text
    content: Le serviteur mit sa main sous la cuisse d'Abraham, son maître, et il s'engagea envers lui par serment au sujet de cette affaire.
