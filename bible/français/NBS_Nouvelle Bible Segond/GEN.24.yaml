document_id: GEN.24,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une femme pour Isaac
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'béni en tout '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 35 ; 2.2+.
      marker-yv: yv-n
    - type: text
      text: 'Abraham était vieux, avancé en âge, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait béni en tout. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec tout…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec tous les biens de son maître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; plusieurs versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avec (une partie) de tous les biens… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mésopotamie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ville de Nahor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : peut-être Harrân, cf. 11.27-32. Mais il y avait aussi non loin de là une ville nommée Nahourou.'
      marker-yv: yv-n
    - type: text
      text: 'Le serviteur prit dix chameaux parmi les chameaux de son maître et il partit, avec tout ce que son maître possédait de meilleur. Il se rendit en Mésopotamie, à la ville de Nahor. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 29.2ss ; Ex 2.16ss.
      marker-yv: yv-n
    - type: text
      text: Il fit agenouiller les chameaux à l'extérieur de la ville, près d'un puits, le soir, à l'heure où les femmes sortent pour puiser de l'eau.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors il dit : '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Dieu d''Abraham, mon maître, accorde-moi, je te prie, de faire une heureuse rencontre aujourd''hui, et agis avec fidélité envers Abraham, mon maître ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je me tiens près de la source, et les filles des gens de la ville sortent pour puiser de l''eau. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Pr 19.14.
      marker-yv: yv-n
    - type: text
      text: 'Que la jeune fille à laquelle je dirai : « Penche ta cruche, je te prie, pour que je boive », et qui répondra : « Bois, je donnerai aussi à boire à tes chameaux ! », soit celle que tu as destinée à Isaac, ton serviteur ! Ainsi je saurai que tu as agi avec fidélité envers mon maître.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pas encore…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 65.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fille de…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: née de Betouel…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 22.20-23.
      marker-yv: yv-n
    - type: text
      text: 'Il n''avait pas encore achevé que sortait Rébecca, la fille de Betouel, fils de Milka, la femme de Nahor, frère d''Abraham. Elle avait sa cruche sur l''épaule. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'C''était une très belle jeune fille ; elle était vierge, aucun homme n''avait jamais eu de relations avec elle. Elle descendit à la source, remplit sa cruche et remonta. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jn 4.7.
      marker-yv: yv-n
    - type: text
      text: 'Le serviteur courut à sa rencontre et dit : Donne-moi, je te prie, quelques gorgées d''eau de ta cruche. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'incliner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de descendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et elle fit descendre sa cruche sur sa main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Sans doute la portait-on sur l'épaule ou sur la tête.
      marker-yv: yv-n
    - type: text
      text: 'Elle répondit : Bois, mon seigneur ! Et elle s''empressa d''incliner sa cruche et de lui donner à boire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Quand elle eut achevé de lui donner à boire, elle dit : Je puiserai aussi pour tes chameaux, jusqu''à ce qu''ils aient assez bu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Une tradition identifie ce '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'serviteur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'à Eliézer (15.2). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ancien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme apparenté au v. 1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sous ma cuisse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit selon toute vraisemblance d''un euphémisme qui désigne les organes génitaux, sources de la vie et porteurs des descendants (cf. 32.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 47.29 ; Ex 1.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Abraham dit à son serviteur, le plus ancien de sa maison, celui qui administrait tous ses biens : Je te prie, mets ta main sous ma cuisse, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Elle s''empressa de vider sa cruche dans l''abreuvoir et courut pour puiser encore au puits ; elle puisa pour tous les chameaux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faire aboutir son voyage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'faire réussir son chemin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (de même au v. 42) ; cf. Jg 18.5.
      marker-yv: yv-n
    - type: text
      text: 'L''homme s''interrogeait en silence à son sujet, se demandant si le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' allait faire aboutir son voyage.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: anneau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Smr
        - type: text
          text: ' précise qu''il s''agit d''un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: anneau nasal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 47 ; Ez 16.11s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un demi-sicle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un demi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: béqa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), soit environ 5,7 g ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour les poignets…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour ses poignées (à elle).
      marker-yv: yv-n
    - type: text
      text: 'Quand les chameaux eurent achevé de boire, l''homme prit un anneau d''or du poids d''un demi-sicle et, pour les poignets de la jeune fille, deux bracelets du poids de dix sicles d''or. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il dit : De qui es-tu la fille ? Dis-le-moi, je te prie. Y a-t-il un lieu chez ton père pour que nous y passions la nuit ? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Elle lui dit : Je suis la fille de Betouel, le fils que Milka a donné à Nahor. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Elle ajouta : Il y a chez nous de la paille et du fourrage en abondance, et aussi un lieu pour passer la nuit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Alors l''homme s''inclina et, prosterné devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui n'a cessé d'être fidèle et loyal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui n'a pas abandonné sa fidélité et sa loyauté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' a conduit mes pas'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'moi, le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' m''a conduit sur le chemin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 48
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les frères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : des versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le frère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 48).
      marker-yv: yv-n
    - type: text
      text: 'il dit : Béni soit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Abraham, mon maître, qui n''a cessé d''être fidèle et loyal envers mon maître ! Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a conduit mes pas jusque chez les frères de mon maître. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'La jeune fille courut raconter tout cela chez sa mère. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Rébecca avait un frère nommé Laban. Laban courut dehors vers l''homme, près de la source. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ciel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: filles
        - type: text
          text: ' des Cananéens'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 26.34s ; 28.1-10 ; 29.1-20 ; Dt 7.3s ; Esd 10.2ss ; Né 13.23ss.'
      marker-yv: yv-n
    - type: text
      text: 'et je te ferai jurer par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Dieu du ciel et Dieu de la terre, que tu ne prendras pas pour mon fils une femme d''entre les filles des Cananéens parmi lesquels j''habite. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '– Dès qu''il vit l''anneau et les bracelets aux mains de sa sœur et qu''il entendit les paroles de Rébecca, sa sœur, qui disait : « Ainsi m''a parlé cet homme », il vint vers l''homme, qui se tenait auprès des chameaux, près de la source. – '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ai préparé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la même forme verbale a le sens de '
      - type: usfm
