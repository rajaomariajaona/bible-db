document_id: REV.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les humains marqués du sceau de Dieu
  - type: text
    content: ' '
  - type: note
    content: quatre anges 9.14s. –  quatre coins Ez 7.2. –  quatre vents Jr 49.36 ; Ez 37.9 ; Za 2.10 ; 6.5 ; Dn 7.2 ; Mt 24.31.
  - type: text
    content: Après cela, je vis quatre anges debout aux quatre coins de la terre. Ils retenaient les quatre vents de la terre, pour qu'aucun vent ne souffle, ni sur la terre, ni sur la mer, ni sur aucun arbre.
  '10':
  - type: note
    content: 4.11+ ; cf. Ps 118.25. –  ils criaient 6.10n. –  sur le trône 4.2+.
  - type: text
    content: 'et ils criaient :'
  - type: text
    content: Le salut est à notre Dieu, qui est assis sur le trône, et à l'agneau !
  '11':
  - type: text
    content: ' '
  - type: note
    content: anges 5.11. –  anciens / êtres vivants 4.4+,6+. –  tombèrent 11.16 ; 19.4.
  - type: text
    content: 'Et tous les anges se tenaient autour du trône, des anciens et des quatre êtres vivants ; ils tombèrent face contre terre, devant le trône, prosternés devant Dieu, '
  '12':
  - type: note
    content: La bénédiction, la gloire, la sagesse, l'action de grâces 4.9,11 ; 5.12nss ; 7.12 ; 21.26 ; 1P 1.7+.
  - type: text
    content: 'en disant :'
  - type: text
    content: Amen !
  - type: text
    content: ' La bénédiction, la gloire, la sagesse, l''action de grâces, l''honneur, la puissance et la force à notre Dieu, à tout jamais ! '
  - type: text
    content: Amen !
  '13':
  - type: text
    content: ' '
  - type: note
    content: l'un des anciens 4.4+ ; cf. 5.5. –  robes blanches v. 9.
  - type: text
    content: 'Alors l''un des anciens me demanda : Ceux qui sont vêtus de robes blanches, qui sont-ils ? D''où sont-ils venus ? '
  '14':
  - type: note
    content: 'c''est toi qui le sais  : cf. Ez 37.3. –  grande détresse  : cf. 1.9+ ; 2.22 ; Dn 12.1 ; Mt 24.9n,21/ /. –  lavé… 22.14 ; cf. Gn 49.11 ; Ex 19.10,14 ; 1Jn 1.7. – Voir sang.'
  - type: text
    content: 'Je lui répondis : Mon seigneur, c''est toi qui le sais ! Et il me dit :'
  - type: text
    content: Ce sont ceux qui viennent de la grande détresse.
  - type: text
    content: Ils ont lavé leurs robes,
  - type: text
    content: ils les ont blanchies dans le sang de l'agneau.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'devant le trône 22.3. –  ils lui rendent un culte 22.3 ; cf. Lc 2.37n. –  dans son sanctuaire 3.12 ; 11.1s,19 ; 14.15,17 ; 15.5ss ; 16.1,17 ; 21.22. –  Celui qui est assis 4.2+. –  les abritera dans sa demeure ou, plus littéralement, étendra sur eux sa tente  : le verbe grec correspondant est apparenté au mot traduit par demeure (litt. tente ) en 13.6 ; 21.3, lequel peut évoquer la Demeure ou « tabernacle » qui tenait lieu de temple dans le désert ; dans ces v. comme en 12.12, le verbe qui apparaît ici sera traduit par avoir sa demeure (litt. dresser sa tente ) ; cf. Ex 25.9n  ; 33.11 ; Jn 1.14n  ; 2Co 12.9n  ; Hé 8.2n  ; 9.2ss. Ici, le choix de ce vocabulaire peut également rappeler (v. 9+) le rituel de la fête des Huttes ou des Tentes ; voir aussi Ex 40 ; Es 4.5s ; Ez 37.27 ; Za 14.16ss ; Jn 7.2n. En tout cette famille de termes revient sept fois dans l''Apocalypse.'
  - type: text
    content: C'est pourquoi ils sont devant le trône de Dieu ;
  - type: text
    content: ils lui rendent un culte, jour et nuit, dans son sanctuaire.
  - type: text
    content: Celui qui est assis sur le trône les abritera dans sa demeure ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: Es 49.10  ; Ps 121.6.
  - type: text
    content: ils n'auront
  - type: text
    content: ' plus '
  - type: text
    content: faim, ils n'auront
  - type: text
    content: ' plus '
  - type: text
    content: soif ;
  - type: text
    content: le soleil ne les frappera plus, ni
  - type: text
    content: ' aucune '
  - type: text
    content: chaleur
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: l'agneau… 5.6. –  les fera paître Es 40.11 ; Ez 34.23 ; Ps 23 ; Jn 10.11,14. –  eaux de la vie 21.6 ; 22.1,17 ; Es 49.10 ; 55.1 ; Jr 2.13 ; Za 14.8 ; Ps 23.2 ; Jn 7.37s. –  Dieu essuiera… 21.4 ; Es 25.8  ; 65.19 ; Jr 31.16.
  - type: text
    content: Car l'agneau qui est au milieu du trône les fera paître
  - type: text
    content: et les conduira aux sources des eaux de la vie,
  - type: text
    content: et Dieu essuiera toute larme de
  - type: text
    content: ' leurs '
  - type: text
    content: yeux
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'soleil levant  : cf. Es 41.25. –  cria… 6.10n  ; 10.3 ; 14.7,9,15 ; 18.2 ; 19.17.'
  - type: text
    content: 'Et je vis un autre ange qui montait du côté du soleil levant et qui tenait le sceau du Dieu vivant. Il cria aux quatre anges à qui il avait été donné de faire du mal à la terre et à la mer : '
  '3':
  - type: note
    content: 'Ne faites pas de mal 2.11n  ; 6.6. –  jusqu''à 6.11n. –  marqué du sceau  : cf. 3.12+ ; 9.4 ; 22.4 ; Ez 9.4,6 ; 2Co 1.22. –  esclaves 1.1+.'
  - type: text
    content: Ne faites pas de mal à la terre, ni à la mer, ni aux arbres, jusqu'à ce que nous ayons marqué du sceau le front des esclaves de notre Dieu.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'j''entendis le nombre cf. v. 9 ; 9.16 ; 2S 24 ; 1Ch 21. –  cent quarante-quatre mille  : ce chiffre symbolique (122 x 1 000 ; cf. les douze tribus d''Israël ou les douze apôtres) désigne de toute évidence le peuple de Dieu rassemblé dans sa totalité ou parvenu à son accomplissement ; cf. 14.1,3 ; voir aussi 21.17. –  tribus (v. 5-8) : cf. 21.12 ; Es 49.6. –  Israélites Lc 1.16n.'
  - type: text
    content: 'Et j''entendis le nombre de ceux qui avaient été marqués du sceau : cent quarante-quatre mille, de toutes les tribus des Israélites :'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 35.22-26. –  Juda 5.5+. –  douze mille  : cf. 21.16.'
  - type: text
    content: de la tribu de Juda, douze mille, marqués du sceau ;
  - type: text
    content: de la tribu de Ruben, douze mille ;
  - type: text
    content: de la tribu de Gad, douze mille ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'tribu de Manassé  : mentionnée quoique incluse en principe dans celle de Joseph (v. 8 ; cf. Gn 48.1,5), peut-être ici à la place de celle de Dan, également omise en 1Ch 4–7 et qu''une tradition juive considérait comme maudite (cf. Jg 18.1).'
  - type: text
    content: de la tribu d'Aser, douze mille ;
  - type: text
    content: de la tribu de Nephtali, douze mille ;
  - type: text
    content: de la tribu de Manassé, douze mille ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: Syméon ou Siméon (cf. Ac 15.14n).
  - type: text
    content: de la tribu de Syméon, douze mille ;
  - type: text
    content: de la tribu de Lévi, douze mille ;
  - type: text
    content: de la tribu d'Issacar, douze mille ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Joseph  : voir v. 6n  ; il est peut-être nommé à la place d''Ephraïm pour une raison analogue à celle de l''omission de Dan (cf. Jg 17 ; Os 5.3s).'
  - type: text
    content: de la tribu de Zabulon, douze mille ;
  - type: text
    content: de la tribu de Joseph, douze mille ;
  - type: text
    content: de la tribu de Benjamin, douze mille, marqués du sceau.
  - type: heading
    content: La foule innombrable devant le trône
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'une grande foule  : cf. 15.2ss ; 19.1s. –  personne ne pouvait compter  : cf. v. 4 ; Gn 15.5. –  de toute nation… 5.9+. –  robes blanches 3.4+ ; cf. 6.11. –  branches de palmiers , sans doute emblèmes de victoire Jn 12.13 ; cf. Lv 23.40,43 ; Mt 21.8ss/ / ; 2 Maccabées 10.7 (à propos de la nouvelle dédicace du temple de Jérusalem après sa profanation) : « Portant des thyrses, des rameaux verts et des palmes, ils firent monter des hymnes vers celui qui avait mené à bien la purification de son lieu saint. »'
  - type: text
    content: 'Après cela, je vis une grande foule, que personne ne pouvait compter, de toute nation, de toutes tribus, de tous peuples et de toutes langues. Ils se tenaient devant le trône et devant l''agneau, vêtus de robes blanches, et des branches de palmiers à la main, '
