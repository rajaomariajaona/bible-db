document_id: PSA.59,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Délivre-moi de mes ennemis
  - type: text
    content: ' '
  - type: note
    content: 57.1n. –  Lorsque Saül… 1S 19.11-17.
  - type: text
    content: Du chef de chœur. « Ne détruis pas ! » De David. Hymne. Lorsque Saül envoya garder la maison pour le faire mourir.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Par sa force…  : traduction incertaine ; quelques mss portent (ô) ma force , comme au v. 18. –  je me garde  : Syr je chante . –  citadelle v. 17s ; 9.10+.'
  - type: text
    content: Par sa force je me garde en allant vers toi,
  - type: text
    content: car Dieu est ma citadelle.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu, mon bienfaiteur  : litt. Dieu de ma fidélité… , c.-à-d. qui est fidèle envers moi , selon une lecture traditionnelle correspondant au texte du v. 18 ; autre texte de sa fidélité, il vient… ou mon Dieu, sa fidélité vient…  ; cf. 144.2n. –  vient au-devant de moi ou me précède. –  m''offre…  : cf. 54.9n.'
  - type: text
    content: Dieu, mon bienfaiteur, vient au-devant de moi,
  - type: text
    content: Dieu m'offre mes détracteurs en spectacle.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'que mon peuple n''oublie  : autre traduction possible, mais moins probable qu''ils n''oublient mon peuple , c.-à-d. qu''ils ne puissent en constater le triomphe ; cf. Ex 9.15s ; Ez 12.16. –  fais-les tomber  : cf. 56.8n.'
  - type: text
    content: Ne les tue pas, de peur que mon peuple n'oublie ;
  - type: text
    content: fais-les errer par ta puissance et fais-les tomber,
  - type: text
    content: Seigneur, notre bouclier !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Leur bouche…  : litt. le péché de leur bouche, (c''est) la parole de leurs lèvres. –  orgueil Es 13.11 ; Ez 7.24. –  malédiction  : autre traduction adjuration  ; sur le terme hébreu correspondant, voir 10.7 ; Gn 24.41n  ; Lv 5.1n  ; Nb 5.21n  ; Dt 29.11nss ; Jb 31.30.'
  - type: text
    content: 'Leur bouche pèche par les paroles de leurs lèvres :'
  - type: text
    content: qu'ils soient pris dans leur propre orgueil !
  - type: text
    content: Leur discours n'est que malédiction et dissimulation.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Extermine Nb 16.21 ; Jr 14.12. –  Qu''on sache  : autre traduction qu''ils sachent . –  Dieu domine Jg 8.23. –  Jacob 14.7+.'
  - type: text
    content: Extermine avec fureur, extermine, et qu'ils ne soient plus !
  - type: text
    content: Qu'on sache ainsi que Dieu domine sur Jacob
  - type: text
    content: 'jusqu''aux extrémités de la terre ! '
  - type: text
    content: Pause.
  '15':
  - type: text
    content: ' '
  - type: note
    content: V. 7+.
  - type: text
    content: Ils reviennent le soir, ils grondent comme des chiens,
  - type: text
    content: ils font le tour de la ville.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'et passent la nuit…  : autre traduction possible, d''après des versions anciennes  : et s''ils ne sont pas rassasiés, ils grognent.'
  - type: text
    content: Ils errent çà et là, cherchant de quoi manger
  - type: text
    content: et passent la nuit sans être rassasiés.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 21.14 ; 92.3. –  au matin 30.6+ ; cf. 5.4 ; 57.9+. –  au jour de ma détresse 9.10+.
  - type: text
    content: Quant à moi, je chanterai ta force ;
  - type: text
    content: au matin, je crierai ta fidélité.
  - type: text
    content: Car tu es pour moi une citadelle,
  - type: text
    content: un refuge au jour de ma détresse.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 10n,11n. –  je chanterai 7.18n  ; cf. 27.6 ; 81.2 ; 95.1. –  mon bienfaiteur v. 11n.
  - type: text
    content: O ma force, je chanterai pour toi,
  - type: text
    content: car Dieu est ma citadelle, mon bienfaiteur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 18.49 ; 31.16.
  - type: text
    content: Délivre-moi de mes ennemis, mon Dieu,
  - type: text
    content: élève-moi plus haut que ceux qui se dressent contre moi !
  '3':
  - type: text
    content: ' '
  - type: note
    content: '71.4 ; 97.10. –  malfaisants  : cf. v. 6 ; 5.6+. –  hommes sanguinaires 5.7+ ; 26.9n.'
  - type: text
    content: Délivre-moi des malfaisants,
  - type: text
    content: et sauve-moi des hommes sanguinaires !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'embuscade 10.9 ; 94.21 ; Pr 1.11. –  hommes puissants 18.18. –  sans que je sois…  : cf. 7.4-6.'
  - type: text
    content: Car ils m'ont tendu une embuscade ;
  - type: text
    content: des hommes puissants complotent contre moi,
  - type: text
    content: 'sans que je sois un criminel, sans que j''aie péché, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '5':
  - type: text
    content: ' '
  - type: note
    content: ils courent 62.3 ; Jb 16.14. –  éveille-toi 35.23+.
  - type: text
    content: Sans que j'aie commis une faute, ils courent, ils se préparent ;
  - type: text
    content: éveille-toi, viens à ma rencontre, et regarde !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'lève-toi 3.8+. –  faire rendre des comptes Jr 6.15n. –  Ne fais grâce…  : cf. Es 26.10. –  traîtres malfaisants  : cf. 25.3.'
  - type: text
    content: 'Toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu des Armées, Dieu d''Israël,'
  - type: text
    content: lève-toi, pour faire rendre des comptes à toutes les nations !
  - type: text
    content: 'Ne fais grâce à aucun de ces traîtres malfaisants ! '
  - type: text
    content: Pause.
  '7':
  - type: text
    content: ' '
  - type: note
    content: comme des chiens v. 15 ; cf. 22.17. –  le tour de la ville 55.11.
  - type: text
    content: Ils reviennent le soir, ils grondent comme des chiens,
  - type: text
    content: ils font le tour de la ville.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'éructe  : litt. fait jaillir , probablement ici au sens figuré de proférer des insultes  ; sur le verbe hébreu correspondant, voir 19.3n  ; dans un sens négatif analogue, voir 94.4 ; Pr 15.2n,28n. –  il y a des épées sur leurs lèvres  : certains modifient le texte hébreu traditionnel pour lire leurs lèvres sont des épées ou leurs lèvres profèrent des outrages  ; cf. 57.5+. –  qui donc entend ? la question peut être comprise, ou comme un défi lancé par les injustes (cf. 14.1), ou comme l''expression de l''angoisse du juste persécuté.'
  - type: text
    content: Leur bouche éructe,
  - type: text
    content: il y a des épées sur leurs lèvres ;
  - type: text
    content: qui donc entend ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: tu ris 2.4+.
  - type: text
    content: 'Mais toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu ris de ces gens-là,'
  - type: text
    content: tu te moques de toutes les nations.
