document_id: MAT.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus guérit un paralytique
  - type: heading
    content: Mc 2.1-12  ; Lc 5.17-25
  - type: text
    content: ' '
  - type: note
    content: Il s'agit de la mer de Galilée ou lac de Tibériade et de la ville de Capharnaüm 4.13n  ; 17.24ss ; Jn 2.12.
  - type: text
    content: Il monta dans un bateau, traversa la mer et se rendit dans sa ville.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'dans la maison / collecteurs des taxes… Mc 2.15n. –  pécheurs  : ce terme peut désigner soit des non-Juifs, soit des Juifs qui ne respectaient pas toutes les prescriptions de la Loi  ; à l''époque de Mt, les pharisiens appelaient ainsi tous ceux qui ne suivaient pas leurs traditions (cf. 11.19/ / ; Lc 15.2 ; 19.7 ; 1Co 5.9-11 ; Ga 2.15).'
  - type: text
    content: 'Comme il était à table, dans la maison, beaucoup de collecteurs des taxes et de pécheurs étaient venus prendre place avec Jésus et ses disciples. '
  '11':
  - type: note
    content: 'maître  : au sens d’enseignant.'
  - type: text
    content: 'Voyant cela, les pharisiens disaient à ses disciples : Pourquoi votre maître mange-t-il avec les collecteurs des taxes et les pécheurs ?'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Jésus  : litt. lui.'
  - type: text
    content: 'Jésus, qui avait entendu, dit : Ce ne sont pas les bien portants qui ont besoin de médecin, mais les malades. '
  '13':
  - type: note
    content: 'Je veux la compassion et non le sacrifice 12.7 ; 1S 15.22 ; Os 6.6  ; Pr 21.3 ; Hé 10.5. Cf. Evangile des ébionites (Epiphane, Panarion, 30,16,4s) : « Je suis venu abolir les sacrifices, et si vous ne vous détournez pas du sacrifice, la Colère ne se détournera pas de vous. » –  justes / pécheurs  : cf. 18.11n  ; 21.31 ; Lc 19.10 ; 1Tm 1.15.'
  - type: text
    content: 'Allez apprendre ce que signifie : '
  - type: text
    content: Je veux la compassion et non le sacrifice ;
  - type: text
    content: ' car je ne suis pas venu appeler des justes, mais des pécheurs.'
  - type: heading
    content: Jésus et le jeûne
  - type: heading
    content: Mc 2.18-22  ; Lc 5.33-39
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'disciples de Jean le Baptiseur, 11.18-19/ /. –  pharisiens Lc 18.12. –  souvent  : cette précision est absente de certains mss. Sur le jeûne , voir 6.16+.'
  - type: text
    content: 'Alors les disciples de Jean viennent lui demander : Pourquoi tes disciples ne jeûnent-ils pas, alors que nous et les pharisiens nous jeûnons souvent ? '
  '15':
  - type: note
    content: 'amis du marié  : litt. fils de la salle des noces (cf. 22.2-14) ou de la chambre nuptiale. Voir Mc 2.19n  ; Jn 3.29n. –  marié… enlevé / jeûneront 26.11/ / ; 2S 1.12 ; Es 53.8 ; Lc 17.22 ; Jn 13.33 ; 16.20-22.'
  - type: text
    content: 'Jésus leur répondit : Les amis du marié peuvent-ils être en deuil tant que le marié est avec eux ? Les jours viendront où le marié leur sera enlevé ; alors ils jeûneront. '
  '16':
  - type: note
    content: 'neuf  : litt. non foulé  ; cf. Rm 6.4 ; 7.6 ; 2Co 5.17. –  pièce  : le mot ainsi traduit est apparenté au verbe qui signifie remplir (5.17n) ; il a sans doute ici le sens de complément (pièce rapportée). Mais il a le plus souvent une autre acception, celle de plénitude (Jn 1.16). –  déchirure  : c''est du terme grec ainsi traduit que vient notre mot schisme.'
  - type: text
    content: 'Personne ne raccommode un vieux vêtement avec un morceau de drap neuf, car la pièce tire sur le vêtement et il en résulte une déchirure pire. '
  '17':
  - type: note
    content: 'Cf. Jb 32.19. L''adjectif ici traduit par nouveau évoque l''idée de jeunesse, tandis que le mot rendu par neuves s''applique plutôt, en général, à quelque chose d''inédit (13.52) ou qui n''a jamais été utilisé (27.60). –  éclatent  : litt. se déchirent, même verbe en 7.6 (lacérer).'
  - type: text
    content: On ne met pas non plus du vin nouveau dans de vieilles outres ; autrement les outres éclatent, le vin se répand et les outres sont perdues ; on met le vin nouveau dans des outres neuves, et l'ensemble se conserve.
  - type: heading
    content: La femme qui touche le vêtement de Jésus et la jeune fille rappelée à la vie
  - type: heading
    content: Mc 5.21-43  ; Lc 8.40-56
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'chef  : le même mot (aussi v. 23 ; 20.25) sera traduit par prince au v. 34 ; on le retrouve en Lc 18.18. D''après les parallèles synoptiques il s''agit ici du président de la synagogue. –  se prosternait 2.2n  ; voir culte. –  pose ta main  : cf. Mc 7.32n. Sur l''imposition des mains, cf. Mt 19.13 ; Mc 6.5 ; 8.23,25 ; 16.18 ; Lc 4.40 ; 13.13 ; Ac 6.6+ ; 9.12,17 ; 28.8 ; cf. Apocryphe de la Genèse (Qumrân) 20.29 : « J''imposai mes mains sur sa tête, et la plaie fut écartée de lui, et l''esprit mauvais fut chassé loin de lui, et il vécut. » – Cf. Jn 11.22.'
  - type: text
    content: 'Tandis qu''il leur disait cela, un chef arriva ; il se prosternait devant lui et disait : Ma fille est morte il y a un instant, mais viens, pose ta main sur elle, et elle vivra. '
  '19':
  - type: note
    content: 8.7.
  - type: text
    content: Jésus se leva et le suivit avec ses disciples.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Voyant leur foi 8.13+ ; 23.23n  ; Ac 3.4,16 ; 14.9. –  Courage v. 22 ; 14.27 ; Jn 16.33 ; Ac 23.11. –  péchés… pardonnés Lc 7.48ss ; Jn 5.14 ; Ac 13.38.
  - type: text
    content: 'On lui amena un paralytique couché sur un lit. Voyant leur foi, Jésus dit au paralytique : Courage, mon enfant ! Tes péchés sont pardonnés. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'perte de sang Lv 15.25ss. –  toucha Mc 3.10 ; Lc 6.19 ; Ac 19.12. –  frange  : autre traduction possible houppe  ; 14.36/ / ; 23.5+ ; dans LXX, le mot grec correspondant traduit le terme hébreu rendu par houppe en Nb 15.38s (cf. Dt 22.12), mais aussi celui qui désigne le pan du vêtement en Za 8.23.'
  - type: text
    content: 'Alors une femme atteinte d''une perte de sang depuis douze ans s''approcha par-derrière et toucha la frange de son vêtement, '
  '21':
  - type: note
    content: sauvée, c.-à-d., en l'occurrence, guérie  ; cf. v. 22 ; 1.21 ; 8.25 ; 10.22 ; 14.30 ; 16.25 ; 18.11n  ; 19.25 ; 24.13,22 ; 27.40,42,49 ; voir aussi Lc 7.50 ; Jc 5.15.
  - type: text
    content: 'car elle se disait : Si seulement je touche son vêtement, je serai sauvée ! '
  '22':
  - type: note
    content: 8.13n.
  - type: text
    content: 'Jésus se retourna ; la voyant, il dit : Courage, ma fille ! Ta foi t''a sauvée. Et la femme fut sauvée dès ce moment même.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. 11.17 ; 2Ch 35.25. On jouait en particulier de la flûte à l'occasion d'un deuil, pour accompagner les chants funèbres ; outre les amis de la famille, des musiciens professionnels étaient présents dans de telles occasions.
  - type: text
    content: 'Lorsque Jésus fut arrivé à la maison du chef et qu''il vit les joueurs de flûte et la foule agitée, '
  '24':
  - type: note
    content: Jn 11.11-14 ; Ac 20.10.
  - type: text
    content: 'il dit : Retirez-vous, car la jeune fille n''est pas morte : elle dort. Eux se moquaient de lui. '
  '25':
  - type: note
    content: '8.15+ ; 2R 4.33 ; Ac 9.40. –  chassée ou renvoyée  : même verbe v. 33s,38n (envoyer). –  se réveilla ou se leva, cf. Mc 5.41n.'
  - type: text
    content: 'Quand la foule eut été chassée, il entra, saisit la jeune fille par la main, et la jeune fille se réveilla. '
  '26':
  - type: note
    content: V. 31 ; 4.24 ; Lc 4.13,37/ / ; 5.15 ; 7.17.
  - type: text
    content: Le bruit s'en répandit dans tout ce pays-là.
  - type: heading
    content: Jésus guérit deux aveugles
  - type: heading
    content: Cf. Mt 20.29-34/ /
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'deux aveugles  : cf. 20.29-34/ /. –  Aie compassion 5.7n  ; 15.22 ; 17.15 ; 20.30-31/ / ; Ps 86.3 ; Lc 17.13. –  Fils de David 1.1 ; 12.23 ; 15.22 ; 21.9 ; 22.42 ; Mc 10.47n.'
  - type: text
    content: 'Comme Jésus passait plus loin, deux aveugles le suivirent en criant : Aie compassion de nous, Fils de David ! '
  '28':
  - type: note
    content: 'Mc 9.22-24 ; Jn 9.35. –  Croyez-vous  : un terme apparenté est traduit par foi au v. 29.'
  - type: text
    content: 'Lorsqu''il arriva à la maison, les aveugles s''approchèrent de lui, et Jésus leur dit : Croyez-vous que je puisse faire cela ? – Oui, Seigneur, lui répondirent-ils. '
  '29':
  - type: note
    content: V. 2+ ; 8.13+.
  - type: text
    content: 'Alors il leur toucha les yeux en disant : Qu''il vous advienne selon votre foi ! '
  '3':
  - type: note
    content: scribes 7.29 ; 8.19+. –  Il blasphème 26.65 ; Jn 10.33,36.
  - type: text
    content: 'Quelques scribes se dirent alors : Il blasphème. '
  '30':
  - type: note
    content: 'Cf. 8.4+. –  s''emportant contre eux  : autres traductions réagissant vivement à leur égard ; les grondant ; leur parlant sévèrement  ; voir Mc 1.43nss ; Jn 11.33n.'
  - type: text
    content: 'Et leurs yeux s''ouvrirent. Jésus, s''emportant contre eux, leur dit : Prenez garde que personne ne le sache ! '
  '31':
  - type: note
    content: V. 26+ ; Ps 66.16 ; Ac 4.20.
  - type: text
    content: Mais, à peine sortis, ils se mirent à parler de lui dans tout le pays.
  - type: heading
    content: Jésus guérit un démoniaque muet
  - type: heading
    content: Lc 11.14-15  ; cf. Mt 12.22-24/ /
  '32':
  - type: text
    content: ' '
  - type: note
    content: Cf. 12.22-30 ; Lc 11.14. –  démoniaque 4.24n. –  muet ou sourd-muet , même possibilité en 11.5 ; cf. 15.30.
  - type: text
    content: 'Comme ils s''en allaient, on lui amena un démoniaque muet. '
  '33':
  - type: note
    content: 8.10n,27+ ; Mc 2.12 ; 7.37.
  - type: text
    content: 'Le démon chassé, le muet parla. Et les foules, étonnées, disaient : Jamais rien de semblable ne s''est vu en Israël. '
  '34':
  - type: note
    content: pharisiens v. 11,14 ; cf. 3.7 ; 5.20. – Cf. 10.25 ; 12.24-30 ; 21.23 ; Mc 3.22. Le mot traduit ici par prince a été rendu ailleurs par chef (v. 18) et peut s'appliquer à tous ceux qui ont un rang d'autorité (cf. 20.25).
  - type: text
    content: 'Mais les pharisiens disaient : C''est par le prince des démons qu''il chasse les démons !'
  - type: heading
    content: Jésus et les foules
  - type: heading
    content: Mc 6.6  ; Lc 8.1
  '35':
  - type: text
    content: ' '
  - type: note
    content: 4.23+ ; 11.1.
  - type: text
    content: Jésus parcourait toutes les villes et les villages, il enseignait dans leurs synagogues, proclamait la bonne nouvelle du Règne et guérissait toute maladie et toute infirmité.
  - type: heading
    content: Mc 6.34  ; cf. Lc 10.2
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'il fut ému  : le texte grec précise à leur sujet  ; le verbe est dérivé du mot qui désigne au sens propre les entrailles (les intestins en Ac 1.18) et représente le siège des émotions et des sentiments (Lc 1.78n  ; 2Co 6.12n  ; 7.15 ; Ph 1.8n  ; 2.1 ; Phm 7n,12,20 ; 1Jn 3.17n) ; au figuré, il évoque la compassion, la pitié, la tendresse ou l''affection 14.14/ / ; 15.32/ / ; 20.34 ; cf. 5.7n  ; Mc 1.41/ / ; Hé 4.15. –  moutons… 10.6+ ; 26.31/ / ; Nb 27.17  ; 1R 22.17 ; 2Ch 18.16  ; cf. Es 13.14 ; 53.6 ; Jr 50.6 ; Ez 34.4ss ; Ps 119.176 ; 1P 2.25.'
  - type: text
    content: 'A la vue des foules, il fut ému, car elles étaient lassées et abattues, '
  - type: text
    content: comme des moutons qui n'ont pas de berger
  - type: text
    content: '. '
  '37':
  - type: note
    content: 'Jn 4.35 ; Ap 14.15. Evangile selon Thomas 73 : « Jésus a dit : “La moisson est abondante, mais les ouvriers sont peu nombreux. Priez donc le Seigneur, pour qu''il envoie des ouvriers pour la moisson.” »'
  - type: text
    content: 'Alors il dit à ses disciples : La moisson est grande, mais il y a peu d''ouvriers. '
  '38':
  - type: note
    content: Priez 2Th 3.1. –  maître ou seigneur. – Le mot traduit ici par envoyer, qui signifie litt. lancer (c'est lui qui est traduit chasser en 10.1), diffère de celui (10.5,16 ; 15.24) qui donnera le nom «apôtre  » (= « envoyé », 10.2). Cf. Jn 17.18 ; 20.21 ; Rm 10.15.
  - type: text
    content: Priez donc le maître de la moisson d'envoyer des ouvriers dans sa moisson.
  '4':
  - type: note
    content: '12.25 ; Jr 17.10 ; Za 8.17 ; Lc 5.22 ; Jn 2.25. –  avez-vous de mauvaises pensées  : litt. pensez-vous des choses mauvaises dans vos cœurs.'
  - type: text
    content: 'Jésus, qui voyait leurs pensées, dit : Pourquoi avez-vous de mauvaises pensées ? '
  '5':
  - type: text
    content: 'Qu''est-ce qui est le plus facile, de dire : « Tes péchés sont pardonnés », ou de dire : « Lève-toi et marche ! » '
  '6':
  - type: note
    content: Fils de l'homme 8.20n. –  l'autorité… pour ou le pouvoir, le droit… de, cf. 7.29 ; 8.9n. – Jn 5.8s,22.
  - type: text
    content: 'Eh bien, afin que vous sachiez que le Fils de l''homme a l''autorité sur la terre pour pardonner les péchés – il dit alors au paralytique : Lève-toi, prends ton lit et retourne chez toi. '
  '7':
  - type: text
    content: 'L''homme se leva et s''en alla chez lui. '
  '8':
  - type: note
    content: 'saisies de crainte  : cf. 17.6 ; 27.54. –  glorifièrent 15.31 ; Lc 7.16. –  aux humains  : cf. 16.19 ; 18.18.'
  - type: text
    content: En voyant cela, les foules, saisies de crainte, glorifièrent Dieu qui a donné aux humains une telle autorité.
  - type: heading
    content: Le repas avec les pécheurs
  - type: heading
    content: Mc 2.13-17  ; Lc 5.27-32
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Matthieu  : Lévi selon Mc 2.14. –  Suis-moi 8.22+.'
  - type: text
    content: 'En passant plus loin, Jésus vit un homme appelé Matthieu assis au bureau des taxes. Il lui dit : Suis-moi. Celui-ci se leva et le suivit.'
