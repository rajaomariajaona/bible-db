document_id: JOB.39,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'les bouquetins  : litt. ceux qui escaladent le rocher , expression qui pourrait désigner toutes sortes d''animaux de la montagne. Même terme en 1S 24.3 ; Ps 104.18. –  Observes-tu  : autre traduction gardes-tu . –  biches… Ps 29.9.'
  - type: text
    content: Connais-tu le temps où les bouquetins font leurs petits ?
  - type: text
    content: Observes-tu les biches quand elles mettent bas ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: Litt. attacheras-tu un aurochs (cf. Ps 92.11+) , à un sillon sa corde, hersera-t-il des vallons derrière toi ?
  - type: text
    content: Peux-tu attacher l'aurochs avec une corde pour qu'il trace un sillon ?
  - type: text
    content: Traînera-t-il la herse derrière toi dans les vallons ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: sa force est grande Nb 23.22 ; Dt 33.17 ; Ps 92.11.
  - type: text
    content: Mettras-tu ta confiance en lui, parce que sa force est grande ?
  - type: text
    content: Lui abandonneras-tu le produit de ton travail ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'pour rentrer ta récolte  : litt. pour faire revenir ta semence (le produit des dernières semailles et la substance même des prochaines), d''après une lecture traditionnelle de l''hébreu ; autre lecture traditionnelle pour qu''il revienne (le mot semence ou récolte devrait alors se rattacher au verbe amasser ).'
  - type: text
    content: Peux-tu compter sur lui pour rentrer ta récolte
  - type: text
    content: et pour l'amasser sur ton aire ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'autruches  : le mot hébreu (litt. les crieuses ) n''apparaît qu''ici (autre terme qu''en 30.29n). –  l''aile, le plumage…  : autre traduction l''aile de la cigogne (dont le nom rappelle le mot habituellement traduit par fidélité , cf. Jr 8.7 ; Ps 104.17) et de l''épervier (terme ressemblant au v. 26) ; cf. Ez 17.3n.'
  - type: text
    content: L'aile des autruches se déploie joyeusement ;
  - type: text
    content: on dirait l'aile, le plumage de la cigogne.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'l''autruche…  : litt. elle abandonne…'
  - type: text
    content: Mais l'autruche abandonne ses œufs à la terre
  - type: text
    content: et les laisse chauffer dans la poussière,
  '15':
  - type: text
    content: oubliant qu'un pied peut les écraser,
  - type: text
    content: qu'un animal sauvage peut les piétiner.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Lm 4.3. –  peiner  : autres traductions se fatiguer (même terme hébreu au v. 11 et en 10.3n) ; travailler.'
  - type: text
    content: Elle est dure envers ses petits comme si ce n'étaient pas les siens ;
  - type: text
    content: peiner pour rien ne l'effraie pas.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '35.11. –  privée  : le même verbe est traduit par laisser dans l''oubli en 11.6.'
  - type: text
    content: Car Dieu l'a privée de sagesse,
  - type: text
    content: il ne lui a pas donné l'intelligence en partage.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Quand elle se dresse…  : autre traduction quand elle déploie ses plumes (pour prendre la vitesse, en se laissant porter par le vent). –  et prend son élan  : litt. vers le haut . –  de son cavalier  : autre traduction du conducteur de char.'
  - type: text
    content: Quand elle se dresse et prend son élan,
  - type: text
    content: elle se rit du cheval et de son cavalier.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 33.17 ; 147.10.
  - type: text
    content: Est-ce toi qui donnes la puissance au cheval
  - type: text
    content: et qui revêts son cou d'une crinière flottante ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'les mois  : litt. les lunes , cf. 3.6n.'
  - type: text
    content: Peux-tu compter les mois pendant lesquels elles portent ?
  - type: text
    content: Connais-tu le temps où elles font leurs petits ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'comme le criquet Jl 2.4s. –  En s''ébrouant  : cf. Jr 8.16n. –  fièrement  : cf. Za 10.3n.'
  - type: text
    content: Est-ce toi qui le fais bondir comme le criquet ?
  - type: text
    content: En s'ébrouant fièrement, il répand la terreur.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Il piaffe  : le verbe hébreu est au pluriel.'
  - type: text
    content: Il piaffe dans le vallon, il est content de sa force,
  - type: text
    content: il s'élance au-devant des armes ;
  '22':
  - type: text
    content: il se rit de la frayeur, il n'est pas terrifié,
  - type: text
    content: il ne recule pas devant l'épée.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'la lance étincelante  : litt. la flamme de la lance  ; cf. Gn 3.24n. –  javelot  : même terme hébreu en 41.21 ; autre terme hébreu que 33.18+.'
  - type: text
    content: Sur lui retentissent le carquois,
  - type: text
    content: la lance étincelante et le javelot.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Bondissant d''ardeur…  : litt. dans un bondissement et une agitation il avale la terre  ; cf. Za 6.6s. –  Il ne peut se contenir…  : autres traductions il n''est pas retenu par le son… ; il ne peut attendre le son… –  son de la trompe  : cf. Nb 10.9 ; 31.6.'
  - type: text
    content: Bondissant d'ardeur, il dévore l'espace.
  - type: text
    content: Il ne peut se contenir au son de la trompe ;
  '25':
  - type: text
    content: 'quand la trompe sonne, il crie : « Ah ! ah ! »'
  - type: text
    content: De loin il flaire la guerre,
  - type: text
    content: la voix tonnante des chefs et les acclamations.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'épervier ou faucon Lv 11.16. –  prend son vol  : autre traduction se remplume  ; cf. Es 40.31 ; Ps 103.5. –  vers le sud  : peut-être pour sa migration ; on a par ailleurs observé autrefois que l''épervier s''exposait au vent du sud et on en a déduit que la chaleur favorisait le renouvellement de son plumage.'
  - type: text
    content: Est-ce par ton intelligence que l'épervier prend son vol
  - type: text
    content: et qu'il étend ses ailes vers le sud ?
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'par ton ordre  : litt. sur ta bouche . –  vautour  : le terme hébreu est habituellement traduit par aigle , mais il peut désigner les deux espèces d''oiseaux ; ici il s''applique de toute évidence à un charognard (v. 30) ; cf. 9.26 ; Dt 28.49 ; Pr 23.5 ; Mt 24.28n. –  sur les hauteurs Jr 49.16 ; Ab 4.'
  - type: text
    content: Est-ce par ton ordre que le vautour s'élève
  - type: text
    content: et qu'il place son nid sur les hauteurs ?
  '28':
  - type: text
    content: ' '
  - type: note
    content: passe la nuit ou loge , cf. 19.4n.
  - type: text
    content: C'est dans les rochers qu'il demeure et qu'il passe la nuit,
  - type: text
    content: sur une dent de rocher il a sa forteresse.
  '29':
  - type: text
    content: De là il recherche sa proie,
  - type: text
    content: de loin, ses yeux l'aperçoivent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'et sont délivrées de leurs douleurs  : litt. et renvoient leurs liens , ce qui peut aussi signifier déposent leur portée.'
  - type: text
    content: Elles se courbent, donnent le jour à leur progéniture
  - type: text
    content: et sont délivrées de leurs douleurs.
  '30':
  - type: text
    content: ' '
  - type: note
    content: Mt 24.28 ; Lc 17.37.
  - type: text
    content: Ses petits boivent le sang ;
  - type: text
    content: là où il y a des cadavres, il est là.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'en plein air  : certains traduisent dans le désert . –  ils s''éloignent  : litt. ils sortent.'
  - type: text
    content: Leurs petits prennent de la vigueur et grandissent en plein air,
  - type: text
    content: ils s'éloignent et ne reviennent plus auprès d'elles.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'dénoué  : litt. ouvert  ; le même verbe est traduit par desserrer en 38.31. –  âne sauvage 11.12+ ; Os 8.9.'
  - type: text
    content: Qui a mis l'onagre en liberté ?
  - type: text
    content: Qui a dénoué les liens de l'âne sauvage ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'plaine aride 24.5 ; Jr 2.24 (cf. 17.6) ; cf. Jos 8.14n. –  son habitation  : litt. sa maison.'
  - type: text
    content: J'ai fait de la plaine aride son habitation,
  - type: text
    content: de la terre salée sa demeure.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 14.8. –  du charretier  : autre traduction de l''oppresseur (cf. 3.18n).'
  - type: text
    content: Il se rit du tumulte de la ville,
  - type: text
    content: il n'entend pas les cris du charretier.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 6.5.
  - type: text
    content: Il parcourt les montagnes pour trouver sa pâture,
  - type: text
    content: il cherche tout ce qui est vert.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps 22.22.
  - type: text
    content: L'aurochs acceptera-t-il d'être à ton service ?
  - type: text
    content: Passera-t-il la nuit près de ta mangeoire ?
