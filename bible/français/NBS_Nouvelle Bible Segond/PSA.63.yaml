document_id: PSA.63,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ta fidélité est meilleure que la vie
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 2 ; 1S 23.14 ; 24.2.
  - type: text
    content: Psaume. De David. Lorsqu'il était dans le désert de Juda.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'dans les profondeurs…  : cf. 22.30 ; 31.18 ; 55.16 ; Es 44.23 ; voir aussi Ep 4.9.'
  - type: text
    content: Mais ceux qui cherchent à me jeter dans la tourmente
  - type: text
    content: iront dans les profondeurs de la terre ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'précipités…  : cf. Jr 18.21n  ; Ez 35.5.'
  - type: text
    content: ils seront précipités sur le tranchant de l'épée,
  - type: text
    content: ils seront la proie des chacals.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Quant au roi… 21.2 ; 61.7s. –  par lui  : Dieu, ou bien le roi, cf. 28.8n  ; voir aussi Gn 42.15s ; 1S 17.55 ; 25.26 ; 2S 11.11 ; 15.21.'
  - type: text
    content: Quant au roi, il se réjouira en Dieu ;
  - type: text
    content: quiconque prête serment par lui pourra en être fier,
  - type: text
    content: car la bouche des menteurs sera fermée.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'tu es mon Dieu (hébreu ’El , cf. Gn 21.33n) 140.7 ; autre traduction ô Dieu, mon Dieu, c''est toi que je cherche  ; ce verbe ( rechercher en 78.34) rappelle en hébreu le mot pour aurore , de sorte que certains traduisent dès l''aurore je te cherche  ; cf. 57.9+. –  j''ai (ou mon âme a  ; cf. 6.4n) soif 42.3 ; cf. Jn 19.28. –  je soupire  : litt. ma chair soupire  ; cf. 16.9 ; 84.3. –  dans une terre  : quelques mss hébreux et des versions anciennes ont lu comme une terre  ; cf. 143.6.'
  - type: text
    content: O Dieu, tu es mon Dieu ;
  - type: text
    content: je te cherche, j'ai soif de toi,
  - type: text
    content: je soupire après toi,
  - type: text
    content: dans une terre desséchée et épuisée, faute d'eau.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'je te contemple ou je te regarde, je te vois , 17.15+ ; 27.4+ ; certains comprennent je te guette… pour voir…  ; cf. 5.4 ; Ha 2.1. –  ta puissance et ta gloire  : cf. 29.1 ; 78.61.'
  - type: text
    content: Ainsi je te contemple dans le sanctuaire,
  - type: text
    content: pour voir ta puissance et ta gloire.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 73.23-28 ; 2Co 4.16-18.
  - type: text
    content: Parce que ta fidélité est meilleure que la vie,
  - type: text
    content: mes lèvres font ton éloge.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'je te bénirai 145.1s. –  toute ma vie  : litt. dans ma vie  ; cf. 104.33 ; 146.2. –  j''élèverai… 28.2n. –  en ton nom  : on pourrait comprendre pour ton nom (désignant Dieu lui-même) ou bien en entendant prononcer ton nom.'
  - type: text
    content: Ainsi je te bénirai toute ma vie,
  - type: text
    content: j'élèverai mes mains en ton nom.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 36.9n. –  Des cris de joie…  : cf. 51.16s ; 126.2.'
  - type: text
    content: Je serai rassasié comme de graisse et de moelle.
  - type: text
    content: Des cris de joie aux lèvres, ma bouche te louera.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.5 ; 16.7 ; 77.7 ; 119.55. –  je me souviens de toi  : autres traductions j''évoque ton nom ; je t''invoque . –  je médite 1.2n.'
  - type: text
    content: Lorsque je me souviens de toi sur mon lit,
  - type: text
    content: pendant les veilles de la nuit, je médite sur toi,
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'tu es  : exceptionnellement le verbe être est exprimé en hébreu ; cf. Ex 3.14n. –  à l''ombre de tes ailes 17.8+.'
  - type: text
    content: car tu es mon secours,
  - type: text
    content: et je crie de joie à l'ombre de tes ailes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'attaché à toi  : cf. 73.28 ; Dt 10.20+. –  ta main droite 17.7n  ; 18.36 ; cf. 73.23 ; Es 41.10 ; 42.6.'
  - type: text
    content: Je suis attaché à toi ;
  - type: text
    content: ta main droite me soutient.
