document_id: PSA.73,104
type_code: fra
verses:
  '1':
  - type: heading
    content: LIVRE TROISIÈME
  - type: heading
    content: Quand tout semble réussir aux méchants
  - type: text
    content: ' '
  - type: note
    content: D'Asaph 50.1n  ; 74–83. –  Dieu est bon… 34.9 ; 100.5 ; 106.1 ; 107.1 ; 118.1 ; 119.68 ; 136. –  le cœur pur v. 13 ; 24.4 ; Mt 5.8.
  - type: text
    content: Psaume. D'Asaph.
  - type: text
    content: Oui, Dieu est bon pour Israël,
  - type: text
    content: pour ceux qui ont le cœur pur.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le peuple se tourne vers eux…  : traduction incertaine, obtenue au prix d''une modification du texte hébreu traditionnel, litt. son peuple revient ici (ou il ramène son peuple ici ) ; des eaux abondantes ils avalent pour eux  ; cf. 10.5 ; 49.14n.'
  - type: text
    content: Voilà pourquoi le peuple se tourne vers eux.
  - type: text
    content: On boit leurs paroles
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'on dit ou ils disent  ; cf. 10.4+,11 ; 94.8-11 ; Es 29.15 ; Ez 8.12 ; Jb 22.13. –  Dieu  : hébreu ’El , de même au v. 17 ; cf. Gn 21.33n.'
  - type: text
    content: 'et on dit : Comment Dieu saurait-il ?'
  - type: text
    content: Y a-t-il même de la connaissance chez le Très-Haut ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: ils accroissent leur richesse 49.7 ; 62.11.
  - type: text
    content: 'Ainsi sont les méchants :'
  - type: text
    content: toujours tranquilles, ils accroissent leur richesse.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'pour rien  : cf. Ml 3.14. –  purifié mon cœur v. 1+ ; cf. 24.4. –  j''ai lavé… 26.6 ; Dt 21.6 ; Es 1.16 ; Mt 27.24.'
  - type: text
    content: C'est donc pour rien que j'ai purifié mon cœur,
  - type: text
    content: 'et que j''ai lavé mes mains dans l''innocence :'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 44.23. –  sans cesse  : litt. tout le jour . –  m''apportent  : sous-entendu dans le texte. –  mon châtiment  : cf. 39.12n.'
  - type: text
    content: je suis sans cesse frappé,
  - type: text
    content: tous les matins m'apportent mon châtiment.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'parler  : le même verbe est traduit par raconter au v. 28. –  comme eux  : texte incertain ; cf. v. 11 ; Jb 2.9. –  tes fils  : litt. la génération de tes fils  ; cf. 14.5n.'
  - type: text
    content: 'Si je disais : Je vais parler comme eux,'
  - type: text
    content: je trahirais tes fils.
  '16':
  - type: text
    content: J'ai donc réfléchi pour comprendre cela ;
  - type: text
    content: ce fut pénible à mes yeux,
  '17':
  - type: text
    content: ' '
  - type: note
    content: sanctuaires 68.36 ; 74.7n  ; Lv 21.23n  ; Ez 21.7 ; 28.18. –  leur avenir (celui des méchants) ou leur fin  ; cf. v. 24n  ; Dt 32.29 ; Es 47.7 ; Ec 7.8 ; Lm 1.9.
  - type: text
    content: jusqu'à ce que j'arrive aux sanctuaires de Dieu ;
  - type: text
    content: alors j'ai compris leur avenir.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'voies glissantes  : cf. v. 2.'
  - type: text
    content: Oui, tu les places sur des voies glissantes,
  - type: text
    content: tu les fais tomber dans la tourmente.
  '19':
  - type: text
    content: Comment ! En un instant les voilà dévastés,
  - type: text
    content: ils sont à bout, achevés par l'épouvante !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 18. –  s''écarter du chemin  : autre traduction se tordre.'
  - type: text
    content: Quant à moi, pour un peu mes pieds allaient s'écarter du chemin,
  - type: text
    content: il s'en est fallu d'un rien que mes pas ne glissent,
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 39.7 ; 90.5 ; Es 29.7s ; Jb 20.8. –  Seigneur  : certains modifient le texte hébreu traditionnel pour lire ils ne sont plus. –  à ton éveil  : on pourrait aussi comprendre dans la ville (homonymie de l''hébreu).'
  - type: text
    content: Comme un rêve au réveil,
  - type: text
    content: Seigneur, à ton éveil, tu repousses leur image.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. 16.7n  ; Jb 16.8 ; 17.7 ; 30.15.
  - type: text
    content: Lorsque mon cœur s'aigrissait,
  - type: text
    content: et que je me sentais transpercé dans les reins,
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'devant toi  : litt. avec toi  ; cf. v. 23. –  les bêtes  : hébreu behémoth , comme en Jb 40.15n  ; cf. 18.3.'
  - type: text
    content: j'étais abruti, je ne savais rien,
  - type: text
    content: devant toi j'étais comme les bêtes.
  '23':
  - type: text
    content: ' '
  - type: note
    content: tu m'as saisi la main droite Es 45.1 ; cf. 41.13 ; 42.6 ; voir aussi 41.10 ; Ps 18.36.
  - type: text
    content: Cependant je suis constamment avec toi,
  - type: text
    content: tu m'as saisi la main droite ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'tu me conduis 23.2 ; Pr 4.11. –  par ton conseil ou selon ton dessein  ; cf. 33.10s ; 106.13n. –  puis (ou après , terme apparenté à celui qui est traduit par avenir au v. 17) tu me prendras…  : traduction incertaine ; on pourrait aussi comprendre derrière la gloire (Es 58.8 ; Za 2.12n) tu me prendras  ; certains modifient le texte hébreu traditionnel pour lire tu m''entraîneras (par la main) derrière toi  ; cf. Ps 49.15 ; voir aussi Gn 5.24 ; 2R 2.1ss.'
  - type: text
    content: tu me conduis par ton conseil,
  - type: text
    content: puis tu me prendras dans la gloire.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Litt. qui (est) pour moi au ciel ? (16.2 ; Jb 5.1) Avec toi je ne désire rien (ou je n'ai pas de plaisir ) sur la terre  ; voir aussi Ps 63.4.
  - type: text
    content: Qui d'autre ai-je au ciel ?
  - type: text
    content: En dehors de toi, je ne désire rien sur la terre.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Ma chair…  : cf. 32.3 ; Pr 5.11 ; voir aussi Ha 3.16-19. –  le rocher 18.3+. –  ma part  : cf. 16.5+s ; Nb 18.20 ; Dt 10.9.'
  - type: text
    content: 'Ma chair et mon cœur s''épuisent :'
  - type: text
    content: Dieu sera toujours le rocher de mon cœur et ma part.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Es 1.28. –  te sont infidèles  : litt. se prostituent (loin) de toi  ; cf. 106.39 ; Ex 34.15s ; Os 1.2n.'
  - type: text
    content: Car ceux qui s'éloignent de toi disparaissent ;
  - type: text
    content: tu réduis au silence tous ceux qui te sont infidèles.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'm''approcher de Dieu  : litt. l''approche (ou la proximité ) de Dieu  ; cf. Es 58.2 ; LXX m''attacher à Dieu  ; cf. 63.9 ; Dt 4.4 ; 1Co 6.17. –  J''ai choisi pour abri…  : litt. je place mon abri dans…  ; cf. 7.2+. –  raconter v. 15n  ; cf. 9.2 ; 22.23,32 ; 26.7 ; 48.14s ; 66.16 ; 77.12s ; 118.17.'
  - type: text
    content: Quant à moi, m'approcher de Dieu, c'est mon bien.
  - type: text
    content: 'J''ai choisi pour abri le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: – afin de raconter toutes tes œuvres.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 37.1 ; Jr 12.1ss ; Jb 21.7ss. –  de ceux qui font les fiers ou des vantards, des gens arrogants  ; le terme pourrait aussi signifier fous (voir aussi 5.6 ; 75.5). –  la prospérité  : litt. la paix (cf. 72.3n).'
  - type: text
    content: car j'étais jaloux de ceux qui font les fiers,
  - type: text
    content: en voyant la prospérité des méchants.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Rien ne les tourmente…  : litt. car il n''y a pas d''entraves  ; certains coupent en deux le mot hébreu traduit par jusqu''à leur mort , ce qui donne le sens suivant  : il n''y a pas d''entrave pour eux, leur corps (ou ventre , traduction incertaine) est sain et replet.'
  - type: text
    content: Rien ne les tourmente jusqu'à leur mort,
  - type: text
    content: et leur corps est replet ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'les humains  : le terme traduit le mot hébreu ’adam  ; cf. Gn 1.26n.'
  - type: text
    content: ils n'ont aucune part à la peine des hommes,
  - type: text
    content: ils ne sont pas frappés avec les humains.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'vêtement  : cf. 109.18 ; Ep 4.22-24.'
  - type: text
    content: C'est pourquoi l'orgueil leur est un collier
  - type: text
    content: – la violence, un vêtement qui les enveloppe ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ils sont luisants…  : litt. leur œil (ou leur apparence ) sort de (leur) graisse  ; LXX et Syr ont lu leur faute au lieu de leur œil  ; cf. 17.10. –  imaginations  : traduction incertaine ; le mot hébreu rappelle celui qui est traduit par pierre ornée en Lv 26.1 ; cf. Nb 33.52n  ; Pr 18.11n. –  dépassent la mesure  : autre traduction sont manifestes , cf. Jr 17.1 ; 2P 2.14.'
  - type: text
    content: ils sont luisants de graisse,
  - type: text
    content: les imaginations de leur cœur dépassent la mesure.
  '8':
  - type: text
    content: Ils raillent, ils parlent de faire du mal et d'opprimer ;
  - type: text
    content: ils parlent de haut,
  '9':
  - type: text
    content: ils élèvent leur bouche jusqu'au ciel,
  - type: text
    content: et leur langue se promène sur la terre.
