document_id: HEB.9,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'ordonnances  : sur le terme correspondant (aussi v. 10), voir Rm 5.18n. – Voir culte . –  terrestre  : litt. cosmique , c.-à-d. de ce monde(-ci).'
  - type: text
    content: 'La première alliance avait, elle aussi, ses ordonnances relatives au culte et son sanctuaire terrestre. '
  '10':
  - type: note
    content: Cf. v. 1 ; 13.9 ; Lv 11 ; 15 etc. –  chair 5.7+. –  bains rituels 6.2n  ; Mc 7.4n.
  - type: text
    content: Ce ne sont là que des ordonnances relatives à la chair, portant sur des aliments, des boissons et différents bains rituels, et imposées jusqu'à un temps de réforme.
  - type: heading
    content: Supériorité du culte nouveau
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'grand prêtre 2.17+. –  des biens qui sont apparus ou advenus  : le verbe grec est apparenté à celui qui est traduit par a paru  ; certains mss portent  : des biens qui devaient venir , comme en 10.1 ; cf. 2.5+ ; il s''agit en tout cas de réalités dernières, définitives, auxquelles les croyants ont d''ores et déjà accès par l''acte sacerdotal unique du Christ (v. 12). –  il a traversé  : cf. 4.14. –  la tente… v. 2n,6,24 ; 8.2+ ; cf. 10.20 ; Mc 14.58 ; Jn 2.19-21 ; 2Co 5.17. –  plus accomplie  : autre traduction plus propre à l''accomplissement , cf. 2.10n.'
  - type: text
    content: 'Mais le Christ a paru comme grand prêtre des biens qui sont apparus ; il a traversé la tente plus grande et plus accomplie, qui n''est pas fabriquée par des mains humaines, c''est-à-dire qui n''est pas de cette création ; '
  '12':
  - type: note
    content: 'une fois pour toutes 7.27+. –  dans le sanctuaire  : cf. v. 3,7,24. –  du sang de boucs… v. 19 ; 10.4. –  son propre sang 13.12. –  obtenu  : litt. trouvé. –  rédemption (ou délivrance, terme apparenté au v. 15 et en 11.35) éternelle  : cf. 5.9 ; 10.14 ; Dn 9.24 ; Lc 24.21+ ; voir, par contraste, Jg 2.16-23.'
  - type: text
    content: 'il est entré une fois pour toutes dans le sanctuaire, non pas avec du sang de boucs ou de taurillons, mais avec son propre sang. C''est ainsi qu''il a obtenu une rédemption éternelle. '
  '13':
  - type: note
    content: 'sang de boucs  : cf. 10.4 ; Lv 16.3,14-16 ; 17.11. –  cendre d''une génisse Nb 19. –  souillés  : autre traduction profanés  ; cf. 10.29n. –  consacrent ou sanctifient (voir saint), cf. 2.11n. – Voir chair.'
  - type: text
    content: 'En effet, si le sang de boucs et de taureaux, ou la cendre d''une génisse qu''on répand sur ceux qui ont été souillés, consacrent de manière à purifier la chair, '
  '14':
  - type: note
    content: 'le sang du Christ  : cf. 10.10,19 ; Rm 5.9 ; 1Jn 1.7+. –  par l''Esprit éternel  : autre traduction par un esprit éternel. –  s''est offert lui-même  : cf. v. 25 ; Jn 10.18. –  sans défaut 1P 1.19. –  purifiera 1.3. –  notre  : certains mss portent votre. –  conscience v. 9+. –  œuvres mortes 6.1+. –  que nous rendions un culte…  : autre traduction que nous servions le Dieu vivant  ; certains mss portent la deuxième personne (que vous rendiez un culte, que vous serviez) ; cf. 8.5n.'
  - type: text
    content: combien plus le sang du Christ – qui par l'Esprit éternel s'est offert lui-même à Dieu, sans défaut – purifiera-t-il notre conscience des œuvres mortes, pour que nous rendions un culte au Dieu vivant !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'médiateur 8.6+. –  alliance nouvelle 8.8-13 ; cf. 7.22 ; Mt 26.28 ; en vertu de ce qui suit on pourrait traduire nouveau testament (9.16n). –  rédemption v. 12n. –  appelés 3.1n  ; cf. Ep 1.18. –  l''héritage éternel qui a été promis  : litt. la promesse (6.12n) de l''héritage éternel.'
  - type: text
    content: 'Voilà pourquoi il est le médiateur d''une alliance nouvelle : une mort ayant eu lieu pour la rédemption des transgressions commises sous la première alliance, ceux qui sont appelés peuvent recevoir l''héritage éternel qui a été promis.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'testament  : le même mot est traduit par alliance dans le reste de l''épître ; l''auteur joue ici sur le double sens du terme grec pour mettre l''accent sur le caractère irrévocable de l''unique disposition divine, liée à la mort du testateur  ; cf. 8.10n  ; Ga 3.15-17.'
  - type: text
    content: 'Car là où il y a testament, il est nécessaire que la mort du testateur soit constatée. '
  '17':
  - type: note
    content: 'en cas de décès  : litt. sur des morts.'
  - type: text
    content: 'Un testament, en effet, n''est vraiment ferme qu''en cas de décès, puisqu''il n''a jamais de validité tant que le testateur est en vie. '
  '18':
  - type: note
    content: 'première alliance ou premier testament (le mot correspondant à alliance ou testament est ici sous-entendu), cf. v. 7 ; 8.13. –  sans effusion de sang  : litt. sans sang.'
  - type: text
    content: 'C''est pourquoi la première alliance elle-même n''a pas été inaugurée sans effusion de sang. '
  '19':
  - type: note
    content: 'Cf. Ex 24.3-8 ; Lv 14.4-7 ; Nb 19.6. –  selon la loi 7.5. –  et des boucs  : les termes correspondants sont absents de certains mss.'
  - type: text
    content: 'Car Moïse, après avoir énoncé pour tout le peuple chaque commandement selon la loi, prit le sang des taurillons et des boucs avec de l''eau, de la laine écarlate et de l''hysope, et il aspergea le livre lui-même, ainsi que tout le peuple, '
  '2':
  - type: note
    content: 'Les deux parties de la tente ou Demeure sont ici présentées comme deux tentes distinctes, cf. v. 8,11s ; 8.2n  ; Ex 25.9n,23–26.30 ; 40.17-19,22-24. –  installée 3.3n. –  le Sacré ou le Saint  ; certains mss portent ici le Saint des saints, c.-à-d. le Très-Sacré. –  les pains offerts  : litt. la disposition (ou l''offrande) des pains.'
  - type: text
    content: 'En effet, une première tente avait été installée, qu''on appelle le Sacré, où se trouvaient le porte-lampes, la table et les pains offerts. '
  '20':
  - type: note
    content: Ex 24.8  ; cf. 10.29 ; 12.24 ; 13.20 ; Za 9.11 ; Mt 26.28/ / ; 1Co 11.25.
  - type: text
    content: 'en disant :'
  - type: text
    content: Voici le sang de l'alliance que Dieu a instituée pour vous
  - type: text
    content: .
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Lv 8.15,19 ; cf. Ex 40.9. –  service  : terme apparenté à celui qui est traduit par serviteurs en 1.14n.'
  - type: text
    content: 'De même, il aspergea de sang la tente et tous les objets du service. '
  '22':
  - type: note
    content: Lv 17.11 ; Nb 35.33 ; cf. Ep 1.7.
  - type: text
    content: D'ailleurs, selon la loi, presque tout est purifié avec du sang, et sans effusion de sang il n'y a pas de pardon.
  '23':
  - type: text
    content: ' '
  - type: note
    content: copies 8.5n. –  supérieurs ou meilleurs.
  - type: text
    content: Il était donc nécessaire, d'une part, que les copies des choses célestes soient purifiées de la sorte et, d'autre part, que les choses célestes elles-mêmes le soient par des sacrifices supérieurs.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'V. 11s ; 8.2+. –  imitation  : litt. antitype , voir 8.5n. –  pour nous  : cf. 7.25. –  devant Dieu  : litt. devant la face de Dieu.'
  - type: text
    content: 'En effet, ce n''est pas dans un sanctuaire fabriqué par des mains humaines, imitation du véritable, que le Christ est entré, mais dans le ciel même, afin de paraître maintenant pour nous devant Dieu. '
  '25':
  - type: note
    content: 'Cf. v. 7,14. –  qui n''est pas le sien  : litt. autre, étranger (même terme 11.9,34).'
  - type: text
    content: 'Ce n''est pas non plus pour s''offrir maintes fois, comme le grand prêtre entre année après année dans le sanctuaire avec du sang qui n''est pas le sien '
  '26':
  - type: note
    content: 'à la fin (ou à l''accomplissement, terme apparenté en 2.10n) des temps ou des mondes 1.2n  ; une formule très proche est traduite par fin du monde en Mt 13.39n  ; 24.3 ; voir aussi 1Co 10.11 ; Ga 4.4 ; 1P 1.19s. –  il s''est manifesté  : litt. il a été manifesté  ; cf. v. 8. –  une seule fois  : cf. 7.27+ ; voir aussi 9.28 ; 10.2 ; 12.26s ; 1P 3.18. –  abolir le péché  : cf. 1.3 ; 1Jn 3.5 ; Testament de Lévi 18.9 : « Sous son sacerdoce, le péché disparaîtra, les impies cesseront de faire le mal, et les justes se reposeront sur lui. »'
  - type: text
    content: '– sans quoi il aurait dû souffrir maintes fois depuis la fondation du monde. Mais maintenant, à la fin des temps, il s''est manifesté, une seule fois, pour abolir le péché par son sacrifice. '
  '27':
  - type: note
    content: mourir Gn 3.19. –  jugement 10.27 ; Jn 5.28s ; Rm 2.5-10.
  - type: text
    content: 'Et tout comme il est réservé aux humains de mourir une seule fois – après quoi vient le jugement – '
  '28':
  - type: note
    content: une seule fois (v. 26+) pour porter les péchés 10.12 ; Rm 6.10 ; 1P 2.24. –  d'une multitude ou de beaucoup Es 53.12. –  en dehors du péché ou sans péché, comme en 4.15 ; cf. 7.26 ; 9.14. –  pour ceux qui l'attendent Ph 3.20 ; 1Th 1.10 ; 2Tm 4.8. –  du salut ou de leur salut, litt. d'un salut.
  - type: text
    content: de même aussi le Christ, qui s'est offert une seule fois pour porter les péchés d'une multitude, apparaîtra une seconde fois, en dehors du péché, pour ceux qui l'attendent en vue du salut.
  '3':
  - type: note
    content: voile 6.19+ ; Ex 26.31-33. –  le Très-Sacré ou le Saint des saints  ; un ms porte le Sacré (ou le Saint), cf. v. 2n  ; cf. 9.11s,24 ; Lv 16.16n.
  - type: text
    content: 'Puis, derrière le second voile, se trouvait la tente appelée le Très-Sacré. '
  '4':
  - type: note
    content: 'autel à encens  : le terme qui apparaît ici n''est pas celui qui est traduit habituellement par autel de l''encens  ; selon certains, il s''appliquerait à l''encensoir que le grand prêtre apportait dans le lieu dit Très-Sacré (Lv 16.12) ; toutefois, il est employé dans la littérature judéo-hellénistique du Ier s. apr. J.-C. pour désigner l''autel de l''encens placé en face du voile, dans le lieu dit Sacré (Ex 30.1-6 ; 40.26) ; voir aussi Ex 30.36 ; Lv 10.1-3 ; Nb 16 ; 17.9-15. –  coffre (ou arche) de l''alliance Ex 25.10n-16,21 ; 40.21. –  urne / manne Ex 16.32-34. –  bâton d''Aaron Nb 17.16-25. –  tablettes de l''alliance Ex 25.16,21 ; 40.20 ; Dt 9.9 ; 10.3-5 ; 1R 8.9.'
  - type: text
    content: 'Elle contenait un autel à encens en or et le coffre de l''alliance, entièrement recouvert d''or, dans lequel il y avait une urne d''or contenant la manne, le bâton d''Aaron qui avait fleuri et les tablettes de l''alliance. '
  '5':
  - type: note
    content: 'Ex 25.17-22 ; 40.20 ; Nb 7.89 ; 1R 8.9. –  keroubim Gn 3.24n. –  glorieux  : litt. de la gloire. – Voir expiatoire.'
  - type: text
    content: 'Au-dessus du coffre se tenaient les '
  - type: text
    content: keroubim
  - type: text
    content: ' glorieux qui couvraient de leur ombre l''expiatoire – il n''y a pas lieu d''en parler maintenant en détail.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 8.5n  ; cf. Ex 30.7s ; Nb 18.2-6.
  - type: text
    content: 'Tout cela étant ainsi installé, les prêtres entrent en tout temps dans la première tente, lorsqu''ils accomplissent le rituel du culte. '
  '7':
  - type: note
    content: 'Cf. v. 18 ; 5.3+ ; Ex 30.10 ; Lv 16.2,11,14-16,18s,34. – Voir sang. –  fautes  : litt. actes d''ignorance  ; le terme grec correspondant n''apparaît qu''ici dans le N.T. ; terme apparenté en 5.2 ; voir péché.'
  - type: text
    content: 'Mais, dans la seconde, seul le grand prêtre pénètre, une fois par an, non sans y présenter du sang pour lui-même et pour les fautes du peuple. '
  '8':
  - type: note
    content: 'L''Esprit saint 2.4+ ; 3.7+. –  montre bien 12.27. –  le chemin (cf. 10.19s) du sanctuaire (v. 12), c.-à-d. l''accès au Très-Sacré (v. 3) ; cf. Ep 3.12. –  ne s''est pas encore manifesté  : litt. n''a pas encore été manifesté  ; autre traduction n''a pas encore été ouvert. –  la première tente  : cf. v. 2n,6 ; certains comprennent ici l''ancienne tente.'
  - type: text
    content: 'L''Esprit saint montre bien par là que le chemin du sanctuaire ne s''est pas encore manifesté tant que la première tente subsiste. '
  '9':
  - type: note
    content: 'une parabole ou une préfiguration  ; cf. 11.19. –  il en résulte…  : certains mss portent un texte légèrement différent qu''on pourrait traduire pour le temps présent où les dons… – Voir sacrifices. –  accomplissement 2.10n  ; 7.19+. –  conscience v. 14 ; 10.2,22 ; 13.18 ; 1Tm 3.9+.'
  - type: text
    content: 'C''est une parabole pour le temps présent : il en résulte que les dons et sacrifices présentés ne peuvent porter à son accomplissement, sous le rapport de la conscience, celui qui prend part à ce culte. '
