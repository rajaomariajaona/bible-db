  - type: text
    text: 'L''Eglise leur fournit ce dont ils avaient besoin pour le voyage. Comme ils passaient par la Phénicie et la Samarie, ils racontaient en détail la conversion des non-Juifs et causaient une grande joie à tous les frères. '
