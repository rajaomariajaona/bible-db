  - type: text
    text: 'Paul et Barnabé ayant eu avec eux une violente dispute au cours du débat qui s''ensuivit, on décida que Paul, Barnabé et quelques autres des leurs monteraient à Jérusalem, devant les apôtres et les anciens, pour parler de cette question. '
