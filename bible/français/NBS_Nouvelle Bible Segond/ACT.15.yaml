  - type: text
    text: 'Après un vif débat, Pierre se leva et leur dit : Mes frères, vous le savez : dès les tout premiers jours, Dieu a fait un choix parmi vous pour que, par ma bouche, les non-Juifs entendent la parole de la bonne nouvelle et deviennent croyants. '
