document_id: ACT.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Désaccord à propos de la circoncision
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 24 ; 21.20s ; Ga 2.12. –  descendus de Judée  : texte occidental reconstitué des croyants issus du parti des pharisiens (cf. v. 5). –  frères 1.15+. –  circoncire…  : le texte occidental précise  : et si vous ne marchez pas selon la coutume…  ; cf. v. 5ss ; voir aussi 6.14 ; 11.3 ; 21.21 ; Gn 17.9-14 ; Lv 12.3 ; Ga 5.2ss. –  sauvés  : cf. v. 10 ; 4.12+.'
  - type: text
    content: 'Quelques hommes, qui étaient descendus de Judée, enseignaient aux frères : Si vous ne vous faites pas circoncire selon la coutume de Moïse, vous ne pouvez pas être sauvés. '
  '10':
  - type: note
    content: 'provoquez-vous…  : litt. éprouvez-vous ou tentez-vous Dieu, cf. 5.9n  ; Ex 17.2 ; Ps 78.18. Texte occidental possible, d''après une reconstitution  : Pourquoi essayez-vous d''imposer un joug que pas même nos pères n''ont pu porter ? –  en imposant… v. 5,19,28 ; cf. Mt 11.29s ; 23.4 ; Ga 5.1,3.'
  - type: text
    content: 'Maintenant donc, pourquoi provoquez-vous Dieu en imposant aux disciples un joug que ni nos pères ni nous-mêmes n''avons été capables de porter ? '
  '11':
  - type: note
    content: 'c''est par la grâce… 18.27 ; Rm 3.24 ; Ep 2.5,8. –  que nous croyons…  : autre traduction que nous croyons pour être sauvés, cf. 13.38s ; Ga 2.15s ; Ep 2.5,8.'
  - type: text
    content: En fait, c'est par la grâce du Seigneur Jésus que nous croyons être sauvés, de la même manière qu'eux.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental  : comme les anciens étaient d''accord avec ce que Pierre avait dit, toute la multitude…  ; cf. 11.18. –  raconter v. 4 ; 14.27+ ; Ga 2.2. –  signes / prodiges 2.19+. –  les non-Juifs ou les nations , v. 14n  ; 10.45n.'
  - type: text
    content: 'Toute la multitude fit silence, et l''on écouta Barnabé et Paul raconter tous les signes et les prodiges que Dieu avait produits, par leur entremise, parmi les non-Juifs. '
  '13':
  - type: note
    content: Jacques 12.17+ ; cf. 21.18 ; Ga 2.9,12.
  - type: text
    content: 'Lorsqu''ils se turent, Jacques dit : Mes frères, écoutez-moi ! '
  '14':
  - type: note
    content: 'Syméon  : le texte emploie ici une transcription inhabituelle du premier nom de Pierre (habituellement Simon), plus proche de sa forme sémitique ; cf. 9.4n  ; 10.5+ ; de même en 2P 1.1n  ; sur ce nom voir aussi 13.1 ; Lc 2.25,34 ; 3.30 ; Ap 7.7. –  a raconté v. 7-9. –  Dieu est intervenu pour prendre…  : cf. Lc 1.68 ; 7.16. Autre traduction Dieu a pris soin de choisir… –  parmi les nations (ou les non-Juifs, de même dans la suite, 10.45n) : cf. Za 2.15 ; Rm 15.8-12 ; Ep 2.14 ; 1P 2.10. –  un peuple à son nom, c.-à-d. qui lui appartienne en propre  ; autre traduction un peuple pour son nom  ; cf. Dt 14.2 ; 26.18s.'
  - type: text
    content: 'Syméon a raconté comment, pour la première fois, Dieu est intervenu pour prendre parmi les nations un peuple à son nom. '
  '15':
  - type: note
    content: Les paroles des prophètes Mt 5.17n  ; Lc 18.31+.
  - type: text
    content: 'Les paroles des prophètes s''accordent avec cela, comme il est écrit :'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Am 9.11-12 (LXX) ; cf. Jr 12.15.
  - type: text
    content: Après cela, je reviendrai
  - type: text
    content: et je relèverai la tente de David qui était tombée,
  - type: text
    content: j'en relèverai les ruines
  - type: text
    content: et je la redresserai,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'sur lesquelles mon nom a été invoqué  : cf. Jc 2.7.'
  - type: text
    content: afin que le reste des humains recherchent le Seigneur,
  - type: text
    content: oui, toutes les nations sur lesquelles mon nom a été invoqué,
  - type: text
    content: dit le Seigneur, qui fait ces choses
  - type: text
    content: ' '
  '18':
  - type: note
    content: 'Plusieurs mss (dont des témoins du texte occidental) lisent ici, avec diverses variantes  : et toutes ses œuvres lui sont connues depuis toujours, cf. Es 45.21.'
  - type: text
    content: connues depuis toujours
  - type: text
    content: .
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'je suis d''avis  : autres traductions je juge qu''il ne faut pas…, je décide de ne pas… –  ne pas créer de difficultés v. 10,28. –  qui se tournent vers Dieu 14.15n  ; 26.20.'
  - type: text
    content: 'C''est pourquoi, moi, je suis d''avis de ne pas créer de difficultés aux non-Juifs qui se tournent vers Dieu, '
  '2':
  - type: note
    content: 'violente (litt. pas petite) dispute  : même terme en 19.40 (sédition) ; 23.7,10 ; 24.5. –  débat v. 7 ; 2Tm 2.23+. –  on décida…  : texte occidental  : Paul, en effet, soutenait vigoureusement que l''on devait rester comme lorsqu''on était devenu croyant (cf. 1Co 7.17s). Mais ceux qui étaient venus de Jérusalem enjoignirent à Paul, à Barnabé et à quelques autres de monter à Jérusalem… afin d''être jugés sur tout cela  ; cf. 9.26-30 ; 11.30 ; 18.22 ; 21.15 ; Ga 1.18 ; 2.1. –  les apôtres et les anciens v. 4,6,22s ; 16.4 ; cf. 11.30+.'
  - type: text
    content: 'Paul et Barnabé ayant eu avec eux une violente dispute au cours du débat qui s''ensuivit, on décida que Paul, Barnabé et quelques autres des leurs monteraient à Jérusalem, devant les apôtres et les anciens, pour parler de cette question. '
  '20':
  - type: note
    content: 'leur écrire…  : cf. v. 29+ ; 16.4 ; 21.25 ; Gn 9.5s ; Lv 17–18 ; Mc 7.19 ; Ga 2.6,11-14 ; 1Tm 4.3. Ici et dans les textes parallèles, le texte occidental supprime des animaux étouffés (cf. Lv 17.15) et ajoute à la fin et qu''ils ne fassent pas à autrui ce qu''ils ne souhaitent pas qu''il leur advienne à eux-mêmes, cf. Mt 7.12. –  inconduite sexuelle (terme absent ici dans un ms) Mt 5.32n  ; 1Co 6.18+. – Voir sang.'
  - type: text
    content: 'mais de leur écrire qu''ils s''abstiennent des souillures des idoles, de l''inconduite sexuelle, des animaux étouffés et du sang. '
  '21':
  - type: note
    content: 13.15,27 ; 21.20-25 ; cf. Jn 5.46 ; 2Co 3.15. – Voir générations. –  on le lit chaque sabbat 13.15,27.
  - type: text
    content: Depuis les générations anciennes, en effet, Moïse a dans chaque ville des gens qui le proclament, puisqu'on le lit chaque sabbat dans les synagogues.
  - type: heading
    content: Une décision et une lettre communes
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'apôtres / anciens v. 2+. –  Eglise 5.11n. –  à Antioche 11.19n  ; cf. 14.26–15.2. –  Silas v. 27,32,34,40–18.5 ; dans les épîtres son nom apparaît sous la forme latinisée Silvain  : 2Co 1.19 ; 1Th 1.1 ; 2Th 1.1 ; 1P 5.12. –  des dirigeants  : litt. des hommes dirigeants (cf. Hé 13.7+) ; autre traduction possible des hommes estimés.'
  - type: text
    content: 'Alors il parut bon aux apôtres et aux anciens, ainsi qu''à toute l''Eglise, de choisir parmi eux des hommes et de les envoyer à Antioche avec Paul et Barnabé : Judas, appelé Barsabbas, et Silas, des dirigeants parmi les frères. '
  '23':
  - type: note
    content: 'Ils les chargèrent…  : litt. écrivant par leur main. –  Vos frères…  : certains mss portent les apôtres, les anciens et les frères… (1.15+). – Voir non-Juifs. –  en Syrie et en Cilicie  : cf. v. 41 ; 9.11n  ; Ga 1.21. –  bonjour ! litt. se réjouir, salutation usuelle en grec ; cf. 23.26 ; Jc 1.1 ; 2Jn 10s ; voir aussi Mt 26.49n.'
  - type: text
    content: 'Ils les chargèrent de cette lettre :'
  - type: text
    content: 'Vos frères, les apôtres et les anciens, aux frères non juifs qui sont à Antioche, en Syrie et en Cilicie, bonjour ! '
  '24':
  - type: note
    content: 'V. 1 ; cf. Ga 1.7. –  sortis  : le terme correspondant est absent de certains mss. –  inquiétés  : autre traduction ont inquiété vos âmes (le même mot est traduit par vie au v. 26 ; cf. Mt 10.28n).'
  - type: text
    content: 'Nous avons appris que quelques individus sortis de chez nous, auxquels nous n''avions donné aucun ordre, vous ont troublés et inquiétés par leurs discours. '
  '25':
  - type: text
    content: 'Après nous être mis d''accord, il nous a paru bon de choisir des hommes et de vous les envoyer avec nos bien-aimés Barnabé et Paul, '
  '26':
  - type: note
    content: 'livré leur vie  : autre traduction risqué leur vie  ; cf. Rm 16.4 ; le texte occidental précise livré… à toutes les épreuves. –  pour le nom… 5.41+.'
  - type: text
    content: 'eux qui ont livré leur vie pour le nom de notre Seigneur Jésus-Christ. '
  '27':
  - type: note
    content: Judas et Silas v. 22+.
  - type: text
    content: 'Nous avons donc envoyé Judas et Silas, qui vous apporteront de vive voix le même message. '
  '28':
  - type: note
    content: 'à l''Esprit saint  : cf. 5.32 ; 8.29+ ; 13.2. –  ne pas vous imposer…  : cf. v. 10+.'
  - type: text
    content: 'En effet, il a paru bon à l''Esprit saint et à nous-mêmes de ne pas vous imposer d''autre fardeau que ce qui est indispensable : '
  '29':
  - type: note
    content: 'Cf. v. 20n (variantes analogues du texte occidental). –  viandes sacrifiées aux idoles 1Co 8.1n-10 ; Ap 2.14,20. – Voir sang. –  vous ferez bien  : autre traduction vous vous trouverez bien  ; le texte occidental ajoute portés par l''Esprit saint. –  Adieu  : litt. portez-vous bien, formule usuelle en grec.'
  - type: text
    content: que vous vous absteniez des viandes sacrifiées aux idoles, du sang, des animaux étouffés et de l'inconduite sexuelle ; vous ferez bien de vous garder de tout cela. Adieu.
  '3':
  - type: note
    content: 'Eglise 5.1n. –  leur fournit… voyage  : le même verbe a le sens d’accompagner en 20.38 ; 21.5 ; cf. Rm 15.24n. –  Phénicie 11.19+. –  Samarie 8.5+. –  la conversion des non-Juifs  : autre traduction comment les non-Juifs (ou les païens, les nations) s''étaient tournés vers Dieu.'
  - type: text
    content: 'L''Eglise leur fournit ce dont ils avaient besoin pour le voyage. Comme ils passaient par la Phénicie et la Samarie, ils racontaient en détail la conversion des non-Juifs et causaient une grande joie à tous les frères. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'se retirèrent et descendirent  : le texte occidental précise en peu de jours.'
  - type: text
    content: 'Eux donc se retirèrent et descendirent à Antioche, où ils rassemblèrent la multitude et remirent la lettre. '
  '31':
  - type: text
    content: 'Lecture en fut faite, et l''on se réjouit de cet encouragement. '
  '32':
  - type: note
    content: 'Judas et Silas v. 22+. –  prophètes  : le principal témoin du texte occidental ajoute remplis d''Esprit saint. –  encouragèrent ou exhortèrent  ; 11.23+ ; 13.15 ; cf. 1Co 14.3. –  les affermirent 14.22+.'
  - type: text
    content: 'Judas et Silas, qui étaient eux-mêmes prophètes, encouragèrent les frères et les affermirent par de nombreux discours. '
  '33':
  - type: text
    content: 'Au bout de quelque temps, les frères les renvoyèrent en paix vers ceux qui les avaient envoyés. [ '
  '34':
  - type: note
    content: 'Certains mss ajoutent  : Toutefois, Silas trouva bon de rester  ; le texte occidental précise de rester [auprès d''eux], et Judas seul s''en alla [à Jérusalem] (cf. v. 40).'
  - type: text
    content: ']'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'à Antioche 11.19n  ; 13.1 ; 14.26. –  enseignant  : cf. 5.42.'
  - type: text
    content: Paul et Barnabé séjournèrent à Antioche, enseignant et annonçant, avec beaucoup d'autres, la bonne nouvelle de la parole du Seigneur.
  - type: heading
    content: Paul se sépare de Barnabé
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Paul dit  : cf. 13.1-4. –  où ils en sont  : autre traduction comment ils vont  ; texte occidental possible, d''après une reconstitution  : pour voir ce qu''ils font. Le projet plut aussi à Barnabé.'
  - type: text
    content: 'Quelques jours après, Paul dit à Barnabé : Retournons visiter les frères dans toutes les villes où nous avons annoncé la parole du Seigneur, pour voir où ils en sont. '
  '37':
  - type: note
    content: Jean, appelé Marc 12.12+,25.
  - type: text
    content: 'Barnabé était décidé à prendre aussi avec eux Jean, appelé Marc ; '
  '38':
  - type: note
    content: '13.5,13 ; cf. Col 4.10 ; 2Tm 4.11 ; Phm 24. –  qui les avait quittés  : litt. qui s''était éloigné d''eux ou détourné d''eux, cf. 5.37n,38n  ; 19.9n  ; 21.21n  ; voir aussi 1Tm 4.1n. –  leur œuvre 13.2.'
  - type: text
    content: 'mais Paul estimait ne pas devoir prendre avec eux quelqu''un qui les avait quittés depuis la Pamphylie et qui ne les avait pas accompagnés dans leur œuvre. '
  '39':
  - type: note
    content: 'Le conflit  : autre traduction l''exaspération, cf. 17.16 ; Ga 2.11-14. –  Chypre 4.36 ; 13.4ss.'
  - type: text
    content: 'Le conflit devint tel qu''ils finirent par se séparer. Barnabé prit Marc avec lui et embarqua pour Chypre. '
  '4':
  - type: note
    content: '14.27+. –  accueillis  : le texte occidental précise chaleureusement.'
  - type: text
    content: 'Arrivés à Jérusalem, ils furent accueillis par l''Eglise, les apôtres et les anciens, et ils rapportèrent tout ce que Dieu avait fait avec eux. '
  '40':
  - type: note
    content: Silas v. 22+. –  recommandé… à la grâce 14.26.
  - type: text
    content: 'Paul choisit Silas et partit, recommandé par les frères à la grâce du Seigneur. '
  '41':
  - type: note
    content: la Syrie et la Cilicie v. 23+. –  affermissant 14.22+. –  Eglises 5.1n. – A la fin du v. le texte occidental ajoute et en transmettant les commandements [des apôtres et] des anciens. (16.1) Après être passé par ces nations il arriva à Derbé et à Lystres.
  - type: text
    content: Il passait par la Syrie et la Cilicie en affermissant les Eglises.
  '5':
  - type: note
    content: V. 1 ; cf. 11.2 ; Ga 2.4s,12. – Voir loi.
  - type: text
    content: Alors quelques membres du parti des pharisiens qui étaient devenus croyants se levèrent pour dire qu'il fallait circoncire les non-Juifs et leur enjoindre d'observer la loi de Moïse.
  - type: heading
    content: Le débat à Jérusalem
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'apôtres / anciens v. 2+. –  se rassemblèrent  : certains témoins du texte occidental précisent avec la multitude , cf. v. 12,22s.'
  - type: text
    content: 'Les apôtres et les anciens se rassemblèrent pour examiner cette affaire. '
  '7':
  - type: note
    content: 'Cf. v. 14 ; 10.1–11.18 ; Ga 2.9,11. –  se leva  : le texte occidental précise par l''Esprit. –  dès les tout premiers jours  : litt. depuis les jours anciens (même adjectif au v. 21) ; cf. 11.15.'
  - type: text
    content: 'Après un vif débat, Pierre se leva et leur dit : Mes frères, vous le savez : dès les tout premiers jours, Dieu a fait un choix parmi vous pour que, par ma bouche, les non-Juifs entendent la parole de la bonne nouvelle et deviennent croyants. '
  '8':
  - type: note
    content: qui connaît les cœurs 1.24. –  en leur donnant l'Esprit saint 5.32. –  tout comme à nous 10.44s+,47 ; 11.17.
  - type: text
    content: 'Et Dieu, qui connaît les cœurs, leur a rendu témoignage en leur donnant l''Esprit saint tout comme à nous ; '
  '9':
  - type: note
    content: aucune différence 10.20n,34s,44-47 ; Rm 10.12. –  il a purifié… 10.15,28,35,43 ; 11.9. –  par la foi Rm 3.22.
  - type: text
    content: 'il n''a fait aucune différence entre nous et eux, puisqu''il a purifié leur cœur par la foi. '
