document_id: JAS.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Des gens au cœur partagé
  - type: text
    content: ' '
  - type: note
    content: 'conflits / querelles  : litt. guerres, batailles , verbes apparentés au v. 2 ; cf. Pr 17.1 ; 2Co 7.5 ; 2Tm 2.22,24 ; Tt 3.9. –  parmi vous  : autre traduction possible en vous (cf. 1.5-8) ; voir cependant 3.13 ; voir aussi Ga 5.17 ; 1P 2.11. –  plaisirs  : cf. 1.13ss ; sur le terme, voir aussi v. 3 ; Lc 8.14 ; Tt 3.3 ; 2P 2.13. –  qui combattent ou qui font la guerre , même verbe en 1P 2.11 ; cf. 1Co 9.7n. –  votre corps tout entier  : litt. les parties de votre corps ou vos membres , cf. 3.6 ; Rm 6.13n,19 ; 7.5,23 ; 1Co 12 ; Col 3.5n.'
  - type: text
    content: 'D''où viennent les conflits, d''où viennent les querelles parmi vous, sinon de vos plaisirs qui combattent dans votre corps tout entier ? '
  '10':
  - type: note
    content: Abaissez-vous ou humiliez-vous v. 6 ; 1.9ss ; Ez 17.24 ; 21.31 ; Ps 149.4 ; Jb 5.11 ; 22.29 ; Mt 18.4 ; 23.12 ; Lc 14.11 ; 18.14 ; 1P 5.6.
  - type: text
    content: Abaissez-vous devant le Seigneur, et il vous élèvera.
  - type: heading
    content: Qui es-tu pour juger ton frère ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Ne vous accusez pas…  : autre traduction  : ne médisez pas les uns des autres… médit de son frère… médit de la loi…  : cf. 1P 2.12n. Voir aussi 1.19s,26 ; 2.12 ; 3.1ss ; Lv 19.16ss ; Ps 50.20 ; 101.5 ; Pr 18.8 ; 20.13 ; 26.22 ; Rm 1.30 ; 2Co 12.20 ; 1P 2.1ss ; 3.16 ; Sagesse 1.11 : « Gardez-vous donc du murmure inutile ; pour ne pas médire, retenez votre langue, car un mot dit en secret ne reste pas sans conséquence, et la bouche qui calomnie tue l''âme. » –  mes frères  : litt. frères , de même en 5.7n,9s ; cf. 1.2+. –  ou qui juge…  : certains mss portent et qui juge… Mt 7.1ss ; Rm 2.1s. –  la loi  : cf. 1.25 ; 2.8ss ; autre traduction une loi . –  tu n''es pas…  : certains mss portent tu n''es plus 1.22n.'
  - type: text
    content: 'Ne vous accusez pas les uns les autres, mes frères. Celui qui accuse un frère ou qui juge son frère accuse la loi et juge la loi. Or si tu juges la loi, tu n''es pas quelqu''un qui la met en pratique, mais un juge. '
  '12':
  - type: note
    content: 'Un seul 2.19+ ; Mt 19.17. –  législateur et juge  : de nombreux mss portent seulement législateur Es 33.22 ; Ps 75.8 ; 2Tm 4.8 ; Hé 12.23. –  sauver (1.21+) et perdre (ou faire disparaître) Dt 32.39 ; 1S 2.6 ; 2R 5.7 ; Mt 10.28 ; 16.25 ; Hé 5.7. –  qui es-tu… Rm 14.4. –  ton prochain  : litt. le prochain  ; certains mss portent l''autre.'
  - type: text
    content: Un seul est législateur et juge, celui qui peut sauver et perdre ; mais toi, qui es-tu pour juger ton prochain ?
  - type: heading
    content: Ceux qui font des projets orgueilleux
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'A vous… 5.1+ss ; Am 8.5 ; cf. Lc 12.16+ss. –  ou demain  : certains mss portent et demain . –  passerons  : litt. ferons . –  ferons des affaires  : même verbe 2P 2.3 ( exploiter ) ; cf. Ap 18.11ss ; Siracide 11.10ss : « Que tes occupations ne soient pas trop nombreuses, si tu les multiplies, tu ne resteras pas indemne ; même si tu cours, tu n''arriveras pas, et tu ne t''échapperas pas par la fuite. Tel peine, se fatigue et se hâte, et n''en est que plus dépourvu… Les biens et les maux, la vie et la mort, la pauvreté et la richesse viennent du Seigneur. » –  gains Mt 16.26/ /.'
  - type: text
    content: 'A vous maintenant qui dites : « Aujourd''hui ou demain nous irons dans telle ville, nous y passerons une année, nous y ferons des affaires et nous réaliserons des gains » '
  '14':
  - type: note
    content: 'Certains mss portent  : vous qui ne savez pas ce que sera le lendemain ; car votre vie, qu''est-ce ? une vapeur…  ; cf. Os 13.3 ; Ps 39.6s,12 ; 49.13 ; 90.5 ; 102.4,12 ; 144.4 ; Jb 7.7,9,16 ; Pr 27.1 ; 4 Esdras 7.61 : « Ils ont été… semblables à un souffle, pareils à la flamme et à la fumée. Ils se sont embrasés, ils ont brûlé avec ardeur et ils se sont éteints. »'
  - type: text
    content: '– vous qui ne savez pas ce que votre vie sera demain ! Vous êtes en effet une vapeur qui paraît pour un peu de temps et qui ensuite disparaît. '
  '15':
  - type: note
    content: 'Si le Seigneur le veut  : cf. Ac 18.21 ; Rm 1.10 ; 1Co 4.19 ; 16.7 ; Ph 2.19,24 ; Hé 6.3 ; des formules analogues sont fréquentes dans la littérature grecque.'
  - type: text
    content: 'Vous devriez dire, au contraire : « Si le Seigneur le veut, nous vivrons et nous ferons ceci ou cela. » '
  '16':
  - type: note
    content: 'fierté 1.9+. –  présomption  : voir 1Jn 2.16n. –  mauvaise 2.4.'
  - type: text
    content: 'Mais maintenant vous mettez votre fierté dans votre présomption. Toute fierté de ce genre est mauvaise. '
  '17':
  - type: note
    content: 'Cf. Lc 12.47s ; Jn 9.41. –  faire (cf. 2.13 ; 3.18n) le bien  : cf. Mt 5.16. –  c''est un (autre traduction il y a) péché pour lui, formule comparable en Dt 15.9 ; 23.22s ; 24.15 ; voir Rm 14.23.'
  - type: text
    content: Si donc quelqu'un sait faire le bien et ne le fait pas, c'est un péché pour lui.
  '2':
  - type: note
    content: 'Autre traduction possible (en modifiant la ponctuation traditionnelle)  : Vous désirez (1.14+) et vous ne possédez pas : vous assassinez (5.6n) . Vous êtes remplis de passion jalouse (3.14+), sans rien pouvoir obtenir : vous vous querellez et vous vous faites la guerre. Vous ne possédez pas, parce que vous ne demandez pas (1.5+s ; 5.16ss).'
  - type: text
    content: 'Vous désirez et vous ne possédez pas ; remplis de passion jalouse, vous assassinez, et vous ne pouvez rien obtenir ; vous multipliez les querelles et les conflits, mais vous ne possédez pas, parce que vous ne demandez pas. '
  '3':
  - type: text
    content: 'Si vous demandez, vous ne recevez pas, parce que vous demandez mal, afin de pouvoir dépenser pour vos plaisirs. '
  '4':
  - type: note
    content: 'Adultères  : le terme grec est au féminin pluriel ; on peut comprendre  : vous qui êtes semblables à des femmes adultères  ; certains mss portent hommes et femmes adultères  ; cf. Es 57.3 ; Jr 2.20 ; 3.1ss ; Ez 16.23ss ; Os 1.2n  ; 3.1 ; Mt 12.39/ / ; 2P 2.14 ; voir aussi Ep 5.22ss. –  amour (ou amitié) du monde 1.27+ ; 1Jn 2.15 ; cf. Mt 6.24 ; Lc 6.26 ; voir aussi Jc 1.8. –  est décidé à  : autre traduction souhaite. –  ennemi de Dieu  : les termes grecs traduits par hostilité et ennemi sont apparentés ; cf. 2.23 ; Rm 8.7.'
  - type: text
    content: 'Adultères ! Ne savez-vous pas que l''amour du monde est hostilité à l''égard de Dieu ? Celui qui est décidé à être ami du monde se rend donc ennemi de Dieu. '
  '5':
  - type: note
    content: 'l''Ecriture  : cf. 2.23 ; il peut s''agir d''une combinaison de plusieurs textes (Gn 6.3 ; Ex 20.5 ; Jb 14.15 ?), d''un résumé libre de l''ensemble de l''Ecriture (cf. Jn 7.38n  ; 1Co 2.9 ; Ep 5.14), ou encore d''une citation dont on a perdu la source (Apocalypse de Moïse  ?). –  en vain  : cf. Dt 32.47 ; Es 55.11. –  Il (Dieu ?) désire… : traduction très incertaine ; on a aussi compris que l''Ecriture dise… contre l''envie : Il (Dieu) est attaché à l''esprit…  ; ou bien que l''Ecriture dise : face à l''envie, Dieu désire l''Esprit…  ; ou est-ce à l''envie qu''aspire l''Esprit… ? (même verbe pour soupirer, avec pour sujet l''esprit, en Ps 42.2 ; 84.3 ; 119.131 LXX  ; il est traduit par avoir une vive affection en Ph 1.8) ou encore l''esprit que Dieu a fait habiter en nous désire jusqu''à l''envie (cf. Rm 8.11,26s ; 1Co 3.16 ; Ga 5.17)  ; l''Esprit désire avec envie ce qu''il a fait habiter en nous  ; au lieu de qu''il a fait habiter certains mss portent qui habite. Cf. Ex 20.5 ; 34.14 ; Dt 4.24+ ; Es 9.6 ; 37.32 ; Ez 5.13 ; 16.38 ; Za 1.14 ; 8.2. –  l''Esprit (saint), ou l''esprit de l''homme Gn 2.7 ; 6.3ss,17 ; 7.15 ; Es 2.22 ; 63.10ss ; Ez 36.27 ; Jb 27.3 ; 33.4 ; 34.14s ; Ec 12.7.'
  - type: text
    content: 'Croyez-vous que l''Ecriture parle en vain lorsqu''elle dit : Il désire jusqu''à l''envie l''Esprit qu''il a fait habiter en nous. '
  '6':
  - type: note
    content: 'V. 10+ ; Pr 3.34  ; 1P 5.5 ; cf. 1S 2.7s ; Jb 22.29 ; Lc 1.51ss. –  elle dit (probablement l’Ecriture, v. 5, plutôt que la grâce) : autre traduction il (Dieu) dit. –  résiste 5.6. –  humbles 1.9+.'
  - type: text
    content: 'Mais la grâce qu''il accorde est supérieure, puisqu''elle dit :'
  - type: text
    content: Dieu résiste aux orgueilleux,
  - type: text
    content: mais il accorde sa grâce aux humbles
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'opposez-vous (cf. v. 6) au diable 1P 5.8s ; cf. Ep 6.11ss ; voir démon, diable, Satan ; Testament de Siméon 3.5 : « Si quelqu''un se réfugie auprès du Seigneur, l''esprit mauvais s''enfuit loin de lui, et sa pensée devient légère. » Testament de Dan 5.1 : « Eloignez-vous de la colère, et haïssez le mensonge, afin que le Seigneur habite en vous, et que Béliar fuie loin de vous. » Testament de Nephtali 8.4 : « Si donc, vous aussi, vous travaillez à faire le bien… le Diable fuira loin de vous, les bêtes sauvages vous craindront, le Seigneur vous aimera, et les anges s''attacheront à vous. »'
  - type: text
    content: 'Soumettez-vous donc à Dieu ; opposez-vous au diable, et il vous fuira. '
  '8':
  - type: note
    content: 'Approchez-vous de Dieu  : cf. Ex 19.22 ; 24.2 ; Es 29.13 ; Ez 44.13 ; Os 12.7 ; Za 1.3 ; Ml 3.7 ; Testament de Dan 6.2 : « Approchez-vous de Dieu et de l''ange qui intercède pour vous, car c''est un médiateur entre Dieu et les hommes et, pour le salut d''Israël, il résistera à l''empire de l''Ennemi. » –  Purifiez vos mains  : cf. Ex 30.17ss ; Es 1.16 ; Ps 18.21,25 ; 24.4 ; 73.13 ; Jb 17.9 ; 22.30 ; voir aussi 1P 1.22 ; 1Jn 3.3. –  pécheurs 5.20. –  votre cœur  : litt. vos cœurs  ; cf. 1.26s ; Mt 5.8 ; Siracide 38.10 : « Renonce à tes fautes, que tes mains agissent avec droiture, de tout péché purifie ton cœur. » –  âmes partagées 1.8n  ; cf. Mt 6.2,5,16 ; 15.7s ; Testament d''Aser 3.2 : « Fuyez la malice, en détruisant le mauvais penchant par vos bonnes œuvres, car les hommes à double face n''appartiennent pas à Dieu, mais sont les esclaves de leurs désirs. »'
  - type: text
    content: 'Approchez-vous de Dieu, et il s''approchera de vous. Purifiez vos mains, pécheurs, et nettoyez votre cœur, âmes partagées ! '
  '9':
  - type: note
    content: 'Cf. Es 32.11s ; Jr 4.8 ; Jl 1.9ss ; Mi 2.4 ; Za 1.11s. –  Reconnaissez votre misère  : litt. soyez misérables ou malheureux  ; termes apparentés en 5.1 ; Rm 3.16 ; 7.24 ; Ap 3.17. –  menez deuil, pleurez  : cf. Mc 16.10. –  rire / deuil  : cf. Es 3.26 ; Jr 6.26 ; Am 5.16s ; 8.10 ; 9.5 ; Mi 1.8 ; Pr 14.13 ; Ec 7.3s ; Lc 6.21,25.'
  - type: text
    content: 'Reconnaissez votre misère, menez deuil, pleurez ! Que votre rire se change en deuil et votre joie en tristesse ! '
