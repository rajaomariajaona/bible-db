          text: '11.10ss : « Que tes occupations ne soient pas trop nombreuses, si tu les multiplies, tu ne resteras pas indemne ; même si tu cours, tu n''arriveras pas, et tu ne t''échapperas pas par la fuite. Tel peine, se fatigue et se hâte, et n''en est que plus dépourvu… Les biens et les maux, la vie et la mort, la pauvreté et la richesse viennent du Seigneur. » –  '
