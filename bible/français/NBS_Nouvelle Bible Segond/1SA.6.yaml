    - type: text
      text: 'Les Philistins dirent : Quelle réparation devons-nous offrir pour lui ? Ils répondirent : Cinq tumeurs en or et cinq souris en or, d''après le nombre des princes de la confédération des Philistins, car il y a eu le même fléau pour tous, pour les princes de votre confédération. '
