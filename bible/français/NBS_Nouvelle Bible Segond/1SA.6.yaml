    - type: text
      text: 'Ils répondirent : Si vous renvoyez le coffre du Dieu d''Israël, ne le renvoyez pas sans rien, mais offrez une réparation pour lui ; alors vous guérirez, et ainsi vous saurez pourquoi la main de Dieu ne s''est pas écartée de vous. '
