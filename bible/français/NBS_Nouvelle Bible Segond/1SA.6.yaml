document_id: 1SA.6,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Philistins renvoient le Coffre en Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' resta sept mois au pays des Philistins. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils firent ainsi. Ils prirent deux vaches qui allaitaient et les attelèrent au chariot, en enfermant leurs petits à la maison. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hémorroïdes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ici et au v. 17, le texte hébreu ne présente plus les deux variantes de lecture signalées en 5.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils mirent sur le chariot le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et le coffret avec les souris d''or et les images de leurs hémorroïdes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les vaches allèrent tout droit sur le chemin de Beth-Shémesh ; elles suivirent toujours la même route en mugissant ; elles ne s'écartèrent ni à droite ni à gauche. Les princes de la confédération des Philistins les suivirent jusqu'à la frontière de Beth-Shémesh.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les gens de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les habitants de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; sous-entendu dans le texte ; les verbes qui suivent sont au pluriel. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de le voir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss de LXX portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en allant à sa rencontre.
      marker-yv: yv-n
    - type: text
      text: 'Les gens de Beth-Shémesh moissonnaient les blés dans la vallée ; quand ils levèrent les yeux, ils virent le Coffre et ils se réjouirent de le voir. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Beth-Shémesh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette précision distingue le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Josué '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dont il est ici question du successeur de Moïse (Nb 27.18ss ; Dt 34.9). – La '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grande pierre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'va sans doute servir d''autel pour le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On fendit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 6.26 ; 2S 24.22 ; 1R 19.21.'
      marker-yv: yv-n
    - type: text
      text: 'Le chariot arriva dans le champ de Josué de Beth-Shémesh et s''y arrêta. Il y avait là une grande pierre. On fendit le bois du chariot, et on offrit les vaches en holocauste au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : selon Jos 21.16, Beth-Shémesh était une ville lévitique ; d''après Dt 10.8, ce sont les lévites qui sont habilités à s''occuper du Coffre.'
      marker-yv: yv-n
    - type: text
      text: 'Les lévites avaient descendu le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et le coffret qui était avec lui et qui contenait les objets d''or ; ils les posèrent sur la grande pierre. Les gens de Beth-Shémesh offrirent en ce jour des holocaustes et des sacrifices au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Après avoir vu cela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les princes philistins ont eu la confirmation que c''est bien YHWH qui était intervenu contre eux (cf. v. 9).'
      marker-yv: yv-n
    - type: text
      text: 'Après avoir vu cela, les cinq princes de la confédération des Philistins retournèrent à Eqrôn le même jour. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Voici les hémorroïdes d''or que les Philistins offrirent au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' en réparation : une pour Ashdod, une pour Gaza, une pour Ashqelôn, une pour Gath et une pour Eqrôn. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le v. 18 présente plusieurs difficultés : le nombre des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'souris d''or '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'semble ne pas être limité à cinq, comme au v. 4, mais correspondre au nombre (indéterminé) des localités du territoire philistin (ce qui soulignerait l''ampleur de la défaite des Philistins). De plus c''est d''après LXX et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ' (et quelques mss hébreux) que l''on traduit '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la grande pierre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 14), alors que le texte hébreu traditionnel parle d’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abel la grande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', nom de lieu inconnu par ailleurs, mais qui pourrait faire allusion au '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'deuil '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’bl
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) dont parle le v. 19 ; cf. Gn 50.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – Une '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ville fortifiée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est une ville entourée de murailles, par opposition au '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'village sans murailles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Dt 3.5+) ; l'ensemble de l'expression (
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis… jusqu'au…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toutes les localités sans exception
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et jusqu'à la grande pierre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains modifient la vocalisation traditionnelle de l''hébreu pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: témoin la grande pierre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cette pierre marquait peut-être la limite entre le territoire des Philistins et celui des Israélites.'
      marker-yv: yv-n
    - type: text
      text: 'Il y avait aussi des souris d''or pour chacune des villes des Philistins appartenant aux cinq princes de la confédération, depuis la ville fortifiée jusqu''au village sans murailles et jusqu''à la grande pierre sur laquelle on avait déposé le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', pierre qui est jusqu''à ce jour dans le champ de Josué de Beth-Shémesh.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' frappa'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il frappa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les fils de Jékonia ne se réjouirent pas avec les gens de Beth-Shémesh d''avoir vu le coffre du Seigneur, et celui-ci frappa… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parce qu'ils avaient regardé le coffre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : regarder ou toucher un objet sacré comportait un risque de mort, cf. Nb 4.5-15 ; 2S 6.6s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: soixante-dix hommes – cinquante mille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soixante-dix hommes cinquante mille hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; on a parfois compris et traduit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'soixante-dix hommes sur cinquante mille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cinquante mille soixante-dix hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un grand fléau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.8,10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' frappa les gens de Beth-Shémesh parce qu''ils avaient regardé le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; il frappa soixante-dix hommes – cinquante mille parmi le peuple – et le peuple prit le deuil, parce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait frappé d''un grand fléau. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 18.14 ; Es 3.2 ; 44.25 ; voir aussi Gn 41.8 ; Es 2.6 ; Dn 2.2 ; 5.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en son lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors les Philistins appelèrent les prêtres et les devins ; ils leur demandèrent : Que devons-nous faire du coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ? Faites-nous savoir comment nous devons le renvoyer en son lieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qui peut tenir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 19.21 ; 2S 6.9 ; Ml 3.2 ; Ps 76.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jos 24.19 ; Es 5.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vers qui montera-t-il…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le sujet peut être soit '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', soit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le Coffre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ps 47.6. Sur le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: monter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', employé trois fois, ici et dans les deux versets suivants, voir 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les gens de Beth-Shémesh dirent : Qui peut tenir devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ce Dieu saint ? Et vers qui montera-t-il, en partant de chez nous ? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qiriath-Yéarim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : localité située à une quinzaine de kilomètres au nord-est de Beth-Shémesh. Cf. Jos 9.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: descendez…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: descendez et faites-le monter vers vous.
      marker-yv: yv-n
    - type: text
      text: 'Ils envoyèrent des messagers aux habitants de Qiriath-Yéarim, pour leur dire : Les Philistins ont ramené le coffre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; descendez le chercher et faites-le monter chez vous.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sans rien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à vide
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il ne s''agit pas de déposer quelque chose dans le Coffre, mais de rendre le Coffre accompagné d''une offrande de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réparation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 3.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: alors vous guérirez…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
