          - type: text
            text: LXX
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'alors vous guérirez, et il vous sera pardonné ; sa main '
      - type: usfm
        marker: ft
        children:
