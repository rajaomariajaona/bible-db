document_id: 1SA.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Philistins renvoient le Coffre en Israël
  - type: text
    content: 'Le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' resta sept mois au pays des Philistins. '
  '10':
  - type: text
    content: 'Ils firent ainsi. Ils prirent deux vaches qui allaitaient et les attelèrent au chariot, en enfermant leurs petits à la maison. '
  '11':
  - type: note
    content: 'hémorroïdes  : ici et au v. 17, le texte hébreu ne présente plus les deux variantes de lecture signalées en 5.6n.'
  - type: text
    content: 'Ils mirent sur le chariot le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et le coffret avec les souris d''or et les images de leurs hémorroïdes. '
  '12':
  - type: text
    content: Les vaches allèrent tout droit sur le chemin de Beth-Shémesh ; elles suivirent toujours la même route en mugissant ; elles ne s'écartèrent ni à droite ni à gauche. Les princes de la confédération des Philistins les suivirent jusqu'à la frontière de Beth-Shémesh.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Les gens de ou les habitants de  ; sous-entendu dans le texte ; les verbes qui suivent sont au pluriel. –  de le voir  : certains mss de LXX portent en allant à sa rencontre.'
  - type: text
    content: 'Les gens de Beth-Shémesh moissonnaient les blés dans la vallée ; quand ils levèrent les yeux, ils virent le Coffre et ils se réjouirent de le voir. '
  '14':
  - type: note
    content: 'de Beth-Shémesh  : cette précision distingue le Josué dont il est ici question du successeur de Moïse (Nb 27.18ss ; Dt 34.9). – La grande pierre va sans doute servir d''autel pour le sacrifice. –  On fendit…  : cf. Jg 6.26 ; 2S 24.22 ; 1R 19.21.'
  - type: text
    content: 'Le chariot arriva dans le champ de Josué de Beth-Shémesh et s''y arrêta. Il y avait là une grande pierre. On fendit le bois du chariot, et on offrit les vaches en holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '15':
  - type: note
    content: 'Les lévites  : selon Jos 21.16, Beth-Shémesh était une ville lévitique ; d''après Dt 10.8, ce sont les lévites qui sont habilités à s''occuper du Coffre.'
  - type: text
    content: 'Les lévites avaient descendu le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et le coffret qui était avec lui et qui contenait les objets d''or ; ils les posèrent sur la grande pierre. Les gens de Beth-Shémesh offrirent en ce jour des holocaustes et des sacrifices au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '16':
  - type: note
    content: 'Après avoir vu cela  : les princes philistins ont eu la confirmation que c''est bien YHWH qui était intervenu contre eux (cf. v. 9).'
  - type: text
    content: 'Après avoir vu cela, les cinq princes de la confédération des Philistins retournèrent à Eqrôn le même jour. '
  '17':
  - type: text
    content: 'Voici les hémorroïdes d''or que les Philistins offrirent au '
  - type: text
    content: Seigneur
  - type: text
    content: ' en réparation : une pour Ashdod, une pour Gaza, une pour Ashqelôn, une pour Gath et une pour Eqrôn. '
  '18':
  - type: note
    content: 'Le v. 18 présente plusieurs difficultés : le nombre des souris d''or semble ne pas être limité à cinq, comme au v. 4, mais correspondre au nombre (indéterminé) des localités du territoire philistin (ce qui soulignerait l''ampleur de la défaite des Philistins). De plus c''est d''après LXX et Tg (et quelques mss hébreux) que l''on traduit la grande pierre (cf. v. 14), alors que le texte hébreu traditionnel parle d’Abel la grande, nom de lieu inconnu par ailleurs, mais qui pourrait faire allusion au deuil (hébreu ’bl) dont parle le v. 19 ; cf. Gn 50.11n. – Une ville fortifiée est une ville entourée de murailles, par opposition au village sans murailles (cf. Dt 3.5+) ; l''ensemble de l''expression (depuis… jusqu''au…) signifie toutes les localités sans exception. –  et jusqu''à la grande pierre  : certains modifient la vocalisation traditionnelle de l''hébreu pour lire témoin la grande pierre  ; cette pierre marquait peut-être la limite entre le territoire des Philistins et celui des Israélites.'
  - type: text
    content: 'Il y avait aussi des souris d''or pour chacune des villes des Philistins appartenant aux cinq princes de la confédération, depuis la ville fortifiée jusqu''au village sans murailles et jusqu''à la grande pierre sur laquelle on avait déposé le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', pierre qui est jusqu''à ce jour dans le champ de Josué de Beth-Shémesh.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur frappa  : litt. il frappa  ; LXX les fils de Jékonia ne se réjouirent pas avec les gens de Beth-Shémesh d''avoir vu le coffre du Seigneur, et celui-ci frappa… –  parce qu''ils avaient regardé le coffre  : regarder ou toucher un objet sacré comportait un risque de mort, cf. Nb 4.5-15 ; 2S 6.6s. –  soixante-dix hommes – cinquante mille  : litt. soixante-dix hommes cinquante mille hommes  ; on a parfois compris et traduit soixante-dix hommes sur cinquante mille ou cinquante mille soixante-dix hommes . –  un grand fléau  : cf. 4.8,10n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappa les gens de Beth-Shémesh parce qu''ils avaient regardé le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il frappa soixante-dix hommes – cinquante mille parmi le peuple – et le peuple prit le deuil, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait frappé d''un grand fléau. '
  '2':
  - type: note
    content: 'devins  : cf. Dt 18.14 ; Es 3.2 ; 44.25 ; voir aussi Gn 41.8 ; Es 2.6 ; Dn 2.2 ; 5.7. –  en son lieu  : cf. 5.3n.'
  - type: text
    content: 'Alors les Philistins appelèrent les prêtres et les devins ; ils leur demandèrent : Que devons-nous faire du coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? Faites-nous savoir comment nous devons le renvoyer en son lieu. '
  '20':
  - type: note
    content: 'Qui peut tenir  : cf. Ex 19.21 ; 2S 6.9 ; Ml 3.2 ; Ps 76.8. –  Dieu saint Jos 24.19 ; Es 5.16. –  vers qui montera-t-il…  : le sujet peut être soit le Seigneur, soit le Coffre  ; cf. Ps 47.6. Sur le verbe monter, employé trois fois, ici et dans les deux versets suivants, voir 1.3n.'
  - type: text
    content: 'Les gens de Beth-Shémesh dirent : Qui peut tenir devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ce Dieu saint ? Et vers qui montera-t-il, en partant de chez nous ? '
  '21':
  - type: note
    content: 'Qiriath-Yéarim  : localité située à une quinzaine de kilomètres au nord-est de Beth-Shémesh. Cf. Jos 9.17. –  descendez…  : litt. descendez et faites-le monter vers vous.'
  - type: text
    content: 'Ils envoyèrent des messagers aux habitants de Qiriath-Yéarim, pour leur dire : Les Philistins ont ramené le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; descendez le chercher et faites-le monter chez vous.'
  '3':
  - type: note
    content: 'sans rien ou à vide  ; il ne s''agit pas de déposer quelque chose dans le Coffre, mais de rendre le Coffre accompagné d''une offrande de réparation  ; cf. Ex 3.21. –  alors vous guérirez…  : LXX a lu alors vous guérirez, et il vous sera pardonné ; sa main (celle de Dieu) ne s''écartera-t-elle pas de vous ? –  de Dieu  : autre traduction des dieux.'
  - type: text
    content: 'Ils répondirent : Si vous renvoyez le coffre du Dieu d''Israël, ne le renvoyez pas sans rien, mais offrez une réparation pour lui ; alors vous guérirez, et ainsi vous saurez pourquoi la main de Dieu ne s''est pas écartée de vous. '
  '4':
  - type: note
    content: 'souris ou rats  ; cf. v. 5. –  fléau  : le même mot hébreu a été rendu par défaite en 4.17. Certains pensent que les rats avaient propagé une épidémie de peste bubonique (cf. 5.6n). –  pour tous  : litt. pour eux tous  ; certains mss hébreux et versions anciennes portent pour vous tous.'
  - type: text
    content: 'Les Philistins dirent : Quelle réparation devons-nous offrir pour lui ? Ils répondirent : Cinq tumeurs en or et cinq souris en or, d''après le nombre des princes de la confédération des Philistins, car il y a eu le même fléau pour tous, pour les princes de votre confédération. '
  '5':
  - type: note
    content: 'donnez gloire  : comme le confirme le texte de Jos 7.19, cette expression suggère l''idée de reconnaître ses torts devant quelqu''un ; cf. Ml 2.2 ; Jn 9.24. –  vous traitera-t-il moins sévèrement…  : litt. allégera-t-il sa main de dessus vous…  ; expressions comparables en 1R 12.4,9ss/ / ; voir aussi Jon 3.9. –  vos dieux  : autre traduction votre dieu.'
  - type: text
    content: 'Faites des images de vos tumeurs et des images de vos souris qui ravagent le pays, et donnez gloire au Dieu d''Israël : peut-être vous traitera-t-il moins sévèrement, vous, vos dieux et votre pays. '
  '6':
  - type: note
    content: 'vous montreriez-vous obtus  : litt. alourdiriez-vous votre cœur  ; le même verbe hébreu est rendu par être pesant en 5.6,11 ; cf. Ex 7.14n. –  comme l''Egypte  : autre traduction comme les Egyptiens  ; cf. Ex 7.13s ; 8.11 ; 9.7 ; 10.1. –  Dieu s''est joué d''eux  : litt. il s''est joué d''eux  ; cf. Ex 10.2. –  n''ont-ils pas renvoyé…  : litt. ne les renvoyèrent-ils pas ? Et ils s''en allèrent  ; ces quelques mots résument le sens de toute l''histoire des plaies d''Egypte, Ex 7–12 ; voir en particulier Ex 12.31-34.'
  - type: text
    content: 'Pourquoi vous montreriez-vous obtus, comme l''Egypte et le pharaon ? Lorsque Dieu s''est joué d''eux, n''ont-ils pas renvoyé les Israélites pour qu''ils s''en aillent ? '
  '7':
  - type: note
    content: 'fabriquez…  : litt. prenez et faites un chariot… et deux vaches… –  chariot tout neuf  : cf. 2S 6.3. –  jamais porté le joug  : cf. Nb 19.2 ; Dt 21.3 ; voir aussi Mc 11.2/ /. –  à la maison, c.-à-d. à l''étable.'
  - type: text
    content: 'Maintenant, fabriquez un chariot tout neuf, prenez deux vaches qui allaitent et qui n''ont jamais porté le joug ; attelez les vaches au chariot et ramenez à la maison leurs petits qui sont derrière elles. '
  '8':
  - type: note
    content: 'un coffret  : le mot hébreu ne se rencontre qu''ici et aux v. 11,15 de ce chap.'
  - type: text
    content: 'Vous prendrez le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et vous le mettrez sur le chariot ; vous placerez à côté de lui, dans un coffret, les objets d''or que vous offrirez en réparation pour lui ; puis vous le renverrez, et il partira. '
  '9':
  - type: note
    content: 'Beth-Shémesh  : localité située à 25 km environ à l''ouest de Jérusalem ; cf. Jos 15.10. –  c''est lui  : il peut s''agir du Coffre ou de YHWH. –  ce grand malheur  : cf. Am 3.6. –  cela nous est arrivé par hasard  : cf. 20.26 ; Rt 2.3.'
  - type: text
    content: 'Vous verrez bien : s''il monte par le chemin de la frontière, vers Beth-Shémesh, c''est lui qui nous a causé ce grand malheur ; sinon, nous saurons que ce n''est pas sa main qui nous a frappés, mais que cela nous est arrivé par hasard.'
