      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Hermas
      - type: text
        text: ', Mand. IV,1,4ss : « Seigneur, dis-je, si quelqu''un a une femme qui croit au Seigneur, et qu''il découvre qu''elle est adultère, est-ce qu''il commet un péché à vivre avec elle ? – Tout le temps qu''il l''ignore, dit-il, il ne commet pas de péché ; mais s''il apprend le péché de sa femme et qu''elle, au lieu de se repentir, persiste dans l''adultère, à vivre avec elle le mari partage sa faute et participe à l''adultère. (…) Qu''il la renvoie… et qu''il reste seul. Mais si, après avoir renvoyé sa femme, il en épouse une autre, lui aussi alors, il commet l''adultère. – Et si, Seigneur, dis-je, après avoir été renvoyée, la femme se repent et veut revenir à son mari, ne faudra-t-il pas l''accueillir ? – Certes, dit-il. Si le mari ne l''accueille pas, il pèche, il se charge d''un lourd péché, car il faut accueillir celui qui a péché et qui se repent, mais non beaucoup de fois. (…) C''est en vue du repentir que l''homme ne doit pas se remarier. Cette attitude vaut d''ailleurs aussi bien pour la femme que pour l''homme. (…) Si on vous a enjoint de demeurer libres de vous-mêmes, homme ou femme, c''est parce que, dans de tels cas, la pénitence est possible. »'
    marker-yv: yv-n
  - type: text
    text: Mais, je vous le dis, celui qui répudie sa femme – sauf pour inconduite sexuelle – et en épouse une autre commet l'adultère.
