document_id: MAT.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus et la répudiation
  - type: heading
    content: Mc 10.1-12
  - type: text
    content: ' '
  - type: note
    content: 'discours ou paroles  : voir 7.28n. –  dans le territoire de la Judée, de l''autre côté du Jourdain  : probablement la partie transjordanienne de la Judée (à l''est du Jourdain) ; cf. 4.15n  ; Mc 10.1n  ; Lc 9.51 ; Jn 10.40.'
  - type: text
    content: 'Lorsque Jésus eut achevé ces discours, il quitta la Galilée pour se rendre dans le territoire de la Judée, de l''autre côté du Jourdain. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 21.9 ; 1Co 7.1s,28. –  la condition  : le terme grec signifie habituellement cause  ; il a été traduit par motif au v. 3.'
  - type: text
    content: 'Ses disciples lui dirent : Si telle est la condition de l''homme par rapport à la femme, il n''est pas avantageux de se marier. '
  '11':
  - type: note
    content: 'ne comprennent pas  : on pourrait aussi traduire n''accueillent pas, ne font pas place à, de même au v. 12 ; le même verbe (cf. 15.17n) évoque l''idée de contenance en Mc 2.2 (il n''y avait plus de place) ; Jn 2.6 ; 21.25 (contenir) ; voir aussi son emploi en Jn 8.37n  ; 2Co 7.2n  ; 2P 3.9. Cf. Mt 13.11 ; 1Co 7.7-9,17.'
  - type: text
    content: 'Il leur répondit : Tous ne comprennent pas cette parole, mais seulement ceux à qui cela est donné. '
  '12':
  - type: note
    content: 'qui le sont depuis…  : litt. qui sont nés ainsi du ventre. – Cf. Jr 16.2 ; 1Co 7.26-35.'
  - type: text
    content: Car il y a des eunuques qui le sont depuis le ventre de leur mère, il y en a qui le sont devenus par le fait des gens, et il y en a qui se sont rendus eux-mêmes eunuques à cause du règne des cieux. Que celui qui peut comprendre comprenne !
  - type: heading
    content: Jésus et les enfants
  - type: heading
    content: Mc 10.13-16  ; Lc 18.15-17
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 48.9. –  des enfants  : autre traduction de petits enfants  ; même possibilité dans la suite. –  pour eux  : sous-entendu dans le texte. –  rabrouèrent 8.26n  ; 20.31/ / ; cf. 15.23.'
  - type: text
    content: 'Alors des gens lui amenèrent des enfants, afin qu''il leur impose les mains et prie pour eux. Mais les disciples les rabrouèrent. '
  '14':
  - type: note
    content: 'Laissez faire  : litt. laissez. –  empêchez Mc 9.38s/ / ; Lc 18.16+. –  royaume… ceux qui sont comme eux 11.25 ; 18.2-3+,5.'
  - type: text
    content: 'Alors Jésus dit : Laissez faire les enfants, ne les empêchez pas de venir à moi ; car le royaume des cieux est pour ceux qui sont comme eux. '
  '15':
  - type: text
    content: Il leur imposa les mains et partit de là.
  - type: heading
    content: Jésus et le jeune homme riche
  - type: heading
    content: Mc 10.17-31  ; Lc 18.18-30  ; 13.30
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Lc 10.25. –  Maître  : au sens d’ enseignant . –  la vie éternelle  : autre traduction possible une vie éternelle.'
  - type: text
    content: 'Alors un homme vint lui demander : Maître, que dois-je faire de bon pour avoir la vie éternelle ? '
  '17':
  - type: note
    content: vie / commandements Lv 18.5 ; Né 9.29 ; Lc 10.28 ; Rm 10.5 ; voir loi.
  - type: text
    content: 'Il lui répondit : Pourquoi m''interroges-tu sur ce qui est bon ? Un seul est bon. Si tu veux entrer dans la vie, observe les commandements. Lesquels ? lui dit-il. '
  '18':
  - type: note
    content: 5.21n,27 ; Ex 20.12-16 ; Dt 5.16-20.
  - type: text
    content: 'Jésus répondit : '
  - type: text
    content: Tu ne commettras pas de meurtre ; tu ne commettras pas d'adultère ; tu ne feras pas de faux témoignage ; tu ne commettras pas de vol ;
  - type: text
    content: ' '
  '19':
  - type: note
    content: 'père / mère Ep 6.2s. –  Tu aimeras 22.39+ ; Lv 19.18. Cf. Didachè 2.1ss : « Second commandement de la doctrine : Tu ne tueras pas, tu ne commettras pas l''adultère et tu éviteras la pédérastie, la fornication, le vol, la magie et la sorcellerie, tu ne tueras pas l''enfant par avortement et tu ne le feras pas mourir après la naissance. Tu ne convoiteras pas les biens du prochain. Tu ne feras pas de faux serment, tu ne porteras pas de faux témoignage, tu ne médiras pas et tu ne conserveras pas de ressentiment (…). Tu ne haïras personne, mais tu reprendras les uns, tu prieras pour les autres, d''autres encore, tu les aimeras plus que ton âme. »'
  - type: text
    content: honore ton père et ta mère,
  - type: text
    content: ' et : '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: text
    content: '. '
  '2':
  - type: note
    content: 12.15 ; 15.30.
  - type: text
    content: De grandes foules le suivirent, et là, il les guérit.
  '20':
  - type: note
    content: Cf. Ga 1.14. –  observé ou gardé, autre verbe (synonyme) v. 17.
  - type: text
    content: 'Le jeune homme lui dit : J''ai observé tout cela, que me manque-t-il encore ? '
  '21':
  - type: note
    content: 'parfait 5.48 ; cf. Didachè 6.2 : « Si tu peux porter tout entier le joug du Seigneur, tu seras parfait ; sinon, fais ce que tu peux faire. » –  vends 13.44,46 ; cf. Lc 19.8 ; Ac 2.45. –  trésor / cieux 6.20n. –  suis-moi 8.22+.'
  - type: text
    content: 'Jésus lui dit : Si tu veux être parfait, va, vends ce que tu possèdes, donne-le aux pauvres, et tu auras un trésor dans les cieux. Puis viens et suis-moi. '
  '22':
  - type: note
    content: Ps 62.11 ; Lc 12.15.
  - type: text
    content: Après avoir entendu cette parole, le jeune homme s'en alla tout triste ; car il avait beaucoup de biens.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Lc 6.24 ; 1Co 1.26. –  Amen 5.18n.
  - type: text
    content: 'Jésus dit à ses disciples : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, il est difficile à un riche d''entrer dans le royaume des cieux. '
  '24':
  - type: text
    content: 'Je vous le dis encore, il est plus facile à un chameau de passer par un trou d''aiguille qu''à un riche d''entrer dans le royaume de Dieu. '
  '25':
  - type: note
    content: 'ébahis  : même verbe 7.28+.'
  - type: text
    content: 'Les disciples, en entendant cela, restèrent complètement ébahis. Ils se demandaient : Qui peut donc être sauvé ? '
  '26':
  - type: note
    content: 'Gn 18.14 ; Za 8.6 ; Jb 42.2 ; Mc 14.36 ; Lc 1.37. –  les humains  : autres traductions les gens ; les hommes  ; cf. 5.13+.'
  - type: text
    content: 'Jésus les regarda et leur dit : Pour les humains, c''est impossible, mais pour Dieu tout est possible.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 4.20,22/ / ; Lc 5.28.
  - type: text
    content: 'Alors Pierre lui dit : Nous, nous avons tout quitté pour te suivre ; qu''en sera-t-il pour nous ? '
  '28':
  - type: note
    content: 'à vous qui m''avez suivi…  : autre traduction possible vous qui m''avez suivi dans la Nouvelle Naissance, quand le Fils de l''homme sera assis… vous aussi vous serez assis… Le mot grec traduit par Nouvelle Naissance n''apparaît qu''ici et en Tt 3.5 : il semble prendre ici une dimension cosmique (on pourrait traduire nouvelle naissance de l''univers) pour désigner, selon les vues de l''apocalyptique juive, le jour du jugement qui constitue le passage de ce monde-ci au monde à venir (cf. 12.32n) ; voir aussi Jn 3.3ss ; Ac 3.21 ; 2P 3.13 ; Ap 21.1,5. –  Fils de l''homme / gloire 8.20+ ; 16.27+ ; 25.31 ; Dn 7.9s. –  trônes Lc 22.28-30 ; Ap 3.21 ; cf. Ps 122.4s. –  juger  : cf. 12.27,41s ; 1Co 6.2 ; Ap 20.4 ; le mot peut aussi avoir le sens de gouverner, cf. Jg 2.16n  ; 3.10 ; 1S 8.20 ; Dn 9.12.'
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, à vous qui m''avez suivi : à la Nouvelle Naissance, lorsque le Fils de l''homme s''assiéra sur son trône de gloire, vous aussi vous serez assis sur douze trônes pour juger les douze tribus d''Israël. '
  '29':
  - type: note
    content: '4.22 ; 10.37. Après mère, certains mss ajoutent le mot femme  ; cf. Lc 18.29. –  à cause de mon nom  : cf. 10.22+. –  cent fois plus  : certains mss portent beaucoup plus. –  vie éternelle  : cf. 2Co 4.17 ; Ap 2.10.'
  - type: text
    content: 'Et quiconque aura quitté maisons, frères, sœurs, père, mère, enfants ou terres à cause de mon nom recevra cent fois plus et héritera la vie éternelle. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: '5.31s ; cf. Dt 24.1 ; Ml 2.15s. –  Des pharisiens  : certains mss portent les pharisiens . –  mettre à l''épreuve 4.1n. –  à un homme  : cette précision est absente de certains mss.'
  - type: text
    content: 'Des pharisiens vinrent le mettre à l''épreuve en lui demandant : Est-il permis à un homme de répudier sa femme pour n''importe quel motif ? '
  '30':
  - type: note
    content: 20.16 ; Lc 13.30.
  - type: text
    content: Beaucoup de premiers seront derniers et beaucoup de derniers seront premiers.
  '4':
  - type: note
    content: 'les fit…  : litt. les fit mâle et femelle, Gn 1.27n  ; 5.2.'
  - type: text
    content: 'Il répondit : N''avez-vous pas lu que le Créateur, dès le commencement, '
  - type: text
    content: les fit homme et femme
  - type: text
    content: ' '
  '5':
  - type: note
    content: Gn 2.24  ; 1Co 6.16 ; Ep 5.31 ; voir chair.
  - type: text
    content: 'et qu''il dit : '
  - type: text
    content: C'est pourquoi l'homme quittera son père et sa mère et s'attachera à sa femme, et les deux seront une seule chair
  - type: text
    content: '. '
  '6':
  - type: note
    content: Cf. 18.3n  ; 1Co 7.10.
  - type: text
    content: 'Ainsi ils ne sont plus deux, mais une seule chair. Que l''homme ne sépare donc pas ce que Dieu a uni ! '
  '7':
  - type: note
    content: 'de donner…  : litt. de lui donner (à elle) un document (grec biblion, diminutif de biblos = livre) de renvoi et de la répudier  ; certains mss portent simplement de donner un document de renvoi et de répudier. Cf. Dt 24.1-4.'
  - type: text
    content: 'Ils lui dirent : Alors pourquoi Moïse a-t-il commandé de donner une attestation de rupture à la femme quand on la répudie ? '
  '8':
  - type: note
    content: 'votre obstination  : litt. votre dureté de cœur.'
  - type: text
    content: 'Il leur dit : C''est à cause de votre obstination que Moïse vous a permis de répudier vos femmes ; au commencement, il n''en était pas ainsi. '
  '9':
  - type: note
    content: 'inconduite sexuelle 5.32n  ; cf. Lc 16.18 ; Rm 7.3 ; Le Pasteur d''Hermas, Mand. IV,1,4ss : « Seigneur, dis-je, si quelqu''un a une femme qui croit au Seigneur, et qu''il découvre qu''elle est adultère, est-ce qu''il commet un péché à vivre avec elle ? – Tout le temps qu''il l''ignore, dit-il, il ne commet pas de péché ; mais s''il apprend le péché de sa femme et qu''elle, au lieu de se repentir, persiste dans l''adultère, à vivre avec elle le mari partage sa faute et participe à l''adultère. (…) Qu''il la renvoie… et qu''il reste seul. Mais si, après avoir renvoyé sa femme, il en épouse une autre, lui aussi alors, il commet l''adultère. – Et si, Seigneur, dis-je, après avoir été renvoyée, la femme se repent et veut revenir à son mari, ne faudra-t-il pas l''accueillir ? – Certes, dit-il. Si le mari ne l''accueille pas, il pèche, il se charge d''un lourd péché, car il faut accueillir celui qui a péché et qui se repent, mais non beaucoup de fois. (…) C''est en vue du repentir que l''homme ne doit pas se remarier. Cette attitude vaut d''ailleurs aussi bien pour la femme que pour l''homme. (…) Si on vous a enjoint de demeurer libres de vous-mêmes, homme ou femme, c''est parce que, dans de tels cas, la pénitence est possible. »'
  - type: text
    content: Mais, je vous le dis, celui qui répudie sa femme – sauf pour inconduite sexuelle – et en épouse une autre commet l'adultère.
