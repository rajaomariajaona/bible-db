    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Ps 132.13s) ; mais on a aussi compris parfois '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le peuple '
    - type: usfm
      marker: ft
      children:
      - type: text
