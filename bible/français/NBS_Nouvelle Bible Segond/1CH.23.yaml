  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' tous les holocaustes, aux sabbats, aux nouvelles lunes et aux rencontres festives, en nombre adéquat, selon la règle à laquelle ils sont constamment soumis, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les Chroniques rappellent que '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la tente de la Rencontre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'existe toujours (voir 2Ch 1.3), à Gabaon, et qu''elle doit être entretenue par les lévites. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: service
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans ce v. ce mot traduit deux termes hébreux différents ; le premier signifie litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'garde, observance '
    - type: usfm
