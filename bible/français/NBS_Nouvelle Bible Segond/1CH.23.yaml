        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 40.46'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
