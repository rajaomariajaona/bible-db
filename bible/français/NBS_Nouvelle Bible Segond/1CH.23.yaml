document_id: 1CH.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David divise les lévites en classes
  - type: text
    content: ' '
  - type: note
    content: Voir 28.5 ; 1R 1.32-35.
  - type: text
    content: David, âgé et rassasié de jours, investit Salomon, son fils, de la royauté sur Israël.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Zina  : un ms hébreu, appuyé par LXX et Vg, l''appelle Ziza , nom qui est repris au v. 11.'
  - type: text
    content: 'Fils de Shiméi : Yahath, Zina, Yéoush et Beria. Ce sont là les quatre fils de Shiméi. '
  '11':
  - type: note
    content: 'pour une seule charge  : traduction incertaine ; le terme semble être employé dans un sens analogue en 24.3,19 ; ici il désigne peut-être une division ou une sous-classe particulière ; d''autres comprennent et formèrent une seule famille dans le recensement (verbe apparenté au v. 24).'
  - type: text
    content: Yahath était le chef, et Ziza le second ; Yéoush et Beria n'eurent pas beaucoup de fils et formèrent une seule famille, pour une seule charge.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 6.18.
  - type: text
    content: 'Fils de Qehath : Amram, Yitsehar, Hébron et Ouzziel, quatre.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'séparé  : autre traduction mis à part  ; voir Gn 1.4n  ; Nb 8.14+ ; bien que descendant de Lévi, Aaron deviendra grand prêtre et ses descendants formeront la classe particulière des prêtres . –  pour être consacré comme très sacré  : le sens du texte hébreu n''est pas certain ; autres traductions pour consacrer les choses très saintes , ou pour s''occuper du lieu très saint . Le terme qui s''applique habituellement au lieu le plus sacré du temple (le Très-Sacré ou Saint des saints ) et aux choses les plus sacrées du temple semble ici s''appliquer, exceptionnellement, au grand prêtre Aaron lui-même ; voir aussi Ps 106.16n. Il s''agit d''insister sur le caractère sacerdotal d''Aaron et de ses descendants, chargés entre autres d''offrir de l''encens (voir Ex 30.7 ; Nb 17.5 ; 1S 2.28n) et de prononcer les bénédictions (voir Lv 9.22s ; Nb 6.23-27). –  bénédictions en son nom Dt 10.8.'
  - type: text
    content: 'Fils d''Amram : Aaron et Moïse. Aaron fut séparé pour être consacré comme très sacré, lui et ses fils, pour toujours, afin d''offrir de l''encens devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', d''officier pour lui et de prononcer les bénédictions en son nom, pour toujours. '
  '14':
  - type: note
    content: 'Moïse, l''homme de Dieu  : cf. Dt 33.1n. –  appelés ou convoqués, c.-à-d. comptés dans la tribu des lévites.'
  - type: text
    content: Quant à Moïse, l'homme de Dieu, ses fils ont été appelés avec la tribu des lévites.
  '15':
  - type: text
    content: 'Fils de Moïse : Guershom et Eliézer.'
  '16':
  - type: text
    content: 'Fils de Guershom : Shebouel, le chef. '
  '17':
  - type: text
    content: 'Les fils d''Eliézer furent : Rehabia, le chef ; Eliézer n''eut pas d''autres fils, mais les fils de Rehabia furent extrêmement nombreux.'
  '18':
  - type: text
    content: 'Fils de Yitsehar : Shelomith, le chef.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Yeriya  : hébreu Yeriyahou.'
  - type: text
    content: 'Fils d''Hébron : Yeriya, le chef ; Amaria, le second, Yahaziel, le troisième, et Yeqaméam, le quatrième.'
  '2':
  - type: text
    content: 'Il rassembla tous les princes d''Israël, les prêtres et les lévites. '
  '20':
  - type: text
    content: 'Fils d''Ouzziel : Michée, le chef, et Yishiya, le second.'
  '21':
  - type: text
    content: 'Fils de Merari : Mahli et Moushi. Fils de Mahli : Eléazar et Qish. '
  '22':
  - type: note
    content: 'pour femmes  : sous-entendu dans le texte. –  leurs frères, au sens large, signifie leurs cousins ou leurs proches parents  ; cf. Nb 36, en particulier les v. 10-12.'
  - type: text
    content: 'Eléazar mourut sans avoir de fils ; mais il eut des filles, que prirent pour femmes les fils de Qish, leurs frères. '
  '23':
  - type: text
    content: 'Fils de Moushi : Mahli, Eder et Yerémoth, trois.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qu''on recensa…  : cf. Nb 1.45 ; 2.32 etc. –  vingt ans  : cf. v. 27 ; Esd 3.8 ; 2Ch 31.17 ; voir aussi 1Ch 23.3+.'
  - type: text
    content: 'Ce sont là les fils de Lévi, famille par famille – les chefs de famille, ceux qu''on recensa en comptant les noms, tête par tête. Ils étaient employés au service de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', depuis l''âge de vingt ans et au-dessus. '
  '25':
  - type: note
    content: 'a accordé le repos  : cf. 22.18+. –  il demeurera  : le sujet est probablement le Seigneur (cf. Ps 132.13s) ; mais on a aussi compris parfois le peuple (auquel cas Jérusalem désignerait globalement le pays d''Israël).'
  - type: text
    content: 'Car David avait dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, a accordé le repos à son peuple, et il demeurera à Jérusalem pour toujours. '
  '26':
  - type: note
    content: Cf. Nb 4.1-33.
  - type: text
    content: 'Aussi, en ce qui concerne les lévites, ils n''auront plus à porter la Demeure et tous les objets destinés à son service. '
  '27':
  - type: text
    content: 'C''est sur ces dernières paroles de David que se fit le compte des fils de Lévi, depuis l''âge de vingt ans et au-dessus. '
  '28':
  - type: note
    content: 'fonctions  : même terme en 2Ch 9.4 ; 35.15n. –  fils d''Aaron  : cf. v. 13n  ; 6.34n. – Voir pur, impur.'
  - type: text
    content: 'Leurs fonctions, aux côtés des fils d''Aaron, pour le service de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', concernent les cours et les salles, la purification de toutes les choses sacrées, les ouvrages relatifs au service de la maison de Dieu, '
  '29':
  - type: note
    content: 'pains exposés  : cf. Lv 24.5-9 ; 1R 7.48n. –  les offrandes végétales Lv 2. –  poêle ou plaque, cf. Lv 2.5n. –  les mesures Lv 19.35s.'
  - type: text
    content: 'les pains exposés, la fleur de farine pour les offrandes végétales, les galettes sans levain, ce qui est fait à la poêle et ce qui est cuit, et toutes les mesures de capacité et de longueur. '
  '3':
  - type: note
    content: 'trente ans  : cf. Nb 4.3,23 etc. ; voir aussi 1Ch 23.24.'
  - type: text
    content: 'On compta les lévites depuis l''âge de trente ans et au-dessus ; leur nombre, compté tête par tête, homme par homme, était de 38 000. '
  '30':
  - type: note
    content: 'Ils doivent se présenter…  : litt. pour se tenir (debout)… –  célébrer… 6.16n.'
  - type: text
    content: 'Ils doivent se présenter chaque matin, afin de célébrer et de louer le '
  - type: text
    content: Seigneur
  - type: text
    content: ', de même le soir, '
  '31':
  - type: note
    content: 'Cf. Nb 28–29 ; voir aussi sacrifices, sabbats et calendrier et fêtes. –  en nombre adéquat…  : litt. en nombre selon la règle sur eux constante.'
  - type: text
    content: 'et offrir au '
  - type: text
    content: Seigneur
  - type: text
    content: ' tous les holocaustes, aux sabbats, aux nouvelles lunes et aux rencontres festives, en nombre adéquat, selon la règle à laquelle ils sont constamment soumis, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '32':
  - type: note
    content: 'Les Chroniques rappellent que la tente de la Rencontre existe toujours (voir 2Ch 1.3), à Gabaon, et qu''elle doit être entretenue par les lévites. –  service  : dans ce v. ce mot traduit deux termes hébreux différents ; le premier signifie litt. garde, observance (cf. 1R 2.3n) ; le second, qui n''apparaît qu''à la fin du v. dans l''expression le service de la maison (cf. v. 28), peut désigner le travail du serviteur ou de l''esclave, mais aussi un service cultuel ; Nb 3.7n  ; Ez 40.46n. –  le service du sanctuaire  : litt. et la garde…  ; l''expression peut être lue comme une apposition à service de la tente de la Rencontre (notre traduction), mais aussi comme désignant une autre tâche, encore à venir, le service du (futur) sanctuaire.'
  - type: text
    content: 'Ils assurent le service de la tente de la Rencontre, le service du sanctuaire ; ils assurent le service pour les fils d''Aaron, leurs frères, en ce qui concerne le service de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: note
    content: 'David dit  : sous-entendu dans le texte ; la fin du v. 5, avec un verbe à la première personne du singulier (que j''ai faits), indique que les v. 4s constituent un discours direct (cf. 28.19n). –  pour surveiller (cf. 15.21n) les travaux  : dans les Chroniques, puisque ce sont les étrangers qui exécutent les travaux de construction (voir 22.2n), les lévites ne peuvent être que des surveillants  ; toutefois on pourrait aussi comprendre que ces lévites seraient chargés de veiller au bon déroulement du service du temple, lorsque ce dernier serait construit. –  secrétaires (ou greffiers  ; cf. Dt 1.15n) et juges  : cf. 26.29 ; Dt 16.18n-20.'
  - type: text
    content: 'David dit : Qu''il y en ait 24 000 pour surveiller les travaux de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', 6 000 comme secrétaires et juges, '
  '5':
  - type: note
    content: 'portiers  : cf. 26.1-19. –  pour louer le Seigneur  : cf. chap. 25. –  pour la louange  : litt. pour louer.'
  - type: text
    content: '4 000 comme portiers, et 4 000 pour louer le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec les instruments que j''ai faits pour la louange.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'divisa en classes  : le verbe et le substantif ainsi traduits sont apparentés. –  fils de Lévi  : cf. 5.27n  ; 6.1n.'
  - type: text
    content: 'David les divisa en classes d''après les fils de Lévi :'
  - type: text
    content: Guershôn, Qehath et Merari.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ladân  : cf. 6.2,5 ; Ex 6.17 Libni.'
  - type: text
    content: 'Des Guershonites : Ladân et Shiméi.'
  '8':
  - type: text
    content: 'Fils de Ladân : le chef Yehiel, Zétam et Joël, trois.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Fils de Shiméi  : cf. v. 10 ; au lieu de Shiméi certains proposent de lire le nom de l''un des trois fils de Ladân (v. 8). –  Shelomith  : autre lecture traditionnelle Shelomoth.'
  - type: text
    content: 'Fils de Shiméi : Shelomith, Haziel et Harân, trois. Ce sont là les chefs des familles de Ladân.'
