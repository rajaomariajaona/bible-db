    marker-yv: yv-n
  - type: text
    text: 'Ce sont là les fils de Lévi, famille par famille – les chefs de famille, ceux qu''on recensa en comptant les noms, tête par tête. Ils étaient employés au service de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', depuis l''âge de vingt ans et au-dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: a accordé le repos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.18+. –  '
    - type: usfm
      marker: fq
