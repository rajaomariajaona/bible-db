  - type: text
    text: 'Leurs fonctions, aux côtés des fils d''Aaron, pour le service de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', concernent les cours et les salles, la purification de toutes les choses sacrées, les ouvrages relatifs au service de la maison de Dieu, '
