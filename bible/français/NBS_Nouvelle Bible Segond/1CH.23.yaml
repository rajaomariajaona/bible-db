document_id: 1CH.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David divise les lévites en classes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 28.5 ; 1R 1.32-35.
    marker-yv: yv-n
  - type: text
    text: David, âgé et rassasié de jours, investit Salomon, son fils, de la royauté sur Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il rassembla tous les princes d''Israël, les prêtres et les lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trente ans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 4.3,23 etc. ; voir aussi 1Ch 23.24.'
    marker-yv: yv-n
  - type: text
    text: 'On compta les lévites depuis l''âge de trente ans et au-dessus ; leur nombre, compté tête par tête, homme par homme, était de 38 000. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: David dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte ; la fin du v. 5, avec un verbe à la première personne du singulier ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que j'ai faits
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), indique que les v. 4s constituent un discours direct (cf. 28.19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour surveiller '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 15.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les travaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans les Chroniques, puisque ce sont les étrangers qui exécutent les travaux de construction (voir 22.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
      - type: text
        text: ' ne peuvent être que des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: surveillants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; toutefois on pourrait aussi comprendre que ces lévites seraient chargés de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'veiller '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au bon déroulement du service du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: ', lorsque ce dernier serait construit. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'secrétaires '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: greffiers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 1.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et juges
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 26.29 ; Dt 16.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '-20.'
    marker-yv: yv-n
  - type: text
    text: 'David dit : Qu''il y en ait 24 000 pour surveiller les travaux de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', 6 000 comme secrétaires et juges, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: portiers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 26.1-19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour louer le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. chap. 25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour la louange
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour louer.
    marker-yv: yv-n
  - type: text
    text: '4 000 comme portiers, et 4 000 pour louer le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avec les instruments que j''ai faits pour la louange.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: divisa en classes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe et le substantif ainsi traduits sont apparentés. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fils de Lévi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 5.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 6.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'David les divisa en classes d''après les fils de Lévi :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Guershôn, Qehath et Merari.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ladân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 6.2,5 ; Ex 6.17 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Libni.
    marker-yv: yv-n
  - type: text
    text: 'Des Guershonites : Ladân et Shiméi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fils de Ladân : le chef Yehiel, Zétam et Joël, trois.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Fils de Shiméi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 10 ; au lieu de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shiméi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'certains proposent de lire le nom de l''un des trois fils de Ladân (v. 8). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shelomith
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shelomoth.
    marker-yv: yv-n
  - type: text
    text: 'Fils de Shiméi : Shelomith, Haziel et Harân, trois. Ce sont là les chefs des familles de Ladân.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Zina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : un ms hébreu, appuyé par '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ', l''appelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ziza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', nom qui est repris au v. 11.'
    marker-yv: yv-n
  - type: text
    text: 'Fils de Shiméi : Yahath, Zina, Yéoush et Beria. Ce sont là les quatre fils de Shiméi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour une seule charge
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; le terme semble être employé dans un sens analogue en 24.3,19 ; ici il désigne peut-être une division ou une sous-classe particulière ; d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et formèrent une seule famille dans le recensement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (verbe apparenté au v. 24).
    marker-yv: yv-n
  - type: text
    text: Yahath était le chef, et Ziza le second ; Yéoush et Beria n'eurent pas beaucoup de fils et formèrent une seule famille, pour une seule charge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ex 6.18.
    marker-yv: yv-n
  - type: text
    text: 'Fils de Qehath : Amram, Yitsehar, Hébron et Ouzziel, quatre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: séparé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mis à part
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; voir Gn 1.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 8.14+ ; bien que descendant de Lévi, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aaron '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'deviendra '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'grand prêtre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et ses descendants formeront la classe particulière des '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour être consacré comme très sacré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le sens du texte hébreu n''est pas certain ; autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour consacrer les choses très '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saintes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour s'occuper du lieu très saint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Le terme qui s''applique habituellement au lieu le plus sacré du temple (le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Très-Sacré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Saint des saints
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') et aux choses les plus sacrées du temple semble ici s''appliquer, exceptionnellement, au grand prêtre '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aaron '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lui-même ; voir aussi Ps 106.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Il s''agit d''insister sur le caractère sacerdotal d''Aaron et de ses descendants, chargés entre autres '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''offrir de l''encens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir Ex 30.7 ; Nb 17.5 ; 1S 2.28
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de prononcer les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédictions
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir Lv 9.22s ; Nb 6.23-27). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bénédictions en son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 10.8.
    marker-yv: yv-n
  - type: text
    text: 'Fils d''Amram : Aaron et Moïse. Aaron fut séparé pour être consacré comme très sacré, lui et ses fils, pour toujours, afin d''offrir de l''encens devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', d''officier pour lui et de prononcer les bénédictions en son nom, pour toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Moïse, l'homme de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 33.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'appelés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: convoqués
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comptés dans la tribu des lévites.
    marker-yv: yv-n
  - type: text
    text: Quant à Moïse, l'homme de Dieu, ses fils ont été appelés avec la tribu des lévites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fils de Moïse : Guershom et Eliézer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fils de Guershom : Shebouel, le chef. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les fils d''Eliézer furent : Rehabia, le chef ; Eliézer n''eut pas d''autres fils, mais les fils de Rehabia furent extrêmement nombreux.'
