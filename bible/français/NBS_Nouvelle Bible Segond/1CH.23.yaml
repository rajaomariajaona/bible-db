  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Nb 4.1-33.
    marker-yv: yv-n
  - type: text
    text: 'Aussi, en ce qui concerne les lévites, ils n''auront plus à porter la Demeure et tous les objets destinés à son service. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
