        text: le service du sanctuaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et la garde…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; l''expression peut être lue comme une apposition à '
    - type: usfm
