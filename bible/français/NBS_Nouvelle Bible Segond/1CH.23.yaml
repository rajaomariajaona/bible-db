      children:
      - type: text
        text: 'service de la tente de la Rencontre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(notre traduction), mais aussi comme désignant une autre tâche, encore à venir, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le service du (futur) sanctuaire.
    marker-yv: yv-n
  - type: text
    text: 'Ils assurent le service de la tente de la Rencontre, le service du sanctuaire ; ils assurent le service pour les fils d''Aaron, leurs frères, en ce qui concerne le service de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
