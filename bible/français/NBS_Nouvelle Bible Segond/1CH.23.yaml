    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pays d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Car David avait dit : Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël, a accordé le repos à son peuple, et il demeurera à Jérusalem pour toujours. '
  - type: usfm
    marker: v
