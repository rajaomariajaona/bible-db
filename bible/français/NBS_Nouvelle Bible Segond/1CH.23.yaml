        children:
        - type: text
          text: n
      - type: text
        text: ') ; le second, qui n''apparaît qu''à la fin du v. dans l''expression '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le service de la maison '
    - type: usfm
      marker: ft
      children:
