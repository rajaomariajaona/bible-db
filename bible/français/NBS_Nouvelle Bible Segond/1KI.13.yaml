          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le prophète souleva le cadavre de l''homme de Dieu, le déposa sur l''âne et le ramena. Le vieux prophète rentra dans la ville pour se lamenter et l''ensevelir. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
