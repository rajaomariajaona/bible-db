      marker: fr
      children:
      - type: text
        text: '13.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mes ossements à côté de ses ossements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'C''est à côté de ses ossements que vous me déposerez afin que mes ossements soient sauvés avec ses ossements '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 2R 23.16+ss).
    marker-yv: yv-n
  - type: text
    text: 'Après l''avoir enseveli, il dit à ses fils : Quand je serai mort, vous m''ensevelirez dans le tombeau où est enseveli l''homme de Dieu ; déposez mes ossements à côté de ses ossements. '
  - type: usfm
    marker: v
    metadata:
