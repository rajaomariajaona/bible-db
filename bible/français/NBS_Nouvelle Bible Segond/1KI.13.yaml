    marker-yv: yv-n
  - type: text
    text: 'et celui-ci s''en alla ; en chemin, il rencontra un lion, qui le tua. Son cadavre fut jeté sur le chemin : l''âne se tenait à côté de lui, et le lion aussi se tenait à côté du cadavre. '
  - type: usfm
    marker: v
