      marker: fr
      children:
      - type: text
        text: '13.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle se réalisera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle sera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par la parole du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 18. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Samarie
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ne fut construite et ne devint capitale du royaume qu'à partir d'Omri (c.-à-d. environ un demi-siècle plus tard, cf. 16.24). Le nom désigne ici, comme souvent, l'ensemble des dix tribus séparées ; cf. Ez 16.46 ; Os 7.1.
    marker-yv: yv-n
  - type: text
    text: 'Car elle se réalisera, la parole qu''il a criée, par la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', contre l''autel de Beth-El et contre toutes les maisons des hauts lieux qui sont dans les villes de Samarie.'
