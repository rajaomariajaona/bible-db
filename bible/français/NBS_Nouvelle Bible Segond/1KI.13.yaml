      - type: text
        text: '  : Beth-El, de même au v. 29.'
    marker-yv: yv-n
  - type: text
    text: 'Des passants virent le cadavre jeté sur le chemin et le lion se tenant à côté du cadavre ; ils en parlèrent à leur arrivée dans la ville où habitait le vieux prophète. '
  - type: usfm
    marker: v
