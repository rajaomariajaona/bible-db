        text: '  : cf. Gn 23 ; 49.30 ; 2R 22.20 ; Es 14.19 ; Jr 8.1s ; Né 2.5.'
    marker-yv: yv-n
  - type: text
    text: 'parce que tu es revenu et que tu as mangé et bu au lieu dont il t''avait dit : « Tu n''y mangeras rien, tu n''y boiras rien », ton cadavre n''entrera pas dans le tombeau de tes pères.'
