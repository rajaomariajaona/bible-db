    - type: text
      text: Seigneur
  - type: text
    text: ' l''a livré au lion qui l''a tué en lui broyant les os, selon la parole que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui avait dite. '
  - type: usfm
    marker: v
