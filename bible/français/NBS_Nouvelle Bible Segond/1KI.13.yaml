document_id: 1KI.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un homme de Dieu intervient à Beth-El
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'homme de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Cf. 12.28-33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par la parole du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avec une parole du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Un homme de Dieu arriva de Juda à Beth-El, par la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', pendant que Jéroboam se tenait debout devant l''autel pour offrir de l''encens. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Josias
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : roi de Juda de 640 à 609 (2R 21.24), soit environ trois siècles plus tard. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on fera brûler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' portent'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il fera brûler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2R 23.15s.'
    marker-yv: yv-n
  - type: text
    text: 'Il cria contre l''autel, par la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Autel ! autel ! ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Il naîtra un fils à la maison de David ; son nom sera Josias ; il sacrifiera sur toi les prêtres des hauts lieux qui offrent de l''encens, et on fera brûler sur toi des ossements humains ! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'présage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 5 ; le terme hébreu est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prodige
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 7.9 ; Dt 6.22 ; 13.2 ; Jl 3.3 ; Né 9.10 etc. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: indiquant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'autel se fendra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cendres grasses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu employé ici et v. 5 ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: déshen
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même mot en Lv 1.16 ; 4.12 ; 6.3s ; Jr 31.40) désigne les cendres grasses, résultat de la combustion des graisses des holocaustes (cf. Lv 1.8-13 ; 4.8ss etc. ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se répandront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la graisse appartenant à Dieu (cf. Lv 3.16), la répandre est un acte de profanation.'
    marker-yv: yv-n
  - type: text
    text: 'Ce même jour, il donna un présage, en disant : Tel est le présage indiquant que c''est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' qui parle : l''autel se fendra, et les cendres grasses qui sont dessus se répandront.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fut paralysée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se dessécha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; LXX a ici le même verbe grec que Mc 3.1.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le roi Jéroboam entendit la parole que l''homme de Dieu avait criée contre l''autel de Beth-El, il leva la main de dessus l''autel en disant : « Saisissez-le ! » Alors la main que Jéroboam avait levée contre lui fut paralysée ; il ne put la ramener à lui. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: L'autel se fendit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'homme de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1+ ; 12.22
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'L''autel se fendit, et les cendres grasses qui étaient dessus se répandirent, selon le présage qu''avait donné l''homme de Dieu, par la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'homme de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 5+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Apaise donc le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: adoucis, je te prie, la face de YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 32.11+ ; 1S 13.12 ; 2R 13.4 ; Jr 26.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et prie pour moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : absent de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fut de nouveau comme par le passé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 12.13.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi dit à l''homme de Dieu : Apaise donc le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, et prie pour moi, afin que ma main me revienne. L''homme de Dieu apaisa le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et la main du roi lui revint ; elle fut de nouveau comme par le passé. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour te restaurer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même verbe en Gn 18.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jg 19.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',8 ; Ps 104.15.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi dit à l''homme de Dieu : Entre avec moi dans la maison pour te restaurer, et je te donnerai un cadeau. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la moitié de ta maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mc 6.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je ne mangerai rien…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je ne mangerai pas de pain et je ne boirai pas d'eau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite. Ce refus signifie la rupture entre Israël et le Dieu de Juda (v. 1) ; mais la parole divine sera encore accordée aux prophètes d''Israël (v. 20).'
    marker-yv: yv-n
  - type: text
    text: 'L''homme de Dieu dit au roi : Quand tu me donnerais la moitié de ta maison, je n''entrerais pas chez toi. Je ne mangerai rien, je ne boirai rien en ce lieu, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: car cet ordre…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 22.'
    marker-yv: yv-n
  - type: text
    text: 'car cet ordre m''a été donné, par la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : « Tu ne mangeras rien, tu ne boiras rien, tu ne prendras pas à ton retour le chemin par lequel tu seras allé. » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il s'en alla par un autre chemin, il ne prit pas à son retour le chemin par lequel il était venu à Beth-El.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'homme de Dieu désobéit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: L'un de ses fils vint lui raconter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son fils vint et lui raconta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' ont le pluriel '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses fils vinrent et lui racontèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui paraît plus cohérent avec la suite du récit, qui est au pluriel.'
    marker-yv: yv-n
  - type: text
    text: 'Or il y avait un vieux prophète qui habitait à Beth-El. L''un de ses fils vint lui raconter tout ce que l''homme de Dieu avait fait ce jour-là à Beth-El, les paroles qu''il avait dites au roi, et ils les racontèrent à leur père. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ses fils avaient vu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : versions anciennes '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses fils lui montrèrent.
    marker-yv: yv-n
  - type: text
    text: 'Leur père leur dit : Par quel chemin s''en est-il allé ? Ses fils avaient vu par quel chemin s''en était allé l''homme de Dieu qui était venu de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors il dit à ses fils : Sellez-moi l''âne. Ils lui sellèrent l''âne, et il monta dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un térébinthe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le térébinthe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains arbres, comme le térébinthe, peuvent marquer des lieux sacrés ; cf. Gn 35.8 ; Jg 4.5 ; 1S 10.3. Voir aussi '
      - type: usfm
        marker: w
        children:
        - type: text
          text: haut
      - type: text
        text: ' lieu.'
    marker-yv: yv-n
  - type: text
    text: 'Il suivit l''homme de Dieu et le trouva assis sous un térébinthe. Il lui dit : Est-ce toi, l''homme de Dieu qui est venu de Juda ? Il répondit : C''est moi ! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Viens manger…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'viens… et mange du pain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la nourriture
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Cf. v. 18s.
    marker-yv: yv-n
  - type: text
    text: 'Alors il lui dit : Viens manger avec moi à la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ni entrer chez toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : absent de LXX.'
    marker-yv: yv-n
  - type: text
    text: 'Mais il répondit : Je ne peux ni revenir avec toi, ni entrer chez toi. Je ne mangerai rien, je ne boirai rien avec toi en ce lieu ; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'car il m''a été dit, par la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : « Là, tu ne mangeras rien, tu ne boiras rien, et tu ne prendras pas à ton retour le chemin par lequel tu seras allé. » '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
