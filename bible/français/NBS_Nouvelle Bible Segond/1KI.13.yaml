      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Puis il dit à ses fils : Sellez-moi l''âne. Ils le sellèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il partit et trouva le cadavre jeté sur le chemin, ainsi que l''âne et le lion qui se tenaient à côté du cadavre. Le lion n''avait pas dévoré le cadavre et n''avait pas broyé les os de l''âne. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
