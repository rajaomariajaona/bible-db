document_id: 1KI.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un homme de Dieu intervient à Beth-El
  - type: text
    content: ' '
  - type: note
    content: 'homme de Dieu 12.22n. Cf. 12.28-33. –  par la parole du Seigneur  : autre traduction avec une parole du Seigneur.'
  - type: text
    content: 'Un homme de Dieu arriva de Juda à Beth-El, par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', pendant que Jéroboam se tenait debout devant l''autel pour offrir de l''encens. '
  '10':
  - type: text
    content: Il s'en alla par un autre chemin, il ne prit pas à son retour le chemin par lequel il était venu à Beth-El.
  - type: heading
    content: L'homme de Dieu désobéit
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'L''un de ses fils vint lui raconter  : litt. son fils vint et lui raconta . LXX, Syr et Vg ont le pluriel ses fils vinrent et lui racontèrent , ce qui paraît plus cohérent avec la suite du récit, qui est au pluriel.'
  - type: text
    content: 'Or il y avait un vieux prophète qui habitait à Beth-El. L''un de ses fils vint lui raconter tout ce que l''homme de Dieu avait fait ce jour-là à Beth-El, les paroles qu''il avait dites au roi, et ils les racontèrent à leur père. '
  '12':
  - type: note
    content: 'Ses fils avaient vu  : versions anciennes ses fils lui montrèrent.'
  - type: text
    content: 'Leur père leur dit : Par quel chemin s''en est-il allé ? Ses fils avaient vu par quel chemin s''en était allé l''homme de Dieu qui était venu de Juda. '
  '13':
  - type: text
    content: 'Alors il dit à ses fils : Sellez-moi l''âne. Ils lui sellèrent l''âne, et il monta dessus. '
  '14':
  - type: note
    content: 'un térébinthe  : litt. le térébinthe  ; certains arbres, comme le térébinthe, peuvent marquer des lieux sacrés ; cf. Gn 35.8 ; Jg 4.5 ; 1S 10.3. Voir aussi haut lieu.'
  - type: text
    content: 'Il suivit l''homme de Dieu et le trouva assis sous un térébinthe. Il lui dit : Est-ce toi, l''homme de Dieu qui est venu de Juda ? Il répondit : C''est moi ! '
  '15':
  - type: note
    content: 'Viens manger…  : litt. viens… et mange du pain (ou de la nourriture). Cf. v. 18s.'
  - type: text
    content: 'Alors il lui dit : Viens manger avec moi à la maison. '
  '16':
  - type: note
    content: 'ni entrer chez toi  : absent de LXX.'
  - type: text
    content: 'Mais il répondit : Je ne peux ni revenir avec toi, ni entrer chez toi. Je ne mangerai rien, je ne boirai rien avec toi en ce lieu ; '
  '17':
  - type: text
    content: 'car il m''a été dit, par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : « Là, tu ne mangeras rien, tu ne boiras rien, et tu ne prendras pas à ton retour le chemin par lequel tu seras allé. » '
  '18':
  - type: note
    content: 'prophète  ; 20.35+ ; Am 7.14n. –  un messager ou un ange. –  par la parole du Seigneur v. 32. –  qu''il mange…  : litt. qu''il mange du pain et boive de l''eau, de même au v. 19. –  Il lui mentait  : cf. 22.22s.'
  - type: text
    content: 'Il lui dit alors : Moi aussi, je suis prophète comme toi ; c''est un messager qui m''a dit, par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : « Ramène-le chez toi, qu''il mange et qu''il boive. » Il lui mentait. '
  '19':
  - type: note
    content: 'L''homme de Dieu revint  : litt. il retourna. Cf. v. 9,15s.'
  - type: text
    content: L'homme de Dieu revint avec lui pour manger et boire.
  - type: heading
    content: Mort de l'homme de Dieu
  '2':
  - type: note
    content: 'Josias  : roi de Juda de 640 à 609 (2R 21.24), soit environ trois siècles plus tard. –  on fera brûler  : Tg, Syr et Vg portent  : il fera brûler  ; cf. 2R 23.15s.'
  - type: text
    content: 'Il cria contre l''autel, par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Autel ! autel ! ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Il naîtra un fils à la maison de David ; son nom sera Josias ; il sacrifiera sur toi les prêtres des hauts lieux qui offrent de l''encens, et on fera brûler sur toi des ossements humains ! '
  '20':
  - type: text
    content: ' '
  - type: note
    content: V. 8n.
  - type: text
    content: 'Comme ils étaient assis à table, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint au prophète qui l''avait ramené, '
  '21':
  - type: note
    content: 'il cria  : cf. v. 2. –  homme de Dieu v. 5+. –  aux ordres  : litt. à la bouche, de même au v. 26.'
  - type: text
    content: 'et il cria vers l''homme de Dieu qui était venu de Juda : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Parce que tu as été rebelle aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et que tu n''as pas observé le commandement que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''avait donné, '
  '22':
  - type: note
    content: 'parce que tu es revenu…  : cf. v. 9. –  dans le tombeau de tes pères  : cf. Gn 23 ; 49.30 ; 2R 22.20 ; Es 14.19 ; Jr 8.1s ; Né 2.5.'
  - type: text
    content: 'parce que tu es revenu et que tu as mangé et bu au lieu dont il t''avait dit : « Tu n''y mangeras rien, tu n''y boiras rien », ton cadavre n''entrera pas dans le tombeau de tes pères.'
  '23':
  - type: text
    content: 'Après qu''il eut mangé et bu, il sella l''âne pour le prophète qu''il avait ramené, '
  '24':
  - type: note
    content: 'il rencontra un lion  : litt. un lion le trouva  ; cf. 20.36 ; 2R 17.25 ; voir aussi Jg 14.5 ; 2S 23.20 ; Jr 4.7 ; 49.19 ; Ps 17.12 ; Pr 22.13. –  tua  : litt. fit mourir.'
  - type: text
    content: 'et celui-ci s''en alla ; en chemin, il rencontra un lion, qui le tua. Son cadavre fut jeté sur le chemin : l''âne se tenait à côté de lui, et le lion aussi se tenait à côté du cadavre. '
  '25':
  - type: note
    content: 'Des passants  : litt. des hommes passant. –  la ville  : Beth-El, de même au v. 29.'
  - type: text
    content: 'Des passants virent le cadavre jeté sur le chemin et le lion se tenant à côté du cadavre ; ils en parlèrent à leur arrivée dans la ville où habitait le vieux prophète. '
  '26':
  - type: note
    content: 'aux ordres v. 21n. –  en lui broyant les os  : cf. v. 28 ; Es 38.13. –  selon la parole  : cf. v. 21s.'
  - type: text
    content: 'Quand le prophète qui l''avait ramené du chemin l''apprit, il dit : C''est l''homme de Dieu qui a été rebelle aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a livré au lion qui l''a tué en lui broyant les os, selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait dite. '
  '27':
  - type: text
    content: 'Puis il dit à ses fils : Sellez-moi l''âne. Ils le sellèrent. '
  '28':
  - type: text
    content: 'Il partit et trouva le cadavre jeté sur le chemin, ainsi que l''âne et le lion qui se tenaient à côté du cadavre. Le lion n''avait pas dévoré le cadavre et n''avait pas broyé les os de l''âne. '
  '29':
  - type: note
    content: la ville v. 25n.
  - type: text
    content: 'Le prophète souleva le cadavre de l''homme de Dieu, le déposa sur l''âne et le ramena. Le vieux prophète rentra dans la ville pour se lamenter et l''ensevelir. '
  '3':
  - type: note
    content: 'présage v. 5 ; le terme hébreu est aussi traduit par prodige  ; cf. Ex 7.9 ; Dt 6.22 ; 13.2 ; Jl 3.3 ; Né 9.10 etc. –  indiquant  : sous-entendu dans le texte. –  l''autel se fendra  : cf. v. 5. –  cendres grasses  : le terme hébreu employé ici et v. 5 (déshen, même mot en Lv 1.16 ; 4.12 ; 6.3s ; Jr 31.40) désigne les cendres grasses, résultat de la combustion des graisses des holocaustes (cf. Lv 1.8-13 ; 4.8ss etc. ; voir sacrifices). –  se répandront  : la graisse appartenant à Dieu (cf. Lv 3.16), la répandre est un acte de profanation.'
  - type: text
    content: 'Ce même jour, il donna un présage, en disant : Tel est le présage indiquant que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle : l''autel se fendra, et les cendres grasses qui sont dessus se répandront.'
  '30':
  - type: note
    content: 'lamentation  : elle faisait partie des rites funéraires ; cf. Gn 50.10. –  « Quel malheur, mon frère ! » peut-être le début ou le refrain d''une lamentation connue ; cf. Jr 22.18 ; 34.5.'
  - type: text
    content: 'Il déposa son cadavre dans son tombeau, et on fit sur lui la lamentation « Quel malheur, mon frère ! ». '
  '31':
  - type: note
    content: 'mes ossements à côté de ses ossements  : LXX C''est à côté de ses ossements que vous me déposerez afin que mes ossements soient sauvés avec ses ossements (cf. 2R 23.16+ss).'
  - type: text
    content: 'Après l''avoir enseveli, il dit à ses fils : Quand je serai mort, vous m''ensevelirez dans le tombeau où est enseveli l''homme de Dieu ; déposez mes ossements à côté de ses ossements. '
  '32':
  - type: note
    content: 'elle se réalisera  : litt. elle sera. –  par la parole du Seigneur v. 18. –  Samarie ne fut construite et ne devint capitale du royaume qu''à partir d''Omri (c.-à-d. environ un demi-siècle plus tard, cf. 16.24). Le nom désigne ici, comme souvent, l''ensemble des dix tribus séparées ; cf. Ez 16.46 ; Os 7.1.'
  - type: text
    content: 'Car elle se réalisera, la parole qu''il a criée, par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', contre l''autel de Beth-El et contre toutes les maisons des hauts lieux qui sont dans les villes de Samarie.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'nommer prêtre de haut lieu n''importe qui  : cf. 12.31n. –  les investissait Ex 28.41n.'
  - type: text
    content: 'Après cela, Jéroboam ne revint pas de sa voie mauvaise. Il se remit à nommer prêtre de haut lieu n''importe qui ; tous ceux qui le désiraient, il les investissait comme prêtres des hauts lieux. '
  '34':
  - type: note
    content: 'C''est là le péché  : cf. 12.30. –  de la terre  : litt. de dessus la face du sol  ; cf. Gn 2.5n.'
  - type: text
    content: C'est là le péché de la maison de Jéroboam ; c'est pour cela qu'elle a été détruite et qu'elle a disparu de la terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'fut paralysée  : litt. se dessécha  ; LXX a ici le même verbe grec que Mc 3.1.'
  - type: text
    content: 'Lorsque le roi Jéroboam entendit la parole que l''homme de Dieu avait criée contre l''autel de Beth-El, il leva la main de dessus l''autel en disant : « Saisissez-le ! » Alors la main que Jéroboam avait levée contre lui fut paralysée ; il ne put la ramener à lui. '
  '5':
  - type: note
    content: 'L''autel se fendit…  : cf. v. 3n. –  homme de Dieu v. 1+ ; 12.22n.'
  - type: text
    content: 'L''autel se fendit, et les cendres grasses qui étaient dessus se répandirent, selon le présage qu''avait donné l''homme de Dieu, par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'homme de Dieu v. 5+. –  Apaise donc le Seigneur  : litt. adoucis, je te prie, la face de YHWH  ; cf. Ex 32.11+ ; 1S 13.12 ; 2R 13.4 ; Jr 26.19. –  et prie pour moi  : absent de LXX. –  fut de nouveau comme par le passé  : cf. Mt 12.13.'
  - type: text
    content: 'Le roi dit à l''homme de Dieu : Apaise donc le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, et prie pour moi, afin que ma main me revienne. L''homme de Dieu apaisa le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et la main du roi lui revint ; elle fut de nouveau comme par le passé. '
  '7':
  - type: note
    content: 'pour te restaurer  : même verbe en Gn 18.5n  ; Jg 19.5n,8 ; Ps 104.15.'
  - type: text
    content: 'Le roi dit à l''homme de Dieu : Entre avec moi dans la maison pour te restaurer, et je te donnerai un cadeau. '
  '8':
  - type: note
    content: 'la moitié de ta maison  : cf. Mc 6.23. –  Je ne mangerai rien…  : litt. je ne mangerai pas de pain et je ne boirai pas d''eau, de même dans la suite. Ce refus signifie la rupture entre Israël et le Dieu de Juda (v. 1) ; mais la parole divine sera encore accordée aux prophètes d''Israël (v. 20).'
  - type: text
    content: 'L''homme de Dieu dit au roi : Quand tu me donnerais la moitié de ta maison, je n''entrerais pas chez toi. Je ne mangerai rien, je ne boirai rien en ce lieu, '
  '9':
  - type: note
    content: 'car cet ordre…  : cf. v. 22.'
  - type: text
    content: 'car cet ordre m''a été donné, par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : « Tu ne mangeras rien, tu ne boiras rien, tu ne prendras pas à ton retour le chemin par lequel tu seras allé. » '
