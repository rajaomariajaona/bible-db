      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Après cela, Jéroboam ne revint pas de sa voie mauvaise. Il se remit à nommer prêtre de haut lieu n''importe qui ; tous ceux qui le désiraient, il les investissait comme prêtres des hauts lieux. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
