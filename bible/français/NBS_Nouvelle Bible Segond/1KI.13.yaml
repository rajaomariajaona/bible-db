    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lamentation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : elle faisait partie des rites funéraires ; cf. Gn 50.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: '« Quel malheur, mon frère ! » '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: peut-être le début ou le refrain d'une lamentation connue ; cf. Jr 22.18 ; 34.5.
    marker-yv: yv-n
  - type: text
    text: 'Il déposa son cadavre dans son tombeau, et on fit sur lui la lamentation « Quel malheur, mon frère ! ». '
  - type: usfm
    marker: v
    metadata:
      v: '31'
