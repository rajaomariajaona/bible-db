    marker-yv: yv-n
  - type: text
    text: 'Les filles de Tselophhad ont raison. Tu leur donneras une propriété comme patrimoine au milieu des frères de leur père, et c''est à elles que tu feras passer le patrimoine de leur père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu diras aux Israélites : Lorsqu''un homme mourra sans laisser de fils, vous ferez passer son patrimoine à sa fille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à ses frères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à son frère.
    marker-yv: yv-n
  - type: text
    text: 'S''il n''a pas de fille, vous donnerez son patrimoine à ses frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'S''il n''a pas de frères, vous donnerez son patrimoine aux frères de son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au plus proche parent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir Lv 18.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une prescription de droit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 35.29.
    marker-yv: yv-n
  - type: text
    text: 'Si son père n''a pas de frères, vous donnerez son patrimoine au plus proche parent de son clan : c''est lui qui en prendra possession. Ce sera pour les Israélites une prescription de droit, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''a ordonné à Moïse.'
- type: usfm
  marker: s1
