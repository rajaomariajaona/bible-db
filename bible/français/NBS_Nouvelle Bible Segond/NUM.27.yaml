    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 20.12s,24 ; Dt 32.51. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mes ordres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
