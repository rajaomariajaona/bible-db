      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu le regarderas ; mais toi aussi, tu seras réuni aux tiens, comme Aaron, ton frère, l''a été, '
  - type: usfm
    marker: vlbl
