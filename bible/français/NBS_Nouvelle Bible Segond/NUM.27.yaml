      - type: text
        text: '27.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 36.2-12 ; Jos 17.3-6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ont raison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parlent bien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: correctement
    - type: usfm
      marker: ft
      children:
      - type: text
