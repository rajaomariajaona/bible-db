        text: '  : le nom est apparenté au verbe traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous n''avez pas montré ma '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sainteté
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
