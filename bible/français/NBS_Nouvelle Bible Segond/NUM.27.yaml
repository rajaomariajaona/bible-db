  - type: text
    text: 'Alors les filles de Tselophhad, fils de Hépher, fils de Galaad, fils de Makir, fils de Manassé, des clans de Manassé, fils de Joseph, se présentèrent. Voici leurs noms : Mahla, Noa, Hogla, Milka et Tirtsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eléazar, le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 17.2+ ; 20.28.
    marker-yv: yv-n
  - type: text
    text: 'Elles se présentèrent devant Moïse, devant Eléazar, le prêtre, devant les princes et toute la communauté, à l''entrée de la tente de la Rencontre. Elles dirent : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il n'était pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. chap. 16 ; on en a déduit que dans certains cas (blasphème, etc.) les descendants de condamnés à mort étaient privés de leur héritage (cf. 1R 21). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'son propre '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.28ss ; 26.64s.'
    marker-yv: yv-n
  - type: text
    text: 'Notre père est mort dans le désert ; il n''était pas au milieu de la communauté qui se ligua contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', de la communauté de Coré : il est mort pour son propre péché, et il n''avait pas de fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Dt 21.15ss ; voir aussi Lv 25 ; Dt 25.5ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 26.53'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; en général, ce sont les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui reçoivent le nom et l''héritage du père ; aux termes de ce chapitre, en l''absence de fils les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'filles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pourront les recevoir pour les transmettre à leur mari (cf. Esd 2.61 ; Né 7.63) et à leurs enfants, dans des conditions qui seront encore précisées au chap. 36. Une loi analogue est connue dès la plus haute antiquité en Mésopotamie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de son clan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du milieu de son clan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au milieu des frères…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. au même titre qu''eux.'
    marker-yv: yv-n
  - type: text
    text: Pourquoi le nom de notre père serait-il retranché de son clan ? Il n'a pas de fils ! Donne-nous une propriété au milieu des frères de notre père !
- type: usfm
  marker: p
