document_id: NUM.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le droit d'héritage des femmes
  - type: text
    content: ' '
  - type: note
    content: 'les filles de Tselophhad 26.33 ; 36.2-12 ; Jos 17.3-6. –  fils de Manassé  : précision omise par LXX  ; cf. 26.28ss ; sur Makir , voir 32.39 ; 36.1 ; Gn 50.23n  ; Jg 5.14n.'
  - type: text
    content: 'Alors les filles de Tselophhad, fils de Hépher, fils de Galaad, fils de Makir, fils de Manassé, des clans de Manassé, fils de Joseph, se présentèrent. Voici leurs noms : Mahla, Noa, Hogla, Milka et Tirtsa. '
  '10':
  - type: text
    content: 'S''il n''a pas de frères, vous donnerez son patrimoine aux frères de son père. '
  '11':
  - type: note
    content: 'au plus proche parent  : voir Lv 18.6n. –  une prescription de droit 35.29.'
  - type: text
    content: 'Si son père n''a pas de frères, vous donnerez son patrimoine au plus proche parent de son clan : c''est lui qui en prendra possession. Ce sera pour les Israélites une prescription de droit, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a ordonné à Moïse.'
  - type: heading
    content: Josué désigné pour succéder à Moïse
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 20.22ss ; Dt 3.27s ; 31.14s,23 ; 32.48ss ; 34.1ss. –  Abarim  : nom des hauts-plateaux à l''est ( de l''autre côté , selon le sens du mot hébreu) du Jourdain et de la mer Morte ; cf. 21.11n,20n  ; 33.47 ; LXX et Dt 32.49 précisent le mont Nebo.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Monte dans cette montagne des Abarim, et regarde le pays que je donne aux Israélites. '
  '13':
  - type: note
    content: réuni aux tiens 20.24+ ; 31.2 ; Gn 25.8n.
  - type: text
    content: 'Tu le regarderas ; mais toi aussi, tu seras réuni aux tiens, comme Aaron, ton frère, l''a été, '
  '14':
  - type: note
    content: 'Cf. 20.12s,24 ; Dt 32.51. –  mes ordres  : litt. ma bouche. –  m''a cherché querelle et Meriba sont respectivement la traduction et la transcription du même mot hébreu ; celui-ci fait également assonance avec le verbe traduit par vous avez été rebelles  ; cf. 13.21n,26n  ; 20.1n,13n. –  Qadesh  : le nom est apparenté au verbe traduit par vous n''avez pas montré ma sainteté. –  « Le Saint » ou « Le Sacré ».'
  - type: text
    content: 'parce que vous avez été rebelles à mes ordres dans le désert de Tsîn, lorsque la communauté m''a cherché querelle : vous n''avez pas montré ma sainteté sous leurs yeux, à propos des eaux – des eaux de Meriba (« Querelle ») de Qadesh (« Le Saint »), dans le désert de Tsîn.'
  '15':
  - type: text
    content: 'Moïse dit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  '16':
  - type: note
    content: 'Cf. Ac 1.24s ; 6.3. –  le Dieu du souffle (ou de l''Esprit) …  : cf. v. 18 ; voir 16.22n.'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu du souffle de tout être, nomme à la tête de la communauté un homme '
  '17':
  - type: note
    content: 'qui parte en campagne…  : litt. qui sorte devant eux et qui rentre devant eux, qui les fasse sortir et qui les fasse rentrer  ; cette expression est souvent à prendre dans un sens militaire (partir en campagne et revenir victorieux), cf. v. 21 ; 1S 18.16 ; 1R 3.7n  ; voir aussi Jn 10.9. –  comme un troupeau (litt. du petit bétail) … 1R 22.17+ ; Ez 34.5,11ss ; Mc 6.34/  ; Jn 10.12.'
  - type: text
    content: 'qui parte en campagne devant eux et qui en revienne devant eux, qui les mène en campagne et qui les en ramène, pour que la communauté du '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne soit pas comme un troupeau qui n''a pas de berger.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 20.25ss ; Dt 34.9 ; voir aussi Ac 6.3,5. –  Josué 11.28 ; 13.16n  ; 26.65 ; Ex 24.13 ; Dt 3.28 ; 31.1-8 ; Jos 1.1ss. –  du souffle  : autres traductions le Souffle ; l''Esprit  ; cf. 11.17ss ; Dt 34.9. –  tu poseras la main sur lui  : cf. v. 23 ; 8.10n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Prends Josué, fils de Noun, homme en qui il y a du souffle ; tu poseras la main sur lui. '
  '19':
  - type: note
    content: 'Eléazar, le prêtre  : cf. 20.28. –  tu lui donneras des ordres  : autre traduction tu l''investiras, même possibilité au v. 23 (le même verbe est traduit par ordonner au v. 22).'
  - type: text
    content: 'Tu le placeras debout devant Eléazar, le prêtre, et devant toute la communauté, et tu lui donneras des ordres sous leurs yeux. '
  '2':
  - type: note
    content: Eléazar, le prêtre 17.2+ ; 20.28.
  - type: text
    content: 'Elles se présentèrent devant Moïse, devant Eléazar, le prêtre, devant les princes et toute la communauté, à l''entrée de la tente de la Rencontre. Elles dirent : '
  '20':
  - type: note
    content: 'Tu lui donneras de ta dignité  : autre traduction tu lui communiqueras un peu de ta puissance  ; plusieurs versions anciennes ont traduit ta gloire  ; cf. 11.17,25 ; 12.6ss ; Ex 34.35. –  l''écoute ou lui obéisse  ; cf. Dt 34.9.'
  - type: text
    content: 'Tu lui donneras de ta dignité, afin que toute la communauté des Israélites l''écoute. '
  '21':
  - type: note
    content: 'de l''ourim ou des ourim, Ex 28.30n  ; cf. Dt 33.8ss ; Jg 18.5 ; 1S 22.9s ; 28.6. –  sur ses ordres  : litt. sur sa bouche  ; formulation ambiguë dans le texte ; on pourrait comprendre l''ordre d''Eléazar, du jugement, de l''ourim ou du Seigneur. –  ils partiront en campagne / en reviendront  : litt. ils sortiront / rentreront, cf. v. 17n  ; Smr et Vg ont lu le singulier, s''appliquant à Josué (= lui).'
  - type: text
    content: 'Il se tiendra devant Eléazar, le prêtre, qui demandera pour lui le jugement de l''ourim, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; c''est sur ses ordres qu''ils partiront en campagne et qu''ils en reviendront, lui et tous les Israélites avec lui, toute la communauté. '
  '22':
  - type: text
    content: 'Moïse fit ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait ordonné. Il prit Josué et le plaça debout devant Eléazar, le prêtre, et devant toute la communauté. '
  '23':
  - type: note
    content: Cf. v. 18 ; 8.10n  ; Dt 31.23 ; 34.9.
  - type: text
    content: 'Il posa les mains sur lui et lui donna des ordres, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait dit par l''intermédiaire de Moïse.'
  '3':
  - type: note
    content: 'il n''était pas…  : cf. chap. 16 ; on en a déduit que dans certains cas (blasphème, etc.) les descendants de condamnés à mort étaient privés de leur héritage (cf. 1R 21). –  son propre péché  : cf. 14.28ss ; 26.64s.'
  - type: text
    content: 'Notre père est mort dans le désert ; il n''était pas au milieu de la communauté qui se ligua contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', de la communauté de Coré : il est mort pour son propre péché, et il n''avait pas de fils. '
  '4':
  - type: note
    content: 'Cf. Dt 21.15ss ; voir aussi Lv 25 ; Dt 25.5ss. –  le nom  : cf. 26.53n  ; en général, ce sont les fils qui reçoivent le nom et l''héritage du père ; aux termes de ce chapitre, en l''absence de fils les filles pourront les recevoir pour les transmettre à leur mari (cf. Esd 2.61 ; Né 7.63) et à leurs enfants, dans des conditions qui seront encore précisées au chap. 36. Une loi analogue est connue dès la plus haute antiquité en Mésopotamie. –  de son clan  : litt. du milieu de son clan. –  au milieu des frères…  : c.-à-d. au même titre qu''eux.'
  - type: text
    content: Pourquoi le nom de notre père serait-il retranché de son clan ? Il n'a pas de fils ! Donne-nous une propriété au milieu des frères de notre père !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'leur cause  : le même mot est aussi traduit par droit, règle ou jugement  ; il peut aussi avoir le sens de coutume  ; cf. 9.8 ; voir loi.'
  - type: text
    content: 'Moïse présenta leur cause devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '6':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '7':
  - type: note
    content: 'Cf. 36.2-12 ; Jos 17.3-6. –  ont raison  : litt. parlent bien (ou correctement) ; cf. 36.5.'
  - type: text
    content: 'Les filles de Tselophhad ont raison. Tu leur donneras une propriété comme patrimoine au milieu des frères de leur père, et c''est à elles que tu feras passer le patrimoine de leur père. '
  '8':
  - type: text
    content: 'Tu diras aux Israélites : Lorsqu''un homme mourra sans laisser de fils, vous ferez passer son patrimoine à sa fille. '
  '9':
  - type: note
    content: 'à ses frères  : LXX à son frère.'
  - type: text
    content: 'S''il n''a pas de fille, vous donnerez son patrimoine à ses frères. '
