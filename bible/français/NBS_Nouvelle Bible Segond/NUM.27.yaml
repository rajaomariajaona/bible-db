    marker-yv: yv-n
  - type: text
    text: 'parce que vous avez été rebelles à mes ordres dans le désert de Tsîn, lorsque la communauté m''a cherché querelle : vous n''avez pas montré ma sainteté sous leurs yeux, à propos des eaux – des eaux de Meriba (« Querelle ») de Qadesh (« Le Saint »), dans le désert de Tsîn.'
