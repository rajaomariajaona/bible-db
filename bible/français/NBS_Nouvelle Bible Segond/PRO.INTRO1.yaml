document_id: PRO.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Le titre de ce livre correspond traditionnellement au premier mot du texte : '
  - type: text
    content: Maximes
  - type: text
    content: ' (= « proverbes ») '
  - type: text
    content: de Salomon…
  - type: text
    content: ' (1.1n). Le mot hébreu '
  - type: text
    content: mashal,
  - type: text
    content: ' traduit en l''occurrence par « maxime », couvre dans la Bible une gamme étendue de genres littéraires ; c''est lui qui est rendu par « fable » en Ezéchiel 17.2 ; 24.3 ; les allégories, prosopopées, satires, épigrammes sont de son ressort. Il peut s''appliquer à des '
  - type: text
    content: poèmes
  - type: text
    content: ' d''envergure, tel le plaidoyer de Job (Jb 27.1 ; 29.1) ou les oracles de Balaam (Nb 23.7,18). Mais le '
  - type: text
    content: mashal
  - type: text
    content: ' le plus courant est la formule brève, parfois imagée, souvent elliptique, qui constitue l''élément de base de la sagesse antique (voir « La littérature de sagesse », p.${Xsagesse}) et qui fait l''essentiel du livre des Proverbes.'
  - type: text
    content: Une collection de collections
  - type: text
    content: 'L''ouvrage se présente en effet comme une collection de maximes précédée d''un '
  - type: text
    content: prologue
  - type: text
    content: ' développé (1–9) où alternent la forme habituelle de l''instruction paternelle ou magistrale ('
  - type: text
    content: mon fils
  - type: text
    content: ' — expression qui peut aussi s''adresser à l''élève ou au disciple, 1.8-19 ; 2.1–7.27) et celle, plus originale, de l''appel lancé à l''homme par une Sagesse personnifiée (1.20-33 ; 8.1–9.18).'
  - type: text
    content: 'Les premières lignes du livre en indiquent le propos : '
  - type: text
    content: pour connaître la sagesse… pour comprendre…
  - type: text
    content: ' Elles s''achèvent (1.7) par la première mention du '
  - type: text
    content: principe fondamental
  - type: text
    content: ' que l''on retrouvera vers la fin du grand prologue (9.10) : '
  - type: text
    content: la crainte du Seigneur
  - type: text
    content: ' (YHWH) '
  - type: text
    content: est le commencement de la connaissance
  - type: text
    content: .
  - type: text
    content: 'Les maximes de la '
  - type: text
    content: grande collection
  - type: text
    content: ' qui s''ouvre au chapitre 10 sont présentées sans ordre apparent. Un certain regroupement par sujet ou par mot-clef apparaît quelquefois (maximes sur la parole en 10.10-21 ; sur YHWH, '
  - type: text
    content: le Seigneur,
  - type: text
    content: ' en 15.33–16.8 ; aux '
  - type: text
    content: rois
  - type: text
    content: ' en 16.9-15), mais il n''est jamais que partiel (voir les passages en question). Une présentation bien ordonnée et systématique aurait pu donner l''illusion d''une science qui maîtrise parfaitement le réel ; la présentation actuelle reflète mieux le caractère partiel et empirique de la sagesse des Proverbes.'
  - type: text
    content: 'A la collection principale, d''autres '
  - type: text
    content: collections plus réduites
  - type: text
    content: ' ont été ajoutées, signalées dans le texte par des titres distincts :'
  - type: text
    content: —
  - type: text
    content: Maximes de Salomon, transmises par les gens d'Ezéchias
  - type: text
    content: ' (25.1)'
  - type: text
    content: —
  - type: text
    content: Paroles d'Agour, fils de Yaqé
  - type: text
    content: ' (30.1)'
  - type: text
    content: —
  - type: text
    content: Paroles du roi Lemouel
  - type: text
    content: ' (31.1)'
  - type: text
    content: 'Il est fort probable que les formules de 22.17 et 24.23 signalent aussi des '
  - type: text
    content: collections distinctes
  - type: text
    content: '. Ces nouvelles collections ne sont pas seulement constituées de maximes, au sens restreint du terme (sentences brèves) ; on y trouve aussi des instructions plus développées : ainsi les conseils sur la manière de se tenir à table (23.1-8), les propos sur l''ivrognerie (23.29-35), ou la description du paresseux (24.30-33).'
  - type: text
    content: 'Le livre s''achève sur le portrait de la '
  - type: text
    content: femme de valeur
  - type: text
    content: ' (31.10-31), qui n''a pas l''allure, à première lecture, d''une conclusion définitive à l''enseignement sur la sagesse. Pourtant il couronne l''ouvrage dans sa composition finale. La femme '
  - type: text
    content: qui craint le Seigneur
  - type: text
    content: ' (31.30'
  - type: text
    content: n
  - type: text
    content: ') vient rappeler le principe fondamental de la sagesse selon le prologue (1.7 ; 9.10), principe qui encadre ainsi l''ensemble du livre. Le trait est plus frappant dans l''original hébreu, car la formule correspondant à '
  - type: text
    content: qui craint le Seigneur
  - type: text
    content: ' a exactement la même forme que celle qui est habituellement rendue par '
  - type: text
    content: crainte du Seigneur
  - type: text
    content: '. Alors que le prologue met en garde contre la folie en la présentant sous les traits d''une séductrice et personnifie la Sagesse comme une hôtesse généreuse (9.1-6), la fin du livre ne se contente pas d''illustrer l''éloge du travail et de la compétence. Le grand tableau semble proposer la Sagesse comme l''Epouse par excellence, admirable et sans prix ; il la révèle pour conclure sous son nom principal : '
  - type: text
    content: crainte du Seigneur
  - type: text
    content: .
  - type: text
    content: Sagesse de Salomon et sagesse égyptienne
  - type: text
    content: 'Les divers titres et sous-titres de l''œuvre renvoient surtout à '
  - type: text
    content: Salomon
  - type: text
    content: ', mentionné trois fois (1.1 ; 10.1 ; 25.1) ; ils lui attribuent ainsi la majeure partie de l''ouvrage. La sagesse de Salomon est aussi saluée par le livre des Rois (1R 5.9-14), qui lui prête trois mille maximes (ce chiffre dépasse très largement le nombre de sentences recueillies ici).'
  - type: text
    content: 'Les deux autres auteurs cités en tête des derniers chapitres (Agour et la mère du roi Lemouel) sont certainement des '
  - type: text
    content: non-Israélites
  - type: text
    content: ' (30.1n ; 31.1'
  - type: text
    content: n
  - type: text
    content: ) ; de plus, on a relevé des ressemblances particulièrement marquantes entre Proverbes 22.17
  - type: text
    content: n
  - type: text
    content: –24.22 et un texte égyptien (voir aussi 25.23
  - type: text
    content: n
  - type: text
    content: ), probablement antérieur à l'époque de Salomon, l'
  - type: text
    content: Instruction d'Aménémopé*
  - type: text
    content: '. La présence d''éléments « importés » à l''intérieur de la Bible hébraïque témoigne d''une certaine universalité de la sagesse. Ils n''y constituent d''ailleurs pas un corps étranger. La révélation affirme encore une fois la souveraineté absolue de Dieu en intégrant et en soumettant à la '
  - type: text
    content: crainte du Seigneur
  - type: text
    content: ' des apports qui ressortissent aux dons divins répandus sur l''humanité tout entière.'
  - type: text
    content: Simplicité sans simplisme
  - type: text
    content: Ouvrage de base
  - type: text
    content: ' de la sagesse, à la différence de Job ou de Qohéleth (l''Ecclésiaste) qui abordent de manière plus critique des problèmes aigus comme celui de la souffrance du juste ou de la condition humaine, le livre des Proverbes a pour mission première d''instruire celui qui manque encore d''expérience, le '
  - type: text
    content: jeune homme
  - type: text
    content: ', le '
  - type: text
    content: naïf
  - type: text
    content: ' (1.4).'
  - type: text
    content: 'Ce souci d''instruction élémentaire conduit à une '
  - type: text
    content: distinction tranchée
  - type: text
    content: ' entre le bien et le mal qu''accentue la brièveté propre à la maxime, peu propice à l''expression de la nuance. Ce type de sentence, dans sa forme la plus courante (parallélisme antithétique), oppose la bonne et la mauvaise conduite (voir 10.1ss) et associe régulièrement bien et bonheur, mal et malheur (voir 11.3-11). Ce contraste apparaît de manière plus nette encore dans le grand prologue (1–9) où les bienfaits de la sagesse sont opposés aux méfaits des mauvaises compagnies, de la paresse ou du libertinage. Il s''achève sur l''invitation des deux hôtesses, la sagesse qui prolonge la vie (9.11) et la folie dont les invités ne savent pas qu''ils sont '
  - type: text
    content: dans les profondeurs du séjour des morts
  - type: text
    content: ' (9.18).'
  - type: text
    content: 'Cette simplicité salutaire de l''enseignement sapiential ne doit pourtant pas être confondue avec une attitude simpliste. Le livre s''adresse aussi au sage : '
  - type: text
    content: que le sage écoute, et il augmentera son savoir
  - type: text
    content: ' (1.5, faisant suite au v. 4 citant le '
  - type: text
    content: naïf
  - type: text
    content: ' comme destinataire). L''opposition entre bien et mal n''est pas si évidente, les invités de la folie ne se rendent pas compte qu''ils sont chez les morts (9.18). La droiture n''est pas nécessairement une garantie d''abondance matérielle : '
  - type: text
    content: mieux vaut peu avec la justice que d'abondants revenus illicites
  - type: text
    content: ' (16.8). Les relations humaines peuvent poser des problèmes quasi insolubles, ainsi qu''en témoignent les deux maximes opposées sur l''attitude à tenir envers l''homme stupide (26.4s). Ainsi, tout en optant résolument pour un choix aussi clair que possible entre bien et mal, sagesse et folie, l''ouvrage tient compte de la '
  - type: text
    content: complexité
  - type: text
    content: ' d''une réalité que Dieu seul peut gérer parfaitement : '
  - type: text
    content: C'est le Seigneur qui dirige les pas de l'homme ; l'être humain, comment pourrait-il comprendre sa voie ?
  - type: text
    content: ' (20.24)'
  - type: text
    content: En fait, la sagesse des Proverbes est avant tout une science de l'
  - type: text
    content: observation
  - type: text
    content: ' (d''où l''importance qu''elle accorde à la perception des sens : il s''agit de regarder et d''écouter pour comprendre ; cf. 20.12). Elle s''efforce d''appréhender l''ordre du monde et de discerner ses causalités : tel acte entraîne normalement des conséquences heureuses pour son auteur et pour son entourage ; tel autre, des conséquences malheureuses. Dieu étant conçu comme garant de cet ordre, l''observation pouvait se figer en une théologie de la rétribution, qui affleure ici et là : Dieu récompense le juste et punit le méchant. C''est à cette doctrine, telle que la défendent les amis de Job, que ce dernier se heurtera. Il n''est toutefois pas sans intérêt de remarquer que les Proverbes eux-mêmes mettaient en garde contre les déductions théologiques hâtives : '
  - type: text
    content: à sept reprises le juste peut tomber
  - type: text
    content: ' (24.16).'
  - type: text
    content: Une crainte faite de respect
  - type: text
    content: 'Comme nous l''avons vu, la '
  - type: text
    content: crainte du Seigneur
  - type: text
    content: ' est posée comme principe de base de la sagesse (1.7 ; 9.10) et rappelée discrètement à la fin du livre (31.30).'
  - type: text
    content: 'L''emploi du '
  - type: text
    content: nom personnel
  - type: text
    content: ' de Dieu, YHWH (le '
  - type: text
    content: Seigneur
  - type: text
    content: ), nom caractéristique de sa révélation à Israël (Ex 6.2-3 ; Dt 6.4), au début d'un livre qui présente tant de points communs avec les productions des autres peuples, écarte la tentation d'une sagesse indépendante de la connaissance du vrai Dieu.
  - type: text
    content: 'Quant à la notion de '
  - type: text
    content: crainte
  - type: text
    content: ' de Dieu, elle dénote, pour la foi, la profondeur du sentiment et des convictions, le sérieux de la pratique, le principe même de l''obéissance. L''objet de la crainte est celui dont tout dépend et auquel tout se rapporte, dont la pensée impressionne et motive plus que toute autre. Craindre Dieu, ce n''est pas s''inquiéter sans cesse des réactions qu''il pourrait avoir. Craindre Dieu signifie que toute autre considération ou toute autre crainte doivent s''effacer devant lui : '
  - type: text
    content: pas de sagesse, pas d'intelligence, pas de conseil qui tienne devant le Seigneur !
  - type: text
    content: ' (21.30)'
