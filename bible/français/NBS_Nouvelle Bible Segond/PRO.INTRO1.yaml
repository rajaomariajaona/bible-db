document_id: PRO.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le titre de ce livre correspond traditionnellement au premier mot du texte : '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Maximes
  - type: text
    text: ' (= « proverbes ») '
  - type: usfm
    marker: it
    children:
    - type: text
      text: de Salomon…
  - type: text
    text: ' (1.1n). Le mot hébreu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mashal,
  - type: text
    text: ' traduit en l''occurrence par « maxime », couvre dans la Bible une gamme étendue de genres littéraires ; c''est lui qui est rendu par « fable » en Ezéchiel 17.2 ; 24.3 ; les allégories, prosopopées, satires, épigrammes sont de son ressort. Il peut s''appliquer à des '
  - type: usfm
    marker: it
    children:
    - type: text
      text: poèmes
  - type: text
    text: ' d''envergure, tel le plaidoyer de Job (Jb 27.1 ; 29.1) ou les oracles de Balaam (Nb 23.7,18). Mais le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mashal
  - type: text
    text: ' le plus courant est la formule brève, parfois imagée, souvent elliptique, qui constitue l''élément de base de la sagesse antique (voir « La littérature de sagesse », p.${Xsagesse}) et qui fait l''essentiel du livre des Proverbes.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Une collection de collections
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''ouvrage se présente en effet comme une collection de maximes précédée d''un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prologue
  - type: text
    text: ' développé (1–9) où alternent la forme habituelle de l''instruction paternelle ou magistrale ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: mon fils
  - type: text
    text: ' — expression qui peut aussi s''adresser à l''élève ou au disciple, 1.8-19 ; 2.1–7.27) et celle, plus originale, de l''appel lancé à l''homme par une Sagesse personnifiée (1.20-33 ; 8.1–9.18).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les premières lignes du livre en indiquent le propos : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pour connaître la sagesse… pour comprendre…
  - type: text
    text: ' Elles s''achèvent (1.7) par la première mention du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: principe fondamental
  - type: text
    text: ' que l''on retrouvera vers la fin du grand prologue (9.10) : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: la crainte du Seigneur
  - type: text
    text: ' (YHWH) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: est le commencement de la connaissance
  - type: text
    text: .
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les maximes de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: grande collection
  - type: text
    text: ' qui s''ouvre au chapitre 10 sont présentées sans ordre apparent. Un certain regroupement par sujet ou par mot-clef apparaît quelquefois (maximes sur la parole en 10.10-21 ; sur YHWH, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: le Seigneur,
  - type: text
    text: ' en 15.33–16.8 ; aux '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rois
  - type: text
    text: ' en 16.9-15), mais il n''est jamais que partiel (voir les passages en question). Une présentation bien ordonnée et systématique aurait pu donner l''illusion d''une science qui maîtrise parfaitement le réel ; la présentation actuelle reflète mieux le caractère partiel et empirique de la sagesse des Proverbes.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A la collection principale, d''autres '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: collections plus réduites
  - type: text
    text: ' ont été ajoutées, signalées dans le texte par des titres distincts :'
- type: usfm
  marker: im
  children:
  - type: text
    text: —
  - type: usfm
    marker: it
    children:
    - type: text
      text: Maximes de Salomon, transmises par les gens d'Ezéchias
  - type: text
    text: ' (25.1)'
- type: usfm
  marker: im
  children:
  - type: text
    text: —
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paroles d'Agour, fils de Yaqé
  - type: text
    text: ' (30.1)'
- type: usfm
  marker: im
  children:
  - type: text
    text: —
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paroles du roi Lemouel
  - type: text
    text: ' (31.1)'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Il est fort probable que les formules de 22.17 et 24.23 signalent aussi des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: collections distinctes
  - type: text
    text: '. Ces nouvelles collections ne sont pas seulement constituées de maximes, au sens restreint du terme (sentences brèves) ; on y trouve aussi des instructions plus développées : ainsi les conseils sur la manière de se tenir à table (23.1-8), les propos sur l''ivrognerie (23.29-35), ou la description du paresseux (24.30-33).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre s''achève sur le portrait de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: femme de valeur
  - type: text
    text: ' (31.10-31), qui n''a pas l''allure, à première lecture, d''une conclusion définitive à l''enseignement sur la sagesse. Pourtant il couronne l''ouvrage dans sa composition finale. La femme '
  - type: usfm
    marker: it
    children:
    - type: text
      text: qui craint le Seigneur
  - type: text
    text: ' (31.30'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ') vient rappeler le principe fondamental de la sagesse selon le prologue (1.7 ; 9.10), principe qui encadre ainsi l''ensemble du livre. Le trait est plus frappant dans l''original hébreu, car la formule correspondant à '
  - type: usfm
    marker: it
    children:
    - type: text
      text: qui craint le Seigneur
  - type: text
    text: ' a exactement la même forme que celle qui est habituellement rendue par '
  - type: usfm
    marker: it
    children:
    - type: text
      text: crainte du Seigneur
  - type: text
    text: '. Alors que le prologue met en garde contre la folie en la présentant sous les traits d''une séductrice et personnifie la Sagesse comme une hôtesse généreuse (9.1-6), la fin du livre ne se contente pas d''illustrer l''éloge du travail et de la compétence. Le grand tableau semble proposer la Sagesse comme l''Epouse par excellence, admirable et sans prix ; il la révèle pour conclure sous son nom principal : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: crainte du Seigneur
  - type: text
    text: .
- type: usfm
  marker: is2
  children:
  - type: text
    text: Sagesse de Salomon et sagesse égyptienne
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les divers titres et sous-titres de l''œuvre renvoient surtout à '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Salomon
  - type: text
    text: ', mentionné trois fois (1.1 ; 10.1 ; 25.1) ; ils lui attribuent ainsi la majeure partie de l''ouvrage. La sagesse de Salomon est aussi saluée par le livre des Rois (1R 5.9-14), qui lui prête trois mille maximes (ce chiffre dépasse très largement le nombre de sentences recueillies ici).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les deux autres auteurs cités en tête des derniers chapitres (Agour et la mère du roi Lemouel) sont certainement des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: non-Israélites
  - type: text
    text: ' (30.1n ; 31.1'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ) ; de plus, on a relevé des ressemblances particulièrement marquantes entre Proverbes 22.17
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: –24.22 et un texte égyptien (voir aussi 25.23
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ), probablement antérieur à l'époque de Salomon, l'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Instruction d'Aménémopé*
  - type: text
    text: '. La présence d''éléments « importés » à l''intérieur de la Bible hébraïque témoigne d''une certaine universalité de la sagesse. Ils n''y constituent d''ailleurs pas un corps étranger. La révélation affirme encore une fois la souveraineté absolue de Dieu en intégrant et en soumettant à la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: crainte du Seigneur
  - type: text
    text: ' des apports qui ressortissent aux dons divins répandus sur l''humanité tout entière.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Simplicité sans simplisme
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ouvrage de base
  - type: text
    text: ' de la sagesse, à la différence de Job ou de Qohéleth (l''Ecclésiaste) qui abordent de manière plus critique des problèmes aigus comme celui de la souffrance du juste ou de la condition humaine, le livre des Proverbes a pour mission première d''instruire celui qui manque encore d''expérience, le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: jeune homme
  - type: text
    text: ', le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: naïf
  - type: text
    text: ' (1.4).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ce souci d''instruction élémentaire conduit à une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: distinction tranchée
  - type: text
    text: ' entre le bien et le mal qu''accentue la brièveté propre à la maxime, peu propice à l''expression de la nuance. Ce type de sentence, dans sa forme la plus courante (parallélisme antithétique), oppose la bonne et la mauvaise conduite (voir 10.1ss) et associe régulièrement bien et bonheur, mal et malheur (voir 11.3-11). Ce contraste apparaît de manière plus nette encore dans le grand prologue (1–9) où les bienfaits de la sagesse sont opposés aux méfaits des mauvaises compagnies, de la paresse ou du libertinage. Il s''achève sur l''invitation des deux hôtesses, la sagesse qui prolonge la vie (9.11) et la folie dont les invités ne savent pas qu''ils sont '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dans les profondeurs du séjour des morts
  - type: text
    text: ' (9.18).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cette simplicité salutaire de l''enseignement sapiential ne doit pourtant pas être confondue avec une attitude simpliste. Le livre s''adresse aussi au sage : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: que le sage écoute, et il augmentera son savoir
  - type: text
    text: ' (1.5, faisant suite au v. 4 citant le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: naïf
  - type: text
    text: ' comme destinataire). L''opposition entre bien et mal n''est pas si évidente, les invités de la folie ne se rendent pas compte qu''ils sont chez les morts (9.18). La droiture n''est pas nécessairement une garantie d''abondance matérielle : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mieux vaut peu avec la justice que d'abondants revenus illicites
  - type: text
    text: ' (16.8). Les relations humaines peuvent poser des problèmes quasi insolubles, ainsi qu''en témoignent les deux maximes opposées sur l''attitude à tenir envers l''homme stupide (26.4s). Ainsi, tout en optant résolument pour un choix aussi clair que possible entre bien et mal, sagesse et folie, l''ouvrage tient compte de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: complexité
  - type: text
    text: ' d''une réalité que Dieu seul peut gérer parfaitement : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: C'est le Seigneur qui dirige les pas de l'homme ; l'être humain, comment pourrait-il comprendre sa voie ?
  - type: text
    text: ' (20.24)'
- type: usfm
  marker: ip
  children:
  - type: text
    text: En fait, la sagesse des Proverbes est avant tout une science de l'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: observation
  - type: text
    text: ' (d''où l''importance qu''elle accorde à la perception des sens : il s''agit de regarder et d''écouter pour comprendre ; cf. 20.12). Elle s''efforce d''appréhender l''ordre du monde et de discerner ses causalités : tel acte entraîne normalement des conséquences heureuses pour son auteur et pour son entourage ; tel autre, des conséquences malheureuses. Dieu étant conçu comme garant de cet ordre, l''observation pouvait se figer en une théologie de la rétribution, qui affleure ici et là : Dieu récompense le juste et punit le méchant. C''est à cette doctrine, telle que la défendent les amis de Job, que ce dernier se heurtera. Il n''est toutefois pas sans intérêt de remarquer que les Proverbes eux-mêmes mettaient en garde contre les déductions théologiques hâtives : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: à sept reprises le juste peut tomber
  - type: text
    text: ' (24.16).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Une crainte faite de respect
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Comme nous l''avons vu, la '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: crainte du Seigneur
  - type: text
    text: ' est posée comme principe de base de la sagesse (1.7 ; 9.10) et rappelée discrètement à la fin du livre (31.30).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''emploi du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: nom personnel
  - type: text
    text: ' de Dieu, YHWH (le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ), nom caractéristique de sa révélation à Israël (Ex 6.2-3 ; Dt 6.4), au début d'un livre qui présente tant de points communs avec les productions des autres peuples, écarte la tentation d'une sagesse indépendante de la connaissance du vrai Dieu.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Quant à la notion de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: crainte
  - type: text
    text: ' de Dieu, elle dénote, pour la foi, la profondeur du sentiment et des convictions, le sérieux de la pratique, le principe même de l''obéissance. L''objet de la crainte est celui dont tout dépend et auquel tout se rapporte, dont la pensée impressionne et motive plus que toute autre. Craindre Dieu, ce n''est pas s''inquiéter sans cesse des réactions qu''il pourrait avoir. Craindre Dieu signifie que toute autre considération ou toute autre crainte doivent s''effacer devant lui : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pas de sagesse, pas d'intelligence, pas de conseil qui tienne devant le Seigneur !
  - type: text
    text: ' (21.30)'
