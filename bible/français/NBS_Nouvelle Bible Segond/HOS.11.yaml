document_id: HOS.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu, un père déçu par son fils
  - type: text
    content: ' '
  - type: note
    content: mon fils Ex 4.22s ; cf. Dt 32.6 ; Es 1.2 ; 63.16 ; Jr 3.19 ; 31.9 ; Ml 1.6 ; Mt 2.15  ; Rm 9.4.
  - type: text
    content: 'Quand Israël était jeune, je l''aimais :'
  - type: text
    content: d'Egypte j'ai appelé mon fils.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'rugira comme un lion  : cf. 5.14+ ; voir aussi Am 1.2 ; 3.4,8 ; Ap 10.3. –  de la mer ou de l''ouest (Gn 12.8n). –  en tremblant 3.5.'
  - type: text
    content: 'Ils suivront le '
  - type: text
    content: Seigneur
  - type: text
    content: qui rugira comme un lion,
  - type: text
    content: car il rugira,
  - type: text
    content: et les fils accourront de la mer en tremblant.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Es 60.8 ; cf. Es 11.11s ; 43.5-7 ; Jr 31.8s.
  - type: text
    content: Ils accourront de l'Egypte en tremblant, comme un oiseau,
  - type: text
    content: et de l'Assyrie, comme une colombe.
  - type: text
    content: Et je les ferai habiter chez eux
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ils se sont éloignés…  : sens incertain ; LXX plus je les appelais, plus eux s''écartaient de moi  ; en modifiant la lecture traditionnelle de l''hébreu, certains comprennent d''autres les ont appelés, et ils se sont écartés de moi.'
  - type: text
    content: Mais ils se sont éloignés de ceux qui les appelaient ;
  - type: text
    content: ils ont sacrifié aux Baals
  - type: text
    content: et offert de l'encens aux statues.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'guidé les pas Dt 1.31. –  Ephraïm 4.17n. –  pas compris  : litt. pas connu 2.10. –  que je prenais soin d''eux  : autres traductions que je les soignais ; que je les avais guéris ; que je voulais les guérir.'
  - type: text
    content: C'est moi qui ai guidé les pas d'Ephraïm,
  - type: text
    content: en le soutenant par les bras ;
  - type: text
    content: mais ils n'ont pas compris que je prenais soin d'eux.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'tirés ou menés, attirés  ; cf. Jg 4.6n  ; Jr 31.3n. –  humains  : litt. d''humain , en hébreu ’adam (Gn 1.26n). –  celui qui relâchait…  : litt. comme ceux qui soulèvent le joug sur leurs mâchoires , image des soins donnés aux bêtes de somme ; certains modifient légèrement le texte hébreu traditionnel pour lire comme ceux qui soulèvent un nourrisson contre leur joue . –  je leur ai présenté  : l''hébreu a le singulier je lui ai présenté , de même aux v. suivants  : Il ne retournera pas… sera son roi… ses villes… ses alentours . –  de quoi manger  : cf. Ex 16 ; Nb 11 ; Dt 8.3,16.'
  - type: text
    content: Je les ai tirés avec des liens humains,
  - type: text
    content: avec des chaînes d'amour.
  - type: text
    content: J'ai été pour eux celui qui relâchait leur joug,
  - type: text
    content: je leur ai présenté de quoi manger.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ils ne retourneront pas en Egypte  : en modifiant ou non le texte hébreu traditionnel, certains comprennent, au contraire  : (à coup sûr), ils retourneront (ou ils reviendront , même verbe dans la suite) en Egypte  ; 7.11 ; 8.13+. –  c''est l''Assyrien…  : certains comprennent leur roi (s''en ira) en Assyrie  ; cf. 9.3+. –  revenir 2.9+.'
  - type: text
    content: Ils ne retourneront pas en Egypte ;
  - type: text
    content: c'est l'Assyrien qui sera leur roi,
  - type: text
    content: parce qu'ils ont refusé de revenir.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'leurs alentours  : litt. ses (v. 4n) branches  ; certains comprennent ses hommes vaillants ; ses défenses.'
  - type: text
    content: L'épée fondra sur leurs villes,
  - type: text
    content: anéantira leurs alentours,
  - type: text
    content: elle dévorera,
  - type: text
    content: à cause des desseins qu'ils ont eus.
  - type: heading
    content: L'amour de Dieu l'emportera
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'est enclin à l''infidélité…  : texte obscur ; soit ils sont accrochés (litt. suspendus ) à leur infidélité , soit ils se retiennent de revenir à moi (même terme en 14.5). –  en haut 7.16.'
  - type: text
    content: Mon peuple est enclin à l'infidélité envers moi ;
  - type: text
    content: on les appelle en haut,
  - type: text
    content: mais aucun d'eux ne se lève.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'livrer Gn 14.20n. –  Adma / Tseboïm  : villes associées à la destruction de Sodome et Gomorrhe en Gn 10.19 ; 14.2,8n  ; cf. Dt 29.22 ; Es 1.9s. –  Mon cœur est bouleversé (litt. retourné sur moi ) : le même verbe décrit la destruction de Sodome, d''Adma et de Tseboïm en Gn 19.25 (cf. 19.21n) ; Dt 29.22. –  ma pitié ou mes regrets  ; cf. 13.14 ; Nb 23.19+.'
  - type: text
    content: Comment pourrais-je te traiter, Ephraïm ?
  - type: text
    content: Pourrais-je te livrer, Israël ?
  - type: text
    content: Comment pourrais-je te traiter comme Adma ?
  - type: text
    content: Te rendrais-je semblable à Tseboïm ?
  - type: text
    content: Mon cœur est bouleversé,
  - type: text
    content: toute ma pitié s'émeut.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Certains comprennent, au contraire, à coup sûr, j''agirai… je reviendrai… : je viendrai… –  je ne reviendrai pas pour détruire  : autre traduction je ne recommencerai pas à détruire . –  pas un homme  : autre terme qu''au v. 4n  ; c''est ici celui qui désigne habituellement l''homme par opposition à la femme (Gn 2.23n), de même en Nb 23.19 ; Jb 9.32 ; voir aussi 1S 15.29 (avec ’adam ). –  Dieu  : hébreu ’El  ; cf. Gn 21.33n. –  le Saint  : cf. 12.1n  ; Es 1.4+ ; 12.6. –  avec fureur  : traduction conjecturale ; le texte hébreu pourrait signifier, litt., dans une ville ( ?) ; mais le même mot, ou un homonyme, semble avoir le sens d’ agitation en Jr 15.8.'
  - type: text
    content: Je n'agirai pas selon ma colère ardente,
  - type: text
    content: je ne reviendrai pas pour détruire Ephraïm ;
  - type: text
    content: car je ne suis pas un homme,
  - type: text
    content: mais Dieu ;
  - type: text
    content: 'en ton sein je suis le Saint :'
  - type: text
    content: je ne viendrai pas avec fureur.
