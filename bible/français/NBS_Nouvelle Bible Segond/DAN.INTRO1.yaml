document_id: DAN.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre de Daniel est un cas à part. Son statut particulier apparaît déjà dans son '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: classement
  - type: text
    text: ' parmi les livres de la Bible. Dans la Bible hébraïque, il n''est pas rangé parmi les Prophètes, mais parmi les Ecrits (voir l''introduction à l''Ancien Testament, p.${Xintat}) : on le trouve en effet vers la fin du canon, entre les « cinq Rouleaux » ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Megilloth
  - type: text
    text: ') lus à l''occasion des fêtes annuelles (Ruth, Cantique des cantiques, Qohéleth = Ecclésiaste, Lamentations, Esther) et l''ensemble final constitué par Esdras-Néhémie et les Chroniques. Dans les principaux manuscrits de la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Septante
  - type: text
    text: ' grecque (LXX*), il clôt le canon en qualité de dernier des Prophètes, après Ezéchiel (les Douze prophètes ou Petits prophètes viennent en tête de la section des Prophètes, avant Esaïe).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Comme Esdras, Daniel est un ouvrage '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: bilingue
  - type: text
    text: '  : le début et la fin sont écrits en hébreu, mais la section centrale (2.4–7.28) est en araméen, sans qu''on puisse aisément réduire l''ensemble à un original écrit uniformément en hébreu ou en araméen. On y rencontre beaucoup de mots d''origine perse et même quelques-uns d''origine grecque (3.4'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ',5'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ). La version grecque de Daniel, comme celle d'Esther, comporte plusieurs additions importantes que l'Eglise catholique a reçues comme deutérocanoniques* (voir 3.23
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ',25'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '  ; 12.13'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ) ; elle nous est en outre parvenue dans son intégralité sous deux formes passablement différentes (
  - type: usfm
    marker: it
    children:
    - type: text
      text: Septante,
  - type: text
    text: ' Théodotion). Cette complexité textuelle est sans doute liée aux débats difficiles dont le livre de Daniel a été l''objet dans le judaïsme, tant dans le pays d''Israël que dans la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: diaspora
  - type: text
    text: ' hellénophone.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: personnage
  - type: text
    text: ' principal du livre recèle aussi sa part d''énigme : une forme approchée ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Danel ?
  - type: text
    text: ) apparaît déjà en Ezéchiel 14.14
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ',20 ; 28.3. Dans ces textes le nom semble désigner, non pas un contemporain d''Ezéchiel, mais un personnage de l''Antiquité connu au même titre que Noé et Job : sa description est celle d''un intercesseur et d''un sage. On l''a fréquemment rapproché du Danel qui apparaît dans un texte du II'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' millénaire retrouvé à Ougarit*, la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Légende d'Aqhat.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Que ces coïncidences externes soient ou non significatives, la lecture même du livre biblique de Daniel ne laisse pas de surprendre. C''est avec les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: récits de cour
  - type: text
    text: ' de l''histoire de Joseph (Gn 37–50), du livre d''Esther et, hors de la Bible, de la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sagesse d'Ahiqar*,
  - type: text
    text: ' que les éléments narratifs du livre de Daniel offrent les ressemblances les plus frappantes (voir l''encadré « Daniel, Joseph et Esther : quelques similitudes narratives », p.${Xdnjosest}).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Un singulier témoin
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'D''après les indications fournies par le livre qui porte son nom, un jeune homme nommé Daniel, membre d''une famille de l''aristocratie judéenne, a assisté à la défaite de Joïaqim, roi de Juda. Avec ses compagnons, il a été exilé à '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Babylone
  - type: text
    text: ' par le roi Nabuchodonosor.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'C''est avec un statut original que Daniel sert d''instrument à la révélation. A la différence d''un Esaïe ou d''un Ezéchiel (cf. Es 6 ; Ez 3.4-11), il n''a pas reçu d''appel divin. Toutefois, Dieu lui a fait don de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sagesse
  - type: text
    text: ' (1.17) qui lui permet d''interpréter les rêves. Dès lors, il sera remarqué par Nabuchodonosor et plusieurs de ses successeurs, qui lui demanderont d''assumer d''importantes fonctions.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Promu aux plus hautes responsabilités de l'Etat, Daniel jouit d'une position privilégiée d'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: observateur
  - type: text
    text: ' et de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: témoin
  - type: text
    text: . Il peut ainsi décrire la lutte de ceux qui s'efforcent de rester fidèles à leur Dieu dans un milieu hostile. Proche des détenteurs du pouvoir, il constate les effets de l'orgueil, de la corruption des mœurs et de l'idolâtrie. Mais aussi, bien au-delà de ces contingences immédiates, il voit se dérouler dans ses visions l'histoire de l'humanité, sous l'angle particulier du conflit entre le peuple de Dieu et ceux qui le combattent. Derrière l'oppression présente, il aperçoit la libération divine.
- type: usfm
  marker: is2
  children:
  - type: text
    text: L'organisation du livre
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La première partie du livre (chap. 1 à 6) est essentiellement '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: narrative
  - type: text
    text: '  : Daniel reçoit le don miraculeux d''interpréter des signes adressés aux potentats de son temps (chap. 2 ; 4 ; 5). La fidélité des jeunes Juifs à Dieu, à sa loi et à la coutume qui s''y rattache (p. ex. la prière trois fois par jour en direction de Jérusalem, 6.11) est la clef de la victoire sur le monde (chap. 1 ; 3 ; 6).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La seconde partie du livre (chap. 7–12) est constituée de visions riches en symboles (animaux, cornes, yeux). Elle est résolument '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: apocalyptique
  - type: text
    text: '  : ainsi nomme-t-on ce genre littéraire bien particulier, dont Daniel nous offre le modèle accompli, mais qui a déjà été esquissé par Ezéchiel et qui deviendra foisonnant dans le judaïsme jusqu''à l''ère chrétienne. Il se caractérise par des messages mystérieux, souvent interprétés par un messager divin à l''intention d''un bénéficiaire humain, lui-même chargé de les communiquer à son tour. Plus que le prophétisme antérieur, l''apocalyptique est indissociable de la forme écrite, laquelle rend possible un langage soigneusement codé, qui doit être déchiffré. Au lieu d''interpeller directement la conscience morale de ses destinataires, à la façon des prophètes, elle fait appel à la perspicacité du lecteur. Il s''agit, en général, d''une littérature de crise qui exacerbe l''opposition entre le bien et le mal. Elle révèle (« apocalypse » = « révélation »), par-delà la difficulté des temps, que Dieu est maître de l''histoire et qu''il aura le dernier mot, au terme d''une succession d''événements écrits à l''avance. L''apocalyptique joint à la parole prophétique l''inspiration particulière de la sagesse (voir « La littérature de sagesse », p.${Xsagesse}), en ce qu''elle constitue un regard inattendu sur la réalité de l''histoire et du monde des hommes.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans cette nouvelle partie du livre, Daniel s''exprime à la première personne. Ses visions développent avec une plus grande ampleur ce qui a été souligné auparavant. Le visionnaire apocalyptique discerne la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: succession des empires
  - type: text
    text: ', symbolisés par des animaux (chap. 7–8). Il découvre l''oppression quasi perpétuelle dont sera victime le peuple de Dieu (9.26). Aux chapitres 10 et 11 son attention se fixe tout particulièrement sur la crise de l''époque des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Maccabées
  - type: text
    text: '*, au II'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècle av. J.-C., crise déclenchée par la politique d''hellénisation forcée d''Antiochos IV Epiphane, et du parti helléniste qui lui était favorable à Jérusalem. Mais surtout il annonce l''avènement du royaume de Dieu à la fin de l''histoire. Derrière le tumulte des nations, il voit Dieu qui veille et juge tous ses adversaires (chap. 7). En 7.13'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ' apparaît un personnage céleste '
  - type: usfm
    marker: it
    children:
    - type: text
      text: qui ressemblait à un être humain
  - type: text
    text: ' (litt. « comme un fils* d''homme »), représentant du peuple des saints du Très-Haut (v. 18). Le chapitre 9 reviendra sur l''abolition de tout mal et l''établissement de la justice éternelle. Le Jésus des évangiles semble bien se reconnaître dans le « fils d''homme » évoqué par Daniel, puisqu''il emploie l''expression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fils de l'homme
  - type: text
    text: ' de préférence à toute autre pour se désigner lui-même (63 mentions dans les évangiles ; voir en particulier Mt 25.31). Les chrétiens ont donc lu ici l''annonce de Jésus-Christ, le Messie seul capable d''apporter la vraie libération.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Se tenir en éveil
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La complexité de certaines visions, leur caractère encore peu explicite ne doit pas décourager le lecteur. Le message de Daniel se laisse malgré tout découvrir. Tout au long de ces chapitres s''exprime un fervent plaidoyer en faveur de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: fidélité
  - type: text
    text: . Il n'est pas hors de propos à une époque où des compromissions de toutes sortes menacent la foi.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A tous ceux qui sont ébranlés par le déferlement de la violence, interpellés par le déchirement des nations, le livre de Daniel rappelle qu''en dépit des apparences Dieu reste le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: maître de l'histoire
  - type: text
    text: . A tous ceux qui connaissent l'oppression, quelle qu'en soit la nature, Daniel rappelle aussi que Dieu n'abandonne pas les siens. Il se charge lui-même de les délivrer (chap. 1 et 6).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pour tous ceux que la foi rend avides de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: connaissance
  - type: text
    text: ', le livre de Daniel est une invitation à se tenir en éveil. Si en effet ce rouleau doit rester scellé jusqu''au temps de la fin, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: une multitude alors cherchera, et la connaissance augmentera
  - type: text
    text: ' (12.4). Et pour les chrétiens, l''incitation suprême à l''étude du livre de Daniel vient de Jésus lui-même, dans son discours sur la fin des temps : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Lorsque vous verrez l'abomination dévastatrice, qui a été annoncée par l'entremise du prophète Daniel, installée dans un lieu sacré —
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: que le lecteur comprenne
  - type: text
    text: ' (Mt 24.15).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livret de Daniel a brossé un étonnant tableau de l''histoire du monde. L''Apocalypse de Jean s''en inspirera encore très largement. Derrière les luttes et les conflits des hommes, ces écrits si particuliers révèlent une espérance inébranlable : Dieu agit toujours.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Ceux qui auront eu du discernement brilleront…
  - type: text
    text: ' (12.3)'
