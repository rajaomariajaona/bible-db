document_id: DAN.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Le livre de Daniel est un cas à part. Son statut particulier apparaît déjà dans son '
  - type: text
    content: classement
  - type: text
    content: ' parmi les livres de la Bible. Dans la Bible hébraïque, il n''est pas rangé parmi les Prophètes, mais parmi les Ecrits (voir l''introduction à l''Ancien Testament, p.${Xintat}) : on le trouve en effet vers la fin du canon, entre les « cinq Rouleaux » ('
  - type: text
    content: Megilloth
  - type: text
    content: ') lus à l''occasion des fêtes annuelles (Ruth, Cantique des cantiques, Qohéleth = Ecclésiaste, Lamentations, Esther) et l''ensemble final constitué par Esdras-Néhémie et les Chroniques. Dans les principaux manuscrits de la '
  - type: text
    content: Septante
  - type: text
    content: ' grecque (LXX*), il clôt le canon en qualité de dernier des Prophètes, après Ezéchiel (les Douze prophètes ou Petits prophètes viennent en tête de la section des Prophètes, avant Esaïe).'
  - type: text
    content: 'Comme Esdras, Daniel est un ouvrage '
  - type: text
    content: bilingue
  - type: text
    content: '  : le début et la fin sont écrits en hébreu, mais la section centrale (2.4–7.28) est en araméen, sans qu''on puisse aisément réduire l''ensemble à un original écrit uniformément en hébreu ou en araméen. On y rencontre beaucoup de mots d''origine perse et même quelques-uns d''origine grecque (3.4'
  - type: text
    content: n
  - type: text
    content: ',5'
  - type: text
    content: n
  - type: text
    content: ). La version grecque de Daniel, comme celle d'Esther, comporte plusieurs additions importantes que l'Eglise catholique a reçues comme deutérocanoniques* (voir 3.23
  - type: text
    content: n
  - type: text
    content: ',25'
  - type: text
    content: n
  - type: text
    content: '  ; 12.13'
  - type: text
    content: n
  - type: text
    content: ) ; elle nous est en outre parvenue dans son intégralité sous deux formes passablement différentes (
  - type: text
    content: Septante,
  - type: text
    content: ' Théodotion). Cette complexité textuelle est sans doute liée aux débats difficiles dont le livre de Daniel a été l''objet dans le judaïsme, tant dans le pays d''Israël que dans la '
  - type: text
    content: diaspora
  - type: text
    content: ' hellénophone.'
  - type: text
    content: 'Le '
  - type: text
    content: personnage
  - type: text
    content: ' principal du livre recèle aussi sa part d''énigme : une forme approchée ('
  - type: text
    content: Danel ?
  - type: text
    content: ) apparaît déjà en Ezéchiel 14.14
  - type: text
    content: n
  - type: text
    content: ',20 ; 28.3. Dans ces textes le nom semble désigner, non pas un contemporain d''Ezéchiel, mais un personnage de l''Antiquité connu au même titre que Noé et Job : sa description est celle d''un intercesseur et d''un sage. On l''a fréquemment rapproché du Danel qui apparaît dans un texte du II'
  - type: text
    content: e
  - type: text
    content: ' millénaire retrouvé à Ougarit*, la '
  - type: text
    content: Légende d'Aqhat.
  - type: text
    content: 'Que ces coïncidences externes soient ou non significatives, la lecture même du livre biblique de Daniel ne laisse pas de surprendre. C''est avec les '
  - type: text
    content: récits de cour
  - type: text
    content: ' de l''histoire de Joseph (Gn 37–50), du livre d''Esther et, hors de la Bible, de la '
  - type: text
    content: Sagesse d'Ahiqar*,
  - type: text
    content: ' que les éléments narratifs du livre de Daniel offrent les ressemblances les plus frappantes (voir l''encadré « Daniel, Joseph et Esther : quelques similitudes narratives », p.${Xdnjosest}).'
  - type: text
    content: Un singulier témoin
  - type: text
    content: 'D''après les indications fournies par le livre qui porte son nom, un jeune homme nommé Daniel, membre d''une famille de l''aristocratie judéenne, a assisté à la défaite de Joïaqim, roi de Juda. Avec ses compagnons, il a été exilé à '
  - type: text
    content: Babylone
  - type: text
    content: ' par le roi Nabuchodonosor.'
  - type: text
    content: 'C''est avec un statut original que Daniel sert d''instrument à la révélation. A la différence d''un Esaïe ou d''un Ezéchiel (cf. Es 6 ; Ez 3.4-11), il n''a pas reçu d''appel divin. Toutefois, Dieu lui a fait don de la '
  - type: text
    content: sagesse
  - type: text
    content: ' (1.17) qui lui permet d''interpréter les rêves. Dès lors, il sera remarqué par Nabuchodonosor et plusieurs de ses successeurs, qui lui demanderont d''assumer d''importantes fonctions.'
  - type: text
    content: Promu aux plus hautes responsabilités de l'Etat, Daniel jouit d'une position privilégiée d'
  - type: text
    content: observateur
  - type: text
    content: ' et de '
  - type: text
    content: témoin
  - type: text
    content: . Il peut ainsi décrire la lutte de ceux qui s'efforcent de rester fidèles à leur Dieu dans un milieu hostile. Proche des détenteurs du pouvoir, il constate les effets de l'orgueil, de la corruption des mœurs et de l'idolâtrie. Mais aussi, bien au-delà de ces contingences immédiates, il voit se dérouler dans ses visions l'histoire de l'humanité, sous l'angle particulier du conflit entre le peuple de Dieu et ceux qui le combattent. Derrière l'oppression présente, il aperçoit la libération divine.
  - type: text
    content: L'organisation du livre
  - type: text
    content: 'La première partie du livre (chap. 1 à 6) est essentiellement '
  - type: text
    content: narrative
  - type: text
    content: '  : Daniel reçoit le don miraculeux d''interpréter des signes adressés aux potentats de son temps (chap. 2 ; 4 ; 5). La fidélité des jeunes Juifs à Dieu, à sa loi et à la coutume qui s''y rattache (p. ex. la prière trois fois par jour en direction de Jérusalem, 6.11) est la clef de la victoire sur le monde (chap. 1 ; 3 ; 6).'
  - type: text
    content: 'La seconde partie du livre (chap. 7–12) est constituée de visions riches en symboles (animaux, cornes, yeux). Elle est résolument '
  - type: text
    content: apocalyptique
  - type: text
    content: '  : ainsi nomme-t-on ce genre littéraire bien particulier, dont Daniel nous offre le modèle accompli, mais qui a déjà été esquissé par Ezéchiel et qui deviendra foisonnant dans le judaïsme jusqu''à l''ère chrétienne. Il se caractérise par des messages mystérieux, souvent interprétés par un messager divin à l''intention d''un bénéficiaire humain, lui-même chargé de les communiquer à son tour. Plus que le prophétisme antérieur, l''apocalyptique est indissociable de la forme écrite, laquelle rend possible un langage soigneusement codé, qui doit être déchiffré. Au lieu d''interpeller directement la conscience morale de ses destinataires, à la façon des prophètes, elle fait appel à la perspicacité du lecteur. Il s''agit, en général, d''une littérature de crise qui exacerbe l''opposition entre le bien et le mal. Elle révèle (« apocalypse » = « révélation »), par-delà la difficulté des temps, que Dieu est maître de l''histoire et qu''il aura le dernier mot, au terme d''une succession d''événements écrits à l''avance. L''apocalyptique joint à la parole prophétique l''inspiration particulière de la sagesse (voir « La littérature de sagesse », p.${Xsagesse}), en ce qu''elle constitue un regard inattendu sur la réalité de l''histoire et du monde des hommes.'
  - type: text
    content: 'Dans cette nouvelle partie du livre, Daniel s''exprime à la première personne. Ses visions développent avec une plus grande ampleur ce qui a été souligné auparavant. Le visionnaire apocalyptique discerne la '
  - type: text
    content: succession des empires
  - type: text
    content: ', symbolisés par des animaux (chap. 7–8). Il découvre l''oppression quasi perpétuelle dont sera victime le peuple de Dieu (9.26). Aux chapitres 10 et 11 son attention se fixe tout particulièrement sur la crise de l''époque des '
  - type: text
    content: Maccabées
  - type: text
    content: '*, au II'
  - type: text
    content: e
  - type: text
    content: ' siècle av. J.-C., crise déclenchée par la politique d''hellénisation forcée d''Antiochos IV Epiphane, et du parti helléniste qui lui était favorable à Jérusalem. Mais surtout il annonce l''avènement du royaume de Dieu à la fin de l''histoire. Derrière le tumulte des nations, il voit Dieu qui veille et juge tous ses adversaires (chap. 7). En 7.13'
  - type: text
    content: n
  - type: text
    content: ' apparaît un personnage céleste '
  - type: text
    content: qui ressemblait à un être humain
  - type: text
    content: ' (litt. « comme un fils* d''homme »), représentant du peuple des saints du Très-Haut (v. 18). Le chapitre 9 reviendra sur l''abolition de tout mal et l''établissement de la justice éternelle. Le Jésus des évangiles semble bien se reconnaître dans le « fils d''homme » évoqué par Daniel, puisqu''il emploie l''expression '
  - type: text
    content: fils de l'homme
  - type: text
    content: ' de préférence à toute autre pour se désigner lui-même (63 mentions dans les évangiles ; voir en particulier Mt 25.31). Les chrétiens ont donc lu ici l''annonce de Jésus-Christ, le Messie seul capable d''apporter la vraie libération.'
  - type: text
    content: Se tenir en éveil
  - type: text
    content: 'La complexité de certaines visions, leur caractère encore peu explicite ne doit pas décourager le lecteur. Le message de Daniel se laisse malgré tout découvrir. Tout au long de ces chapitres s''exprime un fervent plaidoyer en faveur de la '
  - type: text
    content: fidélité
  - type: text
    content: . Il n'est pas hors de propos à une époque où des compromissions de toutes sortes menacent la foi.
  - type: text
    content: 'A tous ceux qui sont ébranlés par le déferlement de la violence, interpellés par le déchirement des nations, le livre de Daniel rappelle qu''en dépit des apparences Dieu reste le '
  - type: text
    content: maître de l'histoire
  - type: text
    content: . A tous ceux qui connaissent l'oppression, quelle qu'en soit la nature, Daniel rappelle aussi que Dieu n'abandonne pas les siens. Il se charge lui-même de les délivrer (chap. 1 et 6).
  - type: text
    content: 'Pour tous ceux que la foi rend avides de '
  - type: text
    content: connaissance
  - type: text
    content: ', le livre de Daniel est une invitation à se tenir en éveil. Si en effet ce rouleau doit rester scellé jusqu''au temps de la fin, '
  - type: text
    content: une multitude alors cherchera, et la connaissance augmentera
  - type: text
    content: ' (12.4). Et pour les chrétiens, l''incitation suprême à l''étude du livre de Daniel vient de Jésus lui-même, dans son discours sur la fin des temps : '
  - type: text
    content: Lorsque vous verrez l'abomination dévastatrice, qui a été annoncée par l'entremise du prophète Daniel, installée dans un lieu sacré —
  - type: text
    content: ' '
  - type: text
    content: que le lecteur comprenne
  - type: text
    content: ' (Mt 24.15).'
  - type: text
    content: 'Le livret de Daniel a brossé un étonnant tableau de l''histoire du monde. L''Apocalypse de Jean s''en inspirera encore très largement. Derrière les luttes et les conflits des hommes, ces écrits si particuliers révèlent une espérance inébranlable : Dieu agit toujours.'
  - type: text
    content: Ceux qui auront eu du discernement brilleront…
  - type: text
    content: ' (12.3)'
