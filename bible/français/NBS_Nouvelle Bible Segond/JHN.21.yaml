  - type: text
    text: 'Là-dessus, le bruit se répandit parmi les frères que ce disciple-là ne mourrait pas. Pourtant, Jésus ne lui avait pas dit qu''il ne mourrait pas, mais : « Si je veux que lui demeure jusqu''à ce que je vienne, que t''importe ? »'
