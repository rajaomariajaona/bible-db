        text: 16.30 ; cf. 1Jn 3.20.
    marker-yv: yv-n
  - type: text
    text: 'Il lui dit pour la troisième fois : Simon, fils de Jean, es-tu mon ami ? Pierre fut attristé de ce qu''il lui avait dit pour la troisième fois : « Es-tu mon ami ? » Il lui répondit : Seigneur, toi, tu sais tout ! Tu sais bien, toi, que je suis ton ami ! Jésus lui dit : Prends soin de mes moutons. '
