  - type: text
    text: 'Simon Pierre, Thomas, celui qu''on appelle le Jumeau, Nathanaël, de Cana de Galilée, les fils de Zébédée, et deux autres de ses disciples étaient ensemble. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lc 5.4s. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Evangile de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Pierre
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '58ss (voir aussi ♦) : « Or, c''était le dernier jour des Azymes (la fête des Pains sans levain) et beaucoup de gens s''en retournaient à la maison, la fête terminée. Nous, les douze disciples du Seigneur, nous pleurions et nous étions dans l''affliction. Et chacun, affligé par ce qui était arrivé, rentra à la maison. Quant à moi, Simon Pierre, et à André, mon frère, nous prîmes nos filets et nous allâmes à la mer… »'
    marker-yv: yv-n
  - type: text
    text: 'Simon Pierre leur dit : Je vais pêcher. Ils lui dirent : Nous venons avec toi, nous aussi. Ils sortirent et montèrent dans le bateau ; cette nuit-là, ils ne prirent rien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne savaient pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 20.14+.
    marker-yv: yv-n
  - type: text
    text: 'Le matin venu, Jésus se tint debout sur le rivage ; mais les disciples ne savaient pas que c''était Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lc 24.41. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mes enfants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: petits enfants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 13.33 (autre terme grec, synonyme) ; 1Jn 2.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur dit : Mes enfants, avez-vous quelque chose à manger ? Ils lui répondirent : Non. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 5.4-7.
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit : Jetez le filet à droite du bateau, et vous trouverez. Ils le jetèrent donc ; et ils n''étaient plus capables de le retirer, tant il y avait de poissons. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le disciple que Jésus aimait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.23+ ; cf. 20.2-10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il attacha son vêtement à la ceinture
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ceignit son vêtement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui signifie probablement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il attacha les pans de son vêtement à sa ceinture '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (pour être plus libre de ses mouvements, cf. 1R 18.46
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jr 1.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 12.35'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il mit son vêtement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même verbe Jn 13.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; verbe apparenté 21.18 ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: passer sa ceinture
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). Le terme traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'peut signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: légèrement vêtu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; mais on peut aussi comprendre que Pierre était nu sous le vêtement qu''il '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ceignit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ce qui expliquerait pourquoi il ne l''ôta pas pour nager). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il se jeta à la mer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 14.27-30.'
    marker-yv: yv-n
  - type: text
    text: 'Alors le disciple que Jésus aimait dit à Pierre : C''est le Seigneur ! Quand Simon Pierre eut entendu que c''était le Seigneur, il attacha son vêtement à la ceinture – car il était nu – et il se jeta à la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux cents coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : moins d''une centaine de mètres (voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: Les autres disciples vinrent avec la barque, en traînant le filet plein de poissons, car ils n'étaient pas loin de la terre, à deux cents coudées environ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
