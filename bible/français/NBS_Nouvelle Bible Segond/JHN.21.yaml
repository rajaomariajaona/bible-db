document_id: JHN.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus apparaît à sept disciples
  - type: heading
    content: Cf. Lc 5.1-11
  - type: text
    content: ' '
  - type: note
    content: '6.1+ ; cf. Lc 5.1-11 ; Mt 26.32 ; 28.7. –  à la mer  : la même expression était traduite sur la mer en 6.19.'
  - type: text
    content: Après cela, Jésus se manifesta encore aux disciples, à la mer de Tibériade. Voici comment il se manifesta.
  '10':
  - type: text
    content: 'Jésus leur dit : Apportez quelques-uns des poissons que vous venez de prendre. '
  '11':
  - type: note
    content: 'dans le bateau  : sous-entendu dans le texte. –  cent cinquante-trois  : chiffre triangulaire (somme des chiffres de 1 à 17, cf. Ac 27.37n  ; Ap 13.18n) ; selon une tradition, les anciens auraient recensé 153 espèces de poissons. Voir aussi Lc 5.10. –  ne se déchira pas  : cf. 19.24n  ; Lc 5.6.'
  - type: text
    content: Simon Pierre monta dans le bateau et tira à terre le filet, plein de cent cinquante-trois gros poissons ; et quoiqu'il y en eût tant, le filet ne se déchira pas.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'n''osait lui demander  : cf. 4.27. –  le Seigneur v. 7.'
  - type: text
    content: 'Jésus leur dit : Venez déjeuner. Aucun des disciples n''osait lui demander : Qui es-tu, toi ? Car ils savaient que c''était le Seigneur. '
  '13':
  - type: note
    content: Cf. 6.11 ; Lc 24.30.
  - type: text
    content: 'Jésus vient, prend le pain et le leur donne, ainsi que le poisson. '
  '14':
  - type: note
    content: 'la troisième fois 20.19,26. –  se manifestait  : litt. fut manifesté 1.31+. –  réveillé ou relevé, cf. 2.19n  ; voir résurrection.'
  - type: text
    content: C'était déjà la troisième fois que Jésus se manifestait à ses disciples depuis qu'il s'était réveillé d'entre les morts.
  - type: heading
    content: Jésus et Pierre
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Simon, fils (terme sous-entendu dans le texte) de Jean  : certains mss portent de Jonas  ; voir 1.42n  ; cf. Lc 24.34 ; 1Co 15.5. –  plus que ceux-ci  : on comprend habituellement  : plus que ceux-ci (les autres disciples) ne m''aiment  ; mais la formule est ambiguë ; cf. 13.37s ; Mt 26.33 ; Lc 7.42s. –  je suis ton ami , ou je t''aime  : le verbe dénote habituellement l''affection ou l''amitié ; il revient aux v. 16 et 17 dans la réponse de Pierre et, au v. 17, aussi dans la question de Jésus ; voir toutefois 11.5n. –  Prends soin de mes agneaux  : cf. 10.1-16 ; Mt 16.17-19 ; Lc 22.32 ; Ac 20.28 ; 1P 5.1-4.'
  - type: text
    content: 'Après qu''ils eurent déjeuné, Jésus dit à Simon Pierre : Simon, fils de Jean, m''aimes-tu plus que ceux-ci ? Il lui répondit : Oui, Seigneur ! Tu sais bien, toi, que je suis ton ami ! Jésus lui dit : Prends soin de mes agneaux. '
  '16':
  - type: note
    content: 'Sois le berger  : cf. 2S 5.2 ; Ps 78.71s. –  de mes moutons  : cf. 10.2n.'
  - type: text
    content: 'Il lui dit une deuxième fois : Simon, fils de Jean, m''aimes-tu ? Pierre lui répondit : Oui, Seigneur ! Tu sais bien, toi, que je suis ton ami ! Jésus lui dit : Sois le berger de mes moutons. '
  '17':
  - type: note
    content: 'pour la troisième fois  : cf. 13.38 ; 18.17,25-27. –  tu sais tout 16.30 ; cf. 1Jn 3.20.'
  - type: text
    content: 'Il lui dit pour la troisième fois : Simon, fils de Jean, es-tu mon ami ? Pierre fut attristé de ce qu''il lui avait dit pour la troisième fois : « Es-tu mon ami ? » Il lui répondit : Seigneur, toi, tu sais tout ! Tu sais bien, toi, que je suis ton ami ! Jésus lui dit : Prends soin de mes moutons. '
  '18':
  - type: note
    content: 'Amen, amen 1.51n  ; cf. Mt 5.18n. –  tu passais…  : litt. tu te ceignais toi-même. –  tu allais  : litt. tu marchais. –  te passera…  : litt. te ceindra  ; cf. 18.12,24 ; Ac 21.11-14. –  où tu ne voudras pas  : cf. Mt 16.22 ; 26.39 ; 2P 1.14.'
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je te le dis, quand tu étais plus jeune, tu passais toi-même ta ceinture et tu allais où tu voulais ; mais quand tu seras vieux, tu étendras les mains, et un autre te passera ta ceinture pour te mener où tu ne voudras pas. '
  '19':
  - type: note
    content: 'par quelle mort…  : cf. 12.33+. –  glorifierait Dieu  : cf. 13.31+ ; 1P 4.14-16. –  Suis-moi  : cf. 1.43 ; voir 13.36.'
  - type: text
    content: 'Il dit cela pour signifier par quelle mort Pierre glorifierait Dieu. Après avoir ainsi parlé, il lui dit : Suis-moi.'
  - type: heading
    content: Jésus et le disciple qu'il aimait
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Thomas… 11.16n. –  Nathanaël 1.45-49. –  Cana 2.1. –  fils de Zébédée  : cf. Mt 4.21.'
  - type: text
    content: 'Simon Pierre, Thomas, celui qu''on appelle le Jumeau, Nathanaël, de Cana de Galilée, les fils de Zébédée, et deux autres de ses disciples étaient ensemble. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: '13.23+ss. –  se retournant  : le même verbe est traduit par revenir en Lc 22.32n.'
  - type: text
    content: 'En se retournant, Pierre voit le disciple que Jésus aimait, celui qui, pendant le dîner, s''était penché tout contre sa poitrine pour lui demander : « Seigneur, qui est celui qui te livre ? » Lui aussi suivait. '
  '21':
  - type: text
    content: 'En le voyant, Pierre dit à Jésus : Et celui-ci, Seigneur ? '
  '22':
  - type: note
    content: 'que lui demeure  : cf. 1Co 15.6 ; Ph 1.25. –  jusqu''à ce que je vienne  : cf. 14.3 ; Mt 16.28/ / ; 1Co 11.26 ; Ap 22.7,12,17,20.'
  - type: text
    content: 'Jésus lui dit : Si je veux que lui demeure jusqu''à ce que je vienne, que t''importe ? Toi, suis-moi. '
  '23':
  - type: note
    content: 'le bruit  : litt. cette parole. –  parmi les frères 1.15. –  que t''importe  : l''expression correspondante n''est pas répétée dans certains mss.'
  - type: text
    content: 'Là-dessus, le bruit se répandit parmi les frères que ce disciple-là ne mourrait pas. Pourtant, Jésus ne lui avait pas dit qu''il ne mourrait pas, mais : « Si je veux que lui demeure jusqu''à ce que je vienne, que t''importe ? »'
  '24':
  - type: text
    content: ' '
  - type: note
    content: '19.35+. –  témoigne  : cf. 15.27.'
  - type: text
    content: C'est ce disciple qui témoigne de ces choses et qui les a écrites. Et nous savons que son témoignage est vrai.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 20.30. –  le monde  : cf. 1.10n.'
  - type: text
    content: Jésus a fait encore beaucoup d'autres choses ; si on les écrivait en détail, le monde même, j'imagine, ne pourrait contenir les livres qu'on écrirait.
  '3':
  - type: note
    content: 'Cf. Lc 5.4s. Evangile de Pierre 58ss (voir aussi ♦) : « Or, c''était le dernier jour des Azymes (la fête des Pains sans levain) et beaucoup de gens s''en retournaient à la maison, la fête terminée. Nous, les douze disciples du Seigneur, nous pleurions et nous étions dans l''affliction. Et chacun, affligé par ce qui était arrivé, rentra à la maison. Quant à moi, Simon Pierre, et à André, mon frère, nous prîmes nos filets et nous allâmes à la mer… »'
  - type: text
    content: 'Simon Pierre leur dit : Je vais pêcher. Ils lui dirent : Nous venons avec toi, nous aussi. Ils sortirent et montèrent dans le bateau ; cette nuit-là, ils ne prirent rien.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: ne savaient pas… 20.14+.
  - type: text
    content: 'Le matin venu, Jésus se tint debout sur le rivage ; mais les disciples ne savaient pas que c''était Jésus. '
  '5':
  - type: note
    content: 'Cf. Lc 24.41. –  Mes enfants  : litt. petits enfants  ; cf. 13.33 (autre terme grec, synonyme) ; 1Jn 2.1n.'
  - type: text
    content: 'Jésus leur dit : Mes enfants, avez-vous quelque chose à manger ? Ils lui répondirent : Non. '
  '6':
  - type: note
    content: Lc 5.4-7.
  - type: text
    content: 'Il leur dit : Jetez le filet à droite du bateau, et vous trouverez. Ils le jetèrent donc ; et ils n''étaient plus capables de le retirer, tant il y avait de poissons. '
  '7':
  - type: note
    content: 'le disciple que Jésus aimait 13.23+ ; cf. 20.2-10. –  il attacha son vêtement à la ceinture  : litt. il ceignit son vêtement, ce qui signifie probablement il attacha les pans de son vêtement à sa ceinture (pour être plus libre de ses mouvements, cf. 1R 18.46n  ; Jr 1.17n  ; Lc 12.35n) ; d''autres comprennent il mit son vêtement  ; même verbe Jn 13.4n  ; verbe apparenté 21.18 (passer sa ceinture). Le terme traduit par nu peut signifier légèrement vêtu  ; mais on peut aussi comprendre que Pierre était nu sous le vêtement qu''il ceignit (ce qui expliquerait pourquoi il ne l''ôta pas pour nager). –  il se jeta à la mer  : cf. Mt 14.27-30.'
  - type: text
    content: 'Alors le disciple que Jésus aimait dit à Pierre : C''est le Seigneur ! Quand Simon Pierre eut entendu que c''était le Seigneur, il attacha son vêtement à la ceinture – car il était nu – et il se jeta à la mer. '
  '8':
  - type: note
    content: 'deux cents coudées  : moins d''une centaine de mètres (voir mesures).'
  - type: text
    content: Les autres disciples vinrent avec la barque, en traînant le filet plein de poissons, car ils n'étaient pas loin de la terre, à deux cents coudées environ.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'là 2.6n. –  un feu de braises 18.18. –  du poisson / du pain  : cf. 6.9.'
  - type: text
    content: 'Lorsqu''ils furent descendus à terre, ils voient là un feu de braises, du poisson posé dessus, et du pain. '
