      children:
      - type: text
        text: ' : cf. 10.1-16 ; Mt 16.17-19 ; Lc 22.32 ; Ac 20.28 ; 1P 5.1-4.'
    marker-yv: yv-n
  - type: text
    text: 'Après qu''ils eurent déjeuné, Jésus dit à Simon Pierre : Simon, fils de Jean, m''aimes-tu plus que ceux-ci ? Il lui répondit : Oui, Seigneur ! Tu sais bien, toi, que je suis ton ami ! Jésus lui dit : Prends soin de mes agneaux. '
