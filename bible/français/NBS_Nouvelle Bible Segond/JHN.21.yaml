  - type: text
    text: 'En se retournant, Pierre voit le disciple que Jésus aimait, celui qui, pendant le dîner, s''était penché tout contre sa poitrine pour lui demander : « Seigneur, qui est celui qui te livre ? » Lui aussi suivait. '
