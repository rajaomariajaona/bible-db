    children:
    - type: text
      text: Amen, amen,
  - type: text
    text: ' je te le dis, quand tu étais plus jeune, tu passais toi-même ta ceinture et tu allais où tu voulais ; mais quand tu seras vieux, tu étendras les mains, et un autre te passera ta ceinture pour te mener où tu ne voudras pas. '
