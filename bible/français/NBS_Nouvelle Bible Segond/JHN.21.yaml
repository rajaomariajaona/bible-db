  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'là '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un feu de braises '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du poisson '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du pain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 6.9.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''ils furent descendus à terre, ils voient là un feu de braises, du poisson posé dessus, et du pain. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus leur dit : Apportez quelques-uns des poissons que vous venez de prendre. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans le bateau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cent cinquante-trois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : chiffre triangulaire (somme des chiffres de 1 à 17, cf. Ac 27.37'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ap 13.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; selon une tradition, les anciens auraient recensé 153 espèces de poissons. Voir aussi Lc 5.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne se déchira pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 19.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 5.6.'
    marker-yv: yv-n
  - type: text
    text: Simon Pierre monta dans le bateau et tira à terre le filet, plein de cent cinquante-trois gros poissons ; et quoiqu'il y en eût tant, le filet ne se déchira pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: n'osait lui demander
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 4.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 7.
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur dit : Venez déjeuner. Aucun des disciples n''osait lui demander : Qui es-tu, toi ? Car ils savaient que c''était le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 6.11 ; Lc 24.30.
    marker-yv: yv-n
  - type: text
    text: 'Jésus vient, prend le pain et le leur donne, ainsi que le poisson. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la troisième fois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.19,26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se manifestait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fut manifesté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.31+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'réveillé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: relevé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 2.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: résurrection
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: C'était déjà la troisième fois que Jésus se manifestait à ses disciples depuis qu'il s'était réveillé d'entre les morts.
