          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il lui dit une deuxième fois : Simon, fils de Jean, m''aimes-tu ? Pierre lui répondit : Oui, Seigneur ! Tu sais bien, toi, que je suis ton ami ! Jésus lui dit : Sois le berger de mes moutons. '
