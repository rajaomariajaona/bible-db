document_id: DEU.12,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: LES LOIS DU SEIGNEUR
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que vous veillerez…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que vous observerez pour les mettre en pratique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu de vos pères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en prennes possession '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur cette terre.
      marker-yv: yv-n
    - type: text
      text: 'Voici les prescriptions et les règles que vous veillerez à mettre en pratique dans le pays que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu de vos pères, te donne pour que tu en prennes possession, tous les jours que vous vivrez sur la terre.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un seul lieu de culte
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.19 ; 2S 7.1.
      marker-yv: yv-n
    - type: text
      text: 'Quand vous aurez passé le Jourdain et que vous habiterez le pays que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, vous donne comme patrimoine, qu''il vous aura accordé le repos en vous délivrant de tous les ennemis qui vous entourent, et que vous habiterez en sécurité, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'c''est au lieu que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, choisira pour y faire demeurer son nom que vous apporterez tout ce que je vous ordonne, vos holocaustes, vos sacrifices, vos dîmes, vos prélèvements et les offrandes choisies dont vous ferez vœu au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévite
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans vos villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans vos portes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'intérieur des portes de vos villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 15,17s,21 ; 16.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 17.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 20.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il n''a aucune part… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 19+ ; 10.8s ; 33.8-11 ; cf. Ac 8.21.
      marker-yv: yv-n
    - type: text
      text: 'Vous vous réjouirez devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, vous, vos fils et vos filles, vos serviteurs et vos servantes, et le lévite qui est dans vos villes, car il n''a aucune part à votre patrimoine.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Garde-toi d''offrir tes holocaustes dans tous les lieux que tu verras. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'C''est seulement au lieu que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' choisira, dans l''une de tes tribus, que tu offriras tes holocaustes ; c''est là que tu feras tout ce que je t''ordonne. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tuer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'offrir en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 17.1 ; 18.3 ; 27.7 ; cf. 12.21 ; Lv 17.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: autant que tu le désires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de tout le désir de ton être
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression v. 20s ; 18.6 ; une formule très proche est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'si tel est ton désir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 1S 23.20 ; sur le mot correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: être
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir Gn 1.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'selon la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'impur / '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 12.2 ; 15.16,19 ; Nb 19.11,14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gazelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cerf
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : animaux consommables mais impropres aux sacrifices cultuels (cf. v. 22 ; 14.4s ; 15.22).'
      marker-yv: yv-n
    - type: text
      text: 'Néanmoins, tu pourras tuer du bétail et manger de la viande autant que tu le désires, selon la bénédiction que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, t''accordera dans toutes tes villes ; l''impur comme le pur pourront en manger, comme si c''était de la gazelle ou du cerf. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Seulement, vous ne mangerez pas le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 23 ; 15.23 ; cf. Gn 9.4 ; Lv 3.17 ; 17.10-14 ; Ac 15.29.
      marker-yv: yv-n
    - type: text
      text: 'Seulement, vous ne mangerez pas le sang : tu le répandras sur la terre comme de l''eau.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 14.22-29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vin nouveau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 27.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne pourras pas manger dans tes villes la dîme de ton blé, de ton vin et de ton huile, ni les premiers-nés de ton gros bétail et de ton petit bétail, ni aucune de tes offrandes faites pour un vœu, ni tes offrandes volontaires, ni tes prélèvements. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mais c''est seulement devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, au lieu que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, choisira, que tu les mangeras, toi, ton fils et ta fille, ton serviteur et ta servante, et le lévite qui est dans tes villes ; et tu te réjouiras devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, avec tous les biens que tu auras sous la main. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 12+ ; 14.27 ; 26.12.
      marker-yv: yv-n
    - type: text
      text: Aussi longtemps que tu vivras sur ta terre, garde-toi de délaisser le lévite.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 14.23 ; 2R 16.4 ; 17.10 ; Jr 2.20 ; 3.6 ; Ez 6.13 ; Os 4.12s ; cf. Es 57.5.
      marker-yv: yv-n
    - type: text
      text: 'Vous ferez disparaître tous les lieux où les nations que vous allez déposséder servent leurs dieux, sur les hautes montagnes, sur les collines et sous tout arbre verdoyant. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: promis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 19.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le désir…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et que tu diras : « Je désire manger de la viande », parce que ton gosier désirera manger de la viande… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur le terme correspondant éventuellement à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gosier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir Gn 1.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: viande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même mot hébreu est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 23,27.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, aura agrandi ton territoire comme il te l''a promis, et que le désir de manger de la viande te fera dire : « Je voudrais manger de la viande ! », tu pourras manger de la viande autant que tu le désires. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 14.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de chez toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de toi.
      marker-yv: yv-n
    - type: text
      text: 'Si le lieu que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, aura choisi pour y placer son nom est trop éloigné de chez toi, tu pourras tuer du gros bétail et du petit bétail que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''a donné, comme je te l''ai ordonné, et tu pourras en manger dans tes villes autant que tu le désires. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tu en mangeras comme si c''était de la gazelle ou du cerf ; l''impur comme le pur pourront en manger. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 16+ ; Lv 17.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Seulement, abstiens-toi rigoureusement de manger le sang, car le sang, c''est la vie ; et tu ne mangeras pas la vie avec la chair. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tu ne le mangeras pas : tu le répandras sur la terre comme de l''eau. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'heureux, toi et tes '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' après toi '
      - type: usfm
