document_id: DEU.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: LES LOIS DU SEIGNEUR
  - type: text
    content: ' '
  - type: note
    content: 'que vous veillerez…  : autre traduction que vous observerez pour les mettre en pratique , cf. 5.1n. –  Dieu de vos pères 1.11+. –  en prennes possession 1.21+. –  sur la terre  : autre traduction sur cette terre.'
  - type: text
    content: 'Voici les prescriptions et les règles que vous veillerez à mettre en pratique dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de vos pères, te donne pour que tu en prennes possession, tous les jours que vous vivrez sur la terre.'
  - type: heading
    content: Un seul lieu de culte
  '10':
  - type: note
    content: 25.19 ; 2S 7.1.
  - type: text
    content: 'Quand vous aurez passé le Jourdain et que vous habiterez le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous donne comme patrimoine, qu''il vous aura accordé le repos en vous délivrant de tous les ennemis qui vous entourent, et que vous habiterez en sécurité, '
  '11':
  - type: note
    content: V. 5n.
  - type: text
    content: 'c''est au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, choisira pour y faire demeurer son nom que vous apporterez tout ce que je vous ordonne, vos holocaustes, vos sacrifices, vos dîmes, vos prélèvements et les offrandes choisies dont vous ferez vœu au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'Voir lévite. –  dans vos villes  : litt. dans vos portes, c.-à-d. à l''intérieur des portes de vos villes  ; cf. v. 15,17s,21 ; 16.18n  ; 17.5n  ; Ex 20.10n. –  il n''a aucune part… v. 19+ ; 10.8s ; 33.8-11 ; cf. Ac 8.21.'
  - type: text
    content: 'Vous vous réjouirez devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous, vos fils et vos filles, vos serviteurs et vos servantes, et le lévite qui est dans vos villes, car il n''a aucune part à votre patrimoine.'
  '13':
  - type: text
    content: 'Garde-toi d''offrir tes holocaustes dans tous les lieux que tu verras. '
  '14':
  - type: text
    content: 'C''est seulement au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' choisira, dans l''une de tes tribus, que tu offriras tes holocaustes ; c''est là que tu feras tout ce que je t''ordonne. '
  '15':
  - type: note
    content: 'tuer  : le verbe hébreu correspondant est traduit par offrir en sacrifice en 17.1 ; 18.3 ; 27.7 ; cf. 12.21 ; Lv 17.3n-6. –  autant que tu le désires  : litt. de tout le désir de ton être  ; même expression v. 20s ; 18.6 ; une formule très proche est traduite par si tel est ton désir en 1S 23.20 ; sur le mot correspondant à être, voir Gn 1.20n. –  selon la bénédiction… 16.17. –  impur / pur  : cf. Lv 12.2 ; 15.16,19 ; Nb 19.11,14. –  gazelle / cerf  : animaux consommables mais impropres aux sacrifices cultuels (cf. v. 22 ; 14.4s ; 15.22).'
  - type: text
    content: 'Néanmoins, tu pourras tuer du bétail et manger de la viande autant que tu le désires, selon la bénédiction que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''accordera dans toutes tes villes ; l''impur comme le pur pourront en manger, comme si c''était de la gazelle ou du cerf. '
  '16':
  - type: note
    content: Seulement, vous ne mangerez pas le sang… v. 23 ; 15.23 ; cf. Gn 9.4 ; Lv 3.17 ; 17.10-14 ; Ac 15.29.
  - type: text
    content: 'Seulement, vous ne mangerez pas le sang : tu le répandras sur la terre comme de l''eau.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 14.22-29. –  vin  : autre traduction vin nouveau , cf. Gn 27.28n.'
  - type: text
    content: 'Tu ne pourras pas manger dans tes villes la dîme de ton blé, de ton vin et de ton huile, ni les premiers-nés de ton gros bétail et de ton petit bétail, ni aucune de tes offrandes faites pour un vœu, ni tes offrandes volontaires, ni tes prélèvements. '
  '18':
  - type: text
    content: 'Mais c''est seulement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, choisira, que tu les mangeras, toi, ton fils et ta fille, ton serviteur et ta servante, et le lévite qui est dans tes villes ; et tu te réjouiras devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, avec tous les biens que tu auras sous la main. '
  '19':
  - type: note
    content: V. 12+ ; 14.27 ; 26.12.
  - type: text
    content: Aussi longtemps que tu vivras sur ta terre, garde-toi de délaisser le lévite.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 1R 14.23 ; 2R 16.4 ; 17.10 ; Jr 2.20 ; 3.6 ; Ez 6.13 ; Os 4.12s ; cf. Es 57.5.
  - type: text
    content: 'Vous ferez disparaître tous les lieux où les nations que vous allez déposséder servent leurs dieux, sur les hautes montagnes, sur les collines et sous tout arbre verdoyant. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'promis  : litt. dit  ; cf. 19.8. –  le désir…  : autre traduction et que tu diras : « Je désire manger de la viande », parce que ton gosier désirera manger de la viande… Sur le terme correspondant éventuellement à gosier , voir Gn 1.20n. –  viande  : le même mot hébreu est traduit par chair aux v. 23,27.'
  - type: text
    content: 'Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, aura agrandi ton territoire comme il te l''a promis, et que le désir de manger de la viande te fera dire : « Je voudrais manger de la viande ! », tu pourras manger de la viande autant que tu le désires. '
  '21':
  - type: note
    content: 'Cf. v. 15n  ; 14.24. –  de chez toi  : litt. de toi.'
  - type: text
    content: 'Si le lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, aura choisi pour y placer son nom est trop éloigné de chez toi, tu pourras tuer du gros bétail et du petit bétail que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a donné, comme je te l''ai ordonné, et tu pourras en manger dans tes villes autant que tu le désires. '
  '22':
  - type: text
    content: 'Tu en mangeras comme si c''était de la gazelle ou du cerf ; l''impur comme le pur pourront en manger. '
  '23':
  - type: note
    content: V. 16+ ; Lv 17.11n.
  - type: text
    content: 'Seulement, abstiens-toi rigoureusement de manger le sang, car le sang, c''est la vie ; et tu ne mangeras pas la vie avec la chair. '
  '24':
  - type: text
    content: 'Tu ne le mangeras pas : tu le répandras sur la terre comme de l''eau. '
  '25':
  - type: note
    content: heureux, toi et tes fils après toi 4.40n. –  ce qui convient au Seigneur 6.18+ ; cf. 12.8n.
  - type: text
    content: 'Tu ne le mangeras pas, afin que tu sois heureux, toi et tes fils après toi, en faisant ce qui convient au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'consacré  : voir saint.'
  - type: text
    content: 'C''est seulement ce que tu auras consacré sur ce qui t''appartient, ainsi que tes offrandes votives, que tu viendras apporter au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' choisira. '
  '27':
  - type: note
    content: 'tes sacrifices  : il s''agit ici des sacrifices de paix (cf. Lv 3 ; 7.11-21 ; 19.5-8), par opposition aux holocaustes dont la chair (le mot correspondant est rendu ailleurs par viande  ; cf. v. 20n) et le sang sont offerts à Dieu. –  sur l''autel Lv 1.5 ; 17.11.'
  - type: text
    content: 'Tu offriras tes holocaustes, la chair et le sang, sur l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ; le sang de tes sacrifices sera répandu sur l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, et tu mangeras la chair.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'toutes ces paroles que j''institue pour toi  : autre traduction tout ce que je t''ordonne  ; cf. 4.2n  ; Jos 1.13 ; 1Ch 16.15n. –  heureux… v. 25+. –  ce qui plaît… 6.18n.'
  - type: text
    content: 'Observe et écoute toutes ces paroles que j''institue pour toi, afin que tu sois heureux pour toujours, toi et tes fils après toi, en faisant ce qui plaît et ce qui convient au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  - type: heading
    content: Contre les dieux cananéens
  '29':
  - type: text
    content: ' '
  - type: note
    content: retranché 19.1. –  déposséder 4.38+.
  - type: text
    content: 'Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, aura retranché devant toi les nations que tu vas déposséder, lorsque tu les auras dépossédées et que tu habiteras leur pays, '
  '3':
  - type: note
    content: '7.5+. –  leur nom  : probablement les noms des dieux plutôt que ceux des peuples. –  ces lieux-là  : litt. ce lieu-là.'
  - type: text
    content: Vous démolirez leurs autels, vous briserez leurs pierres levées, vous jetterez au feu leurs poteaux cultuels (leurs ashéras), vous abattrez les statues de leurs dieux et vous ferez disparaître leur nom de ces lieux-là.
  '30':
  - type: note
    content: 'Cf. 7.16+,25+ ; on pensait communément que chaque divinité avait son domaine géographique propre, et qu''en entrant dans ce domaine on devait lui vouer un culte ; cf. 2R 17.25ss. –  t''informer  : le même verbe est traduit par chercher au v. 5, et par consulter en 17.9.'
  - type: text
    content: 'garde-toi de te laisser prendre au piège en les imitant, après qu''elles auront été détruites devant toi. Garde-toi de t''informer sur leurs dieux et de dire : « Comment ces nations servaient-elles leurs dieux ? Moi aussi, je veux faire de même ! » '
  '31':
  - type: note
    content: abominations 7.25+. –  jeter au feu leurs fils… Lv 18.21 ; 2R 16.3 ; 21.6 ; 23.10 ; Ez 16.21.
  - type: text
    content: 'Tu n''agiras pas ainsi à l''égard du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ; car elles faisaient pour leurs dieux toutes sortes d''abominations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' déteste, allant jusqu''à jeter au feu leurs fils et leurs filles pour leurs dieux.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: V. 31.
  - type: text
    content: 'Vous n''agirez pas ainsi à l''égard du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu. '
  '5':
  - type: note
    content: Cf. 6.4 ; ce lieu unique a peut-être été Sichem (voir 11.29ns ; 26–27) ou Silo (Jos 18.1 ; 1S 1.3 ; Jr 7.12) avant d'être Jérusalem ; voir aussi 12.11,14 ; 14.23-26 ; 15.20 ; 16.2,16 ; 17.8 ; 18.6 ; 26.2 ; 31.11 ; 1R 9.3 ; 11.36 ; Esd 6.12 ; Né 1.9 ; Jn 4.20.
  - type: text
    content: 'Vous le chercherez seulement au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, choisira parmi toutes vos tribus pour y placer son nom et l''y faire demeurer ; c''est là que tu iras. '
  '6':
  - type: note
    content: 'vos dîmes 14.22+. –  prélèvements  : litt. le prélèvement de votre main, de même aux v. 11,17 ; Ex 25.2n.'
  - type: text
    content: 'C''est là que vous apporterez vos holocaustes, vos sacrifices, vos dîmes, vos prélèvements, vos offrandes votives, vos offrandes volontaires, ainsi que les premiers-nés de votre gros bétail et de votre petit bétail. '
  '7':
  - type: note
    content: 'vous mangerez v. 17s ; 14.23,26 ; 15.20 ; cf. Lv 7.16 ; 22.29s. –  vos familles  : litt. vos maisons ou vos maisonnées. –  vous vous réjouirez 16.11,14 ; 26.11.'
  - type: text
    content: 'C''est là que vous mangerez devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, et que, vous et vos familles, vous vous réjouirez avec tous les biens que vous aurez sous la main, ceux par lesquels le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous aura bénis.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ce qui lui convient  : litt. ce qui est droit à ses (propres) yeux , comme aux v. 25,28 ; cf. Jg 17.6+.'
  - type: text
    content: 'Vous n''agirez donc pas du tout comme nous le faisons ici aujourd''hui, où chacun fait ce qui lui convient, '
  '9':
  - type: note
    content: vous / ton / te 1.8n. –  repos 3.20+.
  - type: text
    content: 'parce que vous n''êtes pas encore arrivés dans le lieu de repos, dans le patrimoine que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne. '
