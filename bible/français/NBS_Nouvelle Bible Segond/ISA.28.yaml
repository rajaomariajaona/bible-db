document_id: ISA.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Tempête destructrice sur Samarie
  - type: text
    content: ' '
  - type: note
    content: 'ivrognes 5.11s,22s ; cf. Os 4.11,18 ; 7.5-7 ; Am 6.4-10 ; Mi 2.11. –  Ephraïm  : cf. 7.1n. –  splendeur  : autre traduction parure (v. 4s). –  fertile  : litt. des huiles. La description s''applique à Samarie, sur une colline qui domine une plaine fertile (cf. Am 4.1).'
  - type: text
    content: Quel malheur pour la couronne orgueilleuse des ivrognes d'Ephraïm,
  - type: text
    content: pour la fleur fanée, ornement de sa splendeur,
  - type: text
    content: en haut de la vallée fertile,
  - type: text
    content: pour ceux qui sont assommés par le vin !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'B. a.-ba…  : hébreu tsaw lâtsâw, tsaw lâtsâw, qaw laqaw, qaw laqaw, ze''ér sham, ze''ér sham , succession de syllabes dépourvues de sens apparent ; on a conjecturé  : ordre sur ordre, ordre sur ordre, règle sur règle… (cf. v. 17 ; 18.2n  ; Ps 19.5n). La phrase peut aussi bien évoquer des balbutiements d''ivrognes (v. 7), un b. a.-ba scolaire (v. 9) ou la sonorité d''une langue étrangère (v. 11) ; dans la bouche des interlocuteurs d''Esaïe, elle sert sans doute à tourner en dérision les discours du prophète.'
  - type: text
    content: B. a.-ba, b. a.-ba,
  - type: text
    content: d. a.-da, d. a.-da,
  - type: text
    content: un peu par-ci, un peu par-là.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. 33.19 ; 1Co 14.21.
  - type: text
    content: – Eh bien, c'est par des lèvres balbutiantes,
  - type: text
    content: dans une autre langue,
  - type: text
    content: qu'il parlera à ce peuple.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'le repos  : autre traduction le lieu de repos  ; cf. 7.4 ; 8.6 ; 30.15 ; 32.17 ; Jos 1.15 ; 11.23 ; Jr 6.16 ; Ps 95.11 ; Hé 3.11. –  pas voulu écouter 30.9.'
  - type: text
    content: 'Il leur avait dit : Voici le repos !'
  - type: text
    content: Laissez se reposer celui qui est épuisé ;
  - type: text
    content: Voici la trêve !
  - type: text
    content: Mais ils n'ont pas voulu écouter.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'B. a.-ba… v. 10n. –  ils trébuchent…  : cf. 8.15.'
  - type: text
    content: 'Et pour eux la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera :'
  - type: text
    content: B. a.-ba, b. a.-ba,
  - type: text
    content: d. a.-da, d. a.-da,
  - type: text
    content: un peu par-ci, un peu par-là,
  - type: text
    content: afin qu'en marchant ils trébuchent à la renverse et se brisent,
  - type: text
    content: qu'ils soient pris au piège et capturés.
  - type: heading
    content: La pierre angulaire
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'qui dominez sur  : autre traduction qui racontez des fables à  ; cf. 3.1-4.'
  - type: text
    content: 'Ecoutez donc la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', insolents,'
  - type: text
    content: vous qui dominez sur ce peuple de Jérusalem !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'alliance avec la mort  : cf. 8.19 ; il faut peut-être voir ici une allusion à l''alliance d''Ezéchias avec l''Egypte (cf. 30.1). –  pacte  : d''après des versions anciennes ; l''hébreu a un mot qui signifie habituellement visionnaire (homonyme ?) ; autre mot de la même racine au v. 18. – Voir séjour des morts. –  le déferlement destructeur passera ou submergera  : cf. v. 17s ; 8.7s ; 10.22. –  mensonge / fausseté 30.10-12. –  la fausseté…  : litt. dans la fausseté nous nous sommes cachés.'
  - type: text
    content: 'Vous dites : Nous avons conclu une alliance avec la mort,'
  - type: text
    content: nous avons fait un pacte avec le séjour des morts ;
  - type: text
    content: quand le déferlement destructeur passera,
  - type: text
    content: il ne nous atteindra pas,
  - type: text
    content: car nous avons le mensonge pour abri
  - type: text
    content: et la fausseté pour cachette.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.13n  ; 8.13s ; Ps 118.22 ; Mt 21.42/ / ; Rm 9.33 ; 10.11 ; 1P 2.6. –  J''ai mis , d''après des versions anciennes et plusieurs mss hébreux ; le texte hébreu traditionnel porte il a mis. –  éprouvée  : le mot pourrait aussi désigner une variété de granit. –  pierre angulaire 19.13n. –  solidement fondée  : litt. fondation fondée , le substantif et le verbe correspondants étant apparentés au verbe rendu par mis pour fondement . –  qui la prendra pour appui  : autre traduction qui mettra sa foi en elle. –  n''aura pas à se hâter (pour fuir ?) : LXX n''aura pas honte.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: J'ai mis pour fondement en Sion une pierre,
  - type: text
    content: une pierre éprouvée, une pierre angulaire de prix, solidement fondée ;
  - type: text
    content: celui qui la prendra pour appui n'aura pas à se hâter.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'équité / justice 1.27. –  règle (ou cordeau  ; hébreu qaw , cf. v. 10n) / niveau 34.11n  ; 2R 21.13. –  déferleront  : cf. v. 2n,15,18.'
  - type: text
    content: J'ai placé l'équité comme règle,
  - type: text
    content: et la justice comme niveau ;
  - type: text
    content: la grêle emportera l'abri du mensonge,
  - type: text
    content: les eaux déferleront sur toute cachette.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 15. –  annulée  : le même verbe est habituellement employé pour l''expiation des péchés ; cf. 47.11 ( conjurer ).'
  - type: text
    content: Votre alliance avec la mort sera annulée,
  - type: text
    content: votre pacte avec le séjour des morts ne tiendra pas ;
  - type: text
    content: quand le déferlement destructeur passera,
  - type: text
    content: il vous écrasera.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'son bruit seul…  : autre traduction il n''y aura qu''épouvante à en faire comprendre (même verbe au v. 9) la nouvelle. Le mot ici traduit par bruit ou nouvelle est celui qui a été rendu par leçon au v. 9n.'
  - type: text
    content: Chaque fois qu'il passera, il vous saisira ;
  - type: text
    content: car il passera tous les matins, et le jour et la nuit,
  - type: text
    content: et son bruit seul donnera l'épouvante.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'homme fort…  : il s''agit du roi d''Assyrie (cf. 5.26-29 ; 8.4,7s). –  destructrice  : autre traduction d''aiguilles  ; cf. Dt 32.24n  ; Os 13.14n. –  une pluie…  : litt. une pluie d''eaux puissantes qui inondent ou qui déferlent  ; cf. v. 15ss ; 8.8 ; 10.22. –  avec violence  : litt. avec la main. – Cf. Jg 5.4s ; Ha 3.3-10 ; Ps 68.8s.'
  - type: text
    content: Arrive un homme fort et courageux pour le Seigneur,
  - type: text
    content: comme une averse de grêle, une tempête destructrice,
  - type: text
    content: comme une pluie qui précipite des torrents impétueux ;
  - type: text
    content: il fait tomber à terre avec violence.
  '20':
  - type: text
    content: Le lit sera trop court pour qu'on puisse s'y étendre,
  - type: text
    content: et la couverture trop étroite pour qu'on puisse s'en couvrir.
  - type: heading
    content: Avertissement aux railleurs
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Peratsim / Gabaon 2S 5.17-25 ; 1Ch 14.8-16 ; cf. Jos 10. –  son œuvre 10.12+. –  étrange / extraordinaire  : les deux mots hébreux correspondants peuvent aussi signifier étranger(s)  ; cf. 29.14.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se lèvera comme au mont Peratsim,'
  - type: text
    content: il s'agitera comme dans la vallée de Gabaon,
  - type: text
    content: pour faire son œuvre,
  - type: text
    content: son œuvre étrange,
  - type: text
    content: pour accomplir son travail,
  - type: text
    content: son travail extraordinaire.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'la destruction…  : autre traduction j''ai appris (cf. 21.10) que la destruction de tout le pays a été décidée (10.22+) par le Seigneur.'
  - type: text
    content: Maintenant, ne vous montrez pas insolents,
  - type: text
    content: de peur que vos liens ne soient resserrés ;
  - type: text
    content: car la destruction de tout le pays est décidée ;
  - type: text
    content: 'je l''ai appris du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Deux illustrations agricoles
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'écoutez-moi  : autre traduction écoutez ma voix.'
  - type: text
    content: Prêtez l'oreille, écoutez-moi !
  - type: text
    content: Prêtez attention, écoutez ma parole !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 24-28 font allusion à des techniques agricoles et à des variétés de céréales qui n''ont pas toutes été identifiées avec certitude. L''idée qui s''en dégage est que Dieu connaît les siens et les traite avec mesure, selon leurs besoins particuliers et pour accomplir ses desseins à leur égard (cf. Jr 10.24). Cf. Os 2.23-25. –  sa terre  : litt. son sol  ; cf. Gn 2.5n. –  sans cesse  : litt. tout le jour.'
  - type: text
    content: Celui qui laboure pour semer laboure-t-il sans cesse ?
  - type: text
    content: Ouvre-t-il et herse-t-il sa terre sans cesse ?
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Les mots traduits par nigelle et cumin (hébreu kammôn ) ne se rencontrent qu''ici ; cf. v. 27. –  par rangées / à une place marquée  : sens incertain ; les mots hébreux correspondants pourraient aussi désigner d''autres céréales.'
  - type: text
    content: N'est-ce pas qu'après en avoir aplani la surface,
  - type: text
    content: il répand de la nigelle et jette du cumin,
  - type: text
    content: il met le froment par rangées,
  - type: text
    content: l'orge à une place marquée
  - type: text
    content: et l'épeautre sur les bords ?
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'la règle à suivre  : le mot hébreu correspondant est souvent rendu par droit ou équité . Cf. Jb 35.11+.'
  - type: text
    content: Son Dieu l'a instruit de la règle à suivre,
  - type: text
    content: il la lui a enseignée.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'la herse 41.15 ; Am 1.3. –  bâton / baguette  : cf. 9.3n.'
  - type: text
    content: On ne foule pas la nigelle avec la herse,
  - type: text
    content: et la roue du chariot ne passe pas sur le cumin ;
  - type: text
    content: mais on bat la nigelle avec le bâton
  - type: text
    content: et le cumin avec la baguette.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'le blé pour avoir  : sous-entendu dans le texte.'
  - type: text
    content: On doit broyer le blé pour avoir du pain ;
  - type: text
    content: on ne le bat pas continuellement ;
  - type: text
    content: si l'on y pousse la roue de son chariot et son attelage,
  - type: text
    content: il n'est pas broyé.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Cela aussi vient du Seigneur 41.20 ; Ps 118.23. –  ses projets…  : litt. il a rendu étonnant (ou merveilleux ) le projet (ou le conseil , cf. 9.5 ; Rm 11.33) , il a fait grandir la ressource (ou la raison  ; sur le terme correspondant, cf. Jb 5.12n  ; Pr 2.7n).'
  - type: text
    content: 'Cela aussi vient du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées ;'
  - type: text
    content: ses projets sont étonnants,
  - type: text
    content: ses ressources sont grandes !
  '3':
  - type: text
    content: Elle sera foulée aux pieds,
  - type: text
    content: la couronne orgueilleuse des ivrognes d'Ephraïm ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'comme une figue précoce  : cf. Os 9.10s ; Mi 7.1n  ; Na 3.12 ; Mt 24.32.'
  - type: text
    content: et la fleur fanée, ornement de sa splendeur,
  - type: text
    content: en haut de la vallée fertile,
  - type: text
    content: 'sera comme une figue précoce qu''on aperçoit avant la récolte :'
  - type: text
    content: à peine dans la main, aussitôt avalée.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'beauté  : le même terme est traduit par ornement aux v. 1,4. –  reste 1.9+.'
  - type: text
    content: 'En ce jour-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées sera'
  - type: text
    content: une couronne de beauté et un diadème de splendeur
  - type: text
    content: pour le reste de son peuple.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'souffle ou esprit 11.2-5. –  équité et juger traduisent ici un même mot hébreu, également rendu ailleurs par droit ou règle . –  assis  : position habituelle du juge. –  ceux qui repoussent la guerre (c.-à-d. l''ennemi) : cf. 1.26 ; 32.16.'
  - type: text
    content: Il sera un souffle d'équité sur celui qui est assis pour juger,
  - type: text
    content: et la vaillance pour ceux qui repoussent la guerre jusqu'aux portes de la ville.
  - type: heading
    content: Les ivrognes qui se moquent du prophète
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 1+. –  sont grisés Pr 5.19s ; 20.1. –  se fourvoient  : autre traduction titubent  ; le même verbe est habituellement traduit par errer, s''égarer. –  alcool 5.11+ ; Lv 10.9n. –  ils sont engloutis…  : autre traduction ils sont dans la confusion à cause du vin ; ils sont embrouillés par le vin  ; cf. 3.12n. –  décisions  : cf. 16.3+ ; voir Dt 17.8-13.'
  - type: text
    content: Mais ceux-là sont grisés par le vin,
  - type: text
    content: ils se fourvoient sous l'effet de l'alcool ;
  - type: text
    content: prêtre et prophète sont grisés par l'alcool,
  - type: text
    content: ils sont engloutis par le vin,
  - type: text
    content: ils se fourvoient sous l'effet de l'alcool ;
  - type: text
    content: ils sont grisés par leurs visions,
  - type: text
    content: ils vacillent dans leurs décisions.
  '8':
  - type: text
    content: Toutes les tables sont pleines de vomissements, d'ordures ;
  - type: text
    content: il n'y a plus de place.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 9s sont vraisemblablement à mettre dans la bouche des interlocuteurs du prophète  ; cf. Jr 6.10 ; Os 9.8. –  la leçon  : litt. ce qui est entendu. –  des enfants…  : litt. sevrés de lait, arrachés aux seins.'
  - type: text
    content: – A qui veut-il enseigner la connaissance ?
  - type: text
    content: A qui veut-il faire comprendre la leçon ?
  - type: text
    content: Est-ce à des enfants qui viennent d'être sevrés,
  - type: text
    content: qui viennent de quitter le sein de leur mère ?
