document_id: GEN.37,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '28.4. –  habita  : autre traduction s''installa . –  séjourné en immigré  : cf. Ex 12.48n.'
  - type: text
    content: Jacob habita en Canaan, dans le pays où son père avait séjourné en immigré.
  - type: heading
    content: Les rêves de Joseph
  '10':
  - type: note
    content: 'le rabroua ou le gronda  ; cf. Jr 29.27 ; Rt 2.16 ; voir aussi Es 17.13+. –  nous prosterner 27.29 ; 49.8. –  moi 47.31. –  ta mère  : ou bien, dans ce récit, Rachel est encore en vie (cf. 35.19 ; 48.7), ou bien Jacob souligne par ces mots le caractère irréalisable du rêve. Voir cependant 43.26-29. –  tes frères  : cf. 42.6+.'
  - type: text
    content: 'Il le raconta à son père et à ses frères. Son père le rabroua ; il lui dit : Que signifie ce rêve que tu as fait ? Devons-nous venir nous prosterner jusqu''à terre devant toi, moi, ta mère et tes frères ? '
  '11':
  - type: note
    content: 'jalousie Ac 7.9. –  garda…  : autre traduction garda le souvenir de cette parole  ; le mot hébreu correspondant à parole peut aussi bien signifier événement (cf. Dn 7.28 ; Lc 2.19,51).'
  - type: text
    content: Ses frères éprouvèrent de la jalousie à son égard, mais son père garda le souvenir de cet incident.
  - type: heading
    content: Joseph vendu par ses frères
  '12':
  - type: text
    content: ' '
  - type: note
    content: Sichem 12.6n  ; cf. 33.18–35.5.
  - type: text
    content: 'Les frères de Joseph allèrent faire paître le petit bétail de leur père à Sichem. '
  '13':
  - type: note
    content: D'accord ! litt. me voici  ; cf. 22.1n.
  - type: text
    content: 'Israël dit à Joseph : Tes frères font paître le troupeau à Sichem, n''est-ce pas ? Viens, je vais t''envoyer auprès d''eux. Il répondit : D''accord ! '
  '14':
  - type: note
    content: 'si tes frères vont bien…  : litt. la paix de tes frères et la paix du petit bétail. –  Hébron 35.27. –  Joseph se rendit  : litt. et il vint.'
  - type: text
    content: 'Il reprit : Va voir si tes frères vont bien et si le petit bétail va bien, je te prie. Tu me rapporteras des nouvelles. Il l''envoya ainsi de la vallée d''Hébron ; Joseph se rendit à Sichem.'
  '15':
  - type: text
    content: 'Un homme le trouva en train d''errer dans la campagne. L''homme lui demanda : Que cherches-tu ? '
  '16':
  - type: note
    content: Ct 1.7.
  - type: text
    content: 'Il répondit : Je cherche mes frères ; dis-moi, je te prie, où ils font paître leur troupeau. '
  '17':
  - type: note
    content: 'Dotân  : à environ 25 km au nord de Sichem.'
  - type: text
    content: 'L''homme dit : Ils sont partis d''ici, car je les ai entendus dire : « Allons à Dotân. » Joseph poursuivit son chemin à la recherche de ses frères et les trouva à Dotân.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 1S 19.1 ; Jr 11.18-21 ; 12.6 ; Mt 27.1.
  - type: text
    content: 'Ils le virent de loin et, avant qu''il se soit approché d''eux, ils complotèrent de le faire mourir. '
  '19':
  - type: note
    content: 'le maître rêveur  : litt. le maître (hébreu ba`al) des rêves.'
  - type: text
    content: 'Ils se dirent l''un à l''autre : Voilà le maître rêveur qui arrive. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'généalogie 2.4n. Il s''agit surtout de récits relatifs à Joseph (cf. 30.24n  ; Ac 7.9-16). –  garçon  : autres traductions jeune homme, serviteur  ; cf. 22.3n. –  Bilha / Zilpa 30.3-13 ; 35.25s. –  leurs mauvais propos  : on pourrait aussi comprendre les mauvais propos dont ils étaient l''objet , c.-à-d. leur mauvaise réputation  ; cf. Jr 20.10 ; Pr 10.18.'
  - type: text
    content: Voici la généalogie de Jacob.
  - type: text
    content: 'Joseph, à l''âge de dix-sept ans, faisait paître le petit bétail avec ses frères. C''était un garçon qui accompagnait les fils de Bilha et les fils de Zilpa, femmes de son père. Or Joseph rapportait à leur père leurs mauvais propos. '
  '20':
  - type: note
    content: 'Jr 38.4. –  une citerne  : litt. une des citernes.'
  - type: text
    content: 'Maintenant venez, tuons-le et jetons-le dans une citerne ; nous dirons qu''un animal féroce l''a dévoré, et nous verrons bien ce qu''il adviendra de ses rêves. '
  '21':
  - type: note
    content: 'Cf. v. 26 ; 42.22. –  il le délivra  : autre traduction il voulut le délivrer.'
  - type: text
    content: 'Ruben entendit cela, et il le délivra de leur main. Il dit : N''attentons pas à sa vie. '
  '22':
  - type: note
    content: Jr 38.6.
  - type: text
    content: 'Ruben leur dit : Ne répandez pas de sang ; jetez-le dans cette citerne qui est dans le désert, et ne portez pas la main sur lui. C''était pour le délivrer de leur main, afin de le ramener à son père.'
  '23':
  - type: text
    content: 'Lorsque Joseph fut arrivé auprès de ses frères, ils le dépouillèrent de sa tunique, la tunique multicolore qu''il avait sur lui. '
  '24':
  - type: note
    content: Cf. 42.21.
  - type: text
    content: 'Ils le prirent et le jetèrent dans la citerne. Cette citerne était vide : il n''y avait pas d''eau dedans.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'manger  : litt. manger du pain . Cf. 3.19n  ; 31.54n. –  Ismaélites 25.12-18. –  Galaad 31.21n. –  aromates  : le mot hébreu correspondant est peut-être un terme générique pour les parfums (2R 20.13). Le baume est une résine extraite de certains arbres odoriférants (cf. Ez 27.17) ; le ladanum est également une résine, celle d''un arbrisseau appelé ciste. Toutefois, le mot hébreu loth , qui a été traduit par ladanum , a également été rapproché du lotus et pourrait désigner une racine. En tout cas, de tels produits étaient utilisés en Egypte pour des soins médicaux et pour l''embaumement des momies (cf. 43.11). –  qu''ils emportaient  : litt. qu''ils faisaient descendre , cf. 12.10n.'
  - type: text
    content: 'Ils s''assirent ensuite pour manger. Levant les yeux, ils virent une caravane d''Ismaélites qui venait de Galaad ; leurs chameaux étaient chargés d''aromates, de baume et de ladanum qu''ils emportaient en Egypte. '
  '26':
  - type: note
    content: sang 4.10+ ; cf. Es 26.21 ; Ez 24.7s ; Jb 16.18.
  - type: text
    content: 'Alors Juda dit à ses frères : Quel profit y aurait-il à tuer notre frère et à couvrir son sang ? '
  '27':
  - type: note
    content: Voir chair.
  - type: text
    content: 'Venez, vendons-le plutôt aux Ismaélites et ne portons pas la main sur lui ; car il est notre frère, notre chair ! Ses frères l''écoutèrent. '
  '28':
  - type: note
    content: 'Les verbes traduits par tirèrent et vendirent semblent avoir pour sujet les marchands madianites  ; certains pensent cependant qu''il s''agit des frères de Joseph. Comme les Ismaélites (v. 25), les Madianites (25.2n  ; 37.36n) sont des caravaniers. La Genèse présente les deux groupes comme descendant d''Abraham. Voir aussi Jg 8.22,24. –  vendirent  : cf. Za 11.12 ; Mt 26.15 ; Ac 7.9.'
  - type: text
    content: Des marchands madianites vinrent à passer ; ils tirèrent Joseph et le firent remonter de la citerne. Ils vendirent Joseph aux Ismaélites pour vingt pièces d'argent, et ceux-ci emmenèrent Joseph en Egypte.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'déchira ses vêtements  : geste de profonde émotion ou de deuil, de même au v. 34 ; 44.13 ; 2S 3.31 ; 13.31 ; 1R 21.27 ; Est 4.1+.'
  - type: text
    content: 'Ruben revint à la citerne, mais Joseph n''était plus dans la citerne. Il déchira ses vêtements, '
  '3':
  - type: note
    content: 'Israël aimait Joseph  : cf. 29.18 ; 30.22-24 ; 44.20. –  Il lui avait fait  : certains modifient le texte hébreu traditionnel pour lire il lui avait fait faire. –  multicolore  : on a aussi proposé les interprétations suivantes  : de fine laine, à manches longues, à pans etc. (même terme en 2S 13.18).'
  - type: text
    content: 'Israël aimait Joseph plus que tous ses autres fils, parce que c''était un fils de sa vieillesse. Il lui avait fait une tunique multicolore. '
  '30':
  - type: text
    content: 'retourna vers ses frères et dit : L''enfant n''est plus là ! Et moi, où puis-je aller maintenant ? '
  '31':
  - type: text
    content: 'Ils prirent alors la tunique de Joseph, égorgèrent un bouc et plongèrent la tunique dans le sang. '
  '32':
  - type: note
    content: 'en lui faisant dire  : litt. et ils dirent. –  Regarde 31.32n.'
  - type: text
    content: 'Puis ils envoyèrent la tunique multicolore à leur père, en lui faisant dire : Voici ce que nous avons trouvé. Regarde, je te prie, pour voir si c''est la tunique de ton fils. '
  '33':
  - type: text
    content: 'Il regarda et dit : C''est la tunique de mon fils ! Un animal féroce l''a dévoré ! Joseph a été déchiqueté ! '
  '34':
  - type: text
    content: 'Jacob déchira ses vêtements, mit un sac sur ses reins et porta le deuil de son fils pendant bien des jours. '
  '35':
  - type: note
    content: 's''efforcèrent de le consoler  : litt. se levèrent pour le consoler. –  au séjour des morts 42.38 ; 44.29,31 ; cf. 2S 19.1 ; 1R 2.6,9 ; Es 38.10ss ; Ps 115.17.'
  - type: text
    content: 'Tous ses fils et toutes ses filles s''efforcèrent de le consoler ; mais il refusa toute consolation. Il disait : C''est dans le deuil que je descendrai vers mon fils, au séjour des morts ! Ainsi son père le pleura.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 105.17s. –  les Madianites ou les Medanites , d''après la vocalisation traditionnelle du texte hébreu (cf. v. 28n  ; voir 25.2). Mais il peut s''agir d''une variante orthographique dépourvue de signification. –  haut fonctionnaire  : le mot hébreu correspondant peut aussi avoir le sens d’ eunuque , cf. Est 1.10n  ; ici il désigne un haut fonctionnaire dont l''intégrité physique n''est pas en cause. – Le sens précis du mot traduit par gardes (cf. 40.2s,7 ; 2R 25.8) est incertain ; il désigne ailleurs un cuisinier (1S 9.23), d''où l''autre traduction possible  : grand sommelier . – Le récit de Joseph se poursuit au chapitre 39.'
  - type: text
    content: Or les Madianites avaient vendu Joseph en Egypte, à Potiphar, haut fonctionnaire du pharaon, commandant des gardes.
  '4':
  - type: note
    content: 'plus qu''eux tous  : litt. plus que tous ses frères. Certains mss hébreux et des versions anciennes portent fils au lieu de frères. –  sans hostilité  : litt. pour (la) paix, ce qui pourrait aussi signifier ils ne lui parlaient même plus pour le saluer. Cf. Pr 18.19.'
  - type: text
    content: Ses frères virent que leur père l'aimait plus qu'eux tous, et ils se mirent à le détester. Ils ne pouvaient lui parler sans hostilité.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'rêve v. 9-11,19 ; 20.3+ ; 28.12 ; 40.4-19 ; 41.1-32 ; 42.9 ; Dn 2 ; 4. –  le détestèrent encore davantage  : litt. et ils ajoutèrent (hébreu yosiphou , qui rappelle le nom de Joseph, cf. 30.24n) encore à le détester ou à le haïr  ; de même au v. 8.'
  - type: text
    content: 'Joseph fit un rêve et le raconta à ses frères, qui le détestèrent encore davantage. '
  '6':
  - type: text
    content: 'Il leur dit : Ecoutez ce rêve que j''ai fait, je vous prie ! '
  '7':
  - type: text
    content: 'Nous étions au milieu des champs à lier des gerbes ; soudain ma gerbe se dressa et se tint debout, et vos gerbes l''entourèrent et se prosternèrent devant elle. '
  '8':
  - type: note
    content: V. 5n  ; Ex 2.14 ; 1S 10.27 ; Lc 19.14 ; cf. Ps 118.22.
  - type: text
    content: 'Ses frères lui dirent : Vas-tu donc être roi sur nous ? Vas-tu être notre maître ? Et ils le détestèrent encore davantage à cause de ses rêves et de ses paroles.'
  '9':
  - type: text
    content: 'Il fit encore un autre rêve qu''il raconta à ses frères. Il dit : J''ai encore fait un rêve ! Le soleil, la lune et onze étoiles se prosternaient devant moi. '
