        marker: fr
        children:
        - type: text
          text: '37.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jalousie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 7.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: garda…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: garda le souvenir de cette parole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le mot hébreu correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'parole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut aussi bien signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'événement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Dn 7.28 ; Lc 2.19,51).
      marker-yv: yv-n
    - type: text
      text: Ses frères éprouvèrent de la jalousie à son égard, mais son père garda le souvenir de cet incident.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph vendu par ses frères
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sichem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 33.18–35.5.'
      marker-yv: yv-n
    - type: text
      text: 'Les frères de Joseph allèrent faire paître le petit bétail de leur père à Sichem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'D''accord ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me voici
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 22.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Israël dit à Joseph : Tes frères font paître le troupeau à Sichem, n''est-ce pas ? Viens, je vais t''envoyer auprès d''eux. Il répondit : D''accord ! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si tes frères vont bien…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' de tes frères et la paix du petit bétail'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hébron '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '35.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Joseph se rendit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il vint.
      marker-yv: yv-n
    - type: text
      text: 'Il reprit : Va voir si tes frères vont bien et si le petit bétail va bien, je te prie. Tu me rapporteras des nouvelles. Il l''envoya ainsi de la vallée d''Hébron ; Joseph se rendit à Sichem.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Un homme le trouva en train d''errer dans la campagne. L''homme lui demanda : Que cherches-tu ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ct 1.7.
      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Je cherche mes frères ; dis-moi, je te prie, où ils font paître leur troupeau. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dotân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à environ 25 km au nord de Sichem.'
      marker-yv: yv-n
    - type: text
      text: 'L''homme dit : Ils sont partis d''ici, car je les ai entendus dire : « Allons à Dotân. » Joseph poursuivit son chemin à la recherche de ses frères et les trouva à Dotân.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1S 19.1 ; Jr 11.18-21 ; 12.6 ; Mt 27.1.
      marker-yv: yv-n
    - type: text
      text: 'Ils le virent de loin et, avant qu''il se soit approché d''eux, ils complotèrent de le faire mourir. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
