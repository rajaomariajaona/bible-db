    - type: text
      text: Jacob habita en Canaan, dans le pays où son père avait séjourné en immigré.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les rêves de Joseph
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le rabroua '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le gronda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jr 29.27 ; Rt 2.16 ; voir aussi Es 17.13+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous prosterner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '27.29 ; 49.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '47.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ta mère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ou bien, dans ce récit, Rachel est encore en vie (cf. 35.19 ; 48.7), ou bien Jacob souligne par ces mots le caractère irréalisable du rêve. Voir cependant 43.26-29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tes frères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 42.6+.'
      marker-yv: yv-n
    - type: text
      text: 'Il le raconta à son père et à ses frères. Son père le rabroua ; il lui dit : Que signifie ce rêve que tu as fait ? Devons-nous venir nous prosterner jusqu''à terre devant toi, moi, ta mère et tes frères ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
