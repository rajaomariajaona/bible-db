          text: '37.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le maître rêveur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le maître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ba`al
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des rêves.
      marker-yv: yv-n
    - type: text
      text: 'Ils se dirent l''un à l''autre : Voilà le maître rêveur qui arrive. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
