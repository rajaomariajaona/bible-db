        children:
        - type: text
          text: '31.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aromates
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot hébreu correspondant est peut-être un terme générique pour les parfums (2R 20.13). Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'baume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est une résine extraite de certains arbres odoriférants (cf. Ez 27.17) ; le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ladanum '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est également une résine, celle d''un arbrisseau appelé ciste. Toutefois, le mot hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: loth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui a été traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ladanum
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a également été rapproché du lotus et pourrait désigner une racine. En tout cas, de tels produits étaient utilisés en Egypte pour des soins médicaux et pour l''embaumement des momies (cf. 43.11). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'ils emportaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'ils faisaient descendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 12.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils s''assirent ensuite pour manger. Levant les yeux, ils virent une caravane d''Ismaélites qui venait de Galaad ; leurs chameaux étaient chargés d''aromates, de baume et de ladanum qu''ils emportaient en Egypte. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.26 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.10+ ; cf. Es 26.21 ; Ez 24.7s ; Jb 16.18.
      marker-yv: yv-n
    - type: text
      text: 'Alors Juda dit à ses frères : Quel profit y aurait-il à tuer notre frère et à couvrir son sang ? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Venez, vendons-le plutôt aux Ismaélites et ne portons pas la main sur lui ; car il est notre frère, notre chair ! Ses frères l''écoutèrent. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les verbes traduits par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tirèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vendirent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'semblent avoir pour sujet les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: marchands madianites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains pensent cependant qu''il s''agit des frères de Joseph. Comme les Ismaélites (v. 25), les Madianites (25.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 37.36'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') sont des caravaniers. La Genèse présente les deux groupes comme descendant d''Abraham. Voir aussi Jg 8.22,24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vendirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Za 11.12 ; Mt 26.15 ; Ac 7.9.'
      marker-yv: yv-n
    - type: text
      text: Des marchands madianites vinrent à passer ; ils tirèrent Joseph et le firent remonter de la citerne. Ils vendirent Joseph aux Ismaélites pour vingt pièces d'argent, et ceux-ci emmenèrent Joseph en Egypte.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: déchira ses vêtements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : geste de profonde émotion ou de deuil, de même au v. 34 ; 44.13 ; 2S 3.31 ; 13.31 ; 1R 21.27 ; Est 4.1+.'
      marker-yv: yv-n
    - type: text
      text: 'Ruben revint à la citerne, mais Joseph n''était plus dans la citerne. Il déchira ses vêtements, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Israël aimait Joseph
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 29.18 ; 30.22-24 ; 44.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il lui avait fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il lui avait fait faire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: multicolore
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on a aussi proposé les interprétations suivantes'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de fine laine, à manches longues, à pans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: etc. (même terme en 2S 13.18).
      marker-yv: yv-n
    - type: text
      text: 'Israël aimait Joseph plus que tous ses autres fils, parce que c''était un fils de sa vieillesse. Il lui avait fait une tunique multicolore. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'retourna vers ses frères et dit : L''enfant n''est plus là ! Et moi, où puis-je aller maintenant ? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ils prirent alors la tunique de Joseph, égorgèrent un bouc et plongèrent la tunique dans le sang. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en lui faisant dire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et ils dirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Regarde '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '31.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Puis ils envoyèrent la tunique multicolore à leur père, en lui faisant dire : Voici ce que nous avons trouvé. Regarde, je te prie, pour voir si c''est la tunique de ton fils. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Il regarda et dit : C''est la tunique de mon fils ! Un animal féroce l''a dévoré ! Joseph a été déchiqueté ! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jacob déchira ses vêtements, mit un sac sur ses reins et porta le deuil de son fils pendant bien des jours. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'efforcèrent de le consoler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se levèrent pour le consoler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: séjour
        - type: text
          text: ' des morts '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 42.38 ; 44.29,31 ; cf. 2S 19.1 ; 1R 2.6,9 ; Es 38.10ss ; Ps 115.17.
      marker-yv: yv-n
    - type: text
      text: 'Tous ses fils et toutes ses filles s''efforcèrent de le consoler ; mais il refusa toute consolation. Il disait : C''est dans le deuil que je descendrai vers mon fils, au séjour des morts ! Ainsi son père le pleura.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 105.17s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les Madianites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les Medanites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après la vocalisation traditionnelle du texte hébreu (cf. v. 28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir 25.2). Mais il peut s''agir d''une variante orthographique dépourvue de signification. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: haut fonctionnaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot hébreu correspondant peut aussi avoir le sens d’'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: eunuque
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Est 1.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; ici il désigne un haut fonctionnaire dont l''intégrité physique n''est pas en cause. – Le sens précis du mot traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gardes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 40.2s,7 ; 2R 25.8) est incertain ; il désigne ailleurs un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cuisinier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1S 9.23), d'où l'autre traduction possible
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: grand sommelier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . – Le récit de Joseph se poursuit au chapitre 39.
      marker-yv: yv-n
    - type: text
      text: Or les Madianites avaient vendu Joseph en Egypte, à Potiphar, haut fonctionnaire du pharaon, commandant des gardes.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plus qu'eux tous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: plus que tous ses frères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Certains mss hébreux et des versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: frères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans hostilité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour (la) '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ne lui parlaient même plus pour le saluer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. Pr 18.19.
      marker-yv: yv-n
    - type: text
      text: Ses frères virent que leur père l'aimait plus qu'eux tous, et ils se mirent à le détester. Ils ne pouvaient lui parler sans hostilité.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rêve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 9-11,19 ; 20.3+ ; 28.12 ; 40.4-19 ; 41.1-32 ; 42.9 ; Dn 2 ; 4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le détestèrent encore davantage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et ils ajoutèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: yosiphou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui rappelle le nom de Joseph, cf. 30.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'encore à le détester '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à le haïr
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; de même au v. 8.
      marker-yv: yv-n
    - type: text
      text: 'Joseph fit un rêve et le raconta à ses frères, qui le détestèrent encore davantage. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il leur dit : Ecoutez ce rêve que j''ai fait, je vous prie ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nous étions au milieu des champs à lier des gerbes ; soudain ma gerbe se dressa et se tint debout, et vos gerbes l''entourèrent et se prosternèrent devant elle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 2.14 ; 1S 10.27 ; Lc 19.14 ; cf. Ps 118.22.'
      marker-yv: yv-n
    - type: text
      text: 'Ses frères lui dirent : Vas-tu donc être roi sur nous ? Vas-tu être notre maître ? Et ils le détestèrent encore davantage à cause de ses rêves et de ses paroles.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il fit encore un autre rêve qu''il raconta à ses frères. Il dit : J''ai encore fait un rêve ! Le soleil, la lune et onze étoiles se prosternaient devant moi. '
