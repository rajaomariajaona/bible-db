        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Bilha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zilpa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '30.3-13 ; 35.25s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs mauvais propos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les mauvais propos dont ils étaient l'objet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur mauvaise réputation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Jr 20.10 ; Pr 10.18.
      marker-yv: yv-n
    - type: text
      text: Voici la généalogie de Jacob.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph, à l''âge de dix-sept ans, faisait paître le petit bétail avec ses frères. C''était un garçon qui accompagnait les fils de Bilha et les fils de Zilpa, femmes de son père. Or Joseph rapportait à leur père leurs mauvais propos. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jr 38.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une citerne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une des citernes.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant venez, tuons-le et jetons-le dans une citerne ; nous dirons qu''un animal féroce l''a dévoré, et nous verrons bien ce qu''il adviendra de ses rêves. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 26 ; 42.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il le délivra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il voulut le délivrer.
      marker-yv: yv-n
    - type: text
      text: 'Ruben entendit cela, et il le délivra de leur main. Il dit : N''attentons pas à sa vie. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jr 38.6.
      marker-yv: yv-n
    - type: text
      text: 'Ruben leur dit : Ne répandez pas de sang ; jetez-le dans cette citerne qui est dans le désert, et ne portez pas la main sur lui. C''était pour le délivrer de leur main, afin de le ramener à son père.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Lorsque Joseph fut arrivé auprès de ses frères, ils le dépouillèrent de sa tunique, la tunique multicolore qu''il avait sur lui. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 42.21.
      marker-yv: yv-n
    - type: text
      text: 'Ils le prirent et le jetèrent dans la citerne. Cette citerne était vide : il n''y avait pas d''eau dedans.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
